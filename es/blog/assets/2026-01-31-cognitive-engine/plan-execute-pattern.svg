<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 380" role="img" aria-label="Plan-and-Execute Pattern" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="artifact-title">Patrón de planificación y ejecución</title>
  <defs>
    <linearGradient id="planGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #2563eb" />
      <stop offset="100%" style="stop-color: #7c3aed" />
    </linearGradient>
    <linearGradient id="execGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #c4b5fd" />
      <stop offset="100%" style="stop-color: #dc2626" />
    </linearGradient>
    <linearGradient id="replanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #2563eb" />
      <stop offset="100%" style="stop-color: #2563eb" />
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
    <marker id="arrowhead3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="420" height="380" fill="#f8fafc" />

  <!-- Title -->
  <text y="28" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#0f172a" x="180">Patrón de planificación y ejecución</text>

  <!-- Planner Box -->
  <rect x="105" y="50" width="150" height="45" rx="8" fill="url(#planGrad)" filter="url(#shadow3)" />
  <text y="78" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#ffffff" x="180">Planificador</text>

  <!-- Plan Label - repositioned to fit within canvas -->
  <text y="68" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" x="268">← Plan de alto nivel</text>
  <text y="80" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" x="268">   (4-6 pasos)</text>

  <!-- Arrow down to executor -->
  <path d="M180 95 L180 120" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowhead3)" />

  <!-- Executor Container -->
  <rect x="45" y="125" width="270" height="125" rx="10" fill="none" stroke="#cbd5e1" stroke-width="1.5" />
  <text y="145" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#334155" x="180">Ejecutor (ReAct Agente)</text>

  <!-- Step 1 -->
  <rect x="65" y="158" width="230" height="24" rx="5" fill="url(#execGrad)" opacity="0.9" />
  <text y="175" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#ffffff" x="180">Paso 1: Pensamiento → Acción → Observación</text>

  <!-- Step 2 -->
  <rect x="65" y="190" width="230" height="24" rx="5" fill="url(#execGrad)" opacity="0.7" />
  <text y="207" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#ffffff" x="180">Paso 2: Pensamiento → Acción → Observación</text>

  <!-- Dots -->
  <text y="235" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#334155" x="180">···</text>

  <!-- Arrow down to replanner -->
  <path d="M180 250 L180 275" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowhead3)" />

  <!-- Replanner Box -->
  <rect x="105" y="280" width="150" height="45" rx="8" fill="url(#replanGrad)" filter="url(#shadow3)" />
  <text y="308" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#ffffff" x="180">Replanificador</text>

  <!-- Loop Arrow - from Replanner back to Executor -->
  <path d="M255 302 Q340 302 340 210 Q340 125 320 125" stroke="#94a3b8" stroke-width="2" fill="none" stroke-dasharray="5,3" />
  <polygon points="320,120 320,130 310,125" fill="#94a3b8" />
  <!-- Loop label - positioned along the arrow path -->
  <text y="215" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#334155" x="355" transform="rotate(90 355 215)">Ajustar el plan si es necesario</text>

  <!-- Complete Label -->
  <text y="360" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#334155" font-style="italic" x="180">Siguiente paso o completar</text>
</svg>
