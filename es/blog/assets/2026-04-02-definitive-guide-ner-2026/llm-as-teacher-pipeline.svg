<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="Inter, system-ui, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Pipeline de LLM como profesor: desde $70 en etiquetado hasta $0,10/hora en inferencia</title>
  <desc id="artifact-desc">Pipeline de LLM como profesor: desde $70 en etiquetado hasta $0,10/hora en inferencia.</desc>
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
    <marker id="arg" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#166534" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a" x="450">Pipeline de LLM como profesor: desde $70 en etiquetado hasta $0,10/hora en inferencia</text>

  <!-- Step 1: Raw Data -->
  <rect x="20" y="55" width="130" height="80" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" />
  <text y="82" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a" x="85">Datos brutos</text>
  <text y="100" text-anchor="middle" font-size="10" fill="#64748b" x="85">~900 mil documentos</text>
  <text y="115" text-anchor="middle" font-size="10" fill="#64748b" x="85">Sin etiquetas</text>

  <line x1="150" y1="95" x2="180" y2="95" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)" />

  <!-- Step 2: LLM Annotation -->
  <rect x="185" y="55" width="140" height="80" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" />
  <text y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#5b21b6" x="255">Etiquetado de LLM</text>
  <text y="95" text-anchor="middle" font-size="10" fill="#5b21b6" x="255">Llama 3.1-70B</text>
  <text y="110" text-anchor="middle" font-size="10" fill="#5b21b6" x="255">~8 horas</text>
  <text y="125" text-anchor="middle" font-size="10" fill="#991b1b" font-weight="bold" x="255">Coste: ~70 $</text>

  <line x1="325" y1="95" x2="355" y2="95" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)" />

  <!-- Step 3: Human Review -->
  <rect x="360" y="55" width="130" height="80" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2" />
  <text y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#9a3412" x="425">Revisión humana</text>
  <text y="95" text-anchor="middle" font-size="10" fill="#9a3412" x="425">Arcilla / Label Studio</text>
  <text y="110" text-anchor="middle" font-size="10" fill="#9a3412" x="425">2.714 muestras</text>
  <text y="125" text-anchor="middle" font-size="10" fill="#9a3412" x="425">~8 horas</text>

  <line x1="490" y1="95" x2="520" y2="95" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)" />

  <!-- Step 4: Fine-tune -->
  <rect x="525" y="55" width="140" height="80" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d4ed8" x="595">Afinar</text>
  <text y="95" text-anchor="middle" font-size="10" fill="#1d4ed8" x="595">GLiNER / RoBERTa</text>
  <text y="110" text-anchor="middle" font-size="10" fill="#1d4ed8" x="595">90-300 millones de parámetros</text>
  <text y="125" text-anchor="middle" font-size="10" fill="#1d4ed8" x="595">A100, ~4 horas</text>

  <line x1="665" y1="95" x2="695" y2="95" stroke="#166534" stroke-width="2" marker-end="url(#arg)" />

  <!-- Step 5: Deploy -->
  <rect x="700" y="55" width="170" height="80" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="2" />
  <text y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#166534" x="785">Desplegar</text>
  <text y="95" text-anchor="middle" font-size="10" fill="#166534" x="785">ONNX + INT8 en CPU</text>
  <text y="110" text-anchor="middle" font-size="10" fill="#166534" font-weight="bold" x="785">93,4% F1</text>
  <text y="125" text-anchor="middle" font-size="10" fill="#166534" font-weight="bold" x="785">0,10 $/h</text>

  <!-- Comparison bar: Before -->
  <text y="175" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a" x="450">Comparación económica (estudio de caso CFM)</text>

  <!-- LLM Direct -->
  <rect x="80" y="195" width="740" height="60" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" />
  <text y="218" font-size="12" font-weight="bold" fill="#991b1b" x="100">Inferencia directa de LLM</text>
  <text y="238" font-size="11" fill="#991b1b" x="100">Llama 3.1-70b  |  92,7% F1  |  $8/hora (4 GPUs L40S)  |  ~1-2 segundos por consulta</text>

  <!-- Encoder -->
  <rect x="80" y="270" width="740" height="60" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" />
  <text y="293" font-size="12" font-weight="bold" fill="#166534" x="100">Encoder afinado (LLM como instructor)</text>
  <text y="313" font-size="11" fill="#166534" x="100">GLiNER-medium | 93,4% F1 | $0,10/hora (CPU) | &lt;50 ms por consulta | 80 veces más económico</text>

  <!-- Arrow showing improvement -->
  <text y="355" text-anchor="middle" font-size="13" fill="#166534" font-weight="bold" x="450">El estudiante supera al profesor: F1 del +0,7% a un costo 80 veces menor</text>
  <text y="373" text-anchor="middle" font-size="11" fill="#64748b" x="450">Coste total del pipeline: ~$70 por etiquetado de LLM + ~$50 en recursos de cómputo = ~$120 de inversión única</text>
</svg>
