<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1565c0" />
    </marker>
    <marker id="arg" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2e7d32" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a">Pipeline LLM-como-profesor: de etiquetado por $70 a inferencia por $0.10/h</text>

  <!-- Step 1: Raw Data -->
  <rect x="20" y="55" width="130" height="80" rx="8" fill="#f5f5f5" stroke="#999" stroke-width="1.5" />
  <text x="85" y="82" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Datos brutos</text>
  <text x="85" y="100" text-anchor="middle" font-size="10" fill="#888">~900K docs</text>
  <text x="85" y="115" text-anchor="middle" font-size="10" fill="#888">Sin etiquetar</text>

  <line x1="150" y1="95" x2="180" y2="95" stroke="#1565c0" stroke-width="2" marker-end="url(#ar)" />

  <!-- Step 2: LLM Annotation -->
  <rect x="185" y="55" width="140" height="80" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" />
  <text x="255" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#6a1b9a">Etiquetado con LLM</text>
  <text x="255" y="95" text-anchor="middle" font-size="10" fill="#6a1b9a">Llama 3.1-70b</text>
  <text x="255" y="110" text-anchor="middle" font-size="10" fill="#6a1b9a">~8 horas</text>
  <text x="255" y="125" text-anchor="middle" font-size="10" fill="#c62828" font-weight="bold">Coste: ~$70</text>

  <line x1="325" y1="95" x2="355" y2="95" stroke="#1565c0" stroke-width="2" marker-end="url(#ar)" />

  <!-- Step 3: Human Review -->
  <rect x="360" y="55" width="130" height="80" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="2" />
  <text x="425" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">Revisión humana</text>
  <text x="425" y="95" text-anchor="middle" font-size="10" fill="#e65100">Argilla / Label Studio</text>
  <text x="425" y="110" text-anchor="middle" font-size="10" fill="#e65100">2.714 muestras</text>
  <text x="425" y="125" text-anchor="middle" font-size="10" fill="#e65100">~8 horas</text>

  <line x1="490" y1="95" x2="520" y2="95" stroke="#1565c0" stroke-width="2" marker-end="url(#ar)" />

  <!-- Step 4: Fine-tune -->
  <rect x="525" y="55" width="140" height="80" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" />
  <text x="595" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565c0">Ajuste fino</text>
  <text x="595" y="95" text-anchor="middle" font-size="10" fill="#1565c0">GLiNER / RoBERTa</text>
  <text x="595" y="110" text-anchor="middle" font-size="10" fill="#1565c0">90-300M params</text>
  <text x="595" y="125" text-anchor="middle" font-size="10" fill="#1565c0">A100, ~4 horas</text>

  <line x1="665" y1="95" x2="695" y2="95" stroke="#2e7d32" stroke-width="2" marker-end="url(#arg)" />

  <!-- Step 5: Deploy -->
  <rect x="700" y="55" width="170" height="80" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" />
  <text x="785" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">Despliegue</text>
  <text x="785" y="95" text-anchor="middle" font-size="10" fill="#2e7d32">ONNX + INT8 en CPU</text>
  <text x="785" y="110" text-anchor="middle" font-size="10" fill="#2e7d32" font-weight="bold">93,4% F1</text>
  <text x="785" y="125" text-anchor="middle" font-size="10" fill="#2e7d32" font-weight="bold">$0.10/h</text>

  <!-- Comparison bar: Before -->
  <text x="450" y="175" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Comparativa económica (caso CFM)</text>

  <!-- LLM Direct -->
  <rect x="80" y="195" width="740" height="60" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="1.5" />
  <text x="100" y="218" font-size="12" font-weight="bold" fill="#c62828">Inferencia LLM directa</text>
  <text x="100" y="238" font-size="11" fill="#b71c1c">Llama 3.1-70b  |  92,7% F1  |  $8/h (4x L40S GPU)  |  ~1-2 s por consulta</text>

  <!-- Encoder -->
  <rect x="80" y="270" width="740" height="60" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" />
  <text x="100" y="293" font-size="12" font-weight="bold" fill="#2e7d32">Encoder ajustado (LLM-como-profesor)</text>
  <text x="100" y="313" font-size="11" fill="#1b5e20">GLiNER-medium  |  93,4% F1  |  $0.10/h (CPU)  |  &lt;50 ms por consulta  |  80x más barato</text>

  <!-- Arrow showing improvement -->
  <text x="450" y="355" text-anchor="middle" font-size="13" fill="#2e7d32" font-weight="bold">El alumno supera al profesor: +0,7% F1 con un coste 80x menor</text>
  <text x="450" y="373" text-anchor="middle" font-size="11" fill="#888">Coste total del pipeline: etiquetado LLM ~$70 + cómputo ~$50 = ~$120 de inversión única</text>
</svg>
