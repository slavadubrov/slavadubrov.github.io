<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Ingeniería de prompts vs Cadena de pensamiento vs SGR</title>
  <desc id="artifact-desc">Ingeniería de prompts vs Cadena de pensamiento vs SGR.</desc>
  <defs>
    <linearGradient id="promptGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #dc2626;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cotGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #ea580c;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #ea580c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sgrGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #166534;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="900" height="550" fill="#0f172a" />

  <!-- Title -->
  <text y="40" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="bold" fill="#f8fafc" text-anchor="middle" x="450">Ingeniería de prompts vs Cadena de pensamiento vs SGR</text>

  <!-- Column 1: Prompt Engineering -->
  <g transform="translate(30, 70)">
    <rect x="0" y="0" width="270" height="460" rx="16" fill="#1e293b" stroke="#dc2626" stroke-width="3" filter="url(#shadow)" />

    <!-- Header -->
    <rect x="0" y="0" width="270" height="50" rx="16" fill="url(#promptGrad)" />
    <rect x="0" y="35" width="270" height="15" fill="url(#promptGrad)" />
    <text y="33" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#f8fafc" text-anchor="middle" x="135">📝 Ingeniería de prompts</text>

    <!-- Content -->
    <text y="80" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fca5a5" x="20">Enfoque:</text>
    <text y="100" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">"Por favor, devuelva el resultado en formato JSON"</text>
    <text y="118" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">Tenga cuidado con el formato.</text>

    <line x1="20" y1="135" x2="250" y2="135" stroke="#94a3b8" stroke-width="1" />

    <text y="160" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fca5a5" x="20">Control:</text>
    <text y="180" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">Solo persuasión semántica</text>
    <text y="198" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">Mecanismo de atención del modelo</text>

    <line x1="20" y1="215" x2="250" y2="215" stroke="#94a3b8" stroke-width="1" />

    <text y="240" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fca5a5" x="20">Salida:</text>
    <rect x="20" y="250" width="230" height="70" rx="6" fill="#0f172a" stroke="#94a3b8" stroke-width="1" />
    <text y="270" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#fca5a5" x="30">"¡Claro! El descuento es del 20%."</text>
    <text y="285" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#fca5a5" x="30">Aquí está el JSON, quizás:</text>
    <text y="300" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#fca5a5" x="30">{descuento: '20%'...</text>

    <line x1="20" y1="335" x2="250" y2="335" stroke="#94a3b8" stroke-width="1" />

    <text y="360" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fca5a5" x="20">Problemas:</text>
    <text y="380" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">❌ Inconsistencia de formato</text>
    <text y="398" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">❌ Pasos de razonamiento omitidos</text>
    <text y="416" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">❌ Requiere bucles de intento repetido</text>
    <text y="434" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">❌ Resultados dependientes del modelo</text>
  </g>

  <!-- Column 2: Chain of Thought -->
  <g transform="translate(315, 70)">
    <rect x="0" y="0" width="270" height="460" rx="16" fill="#1e293b" stroke="#ea580c" stroke-width="3" filter="url(#shadow)" />

    <!-- Header -->
    <rect x="0" y="0" width="270" height="50" rx="16" fill="url(#cotGrad)" />
    <rect x="0" y="35" width="270" height="15" fill="url(#cotGrad)" />
    <text y="33" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#f8fafc" text-anchor="middle" x="135">🔗 Cadena de razonamiento</text>

    <!-- Content -->
    <text y="80" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fdba74" x="20">Enfoque:</text>
    <text y="100" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">"Pensemos paso a paso"</text>
    <text y="118" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">Rastros de razonamiento intermedio</text>

    <line x1="20" y1="135" x2="250" y2="135" stroke="#94a3b8" stroke-width="1" />

    <text y="160" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fdba74" x="20">Control:</text>
    <text y="180" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">Estímulo heurístico</text>
    <text y="198" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">El modelo determina la estructura</text>

    <line x1="20" y1="215" x2="250" y2="215" stroke="#94a3b8" stroke-width="1" />

    <text y="240" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fdba74" x="20">Salida:</text>
    <rect x="20" y="250" width="230" height="70" rx="6" fill="#0f172a" stroke="#94a3b8" stroke-width="1" />
    <text y="270" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#fdba74" x="30">Paso 1: Analizar el carrito...</text>
    <text y="285" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#fdba74" x="30">Paso 2: Verificar márgenes...</text>
    <text y="300" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#fdba74" x="30">Por lo tanto, descuento del 15%.</text>

    <line x1="20" y1="335" x2="250" y2="335" stroke="#94a3b8" stroke-width="1" />

    <text y="360" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fdba74" x="20">Problemas:</text>
    <text y="380" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">⚠️ Salida de texto en prosa no estructurada</text>
    <text y="398" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">⚠️ Difícil de parsear de forma fiable</text>
    <text y="416" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">⚠️ Cantidad de pasos variable</text>
    <text y="434" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">⚠️ Uso excesivo de tokens</text>
  </g>

  <!-- Column 3: Schema-Guided Reasoning -->
  <g transform="translate(600, 70)">
    <rect x="0" y="0" width="270" height="460" rx="16" fill="#1e293b" stroke="#16a34a" stroke-width="3" filter="url(#shadow)" />

    <!-- Header -->
    <rect x="0" y="0" width="270" height="50" rx="16" fill="url(#sgrGrad)" />
    <rect x="0" y="35" width="270" height="15" fill="url(#sgrGrad)" />
    <text y="33" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#f8fafc" text-anchor="middle" x="135">📋 Guiado por esquema (SGR)</text>

    <!-- Content -->
    <text y="80" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#86efac" x="20">Enfoque:</text>
    <text y="100" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">El esquema de Pydantic define los pasos</text>
    <text y="118" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">La decodificación restringida impone</text>

    <line x1="20" y1="135" x2="250" y2="135" stroke="#94a3b8" stroke-width="1" />

    <text y="160" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#86efac" x="20">Control:</text>
    <text y="180" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">Aplicación basada en reglas gramaticales</text>
    <text y="198" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">El desarrollador define la topología</text>

    <line x1="20" y1="215" x2="250" y2="215" stroke="#94a3b8" stroke-width="1" />

    <text y="240" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#86efac" x="20">Salida:</text>
    <rect x="20" y="250" width="230" height="70" rx="6" fill="#0f172a" stroke="#94a3b8" stroke-width="1" />
    <text y="268" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#86efac" x="30">{"churn_analysis":"Alto",</text>
    <text y="282" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#86efac" x="30"> "margin_math":"$200*0.2=$40",</text>
    <text y="296" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#86efac" x="30"> "max_discount":15.0,</text>
    <text y="310" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#86efac" x="30"> "offer_code":"Ahorra15"</text>

    <line x1="20" y1="335" x2="250" y2="335" stroke="#94a3b8" stroke-width="1" />

    <text y="360" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#86efac" x="20">Ventajas:</text>
    <text y="380" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">✓ Salida estructurada al 100% válida</text>
    <text y="398" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">✓ Verificable campo por campo</text>
    <text y="416" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">✓ Funciona con modelos más pequeños</text>
    <text y="434" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">✓ No se requieren bucles de reintentos</text>
  </g>
</svg>
