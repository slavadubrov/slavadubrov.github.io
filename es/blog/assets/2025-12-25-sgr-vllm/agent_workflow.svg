<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Flujo de trabajo de precios con límites separados para el esquema y la política</title>
  <desc id="desc">Una solicitud pasa por un enrutamiento estructurado, la recuperación autorizada de características, una propuesta estructurada, la validación de políticas deterministas y una respuesta basada en plantillas. Las rutas de fallo conducen a un mecanismo de recuperación seguro.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="560" rx="22" fill="#0f172a" />
  <text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Agente de precios: límites de cumplimiento observables</text>

  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(25 125)"><rect width="150" height="110" rx="14" fill="#1e293b" stroke="#64748b" stroke-width="2" /><text x="75" y="43" text-anchor="middle" font-size="16" font-weight="700" fill="#f8fafc">Solicitud del usuario</text><text x="75" y="72" text-anchor="middle" font-size="12" fill="#94a3b8">entrada no fiable</text></g>
    <text x="202" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(230 125)"><rect width="150" height="110" rx="14" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="75" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Ruta</text><text x="75" y="62" text-anchor="middle" font-size="12" fill="#cbd5e1">unión discriminada</text><text x="75" y="85" text-anchor="middle" font-size="12" fill="#94a3b8">la forma está validada</text></g>
    <text x="407" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(435 125)"><rect width="150" height="110" rx="14" fill="#5b21b6" stroke="#2563eb" stroke-width="2" /><text x="75" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#c4b5fd">Recuperar</text><text x="75" y="62" text-anchor="middle" font-size="12" fill="#cbd5e1">identificador de usuario autorizado</text><text x="75" y="85" text-anchor="middle" font-size="12" fill="#94a3b8">cargar características en tiempo real</text></g>
    <text x="612" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(640 125)"><rect width="150" height="110" rx="14" fill="#9a3412" stroke="#ea580c" stroke-width="2" /><text x="75" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#fdba74">Propuesta</text><text x="75" y="62" text-anchor="middle" font-size="12" fill="#cbd5e1">escrito JSON schema</text><text x="75" y="85" text-anchor="middle" font-size="12" fill="#94a3b8">la forma está validada</text></g>
    <text x="817" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(845 125)"><rect width="130" height="110" rx="14" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="65" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Verificación de políticas</text><text x="65" y="62" text-anchor="middle" font-size="12" fill="#cbd5e1">límite dinámico</text><text x="65" y="85" text-anchor="middle" font-size="12" fill="#94a3b8">código obligatorio</text></g>

    <text x="910" y="286" text-anchor="middle" font-size="28" fill="#93c5fd">↓</text>
    <g transform="translate(785 315)"><rect width="190" height="90" rx="14" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="95" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Respuesta de plantilla</text><text x="95" y="64" text-anchor="middle" font-size="12" fill="#93c5fd">solo valores validados</text></g>

    <text x="620" y="459" text-anchor="end" font-size="13" fill="#fca5a5">cualquier cheque rechazado →</text>
    <g transform="translate(670 420)"><rect width="190" height="80" rx="14" fill="#991b1b" stroke="#dc2626" stroke-width="2" /><text x="95" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#fca5a5">Plan de seguridad alternativo</text><text x="95" y="59" text-anchor="middle" font-size="12" fill="#fca5a5">rechazar, volver a intentarlo o escalar la situación</text></g>
    <text x="500" y="535" text-anchor="middle" font-size="13" fill="#94a3b8">Los fallos en el esquema y los fallos en las políticas se gestionan de forma explícita; ninguno de ellos se convierte silenciosamente en una oferta.</text>
  </g>
</svg>
