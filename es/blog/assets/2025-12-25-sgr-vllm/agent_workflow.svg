<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Administrador de Descuentos SGR - Flujo de Trabajo del Agente</title>
  <desc id="artifact-desc">Administrador de Descuentos SGR - Flujo de Trabajo del Agente.</desc>
  <defs>
    <linearGradient id="phase1Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="phase2Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="phase3Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #166534;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
    <marker id="arrowCyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="900" height="520" fill="#0f172a" />

  <!-- Title -->
  <text y="35" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="bold" fill="#f8fafc" text-anchor="middle" x="450">Administrador de Descuentos SGR - Flujo de Trabajo del Agente</text>
  <text y="55" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#334155" text-anchor="middle" x="450">github.com/slavadubrov/sgr-discount-manager</text>

  <!-- User Input -->
  <g transform="translate(30, 90)">
    <rect x="0" y="0" width="130" height="80" rx="12" fill="#1e293b" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)" />
    <text y="25" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#f8fafc" text-anchor="middle" x="65">👤 Consulta del usuario</text>
    <rect x="10" y="35" width="110" height="35" rx="4" fill="#0f172a" />
    <text y="52" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#cbd5e1" text-anchor="middle" x="65">"Quiero un descuento"</text>
    <text y="64" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#cbd5e1" text-anchor="middle" x="65">¡O me voy!</text>
  </g>

  <!-- Arrow to Phase 1 -->
  <path d="M165,130 L195,130" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrowPurple)" />

  <!-- Phase 1: Routing -->
  <g transform="translate(200, 80)">
    <rect x="0" y="0" width="200" height="175" rx="14" fill="#1e293b" stroke="#2563eb" stroke-width="3" filter="url(#shadow)" />

    <!-- Phase header -->
    <rect x="0" y="0" width="200" height="45" rx="14" fill="url(#phase1Grad)" />
    <rect x="0" y="30" width="200" height="15" fill="url(#phase1Grad)" />
    <text y="22" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#f8fafc" text-anchor="middle" x="100">Fase 1: Enrutamiento</text>
    <text y="38" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#93c5fd" text-anchor="middle" x="100">EstructuraDelRuteador</text>

    <!-- LLM call -->
    <rect x="20" y="55" width="160" height="30" rx="6" fill="#7c3aed" stroke="#2563eb" stroke-width="1" />
    <text y="74" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#f8fafc" text-anchor="middle" x="100">🧠 vLLM + xgrammar</text>

    <!-- Decision -->
    <rect x="20" y="95" width="160" height="65" rx="6" fill="#0f172a" stroke="#94a3b8" stroke-width="1" />
    <text y="112" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#93c5fd" x="30">Acción: FeatureLookup</text>
    <text y="127" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#93c5fd" x="30">  herramienta: "fetch_user"</text>
    <text y="142" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#93c5fd" x="30">  user_id: "user_102"</text>
    <text y="155" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#93c5fd" x="30">  racional: "precios.."</text>
  </g>

  <!-- Arrow to Phase 2 -->
  <path d="M405,170 L435,170" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrowCyan)" />

  <!-- Phase 2: Context Retrieval -->
  <g transform="translate(440, 80)">
    <rect x="0" y="0" width="200" height="175" rx="14" fill="#1e293b" stroke="#2563eb" stroke-width="3" filter="url(#shadow)" />

    <!-- Phase header -->
    <rect x="0" y="0" width="200" height="45" rx="14" fill="url(#phase2Grad)" />
    <rect x="0" y="30" width="200" height="15" fill="url(#phase2Grad)" />
    <text y="22" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#f8fafc" text-anchor="middle" x="100">Fase 2: Contexto</text>
    <text y="38" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#93c5fd" text-anchor="middle" x="100">AlmacénHíbridoDeCaracterísticas</text>

    <!-- Hot store -->
    <rect x="15" y="55" width="80" height="50" rx="6" fill="#1d4ed8" stroke="#2563eb" stroke-width="1" />
    <text y="72" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#f8fafc" text-anchor="middle" x="55">🔥 SQLite</text>
    <text y="85" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#93c5fd" text-anchor="middle" x="55">valor_carta</text>
    <text y="97" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#93c5fd" text-anchor="middle" x="55">marco</text>

    <!-- Cold store -->
    <rect x="105" y="55" width="80" height="50" rx="6" fill="#1d4ed8" stroke="#2563eb" stroke-width="1" />
    <text y="72" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#f8fafc" text-anchor="middle" x="145">❄️ DuckDB</text>
    <text y="85" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#93c5fd" text-anchor="middle" x="145">Vida útil del cliente</text>
    <text y="97" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#93c5fd" text-anchor="middle" x="145">probabilidad_de_abandono</text>

    <!-- Retrieved context -->
    <rect x="15" y="115" width="170" height="45" rx="6" fill="#0f172a" stroke="#94a3b8" stroke-width="1" />
    <text y="132" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#93c5fd" x="25">LTV: $1,500 | Margen: 20%</text>
    <text y="147" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#93c5fd" x="25">Tasa de abandono: 0,75 | Carrito: $200</text>
  </g>

  <!-- Arrow to Phase 3 -->
  <path d="M645,170 L675,170" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrowGreen)" />

  <!-- Phase 3: Pricing Logic -->
  <g transform="translate(680, 80)">
    <rect x="0" y="0" width="200" height="175" rx="14" fill="#1e293b" stroke="#16a34a" stroke-width="3" filter="url(#shadow)" />

    <!-- Phase header -->
    <rect x="0" y="0" width="200" height="45" rx="14" fill="url(#phase3Grad)" />
    <rect x="0" y="30" width="200" height="15" fill="url(#phase3Grad)" />
    <text y="22" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#f8fafc" text-anchor="middle" x="100">Fase 3: Lógica SGR</text>
    <text y="38" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#86efac" text-anchor="middle" x="100">Estructura de lógica de precios</text>

    <!-- LLM call -->
    <rect x="20" y="55" width="160" height="30" rx="6" fill="#166534" stroke="#16a34a" stroke-width="1" />
    <text y="74" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#f8fafc" text-anchor="middle" x="100">🧠 vLLM + xgrammar</text>

    <!-- Output -->
    <rect x="15" y="95" width="170" height="65" rx="6" fill="#0f172a" stroke="#94a3b8" stroke-width="1" />
    <text y="110" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#86efac" x="25">análisis_de_abandono: "Alto"</text>
    <text y="123" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#86efac" x="25">margin_math: "$200*0.2=$40"</text>
    <text y="136" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#86efac" x="25">max_discount: 15.0</text>
    <text y="149" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#86efac" x="25">código_oferta: "SAVE15"</text>
  </g>

  <!-- Bottom: Schema definitions -->
  <g transform="translate(30, 280)">
    <rect x="0" y="0" width="420" height="210" rx="12" fill="#1e293b" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
    <text y="25" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#93c5fd" text-anchor="middle" x="210">Estructura del router (Fase 1)</text>

    <rect x="15" y="40" width="390" height="155" rx="6" fill="#0f172a" stroke="#94a3b8" stroke-width="1" />
    <text y="60" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#93c5fd" x="25">clase FeatureLookup(BaseModel):</text>
    <text y="77" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#93c5fd" x="25">    racional: str</text>
    <text y="94" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#93c5fd" x="25">    tool_name: Literal["obtener_características_usuario"]</text>
    <text y="111" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#93c5fd" x="25">    user_id: cadena de texto</text>
    <text y="135" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#93c5fd" x="25">clase GeneralResponse(BaseModel):</text>
    <text y="152" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#93c5fd" x="25">    nombre_herramienta: Literal["respond"]</text>
    <text y="169" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#93c5fd" x="25">    contenido: str</text>
    <text y="186" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#93c5fd" x="25">clase RouterSchema(BaseModel):</text>
    <text y="186" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#93c5fd" x="166">Acción: Unión[...]</text>
  </g>

  <g transform="translate(470, 280)">
    <rect x="0" y="0" width="410" height="210" rx="12" fill="#1e293b" stroke="#16a34a" stroke-width="2" filter="url(#shadow)" />
    <text y="25" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#86efac" text-anchor="middle" x="205">Lógica de precios (Fase 3)</text>

    <rect x="15" y="40" width="380" height="155" rx="6" fill="#0f172a" stroke="#94a3b8" stroke-width="1" />
    <text y="60" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#86efac" x="25">clase PricingLogic(BaseModel):</text>
    <text y="80" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#86efac" x="25">    # 1. Análisis de datos</text>
    <text y="97" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#86efac" x="25">    análisis_de_abandono: str</text>
    <text y="114" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#86efac" x="25">    análisis_financiero: str</text>
    <text y="131" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#86efac" x="25">    # 2. Aplicación de reglas matemáticas</text>
    <text y="148" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#86efac" x="25">    margin_math: cadena de texto</text>
    <text y="165" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#86efac" x="25">    max_discount_percent: número flotante</text>
    <text y="182" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#86efac" x="25">    # 3. Salida final</text>
    <text y="182" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#86efac" x="166">código_oferta, mensaje_cliente</text>
  </g>
</svg>
