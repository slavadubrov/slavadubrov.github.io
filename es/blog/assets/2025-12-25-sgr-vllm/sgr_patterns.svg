<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Patrones de esquema en cascada, de enrutamiento y de lista limitada</title>
  <desc id="desc">Tres tarjetas muestran una cascada de múltiples llamadas, una unión de enrutamiento discriminado y una lista con límites de cantidad de elementos, junto con la garantía y las limitaciones de cada patrón.</desc>
  <defs><marker id="arrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#93c5fd" /></marker></defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="520" rx="22" fill="#0f172a" />
  <text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Tres patrones guiados por esquema</text>

  <g transform="translate(25 85)">
    <rect width="300" height="390" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" />
    <text x="150" y="40" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="700" fill="#93c5fd">En cascada</text>
    <text x="150" y="68" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">Las llamadas independientes crean un límite real</text>
    <rect x="42" y="100" width="216" height="52" rx="9" fill="#1d4ed8" />
    <text x="150" y="131" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#93c5fd">Llamada A: CandidateEvidence</text>
    <path d="M150 157 V195" fill="none" stroke="#93c5fd" stroke-width="2" marker-end="url(#arrow)" />
    <text x="172" y="181" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">validar</text>
    <rect x="42" y="205" width="216" height="52" rx="9" fill="#1d4ed8" />
    <text x="150" y="236" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#93c5fd">Llamada B: CandidateDecision</text>
    <text x="24" y="299" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#93c5fd">Garantías</text>
    <text x="32" y="324" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#cbd5e1">B recibe la salida validada proveniente de A</text>
    <text x="24" y="353" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#fca5a5">No garantiza</text>
    <text x="32" y="378" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#cbd5e1">Cualquiera de las dos fases es técnicamente correcta</text>
  </g>

  <g transform="translate(350 85)">
    <rect width="300" height="390" rx="16" fill="#5b21b6" stroke="#2563eb" stroke-width="2" />
    <text x="150" y="40" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="700" fill="#c4b5fd">Enrutamiento</text>
    <text x="150" y="68" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">Un discriminador selecciona una forma</text>
    <rect x="65" y="98" width="170" height="48" rx="9" fill="#5b21b6" />
    <text x="150" y="127" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#93c5fd">nombre_herramienta</text>
    <path d="M125 147 L76 193" fill="none" stroke="#c4b5fd" stroke-width="2" />
    <path d="M175 147 L224 193" fill="none" stroke="#c4b5fd" stroke-width="2" />
    <rect x="25" y="195" width="115" height="62" rx="9" fill="#7c3aed" />
    <text x="82" y="220" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd">obtener características</text>
    <text x="82" y="241" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="11" fill="#c4b5fd">sin parámetros del modelo</text>
    <rect x="160" y="195" width="115" height="62" rx="9" fill="#7c3aed" />
    <text x="217" y="220" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd">responder</text>
    <text x="217" y="241" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="11" fill="#c4b5fd">contenido</text>
    <text x="24" y="299" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#c4b5fd">Garantías</text>
    <text x="32" y="324" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#cbd5e1">Exactamente una forma de ramificación válida</text>
    <text x="24" y="353" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#fca5a5">No garantiza</text>
    <text x="32" y="378" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#cbd5e1">La ruta seleccionada es adecuada</text>
  </g>

  <g transform="translate(675 85)">
    <rect width="300" height="390" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" />
    <text x="150" y="40" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="700" fill="#93c5fd">Lista acotada</text>
    <text x="150" y="68" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">Una colección contiene elementos tipados y límites definidos</text>
    <rect x="30" y="108" width="68" height="105" rx="9" fill="#1d4ed8" />
    <text x="64" y="147" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd">Riesgo 1</text>
    <text x="64" y="171" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#93c5fd">gravedad</text>
    <rect x="116" y="108" width="68" height="105" rx="9" fill="#1d4ed8" />
    <text x="150" y="166" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#93c5fd">…</text>
    <rect x="202" y="108" width="68" height="105" rx="9" fill="#1d4ed8" />
    <text x="236" y="147" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd">Riesgo N</text>
    <text x="236" y="171" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#93c5fd">2 ≤ N ≤ 4</text>
    <text x="24" y="299" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#93c5fd">Garantías</text>
    <text x="32" y="324" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#cbd5e1">Formas de los elementos y longitud de la lista</text>
    <text x="24" y="353" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#fca5a5">No garantiza</text>
    <text x="32" y="378" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#cbd5e1">Factores distintos o bien fundamentados</text>
  </g>
</svg>
