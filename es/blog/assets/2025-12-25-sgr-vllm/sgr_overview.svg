<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Resumen del razonamiento guiado por esquema (SGR)</title>
  <desc id="artifact-desc">Resumen del razonamiento guiado por esquema (SGR).</desc>
  <defs>
    <linearGradient id="schemaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #166534;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="llmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #ea580c;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #ea580c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="inputGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #2563eb;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
    <marker id="arrowPurple" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0,0 L12,4 L0,8 L3,4 Z" fill="#2563eb" />
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0,0 L12,4 L0,8 L3,4 Z" fill="#16a34a" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="900" height="500" fill="#0f172a" />

  <!-- Title -->
  <text y="40" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="bold" fill="#f8fafc" text-anchor="middle" x="450">Resumen del razonamiento guiado por esquema (SGR)</text>

  <!-- ==================== LEFT SIDE: INPUTS ==================== -->

  <!-- User Request Box -->
  <g transform="translate(40, 70)">
    <rect x="0" y="0" width="220" height="100" rx="12" fill="url(#inputGrad)" filter="url(#shadow)" />
    <text y="28" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#f8fafc" text-anchor="middle" x="110">💬 Solicitud del usuario</text>
    <rect x="12" y="40" width="196" height="48" rx="6" fill="#2563eb" />
    <text y="62" font-family="SFMono-Regular, Consolas, monospace" font-size="11" fill="#93c5fd" text-anchor="middle" x="110">"Por favor, ofrézcame un descuento."</text>
    <text y="78" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#93c5fd" text-anchor="middle" x="110">+ datos de contexto</text>
  </g>

  <!-- Pydantic Schema Box -->
  <g transform="translate(40, 190)">
    <rect x="0" y="0" width="220" height="180" rx="12" fill="url(#schemaGrad)" filter="url(#shadow)" />
    <text y="28" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#f8fafc" text-anchor="middle" x="110">📋 Esquema Pydantic</text>

    <rect x="12" y="42" width="196" height="125" rx="6" fill="#166534" stroke="#16a34a" stroke-width="1" />
    <text y="62" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#86efac" x="20">clase PricingLogic:</text>
    <text y="78" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#86efac" x="20">  análisis_de_abandono: str</text>
    <text y="94" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#86efac" x="20">  análisis_financiero: str</text>
    <text y="110" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#86efac" x="20">  margin_math: cadena de texto</text>
    <text y="126" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#86efac" x="20">  max_discount: número flotante</text>
    <text y="142" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#86efac" x="20">  código_oferta: str</text>
    <text y="158" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#86efac" x="20">  mensaje_del_cliente: str</text>
  </g>

  <!-- ==================== CENTER: vLLM + xgrammar ==================== -->

  <!-- Arrow from User Request to LLM -->
  <path d="M265,120 L320,120 L320,200 L360,200" stroke="#2563eb" stroke-width="3" fill="none" stroke-linecap="round" marker-end="url(#arrowPurple)" />

  <!-- Arrow from Schema to LLM -->
  <path d="M265,280 L320,280 L320,240 L360,240" stroke="#2563eb" stroke-width="3" fill="none" stroke-linecap="round" marker-end="url(#arrowPurple)" />

  <!-- LLM + xgrammar box -->
  <g transform="translate(370, 130)">
    <rect x="0" y="0" width="240" height="170" rx="12" fill="url(#llmGrad)" filter="url(#shadow)" />
    <text y="30" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#f8fafc" text-anchor="middle" x="120">🧠 vLLM + xgrammar</text>
    <text y="52" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#fdba74" text-anchor="middle" x="120">Decodificación restringida</text>

    <rect x="15" y="65" width="210" height="90" rx="8" fill="#9a3412" />
    <text y="88" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#fdba74" text-anchor="middle" x="120">1. Esquema → gramática JSON</text>
    <text y="108" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#fdba74" text-anchor="middle" x="120">2. Enmascaramiento a nivel de token</text>
    <text y="128" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#fdba74" text-anchor="middle" x="120">3. Impone una estructura válida</text>
    <text y="148" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#fdba74" text-anchor="middle" x="120">4. Garantiza salida en formato JSON</text>
  </g>

  <!-- ==================== RIGHT SIDE: OUTPUT ==================== -->

  <!-- Arrow from LLM to Output -->
  <path d="M615,215 L650,215" stroke="#16a34a" stroke-width="3" fill="none" stroke-linecap="round" marker-end="url(#arrowGreen)" />

  <!-- Structured Output Box -->
  <g transform="translate(660, 100)">
    <rect x="0" y="0" width="220" height="230" rx="12" fill="#1e293b" stroke="#16a34a" stroke-width="2" filter="url(#shadow)" />
    <text y="28" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#86efac" text-anchor="middle" x="110">✓ Salida estructurada</text>

    <rect x="12" y="42" width="196" height="175" rx="8" fill="#0f172a" stroke="#94a3b8" stroke-width="1" />
    <text y="62" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#cbd5e1" x="22">{}</text>
    <text y="80" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#86efac" x="22">  "análisis de abandono":</text>
    <text y="95" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#cbd5e1" x="30">"Alto valor, alto riesgo",</text>
    <text y="113" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#86efac" x="22">  "margen_matemático":</text>
    <text y="128" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#cbd5e1" x="30">"200 $ * 0,2 = 40 $",</text>
    <text y="146" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#86efac" x="22">  "descuento_máximo":</text>
    <text y="161" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#fdba74" x="30">15,0,</text>
    <text y="179" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#86efac" x="22">  "código_oferta":</text>
    <text y="194" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#cbd5e1" x="30">"GUARDAR15"</text>
    <text y="210" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#cbd5e1" x="22">}</text>
  </g>

  <!-- ==================== BOTTOM: KEY INSIGHT ==================== -->
  <g transform="translate(40, 400)">
    <rect x="0" y="0" width="820" height="75" rx="10" fill="#2563eb" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
    <text y="26" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#93c5fd" text-anchor="middle" x="410">💡 Idea clave: El esquema funciona como un andamio cognitivo; controla el orden del razonamiento y evita que se omitan pasos</text>
    <text y="52" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd" text-anchor="middle" x="410">El LLM debe completar cada campo en orden, obligando a un análisis paso a paso antes de llegar a una conclusión</text>
  </g>

  <!-- ==================== FLOW LABELS ==================== -->
  <text y="155" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#93c5fd" text-anchor="middle" x="300">entrada</text>
  <text y="315" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#93c5fd" text-anchor="middle" x="300">restringe</text>
  <text y="245" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#86efac" text-anchor="middle" x="635">genera</text>
</svg>
