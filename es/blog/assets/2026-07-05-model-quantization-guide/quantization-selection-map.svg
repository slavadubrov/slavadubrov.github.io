<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="720" viewBox="0 0 1120 720" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">How to choose a model quantization recipe</title>
  <desc id="desc">A decision map that routes workloads to W4A16, FP8 W8A8, INT8 W8A8, FP8 KV-cache quantization, GGUF, or bitsandbytes NF4.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#1d4ed8" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .card { fill: #ffffff; stroke: #2563eb; stroke-width: 1.4; filter: url(#shadow); }
      .start { fill: #eff6ff; stroke: #2563eb; }
      .memory { fill: #f0fdf4; stroke: #16a34a; }
      .compute { fill: #fff7ed; stroke: #ea580c; }
      .cache { fill: #faf5ff; stroke: #7c3aed; }
      .edge { fill: #fef2f2; stroke: #dc2626; }
      .title { font-style: normal; font-weight: 700; font-size: 24px; font-family: Inter, system-ui, sans-serif; fill: #0f172a; }
      .label { font-style: normal; font-weight: 700; font-size: 16px; font-family: Inter, system-ui, sans-serif; fill: #0f172a; }
      .text { font-style: normal; font-weight: 400; font-size: 14px; font-family: Inter, system-ui, sans-serif; fill: #334155; }
      .small { font-style: normal; font-weight: 400; font-size: 12px; font-family: Inter, system-ui, sans-serif; fill: #334155; }
      .mono { font-style: normal; font-weight: 400; font-size: 13px; font-family: SFMono-Regular, Consolas, monospace; fill: #0f172a; }
      .arrow { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect class="bg" width="1120" height="720"/>
  <text class="title" y="58" x="52">A practical recipe map</text>
  <text class="text" y="88" x="52">Choose for the workload first. Bit-width by itself does not tell you whether the runtime will get faster.</text>

  <rect class="card start" x="420" y="120" width="280" height="90" rx="8"/>
  <text class="label" y="154" x="454">What problem are you solving?</text>
  <text class="small" y="180" x="454">memory, throughput, context, edge, or fine-tuning</text>

  <path class="arrow" d="M420 165 C320 165 276 185 230 240"/>
  <path class="arrow" d="M560 210 C560 250 560 274 560 320"/>
  <path class="arrow" d="M700 165 C800 165 844 185 890 240"/>
  <path class="arrow" d="M468 210 C388 270 342 380 300 490"/>
  <path class="arrow" d="M652 210 C740 272 792 380 830 490"/>

  <rect class="card memory" x="70" y="250" width="300" height="190" rx="8"/>
  <text class="label" y="286" x="96">Fit a bigger LLM</text>
  <text class="text" y="318" x="96">Use GPTQ or AWQ W4A16.</text>
  <text class="text" y="342" x="96">Good for low-QPS decode,</text>
  <text class="text" y="366" x="96">single-stream chat, and</text>
  <text class="text" y="390" x="96">tight GPU memory.</text>
  <text class="mono" y="426" x="96">llm-compressor: W4A16</text>

  <rect class="card compute" x="410" y="330" width="300" height="190" rx="8"/>
  <text class="label" y="366" x="436">Increase throughput</text>
  <text class="text" y="398" x="436">Use W8A8. Prefer FP8 on</text>
  <text class="text" y="422" x="436">Ada, Hopper, and newer.</text>
  <text class="text" y="446" x="436">Use INT8 when hardware</text>
  <text class="text" y="470" x="436">or kernels fit that path.</text>
  <text class="mono" y="506" x="436">FP8 dynamic or SmoothQuant</text>

  <rect class="card cache" x="750" y="250" width="300" height="190" rx="8"/>
  <text class="label" y="286" x="776">Serve long context</text>
  <text class="text" y="318" x="776">Use KV-cache quantization.</text>
  <text class="text" y="342" x="776">This helps when context</text>
  <text class="text" y="366" x="776">length or concurrency</text>
  <text class="text" y="390" x="776">dominates VRAM.</text>
  <text class="mono" y="426" x="776">vLLM: --kv-cache-dtype fp8</text>

  <rect class="card edge" x="130" y="500" width="300" height="170" rx="8"/>
  <text class="label" y="536" x="156">Run local or edge</text>
  <text class="text" y="568" x="156">Use GGUF for llama.cpp,</text>
  <text class="text" y="592" x="156">Ollama, MLX, CPU, or</text>
  <text class="text" y="616" x="156">Apple Silicon targets.</text>
  <text class="mono" y="646" x="156">Q4_K_M or Q5_K_M</text>

  <rect class="card start" x="690" y="500" width="300" height="190" rx="8"/>
  <text class="label" y="536" x="716">Fine-tune cheaply</text>
  <text class="text" y="568" x="716">Use bitsandbytes NF4 for</text>
  <text class="text" y="592" x="716">QLoRA-style experiments.</text>
  <text class="text" y="616" x="716">Do not treat it as a clean</text>
  <text class="text" y="640" x="716">vLLM artifact by default.</text>
  <text class="mono" y="670" x="716">bnb NF4 + PEFT</text>
</svg>
