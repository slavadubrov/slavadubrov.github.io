<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="680" viewBox="0 0 1120 680" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Arquitectura de memoria de agente guiada por esquema</title>
  <desc id="desc">Un diagrama de flujo de dos vías. La vía superior muestra la fase de ingestión: flujo de episodios, extracción estructurada, validación y reconciliación, y posterior almacenamiento en SGAM. La vía inferior representa el procesamiento de solicitudes: pregunta del usuario, política de recuperación, búsqueda en el almacenamiento SGAM, y generación del contexto junto con la respuesta.</desc>
  <defs>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="132%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#334155" flood-opacity="0.08" />
    </filter>
    <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#7c3aed" />
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb" />
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#166534" />
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .lane { stroke: #2563eb; stroke-width: 2; rx: 8; }
      .laneTop { fill: #faf5ff; stroke: #7c3aed; }
      .laneBottom { fill: #eff6ff; stroke: #2563eb; }
      .box { stroke-width: 2; rx: 8; filter: url(#shadow); }
      .blue { fill: #eff6ff; stroke: #2563eb; }
      .purple { fill: #faf5ff; stroke: #7c3aed; }
      .green { fill: #f0fdf4; stroke: #166534; }
      .orange { fill: #fff7ed; stroke: #ea580c; }
      .red { fill: #fef2f2; stroke: #dc2626; }
      .title { font-style: normal; font-weight: 700; font-size: 24px; font-family: Inter, system-ui, sans-serif; fill: #1d4ed8; }
      .subtitle { font-style: normal; font-weight: 400; font-size: 14px; font-family: Inter, system-ui, sans-serif; fill: #334155; }
      .laneLabel { font-style: normal; font-weight: 700; font-size: 16px; font-family: Inter, system-ui, sans-serif; fill: #1d4ed8; }
      .label { font-style: normal; font-weight: 700; font-size: 16px; font-family: Inter, system-ui, sans-serif; fill: #1d4ed8; }
      .small { font-style: normal; font-weight: 400; font-size: 14px; font-family: Inter, system-ui, sans-serif; fill: #334155; }
      .tiny { font-style: normal; font-weight: 400; font-size: 12px; font-family: Inter, system-ui, sans-serif; fill: #334155; }
      .arrowWrite { stroke: #7c3aed; stroke-width: 3; fill: none; marker-end: url(#arrowPurple); }
      .arrowRead { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrowBlue); }
      .arrowReturn { stroke: #166534; stroke-width: 3; fill: none; marker-end: url(#arrowGreen); }
      .divider { stroke: #2563eb; stroke-width: 1.5; stroke-dasharray: 8 8; }
    </style>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect class="bg" x="0" y="0" width="1120" height="680" />
  <text class="title" y="48" x="42">SGAM cuenta con dos flujos, y no con uno único prompt</text>
  <text class="subtitle" y="76" x="42">La fase de ingestión escribe en la memoria estructurada. Las solicitudes leen el fragmento más pequeño, ya sea actual o histórico.</text>

  <rect class="lane laneTop" x="42" y="108" width="1036" height="224" />
  <rect class="lane laneBottom" x="42" y="372" width="1036" height="224" />

  <text class="laneLabel" y="139" x="66">1. Flujo de ingestión (ruta de escritura)</text>
  <line class="divider" x1="66" y1="154" x2="1054" y2="154" />
  <text class="laneLabel" y="403" x="66">2. Flujo de solicitud (ruta de lectura)</text>
  <line class="divider" x1="66" y1="418" x2="1054" y2="418" />

  <rect class="box blue" x="66" y="188" width="170" height="104" />
  <text class="label" y="222" x="88">flujo de episodios</text>
  <text class="small" y="250" x="88">mensajes, herramientas,</text>
  <text class="small" y="270" x="88">eventos de negocio</text>

  <rect class="box purple" x="276" y="178" width="190" height="124" />
  <text class="label" y="212" x="298">Estructurado</text>
  <text class="label" y="232" x="298">extracción</text>
  <text class="small" y="260" x="298">SGR / JSON schema</text>
  <text class="small" y="282" x="298">candidatos tipados</text>

  <rect class="box orange" x="506" y="178" width="120" height="124" />
  <text class="label" y="212" x="526">Validar</text>
  <text class="label" y="232" x="526">y fusionar</text>
  <text class="small" y="260" x="526">eliminar duplicados</text>
  <text class="small" y="282" x="526">válido_hasta</text>

  <rect class="box green" x="666" y="178" width="190" height="388" />
  <text class="label" y="212" x="690">almacén SGAM</text>
  <text class="small" y="242" x="690">identificador_de_inquilino</text>
  <text class="small" y="264" x="690">versión_del_esquema</text>
  <text class="small" y="286" x="690">fecha_de_inicio_válido / fecha_de_fin_válido</text>
  <text class="small" y="308" x="690">sustituye</text>
  <text class="small" y="330" x="690">identificador_de_episodio_fuente</text>
  <line x1="690" y1="354" x2="832" y2="354" stroke="#16a34a" stroke-width="1.5" />
  <text class="tiny" y="382" x="690">Escribe el terreno aquí</text>
  <text class="tiny" y="404" x="690">Se leen los valores de salida desde aquí</text>

  <rect class="box blue" x="66" y="452" width="170" height="104" />
  <text class="label" y="486" x="88">Pregunta del usuario</text>
  <text class="small" y="514" x="88">estado actual?</text>
  <text class="small" y="534" x="88">estado histórico?</text>

  <rect class="box purple" x="276" y="442" width="210" height="124" />
  <text class="label" y="476" x="298">Política de recuperación</text>
  <text class="small" y="504" x="298">filtro de inquilino + tipo</text>
  <text class="small" y="526" x="298">rebanada de tiempo activa</text>
  <text class="small" y="548" x="298">expansión vectorial opcional</text>

  <rect class="box red" x="884" y="442" width="170" height="124" />
  <text class="label" y="476" x="906">Contexto + respuesta</text>
  <text class="small" y="504" x="906">hechos citados de menor importancia</text>
  <text class="small" y="526" x="906">evidencia de origen</text>
  <text class="small" y="548" x="906">sin descarga de notas obsoletas</text>

  <path class="arrowWrite" d="M236 240 H264" />
  <path class="arrowWrite" d="M466 240 H494" />
  <path class="arrowWrite" d="M626 240 H654" />

  <path class="arrowRead" d="M236 504 H264" />
  <path class="arrowRead" d="M486 504 H654" />
  <path class="arrowReturn" d="M856 504 H884" />

  <text class="tiny" y="624" x="42">Invariante: las operaciones de escritura estructurada y las lecturas con ámbito definido son responsabilidades independientes. La búsqueda vectorial puede ayudar en la recuperación, pero no debe decidir cuál hecho mutable es el actual.</text>
</svg>
