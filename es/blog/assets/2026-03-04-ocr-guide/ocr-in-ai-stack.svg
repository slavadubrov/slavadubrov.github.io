<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" font-family="Inter, system-ui, sans-serif'Segoe UI', Roboto, Helvetica, Arial, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">OCR en la pila de IA moderna</title>
  <desc id="artifact-desc">OCR en la pila de IA moderna.</desc>
  <!-- Background -->
  <rect width="920" height="420" fill="#f8fafc" rx="8" />
  <defs>
    <!-- Background grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width="1" />
    </pattern>

    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>

    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="gradOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ea580c" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <linearGradient id="gradPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="gradGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16a34a" />
      <stop offset="100%" stop-color="#166534" />
    </linearGradient>

    <!-- Arrow markers -->
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" />
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ea580c" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="100%" height="100%" fill="#f8fafc" />

  <!-- Title -->
  <text y="32" font-size="20" font-weight="bold" fill="#1d4ed8" text-anchor="middle" x="460">OCR en la pila de IA moderna</text>
  <text y="52" font-size="13" fill="#64748b" text-anchor="middle" x="460">De documentos en bruto a información valiosa impulsada por IA</text>

  <!-- ==================== LEFT: Document Sources ==================== -->
  <g transform="translate(30, 80)">
    <!-- Section header -->
    <rect width="200" height="32" rx="6" fill="url(#gradBlue)" />
    <text y="21" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle" x="100">Fuentes de documentos</text>

    <!-- Cards -->
    <rect y="42" width="200" height="50" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)" />
    <text y="63" font-size="22" x="36">📄</text>
    <text y="63" font-size="12" font-weight="600" fill="#1d4ed8" x="68">PDF y documentos Word</text>
    <text y="80" font-size="10" fill="#64748b" x="68">Contratos, informes, manuales</text>

    <rect y="102" width="200" height="50" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)" />
    <text y="123" font-size="22" x="36">🖼️</text>
    <text y="123" font-size="12" font-weight="600" fill="#1d4ed8" x="68">Documentos escaneados</text>
    <text y="140" font-size="10" fill="#64748b" x="68">Facturas, recibos, formularios</text>

    <rect y="162" width="200" height="50" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)" />
    <text y="183" font-size="22" x="36">📸</text>
    <text y="183" font-size="12" font-weight="600" fill="#1d4ed8" x="68">Fotos y capturas de pantalla</text>
    <text y="200" font-size="10" fill="#64748b" x="68">pizarras blancas, señales, interfaz de usuario</text>

    <rect y="222" width="200" height="50" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)" />
    <text y="243" font-size="22" x="36">📧</text>
    <text y="243" font-size="12" font-weight="600" fill="#1d4ed8" x="68">Correos electrónicos y archivos adjuntos</text>
    <text y="260" font-size="10" fill="#64748b" x="68">Imágenes incrustadas, PDFs</text>
  </g>

  <!-- ==================== CENTER: OCR Layer ==================== -->
  <g transform="translate(310, 80)">
    <!-- Section header -->
    <rect width="300" height="32" rx="6" fill="url(#gradOrange)" />
    <text y="21" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle" x="150">Capa de OCR: El puente</text>

    <!-- Main box -->
    <rect y="42" width="300" height="230" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadow)" />

    <!-- Text extraction -->
    <text y="72" font-size="13" font-weight="bold" fill="#9a3412" text-anchor="middle" x="150">Extracción de texto y estructura</text>

    <rect x="20" y="86" width="120" height="36" rx="5" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
    <text y="100" font-size="10" font-weight="600" fill="#1d4ed8" text-anchor="middle" x="80">OCR tradicional</text>
    <text y="114" font-size="9" fill="#64748b" text-anchor="middle" x="80">Tesseract, PaddleOCR</text>

    <rect x="160" y="86" width="120" height="36" rx="5" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
    <text y="100" font-size="10" font-weight="600" fill="#1d4ed8" text-anchor="middle" x="220">Modelos de lenguaje grandes</text>
    <text y="114" font-size="9" fill="#64748b" text-anchor="middle" x="220">Gemini, Claude, GPT</text>

    <rect x="20" y="132" width="120" height="36" rx="5" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
    <text y="146" font-size="10" font-weight="600" fill="#1d4ed8" text-anchor="middle" x="80">Modelos especializados</text>
    <text y="160" font-size="9" fill="#64748b" text-anchor="middle" x="80">dots.ocr, Qwen3-VL</text>

    <rect x="160" y="132" width="120" height="36" rx="5" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
    <text y="146" font-size="10" font-weight="600" fill="#1d4ed8" text-anchor="middle" x="220">Análisis de layout</text>
    <text y="160" font-size="9" fill="#64748b" text-anchor="middle" x="220">Tablas, encabezados, listas</text>

    <!-- Output arrow label -->
    <line x1="150" y1="180" x2="150" y2="210" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)" />
    <rect x="55" y="215" width="190" height="44" rx="6" fill="#ea580c" opacity="0.12" />
    <text y="234" font-size="11" font-weight="bold" fill="#9a3412" text-anchor="middle" x="150">Salida: texto limpio, tablas.</text>
    <text y="250" font-size="11" font-weight="bold" fill="#9a3412" text-anchor="middle" x="150">estructura y metadatos</text>
  </g>

  <!-- ==================== RIGHT: AI Consumers ==================== -->
  <g transform="translate(690, 80)">
    <!-- Section header -->
    <rect width="200" height="32" rx="6" fill="url(#gradPurple)" />
    <text y="21" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle" x="100">Consumidores de IA</text>

    <!-- RAG Pipeline -->
    <rect y="42" width="200" height="70" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)" />
    <text y="63" font-size="12" font-weight="bold" fill="#5b21b6" text-anchor="middle" x="100">Pipeline de RAG</text>
    <text y="80" font-size="9" fill="#64748b" text-anchor="middle" x="100">Trozo → Incrustar → Base de datos vectorial</text>
    <text y="94" font-size="9" fill="#64748b" text-anchor="middle" x="100">→ Obtener → Respuesta del LLM</text>

    <!-- AI Agents -->
    <rect y="122" width="200" height="56" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)" />
    <text y="143" font-size="12" font-weight="bold" fill="#5b21b6" text-anchor="middle" x="100">Agentes de IA</text>
    <text y="160" font-size="9" fill="#64748b" text-anchor="middle" x="100">Lectura de documentos, llenado de formularios</text>

    <!-- Enterprise QA -->
    <rect y="188" width="200" height="56" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)" />
    <text y="209" font-size="12" font-weight="bold" fill="#5b21b6" text-anchor="middle" x="100">QA empresarial</text>
    <text y="226" font-size="9" fill="#64748b" text-anchor="middle" x="100" transform="translate(-4.58 0.00)">Búsqueda de contratos, cumplimiento normativo, bases de conocimientos</text>

    <!-- Domain Apps -->
    <rect y="254" width="200" height="56" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)" />
    <text y="275" font-size="12" font-weight="bold" fill="#5b21b6" text-anchor="middle" x="100">Aplicaciones en el dominio</text>
    <text y="292" font-size="9" fill="#64748b" text-anchor="middle" x="100">Médico, legal, financiero</text>
  </g>

  <!-- ==================== Arrows: Sources → OCR ==================== -->
  <line x1="230" y1="200" x2="305" y2="200" stroke="#2563eb" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-blue)" />

  <!-- ==================== Arrows: OCR → Consumers ==================== -->
  <line x1="610" y1="200" x2="685" y2="200" stroke="#7c3aed" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-gray)" />

  <!-- ==================== Bottom callout ==================== -->
  <g transform="translate(230, 365)">
    <rect width="460" height="40" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1" />
    <text y="17" font-size="11" font-weight="bold" fill="#9a3412" text-anchor="middle" x="230">⚠️ La calidad del OCR es el límite máximo para la calidad de las aplicaciones de IA posteriores</text>
    <text y="33" font-size="10" fill="#64748b" text-anchor="middle" x="230">Texto corrupto en entrada → respuestas corruptas en salida. Ningún modelo de embeddings ni prompt puede corregir una extracción defectuosa.</text>
  </g>
</svg>
