<svg xmlns="http://www.w3.org/2000/svg" width="640" height="850" viewBox="0 0 640 850" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Enrutamiento de un cambio de comportamiento a través de un manual harness</title>
  <desc id="desc">Un flujo vertical de cinco etapas. Una solicitud que solo contiene información de comportamiento se enruta a través de la jerarquía del manual. Se verifican las posibles ubicaciones de origen contra el repositorio actual antes de aplicar un plan. Una diferencia no nula vuelve a sincronizar las entradas afectadas del manual para la siguiente solicitud.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a" />
    </marker>
  </defs>
  <rect width="640" height="850" fill="#f8fafc" />
  <rect x="20" y="18" width="600" height="814" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />

  <text x="48" y="62" font-size="25" font-weight="700" fill="#0f172a">Del comportamiento al plan de edición verificado</text>
  <text x="48" y="91" font-size="15" fill="#64748b">La guía dirige la búsqueda. El repositorio en tiempo real es la fuente de autoridad.</text>

  <rect x="38" y="120" width="564" height="612" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="7 6" />
  <text x="60" y="151" font-size="14" font-weight="700" fill="#1d4ed8">BUCLE DE MODIFICACIÓN GUIADO POR MANUAL</text>

  <rect x="60" y="176" width="520" height="78" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" />
  <text x="82" y="207" font-size="17" font-weight="700" fill="#334155">1. Recibir una solicitud exclusiva de comportamiento</text>
  <text x="82" y="232" font-size="14" fill="#334155">“Ocultar secretos en cada ruta de captura” no hace referencia a ninguna ubicación de código</text>

  <line x1="320" y1="254" x2="320" y2="280" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)" />

  <rect x="60" y="288" width="520" height="88" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" />
  <text x="82" y="319" font-size="17" font-weight="700" fill="#1d4ed8">2. Enrutar la búsqueda</text>
  <text x="82" y="344" font-size="14" fill="#334155">Visión general del sistema → página de etapas → entradas basadas en fuente y contexto</text>
  <text x="82" y="365" font-size="14" fill="#334155">Leer el registro de estado cuando el comportamiento atraviese las etapas</text>

  <line x1="320" y1="376" x2="320" y2="402" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)" />

  <rect x="60" y="410" width="520" height="88" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" />
  <text x="82" y="441" font-size="17" font-weight="700" fill="#9a3412">3. Verificar cada localizador</text>
  <text x="82" y="466" font-size="14" fill="#334155">Resolver cada función o archivo candidato en el repositorio actual</text>
  <text x="82" y="487" font-size="14" fill="#334155">Congelar las entradas obsoletas en lugar de crear una sustitución</text>

  <line x1="320" y1="498" x2="320" y2="524" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)" />

  <rect x="60" y="532" width="520" height="78" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" />
  <text x="82" y="563" font-size="17" font-weight="700" fill="#1d4ed8">4. Planificar e implementar el cambio</text>
  <text x="82" y="588" font-size="14" fill="#334155">El planificador nombra las ubicaciones de edición; el ejecutor modifica los archivos</text>

  <line x1="320" y1="610" x2="320" y2="636" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)" />

  <rect x="60" y="644" width="520" height="68" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" />
  <text x="82" y="674" font-size="17" font-weight="700" fill="#166534">5. Resincronizar las entradas afectadas</text>
  <text x="82" y="698" font-size="14" fill="#334155">Cada actualización de diferencias que no esté vacía vuelve a cargar el mapa antes de la siguiente solicitud</text>

  <path d="M 590 678 L 608 678 L 608 332 L 590 332" fill="none" stroke="#16a34a" stroke-width="2" stroke-dasharray="7 6" marker-end="url(#arrow-green)" />
  <text x="320" y="784" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">Localice cada sitio de implementación antes de planificar la edición</text>
</svg>
