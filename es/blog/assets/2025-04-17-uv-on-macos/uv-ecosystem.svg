<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Cuatro límites de flujo de trabajo UV</title><desc id="desc">Python gestionado, proyectos, scripts y herramientas CLI son cuatro ciclos de vida independientes administrados por uv. Las bibliotecas y aplicaciones host permanecen fuera de uv, bajo la gestión de un gestor de paquetes del sistema.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="650" rx="28" fill="#0f172a" />
  <text x="600" y="64" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Un ejecutable, ciclos de vida independientes</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(70 140)"><rect width="500" height="180" rx="20" fill="#1d4ed8" /><text x="30" y="47" fill="#93c5fd" font-size="23" font-weight="700">Python gestionado</text><text x="30" y="86" fill="#93c5fd" font-size="17">instalación de uv en Python / fijación de versión / lista de versiones</text><text x="30" y="123" fill="#93c5fd" font-size="15">distribuciones de interpretador en el directorio de datos UV</text><text x="30" y="151" fill="#93c5fd" font-size="15">descubrible junto a intérpretes externos</text></g>
    <g transform="translate(630 140)"><rect width="500" height="180" rx="20" fill="#5b21b6" /><text x="30" y="47" fill="#93c5fd" font-size="23" font-weight="700">Proyecto</text><text x="30" y="86" fill="#93c5fd" font-size="17">pyproject.toml + uv.lock → entorno virtual</text><text x="30" y="123" fill="#c4b5fd" font-size="15">declaraciones compartidas y resolución</text><text x="30" y="151" fill="#c4b5fd" font-size="15">entorno instalado desechable</text></g>
    <g transform="translate(70 365)"><rect width="500" height="180" rx="20" fill="#9a3412" /><text x="30" y="47" fill="#fdba74" font-size="23" font-weight="700">script PEP 723</text><text x="30" y="86" fill="#fdba74" font-size="17">metadatos en línea + bloqueo adyacente opcional</text><text x="30" y="123" fill="#fdba74" font-size="15">unidad de lanzamiento de un solo archivo</text><text x="30" y="151" fill="#fdba74" font-size="15">entorno de ejecución en caché aislado</text></g>
    <g transform="translate(630 365)"><rect width="500" height="180" rx="20" fill="#166534" /><text x="30" y="47" fill="#93c5fd" font-size="23" font-weight="700">herramienta CLI</text><text x="30" y="86" fill="#93c5fd" font-size="17">cache UVX o entorno de herramientas persistente</text><text x="30" y="123" fill="#93c5fd" font-size="15">aislado de las importaciones del proyecto</text><text x="30" y="151" fill="#93c5fd" font-size="15">La exposición de PATH solo ocurre cuando se instala intencionadamente</text></g>
    <rect x="250" y="585" width="700" height="42" rx="14" fill="#1e293b" /><text x="600" y="612" text-anchor="middle" fill="#cbd5e1" font-size="16">Homebrew o macOS siguen siendo responsables de las aplicaciones del sistema y las bibliotecas nativas.</text>
  </g>
</svg>
