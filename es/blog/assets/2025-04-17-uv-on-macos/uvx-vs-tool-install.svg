<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 590" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Elegir la ejecución UV, UVX o la instalación de la herramienta UV</title><desc id="desc">Tres columnas dirigen las herramientas vinculadas al proyecto hacia uv run, las herramientas aisladas ad hoc hacia uvx, y los ejecutables que deben permanecer en PATH hacia la instalación de la herramienta uv.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="590" rx="28" fill="#0f172a" />
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Elija un entorno de herramientas según lo que debe procesar</text>
  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <g transform="translate(55 135)"><rect width="340" height="340" rx="22" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="170" y="52" fill="#93c5fd" font-size="23" font-weight="700">ejecución UV</text><text x="170" y="92" fill="#93c5fd" font-size="17">acoplado al proyecto</text><text x="170" y="145" fill="#e2e8f0" font-size="15">importa el código del proyecto</text><text x="170" y="178" fill="#e2e8f0" font-size="15">utiliza grupos bloqueados y complementos</text><text x="170" y="211" fill="#e2e8f0" font-size="15">el ciclo de vida sigue al repositorio</text><rect x="35" y="260" width="270" height="50" rx="12" fill="#1d4ed8" /><text x="170" y="291" fill="#93c5fd" font-size="15">uv ejecutar --grupo prueba pytest</text></g>
    <g transform="translate(430 135)"><rect width="340" height="340" rx="22" fill="#5b21b6" /><text x="170" y="52" fill="#93c5fd" font-size="23" font-weight="700">uvx</text><text x="170" y="92" fill="#c4b5fd" font-size="17">ad hoc e aislado</text><text x="170" y="145" fill="#e2e8f0" font-size="15">no detecta las importaciones de proyectos</text><text x="170" y="178" fill="#e2e8f0" font-size="15">el entorno se almacena en caché</text><text x="170" y="211" fill="#e2e8f0" font-size="15">versión de pin para garantizar repetibilidad</text><rect x="35" y="260" width="270" height="50" rx="12" fill="#5b21b6" /><text x="170" y="291" fill="#93c5fd" font-size="15">uvx ruff@0.12.0 verificar .</text></g>
    <g transform="translate(805 135)"><rect width="340" height="340" rx="22" fill="#166534" /><text x="170" y="52" fill="#93c5fd" font-size="23" font-weight="700">instalación de la herramienta UV</text><text x="170" y="92" fill="#93c5fd" font-size="17">persistente + en la ruta</text><text x="170" y="145" fill="#e2e8f0" font-size="15">entorno de herramientas dedicado</text><text x="170" y="178" fill="#e2e8f0" font-size="15">disponible para otros programas</text><text x="170" y="211" fill="#e2e8f0" font-size="15">ciclo de vida de actualización explícita</text><rect x="35" y="260" width="270" height="50" rx="12" fill="#166534" /><text x="170" y="291" fill="#86efac" font-size="15">Instalar la herramienta uv con la orden 'ruff==0.12.0'</text></g>
    <rect x="245" y="515" width="710" height="42" rx="14" fill="#1e293b" /><text x="600" y="542" fill="#cbd5e1" font-size="16">El aislamiento es una funcionalidad; elige la visibilidad del proyecto de forma intencionada.</text>
  </g>
</svg>
