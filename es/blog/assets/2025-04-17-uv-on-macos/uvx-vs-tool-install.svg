<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Dos formas de ejecutar una herramienta</title>
  <desc id="artifact-desc">Dos formas de ejecutar una herramienta.</desc>
  <defs>
    <filter id="shadow3" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="100%" height="100%" fill="#f8fafc" /><rect width="800" height="380" fill="#0f172a" rx="12" ry="12" />

  <text y="44" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="bold" fill="#f8fafc" text-anchor="middle" x="400">Dos formas de ejecutar una herramienta</text>
  <text y="70" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#93c5fd" text-anchor="middle" x="400">Ejecútelo una vez o guárdelo en su PATH.</text>

  <!-- uvx card -->
  <rect x="50" y="100" width="330" height="240" rx="10" fill="#1e293b" stroke="#2563eb" stroke-width="2" filter="url(#shadow3)" />
  <text y="138" font-family="SFMono-Regular, Consolas, monospace" font-size="18" font-weight="bold" fill="#93c5fd" text-anchor="middle" x="215">Verificación de UVX ruff.</text>
  <text y="162" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#93c5fd" text-anchor="middle" x="215">Ejecución de la herramienta UV: temporal</text>

  <g font-family="Inter, system-ui, sans-serif" font-size="13" fill="#eff6ff">
    <text y="200" x="80">• Entorno temporal en caché</text>
    <text y="226" x="80">• No se ha añadido nada al PATH</text>
    <text y="252" x="80">• Siempre obtiene la versión que se solicita</text>
    <text y="278" x="80">• Ideal para CI y ejecuciones puntuales</text>
  </g>
  <text y="318" font-family="SFMono-Regular, Consolas, monospace" font-size="12" fill="#86efac" text-anchor="middle" x="215">uvx ruff@0.6.0 / uvx --con opción click mytool</text>

  <!-- tool install card -->
  <rect x="420" y="100" width="330" height="240" rx="10" fill="#1e293b" stroke="#2563eb" stroke-width="2" filter="url(#shadow3)" />
  <text y="138" font-family="SFMono-Regular, Consolas, monospace" font-size="17" font-weight="bold" fill="#93c5fd" text-anchor="middle" x="585">Instalar la herramienta UV con Ruff</text>
  <text y="162" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#93c5fd" text-anchor="middle" x="585">persistente: en tu PATH</text>

  <g font-family="Inter, system-ui, sans-serif" font-size="13" fill="#eff6ff">
    <text y="200" x="450">• Instalado una vez, entorno aislado</text>
    <text y="226" x="450">• Llámelo directamente: simplemente `ruff`</text>
    <text y="252" x="450" transform="translate(-80.90 0.00)">• Actualización de la herramienta UV: --all para realizar la actualización</text>
    <text y="278" x="450">• Ideal para herramientas de uso diario.</text>
  </g>
  <text y="318" font-family="SFMono-Regular, Consolas, monospace" font-size="12" fill="#fdba74" text-anchor="middle" x="585" transform="translate(-2.97 0.00)">Lista de herramientas UV / Desinstalación de herramientas UV</text>
</svg>
