<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 610" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Flujo de trabajo de escalado distribuido basado en restricciones</title>
  <desc id="desc">El flujo de trabajo perfila una carga de trabajo, clasifica la restricción de enlace, asigna su conjunto requerido a la topología del hardware, genera mallas paralelas válidas y diseños completos benchmarks.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#94a3b8" /></marker></defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="610" rx="28" fill="#0f172a" />
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Partir del cuello de botella medido</text>
  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <rect x="65" y="145" width="190" height="120" rx="18" fill="#1d4ed8" /><text x="160" y="188" fill="#93c5fd" font-size="19" font-weight="700">1. Perfil</text><text x="160" y="220" fill="#93c5fd" font-size="14">memoria • núcleos</text><text x="160" y="244" fill="#93c5fd" font-size="14">colectivos • puestos</text>
    <path d="M265 205 H300" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <rect x="310" y="145" width="190" height="120" rx="18" fill="#5b21b6" /><text x="405" y="188" fill="#93c5fd" font-size="19" font-weight="700">2. Clasificar</text><text x="405" y="220" fill="#c4b5fd" font-size="14">estado • activación</text><text x="405" y="244" fill="#c4b5fd" font-size="14">computación • tráfico</text>
    <path d="M510 205 H545" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <rect x="555" y="145" width="190" height="120" rx="18" fill="#9a3412" /><text x="650" y="188" fill="#fdba74" font-size="19" font-weight="700">3. Mapa</text><text x="650" y="220" fill="#fdba74" font-size="14">frecuencia colectiva</text><text x="650" y="244" fill="#fdba74" font-size="14">para vincular la topología</text>
    <path d="M755 205 H790" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <rect x="800" y="145" width="190" height="120" rx="18" fill="#1d4ed8" /><text x="895" y="188" fill="#93c5fd" font-size="19" font-weight="700">4. Generar</text><text x="895" y="220" fill="#93c5fd" font-size="14">DP válido × TP válido × PP válido</text><text x="895" y="244" fill="#93c5fd" font-size="14">mallas × CP × EP</text>
    <path d="M1000 205 H1035" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <rect x="1045" y="145" width="120" height="120" rx="18" fill="#166534" /><text x="1105" y="188" fill="#93c5fd" font-size="18" font-weight="700">5. Ejecutar</text><text x="1105" y="220" fill="#93c5fd" font-size="14">tarea completa</text><text x="1105" y="244" fill="#93c5fd" font-size="14">verificación de paridad</text>

    <text x="600" y="340" fill="#e2e8f0" font-size="19" font-weight="700">Restricción → dimensión candidata</text>
    <g font-size="15"><rect x="85" y="375" width="195" height="72" rx="15" fill="#1e293b" /><text x="182" y="405" fill="#cbd5e1">La réplica encaja, se necesita ancho de banda.</text><text x="182" y="430" fill="#93c5fd">DP replicado</text><rect x="295" y="375" width="195" height="72" rx="15" fill="#1e293b" /><text x="392" y="405" fill="#cbd5e1">estado del modelo</text><text x="392" y="430" fill="#c4b5fd">FSDP / ZeRO</text><rect x="505" y="375" width="195" height="72" rx="15" fill="#1e293b" /><text x="602" y="405" fill="#cbd5e1">matemáticas de capas</text><text x="602" y="430" fill="#fdba74">TP</text><rect x="715" y="375" width="195" height="72" rx="15" fill="#1e293b" /><text x="812" y="405" fill="#cbd5e1">posicionamiento por profundidad</text><text x="812" y="430" fill="#93c5fd">PP</text><rect x="925" y="375" width="195" height="72" rx="15" fill="#1e293b" /><text x="1022" y="405" fill="#cbd5e1">secuencia / expertos</text><text x="1022" y="430" fill="#93c5fd">CP / EP</text></g>
    <rect x="250" y="500" width="700" height="65" rx="16" fill="#991b1b" /><text x="600" y="540" fill="#fca5a5" font-size="17" font-weight="700">Una heurística propone mallas; únicamente los diseños medidos seleccionan al ganador.</text>
  </g>
</svg>
