<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Entrenamiento paralelo con datos replicados</title><desc id="desc">Cada uno de los cuatro rangos alberga una réplica completa de entrenamiento y procesa un micro-lote diferente. Sus contenedores de gradiente pasan por una operación de all-reduce antes de que se ejecuten los pasos del optimizador de forma idéntica.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="540" rx="28" fill="#0f172a" />
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Reproducir estado, dividir el lote</text>
  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <g transform="translate(55 135)"><rect width="245" height="210" rx="20" fill="#1d4ed8" /><text x="122" y="42" fill="#93c5fd" font-size="19" font-weight="700">Rango 0</text><rect x="25" y="65" width="195" height="55" rx="12" fill="#1d4ed8" /><text x="122" y="99" fill="#93c5fd" font-size="15">micro-lote A</text><rect x="25" y="135" width="195" height="50" rx="12" fill="#5b21b6" /><text x="122" y="166" fill="#93c5fd" font-size="15">estado de entrenamiento completo</text></g>
    <g transform="translate(335 135)"><rect width="245" height="210" rx="20" fill="#1d4ed8" /><text x="122" y="42" fill="#93c5fd" font-size="19" font-weight="700">Rango 1</text><rect x="25" y="65" width="195" height="55" rx="12" fill="#1d4ed8" /><text x="122" y="99" fill="#93c5fd" font-size="15">micro-lote B</text><rect x="25" y="135" width="195" height="50" rx="12" fill="#5b21b6" /><text x="122" y="166" fill="#93c5fd" font-size="15">estado de entrenamiento completo</text></g>
    <g transform="translate(615 135)"><rect width="245" height="210" rx="20" fill="#1d4ed8" /><text x="122" y="42" fill="#93c5fd" font-size="19" font-weight="700">Rango 2</text><rect x="25" y="65" width="195" height="55" rx="12" fill="#1d4ed8" /><text x="122" y="99" fill="#93c5fd" font-size="15">micro-lote C</text><rect x="25" y="135" width="195" height="50" rx="12" fill="#5b21b6" /><text x="122" y="166" fill="#93c5fd" font-size="15">estado de entrenamiento completo</text></g>
    <g transform="translate(895 135)"><rect width="245" height="210" rx="20" fill="#1d4ed8" /><text x="122" y="42" fill="#93c5fd" font-size="19" font-weight="700">Rango 3</text><rect x="25" y="65" width="195" height="55" rx="12" fill="#1d4ed8" /><text x="122" y="99" fill="#93c5fd" font-size="15">micro-lote D</text><rect x="25" y="135" width="195" height="50" rx="12" fill="#5b21b6" /><text x="122" y="166" fill="#93c5fd" font-size="15">estado de entrenamiento completo</text></g>
    <path d="M175 355 V405 H1020 V355 M455 355 V405 M735 355 V405" stroke="#94a3b8" stroke-width="3" fill="none" />
    <rect x="350" y="405" width="500" height="82" rx="17" fill="#166534" /><text x="600" y="438" fill="#93c5fd" font-size="19" font-weight="700">Reducción global por gradiente</text><text x="600" y="467" fill="#93c5fd" font-size="14">misma actualización, sin alivio en la memoria de estado del modelo</text>
