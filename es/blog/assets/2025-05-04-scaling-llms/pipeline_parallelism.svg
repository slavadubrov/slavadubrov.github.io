<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 570" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Pipeline-etapas paralelas y microlotes</title><desc id="desc">Cuatro etapas albergan diferentes grupos de capas. Tres micro-lotes se desplazan en diagonal a lo largo del tiempo, generando burbujas de inicio y de finalización, y evidenciando la necesidad de equilibrar el tiempo de ejecución de cada etapa.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="570" rx="28" fill="#0f172a" />
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Profundidad de partición, y a continuación programar micro-lotes</text>
  <g font-family="Inter, system-ui, sans-serif">
    <text x="90" y="130" fill="#94a3b8" font-size="16">etapa</text><text x="1090" y="130" fill="#94a3b8" font-size="16">tiempo →</text>
    <g font-size="16" font-weight="700"><text x="110" y="205" fill="#93c5fd">S0</text><text x="110" y="285" fill="#93c5fd">S1</text><text x="110" y="365" fill="#fdba74">S2</text><text x="110" y="445" fill="#93c5fd">S3</text></g>
    <g stroke="#334155" stroke-width="1"><path d="M160 165 H1110 M160 245 H1110 M160 325 H1110 M160 405 H1110 M160 485 H1110" /></g>
    <g font-size="15" text-anchor="middle" font-weight="700">
      <g fill="#1d4ed8"><rect x="180" y="175" width="130" height="55" rx="10" /><rect x="330" y="175" width="130" height="55" rx="10" /><rect x="480" y="175" width="130" height="55" rx="10" /></g>
      <g fill="#5b21b6"><rect x="330" y="255" width="130" height="55" rx="10" /><rect x="480" y="255" width="130" height="55" rx="10" /><rect x="630" y="255" width="130" height="55" rx="10" /></g>
      <g fill="#9a3412"><rect x="480" y="335" width="130" height="55" rx="10" /><rect x="630" y="335" width="130" height="55" rx="10" /><rect x="780" y="335" width="130" height="55" rx="10" /></g>
      <g fill="#166534"><rect x="630" y="415" width="130" height="55" rx="10" /><rect x="780" y="415" width="130" height="55" rx="10" /><rect x="930" y="415" width="130" height="55" rx="10" /></g>
      <g fill="#f8fafc"><text x="245" y="208">μ₀</text><text x="395" y="208">μ1</text><text x="545" y="208">μ²</text><text x="395" y="288">μ₀</text><text x="545" y="288">μ1</text><text x="695" y="288">μ²</text><text x="545" y="368">μ₀</text><text x="695" y="368">μ1</text><text x="845" y="368">μ²</text><text x="695" y="448">μ₀</text><text x="845" y="448">μ1</text><text x="995" y="448">μ²</text></g>
    </g>
    <text x="255" y="525" fill="#fca5a5" font-size="15">burbuja de inicio</text><text x="890" y="525" fill="#fca5a5" font-size="15">burbuja de drenaje</text><text x="575" y="548" fill="#94a3b8" font-size="15">Un tiempo de etapa desigual genera intervalos ociosos adicionales.</text>
  </g>
</svg>
