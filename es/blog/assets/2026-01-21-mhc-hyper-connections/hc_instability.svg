<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" style="background-color: #f8fafc; font-family: Inter, system-ui, sans-serif;" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Se ha reportado inestabilidad del HC a 27 mil millones</title>
  <desc id="desc">Los mapas de residuo sin restricciones se componen entre capas; el artículo reporta un valor máximo de ganancia Amax en la composición cercano a 3,000 en su experimento con modelo HC de 27 mil millones de parámetros.</desc>
  <defs>
    <!-- Background grid -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#e2e8f0" stroke-width="0.5" />
    </pattern>

    <!-- Markers for arrows -->
    <marker id="arrowRed" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#dc2626" />
    </marker>
    <marker id="arrowAmber" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#ea580c" />
    </marker>
    <marker id="arrowSlate" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#64748b" />
    </marker>

    <!-- Glowing Effects -->
    <filter id="glowRed" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="0.8" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glowAmber" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="0.8" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glowSlate" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Shadows -->
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="1000" height="600" fill="#f8fafc" />

  <!-- Background grid layer -->
  <rect width="1000" height="600" fill="#f8fafc" />

  <!-- Top Title -->
  <text x="40" y="50" font-size="28" font-weight="800" fill="#0f172a">La complicación: inestabilidad a escala</text>
  <text x="40" y="80" font-size="16" fill="#334155">El artículo relaciona el aumento en la pérdida HC de 27B con un mapa residual compuesto sin restricciones.</text>

  <!-- Left Side: Plot Area -->
  <g transform="translate(80, 140)">

    <!-- Plot Background -->
    <rect x="0" y="0" width="460" height="380" rx="12" fill="#ffffff" fill-opacity="0.9" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)" />

    <text x="240" y="28" text-anchor="middle" fill="#334155" font-size="13" font-weight="600">Amplitud de ganancia Amax (escala logarítmica)</text>

    <!-- Y-axis lines and ticks -->
    <g stroke="#cbd5e1" stroke-width="1" fill="none">
      <line x1="60" y1="50" x2="420" y2="50" />
      <line x1="60" y1="120" x2="420" y2="120" />
      <line x1="60" y1="190" x2="420" y2="190" />
      <line x1="60" y1="260" x2="420" y2="260" />
    </g>

    <!-- Y-axis tick labels -->
    <g fill="#64748b" font-size="12" text-anchor="end" font-family="SFMono-Regular, Consolas, monospace">
      <text x="50" y="54">1000</text>
      <text x="50" y="124">100</text>
      <text x="50" y="194">10</text>
      <text x="50" y="264">1</text>
      <text x="50" y="334">0.1</text>
    </g>

    <!-- Base X and Y axis lines drawn thicker -->
    <path d="M 60 40 L 60 330 L 430 330" fill="none" stroke="#1e293b" stroke-width="2" />

    <!-- X-axis tick labels -->
    <g fill="#64748b" font-size="12" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace">
      <text x="60" y="350">0</text>
      <text x="150" y="350">25</text>
      <text x="240" y="350">50</text>
      <text x="330" y="350">75</text>
      <text x="420" y="350">100</text>
    </g>
    <!-- X-axis label -->
    <text x="240" y="370" text-anchor="middle" fill="#334155" font-size="14" font-weight="600">Profundidad de capa</text>

    <!-- SVG paths for the curves -->
    <!-- ResNet Line -->
    <path id="pathResNet" d="M 60 260 L 420 260" fill="none" stroke="#94a3b8" stroke-width="3" stroke-dasharray="6,4" />
    <!-- Exploding Line -->
    <path id="pathExplode" d="M 60 260 C 200 260, 300 210, 420 50" fill="none" stroke="#dc2626" stroke-width="3" />
    <!-- Vanishing Line -->
    <path id="pathVanish" d="M 60 260 C 200 260, 300 320, 420 325" fill="none" stroke="#ea580c" stroke-width="3" />


    <!-- Exploding Curve Annotation -->
    <line x1="315" y1="120" x2="335" y2="100" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrowRed)" />
    <rect x="265" y="120" width="100" height="26" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1" />
    <text x="315" y="138" text-anchor="middle" fill="#dc2626" font-size="13" font-weight="700">Explosión</text>

    <!-- ResNet Curve Annotation -->
    <line x1="350" y1="240" x2="350" y2="252" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowSlate)" />
    <rect x="280" y="214" width="140" height="26" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" />
    <text x="350" y="232" text-anchor="middle" fill="#334155" font-size="13" font-weight="700">ResNet estándar</text>

    <!-- Vanishing Curve Annotation -->
    <line x1="225" y1="292" x2="270" y2="313" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrowAmber)" />
    <rect x="180" y="266" width="90" height="26" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1" />
    <text x="225" y="284" text-anchor="middle" fill="#9a3412" font-size="13" font-weight="700">Desaparición</text>

    <!-- Animated Particles Tracing Curves -->





  </g>

  <!-- Right Side: Explanation Cards -->
  <g transform="translate(580, 140)">

    <!-- Title Card -->
    <rect x="0" y="0" width="380" height="280" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)" />
    <text x="190" y="35" text-anchor="middle" font-size="18" font-weight="800" fill="#0f172a">Gain del operador compuesto</text>
    <line x1="20" y1="50" x2="360" y2="50" stroke="#f1f5f9" stroke-width="2" />

    <!-- Standard Comparison -->
    <g transform="translate(20, 80)">
      <rect x="0" y="0" width="340" height="36" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
      <text x="15" y="23" font-size="14" font-weight="600" fill="#334155">ResNet estándar:</text>
      <text x="140" y="23" font-size="14" fill="#64748b" font-family="SFMono-Regular, Consolas, monospace">1.0 × x</text>
      <rect x="270" y="7" width="55" height="22" rx="11" fill="#f0fdf4" stroke="#16a34a" stroke-width="1" />
      <text x="297" y="23" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">Seguro</text>
    </g>

    <!-- HC Matrix Explanations -->
    <g transform="translate(20, 140)">
      <text x="0" y="0" font-size="14" font-weight="600" fill="#0f172a">Hyper-conexión: Matriz sin restricciones</text>

      <!-- Explodes -->
      <g transform="translate(0, 20)">
        <text x="10" y="0" font-size="14" font-weight="600" fill="#dc2626">• Ganancia repetida &gt; 1</text>
        <line x1="180" y1="-5" x2="200" y2="-5" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arrowSlate)" />
        <text x="215" y="0" font-size="14" font-weight="700" fill="#dc2626">Explosion</text>
        <text x="10" y="22" font-size="13" fill="#64748b">puede amplificar las direcciones alineadas</text>
      </g>

      <!-- Vanishes -->
      <g transform="translate(0, 65)">
        <text x="10" y="0" font-size="14" font-weight="600" fill="#9a3412">• Ganancia repetida &lt; 1</text>
        <line x1="180" y1="-5" x2="200" y2="-5" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arrowSlate)" />
        <text x="215" y="0" font-size="14" font-weight="700" fill="#9a3412">Desaparece</text>
        <text x="10" y="22" font-size="13" fill="#64748b">puede atenuar las direcciones alineadas</text>
      </g>
    </g>

    <!-- Warning Metrics Box -->
    <rect x="0" y="310" width="380" height="85" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#shadow)" />
    <path d="M 15 325 L 15 380" stroke="#dc2626" stroke-width="4" stroke-linecap="round" />
    <text x="30" y="340" font-size="14" font-weight="700" fill="#991b1b">Medición de HC de 27 mil millones del paper</text>
    <text x="30" y="362" font-size="13" font-weight="500" fill="#991b1b">en redes de control profundo no reguladas, DeepSeek</text>
    <text x="30" y="380" font-size="13" font-weight="500" fill="#991b1b">midió un </text>
    <text x="105" y="380" font-size="13" font-weight="800" fill="#991b1b">~3000 veces</text>
    <text x="155" y="380" font-size="13" font-weight="500" fill="#991b1b"> ganancia máxima compuesta en el pico.</text>

  </g>

</svg>
