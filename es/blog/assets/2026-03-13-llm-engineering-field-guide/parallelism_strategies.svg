<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrow4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555" />
    </marker>
    <filter id="shadow4" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1" />
    </filter>
  </defs>

  <rect width="900" height="520" fill="#fafbfc" rx="8" />

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">Cuatro tipos de paralelismo</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#666">Cómo distribuir el cálculo de los LLM entre múltiples GPUs</text>

  <!-- TP: Tensor Parallelism -->
  <rect x="30" y="75" width="410" height="190" rx="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" filter="url(#shadow4)" />
  <text x="235" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#1565c0">Paralelismo de tensores (PT)</text>
  <text x="235" y="118" text-anchor="middle" font-size="11" fill="#666">Distribuir las matrices de peso entre GPUs</text>

  <!-- Weight matrix split -->
  <rect x="60" y="130" width="160" height="50" rx="4" fill="#1565c0" opacity="0.7" />
  <text x="140" y="160" text-anchor="middle" font-size="11" fill="#fff">Matriz de pesos W</text>
  <line x1="220" y1="155" x2="250" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#arrow4)" />
  <!-- Split parts -->
  <rect x="250" y="130" width="80" height="24" rx="3" fill="#1565c0" />
  <text x="290" y="147" text-anchor="middle" font-size="9" fill="#fff">W₁ → GPU 0</text>
  <rect x="250" y="157" width="80" height="24" rx="3" fill="#2980b9" />
  <text x="290" y="174" text-anchor="middle" font-size="9" fill="#fff">W₂ → GPU 1</text>

  <text x="60" y="205" font-size="10" fill="#333">• Reducción total después de cada capa</text>
  <text x="60" y="220" font-size="10" fill="#333">• Requiere NVLink (900 GB/s en H100)</text>
  <text x="60" y="235" font-size="10" fill="#333">• Mejor rendimiento dentro de un único nodo, TP=2 o TP=4</text>
  <text x="60" y="250" font-size="10" fill="#1565c0" font-weight="bold">• Reduce la latencia por solicitud</text>

  <!-- PP: Pipeline Parallelism -->
  <rect x="460" y="75" width="410" height="190" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" filter="url(#shadow4)" />
  <text x="665" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#2e7d32">Paralelismo de pipeline (PP)</text>
  <text x="665" y="118" text-anchor="middle" font-size="11" fill="#666">Distribuir las capas de forma secuencial entre las GPU.</text>

  <!-- Pipeline stages -->
  <rect x="490" y="132" width="75" height="40" rx="4" fill="#2e7d32" />
  <text x="527" y="147" text-anchor="middle" font-size="9" fill="#fff">Capas 1-20</text>
  <text x="527" y="160" text-anchor="middle" font-size="8" fill="#e8f5e9">GPU 0</text>
  <line x1="565" y1="152" x2="585" y2="152" stroke="#555" stroke-width="1.5" marker-end="url(#arrow4)" />
  <rect x="585" y="132" width="75" height="40" rx="4" fill="#27ae60" />
  <text x="622" y="147" text-anchor="middle" font-size="9" fill="#fff">Capas 21-40</text>
  <text x="622" y="160" text-anchor="middle" font-size="8" fill="#e8f5e9">GPU 1</text>
  <line x1="660" y1="152" x2="680" y2="152" stroke="#555" stroke-width="1.5" marker-end="url(#arrow4)" />
  <rect x="680" y="132" width="75" height="40" rx="4" fill="#66bb6a" />
  <text x="717" y="147" text-anchor="middle" font-size="9" fill="#fff">Capas 41-60</text>
  <text x="717" y="160" text-anchor="middle" font-size="8" fill="#fff">GPU 2</text>

  <text x="490" y="200" font-size="10" fill="#333">• Transfiere las activaciones entre etapas</text>
  <text x="490" y="215" font-size="10" fill="#333">• Ancho de banda reducido → funciona entre nodos</text>
  <text x="490" y="230" font-size="10" fill="#333">• Burbujas del pipeline (tiempo de inactividad de la GPU)</text>
  <text x="490" y="245" font-size="10" fill="#2e7d32" font-weight="bold">• Llama-405B: TP=8 + PP=2</text>

  <!-- DP: Data Parallelism -->
  <rect x="30" y="285" width="410" height="190" rx="10" fill="#fff3e0" stroke="#e65100" stroke-width="2" filter="url(#shadow4)" />
  <text x="235" y="310" text-anchor="middle" font-size="15" font-weight="bold" fill="#e65100">Paralelismo de datos (PD)</text>
  <text x="235" y="328" text-anchor="middle" font-size="11" fill="#666">Reproducir el modelo completo en cada GPU</text>

  <!-- Replicated models -->
  <rect x="70" y="342" width="90" height="45" rx="4" fill="#e65100" />
  <text x="115" y="362" text-anchor="middle" font-size="9" fill="#fff">Modelo completo</text>
  <text x="115" y="378" text-anchor="middle" font-size="8" fill="#fff3e0">GPU 0 → Lote A</text>
  <rect x="175" y="342" width="90" height="45" rx="4" fill="#e67e22" />
  <text x="220" y="362" text-anchor="middle" font-size="9" fill="#fff">Modelo completo</text>
  <text x="220" y="378" text-anchor="middle" font-size="8" fill="#fff3e0">GPU 1 → Lote B</text>
  <rect x="280" y="342" width="90" height="45" rx="4" fill="#f39c12" />
  <text x="325" y="362" text-anchor="middle" font-size="9" fill="#fff">Modelo completo</text>
  <text x="325" y="378" text-anchor="middle" font-size="8" fill="#fff3e0">GPU 2 → Lote C</text>

  <text x="60" y="413" font-size="10" fill="#333">• Sin comunicación entre GPUs (inferencia)</text>
  <text x="60" y="428" font-size="10" fill="#333">• Estrategia de escalado más rentable</text>
  <text x="60" y="443" font-size="10" fill="#333">• Para entrenamiento: combinado con sharding ZeRO</text>
  <text x="60" y="458" font-size="10" fill="#e65100" font-weight="bold">• Utilízalo cuando el modelo cabe en 1 GPU</text>

  <!-- EP: Expert Parallelism -->
  <rect x="460" y="285" width="410" height="190" rx="10" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" filter="url(#shadow4)" />
  <text x="665" y="310" text-anchor="middle" font-size="15" font-weight="bold" fill="#6a1b9a">Paralelismo Experto (PE)</text>
  <text x="665" y="328" text-anchor="middle" font-size="11" fill="#666">Distribuir expertos MoE entre las GPU</text>

  <!-- Router + experts -->
  <rect x="575" y="340" width="80" height="30" rx="4" fill="#6a1b9a" />
  <text x="615" y="360" text-anchor="middle" font-size="10" fill="#fff">Ruteador</text>

  <!-- Expert boxes -->
  <line x1="593" y1="370" x2="517" y2="385" stroke="#6a1b9a" stroke-width="1" />
  <line x1="605" y1="370" x2="582" y2="385" stroke="#6a1b9a" stroke-width="1" />
  <line x1="625" y1="370" x2="707" y2="385" stroke="#6a1b9a" stroke-width="1" />
  <line x1="637" y1="370" x2="772" y2="385" stroke="#6a1b9a" stroke-width="1" />

  <rect x="490" y="385" width="55" height="24" rx="3" fill="#9b59b6" />
  <text x="517" y="401" text-anchor="middle" font-size="8" fill="#fff">GPU0 de E1</text>
  <rect x="555" y="385" width="55" height="24" rx="3" fill="#9b59b6" />
  <text x="582" y="401" text-anchor="middle" font-size="8" fill="#fff">GPU0 de E2</text>
  <rect x="680" y="385" width="55" height="24" rx="3" fill="#ab47bc" />
  <text x="707" y="401" text-anchor="middle" font-size="8" fill="#fff">GPU1 E3</text>
  <rect x="745" y="385" width="55" height="24" rx="3" fill="#ab47bc" />
  <text x="772" y="401" text-anchor="middle" font-size="8" fill="#fff">GPU1 de E4</text>

  <text x="490" y="433" font-size="10" fill="#333">• Comunicación punto a punto para el enrutamiento de tokens</text>
  <text x="490" y="448" font-size="10" fill="#333">• 47 % de latencia en el paso forward (incluso con NVLink)</text>
  <text x="490" y="463" font-size="10" fill="#6a1b9a" font-weight="bold">• DeepSeek-V3: 256 expertos, EP=8/nodo</text>

  <!-- Decision framework at bottom -->
  <rect x="30" y="488" width="840" height="25" rx="5" fill="#e3f2fd" stroke="#1565c0" stroke-width="1" />
  <text x="450" y="505" text-anchor="middle" font-size="11" fill="#1565c0" font-weight="bold">Decisión: cabe en 1 GPU → DP | cabe en 1 nodo → TP + DP | supera 1 nodo → TP + PP + DP | MoE → añadir EP</text>
</svg>
