<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Parallelism Strategies" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Estrategias de paralelismo</title>
  <defs>
    <marker id="arrow4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#334155" />
    </marker>
    <filter id="shadow4" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="900" height="520" fill="#f8fafc" rx="8" />

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">Cuatro formas de paralelismo</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#334155">Cómo distribuir el cálculo de LLM entre múltiples GPUs</text>

  <!-- TP: Tensor Parallelism -->
  <rect x="30" y="75" width="410" height="190" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow4)" />
  <text x="235" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#1d4ed8">Paralelismo de tensores (PT)</text>
  <text x="235" y="118" text-anchor="middle" font-size="11" fill="#334155">Distribuir las matrices de peso entre GPUs</text>

  <!-- Weight matrix split -->
  <rect x="60" y="130" width="160" height="50" rx="4" fill="#2563eb" opacity="0.7" />
  <text x="140" y="160" text-anchor="middle" font-size="11" fill="#ffffff">Matriz de pesos W</text>
  <line x1="220" y1="155" x2="250" y2="155" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow4)" />
  <!-- Split parts -->
  <rect x="250" y="130" width="80" height="24" rx="3" fill="#2563eb" />
  <text x="290" y="147" text-anchor="middle" font-size="9" fill="#ffffff">W₁ → GPU 0</text>
  <rect x="250" y="157" width="80" height="24" rx="3" fill="#2563eb" />
  <text x="290" y="174" text-anchor="middle" font-size="9" fill="#ffffff">W₂ → GPU 1</text>

  <text x="60" y="205" font-size="10" fill="#0f172a">• All-reduce después de cada capa</text>
  <text x="60" y="220" font-size="10" fill="#0f172a">• Requiere NVLink (900 GB/s en H100)</text>
  <text x="60" y="235" font-size="10" fill="#0f172a">• Por lo general, se almacena dentro de un nodo con enlace rápido</text>
  <text x="60" y="250" font-size="10" fill="#1d4ed8" font-weight="bold">• Intercambia comunicación para reducir la carga del dispositivo</text>

  <!-- PP: Pipeline Parallelism -->
  <rect x="460" y="75" width="410" height="190" rx="10" fill="#f0fdf4" stroke="#166534" stroke-width="2" filter="url(#shadow4)" />
  <text x="665" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#166534">Pipeline paralelismo (PP)</text>
  <text x="665" y="118" text-anchor="middle" font-size="11" fill="#334155">Dividir las capas de forma secuencial en GPUs</text>

  <!-- Pipeline stages -->
  <rect x="490" y="132" width="75" height="40" rx="4" fill="#166534" />
  <text x="527" y="147" text-anchor="middle" font-size="9" fill="#ffffff">Capas 1-20</text>
  <text x="527" y="160" text-anchor="middle" font-size="9" fill="#16a34a">GPU 0</text>
  <line x1="565" y1="152" x2="585" y2="152" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow4)" />
  <rect x="585" y="132" width="75" height="40" rx="4" fill="#16a34a" />
  <text x="622" y="147" text-anchor="middle" font-size="9" fill="#ffffff">Capas 21-40</text>
  <text x="622" y="160" text-anchor="middle" font-size="9" fill="#16a34a">GPU 1</text>
  <line x1="660" y1="152" x2="680" y2="152" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow4)" />
  <rect x="680" y="132" width="75" height="40" rx="4" fill="#16a34a" />
  <text x="717" y="147" text-anchor="middle" font-size="9" fill="#ffffff">Capas 41-60</text>
  <text x="717" y="160" text-anchor="middle" font-size="9" fill="#ffffff">GPU 2</text>

  <text x="490" y="200" font-size="10" fill="#0f172a">• Transfiere las activaciones entre etapas</text>
  <text x="490" y="215" font-size="10" fill="#0f172a">• Puede abarcar nodos; tráfico de activación de perfiles</text>
  <text x="490" y="230" font-size="10" fill="#0f172a">• burbujas Pipeline (tiempo inactivo GPU)</text>
  <text x="490" y="245" font-size="10" fill="#166534" font-weight="bold">• A menudo se combina con TP dentro de cada nodo</text>

  <!-- DP: Data Parallelism -->
  <rect x="30" y="285" width="410" height="190" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadow4)" />
  <text x="235" y="310" text-anchor="middle" font-size="15" font-weight="bold" fill="#9a3412">Paralelismo de datos (PD)</text>
  <text x="235" y="328" text-anchor="middle" font-size="11" fill="#334155">Reproducir el modelo completo en cada GPU</text>

  <!-- Replicated models -->
  <rect x="70" y="342" width="90" height="45" rx="4" fill="#ea580c" />
  <text x="115" y="362" text-anchor="middle" font-size="9" fill="#ffffff">Modelo completo</text>
  <text x="115" y="378" text-anchor="middle" font-size="9" fill="#ea580c">GPU 0 → Lote A</text>
  <rect x="175" y="342" width="90" height="45" rx="4" fill="#ea580c" />
  <text x="220" y="362" text-anchor="middle" font-size="9" fill="#ffffff">Modelo completo</text>
  <text x="220" y="378" text-anchor="middle" font-size="9" fill="#ea580c">GPU 1 → Lote B</text>
  <rect x="280" y="342" width="90" height="45" rx="4" fill="#ea580c" />
  <text x="325" y="362" text-anchor="middle" font-size="9" fill="#ffffff">Modelo completo</text>
  <text x="325" y="378" text-anchor="middle" font-size="9" fill="#ea580c">GPU 2 → Lote C</text>

  <text x="60" y="413" font-size="10" fill="#0f172a">• Cero comunicación inter-GPU durante la inferencia</text>
  <text x="60" y="428" font-size="10" fill="#0f172a">• Eficiente cuando el modelo cabe en cada réplica</text>
  <text x="60" y="443" font-size="10" fill="#0f172a">• Para el entrenamiento: en combinación con ZeRO sharding</text>
  <text x="60" y="458" font-size="10" fill="#9a3412" font-weight="bold">• Medir el equilibrio de carga y la utilización de réplicas</text>

  <!-- EP: Expert Parallelism -->
  <rect x="460" y="285" width="410" height="190" rx="10" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow4)" />
  <text x="665" y="310" text-anchor="middle" font-size="15" font-weight="bold" fill="#5b21b6">Paralelismo experto (PE)</text>
  <text x="665" y="328" text-anchor="middle" font-size="11" fill="#334155">Distribuir expertos en MoE a través de GPUs</text>

  <!-- Router + experts -->
  <rect x="575" y="340" width="80" height="30" rx="4" fill="#7c3aed" />
  <text x="615" y="360" text-anchor="middle" font-size="10" fill="#ffffff">Enrutador</text>

  <!-- Expert boxes -->
  <line x1="593" y1="370" x2="517" y2="385" stroke="#7c3aed" stroke-width="1" />
  <line x1="605" y1="370" x2="582" y2="385" stroke="#7c3aed" stroke-width="1" />
  <line x1="625" y1="370" x2="707" y2="385" stroke="#7c3aed" stroke-width="1" />
  <line x1="637" y1="370" x2="772" y2="385" stroke="#7c3aed" stroke-width="1" />

  <rect x="490" y="385" width="55" height="24" rx="3" fill="#7c3aed" />
  <text x="517" y="401" text-anchor="middle" font-size="9" fill="#ffffff">GPU E1</text>
  <rect x="555" y="385" width="55" height="24" rx="3" fill="#7c3aed" />
  <text x="582" y="401" text-anchor="middle" font-size="9" fill="#ffffff">GPU E2 0</text>
  <rect x="680" y="385" width="55" height="24" rx="3" fill="#7c3aed" />
  <text x="707" y="401" text-anchor="middle" font-size="9" fill="#ffffff">GPU1 de E3</text>
  <rect x="745" y="385" width="55" height="24" rx="3" fill="#7c3aed" />
  <text x="772" y="401" text-anchor="middle" font-size="9" fill="#ffffff">GPU1 de E4</text>

  <text x="490" y="433" font-size="10" fill="#0f172a">• Comunicación todo-con-todo para el enrutamiento de tokens</text>
  <text x="490" y="448" font-size="10" fill="#0f172a">• Sensible al equilibrio experto y a la topología</text>
  <text x="490" y="463" font-size="10" fill="#5b21b6" font-weight="bold">• Analizar el tráfico todo-con-todo bajo enrutamiento real</text>

  <!-- Decision framework at bottom -->
  <rect x="30" y="488" width="840" height="25" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1" />
  <text x="450" y="505" text-anchor="middle" font-size="11" fill="#1d4ed8" font-weight="bold">Activar únicamente la heurística de inicio: validar memoria, comunicación, ancho de banda y latencia en el clúster de destino</text>
</svg>
