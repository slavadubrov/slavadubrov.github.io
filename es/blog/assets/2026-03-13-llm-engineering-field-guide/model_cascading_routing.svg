<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">1. Enrutamiento del modelo</title>
  <desc id="artifact-desc">1. Enrutamiento del modelo.</desc>
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 5; }
      .router { fill: #ea580c; stroke: #ea580c; stroke-width: 2; rx: 10; }
      .eval { fill: #faf5ff; stroke: #7c3aed; stroke-width: 2; rx: 5; }
      .small-model { fill: #2563eb; stroke: #1d4ed8; stroke-width: 2; rx: 5; }
      .large-model { fill: #fef2f2; stroke: #dc2626; stroke-width: 2; rx: 5; }
      .arrow { stroke: #334155; stroke-width: 2; marker-end: url(#arrowhead); }
      .text { font-family: Inter, system-ui, sans-serif; font-size: 14px; text-anchor: middle; fill: #0f172a; }
      .subtitle { font-family: Inter, system-ui, sans-serif; font-size: 16px; font-weight: bold; text-anchor: middle; fill: #334155; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="100%" height="100%" fill="#f8fafc" />

  <!-- Routing Section (Left Half) -->
  <text y="30" class="subtitle" x="200">1. Enrutamiento del modelo</text>

  <rect x="150" y="60" width="100" height="40" class="box" />
  <text y="85" class="text" x="200">Consulta de usuario</text>

  <line x1="200" y1="100" x2="200" y2="120" class="arrow" />

  <!-- Router Diamond -->
  <polygon points="200,125 260,155 200,185 140,155" class="router" />
  <text y="159" class="text" font-weight="bold" x="200">Ruteador</text>

  <!-- Router to Models -->
  <line x1="200" y1="185" x2="200" y2="205" stroke="#334155" stroke-width="2" />
  <line x1="110" y1="205" x2="290" y2="205" stroke="#334155" stroke-width="2" />

  <!-- Arrow to Small Model -->
  <line x1="110" y1="205" x2="110" y2="220" class="arrow" />
  <text y="195" class="text" font-size="12" x="155">Sencillo</text>

  <!-- Arrow to Large Model -->
  <line x1="290" y1="205" x2="290" y2="220" class="arrow" />
  <text y="195" class="text" font-size="12" x="245">Complejo</text>

  <!-- Small Model -->
  <rect x="40" y="225" width="140" height="60" class="small-model" />
  <text y="250" class="text" font-weight="bold" x="110">Modelo pequeño</text>
  <text y="270" class="text" font-size="12" x="110">Rápido y económico</text>

  <!-- Large Model -->
  <rect x="220" y="225" width="140" height="60" class="large-model" />
  <text y="250" class="text" font-weight="bold" x="290">Modelo grande</text>
  <text y="270" class="text" font-size="12" x="290">(Preciso, caro)</text>

  <!-- Models to Output Vector -->
  <line x1="110" y1="285" x2="110" y2="330" stroke="#334155" stroke-width="2" />
  <line x1="290" y1="285" x2="290" y2="330" stroke="#334155" stroke-width="2" />
  <line x1="110" y1="330" x2="290" y2="330" stroke="#334155" stroke-width="2" />
  <line x1="200" y1="330" x2="200" y2="385" class="arrow" />

  <rect x="150" y="390" width="100" height="40" class="box" />
  <text y="415" class="text" x="200">Salida</text>

  <!-- Divider -->
  <line x1="400" y1="20" x2="400" y2="430" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="8,8" />

  <!-- Cascading Section (Right Half) -->
  <text y="30" class="subtitle" x="600">2. Acoplamiento de modelos</text>

  <rect x="550" y="60" width="100" height="40" class="box" />
  <text y="85" class="text" x="600">Consulta de usuario</text>

  <line x1="600" y1="100" x2="600" y2="120" class="arrow" />

  <!-- Small Model -->
  <rect x="530" y="125" width="140" height="60" class="small-model" />
  <text y="150" class="text" font-weight="bold" x="600">Modelo pequeño</text>
  <text y="170" class="text" font-size="12" x="600">Primer intento</text>

  <line x1="600" y1="185" x2="600" y2="205" class="arrow" />

  <!-- Confidence Diamond -->
  <polygon points="600,210 670,240 600,270 530,240" class="eval" />
  <text y="244" class="text" font-size="12" font-weight="bold" x="600">¿Confianza?</text>

  <!-- Low Confidence (Down) -->
  <line x1="600" y1="270" x2="600" y2="295" class="arrow" />
  <text y="285" class="text" font-size="12" x="618">Bajo</text>

  <!-- Large Model -->
  <rect x="530" y="300" width="140" height="60" class="large-model" />
  <text y="325" class="text" font-weight="bold" x="600">Modelo grande</text>
  <text y="345" class="text" font-size="12" x="600">Alternativa</text>

  <line x1="600" y1="360" x2="600" y2="385" class="arrow" />

  <!-- High Confidence (Bypass to Output) -->
  <line x1="530" y1="240" x2="480" y2="240" stroke="#334155" stroke-width="2" />
  <line x1="480" y1="240" x2="480" y2="410" stroke="#334155" stroke-width="2" />
  <line x1="480" y1="410" x2="545" y2="410" class="arrow" />
  <text y="234" class="text" font-size="12" x="500">Alto</text>

  <!-- Output Box -->
  <rect x="550" y="390" width="100" height="40" class="box" />
  <text y="415" class="text" x="600">Salida</text>

</svg>
