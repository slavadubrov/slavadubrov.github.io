<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 360" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Arquitectura RAG en producción</title>
  <desc id="artifact-desc">Arquitectura RAG en producción.</desc>
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 8; }
      .data-box { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 8; }
      .model { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 8; }
      .db { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 16; }
      .search { fill: #faf5ff; stroke: #7c3aed; stroke-width: 2; rx: 8; }
      .qtrans { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 8; }
      .arrow { fill: none; stroke: #94a3b8; stroke-width: 2; marker-end: url(#arrowhead); }
      .arrow-dashed { fill: none; stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 6,4; marker-end: url(#arrowhead); }
      .text { font-family: Inter, system-ui, sans-serif; font-size: 14px; fill: #0f172a; text-anchor: middle; }
      .text-small { font-family: Inter, system-ui, sans-serif; font-size: 12px; fill: #334155; text-anchor: middle; }
      .text-bold { font-weight: 600; }
      .title { font-family: Inter, system-ui, sans-serif; font-size: 20px; font-weight: 700; fill: #0f172a; text-anchor: middle; }
      .subtitle { font-family: Inter, system-ui, sans-serif; font-size: 14px; font-weight: 600; fill: #334155; text-anchor: start; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9.5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="100%" height="100%" fill="#f8fafc" />

  <text y="30" class="title" x="525">Arquitectura RAG en producción</text>

  <!-- Data Ingestion Flow (Top) -->
  <text y="50" class="subtitle" x="20">Ingestión de datos (fuera de línea)</text>

  <!-- Col 1 -->
  <rect x="15" y="65" width="110" height="50" class="data-box" />
  <text y="94" class="text text-bold" x="70">Documentos</text>

  <path d="M 125,90 H 157" class="arrow" />

  <!-- Col 2 -->
  <rect x="160" y="65" width="110" height="50" class="box" />
  <text y="86" class="text text-bold" x="215">Fragmentación</text>
  <text y="104" class="text-small" x="215">Sobrepuesto, Análisis</text>

  <path d="M 270,90 H 302" class="arrow" />

  <!-- Col 3 -->
  <rect x="305" y="65" width="110" height="50" class="model" />
  <text y="86" class="text text-bold" x="360">Embebidor</text>
  <text y="104" class="text-small" x="360">(Vectores densos)</text>

  <path d="M 415,90 H 442" class="arrow" />

  <!-- Col 4 -->
  <rect x="445" y="55" width="120" height="70" class="db" />
  <text y="86" class="text text-bold" x="505">Banco de datos vectorial</text>
  <text y="104" class="text-small" x="505">HNSW / Gráfico</text>

  <!-- Divider -->
  <line x1="20" y1="155" x2="1030" y2="155" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="8,8" />

  <!-- Retrieval & Generation Flow (Bottom) -->
  <text y="185" class="subtitle" x="20">Flujo de consulta (en línea)</text>

  <!-- Col 2 -->
  <rect x="160" y="205" width="110" height="50" class="box" />
  <text y="235" class="text text-bold" x="215">Consulta de usuario</text>

  <path d="M 270,230 H 302" class="arrow" />
  <!-- Arrow to Query Transform -->
  <path d="M 215,255 V 294 Q 215,300 221,300 H 302" class="arrow" />

  <!-- Col 3 Top -->
  <rect x="305" y="205" width="110" height="50" class="model" />
  <text y="226" class="text text-bold" x="360">Embebidor</text>
  <text y="244" class="text-small" x="360">(Coincide sin conexión)</text>

  <path d="M 415,230 H 442" class="arrow" />

  <!-- Col 3 Bottom -->
  <rect x="305" y="275" width="110" height="50" class="qtrans" />
  <text y="296" class="text text-bold" x="360">Consulta</text>
  <text y="314" class="text text-bold" x="360">Transformar</text>

  <path d="M 415,300 H 499 Q 505,300 505,294 V 263" class="arrow" />
  <!-- Vector DB to Hybrid Search -->
  <path d="M 505,125 V 197" class="arrow-dashed" />

  <!-- Col 4 -->
  <rect x="445" y="200" width="120" height="60" class="search" />
  <text y="226" class="text text-bold" x="505">Búsqueda híbrida</text>
  <text y="244" class="text-small" x="505">Denso + BM25</text>

  <path d="M 565,230 H 612" class="arrow" />
  <text y="220" class="text-small" x="588">Top-K</text>

  <!-- Col 5 -->
  <rect x="615" y="200" width="110" height="60" class="model" />
  <text y="226" class="text text-bold" x="670">Reclasificador</text>
  <text y="244" class="text-small" x="670">Encodificador cruzado</text>

  <path d="M 725,230 H 772" class="arrow" />
  <text y="220" class="text-small" x="748">Top-N</text>

  <!-- Col 6 -->
  <rect x="775" y="200" width="120" height="60" class="model" />
  <text y="226" class="text text-bold" x="835">LLM generativo</text>
  <text y="244" class="text-small" x="835">Contexto + Prompt</text>

  <path d="M 895,230 H 925" class="arrow" />

  <!-- Col 7 -->
  <text y="235" class="text" font-weight="600" style="text-anchor: start;" x="935">Respuesta</text>

</svg>
