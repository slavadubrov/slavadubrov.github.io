<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2980b9" />
    </marker>
    <filter id="shadow1" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="#fafbfc" rx="8" />

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">La pila de optimización de inferencia</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#666">Cómo se combinan las técnicas para ofrecer serving de LLM listo para producción</text>

  <!-- Layer 1: Hardware Foundation -->
  <rect x="50" y="420" width="800" height="70" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadow1)" />
  <text x="80" y="448" font-size="13" font-weight="bold" fill="#1565c0">Base de hardware</text>
  <text x="80" y="468" font-size="11" fill="#333">Jerarquía de memoria GPU: HBM3 (3.35 TB/s) → L2 (12 TB/s) → SRAM (33 TB/s)</text>
  <text x="80" y="483" font-size="10" fill="#666">La brecha 10× de ancho de banda SRAM-HBM impulsa todas las optimizaciones superiores</text>

  <!-- Layer 2: Kernel Optimizations -->
  <rect x="50" y="330" width="380" height="75" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadow1)" />
  <text x="70" y="355" font-size="13" font-weight="bold" fill="#2e7d32">Optimizaciones de kernel</text>
  <text x="70" y="373" font-size="11" fill="#333">FlashAttention (bloques en SRAM)</text>
  <text x="70" y="388" font-size="11" fill="#333">Kernels fusionados (eliminan viajes de ida y vuelta a HBM)</text>
  <text x="70" y="398" font-size="10" fill="#666">80-90% de uso de GPU</text>

  <rect x="450" y="330" width="400" height="75" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadow1)" />
  <text x="470" y="355" font-size="13" font-weight="bold" fill="#e65100">Cuantización</text>
  <text x="470" y="373" font-size="11" fill="#333">FP8 (sin pérdida), INT8, INT4 (AWQ/GPTQ)</text>
  <text x="470" y="388" font-size="11" fill="#333">Calidad del kernel: diferencia de velocidad de 2.6×</text>
  <text x="470" y="398" font-size="10" fill="#666">50-75% menos memoria</text>

  <!-- Layer 3: Memory Management -->
  <rect x="50" y="240" width="380" height="75" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadow1)" />
  <text x="70" y="265" font-size="13" font-weight="bold" fill="#6a1b9a">Gestión de memoria</text>
  <text x="70" y="283" font-size="11" fill="#333">PagedAttention (&lt;4% de desperdicio vs 60-80%)</text>
  <text x="70" y="298" font-size="11" fill="#333">GQA/MQA (reducción de caché KV de 8-16×)</text>
  <text x="70" y="308" font-size="10" fill="#666">Mejora de rendimiento de 2-4×</text>

  <rect x="450" y="240" width="400" height="75" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadow1)" />
  <text x="470" y="265" font-size="13" font-weight="bold" fill="#6a1b9a">Planificación</text>
  <text x="470" y="283" font-size="11" fill="#333">Continuous Batching (a nivel de iteración)</text>
  <text x="470" y="298" font-size="11" fill="#333">Chunked Prefill (+50% de rendimiento)</text>
  <text x="470" y="308" font-size="10" fill="#666">23× frente a batching ingenuo</text>

  <!-- Layer 4: Serving Strategies -->
  <rect x="50" y="150" width="250" height="75" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadow1)" />
  <text x="70" y="175" font-size="13" font-weight="bold" fill="#1565c0">Caché</text>
  <text x="70" y="193" font-size="11" fill="#333">Prefix Caching (87%+ de aciertos)</text>
  <text x="70" y="208" font-size="11" fill="#333">RadixAttention (5× de rendimiento)</text>

  <rect x="320" y="150" width="260" height="75" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadow1)" />
  <text x="340" y="175" font-size="13" font-weight="bold" fill="#1565c0">Especulación</text>
  <text x="340" y="193" font-size="11" fill="#333">Speculative Decoding (1.5-3×)</text>
  <text x="340" y="208" font-size="11" fill="#333">EAGLE-3 (aceleración de 3-6.5×)</text>

  <rect x="600" y="150" width="250" height="75" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadow1)" />
  <text x="620" y="175" font-size="13" font-weight="bold" fill="#1565c0">Paralelismo</text>
  <text x="620" y="193" font-size="11" fill="#333">TP (intra-nodo, NVLink)</text>
  <text x="620" y="208" font-size="11" fill="#333">PP (inter-nodo) + DP (escalado)</text>

  <!-- Layer 5: Application Layer -->
  <rect x="50" y="70" width="800" height="65" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="1.5" filter="url(#shadow1)" />
  <text x="80" y="95" font-size="13" font-weight="bold" fill="#c62828">Capa de aplicación</text>
  <text x="80" y="113" font-size="11" fill="#333">Model Routing (85% menos coste) · Rate Limiting (basado en tokens) · Monitoring (goodput, uso de KV, TTFT/TPOT)</text>
  <text x="80" y="128" font-size="10" fill="#666">El coste cae 10× al año: apilar optimizaciones aporta ventajas acumulativas</text>

  <!-- Connecting arrows -->
  <line x1="240" y1="420" x2="240" y2="405" stroke="#2980b9" stroke-width="1.5" marker-end="url(#arrow1)" />
  <line x1="650" y1="420" x2="650" y2="405" stroke="#2980b9" stroke-width="1.5" marker-end="url(#arrow1)" />
  <line x1="240" y1="330" x2="240" y2="315" stroke="#2980b9" stroke-width="1.5" marker-end="url(#arrow1)" />
  <line x1="650" y1="330" x2="650" y2="315" stroke="#2980b9" stroke-width="1.5" marker-end="url(#arrow1)" />
  <line x1="175" y1="240" x2="175" y2="225" stroke="#2980b9" stroke-width="1.5" marker-end="url(#arrow1)" />
  <line x1="450" y1="240" x2="450" y2="225" stroke="#2980b9" stroke-width="1.5" marker-end="url(#arrow1)" />
  <line x1="725" y1="240" x2="725" y2="225" stroke="#2980b9" stroke-width="1.5" marker-end="url(#arrow1)" />
  <line x1="450" y1="150" x2="450" y2="135" stroke="#2980b9" stroke-width="1.5" marker-end="url(#arrow1)" />
</svg>
