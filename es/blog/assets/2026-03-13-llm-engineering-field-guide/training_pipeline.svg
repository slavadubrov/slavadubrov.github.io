<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Inter, system-ui, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Pipeline de entrenamiento de LLM: desde el preentrenamiento hasta la alineación</title>
  <desc id="artifact-desc">Pipeline de entrenamiento de LLM: desde el preentrenamiento hasta la alineación.</desc>
  <defs>
    <marker id="arrow5" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b" />
    </marker>
    <marker id="arrow5b" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#166534" />
    </marker>
    <filter id="shadow5" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="900" height="420" fill="#f8fafc" rx="8" />

  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a" x="450">Pipeline de entrenamiento de LLM: desde el preentrenamiento hasta la alineación</text>

  <!-- Stage 1: Pretraining -->
  <rect x="30" y="60" width="200" height="170" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow5)" />
  <text y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#1d4ed8" x="130">Preentrenamiento</text>

  <rect x="50" y="95" width="160" height="55" rx="5" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="112" text-anchor="middle" font-size="10" fill="#0f172a" x="130">Predicción del siguiente token</text>
  <text y="126" text-anchor="middle" font-size="10" fill="#0f172a" x="130">Trillones de tokens</text>
  <text y="140" text-anchor="middle" font-size="10" fill="#334155" x="130">Auto-supervisado</text>

  <text y="170" font-size="10" fill="#0f172a" x="50">Costo: 500 mil–100 millones+ dólares</text>
  <text y="185" font-size="10" fill="#0f172a" x="50">Cálculo: 10²⁴–10²⁶ operaciones por segundo</text>
  <text y="200" font-size="10" fill="#1d4ed8" font-weight="bold" x="50">ZeRO + FSDP + Precisión Mixta</text>
  <text y="215" font-size="9" fill="#334155" x="50">Chinchilla → Sobreentrenar modelos pequeños</text>

  <!-- Arrow 1→2 -->
  <line x1="230" y1="145" x2="275" y2="145" stroke="#334155" stroke-width="2" marker-end="url(#arrow5)" />

  <!-- Stage 2: SFT -->
  <rect x="275" y="60" width="180" height="170" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadow5)" />
  <text y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#9a3412" x="365">Afinación fina (SFT)</text>

  <rect x="295" y="95" width="140" height="55" rx="5" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="112" text-anchor="middle" font-size="10" fill="#0f172a" x="365">Datos específicos de la tarea</text>
  <text y="126" text-anchor="middle" font-size="10" fill="#0f172a" x="365">Ejemplos etiquetados</text>
  <text y="140" text-anchor="middle" font-size="10" fill="#334155" x="365">Supervisado</text>

  <text y="170" font-size="10" fill="#0f172a" x="295">Coste: 100–10 000 $</text>
  <text y="185" font-size="10" fill="#0f172a" x="295">Cálculo: 10¹⁸–10²¹ operaciones por segundo</text>
  <text y="200" font-size="10" fill="#9a3412" font-weight="bold" x="295">LoRA / QLoRA (10,000 veces menos parámetros)</text>
  <text y="215" font-size="9" fill="#334155" x="295">65B en una sola GPU de 48 GB</text>

  <!-- Arrow 2→3 -->
  <line x1="455" y1="145" x2="500" y2="145" stroke="#334155" stroke-width="2" marker-end="url(#arrow5)" />

  <!-- Stage 3: Alignment (branching) -->
  <rect x="500" y="60" width="380" height="170" rx="10" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow5)" />
  <text y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#5b21b6" x="690">Alineación</text>

  <!-- RLHF branch -->
  <rect x="520" y="95" width="155" height="65" rx="5" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6" x="597">RLHF / PPO</text>
  <text y="127" text-anchor="middle" font-size="9" fill="#0f172a" x="597">Modelo de recompensas + RL</text>
  <text y="141" text-anchor="middle" font-size="9" fill="#991b1b" x="597">4 copias del modelo en memoria</text>
  <text y="153" text-anchor="middle" font-size="9" fill="#334155" x="597">Complejo, sensible a los hiperparámetros</text>

  <!-- DPO branch -->
  <rect x="690" y="95" width="80" height="65" rx="5" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6" x="730">Responsable de Protección de Datos</text>
  <text y="127" text-anchor="middle" font-size="9" fill="#0f172a" x="730">No se necesita RL</text>
  <text y="141" text-anchor="middle" font-size="9" fill="#166534" x="730">Más simple, más estable</text>
  <text y="153" text-anchor="middle" font-size="9" fill="#334155" x="730">Solo sin conexión</text>

  <!-- GRPO branch -->
  <rect x="785" y="95" width="80" height="65" rx="5" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6" x="825">GRUPO</text>
  <text y="127" text-anchor="middle" font-size="9" fill="#0f172a" x="825">Modelo sin crítica</text>
  <text y="141" text-anchor="middle" font-size="9" fill="#166534" x="825">Solo 2 copias de LLM</text>
  <text y="153" text-anchor="middle" font-size="9" fill="#334155" x="825">DeepSeek-R1</text>

  <text y="185" font-size="10" fill="#0f172a" x="520">Datos de preferencias humanas/IA</text>
  <text y="200" font-size="10" fill="#0f172a" x="520">RLVR: recompensas basadas en reglas (matemáticas, código)</text>
  <text y="215" font-size="10" fill="#5b21b6" font-weight="bold" x="520">Tendencia: PPO → DPO → GRPO (ganancias más sencillas)</text>

  <!-- Distillation path -->
  <rect x="30" y="270" width="850" height="130" rx="10" fill="#f0fdf4" stroke="#166534" stroke-width="2" filter="url(#shadow5)" />
  <text y="295" text-anchor="middle" font-size="15" font-weight="bold" fill="#166534" x="455">Destilación y datos sintéticos</text>

  <!-- Teacher → Student flow -->
  <rect x="60" y="310" width="180" height="45" rx="5" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534" x="150">Maestro grande</text>
  <text y="345" text-anchor="middle" font-size="10" fill="#0f172a" x="150">DeepSeek-R1 (671B)</text>

  <line x1="240" y1="332" x2="305" y2="332" stroke="#166534" stroke-width="2" marker-end="url(#arrow5b)" />
  <text y="325" text-anchor="middle" font-size="9" fill="#166534" x="272">CoT de 800K</text>
  <text y="350" text-anchor="middle" font-size="9" fill="#166534" x="272">ejemplos</text>

  <rect x="305" y="310" width="170" height="45" rx="5" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534" x="390">Estudiante Compacto</text>
  <text y="345" text-anchor="middle" font-size="10" fill="#0f172a" x="390">Modelos destilados de 1,5 mil millones → 70 mil millones</text>

  <!-- Results -->
  <rect x="510" y="310" width="350" height="70" rx="5" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534" x="685">Resultados</text>
  <text y="347" font-size="10" fill="#0f172a" x="530">• 32 mil millones de patrones de sonido extraídos: OpenAI o1-mini</text>
  <text y="362" font-size="10" fill="#0f172a" x="530">• Destilación &gt; RL directo en modelos pequeños</text>
  <text y="377" font-size="10" fill="#166534" font-weight="bold" x="530">• Ruta más eficiente para un razonamiento compacto</text>

  <!-- Connection from alignment to distillation -->
  <path d="M690,230 L690,250 L455,250 L455,270" stroke="#166534" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow5b)" />
  <text y="248" font-size="9" fill="#166534" x="580">El modelo de alineación genera datos de entrenamiento</text>
</svg>
