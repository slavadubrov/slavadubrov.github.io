<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Prefill vs Decode Phases" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Etapas Prefill vs Etapas de decodificación</title>
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b" />
    </marker>
    <marker id="arrow2b" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c" />
    </marker>
    <filter id="shadow2" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="900" height="400" fill="#f8fafc" rx="8" />

  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a" x="450">Prefill frente a Decode: Dos fases, dos cuellos de botella</text>

  <!-- Prefill Phase -->
  <rect x="40" y="55" width="390" height="300" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow2)" />
  <text y="82" text-anchor="middle" font-size="16" font-weight="bold" fill="#1d4ed8" x="235">Prefill Fase</text>

  <!-- Input prompt tokens -->
  <rect x="70" y="100" width="330" height="40" rx="5" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="125" text-anchor="middle" font-size="12" fill="#0f172a" x="235">Entrada Prompt: "Explicar la computación cuántica en..."</text>

  <!-- Parallel processing arrows -->
  <g transform="translate(70, 155)">
    <rect width="60" height="30" rx="4" fill="#2563eb" />
    <text y="20" text-anchor="middle" font-size="10" fill="#ffffff" x="30">Tokén 1</text>
  </g>
  <g transform="translate(140, 155)">
    <rect width="60" height="30" rx="4" fill="#2563eb" />
    <text y="20" text-anchor="middle" font-size="10" fill="#ffffff" x="30">Tokén 2</text>
  </g>
  <g transform="translate(210, 155)">
    <rect width="60" height="30" rx="4" fill="#2563eb" />
    <text y="20" text-anchor="middle" font-size="10" fill="#ffffff" x="30">Tokén 3</text>
  </g>
  <g transform="translate(280, 155)">
    <rect width="50" height="30" rx="4" fill="#2563eb" />
    <text y="20" text-anchor="middle" font-size="10" fill="#ffffff" x="25">...</text>
  </g>
  <g transform="translate(340, 155)">
    <rect width="60" height="30" rx="4" fill="#2563eb" />
    <text y="20" text-anchor="middle" font-size="10" fill="#ffffff" x="30">Tokén N</text>
  </g>
  <text y="205" text-anchor="middle" font-size="11" fill="#1d4ed8" font-weight="bold" x="235">Todos los tokens se procesan en paralelo</text>

  <!-- Properties -->
  <rect x="70" y="220" width="330" height="120" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="1" opacity="0.7" />
  <text y="245" font-size="12" font-weight="bold" fill="#1d4ed8" x="90">LÍMITE DE COMPUTACIÓN</text>
  <text y="265" font-size="11" fill="#0f172a" x="90">• Multiplicaciones de matrices grandes (GEMM)</text>
  <text y="282" font-size="11" fill="#0f172a" x="90">• Núcleos de tensores completamente saturados</text>
  <text y="299" font-size="11" fill="#0f172a" x="90">• Intensidad aritmética ≫ 295 FLOPs/baíta</text>
  <text y="316" font-size="11" fill="#0f172a" x="90">• Determina el TTFT</text>
  <text y="333" font-size="11" fill="#9a3412" font-weight="bold" x="90">• Optimizar: mayor velocidad en GPUs, FP8 y TP</text>

  <!-- Arrow between phases -->
  <line x1="430" y1="200" x2="470" y2="200" stroke="#334155" stroke-width="2" marker-end="url(#arrow2)" />
  <text y="220" text-anchor="middle" font-size="10" fill="#334155" x="450">KV Cache</text>
  <text y="232" text-anchor="middle" font-size="10" fill="#334155" x="450">poblado</text>

  <!-- Decode Phase -->
  <rect x="470" y="55" width="390" height="300" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadow2)" />
  <text y="82" text-anchor="middle" font-size="16" font-weight="bold" fill="#9a3412" x="665">Fase de decodificación</text>

  <!-- Sequential token generation -->
  <rect x="500" y="100" width="330" height="40" rx="5" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="125" text-anchor="middle" font-size="12" fill="#0f172a" x="665">Salida: token → token → token → ...</text>

  <!-- Sequential arrows -->
  <g transform="translate(540, 155)">
    <rect width="60" height="30" rx="4" fill="#ea580c" />
    <text y="20" text-anchor="middle" font-size="10" fill="#ffffff" x="30">t₁</text>
  </g>
  <line x1="600" y1="170" x2="630" y2="170" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow2b)" />
  <g transform="translate(630, 155)">
    <rect width="60" height="30" rx="4" fill="#ea580c" />
    <text y="20" text-anchor="middle" font-size="10" fill="#ffffff" x="30">t₂</text>
  </g>
  <line x1="690" y1="170" x2="720" y2="170" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow2b)" />
  <g transform="translate(720, 155)">
    <rect width="60" height="30" rx="4" fill="#ea580c" />
    <text y="20" text-anchor="middle" font-size="10" fill="#ffffff" x="30">t₃</text>
  </g>
  <text y="205" text-anchor="middle" font-size="11" fill="#9a3412" font-weight="bold" x="665">Un token a la vez, de forma secuencial</text>

  <!-- Properties -->
  <rect x="500" y="220" width="330" height="120" rx="6" fill="#ffffff" stroke="#ea580c" stroke-width="1" opacity="0.7" />
  <text y="245" font-size="12" font-weight="bold" fill="#9a3412" x="520">Límite por ancho de banda de memoria</text>
  <text y="265" font-size="11" fill="#0f172a" x="520">• Multiplicación matriz-vector por paso</text>
  <text y="282" font-size="11" fill="#0f172a" x="520">• Lee los pesos completos junto con KV cache desde HBM</text>
  <text y="299" font-size="11" fill="#0f172a" x="520">• Intensidad aritmética ≈ 1 (300× por debajo del umbral)</text>
  <text y="316" font-size="11" fill="#0f172a" x="520">• Determina el TPOT</text>
  <text y="333" font-size="11" fill="#1d4ed8" font-weight="bold" x="520">• Optimizar: GQA, cuantización de KV, agrupamiento por lotes, ancho de banda</text>

  <!-- Timeline bar at bottom -->
  <rect x="40" y="370" width="820" height="20" rx="3" fill="#f1f5f9" />
  <rect x="40" y="370" width="280" height="20" rx="3" fill="#2563eb" opacity="0.3" />
  <rect x="320" y="370" width="540" height="20" rx="3" fill="#ea580c" opacity="0.3" />
  <text y="384" text-anchor="middle" font-size="10" fill="#1d4ed8" font-weight="bold" x="180">TTFT</text>
  <text y="384" text-anchor="middle" font-size="10" fill="#9a3412" font-weight="bold" x="590">TPOT × tokens de salida</text>
</svg>
