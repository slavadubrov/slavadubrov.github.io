<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="Roboto, Arial, sans-serif">
  <defs>
    <linearGradient id="regGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c62828" />
      <stop offset="100%" stop-color="#e74c3c" />
    </linearGradient>
    <linearGradient id="sramGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e65100" />
      <stop offset="100%" stop-color="#e67e22" />
    </linearGradient>
    <linearGradient id="l2Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6a1b9a" />
      <stop offset="100%" stop-color="#9b59b6" />
    </linearGradient>
    <linearGradient id="hbmGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1565c0" />
      <stop offset="100%" stop-color="#2980b9" />
    </linearGradient>
    <filter id="shadow3" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>

  <rect width="800" height="480" fill="#fafbfc" rx="8" />

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">Jerarquía de memoria de la GPU H100 SXM</text>
  <text x="400" y="52" text-anchor="middle" font-size="12" fill="#666">La pirámide de velocidad de memoria frente a capacidad que impulsa la optimización de los LLM</text>

  <!-- Pyramid layers (top = fastest, smallest) -->

  <!-- Registers -->
  <polygon points="400,80 310,150 490,150" fill="url(#regGrad)" stroke="#c62828" stroke-width="1.5" filter="url(#shadow3)" />
  <text x="400" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Registros</text>
  <text x="400" y="135" text-anchor="middle" font-size="10" fill="#fce4ec">Acceso por hilo</text>
  <text x="400" y="147" text-anchor="middle" font-size="10" fill="#fce4ec">Aquí se realizan los cálculos matemáticos</text>

  <!-- Labels right side -->
  <line x1="452" y1="120" x2="560" y2="120" stroke="#c62828" stroke-width="1" stroke-dasharray="4,3" />
  <text x="570" y="115" font-size="11" fill="#c62828" font-weight="bold">Más rápido</text>
  <text x="570" y="130" font-size="10" fill="#666">Capacidad mínima</text>

  <!-- SRAM / Shared Memory -->
  <polygon points="310,160 240,240 560,240 490,160" fill="url(#sramGrad)" stroke="#e65100" stroke-width="1.5" filter="url(#shadow3)" />
  <text x="400" y="195" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Memoria compartida (SRAM)</text>
  <text x="400" y="212" text-anchor="middle" font-size="11" fill="#fff3e0">227 KB/SM · ~33 TB/s en total</text>
  <text x="400" y="228" text-anchor="middle" font-size="10" fill="#fff3e0">Computaciones de los mosaicos de FlashAttention aquí</text>

  <line x1="526" y1="200" x2="600" y2="200" stroke="#e65100" stroke-width="1" stroke-dasharray="4,3" />
  <text x="610" y="195" font-size="11" fill="#e65100" font-weight="bold">~33 TB/s</text>
  <text x="610" y="210" font-size="10" fill="#666">Memoria de trabajo</text>

  <!-- L2 Cache -->
  <polygon points="240,250 180,320 620,320 560,250" fill="url(#l2Grad)" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadow3)" />
  <text x="400" y="275" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Caché L2</text>
  <text x="400" y="292" text-anchor="middle" font-size="11" fill="#f3e5f5">50 MB · ~12 TB/s</text>
  <text x="400" y="308" text-anchor="middle" font-size="10" fill="#f3e5f5">Buffer de seguridad para todos los SMs</text>

  <line x1="590" y1="285" x2="660" y2="285" stroke="#6a1b9a" stroke-width="1" stroke-dasharray="4,3" />
  <text x="670" y="280" font-size="11" fill="#6a1b9a" font-weight="bold">~12 TB/s</text>
  <text x="670" y="295" font-size="10" fill="#666">Cache compartido</text>

  <!-- HBM3 -->
  <polygon points="180,330 100,420 700,420 620,330" fill="url(#hbmGrad)" stroke="#1565c0" stroke-width="1.5" filter="url(#shadow3)" />
  <text x="400" y="365" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">MEMORIA HBM3 (Alta Ancho de Banda)</text>
  <text x="400" y="385" text-anchor="middle" font-size="12" fill="#e3f2fd">80 GB · 3,35 TB/s</text>
  <text x="400" y="405" text-anchor="middle" font-size="11" fill="#e3f2fd">Los pesos del modelo y la caché KV se encuentran aquí en tiempo real</text>

  <line x1="660" y1="375" x2="720" y2="375" stroke="#1565c0" stroke-width="1" stroke-dasharray="4,3" />
  <text x="725" y="370" font-size="11" fill="#1565c0" font-weight="bold">3,35 TB/s</text>
  <text x="725" y="385" font-size="10" fill="#666">cuello de botella de memoria</text>

  <!-- Left side: Size labels -->
  <text x="90" y="125" font-size="10" fill="#666" text-anchor="end">~KB</text>
  <text x="90" y="200" font-size="10" fill="#666" text-anchor="end">227 KB/SM</text>
  <text x="90" y="285" font-size="10" fill="#666" text-anchor="end">50 MB</text>
  <text x="90" y="375" font-size="10" fill="#666" text-anchor="end">80 GB</text>

  <!-- Bottom insight box -->
  <rect x="100" y="435" width="600" height="35" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" />
  <text x="400" y="457" text-anchor="middle" font-size="12" fill="#e65100" font-weight="bold">Conclusión clave: Cada optimización de modelos de lenguaje grande existe para mantener los datos en SRAM y minimizar las lecturas desde HBM.</text>
</svg>
