<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 490" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="Code Execution Flow" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Flujo de ejecución de código</title>
  <defs>
    <filter id="shadowC" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
    <marker id="arrowC" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626" />
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#166534" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a" x="500">Llamada a herramientas tradicionales frente a ejecución de código</text>

  <!-- Top: Traditional (red/expensive) -->
  <text y="60" text-anchor="middle" font-size="13" font-weight="600" fill="#991b1b" x="500">Tradicional: más de 20 pasos de inferencia, todos los datos fluyen a través del contexto</text>

  <!-- Traditional flow boxes -->
  <rect x="30" y="75" width="110" height="50" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadowC)" />
  <text y="96" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6" x="85">LLM Llamada 1</text>
  <text y="110" text-anchor="middle" font-size="9" fill="#64748b" x="85">obtener_miembros</text>

  <line x1="140" y1="100" x2="165" y2="100" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrowRed)" />

  <rect x="170" y="75" width="80" height="50" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#shadowC)" />
  <text y="96" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b" x="210">Herramienta</text>
  <text y="110" text-anchor="middle" font-size="9" fill="#64748b" x="210">API llamada</text>

  <line x1="250" y1="100" x2="275" y2="100" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrowRed)" />

  <rect x="280" y="75" width="110" height="50" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadowC)" />
  <text y="96" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6" x="335">LLM Llamada 2</text>
  <text y="110" text-anchor="middle" font-size="9" fill="#64748b" x="335">obtener_gastos</text>

  <line x1="390" y1="100" x2="415" y2="100" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrowRed)" />

  <rect x="420" y="75" width="80" height="50" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#shadowC)" />
  <text y="96" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b" x="460">Herramienta</text>
  <text y="110" text-anchor="middle" font-size="9" fill="#64748b" x="460">API llamada</text>

  <line x1="500" y1="100" x2="525" y2="100" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrowRed)" />

  <rect x="530" y="75" width="110" height="50" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadowC)" />
  <text y="96" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6" x="585">LLM Llamada 3</text>
  <text y="110" text-anchor="middle" font-size="9" fill="#64748b" x="585">procesar datos</text>

  <!-- Dots indicating more -->
  <text y="105" font-size="20" fill="#991b1b" x="665">...</text>

  <rect x="700" y="75" width="110" height="50" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadowC)" />
  <text y="96" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6" x="755">LLM Llamada 20</text>
  <text y="110" text-anchor="middle" font-size="9" fill="#64748b" x="755">sintetizar</text>

  <!-- Token cost label -->
  <rect x="840" y="78" width="140" height="44" rx="6" fill="#dc2626" filter="url(#shadowC)" />
  <text y="98" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff" x="910">~150,000</text>
  <text y="114" text-anchor="middle" font-size="10" fill="#dc2626" x="910">tokens</text>

  <!-- Divider -->
  <line x1="30" y1="155" x2="970" y2="155" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,3" />
  <text y="175" text-anchor="middle" font-size="10" fill="#64748b" x="500">versus</text>

  <!-- Bottom: Code Execution (green/efficient) -->
  <text y="205" text-anchor="middle" font-size="13" font-weight="600" fill="#166534" x="500">Ejecución de código: 1 paso de inferencia, los datos permanecen en sandbox</text>

  <!-- Code execution flow -->
  <rect x="30" y="225" width="160" height="70" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadowC)" />
  <text y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6" x="110">LLM (1 llamada)</text>
  <text y="268" text-anchor="middle" font-size="9" fill="#64748b" x="110">Escribe script en Python</text>
  <text y="282" text-anchor="middle" font-size="9" fill="#64748b" x="110">con bucles y lógica</text>

  <line x1="190" y1="260" x2="235" y2="260" stroke="#166534" stroke-width="2" marker-end="url(#arrowGreen)" />
  <text y="252" text-anchor="middle" font-size="9" fill="#166534" x="212">código</text>

  <!-- Sandbox box -->
  <rect x="240" y="215" width="520" height="110" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="2" stroke-dasharray="6,3" filter="url(#shadowC)" />
  <text y="236" text-anchor="middle" font-size="11" font-weight="600" fill="#166534" x="500">Entorno de ejecución aislado</text>

  <!-- Inside sandbox: parallel tool calls -->
  <rect x="265" y="248" width="100" height="55" rx="4" fill="#ffffff" stroke="#16a34a" stroke-width="1.5" />
  <text y="268" text-anchor="middle" font-size="9" font-weight="600" fill="#166534" x="315">get_members()</text>
  <text y="282" text-anchor="middle" font-size="9" fill="#64748b" x="315">para m en miembros:</text>
  <text y="295" text-anchor="middle" font-size="9" fill="#64748b" x="315">obtener_gastos()</text>

  <rect x="385" y="248" width="100" height="55" rx="4" fill="#ffffff" stroke="#16a34a" stroke-width="1.5" />
  <text y="268" text-anchor="middle" font-size="9" font-weight="600" fill="#166534" x="435">filter()</text>
  <text y="282" text-anchor="middle" font-size="9" fill="#64748b" x="435">si total &gt; presupuesto:</text>
  <text y="295" text-anchor="middle" font-size="9" fill="#64748b" x="435">over_budget.add()</text>

  <rect x="505" y="248" width="100" height="55" rx="4" fill="#ffffff" stroke="#16a34a" stroke-width="1.5" />
  <text y="268" text-anchor="middle" font-size="9" font-weight="600" fill="#166534" x="555">aggregate()</text>
  <text y="282" text-anchor="middle" font-size="9" fill="#64748b" x="555">json.dumps()</text>
  <text y="295" text-anchor="middle" font-size="9" fill="#64748b" x="555">por encima del presupuesto)</text>

  <!-- Arrows between sandbox stages -->
  <line x1="365" y1="275" x2="380" y2="275" stroke="#16a34a" stroke-width="1" marker-end="url(#arrowGreen)" />
  <line x1="485" y1="275" x2="500" y2="275" stroke="#16a34a" stroke-width="1" marker-end="url(#arrowGreen)" />

  <!-- Data stays label -->
  <rect x="625" y="250" width="120" height="50" rx="4" fill="#166534" opacity="0.1" stroke="#166534" stroke-width="1" />
  <text y="270" text-anchor="middle" font-size="9" font-weight="600" fill="#166534" x="685">miles de</text>
  <text y="284" text-anchor="middle" font-size="9" font-weight="600" fill="#166534" x="685">registros procesados</text>
  <text y="296" text-anchor="middle" font-size="9" fill="#166534" x="685">aquí, no en contexto</text>

  <!-- Output arrow from sandbox -->
  <line x1="760" y1="270" x2="805" y2="270" stroke="#166534" stroke-width="2" marker-end="url(#arrowGreen)" />
  <text y="262" text-anchor="middle" font-size="9" fill="#166534" x="782">resumen</text>

  <!-- Final result -->
  <rect x="810" y="240" width="160" height="55" rx="6" fill="#166534" filter="url(#shadowC)" />
  <text y="262" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff" x="890">~2,000 tokens</text>
  <text y="280" text-anchor="middle" font-size="10" fill="#16a34a" x="890">reducción del 98,7%</text>

  <!-- Bottom comparison -->
  <rect x="100" y="360" width="800" height="85" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
  <text y="385" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a" x="500">Por qué la ejecución de código es superior</text>
  <text y="410" text-anchor="middle" font-size="10" fill="#334155" x="230">Bucles y condicionales nativos</text>
  <text y="425" text-anchor="middle" font-size="9" fill="#64748b" x="230">No se necesita JSON schema</text>
  <text y="410" text-anchor="middle" font-size="10" fill="#334155" x="500">Los datos permanecen en sandbox</text>
  <text y="425" text-anchor="middle" font-size="9" fill="#64748b" x="500">Solo el resultado final llega al contexto</text>
  <text y="410" text-anchor="middle" font-size="10" fill="#334155" x="770">1 paso de inferencia para N llamadas</text>
  <text y="425" text-anchor="middle" font-size="9" fill="#64748b" x="770">vs N pasadas tradicionales</text>

  <!-- Sources -->
  <text y="470" font-size="9" fill="#64748b" x="100">Fuentes: de ~150K a ~2K tokens (reducción del 98,7%) — Anthropic “Ejecución de código con MCP”; +20% en tasa de éxito de las tareas — CodeAct, Wang et al. (arXiv:2402.01030, ICML 2024)</text>
  <text y="482" font-size="9" fill="#64748b" x="100">Patrón de ejemplo PTC: “Advanced tool use / Llamadas programáticas a herramientas” de Anthropic</text>
</svg>
