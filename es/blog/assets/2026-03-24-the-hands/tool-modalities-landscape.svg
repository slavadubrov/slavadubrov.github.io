<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 560" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Cinco modalidades de herramientas para agentes de IA</title>
  <desc id="artifact-desc">Cinco modalidades de herramientas para agentes de IA.</desc>
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a" x="550">Cinco modalidades de herramientas para agentes de IA</text>
  <text y="50" text-anchor="middle" font-size="11" fill="#64748b" x="550">De esquemas verbosos a ejecución sin sobrecarga</text>

  <!-- Central Agent Node -->
  <rect x="460" y="70" width="180" height="50" rx="25" fill="#7c3aed" filter="url(#shadow)" />
  <text y="100" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff" x="550">Agente de IA</text>

  <!-- Connecting lines from agent to each modality -->
  <line x1="480" y1="120" x2="140" y2="175" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="510" y1="120" x2="360" y2="175" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="550" y1="120" x2="550" y2="175" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="590" y1="120" x2="740" y2="175" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="620" y1="120" x2="960" y2="175" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- 1. JSON Tool Calling -->
  <rect x="30" y="175" width="200" height="130" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
  <text y="200" text-anchor="middle" font-size="13" font-weight="600" fill="#1d4ed8" x="130">Llamada a la herramienta JSON</text>
  <line x1="50" y1="210" x2="210" y2="210" stroke="#2563eb" stroke-width="0.5" opacity="0.3" />
  <text y="228" text-anchor="middle" font-size="10" fill="#334155" x="130">Estructura por solicitud</text>
  <text y="244" text-anchor="middle" font-size="10" fill="#334155" x="130">Llamadas secuenciales 1:1</text>
  <text y="260" text-anchor="middle" font-size="10" fill="#334155" x="130">E/S estructurada</text>
  <rect x="55" y="275" width="150" height="20" rx="4" fill="#2563eb" opacity="0.15" />
  <text y="290" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8" x="130">Coste operativo medio</text>

  <!-- 2. MCP -->
  <rect x="255" y="175" width="200" height="130" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2" filter="url(#shadow)" />
  <text y="200" text-anchor="middle" font-size="13" font-weight="600" fill="#991b1b" x="355">Servidores MCP</text>
  <line x1="275" y1="210" x2="435" y2="210" stroke="#dc2626" stroke-width="0.5" opacity="0.3" />
  <text y="228" text-anchor="middle" font-size="10" fill="#334155" x="355">550-1,400 tokens por herramienta</text>
  <text y="244" text-anchor="middle" font-size="10" fill="#334155" x="355">Más de 10K servidores, más de 50 CVEs</text>
  <text y="260" text-anchor="middle" font-size="10" fill="#334155" x="355">Estándar multi-proveedor</text>
  <rect x="280" y="275" width="150" height="20" rx="4" fill="#dc2626" opacity="0.15" />
  <text y="290" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b" x="355">Coste de sobrecarga muy elevado</text>

  <!-- 3. Skills (SKILL.md) -->
  <rect x="475" y="175" width="200" height="130" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)" />
  <text y="200" text-anchor="middle" font-size="13" font-weight="600" fill="#5b21b6" x="575">Habilidades (SKILL.md)</text>
  <line x1="495" y1="210" x2="655" y2="210" stroke="#7c3aed" stroke-width="0.5" opacity="0.3" />
  <text y="228" text-anchor="middle" font-size="10" fill="#334155" x="575">Metadatos de ~100 tokens</text>
  <text y="244" text-anchor="middle" font-size="10" fill="#334155" x="575">Experto, no ejecución</text>
  <text y="260" text-anchor="middle" font-size="10" fill="#334155" x="575">8+ plataformas adoptadas</text>
  <rect x="500" y="275" width="150" height="20" rx="4" fill="#7c3aed" opacity="0.15" />
  <text y="290" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6" x="575">Coste de sobrecarga muy bajo</text>

  <!-- 4. CLI/Bash -->
  <rect x="695" y="175" width="200" height="130" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="2" filter="url(#shadow)" />
  <text y="200" text-anchor="middle" font-size="13" font-weight="600" fill="#166534" x="795">Herramientas CLI / Bash</text>
  <line x1="715" y1="210" x2="875" y2="210" stroke="#166534" stroke-width="0.5" opacity="0.3" />
  <text y="228" text-anchor="middle" font-size="10" fill="#334155" x="795">Manifiesto de ~100 tokens</text>
  <text y="244" text-anchor="middle" font-size="10" fill="#334155" x="795">Fluidez del modelo nativo</text>
  <text y="260" text-anchor="middle" font-size="10" fill="#334155" x="795">Tuberías, composibilidad</text>
  <rect x="720" y="275" width="150" height="20" rx="4" fill="#166534" opacity="0.15" />
  <text y="290" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="795">Carga adicional casi nula</text>

  <!-- 5. Code Execution (PTC) -->
  <rect x="895" y="175" width="200" height="130" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadow)" />
  <text y="200" text-anchor="middle" font-size="13" font-weight="600" fill="#9a3412" x="995">Ejecución de código</text>
  <line x1="915" y1="210" x2="1075" y2="210" stroke="#ea580c" stroke-width="0.5" opacity="0.3" />
  <text y="228" text-anchor="middle" font-size="10" fill="#334155" x="995">Reducción del 98,7% en tokens</text>
  <text y="244" text-anchor="middle" font-size="10" fill="#334155" x="995">+20% de éxito en tareas</text>
  <text y="260" text-anchor="middle" font-size="10" fill="#334155" x="995">Bucles, condicionales</text>
  <rect x="920" y="275" width="150" height="20" rx="4" fill="#ea580c" opacity="0.15" />
  <text y="290" text-anchor="middle" font-size="10" font-weight="600" fill="#9a3412" x="995">Mínimo costo por tarea</text>

  <!-- Bottom spectrum bar -->
  <text y="340" font-size="10" font-weight="600" fill="#64748b" x="30">Coste por token (máximo → mínimo)</text>
  <rect x="30" y="350" width="1060" height="24" rx="12" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" />
  <!-- Gradient fill segments — ordered highest to lowest overhead -->
  <rect x="31" y="351" width="212" height="22" rx="11" fill="#fef2f2" opacity="0.7" />
  <rect x="243" y="351" width="212" height="22" rx="0" fill="#eff6ff" opacity="0.7" />
  <rect x="455" y="351" width="212" height="22" rx="0" fill="#faf5ff" opacity="0.7" />
  <rect x="667" y="351" width="212" height="22" rx="0" fill="#f0fdf4" opacity="0.7" />
  <rect x="879" y="351" width="210" height="22" rx="11" fill="#fff7ed" opacity="0.7" />

  <text y="367" text-anchor="middle" font-size="9" font-weight="600" fill="#991b1b" x="137">Más de 55K tokens</text>
  <text y="367" text-anchor="middle" font-size="9" font-weight="600" fill="#1d4ed8" x="349">Medio</text>
  <text y="367" text-anchor="middle" font-size="9" font-weight="600" fill="#5b21b6" x="561">~100 tokens</text>
  <text y="367" text-anchor="middle" font-size="9" font-weight="600" fill="#166534" x="773">~100 tokens</text>
  <text y="367" text-anchor="middle" font-size="9" font-weight="600" fill="#9a3412" x="984">2 herramientas metainformáticas</text>

  <!-- Best-for labels -->
  <text y="405" font-size="10" font-weight="600" fill="#64748b" x="30">MEJOR PARA</text>
  <rect x="30" y="415" width="200" height="45" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1" />
  <text y="434" text-anchor="middle" font-size="9" fill="#1d4ed8" x="130">Simple, de acción única</text>
  <text y="448" text-anchor="middle" font-size="9" fill="#1d4ed8" x="130">llamadas a la API</text>

  <rect x="255" y="415" width="200" height="45" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1" />
  <text y="434" text-anchor="middle" font-size="9" fill="#991b1b" x="355">SaaS multi-proveedor</text>
  <text y="448" text-anchor="middle" font-size="9" fill="#991b1b" x="355">integración</text>

  <rect x="475" y="415" width="200" height="45" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="1" />
  <text y="434" text-anchor="middle" font-size="9" fill="#5b21b6" x="575">Experiencia en el dominio</text>
  <text y="448" text-anchor="middle" font-size="9" fill="#5b21b6" x="575">transferencia</text>

  <rect x="695" y="415" width="200" height="45" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1" />
  <text y="434" text-anchor="middle" font-size="9" fill="#166534" x="795">Flujos de trabajo de desarrollo,</text>
  <text y="448" text-anchor="middle" font-size="9" fill="#166534" x="795">operaciones locales</text>

  <rect x="895" y="415" width="200" height="45" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1" />
  <text y="434" text-anchor="middle" font-size="9" fill="#9a3412" x="995">Múltiples pasos</text>
  <text y="448" text-anchor="middle" font-size="9" fill="#9a3412" x="995">orquestación</text>

  <!-- Legend -->
  <text y="495" font-size="10" fill="#64748b" x="30">El cambio de 2026: los equipos de producción se están desplazando hacia la derecha, pasando de esquemas verbosos a una ejecución basada en código</text>
  <line x1="700" y1="488" x2="1060" y2="488" stroke="#ea580c" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow)" />
  <text y="510" text-anchor="middle" font-size="9" font-weight="600" fill="#9a3412" x="880">Dirección de adopción de la producción</text>

  <!-- Sources -->
  <text y="540" font-size="9" fill="#64748b" x="30">Fuentes: datos de tokens MCP — Apideck (apideck.com/blog); más de 50 CVEs — vulnerablemcp.info; CodeAct +20% — Wang et al. (arXiv:2402.01030, ICML 2024);</text>
  <text y="552" font-size="9" fill="#64748b" x="30">Reducción del 98,7%: ejecución de código con MCP de Anthropic; habilidades: ~100 tokens — estándar SKILL.md; CLI: ~100 tokens — benchmark de Scalekit (scalekit.com/blog)</text>
</svg>
