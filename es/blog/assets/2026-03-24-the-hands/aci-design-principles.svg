<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 580" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Principios de diseño de la interfaz agente-computadora (ACI)</title>
  <desc id="artifact-desc">Principios de diseño de la interfaz agente-computadora (ACI).</desc>
  <defs>
    <filter id="shadowA" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
    <marker id="arrowA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a" x="500">Principios de diseño de la interfaz agente-computadora (ACI)</text>
  <text y="50" text-anchor="middle" font-size="11" fill="#64748b" x="500">Procedente de SWE-agent (Yang et al., NeurIPS 2024): mejora de 10,7 pp en SWE-bench únicamente gracias al diseño de la interfaz.</text>

  <!-- Central circle: Agent -->
  <circle cx="500" cy="200" r="55" fill="#7c3aed" filter="url(#shadowA)" />
  <text y="195" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff" x="500">LLM</text>
  <text y="212" text-anchor="middle" font-size="11" fill="#7c3aed" x="500">Agente</text>

  <!-- Principle 1: Simple Actions (top-left) -->
  <line x1="455" y1="160" x2="240" y2="100" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrowA)" />
  <rect x="30" y="65" width="220" height="100" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadowA)" />
  <text y="90" font-size="12" font-weight="700" fill="#1d4ed8" x="50">1</text>
  <circle cx="50" cy="86" r="12" fill="none" stroke="#2563eb" stroke-width="2" />
  <text y="90" font-size="12" font-weight="600" fill="#1d4ed8" x="76">Acciones simples</text>
  <text y="112" text-anchor="middle" font-size="10" fill="#334155" x="140">Pocas opciones, documentación concisa</text>
  <text y="126" text-anchor="middle" font-size="10" fill="#334155" x="140">No se requieren demostraciones</text>
  <text y="148" text-anchor="middle" font-size="9" font-style="italic" fill="#64748b" x="140">programar_evento no</text>
  <text y="160" text-anchor="middle" font-size="9" font-style="italic" fill="#64748b" x="140">list_users + create_event</text>

  <!-- Principle 2: Compact and Efficient (top-right) -->
  <line x1="545" y1="160" x2="760" y2="100" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrowA)" />
  <rect x="750" y="65" width="220" height="100" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadowA)" />
  <text y="90" font-size="12" font-weight="700" fill="#9a3412" x="770">2</text>
  <circle cx="770" cy="86" r="12" fill="none" stroke="#ea580c" stroke-width="2" />
  <text y="90" font-size="12" font-weight="600" fill="#9a3412" x="796">Compacto y eficiente</text>
  <text y="112" text-anchor="middle" font-size="10" fill="#334155" x="860">Consolidar operaciones</text>
  <text y="126" text-anchor="middle" font-size="10" fill="#334155" x="860">Minimizar viajes de ida y vuelta</text>
  <text y="148" text-anchor="middle" font-size="9" font-style="italic" fill="#64748b" x="860">registros_de_búsqueda con filtros, no</text>
  <text y="160" text-anchor="middle" font-size="9" font-style="italic" fill="#64748b" x="860">lectura de registros + grep</text>

  <!-- Principle 3: Informative Feedback (bottom-left) -->
  <line x1="455" y1="240" x2="240" y2="320" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrowA)" />
  <rect x="30" y="290" width="220" height="100" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="2" filter="url(#shadowA)" />
  <text y="315" font-size="12" font-weight="700" fill="#166534" x="50">3</text>
  <circle cx="50" cy="311" r="12" fill="none" stroke="#166534" stroke-width="2" />
  <text y="315" font-size="12" font-weight="600" fill="#166534" x="76">Comentarios concisos</text>
  <text y="337" text-anchor="middle" font-size="10" fill="#334155" x="140">Sustantivo, sin excesos de detalle</text>
  <text y="351" text-anchor="middle" font-size="10" fill="#334155" x="140">Salida legible por máquina</text>
  <text y="373" text-anchor="middle" font-size="9" font-style="italic" fill="#64748b" x="140">Devuelva IDs semánticos, no</text>
  <text y="385" text-anchor="middle" font-size="9" font-style="italic" fill="#64748b" x="140">HTML sin procesar o cargas completas</text>

  <!-- Principle 4: Error Guardrails (bottom-right) -->
  <line x1="545" y1="240" x2="760" y2="320" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrowA)" />
  <rect x="750" y="290" width="220" height="100" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2" filter="url(#shadowA)" />
  <text y="315" font-size="12" font-weight="700" fill="#991b1b" x="770">4</text>
  <circle cx="770" cy="311" r="12" fill="none" stroke="#dc2626" stroke-width="2" />
  <text y="315" font-size="12" font-weight="600" fill="#991b1b" x="796">Barrieras de seguridad</text>
  <text y="337" text-anchor="middle" font-size="10" fill="#334155" x="860">Detección automática de errores</text>
  <text y="351" text-anchor="middle" font-size="10" fill="#334155" x="860">Evitar la propagación de errores</text>
  <text y="373" text-anchor="middle" font-size="9" font-style="italic" fill="#64748b" x="860">El linter detecta el 51,7 % de</text>
  <text y="385" text-anchor="middle" font-size="9" font-style="italic" fill="#64748b" x="860">errores de edición del agente (SWE-agent)</text>

  <!-- Bottom result bar -->
  <rect x="100" y="440" width="800" height="55" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadowA)" />
  <text y="463" text-anchor="middle" font-size="13" font-weight="600" fill="#5b21b6" x="500">Impacto: 18,0 % frente al 7,3 % en SWE-bench Lite</text>
  <text y="483" text-anchor="middle" font-size="11" fill="#334155" x="500">Mejora de 10,7 puntos porcentuales únicamente con el diseño ACI, sin cambios en el modelo.</text>

  <!-- Connection labels -->
  <text y="120" text-anchor="middle" font-size="9" fill="#5b21b6" x="340" transform="rotate(-15, 340, 120)">utiliza herramientas</text>
  <text y="120" text-anchor="middle" font-size="9" fill="#5b21b6" x="660" transform="rotate(15, 660, 120)">lee la salida</text>
  <text y="300" text-anchor="middle" font-size="9" fill="#5b21b6" x="340" transform="rotate(15, 340, 300)">recibe retroalimentación</text>
  <text y="300" text-anchor="middle" font-size="9" fill="#5b21b6" x="660" transform="rotate(-15, 660, 300)">recuperación de errores</text>

  <!-- Source -->
  <text y="530" text-anchor="middle" font-size="9" fill="#64748b" x="500">Fuente: Yang, Jiménez y colaboradores, "SWE-agent: Las interfaces agente-computadora permiten la ingeniería de software automatizada" (arXiv:2405.15793, NeurIPS 2024)</text>
  <text y="545" text-anchor="middle" font-size="9" fill="#64748b" x="500">Principios adoptados por Anthropic en “Building Effective Agents” (diciembre de 2024)</text>
</svg>
