<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 795" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Orden de evaluación de permisos de Claude Code</title>
  <desc id="artifact-desc">Orden de evaluación de permisos de Claude Code.</desc>
  <defs>
    <filter id="shadowP" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
    <marker id="arrowP" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
    </marker>
    <marker id="arrowPgreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#166534" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <text y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a" x="450">Orden de evaluación de permisos de Claude Code</text>
  <text y="50" text-anchor="middle" font-size="11" fill="#64748b" x="450">Cada llamada a una herramienta pasa por seis filtros antes de ejecutarse. Los ganchos tienen prioridad sobre los modos.</text>

  <!-- Start: tool call -->
  <rect x="340" y="75" width="220" height="46" rx="8" fill="#7c3aed" filter="url(#shadowP)" />
  <text y="102" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff" x="450">El modelo emite una llamada a la herramienta</text>
  <line x1="450" y1="121" x2="450" y2="143" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowP)" />

  <!-- Gate 1: Deny rules -->
  <rect x="200" y="148" width="500" height="54" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2" filter="url(#shadowP)" />
  <text y="172" font-size="12" font-weight="700" fill="#991b1b" x="220">1 · reglas de denegación (mayor prioridad)</text>
  <text y="190" font-size="10" fill="#334155" x="220">El bloqueo se mantiene incluso bajo bypassPermissions. Las rutas protegidas (.git/, .claude/) se encuentran aquí.</text>
  <line x1="450" y1="202" x2="450" y2="223" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowP)" />

  <!-- Gate 2: Ask rules -->
  <rect x="200" y="228" width="500" height="54" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadowP)" />
  <text y="252" font-size="12" font-weight="700" fill="#9a3412" x="220">2 · Preguntar sobre reglas</text>
  <text y="270" font-size="10" fill="#334155" x="220">Patrones que siempre requieren un prompt antes de que se ejecute siquiera la capa de gancho.</text>
  <line x1="450" y1="282" x2="450" y2="303" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowP)" />

  <!-- Gate 3: PreToolUse Hooks -->
  <rect x="200" y="308" width="500" height="54" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadowP)" />
  <text y="332" font-size="12" font-weight="700" fill="#1d4ed8" x="220">3 · Ganchos de PreToolUse</text>
  <text y="350" font-size="10" fill="#334155" x="220">La decisión de permisos “deny” anula incluso a bypassPermissions; los hooks tienen prioridad sobre los modos.</text>
  <line x1="450" y1="362" x2="450" y2="383" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowP)" />

  <!-- Gate 4: Allow rules -->
  <rect x="200" y="388" width="500" height="54" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="2" filter="url(#shadowP)" />
  <text y="412" font-size="12" font-weight="700" fill="#166534" x="220">4 · permitir reglas</text>
  <text y="430" font-size="10" fill="#334155" x="220">Patrones que el espacio de trabajo aprueba explícitamente. Omitir la solicitud de modo.</text>
  <line x1="450" y1="442" x2="450" y2="463" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowP)" />

  <!-- Gate 5: Permission mode -->
  <rect x="200" y="468" width="500" height="54" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadowP)" />
  <text y="492" font-size="12" font-weight="700" fill="#9a3412" x="220">5 · modo de permisos</text>
  <text y="510" font-size="10" fill="#334155" x="220">Por defecto · Aceptar ediciones · Plan · Automático · Evitar permisos · No preguntar (seis preajustes)</text>
  <line x1="450" y1="522" x2="450" y2="543" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowP)" />

  <!-- Gate 6: canUseTool callback -->
  <rect x="200" y="548" width="500" height="54" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadowP)" />
  <text y="572" font-size="12" font-weight="700" fill="#5b21b6" x="220">6 · Callback canUseTool</text>
  <text y="590" font-size="10" fill="#334155" x="220">Veto programático dentro del SDK: última oportunidad para interceptar antes de la ejecución.</text>
  <line x1="450" y1="602" x2="450" y2="645" stroke="#166534" stroke-width="2" marker-end="url(#arrowPgreen)" />

  <!-- Execute -->
  <rect x="340" y="650" width="220" height="42" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="2" filter="url(#shadowP)" />
  <text y="676" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="450">Ejecutar herramienta</text>

  <!-- Side notes -->
  <rect x="720" y="150" width="170" height="42" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="1" />
  <text y="170" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b" x="805">deny → rechazado</text>
  <text y="185" text-anchor="middle" font-size="9" fill="#334155" x="805">siempre, sin excepciones</text>

  <rect x="720" y="230" width="170" height="42" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="250" text-anchor="middle" font-size="10" font-weight="600" fill="#9a3412" x="805">preguntar → interactivo</text>
  <text y="265" text-anchor="middle" font-size="9" fill="#334155" x="805">siempre solicita al usuario</text>

  <rect x="720" y="310" width="170" height="42" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="330" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8" x="805">ganchos &gt; modos</text>
  <text y="345" text-anchor="middle" font-size="9" fill="#334155" x="805">la verdadera red de seguridad</text>

  <rect x="720" y="390" width="170" height="42" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="410" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="805">permitir → atajo</text>
  <text y="425" text-anchor="middle" font-size="9" fill="#334155" x="805">omitar el modo</text>

  <rect x="720" y="470" width="170" height="42" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="490" text-anchor="middle" font-size="10" font-weight="600" fill="#9a3412" x="805">modo: respuesta predeterminada</text>
  <text y="505" text-anchor="middle" font-size="9" fill="#334155" x="805">un preset a la vez</text>

  <rect x="720" y="550" width="170" height="42" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text y="570" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6" x="805">veto a nivel de SDK</text>
  <text y="585" text-anchor="middle" font-size="9" fill="#334155" x="805">se ejecuta en el código de tu aplicación</text>

  <text y="720" text-anchor="middle" font-size="9" font-style="italic" fill="#64748b" x="450">Origen: code.claude.com/docs/es/permission-modes</text>
  <text y="745" text-anchor="middle" font-size="11" fill="#0f172a" font-weight="600" x="450">El permiso es una infraestructura, no una petición.</text>
</svg>
