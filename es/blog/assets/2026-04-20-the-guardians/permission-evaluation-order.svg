<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 795" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadowP" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1" />
    </filter>
    <marker id="arrowP" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555" />
    </marker>
    <marker id="arrowPgreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32" />
    </marker>
  </defs>

  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">Orden de evaluación de permisos de Claude Code</text>
  <text x="450" y="50" text-anchor="middle" font-size="11" fill="#888">Cada llamada a una herramienta pasa por seis filtros antes de ejecutarse. Los ganchos tienen prioridad sobre los modos.</text>

  <!-- Start: tool call -->
  <rect x="340" y="75" width="220" height="46" rx="8" fill="#6a1b9a" filter="url(#shadowP)" />
  <text x="450" y="102" text-anchor="middle" font-size="13" font-weight="600" fill="white">El modelo emite una llamada a la herramienta</text>
  <line x1="450" y1="121" x2="450" y2="143" stroke="#555" stroke-width="2" marker-end="url(#arrowP)" />

  <!-- Gate 1: Deny rules -->
  <rect x="200" y="148" width="500" height="54" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="2" filter="url(#shadowP)" />
  <text x="220" y="172" font-size="12" font-weight="700" fill="#c62828">1 · reglas de denegación (mayor prioridad)</text>
  <text x="220" y="190" font-size="10" fill="#555">El bloqueo se mantiene incluso bajo bypassPermissions. Las rutas protegidas (.git/, .claude/) se encuentran aquí.</text>
  <line x1="450" y1="202" x2="450" y2="223" stroke="#555" stroke-width="2" marker-end="url(#arrowP)" />

  <!-- Gate 2: Ask rules -->
  <rect x="200" y="228" width="500" height="54" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="2" filter="url(#shadowP)" />
  <text x="220" y="252" font-size="12" font-weight="700" fill="#e65100">2 · Preguntar sobre reglas</text>
  <text x="220" y="270" font-size="10" fill="#555">Patrones que siempre requieren un prompt antes de que se ejecute siquiera la capa de gancho.</text>
  <line x1="450" y1="282" x2="450" y2="303" stroke="#555" stroke-width="2" marker-end="url(#arrowP)" />

  <!-- Gate 3: PreToolUse Hooks -->
  <rect x="200" y="308" width="500" height="54" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" filter="url(#shadowP)" />
  <text x="220" y="332" font-size="12" font-weight="700" fill="#1565c0">3 · Ganchos de PreToolUse</text>
  <text x="220" y="350" font-size="10" fill="#555">La decisión de permisos “deny” anula incluso a bypassPermissions; los hooks tienen prioridad sobre los modos.</text>
  <line x1="450" y1="362" x2="450" y2="383" stroke="#555" stroke-width="2" marker-end="url(#arrowP)" />

  <!-- Gate 4: Allow rules -->
  <rect x="200" y="388" width="500" height="54" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" filter="url(#shadowP)" />
  <text x="220" y="412" font-size="12" font-weight="700" fill="#2e7d32">4 · permitir reglas</text>
  <text x="220" y="430" font-size="10" fill="#555">Patrones que el espacio de trabajo aprueba explícitamente. Omitir la solicitud de modo.</text>
  <line x1="450" y1="442" x2="450" y2="463" stroke="#555" stroke-width="2" marker-end="url(#arrowP)" />

  <!-- Gate 5: Permission mode -->
  <rect x="200" y="468" width="500" height="54" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="2" filter="url(#shadowP)" />
  <text x="220" y="492" font-size="12" font-weight="700" fill="#e65100">5 · modo de permisos</text>
  <text x="220" y="510" font-size="10" fill="#555">Por defecto · Aceptar ediciones · Plan · Automático · Evitar permisos · No preguntar (seis preajustes)</text>
  <line x1="450" y1="522" x2="450" y2="543" stroke="#555" stroke-width="2" marker-end="url(#arrowP)" />

  <!-- Gate 6: canUseTool callback -->
  <rect x="200" y="548" width="500" height="54" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" filter="url(#shadowP)" />
  <text x="220" y="572" font-size="12" font-weight="700" fill="#6a1b9a">6 · Callback canUseTool</text>
  <text x="220" y="590" font-size="10" fill="#555">Veto programático dentro del SDK: última oportunidad para interceptar antes de la ejecución.</text>
  <line x1="450" y1="602" x2="450" y2="645" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowPgreen)" />

  <!-- Execute -->
  <rect x="340" y="650" width="220" height="42" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" filter="url(#shadowP)" />
  <text x="450" y="676" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Ejecutar herramienta</text>

  <!-- Side notes -->
  <rect x="720" y="150" width="170" height="42" rx="8" fill="#f8f9fa" stroke="#c62828" stroke-width="1" />
  <text x="805" y="170" text-anchor="middle" font-size="10" font-weight="600" fill="#c62828">deny → rechazado</text>
  <text x="805" y="185" text-anchor="middle" font-size="9" fill="#555">siempre, sin excepciones</text>

  <rect x="720" y="230" width="170" height="42" rx="8" fill="#f8f9fa" stroke="#e65100" stroke-width="1" />
  <text x="805" y="250" text-anchor="middle" font-size="10" font-weight="600" fill="#e65100">preguntar → interactivo</text>
  <text x="805" y="265" text-anchor="middle" font-size="9" fill="#555">siempre solicita al usuario</text>

  <rect x="720" y="310" width="170" height="42" rx="8" fill="#f8f9fa" stroke="#1565c0" stroke-width="1" />
  <text x="805" y="330" text-anchor="middle" font-size="10" font-weight="600" fill="#1565c0">ganchos &gt; modos</text>
  <text x="805" y="345" text-anchor="middle" font-size="9" fill="#555">la verdadera red de seguridad</text>

  <rect x="720" y="390" width="170" height="42" rx="8" fill="#f8f9fa" stroke="#2e7d32" stroke-width="1" />
  <text x="805" y="410" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">permitir → atajo</text>
  <text x="805" y="425" text-anchor="middle" font-size="9" fill="#555">omitar el modo</text>

  <rect x="720" y="470" width="170" height="42" rx="8" fill="#f8f9fa" stroke="#e65100" stroke-width="1" />
  <text x="805" y="490" text-anchor="middle" font-size="10" font-weight="600" fill="#e65100">modo: respuesta predeterminada</text>
  <text x="805" y="505" text-anchor="middle" font-size="9" fill="#555">un preset a la vez</text>

  <rect x="720" y="550" width="170" height="42" rx="8" fill="#f8f9fa" stroke="#6a1b9a" stroke-width="1" />
  <text x="805" y="570" text-anchor="middle" font-size="10" font-weight="600" fill="#6a1b9a">veto a nivel de SDK</text>
  <text x="805" y="585" text-anchor="middle" font-size="9" fill="#555">se ejecuta en el código de tu aplicación</text>

  <text x="450" y="720" text-anchor="middle" font-size="9" font-style="italic" fill="#888">Origen: code.claude.com/docs/es/permission-modes</text>
  <text x="450" y="745" text-anchor="middle" font-size="11" fill="#1a1a2e" font-weight="600">El permiso es una infraestructura, no una petición.</text>
</svg>
