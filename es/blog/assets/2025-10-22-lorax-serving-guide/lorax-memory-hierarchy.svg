<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Solicitudes entrantes</title>
  <desc id="artifact-desc">Solicitudes entrantes.</desc>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="100%" height="100%" fill="#f8fafc" /><g font-family="Inter, system-ui, sans-serif" text-anchor="middle">


    <g transform="translate(50, 200)">
      <rect x="0" y="0" width="140" height="100" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" />
      <text y="25" font-weight="bold" fill="#0f172a" x="70">Solicitudes entrantes</text>
      <text y="50" font-size="12" fill="#334155" x="70">Cliente A: Derecho</text>
      <text y="70" font-size="12" fill="#334155" x="70">Cliente B: Finanzas</text>
      <text y="90" font-size="12" fill="#334155" x="70">Cliente C: Médico</text>
    </g>


    <line x1="190" y1="250" x2="240" y2="250" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)" />


    <g transform="translate(250, 200)">
      <rect x="0" y="0" width="120" height="100" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
      <text y="45" font-weight="bold" fill="#0f172a" x="60">LoRAX</text>
      <text y="65" font-weight="bold" fill="#0f172a" x="60">Programador de tareas</text>
    </g>


    <rect x="420" y="20" width="350" height="460" rx="15" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" />
    <text y="45" font-weight="bold" font-size="16" fill="#0f172a" x="595">Jerarquía de memoria</text>


    <g transform="translate(440, 70)">
      <rect x="0" y="0" width="310" height="100" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
      <text y="25" font-weight="bold" fill="#1d4ed8" x="155">VRAM de la GPU (en uso intenso)</text>
      <rect x="20" y="40" width="120" height="40" rx="4" fill="#ffffff" stroke="#2563eb" />
      <text y="65" font-size="12" fill="#0f172a" x="80">Modelo base</text>
      <rect x="150" y="40" width="60" height="40" rx="4" fill="#eff6ff" stroke="#2563eb" />
      <text y="65" font-size="10" fill="#0f172a" x="180">Ley</text>
      <rect x="220" y="40" width="60" height="40" rx="4" fill="#eff6ff" stroke="#2563eb" />
      <text y="65" font-size="10" fill="#0f172a" x="250">Finanzas</text>
    </g>


    <g transform="translate(440, 200)">
      <rect x="0" y="0" width="310" height="80" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadow)" />
      <text y="25" font-weight="bold" fill="#9a3412" x="155">RAM de la CPU (temperatura alta)</text>
      <rect x="80" y="35" width="70" height="30" rx="4" fill="#ffffff" stroke="#ea580c" />
      <text y="54" font-size="10" fill="#0f172a" x="115">Médico</text>
      <rect x="160" y="35" width="70" height="30" rx="4" fill="#ffffff" stroke="#ea580c" />
      <text y="54" font-size="10" fill="#0f172a" x="195">Motor</text>
    </g>


    <g transform="translate(440, 310)">
      <rect x="0" y="0" width="310" height="80" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)" />
      <text y="25" font-weight="bold" fill="#334155" x="155">Disco / Concentrador HF (frío)</text>
      <rect x="50" y="35" width="210" height="30" rx="4" fill="#ffffff" stroke="#cbd5e1" />
      <text y="54" font-size="10" fill="#0f172a" x="155">Más de 100 adaptadores en caché</text>
    </g>



    <path d="M 370 220 L 440 120" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowhead)" />
    <text y="160" font-size="11" fill="#2563eb" x="380" transform="rotate(-50 380 160)">Rápido (~1 ms)</text>


    <line x1="370" y1="250" x2="440" y2="240" stroke="#ea580c" stroke-width="2" marker-end="url(#arrowhead)" />
    <text y="235" font-size="11" fill="#9a3412" x="405">Medio (~10 ms)</text>


    <path d="M 370 280 L 440 350" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)" />
    <text y="330" font-size="11" fill="#334155" x="360" transform="rotate(45 360 330)">Lento (descarga)</text>

  </g>
</svg>
