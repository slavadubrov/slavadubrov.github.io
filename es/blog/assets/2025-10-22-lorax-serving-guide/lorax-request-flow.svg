<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Ruta de solicitud LoRAX desde la resolución del adaptador hasta la generación</title>
  <desc id="desc">Una solicitud autenticada proporciona un ID de adaptador incluido en la lista permitida. LoRAX determina la residencia del dispositivo, carga el adaptador si es necesario, agrupa las tareas compatibles, aplica el adaptador sobre el modelo base compartido y transmite los tokens de forma streamizada. Las identidades y artefactos rechazados siguen un camino de error.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="500" rx="22" fill="#0f172a" />
  <text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">ruta de solicitud LoRAX</text>
  <text x="500" y="77" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#94a3b8">La identidad del adaptador es una entrada de enrutamiento autorizada, no una entrada pública arbitraria</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(25 125)"><rect width="150" height="110" rx="14" fill="#1e293b" stroke="#64748b" /><text x="75" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#f8fafc">Portal de conexión</text><text x="75" y="66" text-anchor="middle" font-size="12" fill="#cbd5e1">autenticar al inquilino</text><text x="75" y="87" text-anchor="middle" font-size="12" fill="#94a3b8">adaptador de lista blanca</text></g>
    <text x="197" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(220 125)"><rect width="165" height="110" rx="14" fill="#5b21b6" stroke="#2563eb" /><text x="82" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#c4b5fd">Resolutor</text><text x="82" y="66" text-anchor="middle" font-size="12" fill="#cbd5e1">verificar residencia</text><text x="82" y="87" text-anchor="middle" font-size="12" fill="#94a3b8">cargar si está ausente</text></g>
    <text x="407" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(430 125)"><rect width="165" height="110" rx="14" fill="#9a3412" stroke="#ea580c" /><text x="82" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#fdba74">Programador de tareas</text><text x="82" y="66" text-anchor="middle" font-size="12" fill="#cbd5e1">cola por nivel de preparación</text><text x="82" y="87" text-anchor="middle" font-size="12" fill="#94a3b8">formar lote mixto</text></g>
    <text x="617" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(640 125)"><rect width="165" height="110" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="82" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">GPU inferencia</text><text x="82" y="66" text-anchor="middle" font-size="12" fill="#cbd5e1">modelo base compartido</text><text x="82" y="87" text-anchor="middle" font-size="12" fill="#94a3b8">adaptador por solicitud</text></g>
    <text x="827" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(850 125)"><rect width="125" height="110" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="62" y="45" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Flujo</text><text x="62" y="75" text-anchor="middle" font-size="12" fill="#93c5fd">tokens de salida</text></g>

    <g transform="translate(220 315)"><rect width="585" height="105" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="292" y="33" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Observe el camino de residencia para cada solicitud</text><text x="45" y="66" font-size="13" fill="#cbd5e1">GPU de impacto</text><text x="160" y="66" font-size="13" fill="#cbd5e1">CPU de impacto</text><text x="275" y="66" font-size="13" fill="#cbd5e1">Colisión con artefacto</text><text x="410" y="66" font-size="13" fill="#cbd5e1">Fallo remoto</text><text x="45" y="88" font-size="12" fill="#94a3b8">Cola de registros, carga, primer token, latencia total y motivo de fallo.</text></g>
    <text x="500" y="465" text-anchor="middle" font-size="13" fill="#fca5a5">Adaptador no autorizado, artefacto incompatible o fallo de carga → rechazar o utilizar un mecanismo de fallback explícito</text>
  </g>
</svg>
