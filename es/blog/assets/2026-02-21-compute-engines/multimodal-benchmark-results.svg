<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 210" font-family="Inter, system-ui, sans-serif" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="title">resultados de procesamiento de imágenes benchmark</title>
  <desc id="desc">Resultados de medición de tiempos para la prueba con 500 imágenes del artículo, utilizando Pandas junto con Pillow, Daft y una implementación en Rust.</desc>
  <defs>
    <style>
      .bar { transform-origin: left; }
      .bar-text { font-size: 12px; fill: #334155; font-weight: bold; }
      @keyframes scaleIn { from { transform: scaleX(0); opacity: 1; } to { transform: scaleX(1); opacity: 1; } }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      .g-pandas .bar { fill: #dc2626; animation-delay: 0.1s; } .g-pandas .bar-text { animation-delay: 1.1s; }
      .g-daft .bar { fill: #ea580c; animation-delay: 0.2s; } .g-daft .bar-text { animation-delay: 1.2s; }
      .g-rust .bar { fill: #16a34a; animation-delay: 0.3s; } .g-rust .bar-text { animation-delay: 1.3s; }
      .axis-label { font-size: 13px; font-weight: bold; fill: #0f172a; text-anchor: end; }
    </style>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="900" height="210" rx="12" fill="#f8fafc" stroke="#f8fafc" stroke-width="1" />
  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">Rendimiento multimodal de nodo único</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#334155">Tiempo de ejecución en segundos (cuanto menor, mejor) | 500 imágenes de Food-101</text>

  <!-- Legend -->
  <g transform="translate(260, 80)">
    <rect x="0" y="0" width="16" height="16" rx="3" fill="#dc2626" /><text x="24" y="12" font-size="13" fill="#0f172a">Pandas + Pillow</text>
    <rect x="150" y="0" width="16" height="16" rx="3" fill="#ea580c" /><text x="174" y="12" font-size="13" fill="#0f172a">Insensato</text>
    <rect x="230" y="0" width="16" height="16" rx="3" fill="#16a34a" /><text x="254" y="12" font-size="13" fill="#0f172a">Rust (crate de imágenes)</text>
  </g>

  <!-- Chart Area -->
  <g transform="translate(150, 120)">
    <!-- Base Grid X -->
    <line x1="0" y1="0" x2="0" y2="50" stroke="#cbd5e1" stroke-width="2" />
    <line x1="0" y1="50" x2="650" y2="50" stroke="#cbd5e1" stroke-width="2" />
    <text x="0" y="70" text-anchor="middle" font-size="11" fill="#334155">0.0 s</text>
    <line x1="150" y1="0" x2="150" y2="50" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4" /><text x="150" y="70" text-anchor="middle" font-size="11" fill="#334155">0,25 s</text>
    <line x1="300" y1="0" x2="300" y2="50" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4" /><text x="300" y="70" text-anchor="middle" font-size="11" fill="#334155">0,50 s</text>
    <line x1="450" y1="0" x2="450" y2="50" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4" /><text x="450" y="70" text-anchor="middle" font-size="11" fill="#334155">0,75 s</text>
    <line x1="600" y1="0" x2="600" y2="50" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4" /><text x="600" y="70" text-anchor="middle" font-size="11" fill="#334155">1,00 s</text>

    <!-- Row 1: Total Pipeline -->
    <text x="-15" y="24" class="axis-label">Total Pipeline</text>
    <g transform="translate(0, 5)">
      <g class="g-pandas"><rect class="bar" x="0" y="0" width="606" height="10" /><text class="bar-text" x="611" y="9">1,01 s</text></g>
      <g class="g-daft"><rect class="bar" x="0" y="14" width="168" height="10" /><text class="bar-text" x="173" y="23">0,28 s</text></g>
      <g class="g-rust"><rect class="bar" x="0" y="28" width="144" height="10" /><text class="bar-text" x="149" y="37">0,24 s</text></g>
    </g>
  </g>
</svg>
