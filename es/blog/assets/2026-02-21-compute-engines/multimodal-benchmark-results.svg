<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 210" font-family="Inter, system-ui, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Rendimiento multimodal de nodo único</title>
  <desc id="artifact-desc">Rendimiento multimodal de nodo único.</desc>
  <defs>
    <style>
      .bar { transform-origin: left; animation: scaleIn 1s cubic-bezier(0.25, 1, 0.5, 1) forwards; opacity: 0; }
      .bar-text { opacity: 0; animation: fadeIn 0.5s ease-out 1s forwards; font-size: 11px; fill: #334155; font-weight: bold; }
      @keyframes scaleIn { from { transform: scaleX(0); opacity: 1; } to { transform: scaleX(1); opacity: 1; } }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      .g-pandas .bar { fill: #dc2626; animation-delay: 0.1s; } .g-pandas .bar-text { animation-delay: 1.1s; }
      .g-daft .bar { fill: #ea580c; animation-delay: 0.2s; } .g-daft .bar-text { animation-delay: 1.2s; }
      .g-rust .bar { fill: #16a34a; animation-delay: 0.3s; } .g-rust .bar-text { animation-delay: 1.3s; }
      .axis-label { font-size: 13px; font-weight: bold; fill: #0f172a; text-anchor: end; }
    </style>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="900" height="210" rx="12" fill="#f8fafc" stroke="#f8fafc" stroke-width="1" />
  <text y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a" x="450">Rendimiento multimodal de nodo único</text>
  <text y="52" text-anchor="middle" font-size="12" fill="#334155" x="450">Tiempo de ejecución en segundos (cuanto menor, mejor) | 500 imágenes de Food-101</text>

  <!-- Legend -->
  <g transform="translate(260, 80)">
    <rect x="0" y="0" width="16" height="16" rx="3" fill="#dc2626" /><text y="12" font-size="13" fill="#0f172a" x="24">Pandas + Pillow</text>
    <rect x="150" y="0" width="16" height="16" rx="3" fill="#ea580c" /><text y="12" font-size="13" fill="#0f172a" x="174">Insensato</text>
    <rect x="230" y="0" width="16" height="16" rx="3" fill="#16a34a" /><text y="12" font-size="13" fill="#0f172a" x="254">Rust (crate de imágenes)</text>
  </g>

  <!-- Chart Area -->
  <g transform="translate(150, 120)">
    <!-- Base Grid X -->
    <line x1="0" y1="0" x2="0" y2="50" stroke="#cbd5e1" stroke-width="2" />
    <line x1="0" y1="50" x2="650" y2="50" stroke="#cbd5e1" stroke-width="2" />
    <text y="70" text-anchor="middle" font-size="11" fill="#334155" x="0">0,0 s</text>
    <line x1="150" y1="0" x2="150" y2="50" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4" /><text y="70" text-anchor="middle" font-size="11" fill="#334155" x="150">0,25 s</text>
    <line x1="300" y1="0" x2="300" y2="50" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4" /><text y="70" text-anchor="middle" font-size="11" fill="#334155" x="300">0,50 s</text>
    <line x1="450" y1="0" x2="450" y2="50" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4" /><text y="70" text-anchor="middle" font-size="11" fill="#334155" x="450">0,75 s</text>
    <line x1="600" y1="0" x2="600" y2="50" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4" /><text y="70" text-anchor="middle" font-size="11" fill="#334155" x="600">1,00 s</text>

    <!-- Row 1: Total Pipeline -->
    <text y="24" class="axis-label" x="-15" transform="translate(40.24 0.00)">Conjunto total de pipelines</text>
    <g transform="translate(0, 5)">
      <g class="g-pandas"><rect class="bar" x="0" y="0" width="606" height="10" /><text class="bar-text" y="9" x="611">1,01 s</text></g>
      <g class="g-daft"><rect class="bar" x="0" y="14" width="168" height="10" /><text class="bar-text" y="23" x="173">0,28 s</text></g>
      <g class="g-rust"><rect class="bar" x="0" y="28" width="144" height="10" /><text class="bar-text" y="37" x="149">0,24 s</text></g>
    </g>
  </g>
</svg>
