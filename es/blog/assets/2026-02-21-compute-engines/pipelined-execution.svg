<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="title">Ejecución orientada a etapas y en tubería</title>
  <desc id="desc">Una línea de tiempo conceptual que muestra cómo la superposición de las entradas, el trabajo de CPU y la inferencia de GPU puede reducir los períodos de inactividad.</desc>
  <defs>
    <style>
      .t-box { opacity: 0; animation: slideInFade 0.5s ease-out forwards; }
      @keyframes slideInFade {
        from { opacity: 0; transform: translateX(-15px); }
        to { opacity: 1; transform: translateX(0); }
      }
      .st-b1 { animation-delay: 0.5s; }
      .st-b2 { animation-delay: 1.0s; }
      .st-b3 { animation-delay: 1.5s; }
      .st-b4 { animation-delay: 2.0s; }
      .st-b5 { animation-delay: 2.5s; }
      .st-b6 { animation-delay: 3.0s; }
      .st-b7 { animation-delay: 3.5s; }
      .st-b8 { animation-delay: 4.0s; }
      .st-b9 { animation-delay: 4.5s; }
    </style>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="900" height="500" rx="12" fill="#f8fafc" stroke="#f8fafc" stroke-width="1" />

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">Ejecución secuencial y en tubería</text>

  <!-- TOP: Stage-based (Spark) -->
  <rect x="25" y="50" width="850" height="190" rx="10" fill="#eff6ff" stroke="#94a3b8" stroke-width="1.5" />
  <text x="50" y="75" font-size="14" font-weight="bold" fill="#334155">Camino orientado a fases conceptuales</text>

  <!-- Timeline labels -->
  <text x="50" y="110" font-size="11" font-weight="bold" fill="#334155">CPU Núcleo principal 1</text>
  <text x="50" y="148" font-size="11" font-weight="bold" fill="#334155">CPU Núcleo 2</text>
  <text x="50" y="186" font-size="11" font-weight="bold" fill="#334155">GPU</text>

  <!-- Time axis -->
  <line x1="145" y1="205" x2="730" y2="205" stroke="#cbd5e1" stroke-width="1" />
  <text x="440" y="222" text-anchor="middle" font-size="10" fill="#64748b">Tiempo →</text>

  <!-- Stage 1 label -->
  <g class="t-box st-b1">
    <text x="310" y="90" text-anchor="middle" font-size="10" font-weight="bold" fill="#334155">Etapa 1 (CPU)</text>
  </g>

  <!-- CPU Core 1: Download+Parse Partition 1 -->
  <g class="t-box st-b1">
    <rect x="150" y="97" width="250" height="22" rx="4" fill="#2563eb" />
    <text x="275" y="112" text-anchor="middle" font-size="9" fill="#ffffff">Descargar + Analizar partición 1</text>
  </g>

  <!-- CPU Core 2: Download+Parse Partition 2 (simultaneously) -->
  <g class="t-box st-b1">
    <rect x="150" y="135" width="250" height="22" rx="4" fill="#2563eb" />
    <text x="275" y="150" text-anchor="middle" font-size="9" fill="#ffffff">Descargar + Analizar Partición 2</text>
  </g>

  <!-- GPU idle during Stage 1 -->
  <g class="t-box st-b1">
    <rect x="150" y="173" width="250" height="22" rx="4" fill="#cbd5e1" stroke="#cbd5e1" stroke-width="0.5" />
    <text x="275" y="188" text-anchor="middle" font-size="9" fill="#64748b">Inactivo (en espera de CPU)</text>
  </g>

  <!-- Stage barrier -->
  <g class="t-box st-b4">
    <line x1="410" y1="88" x2="410" y2="200" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,3" />
    <text x="413" y="200" font-size="9" fill="#991b1b">barrera</text>
  </g>

  <!-- Stage 2 label -->
  <g class="t-box st-b5">
    <text x="545" y="90" text-anchor="middle" font-size="10" font-weight="bold" fill="#334155">Etapa 2 (GPU)</text>
  </g>

  <!-- CPU Core 1 idle during Stage 2 -->
  <g class="t-box st-b5">
    <rect x="420" y="97" width="200" height="22" rx="4" fill="#cbd5e1" stroke="#cbd5e1" stroke-width="0.5" />
    <text x="520" y="112" text-anchor="middle" font-size="9" fill="#64748b">Inactivo</text>
  </g>

  <!-- CPU Core 2 idle during Stage 2 -->
  <g class="t-box st-b5">
    <rect x="420" y="135" width="200" height="22" rx="4" fill="#cbd5e1" stroke="#cbd5e1" stroke-width="0.5" />
    <text x="520" y="150" text-anchor="middle" font-size="9" fill="#64748b">Inactivo</text>
  </g>

  <!-- GPU active during Stage 2 -->
  <g class="t-box st-b5">
    <rect x="420" y="173" width="200" height="22" rx="4" fill="#ea580c" />
    <text x="520" y="188" text-anchor="middle" font-size="9" fill="#ffffff">Incrustar P1 + P2</text>
  </g>

  <g class="t-box st-b7">
    <rect x="770" y="168" width="95" height="30" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1" />
    <text x="818" y="188" text-anchor="middle" font-size="11" font-weight="bold" fill="#991b1b">GPU espera</text>
  </g>

  <!-- BOTTOM: Pipelined (Daft/Ray) -->
  <rect x="25" y="270" width="850" height="195" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" />
  <text x="50" y="295" font-size="14" font-weight="bold" fill="#9a3412">Transmisión en tubería (Daft / Ray Data)</text>

  <!-- Timeline labels -->
  <text x="50" y="328" font-size="11" font-weight="bold" fill="#334155">CPU Núcleo principal 1</text>
  <text x="50" y="366" font-size="11" font-weight="bold" fill="#334155">CPU Núcleo 2</text>
  <text x="50" y="404" font-size="11" font-weight="bold" fill="#334155">GPU</text>

  <line x1="145" y1="425" x2="730" y2="425" stroke="#cbd5e1" stroke-width="1" />
  <text x="440" y="442" text-anchor="middle" font-size="10" fill="#64748b">Tiempo →</text>

  <g class="t-box st-b1">
    <rect x="150" y="315" width="110" height="22" rx="4" fill="#2563eb" />
    <text x="205" y="330" text-anchor="middle" font-size="9" fill="#ffffff">Descargar B1</text>
  </g>
  <g class="t-box st-b3">
    <rect x="265" y="315" width="110" height="22" rx="4" fill="#2563eb" />
    <text x="320" y="330" text-anchor="middle" font-size="9" fill="#ffffff">Descargar B3</text>
  </g>
  <g class="t-box st-b5">
    <rect x="380" y="315" width="110" height="22" rx="4" fill="#2563eb" />
    <text x="435" y="330" text-anchor="middle" font-size="9" fill="#ffffff">Descargar B5</text>
  </g>
  <g class="t-box st-b7">
    <rect x="495" y="315" width="110" height="22" rx="4" fill="#2563eb" />
    <text x="550" y="330" text-anchor="middle" font-size="9" fill="#ffffff">Descargar B7</text>
  </g>
  <g class="t-box st-b9">
    <rect x="610" y="315" width="110" height="22" rx="4" fill="#2563eb" />
    <text x="665" y="330" text-anchor="middle" font-size="9" fill="#ffffff">Descargar B9</text>
  </g>

  <g class="t-box st-b2">
    <rect x="205" y="353" width="110" height="22" rx="4" fill="#166534" />
    <text x="260" y="368" text-anchor="middle" font-size="9" fill="#ffffff">Analizar B1</text>
  </g>
  <g class="t-box st-b4">
    <rect x="320" y="353" width="110" height="22" rx="4" fill="#166534" />
    <text x="375" y="368" text-anchor="middle" font-size="9" fill="#ffffff">Analizar B2</text>
  </g>
  <g class="t-box st-b6">
    <rect x="435" y="353" width="110" height="22" rx="4" fill="#166534" />
    <text x="490" y="368" text-anchor="middle" font-size="9" fill="#ffffff">Analizar B3</text>
  </g>
  <g class="t-box st-b8">
    <rect x="550" y="353" width="110" height="22" rx="4" fill="#166534" />
    <text x="605" y="368" text-anchor="middle" font-size="9" fill="#ffffff">Analizar B4</text>
  </g>
  <g class="t-box st-b9">
    <rect x="665" y="353" width="55" height="22" rx="4" fill="#166534" />
    <text x="692" y="368" text-anchor="middle" font-size="9" fill="#ffffff">B5</text>
  </g>

  <g class="t-box st-b3">
    <rect x="265" y="391" width="110" height="22" rx="4" fill="#ea580c" />
    <text x="320" y="406" text-anchor="middle" font-size="9" fill="#ffffff">Embedding B1</text>
  </g>
  <g class="t-box st-b5">
    <rect x="380" y="391" width="110" height="22" rx="4" fill="#ea580c" />
    <text x="435" y="406" text-anchor="middle" font-size="9" fill="#ffffff">Embedding B2</text>
  </g>
  <g class="t-box st-b7">
    <rect x="495" y="391" width="110" height="22" rx="4" fill="#ea580c" />
    <text x="550" y="406" text-anchor="middle" font-size="9" fill="#ffffff">Incrustación B3</text>
  </g>
  <g class="t-box st-b9">
    <rect x="610" y="391" width="110" height="22" rx="4" fill="#ea580c" />
    <text x="665" y="406" text-anchor="middle" font-size="9" fill="#ffffff">Embedding B4</text>
  </g>

  <rect x="770" y="385" width="95" height="30" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1" />
  <text x="818" y="405" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">Más solapamiento</text>

  <!-- Bottom summary -->
  <rect x="150" y="475" width="600" height="22" rx="6" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text x="450" y="491" text-anchor="middle" font-size="11" font-weight="bold" fill="#9a3412">La superposición puede reducir el tiempo de inactividad cuando las etapas están equilibradas.</text>
</svg>
