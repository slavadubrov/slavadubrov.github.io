<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Tres niveles de evaluación de agentes</title>
  <desc id="artifact-desc">Tres niveles de evaluación de agentes.</desc>
  <defs>
    <marker id="arrLvl" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#334155" />
    </marker>
    <filter id="shadowLvl" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <text y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a" x="590">Tres niveles de evaluación de agentes</text>
  <text y="54" text-anchor="middle" font-size="12" fill="#334155" x="590">El enfoque de extremo a extremo indica qué salió mal · la trayectoria muestra dónde ocurrió · el componente explica por qué</text>

  <!-- Level 1: end-to-end -->
  <rect x="30" y="80" width="1120" height="150" rx="12" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowLvl)" />
  <text y="106" font-size="14" font-weight="700" fill="#166534" x="55">Nivel 1 · De extremo a extremo (caja negra)</text>
  <text y="124" font-size="10" fill="#166534" x="55">Pregunta: ¿la tarea tuvo éxito?</text>

  <rect x="55" y="140" width="340" height="72" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="225">Finalización de tarea</text>
  <text y="180" text-anchor="middle" font-size="10" fill="#334155" x="225">Alineación de objetivos evaluada por LLM, sin referencia externa</text>
  <text y="195" text-anchor="middle" font-size="10" fill="#334155" x="225">utilizable en línea: no se requiere salida en formato PDF</text>

  <rect x="415" y="140" width="340" height="72" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="585">Evaluación del resultado/estado</text>
  <text y="180" text-anchor="middle" font-size="10" fill="#334155" x="585">comparar el estado final del entorno con el estado objetivo</text>
  <text y="195" text-anchor="middle" font-size="10" fill="#334155" x="585">resistente a rutas alternativas creativas (τ-bench)</text>

  <rect x="775" y="140" width="340" height="72" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="945">Fiabilidad: superado^k</text>
  <text y="180" text-anchor="middle" font-size="10" fill="#334155" x="945">todos los intentos de k sobre k tienen éxito</text>
  <text y="195" text-anchor="middle" font-size="10" fill="#334155" x="945">90% de tasa de éxito a 1 ≈ 57% de consistencia con k=8</text>

  <line x1="590" y1="234" x2="590" y2="268" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrLvl)" />
  <text y="256" font-size="10" fill="#64748b" font-style="italic" x="700">La tarea falló, pero ¿dónde?</text>

  <!-- Level 2: trajectory -->
  <rect x="30" y="275" width="1120" height="150" rx="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowLvl)" />
  <text y="301" font-size="14" font-weight="700" fill="#5b21b6" x="55">Nivel 2 · Trayectoria (caja de vidrio)</text>
  <text y="319" font-size="10" fill="#5b21b6" x="55">Pregunta: ¿El camino era eficiente y óptimo desde el punto de vista del rendimiento?</text>

  <rect x="55" y="335" width="255" height="72" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6" x="182">Corrección de la herramienta</text>
  <text y="375" text-anchor="middle" font-size="10" fill="#334155" x="182">determinista, sin necesidad de árbitro</text>
  <text y="390" text-anchor="middle" font-size="10" fill="#334155" x="182">coincidencia exacta / en orden / sin importar el orden</text>

  <rect x="330" y="335" width="255" height="72" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6" x="457">Corrección de argumentos</text>
  <text y="375" text-anchor="middle" font-size="10" fill="#334155" x="457">Herramienta correcta, parámetros incorrectos</text>
  <text y="390" text-anchor="middle" font-size="10" fill="#334155" x="457">% de pares clave-valor rellenados correctamente</text>

  <rect x="605" y="335" width="255" height="72" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6" x="732">Eficiencia y bucles</text>
  <text y="375" text-anchor="middle" font-size="10" fill="#334155" x="732">llamadas redundantes · convergencia de trayectorias</text>
  <text y="390" text-anchor="middle" font-size="10" fill="#334155" x="732">llamadas idénticas repetidas = calle sin salida</text>

  <rect x="880" y="335" width="235" height="72" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6" x="997">Calidad del plan / cumplimiento</text>
  <text y="375" text-anchor="middle" font-size="10" fill="#334155" x="997">buen plan, ejecución por deriva</text>
  <text y="390" text-anchor="middle" font-size="10" fill="#334155" x="997">fidelidad en múltiples turnos</text>

  <line x1="590" y1="429" x2="590" y2="463" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrLvl)" />
  <text y="451" font-size="10" fill="#64748b" font-style="italic" x="700">La ruta se rompió en el paso 3: ¿por qué?</text>

  <!-- Level 3: component -->
  <rect x="30" y="470" width="1120" height="120" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowLvl)" />
  <text y="496" font-size="14" font-weight="700" fill="#9a3412" x="55">Nivel 3 · Componente (caja blanca)</text>
  <text y="514" font-size="10" fill="#9a3412" x="55">Pregunta: ¿Qué decisión, herramienta, recuperador o subagente falló?</text>

  <rect x="55" y="525" width="340" height="50" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="225">Métricas por tramo</text>
  <text y="563" text-anchor="middle" font-size="10" fill="#334155" x="225">asignar puntuaciones a los segmentos individuales de herramientas/recuperación</text>

  <rect x="415" y="525" width="340" height="50" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="585">Interpretación de la salida de la herramienta</text>
  <text y="563" text-anchor="middle" font-size="10" fill="#334155" x="585">respuesta válida, lectura incorrecta: daña los procesos posteriores</text>

  <rect x="775" y="525" width="340" height="50" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="945">Atribución de fallos</text>
  <text y="563" text-anchor="middle" font-size="10" fill="#334155" x="945">la falla visible suele encontrarse más abajo en el flujo, tras el verdadero error</text>
</svg>
