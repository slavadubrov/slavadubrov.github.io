<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrLvl" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#555" />
    </marker>
    <filter id="shadowLvl" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>

  <text x="590" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a2e">Tres niveles de evaluación de agentes</text>
  <text x="590" y="54" text-anchor="middle" font-size="12" fill="#666">El enfoque de extremo a extremo indica qué salió mal · la trayectoria muestra dónde ocurrió · el componente explica por qué</text>

  <!-- Level 1: end-to-end -->
  <rect x="30" y="80" width="1120" height="150" rx="12" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadowLvl)" />
  <text x="55" y="106" font-size="14" font-weight="700" fill="#2e7d32">Nivel 1 · De extremo a extremo (caja negra)</text>
  <text x="55" y="124" font-size="10" fill="#2e7d32">Pregunta: ¿la tarea tuvo éxito?</text>

  <rect x="55" y="140" width="340" height="72" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="225" y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Finalización de tarea</text>
  <text x="225" y="180" text-anchor="middle" font-size="10" fill="#555">Alineación de objetivos evaluada por LLM, sin referencia externa</text>
  <text x="225" y="195" text-anchor="middle" font-size="10" fill="#555">utilizable en línea: no se requiere salida en formato PDF</text>

  <rect x="415" y="140" width="340" height="72" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="585" y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Evaluación del resultado/estado</text>
  <text x="585" y="180" text-anchor="middle" font-size="10" fill="#555">comparar el estado final del entorno con el estado objetivo</text>
  <text x="585" y="195" text-anchor="middle" font-size="10" fill="#555">resistente a rutas alternativas creativas (τ-bench)</text>

  <rect x="775" y="140" width="340" height="72" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="945" y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Fiabilidad: superado^k</text>
  <text x="945" y="180" text-anchor="middle" font-size="10" fill="#555">todos los intentos de k sobre k tienen éxito</text>
  <text x="945" y="195" text-anchor="middle" font-size="10" fill="#555">90% de tasa de éxito a 1 ≈ 57% de consistencia con k=8</text>

  <line x1="590" y1="234" x2="590" y2="268" stroke="#555" stroke-width="1.6" marker-end="url(#arrLvl)" />
  <text x="700" y="256" font-size="10" fill="#888" font-style="italic">La tarea falló, pero ¿dónde?</text>

  <!-- Level 2: trajectory -->
  <rect x="30" y="275" width="1120" height="150" rx="12" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowLvl)" />
  <text x="55" y="301" font-size="14" font-weight="700" fill="#6a1b9a">Nivel 2 · Trayectoria (caja de vidrio)</text>
  <text x="55" y="319" font-size="10" fill="#6a1b9a">Pregunta: ¿El camino era eficiente y óptimo desde el punto de vista del rendimiento?</text>

  <rect x="55" y="335" width="255" height="72" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1" />
  <text x="182" y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#6a1b9a">Corrección de la herramienta</text>
  <text x="182" y="375" text-anchor="middle" font-size="10" fill="#555">determinista, sin necesidad de árbitro</text>
  <text x="182" y="390" text-anchor="middle" font-size="10" fill="#555">coincidencia exacta / en orden / sin importar el orden</text>

  <rect x="330" y="335" width="255" height="72" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1" />
  <text x="457" y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#6a1b9a">Corrección de argumentos</text>
  <text x="457" y="375" text-anchor="middle" font-size="10" fill="#555">Herramienta correcta, parámetros incorrectos</text>
  <text x="457" y="390" text-anchor="middle" font-size="10" fill="#555">% de pares clave-valor rellenados correctamente</text>

  <rect x="605" y="335" width="255" height="72" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1" />
  <text x="732" y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#6a1b9a">Eficiencia y bucles</text>
  <text x="732" y="375" text-anchor="middle" font-size="10" fill="#555">llamadas redundantes · convergencia de trayectorias</text>
  <text x="732" y="390" text-anchor="middle" font-size="10" fill="#555">llamadas idénticas repetidas = calle sin salida</text>

  <rect x="880" y="335" width="235" height="72" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1" />
  <text x="997" y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#6a1b9a">Calidad del plan / cumplimiento</text>
  <text x="997" y="375" text-anchor="middle" font-size="10" fill="#555">buen plan, ejecución por deriva</text>
  <text x="997" y="390" text-anchor="middle" font-size="10" fill="#555">fidelidad en múltiples turnos</text>

  <line x1="590" y1="429" x2="590" y2="463" stroke="#555" stroke-width="1.6" marker-end="url(#arrLvl)" />
  <text x="700" y="451" font-size="10" fill="#888" font-style="italic">La ruta se rompió en el paso 3: ¿por qué?</text>

  <!-- Level 3: component -->
  <rect x="30" y="470" width="1120" height="120" rx="12" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowLvl)" />
  <text x="55" y="496" font-size="14" font-weight="700" fill="#e65100">Nivel 3 · Componente (caja blanca)</text>
  <text x="55" y="514" font-size="10" fill="#e65100">Pregunta: ¿Qué decisión, herramienta, recuperador o subagente falló?</text>

  <rect x="55" y="525" width="340" height="50" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1" />
  <text x="225" y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Métricas por tramo</text>
  <text x="225" y="563" text-anchor="middle" font-size="10" fill="#555">asignar puntuaciones a los segmentos individuales de herramientas/recuperación</text>

  <rect x="415" y="525" width="340" height="50" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1" />
  <text x="585" y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Interpretación de la salida de la herramienta</text>
  <text x="585" y="563" text-anchor="middle" font-size="10" fill="#555">respuesta válida, lectura incorrecta: daña los procesos posteriores</text>

  <rect x="775" y="525" width="340" height="50" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1" />
  <text x="945" y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Atribución de fallos</text>
  <text x="945" y="563" text-anchor="middle" font-size="10" fill="#555">la falla visible suele encontrarse más abajo en el flujo, tras el verdadero error</text>
</svg>
