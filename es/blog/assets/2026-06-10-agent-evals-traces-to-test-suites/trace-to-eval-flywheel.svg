<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 640" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">El volante de seguimiento a evaluación</title>
  <desc id="artifact-desc">El volante de seguimiento a evaluación.</desc>
  <defs>
    <marker id="arrFly" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2563eb" />
    </marker>
    <marker id="arrFlyBack" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#16a34a" />
    </marker>
    <filter id="shadowFly" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <text y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a" x="590">El volante de seguimiento a evaluación</text>
  <text y="57" text-anchor="middle" font-size="12" fill="#334155" x="590">Cada fallo de producción diagnosticado se convierte en un rastro, una etiqueta, una fila de conjunto de datos y un evaluador que controla los procesos de integración continua.</text>

  <!-- Stage 1: Production agent -->
  <rect x="40" y="110" width="200" height="110" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.6" filter="url(#shadowFly)" />
  <text y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8" x="140">1 · Agente de producción</text>
  <text y="164" text-anchor="middle" font-size="10" fill="#334155" x="140">equipado con OTel</text>
  <text y="179" text-anchor="middle" font-size="10" fill="#334155" x="140">Ámbitos de aplicación de GenAI semconv:</text>
  <text y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="140">invocar_agente → chat → ejecutar_herramienta</text>

  <line x1="240" y1="165" x2="295" y2="165" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 2: Trace store -->
  <rect x="300" y="110" width="200" height="110" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.6" filter="url(#shadowFly)" />
  <text y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8" x="400">2 · Almacén de trazas</text>
  <text y="164" text-anchor="middle" font-size="10" fill="#334155" x="400">Langfuse / Phoenix /</text>
  <text y="179" text-anchor="middle" font-size="10" fill="#334155" x="400">LangSmith / Braintrust</text>
  <text y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="400">(o un archivo JSONL para comenzar)</text>

  <line x1="500" y1="165" x2="555" y2="165" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 3: Mine failures -->
  <rect x="560" y="110" width="200" height="110" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="1.6" filter="url(#shadowFly)" />
  <text y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b" x="660">3 · Fallas de la mina</text>
  <text y="164" text-anchor="middle" font-size="10" fill="#334155" x="660">puntuaciones bajas · quejas de usuarios</text>
  <text y="179" text-anchor="middle" font-size="10" fill="#334155" x="660">reglas deterministas · jueces</text>
  <text y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="660">código abierto: leer de 30 a 50 trazas</text>

  <line x1="760" y1="165" x2="815" y2="165" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 4: Cluster + label -->
  <rect x="820" y="110" width="200" height="110" rx="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.6" filter="url(#shadowFly)" />
  <text y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6" x="920">4 · Clúster + etiqueta</text>
  <text y="164" text-anchor="middle" font-size="10" fill="#334155" x="920">codificación axial en 5–6 elementos nombrados,</text>
  <text y="179" text-anchor="middle" font-size="10" fill="#334155" x="920">modos de fallo específicos</text>
  <text y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="920">"error de formato de fecha", y no "problemas temporales"</text>

  <line x1="920" y1="220" x2="920" y2="285" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 5: Dedupe / goldens -->
  <rect x="820" y="290" width="200" height="110" rx="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.6" filter="url(#shadowFly)" />
  <text y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6" x="920">5 · Eliminar duplicados</text>
  <text y="344" text-anchor="middle" font-size="10" fill="#334155" x="920">uno dorado representativo</text>
  <text y="359" text-anchor="middle" font-size="10" fill="#334155" x="920">por clúster, se mantienen los ID de los intervalos</text>
  <text y="376" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="920">en metadatos para trazabilidad</text>

  <line x1="820" y1="345" x2="765" y2="345" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 6: Versioned dataset -->
  <rect x="560" y="290" width="200" height="110" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="1.6" filter="url(#shadowFly)" />
  <text y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412" x="660">6 · Conjunto de datos versionado</text>
  <text y="344" text-anchor="middle" font-size="10" fill="#334155" x="660">goldens-v1.json · v2 · v3 …</text>
  <text y="359" text-anchor="middle" font-size="10" fill="#334155" x="660">herramientas y criterios esperados</text>
  <text y="376" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="660">fixado para ejecuciones reproducibles</text>

  <line x1="560" y1="345" x2="505" y2="345" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 7: CI gate -->
  <rect x="300" y="290" width="200" height="110" rx="12" fill="#f0fdf4" stroke="#166534" stroke-width="1.6" filter="url(#shadowFly)" />
  <text y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#166534" x="400">7 · Puerta CI</text>
  <text y="344" text-anchor="middle" font-size="10" fill="#334155" x="400">Ejecución de prueba de deepeval en cada PR</text>
  <text y="359" text-anchor="middle" font-size="10" fill="#334155" x="400">métrica de fallo → compilación fallida</text>
  <text y="376" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="400">regresiones bloqueadas antes del despliegue</text>

  <!-- feedback arrow back to production -->
  <path d="M 300 345 L 140 345 L 140 225" fill="none" stroke="#16a34a" stroke-width="2.2" marker-end="url(#arrFlyBack)" />
  <text y="290" font-size="10.5" font-weight="700" fill="#166534" x="148">reparar barcos de forma segura;</text>
  <text y="305" font-size="10.5" font-weight="700" fill="#166534" x="148">nuevas fuentes de tráfico</text>
  <text y="320" font-size="10.5" font-weight="700" fill="#166534" x="148">el siguiente ciclo</text>

  <!-- Online lane note -->
  <rect x="40" y="450" width="1100" height="150" rx="12" fill="#ffffff" stroke="#7c3aed" stroke-width="1.4" filter="url(#shadowFly)" />
  <text y="480" font-size="13" font-weight="700" fill="#5b21b6" x="65">Ejecución paralela al bucle: evaluaciones en línea</text>
  <text y="503" font-size="11" fill="#334155" x="65">• Muestra tráfico en tiempo real, evalúa de forma asíncrona con métricas sin referencia (finalización de tareas, jueces personalizados): sin latencia adicional.</text>
  <text y="524" font-size="11" fill="#334155" x="65">• Alerta cuando el límite inferior de confianza de la puntuación supera un umbral: nuevos patrones de fallo ingresan al sistema en la fase 3</text>
  <text y="545" font-size="11" fill="#334155" x="65">• Mantener separadas las barreras de seguridad: en línea, deterministas, de bloqueo (ms) — las mediciones se evalúan, las barreras protegen</text>
  <text y="578" font-size="10.5" font-style="italic" fill="#64748b" x="65">La ventaja: los fallos de producción se convierten en pruebas de regresión en cuestión de días, y las actualizaciones del modelo se validan en días, no en semanas.</text>
</svg>
