<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 640" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrFly" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2980b9" />
    </marker>
    <marker id="arrFlyBack" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#27ae60" />
    </marker>
    <filter id="shadowFly" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-opacity="0.14" />
    </filter>
  </defs>

  <text x="590" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">El volante de seguimiento a evaluación</text>
  <text x="590" y="57" text-anchor="middle" font-size="12" fill="#666">Cada fallo de producción diagnosticado se convierte en un rastro, una etiqueta, una fila de conjunto de datos y un evaluador que controla los procesos de integración continua.</text>

  <!-- Stage 1: Production agent -->
  <rect x="40" y="110" width="200" height="110" rx="12" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.6" filter="url(#shadowFly)" />
  <text x="140" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">1 · Agente de producción</text>
  <text x="140" y="164" text-anchor="middle" font-size="10" fill="#555">equipado con OTel</text>
  <text x="140" y="179" text-anchor="middle" font-size="10" fill="#555">Ámbitos de aplicación de GenAI semconv:</text>
  <text x="140" y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#555">invocar_agente → chat → ejecutar_herramienta</text>

  <line x1="240" y1="165" x2="295" y2="165" stroke="#2980b9" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 2: Trace store -->
  <rect x="300" y="110" width="200" height="110" rx="12" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.6" filter="url(#shadowFly)" />
  <text x="400" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">2 · Almacén de trazas</text>
  <text x="400" y="164" text-anchor="middle" font-size="10" fill="#555">Langfuse / Phoenix /</text>
  <text x="400" y="179" text-anchor="middle" font-size="10" fill="#555">LangSmith / Braintrust</text>
  <text x="400" y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#555">(o un archivo JSONL para comenzar)</text>

  <line x1="500" y1="165" x2="555" y2="165" stroke="#2980b9" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 3: Mine failures -->
  <rect x="560" y="110" width="200" height="110" rx="12" fill="#fce4ec" stroke="#c62828" stroke-width="1.6" filter="url(#shadowFly)" />
  <text x="660" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#c62828">3 · Fallas de la mina</text>
  <text x="660" y="164" text-anchor="middle" font-size="10" fill="#555">puntuaciones bajas · quejas de usuarios</text>
  <text x="660" y="179" text-anchor="middle" font-size="10" fill="#555">reglas deterministas · jueces</text>
  <text x="660" y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#555">código abierto: leer de 30 a 50 trazas</text>

  <line x1="760" y1="165" x2="815" y2="165" stroke="#2980b9" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 4: Cluster + label -->
  <rect x="820" y="110" width="200" height="110" rx="12" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.6" filter="url(#shadowFly)" />
  <text x="920" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#6a1b9a">4 · Clúster + etiqueta</text>
  <text x="920" y="164" text-anchor="middle" font-size="10" fill="#555">codificación axial en 5–6 elementos nombrados,</text>
  <text x="920" y="179" text-anchor="middle" font-size="10" fill="#555">modos de fallo específicos</text>
  <text x="920" y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#555">"error de formato de fecha", y no "problemas temporales"</text>

  <line x1="920" y1="220" x2="920" y2="285" stroke="#2980b9" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 5: Dedupe / goldens -->
  <rect x="820" y="290" width="200" height="110" rx="12" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.6" filter="url(#shadowFly)" />
  <text x="920" y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#6a1b9a">5 · Eliminar duplicados</text>
  <text x="920" y="344" text-anchor="middle" font-size="10" fill="#555">uno dorado representativo</text>
  <text x="920" y="359" text-anchor="middle" font-size="10" fill="#555">por clúster, se mantienen los ID de los intervalos</text>
  <text x="920" y="376" text-anchor="middle" font-size="10" font-style="italic" fill="#555">en metadatos para trazabilidad</text>

  <line x1="820" y1="345" x2="765" y2="345" stroke="#2980b9" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 6: Versioned dataset -->
  <rect x="560" y="290" width="200" height="110" rx="12" fill="#fff3e0" stroke="#e65100" stroke-width="1.6" filter="url(#shadowFly)" />
  <text x="660" y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#e65100">6 · Conjunto de datos versionado</text>
  <text x="660" y="344" text-anchor="middle" font-size="10" fill="#555">goldens-v1.json · v2 · v3 …</text>
  <text x="660" y="359" text-anchor="middle" font-size="10" fill="#555">herramientas y criterios esperados</text>
  <text x="660" y="376" text-anchor="middle" font-size="10" font-style="italic" fill="#555">fixado para ejecuciones reproducibles</text>

  <line x1="560" y1="345" x2="505" y2="345" stroke="#2980b9" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 7: CI gate -->
  <rect x="300" y="290" width="200" height="110" rx="12" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.6" filter="url(#shadowFly)" />
  <text x="400" y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#2e7d32">7 · Puerta CI</text>
  <text x="400" y="344" text-anchor="middle" font-size="10" fill="#555">Ejecución de prueba de deepeval en cada PR</text>
  <text x="400" y="359" text-anchor="middle" font-size="10" fill="#555">métrica de fallo → compilación fallida</text>
  <text x="400" y="376" text-anchor="middle" font-size="10" font-style="italic" fill="#555">regresiones bloqueadas antes del despliegue</text>

  <!-- feedback arrow back to production -->
  <path d="M 300 345 L 140 345 L 140 225" fill="none" stroke="#27ae60" stroke-width="2.2" marker-end="url(#arrFlyBack)" />
  <text x="148" y="290" font-size="10.5" font-weight="700" fill="#27ae60">reparar barcos de forma segura;</text>
  <text x="148" y="305" font-size="10.5" font-weight="700" fill="#27ae60">nuevas fuentes de tráfico</text>
  <text x="148" y="320" font-size="10.5" font-weight="700" fill="#27ae60">el siguiente ciclo</text>

  <!-- Online lane note -->
  <rect x="40" y="450" width="1100" height="150" rx="12" fill="#f8f9fa" stroke="#9b59b6" stroke-width="1.4" filter="url(#shadowFly)" />
  <text x="65" y="480" font-size="13" font-weight="700" fill="#6a1b9a">Ejecución paralela al bucle: evaluaciones en línea</text>
  <text x="65" y="503" font-size="11" fill="#555">• Muestra tráfico en tiempo real, evalúa de forma asíncrona con métricas sin referencia (finalización de tareas, jueces personalizados): sin latencia adicional.</text>
  <text x="65" y="524" font-size="11" fill="#555">• Alerta cuando el límite inferior de confianza de la puntuación supera un umbral: nuevos patrones de fallo ingresan al sistema en la fase 3</text>
  <text x="65" y="545" font-size="11" fill="#555">• Mantener separadas las barreras de seguridad: en línea, deterministas, de bloqueo (ms) — las mediciones se evalúan, las barreras protegen</text>
  <text x="65" y="578" font-size="10.5" font-style="italic" fill="#888">La ventaja: los fallos de producción se convierten en pruebas de regresión en cuestión de días, y las actualizaciones del modelo se validan en días, no en semanas.</text>
</svg>
