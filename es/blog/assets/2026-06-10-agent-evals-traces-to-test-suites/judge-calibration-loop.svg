<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520" role="img" aria-labelledby="title desc">
  <title id="title">Bucle de calibración del juez</title>
  <desc id="desc">Bucle para calibrar jueces LLM con etiquetas humanas, cambios de rúbrica, métricas de acuerdo y control de deriva.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#1f2937" flood-opacity="0.15" />
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#6a1b9a" />
    </marker>
    <style>
      text { font-family: Inter, Arial, sans-serif; fill: #263238; }
      .title { font-size: 25px; font-weight: 700; }
      .sub { font-size: 14px; fill: #546e7a; }
      .box-title { font-size: 16px; font-weight: 700; }
      .box-copy { font-size: 12px; fill: #455a64; }
      .arrow { stroke: #6a1b9a; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1000" height="520" fill="#f8f9fa" />
  <text x="500" y="42" class="title" text-anchor="middle">Trata al juez como un instrumento de medida</text>
  <text x="500" y="68" class="sub" text-anchor="middle">Un prompt de juez no calibrado es solo una opinión muy segura.</text>

  <g transform="translate(88 118)">
    <rect width="200" height="92" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" filter="url(#shadow)" />
    <text x="100" y="32" class="box-title" text-anchor="middle">Etiquetas humanas</text>
    <text x="100" y="56" class="box-copy" text-anchor="middle">20-50 fallos reales</text>
    <text x="100" y="74" class="box-copy" text-anchor="middle">con motivos de aprobado/suspenso</text>
  </g>

  <g transform="translate(400 118)">
    <rect width="200" height="92" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="2" filter="url(#shadow)" />
    <text x="100" y="32" class="box-title" text-anchor="middle">Rúbrica</text>
    <text x="100" y="56" class="box-copy" text-anchor="middle">criterios atómicos,</text>
    <text x="100" y="74" class="box-copy" text-anchor="middle">ejemplos few-shot</text>
  </g>

  <g transform="translate(712 118)">
    <rect width="200" height="92" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" filter="url(#shadow)" />
    <text x="100" y="32" class="box-title" text-anchor="middle">Versión del juez</text>
    <text x="100" y="56" class="box-copy" text-anchor="middle">modelo + prompt</text>
    <text x="100" y="74" class="box-copy" text-anchor="middle">fijados juntos</text>
  </g>

  <g transform="translate(712 306)">
    <rect width="200" height="92" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" filter="url(#shadow)" />
    <text x="100" y="32" class="box-title" text-anchor="middle">Comprobación de acuerdo</text>
    <text x="100" y="56" class="box-copy" text-anchor="middle">TPR, TNR, kappa,</text>
    <text x="100" y="74" class="box-copy" text-anchor="middle">distribución de puntuaciones</text>
  </g>

  <g transform="translate(400 306)">
    <rect width="200" height="92" rx="8" fill="#ffffff" stroke="#2980b9" stroke-width="2" filter="url(#shadow)" />
    <text x="100" y="32" class="box-title" text-anchor="middle">Comprobaciones de sesgo</text>
    <text x="100" y="56" class="box-copy" text-anchor="middle">posición, longitud,</text>
    <text x="100" y="74" class="box-copy" text-anchor="middle">preferencia por familia de modelos</text>
  </g>

  <g transform="translate(88 306)">
    <rect width="200" height="92" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="2" filter="url(#shadow)" />
    <text x="100" y="32" class="box-title" text-anchor="middle">Monitor de deriva</text>
    <text x="100" y="56" class="box-copy" text-anchor="middle">revisar de nuevo tras cambios</text>
    <text x="100" y="74" class="box-copy" text-anchor="middle">de modelo o de prompt</text>
  </g>

  <path class="arrow" d="M290 164 L390 164" />
  <path class="arrow" d="M602 164 L702 164" />
  <path class="arrow" d="M812 212 L812 298" />
  <path class="arrow" d="M710 352 L612 352" />
  <path class="arrow" d="M398 352 L298 352" />
  <path class="arrow" d="M188 304 L188 220" />
  <path class="arrow" d="M290 320 C342 252, 652 252, 710 320" />
</svg>
