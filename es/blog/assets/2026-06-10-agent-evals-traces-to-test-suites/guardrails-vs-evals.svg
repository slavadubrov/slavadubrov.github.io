<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 520" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrG" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#555" />
    </marker>
    <filter id="shadowG" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>

  <text x="590" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a2e">Guardrails vs evaluaciones en línea: tareas distintas, canales diferentes</text>
  <text x="590" y="54" text-anchor="middle" font-size="12" fill="#666">Las barreras de protección protegen al usuario en cuestión de milisegundos. Las evaluaciones miden la calidad de forma asíncrona. No las mezcle.</text>

  <!-- request flow spine -->
  <rect x="40" y="100" width="150" height="60" rx="10" fill="#ffffff" stroke="#555" stroke-width="1.3" filter="url(#shadowG)" />
  <text x="115" y="126" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1a2e">Solicitud del usuario</text>
  <text x="115" y="144" text-anchor="middle" font-size="10" fill="#555">tráfico en tiempo real</text>

  <line x1="190" y1="130" x2="255" y2="130" stroke="#555" stroke-width="1.8" marker-end="url(#arrG)" />

  <rect x="260" y="100" width="170" height="60" rx="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.3" filter="url(#shadowG)" />
  <text x="345" y="126" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">Ejecución del agente</text>
  <text x="345" y="144" text-anchor="middle" font-size="10" fill="#555">planificación · herramientas · respuesta</text>

  <line x1="430" y1="130" x2="495" y2="130" stroke="#555" stroke-width="1.8" marker-end="url(#arrG)" />

  <!-- guardrail inline -->
  <rect x="500" y="90" width="220" height="80" rx="10" fill="#fce4ec" stroke="#c62828" stroke-width="1.6" filter="url(#shadowG)" />
  <text x="610" y="116" text-anchor="middle" font-size="12" font-weight="700" fill="#c62828">Barandilla (incrustada)</text>
  <text x="610" y="134" text-anchor="middle" font-size="10" fill="#555">determinista · ~ms · bloqueante</text>
  <text x="610" y="150" text-anchor="middle" font-size="10" fill="#555">PII · inyección · verificaciones de políticas</text>

  <line x1="720" y1="130" x2="785" y2="130" stroke="#555" stroke-width="1.8" marker-end="url(#arrG)" />

  <rect x="790" y="100" width="150" height="60" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.3" filter="url(#shadowG)" />
  <text x="865" y="126" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Respuesta</text>
  <text x="865" y="144" text-anchor="middle" font-size="10" fill="#555">el usuario lo ve ahora</text>

  <!-- async branch -->
  <path d="M 345 160 L 345 250" fill="none" stroke="#9b59b6" stroke-width="1.8" stroke-dasharray="6,4" marker-end="url(#arrG)" />
  <text x="360" y="215" font-size="10" font-style="italic" fill="#6a1b9a">trazas, muestreo asíncrono</text>

  <rect x="190" y="255" width="310" height="90" rx="10" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.6" filter="url(#shadowG)" />
  <text x="345" y="283" text-anchor="middle" font-size="12" font-weight="700" fill="#6a1b9a">Evaluación en línea (asíncrona)</text>
  <text x="345" y="302" text-anchor="middle" font-size="10" fill="#555">LLM como juez · sin referencia · de segundos a minutos</text>
  <text x="345" y="318" text-anchor="middle" font-size="10" fill="#555">nunca bloquea la respuesta</text>
  <text x="345" y="334" text-anchor="middle" font-size="10" fill="#555">tasa de muestreo ajustada en función del costo</text>

  <line x1="500" y1="300" x2="565" y2="300" stroke="#555" stroke-width="1.8" marker-end="url(#arrG)" />

  <rect x="570" y="255" width="280" height="90" rx="10" fill="#fff3e0" stroke="#e65100" stroke-width="1.6" filter="url(#shadowG)" />
  <text x="710" y="283" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Tableros de control + alertas</text>
  <text x="710" y="302" text-anchor="middle" font-size="10" fill="#555">distribuciones de puntuación, intervalos de confianza</text>
  <text x="710" y="318" text-anchor="middle" font-size="10" fill="#555">Alerta cuando se alcanza el límite inferior</text>
  <text x="710" y="334" text-anchor="middle" font-size="10" fill="#555">supera el umbral</text>

  <line x1="850" y1="300" x2="915" y2="300" stroke="#555" stroke-width="1.8" marker-end="url(#arrG)" />

  <rect x="920" y="255" width="220" height="90" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.6" filter="url(#shadowG)" />
  <text x="1030" y="283" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">En el volante</text>
  <text x="1030" y="302" text-anchor="middle" font-size="10" fill="#555">las trazas marcadas se convierten en</text>
  <text x="1030" y="318" text-anchor="middle" font-size="10" fill="#555">golden retrievers etiquetados en el</text>
  <text x="1030" y="334" text-anchor="middle" font-size="10" fill="#555">próximo conjunto de datos de regresión</text>

  <!-- comparison table -->
  <rect x="40" y="385" width="1100" height="115" rx="12" fill="#f8f9fa" stroke="#bbb" stroke-width="1.2" filter="url(#shadowG)" />
  <line x1="395" y1="395" x2="395" y2="490" stroke="#ddd" stroke-width="1" />
  <line x1="760" y1="395" x2="760" y2="490" stroke="#ddd" stroke-width="1" />

  <text x="217" y="413" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1a2e">Dimensión</text>
  <text x="577" y="413" text-anchor="middle" font-size="12" font-weight="700" fill="#c62828">Barandillas</text>
  <text x="950" y="413" text-anchor="middle" font-size="12" font-weight="700" fill="#6a1b9a">Evaluaciones en línea</text>

  <text x="60" y="437" font-size="10.5" fill="#555">En qué momento se agota el presupuesto de latencia</text>
  <text x="410" y="437" font-size="10.5" fill="#555">en la ruta de la solicitud · milisegundos</text>
  <text x="775" y="437" font-size="10.5" fill="#555">después de la respuesta: segundos a minutos</text>

  <text x="60" y="457" font-size="10.5" fill="#555">Mecanismo · efecto</text>
  <text x="410" y="457" font-size="10.5" fill="#555">reglas deterministas · bloquear / redactar / regenerar</text>
  <text x="775" y="457" font-size="10.5" fill="#555">LLM como juez + heurísticas · medir, nunca bloquear</text>

  <text x="60" y="477" font-size="10.5" fill="#555">Un falso positivo es…</text>
  <text x="410" y="477" font-size="10.5" fill="#555">un error en producción: versionado, registrado y monitorizado</text>
  <text x="775" y="477" font-size="10.5" fill="#555">ruido en un panel de control: ajustar la escala de medición</text>
</svg>
