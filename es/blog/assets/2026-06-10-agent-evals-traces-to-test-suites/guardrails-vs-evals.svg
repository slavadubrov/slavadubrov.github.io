<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 520" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Guardrails vs evaluaciones en línea: tareas distintas, canales diferentes</title>
  <desc id="artifact-desc">Guardrails vs evaluaciones en línea: tareas distintas, canales diferentes.</desc>
  <defs>
    <marker id="arrG" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#334155" />
    </marker>
    <filter id="shadowG" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <text y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a" x="590">Guardrails vs evaluaciones en línea: tareas distintas, canales diferentes</text>
  <text y="54" text-anchor="middle" font-size="12" fill="#334155" x="590">Las barreras de protección protegen al usuario en cuestión de milisegundos. Las evaluaciones miden la calidad de forma asíncrona. No las mezcle.</text>

  <!-- request flow spine -->
  <rect x="40" y="100" width="150" height="60" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.3" filter="url(#shadowG)" />
  <text y="126" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a" x="115">Solicitud del usuario</text>
  <text y="144" text-anchor="middle" font-size="10" fill="#334155" x="115">tráfico en tiempo real</text>

  <line x1="190" y1="130" x2="255" y2="130" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrG)" />

  <rect x="260" y="100" width="170" height="60" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3" filter="url(#shadowG)" />
  <text y="126" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="345">Ejecución del agente</text>
  <text y="144" text-anchor="middle" font-size="10" fill="#334155" x="345">planificación · herramientas · respuesta</text>

  <line x1="430" y1="130" x2="495" y2="130" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrG)" />

  <!-- guardrail inline -->
  <rect x="500" y="90" width="220" height="80" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="1.6" filter="url(#shadowG)" />
  <text y="116" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b" x="610">Barandilla (incrustada)</text>
  <text y="134" text-anchor="middle" font-size="10" fill="#334155" x="610">determinista · ~ms · bloqueante</text>
  <text y="150" text-anchor="middle" font-size="10" fill="#334155" x="610">PII · inyección · verificaciones de políticas</text>

  <line x1="720" y1="130" x2="785" y2="130" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrG)" />

  <rect x="790" y="100" width="150" height="60" rx="10" fill="#f0fdf4" stroke="#166534" stroke-width="1.3" filter="url(#shadowG)" />
  <text y="126" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="865">Respuesta</text>
  <text y="144" text-anchor="middle" font-size="10" fill="#334155" x="865">el usuario lo ve ahora</text>

  <!-- async branch -->
  <path d="M 345 160 L 345 250" fill="none" stroke="#7c3aed" stroke-width="1.8" stroke-dasharray="6,4" marker-end="url(#arrG)" />
  <text y="215" font-size="10" font-style="italic" fill="#5b21b6" x="360">trazas, muestreo asíncrono</text>

  <rect x="190" y="255" width="310" height="90" rx="10" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.6" filter="url(#shadowG)" />
  <text y="283" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6" x="345">Evaluación en línea (asíncrona)</text>
  <text y="302" text-anchor="middle" font-size="10" fill="#334155" x="345">LLM como juez · sin referencia · de segundos a minutos</text>
  <text y="318" text-anchor="middle" font-size="10" fill="#334155" x="345">nunca bloquea la respuesta</text>
  <text y="334" text-anchor="middle" font-size="10" fill="#334155" x="345">tasa de muestreo ajustada en función del costo</text>

  <line x1="500" y1="300" x2="565" y2="300" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrG)" />

  <rect x="570" y="255" width="280" height="90" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="1.6" filter="url(#shadowG)" />
  <text y="283" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="710">Tableros de control + alertas</text>
  <text y="302" text-anchor="middle" font-size="10" fill="#334155" x="710">distribuciones de puntuación, intervalos de confianza</text>
  <text y="318" text-anchor="middle" font-size="10" fill="#334155" x="710">Alerta cuando se alcanza el límite inferior</text>
  <text y="334" text-anchor="middle" font-size="10" fill="#334155" x="710">supera el umbral</text>

  <line x1="850" y1="300" x2="915" y2="300" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrG)" />

  <rect x="920" y="255" width="220" height="90" rx="10" fill="#f0fdf4" stroke="#166534" stroke-width="1.6" filter="url(#shadowG)" />
  <text y="283" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="1030">En el volante</text>
  <text y="302" text-anchor="middle" font-size="10" fill="#334155" x="1030">las trazas marcadas se convierten en</text>
  <text y="318" text-anchor="middle" font-size="10" fill="#334155" x="1030">golden retrievers etiquetados en el</text>
  <text y="334" text-anchor="middle" font-size="10" fill="#334155" x="1030">próximo conjunto de datos de regresión</text>

  <!-- comparison table -->
  <rect x="40" y="385" width="1100" height="115" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2" filter="url(#shadowG)" />
  <line x1="395" y1="395" x2="395" y2="490" stroke="#cbd5e1" stroke-width="1" />
  <line x1="760" y1="395" x2="760" y2="490" stroke="#cbd5e1" stroke-width="1" />

  <text y="413" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a" x="217">Dimensión</text>
  <text y="413" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b" x="577">Barandillas</text>
  <text y="413" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6" x="950">Evaluaciones en línea</text>

  <text y="437" font-size="10.5" fill="#334155" x="60">En qué momento se agota el presupuesto de latencia</text>
  <text y="437" font-size="10.5" fill="#334155" x="410">en la ruta de la solicitud · milisegundos</text>
  <text y="437" font-size="10.5" fill="#334155" x="775">después de la respuesta: segundos a minutos</text>

  <text y="457" font-size="10.5" fill="#334155" x="60">Mecanismo · efecto</text>
  <text y="457" font-size="10.5" fill="#334155" x="410">reglas deterministas · bloquear / redactar / regenerar</text>
  <text y="457" font-size="10.5" fill="#334155" x="775">LLM como juez + heurísticas · medir, nunca bloquear</text>

  <text y="477" font-size="10.5" fill="#334155" x="60">Un falso positivo es…</text>
  <text y="477" font-size="10.5" fill="#334155" x="410">un error en producción: versionado, registrado y monitorizado</text>
  <text y="477" font-size="10.5" fill="#334155" x="775">ruido en un panel de control: ajustar la escala de medición</text>
</svg>
