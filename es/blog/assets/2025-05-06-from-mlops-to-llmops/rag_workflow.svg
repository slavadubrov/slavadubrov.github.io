<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">RAG rutas de datos y compuertas de evaluación</title>
  <desc id="desc">Una fuente de versiones del camino de ingestión, con procesamiento de texto y particionamiento en bloques, embeddings, además del índice. Un camino serving autoriza y recupera documentos antes del ensamblaje y generación de contexto. Puertas lógicas independientes evalúan la recuperación de información y las respuestas basadas en datos reales.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#94a3b8" /></marker></defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="650" rx="28" fill="#0f172a" />
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">La recuperación de información constituye un producto de datos con su propia versiónización</text>
  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <text x="95" y="145" text-anchor="start" fill="#93c5fd" font-size="18" font-weight="700">INGESTIÓN</text>
    <g transform="translate(85 170)"><rect width="180" height="95" rx="16" fill="#1d4ed8" /><text x="90" y="38" fill="#93c5fd" font-size="18" font-weight="700">Instantánea de origen</text><text x="90" y="67" fill="#93c5fd" font-size="14">ACL + estado de eliminación</text></g>
    <path d="M275 218 H320" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <g transform="translate(330 170)"><rect width="180" height="95" rx="16" fill="#5b21b6" /><text x="90" y="38" fill="#93c5fd" font-size="18" font-weight="700">Analizar y fragmentar</text><text x="90" y="67" fill="#c4b5fd" font-size="14">lógica versionada</text></g>
    <path d="M520 218 H565" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <g transform="translate(575 170)"><rect width="180" height="95" rx="16" fill="#9a3412" /><text x="90" y="38" fill="#fdba74" font-size="18" font-weight="700">Incrustar</text><text x="90" y="67" fill="#fdba74" font-size="14">modelo + dimensiones</text></g>
    <path d="M765 218 H810" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <g transform="translate(820 170)"><rect width="180" height="95" rx="16" fill="#166534" /><text x="90" y="38" fill="#93c5fd" font-size="18" font-weight="700">Construcción del índice</text><text x="90" y="67" fill="#93c5fd" font-size="14">identidad inmutable</text></g>

    <text x="95" y="350" text-anchor="start" fill="#93c5fd" font-size="18" font-weight="700">SERVING</text>
    <g transform="translate(85 375)"><rect width="180" height="95" rx="16" fill="#1e293b" /><text x="90" y="38" fill="#e2e8f0" font-size="18" font-weight="700">Consulta + arrendatario</text><text x="90" y="67" fill="#94a3b8" font-size="14">solicitar identidad</text></g>
    <path d="M275 423 H320" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <g transform="translate(330 375)"><rect width="180" height="95" rx="16" fill="#1d4ed8" /><text x="90" y="38" fill="#93c5fd" font-size="18" font-weight="700">Autenticar y recuperar</text><text x="90" y="67" fill="#93c5fd" font-size="14">filtros + evidencia clasificada</text></g>
    <path d="M520 423 H565" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <g transform="translate(575 375)"><rect width="180" height="95" rx="16" fill="#5b21b6" /><text x="90" y="38" fill="#93c5fd" font-size="18" font-weight="700">Compilar contexto</text><text x="90" y="67" fill="#c4b5fd" font-size="14">presupuesto + referencias</text></g>
    <path d="M765 423 H810" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <g transform="translate(820 375)"><rect width="180" height="95" rx="16" fill="#166534" /><text x="90" y="38" fill="#93c5fd" font-size="18" font-weight="700">Generar</text><text x="90" y="67" fill="#93c5fd" font-size="14">respuesta basada en evidencias</text></g>

    <rect x="215" y="535" width="320" height="78" rx="16" fill="#1d4ed8" /><text x="375" y="567" fill="#93c5fd" font-size="18" font-weight="700">Portón de recuperación</text><text x="375" y="594" fill="#93c5fd" font-size="14">recuperación • clasificación • autorización</text>
    <rect x="665" y="535" width="320" height="78" rx="16" fill="#991b1b" /><text x="825" y="567" fill="#fca5a5" font-size="18" font-weight="700">puerta de respuesta</text><text x="825" y="594" fill="#fca5a5" font-size="14">soporte • citación • éxito de tarea</text>
  </g>
</svg>
