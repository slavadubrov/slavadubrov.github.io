<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Usuario</title>
  <desc id="artifact-desc">Usuario.</desc>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="100%" height="100%" fill="#f8fafc" /><style>
    .box { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 8; }
    .db-box { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 8; }
    .llm-box { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 8; }
    .text { font-family: Inter, system-ui, sans-serif; font-size: 14px; fill: #0f172a; text-anchor: middle; dominant-baseline: middle; }
    .path { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .label { font-family: Inter, system-ui, sans-serif; font-size: 12px; fill: #334155; text-anchor: middle; background-color: #f8fafc;}
  </style>


  <rect x="20" y="130" width="80" height="40" class="box" />
  <text y="150" class="text" x="60">Usuario</text>

  <rect x="150" y="130" width="100" height="40" class="box" />
  <text y="150" class="text" x="200">Aplicación / Agente</text>

  <rect x="300" y="40" width="120" height="40" class="db-box" />
  <text y="60" class="text" x="360">Banco de datos vectorial</text>

  <rect x="300" y="220" width="120" height="40" class="llm-box" />
  <text y="240" class="text" x="360">LLM</text>


  <path d="M100 150 H150" class="path" />
  <text y="140" class="label" x="125">Consulta</text>

  <path d="M200 130 V60 H300" class="path" />
  <text y="50" class="label" x="250">Búsqueda</text>

  <path d="M420 60 H450 V240 H420" class="path" />
  <text y="150" class="label" x="470">Contexto</text>

  <path d="M200 170 V240 H300" class="path" />
  <text y="230" class="label" x="250">Prompt</text>

  <path d="M360 220 V180" class="path" style="marker-end: none;" />
  <path d="M360 180 L250 150" class="path" />
  <text y="170" class="label" x="320">Respuesta</text>

</svg>
