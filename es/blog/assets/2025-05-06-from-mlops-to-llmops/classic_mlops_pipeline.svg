<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Controles de MLOps conservados en sistemas de modelos base</title>
  <desc id="desc">Un bucle conecta la línea de descendencia, la compilación reutilizable, la validación fuera de línea, el lanzamiento por fases, la supervisión del servicio y los comentarios sobre incidentes. La gobernanza y la reversión abarcan todo el bucle.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#94a3b8" /></marker></defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="560" rx="28" fill="#0f172a" />
  <text x="600" y="64" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">El bucle de control de MLOps sigue siendo aplicable</text>
  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <g transform="translate(45 175)"><rect width="160" height="110" rx="17" fill="#1d4ed8" /><text x="80" y="48" fill="#93c5fd" font-size="19" font-weight="700">Linaje</text><text x="80" y="78" fill="#93c5fd" font-size="14">datos • código • configuración</text></g>
    <path d="M215 230 H250" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <g transform="translate(260 175)"><rect width="160" height="110" rx="17" fill="#5b21b6" /><text x="80" y="48" fill="#93c5fd" font-size="19" font-weight="700">Construir</text><text x="80" y="78" fill="#c4b5fd" font-size="14">repetible pipeline</text></g>
    <path d="M430 230 H465" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <g transform="translate(475 175)"><rect width="160" height="110" rx="17" fill="#9a3412" /><text x="80" y="48" fill="#fdba74" font-size="19" font-weight="700">Validar</text><text x="80" y="78" fill="#fdba74" font-size="14">puerta de liberación sin conexión</text></g>
    <path d="M645 230 H680" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <g transform="translate(690 175)"><rect width="160" height="110" rx="17" fill="#1d4ed8" /><text x="80" y="48" fill="#93c5fd" font-size="19" font-weight="700">lanzamiento</text><text x="80" y="78" fill="#93c5fd" font-size="14">lanzamiento por fases</text></g>
    <path d="M860 230 H895" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <g transform="translate(905 175)"><rect width="160" height="110" rx="17" fill="#166534" /><text x="80" y="48" fill="#93c5fd" font-size="19" font-weight="700">Observe</text><text x="80" y="78" fill="#93c5fd" font-size="14">SLOs • capacidad</text></g>
    <path d="M985 295 V370 H125 V295" stroke="#94a3b8" stroke-width="4" fill="none" marker-end="url(#a)" />
    <text x="555" y="410" fill="#cbd5e1" font-size="17">las pruebas del incidente y los comentarios revisados vuelven al punto de aprobación de lanzamiento</text>
    <rect x="225" y="455" width="750" height="65" rx="16" fill="#1e293b" />
    <text x="600" y="495" fill="#e2e8f0" font-size="17" font-weight="700">La gobernanza, la identidad inmutable y las capacidades de reversión están presentes en cada etapa</text>
  </g>
</svg>
