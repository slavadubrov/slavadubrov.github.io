<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 720" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadowSF" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Title -->
  <text x="590" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a2e">Taxonomía de fallos silenciosos</text>
  <text x="590" y="54" text-anchor="middle" font-size="12" fill="#666">Cada modo de fallo va con la métrica que lo detecta. Sin ella, el bug es invisible.</text>

  <!-- Root -->
  <rect x="475" y="78" width="230" height="44" rx="22" fill="#c62828" filter="url(#shadowSF)" />
  <text x="590" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="white">Fallo silencioso (RAG)</text>

  <!-- Trunk: 4 main branches -->
  <line x1="540" y1="122" x2="170" y2="170" stroke="#888" stroke-width="1.4" />
  <line x1="570" y1="122" x2="450" y2="170" stroke="#888" stroke-width="1.4" />
  <line x1="610" y1="122" x2="730" y2="170" stroke="#888" stroke-width="1.4" />
  <line x1="640" y1="122" x2="1010" y2="170" stroke="#888" stroke-width="1.4" />

  <!-- ====== Branch A: Ingestion ====== -->
  <rect x="40" y="170" width="260" height="40" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" />
  <text x="170" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">Fallos de ingestión</text>

  <!-- A1: Parse loss -->
  <rect x="40" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="50" y="245" font-size="11" font-weight="700" fill="#1565c0">Pérdida al parsear</text>
  <text x="50" y="261" font-size="10" fill="#444">las tablas colapsan · las notas</text>
  <text x="50" y="275" font-size="10" fill="#444">se omiten · OCR confunde dígitos</text>
  <text x="50" y="285" font-size="9" font-style="italic" fill="#888">detectado por: CER/WER, TEDS</text>

  <!-- A2: Chunk break -->
  <rect x="40" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="50" y="320" font-size="11" font-weight="700" fill="#1565c0">Corte de chunk</text>
  <text x="50" y="336" font-size="10" fill="#444">el span de respuesta se parte en dos</text>
  <text x="50" y="350" font-size="10" fill="#444">chunks; ninguno tiene toda la evidencia</text>
  <text x="50" y="360" font-size="9" font-style="italic" fill="#888">detectado por: answer-span containment</text>

  <!-- A3: Dedup miss -->
  <rect x="40" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="50" y="395" font-size="11" font-weight="700" fill="#1565c0">Error de dedup</text>
  <text x="50" y="411" font-size="10" fill="#444">falsa fusión corrompe la respuesta;</text>
  <text x="50" y="425" font-size="10" fill="#444">falso keep oculta el doc correcto</text>
  <text x="50" y="435" font-size="9" font-style="italic" fill="#888">detectado por: precisión/recall dup</text>

  <!-- A4: Normalization -->
  <rect x="40" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="50" y="470" font-size="11" font-weight="700" fill="#1565c0">Deriva de normalización</text>
  <text x="50" y="486" font-size="10" fill="#444">desajuste NFC vs NFKC rompe la</text>
  <text x="50" y="500" font-size="10" fill="#444">resolución de alias por exact-match</text>
  <text x="50" y="510" font-size="9" font-style="italic" fill="#888">detectado por: paridad NFC/NFKC, cobertura de alias</text>

  <!-- ====== Branch B: Embedding/Index ====== -->
  <rect x="320" y="170" width="260" height="40" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" />
  <text x="450" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">Embedding e índice</text>

  <!-- B1: Embedding miss -->
  <rect x="320" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="330" y="245" font-size="11" font-weight="700" fill="#1565c0">Fallo de embedding</text>
  <text x="330" y="261" font-size="10" fill="#444">un término del dominio queda fuera</text>
  <text x="330" y="275" font-size="10" fill="#444">de la distribución de entrenamiento</text>
  <text x="330" y="285" font-size="9" font-style="italic" fill="#888">detectado por: Recall@k de dominio vs. baseline</text>

  <!-- B2: ANN drop -->
  <rect x="320" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="330" y="320" font-size="11" font-weight="700" fill="#1565c0">Caída por aproximación ANN</text>
  <text x="330" y="336" font-size="10" fill="#444">HNSW efSearch demasiado bajo; el gold</text>
  <text x="330" y="350" font-size="10" fill="#444">vector existe pero no se alcanza</text>
  <text x="330" y="360" font-size="9" font-style="italic" fill="#888">detectado por: recall ANN vs. flat</text>

  <!-- B3: Embedding drift -->
  <rect x="320" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="330" y="395" font-size="11" font-weight="700" fill="#1565c0">Deriva de embedding</text>
  <text x="330" y="411" font-size="10" fill="#444">salto de versión del modelo del proveedor;</text>
  <text x="330" y="425" font-size="10" fill="#444">los vectores antiguos ya no se alinean</text>
  <text x="330" y="435" font-size="9" font-style="italic" fill="#888">detectado por: estabilidad NN en probe-set</text>

  <!-- B4: Stale index -->
  <rect x="320" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="330" y="470" font-size="11" font-weight="700" fill="#1565c0">Índice desactualizado</text>
  <text x="330" y="486" font-size="10" fill="#444">retraso de frescura; las consultas van</text>
  <text x="330" y="500" font-size="10" fill="#444">contra la verdad de la semana pasada</text>
  <text x="330" y="510" font-size="9" font-style="italic" fill="#888">detectado por: freshness lag p99, %-stale</text>

  <!-- ====== Branch C: Online retrieval (HOT — silent killers) ====== -->
  <rect x="600" y="170" width="260" height="40" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="2" />
  <text x="730" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#c62828">Recuperación online</text>

  <!-- C1: Filter exclude (highlighted) -->
  <rect x="600" y="225" width="260" height="64" rx="8" fill="#ffebee" stroke="#c62828" stroke-width="2" filter="url(#shadowSF)" />
  <text x="610" y="245" font-size="11" font-weight="700" fill="#c62828">Falsa exclusión por filtro</text>
  <text x="610" y="261" font-size="10" fill="#444">un predicado duro elimina el gold doc;</text>
  <text x="610" y="275" font-size="10" fill="#444">Recall@k parece normal — sobre un conjunto vacío</text>
  <text x="610" y="285" font-size="9" font-style="italic" fill="#c62828">detectado por: tasa de falsa exclusión del filtro</text>

  <!-- C2: Rerank miss -->
  <rect x="600" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#c62828" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="610" y="320" font-size="11" font-weight="700" fill="#c62828">Fallo de rerank</text>
  <text x="610" y="336" font-size="10" fill="#444">el cross-encoder relega el doc correcto</text>
  <text x="610" y="350" font-size="10" fill="#444">tras distractores plausibles</text>
  <text x="610" y="360" font-size="9" font-style="italic" fill="#888">detectado por: ΔnDCG, robustez a distractores (RGB)</text>

  <!-- C3: Lost in middle -->
  <rect x="600" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#c62828" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="610" y="395" font-size="11" font-weight="700" fill="#c62828">Perdido en medio</text>
  <text x="610" y="411" font-size="10" fill="#444">el chunk gold está en contexto pero en</text>
  <text x="610" y="425" font-size="10" fill="#444">posición 7/10; el modelo lo ignora</text>
  <text x="610" y="435" font-size="9" font-style="italic" fill="#888">detectado por: eval estratificada por posición</text>

  <!-- C4: Bad rewrite -->
  <rect x="600" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#c62828" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="610" y="470" font-size="11" font-weight="700" fill="#c62828">Regresión en reescritura de query</text>
  <text x="610" y="486" font-size="10" fill="#444">HyDE alucina una entidad que</text>
  <text x="610" y="500" font-size="10" fill="#444">sesga la recuperación en mala dirección</text>
  <text x="610" y="510" font-size="9" font-style="italic" fill="#888">detectado por: ganancia/pérdida A/B de rewrite</text>

  <!-- ====== Branch D: Generation/Citation ====== -->
  <rect x="880" y="170" width="260" height="40" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" />
  <text x="1010" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#6a1b9a">Generación</text>

  <!-- D1: Hallucination -->
  <rect x="880" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="890" y="245" font-size="11" font-weight="700" fill="#6a1b9a">Alucinación</text>
  <text x="890" y="261" font-size="10" fill="#444">afirmación sin soporte, a menudo una</text>
  <text x="890" y="275" font-size="10" fill="#444">entidad que no está en el contexto</text>
  <text x="890" y="285" font-size="9" font-style="italic" fill="#888">detectado por: faithfulness, HHEM, FActScore</text>

  <!-- D2: No citation -->
  <rect x="880" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="890" y="320" font-size="11" font-weight="700" fill="#6a1b9a">Teatro de citas</text>
  <text x="890" y="336" font-size="10" fill="#444">el span citado no</text>
  <text x="890" y="350" font-size="10" fill="#444">apoya realmente la afirmación cercana</text>
  <text x="890" y="360" font-size="9" font-style="italic" fill="#888">detectado por: precisión/recall de cita (TREC support)</text>

  <!-- D3: Wrong refusal -->
  <rect x="880" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="890" y="395" font-size="11" font-weight="700" fill="#6a1b9a">Abstención errónea</text>
  <text x="890" y="411" font-size="10" fill="#444">"No lo sé" cuando la respuesta</text>
  <text x="890" y="425" font-size="10" fill="#444">está en contexto (o al revés)</text>
  <text x="890" y="435" font-size="9" font-style="italic" fill="#888">detectado por: NoMIRACL, precisión de abstención</text>

  <!-- D4: Schema break -->
  <rect x="880" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="890" y="470" font-size="11" font-weight="700" fill="#6a1b9a">Rotura de esquema/vocab</text>
  <text x="890" y="486" font-size="10" fill="#444">una salida sintácticamente válida elige</text>
  <text x="890" y="500" font-size="10" fill="#444">un ID de ontología erróneo pero válido</text>
  <text x="890" y="510" font-size="9" font-style="italic" fill="#888">detectado por: conformidad de vocabulario</text>

  <!-- Footer band -->
  <rect x="40" y="555" width="1100" height="68" rx="8" fill="#fffde7" stroke="#fbc02d" stroke-width="1.2" />
  <text x="590" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#827717">Guía de lectura</text>
  <text x="590" y="598" text-anchor="middle" font-size="10" fill="#827717">Cada fallo es silencioso sin su métrica. La "corrección de respuesta" sola dice que algo falla, no dónde.</text>
  <text x="590" y="614" text-anchor="middle" font-size="10" fill="#827717">La rama roja (exclusión por filtro, fallo de rerank, perdido en medio, mala rewrite) es donde más duele el RAG en producción. Instrumenta eso primero.</text>

  <!-- Visual cue: the 'red' propagation -->
  <rect x="40" y="640" width="1100" height="62" rx="8" fill="#ffffff" stroke="#cbd5e0" stroke-width="1" />
  <text x="60" y="662" font-size="11" font-weight="600" fill="#1a1a2e">La regla de propagación:</text>
  <text x="60" y="682" font-size="10" fill="#555">Un fallo a la izquierda marca un techo de recall para todo a la derecha. Un mal parseo limita chunking. Un mal chunking limita retrieval.</text>
  <text x="60" y="696" font-size="10" fill="#555">Un mal retrieval limita reranking. Un mal reranking limita generación. Faithfulness solo mide el último eslabón: no ve la cadena rota.</text>
</svg>
