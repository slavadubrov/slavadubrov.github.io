<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 720" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="Silent failure taxonomy with the metric that catches each mode" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Taxonomía de fallos silenciosos con la métrica que detecta cada modo</title>
  <defs>
    <filter id="shadowSF" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a" x="590">Taxonomía de fallos silenciosos</text>
  <text y="54" text-anchor="middle" font-size="12" fill="#334155" x="590">Cada modo de fallo está asociado a la métrica que lo detecta. Sin dicha métrica, el error queda invisible.</text>

  <!-- Root -->
  <rect x="475" y="78" width="230" height="44" rx="22" fill="#dc2626" filter="url(#shadowSF)" />
  <text y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" x="590">Fallo silencioso (RAG)</text>

  <!-- Trunk: 4 main branches -->
  <line x1="540" y1="122" x2="170" y2="170" stroke="#94a3b8" stroke-width="1.4" />
  <line x1="570" y1="122" x2="450" y2="170" stroke="#94a3b8" stroke-width="1.4" />
  <line x1="610" y1="122" x2="730" y2="170" stroke="#94a3b8" stroke-width="1.4" />
  <line x1="640" y1="122" x2="1010" y2="170" stroke="#94a3b8" stroke-width="1.4" />

  <!-- ====== Branch A: Ingestion ====== -->
  <rect x="40" y="170" width="260" height="40" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8" x="170">Fallas en la ingesta</text>

  <!-- A1: Parse loss -->
  <rect x="40" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="245" font-size="11" font-weight="700" fill="#1d4ed8" x="50">Pérdida de parseo</text>
  <text y="261" font-size="10" fill="#334155" x="50">las tablas se contraen · notas al pie</text>
  <text y="275" font-size="10" fill="#334155" x="50">descartado · OCR mezcla dígitos</text>
  <text y="285" font-size="9" font-style="italic" fill="#64748b" x="50">detectado por: CER/WER, TEDS</text>

  <!-- A2: Chunk break -->
  <rect x="40" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="320" font-size="11" font-weight="700" fill="#1d4ed8" x="50">Rotura de chunk</text>
  <text y="336" font-size="10" fill="#334155" x="50">respuesta con segmento dividido en dos</text>
  <text y="350" font-size="10" fill="#334155" x="50">trozos; ninguno cuenta con evidencia completa</text>
  <text y="360" font-size="9" font-style="italic" fill="#64748b" x="50">capturado por: contención answer-span</text>

  <!-- A3: Dedup miss -->
  <rect x="40" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="395" font-size="11" font-weight="700" fill="#1d4ed8" x="50">Error de deduplicación</text>
  <text y="411" font-size="10" fill="#334155" x="50">La operación false-merge daña la respuesta;</text>
  <text y="425" font-size="10" fill="#334155" x="50">False-Keep oculta el documento correcto</text>
  <text y="435" font-size="9" font-style="italic" fill="#64748b" x="50">detectado por: precisión/recuperación de duplicados</text>

  <!-- A4: Normalization -->
  <rect x="40" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="470" font-size="11" font-weight="700" fill="#1d4ed8" x="50">Deriva de normalización</text>
  <text y="486" font-size="10" fill="#334155" x="50">Errores por desincronización entre NFC y NFKC</text>
  <text y="500" font-size="10" fill="#334155" x="50">resolución de alias de coincidencia exacta</text>
  <text y="510" font-size="9" font-style="italic" fill="#64748b" x="50">detectado por: paridad NFC/NFKC, cobertura de alias</text>

  <!-- ====== Branch B: Embedding/Index ====== -->
  <rect x="320" y="170" width="260" height="40" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8" x="450">Embedding y el índice</text>

  <!-- B1: Embedding miss -->
  <rect x="320" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="245" font-size="11" font-weight="700" fill="#1d4ed8" x="330">Embedding fallo</text>
  <text y="261" font-size="10" fill="#334155" x="330">el término de dominio se encuentra fuera de</text>
  <text y="275" font-size="10" fill="#334155" x="330">distribución de entrenamiento del modelo</text>
  <text y="285" font-size="9" font-style="italic" fill="#64748b" x="330">detectado por: Recall@k del dominio frente a la línea de base</text>

  <!-- B2: ANN drop -->
  <rect x="320" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="320" font-size="11" font-weight="700" fill="#1d4ed8" x="330">ANN pérdida por aproximación</text>
  <text y="336" font-size="10" fill="#334155" x="330">HNSW valor de efSearch demasiado bajo; nivel oro</text>
  <text y="350" font-size="10" fill="#334155" x="330">el vector existe pero no se alcanza</text>
  <text y="360" font-size="9" font-style="italic" fill="#64748b" x="330">detectado por: ANN recuperación frente a plano</text>

  <!-- B3: Embedding drift -->
  <rect x="320" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="395" font-size="11" font-weight="700" fill="#1d4ed8" x="330">Embedding deriva</text>
  <text y="411" font-size="10" fill="#334155" x="330">actualización de versión del modelo del proveedor;</text>
  <text y="425" font-size="10" fill="#334155" x="330">vectores antiguos que ya no están alineados</text>
  <text y="435" font-size="9" font-style="italic" fill="#64748b" x="330">detectado por: estabilidad del NN del conjunto de sondas</text>

  <!-- B4: Stale index -->
  <rect x="320" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="470" font-size="11" font-weight="700" fill="#1d4ed8" x="330">Índice obsoleto</text>
  <text y="486" font-size="10" fill="#334155" x="330">retardo de frescura; ejecución de consultas</text>
  <text y="500" font-size="10" fill="#334155" x="330">en comparación con la verdad de la semana pasada</text>
  <text y="510" font-size="9" font-style="italic" fill="#64748b" x="330">detectado por: retraso de frescura p99, %-vencido</text>

  <!-- ====== Branch C: Online retrieval (HOT — silent killers) ====== -->
  <rect x="600" y="170" width="260" height="40" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2" />
  <text y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b" x="730">Recuperación en línea</text>

  <!-- C1: Filter exclude (highlighted) -->
  <rect x="600" y="225" width="260" height="64" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2" filter="url(#shadowSF)" />
  <text y="245" font-size="11" font-weight="700" fill="#991b1b" x="610">Filtro de exclusión falsa</text>
  <text y="261" font-size="10" fill="#334155" x="610">Los predicados difíciles descartan el documento de oro;</text>
  <text y="275" font-size="10" fill="#334155" x="610">El Recall@k es normal: sobre un conjunto vacío</text>
  <text y="285" font-size="9" font-style="italic" fill="#991b1b" x="610">detectado por: tasa de falsa exclusión del filtro</text>

  <!-- C2: Rerank miss -->
  <rect x="600" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="320" font-size="11" font-weight="700" fill="#991b1b" x="610">Errore de reclasificación</text>
  <text y="336" font-size="10" fill="#334155" x="610">el cross-encoder degrada la capa derecha</text>
  <text y="350" font-size="10" fill="#334155" x="610">documento oculto tras distractores plausibles</text>
  <text y="360" font-size="9" font-style="italic" fill="#64748b" x="610">detectado por: ΔnDCG, robustez ante distractores (RGB)</text>

  <!-- C3: Lost in middle -->
  <rect x="600" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="395" font-size="11" font-weight="700" fill="#991b1b" x="610">Perdido en el medio</text>
  <text y="411" font-size="10" fill="#334155" x="610">trozo de oro en contexto pero en</text>
  <text y="425" font-size="10" fill="#334155" x="610">posición 7/10; el modelo la ignora</text>
  <text y="435" font-size="9" font-style="italic" fill="#64748b" x="610">detectado por: evaluación estratificada por posición</text>

  <!-- C4: Bad rewrite -->
  <rect x="600" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="470" font-size="11" font-weight="700" fill="#991b1b" x="610">Regresión de reescritura de consultas</text>
  <text y="486" font-size="10" fill="#334155" x="610">HyDE genera una entidad que</text>
  <text y="500" font-size="10" fill="#334155" x="610">inclina la recuperación en la dirección incorrecta</text>
  <text y="510" font-size="9" font-style="italic" fill="#64748b" x="610">detectado por: ganancia/pérdida de reescritura A/B</text>

  <!-- ====== Branch D: Generation/Citation ====== -->
  <rect x="880" y="170" width="260" height="40" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" />
  <text y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6" x="1010">Generación</text>

  <!-- D1: Hallucination -->
  <rect x="880" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="245" font-size="11" font-weight="700" fill="#5b21b6" x="890">Alucinación</text>
  <text y="261" font-size="10" fill="#334155" x="890">afirmación no respaldada, con frecuencia un</text>
  <text y="275" font-size="10" fill="#334155" x="890">entidad no presente en el contexto</text>
  <text y="285" font-size="9" font-style="italic" fill="#64748b" x="890">detectado por: fidelidad, HHEM, FActScore</text>

  <!-- D2: No citation -->
  <rect x="880" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="320" font-size="11" font-weight="700" fill="#5b21b6" x="890">Teatro de citaciones</text>
  <text y="336" font-size="10" fill="#334155" x="890">el span citado en realidad no</text>
  <text y="350" font-size="10" fill="#334155" x="890">respaldar la afirmación que se encuentra junto a ella</text>
  <text y="360" font-size="9" font-style="italic" fill="#64748b" x="890">detectado por: precisión/recuerdo de citación (soporte TREC)</text>

  <!-- D3: Wrong refusal -->
  <rect x="880" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="395" font-size="11" font-weight="700" fill="#5b21b6" x="890">Abstención incorrecta</text>
  <text y="411" font-size="10" fill="#334155" x="890">"No lo sé" cuando la respuesta</text>
  <text y="425" font-size="10" fill="#334155" x="890">se encuentra en el contexto (o viceversa)</text>
  <text y="435" font-size="9" font-style="italic" fill="#64748b" x="890">detectado por: NoMIRACL, precisión de abstenencia</text>

  <!-- D4: Schema break -->
  <rect x="880" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="470" font-size="11" font-weight="700" fill="#5b21b6" x="890">Ruptura de esquema/vocabulario</text>
  <text y="486" font-size="10" fill="#334155" x="890">elecciones de salida sintácticamente válidas</text>
  <text y="500" font-size="10" fill="#334155" x="890">un ID de ontología incorrecto pero válido</text>
  <text y="510" font-size="9" font-style="italic" fill="#64748b" x="890">detectado por: conformidad léxica</text>

  <!-- Footer band -->
  <rect x="40" y="555" width="1100" height="68" rx="8" fill="#f0fdf4" stroke="#ea580c" stroke-width="1.2" />
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="590">Guía de lectura</text>
  <text y="598" text-anchor="middle" font-size="10" fill="#9a3412" x="590">Cada fallo permanece silencioso al no existir su métrica correspondiente. La mera evaluación estándar de la “corrección de respuesta” solo indica que algo está defectuoso, pero no dónde exactamente.</text>
  <text y="614" text-anchor="middle" font-size="10" fill="#9a3412" x="590">La rama roja (exclusión por filtro, reclasificación fallida, casos perdidos en el proceso, reescritura defectuosa) es donde causa más problemas los RAG en producción. Instrumenta primero esa área.</text>

  <!-- Visual cue: the 'red' propagation -->
  <rect x="40" y="640" width="1100" height="62" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="662" font-size="11" font-weight="600" fill="#0f172a" x="60">La regla de propagación:</text>
  <text y="682" font-size="10" fill="#334155" x="60">Una falla en el lado izquierdo representa un techo de recuperación para todo lo que se encuentra en el lado derecho. Un análisis defectuoso limita la división en fragmentos. Una división deficiente a su vez limita la recuperación de información.</text>
  <text y="696" font-size="10" fill="#334155" x="60">Capas de recuperación defectuosas reranking. Generación de capas reranking defectuosas. Las métricas de fidelidad solo analizan el último eslabón; no pueden detectar la cadena rota.</text>
</svg>
