<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 720" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadowSF" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Title -->
  <text x="590" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a2e">Taxonomía de fallos silenciosos</text>
  <text x="590" y="54" text-anchor="middle" font-size="12" fill="#666">Cada modo de fallo está asociado a la métrica que lo detecta. Sin dicha métrica, el error queda invisible.</text>

  <!-- Root -->
  <rect x="475" y="78" width="230" height="44" rx="22" fill="#c62828" filter="url(#shadowSF)" />
  <text x="590" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="white">Fallo silencioso (RAG)</text>

  <!-- Trunk: 4 main branches -->
  <line x1="540" y1="122" x2="170" y2="170" stroke="#888" stroke-width="1.4" />
  <line x1="570" y1="122" x2="450" y2="170" stroke="#888" stroke-width="1.4" />
  <line x1="610" y1="122" x2="730" y2="170" stroke="#888" stroke-width="1.4" />
  <line x1="640" y1="122" x2="1010" y2="170" stroke="#888" stroke-width="1.4" />

  <!-- ====== Branch A: Ingestion ====== -->
  <rect x="40" y="170" width="260" height="40" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" />
  <text x="170" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">Fallas de ingestión</text>

  <!-- A1: Parse loss -->
  <rect x="40" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="50" y="245" font-size="11" font-weight="700" fill="#1565c0">Pérdida de parseo</text>
  <text x="50" y="261" font-size="10" fill="#444">las tablas se pliegan · notas al pie</text>
  <text x="50" y="275" font-size="10" fill="#444">descartado · el OCR distorsiona los dígitos</text>
  <text x="50" y="285" font-size="9" font-style="italic" fill="#888">detectado por: CER/WER, TEDS</text>

  <!-- A2: Chunk break -->
  <rect x="40" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="50" y="320" font-size="11" font-weight="700" fill="#1565c0">Separación de chunks</text>
  <text x="50" y="336" font-size="10" fill="#444">el texto de respuesta dividido en dos partes</text>
  <text x="50" y="350" font-size="10" fill="#444">bloques; ninguno cuenta con evidencia completa</text>
  <text x="50" y="360" font-size="9" font-style="italic" fill="#888">capturado por: contención answer-span</text>

  <!-- A3: Dedup miss -->
  <rect x="40" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="50" y="395" font-size="11" font-weight="700" fill="#1565c0">Error de deduplicación</text>
  <text x="50" y="411" font-size="10" fill="#444">False-merge daña la respuesta.</text>
  <text x="50" y="425" font-size="10" fill="#444">False-keep oculta el documento correcto</text>
  <text x="50" y="435" font-size="9" font-style="italic" fill="#888">detectado por: precisión/recuperación duplicada</text>

  <!-- A4: Normalization -->
  <rect x="40" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="50" y="470" font-size="11" font-weight="700" fill="#1565c0">Deriva en la normalización</text>
  <text x="50" y="486" font-size="10" fill="#444">Errores por desincronización entre NFC y NFKC</text>
  <text x="50" y="500" font-size="10" fill="#444">resolución de alias por coincidencia exacta</text>
  <text x="50" y="510" font-size="9" font-style="italic" fill="#888">detectado por: paridad NFC/NFKC, cobertura de alias</text>

  <!-- ====== Branch B: Embedding/Index ====== -->
  <rect x="320" y="170" width="260" height="40" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" />
  <text x="450" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">Incrustación e índice</text>

  <!-- B1: Embedding miss -->
  <rect x="320" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="330" y="245" font-size="11" font-weight="700" fill="#1565c0">Error de incrustación</text>
  <text x="330" y="261" font-size="10" fill="#444">el término del dominio se encuentra fuera de</text>
  <text x="330" y="275" font-size="10" fill="#444">distribución de entrenamiento del modelo</text>
  <text x="330" y="285" font-size="9" font-style="italic" fill="#888">capturado por: Recall del dominio @k frente a la línea de base</text>

  <!-- B2: ANN drop -->
  <rect x="320" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="330" y="320" font-size="11" font-weight="700" fill="#1565c0">Disminución en la aproximación del ANN</text>
  <text x="330" y="336" font-size="10" fill="#444">Nivel de efSearch en HNSW demasiado bajo; nivel dorado</text>
  <text x="330" y="350" font-size="10" fill="#444">el vector existe pero no se puede acceder a él</text>
  <text x="330" y="360" font-size="9" font-style="italic" fill="#888">capturado por: recuperación de ANN frente a valor plano</text>

  <!-- B3: Embedding drift -->
  <rect x="320" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="330" y="395" font-size="11" font-weight="700" fill="#1565c0">Deriva del embedding</text>
  <text x="330" y="411" font-size="10" fill="#444">actualización de la versión del modelo del proveedor;</text>
  <text x="330" y="425" font-size="10" fill="#444">los vectores antiguos ya no están alineados</text>
  <text x="330" y="435" font-size="9" font-style="italic" fill="#888">detectado por: estabilidad del conjunto de sondas NN</text>

  <!-- B4: Stale index -->
  <rect x="320" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="330" y="470" font-size="11" font-weight="700" fill="#1565c0">Índice obsoleto</text>
  <text x="330" y="486" font-size="10" fill="#444">retardo en la frescura de los datos; ejecución de consultas</text>
  <text x="330" y="500" font-size="10" fill="#444">en contraste con la versión real de la semana pasada</text>
  <text x="330" y="510" font-size="9" font-style="italic" fill="#888">detectado por: retraso en frescura p99, %-vencido</text>

  <!-- ====== Branch C: Online retrieval (HOT — silent killers) ====== -->
  <rect x="600" y="170" width="260" height="40" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="2" />
  <text x="730" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#c62828">Recuperación en línea</text>

  <!-- C1: Filter exclude (highlighted) -->
  <rect x="600" y="225" width="260" height="64" rx="8" fill="#ffebee" stroke="#c62828" stroke-width="2" filter="url(#shadowSF)" />
  <text x="610" y="245" font-size="11" font-weight="700" fill="#c62828">Filtro de exclusión falsa</text>
  <text x="610" y="261" font-size="10" fill="#444">El predicado duro elimina el documento de oro.</text>
  <text x="610" y="275" font-size="10" fill="#444">Recall@k parece normal: sobre un conjunto vacío</text>
  <text x="610" y="285" font-size="9" font-style="italic" fill="#c62828">capturado por: tasa de exclusión falsa del filtro</text>

  <!-- C2: Rerank miss -->
  <rect x="600" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#c62828" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="610" y="320" font-size="11" font-weight="700" fill="#c62828">Fallo de reclasificación</text>
  <text x="610" y="336" font-size="10" fill="#444">El codificador cruzado degrada la señal derecha</text>
  <text x="610" y="350" font-size="10" fill="#444">documento detrás de distractores plausibles</text>
  <text x="610" y="360" font-size="9" font-style="italic" fill="#888">detectado por: ΔnDCG, robustez ante estímulos distractores (RGB)</text>

  <!-- C3: Lost in middle -->
  <rect x="600" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#c62828" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="610" y="395" font-size="11" font-weight="700" fill="#c62828">Perdido en el centro</text>
  <text x="610" y="411" font-size="10" fill="#444">trozo de oro en el contexto, pero en</text>
  <text x="610" y="425" font-size="10" fill="#444">Posición 7/10; el modelo la ignora.</text>
  <text x="610" y="435" font-size="9" font-style="italic" fill="#888">capturado por: evaluación estratificada por posición</text>

  <!-- C4: Bad rewrite -->
  <rect x="600" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#c62828" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="610" y="470" font-size="11" font-weight="700" fill="#c62828">Regresión de reescritura de consultas</text>
  <text x="610" y="486" font-size="10" fill="#444">HyDE genera una entidad que</text>
  <text x="610" y="500" font-size="10" fill="#444">inclina la recuperación en la dirección incorrecta</text>
  <text x="610" y="510" font-size="9" font-style="italic" fill="#888">detectado por: reescritura de ganancia/pérdida A/B</text>

  <!-- ====== Branch D: Generation/Citation ====== -->
  <rect x="880" y="170" width="260" height="40" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" />
  <text x="1010" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#6a1b9a">Generación</text>

  <!-- D1: Hallucination -->
  <rect x="880" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="890" y="245" font-size="11" font-weight="700" fill="#6a1b9a">Alucinación</text>
  <text x="890" y="261" font-size="10" fill="#444">reclamación no admitida, con frecuencia un</text>
  <text x="890" y="275" font-size="10" fill="#444">entidad no presente en el contexto</text>
  <text x="890" y="285" font-size="9" font-style="italic" fill="#888">detectado por: faithfulness, HHEM, FActScore</text>

  <!-- D2: No citation -->
  <rect x="880" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="890" y="320" font-size="11" font-weight="700" fill="#6a1b9a">Teatro de citaciones</text>
  <text x="890" y="336" font-size="10" fill="#444">el segmento citado en realidad no</text>
  <text x="890" y="350" font-size="10" fill="#444">soportar la afirmación que se encuentra junto a ella</text>
  <text x="890" y="360" font-size="9" font-style="italic" fill="#888">detectado por: precisión/recuerdo de citación (soporte TREC)</text>

  <!-- D3: Wrong refusal -->
  <rect x="880" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="890" y="395" font-size="11" font-weight="700" fill="#6a1b9a">Abstención incorrecta</text>
  <text x="890" y="411" font-size="10" fill="#444">"No lo sé" cuando la respuesta</text>
  <text x="890" y="425" font-size="10" fill="#444">está en el contexto (o viceversa)</text>
  <text x="890" y="435" font-size="9" font-style="italic" fill="#888">detectado por: NoMIRACL, precisión de abstención</text>

  <!-- D4: Schema break -->
  <rect x="880" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="890" y="470" font-size="11" font-weight="700" fill="#6a1b9a">Rotura de esquema/vocabulario</text>
  <text x="890" y="486" font-size="10" fill="#444">opciones de salida sintácticamente válidas</text>
  <text x="890" y="500" font-size="10" fill="#444">un ID de ontología incorrecto, pero válido</text>
  <text x="890" y="510" font-size="9" font-style="italic" fill="#888">detectado por: conformidad léxica</text>

  <!-- Footer band -->
  <rect x="40" y="555" width="1100" height="68" rx="8" fill="#fffde7" stroke="#fbc02d" stroke-width="1.2" />
  <text x="590" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#827717">Guía de lectura</text>
  <text x="590" y="598" text-anchor="middle" font-size="10" fill="#827717">Cada fallo permanece silencioso al no existir su métrica correspondiente. La mera evaluación de la “corrección de la respuesta” indica que algo está roto, pero no dónde exactamente.</text>
  <text x="590" y="614" text-anchor="middle" font-size="10" fill="#827717">La rama roja (exclusión de filtros, errores en el reclasificado, casos perdidos en el proceso, reescrituras defectuosas) es donde sufre más el RAG en entornos de producción; instrumentéela primero.</text>

  <!-- Visual cue: the 'red' propagation -->
  <rect x="40" y="640" width="1100" height="62" rx="8" fill="#ffffff" stroke="#cbd5e0" stroke-width="1" />
  <text x="60" y="662" font-size="11" font-weight="600" fill="#1a1a2e">La regla de propagación:</text>
  <text x="60" y="682" font-size="10" fill="#555">Un fallo en el lado izquierdo representa un límite superior para todo lo que se encuentra en el lado derecho. Un análisis defectuoso limita la división en fragmentos, mientras que una división deficiente limita la recuperación de información.</text>
  <text x="60" y="696" font-size="10" fill="#555">Problemas en los límites de recuperación para el reordenamiento. Defectos en la generación de los límites de reordenamiento. Las métricas de fidelidad solo analizan el último enlace; no pueden detectar la cadena rota.</text>
</svg>
