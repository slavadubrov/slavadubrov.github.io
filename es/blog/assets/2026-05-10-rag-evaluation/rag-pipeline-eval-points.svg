<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">El pipeline RAG con puntos de evaluación</title>
  <desc id="artifact-desc">El pipeline RAG con puntos de evaluación.</desc>
  <defs>
    <marker id="arrEval" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155" />
    </marker>
    <filter id="shadowEval" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a" x="590">El pipeline RAG con puntos de evaluación</text>
  <text y="54" text-anchor="middle" font-size="12" fill="#334155" x="590">Cada etapa cuenta con una métrica. La métrica es lo que detecta los fallos silenciosos.</text>

  <!-- ============ OFFLINE LANE ============ -->
  <rect x="20" y="78" width="1140" height="290" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="102" font-size="13" font-weight="700" fill="#1d4ed8" x="40">Offline · Ingestión</text>
  <text y="118" font-size="10" fill="#64748b" x="40">Se ejecuta una vez por versión del corpus. Establece el techo máximo.</text>

  <!-- Stage 1: Acquire / Parse -->
  <rect x="40" y="140" width="170" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="125">Adquisición y análisis</text>
  <text y="178" text-anchor="middle" font-size="9" fill="#334155" x="125">PDFs · HTML · OCR</text>
  <text y="192" text-anchor="middle" font-size="9" fill="#334155" x="125">Tablas · Diseño</text>

  <!-- Metric badge 1 -->
  <rect x="40" y="212" width="170" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="125">CER · WER · TEDS</text>
  <text y="242" text-anchor="middle" font-size="9" fill="#9a3412" x="125">tasa de éxito de análisis</text>
  <text y="255" text-anchor="middle" font-size="9" fill="#9a3412" x="125">fidelidad del layout</text>

  <!-- Arrow -->
  <line x1="210" y1="171" x2="245" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 2: Normalize / Dedup -->
  <rect x="245" y="140" width="170" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="330">Normalizar y eliminar duplicados</text>
  <text y="178" text-anchor="middle" font-size="9" fill="#334155" x="330">NFC/NFKC · MinHash</text>
  <text y="192" text-anchor="middle" font-size="9" fill="#334155" x="330">PII · plantilla estándar</text>

  <rect x="245" y="212" width="170" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="330">recuperación/detección de duplicados</text>
  <text y="242" text-anchor="middle" font-size="9" fill="#9a3412" x="330">Recuperación de PII (por tipo)</text>
  <text y="255" text-anchor="middle" font-size="9" fill="#9a3412" x="330">Detección de idioma F1</text>

  <line x1="415" y1="171" x2="450" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 3: Chunk -->
  <rect x="450" y="140" width="170" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="535">Trozo</text>
  <text y="178" text-anchor="middle" font-size="9" fill="#334155" x="535">recursivo · semántico</text>
  <text y="192" text-anchor="middle" font-size="9" fill="#334155" x="535">estructural · tardío</text>

  <rect x="450" y="212" width="170" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="535">contención de answer-span</text>
  <text y="242" text-anchor="middle" font-size="9" fill="#9a3412" x="535">tasa de rotura de límites</text>
  <text y="255" text-anchor="middle" font-size="9" fill="#9a3412" x="535">Recall@k frente al tamaño</text>

  <line x1="620" y1="171" x2="655" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 4: Enrich (NER/EL) -->
  <rect x="655" y="140" width="170" height="62" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6" x="740">Enriquecer</text>
  <text y="178" text-anchor="middle" font-size="9" fill="#334155" x="740">NER · enlace de entidades</text>
  <text y="192" text-anchor="middle" font-size="9" fill="#334155" x="740">etiquetas · jerarquía</text>

  <rect x="655" y="212" width="170" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="740">Precisión de F1 · NIL</text>
  <text y="242" text-anchor="middle" font-size="9" fill="#9a3412" x="740">F1 jerárquico</text>
  <text y="255" text-anchor="middle" font-size="9" fill="#9a3412" x="740">cobertura de alias</text>

  <line x1="825" y1="171" x2="860" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 5: Embed -->
  <rect x="860" y="140" width="135" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="927">Incrustar</text>
  <text y="178" text-anchor="middle" font-size="9" fill="#334155" x="927">denso / disperso</text>
  <text y="192" text-anchor="middle" font-size="9" fill="#334155" x="927">multivectorial</text>

  <rect x="860" y="212" width="135" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="927">dominio nDCG@10</text>
  <text y="242" text-anchor="middle" font-size="9" fill="#9a3412" x="927">desviación (KL · NN-stab.)</text>
  <text y="255" text-anchor="middle" font-size="9" fill="#9a3412" x="927">vs. BEIR/MMTEB</text>

  <line x1="995" y1="171" x2="1030" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 6: Index -->
  <rect x="1030" y="140" width="115" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="1087">Índice</text>
  <text y="178" text-anchor="middle" font-size="9" fill="#334155" x="1087">HNSW / IVF</text>
  <text y="192" text-anchor="middle" font-size="9" fill="#334155" x="1087">BM25 · híbrido</text>

  <rect x="1030" y="212" width="115" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="1087">Recall de ANN frente a valor plano</text>
  <text y="242" text-anchor="middle" font-size="9" fill="#9a3412" x="1087">retardo de frescura p99</text>
  <text y="255" text-anchor="middle" font-size="9" fill="#9a3412" x="1087">latitud de búsqueda filtrada.</text>

  <!-- Lane summary -->
  <rect x="40" y="290" width="1105" height="58" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1" />
  <text y="312" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8" x="592">La disponibilidad del corpus sin conexión establece el límite superior. Si un fragmento pierde el rango de respuesta en este punto, ningún reordenador podrá recuperarlo posteriormente.</text>
  <text y="332" text-anchor="middle" font-size="10" fill="#1d4ed8" x="592">La mayoría de los equipos invierten en exceso en la recuperación de información y muy poco en el análisis, normalización y segmentación. Allí es donde el RAG en producción muere silenciosamente.</text>

  <!-- ============ ONLINE LANE ============ -->
  <rect x="20" y="378" width="1140" height="280" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="402" font-size="13" font-weight="700" fill="#9a3412" x="40">En línea · Inferencia (por consulta)</text>
  <text y="418" font-size="10" fill="#64748b" x="40">Se ejecuta con cada solicitud. El canal desde donde se monitorizan la mayoría de las métricas en producción.</text>

  <!-- Stage 7: Query Rewrite -->
  <rect x="40" y="440" width="160" height="62" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="120">Reescribir / Enviar por ruta</text>
  <text y="478" text-anchor="middle" font-size="9" fill="#334155" x="120">HyDE · múltiples consultas</text>
  <text y="492" text-anchor="middle" font-size="9" fill="#334155" x="120">intento · adaptativo</text>

  <rect x="40" y="512" width="160" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="120">Mejora de Recall@k</text>
  <text y="542" text-anchor="middle" font-size="9" fill="#9a3412" x="120">precisión de enrutamiento</text>
  <text y="555" text-anchor="middle" font-size="9" fill="#9a3412" x="120">tasa de operaciones sin efecto</text>

  <line x1="200" y1="471" x2="235" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 8: Retrieve -->
  <rect x="235" y="440" width="160" height="62" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="315">Recuperar</text>
  <text y="478" text-anchor="middle" font-size="9" fill="#334155" x="315">densa + dispersa + RRF</text>
  <text y="492" text-anchor="middle" font-size="9" fill="#334155" x="315">predicados de filtrado</text>

  <rect x="235" y="512" width="160" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="315">Recall@k · MRR · nDCG</text>
  <text y="542" text-anchor="middle" font-size="9" fill="#9a3412" x="315">precisión/recuperación en contexto</text>
  <text y="555" text-anchor="middle" font-size="9" fill="#9a3412" x="315">elevador híbrido</text>

  <line x1="395" y1="471" x2="430" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 9: Filter (highlighted) -->
  <rect x="430" y="440" width="160" height="62" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b" x="510">Filtro (el asesino silencioso)</text>
  <text y="478" text-anchor="middle" font-size="9" fill="#334155" x="510">inquilino · ACL · etiqueta</text>
  <text y="492" text-anchor="middle" font-size="9" fill="#334155" x="510">duro vs. blando</text>

  <rect x="430" y="512" width="160" height="48" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.2" />
  <text y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#991b1b" x="510">tasa de exclusión falsa del filtro</text>
  <text y="542" text-anchor="middle" font-size="9" fill="#991b1b" x="510">precisión/recuperación del predicado</text>
  <text y="555" text-anchor="middle" font-size="9" fill="#991b1b" x="510">recuperación de sombras Δ</text>

  <line x1="590" y1="471" x2="625" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 10: Rerank -->
  <rect x="625" y="440" width="160" height="62" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="705">Reclasificar</text>
  <text y="478" text-anchor="middle" font-size="9" fill="#334155" x="705">codificador cruzado · por lista</text>
  <text y="492" text-anchor="middle" font-size="9" fill="#334155" x="705">BGE · Cohere · ZeRank</text>

  <rect x="625" y="512" width="160" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="705">ΔnDCG · ΔMRR · ΔP@1</text>
  <text y="542" text-anchor="middle" font-size="9" fill="#9a3412" x="705">robustez frente a estímulos distractores</text>
  <text y="555" text-anchor="middle" font-size="9" fill="#9a3412" x="705">latencia p95</text>

  <line x1="785" y1="471" x2="820" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 11: Assemble -->
  <rect x="820" y="440" width="160" height="62" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="900">Montar contexto</text>
  <text y="478" text-anchor="middle" font-size="9" fill="#334155" x="900">ordenar · comprimir</text>
  <text y="492" text-anchor="middle" font-size="9" fill="#334155" x="900">tokens de presupuesto</text>

  <rect x="820" y="512" width="160" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="900">utilización del contexto</text>
  <text y="542" text-anchor="middle" font-size="9" fill="#9a3412" x="900">ataque de tipo medio perdido</text>
  <text y="555" text-anchor="middle" font-size="9" fill="#9a3412" x="900">compresión × corrección</text>

  <line x1="980" y1="471" x2="1015" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 12: Generate -->
  <rect x="1015" y="440" width="130" height="62" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6" x="1080">Generar</text>
  <text y="478" text-anchor="middle" font-size="9" fill="#334155" x="1080">Llamada a LLM</text>
  <text y="492" text-anchor="middle" font-size="9" fill="#334155" x="1080">+ referencias</text>

  <rect x="1015" y="512" width="130" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="1080">fidelidad · HHEM</text>
  <text y="542" text-anchor="middle" font-size="9" fill="#9a3412" x="1080">citación P/R</text>
  <text y="555" text-anchor="middle" font-size="9" fill="#9a3412" x="1080">Puntuación de fiabilidad</text>

  <!-- Lane summary -->
  <rect x="40" y="582" width="1105" height="58" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1" />
  <text y="604" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412" x="592" textLength="1168.58" lengthAdjust="spacingAndGlyphs" transform="translate(-2.00 0.00)">Un filtro defectuoso o una reescritura incorrecta establece en cero la tasa de recuperación antes de que comience el proceso de clasificación. La fidelidad sigue siendo adecuada: el modelo indica correctamente "No lo sé."</text>
  <text y="624" text-anchor="middle" font-size="10" fill="#9a3412" x="592">Controla la tasa de exclusión junto con el Recall@k. De lo contrario, las métricas canónicas de IR te darán una imagen engañosa sobre el rendimiento del sistema de recuperación.</text>

  <!-- ============ POST-GEN LANE ============ -->
  <rect x="20" y="668" width="1140" height="78" rx="10" fill="#f0fdf4" stroke="#166534" stroke-width="1" />
  <text y="692" font-size="13" font-weight="700" fill="#166534" x="40">Pos-generación · Verificación y telemetría</text>

  <rect x="40" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="150">verificación de reclamaciones · NLI · autoconsistencia</text>

  <rect x="270" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="380">validez del esquema · anclaje de entidades · ECE</text>

  <rect x="500" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="610">tasa de regeneración · pulgares · tiempo de permanencia · CTR en citas</text>

  <rect x="730" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="840">desviación (consulta/incrustación) · costo/consulta · p95</text>

  <rect x="960" y="704" width="185" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="1052">evaluación de sombras · cola HITL</text>
</svg>
