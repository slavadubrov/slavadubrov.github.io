<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" font-family="Inter, system-ui, sans-serif" role="img" aria-label="A production RAG pipeline showing ingestion, query-time, and answer or production checks, with hard filters applied before retrieval ranking" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">El RAG pipeline completo con indicadores métricos en cada etapa</title>
  <defs>
    <marker id="arrEval" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b" />
    </marker>
    <filter id="shadowEval" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="1180" height="760" fill="#f8fafc" />

  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a" x="590">El RAG Pipeline con puntos de evaluación</text>
  <text y="54" text-anchor="middle" font-size="12" fill="#64748b" x="590">Cada etapa cuenta con una métrica. Es la métrica la que detecta los fallos silenciosos.</text>

  <!-- ============ OFFLINE LANE ============ -->
  <rect x="20" y="78" width="1140" height="290" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="102" font-size="14" font-weight="700" fill="#1d4ed8" x="40">Ruta de ingestión · corpus e índice</text>
  <text y="118" font-size="11" fill="#64748b" x="40">Se ejecuta cuando cambia la versión del corpus. Establece el techo de evidencia.</text>

  <!-- Stage 1: Acquire / Parse -->
  <rect x="40" y="140" width="170" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="125">Adquisición y análisis</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="125">PDFs · HTML · OCR</text>
  <text y="192" text-anchor="middle" font-size="11" fill="#64748b" x="125">Tablas · Diseño</text>

  <!-- Metric badge 1 -->
  <rect x="40" y="212" width="170" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="125">CER · WER · TEDS</text>
  <text y="242" text-anchor="middle" font-size="11" fill="#9a3412" x="125">tasa de éxito en el análisis</text>
  <text y="255" text-anchor="middle" font-size="11" fill="#9a3412" x="125">fidelidad de disposición</text>

  <!-- Arrow -->
  <line x1="210" y1="171" x2="245" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 2: Normalize / Dedup -->
  <rect x="245" y="140" width="170" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="330">Normalizar y eliminar duplicados</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="330">NFC/NFKC · MinHash</text>
  <text y="192" text-anchor="middle" font-size="11" fill="#64748b" x="330">PII · plantilla estándar</text>

  <rect x="245" y="212" width="170" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="330">recuperación/detección de duplicados</text>
  <text y="242" text-anchor="middle" font-size="11" fill="#9a3412" x="330">Recuperación de PII (por tipo)</text>
  <text y="255" text-anchor="middle" font-size="11" fill="#9a3412" x="330">detección de idioma F1</text>

  <line x1="415" y1="171" x2="450" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 3: Chunk -->
  <rect x="450" y="140" width="170" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="535">Fragmento</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="535">recursivo · semántico</text>
  <text y="192" text-anchor="middle" font-size="11" fill="#64748b" x="535">estructural · tardío</text>

  <rect x="450" y="212" width="170" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="535">contención de answer-span</text>
  <text y="242" text-anchor="middle" font-size="11" fill="#9a3412" x="535">tasa de ruptura de fronteras</text>
  <text y="255" text-anchor="middle" font-size="11" fill="#9a3412" x="535">Recall@k frente al tamaño</text>

  <line x1="620" y1="171" x2="655" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 4: Enrich (NER/EL) -->
  <rect x="655" y="140" width="170" height="62" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6" x="740">Enriquecer</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="740">NER · enlace de entidad</text>
  <text y="192" text-anchor="middle" font-size="11" fill="#64748b" x="740">etiquetas · jerarquía</text>

  <rect x="655" y="212" width="170" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="740">LA precisión F1 · NIL</text>
  <text y="242" text-anchor="middle" font-size="11" fill="#9a3412" x="740">F1 jerárquico</text>
  <text y="255" text-anchor="middle" font-size="11" fill="#9a3412" x="740">cobertura de alias</text>

  <line x1="825" y1="171" x2="860" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 5: Embed -->
  <rect x="860" y="140" width="135" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="927">Incrustar</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="927">denso / escaso</text>
  <text y="192" text-anchor="middle" font-size="11" fill="#64748b" x="927">multi-vectorial</text>

  <rect x="860" y="212" width="135" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="927">dominio nDCG@10</text>
  <text y="242" text-anchor="middle" font-size="11" fill="#9a3412" x="927">deriva (KL · NN-stab.)</text>
  <text y="255" text-anchor="middle" font-size="11" fill="#9a3412" x="927">vs. BEIR/MTEB</text>

  <line x1="995" y1="171" x2="1030" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 6: Index -->
  <rect x="1030" y="140" width="115" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="1087">Índice</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="1087">HNSW / IVF</text>
  <text y="192" text-anchor="middle" font-size="11" fill="#64748b" x="1087">BM25 · híbrido</text>

  <rect x="1030" y="212" width="115" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="1087">ANN precisión frente a valor plano</text>
  <text y="242" text-anchor="middle" font-size="11" fill="#9a3412" x="1087">retardo de frescura p99</text>
  <text y="255" text-anchor="middle" font-size="11" fill="#9a3412" x="1087">lat. de búsqueda filtrada.</text>

  <!-- Lane summary -->
  <rect x="40" y="290" width="1105" height="58" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1" />
  <text y="312" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8" x="592">La preparación para la ingesta establece el límite superior. Si un fragmento pierde el rango de respuesta aquí, ningún reranker podrá recuperarlo en las etapas posteriores.</text>
  <text y="332" text-anchor="middle" font-size="11" fill="#1d4ed8" x="592">Análisis de instrumentos, normalización, fragmentación, enriquecimiento, embedding, e indexación para que cualquier error en las etapas posteriores pueda atribuirse con precisión.</text>

  <!-- ============ ONLINE LANE ============ -->
  <rect x="20" y="378" width="1140" height="280" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="402" font-size="14" font-weight="700" fill="#9a3412" x="40">Ruta en tiempo de consulta · ejecución por consulta</text>
  <text y="418" font-size="11" fill="#64748b" x="40">La ruta de solicitud ejecuta cada consulta; las métricas de calidad costosas pueden calcular las trazas muestreadas de forma asíncrona.</text>

  <!-- Stage 7: Query Rewrite -->
  <rect x="40" y="440" width="160" height="62" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="120">Reescribir / Enrutar</text>
  <text y="478" text-anchor="middle" font-size="11" fill="#64748b" x="120">HyDE · múltiples consultas</text>
  <text y="492" text-anchor="middle" font-size="11" fill="#64748b" x="120">intento · adaptativo</text>

  <rect x="40" y="512" width="160" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="120">Mejora del recall@k</text>
  <text y="542" text-anchor="middle" font-size="11" fill="#9a3412" x="120">precisión de enrutamiento</text>
  <text y="555" text-anchor="middle" font-size="11" fill="#9a3412" x="120">tasa de operaciones sin efecto</text>

  <line x1="200" y1="471" x2="235" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 8: Apply hard filters before ranking -->
  <rect x="235" y="440" width="160" height="62" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b" x="315">Aplicar filtros estrictos</text>
  <text y="478" text-anchor="middle" font-size="11" fill="#64748b" x="315">inquilino · ACL · etiqueta</text>
  <text y="492" text-anchor="middle" font-size="11" fill="#64748b" x="315">duro vs. blando</text>

  <rect x="235" y="512" width="160" height="48" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.2" />
  <text y="528" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b" x="315">tasa de falsa exclusión del filtro</text>
  <text y="542" text-anchor="middle" font-size="11" fill="#991b1b" x="315">precisión/recuerdo de predicados</text>
  <text y="555" text-anchor="middle" font-size="11" fill="#991b1b" x="315">recuperación de sombras Δ</text>

  <line x1="395" y1="471" x2="430" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 9: Retrieve from the eligible candidate set -->
  <rect x="430" y="440" width="160" height="62" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="510">Recuperar</text>
  <text y="478" text-anchor="middle" font-size="11" fill="#64748b" x="510">densa + dispersa + RRF</text>
  <text y="492" text-anchor="middle" font-size="11" fill="#64748b" x="510">conjunto de candidatos elegibles</text>

  <rect x="430" y="512" width="160" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="510">Recall@k · MRR · nDCG</text>
  <text y="542" text-anchor="middle" font-size="11" fill="#9a3412" x="510">precisión/recuperación de contexto</text>
  <text y="555" text-anchor="middle" font-size="11" fill="#9a3412" x="510">elevación híbrida</text>

  <line x1="590" y1="471" x2="625" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 10: Rerank -->
  <rect x="625" y="440" width="160" height="62" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="705">Reclasificar</text>
  <text y="478" text-anchor="middle" font-size="11" fill="#64748b" x="705">codificador cruzado · por lista</text>
  <text y="492" text-anchor="middle" font-size="11" fill="#64748b" x="705">BGE · Cohere · ZeRank</text>

  <rect x="625" y="512" width="160" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="705">ΔnDCG · ΔMRR · ΔP@1</text>
  <text y="542" text-anchor="middle" font-size="11" fill="#9a3412" x="705">robustez ante distractores</text>
  <text y="555" text-anchor="middle" font-size="11" fill="#9a3412" x="705">latencia p95</text>

  <line x1="785" y1="471" x2="820" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 11: Assemble -->
  <rect x="820" y="440" width="160" height="62" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="900">Montar contexto</text>
  <text y="478" text-anchor="middle" font-size="11" fill="#64748b" x="900">ordenar · comprimir</text>
  <text y="492" text-anchor="middle" font-size="11" fill="#64748b" x="900">tokens de presupuesto</text>

  <rect x="820" y="512" width="160" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="900">utilización de contexto</text>
  <text y="542" text-anchor="middle" font-size="11" fill="#9a3412" x="900">perdido-en-el-medio</text>
  <text y="555" text-anchor="middle" font-size="11" fill="#9a3412" x="900">compresión × corrección</text>

  <line x1="980" y1="471" x2="1015" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 12: Generate -->
  <rect x="1015" y="440" width="130" height="62" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6" x="1080">Generar</text>
  <text y="478" text-anchor="middle" font-size="11" fill="#64748b" x="1080">LLM llamada</text>
  <text y="492" text-anchor="middle" font-size="11" fill="#64748b" x="1080">+ referencias</text>

  <rect x="1015" y="512" width="130" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="1080">fidelidad · HHEM</text>
  <text y="542" text-anchor="middle" font-size="11" fill="#9a3412" x="1080">citación P/R</text>
  <text y="555" text-anchor="middle" font-size="11" fill="#9a3412" x="1080">Puntuación de Veracidad</text>

  <!-- Lane summary -->
  <rect x="40" y="582" width="1105" height="58" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1" />
  <text y="604" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412" x="592">Una reescritura incorrecta o un filtro estricto pueden eliminar el documento de referencia antes de realizar la clasificación. No obstante, Faithfulness podría aprobar la denegación basada en criterios objetivos.</text>
  <text y="624" text-anchor="middle" font-size="11" fill="#9a3412" x="592">El Recall@k detecta los casos no recuperados; la tasa de falsa exclusión del filtro se atribuye al predicado y no al recuperador.</text>

  <!-- ============ POST-GEN LANE ============ -->
  <rect x="20" y="668" width="1140" height="78" rx="10" fill="#f0fdf4" stroke="#166534" stroke-width="1" />
  <text y="692" font-size="14" font-weight="700" fill="#166534" x="40">Verificación de respuestas y producción · validación y telemetría</text>

  <rect x="40" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="11" font-weight="600" fill="#166534" x="150">verificación de afirmaciones · NLI</text>

  <rect x="270" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="11" font-weight="600" fill="#166534" x="380">validez del esquema · anclaje</text>

  <rect x="500" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="11" font-weight="600" fill="#166534" x="610">regeneración · pulgares de control · tiempo de permanencia</text>

  <rect x="730" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="11" font-weight="600" fill="#166534" x="840">deriva · costo/pregunta · p95</text>

  <rect x="960" y="704" width="185" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="11" font-weight="600" fill="#166534" x="1052">evaluación de sombras · HITL</text>
</svg>
