<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrEval" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555" />
    </marker>
    <filter id="shadowEval" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Title -->
  <text x="590" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a2e">El pipeline RAG con puntos de evaluación</text>
  <text x="590" y="54" text-anchor="middle" font-size="12" fill="#666">Cada etapa cuenta con una métrica. La métrica es lo que detecta los fallos silenciosos.</text>

  <!-- ============ OFFLINE LANE ============ -->
  <rect x="20" y="78" width="1140" height="290" rx="10" fill="#f8f9fa" stroke="#cbd5e0" stroke-width="1" />
  <text x="40" y="102" font-size="13" font-weight="700" fill="#1565c0">Offline · Ingestión</text>
  <text x="40" y="118" font-size="10" fill="#888">Se ejecuta una vez por versión del corpus. Establece el techo máximo.</text>

  <!-- Stage 1: Acquire / Parse -->
  <rect x="40" y="140" width="170" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="125" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Adquisición y análisis</text>
  <text x="125" y="178" text-anchor="middle" font-size="9" fill="#555">PDFs · HTML · OCR</text>
  <text x="125" y="192" text-anchor="middle" font-size="9" fill="#555">Tablas · Diseño</text>

  <!-- Metric badge 1 -->
  <rect x="40" y="212" width="170" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="125" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">CER · WER · TEDS</text>
  <text x="125" y="242" text-anchor="middle" font-size="9" fill="#827717">tasa de éxito de análisis</text>
  <text x="125" y="255" text-anchor="middle" font-size="9" fill="#827717">fidelidad del layout</text>

  <!-- Arrow -->
  <line x1="210" y1="171" x2="245" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 2: Normalize / Dedup -->
  <rect x="245" y="140" width="170" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="330" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Normalizar y eliminar duplicados</text>
  <text x="330" y="178" text-anchor="middle" font-size="9" fill="#555">NFC/NFKC · MinHash</text>
  <text x="330" y="192" text-anchor="middle" font-size="9" fill="#555">PII · plantilla estándar</text>

  <rect x="245" y="212" width="170" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="330" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">recuperación/detección de duplicados</text>
  <text x="330" y="242" text-anchor="middle" font-size="9" fill="#827717">Recuperación de PII (por tipo)</text>
  <text x="330" y="255" text-anchor="middle" font-size="9" fill="#827717">Detección de idioma F1</text>

  <line x1="415" y1="171" x2="450" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 3: Chunk -->
  <rect x="450" y="140" width="170" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="535" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Trozo</text>
  <text x="535" y="178" text-anchor="middle" font-size="9" fill="#555">recursivo · semántico</text>
  <text x="535" y="192" text-anchor="middle" font-size="9" fill="#555">estructural · tardío</text>

  <rect x="450" y="212" width="170" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="535" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">contención de answer-span</text>
  <text x="535" y="242" text-anchor="middle" font-size="9" fill="#827717">tasa de rotura de límites</text>
  <text x="535" y="255" text-anchor="middle" font-size="9" fill="#827717">Recall@k frente al tamaño</text>

  <line x1="620" y1="171" x2="655" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 4: Enrich (NER/EL) -->
  <rect x="655" y="140" width="170" height="62" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="740" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#6a1b9a">Enriquecer</text>
  <text x="740" y="178" text-anchor="middle" font-size="9" fill="#555">NER · enlace de entidades</text>
  <text x="740" y="192" text-anchor="middle" font-size="9" fill="#555">etiquetas · jerarquía</text>

  <rect x="655" y="212" width="170" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="740" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">Precisión de F1 · NIL</text>
  <text x="740" y="242" text-anchor="middle" font-size="9" fill="#827717">F1 jerárquico</text>
  <text x="740" y="255" text-anchor="middle" font-size="9" fill="#827717">cobertura de alias</text>

  <line x1="825" y1="171" x2="860" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 5: Embed -->
  <rect x="860" y="140" width="135" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="927" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Incrustar</text>
  <text x="927" y="178" text-anchor="middle" font-size="9" fill="#555">denso / disperso</text>
  <text x="927" y="192" text-anchor="middle" font-size="9" fill="#555">multivectorial</text>

  <rect x="860" y="212" width="135" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="927" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">dominio nDCG@10</text>
  <text x="927" y="242" text-anchor="middle" font-size="9" fill="#827717">desviación (KL · NN-stab.)</text>
  <text x="927" y="255" text-anchor="middle" font-size="9" fill="#827717">vs. BEIR/MMTEB</text>

  <line x1="995" y1="171" x2="1030" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 6: Index -->
  <rect x="1030" y="140" width="115" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="1087" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Índice</text>
  <text x="1087" y="178" text-anchor="middle" font-size="9" fill="#555">HNSW / IVF</text>
  <text x="1087" y="192" text-anchor="middle" font-size="9" fill="#555">BM25 · híbrido</text>

  <rect x="1030" y="212" width="115" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="1087" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">Recall de ANN frente a valor plano</text>
  <text x="1087" y="242" text-anchor="middle" font-size="9" fill="#827717">retardo de frescura p99</text>
  <text x="1087" y="255" text-anchor="middle" font-size="9" fill="#827717">latitud de búsqueda filtrada.</text>

  <!-- Lane summary -->
  <rect x="40" y="290" width="1105" height="58" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1" />
  <text x="592" y="312" text-anchor="middle" font-size="11" font-weight="600" fill="#1565c0">La disponibilidad del corpus sin conexión establece el límite superior. Si un fragmento pierde el rango de respuesta en este punto, ningún reordenador podrá recuperarlo posteriormente.</text>
  <text x="592" y="332" text-anchor="middle" font-size="10" fill="#1565c0">La mayoría de los equipos invierten en exceso en la recuperación de información y muy poco en el análisis, normalización y segmentación. Allí es donde el RAG en producción muere silenciosamente.</text>

  <!-- ============ ONLINE LANE ============ -->
  <rect x="20" y="378" width="1140" height="280" rx="10" fill="#f8f9fa" stroke="#cbd5e0" stroke-width="1" />
  <text x="40" y="402" font-size="13" font-weight="700" fill="#e65100">En línea · Inferencia (por consulta)</text>
  <text x="40" y="418" font-size="10" fill="#888">Se ejecuta con cada solicitud. El canal desde donde se monitorizan la mayoría de las métricas en producción.</text>

  <!-- Stage 7: Query Rewrite -->
  <rect x="40" y="440" width="160" height="62" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="120" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">Reescribir / Enviar por ruta</text>
  <text x="120" y="478" text-anchor="middle" font-size="9" fill="#555">HyDE · múltiples consultas</text>
  <text x="120" y="492" text-anchor="middle" font-size="9" fill="#555">intento · adaptativo</text>

  <rect x="40" y="512" width="160" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="120" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">Mejora de Recall@k</text>
  <text x="120" y="542" text-anchor="middle" font-size="9" fill="#827717">precisión de enrutamiento</text>
  <text x="120" y="555" text-anchor="middle" font-size="9" fill="#827717">tasa de operaciones sin efecto</text>

  <line x1="200" y1="471" x2="235" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 8: Retrieve -->
  <rect x="235" y="440" width="160" height="62" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="315" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">Recuperar</text>
  <text x="315" y="478" text-anchor="middle" font-size="9" fill="#555">densa + dispersa + RRF</text>
  <text x="315" y="492" text-anchor="middle" font-size="9" fill="#555">predicados de filtrado</text>

  <rect x="235" y="512" width="160" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="315" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">Recall@k · MRR · nDCG</text>
  <text x="315" y="542" text-anchor="middle" font-size="9" fill="#827717">precisión/recuperación en contexto</text>
  <text x="315" y="555" text-anchor="middle" font-size="9" fill="#827717">elevador híbrido</text>

  <line x1="395" y1="471" x2="430" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 9: Filter (highlighted) -->
  <rect x="430" y="440" width="160" height="62" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="2" filter="url(#shadowEval)" />
  <text x="510" y="462" text-anchor="middle" font-size="12" font-weight="700" fill="#c62828">Filtro (el asesino silencioso)</text>
  <text x="510" y="478" text-anchor="middle" font-size="9" fill="#555">inquilino · ACL · etiqueta</text>
  <text x="510" y="492" text-anchor="middle" font-size="9" fill="#555">duro vs. blando</text>

  <rect x="430" y="512" width="160" height="48" rx="6" fill="#ffebee" stroke="#c62828" stroke-width="1.2" />
  <text x="510" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#c62828">tasa de exclusión falsa del filtro</text>
  <text x="510" y="542" text-anchor="middle" font-size="9" fill="#c62828">precisión/recuperación del predicado</text>
  <text x="510" y="555" text-anchor="middle" font-size="9" fill="#c62828">recuperación de sombras Δ</text>

  <line x1="590" y1="471" x2="625" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 10: Rerank -->
  <rect x="625" y="440" width="160" height="62" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="705" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">Reclasificar</text>
  <text x="705" y="478" text-anchor="middle" font-size="9" fill="#555">codificador cruzado · por lista</text>
  <text x="705" y="492" text-anchor="middle" font-size="9" fill="#555">BGE · Cohere · ZeRank</text>

  <rect x="625" y="512" width="160" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="705" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">ΔnDCG · ΔMRR · ΔP@1</text>
  <text x="705" y="542" text-anchor="middle" font-size="9" fill="#827717">robustez frente a estímulos distractores</text>
  <text x="705" y="555" text-anchor="middle" font-size="9" fill="#827717">latencia p95</text>

  <line x1="785" y1="471" x2="820" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 11: Assemble -->
  <rect x="820" y="440" width="160" height="62" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="900" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">Montar contexto</text>
  <text x="900" y="478" text-anchor="middle" font-size="9" fill="#555">ordenar · comprimir</text>
  <text x="900" y="492" text-anchor="middle" font-size="9" fill="#555">tokens de presupuesto</text>

  <rect x="820" y="512" width="160" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="900" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">utilización del contexto</text>
  <text x="900" y="542" text-anchor="middle" font-size="9" fill="#827717">ataque de tipo medio perdido</text>
  <text x="900" y="555" text-anchor="middle" font-size="9" fill="#827717">compresión × corrección</text>

  <line x1="980" y1="471" x2="1015" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 12: Generate -->
  <rect x="1015" y="440" width="130" height="62" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="1080" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#6a1b9a">Generar</text>
  <text x="1080" y="478" text-anchor="middle" font-size="9" fill="#555">Llamada a LLM</text>
  <text x="1080" y="492" text-anchor="middle" font-size="9" fill="#555">+ referencias</text>

  <rect x="1015" y="512" width="130" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="1080" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">fidelidad · HHEM</text>
  <text x="1080" y="542" text-anchor="middle" font-size="9" fill="#827717">citación P/R</text>
  <text x="1080" y="555" text-anchor="middle" font-size="9" fill="#827717">Puntuación de fiabilidad</text>

  <!-- Lane summary -->
  <rect x="40" y="582" width="1105" height="58" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1" />
  <text x="592" y="604" text-anchor="middle" font-size="11" font-weight="600" fill="#e65100">Un filtro defectuoso o una reescritura incorrecta establece en cero la tasa de recuperación antes de que comience el proceso de clasificación. La fidelidad sigue siendo adecuada: el modelo indica correctamente "No lo sé."</text>
  <text x="592" y="624" text-anchor="middle" font-size="10" fill="#e65100">Controla la tasa de exclusión junto con el Recall@k. De lo contrario, las métricas canónicas de IR te darán una imagen engañosa sobre el rendimiento del sistema de recuperación.</text>

  <!-- ============ POST-GEN LANE ============ -->
  <rect x="20" y="668" width="1140" height="78" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1" />
  <text x="40" y="692" font-size="13" font-weight="700" fill="#2e7d32">Pos-generación · Verificación y telemetría</text>

  <rect x="40" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="150" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">verificación de reclamaciones · NLI · autoconsistencia</text>

  <rect x="270" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="380" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">validez del esquema · anclaje de entidades · ECE</text>

  <rect x="500" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="610" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">tasa de regeneración · pulgares · tiempo de permanencia · CTR en citas</text>

  <rect x="730" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="840" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">desviación (consulta/incrustación) · costo/consulta · p95</text>

  <rect x="960" y="704" width="185" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="1052" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">evaluación de sombras · cola HITL</text>
</svg>
