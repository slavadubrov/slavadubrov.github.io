<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 660" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">La disciplina de evaluación en tres capas</title>
  <desc id="artifact-desc">La disciplina de evaluación en tres capas.</desc>
  <defs>
    <marker id="arrLayer" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#334155" />
    </marker>
    <filter id="shadowL" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a" x="590">La disciplina de evaluación en tres capas</text>
  <text y="54" text-anchor="middle" font-size="12" fill="#334155" x="590">Corpus e índice offline · Recuperación y generación en línea · Verificación posterior a la generación + telemetría de producción</text>

  <!-- =============== Layer 1: Offline =============== -->
  <rect x="30" y="80" width="1120" height="160" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowL)" />
  <text y="106" font-size="14" font-weight="700" fill="#1d4ed8" x="55">Capa 1 · Sin conexión</text>
  <text y="124" font-size="10" fill="#1d4ed8" x="55">Pregunta: ¿se preparó la base de conocimientos correctamente?</text>

  <!-- Sub-cards -->
  <rect x="55" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="175">Preparación del corpus</text>
  <text y="178" text-anchor="middle" font-size="10" fill="#334155" x="175">tasa de éxito de análisis · CER/WER</text>
  <text y="193" text-anchor="middle" font-size="10" fill="#334155" x="175">TEDS · cobertura de metadatos</text>
  <text y="208" text-anchor="middle" font-size="10" fill="#334155" x="175">frescura · eliminación de duplicados</text>

  <rect x="305" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="425">Fragmentación</text>
  <text y="178" text-anchor="middle" font-size="10" fill="#334155" x="425">contención de answer-span</text>
  <text y="193" text-anchor="middle" font-size="10" fill="#334155" x="425">tasa de rotura de límites</text>
  <text y="208" text-anchor="middle" font-size="10" fill="#334155" x="425">redundancia por solapamiento</text>

  <rect x="555" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="675">Incrustación · Índice</text>
  <text y="178" text-anchor="middle" font-size="10" fill="#334155" x="675">dominio nDCG@10</text>
  <text y="193" text-anchor="middle" font-size="10" fill="#334155" x="675">Recall de ANN vs. plano</text>
  <text y="208" text-anchor="middle" font-size="10" fill="#334155" x="675">línea de referencia de deriva</text>

  <rect x="805" y="140" width="320" height="80" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="965">Enriquecimiento (NER · EL · etiquetas)</text>
  <text y="178" text-anchor="middle" font-size="10" fill="#334155" x="965">Manejo de F1 y NIL · cobertura de alias</text>
  <text y="193" text-anchor="middle" font-size="10" fill="#334155" x="965">tasa de etiquetas huérfanas en estructura jerárquica F1</text>
  <text y="208" text-anchor="middle" font-size="10" fill="#334155" x="965">validez del esquema en el momento de la publicación</text>

  <!-- Arrow down to Layer 2 -->
  <line x1="590" y1="244" x2="590" y2="280" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrLayer)" />
  <text y="265" font-size="10" fill="#64748b" font-style="italic" x="700">establece el techo de recuperación para todo lo que está por debajo</text>

  <!-- =============== Layer 2: Online =============== -->
  <rect x="30" y="290" width="1120" height="160" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowL)" />
  <text y="316" font-size="14" font-weight="700" fill="#9a3412" x="55">Capa 2 · En línea (por consulta)</text>
  <text y="334" font-size="10" fill="#9a3412" x="55">Pregunta: ¿Se encontró y se utilizó la evidencia adecuada para esta consulta?</text>

  <rect x="55" y="350" width="240" height="80" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="175">Comprensión de consultas</text>
  <text y="388" text-anchor="middle" font-size="10" fill="#334155" x="175">reescribir ganancia/pérdida</text>
  <text y="403" text-anchor="middle" font-size="10" fill="#334155" x="175">precisión de enrutamiento</text>
  <text y="418" text-anchor="middle" font-size="10" fill="#334155" x="175">cobertura de descomposición</text>

  <rect x="305" y="350" width="240" height="80" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="425">Recuperación</text>
  <text y="388" text-anchor="middle" font-size="10" fill="#334155" x="425">Recall@k · MRR · nDCG · MAP</text>
  <text y="403" text-anchor="middle" font-size="10" fill="#334155" x="425">precisión/recuperación en contexto</text>
  <text y="418" text-anchor="middle" font-size="10" fill="#334155" x="425">elevador híbrido sobre cada carril</text>

  <rect x="555" y="350" width="240" height="80" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.6" />
  <text y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b" x="675">Filtrado (zona crítica)</text>
  <text y="388" text-anchor="middle" font-size="10" fill="#991b1b" x="675">tasa de exclusión falsa del filtro</text>
  <text y="403" text-anchor="middle" font-size="10" fill="#991b1b" x="675">precisión/recall del predicado</text>
  <text y="418" text-anchor="middle" font-size="10" fill="#991b1b" x="675">recuperación de sombras Δ</text>

  <rect x="805" y="350" width="320" height="80" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="965">Reclasificación · Ensamblaje de contexto</text>
  <text y="388" text-anchor="middle" font-size="10" fill="#334155" x="965">ΔnDCG · ΔMRR sin reclasificación</text>
  <text y="403" text-anchor="middle" font-size="10" fill="#334155" x="965">utilización del contexto · ataque tipo perdido en el medio</text>
  <text y="418" text-anchor="middle" font-size="10" fill="#334155" x="965">robustez frente a distractores (RGB)</text>

  <!-- Arrow down to Layer 3 -->
  <line x1="590" y1="454" x2="590" y2="490" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrLayer)" />
  <text y="475" font-size="10" fill="#64748b" font-style="italic" x="700">suministra contexto verificado para la generación</text>

  <!-- =============== Layer 3: Post-gen =============== -->
  <rect x="30" y="500" width="1120" height="135" rx="12" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowL)" />
  <text y="526" font-size="14" font-weight="700" fill="#166534" x="55">Capa 3 · Telemetría de posgeneración y producción</text>
  <text y="544" font-size="10" fill="#166534" x="55">Pregunta: ¿es la respuesta fiable, verificable y segura para su envío? ¿Seguirá siéndolo la próxima semana?</text>

  <rect x="55" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="175">Fidelidad</text>
  <text y="595" text-anchor="middle" font-size="10" fill="#334155" x="175">RAGAS · HHEM · FActScore</text>
  <text y="610" text-anchor="middle" font-size="10" fill="#334155" x="175">FaithJudge · coherencia propia</text>

  <rect x="305" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="425">Citas y estructura</text>
  <text y="595" text-anchor="middle" font-size="10" fill="#334155" x="425">precisión/recuperación de citaciones</text>
  <text y="610" text-anchor="middle" font-size="10" fill="#334155" x="425">validez del esquema · conformidad del vocabulario</text>

  <rect x="555" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="675">Señal implícita + explícita</text>
  <text y="595" text-anchor="middle" font-size="10" fill="#334155" x="675">tasa de regeneración · tiempo de permanencia · CTR en citas</text>
  <text y="610" text-anchor="middle" font-size="10" fill="#334155" x="675">meñiques · estrella · ediciones en línea</text>

  <rect x="805" y="558" width="320" height="68" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="965">Deriva · costo · latencia · HITL</text>
  <text y="595" text-anchor="middle" font-size="10" fill="#334155" x="965">deriva de consulta/embeidura · latencia p95 · $/consulta</text>
  <text y="610" text-anchor="middle" font-size="10" fill="#334155" x="965">evaluación de sombras · cola de revisiones de baja confianza</text>
</svg>
