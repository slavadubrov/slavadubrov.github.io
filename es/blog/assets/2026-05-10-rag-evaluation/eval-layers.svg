<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 660" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrLayer" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#555" />
    </marker>
    <filter id="shadowL" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Title -->
  <text x="590" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a2e">La disciplina de evaluación en tres capas</text>
  <text x="590" y="54" text-anchor="middle" font-size="12" fill="#666">Corpus e índice offline · Recuperación y generación online · Verificación posgeneración + telemetría en producción</text>

  <!-- =============== Layer 1: Offline =============== -->
  <rect x="30" y="80" width="1120" height="160" rx="12" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowL)" />
  <text x="55" y="106" font-size="14" font-weight="700" fill="#1565c0">Capa 1 · Offline</text>
  <text x="55" y="124" font-size="10" fill="#1565c0">Pregunta: ¿se preparó correctamente la base de conocimiento?</text>

  <!-- Sub-cards -->
  <rect x="55" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1" />
  <text x="175" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">Preparación del corpus</text>
  <text x="175" y="178" text-anchor="middle" font-size="10" fill="#555">tasa de parseo correcto · CER/WER</text>
  <text x="175" y="193" text-anchor="middle" font-size="10" fill="#555">TEDS · cobertura de metadatos</text>
  <text x="175" y="208" text-anchor="middle" font-size="10" fill="#555">frescura · dedup</text>

  <rect x="305" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1" />
  <text x="425" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">Fragmentación</text>
  <text x="425" y="178" text-anchor="middle" font-size="10" fill="#555">contención del span de respuesta</text>
  <text x="425" y="193" text-anchor="middle" font-size="10" fill="#555">tasa de ruptura de límites</text>
  <text x="425" y="208" text-anchor="middle" font-size="10" fill="#555">redundancia por solapamiento</text>

  <rect x="555" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1" />
  <text x="675" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">Embedding · Índice</text>
  <text x="675" y="178" text-anchor="middle" font-size="10" fill="#555">nDCG@10 del dominio</text>
  <text x="675" y="193" text-anchor="middle" font-size="10" fill="#555">recall ANN vs. flat</text>
  <text x="675" y="208" text-anchor="middle" font-size="10" fill="#555">línea base de drift</text>

  <rect x="805" y="140" width="320" height="80" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1" />
  <text x="965" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">Enriquecimiento (NER · EL · tags)</text>
  <text x="965" y="178" text-anchor="middle" font-size="10" fill="#555">EL F1 · manejo de NIL · cobertura de alias</text>
  <text x="965" y="193" text-anchor="middle" font-size="10" fill="#555">F1 jerárquico · tasa de tags huérfanos</text>
  <text x="965" y="208" text-anchor="middle" font-size="10" fill="#555">validez del esquema al publicar</text>

  <!-- Arrow down to Layer 2 -->
  <line x1="590" y1="244" x2="590" y2="280" stroke="#555" stroke-width="1.6" marker-end="url(#arrLayer)" />
  <text x="700" y="265" font-size="10" fill="#888" font-style="italic">fija el techo de recall para todo lo demás</text>

  <!-- =============== Layer 2: Online =============== -->
  <rect x="30" y="290" width="1120" height="160" rx="12" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowL)" />
  <text x="55" y="316" font-size="14" font-weight="700" fill="#e65100">Capa 2 · Online (por consulta)</text>
  <text x="55" y="334" font-size="10" fill="#e65100">Pregunta: ¿se encontró y usó la evidencia correcta para esta consulta?</text>

  <rect x="55" y="350" width="240" height="80" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1" />
  <text x="175" y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Comprensión de la consulta</text>
  <text x="175" y="388" text-anchor="middle" font-size="10" fill="#555">ganancia/pérdida por reescritura</text>
  <text x="175" y="403" text-anchor="middle" font-size="10" fill="#555">precisión del enrutado</text>
  <text x="175" y="418" text-anchor="middle" font-size="10" fill="#555">cobertura de descomposición</text>

  <rect x="305" y="350" width="240" height="80" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1" />
  <text x="425" y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Recuperación</text>
  <text x="425" y="388" text-anchor="middle" font-size="10" fill="#555">Recall@k · MRR · nDCG · MAP</text>
  <text x="425" y="403" text-anchor="middle" font-size="10" fill="#555">precisión/recall del contexto</text>
  <text x="425" y="418" text-anchor="middle" font-size="10" fill="#555">mejora híbrida sobre cada vía</text>

  <rect x="555" y="350" width="240" height="80" rx="8" fill="#ffebee" stroke="#c62828" stroke-width="1.6" />
  <text x="675" y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#c62828">Filtrado (zona crítica)</text>
  <text x="675" y="388" text-anchor="middle" font-size="10" fill="#c62828">tasa de falsa exclusión del filtro</text>
  <text x="675" y="403" text-anchor="middle" font-size="10" fill="#c62828">precisión/recall del predicado</text>
  <text x="675" y="418" text-anchor="middle" font-size="10" fill="#c62828">Δ de recuperación en sombra</text>

  <rect x="805" y="350" width="320" height="80" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1" />
  <text x="965" y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Reordenación · Montaje de contexto</text>
  <text x="965" y="388" text-anchor="middle" font-size="10" fill="#555">ΔnDCG · ΔMRR frente a sin rerank</text>
  <text x="965" y="403" text-anchor="middle" font-size="10" fill="#555">uso del contexto · perdido en medio</text>
  <text x="965" y="418" text-anchor="middle" font-size="10" fill="#555">robustez ante distractores (RGB)</text>

  <!-- Arrow down to Layer 3 -->
  <line x1="590" y1="454" x2="590" y2="490" stroke="#555" stroke-width="1.6" marker-end="url(#arrLayer)" />
  <text x="700" y="475" font-size="10" fill="#888" font-style="italic">envía contexto verificado a la generación</text>

  <!-- =============== Layer 3: Post-gen =============== -->
  <rect x="30" y="500" width="1120" height="135" rx="12" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadowL)" />
  <text x="55" y="526" font-size="14" font-weight="700" fill="#2e7d32">Capa 3 · Posgeneración y telemetría en producción</text>
  <text x="55" y="544" font-size="10" fill="#2e7d32">Pregunta: ¿la respuesta es fiel, verificable y segura para enviar, y lo seguirá siendo la semana que viene?</text>

  <rect x="55" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="175" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Fidelidad</text>
  <text x="175" y="595" text-anchor="middle" font-size="10" fill="#555">RAGAS · HHEM · FActScore</text>
  <text x="175" y="610" text-anchor="middle" font-size="10" fill="#555">FaithJudge · autoconsistencia</text>

  <rect x="305" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="425" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Citas y estructura</text>
  <text x="425" y="595" text-anchor="middle" font-size="10" fill="#555">precisión/recall de citas</text>
  <text x="425" y="610" text-anchor="middle" font-size="10" fill="#555">validez del esquema · conformidad de vocabulario</text>

  <rect x="555" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="675" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Señal implícita + explícita</text>
  <text x="675" y="595" text-anchor="middle" font-size="10" fill="#555">tasa de regeneración · dwell · CTR en citas</text>
  <text x="675" y="610" text-anchor="middle" font-size="10" fill="#555">pulgares · estrellas · ediciones inline</text>

  <rect x="805" y="558" width="320" height="68" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="965" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Drift · coste · latencia · HITL</text>
  <text x="965" y="595" text-anchor="middle" font-size="10" fill="#555">drift de consulta/embedding · latencia p95 · $/consulta</text>
  <text x="965" y="610" text-anchor="middle" font-size="10" fill="#555">evaluación en sombra · cola de revisión de baja confianza</text>
</svg>
