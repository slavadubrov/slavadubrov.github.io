<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 660" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Three places where a RAG system can lose evidence: ingestion, query time, and the answer or production environment" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Tres situaciones en las que un sistema RAG puede perder evidencias</title>
  <defs>
    <marker id="arrLayer" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#64748b" />
    </marker>
    <filter id="shadowL" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="1180" height="660" fill="#f8fafc" />

  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a" x="590">Tres situaciones en las que un sistema RAG puede perder evidencias</text>
  <text y="56" text-anchor="middle" font-size="12" fill="#64748b" x="590">Ingestión · Tiempo de consulta pipeline · Calidad de las respuestas y comportamiento en producción</text>

  <!-- =============== Layer 1: Ingestion =============== -->
  <rect x="30" y="80" width="1120" height="160" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowL)" />
  <text y="106" font-size="14" font-weight="700" fill="#1d4ed8" x="55">Capa 1 · Ingestión</text>
  <text y="124" font-size="11" fill="#1d4ed8" x="55">Pregunta: ¿el corpus e índice conservaron el contenido original?</text>

  <!-- Sub-cards -->
  <rect x="55" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="175">Preparación del corpus</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="175">tasa de éxito en el análisis · CER/WER</text>
  <text y="193" text-anchor="middle" font-size="11" fill="#64748b" x="175">TEDS · cobertura de metadatos</text>
  <text y="208" text-anchor="middle" font-size="11" fill="#64748b" x="175">frescura · deduplicación</text>

  <rect x="305" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="425">Fragmentación</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="425">contención de answer-span</text>
  <text y="193" text-anchor="middle" font-size="11" fill="#64748b" x="425">tasa de ruptura de límites</text>
  <text y="208" text-anchor="middle" font-size="11" fill="#64748b" x="425">redundancia por solapamiento</text>

  <rect x="555" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="675">Embedding · Índice</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="675">dominio nDCG@10</text>
  <text y="193" text-anchor="middle" font-size="11" fill="#64748b" x="675">ANN recuperación frente a valor plano</text>
  <text y="208" text-anchor="middle" font-size="11" fill="#64748b" x="675">línea de referencia de deriva</text>

  <rect x="805" y="140" width="320" height="80" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="965">Enriquecimiento (NER · EL · etiquetas)</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="965">EL F1 · manejo de valores nulos · cobertura de alias</text>
  <text y="193" text-anchor="middle" font-size="11" fill="#64748b" x="965">tasa F1 jerárquica · de etiquetas huérfanas</text>
  <text y="208" text-anchor="middle" font-size="11" fill="#64748b" x="965">validez del esquema en el momento de la publicación</text>

  <!-- Arrow down to Layer 2 -->
  <line x1="590" y1="244" x2="590" y2="280" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrLayer)" />
  <text y="265" font-size="11" fill="#64748b" font-style="italic" x="700">establece el techo de recall para todo lo que está por debajo</text>

  <!-- =============== Layer 2: Query time =============== -->
  <rect x="30" y="290" width="1120" height="160" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowL)" />
  <text y="316" font-size="14" font-weight="700" fill="#9a3412" x="55">Capa 2 · Tiempo de consulta</text>
  <text y="334" font-size="11" fill="#9a3412" x="55">Pregunta: ¿encontró y reunió el pipeline las pruebas adecuadas?</text>

  <rect x="55" y="350" width="240" height="80" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="175">Comprensión de consultas</text>
  <text y="388" text-anchor="middle" font-size="11" fill="#64748b" x="175">reescritura de ganancia/pérdida</text>
  <text y="403" text-anchor="middle" font-size="11" fill="#64748b" x="175">precisión de enrutamiento</text>
  <text y="418" text-anchor="middle" font-size="11" fill="#64748b" x="175">cobertura de descomposición</text>

  <rect x="305" y="350" width="240" height="80" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="425">Recuperación</text>
  <text y="388" text-anchor="middle" font-size="11" fill="#64748b" x="425">Recall@k · MRR · nDCG · MAP</text>
  <text y="403" text-anchor="middle" font-size="11" fill="#64748b" x="425">precisión/recuperación de contexto</text>
  <text y="418" text-anchor="middle" font-size="11" fill="#64748b" x="425">elevación híbrida sobre cada carril</text>

  <rect x="555" y="350" width="240" height="80" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.6" />
  <text y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b" x="675">Filtrado (zona crítica)</text>
  <text y="388" text-anchor="middle" font-size="11" fill="#991b1b" x="675">tasa de falsa exclusión del filtro</text>
  <text y="403" text-anchor="middle" font-size="11" fill="#991b1b" x="675">precisión/recuerdo de predicados</text>
  <text y="418" text-anchor="middle" font-size="11" fill="#991b1b" x="675">recuperación de sombras Δ</text>

  <rect x="805" y="350" width="320" height="80" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="965">Reranking · Ensamblaje de contexto</text>
  <text y="388" text-anchor="middle" font-size="11" fill="#64748b" x="965">ΔnDCG · ΔMRR respecto al escenario sin reclasificación</text>
  <text y="403" text-anchor="middle" font-size="11" fill="#64748b" x="965">utilización de contexto · ataque perdido en el medio</text>
  <text y="418" text-anchor="middle" font-size="11" fill="#64748b" x="965">robustez ante distractores (RGB)</text>

  <!-- Arrow down to Layer 3 -->
  <line x1="590" y1="454" x2="590" y2="490" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrLayer)" />
  <text y="475" font-size="11" fill="#64748b" font-style="italic" x="700">suministra contexto verificado a la generación</text>

  <!-- =============== Layer 3: Answer and production =============== -->
  <rect x="30" y="500" width="1120" height="135" rx="12" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowL)" />
  <text y="526" font-size="14" font-weight="700" fill="#166534" x="55">Capa 3 · Respuesta y producción</text>
  <text y="544" font-size="11" fill="#166534" x="55">Pregunta: ¿utilizó la respuesta las pruebas disponibles, y se mantiene la calidad bajo tráfico real?</text>

  <rect x="55" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="175">Fidelidad</text>
  <text y="595" text-anchor="middle" font-size="11" fill="#64748b" x="175">RAGAS · HHEM · FActScore</text>
  <text y="610" text-anchor="middle" font-size="11" fill="#64748b" x="175">FaithJudge · autoconsistencia</text>

  <rect x="305" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="425">Citas y estructura</text>
  <text y="595" text-anchor="middle" font-size="11" fill="#64748b" x="425">precisión/recuperación de citaciones</text>
  <text y="610" text-anchor="middle" font-size="11" fill="#64748b" x="425">validez del esquema · conformidad del vocabulario</text>

  <rect x="555" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="675">Señal implícita + explícita</text>
  <text y="595" text-anchor="middle" font-size="11" fill="#64748b" x="675">tasa de regeneración · tiempo de permanencia · CTR en citas</text>
  <text y="610" text-anchor="middle" font-size="11" fill="#64748b" x="675">meñiques · estrella · ediciones en línea</text>

  <rect x="805" y="558" width="320" height="68" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="965">Deriva · costo · latencia · HITL</text>
  <text y="595" text-anchor="middle" font-size="11" fill="#64748b" x="965">desviación de query/embedding · latencia p95 · $/query</text>
  <text y="610" text-anchor="middle" font-size="11" fill="#64748b" x="965">evaluación de sombra · cola de revisión de baja confianza</text>
</svg>
