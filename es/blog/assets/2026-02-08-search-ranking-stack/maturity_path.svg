<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="title">Una secuencia de experimentos para el ranking de búsquedas</title>
  <desc id="desc">Una secuencia que abarca desde una línea de base medida hasta el recuerdo de candidatos, la precisión de clasificación, la adaptación al dominio, y una capa costosa opcional.</desc>
  <defs>
    <marker id="arrowM" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#334155" />
    </marker>
    <filter id="shadowM" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="800" height="260" fill="#ffffff" />

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Secuencia de experimentos de clasificación en búsquedas</text>

  <!-- Connecting arrow line -->
  <line x1="60" y1="120" x2="740" y2="120" stroke="#cbd5e1" stroke-width="3" />

  <!-- Level 1 -->
  <rect x="30" y="60" width="160" height="120" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowM)" />
  <circle cx="110" cy="60" r="14" fill="#2563eb" />
  <text x="110" y="65" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">1</text>
  <text x="110" y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8">Línea de referencia</text>
  <text x="110" y="108" text-anchor="middle" font-size="12" fill="#334155">Sistema léxico</text>
  <text x="110" y="122" text-anchor="middle" font-size="12" fill="#334155">Conjunto de consultas evaluadas</text>
  <text x="110" y="136" text-anchor="middle" font-size="12" fill="#334155">Rebanadas de fallo</text>
  <text x="110" y="168" text-anchor="middle" font-size="11" fill="#334155">Efuerzo: Bajo</text>

  <!-- Arrow -->
  <line x1="195" y1="120" x2="225" y2="120" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowM)" />

  <!-- Level 2 (highlighted - biggest ROI) -->
  <rect x="220" y="55" width="160" height="130" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2.5" filter="url(#shadowM)" />
  <circle cx="300" cy="55" r="14" fill="#ea580c" />
  <text x="300" y="60" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">2</text>
  <text x="300" y="85" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412">Recuperación de candidatos</text>
  <text x="300" y="103" text-anchor="middle" font-size="12" fill="#334155">Prueba de recuperación densa</text>
  <text x="300" y="117" text-anchor="middle" font-size="12" fill="#334155">Fusión de pruebas</text>
  <text x="300" y="131" text-anchor="middle" font-size="12" fill="#334155">Ajustar el umbral de corte</text>
  <text x="300" y="158" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412">SOLAMENTE SI FALLA EL RECORDATORIO</text>
  <text x="300" y="173" text-anchor="middle" font-size="11" fill="#334155">Esfuerzo: Bajo-Medio</text>

  <!-- Arrow -->
  <line x1="385" y1="120" x2="415" y2="120" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowM)" />

  <!-- Level 3 -->
  <rect x="410" y="60" width="160" height="120" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#shadowM)" />
  <circle cx="490" cy="60" r="14" fill="#dc2626" />
  <text x="490" y="65" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">3</text>
  <text x="490" y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">Precisión de clasificación</text>
  <text x="490" y="108" text-anchor="middle" font-size="12" fill="#334155">Codificador de cruce de pruebas</text>
  <text x="490" y="122" text-anchor="middle" font-size="12" fill="#334155">Ajustar el tamaño de la lista de candidatos</text>
  <text x="490" y="136" text-anchor="middle" font-size="12" fill="#334155">Medir la latencia</text>
  <text x="490" y="168" text-anchor="middle" font-size="11" fill="#334155">Esfuerzo: Medio-Alto</text>

  <!-- Arrow -->
  <line x1="575" y1="120" x2="605" y2="120" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowM)" />

  <!-- Level 4 -->
  <rect x="600" y="60" width="170" height="120" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowM)" />
  <circle cx="685" cy="60" r="14" fill="#166534" />
  <text x="685" y="65" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">4</text>
  <text x="685" y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">Capas opcionales</text>
  <text x="685" y="108" text-anchor="middle" font-size="12" fill="#334155">Adaptación de dominio</text>
  <text x="685" y="122" text-anchor="middle" font-size="12" fill="#334155">LLM reranking</text>
  <text x="685" y="136" text-anchor="middle" font-size="12" fill="#334155">Personalización</text>
  <text x="685" y="168" text-anchor="middle" font-size="11" fill="#334155">Esfuerzo: Alto</text>

  <!-- Bottom label -->
  <text x="400" y="245" text-anchor="middle" font-size="11" fill="#334155">Solo avanza cuando la medición anterior detecte una falla estable.</text>

</svg>
