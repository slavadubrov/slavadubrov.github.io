<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 530" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Tubo de pruebas: search-ranking-stack</title>
  <desc id="artifact-desc">Tubo de pruebas: search-ranking-stack.</desc>
  <defs>
    <marker id="arrowD" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155" />
    </marker>
    <filter id="shadowD" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="22" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a" x="250">Tubo de pruebas: search-ranking-stack</text>
  <text y="40" text-anchor="middle" font-size="12" fill="#334155" x="250">Prueba de rendimiento Amazon ESCI: ~500 consultas, ~8.5K productos</text>

  <!-- Stage 1: Retrieval -->
  <rect x="30" y="52" width="440" height="210" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1" stroke-dasharray="4" />
  <text y="72" font-size="12" font-weight="700" fill="#1d4ed8" x="45">Etapa 1: Recuperación</text>

  <!-- Query -->
  <rect x="200" y="82" width="100" height="28" rx="14" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadowD)" />
  <text y="101" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6" x="250">Consulta</text>

  <!-- Arrows to BM25 and Dense -->
  <line x1="224" y1="110" x2="148" y2="132" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowD)" />
  <line x1="276" y1="110" x2="352" y2="132" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowD)" />

  <!-- BM25 -->
  <rect x="50" y="135" width="170" height="48" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.2" filter="url(#shadowD)" />
  <text y="155" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412" x="135">BM25 Esparsa</text>
  <text y="172" text-anchor="middle" font-size="9" fill="#64748b" x="135">rank_bm25 | Top-100</text>

  <!-- Dense -->
  <rect x="280" y="135" width="170" height="48" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowD)" />
  <text y="155" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8" x="365">Bi-encoder denso</text>
  <text y="172" text-anchor="middle" font-size="9" fill="#64748b" x="365">all-MiniLM-L6-v2 | Top-100</text>

  <!-- Arrows to RRF -->
  <line x1="135" y1="183" x2="200" y2="208" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowD)" />
  <line x1="365" y1="183" x2="300" y2="208" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowD)" />

  <!-- RRF -->
  <rect x="150" y="210" width="200" height="42" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowD)" />
  <text y="228" text-anchor="middle" font-size="11" font-weight="700" fill="#5b21b6" x="250">Fusión RRF</text>
  <text y="243" text-anchor="middle" font-size="9" fill="#64748b" x="250">k=60 | Top-100</text>

  <!-- Arrow from RRF to Cross-Encoder -->
  <line x1="250" y1="252" x2="250" y2="300" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowD)" />
  <text y="280" font-size="9" fill="#64748b" x="268">Top-50</text>

  <!-- Stage 2: Reranking -->
  <rect x="30" y="275" width="440" height="240" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="1" stroke-dasharray="4" />
  <text y="295" font-size="12" font-weight="700" fill="#9a3412" x="45">Etapa 2: Reclasificación</text>

  <!-- Cross-Encoder -->
  <rect x="65" y="305" width="370" height="52" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowD)" />
  <text y="326" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="250">Reclasificación con codificador cruzado</text>
  <text y="344" text-anchor="middle" font-size="10" fill="#64748b" x="250">ms-marco-MiniLM-L-12-v2 | Reclasificación de los 50 mejores resultados</text>

  <!-- Arrow -->
  <line x1="250" y1="357" x2="250" y2="385" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowD)" />
  <text y="376" font-size="9" fill="#64748b" x="268">Top 10</text>

  <!-- LLM Reranker -->
  <rect x="65" y="390" width="370" height="52" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowD)" />
  <text y="411" text-anchor="middle" font-size="12" font-weight="600" fill="#166534" x="250">Reclasificador por lista de LLM</text>
  <text y="429" text-anchor="middle" font-size="10" fill="#64748b" x="250">Estilo RankGPT | Ollama / Claude / Local</text>

  <!-- Arrow to results -->
  <line x1="250" y1="442" x2="250" y2="468" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowD)" />

  <!-- Final Results -->
  <rect x="140" y="472" width="220" height="30" rx="15" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowD)" />
  <text y="492" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="250">Resultados finales de los 10 mejores</text>

</svg>
