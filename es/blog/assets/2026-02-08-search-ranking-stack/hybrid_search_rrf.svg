<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 420" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Búsqueda híbrida con fusión de rangos recíprocos</title>
  <desc id="artifact-desc">Búsqueda híbrida con fusión de rangos recíprocos.</desc>
  <defs>
    <marker id="arrowH" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155" />
    </marker>
    <filter id="shadowH" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a" x="390">Búsqueda híbrida con fusión de rangos recíprocos</text>

  <!-- Query -->
  <rect x="310" y="50" width="160" height="40" rx="20" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowH)" />
  <text y="75" text-anchor="middle" font-size="13" font-weight="600" fill="#5b21b6" x="390">Consulta del usuario</text>

  <!-- Arrows from query -->
  <line x1="345" y1="90" x2="180" y2="130" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowH)" />
  <line x1="435" y1="90" x2="600" y2="130" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowH)" />

  <!-- BM25 Sparse Index -->
  <rect x="60" y="133" width="240" height="110" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowH)" />
  <text y="157" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="180">Índice disperso (BM25)</text>
  <text y="177" text-anchor="middle" font-size="11" fill="#334155" x="180">Búsqueda en índice invertido</text>

  <text y="198" font-size="11" fill="#0f172a" x="85">1. Doc-X</text>
  <text y="198" font-size="10" fill="#64748b" x="175">puntuación: 12,5</text>
  <text y="215" font-size="11" fill="#0f172a" x="85">2. Doc-Y</text>
  <text y="215" font-size="10" fill="#64748b" x="175">puntuación: 8.3</text>
  <text y="232" font-size="11" fill="#0f172a" x="85">3. Doc-Z</text>
  <text y="232" font-size="10" fill="#64748b" x="175">puntuación: 7.1</text>

  <!-- Dense Index -->
  <rect x="480" y="133" width="240" height="110" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowH)" />
  <text y="157" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="600">Índice denso (HNSW)</text>
  <text y="177" text-anchor="middle" font-size="11" fill="#334155" x="600">Búsqueda vectorial de ANN</text>

  <text y="198" font-size="11" fill="#0f172a" x="505">1. Doc-Y</text>
  <text y="198" font-size="10" fill="#64748b" x="595">sim: 0.92</text>
  <text y="215" font-size="11" fill="#0f172a" x="505">2. Doc-X</text>
  <text y="215" font-size="10" fill="#64748b" x="595">sim: 0,87</text>
  <text y="232" font-size="11" fill="#0f172a" x="505">3. Doc-W</text>
  <text y="232" font-size="10" fill="#64748b" x="595">sim: 0.81</text>

  <!-- Arrows to RRF -->
  <line x1="180" y1="243" x2="320" y2="290" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowH)" />
  <line x1="600" y1="243" x2="460" y2="290" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowH)" />

  <!-- RRF Fusion Box -->
  <rect x="280" y="280" width="220" height="55" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadowH)" />
  <text y="303" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6" x="390">Fusión RRF (k=60)</text>
  <text y="322" text-anchor="middle" font-size="11" fill="#334155" x="390">score(d) = Suma de 1/(k + rango)</text>

  <!-- Arrow to results -->
  <line x1="390" y1="335" x2="390" y2="365" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowH)" />

  <!-- Fused Results -->
  <rect x="220" y="368" width="340" height="42" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowH)" />
  <text y="393" font-size="11" fill="#0f172a" x="245">
    <tspan font-weight="700" fill="#166534">1.</tspan> Doc-Y (0.033)
    <tspan dx="15" font-weight="700" fill="#166534">2.</tspan> Doc-X (0.033)
    <tspan dx="15" font-weight="700" fill="#166534">3.</tspan> Doc-Z (0.016)
  </text>

  <!-- Callout -->
  <rect x="560" y="280" width="190" height="52" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" stroke-dasharray="3" />
  <text y="298" font-size="10" fill="#334155" x="570">Basado en el ranking, no en la puntuación.</text>
  <text y="313" font-size="10" fill="#334155" x="570">Inmune a la escala de puntuación</text>
  <text y="328" font-size="10" fill="#334155" x="570">diferencia entre los métodos.</text>

</svg>
