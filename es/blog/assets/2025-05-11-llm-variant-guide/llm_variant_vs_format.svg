<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Seis capas independientes en un artefacto de modelo de peso abierto</title>
  <desc id="desc">Un artefacto de modelo se describe mediante su familia y revisión, rol de entrenamiento, arquitectura, representación numérica, contenedor y disposición, además de runtime. Las flechas indican que cada capa impone restricciones a la siguiente sin ser equivalente a ella.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="500" rx="22" fill="#0f172a" /><text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">El nombre de un modelo combina varias capas independientes</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(30 105)"><rect width="285" height="125" rx="15" fill="#1e293b" stroke="#64748b" /><text x="142" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#e2e8f0">1. Familia + revisión</text><text x="142" y="70" text-anchor="middle" font-size="13" fill="#cbd5e1">pesos • tokenizador • licencia</text><text x="142" y="96" text-anchor="middle" font-size="12" fill="#94a3b8">repositorio + commit</text></g>
    <g transform="translate(357 105)"><rect width="285" height="125" rx="15" fill="#5b21b6" stroke="#2563eb" /><text x="142" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#c4b5fd">2. Rol de entrenamiento</text><text x="142" y="70" text-anchor="middle" font-size="13" fill="#93c5fd">base • instruir • razonamiento • destilar</text><text x="142" y="96" text-anchor="middle" font-size="12" fill="#94a3b8">las etiquetas pueden solaparse</text></g>
    <g transform="translate(685 105)"><rect width="285" height="125" rx="15" fill="#9a3412" stroke="#ea580c" /><text x="142" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#fdba74">3. Arquitectura</text><text x="142" y="70" text-anchor="middle" font-size="13" fill="#fdba74">denso • MoE • total / activo</text><text x="142" y="96" text-anchor="middle" font-size="12" fill="#94a3b8">compatibilidad de kernel</text></g>
    <g transform="translate(30 275)"><rect width="285" height="125" rx="15" fill="#1d4ed8" stroke="#2563eb" /><text x="142" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">4. Representación numérica</text><text x="142" y="70" text-anchor="middle" font-size="13" fill="#93c5fd">BF16 • FP8 • GPTQ • AWQ</text><text x="142" y="96" text-anchor="middle" font-size="12" fill="#94a3b8">tipo de dato o método de cuantización</text></g>
    <g transform="translate(357 275)"><rect width="285" height="125" rx="15" fill="#1d4ed8" stroke="#2563eb" /><text x="142" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">5. Contenedor + disposición</text><text x="142" y="70" text-anchor="middle" font-size="13" fill="#93c5fd">Fragmentos de Safetensors • GGUF</text><text x="142" y="96" text-anchor="middle" font-size="12" fill="#94a3b8">archivos + metadatos</text></g>
    <g transform="translate(685 275)"><rect width="285" height="125" rx="15" fill="#1d4ed8" stroke="#2563eb" /><text x="142" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">6. Runtime + hardware</text><text x="142" y="70" text-anchor="middle" font-size="13" fill="#93c5fd">llama.cpp • vLLM • Transformadores</text><text x="142" y="96" text-anchor="middle" font-size="12" fill="#94a3b8">ruta de ejecución soportada</text></g>
    <text x="500" y="460" text-anchor="middle" font-size="13" fill="#94a3b8">Ningún sufijo por sí solo demuestra la calidad de la tarea, el ajuste de memoria ni la velocidad de serving.</text>
  </g>
</svg>
