<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Marco de Decisión para LLM</title>
  <desc id="artifact-desc">Marco de Decisión para LLM.</desc>
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .node { fill: #1d4ed8; stroke: #94a3b8; stroke-width: 2; rx: 6; ry: 6; }
      .node-start { fill: #7c3aed; stroke: #7c3aed; stroke-width: 2; rx: 6; ry: 6; }
      .node-mid { fill: #2563eb; stroke: #2563eb; stroke-width: 2; rx: 6; ry: 6; }
      .node-end { fill: #16a34a; stroke: #16a34a; stroke-width: 2; rx: 6; ry: 6; }
      .text { font-family: Inter, system-ui, sans-serif; fill: #93c5fd; font-size: 12px; text-anchor: middle; }
      .text-dark { font-family: Inter, system-ui, sans-serif; fill: #0f172a; font-size: 12px; font-weight: bold; text-anchor: middle; }
      .arrow { stroke: #2563eb; stroke-width: 1.5; marker-end: url(#arrowhead); fill: none; }
      .label-bg { fill: #0f172a; opacity: 0.9; }
      .label-text { font-family: Inter, system-ui, sans-serif; fill: #93c5fd; font-size: 10px; text-anchor: middle; }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2563eb" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="900" height="600" class="bg" />

  <text y="30" class="text" style="font-size: 20px; font-weight: bold;" x="450">Marco de Decisión para LLM</text>


  <rect x="350" y="50" width="200" height="40" class="node-start" />
  <text y="75" class="text-dark" x="450">¿Cuál es su hardware?</text>



  <path d="M 400 90 L 150 130" class="arrow" marker-end="url(#arrowhead)" />
  <rect x="50" y="130" width="200" height="40" class="node" />
  <text y="155" class="text" x="150">Solo portátil/CPU</text>
  <text y="185" class="label-text" x="150">(VRAM de 8 GB)</text>


  <path d="M 430 90 L 350 130" class="arrow" marker-end="url(#arrowhead)" />
  <rect x="270" y="130" width="160" height="40" class="node" />
  <text y="155" class="text" x="350">GPU para juegos</text>
  <text y="185" class="label-text" x="350">(VRAM de 8-24 GB)</text>


  <path d="M 470 90 L 550 130" class="arrow" marker-end="url(#arrowhead)" />
  <rect x="470" y="130" width="160" height="40" class="node" />
  <text y="155" class="text" x="550">Estación de trabajo</text>
  <text y="185" class="label-text" x="550">VRAM de 24 GB o más</text>


  <path d="M 500 90 L 750 130" class="arrow" marker-end="url(#arrowhead)" />
  <rect x="670" y="130" width="160" height="40" class="node" />
  <text y="155" class="text" x="750">Nube / Centro de datos</text>
  <text y="185" class="label-text" x="750">(A100 / H100)</text>




  <path d="M 150 170 L 150 220" class="arrow" marker-end="url(#arrowhead)" />
  <rect x="100" y="220" width="100" height="30" class="node-mid" />
  <text y="240" class="text-dark" x="150">Tarea?</text>


  <path d="M 350 170 L 350 220" class="arrow" marker-end="url(#arrowhead)" />
  <rect x="300" y="220" width="100" height="30" class="node-mid" />
  <text y="240" class="text-dark" x="350">Tarea?</text>


  <path d="M 550 170 L 550 220" class="arrow" marker-end="url(#arrowhead)" />
  <rect x="500" y="220" width="100" height="30" class="node-mid" />
  <text y="240" class="text-dark" x="550">Tarea?</text>


  <path d="M 750 170 L 750 220" class="arrow" marker-end="url(#arrowhead)" />
  <rect x="700" y="220" width="100" height="30" class="node-mid" />
  <text y="240" class="text-dark" x="750">Tarea?</text>





  <path d="M 150 250 L 100 300" class="arrow" marker-end="url(#arrowhead)" />
  <rect x="20" y="300" width="160" height="60" class="node-end" />
  <text y="325" class="text-dark" x="100">Instruir Q4 GGUF</text>
  <text y="345" class="text" style="fill: #0f172a; font-size: 10px;" x="100">Modelo de 7B o 8B</text>
  <text y="280" class="label-text" x="80">Chat/Agente</text>

  <path d="M 150 250 L 200 300" class="arrow" marker-end="url(#arrowhead)" />
  <rect x="190" y="300" width="160" height="60" class="node-end" />
  <text y="325" class="text-dark" x="270">GGUF destilado del cuarto trimestre</text>
  <text y="345" class="text" style="fill: #0f172a; font-size: 10px;" x="270">Modelo 1B - 3B</text>
  <text y="280" class="label-text" x="220">Fast API</text>


  <path d="M 350 250 L 350 380" class="arrow" marker-end="url(#arrowhead)" />
  <rect x="270" y="380" width="160" height="60" class="node-end" />
  <text y="405" class="text-dark" x="350">Instruir a GPTQ de 4 bits</text>
  <text y="425" class="text" style="fill: #0f172a; font-size: 10px;" x="350">8B - 14B o MoE</text>
  <text y="370" class="label-text" x="380">Producción</text>


  <path d="M 550 250 L 550 380" class="arrow" marker-end="url(#arrowhead)" />
  <rect x="470" y="380" width="160" height="60" class="node-end" />
  <text y="405" class="text-dark" x="550">Instruir a GPTQ de 3 bits</text>
  <text y="425" class="text" style="fill: #0f172a; font-size: 10px;" x="550">Modelo de 30B a 70B</text>
  <text y="370" class="label-text" x="580">Calidad</text>


  <path d="M 750 250 L 700 300" class="arrow" marker-end="url(#arrowhead)" />
  <rect x="620" y="300" width="160" height="60" class="node-end" />
  <text y="325" class="text-dark" x="700">Instruir en FP16</text>
  <text y="345" class="text" style="fill: #0f172a; font-size: 10px;" x="700">Modelo de 70 mil millones de parámetros+</text>
  <text y="280" class="label-text" x="680">Inférencia</text>

  <path d="M 750 250 L 800 300" class="arrow" marker-end="url(#arrowhead)" />
  <rect x="790" y="300" width="100" height="60" class="node-end" />
  <text y="325" class="text-dark" x="840">Base BF16</text>
  <text y="345" class="text" style="fill: #0f172a; font-size: 10px;" x="840">Entrenamiento</text>
  <text y="280" class="label-text" x="820">Entrenar</text>

</svg>
