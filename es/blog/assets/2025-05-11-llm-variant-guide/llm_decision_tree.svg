<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Checkpoint, runtime, y el flujo de trabajo de selección de cuantización</title>
  <desc id="desc">El flujo de trabajo comienza con un contrato de tarea, selecciona un checkpoint basado en una evaluación de alta calidad, verifica la existencia de un runtime compatible, mide el consumo de memoria, compara las representaciones y benchmarks el artefacto final de lanzamiento completo.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="480" rx="22" fill="#0f172a" /><text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Elegir comportamiento antes de la compresión</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(30 120)"><rect width="135" height="120" rx="14" fill="#1e293b" stroke="#64748b" /><text x="67" y="35" text-anchor="middle" font-size="15" font-weight="700" fill="#e2e8f0">1. Contrato de tarea</text><text x="67" y="68" text-anchor="middle" font-size="11" fill="#cbd5e1">calidad • licencia</text><text x="67" y="89" text-anchor="middle" font-size="11" fill="#94a3b8">interfaz • contexto</text></g><text x="180" y="188" font-size="23" fill="#94a3b8">→</text>
    <g transform="translate(205 120)"><rect width="135" height="120" rx="14" fill="#5b21b6" stroke="#2563eb" /><text x="67" y="35" text-anchor="middle" font-size="15" font-weight="700" fill="#c4b5fd">2. Checkpoint</text><text x="67" y="68" text-anchor="middle" font-size="11" fill="#93c5fd">revisión exacta</text><text x="67" y="89" text-anchor="middle" font-size="11" fill="#94a3b8">linea de referencia de alta calidad</text></g><text x="355" y="188" font-size="23" fill="#94a3b8">→</text>
    <g transform="translate(380 120)"><rect width="135" height="120" rx="14" fill="#9a3412" stroke="#ea580c" /><text x="67" y="35" text-anchor="middle" font-size="15" font-weight="700" fill="#fdba74">3. Runtime</text><text x="67" y="68" text-anchor="middle" font-size="11" fill="#fdba74">arquitectura</text><text x="67" y="89" text-anchor="middle" font-size="11" fill="#94a3b8">núcleo + hardware</text></g><text x="530" y="188" font-size="23" fill="#94a3b8">→</text>
    <g transform="translate(555 120)"><rect width="135" height="120" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="67" y="35" text-anchor="middle" font-size="15" font-weight="700" fill="#93c5fd">4. Memoria</text><text x="67" y="68" text-anchor="middle" font-size="11" fill="#93c5fd">pesos + KV</text><text x="67" y="89" text-anchor="middle" font-size="11" fill="#94a3b8">espacio de trabajo + margen de maniobra</text></g><text x="705" y="188" font-size="23" fill="#94a3b8">→</text>
    <g transform="translate(730 120)"><rect width="135" height="120" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="67" y="35" text-anchor="middle" font-size="15" font-weight="700" fill="#93c5fd">5. Representación</text><text x="67" y="68" text-anchor="middle" font-size="11" fill="#93c5fd">precisión/cuantificación</text><text x="67" y="89" text-anchor="middle" font-size="11" fill="#94a3b8">procedencia + hash</text></g><text x="880" y="188" font-size="23" fill="#94a3b8">→</text>
    <g transform="translate(900 120)"><rect width="75" height="120" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="37" y="35" text-anchor="middle" font-size="13" font-weight="700" fill="#93c5fd">6. Pruebas</text><text x="37" y="68" text-anchor="middle" font-size="10" fill="#93c5fd">lanzamiento</text><text x="37" y="88" text-anchor="middle" font-size="10" fill="#94a3b8">unidad</text></g>
    <rect x="150" y="315" width="700" height="80" rx="14" fill="#991b1b" stroke="#dc2626" /><text x="500" y="347" text-anchor="middle" font-size="16" font-weight="700" fill="#fca5a5">Cualquier paso fallido hace que se vuelva a la opción anterior</text><text x="500" y="375" text-anchor="middle" font-size="12" fill="#fca5a5">Un archivo más pequeño no constituye una versión exitosa si fallan los aspectos relacionados con la calidad, el contexto o la concurrencia.</text>
    <text x="500" y="444" text-anchor="middle" font-size="13" fill="#94a3b8">Benchmark el checkpoint exacto, la conversión, runtime, y el hardware en conjunto.</text>
  </g>
</svg>
