<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Contexto generado mediante recuperación enfocada, presupuestación, ejecución y validación</title>
  <desc id="desc">Los flujos de estado de las solicitudes confiables pasan por la selección de decisiones, la recuperación autorizada, la presupuestación basada en utilidad, la propuesta de modelo, la validación y ejecución determinística, y finalmente por el registro de la procedencia y los resultados.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="460" rx="22" fill="#0f172a" />
  <text x="500" y="46" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">El ensamblaje de contexto es un ciclo de vida por decisión</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(25 115)"><rect width="150" height="110" rx="14" fill="#1e293b" stroke="#64748b" /><text x="75" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#e2e8f0">Solicitud de confianza</text><text x="75" y="63" text-anchor="middle" font-size="11" fill="#cbd5e1">actor, inquilino, tarea</text><text x="75" y="84" text-anchor="middle" font-size="11" fill="#94a3b8">ubicación regional + hora</text></g><text x="192" y="180" text-anchor="middle" font-size="22" fill="#94a3b8">→</text>
    <g transform="translate(210 115)"><rect width="150" height="110" rx="14" fill="#5b21b6" stroke="#2563eb" /><text x="75" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#c4b5fd">Seleccionar decisión</text><text x="75" y="63" text-anchor="middle" font-size="11" fill="#93c5fd">planificar, recuperar, actuar</text><text x="75" y="84" text-anchor="middle" font-size="11" fill="#94a3b8">o responder</text></g><text x="377" y="180" text-anchor="middle" font-size="22" fill="#94a3b8">→</text>
    <g transform="translate(395 115)"><rect width="150" height="110" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="75" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#93c5fd">Ámbito de aplicación + recuperación</text><text x="75" y="63" text-anchor="middle" font-size="11" fill="#93c5fd">autorizar primero</text><text x="75" y="84" text-anchor="middle" font-size="11" fill="#94a3b8">ranking de evidencias</text></g><text x="562" y="180" text-anchor="middle" font-size="22" fill="#94a3b8">→</text>
    <g transform="translate(580 115)"><rect width="150" height="110" rx="14" fill="#9a3412" stroke="#ea580c" /><text x="75" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#fdba74">Presupuesto + montaje</text><text x="75" y="63" text-anchor="middle" font-size="11" fill="#fdba74">utilidad, frescura</text><text x="75" y="84" text-anchor="middle" font-size="11" fill="#94a3b8">límites de confianza</text></g><text x="747" y="180" text-anchor="middle" font-size="22" fill="#94a3b8">→</text>
    <g transform="translate(765 115)"><rect width="210" height="110" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="105" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#93c5fd">Proponer → validar → actuar</text><text x="105" y="63" text-anchor="middle" font-size="11" fill="#93c5fd">salida tipada + política</text><text x="105" y="84" text-anchor="middle" font-size="11" fill="#94a3b8">condiciones posteriores al uso de la herramienta</text></g>
    <rect x="120" y="300" width="760" height="85" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="500" y="331" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Registrar el manifiesto, la procedencia, la validación y el resultado de la tarea</text><text x="500" y="360" text-anchor="middle" font-size="12" fill="#93c5fd">La decisión siguiente recibe un nuevo conjunto de trabajo en lugar de heredar todo.</text>
    <text x="500" y="425" text-anchor="middle" font-size="13" fill="#94a3b8">Una llamada al modelo es una etapa dentro de la política de contexto, no la política en sí misma.</text>
  </g>
</svg>
