<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
    <style>
        .bg { fill: #1e1e1e; }
        .title { fill: #f8fafc; font-family: sans-serif; font-size: 18px; font-weight: bold; text-anchor: middle; }
        .box { rx: 8; ry: 8; }
        .box-title { fill: #f8fafc; font-family: sans-serif; font-size: 12px; font-weight: bold; text-anchor: middle; }
        .box-text { fill: #cbd5e1; font-family: sans-serif; font-size: 10px; text-anchor: middle; }
        .arrow { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrow); }
        .flow-text { fill: #94a3b8; font-family: sans-serif; font-size: 10px; text-anchor: middle; }
    </style>
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
        </marker>
    </defs>

    <rect width="100%" height="100%" class="bg" />

    <text x="400" y="30" class="title">Divulgación progresiva: carga de contexto justo a tiempo</text>

    <!-- Step 1: Initial Load -->
    <g transform="translate(50, 70)">
        <rect x="0" y="0" width="140" height="80" class="box" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2" />
        <text x="70" y="25" class="box-title">1. Carga inicial</text>
        <text x="70" y="45" class="box-text">Prompt del sistema</text>
        <text x="70" y="58" class="box-text">Definiciones de herramientas</text>
        <text x="70" y="71" class="box-text">~2K tokens</text>
    </g>

    <!-- Arrow 1 -->
    <path d="M 190 110 L 240 110" class="arrow" />
    <text x="215" y="100" class="flow-text">Consulta del usuario</text>

    <!-- Step 2: Route -->
    <g transform="translate(250, 70)">
        <rect x="0" y="0" width="140" height="80" class="box" fill="#2e1e3f" stroke="#a855f7" stroke-width="2" />
        <text x="70" y="25" class="box-title">2. Ruta</text>
        <text x="70" y="45" class="box-text">¿Se necesita recuperación?</text>
        <text x="70" y="58" class="box-text">¿Necesita memoria?</text>
        <text x="70" y="71" class="box-text">¿Qué herramientas?</text>
    </g>

    <!-- Arrow 2 -->
    <path d="M 390 110 L 440 110" class="arrow" />
    <text x="415" y="100" class="flow-text">Seletivo</text>

    <!-- Step 3: Load -->
    <g transform="translate(450, 70)">
        <rect x="0" y="0" width="140" height="80" class="box" fill="#1e3f2e" stroke="#22c55e" stroke-width="2" />
        <text x="70" y="25" class="box-title">3. Cargar solo lo necesario</text>
        <text x="70" y="45" class="box-text">Documentación relevante (3-5)</text>
        <text x="70" y="58" class="box-text">Memoria de usuario</text>
        <text x="70" y="71" class="box-text">~8K tokens</text>
    </g>

    <!-- Arrow 3 -->
    <path d="M 590 110 L 640 110" class="arrow" />
    <text x="615" y="100" class="flow-text">Ejecutar</text>

    <!-- Step 4: Respond -->
    <g transform="translate(650, 70)">
        <rect x="0" y="0" width="100" height="80" class="box" fill="#423208" stroke="#eab308" stroke-width="2" />
        <text x="50" y="25" class="box-title">4. Responder</text>
        <text x="50" y="50" class="box-text">Generar</text>
        <text x="50" y="63" class="box-text">con contexto</text>
    </g>

    <!-- Contrast: Naive approach -->
    <g transform="translate(50, 180)">
        <rect x="0" y="0" width="700" height="60" class="box" fill="#3f1e1e" stroke="#ef4444" stroke-width="2" />
        <text x="350" y="20" class="box-title" style="fill: #fca5a5;">❌ Enfoque ingenuo: cargar todo por adelantado</text>
        <text x="350" y="40" class="box-text">Todos los documentos + toda la memoria + todos los ejemplos = 100K+ tokens = degradación del rendimiento + costes adicionales</text>
    </g>

    <!-- Insight -->
    <rect x="150" y="255" width="500" height="30" rx="6" ry="6" fill="#1e293b" stroke="#475569" />
    <text x="400" y="275" class="box-text" style="fill: #86efac;">Clave: Mantener identificadores ligeros y cargar datos dinámicamente cuando sea necesario</text>
</svg>
