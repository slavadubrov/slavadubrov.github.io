<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Compresión de contexto consciente de pérdida con índices canónicos separados para el estado y los artefactos</title>
  <desc id="desc">La conversación y las observaciones se resumen en un conjunto de trabajo compacto, mientras que el estado canónico de la tarea, las referencias de evidencia y el historial de artefactos se almacenan por separado para una recuperación precisa.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="440" rx="22" fill="#0f172a" /><text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Comprimir el texto; conservar el estado recuperable</text>
  <g font-family="Inter, system-ui, sans-serif"><g transform="translate(35 105)"><rect width="260" height="230" rx="16" fill="#1e293b" stroke="#64748b" /><text x="130" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#e2e8f0">Contexto en expansión</text><text x="30" y="83" font-size="13" fill="#cbd5e1">turnos de conversación</text><text x="30" y="116" font-size="13" fill="#cbd5e1">observaciones brutas de la herramienta</text><text x="30" y="149" font-size="13" fill="#cbd5e1">pasajes recuperados</text><text x="30" y="182" font-size="13" fill="#cbd5e1">plantilla repetida</text></g><text x="325" y="225" font-size="25" fill="#94a3b8">→</text>
  <g transform="translate(365 105)"><rect width="270" height="230" rx="16" fill="#1d4ed8" stroke="#2563eb" /><text x="135" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#93c5fd">conjunto de trabajo compacto</text><text x="30" y="83" font-size="13" fill="#93c5fd">decisiones + acción siguiente</text><text x="30" y="116" font-size="13" fill="#93c5fd">resultados de herramientas de análisis de texto</text><text x="30" y="149" font-size="13" fill="#93c5fd">referencias de fuente y artefacto</text><text x="30" y="182" font-size="13" fill="#93c5fd">preguntas sin resolver</text></g><text x="665" y="225" font-size="25" fill="#94a3b8">+</text>
  <g transform="translate(705 85)"><rect width="260" height="270" rx="16" fill="#1d4ed8" stroke="#2563eb" /><text x="130" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#93c5fd">Almacenes canónicos</text><text x="30" y="83" font-size="13" fill="#93c5fd">estado de tarea</text><text x="30" y="116" font-size="13" fill="#93c5fd">índice de archivos y artefactos</text><text x="30" y="149" font-size="13" fill="#93c5fd">completo tool results</text><text x="30" y="182" font-size="13" fill="#93c5fd">versiones de evidencia</text><text x="30" y="225" font-size="12" fill="#93c5fd">Volver a obtener los detalles exactos</text><text x="30" y="247" font-size="12" fill="#93c5fd">cuando la tarea los requiera.</text></g><text x="500" y="400" text-anchor="middle" font-size="13" fill="#94a3b8">Optimizar el número total de tokens por tarea completada con éxito, incluyendo las operaciones de recuperación y recobro de datos.</text></g>
</svg>
