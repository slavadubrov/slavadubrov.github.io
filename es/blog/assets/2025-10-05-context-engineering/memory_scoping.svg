<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Memoria seleccionada según el inquilino, finalidad, frescura y relevancia</title>
  <desc id="desc">Los candidatos a almacenamiento en memoria superan las verificaciones de ámbito de sujeto e inquilino, propósito, frescura y relevancia. Solo los registros seleccionados ingresan al contexto; los rechazados permanecen fuera.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="420" rx="22" fill="#0f172a" /><text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">La recuperación de memoria es una decisión basada en políticas</text>
  <g font-family="Inter, system-ui, sans-serif"><g transform="translate(40 110)"><rect width="220" height="210" rx="16" fill="#1e293b" stroke="#64748b" /><text x="110" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#e2e8f0">Almacén de memoria</text><text x="28" y="82" font-size="13" fill="#cbd5e1">hechos explícitos del usuario</text><text x="28" y="112" font-size="13" fill="#cbd5e1">hipótesis inferidas</text><text x="28" y="142" font-size="13" fill="#cbd5e1">registros episódicos</text><text x="28" y="172" font-size="13" fill="#cbd5e1">procedencia + ciclo de vida</text></g><text x="290" y="225" font-size="25" fill="#94a3b8">→</text>
  <g transform="translate(330 95)"><rect width="330" height="240" rx="16" fill="#5b21b6" stroke="#2563eb" /><text x="165" y="38" text-anchor="middle" font-size="17" font-weight="700" fill="#c4b5fd">puertas de selección</text><text x="35" y="82" font-size="13" fill="#93c5fd">1. sujeto autenticado + arrendatario</text><text x="35" y="116" font-size="13" fill="#93c5fd">2. finalidad permitida</text><text x="35" y="150" font-size="13" fill="#93c5fd">3. estado de frescura y de revisión</text><text x="35" y="184" font-size="13" fill="#93c5fd">4. relevancia y autoridad</text><text x="35" y="218" font-size="12" fill="#fca5a5">Sin puerta de control → sin inclusión de contexto</text></g><text x="690" y="225" font-size="25" fill="#94a3b8">→</text>
  <g transform="translate(730 110)"><rect width="230" height="210" rx="16" fill="#1d4ed8" stroke="#2563eb" /><text x="115" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#93c5fd">Conjunto de trabajo seleccionado</text><text x="30" y="84" font-size="13" fill="#93c5fd">hechos útiles mínimos</text><text x="30" y="116" font-size="13" fill="#93c5fd">fuente preservada</text><text x="30" y="148" font-size="13" fill="#93c5fd">fecha de vencimiento conservada</text><text x="30" y="180" font-size="13" fill="#93c5fd">la eliminación sigue siendo posible</text></g><text x="500" y="382" text-anchor="middle" font-size="13" fill="#94a3b8">Las memorias inferidas por el modelo siguen siendo hipótesis hasta que una fuente fiable las confirma.</text></g>
</svg>
