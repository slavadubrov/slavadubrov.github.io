<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Migración con verificación previa a pyproject.toml</title>
  <desc id="desc">El flujo de migración va desde el inventario y la clasificación hasta la asignación de derechos de codificación, la creación de artefactos, la prueba de una instalación limpia, y solo entonces se retiran los archivos antiguos. Una flecha de retroalimentación devuelve los fallos a la fase de clasificación.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#64748b" /></marker></defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="650" rx="28" fill="#0f172a" />
  <text x="600" y="68" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Migrar el comportamiento y, a continuación, retirar los archivos</text>
  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <g transform="translate(45 180)"><rect width="190" height="145" rx="18" fill="#1d4ed8" /><text x="95" y="48" fill="#93c5fd" font-size="20" font-weight="700">1. Inventario</text><text x="95" y="82" fill="#93c5fd" font-size="14">construcción • metadatos</text><text x="95" y="106" fill="#93c5fd" font-size="14">dependencias • datos • herramientas</text></g>
    <path d="M245 252 H275" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
    <g transform="translate(285 180)"><rect width="190" height="145" rx="18" fill="#5b21b6" /><text x="95" y="48" fill="#93c5fd" font-size="20" font-weight="700">2. Clasificar</text><text x="95" y="82" fill="#93c5fd" font-size="14">¿publicado o local?</text><text x="95" y="106" fill="#c4b5fd" font-size="14">¿Estático o dinámico?</text></g>
    <path d="M485 252 H515" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
    <g transform="translate(525 180)"><rect width="190" height="145" rx="18" fill="#9a3412" /><text x="95" y="48" fill="#fdba74" font-size="20" font-weight="700">3. Codificar</text><text x="95" y="82" fill="#fdba74" font-size="14">seleccionar propietarios</text><text x="95" y="106" fill="#fdba74" font-size="14">preservar la semántica</text></g>
    <path d="M725 252 H755" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
    <g transform="translate(765 180)"><rect width="190" height="145" rx="18" fill="#1d4ed8" /><text x="95" y="48" fill="#93c5fd" font-size="20" font-weight="700">4. Verificar</text><text x="95" y="82" fill="#93c5fd" font-size="14">inspeccionar sdist + wheel</text><text x="95" y="106" fill="#93c5fd" font-size="14">instalación limpia + despliegue</text></g>
    <path d="M965 252 H995" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
    <g transform="translate(1005 180)"><rect width="150" height="145" rx="18" fill="#166534" /><text x="75" y="48" fill="#93c5fd" font-size="20" font-weight="700">5. Retirar</text><text x="75" y="82" fill="#93c5fd" font-size="14">eliminar únicamente</text><text x="75" y="106" fill="#93c5fd" font-size="14">duplicados verificados</text></g>

    <path d="M860 340 V438 H380 V340" stroke="#dc2626" stroke-width="3" fill="none" marker-end="url(#arrow)" />
    <rect x="385" y="405" width="470" height="70" rx="16" fill="#991b1b" />
    <text x="620" y="433" fill="#fca5a5" font-size="17" font-weight="700">¿Diferen el artefacto o el comportamiento?</text>
    <text x="620" y="458" fill="#fca5a5" font-size="14">Volver a la propiedad y la semántica.</text>

    <rect x="205" y="520" width="790" height="78" rx="18" fill="#1e293b" />
    <text x="600" y="553" fill="#e2e8f0" font-size="18" font-weight="700">criterio de éxito</text>
    <text x="600" y="579" fill="#94a3b8" font-size="15">El artefacto generado y la ruta de despliegue se comportan de manera idéntica desde un entorno limpio.</text>
  </g>
</svg>
