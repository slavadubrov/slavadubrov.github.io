<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Cuatro límites de propiedad en pyproject.toml</title>
  <desc id="desc">Cuatro tipos de tarjetas definen el sistema de compilación para la compilación de backend, el proyecto para los metadatos publicados, los grupos de dependencias para entornos no publicados, y los espacios de nombres de herramientas para configuraciones específicas de cada herramienta.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="650" rx="28" fill="#0f172a" />
  <text x="600" y="68" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="31" font-weight="700">Un archivo, cuatro propietarios</text>
  <text x="600" y="104" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="17">Clasificar una configuración según su consumidor antes de seleccionar una tabla</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(70 155)"><rect width="500" height="185" rx="20" fill="#1d4ed8" /><text x="30" y="48" fill="#93c5fd" font-size="23" font-weight="700">[sistema-de-construcción]</text><text x="30" y="88" fill="#93c5fd" font-size="18">Propietario: construir frontend y backend</text><text x="30" y="124" fill="#93c5fd" font-size="16">backend identidad • requisitos de compilación aislados</text><text x="30" y="154" fill="#93c5fd" font-size="16">árbol de fuentes → sdist y wheel</text></g>
    <g transform="translate(630 155)"><rect width="500" height="185" rx="20" fill="#5b21b6" /><text x="30" y="48" fill="#93c5fd" font-size="23" font-weight="700">[proyecto]</text><text x="30" y="88" fill="#93c5fd" font-size="18">Propietario: consumidores del paquete</text><text x="30" y="124" fill="#c4b5fd" font-size="16">identidad • requisitos de runtime • elementos adicionales</text><text x="30" y="154" fill="#c4b5fd" font-size="16">publicado como metadatos de distribución</text></g>
    <g transform="translate(70 385)"><rect width="500" height="185" rx="20" fill="#166534" /><text x="30" y="48" fill="#93c5fd" font-size="23" font-weight="700">[grupos-de-dependencia]</text><text x="30" y="88" fill="#93c5fd" font-size="18">Propietario: flujo de trabajo local</text><text x="30" y="124" fill="#93c5fd" font-size="16">prueba • análisis de código • documentación • entornos no basados en paquetes</text><text x="30" y="154" fill="#93c5fd" font-size="16">no publicado en la metadatos del paquete</text></g>
    <g transform="translate(630 385)"><rect width="500" height="185" rx="20" fill="#9a3412" /><text x="30" y="48" fill="#fdba74" font-size="23" font-weight="700">[tool.*]</text><text x="30" y="88" fill="#fdba74" font-size="18">Propietario: la herramienta designada</text><text x="30" y="124" fill="#fdba74" font-size="16">claves y semántica definidas por la herramienta</text><text x="30" y="154" fill="#fdba74" font-size="16">no hay esquema compartido entre nombres de espacio</text></g>
  </g>
</svg>
