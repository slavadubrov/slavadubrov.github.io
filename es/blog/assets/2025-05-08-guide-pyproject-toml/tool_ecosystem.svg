<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">pyproject.toml</title>
  <desc id="artifact-desc">pyproject.toml.</desc>
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .center-node { fill: #dc2626; stroke: #7c3aed; stroke-width: 3; rx: 50; }
      .tool-node { fill: #1d4ed8; stroke: #2563eb; stroke-width: 2; rx: 10; }
      .text-center { fill: #1d4ed8; font-family: Inter, system-ui, sans-serif; font-size: 20px; font-weight: bold; text-anchor: middle; }
      .text-tool { fill: #86efac; font-family: Inter, system-ui, sans-serif; font-size: 16px; font-weight: bold; text-anchor: middle; }
      .text-desc { fill: #93c5fd; font-family: Inter, system-ui, sans-serif; font-size: 12px; text-anchor: middle; }
      .connector { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 5,5; }
    </style>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="600" height="500" class="bg" rx="15" />

  <!-- Center -->
  <circle cx="300" cy="250" r="70" class="center-node" />
  <text y="255" class="text-center" x="300">pyproject.toml</text>

  <!-- Connectors -->
  <line x1="300" y1="180" x2="300" y2="100" class="connector" /> <!-- Top -->
  <line x1="300" y1="320" x2="300" y2="400" class="connector" /> <!-- Bottom -->
  <line x1="230" y1="250" x2="150" y2="250" class="connector" /> <!-- Left -->
  <line x1="370" y1="250" x2="450" y2="250" class="connector" /> <!-- Right -->
  <line x1="250" y1="200" x2="180" y2="130" class="connector" /> <!-- Top Left -->
  <line x1="350" y1="200" x2="420" y2="130" class="connector" /> <!-- Top Right -->

  <!-- Tools -->

  <!-- Top: Build Tools -->
  <g transform="translate(240, 40)">
    <rect width="120" height="60" class="tool-node" stroke="#2563eb" />
    <text y="25" class="text-tool" fill="#93c5fd" x="60">Herramientas de compilación</text>
    <text y="45" class="text-desc" x="60">Trazado de sombreado, Setuptools</text>
  </g>

  <!-- Bottom: Package Managers -->
  <g transform="translate(240, 400)">
    <rect width="120" height="60" class="tool-node" stroke="#ea580c" />
    <text y="25" class="text-tool" fill="#fdba74" x="60">Administradores</text>
    <text y="45" class="text-desc" x="60">UV, poesía, PDM</text>
  </g>

  <!-- Left: Testing -->
  <g transform="translate(30, 220)">
    <rect width="120" height="60" class="tool-node" stroke="#16a34a" />
    <text y="25" class="text-tool" fill="#86efac" x="60">Pruebas</text>
    <text y="45" class="text-desc" x="60">pytest, cobertura de pruebas</text>
  </g>

  <!-- Right: Formatting -->
  <g transform="translate(450, 220)">
    <rect width="120" height="60" class="tool-node" stroke="#dc2626" />
    <text y="25" class="text-tool" fill="#fca5a5" x="60">Formateo</text>
    <text y="45" class="text-desc" x="60">Negro, Ruff</text>
  </g>

  <!-- Top Left: Typing -->
  <g transform="translate(60, 70)">
    <rect width="120" height="60" class="tool-node" stroke="#16a34a" />
    <text y="25" class="text-tool" fill="#86efac" x="60">Tipado</text>
    <text y="45" class="text-desc" x="60">MyPy, Pyright</text>
  </g>

  <!-- Top Right: Linting -->
  <g transform="translate(420, 70)">
    <rect width="120" height="60" class="tool-node" stroke="#7c3aed" />
    <text y="25" class="text-tool" fill="#c4b5fd" x="60">Analizador de errores</text>
    <text y="45" class="text-desc" x="60">Ruff, Flake8</text>
  </g>

</svg>
