<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Arquitectura REPL de planificación-ejecución</title>
  <desc id="artifact-desc">Arquitectura REPL de planificación-ejecución.</desc>
  <defs>
    <linearGradient id="bgGrad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #334155;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="planGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="codeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="runGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #166534;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="decideGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #ea580c;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #ea580c;stop-opacity:1" />
    </linearGradient>
    <filter id="glow5" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <marker id="arrow5" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
    <marker id="arrowLoop" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="900" height="380" fill="#0f172a" rx="16" />

  <!-- Title -->
  <text y="40" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" x="450">Arquitectura REPL de planificación-ejecución</text>

  <!-- Step 1: Planner -->
  <rect x="50" y="100" width="160" height="130" rx="12" fill="url(#planGrad)" />
  <text y="130" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" x="130">Planificador</text>
  <line x1="70" y1="145" x2="190" y2="145" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
  <text y="168" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11" x="130">Crear paso de alto nivel</text>
  <text y="186" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11" x="130">Definir objetivos</text>
  <text y="210" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="Inter, system-ui, sans-serif" font-size="10" font-style="italic" x="130">gpt-5.1</text>

  <!-- Step 2: Code Generator -->
  <rect x="260" y="100" width="160" height="130" rx="12" fill="url(#codeGrad)" />
  <text y="130" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" x="340">Generador de código</text>
  <line x1="280" y1="145" x2="400" y2="145" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
  <text y="168" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11" x="340">Escribir script en Python</text>
  <text y="186" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11" x="340">Llamadas a API y lógica</text>
  <text y="210" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="Inter, system-ui, sans-serif" font-size="10" font-style="italic" x="340">deepseek-v3.2</text>

  <!-- Step 3: Executor -->
  <rect x="470" y="100" width="160" height="130" rx="12" fill="url(#runGrad)" />
  <text y="130" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" x="550">Ejecutor</text>
  <line x1="490" y1="145" x2="610" y2="145" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
  <text y="168" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11" x="550">Ejecutar en entorno aislado</text>
  <text y="186" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11" x="550">Obtener resultados</text>
  <text y="210" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="Inter, system-ui, sans-serif" font-size="10" font-style="italic" x="550">Entorno de ejecución de Python</text>

  <!-- Step 4: Decision -->
  <rect x="680" y="100" width="170" height="130" rx="12" fill="url(#decideGrad)" />
  <text y="130" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" x="765">Modelo de decisión</text>
  <line x1="700" y1="145" x2="830" y2="145" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
  <text y="168" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11" x="765">Analizar resultados</text>
  <text y="186" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11" x="765">Continuar / Abortar / Replanificar</text>
  <text y="210" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="Inter, system-ui, sans-serif" font-size="10" font-style="italic" x="765">gpt-4.1</text>

  <!-- Forward arrows -->
  <line x1="210" y1="165" x2="255" y2="165" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow5)" />
  <line x1="420" y1="165" x2="465" y2="165" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow5)" />
  <line x1="630" y1="165" x2="675" y2="165" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow5)" />

  <!-- REPL loop arrow -->
  <path d="M 765 230 L 765 290 L 130 290 L 130 235" stroke="#ea580c" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowLoop)" />
  <text y="310" text-anchor="middle" fill="#ea580c" font-family="Inter, system-ui, sans-serif" font-size="11" x="450">Replanificación en caso de fallo</text>

  <!-- Stage Labels -->
  <text y="255" text-anchor="middle" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" x="130">Paso 1</text>
  <text y="255" text-anchor="middle" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" x="340">Paso 2</text>
  <text y="255" text-anchor="middle" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" x="550">Paso 3</text>
  <text y="255" text-anchor="middle" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" x="765">Paso 4</text>

  <!-- Bottom note -->
  <rect x="250" y="330" width="400" height="35" rx="8" fill="rgba(245, 158, 11, 0.15)" stroke="#ea580c" stroke-width="1" />
  <text y="352" text-anchor="middle" fill="#ea580c" font-family="Inter, system-ui, sans-serif" font-size="12" x="450">Diferentes modelos para distintas capacidades</text>
</svg>
