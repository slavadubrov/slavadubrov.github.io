<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="Evolutionary Prompt Engineering Pipeline" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title>Evoluciónarial prompt engineering pipeline</title>
  <desc>Un agente principal genera registros de actividad, un analizador diagnostica las tareas fallidas, y un gestor de versiones modifica la versión prompt antes de ejecutar la siguiente evaluación.</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #334155;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="analyzerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #ea580c;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #ea580c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="versionerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #2563eb;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="16" />

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600">Evoluciónary Prompt Engineering Pipeline</text>

  <!-- Main Agent Box -->
  <rect x="60" y="120" width="200" height="100" rx="12" fill="url(#mainGrad)" />
  <text x="160" y="160" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600">Agente principal</text>
  <text x="160" y="185" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Inter, system-ui, sans-serif" font-size="12">Ejecutar benchmark</text>
  <text x="160" y="202" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Inter, system-ui, sans-serif" font-size="12">Registrar todas las acciones</text>

  <!-- Analyzer Agent Box -->
  <rect x="300" y="120" width="200" height="100" rx="12" fill="url(#analyzerGrad)" />
  <text x="400" y="160" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600">Agente analizador</text>
  <text x="400" y="185" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Inter, system-ui, sans-serif" font-size="12">Revisar tareas fallidas</text>
  <text x="400" y="202" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Inter, system-ui, sans-serif" font-size="12">Formular hipótesis</text>

  <!-- Versioner Agent Box -->
  <rect x="540" y="120" width="200" height="100" rx="12" fill="url(#versionerGrad)" />
  <text x="640" y="160" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600">Agente de versionado</text>
  <text x="640" y="185" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Inter, system-ui, sans-serif" font-size="12">Generar nuevos prompt</text>
  <text x="640" y="202" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Inter, system-ui, sans-serif" font-size="12">Integrar los conocimientos adquiridos</text>

  <!-- Arrows -->
  <defs>
    <marker id="arrowWhite" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>

  <!-- Main to Analyzer -->
  <line x1="260" y1="155" x2="295" y2="155" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowWhite)" />
  <text x="277" y="145" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10">Registros</text>

  <!-- Analyzer to Versioner -->
  <line x1="500" y1="155" x2="535" y2="155" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowWhite)" />
  <text x="517" y="145" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10">Correcciones</text>

  <!-- Feedback Loop Arrow -->
  <path d="M 640 220 L 640 300 Q 640 320, 620 320 L 180 320 Q 160 320, 160 300 L 160 225" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arrowWhite)" />
  <text x="400" y="345" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="12">Mejora de System Prompt (de v1 a v80)</text>

  <!-- Generation Counter -->
  <rect x="320" y="270" width="160" height="36" rx="18" fill="rgba(99, 102, 241, 0.2)" stroke="#2563eb" stroke-width="1" />
  <text x="400" y="293" text-anchor="middle" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">Versión 80ª Prompt</text>
</svg>
