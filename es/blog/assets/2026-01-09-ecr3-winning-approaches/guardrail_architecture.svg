<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 400" role="img" aria-label="Guardrail Architecture" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title>Restricciones en los tres límites de fallo</title>
  <desc>Las compuertas de pre-ejecución verifican la identidad y los permisos, los validadores dentro del bucle examinan las acciones propuestas, y las guardias de post-ejecución analizan la respuesta antes de su envío.</desc>
  <defs>
    <linearGradient id="bgGrad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #334155;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="preGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #dc2626;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="inloopGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #ea580c;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #ea580c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="postGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #166534;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #2563eb;stop-opacity:1" />
    </linearGradient>
    <filter id="glow5" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <marker id="arrow5" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="850" height="400" fill="#0f172a" rx="16" />

  <!-- Title -->
  <text x="425" y="40" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600">Restricciones en los tres límites de fallo</text>
  <text x="425" y="62" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="13">Diferentes verificaciones abordan riesgos distintos en la ruta de ejecución</text>

  <!-- Timeline bar -->
  <rect x="60" y="115" width="730" height="6" rx="3" fill="#1e293b" />

  <!-- Pre-Execution Gate -->
  <rect x="80" y="150" width="200" height="130" rx="12" fill="url(#preGrad)" />
  <circle cx="180" cy="118" r="12" fill="#dc2626" stroke="#334155" stroke-width="3" />
  <text x="180" y="123" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">1</text>
  <text x="180" y="180" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600">Compuerta de Pre-ejecución</text>
  <line x1="100" y1="195" x2="260" y2="195" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
  <text x="180" y="218" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11">Agente de Puerta de Seguridad</text>
  <text x="180" y="238" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11">Validar permisos</text>
  <text x="180" y="258" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11">Bloqueo en origen</text>

  <!-- In-Loop Validator -->
  <rect x="325" y="150" width="200" height="130" rx="12" fill="url(#inloopGrad)" />
  <circle cx="425" cy="118" r="12" fill="#ea580c" stroke="#334155" stroke-width="3" />
  <text x="425" y="123" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">2</text>
  <text x="425" y="180" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600">Validador en bucle</text>
  <line x1="345" y1="195" x2="505" y2="195" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
  <text x="425" y="218" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11">ValidadorDePasos</text>
  <text x="425" y="238" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11">Revisar cada acción</text>
  <text x="425" y="258" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11">Activar ciclo de reparación</text>

  <!-- Post-Execution Guard -->
  <rect x="570" y="150" width="200" height="130" rx="12" fill="url(#postGrad)" />
  <circle cx="670" cy="118" r="12" fill="#16a34a" stroke="#334155" stroke-width="3" />
  <text x="670" y="123" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">3</text>
  <text x="670" y="180" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600">Guardia post-ejecución</text>
  <line x1="590" y1="195" x2="750" y2="195" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
  <text x="670" y="218" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11">Sistema de tres modos:</text>
  <text x="670" y="238" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11">Bloque rígido / Bloque flexible</text>
  <text x="670" y="258" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11">sugerencia suave</text>

  <!-- Arrows on timeline -->
  <line x1="280" y1="118" x2="313" y2="118" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow5)" />
  <line x1="525" y1="118" x2="558" y2="118" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow5)" />

  <!-- Bottom: Key Insight -->
  <rect x="180" y="310" width="490" height="60" rx="10" fill="rgba(99, 102, 241, 0.12)" stroke="#2563eb" stroke-width="1" />
  <text x="425" y="338" text-anchor="middle" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">Coloca cada marca de verificación cerca del fallo que puede prevenir</text>
  <text x="425" y="358" text-anchor="middle" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="11">Las verificaciones de identidad, acción y respuesta abarcan diversos riesgos operativos</text>
</svg>
