<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 400" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">El paradoja de la autonomía: barreras inteligentes</title>
  <desc id="artifact-desc">El paradoja de la autonomía: barreras inteligentes.</desc>
  <defs>
    <linearGradient id="bgGrad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #334155;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="preGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #dc2626;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="inloopGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #ea580c;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #ea580c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="postGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #166534;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #2563eb;stop-opacity:1" />
    </linearGradient>
    <filter id="glow5" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <marker id="arrow5" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="850" height="400" fill="#0f172a" rx="16" />

  <!-- Title -->
  <text y="40" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" x="425">El paradoja de la autonomía: barreras inteligentes</text>
  <text y="62" text-anchor="middle" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="13" x="425">"Los agentes autónomos más exitosos fueron aquellos a los que se impusieron restricciones de forma más efectiva."</text>

  <!-- Timeline bar -->
  <rect x="60" y="115" width="730" height="6" rx="3" fill="#1e293b" />

  <!-- Pre-Execution Gate -->
  <rect x="80" y="150" width="200" height="130" rx="12" fill="url(#preGrad)" />
  <circle cx="180" cy="118" r="12" fill="#dc2626" stroke="#334155" stroke-width="3" />
  <text y="123" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" x="180">1</text>
  <text y="180" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" x="180">Comprobador de ejecución previa</text>
  <line x1="100" y1="195" x2="260" y2="195" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
  <text y="218" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11" x="180">Agente de puerta de seguridad</text>
  <text y="238" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11" x="180">Validar permisos</text>
  <text y="258" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11" x="180">Bloqueo en origen</text>

  <!-- In-Loop Validator -->
  <rect x="325" y="150" width="200" height="130" rx="12" fill="url(#inloopGrad)" />
  <circle cx="425" cy="118" r="12" fill="#ea580c" stroke="#334155" stroke-width="3" />
  <text y="123" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" x="425">2</text>
  <text y="180" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" x="425">Validador en bucle</text>
  <line x1="345" y1="195" x2="505" y2="195" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
  <text y="218" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11" x="425">Validador de pasos</text>
  <text y="238" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11" x="425">Revisar cada acción</text>
  <text y="258" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11" x="425">Activar ciclo de reparación</text>

  <!-- Post-Execution Guard -->
  <rect x="570" y="150" width="200" height="130" rx="12" fill="url(#postGrad)" />
  <circle cx="670" cy="118" r="12" fill="#16a34a" stroke="#334155" stroke-width="3" />
  <text y="123" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" x="670">3</text>
  <text y="180" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" x="670">Protección post-ejecución</text>
  <line x1="590" y1="195" x2="750" y2="195" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
  <text y="218" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11" x="670">Sistema de tres modos:</text>
  <text y="238" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11" x="670">Bloque rígido / Bloque blando</text>
  <text y="258" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11" x="670">Sugerencia suave</text>

  <!-- Arrows on timeline -->
  <line x1="280" y1="118" x2="313" y2="118" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow5)" />
  <line x1="525" y1="118" x2="558" y2="118" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow5)" />

  <!-- Bottom: Key Insight -->
  <rect x="180" y="310" width="490" height="60" rx="10" fill="rgba(99, 102, 241, 0.12)" stroke="#2563eb" stroke-width="1" />
  <text y="338" text-anchor="middle" fill="#2563eb" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" x="425">Conclusión clave: las restricciones permiten la autonomía</text>
  <text y="358" text-anchor="middle" fill="#2563eb" font-family="Inter, system-ui, sans-serif" font-size="11" x="425">Seguridad, cumplimiento y fiabilidad mediante restricciones inteligentes, no libertad</text>
</svg>
