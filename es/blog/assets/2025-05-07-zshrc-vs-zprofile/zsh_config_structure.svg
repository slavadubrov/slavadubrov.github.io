<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Archivos de inicio de Zsh seleccionados según los modos de inicio de sesión e interactivo</title>
  <desc id="desc">Una matriz de dos por dos muestra los shells interactivos de inicio de sesión que leen zshenv, zprofile, zshrc y zlogin; los shells no interactivos de inicio de sesión que leen zshenv, zprofile y zlogin; los shells interactivos sin inicio de sesión que leen zshenv y zshrc; y los shells no interactivos sin inicio de sesión que solo leen zshenv.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="700" rx="28" fill="#0f172a" />
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Dos banderas para seleccionar los archivos de inicio</text>
  <text x="600" y="98" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="17">El inicio de sesión y la interactividad son propiedades independientes</text>
  <g font-family="Inter, system-ui, sans-serif">
    <text x="420" y="145" text-anchor="middle" fill="#93c5fd" font-size="20" font-weight="700">Interactivo</text>
    <text x="900" y="145" text-anchor="middle" fill="#94a3b8" font-size="20" font-weight="700">No interactivo</text>
    <text x="82" y="300" text-anchor="middle" fill="#c4b5fd" font-size="20" font-weight="700" transform="rotate(-90 82 300)">Autenticación</text>
    <text x="82" y="560" text-anchor="middle" fill="#94a3b8" font-size="20" font-weight="700" transform="rotate(-90 82 560)">Sin inicio de sesión</text>

    <g transform="translate(155 175)"><rect width="530" height="215" rx="20" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="30" y="44" fill="#93c5fd" font-size="22" font-weight="700">Autenticación + interactividad</text><text x="30" y="83" fill="#93c5fd" font-size="17">Pestaña típica de la Terminal de Apple</text><text x="30" y="132" fill="#e2e8f0" font-size="19">.zshenv → .zprofile → .zshrc → .zlogin</text><text x="30" y="172" fill="#94a3b8" font-size="15">tanto el inicio de sesión como la configuración interactiva</text></g>
    <g transform="translate(715 175)"><rect width="410" height="215" rx="20" fill="#5b21b6" /><text x="30" y="44" fill="#93c5fd" font-size="22" font-weight="700">Autenticación + no interactivo</text><text x="30" y="83" fill="#c4b5fd" font-size="17">zsh -lc 'comando'</text><text x="30" y="132" fill="#e2e8f0" font-size="18">.zshenv → .zprofile → .zlogin</text><text x="30" y="172" fill="#94a3b8" font-size="15">sin .zshrc</text></g>
    <g transform="translate(155 425)"><rect width="530" height="215" rx="20" fill="#166534" /><text x="30" y="44" fill="#93c5fd" font-size="22" font-weight="700">Sin inicio de sesión + interactivo</text><text x="30" y="83" fill="#93c5fd" font-size="17">Configuración anidada de zsh o terminal</text><text x="30" y="132" fill="#e2e8f0" font-size="19">.zshenv → .zshrc</text><text x="30" y="172" fill="#94a3b8" font-size="15">sin .zprofile</text></g>
    <g transform="translate(715 425)"><rect width="410" height="215" rx="20" fill="#1e293b" /><text x="30" y="44" fill="#cbd5e1" font-size="22" font-weight="700">Ni</text><text x="30" y="83" fill="#94a3b8" font-size="17">zsh -c 'comando'</text><text x="30" y="132" fill="#e2e8f0" font-size="19">.zshenv</text><text x="30" y="172" fill="#94a3b8" font-size="15">mantenerlo en silencio y con un mínimo de elementos</text></g>
  </g>
</svg>
