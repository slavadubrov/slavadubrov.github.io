<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">el término producto modelado de manera distinta en contextos delimitados</title>
  <desc id="desc">La gestión de pedidos, la facturación y el inventario definen cada uno el producto según sus propias reglas. Un contrato de traducción publicado mapea los términos e identificadores entre ellos.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="470" rx="22" fill="#0f172a" />
  <text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Una palabra con tres significados delimitados</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(35 105)"><rect width="270" height="220" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="135" y="42" text-anchor="middle" font-size="18" font-weight="700" fill="#93c5fd">Gestión de pedidos</text><text x="135" y="90" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Producto = línea de pedido</text><text x="35" y="130" font-size="13" fill="#cbd5e1">cantidad</text><text x="35" y="158" font-size="13" fill="#cbd5e1">promesa de entrega</text><text x="35" y="186" font-size="13" fill="#cbd5e1">estado de cumplimiento</text></g>
    <g transform="translate(365 105)"><rect width="270" height="220" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="135" y="42" text-anchor="middle" font-size="18" font-weight="700" fill="#93c5fd">Facturación</text><text x="135" y="90" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Producto = línea con precio</text><text x="35" y="130" font-size="13" fill="#cbd5e1">categoría fiscal</text><text x="35" y="158" font-size="13" fill="#cbd5e1">calidad para beneficio de descuento</text><text x="35" y="186" font-size="13" fill="#cbd5e1">importe de liquidación</text></g>
    <g transform="translate(695 105)"><rect width="270" height="220" rx="16" fill="#9a3412" stroke="#ea580c" stroke-width="2" /><text x="135" y="42" text-anchor="middle" font-size="18" font-weight="700" fill="#fdba74">Inventario</text><text x="135" y="90" text-anchor="middle" font-size="16" font-weight="700" fill="#fdba74">Producto = artículo del inventario</text><text x="35" y="130" font-size="13" fill="#cbd5e1">SKU</text><text x="35" y="158" font-size="13" fill="#cbd5e1">ubicación del almacén</text><text x="35" y="186" font-size="13" fill="#cbd5e1">cantidad disponible</text></g>
    <rect x="180" y="370" width="640" height="60" rx="12" fill="#5b21b6" stroke="#2563eb" />
    <text x="500" y="395" text-anchor="middle" font-size="15" font-weight="700" fill="#c4b5fd">Contrato de traducción publicado</text>
    <text x="500" y="418" text-anchor="middle" font-size="12" fill="#93c5fd">Mapea identificadores y términos sin imponer la existencia de un único objeto Product compartido</text>
  </g>
</svg>
