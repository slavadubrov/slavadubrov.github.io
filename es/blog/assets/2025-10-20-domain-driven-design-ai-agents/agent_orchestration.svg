<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Orquestador de Investigación</title>
  <desc id="artifact-desc">Orquestador de Investigación.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#334155" flood-opacity="0.08" />
    </filter>
    <linearGradient id="grad-orch" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #93c5fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #93c5fd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-agent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #e2e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #e2e8f0;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>


  <rect width="100%" height="100%" fill="#f8fafc" /><g transform="translate(250, 30)" filter="url(#shadow)">
    <rect width="300" height="120" rx="16" fill="url(#grad-orch)" stroke="#2563eb" stroke-width="3" />
    <text y="50" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="bold" fill="#1d4ed8" text-anchor="middle" x="150">Orquestador de Investigación</text>
    <text y="80" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#1d4ed8" text-anchor="middle" x="150">Agente de coordinación</text>
  </g>


  <g transform="translate(30, 280)" filter="url(#shadow)">
    <rect width="220" height="140" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" />
    <text y="40" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="bold" fill="#166534" text-anchor="middle" x="110">Agente de tendencias</text>
    <line x1="20" y1="55" x2="200" y2="55" stroke="#16a34a" stroke-width="1" />
    <text y="80" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#334155" text-anchor="middle" x="110">Contexto: Datos de mercado</text>
    <text y="100" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#334155" text-anchor="middle" x="110">Tendencia, Volumen</text>

    <circle cx="110" cy="120" r="4" fill="#16a34a" />
  </g>


  <g transform="translate(290, 280)" filter="url(#shadow)">
    <rect width="220" height="140" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2" />
    <text y="40" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="bold" fill="#991b1b" text-anchor="middle" x="110">Agente de cumplimiento</text>
    <line x1="20" y1="55" x2="200" y2="55" stroke="#dc2626" stroke-width="1" />
    <text y="80" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#334155" text-anchor="middle" x="110">Contexto: Verificaciones de políticas</text>
    <text y="100" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#334155" text-anchor="middle" x="110">Riesgo, auditoría</text>
    <circle cx="110" cy="120" r="4" fill="#dc2626" />
  </g>


  <g transform="translate(550, 280)" filter="url(#shadow)">
    <rect width="220" height="140" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="2" />
    <text y="40" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="bold" fill="#9a3412" text-anchor="middle" x="110">Agente de costes</text>
    <line x1="20" y1="55" x2="200" y2="55" stroke="#ea580c" stroke-width="1" />
    <text y="80" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#334155" text-anchor="middle" x="110">Contexto: Estimación</text>
    <text y="100" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#334155" text-anchor="middle" x="110">Vocabulario: "Presupuesto", "Gastos operativos"</text>
    <circle cx="110" cy="120" r="4" fill="#ea580c" />
  </g>


  <path d="M 350 150 C 350 200, 140 200, 140 270" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowhead)" />
  <path d="M 400 150 L 400 270" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowhead)" />
  <path d="M 450 150 C 450 200, 660 200, 660 270" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowhead)" />

</svg>
