<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">La salida del modelo se traduce a un comando de dominio y se verifica mediante reglas deterministas</title>
  <desc id="desc">Un modelo emite una propuesta tipada no confiable. Un límite de aplicación la analiza y normaliza, autoriza al agente, invoca un agregado y guarda el estado aceptado mediante un evento de salida. Cada etapa rechazada devuelve un error distinto.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="480" rx="22" fill="#0f172a" />
  <text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Una propuesta redactada por escrito aún no constituye una operación empresarial válida</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(25 120)"><rect width="155" height="125" rx="14" fill="#5b21b6" stroke="#2563eb" stroke-width="2" /><text x="77" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#c4b5fd">adaptador de modelo</text><text x="77" y="70" text-anchor="middle" font-size="12" fill="#c4b5fd">Propuesta de adición de tarea</text><text x="77" y="94" text-anchor="middle" font-size="12" fill="#94a3b8">valores no fiables</text></g>
    <text x="202" y="192" text-anchor="middle" font-size="25" fill="#94a3b8">→</text>
    <g transform="translate(225 120)"><rect width="155" height="125" rx="14" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="77" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Analizar y normalizar</text><text x="77" y="70" text-anchor="middle" font-size="12" fill="#93c5fd">forma, fecha, unidades</text><text x="77" y="94" text-anchor="middle" font-size="12" fill="#94a3b8">contexto de confianza</text></g>
    <text x="402" y="192" text-anchor="middle" font-size="25" fill="#94a3b8">→</text>
    <g transform="translate(425 120)"><rect width="155" height="125" rx="14" fill="#9a3412" stroke="#ea580c" stroke-width="2" /><text x="77" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#fdba74">Autenticar</text><text x="77" y="70" text-anchor="middle" font-size="12" fill="#fdba74">actor + propietario</text><text x="77" y="94" text-anchor="middle" font-size="12" fill="#94a3b8">alcance de operación</text></g>
    <text x="602" y="192" text-anchor="middle" font-size="25" fill="#94a3b8">→</text>
    <g transform="translate(625 120)"><rect width="155" height="125" rx="14" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="77" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Agregar</text><text x="77" y="70" text-anchor="middle" font-size="12" fill="#93c5fd">aplicar invariante</text><text x="77" y="94" text-anchor="middle" font-size="12" fill="#94a3b8">generar evento de dominio</text></g>
    <text x="802" y="192" text-anchor="middle" font-size="25" fill="#94a3b8">→</text>
    <g transform="translate(825 120)"><rect width="150" height="125" rx="14" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="75" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Cometer</text><text x="75" y="70" text-anchor="middle" font-size="12" fill="#93c5fd">estado + bandeja de salida</text><text x="75" y="94" text-anchor="middle" font-size="12" fill="#94a3b8">una transacción</text></g>

    <rect x="100" y="320" width="800" height="85" rx="14" fill="#991b1b" stroke="#dc2626" />
    <text x="500" y="351" text-anchor="middle" font-size="16" font-weight="700" fill="#fca5a5">Rechazar con un error específico antes de persistir</text>
    <text x="500" y="382" text-anchor="middle" font-size="13" fill="#fca5a5">propuesta inválida • contexto faltante • agente no autorizado • conflicto de dominio • actualización concurrente</text>
    <text x="500" y="447" text-anchor="middle" font-size="13" fill="#94a3b8">La validación de esquemas controla la representación. Los controles agregados gestionan el significado empresarial.</text>
  </g>
</svg>
