<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 430" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Contextos de gestión de tareas, programación y notificaciones</title>
  <desc id="desc">La gestión de tareas constituye el dominio principal. Utiliza un contexto de programación como soporte y publica hechos que son consumidos por un contexto de notificaciones genérico a través de contratos explícitos.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="430" rx="22" fill="#0f172a" />
  <text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Mapa de contexto del asistente de tareas</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(35 120)"><rect width="250" height="190" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="125" y="42" text-anchor="middle" font-size="18" font-weight="700" fill="#93c5fd">Programación</text><text x="125" y="72" text-anchor="middle" font-size="13" fill="#93c5fd">subdominio de soporte</text><text x="32" y="116" font-size="13" fill="#cbd5e1">calendario</text><text x="32" y="145" font-size="13" fill="#cbd5e1">ventana de tiempo</text><text x="32" y="174" font-size="13" fill="#cbd5e1">disponibilidad</text></g>
    <text x="330" y="220" text-anchor="middle" font-size="11" fill="#94a3b8">fecha de contrato →</text>
    <g transform="translate(375 95)"><rect width="250" height="240" rx="16" fill="#9a3412" stroke="#ea580c" stroke-width="3" /><text x="125" y="46" text-anchor="middle" font-size="19" font-weight="700" fill="#fdba74">Gestión de tareas</text><text x="125" y="78" text-anchor="middle" font-size="13" fill="#fdba74">Dominio principal</text><text x="32" y="125" font-size="13" fill="#cbd5e1">tarea y lista de tareas</text><text x="32" y="156" font-size="13" fill="#cbd5e1">plazo límite y prioridad</text><text x="32" y="187" font-size="13" fill="#cbd5e1">reglas de completación</text><text x="32" y="218" font-size="13" fill="#cbd5e1">Evento TaskAdded</text></g>
    <text x="670" y="220" text-anchor="middle" font-size="11" fill="#94a3b8">contrato de eventos →</text>
    <g transform="translate(715 120)"><rect width="250" height="190" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="125" y="42" text-anchor="middle" font-size="18" font-weight="700" fill="#93c5fd">Notificaciones</text><text x="125" y="72" text-anchor="middle" font-size="13" fill="#93c5fd">subdominio genérico</text><text x="32" y="116" font-size="13" fill="#cbd5e1">entrega de correos electrónicos</text><text x="32" y="145" font-size="13" fill="#cbd5e1">entrega por empuje</text><text x="32" y="174" font-size="13" fill="#cbd5e1">acuse de recibo de entrega</text></g>
    <text x="500" y="390" text-anchor="middle" font-size="13" fill="#94a3b8">El mapa de contexto describe las relaciones empresariales; no establece que haya un agente por caja.</text>
  </g>
</svg>
