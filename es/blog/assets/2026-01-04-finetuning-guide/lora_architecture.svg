<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">LoRA: Arquitectura de Adaptación de Bajo Rango</title>
  <desc id="artifact-desc">LoRA: Arquitectura de Adaptación de Bajo Rango.</desc>
  <defs>
    <linearGradient id="frozenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #2563eb" />
      <stop offset="100%" style="stop-color: #2563eb" />
    </linearGradient>
    <linearGradient id="loraGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #ea580c" />
      <stop offset="100%" style="stop-color: #ea580c" />
    </linearGradient>
    <linearGradient id="outputGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #16a34a" />
      <stop offset="100%" style="stop-color: #16a34a" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="800" height="450" fill="#0f172a" />

  <!-- Title -->
  <text y="35" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="bold" x="400">LoRA: Arquitectura de Adaptación de Bajo Rango</text>

  <!-- Frozen Weight Matrix (Left) -->
  <rect x="50" y="100" width="180" height="250" rx="12" fill="#1e293b" stroke="#2563eb" stroke-width="3" filter="url(#shadow)" />
  <text y="135" text-anchor="middle" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="bold" x="140">🔒 Pesos congelados</text>
  <text y="160" text-anchor="middle" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="14" x="140">W₀</text>
  <text y="185" text-anchor="middle" fill="#334155" font-family="Inter, system-ui, sans-serif" font-size="12" x="140">matriz d × d</text>

  <!-- Grid representing frozen weights -->
  <g opacity="0.6">
    <rect x="70" y="210" width="140" height="120" rx="4" fill="#334155" />
    <line x1="105" y1="210" x2="105" y2="330" stroke="#94a3b8" stroke-width="1" />
    <line x1="140" y1="210" x2="140" y2="330" stroke="#94a3b8" stroke-width="1" />
    <line x1="175" y1="210" x2="175" y2="330" stroke="#94a3b8" stroke-width="1" />
    <line x1="70" y1="240" x2="210" y2="240" stroke="#94a3b8" stroke-width="1" />
    <line x1="70" y1="270" x2="210" y2="270" stroke="#94a3b8" stroke-width="1" />
    <line x1="70" y1="300" x2="210" y2="300" stroke="#94a3b8" stroke-width="1" />
  </g>
  <text y="370" text-anchor="middle" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="11" x="140" transform="translate(22.26 0.00)">Aproximadamente 7 mil millones de parámetros (congelados)</text>

  <!-- Plus sign -->
  <text y="230" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="bold" x="265">+</text>

  <!-- LoRA Adapters (Center) -->
  <g filter="url(#shadow)">
    <!-- Matrix A (down-projection) -->
    <rect x="310" y="120" width="60" height="130" rx="8" fill="#1e293b" stroke="#ea580c" stroke-width="2" />
    <text y="180" text-anchor="middle" fill="#fdba74" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="bold" x="340">A</text>
    <text y="200" text-anchor="middle" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="10" x="340">d × r</text>

    <!-- Multiplication sign -->
    <text y="185" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="20" x="390">×</text>

    <!-- Matrix B (up-projection) -->
    <rect x="420" y="150" width="130" height="60" rx="8" fill="#1e293b" stroke="#ea580c" stroke-width="2" />
    <text y="185" text-anchor="middle" fill="#fdba74" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="bold" x="485">B</text>
    <text y="200" text-anchor="middle" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="10" x="485">radio × diámetro</text>
  </g>

  <!-- LoRA label -->
  <rect x="320" y="270" width="210" height="80" rx="8" fill="#1e293b" stroke="#ea580c" stroke-width="2" filter="url(#shadow)" />
  <text y="295" text-anchor="middle" fill="#fdba74" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" x="425">🔥 Adaptador LoRA</text>
  <text y="315" text-anchor="middle" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="12" x="425">ΔW = B × A</text>
  <text y="335" text-anchor="middle" fill="#166534" font-family="Inter, system-ui, sans-serif" font-size="11" x="425">Parámetros ~0.1% (entrenables)</text>

  <!-- Rank label -->
  <rect x="350" y="80" width="100" height="30" rx="15" fill="#ea580c" stroke="#ea580c" stroke-width="1" />
  <text y="100" text-anchor="middle" fill="#fdba74" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" x="400">orden r = 16</text>

  <!-- Equals sign -->
  <text y="230" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="bold" x="580">=</text>

  <!-- Output (Right) -->
  <rect x="620" y="100" width="150" height="250" rx="12" fill="url(#outputGrad)" filter="url(#shadow)" />
  <text y="135" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="bold" x="695">✨ Adaptado</text>
  <text y="165" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="14" x="695">W' = W₀ + ΔW</text>

  <!-- Grid representing output -->
  <g opacity="0.8">
    <rect x="640" y="190" width="110" height="90" rx="4" fill="#166534" />
    <line x1="676" y1="190" x2="676" y2="280" stroke="#166534" stroke-width="1" />
    <line x1="713" y1="190" x2="713" y2="280" stroke="#166534" stroke-width="1" />
    <line x1="640" y1="220" x2="750" y2="220" stroke="#166534" stroke-width="1" />
    <line x1="640" y1="250" x2="750" y2="250" stroke="#166534" stroke-width="1" />
  </g>

  <text y="310" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="12" x="695">Misma calidad que</text>
  <text y="328" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="12" x="695">¡Ajuste fino completo!</text>

  <!-- Bottom explanation -->
  <rect x="50" y="395" width="700" height="45" rx="8" fill="#1e293b" filter="url(#shadow)" />
  <text y="418" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="13" x="400">💡 <tspan font-weight="bold" fill="#fdba74">Insight clave:</tspan> Instead of updating all 7B weights, LoRA trains only ~7M parameters (0.1%)</text>
  <text y="435" text-anchor="middle" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="12" x="400">Esto reduce la VRAM de 120 GB a 16 GB, lo que permite realizar ajustes finos con GPUs de consumo.</text>
</svg>
