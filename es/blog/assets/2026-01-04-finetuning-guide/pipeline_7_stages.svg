<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" role="img" aria-label="7-Stage Pipeline" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title>ciclo de vida de siete etapas fine-tuning</title>
  <desc>La preparación de datos, la selección del modelo, la configuración del entrenamiento, fine-tuning, la evaluación, el despliegue y la monitorización constituyen un ciclo de vida iterativo de lanzamientos.</desc>
  <defs>
    <linearGradient id="stageGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="900" height="500" fill="#f8fafc" />

  <!-- Title -->
  <text x="450" y="35" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="600" text-anchor="middle" fill="#1d4ed8">El ciclo de vida de 7 etapas Fine-Tuning</text>

  <!-- Stage boxes - Row 1 -->
  <g transform="translate(50, 70)">
    <rect width="160" height="65" rx="8" fill="url(#stageGrad)" />
    <text x="80" y="28" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#ffffff">1. Preparación de datos</text>
    <text x="80" y="46" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="rgba(255,255,255,0.9)">Limpiar, eliminar duplicados y formatear</text>
  </g>

  <path d="M 210 102 L 240 102" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />

  <g transform="translate(250, 70)">
    <rect width="160" height="65" rx="8" fill="url(#stageGrad)" />
    <text x="80" y="28" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#ffffff">2. Selección de modelo</text>
    <text x="80" y="46" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="rgba(255,255,255,0.9)">Elegir modelo base, cargar</text>
  </g>

  <path d="M 410 102 L 440 102" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />

  <g transform="translate(450, 70)">
    <rect width="160" height="65" rx="8" fill="url(#stageGrad)" />
    <text x="80" y="28" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#ffffff">3. Configuración de entrenamiento</text>
    <text x="80" y="46" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="rgba(255,255,255,0.9)">Configurar hardware y parámetros</text>
  </g>

  <path d="M 610 102 L 640 102" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />

  <g transform="translate(650, 70)">
    <rect width="160" height="65" rx="8" fill="url(#stageGrad)" />
    <text x="80" y="28" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#ffffff">4. Fine-Tuning</text>
    <text x="80" y="46" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="rgba(255,255,255,0.9)">SFT, DPO, o ORPO</text>
  </g>

  <!-- Arrow down -->
  <path d="M 730 135 L 730 170" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />

  <!-- Stage boxes - Row 2 -->
  <g transform="translate(650, 180)">
    <rect width="160" height="65" rx="8" fill="url(#stageGrad)" />
    <text x="80" y="28" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#ffffff">5. Evaluación</text>
    <text x="80" y="46" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="rgba(255,255,255,0.9)">Benchmark, validar</text>
  </g>

  <path d="M 650 212 L 620 212" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />

  <g transform="translate(450, 180)">
    <rect width="160" height="65" rx="8" fill="url(#stageGrad)" />
    <text x="80" y="28" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#ffffff">6. Despliegue</text>
    <text x="80" y="46" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="rgba(255,255,255,0.9)">Exportar y servir el modelo</text>
  </g>

  <path d="M 450 212 L 420 212" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />

  <g transform="translate(250, 180)">
    <rect width="160" height="65" rx="8" fill="url(#stageGrad)" />
    <text x="80" y="28" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#ffffff">7. Monitoreo</text>
    <text x="80" y="46" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="rgba(255,255,255,0.9)">Seguimiento, mantenimiento e iteración</text>
  </g>

  <!-- Feedback loop -->
  <path d="M 250 212 L 130 212 L 130 135" stroke="#ea580c" stroke-width="2" stroke-dasharray="6,3" fill="none" marker-end="url(#arrowhead-orange)" />
  <text x="130" y="175" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="#9a3412">Iterar</text>

  <!-- Key insight box -->
  <rect x="50" y="290" width="800" height="90" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" />
  <text x="70" y="320" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#166534">Comience con el contrato de evaluación</text>
  <text x="70" y="345" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#166534">• Dividir los datos de retención antes del entrenamiento y protegerlos contra fugas por duplicados casi idénticos</text>
  <text x="70" y="365" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#166534">• Publicar conjuntamente el modelo, el tokenizador, la plantilla, el adaptador, la versión de los datos y el informe de evaluación</text>

  <!-- Stage highlight -->
  <rect x="46" y="66" width="168" height="73" rx="10" fill="none" stroke="#16a34a" stroke-width="2" stroke-dasharray="4,2" />
  <text x="130" y="155" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" text-anchor="middle" fill="#166534">Defina primero las particiones.</text>
</svg>
