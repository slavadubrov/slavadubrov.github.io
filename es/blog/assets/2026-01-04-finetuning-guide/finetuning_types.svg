<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Fine-Tuning Types" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title>Tres formas fine-tuning dataset</title>
  <desc>El preentrenamiento continuado emplea texto bruto del dominio, mientras que el fine-tuning específico para tareas utiliza pares de entrada y salida; por su parte, el ajuste por instrucciones hace uso de una mezcla amplia de instrucciones y respuestas.</desc>
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #2563eb" />
      <stop offset="100%" style="stop-color: #2563eb" />
    </linearGradient>
    <linearGradient id="unsupervisedGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #ea580c" />
      <stop offset="100%" style="stop-color: #ea580c" />
    </linearGradient>
    <linearGradient id="sftGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #16a34a" />
      <stop offset="100%" style="stop-color: #16a34a" />
    </linearGradient>
    <linearGradient id="instructGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #2563eb" />
      <stop offset="100%" style="stop-color: #2563eb" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="800" height="500" fill="#0f172a" />

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="bold">Tipos de Fine-Tuning</text>

  <!-- Base Model (center top) -->
  <rect x="300" y="70" width="200" height="45" rx="8" fill="#1e293b" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
  <text x="400" y="98" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">🧠 Modelo base preentrenado</text>

  <!-- Arrows from base model -->
  <path d="M400 115 L400 140 L150 140 L150 160" stroke="#94a3b8" stroke-width="2" fill="none" />
  <path d="M400 115 L400 160" stroke="#94a3b8" stroke-width="2" fill="none" />
  <path d="M400 115 L400 140 L650 140 L650 160" stroke="#94a3b8" stroke-width="2" fill="none" />

  <!-- Unsupervised / Continued Pre-training (left) -->
  <rect x="50" y="165" width="200" height="55" rx="8" fill="url(#unsupervisedGrad)" filter="url(#shadow)" />
  <text x="150" y="190" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold">📚 Preentrenamiento continuo</text>
  <text x="150" y="208" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="11">(No supervisado)</text>

  <!-- SFT (center) -->
  <rect x="300" y="165" width="200" height="55" rx="8" fill="url(#sftGrad)" filter="url(#shadow)" />
  <text x="400" y="190" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold">🎯 Fine-Tuning supervisado</text>
  <text x="400" y="208" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="11">(SFT)</text>

  <!-- Instruction Tuning (right) -->
  <rect x="550" y="165" width="200" height="55" rx="8" fill="url(#instructGrad)" filter="url(#shadow)" />
  <text x="650" y="190" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold">💬 Ajuste de instrucciones</text>
  <text x="650" y="208" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="11">(Caso especial de SFT)</text>

  <!-- Descriptions boxes -->

  <!-- Unsupervised description -->
  <rect x="50" y="240" width="200" height="130" rx="8" fill="#1e293b" stroke="#ea580c" stroke-width="1" filter="url(#shadow)" />
  <text x="65" y="265" fill="#fdba74" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Datos:</text>
  <text x="65" y="283" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11">Texto sin procesar (sin etiquetas)</text>
  <text x="65" y="305" fill="#fdba74" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Objetivo:</text>
  <text x="65" y="323" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11">Conocimiento del dominio</text>
  <text x="65" y="345" fill="#fdba74" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Ejemplo:</text>
  <text x="65" y="363" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11">Artículos médicos, documentos legales</text>

  <!-- SFT description -->
  <rect x="300" y="240" width="200" height="130" rx="8" fill="#1e293b" stroke="#16a34a" stroke-width="1" filter="url(#shadow)" />
  <text x="315" y="265" fill="#166534" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Datos:</text>
  <text x="315" y="283" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11">pares (entrada, salida)</text>
  <text x="315" y="305" fill="#166534" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Objetivo:</text>
  <text x="315" y="323" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11">Comportamiento específico de la tarea</text>
  <text x="315" y="345" fill="#166534" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Ejemplo:</text>
  <text x="315" y="363" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11">Texto → SQL, Resumen</text>

  <!-- Instruction Tuning description -->
  <rect x="550" y="240" width="200" height="130" rx="8" fill="#1e293b" stroke="#2563eb" stroke-width="1" filter="url(#shadow)" />
  <text x="565" y="265" fill="#1d4ed8" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Datos:</text>
  <text x="565" y="283" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11">pares (instrucción, respuesta)</text>
  <text x="565" y="305" fill="#1d4ed8" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Objetivo:</text>
  <text x="565" y="323" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11">Seguir instrucciones diversas</text>
  <text x="565" y="345" fill="#1d4ed8" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Ejemplo:</text>
  <text x="565" y="363" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11">Mezcla amplia de asistentes de chat</text>

  <!-- When to use section -->
  <rect x="50" y="390" width="700" height="110" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#shadow)" />
  <text x="400" y="415" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">CUÁNDO USAR CADA UNO</text>

  <text x="80" y="445" fill="#fdba74" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">📚 Preentrenamiento continuo:</text>
  <text x="230" y="445" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11">El modelo carece de vocabulario específico del dominio (p. ej., médico, legal, de código).</text>

  <text x="80" y="465" fill="#166534" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">🎯 SFT:</text>
  <text x="130" y="465" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11">Tarea específica con formato de entrada/salida conocido (p. ej., Text-to-SQL)</text>

  <text x="80" y="485" fill="#1d4ed8" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">💬 Instrucción:</text>
  <text x="180" y="485" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11">Comportamiento general del asistente de chat</text>
</svg>
