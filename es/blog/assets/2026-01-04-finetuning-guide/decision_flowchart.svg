<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">¿Cuándo realizar el ajuste fino? Diagrama de flujo de decisiones</title>
  <desc id="artifact-desc">¿Cuándo realizar el ajuste fino? Diagrama de flujo de decisiones.</desc>
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #2563eb" />
      <stop offset="100%" style="stop-color: #2563eb" />
    </linearGradient>
    <linearGradient id="promptGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #16a34a" />
      <stop offset="100%" style="stop-color: #16a34a" />
    </linearGradient>
    <linearGradient id="ragGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #ea580c" />
      <stop offset="100%" style="stop-color: #ea580c" />
    </linearGradient>
    <linearGradient id="sgrGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #2563eb" />
      <stop offset="100%" style="stop-color: #2563eb" />
    </linearGradient>
    <linearGradient id="tuneGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #dc2626" />
      <stop offset="100%" style="stop-color: #dc2626" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="800" height="580" fill="#0f172a" />

  <!-- Title -->
  <text y="40" text-anchor="middle" fill="url(#headerGrad)" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="bold" x="400">¿Cuándo realizar el ajuste fino? Diagrama de flujo de decisiones</text>

  <!-- Start node -->
  <ellipse cx="400" cy="90" rx="100" ry="28" fill="#1e293b" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
  <text y="95" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" x="400">🎯 ¿Qué necesita?</text>

  <!-- Arrow down from start -->
  <path d="M400 118 L400 138" stroke="#94a3b8" stroke-width="2" />

  <!-- Decision 1: Dynamic facts? -->
  <rect x="290" y="145" width="220" height="50" rx="8" fill="#1e293b" stroke="#ea580c" stroke-width="2" filter="url(#shadow)" />
  <text y="165" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="13" x="400">Necesito en tiempo real o</text>
  <text y="183" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="13" x="400">¿cambio de conocimiento?</text>

  <!-- Yes arrow to RAG -->
  <path d="M510 170 L590 170" stroke="#94a3b8" stroke-width="2" />
  <text y="160" fill="#166534" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" x="540">SÍ</text>

  <!-- RAG box -->
  <rect x="600" y="145" width="150" height="50" rx="8" fill="url(#ragGrad)" filter="url(#shadow)" />
  <text y="167" text-anchor="middle" fill="#0f172a" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" x="675">📚 Utiliza RAG</text>
  <text y="183" text-anchor="middle" fill="#0f172a" font-family="Inter, system-ui, sans-serif" font-size="11" x="675" transform="translate(-19.76 0.00)">Generación mejorada por recuperación de información</text>

  <!-- No arrow down -->
  <path d="M400 195 L400 220" stroke="#94a3b8" stroke-width="2" />
  <text y="210" fill="#fca5a5" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" x="415">No</text>

  <!-- Decision 2: Simple format? -->
  <rect x="290" y="225" width="220" height="50" rx="8" fill="#1e293b" stroke="#16a34a" stroke-width="2" filter="url(#shadow)" />
  <text y="245" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="13" x="400">Estilo/formato sencillo</text>
  <text y="263" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="13" x="400">ajustes?</text>

  <!-- Yes arrow to Prompt Engineering -->
  <path d="M510 250 L590 250" stroke="#94a3b8" stroke-width="2" />
  <text y="240" fill="#166534" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" x="540">SÍ</text>

  <!-- Prompt Engineering box -->
  <rect x="600" y="225" width="150" height="50" rx="8" fill="url(#promptGrad)" filter="url(#shadow)" />
  <text y="247" text-anchor="middle" fill="#0f172a" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" x="675">✏️ Formulación de prompts</text>
  <text y="263" text-anchor="middle" fill="#0f172a" font-family="Inter, system-ui, sans-serif" font-size="11" x="675">Ejemplos de pocos ejemplos</text>

  <!-- No arrow down -->
  <path d="M400 275 L400 300" stroke="#94a3b8" stroke-width="2" />
  <text y="290" fill="#fca5a5" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" x="415">No</text>

  <!-- Decision 3: Consistency issues? (REFRAMED) -->
  <rect x="290" y="305" width="220" height="50" rx="8" fill="#1e293b" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
  <text y="325" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="13" x="400">Necesito consistencia y fiabilidad</text>
  <text y="343" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="13" x="400">estructura de salida?</text>

  <!-- Yes arrow to SGR -->
  <path d="M510 330 L590 330" stroke="#94a3b8" stroke-width="2" />
  <text y="320" fill="#166534" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" x="540">SÍ</text>

  <!-- SGR box (REFRAMED) -->
  <rect x="600" y="305" width="150" height="50" rx="8" fill="url(#sgrGrad)" filter="url(#shadow)" />
  <text y="327" text-anchor="middle" fill="#0f172a" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" x="675">🔗 SGR</text>
  <text y="343" text-anchor="middle" fill="#0f172a" font-family="Inter, system-ui, sans-serif" font-size="11" x="675">Coherencia + Estructura</text>

  <!-- No arrow down -->
  <path d="M400 355 L400 380" stroke="#94a3b8" stroke-width="2" />
  <text y="370" fill="#fca5a5" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" x="415">No</text>

  <!-- Decision 4: Complex behavior? -->
  <rect x="275" y="385" width="250" height="50" rx="8" fill="#1e293b" stroke="#dc2626" stroke-width="2" filter="url(#shadow)" />
  <text y="405" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="13" x="400">Se requieren cambios de comportamiento profundos.</text>
  <text y="423" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="13" x="400">razonamiento complejo, ¿o latencia?</text>

  <!-- Yes arrow to Fine-Tuning -->
  <path d="M400 435 L400 465" stroke="#94a3b8" stroke-width="2" />
  <text y="453" fill="#166534" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" x="415">SÍ</text>

  <!-- Fine-Tuning box -->
  <rect x="300" y="470" width="200" height="55" rx="8" fill="url(#tuneGrad)" filter="url(#shadow)" />
  <text y="495" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="bold" x="400">🔧 Ajuste fino</text>
  <text y="513" text-anchor="middle" fill="#fca5a5" font-family="Inter, system-ui, sans-serif" font-size="12" x="400">PEFT (LoRA/QLoRA)</text>

  <!-- Left side examples -->
  <rect x="40" y="145" width="180" height="220" rx="8" fill="#1e293b" stroke="#94a3b8" stroke-width="1" filter="url(#shadow)" />
  <text y="168" text-anchor="middle" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" x="130">CASOS DE USO</text>
  <text y="193" fill="#fdba74" font-family="Inter, system-ui, sans-serif" font-size="11" x="55">📚 RAG:</text>
  <text y="208" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="10" x="55">• Documentación de la empresa</text>
  <text y="223" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="10" x="55">• Precios actuales</text>
  <text y="243" fill="#166534" font-family="Inter, system-ui, sans-serif" font-size="11" x="55">✏️ Formulación de prompts:</text>
  <text y="258" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="10" x="55">• Cambios de estilo básicos</text>
  <text y="278" fill="#1d4ed8" font-family="Inter, system-ui, sans-serif" font-size="11" x="55">🔗 SGR:</text>
  <text y="293" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="10" x="55">• JSON consistente</text>
  <text y="308" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="10" x="55">• Llamadas a funciones fiables</text>
  <text y="328" fill="#fca5a5" font-family="Inter, system-ui, sans-serif" font-size="11" x="55">🔧 Ajuste fino:</text>
  <text y="343" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="10" x="55">• Persona profunda</text>
  <text y="358" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="10" x="55">• Razonamiento complejo</text>
</svg>
