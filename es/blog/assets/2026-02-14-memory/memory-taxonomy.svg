<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 550" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="Memory Taxonomy" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Taxonomía de memoria</title>
  <defs>
    <filter id="shadowT" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a" x="550">Taxonomía de Memoria del Agente</text>

  <!-- Root Node -->
  <rect x="465" y="55" width="170" height="40" rx="20" fill="#7c3aed" filter="url(#shadowT)" />
  <text y="81" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff" x="550">Memoria del agente</text>

  <!-- Lines from root to three main branches -->
  <line x1="490" y1="95" x2="180" y2="145" stroke="#94a3b8" stroke-width="1.5" />
  <line x1="550" y1="95" x2="550" y2="145" stroke="#94a3b8" stroke-width="1.5" />
  <line x1="610" y1="95" x2="920" y2="145" stroke="#94a3b8" stroke-width="1.5" />

  <!-- Hot Memory Branch (Left: x=30-330, width=300) -->
  <rect x="30" y="145" width="300" height="50" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadowT)" />
  <text y="165" text-anchor="middle" font-size="13" font-weight="600" fill="#1d4ed8" x="180">Memoria activa</text>
  <text y="184" text-anchor="middle" font-size="10" fill="#64748b" x="180">(Alcance de sesión)</text>

  <!-- Cold Memory Branch (Center: x=400-700, width=300) -->
  <rect x="400" y="145" width="300" height="50" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadowT)" />
  <text y="165" text-anchor="middle" font-size="13" font-weight="600" fill="#9a3412" x="550">Memoria fría</text>
  <text y="184" text-anchor="middle" font-size="10" fill="#64748b" x="550">(Entre sesiones)</text>

  <!-- Document Memory Branch (Right: x=770-1070, width=300) -->
  <rect x="770" y="145" width="300" height="50" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="2" filter="url(#shadowT)" />
  <text y="165" text-anchor="middle" font-size="13" font-weight="600" fill="#166534" x="920">Memoria de Documentos</text>
  <text y="184" text-anchor="middle" font-size="10" fill="#64748b" x="920">(Conocimiento del proyecto)</text>

  <!-- Hot Memory Children: Working + Short-term -->
  <line x1="105" y1="195" x2="105" y2="230" stroke="#94a3b8" stroke-width="1" />
  <line x1="255" y1="195" x2="255" y2="230" stroke="#94a3b8" stroke-width="1" />

  <!-- Working Memory (Purple - LLM/fastest tier) -->
  <rect x="40" y="230" width="130" height="65" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowT)" />
  <text y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6" x="105">Memoria de trabajo</text>
  <text y="265" text-anchor="middle" font-size="9" fill="#64748b" x="105">Paso actual</text>
  <text y="278" text-anchor="middle" font-size="9" fill="#64748b" x="105">Parámetros de la herramienta, LLM</text>
  <text y="291" text-anchor="middle" font-size="9" fill="#64748b" x="105">búfer de respuesta</text>

  <!-- Short-term (Checkpoints) -->
  <rect x="190" y="230" width="130" height="65" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowT)" />
  <text y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8" x="255">A corto plazo</text>
  <text y="265" text-anchor="middle" font-size="9" fill="#64748b" x="255">Checkpoints</text>
  <text y="278" text-anchor="middle" font-size="9" fill="#64748b" x="255">Estado del hilo</text>
  <text y="291" text-anchor="middle" font-size="9" fill="#64748b" x="255">Minutos-horas</text>

  <!-- Cold Memory Children: Episodic + Semantic -->
  <line x1="475" y1="195" x2="475" y2="230" stroke="#94a3b8" stroke-width="1" />
  <line x1="625" y1="195" x2="625" y2="230" stroke="#94a3b8" stroke-width="1" />

  <!-- Episodic -->
  <rect x="410" y="230" width="130" height="65" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowT)" />
  <text y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412" x="475">Episódico</text>
  <text y="265" text-anchor="middle" font-size="9" fill="#64748b" x="475">Interacciones anteriores</text>
  <text y="278" text-anchor="middle" font-size="9" fill="#64748b" x="475">Registros de conversación</text>
  <text y="291" text-anchor="middle" font-size="9" fill="#64748b" x="475">Días-meses</text>

  <!-- Semantic -->
  <rect x="560" y="230" width="130" height="65" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowT)" />
  <text y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412" x="625">semántico</text>
  <text y="265" text-anchor="middle" font-size="9" fill="#64748b" x="625">Hechos, conocimiento</text>
  <text y="278" text-anchor="middle" font-size="9" fill="#64748b" x="625">Preferencias del usuario</text>
  <text y="291" text-anchor="middle" font-size="9" fill="#64748b" x="625">Meses-permanente</text>

  <!-- Document Memory Children: Conventions + Research + Learnings -->
  <line x1="820" y1="195" x2="820" y2="230" stroke="#94a3b8" stroke-width="1" />
  <line x1="920" y1="195" x2="920" y2="230" stroke="#94a3b8" stroke-width="1" />
  <line x1="1020" y1="195" x2="1020" y2="230" stroke="#94a3b8" stroke-width="1" />

  <!-- Conventions -->
  <rect x="775" y="230" width="90" height="65" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowT)" />
  <text y="247" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="820">Convenciones</text>
  <text y="262" text-anchor="middle" font-size="9" fill="#64748b" x="820">Reglas del proyecto</text>
  <text y="274" text-anchor="middle" font-size="9" fill="#64748b" x="820">Estilo de codificación</text>
  <text y="286" text-anchor="middle" font-size="9" fill="#64748b" x="820">Formatos</text>

  <!-- Research Notes -->
  <rect x="875" y="230" width="90" height="65" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowT)" />
  <text y="247" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="920">I+D</text>
  <text y="262" text-anchor="middle" font-size="9" fill="#64748b" x="920">Notas de análisis</text>
  <text y="274" text-anchor="middle" font-size="9" fill="#64748b" x="920">Resúmenes</text>
  <text y="286" text-anchor="middle" font-size="9" fill="#64748b" x="920">Resultados</text>

  <!-- Learnings -->
  <rect x="975" y="230" width="90" height="65" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowT)" />
  <text y="247" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="1020">Aprendizajes</text>
  <text y="262" text-anchor="middle" font-size="9" fill="#64748b" x="1020">Patrones</text>
  <text y="274" text-anchor="middle" font-size="9" fill="#64748b" x="1020">Errores a evitar</text>
  <text y="286" text-anchor="middle" font-size="9" fill="#64748b" x="1020">Soluciones</text>

  <!-- Procedural Memory (System-wide, separate footer bar) -->
  <rect x="30" y="325" width="1040" height="50" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadowT)" />
  <text y="345" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6" x="550">Memoria procedural (a nivel de sistema)</text>
  <text y="363" text-anchor="middle" font-size="10" fill="#64748b" x="550">System prompt, definiciones de herramientas, archivos de configuración: permanentes y no específicos del usuario</text>

  <!-- Summary bars for each column -->
  <rect x="30" y="395" width="300" height="40" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1" />
  <text y="413" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8" x="180">Rápido | En proceso/base de datos</text>
  <text y="428" text-anchor="middle" font-size="9" fill="#64748b" x="180">Milisegundos-horas | Duración de la sesión</text>

  <rect x="400" y="395" width="300" height="40" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1" />
  <text y="413" text-anchor="middle" font-size="10" font-weight="600" fill="#9a3412" x="550">Buscable | Almacén vectorial/KV</text>
  <text y="428" text-anchor="middle" font-size="9" fill="#64748b" x="550">Días de permanencia | Recuperación entre sesiones</text>

  <rect x="770" y="395" width="300" height="40" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1" />
  <text y="413" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="920">Lectura por humanos | Sistema de archivos</text>
  <text y="428" text-anchor="middle" font-size="9" fill="#64748b" x="920">Días-para-siempre | Nativo de Git, editable</text>

  <!-- Access speed comparison -->
  <text y="468" font-size="10" fill="#64748b" x="30">Velocidad de acceso:</text>
  <rect x="130" y="455" width="940" height="20" rx="10" fill="none" stroke="#cbd5e1" stroke-width="1" />
  <rect x="131" y="456" width="235" height="18" rx="9" fill="#faf5ff" opacity="0.8" />
  <text y="470" text-anchor="middle" font-size="9" font-weight="600" fill="#5b21b6" x="248">Instantáneo (en memoria)</text>
  <rect x="366" y="456" width="235" height="18" rx="9" fill="#eff6ff" opacity="0.8" />
  <text y="470" text-anchor="middle" font-size="9" font-weight="600" fill="#1d4ed8" x="483">Rápido (ms de E/S de base de datos/archivo)</text>
  <rect x="601" y="456" width="235" height="18" rx="9" fill="#fff7ed" opacity="0.8" />
  <text y="470" text-anchor="middle" font-size="9" font-weight="600" fill="#9a3412" x="718">Más lento (embed+search)</text>
  <rect x="836" y="456" width="233" height="18" rx="9" fill="#f0fdf4" opacity="0.8" />
  <text y="470" text-anchor="middle" font-size="9" font-weight="600" fill="#166534" x="952">Rápido (lectura de archivo)</text>

  <!-- Storage type comparison -->
  <text y="508" font-size="10" fill="#64748b" x="30">Tipo de almacenamiento:</text>
  <rect x="130" y="495" width="940" height="20" rx="10" fill="none" stroke="#cbd5e1" stroke-width="1" />
  <rect x="131" y="496" width="235" height="18" rx="9" fill="#faf5ff" opacity="0.8" />
  <text y="510" text-anchor="middle" font-size="9" font-weight="600" fill="#5b21b6" x="248">diccionario Python</text>
  <rect x="366" y="496" width="235" height="18" rx="9" fill="#eff6ff" opacity="0.8" />
  <text y="510" text-anchor="middle" font-size="9" font-weight="600" fill="#1d4ed8" x="483">Redis/PostgreSQL</text>
  <rect x="601" y="496" width="235" height="18" rx="9" fill="#fff7ed" opacity="0.8" />
  <text y="510" text-anchor="middle" font-size="9" font-weight="600" fill="#9a3412" x="718">Qdrant/pgvector</text>
  <rect x="836" y="496" width="233" height="18" rx="9" fill="#f0fdf4" opacity="0.8" />
  <text y="510" text-anchor="middle" font-size="9" font-weight="600" fill="#166534" x="952">archivos Markdown/JSON</text>
</svg>
