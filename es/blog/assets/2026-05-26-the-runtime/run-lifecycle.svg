<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">Ciclo de vida del agente de ejecución prolongada</title>
  <desc id="desc">Un diagrama de ciclo de vida que muestra las rutas de arranque, planificación, ejecución, punto de control, evaluación y reanudación para un agente de ejecución prolongada.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#1f2937" flood-opacity="0.15" />
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2c3e50" />
    </marker>
    <style>
      .heading{font:700 24px Arial,sans-serif;fill:#17202a}
      .step{font:700 15px Arial,sans-serif;fill:#17202a}
      .sub{font:500 12px Arial,sans-serif;fill:#566573}
      .box{rx:12;filter:url(#shadow);stroke-width:2}
      .arrow{stroke:#2c3e50;stroke-width:2.3;fill:none;marker-end:url(#arrow)}
      .soft{stroke:#7f8c8d;stroke-width:2;stroke-dasharray:7 7;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1100" height="620" fill="#f8f9fa" />
  <text x="60" y="58" class="heading">Ciclo de vida de una ejecución de agente desplegado</text>
  <text x="60" y="84" class="sub">Un proceso a largo plazo es una secuencia de pasos recuperables, y no una única solicitud masiva.</text>

  <rect class="box" x="70" y="150" width="150" height="88" fill="#e3f2fd" stroke="#2980b9" />
  <text x="104" y="184" class="step">1. Arranque</text>
  <text x="98" y="209" class="sub">estado de carga</text>
  <text x="98" y="227" class="sub">espacio de trabajo de montaje</text>

  <rect class="box" x="270" y="150" width="150" height="88" fill="#f3e5f5" stroke="#6a1b9a" />
  <text x="303" y="184" class="step">2. Planificación</text>
  <text x="298" y="209" class="sub">pruebas de aceptación</text>
  <text x="298" y="227" class="sub">límites de presupuesto</text>

  <rect class="box" x="470" y="150" width="150" height="88" fill="#fff3e0" stroke="#e67e22" />
  <text x="500" y="184" class="step">3. Ejecutar</text>
  <text x="498" y="209" class="sub">herramientas y código</text>
  <text x="498" y="227" class="sub">verificaciones de políticas</text>

  <rect class="box" x="670" y="150" width="150" height="88" fill="#e8f5e9" stroke="#27ae60" />
  <text x="696" y="184" class="step">4. Punto de control</text>
  <text x="700" y="209" class="sub">registro de eventos</text>
  <text x="700" y="227" class="sub">diferencia de espacio de trabajo</text>

  <rect class="box" x="870" y="150" width="150" height="88" fill="#ffffff" stroke="#c62828" />
  <text x="902" y="184" class="step">5. Evaluar</text>
  <text x="898" y="209" class="sub">pruebas, revisor</text>
  <text x="898" y="227" class="sub">completado o bucle</text>

  <path class="arrow" d="M220 194 H270" />
  <path class="arrow" d="M420 194 H470" />
  <path class="arrow" d="M620 194 H670" />
  <path class="arrow" d="M820 194 H870" />

  <path class="arrow" d="M945 238 C945 325 548 334 548 244" />
  <text x="610" y="337" class="sub">No completado: continuar desde el último punto de control limpio</text>

  <rect class="box" x="195" y="430" width="230" height="82" fill="#ffffff" stroke="#2980b9" />
  <text x="237" y="462" class="step">Colapso o redespliegue</text>
  <text x="232" y="488" class="sub">el nuevo trabajador lee el mismo ID de sesión</text>

  <rect class="box" x="475" y="430" width="230" height="82" fill="#ffffff" stroke="#e67e22" />
  <text x="521" y="462" class="step">Aprobación humana</text>
  <text x="518" y="488" class="sub">El grafo está en modo de espera; no se factura por cálculos.</text>

  <rect class="box" x="755" y="430" width="230" height="82" fill="#ffffff" stroke="#27ae60" />
  <text x="807" y="462" class="step">Paquete de reproducción</text>
  <text x="792" y="488" class="sub">prompt, eventos, trazas, artefactos</text>

  <path class="soft" d="M310 430 C310 348 405 303 520 244" />
  <path class="soft" d="M590 430 C590 345 640 300 722 244" />
  <path class="soft" d="M870 430 C870 345 858 296 806 244" />
</svg>
