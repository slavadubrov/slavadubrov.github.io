<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 610" font-family="Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12" />
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#37474f" />
    </marker>
    <marker id="arrPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6a1b9a" />
    </marker>
    <marker id="arrPurpleDS" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5e35b1" />
    </marker>
  </defs>

  <rect width="960" height="610" fill="#f8f9fa" />

  <!-- Title -->
  <text x="480" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#263238">Las cinco primitivas de tiempo de ejecución</text>
  <text x="480" y="56" text-anchor="middle" font-size="13" fill="#546e7a">Sesión · Aprovechamiento · Entorno aislado · Punto de control · Rastreo</text>

  <!-- Outer runtime container -->
  <rect x="30" y="78" width="900" height="510" rx="14" ry="14" fill="#ffffff" stroke="#cfd8dc" stroke-width="1.5" />
  <text x="50" y="100" font-size="12" font-weight="600" fill="#607d8b" letter-spacing="0.5">TIEMPO DE EJECUCIÓN EXTERNO</text>

  <!-- LLM API ellipse -->
  <g filter="url(#ds)">
    <ellipse cx="480" cy="128" rx="75" ry="22" fill="#ede7f6" stroke="#5e35b1" stroke-width="1.8" />
    <text x="480" y="133" text-anchor="middle" font-size="13" font-weight="700" fill="#4527a0">API de LLM</text>
  </g>

  <!-- LLM -> Harness arrow -->
  <path d="M480 151 L 480 161" fill="none" stroke="#5e35b1" stroke-width="2" marker-end="url(#arrPurpleDS)" />

  <!-- Harness -->
  <g filter="url(#ds)">
    <rect x="240" y="163" width="480" height="95" rx="12" ry="12" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" />
    <text x="480" y="192" text-anchor="middle" font-size="17" font-weight="700" fill="#1565c0">Acoplamiento</text>
    <text x="480" y="215" text-anchor="middle" font-size="12" fill="#37474f">El bucle: llamada al modelo → análisis con herramienta → ejecución → repetir</text>
    <text x="480" y="237" text-anchor="middle" font-size="11" fill="#546e7a" font-style="italic">LangGraph CompiledStateGraph · Agentes Profundos · Claude Code</text>
  </g>

  <!-- Harness -> Session (emitEvent) -->
  <path d="M335 258 L 240 308" fill="none" stroke="#37474f" stroke-width="1.8" marker-end="url(#arr)" />
  <text x="255" y="277" font-size="11" font-weight="600" fill="#37474f">emitirEvento</text>

  <!-- Harness -> Checkpoint (persist) -->
  <path d="M462 258 L 462 308" fill="none" stroke="#37474f" stroke-width="1.8" marker-end="url(#arr)" />
  <text x="456" y="285" font-size="11" font-weight="600" fill="#37474f" text-anchor="end">persistir</text>

  <!-- Checkpoint -> Harness (resume, dashed purple) -->
  <path d="M500 308 L 500 261" fill="none" stroke="#6a1b9a" stroke-width="1.8" stroke-dasharray="5 3" marker-end="url(#arrPurple)" />
  <text x="508" y="285" font-size="11" font-weight="600" fill="#6a1b9a">resumen</text>

  <!-- Harness -> Sandbox (tool calls) -->
  <path d="M625 258 L 720 308" fill="none" stroke="#37474f" stroke-width="1.8" marker-end="url(#arr)" />
  <text x="635" y="277" font-size="11" font-weight="600" fill="#37474f">llamadas a herramientas</text>

  <!-- Sandbox -> Harness (results, dashed) -->
  <path d="M760 308 L 665 261" fill="none" stroke="#37474f" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#arr)" />
  <text x="700" y="297" font-size="11" font-weight="600" fill="#546e7a">resultados</text>

  <!-- Session box -->
  <g filter="url(#ds)">
    <rect x="65" y="310" width="240" height="110" rx="12" ry="12" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" />
    <text x="185" y="338" text-anchor="middle" font-size="16" font-weight="700" fill="#2e7d32">Sesión</text>
    <text x="185" y="361" text-anchor="middle" font-size="12" fill="#37474f">Registro de eventos de solo escritura</text>
    <text x="185" y="381" text-anchor="middle" font-size="11" fill="#546e7a">thread_id · emitEvent(id, ev)</text>
    <text x="185" y="403" text-anchor="middle" font-size="11" fill="#546e7a" font-style="italic">LangGraph SQLite · transmisión en tiempo real</text>
  </g>

  <!-- Checkpoint box -->
  <g filter="url(#ds)">
    <rect x="345" y="310" width="270" height="110" rx="12" ry="12" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" />
    <text x="480" y="338" text-anchor="middle" font-size="16" font-weight="700" fill="#6a1b9a">Punto de control</text>
    <text x="480" y="361" text-anchor="middle" font-size="12" fill="#37474f">Estado de captura por super-paso</text>
    <text x="480" y="381" text-anchor="middle" font-size="11" fill="#546e7a">valores · siguiente · tareas · checkpoint_id</text>
    <text x="480" y="403" text-anchor="middle" font-size="11" fill="#546e7a" font-style="italic">PostgresSaver · RedisSaver</text>
  </g>

  <!-- Sandbox box -->
  <g filter="url(#ds)">
    <rect x="655" y="310" width="240" height="110" rx="12" ry="12" fill="#fff3e0" stroke="#e65100" stroke-width="2" />
    <text x="775" y="338" text-anchor="middle" font-size="16" font-weight="700" fill="#e65100">Entorno aislado</text>
    <text x="775" y="361" text-anchor="middle" font-size="12" fill="#37474f">Entorno de ejecución aislado</text>
    <text x="775" y="381" text-anchor="middle" font-size="11" fill="#546e7a">Los archivos se modifican aquí, no en el harness.</text>
    <text x="775" y="403" text-anchor="middle" font-size="11" fill="#546e7a" font-style="italic">E2B · Daytona · Modal · Docker</text>
  </g>

  <!-- Trace box -->
  <g filter="url(#ds)">
    <rect x="65" y="445" width="830" height="80" rx="12" ry="12" fill="#fce4ec" stroke="#c62828" stroke-width="2" />
    <text x="480" y="471" text-anchor="middle" font-size="16" font-weight="700" fill="#c62828">Rastreo · OpenTelemetry GenAI</text>
    <text x="480" y="493" text-anchor="middle" font-size="12" fill="#37474f">Intervalos emitidos por Harness · Sesión · Punto de control · Entorno aislado</text>
    <text x="480" y="513" text-anchor="middle" font-size="11" fill="#546e7a">gen_ai.conversation.id · gen_ai.agent.name · gen_ai.usage.* · gen_ai.workflow.name</text>
  </g>

  <!-- Credentials note -->
  <g>
    <rect x="65" y="542" width="830" height="38" rx="8" ry="8" fill="#ffffff" stroke="#cfd8dc" stroke-dasharray="4 3" />
    <text x="480" y="566" text-anchor="middle" font-size="12" fill="#546e7a">
      <tspan font-weight="700" fill="#37474f">Credenciales</tspan> live in a vault outside all five. The MCP proxy fetches them per session; the harness never sees the token.
    </text>
  </g>
</svg>
