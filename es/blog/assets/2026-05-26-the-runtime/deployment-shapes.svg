<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 540" font-family="Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="ds3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12" />
    </filter>
  </defs>

  <rect width="980" height="540" fill="#f8f9fa" />

  <text x="490" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#263238">Formas de despliegue por duración ideal</text>
  <text x="490" y="56" text-anchor="middle" font-size="12" fill="#546e7a">Cada barra muestra dónde funciona bien; las zonas difusas son de estiramiento.</text>

  <!-- Time axis -->
  <line x1="120" y1="490" x2="940" y2="490" stroke="#37474f" stroke-width="1.5" />
  <!-- Ticks -->
  <g font-size="11" fill="#546e7a" text-anchor="middle">
    <line x1="120" y1="486" x2="120" y2="494" stroke="#37474f" />
    <text x="120" y="512">0 s</text>
    <line x1="240" y1="486" x2="240" y2="494" stroke="#37474f" />
    <text x="240" y="512">30 s</text>
    <line x1="360" y1="486" x2="360" y2="494" stroke="#37474f" />
    <text x="360" y="512">5 min</text>
    <line x1="500" y1="486" x2="500" y2="494" stroke="#37474f" />
    <text x="500" y="512">60 min</text>
    <line x1="640" y1="486" x2="640" y2="494" stroke="#37474f" />
    <text x="640" y="512">5 h</text>
    <line x1="780" y1="486" x2="780" y2="494" stroke="#37474f" />
    <text x="780" y="512">24 h</text>
    <line x1="920" y1="486" x2="920" y2="494" stroke="#37474f" />
    <text x="920" y="512">7 days</text>
  </g>
  <text x="490" y="530" text-anchor="middle" font-size="11" fill="#546e7a" font-style="italic">duración de ejecución →</text>

  <!-- Row helpers: y positions for each bar -->
  <!-- 1) SDK in app server: 0-30s sweet, 30s-60min stretch -->
  <g filter="url(#ds3)">
    <rect x="120" y="90" width="120" height="26" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.4" />
    <rect x="240" y="90" width="260" height="26" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.4" opacity="0.45" />
    <text x="135" y="108" font-size="12" font-weight="600" fill="#0d47a1">SDK en servidor de app</text>
  </g>
  <text x="510" y="108" font-size="11" fill="#546e7a">petición síncrona; se pierde si falla</text>

  <!-- 2) Queue + worker + checkpoint DB: 30s-5h sweet, 5h-24h stretch -->
  <g filter="url(#ds3)">
    <rect x="240" y="130" width="400" height="26" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.4" />
    <rect x="640" y="130" width="140" height="26" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.4" opacity="0.5" />
    <text x="255" y="148" font-size="12" font-weight="600" fill="#1b5e20">Cola + worker + DB de checkpoints ← stack de referencia</text>
  </g>

  <!-- 3) Durable workflow (Temporal): 60min-7days sweet -->
  <g filter="url(#ds3)">
    <rect x="500" y="170" width="420" height="26" rx="6" fill="#ede7f6" stroke="#4527a0" stroke-width="1.4" />
    <text x="515" y="188" font-size="12" font-weight="600" fill="#311b92">Motor de flujos durables (Temporal)</text>
  </g>

  <!-- 4) Sandbox-per-session (E2B/Daytona/etc.): 30s-24h -->
  <g filter="url(#ds3)">
    <rect x="240" y="210" width="540" height="26" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.4" />
    <text x="255" y="228" font-size="12" font-weight="600" fill="#bf360c">Sandbox por sesión (E2B · Daytona · Modal · Runloop · Vercel)</text>
  </g>

  <!-- 5) Anthropic Managed Agents -->
  <g filter="url(#ds3)">
    <rect x="240" y="250" width="540" height="26" rx="6" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.4" />
    <text x="255" y="268" font-size="12" font-weight="600" fill="#4a148c">Anthropic Managed Agents · $0.08 / session-hour, sin coste en reposo</text>
  </g>

  <!-- 6) Deep Agents Deploy -->
  <g filter="url(#ds3)">
    <rect x="240" y="290" width="560" height="26" rx="6" fill="#e1f5fe" stroke="#0277bd" stroke-width="1.4" />
    <text x="255" y="308" font-size="12" font-weight="600" fill="#01579b">LangChain Deep Agents Deploy · backend de sandbox conmutable</text>
  </g>

  <!-- 7) Cloud Run service -->
  <g filter="url(#ds3)">
    <rect x="120" y="330" width="380" height="26" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.4" />
    <text x="135" y="348" font-size="12" font-weight="600" fill="#0d47a1">Servicio Cloud Run · máx. 60 min HTTP</text>
  </g>

  <!-- 8) Cloud Run job -->
  <g filter="url(#ds3)">
    <rect x="360" y="370" width="560" height="26" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.4" />
    <text x="375" y="388" font-size="12" font-weight="600" fill="#0d47a1">Job de Cloud Run · máx. 7 days; jobs GPU máx. 1 h</text>
  </g>

  <!-- 9) Lambda (wrong tool) -->
  <g filter="url(#ds3)">
    <rect x="120" y="410" width="220" height="26" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1.4" />
    <text x="135" y="428" font-size="12" font-weight="600" fill="#b71c1c">AWS Lambda · límite fijo de 15 min — herramienta inadecuada</text>
  </g>

  <!-- 10) Fargate task / K8s Job -->
  <g filter="url(#ds3)">
    <rect x="240" y="450" width="680" height="26" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.4" />
    <text x="255" y="468" font-size="12" font-weight="600" fill="#1b5e20">Tarea Fargate · K8s Job · sin límite documentado; la durabilidad depende de ti</text>
  </g>

  <!-- Vertical guides -->
  <line x1="240" y1="80" x2="240" y2="486" stroke="#cfd8dc" stroke-dasharray="3 3" />
  <line x1="500" y1="80" x2="500" y2="486" stroke="#cfd8dc" stroke-dasharray="3 3" />
  <line x1="780" y1="80" x2="780" y2="486" stroke="#cfd8dc" stroke-dasharray="3 3" />
</svg>
