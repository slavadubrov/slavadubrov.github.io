<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 640" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Where each primitive lives in each deployment shape" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Dónde se encuentra cada primitiva en cada forma de despliegue</title>
  <defs>
    <filter id="ds4" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#334155" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="1140" height="640" fill="#f8fafc" />

  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a" x="570">Dónde se encuentra cada primitiva en cada forma de despliegue</text>
  <text y="54" text-anchor="middle" font-size="12" fill="#334155" x="570">Verde = la forma proporciona este primitivo. Gris = se conecta de forma externa. Rojo = no aplica.</text>

  <!-- Column headers -->
  <g font-size="11" font-weight="700" letter-spacing="0.6" fill="#334155" text-anchor="middle">
    <text y="96" x="140">FORMA</text>
    <text y="96" x="370">HARNESS</text>
    <text y="96" x="585">SANDBOX</text>
    <text y="96" x="800">SESIÓN + CHECKPOINT</text>
    <text y="96" x="1015">TRAZA</text>
  </g>
  <line x1="20" y1="106" x2="1120" y2="106" stroke="#2563eb" stroke-width="1" />

  <!-- Row 1: SDK in app server (y_rect=118, y_text=140) -->
  <text y="140" font-size="13" font-weight="600" fill="#0f172a" x="30">1. SDK en el servidor de la aplicación</text>
  <g filter="url(#ds4)">
    <rect x="265" y="118" width="210" height="34" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1.2" />
