<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Verifiability spectrum for browser and computer-use agents</title>
  <desc id="desc">A diagram ranking automation surfaces from highly verifiable APIs and compilers to low-verifiability open desktop control, with harness controls below.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#455a64"/>
    </marker>
  </defs>

  <rect width="1200" height="560" fill="#f8f9fa"/>
  <text x="60" y="70" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#263238">Verifiability spectrum</text>
  <text x="60" y="106" font-family="Inter, Arial, sans-serif" font-size="18" fill="#546e7a">The less the environment can prove, the more harness you need around the model.</text>

  <line x1="120" y1="190" x2="1080" y2="190" stroke="#455a64" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="118" y="165" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#2e7d32">more checkable</text>
  <text x="952" y="165" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#c62828">less checkable</text>

  <g filter="url(#shadow)">
    <rect x="80" y="220" width="170" height="120" rx="8" fill="#e8f5e9" stroke="#2e7d32"/>
    <text x="165" y="262" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#1b5e20">API</text>
    <text x="165" y="294" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#2e7d32">schemas</text>
    <text x="165" y="318" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#2e7d32">status codes</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="286" y="220" width="170" height="120" rx="8" fill="#e3f2fd" stroke="#1565c0"/>
    <text x="371" y="262" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#0d47a1">Playwright</text>
    <text x="371" y="294" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#1565c0">selectors</text>
    <text x="371" y="318" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#1565c0">DOM assertions</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="492" y="220" width="170" height="120" rx="8" fill="#fff3e0" stroke="#e65100"/>
    <text x="577" y="262" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#bf360c">A11y tree</text>
    <text x="577" y="294" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#e65100">roles</text>
    <text x="577" y="318" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#e65100">names</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="698" y="220" width="170" height="120" rx="8" fill="#f3e5f5" stroke="#6a1b9a"/>
    <text x="783" y="262" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#4a148c">Screenshot</text>
    <text x="783" y="294" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#6a1b9a">pixels</text>
    <text x="783" y="318" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#6a1b9a">coordinates</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="904" y="220" width="216" height="120" rx="8" fill="#fce4ec" stroke="#c62828"/>
    <text x="1012" y="262" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#b71c1c">Open desktop</text>
    <text x="1012" y="294" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#c62828">arbitrary apps</text>
    <text x="1012" y="318" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#c62828">weak state signal</text>
  </g>

  <rect x="80" y="398" width="1040" height="92" rx="8" fill="#ffffff" stroke="#cfd8dc"/>
  <text x="110" y="432" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#263238">Harness controls</text>
  <text x="110" y="464" font-family="Inter, Arial, sans-serif" font-size="16" fill="#455a64">post-step assertions</text>
  <text x="310" y="464" font-family="Inter, Arial, sans-serif" font-size="16" fill="#455a64">state-based success checks</text>
  <text x="565" y="464" font-family="Inter, Arial, sans-serif" font-size="16" fill="#455a64">checkpoint and retry</text>
  <text x="780" y="464" font-family="Inter, Arial, sans-serif" font-size="16" fill="#455a64">scoped credentials</text>
  <text x="970" y="464" font-family="Inter, Arial, sans-serif" font-size="16" fill="#455a64">human handoff</text>
</svg>
