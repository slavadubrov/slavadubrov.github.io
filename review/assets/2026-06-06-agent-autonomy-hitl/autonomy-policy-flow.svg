<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">Agent autonomy policy flow</title>
  <desc id="desc">A tool call is classified by risk, confidence, reversibility, and autonomy level, then routed to auto execution, async approval, synchronous approval, shadow mode, or rollback.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
    </marker>
    <style>
      .bg { fill: #f8f9fa; }
      .box { fill: #ffffff; stroke: #cfd8dc; stroke-width: 2; filter: url(#shadow); }
      .blue { fill: #e3f2fd; stroke: #1565c0; }
      .orange { fill: #fff3e0; stroke: #e65100; }
      .green { fill: #e8f5e9; stroke: #2e7d32; }
      .red { fill: #fce4ec; stroke: #c62828; }
      .purple { fill: #f3e5f5; stroke: #6a1b9a; }
      .title { font: 700 24px Arial, sans-serif; fill: #111827; }
      .label { font: 700 17px Arial, sans-serif; fill: #111827; }
      .small { font: 14px Arial, sans-serif; fill: #374151; }
      .tiny { font: 12px Arial, sans-serif; fill: #4b5563; }
      .arrow { stroke: #4b5563; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1120" height="620"/>
  <text class="title" x="48" y="48">Human-in-the-loop as runtime policy</text>
  <text class="small" x="48" y="76">The model can propose an action. The runtime decides how much autonomy that action gets.</text>

  <rect class="box blue" x="48" y="130" width="190" height="120" rx="8"/>
  <text class="label" x="72" y="164">Tool call</text>
  <text class="small" x="72" y="194">name: upgrade_user</text>
  <text class="small" x="72" y="216">effect: billing change</text>

  <rect class="box purple" x="310" y="112" width="250" height="156" rx="8"/>
  <text class="label" x="334" y="146">Policy classifier</text>
  <text class="small" x="334" y="176">risk: low / medium / high</text>
  <text class="small" x="334" y="198">confidence threshold</text>
  <text class="small" x="334" y="220">reversible?</text>
  <text class="small" x="334" y="242">autonomy level</text>

  <rect class="box green" x="650" y="70" width="250" height="92" rx="8"/>
  <text class="label" x="674" y="104">Auto-execute</text>
  <text class="small" x="674" y="132">Low risk, reversible, confident</text>

  <rect class="box orange" x="650" y="204" width="250" height="104" rx="8"/>
  <text class="label" x="674" y="238">Async approval</text>
  <text class="small" x="674" y="266">Medium risk; queue and resume</text>
  <text class="tiny" x="674" y="288">Slack, dashboard, ticket, email</text>

  <rect class="box red" x="650" y="350" width="250" height="104" rx="8"/>
  <text class="label" x="674" y="384">Synchronous stop</text>
  <text class="small" x="674" y="412">High risk, irreversible, uncertain</text>
  <text class="tiny" x="674" y="434">Ask before execution</text>

  <rect class="box blue" x="650" y="496" width="250" height="72" rx="8"/>
  <text class="label" x="674" y="528">Shadow mode</text>
  <text class="small" x="674" y="550">Log decision; no side effects</text>

  <rect class="box" x="970" y="178" width="80" height="256" rx="8"/>
  <text class="label" x="988" y="224" transform="rotate(90 988 224)">Audit log</text>
  <text class="tiny" x="1002" y="214" transform="rotate(90 1002 214)">decision, reason, actor, result</text>

  <rect class="box orange" x="310" y="372" width="250" height="112" rx="8"/>
  <text class="label" x="334" y="406">Saga record</text>
  <text class="small" x="334" y="434">forward action + compensation</text>
  <text class="small" x="334" y="456">rollback if health gets worse</text>

  <path class="arrow" d="M 238 190 L 310 190"/>
  <path class="arrow" d="M 560 172 C 600 140 610 116 650 116"/>
  <path class="arrow" d="M 560 206 C 604 220 612 256 650 256"/>
  <path class="arrow" d="M 560 226 C 608 270 610 398 650 402"/>
  <path class="arrow" d="M 560 248 C 600 332 610 526 650 532"/>
  <path class="arrow" d="M 775 162 C 760 290 620 330 560 394"/>
  <path class="arrow" d="M 900 116 C 936 116 940 240 970 250"/>
  <path class="arrow" d="M 900 256 L 970 278"/>
  <path class="arrow" d="M 900 402 L 970 332"/>
  <path class="arrow" d="M 900 532 C 948 526 936 382 970 360"/>
  <path class="arrow" d="M 435 372 C 430 318 420 292 420 268"/>
</svg>
