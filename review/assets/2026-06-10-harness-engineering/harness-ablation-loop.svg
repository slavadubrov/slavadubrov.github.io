<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="720" viewBox="0 0 1120 720" role="img" aria-labelledby="title desc">
  <title id="title">A paired ablation of one harness component</title>
  <desc id="desc">An observed resume failure motivates a progress-handoff hypothesis. A control with the handoff disabled and a treatment with it enabled run with the same model, checkout tasks, environment, grader, and total budget. Paired results determine whether the component is worth its cost.</desc>
  <rect width="1120" height="720" fill="#f8fafc"/>
  <rect x="28" y="24" width="1064" height="672" rx="24" fill="#ffffff" stroke="#d8e2e8" stroke-width="2"/>

  <text x="560" y="68" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#263238">Test one harness component at a time</text>
  <text x="560" y="99" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#546e7a">A progress handoff is useful only if the measured lift repays the work of writing and reading it.</text>

  <rect x="90" y="130" width="400" height="86" rx="12" fill="#fff3e0" stroke="#e65100" stroke-width="2"/>
  <text x="114" y="163" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#e65100">OBSERVED FAILURE</text>
  <text x="114" y="191" font-family="Inter, Arial, sans-serif" font-size="15" fill="#37474f">Resumed checkout runs repeat completed edits</text>

  <rect x="630" y="130" width="400" height="86" rx="12" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2"/>
  <text x="654" y="163" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#6a1b9a">HYPOTHESIS</text>
  <text x="654" y="191" font-family="Inter, Arial, sans-serif" font-size="15" fill="#37474f">A progress handoff cuts repeated work</text>

  <line x1="490" y1="173" x2="620" y2="173" stroke="#546e7a" stroke-width="2.5"/>
  <polygon points="620,167 630,173 620,179" fill="#546e7a"/>

  <rect x="90" y="250" width="940" height="62" rx="12" fill="#263238"/>
  <text x="560" y="276" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#90caf9">FIXED ACROSS BOTH VARIANTS</text>
  <text x="560" y="298" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#ffffff">Model | checkout tasks | environment | grader | token, time, and dollar budget</text>

  <line x1="360" y1="312" x2="301" y2="345" stroke="#546e7a" stroke-width="2.5"/>
  <polygon points="295,355 296,343 306,350" fill="#546e7a"/>
  <line x1="760" y1="312" x2="819" y2="345" stroke="#546e7a" stroke-width="2.5"/>
  <polygon points="825,355 814,350 824,343" fill="#546e7a"/>

  <rect x="90" y="355" width="410" height="145" rx="14" fill="#f5faff" stroke="#1565c0" stroke-width="2"/>
  <text x="116" y="390" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#1565c0">CONTROL</text>
  <text x="116" y="424" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700" fill="#263238">progress_handoff = false</text>
  <text x="116" y="458" font-family="Inter, Arial, sans-serif" font-size="14" fill="#546e7a">Resume from conversation and workspace state</text>
  <text x="116" y="481" font-family="Inter, Arial, sans-serif" font-size="13" fill="#546e7a">No structured cross-session handoff</text>

  <rect x="620" y="355" width="410" height="145" rx="14" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2"/>
  <text x="646" y="390" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#6a1b9a">TREATMENT</text>
  <text x="646" y="424" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700" fill="#263238">progress_handoff = true</text>
  <text x="646" y="458" font-family="Inter, Arial, sans-serif" font-size="14" fill="#546e7a">Resume from handoff and workspace state</text>
  <text x="646" y="481" font-family="Inter, Arial, sans-serif" font-size="13" fill="#546e7a">Branch, changed files, last check, next step</text>

  <line x1="295" y1="500" x2="442" y2="538" stroke="#546e7a" stroke-width="2.5"/>
  <polygon points="450,545 438,543 443,533" fill="#546e7a"/>
  <line x1="825" y1="500" x2="678" y2="538" stroke="#546e7a" stroke-width="2.5"/>
  <polygon points="670,545 677,533 682,543" fill="#546e7a"/>

  <rect x="300" y="545" width="520" height="82" rx="13" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="560" y="578" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#2e7d32">Compare paired results</text>
  <text x="560" y="605" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#37474f">Success | repeated actions | escaped defects | cost | wall time</text>

  <line x1="560" y1="627" x2="560" y2="640" stroke="#546e7a" stroke-width="2.5"/>
  <polygon points="554,640 560,650 566,640" fill="#546e7a"/>
  <rect x="300" y="650" width="520" height="34" rx="17" fill="#263238"/>
  <text x="560" y="672" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Keep the handoff only when its measured lift repays its cost</text>
</svg>
