<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">The agent harness control loop</title>
  <desc id="desc">A model sits inside a loop of context, tool execution, verification, durable state, and measurable guardrails. The outer harness decides what is visible, allowed, checked, and retained.</desc>
  <defs>
    <linearGradient id="modelFill" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f3e5f5"/>
      <stop offset="1" stop-color="#e8def5"/>
    </linearGradient>
    <linearGradient id="loopFill" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#e3f2fd"/>
      <stop offset="1" stop-color="#f6fbff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#263238" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#455a64"/>
    </marker>
    <marker id="loopArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1565c0"/>
    </marker>
  </defs>

  <rect width="1280" height="720" fill="#f8fafc"/>
  <rect x="28" y="24" width="1224" height="672" rx="24" fill="#ffffff" stroke="#d8e2e8" stroke-width="2"/>

  <text x="74" y="78" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700" fill="#263238">The control loop around a model call</text>
  <text x="74" y="109" font-family="Inter, Arial, sans-serif" font-size="16" fill="#546e7a">The model proposes an action. The harness decides what it can see, do, retain, and count as finished.</text>

  <rect x="75" y="150" width="1130" height="420" rx="26" fill="url(#loopFill)" stroke="#90caf9" stroke-width="2" stroke-dasharray="8 7"/>
  <text x="104" y="186" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#1565c0">HARNESS: executable context, control, feedback, and evidence</text>

  <path d="M 354 297 H 467" fill="none" stroke="#455a64" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M 706 297 H 804" fill="none" stroke="#455a64" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M 980 347 V 404" fill="none" stroke="#455a64" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M 804 462 H 706" fill="none" stroke="#455a64" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M 467 462 H 354" fill="none" stroke="#455a64" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M 214 404 V 347" fill="none" stroke="#455a64" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="105" y="235" width="250" height="113" rx="14" fill="#ffffff" stroke="#2980b9" stroke-width="2" filter="url(#shadow)"/>
  <text x="130" y="268" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#1565c0">1. Assemble context</text>
  <text x="130" y="294" font-family="Inter, Arial, sans-serif" font-size="14" fill="#37474f">Goal, repo map, policy, plan,</text>
  <text x="130" y="315" font-family="Inter, Arial, sans-serif" font-size="14" fill="#37474f">prior observations, state handoff</text>

  <rect x="467" y="218" width="239" height="158" rx="18" fill="url(#modelFill)" stroke="#6a1b9a" stroke-width="3" filter="url(#shadow)"/>
  <text x="586" y="268" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="700" fill="#6a1b9a">Model</text>
  <text x="586" y="299" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#37474f">Proposes the next action</text>
  <text x="586" y="322" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#37474f">or a final answer</text>
  <line x1="510" y1="341" x2="662" y2="341" stroke="#d8c4e6" stroke-width="1.5"/>
  <text x="586" y="361" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#6a1b9a">probabilistic judgment</text>

  <rect x="804" y="235" width="252" height="113" rx="14" fill="#ffffff" stroke="#e67e22" stroke-width="2" filter="url(#shadow)"/>
  <text x="830" y="268" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#e65100">2. Tool boundary</text>
  <text x="830" y="294" font-family="Inter, Arial, sans-serif" font-size="14" fill="#37474f">Validate input, enforce approval,</text>
  <text x="830" y="315" font-family="Inter, Arial, sans-serif" font-size="14" fill="#37474f">apply limits, execute action</text>

  <rect x="804" y="404" width="252" height="112" rx="14" fill="#ffffff" stroke="#27ae60" stroke-width="2" filter="url(#shadow)"/>
  <text x="830" y="438" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#2e7d32">3. Verify the artifact</text>
  <text x="830" y="464" font-family="Inter, Arial, sans-serif" font-size="14" fill="#37474f">Tests, lint, screenshots, review,</text>
  <text x="830" y="485" font-family="Inter, Arial, sans-serif" font-size="14" fill="#37474f">explicit acceptance criteria</text>

  <rect x="467" y="404" width="239" height="112" rx="14" fill="#ffffff" stroke="#c62828" stroke-width="2" filter="url(#shadow)"/>
  <text x="586" y="438" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#c62828">4. Check stopping rule</text>
  <text x="586" y="464" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#37474f">Continue, retry, escalate, or stop</text>
  <text x="586" y="485" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#37474f">based on the collected evidence</text>

  <rect x="105" y="404" width="250" height="112" rx="14" fill="#ffffff" stroke="#546e7a" stroke-width="2" filter="url(#shadow)"/>
  <text x="130" y="438" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#37474f">5. Persist evidence</text>
  <text x="130" y="464" font-family="Inter, Arial, sans-serif" font-size="14" fill="#37474f">Checkpoint, progress file, trace,</text>
  <text x="130" y="485" font-family="Inter, Arial, sans-serif" font-size="14" fill="#37474f">cost, failure reason, next step</text>

  <path d="M 1084 248 C 1155 284, 1155 466, 1084 503" fill="none" stroke="#1565c0" stroke-width="3" marker-end="url(#loopArrow)"/>
  <text x="1143" y="365" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#1565c0">repeat until</text>
  <text x="1143" y="385" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#1565c0">verified</text>

  <rect x="75" y="598" width="1130" height="63" rx="14" fill="#263238"/>
  <circle cx="109" cy="629" r="8" fill="#e67e22"/>
  <text x="129" y="635" font-family="Inter, Arial, sans-serif" font-size="15" fill="#ffffff">Hard guardrails: sandbox, budget, rate limit, trace, approval.</text>
  <circle cx="781" cy="629" r="8" fill="#27ae60"/>
  <text x="801" y="635" font-family="Inter, Arial, sans-serif" font-size="15" fill="#ffffff">Ablate with a fixed model and task suite.</text>
</svg>
