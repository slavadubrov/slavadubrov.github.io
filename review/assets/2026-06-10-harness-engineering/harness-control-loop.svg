<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">One checkout action through an agent harness</title>
  <desc id="desc">The harness assembles context, receives a model proposal, validates and authorizes it, executes the tool, verifies the artifact, decides whether to continue, and records evidence. A verified result can return to the user, while an incomplete run starts another turn.</desc>
  <rect width="1280" height="720" fill="#f8fafc"/>
  <rect x="28" y="24" width="1224" height="672" rx="24" fill="#ffffff" stroke="#d8e2e8" stroke-width="2"/>

  <text x="70" y="70" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700" fill="#263238">One proposed action, seven harness decisions</text>
  <text x="70" y="103" font-family="Inter, Arial, sans-serif" font-size="16" fill="#546e7a">The checkout edit can loop, stop for approval, or return only after the required evidence exists.</text>

  <rect x="60" y="132" width="1160" height="528" rx="22" fill="#f5faff" stroke="#90caf9" stroke-width="2" stroke-dasharray="8 7"/>
  <text x="88" y="166" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#1565c0">HARNESS OWNS EACH TRANSITION</text>

  <rect x="80" y="205" width="220" height="110" rx="13" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="102" y="240" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#1565c0">1. Assemble context</text>
  <text x="102" y="268" font-family="Inter, Arial, sans-serif" font-size="13" fill="#37474f">Task, repo rules, files, plan,</text>
  <text x="102" y="289" font-family="Inter, Arial, sans-serif" font-size="13" fill="#37474f">prior results, current handoff</text>

  <rect x="340" y="205" width="220" height="110" rx="13" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2"/>
  <text x="362" y="240" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#6a1b9a">2. Model proposes</text>
  <text x="362" y="268" font-family="Inter, Arial, sans-serif" font-size="13" fill="#37474f">Edit src/checkout.py</text>
  <text x="362" y="289" font-family="Inter, Arial, sans-serif" font-size="13" fill="#37474f">or return a final message</text>

  <rect x="600" y="205" width="220" height="110" rx="13" fill="#fff3e0" stroke="#e65100" stroke-width="2"/>
  <text x="622" y="240" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#e65100">3. Authorize call</text>
  <text x="622" y="268" font-family="Inter, Arial, sans-serif" font-size="13" fill="#37474f">Validate arguments, path,</text>
  <text x="622" y="289" font-family="Inter, Arial, sans-serif" font-size="13" fill="#37474f">permission, budget, retry class</text>

  <rect x="860" y="205" width="220" height="110" rx="13" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="882" y="240" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#1565c0">4. Execute tool</text>
  <text x="882" y="268" font-family="Inter, Arial, sans-serif" font-size="13" fill="#37474f">Runtime edits the sandbox</text>
  <text x="882" y="289" font-family="Inter, Arial, sans-serif" font-size="13" fill="#37474f">and returns a structured result</text>

  <line x1="300" y1="260" x2="330" y2="260" stroke="#455a64" stroke-width="2.5"/>
  <polygon points="330,254 340,260 330,266" fill="#455a64"/>
  <line x1="560" y1="260" x2="590" y2="260" stroke="#455a64" stroke-width="2.5"/>
  <polygon points="590,254 600,260 590,266" fill="#455a64"/>
  <line x1="820" y1="260" x2="850" y2="260" stroke="#455a64" stroke-width="2.5"/>
  <polygon points="850,254 860,260 850,266" fill="#455a64"/>

  <rect x="860" y="385" width="220" height="105" rx="13" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="882" y="420" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#2e7d32">5. Verify artifact</text>
  <text x="882" y="448" font-family="Inter, Arial, sans-serif" font-size="13" fill="#37474f">Unit test, browser checkout,</text>
  <text x="882" y="469" font-family="Inter, Arial, sans-serif" font-size="13" fill="#37474f">and explicit postconditions</text>

  <rect x="600" y="385" width="220" height="105" rx="13" fill="#ffebee" stroke="#c62828" stroke-width="2"/>
  <text x="622" y="420" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#c62828">6. Decide</text>
  <text x="622" y="448" font-family="Inter, Arial, sans-serif" font-size="13" fill="#37474f">Continue, retry, escalate,</text>
  <text x="622" y="469" font-family="Inter, Arial, sans-serif" font-size="13" fill="#37474f">or accept the collected evidence</text>

  <rect x="340" y="385" width="220" height="105" rx="13" fill="#eceff1" stroke="#546e7a" stroke-width="2"/>
  <text x="362" y="420" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#37474f">7. Record evidence</text>
  <text x="362" y="448" font-family="Inter, Arial, sans-serif" font-size="13" fill="#37474f">Trace, checkpoint, cost,</text>
  <text x="362" y="469" font-family="Inter, Arial, sans-serif" font-size="13" fill="#37474f">failure reason, next step</text>

  <line x1="970" y1="315" x2="970" y2="375" stroke="#455a64" stroke-width="2.5"/>
  <polygon points="964,375 970,385 976,375" fill="#455a64"/>
  <line x1="860" y1="438" x2="830" y2="438" stroke="#455a64" stroke-width="2.5"/>
  <polygon points="830,432 820,438 830,444" fill="#455a64"/>
  <line x1="600" y1="438" x2="570" y2="438" stroke="#455a64" stroke-width="2.5"/>
  <polygon points="570,432 560,438 570,444" fill="#455a64"/>
  <line x1="340" y1="438" x2="190" y2="438" stroke="#1565c0" stroke-width="2.5"/>
  <line x1="190" y1="438" x2="190" y2="325" stroke="#1565c0" stroke-width="2.5"/>
  <polygon points="184,325 190,315 196,325" fill="#1565c0"/>
  <text x="238" y="426" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#1565c0">next turn</text>

  <line x1="710" y1="490" x2="710" y2="525" stroke="#2e7d32" stroke-width="2.5"/>
  <polygon points="704,525 710,535 716,525" fill="#2e7d32"/>
  <text x="728" y="518" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#2e7d32">accept</text>
  <rect x="600" y="535" width="220" height="48" rx="24" fill="#2e7d32"/>
  <text x="710" y="565" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Return verified result</text>

  <rect x="90" y="605" width="1080" height="38" rx="10" fill="#263238"/>
  <text x="630" y="630" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#ffffff">Causal trace: proposal → authorization → execution → verification → acceptance</text>
</svg>
