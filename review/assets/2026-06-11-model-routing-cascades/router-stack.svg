<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">Model routing stack for agent fleets</title>
  <desc id="desc">An agent harness routes planner, tool, retrieval, and verifier steps through policy, cache, confidence checks, and model tiers.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#1f2937" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#455a64"/>
    </marker>
  </defs>
  <rect width="920" height="520" fill="#f8f9fa"/>
  <rect x="36" y="44" width="190" height="96" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" filter="url(#shadow)"/>
  <text x="131" y="82" font-family="Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#0d47a1">Agent harness</text>
  <text x="131" y="112" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#263238">plan, call tools, verify</text>

  <rect x="300" y="32" width="300" height="120" rx="8" fill="#ffffff" stroke="#90a4ae" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="62" font-family="Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#263238">Routing layer</text>
  <rect x="324" y="84" width="76" height="34" rx="6" fill="#fff3e0" stroke="#e67e22"/>
  <text x="362" y="106" font-family="Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#e65100">policy</text>
  <rect x="422" y="84" width="76" height="34" rx="6" fill="#e8f5e9" stroke="#27ae60"/>
  <text x="460" y="106" font-family="Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#1b5e20">cache</text>
  <rect x="520" y="84" width="56" height="34" rx="6" fill="#f3e5f5" stroke="#9b59b6"/>
  <text x="548" y="106" font-family="Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#6a1b9a">judge</text>

  <rect x="678" y="44" width="200" height="96" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="2" filter="url(#shadow)"/>
  <text x="778" y="78" font-family="Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#b71c1c">Escalation</text>
  <text x="778" y="106" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#263238">low confidence or failed validation</text>

  <line x1="226" y1="92" x2="296" y2="92" stroke="#455a64" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="600" y1="92" x2="674" y2="92" stroke="#455a64" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="70" y="226" width="160" height="74" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="2"/>
  <text x="150" y="256" font-family="Arial, sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#0d47a1">Planner step</text>
  <text x="150" y="280" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#455a64">high risk</text>

  <rect x="270" y="226" width="160" height="74" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="2"/>
  <text x="350" y="256" font-family="Arial, sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#0d47a1">Retrieval step</text>
  <text x="350" y="280" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#455a64">cheap if bounded</text>

  <rect x="490" y="226" width="160" height="74" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="2"/>
  <text x="570" y="256" font-family="Arial, sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#0d47a1">Tool step</text>
  <text x="570" y="280" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#455a64">schema checked</text>

  <rect x="690" y="226" width="160" height="74" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="2"/>
  <text x="770" y="256" font-family="Arial, sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#0d47a1">Verifier step</text>
  <text x="770" y="280" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#455a64">quality gate</text>

  <line x1="150" y1="140" x2="150" y2="220" stroke="#455a64" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="152" x2="350" y2="220" stroke="#455a64" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="548" y1="152" x2="570" y2="220" stroke="#455a64" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="778" y1="140" x2="770" y2="220" stroke="#455a64" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="76" y="380" width="190" height="70" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" filter="url(#shadow)"/>
  <text x="171" y="410" font-family="Arial, sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#4a148c">Frontier model</text>
  <text x="171" y="434" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#455a64">planner, hard tools, verifier</text>

  <rect x="365" y="380" width="190" height="70" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" filter="url(#shadow)"/>
  <text x="460" y="410" font-family="Arial, sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#0d47a1">Worker model</text>
  <text x="460" y="434" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#455a64">bounded execution steps</text>

  <rect x="654" y="380" width="190" height="70" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" filter="url(#shadow)"/>
  <text x="749" y="410" font-family="Arial, sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#1b5e20">Small model</text>
  <text x="749" y="434" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#455a64">classification, extraction, cacheable work</text>

  <line x1="150" y1="300" x2="171" y2="374" stroke="#455a64" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="350" y1="300" x2="460" y2="374" stroke="#455a64" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="570" y1="300" x2="460" y2="374" stroke="#455a64" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="770" y1="300" x2="749" y2="374" stroke="#455a64" stroke-width="2" marker-end="url(#arrow)"/>

  <path d="M749 380 C704 344, 626 342, 555 380" fill="none" stroke="#c62828" stroke-width="2.5" stroke-dasharray="7 6" marker-end="url(#arrow)"/>
  <path d="M460 380 C392 342, 313 342, 266 380" fill="none" stroke="#c62828" stroke-width="2.5" stroke-dasharray="7 6" marker-end="url(#arrow)"/>
  <text x="592" y="346" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#b71c1c">escalate only when needed</text>
</svg>
