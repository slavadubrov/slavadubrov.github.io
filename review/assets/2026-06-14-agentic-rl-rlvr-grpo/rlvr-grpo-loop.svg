<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">RLVR and GRPO loop for tool-use agents</title>
  <desc id="desc">A prompt is sampled into multiple tool-use trajectories. A verifier scores each trajectory. GRPO computes group-relative advantages and updates the policy.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#34495e"/>
    </marker>
    <style>
      .label { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2d3d; }
      .small { font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #34495e; }
      .mono { font: 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #2c3e50; }
      .box { rx: 8; filter: url(#shadow); stroke-width: 2; }
      .arrow { stroke: #34495e; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="980" height="520" fill="#f8f9fa"/>

  <rect class="box" x="40" y="205" width="160" height="100" fill="#e3f2fd" stroke="#1565c0"/>
  <text class="label" x="70" y="245">Prompt</text>
  <text class="small" x="62" y="274">same task, many</text>
  <text class="small" x="78" y="294">rollouts</text>

  <rect class="box" x="260" y="65" width="230" height="80" fill="#ffffff" stroke="#2980b9"/>
  <text class="label" x="296" y="100">Trajectory A</text>
  <text class="mono" x="287" y="125">tool(add, 7, 9) -> 16</text>

  <rect class="box" x="260" y="175" width="230" height="80" fill="#ffffff" stroke="#2980b9"/>
  <text class="label" x="296" y="210">Trajectory B</text>
  <text class="mono" x="286" y="235">tool(add, 7, 10) -> 17</text>

  <rect class="box" x="260" y="285" width="230" height="80" fill="#ffffff" stroke="#2980b9"/>
  <text class="label" x="296" y="320">Trajectory C</text>
  <text class="mono" x="293" y="345">&lt;tool&gt;...&lt;/tool&gt; -> 19</text>

  <rect class="box" x="260" y="395" width="230" height="70" fill="#ffffff" stroke="#2980b9"/>
  <text class="label" x="296" y="428">Trajectory D</text>
  <text class="mono" x="307" y="452">guess -> 14</text>

  <rect class="box" x="565" y="155" width="180" height="190" fill="#e8f5e9" stroke="#2e7d32"/>
  <text class="label" x="610" y="192">Verifier</text>
  <text class="small" x="596" y="225">execute tools</text>
  <text class="small" x="596" y="249">check final state</text>
  <text class="small" x="596" y="273">reject shortcuts</text>
  <line x1="590" y1="294" x2="720" y2="294" stroke="#81c784" stroke-width="2"/>
  <text class="mono" x="604" y="321">[1.1, 0.0,</text>
  <text class="mono" x="612" y="340">0.0, 0.0]</text>

  <rect class="box" x="810" y="165" width="135" height="170" fill="#f3e5f5" stroke="#6a1b9a"/>
  <text class="label" x="846" y="202">GRPO</text>
  <text class="small" x="837" y="233">normalize</text>
  <text class="small" x="837" y="256">within group</text>
  <text class="small" x="837" y="279">update policy</text>
  <text class="mono" x="836" y="314">A = z(r)</text>

  <path class="arrow" d="M200 255 C230 255, 230 105, 260 105"/>
  <path class="arrow" d="M200 255 C232 255, 232 215, 260 215"/>
  <path class="arrow" d="M200 255 C232 255, 232 325, 260 325"/>
  <path class="arrow" d="M200 255 C230 255, 230 430, 260 430"/>

  <path class="arrow" d="M490 105 C535 105, 535 210, 565 210"/>
  <path class="arrow" d="M490 215 C535 215, 535 235, 565 235"/>
  <path class="arrow" d="M490 325 C535 325, 535 265, 565 265"/>
  <path class="arrow" d="M490 430 C535 430, 535 315, 565 315"/>

  <path class="arrow" d="M745 250 L810 250"/>
  <path class="arrow" d="M877 165 C877 55, 120 55, 120 205"/>
  <text class="small" x="383" y="43">updated policy samples the next group</text>

  <rect x="54" y="36" width="210" height="60" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="2"/>
  <text class="small" x="72" y="61">If the verifier checks only</text>
  <text class="small" x="72" y="82">format, C becomes the winner.</text>
</svg>
