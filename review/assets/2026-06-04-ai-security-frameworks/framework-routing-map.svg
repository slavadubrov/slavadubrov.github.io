<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" font-family="Inter, Segoe UI, Arial, sans-serif" role="img" aria-label="AI security framework routing map">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#555" />
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.14" />
    </filter>
  </defs>

  <rect width="980" height="560" fill="#f8f9fa" />
  <text x="490" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#1f2937">AI security frameworks as an engineering routing table</text>
  <text x="490" y="70" text-anchor="middle" font-size="14" fill="#4b5563">Start with the decision you need to make, then pick the framework with the right granularity.</text>

  <rect x="48" y="120" width="200" height="320" rx="8" fill="#ffffff" stroke="#d1d5db" filter="url(#shadow)" />
  <text x="148" y="150" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">Engineering question</text>
  <g font-size="13" fill="#374151">
    <text x="72" y="190">What can go wrong?</text>
    <text x="72" y="232">How would an attacker chain it?</text>
    <text x="72" y="274">Where does it live in the stack?</text>
    <text x="72" y="316">Which control/evidence proves it?</text>
    <text x="72" y="358">What must a human override?</text>
    <text x="72" y="400">How should agents identify?</text>
  </g>

  <line x1="248" y1="280" x2="310" y2="280" stroke="#555" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="310" y="100" width="360" height="360" rx="8" fill="#ffffff" stroke="#d1d5db" filter="url(#shadow)" />
  <text x="490" y="130" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">Use the framework for its job</text>

  <g>
    <rect x="340" y="158" width="300" height="42" rx="6" fill="#e3f2fd" stroke="#1565c0" />
    <text x="490" y="183" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">OWASP LLM / Agentic / MCP: risk names</text>

    <rect x="340" y="212" width="300" height="42" rx="6" fill="#fff3e0" stroke="#e65100" />
    <text x="490" y="237" text-anchor="middle" font-size="13" font-weight="700" fill="#e65100">MITRE ATLAS: attacker behavior</text>

    <rect x="340" y="266" width="300" height="42" rx="6" fill="#f3e5f5" stroke="#6a1b9a" />
    <text x="490" y="291" text-anchor="middle" font-size="13" font-weight="700" fill="#6a1b9a">CSA MAESTRO: architecture layers</text>

    <rect x="340" y="320" width="300" height="42" rx="6" fill="#e8f5e9" stroke="#2e7d32" />
    <text x="490" y="345" text-anchor="middle" font-size="13" font-weight="700" fill="#2e7d32">NIST / CSA AICM: controls and evidence</text>

    <rect x="340" y="374" width="300" height="42" rx="6" fill="#fce4ec" stroke="#c62828" />
    <text x="490" y="399" text-anchor="middle" font-size="13" font-weight="700" fill="#c62828">EU AI Act / IETF drafts: product constraints</text>
  </g>

  <line x1="670" y1="280" x2="732" y2="280" stroke="#555" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="732" y="120" width="200" height="320" rx="8" fill="#ffffff" stroke="#d1d5db" filter="url(#shadow)" />
  <text x="832" y="150" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">Architecture output</text>
  <g font-size="13" fill="#374151">
    <text x="756" y="190">Threat model</text>
    <text x="756" y="232">Control owners</text>
    <text x="756" y="274">Telemetry plan</text>
    <text x="756" y="316">Permission model</text>
    <text x="756" y="358">Human stop path</text>
    <text x="756" y="400">Audit evidence</text>
  </g>

  <rect x="84" y="480" width="812" height="44" rx="8" fill="#fffde7" stroke="#f9a825" />
  <text x="490" y="507" text-anchor="middle" font-size="14" font-weight="600" fill="#7a4f01">Do not flatten the frameworks into one giant checklist. Route each decision to the framework that can answer it.</text>
</svg>
