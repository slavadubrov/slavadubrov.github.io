<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Agent autonomy levels and control plane</title>
  <desc id="desc">Diagram showing five autonomy levels for agents and the runtime controls that govern them.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#90a4ae" flood-opacity="0.25"/>
    </filter>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef5fb"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>

  <text x="70" y="70" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#16324f">
    Human oversight is a runtime, not a modal dialog
  </text>
  <text x="70" y="104" font-family="Arial, sans-serif" font-size="18" fill="#49657f">
    Pick the autonomy level first, then attach the approval, checkpoint, and rollback machinery that enforces it.
  </text>

  <rect x="70" y="140" width="500" height="530" rx="24" fill="#ffffff" stroke="#d6e3ef" filter="url(#shadow)"/>
  <text x="100" y="188" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1565c0">
    Five autonomy levels
  </text>

  <g font-family="Arial, sans-serif">
    <rect x="100" y="215" width="440" height="72" rx="16" fill="#e3f2fd"/>
    <text x="122" y="247" font-size="20" font-weight="700" fill="#0d47a1">L1 User as operator</text>
    <text x="122" y="272" font-size="16" fill="#35516b">Agent acts only when explicitly invoked and constrained.</text>

    <rect x="100" y="300" width="440" height="72" rx="16" fill="#dff3ff"/>
    <text x="122" y="332" font-size="20" font-weight="700" fill="#0d47a1">L2 User as collaborator</text>
    <text x="122" y="357" font-size="16" fill="#35516b">Human and agent trade short loops of action and feedback.</text>

    <rect x="100" y="385" width="440" height="72" rx="16" fill="#eef7e8"/>
    <text x="122" y="417" font-size="20" font-weight="700" fill="#2e7d32">L3 User as consultant</text>
    <text x="122" y="442" font-size="16" fill="#35516b">Agent works independently but asks targeted questions.</text>

    <rect x="100" y="470" width="440" height="72" rx="16" fill="#fff3e0"/>
    <text x="122" y="502" font-size="20" font-weight="700" fill="#e65100">L4 User as approver</text>
    <text x="122" y="527" font-size="16" fill="#35516b">Risky actions pause for approve, reject, or edit.</text>

    <rect x="100" y="555" width="440" height="72" rx="16" fill="#fce4ec"/>
    <text x="122" y="587" font-size="20" font-weight="700" fill="#b71c1c">L5 User as observer</text>
    <text x="122" y="612" font-size="16" fill="#35516b">Agent runs end to end; human monitors logs and off-switch.</text>
  </g>

  <rect x="620" y="140" width="510" height="530" rx="24" fill="#ffffff" stroke="#d6e3ef" filter="url(#shadow)"/>
  <text x="650" y="188" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1565c0">
    Control plane that enforces the level
  </text>

  <g font-family="Arial, sans-serif">
    <rect x="650" y="220" width="450" height="82" rx="18" fill="#f3e5f5"/>
    <text x="675" y="252" font-size="20" font-weight="700" fill="#6a1b9a">1. Tool approval gates</text>
    <text x="675" y="278" font-size="16" fill="#4b5c6d">Pause before consequential writes, external actions, or expensive runs.</text>

    <rect x="650" y="322" width="450" height="82" rx="18" fill="#e3f2fd"/>
    <text x="675" y="354" font-size="20" font-weight="700" fill="#1565c0">2. Interrupt + durable checkpoint</text>
    <text x="675" y="380" font-size="16" fill="#4b5c6d">Persist state so humans can review, edit, and resume later.</text>

    <rect x="650" y="424" width="450" height="82" rx="18" fill="#e8f5e9"/>
    <text x="675" y="456" font-size="20" font-weight="700" fill="#2e7d32">3. Clarification and escalation</text>
    <text x="675" y="482" font-size="16" fill="#4b5c6d">The agent should stop when confidence drops or intent is ambiguous.</text>

    <rect x="650" y="526" width="450" height="82" rx="18" fill="#fff3e0"/>
    <text x="675" y="558" font-size="20" font-weight="700" fill="#e65100">4. Rollback and autonomy budget</text>
    <text x="675" y="584" font-size="16" fill="#4b5c6d">Undo bad actions and tighten supervision when risk signals spike.</text>
  </g>

  <path d="M570 395 C620 395, 620 395, 650 395" fill="none" stroke="#90a4ae" stroke-width="4" stroke-dasharray="10 8"/>
  <polygon points="645,385 665,395 645,405" fill="#90a4ae"/>

  <text x="70" y="716" font-family="Arial, sans-serif" font-size="15" fill="#6a7f92">
    Sources behind the model: Knight autonomy levels, Anthropic field data, OpenAI Agents SDK, LangGraph interrupts, Google SRE error budgets, STRATUS rollback.
  </text>
</svg>
