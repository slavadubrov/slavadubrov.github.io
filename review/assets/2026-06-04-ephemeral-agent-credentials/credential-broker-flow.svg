<svg width="1120" height="560" viewBox="0 0 1120 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Credential broker flow for AI agents</title>
  <desc id="desc">A credential broker verifies agent identity, checks policy, optionally requests human approval, and mints a short-lived scoped token for a specific tool call.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f3a45"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1120" height="560" fill="#f8f9fa"/>

  <text x="560" y="46" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#1f2933">Brokered credentials for an agent tool call</text>
  <text x="560" y="76" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#4b5563">The agent proves who it is. The broker decides what it may do. The tool receives a bounded token, not the agent's permanent key.</text>

  <g filter="url(#shadow)">
    <rect x="44" y="142" width="180" height="124" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
    <text x="134" y="176" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#1565c0">Agent runtime</text>
    <text x="134" y="208" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#1f2933">task id</text>
    <text x="134" y="228" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#1f2933">sandbox id</text>
    <text x="134" y="248" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#1f2933">agent identity proof</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="312" y="132" width="222" height="144" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2"/>
    <text x="423" y="166" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#6a1b9a">Credential broker</text>
    <text x="423" y="198" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#1f2933">validates WIMSE/SPIFFE ID</text>
    <text x="423" y="218" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#1f2933">evaluates policy</text>
    <text x="423" y="238" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#1f2933">mints scoped token</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="620" y="142" width="194" height="124" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="2"/>
    <text x="717" y="176" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#e65100">Approval gate</text>
    <text x="717" y="208" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#1f2933">CIBA or internal workflow</text>
    <text x="717" y="228" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#1f2933">RAR payload explains action</text>
    <text x="717" y="248" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#1f2933">approve, deny, or expire</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="900" y="132" width="178" height="144" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
    <text x="989" y="166" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#2e7d32">Tool or API</text>
    <text x="989" y="198" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#1f2933">audience-bound token</text>
    <text x="989" y="218" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#1f2933">short TTL</text>
    <text x="989" y="238" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#1f2933">least required scope</text>
  </g>

  <path d="M224 204 H300" stroke="#2f3a45" stroke-width="2.5" marker-end="url(#arrow)" fill="none"/>
  <text x="262" y="190" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#2f3a45">1. request tool token</text>

  <path d="M534 184 H610" stroke="#2f3a45" stroke-width="2.5" marker-end="url(#arrow)" fill="none"/>
  <text x="572" y="170" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#2f3a45">2. risky action</text>

  <path d="M620 226 H544" stroke="#2f3a45" stroke-width="2.5" marker-end="url(#arrow)" fill="none"/>
  <text x="582" y="248" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#2f3a45">3. decision</text>

  <path d="M534 322 C650 360, 762 360, 900 322" stroke="#2f3a45" stroke-width="2.5" marker-end="url(#arrow)" fill="none"/>
  <text x="717" y="388" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#2f3a45">4. DPoP-bound or audience-bound access token</text>

  <path d="M900 246 C760 450, 304 450, 180 272" stroke="#c62828" stroke-width="2" stroke-dasharray="7 6" marker-end="url(#arrow)" fill="none"/>
  <text x="540" y="480" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#c62828">No static secret returns to the agent. Logs record identity, scope, resource, approval, and expiry.</text>

  <g filter="url(#shadow)">
    <rect x="312" y="356" width="222" height="86" rx="8" fill="#ffffff" stroke="#bec2c8" stroke-width="1.5"/>
    <text x="423" y="386" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#1f2933">Policy inputs</text>
    <text x="423" y="414" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#4b5563">agent id, user id, task, tool,</text>
    <text x="423" y="434" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#4b5563">sandbox, risk, requested scope</text>
  </g>

  <path d="M423 356 V286" stroke="#2f3a45" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
</svg>
