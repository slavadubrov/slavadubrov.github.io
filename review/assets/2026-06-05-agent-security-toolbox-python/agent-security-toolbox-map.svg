<svg width="1100" height="620" viewBox="0 0 1100 620" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI agent security tools by boundary</title>
  <desc id="desc">A diagram mapping runtime guardrails, red-team runners, MCP scanners, and sandboxes to the AI agent boundaries they protect.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#455a64"/>
    </marker>
    <style>
      .title { font: 700 26px Arial, sans-serif; fill: #1f2933; }
      .subtitle { font: 15px Arial, sans-serif; fill: #52616b; }
      .label { font: 700 17px Arial, sans-serif; fill: #1f2933; }
      .small { font: 14px Arial, sans-serif; fill: #334e68; }
      .tiny { font: 12px Arial, sans-serif; fill: #52616b; }
      .box { rx: 8; filter: url(#shadow); stroke-width: 2; }
    </style>
  </defs>

  <rect x="0" y="0" width="1100" height="620" fill="#f8f9fa"/>
  <text x="55" y="55" class="title">AI agent security tools protect different boundaries</text>
  <text x="55" y="82" class="subtitle">Install by failure mode, not by category name.</text>

  <rect x="55" y="130" width="205" height="330" class="box" fill="#e3f2fd" stroke="#2980b9"/>
  <text x="80" y="168" class="label">Model-call boundary</text>
  <text x="80" y="198" class="small">Prompt, retrieval,</text>
  <text x="80" y="220" class="small">reasoning, output</text>
  <line x1="84" y1="245" x2="230" y2="245" stroke="#90caf9" stroke-width="2"/>
  <text x="80" y="278" class="small">LlamaFirewall</text>
  <text x="80" y="303" class="small">NeMo Guardrails</text>
  <text x="80" y="328" class="small">LLM Guard</text>
  <text x="80" y="353" class="small">Guardrails AI</text>
  <text x="80" y="378" class="small">OpenAI Guardrails</text>
  <text x="80" y="425" class="tiny">Blocks or flags text</text>

  <rect x="315" y="130" width="205" height="330" class="box" fill="#fff3e0" stroke="#e67e22"/>
  <text x="340" y="168" class="label">Test boundary</text>
  <text x="340" y="198" class="small">Adversarial probes,</text>
  <text x="340" y="220" class="small">release evidence</text>
  <line x1="344" y1="245" x2="490" y2="245" stroke="#ffcc80" stroke-width="2"/>
  <text x="340" y="278" class="small">PyRIT</text>
  <text x="340" y="303" class="small">garak</text>
  <text x="340" y="328" class="small">Promptfoo</text>
  <text x="340" y="353" class="small">DeepTeam</text>
  <text x="340" y="425" class="tiny">Finds failures before users</text>

  <rect x="575" y="130" width="205" height="330" class="box" fill="#f3e5f5" stroke="#8e24aa"/>
  <text x="600" y="168" class="label">Supply-chain boundary</text>
  <text x="600" y="198" class="small">MCP configs, skills,</text>
  <text x="600" y="220" class="small">tool descriptions</text>
  <line x1="604" y1="245" x2="750" y2="245" stroke="#ce93d8" stroke-width="2"/>
  <text x="600" y="278" class="small">Snyk Agent Scan</text>
  <text x="600" y="303" class="small">Cisco MCP Scanner</text>
  <text x="600" y="425" class="tiny">Inspects what the agent loads</text>

  <rect x="835" y="130" width="205" height="330" class="box" fill="#e8f5e9" stroke="#2e7d32"/>
  <text x="860" y="168" class="label">Execution boundary</text>
  <text x="860" y="198" class="small">Shell, code, packages,</text>
  <text x="860" y="220" class="small">browser automation</text>
  <line x1="864" y1="245" x2="1010" y2="245" stroke="#a5d6a7" stroke-width="2"/>
  <text x="860" y="278" class="small">E2B</text>
  <text x="860" y="303" class="small">microsandbox</text>
  <text x="860" y="425" class="tiny">Contains side effects</text>

  <path d="M260 295 H315" stroke="#455a64" stroke-width="2.5" marker-end="url(#arrow)" fill="none"/>
  <path d="M520 295 H575" stroke="#455a64" stroke-width="2.5" marker-end="url(#arrow)" fill="none"/>
  <path d="M780 295 H835" stroke="#455a64" stroke-width="2.5" marker-end="url(#arrow)" fill="none"/>

  <rect x="105" y="505" width="890" height="58" rx="8" fill="#ffffff" stroke="#cfd8dc" stroke-width="2"/>
  <text x="130" y="538" class="label">Rule:</text>
  <text x="182" y="538" class="small">a guardrail is not a red-team suite, a red-team suite is not an MCP scanner, and neither is a sandbox.</text>
</svg>
