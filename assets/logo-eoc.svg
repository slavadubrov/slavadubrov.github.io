<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Edge of Context">
  <style>
    .frame { fill: none; stroke: #17211b; }
    .edge { fill: none; stroke: #0b6b45; }
    .token { fill: #0b6b45; }
    .ghost { fill: #59645e; opacity: 0.45; }
    @media (prefers-color-scheme: dark) {
      .frame { stroke: #edf5f0; }
      .edge { stroke: #71d6a8; }
      .token { fill: #71d6a8; }
      .ghost { fill: #a8b8af; }
    }
  </style>
  <title>Edge of Context</title>

  <!-- Context window -->
  <rect class="frame" x="8.5" y="8.5" width="47" height="47" rx="11" stroke-width="5"/>

  <!-- The edge: everything right of it is out of context -->
  <line class="edge" x1="42" y1="8.5" x2="42" y2="55.5" stroke-width="5"/>

  <!-- Tokens inside the context window -->
  <g class="token">
    <circle cx="16.5" cy="20" r="4.2"/>
    <circle cx="25.5" cy="20" r="4.2"/>
    <circle cx="34.5" cy="20" r="4.2"/>
    <circle cx="16.5" cy="32" r="4.2"/>
    <circle cx="25.5" cy="32" r="4.2"/>
    <circle cx="34.5" cy="32" r="4.2"/>
    <circle cx="16.5" cy="44" r="4.2"/>
    <circle cx="25.5" cy="44" r="4.2"/>
    <circle cx="34.5" cy="44" r="4.2"/>
  </g>

  <!-- Faded tokens beyond the edge -->
  <g class="ghost">
    <circle cx="49" cy="20" r="3"/>
    <circle cx="49" cy="32" r="3"/>
    <circle cx="49" cy="44" r="3"/>
  </g>
</svg>
