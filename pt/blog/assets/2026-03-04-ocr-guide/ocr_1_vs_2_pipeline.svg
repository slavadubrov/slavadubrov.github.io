<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Background grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#f0f0f0" stroke-width="1" />
    </pattern>

    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.1" />
    </filter>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Gradients -->
    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3498db" />
      <stop offset="100%" stop-color="#2980b9" />
    </linearGradient>
    <linearGradient id="gradOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e67e22" />
      <stop offset="100%" stop-color="#d35400" />
    </linearGradient>
    <linearGradient id="gradGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2ecc71" />
      <stop offset="100%" stop-color="#27ae60" />
    </linearGradient>
    <linearGradient id="gradPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9b59b6" />
      <stop offset="100%" stop-color="#8e44ad" />
    </linearGradient>

    <!-- Arrow head -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7f8c8d" />
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3498db" />
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9b59b6" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff" />
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Title -->
  <text x="400" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">OCR-1.0 vs OCR-2.0</text>
  <text x="400" y="65" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#7f8c8d" text-anchor="middle">A mudança arquitetural de pipelines modulares para modelos end-to-end</text>

  <!-- Section 1: Traditional Pipeline -->
  <rect x="50" y="100" width="700" height="150" rx="8" fill="#f8f9fa" stroke="#e0e0e0" stroke-width="2" />
  <text x="70" y="125" font-family="monospace" font-size="14" font-weight="bold" fill="#7f8c8d">OCR-1.0: Pipeline modular (ex.: Tesseract, PaddleOCR)</text>

  <!-- Input Doc -->
  <g transform="translate(60, 150)">
    <rect width="80" height="80" rx="4" fill="#ffffff" stroke="#bdc3c7" stroke-width="2" filter="url(#shadow)" />
    <rect x="15" y="15" width="50" height="8" rx="2" fill="#bdc3c7" />
    <rect x="15" y="30" width="50" height="8" rx="2" fill="#bdc3c7" />
    <rect x="15" y="45" width="30" height="8" rx="2" fill="#bdc3c7" />
    <text x="40" y="95" font-family="sans-serif" font-size="12" fill="#7f8c8d" text-anchor="middle">Documento</text>
  </g>

  <!-- Arrow -->
  <path d="M 150 190 L 180 190" fill="none" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Step 1: Detect -->
  <g transform="translate(190, 150)">
    <rect width="100" height="80" rx="4" fill="url(#gradBlue)" stroke="#2980b9" stroke-width="2" filter="url(#shadow)" />
    <text x="50" y="35" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Deteção</text>
    <text x="50" y="55" font-family="sans-serif" font-size="10" fill="#f0f0f0" text-anchor="middle">CRAFT / DBNet</text>
    <text x="50" y="70" font-family="sans-serif" font-size="10" fill="#f0f0f0" text-anchor="middle">YOLO</text>
    <text x="50" y="-10" font-family="sans-serif" font-size="12" fill="#e74c3c" text-anchor="middle">Os erros acumulam-se</text>
  </g>

  <!-- Arrow -->
  <path d="M 300 190 L 330 190" fill="none" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Step 2: Recognize -->
  <g transform="translate(340, 150)">
    <rect width="100" height="80" rx="4" fill="url(#gradBlue)" stroke="#2980b9" stroke-width="2" filter="url(#shadow)" />
    <text x="50" y="35" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Reconhecimento</text>
    <text x="50" y="55" font-family="sans-serif" font-size="10" fill="#f0f0f0" text-anchor="middle">CRNN / SVTR</text>
    <text x="50" y="70" font-family="sans-serif" font-size="10" fill="#f0f0f0" text-anchor="middle">Descodificação CTC</text>
    <text x="50" y="-10" font-family="sans-serif" font-size="12" fill="#e74c3c" text-anchor="middle">Os erros acumulam-se</text>
  </g>

  <!-- Arrow -->
  <path d="M 450 190 L 480 190" fill="none" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Step 3: Post-processing -->
  <g transform="translate(490, 150)">
    <rect width="100" height="80" rx="4" fill="url(#gradBlue)" stroke="#2980b9" stroke-width="2" filter="url(#shadow)" />
    <text x="50" y="35" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Pós-processamento</text>
    <text x="50" y="55" font-family="sans-serif" font-size="10" fill="#f0f0f0" text-anchor="middle">Correção ortográfica</text>
    <text x="50" y="70" font-family="sans-serif" font-size="10" fill="#f0f0f0" text-anchor="middle">Correção LM</text>
  </g>

  <!-- Arrow -->
  <path d="M 600 190 L 630 190" fill="none" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Output -->
  <g transform="translate(640, 150)">
    <rect width="80" height="80" rx="4" fill="#e8f5e9" stroke="#27ae60" stroke-width="2" filter="url(#shadow)" />
    <text x="40" y="35" font-family="monospace" font-size="12" fill="#2d3436" text-anchor="middle">Texto</text>
    <text x="40" y="55" font-family="monospace" font-size="12" fill="#2d3436" text-anchor="middle">simples</text>
    <text x="40" y="95" font-family="sans-serif" font-size="12" fill="#27ae60" font-weight="bold" text-anchor="middle">Até 20% falham</text>
  </g>


  <!-- Section 2: VLM Pipeline -->
  <rect x="50" y="300" width="700" height="150" rx="8" fill="#f3e5f5" stroke="#ce93d8" stroke-width="2" />
  <text x="70" y="325" font-family="monospace" font-size="14" font-weight="bold" fill="#8e44ad">OCR-2.0: VLM end-to-end (ex.: Gemini, Qwen-VL, dots.ocr)</text>

  <!-- Input Doc -->
  <g transform="translate(60, 350)">
    <rect width="80" height="80" rx="4" fill="#ffffff" stroke="#bdc3c7" stroke-width="2" filter="url(#shadow)" />
    <rect x="15" y="15" width="50" height="8" rx="2" fill="#bdc3c7" />
    <rect x="15" y="30" width="50" height="8" rx="2" fill="#bdc3c7" />
    <rect x="15" y="45" width="30" height="8" rx="2" fill="#bdc3c7" />
    <text x="40" y="95" font-family="sans-serif" font-size="12" fill="#7f8c8d" text-anchor="middle">Documento</text>
  </g>

  <!-- Arrow -->
  <path d="M 150 390 L 260 390" fill="none" stroke="#9b59b6" stroke-width="3" marker-end="url(#arrowPurple)" />

  <!-- VLM Block -->
  <g transform="translate(270, 340)">
    <rect width="320" height="100" rx="8" fill="url(#gradPurple)" stroke="#6a1b9a" stroke-width="2" filter="url(#shadow)" />

    <!-- Vision Encoder -->
    <rect x="25" y="30" width="110" height="40" rx="4" fill="#ffffff" fill-opacity="0.2" stroke="#ffffff" stroke-width="1" />
    <text x="80" y="55" font-family="sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Encoder de visão</text>

    <!-- Connector -->
    <path d="M 145 50 L 175 50" fill="none" stroke="#ffffff" stroke-width="2" stroke-dasharray="4,2" />

    <!-- LLM Decoder -->
    <rect x="185" y="30" width="110" height="40" rx="4" fill="#ffffff" fill-opacity="0.2" stroke="#ffffff" stroke-width="1" />
    <text x="240" y="55" font-family="sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Decoder LLM</text>

    <text x="160" y="90" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Perceção e raciocínio conjuntos</text>
  </g>

  <!-- Arrow -->
  <path d="M 600 390 L 630 390" fill="none" stroke="#9b59b6" stroke-width="3" marker-end="url(#arrowPurple)" />

  <!-- Output -->
  <g transform="translate(640, 350)">
    <rect width="80" height="80" rx="4" fill="#e8f5e9" stroke="#27ae60" stroke-width="2" filter="url(#shadow)" />
    <text x="40" y="35" font-family="monospace" font-size="12" fill="#2d3436" text-anchor="middle">JSON /</text>
    <text x="40" y="55" font-family="monospace" font-size="12" fill="#2d3436" text-anchor="middle">Markdown</text>
    <text x="40" y="95" font-family="sans-serif" font-size="12" fill="#27ae60" font-weight="bold" text-anchor="middle">Acc 3-4x maior</text>
  </g>

</svg>
