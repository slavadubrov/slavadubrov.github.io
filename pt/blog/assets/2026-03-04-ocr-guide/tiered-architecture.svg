<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" font-family="Inter, system-ui, sans-serif'Segoe UI', Roboto, Helvetica, Arial, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">OCR de Produção: Arquitetura em Camadas</title>
  <desc id="artifact-desc">OCR de Produção: Arquitetura em Camadas.</desc>
  <!-- Background -->
  <rect width="880" height="480" fill="#f8fafc" rx="8" />
  <defs>
    <!-- Background grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width="1" />
    </pattern>

    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>

    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="gradOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ea580c" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <linearGradient id="gradPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>

    <!-- Arrow markers -->
    <marker id="arrow1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a" />
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ea580c" />
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="100%" height="100%" fill="#f8fafc" />

  <!-- Title -->
  <text y="32" font-size="20" font-weight="bold" fill="#1d4ed8" text-anchor="middle" x="440">OCR de Produção: Arquitetura em Camadas</text>
  <text y="52" font-size="13" fill="#64748b" text-anchor="middle" x="440">Roteamento baseado em confiança para otimização de custos e velocidade</text>

  <!-- Input -->
  <g transform="translate(20, 195)">
    <rect width="100" height="70" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
    <text y="27" font-size="12" font-weight="bold" fill="#1d4ed8" text-anchor="middle" x="50">Entrante</text>
    <text y="43" font-size="12" font-weight="bold" fill="#1d4ed8" text-anchor="middle" x="50">Documentos</text>
    <text y="59" font-size="9" fill="#64748b" text-anchor="middle" x="50">PDF, imagens</text>
  </g>

  <!-- Arrow to preprocessing -->
  <line x1="120" y1="230" x2="155" y2="230" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow1)" />

  <!-- Preprocessing -->
  <g transform="translate(155, 190)">
    <rect width="110" height="80" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)" />
    <text y="25" font-size="12" font-weight="bold" fill="#1d4ed8" text-anchor="middle" x="55">Pré-processamento</text>
    <text y="42" font-size="10" fill="#64748b" text-anchor="middle" x="55">Desalinhamento, binarização</text>
    <text y="55" font-size="10" fill="#64748b" text-anchor="middle" x="55">Normalizar DPI</text>
    <text y="68" font-size="10" fill="#64748b" text-anchor="middle" x="55">Trabalhadores da CPU</text>
  </g>


  <!-- TIER 1: Fast/Cheap -->
  <g transform="translate(310, 65)">
    <rect width="160" height="100" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
    <rect width="160" height="30" rx="8" fill="url(#gradBlue)" clip-path="inset(0 0 70px 0)" />
    <path d="M0,20 L160,20 L160,30 L0,30 Z" fill="url(#gradBlue)" />
    <text y="20" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle" x="80">Nível 1: Rápido + Grátis</text>

    <text y="50" font-size="11" font-weight="bold" fill="#1d4ed8" text-anchor="middle" x="80">PaddleOCR / Tesseract</text>
    <text y="65" font-size="10" fill="#64748b" text-anchor="middle" x="80">Somente CPU, &lt;50ms/página</text>
    <text y="80" font-size="10" fill="#64748b" text-anchor="middle" x="80">O melhor para documentos impressos de alta qualidade</text>
    <text y="94" font-size="10" font-weight="bold" fill="#166534" text-anchor="middle" x="80">Cerca de 80% dos documentos</text>
  </g>

  <!-- TIER 2: Mid-tier VLM -->
  <g transform="translate(310, 180)">
    <rect width="160" height="100" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="2" filter="url(#shadow)" />
    <rect width="160" height="30" rx="8" fill="url(#gradOrange)" clip-path="inset(0 0 70px 0)" />
    <path d="M0,20 L160,20 L160,30 L0,30 Z" fill="url(#gradOrange)" />
    <text y="20" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle" x="80">Nível 2: Nível Intermediário</text>

    <text y="50" font-size="11" font-weight="bold" fill="#9a3412" text-anchor="middle" x="80">Qwen3-VL / dots.ocr</text>
    <text y="65" font-size="10" fill="#64748b" text-anchor="middle" x="80">ou Gemini 3 Flash</text>
    <text y="80" font-size="10" fill="#64748b" text-anchor="middle" x="80">200-500 ms/página</text>
    <text y="94" font-size="10" font-weight="bold" fill="#9a3412" text-anchor="middle" x="80">Cerca de 15% dos documentos</text>
  </g>

  <!-- TIER 3: Premium VLM -->
  <g transform="translate(310, 295)">
    <rect width="160" height="100" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)" />
    <rect width="160" height="30" rx="8" fill="url(#gradPurple)" clip-path="inset(0 0 70px 0)" />
    <path d="M0,20 L160,20 L160,30 L0,30 Z" fill="url(#gradPurple)" />
    <text y="20" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle" x="80">Nível 3: Premium</text>

    <text y="50" font-size="11" font-weight="bold" fill="#5b21b6" text-anchor="middle" x="80">Gemini 3 Pro / GPT-5.2</text>
    <text y="65" font-size="10" fill="#64748b" text-anchor="middle" x="80">1-3 segundos/página, máxima qualidade</text>
    <text y="80" font-size="10" fill="#64748b" text-anchor="middle" x="80">Layouts complexos, escrita à mão</text>
    <text y="94" font-size="10" font-weight="bold" fill="#5b21b6" text-anchor="middle" x="80">Cerca de 5% dos documentos</text>
  </g>

  <!-- Confidence routing arrows -->
  <!-- Preprocess to Tier 1 -->
  <path d="M 265 230 L 290 230 L 290 115 L 310 115" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)" />

  <!-- Tier 1 -> confidence check -->
  <line x1="470" y1="115" x2="530" y2="115" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)" />

  <!-- Confidence check box 1 -->
  <rect x="530" y="82" width="100" height="65" rx="25" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)" />
  <text y="108" font-size="11" font-weight="bold" fill="#1d4ed8" text-anchor="middle" x="580">Confidencial</text>
  <text y="122" font-size="11" font-weight="bold" fill="#1d4ed8" text-anchor="middle" x="580">&gt; 0,90?</text>

  <!-- High conf -> Output -->
  <line x1="630" y1="115" x2="700" y2="115" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)" />
  <text y="106" font-size="10" font-weight="bold" fill="#166534" text-anchor="middle" x="665">Sim</text>

  <!-- Low conf -> Tier 2 -->
  <path d="M 580 147 L 580 172 L 290 172 L 290 230 L 310 230" fill="none" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)" />
  <text y="158" font-size="10" font-weight="bold" fill="#dc2626" x="590">Não</text>

  <!-- Tier 2 -> confidence check 2 -->
  <line x1="470" y1="230" x2="530" y2="230" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)" />

  <!-- Confidence check box 2 -->
  <rect x="530" y="197" width="100" height="65" rx="25" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)" />
  <text y="223" font-size="11" font-weight="bold" fill="#1d4ed8" text-anchor="middle" x="580">Confidencial</text>
  <text y="237" font-size="11" font-weight="bold" fill="#1d4ed8" text-anchor="middle" x="580">&gt; 0,70?</text>

  <!-- High conf -> Output -->
  <line x1="630" y1="230" x2="700" y2="230" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)" />
  <text y="221" font-size="10" font-weight="bold" fill="#166534" text-anchor="middle" x="665">Sim</text>

  <!-- Low conf -> Tier 3 -->
  <path d="M 580 262 L 580 287 L 290 287 L 290 345 L 310 345" fill="none" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-purple)" />
  <text y="273" font-size="10" font-weight="bold" fill="#dc2626" x="590">Não</text>

  <!-- Tier 3 -> Output -->
  <path d="M 470 345 L 700 345" fill="none" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-purple)" />

  <!-- Output / Post-processing -->
  <g transform="translate(700, 70)">
    <rect width="155" height="325" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" filter="url(#shadow)" />
    <text y="55" font-size="14" font-weight="bold" fill="#166534" text-anchor="middle" x="77">Pós-processamento</text>
    <text y="75" font-size="11" fill="#1d4ed8" text-anchor="middle" x="77">Validação de esquema</text>
    <text y="90" font-size="11" fill="#1d4ed8" text-anchor="middle" x="77">Filtragem de confiança</text>
    <text y="105" font-size="11" fill="#1d4ed8" text-anchor="middle" x="77">Verificação ortográfica / LM</text>

    <line x1="77" y1="120" x2="77" y2="135" stroke="#cbd5e1" stroke-width="2" />

    <text y="155" font-size="13" font-weight="bold" fill="#166534" text-anchor="middle" x="77">Estruturado</text>
    <text y="170" font-size="13" font-weight="bold" fill="#166534" text-anchor="middle" x="77">Saída</text>
    <text y="190" font-size="11" fill="#1d4ed8" text-anchor="middle" x="77">JSON / Markdown</text>

    <line x1="77" y1="205" x2="77" y2="220" stroke="#cbd5e1" stroke-width="2" />

    <text y="240" font-size="11" fill="#991b1b" text-anchor="middle" x="77">Confiança baixa &lt; 0,70</text>
    <text y="255" font-size="11" fill="#991b1b" text-anchor="middle" x="77">da Camada 3:</text>
    <rect x="25" y="265" width="105" height="25" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1" />
    <text y="282" font-size="12" font-weight="bold" fill="#991b1b" text-anchor="middle" x="77">Revisão Humana</text>
    <text y="305" font-size="10" fill="#64748b" text-anchor="middle" x="77">Rasto de auditoria registado</text>
  </g>

  <!-- Cost annotations -->
  <g transform="translate(65, 420)">
    <rect width="790" height="35" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)" />
    <text y="22" font-size="12" fill="#1d4ed8" text-anchor="middle" font-weight="bold" x="95">Nível 1: ~$0/página</text>
    <text y="22" font-size="12" fill="#9a3412" text-anchor="middle" font-weight="bold" x="305">Nível 2: ~0,001–0,002 USD/página</text>
    <text y="22" font-size="12" fill="#5b21b6" text-anchor="middle" font-weight="bold" x="525">Nível 3: ~0,005–0,01 USD/página</text>
    <text y="22" font-size="12" fill="#991b1b" text-anchor="middle" font-weight="bold" x="715">Humano: ~0,10$/página</text>
  </g>

</svg>
