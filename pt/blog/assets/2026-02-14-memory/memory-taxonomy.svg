<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 550" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Taxonomia de Memória do Agente</title>
  <desc id="artifact-desc">Taxonomia de Memória do Agente.</desc>
  <defs>
    <filter id="shadowT" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a" x="550">Taxonomia de Memória do Agente</text>

  <!-- Root Node -->
  <rect x="465" y="55" width="170" height="40" rx="20" fill="#7c3aed" filter="url(#shadowT)" />
  <text y="81" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff" x="550">Memória do Agente</text>

  <!-- Lines from root to three main branches -->
  <line x1="490" y1="95" x2="180" y2="145" stroke="#94a3b8" stroke-width="1.5" />
  <line x1="550" y1="95" x2="550" y2="145" stroke="#94a3b8" stroke-width="1.5" />
  <line x1="610" y1="95" x2="920" y2="145" stroke="#94a3b8" stroke-width="1.5" />

  <!-- Hot Memory Branch (Left: x=30-330, width=300) -->
  <rect x="30" y="145" width="300" height="50" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadowT)" />
  <text y="165" text-anchor="middle" font-size="13" font-weight="600" fill="#1d4ed8" x="180">Memória Ativa</text>
  <text y="184" text-anchor="middle" font-size="10" fill="#64748b" x="180">(Escopo de sessão)</text>

  <!-- Cold Memory Branch (Center: x=400-700, width=300) -->
  <rect x="400" y="145" width="300" height="50" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadowT)" />
  <text y="165" text-anchor="middle" font-size="13" font-weight="600" fill="#9a3412" x="550">Memória Fria</text>
  <text y="184" text-anchor="middle" font-size="10" fill="#64748b" x="550">(Intersessão)</text>

  <!-- Document Memory Branch (Right: x=770-1070, width=300) -->
  <rect x="770" y="145" width="300" height="50" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="2" filter="url(#shadowT)" />
  <text y="165" text-anchor="middle" font-size="13" font-weight="600" fill="#166534" x="920">Memória de Documentos</text>
  <text y="184" text-anchor="middle" font-size="10" fill="#64748b" x="920">(Conhecimento do projeto)</text>

  <!-- Hot Memory Children: Working + Short-term -->
  <line x1="105" y1="195" x2="105" y2="230" stroke="#94a3b8" stroke-width="1" />
  <line x1="255" y1="195" x2="255" y2="230" stroke="#94a3b8" stroke-width="1" />

  <!-- Working Memory (Purple - LLM/fastest tier) -->
  <rect x="40" y="230" width="130" height="65" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowT)" />
  <text y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6" x="105">Memória de Trabalho</text>
  <text y="265" text-anchor="middle" font-size="9" fill="#64748b" x="105">Etapas atuais</text>
  <text y="278" text-anchor="middle" font-size="9" fill="#64748b" x="105">Parâmetros da ferramenta, LLM</text>
  <text y="291" text-anchor="middle" font-size="9" fill="#64748b" x="105">buffere de resposta</text>

  <!-- Short-term (Checkpoints) -->
  <rect x="190" y="230" width="130" height="65" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowT)" />
  <text y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8" x="255">Curto prazo</text>
  <text y="265" text-anchor="middle" font-size="9" fill="#64748b" x="255">Pontos de verificação</text>
  <text y="278" text-anchor="middle" font-size="9" fill="#64748b" x="255">Estado da thread</text>
  <text y="291" text-anchor="middle" font-size="9" fill="#64748b" x="255">Minutos-horas</text>

  <!-- Cold Memory Children: Episodic + Semantic -->
  <line x1="475" y1="195" x2="475" y2="230" stroke="#94a3b8" stroke-width="1" />
  <line x1="625" y1="195" x2="625" y2="230" stroke="#94a3b8" stroke-width="1" />

  <!-- Episodic -->
  <rect x="410" y="230" width="130" height="65" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowT)" />
  <text y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412" x="475">Episódico</text>
  <text y="265" text-anchor="middle" font-size="9" fill="#64748b" x="475">Interações anteriores</text>
  <text y="278" text-anchor="middle" font-size="9" fill="#64748b" x="475">Registos de conversação</text>
  <text y="291" text-anchor="middle" font-size="9" fill="#64748b" x="475">Dias-meses</text>

  <!-- Semantic -->
  <rect x="560" y="230" width="130" height="65" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowT)" />
  <text y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412" x="625">Semântico</text>
  <text y="265" text-anchor="middle" font-size="9" fill="#64748b" x="625">Factos, conhecimento</text>
  <text y="278" text-anchor="middle" font-size="9" fill="#64748b" x="625">Preferências do utilizador</text>
  <text y="291" text-anchor="middle" font-size="9" fill="#64748b" x="625">Meses permanentes</text>

  <!-- Document Memory Children: Conventions + Research + Learnings -->
  <line x1="820" y1="195" x2="820" y2="230" stroke="#94a3b8" stroke-width="1" />
  <line x1="920" y1="195" x2="920" y2="230" stroke="#94a3b8" stroke-width="1" />
  <line x1="1020" y1="195" x2="1020" y2="230" stroke="#94a3b8" stroke-width="1" />

  <!-- Conventions -->
  <rect x="775" y="230" width="90" height="65" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowT)" />
  <text y="247" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="820">Convenções</text>
  <text y="262" text-anchor="middle" font-size="9" fill="#64748b" x="820">Regras do projeto</text>
  <text y="274" text-anchor="middle" font-size="9" fill="#64748b" x="820">Estilo de codificação</text>
  <text y="286" text-anchor="middle" font-size="9" fill="#64748b" x="820">Formatos</text>

  <!-- Research Notes -->
  <rect x="875" y="230" width="90" height="65" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowT)" />
  <text y="247" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="920">Istoque de Investigação</text>
  <text y="262" text-anchor="middle" font-size="9" fill="#64748b" x="920">Notas de análise</text>
  <text y="274" text-anchor="middle" font-size="9" fill="#64748b" x="920">Resumos</text>
  <text y="286" text-anchor="middle" font-size="9" fill="#64748b" x="920">Resultados</text>

  <!-- Learnings -->
  <rect x="975" y="230" width="90" height="65" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowT)" />
  <text y="247" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="1020">Aprendizagens</text>
  <text y="262" text-anchor="middle" font-size="9" fill="#64748b" x="1020">Padrões</text>
  <text y="274" text-anchor="middle" font-size="9" fill="#64748b" x="1020">Erros a evitar</text>
  <text y="286" text-anchor="middle" font-size="9" fill="#64748b" x="1020">Soluções</text>

  <!-- Procedural Memory (System-wide, separate footer bar) -->
  <rect x="30" y="325" width="1040" height="50" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadowT)" />
  <text y="345" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6" x="550">Memória Procedimental (a nível de sistema)</text>
  <text y="363" text-anchor="middle" font-size="10" fill="#64748b" x="550">Prompt do sistema, definições de ferramentas, ficheiros de configuração — permanentes, não específicos do utilizador</text>

  <!-- Summary bars for each column -->
  <rect x="30" y="395" width="300" height="40" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1" />
  <text y="413" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8" x="180">Rápido | Em processamento/Banco de dados</text>
  <text y="428" text-anchor="middle" font-size="9" fill="#64748b" x="180">Milissegundos-horas | Duração da sessão</text>

  <rect x="400" y="395" width="300" height="40" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1" />
  <text y="413" text-anchor="middle" font-size="10" font-weight="600" fill="#9a3412" x="550">Pesquisável | Armazenamento de vetores/KV</text>
  <text y="428" text-anchor="middle" font-size="9" fill="#64748b" x="550">Dias permanentes | Recuperação entre sessões</text>

  <rect x="770" y="395" width="300" height="40" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1" />
  <text y="413" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="920">Legível por humanos | Sistema de ficheiros</text>
  <text y="428" text-anchor="middle" font-size="9" fill="#64748b" x="920">Dias para sempre | Nativo do Git, editável</text>

  <!-- Access speed comparison -->
  <text y="468" font-size="10" fill="#64748b" x="30">Velocidade de acesso:</text>
  <rect x="130" y="455" width="940" height="20" rx="10" fill="none" stroke="#cbd5e1" stroke-width="1" />
  <rect x="131" y="456" width="235" height="18" rx="9" fill="#faf5ff" opacity="0.8" />
  <text y="470" text-anchor="middle" font-size="9" font-weight="600" fill="#5b21b6" x="248">Imediato (em memória)</text>
  <rect x="366" y="456" width="235" height="18" rx="9" fill="#eff6ff" opacity="0.8" />
  <text y="470" text-anchor="middle" font-size="9" font-weight="600" fill="#1d4ed8" x="483">Rápido (I/O de base de dados/arquivo em ms)</text>
  <rect x="601" y="456" width="235" height="18" rx="9" fill="#fff7ed" opacity="0.8" />
  <text y="470" text-anchor="middle" font-size="9" font-weight="600" fill="#9a3412" x="718">Mais lento (incorporação + pesquisa)</text>
  <rect x="836" y="456" width="233" height="18" rx="9" fill="#f0fdf4" opacity="0.8" />
  <text y="470" text-anchor="middle" font-size="9" font-weight="600" fill="#166534" x="952">Rápido (leitura de ficheiro)</text>

  <!-- Storage type comparison -->
  <text y="508" font-size="10" fill="#64748b" x="30">Tipo de armazenamento:</text>
  <rect x="130" y="495" width="940" height="20" rx="10" fill="none" stroke="#cbd5e1" stroke-width="1" />
  <rect x="131" y="496" width="235" height="18" rx="9" fill="#faf5ff" opacity="0.8" />
  <text y="510" text-anchor="middle" font-size="9" font-weight="600" fill="#5b21b6" x="248">dicionário Python</text>
  <rect x="366" y="496" width="235" height="18" rx="9" fill="#eff6ff" opacity="0.8" />
  <text y="510" text-anchor="middle" font-size="9" font-weight="600" fill="#1d4ed8" x="483">Redis/PostgreSQL</text>
  <rect x="601" y="496" width="235" height="18" rx="9" fill="#fff7ed" opacity="0.8" />
  <text y="510" text-anchor="middle" font-size="9" font-weight="600" fill="#9a3412" x="718">Qdrant/pgvector</text>
  <rect x="836" y="496" width="233" height="18" rx="9" fill="#f0fdf4" opacity="0.8" />
  <text y="510" text-anchor="middle" font-size="9" font-weight="600" fill="#166534" x="952">Ficheiros Markdown/JSON</text>
</svg>
