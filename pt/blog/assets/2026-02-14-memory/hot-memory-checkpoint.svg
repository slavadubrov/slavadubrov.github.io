<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 400" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="Hot Memory Checkpoint Flow" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Fluxo de Memória Quente Checkpoint</title>
  <defs>
    <marker id="arrowC" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155" />
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb" />
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#166534" />
    </marker>
    <filter id="shadowC" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a" x="390">Memória Ativa: Checkpoint e Fluxo de Recuperação</text>

  <!-- === WRITE PATH (top) === -->
  <rect x="20" y="48" width="740" height="145" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1" stroke-dasharray="4" />
  <text y="68" font-size="12" font-weight="700" fill="#1d4ed8" x="35">Escreva o Path: Checkpoint em Cada Passo</text>

  <!-- Agent Step -->
  <rect x="40" y="82" width="130" height="50" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowC)" />
  <text y="105" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6" x="105">Etapas do Agente</text>
  <text y="121" text-anchor="middle" font-size="9" fill="#64748b" x="105">Pensar / Agir / Observar</text>

  <!-- Arrow -->
  <line x1="170" y1="107" x2="205" y2="107" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrowBlue)" />
  <text y="100" text-anchor="middle" font-size="9" fill="#1d4ed8" x="188">após</text>

  <!-- Serialize State -->
  <rect x="210" y="82" width="140" height="50" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowC)" />
  <text y="102" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="280">Serializar Estado</text>
  <text y="118" text-anchor="middle" font-size="9" fill="#64748b" x="280">Mensagens + metadados</text>

  <!-- Arrow -->
  <line x1="350" y1="107" x2="385" y2="107" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrowBlue)" />

  <!-- Write Checkpoint -->
  <rect x="390" y="82" width="160" height="50" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowC)" />
  <text y="102" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="470">Escreva Checkpoint</text>
  <text y="118" text-anchor="middle" font-size="9" fill="#64748b" x="470">Upsert no armazenamento</text>

  <!-- Arrow to stores -->
  <line x1="550" y1="107" x2="585" y2="90" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrowBlue)" />
  <line x1="550" y1="107" x2="585" y2="125" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrowBlue)" />

  <!-- PostgreSQL -->
  <rect x="590" y="72" width="150" height="34" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowC)" />
  <text y="94" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8" x="665">PostgreSQL</text>

  <!-- Redis -->
  <rect x="590" y="112" width="150" height="34" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#shadowC)" />
  <text y="134" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b" x="665">Redis</text>

  <!-- Step labels -->
  <text y="150" text-anchor="middle" font-size="9" fill="#64748b" x="105">Etapas N</text>
  <text y="150" text-anchor="middle" font-size="9" fill="#64748b" x="280">JSON / msgpack</text>
  <text y="150" text-anchor="middle" font-size="9" fill="#64748b" x="470">thread_id + passo_n</text>
  <text y="160" text-anchor="middle" font-size="9" fill="#64748b" x="665">Duradouro/Rápido</text>

  <!-- === READ PATH (bottom) === -->
  <rect x="20" y="208" width="740" height="150" rx="10" fill="#f0fdf4" stroke="#166534" stroke-width="1" stroke-dasharray="4" />
  <text y="228" font-size="12" font-weight="700" fill="#166534" x="35">Rota de Leitura: Retomar a partir de Checkpoint</text>

  <!-- Crash / Restart -->
  <rect x="40" y="242" width="130" height="50" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#shadowC)" />
  <text y="263" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b" x="105">Colapso / Reinício</text>
  <text y="279" text-anchor="middle" font-size="9" fill="#64748b" x="105">Processo terminado</text>

  <!-- Arrow -->
  <line x1="170" y1="267" x2="205" y2="267" stroke="#166534" stroke-width="1.5" marker-end="url(#arrowGreen)" />

  <!-- Load Checkpoint -->
  <rect x="210" y="242" width="160" height="50" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowC)" />
  <text y="263" text-anchor="middle" font-size="12" font-weight="600" fill="#166534" x="290">Carregar Checkpoint</text>
  <text y="279" text-anchor="middle" font-size="9" fill="#64748b" x="290">Obter o mais recente por thread_id</text>

  <!-- Arrow -->
  <line x1="370" y1="267" x2="405" y2="267" stroke="#166534" stroke-width="1.5" marker-end="url(#arrowGreen)" />

  <!-- Deserialize -->
  <rect x="410" y="242" width="150" height="50" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowC)" />
  <text y="263" text-anchor="middle" font-size="12" font-weight="600" fill="#166534" x="485">Desserializar</text>
  <text y="279" text-anchor="middle" font-size="9" fill="#64748b" x="485">Reconstruir estado do agente</text>

  <!-- Arrow -->
  <line x1="560" y1="267" x2="595" y2="267" stroke="#166534" stroke-width="1.5" marker-end="url(#arrowGreen)" />

  <!-- Resume Execution -->
  <rect x="600" y="242" width="140" height="50" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowC)" />
  <text y="263" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6" x="670">Agente de Resumo</text>
  <text y="279" text-anchor="middle" font-size="9" fill="#64748b" x="670">Continuar a partir do Passo N</text>

  <!-- Step labels -->
  <text y="310" text-anchor="middle" font-size="9" fill="#64748b" x="105">OOM / tempo de espera esgotado / erro</text>
  <text y="310" text-anchor="middle" font-size="9" fill="#64748b" x="290">Consultar o armazenamento checkpoint</text>
  <text y="310" text-anchor="middle" font-size="9" fill="#64748b" x="485">Restaurar mensagens</text>
  <text y="310" text-anchor="middle" font-size="9" fill="#64748b" x="670">Nenhum progresso perdido</text>

  <!-- Bottom note -->
  <rect x="140" y="365" width="500" height="28" rx="14" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1" />
  <text y="384" text-anchor="middle" font-size="11" fill="#334155" x="390">Insight fundamental: cada passo é persistido, pelo que a recuperação em caso de falha é automática e sem perdas</text>
</svg>
