<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 580" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadowA" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1" />
    </filter>
    <marker id="arrowA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6a1b9a" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">Princípios de Projeto da Interface Agente-Computador (ACI)</text>
  <text x="500" y="50" text-anchor="middle" font-size="11" fill="#888">Do SWE-agent (Yang et al., NeurIPS 2024) — melhoria de 10,7 pp no SWE-bench apenas através do design da interface</text>

  <!-- Central circle: Agent -->
  <circle cx="500" cy="200" r="55" fill="#6a1b9a" filter="url(#shadowA)" />
  <text x="500" y="195" text-anchor="middle" font-size="14" font-weight="600" fill="white">LLM</text>
  <text x="500" y="212" text-anchor="middle" font-size="11" fill="#e0c0f0">Agente</text>

  <!-- Principle 1: Simple Actions (top-left) -->
  <line x1="455" y1="160" x2="240" y2="100" stroke="#6a1b9a" stroke-width="1.5" marker-end="url(#arrowA)" />
  <rect x="30" y="65" width="220" height="100" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" filter="url(#shadowA)" />
  <text x="50" y="90" font-size="12" font-weight="700" fill="#1565c0">1</text>
  <circle cx="50" cy="86" r="12" fill="none" stroke="#1565c0" stroke-width="2" />
  <text x="76" y="90" font-size="12" font-weight="600" fill="#1565c0">Ações Simples</text>
  <text x="140" y="112" text-anchor="middle" font-size="10" fill="#555">Poucas opções, documentação concisa</text>
  <text x="140" y="126" text-anchor="middle" font-size="10" fill="#555">Não são necessárias demonstrações</text>
  <text x="140" y="148" text-anchor="middle" font-size="9" font-style="italic" fill="#888">agendar_evento não</text>
  <text x="140" y="160" text-anchor="middle" font-size="9" font-style="italic" fill="#888">listar_usuários + criar_evento</text>

  <!-- Principle 2: Compact and Efficient (top-right) -->
  <line x1="545" y1="160" x2="760" y2="100" stroke="#6a1b9a" stroke-width="1.5" marker-end="url(#arrowA)" />
  <rect x="750" y="65" width="220" height="100" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="2" filter="url(#shadowA)" />
  <text x="770" y="90" font-size="12" font-weight="700" fill="#e65100">2</text>
  <circle cx="770" cy="86" r="12" fill="none" stroke="#e65100" stroke-width="2" />
  <text x="796" y="90" font-size="12" font-weight="600" fill="#e65100">Compacto e Eficiente</text>
  <text x="860" y="112" text-anchor="middle" font-size="10" fill="#555">Consolidar operações</text>
  <text x="860" y="126" text-anchor="middle" font-size="10" fill="#555">Minimizar viagens de ida e volta</text>
  <text x="860" y="148" text-anchor="middle" font-size="9" font-style="italic" fill="#888">registos_de_procura com filtros, e não</text>
  <text x="860" y="160" text-anchor="middle" font-size="9" font-style="italic" fill="#888">ler_logs + grep</text>

  <!-- Principle 3: Informative Feedback (bottom-left) -->
  <line x1="455" y1="240" x2="240" y2="320" stroke="#6a1b9a" stroke-width="1.5" marker-end="url(#arrowA)" />
  <rect x="30" y="290" width="220" height="100" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" filter="url(#shadowA)" />
  <text x="50" y="315" font-size="12" font-weight="700" fill="#2e7d32">3</text>
  <circle cx="50" cy="311" r="12" fill="none" stroke="#2e7d32" stroke-width="2" />
  <text x="76" y="315" font-size="12" font-weight="600" fill="#2e7d32">Feedback Conciso</text>
  <text x="140" y="337" text-anchor="middle" font-size="10" fill="#555">Conciso e direto.</text>
  <text x="140" y="351" text-anchor="middle" font-size="10" fill="#555">Saída legível por máquina</text>
  <text x="140" y="373" text-anchor="middle" font-size="9" font-style="italic" fill="#888">Retorne IDs semânticos, e não</text>
  <text x="140" y="385" text-anchor="middle" font-size="9" font-style="italic" fill="#888">HTML bruto ou cargas completas</text>

  <!-- Principle 4: Error Guardrails (bottom-right) -->
  <line x1="545" y1="240" x2="760" y2="320" stroke="#6a1b9a" stroke-width="1.5" marker-end="url(#arrowA)" />
  <rect x="750" y="290" width="220" height="100" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="2" filter="url(#shadowA)" />
  <text x="770" y="315" font-size="12" font-weight="700" fill="#c62828">4</text>
  <circle cx="770" cy="311" r="12" fill="none" stroke="#c62828" stroke-width="2" />
  <text x="796" y="315" font-size="12" font-weight="600" fill="#c62828">Limites de Segurança contra Erros</text>
  <text x="860" y="337" text-anchor="middle" font-size="10" fill="#555">Deteção automática de erros</text>
  <text x="860" y="351" text-anchor="middle" font-size="10" fill="#555">Impedir a propagação de erros</text>
  <text x="860" y="373" text-anchor="middle" font-size="9" font-style="italic" fill="#888">O linter deteta 51,7% dos</text>
  <text x="860" y="385" text-anchor="middle" font-size="9" font-style="italic" fill="#888">erros de edição do agente (SWE-agent)</text>

  <!-- Bottom result bar -->
  <rect x="100" y="440" width="800" height="55" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" filter="url(#shadowA)" />
  <text x="500" y="463" text-anchor="middle" font-size="13" font-weight="600" fill="#6a1b9a">Impacto: 18,0% contra 7,3% no SWE-bench Lite</text>
  <text x="500" y="483" text-anchor="middle" font-size="11" fill="#555">Melhoria de 10,7 pontos percentuais apenas com o design ACI — sem alterações no modelo</text>

  <!-- Connection labels -->
  <text x="340" y="120" text-anchor="middle" font-size="9" fill="#6a1b9a" transform="rotate(-15, 340, 120)">utiliza ferramentas</text>
  <text x="660" y="120" text-anchor="middle" font-size="9" fill="#6a1b9a" transform="rotate(15, 660, 120)">lê a saída</text>
  <text x="340" y="300" text-anchor="middle" font-size="9" fill="#6a1b9a" transform="rotate(15, 340, 300)">recebe feedback</text>
  <text x="660" y="300" text-anchor="middle" font-size="9" fill="#6a1b9a" transform="rotate(-15, 660, 300)">recuperação de erro</text>

  <!-- Source -->
  <text x="500" y="530" text-anchor="middle" font-size="8" fill="#aaa">Fonte: Yang, Jimenez e colaboradores, “SWE-agent: Interfaces Agente-Computador que Permitem Engenharia de Software Automatizada” (arXiv:2405.15793, NeurIPS 2024)</text>
  <text x="500" y="545" text-anchor="middle" font-size="8" fill="#aaa">Princípios adotados pela Anthropic em "Building Effective Agents" (dez 2024)</text>
</svg>
