<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 720" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadowSF" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Title -->
  <text x="590" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a2e">Taxonomia de Falhas Silenciosas</text>
  <text x="590" y="54" text-anchor="middle" font-size="12" fill="#666">Cada modo de falha é emparelhado com a métrica que o deteta. Sem a métrica, o erro é invisível.</text>

  <!-- Root -->
  <rect x="475" y="78" width="230" height="44" rx="22" fill="#c62828" filter="url(#shadowSF)" />
  <text x="590" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="white">Falha Silenciosa (RAG)</text>

  <!-- Trunk: 4 main branches -->
  <line x1="540" y1="122" x2="170" y2="170" stroke="#888" stroke-width="1.4" />
  <line x1="570" y1="122" x2="450" y2="170" stroke="#888" stroke-width="1.4" />
  <line x1="610" y1="122" x2="730" y2="170" stroke="#888" stroke-width="1.4" />
  <line x1="640" y1="122" x2="1010" y2="170" stroke="#888" stroke-width="1.4" />

  <!-- ====== Branch A: Ingestion ====== -->
  <rect x="40" y="170" width="260" height="40" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" />
  <text x="170" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">Falhas de ingestão</text>

  <!-- A1: Parse loss -->
  <rect x="40" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="50" y="245" font-size="11" font-weight="700" fill="#1565c0">Perda de parsing</text>
  <text x="50" y="261" font-size="10" fill="#444">tabelas colapsam · notas de rodapé</text>
  <text x="50" y="275" font-size="10" fill="#444">perdidas · OCR baralha dígitos</text>
  <text x="50" y="285" font-size="9" font-style="italic" fill="#888">detetado por: CER/WER, TEDS</text>

  <!-- A2: Chunk break -->
  <rect x="40" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="50" y="320" font-size="11" font-weight="700" fill="#1565c0">Quebra de chunk</text>
  <text x="50" y="336" font-size="10" fill="#444">trecho da resposta dividido por dois</text>
  <text x="50" y="350" font-size="10" fill="#444">chunks; nenhum tem a prova completa</text>
  <text x="50" y="360" font-size="9" font-style="italic" fill="#888">detetado por: contenção do trecho-resposta</text>

  <!-- A3: Dedup miss -->
  <rect x="40" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="50" y="395" font-size="11" font-weight="700" fill="#1565c0">Erro de dedup</text>
  <text x="50" y="411" font-size="10" fill="#444">falsa fusão corrompe a resposta;</text>
  <text x="50" y="425" font-size="10" fill="#444">falsa retenção esconde o doc certo</text>
  <text x="50" y="435" font-size="9" font-style="italic" fill="#888">detetado por: precisão/recall de dup</text>

  <!-- A4: Normalization -->
  <rect x="40" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="50" y="470" font-size="11" font-weight="700" fill="#1565c0">Deriva de normalização</text>
  <text x="50" y="486" font-size="10" fill="#444">incompat. NFC vs NFKC quebra</text>
  <text x="50" y="500" font-size="10" fill="#444">resolução de alias por exact match</text>
  <text x="50" y="510" font-size="9" font-style="italic" fill="#888">detetado por: paridade NFC/NFKC, cobertura de alias</text>

  <!-- ====== Branch B: Embedding/Index ====== -->
  <rect x="320" y="170" width="260" height="40" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" />
  <text x="450" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">Embedding e índice</text>

  <!-- B1: Embedding miss -->
  <rect x="320" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="330" y="245" font-size="11" font-weight="700" fill="#1565c0">Falha de embedding</text>
  <text x="330" y="261" font-size="10" fill="#444">termo do domínio fica fora da</text>
  <text x="330" y="275" font-size="10" fill="#444">distribuição de treino do modelo</text>
  <text x="330" y="285" font-size="9" font-style="italic" fill="#888">detetado por: Recall@k do domínio vs. baseline</text>

  <!-- B2: ANN drop -->
  <rect x="320" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="330" y="320" font-size="11" font-weight="700" fill="#1565c0">Queda por aproximação ANN</text>
  <text x="330" y="336" font-size="10" fill="#444">HNSW efSearch demasiado baixo;</text>
  <text x="330" y="350" font-size="10" fill="#444">o vetor gold existe mas não é alcançado</text>
  <text x="330" y="360" font-size="9" font-style="italic" fill="#888">detetado por: recall ANN vs. flat</text>

  <!-- B3: Embedding drift -->
  <rect x="320" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="330" y="395" font-size="11" font-weight="700" fill="#1565c0">Deriva de embedding</text>
  <text x="330" y="411" font-size="10" fill="#444">subida de versão do modelo do fornecedor;</text>
  <text x="330" y="425" font-size="10" fill="#444">vetores antigos já não alinhados</text>
  <text x="330" y="435" font-size="9" font-style="italic" fill="#888">detetado por: estabilidade NN do probe-set</text>

  <!-- B4: Stale index -->
  <rect x="320" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="330" y="470" font-size="11" font-weight="700" fill="#1565c0">Índice desatualizado</text>
  <text x="330" y="486" font-size="10" fill="#444">atraso de frescura; queries correm</text>
  <text x="330" y="500" font-size="10" fill="#444">sobre a verdade da semana passada</text>
  <text x="330" y="510" font-size="9" font-style="italic" fill="#888">detetado por: atraso de frescura p99, %-stale</text>

  <!-- ====== Branch C: Online retrieval (HOT — silent killers) ====== -->
  <rect x="600" y="170" width="260" height="40" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="2" />
  <text x="730" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#c62828">Recuperação online</text>

  <!-- C1: Filter exclude (highlighted) -->
  <rect x="600" y="225" width="260" height="64" rx="8" fill="#ffebee" stroke="#c62828" stroke-width="2" filter="url(#shadowSF)" />
  <text x="610" y="245" font-size="11" font-weight="700" fill="#c62828">Falsa exclusão por filtro</text>
  <text x="610" y="261" font-size="10" fill="#444">predicado rígido exclui o doc gold;</text>
  <text x="610" y="275" font-size="10" fill="#444">Recall@k parece normal — sobre um conjunto vazio</text>
  <text x="610" y="285" font-size="9" font-style="italic" fill="#c62828">detetado por: taxa de falsa exclusão por filtro</text>

  <!-- C2: Rerank miss -->
  <rect x="600" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#c62828" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="610" y="320" font-size="11" font-weight="700" fill="#c62828">Falha de rerank</text>
  <text x="610" y="336" font-size="10" fill="#444">cross-encoder rebaixa o doc certo</text>
  <text x="610" y="350" font-size="10" fill="#444">atrás de distratores plausíveis</text>
  <text x="610" y="360" font-size="9" font-style="italic" fill="#888">detetado por: ΔnDCG, robustez a distratores (RGB)</text>

  <!-- C3: Lost in middle -->
  <rect x="600" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#c62828" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="610" y="395" font-size="11" font-weight="700" fill="#c62828">Perdido no meio</text>
  <text x="610" y="411" font-size="10" fill="#444">chunk gold no contexto mas na</text>
  <text x="610" y="425" font-size="10" fill="#444">posição 7/10; o modelo ignora-o</text>
  <text x="610" y="435" font-size="9" font-style="italic" fill="#888">detetado por: eval estratificada por posição</text>

  <!-- C4: Bad rewrite -->
  <rect x="600" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#c62828" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="610" y="470" font-size="11" font-weight="700" fill="#c62828">Regressão na reescrita da query</text>
  <text x="610" y="486" font-size="10" fill="#444">HyDE alucina uma entidade que</text>
  <text x="610" y="500" font-size="10" fill="#444">desvia a recuperação para o lado errado</text>
  <text x="610" y="510" font-size="9" font-style="italic" fill="#888">detetado por: ganho/perda A/B da reescrita</text>

  <!-- ====== Branch D: Generation/Citation ====== -->
  <rect x="880" y="170" width="260" height="40" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" />
  <text x="1010" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#6a1b9a">Geração</text>

  <!-- D1: Hallucination -->
  <rect x="880" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="890" y="245" font-size="11" font-weight="700" fill="#6a1b9a">Alucinação</text>
  <text x="890" y="261" font-size="10" fill="#444">afirmação sem suporte, muitas vezes</text>
  <text x="890" y="275" font-size="10" fill="#444">uma entidade fora do contexto</text>
  <text x="890" y="285" font-size="9" font-style="italic" fill="#888">detetado por: faithfulness, HHEM, FActScore</text>

  <!-- D2: No citation -->
  <rect x="880" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="890" y="320" font-size="11" font-weight="700" fill="#6a1b9a">Teatro de citações</text>
  <text x="890" y="336" font-size="10" fill="#444">o trecho citado não suporta</text>
  <text x="890" y="350" font-size="10" fill="#444">de facto a afirmação ao lado</text>
  <text x="890" y="360" font-size="9" font-style="italic" fill="#888">detetado por: precisão/recall de citação (TREC support)</text>

  <!-- D3: Wrong refusal -->
  <rect x="880" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="890" y="395" font-size="11" font-weight="700" fill="#6a1b9a">Abstenção errada</text>
  <text x="890" y="411" font-size="10" fill="#444">"Não sei" quando a resposta</text>
  <text x="890" y="425" font-size="10" fill="#444">está no contexto (ou vice-versa)</text>
  <text x="890" y="435" font-size="9" font-style="italic" fill="#888">detetado por: NoMIRACL, exatidão de abstenção</text>

  <!-- D4: Schema break -->
  <rect x="880" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="890" y="470" font-size="11" font-weight="700" fill="#6a1b9a">Quebra de schema/vocab</text>
  <text x="890" y="486" font-size="10" fill="#444">output sintaticamente válido escolhe</text>
  <text x="890" y="500" font-size="10" fill="#444">um ID de ontologia errado mas válido</text>
  <text x="890" y="510" font-size="9" font-style="italic" fill="#888">detetado por: conformidade de vocabulário</text>

  <!-- Footer band -->
  <rect x="40" y="555" width="1100" height="68" rx="8" fill="#fffde7" stroke="#fbc02d" stroke-width="1.2" />
  <text x="590" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#827717">Guia de leitura</text>
  <text x="590" y="598" text-anchor="middle" font-size="10" fill="#827717">Cada falha é silenciosa sem a sua métrica. A "correção da resposta" padrão só diz que algo falhou — não onde.</text>
  <text x="590" y="614" text-anchor="middle" font-size="10" fill="#827717">O ramo vermelho (exclusão por filtro, falha de rerank, perdido no meio, má reescrita) é onde a maioria dos RAG em produção sofre. Instrumente-o primeiro.</text>

  <!-- Visual cue: the 'red' propagation -->
  <rect x="40" y="640" width="1100" height="62" rx="8" fill="#ffffff" stroke="#cbd5e0" stroke-width="1" />
  <text x="60" y="662" font-size="11" font-weight="600" fill="#1a1a2e">A regra de propagação:</text>
  <text x="60" y="682" font-size="10" fill="#555">Uma falha à esquerda é um teto de recall para tudo à direita. Mau parsing limita chunking. Mau chunking limita a recuperação.</text>
  <text x="60" y="696" font-size="10" fill="#555">Má recuperação limita reranking. Mau reranking limita geração. Faithfulness mede só o último elo — não vê a cadeia partida.</text>
</svg>
