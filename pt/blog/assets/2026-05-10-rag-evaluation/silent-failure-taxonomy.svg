<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 720" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadowSF" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Title -->
  <text x="590" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a2e">Taxonomia de Falhas Silenciosas</text>
  <text x="590" y="54" text-anchor="middle" font-size="12" fill="#666">Cada modo de falha está associado à métrica que o deteta. Sem essa métrica, o erro permanece invisível.</text>

  <!-- Root -->
  <rect x="475" y="78" width="230" height="44" rx="22" fill="#c62828" filter="url(#shadowSF)" />
  <text x="590" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="white">Falha Silenciosa (RAG)</text>

  <!-- Trunk: 4 main branches -->
  <line x1="540" y1="122" x2="170" y2="170" stroke="#888" stroke-width="1.4" />
  <line x1="570" y1="122" x2="450" y2="170" stroke="#888" stroke-width="1.4" />
  <line x1="610" y1="122" x2="730" y2="170" stroke="#888" stroke-width="1.4" />
  <line x1="640" y1="122" x2="1010" y2="170" stroke="#888" stroke-width="1.4" />

  <!-- ====== Branch A: Ingestion ====== -->
  <rect x="40" y="170" width="260" height="40" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" />
  <text x="170" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">Falhas de ingestão</text>

  <!-- A1: Parse loss -->
  <rect x="40" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="50" y="245" font-size="11" font-weight="700" fill="#1565c0">Perda de análise</text>
  <text x="50" y="261" font-size="10" fill="#444">tabelas recolhem-se · notas de rodapé</text>
  <text x="50" y="275" font-size="10" fill="#444">perdido · OCR distorce os dígitos</text>
  <text x="50" y="285" font-size="9" font-style="italic" fill="#888">capturado por: CER/WER, TEDS</text>

  <!-- A2: Chunk break -->
  <rect x="40" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="50" y="320" font-size="11" font-weight="700" fill="#1565c0">Quebra de bloco</text>
  <text x="50" y="336" font-size="10" fill="#444">span de resposta dividido em dois</text>
  <text x="50" y="350" font-size="10" fill="#444">bloco(s); nenhum possui evidências completas</text>
  <text x="50" y="360" font-size="9" font-style="italic" fill="#888">capturado por: contenção do answer-span</text>

  <!-- A3: Dedup miss -->
  <rect x="40" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="50" y="395" font-size="11" font-weight="700" fill="#1565c0">Erro de deduplicação</text>
  <text x="50" y="411" font-size="10" fill="#444">A operação false-merge corrompe a resposta;</text>
  <text x="50" y="425" font-size="10" fill="#444">O false-keep oculta o documento correto</text>
  <text x="50" y="435" font-size="9" font-style="italic" fill="#888">capturado por: precisão/recuperação dupla</text>

  <!-- A4: Normalization -->
  <rect x="40" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="50" y="470" font-size="11" font-weight="700" fill="#1565c0">Deriva de normalização</text>
  <text x="50" y="486" font-size="10" fill="#444">Erros de incompatibilidade entre NFC e NFKC</text>
  <text x="50" y="500" font-size="10" fill="#444">resolução de aliases com correspondência exata</text>
  <text x="50" y="510" font-size="9" font-style="italic" fill="#888">detetado por: paridade NFC/NFKC, cobertura de aliases</text>

  <!-- ====== Branch B: Embedding/Index ====== -->
  <rect x="320" y="170" width="260" height="40" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" />
  <text x="450" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">Embeddedização e indexação</text>

  <!-- B1: Embedding miss -->
  <rect x="320" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="330" y="245" font-size="11" font-weight="700" fill="#1565c0">Erro de embedding</text>
  <text x="330" y="261" font-size="10" fill="#444">o termo de domínio encontra-se fora do</text>
  <text x="330" y="275" font-size="10" fill="#444">distribuição de treino do modelo</text>
  <text x="330" y="285" font-size="9" font-style="italic" fill="#888">capturado por: recall do domínio @k vs. linha de base</text>

  <!-- B2: ANN drop -->
  <rect x="320" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="330" y="320" font-size="11" font-weight="700" fill="#1565c0">Queda na aproximação do ANN</text>
  <text x="330" y="336" font-size="10" fill="#444">Nível de efSearch do HNSW demasiado baixo; crítico</text>
  <text x="330" y="350" font-size="10" fill="#444">o vetor existe, mas não é alcançado</text>
  <text x="330" y="360" font-size="9" font-style="italic" fill="#888">capturado por: recall ANN vs. plano</text>

  <!-- B3: Embedding drift -->
  <rect x="320" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="330" y="395" font-size="11" font-weight="700" fill="#1565c0">Derivação do embedding</text>
  <text x="330" y="411" font-size="10" fill="#444">atualização da versão do modelo do fornecedor;</text>
  <text x="330" y="425" font-size="10" fill="#444">vetores antigos já não estão alinhados</text>
  <text x="330" y="435" font-size="9" font-style="italic" fill="#888">detetado por: estabilidade do conjunto de sondas NN</text>

  <!-- B4: Stale index -->
  <rect x="320" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="330" y="470" font-size="11" font-weight="700" fill="#1565c0">Índice obsoleto</text>
  <text x="330" y="486" font-size="10" fill="#444">atraso na frescura; execução de consultas</text>
  <text x="330" y="500" font-size="10" fill="#444">em contraste com a verdade da semana passada</text>
  <text x="330" y="510" font-size="9" font-style="italic" fill="#888">detectado por: atraso de frescura p99, %-estragado</text>

  <!-- ====== Branch C: Online retrieval (HOT — silent killers) ====== -->
  <rect x="600" y="170" width="260" height="40" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="2" />
  <text x="730" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#c62828">Recuperação online</text>

  <!-- C1: Filter exclude (highlighted) -->
  <rect x="600" y="225" width="260" height="64" rx="8" fill="#ffebee" stroke="#c62828" stroke-width="2" filter="url(#shadowSF)" />
  <text x="610" y="245" font-size="11" font-weight="700" fill="#c62828">Filtro de exclusão falsa</text>
  <text x="610" y="261" font-size="10" fill="#444">predicado difícil elimina o documento de ouro;</text>
  <text x="610" y="275" font-size="10" fill="#444">O Recall@k parece normal — em um conjunto vazio</text>
  <text x="610" y="285" font-size="9" font-style="italic" fill="#c62828">capturado por: taxa de falsa exclusão do filtro</text>

  <!-- C2: Rerank miss -->
  <rect x="600" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#c62828" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="610" y="320" font-size="11" font-weight="700" fill="#c62828">Reclassificação de falha</text>
  <text x="610" y="336" font-size="10" fill="#444">O cross-encoder rebaixa o lado direito</text>
  <text x="610" y="350" font-size="10" fill="#444">documento por trás de distratores plausíveis</text>
  <text x="610" y="360" font-size="9" font-style="italic" fill="#888">detetado por: ΔnDCG, robustez face a distrações (RGB)</text>

  <!-- C3: Lost in middle -->
  <rect x="600" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#c62828" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="610" y="395" font-size="11" font-weight="700" fill="#c62828">Perdido no meio</text>
  <text x="610" y="411" font-size="10" fill="#444">pedaço de ouro no contexto, mas em</text>
  <text x="610" y="425" font-size="10" fill="#444">Posição 7/10; o modelo ignora-a.</text>
  <text x="610" y="435" font-size="9" font-style="italic" fill="#888">capturado por: avaliação estratificada por posição</text>

  <!-- C4: Bad rewrite -->
  <rect x="600" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#c62828" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="610" y="470" font-size="11" font-weight="700" fill="#c62828">Regressão de reescrita de consultas</text>
  <text x="610" y="486" font-size="10" fill="#444">HyDE gera uma entidade que</text>
  <text x="610" y="500" font-size="10" fill="#444">o mecanismo de recuperação inclina-se da forma errada</text>
  <text x="610" y="510" font-size="9" font-style="italic" fill="#888">capturado por: reescrita de ganho/perda A/B</text>

  <!-- ====== Branch D: Generation/Citation ====== -->
  <rect x="880" y="170" width="260" height="40" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" />
  <text x="1010" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#6a1b9a">Geração</text>

  <!-- D1: Hallucination -->
  <rect x="880" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="890" y="245" font-size="11" font-weight="700" fill="#6a1b9a">Alucinação</text>
  <text x="890" y="261" font-size="10" fill="#444">afirmação não suportada, frequentemente um</text>
  <text x="890" y="275" font-size="10" fill="#444">entidade não presente no contexto</text>
  <text x="890" y="285" font-size="9" font-style="italic" fill="#888">capturado por: faithfulness, HHEM, FActScore</text>

  <!-- D2: No citation -->
  <rect x="880" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="890" y="320" font-size="11" font-weight="700" fill="#6a1b9a">Teatro de citação</text>
  <text x="890" y="336" font-size="10" fill="#444">o intervalo citado na verdade não</text>
  <text x="890" y="350" font-size="10" fill="#444">suportar a afirmação adjacente</text>
  <text x="890" y="360" font-size="9" font-style="italic" fill="#888">capturado por: precisão/recall de citação (suporte TREC)</text>

  <!-- D3: Wrong refusal -->
  <rect x="880" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="890" y="395" font-size="11" font-weight="700" fill="#6a1b9a">Abstenção incorreta</text>
  <text x="890" y="411" font-size="10" fill="#444">"Não sei" quando a resposta</text>
  <text x="890" y="425" font-size="10" fill="#444">está no contexto (ou vice-versa)</text>
  <text x="890" y="435" font-size="9" font-style="italic" fill="#888">capturado por: NoMIRACL, precisão de abstenção</text>

  <!-- D4: Schema break -->
  <rect x="880" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="890" y="470" font-size="11" font-weight="700" fill="#6a1b9a">Quebra de esquema/vocabulário</text>
  <text x="890" y="486" font-size="10" fill="#444">escolhas de saída sintaticamente válidas</text>
  <text x="890" y="500" font-size="10" fill="#444">um ID de ontologia incorreto, mas válido</text>
  <text x="890" y="510" font-size="9" font-style="italic" fill="#888">capturado por: conformidade de vocabulário</text>

  <!-- Footer band -->
  <rect x="40" y="555" width="1100" height="68" rx="8" fill="#fffde7" stroke="#fbc02d" stroke-width="1.2" />
  <text x="590" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#827717">Guia de leitura</text>
  <text x="590" y="598" text-anchor="middle" font-size="10" fill="#827717">Cada falha permanece silenciosa na ausência das suas métricas. A mera avaliação da “correção da resposta” indica que algo está errado — mas não onde.</text>
  <text x="590" y="614" text-anchor="middle" font-size="10" fill="#827717">O ramo vermelho (exclusão de filtros, falhas na reclassificação, casos perdidos no meio do processo, reescrita inadequada) é onde o RAG em produção apresenta os maiores problemas. Instrumente-o primeiro.</text>

  <!-- Visual cue: the 'red' propagation -->
  <rect x="40" y="640" width="1100" height="62" rx="8" fill="#ffffff" stroke="#cbd5e0" stroke-width="1" />
  <text x="60" y="662" font-size="11" font-weight="600" fill="#1a1a2e">A regra de propagação:</text>
  <text x="60" y="682" font-size="10" fill="#555">Uma falha no lado esquerdo representa um limite que impede o processamento de tudo no lado direito. Uma análise inadequada limita a divisão dos dados em blocos; uma divisão inadequada, por sua vez, limita a recuperação dos mesmos.</text>
  <text x="60" y="696" font-size="10" fill="#555">Limites inadequados de recuperação para reclassificação. Geração inadequada de limites de reclassificação. As métricas de fidelidade avaliam apenas o último elo — não conseguem detetar a cadeia quebrada.</text>
</svg>
