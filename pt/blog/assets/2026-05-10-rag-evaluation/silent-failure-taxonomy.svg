<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 720" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="Silent failure taxonomy with the metric that catches each mode" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Taxonomia de falhas silenciosas com a métrica que deteta cada modo</title>
  <defs>
    <filter id="shadowSF" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a" x="590">Taxonomia de Falha Silenciosa</text>
  <text y="54" text-anchor="middle" font-size="12" fill="#334155" x="590">Cada modo de falha é associado à métrica que o deteta. Sem essa métrica, o erro permanece invisível.</text>

  <!-- Root -->
  <rect x="475" y="78" width="230" height="44" rx="22" fill="#dc2626" filter="url(#shadowSF)" />
  <text y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" x="590">Falha Silenciosa (RAG)</text>

  <!-- Trunk: 4 main branches -->
  <line x1="540" y1="122" x2="170" y2="170" stroke="#94a3b8" stroke-width="1.4" />
  <line x1="570" y1="122" x2="450" y2="170" stroke="#94a3b8" stroke-width="1.4" />
  <line x1="610" y1="122" x2="730" y2="170" stroke="#94a3b8" stroke-width="1.4" />
  <line x1="640" y1="122" x2="1010" y2="170" stroke="#94a3b8" stroke-width="1.4" />

  <!-- ====== Branch A: Ingestion ====== -->
  <rect x="40" y="170" width="260" height="40" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8" x="170">Falhas de ingestão</text>

  <!-- A1: Parse loss -->
  <rect x="40" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="245" font-size="11" font-weight="700" fill="#1d4ed8" x="50">Perda de análise</text>
  <text y="261" font-size="10" fill="#334155" x="50">tabelas recolhem-se · notas de rodapé</text>
  <text y="275" font-size="10" fill="#334155" x="50">descartado · OCR embaralha dígitos</text>
  <text y="285" font-size="9" font-style="italic" fill="#64748b" x="50">capturado por: CER/WER, TEDS</text>

  <!-- A2: Chunk break -->
  <rect x="40" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="320" font-size="11" font-weight="700" fill="#1d4ed8" x="50">Quebra de chunk</text>
  <text y="336" font-size="10" fill="#334155" x="50">span de resposta dividido em dois</text>
  <text y="350" font-size="10" fill="#334155" x="50">trechos; nenhum deles possui evidências completas</text>
  <text y="360" font-size="9" font-style="italic" fill="#64748b" x="50">capturado por: contenção de answer-span</text>

  <!-- A3: Dedup miss -->
  <rect x="40" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="395" font-size="11" font-weight="700" fill="#1d4ed8" x="50">Erro de deduplicação</text>
  <text y="411" font-size="10" fill="#334155" x="50">A false-merge corrompe a resposta;</text>
  <text y="425" font-size="10" fill="#334155" x="50">O false-keep oculta o documento correto</text>
  <text y="435" font-size="9" font-style="italic" fill="#64748b" x="50">detectado por: precisão/recuperação dupla</text>

  <!-- A4: Normalization -->
  <rect x="40" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="470" font-size="11" font-weight="700" fill="#1d4ed8" x="50">Deriva de normalização</text>
  <text y="486" font-size="10" fill="#334155" x="50">Inconsistências entre NFC e NFKC que causam falhas</text>
  <text y="500" font-size="10" fill="#334155" x="50">resolução de aliases de correspondência exata</text>
  <text y="510" font-size="9" font-style="italic" fill="#64748b" x="50">detectado por: paridade NFC/NFKC, cobertura de aliases</text>

  <!-- ====== Branch B: Embedding/Index ====== -->
  <rect x="320" y="170" width="260" height="40" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8" x="450">Embedding e índice</text>

  <!-- B1: Embedding miss -->
  <rect x="320" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="245" font-size="11" font-weight="700" fill="#1d4ed8" x="330">Embedding falha</text>
  <text y="261" font-size="10" fill="#334155" x="330">termo de domínio encontra-se fora do</text>
  <text y="275" font-size="10" fill="#334155" x="330">distribuição de treino do modelo</text>
  <text y="285" font-size="9" font-style="italic" fill="#64748b" x="330">capturado por: recall do domínio @k vs. linha de base</text>

  <!-- B2: ANN drop -->
  <rect x="320" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="320" font-size="11" font-weight="700" fill="#1d4ed8" x="330">ANN perda de precisão da aproximação</text>
  <text y="336" font-size="10" fill="#334155" x="330">HNSW valor de efSearch demasiado baixo; gold</text>
  <text y="350" font-size="10" fill="#334155" x="330">o vetor existe, mas não é alcançado</text>
  <text y="360" font-size="9" font-style="italic" fill="#64748b" x="330">capturado por: ANN recall versus flat</text>

  <!-- B3: Embedding drift -->
  <rect x="320" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="395" font-size="11" font-weight="700" fill="#1d4ed8" x="330">Embedding deriva</text>
  <text y="411" font-size="10" fill="#334155" x="330">atualização da versão do modelo do fornecedor;</text>
  <text y="425" font-size="10" fill="#334155" x="330">vetores antigos já não estão alinhados</text>
  <text y="435" font-size="9" font-style="italic" fill="#64748b" x="330">detectado por: estabilidade do NN do conjunto de sondas</text>

  <!-- B4: Stale index -->
  <rect x="320" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="470" font-size="11" font-weight="700" fill="#1d4ed8" x="330">Índice obsoleto</text>
  <text y="486" font-size="10" fill="#334155" x="330">atraso de frescura; execução de consultas</text>
  <text y="500" font-size="10" fill="#334155" x="330">em comparação com a verdade da semana passada</text>
  <text y="510" font-size="9" font-style="italic" fill="#64748b" x="330">detectado por: atraso de frescura p99, %-estagnado</text>

  <!-- ====== Branch C: Online retrieval (HOT — silent killers) ====== -->
  <rect x="600" y="170" width="260" height="40" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2" />
  <text y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b" x="730">Recuperação online</text>

  <!-- C1: Filter exclude (highlighted) -->
  <rect x="600" y="225" width="260" height="64" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2" filter="url(#shadowSF)" />
  <text y="245" font-size="11" font-weight="700" fill="#991b1b" x="610">Filtro de falsa exclusão</text>
  <text y="261" font-size="10" fill="#334155" x="610">predicado difícil elimina o documento de ouro;</text>
  <text y="275" font-size="10" fill="#334155" x="610">O Recall@k está normal — em um conjunto vazio</text>
  <text y="285" font-size="9" font-style="italic" fill="#991b1b" x="610">capturado por: taxa de falsa exclusão do filtro</text>

  <!-- C2: Rerank miss -->
  <rect x="600" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="320" font-size="11" font-weight="700" fill="#991b1b" x="610">Falha de reclassificação</text>
  <text y="336" font-size="10" fill="#334155" x="610">o cross-encoder rebaixa o lado direito</text>
  <text y="350" font-size="10" fill="#334155" x="610">documento oculto por distrações plausíveis</text>
  <text y="360" font-size="9" font-style="italic" fill="#64748b" x="610">detectado por: ΔnDCG, robustez a estímulos distratores (RGB)</text>

  <!-- C3: Lost in middle -->
  <rect x="600" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="395" font-size="11" font-weight="700" fill="#991b1b" x="610">Perdido no meio</text>
  <text y="411" font-size="10" fill="#334155" x="610">pedaço de ouro no contexto, mas em</text>
  <text y="425" font-size="10" fill="#334155" x="610">posição 7/10; o modelo ignora-a</text>
  <text y="435" font-size="9" font-style="italic" fill="#64748b" x="610">capturado por: avaliação estratificada por posição</text>

  <!-- C4: Bad rewrite -->
  <rect x="600" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="470" font-size="11" font-weight="700" fill="#991b1b" x="610">Regressão de reescrita de consulta</text>
  <text y="486" font-size="10" fill="#334155" x="610">HyDE gera uma entidade que</text>
  <text y="500" font-size="10" fill="#334155" x="610">inverte a direção de recuperação dos dados</text>
  <text y="510" font-size="9" font-style="italic" fill="#64748b" x="610">capturado por: ganho/perda de reescrita A/B</text>

  <!-- ====== Branch D: Generation/Citation ====== -->
  <rect x="880" y="170" width="260" height="40" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" />
  <text y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6" x="1010">Geração</text>

  <!-- D1: Hallucination -->
  <rect x="880" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="245" font-size="11" font-weight="700" fill="#5b21b6" x="890">Alucinação</text>
  <text y="261" font-size="10" fill="#334155" x="890">afirmação não suportada, frequentemente um</text>
  <text y="275" font-size="10" fill="#334155" x="890">entidade não presente no contexto</text>
  <text y="285" font-size="9" font-style="italic" fill="#64748b" x="890">capturado por: fidelidade, HHEM, FActScore</text>

  <!-- D2: No citation -->
  <rect x="880" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="320" font-size="11" font-weight="700" fill="#5b21b6" x="890">Teatro de citações</text>
  <text y="336" font-size="10" fill="#334155" x="890">o intervalo citado na verdade não</text>
  <text y="350" font-size="10" fill="#334155" x="890">suportar a afirmação adjacente</text>
  <text y="360" font-size="9" font-style="italic" fill="#64748b" x="890">capturado por: precisão/recall de citação (suporte TREC)</text>

  <!-- D3: Wrong refusal -->
  <rect x="880" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="395" font-size="11" font-weight="700" fill="#5b21b6" x="890">Abstenção incorreta</text>
  <text y="411" font-size="10" fill="#334155" x="890">"Não sei" quando a resposta</text>
  <text y="425" font-size="10" fill="#334155" x="890">está no contexto (ou vice-versa)</text>
  <text y="435" font-size="9" font-style="italic" fill="#64748b" x="890">capturado por: NoMIRACL, precisão de abstenção</text>

  <!-- D4: Schema break -->
  <rect x="880" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="470" font-size="11" font-weight="700" fill="#5b21b6" x="890">Quebra de esquema/vocabulário</text>
  <text y="486" font-size="10" fill="#334155" x="890">escolhas de saída sintaticamente válidas</text>
  <text y="500" font-size="10" fill="#334155" x="890">um ID de ontologia incorreto, mas válido</text>
  <text y="510" font-size="9" font-style="italic" fill="#64748b" x="890">detectado por: conformidade de vocabulário</text>

  <!-- Footer band -->
  <rect x="40" y="555" width="1100" height="68" rx="8" fill="#f0fdf4" stroke="#ea580c" stroke-width="1.2" />
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="590">Guia de leitura</text>
  <text y="598" text-anchor="middle" font-size="10" fill="#9a3412" x="590">Cada falha permanece silenciosa na ausência da sua métrica correspondente. A mera avaliação da “correção da resposta” padrão indica que algo está errado — mas não onde exatamente.</text>
  <text y="614" text-anchor="middle" font-size="10" fill="#9a3412" x="590">O ramo vermelho (exclusão por filtro, reclassificação falhada, perda no meio do processo, reescrita inadequada) é onde a maior parte dos problemas em produção com RAG ocorre. Instrumente-o primeiro.</text>

  <!-- Visual cue: the 'red' propagation -->
  <rect x="40" y="640" width="1100" height="62" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="662" font-size="11" font-weight="600" fill="#0f172a" x="60">A regra de propagação:</text>
  <text y="682" font-size="10" fill="#334155" x="60">Uma falha no lado esquerdo representa um teto de recall para todos os elementos no lado direito. Uma análise inadequada limita o processo de chunking. Um chunking deficiente, por sua vez, restringe a capacidade de recuperação de informações.</text>
  <text y="696" font-size="10" fill="#334155" x="60">Limites de recuperação inadequados reranking. Geração de limites reranking incorretos. As métricas de fidelidade avaliam apenas o último elo — elas não conseguem detectar a cadeia quebrada.</text>
</svg>
