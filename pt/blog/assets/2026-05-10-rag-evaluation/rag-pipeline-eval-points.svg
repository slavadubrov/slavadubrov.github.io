<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrEval" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555" />
    </marker>
    <filter id="shadowEval" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Title -->
  <text x="590" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a2e">O pipeline RAG com pontos de avaliação</text>
  <text x="590" y="54" text-anchor="middle" font-size="12" fill="#666">Cada fase tem uma métrica. É a métrica que deteta falhas silenciosas.</text>

  <!-- ============ OFFLINE LANE ============ -->
  <rect x="20" y="78" width="1140" height="290" rx="10" fill="#f8f9fa" stroke="#cbd5e0" stroke-width="1" />
  <text x="40" y="102" font-size="13" font-weight="700" fill="#1565c0">Offline · Ingestão</text>
  <text x="40" y="118" font-size="10" fill="#888">Corre uma vez por versão do corpus. Define o limite máximo.</text>

  <!-- Stage 1: Acquire / Parse -->
  <rect x="40" y="140" width="170" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="125" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Adquirir e analisar</text>
  <text x="125" y="178" text-anchor="middle" font-size="9" fill="#555">PDFs · HTML · OCR</text>
  <text x="125" y="192" text-anchor="middle" font-size="9" fill="#555">Tabelas · Layout</text>

  <!-- Metric badge 1 -->
  <rect x="40" y="212" width="170" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="125" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">CER · WER · TEDS</text>
  <text x="125" y="242" text-anchor="middle" font-size="9" fill="#827717">taxa de sucesso do parse</text>
  <text x="125" y="255" text-anchor="middle" font-size="9" fill="#827717">fidelidade do layout</text>

  <!-- Arrow -->
  <line x1="210" y1="171" x2="245" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 2: Normalize / Dedup -->
  <rect x="245" y="140" width="170" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="330" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Normalizar e deduplicar</text>
  <text x="330" y="178" text-anchor="middle" font-size="9" fill="#555">NFC/NFKC · MinHash</text>
  <text x="330" y="192" text-anchor="middle" font-size="9" fill="#555">PII · boilerplate</text>

  <rect x="245" y="212" width="170" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="330" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">recall/precisão de dup</text>
  <text x="330" y="242" text-anchor="middle" font-size="9" fill="#827717">recall de PII (por tipo)</text>
  <text x="330" y="255" text-anchor="middle" font-size="9" fill="#827717">F1 de deteção de idioma</text>

  <line x1="415" y1="171" x2="450" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 3: Chunk -->
  <rect x="450" y="140" width="170" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="535" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Chunking</text>
  <text x="535" y="178" text-anchor="middle" font-size="9" fill="#555">recursivo · semântico</text>
  <text x="535" y="192" text-anchor="middle" font-size="9" fill="#555">estrutural · tardio</text>

  <rect x="450" y="212" width="170" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="535" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">contenção do span da resposta</text>
  <text x="535" y="242" text-anchor="middle" font-size="9" fill="#827717">taxa de quebra de fronteira</text>
  <text x="535" y="255" text-anchor="middle" font-size="9" fill="#827717">Recall@k vs. tamanho</text>

  <line x1="620" y1="171" x2="655" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 4: Enrich (NER/EL) -->
  <rect x="655" y="140" width="170" height="62" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="740" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#6a1b9a">Enriquecer</text>
  <text x="740" y="178" text-anchor="middle" font-size="9" fill="#555">NER · entity link</text>
  <text x="740" y="192" text-anchor="middle" font-size="9" fill="#555">tags · hierarquia</text>

  <rect x="655" y="212" width="170" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="740" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">EL F1 · precisão de NIL</text>
  <text x="740" y="242" text-anchor="middle" font-size="9" fill="#827717">F1 hierárquico</text>
  <text x="740" y="255" text-anchor="middle" font-size="9" fill="#827717">cobertura de aliases</text>

  <line x1="825" y1="171" x2="860" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 5: Embed -->
  <rect x="860" y="140" width="135" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="927" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Embedding</text>
  <text x="927" y="178" text-anchor="middle" font-size="9" fill="#555">denso / esparso</text>
  <text x="927" y="192" text-anchor="middle" font-size="9" fill="#555">multi-vector</text>

  <rect x="860" y="212" width="135" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="927" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">nDCG@10 do domínio</text>
  <text x="927" y="242" text-anchor="middle" font-size="9" fill="#827717">drift (KL · NN-stab.)</text>
  <text x="927" y="255" text-anchor="middle" font-size="9" fill="#827717">vs. BEIR/MMTEB</text>

  <line x1="995" y1="171" x2="1030" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 6: Index -->
  <rect x="1030" y="140" width="115" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="1087" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Indexar</text>
  <text x="1087" y="178" text-anchor="middle" font-size="9" fill="#555">HNSW / IVF</text>
  <text x="1087" y="192" text-anchor="middle" font-size="9" fill="#555">BM25 · híbrido</text>

  <rect x="1030" y="212" width="115" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="1087" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">recall ANN vs. flat</text>
  <text x="1087" y="242" text-anchor="middle" font-size="9" fill="#827717">atraso de frescura p99</text>
  <text x="1087" y="255" text-anchor="middle" font-size="9" fill="#827717">lat. de pesquisa filtrada</text>

  <!-- Lane summary -->
  <rect x="40" y="290" width="1105" height="58" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1" />
  <text x="592" y="312" text-anchor="middle" font-size="11" font-weight="600" fill="#1565c0">A prontidão offline do corpus define o limite superior. Se um chunk perder aqui o span da resposta, nenhum reranker o recupera a jusante.</text>
  <text x="592" y="332" text-anchor="middle" font-size="10" fill="#1565c0">A maioria das equipas investe demasiado em retrieval e pouco em parsing, normalização e chunking. É aí que o RAG em produção morre em silêncio.</text>

  <!-- ============ ONLINE LANE ============ -->
  <rect x="20" y="378" width="1140" height="280" rx="10" fill="#f8f9fa" stroke="#cbd5e0" stroke-width="1" />
  <text x="40" y="402" font-size="13" font-weight="700" fill="#e65100">Online · Inferência (por query)</text>
  <text x="40" y="418" font-size="10" fill="#888">Corre em cada pedido. A faixa onde mais métricas são monitorizadas em produção.</text>

  <!-- Stage 7: Query Rewrite -->
  <rect x="40" y="440" width="160" height="62" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="120" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">Reescrever / encaminhar</text>
  <text x="120" y="478" text-anchor="middle" font-size="9" fill="#555">HyDE · multi-query</text>
  <text x="120" y="492" text-anchor="middle" font-size="9" fill="#555">intenção · adaptativo</text>

  <rect x="40" y="512" width="160" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="120" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">ganho de Recall@k</text>
  <text x="120" y="542" text-anchor="middle" font-size="9" fill="#827717">precisão de routing</text>
  <text x="120" y="555" text-anchor="middle" font-size="9" fill="#827717">taxa de no-op</text>

  <line x1="200" y1="471" x2="235" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 8: Retrieve -->
  <rect x="235" y="440" width="160" height="62" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="315" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">Recuperar</text>
  <text x="315" y="478" text-anchor="middle" font-size="9" fill="#555">denso + esparso + RRF</text>
  <text x="315" y="492" text-anchor="middle" font-size="9" fill="#555">predicados de filtro</text>

  <rect x="235" y="512" width="160" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="315" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">Recall@k · MRR · nDCG</text>
  <text x="315" y="542" text-anchor="middle" font-size="9" fill="#827717">precisão/recall do contexto</text>
  <text x="315" y="555" text-anchor="middle" font-size="9" fill="#827717">ganho híbrido</text>

  <line x1="395" y1="471" x2="430" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 9: Filter (highlighted) -->
  <rect x="430" y="440" width="160" height="62" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="2" filter="url(#shadowEval)" />
  <text x="510" y="462" text-anchor="middle" font-size="12" font-weight="700" fill="#c62828">Filtrar (o assassino silencioso)</text>
  <text x="510" y="478" text-anchor="middle" font-size="9" fill="#555">tenant · ACL · tag</text>
  <text x="510" y="492" text-anchor="middle" font-size="9" fill="#555">hard vs. soft</text>

  <rect x="430" y="512" width="160" height="48" rx="6" fill="#ffebee" stroke="#c62828" stroke-width="1.2" />
  <text x="510" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#c62828">taxa de falsa exclusão do filtro</text>
  <text x="510" y="542" text-anchor="middle" font-size="9" fill="#c62828">precisão/recall do predicado</text>
  <text x="510" y="555" text-anchor="middle" font-size="9" fill="#c62828">Δ de shadow-retrieval</text>

  <line x1="590" y1="471" x2="625" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 10: Rerank -->
  <rect x="625" y="440" width="160" height="62" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="705" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">Rerank</text>
  <text x="705" y="478" text-anchor="middle" font-size="9" fill="#555">cross-encoder · listwise</text>
  <text x="705" y="492" text-anchor="middle" font-size="9" fill="#555">BGE · Cohere · ZeRank</text>

  <rect x="625" y="512" width="160" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="705" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">ΔnDCG · ΔMRR · ΔP@1</text>
  <text x="705" y="542" text-anchor="middle" font-size="9" fill="#827717">robustez a distractores</text>
  <text x="705" y="555" text-anchor="middle" font-size="9" fill="#827717">latência p95</text>

  <line x1="785" y1="471" x2="820" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 11: Assemble -->
  <rect x="820" y="440" width="160" height="62" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="900" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">Montar contexto</text>
  <text x="900" y="478" text-anchor="middle" font-size="9" fill="#555">ordem · comprimir</text>
  <text x="900" y="492" text-anchor="middle" font-size="9" fill="#555">budget de tokens</text>

  <rect x="820" y="512" width="160" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="900" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">utilização do contexto</text>
  <text x="900" y="542" text-anchor="middle" font-size="9" fill="#827717">lost-in-the-middle</text>
  <text x="900" y="555" text-anchor="middle" font-size="9" fill="#827717">compressão × correção</text>

  <line x1="980" y1="471" x2="1015" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 12: Generate -->
  <rect x="1015" y="440" width="130" height="62" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="1080" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#6a1b9a">Gerar</text>
  <text x="1080" y="478" text-anchor="middle" font-size="9" fill="#555">chamada LLM</text>
  <text x="1080" y="492" text-anchor="middle" font-size="9" fill="#555">+ citações</text>

  <rect x="1015" y="512" width="130" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="1080" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">fidelidade · HHEM</text>
  <text x="1080" y="542" text-anchor="middle" font-size="9" fill="#827717">P/R de citações</text>
  <text x="1080" y="555" text-anchor="middle" font-size="9" fill="#827717">FActScore</text>

  <!-- Lane summary -->
  <rect x="40" y="582" width="1105" height="58" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1" />
  <text x="592" y="604" text-anchor="middle" font-size="11" font-weight="600" fill="#e65100">Um mau filtro ou uma reescrita errada zera o recall antes de o ranking começar. A fidelidade continua a parecer boa — o modelo diz com fidelidade "não sei".</text>
  <text x="592" y="624" text-anchor="middle" font-size="10" fill="#e65100">Acompanhe a taxa de exclusão a par de Recall@k. Caso contrário, as métricas IR canónicas vão mentir-lhe sobre um retriever saudável.</text>

  <!-- ============ POST-GEN LANE ============ -->
  <rect x="20" y="668" width="1140" height="78" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1" />
  <text x="40" y="692" font-size="13" font-weight="700" fill="#2e7d32">Pós-geração · Verificação e telemetria</text>

  <rect x="40" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="150" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">verificação de claims · NLI · self-consistency</text>

  <rect x="270" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="380" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">validade do schema · grounding de entidades · ECE</text>

  <rect x="500" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="610" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">taxa de regen · thumbs · dwell · CTR nas citações</text>

  <rect x="730" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="840" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">drift (query/embed) · custo/query · p95</text>

  <rect x="960" y="704" width="185" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="1052" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">shadow eval · fila HITL</text>
</svg>
