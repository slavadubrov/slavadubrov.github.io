<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">O pipeline RAG com pontos de avaliação</title>
  <desc id="artifact-desc">O pipeline RAG com pontos de avaliação.</desc>
  <defs>
    <marker id="arrEval" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155" />
    </marker>
    <filter id="shadowEval" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a" x="590">O pipeline RAG com pontos de avaliação</text>
  <text y="54" text-anchor="middle" font-size="12" fill="#334155" x="590">Cada fase possui uma métrica. É a métrica que deteta falhas silenciosas.</text>

  <!-- ============ OFFLINE LANE ============ -->
  <rect x="20" y="78" width="1140" height="290" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="102" font-size="13" font-weight="700" fill="#1d4ed8" x="40">Off-line · Ingestão</text>
  <text y="118" font-size="10" fill="#64748b" x="40">Ejecuta-se uma vez por versão do corpus. Define o teto máximo.</text>

  <!-- Stage 1: Acquire / Parse -->
  <rect x="40" y="140" width="170" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="125">Adquirir e Analisar</text>
  <text y="178" text-anchor="middle" font-size="9" fill="#334155" x="125">PDFs · HTML · OCR</text>
  <text y="192" text-anchor="middle" font-size="9" fill="#334155" x="125">Tabelas · Layout</text>

  <!-- Metric badge 1 -->
  <rect x="40" y="212" width="170" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="125">CER · WER · TEDS</text>
  <text y="242" text-anchor="middle" font-size="9" fill="#9a3412" x="125">analisar taxa de aprovação</text>
  <text y="255" text-anchor="middle" font-size="9" fill="#9a3412" x="125">fidelidade do layout</text>

  <!-- Arrow -->
  <line x1="210" y1="171" x2="245" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 2: Normalize / Dedup -->
  <rect x="245" y="140" width="170" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="330">Normalizar e Eliminar Duplicados</text>
  <text y="178" text-anchor="middle" font-size="9" fill="#334155" x="330">NFC/NFKC · MinHash</text>
  <text y="192" text-anchor="middle" font-size="9" fill="#334155" x="330">Dados PII · modelo padrão</text>

  <rect x="245" y="212" width="170" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="330">recall/precisão dupla</text>
  <text y="242" text-anchor="middle" font-size="9" fill="#9a3412" x="330">Recuperação de PII (por tipo)</text>
  <text y="255" text-anchor="middle" font-size="9" fill="#9a3412" x="330">Detecção de idioma F1</text>

  <line x1="415" y1="171" x2="450" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 3: Chunk -->
  <rect x="450" y="140" width="170" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="535">Troço</text>
  <text y="178" text-anchor="middle" font-size="9" fill="#334155" x="535">recursivo · semântico</text>
  <text y="192" text-anchor="middle" font-size="9" fill="#334155" x="535">estrutural · tardio</text>

  <rect x="450" y="212" width="170" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="535">contenção do answer-span</text>
  <text y="242" text-anchor="middle" font-size="9" fill="#9a3412" x="535">taxa de rutura de limites</text>
  <text y="255" text-anchor="middle" font-size="9" fill="#9a3412" x="535">Recall@k vs. tamanho</text>

  <line x1="620" y1="171" x2="655" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 4: Enrich (NER/EL) -->
  <rect x="655" y="140" width="170" height="62" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6" x="740">Enriquecer</text>
  <text y="178" text-anchor="middle" font-size="9" fill="#334155" x="740">NER · ligação de entidades</text>
  <text y="192" text-anchor="middle" font-size="9" fill="#334155" x="740">tags · hierarquia</text>

  <rect x="655" y="212" width="170" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="740">Precisão EL F1 · NIL</text>
  <text y="242" text-anchor="middle" font-size="9" fill="#9a3412" x="740">F1 hierárquico</text>
  <text y="255" text-anchor="middle" font-size="9" fill="#9a3412" x="740">cobertura de alias</text>

  <line x1="825" y1="171" x2="860" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 5: Embed -->
  <rect x="860" y="140" width="135" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="927">Incoporar</text>
  <text y="178" text-anchor="middle" font-size="9" fill="#334155" x="927">denso/esparso</text>
  <text y="192" text-anchor="middle" font-size="9" fill="#334155" x="927">multivetorial</text>

  <rect x="860" y="212" width="135" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="927">domínio nDCG@10</text>
  <text y="242" text-anchor="middle" font-size="9" fill="#9a3412" x="927">derivação (KL · NN-stab.)</text>
  <text y="255" text-anchor="middle" font-size="9" fill="#9a3412" x="927">vs. BEIR/MMTEB</text>

  <line x1="995" y1="171" x2="1030" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 6: Index -->
  <rect x="1030" y="140" width="115" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="1087">Índice</text>
  <text y="178" text-anchor="middle" font-size="9" fill="#334155" x="1087">HNSW / IVF</text>
  <text y="192" text-anchor="middle" font-size="9" fill="#334155" x="1087">BM25 · híbrido</text>

  <rect x="1030" y="212" width="115" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="1087">Recall de ANN vs. plano</text>
  <text y="242" text-anchor="middle" font-size="9" fill="#9a3412" x="1087">atraso de frescura p99</text>
  <text y="255" text-anchor="middle" font-size="9" fill="#9a3412" x="1087">latitude de busca filtrada.</text>

  <!-- Lane summary -->
  <rect x="40" y="290" width="1105" height="58" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1" />
  <text y="312" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8" x="592">A prontidão do corpus offline define o limite superior. Se um trecho perder o intervalo da resposta aqui, nenhum mecanismo de reclassificação conseguirá recuperá-lo posteriormente.</text>
  <text y="332" text-anchor="middle" font-size="10" fill="#1d4ed8" x="592">A maioria das equipas investe em excesso na recuperação de informação e insuficientemente na análise sintática, normalização e fragmentação de dados. É aí que o RAG em produção acaba silenciosamente por falhar.</text>

  <!-- ============ ONLINE LANE ============ -->
  <rect x="20" y="378" width="1140" height="280" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="402" font-size="13" font-weight="700" fill="#9a3412" x="40">Online · Inferência (por consulta)</text>
  <text y="418" font-size="10" fill="#64748b" x="40">Ejecuta-se em cada pedido. O canal onde a maioria das métricas é monitorizada em produção.</text>

  <!-- Stage 7: Query Rewrite -->
  <rect x="40" y="440" width="160" height="62" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="120">Reescrever / Rotear</text>
  <text y="478" text-anchor="middle" font-size="9" fill="#334155" x="120">HyDE · múltiplas consultas</text>
  <text y="492" text-anchor="middle" font-size="9" fill="#334155" x="120">intenção · adaptativa</text>

  <rect x="40" y="512" width="160" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="120">Aumento do Recall@k</text>
  <text y="542" text-anchor="middle" font-size="9" fill="#9a3412" x="120">precisão de roteamento</text>
  <text y="555" text-anchor="middle" font-size="9" fill="#9a3412" x="120">taxa de operações sem efeito</text>

  <line x1="200" y1="471" x2="235" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 8: Retrieve -->
  <rect x="235" y="440" width="160" height="62" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="315">Recuperar</text>
  <text y="478" text-anchor="middle" font-size="9" fill="#334155" x="315">densa + esparsa + RRF</text>
  <text y="492" text-anchor="middle" font-size="9" fill="#334155" x="315">predicados de filtro</text>

  <rect x="235" y="512" width="160" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="315">Recall@k · MRR · nDCG</text>
  <text y="542" text-anchor="middle" font-size="9" fill="#9a3412" x="315">precisão/recall no contexto</text>
  <text y="555" text-anchor="middle" font-size="9" fill="#9a3412" x="315">elevador híbrido</text>

  <line x1="395" y1="471" x2="430" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 9: Filter (highlighted) -->
  <rect x="430" y="440" width="160" height="62" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b" x="510">Filtro (o assassino silencioso)</text>
  <text y="478" text-anchor="middle" font-size="9" fill="#334155" x="510">inquilino · ACL · etiqueta</text>
  <text y="492" text-anchor="middle" font-size="9" fill="#334155" x="510">duro vs. mole</text>

  <rect x="430" y="512" width="160" height="48" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.2" />
  <text y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#991b1b" x="510">taxa de falsa exclusão do filtro</text>
  <text y="542" text-anchor="middle" font-size="9" fill="#991b1b" x="510">precisão/recall do predicado</text>
  <text y="555" text-anchor="middle" font-size="9" fill="#991b1b" x="510">recuperação de sombras Δ</text>

  <line x1="590" y1="471" x2="625" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 10: Rerank -->
  <rect x="625" y="440" width="160" height="62" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="705">Reclassificar</text>
  <text y="478" text-anchor="middle" font-size="9" fill="#334155" x="705">codificador cruzado · por lista</text>
  <text y="492" text-anchor="middle" font-size="9" fill="#334155" x="705">BGE · Cohere · ZeRank</text>

  <rect x="625" y="512" width="160" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="705">ΔnDCG · ΔMRR · ΔP@1</text>
  <text y="542" text-anchor="middle" font-size="9" fill="#9a3412" x="705">robustez contra distrações</text>
  <text y="555" text-anchor="middle" font-size="9" fill="#9a3412" x="705">latência p95</text>

  <line x1="785" y1="471" x2="820" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 11: Assemble -->
  <rect x="820" y="440" width="160" height="62" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="900">Montar Contexto</text>
  <text y="478" text-anchor="middle" font-size="9" fill="#334155" x="900">ordem · compressão</text>
  <text y="492" text-anchor="middle" font-size="9" fill="#334155" x="900">tokens orçamentados</text>

  <rect x="820" y="512" width="160" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="900">utilização de contexto</text>
  <text y="542" text-anchor="middle" font-size="9" fill="#9a3412" x="900">ataque do tipo perdido no meio</text>
  <text y="555" text-anchor="middle" font-size="9" fill="#9a3412" x="900">compressão × correção</text>

  <line x1="980" y1="471" x2="1015" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 12: Generate -->
  <rect x="1015" y="440" width="130" height="62" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6" x="1080">Gerar</text>
  <text y="478" text-anchor="middle" font-size="9" fill="#334155" x="1080">Chamada de LLM</text>
  <text y="492" text-anchor="middle" font-size="9" fill="#334155" x="1080">+ referências</text>

  <rect x="1015" y="512" width="130" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="1080">fidelidade · HHEM</text>
  <text y="542" text-anchor="middle" font-size="9" fill="#9a3412" x="1080">citação P/R</text>
  <text y="555" text-anchor="middle" font-size="9" fill="#9a3412" x="1080">Escore de Fato</text>

  <!-- Lane summary -->
  <rect x="40" y="582" width="1105" height="58" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1" />
  <text y="604" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412" x="592">Um filtro defeituoso ou uma reescrita incorreta zeram o recall antes do início da classificação. A fidelidade continua adequada — o modelo indica corretamente "Não sei."</text>
  <text y="624" text-anchor="middle" font-size="10" fill="#9a3412" x="592">Monitore a taxa de exclusão de trilhas juntamente com o Recall@k. Caso contrário, as métricas canônicas de IR irão enganá-lo quanto à eficácia do recuperador.</text>

  <!-- ============ POST-GEN LANE ============ -->
  <rect x="20" y="668" width="1140" height="78" rx="10" fill="#f0fdf4" stroke="#166534" stroke-width="1" />
  <text y="692" font-size="13" font-weight="700" fill="#166534" x="40">Pós-geração · Verificação e Telemetria</text>

  <rect x="40" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="150">verificação de reivindicações · NLI · autoconsistência</text>

  <rect x="270" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="380">validade do esquema · ancoragem de entidades · ECE</text>

  <rect x="500" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="610">taxa de regeneração · cliques com o polegar · tempo de permanência · CTR em citações</text>

  <rect x="730" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="840">desvio (consulta/incorporação) · custo/consulta · p95</text>

  <rect x="960" y="704" width="185" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="1052">avaliação de sombra · fila HITL</text>
</svg>
