<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 660" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Three places where a RAG system can lose evidence: ingestion, query time, and the answer or production environment" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Três locais onde um sistema RAG pode perder evidências</title>
  <defs>
    <marker id="arrLayer" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#64748b" />
    </marker>
    <filter id="shadowL" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="1180" height="660" fill="#f8fafc" />

  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a" x="590">Três locais onde um sistema RAG pode perder evidências</text>
  <text y="56" text-anchor="middle" font-size="12" fill="#64748b" x="590">Ingestão · Tempo de consulta pipeline · Qualidade da resposta e comportamento em produção</text>

  <!-- =============== Layer 1: Ingestion =============== -->
  <rect x="30" y="80" width="1120" height="160" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowL)" />
  <text y="106" font-size="14" font-weight="700" fill="#1d4ed8" x="55">Camada 1 · Ingestão</text>
  <text y="124" font-size="11" fill="#1d4ed8" x="55">Pergunta: o corpus e o índice preservaram a fonte original?</text>

  <!-- Sub-cards -->
  <rect x="55" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="175">Prontidão do corpus</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="175">taxa de sucesso de análise · CER/WER</text>
  <text y="193" text-anchor="middle" font-size="11" fill="#64748b" x="175">TEDS · cobertura de metadados</text>
  <text y="208" text-anchor="middle" font-size="11" fill="#64748b" x="175">frescura · eliminação de duplicatas</text>

  <rect x="305" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="425">Fragmentação</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="425">contenção do answer-span</text>
  <text y="193" text-anchor="middle" font-size="11" fill="#64748b" x="425">taxa de quebra de fronteira</text>
  <text y="208" text-anchor="middle" font-size="11" fill="#64748b" x="425">redundância de sobreposição</text>

  <rect x="555" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="675">Embedding · Índice</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="675">domínio nDCG@10</text>
  <text y="193" text-anchor="middle" font-size="11" fill="#64748b" x="675">ANN taxa de recuperação versus valor fixo</text>
  <text y="208" text-anchor="middle" font-size="11" fill="#64748b" x="675">linha de base de derivação</text>

  <rect x="805" y="140" width="320" height="80" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="965">Enriquecimento (NER · EL · tags)</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="965">EL F1 · Tratamento de NIL · Cobertura de aliases</text>
  <text y="193" text-anchor="middle" font-size="11" fill="#64748b" x="965">F1 hierárquico · taxa de tags órfãs</text>
  <text y="208" text-anchor="middle" font-size="11" fill="#64748b" x="965">validade do esquema no momento da publicação</text>

  <!-- Arrow down to Layer 2 -->
  <line x1="590" y1="244" x2="590" y2="280" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrLayer)" />
  <text y="265" font-size="11" fill="#64748b" font-style="italic" x="700">define o teto de recall para todos os elementos abaixo</text>

  <!-- =============== Layer 2: Query time =============== -->
  <rect x="30" y="290" width="1120" height="160" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowL)" />
  <text y="316" font-size="14" font-weight="700" fill="#9a3412" x="55">Camada 2 · Tempo de consulta</text>
  <text y="334" font-size="11" fill="#9a3412" x="55">Pergunta: o pipeline encontrou e compilou as evidências corretas?</text>

  <rect x="55" y="350" width="240" height="80" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="175">Compreensão da consulta</text>
  <text y="388" text-anchor="middle" font-size="11" fill="#64748b" x="175">reescrita de ganho/perda</text>
  <text y="403" text-anchor="middle" font-size="11" fill="#64748b" x="175">precisão de roteamento</text>
  <text y="418" text-anchor="middle" font-size="11" fill="#64748b" x="175">cobertura de decomposição</text>

  <rect x="305" y="350" width="240" height="80" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="425">Recuperação</text>
  <text y="388" text-anchor="middle" font-size="11" fill="#64748b" x="425">Recall@k · MRR · nDCG · MAP</text>
  <text y="403" text-anchor="middle" font-size="11" fill="#64748b" x="425">precisão/recuperação de contexto</text>
  <text y="418" text-anchor="middle" font-size="11" fill="#64748b" x="425">elevação híbrida em cada faixa</text>

  <rect x="555" y="350" width="240" height="80" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.6" />
  <text y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b" x="675">Filtragem (zona crítica)</text>
  <text y="388" text-anchor="middle" font-size="11" fill="#991b1b" x="675">taxa de falsa exclusão do filtro</text>
  <text y="403" text-anchor="middle" font-size="11" fill="#991b1b" x="675">precisão/recall de predicado</text>
  <text y="418" text-anchor="middle" font-size="11" fill="#991b1b" x="675">recolha de sombras Δ</text>

  <rect x="805" y="350" width="320" height="80" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="965">Reranking · Montagem de contexto</text>
  <text y="388" text-anchor="middle" font-size="11" fill="#64748b" x="965">ΔnDCG · ΔMRR em cenário sem reclassificação</text>
  <text y="403" text-anchor="middle" font-size="11" fill="#64748b" x="965">utilização de contexto · perda no meio</text>
  <text y="418" text-anchor="middle" font-size="11" fill="#64748b" x="965">robustez contra distrações (RGB)</text>

  <!-- Arrow down to Layer 3 -->
  <line x1="590" y1="454" x2="590" y2="490" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrLayer)" />
  <text y="475" font-size="11" fill="#64748b" font-style="italic" x="700">fornece contexto verificado para a geração</text>

  <!-- =============== Layer 3: Answer and production =============== -->
  <rect x="30" y="500" width="1120" height="135" rx="12" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowL)" />
  <text y="526" font-size="14" font-weight="700" fill="#166534" x="55">Camada 3 · Resposta e produção</text>
  <text y="544" font-size="11" fill="#166534" x="55">Pergunta: a resposta utilizou as evidências disponíveis, e a qualidade permanece estável sob tráfego real?</text>

  <rect x="55" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="175">Fidelidade</text>
  <text y="595" text-anchor="middle" font-size="11" fill="#64748b" x="175">RAGAS · HHEM · FActScore</text>
  <text y="610" text-anchor="middle" font-size="11" fill="#64748b" x="175">FaithJudge · autoconsistência</text>

  <rect x="305" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="425">Citações e estrutura</text>
  <text y="595" text-anchor="middle" font-size="11" fill="#64748b" x="425">precisão/recuperação de citações</text>
  <text y="610" text-anchor="middle" font-size="11" fill="#64748b" x="425">validade do esquema · conformidade do vocabulário</text>

  <rect x="555" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="675">Sinal implícito + explícito</text>
  <text y="595" text-anchor="middle" font-size="11" fill="#64748b" x="675">taxa de regeneração · permanência · CTR em citações</text>
  <text y="610" text-anchor="middle" font-size="11" fill="#64748b" x="675">imagens de thumbnail · estrela · edições inline</text>

  <rect x="805" y="558" width="320" height="68" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="965">Derivação · custo · latência · HITL</text>
  <text y="595" text-anchor="middle" font-size="11" fill="#64748b" x="965">consulta/embedding deriva · latência p95 · $/consulta</text>
  <text y="610" text-anchor="middle" font-size="11" fill="#64748b" x="965">avaliação de sombra · fila de revisão de baixa confiança</text>
</svg>
