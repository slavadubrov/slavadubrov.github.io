<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 660" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrLayer" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#555" />
    </marker>
    <filter id="shadowL" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Title -->
  <text x="590" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a2e">A Disciplina de Avaliação em Três Camadas</text>
  <text x="590" y="54" text-anchor="middle" font-size="12" fill="#666">Corpus e índice offline · Recuperação e geração online · Verificação pós-geração + telemetria de produção</text>

  <!-- =============== Layer 1: Offline =============== -->
  <rect x="30" y="80" width="1120" height="160" rx="12" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowL)" />
  <text x="55" y="106" font-size="14" font-weight="700" fill="#1565c0">Camada 1 · Offline</text>
  <text x="55" y="124" font-size="10" fill="#1565c0">Pergunta: a base de conhecimento foi preparada corretamente?</text>

  <!-- Sub-cards -->
  <rect x="55" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1" />
  <text x="175" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">Prontidão do corpus</text>
  <text x="175" y="178" text-anchor="middle" font-size="10" fill="#555">taxa de parsing aprovado · CER/WER</text>
  <text x="175" y="193" text-anchor="middle" font-size="10" fill="#555">TEDS · cobertura de metadados</text>
  <text x="175" y="208" text-anchor="middle" font-size="10" fill="#555">atualidade · dedup</text>

  <rect x="305" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1" />
  <text x="425" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">Chunking</text>
  <text x="425" y="178" text-anchor="middle" font-size="10" fill="#555">contenção do span de resposta</text>
  <text x="425" y="193" text-anchor="middle" font-size="10" fill="#555">taxa de quebra de fronteira</text>
  <text x="425" y="208" text-anchor="middle" font-size="10" fill="#555">redundância de sobreposição</text>

  <rect x="555" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1" />
  <text x="675" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">Embedding · Índice</text>
  <text x="675" y="178" text-anchor="middle" font-size="10" fill="#555">nDCG@10 do domínio</text>
  <text x="675" y="193" text-anchor="middle" font-size="10" fill="#555">recall ANN vs. flat</text>
  <text x="675" y="208" text-anchor="middle" font-size="10" fill="#555">baseline de drift</text>

  <rect x="805" y="140" width="320" height="80" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1" />
  <text x="965" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">Enriquecimento (NER · EL · tags)</text>
  <text x="965" y="178" text-anchor="middle" font-size="10" fill="#555">EL F1 · tratamento de NIL · cobertura de aliases</text>
  <text x="965" y="193" text-anchor="middle" font-size="10" fill="#555">F1 hierárquico · taxa de tags órfãs</text>
  <text x="965" y="208" text-anchor="middle" font-size="10" fill="#555">validade do esquema na publicação</text>

  <!-- Arrow down to Layer 2 -->
  <line x1="590" y1="244" x2="590" y2="280" stroke="#555" stroke-width="1.6" marker-end="url(#arrLayer)" />
  <text x="700" y="265" font-size="10" fill="#888" font-style="italic">define o teto de recall para tudo abaixo</text>

  <!-- =============== Layer 2: Online =============== -->
  <rect x="30" y="290" width="1120" height="160" rx="12" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowL)" />
  <text x="55" y="316" font-size="14" font-weight="700" fill="#e65100">Camada 2 · Online (por query)</text>
  <text x="55" y="334" font-size="10" fill="#e65100">Pergunta: a evidência certa foi encontrada e usada nesta query?</text>

  <rect x="55" y="350" width="240" height="80" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1" />
  <text x="175" y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Compreensão da query</text>
  <text x="175" y="388" text-anchor="middle" font-size="10" fill="#555">ganho/perda de rewrite</text>
  <text x="175" y="403" text-anchor="middle" font-size="10" fill="#555">precisão de routing</text>
  <text x="175" y="418" text-anchor="middle" font-size="10" fill="#555">cobertura de decomposição</text>

  <rect x="305" y="350" width="240" height="80" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1" />
  <text x="425" y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Recuperação</text>
  <text x="425" y="388" text-anchor="middle" font-size="10" fill="#555">Recall@k · MRR · nDCG · MAP</text>
  <text x="425" y="403" text-anchor="middle" font-size="10" fill="#555">precisão/recall do contexto</text>
  <text x="425" y="418" text-anchor="middle" font-size="10" fill="#555">ganho híbrido sobre cada via</text>

  <rect x="555" y="350" width="240" height="80" rx="8" fill="#ffebee" stroke="#c62828" stroke-width="1.6" />
  <text x="675" y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#c62828">Filtragem (zona crítica)</text>
  <text x="675" y="388" text-anchor="middle" font-size="10" fill="#c62828">taxa de falsa exclusão do filtro</text>
  <text x="675" y="403" text-anchor="middle" font-size="10" fill="#c62828">precisão/recall do predicado</text>
  <text x="675" y="418" text-anchor="middle" font-size="10" fill="#c62828">Δ de shadow-retrieval</text>

  <rect x="805" y="350" width="320" height="80" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1" />
  <text x="965" y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Reranking · Montagem de contexto</text>
  <text x="965" y="388" text-anchor="middle" font-size="10" fill="#555">ΔnDCG · ΔMRR vs. sem rerank</text>
  <text x="965" y="403" text-anchor="middle" font-size="10" fill="#555">utilização do contexto · lost-in-middle</text>
  <text x="965" y="418" text-anchor="middle" font-size="10" fill="#555">robustez a distratores (RGB)</text>

  <!-- Arrow down to Layer 3 -->
  <line x1="590" y1="454" x2="590" y2="490" stroke="#555" stroke-width="1.6" marker-end="url(#arrLayer)" />
  <text x="700" y="475" font-size="10" fill="#888" font-style="italic">alimenta a geração com contexto verificado</text>

  <!-- =============== Layer 3: Post-gen =============== -->
  <rect x="30" y="500" width="1120" height="135" rx="12" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadowL)" />
  <text x="55" y="526" font-size="14" font-weight="700" fill="#2e7d32">Camada 3 · Pós-geração e telemetria de produção</text>
  <text x="55" y="544" font-size="10" fill="#2e7d32">Pergunta: a resposta é fiel, verificável e segura para lançar — e continuará assim na próxima semana?</text>

  <rect x="55" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="175" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Fidelidade</text>
  <text x="175" y="595" text-anchor="middle" font-size="10" fill="#555">RAGAS · HHEM · FActScore</text>
  <text x="175" y="610" text-anchor="middle" font-size="10" fill="#555">FaithJudge · auto-consistência</text>

  <rect x="305" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="425" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Citações e estrutura</text>
  <text x="425" y="595" text-anchor="middle" font-size="10" fill="#555">precisão/recall de citações</text>
  <text x="425" y="610" text-anchor="middle" font-size="10" fill="#555">validade do esquema · conformidade vocabular</text>

  <rect x="555" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="675" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Sinal implícito + explícito</text>
  <text x="675" y="595" text-anchor="middle" font-size="10" fill="#555">taxa de regen · dwell · CTR nas citações</text>
  <text x="675" y="610" text-anchor="middle" font-size="10" fill="#555">thumbs · estrela · edições inline</text>

  <rect x="805" y="558" width="320" height="68" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="965" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Drift · custo · latência · HITL</text>
  <text x="965" y="595" text-anchor="middle" font-size="10" fill="#555">drift de query/embedding · latência p95 · $/query</text>
  <text x="965" y="610" text-anchor="middle" font-size="10" fill="#555">shadow eval · fila de revisão de baixa confiança</text>
</svg>
