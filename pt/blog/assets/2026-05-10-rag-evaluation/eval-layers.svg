<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 660" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="The three-layer evaluation discipline" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">A disciplina de avaliação em três camadas</title>
  <defs>
    <marker id="arrLayer" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#334155" />
    </marker>
    <filter id="shadowL" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a" x="590">A Disciplina de Avaliação em Três Camadas</text>
  <text y="54" text-anchor="middle" font-size="12" fill="#334155" x="590">Corpo de dados e índice offline · Recuperação e geração online · Verificação pós-geração + telemetria de produção</text>

  <!-- =============== Layer 1: Offline =============== -->
  <rect x="30" y="80" width="1120" height="160" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowL)" />
  <text y="106" font-size="14" font-weight="700" fill="#1d4ed8" x="55">Camada 1 · Offline</text>
  <text y="124" font-size="10" fill="#1d4ed8" x="55">Pergunta: a base de conhecimento foi preparada corretamente?</text>

  <!-- Sub-cards -->
  <rect x="55" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="175">Prontidão do corpus</text>
  <text y="178" text-anchor="middle" font-size="10" fill="#334155" x="175">taxa de sucesso de parsing · CER/WER</text>
  <text y="193" text-anchor="middle" font-size="10" fill="#334155" x="175">TEDS · cobertura de metadados</text>
  <text y="208" text-anchor="middle" font-size="10" fill="#334155" x="175">frescura · deduplicação</text>

  <rect x="305" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="425">Fragmentação</text>
  <text y="178" text-anchor="middle" font-size="10" fill="#334155" x="425">contenção do answer-span</text>
  <text y="193" text-anchor="middle" font-size="10" fill="#334155" x="425">taxa de quebra de fronteira</text>
  <text y="208" text-anchor="middle" font-size="10" fill="#334155" x="425">redundância de sobreposição</text>

  <rect x="555" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="675">Embedding · Índice</text>
  <text y="178" text-anchor="middle" font-size="10" fill="#334155" x="675">domínio nDCG@10</text>
  <text y="193" text-anchor="middle" font-size="10" fill="#334155" x="675">ANN taxa de recuperação versus valor fixo</text>
  <text y="208" text-anchor="middle" font-size="10" fill="#334155" x="675">linha de base de derivação</text>

  <rect x="805" y="140" width="320" height="80" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="965">Enriquecimento (NER · EL · tags)</text>
  <text y="178" text-anchor="middle" font-size="10" fill="#334155" x="965">EL F1 · Tratamento de NIL · Cobertura de aliases</text>
  <text y="193" text-anchor="middle" font-size="10" fill="#334155" x="965">F1 hierárquico · taxa de tags órfãs</text>
  <text y="208" text-anchor="middle" font-size="10" fill="#334155" x="965">validade do esquema no momento da publicação</text>

  <!-- Arrow down to Layer 2 -->
  <line x1="590" y1="244" x2="590" y2="280" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrLayer)" />
  <text y="265" font-size="10" fill="#64748b" font-style="italic" x="700">define o teto de recall para todos os elementos abaixo</text>

  <!-- =============== Layer 2: Online =============== -->
  <rect x="30" y="290" width="1120" height="160" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowL)" />
  <text y="316" font-size="14" font-weight="700" fill="#9a3412" x="55">Camada 2 · Em tempo real (por consulta)</text>
  <text y="334" font-size="10" fill="#9a3412" x="55">Pergunta: Foram encontradas e utilizadas as provas corretas para esta consulta?</text>

  <rect x="55" y="350" width="240" height="80" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="175">Compreensão de consulta</text>
  <text y="388" text-anchor="middle" font-size="10" fill="#334155" x="175">reescrita de ganho/perda</text>
  <text y="403" text-anchor="middle" font-size="10" fill="#334155" x="175">precisão de roteamento</text>
  <text y="418" text-anchor="middle" font-size="10" fill="#334155" x="175">cobertura de decomposição</text>

  <rect x="305" y="350" width="240" height="80" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="425">Recuperação</text>
  <text y="388" text-anchor="middle" font-size="10" fill="#334155" x="425">Recall@k · MRR · nDCG · MAP</text>
  <text y="403" text-anchor="middle" font-size="10" fill="#334155" x="425">precisão/recuperação de contexto</text>
  <text y="418" text-anchor="middle" font-size="10" fill="#334155" x="425">elevação híbrida em cada faixa</text>

  <rect x="555" y="350" width="240" height="80" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.6" />
  <text y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b" x="675">Filtragem (zona crítica)</text>
  <text y="388" text-anchor="middle" font-size="10" fill="#991b1b" x="675">taxa de falsa exclusão do filtro</text>
  <text y="403" text-anchor="middle" font-size="10" fill="#991b1b" x="675">precisão/recall de predicado</text>
  <text y="418" text-anchor="middle" font-size="10" fill="#991b1b" x="675">recuperação de sombras Δ</text>

  <rect x="805" y="350" width="320" height="80" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="965">Reranking · Montagem de contexto</text>
  <text y="388" text-anchor="middle" font-size="10" fill="#334155" x="965">ΔnDCG · ΔMRR em cenário sem reclassificação</text>
  <text y="403" text-anchor="middle" font-size="10" fill="#334155" x="965">utilização de contexto · perda no meio</text>
  <text y="418" text-anchor="middle" font-size="10" fill="#334155" x="965">robustez contra distrações (RGB)</text>

  <!-- Arrow down to Layer 3 -->
  <line x1="590" y1="454" x2="590" y2="490" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrLayer)" />
  <text y="475" font-size="10" fill="#64748b" font-style="italic" x="700">fornece contexto verificado para a geração</text>

  <!-- =============== Layer 3: Post-gen =============== -->
  <rect x="30" y="500" width="1120" height="135" rx="12" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowL)" />
  <text y="526" font-size="14" font-weight="700" fill="#166534" x="55">Camada 3 · Telemetria pós-geração e em produção</text>
  <text y="544" font-size="10" fill="#166534" x="55">Pergunta: a resposta é fiel, verificável e segura para ser lançada — e continuará assim na próxima semana?</text>

  <rect x="55" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="175">Fidelidade</text>
  <text y="595" text-anchor="middle" font-size="10" fill="#334155" x="175">RAGAS · HHEM · FActScore</text>
  <text y="610" text-anchor="middle" font-size="10" fill="#334155" x="175">FaithJudge · autoconsistência</text>

  <rect x="305" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="425">Citações e estrutura</text>
  <text y="595" text-anchor="middle" font-size="10" fill="#334155" x="425">precisão/recuperação de citações</text>
  <text y="610" text-anchor="middle" font-size="10" fill="#334155" x="425">validade do esquema · conformidade do vocabulário</text>

  <rect x="555" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="675">Sinal implícito + explícito</text>
  <text y="595" text-anchor="middle" font-size="10" fill="#334155" x="675">taxa de regeneração · permanência · CTR em citações</text>
  <text y="610" text-anchor="middle" font-size="10" fill="#334155" x="675">polegares · estrela · edições em linha</text>

  <rect x="805" y="558" width="320" height="68" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="965">Derivação · custo · latência · HITL</text>
  <text y="595" text-anchor="middle" font-size="10" fill="#334155" x="965">consulta/embedding deriva · latência p95 · $/consulta</text>
  <text y="610" text-anchor="middle" font-size="10" fill="#334155" x="965">avaliação de sombra · fila de revisão de baixa confiança</text>
</svg>
