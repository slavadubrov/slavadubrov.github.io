<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 590" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Escolher a instalação da versão UV, UVX ou da ferramenta UV</title><desc id="desc">Três colunas direcionam as ferramentas vinculadas a projetos para o uv run, as ferramentas isoladas ad hoc para o uvx, e os executáveis que precisam permanecer no PATH para a instalação da ferramenta uv.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="590" rx="28" fill="#0f172a" />
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Escolha um ambiente de ferramentas com base no que ele precisa processar</text>
  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <g transform="translate(55 135)"><rect width="340" height="340" rx="22" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="170" y="52" fill="#93c5fd" font-size="23" font-weight="700">execução UV</text><text x="170" y="92" fill="#93c5fd" font-size="17">acoplado ao projeto</text><text x="170" y="145" fill="#e2e8f0" font-size="15">importa o código do projeto</text><text x="170" y="178" fill="#e2e8f0" font-size="15">utiliza grupos bloqueados e plugins</text><text x="170" y="211" fill="#e2e8f0" font-size="15">o ciclo de vida segue o repositório</text><rect x="35" y="260" width="270" height="50" rx="12" fill="#1d4ed8" /><text x="170" y="291" fill="#93c5fd" font-size="15">uv run --group test pytest</text></g>
    <g transform="translate(430 135)"><rect width="340" height="340" rx="22" fill="#5b21b6" /><text x="170" y="52" fill="#93c5fd" font-size="23" font-weight="700">uvx</text><text x="170" y="92" fill="#c4b5fd" font-size="17">ad hoc + isolado</text><text x="170" y="145" fill="#e2e8f0" font-size="15">não vê as importações de projeto</text><text x="170" y="178" fill="#e2e8f0" font-size="15">o ambiente está armazenado em cache</text><text x="170" y="211" fill="#e2e8f0" font-size="15">versão de pin para reprodutibilidade</text><rect x="35" y="260" width="270" height="50" rx="12" fill="#5b21b6" /><text x="170" y="291" fill="#93c5fd" font-size="15">uvx ruff@0.12.0 realizar verificação .</text></g>
    <g transform="translate(805 135)"><rect width="340" height="340" rx="22" fill="#166534" /><text x="170" y="52" fill="#93c5fd" font-size="23" font-weight="700">instalação da ferramenta UV</text><text x="170" y="92" fill="#93c5fd" font-size="17">persistente + em PATH</text><text x="170" y="145" fill="#e2e8f0" font-size="15">ambiente de ferramentas dedicado</text><text x="170" y="178" fill="#e2e8f0" font-size="15">disponível para outros programas</text><text x="170" y="211" fill="#e2e8f0" font-size="15">ciclo de vida de atualização explícita</text><rect x="35" y="260" width="270" height="50" rx="12" fill="#166534" /><text x="170" y="291" fill="#86efac" font-size="15">instalar ferramenta uv com 'ruff==0.12.0'</text></g>
    <rect x="245" y="515" width="710" height="42" rx="14" fill="#1e293b" /><text x="600" y="542" fill="#cbd5e1" font-size="16">O isolamento é uma funcionalidade; escolha a visibilidade do projeto de forma intencional.</text>
  </g>
</svg>
