<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Duas Formas de Executar uma Ferramenta</title>
  <desc id="artifact-desc">Duas Formas de Executar uma Ferramenta.</desc>
  <defs>
    <filter id="shadow3" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="100%" height="100%" fill="#f8fafc" /><rect width="800" height="380" fill="#0f172a" rx="12" ry="12" />

  <text y="44" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="bold" fill="#f8fafc" text-anchor="middle" x="400">Duas Formas de Executar uma Ferramenta</text>
  <text y="70" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#93c5fd" text-anchor="middle" x="400">Execute-o uma vez ou mantenha-o no seu PATH</text>

  <!-- uvx card -->
  <rect x="50" y="100" width="330" height="240" rx="10" fill="#1e293b" stroke="#2563eb" stroke-width="2" filter="url(#shadow3)" />
  <text y="138" font-family="SFMono-Regular, Consolas, monospace" font-size="18" font-weight="bold" fill="#93c5fd" text-anchor="middle" x="215">Verificação de ruído UVX.</text>
  <text y="162" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#93c5fd" text-anchor="middle" x="215">Execução da ferramenta UV — efémera</text>

  <g font-family="Inter, system-ui, sans-serif" font-size="13" fill="#eff6ff">
    <text y="200" x="80">• Ambiente temporário em cache</text>
    <text y="226" x="80">• Nada adicionado ao PATH</text>
    <text y="252" x="80">• Sempre obtém a versão que foi solicitada</text>
    <text y="278" x="80">• Ideal para CI e execuções pontuais</text>
  </g>
  <text y="318" font-family="SFMono-Regular, Consolas, monospace" font-size="12" fill="#86efac" text-anchor="middle" x="215">uvx ruff@0.6.0 / uvx --with click mytool</text>

  <!-- tool install card -->
  <rect x="420" y="100" width="330" height="240" rx="10" fill="#1e293b" stroke="#2563eb" stroke-width="2" filter="url(#shadow3)" />
  <text y="138" font-family="SFMono-Regular, Consolas, monospace" font-size="17" font-weight="bold" fill="#93c5fd" text-anchor="middle" x="585">Instalar a ferramenta uv e o Ruff</text>
  <text y="162" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#93c5fd" text-anchor="middle" x="585">persistente — no seu PATH</text>

  <g font-family="Inter, system-ui, sans-serif" font-size="13" fill="#eff6ff">
    <text y="200" x="450">• Instalado uma única vez, ambiente isolado</text>
    <text y="226" x="450">• Chame-o diretamente: basta usar `ruff`</text>
    <text y="252" x="450">• Atualização da ferramenta UV --all para atualizar</text>
    <text y="278" x="450">• Ideal para ferramentas de uso diário.</text>
  </g>
  <text y="318" font-family="SFMono-Regular, Consolas, monospace" font-size="12" fill="#fdba74" text-anchor="middle" x="585" transform="translate(-20.97 0.00)">Lista de ferramentas UV / Desinstalação de ferramentas UV no Ruff</text>
</svg>
