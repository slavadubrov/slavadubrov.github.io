<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">O ecossistema UV</title>
  <desc id="artifact-desc">O ecossistema UV.</desc>
  <defs>
    <linearGradient id="uvGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #dc2626;stop-opacity:1" />
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>


  <rect width="100%" height="100%" fill="#f8fafc" /><rect width="800" height="400" fill="#0f172a" rx="15" ry="15" />


  <text y="50" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="bold" fill="#f8fafc" text-anchor="middle" x="400">O ecossistema UV</text>
  <text y="80" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#93c5fd" text-anchor="middle" x="400">Uma única ferramenta para substituir todas elas</text>


  <circle cx="400" cy="220" r="80" fill="url(#uvGradient)" />
  <text y="225" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="bold" fill="#f8fafc" text-anchor="middle" x="400">UV</text>
  <text y="255" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#f8fafc" text-anchor="middle" x="400">Desenvolvido com Rust</text>



  <g transform="translate(250, 150)">
    <circle cx="0" cy="0" r="40" fill="#1e293b" stroke="#2563eb" stroke-width="2" />
    <text y="5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#93c5fd" text-anchor="middle" x="0">pip</text>
  </g>
  <line x1="285" y1="165" x2="335" y2="190" stroke="#2563eb" stroke-width="2" stroke-dasharray="5,5" opacity="0.6" />


  <g transform="translate(550, 150)">
    <circle cx="0" cy="0" r="40" fill="#1e293b" stroke="#ea580c" stroke-width="2" />
    <text y="5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#fdba74" text-anchor="middle" x="0">ambiente virtual de desenvolvimento</text>
  </g>
  <line x1="515" y1="165" x2="465" y2="190" stroke="#ea580c" stroke-width="2" stroke-dasharray="5,5" opacity="0.6" />


  <g transform="translate(250, 290)">
    <circle cx="0" cy="0" r="40" fill="#1e293b" stroke="#2563eb" stroke-width="2" />
    <text y="0" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold" fill="#93c5fd" text-anchor="middle" x="0">pip-tools</text>
    <text y="15" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#93c5fd" text-anchor="middle" x="0">(compilar/sincronizar)</text>
  </g>
  <line x1="285" y1="275" x2="335" y2="250" stroke="#2563eb" stroke-width="2" stroke-dasharray="5,5" opacity="0.6" />


  <g transform="translate(550, 290)">
    <circle cx="0" cy="0" r="40" fill="#1e293b" stroke="#dc2626" stroke-width="2" />
    <text y="5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#fca5a5" text-anchor="middle" x="0">pyenv</text>
  </g>
  <line x1="515" y1="275" x2="465" y2="250" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,5" opacity="0.6" />


  <text y="370" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd" text-anchor="middle" x="400">O uv unifica a gestão de pacotes, ambientes virtuais e a gestão de versões do Python</text>
</svg>
