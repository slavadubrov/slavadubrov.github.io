<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Quatro limites de fluxo de trabalho UV</title><desc id="desc">O Python gerido, os projetos, os scripts e as ferramentas CLI são quatro ciclos de vida separados geridos pelo uv. As bibliotecas e aplicações hospedadas permanecem fora do uv, sob a gestão de um gestor de pacotes do sistema.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="650" rx="28" fill="#0f172a" />
  <text x="600" y="64" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Um executável, ciclos de vida separados</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(70 140)"><rect width="500" height="180" rx="20" fill="#1d4ed8" /><text x="30" y="47" fill="#93c5fd" font-size="23" font-weight="700">Python Gerido</text><text x="30" y="86" fill="#93c5fd" font-size="17">instalação / fixação de versão / lista do uv python</text><text x="30" y="123" fill="#93c5fd" font-size="15">distribuições de interpretador no diretório de dados UV</text><text x="30" y="151" fill="#93c5fd" font-size="15">descobrível juntamente com interpretadores externos</text></g>
    <g transform="translate(630 140)"><rect width="500" height="180" rx="20" fill="#5b21b6" /><text x="30" y="47" fill="#93c5fd" font-size="23" font-weight="700">Projeto</text><text x="30" y="86" fill="#93c5fd" font-size="17">pyproject.toml + uv.lock → ambiente virtual</text><text x="30" y="123" fill="#c4b5fd" font-size="15">declarações e resolução partilhadas</text><text x="30" y="151" fill="#c4b5fd" font-size="15">ambiente instalado descartável</text></g>
    <g transform="translate(70 365)"><rect width="500" height="180" rx="20" fill="#9a3412" /><text x="30" y="47" fill="#fdba74" font-size="23" font-weight="700">script PEP 723</text><text x="30" y="86" fill="#fdba74" font-size="17">metadados inline + bloqueio adjacente opcional</text><text x="30" y="123" fill="#fdba74" font-size="15">unidade de lançamento em ficheiro único</text><text x="30" y="151" fill="#fdba74" font-size="15">ambiente de execução em cache isolado</text></g>
    <g transform="translate(630 365)"><rect width="500" height="180" rx="20" fill="#166534" /><text x="30" y="47" fill="#93c5fd" font-size="23" font-weight="700">ferramenta CLI</text><text x="30" y="86" fill="#93c5fd" font-size="17">cache UVX ou ambiente de ferramentas persistente</text><text x="30" y="123" fill="#93c5fd" font-size="15">isolado das importações do projeto</text><text x="30" y="151" fill="#93c5fd" font-size="15">A exposição do PATH apenas quando instalado intencionalmente</text></g>
    <rect x="250" y="585" width="700" height="42" rx="14" fill="#1e293b" /><text x="600" y="612" text-anchor="middle" fill="#cbd5e1" font-size="16">O Homebrew ou o macOS continuam a controlar as aplicações host e as bibliotecas nativas.</text>
  </g>
</svg>
