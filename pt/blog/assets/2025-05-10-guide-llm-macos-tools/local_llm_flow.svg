  <path d="M 535 315 Q 500 315 500 280 Q 500 245 535 245" class="arrow" fill="none" stroke="#16a34a" marker-end="url(#arrowhead)" />
  <text y="285" class="label" x="495" transform="rotate(-90, 495, 285)">Computar</text>

