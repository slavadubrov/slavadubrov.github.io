<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Orçamento de memória unificada Apple Silicon para inferência local</title>
  <desc id="desc">A memória unificada instalada é partilhada entre o macOS e as aplicações, os pesos do modelo, KV cache, bem como o espaço de trabalho runtime. Uma reserva destinada a lidar com pressões de memória separa um ficheiro que é carregado de uma carga de trabalho que é executada sem problemas.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="440" rx="22" fill="#0f172a" /><text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">A memória instalada não corresponde ao orçamento do modelo</text>
  <g font-family="Inter, system-ui, sans-serif"><rect x="55" y="115" width="890" height="145" rx="18" fill="#1e293b" stroke="#64748b" /><rect x="55" y="115" width="230" height="145" rx="18" fill="#1d4ed8" /><rect x="285" y="115" width="280" height="145" fill="#5b21b6" /><rect x="565" y="115" width="170" height="145" fill="#9a3412" /><rect x="735" y="115" width="210" height="145" rx="18" fill="#1d4ed8" />
  <text x="170" y="165" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">macOS e aplicações</text><text x="170" y="198" text-anchor="middle" font-size="12" fill="#93c5fd">alterações durante a utilização</text>
  <text x="425" y="165" text-anchor="middle" font-size="16" font-weight="700" fill="#c4b5fd">Pesos do modelo</text><text x="425" y="198" text-anchor="middle" font-size="12" fill="#93c5fd">dependente de artefacto</text>
  <text x="650" y="165" text-anchor="middle" font-size="16" font-weight="700" fill="#fdba74">KV cache</text><text x="650" y="198" text-anchor="middle" font-size="12" fill="#fdba74">contexto + concorrência</text>
  <text x="840" y="155" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Espaço de trabalho +</text><text x="840" y="178" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">espaço livre</text><text x="840" y="211" text-anchor="middle" font-size="12" fill="#93c5fd">evitar pressão de troca</text>
  <rect x="175" y="310" width="650" height="70" rx="14" fill="#991b1b" stroke="#dc2626" /><text x="500" y="340" text-anchor="middle" font-size="16" font-weight="700" fill="#fca5a5">O sucesso no carregamento é apenas a primeira etapa</text><text x="500" y="364" text-anchor="middle" font-size="12" fill="#fca5a5">Medir a pressão de pico no contexto alvo, nas solicitações e na carga da aplicação.</text></g>
</svg>
