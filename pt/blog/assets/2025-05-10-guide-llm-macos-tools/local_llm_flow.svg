  <rect x="75" y="120" width="100" height="60" class="box" />
  <text y="145" class="text" x="125">Comando do utilizador</text>
  <text y="165" class="text label" x="125">"Por que o céu é azul?"</text>

  <rect x="75" y="280" width="100" height="60" class="box" />
  <text y="305" class="text" x="125">Resposta</text>
  <text y="325" class="text label" x="125">"Dispersão de Rayleigh..."</text>


  <rect x="250" y="150" width="160" height="160" class="highlight" />
  <text y="140" class="text" font-weight="bold" x="330">Aplicação</text>
  <text y="180" class="text" x="330">Ollama / LM Studio</text>
  <text y="200" class="text label" x="330">Orquestração</text>
  <line x1="260" y1="210" x2="400" y2="210" stroke="#2563eb" stroke-width="1" />
  <text y="235" class="text" x="330">Motor de Inferência</text>
  <text y="255" class="text label" x="330">(llama.cpp / MLX)</text>


  <rect x="480" y="80" width="270" height="300" fill="#ffffff" rx="10" ry="10" stroke="#cbd5e1" stroke-dasharray="4" />
  <text y="70" class="text" font-weight="bold" x="615">Recursos do Sistema</text>


  <rect x="535" y="100" width="160" height="60" class="box" />
  <text y="125" class="text" x="615">Pesos do Modelo</text>
  <text y="145" class="text label" x="615">Ficheiro .gguf (Disco)</text>


  <rect x="510" y="200" width="210" height="150" class="hardware" />
  <text y="225" class="text" font-weight="bold" x="615">Apple Silicon</text>

  <rect x="535" y="240" width="160" height="40" fill="#ffffff" stroke="#16a34a" rx="4" />
  <text y="265" class="text" x="615">Memória Unificada (RAM)</text>

