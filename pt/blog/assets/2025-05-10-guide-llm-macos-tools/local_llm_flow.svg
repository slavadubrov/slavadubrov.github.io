<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Arquitetura de LLM Local no macOS</title>
  <desc id="artifact-desc">Arquitetura de LLM Local no macOS.</desc>
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; ry: 8; }
      .highlight { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 8; ry: 8; }
      .hardware { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 8; ry: 8; }
      .text { font-family: Inter, system-ui, sans-serif; font-size: 14px; text-anchor: middle; fill: #0f172a; }
      .label { font-size: 12px; fill: #334155; }
      .arrow { stroke: #334155; stroke-width: 2; marker-end: url(#arrowhead); fill: none; }
      .dashed { stroke-dasharray: 5,5; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="100%" height="100%" fill="#f8fafc" /><rect width="800" height="450" fill="#f8fafc" rx="10" ry="10" />
  <text y="30" class="text" font-size="18" font-weight="bold" x="400">Arquitetura de LLM Local no macOS</text>


  <rect x="50" y="80" width="150" height="300" fill="#f1f5f9" rx="10" ry="10" stroke="none" />
