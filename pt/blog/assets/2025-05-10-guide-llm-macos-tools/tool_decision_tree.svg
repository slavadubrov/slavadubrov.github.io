<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Fluxo de trabalho para seleção de uma ferramenta local para macOS LLM</title>
  <desc id="desc">Uma linha de base de tarefas e modelos gera quatro opções de fluxo de trabalho: serviço local gerido com o Ollama, exploração no ambiente de desktop com o LM Studio, controlo direto GGUF através de llama.cpp, ou utilização do Python nativo da Apple com o MLX-LM. Todos os caminhos levam à mesma carga de trabalho benchmark.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="480" rx="22" fill="#0f172a" /><text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Escolha a superfície de controle e, em seguida, benchmark</text>
  <g font-family="Inter, system-ui, sans-serif"><rect x="345" y="90" width="310" height="70" rx="14" fill="#1e293b" stroke="#64748b" /><text x="500" y="119" text-anchor="middle" font-size="16" font-weight="700" fill="#e2e8f0">Tarefa + checkpoint de linha de base</text><text x="500" y="143" text-anchor="middle" font-size="12" fill="#94a3b8">qualidade, licença, contexto, artefato</text>
  <text x="500" y="195" text-anchor="middle" font-size="28" fill="#94a3b8">↓</text>
  <g transform="translate(30 220)"><rect width="215" height="115" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="107" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#93c5fd">Ollama</text><text x="107" y="68" text-anchor="middle" font-size="12" fill="#93c5fd">CLI gerido + API</text><text x="107" y="91" text-anchor="middle" font-size="11" fill="#94a3b8">serviço de aplicação</text></g>
  <g transform="translate(270 220)"><rect width="215" height="115" rx="14" fill="#5b21b6" stroke="#2563eb" /><text x="107" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#c4b5fd">LM Studio</text><text x="107" y="68" text-anchor="middle" font-size="12" fill="#93c5fd">ambiente de trabalho + SDKs + APIs</text><text x="107" y="91" text-anchor="middle" font-size="11" fill="#94a3b8">exploração humana</text></g>
  <g transform="translate(515 220)"><rect width="215" height="115" rx="14" fill="#9a3412" stroke="#ea580c" /><text x="107" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#fdba74">llama.cpp</text><text x="107" y="68" text-anchor="middle" font-size="12" fill="#fdba74">direto GGUF runtime</text><text x="107" y="91" text-anchor="middle" font-size="11" fill="#94a3b8">sinalizadores + embedding</text></g>
  <g transform="translate(755 220)"><rect width="215" height="115" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="107" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#93c5fd">MLX-LM</text><text x="107" y="68" text-anchor="middle" font-size="12" fill="#93c5fd">Python nativo da Apple</text><text x="107" y="91" text-anchor="middle" font-size="11" fill="#94a3b8">experimentos e ajuste de parâmetros</text></g>
  <rect x="180" y="385" width="640" height="55" rx="12" fill="#1d4ed8" stroke="#2563eb" /><text x="500" y="418" text-anchor="middle" font-size="14" font-weight="700" fill="#93c5fd">Idêntico prompts • mesmo contexto • precisão comparável • memória medida</text></g>
</svg>
