<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Seis camadas independentes num artefato de modelo de peso aberto</title>
  <desc id="desc">Um artefato de modelo é descrito por família e revisão, papel no treinamento, arquitetura, representação numérica, contêiner e layout, além de runtime. As setas indicam que cada camada restringe a seguinte sem ser equivalente a ela.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="500" rx="22" fill="#0f172a" /><text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">O nome de um modelo combina várias camadas independentes</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(30 105)"><rect width="285" height="125" rx="15" fill="#1e293b" stroke="#64748b" /><text x="142" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#e2e8f0">1. Família + revisão</text><text x="142" y="70" text-anchor="middle" font-size="13" fill="#cbd5e1">pesos • tokenizador • licença</text><text x="142" y="96" text-anchor="middle" font-size="12" fill="#94a3b8">repositório + commit</text></g>
    <g transform="translate(357 105)"><rect width="285" height="125" rx="15" fill="#5b21b6" stroke="#2563eb" /><text x="142" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#c4b5fd">2. Papel de treino</text><text x="142" y="70" text-anchor="middle" font-size="13" fill="#93c5fd">base • instruir • raciocínio • destilar</text><text x="142" y="96" text-anchor="middle" font-size="12" fill="#94a3b8">as etiquetas podem sobrepor-se</text></g>
    <g transform="translate(685 105)"><rect width="285" height="125" rx="15" fill="#9a3412" stroke="#ea580c" /><text x="142" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#fdba74">3. Arquitetura</text><text x="142" y="70" text-anchor="middle" font-size="13" fill="#fdba74">denso • MoE • total / ativo</text><text x="142" y="96" text-anchor="middle" font-size="12" fill="#94a3b8">compatibilidade de kernel</text></g>
    <g transform="translate(30 275)"><rect width="285" height="125" rx="15" fill="#1d4ed8" stroke="#2563eb" /><text x="142" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">4. Representação numérica</text><text x="142" y="70" text-anchor="middle" font-size="13" fill="#93c5fd">BF16 • FP8 • GPTQ • AWQ</text><text x="142" y="96" text-anchor="middle" font-size="12" fill="#94a3b8">tipo de dados ou método de quantização</text></g>
    <g transform="translate(357 275)"><rect width="285" height="125" rx="15" fill="#1d4ed8" stroke="#2563eb" /><text x="142" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">5. Contentor + layout</text><text x="142" y="70" text-anchor="middle" font-size="13" fill="#93c5fd">Fragmentos de Safetensors • GGUF</text><text x="142" y="96" text-anchor="middle" font-size="12" fill="#94a3b8">ficheiros + metadados</text></g>
    <g transform="translate(685 275)"><rect width="285" height="125" rx="15" fill="#1d4ed8" stroke="#2563eb" /><text x="142" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">6. Runtime + hardware</text><text x="142" y="70" text-anchor="middle" font-size="13" fill="#93c5fd">llama.cpp • vLLM • Transformadores</text><text x="142" y="96" text-anchor="middle" font-size="12" fill="#94a3b8">percurso de execução suportado</text></g>
    <text x="500" y="460" text-anchor="middle" font-size="13" fill="#94a3b8">Nenhum sufixo por si só comprova a qualidade da tarefa, a adequação da memória ou a velocidade de serving.</text>
  </g>
</svg>
