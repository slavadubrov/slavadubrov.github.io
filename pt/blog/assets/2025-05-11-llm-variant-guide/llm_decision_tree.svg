<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Checkpoint, runtime, e fluxo de trabalho de seleção de quantização</title>
  <desc id="desc">O fluxo de trabalho começa com um contrato de tarefa, seleciona um checkpoint com avaliação de alta qualidade, verifica se existe um runtime compatível, mede o consumo de memória, compara as representações e benchmarks o artefato final de lançamento.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="480" rx="22" fill="#0f172a" /><text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Escolher comportamento antes da compressão</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(30 120)"><rect width="135" height="120" rx="14" fill="#1e293b" stroke="#64748b" /><text x="67" y="35" text-anchor="middle" font-size="15" font-weight="700" fill="#e2e8f0">1. Contrato de tarefa</text><text x="67" y="68" text-anchor="middle" font-size="11" fill="#cbd5e1">qualidade • licença</text><text x="67" y="89" text-anchor="middle" font-size="11" fill="#94a3b8">interface • contexto</text></g><text x="180" y="188" font-size="23" fill="#94a3b8">→</text>
    <g transform="translate(205 120)"><rect width="135" height="120" rx="14" fill="#5b21b6" stroke="#2563eb" /><text x="67" y="35" text-anchor="middle" font-size="15" font-weight="700" fill="#c4b5fd">2. Checkpoint</text><text x="67" y="68" text-anchor="middle" font-size="11" fill="#93c5fd">revisão exata</text><text x="67" y="89" text-anchor="middle" font-size="11" fill="#94a3b8">linha de base de alta qualidade</text></g><text x="355" y="188" font-size="23" fill="#94a3b8">→</text>
    <g transform="translate(380 120)"><rect width="135" height="120" rx="14" fill="#9a3412" stroke="#ea580c" /><text x="67" y="35" text-anchor="middle" font-size="15" font-weight="700" fill="#fdba74">3. Runtime</text><text x="67" y="68" text-anchor="middle" font-size="11" fill="#fdba74">arquitetura</text><text x="67" y="89" text-anchor="middle" font-size="11" fill="#94a3b8">núcleo + hardware</text></g><text x="530" y="188" font-size="23" fill="#94a3b8">→</text>
    <g transform="translate(555 120)"><rect width="135" height="120" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="67" y="35" text-anchor="middle" font-size="15" font-weight="700" fill="#93c5fd">4. Memória</text><text x="67" y="68" text-anchor="middle" font-size="11" fill="#93c5fd">pesos + KV</text><text x="67" y="89" text-anchor="middle" font-size="11" fill="#94a3b8">espaço de trabalho + margem de manobra</text></g><text x="705" y="188" font-size="23" fill="#94a3b8">→</text>
    <g transform="translate(730 120)"><rect width="135" height="120" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="67" y="35" text-anchor="middle" font-size="15" font-weight="700" fill="#93c5fd">5. Representação</text><text x="67" y="68" text-anchor="middle" font-size="11" fill="#93c5fd">precisão / quantização</text><text x="67" y="89" text-anchor="middle" font-size="11" fill="#94a3b8">proveniência + hash</text></g><text x="880" y="188" font-size="23" fill="#94a3b8">→</text>
    <g transform="translate(900 120)"><rect width="75" height="120" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="37" y="35" text-anchor="middle" font-size="13" font-weight="700" fill="#93c5fd">6. Teste</text><text x="37" y="68" text-anchor="middle" font-size="10" fill="#93c5fd">lançamento</text><text x="37" y="88" text-anchor="middle" font-size="10" fill="#94a3b8">unidade</text></g>
    <rect x="150" y="315" width="700" height="80" rx="14" fill="#991b1b" stroke="#dc2626" /><text x="500" y="347" text-anchor="middle" font-size="16" font-weight="700" fill="#fca5a5">Qualquer porta que falhe faz com que o processo volte à escolha anterior</text><text x="500" y="375" text-anchor="middle" font-size="12" fill="#fca5a5">Um ficheiro mais pequeno não constitui uma versão bem-sucedida caso falhem os critérios de qualidade, contexto ou concorrência.</text>
    <text x="500" y="444" text-anchor="middle" font-size="13" fill="#94a3b8">Benchmark o checkpoint exato, a conversão, runtime, e o hardware em conjunto.</text>
  </g>
</svg>
