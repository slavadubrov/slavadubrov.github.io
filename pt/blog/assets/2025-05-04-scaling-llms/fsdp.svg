<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 570" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Ejecução paralela de dados totalmente fragmentada</title><desc id="desc">Os shards de parâmetros persistentes, gradientes e otimizadores estão distribuídos em quatro ranks. Um grupo de camadas é reunido temporariamente para realização dos cálculos, sendo posteriormente os gradientes dispersos de volta aos seus respectivos proprietários.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#94a3b8" /></marker></defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="570" rx="28" fill="#0f172a" />
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Armazenar o estado persistente em shards, reunir os grupos de camadas de forma temporária</text>
  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <g transform="translate(70 135)"><rect width="220" height="175" rx="18" fill="#1d4ed8" /><text x="110" y="40" fill="#93c5fd" font-size="19" font-weight="700">Rankimento 0</text><text x="110" y="82" fill="#93c5fd" font-size="15">shard de parâmetro 0</text><text x="110" y="112" fill="#c4b5fd" font-size="15">shard de gradiente 0</text><text x="110" y="142" fill="#93c5fd" font-size="15">shard de otimizador 0</text></g>
    <g transform="translate(350 135)"><rect width="220" height="175" rx="18" fill="#1d4ed8" /><text x="110" y="40" fill="#93c5fd" font-size="19" font-weight="700">Ranking 1</text><text x="110" y="82" fill="#93c5fd" font-size="15">shard de parâmetro 1</text><text x="110" y="112" fill="#c4b5fd" font-size="15">shard de gradiente 1</text><text x="110" y="142" fill="#93c5fd" font-size="15">shard de otimizador 1</text></g>
    <g transform="translate(630 135)"><rect width="220" height="175" rx="18" fill="#1d4ed8" /><text x="110" y="40" fill="#93c5fd" font-size="19" font-weight="700">Ranking 2</text><text x="110" y="82" fill="#93c5fd" font-size="15">shard de parâmetro 2</text><text x="110" y="112" fill="#c4b5fd" font-size="15">shard de gradiente 2</text><text x="110" y="142" fill="#93c5fd" font-size="15">shard de otimizador 2</text></g>
    <g transform="translate(910 135)"><rect width="220" height="175" rx="18" fill="#1d4ed8" /><text x="110" y="40" fill="#93c5fd" font-size="19" font-weight="700">Ranking 3</text><text x="110" y="82" fill="#93c5fd" font-size="15">shard de parâmetro 3</text><text x="110" y="112" fill="#c4b5fd" font-size="15">fragmento de gradiente 3</text><text x="110" y="142" fill="#93c5fd" font-size="15">shard de otimizador 3</text></g>
    <path d="M180 320 V365 H1020 V320 M460 320 V365 M740 320 V365" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#a)" />
    <rect x="245" y="380" width="710" height="115" rx="19" fill="#5b21b6" /><text x="600" y="420" fill="#93c5fd" font-size="20" font-weight="700">Grupo de comunicação entre camadas</text><text x="600" y="452" fill="#c4b5fd" font-size="15">parâmetros de all-gather → computação → vista não fragmentada livre</text><text x="600" y="480" fill="#c4b5fd" font-size="15">para trás → gradientes de redução de dispersão para os proprietários de shards</text>
    <text x="600" y="540" fill="#94a3b8" font-size="15">O agrupamento controla o pico de memória, o tamanho coletivo e as oportunidades de sobreposição.</text>
  </g>
</svg>
