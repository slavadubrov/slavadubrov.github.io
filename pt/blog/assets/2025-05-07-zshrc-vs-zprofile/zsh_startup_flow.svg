<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Fluxo de Inicialização do Zsh (Padrão do macOS)</title>
  <desc id="artifact-desc">Fluxo de Inicialização do Zsh (Padrão do macOS).</desc>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;display=swap');
      .bg { fill: #0f172a; }
      .node-rect { fill: #1d4ed8; stroke: #94a3b8; stroke-width: 2; rx: 8; }
      .node-text { font-family: Inter, system-ui, sans-serif; fill: #93c5fd; font-size: 14px; text-anchor: middle; }
      .node-title { font-weight: 600; font-size: 16px; }
      .arrow { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .label { font-family: Inter, system-ui, sans-serif; fill: #93c5fd; font-size: 12px; }
      .highlight-rect { fill: #1d4ed8; stroke-width: 2; rx: 8; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="100%" height="100%" class="bg" />

  <text y="40" class="node-text node-title" style="font-size: 24px; fill: #c4b5fd;" x="400">Fluxo de Inicialização do Zsh (Padrão do macOS)</text>


  <rect x="300" y="70" width="200" height="50" class="node-rect" />
  <text y="100" class="node-text node-title" style="fill: #fdba74;" x="400">1. ~/.zshenv</text>

  <path d="M400 120 L400 150" class="arrow" marker-end="url(#arrowhead)" />


  <rect x="300" y="150" width="200" height="80" class="highlight-rect" style="stroke: #7c3aed;" />
  <text y="180" class="node-text node-title" style="fill: #c4b5fd;" x="400">2. ~/.zprofile</text>
  <text y="205" class="node-text" style="font-size: 12px;" x="400">Variáveis de Ambiente</text>
  <text y="220" class="node-text" style="font-size: 12px;" x="400">CAMINHO, EDITOR, etc.</text>

  <path d="M400 230 L400 260" class="arrow" marker-end="url(#arrowhead)" />


  <rect x="300" y="260" width="200" height="80" class="highlight-rect" style="stroke: #16a34a;" />
  <text y="290" class="node-text node-title" style="fill: #86efac;" x="400">3. ~/.zshrc</text>
  <text y="315" class="node-text" style="font-size: 12px;" x="400">Configuração Interativa</text>
  <text y="330" class="node-text" style="font-size: 12px;" x="400">Alias, Prompt, Histórico</text>

  <path d="M400 340 L400 370" class="arrow" marker-end="url(#arrowhead)" />


  <rect x="300" y="370" width="200" height="50" class="node-rect" />
  <text y="400" class="node-text node-title" style="fill: #93c5fd;" x="400">4. ~/.zlogin</text>

  <path d="M400 420 L400 450" class="arrow" marker-end="url(#arrowhead)" />


  <rect x="250" y="450" width="300" height="40" class="node-rect" style="fill: #1d4ed8; stroke: #7c3aed;" />
  <text y="475" class="node-text node-title" style="fill: #c4b5fd;" x="400">🚀 Terminal pronto.</text>


  <text y="190" class="node-text" style="text-anchor: start; fill: #c4b5fd; font-size: 12px;" x="550">Ejecuta-se uma vez por login</text>
  <text y="300" class="node-text" style="text-anchor: start; fill: #86efac; font-size: 12px;" x="550">Executa-se em cada nova aba</text>

</svg>
