<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Quatro limites de propriedade em pyproject.toml</title>
  <desc id="desc">Quatro componentes distintos compõem o sistema de construção para a compilação backend, o projeto responsável pelos metadados publicados, os grupos de dependências para ambientes não publicados, e os espaços de nomes de ferramentas para configurações específicas de cada ferramenta.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="650" rx="28" fill="#0f172a" />
  <text x="600" y="68" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="31" font-weight="700">Um ficheiro, quatro proprietários</text>
  <text x="600" y="104" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="17">Classificar uma definição de acordo com o seu consumidor antes de selecionar uma tabela</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(70 155)"><rect width="500" height="185" rx="20" fill="#1d4ed8" /><text x="30" y="48" fill="#93c5fd" font-size="23" font-weight="700">[sistema-de-construção]</text><text x="30" y="88" fill="#93c5fd" font-size="18">Proprietário: construir frontend e backend</text><text x="30" y="124" fill="#93c5fd" font-size="16">backend identidade • requisitos de compilação isolados</text><text x="30" y="154" fill="#93c5fd" font-size="16">árvore de fonte → sdist e wheel</text></g>
    <g transform="translate(630 155)"><rect width="500" height="185" rx="20" fill="#5b21b6" /><text x="30" y="48" fill="#93c5fd" font-size="23" font-weight="700">[projeto]</text><text x="30" y="88" fill="#93c5fd" font-size="18">Proprietário: consumidores de pacotes</text><text x="30" y="124" fill="#c4b5fd" font-size="16">identidade • requisitos runtime • recursos adicionais</text><text x="30" y="154" fill="#c4b5fd" font-size="16">publicado como metadados de distribuição</text></g>
    <g transform="translate(70 385)"><rect width="500" height="185" rx="20" fill="#166534" /><text x="30" y="48" fill="#93c5fd" font-size="23" font-weight="700">[grupos-de-dependência]</text><text x="30" y="88" fill="#93c5fd" font-size="18">Proprietário: fluxo de trabalho local</text><text x="30" y="124" fill="#93c5fd" font-size="16">teste • verificação de código • documentação • ambientes não de pacote</text><text x="30" y="154" fill="#93c5fd" font-size="16">não publicado nas metadados do pacote</text></g>
    <g transform="translate(630 385)"><rect width="500" height="185" rx="20" fill="#9a3412" /><text x="30" y="48" fill="#fdba74" font-size="23" font-weight="700">[tool.*]</text><text x="30" y="88" fill="#fdba74" font-size="18">Proprietário: a ferramenta nomeada</text><text x="30" y="124" fill="#fdba74" font-size="16">chaves e semânticas definidas pela ferramenta</text><text x="30" y="154" fill="#fdba74" font-size="16">não existe esquema partilhado entre os namespaces</text></g>
  </g>
</svg>
