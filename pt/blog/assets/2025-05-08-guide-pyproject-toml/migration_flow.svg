<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Migração com verificação prévia para pyproject.toml</title>
  <desc id="desc">O fluxo de migração começa com o inventário e a classificação, passa pela atribuição de propriedade na codificação, pela criação de artefatos, pelo teste de uma instalação limpa, e somente então os arquivos antigos são desativados. Uma seta de feedback devolve os falhas à etapa de classificação.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#64748b" /></marker></defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="650" rx="28" fill="#0f172a" />
  <text x="600" y="68" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Migrar o comportamento e, em seguida, remover os ficheiros</text>
  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <g transform="translate(45 180)"><rect width="190" height="145" rx="18" fill="#1d4ed8" /><text x="95" y="48" fill="#93c5fd" font-size="20" font-weight="700">1. Inventário</text><text x="95" y="82" fill="#93c5fd" font-size="14">construir • metadados</text><text x="95" y="106" fill="#93c5fd" font-size="14">dependências • dados • ferramentas</text></g>
    <path d="M245 252 H275" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
    <g transform="translate(285 180)"><rect width="190" height="145" rx="18" fill="#5b21b6" /><text x="95" y="48" fill="#93c5fd" font-size="20" font-weight="700">2. Classificar</text><text x="95" y="82" fill="#93c5fd" font-size="14">publicado ou local?</text><text x="95" y="106" fill="#c4b5fd" font-size="14">estático ou dinâmico?</text></g>
    <path d="M485 252 H515" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
    <g transform="translate(525 180)"><rect width="190" height="145" rx="18" fill="#9a3412" /><text x="95" y="48" fill="#fdba74" font-size="20" font-weight="700">3. Codificar</text><text x="95" y="82" fill="#fdba74" font-size="14">escolher proprietários</text><text x="95" y="106" fill="#fdba74" font-size="14">preservar a semântica</text></g>
    <path d="M725 252 H755" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
    <g transform="translate(765 180)"><rect width="190" height="145" rx="18" fill="#1d4ed8" /><text x="95" y="48" fill="#93c5fd" font-size="20" font-weight="700">4. Verificar</text><text x="95" y="82" fill="#93c5fd" font-size="14">inspecionar sdist + wheel</text><text x="95" y="106" fill="#93c5fd" font-size="14">instalação limpa + deploy</text></g>
    <path d="M965 252 H995" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
    <g transform="translate(1005 180)"><rect width="150" height="145" rx="18" fill="#166534" /><text x="75" y="48" fill="#93c5fd" font-size="20" font-weight="700">5. Remover</text><text x="75" y="82" fill="#93c5fd" font-size="14">remover apenas</text><text x="75" y="106" fill="#93c5fd" font-size="14">duplicados comprovados</text></g>

    <path d="M860 340 V438 H380 V340" stroke="#dc2626" stroke-width="3" fill="none" marker-end="url(#arrow)" />
    <rect x="385" y="405" width="470" height="70" rx="16" fill="#991b1b" />
    <text x="620" y="433" fill="#fca5a5" font-size="17" font-weight="700">O artefato ou o comportamento diferem?</text>
    <text x="620" y="458" fill="#fca5a5" font-size="14">Retorno à propriedade e semântica.</text>

    <rect x="205" y="520" width="790" height="78" rx="18" fill="#1e293b" />
    <text x="600" y="553" fill="#e2e8f0" font-size="18" font-weight="700">Critério de sucesso</text>
    <text x="600" y="579" fill="#94a3b8" font-size="15">O artefato gerado e o caminho de deploy comportam-se da mesma forma em um ambiente limpo.</text>
  </g>
</svg>
