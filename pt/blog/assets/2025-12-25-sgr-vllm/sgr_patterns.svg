<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Padrões de esquema em cascata, de roteamento e de lista delimitada</title>
  <desc id="desc">Três cartões exibem uma cascata de múltiplas chamadas, uma união de roteamento discriminado e uma lista com limites de quantidade de itens, juntamente com a garantia e as limitações de cada padrão.</desc>
  <defs><marker id="arrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#93c5fd" /></marker></defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="520" rx="22" fill="#0f172a" />
  <text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Três padrões guiados por esquema</text>

  <g transform="translate(25 85)">
    <rect width="300" height="390" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" />
    <text x="150" y="40" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="700" fill="#93c5fd">Cascata</text>
    <text x="150" y="68" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">Chamadas separadas criam uma fronteira real</text>
    <rect x="42" y="100" width="216" height="52" rx="9" fill="#1d4ed8" />
    <text x="150" y="131" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#93c5fd">Chamada A: CandidateEvidence</text>
    <path d="M150 157 V195" fill="none" stroke="#93c5fd" stroke-width="2" marker-end="url(#arrow)" />
    <text x="172" y="181" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">validar</text>
    <rect x="42" y="205" width="216" height="52" rx="9" fill="#1d4ed8" />
    <text x="150" y="236" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#93c5fd">Chamada B: CandidateDecision</text>
    <text x="24" y="299" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#93c5fd">Garantias</text>
    <text x="32" y="324" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#cbd5e1">B recebe saída validada de A</text>
    <text x="24" y="353" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#fca5a5">não garante</text>
    <text x="32" y="378" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#cbd5e1">Qualquer uma das fases está factualmente correta</text>
  </g>

  <g transform="translate(350 85)">
    <rect width="300" height="390" rx="16" fill="#5b21b6" stroke="#2563eb" stroke-width="2" />
    <text x="150" y="40" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="700" fill="#c4b5fd">Roteamento</text>
    <text x="150" y="68" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">O discriminador seleciona uma forma</text>
    <rect x="65" y="98" width="170" height="48" rx="9" fill="#5b21b6" />
    <text x="150" y="127" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#93c5fd">nome_da_ferramenta</text>
    <path d="M125 147 L76 193" fill="none" stroke="#c4b5fd" stroke-width="2" />
    <path d="M175 147 L224 193" fill="none" stroke="#c4b5fd" stroke-width="2" />
    <rect x="25" y="195" width="115" height="62" rx="9" fill="#7c3aed" />
    <text x="82" y="220" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd">obter características</text>
    <text x="82" y="241" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="11" fill="#c4b5fd">sem argumentos do modelo</text>
    <rect x="160" y="195" width="115" height="62" rx="9" fill="#7c3aed" />
    <text x="217" y="220" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd">responder</text>
    <text x="217" y="241" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="11" fill="#c4b5fd">conteúdo</text>
    <text x="24" y="299" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#c4b5fd">Garantias</text>
    <text x="32" y="324" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#cbd5e1">Apenas uma forma de ramo válida</text>
    <text x="24" y="353" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#fca5a5">não garante</text>
    <text x="32" y="378" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#cbd5e1">O percurso selecionado é adequado</text>
  </g>

  <g transform="translate(675 85)">
    <rect width="300" height="390" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" />
    <text x="150" y="40" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="700" fill="#93c5fd">Lista delimitada</text>
    <text x="150" y="68" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">Uma coleção contém itens tipados e limites definidos</text>
    <rect x="30" y="108" width="68" height="105" rx="9" fill="#1d4ed8" />
    <text x="64" y="147" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd">Risco 1</text>
    <text x="64" y="171" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#93c5fd">gravidade</text>
    <rect x="116" y="108" width="68" height="105" rx="9" fill="#1d4ed8" />
    <text x="150" y="166" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#93c5fd">…</text>
    <rect x="202" y="108" width="68" height="105" rx="9" fill="#1d4ed8" />
    <text x="236" y="147" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd">Risco N</text>
    <text x="236" y="171" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#93c5fd">2 ≤ N ≤ 4</text>
    <text x="24" y="299" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#93c5fd">Garantias</text>
    <text x="32" y="324" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#cbd5e1">Formas dos itens e comprimento da lista</text>
    <text x="24" y="353" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#fca5a5">não garante</text>
    <text x="32" y="378" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#cbd5e1">Fatores distintos ou bem fundamentados</text>
  </g>
</svg>
