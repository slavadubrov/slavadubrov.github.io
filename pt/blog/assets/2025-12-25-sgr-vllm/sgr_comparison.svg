<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">O prompting, structured output, e a validação semântica abordam falhas distintas</title>
  <desc id="desc">O prompting define o significado do campo, constrained decoding controla a estrutura da saída, e a validação verifica as regras semânticas. Todos esses elementos contribuem para delimitar de forma confiável os limites da aplicação.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#64748b" /></marker></defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="900" height="300" rx="20" fill="#0f172a" />
  <text x="450" y="42" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#f8fafc">Diferentes mecanismos de controlo resolvem diferentes falhas</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(35 85)"><rect width="220" height="130" rx="14" fill="#1e293b" stroke="#64748b" /><text x="110" y="35" text-anchor="middle" font-size="17" font-weight="700" fill="#e2e8f0">Prompt</text><text x="110" y="67" text-anchor="middle" font-size="13" fill="#cbd5e1">Explicar o significado do campo</text><text x="110" y="92" text-anchor="middle" font-size="13" fill="#94a3b8">O modelo ainda pode estar incorreto</text></g>
    <path d="M265 150 H320" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
    <g transform="translate(335 85)"><rect width="230" height="130" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="115" y="35" text-anchor="middle" font-size="17" font-weight="700" fill="#93c5fd">Saída restrita</text><text x="115" y="67" text-anchor="middle" font-size="13" fill="#cbd5e1">Impor a forma suportada</text><text x="115" y="92" text-anchor="middle" font-size="13" fill="#94a3b8">Os valores ainda podem estar incorretos</text></g>
    <path d="M575 150 H630" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
    <g transform="translate(645 85)"><rect width="220" height="130" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="110" y="35" text-anchor="middle" font-size="17" font-weight="700" fill="#93c5fd">Validação</text><text x="110" y="67" text-anchor="middle" font-size="13" fill="#cbd5e1">Aplicar política semântica</text><text x="110" y="92" text-anchor="middle" font-size="13" fill="#94a3b8">Os testes determinam a aceitação</text></g>
    <text x="450" y="260" text-anchor="middle" font-size="14" fill="#94a3b8">Sistemas fiáveis combinam os mecanismos de controlo em vez de exigirem que uma única camada execute as três funções.</text>
  </g>
</svg>
