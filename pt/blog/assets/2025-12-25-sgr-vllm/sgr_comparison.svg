<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550">
  <defs>
    <linearGradient id="promptGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cotGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sgrGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="550" fill="#0f172a" />

  <!-- Title -->
  <text x="450" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#f8fafc" text-anchor="middle">Engenharia de Prompt vs Cadeia de Pensamento vs SGR</text>

  <!-- Column 1: Prompt Engineering -->
  <g transform="translate(30, 70)">
    <rect x="0" y="0" width="270" height="460" rx="16" fill="#1e293b" stroke="#ef4444" stroke-width="3" filter="url(#shadow)" />

    <!-- Header -->
    <rect x="0" y="0" width="270" height="50" rx="16" fill="url(#promptGrad)" />
    <rect x="0" y="35" width="270" height="15" fill="url(#promptGrad)" />
    <text x="135" y="33" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">📝 Engenharia de Prompts</text>

    <!-- Content -->
    <text x="20" y="80" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fca5a5">Abordagem:</text>
    <text x="20" y="100" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">"Por favor, exiba no formato JSON"</text>
    <text x="20" y="118" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">"Tenha cuidado com a formatação."</text>

    <line x1="20" y1="135" x2="250" y2="135" stroke="#334155" stroke-width="1" />

    <text x="20" y="160" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fca5a5">Controlo:</text>
    <text x="20" y="180" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Apenas persuasão semântica</text>
    <text x="20" y="198" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Mecanismo de atenção do modelo</text>

    <line x1="20" y1="215" x2="250" y2="215" stroke="#334155" stroke-width="1" />

    <text x="20" y="240" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fca5a5">Saída:</text>
    <rect x="20" y="250" width="230" height="70" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1" />
    <text x="30" y="270" font-family="monospace" font-size="10" fill="#fca5a5">"Claro! O desconto é de 20%."</text>
    <text x="30" y="285" font-family="monospace" font-size="10" fill="#fca5a5">Aqui está o JSON, talvez:</text>
    <text x="30" y="300" font-family="monospace" font-size="10" fill="#fca5a5">{desconto: '20%'..."</text>

    <line x1="20" y1="335" x2="250" y2="335" stroke="#334155" stroke-width="1" />

    <text x="20" y="360" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fca5a5">Problemas:</text>
    <text x="20" y="380" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">❌ Inconsistência de formato</text>
    <text x="20" y="398" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">❌ Passos de raciocínio ignorados</text>
    <text x="20" y="416" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">❌ Requer laços de tentativa repetida</text>
    <text x="20" y="434" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">❌ Resultados dependentes do modelo</text>
  </g>

  <!-- Column 2: Chain of Thought -->
  <g transform="translate(315, 70)">
    <rect x="0" y="0" width="270" height="460" rx="16" fill="#1e293b" stroke="#f59e0b" stroke-width="3" filter="url(#shadow)" />

    <!-- Header -->
    <rect x="0" y="0" width="270" height="50" rx="16" fill="url(#cotGrad)" />
    <rect x="0" y="35" width="270" height="15" fill="url(#cotGrad)" />
    <text x="135" y="33" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">🔗 Cadeia de Pensamento</text>

    <!-- Content -->
    <text x="20" y="80" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fcd34d">Abordagem:</text>
    <text x="20" y="100" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Vamos pensar passo a passo.</text>
    <text x="20" y="118" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Rastros de raciocínio intermédio</text>

    <line x1="20" y1="135" x2="250" y2="135" stroke="#334155" stroke-width="1" />

    <text x="20" y="160" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fcd34d">Controlo:</text>
    <text x="20" y="180" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Estímulo heurístico</text>
    <text x="20" y="198" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">O modelo determina a estrutura</text>

    <line x1="20" y1="215" x2="250" y2="215" stroke="#334155" stroke-width="1" />

    <text x="20" y="240" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fcd34d">Saída:</text>
    <rect x="20" y="250" width="230" height="70" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1" />
    <text x="30" y="270" font-family="monospace" font-size="10" fill="#fcd34d">Passo 1: Analisar o carrinho...</text>
    <text x="30" y="285" font-family="monospace" font-size="10" fill="#fcd34d">Passo 2: Verificar a margem...</text>
    <text x="30" y="300" font-family="monospace" font-size="10" fill="#fcd34d">Portanto, desconto de 15%.</text>

    <line x1="20" y1="335" x2="250" y2="335" stroke="#334155" stroke-width="1" />

    <text x="20" y="360" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fcd34d">Problemas:</text>
    <text x="20" y="380" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">⚠️ Saída de prosa não estruturada</text>
    <text x="20" y="398" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">⚠️ Difícil de analisar de forma fiável</text>
    <text x="20" y="416" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">⚠️ Contagem de passos variável</text>
    <text x="20" y="434" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">⚠️ Utilização excessiva de tokens</text>
  </g>

  <!-- Column 3: Schema-Guided Reasoning -->
  <g transform="translate(600, 70)">
    <rect x="0" y="0" width="270" height="460" rx="16" fill="#1e293b" stroke="#10b981" stroke-width="3" filter="url(#shadow)" />

    <!-- Header -->
    <rect x="0" y="0" width="270" height="50" rx="16" fill="url(#sgrGrad)" />
    <rect x="0" y="35" width="270" height="15" fill="url(#sgrGrad)" />
    <text x="135" y="33" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">📋 Orientado por Esquema (SGR)</text>

    <!-- Content -->
    <text x="20" y="80" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#6ee7b7">Abordagem:</text>
    <text x="20" y="100" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">O esquema Pydantic define as etapas</text>
    <text x="20" y="118" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">A decodificação condicionada impõe</text>

    <line x1="20" y1="135" x2="250" y2="135" stroke="#334155" stroke-width="1" />

    <text x="20" y="160" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#6ee7b7">Controlo:</text>
    <text x="20" y="180" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Aplicação baseada em regras gramaticais</text>
    <text x="20" y="198" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">O desenvolvedor define a topologia</text>

    <line x1="20" y1="215" x2="250" y2="215" stroke="#334155" stroke-width="1" />

    <text x="20" y="240" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#6ee7b7">Saída:</text>
    <rect x="20" y="250" width="230" height="70" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1" />
    <text x="30" y="268" font-family="monospace" font-size="9" fill="#6ee7b7">{"churn_analysis":"Alto"</text>
    <text x="30" y="282" font-family="monospace" font-size="9" fill="#6ee7b7"> "margin_math":"$200*0,2=$40",</text>
    <text x="30" y="296" font-family="monospace" font-size="9" fill="#6ee7b7"> "max_discount":15.0,</text>
    <text x="30" y="310" font-family="monospace" font-size="9" fill="#6ee7b7"> "offer_code":"ECONOMIZE15"</text>

    <line x1="20" y1="335" x2="250" y2="335" stroke="#334155" stroke-width="1" />

    <text x="20" y="360" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#6ee7b7">Vantagens:</text>
    <text x="20" y="380" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">✓ Saída estruturada 100% válida</text>
    <text x="20" y="398" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">✓ Verificável campo a campo</text>
    <text x="20" y="416" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">✓ Funciona com modelos mais pequenos</text>
    <text x="20" y="434" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">✓ Não são necessários ciclos de repetição</text>
  </g>
</svg>
