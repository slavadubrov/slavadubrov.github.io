<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 595" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadowP" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <marker id="arrowP" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
    <marker id="arrowPgreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
  </defs>

  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">Permission Evaluation Order: Why Hooks Outrank Modes</text>
  <text x="450" y="50" text-anchor="middle" font-size="11" fill="#888">Every tool call walks this ladder before it executes</text>

  <!-- Start: tool call -->
  <rect x="340" y="75" width="220" height="46" rx="8" fill="#6a1b9a" filter="url(#shadowP)"/>
  <text x="450" y="102" text-anchor="middle" font-size="13" font-weight="600" fill="white">Model emits tool call</text>

  <!-- Arrow down -->
  <line x1="450" y1="121" x2="450" y2="145" stroke="#555" stroke-width="2" marker-end="url(#arrowP)"/>

  <!-- Gate 1: Deny rules -->
  <rect x="200" y="150" width="500" height="60" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="2" filter="url(#shadowP)"/>
  <text x="220" y="174" font-size="12" font-weight="700" fill="#c62828">1 · Deny rules (highest priority)</text>
  <text x="220" y="195" font-size="10" fill="#555">Block even in bypassPermissions. Protected paths like .git/, .claude/ belong here.</text>
  <line x1="450" y1="210" x2="450" y2="234" stroke="#555" stroke-width="2" marker-end="url(#arrowP)"/>

  <!-- Gate 2: Active mode -->
  <rect x="200" y="240" width="500" height="60" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="2" filter="url(#shadowP)"/>
  <text x="220" y="264" font-size="12" font-weight="700" fill="#e65100">2 · Active mode</text>
  <text x="220" y="285" font-size="10" fill="#555">default · acceptEdits · plan · auto · bypassPermissions · dontAsk</text>
  <line x1="450" y1="300" x2="450" y2="324" stroke="#555" stroke-width="2" marker-end="url(#arrowP)"/>

  <!-- Gate 3: Hooks -->
  <rect x="200" y="330" width="500" height="60" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" filter="url(#shadowP)"/>
  <text x="220" y="354" font-size="12" font-weight="700" fill="#1565c0">3 · PreToolUse hooks</text>
  <text x="220" y="375" font-size="10" fill="#555">permissionDecision: "deny" here overrides even bypassPermissions — hooks outrank modes.</text>
  <line x1="450" y1="390" x2="450" y2="414" stroke="#555" stroke-width="2" marker-end="url(#arrowP)"/>

  <!-- Gate 4: canUseTool callback -->
  <rect x="200" y="420" width="500" height="60" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" filter="url(#shadowP)"/>
  <text x="220" y="444" font-size="12" font-weight="700" fill="#6a1b9a">4 · canUseTool callback</text>
  <text x="220" y="465" font-size="10" fill="#555">Programmatic veto — last chance to intercept before execution.</text>
  <line x1="450" y1="480" x2="450" y2="524" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowPgreen)"/>

  <!-- Execute -->
  <rect x="340" y="530" width="220" height="40" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" filter="url(#shadowP)"/>
  <text x="450" y="555" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Execute tool</text>

  <!-- Side notes: one per gate -->
  <rect x="720" y="155" width="170" height="48" rx="8" fill="#f8f9fa" stroke="#c62828" stroke-width="1"/>
  <text x="805" y="175" text-anchor="middle" font-size="10" font-weight="600" fill="#c62828">deny → rejected</text>
  <text x="805" y="192" text-anchor="middle" font-size="9" fill="#555">even when mode would allow</text>

  <rect x="720" y="245" width="170" height="48" rx="8" fill="#f8f9fa" stroke="#e65100" stroke-width="1"/>
  <text x="805" y="265" text-anchor="middle" font-size="10" font-weight="600" fill="#e65100">mode: default answer</text>
  <text x="805" y="282" text-anchor="middle" font-size="9" fill="#555">six presets, one at a time</text>

  <rect x="720" y="335" width="170" height="48" rx="8" fill="#f8f9fa" stroke="#1565c0" stroke-width="1"/>
  <text x="805" y="355" text-anchor="middle" font-size="10" font-weight="600" fill="#1565c0">hooks &gt; modes</text>
  <text x="805" y="372" text-anchor="middle" font-size="9" fill="#555">this is the real safety net</text>

  <rect x="720" y="425" width="170" height="48" rx="8" fill="#f8f9fa" stroke="#6a1b9a" stroke-width="1"/>
  <text x="805" y="445" text-anchor="middle" font-size="10" font-weight="600" fill="#6a1b9a">SDK-level veto</text>
  <text x="805" y="462" text-anchor="middle" font-size="9" fill="#555">runs in your app code</text>

  <text x="450" y="587" text-anchor="middle" font-size="9" font-style="italic" fill="#888">Permission is infrastructure, not prompt.</text>
</svg>
