<svg xmlns="http://www.w3.org/2000/svg" width="640" height="980" viewBox="0 0 640 980" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Uma ablação emparelhada de um componente harness</title>
  <desc id="desc">Uma falha observada no processo de retomada motiva a formulação de uma hipótese sobre a eficácia da transferência de progresso. É executado um grupo de controle com a transferência desativada e um grupo de tratamento com ela ativada, utilizando a mesma sequência inicial de migração de pagamentos checkpoint, bem como o mesmo modelo, ambiente, mecanismo de avaliação e orçamento total. Os resultados comparativos permitem determinar se esse componente justifica o seu custo.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" />
    </marker>
  </defs>
  <rect width="640" height="980" fill="#f8fafc" />
  <rect x="20" y="18" width="600" height="944" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />

  <text x="48" y="62" font-size="25" font-weight="700" fill="#0f172a">Testar um componente de cada vez</text>
  <text x="48" y="91" font-size="15" fill="#64748b">Uma transferência de progresso deve reembolsar o trabalho de escrita e leitura correspondente.</text>

  <rect x="60" y="126" width="520" height="76" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" />
  <text x="82" y="156" font-size="14" font-weight="700" fill="#9a3412">FALHA OBSERVADA</text>
  <text x="82" y="181" font-size="15" fill="#334155">As execuções de migração retomadas repetem as ações já concluídas</text>

  <line x1="320" y1="202" x2="320" y2="228" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="60" y="236" width="520" height="76" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" />
  <text x="82" y="266" font-size="14" font-weight="700" fill="#5b21b6">HIPÓTESE</text>
  <text x="82" y="291" font-size="15" fill="#334155">Uma transferência estruturada de progresso elimina o trabalho repetitivo</text>

  <line x1="320" y1="312" x2="320" y2="338" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="60" y="346" width="520" height="82" rx="8" fill="#1e293b" stroke="#1e293b" stroke-width="1.5" />
  <text x="320" y="377" text-anchor="middle" font-size="14" font-weight="700" fill="#93c5fd">Corrigido em ambas as variantes</text>
  <text x="320" y="403" text-anchor="middle" font-size="14" fill="#ffffff">Modelo · tarefas · ambiente · avaliador · orçamento total</text>

  <line x1="320" y1="428" x2="320" y2="454" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="60" y="462" width="520" height="106" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" />
  <text x="82" y="493" font-size="14" font-weight="700" fill="#1d4ed8">CONTROLO</text>
  <text x="82" y="523" font-size="19" font-weight="700" fill="#0f172a">transferência_de_progresso = false</text>
  <text x="82" y="548" font-size="14" fill="#334155">Resumo da conversa e do estado do espaço de trabalho</text>

  <line x1="320" y1="568" x2="320" y2="594" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="60" y="602" width="520" height="128" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" />
  <text x="82" y="633" font-size="14" font-weight="700" fill="#5b21b6">TRATAMENTO: APENAS AS MUDANÇAS DE TRANSFERÊNCIA</text>
  <text x="82" y="663" font-size="19" font-weight="700" fill="#0f172a">transferência_de_progresso = true</text>
  <text x="82" y="688" font-size="14" fill="#334155">Resumo do estado de transferência e do espaço de trabalho</text>
  <text x="82" y="711" font-size="14" fill="#334155">Ramo, ficheiros alterados, última verificação e próximo passo</text>

  <line x1="320" y1="730" x2="320" y2="756" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="60" y="764" width="520" height="100" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" />
  <text x="320" y="797" text-anchor="middle" font-size="17" font-weight="700" fill="#166534">Comparar resultados emparelhados</text>
  <text x="320" y="825" text-anchor="middle" font-size="14" fill="#334155">Éxito · ações repetidas · defeitos mitigados</text>
  <text x="320" y="848" text-anchor="middle" font-size="14" fill="#334155">Custo · tempo de execução · esforço de revisão</text>

  <rect x="60" y="892" width="520" height="44" rx="8" fill="#1e293b" />
  <text x="320" y="919" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Mantenha a transferência apenas quando o ganho mensurado compensar o seu custo</text>
</svg>
