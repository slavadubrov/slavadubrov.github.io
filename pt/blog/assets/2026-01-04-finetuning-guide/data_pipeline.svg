<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Pipeline de Preparação de Dados: &quot;Os Dados São o Destino&quot;</title>
  <desc id="artifact-desc">Pipeline de Preparação de Dados: &quot;Os Dados São o Destino&quot;.</desc>
  <defs>
    <linearGradient id="dataGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#16a34a" />
      <stop offset="100%" stop-color="#166534" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="900" height="480" fill="#f8fafc" />

  <!-- Title -->
  <text y="35" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" text-anchor="middle" fill="#1d4ed8" x="450">Pipeline de Preparação de Dados: "Os Dados São o Destino"</text>

  <!-- Raw Data -->
  <g transform="translate(40, 70)">
    <rect width="120" height="55" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" />
    <text y="28" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#334155" x="60">Dados Brutos</text>
    <text y="44" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="#334155" x="60">Corpo de dados não processado</text>
  </g>

  <path d="M 160 97 L 190 97" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <!-- Stage 1: Ingestion -->
  <g transform="translate(200, 70)">
    <rect width="130" height="55" rx="6" fill="url(#dataGrad)" />
    <text y="24" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ffffff" x="65">1. Ingestão</text>
    <text y="40" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)" x="65">Remova as recusas,</text>
    <text y="50" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)" x="65">UTF-8 corrompido</text>
  </g>
  <text y="140" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="#166534" font-style="italic" x="265">Tricotagem + FastText</text>

  <path d="M 330 97 L 360 97" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <!-- Stage 2: PII -->
  <g transform="translate(370, 70)">
    <rect width="130" height="55" rx="6" fill="url(#dataGrad)" />
    <text y="24" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ffffff" x="65">2. Limpeza de Dados PII</text>
    <text y="40" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)" x="65">Elaborar e-mails, endereços IP,</text>
    <text y="50" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)" x="65">números de telefone</text>
  </g>
  <text y="140" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="#166534" font-style="italic" x="435">Microsoft Presidio</text>

  <path d="M 500 97 L 530 97" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <!-- Stage 3: Dedup -->
  <g transform="translate(540, 70)">
    <rect width="130" height="55" rx="6" fill="url(#dataGrad)" />
    <text y="24" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ffffff" x="65">3. Eliminação de duplicados</text>
    <text y="40" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)" x="65">MinHash LSH para</text>
    <text y="50" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)" x="65">remover duplicados</text>
  </g>
  <text y="140" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="#166534" font-style="italic" x="605">DataTrove</text>

  <path d="M 670 97 L 700 97" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <!-- Stage 4: Augmentation -->
  <g transform="translate(710, 70)">
    <rect width="130" height="55" rx="6" fill="url(#dataGrad)" />
    <text y="24" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ffffff" x="65">4. Aumentação</text>
    <text y="40" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)" x="65">Modelo de professor</text>
    <text y="50" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)" x="65">reescreve os dados</text>
  </g>
  <text y="140" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="#166534" font-style="italic" x="775">Etiqueta de destilação</text>

  <!-- Arrow down and left -->
  <path d="M 775 125 L 775 170 L 545 170" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <!-- Stage 5: Formatting -->
  <g transform="translate(370, 155)">
    <rect width="165" height="55" rx="6" fill="url(#dataGrad)" />
    <text y="24" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ffffff" x="82">5. Formatação</text>
    <text y="40" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)" x="82">Converter para Alpaca/ShareGPT</text>
    <text y="50" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)" x="82">formato JSONL</text>
  </g>

  <path d="M 370 182 L 220 182" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <!-- Clean Dataset -->
  <g transform="translate(80, 155)">
    <rect width="130" height="55" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" />
    <text y="28" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#166534" x="65">Conjunto de Dados Limpo</text>
    <text y="44" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="#166534" x="65">Pronto para ajuste fino</text>
  </g>

  <!-- Key Principles Box -->
  <rect x="40" y="250" width="820" height="200" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" />
  <text y="280" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#166534" x="60">Princípios Fundamentais</text>

  <circle cx="60" cy="310" r="4" fill="#16a34a" />
  <text y="314" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1d4ed8" x="75">Qualidade acima da Quantidade:</text>
  <text y="314" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#334155" x="210">500 a 1.000 exemplos selecionados costumam superar em desempenho 50.000 exemplos ruidosos</text>

  <circle cx="60" cy="345" r="4" fill="#16a34a" />
  <text y="349" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1d4ed8" x="75">Limpeza:</text>
  <text y="349" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#334155" x="155">Remover informações irrelevantes, normalizar o texto e garantir formatação consistente</text>

  <circle cx="60" cy="380" r="4" fill="#16a34a" />
  <text y="384" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1d4ed8" x="75">Equilíbrio:</text>
  <text y="384" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#334155" x="135">Assegure a representação em todos os tópicos para evitar vieses</text>

  <circle cx="60" cy="415" r="4" fill="#dc2626" />
  <text y="419" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#991b1b" x="75">Critico para a empresa:</text>
  <text y="419" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#334155" x="200">A eliminação de PII é obrigatória — o treinamento com dados de clientes constitui uma falha de segurança</text>
</svg>
