<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480">
  <defs>
    <linearGradient id="dataGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="480" fill="#fafafa" />

  <!-- Title -->
  <text x="450" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" text-anchor="middle" fill="#1a202c">Pipeline de Preparação de Dados: "Os Dados São o Destino"</text>

  <!-- Raw Data -->
  <g transform="translate(40, 70)">
    <rect width="120" height="55" rx="6" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1.5" />
    <text x="60" y="28" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#374151">Dados Brutos</text>
    <text x="60" y="44" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle" fill="#6b7280">Corpo de dados não processado</text>
  </g>

  <path d="M 160 97 L 190 97" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <!-- Stage 1: Ingestion -->
  <g transform="translate(200, 70)">
    <rect width="130" height="55" rx="6" fill="url(#dataGrad)" />
    <text x="65" y="24" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="white">1. Ingestão</text>
    <text x="65" y="40" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)">Remova as recusas,</text>
    <text x="65" y="50" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)">UTF-8 corrompido</text>
  </g>
  <text x="265" y="140" font-family="system-ui, sans-serif" font-size="8" text-anchor="middle" fill="#059669" font-style="italic">Tricotagem + FastText</text>

  <path d="M 330 97 L 360 97" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <!-- Stage 2: PII -->
  <g transform="translate(370, 70)">
    <rect width="130" height="55" rx="6" fill="url(#dataGrad)" />
    <text x="65" y="24" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="white">2. Limpeza de Dados PII</text>
    <text x="65" y="40" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)">Elaborar e-mails, endereços IP,</text>
    <text x="65" y="50" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)">números de telefone</text>
  </g>
  <text x="435" y="140" font-family="system-ui, sans-serif" font-size="8" text-anchor="middle" fill="#059669" font-style="italic">Microsoft Presidio</text>

  <path d="M 500 97 L 530 97" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <!-- Stage 3: Dedup -->
  <g transform="translate(540, 70)">
    <rect width="130" height="55" rx="6" fill="url(#dataGrad)" />
    <text x="65" y="24" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="white">3. Eliminação de duplicados</text>
    <text x="65" y="40" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)">MinHash LSH para</text>
    <text x="65" y="50" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)">remover duplicados</text>
  </g>
  <text x="605" y="140" font-family="system-ui, sans-serif" font-size="8" text-anchor="middle" fill="#059669" font-style="italic">DataTrove</text>

  <path d="M 670 97 L 700 97" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <!-- Stage 4: Augmentation -->
  <g transform="translate(710, 70)">
    <rect width="130" height="55" rx="6" fill="url(#dataGrad)" />
    <text x="65" y="24" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="white">4. Aumentação</text>
    <text x="65" y="40" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)">Modelo de professor</text>
    <text x="65" y="50" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)">reescreve os dados</text>
  </g>
  <text x="775" y="140" font-family="system-ui, sans-serif" font-size="8" text-anchor="middle" fill="#059669" font-style="italic">Etiqueta de destilação</text>

  <!-- Arrow down and left -->
  <path d="M 775 125 L 775 170 L 545 170" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <!-- Stage 5: Formatting -->
  <g transform="translate(370, 155)">
    <rect width="165" height="55" rx="6" fill="url(#dataGrad)" />
    <text x="82" y="24" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="white">5. Formatação</text>
    <text x="82" y="40" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)">Converter para Alpaca/ShareGPT</text>
    <text x="82" y="50" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)">formato JSONL</text>
  </g>

  <path d="M 370 182 L 220 182" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <!-- Clean Dataset -->
  <g transform="translate(80, 155)">
    <rect width="130" height="55" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="2" />
    <text x="65" y="28" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#065f46">Conjunto de Dados Limpo</text>
    <text x="65" y="44" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle" fill="#047857">Pronto para ajuste fino</text>
  </g>

  <!-- Key Principles Box -->
  <rect x="40" y="250" width="820" height="200" rx="8" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5" />
  <text x="60" y="280" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#065f46">Princípios Fundamentais</text>

  <circle cx="60" cy="310" r="4" fill="#10b981" />
  <text x="75" y="314" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1f2937">Qualidade acima da Quantidade:</text>
  <text x="210" y="314" font-family="system-ui, sans-serif" font-size="11" fill="#4b5563">500 a 1.000 exemplos selecionados costumam superar em desempenho 50.000 exemplos ruidosos</text>

  <circle cx="60" cy="345" r="4" fill="#10b981" />
  <text x="75" y="349" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1f2937">Limpeza:</text>
  <text x="155" y="349" font-family="system-ui, sans-serif" font-size="11" fill="#4b5563">Remover informações irrelevantes, normalizar o texto e garantir formatação consistente</text>

  <circle cx="60" cy="380" r="4" fill="#10b981" />
  <text x="75" y="384" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1f2937">Equilíbrio:</text>
  <text x="135" y="384" font-family="system-ui, sans-serif" font-size="11" fill="#4b5563">Assegure a representação em todos os tópicos para evitar vieses</text>

  <circle cx="60" cy="415" r="4" fill="#ef4444" />
  <text x="75" y="419" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#991b1b">Critico para a empresa:</text>
  <text x="200" y="419" font-family="system-ui, sans-serif" font-size="11" fill="#4b5563">A eliminação de PII é obrigatória — o treinamento com dados de clientes constitui uma falha de segurança</text>
</svg>
