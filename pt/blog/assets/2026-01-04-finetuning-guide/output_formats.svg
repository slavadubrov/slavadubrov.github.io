<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" role="img" aria-label="Output Formats" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title>Escolha de artefatos de modelo afinado</title>
  <desc>Um pequeno adaptador LoRA depende do seu modelo base; um checkpoint fundido funciona de forma autónoma com o tamanho completo do modelo, enquanto o GGUF destina-se à inferência local ou em edge com uma quantização específica.</desc>
  <defs>
    <linearGradient id="loraFmt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #2563eb" />
      <stop offset="100%" style="stop-color: #7c3aed" />
    </linearGradient>
    <linearGradient id="mergedFmt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #2563eb" />
      <stop offset="100%" style="stop-color: #1d4ed8" />
    </linearGradient>
    <linearGradient id="ggufFmt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #16a34a" />
      <stop offset="100%" style="stop-color: #166534" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="900" height="380" fill="#0f172a" />

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="bold">Comparação de Formatos de Saída</text>

  <!-- LoRA Adapter -->
  <rect x="40" y="70" width="260" height="290" rx="16" fill="url(#loraFmt)" filter="url(#shadow)" />
  <text x="170" y="110" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="bold">🔌 LoRA Adaptador</text>

  <rect x="55" y="130" width="230" height="210" rx="8" fill="#1e293b" />

  <text x="70" y="160" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">TAMANHO</text>
  <text x="70" y="180" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="14">Dependente de classificação/módulo</text>

  <text x="70" y="210" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">COMANDO</text>
  <text x="70" y="228" fill="#94a3b8" font-family="SFMono-Regular, Consolas, monospace" font-size="10">afinação em execução UV</text>

  <text x="70" y="258" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">MELHOR PARA</text>
  <text x="70" y="278" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="11">• Desenvolvimento e teste</text>
  <text x="70" y="295" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="11">• Vários adaptadores</text>
  <text x="70" y="312" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="11">• Eficiência de armazenamento</text>
  <text x="70" y="329" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="11">• Controlo de versões</text>

  <!-- Merged Model -->
  <rect x="320" y="70" width="260" height="290" rx="16" fill="url(#mergedFmt)" filter="url(#shadow)" />
  <text x="450" y="110" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="bold">📦 Modelo Fundido</text>

  <rect x="335" y="130" width="230" height="210" rx="8" fill="#1e293b" />

  <text x="350" y="160" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">TAMANHO</text>
  <text x="350" y="180" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="14">Tamanho total checkpoint</text>

  <text x="350" y="210" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">COMANDO</text>
  <text x="350" y="228" fill="#94a3b8" font-family="SFMono-Regular, Consolas, monospace" font-size="10">uv run fine-tuning --merge</text>

  <text x="350" y="258" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">IDEAL PARA</text>
  <text x="350" y="278" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="11">• Partilha com outros</text>
  <text x="350" y="295" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="11">• Motores que exigem um modelo</text>
  <text x="350" y="312" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="11">• Implementação com um único artefato</text>
  <text x="350" y="329" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="11">• Hugging Face Hub</text>

  <!-- GGUF -->
  <rect x="600" y="70" width="260" height="290" rx="16" fill="url(#ggufFmt)" filter="url(#shadow)" />
  <text x="730" y="110" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="bold">🖥️ GGUF Formato</text>

  <rect x="615" y="130" width="230" height="210" rx="8" fill="#1e293b" />

  <text x="630" y="160" fill="#86efac" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">TAMANHO</text>
  <text x="630" y="180" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="14">Dependente do modelo + da quantização</text>

  <text x="630" y="210" fill="#86efac" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">COMANDO</text>
  <text x="630" y="228" fill="#94a3b8" font-family="SFMono-Regular, Consolas, monospace" font-size="10">uv run finetune --gguf q4_k_m</text>

  <text x="630" y="258" fill="#86efac" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">MELHOR PARA</text>
  <text x="630" y="278" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="11">• CPU inferência</text>
  <text x="630" y="295" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="11">• Ollama / llama.cpp</text>
  <text x="630" y="312" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="11">• Implementação em edge</text>
  <text x="630" y="329" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="11">• Sistemas de recursos limitados</text>
</svg>
