<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Tipos de Ajuste Fino</title>
  <desc id="artifact-desc">Tipos de Ajuste Fino.</desc>
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #2563eb" />
      <stop offset="100%" style="stop-color: #2563eb" />
    </linearGradient>
    <linearGradient id="unsupervisedGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #ea580c" />
      <stop offset="100%" style="stop-color: #ea580c" />
    </linearGradient>
    <linearGradient id="sftGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #16a34a" />
      <stop offset="100%" style="stop-color: #16a34a" />
    </linearGradient>
    <linearGradient id="instructGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #2563eb" />
      <stop offset="100%" style="stop-color: #2563eb" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="800" height="500" fill="#0f172a" />

  <!-- Title -->
  <text y="40" text-anchor="middle" fill="url(#headerGrad)" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="bold" x="400">Tipos de Ajuste Fino</text>

  <!-- Base Model (center top) -->
  <rect x="300" y="70" width="200" height="45" rx="8" fill="#1e293b" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
  <text y="98" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" x="400">🧠 Modelo Básico Pré-treinado</text>

  <!-- Arrows from base model -->
  <path d="M400 115 L400 140 L150 140 L150 160" stroke="#94a3b8" stroke-width="2" fill="none" />
  <path d="M400 115 L400 160" stroke="#94a3b8" stroke-width="2" fill="none" />
  <path d="M400 115 L400 140 L650 140 L650 160" stroke="#94a3b8" stroke-width="2" fill="none" />

  <!-- Unsupervised / Continued Pre-training (left) -->
  <rect x="50" y="165" width="200" height="55" rx="8" fill="url(#unsupervisedGrad)" filter="url(#shadow)" />
  <text y="190" text-anchor="middle" fill="#0f172a" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" x="150">📚 Pré-treinamento contínuo</text>
  <text y="208" text-anchor="middle" fill="#0f172a" font-family="Inter, system-ui, sans-serif" font-size="11" x="150">(Não supervisionado)</text>

  <!-- SFT (center) -->
  <rect x="300" y="165" width="200" height="55" rx="8" fill="url(#sftGrad)" filter="url(#shadow)" />
  <text y="190" text-anchor="middle" fill="#0f172a" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" x="400">🎯 Ajuste Fino Supervisionado</text>
  <text y="208" text-anchor="middle" fill="#0f172a" font-family="Inter, system-ui, sans-serif" font-size="11" x="400">(SFT)</text>

  <!-- Instruction Tuning (right) -->
  <rect x="550" y="165" width="200" height="55" rx="8" fill="url(#instructGrad)" filter="url(#shadow)" />
  <text y="190" text-anchor="middle" fill="#0f172a" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" x="650">💬 Ajuste de Instruções</text>
  <text y="208" text-anchor="middle" fill="#0f172a" font-family="Inter, system-ui, sans-serif" font-size="11" x="650">Caso especial de SFT</text>

  <!-- Descriptions boxes -->

  <!-- Unsupervised description -->
  <rect x="50" y="240" width="200" height="130" rx="8" fill="#1e293b" stroke="#ea580c" stroke-width="1" filter="url(#shadow)" />
  <text y="265" fill="#fdba74" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" x="65">Data:</text>
  <text y="283" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="11" x="65">Texto bruto (sem etiquetas)</text>
  <text y="305" fill="#fdba74" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" x="65">Objetivo:</text>
  <text y="323" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="11" x="65">Conhecimento de domínio</text>
  <text y="345" fill="#fdba74" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" x="65">Exemplo:</text>
  <text y="363" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="11" x="65">Artigos médicos, documentos legais</text>

  <!-- SFT description -->
  <rect x="300" y="240" width="200" height="130" rx="8" fill="#1e293b" stroke="#16a34a" stroke-width="1" filter="url(#shadow)" />
  <text y="265" fill="#166534" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" x="315">Data:</text>
  <text y="283" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="11" x="315">pares (entrada, saída)</text>
  <text y="305" fill="#166534" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" x="315">Objetivo:</text>
  <text y="323" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="11" x="315">Comportamento específico da tarefa</text>
  <text y="345" fill="#166534" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" x="315">Exemplo:</text>
  <text y="363" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="11" x="315">Texto → SQL, Resumo</text>

  <!-- Instruction Tuning description -->
  <rect x="550" y="240" width="200" height="130" rx="8" fill="#1e293b" stroke="#2563eb" stroke-width="1" filter="url(#shadow)" />
  <text y="265" fill="#1d4ed8" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" x="565">Data:</text>
  <text y="283" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="11" x="565">pares (instrução, resposta)</text>
  <text y="305" fill="#1d4ed8" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" x="565">Objetivo:</text>
  <text y="323" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="11" x="565">Sigam instruções diversas</text>
  <text y="345" fill="#1d4ed8" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" x="565">Exemplo:</text>
  <text y="363" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="11" x="565">ChatGPT, Claude, Llama-Chat</text>

  <!-- When to use section -->
  <rect x="50" y="390" width="700" height="110" rx="8" fill="#1e293b" stroke="#94a3b8" stroke-width="1" filter="url(#shadow)" />
  <text y="415" text-anchor="middle" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" x="400">QUANDO USAR CADA UM</text>

  <text y="445" fill="#fdba74" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" x="80">📚 Treino Prévio Contínuo:</text>
  <text y="445" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="11" x="230">O modelo carece de vocabulário específico do domínio (por exemplo, médico, jurídico, de código).</text>

  <text y="465" fill="#166534" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" x="80">🎯 SFT:</text>
  <text y="465" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="11" x="130">Tarefa específica com formato de entrada/saída conhecido (por exemplo, Texto para SQL)</text>

  <text y="485" fill="#1d4ed8" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" x="80">💬 Instrução:</text>
  <text y="485" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="11" x="180">Comportamento geral do assistente de chat</text>
</svg>
