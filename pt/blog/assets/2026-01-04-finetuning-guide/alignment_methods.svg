<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" role="img" aria-label="Alignment Methods" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title>Três esquemas de otimização de preferências</title>
  <desc>Os PPO baseados em RLHF recorrem a ajuste supervisionado, um modelo de recompensa e otimização on-policy; os DPO otimizam pares offline em relação a um modelo de referência; já o ORPO combina perdas supervisionadas e de razão de probabilidades sem necessidade de modelo de referência.</desc>
  <defs>
    <linearGradient id="sftGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="dpoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="orpoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#16a34a" />
      <stop offset="100%" stop-color="#166534" />
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8" />
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2563eb" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="900" height="420" fill="#f8fafc" />

  <!-- Title -->
  <text x="450" y="30" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" text-anchor="middle" fill="#1d4ed8">Designs de Otimização de Preferências</text>

  <!-- Traditional RLHF -->
  <text x="60" y="65" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#334155">PPO-baseado RLHF:</text>

  <rect x="60" y="80" width="130" height="45" rx="6" fill="url(#sftGrad)" />
  <text x="125" y="105" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ffffff">1. SFT</text>
  <text x="125" y="118" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)">Tarefa de aprendizagem</text>

  <path d="M 190 102 L 220 102" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow)" />

  <rect x="230" y="80" width="130" height="45" rx="6" fill="#ea580c" />
  <text x="295" y="105" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ffffff">2. Modelo de Recompensa</text>
  <text x="295" y="118" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)">Aprender preferências</text>

  <path d="M 360 102 L 390 102" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow)" />

  <rect x="400" y="80" width="130" height="45" rx="6" fill="#dc2626" />
  <text x="465" y="105" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ffffff">3. PPO (RL)</text>
  <text x="465" y="118" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)">Política de otimização</text>

  <text x="560" y="98" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#dc2626">Amostras on-policy</text>
  <text x="560" y="112" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#dc2626">Verificações do modelo de recompensa</text>

  <!-- Divider -->
  <line x1="60" y1="150" x2="850" y2="150" stroke="#e2e8f0" stroke-width="1.5" />

  <!-- Modern DPO -->
  <text x="60" y="175" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#334155">DPO:</text>

  <rect x="60" y="190" width="130" height="45" rx="6" fill="url(#sftGrad)" />
  <text x="125" y="215" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ffffff">1. SFT</text>
  <text x="125" y="228" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)">Tarefa de aprendizagem</text>

  <path d="M 190 212 L 220 212" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrowPurple)" />

  <rect x="230" y="190" width="130" height="45" rx="6" fill="url(#dpoGrad)" />
  <text x="295" y="215" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ffffff">2. DPO</text>
  <text x="295" y="228" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)">Preferência direta</text>

  <text x="395" y="205" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#166534">Pares offline</text>
  <text x="395" y="220" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#166534">Política de referência</text>
  <text x="395" y="235" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#166534">Não existe modelo de recompensa aprendido</text>

  <!-- Divider -->
  <line x1="60" y1="260" x2="850" y2="260" stroke="#e2e8f0" stroke-width="1.5" />

  <!-- Newest ORPO -->
  <text x="60" y="285" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#334155">ORPO:</text>

  <rect x="60" y="300" width="200" height="50" rx="6" fill="url(#orpoGrad)" />
  <text x="160" y="322" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#ffffff">ORPO (de uma única fase)</text>
  <text x="160" y="340" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)">SFT + Alinhamento Combinado</text>

  <text x="290" y="315" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#166534">SFT + perda de razão de probabilidades</text>
  <text x="290" y="330" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#166534">Não existe modelo de referência</text>
  <text x="290" y="345" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#166534">Um caminho checkpoint acoplado</text>

  <!-- Recommendation Box -->
  <rect x="530" y="280" width="310" height="80" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" />
  <text x="685" y="305" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#9a3412">Regra de seleção</text>
  <text x="685" y="325" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#9a3412">Associar o objetivo aos dados</text>
  <text x="685" y="340" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#9a3412">Mantenha uma linha de base exclusiva para o SFT</text>
  <text x="685" y="355" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#9a3412">Medir métricas de tarefa e preferências</text>

  <!-- Legend -->
  <rect x="60" y="375" width="780" height="35" rx="4" fill="#f1f5f9" />
  <text x="80" y="397" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#334155">Chave:</text>
  <text x="115" y="397" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155">SFT = Fine-Tuning supervisionado</text>
  <text x="300" y="397" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155">DPO = Otimização de Preferência Direta</text>
  <text x="530" y="397" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155">ORPO = Otimização da Preferência por Razão de Probabilidades</text>
</svg>
