<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Pipeline de Ajuste Fino do Unsloth</title>
  <desc id="artifact-desc">Pipeline de Ajuste Fino do Unsloth.</desc>
  <defs>
    <linearGradient id="dataGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #2563eb" />
      <stop offset="100%" style="stop-color: #2563eb" />
    </linearGradient>
    <linearGradient id="modelGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #2563eb" />
      <stop offset="100%" style="stop-color: #2563eb" />
    </linearGradient>
    <linearGradient id="trainGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #ea580c" />
      <stop offset="100%" style="stop-color: #ea580c" />
    </linearGradient>
    <linearGradient id="outGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #16a34a" />
      <stop offset="100%" style="stop-color: #16a34a" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="900" height="400" fill="#0f172a" />

  <!-- Title -->
  <text y="35" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="bold" x="450">Pipeline de Ajuste Fino do Unsloth</text>

  <!-- Step 1: Dataset -->
  <rect x="30" y="80" width="150" height="100" rx="12" fill="url(#dataGrad)" filter="url(#shadow)" />
  <text y="115" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" x="105">📊 Conjunto de Dados</text>
  <text y="138" text-anchor="middle" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="11" x="105">função-glaive-</text>
  <text y="153" text-anchor="middle" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="11" x="105">calling-v2</text>
  <text y="172" text-anchor="middle" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="10" x="105">113 mil exemplos</text>

  <!-- Arrow 1 -->
  <path d="M180 130 L230 130" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Step 2: Base Model -->
  <rect x="240" y="80" width="150" height="100" rx="12" fill="url(#modelGrad)" filter="url(#shadow)" />
  <text y="115" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" x="315">🤖 Modelo Básico</text>
  <text y="138" text-anchor="middle" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="11" x="315">Nemotron-Nano</text>
  <text y="153" text-anchor="middle" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="11" x="315">4B-v1.1</text>
  <text y="172" text-anchor="middle" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="10" x="315">Quantizado a 4 bits</text>

  <!-- Arrow 2 -->
  <path d="M390 130 L440 130" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Step 3: Training -->
  <rect x="450" y="65" width="180" height="130" rx="12" fill="url(#trainGrad)" filter="url(#shadow)" />
  <text y="95" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" x="540">🔥 Treino de SFT</text>
  <text y="120" text-anchor="middle" fill="#fdba74" font-family="Inter, system-ui, sans-serif" font-size="11" x="540">LoRA r=16, α=32</text>
  <text y="140" text-anchor="middle" fill="#fdba74" font-family="Inter, system-ui, sans-serif" font-size="11" x="540">max_seq=4096</text>
  <text y="160" text-anchor="middle" fill="#fdba74" font-family="Inter, system-ui, sans-serif" font-size="11" x="540">packing=True</text>
  <text y="185" text-anchor="middle" fill="#fdba74" font-family="Inter, system-ui, sans-serif" font-size="10" x="540">2 vezes mais rápido com o Unsloth</text>

  <!-- Arrow 3 -->
  <path d="M630 130 L680 130" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Step 4: Output -->
  <rect x="690" y="80" width="180" height="100" rx="12" fill="url(#outGrad)" filter="url(#shadow)" />
  <text y="115" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" x="780">✨ Ajustado com fine-tuning</text>
  <text y="138" text-anchor="middle" fill="#86efac" font-family="Inter, system-ui, sans-serif" font-size="11" x="780">Chamada de função</text>
  <text y="153" text-anchor="middle" fill="#86efac" font-family="Inter, system-ui, sans-serif" font-size="11" x="780">modelo especializado</text>
  <text y="172" text-anchor="middle" fill="#86efac" font-family="Inter, system-ui, sans-serif" font-size="10" x="780">LoRA ~100MB</text>

  <!-- Components detail section -->
  <rect x="30" y="210" width="840" height="170" rx="12" fill="#1e293b" filter="url(#shadow)" />

  <!-- Config section -->
  <rect x="50" y="230" width="250" height="130" rx="8" fill="#0f172a" />
  <text y="255" text-anchor="middle" fill="#fdba74" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" x="175">⚙️ config.py</text>
  <text y="280" fill="#cbd5e1" font-family="SFMono-Regular, Consolas, monospace" font-size="10" x="65">LORA_R = 16</text>
  <text y="298" fill="#cbd5e1" font-family="SFMono-Regular, Consolas, monospace" font-size="10" x="65">LORA_ALPHA = 32</text>
  <text y="316" fill="#cbd5e1" font-family="SFMono-Regular, Consolas, monospace" font-size="10" x="65">MAX_SEQ_LENGTH = 4096</text>
  <text y="334" fill="#cbd5e1" font-family="SFMono-Regular, Consolas, monospace" font-size="10" x="65">TAMANHO_DE_LOTE = 2</text>
  <text y="352" fill="#cbd5e1" font-family="SFMono-Regular, Consolas, monospace" font-size="10" x="65">taxa_de_aprendizagem = 2e-4</text>

  <!-- Model section -->
  <rect x="320" y="230" width="250" height="130" rx="8" fill="#0f172a" />
  <text y="255" text-anchor="middle" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" x="445">🔧 model.py</text>
  <text y="280" fill="#cbd5e1" font-family="SFMono-Regular, Consolas, monospace" font-size="10" x="335">Modelo de Linguagem Rápido</text>
  <text y="298" fill="#cbd5e1" font-family="SFMono-Regular, Consolas, monospace" font-size="10" x="335">  .from_pretrained()</text>
  <text y="316" fill="#cbd5e1" font-family="SFMono-Regular, Consolas, monospace" font-size="10" x="335">  .get_peft_model()</text>
  <text y="334" fill="#cbd5e1" font-family="SFMono-Regular, Consolas, monospace" font-size="10" x="335">  .save_pretrained()</text>
  <text y="352" fill="#cbd5e1" font-family="SFMono-Regular, Consolas, monospace" font-size="10" x="335">  .save_pretrained_gguf()</text>

  <!-- Training section -->
  <rect x="590" y="230" width="260" height="130" rx="8" fill="#0f172a" />
  <text y="255" text-anchor="middle" fill="#166534" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" x="720">📈 training.py</text>
  <text y="280" fill="#cbd5e1" font-family="SFMono-Regular, Consolas, monospace" font-size="10" x="605">SFTTrainer()</text>
  <text y="298" fill="#cbd5e1" font-family="SFMono-Regular, Consolas, monospace" font-size="10" x="605">  modelo=modelo,</text>
  <text y="316" fill="#cbd5e1" font-family="SFMono-Regular, Consolas, monospace" font-size="10" x="605">  train_dataset=conjunto_de_dados,</text>
  <text y="334" fill="#cbd5e1" font-family="SFMono-Regular, Consolas, monospace" font-size="10" x="605">  packing=True,</text>
  <text y="352" fill="#cbd5e1" font-family="SFMono-Regular, Consolas, monospace" font-size="10" x="605">).trainar()</text>
</svg>
