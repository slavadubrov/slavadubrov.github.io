<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" role="img" aria-label="Decision Flowchart" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title>Escolha o mecanismo antes de fine-tuning</title>
  <desc>Um caminho de decisão direciona fatos em constante mudança para a recuperação de informações, alterações simples de estilo para a geração de prompts, a sintaxe de saída para constrained decoding, e disparidades comportamentais mensuráveis persistentes para fine-tuning.</desc>
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #2563eb" />
      <stop offset="100%" style="stop-color: #2563eb" />
    </linearGradient>
    <linearGradient id="promptGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #16a34a" />
      <stop offset="100%" style="stop-color: #16a34a" />
    </linearGradient>
    <linearGradient id="ragGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #ea580c" />
      <stop offset="100%" style="stop-color: #ea580c" />
    </linearGradient>
    <linearGradient id="sgrGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #2563eb" />
      <stop offset="100%" style="stop-color: #2563eb" />
    </linearGradient>
    <linearGradient id="tuneGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #dc2626" />
      <stop offset="100%" style="stop-color: #dc2626" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="800" height="580" fill="#0f172a" />

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="bold">Quando Fazer Ajuste Fino? Fluxograma de Decisão</text>

  <!-- Start node -->
  <ellipse cx="400" cy="90" rx="100" ry="28" fill="#1e293b" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
  <text x="400" y="95" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">🎯 De que necessita?</text>

  <!-- Arrow down from start -->
  <path d="M400 118 L400 138" stroke="#94a3b8" stroke-width="2" />

  <!-- Decision 1: Dynamic facts? -->
  <rect x="290" y="145" width="220" height="50" rx="8" fill="#1e293b" stroke="#ea580c" stroke-width="2" filter="url(#shadow)" />
  <text x="400" y="165" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="13">necessidade de processamento em tempo real ou</text>
  <text x="400" y="183" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="13">atualização de conhecimento?</text>

  <!-- Yes arrow to RAG -->
  <path d="M510 170 L590 170" stroke="#94a3b8" stroke-width="2" />
  <text x="540" y="160" fill="#166534" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">SIM</text>

  <!-- RAG box -->
  <rect x="600" y="145" width="150" height="50" rx="8" fill="url(#ragGrad)" filter="url(#shadow)" />
  <text x="675" y="167" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold">📚 Utilize RAG</text>
  <text x="675" y="183" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="11">Generação Aumentada por Recuperação de Informação</text>

  <!-- No arrow down -->
  <path d="M400 195 L400 220" stroke="#94a3b8" stroke-width="2" />
  <text x="415" y="210" fill="#fca5a5" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Não</text>

  <!-- Decision 2: Simple format? -->
  <rect x="290" y="225" width="220" height="50" rx="8" fill="#1e293b" stroke="#16a34a" stroke-width="2" filter="url(#shadow)" />
  <text x="400" y="245" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="13">Estilo/formato simples</text>
  <text x="400" y="263" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="13">ajustes?</text>

  <!-- Yes arrow to Prompt Engineering -->
  <path d="M510 250 L590 250" stroke="#94a3b8" stroke-width="2" />
  <text x="540" y="240" fill="#166534" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">SIM</text>

  <!-- Prompt Engineering box -->
  <rect x="600" y="225" width="150" height="50" rx="8" fill="url(#promptGrad)" filter="url(#shadow)" />
  <text x="675" y="247" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold">✏️ Formatação de prompts</text>
  <text x="675" y="263" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="11">Exemplos de poucos exemplos</text>

  <!-- No arrow down -->
  <path d="M400 275 L400 300" stroke="#94a3b8" stroke-width="2" />
  <text x="415" y="290" fill="#fca5a5" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Não</text>

  <!-- Decision 3: Consistency issues? (REFRAMED) -->
  <rect x="290" y="305" width="220" height="50" rx="8" fill="#1e293b" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
  <text x="400" y="325" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="13">Necessário uma sintaxe de saída válida</text>
  <text x="400" y="343" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="13">para um esquema ou gramática?</text>

  <!-- Yes arrow to constrained decoding -->
  <path d="M510 330 L590 330" stroke="#94a3b8" stroke-width="2" />
  <text x="540" y="320" fill="#166534" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">SIM</text>

  <!-- Constrained decoding box -->
  <rect x="600" y="305" width="150" height="50" rx="8" fill="url(#sgrGrad)" filter="url(#shadow)" />
  <text x="675" y="327" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold">🔗 Restringir a decodificação</text>
  <text x="675" y="343" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="11">Sintaxe válida, não verdade</text>

  <!-- No arrow down -->
  <path d="M400 355 L400 380" stroke="#94a3b8" stroke-width="2" />
  <text x="415" y="370" fill="#fca5a5" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Não</text>

  <!-- Decision 4: Complex behavior? -->
  <rect x="275" y="385" width="250" height="50" rx="8" fill="#1e293b" stroke="#dc2626" stroke-width="2" filter="url(#shadow)" />
  <text x="400" y="405" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="13">A diferença de comportamento medido permanece</text>
  <text x="400" y="423" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="13">em comparação com a linha de base não ajustada?</text>

  <!-- Yes arrow to Fine-Tuning -->
  <path d="M400 435 L400 465" stroke="#94a3b8" stroke-width="2" />
  <text x="415" y="453" fill="#166534" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">SIM</text>
  <text x="255" y="453" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11">NÃO: manter a linha de base</text>

  <!-- Fine-Tuning box -->
  <rect x="300" y="470" width="200" height="55" rx="8" fill="url(#tuneGrad)" filter="url(#shadow)" />
  <text x="400" y="495" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="bold">🔧 Ajuste fino</text>
  <text x="400" y="513" text-anchor="middle" fill="#fef2f2" font-family="Inter, system-ui, sans-serif" font-size="12">PEFT (LoRA/QLoRA)</text>

  <!-- Left side examples -->
  <rect x="40" y="145" width="180" height="220" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#shadow)" />
  <text x="130" y="168" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">CASOS DE UTILIZAÇÃO</text>
  <text x="55" y="193" fill="#fdba74" font-family="Inter, system-ui, sans-serif" font-size="11">📚 RAG:</text>
  <text x="55" y="208" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10">• Documentação da empresa</text>
  <text x="55" y="223" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10">• Preços atuais</text>
  <text x="55" y="243" fill="#166534" font-family="Inter, system-ui, sans-serif" font-size="11">✏️ Formatação de prompts:</text>
  <text x="55" y="258" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10">• Alterações básicas de estilo</text>
  <text x="55" y="278" fill="#1d4ed8" font-family="Inter, system-ui, sans-serif" font-size="11">🔗 Restrição:</text>
  <text x="55" y="293" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10">• Consistência JSON</text>
  <text x="55" y="308" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10">• Sintaxe de chamada a ferramentas</text>
  <text x="55" y="328" fill="#fca5a5" font-family="Inter, system-ui, sans-serif" font-size="11">🔧 Ajuste fino:</text>
  <text x="55" y="343" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10">• Comportamento de tarefa repetida</text>
  <text x="55" y="358" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10">• Adaptação a modelos mais pequenos</text>
</svg>
