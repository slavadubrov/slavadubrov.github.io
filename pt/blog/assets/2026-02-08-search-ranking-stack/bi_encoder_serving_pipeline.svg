<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Processamento por Bi-Encoder: Indexação Offline vs. Consulta Online</title>
  <desc id="artifact-desc">Processamento por Bi-Encoder: Indexação Offline vs. Consulta Online.</desc>
  <defs>
    <marker id="arrowSrv" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155" />
    </marker>
    <filter id="shadowSrv" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a" x="410">Processamento por Bi-Encoder: Indexação Offline vs. Consulta Online</text>

  <!-- Divider -->
  <line x1="410" y1="50" x2="410" y2="400" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="8,4" />
  <text y="65" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8" x="200">Off-line (Tempo de Indexação)</text>
  <text y="65" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412" x="620">Online (Tempo de Consulta)</text>

  <!-- === LEFT SIDE: Offline === -->

  <!-- Document Corpus -->
  <rect x="50" y="85" width="160" height="40" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.2" filter="url(#shadowSrv)" />
  <text y="102" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="130">Corpo de Documentos</text>
  <text y="118" text-anchor="middle" font-size="9" fill="#991b1b" x="130">N documentos</text>

  <!-- Arrow -->
  <line x1="210" y1="105" x2="250" y2="105" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowSrv)" />

  <!-- Encoder -->
  <rect x="255" y="85" width="120" height="40" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSrv)" />
  <text y="102" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8" x="315">Bi-Encoder</text>
  <text y="118" text-anchor="middle" font-size="9" fill="#1d4ed8" x="315">codificação em lote</text>

  <!-- Arrow -->
  <line x1="200" y1="125" x2="200" y2="168" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowSrv)" />

  <!-- Embeddings Store -->
  <rect x="60" y="170" width="280" height="50" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSrv)" />
  <text y="192" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="200">Embeddedimentos de Documentos</text>
  <text y="208" text-anchor="middle" font-size="10" fill="#2563eb" x="200">Matriz N x D (por exemplo, 8500 x 384 = 13 MB)</text>

  <!-- Arrow -->
  <line x1="200" y1="220" x2="200" y2="263" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowSrv)" />

  <!-- Vector Index -->
  <rect x="80" y="265" width="240" height="55" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowSrv)" />
  <text y="288" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8" x="200">Índice Vectorial</text>
  <text y="305" text-anchor="middle" font-size="10" fill="#1d4ed8" x="200">HNSW / IVF / DiskANN</text>

  <!-- One-time label -->
  <rect x="120" y="340" width="160" height="28" rx="14" fill="#f0fdf4" stroke="#166534" stroke-width="1" />
  <text y="359" text-anchor="middle" font-size="11" font-weight="600" fill="#166534" x="200">Realizado uma vez, armazenado em disco</text>

  <!-- === RIGHT SIDE: Online === -->

  <!-- User Query -->
  <rect x="480" y="85" width="140" height="40" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSrv)" />
  <text y="102" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="550">Consulta do Utilizador</text>
  <text y="118" text-anchor="middle" font-size="9" fill="#1d4ed8" x="550">"auscultadores sem fios"</text>

  <!-- Arrow -->
  <line x1="620" y1="105" x2="660" y2="105" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowSrv)" />

  <!-- Encoder -->
  <rect x="665" y="85" width="120" height="40" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSrv)" />
  <text y="102" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8" x="725">Bi-Encoder</text>
  <text y="118" text-anchor="middle" font-size="9" fill="#1d4ed8" x="725">codificação única</text>

  <!-- Arrow down -->
  <line x1="620" y1="125" x2="620" y2="168" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowSrv)" />

  <!-- Query Embedding -->
  <rect x="530" y="170" width="180" height="40" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSrv)" />
  <text y="192" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="620">Embedding de Consulta</text>
  <text y="206" text-anchor="middle" font-size="9" fill="#2563eb" x="620">1 vetor D</text>

  <!-- Timing label for encode -->
  <rect x="700" y="152" width="70" height="20" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="1" />
  <text y="166" text-anchor="middle" font-size="9" font-weight="600" fill="#9a3412" x="735">~5 ms</text>

  <!-- Arrow down -->
  <line x1="620" y1="210" x2="620" y2="263" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowSrv)" />

  <!-- ANN Search -->
  <rect x="500" y="265" width="240" height="55" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowSrv)" />
  <text y="288" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412" x="620">Busca ANN</text>
  <text y="305" text-anchor="middle" font-size="10" fill="#991b1b" x="620">Embeдинг de consultas vs. índice vetorial</text>

  <!-- Timing label for ANN -->
  <rect x="700" y="245" width="70" height="20" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="1" />
  <text y="259" text-anchor="middle" font-size="9" font-weight="600" fill="#9a3412" x="735">~10 ms</text>

  <!-- Cross-connection: Vector Index → ANN Search -->
  <path d="M320,292 Q380,292 410,292 Q440,292 500,292" stroke="#94a3b8" stroke-width="1.2" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowSrv)" />

  <!-- Arrow down to results -->
  <line x1="620" y1="320" x2="620" y2="358" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowSrv)" />

  <!-- Top-K Results -->
  <rect x="510" y="360" width="220" height="40" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1.2" filter="url(#shadowSrv)" />
  <text y="378" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="620">Candidatos Top-K</text>
  <text y="393" text-anchor="middle" font-size="10" fill="#166534" x="620">Classificado por semelhança de cosseno</text>

  <!-- Total timing -->
  <rect x="700" y="340" width="90" height="20" rx="10" fill="#f0fdf4" stroke="#166534" stroke-width="1" />
  <text y="354" text-anchor="middle" font-size="9" font-weight="600" fill="#166534" x="745">Total de ~15 ms</text>

</svg>
