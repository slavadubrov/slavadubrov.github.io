<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="title">Exemplo de treino de bi-encoder</title>
  <desc id="desc">Um exemplo de bi-encoder siamês aprende a posicionar uma consulta perto do seu documento positivo e longe dos negativos selecionados.</desc>
  <defs>
    <marker id="arrowTrn" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155" />
    </marker>
    <filter id="shadowTrn" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="820" height="480" fill="#ffffff" />

  <!-- Title -->
  <text x="410" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Treino de Bi-Encoder Pipeline</text>
  <text x="410" y="48" text-anchor="middle" font-size="12" fill="#334155">Aprendizagem contrastiva com negativos difíceis (perda InfoNCE)</text>

  <!-- Training Triplet -->
  <rect x="30" y="70" width="160" height="36" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowTrn)" />
  <text x="110" y="93" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">Consulta</text>

  <rect x="330" y="70" width="160" height="36" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1.2" filter="url(#shadowTrn)" />
  <text x="410" y="93" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">Documento Positivo (d+)</text>

  <rect x="630" y="70" width="160" height="36" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.2" filter="url(#shadowTrn)" />
  <text x="710" y="93" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b">Negativo duro (d-)</text>

  <!-- Arrows down to encoder -->
  <line x1="110" y1="106" x2="110" y2="148" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowTrn)" />
  <line x1="410" y1="106" x2="410" y2="148" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowTrn)" />
  <line x1="710" y1="106" x2="710" y2="148" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowTrn)" />

  <!-- Shared Encoder (spans across all three) -->
  <rect x="50" y="150" width="720" height="50" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowTrn)" />
  <text x="410" y="172" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">Encoder Transformer Compartilhado</text>
  <text x="410" y="190" text-anchor="middle" font-size="10" fill="#1d4ed8">Pesos partilhados neste exemplo Siamese</text>

  <!-- Arrows down to embeddings -->
  <line x1="110" y1="200" x2="110" y2="238" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowTrn)" />
  <line x1="410" y1="200" x2="410" y2="238" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowTrn)" />
  <line x1="710" y1="200" x2="710" y2="238" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowTrn)" />

  <!-- Embeddings -->
  <rect x="50" y="240" width="120" height="34" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1" filter="url(#shadowTrn)" />
  <text x="110" y="262" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">q embedding</text>

  <rect x="350" y="240" width="120" height="34" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1" filter="url(#shadowTrn)" />
  <text x="410" y="262" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">d+ embedding</text>

  <rect x="650" y="240" width="120" height="34" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1" filter="url(#shadowTrn)" />
  <text x="710" y="262" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">d- embedding</text>

  <!-- Similarity computations -->
  <line x1="150" y1="274" x2="250" y2="320" stroke="#166534" stroke-width="1.5" marker-end="url(#arrowTrn)" />
  <line x1="380" y1="274" x2="280" y2="320" stroke="#166534" stroke-width="1.5" marker-end="url(#arrowTrn)" />

  <line x1="150" y1="274" x2="530" y2="320" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowTrn)" />
  <line x1="670" y1="274" x2="570" y2="320" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowTrn)" />

  <!-- Similarity boxes -->
  <rect x="205" y="320" width="120" height="36" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1.2" filter="url(#shadowTrn)" />
  <text x="265" y="338" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">sim(q, d+)</text>
  <text x="265" y="352" text-anchor="middle" font-size="9" fill="#166534">Maximizar</text>

  <rect x="490" y="320" width="120" height="36" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.2" filter="url(#shadowTrn)" />
  <text x="550" y="338" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">sim(q, d-)</text>
  <text x="550" y="352" text-anchor="middle" font-size="9" fill="#991b1b">Minimizar</text>

  <!-- Arrows down to loss -->
  <line x1="265" y1="356" x2="350" y2="396" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowTrn)" />
  <line x1="550" y1="356" x2="465" y2="396" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowTrn)" />

  <!-- Contrastive Loss -->
  <rect x="310" y="398" width="200" height="60" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowTrn)" />
  <text x="410" y="420" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412">Perda InfoNCE</text>
  <text x="410" y="440" text-anchor="middle" font-size="10" fill="#991b1b">-log( exp(sim+/t) /</text>
  <text x="410" y="452" text-anchor="middle" font-size="10" fill="#991b1b">S exp(sim_i/t) )</text>

</svg>
