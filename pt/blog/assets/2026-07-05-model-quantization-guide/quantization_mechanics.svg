<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 520" width="100%" height="100%" role="img" aria-label="Quantization Mechanics: Weight-Only vs. Weight-Activation" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="artifact-title">Mecânica de Quantização: Apenas Pesos vs. Pesos e Ativação</title>
  <defs>
    <!-- Drop Shadow Filter -->
    <filter id="drop-shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#334155" flood-opacity="0.08" />
    </filter>
    <!-- Gradients -->
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="orange-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ea580c" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <linearGradient id="green-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16a34a" />
      <stop offset="100%" stop-color="#16a34a" />
    </linearGradient>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="850" height="520" fill="#f8fafc" rx="12" />

  <!-- Title -->
  <text y="40" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#0f172a" x="30">
    Weight-Only (W4A16) versus Weight-Activation (W8A8/FP8)
  </text>
  <text y="60" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#334155" x="30">
    Comparação da transferência de memória GPU, processamento de registos e utilização dos núcleos tensoriais
  </text>

  <!-- Divider Line -->
  <line x1="425" y1="90" x2="425" y2="490" stroke="#cbd5e1" stroke-dasharray="5,5" stroke-width="2" />

  <!-- SECTION 1: WEIGHT-ONLY (W4A16) -->
  <g>
    <!-- Subtitle -->
    <rect x="30" y="90" width="365" height="30" fill="#eff6ff" rx="6" />
    <text y="110" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12.5" font-weight="700" fill="#1d4ed8" x="212.5">
      A. Quantização Somente de Pesos (p. ex., W4A16 GPTQ/AWQ)
    </text>
    <text y="142" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#334155" x="212.5">
      Otimiza a decodificação limitada por memória (lote baixo/fluxo único)
    </text>

    <!-- GPU VRAM (HBM) -->
    <rect x="50" y="160" width="320" height="75" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" rx="8" />
    <text y="180" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#334155" x="210">GPU VRAM (HBM)</text>

    <!-- weights box -->
    <rect x="65" y="192" width="135" height="30" fill="url(#orange-grad)" rx="4" />
    <text y="211" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff" x="132.5">Pesos (4 bits)</text>
    <!-- activations box -->
    <rect x="220" y="192" width="135" height="30" fill="url(#blue-grad)" rx="4" />
    <text y="211" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff" x="287.5">Ativações (16 bits BF16)</text>

    <!-- Data Flow Arrows -->
    <path d="M 132.5 235 L 132.5 272" fill="none" stroke="#ea580c" stroke-width="2.5" marker-end="url(#arrow-orange)" />
    <path d="M 287.5 235 L 287.5 272" fill="none" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)" />

    <!-- GPU Compute Block -->
    <rect x="50" y="285" width="320" height="150" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" rx="8" />
    <text y="305" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#334155" x="210">Execução em SRAM/Registradores</text>

    <!-- Dequantization Step -->
    <rect x="65" y="320" width="135" height="40" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" rx="4" />
    <text y="337" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#9a3412" x="132.5">Desquantização no kernel</text>
    <text y="350" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#9a3412" x="132.5">INT de 4 bits → FP de 16 bits</text>

    <!-- Activations path (Unchanged) -->
    <rect x="220" y="320" width="135" height="40" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" rx="4" />
    <text y="337" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#1d4ed8" x="287.5">Mantém como 16 bits</text>
    <text y="350" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#1d4ed8" x="287.5">Desquantização</text>

    <!-- Arrow from Dequant to Tensor Core -->
    <path d="M 132.5 360 L 132.5 388 C 132.5 400, 180 400, 195 400" fill="none" stroke="#ea580c" stroke-dasharray="3,3" stroke-width="1.5" />

    <!-- Activations entry line -->
    <path d="M 287.5 285 L 287.5 320" fill="none" stroke="#2563eb" stroke-width="1.5" />

    <!-- Activations bypass dequant -->
    <path d="M 287.5 360 L 287.5 388 C 287.5 400, 240 400, 225 400" fill="none" stroke="#2563eb" stroke-width="1.5" />

    <!-- Math execution box -->
    <rect x="180" y="385" width="60" height="35" fill="url(#purple-grad)" rx="4" />
    <text y="406" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff" x="210">BF16 Teste de Conformidade</text>
    <text y="445" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" x="210">A matemática dos pesos é de 16 bits</text>

    <!-- Bottom Note -->
    <rect x="50" y="450" width="320" height="40" fill="#fff7ed" stroke="#ea580c" rx="6" />
    <text y="466" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#9a3412" x="210">⚠️ O gargalo de computação permanece ativo:</text>
    <text y="478" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9.5" fill="#9a3412" x="210">São obtidas VRAM de economia, mas não há aceleração computacional.</text>
  </g>

  <!-- SECTION 2: WEIGHT-ACTIVATION (W8A8/FP8) -->
  <g transform="translate(425, 0)">
    <!-- Subtitle -->
    <rect x="30" y="90" width="365" height="30" fill="#f0fdf4" rx="6" />
    <text y="110" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12.5" font-weight="700" fill="#166534" x="212.5">
      B. Quantização de Ativação com Peso (W8A8 / FP8)
    </text>
    <text y="142" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#334155" x="212.5">
      Acelera tarefas limitadas por processamento Prefill (Alta concorrência / Serving)
    </text>

    <!-- GPU VRAM (HBM) -->
    <rect x="50" y="160" width="320" height="75" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" rx="8" />
    <text y="180" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#334155" x="210">GPU VRAM (HBM)</text>

    <!-- weights box -->
    <rect x="65" y="192" width="135" height="30" fill="url(#green-grad)" rx="4" />
    <text y="211" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff" x="132.5">Pesos (8 bits)</text>
    <!-- activations box -->
    <rect x="220" y="192" width="135" height="30" fill="url(#green-grad)" rx="4" />
    <text y="211" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff" x="287.5">Ativações (8 bits)</text>

    <!-- Data Flow Arrows -->
    <path d="M 132.5 235 L 132.5 280" fill="none" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrow-green)" />
    <path d="M 287.5 235 L 287.5 280" fill="none" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrow-green)" />

    <!-- GPU Compute Block -->
    <rect x="50" y="285" width="320" height="150" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" rx="8" />
    <text y="305" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#334155" x="210">Execução em SRAM/Registradores</text>

    <!-- Pass Directly to Tensor Cores (Weights) -->
    <rect x="65" y="320" width="135" height="40" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" rx="4" />
    <text y="337" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#166534" x="132.5">Custo de desquantização</text>
    <text y="350" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#166534" x="132.5">Alimentação direta de hardware</text>

    <!-- Pass Directly to Tensor Cores (Activations) -->
    <rect x="220" y="320" width="135" height="40" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" rx="4" />
    <text y="337" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#166534" x="287.5">Custo de desquantização</text>
    <text y="350" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#166534" x="287.5">Alimentação direta de hardware</text>

    <!-- Arrow from Weights to Tensor Core -->
    <path d="M 132.5 360 L 132.5 388 C 132.5 400, 180 400, 195 400" fill="none" stroke="#16a34a" stroke-width="1.5" />

    <!-- Arrow from Activations to Tensor Core -->
    <path d="M 287.5 360 L 287.5 388 C 287.5 400, 240 400, 225 400" fill="none" stroke="#16a34a" stroke-width="1.5" />

    <!-- Math execution box -->
    <rect x="180" y="385" width="60" height="35" fill="url(#purple-grad)" rx="4" />
    <text y="406" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#ffffff" x="210">INT8/FP8</text>
    <text y="445" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" x="210">Ejecutado diretamente em HW</text>

    <!-- Bottom Note -->
    <rect x="50" y="450" width="320" height="40" fill="#f0fdf4" stroke="#16a34a" rx="6" />
    <text y="466" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#166534" x="210">⚡ Aceleração de hardware total:</text>
    <text y="478" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9.5" fill="#166534" x="210">Libera um rendimento teórico 2x maior no Tensor Core (TOPS).</text>
  </g>

  <!-- Markers -->
  <defs>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#ea580c" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#2563eb" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#16a34a" />
    </marker>
  </defs>
</svg>
