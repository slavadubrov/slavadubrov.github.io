<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Mapa de benchmark do algoritmo de quantização e do kernel em tempo de execução</title>
  <desc id="desc">Diagrama que ilustra como um algoritmo cria um ponto de verificação compactado, enquanto os kernels em tempo de execução determinam a velocidade de fornecimento e os resultados dos testes de desempenho.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.16" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#546e7a" />
    </marker>
  </defs>
  <rect width="960" height="520" fill="#f8f9fa" />
  <text x="480" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#263238">Algoritmo + Kernel + Carga de Trabalho = Resultado</text>
  <text x="480" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#546e7a">Um checkpoint quantizado não significa necessariamente uma implementação mais rápida.</text>

  <g font-family="Arial, sans-serif">
    <rect x="48" y="130" width="210" height="150" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" filter="url(#shadow)" />
    <text x="153" y="160" text-anchor="middle" font-size="18" font-weight="700" fill="#1565c0">Método de Quantização</text>
    <text x="153" y="194" text-anchor="middle" font-size="14" fill="#263238">GPTQ</text>
    <text x="153" y="220" text-anchor="middle" font-size="14" fill="#263238">AWQ</text>
    <text x="153" y="246" text-anchor="middle" font-size="14" fill="#263238">SmoothQuant</text>
    <text x="153" y="268" text-anchor="middle" font-size="12" fill="#546e7a">decide o erro do ponto de verificação</text>

    <rect x="375" y="130" width="210" height="150" rx="8" fill="#fff3e0" stroke="#e67e22" stroke-width="2" filter="url(#shadow)" />
    <text x="480" y="160" text-anchor="middle" font-size="18" font-weight="700" fill="#e65100">Núcleo em tempo de execução</text>
    <text x="480" y="194" text-anchor="middle" font-size="14" fill="#263238">Marlin</text>
    <text x="480" y="220" text-anchor="middle" font-size="14" fill="#263238">BitBLAS</text>
    <text x="480" y="246" text-anchor="middle" font-size="14" fill="#263238">Núcleos de tensor FP8</text>
    <text x="480" y="268" text-anchor="middle" font-size="12" fill="#546e7a">decide o caminho de execução</text>

    <rect x="702" y="130" width="210" height="150" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" filter="url(#shadow)" />
    <text x="807" y="160" text-anchor="middle" font-size="18" font-weight="700" fill="#2e7d32">Carga de trabalho</text>
    <text x="807" y="194" text-anchor="middle" font-size="14" fill="#263238">comprimento do prompt</text>
    <text x="807" y="220" text-anchor="middle" font-size="14" fill="#263238">concorrência</text>
    <text x="807" y="246" text-anchor="middle" font-size="14" fill="#263238">objetivo de qualidade</text>
    <text x="807" y="268" text-anchor="middle" font-size="12" fill="#546e7a">identifica o gargalo</text>
  </g>

  <g stroke="#546e7a" stroke-width="2.3" fill="none" marker-end="url(#arrow)">
    <path d="M 258 205 L 365 205" />
    <path d="M 585 205 L 692 205" />
    <path d="M 807 280 C 807 330 480 325 480 365" />
    <path d="M 480 280 L 480 365" />
    <path d="M 153 280 C 153 330 480 325 480 365" />
  </g>

  <rect x="260" y="365" width="440" height="100" rx="8" fill="#ffffff" stroke="#78909c" stroke-width="1.5" filter="url(#shadow)" />
  <text x="480" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#37474f">Fazer benchmark do stack real</text>
  <text x="480" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#546e7a">qualidade: perplexidade, métricas da tarefa, gerações</text>
  <text x="480" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#546e7a">serviço: taxa de transferência, TTFT, ITL, memória, concorrência</text>
</svg>
