<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Verificações de calibração e avaliação</title>
  <desc id="desc">Fluxo dos dados de calibração representativos, passando pela quantização, até às verificações de qualidade e disponibilização, antes da implementação.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.16" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#546e7a" />
    </marker>
  </defs>
  <rect width="960" height="520" fill="#f8f9fa" />
  <text x="480" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#263238">Verificações de implementação da quantização</text>
  <text x="480" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#546e7a">Um ponto de verificação que ainda precisa de calibração e validação de implementação.</text>

  <g font-family="Arial, sans-serif">
    <rect x="50" y="135" width="190" height="120" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" filter="url(#shadow)" />
    <text x="145" y="165" text-anchor="middle" font-size="17" font-weight="700" fill="#1565c0">Amostras de tráfego</text>
    <text x="145" y="196" text-anchor="middle" font-size="13" fill="#263238">Trilhas RAG</text>
    <text x="145" y="218" text-anchor="middle" font-size="13" fill="#263238">SQL / código / chat</text>
    <text x="145" y="240" text-anchor="middle" font-size="12" fill="#546e7a">redigido e representativo</text>

    <rect x="295" y="135" width="170" height="120" rx="8" fill="#fff3e0" stroke="#e67e22" stroke-width="2" filter="url(#shadow)" />
    <text x="380" y="165" text-anchor="middle" font-size="17" font-weight="700" fill="#e65100">Calibrar</text>
    <text x="380" y="196" text-anchor="middle" font-size="13" fill="#263238">escalas</text>
    <text x="380" y="218" text-anchor="middle" font-size="13" fill="#263238">valores atípicos</text>
    <text x="380" y="240" text-anchor="middle" font-size="12" fill="#546e7a">Primeiramente, 128-512 amostras</text>

    <rect x="520" y="135" width="170" height="120" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" filter="url(#shadow)" />
    <text x="605" y="165" text-anchor="middle" font-size="17" font-weight="700" fill="#6a1b9a">Quantização</text>
    <text x="605" y="196" text-anchor="middle" font-size="13" fill="#263238">GPTQ / AWQ</text>
    <text x="605" y="218" text-anchor="middle" font-size="13" fill="#263238">FP8 / INT8</text>
    <text x="605" y="240" text-anchor="middle" font-size="12" fill="#546e7a">proteger tensores sensíveis</text>

    <rect x="745" y="135" width="165" height="120" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" filter="url(#shadow)" />
    <text x="827" y="165" text-anchor="middle" font-size="17" font-weight="700" fill="#2e7d32">Utilizado para teste</text>
    <text x="827" y="196" text-anchor="middle" font-size="13" fill="#263238">vLLM / llama.cpp</text>
    <text x="827" y="218" text-anchor="middle" font-size="13" fill="#263238">hardware alvo</text>
    <text x="827" y="240" text-anchor="middle" font-size="12" fill="#546e7a">mesma forma de carga de trabalho</text>
  </g>

  <g stroke="#546e7a" stroke-width="2.3" fill="none" marker-end="url(#arrow)">
    <path d="M 240 195 L 285 195" />
    <path d="M 465 195 L 510 195" />
    <path d="M 690 195 L 735 195" />
    <path d="M 827 255 C 827 300 480 297 480 330" />
  </g>

  <rect x="165" y="330" width="630" height="112" rx="8" fill="#ffffff" stroke="#78909c" stroke-width="1.5" filter="url(#shadow)" />
  <text x="480" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#37474f">Verificação de implantação</text>
  <text x="480" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#546e7a">delta de perplexidade + regressão da tarefa + amostras de geração</text>
  <text x="480" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#546e7a">âncora de contexto longo + taxa de transferência + TTFT + ITL + memória</text>
</svg>
