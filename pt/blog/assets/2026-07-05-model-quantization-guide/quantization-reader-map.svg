<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Mapa de leitor de quantização</title>
  <desc id="desc">Mapa de decisão que direciona os gargalos serving para opções de quantização e verificações de validação.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#334155" flood-opacity="0.08" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="960" height="520" fill="#f8fafc" />
  <text y="42" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="700" fill="#0f172a" x="480">Comece pelo gargalo</text>
  <text y="72" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#334155" x="480">A mesma largura de bit pode estar correta ou incorreta dependendo do hardware, runtime, cache e dos processos de avaliação.</text>

  <rect x="365" y="105" width="230" height="74" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
  <text y="134" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="17" font-weight="700" fill="#1d4ed8" x="480">O que está a limitar serving?</text>
  <text y="160" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#334155" x="480">memória, processamento, cache, runtime, ou imagem pipeline</text>

  <g font-family="Inter, system-ui, sans-serif">
    <rect x="45" y="240" width="165" height="118" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)" />
    <text y="267" text-anchor="middle" font-size="15" font-weight="700" fill="#1d4ed8" x="127">Memória de pesos</text>
    <text y="294" text-anchor="middle" font-size="13" fill="#0f172a" x="127">W4A16 GPTQ/AWQ</text>
    <text y="318" text-anchor="middle" font-size="12" fill="#334155" x="127">decodificar, ajustar modelo</text>
    <text y="340" text-anchor="middle" font-size="12" fill="#334155" x="127">delta de qualidade de avaliação</text>

    <rect x="230" y="240" width="165" height="118" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadow)" />
    <text y="267" text-anchor="middle" font-size="15" font-weight="700" fill="#166534" x="312">Throughput</text>
    <text y="294" text-anchor="middle" font-size="13" fill="#0f172a" x="312">FP8 W8A8</text>
    <text y="318" text-anchor="middle" font-size="12" fill="#334155" x="312">núcleos Ada/Hopper</text>
    <text y="340" text-anchor="middle" font-size="12" fill="#334155" x="312">teste de desempenho TTFT/ITL</text>

    <rect x="415" y="240" width="165" height="118" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadow)" />
    <text y="267" text-anchor="middle" font-size="15" font-weight="700" fill="#9a3412" x="497">Contexto longo</text>
    <text y="292" text-anchor="middle" font-size="13" fill="#0f172a" x="497">cache KV</text>
    <text y="310" text-anchor="middle" font-size="13" fill="#0f172a" x="497">quantização</text>
    <text y="332" text-anchor="middle" font-size="12" fill="#334155" x="497">o cache tem predominância sobre VRAM</text>
    <text y="350" text-anchor="middle" font-size="12" fill="#334155" x="497">recuperação de sondas</text>

    <rect x="600" y="240" width="165" height="118" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)" />
    <text y="267" text-anchor="middle" font-size="15" font-weight="700" fill="#5b21b6" x="682">Local runtime</text>
    <text y="294" text-anchor="middle" font-size="13" fill="#0f172a" x="682">GGUF / MLX</text>
    <text y="318" text-anchor="middle" font-size="12" fill="#334155" x="682">CPU, Apple, borda</text>
    <text y="340" text-anchor="middle" font-size="12" fill="#334155" x="682">medir RAM local</text>

    <rect x="785" y="240" width="130" height="118" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#shadow)" />
    <text y="267" text-anchor="middle" font-size="15" font-weight="700" fill="#991b1b" x="850">Caminho da imagem</text>
    <text y="294" text-anchor="middle" font-size="13" fill="#0f172a" x="850">SVDQuant</text>
    <text y="318" text-anchor="middle" font-size="12" fill="#334155" x="850">Sensível à VAE</text>
    <text y="340" text-anchor="middle" font-size="12" fill="#334155" x="850">avaliações visuais</text>
  </g>

  <g stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M 480 179 C 480 205 127 208 127 235" />
    <path d="M 480 179 C 480 207 312 211 312 235" />
    <path d="M 480 179 C 480 210 497 211 497 235" />
    <path d="M 480 179 C 480 207 682 211 682 235" />
    <path d="M 480 179 C 480 205 850 208 850 235" />
  </g>

  <rect x="190" y="405" width="580" height="62" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.5" />
  <text y="430" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#334155" x="480">Em seguida, execute as verificações de deploy</text>
  <text y="455" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#334155" x="480">perplexidade + métricas de tarefa + amostras de geração + testes de contexto longo + serving benchmarks</text>
</svg>
