<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="MCP Architecture" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="artifact-title">MCP Arquitetura</title>

  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #93c5fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #93c5fd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #93c5fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #93c5fd;stop-opacity:1" />
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="100%" height="100%" fill="#f8fafc" />
  <rect width="800" height="400" fill="#f8fafc" rx="10" ry="10" />

  <!-- User Icon (Improved) -->
  <g transform="translate(50, 150)">
    <circle cx="40" cy="30" r="15" fill="#ea580c" stroke="#ea580c" stroke-width="2" />
    <path d="M 15 70 Q 40 45 65 70 L 65 80 L 15 80 Z" fill="#ea580c" stroke="#ea580c" stroke-width="2" />
    <text y="100" font-family="Inter, system-ui, sans-serif" font-size="14" text-anchor="middle" font-weight="bold" x="40">Utilizador</text>
  </g>

  <!-- Arrow: User -> Claude Desktop -->
  <line x1="130" y1="190" x2="220" y2="190" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />
  <text y="180" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" x="175">Prompts</text>

  <!-- Claude Desktop Box -->
  <g transform="translate(220, 100)">
    <rect width="160" height="180" rx="10" ry="10" fill="url(#grad2)" stroke="#2563eb" stroke-width="2" />
    <text y="30" font-family="Inter, system-ui, sans-serif" font-size="16" text-anchor="middle" font-weight="bold" fill="#1d4ed8" x="80">Claude Desktop</text>
    <text y="50" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#1d4ed8" x="80">(MCP Cliente)</text>

    <rect x="20" y="70" width="120" height="40" rx="5" ry="5" fill="#ffffff" stroke="#2563eb" stroke-dasharray="4" />
    <text y="95" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" x="80">LLM Raciocínio</text>

    <rect x="20" y="120" width="120" height="40" rx="5" ry="5" fill="#ffffff" stroke="#2563eb" stroke-dasharray="4" />
    <text y="145" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" x="80">Ejecução de Ferramentas</text>
  </g>

  <!-- Arrow: Claude Desktop -> FeatureStoreLite -->
  <line x1="380" y1="190" x2="470" y2="190" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />
  <text y="170" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" x="425">MCP Protocolo</text>
  <text y="185" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" x="425">(E/S / SSE)</text>

  <!-- FeatureStoreLite Box (Expanded to fit content) -->
  <g transform="translate(470, 90)"> <!-- Moved up slightly and increased height -->
    <rect width="160" height="200" rx="10" ry="10" fill="url(#grad1)" stroke="#1d4ed8" stroke-width="2" />
    <text y="30" font-family="Inter, system-ui, sans-serif" font-size="16" text-anchor="middle" font-weight="bold" fill="#0f172a" x="80">FeatureStoreLite</text>
    <text y="50" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#0f172a" x="80">(MCP Servidor)</text>

    <rect x="20" y="70" width="120" height="30" rx="5" ry="5" fill="#ffffff" stroke="#1d4ed8" />
    <text y="90" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" x="80">armazenar_característica</text>

    <rect x="20" y="110" width="120" height="30" rx="5" ry="5" fill="#ffffff" stroke="#1d4ed8" />
    <text y="130" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" x="80">obter_característica</text>

    <rect x="20" y="150" width="120" height="30" rx="5" ry="5" fill="#ffffff" stroke="#1d4ed8" />
    <text y="170" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" x="80">listar_características</text>
  </g>

  <!-- Arrow: FeatureStoreLite -> SQLite -->
  <line x1="630" y1="190" x2="700" y2="190" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />
  <text y="180" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" x="665">SQL</text>

  <!-- SQLite Database (Standard Cylinder) -->
  <g transform="translate(700, 140)">
    <!-- Bottom Ellipse (Background) -->
    <ellipse cx="40" cy="85" rx="40" ry="10" fill="#f1f5f9" stroke="#334155" stroke-width="2" />
    <!-- Body -->
    <path d="M0 15 L0 85 A40 10 0 0 0 80 85 L80 15" fill="#ffffff" stroke="#334155" stroke-width="2" />
    <!-- Top Ellipse -->
    <ellipse cx="40" cy="15" rx="40" ry="10" fill="#f1f5f9" stroke="#334155" stroke-width="2" />

    <text y="55" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" font-weight="bold" x="40">SQLite</text>
    <text y="70" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" x="40">features.db</text>
  </g>

</svg>
