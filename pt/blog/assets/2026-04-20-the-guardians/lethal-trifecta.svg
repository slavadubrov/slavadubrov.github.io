<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadowT" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1" />
    </filter>
  </defs>

  <text x="400" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">A Trifeta Letal de Simon Willison</text>
  <text x="400" y="52" text-anchor="middle" font-size="11" fill="#888">Todos os três ao mesmo tempo, e o atacante não precisa da cooperação do modelo.</text>

  <!-- Three circles -->
  <circle cx="300" cy="240" r="150" fill="#e3f2fd" fill-opacity="0.6" stroke="#1565c0" stroke-width="2" />
  <circle cx="500" cy="240" r="150" fill="#fff3e0" fill-opacity="0.6" stroke="#e65100" stroke-width="2" />
  <circle cx="400" cy="400" r="150" fill="#fce4ec" fill-opacity="0.6" stroke="#c62828" stroke-width="2" />

  <!-- Circle labels -->
  <text x="250" y="230" text-anchor="middle" font-size="14" font-weight="700" fill="#1565c0">Dados privados</text>
  <text x="250" y="248" text-anchor="middle" font-size="10" fill="#1565c0">Caixa de entrada · Documentos · Repositórios</text>

  <text x="550" y="230" text-anchor="middle" font-size="14" font-weight="700" fill="#e65100">Conteúdo não fidedigno</text>
  <text x="550" y="248" text-anchor="middle" font-size="10" fill="#e65100">web · RAG · e-mail</text>

  <text x="400" y="470" text-anchor="middle" font-size="14" font-weight="700" fill="#c62828">Comunicação externa</text>
  <text x="400" y="488" text-anchor="middle" font-size="10" fill="#c62828">markdown · obtenção de imagens · webhook</text>

  <!-- Center skull circle -->
  <circle cx="400" cy="310" r="55" fill="#6a1b9a" filter="url(#shadowT)" />
  <text x="400" y="305" text-anchor="middle" font-size="11" font-weight="700" fill="white">fatal</text>
  <text x="400" y="322" text-anchor="middle" font-size="11" font-weight="700" fill="white">trifecta</text>

  <!-- Example incident callouts -->
  <rect x="20" y="100" width="160" height="58" rx="6" fill="#f8f9fa" stroke="#1565c0" />
  <text x="100" y="120" text-anchor="middle" font-size="10" font-weight="600" fill="#1565c0">Vazamento de Eco</text>
  <text x="100" y="136" text-anchor="middle" font-size="9" fill="#555">Caixa de entrada + RAG de e-mail</text>
  <text x="100" y="150" text-anchor="middle" font-size="9" fill="#555">Carregamento da pré-visualização de equipas</text>

  <rect x="620" y="100" width="160" height="58" rx="6" fill="#f8f9fa" stroke="#e65100" />
  <text x="700" y="120" text-anchor="middle" font-size="10" font-weight="600" fill="#e65100">qualquer ferramenta semelhante ao Copilot</text>
  <text x="700" y="136" text-anchor="middle" font-size="9" fill="#555">Caixa de entrada · recuperação na web</text>
  <text x="700" y="150" text-anchor="middle" font-size="9" fill="#555">· qualquer canal de saída</text>

  <text x="400" y="605" text-anchor="middle" font-size="10" font-style="italic" fill="#888">Leia qualquer diagrama de arquitetura. Se tiver os três elementos, trata-se de uma trifeta.</text>
</svg>
