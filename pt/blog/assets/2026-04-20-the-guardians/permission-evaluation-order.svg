<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 795" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadowP" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1" />
    </filter>
    <marker id="arrowP" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555" />
    </marker>
    <marker id="arrowPgreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32" />
    </marker>
  </defs>

  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">Ordem de Avaliação de Permissões do Claude Code</text>
  <text x="450" y="50" text-anchor="middle" font-size="11" fill="#888">Cada chamada de ferramenta passa por seis etapas antes de ser executada. Os ganchos têm prioridade superior aos modos.</text>

  <!-- Start: tool call -->
  <rect x="340" y="75" width="220" height="46" rx="8" fill="#6a1b9a" filter="url(#shadowP)" />
  <text x="450" y="102" text-anchor="middle" font-size="13" font-weight="600" fill="white">O modelo emite uma chamada de ferramenta</text>
  <line x1="450" y1="121" x2="450" y2="143" stroke="#555" stroke-width="2" marker-end="url(#arrowP)" />

  <!-- Gate 1: Deny rules -->
  <rect x="200" y="148" width="500" height="54" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="2" filter="url(#shadowP)" />
  <text x="220" y="172" font-size="12" font-weight="700" fill="#c62828">1 · regras de negação (maxima prioridade)</text>
  <text x="220" y="190" font-size="10" fill="#555">Bloqueia mesmo sob bypassPermissions. Os caminhos protegidos (.git/, .claude/) encontram-se aqui.</text>
  <line x1="450" y1="202" x2="450" y2="223" stroke="#555" stroke-width="2" marker-end="url(#arrowP)" />

  <!-- Gate 2: Ask rules -->
  <rect x="200" y="228" width="500" height="54" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="2" filter="url(#shadowP)" />
  <text x="220" y="252" font-size="12" font-weight="700" fill="#e65100">2 · Perguntar sobre regras</text>
  <text x="220" y="270" font-size="10" fill="#555">Padrões que sempre exigem um prompt antes mesmo da camada de gancho ser executada.</text>
  <line x1="450" y1="282" x2="450" y2="303" stroke="#555" stroke-width="2" marker-end="url(#arrowP)" />

  <!-- Gate 3: PreToolUse Hooks -->
  <rect x="200" y="308" width="500" height="54" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" filter="url(#shadowP)" />
  <text x="220" y="332" font-size="12" font-weight="700" fill="#1565c0">3 · Ganchos de PreToolUse</text>
  <text x="220" y="350" font-size="10" fill="#555">permissionDecision: "deny" anula até mesmo bypassPermissions — os hooks têm prioridade sobre os modos.</text>
  <line x1="450" y1="362" x2="450" y2="383" stroke="#555" stroke-width="2" marker-end="url(#arrowP)" />

  <!-- Gate 4: Allow rules -->
  <rect x="200" y="388" width="500" height="54" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" filter="url(#shadowP)" />
  <text x="220" y="412" font-size="12" font-weight="700" fill="#2e7d32">4 · permitir regras</text>
  <text x="220" y="430" font-size="10" fill="#555">Padrões cujo espaço de trabalho é aprovado explicitamente. Ignore o pedido de modo.</text>
  <line x1="450" y1="442" x2="450" y2="463" stroke="#555" stroke-width="2" marker-end="url(#arrowP)" />

  <!-- Gate 5: Permission mode -->
  <rect x="200" y="468" width="500" height="54" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="2" filter="url(#shadowP)" />
  <text x="220" y="492" font-size="12" font-weight="700" fill="#e65100">5 · modo de permissão</text>
  <text x="220" y="510" font-size="10" fill="#555">Padrão · Aceitar edições · Plano · Automático · Contornar permissões · Não perguntar (seis predefinições)</text>
  <line x1="450" y1="522" x2="450" y2="543" stroke="#555" stroke-width="2" marker-end="url(#arrowP)" />

  <!-- Gate 6: canUseTool callback -->
  <rect x="200" y="548" width="500" height="54" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" filter="url(#shadowP)" />
  <text x="220" y="572" font-size="12" font-weight="700" fill="#6a1b9a">6 · Callback canUseTool</text>
  <text x="220" y="590" font-size="10" fill="#555">Veto programático dentro do SDK — última oportunidade para intercetar antes da execução.</text>
  <line x1="450" y1="602" x2="450" y2="645" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowPgreen)" />

  <!-- Execute -->
  <rect x="340" y="650" width="220" height="42" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" filter="url(#shadowP)" />
  <text x="450" y="676" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Executar ferramenta</text>

  <!-- Side notes -->
  <rect x="720" y="150" width="170" height="42" rx="8" fill="#f8f9fa" stroke="#c62828" stroke-width="1" />
  <text x="805" y="170" text-anchor="middle" font-size="10" font-weight="600" fill="#c62828">negar → rejeitado</text>
  <text x="805" y="185" text-anchor="middle" font-size="9" fill="#555">sempre, sem exceções</text>

  <rect x="720" y="230" width="170" height="42" rx="8" fill="#f8f9fa" stroke="#e65100" stroke-width="1" />
  <text x="805" y="250" text-anchor="middle" font-size="10" font-weight="600" fill="#e65100">pedir → interativo</text>
  <text x="805" y="265" text-anchor="middle" font-size="9" fill="#555">exige sempre a intervenção do utilizador</text>

  <rect x="720" y="310" width="170" height="42" rx="8" fill="#f8f9fa" stroke="#1565c0" stroke-width="1" />
  <text x="805" y="330" text-anchor="middle" font-size="10" font-weight="600" fill="#1565c0">Ganchos &gt; Modos</text>
  <text x="805" y="345" text-anchor="middle" font-size="9" fill="#555">a verdadeira rede de segurança</text>

  <rect x="720" y="390" width="170" height="42" rx="8" fill="#f8f9fa" stroke="#2e7d32" stroke-width="1" />
  <text x="805" y="410" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">permitir → atalho</text>
  <text x="805" y="425" text-anchor="middle" font-size="9" fill="#555">pular o modo</text>

  <rect x="720" y="470" width="170" height="42" rx="8" fill="#f8f9fa" stroke="#e65100" stroke-width="1" />
  <text x="805" y="490" text-anchor="middle" font-size="10" font-weight="600" fill="#e65100">modo: resposta predefinida</text>
  <text x="805" y="505" text-anchor="middle" font-size="9" fill="#555">um preset de cada vez</text>

  <rect x="720" y="550" width="170" height="42" rx="8" fill="#f8f9fa" stroke="#6a1b9a" stroke-width="1" />
  <text x="805" y="570" text-anchor="middle" font-size="10" font-weight="600" fill="#6a1b9a">Veto a nível de SDK</text>
  <text x="805" y="585" text-anchor="middle" font-size="9" fill="#555">executa-se no código da sua aplicação</text>

  <text x="450" y="720" text-anchor="middle" font-size="9" font-style="italic" fill="#888">Fonte: code.claude.com/docs/en/permission-modes</text>
  <text x="450" y="745" text-anchor="middle" font-size="11" fill="#1a1a2e" font-weight="600">A permissão é uma infraestrutura, não um prompt.</text>
</svg>
