<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadowG" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1" />
    </filter>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555" />
    </marker>
  </defs>

  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">Duas Camadas, Duas Questões</text>
  <text x="450" y="50" text-anchor="middle" font-size="11" fill="#888">Guardrails de LLM envolvem uma chamada ao modelo. Guardiões de agente envolvem o ciclo.</text>

  <!-- LEFT: LLM guardrail layer -->
  <rect x="30" y="80" width="400" height="450" rx="12" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" />
  <text x="230" y="108" text-anchor="middle" font-size="14" font-weight="700" fill="#6a1b9a">Guardrail de LLM</text>
  <text x="230" y="126" text-anchor="middle" font-size="10" font-style="italic" fill="#6a1b9a">"o modelo está a produzir a coisa certa?"</text>

  <!-- input -->
  <rect x="70" y="150" width="320" height="44" rx="6" fill="#e3f2fd" stroke="#1565c0" />
  <text x="230" y="177" text-anchor="middle" font-size="12" fill="#1565c0">entrada do utilizador</text>
  <line x1="230" y1="195" x2="230" y2="215" stroke="#555" stroke-width="2" marker-end="url(#arrowG)" />

  <!-- input filter -->
  <rect x="90" y="220" width="280" height="40" rx="6" fill="#fff3e0" stroke="#e65100" />
  <text x="230" y="245" text-anchor="middle" font-size="11" font-weight="600" fill="#e65100">filtro de entrada · PII · jailbreak · tema</text>
  <line x1="230" y1="260" x2="230" y2="280" stroke="#555" stroke-width="2" marker-end="url(#arrowG)" />

  <!-- MODEL -->
  <rect x="110" y="285" width="240" height="46" rx="8" fill="#6a1b9a" filter="url(#shadowG)" />
  <text x="230" y="313" text-anchor="middle" font-size="13" font-weight="700" fill="white">LLM</text>
  <line x1="230" y1="331" x2="230" y2="350" stroke="#555" stroke-width="2" marker-end="url(#arrowG)" />

  <!-- output filter -->
  <rect x="90" y="355" width="280" height="40" rx="6" fill="#fff3e0" stroke="#e65100" />
  <text x="230" y="380" text-anchor="middle" font-size="11" font-weight="600" fill="#e65100">filtro de saída · toxicidade · PII · alucinação</text>
  <line x1="230" y1="395" x2="230" y2="415" stroke="#555" stroke-width="2" marker-end="url(#arrowG)" />

  <!-- reply -->
  <rect x="70" y="420" width="320" height="40" rx="6" fill="#e8f5e9" stroke="#2e7d32" />
  <text x="230" y="444" text-anchor="middle" font-size="12" fill="#2e7d32">resposta ao utilizador</text>

  <text x="230" y="490" text-anchor="middle" font-size="10" fill="#555" font-style="italic">protege as duas extremidades</text>
  <text x="230" y="506" text-anchor="middle" font-size="10" fill="#555" font-style="italic">de uma conclusão</text>
  <text x="230" y="522" text-anchor="middle" font-size="9" fill="#c62828" font-weight="600">não vê o ciclo de ferramentas</text>

  <!-- RIGHT: Agent guardian layer -->
  <rect x="470" y="80" width="400" height="450" rx="12" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" />
  <text x="670" y="108" text-anchor="middle" font-size="14" font-weight="700" fill="#1565c0">Guardião de agente</text>
  <text x="670" y="126" text-anchor="middle" font-size="10" font-style="italic" fill="#1565c0">"o sistema está a fazer a coisa certa?"</text>

  <!-- model node inside loop -->
  <rect x="550" y="150" width="240" height="40" rx="6" fill="#6a1b9a" />
  <text x="670" y="175" text-anchor="middle" font-size="11" font-weight="600" fill="white">LLM · pensa na chamada à ferramenta</text>
  <line x1="670" y1="190" x2="670" y2="210" stroke="#555" stroke-width="2" marker-end="url(#arrowG)" />

  <!-- Permission ladder: deny → hooks → mode → callback -->
  <rect x="510" y="215" width="320" height="40" rx="6" fill="#fce4ec" stroke="#c62828" />
  <text x="670" y="239" text-anchor="middle" font-size="11" font-weight="700" fill="#c62828">regras de negação · hooks · modo · callback</text>
  <line x1="670" y1="255" x2="670" y2="275" stroke="#555" stroke-width="2" marker-end="url(#arrowG)" />

  <!-- OS sandbox -->
  <rect x="510" y="280" width="320" height="40" rx="6" fill="#fff3e0" stroke="#e65100" />
  <text x="670" y="304" text-anchor="middle" font-size="11" font-weight="700" fill="#e65100">sandbox do OS · Seatbelt / Landlock / ACL</text>
  <line x1="670" y1="320" x2="670" y2="340" stroke="#555" stroke-width="2" marker-end="url(#arrowG)" />

  <!-- tool call -->
  <rect x="510" y="345" width="320" height="40" rx="6" fill="#e8f5e9" stroke="#2e7d32" />
  <text x="670" y="369" text-anchor="middle" font-size="11" font-weight="700" fill="#2e7d32">ferramenta executa · observação retorna</text>
  <line x1="670" y1="385" x2="670" y2="405" stroke="#555" stroke-width="2" marker-end="url(#arrowG)" />

  <!-- HITL checkpoint -->
  <rect x="510" y="410" width="320" height="40" rx="6" fill="#f3e5f5" stroke="#6a1b9a" />
  <text x="670" y="434" text-anchor="middle" font-size="11" font-weight="700" fill="#6a1b9a">interrupt() · humano no ciclo</text>

  <!-- loop arrow back -->
  <path d="M 510 430 Q 470 430 470 300 Q 470 170 550 170" fill="none" stroke="#1565c0" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowG)" />
  <text x="464" y="302" text-anchor="middle" font-size="9" fill="#1565c0" font-weight="600" transform="rotate(-90 464 302)">ciclo</text>

  <text x="670" y="480" text-anchor="middle" font-size="10" fill="#555" font-style="italic">protege cada chamada de ferramenta</text>
  <text x="670" y="496" text-anchor="middle" font-size="10" fill="#555" font-style="italic">ao longo de toda a execução</text>
  <text x="670" y="512" text-anchor="middle" font-size="9" fill="#2e7d32" font-weight="600">vê o que o agente faz</text>

  <text x="450" y="550" text-anchor="middle" font-size="10" font-style="italic" fill="#888">Ambas as camadas são necessárias. Nenhuma substitui a outra.</text>
</svg>
