<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Training Pipeline" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Treinamento Pipeline</title>
  <defs>
    <marker id="arrow5" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b" />
    </marker>
    <marker id="arrow5b" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#166534" />
    </marker>
    <filter id="shadow5" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="900" height="420" fill="#f8fafc" rx="8" />

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">LLM treino pipeline: do pré-treino à alinhamento</text>

  <!-- Stage 1: Pretraining -->
  <rect x="30" y="60" width="200" height="170" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow5)" />
  <text x="130" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#1d4ed8">Pré-treinamento</text>

  <rect x="50" y="95" width="160" height="55" rx="5" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text x="130" y="112" text-anchor="middle" font-size="10" fill="#0f172a">Previsão do próximo token</text>
  <text x="130" y="126" text-anchor="middle" font-size="10" fill="#0f172a">Triliões de tokens</text>
  <text x="130" y="140" text-anchor="middle" font-size="10" fill="#334155">Auto-supervisionado</text>

  <text x="50" y="170" font-size="10" fill="#0f172a">Escala: modelo e dependente de dataset</text>
  <text x="50" y="185" font-size="10" fill="#0f172a">Medir tokens, FLOPs e utilização</text>
  <text x="50" y="200" font-size="10" fill="#1d4ed8" font-weight="bold">ZeRO + FSDP + precisão mista</text>
  <text x="50" y="215" font-size="9" fill="#334155">Escolher tokens por parâmetro para o custo ao longo do ciclo de vida</text>

  <!-- Arrow 1→2 -->
  <line x1="230" y1="145" x2="275" y2="145" stroke="#334155" stroke-width="2" marker-end="url(#arrow5)" />

  <!-- Stage 2: SFT -->
  <rect x="275" y="60" width="180" height="170" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadow5)" />
  <text x="365" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#9a3412">Fine-tuning (SFT)</text>

  <rect x="295" y="95" width="140" height="55" rx="5" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text x="365" y="112" text-anchor="middle" font-size="10" fill="#0f172a">Dados específicos da tarefa</text>
  <text x="365" y="126" text-anchor="middle" font-size="10" fill="#0f172a">Exemplos rotulados</text>
  <text x="365" y="140" text-anchor="middle" font-size="10" fill="#334155">Supervisionado</text>

  <text x="295" y="170" font-size="10" fill="#0f172a">Escala: dependente da tarefa e do método</text>
  <text x="295" y="185" font-size="10" fill="#0f172a">Avaliar a qualidade em comparação com o modelo de referência</text>
  <text x="295" y="200" font-size="10" fill="#9a3412" font-weight="bold">LoRA / QLoRA (menos parâmetros treináveis)</text>
  <text x="295" y="215" font-size="9" fill="#334155">A memória depende do modelo, do rank e do otimizador</text>

  <!-- Arrow 2→3 -->
  <line x1="455" y1="145" x2="500" y2="145" stroke="#334155" stroke-width="2" marker-end="url(#arrow5)" />

  <!-- Stage 3: Alignment (branching) -->
  <rect x="500" y="60" width="380" height="170" rx="10" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow5)" />
  <text x="690" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#5b21b6">Alinhamento</text>

  <!-- RLHF branch -->
  <rect x="520" y="95" width="155" height="65" rx="5" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text x="597" y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6">RLHF / PPO</text>
  <text x="597" y="127" text-anchor="middle" font-size="9" fill="#0f172a">Modelo de recompensa + RL</text>
  <text x="597" y="141" text-anchor="middle" font-size="9" fill="#991b1b">Política, referência, recompensa, crítico</text>
  <text x="597" y="153" text-anchor="middle" font-size="9" fill="#334155">Complexo, sensível a hiperparâmetros</text>

  <!-- DPO branch -->
  <rect x="690" y="95" width="80" height="65" rx="5" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text x="730" y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6">DPO</text>
  <text x="730" y="127" text-anchor="middle" font-size="9" fill="#0f172a">Não é necessário RL</text>
  <text x="730" y="141" text-anchor="middle" font-size="9" fill="#166534">Perda de preferência direta</text>
  <text x="730" y="153" text-anchor="middle" font-size="9" fill="#334155">Apenas offline</text>

  <!-- GRPO branch -->
  <rect x="785" y="95" width="80" height="65" rx="5" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text x="825" y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6">GRPO</text>
  <text x="825" y="127" text-anchor="middle" font-size="9" fill="#0f172a">Nenhum modelo crítico</text>
  <text x="825" y="141" text-anchor="middle" font-size="9" fill="#166534">Recompensas relativas ao grupo</text>
  <text x="825" y="153" text-anchor="middle" font-size="9" fill="#334155">DeepSeek-R1</text>

  <text x="520" y="185" font-size="10" fill="#0f172a">Dados de preferência humano/AI</text>
  <text x="520" y="200" font-size="10" fill="#0f172a">RLVR: recompensas baseadas em regras (matemática, código)</text>
  <text x="520" y="215" font-size="10" fill="#5b21b6" font-weight="bold">Escolha com base em restrições de dados, recompensas, exploração e memória</text>

  <!-- Distillation path -->
  <rect x="30" y="270" width="850" height="130" rx="10" fill="#f0fdf4" stroke="#166534" stroke-width="2" filter="url(#shadow5)" />
  <text x="455" y="295" text-anchor="middle" font-size="15" font-weight="bold" fill="#166534">Destilação e dados sintéticos</text>

  <!-- Teacher → Student flow -->
  <rect x="60" y="310" width="180" height="45" rx="5" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text x="150" y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">Professor de grande porte</text>
  <text x="150" y="345" text-anchor="middle" font-size="10" fill="#0f172a">DeepSeek-R1 (671B)</text>

  <line x1="240" y1="332" x2="305" y2="332" stroke="#166534" stroke-width="2" marker-end="url(#arrow5b)" />
  <text x="272" y="325" text-anchor="middle" font-size="9" fill="#166534">800K CoT</text>
  <text x="272" y="350" text-anchor="middle" font-size="9" fill="#166534">exemplos</text>

  <rect x="305" y="310" width="170" height="45" rx="5" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text x="390" y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">Estudante compacto</text>
  <text x="390" y="345" text-anchor="middle" font-size="10" fill="#0f172a">Modelos destilados de 1,5B → 70B parâmetros</text>

  <!-- Results -->
  <rect x="510" y="310" width="350" height="70" rx="5" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text x="685" y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">Resultados</text>
  <text x="530" y="347" font-size="10" fill="#0f172a">• O DeepSeek-R1 apresenta resultados robustos após destilação em escala de 32 bilhões de parâmetros</text>
  <text x="530" y="362" font-size="10" fill="#0f172a">• Nos seus testes, a destilação superou o RL direto em modelos pequenos</text>
  <text x="530" y="377" font-size="10" fill="#166534" font-weight="bold">• Reavaliar em função da tarefa-alvo e do orçamento serving</text>

  <!-- Connection from alignment to distillation -->
  <path d="M690,230 L690,250 L455,250 L455,270" stroke="#166534" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow5b)" />
  <text x="580" y="248" font-size="9" fill="#166534">Professor alinhado gera dados de treino</text>
</svg>
