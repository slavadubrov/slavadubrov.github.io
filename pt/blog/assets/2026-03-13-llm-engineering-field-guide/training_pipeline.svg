<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrow5" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
    <marker id="arrow5b" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2e7d32" />
    </marker>
    <filter id="shadow5" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1" />
    </filter>
  </defs>

  <rect width="900" height="420" fill="#fafbfc" rx="8" />

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">Pipeline de Treino de LLM: Do Pré-treino à Alinhamento</text>

  <!-- Stage 1: Pretraining -->
  <rect x="30" y="60" width="200" height="170" rx="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" filter="url(#shadow5)" />
  <text x="130" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565c0">Pré-treinamento</text>

  <rect x="50" y="95" width="160" height="55" rx="5" fill="#fff" stroke="#1565c0" stroke-width="1" />
  <text x="130" y="112" text-anchor="middle" font-size="10" fill="#333">Previsão do próximo token</text>
  <text x="130" y="126" text-anchor="middle" font-size="10" fill="#333">Triliões de tokens</text>
  <text x="130" y="140" text-anchor="middle" font-size="10" fill="#666">Auto-supervisionado</text>

  <text x="50" y="170" font-size="10" fill="#333">Custo: 500 mil–100 milhões+ de dólares</text>
  <text x="50" y="185" font-size="10" fill="#333">Computação: 10²⁴–10²⁶ FLOPs</text>
  <text x="50" y="200" font-size="10" fill="#1565c0" font-weight="bold">ZeRO + FSDP + Precisão Mista</text>
  <text x="50" y="215" font-size="9" fill="#666">Chinchilla → Sobretreinar modelos pequenos</text>

  <!-- Arrow 1→2 -->
  <line x1="230" y1="145" x2="275" y2="145" stroke="#333" stroke-width="2" marker-end="url(#arrow5)" />

  <!-- Stage 2: SFT -->
  <rect x="275" y="60" width="180" height="170" rx="10" fill="#fff3e0" stroke="#e65100" stroke-width="2" filter="url(#shadow5)" />
  <text x="365" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">Ajuste fino (SFT)</text>

  <rect x="295" y="95" width="140" height="55" rx="5" fill="#fff" stroke="#e65100" stroke-width="1" />
  <text x="365" y="112" text-anchor="middle" font-size="10" fill="#333">Dados específicos da tarefa</text>
  <text x="365" y="126" text-anchor="middle" font-size="10" fill="#333">Exemplos rotulados</text>
  <text x="365" y="140" text-anchor="middle" font-size="10" fill="#666">Supervisionado</text>

  <text x="295" y="170" font-size="10" fill="#333">Custo: 100–10.000 USD</text>
  <text x="295" y="185" font-size="10" fill="#333">Processamento: 10¹⁸–10²¹ FLOPs</text>
  <text x="295" y="200" font-size="10" fill="#e65100" font-weight="bold">LoRA / QLoRA (10.000× menos parâmetros)</text>
  <text x="295" y="215" font-size="9" fill="#666">65B em uma única GPU de 48GB</text>

  <!-- Arrow 2→3 -->
  <line x1="455" y1="145" x2="500" y2="145" stroke="#333" stroke-width="2" marker-end="url(#arrow5)" />

  <!-- Stage 3: Alignment (branching) -->
  <rect x="500" y="60" width="380" height="170" rx="10" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" filter="url(#shadow5)" />
  <text x="690" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#6a1b9a">Alinhamento</text>

  <!-- RLHF branch -->
  <rect x="520" y="95" width="155" height="65" rx="5" fill="#fff" stroke="#6a1b9a" stroke-width="1" />
  <text x="597" y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#6a1b9a">RLHF / PPO</text>
  <text x="597" y="127" text-anchor="middle" font-size="9" fill="#333">Modelo de recompensa + RL</text>
  <text x="597" y="141" text-anchor="middle" font-size="9" fill="#c62828">4 cópias do modelo em memória</text>
  <text x="597" y="153" text-anchor="middle" font-size="9" fill="#666">Complexo, sensível a hiperparâmetros</text>

  <!-- DPO branch -->
  <rect x="690" y="95" width="80" height="65" rx="5" fill="#fff" stroke="#6a1b9a" stroke-width="1" />
  <text x="730" y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#6a1b9a">Responsável pela Proteção de Dados</text>
  <text x="730" y="127" text-anchor="middle" font-size="9" fill="#333">Não é necessário RL</text>
  <text x="730" y="141" text-anchor="middle" font-size="9" fill="#2e7d32">Mais simples, mais estável</text>
  <text x="730" y="153" text-anchor="middle" font-size="9" fill="#666">Apenas offline</text>

  <!-- GRPO branch -->
  <rect x="785" y="95" width="80" height="65" rx="5" fill="#fff" stroke="#6a1b9a" stroke-width="1" />
  <text x="825" y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#6a1b9a">GRUPO</text>
  <text x="825" y="127" text-anchor="middle" font-size="9" fill="#333">Não existe modelo de crítica</text>
  <text x="825" y="141" text-anchor="middle" font-size="9" fill="#2e7d32">Apenas 2 cópias de LLM</text>
  <text x="825" y="153" text-anchor="middle" font-size="9" fill="#666">DeepSeek-R1</text>

  <text x="520" y="185" font-size="10" fill="#333">Dados de preferências humano/IA</text>
  <text x="520" y="200" font-size="10" fill="#333">RLVR: recompensas baseadas em regras (matemática, código)</text>
  <text x="520" y="215" font-size="10" fill="#6a1b9a" font-weight="bold">Tendência: PPO → DPO → GRPO (vitórias mais simples)</text>

  <!-- Distillation path -->
  <rect x="30" y="270" width="850" height="130" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" filter="url(#shadow5)" />
  <text x="455" y="295" text-anchor="middle" font-size="15" font-weight="bold" fill="#2e7d32">Destilação e Dados Sintéticos</text>

  <!-- Teacher → Student flow -->
  <rect x="60" y="310" width="180" height="45" rx="5" fill="#fff" stroke="#2e7d32" stroke-width="1" />
  <text x="150" y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">Professor Principal</text>
  <text x="150" y="345" text-anchor="middle" font-size="10" fill="#333">DeepSeek-R1 (671B)</text>

  <line x1="240" y1="332" x2="305" y2="332" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrow5b)" />
  <text x="272" y="325" text-anchor="middle" font-size="9" fill="#2e7d32">CoT de 800K</text>
  <text x="272" y="350" text-anchor="middle" font-size="9" fill="#2e7d32">exemplos</text>

  <rect x="305" y="310" width="170" height="45" rx="5" fill="#fff" stroke="#2e7d32" stroke-width="1" />
  <text x="390" y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">Estudante Compacto</text>
  <text x="390" y="345" text-anchor="middle" font-size="10" fill="#333">Modelos distilados de 1,5B → 70B</text>

  <!-- Results -->
  <rect x="510" y="310" width="350" height="70" rx="5" fill="#fff" stroke="#2e7d32" stroke-width="1" />
  <text x="685" y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">Resultados</text>
  <text x="530" y="347" font-size="10" fill="#333">• 32B de padrões de batida distilados do OpenAI o1-mini</text>
  <text x="530" y="362" font-size="10" fill="#333">• Destilação &gt; RL direto em modelos pequenos</text>
  <text x="530" y="377" font-size="10" fill="#2e7d32" font-weight="bold">• Caminho mais eficiente para raciocínio compacto</text>

  <!-- Connection from alignment to distillation -->
  <path d="M690,230 L690,250 L455,250 L455,270" stroke="#2e7d32" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow5b)" />
  <text x="580" y="248" font-size="9" fill="#2e7d32">O professor alinhado gera dados de treino</text>
</svg>
