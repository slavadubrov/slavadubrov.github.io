<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Parallelism Strategies" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Estratégias de Paralelismo</title>
  <defs>
    <marker id="arrow4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#334155" />
    </marker>
    <filter id="shadow4" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="900" height="520" fill="#f8fafc" rx="8" />

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">Quatro formas de paralelismo</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#334155">Como distribuir o cálculo de LLM entre vários GPUs</text>

  <!-- TP: Tensor Parallelism -->
  <rect x="30" y="75" width="410" height="190" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow4)" />
  <text x="235" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#1d4ed8">Paralelismo de tensores (PT)</text>
  <text x="235" y="118" text-anchor="middle" font-size="11" fill="#334155">Distribuir as matrizes de peso entre GPUs</text>

  <!-- Weight matrix split -->
  <rect x="60" y="130" width="160" height="50" rx="4" fill="#2563eb" opacity="0.7" />
  <text x="140" y="160" text-anchor="middle" font-size="11" fill="#ffffff">Matriz de Peso W</text>
  <line x1="220" y1="155" x2="250" y2="155" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow4)" />
  <!-- Split parts -->
  <rect x="250" y="130" width="80" height="24" rx="3" fill="#2563eb" />
  <text x="290" y="147" text-anchor="middle" font-size="9" fill="#ffffff">W₁ → GPU 0</text>
  <rect x="250" y="157" width="80" height="24" rx="3" fill="#2563eb" />
  <text x="290" y="174" text-anchor="middle" font-size="9" fill="#ffffff">W₂ → GPU 1</text>

  <text x="60" y="205" font-size="10" fill="#0f172a">• All-reduce após cada camada</text>
  <text x="60" y="220" font-size="10" fill="#0f172a">• Requer NVLink (900 GB/s no H100)</text>
  <text x="60" y="235" font-size="10" fill="#0f172a">• Geralmente mantido dentro de um nó com ligação rápida</text>
  <text x="60" y="250" font-size="10" fill="#1d4ed8" font-weight="bold">• Substitui a comunicação por um menor esforço do dispositivo</text>

  <!-- PP: Pipeline Parallelism -->
  <rect x="460" y="75" width="410" height="190" rx="10" fill="#f0fdf4" stroke="#166534" stroke-width="2" filter="url(#shadow4)" />
  <text x="665" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#166534">Pipeline paralelismo (PP)</text>
  <text x="665" y="118" text-anchor="middle" font-size="11" fill="#334155">Dividir as camadas sequencialmente em GPUs</text>

  <!-- Pipeline stages -->
  <rect x="490" y="132" width="75" height="40" rx="4" fill="#166534" />
  <text x="527" y="147" text-anchor="middle" font-size="9" fill="#ffffff">Camadas 1-20</text>
  <text x="527" y="160" text-anchor="middle" font-size="9" fill="#16a34a">GPU 0</text>
  <line x1="565" y1="152" x2="585" y2="152" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow4)" />
  <rect x="585" y="132" width="75" height="40" rx="4" fill="#16a34a" />
  <text x="622" y="147" text-anchor="middle" font-size="9" fill="#ffffff">Camadas 21-40</text>
  <text x="622" y="160" text-anchor="middle" font-size="9" fill="#16a34a">GPU 1</text>
  <line x1="660" y1="152" x2="680" y2="152" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow4)" />
  <rect x="680" y="132" width="75" height="40" rx="4" fill="#16a34a" />
  <text x="717" y="147" text-anchor="middle" font-size="9" fill="#ffffff">Camadas 41-60</text>
  <text x="717" y="160" text-anchor="middle" font-size="9" fill="#ffffff">GPU 2</text>

  <text x="490" y="200" font-size="10" fill="#0f172a">• Transmite ativações entre as fases</text>
  <text x="490" y="215" font-size="10" fill="#0f172a">• Pode abranger nós; tráfego de ativação de perfil</text>
  <text x="490" y="230" font-size="10" fill="#0f172a">• bolhas Pipeline (GPU tempo ocioso)</text>
  <text x="490" y="245" font-size="10" fill="#166534" font-weight="bold">• Geralmente combinado com TP dentro de cada nó</text>

  <!-- DP: Data Parallelism -->
  <rect x="30" y="285" width="410" height="190" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadow4)" />
  <text x="235" y="310" text-anchor="middle" font-size="15" font-weight="bold" fill="#9a3412">Paralelismo de dados (PD)</text>
  <text x="235" y="328" text-anchor="middle" font-size="11" fill="#334155">Reproduzir o modelo completo em cada GPU</text>

  <!-- Replicated models -->
  <rect x="70" y="342" width="90" height="45" rx="4" fill="#ea580c" />
  <text x="115" y="362" text-anchor="middle" font-size="9" fill="#ffffff">Modelo Completo</text>
  <text x="115" y="378" text-anchor="middle" font-size="9" fill="#ea580c">GPU 0 → Lote A</text>
  <rect x="175" y="342" width="90" height="45" rx="4" fill="#ea580c" />
  <text x="220" y="362" text-anchor="middle" font-size="9" fill="#ffffff">Modelo Completo</text>
  <text x="220" y="378" text-anchor="middle" font-size="9" fill="#ea580c">GPU 1 → Lote B</text>
  <rect x="280" y="342" width="90" height="45" rx="4" fill="#ea580c" />
  <text x="325" y="362" text-anchor="middle" font-size="9" fill="#ffffff">Modelo Completo</text>
  <text x="325" y="378" text-anchor="middle" font-size="9" fill="#ea580c">GPU 2 → Lote C</text>

  <text x="60" y="413" font-size="10" fill="#0f172a">• Sem comunicação inter-GPU durante a inferência</text>
  <text x="60" y="428" font-size="10" fill="#0f172a">• Eficiente quando o modelo cabe por réplica</text>
  <text x="60" y="443" font-size="10" fill="#0f172a">• Para treino: combinado com ZeRO sharding</text>
  <text x="60" y="458" font-size="10" fill="#9a3412" font-weight="bold">• Medir o equilíbrio de carga e a utilização das réplicas</text>

  <!-- EP: Expert Parallelism -->
  <rect x="460" y="285" width="410" height="190" rx="10" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow4)" />
  <text x="665" y="310" text-anchor="middle" font-size="15" font-weight="bold" fill="#5b21b6">Paralelismo especializado (PE)</text>
  <text x="665" y="328" text-anchor="middle" font-size="11" fill="#334155">Distribuir especialistas em MoE por todo o GPUs</text>

  <!-- Router + experts -->
  <rect x="575" y="340" width="80" height="30" rx="4" fill="#7c3aed" />
  <text x="615" y="360" text-anchor="middle" font-size="10" fill="#ffffff">Roteador</text>

  <!-- Expert boxes -->
  <line x1="593" y1="370" x2="517" y2="385" stroke="#7c3aed" stroke-width="1" />
  <line x1="605" y1="370" x2="582" y2="385" stroke="#7c3aed" stroke-width="1" />
  <line x1="625" y1="370" x2="707" y2="385" stroke="#7c3aed" stroke-width="1" />
  <line x1="637" y1="370" x2="772" y2="385" stroke="#7c3aed" stroke-width="1" />

  <rect x="490" y="385" width="55" height="24" rx="3" fill="#7c3aed" />
  <text x="517" y="401" text-anchor="middle" font-size="9" fill="#ffffff">GPU E1</text>
  <rect x="555" y="385" width="55" height="24" rx="3" fill="#7c3aed" />
  <text x="582" y="401" text-anchor="middle" font-size="9" fill="#ffffff">GPU E2</text>
  <rect x="680" y="385" width="55" height="24" rx="3" fill="#7c3aed" />
  <text x="707" y="401" text-anchor="middle" font-size="9" fill="#ffffff">GPU1 E3</text>
  <rect x="745" y="385" width="55" height="24" rx="3" fill="#7c3aed" />
  <text x="772" y="401" text-anchor="middle" font-size="9" fill="#ffffff">GPU1 da E4</text>

  <text x="490" y="433" font-size="10" fill="#0f172a">• Comunicação ponto-a-ponto para roteamento de tokens</text>
  <text x="490" y="448" font-size="10" fill="#0f172a">• Sensível ao equilíbrio e à topologia especializada</text>
  <text x="490" y="463" font-size="10" fill="#5b21b6" font-weight="bold">• Analisar o tráfego all-to-all em condições de roteamento reais</text>

  <!-- Decision framework at bottom -->
  <rect x="30" y="488" width="840" height="25" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1" />
  <text x="450" y="505" text-anchor="middle" font-size="11" fill="#1d4ed8" font-weight="bold">Iniciar apenas com heurística: validar memória, comunicação, taxa de transferência e latência no cluster alvo</text>
</svg>
