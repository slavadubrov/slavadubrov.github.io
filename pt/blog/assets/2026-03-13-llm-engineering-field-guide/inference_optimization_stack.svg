<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Inter, system-ui, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Stack de Otimização de Inferência</title>
  <desc id="artifact-desc">Stack de Otimização de Inferência.</desc>
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
    <filter id="shadow1" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="900" height="520" fill="#f8fafc" rx="8" />

  <!-- Title -->
  <text y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a" x="450">Stack de Otimização de Inferência</text>
  <text y="55" text-anchor="middle" font-size="12" fill="#334155" x="450">Como as técnicas se combinam para fornecer um serviço de LLM de nível de produção</text>

  <!-- Layer 1: Hardware Foundation -->
  <rect x="50" y="420" width="800" height="70" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow1)" />
  <text y="448" font-size="13" font-weight="bold" fill="#1d4ed8" x="80">Fundamentos de Hardware</text>
  <text y="468" font-size="11" fill="#0f172a" x="80">Hierarquia de Memória da GPU: HBM3 (3,35 TB/s) → L2 (12 TB/s) → SRAM (33 TB/s)</text>
  <text y="483" font-size="10" fill="#334155" x="80">A diferença de largura de banda de 10× entre SRAM e HBM impulsiona todas as otimizações acima</text>

  <!-- Layer 2: Kernel Optimizations -->
  <rect x="50" y="330" width="380" height="75" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadow1)" />
  <text y="355" font-size="13" font-weight="bold" fill="#166534" x="70">Otimizações do Kernel</text>
  <text y="373" font-size="11" fill="#0f172a" x="70">FlashAttention (tiling em SRAM)</text>
  <text y="388" font-size="11" fill="#0f172a" x="70">Núcleos fundidos (eliminação de viagens de ida e volta com HBM)</text>
  <text y="398" font-size="10" fill="#334155" x="70">Utilização da GPU de 80-90%</text>

  <rect x="450" y="330" width="400" height="75" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadow1)" />
  <text y="355" font-size="13" font-weight="bold" fill="#9a3412" x="470">Quantização</text>
  <text y="373" font-size="11" fill="#0f172a" x="470">FP8 (sem perdas), INT8, INT4 (AWQ/GPTQ)</text>
  <text y="388" font-size="11" fill="#0f172a" x="470">Qualidade do kernel: diferença de velocidade de 2,6×</text>
  <text y="398" font-size="10" fill="#334155" x="470">Redução de 50-75% na memória utilizada</text>

  <!-- Layer 3: Memory Management -->
  <rect x="50" y="240" width="380" height="75" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow1)" />
  <text y="265" font-size="13" font-weight="bold" fill="#5b21b6" x="70">Gestão de Memória</text>
  <text y="283" font-size="11" fill="#0f172a" x="70">PagedAttention (&lt;4% de desperdício vs 60-80%)</text>
  <text y="298" font-size="11" fill="#0f172a" x="70">GQA/MQA (redução de cache de 8-16× KV)</text>
  <text y="308" font-size="10" fill="#334155" x="70">Melhoria de 2-4× na taxa de transferência</text>

  <rect x="450" y="240" width="400" height="75" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow1)" />
  <text y="265" font-size="13" font-weight="bold" fill="#5b21b6" x="470">Agendamento</text>
  <text y="283" font-size="11" fill="#0f172a" x="470">Batching Contínuo (a nível de iteração)</text>
  <text y="298" font-size="11" fill="#0f172a" x="470">Preenchimento em blocos (+50% de taxa de transferência)</text>
  <text y="308" font-size="10" fill="#334155" x="470">23× em comparação com agrupamento ingénuo</text>

  <!-- Layer 4: Serving Strategies -->
  <rect x="50" y="150" width="250" height="75" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow1)" />
  <text y="175" font-size="13" font-weight="bold" fill="#1d4ed8" x="70">Armazenamento em cache</text>
  <text y="193" font-size="11" fill="#0f172a" x="70">Cache de Prefixos (taxa de sucesso de 87%+)</text>
  <text y="208" font-size="11" fill="#0f172a" x="70">RadixAttention (5× de taxa de processamento)</text>

  <rect x="320" y="150" width="260" height="75" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow1)" />
  <text y="175" font-size="13" font-weight="bold" fill="#1d4ed8" x="340">Especulação</text>
  <text y="193" font-size="11" fill="#0f172a" x="340">Decodificação Especulativa (1,5–3×)</text>
  <text y="208" font-size="11" fill="#0f172a" x="340">EAGLE-3 (aceleração de 3 a 6,5 vezes)</text>

  <rect x="600" y="150" width="250" height="75" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow1)" />
  <text y="175" font-size="13" font-weight="bold" fill="#1d4ed8" x="620">Paralelismo</text>
  <text y="193" font-size="11" fill="#0f172a" x="620">TP (intrノード, NVLink)</text>
  <text y="208" font-size="11" fill="#0f172a" x="620">PP (entre nós) + DP (escalação)</text>

  <!-- Layer 5: Application Layer -->
  <rect x="50" y="70" width="800" height="65" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#shadow1)" />
  <text y="95" font-size="13" font-weight="bold" fill="#991b1b" x="80">Camada de Aplicação</text>
  <text y="113" font-size="11" fill="#0f172a" x="80">Roteamento de Modelos (redução de custos de 85%) · Limitação de Taxas (baseada em tokens) · Monitorização (goodput, utilização de KV, TTFT/TPOT)</text>
  <text y="128" font-size="10" fill="#334155" x="80">O custo diminui 10 vezes por ano — a aplicação cumulativa de otimizações gera vantagens exponenciais</text>

  <!-- Connecting arrows -->
  <line x1="240" y1="420" x2="240" y2="405" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow1)" />
  <line x1="650" y1="420" x2="650" y2="405" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow1)" />
  <line x1="240" y1="330" x2="240" y2="315" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow1)" />
  <line x1="650" y1="330" x2="650" y2="315" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow1)" />
  <line x1="175" y1="240" x2="175" y2="225" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow1)" />
  <line x1="450" y1="240" x2="450" y2="225" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow1)" />
  <line x1="725" y1="240" x2="725" y2="225" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow1)" />
  <line x1="450" y1="150" x2="450" y2="135" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow1)" />
</svg>
