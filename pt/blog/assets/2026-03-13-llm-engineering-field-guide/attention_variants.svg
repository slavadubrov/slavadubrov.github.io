<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" role="img" aria-label="Attention Variants" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="artifact-title">Variantes de Atenção</title>
  <defs>
    <style>
      .query { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 5; }
      .kv { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 5; }
      .arrow { stroke: #334155; stroke-width: 2; marker-end: url(#arrowhead); }
      .text { font-family: Inter, system-ui, sans-serif; font-size: 14px; text-anchor: middle; font-weight: bold; }
      .label { font-family: Inter, system-ui, sans-serif; font-size: 12px; text-anchor: middle; }
      .title { font-family: Inter, system-ui, sans-serif; font-size: 18px; font-weight: bold; text-anchor: middle; }
      .desc { font-family: Inter, system-ui, sans-serif; font-size: 14px; text-anchor: middle; fill: #334155; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="100%" height="100%" fill="#ffffff" />

  <text x="400" y="30" class="title">Requisitos da Variante de Atenção KV Cache</text>

  <!-- MHA Section -->
  <text x="150" y="70" class="text">Atenção Multi-Cabeça</text>
  <text x="150" y="90" class="desc">(MHA)</text>

  <!-- Q Heads -->
  <rect x="110" y="110" width="30" height="30" class="query" />
  <rect x="150" y="110" width="30" height="30" class="query" />
  <rect x="190" y="110" width="30" height="30" class="query" />
  <rect x="230" y="110" width="30" height="30" class="query" />
  <text x="125" y="130" class="label">Q1</text>
  <text x="165" y="130" class="label">2º trimestre</text>
  <text x="205" y="130" class="label">3º trimestre</text>
  <text x="245" y="130" class="label">4.º trimestre</text>

  <!-- Arrows -->
  <line x1="125" y1="145" x2="125" y2="185" class="arrow" />
  <line x1="165" y1="145" x2="165" y2="185" class="arrow" />
  <line x1="205" y1="145" x2="205" y2="185" class="arrow" />
  <line x1="245" y1="145" x2="245" y2="185" class="arrow" />

  <!-- KV Heads -->
  <rect x="110" y="190" width="30" height="60" class="kv" />
  <rect x="150" y="190" width="30" height="60" class="kv" />
  <rect x="190" y="190" width="30" height="60" class="kv" />
  <rect x="230" y="190" width="30" height="60" class="kv" />
  <text x="125" y="215" class="label">KV1</text>
  <text x="165" y="215" class="label">KV2</text>
  <text x="205" y="215" class="label">KV3</text>
  <text x="245" y="215" class="label">KV4</text>

  <rect x="110" y="260" width="150" height="30" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,5" />
  <text x="185" y="280" class="label" font-weight="bold" fill="#dc2626">Maior KV Cache</text>


  <!-- MQA Section -->
  <text x="400" y="70" class="text">Atenção Multi-Consulta</text>
  <text x="400" y="90" class="desc">(MQA)</text>

  <!-- Q Heads -->
  <rect x="360" y="110" width="30" height="30" class="query" />
  <rect x="400" y="110" width="30" height="30" class="query" />
  <rect x="440" y="110" width="30" height="30" class="query" />
  <rect x="480" y="110" width="30" height="30" class="query" />
  <text x="375" y="130" class="label">Q1</text>
  <text x="415" y="130" class="label">2º trimestre</text>
  <text x="455" y="130" class="label">3º trimestre</text>
  <text x="495" y="130" class="label">4.º trimestre</text>

  <!-- Arrows -->
  <line x1="375" y1="145" x2="425" y2="185" class="arrow" />
  <line x1="415" y1="145" x2="435" y2="185" class="arrow" />
  <line x1="455" y1="145" x2="435" y2="185" class="arrow" />
  <line x1="495" y1="145" x2="445" y2="185" class="arrow" />

  <!-- KV Heads -->
  <rect x="415" y="190" width="40" height="60" class="kv" />
  <text x="435" y="225" class="label">KV1</text>

  <rect x="415" y="260" width="40" height="30" fill="none" stroke="#16a34a" stroke-width="2" stroke-dasharray="5,5" />
  <text x="435" y="280" class="label" font-weight="bold" fill="#16a34a">Menor</text>


  <!-- GQA Section -->
  <text x="650" y="70" class="text">Atenção de Consulta Agrupada</text>
  <text x="650" y="90" class="desc">(GQA, cabeçalhos de KV agrupados)</text>

  <!-- Q Heads -->
  <rect x="610" y="110" width="30" height="30" class="query" />
  <rect x="650" y="110" width="30" height="30" class="query" />
  <rect x="690" y="110" width="30" height="30" class="query" />
  <rect x="730" y="110" width="30" height="30" class="query" />
  <text x="625" y="130" class="label">Q1</text>
  <text x="665" y="130" class="label">2º trimestre</text>
  <text x="705" y="130" class="label">3º trimestre</text>
  <text x="745" y="130" class="label">4.º trimestre</text>

  <!-- Group 1 -->
  <rect x="605" y="105" width="80" height="40" fill="none" stroke="#2563eb" stroke-width="2" stroke-dasharray="4,4" />
  <line x1="625" y1="145" x2="635" y2="185" class="arrow" />
  <line x1="665" y1="145" x2="655" y2="185" class="arrow" />
  <rect x="630" y="190" width="30" height="60" class="kv" />
  <text x="645" y="215" class="label">KV1</text>

  <!-- Group 2 -->
  <rect x="685" y="105" width="80" height="40" fill="none" stroke="#2563eb" stroke-width="2" stroke-dasharray="4,4" />
  <line x1="705" y1="145" x2="715" y2="185" class="arrow" />
  <line x1="745" y1="145" x2="735" y2="185" class="arrow" />
  <rect x="710" y="190" width="30" height="60" class="kv" />
  <text x="725" y="215" class="label">KV2</text>

  <rect x="630" y="260" width="110" height="30" fill="none" stroke="#16a34a" stroke-width="2" stroke-dasharray="5,5" />
  <text x="685" y="280" class="label" font-weight="bold" fill="#16a34a">Compromisso configurável</text>

</svg>
