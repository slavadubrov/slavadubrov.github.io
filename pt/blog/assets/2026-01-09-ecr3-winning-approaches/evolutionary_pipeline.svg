<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Pipeline de Engenharia de Prompts Evolutiva</title>
  <desc id="artifact-desc">Pipeline de Engenharia de Prompts Evolutiva.</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #334155;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="analyzerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #ea580c;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #ea580c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="versionerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #2563eb;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="16" />

  <!-- Title -->
  <text y="45" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" x="400">Pipeline de Engenharia de Prompts Evolutiva</text>

  <!-- Main Agent Box -->
  <rect x="60" y="120" width="200" height="100" rx="12" fill="url(#mainGrad)" />
  <text y="160" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" x="160">Agente Principal</text>
  <text y="185" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Inter, system-ui, sans-serif" font-size="12" x="160">Ejecutar teste de desempenho</text>
  <text y="202" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Inter, system-ui, sans-serif" font-size="12" x="160">Registar todas as ações</text>

  <!-- Analyzer Agent Box -->
  <rect x="300" y="120" width="200" height="100" rx="12" fill="url(#analyzerGrad)" />
  <text y="160" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" x="400">Agente de Análise</text>
  <text y="185" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Inter, system-ui, sans-serif" font-size="12" x="400">Revisar tarefas com falha</text>
  <text y="202" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Inter, system-ui, sans-serif" font-size="12" x="400">Formular hipóteses</text>

  <!-- Versioner Agent Box -->
  <rect x="540" y="120" width="200" height="100" rx="12" fill="url(#versionerGrad)" />
  <text y="160" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" x="640">Agente de Versionamento</text>
  <text y="185" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Inter, system-ui, sans-serif" font-size="12" x="640">Gerar novo prompt</text>
  <text y="202" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Inter, system-ui, sans-serif" font-size="12" x="640">Integrar os conhecimentos adquiridos</text>

  <!-- Arrows -->
  <defs>
    <marker id="arrowWhite" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>

  <!-- Main to Analyzer -->
  <line x1="260" y1="155" x2="295" y2="155" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowWhite)" />
  <text y="145" text-anchor="middle" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" x="277">Registos</text>

  <!-- Analyzer to Versioner -->
  <line x1="500" y1="155" x2="535" y2="155" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowWhite)" />
  <text y="145" text-anchor="middle" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" x="517">Correções</text>

  <!-- Feedback Loop Arrow -->
  <path d="M 640 220 L 640 300 Q 640 320, 620 320 L 180 320 Q 160 320, 160 300 L 160 225" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arrowWhite)" />
  <text y="345" text-anchor="middle" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="12" x="400">Prompt de Sistema Melhorado (v1 → v80)</text>

  <!-- Generation Counter -->
  <rect x="320" y="270" width="160" height="36" rx="18" fill="rgba(99, 102, 241, 0.2)" stroke="#2563eb" stroke-width="1" />
  <text y="293" text-anchor="middle" fill="#2563eb" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" x="400">80 Gerações</text>
</svg>
