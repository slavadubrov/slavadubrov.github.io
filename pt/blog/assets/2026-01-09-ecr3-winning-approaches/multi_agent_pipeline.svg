<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" role="img" aria-label="Multi-Agent Sequential Pipeline" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title>Especialista sequencial pipeline</title>
  <desc>Uma porta de segurança e uma fase de extração de contexto preparam um agente de execução, sendo posteriormente gerada uma ligação entre entidades de forma determinística para a resposta.</desc>
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #334155;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="securityGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #dc2626;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="contextGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #ea580c;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #ea580c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="execGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="linkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #166534;stop-opacity:1" />
    </linearGradient>
    <filter id="glow2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="900" height="360" fill="#0f172a" rx="16" />

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600">Multi-Agent sequencial Pipeline</text>

  <!-- Step 1: Security Gate -->
  <rect x="40" y="100" width="180" height="140" rx="12" fill="url(#securityGrad)" />
  <text x="130" y="130" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">Portão de Segurança</text>
  <line x1="60" y1="145" x2="200" y2="145" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
  <text x="130" y="168" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11">✓ Validar permissões</text>
  <text x="130" y="186" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11">✓ Verificar as regras da wiki</text>
  <text x="130" y="204" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11">✗ Bloquear solicitações falsificadas</text>
  <text x="130" y="225" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="Inter, system-ui, sans-serif" font-size="10" font-style="italic">Verificação pré-execução</text>

  <!-- Step 2: Context Extraction -->
  <rect x="260" y="100" width="180" height="140" rx="12" fill="url(#contextGrad)" />
  <text x="350" y="130" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">Extração de Contexto</text>
  <line x1="280" y1="145" x2="420" y2="145" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
  <text x="350" y="168" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11">Regras críticas de superfície</text>
  <text x="350" y="186" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11">Carregar previamente perfis de utilizador</text>
  <text x="350" y="204" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11">Enriquecer dados do projeto</text>
  <text x="350" y="225" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="Inter, system-ui, sans-serif" font-size="10" font-style="italic">Pré-carregamento agressivo</text>

  <!-- Step 3: Execution Agent -->
  <rect x="480" y="100" width="180" height="140" rx="12" fill="url(#execGrad)" />
  <text x="570" y="130" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">Agente de Execução</text>
  <line x1="500" y1="145" x2="640" y2="145" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
  <text x="570" y="168" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11">ReAct ciclo de planeamento</text>
  <text x="570" y="186" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11">5 fases internas</text>
  <text x="570" y="204" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11">Chamada de ferramentas e raciocínio</text>
  <text x="570" y="225" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="Inter, system-ui, sans-serif" font-size="10" font-style="italic">Ejecução da tarefa principal</text>

  <!-- Step 4: Link Generator -->
  <rect x="700" y="100" width="160" height="140" rx="12" fill="url(#linkGrad)" />
  <text x="780" y="130" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">Gerador de Links</text>
  <line x1="720" y1="145" x2="840" y2="145" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
  <text x="780" y="168" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11">Analisar contexto</text>
  <text x="780" y="186" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11">Extrair IDs de entidades</text>
  <text x="780" y="204" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11">Adicionar ligações necessárias</text>
  <text x="780" y="225" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="Inter, system-ui, sans-serif" font-size="10" font-style="italic">Incorporado na resposta</text>

  <!-- Arrows between stages -->
  <line x1="220" y1="170" x2="255" y2="170" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow2)" />
  <line x1="440" y1="170" x2="475" y2="170" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow2)" />
  <line x1="660" y1="170" x2="695" y2="170" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow2)" />

  <!-- Stage Labels -->
  <text x="130" y="265" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500">Etapa 1</text>
  <text x="350" y="265" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500">Etapa 2</text>
  <text x="570" y="265" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500">Etapa 3</text>
  <text x="780" y="265" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500">Estágio 4</text>

  <!-- Bottom note -->
  <rect x="250" y="290" width="400" height="40" rx="8" fill="rgba(99, 102, 241, 0.15)" stroke="#2563eb" stroke-width="1" />
  <text x="450" y="315" text-anchor="middle" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="12">Cada fase possui um requisito operacional distinto</text>
</svg>
