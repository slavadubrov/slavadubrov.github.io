<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Caminho da solicitação LoRAX, desde a resolução pelo adaptador até à geração</title>
  <desc id="desc">Um pedido autenticado fornece um ID de adaptador incluído na lista de permissões. O LoRAX determina a residência, carrega o adaptador se necessário, agrupa as tarefas compatíveis, aplica o adaptador sobre o modelo base compartilhado e transmite os tokens. Identidades e artefatos rejeitados seguem um caminho de falha.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="500" rx="22" fill="#0f172a" />
  <text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Caminho da requisição LoRAX</text>
  <text x="500" y="77" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#94a3b8">A identidade do adaptador é um parâmetro de roteamento autorizado, e não um dado público arbitrário</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(25 125)"><rect width="150" height="110" rx="14" fill="#1e293b" stroke="#64748b" /><text x="75" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#f8fafc">Portal de Integração</text><text x="75" y="66" text-anchor="middle" font-size="12" fill="#cbd5e1">autenticar utilizador</text><text x="75" y="87" text-anchor="middle" font-size="12" fill="#94a3b8">adaptador de lista de permissões</text></g>
    <text x="197" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(220 125)"><rect width="165" height="110" rx="14" fill="#5b21b6" stroke="#2563eb" /><text x="82" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#c4b5fd">Resolver</text><text x="82" y="66" text-anchor="middle" font-size="12" fill="#cbd5e1">verificar residência</text><text x="82" y="87" text-anchor="middle" font-size="12" fill="#94a3b8">carregar se ausente</text></g>
    <text x="407" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(430 125)"><rect width="165" height="110" rx="14" fill="#9a3412" stroke="#ea580c" /><text x="82" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#fdba74">Agendador</text><text x="82" y="66" text-anchor="middle" font-size="12" fill="#cbd5e1">fila por prontidão</text><text x="82" y="87" text-anchor="middle" font-size="12" fill="#94a3b8">formar lote misto</text></g>
    <text x="617" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(640 125)"><rect width="165" height="110" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="82" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">GPU inferência</text><text x="82" y="66" text-anchor="middle" font-size="12" fill="#cbd5e1">modelo de base partilhado</text><text x="82" y="87" text-anchor="middle" font-size="12" fill="#94a3b8">adaptador por pedido</text></g>
    <text x="827" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(850 125)"><rect width="125" height="110" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="62" y="45" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Fluxo</text><text x="62" y="75" text-anchor="middle" font-size="12" fill="#93c5fd">tokens de saída</text></g>

    <g transform="translate(220 315)"><rect width="585" height="105" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="292" y="33" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Observe o percurso de residência para cada pedido</text><text x="45" y="66" font-size="13" fill="#cbd5e1">GPU taxa de sucesso</text><text x="160" y="66" font-size="13" fill="#cbd5e1">CPU taxa de sucesso</text><text x="275" y="66" font-size="13" fill="#cbd5e1">Colisão com artefato</text><text x="410" y="66" font-size="13" fill="#cbd5e1">Falha remota</text><text x="45" y="88" font-size="12" fill="#94a3b8">Fila de registos, carga, primeiro token, latência total e motivo da falha.</text></g>
    <text x="500" y="465" text-anchor="middle" font-size="13" fill="#fca5a5">Adaptador não autorizado, artefato incompatível ou falha de carga → rejeitar ou utilizar um plano de fallback explícito</text>
  </g>
</svg>
