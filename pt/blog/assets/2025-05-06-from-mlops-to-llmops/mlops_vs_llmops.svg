<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">A unidade de lançamento passa de um serviço de modelo para um sistema de decisão</title>
  <desc id="desc">O núcleo central de MLOps, que abrange código, dados, modelos e serving, é cercado por prompts e esquemas, estado de recuperação de informações, ferramentas e permissões, rotas e orçamentos, além de políticas de segurança. Todos os componentes são integrados num único manifesto de sistema.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="650" rx="28" fill="#0f172a" />
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">LLMOps amplia a unidade de lançamento</text>
  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <rect x="400" y="220" width="400" height="190" rx="26" fill="#1d4ed8" stroke="#2563eb" stroke-width="3" />
    <text x="600" y="270" fill="#93c5fd" font-size="24" font-weight="700">Núcleo MLOps</text>
    <text x="600" y="312" fill="#93c5fd" font-size="17">código • dados • identidade do modelo</text>
    <text x="600" y="346" fill="#93c5fd" font-size="17">construção • serving • implementação • reversão</text>
    <rect x="70" y="145" width="265" height="115" rx="18" fill="#5b21b6" /><text x="202" y="189" fill="#93c5fd" font-size="19" font-weight="700">Prompts + esquemas</text><text x="202" y="225" fill="#c4b5fd" font-size="14">comportamento de solicitação montada</text>
    <rect x="865" y="145" width="265" height="115" rx="18" fill="#166534" /><text x="997" y="189" fill="#93c5fd" font-size="19" font-weight="700">Estado de recuperação</text><text x="997" y="225" fill="#93c5fd" font-size="14">corpo de dados • analisador • índice</text>
    <rect x="70" y="370" width="265" height="115" rx="18" fill="#9a3412" /><text x="202" y="414" fill="#fdba74" font-size="19" font-weight="700">Ferramentas + permissões</text><text x="202" y="450" fill="#fdba74" font-size="14">contratos • aprovação • efeitos</text>
    <rect x="865" y="370" width="265" height="115" rx="18" fill="#1d4ed8" /><text x="997" y="414" fill="#93c5fd" font-size="19" font-weight="700">Roteamento + orçamento</text><text x="997" y="450" fill="#93c5fd" font-size="14">mecanismo de fallback • cache • quota</text>
    <rect x="390" y="485" width="420" height="82" rx="18" fill="#991b1b" /><text x="600" y="518" fill="#fca5a5" font-size="19" font-weight="700">Política de segurança e negócios</text><text x="600" y="547" fill="#fca5a5" font-size="14">regras determinísticas e controlos de risco residual</text>
    <rect x="255" y="590" width="690" height="42" rx="14" fill="#1e293b" /><text x="600" y="617" fill="#e2e8f0" font-size="17" font-weight="700">Um manifesto identifica e promove o sistema completo</text>
  </g>
</svg>
