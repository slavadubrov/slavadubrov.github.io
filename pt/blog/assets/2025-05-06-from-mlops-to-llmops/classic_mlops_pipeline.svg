  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="100%" height="100%" fill="#f8fafc" /><style>
    .box { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 2; rx: 8; }
    .text { font-family: Inter, system-ui, sans-serif; font-size: 14px; fill: #0f172a; text-anchor: middle; dominant-baseline: middle; }
    .path { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
  </style>


  <rect x="20" y="80" width="100" height="40" class="box" />
