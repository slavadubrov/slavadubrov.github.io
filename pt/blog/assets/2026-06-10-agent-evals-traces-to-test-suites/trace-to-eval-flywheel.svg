<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 640" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrFly" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2980b9" />
    </marker>
    <marker id="arrFlyBack" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#27ae60" />
    </marker>
    <filter id="shadowFly" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-opacity="0.14" />
    </filter>
  </defs>

  <text x="590" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">Volante de Rastreio a Avaliação</text>
  <text x="590" y="57" text-anchor="middle" font-size="12" fill="#666">Cada falha de produção diagnosticada torna-se um registo, uma etiqueta, uma linha de conjunto de dados e um avaliador que controla o processo de CI</text>

  <!-- Stage 1: Production agent -->
  <rect x="40" y="110" width="200" height="110" rx="12" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.6" filter="url(#shadowFly)" />
  <text x="140" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">1 · Agente de produção</text>
  <text x="140" y="164" text-anchor="middle" font-size="10" fill="#555">equipado com OTel</text>
  <text x="140" y="179" text-anchor="middle" font-size="10" fill="#555">Intervalo de GenAI semconv:</text>
  <text x="140" y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#555">invocar_agente → conversa → executar_ferramenta</text>

  <line x1="240" y1="165" x2="295" y2="165" stroke="#2980b9" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 2: Trace store -->
  <rect x="300" y="110" width="200" height="110" rx="12" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.6" filter="url(#shadowFly)" />
  <text x="400" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">2 · Armazenamento de traços</text>
  <text x="400" y="164" text-anchor="middle" font-size="10" fill="#555">Langfuse / Phoenix /</text>
  <text x="400" y="179" text-anchor="middle" font-size="10" fill="#555">LangSmith / Braintrust</text>
  <text x="400" y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#555">(ou um ficheiro JSONL para iniciar)</text>

  <line x1="500" y1="165" x2="555" y2="165" stroke="#2980b9" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 3: Mine failures -->
  <rect x="560" y="110" width="200" height="110" rx="12" fill="#fce4ec" stroke="#c62828" stroke-width="1.6" filter="url(#shadowFly)" />
  <text x="660" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#c62828">3 · Falhas na mina</text>
  <text x="660" y="164" text-anchor="middle" font-size="10" fill="#555">valores baixos · reclamações de utilizadores</text>
  <text x="660" y="179" text-anchor="middle" font-size="10" fill="#555">regras determinísticas · juízes</text>
  <text x="660" y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#555">codificação aberta: leitura de 30–50 trilhas</text>

  <line x1="760" y1="165" x2="815" y2="165" stroke="#2980b9" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 4: Cluster + label -->
  <rect x="820" y="110" width="200" height="110" rx="12" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.6" filter="url(#shadowFly)" />
  <text x="920" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#6a1b9a">4 · Clustering + etiqueta</text>
  <text x="920" y="164" text-anchor="middle" font-size="10" fill="#555">codificação axial em 5–6 elementos nomeados,</text>
  <text x="920" y="179" text-anchor="middle" font-size="10" fill="#555">modos de falha específicos</text>
  <text x="920" y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#555">"erro de formatação da data", e não "problemas temporais"</text>

  <line x1="920" y1="220" x2="920" y2="285" stroke="#2980b9" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 5: Dedupe / goldens -->
  <rect x="820" y="290" width="200" height="110" rx="12" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.6" filter="url(#shadowFly)" />
  <text x="920" y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#6a1b9a">5 · Remover duplicatas</text>
  <text x="920" y="344" text-anchor="middle" font-size="10" fill="#555">um dourado representativo</text>
  <text x="920" y="359" text-anchor="middle" font-size="10" fill="#555">por cluster, os IDs de intervalo são mantidos</text>
  <text x="920" y="376" text-anchor="middle" font-size="10" font-style="italic" fill="#555">em metadados para rastreabilidade</text>

  <line x1="820" y1="345" x2="765" y2="345" stroke="#2980b9" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 6: Versioned dataset -->
  <rect x="560" y="290" width="200" height="110" rx="12" fill="#fff3e0" stroke="#e65100" stroke-width="1.6" filter="url(#shadowFly)" />
  <text x="660" y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#e65100">6 · Conjunto de dados versionado</text>
  <text x="660" y="344" text-anchor="middle" font-size="10" fill="#555">goldens-v1.json · v2 · v3 …</text>
  <text x="660" y="359" text-anchor="middle" font-size="10" fill="#555">ferramentas e critérios esperados</text>
  <text x="660" y="376" text-anchor="middle" font-size="10" font-style="italic" fill="#555">fixado para execuções reprodutíveis</text>

  <line x1="560" y1="345" x2="505" y2="345" stroke="#2980b9" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 7: CI gate -->
  <rect x="300" y="290" width="200" height="110" rx="12" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.6" filter="url(#shadowFly)" />
  <text x="400" y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#2e7d32">7 · Gateway de CI</text>
  <text x="400" y="344" text-anchor="middle" font-size="10" fill="#555">execução de teste deepeval em cada PR</text>
  <text x="400" y="359" text-anchor="middle" font-size="10" fill="#555">métrica de falha → compilação falhada</text>
  <text x="400" y="376" text-anchor="middle" font-size="10" font-style="italic" fill="#555">regressões bloqueadas antes da implementação</text>

  <!-- feedback arrow back to production -->
  <path d="M 300 345 L 140 345 L 140 225" fill="none" stroke="#27ae60" stroke-width="2.2" marker-end="url(#arrFlyBack)" />
  <text x="148" y="290" font-size="10.5" font-weight="700" fill="#27ae60">corrigir navios com segurança;</text>
  <text x="148" y="305" font-size="10.5" font-weight="700" fill="#27ae60">novos fluxos de tráfego</text>
  <text x="148" y="320" font-size="10.5" font-weight="700" fill="#27ae60">o próximo ciclo</text>

  <!-- Online lane note -->
  <rect x="40" y="450" width="1100" height="150" rx="12" fill="#f8f9fa" stroke="#9b59b6" stroke-width="1.4" filter="url(#shadowFly)" />
  <text x="65" y="480" font-size="13" font-weight="700" fill="#6a1b9a">Evaluation em tempo real ao longo do ciclo</text>
  <text x="65" y="503" font-size="11" fill="#555">• Amostra de tráfego em tempo real, avaliação assíncrona com métricas sem referência (conclusão de tarefas, juízes personalizados) — sem latência adicional</text>
  <text x="65" y="524" font-size="11" fill="#555">• Alerta quando o limite inferior de confiança da pontuação ultrapassa um limiar — novos padrões de falha entram no mecanismo de aceleração na fase 3</text>
  <text x="65" y="545" font-size="11" fill="#555">• Mantenha as barreiras de segurança separadas: em linha, determinísticas, de bloqueio (ms) — as avaliações medem, as barreiras protegem</text>
  <text x="65" y="578" font-size="10.5" font-style="italic" fill="#888">O benefício: as falhas de produção tornam-se testes de regressão em poucos dias, e as atualizações de modelos são validadas em dias, e não em semanas.</text>
</svg>
