<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 640" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="The trace-to-eval flywheel" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">O volante de rastreio a avaliação</title>
  <defs>
    <marker id="arrFly" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2563eb" />
    </marker>
    <marker id="arrFlyBack" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#16a34a" />
    </marker>
    <filter id="shadowFly" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <text y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a" x="590">O Volante de Rastreio a Avaliação</text>
  <text y="57" text-anchor="middle" font-size="12" fill="#334155" x="590">Cada falha de produção diagnosticada torna-se um rasto, uma etiqueta, uma linha dataset e um avaliador que controla os processos de CI</text>

  <!-- Stage 1: Production agent -->
  <rect x="40" y="110" width="200" height="110" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.6" filter="url(#shadowFly)" />
  <text y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8" x="140">1 · Agente de produção</text>
  <text y="164" text-anchor="middle" font-size="10" fill="#334155" x="140">equipado com OTel</text>
  <text y="179" text-anchor="middle" font-size="10" fill="#334155" x="140">GenAI semconv abrange:</text>
  <text y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="140">invocar_agente → conversa → executar_ferramenta</text>

  <line x1="240" y1="165" x2="295" y2="165" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 2: Trace store -->
  <rect x="300" y="110" width="200" height="110" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.6" filter="url(#shadowFly)" />
  <text y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8" x="400">2 · Armazenamento de trajectórias</text>
  <text y="164" text-anchor="middle" font-size="10" fill="#334155" x="400">Langfuse / Phoenix /</text>
  <text y="179" text-anchor="middle" font-size="10" fill="#334155" x="400">LangSmith / Braintrust</text>
  <text y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="400">(ou um ficheiro JSONL para iniciar)</text>

  <line x1="500" y1="165" x2="555" y2="165" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 3: Mine failures -->
  <rect x="560" y="110" width="200" height="110" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="1.6" filter="url(#shadowFly)" />
  <text y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b" x="660">3 · Falhas na mineração</text>
  <text y="164" text-anchor="middle" font-size="10" fill="#334155" x="660">baixas pontuações · reclamações de utilizadores</text>
  <text y="179" text-anchor="middle" font-size="10" fill="#334155" x="660">regras determinísticas · juízes</text>
  <text y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="660">codificação aberta: leitura de 30–50 rastreios</text>

  <line x1="760" y1="165" x2="815" y2="165" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 4: Cluster + label -->
  <rect x="820" y="110" width="200" height="110" rx="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.6" filter="url(#shadowFly)" />
  <text y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6" x="920">4 · Agrupamento + rotulagem</text>
  <text y="164" text-anchor="middle" font-size="10" fill="#334155" x="920">codificação axial em 5–6 elementos nomeados,</text>
  <text y="179" text-anchor="middle" font-size="10" fill="#334155" x="920">modos de falha específicos</text>
  <text y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="920">"erro de formatação de data", e não "problemas temporais"</text>

  <line x1="920" y1="220" x2="920" y2="285" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 5: Dedupe / goldens -->
  <rect x="820" y="290" width="200" height="110" rx="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.6" filter="url(#shadowFly)" />
  <text y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6" x="920">5 · Remoção de duplicatas</text>
  <text y="344" text-anchor="middle" font-size="10" fill="#334155" x="920">um dourado representativo</text>
  <text y="359" text-anchor="middle" font-size="10" fill="#334155" x="920">por cluster, os IDs de intervalo são mantidos</text>
  <text y="376" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="920">em metadados para rastreabilidade</text>

  <line x1="820" y1="345" x2="765" y2="345" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 6: Versioned dataset -->
  <rect x="560" y="290" width="200" height="110" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="1.6" filter="url(#shadowFly)" />
  <text y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412" x="660">6 · Versão dataset</text>
  <text y="344" text-anchor="middle" font-size="10" fill="#334155" x="660">goldens-v1.json · v2 · v3 …</text>
  <text y="359" text-anchor="middle" font-size="10" fill="#334155" x="660">ferramentas e critérios esperados</text>
  <text y="376" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="660">fixado para execuções reprodutíveis</text>

  <line x1="560" y1="345" x2="505" y2="345" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 7: CI gate -->
  <rect x="300" y="290" width="200" height="110" rx="12" fill="#f0fdf4" stroke="#166534" stroke-width="1.6" filter="url(#shadowFly)" />
  <text y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#166534" x="400">7 · Portão de CI</text>
  <text y="344" text-anchor="middle" font-size="10" fill="#334155" x="400">execução de teste deepeval em cada PR</text>
  <text y="359" text-anchor="middle" font-size="10" fill="#334155" x="400">metrica de falha → compilação falhada</text>
  <text y="376" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="400">regressões bloqueadas antes da implementação</text>

  <!-- feedback arrow back to production -->
  <path d="M 300 345 L 140 345 L 140 225" fill="none" stroke="#16a34a" stroke-width="2.2" marker-end="url(#arrFlyBack)" />
  <text y="290" font-size="10.5" font-weight="700" fill="#166534" x="148">corrigir navios com segurança;</text>
  <text y="305" font-size="10.5" font-weight="700" fill="#166534" x="148">novos fluxos de tráfego</text>
  <text y="320" font-size="10.5" font-weight="700" fill="#166534" x="148">o próximo ciclo</text>

  <!-- Online lane note -->
  <rect x="40" y="450" width="1100" height="150" rx="12" fill="#ffffff" stroke="#7c3aed" stroke-width="1.4" filter="url(#shadowFly)" />
  <text y="480" font-size="13" font-weight="700" fill="#5b21b6" x="65">Ejecução em paralelo com o ciclo: avaliações online</text>
  <text y="503" font-size="11" fill="#334155" x="65">• Amostrar tráfego em tempo real, avaliar de forma assíncrona com métricas sem referência externa (conclusão da tarefa, avaliadores personalizados) — sem latência adicional</text>
  <text y="524" font-size="11" fill="#334155" x="65">• Alerta quando o limite inferior de confiança da pontuação ultrapassa um limiar — novos padrões de falha entram no mecanismo de aceleração na fase 3</text>
  <text y="545" font-size="11" fill="#334155" x="65">• Mantenha as restrições separadas: em linha, determinística, de bloqueio (ms) — as avaliações medem, as restrições protegem</text>
  <text y="578" font-size="10.5" font-style="italic" fill="#64748b" x="65">O benefício: as falhas de produção tornam-se testes de regressão em poucos dias, e as atualizações de modelos são validadas em dias, e não em semanas.</text>
</svg>
