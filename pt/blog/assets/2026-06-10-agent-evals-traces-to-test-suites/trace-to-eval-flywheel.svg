<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 640" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrFly" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2980b9" />
    </marker>
    <marker id="arrFlyBack" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#27ae60" />
    </marker>
    <filter id="shadowFly" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-opacity="0.14" />
    </filter>
  </defs>

  <text x="590" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">O Volante Trace-to-Eval</text>
  <text x="590" y="57" text-anchor="middle" font-size="12" fill="#666">Cada falha diagnosticada em produção torna-se um trace, um rótulo, uma linha de dataset e um scorer que bloqueia o CI</text>

  <!-- Stage 1: Production agent -->
  <rect x="40" y="110" width="200" height="110" rx="12" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.6" filter="url(#shadowFly)" />
  <text x="140" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">1 · Agente em produção</text>
  <text x="140" y="164" text-anchor="middle" font-size="10" fill="#555">instrumentado com OTel</text>
  <text x="140" y="179" text-anchor="middle" font-size="10" fill="#555">spans semconv de GenAI:</text>
  <text x="140" y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#555">invoke_agent → chat → execute_tool</text>

  <line x1="240" y1="165" x2="295" y2="165" stroke="#2980b9" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 2: Trace store -->
  <rect x="300" y="110" width="200" height="110" rx="12" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.6" filter="url(#shadowFly)" />
  <text x="400" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">2 · Armazenamento de traces</text>
  <text x="400" y="164" text-anchor="middle" font-size="10" fill="#555">Langfuse / Phoenix /</text>
  <text x="400" y="179" text-anchor="middle" font-size="10" fill="#555">LangSmith / Braintrust</text>
  <text x="400" y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#555">(ou um ficheiro JSONL para começar)</text>

  <line x1="500" y1="165" x2="555" y2="165" stroke="#2980b9" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 3: Mine failures -->
  <rect x="560" y="110" width="200" height="110" rx="12" fill="#fce4ec" stroke="#c62828" stroke-width="1.6" filter="url(#shadowFly)" />
  <text x="660" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#c62828">3 · Extrair falhas</text>
  <text x="660" y="164" text-anchor="middle" font-size="10" fill="#555">pontuações baixas · queixas de utilizadores</text>
  <text x="660" y="179" text-anchor="middle" font-size="10" fill="#555">regras determinísticas · judges</text>
  <text x="660" y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#555">codificação aberta: ler 30–50 traces</text>

  <line x1="760" y1="165" x2="815" y2="165" stroke="#2980b9" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 4: Cluster + label -->
  <rect x="820" y="110" width="200" height="110" rx="12" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.6" filter="url(#shadowFly)" />
  <text x="920" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#6a1b9a">4 · Agrupar + rotular</text>
  <text x="920" y="164" text-anchor="middle" font-size="10" fill="#555">codificação axial em 5–6 modos</text>
  <text x="920" y="179" text-anchor="middle" font-size="10" fill="#555">de falha específicos</text>
  <text x="920" y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#555">"erro de formatação de data", não "problemas temporais"</text>

  <line x1="920" y1="220" x2="920" y2="285" stroke="#2980b9" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 5: Dedupe / goldens -->
  <rect x="820" y="290" width="200" height="110" rx="12" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.6" filter="url(#shadowFly)" />
  <text x="920" y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#6a1b9a">5 · Remover duplicados</text>
  <text x="920" y="344" text-anchor="middle" font-size="10" fill="#555">um golden representativo</text>
  <text x="920" y="359" text-anchor="middle" font-size="10" fill="#555">por cluster, IDs de span mantidos</text>
  <text x="920" y="376" text-anchor="middle" font-size="10" font-style="italic" fill="#555">nos metadados para rastreabilidade</text>

  <line x1="820" y1="345" x2="765" y2="345" stroke="#2980b9" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 6: Versioned dataset -->
  <rect x="560" y="290" width="200" height="110" rx="12" fill="#fff3e0" stroke="#e65100" stroke-width="1.6" filter="url(#shadowFly)" />
  <text x="660" y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#e65100">6 · Dataset versionado</text>
  <text x="660" y="344" text-anchor="middle" font-size="10" fill="#555">goldens-v1.json · v2 · v3 …</text>
  <text x="660" y="359" text-anchor="middle" font-size="10" fill="#555">tools esperadas + critérios</text>
  <text x="660" y="376" text-anchor="middle" font-size="10" font-style="italic" fill="#555">fixado para execuções reproduzíveis</text>

  <line x1="560" y1="345" x2="505" y2="345" stroke="#2980b9" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 7: CI gate -->
  <rect x="300" y="290" width="200" height="110" rx="12" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.6" filter="url(#shadowFly)" />
  <text x="400" y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#2e7d32">7 · Barreira de CI</text>
  <text x="400" y="344" text-anchor="middle" font-size="10" fill="#555">execução de testes deepeval em cada PR</text>
  <text x="400" y="359" text-anchor="middle" font-size="10" fill="#555">métrica falhada → build falhada</text>
  <text x="400" y="376" text-anchor="middle" font-size="10" font-style="italic" fill="#555">regressões bloqueadas antes do deploy</text>

  <!-- feedback arrow back to production -->
  <path d="M 300 345 L 140 345 L 140 225" fill="none" stroke="#27ae60" stroke-width="2.2" marker-end="url(#arrFlyBack)" />
  <text x="148" y="290" font-size="10.5" font-weight="700" fill="#27ae60">correção enviada com segurança;</text>
  <text x="148" y="305" font-size="10.5" font-weight="700" fill="#27ae60">novo tráfego alimenta</text>
  <text x="148" y="320" font-size="10.5" font-weight="700" fill="#27ae60">o ciclo seguinte</text>

  <!-- Online lane note -->
  <rect x="40" y="450" width="1100" height="150" rx="12" fill="#f8f9fa" stroke="#9b59b6" stroke-width="1.4" filter="url(#shadowFly)" />
  <text x="65" y="480" font-size="13" font-weight="700" fill="#6a1b9a">A correr em paralelo: evals online</text>
  <text x="65" y="503" font-size="11" fill="#555">• Amostrar tráfego real, pontuar async com métricas sem referência (conclusão da tarefa, judges personalizados) — zero latência extra</text>
  <text x="65" y="524" font-size="11" fill="#555">• Alertar quando o limite inferior de confiança da pontuação cruza um limiar — novos padrões de falha entram no volante na fase 3</text>
  <text x="65" y="545" font-size="11" fill="#555">• Manter guardrails separados: inline, determinísticos, bloqueantes (ms) — evals medem, guardrails protegem</text>
  <text x="65" y="578" font-size="10.5" font-style="italic" fill="#888">Ganho: falhas em produção tornam-se testes de regressão em dias, e upgrades do modelo são validados em dias, não semanas.</text>
</svg>
