<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Três Níveis de Avaliação de Agente</title>
  <desc id="artifact-desc">Três Níveis de Avaliação de Agente.</desc>
  <defs>
    <marker id="arrLvl" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#334155" />
    </marker>
    <filter id="shadowLvl" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <text y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a" x="590">Três Níveis de Avaliação de Agente</text>
  <text y="54" text-anchor="middle" font-size="12" fill="#334155" x="590">Do início ao fim indica O QUE correu mal · a trajetória indica ONDE · o componente indica PORQUÊ</text>

  <!-- Level 1: end-to-end -->
  <rect x="30" y="80" width="1120" height="150" rx="12" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowLvl)" />
  <text y="106" font-size="14" font-weight="700" fill="#166534" x="55">Nível 1 · De ponta a ponta (caixa preta)</text>
  <text y="124" font-size="10" fill="#166534" x="55">Pergunta: a tarefa teve sucesso?</text>

  <rect x="55" y="140" width="340" height="72" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="225">Conclusão da tarefa</text>
  <text y="180" text-anchor="middle" font-size="10" fill="#334155" x="225">Alinhamento de objetivos avaliado por LLM, sem referência</text>
  <text y="195" text-anchor="middle" font-size="10" fill="#334155" x="225">utilizável online — não é necessário ficheiro de saída em formato PDF</text>

  <rect x="415" y="140" width="340" height="72" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="585">Classificação de resultado/estado</text>
  <text y="180" text-anchor="middle" font-size="10" fill="#334155" x="585">comparar o estado final do ambiente com o estado desejado</text>
  <text y="195" text-anchor="middle" font-size="10" fill="#334155" x="585">resistente a caminhos alternativos criativos (τ-bench)</text>

  <rect x="775" y="140" width="340" height="72" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="945">Fiabilidade: passado^k</text>
  <text y="180" text-anchor="middle" font-size="10" fill="#334155" x="945">todas as k tentativas de k têm sucesso</text>
  <text y="195" text-anchor="middle" font-size="10" fill="#334155" x="945">90% de taxa de sucesso@1 ≈ 57% de consistência para k=8</text>

  <line x1="590" y1="234" x2="590" y2="268" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrLvl)" />
  <text y="256" font-size="10" fill="#64748b" font-style="italic" x="700">A tarefa falhou — mas onde?</text>

  <!-- Level 2: trajectory -->
  <rect x="30" y="275" width="1120" height="150" rx="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowLvl)" />
  <text y="301" font-size="14" font-weight="700" fill="#5b21b6" x="55">Nível 2 · Trajetória (caixa de vidro)</text>
  <text y="319" font-size="10" fill="#5b21b6" x="55">Pergunta: o percurso foi eficiente e sem problemas de desempenho?</text>

  <rect x="55" y="335" width="255" height="72" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6" x="182">Correção da ferramenta</text>
  <text y="375" text-anchor="middle" font-size="10" fill="#334155" x="182">determinístico, sem necessidade de juiz</text>
  <text y="390" text-anchor="middle" font-size="10" fill="#334155" x="182">correspondência exata / em ordem / em qualquer ordem</text>

  <rect x="330" y="335" width="255" height="72" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6" x="457">Correção de argumentos</text>
  <text y="375" text-anchor="middle" font-size="10" fill="#334155" x="457">ferramenta correta, parâmetros incorretos</text>
  <text y="390" text-anchor="middle" font-size="10" fill="#334155" x="457">% de pares chave-valor preenchidos corretamente</text>

  <rect x="605" y="335" width="255" height="72" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6" x="732">Eficiência e laços</text>
  <text y="375" text-anchor="middle" font-size="10" fill="#334155" x="732">chamadas redundantes · convergência de trajetórias</text>
  <text y="390" text-anchor="middle" font-size="10" fill="#334155" x="732">chamadas idênticas repetidas = beco sem saída</text>

  <rect x="880" y="335" width="235" height="72" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6" x="997">Qualidade do plano / adesão</text>
  <text y="375" text-anchor="middle" font-size="10" fill="#334155" x="997">plano bom, execução por deriva</text>
  <text y="390" text-anchor="middle" font-size="10" fill="#334155" x="997">fidelidade em múltiplas conversas ao longo das interações</text>

  <line x1="590" y1="429" x2="590" y2="463" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrLvl)" />
  <text y="451" font-size="10" fill="#64748b" font-style="italic" x="700">O caminho foi interrompido na etapa 3 — mas porquê?</text>

  <!-- Level 3: component -->
  <rect x="30" y="470" width="1120" height="120" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowLvl)" />
  <text y="496" font-size="14" font-weight="700" fill="#9a3412" x="55">Nível 3 · Componente (caixa branca)</text>
  <text y="514" font-size="10" fill="#9a3412" x="55">Pergunta: qual decisão, ferramenta, recuperador ou sub-agente falhou?</text>

  <rect x="55" y="525" width="340" height="50" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="225">Métricas por trecho</text>
  <text y="563" text-anchor="middle" font-size="10" fill="#334155" x="225">associar pontuações a cada intervalo de ferramenta/recuperação individual</text>

  <rect x="415" y="525" width="340" height="50" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="585">Interpretação da saída da ferramenta</text>
  <text y="563" text-anchor="middle" font-size="10" fill="#334155" x="585">resposta válida, leitura incorreta — corrompe os processos subsequentes</text>

  <rect x="775" y="525" width="340" height="50" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="945">Atribuição de falhas</text>
  <text y="563" text-anchor="middle" font-size="10" fill="#334155" x="945">uma falha visível ocorre geralmente a jusante do verdadeiro erro</text>
</svg>
