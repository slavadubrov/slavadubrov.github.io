<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrLvl" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#555" />
    </marker>
    <filter id="shadowLvl" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>

  <text x="590" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a2e">Três Níveis de Avaliação de Agente</text>
  <text x="590" y="54" text-anchor="middle" font-size="12" fill="#666">Do início ao fim indica O QUE correu mal · a trajetória indica ONDE · o componente indica PORQUÊ</text>

  <!-- Level 1: end-to-end -->
  <rect x="30" y="80" width="1120" height="150" rx="12" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadowLvl)" />
  <text x="55" y="106" font-size="14" font-weight="700" fill="#2e7d32">Nível 1 · De ponta a ponta (caixa preta)</text>
  <text x="55" y="124" font-size="10" fill="#2e7d32">Pergunta: a tarefa teve sucesso?</text>

  <rect x="55" y="140" width="340" height="72" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="225" y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Conclusão da tarefa</text>
  <text x="225" y="180" text-anchor="middle" font-size="10" fill="#555">Alinhamento de objetivos avaliado por LLM, sem referência</text>
  <text x="225" y="195" text-anchor="middle" font-size="10" fill="#555">utilizável online — não é necessário ficheiro de saída em formato PDF</text>

  <rect x="415" y="140" width="340" height="72" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="585" y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Classificação de resultado/estado</text>
  <text x="585" y="180" text-anchor="middle" font-size="10" fill="#555">comparar o estado final do ambiente com o estado desejado</text>
  <text x="585" y="195" text-anchor="middle" font-size="10" fill="#555">resistente a caminhos alternativos criativos (τ-bench)</text>

  <rect x="775" y="140" width="340" height="72" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="945" y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Fiabilidade: passado^k</text>
  <text x="945" y="180" text-anchor="middle" font-size="10" fill="#555">todas as k tentativas de k têm sucesso</text>
  <text x="945" y="195" text-anchor="middle" font-size="10" fill="#555">90% de taxa de sucesso@1 ≈ 57% de consistência para k=8</text>

  <line x1="590" y1="234" x2="590" y2="268" stroke="#555" stroke-width="1.6" marker-end="url(#arrLvl)" />
  <text x="700" y="256" font-size="10" fill="#888" font-style="italic">A tarefa falhou — mas onde?</text>

  <!-- Level 2: trajectory -->
  <rect x="30" y="275" width="1120" height="150" rx="12" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowLvl)" />
  <text x="55" y="301" font-size="14" font-weight="700" fill="#6a1b9a">Nível 2 · Trajetória (caixa de vidro)</text>
  <text x="55" y="319" font-size="10" fill="#6a1b9a">Pergunta: o percurso foi eficiente e sem problemas de desempenho?</text>

  <rect x="55" y="335" width="255" height="72" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1" />
  <text x="182" y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#6a1b9a">Correção da ferramenta</text>
  <text x="182" y="375" text-anchor="middle" font-size="10" fill="#555">determinístico, sem necessidade de juiz</text>
  <text x="182" y="390" text-anchor="middle" font-size="10" fill="#555">correspondência exata / em ordem / em qualquer ordem</text>

  <rect x="330" y="335" width="255" height="72" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1" />
  <text x="457" y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#6a1b9a">Correção de argumentos</text>
  <text x="457" y="375" text-anchor="middle" font-size="10" fill="#555">ferramenta correta, parâmetros incorretos</text>
  <text x="457" y="390" text-anchor="middle" font-size="10" fill="#555">% de pares chave-valor preenchidos corretamente</text>

  <rect x="605" y="335" width="255" height="72" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1" />
  <text x="732" y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#6a1b9a">Eficiência e laços</text>
  <text x="732" y="375" text-anchor="middle" font-size="10" fill="#555">chamadas redundantes · convergência de trajetórias</text>
  <text x="732" y="390" text-anchor="middle" font-size="10" fill="#555">chamadas idênticas repetidas = beco sem saída</text>

  <rect x="880" y="335" width="235" height="72" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1" />
  <text x="997" y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#6a1b9a">Qualidade do plano / adesão</text>
  <text x="997" y="375" text-anchor="middle" font-size="10" fill="#555">plano bom, execução por deriva</text>
  <text x="997" y="390" text-anchor="middle" font-size="10" fill="#555">fidelidade em múltiplas conversas ao longo das interações</text>

  <line x1="590" y1="429" x2="590" y2="463" stroke="#555" stroke-width="1.6" marker-end="url(#arrLvl)" />
  <text x="700" y="451" font-size="10" fill="#888" font-style="italic">O caminho foi interrompido na etapa 3 — mas porquê?</text>

  <!-- Level 3: component -->
  <rect x="30" y="470" width="1120" height="120" rx="12" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowLvl)" />
  <text x="55" y="496" font-size="14" font-weight="700" fill="#e65100">Nível 3 · Componente (caixa branca)</text>
  <text x="55" y="514" font-size="10" fill="#e65100">Pergunta: qual decisão, ferramenta, recuperador ou sub-agente falhou?</text>

  <rect x="55" y="525" width="340" height="50" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1" />
  <text x="225" y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Métricas por trecho</text>
  <text x="225" y="563" text-anchor="middle" font-size="10" fill="#555">associar pontuações a cada intervalo de ferramenta/recuperação individual</text>

  <rect x="415" y="525" width="340" height="50" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1" />
  <text x="585" y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Interpretação da saída da ferramenta</text>
  <text x="585" y="563" text-anchor="middle" font-size="10" fill="#555">resposta válida, leitura incorreta — corrompe os processos subsequentes</text>

  <rect x="775" y="525" width="340" height="50" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1" />
  <text x="945" y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Atribuição de falhas</text>
  <text x="945" y="563" text-anchor="middle" font-size="10" fill="#555">uma falha visível ocorre geralmente a jusante do verdadeiro erro</text>
</svg>
