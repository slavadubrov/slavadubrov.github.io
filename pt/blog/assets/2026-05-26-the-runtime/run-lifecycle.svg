<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">Ciclo de vida do agente de longa duração</title>
  <desc id="desc">Diagrama do ciclo de vida com arranque, planeamento, execução, checkpoint, avaliação e retoma de um agente de longa duração.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#1f2937" flood-opacity="0.15" />
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2c3e50" />
    </marker>
    <style>
      .heading{font:700 24px Arial,sans-serif;fill:#17202a}
      .step{font:700 15px Arial,sans-serif;fill:#17202a}
      .sub{font:500 12px Arial,sans-serif;fill:#566573}
      .box{rx:12;filter:url(#shadow);stroke-width:2}
      .arrow{stroke:#2c3e50;stroke-width:2.3;fill:none;marker-end:url(#arrow)}
      .soft{stroke:#7f8c8d;stroke-width:2;stroke-dasharray:7 7;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1100" height="620" fill="#f8f9fa" />
  <text x="60" y="58" class="heading">Ciclo de vida de uma execução de agente em produção</text>
  <text x="60" y="84" class="sub">Uma execução longa é uma cadeia de passos recuperáveis, não um único pedido enorme.</text>

  <rect class="box" x="70" y="150" width="150" height="88" fill="#e3f2fd" stroke="#2980b9" />
  <text x="104" y="184" class="step">1. Arranque</text>
  <text x="98" y="209" class="sub">carregar estado</text>
  <text x="98" y="227" class="sub">montar workspace</text>

  <rect class="box" x="270" y="150" width="150" height="88" fill="#f3e5f5" stroke="#6a1b9a" />
  <text x="303" y="184" class="step">2. Planear</text>
  <text x="298" y="209" class="sub">testes de aceitação</text>
  <text x="298" y="227" class="sub">limites de orçamento</text>

  <rect class="box" x="470" y="150" width="150" height="88" fill="#fff3e0" stroke="#e67e22" />
  <text x="500" y="184" class="step">3. Executar</text>
  <text x="498" y="209" class="sub">ferramentas e código</text>
  <text x="498" y="227" class="sub">verificações de política</text>

  <rect class="box" x="670" y="150" width="150" height="88" fill="#e8f5e9" stroke="#27ae60" />
  <text x="696" y="184" class="step">4. Checkpoint</text>
  <text x="700" y="209" class="sub">registo de eventos</text>
  <text x="700" y="227" class="sub">diff do workspace</text>

  <rect class="box" x="870" y="150" width="150" height="88" fill="#ffffff" stroke="#c62828" />
  <text x="902" y="184" class="step">5. Avaliar</text>
  <text x="898" y="209" class="sub">testes, revisor</text>
  <text x="898" y="227" class="sub">concluído ou repetir</text>

  <path class="arrow" d="M220 194 H270" />
  <path class="arrow" d="M420 194 H470" />
  <path class="arrow" d="M620 194 H670" />
  <path class="arrow" d="M820 194 H870" />

  <path class="arrow" d="M945 238 C945 325 548 334 548 244" />
  <text x="610" y="337" class="sub">não concluído: retomar do último checkpoint válido</text>

  <rect class="box" x="195" y="430" width="230" height="82" fill="#ffffff" stroke="#2980b9" />
  <text x="237" y="462" class="step">Falha ou reimplementação</text>
  <text x="232" y="488" class="sub">novo worker lê o mesmo id de sessão</text>

  <rect class="box" x="475" y="430" width="230" height="82" fill="#ffffff" stroke="#e67e22" />
  <text x="521" y="462" class="step">Aprovação humana</text>
  <text x="518" y="488" class="sub">grafo em pausa, sem compute faturado</text>

  <rect class="box" x="755" y="430" width="230" height="82" fill="#ffffff" stroke="#27ae60" />
  <text x="807" y="462" class="step">Pacote de replay</text>
  <text x="792" y="488" class="sub">prompt, eventos, traces, artefactos</text>

  <path class="soft" d="M310 430 C310 348 405 303 520 244" />
  <path class="soft" d="M590 430 C590 345 640 300 722 244" />
  <path class="soft" d="M870 430 C870 345 858 296 806 244" />
</svg>
