  <g font-size="12" text-anchor="middle">
    <text y="140" fill="#166534" x="370">processo web</text>
    <text y="140" fill="#166534" x="585">processo web</text>
    <text y="140" fill="#166534" x="800">memória de processamento</text>
    <text y="140" fill="#1d4ed8" x="1015">registos web</text>
  </g>

  <!-- Row 2: Queue + worker + DB (y_rect=162, y_text=184) -->
  <text y="184" font-size="13" font-weight="600" fill="#0f172a" x="30">2. Fila + trabalhador + BD</text>
