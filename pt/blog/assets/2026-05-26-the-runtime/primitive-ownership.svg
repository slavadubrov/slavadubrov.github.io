    <text y="96" x="370">HARNESS</text>
    <text y="96" x="585">SANDBOX</text>
    <text y="96" x="800">SESSÃO + CHECKPOINT</text>
    <text y="96" x="1015">TRAÇADO</text>
  </g>
  <line x1="20" y1="106" x2="1120" y2="106" stroke="#2563eb" stroke-width="1" />

  <!-- Row 1: SDK in app server (y_rect=118, y_text=140) -->
  <text y="140" font-size="13" font-weight="600" fill="#0f172a" x="30">1. SDK no servidor da aplicação</text>
  <g filter="url(#ds4)">
