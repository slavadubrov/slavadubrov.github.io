<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 540" font-family="Inter, system-ui, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Formas de implementação pelo ponto ótimo de comprimento de execução</title>
  <desc id="artifact-desc">Formas de implementação pelo ponto ótimo de comprimento de execução.</desc>
  <defs>
    <filter id="ds3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#334155" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="980" height="540" fill="#f8fafc" />

  <text y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a" x="490">Formas de implementação pelo ponto ótimo de comprimento de execução</text>
  <text y="56" text-anchor="middle" font-size="12" fill="#334155" x="490">Cada barra indica onde a forma funciona bem; as secções desbotadas representam áreas de expansão.</text>

  <!-- Time axis -->
  <line x1="120" y1="490" x2="940" y2="490" stroke="#94a3b8" stroke-width="1.5" />
  <!-- Ticks -->
  <g font-size="11" fill="#334155" text-anchor="middle">
    <line x1="120" y1="486" x2="120" y2="494" stroke="#94a3b8" />
    <text y="512" x="120">0 s</text>
    <line x1="240" y1="486" x2="240" y2="494" stroke="#94a3b8" />
    <text y="512" x="240">30 s</text>
    <line x1="360" y1="486" x2="360" y2="494" stroke="#94a3b8" />
    <text y="512" x="360">5 minutos</text>
    <line x1="500" y1="486" x2="500" y2="494" stroke="#94a3b8" />
    <text y="512" x="500">60 min</text>
    <line x1="640" y1="486" x2="640" y2="494" stroke="#94a3b8" />
    <text y="512" x="640">5 h</text>
    <line x1="780" y1="486" x2="780" y2="494" stroke="#94a3b8" />
    <text y="512" x="780">24 h</text>
    <line x1="920" y1="486" x2="920" y2="494" stroke="#94a3b8" />
    <text y="512" x="920">7 dias</text>
  </g>
  <text y="530" text-anchor="middle" font-size="11" fill="#334155" font-style="italic" x="490">comprimento de sequência →</text>

  <!-- Row helpers: y positions for each bar -->
  <!-- 1) SDK in app server: 0-30s sweet, 30s-60min stretch -->
  <g filter="url(#ds3)">
    <rect x="120" y="90" width="120" height="26" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.4" />
    <rect x="240" y="90" width="260" height="26" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.4" opacity="0.45" />
    <text y="108" font-size="12" font-weight="600" fill="#1d4ed8" x="135">SDK no servidor da aplicação</text>
  </g>
  <text y="108" font-size="11" fill="#334155" x="510">pedido de sincronização; perdido devido a falha</text>

  <!-- 2) Queue + worker + checkpoint DB: 30s-5h sweet, 5h-24h stretch -->
  <g filter="url(#ds3)">
    <rect x="240" y="130" width="400" height="26" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1.4" />
    <rect x="640" y="130" width="140" height="26" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1.4" opacity="0.5" />
    <text y="148" font-size="12" font-weight="600" fill="#166534" x="255">Fila + trabalhador + base de dados de ponto de verificação ← pilha de referência</text>
  </g>

  <!-- 3) Durable workflow (Temporal): 60min-7days sweet -->
  <g filter="url(#ds3)">
    <rect x="500" y="170" width="420" height="26" rx="6" fill="#faf5ff" stroke="#2563eb" stroke-width="1.4" />
    <text y="188" font-size="12" font-weight="600" fill="#1d4ed8" x="515">Motor de fluxo de trabalho duradouro (Temporal)</text>
  </g>

  <!-- 4) Sandbox-per-session (E2B/Daytona/etc.): 30s-24h -->
  <g filter="url(#ds3)">
    <rect x="240" y="210" width="540" height="26" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.4" />
    <text y="228" font-size="12" font-weight="600" fill="#991b1b" x="255">Sandbox por sessão (E2B · Daytona · Modal · Runloop · Vercel)</text>
  </g>

  <!-- 5) Anthropic Managed Agents -->
  <g filter="url(#ds3)">
    <rect x="240" y="250" width="540" height="26" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.4" />
    <text y="268" font-size="12" font-weight="600" fill="#5b21b6" x="255">Agentes Geridos pela Anthropic · 0,08 $/hora de sessão, gratuito em estado inativo</text>
  </g>

  <!-- 6) Deep Agents Deploy -->
  <g filter="url(#ds3)">
    <rect x="240" y="290" width="560" height="26" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.4" />
    <text y="308" font-size="12" font-weight="600" fill="#1d4ed8" x="255">Implantação de LangChain Deep Agents · backend de sandbox alternável</text>
  </g>

  <!-- 7) Cloud Run service -->
  <g filter="url(#ds3)">
    <rect x="120" y="330" width="380" height="26" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.4" />
    <text y="348" font-size="12" font-weight="600" fill="#1d4ed8" x="135">Serviço Cloud Run · até 60 min HTTP</text>
  </g>

  <!-- 8) Cloud Run job -->
  <g filter="url(#ds3)">
    <rect x="360" y="370" width="560" height="26" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.4" />
    <text y="388" font-size="12" font-weight="600" fill="#1d4ed8" x="375">Tarefa no Cloud Run · máximo 7 dias; tarefas com GPU máximo 1 hora</text>
  </g>

  <!-- 9) Lambda (wrong tool) -->
  <g filter="url(#ds3)">
    <rect x="120" y="410" width="220" height="26" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.4" />
    <text y="428" font-size="12" font-weight="600" fill="#991b1b" x="135">AWS Lambda · limite rígido de 15 minutos — ferramenta inadequada</text>
  </g>

  <!-- 10) Fargate task / K8s Job -->
  <g filter="url(#ds3)">
    <rect x="240" y="450" width="680" height="26" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1.4" />
    <text y="468" font-size="12" font-weight="600" fill="#166534" x="255">Tarefa Fargate · Job K8s · sem limite documentado, a durabilidade depende de si</text>
  </g>

  <!-- Vertical guides -->
  <line x1="240" y1="80" x2="240" y2="486" stroke="#2563eb" stroke-dasharray="3 3" />
  <line x1="500" y1="80" x2="500" y2="486" stroke="#2563eb" stroke-dasharray="3 3" />
  <line x1="780" y1="80" x2="780" y2="486" stroke="#2563eb" stroke-dasharray="3 3" />
</svg>
