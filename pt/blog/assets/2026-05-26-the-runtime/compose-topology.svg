<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="ds4" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12" />
    </filter>
    <marker id="arr4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#37474f" />
    </marker>
  </defs>

  <rect width="960" height="560" fill="#f8f9fa" />

  <text x="480" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#263238">Topologia de referência Docker Compose</text>
  <text x="480" y="54" text-anchor="middle" font-size="13" fill="#546e7a">slavadubrov/market-analyst-agent · LangGraph + Claude + Postgres + Qdrant + MCP</text>

  <!-- Internal network boundary -->
  <rect x="40" y="80" width="880" height="450" rx="14" ry="14" fill="#ffffff" stroke="#cfd8dc" stroke-width="1.5" stroke-dasharray="6 4" />
  <text x="60" y="105" font-size="12" font-weight="600" fill="#607d8b" letter-spacing="0.5">REDE DOCKER · interna</text>

  <!-- agent-worker (center) -->
  <g filter="url(#ds4)">
    <rect x="380" y="180" width="200" height="100" rx="12" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" />
    <text x="480" y="208" text-anchor="middle" font-size="15" font-weight="700" fill="#0d47a1">agent-worker</text>
    <text x="480" y="228" text-anchor="middle" font-size="11" fill="#37474f">harness LangGraph</text>
    <text x="480" y="244" text-anchor="middle" font-size="11" fill="#546e7a">volume workspaces por thread_id</text>
    <text x="480" y="262" text-anchor="middle" font-size="11" fill="#546e7a">claude-sonnet-4-5</text>
  </g>

  <!-- postgres (left) -->
  <g filter="url(#ds4)">
    <rect x="80" y="200" width="160" height="70" rx="10" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.8" />
    <text x="160" y="226" text-anchor="middle" font-size="13" font-weight="700" fill="#4a148c">postgres</text>
    <text x="160" y="246" text-anchor="middle" font-size="11" fill="#37474f">checkpoints PostgresSaver</text>
    <text x="160" y="262" text-anchor="middle" font-size="10" fill="#546e7a">volume pgdata</text>
  </g>

  <!-- qdrant (left bottom) -->
  <g filter="url(#ds4)">
    <rect x="80" y="320" width="160" height="70" rx="10" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.8" />
    <text x="160" y="346" text-anchor="middle" font-size="13" font-weight="700" fill="#4a148c">qdrant</text>
    <text x="160" y="366" text-anchor="middle" font-size="11" fill="#37474f">memória fria · embeddings</text>
    <text x="160" y="382" text-anchor="middle" font-size="10" fill="#546e7a">volume qdrant_storage</text>
  </g>

  <!-- redis (top) -->
  <g filter="url(#ds4)">
    <rect x="380" y="120" width="200" height="44" rx="10" fill="#ede7f6" stroke="#5e35b1" stroke-width="1.8" />
    <text x="480" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#311b92">redis · fila de entrada</text>
  </g>

  <!-- mcp-sidecar (right) -->
  <g filter="url(#ds4)">
    <rect x="720" y="200" width="160" height="70" rx="10" fill="#fff3e0" stroke="#e65100" stroke-width="1.8" />
    <text x="800" y="226" text-anchor="middle" font-size="13" font-weight="700" fill="#bf360c">mcp-sidecar</text>
    <text x="800" y="246" text-anchor="middle" font-size="11" fill="#37474f">ferramentas · guarda tokens OAuth</text>
    <text x="800" y="262" text-anchor="middle" font-size="10" fill="#546e7a">worker nunca vê credenciais</text>
  </g>

  <!-- otel collector (bottom center) -->
  <g filter="url(#ds4)">
    <rect x="380" y="320" width="200" height="48" rx="10" fill="#fce4ec" stroke="#c62828" stroke-width="1.8" />
    <text x="480" y="350" text-anchor="middle" font-size="13" font-weight="700" fill="#b71c1c">otel-collector</text>
  </g>

  <!-- observability stack (right column bottom) -->
  <g filter="url(#ds4)">
    <rect x="640" y="320" width="240" height="170" rx="10" fill="#ffffff" stroke="#cfd8dc" stroke-width="1.4" />
    <text x="760" y="344" text-anchor="middle" font-size="12" font-weight="700" fill="#37474f">Observabilidade (opcional)</text>
    <rect x="660" y="360" width="90" height="32" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1.2" />
    <text x="705" y="380" text-anchor="middle" font-size="11" font-weight="600" fill="#b71c1c">tempo</text>
    <rect x="760" y="360" width="100" height="32" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1.2" />
    <text x="810" y="380" text-anchor="middle" font-size="11" font-weight="600" fill="#b71c1c">prometheus</text>
    <rect x="660" y="400" width="90" height="32" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1.2" />
    <text x="705" y="420" text-anchor="middle" font-size="11" font-weight="600" fill="#b71c1c">loki</text>
    <rect x="760" y="400" width="100" height="32" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1.2" />
    <text x="810" y="420" text-anchor="middle" font-size="11" font-weight="600" fill="#b71c1c">grafana</text>
    <text x="760" y="455" text-anchor="middle" font-size="10" fill="#546e7a">indexado por gen_ai.conversation.id</text>
    <text x="760" y="472" text-anchor="middle" font-size="10" fill="#546e7a">gen_ai.agent.name · gen_ai.usage.*</text>
  </g>

  <!-- Anthropic API (outside network) -->
  <g filter="url(#ds4)">
    <rect x="380" y="450" width="200" height="42" rx="10" fill="#ede7f6" stroke="#5e35b1" stroke-width="1.8" />
    <text x="480" y="476" text-anchor="middle" font-size="13" font-weight="700" fill="#311b92">API Anthropic · LLM</text>
  </g>
  <text x="480" y="510" text-anchor="middle" font-size="10" fill="#546e7a" font-style="italic">fora da rede Docker · chave API de .env / Vault</text>

  <!-- Connections -->
  <!-- worker -> postgres -->
  <path d="M380 230 L 240 230" fill="none" stroke="#37474f" stroke-width="1.4" marker-end="url(#arr4)" />
  <text x="305" y="222" text-anchor="middle" font-size="10" fill="#546e7a">checkpoints</text>

  <!-- worker -> qdrant -->
  <path d="M390 280 C 320 300 280 320 240 340" fill="none" stroke="#37474f" stroke-width="1.4" marker-end="url(#arr4)" />
  <text x="315" y="316" text-anchor="middle" font-size="10" fill="#546e7a">recuperação</text>

  <!-- redis -> worker -->
  <path d="M480 164 L 480 180" fill="none" stroke="#37474f" stroke-width="1.4" marker-end="url(#arr4)" />

  <!-- worker -> mcp -->
  <path d="M580 230 L 720 230" fill="none" stroke="#37474f" stroke-width="1.4" marker-end="url(#arr4)" />
  <text x="650" y="222" text-anchor="middle" font-size="10" fill="#546e7a">chamadas de ferramentas</text>

  <!-- worker -> otel -->
  <path d="M480 280 L 480 320" fill="none" stroke="#c62828" stroke-width="1.4" marker-end="url(#arr4)" stroke-dasharray="3 3" />
  <text x="500" y="305" font-size="10" fill="#c62828">spans</text>

  <!-- otel -> observability -->
  <path d="M580 344 L 640 360" fill="none" stroke="#c62828" stroke-width="1.4" marker-end="url(#arr4)" stroke-dasharray="3 3" />

  <!-- mcp -> otel  -->
  <path d="M800 270 C 800 300 600 330 580 345" fill="none" stroke="#c62828" stroke-width="1.2" marker-end="url(#arr4)" stroke-dasharray="3 3" />

  <!-- worker -> anthropic API (downward, exiting network) -->
  <path d="M480 280 C 480 410 480 430 480 450" fill="none" stroke="#5e35b1" stroke-width="1.4" marker-end="url(#arr4)" stroke-dasharray="5 4" opacity="0.65" />
  <text x="500" y="425" font-size="10" fill="#5e35b1">chamada do modelo</text>
</svg>
