<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">A saída do modelo é traduzida para um comando de domínio e verificada por regras determinísticas</title>
  <desc id="desc">Um modelo emite uma proposta tipada e não confiável. Uma fronteira de aplicação analisa-a e normaliza-a, autoriza o agente envolvido, invoca um agregado e salva o estado aceite através de um evento de saída. Cada fase rejeitada retorna um erro distinto.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="480" rx="22" fill="#0f172a" />
  <text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Uma proposta escrita ainda não constitui uma operação comercial válida</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(25 120)"><rect width="155" height="125" rx="14" fill="#5b21b6" stroke="#2563eb" stroke-width="2" /><text x="77" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#c4b5fd">Adaptador de modelo</text><text x="77" y="70" text-anchor="middle" font-size="12" fill="#c4b5fd">EnviarPropostaDeTarefa</text><text x="77" y="94" text-anchor="middle" font-size="12" fill="#94a3b8">valores não fidedignos</text></g>
    <text x="202" y="192" text-anchor="middle" font-size="25" fill="#94a3b8">→</text>
    <g transform="translate(225 120)"><rect width="155" height="125" rx="14" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="77" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Analise e normalização</text><text x="77" y="70" text-anchor="middle" font-size="12" fill="#93c5fd">forma, data, unidades</text><text x="77" y="94" text-anchor="middle" font-size="12" fill="#94a3b8">contexto fidedigno</text></g>
    <text x="402" y="192" text-anchor="middle" font-size="25" fill="#94a3b8">→</text>
    <g transform="translate(425 120)"><rect width="155" height="125" rx="14" fill="#9a3412" stroke="#ea580c" stroke-width="2" /><text x="77" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#fdba74">Autenticar</text><text x="77" y="70" text-anchor="middle" font-size="12" fill="#fdba74">ator + proprietário</text><text x="77" y="94" text-anchor="middle" font-size="12" fill="#94a3b8">alcance da operação</text></g>
    <text x="602" y="192" text-anchor="middle" font-size="25" fill="#94a3b8">→</text>
    <g transform="translate(625 120)"><rect width="155" height="125" rx="14" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="77" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Agregar</text><text x="77" y="70" text-anchor="middle" font-size="12" fill="#93c5fd">impor invariante</text><text x="77" y="94" text-anchor="middle" font-size="12" fill="#94a3b8">gerar evento de domínio</text></g>
    <text x="802" y="192" text-anchor="middle" font-size="25" fill="#94a3b8">→</text>
    <g transform="translate(825 120)"><rect width="150" height="125" rx="14" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="75" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Cometer</text><text x="75" y="70" text-anchor="middle" font-size="12" fill="#93c5fd">estado + caixa de saída</text><text x="75" y="94" text-anchor="middle" font-size="12" fill="#94a3b8">uma transação</text></g>

    <rect x="100" y="320" width="800" height="85" rx="14" fill="#991b1b" stroke="#dc2626" />
    <text x="500" y="351" text-anchor="middle" font-size="16" font-weight="700" fill="#fca5a5">Rejeitar com uma falha específica antes da persistência</text>
    <text x="500" y="382" text-anchor="middle" font-size="13" fill="#fca5a5">proposta inválida • contexto em falta • ator não autorizado • conflito de domínio • atualização concorrente</text>
    <text x="500" y="447" text-anchor="middle" font-size="13" fill="#94a3b8">A validação de esquema controla a representação. O agregado controla o significado comercial.</text>
  </g>
</svg>
