<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 350" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">LLM</title>
  <desc id="artifact-desc">LLM.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#334155" flood-opacity="0.08" />
    </filter>
    <linearGradient id="grad-llm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #c4b5fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #c4b5fd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-acl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #86efac;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #86efac;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-domain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #93c5fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #93c5fd;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>


  <rect width="100%" height="100%" fill="#f8fafc" /><g transform="translate(50, 50)" filter="url(#shadow)">

    <rect width="200" height="250" rx="20" fill="url(#grad-llm)" stroke="#7c3aed" stroke-width="2" />
    <text y="40" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="bold" fill="#5b21b6" text-anchor="middle" x="100">LLM</text>
    <text y="65" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#5b21b6" text-anchor="middle" x="100">Probabilístico/Creativo</text>


    <rect x="30" y="90" width="140" height="120" fill="#ffffff" rx="5" stroke="#7c3aed" />
    <text y="115" font-family="SFMono-Regular, Consolas, monospace" font-size="11" fill="#334155" x="40">"Claro! Vou adicionar</text>
    <text y="130" font-family="SFMono-Regular, Consolas, monospace" font-size="11" fill="#334155" x="40">uma tarefa de compra</text>
    <text y="145" font-family="SFMono-Regular, Consolas, monospace" font-size="11" fill="#334155" x="40">leite..."</text>
    <text y="230" font-family="Inter, system-ui, sans-serif" font-size="12" font-style="italic" fill="#7c3aed" text-anchor="middle" x="100">(Nestruturado)</text>
  </g>


  <g transform="translate(325, 50)" filter="url(#shadow)">
    <rect width="200" height="250" rx="10" fill="url(#grad-acl)" stroke="#16a34a" stroke-width="2" />
    <text y="40" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="bold" fill="#166534" text-anchor="middle" x="100">Combate à Corrupção</text>
    <text y="60" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="bold" fill="#166534" text-anchor="middle" x="100">Camada</text>

    <g transform="translate(25, 90)">
      <rect width="150" height="30" rx="5" fill="#ffffff" stroke="#16a34a" />
      <text y="20" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#166534" text-anchor="middle" x="75">1. Validar Esquema</text>
    </g>
    <g transform="translate(25, 130)">
      <rect width="150" height="30" rx="5" fill="#ffffff" stroke="#16a34a" />
      <text y="20" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#166534" text-anchor="middle" x="75">2. Sanitização de Valores</text>
    </g>
    <g transform="translate(25, 170)">
      <rect width="150" height="30" rx="5" fill="#ffffff" stroke="#16a34a" />
      <text y="20" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#166534" text-anchor="middle" x="75">3. Traduzir para Domínio</text>
    </g>
  </g>


  <g transform="translate(600, 50)" filter="url(#shadow)">
    <rect width="200" height="250" rx="5" fill="url(#grad-domain)" stroke="#2563eb" stroke-width="2" />
    <text y="40" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="bold" fill="#1d4ed8" text-anchor="middle" x="100">Modelo de Domínio</text>
    <text y="65" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#1d4ed8" text-anchor="middle" x="100">Determinístico / Seguro</text>

    <rect x="30" y="90" width="140" height="120" fill="#ffffff" rx="2" stroke="#2563eb" />
    <text y="115" font-family="SFMono-Regular, Consolas, monospace" font-size="11" fill="#1d4ed8" x="40">Tarefa(</text>
    <text y="130" font-family="SFMono-Regular, Consolas, monospace" font-size="11" fill="#1d4ed8" x="50">id="123",</text>
    <text y="145" font-family="SFMono-Regular, Consolas, monospace" font-size="11" fill="#1d4ed8" x="50">desc="comprar leite"</text>
    <text y="160" font-family="SFMono-Regular, Consolas, monospace" font-size="11" fill="#1d4ed8" x="40">)</text>

    <text y="230" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold" fill="#2563eb" text-anchor="middle" x="100">Entidade Válida</text>
  </g>


  <path d="M 250 150 L 325 150" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)" />
  <path d="M 525 150 L 600 150" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)" />


  <path d="M 325 250 L 250 250" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead-red)" />
  <text y="240" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#dc2626" text-anchor="middle" x="287">Tentar novamente</text>

</svg>
