<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 430" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Contextos de gestão de tarefas, agendamento e notificações</title>
  <desc id="desc">A Gestão de Tarefas é o domínio principal. Ela utiliza um contexto de Agendamento como suporte e publica factos consumidos por um contexto de Notificação genérico através de contratos explícitos.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="430" rx="22" fill="#0f172a" />
  <text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Mapa de contexto do assistente de tarefas</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(35 120)"><rect width="250" height="190" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="125" y="42" text-anchor="middle" font-size="18" font-weight="700" fill="#93c5fd">Agendamento</text><text x="125" y="72" text-anchor="middle" font-size="13" fill="#93c5fd">Subdomínio de suporte</text><text x="32" y="116" font-size="13" fill="#cbd5e1">calendário</text><text x="32" y="145" font-size="13" fill="#cbd5e1">janela de tempo</text><text x="32" y="174" font-size="13" fill="#cbd5e1">disponibilidade</text></g>
    <text x="330" y="220" text-anchor="middle" font-size="11" fill="#94a3b8">data de contrato →</text>
    <g transform="translate(375 95)"><rect width="250" height="240" rx="16" fill="#9a3412" stroke="#ea580c" stroke-width="3" /><text x="125" y="46" text-anchor="middle" font-size="19" font-weight="700" fill="#fdba74">Gestão de Tarefas</text><text x="125" y="78" text-anchor="middle" font-size="13" fill="#fdba74">Domínio principal</text><text x="32" y="125" font-size="13" fill="#cbd5e1">tarefa e lista de tarefas</text><text x="32" y="156" font-size="13" fill="#cbd5e1">prazo final e prioridade</text><text x="32" y="187" font-size="13" fill="#cbd5e1">regras de completamento</text><text x="32" y="218" font-size="13" fill="#cbd5e1">Evento TaskAdded</text></g>
    <text x="670" y="220" text-anchor="middle" font-size="11" fill="#94a3b8">contrato de evento →</text>
    <g transform="translate(715 120)"><rect width="250" height="190" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="125" y="42" text-anchor="middle" font-size="18" font-weight="700" fill="#93c5fd">Notificações</text><text x="125" y="72" text-anchor="middle" font-size="13" fill="#93c5fd">Subdomínio genérico</text><text x="32" y="116" font-size="13" fill="#cbd5e1">entrega de e-mails</text><text x="32" y="145" font-size="13" fill="#cbd5e1">entrega por empurrão</text><text x="32" y="174" font-size="13" fill="#cbd5e1">comprovante de entrega</text></g>
    <text x="500" y="390" text-anchor="middle" font-size="13" fill="#94a3b8">O mapa de contexto descreve as relações de negócio; ele não exige que haja um agente por caixa.</text>
  </g>
</svg>
