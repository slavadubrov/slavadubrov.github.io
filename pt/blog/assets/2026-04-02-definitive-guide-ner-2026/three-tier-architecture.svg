<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" font-family="Inter, system-ui, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Arquitetura de NER de Produção em 3 Camadas</title>
  <desc id="artifact-desc">Arquitetura de NER de Produção em 3 Camadas.</desc>
  <defs>
    <marker id="a1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
    <marker id="a2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c" />
    </marker>
    <marker id="a3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a" x="440">Arquitetura de NER de Produção em 3 Camadas</text>

  <!-- Input -->
  <rect x="320" y="48" width="240" height="40" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" />
  <text y="73" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f172a" x="440">Documentos de Entrada</text>

  <!-- Router -->
  <line x1="440" y1="88" x2="440" y2="115" stroke="#94a3b8" stroke-width="2" marker-end="url(#a1)" />

  <rect x="330" y="118" width="220" height="40" rx="20" fill="#fff7ed" stroke="#ea580c" stroke-width="2" />
  <text y="143" text-anchor="middle" font-size="13" font-weight="bold" fill="#9a3412" x="440">Roteador de Complexidade</text>

  <!-- Three routing arrows -->
  <line x1="360" y1="158" x2="170" y2="200" stroke="#2563eb" stroke-width="2" marker-end="url(#a1)" />
  <line x1="440" y1="158" x2="440" y2="200" stroke="#ea580c" stroke-width="2" marker-end="url(#a2)" />
  <line x1="520" y1="158" x2="710" y2="200" stroke="#7c3aed" stroke-width="2" marker-end="url(#a3)" />

  <!-- Routing labels -->
  <text y="182" text-anchor="middle" font-size="10" fill="#1d4ed8" font-weight="bold" x="240">Tipos de entidades conhecidas (~90%)</text>
  <text y="190" text-anchor="middle" font-size="10" fill="#9a3412" font-weight="bold" x="440">Multi-tarefa</text>
  <text y="182" text-anchor="middle" font-size="10" fill="#5b21b6" font-weight="bold" x="640">Necessita de raciocínio (~10%)</text>

  <!-- Tier 1 -->
  <rect x="30" y="205" width="280" height="185" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text y="228" text-anchor="middle" font-size="14" font-weight="bold" fill="#1d4ed8" x="170">Nível 1: Modelos de codificador</text>

  <rect x="50" y="238" width="240" height="28" rx="4" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="257" text-anchor="middle" font-size="11" fill="#1d4ed8" x="170">Encoder cruzado GLiNER (&lt;30 tipos)</text>

  <rect x="50" y="272" width="240" height="28" rx="4" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="291" text-anchor="middle" font-size="11" fill="#1d4ed8" x="170">Bi-encoder GLiNER (30+ tipos)</text>

  <rect x="50" y="306" width="240" height="28" rx="4" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="325" text-anchor="middle" font-size="11" fill="#1d4ed8" x="170">ONNX + INT8 / gline-rs</text>

  <rect x="50" y="348" width="115" height="32" rx="4" fill="#f0fdf4" stroke="#166534" stroke-width="1" />
  <text y="362" text-anchor="middle" font-size="10" fill="#166534" font-weight="bold" x="107">Latência de 50 ms</text>
  <text y="374" text-anchor="middle" font-size="9" fill="#166534" x="107">0,10 $/h por CPU</text>

  <rect x="175" y="348" width="115" height="32" rx="4" fill="#f0fdf4" stroke="#166534" stroke-width="1" />
  <text y="362" text-anchor="middle" font-size="10" fill="#166534" font-weight="bold" x="232">93,4% F1</text>
  <text y="374" text-anchor="middle" font-size="9" fill="#166534" x="232">ajustado com fine-tuning</text>

  <!-- Tier 2 -->
  <rect x="330" y="205" width="220" height="185" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2" />
  <text y="228" text-anchor="middle" font-size="14" font-weight="bold" fill="#9a3412" x="440">Nível 2: GLiNER 2</text>

  <rect x="345" y="238" width="190" height="28" rx="4" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="257" text-anchor="middle" font-size="11" fill="#9a3412" x="440">NER</text>

  <rect x="345" y="272" width="190" height="28" rx="4" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="291" text-anchor="middle" font-size="11" fill="#9a3412" x="440">Classificação</text>

  <rect x="345" y="306" width="190" height="28" rx="4" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="325" text-anchor="middle" font-size="11" fill="#9a3412" x="440">Extração de Relações</text>

  <rect x="345" y="348" width="190" height="32" rx="4" fill="#f0fdf4" stroke="#166534" stroke-width="1" />
  <text y="362" text-anchor="middle" font-size="10" fill="#166534" font-weight="bold" x="440">130-208 ms (qualquer etiqueta #)</text>
  <text y="374" text-anchor="middle" font-size="9" fill="#166534" x="440">205M de parâmetros, CPU</text>

  <!-- Tier 3 -->
  <rect x="570" y="205" width="280" height="185" rx="10" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" />
  <text y="228" text-anchor="middle" font-size="14" font-weight="bold" fill="#5b21b6" x="710">Nível 3: LLMs</text>

  <rect x="590" y="238" width="240" height="28" rx="4" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text y="257" text-anchor="middle" font-size="11" fill="#5b21b6" x="710">Instrutor (APIs em nuvem)</text>

  <rect x="590" y="272" width="240" height="28" rx="4" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text y="291" text-anchor="middle" font-size="11" fill="#5b21b6" x="710">Esboços (modelos locais)</text>

  <rect x="590" y="306" width="240" height="28" rx="4" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text y="325" text-anchor="middle" font-size="11" fill="#5b21b6" x="710">Entidades implícitas, raciocínio</text>

  <rect x="590" y="348" width="115" height="32" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1" />
  <text y="362" text-anchor="middle" font-size="10" fill="#991b1b" font-weight="bold" x="647">200 ms a 2 s</text>
  <text y="374" text-anchor="middle" font-size="9" fill="#991b1b" x="647">GPU a 8$/hora</text>

  <rect x="715" y="348" width="115" height="32" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1" />
  <text y="362" text-anchor="middle" font-size="10" fill="#991b1b" font-weight="bold" x="772">Precisão de 100%</text>
  <text y="374" text-anchor="middle" font-size="9" fill="#991b1b" x="772">em tarefas complexas</text>

  <!-- LLM-as-teacher feedback loop -->
  <path d="M 710 390 L 710 440 L 170 440 L 170 390" fill="none" stroke="#166534" stroke-width="2" stroke-dasharray="6" marker-end="url(#a1)" />
  <rect x="340" y="428" width="200" height="24" rx="4" fill="#f0fdf4" stroke="#166534" stroke-width="1" />
  <text y="444" text-anchor="middle" font-size="10" fill="#166534" font-weight="bold" x="440">Pipeline de LLMs como Professores</text>

  <!-- Bottom summary -->
  <rect x="130" y="470" width="620" height="40" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1" />
  <text y="490" text-anchor="middle" font-size="11" fill="#0f172a" x="440">LLMs de Nível 3 geram dados de treino → ajustam os codificadores de Nível 1 → reduzem os custos 80 vezes, mantendo precisão igual ou superior</text>
  <text y="504" text-anchor="middle" font-size="10" fill="#64748b" x="440">Os mesmos LLMs que lidam com os 10% mais difíceis também treinam os modelos que tratam dos 90% mais fáceis.</text>
</svg>
