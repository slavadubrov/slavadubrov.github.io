<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Agent interoperability protocol stack</title>
  <desc id="desc">Diagram showing MCP for tool access, A2A for agent delegation, OASF or directories for discovery, and AP2 or UCP for commerce authorization.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#1f2937" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="960" height="560" fill="#f8fafc"/>
  <text x="480" y="46" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#111827">Four boundaries, four different jobs</text>
  <text x="480" y="76" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#475569">Do not make one protocol carry tool access, delegation, discovery, and payment proof.</text>

  <g filter="url(#shadow)">
    <rect x="60" y="132" width="190" height="116" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
    <text x="155" y="166" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f3d68">MCP</text>
    <text x="155" y="195" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#1f2937">Tools, resources,</text>
    <text x="155" y="216" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#1f2937">prompts, sampling</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="300" y="132" width="190" height="116" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
    <text x="395" y="166" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#14532d">A2A</text>
    <text x="395" y="195" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#1f2937">Agent cards, tasks,</text>
    <text x="395" y="216" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#1f2937">streaming, auth state</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="540" y="132" width="190" height="116" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="2"/>
    <text x="635" y="166" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#7c2d12">Directories</text>
    <text x="635" y="195" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#1f2937">OASF, identity,</text>
    <text x="635" y="216" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#1f2937">capability discovery</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="770" y="132" width="130" height="116" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2"/>
    <text x="835" y="166" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#581c87">AP2/UCP</text>
    <text x="835" y="195" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#1f2937">Mandates,</text>
    <text x="835" y="216" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#1f2937">checkout proof</text>
  </g>

  <path d="M250 190 H300" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M490 190 H540" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M730 190 H770" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="115" y="335" width="730" height="120" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="480" y="371" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#111827">Composed workflow</text>
    <text x="480" y="404" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#334155">Discover a merchant agent, delegate checkout over A2A, call catalog and cart tools through MCP,</text>
    <text x="480" y="429" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#334155">then bind payment to a signed AP2-style mandate so the remote agent cannot improvise authority.</text>
  </g>

  <path d="M155 248 C155 295 260 302 320 335" fill="none" stroke="#1565c0" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M395 248 C395 290 430 304 455 335" fill="none" stroke="#2e7d32" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M635 248 C635 290 595 304 565 335" fill="none" stroke="#e65100" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M835 248 C835 295 720 302 650 335" fill="none" stroke="#6a1b9a" stroke-width="2.5" marker-end="url(#arrow)"/>

  <text x="480" y="512" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748b">Rule of thumb: use MCP inside an agent, A2A between agents, directories to find agents, and AP2/UCP when money or delegated authority enters the path.</text>
</svg>
