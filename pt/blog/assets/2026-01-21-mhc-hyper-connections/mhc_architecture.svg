<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 680" style="background-color: #f8fafc; font-family: Inter, system-ui, sans-serif;" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">mHC: Hiperconexões Constrainidas por Manifolds</title>
  <desc id="artifact-desc">mHC: Hiperconexões Constrainidas por Manifolds.</desc>
  <defs>
    <!-- Background grid -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#e2e8f0" stroke-width="0.5" />
    </pattern>

    <!-- Markers for arrows -->
    <marker id="arrowSlate" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#334155" />
    </marker>
    <marker id="arrowEmerald" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#16a34a" />
    </marker>

    <!-- Flow Filters -->
    <filter id="glowPurple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="0.8" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glowEmerald" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="0.8" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background Layer -->
  <rect width="1000" height="680" fill="#f8fafc" />

  <!-- Top Title -->
  <text y="50" font-size="28" font-weight="800" fill="#0f172a" x="40">mHC: Hiperconexões Constrainidas por Manifolds</text>
  <text y="80" font-size="16" fill="#334155" x="40">Três mapeamentos aprendíveis com restrições explícitas de estabilidade.</text>

  <!-- Left Side: Architecture Diagram -->
  <g transform="translate(50, 110)">

    <!-- Grouped Background Block -->
    <rect x="0" y="50" width="460" height="460" rx="16" fill="#ffffff" fill-opacity="0.8" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="8 4" filter="url(#shadow)" />
    <text y="80" text-anchor="middle" font-size="16" font-weight="700" fill="#334155" letter-spacing="1" x="230">bloco de camada MHC</text>

    <!-- Static Paths -->
    <g fill="none" stroke-width="2.5" opacity="0.4">
      <!-- Input to Split -->
      <path d="M 230 40 L 230 115" stroke="#94a3b8" />

      <!-- Split to Residual (Left) -->
      <path d="M 230 115 Q 230 125 215 125 L 125 125 Q 110 125 110 135 L 110 210" stroke="#16a34a" marker-end="url(#arrowEmerald)" />

      <!-- Split to Aggregation (Right) -->
      <path d="M 230 115 Q 230 125 245 125 L 335 125 Q 350 125 350 135" stroke="#94a3b8" marker-end="url(#arrowSlate)" />

      <!-- Aggregation -> Transformer -->
      <path d="M 350 200 L 350 230" stroke="#94a3b8" marker-end="url(#arrowSlate)" />

      <!-- Transformer -> Expansion -->
      <path d="M 350 290 L 350 315" stroke="#94a3b8" marker-end="url(#arrowSlate)" />

      <!-- Expansion -> Meet -->
      <path d="M 350 380 L 350 400 Q 350 410 335 410 L 245 410 Q 230 410 230 420 L 230 426" stroke="#7c3aed" />

      <!-- Residual -> Meet -->
      <path d="M 110 310 L 110 400 Q 110 410 125 410 L 215 410 Q 230 410 230 420 L 230 426" stroke="#16a34a" />

      <!-- Meet -> Output Streams -->
      <path d="M 230 454 L 230 520" stroke="#94a3b8" marker-end="url(#arrowSlate)" />
    </g>

    <!-- Animated Flow Particles -->
    <g>
      <!-- Main Path Particle -->


      <!-- Residual Path Particle -->

    </g>

    <!-- Blocks -->
    <!-- Input Streams Box -->
    <g transform="translate(150, 0)">
      <rect x="0" y="0" width="160" height="40" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
      <text y="25" text-anchor="middle" font-size="15" font-weight="700" fill="#2563eb" x="65">Fluxos de Entrada</text>
      <text y="25" font-size="15" font-weight="700" fill="#2563eb" x="135">H<tspan baseline-shift="super" font-size="10">l-1</tspan></text>
    </g>

    <!-- Residual Box (H^{res}) -->
    <g transform="translate(25, 210)">
      <rect x="0" y="0" width="170" height="100" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2.5" filter="url(#shadow)" />
      <text y="28" text-anchor="middle" font-size="16" font-weight="800" fill="#166534" x="85">H<tspan baseline-shift="super" font-size="10">resolução</tspan></text>
      <text y="48" text-anchor="middle" font-size="13" font-weight="600" fill="#166534" x="85">Mistura Residual</text>

      <!-- Sinkhorn badge inside H_res -->
      <rect x="20" y="60" width="130" height="28" rx="6" fill="#16a34a" />
      <text y="78" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700" x="85">Sinkhorn-Knopp</text>
    </g>

    <!-- Aggregation Box -->
    <g transform="translate(270, 135)">
      <rect x="0" y="0" width="160" height="65" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadow)" />
      <text y="22" text-anchor="middle" font-size="15" font-weight="800" fill="#9a3412" x="80">H<tspan baseline-shift="super" font-size="10">pré</tspan> <tspan font-weight="600" fill="#9a3412" font-size="13">(Agrupamento)</tspan></text>
      <text y="40" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="80">Comprimir fluxo de n → 1</text>
      <text y="56" text-anchor="middle" font-size="11" font-weight="600" fill="#ea580c" x="80">σ(·) → não negativo</text>
    </g>

    <!-- Transformer Box -->
    <g transform="translate(270, 230)">
      <rect x="0" y="0" width="160" height="60" rx="8" fill="#ffffff" stroke="#334155" stroke-width="2.5" filter="url(#shadow)" />
      <text y="28" text-anchor="middle" font-size="15" font-weight="800" fill="#0f172a" x="80">FFN do Transformer</text>
      <text y="48" text-anchor="middle" font-size="13" font-weight="500" fill="#334155" x="80">ou Atenção T(·)</text>
    </g>

    <!-- Expansion Box -->
    <g transform="translate(270, 315)">
      <rect x="0" y="0" width="160" height="65" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)" />
      <text y="22" text-anchor="middle" font-size="15" font-weight="800" fill="#5b21b6" x="80">H<tspan baseline-shift="super" font-size="10">publicação</tspan> <tspan font-weight="600" fill="#5b21b6" font-size="13">(Expansão)</tspan></text>
      <text y="40" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6" x="80">Emissão 1 → n fluxos</text>
      <text y="56" text-anchor="middle" font-size="11" font-weight="600" fill="#7c3aed" x="80">σ(·) → não negativo</text>
    </g>

    <!-- Addition Node -->
    <circle cx="230" cy="440" r="14" fill="#ffffff" stroke="#334155" stroke-width="2" />
    <text y="446" text-anchor="middle" font-size="18" font-weight="800" fill="#0f172a" x="230">+</text>

    <!-- Output Streams -->
    <g transform="translate(150, 520)">
      <rect x="0" y="0" width="160" height="40" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
      <text y="25" text-anchor="middle" font-size="15" font-weight="700" fill="#7c3aed" x="65">Fluxos de Saída</text>
      <text y="25" font-size="15" font-weight="700" fill="#7c3aed" x="140">H<tspan baseline-shift="super" font-size="10">l</tspan></text>
    </g>
  </g>

  <!-- Right Side: Explanations -->
  <g transform="translate(540, 110)">

    <!-- Doubly Stochastic Constraint Explainer -->
    <rect x="0" y="0" width="420" height="225" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)" />
    <text y="30" text-anchor="middle" font-size="16" font-weight="800" fill="#0f172a" x="210">Restrição Estocástica Dupla</text>
    <line x1="20" y1="45" x2="400" y2="45" stroke="#e2e8f0" stroke-width="2" />

    <!-- Matrix representation -->
    <g transform="translate(30, 65)">
      <rect x="0" y="0" width="100" height="100" rx="4" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" />
      <line x1="33" y1="0" x2="33" y2="100" stroke="#cbd5e1" stroke-width="1" />
      <line x1="66" y1="0" x2="66" y2="100" stroke="#cbd5e1" stroke-width="1" />
      <line x1="0" y1="33" x2="100" y2="33" stroke="#cbd5e1" stroke-width="1" />
      <line x1="0" y1="66" x2="100" y2="66" stroke="#cbd5e1" stroke-width="1" />

      <g font-family="SFMono-Regular, Consolas, monospace" font-size="13" font-weight="600" fill="#334155" text-anchor="middle">
        <text y="22" x="16.5">0,2</text> <text y="22" x="50">0,5</text> <text y="22" x="83.5">0,3</text>
        <text y="55" x="16.5">0,4</text> <text y="55" x="50">0,1</text> <text y="55" x="83.5">0,5</text>
        <text y="88" x="16.5">0,4</text> <text y="88" x="50">0,4</text> <text y="88" x="83.5">0,2</text>
      </g>

      <g font-size="13" font-weight="800" fill="#166534">
        <text y="22" x="115">=1</text> <text y="55" x="115">=1</text> <text y="88" x="115">=1</text>
        <text y="120" text-anchor="middle" x="16.5">=1</text> <text y="120" text-anchor="middle" x="50">=1</text> <text y="120" text-anchor="middle" x="83.5">=1</text>
      </g>
    </g>

    <!-- Checklist -->
    <g transform="translate(180, 75)">
      <!-- Checkmarks -->
      <g fill="#16a34a">
        <circle cx="0" cy="-4" r="8" />
        <path d="M -3 -4 L -1 -1 L 4 -6" stroke="#e2e8f0" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" />
      </g>
      <text y="0" font-size="14" font-weight="600" fill="#334155" x="15">Todas as entradas ≥ 0</text>

      <g fill="#16a34a" transform="translate(0, 28)">
        <circle cx="0" cy="-4" r="8" />
        <path d="M -3 -4 L -1 -1 L 4 -6" stroke="#e2e8f0" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" />
      </g>
      <text y="28" font-size="14" font-weight="600" fill="#334155" x="15">Cada linha soma 1</text>

      <g fill="#16a34a" transform="translate(0, 56)">
        <circle cx="0" cy="-4" r="8" />
        <path d="M -3 -4 L -1 -1 L 4 -6" stroke="#e2e8f0" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" />
      </g>
      <text y="56" font-size="14" font-weight="600" fill="#334155" x="15">Cada coluna soma 1</text>

      <text y="96" font-size="15" font-weight="800" fill="#0f172a" x="-15">→ ||H<tspan baseline-shift="super" font-size="10">resolução</tspan>|| ≤ 1</text>
      <text y="96" font-size="13" font-weight="500" fill="#334155" x="80">(norma espectral)</text>

      <text y="122" font-size="15" font-weight="800" fill="#166534" x="-15">→ Sinal preservado matematicamente</text>
    </g>

    <!-- Formula Summary Box -->
    <rect x="0" y="240" width="420" height="95" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)" />
    <text y="268" text-anchor="middle" font-size="15" font-weight="800" fill="#0f172a" x="210">Fórmula completa da camada de MHC</text>

    <text y="295" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a" font-family="SFMono-Regular, Consolas, monospace" x="210">
        H<tspan baseline-shift="super" font-size="10">l</tspan> =
        <tspan fill="#166534">H<tspan baseline-shift="super" font-size="10">resolução</tspan></tspan>·H<tspan baseline-shift="super" font-size="10">l-1</tspan> +
        <tspan fill="#5b21b6">H<tspan baseline-shift="super" font-size="10">publicação</tspan></tspan>·T(
        <tspan fill="#9a3412">H<tspan baseline-shift="super" font-size="10">pré</tspan></tspan>·H<tspan baseline-shift="super" font-size="10">l-1</tspan> )
    </text>
    <text y="318" text-anchor="middle" font-size="12" fill="#334155" x="210">Onde H<tspan baseline-shift="super" font-size="9">resolução</tspan> ∈ Birkhoff Polytope (doubly stochastic)</text>


    <!-- Side-by-side Results Cards -->
    <g transform="translate(0, 350)">
      <!-- Stability Card -->
      <rect x="0" y="0" width="200" height="85" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)" />
      <text y="24" text-anchor="middle" font-size="14" font-weight="800" fill="#166534" x="100">Estabilidade Alcançada</text>
      <text y="44" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a" x="100">Amplificação Máxima do Sinal</text>
      <text y="60" text-anchor="middle" font-size="14" font-weight="800" fill="#166534" x="100">limitado a ~1,6×</text>
      <text y="76" text-anchor="middle" font-size="11" fill="#334155" x="100">(vs. explosão de ~3000x)</text>

      <!-- Efficiency Card -->
      <rect x="220" y="0" width="200" height="85" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadow)" />
      <text y="24" text-anchor="middle" font-size="14" font-weight="800" fill="#9a3412" x="320">Eficiência mantida</text>
      <text y="44" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a" x="320">Apenas 6,7% de computação</text>
      <text y="60" text-anchor="middle" font-size="14" font-weight="800" fill="#9a3412" x="320">custo de tempo de treino</text>
      <text y="76" text-anchor="middle" font-size="11" fill="#334155" x="320">através de fusão de kernels</text>
    </g>


    <!-- Legend Box -->
    <rect x="0" y="450" width="420" height="40" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />

    <g transform="translate(10, 474)">
      <circle cx="5" cy="-4" r="6" fill="#ea580c" />
      <text y="0" font-size="12" font-weight="600" fill="#334155" x="16">Agregação (restrição σ)</text>

      <circle cx="180" cy="-4" r="6" fill="#16a34a" />
      <text y="0" font-size="12" font-weight="600" fill="#334155" x="191">Roteamento Sinkhorn</text>

      <circle cx="310" cy="-4" r="6" fill="#7c3aed" />
      <text y="0" font-size="12" font-weight="600" fill="#334155" x="321" transform="translate(-5.84 0.00)">Distância de expansão</text>
    </g>

  </g>

</svg>
