<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Memória selecionada por inquilino, finalidade, atualidade e relevância</title>
  <desc id="desc">Os candidatos a memória passam por verificações de escopo de assunto e inquilino, finalidade, atualidade e relevância. Apenas os registros selecionados são incluídos no contexto; os registros rejeitados permanecem fora dele.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="420" rx="22" fill="#0f172a" /><text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">A recuperação de memória é uma decisão baseada em políticas</text>
  <g font-family="Inter, system-ui, sans-serif"><g transform="translate(40 110)"><rect width="220" height="210" rx="16" fill="#1e293b" stroke="#64748b" /><text x="110" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#e2e8f0">Armazenamento de memória</text><text x="28" y="82" font-size="13" fill="#cbd5e1">factos explícitos do utilizador</text><text x="28" y="112" font-size="13" fill="#cbd5e1">hipóteses inferidas</text><text x="28" y="142" font-size="13" fill="#cbd5e1">registos episódicos</text><text x="28" y="172" font-size="13" fill="#cbd5e1">proveniência + ciclo de vida</text></g><text x="290" y="225" font-size="25" fill="#94a3b8">→</text>
  <g transform="translate(330 95)"><rect width="330" height="240" rx="16" fill="#5b21b6" stroke="#2563eb" /><text x="165" y="38" text-anchor="middle" font-size="17" font-weight="700" fill="#c4b5fd">Portões de seleção</text><text x="35" y="82" font-size="13" fill="#93c5fd">1. sujeito autenticado + inquilino</text><text x="35" y="116" font-size="13" fill="#93c5fd">2. finalidade permitida</text><text x="35" y="150" font-size="13" fill="#93c5fd">3. atualidade e estado das avaliações</text><text x="35" y="184" font-size="13" fill="#93c5fd">4. relevância e autoridade</text><text x="35" y="218" font-size="12" fill="#fca5a5">Sem porta → sem inclusão de contexto</text></g><text x="690" y="225" font-size="25" fill="#94a3b8">→</text>
  <g transform="translate(730 110)"><rect width="230" height="210" rx="16" fill="#1d4ed8" stroke="#2563eb" /><text x="115" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#93c5fd">Conjunto de trabalho selecionado</text><text x="30" y="84" font-size="13" fill="#93c5fd">factos úteis mínimos</text><text x="30" y="116" font-size="13" fill="#93c5fd">fonte preservada</text><text x="30" y="148" font-size="13" fill="#93c5fd">data de expiração preservada</text><text x="30" y="180" font-size="13" fill="#93c5fd">a eliminação continua a ser possível</text></g><text x="500" y="382" text-anchor="middle" font-size="13" fill="#94a3b8">As memórias inferidas pelo modelo permanecem como hipóteses até que uma fonte autoritativa as confirme.</text></g>
</svg>
