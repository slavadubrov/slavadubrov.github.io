<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Contexto montado através de recuperação delimitada, orçamentação, execução e validação</title>
  <desc id="desc">Os fluxos de estado de solicitações confiáveis passam pela seleção de decisões, recuperação autorizada, orçamentação baseada em utilidade, proposta de modelo, validação e execução determinística, e, por fim, registro da proveniência e dos resultados.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="460" rx="22" fill="#0f172a" />
  <text x="500" y="46" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">A montagem de contexto é um ciclo de vida por decisão</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(25 115)"><rect width="150" height="110" rx="14" fill="#1e293b" stroke="#64748b" /><text x="75" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#e2e8f0">Requisito confiável</text><text x="75" y="63" text-anchor="middle" font-size="11" fill="#cbd5e1">ator, inquilino, tarefa</text><text x="75" y="84" text-anchor="middle" font-size="11" fill="#94a3b8">localização + hora</text></g><text x="192" y="180" text-anchor="middle" font-size="22" fill="#94a3b8">→</text>
    <g transform="translate(210 115)"><rect width="150" height="110" rx="14" fill="#5b21b6" stroke="#2563eb" /><text x="75" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#c4b5fd">Selecionar decisão</text><text x="75" y="63" text-anchor="middle" font-size="11" fill="#93c5fd">planeamento, recuperação, ação</text><text x="75" y="84" text-anchor="middle" font-size="11" fill="#94a3b8">ou responda</text></g><text x="377" y="180" text-anchor="middle" font-size="22" fill="#94a3b8">→</text>
    <g transform="translate(395 115)"><rect width="150" height="110" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="75" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#93c5fd">Escopo + recuperação</text><text x="75" y="63" text-anchor="middle" font-size="11" fill="#93c5fd">autorizar primeiro</text><text x="75" y="84" text-anchor="middle" font-size="11" fill="#94a3b8">classificação das evidências</text></g><text x="562" y="180" text-anchor="middle" font-size="22" fill="#94a3b8">→</text>
    <g transform="translate(580 115)"><rect width="150" height="110" rx="14" fill="#9a3412" stroke="#ea580c" /><text x="75" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#fdba74">Orçamento + montagem</text><text x="75" y="63" text-anchor="middle" font-size="11" fill="#fdba74">utilidade, frescura</text><text x="75" y="84" text-anchor="middle" font-size="11" fill="#94a3b8">limites de confiança</text></g><text x="747" y="180" text-anchor="middle" font-size="22" fill="#94a3b8">→</text>
    <g transform="translate(765 115)"><rect width="210" height="110" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="105" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#93c5fd">Propor → validar → agir</text><text x="105" y="63" text-anchor="middle" font-size="11" fill="#93c5fd">saída tipada + política</text><text x="105" y="84" text-anchor="middle" font-size="11" fill="#94a3b8">condições pós-condição da ferramenta</text></g>
    <rect x="120" y="300" width="760" height="85" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="500" y="331" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Registar o manifesto, a proveniência, a validação e o resultado da tarefa</text><text x="500" y="360" text-anchor="middle" font-size="12" fill="#93c5fd">A próxima decisão recebe um novo conjunto de trabalho em vez de herdar tudo.</text>
    <text x="500" y="425" text-anchor="middle" font-size="13" fill="#94a3b8">Uma chamada de modelo é uma etapa dentro da política de contexto, e não a própria política.</text>
  </g>
</svg>
