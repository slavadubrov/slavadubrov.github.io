<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Compressão de contexto sensível a perdas com índices canônicos separados para estado e artefatos</title>
  <desc id="desc">A conversa e as observações são resumidas num conjunto de trabalho compacto, enquanto o estado canónico da tarefa, as referências de evidências e o histórico dos artefatos permanecem armazenados separadamente para recuperação exata.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="440" rx="22" fill="#0f172a" /><text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Comprimir a sequência de comandos; preservar o estado recuperável</text>
  <g font-family="Inter, system-ui, sans-serif"><g transform="translate(35 105)"><rect width="260" height="230" rx="16" fill="#1e293b" stroke="#64748b" /><text x="130" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#e2e8f0">Contexto em expansão</text><text x="30" y="83" font-size="13" fill="#cbd5e1">turnos de conversação</text><text x="30" y="116" font-size="13" fill="#cbd5e1">observações brutas da ferramenta</text><text x="30" y="149" font-size="13" fill="#cbd5e1">passagens recuperadas</text><text x="30" y="182" font-size="13" fill="#cbd5e1">texto genérico repetido</text></g><text x="325" y="225" font-size="25" fill="#94a3b8">→</text>
  <g transform="translate(365 105)"><rect width="270" height="230" rx="16" fill="#1d4ed8" stroke="#2563eb" /><text x="135" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#93c5fd">Conjunto de trabalho compacto</text><text x="30" y="83" font-size="13" fill="#93c5fd">decisões + próxima ação</text><text x="30" y="116" font-size="13" fill="#93c5fd">resultados de análise de ferramentas digitais</text><text x="30" y="149" font-size="13" fill="#93c5fd">referências de fonte e artefato</text><text x="30" y="182" font-size="13" fill="#93c5fd">questões não resolvidas</text></g><text x="665" y="225" font-size="25" fill="#94a3b8">+</text>
  <g transform="translate(705 85)"><rect width="260" height="270" rx="16" fill="#1d4ed8" stroke="#2563eb" /><text x="130" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#93c5fd">Armazenamentos canónicos</text><text x="30" y="83" font-size="13" fill="#93c5fd">estado da tarefa</text><text x="30" y="116" font-size="13" fill="#93c5fd">índice de ficheiros e artefactos</text><text x="30" y="149" font-size="13" fill="#93c5fd">full tool results</text><text x="30" y="182" font-size="13" fill="#93c5fd">versões de evidência</text><text x="30" y="225" font-size="12" fill="#93c5fd">Recuperar novamente os detalhes exatos</text><text x="30" y="247" font-size="12" fill="#93c5fd">quando a tarefa os exigir.</text></g><text x="500" y="400" text-anchor="middle" font-size="13" fill="#94a3b8">Otimizar o número total de tokens por tarefa concluída com sucesso, incluindo operações de recuperação e novo acesso aos dados.</text></g>
</svg>
