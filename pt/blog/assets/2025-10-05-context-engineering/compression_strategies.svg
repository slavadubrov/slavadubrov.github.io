<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
    <style>
        .bg { fill: #1e1e1e; }
        .title { fill: #f8fafc; font-family: sans-serif; font-size: 20px; font-weight: bold; text-anchor: middle; }
        .subtitle { fill: #94a3b8; font-family: sans-serif; font-size: 12px; text-anchor: middle; }
        .box { rx: 8; ry: 8; }
        .box-title { fill: #f8fafc; font-family: sans-serif; font-size: 14px; font-weight: bold; text-anchor: middle; }
        .box-text { fill: #cbd5e1; font-family: sans-serif; font-size: 11px; text-anchor: middle; }
        .metric { fill: #fde047; font-family: sans-serif; font-size: 20px; font-weight: bold; text-anchor: middle; }
        .metric-label { fill: #94a3b8; font-family: sans-serif; font-size: 10px; text-anchor: middle; }
        .arrow { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrow); }
        .best { fill: #22c55e; font-family: sans-serif; font-size: 10px; font-weight: bold; text-anchor: middle; }
    </style>
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
        </marker>
    </defs>

    <rect width="100%" height="100%" class="bg" />

    <text x="450" y="35" class="title">Estratégias de Compressão de Contexto</text>
    <text x="450" y="55" class="subtitle">Otimize para tokens por tarefa, e não para tokens por pedido</text>

    <!-- Strategy 1: Anchored Iterative -->
    <g transform="translate(50, 90)">
        <rect x="0" y="0" width="250" height="260" class="box" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2" />
        <text x="125" y="30" class="box-title">Iterativo Ancorado</text>
        <text x="125" y="50" class="box-title">Resumo</text>

        <line x1="20" y1="65" x2="230" y2="65" stroke="#3b82f6" stroke-width="1" opacity="0.5" />

        <text x="125" y="90" class="box-text">Mantém resumos estruturados</text>
        <text x="125" y="105" class="box-text">com secções explícitas</text>
        <text x="125" y="130" class="box-text">Fusão incremental em</text>
        <text x="125" y="145" class="box-text">cada ciclo de compressão</text>

        <!-- Metrics -->
        <rect x="20" y="165" width="95" height="50" rx="6" ry="6" fill="#2d2d2d" stroke="#475569" />
        <text x="67" y="190" class="metric">98,6%</text>
        <text x="67" y="205" class="metric-label">Compressão</text>

        <rect x="135" y="165" width="95" height="50" rx="6" ry="6" fill="#2d2d2d" stroke="#475569" />
        <text x="182" y="190" class="metric">3,70</text>
        <text x="182" y="205" class="metric-label">Qualidade</text>

        <text x="125" y="235" class="best">✓ IDEAL PARA RASTREIO DE FICHIROS</text>
        <text x="125" y="250" class="box-text">Sessões longas de programação</text>
    </g>

    <!-- Strategy 2: Regenerative -->
    <g transform="translate(325, 90)">
        <rect x="0" y="0" width="250" height="260" class="box" fill="#2e1e3f" stroke="#a855f7" stroke-width="2" />
        <text x="125" y="30" class="box-title">Regenerativo</text>
        <text x="125" y="50" class="box-title">Resumo Completo</text>

        <line x1="20" y1="65" x2="230" y2="65" stroke="#a855f7" stroke-width="1" opacity="0.5" />

        <text x="125" y="90" class="box-text">Gerar resumo detalhado</text>
        <text x="125" y="105" class="box-text">em cada compressão</text>
        <text x="125" y="130" class="box-text">Revisão completa do contexto</text>
        <text x="125" y="145" class="box-text">em cada ciclo</text>

        <!-- Metrics -->
        <rect x="20" y="165" width="95" height="50" rx="6" ry="6" fill="#2d2d2d" stroke="#475569" />
        <text x="67" y="190" class="metric">98,7%</text>
        <text x="67" y="205" class="metric-label">Compressão</text>

        <rect x="135" y="165" width="95" height="50" rx="6" ry="6" fill="#2d2d2d" stroke="#475569" />
        <text x="182" y="190" class="metric">3,44</text>
        <text x="182" y="205" class="metric-label">Qualidade</text>

        <text x="125" y="235" class="best">✓ MELHOR PARA LEGIBILIDADE</text>
        <text x="125" y="250" class="box-text">Limpeza das fronteiras de fase</text>
    </g>

    <!-- Strategy 3: Opaque -->
    <g transform="translate(600, 90)">
        <rect x="0" y="0" width="250" height="260" class="box" fill="#3f3d1e" stroke="#eab308" stroke-width="2" />
        <text x="125" y="30" class="box-title">Opaco</text>
        <text x="125" y="50" class="box-title">Compressão</text>

        <line x1="20" y1="65" x2="230" y2="65" stroke="#eab308" stroke-width="1" opacity="0.5" />

        <text x="125" y="90" class="box-text">Representação comprimida</text>
        <text x="125" y="105" class="box-text">otimizado para reconstrução</text>
        <text x="125" y="130" class="box-text">Compromete a interpretabilidade</text>
        <text x="125" y="145" class="box-text">para obter a maior poupança possível</text>

        <!-- Metrics -->
        <rect x="20" y="165" width="95" height="50" rx="6" ry="6" fill="#2d2d2d" stroke="#475569" />
        <text x="67" y="190" class="metric">99,3%</text>
        <text x="67" y="205" class="metric-label">Compressão</text>

        <rect x="135" y="165" width="95" height="50" rx="6" ry="6" fill="#2d2d2d" stroke="#475569" />
        <text x="182" y="190" class="metric">3,35</text>
        <text x="182" y="205" class="metric-label">Qualidade</text>

        <text x="125" y="235" class="best">✓ MELHOR PARA MAXIMIZAR A ECONOMIA</text>
        <text x="125" y="250" class="box-text">Sessões curtas, baixo número de recarregamentos</text>
    </g>

    <!-- Bottom insight -->
    <rect x="200" y="365" width="500" height="30" rx="6" ry="6" fill="#1e293b" stroke="#475569" />
    <text x="450" y="385" class="box-text" style="fill: #fde047;">Insight chave: 0,7% a mais de tokens retidos → ganho de 0,35 pontos de qualidade</text>
</svg>
