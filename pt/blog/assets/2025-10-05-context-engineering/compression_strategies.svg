<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Estratégias de Compressão de Contexto</title>
  <desc id="artifact-desc">Estratégias de Compressão de Contexto.</desc>
    <style>
        .bg { fill: #0f172a; }
        .title { fill: #f8fafc; font-family: Inter, system-ui, sans-serif; font-size: 20px; font-weight: bold; text-anchor: middle; }
        .subtitle { fill: #cbd5e1; font-family: Inter, system-ui, sans-serif; font-size: 12px; text-anchor: middle; }
        .box { rx: 8; ry: 8; }
        .box-title { fill: #f8fafc; font-family: Inter, system-ui, sans-serif; font-size: 14px; font-weight: bold; text-anchor: middle; }
        .box-text { fill: #cbd5e1; font-family: Inter, system-ui, sans-serif; font-size: 11px; text-anchor: middle; }
        .metric { fill: #fdba74; font-family: Inter, system-ui, sans-serif; font-size: 20px; font-weight: bold; text-anchor: middle; }
        .metric-label { fill: #cbd5e1; font-family: Inter, system-ui, sans-serif; font-size: 10px; text-anchor: middle; }
        .arrow { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrow); }
        .best { fill: #166534; font-family: Inter, system-ui, sans-serif; font-size: 10px; font-weight: bold; text-anchor: middle; }
    </style>
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
        </marker>
    </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

    <rect width="100%" height="100%" class="bg" />

    <text y="35" class="title" x="450">Estratégias de Compressão de Contexto</text>
    <text y="55" class="subtitle" x="450">Otimize para tokens por tarefa, e não para tokens por pedido</text>

    <!-- Strategy 1: Anchored Iterative -->
    <g transform="translate(50, 90)">
        <rect x="0" y="0" width="250" height="260" class="box" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" />
        <text y="30" class="box-title" x="125">Iterativo Ancorado</text>
        <text y="50" class="box-title" x="125">Resumo</text>

        <line x1="20" y1="65" x2="230" y2="65" stroke="#2563eb" stroke-width="1" opacity="0.5" />

        <text y="90" class="box-text" x="125">Mantém resumos estruturados</text>
        <text y="105" class="box-text" x="125">com secções explícitas</text>
        <text y="130" class="box-text" x="125">Fusão incremental em</text>
        <text y="145" class="box-text" x="125">cada ciclo de compressão</text>

        <!-- Metrics -->
        <rect x="20" y="165" width="95" height="50" rx="6" ry="6" fill="#1e293b" stroke="#94a3b8" />
        <text y="190" class="metric" x="67">98,6%</text>
        <text y="205" class="metric-label" x="67">Compressão</text>

        <rect x="135" y="165" width="95" height="50" rx="6" ry="6" fill="#1e293b" stroke="#94a3b8" />
        <text y="190" class="metric" x="182">3,70</text>
        <text y="205" class="metric-label" x="182">Qualidade</text>

        <text y="235" class="best" x="125">✓ IDEAL PARA RASTREIO DE FICHIROS</text>
        <text y="250" class="box-text" x="125">Sessões longas de programação</text>
    </g>

    <!-- Strategy 2: Regenerative -->
    <g transform="translate(325, 90)">
        <rect x="0" y="0" width="250" height="260" class="box" fill="#5b21b6" stroke="#7c3aed" stroke-width="2" />
        <text y="30" class="box-title" x="125">Regenerativo</text>
        <text y="50" class="box-title" x="125">Resumo Completo</text>

        <line x1="20" y1="65" x2="230" y2="65" stroke="#7c3aed" stroke-width="1" opacity="0.5" />

        <text y="90" class="box-text" x="125">Gerar resumo detalhado</text>
        <text y="105" class="box-text" x="125">em cada compressão</text>
        <text y="130" class="box-text" x="125">Revisão completa do contexto</text>
        <text y="145" class="box-text" x="125">em cada ciclo</text>

        <!-- Metrics -->
        <rect x="20" y="165" width="95" height="50" rx="6" ry="6" fill="#1e293b" stroke="#94a3b8" />
        <text y="190" class="metric" x="67">98,7%</text>
        <text y="205" class="metric-label" x="67">Compressão</text>

        <rect x="135" y="165" width="95" height="50" rx="6" ry="6" fill="#1e293b" stroke="#94a3b8" />
        <text y="190" class="metric" x="182">3,44</text>
        <text y="205" class="metric-label" x="182">Qualidade</text>

        <text y="235" class="best" x="125">✓ MELHOR PARA LEGIBILIDADE</text>
        <text y="250" class="box-text" x="125">Limpeza das fronteiras de fase</text>
    </g>

    <!-- Strategy 3: Opaque -->
    <g transform="translate(600, 90)">
        <rect x="0" y="0" width="250" height="260" class="box" fill="#166534" stroke="#ea580c" stroke-width="2" />
        <text y="30" class="box-title" x="125">Opaco</text>
        <text y="50" class="box-title" x="125">Compressão</text>

        <line x1="20" y1="65" x2="230" y2="65" stroke="#ea580c" stroke-width="1" opacity="0.5" />

        <text y="90" class="box-text" x="125">Representação comprimida</text>
        <text y="105" class="box-text" x="125">otimizado para reconstrução</text>
        <text y="130" class="box-text" x="125">Compromete a interpretabilidade</text>
        <text y="145" class="box-text" x="125">para obter a maior poupança possível</text>

        <!-- Metrics -->
        <rect x="20" y="165" width="95" height="50" rx="6" ry="6" fill="#1e293b" stroke="#94a3b8" />
        <text y="190" class="metric" x="67">99,3%</text>
        <text y="205" class="metric-label" x="67">Compressão</text>

        <rect x="135" y="165" width="95" height="50" rx="6" ry="6" fill="#1e293b" stroke="#94a3b8" />
        <text y="190" class="metric" x="182">3,35</text>
        <text y="205" class="metric-label" x="182">Qualidade</text>

        <text y="235" class="best" x="125">✓ MELHOR PARA MAXIMIZAR A ECONOMIA</text>
        <text y="250" class="box-text" x="125">Sessões curtas, baixo número de recarregamentos</text>
    </g>

    <!-- Bottom insight -->
    <rect x="200" y="365" width="500" height="30" rx="6" ry="6" fill="#1e293b" stroke="#94a3b8" />
    <text y="385" class="box-text" style="fill: #fdba74;" x="450">Insight chave: 0,7% a mais de tokens retidos → ganho de 0,35 pontos de qualidade</text>
</svg>
