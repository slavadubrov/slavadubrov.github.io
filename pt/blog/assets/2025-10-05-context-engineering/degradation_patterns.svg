<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
    <style>
        .bg { fill: #1e1e1e; }
        .title { fill: #f8fafc; font-family: sans-serif; font-size: 20px; font-weight: bold; text-anchor: middle; }
        .card { rx: 10; ry: 10; }
        .card-title { fill: #f8fafc; font-family: sans-serif; font-size: 14px; font-weight: bold; text-anchor: middle; }
        .card-text { fill: #cbd5e1; font-family: sans-serif; font-size: 11px; text-anchor: middle; }
        .icon { fill: #f8fafc; font-family: sans-serif; font-size: 24px; text-anchor: middle; }
    </style>

    <rect width="100%" height="100%" class="bg" />

    <text x="450" y="40" class="title">Padrões de Degradação de Contexto</text>

    <!-- Pattern 1: Lost-in-Middle -->
    <g transform="translate(50, 80)">
        <rect x="0" y="0" width="250" height="180" class="card" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2" />
        <text x="125" y="35" class="icon">📉</text>
        <text x="125" y="65" class="card-title">Perdido no Meio</text>
        <line x1="30" y1="80" x2="220" y2="80" stroke="#3b82f6" stroke-width="1" opacity="0.5" />
        <text x="125" y="100" class="card-text">Informação no centro</text>
        <text x="125" y="115" class="card-text">recebe menos atenção</text>
        <text x="125" y="140" class="card-text" style="fill: #86efac; font-weight: bold;">Correção: Posicionar informações críticas</text>
        <text x="125" y="155" class="card-text" style="fill: #86efac;">no início ou no final</text>
    </g>

    <!-- Pattern 2: Context Poisoning -->
    <g transform="translate(325, 80)">
        <rect x="0" y="0" width="250" height="180" class="card" fill="#3f1e1e" stroke="#ef4444" stroke-width="2" />
        <text x="125" y="35" class="icon">☠️</text>
        <text x="125" y="65" class="card-title">Envenenamento de Contexto</text>
        <line x1="30" y1="80" x2="220" y2="80" stroke="#ef4444" stroke-width="1" opacity="0.5" />
        <text x="125" y="100" class="card-text">Os erros acumulam-se através de</text>
        <text x="125" y="115" class="card-text">referência repetida</text>
        <text x="125" y="140" class="card-text" style="fill: #86efac; font-weight: bold;">Correção: Validar os resultados gerados pela ferramenta.</text>
        <text x="125" y="155" class="card-text" style="fill: #86efac;">reiniciar em caso de envenenamento</text>
    </g>

    <!-- Pattern 3: Context Distraction -->
    <g transform="translate(600, 80)">
        <rect x="0" y="0" width="250" height="180" class="card" fill="#3f3d1e" stroke="#eab308" stroke-width="2" />
        <text x="125" y="35" class="icon">🔀</text>
        <text x="125" y="65" class="card-title">Distracção de Contexto</text>
        <line x1="30" y1="80" x2="220" y2="80" stroke="#eab308" stroke-width="1" opacity="0.5" />
        <text x="125" y="100" class="card-text">Informações irrelevantes competem entre si</text>
        <text x="125" y="115" class="card-text">para orçamento de atenção</text>
        <text x="125" y="140" class="card-text" style="fill: #86efac; font-weight: bold;">Correção: Filtrar de forma agressiva.</text>
        <text x="125" y="155" class="card-text" style="fill: #86efac;">utilizar pontuação de relevância</text>
    </g>

    <!-- Pattern 4: Context Confusion -->
    <g transform="translate(125, 290)">
        <rect x="0" y="0" width="250" height="180" class="card" fill="#2e1e3f" stroke="#a855f7" stroke-width="2" />
        <text x="125" y="35" class="icon">🌀</text>
        <text x="125" y="65" class="card-title">Confusão de Contexto</text>
        <line x1="30" y1="80" x2="220" y2="80" stroke="#a855f7" stroke-width="1" opacity="0.5" />
        <text x="125" y="100" class="card-text">O modelo é aplicado de forma incorreta</text>
        <text x="125" y="115" class="card-text">contexto da tarefa atual</text>
        <text x="125" y="140" class="card-text" style="fill: #86efac; font-weight: bold;">Correção: segmentação de tarefas,</text>
        <text x="125" y="155" class="card-text" style="fill: #86efac;">transições suaves</text>
    </g>

    <!-- Pattern 5: Context Clash -->
    <g transform="translate(525, 290)">
        <rect x="0" y="0" width="250" height="180" class="card" fill="#1e3f2e" stroke="#22c55e" stroke-width="2" />
        <text x="125" y="35" class="icon">⚔️</text>
        <text x="125" y="65" class="card-title">Conflito de Contexto</text>
        <line x1="30" y1="80" x2="220" y2="80" stroke="#22c55e" stroke-width="1" opacity="0.5" />
        <text x="125" y="100" class="card-text">Informação contraditória</text>
        <text x="125" y="115" class="card-text">cria orientações conflitantes</text>
        <text x="125" y="140" class="card-text" style="fill: #86efac; font-weight: bold;">Correção: regras de prioridade,</text>
        <text x="125" y="155" class="card-text" style="fill: #86efac;">filtragem de versões</text>
    </g>
</svg>
