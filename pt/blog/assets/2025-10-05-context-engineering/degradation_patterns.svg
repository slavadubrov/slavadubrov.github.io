<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Padrões de Degradação de Contexto</title>
  <desc id="artifact-desc">Padrões de Degradação de Contexto.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
    <style>
        .bg { fill: #0f172a; }
        .title { fill: #f8fafc; font-family: Inter, system-ui, sans-serif; font-size: 20px; font-weight: bold; text-anchor: middle; }
        .card { rx: 10; ry: 10; }
        .card-title { fill: #f8fafc; font-family: Inter, system-ui, sans-serif; font-size: 14px; font-weight: bold; text-anchor: middle; }
        .card-text { fill: #cbd5e1; font-family: Inter, system-ui, sans-serif; font-size: 11px; text-anchor: middle; }
        .icon { fill: #f8fafc; font-family: Inter, system-ui, sans-serif; font-size: 24px; text-anchor: middle; }
    </style>

    <rect width="100%" height="100%" class="bg" />

    <text y="40" class="title" x="450">Padrões de Degradação de Contexto</text>

    <!-- Pattern 1: Lost-in-Middle -->
    <g transform="translate(50, 80)">
        <rect x="0" y="0" width="250" height="180" class="card" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" />
        <text y="35" class="icon" x="125">📉</text>
        <text y="65" class="card-title" x="125">Perdido no Meio</text>
        <line x1="30" y1="80" x2="220" y2="80" stroke="#2563eb" stroke-width="1" opacity="0.5" />
        <text y="100" class="card-text" x="125">Informação no centro</text>
        <text y="115" class="card-text" x="125">recebe menos atenção</text>
        <text y="140" class="card-text" style="fill: #86efac; font-weight: bold;" x="125">Correção: Posicionar informações críticas</text>
        <text y="155" class="card-text" style="fill: #86efac;" x="125">no início ou no final</text>
    </g>

    <!-- Pattern 2: Context Poisoning -->
    <g transform="translate(325, 80)">
        <rect x="0" y="0" width="250" height="180" class="card" fill="#991b1b" stroke="#dc2626" stroke-width="2" />
        <text y="35" class="icon" x="125">☠️</text>
        <text y="65" class="card-title" x="125">Envenenamento de Contexto</text>
        <line x1="30" y1="80" x2="220" y2="80" stroke="#dc2626" stroke-width="1" opacity="0.5" />
        <text y="100" class="card-text" x="125">Os erros acumulam-se através de</text>
        <text y="115" class="card-text" x="125">referência repetida</text>
        <text y="140" class="card-text" style="fill: #86efac; font-weight: bold;" x="125">Correção: Validar os resultados gerados pela ferramenta.</text>
        <text y="155" class="card-text" style="fill: #86efac;" x="125">reiniciar em caso de envenenamento</text>
    </g>

    <!-- Pattern 3: Context Distraction -->
    <g transform="translate(600, 80)">
        <rect x="0" y="0" width="250" height="180" class="card" fill="#166534" stroke="#ea580c" stroke-width="2" />
        <text y="35" class="icon" x="125">🔀</text>
        <text y="65" class="card-title" x="125">Distracção de Contexto</text>
        <line x1="30" y1="80" x2="220" y2="80" stroke="#ea580c" stroke-width="1" opacity="0.5" />
        <text y="100" class="card-text" x="125">Informações irrelevantes competem entre si</text>
        <text y="115" class="card-text" x="125">para orçamento de atenção</text>
        <text y="140" class="card-text" style="fill: #86efac; font-weight: bold;" x="125">Correção: Filtrar de forma agressiva.</text>
        <text y="155" class="card-text" style="fill: #86efac;" x="125">utilizar pontuação de relevância</text>
    </g>

    <!-- Pattern 4: Context Confusion -->
    <g transform="translate(125, 290)">
        <rect x="0" y="0" width="250" height="180" class="card" fill="#5b21b6" stroke="#7c3aed" stroke-width="2" />
        <text y="35" class="icon" x="125">🌀</text>
        <text y="65" class="card-title" x="125">Confusão de Contexto</text>
        <line x1="30" y1="80" x2="220" y2="80" stroke="#7c3aed" stroke-width="1" opacity="0.5" />
        <text y="100" class="card-text" x="125">O modelo é aplicado de forma incorreta</text>
        <text y="115" class="card-text" x="125">contexto da tarefa atual</text>
        <text y="140" class="card-text" style="fill: #86efac; font-weight: bold;" x="125">Correção: segmentação de tarefas,</text>
        <text y="155" class="card-text" style="fill: #86efac;" x="125">transições suaves</text>
    </g>

    <!-- Pattern 5: Context Clash -->
    <g transform="translate(525, 290)">
        <rect x="0" y="0" width="250" height="180" class="card" fill="#166534" stroke="#16a34a" stroke-width="2" />
        <text y="35" class="icon" x="125">⚔️</text>
        <text y="65" class="card-title" x="125">Conflito de Contexto</text>
        <line x1="30" y1="80" x2="220" y2="80" stroke="#16a34a" stroke-width="1" opacity="0.5" />
        <text y="100" class="card-text" x="125">Informação contraditória</text>
        <text y="115" class="card-text" x="125">cria orientações conflitantes</text>
        <text y="140" class="card-text" style="fill: #86efac; font-weight: bold;" x="125">Correção: regras de prioridade,</text>
        <text y="155" class="card-text" style="fill: #86efac;" x="125">filtragem de versões</text>
    </g>
</svg>
