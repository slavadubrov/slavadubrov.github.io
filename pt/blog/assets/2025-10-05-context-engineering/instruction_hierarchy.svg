<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 450" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Hierarquia de Instruções</title>
  <desc id="artifact-desc">Hierarquia de Instruções.</desc>
<defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
</defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
<rect width="100%" height="100%" fill="#0f172a" />

<text y="30" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="20px" font-weight="bold" text-anchor="middle" x="350">Hierarquia de Instruções</text>

<!-- 1. System Policy -->
<g transform="translate(125, 60)">
    <rect x="0" y="0" width="450" height="80" rx="6" ry="6" fill="#991b1b" stroke="#dc2626" stroke-width="2" />
    <text y="30" fill="#fca5a5" font-family="Inter, system-ui, sans-serif" font-size="14px" font-weight="bold" text-anchor="start" x="20">1. Política do Sistema</text>
    <text y="55" fill="#fca5a5" font-family="Inter, system-ui, sans-serif" font-size="12px" text-anchor="start" x="20">"És um assistente útil. Nunca reveles segredos."</text>
</g>

<!-- Arrow -->
<line x1="350" y1="140" x2="350" y2="160" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />

<!-- 2. Developer Guidelines -->
<g transform="translate(125, 160)">
    <rect x="0" y="0" width="450" height="80" rx="6" ry="6" fill="#9a3412" stroke="#ea580c" stroke-width="2" />
    <text y="30" fill="#fdba74" font-family="Inter, system-ui, sans-serif" font-size="14px" font-weight="bold" text-anchor="start" x="20">2. Diretrizes para Desenvolvedores</text>
    <text y="55" fill="#fdba74" font-family="Inter, system-ui, sans-serif" font-size="12px" text-anchor="start" x="20">"JSON de saída. Utilize um tom conciso. Cite as fontes."</text>
</g>

<!-- Arrow -->
<line x1="350" y1="240" x2="350" y2="260" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />

<!-- 3. User Task -->
<g transform="translate(125, 260)">
    <rect x="0" y="0" width="450" height="80" rx="6" ry="6" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" />
    <text y="30" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="14px" font-weight="bold" text-anchor="start" x="20">3. Tarefa do Utilizador</text>
    <text y="55" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="12px" text-anchor="start" x="20">"Porque é que a minha chave API não está a funcionar?"</text>
</g>

<!-- Arrow -->
<line x1="350" y1="340" x2="350" y2="360" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />

<!-- Model -->
<g transform="translate(250, 360)">
    <rect x="0" y="0" width="200" height="50" rx="25" ry="25" fill="#5b21b6" stroke="#7c3aed" stroke-width="2" />
    <text y="30" fill="#c4b5fd" font-family="Inter, system-ui, sans-serif" font-size="14px" font-weight="bold" text-anchor="middle" x="100">Processamento do Modelo</text>
</g>

<!-- Side Note -->
<g transform="translate(600, 200)">
    <text y="0" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="12px" text-anchor="start" x="0" transform="translate(-40.25 0.00)">Supressão do fluxo descendente:</text>
    <text y="20" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="12px" text-anchor="start" x="0" transform="translate(-76.75 0.00)">Sistema &gt; Desenvolvimento &gt; Utilizador</text>
</g>

</svg>
