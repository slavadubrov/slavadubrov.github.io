<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Praktische volwassenheidsroute</title>
  <desc id="artifact-desc">Praktische volwassenheidsroute.</desc>
  <defs>
    <marker id="arrowM" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#334155" />
    </marker>
    <filter id="shadowM" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a" x="400">Praktische volwassenheidsroute</text>

  <!-- Connecting arrow line -->
  <line x1="60" y1="120" x2="740" y2="120" stroke="#cbd5e1" stroke-width="3" />

  <!-- Level 1 -->
  <rect x="30" y="60" width="160" height="120" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowM)" />
  <circle cx="110" cy="60" r="14" fill="#2563eb" />
  <text y="65" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff" x="110">1</text>
  <text y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="110">Baselines</text>
  <text y="108" text-anchor="middle" font-size="10" fill="#334155" x="110">pgvector of ES</text>
  <text y="122" text-anchor="middle" font-size="10" fill="#334155" x="110">Hybride BM25 + Vector</text>
  <text y="136" text-anchor="middle" font-size="10" fill="#334155" x="110">Geen herranker</text>
  <text y="168" text-anchor="middle" font-size="9" fill="#64748b" x="110">Inspanning: Laag</text>

  <!-- Arrow -->
  <line x1="195" y1="120" x2="225" y2="120" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowM)" />

  <!-- Level 2 (highlighted - biggest ROI) -->
  <rect x="220" y="55" width="160" height="130" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2.5" filter="url(#shadowM)" />
  <circle cx="300" cy="55" r="14" fill="#ea580c" />
  <text y="60" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff" x="300">2</text>
  <text y="85" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="300">+ Herranker</text>
  <text y="103" text-anchor="middle" font-size="10" fill="#334155" x="300">Cross-encoder toevoegen</text>
  <text y="117" text-anchor="middle" font-size="10" fill="#334155" x="300">De top 50 opnieuw rangschikken</text>
  <text y="131" text-anchor="middle" font-size="10" fill="#334155" x="300">b.v. bge-reranker-v2</text>
  <text y="158" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="300">HOOGSTE ROI</text>
  <text y="173" text-anchor="middle" font-size="9" fill="#64748b" x="300">Inspanning: Laag-Middel</text>

  <!-- Arrow -->
  <line x1="385" y1="120" x2="415" y2="120" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowM)" />

  <!-- Level 3 -->
  <rect x="410" y="60" width="160" height="120" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#shadowM)" />
  <circle cx="490" cy="60" r="14" fill="#dc2626" />
  <text y="65" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff" x="490">3</text>
  <text y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b" x="490">Fijntunen</text>
  <text y="108" text-anchor="middle" font-size="10" fill="#334155" x="490">Embeddings fijnafstellen</text>
  <text y="122" text-anchor="middle" font-size="10" fill="#334155" x="490">+ herrangschikker op domeingegevens</text>
  <text y="136" text-anchor="middle" font-size="10" fill="#334155" x="490">Synthetische vragen voor LLM’s</text>
  <text y="168" text-anchor="middle" font-size="9" fill="#64748b" x="490">Inspanning: Middel hoog</text>

  <!-- Arrow -->
  <line x1="575" y1="120" x2="605" y2="120" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowM)" />

  <!-- Level 4 -->
  <rect x="600" y="60" width="170" height="120" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowM)" />
  <circle cx="685" cy="60" r="14" fill="#166534" />
  <text y="65" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff" x="685">4</text>
  <text y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="685">Hoogste technologische standaard</text>
  <text y="108" text-anchor="middle" font-size="10" fill="#334155" x="685">LLM-herranken op lijstniveau</text>
  <text y="122" text-anchor="middle" font-size="10" fill="#334155" x="685">Personalisatiesignalen</text>
  <text y="136" text-anchor="middle" font-size="10" fill="#334155" x="685">Redenerings-herrankers</text>
  <text y="168" text-anchor="middle" font-size="9" fill="#64748b" x="685">Inspanning: Hoog</text>

  <!-- Bottom label -->
  <text y="245" text-anchor="middle" font-size="11" fill="#334155" x="400">Begin bij niveau 1. Niveau 2 levert de grootste opbrengst op voor de minste inspanning.</text>

</svg>
