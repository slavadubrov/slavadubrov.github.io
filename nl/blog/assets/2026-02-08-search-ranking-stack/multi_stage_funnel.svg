<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="title">Meerstappige rangschikkingsfunnel</title>
  <desc id="desc">Een conceptueel trechtermodel dat loopt van het corpus retrieval via voor-rangschikking, volledige rangschikking en finale combinatie, waarbij voor elke uitgangspunt een meting wordt weergegeven.</desc>
  <defs>
    <marker id="arrowFunnel" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155" />
    </marker>
    <filter id="shadowF" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="800" height="520" fill="#ffffff" />

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Het meervoudige rangschikkingsfunnel</text>

  <!-- Corpus -->
  <rect x="200" y="55" width="400" height="52" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" filter="url(#shadowF)" />
  <text x="400" y="77" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Volledig corpus</text>
  <text x="400" y="95" text-anchor="middle" font-size="11" fill="#334155">De grootte hangt af van het product en de index.</text>

  <!-- Arrow -->
  <line x1="400" y1="107" x2="400" y2="130" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowFunnel)" />

  <!-- Stage 1: Retrieval -->
  <rect x="160" y="133" width="480" height="75" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowF)" />
  <text x="180" y="155" font-size="11" font-weight="700" fill="#1d4ed8">FASE 1: RETRIEVAL</text>
  <text x="180" y="172" font-size="12" font-weight="600" fill="#0f172a">BM25 + Dichte Bi-encoder + Hybride RRF-fusie</text>
  <text x="180" y="190" font-size="11" fill="#334155">Uitstap: herinnering bij de kandidaatstop</text>
  <text x="590" y="172" text-anchor="end" font-size="16" font-weight="700" fill="#1d4ed8">brede verzameling</text>
  <text x="590" y="190" text-anchor="end" font-size="10" fill="#1d4ed8">benchmark cutoffpunt</text>

  <!-- Arrow -->
  <line x1="400" y1="208" x2="400" y2="231" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowFunnel)" />
  <text x="416" y="224" font-size="10" fill="#64748b">Aantal kandidaten neemt af</text>

  <!-- Stage 2: Pre-Ranking -->
  <rect x="180" y="234" width="440" height="68" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowF)" />
  <text x="200" y="256" font-size="11" font-weight="700" fill="#9a3412">FASE 2: VOORRANKING</text>
  <text x="200" y="273" font-size="12" font-weight="600" fill="#0f172a">Twee-toren Models + Interactiefereigenschappen</text>
  <text x="200" y="289" font-size="11" fill="#334155">Uitgang: gereserveerde herinnering per milliseconde</text>
  <text x="575" y="273" text-anchor="end" font-size="16" font-weight="700" fill="#9a3412">Gefilterde verzameling</text>
  <text x="575" y="289" text-anchor="end" font-size="10" fill="#9a3412">optionele fase</text>

  <!-- Arrow -->
  <line x1="400" y1="302" x2="400" y2="325" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowFunnel)" />
  <text x="416" y="318" font-size="10" fill="#64748b">selectielijst</text>

  <!-- Stage 3: Full Ranking -->
  <rect x="200" y="328" width="400" height="68" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#shadowF)" />
  <text x="220" y="350" font-size="11" font-weight="700" fill="#991b1b">FASE 3: VOLLEDIGE RANGING</text>
  <text x="220" y="367" font-size="12" font-weight="600" fill="#0f172a">Cross-encoders + LLM Rerankers</text>
  <text x="220" y="383" font-size="11" fill="#334155">Uitgangspunten: NDCG/MRR, latency, en kosten</text>
  <text x="560" y="367" text-anchor="end" font-size="16" font-weight="700" fill="#991b1b">Lijst met kandidaten</text>
  <text x="560" y="383" text-anchor="end" font-size="10" fill="#991b1b">gemeten limiet</text>

  <!-- Arrow -->
  <line x1="400" y1="396" x2="400" y2="419" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowFunnel)" />

  <!-- Stage 4: Blending -->
  <rect x="240" y="422" width="320" height="68" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowF)" />
  <text x="260" y="444" font-size="11" font-weight="700" fill="#166534">FASE 4: SAMENVLOEIING</text>
  <text x="260" y="461" font-size="12" font-weight="600" fill="#0f172a">Verscheidenheid + Bedrijfsregels</text>
  <text x="260" y="477" font-size="11" fill="#334155">Uitstap: beleid en diversiteit guardrails</text>

  <!-- Cost gradient label on right -->
  <text x="690" y="145" font-size="10" fill="#64748b" text-anchor="start">Laag budget</text>
  <text x="690" y="160" font-size="10" fill="#64748b" text-anchor="start">hoge snelheid</text>
  <line x1="680" y1="140" x2="680" y2="385" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4" />
  <text x="690" y="380" font-size="10" fill="#64748b" text-anchor="start">Hoge kosten</text>
  <text x="690" y="395" font-size="10" fill="#64748b" text-anchor="start">Hoge precisie</text>
  <!-- Arrow for gradient -->
  <line x1="680" y1="165" x2="680" y2="370" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arrowFunnel)" />

</svg>
