<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Resultaten pipeline: NDCG@10-ontwikkeling op Amazon ESCI</title>
  <desc id="artifact-desc">Resultaten pipeline: NDCG@10-ontwikkeling op Amazon ESCI.</desc>
  <defs>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155" />
    </marker>
    <filter id="shadowR" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a" x="380">Resultaten pipeline: NDCG@10-ontwikkeling op Amazon ESCI</text>
  <text y="48" text-anchor="middle" font-size="12" fill="#334155" x="380">Elke fase verbetert geleidelijk de kwaliteit van de rangschikking (ongeveer 500 zoekopdrachten)</text>

  <!-- Chart area -->
  <!-- Y-axis -->
  <line x1="110" y1="70" x2="110" y2="300" stroke="#cbd5e1" stroke-width="1" />
  <text y="82" text-anchor="end" font-size="10" fill="#64748b" x="100">0,75</text>
  <line x1="105" y1="78" x2="110" y2="78" stroke="#cbd5e1" stroke-width="1" />
  <text y="136" text-anchor="end" font-size="10" fill="#64748b" x="100">0,70</text>
  <line x1="105" y1="132" x2="710" y2="132" stroke="#e2e8f0" stroke-width="0.5" />
  <text y="190" text-anchor="end" font-size="10" fill="#64748b" x="100">0,65</text>
  <line x1="105" y1="186" x2="710" y2="186" stroke="#e2e8f0" stroke-width="0.5" />
  <text y="244" text-anchor="end" font-size="10" fill="#64748b" x="100">0,60</text>
  <line x1="105" y1="240" x2="710" y2="240" stroke="#e2e8f0" stroke-width="0.5" />
  <text y="298" text-anchor="end" font-size="10" fill="#64748b" x="100">0,55</text>
  <line x1="105" y1="294" x2="710" y2="294" stroke="#e2e8f0" stroke-width="0.5" />

  <!-- X-axis -->
  <line x1="110" y1="300" x2="710" y2="300" stroke="#cbd5e1" stroke-width="1" />

  <!-- NDCG values: BM25=0.585, Dense=0.611, Hybrid=0.628, CE=0.645, LLM=0.717 -->
  <!-- Scale: 0.55 = y300, 0.75 = y78, range 0.20 maps to 222px -->
  <!-- y = 300 - ((value - 0.55) / 0.20) * 222 -->

  <!-- BM25: 0.585 -> y = 300 - (0.035/0.20)*222 = 300 - 38.85 = 261 -->
  <rect x="140" y="261" width="80" height="39" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowR)" />
  <text y="255" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8" x="180">0,585</text>
  <text y="318" text-anchor="middle" font-size="10" fill="#334155" x="180">BM25</text>

  <!-- Dense: 0.611 -> y = 300 - (0.061/0.20)*222 = 300 - 67.71 = 232 -->
  <rect x="260" y="232" width="80" height="68" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowR)" />
  <text y="226" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8" x="300">0,611</text>
  <text y="318" text-anchor="middle" font-size="10" fill="#334155" x="300">Dicht</text>

  <!-- Hybrid: 0.628 -> y = 300 - (0.078/0.20)*222 = 300 - 86.58 = 213 -->
  <rect x="380" y="213" width="80" height="87" rx="4" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowR)" />
  <text y="207" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6" x="420">0,628</text>
  <text y="318" text-anchor="middle" font-size="10" fill="#334155" x="420">Hybride RRF</text>

  <!-- Cross-Encoder: 0.645 -> y = 300 - (0.095/0.20)*222 = 300 - 105.45 = 195 -->
  <rect x="500" y="195" width="80" height="105" rx="4" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowR)" />
  <text y="189" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412" x="540">0,645</text>
  <text y="318" text-anchor="middle" font-size="10" fill="#334155" x="540">+ Kruis-encodering</text>

  <!-- LLM: 0.717 -> y = 300 - (0.167/0.20)*222 = 300 - 185.37 = 115 -->
  <rect x="620" y="115" width="80" height="185" rx="4" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowR)" />
  <text y="109" text-anchor="middle" font-size="13" font-weight="700" fill="#166534" x="660">0,717</text>
  <text y="318" text-anchor="middle" font-size="10" fill="#334155" x="660">+ LLM</text>

  <!-- Delta annotations -->
  <text y="285" text-anchor="middle" font-size="9" fill="#1d4ed8" x="280">+0,026</text>
  <text y="275" text-anchor="middle" font-size="9" fill="#5b21b6" x="400">+0,017</text>
  <text y="260" text-anchor="middle" font-size="9" fill="#9a3412" x="520">+0,017</text>
  <text y="170" text-anchor="middle" font-size="10" font-weight="700" fill="#166534" x="640">+0,072</text>
  <text y="182" text-anchor="middle" font-size="9" fill="#166534" x="640">grootste sprong</text>

  <!-- Total improvement -->
  <line x1="180" y1="340" x2="660" y2="340" stroke="#334155" stroke-width="1" />
  <line x1="180" y1="336" x2="180" y2="344" stroke="#334155" stroke-width="1" />
  <line x1="660" y1="336" x2="660" y2="344" stroke="#334155" stroke-width="1" />
  <text y="355" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a" x="420">Totaal: +22,5% verbetering in NDCG@10 (van 0,585 naar 0,717)</text>

</svg>
