<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Bi-encoder versus Cross-encoder</title>
  <desc id="artifact-desc">Bi-encoder versus Cross-encoder.</desc>
  <defs>
    <marker id="arrowBvC" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155" />
    </marker>
    <filter id="shadowBvC" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a" x="400">Bi-encoder versus Cross-encoder</text>

  <!-- Left: Bi-Encoder -->
  <rect x="30" y="50" width="350" height="310" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
  <text y="75" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8" x="205">Tweevoudige encoder (retroductie)</text>
  <text y="93" text-anchor="middle" font-size="11" fill="#334155" x="205">Onafhankelijke codering – snel maar oppervlakkig</text>

  <!-- Query path -->
  <rect x="60" y="115" width="120" height="34" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowBvC)" />
  <text y="137" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="120">Verzoek</text>
  <line x1="120" y1="149" x2="120" y2="172" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowBvC)" />
  <rect x="60" y="175" width="120" height="34" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowBvC)" />
  <text y="197" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8" x="120">Encoder</text>
  <line x1="120" y1="209" x2="120" y2="232" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowBvC)" />
  <rect x="55" y="235" width="130" height="28" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1" filter="url(#shadowBvC)" />
  <text y="254" text-anchor="middle" font-size="11" fill="#1d4ed8" x="120">Vraagembedding</text>

  <!-- Doc path -->
  <rect x="230" y="115" width="120" height="34" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.2" filter="url(#shadowBvC)" />
  <text y="137" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="290">Document</text>
  <line x1="290" y1="149" x2="290" y2="172" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowBvC)" />
  <rect x="230" y="175" width="120" height="34" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.2" filter="url(#shadowBvC)" />
  <text y="197" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b" x="290">Encoder</text>
  <line x1="290" y1="209" x2="290" y2="232" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowBvC)" />
  <rect x="225" y="235" width="130" height="28" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1" filter="url(#shadowBvC)" />
  <text y="254" text-anchor="middle" font-size="11" fill="#9a3412" x="290">Document embedding</text>

  <!-- Dot product -->
  <line x1="120" y1="263" x2="180" y2="293" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowBvC)" />
  <line x1="290" y1="263" x2="230" y2="293" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowBvC)" />
  <rect x="160" y="290" width="90" height="30" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1.2" filter="url(#shadowBvC)" />
  <text y="310" text-anchor="middle" font-size="11" font-weight="600" fill="#166534" x="205">Puntvermenigvuldiging</text>
  <text y="340" text-anchor="middle" font-size="10" fill="#64748b" x="205">Ongeveer 17 ms voor 100.000 elementen</text>

  <!-- No cross-attention label -->
  <line x1="180" y1="190" x2="230" y2="190" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4" />
  <text y="185" text-anchor="middle" font-size="9" fill="#dc2626" x="205">Geen interactie</text>

  <!-- Right: Cross-Encoder -->
  <rect x="420" y="50" width="350" height="310" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
  <text y="75" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b" x="595">Cross-encoder (herranken)</text>
  <text y="93" text-anchor="middle" font-size="11" fill="#334155" x="595">Gemengde codering – langzaam maar diepgaand</text>

  <!-- Concatenated input -->
  <rect x="455" y="115" width="280" height="34" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.2" filter="url(#shadowBvC)" />
  <text y="137" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b" x="595">[CLS] Vraag [SEP] Document [SEP]</text>

  <line x1="595" y1="149" x2="595" y2="172" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowBvC)" />

  <!-- Transformer block -->
  <rect x="475" y="175" width="240" height="75" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#shadowBvC)" />
  <text y="200" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b" x="595">Transformer</text>
  <text y="218" text-anchor="middle" font-size="11" fill="#991b1b" x="595">Volledige cross-attention</text>
  <text y="236" text-anchor="middle" font-size="10" fill="#64748b" x="595">Elk query-token besteedt aandacht aan elk doc-token.</text>

  <line x1="595" y1="250" x2="595" y2="283" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowBvC)" />

  <!-- Score output -->
  <rect x="530" y="286" width="130" height="34" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1.2" filter="url(#shadowBvC)" />
  <text y="308" text-anchor="middle" font-size="12" font-weight="600" fill="#166534" x="595">Relevanciescore</text>
  <text y="340" text-anchor="middle" font-size="10" fill="#64748b" x="595">Ongeveer 300 ms voor 50 kandidaten</text>

</svg>
