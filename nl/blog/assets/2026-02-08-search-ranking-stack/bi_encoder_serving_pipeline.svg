<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="title">Bi-encoder indexeren en serving</title>
  <desc id="desc">Documenten worden offline gecodeerd en geïndexeerd; een online zoekopdracht wordt gecodeerd en gegenereerd tegen de vectorindex. Elke online stap moet worden geprofileerd.</desc>
  <defs>
    <marker id="arrowSrv" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155" />
    </marker>
    <filter id="shadowSrv" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="820" height="420" fill="#ffffff" />

  <!-- Title -->
  <text x="410" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Bi-encoder Serving: Offline indexeren versus online query’s</text>

  <!-- Divider -->
  <line x1="410" y1="50" x2="410" y2="400" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="8,4" />
  <text x="200" y="65" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">Offline (indextijd)</text>
  <text x="620" y="65" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412">Online (verwerkingstijd)</text>

  <!-- === LEFT SIDE: Offline === -->

  <!-- Document Corpus -->
  <rect x="50" y="85" width="160" height="40" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.2" filter="url(#shadowSrv)" />
  <text x="130" y="102" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412">Documentencorpus</text>
  <text x="130" y="118" text-anchor="middle" font-size="9" fill="#991b1b">N documenten</text>

  <!-- Arrow -->
  <line x1="210" y1="105" x2="250" y2="105" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowSrv)" />

  <!-- Encoder -->
  <rect x="255" y="85" width="120" height="40" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSrv)" />
  <text x="315" y="102" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">Tweevoudige encoder</text>
  <text x="315" y="118" text-anchor="middle" font-size="9" fill="#1d4ed8">batchcoderen</text>

  <!-- Arrow -->
  <line x1="200" y1="125" x2="200" y2="168" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowSrv)" />

  <!-- Embeddings Store -->
  <rect x="60" y="170" width="280" height="50" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSrv)" />
  <text x="200" y="192" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">Document Embeddings</text>
  <text x="200" y="208" text-anchor="middle" font-size="10" fill="#2563eb">N x D-matrix (bijv. 8500 x 384 = 13 MB)</text>

  <!-- Arrow -->
  <line x1="200" y1="220" x2="200" y2="263" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowSrv)" />

  <!-- Vector Index -->
  <rect x="80" y="265" width="240" height="55" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowSrv)" />
  <text x="200" y="288" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">Vectorindex</text>
  <text x="200" y="305" text-anchor="middle" font-size="10" fill="#1d4ed8">HNSW / IVF / DiskANN</text>

  <!-- One-time label -->
  <rect x="120" y="340" width="160" height="28" rx="14" fill="#f0fdf4" stroke="#166534" stroke-width="1" />
  <text x="200" y="359" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Eén keer uitgevoerd, opgeslagen op schijf</text>

  <!-- === RIGHT SIDE: Online === -->

  <!-- User Query -->
  <rect x="480" y="85" width="140" height="40" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSrv)" />
  <text x="550" y="102" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">Gebruikersvraag</text>
  <text x="550" y="118" text-anchor="middle" font-size="9" fill="#1d4ed8">"draadloze koptelefoons"</text>

  <!-- Arrow -->
  <line x1="620" y1="105" x2="660" y2="105" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowSrv)" />

  <!-- Encoder -->
  <rect x="665" y="85" width="120" height="40" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSrv)" />
  <text x="725" y="102" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">Tweevoudige encoder</text>
  <text x="725" y="118" text-anchor="middle" font-size="9" fill="#1d4ed8">enkele codering</text>

  <!-- Arrow down -->
  <line x1="620" y1="125" x2="620" y2="168" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowSrv)" />

  <!-- Query Embedding -->
  <rect x="530" y="170" width="180" height="40" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSrv)" />
  <text x="620" y="192" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">Query Embedding</text>
  <text x="620" y="206" text-anchor="middle" font-size="9" fill="#2563eb">1 x D-vector</text>

  <!-- Timing label for encode -->
  <rect x="700" y="152" width="70" height="20" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="1" />
  <text x="735" y="166" text-anchor="middle" font-size="9" font-weight="600" fill="#9a3412">profiel</text>

  <!-- Arrow down -->
  <line x1="620" y1="210" x2="620" y2="263" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowSrv)" />

  <!-- ANN Search -->
  <rect x="500" y="265" width="240" height="55" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowSrv)" />
  <text x="620" y="288" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412">ANN Zoeken</text>
  <text x="620" y="305" text-anchor="middle" font-size="10" fill="#991b1b">Vraagverwerking embedding versus vectorindex</text>

  <!-- Timing label for ANN -->
  <rect x="700" y="245" width="70" height="20" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="1" />
  <text x="735" y="259" text-anchor="middle" font-size="9" font-weight="600" fill="#9a3412">profiel</text>

  <!-- Cross-connection: Vector Index → ANN Search -->
  <path d="M320,292 Q380,292 410,292 Q440,292 500,292" stroke="#94a3b8" stroke-width="1.2" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowSrv)" />

  <!-- Arrow down to results -->
  <line x1="620" y1="320" x2="620" y2="358" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowSrv)" />

  <!-- Top-K Results -->
  <rect x="510" y="360" width="220" height="40" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1.2" filter="url(#shadowSrv)" />
  <text x="620" y="378" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">Top-K kandidaten</text>
  <text x="620" y="393" text-anchor="middle" font-size="10" fill="#166534">Geclassificeerd op basis van cosinusgelijkenis</text>

  <!-- Total timing -->
  <rect x="700" y="340" width="90" height="20" rx="10" fill="#f0fdf4" stroke="#166534" stroke-width="1" />
  <text x="745" y="354" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">van begin tot eind</text>

</svg>
