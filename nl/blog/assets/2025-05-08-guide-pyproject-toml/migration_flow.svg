<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Migratie naar pyproject.toml met voorkeur voor verificatie eerst</title>
  <desc id="desc">De migratie verloopt van inventarisatie en classificatie naar het bepalen van eigendomsrechten, het maken van artefacten, het testen van een schone installatie, en pas daarna worden de oude bestanden afgeschreven. Een feedbackpijl stuurt mislukkingen terug naar de classificatiefase.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#64748b" /></marker></defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="650" rx="28" fill="#0f172a" />
  <text x="600" y="68" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Migreer het gedrag en schaf de bestanden daarna af</text>
  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <g transform="translate(45 180)"><rect width="190" height="145" rx="18" fill="#1d4ed8" /><text x="95" y="48" fill="#93c5fd" font-size="20" font-weight="700">1. Inventaris</text><text x="95" y="82" fill="#93c5fd" font-size="14">builden • metadata</text><text x="95" y="106" fill="#93c5fd" font-size="14">afhankelijkheden • gegevens • hulpmiddelen</text></g>
    <path d="M245 252 H275" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
    <g transform="translate(285 180)"><rect width="190" height="145" rx="18" fill="#5b21b6" /><text x="95" y="48" fill="#93c5fd" font-size="20" font-weight="700">2. Classificeren</text><text x="95" y="82" fill="#93c5fd" font-size="14">gepubliceerd of lokaal?</text><text x="95" y="106" fill="#c4b5fd" font-size="14">Statisch of dynamisch?</text></g>
    <path d="M485 252 H515" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
    <g transform="translate(525 180)"><rect width="190" height="145" rx="18" fill="#9a3412" /><text x="95" y="48" fill="#fdba74" font-size="20" font-weight="700">3. Encoderen</text><text x="95" y="82" fill="#fdba74" font-size="14">beheerders kiezen</text><text x="95" y="106" fill="#fdba74" font-size="14">de semantiek behouden</text></g>
    <path d="M725 252 H755" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
    <g transform="translate(765 180)"><rect width="190" height="145" rx="18" fill="#1d4ed8" /><text x="95" y="48" fill="#93c5fd" font-size="20" font-weight="700">4. Verifiëren</text><text x="95" y="82" fill="#93c5fd" font-size="14">inspect sdist en wheel</text><text x="95" y="106" fill="#93c5fd" font-size="14">schoon installeren + implementeren</text></g>
    <path d="M965 252 H995" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
    <g transform="translate(1005 180)"><rect width="150" height="145" rx="18" fill="#166534" /><text x="75" y="48" fill="#93c5fd" font-size="20" font-weight="700">5. Stopzetten</text><text x="75" y="82" fill="#93c5fd" font-size="14">alleen verwijderen</text><text x="75" y="106" fill="#93c5fd" font-size="14">bevestigde duplicaten</text></g>

    <path d="M860 340 V438 H380 V340" stroke="#dc2626" stroke-width="3" fill="none" marker-end="url(#arrow)" />
    <rect x="385" y="405" width="470" height="70" rx="16" fill="#991b1b" />
    <text x="620" y="433" fill="#fca5a5" font-size="17" font-weight="700">Is het artefact of het gedrag verschillend?</text>
    <text x="620" y="458" fill="#fca5a5" font-size="14">Terug naar eigendom en semantiek.</text>

    <rect x="205" y="520" width="790" height="78" rx="18" fill="#1e293b" />
    <text x="600" y="553" fill="#e2e8f0" font-size="18" font-weight="700">Successcriterium</text>
    <text x="600" y="579" fill="#94a3b8" font-size="15">Het gegenereerde artefact en de deployment-paden gedragen zich op dezelfde manier in een schone omgeving.</text>
  </g>
</svg>
