<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Legacy</title>
  <desc id="artifact-desc">Legacy.</desc>
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .node { fill: #1d4ed8; stroke: #2563eb; stroke-width: 2; rx: 8; }
      .node-highlight { fill: #1d4ed8; stroke: #16a34a; stroke-width: 2; rx: 8; }
      .text-main { fill: #f8fafc; font-family: Inter, system-ui, sans-serif; font-size: 16px; font-weight: bold; text-anchor: middle; }
      .text-sub { fill: #93c5fd; font-family: Inter, system-ui, sans-serif; font-size: 12px; text-anchor: middle; }
      .arrow { stroke: #2563eb; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .arrow-highlight { stroke: #16a34a; stroke-width: 2; fill: none; marker-end: url(#arrowhead-h); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
    <marker id="arrowhead-h" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="800" height="300" class="bg" rx="15" />


  <g transform="translate(50, 100)">
    <rect width="140" height="80" class="node" />
    <text y="35" class="text-main" x="70">Legacy</text>
    <text y="55" class="text-sub" x="70">setup.py</text>
    <text y="70" class="text-sub" x="70">requirements.txt</text>
  </g>


  <path d="M 190 140 L 230 140" class="arrow" marker-end="url(#arrowhead)" />


  <g transform="translate(230, 100)">
    <rect width="140" height="80" class="node" />
    <text y="35" class="text-main" x="70">Starten</text>
    <text y="55" class="text-sub" x="70">Maak een pyproject.toml aan</text>
    <text y="70" class="text-sub" x="70">Voeg [build-system] toe</text>
  </g>


  <path d="M 370 140 L 410 140" class="arrow" marker-end="url(#arrowhead)" />


  <g transform="translate(410, 100)">
    <rect width="140" height="80" class="node" />
    <text y="35" class="text-main" x="70">Migreren</text>
    <text y="55" class="text-sub" x="70">Metadata verplaatsen</text>
    <text y="70" class="text-sub" x="70">Dependenties verplaatsen</text>
  </g>


  <path d="M 550 140 L 590 140" class="arrow" marker-end="url(#arrowhead)" />


  <g transform="translate(590, 100)">
    <rect width="140" height="80" class="node-highlight" />
    <text y="35" class="text-main" x="70">Moderniseren</text>
    <text y="55" class="text-sub" x="70">Voeg [tool.*]-configuraties toe</text>
    <text y="70" class="text-sub" x="70">Oude bestanden verwijderen</text>
  </g>

</svg>
