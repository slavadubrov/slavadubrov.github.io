<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Vier eigendomsgrenzen in pyproject.toml</title>
  <desc id="desc">Vier categorieën onderscheiden het bouwsysteem voor de bouw backend, het project voor gepubliceerde metadata, de afhankelijkheidsgroepen voor ongepubliceerde omgevingen, en de tool-namespace’en voor instellingen die specifiek zijn voor bepaalde tools.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="650" rx="28" fill="#0f172a" />
  <text x="600" y="68" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="31" font-weight="700">Eén bestand, vier eigenaren</text>
  <text x="600" y="104" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="17">Een instelling classificeren op basis van de gebruiker voordat er een tabel wordt geselecteerd</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(70 155)"><rect width="500" height="185" rx="20" fill="#1d4ed8" /><text x="30" y="48" fill="#93c5fd" font-size="23" font-weight="700">[build-systeem]</text><text x="30" y="88" fill="#93c5fd" font-size="18">Eigenaar: bouw frontend en backend</text><text x="30" y="124" fill="#93c5fd" font-size="16">backend identiteit • geïsoleerde bouwvereisten</text><text x="30" y="154" fill="#93c5fd" font-size="16">bronboom → sdist en wheel</text></g>
    <g transform="translate(630 155)"><rect width="500" height="185" rx="20" fill="#5b21b6" /><text x="30" y="48" fill="#93c5fd" font-size="23" font-weight="700">[project]</text><text x="30" y="88" fill="#93c5fd" font-size="18">Eigenaar: consumenten van het pakket</text><text x="30" y="124" fill="#c4b5fd" font-size="16">identiteit • runtime vereisten • extra’s</text><text x="30" y="154" fill="#c4b5fd" font-size="16">gepubliceerd als distributiemetadata</text></g>
    <g transform="translate(70 385)"><rect width="500" height="185" rx="20" fill="#166534" /><text x="30" y="48" fill="#93c5fd" font-size="23" font-weight="700">[afhankelijkheidsgroepen]</text><text x="30" y="88" fill="#93c5fd" font-size="18">Eigenaar: lokale workflow</text><text x="30" y="124" fill="#93c5fd" font-size="16">testen • lint-check • documentatie • omgevingen zonder pakketten</text><text x="30" y="154" fill="#93c5fd" font-size="16">niet gepubliceerd in de pakketmetadata</text></g>
    <g transform="translate(630 385)"><rect width="500" height="185" rx="20" fill="#9a3412" /><text x="30" y="48" fill="#fdba74" font-size="23" font-weight="700">[tool.*]</text><text x="30" y="88" fill="#fdba74" font-size="18">Eigenaar: het genoemde hulpmiddel</text><text x="30" y="124" fill="#fdba74" font-size="16">door het hulpprogramma gedefinieerde sleutels en semantiek</text><text x="30" y="154" fill="#fdba74" font-size="16">geen gedeeld schema tussen namespaces</text></g>
  </g>
</svg>
