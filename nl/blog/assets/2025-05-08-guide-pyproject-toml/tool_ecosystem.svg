<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Verschillende consumenten lezen verschillende namespace’en uit pyproject.toml</title>
  <desc id="desc">Een centraal pyproject.toml maakt verbinding met de bouwtools frontends en backends, pakketinstallers en -oplossers, omgevingsbeheerders en ontwikkelingstools. Elke gebruiker genereert een ander artefact of uitvoert een andere actie.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#64748b" /></marker></defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="680" rx="28" fill="#0f172a" />
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Een gedeelde locatie betekent niet dat de semantiek gedeeld is</text>
  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <rect x="420" y="260" width="360" height="150" rx="24" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" />
    <text x="600" y="323" fill="#93c5fd" font-size="27" font-weight="700">pyproject.toml</text>
    <text x="600" y="360" fill="#93c5fd" font-size="16">declaraties + configuratie</text>

    <path d="M500 260 L330 182" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
    <rect x="70" y="92" width="310" height="105" rx="18" fill="#1d4ed8" />
    <text x="225" y="132" fill="#93c5fd" font-size="20" font-weight="700">Buildsysteem</text>
    <text x="225" y="164" fill="#93c5fd" font-size="15">genereert sdist + wheel</text>

    <path d="M700 260 L870 182" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
    <rect x="820" y="92" width="310" height="105" rx="18" fill="#5b21b6" />
    <text x="975" y="132" fill="#93c5fd" font-size="20" font-weight="700">Installer en resolver</text>
    <text x="975" y="164" fill="#c4b5fd" font-size="15">een omgeving selecteren</text>

    <path d="M500 410 L330 492" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
    <rect x="70" y="480" width="310" height="105" rx="18" fill="#166534" />
    <text x="225" y="520" fill="#93c5fd" font-size="20" font-weight="700">Omgevingsbeheerder</text>
    <text x="225" y="552" fill="#93c5fd" font-size="15">synchroniseert groepen + schrijft lock</text>

    <path d="M700 410 L870 492" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
    <rect x="820" y="480" width="310" height="105" rx="18" fill="#9a3412" />
    <text x="975" y="520" fill="#fdba74" font-size="20" font-weight="700">Genoemd hulpmiddel</text>
    <text x="975" y="552" fill="#fdba74" font-size="15">leest uitsluitend zijn eigen namespace</text>

    <text x="600" y="636" fill="#94a3b8" font-size="16">Bekijk elke tabel tegenover de documentatie van de gebruiker die hem bezit.</text>
  </g>
</svg>
