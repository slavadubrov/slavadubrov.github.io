<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="Inter, system-ui, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Twee werelden van data</title>
  <desc id="artifact-desc">Twee werelden van data.</desc>
  <defs>
    <style>
      @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.05); }
        100% { transform: scale(1); }
      }
      .cpu-anim { transform-origin: 100px 125px; animation: pulse 2s infinite ease-in-out; }
      .gpu-anim { transform-origin: 550px 125px; animation: pulse 2s infinite ease-in-out; }
    </style>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <!-- Background -->
  <rect width="900" height="400" rx="12" fill="#f8fafc" stroke="#f8fafc" stroke-width="1" />

  <!-- Title -->
  <text y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a" x="450">Twee werelden van data</text>

  <!-- Divider -->
  <line x1="450" y1="55" x2="450" y2="370" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4" />

  <!-- LEFT: Reality A -->
  <rect x="30" y="55" width="390" height="310" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" />
  <text y="82" text-anchor="middle" font-size="16" font-weight="bold" fill="#1d4ed8" x="225">Gestructureerde gegevens</text>

  <!-- CPU icon -->
  <g class="cpu-anim">
    <rect x="60" y="100" width="80" height="50" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="1.5" />
    <rect x="72" y="110" width="56" height="30" rx="3" fill="#eff6ff" />
    <text y="130" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8" x="100">CPU</text>
  </g>

  <!-- Table icon -->
  <rect x="180" y="100" width="100" height="50" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="1.5" />
  <line x1="180" y1="118" x2="280" y2="118" stroke="#2563eb" stroke-width="1" />
  <line x1="180" y1="130" x2="280" y2="130" stroke="#2563eb" stroke-width="0.8" />
  <line x1="180" y1="140" x2="280" y2="140" stroke="#2563eb" stroke-width="0.8" />
  <line x1="220" y1="100" x2="220" y2="150" stroke="#2563eb" stroke-width="0.8" />
  <text y="113" text-anchor="middle" font-size="9" font-weight="bold" fill="#1d4ed8" x="230">Rijen en kolommen</text>

  <!-- Characteristics -->
  <text y="185" font-size="13" font-weight="bold" fill="#0f172a" x="60">Gebonden aan de CPU</text>
  <text y="205" font-size="12" fill="#334155" x="60">Past in het geheugen (meestal &lt;100 GB)</text>
  <text y="230" font-size="13" font-weight="bold" fill="#0f172a" x="60">Vaak te veel geoptimaliseerd</text>
  <text y="250" font-size="12" fill="#334155" x="60">90% van de queries verwerkt &lt;1 TB</text>
  <text y="270" font-size="12" fill="#334155" x="60">Clusteren zijn vaak overbodig</text>

  <!-- Tag -->
  <rect x="55" y="295" width="340" height="50" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="315" text-anchor="middle" font-size="11" fill="#1d4ed8" x="225">Polars / DuckDB / DataFusion verwerken dit op één machine.</text>
  <text y="333" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8" x="225">Verspreid het niet als dat niet nodig is.</text>

  <!-- RIGHT: Reality B -->
  <rect x="480" y="55" width="390" height="310" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" />
  <text y="82" text-anchor="middle" font-size="16" font-weight="bold" fill="#9a3412" x="675">Multimodale AI</text>

  <!-- GPU icon -->
  <g class="gpu-anim">
    <rect x="510" y="100" width="80" height="50" rx="6" fill="#ffffff" stroke="#ea580c" stroke-width="1.5" />
    <rect x="522" y="110" width="56" height="30" rx="3" fill="#fff7ed" />
    <text y="130" text-anchor="middle" font-size="11" font-weight="bold" fill="#9a3412" x="550">GPU</text>
  </g>

  <!-- Media icons -->
  <g transform="translate(630, 100)">
    <rect width="30" height="24" rx="3" fill="#fff7ed" stroke="#ea580c" stroke-width="1" />
    <text y="16" text-anchor="middle" font-size="9" fill="#9a3412" x="15">AFBEELDING</text>
  </g>
  <g transform="translate(670, 100)">
    <rect width="30" height="24" rx="3" fill="#fff7ed" stroke="#ea580c" stroke-width="1" />
    <text y="16" text-anchor="middle" font-size="9" fill="#9a3412" x="15">VID</text>
  </g>
  <g transform="translate(710, 100)">
    <rect width="30" height="24" rx="3" fill="#fff7ed" stroke="#ea580c" stroke-width="1" />
    <text y="16" text-anchor="middle" font-size="9" fill="#9a3412" x="15">PDF</text>
  </g>
  <g transform="translate(750, 100)">
    <rect width="30" height="24" rx="3" fill="#fff7ed" stroke="#ea580c" stroke-width="1" />
    <text y="16" text-anchor="middle" font-size="9" fill="#9a3412" x="15">WAV</text>
  </g>

  <!-- GPU starvation bar -->
  <rect x="510" y="145" width="330" height="18" rx="4" fill="#cbd5e1" stroke="#cbd5e1" stroke-width="0.5" />
  <rect x="510" y="145" width="66" height="18" rx="4" fill="#dc2626" />
  <text y="158" text-anchor="middle" font-size="9" fill="#334155" x="675">GPU-gebruik: &lt;20% (GPU-starving)</text>

  <!-- Characteristics -->
  <text y="195" font-size="13" font-weight="bold" fill="#0f172a" x="510">Beperkt door GPU</text>
  <text y="215" font-size="12" fill="#334155" x="510">Afbeeldingen, video’s, audio, tensors</text>
  <text y="240" font-size="13" font-weight="bold" fill="#0f172a" x="510">Uitbreiding van pipelines</text>
  <text y="260" font-size="12" fill="#334155" x="510">1 rij (PDF-pad) wordt uitgebreid tot</text>
  <text y="278" font-size="12" fill="#334155" x="510">duizenden chunks + embeddings</text>

  <!-- Tag -->
  <rect x="505" y="295" width="340" height="50" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="315" text-anchor="middle" font-size="11" fill="#9a3412" x="675">Raygegevens / Daft-handhaafing van heterogene data</text>
  <text y="333" text-anchor="middle" font-size="11" font-weight="bold" fill="#9a3412" x="675">CPU- en GPU-resources tegelijkertijd.</text>

  <!-- Bottom note -->
  <rect x="250" y="375" width="400" height="22" rx="4" fill="#f1f5f9" />
  <text y="391" text-anchor="middle" font-size="11" font-weight="bold" fill="#334155" x="450">Gebruik je een goederentrein om een pizza te leveren? Kies de juiste motor voor deze taak.</text>
</svg>
