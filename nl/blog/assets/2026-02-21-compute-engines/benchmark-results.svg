<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 250" font-family="Inter, system-ui, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Prestaties van tabelvormige configuratie met één node</title>
  <desc id="artifact-desc">Prestaties van tabelvormige configuratie met één node.</desc>
  <defs>
    <style>
      .bar { transform-origin: left; animation: scaleIn 1s cubic-bezier(0.25, 1, 0.5, 1) forwards; opacity: 0; }
      .bar-text { opacity: 0; animation: fadeIn 0.5s ease-out 1s forwards; font-size: 11px; fill: #334155; font-weight: bold; }
      @keyframes scaleIn { from { transform: scaleX(0); opacity: 1; } to { transform: scaleX(1); opacity: 1; } }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      .g-pandas .bar { fill: #dc2626; animation-delay: 0.1s; } .g-pandas .bar-text { animation-delay: 1.1s; }
      .g-polars .bar { fill: #2563eb; animation-delay: 0.2s; } .g-polars .bar-text { animation-delay: 1.2s; }
      .g-datafusion .bar { fill: #7c3aed; animation-delay: 0.3s; } .g-datafusion .bar-text { animation-delay: 1.3s; }
      .g-daft .bar { fill: #ea580c; animation-delay: 0.4s; } .g-daft .bar-text { animation-delay: 1.4s; }
      .g-rust .bar { fill: #16a34a; animation-delay: 0.5s; } .g-rust .bar-text { animation-delay: 1.5s; }
      .axis-label { font-size: 13px; font-weight: bold; fill: #0f172a; text-anchor: end; }
    </style>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="900" height="250" rx="12" fill="#f8fafc" stroke="#f8fafc" stroke-width="1" />
  <text y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a" x="450">Prestaties van tabelvormige configuratie met één node</text>
  <text y="52" text-anchor="middle" font-size="12" fill="#334155" x="450">Uitvoeringsduur in seconden (hoe lager, hoe beter) | ~41 miljoen taxiritjes in NYC</text>

  <!-- Legend -->
  <g transform="translate(180, 80)">
    <rect x="0" y="0" width="16" height="16" rx="3" fill="#dc2626" /><text y="12" font-size="13" fill="#0f172a" x="24">Pandas</text>
    <rect x="100" y="0" width="16" height="16" rx="3" fill="#2563eb" /><text y="12" font-size="13" fill="#0f172a" x="124">Polars</text>
    <rect x="190" y="0" width="16" height="16" rx="3" fill="#7c3aed" /><text y="12" font-size="13" fill="#0f172a" x="214">DataFusie</text>
    <rect x="310" y="0" width="16" height="16" rx="3" fill="#ea580c" /><text y="12" font-size="13" fill="#0f172a" x="334">Onzinnig</text>
    <rect x="390" y="0" width="16" height="16" rx="3" fill="#16a34a" /><text y="12" font-size="13" fill="#0f172a" x="414">Polars-rs (Rust)</text>
  </g>

  <!-- Chart Area -->
  <g transform="translate(150, 130)">
    <!-- Base Grid X -->
    <line x1="0" y1="0" x2="0" y2="80" stroke="#cbd5e1" stroke-width="2" />
    <line x1="0" y1="80" x2="650" y2="80" stroke="#cbd5e1" stroke-width="2" />
    <text y="100" text-anchor="middle" font-size="11" fill="#334155" x="0">0,0 s</text>
    <line x1="150" y1="0" x2="150" y2="80" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4" /><text y="100" text-anchor="middle" font-size="11" fill="#334155" x="150">1,0 s</text>
    <line x1="300" y1="0" x2="300" y2="80" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4" /><text y="100" text-anchor="middle" font-size="11" fill="#334155" x="300">2,0 seconden</text>
    <line x1="450" y1="0" x2="450" y2="80" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4" /><text y="100" text-anchor="middle" font-size="11" fill="#334155" x="450">3,0 seconden</text>
    <line x1="600" y1="0" x2="600" y2="80" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4" /><text y="100" text-anchor="middle" font-size="11" fill="#334155" x="600">4,0 s</text>

    <!-- Row 1: ETL Pipeline -->
    <text y="40" class="axis-label" x="-15">ETL-pijpleiding</text>
    <g transform="translate(0, 5)">
      <g class="g-pandas"><rect class="bar" x="0" y="0" width="475" height="10" /><text class="bar-text" y="9" x="480">3,17 s</text></g>
      <g class="g-polars"><rect class="bar" x="0" y="14" width="117" height="10" /><text class="bar-text" y="23" x="122">0,78 s</text></g>
      <g class="g-datafusion"><rect class="bar" x="0" y="28" width="73" height="10" /><text class="bar-text" y="37" x="78">0,49 s</text></g>
      <g class="g-daft"><rect class="bar" x="0" y="42" width="169" height="10" /><text class="bar-text" y="51" x="174">1,13 s</text></g>
      <g class="g-rust"><rect class="bar" x="0" y="56" width="81" height="10" /><text class="bar-text" y="65" x="86">0,54 s</text></g>
    </g>
  </g>
</svg>
