<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 610" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Beperkingsgerichte gedistribueerde schaling workflow</title>
  <desc id="desc">De workflow profileert een werklast, classificeert de bindende beperkingen, koppelt de vereiste collectieve eigenschappen aan de hardware-topologie, genereert geldige parallelle meshstructuren en benchmarks volledige layoutontwerpen.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#94a3b8" /></marker></defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="610" rx="28" fill="#0f172a" />
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Begin bij de gemeten bottleneck</text>
  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <rect x="65" y="145" width="190" height="120" rx="18" fill="#1d4ed8" /><text x="160" y="188" fill="#93c5fd" font-size="19" font-weight="700">1. Profiel</text><text x="160" y="220" fill="#93c5fd" font-size="14">geheugen • kernels</text><text x="160" y="244" fill="#93c5fd" font-size="14">collectieven • stations</text>
    <path d="M265 205 H300" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <rect x="310" y="145" width="190" height="120" rx="18" fill="#5b21b6" /><text x="405" y="188" fill="#93c5fd" font-size="19" font-weight="700">2. Classificeren</text><text x="405" y="220" fill="#c4b5fd" font-size="14">toestand • activation</text><text x="405" y="244" fill="#c4b5fd" font-size="14">verwerking • verkeer</text>
    <path d="M510 205 H545" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <rect x="555" y="145" width="190" height="120" rx="18" fill="#9a3412" /><text x="650" y="188" fill="#fdba74" font-size="19" font-weight="700">3. Kaart</text><text x="650" y="220" fill="#fdba74" font-size="14">collectieve frequentie</text><text x="650" y="244" fill="#fdba74" font-size="14">om de topologie te koppelen</text>
    <path d="M755 205 H790" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <rect x="800" y="145" width="190" height="120" rx="18" fill="#1d4ed8" /><text x="895" y="188" fill="#93c5fd" font-size="19" font-weight="700">4. Genereren</text><text x="895" y="220" fill="#93c5fd" font-size="14">geldige DP × TP × PP</text><text x="895" y="244" fill="#93c5fd" font-size="14">× CP × EP meshnetwerken</text>
    <path d="M1000 205 H1035" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <rect x="1045" y="145" width="120" height="120" rx="18" fill="#166534" /><text x="1105" y="188" fill="#93c5fd" font-size="18" font-weight="700">5. Starten</text><text x="1105" y="220" fill="#93c5fd" font-size="14">volledige taak</text><text x="1105" y="244" fill="#93c5fd" font-size="14">pariteitsonderzoek</text>

    <text x="600" y="340" fill="#e2e8f0" font-size="19" font-weight="700">Bepaling → kandidaatdimensie</text>
    <g font-size="15"><rect x="85" y="375" width="195" height="72" rx="15" fill="#1e293b" /><text x="182" y="405" fill="#cbd5e1">De replica past, er is throughput nodig</text><text x="182" y="430" fill="#93c5fd">gerepliceerde DP</text><rect x="295" y="375" width="195" height="72" rx="15" fill="#1e293b" /><text x="392" y="405" fill="#cbd5e1">model-toestand</text><text x="392" y="430" fill="#c4b5fd">FSDP / ZeRO</text><rect x="505" y="375" width="195" height="72" rx="15" fill="#1e293b" /><text x="602" y="405" fill="#cbd5e1">laagwiskunde</text><text x="602" y="430" fill="#fdba74">TP</text><rect x="715" y="375" width="195" height="72" rx="15" fill="#1e293b" /><text x="812" y="405" fill="#cbd5e1">diepteplaatsing</text><text x="812" y="430" fill="#93c5fd">PP</text><rect x="925" y="375" width="195" height="72" rx="15" fill="#1e293b" /><text x="1022" y="405" fill="#cbd5e1">sequentie / experts</text><text x="1022" y="430" fill="#93c5fd">CP / EP</text></g>
    <rect x="250" y="500" width="700" height="65" rx="16" fill="#991b1b" /><text x="600" y="540" fill="#fca5a5" font-size="17" font-weight="700">Een heuristiek stelt meshstructuren voor; alleen gemeten layouts kiezen de winnaar.</text>
  </g>
</svg>
