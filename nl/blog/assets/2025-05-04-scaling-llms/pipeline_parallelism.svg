<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Pijpleidingparallelisme (PP)</title>
  <desc id="artifact-desc">Pijpleidingparallelisme (PP).</desc>
  <defs>
    <style>
      .gpu { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 5; }
      .layers { fill: #fff7ed; stroke: #ea580c; stroke-width: 1; rx: 2; }
      .arrow { stroke: #334155; stroke-width: 2; marker-end: url(#arrowhead); }
      .text { font-family: Inter, system-ui, sans-serif; font-size: 14px; text-anchor: middle; }
      .title { font-family: Inter, system-ui, sans-serif; font-size: 18px; font-weight: bold; text-anchor: middle; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="100%" height="100%" fill="#f8fafc" /><text y="30" class="title" x="400">Pijpleidingparallelisme (PP)</text>


  <rect x="50" y="80" width="150" height="150" class="gpu" />
  <text y="105" class="text" font-weight="bold" x="125">GPU 1</text>
  <rect x="70" y="120" width="110" height="80" class="layers" />
  <text y="165" class="text" x="125">Lagen 1-8</text>


  <line x1="200" y1="155" x2="250" y2="155" class="arrow" marker-end="url(#arrowhead)" />
  <text y="145" class="text" font-size="10" x="225">Activaties</text>


  <rect x="250" y="80" width="150" height="150" class="gpu" />
  <text y="105" class="text" font-weight="bold" x="325">GPU 2</text>
  <rect x="270" y="120" width="110" height="80" class="layers" />
  <text y="165" class="text" x="325">Lagen 9-16</text>


  <line x1="400" y1="155" x2="450" y2="155" class="arrow" marker-end="url(#arrowhead)" />
  <text y="145" class="text" font-size="10" x="425">Activaties</text>


  <rect x="450" y="80" width="150" height="150" class="gpu" />
  <text y="105" class="text" font-weight="bold" x="525">GPU 3</text>
  <rect x="470" y="120" width="110" height="80" class="layers" />
  <text y="165" class="text" x="525">Lagen 17-24</text>


  <line x1="600" y1="155" x2="650" y2="155" class="arrow" marker-end="url(#arrowhead)" />
  <text y="145" class="text" font-size="10" x="625">Activaties</text>


  <rect x="650" y="80" width="150" height="150" class="gpu" />
  <text y="105" class="text" font-weight="bold" x="725">GPU 4</text>
  <rect x="670" y="120" width="110" height="80" class="layers" />
  <text y="165" class="text" x="725">Lagen 25-32</text>

  <text y="260" class="text" fill="#334155" x="400">Gegevens stromen sequentieel door de verschillende stappen (GPUs).</text>
</svg>
