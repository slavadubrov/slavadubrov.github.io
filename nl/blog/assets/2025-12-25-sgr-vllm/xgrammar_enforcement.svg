<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Waar een XGrammar token-masker de decodercyclus binnentreedt</title>
  <desc id="desc">De model berekent ruwe logits, XGrammar maskert tokens die het schema niet kunnen voortzetten, sampling kiest uit de overgebleven tokens, en de matcher gaat verder. Een opmerking maakt duidelijk dat de masker vorm garandeert in plaats van correctheid.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#64748b" /></marker></defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="520" rx="22" fill="#0f172a" />
  <text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Constrained decoding: post-forwaarding, vooraf samplen</text>
  <text x="500" y="76" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#94a3b8">De model geeft scores voor tokens; de grammatica bepaalt welke continuaties nog in aanmerking komen</text>

  <g transform="translate(35 125)">
    <rect width="180" height="105" rx="14" fill="#166534" stroke="#16a34a" stroke-width="2" />
    <text x="90" y="39" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#86efac">Model voorwaartse doorvoer</text>
    <text x="90" y="68" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#86efac">GPU berekent</text>
    <text x="90" y="87" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#86efac">raw vocabulaire logits</text>
  </g>
  <path d="M225 177 H270" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <g transform="translate(285 125)">
    <rect width="180" height="105" rx="14" fill="#9a3412" stroke="#ea580c" stroke-width="2" />
    <text x="90" y="39" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#fdba74">Grammaticamatcher</text>
    <text x="90" y="68" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#fdba74">geldige waarden berekent</text>
    <text x="90" y="87" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#fdba74">next-token mask</text>
  </g>
  <path d="M475 177 H520" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <g transform="translate(535 125)">
    <rect width="180" height="105" rx="14" fill="#2563eb" stroke="#2563eb" stroke-width="2" />
    <text x="90" y="39" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#93c5fd">Gemaskerd sampling</text>
    <text x="90" y="68" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd">Ongeldige logits → −∞</text>
    <text x="90" y="87" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd">Kies een geschikte token</text>
  </g>
  <path d="M725 177 H770" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <g transform="translate(785 125)">
    <rect width="180" height="105" rx="14" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" />
    <text x="90" y="39" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#93c5fd">Voorwaartse staat</text>
    <text x="90" y="68" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd">Accepteer token en</text>
    <text x="90" y="87" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd">herhalen totdat het voltooid is</text>
  </g>

  <g transform="translate(75 290)">
    <rect width="400" height="145" rx="14" fill="#1e293b" stroke="#94a3b8" />
    <text x="24" y="35" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#e2e8f0">Voorbeeld: een numeriek veld</text>
    <text x="24" y="67" font-family="SFMono-Regular, Consolas, monospace" font-size="13" fill="#94a3b8">raw:  "vijftien"  15  waar  {</text>
    <text x="24" y="96" font-family="SFMono-Regular, Consolas, monospace" font-size="13" fill="#86efac">masker:     ×       ✓    ×   ×</text>
    <text x="24" y="124" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94a3b8">Het schema staat een getal toe, niet de term “vijftien.”</text>
  </g>
  <g transform="translate(525 290)">
    <rect width="400" height="145" rx="14" fill="#1d4ed8" stroke="#2563eb" />
    <text x="24" y="35" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#93c5fd">Wat de masker niet bepaalt</text>
    <text x="24" y="67" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#cbd5e1">• of 15 de juiste waarde is</text>
    <text x="24" y="94" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#cbd5e1">• of de bewijzen de waarde ondersteunen</text>
    <text x="24" y="121" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#cbd5e1">• of een dynamische bedrijfsregel dit toestaat</text>
  </g>
</svg>
