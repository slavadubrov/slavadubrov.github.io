<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Prompt-engineering versus keten van gedachten versus SGR</title>
  <desc id="artifact-desc">Prompt-engineering versus keten van gedachten versus SGR.</desc>
  <defs>
    <linearGradient id="promptGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #dc2626;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cotGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #ea580c;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #ea580c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sgrGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #166534;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="900" height="550" fill="#0f172a" />

  <!-- Title -->
  <text y="40" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="bold" fill="#f8fafc" text-anchor="middle" x="450">Prompt-engineering versus keten van gedachten versus SGR</text>

  <!-- Column 1: Prompt Engineering -->
  <g transform="translate(30, 70)">
    <rect x="0" y="0" width="270" height="460" rx="16" fill="#1e293b" stroke="#dc2626" stroke-width="3" filter="url(#shadow)" />

    <!-- Header -->
    <rect x="0" y="0" width="270" height="50" rx="16" fill="url(#promptGrad)" />
    <rect x="0" y="35" width="270" height="15" fill="url(#promptGrad)" />
    <text y="33" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#f8fafc" text-anchor="middle" x="135">📝 Prompt Engineering</text>

    <!-- Content -->
    <text y="80" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fca5a5" x="20">Benadering:</text>
    <text y="100" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">"Geef alstublieft het resultaat in JSON-formaat terug."</text>
    <text y="118" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">Wees voorzichtig met het formateren.</text>

    <line x1="20" y1="135" x2="250" y2="135" stroke="#94a3b8" stroke-width="1" />

    <text y="160" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fca5a5" x="20">Controle:</text>
    <text y="180" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">Alleen semantische overtuiging</text>
    <text y="198" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">Aandachtmechanisme van het model</text>

    <line x1="20" y1="215" x2="250" y2="215" stroke="#94a3b8" stroke-width="1" />

    <text y="240" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fca5a5" x="20">Uitvoer:</text>
    <rect x="20" y="250" width="230" height="70" rx="6" fill="#0f172a" stroke="#94a3b8" stroke-width="1" />
    <text y="270" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#fca5a5" x="30">"Zeker! De korting is 20%."</text>
    <text y="285" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#fca5a5" x="30">Hier is het JSON, mogelijk:</text>
    <text y="300" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#fca5a5" x="30">{discount: '20%'..."</text>

    <line x1="20" y1="335" x2="250" y2="335" stroke="#94a3b8" stroke-width="1" />

    <text y="360" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fca5a5" x="20">Problemen:</text>
    <text y="380" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">❌ Onconsistentie in format</text>
    <text y="398" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">❌ Redeneringsstappen overgeslagen</text>
    <text y="416" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">❌ Vereist herhalingslussen</text>
    <text y="434" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">❌ Resultaten die afhankelijk zijn van het model</text>
  </g>

  <!-- Column 2: Chain of Thought -->
  <g transform="translate(315, 70)">
    <rect x="0" y="0" width="270" height="460" rx="16" fill="#1e293b" stroke="#ea580c" stroke-width="3" filter="url(#shadow)" />

    <!-- Header -->
    <rect x="0" y="0" width="270" height="50" rx="16" fill="url(#cotGrad)" />
    <rect x="0" y="35" width="270" height="15" fill="url(#cotGrad)" />
    <text y="33" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#f8fafc" text-anchor="middle" x="135">🔗 Keten van gedachten</text>

    <!-- Content -->
    <text y="80" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fdba74" x="20">Benadering:</text>
    <text y="100" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">Laten we stap voor stap nadenken.</text>
    <text y="118" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">Tussenliggende redeneringssporen</text>

    <line x1="20" y1="135" x2="250" y2="135" stroke="#94a3b8" stroke-width="1" />

    <text y="160" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fdba74" x="20">Controle:</text>
    <text y="180" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">Heuristische aansturing</text>
    <text y="198" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">Het model bepaalt de structuur</text>

    <line x1="20" y1="215" x2="250" y2="215" stroke="#94a3b8" stroke-width="1" />

    <text y="240" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fdba74" x="20">Uitvoer:</text>
    <rect x="20" y="250" width="230" height="70" rx="6" fill="#0f172a" stroke="#94a3b8" stroke-width="1" />
    <text y="270" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#fdba74" x="30">Stap 1: Analyseer de winkelwagen...</text>
    <text y="285" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#fdba74" x="30">Stap 2: Controleer de marges...</text>
    <text y="300" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#fdba74" x="30">Dus 15% korting.</text>

    <line x1="20" y1="335" x2="250" y2="335" stroke="#94a3b8" stroke-width="1" />

    <text y="360" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fdba74" x="20">Problemen:</text>
    <text y="380" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">⚠️ Ongestructureerde prozaauskomst</text>
    <text y="398" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">⚠️ Moeilijk om betrouwbaar te parseren</text>
    <text y="416" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">⚠️ Variabele staptel</text>
    <text y="434" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">⚠️ Hoge gebruikskosten voor tokens</text>
  </g>

  <!-- Column 3: Schema-Guided Reasoning -->
  <g transform="translate(600, 70)">
    <rect x="0" y="0" width="270" height="460" rx="16" fill="#1e293b" stroke="#16a34a" stroke-width="3" filter="url(#shadow)" />

    <!-- Header -->
    <rect x="0" y="0" width="270" height="50" rx="16" fill="url(#sgrGrad)" />
    <rect x="0" y="35" width="270" height="15" fill="url(#sgrGrad)" />
    <text y="33" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#f8fafc" text-anchor="middle" x="135">📋 Schema-geleid (SGR)</text>

    <!-- Content -->
    <text y="80" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#86efac" x="20">Benadering:</text>
    <text y="100" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">Het Pydantic-schema definieert de stappen</text>
    <text y="118" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">Gebonden decodering oplegt</text>

    <line x1="20" y1="135" x2="250" y2="135" stroke="#94a3b8" stroke-width="1" />

    <text y="160" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#86efac" x="20">Controle:</text>
    <text y="180" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">Grammaticare gebaseerde controle</text>
    <text y="198" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">De ontwikkelaar definieert de topologie</text>

    <line x1="20" y1="215" x2="250" y2="215" stroke="#94a3b8" stroke-width="1" />

    <text y="240" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#86efac" x="20">Uitvoer:</text>
    <rect x="20" y="250" width="230" height="70" rx="6" fill="#0f172a" stroke="#94a3b8" stroke-width="1" />
    <text y="268" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#86efac" x="30">{"churn_analysis":"Hoog",</text>
    <text y="282" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#86efac" x="30"> "margin_math":"$200*0,2=$40",</text>
    <text y="296" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#86efac" x="30"> "max_discount":15.0,</text>
    <text y="310" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#86efac" x="30"> "offer_code":"SAVE15"}</text>

    <line x1="20" y1="335" x2="250" y2="335" stroke="#94a3b8" stroke-width="1" />

    <text y="360" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#86efac" x="20">Voordeelen:</text>
    <text y="380" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">✓ 100% geldige gestructureerde uitvoer</text>
    <text y="398" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">✓ Controleerbaar veld voor veld</text>
    <text y="416" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">✓ Werkt met kleinere modellen</text>
    <text y="434" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">✓ Geen herhalingslussen nodig</text>
  </g>
</svg>
