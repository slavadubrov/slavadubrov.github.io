<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Prompting, structured output, en semantische validatie lossen verschillende soorten fouten op</title>
  <desc id="desc">Prompting geeft de betekenis van het veld aan, constrained decoding bepaalt de vorm van de uitvoer, en validatie controleert de semantische regels. Alle drie dragen bij aan een betrouwbare applicatiegrens.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#64748b" /></marker></defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="900" height="300" rx="20" fill="#0f172a" />
  <text x="450" y="42" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#f8fafc">Andere bedieningsmechanismen lossen verschillende fouten op</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(35 85)"><rect width="220" height="130" rx="14" fill="#1e293b" stroke="#64748b" /><text x="110" y="35" text-anchor="middle" font-size="17" font-weight="700" fill="#e2e8f0">Prompt</text><text x="110" y="67" text-anchor="middle" font-size="13" fill="#cbd5e1">Uitleg over de betekenis van het veld</text><text x="110" y="92" text-anchor="middle" font-size="13" fill="#94a3b8">Model kan nog steeds onjuist zijn</text></g>
    <path d="M265 150 H320" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
    <g transform="translate(335 85)"><rect width="230" height="130" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="115" y="35" text-anchor="middle" font-size="17" font-weight="700" fill="#93c5fd">Begrensd uitvoerresultaat</text><text x="115" y="67" text-anchor="middle" font-size="13" fill="#cbd5e1">Alleen ondersteunde vormen toepassen</text><text x="115" y="92" text-anchor="middle" font-size="13" fill="#94a3b8">De waarden kunnen nog steeds onjuist zijn.</text></g>
    <path d="M575 150 H630" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
    <g transform="translate(645 85)"><rect width="220" height="130" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="110" y="35" text-anchor="middle" font-size="17" font-weight="700" fill="#93c5fd">Validatie</text><text x="110" y="67" text-anchor="middle" font-size="13" fill="#cbd5e1">Semantische beleid opleggen</text><text x="110" y="92" text-anchor="middle" font-size="13" fill="#94a3b8">Tests bepalen de acceptatie.</text></g>
    <text x="450" y="260" text-anchor="middle" font-size="14" fill="#94a3b8">Betrouwbare systemen combineren de controles in plaats van van één laag te eisen dat deze alle drie taken uitvoert.</text>
  </g>
</svg>
