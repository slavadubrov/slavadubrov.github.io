<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Prijsbepaling workflow met afzonderlijke schema- en beleidsgrenzen</title>
  <desc id="desc">Een verzoek gaat via een gestructureerde routing, een geautoriseerd functieonderdeel retrieval, een gestructureerd voorstel, validatie van een deterministische policy, en een gemaakte respons. Mocht dit niet lukken, wordt er veilig gefallbackt.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="560" rx="22" fill="#0f172a" />
  <text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Prijsstelling agent: waarneembare grenzen voor handhaving</text>

  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(25 125)"><rect width="150" height="110" rx="14" fill="#1e293b" stroke="#64748b" stroke-width="2" /><text x="75" y="43" text-anchor="middle" font-size="16" font-weight="700" fill="#f8fafc">Gebruikersverzoek</text><text x="75" y="72" text-anchor="middle" font-size="12" fill="#94a3b8">niet-vertrouwde invoer</text></g>
    <text x="202" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(230 125)"><rect width="150" height="110" rx="14" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="75" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">route</text><text x="75" y="62" text-anchor="middle" font-size="12" fill="#cbd5e1">gescheiden unie</text><text x="75" y="85" text-anchor="middle" font-size="12" fill="#94a3b8">vorm gevalideerd</text></g>
    <text x="407" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(435 125)"><rect width="150" height="110" rx="14" fill="#5b21b6" stroke="#2563eb" stroke-width="2" /><text x="75" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#c4b5fd">Opvragen</text><text x="75" y="62" text-anchor="middle" font-size="12" fill="#cbd5e1">geautoriseerde gebruikers-ID</text><text x="75" y="85" text-anchor="middle" font-size="12" fill="#94a3b8">live functies laden</text></g>
    <text x="612" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(640 125)"><rect width="150" height="110" rx="14" fill="#9a3412" stroke="#ea580c" stroke-width="2" /><text x="75" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#fdba74">Voorstel</text><text x="75" y="62" text-anchor="middle" font-size="12" fill="#cbd5e1">getypt JSON schema</text><text x="75" y="85" text-anchor="middle" font-size="12" fill="#94a3b8">Vorm is gevalideerd.</text></g>
    <text x="817" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(845 125)"><rect width="130" height="110" rx="14" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="65" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Beleidscontrole</text><text x="65" y="62" text-anchor="middle" font-size="12" fill="#cbd5e1">dynamische limiet</text><text x="65" y="85" text-anchor="middle" font-size="12" fill="#94a3b8">code wordt afgedwongen</text></g>

    <text x="910" y="286" text-anchor="middle" font-size="28" fill="#93c5fd">↓</text>
    <g transform="translate(785 315)"><rect width="190" height="90" rx="14" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="95" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Templateantwoord</text><text x="95" y="64" text-anchor="middle" font-size="12" fill="#93c5fd">alleen geverifieerde waarden</text></g>

    <text x="620" y="459" text-anchor="end" font-size="13" fill="#fca5a5">elke afgewezen controle →</text>
    <g transform="translate(670 420)"><rect width="190" height="80" rx="14" fill="#991b1b" stroke="#dc2626" stroke-width="2" /><text x="95" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#fca5a5">Veilige fallback</text><text x="95" y="59" text-anchor="middle" font-size="12" fill="#fca5a5">afwijzen, opnieuw proberen of verhogen</text></g>
    <text x="500" y="535" text-anchor="middle" font-size="13" fill="#94a3b8">Fouten in het schema en fouten in de beleidsregels worden expliciet afgehandeld; geen van beide wordt stilletjes omgezet in een aanbod.</text>
  </g>
</svg>
