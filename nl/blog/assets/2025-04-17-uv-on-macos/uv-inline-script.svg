<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440">
  <defs>
    <filter id="shadow2" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="white" /><rect width="800" height="440" fill="#1e1e2e" rx="12" ry="12" />

  <text x="400" y="44" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Anatomie van een zelfvoorzienend script (PEP 723)</text>
  <text x="400" y="70" font-family="Arial, sans-serif" font-size="14" fill="#a6accd" text-anchor="middle">Eén .py-bestand draagt zijn eigen dependencies — geen pyproject.toml, geen venv om te beheren</text>

  <!-- Code card -->
  <rect x="60" y="95" width="430" height="300" rx="8" fill="#181825" stroke="#4a5568" stroke-width="1.5" filter="url(#shadow2)" />
  <circle cx="80" cy="115" r="5" fill="#FC8181" />
  <circle cx="96" cy="115" r="5" fill="#F6E05E" />
  <circle cx="112" cy="115" r="5" fill="#68D391" />
  <text x="470" y="119" font-family="Monaco, monospace" font-size="11" fill="#718096" text-anchor="end">fetch.py</text>

  <g font-family="Monaco, monospace" font-size="13">
    <text x="80" y="155" fill="#FC8181">#!/usr/bin/env -S uv run --script</text>
    <text x="80" y="180" fill="#A78BFA"># /// script</text>
    <text x="80" y="200" fill="#63B3ED"># requires-python = "&gt;=3.12"</text>
    <text x="80" y="220" fill="#63B3ED"># dependencies = [</text>
    <text x="100" y="240" fill="#68D391">#   "httpx",</text>
    <text x="100" y="260" fill="#68D391">#   "rich",</text>
    <text x="80" y="280" fill="#63B3ED"># ]</text>
    <text x="80" y="300" fill="#A78BFA"># ///</text>
    <text x="80" y="330" fill="#e2e8f0">import httpx, rich</text>
    <text x="80" y="354" fill="#e2e8f0">print(httpx.get("https://...").json())</text>
  </g>

  <!-- Annotations -->
  <g font-family="Arial, sans-serif" font-size="12">
    <line x1="490" y1="148" x2="540" y2="148" stroke="#FC8181" stroke-width="1.5" />
    <text x="548" y="145" fill="#FC8181" font-weight="bold">Shebang</text>
    <text x="548" y="162" fill="#cbd5e0">chmod +x, daarna ./fetch.py</text>

    <line x1="490" y1="195" x2="540" y2="195" stroke="#63B3ED" stroke-width="1.5" />
    <text x="548" y="192" fill="#63B3ED" font-weight="bold">Inline metadata</text>
    <text x="548" y="209" fill="#cbd5e0">TOML-blok in comments</text>

    <line x1="490" y1="250" x2="540" y2="250" stroke="#68D391" stroke-width="1.5" />
    <text x="548" y="247" fill="#68D391" font-weight="bold">Dependencies</text>
    <text x="548" y="264" fill="#cbd5e0">uv add --script fetch.py httpx</text>

    <line x1="490" y1="342" x2="540" y2="342" stroke="#e2e8f0" stroke-width="1.5" />
    <text x="548" y="339" fill="#e2e8f0" font-weight="bold">Je code</text>
    <text x="548" y="356" fill="#cbd5e0">imports worden opgelost bij runtime</text>
  </g>

  <text x="400" y="425" font-family="Monaco, monospace" font-size="13" fill="#F6E05E" text-anchor="middle">uv run fetch.py  →  uv bouwt een tijdelijke env, cachet die en voert het bestand uit</text>
</svg>
