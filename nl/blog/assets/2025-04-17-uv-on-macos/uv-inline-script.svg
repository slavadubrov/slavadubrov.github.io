<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Analyse van een PEP 723-script</title><desc id="desc">Een Python-bestand bevat een PEP 723-commentblok met de vereisten en afhankelijkheden van Python, gevolgd door gewone code. uv run maakt gebruik van een geïsoleerd opgeslagen omgeving, terwijl een optioneel bijbehorend lock een exacte configuratie behoudt.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="650" rx="28" fill="#0f172a" />
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Een bestand kan zijn eigen runtime-grens declareren</text>
  <g font-family="SFMono-Regular, Consolas, monospace">
    <rect x="70" y="120" width="660" height="430" rx="20" fill="#0f172a" stroke="#334155" stroke-width="2" />
    <text x="105" y="165" fill="#64748b" font-size="16">fetch.py</text>
    <text x="105" y="215" fill="#c4b5fd" font-size="18"># /// script</text>
    <text x="105" y="250" fill="#93c5fd" font-size="18"># requires-python = "&gt;=3.12"</text>
    <text x="105" y="285" fill="#fdba74" font-size="18"># afhankelijkheden = [</text>
    <text x="135" y="320" fill="#fdba74" font-size="18"># "httpx&gt;=0.27,&lt;1",</text>
    <text x="105" y="355" fill="#fdba74" font-size="18"># ]</text>
    <text x="105" y="390" fill="#c4b5fd" font-size="18"># ///</text>
    <text x="105" y="445" fill="#e2e8f0" font-size="18">import httpx</text>
    <text x="105" y="492" fill="#e2e8f0" font-size="18">response = httpx.get(...)</text>
  </g>
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="790" y="135" width="340" height="100" rx="18" fill="#5b21b6" /><text x="820" y="178" fill="#93c5fd" font-size="19" font-weight="700">In-line metadata</text><text x="820" y="207" fill="#c4b5fd" font-size="14">de runner leest de commentaarblok</text>
    <rect x="790" y="270" width="340" height="100" rx="18" fill="#1d4ed8" /><text x="820" y="313" fill="#93c5fd" font-size="19" font-weight="700">uv uitvoeren fetch.py</text><text x="820" y="342" fill="#93c5fd" font-size="14">geïsoleerde omgeving in de cache</text>
    <rect x="790" y="405" width="340" height="100" rx="18" fill="#166534" /><text x="820" y="448" fill="#93c5fd" font-size="19" font-weight="700">fetch.py.lock</text><text x="820" y="477" fill="#93c5fd" font-size="14">optionele exacte aangrenzende resolutie</text>
    <rect x="235" y="580" width="730" height="42" rx="14" fill="#1e293b" /><text x="600" y="607" text-anchor="middle" fill="#cbd5e1" font-size="16">Eenvoudige Python-versies negeren de metadata; een compatibele uitvoerder is verantwoordelijk voor de uitvoering.</text>
  </g>
</svg>
