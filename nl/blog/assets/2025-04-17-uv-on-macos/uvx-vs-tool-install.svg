<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <filter id="shadow3" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="white" /><rect width="800" height="380" fill="#1e1e2e" rx="12" ry="12" />

  <text x="400" y="44" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Twee manieren om een hulpprogramma uit te voeren</text>
  <text x="400" y="70" font-family="Arial, sans-serif" font-size="14" fill="#a6accd" text-anchor="middle">Voer het één keer uit, of voeg het toe aan uw PATH.</text>

  <!-- uvx card -->
  <rect x="50" y="100" width="330" height="240" rx="10" fill="#2d3748" stroke="#4FD1C5" stroke-width="2" filter="url(#shadow3)" />
  <text x="215" y="138" font-family="Monaco, monospace" font-size="18" font-weight="bold" fill="#4FD1C5" text-anchor="middle">UVX-ruiscontrole.</text>
  <text x="215" y="162" font-family="Arial, sans-serif" font-size="13" fill="#a0aec0" text-anchor="middle">UV-hulpprogramma uitvoeren — tijdelijk</text>

  <g font-family="Arial, sans-serif" font-size="13" fill="#cbd5e0">
    <text x="80" y="200">• Tijdelijke, opgeslagen omgeving</text>
    <text x="80" y="226">• Er is niets toegevoegd aan de PATH</text>
    <text x="80" y="252">• Haalt altijd de door u opgevraagde versie.</text>
    <text x="80" y="278">• Uitstekend geschikt voor CI en éénmalige uitvoeringen</text>
  </g>
  <text x="215" y="318" font-family="Monaco, monospace" font-size="12" fill="#68D391" text-anchor="middle">uvx ruff@0.6.0 / uvx --with click mytool</text>

  <!-- tool install card -->
  <rect x="420" y="100" width="330" height="240" rx="10" fill="#2d3748" stroke="#A78BFA" stroke-width="2" filter="url(#shadow3)" />
  <text x="585" y="138" font-family="Monaco, monospace" font-size="17" font-weight="bold" fill="#A78BFA" text-anchor="middle">Installatie van UV-hulpprogramma Ruff</text>
  <text x="585" y="162" font-family="Arial, sans-serif" font-size="13" fill="#a0aec0" text-anchor="middle">permanent — op uw PATH</text>

  <g font-family="Arial, sans-serif" font-size="13" fill="#cbd5e0">
    <text x="450" y="200">• Eén keer geïnstalleerd, geïsoleerde omgeving</text>
    <text x="450" y="226">• Roep het direct op: gewoon `ruff`</text>
    <text x="450" y="252">• Upgrade van UV-hulpmiddel --all om bij te werken</text>
    <text x="450" y="278">• Uitstekend voor dagelijkse hulpmiddelen</text>
  </g>
  <text x="585" y="318" font-family="Monaco, monospace" font-size="12" fill="#F6E05E" text-anchor="middle">Lijst met UV-hulpmiddelen / Oninstalleren van UV-hulpmiddelen</text>
</svg>
