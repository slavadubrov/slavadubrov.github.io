<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 590" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Kiezen voor uv run, uvx of installatie van het uv-hulpprogramma</title><desc id="desc">Drie kolommen leiden projectgerelateerde tools naar uv run, ad hoc geïsoleerde tools naar uvx, en uitvoerbaar bestanden die op PATH moeten blijven staan voor de installatie van uv-tools.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="590" rx="28" fill="#0f172a" />
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Kies een hulpprogrammeomgeving op basis van wat deze moet kunnen waarnemen</text>
  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <g transform="translate(55 135)"><rect width="340" height="340" rx="22" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="170" y="52" fill="#93c5fd" font-size="23" font-weight="700">UV-runs uitvoeren</text><text x="170" y="92" fill="#93c5fd" font-size="17">met het project verbonden</text><text x="170" y="145" fill="#e2e8f0" font-size="15">projectcode importeren</text><text x="170" y="178" fill="#e2e8f0" font-size="15">maakt gebruik van gegrendelde groepen en plugins</text><text x="170" y="211" fill="#e2e8f0" font-size="15">het levenscyclus volgt de repository</text><rect x="35" y="260" width="270" height="50" rx="12" fill="#1d4ed8" /><text x="170" y="291" fill="#93c5fd" font-size="15">uv run --group test pytest</text></g>
    <g transform="translate(430 135)"><rect width="340" height="340" rx="22" fill="#5b21b6" /><text x="170" y="52" fill="#93c5fd" font-size="23" font-weight="700">uvx-coördinaten</text><text x="170" y="92" fill="#c4b5fd" font-size="17">ad hoc en geïsoleerd</text><text x="170" y="145" fill="#e2e8f0" font-size="15">ziet de projectimporten niet</text><text x="170" y="178" fill="#e2e8f0" font-size="15">het omgevingsbestand bevindt zich in de cache</text><text x="170" y="211" fill="#e2e8f0" font-size="15">versie van de pin voor herhaalbaarheid</text><rect x="35" y="260" width="270" height="50" rx="12" fill="#5b21b6" /><text x="170" y="291" fill="#93c5fd" font-size="15">uvx ruff@0.12.0 controleren .</text></g>
    <g transform="translate(805 135)"><rect width="340" height="340" rx="22" fill="#166534" /><text x="170" y="52" fill="#93c5fd" font-size="23" font-weight="700">installatie van UV-hulpprogramma</text><text x="170" y="92" fill="#93c5fd" font-size="17">permanent + op PATH</text><text x="170" y="145" fill="#e2e8f0" font-size="15">toegewijd hulpprogramma-omgeving</text><text x="170" y="178" fill="#e2e8f0" font-size="15">beschikbaar voor andere programma’s</text><text x="170" y="211" fill="#e2e8f0" font-size="15">expliciet upgrade-levenscyclus</text><rect x="35" y="260" width="270" height="50" rx="12" fill="#166534" /><text x="170" y="291" fill="#86efac" font-size="15">Installeer het UV-hulpprogramma met 'ruff==0.12.0'</text></g>
    <rect x="245" y="515" width="710" height="42" rx="14" fill="#1e293b" /><text x="600" y="542" fill="#cbd5e1" font-size="16">Isolatie is een functie; kies bewust de zichtbaarheid van het project.</text>
  </g>
</svg>
