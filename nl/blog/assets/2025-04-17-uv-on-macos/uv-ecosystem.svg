<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Vier UV workflow-grenzen</title><desc id="desc">Gemanageerde Python-projecten, scripts en CLI-hulpmiddelen vormen vier afzonderlijke levenscycli die door uv worden beheerd. Hostbibliotheken en -toepassingen blijven buiten het uv-systeem en worden beheerd door een systeempakketbeheerder.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="650" rx="28" fill="#0f172a" />
  <text x="600" y="64" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Eén uitvoerbaar bestand, afzonderlijke levenscyklen</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(70 140)"><rect width="500" height="180" rx="20" fill="#1d4ed8" /><text x="30" y="47" fill="#93c5fd" font-size="23" font-weight="700">Gemanageerde Python</text><text x="30" y="86" fill="#93c5fd" font-size="17">uv python installeren / vastzetten / lijst bekijken</text><text x="30" y="123" fill="#93c5fd" font-size="15">interpretor-distributies in de uv-data-map</text><text x="30" y="151" fill="#93c5fd" font-size="15">ontdekt samen met externe interpreters</text></g>
    <g transform="translate(630 140)"><rect width="500" height="180" rx="20" fill="#5b21b6" /><text x="30" y="47" fill="#93c5fd" font-size="23" font-weight="700">Project</text><text x="30" y="86" fill="#93c5fd" font-size="17">pyproject.toml + uv.lock → .venv</text><text x="30" y="123" fill="#c4b5fd" font-size="15">gedeelde declaraties en resolutie</text><text x="30" y="151" fill="#c4b5fd" font-size="15">one-time geïnstalleerde omgeving</text></g>
    <g transform="translate(70 365)"><rect width="500" height="180" rx="20" fill="#9a3412" /><text x="30" y="47" fill="#fdba74" font-size="23" font-weight="700">PEP 723-script</text><text x="30" y="86" fill="#fdba74" font-size="17">inline-metadata + optioneel aangrenzend slot</text><text x="30" y="123" fill="#fdba74" font-size="15">eenbestandsuitgave-eenheid</text><text x="30" y="151" fill="#fdba74" font-size="15">geïsoleerd opgeslagen uitvoeromgeving</text></g>
    <g transform="translate(630 365)"><rect width="500" height="180" rx="20" fill="#166534" /><text x="30" y="47" fill="#93c5fd" font-size="23" font-weight="700">CLI-hulpmiddel</text><text x="30" y="86" fill="#93c5fd" font-size="17">UVX-cache of persistente hulpprogrammeeromgeving</text><text x="30" y="123" fill="#93c5fd" font-size="15">geïsoleerd van projectimporten</text><text x="30" y="151" fill="#93c5fd" font-size="15">EXPOSURE VAN PATH ALLEEN Wanneer opzettelijk geïnstalleerd</text></g>
    <rect x="250" y="585" width="700" height="42" rx="14" fill="#1e293b" /><text x="600" y="612" text-anchor="middle" fill="#cbd5e1" font-size="16">Homebrew of macOS blijft de hosttoepassingen en native bibliotheken beheren.</text>
  </g>
</svg>
