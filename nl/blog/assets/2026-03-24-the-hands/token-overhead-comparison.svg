<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 510" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="Token Overhead Comparison" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Token Vergelijking van overhead</title>
  <defs>
    <filter id="shadowB" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a" x="450">Token Budget: Waar uw Context Window naartoe gaat</text>
  <text y="50" text-anchor="middle" font-size="11" fill="#64748b" x="450">200K token context window — dezelfde taak, verschillende hulpmiddelen</text>

  <!-- Scenario Labels -->
  <text y="90" font-size="12" font-weight="600" fill="#334155" x="30">MCP (ongeveer 40 hulpmiddelen)</text>
  <text y="190" font-size="12" font-weight="600" fill="#334155" x="30">JSON Hulpprogramma-aanroep (10 hulpprogramma's)</text>
  <text y="290" font-size="12" font-weight="600" fill="#334155" x="30">CLI + Vaardigheden</text>
  <text y="390" font-size="12" font-weight="600" fill="#334155" x="30">Codeuitvoering (PTC)</text>

  <!-- Bar chart area -->
  <!-- Scale markers -->
  <line x1="250" y1="65" x2="250" y2="440" stroke="#e2e8f0" stroke-width="1" />
  <line x1="445" y1="65" x2="445" y2="440" stroke="#e2e8f0" stroke-width="1" />
  <line x1="640" y1="65" x2="640" y2="440" stroke="#e2e8f0" stroke-width="1" />
  <line x1="835" y1="65" x2="835" y2="440" stroke="#e2e8f0" stroke-width="1" />
  <text y="455" text-anchor="middle" font-size="9" fill="#64748b" x="250">0</text>
  <text y="455" text-anchor="middle" font-size="9" fill="#64748b" x="445">50.000</text>
  <text y="455" text-anchor="middle" font-size="9" fill="#64748b" x="640">100.000</text>
  <text y="455" text-anchor="middle" font-size="9" fill="#64748b" x="835">150.000</text>

  <!-- Bar 1: MCP (55K tool defs + 90K intermediate + 5K reasoning = 150K) -->
  <!-- Tool definitions -->
  <rect x="250" y="100" width="322" height="30" rx="4" fill="#dc2626" filter="url(#shadowB)" />
  <text y="120" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff" x="411">Tool schemas: 55.000</text>
  <!-- Intermediate results -->
  <rect x="572" y="100" width="205" height="30" rx="4" fill="#dc2626" opacity="0.7" />
  <text y="120" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff" x="674">Resultaten: 88.000</text>
  <!-- Reasoning -->
  <rect x="777" y="100" width="29" height="30" rx="4" fill="#faf5ff" opacity="0.8" />
  <!-- Label -->
  <text y="150" font-size="10" fill="#991b1b" font-weight="600" x="250">72% van de context bestaat uit alleen maar definities van tools</text>
  <text y="150" font-size="10" fill="#64748b" x="620">Nog maar 28% over voor reasoning</text>

  <!-- Bar 2: JSON Tool Calling (10 tools ~8K + 30K intermediate + 12K reasoning = 50K total) -->
  <!-- Tool definitions: 8K -->
  <rect x="250" y="200" width="47" height="30" rx="4" fill="#2563eb" filter="url(#shadowB)" />
  <!-- Intermediate results: 30K -->
  <rect x="297" y="200" width="175" height="30" rx="4" fill="#2563eb" opacity="0.7" />
  <!-- Reasoning: 12K -->
  <rect x="472" y="200" width="70" height="30" rx="4" fill="#faf5ff" opacity="0.8" />
  <!-- Labels above bars -->
  <text y="196" text-anchor="middle" font-size="9" fill="#1d4ed8" font-weight="600" x="273">8K</text>
  <text y="220" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff" x="384">Resultaten: 30K</text>
  <text y="220" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6" x="507">12K</text>
  <!-- Label -->
  <text y="250" font-size="10" fill="#1d4ed8" font-weight="600" x="250">Beheersbaar met weinig hulpmiddelen</text>
  <text y="250" font-size="10" fill="#64748b" x="530">75% van de context is nog steeds beschikbaar</text>

  <!-- Bar 3: CLI + Skills (~200 tokens tools + 2K intermediate + 8K reasoning) -->
  <rect x="250" y="300" width="2" height="30" rx="1" fill="#166534" filter="url(#shadowB)" />
  <rect x="252" y="300" width="12" height="30" rx="4" fill="#16a34a" opacity="0.7" />
  <rect x="264" y="300" width="47" height="30" rx="4" fill="#faf5ff" opacity="0.8" />
  <text y="320" font-size="10" fill="#166534" font-weight="600" x="340">Ongeveer 200 tokens hulpmiddelen + 2.000 resultaten = 95% gratis voor reasoning</text>

  <!-- Bar 4: Code Execution (2 meta-tools + code output) -->
  <rect x="250" y="400" width="4" height="30" rx="2" fill="#ea580c" filter="url(#shadowB)" />
  <rect x="254" y="400" width="12" height="30" rx="4" fill="#ea580c" opacity="0.7" />
  <rect x="266" y="400" width="47" height="30" rx="4" fill="#faf5ff" opacity="0.8" />
  <text y="420" font-size="10" fill="#9a3412" font-weight="600" x="340">2 meta-hulpmiddelen + uitsluitend eindsamenvatting = 98,7% vermindering</text>

  <!-- Legend -->
  <rect x="250" y="460" width="14" height="14" rx="2" fill="#dc2626" />
  <text y="472" font-size="9" fill="#334155" x="270">Definities van tools</text>
  <rect x="380" y="460" width="14" height="14" rx="2" fill="#dc2626" opacity="0.7" />
  <text y="472" font-size="9" fill="#334155" x="400">Tussentijdse resultaten</text>
  <rect x="530" y="460" width="14" height="14" rx="2" fill="#faf5ff" stroke="#7c3aed" stroke-width="1" />
  <text y="472" font-size="9" fill="#334155" x="550">Beschikbaar voor reasoning</text>

  <!-- Sources -->
  <text y="498" font-size="9" fill="#64748b" x="250" transform="translate(-39.55 0.00)">Bronnen: 55K tokens (~40 MCP hulpmiddelen: GitHub + Slack + Sentry) — Apideck; 143K/200K — Apideck; 98,7% vermindering — Anthropic "Code uitvoering met MCP"</text>
</svg>
