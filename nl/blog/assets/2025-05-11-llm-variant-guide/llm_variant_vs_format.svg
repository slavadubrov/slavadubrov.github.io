<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Zes onafhankelijke lagen in een open-weight model artefact</title>
  <desc id="desc">Een model artefact wordt beschreven door de familie en revisie, trainingsrol, architectuur, numerieke representatie, container en lay-out, en runtime. Pijlen geven aan dat elke laag de volgende beperkt zonder daarmee gelijkwaardig te zijn.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="500" rx="22" fill="#0f172a" /><text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Een model-naam combineert meerdere onafhankelijke lagen</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(30 105)"><rect width="285" height="125" rx="15" fill="#1e293b" stroke="#64748b" /><text x="142" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#e2e8f0">1. Familie + revisie</text><text x="142" y="70" text-anchor="middle" font-size="13" fill="#cbd5e1">weights • tokenizer • licentie</text><text x="142" y="96" text-anchor="middle" font-size="12" fill="#94a3b8">repository + commit</text></g>
    <g transform="translate(357 105)"><rect width="285" height="125" rx="15" fill="#5b21b6" stroke="#2563eb" /><text x="142" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#c4b5fd">2. Trainingsrol</text><text x="142" y="70" text-anchor="middle" font-size="13" fill="#93c5fd">basis • instrueren • reasoning • distilleren</text><text x="142" y="96" text-anchor="middle" font-size="12" fill="#94a3b8">De labels mogen elkaar overlappen.</text></g>
    <g transform="translate(685 105)"><rect width="285" height="125" rx="15" fill="#9a3412" stroke="#ea580c" /><text x="142" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#fdba74">3. Architectuur</text><text x="142" y="70" text-anchor="middle" font-size="13" fill="#fdba74">dicht • MoE • totaal / actief</text><text x="142" y="96" text-anchor="middle" font-size="12" fill="#94a3b8">kernel compatibiliteit</text></g>
    <g transform="translate(30 275)"><rect width="285" height="125" rx="15" fill="#1d4ed8" stroke="#2563eb" /><text x="142" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">4. Numerieke weergave</text><text x="142" y="70" text-anchor="middle" font-size="13" fill="#93c5fd">BF16 • FP8 • GPTQ • AWQ</text><text x="142" y="96" text-anchor="middle" font-size="12" fill="#94a3b8">dtype of quantization-methode</text></g>
    <g transform="translate(357 275)"><rect width="285" height="125" rx="15" fill="#1d4ed8" stroke="#2563eb" /><text x="142" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">5. Container + lay-out</text><text x="142" y="70" text-anchor="middle" font-size="13" fill="#93c5fd">Safetensors-shards • GGUF</text><text x="142" y="96" text-anchor="middle" font-size="12" fill="#94a3b8">bestanden + metadata</text></g>
    <g transform="translate(685 275)"><rect width="285" height="125" rx="15" fill="#1d4ed8" stroke="#2563eb" /><text x="142" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">6. Runtime + hardware</text><text x="142" y="70" text-anchor="middle" font-size="13" fill="#93c5fd">llama.cpp • vLLM • Transformatoren</text><text x="142" y="96" text-anchor="middle" font-size="12" fill="#94a3b8">ondersteunde uitvoeringspad</text></g>
    <text x="500" y="460" text-anchor="middle" font-size="13" fill="#94a3b8">Geen enkele suffix op zichzelf bewijst de kwaliteit van de taak, de geheugencompatibiliteit of de snelheid van serving.</text>
  </g>
</svg>
