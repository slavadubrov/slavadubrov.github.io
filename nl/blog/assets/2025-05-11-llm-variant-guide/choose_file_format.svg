<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Bestandsvorm kiezen</title>
  <desc id="artifact-desc">Bestandsvorm kiezen.</desc>
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .node { fill: #1d4ed8; stroke: #94a3b8; stroke-width: 2; rx: 8; ry: 8; }
      .node-start { fill: #dc2626; stroke: #dc2626; stroke-width: 2; rx: 8; ry: 8; }
      .node-result { fill: #2563eb; stroke: #2563eb; stroke-width: 2; rx: 8; ry: 8; }
      .text { font-family: Inter, system-ui, sans-serif; fill: #93c5fd; font-size: 14px; text-anchor: middle; }
      .text-dark { font-family: Inter, system-ui, sans-serif; fill: #0f172a; font-size: 14px; font-weight: bold; text-anchor: middle; }
      .arrow { stroke: #2563eb; stroke-width: 2; marker-end: url(#arrowhead); fill: none; }
      .label-bg { fill: #0f172a; opacity: 0.8; }
      .label-text { font-family: Inter, system-ui, sans-serif; fill: #93c5fd; font-size: 11px; text-anchor: middle; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="800" height="500" class="bg" />

  <text y="40" class="text" style="font-size: 22px; font-weight: bold;" x="400">Bestandsvorm kiezen</text>


  <rect x="300" y="70" width="200" height="50" class="node-start" />
  <text y="100" class="text-dark" x="400">Wat is uw hardware?</text>



  <path d="M 300 95 L 150 95 L 150 160" class="arrow" marker-end="url(#arrowhead)" />
  <rect x="130" y="120" width="40" height="20" class="label-bg" />
  <text y="135" class="label-text" x="150">CPU / Mac</text>


  <path d="M 350 120 L 300 160" class="arrow" marker-end="url(#arrowhead)" />
  <rect x="280" y="130" width="80" height="20" class="label-bg" />
  <text y="145" class="label-text" x="320">Nvidia GPU</text>


  <path d="M 450 120 L 500 160" class="arrow" marker-end="url(#arrowhead)" />
  <rect x="460" y="130" width="60" height="20" class="label-bg" />
  <text y="145" class="label-text" x="490">Cloud H100</text>


  <path d="M 500 95 L 650 95 L 650 160" class="arrow" marker-end="url(#arrowhead)" />
  <rect x="630" y="120" width="40" height="20" class="label-bg" />
  <text y="135" class="label-text" x="650">Mobiel</text>


  <rect x="75" y="160" width="150" height="60" class="node-result" />
  <text y="195" class="text-dark" x="150">GGUF</text>

  <rect x="225" y="160" width="150" height="60" class="node" />
  <text y="195" class="text" x="300">GPTQ / AWQ</text>

  <rect x="425" y="160" width="150" height="60" class="node" />
  <text y="195" class="text" x="500">Safetensors</text>

  <rect x="575" y="160" width="150" height="60" class="node" />
  <text y="195" class="text" x="650">ONNX / TFLite</text>


  <text y="240" class="text" style="font-size: 12px; fill: #93c5fd;" x="150">Universele compatibiliteit.</text>
  <text y="255" class="text" style="font-size: 12px; fill: #93c5fd;" x="150">Optimaal voor Apple Silicon.</text>

  <text y="240" class="text" style="font-size: 12px; fill: #93c5fd;" x="300">Snelst op Nvidia.</text>
  <text y="255" class="text" style="font-size: 12px; fill: #93c5fd;" x="300">Laag VRAM-verbruik.</text>

  <text y="240" class="text" style="font-size: 12px; fill: #93c5fd;" x="500">Volledige precisie.</text>
  <text y="255" class="text" style="font-size: 12px; fill: #93c5fd;" x="500">Maximale kwaliteit.</text>

  <text y="240" class="text" style="font-size: 12px; fill: #93c5fd;" x="650">Optimaliseerd voor randapparaten.</text>
  <text y="255" class="text" style="font-size: 12px; fill: #93c5fd;" x="650">Kleine voetafdruk.</text>


  <rect x="200" y="300" width="400" height="80" class="node" style="stroke-dasharray: 4; fill: #1e293b;" />
  <text y="330" class="text" style="font-weight: bold; fill: #fdba74;" x="400">Professioneel tip</text>
  <text y="355" class="text" x="400">GGUF is de veiligste keuze voor lokale experimenten.</text>

</svg>
