<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Checkpoint, runtime en quantization selectie workflow</title>
  <desc id="desc">De workflow begint met een taakcontract, kiest een checkpoint op basis van een kwalitatieve evaluatie, controleert of er een compatibele runtime is, meet het geheugenverbruik, vergelijkt de representaties en benchmarks het volledige release-artefact.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="480" rx="22" fill="#0f172a" /><text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Kies gedrag vóór compressie</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(30 120)"><rect width="135" height="120" rx="14" fill="#1e293b" stroke="#64748b" /><text x="67" y="35" text-anchor="middle" font-size="15" font-weight="700" fill="#e2e8f0">1. Taakcontract</text><text x="67" y="68" text-anchor="middle" font-size="11" fill="#cbd5e1">kwaliteit • licentie</text><text x="67" y="89" text-anchor="middle" font-size="11" fill="#94a3b8">interface • context</text></g><text x="180" y="188" font-size="23" fill="#94a3b8">→</text>
    <g transform="translate(205 120)"><rect width="135" height="120" rx="14" fill="#5b21b6" stroke="#2563eb" /><text x="67" y="35" text-anchor="middle" font-size="15" font-weight="700" fill="#c4b5fd">2. Checkpoint</text><text x="67" y="68" text-anchor="middle" font-size="11" fill="#93c5fd">exacte revisie</text><text x="67" y="89" text-anchor="middle" font-size="11" fill="#94a3b8">hoge-kwaliteitsbaseline</text></g><text x="355" y="188" font-size="23" fill="#94a3b8">→</text>
    <g transform="translate(380 120)"><rect width="135" height="120" rx="14" fill="#9a3412" stroke="#ea580c" /><text x="67" y="35" text-anchor="middle" font-size="15" font-weight="700" fill="#fdba74">3. Runtime</text><text x="67" y="68" text-anchor="middle" font-size="11" fill="#fdba74">architectuur</text><text x="67" y="89" text-anchor="middle" font-size="11" fill="#94a3b8">kernel + hardware</text></g><text x="530" y="188" font-size="23" fill="#94a3b8">→</text>
    <g transform="translate(555 120)"><rect width="135" height="120" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="67" y="35" text-anchor="middle" font-size="15" font-weight="700" fill="#93c5fd">4. Geheugen</text><text x="67" y="68" text-anchor="middle" font-size="11" fill="#93c5fd">weights + sleutel-waarde-paar</text><text x="67" y="89" text-anchor="middle" font-size="11" fill="#94a3b8">werkruimte + buffer</text></g><text x="705" y="188" font-size="23" fill="#94a3b8">→</text>
    <g transform="translate(730 120)"><rect width="135" height="120" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="67" y="35" text-anchor="middle" font-size="15" font-weight="700" fill="#93c5fd">5. Representatie</text><text x="67" y="68" text-anchor="middle" font-size="11" fill="#93c5fd">precisie / kwantificatie</text><text x="67" y="89" text-anchor="middle" font-size="11" fill="#94a3b8">herkomst + hash</text></g><text x="880" y="188" font-size="23" fill="#94a3b8">→</text>
    <g transform="translate(900 120)"><rect width="75" height="120" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="37" y="35" text-anchor="middle" font-size="13" font-weight="700" fill="#93c5fd">6. Testen</text><text x="37" y="68" text-anchor="middle" font-size="10" fill="#93c5fd">publicatie</text><text x="37" y="88" text-anchor="middle" font-size="10" fill="#94a3b8">eenheid</text></g>
    <rect x="150" y="315" width="700" height="80" rx="14" fill="#991b1b" stroke="#dc2626" /><text x="500" y="347" text-anchor="middle" font-size="16" font-weight="700" fill="#fca5a5">Elke mislukte controle keert terug naar de vorige keuze.</text><text x="500" y="375" text-anchor="middle" font-size="12" fill="#fca5a5">Een kleinere bestand is geen succesvolle release als de kwaliteit, context of gelijktijdigheid niet voldoen.</text>
    <text x="500" y="444" text-anchor="middle" font-size="13" fill="#94a3b8">Benchmark de precieze checkpoint, conversie, runtime, en hardware samen.</text>
  </g>
</svg>
