<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Progressieve onthulling: context op het juiste moment laden</title>
  <desc id="artifact-desc">Progressieve onthulling: context op het juiste moment laden.</desc>
    <style>
        .bg { fill: #0f172a; }
        .title { fill: #f8fafc; font-family: Inter, system-ui, sans-serif; font-size: 18px; font-weight: bold; text-anchor: middle; }
        .box { rx: 8; ry: 8; }
        .box-title { fill: #f8fafc; font-family: Inter, system-ui, sans-serif; font-size: 12px; font-weight: bold; text-anchor: middle; }
        .box-text { fill: #cbd5e1; font-family: Inter, system-ui, sans-serif; font-size: 10px; text-anchor: middle; }
        .arrow { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrow); }
        .flow-text { fill: #cbd5e1; font-family: Inter, system-ui, sans-serif; font-size: 10px; text-anchor: middle; }
    </style>
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
        </marker>
    </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

    <rect width="100%" height="100%" class="bg" />

    <text y="30" class="title" x="400">Progressieve onthulling: context op het juiste moment laden</text>

    <!-- Step 1: Initial Load -->
    <g transform="translate(50, 70)">
        <rect x="0" y="0" width="140" height="80" class="box" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" />
        <text y="25" class="box-title" x="70">1. Initiale laad</text>
        <text y="45" class="box-text" x="70">Systeemprompt</text>
        <text y="58" class="box-text" x="70">Definities van tools</text>
        <text y="71" class="box-text" x="70">Ongeveer 2K tokens</text>
    </g>

    <!-- Arrow 1 -->
    <path d="M 190 110 L 240 110" class="arrow" />
    <text y="100" class="flow-text" x="215">Gebruikersvraag</text>

    <!-- Step 2: Route -->
    <g transform="translate(250, 70)">
        <rect x="0" y="0" width="140" height="80" class="box" fill="#5b21b6" stroke="#7c3aed" stroke-width="2" />
        <text y="25" class="box-title" x="70">2. Route</text>
        <text y="45" class="box-text" x="70">Moet deze worden opgehaald?</text>
        <text y="58" class="box-text" x="70">Is er geheugen nodig?</text>
        <text y="71" class="box-text" x="70">Welke tools?</text>
    </g>

    <!-- Arrow 2 -->
    <path d="M 390 110 L 440 110" class="arrow" />
    <text y="100" class="flow-text" x="415">Selektief</text>

    <!-- Step 3: Load -->
    <g transform="translate(450, 70)">
        <rect x="0" y="0" width="140" height="80" class="box" fill="#166534" stroke="#16a34a" stroke-width="2" />
        <text y="25" class="box-title" x="70">3. Alleen benodigde bestanden laden</text>
        <text y="45" class="box-text" x="70">Relevante documentatie (3-5)</text>
        <text y="58" class="box-text" x="70">Gebruikersgeheugen</text>
        <text y="71" class="box-text" x="70">Ongeveer 8K tokens</text>
    </g>

    <!-- Arrow 3 -->
    <path d="M 590 110 L 640 110" class="arrow" />
    <text y="100" class="flow-text" x="615">Uitvoeren</text>

    <!-- Step 4: Respond -->
    <g transform="translate(650, 70)">
        <rect x="0" y="0" width="100" height="80" class="box" fill="#9a3412" stroke="#ea580c" stroke-width="2" />
        <text y="25" class="box-title" x="50">4. Reageren</text>
        <text y="50" class="box-text" x="50">Genereren</text>
        <text y="63" class="box-text" x="50">in context</text>
    </g>

    <!-- Contrast: Naive approach -->
    <g transform="translate(50, 180)">
        <rect x="0" y="0" width="700" height="60" class="box" fill="#991b1b" stroke="#dc2626" stroke-width="2" />
        <text y="20" class="box-title" style="fill: #fca5a5;" x="350">❌ Naïeve benadering: Alles van tevoren laden</text>
        <text y="40" class="box-text" x="350">Alle documenten + al het geheugen + alle voorbeelden = 100K+ tokens = verslechtering van prestaties + hogere kosten</text>
    </g>

    <!-- Insight -->
    <rect x="150" y="255" width="500" height="30" rx="6" ry="6" fill="#1e293b" stroke="#94a3b8" />
    <text y="275" class="box-text" style="fill: #86efac;" x="400">Sleutel: Houd lichtgewicht identificatoren in stand en laad gegevens dynamisch wanneer nodig</text>
</svg>
