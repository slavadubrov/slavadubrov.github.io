<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Context die wordt samengesteld via gefaseerde retrieval, budgettering, uitvoering en validatie</title>
  <desc id="desc">De statusstromen van betrouwbare verzoeken gaan via besluitvorming op basis van autorisatie retrieval, budgettering gebaseerd op utiliteit, voorstelgenereerden model, deterministische validatie en uitvoering, en vervolgens registratie van herkomst en resultaten.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="460" rx="22" fill="#0f172a" />
  <text x="500" y="46" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Context assembly valt onder het levenscyclusmodel per beslissing</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(25 115)"><rect width="150" height="110" rx="14" fill="#1e293b" stroke="#64748b" /><text x="75" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#e2e8f0">Geverifieerde verzoek</text><text x="75" y="63" text-anchor="middle" font-size="11" fill="#cbd5e1">acteur, huurder, taak</text><text x="75" y="84" text-anchor="middle" font-size="11" fill="#94a3b8">locatie + tijd</text></g><text x="192" y="180" text-anchor="middle" font-size="22" fill="#94a3b8">→</text>
    <g transform="translate(210 115)"><rect width="150" height="110" rx="14" fill="#5b21b6" stroke="#2563eb" /><text x="75" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#c4b5fd">Decisie selecteren</text><text x="75" y="63" text-anchor="middle" font-size="11" fill="#93c5fd">plannen, ophalen, handelen</text><text x="75" y="84" text-anchor="middle" font-size="11" fill="#94a3b8">of reageren</text></g><text x="377" y="180" text-anchor="middle" font-size="22" fill="#94a3b8">→</text>
    <g transform="translate(395 115)"><rect width="150" height="110" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="75" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#93c5fd">Reikwijdte + ophalen</text><text x="75" y="63" text-anchor="middle" font-size="11" fill="#93c5fd">eerst autoriseren</text><text x="75" y="84" text-anchor="middle" font-size="11" fill="#94a3b8">bewijsrangschikking</text></g><text x="562" y="180" text-anchor="middle" font-size="22" fill="#94a3b8">→</text>
    <g transform="translate(580 115)"><rect width="150" height="110" rx="14" fill="#9a3412" stroke="#ea580c" /><text x="75" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#fdba74">Budget + samenstellen</text><text x="75" y="63" text-anchor="middle" font-size="11" fill="#fdba74">utiliteit, versheid</text><text x="75" y="84" text-anchor="middle" font-size="11" fill="#94a3b8">vertrouwensgrenzen</text></g><text x="747" y="180" text-anchor="middle" font-size="22" fill="#94a3b8">→</text>
    <g transform="translate(765 115)"><rect width="210" height="110" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="105" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#93c5fd">Forstellen → valideren → handelen</text><text x="105" y="63" text-anchor="middle" font-size="11" fill="#93c5fd">getypte uitvoer + beleid</text><text x="105" y="84" text-anchor="middle" font-size="11" fill="#94a3b8">tool-na-condities</text></g>
    <rect x="120" y="300" width="760" height="85" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="500" y="331" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Het manifest, de herkomst, de validatie en het resultaat van de taak vastleggen</text><text x="500" y="360" text-anchor="middle" font-size="12" fill="#93c5fd">De volgende beslissing krijgt een nieuw werkset in plaats van alles te erven.</text>
    <text x="500" y="425" text-anchor="middle" font-size="13" fill="#94a3b8">Een model-aanroep is één stap binnen de contextpolicy, niet de policy zelf.</text>
  </g>
</svg>
