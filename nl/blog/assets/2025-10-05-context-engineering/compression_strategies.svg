<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Strategieën voor contextcompressie</title>
  <desc id="artifact-desc">Strategieën voor contextcompressie.</desc>
    <style>
        .bg { fill: #0f172a; }
        .title { fill: #f8fafc; font-family: Inter, system-ui, sans-serif; font-size: 20px; font-weight: bold; text-anchor: middle; }
        .subtitle { fill: #cbd5e1; font-family: Inter, system-ui, sans-serif; font-size: 12px; text-anchor: middle; }
        .box { rx: 8; ry: 8; }
        .box-title { fill: #f8fafc; font-family: Inter, system-ui, sans-serif; font-size: 14px; font-weight: bold; text-anchor: middle; }
        .box-text { fill: #cbd5e1; font-family: Inter, system-ui, sans-serif; font-size: 11px; text-anchor: middle; }
        .metric { fill: #fdba74; font-family: Inter, system-ui, sans-serif; font-size: 20px; font-weight: bold; text-anchor: middle; }
        .metric-label { fill: #cbd5e1; font-family: Inter, system-ui, sans-serif; font-size: 10px; text-anchor: middle; }
        .arrow { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrow); }
        .best { fill: #166534; font-family: Inter, system-ui, sans-serif; font-size: 10px; font-weight: bold; text-anchor: middle; }
    </style>
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
        </marker>
    </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

    <rect width="100%" height="100%" class="bg" />

    <text y="35" class="title" x="450">Strategieën voor contextcompressie</text>
    <text y="55" class="subtitle" x="450">Optimaliseer voor tokens per taak, niet voor tokens per verzoek</text>

    <!-- Strategy 1: Anchored Iterative -->
    <g transform="translate(50, 90)">
        <rect x="0" y="0" width="250" height="260" class="box" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" />
        <text y="30" class="box-title" x="125">Gevangen iteratief</text>
        <text y="50" class="box-title" x="125">Samenvatting</text>

        <line x1="20" y1="65" x2="230" y2="65" stroke="#2563eb" stroke-width="1" opacity="0.5" />

        <text y="90" class="box-text" x="125">Gestructureerde samenvattingen behouden</text>
        <text y="105" class="box-text" x="125">met expliciete secties</text>
        <text y="130" class="box-text" x="125">Incrementeel samenvoegen op</text>
        <text y="145" class="box-text" x="125">elke compressiecyclus</text>

        <!-- Metrics -->
        <rect x="20" y="165" width="95" height="50" rx="6" ry="6" fill="#1e293b" stroke="#94a3b8" />
        <text y="190" class="metric" x="67">98,6%</text>
        <text y="205" class="metric-label" x="67">Compressie</text>

        <rect x="135" y="165" width="95" height="50" rx="6" ry="6" fill="#1e293b" stroke="#94a3b8" />
        <text y="190" class="metric" x="182">3,70</text>
        <text y="205" class="metric-label" x="182">Kwaliteit</text>

        <text y="235" class="best" x="125">✓ IDEAL VOOR BESTANDSPERICHTING</text>
        <text y="250" class="box-text" x="125">Lange coderingssessies</text>
    </g>

    <!-- Strategy 2: Regenerative -->
    <g transform="translate(325, 90)">
        <rect x="0" y="0" width="250" height="260" class="box" fill="#5b21b6" stroke="#7c3aed" stroke-width="2" />
        <text y="30" class="box-title" x="125">Regeneratief</text>
        <text y="50" class="box-title" x="125">Volledige samenvatting</text>

        <line x1="20" y1="65" x2="230" y2="65" stroke="#7c3aed" stroke-width="1" opacity="0.5" />

        <text y="90" class="box-text" x="125">Gedetailleerde samenvatting genereren</text>
        <text y="105" class="box-text" x="125">bij elke compressie</text>
        <text y="130" class="box-text" x="125">Volledige contextbeoordeling</text>
        <text y="145" class="box-text" x="125">elke cyclus</text>

        <!-- Metrics -->
        <rect x="20" y="165" width="95" height="50" rx="6" ry="6" fill="#1e293b" stroke="#94a3b8" />
        <text y="190" class="metric" x="67">98,7%</text>
        <text y="205" class="metric-label" x="67">Compressie</text>

        <rect x="135" y="165" width="95" height="50" rx="6" ry="6" fill="#1e293b" stroke="#94a3b8" />
        <text y="190" class="metric" x="182">3,44</text>
        <text y="205" class="metric-label" x="182">Kwaliteit</text>

        <text y="235" class="best" x="125">✓ IDEAAL VOOR LEESBAARHEID</text>
        <text y="250" class="box-text" x="125">Duidelijke fasegrenzen</text>
    </g>

    <!-- Strategy 3: Opaque -->
    <g transform="translate(600, 90)">
        <rect x="0" y="0" width="250" height="260" class="box" fill="#166534" stroke="#ea580c" stroke-width="2" />
        <text y="30" class="box-title" x="125">Ondoorzichtig</text>
        <text y="50" class="box-title" x="125">Compressie</text>

        <line x1="20" y1="65" x2="230" y2="65" stroke="#ea580c" stroke-width="1" opacity="0.5" />

        <text y="90" class="box-text" x="125">Gecomprimeerde weergave</text>
        <text y="105" class="box-text" x="125">geoptimaliseerd voor reconstructie</text>
        <text y="130" class="box-text" x="125">Interpretabiliteit opofferen</text>
        <text y="145" class="box-text" x="125">voor maximale besparingen</text>

        <!-- Metrics -->
        <rect x="20" y="165" width="95" height="50" rx="6" ry="6" fill="#1e293b" stroke="#94a3b8" />
        <text y="190" class="metric" x="67">99,3%</text>
        <text y="205" class="metric-label" x="67">Compressie</text>

        <rect x="135" y="165" width="95" height="50" rx="6" ry="6" fill="#1e293b" stroke="#94a3b8" />
        <text y="190" class="metric" x="182">3,35</text>
        <text y="205" class="metric-label" x="182">Kwaliteit</text>

        <text y="235" class="best" x="125">✓ IDEAAL VOOR MAXIMALE BEPERKING VAN DE KOSTEN</text>
        <text y="250" class="box-text" x="125">Korte sessies, minimale herlaadacties</text>
    </g>

    <!-- Bottom insight -->
    <rect x="200" y="365" width="500" height="30" rx="6" ry="6" fill="#1e293b" stroke="#94a3b8" />
    <text y="385" class="box-text" style="fill: #fdba74;" x="450">Kerninzicht: 0,7% meer behouden tokens → 0,35 kwaliteitspunten gewonnen</text>
</svg>
