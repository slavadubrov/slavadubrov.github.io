<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
    <style>
        .bg { fill: #1e1e1e; }
        .title { fill: #f8fafc; font-family: sans-serif; font-size: 20px; font-weight: bold; text-anchor: middle; }
        .subtitle { fill: #94a3b8; font-family: sans-serif; font-size: 12px; text-anchor: middle; }
        .box { rx: 8; ry: 8; }
        .box-title { fill: #f8fafc; font-family: sans-serif; font-size: 14px; font-weight: bold; text-anchor: middle; }
        .box-text { fill: #cbd5e1; font-family: sans-serif; font-size: 11px; text-anchor: middle; }
        .metric { fill: #fde047; font-family: sans-serif; font-size: 20px; font-weight: bold; text-anchor: middle; }
        .metric-label { fill: #94a3b8; font-family: sans-serif; font-size: 10px; text-anchor: middle; }
        .arrow { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrow); }
        .best { fill: #22c55e; font-family: sans-serif; font-size: 10px; font-weight: bold; text-anchor: middle; }
    </style>
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
        </marker>
    </defs>

    <rect width="100%" height="100%" class="bg" />

    <text x="450" y="35" class="title">Contextcompressiestrategieën</text>
    <text x="450" y="55" class="subtitle">Optimaliseer voor tokens per taak, niet per verzoek</text>

    <!-- Strategy 1: Anchored Iterative -->
    <g transform="translate(50, 90)">
        <rect x="0" y="0" width="250" height="260" class="box" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2" />
        <text x="125" y="30" class="box-title">Verankerde iteratieve</text>
        <text x="125" y="50" class="box-title">samenvatting</text>

        <line x1="20" y1="65" x2="230" y2="65" stroke="#3b82f6" stroke-width="1" opacity="0.5" />

        <text x="125" y="90" class="box-text">Behoud gestructureerde samenvattingen</text>
        <text x="125" y="105" class="box-text">met expliciete secties</text>
        <text x="125" y="130" class="box-text">Voeg stapsgewijs samen bij</text>
        <text x="125" y="145" class="box-text">elke compressiecyclus</text>

        <!-- Metrics -->
        <rect x="20" y="165" width="95" height="50" rx="6" ry="6" fill="#2d2d2d" stroke="#475569" />
        <text x="67" y="190" class="metric">98.6%</text>
        <text x="67" y="205" class="metric-label">Compressie</text>

        <rect x="135" y="165" width="95" height="50" rx="6" ry="6" fill="#2d2d2d" stroke="#475569" />
        <text x="182" y="190" class="metric">3.70</text>
        <text x="182" y="205" class="metric-label">Kwaliteit</text>

        <text x="125" y="235" class="best">✓ BEST VOOR BESTANDSTRACKING</text>
        <text x="125" y="250" class="box-text">Lange codingsessies</text>
    </g>

    <!-- Strategy 2: Regenerative -->
    <g transform="translate(325, 90)">
        <rect x="0" y="0" width="250" height="260" class="box" fill="#2e1e3f" stroke="#a855f7" stroke-width="2" />
        <text x="125" y="30" class="box-title">Regeneratieve</text>
        <text x="125" y="50" class="box-title">volledige samenvatting</text>

        <line x1="20" y1="65" x2="230" y2="65" stroke="#a855f7" stroke-width="1" opacity="0.5" />

        <text x="125" y="90" class="box-text">Genereer een gedetailleerde samenvatting</text>
        <text x="125" y="105" class="box-text">bij elke compressie</text>
        <text x="125" y="130" class="box-text">Volledige contextreview</text>
        <text x="125" y="145" class="box-text">elke cyclus</text>

        <!-- Metrics -->
        <rect x="20" y="165" width="95" height="50" rx="6" ry="6" fill="#2d2d2d" stroke="#475569" />
        <text x="67" y="190" class="metric">98.7%</text>
        <text x="67" y="205" class="metric-label">Compressie</text>

        <rect x="135" y="165" width="95" height="50" rx="6" ry="6" fill="#2d2d2d" stroke="#475569" />
        <text x="182" y="190" class="metric">3.44</text>
        <text x="182" y="205" class="metric-label">Kwaliteit</text>

        <text x="125" y="235" class="best">✓ BEST VOOR LEESBAARHEID</text>
        <text x="125" y="250" class="box-text">Duidelijke fasegrenzen</text>
    </g>

    <!-- Strategy 3: Opaque -->
    <g transform="translate(600, 90)">
        <rect x="0" y="0" width="250" height="260" class="box" fill="#3f3d1e" stroke="#eab308" stroke-width="2" />
        <text x="125" y="30" class="box-title">Ondoorzichtige</text>
        <text x="125" y="50" class="box-title">compressie</text>

        <line x1="20" y1="65" x2="230" y2="65" stroke="#eab308" stroke-width="1" opacity="0.5" />

        <text x="125" y="90" class="box-text">Gecomprimeerde representatie</text>
        <text x="125" y="105" class="box-text">geoptimaliseerd voor reconstructie</text>
        <text x="125" y="130" class="box-text">Offert interpreteerbaarheid op</text>
        <text x="125" y="145" class="box-text">voor maximale besparing</text>

        <!-- Metrics -->
        <rect x="20" y="165" width="95" height="50" rx="6" ry="6" fill="#2d2d2d" stroke="#475569" />
        <text x="67" y="190" class="metric">99.3%</text>
        <text x="67" y="205" class="metric-label">Compressie</text>

        <rect x="135" y="165" width="95" height="50" rx="6" ry="6" fill="#2d2d2d" stroke="#475569" />
        <text x="182" y="190" class="metric">3.35</text>
        <text x="182" y="205" class="metric-label">Kwaliteit</text>

        <text x="125" y="235" class="best">✓ BEST VOOR MAX BESPARING</text>
        <text x="125" y="250" class="box-text">Korte sessies, weinig ophalen</text>
    </g>

    <!-- Bottom insight -->
    <rect x="200" y="365" width="500" height="30" rx="6" ry="6" fill="#1e293b" stroke="#475569" />
    <text x="450" y="385" class="box-text" style="fill: #fde047;">Kerninzicht: 0.7% meer tokens behouden → 0.35 kwaliteitspunten winst</text>
</svg>
