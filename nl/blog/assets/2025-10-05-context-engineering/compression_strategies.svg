<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Verliesbewust context compression met afzonderlijke canonieke toestands- en artefactindexen</title>
  <desc id="desc">Gesprekken en observaties worden samengevat tot een compact werkset, terwijl de canonieke taaktoestand, referenties naar bewijsmateriaal en de geschiedenis van artefacten apart worden opgeslagen voor nauwkeurige herstel.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="440" rx="22" fill="#0f172a" /><text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Prosa comprimeren; herstelbare toestand behouden</text>
  <g font-family="Inter, system-ui, sans-serif"><g transform="translate(35 105)"><rect width="260" height="230" rx="16" fill="#1e293b" stroke="#64748b" /><text x="130" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#e2e8f0">Groeiende context</text><text x="30" y="83" font-size="13" fill="#cbd5e1">conversatiepassen</text><text x="30" y="116" font-size="13" fill="#cbd5e1">ruwe observaties van het hulpprogramma</text><text x="30" y="149" font-size="13" fill="#cbd5e1">geretourneerde passages</text><text x="30" y="182" font-size="13" fill="#cbd5e1">herhaalde standaardtekst</text></g><text x="325" y="225" font-size="25" fill="#94a3b8">→</text>
  <g transform="translate(365 105)"><rect width="270" height="230" rx="16" fill="#1d4ed8" stroke="#2563eb" /><text x="135" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#93c5fd">Kompact werkset</text><text x="30" y="83" font-size="13" fill="#93c5fd">beslissingen + volgende actie</text><text x="30" y="116" font-size="13" fill="#93c5fd">resultaten van getypte hulpprogramma’s</text><text x="30" y="149" font-size="13" fill="#93c5fd">referenties naar bron en artefact</text><text x="30" y="182" font-size="13" fill="#93c5fd">nog opgeloste vragen</text></g><text x="665" y="225" font-size="25" fill="#94a3b8">+</text>
  <g transform="translate(705 85)"><rect width="260" height="270" rx="16" fill="#1d4ed8" stroke="#2563eb" /><text x="130" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#93c5fd">Canonieke opslagruimtes</text><text x="30" y="83" font-size="13" fill="#93c5fd">taakstatus</text><text x="30" y="116" font-size="13" fill="#93c5fd">index van bestanden en artefacten</text><text x="30" y="149" font-size="13" fill="#93c5fd">volledige tool results</text><text x="30" y="182" font-size="13" fill="#93c5fd">versies van bewijsmateriaal</text><text x="30" y="225" font-size="12" fill="#93c5fd">Nuwe ophaling van exacte details</text><text x="30" y="247" font-size="12" fill="#93c5fd">wanneer de taak ze nodig heeft.</text></g><text x="500" y="400" text-anchor="middle" font-size="13" fill="#94a3b8">Optimaliseer de totale tokens per succesvolle taak, inclusief herhalende ophaling en herstel.</text></g>
</svg>
