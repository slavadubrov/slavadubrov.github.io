<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Samenstelling van de contextvenster</title>
  <desc id="artifact-desc">Samenstelling van de contextvenster.</desc>
    <style>
        .bg { fill: #0f172a; }
        .container { fill: #0f172a; stroke: #94a3b8; stroke-width: 2; rx: 8; ry: 8; }
        .block { stroke-width: 2; rx: 6; ry: 6; }
        .block-text { fill: #f8fafc; font-family: Inter, system-ui, sans-serif; font-size: 16px; font-weight: bold; text-anchor: middle; }
        .block-subtext { fill: #cbd5e1; font-family: Inter, system-ui, sans-serif; font-size: 12px; text-anchor: middle; }
        .label { fill: #cbd5e1; font-family: Inter, system-ui, sans-serif; font-size: 14px; text-anchor: start; }
        .title { fill: #f8fafc; font-family: Inter, system-ui, sans-serif; font-size: 24px; font-weight: bold; text-anchor: middle; }
        .arrow { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrow); }
        .limit-line { stroke: #dc2626; stroke-width: 2; stroke-dasharray: 5 5; }
        .limit-text { fill: #fca5a5; font-family: Inter, system-ui, sans-serif; font-size: 12px; font-weight: bold; }
    </style>
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
        </marker>

        <linearGradient id="grad-system" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color: #991b1b;stop-opacity:1" />
            <stop offset="100%" style="stop-color: #991b1b;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="grad-examples" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color: #9a3412;stop-opacity:1" />
            <stop offset="100%" style="stop-color: #9a3412;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="grad-rag" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color: #166534;stop-opacity:1" />
            <stop offset="100%" style="stop-color: #166534;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="grad-history" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color: #5b21b6;stop-opacity:1" />
            <stop offset="100%" style="stop-color: #5b21b6;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="grad-query" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color: #1d4ed8;stop-opacity:1" />
            <stop offset="100%" style="stop-color: #2563eb;stop-opacity:1" />
        </linearGradient>
    </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>


    <rect width="100%" height="100%" class="bg" />


    <text y="40" class="title" x="400">Samenstelling van de contextvenster</text>


    <g transform="translate(200, 80)">

        <rect x="0" y="0" width="400" height="480" class="container" />


        <g transform="translate(20, 20)">
            <rect x="0" y="0" width="360" height="70" class="block" style="fill: url(#grad-system); stroke: #dc2626;" />
            <text y="30" class="block-text" x="180">1. Systeeminstructies</text>
            <text y="50" class="block-subtext" x="180">Persona, beperkingen, uitvoerformaat</text>
        </g>


        <g transform="translate(20, 100)">
            <rect x="0" y="0" width="360" height="70" class="block" style="fill: url(#grad-examples); stroke: #ea580c;" />
            <text y="30" class="block-text" x="180">2. Voorbeelden met weinig shots</text>
            <text y="50" class="block-subtext" x="180">Invoer -&gt; Uitvoerpatronen (statisch of dynamisch)</text>
        </g>


        <g transform="translate(20, 180)">
            <rect x="0" y="0" width="360" height="90" class="block" style="fill: url(#grad-rag); stroke: #16a34a;" />
            <text y="35" class="block-text" x="180">3. Geraadpleegde context (RAG)</text>
            <text y="55" class="block-subtext" x="180">Relevante documenten, databaseresultaten</text>
            <text y="70" class="block-subtext" style="font-size: 10px; fill: #86efac;" x="180">Dynamisch geïnjecteerd op basis van de query</text>
        </g>


        <g transform="translate(20, 280)">
            <rect x="0" y="0" width="360" height="80" class="block" style="fill: url(#grad-history); stroke: #7c3aed;" />
            <text y="35" class="block-text" x="180">4. Gespreksgeschiedenis</text>
            <text y="55" class="block-subtext" x="180">Vorige gebruikers/assistentenbeurten</text>
        </g>


        <g transform="translate(20, 370)">
            <rect x="0" y="0" width="360" height="90" class="block" style="fill: url(#grad-query); stroke: #2563eb;" />
            <text y="35" class="block-text" x="180">5. Huidige gebruikersvraag</text>
            <text y="55" class="block-subtext" x="180">Het daadwerkelijke prompt voor het antwoord</text>
        </g>
    </g>


    <g transform="translate(620, 100)">
        <text y="0" class="label" style="font-weight: bold; fill: #f8fafc;" x="0">Verwerkingsflow</text>
        <path d="M 20 20 L 20 400" class="arrow" marker-end="url(#arrow)" />
        <text y="200" class="label" x="35" transform="rotate(90, 35, 200)">Het model leest van boven naar beneden</text>
    </g>


    <g transform="translate(150, 50)">
        <line x1="50" y1="0" x2="450" y2="0" class="limit-line" />
        <text y="5" class="limit-text" x="460">Start van het contextvenster (0)</text>
    </g>

    <g transform="translate(150, 580)">
        <line x1="50" y1="0" x2="450" y2="0" class="limit-line" />
        <text y="5" class="limit-text" x="460">Maximaal contextlimiet (N)</text>
    </g>

</svg>
