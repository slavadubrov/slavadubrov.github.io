<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Stroom van beveiligingsregels</title>
  <desc id="artifact-desc">Stroom van beveiligingsregels.</desc>

<style>
    .bg { fill: #0f172a; }
    .node { fill: #1e293b; stroke: #2563eb; stroke-width: 2; rx: 8; ry: 8; }
    .node-text { fill: #f8fafc; font-family: Inter, system-ui, sans-serif; font-size: 14px; text-anchor: middle; dominant-baseline: middle; }
    .edge { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .label { fill: #cbd5e1; font-family: Inter, system-ui, sans-serif; font-size: 12px; text-anchor: middle; background-color: #0f172a; }
    .title { fill: #f8fafc; font-family: Inter, system-ui, sans-serif; font-size: 18px; font-weight: bold; text-anchor: middle; }
    .group-label { fill: #cbd5e1; font-family: Inter, system-ui, sans-serif; font-size: 14px; font-weight: bold; text-anchor: start; }
    .accent-green { stroke: #16a34a; }
    .accent-red { stroke: #dc2626; }
    .accent-yellow { stroke: #ea580c; }
    .accent-purple { stroke: #7c3aed; }
    .accent-orange { stroke: #ea580c; }
</style>
<defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
</defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

<rect width="100%" height="100%" class="bg" />

<text y="30" class="title" x="400">Stroom van beveiligingsregels</text>

<g transform="translate(50, 120)">
    <rect x="0" y="0" width="100" height="40" class="node" style="stroke: #2563eb" />
    <text y="20" class="node-text" x="50">Ingang</text>
</g>

<g transform="translate(200, 100)">
    <rect x="0" y="0" width="120" height="80" class="node" style="stroke: #dc2626; fill: #991b1b" />
    <text y="30" class="node-text" style="fill: #fca5a5" x="60">Invoerbeveiligingen</text>
    <text y="55" class="node-text" style="font-size: 10px; fill: #fca5a5" x="60">PII, injectie</text>
</g>

<g transform="translate(370, 120)">
    <rect x="0" y="0" width="100" height="40" class="node" style="stroke: #ea580c" />
    <text y="20" class="node-text" x="50">Model</text>
</g>

<g transform="translate(520, 100)">
    <rect x="0" y="0" width="120" height="80" class="node" style="stroke: #dc2626; fill: #991b1b" />
    <text y="30" class="node-text" style="fill: #fca5a5" x="60">Uitvoerbescherming</text>
    <text y="55" class="node-text" style="font-size: 10px; fill: #fca5a5" x="60">Schema, beleid</text>
</g>

<g transform="translate(690, 120)">
    <rect x="0" y="0" width="100" height="40" class="node" style="stroke: #16a34a" />
    <text y="20" class="node-text" x="50">Actie</text>
</g>

<!-- Edges -->
<path d="M150 140 L200 140" class="edge" />
<path d="M320 140 L370 140" class="edge" />
<path d="M470 140 L520 140" class="edge" />
<path d="M640 140 L690 140" class="edge" />

</svg>
