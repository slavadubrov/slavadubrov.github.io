<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="680" viewBox="0 0 1120 680" role="img" aria-labelledby="title desc">
  <title id="title">Architectuur voor agentengeheugen onder leiding van een schema</title>
  <desc id="desc">Een tweebaansflowdiagram. De bovenste baan toont de invoerprocesstappen: episodestroom, gestructureerde extrahering, validatie en reconcilieerprocedures, gevolgd door opslag in SGAM. De onderste baan toont de verwerking van verzoeken: gebruikersvraag, zoekbeleid, opzoeking in SGAM, en context samen met het antwoord.</desc>
  <defs>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="132%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.14" />
    </filter>
    <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#6a1b9a" />
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1565c0" />
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2e7d32" />
    </marker>
    <style>
      .bg { fill: #f8f9fa; }
      .lane { stroke: #d0d7de; stroke-width: 2; rx: 8; }
      .laneTop { fill: #fbf7ff; stroke: #d7bee6; }
      .laneBottom { fill: #f6fbff; stroke: #bfd8ee; }
      .box { stroke-width: 2; rx: 8; filter: url(#shadow); }
      .blue { fill: #e3f2fd; stroke: #1565c0; }
      .purple { fill: #f3e5f5; stroke: #6a1b9a; }
      .green { fill: #e8f5e9; stroke: #2e7d32; }
      .orange { fill: #fff3e0; stroke: #e65100; }
      .red { fill: #fce4ec; stroke: #c62828; }
      .title { font: 700 24px Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 14px Arial, sans-serif; fill: #374151; }
      .laneLabel { font: 700 16px Arial, sans-serif; fill: #1f2937; }
      .label { font: 700 16px Arial, sans-serif; fill: #1f2937; }
      .small { font: 14px Arial, sans-serif; fill: #374151; }
      .tiny { font: 12px Arial, sans-serif; fill: #4b5563; }
      .arrowWrite { stroke: #6a1b9a; stroke-width: 3; fill: none; marker-end: url(#arrowPurple); }
      .arrowRead { stroke: #1565c0; stroke-width: 3; fill: none; marker-end: url(#arrowBlue); }
      .arrowReturn { stroke: #2e7d32; stroke-width: 3; fill: none; marker-end: url(#arrowGreen); }
      .divider { stroke: #d0d7de; stroke-width: 1.5; stroke-dasharray: 8 8; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1120" height="680" />
  <text class="title" x="42" y="48">SGAM heeft twee stromen, geen enkele lange prompt</text>
  <text class="subtitle" x="42" y="76">De invoer schrijft gegevens in het geheugen. Verzoeken lezen het kleinste huidige of historische deel op.</text>

  <rect class="lane laneTop" x="42" y="108" width="1036" height="224" />
  <rect class="lane laneBottom" x="42" y="372" width="1036" height="224" />

  <text class="laneLabel" x="66" y="139">1. Ingestiestroom (schrijfpad)</text>
  <line class="divider" x1="66" y1="154" x2="1054" y2="154" />
  <text class="laneLabel" x="66" y="403">2. Verzoekstroom (leespad)</text>
  <line class="divider" x1="66" y1="418" x2="1054" y2="418" />

  <rect class="box blue" x="66" y="188" width="170" height="104" />
  <text class="label" x="88" y="222">Episodestroom</text>
  <text class="small" x="88" y="250">berichten, hulpmiddelen,</text>
  <text class="small" x="88" y="270">bedrijfsgebeurtenissen</text>

  <rect class="box purple" x="276" y="178" width="190" height="124" />
  <text class="label" x="298" y="212">Gestructureerd</text>
  <text class="label" x="298" y="232">extractie</text>
  <text class="small" x="298" y="260">SGR / JSON-schema</text>
  <text class="small" x="298" y="282">getypte kandidaten</text>

  <rect class="box orange" x="506" y="178" width="120" height="124" />
  <text class="label" x="526" y="212">Valideren</text>
  <text class="label" x="526" y="232">en samenvoegen</text>
  <text class="small" x="526" y="260">dupe verwijderen</text>
  <text class="small" x="526" y="282">geldig tot</text>

  <rect class="box green" x="666" y="178" width="190" height="388" />
  <text class="label" x="690" y="212">SGAM-opslag</text>
  <text class="small" x="690" y="242">tenant_id</text>
  <text class="small" x="690" y="264">schema_version</text>
  <text class="small" x="690" y="286">van geldig tot / tot geldigheid eindigend op</text>
  <text class="small" x="690" y="308">vervangt</text>
  <text class="small" x="690" y="330">source_episode_id</text>
  <line x1="690" y1="354" x2="832" y2="354" stroke="#9ccca3" stroke-width="1.5" />
  <text class="tiny" x="690" y="382">Voegt land toe hier</text>
  <text class="tiny" x="690" y="404">Hier wordt het verlof gelezen.</text>

  <rect class="box blue" x="66" y="452" width="170" height="104" />
  <text class="label" x="88" y="486">Vraag van de gebruiker</text>
  <text class="small" x="88" y="514">Huidige staat?</text>
  <text class="small" x="88" y="534">Historische staat?</text>

  <rect class="box purple" x="276" y="442" width="210" height="124" />
  <text class="label" x="298" y="476">Opslagbeleid</text>
  <text class="small" x="298" y="504">tenant + type-filter</text>
  <text class="small" x="298" y="526">actieve tijdsreep</text>
  <text class="small" x="298" y="548">optionele vectoruitbreiding</text>

  <rect class="box red" x="884" y="442" width="170" height="124" />
  <text class="label" x="906" y="476">Context + antwoord</text>
  <text class="small" x="906" y="504">kleine geciteerde feiten</text>
  <text class="small" x="906" y="526">bronbewijs</text>
  <text class="small" x="906" y="548">geen dump van verouderde notities</text>

  <path class="arrowWrite" d="M236 240 H264" />
  <path class="arrowWrite" d="M466 240 H494" />
  <path class="arrowWrite" d="M626 240 H654" />

  <path class="arrowRead" d="M236 504 H264" />
  <path class="arrowRead" d="M486 504 H654" />
  <path class="arrowReturn" d="M856 504 H884" />

  <text class="tiny" x="42" y="624">Invariantie: gestructureerde schrijfbewerkingen en scopegebonden lezingen vallen onder aparte verantwoordelijkheden. Vectorzoekopdrachten kunnen helpen bij het oproepen van gegevens, maar ze mogen niet bepalen welk mutabel feit actueel is.</text>
</svg>
