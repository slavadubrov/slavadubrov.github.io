<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 400" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Heet geheugen: checkpoint- en herstelflow</title>
  <desc id="artifact-desc">Heet geheugen: checkpoint- en herstelflow.</desc>
  <defs>
    <marker id="arrowC" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155" />
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb" />
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#166534" />
    </marker>
    <filter id="shadowC" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a" x="390">Heet geheugen: checkpoint- en herstelflow</text>

  <!-- === WRITE PATH (top) === -->
  <rect x="20" y="48" width="740" height="145" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1" stroke-dasharray="4" />
  <text y="68" font-size="12" font-weight="700" fill="#1d4ed8" x="35">Schrijf pad: checkpoint bij elke stap</text>

  <!-- Agent Step -->
  <rect x="40" y="82" width="130" height="50" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowC)" />
  <text y="105" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6" x="105">Agent stap</text>
  <text y="121" text-anchor="middle" font-size="9" fill="#64748b" x="105">Denken / Handelen / Observeren</text>

  <!-- Arrow -->
  <line x1="170" y1="107" x2="205" y2="107" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrowBlue)" />
  <text y="100" text-anchor="middle" font-size="9" fill="#1d4ed8" x="188">na</text>

  <!-- Serialize State -->
  <rect x="210" y="82" width="140" height="50" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowC)" />
  <text y="102" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="280">State serialiseren</text>
  <text y="118" text-anchor="middle" font-size="9" fill="#64748b" x="280">Berichten + metadata</text>

  <!-- Arrow -->
  <line x1="350" y1="107" x2="385" y2="107" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrowBlue)" />

  <!-- Write Checkpoint -->
  <rect x="390" y="82" width="160" height="50" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowC)" />
  <text y="102" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="470">Checkpoint schrijven</text>
  <text y="118" text-anchor="middle" font-size="9" fill="#64748b" x="470">Upsert uitvoeren in de database</text>

  <!-- Arrow to stores -->
  <line x1="550" y1="107" x2="585" y2="90" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrowBlue)" />
  <line x1="550" y1="107" x2="585" y2="125" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrowBlue)" />

  <!-- PostgreSQL -->
  <rect x="590" y="72" width="150" height="34" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowC)" />
  <text y="94" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8" x="665">PostgreSQL</text>

  <!-- Redis -->
  <rect x="590" y="112" width="150" height="34" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#shadowC)" />
  <text y="134" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b" x="665">Redis</text>

  <!-- Step labels -->
  <text y="150" text-anchor="middle" font-size="9" fill="#64748b" x="105">Stap N</text>
  <text y="150" text-anchor="middle" font-size="9" fill="#64748b" x="280">JSON / msgpack</text>
  <text y="150" text-anchor="middle" font-size="9" fill="#64748b" x="470">thread_id + stap_n</text>
  <text y="160" text-anchor="middle" font-size="9" fill="#64748b" x="665">Duurzaam / Snel</text>

  <!-- === READ PATH (bottom) === -->
  <rect x="20" y="208" width="740" height="150" rx="10" fill="#f0fdf4" stroke="#166534" stroke-width="1" stroke-dasharray="4" />
  <text y="228" font-size="12" font-weight="700" fill="#166534" x="35">Lespad: hervatten van checkpoint</text>

  <!-- Crash / Restart -->
  <rect x="40" y="242" width="130" height="50" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#shadowC)" />
  <text y="263" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b" x="105">Fout / Herstarten</text>
  <text y="279" text-anchor="middle" font-size="9" fill="#64748b" x="105">Proces beëindigd</text>

  <!-- Arrow -->
  <line x1="170" y1="267" x2="205" y2="267" stroke="#166534" stroke-width="1.5" marker-end="url(#arrowGreen)" />

  <!-- Load Checkpoint -->
  <rect x="210" y="242" width="160" height="50" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowC)" />
  <text y="263" text-anchor="middle" font-size="12" font-weight="600" fill="#166534" x="290">Checkpoint laden</text>
  <text y="279" text-anchor="middle" font-size="9" fill="#64748b" x="290">Laatste versie ophalen per thread_id</text>

  <!-- Arrow -->
  <line x1="370" y1="267" x2="405" y2="267" stroke="#166534" stroke-width="1.5" marker-end="url(#arrowGreen)" />

  <!-- Deserialize -->
  <rect x="410" y="242" width="150" height="50" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowC)" />
  <text y="263" text-anchor="middle" font-size="12" font-weight="600" fill="#166534" x="485">Deserialiseren</text>
  <text y="279" text-anchor="middle" font-size="9" fill="#64748b" x="485">Agenttoestand opnieuw opbouwen</text>

  <!-- Arrow -->
  <line x1="560" y1="267" x2="595" y2="267" stroke="#166534" stroke-width="1.5" marker-end="url(#arrowGreen)" />

  <!-- Resume Execution -->
  <rect x="600" y="242" width="140" height="50" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowC)" />
  <text y="263" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6" x="670">Herstelagent</text>
  <text y="279" text-anchor="middle" font-size="9" fill="#64748b" x="670">Doorgaan vanaf stap N</text>

  <!-- Step labels -->
  <text y="310" text-anchor="middle" font-size="9" fill="#64748b" x="105">OOM / tijdslimiet overschreden / fout</text>
  <text y="310" text-anchor="middle" font-size="9" fill="#64748b" x="290">Checkpointopslag opvragen</text>
  <text y="310" text-anchor="middle" font-size="9" fill="#64748b" x="485">Berichten herstellen</text>
  <text y="310" text-anchor="middle" font-size="9" fill="#64748b" x="670">Geen verloren vooruitgang</text>

  <!-- Bottom note -->
  <rect x="140" y="365" width="500" height="28" rx="14" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1" />
  <text y="384" text-anchor="middle" font-size="11" fill="#334155" x="390">Kerninzicht: elke stap wordt opgeslagen, waardoor herstel na een crash automatisch en zonder verlies plaatsvindt</text>
</svg>
