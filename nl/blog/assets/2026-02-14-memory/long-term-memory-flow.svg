<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 380" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="Long-Term Memory Flow" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Long-Term Memory Stroom</title>
  <defs>
    <marker id="arrowL" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155" />
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ea580c" />
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7c3aed" />
    </marker>
    <filter id="shadowL" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a" x="410">Long-Term Memory: Retrieval stroom</text>

  <!-- === Query Path (top row) === -->
  <rect x="15" y="48" width="790" height="120" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="1" stroke-dasharray="4" />
  <text y="68" font-size="12" font-weight="700" fill="#9a3412" x="30">Retrieval Pad</text>

  <!-- User Query -->
  <rect x="35" y="82" width="110" height="50" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowL)" />
  <text y="104" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6" x="90">Gebruikersvraag</text>
  <text y="120" text-anchor="middle" font-size="9" fill="#64748b" x="90">"Hoe kan ik..."</text>

  <!-- Arrow -->
  <line x1="145" y1="107" x2="175" y2="107" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrowOrange)" />

  <!-- Embed -->
  <rect x="180" y="82" width="110" height="50" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowL)" />
  <text y="104" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="235">Query embedden</text>
  <text y="120" text-anchor="middle" font-size="9" fill="#64748b" x="235">tekst-embedding-3</text>

  <!-- Arrow -->
  <line x1="290" y1="107" x2="320" y2="107" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrowOrange)" />

  <!-- Vector Search -->
  <rect x="325" y="82" width="140" height="50" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowL)" />
  <text y="104" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="395">Vector Search</text>
  <text y="120" text-anchor="middle" font-size="9" fill="#64748b" x="395">Qdrant / Pinecone</text>

  <!-- Arrow -->
  <line x1="465" y1="107" x2="495" y2="107" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrowOrange)" />

  <!-- Top-K Results -->
  <rect x="500" y="82" width="130" height="50" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowL)" />
  <text y="104" text-anchor="middle" font-size="12" font-weight="600" fill="#166534" x="565">Top-K resultaten</text>
  <text y="120" text-anchor="middle" font-size="9" fill="#64748b" x="565">Geclassificeerd op basis van gelijkenis</text>

  <!-- Arrow -->
  <line x1="630" y1="107" x2="660" y2="107" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrowOrange)" />

  <!-- Rerank (optional) -->
  <rect x="665" y="82" width="120" height="50" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowL)" />
  <text y="104" text-anchor="middle" font-size="12" font-weight="600" fill="#166534" x="725">Herranken</text>
  <text y="120" text-anchor="middle" font-size="9" fill="#64748b" x="725">Kruisencoder (optioneel)</text>

  <!-- === Injection Path (bottom row) === -->
  <rect x="15" y="190" width="790" height="120" rx="10" fill="#faf5ff" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4" />
  <text y="210" font-size="12" font-weight="700" fill="#5b21b6" x="30">Contextinjectie</text>

  <!-- Retrieved Docs -->
  <rect x="35" y="224" width="140" height="50" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowL)" />
  <text y="246" text-anchor="middle" font-size="12" font-weight="600" fill="#166534" x="105">Gehaalde documenten</text>
  <text y="262" text-anchor="middle" font-size="9" fill="#64748b" x="105">K relevante passages</text>

  <!-- Arrow -->
  <line x1="175" y1="249" x2="210" y2="249" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrowPurple)" />

  <!-- Format Context -->
  <rect x="215" y="224" width="150" height="50" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowL)" />
  <text y="246" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6" x="290">Contextformaat</text>
  <text y="262" text-anchor="middle" font-size="9" fill="#64748b" x="290">Template + referenties</text>

  <!-- Arrow -->
  <line x1="365" y1="249" x2="400" y2="249" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrowPurple)" />

  <!-- Inject into Prompt -->
  <rect x="405" y="224" width="170" height="50" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowL)" />
  <text y="246" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6" x="490">Injecteren in Prompt</text>
  <text y="262" text-anchor="middle" font-size="9" fill="#64748b" x="490">Systeembericht of prefix</text>

  <!-- Arrow -->
  <line x1="575" y1="249" x2="610" y2="249" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrowPurple)" />

  <!-- LLM Response -->
  <rect x="615" y="224" width="170" height="50" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowL)" />
  <text y="246" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6" x="700">LLM Generatie</text>
  <text y="262" text-anchor="middle" font-size="9" fill="#64748b" x="700">Gebaseerde reactie</text>

  <!-- Connecting arrow from retrieval to injection -->
  <path d="M725 132 Q730 160 725 170 Q720 180 400 180 Q80 180 105 220" stroke="#94a3b8" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowL)" />
  <text y="176" text-anchor="middle" font-size="9" fill="#64748b" x="410">het opgehaalde context doorgeven</text>

  <!-- Bottom: Write path note -->
  <rect x="120" y="330" width="580" height="40" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1" />
  <text y="348" text-anchor="middle" font-size="11" font-weight="600" fill="#334155" x="410">Schrijf pad (ingestuurde gegevens): Documenten worden in delen opgesplitst, ingebed en opgeslagen in een vectordatabase</text>
  <text y="363" text-anchor="middle" font-size="10" fill="#64748b" x="410">Chunk (512 tokens) --&gt; Embedden --&gt; Upserten naar Qdrant met metadata</text>
</svg>
