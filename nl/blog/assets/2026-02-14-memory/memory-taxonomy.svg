<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 550" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadowT" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1" />
    </filter>
  </defs>

  <!-- Title -->
  <text x="550" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">Taxonomie van agentengeheugen</text>

  <!-- Root Node -->
  <rect x="465" y="55" width="170" height="40" rx="20" fill="#6a1b9a" filter="url(#shadowT)" />
  <text x="550" y="81" text-anchor="middle" font-size="13" font-weight="600" fill="white">Agentengeheugen</text>

  <!-- Lines from root to three main branches -->
  <line x1="490" y1="95" x2="180" y2="145" stroke="#555" stroke-width="1.5" />
  <line x1="550" y1="95" x2="550" y2="145" stroke="#555" stroke-width="1.5" />
  <line x1="610" y1="95" x2="920" y2="145" stroke="#555" stroke-width="1.5" />

  <!-- Hot Memory Branch (Left: x=30-330, width=300) -->
  <rect x="30" y="145" width="300" height="50" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" filter="url(#shadowT)" />
  <text x="180" y="165" text-anchor="middle" font-size="13" font-weight="600" fill="#1565c0">Heet geheugen</text>
  <text x="180" y="184" text-anchor="middle" font-size="10" fill="#888">(Sessiongebonden)</text>

  <!-- Cold Memory Branch (Center: x=400-700, width=300) -->
  <rect x="400" y="145" width="300" height="50" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="2" filter="url(#shadowT)" />
  <text x="550" y="165" text-anchor="middle" font-size="13" font-weight="600" fill="#e65100">Koude geheugen</text>
  <text x="550" y="184" text-anchor="middle" font-size="10" fill="#888">(Tussen sessies)</text>

  <!-- Document Memory Branch (Right: x=770-1070, width=300) -->
  <rect x="770" y="145" width="300" height="50" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" filter="url(#shadowT)" />
  <text x="920" y="165" text-anchor="middle" font-size="13" font-weight="600" fill="#2e7d32">Documentgeheugen</text>
  <text x="920" y="184" text-anchor="middle" font-size="10" fill="#888">(Projectkennis)</text>

  <!-- Hot Memory Children: Working + Short-term -->
  <line x1="105" y1="195" x2="105" y2="230" stroke="#aaa" stroke-width="1" />
  <line x1="255" y1="195" x2="255" y2="230" stroke="#aaa" stroke-width="1" />

  <!-- Working Memory (Purple - LLM/fastest tier) -->
  <rect x="40" y="230" width="130" height="65" rx="6" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowT)" />
  <text x="105" y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#6a1b9a">Werkmemorie</text>
  <text x="105" y="265" text-anchor="middle" font-size="9" fill="#888">Huidige stap</text>
  <text x="105" y="278" text-anchor="middle" font-size="9" fill="#888">Toolparameters, LLM</text>
  <text x="105" y="291" text-anchor="middle" font-size="9" fill="#888">responsbuffer</text>

  <!-- Short-term (Checkpoints) -->
  <rect x="190" y="230" width="130" height="65" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowT)" />
  <text x="255" y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#1565c0">Kortetermijn</text>
  <text x="255" y="265" text-anchor="middle" font-size="9" fill="#888">Controlepunten</text>
  <text x="255" y="278" text-anchor="middle" font-size="9" fill="#888">Threadtoestand</text>
  <text x="255" y="291" text-anchor="middle" font-size="9" fill="#888">Minuten-uur</text>

  <!-- Cold Memory Children: Episodic + Semantic -->
  <line x1="475" y1="195" x2="475" y2="230" stroke="#aaa" stroke-width="1" />
  <line x1="625" y1="195" x2="625" y2="230" stroke="#aaa" stroke-width="1" />

  <!-- Episodic -->
  <rect x="410" y="230" width="130" height="65" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowT)" />
  <text x="475" y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#e65100">Episodisch</text>
  <text x="475" y="265" text-anchor="middle" font-size="9" fill="#888">Eerdere interacties</text>
  <text x="475" y="278" text-anchor="middle" font-size="9" fill="#888">Gesprekslogboeken</text>
  <text x="475" y="291" text-anchor="middle" font-size="9" fill="#888">Dagen-maanen</text>

  <!-- Semantic -->
  <rect x="560" y="230" width="130" height="65" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowT)" />
  <text x="625" y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#e65100">Semantisch</text>
  <text x="625" y="265" text-anchor="middle" font-size="9" fill="#888">Facten, kennis</text>
  <text x="625" y="278" text-anchor="middle" font-size="9" fill="#888">Gebruikersvoorkeuren</text>
  <text x="625" y="291" text-anchor="middle" font-size="9" fill="#888">Manden permanente status</text>

  <!-- Document Memory Children: Conventions + Research + Learnings -->
  <line x1="820" y1="195" x2="820" y2="230" stroke="#aaa" stroke-width="1" />
  <line x1="920" y1="195" x2="920" y2="230" stroke="#aaa" stroke-width="1" />
  <line x1="1020" y1="195" x2="1020" y2="230" stroke="#aaa" stroke-width="1" />

  <!-- Conventions -->
  <rect x="775" y="230" width="90" height="65" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadowT)" />
  <text x="820" y="247" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">Conventies</text>
  <text x="820" y="262" text-anchor="middle" font-size="8" fill="#888">Regels voor het project</text>
  <text x="820" y="274" text-anchor="middle" font-size="8" fill="#888">Codestijl</text>
  <text x="820" y="286" text-anchor="middle" font-size="8" fill="#888">Vormaten</text>

  <!-- Research Notes -->
  <rect x="875" y="230" width="90" height="65" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadowT)" />
  <text x="920" y="247" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">Onderzoek</text>
  <text x="920" y="262" text-anchor="middle" font-size="8" fill="#888">Analysenotities</text>
  <text x="920" y="274" text-anchor="middle" font-size="8" fill="#888">Samenvattingen</text>
  <text x="920" y="286" text-anchor="middle" font-size="8" fill="#888">Vindsten</text>

  <!-- Learnings -->
  <rect x="975" y="230" width="90" height="65" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadowT)" />
  <text x="1020" y="247" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">Lessons geleerd</text>
  <text x="1020" y="262" text-anchor="middle" font-size="8" fill="#888">Patronen</text>
  <text x="1020" y="274" text-anchor="middle" font-size="8" fill="#888">Fouten die vermeden moeten worden</text>
  <text x="1020" y="286" text-anchor="middle" font-size="8" fill="#888">Lösingen</text>

  <!-- Procedural Memory (System-wide, separate footer bar) -->
  <rect x="30" y="325" width="1040" height="50" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" filter="url(#shadowT)" />
  <text x="550" y="345" text-anchor="middle" font-size="12" font-weight="600" fill="#6a1b9a">Procedurale geheugen (systeemwijd)</text>
  <text x="550" y="363" text-anchor="middle" font-size="10" fill="#888">Systeemprompten, hulpprogramma-definities, configuratiebestanden — permanente, niet gebruikersspecifiek</text>

  <!-- Summary bars for each column -->
  <rect x="30" y="395" width="300" height="40" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1" />
  <text x="180" y="413" text-anchor="middle" font-size="10" font-weight="600" fill="#1565c0">Snel | In-process/DB</text>
  <text x="180" y="428" text-anchor="middle" font-size="9" fill="#888">Miliseconden-uur | Levensduur van de sessie</text>

  <rect x="400" y="395" width="300" height="40" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1" />
  <text x="550" y="413" text-anchor="middle" font-size="10" font-weight="600" fill="#e65100">Zoekbaar | Vector/KV-opslag</text>
  <text x="550" y="428" text-anchor="middle" font-size="9" fill="#888">Dagen permanente herinnering | Herinnering tussen sessies</text>

  <rect x="770" y="395" width="300" height="40" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1" />
  <text x="920" y="413" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">Menselijk leesbaar | Bestandsysteem</text>
  <text x="920" y="428" text-anchor="middle" font-size="9" fill="#888">Dagen voor altijd | Git-gebaseerd, bewerkbaar</text>

  <!-- Access speed comparison -->
  <text x="30" y="468" font-size="10" fill="#888">Toegangssnelheid:</text>
  <rect x="130" y="455" width="940" height="20" rx="10" fill="none" stroke="#ddd" stroke-width="1" />
  <rect x="131" y="456" width="235" height="18" rx="9" fill="#f3e5f5" opacity="0.8" />
  <text x="248" y="470" text-anchor="middle" font-size="9" font-weight="600" fill="#6a1b9a">Instant (in-memory)</text>
  <rect x="366" y="456" width="235" height="18" rx="9" fill="#e3f2fd" opacity="0.8" />
  <text x="483" y="470" text-anchor="middle" font-size="9" font-weight="600" fill="#1565c0">Snel (ms DB-/bestandsin/uitvoer)</text>
  <rect x="601" y="456" width="235" height="18" rx="9" fill="#fff3e0" opacity="0.8" />
  <text x="718" y="470" text-anchor="middle" font-size="9" font-weight="600" fill="#e65100">Langzamer (embed+zoek)</text>
  <rect x="836" y="456" width="233" height="18" rx="9" fill="#e8f5e9" opacity="0.8" />
  <text x="952" y="470" text-anchor="middle" font-size="9" font-weight="600" fill="#2e7d32">Snel (bestand lezen)</text>

  <!-- Storage type comparison -->
  <text x="30" y="508" font-size="10" fill="#888">Type opslag:</text>
  <rect x="130" y="495" width="940" height="20" rx="10" fill="none" stroke="#ddd" stroke-width="1" />
  <rect x="131" y="496" width="235" height="18" rx="9" fill="#f3e5f5" opacity="0.8" />
  <text x="248" y="510" text-anchor="middle" font-size="9" font-weight="600" fill="#6a1b9a">Python-dict</text>
  <rect x="366" y="496" width="235" height="18" rx="9" fill="#e3f2fd" opacity="0.8" />
  <text x="483" y="510" text-anchor="middle" font-size="9" font-weight="600" fill="#1565c0">Redis/PostgreSQL</text>
  <rect x="601" y="496" width="235" height="18" rx="9" fill="#fff3e0" opacity="0.8" />
  <text x="718" y="510" text-anchor="middle" font-size="9" font-weight="600" fill="#e65100">Qdrant/pgvector</text>
  <rect x="836" y="496" width="233" height="18" rx="9" fill="#e8f5e9" opacity="0.8" />
  <text x="952" y="510" text-anchor="middle" font-size="9" font-weight="600" fill="#2e7d32">Markdown/JSON-bestanden</text>
</svg>
