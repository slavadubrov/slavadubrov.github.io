<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="Inter, system-ui, sans-serif" role="img" aria-label="The LLM-as-teacher pipeline: LLM labels raw data, humans review a subset, the encoder is fine-tuned and deployed at 80x lower cost" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">De LLM-als-docent pipeline: LLM labelt ruwe gegevens, mensen controleren een deel daarvan, de encoder wordt gefine-tuned en geïmplementeerd tegen 80 keer lagere kosten</title>
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
    <marker id="arg" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#166534" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">LLM-als-leraar pipeline: van $70 per label naar $0,10/uur inference</text>

  <!-- Step 1: Raw Data -->
  <rect x="20" y="55" width="130" height="80" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" />
  <text x="85" y="82" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a">Ruwe gegevens</text>
  <text x="85" y="100" text-anchor="middle" font-size="10" fill="#64748b">Ongeveer 900.000 documenten</text>
  <text x="85" y="115" text-anchor="middle" font-size="10" fill="#64748b">Niet gelabeld</text>

  <line x1="150" y1="95" x2="180" y2="95" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)" />

  <!-- Step 2: LLM Annotation -->
  <rect x="185" y="55" width="140" height="80" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" />
  <text x="255" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#5b21b6">LLM labelgen</text>
  <text x="255" y="95" text-anchor="middle" font-size="10" fill="#5b21b6">Llama 3.1-70b</text>
  <text x="255" y="110" text-anchor="middle" font-size="10" fill="#5b21b6">ongeveer 8 uur</text>
  <text x="255" y="125" text-anchor="middle" font-size="10" fill="#991b1b" font-weight="bold">Kosten: ongeveer $70</text>

  <line x1="325" y1="95" x2="355" y2="95" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)" />

  <!-- Step 3: Human Review -->
  <rect x="360" y="55" width="130" height="80" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2" />
  <text x="425" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#9a3412">Menselijke beoordeling</text>
  <text x="425" y="95" text-anchor="middle" font-size="10" fill="#9a3412">Argilla / Label Studio</text>
  <text x="425" y="110" text-anchor="middle" font-size="10" fill="#9a3412">2.714 monsters</text>
  <text x="425" y="125" text-anchor="middle" font-size="10" fill="#9a3412">ongeveer 8 uur</text>

  <line x1="490" y1="95" x2="520" y2="95" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)" />

  <!-- Step 4: Fine-tune -->
  <rect x="525" y="55" width="140" height="80" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text x="595" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d4ed8">fijnafstellen</text>
  <text x="595" y="95" text-anchor="middle" font-size="10" fill="#1d4ed8">GLiNER / RoBERTa</text>
  <text x="595" y="110" text-anchor="middle" font-size="10" fill="#1d4ed8">90-300 miljoen parameters</text>
  <text x="595" y="125" text-anchor="middle" font-size="10" fill="#1d4ed8">A100, ongeveer 4 uur</text>

  <line x1="665" y1="95" x2="695" y2="95" stroke="#166534" stroke-width="2" marker-end="url(#arg)" />

  <!-- Step 5: Deploy -->
  <rect x="700" y="55" width="170" height="80" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="2" />
  <text x="785" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#166534">Implementeren</text>
  <text x="785" y="95" text-anchor="middle" font-size="10" fill="#166534">ONNX in combinatie met INT8 op CPU</text>
  <text x="785" y="110" text-anchor="middle" font-size="10" fill="#166534" font-weight="bold">93,4% F1-score</text>
  <text x="785" y="125" text-anchor="middle" font-size="10" fill="#166534" font-weight="bold">0,10 dollar/uur</text>

  <!-- Comparison bar: Before -->
  <text x="450" y="175" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">Ekonomische vergelijking (CFM casestudy)</text>

  <!-- LLM Direct -->
  <rect x="80" y="195" width="740" height="60" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" />
  <text x="100" y="218" font-size="12" font-weight="bold" fill="#991b1b">Directe LLM inference</text>
  <text x="100" y="238" font-size="11" fill="#991b1b">Llama 3.1-70b  |  92,7% F1  |  $8/uur (4x L40S GPU)  |  ~1-2 seconden per query</text>

  <!-- Encoder -->
  <rect x="80" y="270" width="740" height="60" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" />
  <text x="100" y="293" font-size="12" font-weight="bold" fill="#166534">Fijngetunede encoder (LLM-als-leraar)</text>
  <text x="100" y="313" font-size="11" fill="#166534">GLiNER-medium  |  93,4% F1  |  $0,10/uur (CPU)  |  &lt;50 ms per query  |  80 keer goedkoper</text>

  <!-- Arrow showing improvement -->
  <text x="450" y="355" text-anchor="middle" font-size="13" fill="#166534" font-weight="bold">Gemelde resultaat: +0,7 F1 bij 80 keer lagere uurlijkse inference kosten</text>
  <text x="450" y="373" text-anchor="middle" font-size="11" fill="#64748b">Totaal kostenbedrag pipeline: ongeveer $70 voor LLM labeling + ongeveer $50 voor rekenkracht = ongeveer $120 als eenmalige investering</text>
</svg>
