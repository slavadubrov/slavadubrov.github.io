<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Inter, system-ui, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">GLiNER-architectuur: Span-entiteitmatching in de latente ruimte</title>
  <desc id="artifact-desc">GLiNER-architectuur: Span-entiteitmatching in de latente ruimte.</desc>
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#166534" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a" x="450">GLiNER-architectuur: Span-entiteitmatching in de latente ruimte</text>

  <!-- Input tokens -->
  <rect x="30" y="55" width="840" height="50" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" />
  <text y="72" text-anchor="middle" font-size="11" fill="#334155" x="450">Indevoersequentie</text>

  <!-- Individual tokens -->
  <rect x="45" y="75" width="55" height="24" rx="4" fill="#7c3aed" stroke="#7c3aed" stroke-width="1" />
  <text y="91" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="bold" x="72">[ENT]</text>

  <rect x="105" y="75" width="55" height="24" rx="4" fill="#faf5ff" stroke="#7c3aed" stroke-width="1" />
  <text y="91" text-anchor="middle" font-size="10" fill="#5b21b6" x="132">persoon</text>

  <rect x="165" y="75" width="55" height="24" rx="4" fill="#7c3aed" stroke="#7c3aed" stroke-width="1" />
  <text y="91" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="bold" x="192">[ENT]</text>

  <rect x="225" y="75" width="55" height="24" rx="4" fill="#faf5ff" stroke="#7c3aed" stroke-width="1" />
  <text y="91" text-anchor="middle" font-size="10" fill="#5b21b6" x="252">organisatie</text>

  <rect x="285" y="75" width="55" height="24" rx="4" fill="#7c3aed" stroke="#7c3aed" stroke-width="1" />
  <text y="91" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="bold" x="312">[ENT]</text>

  <rect x="345" y="75" width="55" height="24" rx="4" fill="#faf5ff" stroke="#7c3aed" stroke-width="1" />
  <text y="91" text-anchor="middle" font-size="10" fill="#5b21b6" x="372">datum</text>

  <rect x="405" y="75" width="55" height="24" rx="4" fill="#2563eb" stroke="#2563eb" stroke-width="1" />
  <text y="91" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="bold" x="432">[SEP]</text>

  <rect x="465" y="75" width="45" height="24" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1" />
  <text y="91" text-anchor="middle" font-size="10" fill="#1d4ed8" x="487">Rekening</text>

  <rect x="515" y="75" width="50" height="24" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1" />
  <text y="91" text-anchor="middle" font-size="10" fill="#1d4ed8" x="540">Kleppen</text>

  <rect x="570" y="75" width="65" height="24" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1" />
  <text y="91" text-anchor="middle" font-size="10" fill="#1d4ed8" x="602">opgericht</text>

  <rect x="640" y="75" width="70" height="24" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1" />
  <text y="91" text-anchor="middle" font-size="10" fill="#1d4ed8" x="675">Microsoft</text>

  <rect x="715" y="75" width="35" height="24" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1" />
  <text y="91" text-anchor="middle" font-size="10" fill="#1d4ed8" x="732">op</text>

  <rect x="755" y="75" width="100" height="24" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1" />
  <text y="91" text-anchor="middle" font-size="10" fill="#1d4ed8" x="805">4 april 1975</text>

  <!-- Arrow down to encoder -->
  <line x1="450" y1="110" x2="450" y2="140" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow1)" />

  <!-- DeBERTa Encoder -->
  <rect x="150" y="145" width="600" height="55" rx="8" fill="#2563eb" stroke="#2563eb" stroke-width="2" />
  <text y="170" text-anchor="middle" font-size="15" fill="#ffffff" font-weight="bold" x="450">DeBERTa-v3 bidirectionele transformer</text>
  <text y="188" text-anchor="middle" font-size="11" fill="#2563eb" x="450">Gecombineerde codering van entiteittypen + teksttokens</text>

  <!-- Split arrows -->
  <line x1="300" y1="200" x2="200" y2="240" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow1)" />
  <line x1="600" y1="200" x2="700" y2="240" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow1)" />

  <!-- Entity Type Representations -->
  <rect x="60" y="245" width="280" height="70" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" />
  <text y="268" text-anchor="middle" font-size="13" font-weight="bold" fill="#5b21b6" x="200">Embeddingen van entiteittypen</text>
  <text y="286" text-anchor="middle" font-size="11" fill="#5b21b6" x="200">q_person, q_org, q_date</text>
  <text y="302" text-anchor="middle" font-size="10" fill="#64748b" x="200">Vanaf de posities van de [ENT]-tokens</text>

  <!-- Span Representations -->
  <rect x="560" y="245" width="280" height="70" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text y="268" text-anchor="middle" font-size="13" font-weight="bold" fill="#1d4ed8" x="700">Weergaven van spannen</text>
  <text y="286" text-anchor="middle" font-size="11" fill="#1d4ed8" x="700">S_ij = FFN(h_i ⊕ h_j)</text>
  <text y="302" text-anchor="middle" font-size="10" fill="#64748b" x="700">Alle spans tot een breedte van 12</text>

  <!-- Arrows to scoring -->
  <line x1="200" y1="315" x2="350" y2="370" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow1)" />
  <line x1="700" y1="315" x2="550" y2="370" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow1)" />

  <!-- Dot Product Scoring -->
  <rect x="300" y="370" width="300" height="55" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2" />
  <text y="393" text-anchor="middle" font-size="13" font-weight="bold" fill="#9a3412" x="450">Puntvermenigvuldigingsbeoordeling</text>
  <text y="411" text-anchor="middle" font-size="12" fill="#991b1b" x="450">ϕ(i,j,t) = σ(S_ij · q_t)</text>

  <!-- Arrow to output -->
  <line x1="450" y1="425" x2="450" y2="455" stroke="#166534" stroke-width="2" marker-end="url(#arrow2)" />

  <!-- Output -->
  <rect x="150" y="460" width="600" height="50" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="2" />
  <text y="483" text-anchor="middle" font-size="11" fill="#166534" font-weight="bold" x="250">"Bill Gates" → persoon</text>
  <text y="483" text-anchor="middle" font-size="11" fill="#166534" font-weight="bold" x="450">"Microsoft" → organisatie</text>
  <text y="483" text-anchor="middle" font-size="11" fill="#166534" font-weight="bold" x="650">"4 april 1975" → datum</text>
  <text y="500" text-anchor="middle" font-size="10" fill="#64748b" x="450">Spannen die de drempel overschrijden, worden als entiteiten uitgevoerd</text>
</svg>
