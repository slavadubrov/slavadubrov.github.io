<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Cross-encoder vs bi-encoder: the cross-encoder jointly encodes labels and text, while the bi-encoder uses separate encoders with pre-computed label embeddings" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Cross-encoder versus bi-encoder: de cross-encoder encodeert labels en tekst gezamenlijk, terwijl de bi-encoder afzonderlijke encoders gebruikt die zijn voorbereid met vooraf gerekende labels embeddings</title>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
    <marker id="arrg" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#166534" />
    </marker>
    <marker id="arrr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text x="460" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">Architectuur van cross-encoder versus bi-encoder</text>

  <!-- LEFT: Cross-Encoder -->
  <rect x="20" y="45" width="420" height="420" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
  <text x="230" y="72" text-anchor="middle" font-size="15" font-weight="bold" fill="#1d4ed8">Kruisencoder (oorspronkelijke GLiNER)</text>

  <!-- Input: combined -->
  <rect x="50" y="90" width="360" height="40" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" />
  <text x="230" y="114" text-anchor="middle" font-size="11" fill="#1d4ed8">[ENT] persoon [ENT] organisatie [SEP] Bill Gates heeft Microsoft opgericht</text>

  <line x1="230" y1="130" x2="230" y2="155" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)" />

  <!-- Single encoder -->
  <rect x="80" y="160" width="300" height="50" rx="8" fill="#2563eb" stroke="#2563eb" stroke-width="2" />
  <text x="230" y="183" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="bold">Eénvoudige DeBERTa-encoder</text>
  <text x="230" y="200" text-anchor="middle" font-size="10" fill="#2563eb">Gemengde attention boven labels en tekst</text>

  <line x1="230" y1="210" x2="230" y2="235" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)" />

  <!-- Scoring -->
  <rect x="100" y="240" width="260" height="40" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" />
  <text x="230" y="264" text-anchor="middle" font-size="12" fill="#9a3412" font-weight="bold">Span × entiteitsdotproduct</text>

  <line x1="230" y1="280" x2="230" y2="305" stroke="#166534" stroke-width="2" marker-end="url(#arrg)" />

  <!-- Output -->
  <rect x="110" y="310" width="240" height="35" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" />
  <text x="230" y="332" text-anchor="middle" font-size="12" fill="#166534" font-weight="bold">Entiteitsvoorspellingen</text>

  <!-- Problem callout -->
  <rect x="55" y="365" width="350" height="85" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" />
  <text x="230" y="385" text-anchor="middle" font-size="11" font-weight="bold" fill="#991b1b">Bepaling schaalbaarheid</text>
  <text x="230" y="402" text-anchor="middle" font-size="10" fill="#991b1b">Alle labels moeten opnieuw gecodeerd worden samen met de tekst.</text>
  <text x="230" y="418" text-anchor="middle" font-size="10" fill="#991b1b">1.024 labels → 98,7% throughput degradatie</text>
  <text x="230" y="434" text-anchor="middle" font-size="10" fill="#991b1b">Praktische beperking: ongeveer 30 entiteittypen</text>

  <!-- RIGHT: Bi-Encoder -->
  <rect x="480" y="45" width="420" height="420" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
  <text x="690" y="72" text-anchor="middle" font-size="15" font-weight="bold" fill="#166534">GLiNER-tweevoudige encoder</text>

  <!-- Two separate inputs -->
  <rect x="500" y="90" width="150" height="40" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" />
  <text x="575" y="108" text-anchor="middle" font-size="11" fill="#5b21b6">persoon, organisatie, datum</text>
  <text x="575" y="122" text-anchor="middle" font-size="9" fill="#64748b">Entiteittypen</text>

  <rect x="670" y="90" width="210" height="40" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" />
  <text x="775" y="114" text-anchor="middle" font-size="11" fill="#1d4ed8">Bill Gates heeft Microsoft opgericht</text>

  <line x1="575" y1="130" x2="575" y2="155" stroke="#7c3aed" stroke-width="2" marker-end="url(#arr)" />
  <line x1="775" y1="130" x2="775" y2="155" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)" />

  <!-- Two separate encoders -->
  <rect x="500" y="160" width="150" height="50" rx="8" fill="#7c3aed" stroke="#5b21b6" stroke-width="2" />
  <text x="575" y="183" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">Labelencoder</text>
  <text x="575" y="200" text-anchor="middle" font-size="9" fill="#7c3aed">BGE / MiniLM</text>

  <rect x="670" y="160" width="210" height="50" rx="8" fill="#2563eb" stroke="#2563eb" stroke-width="2" />
  <text x="775" y="183" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">Tekstencoder</text>
  <text x="775" y="200" text-anchor="middle" font-size="9" fill="#2563eb">ModernBERT (Ettin)</text>

  <!-- Cache callout -->
  <rect x="500" y="220" width="150" height="25" rx="4" fill="#f0fdf4" stroke="#166534" stroke-width="1" stroke-dasharray="4" />
  <text x="575" y="237" text-anchor="middle" font-size="10" fill="#166534" font-weight="bold">Vooraf berekend + Gecacheerd</text>

  <line x1="575" y1="245" x2="640" y2="255" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arr)" />
  <line x1="775" y1="210" x2="720" y2="255" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr)" />

  <!-- Late fusion scoring -->
  <rect x="600" y="255" width="160" height="40" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" />
  <text x="680" y="279" text-anchor="middle" font-size="12" fill="#9a3412" font-weight="bold">Dotproduct met late fusing</text>

  <line x1="680" y1="295" x2="680" y2="315" stroke="#166534" stroke-width="2" marker-end="url(#arrg)" />

  <!-- Output -->
  <rect x="570" y="320" width="240" height="35" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" />
  <text x="690" y="342" text-anchor="middle" font-size="12" fill="#166534" font-weight="bold">Entiteitsvoorspellingen</text>

  <!-- Advantage callout -->
  <rect x="510" y="365" width="370" height="85" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" />
  <text x="695" y="385" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">Schaalvoordeel</text>
  <text x="695" y="402" text-anchor="middle" font-size="10" fill="#166534">Etiketten worden één keer gecodeerd en onbeperkt opgeslagen</text>
  <text x="695" y="418" text-anchor="middle" font-size="10" fill="#166534">1.024 labels → slechts 5,2% throughput vermindering</text>
  <text x="695" y="434" text-anchor="middle" font-size="10" fill="#166534">130x throughput verbetering op schaal</text>

  <!-- VS divider -->
  <text x="460" y="260" text-anchor="middle" font-size="20" font-weight="bold" fill="#64748b">tegenover</text>
</svg>
