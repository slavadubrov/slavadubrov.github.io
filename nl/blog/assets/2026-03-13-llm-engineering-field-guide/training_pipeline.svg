<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Inter, system-ui, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">LLM-trainingspijplijn: van voortraining tot alignement</title>
  <desc id="artifact-desc">LLM-trainingspijplijn: van voortraining tot alignement.</desc>
  <defs>
    <marker id="arrow5" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b" />
    </marker>
    <marker id="arrow5b" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#166534" />
    </marker>
    <filter id="shadow5" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="900" height="420" fill="#f8fafc" rx="8" />

  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a" x="450">LLM-trainingspijplijn: van voortraining tot alignement</text>

  <!-- Stage 1: Pretraining -->
  <rect x="30" y="60" width="200" height="170" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow5)" />
  <text y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#1d4ed8" x="130">Voorverwerking</text>

  <rect x="50" y="95" width="160" height="55" rx="5" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="112" text-anchor="middle" font-size="10" fill="#0f172a" x="130">Vooruitvoorspelling van het volgende token</text>
  <text y="126" text-anchor="middle" font-size="10" fill="#0f172a" x="130">Triljoenen tokens</text>
  <text y="140" text-anchor="middle" font-size="10" fill="#334155" x="130">Zelfgestuurd</text>

  <text y="170" font-size="10" fill="#0f172a" x="50">Kosten: $500K–$100M+</text>
  <text y="185" font-size="10" fill="#0f172a" x="50">Berekeningskracht: 10²⁴–10²⁶ FLOPs</text>
  <text y="200" font-size="10" fill="#1d4ed8" font-weight="bold" x="50">ZeRO + FSDP + Gemengde precisie</text>
  <text y="215" font-size="9" fill="#334155" x="50">Chinchilla → Overtraining van kleine modellen</text>

  <!-- Arrow 1→2 -->
  <line x1="230" y1="145" x2="275" y2="145" stroke="#334155" stroke-width="2" marker-end="url(#arrow5)" />

  <!-- Stage 2: SFT -->
  <rect x="275" y="60" width="180" height="170" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadow5)" />
  <text y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#9a3412" x="365">Fijntunen (SFT)</text>

  <rect x="295" y="95" width="140" height="55" rx="5" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="112" text-anchor="middle" font-size="10" fill="#0f172a" x="365">Taakspecifiek data</text>
  <text y="126" text-anchor="middle" font-size="10" fill="#0f172a" x="365">Gelabelde voorbeelden</text>
  <text y="140" text-anchor="middle" font-size="10" fill="#334155" x="365">Gemonitord</text>

  <text y="170" font-size="10" fill="#0f172a" x="295">Kosten: $100–$10K</text>
  <text y="185" font-size="10" fill="#0f172a" x="295">Berekeningskracht: 10¹⁸–10²¹ FLOPs</text>
  <text y="200" font-size="10" fill="#9a3412" font-weight="bold" x="295">LoRA / QLoRA (10.000× minder parameters)</text>
  <text y="215" font-size="9" fill="#334155" x="295">65B op één 48GB GPU</text>

  <!-- Arrow 2→3 -->
  <line x1="455" y1="145" x2="500" y2="145" stroke="#334155" stroke-width="2" marker-end="url(#arrow5)" />

  <!-- Stage 3: Alignment (branching) -->
  <rect x="500" y="60" width="380" height="170" rx="10" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow5)" />
  <text y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#5b21b6" x="690">Alignering</text>

  <!-- RLHF branch -->
  <rect x="520" y="95" width="155" height="65" rx="5" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6" x="597">RLHF / PPO</text>
  <text y="127" text-anchor="middle" font-size="9" fill="#0f172a" x="597">Beloningsmodel + RL</text>
  <text y="141" text-anchor="middle" font-size="9" fill="#991b1b" x="597">4 modellenkopieën in geheugen</text>
  <text y="153" text-anchor="middle" font-size="9" fill="#334155" x="597">Compleks, gevoelig voor hyperparameters</text>

  <!-- DPO branch -->
  <rect x="690" y="95" width="80" height="65" rx="5" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6" x="730">DPO</text>
  <text y="127" text-anchor="middle" font-size="9" fill="#0f172a" x="730">Geen RL nodig</text>
  <text y="141" text-anchor="middle" font-size="9" fill="#166534" x="730">Eenvoudiger en stabiel</text>
  <text y="153" text-anchor="middle" font-size="9" fill="#334155" x="730">Alleen offline</text>

  <!-- GRPO branch -->
  <rect x="785" y="95" width="80" height="65" rx="5" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6" x="825">GRUPPE</text>
  <text y="127" text-anchor="middle" font-size="9" fill="#0f172a" x="825">Geen kritiekmodel</text>
  <text y="141" text-anchor="middle" font-size="9" fill="#166534" x="825" transform="translate(-8.23 0.00)">Uitsluitend 2 exemplaren van de LLM</text>
  <text y="153" text-anchor="middle" font-size="9" fill="#334155" x="825">DeepSeek-R1</text>

  <text y="185" font-size="10" fill="#0f172a" x="520">Gegevens over menselijke/AI-preferenties</text>
  <text y="200" font-size="10" fill="#0f172a" x="520">RLVR: beloningen gebaseerd op regels (wiskunde, code)</text>
  <text y="215" font-size="10" fill="#5b21b6" font-weight="bold" x="520">Trend: PPO → DPO → GRPO (eenvoudigere overwinningen)</text>

  <!-- Distillation path -->
  <rect x="30" y="270" width="850" height="130" rx="10" fill="#f0fdf4" stroke="#166534" stroke-width="2" filter="url(#shadow5)" />
  <text y="295" text-anchor="middle" font-size="15" font-weight="bold" fill="#166534" x="455">Distillatie en synthetische gegevens</text>

  <!-- Teacher → Student flow -->
  <rect x="60" y="310" width="180" height="45" rx="5" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534" x="150">Grote leraar</text>
  <text y="345" text-anchor="middle" font-size="10" fill="#0f172a" x="150">DeepSeek-R1 (671B)</text>

  <line x1="240" y1="332" x2="305" y2="332" stroke="#166534" stroke-width="2" marker-end="url(#arrow5b)" />
  <text y="325" text-anchor="middle" font-size="9" fill="#166534" x="272">800K CoT</text>
  <text y="350" text-anchor="middle" font-size="9" fill="#166534" x="272">voorbeelden</text>

  <rect x="305" y="310" width="170" height="45" rx="5" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534" x="390">Kompacte Student</text>
  <text y="345" text-anchor="middle" font-size="10" fill="#0f172a" x="390">1,5 miljard → 70 miljard geperste modellen</text>

  <!-- Results -->
  <rect x="510" y="310" width="350" height="70" rx="5" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534" x="685">Resultaten</text>
  <text y="347" font-size="10" fill="#0f172a" x="530">• 32B gezuiverde beats OpenAI o1-mini</text>
  <text y="362" font-size="10" fill="#0f172a" x="530">• Distillatie &gt; directe RL op kleine modellen</text>
  <text y="377" font-size="10" fill="#166534" font-weight="bold" x="530">• De meest efficiënte route naar compact redeneren</text>

  <!-- Connection from alignment to distillation -->
  <path d="M690,230 L690,250 L455,250 L455,270" stroke="#166534" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow5b)" />
  <text y="248" font-size="9" fill="#166534" x="580">Gecorrigeerde leraar genereert trainingsgegevens</text>
</svg>
