<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Roofline Model" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Daklijn Model</title>
  <defs>
    <filter id="s" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#334155" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="720" height="400" fill="#f8fafc" rx="8" />

  <!-- Title -->
  <text y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#0f172a" x="360">De daklijn Model</text>
  <text y="48" text-anchor="middle" font-size="11" fill="#64748b" x="360">H100 SXM · TF32 met sparsity</text>

  <!-- Shaded regions -->
  <!-- Memory-bound region (blue tint, left of knee) -->
  <polygon points="90,340 90,88 470,88 470,340" fill="#eff6ff" opacity="0.5" />
  <!-- Compute-bound region (red tint, right of knee) -->
  <polygon points="470,340 470,88 660,88 660,340" fill="#fef2f2" opacity="0.5" />

  <!-- Region labels at top -->
  <text y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#1d4ed8" opacity="0.7" x="280">door geheugenbeperkingen beperkt</text>
  <text y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#991b1b" opacity="0.7" x="565">REKENBEGRENSD</text>

  <!-- Axes -->
  <line x1="90" y1="340" x2="670" y2="340" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr)" />
  <line x1="90" y1="340" x2="90" y2="82" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr)" />

  <!-- Y-axis label -->
  <text y="210" text-anchor="middle" font-size="11" fill="#334155" x="22" transform="rotate(-90,22,210)">Prestaties (TFLOPS)</text>

  <!-- X-axis label -->
  <text y="375" text-anchor="middle" font-size="11" fill="#334155" x="380">Rekenintensiteit (FLOPs per byte)</text>

  <!-- Minimal X ticks — just key values -->
  <line x1="140" y1="340" x2="140" y2="346" stroke="#94a3b8" stroke-width="1" />
  <text y="358" text-anchor="middle" font-size="10" fill="#334155" x="140">1</text>

  <line x1="300" y1="340" x2="300" y2="346" stroke="#94a3b8" stroke-width="1" />
  <text y="358" text-anchor="middle" font-size="10" fill="#334155" x="300">100</text>

  <line x1="470" y1="340" x2="470" y2="346" stroke="#94a3b8" stroke-width="1" />
  <text y="358" text-anchor="middle" font-size="10" fill="#334155" x="470">295</text>

  <!-- Y tick — just the peak -->
  <line x1="85" y1="110" x2="90" y2="110" stroke="#94a3b8" stroke-width="1" />
  <text y="114" text-anchor="end" font-size="10" fill="#334155" x="80">989</text>

  <!-- ============ THE ROOFLINE ============ -->

  <!-- Memory-bandwidth slope: from bottom-left to knee -->
  <line x1="95" y1="335" x2="470" y2="110" stroke="#2563eb" stroke-width="3" stroke-linecap="round" />

  <!-- Compute ceiling: flat from knee to right -->
  <line x1="470" y1="110" x2="660" y2="110" stroke="#dc2626" stroke-width="3" stroke-linecap="round" />

  <!-- Line labels along the lines -->
  <text y="260" font-size="10" fill="#1d4ed8" font-weight="bold" x="210" transform="rotate(-31,210,260)">Bandbreedte van 3,35 TB/s</text>
  <text y="103" font-size="10" fill="#991b1b" font-weight="bold" x="540">piekprestatie van 989 TFLOPS</text>

  <!-- Knee point (critical intensity) -->
  <circle cx="470" cy="110" r="5" fill="#ffffff" stroke="#334155" stroke-width="2" />
  <line x1="470" y1="120" x2="470" y2="145" stroke="#334155" stroke-width="1" stroke-dasharray="3,2" />
  <text y="158" text-anchor="middle" font-size="10" font-weight="bold" fill="#0f172a" x="470">295 FLOPs/byte</text>
  <text y="171" text-anchor="middle" font-size="9" fill="#64748b" x="470">(kritische intensiteit)</text>

  <!-- ============ WORKLOAD DOTS ============ -->

  <!-- Decode (bs=1): intensity ≈ 1 → bottom of slope -->
  <circle cx="140" cy="310" r="9" fill="#dc2626" stroke="#dc2626" stroke-width="2" filter="url(#s)" />
  <text y="298" font-size="12" font-weight="bold" fill="#991b1b" x="158">Decode</text>
  <text y="312" font-size="10" fill="#334155" x="158">batch = 1</text>
  <text y="325" font-size="9" fill="#64748b" x="158">1 FLOP/byte</text>

  <!-- Prefill: intensity ≈ 500 → on the ceiling -->
  <circle cx="530" cy="110" r="9" fill="#166534" stroke="#166534" stroke-width="2" filter="url(#s)" />
  <text y="195" text-anchor="middle" font-size="12" font-weight="bold" fill="#166534" x="530">Prefill</text>
  <text y="209" text-anchor="middle" font-size="9" fill="#64748b" x="530">velen tokens maken hergebruik van dezelfde weights</text>
</svg>
