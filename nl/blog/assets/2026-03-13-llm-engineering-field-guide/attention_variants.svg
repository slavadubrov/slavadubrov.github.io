<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Eisen voor de Attention Variant KV-cache</title>
  <desc id="artifact-desc">Eisen voor de Attention Variant KV-cache.</desc>
  <defs>
    <style>
      .query { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 5; }
      .kv { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 5; }
      .arrow { stroke: #334155; stroke-width: 2; marker-end: url(#arrowhead); }
      .text { font-family: Inter, system-ui, sans-serif; font-size: 14px; text-anchor: middle; font-weight: bold; }
      .label { font-family: Inter, system-ui, sans-serif; font-size: 12px; text-anchor: middle; }
      .title { font-family: Inter, system-ui, sans-serif; font-size: 18px; font-weight: bold; text-anchor: middle; }
      .desc { font-family: Inter, system-ui, sans-serif; font-size: 14px; text-anchor: middle; fill: #334155; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="100%" height="100%" fill="#f8fafc" />

  <text y="30" class="title" x="400">Eisen voor de Attention Variant KV-cache</text>

  <!-- MHA Section -->
