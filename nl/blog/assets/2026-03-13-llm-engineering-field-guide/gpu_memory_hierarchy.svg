<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="Inter, system-ui, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">H100 SXM GPU-geheugenhiërarchie</title>
  <desc id="artifact-desc">H100 SXM GPU-geheugenhiërarchie.</desc>
  <defs>
    <linearGradient id="regGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#dc2626" />
      <stop offset="100%" stop-color="#dc2626" />
    </linearGradient>
    <linearGradient id="sramGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ea580c" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <linearGradient id="l2Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="hbmGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <filter id="shadow3" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="800" height="480" fill="#f8fafc" rx="8" />

  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a" x="400">H100 SXM GPU-geheugenhiërarchie</text>
  <text y="52" text-anchor="middle" font-size="12" fill="#334155" x="400">De piramide van geheugensnelheid versus capaciteit die de optimalisatie van LLM’s bepaalt</text>

  <!-- Pyramid layers (top = fastest, smallest) -->

  <!-- Registers -->
  <polygon points="400,80 310,150 490,150" fill="url(#regGrad)" stroke="#dc2626" stroke-width="1.5" filter="url(#shadow3)" />
  <text y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff" x="400">Registers</text>
  <text y="135" text-anchor="middle" font-size="10" fill="#dc2626" x="400">Toegang per thread</text>
  <text y="147" text-anchor="middle" font-size="10" fill="#dc2626" x="400">Wiskunde vindt hier plaats</text>

  <!-- Labels right side -->
  <line x1="452" y1="120" x2="560" y2="120" stroke="#dc2626" stroke-width="1" stroke-dasharray="4,3" />
  <text y="115" font-size="11" fill="#991b1b" font-weight="bold" x="570">Snelst</text>
  <text y="130" font-size="10" fill="#334155" x="570">Kleinste capaciteit</text>

  <!-- SRAM / Shared Memory -->
  <polygon points="310,160 240,240 560,240 490,160" fill="url(#sramGrad)" stroke="#ea580c" stroke-width="1.5" filter="url(#shadow3)" />
  <text y="195" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff" x="400">Gedeelde geheugen (SRAM)</text>
  <text y="212" text-anchor="middle" font-size="11" fill="#ea580c" x="400">227 KB/SM · totaal ongeveer 33 TB/s</text>
  <text y="228" text-anchor="middle" font-size="10" fill="#ea580c" x="400">Voer hier de berekeningen voor FlashAttention-tiles uit</text>

  <line x1="526" y1="200" x2="600" y2="200" stroke="#ea580c" stroke-width="1" stroke-dasharray="4,3" />
  <text y="195" font-size="11" fill="#9a3412" font-weight="bold" x="610">Ongeveer 33 TB/s</text>
  <text y="210" font-size="10" fill="#334155" x="610">Werkmemorie</text>

  <!-- L2 Cache -->
  <polygon points="240,250 180,320 620,320 560,250" fill="url(#l2Grad)" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow3)" />
  <text y="275" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff" x="400">L2-cache</text>
  <text y="292" text-anchor="middle" font-size="11" fill="#7c3aed" x="400">50 MB · ~12 TB/s</text>
  <text y="308" text-anchor="middle" font-size="10" fill="#7c3aed" x="400">Veiligheidsbuffer voor alle SM’s</text>

  <line x1="590" y1="285" x2="660" y2="285" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,3" />
  <text y="280" font-size="11" fill="#5b21b6" font-weight="bold" x="670">Ongeveer 12 TB/s</text>
  <text y="295" font-size="10" fill="#334155" x="670">Gedeelde cache</text>

  <!-- HBM3 -->
  <polygon points="180,330 100,420 700,420 620,330" fill="url(#hbmGrad)" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow3)" />
  <text y="365" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff" x="400">HBM3 (Geheugen met hoge bandbreedte)</text>
  <text y="385" text-anchor="middle" font-size="12" fill="#2563eb" x="400">80 GB · 3,35 TB/s</text>
  <text y="405" text-anchor="middle" font-size="11" fill="#2563eb" x="400">Modelgewichten + KV-cache zijn hier in real time te zien</text>

  <line x1="660" y1="375" x2="720" y2="375" stroke="#2563eb" stroke-width="1" stroke-dasharray="4,3" />
  <text y="370" font-size="11" fill="#1d4ed8" font-weight="bold" x="725">3,35 TB/s</text>
  <text y="385" font-size="10" fill="#334155" x="725" transform="translate(-32.50 0.00)">Gememori-bottleneck</text>

  <!-- Left side: Size labels -->
  <text y="125" font-size="10" fill="#334155" text-anchor="end" x="90">~KB</text>
  <text y="200" font-size="10" fill="#334155" text-anchor="end" x="90">227 KB/SM</text>
  <text y="285" font-size="10" fill="#334155" text-anchor="end" x="90">50 MB</text>
  <text y="375" font-size="10" fill="#334155" text-anchor="end" x="90">80 GB</text>

  <!-- Bottom insight box -->
  <rect x="100" y="435" width="600" height="35" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" />
  <text y="457" text-anchor="middle" font-size="12" fill="#9a3412" font-weight="bold" x="400" textLength="792.26" lengthAdjust="spacingAndGlyphs" transform="translate(0.00 0.00)">Kerninsight: Elke optimalisatie van LLM’s is bedoeld om gegevens in SRAM op te slaan en de leesacties van HBM tot een minimum te beperken.</text>
</svg>
