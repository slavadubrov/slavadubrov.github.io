<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" style="background-color: #f8fafc; font-family: Inter, system-ui, sans-serif;" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Het prestatiebelofte</title>
  <desc id="artifact-desc">Het prestatiebelofte.</desc>
  <defs>
    <!-- Background grid -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#e2e8f0" stroke-width="0.5" />
    </pattern>

    <!-- Marker for arrow -->
    <marker id="arrowOrange" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#ea580c" />
    </marker>

    <!-- Shadows -->
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>

    <!-- Glows for animated particles -->
    <filter id="glowHC" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="0.8" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glowResNet" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background grid layer -->
  <rect width="1000" height="600" fill="#f8fafc" />

  <!-- Top Title -->
  <text y="50" font-size="28" font-weight="800" fill="#0f172a" x="40">Het prestatiebelofte</text>
  <text y="80" font-size="16" fill="#334155" x="40">Bron: Hyper-Connections (2024)</text>

  <!-- Left Side: Plot Area -->
  <g transform="translate(60, 140)">

    <!-- Plot Background -->
    <rect x="0" y="0" width="460" height="380" rx="12" fill="#ffffff" fill-opacity="0.9" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)" />

    <!-- Y-axis label text (rotated) -->
    <text y="-35" text-anchor="middle" fill="#334155" font-size="14" font-weight="600" x="-190" transform="rotate(-90)">Validatieprecisie</text>

    <!-- Y-axis lines and ticks -->
    <g stroke="#cbd5e1" stroke-width="1" fill="none">
      <line x1="60" y1="50" x2="420" y2="50" />
      <line x1="60" y1="120" x2="420" y2="120" />
      <line x1="60" y1="190" x2="420" y2="190" />
      <line x1="60" y1="260" x2="420" y2="260" />
    </g>

    <!-- Base X and Y axis lines drawn thicker -->
    <path d="M 60 40 L 60 330 L 430 330" fill="none" stroke="#334155" stroke-width="2" />

    <!-- X-axis label -->
    <text y="370" text-anchor="middle" fill="#334155" font-size="14" font-weight="600" x="240">Trainingsstappen</text>

    <!-- SVG paths for the curves -->
    <!-- ResNet Line -->
    <path id="pathResNetFast" d="M 60 320 Q 120 280 180 230 Q 240 180 300 150 Q 360 130 420 120" fill="none" stroke="#94a3b8" stroke-width="3" stroke-dasharray="6,4" />

    <!-- Hyper-Connections Line -->
    <path id="pathHCFast" d="M 60 320 Q 90 240 135 170 Q 180 110 240 85 Q 310 70 420 65" fill="none" stroke="#2563eb" stroke-width="3" />


    <!-- HC Curve Annotation -->
    <rect x="290" y="35" width="135" height="26" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1" />
    <text y="53" text-anchor="middle" fill="#1d4ed8" font-size="13" font-weight="700" x="357">Hyperverbindingen</text>

    <!-- ResNet Curve Annotation (Hidden) -->
    <!-- <rect x="290" y="145" width="130" height="26" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/> -->
    <!-- <text x="355" y="163" text-anchor="middle" fill="#334155" font-size="13" font-weight="700">Baseline ResNet</text> -->

    <!-- Gap Arrow "1.8x Faster" -->
    <!-- Drawing arrow between early parts of the convergence to show the speed gap -->
    <line x1="220" y1="95" x2="220" y2="200" stroke="#ea580c" stroke-width="2" />
    <polygon points="220,95 215,105 225,105" fill="#ea580c" />
    <polygon points="220,200 215,190 225,190" fill="#ea580c" />

    <rect x="115" y="130" width="95" height="40" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1" />
    <text y="146" text-anchor="middle" fill="#ea580c" font-size="13" font-weight="800" x="162">1,8 keer sneller</text>
    <text y="162" text-anchor="middle" fill="#9a3412" font-size="11" font-weight="600" x="162">Convergentie</text>


    <!-- Animated Particles Tracing Curves -->


    <!-- HC particle is significantly faster (dur=2.2s vs 4.0s) -->

  </g>

  <!-- Right Side: Explanation Cards -->
  <g transform="translate(560, 140)">

    <!-- Title Card -->
    <rect x="0" y="0" width="400" height="240" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)" />
    <text y="35" text-anchor="middle" font-size="18" font-weight="800" fill="#0f172a" x="200">Statische versus dynamische mappen</text>
    <line x1="20" y1="50" x2="380" y2="50" stroke="#e2e8f0" stroke-width="2" />

    <!-- Static Explanation -->
    <g transform="translate(20, 75)">
      <text y="0" font-size="15" font-weight="700" fill="#334155" x="0">Statisch (standaard ResNet):</text>
      <text y="24" font-size="14" fill="#334155" x="0" transform="translate(-42.40 0.00)">De gewichten zijn globaal en strikt vastgesteld voor alle invoerwaarden.</text>
      <text y="46" font-size="14" fill="#334155" x="0">Hetzelfde residuele pad wordt omzeild of gelijkmatig gebruikt.</text>
    </g>

    <!-- Dynamic Explanation -->
    <g transform="translate(20, 155)">
      <text y="0" font-size="15" font-weight="700" fill="#1d4ed8" x="0">Dynamische (hyperverbindingen):</text>
      <text y="24" font-size="14" fill="#334155" x="0">De gewichten zijn afhankelijk van de invoerfeaturevector.</text>
      <text y="46" font-size="14" fill="#334155" x="0">Het model fungeert als een krachtig <tspan font-weight="700" fill="#0f172a">functierouter</tspan>, dynamically</text>
      <text y="68" font-size="14" fill="#334155" x="0" transform="translate(-27.51 0.00)">Parallelle stromen mengen op basis van de huidige gegevenscontext.</text>
    </g>

  </g>

</svg>
