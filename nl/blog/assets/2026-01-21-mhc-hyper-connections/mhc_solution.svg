<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" style="background-color: #f8fafc; font-family: Inter, system-ui, sans-serif;" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">De beperking van de mHC-residuemap</title>
  <desc id="desc">Een residuele routing-matrix wordt geprojecteerd richting het Birkhoff-polytoop: met niet-negatieve elementen waarbij de som van elke rij en kolom één is.</desc>
  <defs>
    <!-- Background grid -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#e2e8f0" stroke-width="0.5" />
    </pattern>

    <!-- Markers for arrows -->
    <marker id="arrowEmerald" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#166534" />
    </marker>
    <marker id="arrowAmber" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#ea580c" />
    </marker>

    <!-- Glow & Shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="1000" height="520" fill="#f8fafc" />

  <!-- Background grid layer -->
  <rect width="1000" height="520" fill="#f8fafc" />

  <!-- Top Title -->
  <text x="40" y="50" font-size="28" font-weight="800" fill="#0f172a">mHC-oplossing: structureren onder beperking door manifolden</text>
  <text x="40" y="80" font-size="16" fill="#334155">Het projecteren van de residuele routing-kaart richting het Birkhoff-polytoop.</text>

  <!-- Main Container -->
  <g transform="translate(60, 120)">

    <!-- Left Background Block (Constraints List) -->
    <rect x="0" y="0" width="300" height="280" rx="12" fill="#ffffff" fill-opacity="0.95" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)" />

    <text x="20" y="40" font-size="20" font-weight="800" fill="#0f172a">Birkhoff-voorwaarden</text>
    <line x1="20" y1="55" x2="280" y2="55" stroke="#f1f5f9" stroke-width="2" />

    <!-- Constraint 1 -->
    <g transform="translate(20, 80)">
      <rect x="0" y="0" width="20" height="20" rx="4" fill="#fff7ed" stroke="#ea580c" stroke-width="1" />
      <text x="10" y="15" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412">1</text>
      <text x="35" y="16" font-size="16" font-weight="700" fill="#9a3412">Positiviteitsregel</text>
      <text x="35" y="38" font-size="13" fill="#64748b">Alle waarden zijn niet-negatief.</text>
      <text x="35" y="56" font-size="13" fill="#64748b">het voorkomen van tekenannulering.</text>
    </g>

    <!-- Constraint 2 -->
    <g transform="translate(20, 150)">
      <rect x="0" y="0" width="20" height="20" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-width="1" />
      <text x="10" y="15" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">2</text>
      <text x="35" y="16" font-size="16" font-weight="700" fill="#166534">Rij-normalisatie</text>
      <text x="35" y="38" font-size="13" fill="#64748b">De totale som van elke rij is gelijk aan 1,0.</text>
      <text x="35" y="56" font-size="13" fill="#64748b">correctie van de schaling van het uitvoerkanaal.</text>
    </g>

    <!-- Constraint 3 -->
    <g transform="translate(20, 220)">
      <rect x="0" y="0" width="20" height="20" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1" />
      <text x="10" y="15" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">3</text>
      <text x="35" y="16" font-size="16" font-weight="700" fill="#1d4ed8">Kolomnormalisatie</text>
      <text x="35" y="38" font-size="13" fill="#64748b">De totale som van elke kolom is gelijk aan 1,0.</text>
      <text x="35" y="56" font-size="13" fill="#64748b">het behouden van de globale gemiddelde waarde.</text>
    </g>

    <!-- Connecting Arrow to Matrix -->
    <line x1="315" y1="140" x2="350" y2="140" stroke="#cbd5e1" stroke-width="3" stroke-dasharray="6,4" marker-end="url(#arrowSlate)" />


    <!-- Center Matrix Display -->
    <g transform="translate(370, 0)">
      <rect x="0" y="0" width="480" height="280" rx="12" fill="#ffffff" fill-opacity="0.95" stroke="#16a34a" stroke-width="2" filter="url(#shadow)" />
      <text x="240" y="40" text-anchor="middle" font-size="18" font-weight="800" fill="#166534">De doelstelling-dubbelstochastische matrix</text>

      <g transform="translate(65, 70)">

        <!-- Grid Structure -->
        <path d="M 0 0 L 300 0 L 300 160 L 0 160 Z" fill="#f8fafc" stroke="#94a3b8" stroke-width="1" />
        <!-- Inner lines -->
        <g stroke="#cbd5e1" stroke-width="1">
          <line x1="75" y1="0" x2="75" y2="160" />
          <line x1="150" y1="0" x2="150" y2="160" />
          <line x1="225" y1="0" x2="225" y2="160" />
          <line x1="0" y1="40" x2="300" y2="40" />
          <line x1="0" y1="80" x2="300" y2="80" />
          <line x1="0" y1="120" x2="300" y2="120" />
        </g>

        <!-- Values representing Doubly Stochastic Structure -->
        <g fill="#0f172a" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="600" text-anchor="middle">
          <!-- Row 1 -->
          <text x="37" y="27">0,15</text>  <text x="112" y="27">0,35</text>  <text x="187" y="27">0,40</text>  <text x="262" y="27">0,10</text>
          <!-- Row 2 -->
          <text x="37" y="67">0,45</text>  <text x="112" y="67">0,10</text>  <text x="187" y="67">0,25</text>  <text x="262" y="67">0,20</text>
          <!-- Row 3 -->
          <text x="37" y="107">0,30</text> <text x="112" y="107">0,25</text> <text x="187" y="107">0,15</text> <text x="262" y="107">0,30</text>
          <!-- Row 4 -->
          <text x="37" y="147">0,10</text> <text x="112" y="147">0,30</text> <text x="187" y="147">.20</text> <text x="262" y="147">0,40</text>
        </g>

        <!-- Constraint Highlighting / Animation setup -->
        <!-- Highlight Row sum -->
        <text id="rowSumText" x="315" y="26" text-anchor="start" fill="#166534" font-size="14" font-weight="800">→ Σ = 1,0</text>

        <!-- Highlight Col sum -->
        <g text-anchor="middle" fill="#2563eb" font-size="14" font-weight="800">
          <text x="37" y="180">↓</text>
          <text id="colSumText" x="37" y="195">Σ = 1,0</text>
        </g>

        <!-- Animation block indicating scanning validation matrix -->




        <!-- Static Indicators (Remaining rows) -->
        <g font-size="14" font-weight="800" fill="#16a34a">
          <text x="315" y="66">→ Σ = 1,0</text>
          <text x="315" y="106">→ Σ = 1,0</text>
          <text x="315" y="146">→ Σ = 1,0</text>
        </g>

        <!-- Static Indicators (Remaining cols) -->
        <g font-size="14" font-weight="800" fill="#2563eb" text-anchor="middle">
          <text x="112" y="180">↓</text> <text x="112" y="195">Σ = 1,0</text>
          <text x="187" y="180">↓</text> <text x="187" y="195">Σ = 1,0</text>
          <text x="262" y="180">↓</text> <text x="262" y="195">Σ = 1,0</text>
        </g>

        <rect x="0" y="0" width="300" height="160" fill="none" stroke="#ea580c" stroke-width="2" />
        <text x="150" y="-12" text-anchor="middle" font-size="12" font-weight="700" fill="#ea580c">Beding 1: waarden ≥ 0</text>

      </g>
    </g>
  </g>

  <!-- Bottom Outcome Strip -->
  <rect x="60" y="425" width="850" height="50" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" filter="url(#shadow)" />
  <text x="485" y="456" text-anchor="middle" font-size="18" font-weight="800" fill="#166534">Resultaat: gemiddelde blijft behouden; amplificatie is begrensd.</text>

</svg>
