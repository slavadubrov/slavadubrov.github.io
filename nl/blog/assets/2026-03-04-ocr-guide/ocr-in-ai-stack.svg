<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <!-- Background -->
  <rect width="920" height="420" fill="#ffffff" rx="8" />
  <defs>
    <!-- Background grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#f0f0f0" stroke-width="1" />
    </pattern>

    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.1" />
    </filter>

    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3498db" />
      <stop offset="100%" stop-color="#2980b9" />
    </linearGradient>
    <linearGradient id="gradOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e67e22" />
      <stop offset="100%" stop-color="#d35400" />
    </linearGradient>
    <linearGradient id="gradPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9b59b6" />
      <stop offset="100%" stop-color="#8e44ad" />
    </linearGradient>
    <linearGradient id="gradGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#27ae60" />
      <stop offset="100%" stop-color="#1e8449" />
    </linearGradient>

    <!-- Arrow markers -->
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#90a4ae" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2980b9" />
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d35400" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Title -->
  <text x="460" y="32" font-size="20" font-weight="bold" fill="#2c3e50" text-anchor="middle">OCR in de moderne AI-stack</text>
  <text x="460" y="52" font-size="13" fill="#7f8c8d" text-anchor="middle">Van ruwe documenten naar AI-inzichten</text>

  <!-- ==================== LEFT: Document Sources ==================== -->
  <g transform="translate(30, 80)">
    <!-- Section header -->
    <rect width="200" height="32" rx="6" fill="url(#gradBlue)" />
    <text x="100" y="21" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Documentbronnen</text>

    <!-- Cards -->
    <rect y="42" width="200" height="50" rx="6" fill="#ffffff" stroke="#e0e0e0" stroke-width="1" filter="url(#shadow)" />
    <text x="36" y="63" font-size="22">📄</text>
    <text x="68" y="63" font-size="12" font-weight="600" fill="#2c3e50">PDF's &amp; Word-docs</text>
    <text x="68" y="80" font-size="10" fill="#7f8c8d">Contracten, rapporten, handleidingen</text>

    <rect y="102" width="200" height="50" rx="6" fill="#ffffff" stroke="#e0e0e0" stroke-width="1" filter="url(#shadow)" />
    <text x="36" y="123" font-size="22">🖼️</text>
    <text x="68" y="123" font-size="12" font-weight="600" fill="#2c3e50">Gescande documenten</text>
    <text x="68" y="140" font-size="10" fill="#7f8c8d">Facturen, bonnen, formulieren</text>

    <rect y="162" width="200" height="50" rx="6" fill="#ffffff" stroke="#e0e0e0" stroke-width="1" filter="url(#shadow)" />
    <text x="36" y="183" font-size="22">📸</text>
    <text x="68" y="183" font-size="12" font-weight="600" fill="#2c3e50">Foto's &amp; screenshots</text>
    <text x="68" y="200" font-size="10" fill="#7f8c8d">Whiteboards, borden, UI</text>

    <rect y="222" width="200" height="50" rx="6" fill="#ffffff" stroke="#e0e0e0" stroke-width="1" filter="url(#shadow)" />
    <text x="36" y="243" font-size="22">📧</text>
    <text x="68" y="243" font-size="12" font-weight="600" fill="#2c3e50">E-mails &amp; bijlagen</text>
    <text x="68" y="260" font-size="10" fill="#7f8c8d">Ingesloten afbeeldingen, PDF's</text>
  </g>

  <!-- ==================== CENTER: OCR Layer ==================== -->
  <g transform="translate(310, 80)">
    <!-- Section header -->
    <rect width="300" height="32" rx="6" fill="url(#gradOrange)" />
    <text x="150" y="21" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">OCR-laag — de brug</text>

    <!-- Main box -->
    <rect y="42" width="300" height="230" rx="8" fill="#fff8f0" stroke="#e67e22" stroke-width="1.5" filter="url(#shadow)" />

    <!-- Text extraction -->
    <text x="150" y="72" font-size="13" font-weight="bold" fill="#d35400" text-anchor="middle">Tekst + structuurextractie</text>

    <rect x="20" y="86" width="120" height="36" rx="5" fill="#ffffff" stroke="#e0e0e0" stroke-width="1" />
    <text x="80" y="100" font-size="10" font-weight="600" fill="#2c3e50" text-anchor="middle">Traditionele OCR</text>
    <text x="80" y="114" font-size="9" fill="#7f8c8d" text-anchor="middle">Tesseract, PaddleOCR</text>

    <rect x="160" y="86" width="120" height="36" rx="5" fill="#ffffff" stroke="#e0e0e0" stroke-width="1" />
    <text x="220" y="100" font-size="10" font-weight="600" fill="#2c3e50" text-anchor="middle">VLM's</text>
    <text x="220" y="114" font-size="9" fill="#7f8c8d" text-anchor="middle">Gemini, Claude, GPT</text>

    <rect x="20" y="132" width="120" height="36" rx="5" fill="#ffffff" stroke="#e0e0e0" stroke-width="1" />
    <text x="80" y="146" font-size="10" font-weight="600" fill="#2c3e50" text-anchor="middle">Gespecialiseerde modellen</text>
    <text x="80" y="160" font-size="9" fill="#7f8c8d" text-anchor="middle">dots.ocr, Qwen3-VL</text>

    <rect x="160" y="132" width="120" height="36" rx="5" fill="#ffffff" stroke="#e0e0e0" stroke-width="1" />
    <text x="220" y="146" font-size="10" font-weight="600" fill="#2c3e50" text-anchor="middle">Layoutanalyse</text>
    <text x="220" y="160" font-size="9" fill="#7f8c8d" text-anchor="middle">Tabellen, koppen, lijsten</text>

    <!-- Output arrow label -->
    <line x1="150" y1="180" x2="150" y2="210" stroke="#d35400" stroke-width="1.5" marker-end="url(#arrow-orange)" />
    <rect x="55" y="215" width="190" height="44" rx="6" fill="#e67e22" opacity="0.12" />
    <text x="150" y="234" font-size="11" font-weight="bold" fill="#d35400" text-anchor="middle">Output: Schone tekst, tabellen,</text>
    <text x="150" y="250" font-size="11" font-weight="bold" fill="#d35400" text-anchor="middle">structuur en metadata</text>
  </g>

  <!-- ==================== RIGHT: AI Consumers ==================== -->
  <g transform="translate(690, 80)">
    <!-- Section header -->
    <rect width="200" height="32" rx="6" fill="url(#gradPurple)" />
    <text x="100" y="21" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">AI-afnemers</text>

    <!-- RAG Pipeline -->
    <rect y="42" width="200" height="70" rx="6" fill="#ffffff" stroke="#e0e0e0" stroke-width="1" filter="url(#shadow)" />
    <text x="100" y="63" font-size="12" font-weight="bold" fill="#8e44ad" text-anchor="middle">RAG-pijplijnen</text>
    <text x="100" y="80" font-size="9" fill="#7f8c8d" text-anchor="middle">Chunk → Embed → Vector DB</text>
    <text x="100" y="94" font-size="9" fill="#7f8c8d" text-anchor="middle">→ Retrieve → LLM-antwoord</text>

    <!-- AI Agents -->
    <rect y="122" width="200" height="56" rx="6" fill="#ffffff" stroke="#e0e0e0" stroke-width="1" filter="url(#shadow)" />
    <text x="100" y="143" font-size="12" font-weight="bold" fill="#8e44ad" text-anchor="middle">AI-agents</text>
    <text x="100" y="160" font-size="9" fill="#7f8c8d" text-anchor="middle">Documentlezen, formulieren invullen</text>

    <!-- Enterprise QA -->
    <rect y="188" width="200" height="56" rx="6" fill="#ffffff" stroke="#e0e0e0" stroke-width="1" filter="url(#shadow)" />
    <text x="100" y="209" font-size="12" font-weight="bold" fill="#8e44ad" text-anchor="middle">Enterprise-QA</text>
    <text x="100" y="226" font-size="9" fill="#7f8c8d" text-anchor="middle">Contractzoeken, compliance, KB's</text>

    <!-- Domain Apps -->
    <rect y="254" width="200" height="56" rx="6" fill="#ffffff" stroke="#e0e0e0" stroke-width="1" filter="url(#shadow)" />
    <text x="100" y="275" font-size="12" font-weight="bold" fill="#8e44ad" text-anchor="middle">Domeintoepassingen</text>
    <text x="100" y="292" font-size="9" fill="#7f8c8d" text-anchor="middle">Medisch, juridisch, financieel</text>
  </g>

  <!-- ==================== Arrows: Sources → OCR ==================== -->
  <line x1="230" y1="200" x2="305" y2="200" stroke="#3498db" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-blue)" />

  <!-- ==================== Arrows: OCR → Consumers ==================== -->
  <line x1="610" y1="200" x2="685" y2="200" stroke="#8e44ad" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-gray)" />

  <!-- ==================== Bottom callout ==================== -->
  <g transform="translate(230, 365)">
    <rect width="460" height="40" rx="6" fill="#fdf2e9" stroke="#e67e22" stroke-width="1" />
    <text x="230" y="17" font-size="11" font-weight="bold" fill="#d35400" text-anchor="middle">⚠️ OCR-kwaliteit = grens voor latere AI-kwaliteit</text>
    <text x="230" y="33" font-size="10" fill="#7f8c8d" text-anchor="middle">Rommelige tekst in → rommelige antwoorden uit. Geen embeddings of prompts lossen slechte extractie op.</text>
  </g>
</svg>
