<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Apple Silicon-unified-memory-budget voor lokale inference</title>
  <desc id="desc">De geïnstalleerde unified memory wordt gedeeld door macOS en applicaties, model weights, KV cache, en runtime werkruimtes. Een reservering voor geheugenpressie zorgt ervoor dat een geladen bestand gescheiden blijft van een werklast die soepel kan worden uitgevoerd.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="440" rx="22" fill="#0f172a" /><text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">De geïnstalleerde geheugenruimte vormt niet het budget voor model</text>
  <g font-family="Inter, system-ui, sans-serif"><rect x="55" y="115" width="890" height="145" rx="18" fill="#1e293b" stroke="#64748b" /><rect x="55" y="115" width="230" height="145" rx="18" fill="#1d4ed8" /><rect x="285" y="115" width="280" height="145" fill="#5b21b6" /><rect x="565" y="115" width="170" height="145" fill="#9a3412" /><rect x="735" y="115" width="210" height="145" rx="18" fill="#1d4ed8" />
  <text x="170" y="165" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">macOS en apps</text><text x="170" y="198" text-anchor="middle" font-size="12" fill="#93c5fd">wijzigingen tijdens gebruik</text>
  <text x="425" y="165" text-anchor="middle" font-size="16" font-weight="700" fill="#c4b5fd">Model weights</text><text x="425" y="198" text-anchor="middle" font-size="12" fill="#93c5fd">afhankelijk van artefacten</text>
  <text x="650" y="165" text-anchor="middle" font-size="16" font-weight="700" fill="#fdba74">KV cache</text><text x="650" y="198" text-anchor="middle" font-size="12" fill="#fdba74">context en gelijktijdigheid</text>
  <text x="840" y="155" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Werkbereik +</text><text x="840" y="178" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">headroom</text><text x="840" y="211" text-anchor="middle" font-size="12" fill="#93c5fd">vermijd druk door swappen</text>
  <rect x="175" y="310" width="650" height="70" rx="14" fill="#991b1b" stroke="#dc2626" /><text x="500" y="340" text-anchor="middle" font-size="16" font-weight="700" fill="#fca5a5">Een succesvolle lading is slechts het eerste controlepunt</text><text x="500" y="364" text-anchor="middle" font-size="12" fill="#fca5a5">Meting van de piekdruk bij het doelcontext, de verzoeken en de applicatiebelasting.</text></g>
</svg>
