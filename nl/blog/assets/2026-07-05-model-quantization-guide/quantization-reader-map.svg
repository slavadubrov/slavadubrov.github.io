<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Quantificatielezerkaart</title>
  <desc id="desc">Beslismap die storingen in de dienstverlening routeert naar keuzes voor kwantificatie en validatietoetsen.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.16" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#546e7a" />
    </marker>
  </defs>
  <rect width="960" height="520" fill="#f8f9fa" />
  <text x="480" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#263238">Begin met het bottleneck.</text>
  <text x="480" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#546e7a">Hetzelfde bitbreedte kan afhankelijk van de hardware, uitvoeromgeving, cache en evaluaties correct of incorrect zijn.</text>

  <rect x="365" y="105" width="230" height="74" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="2" filter="url(#shadow)" />
  <text x="480" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#1565c0">Wat beperkt het serveren?</text>
  <text x="480" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#37474f">geheugen, rekenkracht, cache, uitvoeringstijd of afbeeldingspipeline</text>

  <g font-family="Arial, sans-serif">
    <rect x="45" y="240" width="165" height="118" rx="8" fill="#e3f2fd" stroke="#2980b9" stroke-width="1.5" filter="url(#shadow)" />
    <text x="127" y="267" text-anchor="middle" font-size="15" font-weight="700" fill="#1565c0">Gewichtsgeheugen</text>
    <text x="127" y="294" text-anchor="middle" font-size="13" fill="#263238">W4A16 GPTQ/AWQ</text>
    <text x="127" y="318" text-anchor="middle" font-size="12" fill="#546e7a">decoderen, model aanpassen</text>
    <text x="127" y="340" text-anchor="middle" font-size="12" fill="#546e7a">evaluatiekwaliteitsverschil</text>

    <rect x="230" y="240" width="165" height="118" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadow)" />
    <text x="312" y="267" text-anchor="middle" font-size="15" font-weight="700" fill="#2e7d32">Doorvoer</text>
    <text x="312" y="294" text-anchor="middle" font-size="13" fill="#263238">FP8 W8A8</text>
    <text x="312" y="318" text-anchor="middle" font-size="12" fill="#546e7a">Ada/Hopper-kernen</text>
    <text x="312" y="340" text-anchor="middle" font-size="12" fill="#546e7a">benchtest TTFT/ITL</text>

    <rect x="415" y="240" width="165" height="118" rx="8" fill="#fff3e0" stroke="#e67e22" stroke-width="1.5" filter="url(#shadow)" />
    <text x="497" y="267" text-anchor="middle" font-size="15" font-weight="700" fill="#e65100">Lange context</text>
    <text x="497" y="292" text-anchor="middle" font-size="13" fill="#263238">KV-cache</text>
    <text x="497" y="310" text-anchor="middle" font-size="13" fill="#263238">kwantificatie</text>
    <text x="497" y="332" text-anchor="middle" font-size="12" fill="#546e7a">De cache neemt de meeste VRAM in beslag.</text>
    <text x="497" y="350" text-anchor="middle" font-size="12" fill="#546e7a">herwinning van de sonde</text>

    <rect x="600" y="240" width="165" height="118" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadow)" />
    <text x="682" y="267" text-anchor="middle" font-size="15" font-weight="700" fill="#6a1b9a">Lokale uitvoeromgeving</text>
    <text x="682" y="294" text-anchor="middle" font-size="13" fill="#263238">GGUF / MLX</text>
    <text x="682" y="318" text-anchor="middle" font-size="12" fill="#546e7a">CPU, Apple, edgecomputing</text>
    <text x="682" y="340" text-anchor="middle" font-size="12" fill="#546e7a">lokaal RAM meten</text>

    <rect x="785" y="240" width="130" height="118" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="1.5" filter="url(#shadow)" />
    <text x="850" y="267" text-anchor="middle" font-size="15" font-weight="700" fill="#c62828">Pad naar afbeelding</text>
    <text x="850" y="294" text-anchor="middle" font-size="13" fill="#263238">SVDQuant</text>
    <text x="850" y="318" text-anchor="middle" font-size="12" fill="#546e7a">VAE-gevoelig</text>
    <text x="850" y="340" text-anchor="middle" font-size="12" fill="#546e7a">visuele evaluaties</text>
  </g>

  <g stroke="#546e7a" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M 480 179 C 480 205 127 208 127 235" />
    <path d="M 480 179 C 480 207 312 211 312 235" />
    <path d="M 480 179 C 480 210 497 211 497 235" />
    <path d="M 480 179 C 480 207 682 211 682 235" />
    <path d="M 480 179 C 480 205 850 208 850 235" />
  </g>

  <rect x="190" y="405" width="580" height="62" rx="8" fill="#ffffff" stroke="#78909c" stroke-width="1.5" />
  <text x="480" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#37474f">Vervolgens worden de deploy-controles uitgevoerd.</text>
  <text x="480" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#546e7a">perplexiteit + taakmetrieken + generatiemodellen + lange-contextproeven + prestatiebenchmarks</text>
</svg>
