<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="640" viewBox="0 0 1120 640" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Hoe kwantificatie hoge-precisiewaarden omzet in buckets met lagere precisie</title>
  <desc id="desc">Een diagram van links naar rechts dat de volledige precisiewaarden, schaalselectie, gehele getallenbuckets, gedecomprimeerde waarden en het foutbudget weergeeft.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#334155" flood-opacity="0.08" />
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="5" orient="auto">
      <path d="M1,2 L7,5 L1,8 Z" fill="#2563eb" stroke="#2563eb" stroke-width="1.5" stroke-linejoin="round" />
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .card { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; filter: url(#shadow); }
      .title { font-style: normal; font-weight: 700; font-size: 24px; font-family: Inter, system-ui, sans-serif; fill: #0f172a; }
      .subtitle { font-style: normal; font-weight: 400; font-size: 15px; font-family: Inter, system-ui, sans-serif; fill: #334155; }
      .label { font-style: normal; font-weight: 700; font-size: 16px; font-family: Inter, system-ui, sans-serif; fill: #0f172a; }
      .text { font-style: normal; font-weight: 400; font-size: 13px; font-family: Inter, system-ui, sans-serif; fill: #334155; }
      .code-bg { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1; }
      .mono { font-style: normal; font-weight: 600; font-size: 13px; font-family: SFMono-Regular, Consolas, monospace; fill: #0f172a; }
      .mono-red { font-style: normal; font-weight: 700; font-size: 13px; font-family: SFMono-Regular, Consolas, monospace; fill: #dc2626; }
      .mono-blue { font-style: normal; font-weight: 700; font-size: 13px; font-family: SFMono-Regular, Consolas, monospace; fill: #2563eb; }
      .mono-green { font-style: normal; font-weight: 700; font-size: 13px; font-family: SFMono-Regular, Consolas, monospace; fill: #166534; }
      .mono-purple { font-style: normal; font-weight: 700; font-size: 13px; font-family: SFMono-Regular, Consolas, monospace; fill: #7c3aed; }
      .mono-orange { font-style: normal; font-weight: 700; font-size: 13px; font-family: SFMono-Regular, Consolas, monospace; fill: #ea580c; }
      .blue-header { fill: #eff6ff; stroke: #2563eb; stroke-width: 1; }
      .orange-header { fill: #fff7ed; stroke: #ea580c; stroke-width: 1; }
      .purple-header { fill: #faf5ff; stroke: #7c3aed; stroke-width: 1; }
      .green-header { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1; }
      .red-header { fill: #fef2f2; stroke: #dc2626; stroke-width: 1; }
      .arrow { stroke: #2563eb; stroke-width: 2.5; fill: none; marker-end: url(#arrow); stroke-dasharray: 4 2; }
      .border-highlight { stroke: #2563eb; stroke-width: 2; }
    </style>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect class="bg" width="1120" height="640" rx="12" />

  <!-- Title and Subtitle -->
  <text class="title" y="52" x="48">De quantificatie-dequantificatielus</text>
  <text class="subtitle" y="78" x="48">Het traceren van hoe hoge-precisiewaarden worden gekoppeld aan buckets met lagere precisie en opnieuw worden gereconstrueerd tijdens inferentie.</text>

  <!-- 1. Original Weights (BF16) -->
  <g transform="translate(48 115)">
    <rect class="card" width="230" height="300" rx="8" />
    <rect class="blue-header" x="1" y="1" width="228" height="42" rx="7 7 0 0" />
    <text class="label" y="27" x="16">1. Oorspronkelijke gewichten</text>
    <text class="text" y="70" x="16">De gewichten beginnen als BF16 of</text>
    <text class="text" y="88" x="16">FP32-getallen op schijf opgeslagen.</text>

    <!-- Visual Tensor representation -->
    <rect class="code-bg" x="16" y="115" width="198" height="120" rx="6" />
    <text class="mono" y="140" x="28">FP32/BF16-tensor:</text>
    <text class="mono-blue" y="165" x="28">[ 2,10,  -1,20,</text>
    <text class="mono-orange" y="190" x="44">0,40<tspan fill="#334155" font-weight="normal">[, -0.80]</tspan></text>
    <text class="text" y="260" x="16">Waarde volgen <tspan font-weight="bold" fill="#ea580c">0,40</tspan> as it</text>
    <text class="text" y="278" x="16">gaat door de lus heen.</text>
  </g>

  <!-- Arrow 1 to 2 -->
  <path class="arrow" d="M288 265 L318 265" />

  <!-- 2. Calculate Scale (s) -->
  <g transform="translate(328 115)">
    <rect class="card" width="230" height="300" rx="8" />
    <rect class="orange-header" x="1" y="1" width="228" height="42" rx="7 7 0 0" />
    <text class="label" y="27" x="16">2. Schaal berekenen</text>
    <text class="text" y="70" x="16">Schaal berekenen <tspan font-style="italic" font-weight="bold">s</tspan> to map</text>
    <text class="text" y="88" x="16">gewichten in het 4-bits bereik</text>
    <text class="text" y="106" x="16">van <tspan font-weight="bold">[-7, 7]</tspan> (signed INT4).</text>

    <!-- Scale Calculation Box -->
    <rect class="code-bg" x="16" y="135" width="198" height="100" rx="6" />
    <text class="mono" y="160" x="28">s = max(|x|) / q_max</text>
    <text class="mono" y="185" x="28">s = 2,10 / 7</text>
    <text class="mono-orange" y="212" x="28">s = 0,30</text>

    <text class="text" y="260" x="16">De schaal wordt samen opgeslagen</text>
    <text class="text" y="278" x="16">gekwantificeerde gewichten.</text>
  </g>

  <!-- Arrow 2 to 3 -->
  <path class="arrow" d="M568 265 L598 265" />

  <!-- 3. Quantize & Store -->
  <g transform="translate(608 115)">
    <rect class="card" width="230" height="300" rx="8" />
    <rect class="purple-header" x="1" y="1" width="228" height="42" rx="7 7 0 0" />
    <text class="label" y="27" x="16">3. Quantificeren en opslaan</text>
    <text class="text" y="70" x="16">Delen door schaal, afgerond op</text>
    <text class="text" y="88" x="16">dichtstbijzijnde gehele getal opslaan.</text>

    <!-- Quantized Tensor Box -->
    <rect class="code-bg" x="16" y="115" width="198" height="120" rx="6" />
    <text class="mono" y="138" x="28">x_q = rond(x / s)</text>
    <text class="mono-purple" y="162" x="28">[ 7,  -4,  1,  -3 ]</text>

    <line x1="28" y1="178" x2="200" y2="178" stroke="#cbd5e1" stroke-width="1" />

    <!-- Tracking 0.40 rounding details -->
    <text class="mono" y="196" x="28">Voor 0,40:</text>
    <text class="mono" y="214" x="28">0,40 / 0,3 = 1,33 <tspan fill="#7c3aed" font-weight="bold">→ 1</tspan></text>

    <text class="text" y="260" x="16">De gewichten worden nu opgeslagen in</text>
    <text class="text" y="278" x="16">4-bits (75% kleiner!).</text>
  </g>

  <!-- Arrow 3 to 4 -->
  <path class="arrow" d="M848 265 L878 265" />

  <!-- 4. Dequantize & GEMM -->
  <g transform="translate(888 115)">
    <rect class="card" width="184" height="300" rx="8" />
    <rect class="green-header" x="1" y="1" width="182" height="42" rx="7 7 0 0" />
    <text class="label" y="27" x="16">4. Dekwantiseren en GEMM</text>
    <text class="text" y="70" x="16">Herstel naar BF16 voor</text>
    <text class="text" y="88" x="16">Matrixvermenigvuldiging.</text>

    <!-- Dequantized representation -->
    <rect class="code-bg" x="16" y="115" width="152" height="120" rx="6" />
    <text class="mono" y="140" x="24">Dekwantificeerd:</text>
    <text class="mono-green" y="165" x="24">[ 2,1; -1,2, </text>
    <text class="mono-green" y="190" x="24">  [0,3] en [-0,9]</text>
    <text class="text" y="215" x="24"><tspan font-weight="bold" fill="#ea580c">0,40</tspan> reconstructed as <tspan font-weight="bold" fill="#166534">0,30</tspan></text>

    <!-- GEMM Box -->
    <rect x="16" y="247" width="152" height="40" rx="6" fill="#16a34a" stroke="#166534" stroke-width="1" />
    <text class="mono" y="272" fill="#ffffff" x="26" transform="translate(-15.44 0.00)">GEMM-matrisvermenigvuldiging</text>
  </g>

  <!-- Bottom: The Error Budget Card -->
  <g transform="translate(48 440)">
    <rect class="card" width="1024" height="175" rx="8" />
    <rect class="red-header" x="1" y="1" width="1022" height="42" rx="7 7 0 0" />
    <text class="label" y="27" x="24">Het begrijpen van het error budget en GEMM</text>

    <!-- Columns inside error budget -->
    <text class="mono" y="70" x="24">Rondingsruis:</text>
    <text class="text" y="92" x="24">Het ronden van continue gewichten naar discrete gehele getallen zorgt voor</text>
    <text class="text" y="110" x="24">kleine wiskundige fouten (bijv. <tspan fill="#ea580c" font-weight="bold">0,40 → 0,30</tspan>).</text>
    <text class="text" y="128" x="24">Symmetrische formules: <tspan font-family="SFMono-Regular, Consolas, monospace">x_q = clip(gesneden(x/s))</tspan> and <tspan font-family="SFMono-Regular, Consolas, monospace">x_approx = x_q × s</tspan>.</text>
    <text class="text" y="146" x="24">Algoritmen zoals <tspan font-weight="bold">AWQ</tspan> and <tspan font-weight="bold">GPTQ</tspan> optimize scales to minimize this error.</text>

    <line x1="590" y1="50" x2="590" y2="162" stroke="#e2e8f0" stroke-width="1.5" />

    <text class="mono" y="70" x="614">Wat is GEMM?</text>
    <text class="text" y="92" x="614"><tspan font-weight="bold">GEMM</tspan> stands for <tspan font-weight="bold">Algemene matrixvermenigvuldiging</tspan>. It is the</text>
    <text class="text" y="110" x="614">corele matematische operatie van neurale netwerken</text>
    <text class="text" y="128" x="614">)<tspan font-family="SFMono-Regular, Consolas, monospace">Uitvoer = Activaties × Gewichten</tspan>).</text>
    <text class="text" y="146" x="614" transform="translate(-83.23 0.00)">Gekwantiseerde modellen voeren GEMM uit met gedekwantiseerde gewichten ter plekke.</text>
  </g>
</svg>
