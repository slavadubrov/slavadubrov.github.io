<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Zsh-startbestanden geselecteerd voor inlogmodus en interactieve modus</title>
  <desc id="desc">Een 2×2 matrix toont interactieve shells bij inloggen die zshenv, zprofile, zshrc en zlogin lezen; niet-interactieve shells bij inloggen die zshenv, zprofile en zlogin lezen; interactieve shells buiten het inlogproces die alleen zshenv en zshrc lezen; en niet-interactieve shells buiten het inlogproces die uitsluitend zshenv lezen.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="700" rx="28" fill="#0f172a" />
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Twee vlaggen selecteren de startbestanden</text>
  <text x="600" y="98" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="17">Log-in en interactiviteit zijn onafhankelijke eigenschappen</text>
  <g font-family="Inter, system-ui, sans-serif">
    <text x="420" y="145" text-anchor="middle" fill="#93c5fd" font-size="20" font-weight="700">interactief</text>
    <text x="900" y="145" text-anchor="middle" fill="#94a3b8" font-size="20" font-weight="700">niet-interactief</text>
    <text x="82" y="300" text-anchor="middle" fill="#c4b5fd" font-size="20" font-weight="700" transform="rotate(-90 82 300)">Inloggen</text>
    <text x="82" y="560" text-anchor="middle" fill="#94a3b8" font-size="20" font-weight="700" transform="rotate(-90 82 560)">Zonder inloggen</text>

    <g transform="translate(155 175)"><rect width="530" height="215" rx="20" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="30" y="44" fill="#93c5fd" font-size="22" font-weight="700">Inloggen + interactief</text><text x="30" y="83" fill="#93c5fd" font-size="17">Typische tabblad van de Apple Terminal</text><text x="30" y="132" fill="#e2e8f0" font-size="19">.zshenv → .zprofile → .zshrc → .zlogin</text><text x="30" y="172" fill="#94a3b8" font-size="15">Zowel inloggen als interactieve configuratie</text></g>
    <g transform="translate(715 175)"><rect width="410" height="215" rx="20" fill="#5b21b6" /><text x="30" y="44" fill="#93c5fd" font-size="22" font-weight="700">Inloggen + niet-interactief</text><text x="30" y="83" fill="#c4b5fd" font-size="17">zsh -lc 'command'</text><text x="30" y="132" fill="#e2e8f0" font-size="18">.zshenv → .zprofile → .zlogin</text><text x="30" y="172" fill="#94a3b8" font-size="15">geen .zshrc</text></g>
    <g transform="translate(155 425)"><rect width="530" height="215" rx="20" fill="#166534" /><text x="30" y="44" fill="#93c5fd" font-size="22" font-weight="700">Zonder inloggen + interactief</text><text x="30" y="83" fill="#93c5fd" font-size="17">Gevouwen zsh- of terminalconfiguratie</text><text x="30" y="132" fill="#e2e8f0" font-size="19">.zshenv → .zshrc</text><text x="30" y="172" fill="#94a3b8" font-size="15">geen .zprofile</text></g>
    <g transform="translate(715 425)"><rect width="410" height="215" rx="20" fill="#1e293b" /><text x="30" y="44" fill="#cbd5e1" font-size="22" font-weight="700">Geen van beide</text><text x="30" y="83" fill="#94a3b8" font-size="17">zsh -c 'command'</text><text x="30" y="132" fill="#e2e8f0" font-size="19">.zshenv</text><text x="30" y="172" fill="#94a3b8" font-size="15">houd het stil en minimalistisch</text></g>
  </g>
</svg>
