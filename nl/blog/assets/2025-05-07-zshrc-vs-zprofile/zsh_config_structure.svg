<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Waar moet het naartoe?</title>
  <desc id="artifact-desc">Waar moet het naartoe?.</desc>
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .card { fill: #1d4ed8; stroke: #94a3b8; stroke-width: 2; rx: 12; }
      .text-main { font-family: Inter, system-ui, sans-serif; fill: #93c5fd; }
      .title { font-weight: 600; font-size: 24px; text-anchor: middle; fill: #c4b5fd; }
      .card-title { font-weight: 600; font-size: 20px; text-anchor: middle; }
      .card-subtitle { font-size: 14px; text-anchor: middle; opacity: 0.8; }
      .section-title { font-weight: 600; font-size: 16px; fill: #93c5fd; }
      .code { font-family: SFMono-Regular, Consolas, monospace; font-size: 13px; fill: #93c5fd; }
      .bullet { r: 3; }
    </style>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="100%" height="100%" class="bg" />

  <!-- Main Title -->
  <text y="40" class="text-main title" x="400">Waar moet het naartoe?</text>

  <!-- Left Card: .zprofile -->
  <rect x="50" y="70" width="330" height="300" class="card" style="stroke: #7c3aed;" />
  <text y="110" class="text-main card-title" style="fill: #c4b5fd;" x="215">~/.zprofile</text>
  <text y="130" class="text-main card-subtitle" style="fill: #c4b5fd;" x="215">Het "Backstage"-team</text>

  <line x1="50" y1="150" x2="380" y2="150" style="stroke: #94a3b8; stroke-width: 1;" />

  <!-- Environment Section -->
  <text y="180" class="text-main section-title" x="80">Omgevingsvariabelen</text>
  <circle cx="80" cy="205" class="bullet" style="fill: #faf5ff;" />
  <text y="210" class="text-main code" x="95">export PATH="..."</text>
  <circle cx="80" cy="225" class="bullet" style="fill: #faf5ff;" />
  <text y="230" class="text-main code" x="95">export EDITOR=vim</text>

  <!-- Tools Section -->
  <text y="265" class="text-main section-title" x="80">Initialisatie van het hulpprogramma</text>
  <circle cx="80" cy="290" class="bullet" style="fill: #faf5ff;" />
  <text y="295" class="text-main code" x="95">eval "$(fnm omgeving)"</text>
  <circle cx="80" cy="310" class="bullet" style="fill: #faf5ff;" />
  <text y="315" class="text-main code" x="95">ladingomgeving</text>

  <!-- Right Card: .zshrc -->
  <rect x="420" y="70" width="330" height="300" class="card" style="stroke: #16a34a;" />
  <text y="110" class="text-main card-title" style="fill: #86efac;" x="585">~/.zshrc</text>
  <text y="130" class="text-main card-subtitle" style="fill: #86efac;" x="585">De artiest op het podium</text>

  <line x1="420" y1="150" x2="750" y2="150" style="stroke: #94a3b8; stroke-width: 1;" />

  <!-- Visuals Section -->
  <text y="180" class="text-main section-title" x="450">Visuele weergaven en prompt</text>
  <circle cx="450" cy="205" class="bullet" style="fill: #16a34a;" />
  <text y="210" class="text-main code" x="465">Starship-init in Zsh</text>
  <circle cx="450" cy="225" class="bullet" style="fill: #16a34a;" />
  <text y="230" class="text-main code" x="465">pure prompt</text>

  <!-- Interactive Section -->
  <text y="265" class="text-main section-title" x="450">Aliassen en functies</text>
  <circle cx="450" cy="290" class="bullet" style="fill: #16a34a;" />
  <text y="295" class="text-main code" x="465">alias g='git'</text>
  <circle cx="450" cy="310" class="bullet" style="fill: #16a34a;" />
  <text y="315" class="text-main code" x="465">mkcd() { ... }</text>

</svg>
