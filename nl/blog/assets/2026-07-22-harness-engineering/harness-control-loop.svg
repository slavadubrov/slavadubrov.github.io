<svg xmlns="http://www.w3.org/2000/svg" width="640" height="1010" viewBox="0 0 640 1010" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Een wijziging van de korting via een agent harness</title>
  <desc id="desc">Een zevenstappige verticale flow voor een fictieve winkeltask. De harness zorgt voor een wijziging van de kortingendrempel; de model stelt een edit voor; de harness geeft toestemming hiervoor; de runtime voert deze uit; en de harness draait de genoemde unit- en browseracceptantietests voordat er een beslissing wordt vastgelegd.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a" />
    </marker>
  </defs>
  <rect width="640" height="1010" fill="#f8fafc" />
  <rect x="20" y="18" width="600" height="974" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />

  <text x="48" y="62" font-size="26" font-weight="700" fill="#0f172a">Eén actie, zeven controlestadia</text>
  <text x="48" y="91" font-size="15" fill="#64748b">Een voorstel wordt pas teruggestuurd wanneer de vereiste bewijzen aanwezig zijn.</text>

  <rect x="38" y="120" width="564" height="730" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="7 6" />
  <text x="60" y="151" font-size="14" font-weight="700" fill="#1d4ed8">HARNESS ORCHESTREERT DE LOOP</text>

  <rect x="60" y="172" width="520" height="74" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.5" />
  <text x="82" y="202" font-size="17" font-weight="700" fill="#1d4ed8">1. Context samenstellen</text>
  <text x="82" y="226" font-size="14" fill="#334155">Taak, regels voor het repository, bestanden, plan en eerdere resultaten</text>

  <line x1="320" y1="246" x2="320" y2="268" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)" />

  <rect x="60" y="276" width="520" height="74" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" />
  <text x="82" y="306" font-size="17" font-weight="700" fill="#5b21b6">2. Model stelt voor</text>
  <text x="82" y="330" font-size="14" fill="#334155">Verander de kortingendrempel in src/checkout.py</text>

  <line x1="320" y1="350" x2="320" y2="372" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)" />

  <rect x="60" y="380" width="520" height="74" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" />
  <text x="82" y="410" font-size="17" font-weight="700" fill="#9a3412">3. De oproep autoriseren</text>
  <text x="82" y="434" font-size="14" fill="#334155">Argumenten, paden, toestemmingen, budgetten en klassen voor herproberingen valideren</text>

  <line x1="320" y1="454" x2="320" y2="476" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)" />

  <rect x="60" y="484" width="520" height="74" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" />
  <text x="82" y="514" font-size="17" font-weight="700" fill="#1d4ed8">4. Voer uit in de runtime</text>
  <text x="82" y="538" font-size="14" fill="#334155">Voer de wijziging uit in sandbox en geef een gestructureerd resultaat terug</text>

  <line x1="320" y1="558" x2="320" y2="580" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)" />

  <rect x="60" y="588" width="520" height="74" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" />
  <text x="82" y="618" font-size="17" font-weight="700" fill="#166534">5. Verifieer het artefact</text>
  <text x="82" y="642" font-size="14" fill="#334155">Voer de eenheidstest en checkout_discount.spec.ts uit.</text>

  <line x1="320" y1="662" x2="320" y2="684" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)" />

  <rect x="60" y="692" width="520" height="74" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" />
  <text x="82" y="722" font-size="17" font-weight="700" fill="#991b1b">6. Beslissen</text>
  <text x="82" y="746" font-size="14" fill="#334155">Doorgaan, opnieuw proberen, escaleren, of een kandidaat voor acceptatie markeren</text>

  <line x1="320" y1="766" x2="320" y2="788" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)" />

  <rect x="60" y="796" width="520" height="74" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" />
  <text x="82" y="826" font-size="17" font-weight="700" fill="#334155">7. Het bewijs vastleggen</text>
  <text x="82" y="850" font-size="14" fill="#334155">Trace de beslissing, kosten, oorzaak van het falen, artefact en volgende stap</text>

  <line x1="320" y1="870" x2="320" y2="895" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)" />
  <rect x="60" y="905" width="245" height="52" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" />
  <text x="182" y="937" text-anchor="middle" font-size="15" font-weight="700" fill="#166534">Goedgekeurd geverifieerd resultaat accepteren</text>
  <rect x="335" y="905" width="245" height="52" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" />
  <text x="458" y="937" text-anchor="middle" font-size="15" font-weight="700" fill="#1d4ed8">Bewijs terugsturen voor de volgende stap</text>
</svg>
