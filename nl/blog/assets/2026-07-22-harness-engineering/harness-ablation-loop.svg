<svg xmlns="http://www.w3.org/2000/svg" width="640" height="980" viewBox="0 0 640 980" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Een gepaarde ablatie van één harness-component</title>
  <desc id="desc">Een waargenomen mislukking bij het herstarten motiveert een hypothese over de voortgangsoverdracht. Een controlegroep waarbij de overdracht uitgeschakeld is en een behandelingsgroep waarbij deze geactiveerd is, worden uitgevoerd met dezelfde geïnitialiseerde betalingsmigratie checkpoint, dezelfde model, omgeving, beoordelingsmechanisme en totale budget. Door de gecombineerde resultaten te analyseren kan worden bepaald of het component de kosten waard is.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" />
    </marker>
  </defs>
  <rect width="640" height="980" fill="#f8fafc" />
  <rect x="20" y="18" width="600" height="944" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />

  <text x="48" y="62" font-size="25" font-weight="700" fill="#0f172a">Test één component tegelijk</text>
  <text x="48" y="91" font-size="15" fill="#64748b">Een progressieve overdracht moet het werk dat nodig is voor het schrijven en lezen ervan terugverdienen.</text>

  <rect x="60" y="126" width="520" height="76" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" />
  <text x="82" y="156" font-size="14" font-weight="700" fill="#9a3412">Gevonden fout</text>
  <text x="82" y="181" font-size="15" fill="#334155">Herstartte migratieruns herhalen de eerder uitgevoerde acties</text>

  <line x1="320" y1="202" x2="320" y2="228" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="60" y="236" width="520" height="76" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" />
  <text x="82" y="266" font-size="14" font-weight="700" fill="#5b21b6">HYPOTHESE</text>
  <text x="82" y="291" font-size="15" fill="#334155">Een gestructureerde overdracht van voortgang voorkomt herhaald werk</text>

  <line x1="320" y1="312" x2="320" y2="338" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="60" y="346" width="520" height="82" rx="8" fill="#1e293b" stroke="#1e293b" stroke-width="1.5" />
  <text x="320" y="377" text-anchor="middle" font-size="14" font-weight="700" fill="#93c5fd">Gecorrigeerd in beide varianten</text>
  <text x="320" y="403" text-anchor="middle" font-size="14" fill="#ffffff">Model · taken · omgeving · beoordelaar · totaalbudget</text>

  <line x1="320" y1="428" x2="320" y2="454" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="60" y="462" width="520" height="106" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" />
  <text x="82" y="493" font-size="14" font-weight="700" fill="#1d4ed8">BEHEER</text>
  <text x="82" y="523" font-size="19" font-weight="700" fill="#0f172a">progress_handoff = false</text>
  <text x="82" y="548" font-size="14" fill="#334155">Herstel uit gespreks- en werkruimtestatus</text>

  <line x1="320" y1="568" x2="320" y2="594" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="60" y="602" width="520" height="128" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" />
  <text x="82" y="633" font-size="14" font-weight="700" fill="#5b21b6">BEHANDELING: ALLEEN DE OVERDRACCHANGEN</text>
  <text x="82" y="663" font-size="19" font-weight="700" fill="#0f172a">progress_handoff = waar</text>
  <text x="82" y="688" font-size="14" fill="#334155">Herstart van de overdrachts- en werkruimtestatus</text>
  <text x="82" y="711" font-size="14" fill="#334155">Takken, gewijzigde bestanden, laatste controle en volgende stap</text>

  <line x1="320" y1="730" x2="320" y2="756" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="60" y="764" width="520" height="100" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" />
  <text x="320" y="797" text-anchor="middle" font-size="17" font-weight="700" fill="#166534">Gepaarde resultaten vergelijken</text>
  <text x="320" y="825" text-anchor="middle" font-size="14" fill="#334155">Succes · herhaalde acties · ontsnapte defecten</text>
  <text x="320" y="848" text-anchor="middle" font-size="14" fill="#334155">Kosten · tijd voor uitvoering · inspanning voor review</text>

  <rect x="60" y="892" width="520" height="44" rx="8" fill="#1e293b" />
  <text x="320" y="919" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Houd de overdracht alleen bij wanneer de gemeten voordelen de kosten dekken.</text>
</svg>
