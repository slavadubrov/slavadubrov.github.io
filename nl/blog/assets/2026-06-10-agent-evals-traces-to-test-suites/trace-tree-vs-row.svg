<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 560" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrTree" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#555" />
    </marker>
    <filter id="shadowT" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>

  <text x="590" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a2e">LLM-eval vs agent-eval: een rij vs een boom</text>
  <text x="590" y="54" text-anchor="middle" font-size="12" fill="#666">Een LLM-run is één input→output-paar. Een agent-run is een traject waarin elke stap kan falen.</text>

  <!-- ===== Left: LLM eval row ===== -->
  <rect x="40" y="80" width="430" height="430" rx="12" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowT)" />
  <text x="65" y="110" font-size="14" font-weight="700" fill="#1565c0">LLM-evaluatie</text>
  <text x="65" y="128" font-size="10" fill="#1565c0">één rij: beoordeel de output tegen de input</text>

  <rect x="90" y="170" width="330" height="60" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1" />
  <text x="255" y="196" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">Input</text>
  <text x="255" y="214" text-anchor="middle" font-size="10" fill="#555">"Restitueer mijn bestelling A-1002"</text>

  <line x1="255" y1="234" x2="255" y2="280" stroke="#555" stroke-width="1.6" marker-end="url(#arrTree)" />

  <rect x="90" y="285" width="330" height="60" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1" />
  <text x="255" y="311" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">Output</text>
  <text x="255" y="329" text-anchor="middle" font-size="10" fill="#555">"Uw restitutie is verwerkt."</text>

  <line x1="255" y1="349" x2="255" y2="395" stroke="#555" stroke-width="1.6" marker-end="url(#arrTree)" />

  <rect x="90" y="400" width="330" height="70" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.2" />
  <text x="255" y="426" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Beoordeel het paar</text>
  <text x="255" y="446" text-anchor="middle" font-size="10" fill="#555">relevantie · betrouwbaarheid · correctheid</text>
  <text x="255" y="461" text-anchor="middle" font-size="10" fill="#555">één metric, één getal</text>

  <!-- ===== Right: agent trajectory tree ===== -->
  <rect x="510" y="80" width="630" height="430" rx="12" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowT)" />
  <text x="535" y="110" font-size="14" font-weight="700" fill="#6a1b9a">Agent-evaluatie</text>
  <text x="535" y="128" font-size="10" fill="#6a1b9a">een boom: plan, tool-calls, retries — fouten schuilen halverwege het traject</text>

  <!-- root -->
  <rect x="700" y="150" width="250" height="48" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.2" />
  <text x="825" y="170" text-anchor="middle" font-size="11" font-weight="700" fill="#6a1b9a">invoke_agent</text>
  <text x="825" y="186" text-anchor="middle" font-size="9.5" fill="#555">"Restitueer mijn bestelling A-1002"</text>

  <!-- level 1: chat spans -->
  <line x1="760" y1="198" x2="640" y2="240" stroke="#555" stroke-width="1.4" marker-end="url(#arrTree)" />
  <line x1="825" y1="198" x2="825" y2="240" stroke="#555" stroke-width="1.4" marker-end="url(#arrTree)" />
  <line x1="895" y1="198" x2="1010" y2="240" stroke="#555" stroke-width="1.4" marker-end="url(#arrTree)" />

  <rect x="555" y="245" width="170" height="44" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1" />
  <text x="640" y="263" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1565c0">chat (plan)</text>
  <text x="640" y="279" text-anchor="middle" font-size="9.5" fill="#555">besluit bestelling op te zoeken</text>

  <rect x="740" y="245" width="170" height="44" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1" />
  <text x="825" y="263" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1565c0">chat (act)</text>
  <text x="825" y="279" text-anchor="middle" font-size="9.5" fill="#555">slaat verificatiestap over</text>

  <rect x="925" y="245" width="170" height="44" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1" />
  <text x="1010" y="263" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1565c0">chat (answer)</text>
  <text x="1010" y="279" text-anchor="middle" font-size="9.5" fill="#555">"restitutie verwerkt"</text>

  <!-- level 2: tool spans -->
  <line x1="640" y1="289" x2="640" y2="330" stroke="#555" stroke-width="1.4" marker-end="url(#arrTree)" />
  <line x1="825" y1="289" x2="825" y2="330" stroke="#555" stroke-width="1.4" marker-end="url(#arrTree)" />

  <rect x="555" y="335" width="170" height="58" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.2" />
  <text x="640" y="356" text-anchor="middle" font-size="10.5" font-weight="700" fill="#2e7d32">execute_tool</text>
  <text x="640" y="372" text-anchor="middle" font-size="9.5" fill="#555">lookup_order ✓</text>
  <text x="640" y="386" text-anchor="middle" font-size="9.5" fill="#555">afgeleverd, $89</text>

  <rect x="740" y="335" width="170" height="58" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="1.4" />
  <text x="825" y="356" text-anchor="middle" font-size="10.5" font-weight="700" fill="#c62828">execute_tool</text>
  <text x="825" y="372" text-anchor="middle" font-size="9.5" fill="#c62828">issue_refund — slaagt,</text>
  <text x="825" y="386" text-anchor="middle" font-size="9.5" fill="#c62828">maar identiteit nooit geverifieerd</text>

  <!-- missing step ghost -->
  <rect x="925" y="335" width="170" height="58" rx="8" fill="none" stroke="#c62828" stroke-width="1.2" stroke-dasharray="5,4" />
  <text x="1010" y="356" text-anchor="middle" font-size="10.5" font-weight="700" fill="#c62828">verify_identity</text>
  <text x="1010" y="372" text-anchor="middle" font-size="9.5" fill="#c62828">nooit aangeroepen —</text>
  <text x="1010" y="386" text-anchor="middle" font-size="9.5" fill="#c62828">de stille fout</text>

  <!-- verdict band -->
  <rect x="555" y="420" width="540" height="64" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.2" />
  <text x="825" y="444" text-anchor="middle" font-size="11.5" font-weight="700" fill="#e65100">Eindoutput lijkt hoe dan ook perfect</text>
  <text x="825" y="463" text-anchor="middle" font-size="10" fill="#555">"Restitutie verwerkt" is identiek met of zonder identiteitscheck.</text>
  <text x="825" y="477" text-anchor="middle" font-size="10" fill="#555">Alleen evaluatie op trajectniveau kan de twee runs onderscheiden.</text>
</svg>
