<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="Three levels of agent evaluation with their metrics" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Drie niveaus van agent-evaluatie met de bijbehorende metrics</title>
  <defs>
    <marker id="arrLvl" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#334155" />
    </marker>
    <filter id="shadowLvl" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <text y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a" x="590">Drie niveaus van Agent-evaluatie</text>
  <text y="54" text-anchor="middle" font-size="12" fill="#334155" x="590">End-to-end geeft aan WAT er mis is · trajectory geeft aan WAAR · component geeft aan WAAROM</text>

  <!-- Level 1: end-to-end -->
  <rect x="30" y="80" width="1120" height="150" rx="12" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowLvl)" />
  <text y="106" font-size="14" font-weight="700" fill="#166534" x="55">Niveau 1 · Eind-tot-eind (zwarte doos)</text>
  <text y="124" font-size="10" fill="#166534" x="55">Vraag: is de taak succesvol verlopen?</text>

  <rect x="55" y="140" width="340" height="72" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="225">Taakvoltooiing</text>
  <text y="180" text-anchor="middle" font-size="10" fill="#334155" x="225">LLM-geëvalueerde doelalignement, referentievrij</text>
  <text y="195" text-anchor="middle" font-size="10" fill="#334155" x="225">bruikbaar online — geen gouden uitvoer vereist</text>

  <rect x="415" y="140" width="340" height="72" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="585">Resultaat/standclassificatie</text>
  <text y="180" text-anchor="middle" font-size="10" fill="#334155" x="585">de eindtoestand van de omgeving vergelijken met de gewenste toestand</text>
  <text y="195" text-anchor="middle" font-size="10" fill="#334155" x="585">bestand tegen creatieve alternatieve paden (τ-bench)</text>

  <rect x="775" y="140" width="340" height="72" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="945">Betrouwbaarheid: pass^k</text>
  <text y="180" text-anchor="middle" font-size="10" fill="#334155" x="945">alle k of k-pogingen slagen</text>
  <text y="195" text-anchor="middle" font-size="10" fill="#334155" x="945">90% pass@1 ≈ 57% consistentie bij k=8</text>

  <line x1="590" y1="234" x2="590" y2="268" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrLvl)" />
  <text y="256" font-size="10" fill="#64748b" font-style="italic" x="700">De taak is mislukt — maar waar?</text>

  <!-- Level 2: trajectory -->
  <rect x="30" y="275" width="1120" height="150" rx="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowLvl)" />
  <text y="301" font-size="14" font-weight="700" fill="#5b21b6" x="55">Niveau 2 · Traject (glasbox)</text>
  <text y="319" font-size="10" fill="#5b21b6" x="55">Vraag: Was het pad efficiënt en goed presterend?</text>

  <rect x="55" y="335" width="255" height="72" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6" x="182">Correctheid van het hulpmiddel</text>
  <text y="375" text-anchor="middle" font-size="10" fill="#334155" x="182">deterministisch, geen judge nodig</text>
  <text y="390" text-anchor="middle" font-size="10" fill="#334155" x="182">exacte / in-ordelijke / willekeurige overeenkomst</text>

  <rect x="330" y="335" width="255" height="72" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6" x="457">Correctheid van argumenten</text>
  <text y="375" text-anchor="middle" font-size="10" fill="#334155" x="457">juiste tool, verkeerde parameters</text>
  <text y="390" text-anchor="middle" font-size="10" fill="#334155" x="457">% van de correct ingevulde sleutel-waardeparen</text>

  <rect x="605" y="335" width="255" height="72" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6" x="732">Efficiëntie en lussen</text>
  <text y="375" text-anchor="middle" font-size="10" fill="#334155" x="732">redundante aanroepen · padconvergentie</text>
  <text y="390" text-anchor="middle" font-size="10" fill="#334155" x="732">herhaalde identieke oproepen = doodlopende weg</text>

  <rect x="880" y="335" width="235" height="72" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6" x="997">Kwaliteit van het plan / naleving</text>
  <text y="375" text-anchor="middle" font-size="10" fill="#334155" x="997">Goed plan, uitvoering met afwijkingen</text>
  <text y="390" text-anchor="middle" font-size="10" fill="#334155" x="997">fideliteit over meerdere gespreksrondes heen</text>

  <line x1="590" y1="429" x2="590" y2="463" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrLvl)" />
  <text y="451" font-size="10" fill="#64748b" font-style="italic" x="700">De path is gebroken bij stap 3 — maar waarom?</text>

  <!-- Level 3: component -->
  <rect x="30" y="470" width="1120" height="120" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowLvl)" />
  <text y="496" font-size="14" font-weight="700" fill="#9a3412" x="55">Niveau 3 · Component (witte doos)</text>
  <text y="514" font-size="10" fill="#9a3412" x="55">Vraag: welke beslissing, tool, retriever of sub-agent is defect geraakt?</text>

  <rect x="55" y="525" width="340" height="50" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="225">Metingen per span</text>
  <text y="563" text-anchor="middle" font-size="10" fill="#334155" x="225">scores toekennen aan afzonderlijke hulpmiddelen / retrieval spans</text>

  <rect x="415" y="525" width="340" height="50" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="585">Interpretatie van hulpprogramma-uitvoer</text>
  <text y="563" text-anchor="middle" font-size="10" fill="#334155" x="585">geldige reactie, verkeerde lezing — beschadigt onderliggende processen</text>

  <rect x="775" y="525" width="340" height="50" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="945">Fouttoewijzing</text>
  <text y="563" text-anchor="middle" font-size="10" fill="#334155" x="945">Een zichtbare fout bevindt zich meestal verder stroomafwaarts dan de werkelijke bug.</text>
</svg>
