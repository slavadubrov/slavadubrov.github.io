<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrLvl" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#555" />
    </marker>
    <filter id="shadowLvl" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>

  <text x="590" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a2e">Drie niveaus van agendevaluatie</text>
  <text x="590" y="54" text-anchor="middle" font-size="12" fill="#666">End-to-end zegt WAT misging · traject zegt WAAR · component zegt WAAROM</text>

  <!-- Level 1: end-to-end -->
  <rect x="30" y="80" width="1120" height="150" rx="12" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadowLvl)" />
  <text x="55" y="106" font-size="14" font-weight="700" fill="#2e7d32">Niveau 1 · End-to-end (black box)</text>
  <text x="55" y="124" font-size="10" fill="#2e7d32">Vraag: is de taak geslaagd?</text>

  <rect x="55" y="140" width="340" height="72" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="225" y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Taakvoltooiing</text>
  <text x="225" y="180" text-anchor="middle" font-size="10" fill="#555">LLM-beoordeelde doelafstemming, zonder referentie</text>
  <text x="225" y="195" text-anchor="middle" font-size="10" fill="#555">online bruikbaar — geen golden output nodig</text>

  <rect x="415" y="140" width="340" height="72" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="585" y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Uitkomst- / toestandsbeoordeling</text>
  <text x="585" y="180" text-anchor="middle" font-size="10" fill="#555">vergelijk eindtoestand van omgeving met doeltoestand</text>
  <text x="585" y="195" text-anchor="middle" font-size="10" fill="#555">robuust voor creatieve alternatieve paden (τ-bench)</text>

  <rect x="775" y="140" width="340" height="72" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="945" y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Betrouwbaarheid: pass^k</text>
  <text x="945" y="180" text-anchor="middle" font-size="10" fill="#555">alle k van k pogingen slagen</text>
  <text x="945" y="195" text-anchor="middle" font-size="10" fill="#555">90% pass@1 ≈ 57% consistentie bij k=8</text>

  <line x1="590" y1="234" x2="590" y2="268" stroke="#555" stroke-width="1.6" marker-end="url(#arrLvl)" />
  <text x="700" y="256" font-size="10" fill="#888" font-style="italic">taak mislukt — maar waar?</text>

  <!-- Level 2: trajectory -->
  <rect x="30" y="275" width="1120" height="150" rx="12" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowLvl)" />
  <text x="55" y="301" font-size="14" font-weight="700" fill="#6a1b9a">Niveau 2 · Traject (glass box)</text>
  <text x="55" y="319" font-size="10" fill="#6a1b9a">Vraag: was het pad goed en efficiënt?</text>

  <rect x="55" y="335" width="255" height="72" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1" />
  <text x="182" y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#6a1b9a">Tool-correctheid</text>
  <text x="182" y="375" text-anchor="middle" font-size="10" fill="#555">deterministisch, geen beoordelaar nodig</text>
  <text x="182" y="390" text-anchor="middle" font-size="10" fill="#555">exacte / op volgorde / willekeurige volgorde match</text>

  <rect x="330" y="335" width="255" height="72" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1" />
  <text x="457" y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#6a1b9a">Argumentcorrectheid</text>
  <text x="457" y="375" text-anchor="middle" font-size="10" fill="#555">juiste tool, verkeerde parameters</text>
  <text x="457" y="390" text-anchor="middle" font-size="10" fill="#555">% correct ingevulde sleutel-waardeparen</text>

  <rect x="605" y="335" width="255" height="72" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1" />
  <text x="732" y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#6a1b9a">Efficiëntie &amp; lussen</text>
  <text x="732" y="375" text-anchor="middle" font-size="10" fill="#555">overbodige calls · padconvergentie</text>
  <text x="732" y="390" text-anchor="middle" font-size="10" fill="#555">herhaalde identieke calls = dood spoor</text>

  <rect x="880" y="335" width="235" height="72" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1" />
  <text x="997" y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#6a1b9a">Plankwaliteit / naleving</text>
  <text x="997" y="375" text-anchor="middle" font-size="10" fill="#555">goed plan, afdrijvende uitvoering</text>
  <text x="997" y="390" text-anchor="middle" font-size="10" fill="#555">meerbeurtstrouw over beurten heen</text>

  <line x1="590" y1="429" x2="590" y2="463" stroke="#555" stroke-width="1.6" marker-end="url(#arrLvl)" />
  <text x="700" y="451" font-size="10" fill="#888" font-style="italic">pad brak bij stap 3 — maar waarom?</text>

  <!-- Level 3: component -->
  <rect x="30" y="470" width="1120" height="120" rx="12" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowLvl)" />
  <text x="55" y="496" font-size="14" font-weight="700" fill="#e65100">Niveau 3 · Component (white box)</text>
  <text x="55" y="514" font-size="10" fill="#e65100">Vraag: welke beslissing, tool, retriever of sub-agent faalde?</text>

  <rect x="55" y="525" width="340" height="50" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1" />
  <text x="225" y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Per-span-metrics</text>
  <text x="225" y="563" text-anchor="middle" font-size="10" fill="#555">koppel scores aan individuele tool- / retrieval-spans</text>

  <rect x="415" y="525" width="340" height="50" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1" />
  <text x="585" y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Tool-outputinterpretatie</text>
  <text x="585" y="563" text-anchor="middle" font-size="10" fill="#555">geldige respons, verkeerde lezing — corrumpeert downstream</text>

  <rect x="775" y="525" width="340" height="50" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1" />
  <text x="945" y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Fouttoewijzing</text>
  <text x="945" y="563" text-anchor="middle" font-size="10" fill="#555">zichtbare fout zit meestal downstream van de echte bug</text>
</svg>
