<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 520" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="Guardrails versus online evals" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Guardrails versus online evals</title>
  <defs>
    <marker id="arrG" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#334155" />
    </marker>
    <filter id="shadowG" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <text y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a" x="590">Guardrails versus Online Evals: Verschillende taken, verschillende workflows</text>
  <text y="54" text-anchor="middle" font-size="12" fill="#334155" x="590">Guardrails de gebruiker binnen milliseconden beschermen. Evals de kwaliteit asynchroon meten. Meng ze niet door elkaar.</text>

  <!-- request flow spine -->
  <rect x="40" y="100" width="150" height="60" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.3" filter="url(#shadowG)" />
  <text y="126" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a" x="115">Gebruikersverzoek</text>
  <text y="144" text-anchor="middle" font-size="10" fill="#334155" x="115">live verkeer</text>

  <line x1="190" y1="130" x2="255" y2="130" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrG)" />

  <rect x="260" y="100" width="170" height="60" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3" filter="url(#shadowG)" />
  <text y="126" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="345">Agent uitvoeren</text>
  <text y="144" text-anchor="middle" font-size="10" fill="#334155" x="345">plan · hulpmiddelen · antwoord</text>

  <line x1="430" y1="130" x2="495" y2="130" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrG)" />

  <!-- guardrail inline -->
  <rect x="500" y="90" width="220" height="80" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="1.6" filter="url(#shadowG)" />
  <text y="116" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b" x="610">Guardrail (inline)</text>
  <text y="134" text-anchor="middle" font-size="10" fill="#334155" x="610">deterministisch · ~ms · blokkerend</text>
  <text y="150" text-anchor="middle" font-size="10" fill="#334155" x="610">PII · injectie · beleidscontroles</text>

  <line x1="720" y1="130" x2="785" y2="130" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrG)" />

  <rect x="790" y="100" width="150" height="60" rx="10" fill="#f0fdf4" stroke="#166534" stroke-width="1.3" filter="url(#shadowG)" />
  <text y="126" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="865">Antwoord</text>
  <text y="144" text-anchor="middle" font-size="10" fill="#334155" x="865">de gebruiker ziet het nu</text>

  <!-- async branch -->
  <path d="M 345 160 L 345 250" fill="none" stroke="#7c3aed" stroke-width="1.8" stroke-dasharray="6,4" marker-end="url(#arrG)" />
  <text y="215" font-size="10" font-style="italic" fill="#5b21b6" x="360">traces, gestreamde asynchrone verwerking</text>

  <rect x="190" y="255" width="310" height="90" rx="10" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.6" filter="url(#shadowG)" />
  <text y="283" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6" x="345">Online eval (asynchrone)</text>
  <text y="302" text-anchor="middle" font-size="10" fill="#334155" x="345">LLM-als-judge · referentieloos · seconden-naar-minuten</text>
  <text y="318" text-anchor="middle" font-size="10" fill="#334155" x="345">blokkeert nooit de respons</text>
  <text y="334" text-anchor="middle" font-size="10" fill="#334155" x="345">samplefrequentie afgestemd op kosten</text>

  <line x1="500" y1="300" x2="565" y2="300" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrG)" />

  <rect x="570" y="255" width="280" height="90" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="1.6" filter="url(#shadowG)" />
  <text y="283" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="710">Dashboards en alarmering</text>
  <text y="302" text-anchor="middle" font-size="10" fill="#334155" x="710">scoreverdelingen, betrouwbaarheidsintervallen</text>
  <text y="318" text-anchor="middle" font-size="10" fill="#334155" x="710">waarschuwing wanneer de ondergrens</text>
  <text y="334" text-anchor="middle" font-size="10" fill="#334155" x="710">de drempel overschrijdt</text>

  <line x1="850" y1="300" x2="915" y2="300" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrG)" />

  <rect x="920" y="255" width="220" height="90" rx="10" fill="#f0fdf4" stroke="#166534" stroke-width="1.6" filter="url(#shadowG)" />
  <text y="283" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="1030">Naar de vlieswiel</text>
  <text y="302" text-anchor="middle" font-size="10" fill="#334155" x="1030">gemarkeerde traces worden</text>
  <text y="318" text-anchor="middle" font-size="10" fill="#334155" x="1030">geëtiketteerde goldenes in de</text>
  <text y="334" text-anchor="middle" font-size="10" fill="#334155" x="1030">volgende regressie dataset</text>

  <!-- comparison table -->
  <rect x="40" y="385" width="1100" height="115" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2" filter="url(#shadowG)" />
  <line x1="395" y1="395" x2="395" y2="490" stroke="#cbd5e1" stroke-width="1" />
  <line x1="760" y1="395" x2="760" y2="490" stroke="#cbd5e1" stroke-width="1" />

  <text y="413" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a" x="217">Dimensie</text>
  <text y="413" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b" x="577">Guardrails</text>
  <text y="413" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6" x="950">Online evals</text>

  <text y="437" font-size="10.5" fill="#334155" x="60">Wanneer de latency budget is bereikt</text>
  <text y="437" font-size="10.5" fill="#334155" x="410">in het verzoekspad · milliseconden</text>
  <text y="437" font-size="10.5" fill="#334155" x="775">na de reactie · seconden naar minuten</text>

  <text y="457" font-size="10.5" fill="#334155" x="60">Mechanisme · effect</text>
  <text y="457" font-size="10.5" fill="#334155" x="410">deterministische regels · blokkeren / verwijderen / opnieuw genereren</text>
  <text y="457" font-size="10.5" fill="#334155" x="775">LLM-as-judge + heuristieken · meten, nooit blokkeren</text>

  <text y="477" font-size="10.5" fill="#334155" x="60">Een valse positieve is…</text>
  <text y="477" font-size="10.5" fill="#334155" x="410">een productief bug — geversioneerd, geregistreerd en in de gaten gehouden</text>
  <text y="477" font-size="10.5" fill="#334155" x="775">ruis in een dashboard — de parameters afstemmen</text>
</svg>
