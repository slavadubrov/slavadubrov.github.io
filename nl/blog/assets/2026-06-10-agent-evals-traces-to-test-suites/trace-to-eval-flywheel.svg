<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 640" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrFly" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2980b9" />
    </marker>
    <marker id="arrFlyBack" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#27ae60" />
    </marker>
    <filter id="shadowFly" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-opacity="0.14" />
    </filter>
  </defs>

  <text x="590" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">Het Trace-to-Eval-vliegwiel</text>
  <text x="590" y="57" text-anchor="middle" font-size="12" fill="#666">Elke gediagnosticeerde productiefout wordt een trace, een label, een datasetrij en een scorer die CI blokkeert</text>

  <!-- Stage 1: Production agent -->
  <rect x="40" y="110" width="200" height="110" rx="12" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.6" filter="url(#shadowFly)" />
  <text x="140" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">1 · Productie-agent</text>
  <text x="140" y="164" text-anchor="middle" font-size="10" fill="#555">geïnstrumenteerd met OTel</text>
  <text x="140" y="179" text-anchor="middle" font-size="10" fill="#555">GenAI semconv spans:</text>
  <text x="140" y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#555">invoke_agent → chat → execute_tool</text>

  <line x1="240" y1="165" x2="295" y2="165" stroke="#2980b9" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 2: Trace store -->
  <rect x="300" y="110" width="200" height="110" rx="12" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.6" filter="url(#shadowFly)" />
  <text x="400" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">2 · Trace-opslag</text>
  <text x="400" y="164" text-anchor="middle" font-size="10" fill="#555">Langfuse / Phoenix /</text>
  <text x="400" y="179" text-anchor="middle" font-size="10" fill="#555">LangSmith / Braintrust</text>
  <text x="400" y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#555">(of een JSONL-bestand om te starten)</text>

  <line x1="500" y1="165" x2="555" y2="165" stroke="#2980b9" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 3: Mine failures -->
  <rect x="560" y="110" width="200" height="110" rx="12" fill="#fce4ec" stroke="#c62828" stroke-width="1.6" filter="url(#shadowFly)" />
  <text x="660" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#c62828">3 · Fouten delven</text>
  <text x="660" y="164" text-anchor="middle" font-size="10" fill="#555">lage scores · gebruikersklachten</text>
  <text x="660" y="179" text-anchor="middle" font-size="10" fill="#555">deterministische regels · juryleden</text>
  <text x="660" y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#555">open coderen: lees 30–50 traces</text>

  <line x1="760" y1="165" x2="815" y2="165" stroke="#2980b9" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 4: Cluster + label -->
  <rect x="820" y="110" width="200" height="110" rx="12" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.6" filter="url(#shadowFly)" />
  <text x="920" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#6a1b9a">4 · Clusteren + labelen</text>
  <text x="920" y="164" text-anchor="middle" font-size="10" fill="#555">axiaal coderen in 5–6 benoemde,</text>
  <text x="920" y="179" text-anchor="middle" font-size="10" fill="#555">specifieke foutmodi</text>
  <text x="920" y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#555">"datumnotatiefout", niet "temporele issues"</text>

  <line x1="920" y1="220" x2="920" y2="285" stroke="#2980b9" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 5: Dedupe / goldens -->
  <rect x="820" y="290" width="200" height="110" rx="12" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.6" filter="url(#shadowFly)" />
  <text x="920" y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#6a1b9a">5 · Dedupe</text>
  <text x="920" y="344" text-anchor="middle" font-size="10" fill="#555">één representatieve golden</text>
  <text x="920" y="359" text-anchor="middle" font-size="10" fill="#555">per cluster, span-ID's bewaard</text>
  <text x="920" y="376" text-anchor="middle" font-size="10" font-style="italic" fill="#555">in metadata voor traceerbaarheid</text>

  <line x1="820" y1="345" x2="765" y2="345" stroke="#2980b9" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 6: Versioned dataset -->
  <rect x="560" y="290" width="200" height="110" rx="12" fill="#fff3e0" stroke="#e65100" stroke-width="1.6" filter="url(#shadowFly)" />
  <text x="660" y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#e65100">6 · Geversioneerde dataset</text>
  <text x="660" y="344" text-anchor="middle" font-size="10" fill="#555">goldens-v1.json · v2 · v3 …</text>
  <text x="660" y="359" text-anchor="middle" font-size="10" fill="#555">verwachte tools + criteria</text>
  <text x="660" y="376" text-anchor="middle" font-size="10" font-style="italic" fill="#555">vastgezet voor reproduceerbare runs</text>

  <line x1="560" y1="345" x2="505" y2="345" stroke="#2980b9" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 7: CI gate -->
  <rect x="300" y="290" width="200" height="110" rx="12" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.6" filter="url(#shadowFly)" />
  <text x="400" y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#2e7d32">7 · CI-gate</text>
  <text x="400" y="344" text-anchor="middle" font-size="10" fill="#555">deepeval testrun op elke PR</text>
  <text x="400" y="359" text-anchor="middle" font-size="10" fill="#555">falende metric → falende build</text>
  <text x="400" y="376" text-anchor="middle" font-size="10" font-style="italic" fill="#555">regressies geblokkeerd vóór deploy</text>

  <!-- feedback arrow back to production -->
  <path d="M 300 345 L 140 345 L 140 225" fill="none" stroke="#27ae60" stroke-width="2.2" marker-end="url(#arrFlyBack)" />
  <text x="148" y="290" font-size="10.5" font-weight="700" fill="#27ae60">fix wordt veilig uitgerold;</text>
  <text x="148" y="305" font-size="10.5" font-weight="700" fill="#27ae60">nieuw verkeer voedt</text>
  <text x="148" y="320" font-size="10.5" font-weight="700" fill="#27ae60">de volgende cyclus</text>

  <!-- Online lane note -->
  <rect x="40" y="450" width="1100" height="150" rx="12" fill="#f8f9fa" stroke="#9b59b6" stroke-width="1.4" filter="url(#shadowFly)" />
  <text x="65" y="480" font-size="13" font-weight="700" fill="#6a1b9a">Loopt parallel aan de lus: online evals</text>
  <text x="65" y="503" font-size="11" fill="#555">• Sample live verkeer, score async met referenceless metrics (taakvoltooiing, aangepaste judges) — nul extra latentie</text>
  <text x="65" y="524" font-size="11" fill="#555">• Waarschuw wanneer de ondergrens van de score-zekerheid een drempel kruist — nieuwe foutpatronen komen in fase 3 het vliegwiel in</text>
  <text x="65" y="545" font-size="11" fill="#555">• Houd guardrails apart: inline, deterministisch, blokkerend (ms) — evals meten, guardrails beschermen</text>
  <text x="65" y="578" font-size="10.5" font-style="italic" fill="#888">De winst: productiefouten worden binnen dagen regressietests, en modelupgrades worden in dagen gevalideerd, niet weken.</text>
</svg>
