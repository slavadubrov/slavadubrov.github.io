<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 640" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="The trace-to-eval flywheel" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">de trace-naar-eval vliegwiel</title>
  <defs>
    <marker id="arrFly" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2563eb" />
    </marker>
    <marker id="arrFlyBack" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#16a34a" />
    </marker>
    <filter id="shadowFly" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <text y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a" x="590">De Trace-naar-Eval Flywheel</text>
  <text y="57" text-anchor="middle" font-size="12" fill="#334155" x="590">Elke gediagnosticeerde productiefout wordt een trace, een label, een dataset-rij, en een scorer die de CI-pipeline controleert</text>

  <!-- Stage 1: Production agent -->
  <rect x="40" y="110" width="200" height="110" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.6" filter="url(#shadowFly)" />
  <text y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8" x="140">1 · Productie agent</text>
  <text y="164" text-anchor="middle" font-size="10" fill="#334155" x="140">uitgerust met OTel</text>
  <text y="179" text-anchor="middle" font-size="10" fill="#334155" x="140">GenAI semconv spans:</text>
  <text y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="140">agent oproepen → chatten → tool uitvoeren</text>

  <line x1="240" y1="165" x2="295" y2="165" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 2: Trace store -->
  <rect x="300" y="110" width="200" height="110" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.6" filter="url(#shadowFly)" />
  <text y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8" x="400">2 · Trace opslag</text>
  <text y="164" text-anchor="middle" font-size="10" fill="#334155" x="400">Langfuse / Phoenix /</text>
  <text y="179" text-anchor="middle" font-size="10" fill="#334155" x="400">LangSmith / Braintrust</text>
  <text y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="400">(of een JSONL-bestand om te beginnen)</text>

  <line x1="500" y1="165" x2="555" y2="165" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 3: Mine failures -->
  <rect x="560" y="110" width="200" height="110" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="1.6" filter="url(#shadowFly)" />
  <text y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b" x="660">3 · Mijnfalen</text>
  <text y="164" text-anchor="middle" font-size="10" fill="#334155" x="660">lage scores · klachten van gebruikers</text>
  <text y="179" text-anchor="middle" font-size="10" fill="#334155" x="660">deterministische regels · judges</text>
  <text y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="660">open coding: lees 30–50 traces</text>

  <line x1="760" y1="165" x2="815" y2="165" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 4: Cluster + label -->
  <rect x="820" y="110" width="200" height="110" rx="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.6" filter="url(#shadowFly)" />
  <text y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6" x="920">4 · Cluster + label</text>
  <text y="164" text-anchor="middle" font-size="10" fill="#334155" x="920">axiale codering naar 5–6 genoemde elementen,</text>
  <text y="179" text-anchor="middle" font-size="10" fill="#334155" x="920">specifieke foutmodi</text>
  <text y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="920">"fout bij het formateren van data", en niet "tijdsgerelateerde problemen"</text>

  <line x1="920" y1="220" x2="920" y2="285" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 5: Dedupe / goldens -->
  <rect x="820" y="290" width="200" height="110" rx="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.6" filter="url(#shadowFly)" />
  <text y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6" x="920">5 · Dubbelingen verwijderen</text>
  <text y="344" text-anchor="middle" font-size="10" fill="#334155" x="920">eén representatief gouden</text>
  <text y="359" text-anchor="middle" font-size="10" fill="#334155" x="920">per cluster, span ID's behouden</text>
  <text y="376" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="920">in metadata voor traceerbaarheid</text>

  <line x1="820" y1="345" x2="765" y2="345" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 6: Versioned dataset -->
  <rect x="560" y="290" width="200" height="110" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="1.6" filter="url(#shadowFly)" />
  <text y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412" x="660">6 · Geversioneerd dataset</text>
  <text y="344" text-anchor="middle" font-size="10" fill="#334155" x="660">goldens-v1.json · v2 · v3 …</text>
  <text y="359" text-anchor="middle" font-size="10" fill="#334155" x="660">verwachte hulpmiddelen en criteria</text>
  <text y="376" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="660">verankerd voor reproduceerbare uitvoeringen</text>

  <line x1="560" y1="345" x2="505" y2="345" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 7: CI gate -->
  <rect x="300" y="290" width="200" height="110" rx="12" fill="#f0fdf4" stroke="#166534" stroke-width="1.6" filter="url(#shadowFly)" />
  <text y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#166534" x="400">7 · CI-poort</text>
  <text y="344" text-anchor="middle" font-size="10" fill="#334155" x="400">deepeval-testrun bij elke PR</text>
  <text y="359" text-anchor="middle" font-size="10" fill="#334155" x="400">foutieve metriek → mislukte build</text>
  <text y="376" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="400">regressies geblokkeerd vóór implementatie</text>

  <!-- feedback arrow back to production -->
  <path d="M 300 345 L 140 345 L 140 225" fill="none" stroke="#16a34a" stroke-width="2.2" marker-end="url(#arrFlyBack)" />
  <text y="290" font-size="10.5" font-weight="700" fill="#166534" x="148">schepen veilig repareren;</text>
  <text y="305" font-size="10.5" font-weight="700" fill="#166534" x="148">nieuwe verkeersbronnen</text>
  <text y="320" font-size="10.5" font-weight="700" fill="#166534" x="148">de volgende cyclus</text>

  <!-- Online lane note -->
  <rect x="40" y="450" width="1100" height="150" rx="12" fill="#ffffff" stroke="#7c3aed" stroke-width="1.4" filter="url(#shadowFly)" />
  <text y="480" font-size="13" font-weight="700" fill="#5b21b6" x="65">In parallel met de lus: online evals</text>
  <text y="503" font-size="11" fill="#334155" x="65">• Voorbeeld van live verkeer; beoordeling op afstand met metrics zonder referentiepunt (voltooiing taak, aangepaste judges) — geen extra latency toegevoegd</text>
  <text y="524" font-size="11" fill="#334155" x="65">• Alarm wanneer de onderste confidentiegrens van de score een drempel overschrijdt — nieuwe foutpatronen komen in fase 3 in de flywheel terecht</text>
  <text y="545" font-size="11" fill="#334155" x="65">• Houd guardrails gescheiden: inline, deterministisch, blokkerend (ms) — meting van evals, bescherming door guardrails</text>
  <text y="578" font-size="10.5" font-style="italic" fill="#64748b" x="65">Het voordeel: productiefouten worden binnen dagen omgezet in regressietests, en model-upgrades worden binnen dagen, en niet weken, gevalideerd.</text>
</svg>
