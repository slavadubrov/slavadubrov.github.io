<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" role="img" aria-label="Data Pipeline" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title>Fine-tuning voorbereiding van gegevens pipeline</title>
  <desc>Ruwe voorbeelden gaan eerst door filtering, beheersmaatregelen voor gevoelige gegevens, deduplicatie, optionele verrijking en formatering, voordat er een versiegebonden trainingsset wordt gegenereerd.</desc>
  <defs>
    <linearGradient id="dataGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#16a34a" />
      <stop offset="100%" stop-color="#166534" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="900" height="480" fill="#f8fafc" />

  <!-- Title -->
  <text x="450" y="35" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" text-anchor="middle" fill="#1d4ed8">Gegevensvoorbereiding Pipeline</text>

  <!-- Raw Data -->
  <g transform="translate(40, 70)">
    <rect width="120" height="55" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" />
    <text x="60" y="28" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#334155">Ruwe gegevens</text>
    <text x="60" y="44" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="#334155">Niet-geverifieerd corpus</text>
  </g>

  <path d="M 160 97 L 190 97" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <!-- Stage 1: Ingestion -->
  <g transform="translate(200, 70)">
    <rect width="130" height="55" rx="6" fill="url(#dataGrad)" />
    <text x="65" y="24" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ffffff">1. Ingestie</text>
    <text x="65" y="40" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)">Verwijder afwijzingen.</text>
    <text x="65" y="50" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)">verkeerd UTF-8</text>
  </g>
  <text x="265" y="140" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="#166534" font-style="italic">Filtering + FastText</text>

  <path d="M 330 97 L 360 97" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <!-- Stage 2: PII -->
  <g transform="translate(370, 70)">
    <rect width="130" height="55" rx="6" fill="url(#dataGrad)" />
    <text x="65" y="24" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ffffff">2. PII verwijdering</text>
    <text x="65" y="40" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)">e-mails en IP-adressen bewerken,</text>
    <text x="65" y="50" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)">telefoonnummers</text>
  </g>
  <text x="435" y="140" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="#166534" font-style="italic">Microsoft Presidio</text>

  <path d="M 500 97 L 530 97" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <!-- Stage 3: Dedup -->
  <g transform="translate(540, 70)">
    <rect width="130" height="55" rx="6" fill="url(#dataGrad)" />
    <text x="65" y="24" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ffffff">3. Dubbeling wegnemen</text>
    <text x="65" y="40" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)">MinHash LSH voor</text>
    <text x="65" y="50" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)">dubbelingen verwijderen</text>
  </g>
  <text x="605" y="140" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="#166534" font-style="italic">DataTrove</text>

  <path d="M 670 97 L 700 97" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <!-- Stage 4: Augmentation -->
  <g transform="translate(710, 70)">
    <rect width="130" height="55" rx="6" fill="url(#dataGrad)" />
    <text x="65" y="24" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ffffff">4. Versterking</text>
    <text x="65" y="40" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)">Coach model</text>
    <text x="65" y="50" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)">gegevens herschrijven</text>
  </g>
  <text x="775" y="140" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="#166534" font-style="italic">Distilabel</text>

  <!-- Arrow down and left -->
  <path d="M 775 125 L 775 170 L 545 170" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <!-- Stage 5: Formatting -->
  <g transform="translate(370, 155)">
    <rect width="165" height="55" rx="6" fill="url(#dataGrad)" />
    <text x="82" y="24" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ffffff">5. Formatering</text>
    <text x="82" y="40" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)">Converteren naar Alpaca / ShareGPT</text>
    <text x="82" y="50" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)">JSONL-formaat</text>
  </g>

  <path d="M 370 182 L 220 182" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <!-- Clean Dataset -->
  <g transform="translate(80, 155)">
    <rect width="130" height="55" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" />
    <text x="65" y="28" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#166534">Schoonmaken van Dataset</text>
    <text x="65" y="44" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="#166534">Klaar voor fine-tuning</text>
  </g>

  <!-- Key Principles Box -->
  <rect x="40" y="250" width="820" height="200" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" />
  <text x="60" y="280" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#166534">Belangrijkste principes</text>

  <circle cx="60" cy="310" r="4" fill="#16a34a" />
  <text x="75" y="314" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1d4ed8">Kwaliteit boven kwantiteit:</text>
  <text x="210" y="314" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#334155">Voeg dekking toe voor verschillende foutmodi voordat je eenvoudige voorbeelden herhaalt</text>

  <circle cx="60" cy="345" r="4" fill="#16a34a" />
  <text x="75" y="349" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1d4ed8">Reinheid:</text>
  <text x="155" y="349" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#334155">Onbelangrijke informatie verwijderen, de tekst normaliseren en een consistente opmaak garanderen</text>

  <circle cx="60" cy="380" r="4" fill="#16a34a" />
  <text x="75" y="384" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1d4ed8">Evenwicht:</text>
  <text x="135" y="384" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#334155">Zorg voor representatieve weergave over verschillende onderwerpen om vooringenomenheid te voorkomen</text>

  <circle cx="60" cy="415" r="4" fill="#dc2626" />
  <text x="75" y="419" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#991b1b">Gegevensbeheer:</text>
  <text x="180" y="419" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#334155">Tracéer de oorsprong, toestemmingen, bewaartermijnen, transformaties en verwijderingspaden</text>
</svg>
