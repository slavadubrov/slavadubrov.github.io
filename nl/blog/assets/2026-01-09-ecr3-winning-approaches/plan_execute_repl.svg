<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" role="img" aria-label="Plan-Execute REPL Architecture" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title>REPL-architectuur voor planning en uitvoering</title>
  <desc>Een planner definieert getypeerde stappen, een code model genereert een script, een executor voert dit uit, en een beslissing model zorgt ervoor dat het proces doorgaat, wordt afgebroken of opnieuw gepland.</desc>
  <defs>
    <linearGradient id="bgGrad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #334155;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="planGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="codeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="runGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #166534;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="decideGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #ea580c;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #ea580c;stop-opacity:1" />
    </linearGradient>
    <filter id="glow5" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <marker id="arrow5" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
    <marker id="arrowLoop" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="900" height="380" fill="#0f172a" rx="16" />

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600">Plan-Execute REPL-architectuur</text>

  <!-- Step 1: Planner -->
  <rect x="50" y="100" width="160" height="130" rx="12" fill="url(#planGrad)" />
  <text x="130" y="130" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">Planner</text>
  <line x1="70" y1="145" x2="190" y2="145" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
  <text x="130" y="168" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11">Een hooglevel stap creëren</text>
  <text x="130" y="186" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11">Doelstellingen definiëren</text>
  <text x="130" y="210" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="Inter, system-ui, sans-serif" font-size="10" font-style="italic">gpt-5.1</text>

  <!-- Step 2: Code Generator -->
  <rect x="260" y="100" width="160" height="130" rx="12" fill="url(#codeGrad)" />
  <text x="340" y="130" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">Codegenerator</text>
  <line x1="280" y1="145" x2="400" y2="145" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
  <text x="340" y="168" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11">Een Python-script schrijven</text>
  <text x="340" y="186" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11">API aanroepen en logica</text>
  <text x="340" y="210" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="Inter, system-ui, sans-serif" font-size="10" font-style="italic">deepseek-v3.2</text>

  <!-- Step 3: Executor -->
  <rect x="470" y="100" width="160" height="130" rx="12" fill="url(#runGrad)" />
  <text x="550" y="130" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">Executor</text>
  <line x1="490" y1="145" x2="610" y2="145" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
  <text x="550" y="168" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11">Uitvoeren in de REPL-task</text>
  <text x="550" y="186" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11">Resultaten opslaan</text>
  <text x="550" y="210" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="Inter, system-ui, sans-serif" font-size="10" font-style="italic">Python runtime</text>

  <!-- Step 4: Decision -->
  <rect x="680" y="100" width="170" height="130" rx="12" fill="url(#decideGrad)" />
  <text x="765" y="130" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">Beslissing Model</text>
  <line x1="700" y1="145" x2="830" y2="145" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
  <text x="765" y="168" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11">Resultaat analyseren</text>
  <text x="765" y="186" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11">Doorgaan / Afbreken / Opnieuw plannen</text>
  <text x="765" y="210" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="Inter, system-ui, sans-serif" font-size="10" font-style="italic">gpt-4.1</text>

  <!-- Forward arrows -->
  <line x1="210" y1="165" x2="255" y2="165" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow5)" />
  <line x1="420" y1="165" x2="465" y2="165" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow5)" />
  <line x1="630" y1="165" x2="675" y2="165" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow5)" />

  <!-- REPL loop arrow -->
  <path d="M 765 230 L 765 290 L 130 290 L 130 235" stroke="#ea580c" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowLoop)" />
  <text x="450" y="310" text-anchor="middle" fill="#fdba74" font-family="Inter, system-ui, sans-serif" font-size="11">Herplannen bij fout</text>

  <!-- Stage Labels -->
  <text x="130" y="255" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500">Stap 1</text>
  <text x="340" y="255" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500">Stap 2</text>
  <text x="550" y="255" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500">Stap 3</text>
  <text x="765" y="255" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500">Stap 4</text>

  <!-- Bottom note -->
  <rect x="250" y="330" width="400" height="35" rx="8" fill="rgba(245, 158, 11, 0.15)" stroke="#ea580c" stroke-width="1" />
  <text x="450" y="352" text-anchor="middle" fill="#fdba74" font-family="Inter, system-ui, sans-serif" font-size="12">Verschillende models voor verschillende functionaliteiten</text>
</svg>
