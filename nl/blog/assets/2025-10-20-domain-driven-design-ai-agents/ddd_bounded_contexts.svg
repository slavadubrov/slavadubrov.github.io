<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Opdrachtprocessing</title>
  <desc id="artifact-desc">Opdrachtprocessing.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#334155" flood-opacity="0.08" />
    </filter>
    <linearGradient id="grad-order" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #93c5fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #93c5fd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-billing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #86efac;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #86efac;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-inventory" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #fdba74;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #fdba74;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-translation" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #e2e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #e2e8f0;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>





  <rect width="100%" height="100%" fill="#f8fafc" /><g transform="translate(50, 50)" filter="url(#shadow)">
    <rect width="220" height="160" rx="12" fill="url(#grad-order)" stroke="#2563eb" stroke-width="2" />
    <text y="30" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="bold" fill="#1d4ed8" text-anchor="middle" x="110">Opdrachtprocessing</text>
    <line x1="20" y1="45" x2="200" y2="45" stroke="#2563eb" stroke-width="1" />

    <rect x="35" y="65" width="150" height="70" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
    <text y="90" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="bold" fill="#2563eb" text-anchor="middle" x="110">Product</text>
    <text y="115" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#334155" text-anchor="middle" x="110">= Bestelartikel</text>
    <text y="130" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#334155" text-anchor="middle" x="110">(aantal, leveringsdatum)</text>
  </g>


  <g transform="translate(340, 250)" filter="url(#shadow)">
    <rect width="220" height="160" rx="12" fill="url(#grad-billing)" stroke="#16a34a" stroke-width="2" />
    <text y="30" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="bold" fill="#166534" text-anchor="middle" x="110">Facturatie</text>
    <line x1="20" y1="45" x2="200" y2="45" stroke="#16a34a" stroke-width="1" />

    <rect x="35" y="65" width="150" height="70" rx="6" fill="#ffffff" stroke="#16a34a" stroke-width="1" />
    <text y="90" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="bold" fill="#166534" text-anchor="middle" x="110">Product</text>
    <text y="115" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#334155" text-anchor="middle" x="110">Prijsentiteit</text>
    <text y="130" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#334155" text-anchor="middle" x="110">(belastingtarief, kosten, korting)</text>
  </g>


  <g transform="translate(630, 50)" filter="url(#shadow)">
    <rect width="220" height="160" rx="12" fill="url(#grad-inventory)" stroke="#ea580c" stroke-width="2" />
    <text y="30" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="bold" fill="#9a3412" text-anchor="middle" x="110">Forraad</text>
    <line x1="20" y1="45" x2="200" y2="45" stroke="#ea580c" stroke-width="1" />

    <rect x="35" y="65" width="150" height="70" rx="6" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
    <text y="90" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="bold" fill="#ea580c" text-anchor="middle" x="110">Product</text>
    <text y="115" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#334155" text-anchor="middle" x="110">= Voorraadartikel</text>
    <text y="130" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#334155" text-anchor="middle" x="110">(SKU, opslaglocatie)</text>
  </g>


  <g transform="translate(340, 100)" filter="url(#shadow)">
    <rect width="220" height="80" rx="8" fill="url(#grad-translation)" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5,5" />
    <text y="35" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#334155" text-anchor="middle" x="110">Vertaallayer</text>
    <text y="55" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#334155" text-anchor="middle" x="110">ID’s koppelen tussen verschillende contexten</text>
  </g>



  <path d="M 270 130 L 330 130" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)" />

  <path d="M 630 130 L 570 130" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)" />

  <path d="M 450 250 L 450 190" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)" />

</svg>
