<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">het product dat op verschillende manieren wordt gemodelleerd in beperkte contexten</title>
  <desc id="desc">Orderbeheer, facturatie en voorraadbeheer definiëren elk het product volgens hun eigen regels. Een gepubliceerd vertaalcriteriummap koppelt termen en identificatoren tussen deze systemen.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="470" rx="22" fill="#0f172a" />
  <text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Eén woord, drie gedefinieerde betekenissen</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(35 105)"><rect width="270" height="220" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="135" y="42" text-anchor="middle" font-size="18" font-weight="700" fill="#93c5fd">Opdrachtprocessing</text><text x="135" y="90" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Product = bestelregel</text><text x="35" y="130" font-size="13" fill="#cbd5e1">hoeveelheid</text><text x="35" y="158" font-size="13" fill="#cbd5e1">leveringstermijn</text><text x="35" y="186" font-size="13" fill="#cbd5e1">afhandelingsstatus</text></g>
    <g transform="translate(365 105)"><rect width="270" height="220" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="135" y="42" text-anchor="middle" font-size="18" font-weight="700" fill="#93c5fd">Facturatie</text><text x="135" y="90" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Product = geprijsde lijn</text><text x="35" y="130" font-size="13" fill="#cbd5e1">belastingcategorie</text><text x="35" y="158" font-size="13" fill="#cbd5e1">voorziening van korting</text><text x="35" y="186" font-size="13" fill="#cbd5e1">afrekenbedrag</text></g>
    <g transform="translate(695 105)"><rect width="270" height="220" rx="16" fill="#9a3412" stroke="#ea580c" stroke-width="2" /><text x="135" y="42" text-anchor="middle" font-size="18" font-weight="700" fill="#fdba74">Inventaris</text><text x="135" y="90" text-anchor="middle" font-size="16" font-weight="700" fill="#fdba74">Product = voorraadartikel</text><text x="35" y="130" font-size="13" fill="#cbd5e1">SKU</text><text x="35" y="158" font-size="13" fill="#cbd5e1">opslaglocatie</text><text x="35" y="186" font-size="13" fill="#cbd5e1">beschikbare hoeveelheid</text></g>
    <rect x="180" y="370" width="640" height="60" rx="12" fill="#5b21b6" stroke="#2563eb" />
    <text x="500" y="395" text-anchor="middle" font-size="15" font-weight="700" fill="#c4b5fd">Gepubliceerd vertaalcontract</text>
    <text x="500" y="418" text-anchor="middle" font-size="12" fill="#93c5fd">Maakt identificatoren en termen zichtbaar zonder het gebruik van één gemeenschappelijk Product-object af te dwingen</text>
  </g>
</svg>
