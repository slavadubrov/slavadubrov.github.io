<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Gedeelde geheugenbudget voor diffusie op Apple Silicon</title>
  <desc id="desc">Een enkele balk met gedeelde geheugenruimte wordt verdeeld tussen macOS en applicaties, model-componenten, activations en het werkgebied, besturingselementen models en adapters, evenals de overgebleven beschikbare ruimte. De Workflow-instellingen onder de balk wijzigen deze verdelingen.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="560" rx="28" fill="#0f172a" />
  <text x="600" y="66" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Unified memory is gedeelde geheugencapaciteit</text>
  <text x="600" y="102" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="17">Elke toewijzing concurreert met het besturingssysteem en de rest van de workflow</text>

  <g transform="translate(70 170)" font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <path d="M20 0 H1040" stroke="#334155" stroke-width="5" />
    <rect x="0" width="245" height="154" rx="20" fill="#1d4ed8" />
    <text x="122" y="58" fill="#93c5fd" font-size="19" font-weight="700">macOS en apps</text>
    <text x="122" y="92" fill="#93c5fd" font-size="14">wijzigingen tijdens gebruik</text>
    <rect x="235" width="285" height="154" fill="#5b21b6" />
    <text x="377" y="58" fill="#93c5fd" font-size="19" font-weight="700">Model componenten</text>
    <text x="377" y="92" fill="#c4b5fd" font-size="14">weights + encoder + VAE</text>
    <rect x="520" width="230" height="154" fill="#9a3412" />
    <text x="635" y="58" fill="#fdba74" font-size="19" font-weight="700">Activations</text>
    <text x="635" y="92" fill="#fdba74" font-size="14">attention + werkruimte</text>
    <rect x="750" width="175" height="154" fill="#1d4ed8" />
    <text x="837" y="50" fill="#93c5fd" font-size="18" font-weight="700">Adapters +</text>
    <text x="837" y="76" fill="#93c5fd" font-size="18" font-weight="700">controle-elementen</text>
    <text x="837" y="108" fill="#93c5fd" font-size="14">optionele belasting</text>
    <rect x="925" width="135" height="154" rx="20" fill="#166534" />
    <text x="992" y="59" fill="#93c5fd" font-size="18" font-weight="700">Headroom</text>
    <text x="992" y="92" fill="#93c5fd" font-size="14">vermijd swappen</text>
  </g>

  <text x="600" y="388" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700">De toewijzing beweegt zich samen met de workflow</text>
  <g font-family="Inter, system-ui, sans-serif" font-size="16" text-anchor="middle">
    <rect x="115" y="420" width="180" height="66" rx="14" fill="#1e293b" /><text x="205" y="460" fill="#cbd5e1">resolutie</text>
    <rect x="315" y="420" width="180" height="66" rx="14" fill="#1e293b" /><text x="405" y="460" fill="#cbd5e1">batchgrootte</text>
    <rect x="515" y="420" width="180" height="66" rx="14" fill="#1e293b" /><text x="605" y="460" fill="#cbd5e1">precisie</text>
    <rect x="715" y="420" width="180" height="66" rx="14" fill="#1e293b" /><text x="805" y="460" fill="#cbd5e1">architectuur</text>
    <rect x="915" y="420" width="180" height="66" rx="14" fill="#1e293b" /><text x="1005" y="460" fill="#cbd5e1">geladen stadia</text>
  </g>
</svg>
