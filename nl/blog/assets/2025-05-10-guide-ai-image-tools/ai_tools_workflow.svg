<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">De lagen van een reproduceerbaar lokaal beeld workflow</title>
  <desc id="desc">Vijf met elkaar verbonden lagen tonen aan dat de applicatieversie, model-componenten, generatieparameters, workflow-afhankelijkheden en uitvoerrecords samen een reproduceerbare release-eenheid vormen.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#64748b" /></marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="620" rx="28" fill="#0f172a" />
  <text x="600" y="68" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Een model-bestand is geen portabele workflow</text>
  <text x="600" y="104" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="17">Voor reproductie zijn identiteiten op elk niveau vereist</text>

  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <g transform="translate(45 172)">
      <rect width="190" height="154" rx="18" fill="#1d4ed8" />
      <text x="95" y="48" fill="#93c5fd" font-size="20" font-weight="700">Toepassing</text>
      <text x="95" y="82" fill="#93c5fd" font-size="15">naam + versie</text>
      <text x="95" y="110" fill="#93c5fd" font-size="14">backend + nauwkeurigheid</text>
    </g>
    <path d="M245 249 H275" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
    <g transform="translate(285 172)">
      <rect width="190" height="154" rx="18" fill="#5b21b6" />
      <text x="95" y="48" fill="#93c5fd" font-size="20" font-weight="700">Componenten</text>
      <text x="95" y="82" fill="#93c5fd" font-size="15">checkpoint + VAE</text>
      <text x="95" y="110" fill="#c4b5fd" font-size="14">encoder(s) + adapter(s)</text>
    </g>
    <path d="M485 249 H515" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
    <g transform="translate(525 172)">
      <rect width="190" height="154" rx="18" fill="#9a3412" />
      <text x="95" y="48" fill="#fdba74" font-size="20" font-weight="700">Parameters</text>
      <text x="95" y="82" fill="#fdba74" font-size="15">prompt + zaadwaarde</text>
      <text x="95" y="110" fill="#fdba74" font-size="14">sampleer + dimensies</text>
    </g>
    <path d="M725 249 H755" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
    <g transform="translate(765 172)">
      <rect width="190" height="154" rx="18" fill="#166534" />
      <text x="95" y="48" fill="#93c5fd" font-size="20" font-weight="700">Workflow</text>
      <text x="95" y="82" fill="#93c5fd" font-size="15">versies van grafiek en knopen</text>
      <text x="95" y="110" fill="#93c5fd" font-size="14">scripts en extensies</text>
    </g>
    <path d="M965 249 H995" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
    <g transform="translate(1005 172)">
      <rect width="150" height="154" rx="18" fill="#1d4ed8" />
      <text x="75" y="48" fill="#93c5fd" font-size="20" font-weight="700">Uitvoer</text>
      <text x="75" y="82" fill="#93c5fd" font-size="15">afbeelding + metadata</text>
      <text x="75" y="110" fill="#93c5fd" font-size="14">acceptatieresultaat</text>
    </g>
  </g>

  <path d="M600 346 V395" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
  <rect x="205" y="410" width="790" height="128" rx="20" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" />
  <text x="600" y="459" text-anchor="middle" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="23" font-weight="700">Reproduceerbare release-eenheid</text>
  <text x="600" y="496" text-anchor="middle" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="17">Vastleg de identiteiten samen; bewaar niet alleen het eindresultaat.</text>
</svg>
