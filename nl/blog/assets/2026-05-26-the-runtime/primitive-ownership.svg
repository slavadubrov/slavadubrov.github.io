  <text y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a" x="570">Waar elke primitief zich bevindt binnen elke deployment-vorm</text>
  <text y="54" text-anchor="middle" font-size="12" fill="#334155" x="570">Groen = de vorm biedt deze primitieve functie. Grijs = u verbindt het extern. Rood = van toepassing niet.</text>

