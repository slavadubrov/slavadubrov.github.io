<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 795" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadowP" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1" />
    </filter>
    <marker id="arrowP" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555" />
    </marker>
    <marker id="arrowPgreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32" />
    </marker>
  </defs>

  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">Beoordelingsvolgorde voor toestemming Claude Code</text>
  <text x="450" y="50" text-anchor="middle" font-size="11" fill="#888">Elke oproep van een hulpprogramma moet eerst door zes controlepunten gaan voordat deze wordt uitgevoerd. Hooks hebben een hogere prioriteit dan modi.</text>

  <!-- Start: tool call -->
  <rect x="340" y="75" width="220" height="46" rx="8" fill="#6a1b9a" filter="url(#shadowP)" />
  <text x="450" y="102" text-anchor="middle" font-size="13" font-weight="600" fill="white">Het model stuurt een toolaanroep uit</text>
  <line x1="450" y1="121" x2="450" y2="143" stroke="#555" stroke-width="2" marker-end="url(#arrowP)" />

  <!-- Gate 1: Deny rules -->
  <rect x="200" y="148" width="500" height="54" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="2" filter="url(#shadowP)" />
  <text x="220" y="172" font-size="12" font-weight="700" fill="#c62828">1 · weigeringsregels (hoogste prioriteit)</text>
  <text x="220" y="190" font-size="10" fill="#555">Blok wordt ook onder bypassPermissions toegepast. Beschermde paden (.git/, .claude/) bevinden zich hier.</text>
  <line x1="450" y1="202" x2="450" y2="223" stroke="#555" stroke-width="2" marker-end="url(#arrowP)" />

  <!-- Gate 2: Ask rules -->
  <rect x="200" y="228" width="500" height="54" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="2" filter="url(#shadowP)" />
  <text x="220" y="252" font-size="12" font-weight="700" fill="#e65100">2 · regels voor vragen stellen</text>
  <text x="220" y="270" font-size="10" fill="#555">Patronen die altijd een prompt vereisen voordat de hook-laag wordt uitgevoerd.</text>
  <line x1="450" y1="282" x2="450" y2="303" stroke="#555" stroke-width="2" marker-end="url(#arrowP)" />

  <!-- Gate 3: PreToolUse Hooks -->
  <rect x="200" y="308" width="500" height="54" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" filter="url(#shadowP)" />
  <text x="220" y="332" font-size="12" font-weight="700" fill="#1565c0">3 · PreToolUse-hooks</text>
  <text x="220" y="350" font-size="10" fill="#555">permissionDecision: "deny" heeft voorrang op zelfs bypassPermissions — hooks hebben een hogere rang dan modes.</text>
  <line x1="450" y1="362" x2="450" y2="383" stroke="#555" stroke-width="2" marker-end="url(#arrowP)" />

  <!-- Gate 4: Allow rules -->
  <rect x="200" y="388" width="500" height="54" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" filter="url(#shadowP)" />
  <text x="220" y="412" font-size="12" font-weight="700" fill="#2e7d32">4 · regels toestaan</text>
  <text x="220" y="430" font-size="10" fill="#555">Patronen die door het werkgebied expliciet zijn goedgekeurd. Neem de modusvraag over.</text>
  <line x1="450" y1="442" x2="450" y2="463" stroke="#555" stroke-width="2" marker-end="url(#arrowP)" />

  <!-- Gate 5: Permission mode -->
  <rect x="200" y="468" width="500" height="54" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="2" filter="url(#shadowP)" />
  <text x="220" y="492" font-size="12" font-weight="700" fill="#e65100">5 · toestemmingstoestand</text>
  <text x="220" y="510" font-size="10" fill="#555">standaard · wijzigingen accepteren · plan · automatisch · toestemmingen omzeilen · niet vragen (zes vooraf ingestelde opties)</text>
  <line x1="450" y1="522" x2="450" y2="543" stroke="#555" stroke-width="2" marker-end="url(#arrowP)" />

  <!-- Gate 6: canUseTool callback -->
  <rect x="200" y="548" width="500" height="54" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" filter="url(#shadowP)" />
  <text x="220" y="572" font-size="12" font-weight="700" fill="#6a1b9a">6 · canUseTool callback</text>
  <text x="220" y="590" font-size="10" fill="#555">Programmerend veto binnen de SDK – laatste kans om te interageren vóór uitvoering.</text>
  <line x1="450" y1="602" x2="450" y2="645" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowPgreen)" />

  <!-- Execute -->
  <rect x="340" y="650" width="220" height="42" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" filter="url(#shadowP)" />
  <text x="450" y="676" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Hulpprogramma uitvoeren</text>

  <!-- Side notes -->
  <rect x="720" y="150" width="170" height="42" rx="8" fill="#f8f9fa" stroke="#c62828" stroke-width="1" />
  <text x="805" y="170" text-anchor="middle" font-size="10" font-weight="600" fill="#c62828">weigeren → afgewezen</text>
  <text x="805" y="185" text-anchor="middle" font-size="9" fill="#555">altijd, zonder uitzonderingen</text>

  <rect x="720" y="230" width="170" height="42" rx="8" fill="#f8f9fa" stroke="#e65100" stroke-width="1" />
  <text x="805" y="250" text-anchor="middle" font-size="10" font-weight="600" fill="#e65100">vraag → interactief</text>
  <text x="805" y="265" text-anchor="middle" font-size="9" fill="#555">de gebruiker altijd vragen</text>

  <rect x="720" y="310" width="170" height="42" rx="8" fill="#f8f9fa" stroke="#1565c0" stroke-width="1" />
  <text x="805" y="330" text-anchor="middle" font-size="10" font-weight="600" fill="#1565c0">hooks &gt; modi</text>
  <text x="805" y="345" text-anchor="middle" font-size="9" fill="#555">het echte veiligheidsnetwerk</text>

  <rect x="720" y="390" width="170" height="42" rx="8" fill="#f8f9fa" stroke="#2e7d32" stroke-width="1" />
  <text x="805" y="410" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">toestaan → snelkoppeling</text>
  <text x="805" y="425" text-anchor="middle" font-size="9" fill="#555">de modus overslaan</text>

  <rect x="720" y="470" width="170" height="42" rx="8" fill="#f8f9fa" stroke="#e65100" stroke-width="1" />
  <text x="805" y="490" text-anchor="middle" font-size="10" font-weight="600" fill="#e65100">modus: standaardantwoord</text>
  <text x="805" y="505" text-anchor="middle" font-size="9" fill="#555">één preset tegelijk</text>

  <rect x="720" y="550" width="170" height="42" rx="8" fill="#f8f9fa" stroke="#6a1b9a" stroke-width="1" />
  <text x="805" y="570" text-anchor="middle" font-size="10" font-weight="600" fill="#6a1b9a">Veto op SDK-niveau</text>
  <text x="805" y="585" text-anchor="middle" font-size="9" fill="#555">wordt uitgevoerd in de code van je app</text>

  <text x="450" y="720" text-anchor="middle" font-size="9" font-style="italic" fill="#888">Bron: code.claude.com/docs/nl/permission-modes</text>
  <text x="450" y="745" text-anchor="middle" font-size="11" fill="#1a1a2e" font-weight="600">Permissies vormen de infrastructuur, niet de prompt.</text>
</svg>
