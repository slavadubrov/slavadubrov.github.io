<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="LLM guardrails wrap a model call; agent guardians wrap the loop" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">LLM guardrails omhult een model-aanroep; agent-guardians omhullen de lus</title>
  <defs>
    <filter id="shadowG" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <text y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a" x="450">Twee lagen, twee vragen</text>
  <text y="50" text-anchor="middle" font-size="11" fill="#64748b" x="450">LLM guardrails omhult een model aanroep. Agent guardians omhullen de lus.</text>

  <!-- LEFT: LLM guardrail layer -->
  <rect x="30" y="80" width="400" height="450" rx="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" />
  <text y="108" text-anchor="middle" font-size="14" font-weight="700" fill="#5b21b6" x="230">LLM guardrail</text>
  <text y="126" text-anchor="middle" font-size="10" font-style="italic" fill="#5b21b6" x="230">"Is het model het juiste resultaat aan het genereren?"</text>

  <!-- input -->
  <rect x="70" y="150" width="320" height="44" rx="6" fill="#eff6ff" stroke="#2563eb" />
  <text y="177" text-anchor="middle" font-size="12" fill="#1d4ed8" x="230">gebruikersinvoer</text>
  <line x1="230" y1="195" x2="230" y2="215" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowG)" />

  <!-- input filter -->
  <rect x="90" y="220" width="280" height="40" rx="6" fill="#fff7ed" stroke="#ea580c" />
  <text y="245" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412" x="230">invoerfilter · PII · jailbreak · onderwerp</text>
  <line x1="230" y1="260" x2="230" y2="280" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowG)" />

  <!-- MODEL -->
  <rect x="110" y="285" width="240" height="46" rx="8" fill="#7c3aed" filter="url(#shadowG)" />
  <text y="313" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff" x="230">LLM</text>
  <line x1="230" y1="331" x2="230" y2="350" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowG)" />

  <!-- output filter -->
  <rect x="90" y="355" width="280" height="40" rx="6" fill="#fff7ed" stroke="#ea580c" />
  <text y="380" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412" x="230">uitvoerfilter · toxiciteit · PII · hallucination</text>
  <line x1="230" y1="395" x2="230" y2="415" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowG)" />

  <!-- reply -->
  <rect x="70" y="420" width="320" height="40" rx="6" fill="#f0fdf4" stroke="#166534" />
  <text y="444" text-anchor="middle" font-size="12" fill="#166534" x="230">op de gebruiker reageren</text>

  <text y="490" text-anchor="middle" font-size="10" fill="#334155" font-style="italic" x="230">beveiligt beide uiteinden</text>
  <text y="506" text-anchor="middle" font-size="10" fill="#334155" font-style="italic" x="230">van één voltooiing</text>
  <text y="522" text-anchor="middle" font-size="9" fill="#991b1b" font-weight="600" x="230">ziet de tool-loop niet</text>

  <!-- RIGHT: Agent guardian layer -->
  <rect x="470" y="80" width="400" height="450" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text y="108" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8" x="670">Agent bewaker</text>
  <text y="126" text-anchor="middle" font-size="10" font-style="italic" fill="#1d4ed8" x="670">"Doet het systeem wat het moet doen?"</text>

  <!-- model node inside loop -->
  <rect x="550" y="150" width="240" height="40" rx="6" fill="#7c3aed" />
  <text y="175" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff" x="670">LLM · denkt na over tool call</text>
  <line x1="670" y1="190" x2="670" y2="210" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowG)" />

  <!-- Permission ladder: deny → hooks → mode → callback -->
  <rect x="510" y="215" width="320" height="40" rx="6" fill="#fef2f2" stroke="#dc2626" />
  <text y="239" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b" x="670">weigeringsregels · hooks · modus · callback</text>
  <line x1="670" y1="255" x2="670" y2="275" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowG)" />

  <!-- OS sandbox -->
  <rect x="510" y="280" width="320" height="40" rx="6" fill="#fff7ed" stroke="#ea580c" />
  <text y="304" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="670">besturingssysteem sandbox · veiligheidsgordel / landlock / ACL</text>
  <line x1="670" y1="320" x2="670" y2="340" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowG)" />

  <!-- tool call -->
  <rect x="510" y="345" width="320" height="40" rx="6" fill="#f0fdf4" stroke="#166534" />
  <text y="369" text-anchor="middle" font-size="11" font-weight="700" fill="#166534" x="670">het hulpprogramma voert uit · de observatie wordt geretourneerd</text>
  <line x1="670" y1="385" x2="670" y2="405" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowG)" />

  <!-- HITL checkpoint -->
  <rect x="510" y="410" width="320" height="40" rx="6" fill="#faf5ff" stroke="#7c3aed" />
  <text y="434" text-anchor="middle" font-size="11" font-weight="700" fill="#5b21b6" x="670">interrupt() · mens in de lus</text>

  <!-- loop arrow back -->
  <path d="M 510 430 Q 470 430 470 300 Q 470 170 550 170" fill="none" stroke="#2563eb" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowG)" />
  <text y="302" text-anchor="middle" font-size="9" fill="#1d4ed8" font-weight="600" x="464" transform="rotate(-90 464 302)">lus</text>

  <text y="480" text-anchor="middle" font-size="10" fill="#334155" font-style="italic" x="670">beschermt elke tool call</text>
  <text y="496" text-anchor="middle" font-size="10" fill="#334155" font-style="italic" x="670">gedurende de hele uitvoering</text>
  <text y="512" text-anchor="middle" font-size="9" fill="#166534" font-weight="600" x="670">ziet wat agent doet</text>

  <text y="550" text-anchor="middle" font-size="10" font-style="italic" fill="#64748b" x="450">Beide lagen zijn noodzakelijk. Geen van beide vervangt de andere.</text>
</svg>
