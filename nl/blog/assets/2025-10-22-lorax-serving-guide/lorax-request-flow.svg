<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">LoRAX-verzoekspad van adapterresolutie tot generatie</title>
  <desc id="desc">Een geauthenticeerde verzoek bevat een in de toegestane lijst opgenomen adapter-ID. LoRAX bepaalt de locatie, laadt de adapter indien nodig, bundelt compatibele taken, past de adapter toe bovenop de gedeelde basis model, en streamt tokens. Afgewezen identiteiten en artefacten volgen een foutpad.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="500" rx="22" fill="#0f172a" />
  <text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">LoRAX-verzoekspad</text>
  <text x="500" y="77" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#94a3b8">De identiteit van de adapter is een geautoriseerde routing-invoer, geen willekeurige publieke invoer</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(25 125)"><rect width="150" height="110" rx="14" fill="#1e293b" stroke="#64748b" /><text x="75" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#f8fafc">Gateway</text><text x="75" y="66" text-anchor="middle" font-size="12" fill="#cbd5e1">tenant authenticeren</text><text x="75" y="87" text-anchor="middle" font-size="12" fill="#94a3b8">allowlistadapter</text></g>
    <text x="197" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(220 125)"><rect width="165" height="110" rx="14" fill="#5b21b6" stroke="#2563eb" /><text x="82" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#c4b5fd">Resolver</text><text x="82" y="66" text-anchor="middle" font-size="12" fill="#cbd5e1">woonstatus controleren</text><text x="82" y="87" text-anchor="middle" font-size="12" fill="#94a3b8">laad indien afwezig</text></g>
    <text x="407" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(430 125)"><rect width="165" height="110" rx="14" fill="#9a3412" stroke="#ea580c" /><text x="82" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#fdba74">Scheduler</text><text x="82" y="66" text-anchor="middle" font-size="12" fill="#cbd5e1">queue op basis van klaarheid</text><text x="82" y="87" text-anchor="middle" font-size="12" fill="#94a3b8">gemengde batch vormen</text></g>
    <text x="617" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(640 125)"><rect width="165" height="110" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="82" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">GPU inference</text><text x="82" y="66" text-anchor="middle" font-size="12" fill="#cbd5e1">gedeelde basis model</text><text x="82" y="87" text-anchor="middle" font-size="12" fill="#94a3b8">adapter per verzoek</text></g>
    <text x="827" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(850 125)"><rect width="125" height="110" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="62" y="45" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Stroom</text><text x="62" y="75" text-anchor="middle" font-size="12" fill="#93c5fd">uitvoer tokens</text></g>

    <g transform="translate(220 315)"><rect width="585" height="105" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="292" y="33" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Let op het verblijfspad voor elke aanvraag.</text><text x="45" y="66" font-size="13" fill="#cbd5e1">GPU hit</text><text x="160" y="66" font-size="13" fill="#cbd5e1">CPU hit</text><text x="275" y="66" font-size="13" fill="#cbd5e1">Artifact-hit</text><text x="410" y="66" font-size="13" fill="#cbd5e1">Verre mislukking</text><text x="45" y="88" font-size="12" fill="#94a3b8">Wachtrij voor opnames, belasting, eerste-token, totaal latency, en reden voor fout.</text></g>
    <text x="500" y="465" text-anchor="middle" font-size="13" fill="#fca5a5">Ongeautoriseerde adapter, niet-compatibele artefact of fout bij het laden → weigeren of een expliciete fallback gebruiken</text>
  </g>
</svg>
