<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Opslag van adapter-artefacten en runtime-residentie in LoRAX</title>
  <desc id="desc">Artefacten van remote of lokale adapters worden opgeslagen in de data-cache, gerealiseerd in het CPU-geheugen, en gehouden in het GPU-geheugen naast de gedeelde basis model. Pijlen geven gemeten overgangen weer in plaats van vaste latency-claimen.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="500" rx="22" fill="#0f172a" />
  <text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Opslag van artefacten is niet hetzelfde als de runtime residentie</text>
  <text x="500" y="78" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#94a3b8">De capaciteit wordt bepaald door het actieve werkset en de kosten van elke overgang</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(55 125)"><rect width="235" height="210" rx="16" fill="#1e293b" stroke="#64748b" stroke-width="2" /><text x="117" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#e2e8f0">Bron van het artefact</text><text x="28" y="82" font-size="14" fill="#cbd5e1">Hugging Face / register</text><text x="28" y="113" font-size="14" fill="#cbd5e1">Object of bestandsstelselbron</text><text x="28" y="144" font-size="14" fill="#cbd5e1">Integriteitsdigest</text><text x="28" y="175" font-size="14" fill="#cbd5e1">Base-model metadata</text></g>
    <text x="320" y="240" text-anchor="middle" font-size="28" fill="#94a3b8">→</text>
    <g transform="translate(350 125)"><rect width="235" height="210" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="117" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#93c5fd">Lokale artefactcache</text><text x="28" y="82" font-size="14" fill="#cbd5e1">Gedownloade adapterbestanden</text><text x="28" y="113" font-size="14" fill="#cbd5e1">Geïnstalleerd op /data</text><text x="28" y="144" font-size="14" fill="#cbd5e1">Permanent of tijdelijk</text><text x="28" y="175" font-size="14" fill="#cbd5e1">Lees- en materialisatiekosten</text></g>
    <text x="615" y="240" text-anchor="middle" font-size="28" fill="#94a3b8">→</text>
    <g transform="translate(645 125)"><rect width="300" height="210" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="150" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#93c5fd">Runtime geheugen</text><rect x="28" y="70" width="112" height="105" rx="10" fill="#1d4ed8" /><text x="84" y="101" text-anchor="middle" font-size="14" font-weight="700" fill="#93c5fd">CPU RAM</text><text x="84" y="129" text-anchor="middle" font-size="12" fill="#93c5fd">afgeladen</text><text x="84" y="151" text-anchor="middle" font-size="12" fill="#93c5fd">adapter(s)</text><rect x="160" y="70" width="112" height="105" rx="10" fill="#166534" /><text x="216" y="101" text-anchor="middle" font-size="14" font-weight="700" fill="#86efac">GPU VRAM</text><text x="216" y="129" text-anchor="middle" font-size="12" fill="#86efac">basis + actief</text><text x="216" y="151" text-anchor="middle" font-size="12" fill="#86efac">adaptoren + KV</text></g>

    <rect x="135" y="385" width="730" height="58" rx="12" fill="#5b21b6" stroke="#2563eb" />
    <text x="500" y="411" text-anchor="middle" font-size="14" font-weight="700" fill="#c4b5fd">Metings uitvoeren voor elke overgang in uw werklast</text>
    <text x="500" y="432" text-anchor="middle" font-size="12" fill="#93c5fd">Er is geen vaste volgorde van “schijf → RAM → GPU” latency” die geldt ongeacht de grootte van de adapter, opslag, netwerk of hardware.</text>
  </g>
</svg>
