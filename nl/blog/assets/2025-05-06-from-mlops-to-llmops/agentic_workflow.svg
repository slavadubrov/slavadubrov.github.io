<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Gebruiker</title>
  <desc id="artifact-desc">Gebruiker.</desc>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="100%" height="100%" fill="#f8fafc" /><style>
    .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; rx: 6; }
    .agent-box { fill: #eff6ff; stroke: #7c3aed; stroke-width: 2; rx: 6; }
    .tool-box { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 6; }
    .text { font-family: Inter, system-ui, sans-serif; font-size: 14px; fill: #0f172a; text-anchor: middle; dominant-baseline: middle; }
    .path { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .loop-path { stroke: #94a3b8; stroke-width: 2; fill: none; stroke-dasharray: 5,5; marker-end: url(#arrowhead); }
  </style>

  <rect x="50" y="130" width="80" height="40" class="box" />
  <text y="150" class="text" x="90">Gebruiker</text>

  <rect x="200" y="100" width="120" height="100" class="agent-box" />
  <text y="130" class="text" style="font-weight: bold;" x="260">Agent</text>
  <text y="160" class="text" style="font-size: 12px;" x="260">(Redeneringslus)</text>

  <rect x="450" y="130" width="100" height="40" class="tool-box" />
  <text y="150" class="text" x="500">Hulpmiddelen</text>


  <path d="M130 150 H200" class="path" />

  <path d="M320 140 H450" class="path" />
  <text y="130" class="text" style="font-size: 10px;" x="385">Actie</text>

  <path d="M450 160 H320" class="path" />
  <text y="180" class="text" style="font-size: 10px;" x="385">Observatie</text>

  <path d="M260 200 V250 H90 V170" class="path" />
  <text y="240" class="text" style="font-size: 12px;" x="180">Uiteindelijk antwoord</text>

</svg>
