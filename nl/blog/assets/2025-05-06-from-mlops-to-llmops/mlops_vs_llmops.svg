<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">De release-eenheid breidt zich uit van een model-service naar een beslissingssysteem</title>
  <desc id="desc">Een centraal MLOps-kern dat bestaat uit code, gegevens, model en serving, wordt omringd door prompts en schema’s, retrieval-toestanden, hulpmiddelen en rechten, routing en budgetten, evenals een veiligheidsbeleid. Alle componenten maken deel uit van één systeemmanifest.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="650" rx="28" fill="#0f172a" />
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">LLMOps breidt de release-eenheid uit</text>
  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <rect x="400" y="220" width="400" height="190" rx="26" fill="#1d4ed8" stroke="#2563eb" stroke-width="3" />
    <text x="600" y="270" fill="#93c5fd" font-size="24" font-weight="700">Kern van MLOps</text>
    <text x="600" y="312" fill="#93c5fd" font-size="17">code • gegevens • model identiteit</text>
    <text x="600" y="346" fill="#93c5fd" font-size="17">ontwikkelen • serving • implementeren • teruggedraaien</text>
    <rect x="70" y="145" width="265" height="115" rx="18" fill="#5b21b6" /><text x="202" y="189" fill="#93c5fd" font-size="19" font-weight="700">Prompts + schema's</text><text x="202" y="225" fill="#c4b5fd" font-size="14">gedrag van samengestelde verzoeken</text>
    <rect x="865" y="145" width="265" height="115" rx="18" fill="#166534" /><text x="997" y="189" fill="#93c5fd" font-size="19" font-weight="700">Retrieval-toestand</text><text x="997" y="225" fill="#93c5fd" font-size="14">corpus • parser • index</text>
    <rect x="70" y="370" width="265" height="115" rx="18" fill="#9a3412" /><text x="202" y="414" fill="#fdba74" font-size="19" font-weight="700">Tools + toestemmingen</text><text x="202" y="450" fill="#fdba74" font-size="14">contracten • goedkeuring • effecten</text>
    <rect x="865" y="370" width="265" height="115" rx="18" fill="#1d4ed8" /><text x="997" y="414" fill="#93c5fd" font-size="19" font-weight="700">Routing + budget</text><text x="997" y="450" fill="#93c5fd" font-size="14">fallback • cache • quota</text>
    <rect x="390" y="485" width="420" height="82" rx="18" fill="#991b1b" /><text x="600" y="518" fill="#fca5a5" font-size="19" font-weight="700">Veiligheids- en bedrijfsbeleid</text><text x="600" y="547" fill="#fca5a5" font-size="14">deterministische regels en controles voor residuele risico’s</text>
    <rect x="255" y="590" width="690" height="42" rx="14" fill="#1e293b" /><text x="600" y="617" fill="#e2e8f0" font-size="17" font-weight="700">Eén manifest identificeert en promoot het volledige systeem</text>
  </g>
</svg>
