<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 660" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Drie-laagse evaluatie-discipline</title>
  <desc id="artifact-desc">Drie-laagse evaluatie-discipline.</desc>
  <defs>
    <marker id="arrLayer" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#334155" />
    </marker>
    <filter id="shadowL" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a" x="590">Drie-laagse evaluatie-discipline</text>
  <text y="54" text-anchor="middle" font-size="12" fill="#334155" x="590">Offline corpus en index · Online opvraging en generatie · Verificatie na generatie + productietelemetrie</text>

  <!-- =============== Layer 1: Offline =============== -->
  <rect x="30" y="80" width="1120" height="160" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowL)" />
  <text y="106" font-size="14" font-weight="700" fill="#1d4ed8" x="55">Laag 1 · Offline</text>
  <text y="124" font-size="10" fill="#1d4ed8" x="55">Vraag: Is de kennisbase correct voorbereid?</text>

  <!-- Sub-cards -->
  <rect x="55" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="175">Klaarheid van het corpus</text>
  <text y="178" text-anchor="middle" font-size="10" fill="#334155" x="175">analyseer slagingspercentage · CER/WER</text>
  <text y="193" text-anchor="middle" font-size="10" fill="#334155" x="175">TEDS · metadata-dekking</text>
  <text y="208" text-anchor="middle" font-size="10" fill="#334155" x="175">frisheid · duplicaten verwijderen</text>

  <rect x="305" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="425">Chunking</text>
  <text y="178" text-anchor="middle" font-size="10" fill="#334155" x="425">containment van answer-span</text>
  <text y="193" text-anchor="middle" font-size="10" fill="#334155" x="425">snelheid van grensbreuk</text>
  <text y="208" text-anchor="middle" font-size="10" fill="#334155" x="425">overlappende redundantie</text>

  <rect x="555" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="675">Embedding · Index</text>
  <text y="178" text-anchor="middle" font-size="10" fill="#334155" x="675">domain nDCG@10</text>
  <text y="193" text-anchor="middle" font-size="10" fill="#334155" x="675">ANN-recall versus constantwaarde</text>
  <text y="208" text-anchor="middle" font-size="10" fill="#334155" x="675">drift-basislijn</text>

  <rect x="805" y="140" width="320" height="80" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="965">Verrijking (NER · EL · tags)</text>
  <text y="178" text-anchor="middle" font-size="10" fill="#334155" x="965">EL F1 · Afhandeling van NULL-waarden · Alias-dekking</text>
  <text y="193" text-anchor="middle" font-size="10" fill="#334155" x="965">hiërarchische F1 · ratio van wees-tags</text>
  <text y="208" text-anchor="middle" font-size="10" fill="#334155" x="965">validiteit van het schema bij publicatie</text>

  <!-- Arrow down to Layer 2 -->
  <line x1="590" y1="244" x2="590" y2="280" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrLayer)" />
  <text y="265" font-size="10" fill="#64748b" font-style="italic" x="700">stelt het herinneringsplafond vast voor alles daaronder</text>

  <!-- =============== Layer 2: Online =============== -->
  <rect x="30" y="290" width="1120" height="160" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowL)" />
  <text y="316" font-size="14" font-weight="700" fill="#9a3412" x="55">Layer 2 · Online (per query)</text>
  <text y="334" font-size="10" fill="#9a3412" x="55">Vraag: Is het juiste bewijs gevonden en gebruikt voor deze query?</text>

  <rect x="55" y="350" width="240" height="80" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="175">Vraagbegrip</text>
  <text y="388" text-anchor="middle" font-size="10" fill="#334155" x="175">herformuleer winst/verlies</text>
  <text y="403" text-anchor="middle" font-size="10" fill="#334155" x="175">routingnauwkeurigheid</text>
  <text y="418" text-anchor="middle" font-size="10" fill="#334155" x="175">decompositie-dekking</text>

  <rect x="305" y="350" width="240" height="80" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="425">Retrieval</text>
  <text y="388" text-anchor="middle" font-size="10" fill="#334155" x="425">Recall@k · MRR · nDCG · MAP</text>
  <text y="403" text-anchor="middle" font-size="10" fill="#334155" x="425">contextuele nauwkeurigheid/herinnering</text>
  <text y="418" text-anchor="middle" font-size="10" fill="#334155" x="425">hybride lift boven elke rijbaan</text>

  <rect x="555" y="350" width="240" height="80" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.6" />
  <text y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b" x="675">Filtratie (hot zone)</text>
  <text y="388" text-anchor="middle" font-size="10" fill="#991b1b" x="675">frequentie van valse uitsluiting bij filtering</text>
  <text y="403" text-anchor="middle" font-size="10" fill="#991b1b" x="675">precisie/recall van het predicaat</text>
  <text y="418" text-anchor="middle" font-size="10" fill="#991b1b" x="675">schaduwopname Δ</text>

  <rect x="805" y="350" width="320" height="80" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="965">Herranken · Contextsamenvoeging</text>
  <text y="388" text-anchor="middle" font-size="10" fill="#334155" x="965">ΔnDCG · ΔMRR bij geen herrankering</text>
  <text y="403" text-anchor="middle" font-size="10" fill="#334155" x="965">contextgebruik · verlies in het midden</text>
  <text y="418" text-anchor="middle" font-size="10" fill="#334155" x="965">robustheid tegen afleidingen (RGB)</text>

  <!-- Arrow down to Layer 3 -->
  <line x1="590" y1="454" x2="590" y2="490" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrLayer)" />
  <text y="475" font-size="10" fill="#64748b" font-style="italic" x="700">voert geverifieerde context in bij de generatie</text>

  <!-- =============== Layer 3: Post-gen =============== -->
  <rect x="30" y="500" width="1120" height="135" rx="12" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowL)" />
  <text y="526" font-size="14" font-weight="700" fill="#166534" x="55">Laag 3 · Telemetrie na generatie en in productie</text>
  <text y="544" font-size="10" fill="#166534" x="55">Vraag: Is het antwoord betrouwbaar, controleerbaar en veilig om te verzenden – en blijft dat ook volgende week het geval?</text>

  <rect x="55" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="175">Getrouwheid</text>
  <text y="595" text-anchor="middle" font-size="10" fill="#334155" x="175">RAGAS · HHEM · FActScore</text>
  <text y="610" text-anchor="middle" font-size="10" fill="#334155" x="175">FaithJudge · zelfconsistentie</text>

  <rect x="305" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="425">Citaten en structuur</text>
  <text y="595" text-anchor="middle" font-size="10" fill="#334155" x="425">precisie/herinnering van citaties</text>
  <text y="610" text-anchor="middle" font-size="10" fill="#334155" x="425">validiteit van schema · conformiteit met vocabulaire</text>

  <rect x="555" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="675">Impliciete + expliciete signaal</text>
  <text y="595" text-anchor="middle" font-size="10" fill="#334155" x="675">regenrate · verblijfsduur · CTR op citaten</text>
  <text y="610" text-anchor="middle" font-size="10" fill="#334155" x="675">duim · ster · inline bewerkingen</text>

  <rect x="805" y="558" width="320" height="68" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="965">Drift · kosten · vertraging · HITL</text>
  <text y="595" text-anchor="middle" font-size="10" fill="#334155" x="965">drift in query/embedding · p95 vertraging · $/query</text>
  <text y="610" text-anchor="middle" font-size="10" fill="#334155" x="965">schaduwbeoordeling · wachtrij voor beoordelingen met lage betrouwbaarheid</text>
</svg>
