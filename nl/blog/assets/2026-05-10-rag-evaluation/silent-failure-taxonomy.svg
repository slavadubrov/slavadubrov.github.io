<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 720" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="Silent failure taxonomy with the metric that catches each mode" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Taxonomie van stille fouten met de metric die elke modus detecteert</title>
  <defs>
    <filter id="shadowSF" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a" x="590">Taxonomie van stille fouten</text>
  <text y="54" text-anchor="middle" font-size="12" fill="#334155" x="590">Elke foutmodus wordt gekoppeld aan de metriek die deze detecteert. Zonder deze metriek blijft de bug onzichtbaar.</text>

  <!-- Root -->
  <rect x="475" y="78" width="230" height="44" rx="22" fill="#dc2626" filter="url(#shadowSF)" />
  <text y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" x="590">Stille fout (RAG)</text>

  <!-- Trunk: 4 main branches -->
  <line x1="540" y1="122" x2="170" y2="170" stroke="#94a3b8" stroke-width="1.4" />
  <line x1="570" y1="122" x2="450" y2="170" stroke="#94a3b8" stroke-width="1.4" />
  <line x1="610" y1="122" x2="730" y2="170" stroke="#94a3b8" stroke-width="1.4" />
  <line x1="640" y1="122" x2="1010" y2="170" stroke="#94a3b8" stroke-width="1.4" />

  <!-- ====== Branch A: Ingestion ====== -->
  <rect x="40" y="170" width="260" height="40" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8" x="170">Fouten bij invoer</text>

  <!-- A1: Parse loss -->
  <rect x="40" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="245" font-size="11" font-weight="700" fill="#1d4ed8" x="50">Parse-verlies</text>
  <text y="261" font-size="10" fill="#334155" x="50">tabels krimpen · voetnoten</text>
  <text y="275" font-size="10" fill="#334155" x="50">verloren · OCR verwerft cijfers</text>
  <text y="285" font-size="9" font-style="italic" fill="#64748b" x="50">opgevangen door: CER/WER, TEDS</text>

  <!-- A2: Chunk break -->
  <rect x="40" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="320" font-size="11" font-weight="700" fill="#1d4ed8" x="50">Chunk onderbreken</text>
  <text y="336" font-size="10" fill="#334155" x="50">antwoord span verdeeld over twee delen</text>
  <text y="350" font-size="10" fill="#334155" x="50">chunks; ook hier is er geen volledig bewijs</text>
  <text y="360" font-size="9" font-style="italic" fill="#64748b" x="50">opgevangen door: answer-span containment</text>

  <!-- A3: Dedup miss -->
  <rect x="40" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="395" font-size="11" font-weight="700" fill="#1d4ed8" x="50">Fout bij duplicate-removal</text>
  <text y="411" font-size="10" fill="#334155" x="50">False-merge beschadigt het antwoord;</text>
  <text y="425" font-size="10" fill="#334155" x="50">false-keep begraaft het juiste document</text>
  <text y="435" font-size="9" font-style="italic" fill="#64748b" x="50">gevangen door: dup nauwkeurigheid/herinnering</text>

  <!-- A4: Normalization -->
  <rect x="40" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="470" font-size="11" font-weight="700" fill="#1d4ed8" x="50">Normalisatiedrift</text>
  <text y="486" font-size="10" fill="#334155" x="50">NFC versus NFKC-mismatchbreuken</text>
  <text y="500" font-size="10" fill="#334155" x="50">resolutie van aliasen met exacte overeenkomst</text>
  <text y="510" font-size="9" font-style="italic" fill="#64748b" x="50">opgepakt door: NFC/NFKC pariteit, alias-dekking</text>

  <!-- ====== Branch B: Embedding/Index ====== -->
  <rect x="320" y="170" width="260" height="40" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8" x="450">Embedding en index</text>

  <!-- B1: Embedding miss -->
  <rect x="320" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="245" font-size="11" font-weight="700" fill="#1d4ed8" x="330">Embedding fout</text>
  <text y="261" font-size="10" fill="#334155" x="330">het domeinterm staat buiten de</text>
  <text y="275" font-size="10" fill="#334155" x="330">de trainingsverdeling van model</text>
  <text y="285" font-size="9" font-style="italic" fill="#64748b" x="330">gevangen door: domain Recall@k versus baseline</text>

  <!-- B2: ANN drop -->
  <rect x="320" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="320" font-size="11" font-weight="700" fill="#1d4ed8" x="330">ANN afname van de benaderingsschering</text>
  <text y="336" font-size="10" fill="#334155" x="330">HNSW efSearch te laag; goud</text>
  <text y="350" font-size="10" fill="#334155" x="330">De vector bestaat, maar kan niet worden bereikt</text>
  <text y="360" font-size="9" font-style="italic" fill="#64748b" x="330">opgevangen door: ANN recall versus flat</text>

  <!-- B3: Embedding drift -->
  <rect x="320" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="395" font-size="11" font-weight="700" fill="#1d4ed8" x="330">Embedding drift</text>
  <text y="411" font-size="10" fill="#334155" x="330">provider model versienumsverhoging;</text>
  <text y="425" font-size="10" fill="#334155" x="330">oude vectoren zijn niet langer uitgelijnd</text>
  <text y="435" font-size="9" font-style="italic" fill="#64748b" x="330">gevangen door: NN-stabiliteit van de probe-set</text>

  <!-- B4: Stale index -->
  <rect x="320" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="470" font-size="11" font-weight="700" fill="#1d4ed8" x="330">Oud index</text>
  <text y="486" font-size="10" fill="#334155" x="330">versheidslag; uitgevoerde queries</text>
  <text y="500" font-size="10" fill="#334155" x="330">in vergelijking met de waarde van vorige week</text>
  <text y="510" font-size="9" font-style="italic" fill="#64748b" x="330">opgespoord door: freshness lag p99, %-stale</text>

  <!-- ====== Branch C: Online retrieval (HOT — silent killers) ====== -->
  <rect x="600" y="170" width="260" height="40" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2" />
  <text y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b" x="730">Online retrieval</text>

  <!-- C1: Filter exclude (highlighted) -->
  <rect x="600" y="225" width="260" height="64" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2" filter="url(#shadowSF)" />
  <text y="245" font-size="11" font-weight="700" fill="#991b1b" x="610">Foutuitsluitingsfilter</text>
  <text y="261" font-size="10" fill="#334155" x="610">Hard predicates leiden tot het verwijderen van de gouden documentatie;</text>
  <text y="275" font-size="10" fill="#334155" x="610">Recall@k ziet er normaal uit — op een lege set</text>
  <text y="285" font-size="9" font-style="italic" fill="#991b1b" x="610">gevangen door: filter-foutuitsluitingsratio</text>

  <!-- C2: Rerank miss -->
  <rect x="600" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="320" font-size="11" font-weight="700" fill="#991b1b" x="610">Herordenen mislukt</text>
  <text y="336" font-size="10" fill="#334155" x="610">De cross-encoder verlaagt de rang van rechts</text>
  <text y="350" font-size="10" fill="#334155" x="610">document achter plausibele afleidingen</text>
  <text y="360" font-size="9" font-style="italic" fill="#64748b" x="610">gevangen door: ΔnDCG, robuustheid tegenover afleidingen (RGB)</text>

  <!-- C3: Lost in middle -->
  <rect x="600" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="395" font-size="11" font-weight="700" fill="#991b1b" x="610">Verloren in het midden</text>
  <text y="411" font-size="10" fill="#334155" x="610">goud chunk in de context, maar in</text>
  <text y="425" font-size="10" fill="#334155" x="610">positie 7/10; model negeert deze</text>
  <text y="435" font-size="9" font-style="italic" fill="#64748b" x="610">opgevangen door: position-stratified eval</text>

  <!-- C4: Bad rewrite -->
  <rect x="600" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="470" font-size="11" font-weight="700" fill="#991b1b" x="610">Regressie bij herformulering van queries</text>
  <text y="486" font-size="10" fill="#334155" x="610">HyDE hallucineert een entiteit die</text>
  <text y="500" font-size="10" fill="#334155" x="610">zet retrieval op de verkeerde manier schuin</text>
  <text y="510" font-size="9" font-style="italic" fill="#64748b" x="610">gevangen door: herschrijfvoordeel/verlies A/B</text>

  <!-- ====== Branch D: Generation/Citation ====== -->
  <rect x="880" y="170" width="260" height="40" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" />
  <text y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6" x="1010">Generatie</text>

  <!-- D1: Hallucination -->
  <rect x="880" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="245" font-size="11" font-weight="700" fill="#5b21b6" x="890">Hallucination</text>
  <text y="261" font-size="10" fill="#334155" x="890">niet ondersteunde claim, meestal een</text>
  <text y="275" font-size="10" fill="#334155" x="890">entiteit ontbreekt in de context</text>
  <text y="285" font-size="9" font-style="italic" fill="#64748b" x="890">gevangen door: faithfulness, HHEM, FActScore</text>

  <!-- D2: No citation -->
  <rect x="880" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="320" font-size="11" font-weight="700" fill="#5b21b6" x="890">Citation theater</text>
  <text y="336" font-size="10" fill="#334155" x="890">de genoemde span doet dit in werkelijkheid niet</text>
  <text y="350" font-size="10" fill="#334155" x="890">de daaraan gerelateerde bewering ondersteunen</text>
  <text y="360" font-size="9" font-style="italic" fill="#64748b" x="890">gevangen door: citatieprecisie/citatierecall (TREC-ondersteuning)</text>

  <!-- D3: Wrong refusal -->
  <rect x="880" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="395" font-size="11" font-weight="700" fill="#5b21b6" x="890">Foutieve afwezigheid</text>
  <text y="411" font-size="10" fill="#334155" x="890">"Ik weet het niet" wanneer het antwoord</text>
  <text y="425" font-size="10" fill="#334155" x="890">staat in de context (of omgekeerd)</text>
  <text y="435" font-size="9" font-style="italic" fill="#64748b" x="890">gevangen door: NoMIRACL, nauwkeurigheid van afzien</text>

  <!-- D4: Schema break -->
  <rect x="880" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="470" font-size="11" font-weight="700" fill="#5b21b6" x="890">Schema/woordenlijstbreuk</text>
  <text y="486" font-size="10" fill="#334155" x="890">syntactisch geldige uitvoerkeuzes</text>
  <text y="500" font-size="10" fill="#334155" x="890">een incorrecte, maar geldige ontologie-ID</text>
  <text y="510" font-size="9" font-style="italic" fill="#64748b" x="890">opgevangen door: woordenschatconformiteit</text>

  <!-- Footer band -->
  <rect x="40" y="555" width="1100" height="68" rx="8" fill="#f0fdf4" stroke="#ea580c" stroke-width="1.2" />
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="590">Gids voor het lezen</text>
  <text y="598" text-anchor="middle" font-size="10" fill="#9a3412" x="590">Elke fout blijft onopgemerkt wanneer er geen bijbehorende metriek beschikbaar is. Alleen de standaardmetriek “juistheid van het antwoord” geeft aan dat er iets mis is — maar niet waar.</text>
  <text y="614" text-anchor="middle" font-size="10" fill="#9a3412" x="590">De rode tak (filteruitsluiting, mislukte herrankering, verloren in het midden, slechte herschrijving) is waar de meeste problemen in productie RAG optreden. Instrumenteer deze eerst.</text>

  <!-- Visual cue: the 'red' propagation -->
  <rect x="40" y="640" width="1100" height="62" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="662" font-size="11" font-weight="600" fill="#0f172a" x="60">De propagatierule:</text>
  <text y="682" font-size="10" fill="#334155" x="60">Een fout aan de linkerkant zorgt voor een limiet in het herinneren van alle gegevens aan de rechterkant. Slechte parsing beperkt chunking. Slechte chunking beperken op hun beurt retrieval.</text>
  <text y="696" font-size="10" fill="#334155" x="60">Slechte retrieval hoofdletters reranking. Slechte generatie van reranking hoofdletters. Faithfulness meet alleen de laatste schakel — het kan de gebroken keten niet zien.</text>
</svg>
