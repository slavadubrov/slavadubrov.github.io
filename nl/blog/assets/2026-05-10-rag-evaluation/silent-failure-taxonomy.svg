<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 720" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadowSF" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Title -->
  <text x="590" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a2e">Taxonomie van stille fouten</text>
  <text x="590" y="54" text-anchor="middle" font-size="12" fill="#666">Elke foutmodus is gekoppeld aan de metriek die hem vangt. Zonder die metriek is de bug onzichtbaar.</text>

  <!-- Root -->
  <rect x="475" y="78" width="230" height="44" rx="22" fill="#c62828" filter="url(#shadowSF)" />
  <text x="590" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="white">Stille fout (RAG)</text>

  <!-- Trunk: 4 main branches -->
  <line x1="540" y1="122" x2="170" y2="170" stroke="#888" stroke-width="1.4" />
  <line x1="570" y1="122" x2="450" y2="170" stroke="#888" stroke-width="1.4" />
  <line x1="610" y1="122" x2="730" y2="170" stroke="#888" stroke-width="1.4" />
  <line x1="640" y1="122" x2="1010" y2="170" stroke="#888" stroke-width="1.4" />

  <!-- ====== Branch A: Ingestion ====== -->
  <rect x="40" y="170" width="260" height="40" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" />
  <text x="170" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">Innamefouten</text>

  <!-- A1: Parse loss -->
  <rect x="40" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="50" y="245" font-size="11" font-weight="700" fill="#1565c0">Parse-verlies</text>
  <text x="50" y="261" font-size="10" fill="#444">tabellen storten in · voetnoten</text>
  <text x="50" y="275" font-size="10" fill="#444">vallen weg · OCR verwart cijfers</text>
  <text x="50" y="285" font-size="9" font-style="italic" fill="#888">gevangen door: CER/WER, TEDS</text>

  <!-- A2: Chunk break -->
  <rect x="40" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="50" y="320" font-size="11" font-weight="700" fill="#1565c0">Chunkbreuk</text>
  <text x="50" y="336" font-size="10" fill="#444">antwoordspan opgesplitst over twee</text>
  <text x="50" y="350" font-size="10" fill="#444">chunks; geen heeft volledig bewijs</text>
  <text x="50" y="360" font-size="9" font-style="italic" fill="#888">gevangen door: answer-span containment</text>

  <!-- A3: Dedup miss -->
  <rect x="40" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="50" y="395" font-size="11" font-weight="700" fill="#1565c0">Dedup-fout</text>
  <text x="50" y="411" font-size="10" fill="#444">foutieve merge corrumpeert antwoord;</text>
  <text x="50" y="425" font-size="10" fill="#444">foutief behoud verbergt het juiste doc</text>
  <text x="50" y="435" font-size="9" font-style="italic" fill="#888">gevangen door: dup precision/recall</text>

  <!-- A4: Normalization -->
  <rect x="40" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="50" y="470" font-size="11" font-weight="700" fill="#1565c0">Normalisatiedrift</text>
  <text x="50" y="486" font-size="10" fill="#444">NFC vs NFKC-mismatch breekt</text>
  <text x="50" y="500" font-size="10" fill="#444">exact-match aliasresolutie</text>
  <text x="50" y="510" font-size="9" font-style="italic" fill="#888">gevangen door: NFC/NFKC-pariteit, aliasdekking</text>

  <!-- ====== Branch B: Embedding/Index ====== -->
  <rect x="320" y="170" width="260" height="40" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" />
  <text x="450" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">Embedding &amp; index</text>

  <!-- B1: Embedding miss -->
  <rect x="320" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="330" y="245" font-size="11" font-weight="700" fill="#1565c0">Embedding-misser</text>
  <text x="330" y="261" font-size="10" fill="#444">domeinterm valt buiten de</text>
  <text x="330" y="275" font-size="10" fill="#444">trainingsdistributie van het model</text>
  <text x="330" y="285" font-size="9" font-style="italic" fill="#888">gevangen door: domein Recall@k vs. baseline</text>

  <!-- B2: ANN drop -->
  <rect x="320" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="330" y="320" font-size="11" font-weight="700" fill="#1565c0">ANN-approxverlies</text>
  <text x="330" y="336" font-size="10" fill="#444">HNSW efSearch te laag; gold</text>
  <text x="330" y="350" font-size="10" fill="#444">vector bestaat maar wordt niet bereikt</text>
  <text x="330" y="360" font-size="9" font-style="italic" fill="#888">gevangen door: ANN recall vs. flat</text>

  <!-- B3: Embedding drift -->
  <rect x="320" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="330" y="395" font-size="11" font-weight="700" fill="#1565c0">Embedding-drift</text>
  <text x="330" y="411" font-size="10" fill="#444">provider-modelversie verhoogd;</text>
  <text x="330" y="425" font-size="10" fill="#444">oude vectoren niet meer uitgelijnd</text>
  <text x="330" y="435" font-size="9" font-style="italic" fill="#888">gevangen door: probe-set NN-stabiliteit</text>

  <!-- B4: Stale index -->
  <rect x="320" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="330" y="470" font-size="11" font-weight="700" fill="#1565c0">Verouderde index</text>
  <text x="330" y="486" font-size="10" fill="#444">versheidsvertraging; queries draaien</text>
  <text x="330" y="500" font-size="10" fill="#444">tegen de waarheid van vorige week</text>
  <text x="330" y="510" font-size="9" font-style="italic" fill="#888">gevangen door: freshness lag p99, %-stale</text>

  <!-- ====== Branch C: Online retrieval (HOT — silent killers) ====== -->
  <rect x="600" y="170" width="260" height="40" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="2" />
  <text x="730" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#c62828">Online retrieval</text>

  <!-- C1: Filter exclude (highlighted) -->
  <rect x="600" y="225" width="260" height="64" rx="8" fill="#ffebee" stroke="#c62828" stroke-width="2" filter="url(#shadowSF)" />
  <text x="610" y="245" font-size="11" font-weight="700" fill="#c62828">Filter foutieve uitsluiting</text>
  <text x="610" y="261" font-size="10" fill="#444">harde predicaat filtert gold doc weg;</text>
  <text x="610" y="275" font-size="10" fill="#444">Recall@k lijkt normaal — over een lege set</text>
  <text x="610" y="285" font-size="9" font-style="italic" fill="#c62828">gevangen door: filter false-exclusion rate</text>

  <!-- C2: Rerank miss -->
  <rect x="600" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#c62828" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="610" y="320" font-size="11" font-weight="700" fill="#c62828">Rerank-misser</text>
  <text x="610" y="336" font-size="10" fill="#444">cross-encoder degradeert het juiste</text>
  <text x="610" y="350" font-size="10" fill="#444">doc achter plausibele afleiders</text>
  <text x="610" y="360" font-size="9" font-style="italic" fill="#888">gevangen door: ΔnDCG, afleider-robuustheid (RGB)</text>

  <!-- C3: Lost in middle -->
  <rect x="600" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#c62828" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="610" y="395" font-size="11" font-weight="700" fill="#c62828">Verloren in het midden</text>
  <text x="610" y="411" font-size="10" fill="#444">gold chunk in context maar op</text>
  <text x="610" y="425" font-size="10" fill="#444">positie 7/10; model negeert het</text>
  <text x="610" y="435" font-size="9" font-style="italic" fill="#888">gevangen door: position-stratified eval</text>

  <!-- C4: Bad rewrite -->
  <rect x="600" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#c62828" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="610" y="470" font-size="11" font-weight="700" fill="#c62828">Query rewrite-regressie</text>
  <text x="610" y="486" font-size="10" fill="#444">HyDE hallucineert een entiteit die</text>
  <text x="610" y="500" font-size="10" fill="#444">retrieval de verkeerde kant op stuurt</text>
  <text x="610" y="510" font-size="9" font-style="italic" fill="#888">gevangen door: rewrite gain/loss A/B</text>

  <!-- ====== Branch D: Generation/Citation ====== -->
  <rect x="880" y="170" width="260" height="40" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" />
  <text x="1010" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#6a1b9a">Generatie</text>

  <!-- D1: Hallucination -->
  <rect x="880" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="890" y="245" font-size="11" font-weight="700" fill="#6a1b9a">Hallucinatie</text>
  <text x="890" y="261" font-size="10" fill="#444">ongefundeerde claim, vaak een</text>
  <text x="890" y="275" font-size="10" fill="#444">entiteit niet in de context</text>
  <text x="890" y="285" font-size="9" font-style="italic" fill="#888">gevangen door: faithfulness, HHEM, FActScore</text>

  <!-- D2: No citation -->
  <rect x="880" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="890" y="320" font-size="11" font-weight="700" fill="#6a1b9a">Citatietheater</text>
  <text x="890" y="336" font-size="10" fill="#444">geciteerde span ondersteunt niet echt</text>
  <text x="890" y="350" font-size="10" fill="#444">de claim erbij</text>
  <text x="890" y="360" font-size="9" font-style="italic" fill="#888">gevangen door: citation precision/recall (TREC support)</text>

  <!-- D3: Wrong refusal -->
  <rect x="880" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="890" y="395" font-size="11" font-weight="700" fill="#6a1b9a">Verkeerde abstentie</text>
  <text x="890" y="411" font-size="10" fill="#444">"Ik weet het niet" terwijl het antwoord</text>
  <text x="890" y="425" font-size="10" fill="#444">in context staat (of omgekeerd)</text>
  <text x="890" y="435" font-size="9" font-style="italic" fill="#888">gevangen door: NoMIRACL, abstention accuracy</text>

  <!-- D4: Schema break -->
  <rect x="880" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="890" y="470" font-size="11" font-weight="700" fill="#6a1b9a">Schema/vocab-breuk</text>
  <text x="890" y="486" font-size="10" fill="#444">syntactisch geldige output kiest</text>
  <text x="890" y="500" font-size="10" fill="#444">een foutief maar geldig ontology ID</text>
  <text x="890" y="510" font-size="9" font-style="italic" fill="#888">gevangen door: vocabulary conformance</text>

  <!-- Footer band -->
  <rect x="40" y="555" width="1100" height="68" rx="8" fill="#fffde7" stroke="#fbc02d" stroke-width="1.2" />
  <text x="590" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#827717">Leeswijzer</text>
  <text x="590" y="598" text-anchor="middle" font-size="10" fill="#827717">Elke fout is stil zonder zijn metriek. Standaard "antwoordcorrectheid" alleen zegt dat iets kapot is — niet waar.</text>
  <text x="590" y="614" text-anchor="middle" font-size="10" fill="#827717">De rode tak (filteruitsluiting, rerank-misser, verloren-in-het-midden, slechte rewrite) doet de meeste productie-RAG pijn. Instrumenteer die eerst.</text>

  <!-- Visual cue: the 'red' propagation -->
  <rect x="40" y="640" width="1100" height="62" rx="8" fill="#ffffff" stroke="#cbd5e0" stroke-width="1" />
  <text x="60" y="662" font-size="11" font-weight="600" fill="#1a1a2e">De propagatieregel:</text>
  <text x="60" y="682" font-size="10" fill="#555">Een fout links is een recall-plafond voor alles rechts. Slechte parsing begrenst chunking. Slechte chunking begrenst retrieval.</text>
  <text x="60" y="696" font-size="10" fill="#555">Slechte retrieval begrenst reranking. Slechte reranking begrenst generatie. Faithfulness meet alleen de laatste schakel — het ziet de gebroken keten niet.</text>
</svg>
