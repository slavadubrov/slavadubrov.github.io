<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" font-family="Inter, system-ui, sans-serif" role="img" aria-label="A production RAG pipeline showing ingestion, query-time, and answer or production checks, with hard filters applied before retrieval ranking" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Het volledige RAG pipeline met metrische indicatoren op elke fase</title>
  <defs>
    <marker id="arrEval" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b" />
    </marker>
    <filter id="shadowEval" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="1180" height="760" fill="#f8fafc" />

  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a" x="590">Het RAG Pipeline met evaluatiepunten</text>
  <text y="54" text-anchor="middle" font-size="12" fill="#64748b" x="590">Elke fase krijgt een metriek. De metriek is wat stille fouten detecteert.</text>

  <!-- ============ OFFLINE LANE ============ -->
  <rect x="20" y="78" width="1140" height="290" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="102" font-size="14" font-weight="700" fill="#1d4ed8" x="40">Ingestieroute · corpus en index</text>
  <text y="118" font-size="11" fill="#64748b" x="40">Wordt uitgevoerd wanneer de versie van het corpus verandert. Stelt het plafond voor de bewijsmateriaalhoeveelheid in.</text>

  <!-- Stage 1: Acquire / Parse -->
  <rect x="40" y="140" width="170" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="125">Verzamelen en analyseren</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="125">PDF's · HTML · OCR</text>
  <text y="192" text-anchor="middle" font-size="11" fill="#64748b" x="125">Tabellen · Layout</text>

  <!-- Metric badge 1 -->
  <rect x="40" y="212" width="170" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="125">CER · WER · TEDS</text>
  <text y="242" text-anchor="middle" font-size="11" fill="#9a3412" x="125">verwerkingsratio</text>
  <text y="255" text-anchor="middle" font-size="11" fill="#9a3412" x="125">layoutnauwkeurigheid</text>

  <!-- Arrow -->
  <line x1="210" y1="171" x2="245" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 2: Normalize / Dedup -->
  <rect x="245" y="140" width="170" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="330">Normaliseren en duplicaten verwijderen</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="330">NFC/NFKC · MinHash</text>
  <text y="192" text-anchor="middle" font-size="11" fill="#64748b" x="330">PII · sjablooncode</text>

  <rect x="245" y="212" width="170" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="330">dubbele recall/precisie</text>
  <text y="242" text-anchor="middle" font-size="11" fill="#9a3412" x="330">Herinnering van PII (per type)</text>
  <text y="255" text-anchor="middle" font-size="11" fill="#9a3412" x="330">langdetectie F1</text>

  <line x1="415" y1="171" x2="450" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 3: Chunk -->
  <rect x="450" y="140" width="170" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="535">Chunk</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="535">recursief · semantisch</text>
  <text y="192" text-anchor="middle" font-size="11" fill="#64748b" x="535">structuurgerelateerd · laat</text>

  <rect x="450" y="212" width="170" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="535">antwoord-span beperking</text>
  <text y="242" text-anchor="middle" font-size="11" fill="#9a3412" x="535">snelheid grensbreuk</text>
  <text y="255" text-anchor="middle" font-size="11" fill="#9a3412" x="535">Recall@k versus grootte</text>

  <line x1="620" y1="171" x2="655" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 4: Enrich (NER/EL) -->
  <rect x="655" y="140" width="170" height="62" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6" x="740">Verrijken</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="740">NER · entiteitslink</text>
  <text y="192" text-anchor="middle" font-size="11" fill="#64748b" x="740">tags · hiërarchie</text>

  <rect x="655" y="212" width="170" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="740">EL F1 · nauwkeurigheid van NIL</text>
  <text y="242" text-anchor="middle" font-size="11" fill="#9a3412" x="740">hiërarchische F1</text>
  <text y="255" text-anchor="middle" font-size="11" fill="#9a3412" x="740">alias-dekking</text>

  <line x1="825" y1="171" x2="860" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 5: Embed -->
  <rect x="860" y="140" width="135" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="927">Embedden</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="927">dicht / dun</text>
  <text y="192" text-anchor="middle" font-size="11" fill="#64748b" x="927">meervoudige vector</text>

  <rect x="860" y="212" width="135" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="927">domain nDCG@10</text>
  <text y="242" text-anchor="middle" font-size="11" fill="#9a3412" x="927">drift (KL · NN-stabiliteit)</text>
  <text y="255" text-anchor="middle" font-size="11" fill="#9a3412" x="927">tegenover BEIR/MTEB</text>

  <line x1="995" y1="171" x2="1030" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 6: Index -->
  <rect x="1030" y="140" width="115" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="1087">Index</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="1087">HNSW / IVF</text>
  <text y="192" text-anchor="middle" font-size="11" fill="#64748b" x="1087">BM25 · hybride</text>

  <rect x="1030" y="212" width="115" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="1087">ANN recall versus flat performance</text>
  <text y="242" text-anchor="middle" font-size="11" fill="#9a3412" x="1087">p99-vertraging van de versheid</text>
  <text y="255" text-anchor="middle" font-size="11" fill="#9a3412" x="1087">gefilterde zoekopdracht breedtegraad.</text>

  <!-- Lane summary -->
  <rect x="40" y="290" width="1105" height="58" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1" />
  <text y="312" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8" x="592">De klaarheid voor invoer bepaalt de bovengrens. Als een chunk het antwoord span hier niet kan terugvinden, zal geen reranker dit verderop herstellen.</text>
  <text y="332" text-anchor="middle" font-size="11" fill="#1d4ed8" x="592">Instrumentparseeren, normalisatie, chunking, verrijking, embedding, en indexeren zodat fouten in latere stappen nog steeds te herleiden zijn.</text>

  <!-- ============ ONLINE LANE ============ -->
  <rect x="20" y="378" width="1140" height="280" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="402" font-size="14" font-weight="700" fill="#9a3412" x="40">Pad tijdens query · uitvoering per query</text>
  <text y="418" font-size="11" fill="#64748b" x="40">De request-pfad voert elke query uit; dure kwaliteitsmetrieken kunnen geselecteerde traces-waarden asynchroon evalueren.</text>

  <!-- Stage 7: Query Rewrite -->
  <rect x="40" y="440" width="160" height="62" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="120">Opnieuw schrijven / Route bepalen</text>
  <text y="478" text-anchor="middle" font-size="11" fill="#64748b" x="120">HyDE · meervoudige query's</text>
  <text y="492" text-anchor="middle" font-size="11" fill="#64748b" x="120">intentie · adaptief</text>

  <rect x="40" y="512" width="160" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="120">Recall@k verbetering</text>
  <text y="542" text-anchor="middle" font-size="11" fill="#9a3412" x="120">routing nauwkeurigheid</text>
  <text y="555" text-anchor="middle" font-size="11" fill="#9a3412" x="120">rate van nutteloze acties</text>

  <line x1="200" y1="471" x2="235" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 8: Apply hard filters before ranking -->
  <rect x="235" y="440" width="160" height="62" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b" x="315">Harde filters toepassen</text>
  <text y="478" text-anchor="middle" font-size="11" fill="#64748b" x="315">tenant · ACL · tag</text>
  <text y="492" text-anchor="middle" font-size="11" fill="#64748b" x="315">hard versus soft</text>

  <rect x="235" y="512" width="160" height="48" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.2" />
  <text y="528" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b" x="315">filter-foutuitsluitingsratio</text>
  <text y="542" text-anchor="middle" font-size="11" fill="#991b1b" x="315">predicaatprecisie/recall</text>
  <text y="555" text-anchor="middle" font-size="11" fill="#991b1b" x="315">schaduw-retrieval Δ</text>

  <line x1="395" y1="471" x2="430" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 9: Retrieve from the eligible candidate set -->
  <rect x="430" y="440" width="160" height="62" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="510">Opvragen</text>
  <text y="478" text-anchor="middle" font-size="11" fill="#64748b" x="510">dichte + spaarzame + RRF</text>
  <text y="492" text-anchor="middle" font-size="11" fill="#64748b" x="510">geschikte kandidaatenset</text>

  <rect x="430" y="512" width="160" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="510">Recall@k · MRR · nDCG</text>
  <text y="542" text-anchor="middle" font-size="11" fill="#9a3412" x="510">contextuele nauwkeurigheid/herinnering</text>
  <text y="555" text-anchor="middle" font-size="11" fill="#9a3412" x="510">hybride lift</text>

  <line x1="590" y1="471" x2="625" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 10: Rerank -->
  <rect x="625" y="440" width="160" height="62" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="705">Herranken</text>
  <text y="478" text-anchor="middle" font-size="11" fill="#64748b" x="705">kruisencoder · per lijst</text>
  <text y="492" text-anchor="middle" font-size="11" fill="#64748b" x="705">BGE · Cohere · ZeRank</text>

  <rect x="625" y="512" width="160" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="705">ΔnDCG · ΔMRR · ΔP@1</text>
  <text y="542" text-anchor="middle" font-size="11" fill="#9a3412" x="705">robustheid tegen afleidingen</text>
  <text y="555" text-anchor="middle" font-size="11" fill="#9a3412" x="705">latency p95</text>

  <line x1="785" y1="471" x2="820" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 11: Assemble -->
  <rect x="820" y="440" width="160" height="62" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="900">Context samenstellen</text>
  <text y="478" text-anchor="middle" font-size="11" fill="#64748b" x="900">ordenen · comprimeren</text>
  <text y="492" text-anchor="middle" font-size="11" fill="#64748b" x="900">budget tokens</text>

  <rect x="820" y="512" width="160" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="900">contextgebruik</text>
  <text y="542" text-anchor="middle" font-size="11" fill="#9a3412" x="900">verlies in het midden</text>
  <text y="555" text-anchor="middle" font-size="11" fill="#9a3412" x="900">compressie × correctheid</text>

  <line x1="980" y1="471" x2="1015" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 12: Generate -->
  <rect x="1015" y="440" width="130" height="62" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6" x="1080">genereren</text>
  <text y="478" text-anchor="middle" font-size="11" fill="#64748b" x="1080">LLM aanroepen</text>
  <text y="492" text-anchor="middle" font-size="11" fill="#64748b" x="1080">+ referenties</text>

  <rect x="1015" y="512" width="130" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="1080">getrouwheid · HHEM</text>
  <text y="542" text-anchor="middle" font-size="11" fill="#9a3412" x="1080">citatie P/R</text>
  <text y="555" text-anchor="middle" font-size="11" fill="#9a3412" x="1080">FActScore</text>

  <!-- Lane summary -->
  <rect x="40" y="582" width="1105" height="58" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1" />
  <text y="604" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412" x="592">Een verkeerde herschrijving of harde filter kan het gouden document al vóór de rangschikking verwijderen. Faithfulness kan de gebaseerde weigering desondanks goedkeuren.</text>
  <text y="624" text-anchor="middle" font-size="11" fill="#9a3412" x="592">Recall@k detecteert de gemiste resultaten; de foutexclusieratio van filters wordt toegeschreven aan het predicaat in plaats van aan de retriever.</text>

  <!-- ============ POST-GEN LANE ============ -->
  <rect x="20" y="668" width="1140" height="78" rx="10" fill="#f0fdf4" stroke="#166534" stroke-width="1" />
  <text y="692" font-size="14" font-weight="700" fill="#166534" x="40">Antwoord en productiecontroles · verificatie en telemetrie</text>

  <rect x="40" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="11" font-weight="600" fill="#166534" x="150">verificatie van claims · NLI</text>

  <rect x="270" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="11" font-weight="600" fill="#166534" x="380">validiteit van het schema · grounding</text>

  <rect x="500" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="11" font-weight="600" fill="#166534" x="610">regenval · duimen · verblijfsduur</text>

  <rect x="730" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="11" font-weight="600" fill="#166534" x="840">drift · kosten/per query · p95</text>

  <rect x="960" y="704" width="185" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="11" font-weight="600" fill="#166534" x="1052">schaduw eval · HITL</text>
</svg>
