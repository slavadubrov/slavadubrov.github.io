<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrEval" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555" />
    </marker>
    <filter id="shadowEval" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Title -->
  <text x="590" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a2e">De RAG-pijplijn met evaluatiepunten</text>
  <text x="590" y="54" text-anchor="middle" font-size="12" fill="#666">Elke stap krijgt een metric. De metric vangt stille fouten.</text>

  <!-- ============ OFFLINE LANE ============ -->
  <rect x="20" y="78" width="1140" height="290" rx="10" fill="#f8f9fa" stroke="#cbd5e0" stroke-width="1" />
  <text x="40" y="102" font-size="13" font-weight="700" fill="#1565c0">Offline · Inname</text>
  <text x="40" y="118" font-size="10" fill="#888">Draait één keer per corpusversie. Bepaalt het plafond.</text>

  <!-- Stage 1: Acquire / Parse -->
  <rect x="40" y="140" width="170" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="125" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Verzamel &amp; Parseer</text>
  <text x="125" y="178" text-anchor="middle" font-size="9" fill="#555">PDFs · HTML · OCR</text>
  <text x="125" y="192" text-anchor="middle" font-size="9" fill="#555">Tabellen · Layout</text>

  <!-- Metric badge 1 -->
  <rect x="40" y="212" width="170" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="125" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">CER · WER · TEDS</text>
  <text x="125" y="242" text-anchor="middle" font-size="9" fill="#827717">parse slagingspercentage</text>
  <text x="125" y="255" text-anchor="middle" font-size="9" fill="#827717">layoutgetrouwheid</text>

  <!-- Arrow -->
  <line x1="210" y1="171" x2="245" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 2: Normalize / Dedup -->
  <rect x="245" y="140" width="170" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="330" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Normaliseer &amp; Dedup</text>
  <text x="330" y="178" text-anchor="middle" font-size="9" fill="#555">NFC/NFKC · MinHash</text>
  <text x="330" y="192" text-anchor="middle" font-size="9" fill="#555">PII · boilerplate</text>

  <rect x="245" y="212" width="170" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="330" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">dup recall/precision</text>
  <text x="330" y="242" text-anchor="middle" font-size="9" fill="#827717">PII recall (per type)</text>
  <text x="330" y="255" text-anchor="middle" font-size="9" fill="#827717">lang-detect F1</text>

  <line x1="415" y1="171" x2="450" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 3: Chunk -->
  <rect x="450" y="140" width="170" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="535" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Chunk</text>
  <text x="535" y="178" text-anchor="middle" font-size="9" fill="#555">recursief · semantisch</text>
  <text x="535" y="192" text-anchor="middle" font-size="9" fill="#555">structureel · laat</text>

  <rect x="450" y="212" width="170" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="535" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">antwoordspan-containment</text>
  <text x="535" y="242" text-anchor="middle" font-size="9" fill="#827717">grensbreukpercentage</text>
  <text x="535" y="255" text-anchor="middle" font-size="9" fill="#827717">Recall@k vs. grootte</text>

  <line x1="620" y1="171" x2="655" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 4: Enrich (NER/EL) -->
  <rect x="655" y="140" width="170" height="62" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="740" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#6a1b9a">Verrijk</text>
  <text x="740" y="178" text-anchor="middle" font-size="9" fill="#555">NER · entity link</text>
  <text x="740" y="192" text-anchor="middle" font-size="9" fill="#555">tags · hiërarchie</text>

  <rect x="655" y="212" width="170" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="740" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">EL F1 · NIL precision</text>
  <text x="740" y="242" text-anchor="middle" font-size="9" fill="#827717">hiërarchische F1</text>
  <text x="740" y="255" text-anchor="middle" font-size="9" fill="#827717">aliasdekking</text>

  <line x1="825" y1="171" x2="860" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 5: Embed -->
  <rect x="860" y="140" width="135" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="927" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Embed</text>
  <text x="927" y="178" text-anchor="middle" font-size="9" fill="#555">dense / sparse</text>
  <text x="927" y="192" text-anchor="middle" font-size="9" fill="#555">multi-vector</text>

  <rect x="860" y="212" width="135" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="927" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">domein nDCG@10</text>
  <text x="927" y="242" text-anchor="middle" font-size="9" fill="#827717">drift (KL · NN-stab.)</text>
  <text x="927" y="255" text-anchor="middle" font-size="9" fill="#827717">vs. BEIR/MMTEB</text>

  <line x1="995" y1="171" x2="1030" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 6: Index -->
  <rect x="1030" y="140" width="115" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="1087" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Index</text>
  <text x="1087" y="178" text-anchor="middle" font-size="9" fill="#555">HNSW / IVF</text>
  <text x="1087" y="192" text-anchor="middle" font-size="9" fill="#555">BM25 · hybride</text>

  <rect x="1030" y="212" width="115" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="1087" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">ANN recall vs. flat</text>
  <text x="1087" y="242" text-anchor="middle" font-size="9" fill="#827717">versheidsvertraging p99</text>
  <text x="1087" y="255" text-anchor="middle" font-size="9" fill="#827717">gefilterde zoek lat.</text>

  <!-- Lane summary -->
  <rect x="40" y="290" width="1105" height="58" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1" />
  <text x="592" y="312" text-anchor="middle" font-size="11" font-weight="600" fill="#1565c0">Offline corpusgereedheid zet de bovengrens. Verliest een chunk hier de antwoordspan, dan herstelt geen reranker dat later.</text>
  <text x="592" y="332" text-anchor="middle" font-size="10" fill="#1565c0">De meeste teams investeren te veel in retrieval en te weinig in parsen, normaliseren en chunken. Daar sterft productie-RAG stilletjes.</text>

  <!-- ============ ONLINE LANE ============ -->
  <rect x="20" y="378" width="1140" height="280" rx="10" fill="#f8f9fa" stroke="#cbd5e0" stroke-width="1" />
  <text x="40" y="402" font-size="13" font-weight="700" fill="#e65100">Online · Inferentie (per query)</text>
  <text x="40" y="418" font-size="10" fill="#888">Draait bij elk verzoek. Hier worden in productie de meeste metrics bewaakt.</text>

  <!-- Stage 7: Query Rewrite -->
  <rect x="40" y="440" width="160" height="62" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="120" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">Herschrijf / Routeer</text>
  <text x="120" y="478" text-anchor="middle" font-size="9" fill="#555">HyDE · multi-query</text>
  <text x="120" y="492" text-anchor="middle" font-size="9" fill="#555">intentie · adaptief</text>

  <rect x="40" y="512" width="160" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="120" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">Recall@k uplift</text>
  <text x="120" y="542" text-anchor="middle" font-size="9" fill="#827717">routeringsnauwkeurigheid</text>
  <text x="120" y="555" text-anchor="middle" font-size="9" fill="#827717">no-op-percentage</text>

  <line x1="200" y1="471" x2="235" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 8: Retrieve -->
  <rect x="235" y="440" width="160" height="62" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="315" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">Ophalen</text>
  <text x="315" y="478" text-anchor="middle" font-size="9" fill="#555">dense + sparse + RRF</text>
  <text x="315" y="492" text-anchor="middle" font-size="9" fill="#555">filterpredicaten</text>

  <rect x="235" y="512" width="160" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="315" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">Recall@k · MRR · nDCG</text>
  <text x="315" y="542" text-anchor="middle" font-size="9" fill="#827717">context precision/recall</text>
  <text x="315" y="555" text-anchor="middle" font-size="9" fill="#827717">hybride lift</text>

  <line x1="395" y1="471" x2="430" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 9: Filter (highlighted) -->
  <rect x="430" y="440" width="160" height="62" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="2" filter="url(#shadowEval)" />
  <text x="510" y="462" text-anchor="middle" font-size="12" font-weight="700" fill="#c62828">Filter (de stille killer)</text>
  <text x="510" y="478" text-anchor="middle" font-size="9" fill="#555">tenant · ACL · tag</text>
  <text x="510" y="492" text-anchor="middle" font-size="9" fill="#555">hard vs. zacht</text>

  <rect x="430" y="512" width="160" height="48" rx="6" fill="#ffebee" stroke="#c62828" stroke-width="1.2" />
  <text x="510" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#c62828">filter false-exclusion rate</text>
  <text x="510" y="542" text-anchor="middle" font-size="9" fill="#c62828">predicate precision/recall</text>
  <text x="510" y="555" text-anchor="middle" font-size="9" fill="#c62828">shadow-retrieval Δ</text>

  <line x1="590" y1="471" x2="625" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 10: Rerank -->
  <rect x="625" y="440" width="160" height="62" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="705" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">Rerank</text>
  <text x="705" y="478" text-anchor="middle" font-size="9" fill="#555">cross-encoder · listwise</text>
  <text x="705" y="492" text-anchor="middle" font-size="9" fill="#555">BGE · Cohere · ZeRank</text>

  <rect x="625" y="512" width="160" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="705" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">ΔnDCG · ΔMRR · ΔP@1</text>
  <text x="705" y="542" text-anchor="middle" font-size="9" fill="#827717">robuustheid voor afleiders</text>
  <text x="705" y="555" text-anchor="middle" font-size="9" fill="#827717">latency p95</text>

  <line x1="785" y1="471" x2="820" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 11: Assemble -->
  <rect x="820" y="440" width="160" height="62" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="900" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">Context samenstellen</text>
  <text x="900" y="478" text-anchor="middle" font-size="9" fill="#555">volgorde · comprimeer</text>
  <text x="900" y="492" text-anchor="middle" font-size="9" fill="#555">tokenbudget</text>

  <rect x="820" y="512" width="160" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="900" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">contextbenutting</text>
  <text x="900" y="542" text-anchor="middle" font-size="9" fill="#827717">lost-in-the-middle</text>
  <text x="900" y="555" text-anchor="middle" font-size="9" fill="#827717">compressie × correctheid</text>

  <line x1="980" y1="471" x2="1015" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 12: Generate -->
  <rect x="1015" y="440" width="130" height="62" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="1080" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#6a1b9a">Genereer</text>
  <text x="1080" y="478" text-anchor="middle" font-size="9" fill="#555">LLM call</text>
  <text x="1080" y="492" text-anchor="middle" font-size="9" fill="#555">+ citaties</text>

  <rect x="1015" y="512" width="130" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="1080" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">faithfulness · HHEM</text>
  <text x="1080" y="542" text-anchor="middle" font-size="9" fill="#827717">citation P/R</text>
  <text x="1080" y="555" text-anchor="middle" font-size="9" fill="#827717">FActScore</text>

  <!-- Lane summary -->
  <rect x="40" y="582" width="1105" height="58" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1" />
  <text x="592" y="604" text-anchor="middle" font-size="11" font-weight="600" fill="#e65100">Een slechte filter of foute rewrite zet recall op nul vóór ranking begint. Faithfulness oogt nog steeds goed — het model zegt trouw: "Ik weet het niet."</text>
  <text x="592" y="624" text-anchor="middle" font-size="10" fill="#e65100">Volg exclusion rate naast Recall@k. Anders misleiden canonieke IR-metrics je over een gezonde retriever.</text>

  <!-- ============ POST-GEN LANE ============ -->
  <rect x="20" y="668" width="1140" height="78" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1" />
  <text x="40" y="692" font-size="13" font-weight="700" fill="#2e7d32">Na generatie · Verificatie &amp; Telemetrie</text>

  <rect x="40" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="150" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">claimverificatie · NLI · zelfconsistentie</text>

  <rect x="270" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="380" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">schema-validiteit · entity grounding · ECE</text>

  <rect x="500" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="610" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">regen-percentage · thumbs · dwell · CTR op citaties</text>

  <rect x="730" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="840" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">drift (query/embed) · kosten/query · p95</text>

  <rect x="960" y="704" width="185" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="1052" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">shadow eval · HITL-wachtrij</text>
</svg>
