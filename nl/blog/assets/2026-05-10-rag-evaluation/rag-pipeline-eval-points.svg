<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrEval" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555" />
    </marker>
    <filter id="shadowEval" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Title -->
  <text x="590" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a2e">De RAG-pijplijn met evaluatiepunten</text>
  <text x="590" y="54" text-anchor="middle" font-size="12" fill="#666">Elke fase krijgt een metriek. De metriek is wat stille fouten ontdekt.</text>

  <!-- ============ OFFLINE LANE ============ -->
  <rect x="20" y="78" width="1140" height="290" rx="10" fill="#f8f9fa" stroke="#cbd5e0" stroke-width="1" />
  <text x="40" y="102" font-size="13" font-weight="700" fill="#1565c0">Offline · Ingestie</text>
  <text x="40" y="118" font-size="10" fill="#888">Wordt één keer uitgevoerd per versie van het corpus. Stelt de maximale waarde in.</text>

  <!-- Stage 1: Acquire / Parse -->
  <rect x="40" y="140" width="170" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="125" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Verzamelen en analyseren</text>
  <text x="125" y="178" text-anchor="middle" font-size="9" fill="#555">PDF's · HTML · OCR</text>
  <text x="125" y="192" text-anchor="middle" font-size="9" fill="#555">Tabellen · Opmaak</text>

  <!-- Metric badge 1 -->
  <rect x="40" y="212" width="170" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="125" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">CER · WER · TEDS</text>
  <text x="125" y="242" text-anchor="middle" font-size="9" fill="#827717">analyseer slagingspercentage</text>
  <text x="125" y="255" text-anchor="middle" font-size="9" fill="#827717">layoutnauwkeurigheid</text>

  <!-- Arrow -->
  <line x1="210" y1="171" x2="245" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 2: Normalize / Dedup -->
  <rect x="245" y="140" width="170" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="330" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Normaliseren en duplicaten verwijderen</text>
  <text x="330" y="178" text-anchor="middle" font-size="9" fill="#555">NFC/NFKC · MinHash</text>
  <text x="330" y="192" text-anchor="middle" font-size="9" fill="#555">PII · standaardtemplate</text>

  <rect x="245" y="212" width="170" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="330" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">dup-recall/precisie</text>
  <text x="330" y="242" text-anchor="middle" font-size="9" fill="#827717">Herinnering van PII (per type)</text>
  <text x="330" y="255" text-anchor="middle" font-size="9" fill="#827717">Langdetectie F1</text>

  <line x1="415" y1="171" x2="450" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 3: Chunk -->
  <rect x="450" y="140" width="170" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="535" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Blok</text>
  <text x="535" y="178" text-anchor="middle" font-size="9" fill="#555">recursief · semantisch</text>
  <text x="535" y="192" text-anchor="middle" font-size="9" fill="#555">structuurgerelateerd · laat</text>

  <rect x="450" y="212" width="170" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="535" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">beheersing van answer-span</text>
  <text x="535" y="242" text-anchor="middle" font-size="9" fill="#827717">snelheid van grensbreuk</text>
  <text x="535" y="255" text-anchor="middle" font-size="9" fill="#827717">Recall@k versus grootte</text>

  <line x1="620" y1="171" x2="655" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 4: Enrich (NER/EL) -->
  <rect x="655" y="140" width="170" height="62" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="740" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#6a1b9a">Verrijken</text>
  <text x="740" y="178" text-anchor="middle" font-size="9" fill="#555">NER · entiteitslinking</text>
  <text x="740" y="192" text-anchor="middle" font-size="9" fill="#555">tags · hiërarchie</text>

  <rect x="655" y="212" width="170" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="740" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">EL F1 · Nul nauwkeurigheid</text>
  <text x="740" y="242" text-anchor="middle" font-size="9" fill="#827717">hiërarchische F1</text>
  <text x="740" y="255" text-anchor="middle" font-size="9" fill="#827717">alias-dekking</text>

  <line x1="825" y1="171" x2="860" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 5: Embed -->
  <rect x="860" y="140" width="135" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="927" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Embedden</text>
  <text x="927" y="178" text-anchor="middle" font-size="9" fill="#555">dicht / dun</text>
  <text x="927" y="192" text-anchor="middle" font-size="9" fill="#555">meervoudige vector</text>

  <rect x="860" y="212" width="135" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="927" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">domijn nDCG@10</text>
  <text x="927" y="242" text-anchor="middle" font-size="9" fill="#827717">drift (KL · NN-stabiliteit)</text>
  <text x="927" y="255" text-anchor="middle" font-size="9" fill="#827717">tegenover BEIR/MMTEB</text>

  <line x1="995" y1="171" x2="1030" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 6: Index -->
  <rect x="1030" y="140" width="115" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="1087" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Index</text>
  <text x="1087" y="178" text-anchor="middle" font-size="9" fill="#555">HNSW / IVF</text>
  <text x="1087" y="192" text-anchor="middle" font-size="9" fill="#555">BM25 · hybride</text>

  <rect x="1030" y="212" width="115" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="1087" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">ANN-recall versus constantwaarde</text>
  <text x="1087" y="242" text-anchor="middle" font-size="9" fill="#827717">p99-vertraging van de versheid</text>
  <text x="1087" y="255" text-anchor="middle" font-size="9" fill="#827717">gefilterde zoekfunctie – breedtegraad.</text>

  <!-- Lane summary -->
  <rect x="40" y="290" width="1105" height="58" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1" />
  <text x="592" y="312" text-anchor="middle" font-size="11" font-weight="600" fill="#1565c0">De klaarheid van het offline corpus bepaalt de bovengrens. Als een fragment hier het antwoordgedeelte mist, kan geen herranker dit later nog herstellen.</text>
  <text x="592" y="332" text-anchor="middle" font-size="10" fill="#1565c0">De meeste teams investeren te veel in het ophalen van gegevens en te weinig in parsing, normalisatie en chunking. Hierdoor sterft productie-RAG stilletjes weg.</text>

  <!-- ============ ONLINE LANE ============ -->
  <rect x="20" y="378" width="1140" height="280" rx="10" fill="#f8f9fa" stroke="#cbd5e0" stroke-width="1" />
  <text x="40" y="402" font-size="13" font-weight="700" fill="#e65100">Online · Inferentie (per verzoek)</text>
  <text x="40" y="418" font-size="10" fill="#888">Wordt uitgevoerd bij elke verzoek. De lijn waar de meeste metrics in productie worden gevolgd.</text>

  <!-- Stage 7: Query Rewrite -->
  <rect x="40" y="440" width="160" height="62" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="120" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">Opnieuw schrijven / Routeren</text>
  <text x="120" y="478" text-anchor="middle" font-size="9" fill="#555">HyDE · meervoudige query’s</text>
  <text x="120" y="492" text-anchor="middle" font-size="9" fill="#555">intentie · adaptief</text>

  <rect x="40" y="512" width="160" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="120" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">Recall@k verbetering</text>
  <text x="120" y="542" text-anchor="middle" font-size="9" fill="#827717">routingnauwkeurigheid</text>
  <text x="120" y="555" text-anchor="middle" font-size="9" fill="#827717">foutratio</text>

  <line x1="200" y1="471" x2="235" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 8: Retrieve -->
  <rect x="235" y="440" width="160" height="62" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="315" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">Ophalen</text>
  <text x="315" y="478" text-anchor="middle" font-size="9" fill="#555">dichte + spaarzame + RRF</text>
  <text x="315" y="492" text-anchor="middle" font-size="9" fill="#555">filterpredicaten</text>

  <rect x="235" y="512" width="160" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="315" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">Recall@k · MRR · nDCG</text>
  <text x="315" y="542" text-anchor="middle" font-size="9" fill="#827717">contextuele precisie/herinnering</text>
  <text x="315" y="555" text-anchor="middle" font-size="9" fill="#827717">hybride lift</text>

  <line x1="395" y1="471" x2="430" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 9: Filter (highlighted) -->
  <rect x="430" y="440" width="160" height="62" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="2" filter="url(#shadowEval)" />
  <text x="510" y="462" text-anchor="middle" font-size="12" font-weight="700" fill="#c62828">Filter (de stille moordenaar)</text>
  <text x="510" y="478" text-anchor="middle" font-size="9" fill="#555">tenant · ACL · tag</text>
  <text x="510" y="492" text-anchor="middle" font-size="9" fill="#555">hard versus zacht</text>

  <rect x="430" y="512" width="160" height="48" rx="6" fill="#ffebee" stroke="#c62828" stroke-width="1.2" />
  <text x="510" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#c62828">frequentie van valse uitsluiting bij filtering</text>
  <text x="510" y="542" text-anchor="middle" font-size="9" fill="#c62828">precisie/recall van het predicaat</text>
  <text x="510" y="555" text-anchor="middle" font-size="9" fill="#c62828">schaduwopname Δ</text>

  <line x1="590" y1="471" x2="625" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 10: Rerank -->
  <rect x="625" y="440" width="160" height="62" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="705" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">Herranken</text>
  <text x="705" y="478" text-anchor="middle" font-size="9" fill="#555">kruisencoder · per lijst</text>
  <text x="705" y="492" text-anchor="middle" font-size="9" fill="#555">BGE · Cohere · ZeRank</text>

  <rect x="625" y="512" width="160" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="705" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">ΔnDCG · ΔMRR · ΔP@1</text>
  <text x="705" y="542" text-anchor="middle" font-size="9" fill="#827717">robustheid tegen afleidingen</text>
  <text x="705" y="555" text-anchor="middle" font-size="9" fill="#827717">latentie p95</text>

  <line x1="785" y1="471" x2="820" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 11: Assemble -->
  <rect x="820" y="440" width="160" height="62" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="900" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">Context samenstellen</text>
  <text x="900" y="478" text-anchor="middle" font-size="9" fill="#555">ordenen · comprimeren</text>
  <text x="900" y="492" text-anchor="middle" font-size="9" fill="#555">budgettokens</text>

  <rect x="820" y="512" width="160" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="900" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">contextgebruik</text>
  <text x="900" y="542" text-anchor="middle" font-size="9" fill="#827717">verlies in het midden</text>
  <text x="900" y="555" text-anchor="middle" font-size="9" fill="#827717">compressie × correctheid</text>

  <line x1="980" y1="471" x2="1015" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 12: Generate -->
  <rect x="1015" y="440" width="130" height="62" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="1080" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#6a1b9a">Genereren</text>
  <text x="1080" y="478" text-anchor="middle" font-size="9" fill="#555">Oproep naar LLM</text>
  <text x="1080" y="492" text-anchor="middle" font-size="9" fill="#555">+ citaties</text>

  <rect x="1015" y="512" width="130" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="1080" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">getrouwheid · HHEM</text>
  <text x="1080" y="542" text-anchor="middle" font-size="9" fill="#827717">citatie P/R</text>
  <text x="1080" y="555" text-anchor="middle" font-size="9" fill="#827717">FactScore</text>

  <!-- Lane summary -->
  <rect x="40" y="582" width="1105" height="58" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1" />
  <text x="592" y="604" text-anchor="middle" font-size="11" font-weight="600" fill="#e65100">Een slechte filter of een verkeerde herschrijving zet de recall op nul voordat het rangschikken begint. De nauwkeurigheid ziet er nog steeds goed uit — het model zegt correct "Ik weet het niet."</text>
  <text x="592" y="624" text-anchor="middle" font-size="10" fill="#e65100">Houd de uitsluitingsgraad van de track bij in combinatie met Recall@k. Anders zullen de standaard IR-metingen je voorliegen over de prestaties van de retriever.</text>

  <!-- ============ POST-GEN LANE ============ -->
  <rect x="20" y="668" width="1140" height="78" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1" />
  <text x="40" y="692" font-size="13" font-weight="700" fill="#2e7d32">Nadere generatie · Verificatie en telemetrie</text>

  <rect x="40" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="150" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">verificatie van claims · NLI · zelfconsistentie</text>

  <rect x="270" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="380" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">validiteit van schema · entiteitenverankering · ECE</text>

  <rect x="500" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="610" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">regenrate · duimen · verblijfsduur · CTR op citaten</text>

  <rect x="730" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="840" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">drift (query/embed) · kosten/per query · p95</text>

  <rect x="960" y="704" width="185" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="1052" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">schaduwevaluatie · HITL-queue</text>
</svg>
