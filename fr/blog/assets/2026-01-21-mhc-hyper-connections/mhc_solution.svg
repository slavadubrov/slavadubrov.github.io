<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" style="background-color: #f8fafc; font-family: Inter, system-ui, sans-serif;" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Solution mHC : Structuration contrainte par les manifolds</title>
  <desc id="artifact-desc">Solution mHC : Structuration contrainte par les manifolds.</desc>
  <defs>
    <!-- Background grid -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#e2e8f0" stroke-width="0.5" />
    </pattern>

    <!-- Markers for arrows -->
    <marker id="arrowEmerald" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#166534" />
    </marker>
    <marker id="arrowAmber" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#ea580c" />
    </marker>

    <!-- Glow & Shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background grid layer -->
  <rect width="1000" height="520" fill="#f8fafc" />

  <!-- Top Title -->
  <text y="50" font-size="28" font-weight="800" fill="#0f172a" x="40">Solution mHC : Structuration contrainte par les manifolds</text>
  <text y="80" font-size="16" fill="#334155" x="40">Projeter proprement les matrices de routage sur le polytope de Birkhoff.</text>

  <!-- Main Container -->
  <g transform="translate(60, 120)">

    <!-- Left Background Block (Constraints List) -->
    <rect x="0" y="0" width="300" height="280" rx="12" fill="#ffffff" fill-opacity="0.95" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)" />

    <text y="40" font-size="20" font-weight="800" fill="#0f172a" x="20">Conditions de Birkhoff</text>
    <line x1="20" y1="55" x2="280" y2="55" stroke="#e2e8f0" stroke-width="2" />

    <!-- Constraint 1 -->
    <g transform="translate(20, 80)">
      <rect x="0" y="0" width="20" height="20" rx="4" fill="#fff7ed" stroke="#ea580c" stroke-width="1" />
      <text y="15" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412" x="10">1</text>
      <text y="16" font-size="16" font-weight="700" fill="#9a3412" x="35">Règle de positivité</text>
      <text y="38" font-size="13" fill="#334155" x="35">Tous les éléments doivent être supérieurs à 0.</text>
      <text y="56" font-size="13" fill="#334155" x="35">prévenir l’oscillation du dégradé.</text>
    </g>

    <!-- Constraint 2 -->
    <g transform="translate(20, 150)">
      <rect x="0" y="0" width="20" height="20" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-width="1" />
      <text y="15" text-anchor="middle" font-size="13" font-weight="700" fill="#166534" x="10">2</text>
      <text y="16" font-size="16" font-weight="700" fill="#166534" x="35">Normalisation des lignes</text>
      <text y="38" font-size="13" fill="#334155" x="35">La somme totale de chaque ligne est égale à 1,0.</text>
      <text y="56" font-size="13" fill="#334155" x="35">correction de l’échelle du canal de sortie.</text>
    </g>

    <!-- Constraint 3 -->
    <g transform="translate(20, 220)">
      <rect x="0" y="0" width="20" height="20" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1" />
      <text y="15" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8" x="10">3</text>
      <text y="16" font-size="16" font-weight="700" fill="#1d4ed8" x="35">Normalisation des colonnes</text>
      <text y="38" font-size="13" fill="#334155" x="35">La somme totale de chaque colonne est égale à 1,0.</text>
      <text y="56" font-size="13" fill="#334155" x="35">correction de la distribution équitable des entrées.</text>
    </g>

    <!-- Connecting Arrow to Matrix -->
    <line x1="315" y1="140" x2="350" y2="140" stroke="#cbd5e1" stroke-width="3" stroke-dasharray="6,4" marker-end="url(#arrowSlate)" />


    <!-- Center Matrix Display -->
    <g transform="translate(370, 0)">
      <rect x="0" y="0" width="480" height="280" rx="12" fill="#ffffff" fill-opacity="0.95" stroke="#16a34a" stroke-width="2" filter="url(#shadow)" />
      <text y="40" text-anchor="middle" font-size="18" font-weight="800" fill="#166534" x="240">La matrice stochastique double cible</text>

      <g transform="translate(65, 70)">

        <!-- Grid Structure -->
        <path d="M 0 0 L 300 0 L 300 160 L 0 160 Z" fill="#ffffff" stroke="#94a3b8" stroke-width="1" />
        <!-- Inner lines -->
        <g stroke="#cbd5e1" stroke-width="1">
          <line x1="75" y1="0" x2="75" y2="160" />
          <line x1="150" y1="0" x2="150" y2="160" />
          <line x1="225" y1="0" x2="225" y2="160" />
          <line x1="0" y1="40" x2="300" y2="40" />
          <line x1="0" y1="80" x2="300" y2="80" />
          <line x1="0" y1="120" x2="300" y2="120" />
        </g>

        <!-- Values representing Doubly Stochastic Structure -->
        <g fill="#0f172a" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="600" text-anchor="middle">
          <!-- Row 1 -->
          <text y="27" x="37">0,15</text>  <text y="27" x="112">0,35</text>  <text y="27" x="187">0,40</text>  <text y="27" x="262">0,10</text>
          <!-- Row 2 -->
          <text y="67" x="37">0,45</text>  <text y="67" x="112">0,10</text>  <text y="67" x="187">0,25</text>  <text y="67" x="262">0,20</text>
          <!-- Row 3 -->
          <text y="107" x="37">0,30</text> <text y="107" x="112">0,25</text> <text y="107" x="187">0,15</text> <text y="107" x="262">0,30</text>
          <!-- Row 4 -->
          <text y="147" x="37">0,10</text> <text y="147" x="112">0,30</text> <text y="147" x="187">0,20</text> <text y="147" x="262">0,40</text>
        </g>

        <!-- Constraint Highlighting / Animation setup -->
        <!-- Highlight Row sum -->
        <text id="rowSumText" y="26" text-anchor="start" fill="#166534" font-size="14" font-weight="800" x="315">→ Σ = 1,0</text>

        <!-- Highlight Col sum -->
        <g text-anchor="middle" fill="#2563eb" font-size="14" font-weight="800">
          <text y="180" x="37">↓</text>
          <text id="colSumText" y="195" x="37">Σ = 1,0</text>
        </g>

        <!-- Animation block indicating scanning validation matrix -->




        <!-- Static Indicators (Remaining rows) -->
        <g font-size="14" font-weight="800" fill="#16a34a">
          <text y="66" x="315">→ Σ = 1,0</text>
          <text y="106" x="315">→ Σ = 1,0</text>
          <text y="146" x="315">→ Σ = 1,0</text>
        </g>

        <!-- Static Indicators (Remaining cols) -->
        <g font-size="14" font-weight="800" fill="#2563eb" text-anchor="middle">
          <text y="180" x="112">↓</text> <text y="195" x="112">Σ = 1,0</text>
          <text y="180" x="187">↓</text> <text y="195" x="187">Σ = 1,0</text>
          <text y="180" x="262">↓</text> <text y="195" x="262">Σ = 1,0</text>
        </g>

        <rect x="0" y="0" width="300" height="160" fill="none" stroke="#ea580c" stroke-width="2" />
        <text y="-12" text-anchor="middle" font-size="12" font-weight="700" fill="#ea580c" x="150">Condition 1 : Toutes les valeurs &gt; 0</text>

      </g>
    </g>
  </g>

  <!-- Bottom Outcome Strip -->
  <rect x="60" y="425" width="850" height="50" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" filter="url(#shadow)" />
  <text y="456" text-anchor="middle" font-size="18" font-weight="800" fill="#166534" x="485">Résultat : Énergie d’entrée = Énergie de sortie.</text>
  <text y="456" text-anchor="start" font-size="15" font-weight="600" fill="#166534" x="700"> Le signal est conservé indéfiniment.</text>

</svg>
