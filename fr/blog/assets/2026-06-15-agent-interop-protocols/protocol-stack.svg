<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Agent interoperability protocol stack</title>
  <desc id="desc">Diagram showing MCP for tool access, A2A for agent delegation, OASF or directories for discovery, and AP2 or UCP for commerce authorization.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#1d4ed8" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="960" height="560" fill="#f8fafc"/>
  <text y="46" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="700" fill="#0f172a" x="480">Four boundaries, four different jobs</text>
  <text y="76" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#334155" x="480">Do not make one protocol carry tool access, delegation, discovery, and payment proof.</text>

  <g filter="url(#shadow)">
    <rect x="60" y="132" width="190" height="116" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text y="166" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#1d4ed8" x="155">MCP</text>
    <text y="195" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#1d4ed8" x="155">Tools, resources,</text>
    <text y="216" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#1d4ed8" x="155">prompts, sampling</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="300" y="132" width="190" height="116" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="2"/>
    <text y="166" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#166534" x="395">A2A</text>
    <text y="195" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#1d4ed8" x="395">Agent cards, tasks,</text>
    <text y="216" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#1d4ed8" x="395">streaming, auth state</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="540" y="132" width="190" height="116" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text y="166" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#9a3412" x="635">Directories</text>
    <text y="195" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#1d4ed8" x="635">OASF, identity,</text>
    <text y="216" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#1d4ed8" x="635">capability discovery</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="770" y="132" width="130" height="116" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
    <text y="166" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#5b21b6" x="835">AP2/UCP</text>
    <text y="195" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#1d4ed8" x="835">Mandates,</text>
    <text y="216" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#1d4ed8" x="835">checkout proof</text>
  </g>

  <path d="M250 190 H300" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M490 190 H540" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M730 190 H770" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="115" y="335" width="730" height="120" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text y="371" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="700" fill="#0f172a" x="480">Composed workflow</text>
    <text y="404" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#334155" x="480">Discover a merchant agent, delegate checkout over A2A, call catalog and cart tools through MCP,</text>
    <text y="429" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#334155" x="480">then bind payment to a signed AP2-style mandate so the remote agent cannot improvise authority.</text>
  </g>

  <path d="M155 248 C155 295 260 302 320 335" fill="none" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M395 248 C395 290 430 304 455 335" fill="none" stroke="#166534" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M635 248 C635 290 595 304 565 335" fill="none" stroke="#ea580c" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M835 248 C835 295 720 302 650 335" fill="none" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arrow)"/>

  <text y="512" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#334155" x="480">Rule of thumb: use MCP inside an agent, A2A between agents, directories to find agents, and AP2/UCP when money or delegated authority enters the path.</text>
</svg>
