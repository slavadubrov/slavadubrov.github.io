<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Le terme « produit » modélisé différemment selon les contextes délimités</title>
  <desc id="desc">La gestion des commandes, la facturation et l’inventaire définissent chacun le produit selon leurs propres règles. Un contrat de traduction publié établit une correspondance entre les termes et les identifiants entre ces systèmes.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="470" rx="22" fill="#0f172a" />
  <text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Un mot, trois significations délimitées</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(35 105)"><rect width="270" height="220" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="135" y="42" text-anchor="middle" font-size="18" font-weight="700" fill="#93c5fd">Gestion des commandes</text><text x="135" y="90" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Produit = ligne de commande</text><text x="35" y="130" font-size="13" fill="#cbd5e1">quantité</text><text x="35" y="158" font-size="13" fill="#cbd5e1">promesse de livraison</text><text x="35" y="186" font-size="13" fill="#cbd5e1">statut d’exécution</text></g>
    <g transform="translate(365 105)"><rect width="270" height="220" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="135" y="42" text-anchor="middle" font-size="18" font-weight="700" fill="#93c5fd">Facturation</text><text x="135" y="90" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Produit = ligne tarifaire</text><text x="35" y="130" font-size="13" fill="#cbd5e1">catégorie fiscale</text><text x="35" y="158" font-size="13" fill="#cbd5e1">éligibilité à la remise</text><text x="35" y="186" font-size="13" fill="#cbd5e1">montant de règlement</text></g>
    <g transform="translate(695 105)"><rect width="270" height="220" rx="16" fill="#9a3412" stroke="#ea580c" stroke-width="2" /><text x="135" y="42" text-anchor="middle" font-size="18" font-weight="700" fill="#fdba74">Inventaire</text><text x="135" y="90" text-anchor="middle" font-size="16" font-weight="700" fill="#fdba74">Produit = article en stock</text><text x="35" y="130" font-size="13" fill="#cbd5e1">SKU</text><text x="35" y="158" font-size="13" fill="#cbd5e1">localisation du entrepôt</text><text x="35" y="186" font-size="13" fill="#cbd5e1">quantité disponible</text></g>
    <rect x="180" y="370" width="640" height="60" rx="12" fill="#5b21b6" stroke="#2563eb" />
    <text x="500" y="395" text-anchor="middle" font-size="15" font-weight="700" fill="#c4b5fd">Contrat de traduction publié</text>
    <text x="500" y="418" text-anchor="middle" font-size="12" fill="#93c5fd">Cartographie des identifiants et des termes sans imposer un objet Product commun</text>
  </g>
</svg>
