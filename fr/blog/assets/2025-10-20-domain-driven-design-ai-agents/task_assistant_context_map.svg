<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 430" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Gestion des tâches, planification et contextes de notification</title>
  <desc id="desc">La gestion de tâches constitue le domaine central. Elle fait appel à un contexte de planification auxiliaire et publie des faits consommés par un contexte de notification générique au moyen de contrats explicites.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="430" rx="22" fill="#0f172a" />
  <text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Carte de contexte de l’assistant de tâches</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(35 120)"><rect width="250" height="190" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="125" y="42" text-anchor="middle" font-size="18" font-weight="700" fill="#93c5fd">Planification</text><text x="125" y="72" text-anchor="middle" font-size="13" fill="#93c5fd">Domaine secondaire de soutien</text><text x="32" y="116" font-size="13" fill="#cbd5e1">calendrier</text><text x="32" y="145" font-size="13" fill="#cbd5e1">fenêtre temporelle</text><text x="32" y="174" font-size="13" fill="#cbd5e1">disponibilité</text></g>
    <text x="330" y="220" text-anchor="middle" font-size="11" fill="#94a3b8">date de contrat →</text>
    <g transform="translate(375 95)"><rect width="250" height="240" rx="16" fill="#9a3412" stroke="#ea580c" stroke-width="3" /><text x="125" y="46" text-anchor="middle" font-size="19" font-weight="700" fill="#fdba74">Gestion de tâches</text><text x="125" y="78" text-anchor="middle" font-size="13" fill="#fdba74">Domaine cœur</text><text x="32" y="125" font-size="13" fill="#cbd5e1">tâche et liste de tâches</text><text x="32" y="156" font-size="13" fill="#cbd5e1">date limite et priorité</text><text x="32" y="187" font-size="13" fill="#cbd5e1">règles de complétion</text><text x="32" y="218" font-size="13" fill="#cbd5e1">Événement TaskAdded</text></g>
    <text x="670" y="220" text-anchor="middle" font-size="11" fill="#94a3b8">contrat d’événement →</text>
    <g transform="translate(715 120)"><rect width="250" height="190" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="125" y="42" text-anchor="middle" font-size="18" font-weight="700" fill="#93c5fd">Notifications</text><text x="125" y="72" text-anchor="middle" font-size="13" fill="#93c5fd">sous-domaine générique</text><text x="32" y="116" font-size="13" fill="#cbd5e1">livraison d’e-mails</text><text x="32" y="145" font-size="13" fill="#cbd5e1">livraison par envoi</text><text x="32" y="174" font-size="13" fill="#cbd5e1">attestation de livraison</text></g>
    <text x="500" y="390" text-anchor="middle" font-size="13" fill="#94a3b8">La carte de contexte décrit les relations métier ; elle ne prescrit pas l’existence d’un agent par case.</text>
  </g>
</svg>
