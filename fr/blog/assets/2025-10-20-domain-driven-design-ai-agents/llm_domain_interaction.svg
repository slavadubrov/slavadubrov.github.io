<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">La sortie du modèle est traduite en commande de domaine et vérifiée selon des règles déterministes</title>
  <desc id="desc">&lt;EOC_TEXT Un modèle émet une proposition typée non fiable. Une frontière d’application la parse et la normalise, autorise l’acteur concerné, invoque un agrégat, puis enregistre l’état accepté via un événement de sortie. Chaque étape rejetée génère une erreur distincte.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="480" rx="22" fill="#0f172a" />
  <text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Une proposition tapée n’est pas encore une opération commerciale valide</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(25 120)"><rect width="155" height="125" rx="14" fill="#5b21b6" stroke="#2563eb" stroke-width="2" /><text x="77" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#c4b5fd">Adapter de modèle</text><text x="77" y="70" text-anchor="middle" font-size="12" fill="#c4b5fd">Envoyer une proposition de tâche</text><text x="77" y="94" text-anchor="middle" font-size="12" fill="#94a3b8">valeurs non fiables</text></g>
    <text x="202" y="192" text-anchor="middle" font-size="25" fill="#94a3b8">→</text>
    <g transform="translate(225 120)"><rect width="155" height="125" rx="14" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="77" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Parser et normaliser</text><text x="77" y="70" text-anchor="middle" font-size="12" fill="#93c5fd">forme, date, unités</text><text x="77" y="94" text-anchor="middle" font-size="12" fill="#94a3b8">contexte de confiance</text></g>
    <text x="402" y="192" text-anchor="middle" font-size="25" fill="#94a3b8">→</text>
    <g transform="translate(425 120)"><rect width="155" height="125" rx="14" fill="#9a3412" stroke="#ea580c" stroke-width="2" /><text x="77" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#fdba74">Autoriser</text><text x="77" y="70" text-anchor="middle" font-size="12" fill="#fdba74">acteur + propriétaire</text><text x="77" y="94" text-anchor="middle" font-size="12" fill="#94a3b8">portée d’opération</text></g>
    <text x="602" y="192" text-anchor="middle" font-size="25" fill="#94a3b8">→</text>
    <g transform="translate(625 120)"><rect width="155" height="125" rx="14" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="77" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Aggrégation</text><text x="77" y="70" text-anchor="middle" font-size="12" fill="#93c5fd">imposer l’invariant</text><text x="77" y="94" text-anchor="middle" font-size="12" fill="#94a3b8">déclencher un événement de domaine</text></g>
    <text x="802" y="192" text-anchor="middle" font-size="25" fill="#94a3b8">→</text>
    <g transform="translate(825 120)"><rect width="150" height="125" rx="14" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="75" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Commiter</text><text x="75" y="70" text-anchor="middle" font-size="12" fill="#93c5fd">état + boîte de sortie</text><text x="75" y="94" text-anchor="middle" font-size="12" fill="#94a3b8">une transaction</text></g>

    <rect x="100" y="320" width="800" height="85" rx="14" fill="#991b1b" stroke="#dc2626" />
    <text x="500" y="351" text-anchor="middle" font-size="16" font-weight="700" fill="#fca5a5">Rejeter avec une erreur spécifique avant persistance</text>
    <text x="500" y="382" text-anchor="middle" font-size="13" fill="#fca5a5">proposition invalide • manque de contexte • acteur non autorisé • conflit de domaine • mise à jour concurrente</text>
    <text x="500" y="447" text-anchor="middle" font-size="13" fill="#94a3b8">La validation du schéma contrôle la représentation. L’agrégation contrôle la signification métier.</text>
  </g>
</svg>
