<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Inter, system-ui, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Chaîne de traitement pour l’entraînement des LLM : du pré-entraînement à l’alignement</title>
  <desc id="artifact-desc">Chaîne de traitement pour l’entraînement des LLM : du pré-entraînement à l’alignement.</desc>
  <defs>
    <marker id="arrow5" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b" />
    </marker>
    <marker id="arrow5b" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#166534" />
    </marker>
    <filter id="shadow5" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="900" height="420" fill="#f8fafc" rx="8" />

  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a" x="450">Chaîne de traitement pour l’entraînement des LLM : du pré-entraînement à l’alignement</text>

  <!-- Stage 1: Pretraining -->
  <rect x="30" y="60" width="200" height="170" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow5)" />
  <text y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#1d4ed8" x="130">Préentraînement</text>

  <rect x="50" y="95" width="160" height="55" rx="5" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="112" text-anchor="middle" font-size="10" fill="#0f172a" x="130">Prédiction du token suivant</text>
  <text y="126" text-anchor="middle" font-size="10" fill="#0f172a" x="130">Des trillions de tokens</text>
  <text y="140" text-anchor="middle" font-size="10" fill="#334155" x="130">Auto-supervisé</text>

  <text y="170" font-size="10" fill="#0f172a" x="50">Coût : 500 000 $ – 100 millions $+</text>
  <text y="185" font-size="10" fill="#0f172a" x="50">Calcul : 10²⁴–10²⁶ FLOPs</text>
  <text y="200" font-size="10" fill="#1d4ed8" font-weight="bold" x="50">ZeRO + FSDP + Précision mixte</text>
  <text y="215" font-size="9" fill="#334155" x="50">Chinchilla → Surapprentissage des petits modèles</text>

  <!-- Arrow 1→2 -->
  <line x1="230" y1="145" x2="275" y2="145" stroke="#334155" stroke-width="2" marker-end="url(#arrow5)" />

  <!-- Stage 2: SFT -->
  <rect x="275" y="60" width="180" height="170" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadow5)" />
  <text y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#9a3412" x="365">Ajustement fin (SFT)</text>

  <rect x="295" y="95" width="140" height="55" rx="5" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="112" text-anchor="middle" font-size="10" fill="#0f172a" x="365">Données spécifiques à la tâche</text>
  <text y="126" text-anchor="middle" font-size="10" fill="#0f172a" x="365">Exemples étiquetés</text>
  <text y="140" text-anchor="middle" font-size="10" fill="#334155" x="365">Supervisé</text>

  <text y="170" font-size="10" fill="#0f172a" x="295">Coût : 100 $ – 10 000 $</text>
  <text y="185" font-size="10" fill="#0f172a" x="295">Calcul : 10¹⁸–10²¹ FLOPs</text>
  <text y="200" font-size="10" fill="#9a3412" font-weight="bold" x="295">LoRA / QLoRA (10 000 fois moins de paramètres)</text>
  <text y="215" font-size="9" fill="#334155" x="295">65 Go sur une seule GPU de 48 Go</text>

  <!-- Arrow 2→3 -->
  <line x1="455" y1="145" x2="500" y2="145" stroke="#334155" stroke-width="2" marker-end="url(#arrow5)" />

  <!-- Stage 3: Alignment (branching) -->
  <rect x="500" y="60" width="380" height="170" rx="10" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow5)" />
  <text y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#5b21b6" x="690">Alignement</text>

  <!-- RLHF branch -->
  <rect x="520" y="95" width="155" height="65" rx="5" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6" x="597">RLHF / PPO</text>
  <text y="127" text-anchor="middle" font-size="9" fill="#0f172a" x="597">Modèle de récompense + apprentissage par renforcement</text>
  <text y="141" text-anchor="middle" font-size="9" fill="#991b1b" x="597">4 copies du modèle en mémoire</text>
  <text y="153" text-anchor="middle" font-size="9" fill="#334155" x="597">Complexe, sensible aux hyperparamètres</text>

  <!-- DPO branch -->
  <rect x="690" y="95" width="80" height="65" rx="5" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6" x="730">DPO</text>
  <text y="127" text-anchor="middle" font-size="9" fill="#0f172a" x="730">Aucune RL requise</text>
  <text y="141" text-anchor="middle" font-size="9" fill="#166534" x="730">Plus simple, plus stable</text>
  <text y="153" text-anchor="middle" font-size="9" fill="#334155" x="730">Uniquement hors ligne</text>

  <!-- GRPO branch -->
  <rect x="785" y="95" width="80" height="65" rx="5" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6" x="825">GROUPE</text>
  <text y="127" text-anchor="middle" font-size="9" fill="#0f172a" x="825">Aucun modèle critique</text>
  <text y="141" text-anchor="middle" font-size="9" fill="#166534" x="825">Seulement 2 copies de LLM</text>
  <text y="153" text-anchor="middle" font-size="9" fill="#334155" x="825">DeepSeek-R1</text>

  <text y="185" font-size="10" fill="#0f172a" x="520">Données de préférences humaines/IA</text>
  <text y="200" font-size="10" fill="#0f172a" x="520">RLVR : récompenses basées sur des règles (mathématiques, code)</text>
  <text y="215" font-size="10" fill="#5b21b6" font-weight="bold" x="520">Tendance : PPO → DPO → GRPO (victoires plus simples)</text>

  <!-- Distillation path -->
  <rect x="30" y="270" width="850" height="130" rx="10" fill="#f0fdf4" stroke="#166534" stroke-width="2" filter="url(#shadow5)" />
  <text y="295" text-anchor="middle" font-size="15" font-weight="bold" fill="#166534" x="455">Distillation et données synthétiques</text>

  <!-- Teacher → Student flow -->
  <rect x="60" y="310" width="180" height="45" rx="5" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534" x="150">Enseignant de grande taille</text>
  <text y="345" text-anchor="middle" font-size="10" fill="#0f172a" x="150">DeepSeek-R1 (671B)</text>

  <line x1="240" y1="332" x2="305" y2="332" stroke="#166534" stroke-width="2" marker-end="url(#arrow5b)" />
  <text y="325" text-anchor="middle" font-size="9" fill="#166534" x="272">CoT de 800 K</text>
  <text y="350" text-anchor="middle" font-size="9" fill="#166534" x="272">exemples</text>

  <rect x="305" y="310" width="170" height="45" rx="5" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534" x="390">Étudiant compact</text>
  <text y="345" text-anchor="middle" font-size="10" fill="#0f172a" x="390">Modèles distillés de 1,5 Md à 70 Md d’éléments</text>

  <!-- Results -->
  <rect x="510" y="310" width="350" height="70" rx="5" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534" x="685">Résultats</text>
  <text y="347" font-size="10" fill="#0f172a" x="530">• 32 Go de modèles distillés OpenAI o1-mini</text>
  <text y="362" font-size="10" fill="#0f172a" x="530">• Distillation &gt; apprentissage par renforcement direct sur de petits modèles</text>
  <text y="377" font-size="10" fill="#166534" font-weight="bold" x="530">• Le chemin le plus efficace vers un raisonnement compact</text>

  <!-- Connection from alignment to distillation -->
  <path d="M690,230 L690,250 L455,250 L455,270" stroke="#166534" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow5b)" />
  <text y="248" font-size="9" fill="#166534" x="580">Le modèle de référence génère des données d’entraînement</text>
</svg>
