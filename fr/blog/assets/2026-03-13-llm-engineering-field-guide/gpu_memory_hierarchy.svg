<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="Inter, system-ui, sans-serif" role="img" aria-label="GPU Memory Hierarchy" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">GPU Hiérarchie mémoire</title>
  <defs>
    <linearGradient id="regGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#dc2626" />
      <stop offset="100%" stop-color="#dc2626" />
    </linearGradient>
    <linearGradient id="sramGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ea580c" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <linearGradient id="l2Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="hbmGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <filter id="shadow3" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="800" height="480" fill="#f8fafc" rx="8" />

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">Hiérarchie mémoire H100 SXM GPU</text>
  <text x="400" y="52" text-anchor="middle" font-size="12" fill="#334155">La pyramide de la vitesse de mémoire versus capacité qui guide l’optimisation de LLM</text>

  <!-- Pyramid layers (top = fastest, smallest) -->

  <!-- Registers -->
  <polygon points="400,80 310,150 490,150" fill="url(#regGrad)" stroke="#dc2626" stroke-width="1.5" filter="url(#shadow3)" />
  <text x="400" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Registres</text>
  <text x="400" y="135" text-anchor="middle" font-size="10" fill="#dc2626">Accès par thread</text>
  <text x="400" y="147" text-anchor="middle" font-size="10" fill="#dc2626">Les calculs mathématiques s’effectuent ici</text>

  <!-- Labels right side -->
  <line x1="452" y1="120" x2="560" y2="120" stroke="#dc2626" stroke-width="1" stroke-dasharray="4,3" />
  <text x="570" y="115" font-size="11" fill="#991b1b" font-weight="bold">Le plus rapide</text>
  <text x="570" y="130" font-size="10" fill="#334155">Capacité minimale</text>

  <!-- SRAM / Shared Memory -->
  <polygon points="310,160 240,240 560,240 490,160" fill="url(#sramGrad)" stroke="#ea580c" stroke-width="1.5" filter="url(#shadow3)" />
  <text x="400" y="195" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Mémoire partagée (SRAM)</text>
  <text x="400" y="212" text-anchor="middle" font-size="11" fill="#ea580c">227 KB/SM · ~33 TB/s en moyenne</text>
  <text x="400" y="228" text-anchor="middle" font-size="10" fill="#ea580c">FlashAttention les calculs sur des tuiles ici</text>

  <line x1="526" y1="200" x2="600" y2="200" stroke="#ea580c" stroke-width="1" stroke-dasharray="4,3" />
  <text x="610" y="195" font-size="11" fill="#9a3412" font-weight="bold">environ 33 TB/s</text>
  <text x="610" y="210" font-size="10" fill="#334155">Mémoire de travail</text>

  <!-- L2 Cache -->
  <polygon points="240,250 180,320 620,320 560,250" fill="url(#l2Grad)" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow3)" />
  <text x="400" y="275" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Caché L2</text>
  <text x="400" y="292" text-anchor="middle" font-size="11" fill="#7c3aed">50 Mo · ~12 To/s</text>
  <text x="400" y="308" text-anchor="middle" font-size="10" fill="#7c3aed">Boufère de sécurité pour tous les SM</text>

  <line x1="590" y1="285" x2="660" y2="285" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,3" />
  <text x="670" y="280" font-size="11" fill="#5b21b6" font-weight="bold">environ 12 TB/s</text>
  <text x="670" y="295" font-size="10" fill="#334155">Cache partagé</text>

  <!-- HBM3 -->
  <polygon points="180,330 100,420 700,420 620,330" fill="url(#hbmGrad)" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow3)" />
  <text x="400" y="365" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">Mémoire HBM3 (à large bande passante)</text>
  <text x="400" y="385" text-anchor="middle" font-size="12" fill="#2563eb">80 Go · 3,35 To/s</text>
  <text x="400" y="405" text-anchor="middle" font-size="11" fill="#2563eb">Les poids du modèle + KV cache sont stockés ici</text>

  <line x1="660" y1="375" x2="720" y2="375" stroke="#2563eb" stroke-width="1" stroke-dasharray="4,3" />
  <text x="725" y="370" font-size="11" fill="#1d4ed8" font-weight="bold">3,35 TB/s</text>
  <text x="725" y="385" font-size="10" fill="#334155" transform="translate(-20.23 0.00)">bouchon mémoire</text>

  <!-- Left side: Size labels -->
  <text x="90" y="125" font-size="10" fill="#334155" text-anchor="end">~KB</text>
  <text x="90" y="200" font-size="10" fill="#334155" text-anchor="end">227 KB/SM</text>
  <text x="90" y="285" font-size="10" fill="#334155" text-anchor="end">50 Mo</text>
  <text x="90" y="375" font-size="10" fill="#334155" text-anchor="end">80 Go</text>

  <!-- Bottom insight box -->
  <rect x="100" y="435" width="600" height="35" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" />
  <text x="400" y="457" text-anchor="middle" font-size="12" fill="#9a3412" font-weight="bold">Les noyaux conscients de la mémoire conservent les données réutilisées à proximité des unités de calcul et réduisent le trafic HBM</text>
</svg>
