<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Parallelism Strategies" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Stratégies de parallélisme</title>
  <defs>
    <marker id="arrow4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#334155" />
    </marker>
    <filter id="shadow4" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="900" height="520" fill="#f8fafc" rx="8" />

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">Quatre formes de parallélisme</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#334155">Comment distribuer le calcul de LLM sur plusieurs GPUs</text>

  <!-- TP: Tensor Parallelism -->
  <rect x="30" y="75" width="410" height="190" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow4)" />
  <text x="235" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#1d4ed8">Parallélisme des tenseurs (PT)</text>
  <text x="235" y="118" text-anchor="middle" font-size="11" fill="#334155">Distribuer les matrices de poids entre GPUs</text>

  <!-- Weight matrix split -->
  <rect x="60" y="130" width="160" height="50" rx="4" fill="#2563eb" opacity="0.7" />
  <text x="140" y="160" text-anchor="middle" font-size="11" fill="#ffffff">Matrice de poids W</text>
  <line x1="220" y1="155" x2="250" y2="155" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow4)" />
  <!-- Split parts -->
  <rect x="250" y="130" width="80" height="24" rx="3" fill="#2563eb" />
  <text x="290" y="147" text-anchor="middle" font-size="9" fill="#ffffff">W₁ → GPU 0</text>
  <rect x="250" y="157" width="80" height="24" rx="3" fill="#2563eb" />
  <text x="290" y="174" text-anchor="middle" font-size="9" fill="#ffffff">W₂ → GPU 1</text>

  <text x="60" y="205" font-size="10" fill="#0f172a">• All-reduce après chaque couche</text>
  <text x="60" y="220" font-size="10" fill="#0f172a">• Nécessite NVLink (900 GB/s sur H100)</text>
  <text x="60" y="235" font-size="10" fill="#0f172a">• Généralement conservé au sein d’un nœud à liaison rapide</text>
  <text x="60" y="250" font-size="10" fill="#1d4ed8" font-weight="bold">• Échange de communications afin de réduire la charge sur le dispositif</text>

  <!-- PP: Pipeline Parallelism -->
  <rect x="460" y="75" width="410" height="190" rx="10" fill="#f0fdf4" stroke="#166534" stroke-width="2" filter="url(#shadow4)" />
  <text x="665" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#166534">Pipeline parallélisme (PP)</text>
  <text x="665" y="118" text-anchor="middle" font-size="11" fill="#334155">Diviser les couches séquentiellement à l’intérieur de GPUs</text>

  <!-- Pipeline stages -->
  <rect x="490" y="132" width="75" height="40" rx="4" fill="#166534" />
  <text x="527" y="147" text-anchor="middle" font-size="9" fill="#ffffff">Les couches 1 à 20</text>
  <text x="527" y="160" text-anchor="middle" font-size="9" fill="#16a34a">GPU 0</text>
  <line x1="565" y1="152" x2="585" y2="152" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow4)" />
  <rect x="585" y="132" width="75" height="40" rx="4" fill="#16a34a" />
  <text x="622" y="147" text-anchor="middle" font-size="9" fill="#ffffff">Les couches 21 à 40</text>
  <text x="622" y="160" text-anchor="middle" font-size="9" fill="#16a34a">GPU 1</text>
  <line x1="660" y1="152" x2="680" y2="152" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow4)" />
  <rect x="680" y="132" width="75" height="40" rx="4" fill="#16a34a" />
  <text x="717" y="147" text-anchor="middle" font-size="9" fill="#ffffff">Les couches 41 à 60</text>
  <text x="717" y="160" text-anchor="middle" font-size="9" fill="#ffffff">GPU 2</text>

  <text x="490" y="200" font-size="10" fill="#0f172a">• Transmet les activations entre les étapes</text>
  <text x="490" y="215" font-size="10" fill="#0f172a">• Peut s’étendre sur plusieurs nœuds ; trafic d’activation des profils</text>
  <text x="490" y="230" font-size="10" fill="#0f172a">• bulles Pipeline (temps d’inactivité GPU)</text>
  <text x="490" y="245" font-size="10" fill="#166534" font-weight="bold">• Souvent combiné avec le TP au sein de chaque nœud</text>

  <!-- DP: Data Parallelism -->
  <rect x="30" y="285" width="410" height="190" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadow4)" />
  <text x="235" y="310" text-anchor="middle" font-size="15" font-weight="bold" fill="#9a3412">Parallélisme des données (PD)</text>
  <text x="235" y="328" text-anchor="middle" font-size="11" fill="#334155">Reproduire le modèle complet sur chaque GPU</text>

  <!-- Replicated models -->
  <rect x="70" y="342" width="90" height="45" rx="4" fill="#ea580c" />
  <text x="115" y="362" text-anchor="middle" font-size="9" fill="#ffffff">Modèle complet</text>
  <text x="115" y="378" text-anchor="middle" font-size="9" fill="#ea580c">GPU 0 → Lot A</text>
  <rect x="175" y="342" width="90" height="45" rx="4" fill="#ea580c" />
  <text x="220" y="362" text-anchor="middle" font-size="9" fill="#ffffff">Modèle complet</text>
  <text x="220" y="378" text-anchor="middle" font-size="9" fill="#ea580c">GPU 1 → Lot B</text>
  <rect x="280" y="342" width="90" height="45" rx="4" fill="#ea580c" />
  <text x="325" y="362" text-anchor="middle" font-size="9" fill="#ffffff">Modèle complet</text>
  <text x="325" y="378" text-anchor="middle" font-size="9" fill="#ea580c">GPU 2 → Lot C</text>

  <text x="60" y="413" font-size="10" fill="#0f172a">• Aucune communication inter-GPU (inférence)</text>
  <text x="60" y="428" font-size="10" fill="#0f172a">• Efficace lorsque le modèle tient dans chaque réplique</text>
  <text x="60" y="443" font-size="10" fill="#0f172a">• Pour l’entraînement : en combinaison avec le shardage ZeRO</text>
  <text x="60" y="458" font-size="10" fill="#9a3412" font-weight="bold">• Mesurer l’équilibre de charge et l’utilisation des réplicas</text>

  <!-- EP: Expert Parallelism -->
  <rect x="460" y="285" width="410" height="190" rx="10" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow4)" />
  <text x="665" y="310" text-anchor="middle" font-size="15" font-weight="bold" fill="#5b21b6">Parallélisme expert (PE)</text>
  <text x="665" y="328" text-anchor="middle" font-size="11" fill="#334155">Distribuer des experts MoE à travers les GPUs</text>

  <!-- Router + experts -->
  <rect x="575" y="340" width="80" height="30" rx="4" fill="#7c3aed" />
  <text x="615" y="360" text-anchor="middle" font-size="10" fill="#ffffff">Routeur</text>

  <!-- Expert boxes -->
  <line x1="593" y1="370" x2="517" y2="385" stroke="#7c3aed" stroke-width="1" />
  <line x1="605" y1="370" x2="582" y2="385" stroke="#7c3aed" stroke-width="1" />
  <line x1="625" y1="370" x2="707" y2="385" stroke="#7c3aed" stroke-width="1" />
  <line x1="637" y1="370" x2="772" y2="385" stroke="#7c3aed" stroke-width="1" />

  <rect x="490" y="385" width="55" height="24" rx="3" fill="#7c3aed" />
  <text x="517" y="401" text-anchor="middle" font-size="9" fill="#ffffff">GPU0 E1</text>
  <rect x="555" y="385" width="55" height="24" rx="3" fill="#7c3aed" />
  <text x="582" y="401" text-anchor="middle" font-size="9" fill="#ffffff">GPU0 de l’E2</text>
  <rect x="680" y="385" width="55" height="24" rx="3" fill="#7c3aed" />
  <text x="707" y="401" text-anchor="middle" font-size="9" fill="#ffffff">GPU1 E3</text>
  <rect x="745" y="385" width="55" height="24" rx="3" fill="#7c3aed" />
  <text x="772" y="401" text-anchor="middle" font-size="9" fill="#ffffff">GPU1 E4</text>

  <text x="490" y="433" font-size="10" fill="#0f172a">• Communication tous-à-tous pour le routage des tokens</text>
  <text x="490" y="448" font-size="10" fill="#0f172a">• Sensible à l’équilibre expert et à la topologie</text>
  <text x="490" y="463" font-size="10" fill="#5b21b6" font-weight="bold">• Profiler le trafic tout-à-tout dans un environnement de routage réel</text>

  <!-- Decision framework at bottom -->
  <rect x="30" y="488" width="840" height="25" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1" />
  <text x="450" y="505" text-anchor="middle" font-size="11" fill="#1d4ed8" font-weight="bold">Démarrage uniquement avec l’heuristique : valider la mémoire, la communication, le débit et la latence sur le cluster cible</text>
</svg>
