<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Début : Échelle des modèles de langage grandissants</title>
  <desc id="artifact-desc">Début : Échelle des modèles de langage grandissants.</desc>
  <defs>
    <style>
      .start { fill: #faf5ff; stroke: #7c3aed; stroke-width: 2; rx: 15; }
      .decision { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 5; }
      .action { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 5; }
      .result { fill: #f0fdf4; stroke: #166534; stroke-width: 2; rx: 5; }
      .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .text { font-family: Inter, system-ui, sans-serif; font-size: 12px; text-anchor: middle; }
      .label { font-size: 10px; fill: #334155; background-color: #f8fafc; padding: 2px; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="100%" height="100%" fill="#f8fafc" />

  <!-- Nodes -->
  <rect x="300" y="20" width="200" height="40" class="start" />
  <text y="45" class="text" x="400">Début : Échelle des modèles de langage grandissants</text>

  <rect x="300" y="100" width="200" height="40" class="decision" />
  <text y="125" class="text" x="400">Convient à une seule GPU ?</text>

  <rect x="50" y="160" width="200" height="40" class="result" />
  <text y="185" class="text" x="150">Entraînement standard (sans parallélisme)</text>

  <rect x="550" y="160" width="200" height="40" class="decision" />
  <text y="185" class="text" x="650">Plusieurs GPU dans 1 nœud ?</text>

  <rect x="700" y="240" width="90" height="40" class="result" />
  <text y="265" class="text" font-size="10" x="745">Nécessite un cluster</text>

  <rect x="300" y="220" width="200" height="40" class="action" />
  <text y="245" class="text" x="400">Commencer par FSDP</text>

  <rect x="300" y="300" width="200" height="40" class="decision" />
  <text y="325" class="text" x="400">FSDP est-il suffisant ?</text>

  <rect x="50" y="360" width="200" height="40" class="result" />
  <text y="385" class="text" x="150">Utiliser Pure FSDP</text>

  <rect x="400" y="400" width="200" height="40" class="result" />
  <text y="425" class="text" x="500">Ajouter la parallélisation par tenseur (TP)</text>

  <rect x="600" y="400" width="180" height="40" class="result" />
  <text y="425" class="text" x="690">Ajout de contexte parallèle (CP)</text>

  <rect x="300" y="480" width="200" height="40" class="decision" />
  <text y="505" class="text" x="400">Multi-nœuds / Massif ?</text>

  <rect x="300" y="550" width="200" height="40" class="result" />
  <text y="575" class="text" x="400">Combiner (TP + PP + FSDP)</text>

  <!-- Arrows -->

  <!-- Start -> Fits on 1 GPU -->
  <path d="M 400 60 L 400 100" class="arrow" />

  <!-- Fits on 1 GPU -> Yes -> Standard Training -->
  <path d="M 300 120 L 150 120 L 150 160" class="arrow" />
  <text y="115" class="label" x="225">Oui</text>

  <!-- Fits on 1 GPU -> No -> Multiple GPUs -->
  <path d="M 500 120 L 650 120 L 650 160" class="arrow" />
  <text y="115" class="label" x="525">Non</text>

  <!-- Multiple GPUs -> No -> Need Cluster -->
  <path d="M 750 180 L 780 180 L 780 240" class="arrow" />
  <text y="175" class="label" x="765">Non</text>

  <!-- Multiple GPUs -> Yes -> Start with FSDP -->
  <path d="M 550 180 L 400 180 L 400 220" class="arrow" />
  <text y="175" class="label" x="475">Oui</text>

  <!-- Start with FSDP -> Is FSDP Enough -->
  <path d="M 400 260 L 400 300" class="arrow" />

  <!-- Is FSDP Enough -> Yes -> Use Pure FSDP -->
  <path d="M 300 320 L 150 320 L 150 360" class="arrow" />
  <text y="315" class="label" x="225">Oui</text>

  <!-- Is FSDP Enough -> No -> Split to TP and CP -->
  <!-- We draw a shared path segment then split -->
  <!-- Shared segment: Right from decision box -->
  <path d="M 500 320 L 600 320 L 600 340" stroke="#334155" stroke-width="2" fill="none" />

  <!-- Split to TP (Left) -->
  <path d="M 600 340 L 500 340 L 500 400" class="arrow" />
  <text y="335" class="label" x="530">Les couches sont trop grandes.</text>

  <!-- Split to CP (Right) -->
  <path d="M 600 340 L 700 340 L 700 400" class="arrow" />
  <text y="335" class="label" x="630">Le contexte est trop long.</text>

  <!-- TP -> Multi-Node -->
  <path d="M 500 440 L 500 460 L 400 460 L 400 480" class="arrow" />

  <!-- CP -> Multi-Node -->
  <path d="M 690 440 L 690 460 L 400 460 L 400 480" class="arrow" />

  <!-- Multi-Node -> Combine -->
  <path d="M 400 520 L 400 550" class="arrow" />

</svg>
