<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 570" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Autoroute de tokens parallèle d’expert</title><desc id="desc">Un routeur attribue un lot de tokens aux experts sélectionnés. Les représentations de tokens sont distribuées à travers les niveaux hiérarchiques ; les experts effectuent des calculs avec des charges inégales, puis les résultats sont réassemblés dans l’ordre des tokens.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#94a3b8" /></marker></defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="570" rx="28" fill="#0f172a" />
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Acheminer des tokens vers des experts distribués</text>
  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <rect x="120" y="120" width="220" height="90" rx="18" fill="#1e293b" /><text x="230" y="158" fill="#e2e8f0" font-size="19" font-weight="700">Lot de tokens</text><text x="230" y="186" fill="#94a3b8" font-size="14">ordre initial des tokens</text>
    <path d="M350 165 H425" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <rect x="435" y="120" width="220" height="90" rx="18" fill="#9a3412" /><text x="545" y="158" fill="#fdba74" font-size="19" font-weight="700">Routeur</text><text x="545" y="186" fill="#fdba74" font-size="14">scores + top-k + capacité</text>
    <path d="M665 165 H740" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <rect x="750" y="120" width="330" height="90" rx="18" fill="#1d4ed8" /><text x="915" y="158" fill="#93c5fd" font-size="19" font-weight="700">Déploiement collectif</text><text x="915" y="186" fill="#93c5fd" font-size="14">envoyer des représentations aux propriétaires experts</text>
    <path d="M915 210 V250 H170 M915 250 H1030 M170 250 V285 M450 250 V285 M730 250 V285 M1030 250 V285" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#a)" />
    <g transform="translate(60 295)"><rect width="220" height="105" rx="17" fill="#1d4ed8" /><text x="110" y="42" fill="#93c5fd" font-size="18" font-weight="700">Expert 0</text><text x="110" y="75" fill="#93c5fd" font-size="14">rang 0 • 31 tokens</text></g>
    <g transform="translate(340 295)"><rect width="220" height="105" rx="17" fill="#5b21b6" /><text x="110" y="42" fill="#93c5fd" font-size="18" font-weight="700">Expert 1</text><text x="110" y="75" fill="#c4b5fd" font-size="14">rang 1 • 18 tokens</text></g>
    <g transform="translate(620 295)"><rect width="220" height="105" rx="17" fill="#9a3412" /><text x="110" y="42" fill="#fdba74" font-size="18" font-weight="700">Expert 2</text><text x="110" y="75" fill="#fdba74" font-size="14">rang 2 • 42 tokens</text></g>
    <g transform="translate(900 295)"><rect width="220" height="105" rx="17" fill="#166534" /><text x="110" y="42" fill="#93c5fd" font-size="18" font-weight="700">Expert 3</text><text x="110" y="75" fill="#93c5fd" font-size="14">rang 3 • 9 tokens</text></g>
    <path d="M170 410 V445 H1030 V410 M450 410 V445 M730 410 V445" stroke="#94a3b8" stroke-width="3" fill="none" />
    <rect x="350" y="455" width="500" height="74" rx="17" fill="#166534" /><text x="600" y="486" fill="#93c5fd" font-size="18" font-weight="700">Combiner les sorties dans l’ordre des tokens</text><text x="600" y="513" fill="#93c5fd" font-size="14">la déviation de chargement et le temps tous-à-tous constituent des métriques de premier ordre</text>
  </g>
</svg>
