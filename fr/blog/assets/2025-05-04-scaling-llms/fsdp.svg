<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Parallélisme de données entièrement shardé (FSDP)</title>
  <desc id="artifact-desc">Parallélisme de données entièrement shardé (FSDP).</desc>
  <defs>
    <style>
      .gpu { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 5; }
      .shard-p { fill: #faf5ff; stroke: #2563eb; stroke-width: 1; rx: 3; }
      .shard-g { fill: #fef2f2; stroke: #dc2626; stroke-width: 1; rx: 3; }
      .shard-o { fill: #eff6ff; stroke: #2563eb; stroke-width: 1; rx: 3; }
      .arrow { stroke: #334155; stroke-width: 2; marker-end: url(#arrowhead); }
      .text { font-family: Inter, system-ui, sans-serif; font-size: 14px; text-anchor: middle; }
      .title { font-family: Inter, system-ui, sans-serif; font-size: 18px; font-weight: bold; text-anchor: middle; }
      .step-box { fill: #fff7ed; stroke: #ea580c; stroke-width: 1; rx: 5; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="100%" height="100%" fill="#f8fafc" />
  <text y="30" class="title" x="400">Parallélisme de données entièrement shardé (FSDP)</text>


  <rect x="50" y="60" width="200" height="200" class="gpu" />
  <text y="85" class="text" font-weight="bold" x="150">GPU 1</text>
  <rect x="70" y="100" width="160" height="30" class="shard-p" />
  <text y="120" class="text" x="150">Paramètre Shard 1</text>
  <rect x="70" y="140" width="160" height="30" class="shard-g" />
  <text y="160" class="text" x="150">Fragment de gradin 1</text>
  <rect x="70" y="180" width="160" height="30" class="shard-o" />
  <text y="200" class="text" x="150">Shard d’optimiseur 1</text>


  <rect x="300" y="60" width="200" height="200" class="gpu" />
  <text y="85" class="text" font-weight="bold" x="400">GPU 2</text>
  <rect x="320" y="100" width="160" height="30" class="shard-p" />
  <text y="120" class="text" x="400">Paramètre Shard 2</text>
  <rect x="320" y="140" width="160" height="30" class="shard-g" />
  <text y="160" class="text" x="400">Fragment de gradation 2</text>
  <rect x="320" y="180" width="160" height="30" class="shard-o" />
  <text y="200" class="text" x="400">Fragment d’optimiseur 2</text>


  <rect x="550" y="60" width="200" height="200" class="gpu" />
  <text y="85" class="text" font-weight="bold" x="650">GPU 3</text>
  <rect x="570" y="100" width="160" height="30" class="shard-p" />
  <text y="120" class="text" x="650">Paramètre Shard 3</text>
  <rect x="570" y="140" width="160" height="30" class="shard-g" />
  <text y="160" class="text" x="650">Fragment de gradin 3</text>
  <rect x="570" y="180" width="160" height="30" class="shard-o" />
  <text y="200" class="text" x="650">Shard d’optimiseur 3</text>


  <rect x="100" y="300" width="600" height="120" class="step-box" />
  <text y="325" class="text" font-weight="bold" x="400">Flux de travail des passes avant/arrière</text>

  <text y="360" class="text" font-size="12" x="150">1. Paramètres de collecte globale</text>
  <text y="380" class="text" font-size="10" fill="#334155" x="150">Reconstruire la couche complète</text>

  <line x1="220" y1="360" x2="260" y2="360" class="arrow" marker-end="url(#arrowhead)" />

  <text y="360" class="text" font-size="12" x="310">2. Calculer</text>
  <text y="380" class="text" font-size="10" fill="#334155" x="310">(Avant ou Arrière)</text>

  <line x1="360" y1="360" x2="400" y2="360" class="arrow" marker-end="url(#arrowhead)" />

  <text y="360" class="text" font-size="12" x="460">3. Éliminer les paramètres</text>
  <text y="380" class="text" font-size="10" fill="#334155" x="460">(Libérer de la mémoire)</text>

  <line x1="520" y1="360" x2="560" y2="360" class="arrow" marker-end="url(#arrowhead)" />

  <text y="360" class="text" font-size="12" x="640">4. Réduction de la dispersion</text>
  <text y="380" class="text" font-size="10" fill="#334155" x="640">Synchronisation des dégradés</text>

</svg>
