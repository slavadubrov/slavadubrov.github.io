<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 570" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Exécution parallèle des données avec shardage complet</title><desc id="desc">Les shards de paramètres persistants, de gradients et d’optimiseurs sont distribués sur quatre nœuds. Un groupe de couches est collecté de manière temporaire pour les calculs, puis les gradients sont répartis de nouveau vers leurs propriétaires respectifs.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#94a3b8" /></marker></defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="570" rx="28" fill="#0f172a" />
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Gérer l’état persistant par fragments, collecter temporairement les groupes de couches</text>
  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <g transform="translate(70 135)"><rect width="220" height="175" rx="18" fill="#1d4ed8" /><text x="110" y="40" fill="#93c5fd" font-size="19" font-weight="700">Rang 0</text><text x="110" y="82" fill="#93c5fd" font-size="15">shard de paramètre 0</text><text x="110" y="112" fill="#c4b5fd" font-size="15">fragment de gradient 0</text><text x="110" y="142" fill="#93c5fd" font-size="15">shard d’optimiseur 0</text></g>
    <g transform="translate(350 135)"><rect width="220" height="175" rx="18" fill="#1d4ed8" /><text x="110" y="40" fill="#93c5fd" font-size="19" font-weight="700">Rang 1</text><text x="110" y="82" fill="#93c5fd" font-size="15">shard de paramètre 1</text><text x="110" y="112" fill="#c4b5fd" font-size="15">fragment de gradient 1</text><text x="110" y="142" fill="#93c5fd" font-size="15">shard d’optimiseur 1</text></g>
    <g transform="translate(630 135)"><rect width="220" height="175" rx="18" fill="#1d4ed8" /><text x="110" y="40" fill="#93c5fd" font-size="19" font-weight="700">Rang 2</text><text x="110" y="82" fill="#93c5fd" font-size="15">shard de paramètre 2</text><text x="110" y="112" fill="#c4b5fd" font-size="15">fragment de gradient 2</text><text x="110" y="142" fill="#93c5fd" font-size="15">shard d’optimiseur 2</text></g>
    <g transform="translate(910 135)"><rect width="220" height="175" rx="18" fill="#1d4ed8" /><text x="110" y="40" fill="#93c5fd" font-size="19" font-weight="700">Rang 3</text><text x="110" y="82" fill="#93c5fd" font-size="15">shard de paramètre 3</text><text x="110" y="112" fill="#c4b5fd" font-size="15">fragment de gradient 3</text><text x="110" y="142" fill="#93c5fd" font-size="15">shard d’optimiseur 3</text></g>
    <path d="M180 320 V365 H1020 V320 M460 320 V365 M740 320 V365" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#a)" />
    <rect x="245" y="380" width="710" height="115" rx="19" fill="#5b21b6" /><text x="600" y="420" fill="#93c5fd" font-size="20" font-weight="700">Groupe de communication de couche</text><text x="600" y="452" fill="#c4b5fd" font-size="15">paramètres d’all-gather → calcul → vue non shardée libre</text><text x="600" y="480" fill="#c4b5fd" font-size="15">en sens inverse → réduire les gradients de dispersion vers les propriétaires des shards</text>
    <text x="600" y="540" fill="#94a3b8" font-size="15">Le regroupement permet de contrôler la mémoire maximale, la taille collective et les possibilités d’overlap.</text>
  </g>
</svg>
