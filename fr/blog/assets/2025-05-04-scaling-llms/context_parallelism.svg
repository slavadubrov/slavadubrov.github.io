<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Échange d’attention parallèle au contexte</title><desc id="desc">Une longue séquence est partitionnée en quatre niveaux hiérarchiques. Chaque niveau stocke un fragment de token local, tandis que les échanges d’attention permettent le transfert des informations clé/valeur nécessaires à l’interprétation sémantique du contexte complet. Les poids du modèle restent quant à eux répliqués au sein du groupe de contexte.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="540" rx="28" fill="#0f172a" />
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Partitionner la séquence, échanger l’état d’attention</text>
  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <rect x="115" y="120" width="970" height="64" rx="16" fill="#1e293b" /><text x="600" y="160" fill="#e2e8f0" font-size="18" font-weight="700">Sequence complète S = S0 + S1 + S2 + S3</text>
    <g transform="translate(55 240)"><rect width="245" height="150" rx="19" fill="#1d4ed8" /><text x="122" y="42" fill="#93c5fd" font-size="19" font-weight="700">Rang 0</text><text x="122" y="80" fill="#93c5fd" font-size="16">tokens S0</text><text x="122" y="112" fill="#93c5fd" font-size="14">poids répliqués</text></g>
    <g transform="translate(335 240)"><rect width="245" height="150" rx="19" fill="#5b21b6" /><text x="122" y="42" fill="#93c5fd" font-size="19" font-weight="700">Rang 1</text><text x="122" y="80" fill="#93c5fd" font-size="16">tokens S1</text><text x="122" y="112" fill="#c4b5fd" font-size="14">poids répliqués</text></g>
    <g transform="translate(615 240)"><rect width="245" height="150" rx="19" fill="#9a3412" /><text x="122" y="42" fill="#fdba74" font-size="19" font-weight="700">Rang 2</text><text x="122" y="80" fill="#fdba74" font-size="16">tokens S2</text><text x="122" y="112" fill="#fdba74" font-size="14">poids répliqués</text></g>
    <g transform="translate(895 240)"><rect width="245" height="150" rx="19" fill="#166534" /><text x="122" y="42" fill="#93c5fd" font-size="19" font-weight="700">Rang 3</text><text x="122" y="80" fill="#93c5fd" font-size="16">tokens S3</text><text x="122" y="112" fill="#93c5fd" font-size="14">poids répliqués</text></g>
    <path d="M175 415 H1017" stroke="#2563eb" stroke-width="4" stroke-dasharray="12 9" /><text x="600" y="455" fill="#93c5fd" font-size="17" font-weight="700">échange d’attention : annulaire, collecte globale, tout-à-tout ou hiérarchique</text>
    <text x="600" y="495" fill="#94a3b8" font-size="15">Le soulagement d’activation est compensé par une communication au sein du groupe de contexte.</text>
  </g>
</svg>
