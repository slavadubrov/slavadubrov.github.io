<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">Cycle de vie de l’agent à exécution prolongée</title>
  <desc id="desc">Un diagramme de cycle de vie montrant les chemins de démarrage, de planification, d’exécution, de vérification, d’évaluation et de reprise pour un agent à exécution prolongée.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#1f2937" flood-opacity="0.15" />
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2c3e50" />
    </marker>
    <style>
      .heading{font:700 24px Arial,sans-serif;fill:#17202a}
      .step{font:700 15px Arial,sans-serif;fill:#17202a}
      .sub{font:500 12px Arial,sans-serif;fill:#566573}
      .box{rx:12;filter:url(#shadow);stroke-width:2}
      .arrow{stroke:#2c3e50;stroke-width:2.3;fill:none;marker-end:url(#arrow)}
      .soft{stroke:#7f8c8d;stroke-width:2;stroke-dasharray:7 7;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1100" height="620" fill="#f8f9fa" />
  <text x="60" y="58" class="heading">Cycle de vie d’un agent déployé en exécution</text>
  <text x="60" y="84" class="sub">Un exécution à long terme correspond à une chaîne d’étapes récupérables, et non à une seule requête massive.</text>

  <rect class="box" x="70" y="150" width="150" height="88" fill="#e3f2fd" stroke="#2980b9" />
  <text x="104" y="184" class="step">1. Demarrage</text>
  <text x="98" y="209" class="sub">état de chargement</text>
  <text x="98" y="227" class="sub">espace de travail de montage</text>

  <rect class="box" x="270" y="150" width="150" height="88" fill="#f3e5f5" stroke="#6a1b9a" />
  <text x="303" y="184" class="step">2. Plan</text>
  <text x="298" y="209" class="sub">tests d'acceptation</text>
  <text x="298" y="227" class="sub">limites de budget</text>

  <rect class="box" x="470" y="150" width="150" height="88" fill="#fff3e0" stroke="#e67e22" />
  <text x="500" y="184" class="step">3. Exécuter</text>
  <text x="498" y="209" class="sub">outils et code</text>
  <text x="498" y="227" class="sub">vérifications de politique</text>

  <rect class="box" x="670" y="150" width="150" height="88" fill="#e8f5e9" stroke="#27ae60" />
  <text x="696" y="184" class="step">4. Point de contrôle</text>
  <text x="700" y="209" class="sub">journal des événements</text>
  <text x="700" y="227" class="sub">diff de l’espace de travail</text>

  <rect class="box" x="870" y="150" width="150" height="88" fill="#ffffff" stroke="#c62828" />
  <text x="902" y="184" class="step">5. Évaluer</text>
  <text x="898" y="209" class="sub">tests, réviseur</text>
  <text x="898" y="227" class="sub">terminé ou boucle</text>

  <path class="arrow" d="M220 194 H270" />
  <path class="arrow" d="M420 194 H470" />
  <path class="arrow" d="M620 194 H670" />
  <path class="arrow" d="M820 194 H870" />

  <path class="arrow" d="M945 238 C945 325 548 334 548 244" />
  <text x="610" y="337" class="sub">Pas terminé : reprendre à partir du dernier point de contrôle propre</text>

  <rect class="box" x="195" y="430" width="230" height="82" fill="#ffffff" stroke="#2980b9" />
  <text x="237" y="462" class="step">Plan de dépannage ou déploiement à nouveau</text>
  <text x="232" y="488" class="sub">un nouvel agent lit le même identifiant de session</text>

  <rect class="box" x="475" y="430" width="230" height="82" fill="#ffffff" stroke="#e67e22" />
  <text x="521" y="462" class="step">Approbation humaine</text>
  <text x="518" y="488" class="sub">Le graphe est en veille, aucun coût de calcul n’est facturé.</text>

  <rect class="box" x="755" y="430" width="230" height="82" fill="#ffffff" stroke="#27ae60" />
  <text x="807" y="462" class="step">Bundle de répétition</text>
  <text x="792" y="488" class="sub">prompt, événements, traces, artefacts</text>

  <path class="soft" d="M310 430 C310 348 405 303 520 244" />
  <path class="soft" d="M590 430 C590 345 640 300 722 244" />
  <path class="soft" d="M870 430 C870 345 858 296 806 244" />
</svg>
