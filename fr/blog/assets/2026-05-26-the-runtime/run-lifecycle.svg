<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Cycle de vie d’agent à exécution prolongée</title>
  <desc id="desc">Un diagramme de cycle de vie illustrant les chemins de démarrage, de planification, d’exécution, checkpoint, d’évaluation et de reprise pour un agent à exécution prolongée.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#1d4ed8" flood-opacity="0.08" />
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1d4ed8" />
    </marker>
    <style>
      .heading{font-style: normal; font-weight: 700; font-size: 24px; font-family: Inter, system-ui, sans-serif;fill: #1d4ed8}
      .step{font-style: normal; font-weight: 700; font-size: 15px; font-family: Inter, system-ui, sans-serif;fill: #1d4ed8}
      .sub{font-style: normal; font-weight: 500; font-size: 12px; font-family: Inter, system-ui, sans-serif;fill: #1d4ed8}
      .box{rx:12;filter:url(#shadow);stroke-width:2}
      .arrow{stroke: #1d4ed8;stroke-width:2.3;fill:none;marker-end:url(#arrow)}
      .soft{stroke: #94a3b8;stroke-width:2;stroke-dasharray:7 7;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1100" height="620" fill="#f8fafc" />
  <text y="58" class="heading" x="60">Cycle de vie d’un agent déployé en exécution</text>
  <text y="84" class="sub" x="60">Un exécution à long terme correspond à une chaîne d’étapes récupérables, et non à une seule requête massive.</text>

  <rect class="box" x="70" y="150" width="150" height="88" fill="#eff6ff" stroke="#2563eb" />
  <text y="184" class="step" x="104">1. Demarrage</text>
  <text y="209" class="sub" x="98">état de chargement</text>
  <text y="227" class="sub" x="98">espace de travail de montage</text>

  <rect class="box" x="270" y="150" width="150" height="88" fill="#faf5ff" stroke="#7c3aed" />
  <text y="184" class="step" x="303">2. Planification</text>
  <text y="209" class="sub" x="298">tests d'acceptation</text>
  <text y="227" class="sub" x="298">limites de budget</text>

  <rect class="box" x="470" y="150" width="150" height="88" fill="#fff7ed" stroke="#ea580c" />
  <text y="184" class="step" x="500">3. Exécuter</text>
  <text y="209" class="sub" x="498">outils et code</text>
  <text y="227" class="sub" x="498">vérifications de politique</text>

  <rect class="box" x="670" y="150" width="150" height="88" fill="#f0fdf4" stroke="#16a34a" />
  <text y="184" class="step" x="696">4. Checkpoint</text>
  <text y="209" class="sub" x="700">journal des événements</text>
  <text y="227" class="sub" x="700">diff d’espace de travail</text>

  <rect class="box" x="870" y="150" width="150" height="88" fill="#ffffff" stroke="#dc2626" />
  <text y="184" class="step" x="902">5. Évaluer</text>
  <text y="209" class="sub" x="898">tests, examinateur</text>
  <text y="227" class="sub" x="898">terminé ou boucle</text>

  <path class="arrow" d="M220 194 H270" />
  <path class="arrow" d="M420 194 H470" />
  <path class="arrow" d="M620 194 H670" />
  <path class="arrow" d="M820 194 H870" />

  <path class="arrow" d="M945 238 C945 325 548 334 548 244" />
  <text y="337" class="sub" x="610">Non terminé : reprendre à partir de la dernière étape propre checkpoint</text>

  <rect class="box" x="195" y="430" width="230" height="82" fill="#ffffff" stroke="#2563eb" />
  <text y="462" class="step" x="237">Plan de défaillance ou déploiement à nouveau</text>
  <text y="488" class="sub" x="232">le nouvel agent lit le même identifiant de session</text>

  <rect class="box" x="475" y="430" width="230" height="82" fill="#ffffff" stroke="#ea580c" />
  <text y="462" class="step" x="521">Approbation humaine</text>
  <text y="488" class="sub" x="518">Le graphe est en mode veille, aucun coût de calcul n’est facturé</text>

  <rect class="box" x="755" y="430" width="230" height="82" fill="#ffffff" stroke="#16a34a" />
  <text y="462" class="step" x="807">Bundle de retransmission</text>
  <text y="488" class="sub" x="792">prompt, événements, traces, artefacts</text>

  <path class="soft" d="M310 430 C310 348 405 303 520 244" />
  <path class="soft" d="M590 430 C590 345 640 300 722 244" />
  <path class="soft" d="M870 430 C870 345 858 296 806 244" />
</svg>
