  </defs>

  <rect width="1140" height="640" fill="#f8f9fa" />

  <!-- Title -->
  <text x="570" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#263238">Où se trouve chaque primitive dans chaque forme de déploiement</text>
  <text x="570" y="54" text-anchor="middle" font-size="12" fill="#546e7a">Vert = la forme fournit cette primitive. Gris = elle est connectée externement. Rouge = non applicable.</text>

  <!-- Column headers -->
  <g font-size="11" font-weight="700" letter-spacing="0.6" fill="#37474f" text-anchor="middle">
    <text x="140" y="96">Forme</text>
    <text x="370" y="96">Ensemble de connexion</text>
    <text x="585" y="96">Boîte à sable</text>
    <text x="800" y="96">SÉANCE + POINT DE VÉRIFICATION</text>
    <text x="1015" y="96">Tracé</text>
  </g>
  <line x1="20" y1="106" x2="1120" y2="106" stroke="#cfd8dc" stroke-width="1" />

  <!-- Row 1: SDK in app server (y_rect=118, y_text=140) -->
  <text x="30" y="140" font-size="13" font-weight="600" fill="#263238">1. SDK dans le serveur d’application</text>
  <g filter="url(#ds4)">
