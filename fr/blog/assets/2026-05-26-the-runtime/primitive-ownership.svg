<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 640" font-family="Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="ds4" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000" flood-opacity="0.10" />
