<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Flux de travail pour la sélection d’un outil local macOS LLM</title>
  <desc id="desc">Une base de référence pour les tâches et les modèles permet d’identifier quatre options de flux de travail : un service local géré via Ollama, l’exploration sur poste de travail avec LM Studio, un contrôle direct GGUF à l’aide de llama.cpp, ou encore l’utilisation de Python natif d’Apple avec MLX-LM. Toutes ces approches aboutissent au même travail de charge benchmark.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="480" rx="22" fill="#0f172a" /><text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Sélectionnez la surface de contrôle, puis benchmark</text>
  <g font-family="Inter, system-ui, sans-serif"><rect x="345" y="90" width="310" height="70" rx="14" fill="#1e293b" stroke="#64748b" /><text x="500" y="119" text-anchor="middle" font-size="16" font-weight="700" fill="#e2e8f0">Tâche + checkpoint de référence</text><text x="500" y="143" text-anchor="middle" font-size="12" fill="#94a3b8">qualité, licence, contexte, artefact</text>
  <text x="500" y="195" text-anchor="middle" font-size="28" fill="#94a3b8">↓</text>
  <g transform="translate(30 220)"><rect width="215" height="115" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="107" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#93c5fd">Ollama</text><text x="107" y="68" text-anchor="middle" font-size="12" fill="#93c5fd">CLI gérée + API</text><text x="107" y="91" text-anchor="middle" font-size="11" fill="#94a3b8">service d’application</text></g>
  <g transform="translate(270 220)"><rect width="215" height="115" rx="14" fill="#5b21b6" stroke="#2563eb" /><text x="107" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#c4b5fd">LM Studio</text><text x="107" y="68" text-anchor="middle" font-size="12" fill="#93c5fd">poste de travail + SDKs + APIs</text><text x="107" y="91" text-anchor="middle" font-size="11" fill="#94a3b8">exploration humaine</text></g>
  <g transform="translate(515 220)"><rect width="215" height="115" rx="14" fill="#9a3412" stroke="#ea580c" /><text x="107" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#fdba74">llama.cpp</text><text x="107" y="68" text-anchor="middle" font-size="12" fill="#fdba74">direct GGUF runtime</text><text x="107" y="91" text-anchor="middle" font-size="11" fill="#94a3b8">flagues + embedding</text></g>
  <g transform="translate(755 220)"><rect width="215" height="115" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="107" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#93c5fd">MLX-LM</text><text x="107" y="68" text-anchor="middle" font-size="12" fill="#93c5fd">Python natif d’Apple</text><text x="107" y="91" text-anchor="middle" font-size="11" fill="#94a3b8">expérimentations et ajustements</text></g>
  <rect x="180" y="385" width="640" height="55" rx="12" fill="#1d4ed8" stroke="#2563eb" /><text x="500" y="418" text-anchor="middle" font-size="14" font-weight="700" fill="#93c5fd">Même prompts • même contexte • précision comparable • mémoire mesurée</text></g>
</svg>
