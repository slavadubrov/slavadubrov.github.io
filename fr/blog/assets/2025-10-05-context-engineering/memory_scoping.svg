<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Mémoire sélectionnée selon le locataire, la finalité, la fraîcheur et la pertinence</title>
  <desc id="desc">Les candidats à la mise en mémoire réussissent les vérifications relatives au domaine d’application et au locataire, à la finalité, à la fraîcheur ainsi qu’à la pertinence. Seuls les enregistrements sélectionnés sont intégrés dans le contexte ; ceux qui sont rejetés restent en dehors.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="420" rx="22" fill="#0f172a" /><text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">La récupération de mémoire est une décision de politique</text>
  <g font-family="Inter, system-ui, sans-serif"><g transform="translate(40 110)"><rect width="220" height="210" rx="16" fill="#1e293b" stroke="#64748b" /><text x="110" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#e2e8f0">Stockage mémoire</text><text x="28" y="82" font-size="13" fill="#cbd5e1">faits d’utilisateur explicites</text><text x="28" y="112" font-size="13" fill="#cbd5e1">hypothèses inférées</text><text x="28" y="142" font-size="13" fill="#cbd5e1">enregistrements épisodiques</text><text x="28" y="172" font-size="13" fill="#cbd5e1">provenance et cycle de vie</text></g><text x="290" y="225" font-size="25" fill="#94a3b8">→</text>
  <g transform="translate(330 95)"><rect width="330" height="240" rx="16" fill="#5b21b6" stroke="#2563eb" /><text x="165" y="38" text-anchor="middle" font-size="17" font-weight="700" fill="#c4b5fd">Portes de sélection</text><text x="35" y="82" font-size="13" fill="#93c5fd">1. sujet authentifié + locataire</text><text x="35" y="116" font-size="13" fill="#93c5fd">2. finalité autorisée</text><text x="35" y="150" font-size="13" fill="#93c5fd">3. fraîcheur et état des avis</text><text x="35" y="184" font-size="13" fill="#93c5fd">4. pertinence et autorité</text><text x="35" y="218" font-size="12" fill="#fca5a5">Aucune porte → aucune inclusion de contexte</text></g><text x="690" y="225" font-size="25" fill="#94a3b8">→</text>
  <g transform="translate(730 110)"><rect width="230" height="210" rx="16" fill="#1d4ed8" stroke="#2563eb" /><text x="115" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#93c5fd">Ensemble de travail sélectionné</text><text x="30" y="84" font-size="13" fill="#93c5fd">faits utiles minimaux</text><text x="30" y="116" font-size="13" fill="#93c5fd">source préservée</text><text x="30" y="148" font-size="13" fill="#93c5fd">date d’expiration conservée</text><text x="30" y="180" font-size="13" fill="#93c5fd">la suppression reste possible</text></g><text x="500" y="382" text-anchor="middle" font-size="13" fill="#94a3b8">Les mémoires inférées par le modèle restent des hypothèses tant qu’une source fiable ne les confirme pas.</text></g>
</svg>
