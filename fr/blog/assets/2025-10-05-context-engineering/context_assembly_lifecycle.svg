<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Context assemblé grâce à des opérations de récupération ciblée, de budgétisation, d’exécution et de validation</title>
  <desc id="desc">Les flux d’état des requêtes fiables passent par la sélection de décision, le récupération autorisée, la budgétisation basée sur l’utilité, la proposition de modèle, la validation et exécution déterministes, puis l’enregistrement de l’origine et des résultats.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="460" rx="22" fill="#0f172a" />
  <text x="500" y="46" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">La mise en contexte est un cycle de vie par décision</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(25 115)"><rect width="150" height="110" rx="14" fill="#1e293b" stroke="#64748b" /><text x="75" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#e2e8f0">Requête fiable</text><text x="75" y="63" text-anchor="middle" font-size="11" fill="#cbd5e1">acteur, titulaire, tâche</text><text x="75" y="84" text-anchor="middle" font-size="11" fill="#94a3b8">localisation + horodatage</text></g><text x="192" y="180" text-anchor="middle" font-size="22" fill="#94a3b8">→</text>
    <g transform="translate(210 115)"><rect width="150" height="110" rx="14" fill="#5b21b6" stroke="#2563eb" /><text x="75" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#c4b5fd">Sélectionner la décision</text><text x="75" y="63" text-anchor="middle" font-size="11" fill="#93c5fd">planifier, récupérer, agir</text><text x="75" y="84" text-anchor="middle" font-size="11" fill="#94a3b8">ou répondre</text></g><text x="377" y="180" text-anchor="middle" font-size="22" fill="#94a3b8">→</text>
    <g transform="translate(395 115)"><rect width="150" height="110" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="75" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#93c5fd">Champ d’application + récupération</text><text x="75" y="63" text-anchor="middle" font-size="11" fill="#93c5fd">autoriser en premier</text><text x="75" y="84" text-anchor="middle" font-size="11" fill="#94a3b8">évaluation de la crédibilité des preuves</text></g><text x="562" y="180" text-anchor="middle" font-size="22" fill="#94a3b8">→</text>
    <g transform="translate(580 115)"><rect width="150" height="110" rx="14" fill="#9a3412" stroke="#ea580c" /><text x="75" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#fdba74">Budget + assemblage</text><text x="75" y="63" text-anchor="middle" font-size="11" fill="#fdba74">utilité, fraîcheur</text><text x="75" y="84" text-anchor="middle" font-size="11" fill="#94a3b8">frontières de confiance</text></g><text x="747" y="180" text-anchor="middle" font-size="22" fill="#94a3b8">→</text>
    <g transform="translate(765 115)"><rect width="210" height="110" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="105" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#93c5fd">Proposer → valider → agir</text><text x="105" y="63" text-anchor="middle" font-size="11" fill="#93c5fd">sortie tapée + politique</text><text x="105" y="84" text-anchor="middle" font-size="11" fill="#94a3b8">post-conditions des outils</text></g>
    <rect x="120" y="300" width="760" height="85" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="500" y="331" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Enregistrer le manifeste, la provenance, la validation ainsi que le résultat de la tâche</text><text x="500" y="360" text-anchor="middle" font-size="12" fill="#93c5fd">La décision suivante reçoit un nouveau jeu de travail plutôt que d’hériter de tout le contenu existant.</text>
    <text x="500" y="425" text-anchor="middle" font-size="13" fill="#94a3b8">Une invocation de modèle correspond à une étape au sein de la politique de contexte, et non à la politique elle-même.</text>
  </g>
</svg>
