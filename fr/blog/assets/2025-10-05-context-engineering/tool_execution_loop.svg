<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Boucle d’exécution de l’outil</title>
  <desc id="artifact-desc">Boucle d’exécution de l’outil.</desc>

<style>
    .bg { fill: #0f172a; }
    .node { fill: #1e293b; stroke: #2563eb; stroke-width: 2; rx: 8; ry: 8; }
    .node-text { fill: #f8fafc; font-family: Inter, system-ui, sans-serif; font-size: 14px; text-anchor: middle; dominant-baseline: middle; }
    .edge { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .label { fill: #cbd5e1; font-family: Inter, system-ui, sans-serif; font-size: 12px; text-anchor: middle; background-color: #0f172a; }
    .title { fill: #f8fafc; font-family: Inter, system-ui, sans-serif; font-size: 18px; font-weight: bold; text-anchor: middle; }
    .group-label { fill: #cbd5e1; font-family: Inter, system-ui, sans-serif; font-size: 14px; font-weight: bold; text-anchor: start; }
    .accent-green { stroke: #16a34a; }
    .accent-red { stroke: #dc2626; }
    .accent-yellow { stroke: #ea580c; }
    .accent-purple { stroke: #7c3aed; }
    .accent-orange { stroke: #ea580c; }
</style>
<defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
</defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

<rect width="100%" height="100%" class="bg" />

<text y="30" class="title" x="400">Boucle d’exécution de l’outil</text>

<g transform="translate(50, 150)">
    <rect x="0" y="0" width="120" height="60" class="node" style="stroke: #2563eb" />
    <text y="30" class="node-text" x="60">Agent</text>
</g>

<g transform="translate(250, 150)">
    <rect x="0" y="0" width="120" height="60" class="node" style="stroke: #ea580c" />
    <text y="30" class="node-text" x="60">Planificateur</text>
</g>

<g transform="translate(450, 150)">
    <rect x="0" y="0" width="120" height="60" class="node" style="stroke: #ea580c" />
    <text y="30" class="node-text" x="60">API d’outil</text>
</g>

<g transform="translate(650, 150)">
    <rect x="0" y="0" width="120" height="60" class="node" style="stroke: #dc2626" />
    <text y="30" class="node-text" x="60">Vérifier</text>
</g>

<!-- Edges -->
<path d="M170 180 L250 180" class="edge" />
<path d="M370 180 L450 180" class="edge" />
<path d="M570 180 L650 180" class="edge" />

<!-- Loop back -->
<path d="M710 210 L710 280 L110 280 L110 210" class="edge" />
<text y="270" class="label" style="fill: #cbd5e1" x="400">Boucle jusqu’à l’achèvement de la tâche</text>

</svg>
