<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Problème du milieu : courbe en U de l’attention</title>
  <desc id="artifact-desc">Problème du milieu : courbe en U de l’attention.</desc>
    <style>
        .bg { fill: #0f172a; }
        .axis { stroke: #94a3b8; stroke-width: 2; }
        .axis-label { fill: #cbd5e1; font-family: Inter, system-ui, sans-serif; font-size: 14px; }
        .title { fill: #f8fafc; font-family: Inter, system-ui, sans-serif; font-size: 20px; font-weight: bold; text-anchor: middle; }
        .curve { stroke: #2563eb; stroke-width: 4; fill: none; }
        .fill-area { fill: url(#attention-gradient); opacity: 0.3; }
        .zone-label { fill: #f8fafc; font-family: Inter, system-ui, sans-serif; font-size: 12px; text-anchor: middle; font-weight: bold; }
        .zone-box { rx: 6; ry: 6; opacity: 0.8; }
        .annotation { fill: #cbd5e1; font-family: Inter, system-ui, sans-serif; font-size: 11px; text-anchor: middle; }
        .warning { fill: #fca5a5; font-family: Inter, system-ui, sans-serif; font-size: 12px; text-anchor: middle; font-weight: bold; }
    </style>
    <defs>
        <linearGradient id="attention-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color: #2563eb;stop-opacity:0.6" />
            <stop offset="100%" style="stop-color: #2563eb;stop-opacity:0" />
        </linearGradient>
    </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

    <rect width="100%" height="100%" class="bg" />

    <text y="35" class="title" x="400">Problème du milieu : courbe en U de l’attention</text>

    <!-- Axes -->
    <g transform="translate(100, 80)">
        <!-- Y-axis -->
        <line x1="0" y1="0" x2="0" y2="280" class="axis" />
        <text y="140" class="axis-label" x="-50" transform="rotate(-90, -50, 140)">Précision / Rappel</text>

        <!-- X-axis -->
        <line x1="0" y1="280" x2="600" y2="280" class="axis" />
        <text y="320" class="axis-label" text-anchor="middle" x="300">Position dans le contexte</text>

        <!-- Y-axis ticks -->
        <text y="10" class="axis-label" text-anchor="end" x="-10">Élevé</text>
        <text y="280" class="axis-label" text-anchor="end" x="-10">Bas</text>

        <!-- X-axis ticks -->
        <text y="300" class="axis-label" text-anchor="middle" x="0">Démarrer</text>
        <text y="300" class="axis-label" text-anchor="middle" x="300">Moyen</text>
        <text y="300" class="axis-label" text-anchor="middle" x="600">Fin</text>

        <!-- U-Curve -->
        <path d="M 0 30                  C 50 30, 100 60, 150 120                  C 200 180, 250 220, 300 230                  C 350 220, 400 180, 450 120                  C 500 60, 550 30, 600 30" class="curve" />

        <!-- Fill area under curve -->
        <path d="M 0 30                  C 50 30, 100 60, 150 120                  C 200 180, 250 220, 300 230                  C 350 220, 400 180, 450 120                  C 500 60, 550 30, 600 30                  L 600 280 L 0 280 Z" class="fill-area" />

        <!-- High Attention Zones -->
        <rect x="-20" y="20" width="120" height="40" class="zone-box" fill="#16a34a" />
        <text y="45" class="zone-label" x="40">ATTENTION MAXIMALE</text>

        <rect x="480" y="20" width="120" height="40" class="zone-box" fill="#16a34a" />
        <text y="45" class="zone-label" x="540">ATTENTION MAXIMALE</text>

        <!-- Low Attention Zone -->
        <rect x="220" y="200" width="160" height="40" class="zone-box" fill="#dc2626" />
        <text y="225" class="zone-label" x="300">Baixo niveau d’attention</text>

        <!-- Annotations -->
        <text y="70" class="annotation" x="40">Positionner les éléments critiques</text>
        <text y="82" class="annotation" x="40">informations ici</text>

        <text y="70" class="annotation" x="540">Ou ici</text>

        <text y="260" class="warning" x="300">Récupération 10 à 40 % inférieure</text>
    </g>
</svg>
