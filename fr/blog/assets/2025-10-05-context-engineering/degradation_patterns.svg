<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
    <style>
        .bg { fill: #1e1e1e; }
        .title { fill: #f8fafc; font-family: sans-serif; font-size: 20px; font-weight: bold; text-anchor: middle; }
        .card { rx: 10; ry: 10; }
        .card-title { fill: #f8fafc; font-family: sans-serif; font-size: 14px; font-weight: bold; text-anchor: middle; }
        .card-text { fill: #cbd5e1; font-family: sans-serif; font-size: 11px; text-anchor: middle; }
        .icon { fill: #f8fafc; font-family: sans-serif; font-size: 24px; text-anchor: middle; }
    </style>

    <rect width="100%" height="100%" class="bg" />

    <text x="450" y="40" class="title">Modèles de dégradation du contexte</text>

    <!-- Pattern 1: Lost-in-Middle -->
    <g transform="translate(50, 80)">
        <rect x="0" y="0" width="250" height="180" class="card" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2" />
        <text x="125" y="35" class="icon">📉</text>
        <text x="125" y="65" class="card-title">Perte au milieu</text>
        <line x1="30" y1="80" x2="220" y2="80" stroke="#3b82f6" stroke-width="1" opacity="0.5" />
        <text x="125" y="100" class="card-text">Informations au centre</text>
        <text x="125" y="115" class="card-text">reçoit moins d’attention</text>
        <text x="125" y="140" class="card-text" style="fill: #86efac; font-weight: bold;">Correction : placer les informations critiques</text>
        <text x="125" y="155" class="card-text" style="fill: #86efac;">au début ou à la fin</text>
    </g>

    <!-- Pattern 2: Context Poisoning -->
    <g transform="translate(325, 80)">
        <rect x="0" y="0" width="250" height="180" class="card" fill="#3f1e1e" stroke="#ef4444" stroke-width="2" />
        <text x="125" y="35" class="icon">☠️</text>
        <text x="125" y="65" class="card-title">Empoisonnement du contexte</text>
        <line x1="30" y1="80" x2="220" y2="80" stroke="#ef4444" stroke-width="1" opacity="0.5" />
        <text x="125" y="100" class="card-text">Les erreurs s’accumulent au fil du temps</text>
        <text x="125" y="115" class="card-text">référence répétée</text>
        <text x="125" y="140" class="card-text" style="fill: #86efac; font-weight: bold;">Correction : Valider les sorties des outils.</text>
        <text x="125" y="155" class="card-text" style="fill: #86efac;">redémarrer en cas de contamination</text>
    </g>

    <!-- Pattern 3: Context Distraction -->
    <g transform="translate(600, 80)">
        <rect x="0" y="0" width="250" height="180" class="card" fill="#3f3d1e" stroke="#eab308" stroke-width="2" />
        <text x="125" y="35" class="icon">🔀</text>
        <text x="125" y="65" class="card-title">Distraction de contexte</text>
        <line x1="30" y1="80" x2="220" y2="80" stroke="#eab308" stroke-width="1" opacity="0.5" />
        <text x="125" y="100" class="card-text">Des informations non pertinentes interfèrent.</text>
        <text x="125" y="115" class="card-text">pour le budget d’attention</text>
        <text x="125" y="140" class="card-text" style="fill: #86efac; font-weight: bold;">Réparation : appliquer un filtrage agressif.</text>
        <text x="125" y="155" class="card-text" style="fill: #86efac;">utiliser l’évaluation de pertinence</text>
    </g>

    <!-- Pattern 4: Context Confusion -->
    <g transform="translate(125, 290)">
        <rect x="0" y="0" width="250" height="180" class="card" fill="#2e1e3f" stroke="#a855f7" stroke-width="2" />
        <text x="125" y="35" class="icon">🌀</text>
        <text x="125" y="65" class="card-title">Confusion de contexte</text>
        <line x1="30" y1="80" x2="220" y2="80" stroke="#a855f7" stroke-width="1" opacity="0.5" />
        <text x="125" y="100" class="card-text">Le modèle est appliqué incorrectement.</text>
        <text x="125" y="115" class="card-text">contexte de la tâche en cours</text>
        <text x="125" y="140" class="card-text" style="fill: #86efac; font-weight: bold;">Réparation : segmentation des tâches,</text>
        <text x="125" y="155" class="card-text" style="fill: #86efac;">transitions fluides</text>
    </g>

    <!-- Pattern 5: Context Clash -->
    <g transform="translate(525, 290)">
        <rect x="0" y="0" width="250" height="180" class="card" fill="#1e3f2e" stroke="#22c55e" stroke-width="2" />
        <text x="125" y="35" class="icon">⚔️</text>
        <text x="125" y="65" class="card-title">Conflit de contexte</text>
        <line x1="30" y1="80" x2="220" y2="80" stroke="#22c55e" stroke-width="1" opacity="0.5" />
        <text x="125" y="100" class="card-text">Informations contradictoires</text>
        <text x="125" y="115" class="card-text">crée des directives contradictoires</text>
        <text x="125" y="140" class="card-text" style="fill: #86efac; font-weight: bold;">Correction : règles de priorité,</text>
        <text x="125" y="155" class="card-text" style="fill: #86efac;">filtrage de version</text>
    </g>
</svg>
