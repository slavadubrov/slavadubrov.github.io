<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Compression de contexte consciente des pertes, avec des index canoniques distincts pour l’état et les artefacts</title>
  <desc id="desc">Les conversations et les observations sont résumées en un ensemble de travail compact, tandis que l’état canonique de la tâche, les références aux preuves ainsi que l’historique des artefacts restent stockés séparément afin d’en assurer une récupération précise.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="440" rx="22" fill="#0f172a" /><text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Compacter le texte ; conserver un état récupérable</text>
  <g font-family="Inter, system-ui, sans-serif"><g transform="translate(35 105)"><rect width="260" height="230" rx="16" fill="#1e293b" stroke="#64748b" /><text x="130" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#e2e8f0">Contexte en croissance</text><text x="30" y="83" font-size="13" fill="#cbd5e1">turns de conversation</text><text x="30" y="116" font-size="13" fill="#cbd5e1">observations brutes des outils</text><text x="30" y="149" font-size="13" fill="#cbd5e1">passages récupérés</text><text x="30" y="182" font-size="13" fill="#cbd5e1">boîte à outils répétée</text></g><text x="325" y="225" font-size="25" fill="#94a3b8">→</text>
  <g transform="translate(365 105)"><rect width="270" height="230" rx="16" fill="#1d4ed8" stroke="#2563eb" /><text x="135" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#93c5fd">Ensemble de travail compact</text><text x="30" y="83" font-size="13" fill="#93c5fd">décisions + action suivante</text><text x="30" y="116" font-size="13" fill="#93c5fd">résultats d’analyse des outils en mode texte</text><text x="30" y="149" font-size="13" fill="#93c5fd">références sources et artefacts</text><text x="30" y="182" font-size="13" fill="#93c5fd">questions non résolues</text></g><text x="665" y="225" font-size="25" fill="#94a3b8">+</text>
  <g transform="translate(705 85)"><rect width="260" height="270" rx="16" fill="#1d4ed8" stroke="#2563eb" /><text x="130" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#93c5fd">Stocks canoniques</text><text x="30" y="83" font-size="13" fill="#93c5fd">état de tâche</text><text x="30" y="116" font-size="13" fill="#93c5fd">index des fichiers et des artefacts</text><text x="30" y="149" font-size="13" fill="#93c5fd">plein tool results</text><text x="30" y="182" font-size="13" fill="#93c5fd">versions d’éléments de preuve</text><text x="30" y="225" font-size="12" fill="#93c5fd">Réobtenir les détails exacts</text><text x="30" y="247" font-size="12" fill="#93c5fd">lorsque la tâche en a besoin.</text></g><text x="500" y="400" text-anchor="middle" font-size="13" fill="#94a3b8">Optimiser le nombre total de tokens par tâche réussie, y compris les opérations de récupération et de réobtention des données.</text></g>
</svg>
