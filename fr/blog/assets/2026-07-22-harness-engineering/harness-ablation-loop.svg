<svg xmlns="http://www.w3.org/2000/svg" width="640" height="980" viewBox="0 0 640 980" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Une ablation en paire d’un composant harness</title>
  <desc id="desc">Une défaillance observée lors de la reprise des opérations conduit à formuler l’hypothèse d’un transfert progressif. Un groupe témoin avec le transfert désactivé et un groupe expérimental avec le transfert activé sont exécutés à partir de la même migration de paiements initialisée checkpoint, en utilisant le même modèle, l’environnement, l’outil d’évaluation et le budget total. La comparaison des résultats permet de déterminer si cette composante justifie son coût.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" />
    </marker>
  </defs>
  <rect width="640" height="980" fill="#f8fafc" />
  <rect x="20" y="18" width="600" height="944" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />

  <text x="48" y="62" font-size="25" font-weight="700" fill="#0f172a">Tester un composant à la fois</text>
  <text x="48" y="91" font-size="15" fill="#64748b">Un transfert de progression doit compenser le travail de son écriture et de sa lecture.</text>

  <rect x="60" y="126" width="520" height="76" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" />
  <text x="82" y="156" font-size="14" font-weight="700" fill="#9a3412">Faute observée</text>
  <text x="82" y="181" font-size="15" fill="#334155">Les exécutions de migration reprises répètent les actions déjà effectuées</text>

  <line x1="320" y1="202" x2="320" y2="228" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="60" y="236" width="520" height="76" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" />
  <text x="82" y="266" font-size="14" font-weight="700" fill="#5b21b6">HYPOTHÈSE</text>
  <text x="82" y="291" font-size="15" fill="#334155">Un transfert structuré des étapes de progression réduit les tâches redondantes</text>

  <line x1="320" y1="312" x2="320" y2="338" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="60" y="346" width="520" height="82" rx="8" fill="#1e293b" stroke="#1e293b" stroke-width="1.5" />
  <text x="320" y="377" text-anchor="middle" font-size="14" font-weight="700" fill="#93c5fd">Résolu dans les deux variantes</text>
  <text x="320" y="403" text-anchor="middle" font-size="14" fill="#ffffff">Modèle · tâches · environnement · évaluateur · budget total</text>

  <line x1="320" y1="428" x2="320" y2="454" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="60" y="462" width="520" height="106" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" />
  <text x="82" y="493" font-size="14" font-weight="700" fill="#1d4ed8">CONTROLE</text>
  <text x="82" y="523" font-size="19" font-weight="700" fill="#0f172a">progress_handoff = false</text>
  <text x="82" y="548" font-size="14" fill="#334155">Résumer à partir de l'historique de conversation et de l'état de l'espace de travail</text>

  <line x1="320" y1="568" x2="320" y2="594" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="60" y="602" width="520" height="128" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" />
  <text x="82" y="633" font-size="14" font-weight="700" fill="#5b21b6">TRAITEMENT : SEULES LES CHANGEMENTES DE TRANSFERT SONT PRIS EN COMPTE</text>
  <text x="82" y="663" font-size="19" font-weight="700" fill="#0f172a">progress_handoff = true</text>
  <text x="82" y="688" font-size="14" fill="#334155">Reprise à partir de l’état de transfert et de l’espace de travail</text>
  <text x="82" y="711" font-size="14" fill="#334155">Branche, fichiers modifiés, dernière vérification et étape suivante</text>

  <line x1="320" y1="730" x2="320" y2="756" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="60" y="764" width="520" height="100" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" />
  <text x="320" y="797" text-anchor="middle" font-size="17" font-weight="700" fill="#166534">Comparer les résultats par paires</text>
  <text x="320" y="825" text-anchor="middle" font-size="14" fill="#334155">Échec · actions répétées · défauts échappés</text>
  <text x="320" y="848" text-anchor="middle" font-size="14" fill="#334155">Coût · temps de wall · effort d’évaluation</text>

  <rect x="60" y="892" width="520" height="44" rx="8" fill="#1e293b" />
  <text x="320" y="919" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Préserver le transfert uniquement lorsque son avantage mesuré compense son coût</text>
</svg>
