<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">OCR-1.0 contre OCR-2.0</title>
  <desc id="artifact-desc">OCR-1.0 contre OCR-2.0.</desc>
  <defs>
    <!-- Background grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width="1" />
    </pattern>

    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Gradients -->
    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="gradOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ea580c" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <linearGradient id="gradGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16a34a" />
      <stop offset="100%" stop-color="#16a34a" />
    </linearGradient>
    <linearGradient id="gradPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>

    <!-- Arrow head -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8" />
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" />
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="100%" height="100%" fill="#f8fafc" />
  <rect width="100%" height="100%" fill="#f8fafc" />

  <!-- Title -->
  <text y="40" font-family="Inter, system-ui, sans-serif'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="24" font-weight="bold" fill="#1d4ed8" text-anchor="middle" x="400">OCR-1.0 contre OCR-2.0</text>
  <text y="65" font-family="Inter, system-ui, sans-serif'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#64748b" text-anchor="middle" x="400">Le changement architectural des pipelines modulaires vers des modèles bout en bout</text>

  <!-- Section 1: Traditional Pipeline -->
  <rect x="50" y="100" width="700" height="150" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" />
  <text y="125" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="bold" fill="#64748b" x="70">OCR-1.0 : Pipeline modulaire (par ex. Tesseract, PaddleOCR)</text>

  <!-- Input Doc -->
  <g transform="translate(60, 150)">
    <rect width="80" height="80" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)" />
    <rect x="15" y="15" width="50" height="8" rx="2" fill="#cbd5e1" />
    <rect x="15" y="30" width="50" height="8" rx="2" fill="#cbd5e1" />
    <rect x="15" y="45" width="30" height="8" rx="2" fill="#cbd5e1" />
    <text y="95" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle" x="40">Document</text>
  </g>

  <!-- Arrow -->
  <path d="M 150 190 L 180 190" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Step 1: Detect -->
  <g transform="translate(190, 150)">
    <rect width="100" height="80" rx="4" fill="url(#gradBlue)" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
    <text y="35" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle" x="50">Détection</text>
    <text y="55" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle" x="50">CRAFT / DBNet</text>
    <text y="70" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle" x="50">YOLO</text>
    <text y="-10" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#dc2626" text-anchor="middle" x="50">Les erreurs se propagent en cascade</text>
  </g>

  <!-- Arrow -->
  <path d="M 300 190 L 330 190" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Step 2: Recognize -->
  <g transform="translate(340, 150)">
    <rect width="100" height="80" rx="4" fill="url(#gradBlue)" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
    <text y="35" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle" x="50">Reconnaissance</text>
    <text y="55" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle" x="50">CRNN / SVTR</text>
    <text y="70" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle" x="50">Décodage CTC</text>
    <text y="-10" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#dc2626" text-anchor="middle" x="50">Les erreurs se propagent en cascade</text>
  </g>

  <!-- Arrow -->
  <path d="M 450 190 L 480 190" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Step 3: Post-processing -->
  <g transform="translate(490, 150)">
    <rect width="100" height="80" rx="4" fill="url(#gradBlue)" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
    <text y="35" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle" x="50">Post-traitement</text>
    <text y="55" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle" x="50">Vérification orthographique</text>
    <text y="70" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle" x="50">Correction LM</text>
  </g>

  <!-- Arrow -->
  <path d="M 600 190 L 630 190" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Output -->
  <g transform="translate(640, 150)">
    <rect width="80" height="80" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" filter="url(#shadow)" />
    <text y="35" font-family="SFMono-Regular, Consolas, monospace" font-size="12" fill="#0f172a" text-anchor="middle" x="40">Simple</text>
    <text y="55" font-family="SFMono-Regular, Consolas, monospace" font-size="12" fill="#0f172a" text-anchor="middle" x="40">Texte</text>
    <text y="95" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#166534" font-weight="bold" text-anchor="middle" x="40">Jusqu’à 20 % d’échecs</text>
  </g>


  <!-- Section 2: VLM Pipeline -->
  <rect x="50" y="300" width="700" height="150" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" />
  <text y="325" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="bold" fill="#5b21b6" x="70">OCR-2.0 : VLM bout en bout (par ex. Gemini, Qwen-VL, dots.ocr)</text>

  <!-- Input Doc -->
  <g transform="translate(60, 350)">
    <rect width="80" height="80" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)" />
    <rect x="15" y="15" width="50" height="8" rx="2" fill="#cbd5e1" />
    <rect x="15" y="30" width="50" height="8" rx="2" fill="#cbd5e1" />
    <rect x="15" y="45" width="30" height="8" rx="2" fill="#cbd5e1" />
    <text y="95" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle" x="40">Dокумент</text>
  </g>

  <!-- Arrow -->
  <path d="M 150 390 L 260 390" fill="none" stroke="#7c3aed" stroke-width="3" marker-end="url(#arrowPurple)" />

  <!-- VLM Block -->
  <g transform="translate(270, 340)">
    <rect width="320" height="100" rx="8" fill="url(#gradPurple)" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)" />

    <!-- Vision Encoder -->
    <rect x="25" y="30" width="110" height="40" rx="4" fill="#ffffff" fill-opacity="0.2" stroke="#e2e8f0" stroke-width="1" />
    <text y="55" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle" x="80">Encodage de vision</text>

    <!-- Connector -->
    <path d="M 145 50 L 175 50" fill="none" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="4,2" />

    <!-- LLM Decoder -->
    <rect x="185" y="30" width="110" height="40" rx="4" fill="#ffffff" fill-opacity="0.2" stroke="#e2e8f0" stroke-width="1" />
    <text y="55" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle" x="240">Décodeur LLM</text>

    <text y="90" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle" x="160">Perception et raisonnement conjoints</text>
  </g>

  <!-- Arrow -->
  <path d="M 600 390 L 630 390" fill="none" stroke="#7c3aed" stroke-width="3" marker-end="url(#arrowPurple)" />

  <!-- Output -->
  <g transform="translate(640, 350)">
    <rect width="80" height="80" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" filter="url(#shadow)" />
    <text y="35" font-family="SFMono-Regular, Consolas, monospace" font-size="12" fill="#0f172a" text-anchor="middle" x="40">JSON /</text>
    <text y="55" font-family="SFMono-Regular, Consolas, monospace" font-size="12" fill="#0f172a" text-anchor="middle" x="40">Markdown</text>
    <text y="95" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#166534" font-weight="bold" text-anchor="middle" x="40">Taux de précision 3 à 4 fois supérieur</text>
  </g>

</svg>
