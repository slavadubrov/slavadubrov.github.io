<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" font-family="Inter, system-ui, sans-serif'Segoe UI', Roboto, Helvetica, Arial, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">OCR dans la pile technologique moderne de l’IA</title>
  <desc id="artifact-desc">OCR dans la pile technologique moderne de l’IA.</desc>
  <!-- Background -->
  <rect width="920" height="420" fill="#f8fafc" rx="8" />
  <defs>
    <!-- Background grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width="1" />
    </pattern>

    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>

    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="gradOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ea580c" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <linearGradient id="gradPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="gradGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16a34a" />
      <stop offset="100%" stop-color="#166534" />
    </linearGradient>

    <!-- Arrow markers -->
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" />
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ea580c" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="100%" height="100%" fill="#f8fafc" />

  <!-- Title -->
  <text y="32" font-size="20" font-weight="bold" fill="#1d4ed8" text-anchor="middle" x="460">OCR dans la pile technologique moderne de l’IA</text>
  <text y="52" font-size="13" fill="#64748b" text-anchor="middle" x="460">Des documents bruts aux analyses pilotées par l’IA</text>

  <!-- ==================== LEFT: Document Sources ==================== -->
  <g transform="translate(30, 80)">
    <!-- Section header -->
    <rect width="200" height="32" rx="6" fill="url(#gradBlue)" />
    <text y="21" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle" x="100">Sources de documents</text>

    <!-- Cards -->
    <rect y="42" width="200" height="50" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)" />
    <text y="63" font-size="22" x="36">📄</text>
    <text y="63" font-size="12" font-weight="600" fill="#1d4ed8" x="68">PDF et documents Word</text>
    <text y="80" font-size="10" fill="#64748b" x="68">Contrats, rapports, manuels</text>

    <rect y="102" width="200" height="50" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)" />
    <text y="123" font-size="22" x="36">🖼️</text>
    <text y="123" font-size="12" font-weight="600" fill="#1d4ed8" x="68">Documents scannés</text>
    <text y="140" font-size="10" fill="#64748b" x="68">Factures, reçus, formulaires</text>

    <rect y="162" width="200" height="50" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)" />
    <text y="183" font-size="22" x="36">📸</text>
    <text y="183" font-size="12" font-weight="600" fill="#1d4ed8" x="68">Photos et captures d’écran</text>
    <text y="200" font-size="10" fill="#64748b" x="68">Tableaux blancs, panneaux, interface utilisateur</text>

    <rect y="222" width="200" height="50" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)" />
    <text y="243" font-size="22" x="36">📧</text>
    <text y="243" font-size="12" font-weight="600" fill="#1d4ed8" x="68">Correspondances et pièces jointes</text>
    <text y="260" font-size="10" fill="#64748b" x="68">Images intégrées, PDF</text>
  </g>

  <!-- ==================== CENTER: OCR Layer ==================== -->
  <g transform="translate(310, 80)">
    <!-- Section header -->
    <rect width="300" height="32" rx="6" fill="url(#gradOrange)" />
    <text y="21" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle" x="150">Couche OCR — Le pont</text>

    <!-- Main box -->
    <rect y="42" width="300" height="230" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadow)" />

    <!-- Text extraction -->
    <text y="72" font-size="13" font-weight="bold" fill="#9a3412" text-anchor="middle" x="150">Extraction de texte et de structure</text>

    <rect x="20" y="86" width="120" height="36" rx="5" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
    <text y="100" font-size="10" font-weight="600" fill="#1d4ed8" text-anchor="middle" x="80">OCR traditionnel</text>
    <text y="114" font-size="9" fill="#64748b" text-anchor="middle" x="80">Tesseract, PaddleOCR</text>

    <rect x="160" y="86" width="120" height="36" rx="5" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
    <text y="100" font-size="10" font-weight="600" fill="#1d4ed8" text-anchor="middle" x="220">Modèles de langage grandement entraînés</text>
    <text y="114" font-size="9" fill="#64748b" text-anchor="middle" x="220">Gemini, Claude, GPT</text>

    <rect x="20" y="132" width="120" height="36" rx="5" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
    <text y="146" font-size="10" font-weight="600" fill="#1d4ed8" text-anchor="middle" x="80">Modèles spécialisés</text>
    <text y="160" font-size="9" fill="#64748b" text-anchor="middle" x="80">dots.ocr, Qwen3-VL</text>

    <rect x="160" y="132" width="120" height="36" rx="5" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
    <text y="146" font-size="10" font-weight="600" fill="#1d4ed8" text-anchor="middle" x="220">Analyse de la mise en page</text>
    <text y="160" font-size="9" fill="#64748b" text-anchor="middle" x="220">Tableaux, en-têtes, listes</text>

    <!-- Output arrow label -->
    <line x1="150" y1="180" x2="150" y2="210" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)" />
    <rect x="55" y="215" width="190" height="44" rx="6" fill="#ea580c" opacity="0.12" />
    <text y="234" font-size="11" font-weight="bold" fill="#9a3412" text-anchor="middle" x="150">Sortie : texte propre, tableaux.</text>
    <text y="250" font-size="11" font-weight="bold" fill="#9a3412" text-anchor="middle" x="150">structure et métadonnées</text>
  </g>

  <!-- ==================== RIGHT: AI Consumers ==================== -->
  <g transform="translate(690, 80)">
    <!-- Section header -->
    <rect width="200" height="32" rx="6" fill="url(#gradPurple)" />
    <text y="21" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle" x="100">Consommateurs d’IA</text>

    <!-- RAG Pipeline -->
    <rect y="42" width="200" height="70" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)" />
    <text y="63" font-size="12" font-weight="bold" fill="#5b21b6" text-anchor="middle" x="100">Pipelines RAG</text>
    <text y="80" font-size="9" fill="#64748b" text-anchor="middle" x="100">Chunk → Incorporation → Base de données vectorielle</text>
    <text y="94" font-size="9" fill="#64748b" text-anchor="middle" x="100">→ Récupérer → Réponse du LLM</text>

    <!-- AI Agents -->
    <rect y="122" width="200" height="56" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)" />
    <text y="143" font-size="12" font-weight="bold" fill="#5b21b6" text-anchor="middle" x="100">Agents d'IA</text>
    <text y="160" font-size="9" fill="#64748b" text-anchor="middle" x="100">Lecture de documents, remplissage de formulaires</text>

    <!-- Enterprise QA -->
    <rect y="188" width="200" height="56" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)" />
    <text y="209" font-size="12" font-weight="bold" fill="#5b21b6" text-anchor="middle" x="100">QA d’entreprise</text>
    <text y="226" font-size="9" fill="#64748b" text-anchor="middle" x="100">Recherche de contrats, conformité, bases de connaissances</text>

    <!-- Domain Apps -->
    <rect y="254" width="200" height="56" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)" />
    <text y="275" font-size="12" font-weight="bold" fill="#5b21b6" text-anchor="middle" x="100">Applications dans le domaine</text>
    <text y="292" font-size="9" fill="#64748b" text-anchor="middle" x="100">Médical, juridique, financier</text>
  </g>

  <!-- ==================== Arrows: Sources → OCR ==================== -->
  <line x1="230" y1="200" x2="305" y2="200" stroke="#2563eb" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-blue)" />

  <!-- ==================== Arrows: OCR → Consumers ==================== -->
  <line x1="610" y1="200" x2="685" y2="200" stroke="#7c3aed" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-gray)" />

  <!-- ==================== Bottom callout ==================== -->
  <g transform="translate(230, 365)">
    <rect width="460" height="40" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1" />
    <text y="17" font-size="11" font-weight="bold" fill="#9a3412" text-anchor="middle" x="230">⚠️ La qualité de l’OCR constitue une limite pour la qualité de l’IA ultérieure</text>
    <text y="33" font-size="10" fill="#64748b" text-anchor="middle" x="230">Texte corrompu en entrée → réponses corrompues en sortie. Aucun embedding ou prompt ne peut corriger une extraction défectueuse.</text>
  </g>
</svg>
