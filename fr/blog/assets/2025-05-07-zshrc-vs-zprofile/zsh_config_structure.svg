<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Fichiers de démarrage de Zsh sélectionnés selon les modes de connexion et interactif</title>
  <desc id="desc">Une matrice 2×2 illustre les shells interactifs de connexion qui lisent zshenv, zprofile, zshrc et zlogin ; les shells non interactifs de connexion qui lisent zshenv, zprofile et zlogin ; les shells interactifs hors connexion qui lisent zshenv et zshrc ; ainsi que les shells non interactifs hors connexion qui ne lisent que zshenv.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="700" rx="28" fill="#0f172a" />
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Deux drapeaux permettent de sélectionner les fichiers de démarrage</text>
  <text x="600" y="98" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="17">Le processus d’authentification et les fonctionnalités interactives constituent des propriétés indépendantes</text>
  <g font-family="Inter, system-ui, sans-serif">
    <text x="420" y="145" text-anchor="middle" fill="#93c5fd" font-size="20" font-weight="700">interactive</text>
    <text x="900" y="145" text-anchor="middle" fill="#94a3b8" font-size="20" font-weight="700">Non interactif</text>
    <text x="82" y="300" text-anchor="middle" fill="#c4b5fd" font-size="20" font-weight="700" transform="rotate(-90 82 300)">Connexion</text>
    <text x="82" y="560" text-anchor="middle" fill="#94a3b8" font-size="20" font-weight="700" transform="rotate(-90 82 560)">Sans connexion</text>

    <g transform="translate(155 175)"><rect width="530" height="215" rx="20" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="30" y="44" fill="#93c5fd" font-size="22" font-weight="700">Connexion + interactive</text><text x="30" y="83" fill="#93c5fd" font-size="17">Fenêtre typique du Terminal d’Apple</text><text x="30" y="132" fill="#e2e8f0" font-size="19">.zshenv → .zprofile → .zshrc → .zlogin</text><text x="30" y="172" fill="#94a3b8" font-size="15">tant la connexion que la configuration interactive</text></g>
    <g transform="translate(715 175)"><rect width="410" height="215" rx="20" fill="#5b21b6" /><text x="30" y="44" fill="#93c5fd" font-size="22" font-weight="700">Connexion + non interactif</text><text x="30" y="83" fill="#c4b5fd" font-size="17">zsh -lc 'commande'</text><text x="30" y="132" fill="#e2e8f0" font-size="18">.zshenv → .zprofile → .zlogin</text><text x="30" y="172" fill="#94a3b8" font-size="15">pas de .zshrc</text></g>
    <g transform="translate(155 425)"><rect width="530" height="215" rx="20" fill="#166534" /><text x="30" y="44" fill="#93c5fd" font-size="22" font-weight="700">Sans connexion + interactif</text><text x="30" y="83" fill="#93c5fd" font-size="17">Configuration imbriquée de zsh ou de terminal</text><text x="30" y="132" fill="#e2e8f0" font-size="19">.zshenv → .zshrc</text><text x="30" y="172" fill="#94a3b8" font-size="15">pas de .zprofile</text></g>
    <g transform="translate(715 425)"><rect width="410" height="215" rx="20" fill="#1e293b" /><text x="30" y="44" fill="#cbd5e1" font-size="22" font-weight="700">Ni l'un ni l'autre</text><text x="30" y="83" fill="#94a3b8" font-size="17">zsh -c « commande »</text><text x="30" y="132" fill="#e2e8f0" font-size="19">.zshenv</text><text x="30" y="172" fill="#94a3b8" font-size="15">le maintenir silencieux et minimaliste</text></g>
  </g>
</svg>
