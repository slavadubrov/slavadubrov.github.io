<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Méthodes d’alignement : de PPO à ORPO</title>
  <desc id="artifact-desc">Méthodes d’alignement : de PPO à ORPO.</desc>
  <defs>
    <linearGradient id="sftGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="dpoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="orpoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#16a34a" />
      <stop offset="100%" stop-color="#166534" />
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8" />
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2563eb" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="900" height="420" fill="#f8fafc" />

  <!-- Title -->
  <text y="30" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" text-anchor="middle" fill="#1d4ed8" x="450">Méthodes d’alignement : de PPO à ORPO</text>

  <!-- Traditional RLHF -->
  <text y="65" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#334155" x="60">Traditionnel (RLHF) :</text>

  <rect x="60" y="80" width="130" height="45" rx="6" fill="url(#sftGrad)" />
  <text y="105" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ffffff" x="125">1. SFT</text>
  <text y="118" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)" x="125">Tâche d’apprentissage</text>

  <path d="M 190 102 L 220 102" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow)" />

  <rect x="230" y="80" width="130" height="45" rx="6" fill="#ea580c" />
  <text y="105" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ffffff" x="295">2. Modèle de récompense</text>
  <text y="118" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)" x="295">Découvrir les préférences</text>

  <path d="M 360 102 L 390 102" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow)" />

  <rect x="400" y="80" width="130" height="45" rx="6" fill="#dc2626" />
  <text y="105" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ffffff" x="465">3. PPO (apprentissage par renforcement)</text>
  <text y="118" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)" x="465">Optimiser la politique</text>

  <text y="98" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#dc2626" x="560">❌ Complexe</text>
  <text y="112" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#dc2626" x="560">❌ Coûteux</text>

  <!-- Divider -->
  <line x1="60" y1="150" x2="850" y2="150" stroke="#e2e8f0" stroke-width="1.5" />

  <!-- Modern DPO -->
  <text y="175" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#334155" x="60">Moderne (DPO) :</text>

  <rect x="60" y="190" width="130" height="45" rx="6" fill="url(#sftGrad)" />
  <text y="215" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ffffff" x="125">1. SFT</text>
  <text y="228" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)" x="125">Tâche d’apprentissage</text>

  <path d="M 190 212 L 220 212" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrowPurple)" />

  <rect x="230" y="190" width="130" height="45" rx="6" fill="url(#dpoGrad)" />
  <text y="215" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ffffff" x="295">2. DPO</text>
  <text y="228" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)" x="295">Préférence directe</text>

  <text y="205" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#166534" x="395">✓ Plus simple</text>
  <text y="220" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#166534" x="395">✓ Plus stable</text>
  <text y="235" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#166534" x="395">✓ Moins de calculs</text>

  <!-- Divider -->
  <line x1="60" y1="260" x2="850" y2="260" stroke="#e2e8f0" stroke-width="1.5" />

  <!-- Newest ORPO -->
  <text y="285" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#334155" x="60">Dernière version (ORPO) :</text>

  <rect x="60" y="300" width="200" height="50" rx="6" fill="url(#orpoGrad)" />
  <text y="322" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#ffffff" x="160">ORPO (une seule étape)</text>
  <text y="340" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)" x="160">SFT + alignement combinés</text>

  <text y="315" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#166534" x="290">✓ Une seule étape d’entraînement</text>
  <text y="330" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#166534" x="290">✓ Pas de SFT séparé</text>
  <text y="345" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#166534" x="290">✓ Déploiement le plus rapide en production</text>

  <!-- Recommendation Box -->
  <rect x="530" y="280" width="310" height="80" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" />
  <text y="305" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#9a3412" x="685">Recommandation 2025</text>
  <text y="325" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#9a3412" x="685">Commencez par ORPO pour la plupart des cas d’usage.</text>
  <text y="340" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#9a3412" x="685">Recourir au DPO pour un contrôle accru</text>
  <text y="355" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#9a3412" x="685">PPO uniquement pour des tâches spécialisées (génération de code)</text>

  <!-- Legend -->
  <rect x="60" y="375" width="780" height="35" rx="4" fill="#f1f5f9" />
  <text y="397" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#334155" x="80">Clé :</text>
  <text y="397" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" x="115">SFT = Ajustement fin supervisé</text>
  <text y="397" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" x="300">DPO = Optimisation directe des préférences</text>
  <text y="397" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" x="530">ORPO = Optimisation de la préférence par rapport au taux de cotes</text>
</svg>
