<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Comparaison des formats de sortie</title>
  <desc id="artifact-desc">Comparaison des formats de sortie.</desc>
  <defs>
    <linearGradient id="loraFmt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #2563eb" />
      <stop offset="100%" style="stop-color: #7c3aed" />
    </linearGradient>
    <linearGradient id="mergedFmt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #2563eb" />
      <stop offset="100%" style="stop-color: #2563eb" />
    </linearGradient>
    <linearGradient id="ggufFmt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #16a34a" />
      <stop offset="100%" style="stop-color: #166534" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="900" height="380" fill="#0f172a" />

  <!-- Title -->
  <text y="35" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="bold" x="450">Comparaison des formats de sortie</text>

  <!-- LoRA Adapter -->
  <rect x="40" y="70" width="260" height="290" rx="16" fill="url(#loraFmt)" filter="url(#shadow)" />
  <text y="110" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="bold" x="170">🔌 Adaptateur LoRA</text>

  <rect x="55" y="130" width="230" height="210" rx="8" fill="#1e293b" />

  <text y="160" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" x="70">TAILLE</text>
  <text y="180" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="14" x="70">Environ 100-500 Mo</text>

  <text y="210" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" x="70">COMMANDE</text>
  <text y="228" fill="#cbd5e1" font-family="SFMono-Regular, Consolas, monospace" font-size="10" x="70">exécution de l’ajustement fin du UV</text>

  <text y="258" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" x="70">Idéal pour</text>
  <text y="278" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="11" x="70">• Développement et tests</text>
  <text y="295" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="11" x="70">• Adaptateurs multiples</text>
  <text y="312" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="11" x="70">• Efficacité de stockage</text>
  <text y="329" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="11" x="70">• Gestion des versions</text>

  <!-- Merged Model -->
  <rect x="320" y="70" width="260" height="290" rx="16" fill="url(#mergedFmt)" filter="url(#shadow)" />
  <text y="110" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="bold" x="450">📦 Modèle fusionné</text>

  <rect x="335" y="130" width="230" height="210" rx="8" fill="#1e293b" />

  <text y="160" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" x="350">TAILLE</text>
  <text y="180" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="14" x="350">environ 8 à 16 Go</text>

  <text y="210" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" x="350">COMMANDE</text>
  <text y="228" fill="#cbd5e1" font-family="SFMono-Regular, Consolas, monospace" font-size="10" x="350">uv run finetune --merge</text>

  <text y="258" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" x="350">Idéal pour</text>
  <text y="278" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="11" x="350">• Partage avec d’autres</text>
  <text y="295" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="11" x="350">• Mise en service de vLLM</text>
  <text y="312" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="11" x="350">• Déploiement simple</text>
  <text y="329" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="11" x="350">• HuggingFace Hub</text>

  <!-- GGUF -->
  <rect x="600" y="70" width="260" height="290" rx="16" fill="url(#ggufFmt)" filter="url(#shadow)" />
  <text y="110" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="bold" x="730">🖥️ Format GGUF</text>

  <rect x="615" y="130" width="230" height="210" rx="8" fill="#1e293b" />

  <text y="160" fill="#86efac" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" x="630">TAILLE</text>
  <text y="180" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="14" x="630">Environ 2-4 Go (Q4_K_M)</text>

  <text y="210" fill="#86efac" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" x="630">COMMANDE</text>
  <text y="228" fill="#cbd5e1" font-family="SFMono-Regular, Consolas, monospace" font-size="10" x="630">uv run finetune --gguf q4_k_m</text>

  <text y="258" fill="#86efac" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" x="630">Idéal pour</text>
  <text y="278" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="11" x="630">• Inférence sur CPU</text>
  <text y="295" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="11" x="630">• Ollama / llama.cpp</text>
  <text y="312" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="11" x="630">• Déploiement sur le bord</text>
  <text y="329" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="11" x="630">• Systèmes à faibles ressources</text>
</svg>
