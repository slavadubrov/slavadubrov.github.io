<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Le cycle de vie du fine-tuning en 7 étapes</title>
  <desc id="artifact-desc">Le cycle de vie du fine-tuning en 7 étapes.</desc>
  <defs>
    <linearGradient id="stageGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="900" height="500" fill="#f8fafc" />

  <!-- Title -->
  <text y="35" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="600" text-anchor="middle" fill="#1d4ed8" x="450">Le cycle de vie du fine-tuning en 7 étapes</text>

  <!-- Stage boxes - Row 1 -->
  <g transform="translate(50, 70)">
    <rect width="160" height="65" rx="8" fill="url(#stageGrad)" />
    <text y="28" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#ffffff" x="80">1. Préparation des données</text>
    <text y="46" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="rgba(255,255,255,0.9)" x="80">Nettoyer, éliminer les doublons, formater</text>
  </g>

  <path d="M 210 102 L 240 102" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />

  <g transform="translate(250, 70)">
    <rect width="160" height="65" rx="8" fill="url(#stageGrad)" />
    <text y="28" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#ffffff" x="80">2. Sélection du modèle</text>
    <text y="46" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="rgba(255,255,255,0.9)" x="80">Sélectionner le modèle de base, charger</text>
  </g>

  <path d="M 410 102 L 440 102" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />

  <g transform="translate(450, 70)">
    <rect width="160" height="65" rx="8" fill="url(#stageGrad)" />
    <text y="28" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#ffffff" x="80">3. Configuration de l’entraînement</text>
    <text y="46" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="rgba(255,255,255,0.9)" x="80">Configurer le matériel et les paramètres</text>
  </g>

  <path d="M 610 102 L 640 102" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />

  <g transform="translate(650, 70)">
    <rect width="160" height="65" rx="8" fill="url(#stageGrad)" />
    <text y="28" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#ffffff" x="80">4. Ajustement fin</text>
    <text y="46" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="rgba(255,255,255,0.9)" x="80">SFT, DPO ou ORPO</text>
  </g>

  <!-- Arrow down -->
  <path d="M 730 135 L 730 170" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />

  <!-- Stage boxes - Row 2 -->
  <g transform="translate(650, 180)">
    <rect width="160" height="65" rx="8" fill="url(#stageGrad)" />
    <text y="28" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#ffffff" x="80">5. Évaluation</text>
    <text y="46" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="rgba(255,255,255,0.9)" x="80">Évaluation comparative, validation</text>
  </g>

  <path d="M 650 212 L 620 212" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />

  <g transform="translate(450, 180)">
    <rect width="160" height="65" rx="8" fill="url(#stageGrad)" />
    <text y="28" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#ffffff" x="80">6. Déploiement</text>
    <text y="46" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="rgba(255,255,255,0.9)" x="80">Exporter et servir le modèle</text>
  </g>

  <path d="M 450 212 L 420 212" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />

  <g transform="translate(250, 180)">
    <rect width="160" height="65" rx="8" fill="url(#stageGrad)" />
    <text y="28" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#ffffff" x="80">7. Surveillance</text>
    <text y="46" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="rgba(255,255,255,0.9)" x="80">Suivre, maintenir, itérer</text>
  </g>

  <!-- Feedback loop -->
  <path d="M 250 212 L 130 212 L 130 135" stroke="#ea580c" stroke-width="2" stroke-dasharray="6,3" fill="none" marker-end="url(#arrowhead-orange)" />
  <text y="175" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="#9a3412" x="130">Itérer</text>

  <!-- Key insight box -->
  <rect x="50" y="290" width="800" height="90" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" />
  <text y="320" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#166534" x="70">Insight clé : les données déterminent le destin</text>
  <text y="345" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#166534" x="70">• La phase 1 (Préparation des données) représente l’étape la plus stratégique : qualité avant quantité</text>
  <text y="365" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#166534" x="70">• 500 à 1 000 exemples soigneusement sélectionnés surpassent souvent 50 000 exemples bruités</text>

  <!-- Stage highlight -->
  <rect x="46" y="66" width="168" height="73" rx="10" fill="none" stroke="#16a34a" stroke-width="2" stroke-dasharray="4,2" />
  <text y="155" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" text-anchor="middle" fill="#166534" x="130">MAXIMALE EFFET DE LEVERAGE</text>
</svg>
