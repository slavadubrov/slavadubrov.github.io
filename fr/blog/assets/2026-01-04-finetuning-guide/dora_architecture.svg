<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">DoRA : Adaptation à bas rang décomposée en poids</title>
  <desc id="artifact-desc">DoRA : Adaptation à bas rang décomposée en poids.</desc>
  <defs>
    <linearGradient id="loraGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="doraGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2563eb" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="900" height="600" fill="#f8fafc" />

  <!-- Title -->
  <text y="35" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" text-anchor="middle" fill="#1d4ed8" x="450">DoRA : Adaptation à bas rang décomposée en poids</text>

  <!-- Left side: Standard LoRA -->
  <text y="70" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#1d4ed8" x="200">LoRA standard</text>

  <!-- Frozen Weight Matrix -->
  <rect x="80" y="90" width="240" height="70" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" />
  <text y="125" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#334155" x="200">W (Gelé)</text>
  <text y="145" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#334155" x="200">Poids pré-entraînés (d × d)</text>

  <!-- Plus sign -->
  <text y="135" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="600" fill="#2563eb" x="330">+</text>

  <!-- LoRA matrices -->
  <rect x="80" y="180" width="100" height="50" rx="4" fill="url(#loraGrad)" />
  <text y="205" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ffffff" x="130">Matrice B (r×d)</text>
  <text y="220" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.8)" x="130">apprenable</text>

  <text y="210" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" fill="#2563eb" x="195">×</text>

  <rect x="220" y="180" width="100" height="50" rx="4" fill="url(#loraGrad)" />
  <text y="205" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ffffff" x="270">Matrice A (d×r)</text>
  <text y="220" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.8)" x="270">apprenable</text>

  <!-- Formula -->
  <text y="260" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#1d4ed8" x="200">W' = W + B × A</text>

  <!-- Divider -->
  <line x1="450" y1="70" x2="450" y2="280" stroke="#cbd5e1" stroke-width="2" />

  <!-- Right side: DoRA -->
  <text y="70" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#7c3aed" x="680">DoRA (Décomposition des poids)</text>

  <!-- Frozen Weight Matrix -->
  <rect x="560" y="90" width="240" height="50" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" />
  <text y="115" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#334155" x="680">W → Module × Direction</text>
  <text y="132" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#2563eb" x="680">Décomposé</text>

  <!-- Arrow -->
  <path d="M 680 145 L 680 165" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <!-- Magnitude -->
  <rect x="500" y="175" width="130" height="50" rx="4" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" />
  <text y="198" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#9a3412" x="565">‖W‖ (Magnitude)</text>
  <text y="215" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="#9a3412" x="565">scalar entraînable</text>

  <text y="205" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" fill="#2563eb" x="645">×</text>

  <!-- Direction -->
  <rect x="670" y="175" width="130" height="50" rx="4" fill="url(#doraGrad)" />
  <text y="195" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ffffff" x="735">Direction (V)</text>
  <text y="212" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.8)" x="735">V + B×A (LoRA)</text>

  <!-- Formula -->
  <text y="260" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#1d4ed8" x="680">W' = m × (V + B × A)</text>

  <!-- Comparison Box -->
  <rect x="50" y="300" width="800" height="265" rx="8" fill="#faf5ff" stroke="#2563eb" stroke-width="1.5" />
  <text y="330" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#5b21b6" x="70">Pourquoi DoRA surpasse LoRA standard</text>

  <circle cx="70" cy="360" r="4" fill="#2563eb" />
  <text y="364" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1d4ed8" x="85">Mises à jour enrichies :</text>
  <text y="383" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" x="85">La séparation de la magnitude et de la direction permet des modifications de paramètres plus significatives</text>

  <circle cx="70" cy="410" r="4" fill="#2563eb" />
  <text y="414" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1d4ed8" x="85">Qualité proche de celle en temps plein :</text>
  <text y="433" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" x="85">Permet d’obtenir des résultats d’apprentissage proches de ceux obtenus par un affinage complet pour le raisonnement complexe.</text>

  <circle cx="70" cy="460" r="4" fill="#2563eb" />
  <text y="464" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1d4ed8" x="85">Même efficacité :</text>
  <text y="483" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" x="85">Permet une économie de mémoire d’environ 10 fois supérieure (seuls les scalaires de grandeur et les matrices LoRA sont entraînables)</text>

  <!-- When to use -->
  <rect x="70" y="500" width="760" height="65" rx="4" fill="#eff6ff" />
  <text y="521" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#5b21b6" x="85">Utilisez DoRA lorsque :</text>
  <text y="546" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" x="85" textLength="730" lengthAdjust="spacingAndGlyphs">Les LoRA standards atteignent une limite de performance sur les tâches complexes, ou bien il est nécessaire d’obtenir une qualité proche de celle d’un fine-tuning complet.</text>
</svg>
