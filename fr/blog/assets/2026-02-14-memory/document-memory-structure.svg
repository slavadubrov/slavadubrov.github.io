<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 500" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Document Memory: File-Based Structure</title>
  <desc id="artifact-desc">Document Memory: File-Based Structure.</desc>
  <defs>
    <marker id="arrowD" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#166534"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7c3aed"/>
    </marker>
    <filter id="shadowD" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a" x="410">Document Memory: File-Based Structure</text>

  <!-- Left side: Folder structure -->
  <rect x="20" y="50" width="360" height="420" rx="10" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" stroke-dasharray="5"/>
  <text y="75" text-anchor="middle" font-size="14" font-weight="700" fill="#166534" x="200">Folder Structure</text>

  <!-- Base directory -->
  <rect x="40" y="95" width="320" height="32" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowD)"/>
  <text y="116" font-size="12" font-weight="700" fill="#166534" x="50">📁 .agent-memory/</text>

  <!-- README -->
  <rect x="60" y="137" width="280" height="26" rx="4" fill="#ffffff" stroke="#16a34a" stroke-width="1" filter="url(#shadowD)"/>
  <text y="154" font-size="11" fill="#334155" x="70">📄 README.md</text>
  <text y="154" font-size="9" fill="#64748b" x="240">Human-readable guide</text>

  <!-- User profiles folder -->
  <rect x="60" y="173" width="280" height="26" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-width="1" filter="url(#shadowD)"/>
  <text y="190" font-size="11" font-weight="600" fill="#166534" x="70">📁 user-profiles/</text>

  <rect x="80" y="207" width="260" height="22" rx="4" fill="#ffffff" stroke="#16a34a" stroke-width="0.5" filter="url(#shadowD)"/>
  <text y="222" font-size="10" fill="#334155" x="90">📄 user-123.md</text>
  <text y="222" font-size="9" fill="#64748b" x="240">Preferences, history</text>

  <rect x="80" y="235" width="260" height="22" rx="4" fill="#ffffff" stroke="#16a34a" stroke-width="0.5" filter="url(#shadowD)"/>
  <text y="250" font-size="10" fill="#334155" x="90">📄 user-456.md</text>

  <!-- Research folder -->
  <rect x="60" y="267" width="280" height="26" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-width="1" filter="url(#shadowD)"/>
  <text y="284" font-size="11" font-weight="600" fill="#166534" x="70">📁 research/</text>

  <rect x="80" y="301" width="260" height="22" rx="4" fill="#ffffff" stroke="#16a34a" stroke-width="0.5" filter="url(#shadowD)"/>
  <text y="316" font-size="10" fill="#334155" x="90">📄 NVDA-2026-02.md</text>
  <text y="316" font-size="9" fill="#64748b" x="240">Analysis notes</text>

  <rect x="80" y="329" width="260" height="22" rx="4" fill="#ffffff" stroke="#16a34a" stroke-width="0.5" filter="url(#shadowD)"/>
  <text y="344" font-size="10" fill="#334155" x="90">📄 TSLA-2026-01.md</text>

  <!-- Conventions folder -->
  <rect x="60" y="361" width="280" height="26" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-width="1" filter="url(#shadowD)"/>
  <text y="378" font-size="11" font-weight="600" fill="#166534" x="70">📁 conventions/</text>

  <rect x="80" y="395" width="260" height="22" rx="4" fill="#ffffff" stroke="#16a34a" stroke-width="0.5" filter="url(#shadowD)"/>
  <text y="410" font-size="10" fill="#334155" x="90">📄 analysis-format.md</text>
  <text y="410" font-size="9" fill="#64748b" x="240">Report structure</text>

  <rect x="80" y="423" width="260" height="22" rx="4" fill="#ffffff" stroke="#16a34a" stroke-width="0.5" filter="url(#shadowD)"/>
  <text y="438" font-size="10" fill="#334155" x="90">📄 data-sources.md</text>
  <text y="438" font-size="9" fill="#64748b" x="240">API patterns</text>

  <!-- Right side: Operations -->
  <rect x="420" y="50" width="380" height="420" rx="10" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5"/>
  <text y="75" text-anchor="middle" font-size="14" font-weight="700" fill="#5b21b6" x="610">Agent Operations</text>

  <!-- Read operation -->
  <rect x="440" y="95" width="340" height="85" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowD)"/>
  <text y="115" text-anchor="middle" font-size="13" font-weight="600" fill="#5b21b6" x="610">Read Operation</text>

  <rect x="455" y="125" width="310" height="24" rx="4" fill="#ffffff" stroke="#7c3aed" stroke-width="1"/>
  <text y="142" font-size="10" font-weight="600" fill="#334155" x="465">doc_memory.read_doc("conventions/analysis-format.md")</text>

  <rect x="455" y="154" width="310" height="18" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
  <text y="167" font-size="9" fill="#166534" x="465">→ Returns Markdown content for agent to process</text>

  <!-- Write operation -->
  <rect x="440" y="195" width="340" height="105" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowD)"/>
  <text y="215" text-anchor="middle" font-size="13" font-weight="600" fill="#5b21b6" x="610">Write Operation</text>

  <rect x="455" y="225" width="310" height="24" rx="4" fill="#ffffff" stroke="#7c3aed" stroke-width="1"/>
  <text y="242" font-size="10" font-weight="600" fill="#334155" x="465">doc_memory.write_doc("research/NVDA-2026-02.md", ...)</text>

  <rect x="455" y="254" width="310" height="38" rx="4" fill="#fff7ed" stroke="#ea580c" stroke-width="1"/>
  <text y="268" font-size="9" fill="#334155" x="465">→ Creates/overwrites file with research summary</text>
  <text y="280" font-size="9" fill="#334155" x="465">→ Optional: metadata stored as .md.meta JSON sidecar</text>

  <!-- List operation -->
  <rect x="440" y="315" width="340" height="70" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowD)"/>
  <text y="335" text-anchor="middle" font-size="13" font-weight="600" fill="#5b21b6" x="610">List Operation</text>

  <rect x="455" y="345" width="310" height="24" rx="4" fill="#ffffff" stroke="#7c3aed" stroke-width="1"/>
  <text y="362" font-size="10" font-weight="600" fill="#334155" x="465">doc_memory.list_docs("research/*.md")</text>

  <rect x="455" y="373" width="310" height="24" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
  <text y="390" font-size="9" fill="#166534" x="465">→ Returns: ["research/NVDA-2026-02.md", "research/TSLA-2026-01.md"]</text>

  <!-- Search operation -->
  <rect x="440" y="400" width="340" height="55" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowD)"/>
  <text y="420" text-anchor="middle" font-size="13" font-weight="600" fill="#5b21b6" x="610">Search Operation</text>

  <rect x="455" y="430" width="310" height="18" rx="4" fill="#ffffff" stroke="#7c3aed" stroke-width="1"/>
  <text y="443" font-size="10" font-weight="600" fill="#334155" x="465">doc_memory.search_docs("pytest")</text>

  <!-- Arrows connecting structure to operations -->
  <path d="M380 240 Q400 240 420 240" stroke="#166534" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <text y="232" font-size="9" font-weight="600" fill="#166534" x="390">read</text>

  <path d="M420 280 Q400 280 380 280" stroke="#7c3aed" stroke-width="2" fill="none" marker-end="url(#arrowPurple)"/>
  <text y="272" font-size="9" font-weight="600" fill="#5b21b6" x="390">write</text>

  <!-- Bottom note -->
  <rect x="20" y="480" width="780" height="28" rx="14" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text y="499" text-anchor="middle" font-size="11" fill="#334155" x="410">Key insight: Agent and human both read/write the same files — fully transparent, git-native memory</text>
</svg>
