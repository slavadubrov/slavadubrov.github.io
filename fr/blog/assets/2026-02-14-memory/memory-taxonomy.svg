<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 550" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Taxonomie de la mémoire des agents</title>
  <desc id="artifact-desc">Taxonomie de la mémoire des agents.</desc>
  <defs>
    <filter id="shadowT" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a" x="550">Taxonomie de la mémoire des agents</text>

  <!-- Root Node -->
  <rect x="465" y="55" width="170" height="40" rx="20" fill="#7c3aed" filter="url(#shadowT)" />
  <text y="81" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff" x="550">Mémoire de l’agent</text>

  <!-- Lines from root to three main branches -->
  <line x1="490" y1="95" x2="180" y2="145" stroke="#94a3b8" stroke-width="1.5" />
  <line x1="550" y1="95" x2="550" y2="145" stroke="#94a3b8" stroke-width="1.5" />
  <line x1="610" y1="95" x2="920" y2="145" stroke="#94a3b8" stroke-width="1.5" />

  <!-- Hot Memory Branch (Left: x=30-330, width=300) -->
  <rect x="30" y="145" width="300" height="50" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadowT)" />
  <text y="165" text-anchor="middle" font-size="13" font-weight="600" fill="#1d4ed8" x="180">Mémoire chaude</text>
  <text y="184" text-anchor="middle" font-size="10" fill="#64748b" x="180">(Portée de session)</text>

  <!-- Cold Memory Branch (Center: x=400-700, width=300) -->
  <rect x="400" y="145" width="300" height="50" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadowT)" />
  <text y="165" text-anchor="middle" font-size="13" font-weight="600" fill="#9a3412" x="550">Mémoire froide</text>
  <text y="184" text-anchor="middle" font-size="10" fill="#64748b" x="550">(Entre sessions)</text>

  <!-- Document Memory Branch (Right: x=770-1070, width=300) -->
  <rect x="770" y="145" width="300" height="50" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="2" filter="url(#shadowT)" />
  <text y="165" text-anchor="middle" font-size="13" font-weight="600" fill="#166534" x="920">Mémoire de document</text>
  <text y="184" text-anchor="middle" font-size="10" fill="#64748b" x="920">(Connaissances du projet)</text>

  <!-- Hot Memory Children: Working + Short-term -->
  <line x1="105" y1="195" x2="105" y2="230" stroke="#94a3b8" stroke-width="1" />
  <line x1="255" y1="195" x2="255" y2="230" stroke="#94a3b8" stroke-width="1" />

  <!-- Working Memory (Purple - LLM/fastest tier) -->
  <rect x="40" y="230" width="130" height="65" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowT)" />
  <text y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6" x="105">Mémoire de travail</text>
  <text y="265" text-anchor="middle" font-size="9" fill="#64748b" x="105">Étape actuelle</text>
  <text y="278" text-anchor="middle" font-size="9" fill="#64748b" x="105">Arguments de l’outil, LLM</text>
  <text y="291" text-anchor="middle" font-size="9" fill="#64748b" x="105">buffère de réponse</text>

  <!-- Short-term (Checkpoints) -->
  <rect x="190" y="230" width="130" height="65" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowT)" />
  <text y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8" x="255">À court terme</text>
  <text y="265" text-anchor="middle" font-size="9" fill="#64748b" x="255">Points de contrôle</text>
  <text y="278" text-anchor="middle" font-size="9" fill="#64748b" x="255">État de la thread</text>
  <text y="291" text-anchor="middle" font-size="9" fill="#64748b" x="255">Minutes-heures</text>

  <!-- Cold Memory Children: Episodic + Semantic -->
  <line x1="475" y1="195" x2="475" y2="230" stroke="#94a3b8" stroke-width="1" />
  <line x1="625" y1="195" x2="625" y2="230" stroke="#94a3b8" stroke-width="1" />

  <!-- Episodic -->
  <rect x="410" y="230" width="130" height="65" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowT)" />
  <text y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412" x="475">Épisodique</text>
  <text y="265" text-anchor="middle" font-size="9" fill="#64748b" x="475">Interactions antérieures</text>
  <text y="278" text-anchor="middle" font-size="9" fill="#64748b" x="475">Journaux de conversation</text>
  <text y="291" text-anchor="middle" font-size="9" fill="#64748b" x="475">Jours-mois</text>

  <!-- Semantic -->
  <rect x="560" y="230" width="130" height="65" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowT)" />
  <text y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412" x="625">Sémantique</text>
  <text y="265" text-anchor="middle" font-size="9" fill="#64748b" x="625">Données, connaissances</text>
  <text y="278" text-anchor="middle" font-size="9" fill="#64748b" x="625">Préférences de l’utilisateur</text>
  <text y="291" text-anchor="middle" font-size="9" fill="#64748b" x="625">Mois permanents</text>

  <!-- Document Memory Children: Conventions + Research + Learnings -->
  <line x1="820" y1="195" x2="820" y2="230" stroke="#94a3b8" stroke-width="1" />
  <line x1="920" y1="195" x2="920" y2="230" stroke="#94a3b8" stroke-width="1" />
  <line x1="1020" y1="195" x2="1020" y2="230" stroke="#94a3b8" stroke-width="1" />

  <!-- Conventions -->
  <rect x="775" y="230" width="90" height="65" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowT)" />
  <text y="247" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="820">Conventions</text>
  <text y="262" text-anchor="middle" font-size="9" fill="#64748b" x="820">Règles du projet</text>
  <text y="274" text-anchor="middle" font-size="9" fill="#64748b" x="820">Style de codage</text>
  <text y="286" text-anchor="middle" font-size="9" fill="#64748b" x="820">Formats</text>

  <!-- Research Notes -->
  <rect x="875" y="230" width="90" height="65" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowT)" />
  <text y="247" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="920">Recherche</text>
  <text y="262" text-anchor="middle" font-size="9" fill="#64748b" x="920">Notes d'analyse</text>
  <text y="274" text-anchor="middle" font-size="9" fill="#64748b" x="920">Résumés</text>
  <text y="286" text-anchor="middle" font-size="9" fill="#64748b" x="920">Résultats</text>

  <!-- Learnings -->
  <rect x="975" y="230" width="90" height="65" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowT)" />
  <text y="247" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="1020">Résultats d’apprentissage</text>
  <text y="262" text-anchor="middle" font-size="9" fill="#64748b" x="1020">Modèles</text>
  <text y="274" text-anchor="middle" font-size="9" fill="#64748b" x="1020">Erreurs à éviter</text>
  <text y="286" text-anchor="middle" font-size="9" fill="#64748b" x="1020">Solutions</text>

  <!-- Procedural Memory (System-wide, separate footer bar) -->
  <rect x="30" y="325" width="1040" height="50" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadowT)" />
  <text y="345" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6" x="550">Mémoire procédurale (à l’échelle du système)</text>
  <text y="363" text-anchor="middle" font-size="10" fill="#64748b" x="550">Prompt système, définitions d’outils, fichiers de configuration — permanents, non spécifiques à l’utilisateur</text>

  <!-- Summary bars for each column -->
  <rect x="30" y="395" width="300" height="40" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1" />
  <text y="413" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8" x="180">Rapide | En cours d’exécution/dans la base de données</text>
  <text y="428" text-anchor="middle" font-size="9" fill="#64748b" x="180">Millièmes de seconde-heures | Durée de vie de la session</text>

  <rect x="400" y="395" width="300" height="40" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1" />
  <text y="413" text-anchor="middle" font-size="10" font-weight="600" fill="#9a3412" x="550">Recherchable | Stockage vectoriel/KV</text>
  <text y="428" text-anchor="middle" font-size="9" fill="#64748b" x="550">Jours permanents | Rappel entre sessions</text>

  <rect x="770" y="395" width="300" height="40" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1" />
  <text y="413" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="920">Lisible par l'humain | Système de fichiers</text>
  <text y="428" text-anchor="middle" font-size="9" fill="#64748b" x="920">Jours-éternels | Natif Git, modifiable</text>

  <!-- Access speed comparison -->
  <text y="468" font-size="10" fill="#64748b" x="30">Vitesse d’accès :</text>
  <rect x="130" y="455" width="940" height="20" rx="10" fill="none" stroke="#cbd5e1" stroke-width="1" />
  <rect x="131" y="456" width="235" height="18" rx="9" fill="#faf5ff" opacity="0.8" />
  <text y="470" text-anchor="middle" font-size="9" font-weight="600" fill="#5b21b6" x="248">Instantané (en mémoire)</text>
  <rect x="366" y="456" width="235" height="18" rx="9" fill="#eff6ff" opacity="0.8" />
  <text y="470" text-anchor="middle" font-size="9" font-weight="600" fill="#1d4ed8" x="483">Vitesse élevée (I/O base de données/fichier en ms)</text>
  <rect x="601" y="456" width="235" height="18" rx="9" fill="#fff7ed" opacity="0.8" />
  <text y="470" text-anchor="middle" font-size="9" font-weight="600" fill="#9a3412" x="718">Plus lent (incorporation + recherche)</text>
  <rect x="836" y="456" width="233" height="18" rx="9" fill="#f0fdf4" opacity="0.8" />
  <text y="470" text-anchor="middle" font-size="9" font-weight="600" fill="#166534" x="952">Vitesse élevée (lecture de fichier)</text>

  <!-- Storage type comparison -->
  <text y="508" font-size="10" fill="#64748b" x="30">Type de stockage :</text>
  <rect x="130" y="495" width="940" height="20" rx="10" fill="none" stroke="#cbd5e1" stroke-width="1" />
  <rect x="131" y="496" width="235" height="18" rx="9" fill="#faf5ff" opacity="0.8" />
  <text y="510" text-anchor="middle" font-size="9" font-weight="600" fill="#5b21b6" x="248">dictionnaire Python</text>
  <rect x="366" y="496" width="235" height="18" rx="9" fill="#eff6ff" opacity="0.8" />
  <text y="510" text-anchor="middle" font-size="9" font-weight="600" fill="#1d4ed8" x="483">Redis/PostgreSQL</text>
  <rect x="601" y="496" width="235" height="18" rx="9" fill="#fff7ed" opacity="0.8" />
  <text y="510" text-anchor="middle" font-size="9" font-weight="600" fill="#9a3412" x="718">Qdrant/pgvector</text>
  <rect x="836" y="496" width="233" height="18" rx="9" fill="#f0fdf4" opacity="0.8" />
  <text y="510" text-anchor="middle" font-size="9" font-weight="600" fill="#166534" x="952">Fichiers Markdown/JSON</text>
</svg>
