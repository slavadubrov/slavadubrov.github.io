<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="OWASP ASI Top 10 for 2026" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">OWASP ASI Top 10 pour 2026</title>
  <defs>
    <filter id="shadowA" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <text y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a" x="450">OWASP ASI Top 10 pour 2026</text>
  <text y="50" text-anchor="middle" font-size="11" fill="#64748b" x="450">Agentic Initiative de sécurité · publiée le 9 décembre 2025</text>

  <!-- Each row: 3-col icon-id / category / description -->
  <!-- ASI01 - red (Goal Hijack) -->
  <rect x="40" y="75" width="820" height="48" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#shadowA)" />
  <rect x="40" y="75" width="80" height="48" rx="6" fill="#dc2626" />
  <text y="107" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" x="80">ASI01</text>
  <text y="97" font-size="12" font-weight="700" fill="#0f172a" x="135">Vol de cible par l’agent</text>
  <text y="115" font-size="10" fill="#334155" x="135">Injection d’instructions directes et indirectes modifiant les objectifs de l’agent · EchoLeak</text>

  <!-- ASI02 - orange (Tool Misuse) -->
  <rect x="40" y="131" width="820" height="48" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowA)" />
  <rect x="40" y="131" width="80" height="48" rx="6" fill="#ea580c" />
  <text y="163" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" x="80">ASI02</text>
  <text y="153" font-size="12" font-weight="700" fill="#0f172a" x="135">Utilisation abusive et exploitation des outils</text>
  <text y="171" font-size="10" fill="#334155" x="135">Outils légitimes générant des effets secondaires nocifs · Amazon Q</text>

  <!-- ASI03 - red (Identity) -->
  <rect x="40" y="187" width="820" height="48" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#shadowA)" />
  <rect x="40" y="187" width="80" height="48" rx="6" fill="#dc2626" />
  <text y="219" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" x="80">ASI03</text>
  <text y="209" font-size="12" font-weight="700" fill="#0f172a" x="135">Abus d’identité et de privilèges</text>
  <text y="227" font-size="10" fill="#334155" x="135">Fidélité déléguée, identifiants hérités, exploitation de la fidélité entre agents · Azure MCP</text>

  <!-- ASI04 - orange (Supply Chain) -->
  <rect x="40" y="243" width="820" height="48" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowA)" />
  <rect x="40" y="243" width="80" height="48" rx="6" fill="#ea580c" />
  <text y="275" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" x="80">ASI04</text>
  <text y="265" font-size="12" font-weight="700" fill="#0f172a" x="135">Agentic Chaîne d’approvisionnement</text>
  <text y="283" font-size="10" fill="#334155" x="135">Outils, schémas et plugins compromis, prompts fiables au sein de runtime · axios · Trivy</text>

  <!-- ASI05 - red (Code Execution) -->
  <rect x="40" y="299" width="820" height="48" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#shadowA)" />
  <rect x="40" y="299" width="80" height="48" rx="6" fill="#dc2626" />
  <text y="331" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" x="80">ASI05</text>
  <text y="321" font-size="12" font-weight="700" fill="#0f172a" x="135">Exécution inattendue de code</text>
  <text y="339" font-size="10" fill="#334155" x="135">Code généré ou déclenché par un agent sans isolation · Claude Code CVE-2025-59536</text>

  <!-- ASI06 - purple (Memory Poisoning) -->
  <rect x="40" y="355" width="820" height="48" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowA)" />
  <rect x="40" y="355" width="80" height="48" rx="6" fill="#7c3aed" />
  <text y="387" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" x="80">ASI06</text>
  <text y="377" font-size="12" font-weight="700" fill="#0f172a" x="135">Empoisonnement de la mémoire et du contexte</text>
  <text y="395" font-size="10" fill="#334155" x="135">Injection ou corruption de RAG ou de la mémoire persistante entre sessions</text>

  <!-- ASI07 - blue (Inter-agent) -->
  <rect x="40" y="411" width="820" height="48" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowA)" />
  <rect x="40" y="411" width="80" height="48" rx="6" fill="#2563eb" />
  <text y="443" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" x="80">ASI07</text>
  <text y="433" font-size="12" font-weight="700" fill="#0f172a" x="135">Communication inter-agents non sécurisée</text>
  <text y="451" font-size="10" fill="#334155" x="135">Fausse attribution ou modification entre planificateurs, exécutants et sous-agents</text>

  <!-- ASI08 - orange (Cascading) -->
  <rect x="40" y="467" width="820" height="48" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowA)" />
  <rect x="40" y="467" width="80" height="48" rx="6" fill="#ea580c" />
  <text y="499" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" x="80">ASI08</text>
  <text y="489" font-size="12" font-weight="700" fill="#0f172a" x="135">Faillites en cascade des agents</text>
  <text y="507" font-size="10" fill="#334155" x="135">Les petits défauts se propagent à travers les outils et les graphes de confiance</text>

  <!-- ASI09 - purple (Trust Exploitation) -->
  <rect x="40" y="523" width="820" height="48" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowA)" />
  <rect x="40" y="523" width="80" height="48" rx="6" fill="#7c3aed" />
  <text y="555" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" x="80">ASI09</text>
  <text y="545" font-size="12" font-weight="700" fill="#0f172a" x="135">Exploitation de la confiance entre humain et agent</text>
  <text y="563" font-size="10" fill="#334155" x="135">Surconfiance, encadrement hiérarchique, diffusion des responsabilités</text>

  <!-- ASI10 - red (Rogue) -->
  <rect x="40" y="579" width="820" height="48" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#shadowA)" />
  <rect x="40" y="579" width="80" height="48" rx="6" fill="#dc2626" />
  <text y="611" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" x="80">ASI10</text>
  <text y="601" font-size="12" font-weight="700" fill="#0f172a" x="135">Agents indésirables</text>
  <text y="619" font-size="10" fill="#334155" x="135">Dérive d’objectif, manipulation des récompenses, autonomie émergente</text>

  <text y="660" text-anchor="middle" font-size="10" font-style="italic" fill="#64748b" x="450">Huit des dix catégories concernent principalement les problématiques harness, et non les problématiques liées aux sorties du modèle.</text>
</svg>
