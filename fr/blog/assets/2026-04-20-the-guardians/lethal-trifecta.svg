<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="The lethal trifecta" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">La triade mortelle</title>
  <defs>
    <filter id="shadowT" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <text y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a" x="400">La Trifecta mortelle de Simon Willison</text>
  <text y="52" text-anchor="middle" font-size="11" fill="#64748b" x="400">Tous les trois en même temps, et l’attaquant n’a pas besoin de la coopération du modèle.</text>

  <!-- Three circles -->
  <circle cx="300" cy="240" r="150" fill="#eff6ff" fill-opacity="0.6" stroke="#2563eb" stroke-width="2" />
  <circle cx="500" cy="240" r="150" fill="#fff7ed" fill-opacity="0.6" stroke="#ea580c" stroke-width="2" />
  <circle cx="400" cy="400" r="150" fill="#fef2f2" fill-opacity="0.6" stroke="#dc2626" stroke-width="2" />

  <!-- Circle labels -->
  <text y="230" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8" x="250">Données privées</text>
  <text y="248" text-anchor="middle" font-size="10" fill="#1d4ed8" x="250">boîte de réception · documents · dépôts</text>

  <text y="230" text-anchor="middle" font-size="14" font-weight="700" fill="#9a3412" x="550">Contenu non fiable</text>
  <text y="248" text-anchor="middle" font-size="10" fill="#9a3412" x="550">web · RAG · email</text>

  <text y="470" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b" x="400">Communication externe</text>
  <text y="488" text-anchor="middle" font-size="10" fill="#991b1b" x="400">Markdown · récupération d’image · webhook</text>

  <!-- Center skull circle -->
  <circle cx="400" cy="310" r="55" fill="#7c3aed" filter="url(#shadowT)" />
  <text y="305" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff" x="400">léthal</text>
  <text y="322" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff" x="400">trifecta</text>

  <!-- Example incident callouts -->
  <rect x="20" y="100" width="160" height="58" rx="6" fill="#ffffff" stroke="#2563eb" />
  <text y="120" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8" x="100">Fuite d’écho</text>
  <text y="136" text-anchor="middle" font-size="9" fill="#334155" x="100">boîte de réception + courriels RAG</text>
  <text y="150" text-anchor="middle" font-size="9" fill="#334155" x="100">Récupération en prévisualisation par équipe</text>

  <rect x="620" y="100" width="160" height="58" rx="6" fill="#ffffff" stroke="#ea580c" />
  <text y="120" text-anchor="middle" font-size="10" font-weight="600" fill="#9a3412" x="700">tout système de type Copilot</text>
  <text y="136" text-anchor="middle" font-size="9" fill="#334155" x="700">boîte de réception · récupération web</text>
  <text y="150" text-anchor="middle" font-size="9" fill="#334155" x="700">· tout canal de sortie</text>

  <text y="605" text-anchor="middle" font-size="10" font-style="italic" fill="#64748b" x="400">Lire n'importe quel diagramme d'architecture. S'il comporte les trois éléments, il s'agit d'une véritable tripléte.</text>
</svg>
