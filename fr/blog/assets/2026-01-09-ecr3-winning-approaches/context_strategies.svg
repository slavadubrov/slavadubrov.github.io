<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 500">
  <defs>
    <linearGradient id="bgGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="distillGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#be185d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="preloadGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hybridGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="compressGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <filter id="glow4" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="850" height="500" fill="url(#bgGrad4)" rx="16" />

  <!-- Title -->
  <text x="425" y="40" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600">Stratégies de gestion du contexte</text>
  <text x="425" y="62" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">Maximiser le rapport signal/bruit dans la fenêtre de contexte</text>

  <!-- Strategy 1: Rule Distillation -->
  <rect x="40" y="100" width="180" height="170" rx="12" fill="url(#distillGrad)" filter="url(#glow4)" />
  <text x="130" y="130" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="15" font-weight="600">Distillation de règles</text>
  <line x1="55" y1="145" x2="205" y2="145" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
  <text x="130" y="168" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="system-ui, sans-serif" font-size="11">Prétraitement du wiki à l’aide d’un LLM</text>
  <text x="130" y="188" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="system-ui, sans-serif" font-size="11">Compacter en règles opérationnelles</text>
  <text x="130" y="208" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="system-ui, sans-serif" font-size="11">Prompt système de ~320 tokens</text>
  <rect x="60" y="225" width="140" height="30" rx="6" fill="rgba(255,255,255,0.15)" />
  <text x="130" y="245" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="10" font-weight="500">Équipes : Kc7F2N, f1Uixf</text>

  <!-- Strategy 2: Aggressive Preloading -->
  <rect x="245" y="100" width="180" height="170" rx="12" fill="url(#preloadGrad)" filter="url(#glow4)" />
  <text x="335" y="130" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="15" font-weight="600">Préchargement agressif</text>
  <line x1="260" y1="145" x2="410" y2="145" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
  <text x="335" y="168" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="system-ui, sans-serif" font-size="11">Charger le profil utilisateur à l’avance</text>
  <text x="335" y="188" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="system-ui, sans-serif" font-size="11">Projets et clients à récupérer</text>
  <text x="335" y="208" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="system-ui, sans-serif" font-size="11">Enrichissement avant exécution</text>
  <rect x="265" y="225" width="140" height="30" rx="6" fill="rgba(255,255,255,0.15)" />
  <text x="335" y="245" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="10" font-weight="500">Équipe : Lcnxuy</text>

  <!-- Strategy 3: Hybrid RAG -->
  <rect x="450" y="100" width="180" height="170" rx="12" fill="url(#hybridGrad)" filter="url(#glow4)" />
  <text x="540" y="130" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="15" font-weight="600">RAG hybride</text>
  <line x1="465" y1="145" x2="615" y2="145" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
  <text x="540" y="168" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="system-ui, sans-serif" font-size="11">Recherche à trois flux :</text>
  <text x="540" y="188" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="system-ui, sans-serif" font-size="11">• Expressions régulières (modèles)</text>
  <text x="540" y="206" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="system-ui, sans-serif" font-size="11">• Sémantique (concepts)</text>
  <text x="540" y="224" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="system-ui, sans-serif" font-size="11">• Mot-clé (solution de repli)</text>
  <rect x="470" y="235" width="140" height="26" rx="6" fill="rgba(255,255,255,0.15)" />
  <text x="540" y="253" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="10" font-weight="500">Équipe : J8Gvbi</text>

  <!-- Strategy 4: History Compression -->
  <rect x="655" y="100" width="160" height="170" rx="12" fill="url(#compressGrad)" filter="url(#glow4)" />
  <text x="735" y="130" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="15" font-weight="600">Compression de l’historique</text>
  <line x1="670" y1="145" x2="800" y2="145" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
  <text x="735" y="168" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="system-ui, sans-serif" font-size="11">Garder les derniers échanges complets</text>
  <text x="735" y="188" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="system-ui, sans-serif" font-size="11">Compacter l'historique ancien</text>
  <text x="735" y="208" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="system-ui, sans-serif" font-size="11">Préserver l’espace de contexte</text>
  <rect x="665" y="225" width="140" height="30" rx="6" fill="rgba(255,255,255,0.15)" />
  <text x="735" y="245" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="10" font-weight="500">Équipe : NLN7Dw</text>

  <!-- Bottom: Trade-offs spectrum -->
  <rect x="80" y="320" width="690" height="140" rx="12" fill="rgba(148, 163, 184, 0.08)" stroke="#475569" stroke-width="1" />
  <text x="425" y="350" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Spectre des compromis</text>

  <!-- Spectrum line -->
  <line x1="120" y1="400" x2="730" y2="400" stroke="#475569" stroke-width="2" />
  <circle cx="120" cy="400" r="6" fill="#ec4899" />
  <circle cx="320" cy="400" r="6" fill="#f59e0b" />
  <circle cx="530" cy="400" r="6" fill="#10b981" />
  <circle cx="730" cy="400" r="6" fill="#6366f1" />

  <!-- Labels -->
  <text x="120" y="425" text-anchor="middle" fill="#f9a8d4" font-family="system-ui, sans-serif" font-size="10">Prompt Lean</text>
  <text x="120" y="440" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="9">Démarrage rapide</text>

  <text x="320" y="425" text-anchor="middle" fill="#fcd34d" font-family="system-ui, sans-serif" font-size="10">Données chargées en amont</text>
  <text x="320" y="440" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="9">Moins d’appels d’outils</text>

  <text x="530" y="425" text-anchor="middle" fill="#6ee7b7" font-family="system-ui, sans-serif" font-size="10">Recherche multimodale</text>
  <text x="530" y="440" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="9">Melhor recuperação</text>

  <text x="730" y="425" text-anchor="middle" fill="#a5b4fc" font-family="system-ui, sans-serif" font-size="10">Conversations longues</text>
  <text x="730" y="440" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="9">Mémoire préservée</text>
</svg>
