<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="Inter, system-ui, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">ReAct</title>
  <desc id="artifact-desc">ReAct.</desc>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155" />
    </marker>
    <marker id="arrowheadGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a" />
    </marker>
    <linearGradient id="reactGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #2563eb" />
      <stop offset="100%" style="stop-color: #2563eb" />
    </linearGradient>
    <linearGradient id="rewooGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #2563eb" />
      <stop offset="100%" style="stop-color: #7c3aed" />
    </linearGradient>
    <linearGradient id="planexecGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #16a34a" />
      <stop offset="100%" style="stop-color: #166534" />
    </linearGradient>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- ReAct Section -->
  <g transform="translate(20, 20)">
    <rect x="0" y="0" width="260" height="280" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
    <text y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1d4ed8" x="130">ReAct</text>
    <text y="48" text-anchor="middle" font-size="11" fill="#334155" x="130">(Raison + Action)</text>

    <!-- ReAct Flow -->
    <rect x="85" y="65" width="90" height="32" rx="6" fill="url(#reactGrad)" />
    <text y="85" text-anchor="middle" font-size="12" fill="#ffffff" x="130">Réflexion</text>

    <line x1="130" y1="97" x2="130" y2="115" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)" />

    <rect x="85" y="120" width="90" height="32" rx="6" fill="url(#reactGrad)" />
    <text y="140" text-anchor="middle" font-size="12" fill="#ffffff" x="130">Action</text>

    <line x1="130" y1="152" x2="130" y2="170" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)" />

    <rect x="85" y="175" width="90" height="32" rx="6" fill="url(#reactGrad)" />
    <text y="195" text-anchor="middle" font-size="12" fill="#ffffff" x="130">Observation</text>

    <!-- Loop arrow -->
    <path d="M175 191 Q 210 191 210 130 Q 210 81 175 81" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowhead)" />
    <text y="140" font-size="10" fill="#2563eb" x="225">Boucle</text>

    <text y="235" text-anchor="middle" font-size="10" fill="#334155" x="130">⚡ Flexible et adaptable</text>
    <text y="250" text-anchor="middle" font-size="10" fill="#334155" x="130">⚠️ Latence élevée + nombre de tokens</text>
    <text y="265" text-anchor="middle" font-size="10" fill="#334155" x="130">Idéal pour : l’exploration</text>
  </g>

  <!-- ReWOO Section -->
  <g transform="translate(310, 20)">
    <rect x="0" y="0" width="260" height="280" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
    <text y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#5b21b6" x="130">ReWOO</text>
    <text y="48" text-anchor="middle" font-size="11" fill="#334155" x="130">Raisonnement sans observation</text>

    <!-- ReWOO Flow -->
    <rect x="85" y="65" width="90" height="32" rx="6" fill="url(#rewooGrad)" />
    <text y="85" text-anchor="middle" font-size="12" fill="#ffffff" x="130">Planificateur</text>

    <line x1="130" y1="97" x2="130" y2="115" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)" />

    <rect x="30" y="120" width="60" height="28" rx="4" fill="#eff6ff" />
    <text y="138" text-anchor="middle" font-size="10" fill="#5b21b6" x="60">#E1</text>
    <rect x="100" y="120" width="60" height="28" rx="4" fill="#eff6ff" />
    <text y="138" text-anchor="middle" font-size="10" fill="#5b21b6" x="130">#E2</text>
    <rect x="170" y="120" width="60" height="28" rx="4" fill="#eff6ff" />
    <text y="138" text-anchor="middle" font-size="10" fill="#5b21b6" x="200">#E3</text>

    <text y="165" text-anchor="middle" font-size="10" fill="#2563eb" x="130">⚡ Exécution parallèle</text>

    <line x1="130" y1="172" x2="130" y2="188" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)" />

    <rect x="85" y="192" width="90" height="32" rx="6" fill="url(#rewooGrad)" />
    <text y="212" text-anchor="middle" font-size="12" fill="#ffffff" x="130">Résolveur</text>

    <text y="250" text-anchor="middle" font-size="10" fill="#334155" x="130">⚡ Rapide et efficace en termes de tokens</text>
    <text y="265" text-anchor="middle" font-size="10" fill="#334155" x="130">⚠️ Rigide, fragile</text>
  </g>

  <!-- Plan-and-Execute Section -->
  <g transform="translate(600, 20)">
    <rect x="0" y="0" width="280" height="280" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" />
    <text y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#166534" x="140">Planification et exécution</text>
    <text y="48" text-anchor="middle" font-size="11" fill="#334155" x="140">Hiérarchique</text>

    <!-- Plan-and-Execute Flow -->
    <rect x="95" y="65" width="90" height="32" rx="6" fill="url(#planexecGrad)" />
    <text y="85" text-anchor="middle" font-size="12" fill="#ffffff" x="140">Planificateur</text>

    <line x1="140" y1="97" x2="140" y2="112" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)" />

    <!-- Executor box with internal ReAct -->
    <rect x="50" y="117" width="180" height="70" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1" />
    <text y="133" text-anchor="middle" font-size="11" font-weight="500" fill="#166534" x="140">Exécuteur (Agent ReAct)</text>
    <rect x="65" y="143" width="50" height="22" rx="4" fill="url(#planexecGrad)" />
    <text y="158" text-anchor="middle" font-size="9" fill="#ffffff" x="90">Étape 1</text>
    <rect x="125" y="143" width="50" height="22" rx="4" fill="url(#planexecGrad)" />
    <text y="158" text-anchor="middle" font-size="9" fill="#ffffff" x="150">Étape 2</text>
    <text y="158" font-size="12" fill="#166534" x="195">...</text>

    <line x1="140" y1="187" x2="140" y2="202" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)" />

    <rect x="95" y="207" width="90" height="32" rx="6" fill="url(#planexecGrad)" />
    <text y="227" text-anchor="middle" font-size="12" fill="#ffffff" x="140">Replanificateur</text>

    <!-- Loop back from Replanner to Executor - fixed with proper arrow marker -->
    <path d="M185 223 Q 240 223 240 150 Q 240 117 210 117" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowheadGreen)" />

    <text y="260" text-anchor="middle" font-size="10" fill="#334155" x="140">⚡ Le meilleur des deux mondes</text>
    <text y="275" text-anchor="middle" font-size="10" fill="#334155" x="140">Idéal pour : analyse complexe</text>
  </g>
</svg>
