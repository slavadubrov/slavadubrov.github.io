<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Grand modèle de fondation</title>
  <desc id="artifact-desc">Grand modèle de fondation.</desc>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="100%" height="100%" fill="#f8fafc" /><style>
    .model-box { fill: #fef2f2; stroke: #dc2626; stroke-width: 2; rx: 4; }
    .gpu-box { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 4; }
    .sync-box { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 4; }
    .text { font-family: Inter, system-ui, sans-serif; font-size: 14px; fill: #0f172a; text-anchor: middle; dominant-baseline: middle; }
    .path { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
  </style>


  <rect x="300" y="20" width="200" height="40" class="model-box" />
  <text y="40" class="text" x="400">Grand modèle de fondation</text>

  <!-- Distribution Arrows -->
  <path d="M 325 60 L 150 120" class="path" />
  <path d="M 375 60 L 310 120" class="path" />
  <path d="M 425 60 L 470 120" class="path" />
  <path d="M 475 60 L 630 120" class="path" />


  <rect x="100" y="120" width="100" height="60" class="gpu-box" />
  <text y="140" class="text" x="150">GPU 1</text>
  <text y="160" class="text" style="font-size: 10px;" x="150">couches 1 à 10</text>

  <rect x="260" y="120" width="100" height="60" class="gpu-box" />
  <text y="140" class="text" x="310">GPU 2</text>
  <text y="160" class="text" style="font-size: 10px;" x="310">couches 11 à 20</text>

  <rect x="420" y="120" width="100" height="60" class="gpu-box" />
  <text y="140" class="text" x="470">GPU 3</text>
  <text y="160" class="text" style="font-size: 10px;" x="470">couches 21 à 30</text>

  <rect x="580" y="120" width="100" height="60" class="gpu-box" />
  <text y="140" class="text" x="630">GPU 4</text>
  <text y="160" class="text" style="font-size: 10px;" x="630">couches 31-40</text>


  <rect x="260" y="220" width="260" height="40" class="sync-box" />
  <text y="240" class="text" x="390">Synchronisation des gradients</text>

  <path d="M150 180 V240 H260" class="path" />
  <path d="M310 180 V220" class="path" />
  <path d="M470 180 V220" class="path" />
  <path d="M630 180 V240 H520" class="path" />

</svg>
