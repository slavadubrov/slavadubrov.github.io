<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 610" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Les traces de production alimentent un cycle d’évaluation et de mise en production</title>
  <desc id="desc">Une demande de mise en production génère un trace contrôlé en fonction des exigences de confidentialité. Le processus de tri transforme une panne ayant fait l’objet d’une analyse en un cas de régression étiqueté. Un candidat est comparé hors ligne, mis en phase progressive, puis relâché dans la production.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#94a3b8" /></marker></defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="610" rx="28" fill="#0f172a" />
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Les traces transforment les incidents en preuves de déploiement</text>
  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <g transform="translate(50 185)"><rect width="160" height="115" rx="18" fill="#1d4ed8" /><text x="80" y="46" fill="#93c5fd" font-size="18" font-weight="700">Production</text><text x="80" y="78" fill="#93c5fd" font-size="14">manifeste + requête</text></g>
    <path d="M220 242 H255" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <g transform="translate(265 185)"><rect width="160" height="115" rx="18" fill="#1d4ed8" /><text x="80" y="46" fill="#93c5fd" font-size="18" font-weight="700">Journal d’activité</text><text x="80" y="78" fill="#93c5fd" font-size="14">échantillon + masquer</text></g>
    <path d="M435 242 H470" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <g transform="translate(480 185)"><rect width="160" height="115" rx="18" fill="#9a3412" /><text x="80" y="46" fill="#fdba74" font-size="18" font-weight="700">Tri</text><text x="80" y="78" fill="#fdba74" font-size="14">échec de revue</text></g>
    <path d="M650 242 H685" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <g transform="translate(695 185)"><rect width="160" height="115" rx="18" fill="#5b21b6" /><text x="80" y="46" fill="#93c5fd" font-size="18" font-weight="700">Régression</text><text x="80" y="78" fill="#c4b5fd" font-size="14">étiquette + tranche + rubrique</text></g>
    <path d="M865 242 H900" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <g transform="translate(910 185)"><rect width="230" height="115" rx="18" fill="#166534" /><text x="115" y="46" fill="#93c5fd" font-size="18" font-weight="700">Comparaison des candidats</text><text x="115" y="78" fill="#93c5fd" font-size="14">qualité • sécurité • coût • latence</text></g>
    <path d="M1025 310 V355 H610 V387" stroke="#94a3b8" stroke-width="4" fill="none" marker-end="url(#a)" />
    <rect x="400" y="395" width="420" height="92" rx="18" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" />
    <text x="610" y="433" fill="#93c5fd" font-size="20" font-weight="700">Exécuter, observer ou revenir en arrière</text><text x="610" y="463" fill="#93c5fd" font-size="14">ombre • canari • trafic limité • déclencheur explicite</text>
    <path d="M400 441 H130 V310" stroke="#94a3b8" stroke-width="4" fill="none" marker-end="url(#a)" />
    <rect x="235" y="525" width="730" height="52" rx="15" fill="#1e293b" /><text x="600" y="558" fill="#cbd5e1" font-size="16">Les retours des utilisateurs priorisent l’examen ; ils ne remplacent pas les étiquettes ni le traceur environnant.</text>
  </g>
</svg>
