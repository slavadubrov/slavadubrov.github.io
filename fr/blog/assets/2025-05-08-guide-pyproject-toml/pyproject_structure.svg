<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Quatre limites de propriété dans pyproject.toml</title>
  <desc id="desc">Quatre types de cartes permettent de distinguer le système de construction pour la compilation backend, le projet pour les métadonnées publiées, les groupes de dépendances pour les environnements non publiés, ainsi que les espaces de noms des outils pour les paramètres spécifiques à chaque outil.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="650" rx="28" fill="#0f172a" />
  <text x="600" y="68" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="31" font-weight="700">Un fichier, quatre propriétaires</text>
  <text x="600" y="104" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="17">Classer une configuration en fonction de son consommateur avant de sélectionner une table</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(70 155)"><rect width="500" height="185" rx="20" fill="#1d4ed8" /><text x="30" y="48" fill="#93c5fd" font-size="23" font-weight="700">[système de construction]</text><text x="30" y="88" fill="#93c5fd" font-size="18">Propriétaire : construire frontend et backend</text><text x="30" y="124" fill="#93c5fd" font-size="16">backend identité • exigences de compilation isolées</text><text x="30" y="154" fill="#93c5fd" font-size="16">arbre de source → sdist et wheel</text></g>
    <g transform="translate(630 155)"><rect width="500" height="185" rx="20" fill="#5b21b6" /><text x="30" y="48" fill="#93c5fd" font-size="23" font-weight="700">[projet]</text><text x="30" y="88" fill="#93c5fd" font-size="18">Propriétaire : les consommateurs de paquets</text><text x="30" y="124" fill="#c4b5fd" font-size="16">identité • exigences runtime • fonctionnalités supplémentaires</text><text x="30" y="154" fill="#c4b5fd" font-size="16">publié en tant que métadonnées de distribution</text></g>
    <g transform="translate(70 385)"><rect width="500" height="185" rx="20" fill="#166534" /><text x="30" y="48" fill="#93c5fd" font-size="23" font-weight="700">[groupes-de-dépendance]</text><text x="30" y="88" fill="#93c5fd" font-size="18">Propriétaire : flux de travail local</text><text x="30" y="124" fill="#93c5fd" font-size="16">test • lint • documentation • environnements hors package</text><text x="30" y="154" fill="#93c5fd" font-size="16">non publié dans les métadonnées du paquet</text></g>
    <g transform="translate(630 385)"><rect width="500" height="185" rx="20" fill="#9a3412" /><text x="30" y="48" fill="#fdba74" font-size="23" font-weight="700">[outil.*]</text><text x="30" y="88" fill="#fdba74" font-size="18">Propriétaire : l’outil désigné</text><text x="30" y="124" fill="#fdba74" font-size="16">clés et sémantiques définies par l’outil</text><text x="30" y="154" fill="#fdba74" font-size="16">pas de schéma partagé entre les espaces de noms</text></g>
  </g>
</svg>
