<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadowR" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <marker id="arrowR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e65100"/>
    </marker>
  </defs>

  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">The Ralph Wiggum Loop: A Harness in One Bash Line</text>
  <text x="450" y="50" text-anchor="middle" font-size="11" fill="#888">while :; do cat PROMPT.md | claude-code ; done</text>

  <!-- Loop ring: ellipse tangent to the four box mid-edges -->
  <ellipse cx="450" cy="270" rx="185" ry="115" fill="none" stroke="#e65100" stroke-width="2" stroke-dasharray="6,4" opacity="0.4"/>

  <!-- 1. PROMPT.md (top) -->
  <rect x="340" y="90" width="220" height="60" rx="10" fill="#fff3e0" stroke="#e65100" stroke-width="2" filter="url(#shadowR)"/>
  <text x="450" y="113" text-anchor="middle" font-size="13" font-weight="700" fill="#e65100">1 · Read PROMPT.md</text>
  <text x="450" y="132" text-anchor="middle" font-size="10" fill="#555">Plan file, todo list, task queue</text>

  <!-- Arrow from 1 → 2 -->
  <path d="M 560 135 Q 680 180 640 280" stroke="#e65100" stroke-width="2" fill="none" marker-end="url(#arrowR)"/>

  <!-- 2. Agent works (right) -->
  <rect x="640" y="245" width="200" height="60" rx="10" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" filter="url(#shadowR)"/>
  <text x="740" y="268" text-anchor="middle" font-size="13" font-weight="700" fill="#6a1b9a">2 · Agent runs</text>
  <text x="740" y="287" text-anchor="middle" font-size="10" fill="#555">One task, fresh context</text>

  <!-- Arrow from 2 → 3 -->
  <path d="M 640 300 Q 560 420 450 415" stroke="#e65100" stroke-width="2" fill="none" marker-end="url(#arrowR)"/>

  <!-- 3. Stop hook + verify (bottom) -->
  <rect x="320" y="390" width="260" height="70" rx="10" fill="#fce4ec" stroke="#c62828" stroke-width="2" filter="url(#shadowR)"/>
  <text x="450" y="415" text-anchor="middle" font-size="13" font-weight="700" fill="#c62828">3 · Stop hook intercepts</text>
  <text x="450" y="433" text-anchor="middle" font-size="10" fill="#555">Tests pass?  Linter clean?</text>
  <text x="450" y="448" text-anchor="middle" font-size="10" fill="#555">Promise tag matches?</text>

  <!-- Arrow from 3 → 4 -->
  <path d="M 330 420 Q 180 360 160 280" stroke="#e65100" stroke-width="2" fill="none" marker-end="url(#arrowR)"/>

  <!-- 4. Commit or retry (left) -->
  <rect x="60" y="245" width="200" height="60" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" filter="url(#shadowR)"/>
  <text x="160" y="268" text-anchor="middle" font-size="13" font-weight="700" fill="#2e7d32">4 · Commit · exit</text>
  <text x="160" y="287" text-anchor="middle" font-size="10" fill="#555">Bash loop restarts fresh</text>

  <!-- Arrow from 4 → 1 -->
  <path d="M 180 240 Q 220 150 340 130" stroke="#e65100" stroke-width="2" fill="none" marker-end="url(#arrowR)"/>

  <!-- Center annotation -->
  <rect x="370" y="245" width="160" height="50" rx="6" fill="#f8f9fa" stroke="#6a1b9a" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="450" y="265" text-anchor="middle" font-size="10" font-weight="600" fill="#6a1b9a">no orchestrator</text>
  <text x="450" y="281" text-anchor="middle" font-size="10" font-weight="600" fill="#6a1b9a">no planner</text>

  <!-- Footer -->
  <text x="450" y="483" text-anchor="middle" font-size="9" font-style="italic" fill="#888">Geoffrey Huntley, July 14 2025 · Now shipped as an official Anthropic plugin</text>
</svg>
