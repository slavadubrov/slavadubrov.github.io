<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 600" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadowE" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <marker id="arrowE" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/>
    </marker>
  </defs>

  <text x="550" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">Anthropic's Three-Stage Evolution for Long-Running Agents</text>
  <text x="550" y="50" text-anchor="middle" font-size="11" fill="#888">From solo loop to planner / generator / evaluator — then Opus 4.5 obsoletes half the scaffolding</text>

  <!-- Stage 1: Solo -->
  <rect x="40" y="90" width="300" height="340" rx="12" fill="#fce4ec" stroke="#c62828" stroke-width="2" filter="url(#shadowE)"/>
  <text x="190" y="120" text-anchor="middle" font-size="14" font-weight="700" fill="#c62828">Stage 1 · Solo Agent</text>
  <text x="190" y="138" text-anchor="middle" font-size="10" font-style="italic" fill="#c62828">one SDK loop, high-level prompt</text>

  <circle cx="190" cy="210" r="50" fill="#c62828" filter="url(#shadowE)"/>
  <text x="190" y="206" text-anchor="middle" font-size="12" font-weight="700" fill="white">Agent</text>
  <text x="190" y="223" text-anchor="middle" font-size="10" fill="#ffcccc">solo</text>

  <rect x="55" y="290" width="270" height="125" rx="6" fill="#fff" stroke="#c62828" stroke-width="1"/>
  <text x="70" y="310" font-size="10" font-weight="700" fill="#c62828">Failure modes</text>
  <text x="70" y="330" font-size="10" fill="#555">· premature completion</text>
  <text x="70" y="347" font-size="10" fill="#555">· feature amnesia across windows</text>
  <text x="70" y="364" font-size="10" fill="#555">· duplicated work on resume</text>
  <text x="70" y="381" font-size="10" fill="#555">· context anxiety (Sonnet 4.5)</text>
  <text x="70" y="402" font-size="9" font-style="italic" fill="#888">"falls short on a high-level prompt"</text>

  <!-- Arrow -->
  <line x1="350" y1="230" x2="390" y2="230" stroke="#888" stroke-width="2" marker-end="url(#arrowE)"/>

  <!-- Stage 2: Initializer + coder -->
  <rect x="400" y="90" width="300" height="340" rx="12" fill="#fff3e0" stroke="#e65100" stroke-width="2" filter="url(#shadowE)"/>
  <text x="550" y="120" text-anchor="middle" font-size="14" font-weight="700" fill="#e65100">Stage 2 · Initializer + Coder</text>
  <text x="550" y="138" text-anchor="middle" font-size="10" font-style="italic" fill="#e65100">same harness, different opening prompts</text>

  <circle cx="480" cy="210" r="40" fill="#e65100" filter="url(#shadowE)"/>
  <text x="480" y="208" text-anchor="middle" font-size="11" font-weight="700" fill="white">Init</text>
  <text x="480" y="223" text-anchor="middle" font-size="9" fill="#ffe0cc">once</text>

  <line x1="520" y1="210" x2="580" y2="210" stroke="#888" stroke-width="1.5" marker-end="url(#arrowE)"/>
  <text x="550" y="200" text-anchor="middle" font-size="9" fill="#888">progress.txt</text>

  <circle cx="620" cy="210" r="40" fill="#e65100" filter="url(#shadowE)"/>
  <text x="620" y="208" text-anchor="middle" font-size="11" font-weight="700" fill="white">Coder</text>
  <text x="620" y="223" text-anchor="middle" font-size="9" fill="#ffe0cc">shifts</text>

  <rect x="415" y="290" width="270" height="95" rx="6" fill="#fff" stroke="#e65100" stroke-width="1"/>
  <text x="430" y="310" font-size="10" font-weight="700" fill="#e65100">New primitives</text>
  <text x="430" y="330" font-size="10" fill="#555">· claude-progress.txt + git commits</text>
  <text x="430" y="347" font-size="10" fill="#555">· init.sh bootstrapping</text>
  <text x="430" y="364" font-size="10" fill="#555">· JSON feature list as spec</text>
  <text x="430" y="378" font-size="9" font-style="italic" fill="#888">"two agents" = same harness, different prompts</text>

  <!-- Problem callout bridging Stage 2 → Stage 3 -->
  <rect x="415" y="395" width="270" height="28" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1.5"/>
  <text x="550" y="413" text-anchor="middle" font-size="10" font-weight="600" fill="#c62828">⚠ agents grade their own homework</text>

  <!-- Arrow with callout label -->
  <line x1="710" y1="230" x2="750" y2="230" stroke="#888" stroke-width="2" marker-end="url(#arrowE)"/>
  <text x="730" y="220" text-anchor="middle" font-size="9" font-weight="600" fill="#2e7d32">+ Eval</text>

  <!-- Stage 3: Planner / Generator / Evaluator -->
  <rect x="760" y="90" width="300" height="340" rx="12" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" filter="url(#shadowE)"/>
  <text x="910" y="120" text-anchor="middle" font-size="14" font-weight="700" fill="#2e7d32">Stage 3 · Planner / Gen / Eval</text>
  <text x="910" y="138" text-anchor="middle" font-size="10" font-style="italic" fill="#2e7d32">explicit evaluator beats self-flattery</text>

  <circle cx="820" cy="210" r="32" fill="#2e7d32" filter="url(#shadowE)"/>
  <text x="820" y="215" text-anchor="middle" font-size="10" font-weight="700" fill="white">Plan</text>

  <line x1="852" y1="210" x2="880" y2="210" stroke="#888" stroke-width="1.5" marker-end="url(#arrowE)"/>

  <circle cx="910" cy="210" r="32" fill="#2e7d32" filter="url(#shadowE)"/>
  <text x="910" y="215" text-anchor="middle" font-size="10" font-weight="700" fill="white">Gen</text>

  <line x1="942" y1="210" x2="970" y2="210" stroke="#888" stroke-width="1.5" marker-end="url(#arrowE)"/>

  <circle cx="1000" cy="210" r="32" fill="#2e7d32" filter="url(#shadowE)"/>
  <text x="1000" y="215" text-anchor="middle" font-size="10" font-weight="700" fill="white">Eval</text>

  <!-- Feedback arrow: symmetric cubic under the three nodes -->
  <path d="M 1000 242 C 1000 308, 820 308, 820 242" stroke="#2e7d32" stroke-width="1.5" fill="none" stroke-dasharray="3,3" marker-end="url(#arrowE)"/>
  <text x="910" y="302" text-anchor="middle" font-size="9" fill="#2e7d32">critique feedback</text>

  <rect x="775" y="320" width="270" height="95" rx="6" fill="#fff" stroke="#2e7d32" stroke-width="1"/>
  <text x="790" y="340" font-size="10" font-weight="700" fill="#2e7d32">Primitives</text>
  <text x="790" y="360" font-size="10" fill="#555">· Playwright MCP for live UI grading</text>
  <text x="790" y="377" font-size="10" fill="#555">· 5–15 iteration cycles, up to 4 hours</text>
  <text x="790" y="394" font-size="10" fill="#555">· context resets, not just compaction</text>

  <!-- Bottom banner: Opus 4.5 -->
  <rect x="40" y="465" width="1020" height="90" rx="10" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" filter="url(#shadowE)"/>
  <text x="550" y="490" text-anchor="middle" font-size="13" font-weight="700" fill="#6a1b9a">Then Opus 4.5 shipped, and half the scaffolding turned into dead weight.</text>
  <text x="550" y="512" text-anchor="middle" font-size="10" fill="#555">Context anxiety disappeared. Context resets — load-bearing three months earlier — became obsolete overnight.</text>
  <text x="550" y="530" text-anchor="middle" font-size="10" fill="#555">The Managed Agents paper's lesson: every harness component encodes an assumption about what the model can't do yet.</text>
  <text x="550" y="548" text-anchor="middle" font-size="10" font-style="italic" fill="#6a1b9a">Build the car so you can swap the engine.</text>

  <text x="550" y="580" text-anchor="middle" font-size="9" fill="#aaa">Source: Anthropic engineering posts — "Effective harnesses," "Harness design for long-running apps" (Rajasekaran), "Managed Agents"</text>
</svg>
