<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 560" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="550" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">Cinq modalités d’outils pour les agents IA</text>
  <text x="550" y="50" text-anchor="middle" font-size="11" fill="#888">Des schémas verbeux à une exécution sans surcoût</text>

  <!-- Central Agent Node -->
  <rect x="460" y="70" width="180" height="50" rx="25" fill="#6a1b9a" filter="url(#shadow)" />
  <text x="550" y="100" text-anchor="middle" font-size="14" font-weight="600" fill="white">Agent d'IA</text>

  <!-- Connecting lines from agent to each modality -->
  <line x1="480" y1="120" x2="140" y2="175" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="510" y1="120" x2="360" y2="175" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="550" y1="120" x2="550" y2="175" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="590" y1="120" x2="740" y2="175" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="620" y1="120" x2="960" y2="175" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- 1. JSON Tool Calling -->
  <rect x="30" y="175" width="200" height="130" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" filter="url(#shadow)" />
  <text x="130" y="200" text-anchor="middle" font-size="13" font-weight="600" fill="#1565c0">Appel de l’outil JSON</text>
  <line x1="50" y1="210" x2="210" y2="210" stroke="#1565c0" stroke-width="0.5" opacity="0.3" />
  <text x="130" y="228" text-anchor="middle" font-size="10" fill="#555">Schéma par requête</text>
  <text x="130" y="244" text-anchor="middle" font-size="10" fill="#555">Appels séquentiels 1:1</text>
  <text x="130" y="260" text-anchor="middle" font-size="10" fill="#555">Entrée/sortie structurée</text>
  <rect x="55" y="275" width="150" height="20" rx="4" fill="#1565c0" opacity="0.15" />
  <text x="130" y="290" text-anchor="middle" font-size="10" font-weight="600" fill="#1565c0">Surcoût moyen</text>

  <!-- 2. MCP -->
  <rect x="255" y="175" width="200" height="130" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="2" filter="url(#shadow)" />
  <text x="355" y="200" text-anchor="middle" font-size="13" font-weight="600" fill="#c62828">Serveurs MCP</text>
  <line x1="275" y1="210" x2="435" y2="210" stroke="#c62828" stroke-width="0.5" opacity="0.3" />
  <text x="355" y="228" text-anchor="middle" font-size="10" fill="#555">550 à 1 400 tokens/outil</text>
  <text x="355" y="244" text-anchor="middle" font-size="10" fill="#555">+10 000 serveurs, +50 vulnérabilités CVE</text>
  <text x="355" y="260" text-anchor="middle" font-size="10" fill="#555">Standard inter-fournisseurs</text>
  <rect x="280" y="275" width="150" height="20" rx="4" fill="#c62828" opacity="0.15" />
  <text x="355" y="290" text-anchor="middle" font-size="10" font-weight="600" fill="#c62828">Coûts d’exploitation très élevés</text>

  <!-- 3. Skills (SKILL.md) -->
  <rect x="475" y="175" width="200" height="130" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" filter="url(#shadow)" />
  <text x="575" y="200" text-anchor="middle" font-size="13" font-weight="600" fill="#6a1b9a">Compétences (SKILL.md)</text>
  <line x1="495" y1="210" x2="655" y2="210" stroke="#6a1b9a" stroke-width="0.5" opacity="0.3" />
  <text x="575" y="228" text-anchor="middle" font-size="10" fill="#555">Metadata d’environ 100 tokens</text>
  <text x="575" y="244" text-anchor="middle" font-size="10" fill="#555">Expertise, pas exécution</text>
  <text x="575" y="260" text-anchor="middle" font-size="10" fill="#555">8+ plateformes adoptées</text>
  <rect x="500" y="275" width="150" height="20" rx="4" fill="#6a1b9a" opacity="0.15" />
  <text x="575" y="290" text-anchor="middle" font-size="10" font-weight="600" fill="#6a1b9a">Coûts d’exploitation très faibles</text>

  <!-- 4. CLI/Bash -->
  <rect x="695" y="175" width="200" height="130" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" filter="url(#shadow)" />
  <text x="795" y="200" text-anchor="middle" font-size="13" font-weight="600" fill="#2e7d32">Outils CLI / Bash</text>
  <line x1="715" y1="210" x2="875" y2="210" stroke="#2e7d32" stroke-width="0.5" opacity="0.3" />
  <text x="795" y="228" text-anchor="middle" font-size="10" fill="#555">Manifeste d’environ 100 tokens</text>
  <text x="795" y="244" text-anchor="middle" font-size="10" fill="#555">Fluidezza du modèle natif</text>
  <text x="795" y="260" text-anchor="middle" font-size="10" fill="#555">Tuyaux, composabilité</text>
  <rect x="720" y="275" width="150" height="20" rx="4" fill="#2e7d32" opacity="0.15" />
  <text x="795" y="290" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">Surcoût proche de zéro</text>

  <!-- 5. Code Execution (PTC) -->
  <rect x="895" y="175" width="200" height="130" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="2" filter="url(#shadow)" />
  <text x="995" y="200" text-anchor="middle" font-size="13" font-weight="600" fill="#e65100">Exécution de code</text>
  <line x1="915" y1="210" x2="1075" y2="210" stroke="#e65100" stroke-width="0.5" opacity="0.3" />
  <text x="995" y="228" text-anchor="middle" font-size="10" fill="#555">Réduction de 98,7 % des tokens</text>
  <text x="995" y="244" text-anchor="middle" font-size="10" fill="#555">+20 % de réussite des tâches</text>
  <text x="995" y="260" text-anchor="middle" font-size="10" fill="#555">Boucles, conditions</text>
  <rect x="920" y="275" width="150" height="20" rx="4" fill="#e65100" opacity="0.15" />
  <text x="995" y="290" text-anchor="middle" font-size="10" font-weight="600" fill="#e65100">Cost le plus bas par tâche</text>

  <!-- Bottom spectrum bar -->
  <text x="30" y="340" font-size="10" font-weight="600" fill="#888">Coût des tokens (du plus élevé au plus bas)</text>
  <rect x="30" y="350" width="1060" height="24" rx="12" fill="#f0f0f0" stroke="#ddd" stroke-width="1" />
  <!-- Gradient fill segments — ordered highest to lowest overhead -->
  <rect x="31" y="351" width="212" height="22" rx="11" fill="#fce4ec" opacity="0.7" />
  <rect x="243" y="351" width="212" height="22" rx="0" fill="#e3f2fd" opacity="0.7" />
  <rect x="455" y="351" width="212" height="22" rx="0" fill="#f3e5f5" opacity="0.7" />
  <rect x="667" y="351" width="212" height="22" rx="0" fill="#e8f5e9" opacity="0.7" />
  <rect x="879" y="351" width="210" height="22" rx="11" fill="#fff3e0" opacity="0.7" />

  <text x="137" y="367" text-anchor="middle" font-size="9" font-weight="600" fill="#c62828">+55 000 tokens</text>
  <text x="349" y="367" text-anchor="middle" font-size="9" font-weight="600" fill="#1565c0">Moyen</text>
  <text x="561" y="367" text-anchor="middle" font-size="9" font-weight="600" fill="#6a1b9a">Environ 100 tokens</text>
  <text x="773" y="367" text-anchor="middle" font-size="9" font-weight="600" fill="#2e7d32">Environ 100 tokens</text>
  <text x="984" y="367" text-anchor="middle" font-size="9" font-weight="600" fill="#e65100">2 outils métier</text>

  <!-- Best-for labels -->
  <text x="30" y="405" font-size="10" font-weight="600" fill="#888">Idéal pour</text>
  <rect x="30" y="415" width="200" height="45" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1" />
  <text x="130" y="434" text-anchor="middle" font-size="9" fill="#1565c0">Simple, action unique</text>
  <text x="130" y="448" text-anchor="middle" font-size="9" fill="#1565c0">Appels API</text>

  <rect x="255" y="415" width="200" height="45" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1" />
  <text x="355" y="434" text-anchor="middle" font-size="9" fill="#c62828">SaaS multi-fournisseurs</text>
  <text x="355" y="448" text-anchor="middle" font-size="9" fill="#c62828">intégration</text>

  <rect x="475" y="415" width="200" height="45" rx="6" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1" />
  <text x="575" y="434" text-anchor="middle" font-size="9" fill="#6a1b9a">Expertise sectorielle</text>
  <text x="575" y="448" text-anchor="middle" font-size="9" fill="#6a1b9a">transfert</text>

  <rect x="695" y="415" width="200" height="45" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1" />
  <text x="795" y="434" text-anchor="middle" font-size="9" fill="#2e7d32">Flux de travail de développement,</text>
  <text x="795" y="448" text-anchor="middle" font-size="9" fill="#2e7d32">opérations locales</text>

  <rect x="895" y="415" width="200" height="45" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1" />
  <text x="995" y="434" text-anchor="middle" font-size="9" fill="#e65100">À plusieurs étapes</text>
  <text x="995" y="448" text-anchor="middle" font-size="9" fill="#e65100">orchestration</text>

  <!-- Legend -->
  <text x="30" y="495" font-size="10" fill="#888">Le changement de 2026 : les équipes de production passent à une approche plus directe — des schémas verbeux vers une exécution basée sur le code</text>
  <line x1="700" y1="488" x2="1060" y2="488" stroke="#e65100" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow)" />
  <text x="880" y="510" text-anchor="middle" font-size="9" font-weight="600" fill="#e65100">Direction de l’adoption en production</text>

  <!-- Sources -->
  <text x="30" y="540" font-size="8" fill="#aaa">Sources : données de tokens MCP — Apideck (apideck.com/blog) ; plus de 50 CVEs — vulnerablemcp.info ; CodeAct +20 % — Wang et al. (arXiv:2402.01030, ICML 2024) ;</text>
  <text x="30" y="552" font-size="8" fill="#aaa">Réduction de 98,7 % — Exécution de code via MCP d’Anthropic ; Nombre de tokens pour les compétences : environ 100 — Norme SKILL.md ; Nombre de tokens pour la CLI : environ 100 — Benchmark Scalekit (scalekit.com/blog)</text>
</svg>
