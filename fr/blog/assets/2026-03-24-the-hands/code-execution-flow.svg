<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 490" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Appel de outils traditionnels versus exécution de code</title>
  <desc id="artifact-desc">Appel de outils traditionnels versus exécution de code.</desc>
  <defs>
    <filter id="shadowC" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
    <marker id="arrowC" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626" />
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#166534" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a" x="500">Appel de outils traditionnels versus exécution de code</text>

  <!-- Top: Traditional (red/expensive) -->
  <text y="60" text-anchor="middle" font-size="13" font-weight="600" fill="#991b1b" x="500">Approche traditionnelle : plus de 20 passes d’inférence, tous les données transitent par le contexte</text>

  <!-- Traditional flow boxes -->
  <rect x="30" y="75" width="110" height="50" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadowC)" />
  <text y="96" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6" x="85">Appel LLM 1</text>
  <text y="110" text-anchor="middle" font-size="9" fill="#64748b" x="85">obtenir_les_membres</text>

  <line x1="140" y1="100" x2="165" y2="100" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrowRed)" />

  <rect x="170" y="75" width="80" height="50" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#shadowC)" />
  <text y="96" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b" x="210">Outil</text>
  <text y="110" text-anchor="middle" font-size="9" fill="#64748b" x="210">appel API</text>

  <line x1="250" y1="100" x2="275" y2="100" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrowRed)" />

  <rect x="280" y="75" width="110" height="50" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadowC)" />
  <text y="96" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6" x="335">Appel LLM 2</text>
  <text y="110" text-anchor="middle" font-size="9" fill="#64748b" x="335">obtenir_des_dépenses</text>

  <line x1="390" y1="100" x2="415" y2="100" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrowRed)" />

  <rect x="420" y="75" width="80" height="50" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#shadowC)" />
  <text y="96" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b" x="460">Outil</text>
  <text y="110" text-anchor="middle" font-size="9" fill="#64748b" x="460">Appel API</text>

  <line x1="500" y1="100" x2="525" y2="100" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrowRed)" />

  <rect x="530" y="75" width="110" height="50" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadowC)" />
  <text y="96" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6" x="585">Appel LLM 3</text>
  <text y="110" text-anchor="middle" font-size="9" fill="#64748b" x="585">traiter les données</text>

  <!-- Dots indicating more -->
  <text y="105" font-size="20" fill="#991b1b" x="665">...</text>

  <rect x="700" y="75" width="110" height="50" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadowC)" />
  <text y="96" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6" x="755">Appel LLM 20</text>
  <text y="110" text-anchor="middle" font-size="9" fill="#64748b" x="755">synthétiser</text>

  <!-- Token cost label -->
  <rect x="840" y="78" width="140" height="44" rx="6" fill="#dc2626" filter="url(#shadowC)" />
  <text y="98" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff" x="910">Environ 150 000</text>
  <text y="114" text-anchor="middle" font-size="10" fill="#dc2626" x="910">tokens</text>

  <!-- Divider -->
  <line x1="30" y1="155" x2="970" y2="155" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,3" />
  <text y="175" text-anchor="middle" font-size="10" fill="#64748b" x="500">contre</text>

  <!-- Bottom: Code Execution (green/efficient) -->
  <text y="205" text-anchor="middle" font-size="13" font-weight="600" fill="#166534" x="500">Exécution de code : 1 passe d’inférence, les données restent dans un environnement isolé</text>

  <!-- Code execution flow -->
  <rect x="30" y="225" width="160" height="70" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadowC)" />
  <text y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6" x="110">LLM (1 appel)</text>
  <text y="268" text-anchor="middle" font-size="9" fill="#64748b" x="110">Écrit des scripts Python</text>
  <text y="282" text-anchor="middle" font-size="9" fill="#64748b" x="110">avec boucles et logique</text>

  <line x1="190" y1="260" x2="235" y2="260" stroke="#166534" stroke-width="2" marker-end="url(#arrowGreen)" />
  <text y="252" text-anchor="middle" font-size="9" fill="#166534" x="212">code</text>

  <!-- Sandbox box -->
  <rect x="240" y="215" width="520" height="110" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="2" stroke-dasharray="6,3" filter="url(#shadowC)" />
  <text y="236" text-anchor="middle" font-size="11" font-weight="600" fill="#166534" x="500">Environnement d’exécution isolé</text>

  <!-- Inside sandbox: parallel tool calls -->
  <rect x="265" y="248" width="100" height="55" rx="4" fill="#ffffff" stroke="#16a34a" stroke-width="1.5" />
  <text y="268" text-anchor="middle" font-size="9" font-weight="600" fill="#166534" x="315">get_members()</text>
  <text y="282" text-anchor="middle" font-size="9" fill="#64748b" x="315">pour m dans membres :</text>
  <text y="295" text-anchor="middle" font-size="9" fill="#64748b" x="315">get_expenses()</text>

  <rect x="385" y="248" width="100" height="55" rx="4" fill="#ffffff" stroke="#16a34a" stroke-width="1.5" />
  <text y="268" text-anchor="middle" font-size="9" font-weight="600" fill="#166534" x="435">filter()</text>
  <text y="282" text-anchor="middle" font-size="9" fill="#64748b" x="435">si total &gt; budget :</text>
  <text y="295" text-anchor="middle" font-size="9" fill="#64748b" x="435">ajouter hors budget</text>

  <rect x="505" y="248" width="100" height="55" rx="4" fill="#ffffff" stroke="#16a34a" stroke-width="1.5" />
  <text y="268" text-anchor="middle" font-size="9" font-weight="600" fill="#166534" x="555">aggregate()</text>
  <text y="282" text-anchor="middle" font-size="9" fill="#64748b" x="555">json.dumps(</text>
  <text y="295" text-anchor="middle" font-size="9" fill="#64748b" x="555">dépassement de budget)</text>

  <!-- Arrows between sandbox stages -->
  <line x1="365" y1="275" x2="380" y2="275" stroke="#16a34a" stroke-width="1" marker-end="url(#arrowGreen)" />
  <line x1="485" y1="275" x2="500" y2="275" stroke="#16a34a" stroke-width="1" marker-end="url(#arrowGreen)" />

  <!-- Data stays label -->
  <rect x="625" y="250" width="120" height="50" rx="4" fill="#166534" opacity="0.1" stroke="#166534" stroke-width="1" />
  <text y="270" text-anchor="middle" font-size="9" font-weight="600" fill="#166534" x="685">Des milliers de</text>
  <text y="284" text-anchor="middle" font-size="9" font-weight="600" fill="#166534" x="685">enregistrements traités</text>
  <text y="296" text-anchor="middle" font-size="9" fill="#166534" x="685">ici, et non dans le contexte</text>

  <!-- Output arrow from sandbox -->
  <line x1="760" y1="270" x2="805" y2="270" stroke="#166534" stroke-width="2" marker-end="url(#arrowGreen)" />
  <text y="262" text-anchor="middle" font-size="9" fill="#166534" x="782">résumé</text>

  <!-- Final result -->
  <rect x="810" y="240" width="160" height="55" rx="6" fill="#166534" filter="url(#shadowC)" />
  <text y="262" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff" x="890">Environ 2 000 tokens</text>
  <text y="280" text-anchor="middle" font-size="10" fill="#16a34a" x="890">Réduction de 98,7 %</text>

  <!-- Bottom comparison -->
  <rect x="100" y="360" width="800" height="85" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
  <text y="385" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a" x="500">Pourquoi l’exécution de code l’emporte</text>
  <text y="410" text-anchor="middle" font-size="10" fill="#334155" x="230">Boucles et conditions natives</text>
  <text y="425" text-anchor="middle" font-size="9" fill="#64748b" x="230">Aucun schéma JSON n’est requis</text>
  <text y="410" text-anchor="middle" font-size="10" fill="#334155" x="500">Les données restent dans le sandbox</text>
  <text y="425" text-anchor="middle" font-size="9" fill="#64748b" x="500">Seul le résultat final est pris en compte dans le contexte.</text>
  <text y="410" text-anchor="middle" font-size="10" fill="#334155" x="770">1 passe d’inférence pour N appels</text>
  <text y="425" text-anchor="middle" font-size="9" fill="#64748b" x="770">vs N passes traditionnellement</text>

  <!-- Sources -->
  <text y="470" font-size="9" fill="#64748b" x="100">Sources : de ~150 K à ~2 K de tokens (réduction de 98,7 %) — Anthropic « Exécution de code avec MCP » ; +20 % de succès des tâches — CodeAct, Wang et al. (arXiv:2402.01030, ICML 2024)</text>
  <text y="482" font-size="9" fill="#64748b" x="100">Modèle d’exemple PTC — Anthropic « Utilisation avancée d’outils / Appel programmé d’outils »</text>
</svg>
