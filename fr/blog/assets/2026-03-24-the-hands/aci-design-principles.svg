<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 580" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadowA" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1" />
    </filter>
    <marker id="arrowA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6a1b9a" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">Principes de conception d’Agent-Computer Interface (ACI)</text>
  <text x="500" y="50" text-anchor="middle" font-size="11" fill="#888">D’après SWE-agent (Yang et al., NeurIPS 2024) — gain de 10,7 pts sur SWE-bench grâce à la seule conception d’interface</text>

  <!-- Central circle: Agent -->
  <circle cx="500" cy="200" r="55" fill="#6a1b9a" filter="url(#shadowA)" />
  <text x="500" y="195" text-anchor="middle" font-size="14" font-weight="600" fill="white">LLM</text>
  <text x="500" y="212" text-anchor="middle" font-size="11" fill="#e0c0f0">Agent</text>

  <!-- Principle 1: Simple Actions (top-left) -->
  <line x1="455" y1="160" x2="240" y2="100" stroke="#6a1b9a" stroke-width="1.5" marker-end="url(#arrowA)" />
  <rect x="30" y="65" width="220" height="100" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" filter="url(#shadowA)" />
  <text x="50" y="90" font-size="12" font-weight="700" fill="#1565c0">1</text>
  <circle cx="50" cy="86" r="12" fill="none" stroke="#1565c0" stroke-width="2" />
  <text x="76" y="90" font-size="12" font-weight="600" fill="#1565c0">Actions simples</text>
  <text x="140" y="112" text-anchor="middle" font-size="10" fill="#555">Peu d’options, docs concises</text>
  <text x="140" y="126" text-anchor="middle" font-size="10" fill="#555">Pas de démos nécessaires</text>
  <text x="140" y="148" text-anchor="middle" font-size="9" font-style="italic" fill="#888">schedule_event plutôt que</text>
  <text x="140" y="160" text-anchor="middle" font-size="9" font-style="italic" fill="#888">list_users + create_event</text>

  <!-- Principle 2: Compact and Efficient (top-right) -->
  <line x1="545" y1="160" x2="760" y2="100" stroke="#6a1b9a" stroke-width="1.5" marker-end="url(#arrowA)" />
  <rect x="750" y="65" width="220" height="100" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="2" filter="url(#shadowA)" />
  <text x="770" y="90" font-size="12" font-weight="700" fill="#e65100">2</text>
  <circle cx="770" cy="86" r="12" fill="none" stroke="#e65100" stroke-width="2" />
  <text x="796" y="90" font-size="12" font-weight="600" fill="#e65100">Compact et efficace</text>
  <text x="860" y="112" text-anchor="middle" font-size="10" fill="#555">Consolider les opérations</text>
  <text x="860" y="126" text-anchor="middle" font-size="10" fill="#555">Minimiser les allers-retours</text>
  <text x="860" y="148" text-anchor="middle" font-size="9" font-style="italic" fill="#888">search_logs avec filtres, pas</text>
  <text x="860" y="160" text-anchor="middle" font-size="9" font-style="italic" fill="#888">read_logs + grep</text>

  <!-- Principle 3: Informative Feedback (bottom-left) -->
  <line x1="455" y1="240" x2="240" y2="320" stroke="#6a1b9a" stroke-width="1.5" marker-end="url(#arrowA)" />
  <rect x="30" y="290" width="220" height="100" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" filter="url(#shadowA)" />
  <text x="50" y="315" font-size="12" font-weight="700" fill="#2e7d32">3</text>
  <circle cx="50" cy="311" r="12" fill="none" stroke="#2e7d32" stroke-width="2" />
  <text x="76" y="315" font-size="12" font-weight="600" fill="#2e7d32">Retour concis</text>
  <text x="140" y="337" text-anchor="middle" font-size="10" fill="#555">Substantiel, pas verbeux</text>
  <text x="140" y="351" text-anchor="middle" font-size="10" fill="#555">Sortie lisible machine</text>
  <text x="140" y="373" text-anchor="middle" font-size="9" font-style="italic" fill="#888">Renvoyer des ID sémantiques, pas</text>
  <text x="140" y="385" text-anchor="middle" font-size="9" font-style="italic" fill="#888">HTML brut ou payloads complets</text>

  <!-- Principle 4: Error Guardrails (bottom-right) -->
  <line x1="545" y1="240" x2="760" y2="320" stroke="#6a1b9a" stroke-width="1.5" marker-end="url(#arrowA)" />
  <rect x="750" y="290" width="220" height="100" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="2" filter="url(#shadowA)" />
  <text x="770" y="315" font-size="12" font-weight="700" fill="#c62828">4</text>
  <circle cx="770" cy="311" r="12" fill="none" stroke="#c62828" stroke-width="2" />
  <text x="796" y="315" font-size="12" font-weight="600" fill="#c62828">Garde-fous d’erreur</text>
  <text x="860" y="337" text-anchor="middle" font-size="10" fill="#555">Détecter auto les erreurs</text>
  <text x="860" y="351" text-anchor="middle" font-size="10" fill="#555">Éviter leur propagation</text>
  <text x="860" y="373" text-anchor="middle" font-size="9" font-style="italic" fill="#888">Le linter détecte 51,7 % des</text>
  <text x="860" y="385" text-anchor="middle" font-size="9" font-style="italic" fill="#888">erreurs d’édition agent (SWE-agent)</text>

  <!-- Bottom result bar -->
  <rect x="100" y="440" width="800" height="55" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" filter="url(#shadowA)" />
  <text x="500" y="463" text-anchor="middle" font-size="13" font-weight="600" fill="#6a1b9a">Impact : 18,0 % vs 7,3 % sur SWE-bench Lite</text>
  <text x="500" y="483" text-anchor="middle" font-size="11" fill="#555">Gain de 10,7 points grâce au seul design ACI — sans changer le modèle</text>

  <!-- Connection labels -->
  <text x="340" y="120" text-anchor="middle" font-size="9" fill="#6a1b9a" transform="rotate(-15, 340, 120)">utilise des outils</text>
  <text x="660" y="120" text-anchor="middle" font-size="9" fill="#6a1b9a" transform="rotate(15, 660, 120)">lit la sortie</text>
  <text x="340" y="300" text-anchor="middle" font-size="9" fill="#6a1b9a" transform="rotate(15, 340, 300)">reçoit un retour</text>
  <text x="660" y="300" text-anchor="middle" font-size="9" fill="#6a1b9a" transform="rotate(-15, 660, 300)">récupération d’erreur</text>

  <!-- Source -->
  <text x="500" y="530" text-anchor="middle" font-size="8" fill="#aaa">Source : Yang, Jimenez et al., "SWE-agent: Agent-Computer Interfaces Enable Automated Software Engineering" (arXiv:2405.15793, NeurIPS 2024)</text>
  <text x="500" y="545" text-anchor="middle" font-size="8" fill="#aaa">Principes repris par Anthropic dans "Building Effective Agents" (déc. 2024)</text>
</svg>
