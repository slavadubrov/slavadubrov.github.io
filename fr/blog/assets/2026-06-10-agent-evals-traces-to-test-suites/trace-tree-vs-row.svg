<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 560" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="A row versus a tree: where agent failures hide" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Une ligne contre un arbre : où se cachent les défaillances des agents</title>
  <defs>
    <marker id="arrTree" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#334155" />
    </marker>
    <filter id="shadowT" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <text y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a" x="590">LLM Évaluation vs Évaluation d’agent : une ligne vs un arbre</text>
  <text y="54" text-anchor="middle" font-size="12" fill="#334155" x="590">Une exécution d’LLM correspond à une paire entrée→sortie. Une exécution d’agent représente une trajectoire au cours de laquelle n’importe quelle étape peut échouer.</text>

  <!-- ===== Left: LLM eval row ===== -->
  <rect x="40" y="80" width="430" height="430" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowT)" />
  <text y="110" font-size="14" font-weight="700" fill="#1d4ed8" x="65">LLM évaluation</text>
  <text y="128" font-size="10" fill="#1d4ed8" x="65">une ligne : évaluer la sortie par rapport à l’entrée</text>

  <rect x="90" y="170" width="330" height="60" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="196" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="255">Entrée</text>
  <text y="214" text-anchor="middle" font-size="10" fill="#334155" x="255">« Rembourser ma commande A-1002 »</text>

  <line x1="255" y1="234" x2="255" y2="280" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrTree)" />

  <rect x="90" y="285" width="330" height="60" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="311" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="255">Sortie</text>
  <text y="329" text-anchor="middle" font-size="10" fill="#334155" x="255">« Votre remboursement a été traité. »</text>

  <line x1="255" y1="349" x2="255" y2="395" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrTree)" />

  <rect x="90" y="400" width="330" height="70" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="1.2" />
  <text y="426" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="255">Évaluer le couple</text>
  <text y="446" text-anchor="middle" font-size="10" fill="#334155" x="255">pertinence · fidélité · exactitude</text>
  <text y="461" text-anchor="middle" font-size="10" fill="#334155" x="255">une métrique, une valeur numérique</text>

  <!-- ===== Right: agent trajectory tree ===== -->
  <rect x="510" y="80" width="630" height="430" rx="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowT)" />
  <text y="110" font-size="14" font-weight="700" fill="#5b21b6" x="535">Évaluation des agents</text>
  <text y="128" font-size="10" fill="#5b21b6" x="535">un arbre : plan, tool calls, tentatives — les échecs restent cachés au cours de la trajectoire</text>

  <!-- root -->
  <rect x="700" y="150" width="250" height="48" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.2" />
  <text y="170" text-anchor="middle" font-size="11" font-weight="700" fill="#5b21b6" x="825">appeler_l_agent</text>
  <text y="186" text-anchor="middle" font-size="9.5" fill="#334155" x="825">« Rembourser ma commande A-1002 »</text>

  <!-- level 1: chat spans -->
  <line x1="760" y1="198" x2="640" y2="240" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#arrTree)" />
  <line x1="825" y1="198" x2="825" y2="240" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#arrTree)" />
  <line x1="895" y1="198" x2="1010" y2="240" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#arrTree)" />

  <rect x="555" y="245" width="170" height="44" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="263" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1d4ed8" x="640">plan de chat</text>
  <text y="279" text-anchor="middle" font-size="9.5" fill="#334155" x="640">décide de rechercher la commande</text>

  <rect x="740" y="245" width="170" height="44" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="263" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1d4ed8" x="825">chat (action)</text>
  <text y="279" text-anchor="middle" font-size="9.5" fill="#334155" x="825">saute l'étape de vérification</text>

  <rect x="925" y="245" width="170" height="44" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="263" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1d4ed8" x="1010">réponse du chat</text>
  <text y="279" text-anchor="middle" font-size="9.5" fill="#334155" x="1010">« Remboursement traité »</text>

  <!-- level 2: tool spans -->
  <line x1="640" y1="289" x2="640" y2="330" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#arrTree)" />
  <line x1="825" y1="289" x2="825" y2="330" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#arrTree)" />

  <rect x="555" y="335" width="170" height="58" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="1.2" />
  <text y="356" text-anchor="middle" font-size="10.5" font-weight="700" fill="#166534" x="640">exécuter_outil</text>
  <text y="372" text-anchor="middle" font-size="9.5" fill="#334155" x="640">ordre_de_recherche ✓</text>
  <text y="386" text-anchor="middle" font-size="9.5" fill="#334155" x="640">livré, 89 $</text>

  <rect x="740" y="335" width="170" height="58" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.4" />
  <text y="356" text-anchor="middle" font-size="10.5" font-weight="700" fill="#991b1b" x="825">exécuter_outil</text>
  <text y="372" text-anchor="middle" font-size="9.5" fill="#991b1b" x="825">issue_refund — réussit,</text>
  <text y="386" text-anchor="middle" font-size="9.5" fill="#991b1b" x="825">mais son identité n’a jamais été vérifiée</text>

  <!-- missing step ghost -->
  <rect x="925" y="335" width="170" height="58" rx="8" fill="none" stroke="#dc2626" stroke-width="1.2" stroke-dasharray="5,4" />
  <text y="356" text-anchor="middle" font-size="10.5" font-weight="700" fill="#991b1b" x="1010">vérifier_l’identité</text>
  <text y="372" text-anchor="middle" font-size="9.5" fill="#991b1b" x="1010">jamais désigné sous le nom de —</text>
  <text y="386" text-anchor="middle" font-size="9.5" fill="#991b1b" x="1010">échec silencieux</text>

  <!-- verdict band -->
  <rect x="555" y="420" width="540" height="64" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.2" />
  <text y="444" text-anchor="middle" font-size="11.5" font-weight="700" fill="#9a3412" x="825">Le résultat final est parfait dans tous les cas</text>
  <text y="463" text-anchor="middle" font-size="10" fill="#334155" x="825">« Le remboursement a été traité », que la vérification d’identité ait eu lieu ou non.</text>
  <text y="477" text-anchor="middle" font-size="10" fill="#334155" x="825">Seule une évaluation au niveau de la trajectoire permet de distinguer les deux exécutions.</text>
</svg>
