<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="Three levels of agent evaluation with their metrics" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Trois niveaux d’évaluation des agents et leurs métriques</title>
  <defs>
    <marker id="arrLvl" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#334155" />
    </marker>
    <filter id="shadowLvl" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <text y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a" x="590">Trois niveaux d’évaluation des agents</text>
  <text y="54" text-anchor="middle" font-size="12" fill="#334155" x="590">Le principe bout en bout indique QU’IL Y A EU DE PROBLÈME · la trajectoire indique OÙ · la composante indique POURQUOI</text>

  <!-- Level 1: end-to-end -->
  <rect x="30" y="80" width="1120" height="150" rx="12" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowLvl)" />
  <text y="106" font-size="14" font-weight="700" fill="#166534" x="55">Niveau 1 · De bout en bout (boîte noire)</text>
  <text y="124" font-size="10" fill="#166534" x="55">Question : la tâche a-t-elle réussi ?</text>

  <rect x="55" y="140" width="340" height="72" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="225">Terminaison de tâche</text>
  <text y="180" text-anchor="middle" font-size="10" fill="#334155" x="225">LLM-alignement d’objectifs évalué, sans référence</text>
  <text y="195" text-anchor="middle" font-size="10" fill="#334155" x="225">utilisable en ligne — aucune sortie « dorée » requise</text>

  <rect x="415" y="140" width="340" height="72" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="585">Évaluation des résultats/états</text>
  <text y="180" text-anchor="middle" font-size="10" fill="#334155" x="585">Comparer l’état final de l’environnement à l’état cible</text>
  <text y="195" text-anchor="middle" font-size="10" fill="#334155" x="585">résistant aux chemins alternatifs créatifs (τ-bench)</text>

  <rect x="775" y="140" width="340" height="72" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="945">Fiableté : réussite^k</text>
  <text y="180" text-anchor="middle" font-size="10" fill="#334155" x="945">tous les k tentatives sur k réussissent</text>
  <text y="195" text-anchor="middle" font-size="10" fill="#334155" x="945">90 % de taux de réussite à 1 ≈ 57 % de cohérence pour k=8</text>

  <line x1="590" y1="234" x2="590" y2="268" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrLvl)" />
  <text y="256" font-size="10" fill="#64748b" font-style="italic" x="700">La tâche a échoué — mais où ?</text>

  <!-- Level 2: trajectory -->
  <rect x="30" y="275" width="1120" height="150" rx="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowLvl)" />
  <text y="301" font-size="14" font-weight="700" fill="#5b21b6" x="55">Niveau 2 · Trajectoire (boîte en verre)</text>
  <text y="319" font-size="10" fill="#5b21b6" x="55">Question : le chemin était-il optimal en termes de performance et de qualité sonore ?</text>

  <rect x="55" y="335" width="255" height="72" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6" x="182">Correctitude de l’outil</text>
  <text y="375" text-anchor="middle" font-size="10" fill="#334155" x="182">déterministe, sans besoin d’arbitre</text>
  <text y="390" text-anchor="middle" font-size="10" fill="#334155" x="182">correspondance exacte / en ordre / sans ordre prédéfini</text>

  <rect x="330" y="335" width="255" height="72" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6" x="457">Correctitude des arguments</text>
  <text y="375" text-anchor="middle" font-size="10" fill="#334155" x="457">outil adapté, paramètres incorrects</text>
  <text y="390" text-anchor="middle" font-size="10" fill="#334155" x="457">pourcentage de paires clé-valeur remplies correctement</text>

  <rect x="605" y="335" width="255" height="72" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6" x="732">Efficacité et boucles</text>
  <text y="375" text-anchor="middle" font-size="10" fill="#334155" x="732">appels redondants · convergence de chemin</text>
  <text y="390" text-anchor="middle" font-size="10" fill="#334155" x="732">appels identiques répétés = impasse</text>

  <rect x="880" y="335" width="235" height="72" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6" x="997">Qualité du plan / conformité</text>
  <text y="375" text-anchor="middle" font-size="10" fill="#334155" x="997">bonne stratégie, exécution dérivée</text>
  <text y="390" text-anchor="middle" font-size="10" fill="#334155" x="997">fidélité multi-échanges entre les tours</text>

  <line x1="590" y1="429" x2="590" y2="463" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrLvl)" />
  <text y="451" font-size="10" fill="#64748b" font-style="italic" x="700">Le chemin est rompu à l’étape 3 — mais pourquoi ?</text>

  <!-- Level 3: component -->
  <rect x="30" y="470" width="1120" height="120" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowLvl)" />
  <text y="496" font-size="14" font-weight="700" fill="#9a3412" x="55">Niveau 3 · Composant (boîte blanche)</text>
  <text y="514" font-size="10" fill="#9a3412" x="55">Question : quelle décision, outil, récupérateur ou sous-agent a défailli ?</text>

  <rect x="55" y="525" width="340" height="50" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="225">Métriques par intervalle</text>
  <text y="563" text-anchor="middle" font-size="10" fill="#334155" x="225">attribuer des scores aux segments individuels d’outils ou de récupération</text>

  <rect x="415" y="525" width="340" height="50" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="585">Interprétation des sorties d’outil</text>
  <text y="563" text-anchor="middle" font-size="10" fill="#334155" x="585">réponse valide, lecture incorrecte — endommage les composants suivants</text>

  <rect x="775" y="525" width="340" height="50" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="945">Attribution des pannes</text>
  <text y="563" text-anchor="middle" font-size="10" fill="#334155" x="945">l’échec visible se situe généralement en aval du véritable bug</text>
</svg>
