<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrLvl" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#555" />
    </marker>
    <filter id="shadowLvl" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>

  <text x="590" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a2e">Trois niveaux d’évaluation des agents</text>
  <text x="590" y="54" text-anchor="middle" font-size="12" fill="#666">Le principe bout en bout indique CE qui a mal fonctionné · la trajectoire indique OÙ · le composant indique POURQUOI</text>

  <!-- Level 1: end-to-end -->
  <rect x="30" y="80" width="1120" height="150" rx="12" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadowLvl)" />
  <text x="55" y="106" font-size="14" font-weight="700" fill="#2e7d32">Niveau 1 · De bout en bout (boîte noire)</text>
  <text x="55" y="124" font-size="10" fill="#2e7d32">Question : la tâche a-t-elle réussi ?</text>

  <rect x="55" y="140" width="340" height="72" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="225" y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Terminaison de la tâche</text>
  <text x="225" y="180" text-anchor="middle" font-size="10" fill="#555">Alignement des objectifs évalué par un LLM, sans référence externe</text>
  <text x="225" y="195" text-anchor="middle" font-size="10" fill="#555">utilisable en ligne — aucune sortie « dorée » requise</text>

  <rect x="415" y="140" width="340" height="72" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="585" y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Évaluation du résultat/état</text>
  <text x="585" y="180" text-anchor="middle" font-size="10" fill="#555">Comparer l'état final de l'environnement à l'état cible</text>
  <text x="585" y="195" text-anchor="middle" font-size="10" fill="#555">résistant aux chemins alternatifs créatifs (tau-bench)</text>

  <rect x="775" y="140" width="340" height="72" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="945" y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Fiable : réussite^k</text>
  <text x="945" y="180" text-anchor="middle" font-size="10" fill="#555">tous les k essais sur k réussissent</text>
  <text x="945" y="195" text-anchor="middle" font-size="10" fill="#555">90 % de taux de réussite à 1 ≈ 57 % de cohérence pour k=8</text>

  <line x1="590" y1="234" x2="590" y2="268" stroke="#555" stroke-width="1.6" marker-end="url(#arrLvl)" />
  <text x="700" y="256" font-size="10" fill="#888" font-style="italic">Tâche échouée — mais où ?</text>

  <!-- Level 2: trajectory -->
  <rect x="30" y="275" width="1120" height="150" rx="12" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowLvl)" />
  <text x="55" y="301" font-size="14" font-weight="700" fill="#6a1b9a">Niveau 2 · Trajectoire (boîte en verre)</text>
  <text x="55" y="319" font-size="10" fill="#6a1b9a">Question : le chemin était-il optimal en termes de performance et de qualité sonore ?</text>

  <rect x="55" y="335" width="255" height="72" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1" />
  <text x="182" y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#6a1b9a">Correction de l’outil</text>
  <text x="182" y="375" text-anchor="middle" font-size="10" fill="#555">déterministe, pas de juge nécessaire</text>
  <text x="182" y="390" text-anchor="middle" font-size="10" fill="#555">correspondance exacte / en ordre / sans ordre</text>

  <rect x="330" y="335" width="255" height="72" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1" />
  <text x="457" y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#6a1b9a">Véracité des arguments</text>
  <text x="457" y="375" text-anchor="middle" font-size="10" fill="#555">outil approprié, paramètres incorrects</text>
  <text x="457" y="390" text-anchor="middle" font-size="10" fill="#555">Pourcentage de paires clé-valeur correctement remplissées</text>

  <rect x="605" y="335" width="255" height="72" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1" />
  <text x="732" y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#6a1b9a">Efficacité et boucles</text>
  <text x="732" y="375" text-anchor="middle" font-size="10" fill="#555">appels redondants · convergence des trajectoires</text>
  <text x="732" y="390" text-anchor="middle" font-size="10" fill="#555">appels identiques répétés = impasse</text>

  <rect x="880" y="335" width="235" height="72" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1" />
  <text x="997" y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#6a1b9a">Qualité du plan / conformité</text>
  <text x="997" y="375" text-anchor="middle" font-size="10" fill="#555">bon plan, exécution par dérive</text>
  <text x="997" y="390" text-anchor="middle" font-size="10" fill="#555">fidélité sur plusieurs tours de conversation</text>

  <line x1="590" y1="429" x2="590" y2="463" stroke="#555" stroke-width="1.6" marker-end="url(#arrLvl)" />
  <text x="700" y="451" font-size="10" fill="#888" font-style="italic">Le chemin est interrompu à l'étape 3 — mais pourquoi ?</text>

  <!-- Level 3: component -->
  <rect x="30" y="470" width="1120" height="120" rx="12" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowLvl)" />
  <text x="55" y="496" font-size="14" font-weight="700" fill="#e65100">Niveau 3 · Composant (boîte blanche)</text>
  <text x="55" y="514" font-size="10" fill="#e65100">Question : quelle décision, outil, récupérateur ou sous-agent a fonctionné incorrectement ?</text>

  <rect x="55" y="525" width="340" height="50" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1" />
  <text x="225" y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Métriques par intervalle</text>
  <text x="225" y="563" text-anchor="middle" font-size="10" fill="#555">attribuer des scores aux segments individuels d’outils/recherche</text>

  <rect x="415" y="525" width="340" height="50" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1" />
  <text x="585" y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Interprétation des sorties de l’outil</text>
  <text x="585" y="563" text-anchor="middle" font-size="10" fill="#555">réponse valide, lecture incorrecte — endommage les processus ultérieurs</text>

  <rect x="775" y="525" width="340" height="50" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1" />
  <text x="945" y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Attribution de la panne</text>
  <text x="945" y="563" text-anchor="middle" font-size="10" fill="#555">l’échec visible se situe généralement en aval du véritable bug</text>
</svg>
