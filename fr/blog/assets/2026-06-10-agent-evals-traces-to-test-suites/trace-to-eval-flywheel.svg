<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 640" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrFly" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2980b9" />
    </marker>
    <marker id="arrFlyBack" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#27ae60" />
    </marker>
    <filter id="shadowFly" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-opacity="0.14" />
    </filter>
  </defs>

  <text x="590" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">Le volant de suivi à évaluation</text>
  <text x="590" y="57" text-anchor="middle" font-size="12" fill="#666">Chaque défaillance de production diagnostiquée devient une trace, une étiquette, une ligne de jeu de données, ainsi qu’un évaluateur qui contrôle les processus d’intégration continue.</text>

  <!-- Stage 1: Production agent -->
  <rect x="40" y="110" width="200" height="110" rx="12" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.6" filter="url(#shadowFly)" />
  <text x="140" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">1 · Agent de production</text>
  <text x="140" y="164" text-anchor="middle" font-size="10" fill="#555">équipé d’OTel</text>
  <text x="140" y="179" text-anchor="middle" font-size="10" fill="#555">Portée des semconv pour la GenAI :</text>
  <text x="140" y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#555">appeler_l_agent → chatter → exécuter_ou_tool</text>

  <line x1="240" y1="165" x2="295" y2="165" stroke="#2980b9" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 2: Trace store -->
  <rect x="300" y="110" width="200" height="110" rx="12" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.6" filter="url(#shadowFly)" />
  <text x="400" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">2 · Stockage des traces</text>
  <text x="400" y="164" text-anchor="middle" font-size="10" fill="#555">Langfuse / Phoenix /</text>
  <text x="400" y="179" text-anchor="middle" font-size="10" fill="#555">LangSmith / Braintrust</text>
  <text x="400" y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#555">(ou un fichier JSONL pour commencer)</text>

  <line x1="500" y1="165" x2="555" y2="165" stroke="#2980b9" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 3: Mine failures -->
  <rect x="560" y="110" width="200" height="110" rx="12" fill="#fce4ec" stroke="#c62828" stroke-width="1.6" filter="url(#shadowFly)" />
  <text x="660" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#c62828">3 · Défaillances des mines</text>
  <text x="660" y="164" text-anchor="middle" font-size="10" fill="#555">baux scores · réclamations des utilisateurs</text>
  <text x="660" y="179" text-anchor="middle" font-size="10" fill="#555">règles déterministes · juges</text>
  <text x="660" y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#555">codage ouvert : lecture de 30 à 50 traces</text>

  <line x1="760" y1="165" x2="815" y2="165" stroke="#2980b9" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 4: Cluster + label -->
  <rect x="820" y="110" width="200" height="110" rx="12" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.6" filter="url(#shadowFly)" />
  <text x="920" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#6a1b9a">4 · Cluster + étiquette</text>
  <text x="920" y="164" text-anchor="middle" font-size="10" fill="#555">codage axial en 5 à 6 noms définis,</text>
  <text x="920" y="179" text-anchor="middle" font-size="10" fill="#555">modes de défaillance spécifiques</text>
  <text x="920" y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#555">« erreur de formatage de la date », et non « problèmes temporels »</text>

  <line x1="920" y1="220" x2="920" y2="285" stroke="#2980b9" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 5: Dedupe / goldens -->
  <rect x="820" y="290" width="200" height="110" rx="12" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.6" filter="url(#shadowFly)" />
  <text x="920" y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#6a1b9a">5 · Supprimer les doublons</text>
  <text x="920" y="344" text-anchor="middle" font-size="10" fill="#555">or jaune représentatif</text>
  <text x="920" y="359" text-anchor="middle" font-size="10" fill="#555">par cluster, les IDs de plage conservés</text>
  <text x="920" y="376" text-anchor="middle" font-size="10" font-style="italic" fill="#555">dans les métadonnées pour la traçabilité</text>

  <line x1="820" y1="345" x2="765" y2="345" stroke="#2980b9" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 6: Versioned dataset -->
  <rect x="560" y="290" width="200" height="110" rx="12" fill="#fff3e0" stroke="#e65100" stroke-width="1.6" filter="url(#shadowFly)" />
  <text x="660" y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#e65100">6 · Ensemble de données versionné</text>
  <text x="660" y="344" text-anchor="middle" font-size="10" fill="#555">goldens-v1.json · v2 · v3 …</text>
  <text x="660" y="359" text-anchor="middle" font-size="10" fill="#555">outils et critères attendus</text>
  <text x="660" y="376" text-anchor="middle" font-size="10" font-style="italic" fill="#555">fixé pour des exécutions reproductibles</text>

  <line x1="560" y1="345" x2="505" y2="345" stroke="#2980b9" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 7: CI gate -->
  <rect x="300" y="290" width="200" height="110" rx="12" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.6" filter="url(#shadowFly)" />
  <text x="400" y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#2e7d32">7 · Porte CI</text>
  <text x="400" y="344" text-anchor="middle" font-size="10" fill="#555">exécution de test de deep evaluation sur chaque PR</text>
  <text x="400" y="359" text-anchor="middle" font-size="10" fill="#555">métrique d’échec → compilation échouée</text>
  <text x="400" y="376" text-anchor="middle" font-size="10" font-style="italic" fill="#555">régressions bloquées avant déploiement</text>

  <!-- feedback arrow back to production -->
  <path d="M 300 345 L 140 345 L 140 225" fill="none" stroke="#27ae60" stroke-width="2.2" marker-end="url(#arrFlyBack)" />
  <text x="148" y="290" font-size="10.5" font-weight="700" fill="#27ae60">réparer les navires en toute sécurité ;</text>
  <text x="148" y="305" font-size="10.5" font-weight="700" fill="#27ae60">nouveaux flux de trafic</text>
  <text x="148" y="320" font-size="10.5" font-weight="700" fill="#27ae60">le prochain cycle</text>

  <!-- Online lane note -->
  <rect x="40" y="450" width="1100" height="150" rx="12" fill="#f8f9fa" stroke="#9b59b6" stroke-width="1.4" filter="url(#shadowFly)" />
  <text x="65" y="480" font-size="13" font-weight="700" fill="#6a1b9a">Exécution en parallèle du boucle : évaluations en ligne</text>
  <text x="65" y="503" font-size="11" fill="#555">• Échantillon de trafic en temps réel, évaluation asynchrone à l’aide de métriques sans référence (achèvement des tâches, juges personnalisés) — aucune latence supplémentaire</text>
  <text x="65" y="524" font-size="11" fill="#555">• Alerte lorsque la limite inférieure de confiance du score dépasse un seuil — de nouveaux motifs de défaillance entrent dans le volant à l’étape 3</text>
  <text x="65" y="545" font-size="11" fill="#555">• Maintenir les garde-fous séparés : en ligne, déterministe, bloquant (ms) — les évaluations mesurent, les garde-fous protègent</text>
  <text x="65" y="578" font-size="10.5" font-style="italic" fill="#888">Avantage : les pannes de production se transforment en tests de régression en quelques jours, et les mises à jour des modèles sont validées en quelques jours, et non en semaines.</text>
</svg>
