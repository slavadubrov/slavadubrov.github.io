<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 640" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="The trace-to-eval flywheel" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">l’engrenage de suivi à évaluation</title>
  <defs>
    <marker id="arrFly" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2563eb" />
    </marker>
    <marker id="arrFlyBack" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#16a34a" />
    </marker>
    <filter id="shadowFly" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <text y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a" x="590">L’engrenage de suivi à évaluation</text>
  <text y="57" text-anchor="middle" font-size="12" fill="#334155" x="590">Chaque défaillance de production diagnostiquée devient une trace, une étiquette, une ligne dataset, ainsi qu’un évaluateur qui contrôle les processus d’intégration continue</text>

  <!-- Stage 1: Production agent -->
  <rect x="40" y="110" width="200" height="110" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.6" filter="url(#shadowFly)" />
  <text y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8" x="140">1 · Agent de production</text>
  <text y="164" text-anchor="middle" font-size="10" fill="#334155" x="140">équipé d’OTel</text>
  <text y="179" text-anchor="middle" font-size="10" fill="#334155" x="140">Les spans de semconv pour la GenAI :</text>
  <text y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="140">appeler_l_agent → chat → exécuter_une_outil</text>

  <line x1="240" y1="165" x2="295" y2="165" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 2: Trace store -->
  <rect x="300" y="110" width="200" height="110" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.6" filter="url(#shadowFly)" />
  <text y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8" x="400">2 · Stockage de traces</text>
  <text y="164" text-anchor="middle" font-size="10" fill="#334155" x="400">Langfuse / Phoenix /</text>
  <text y="179" text-anchor="middle" font-size="10" fill="#334155" x="400">LangSmith / Braintrust</text>
  <text y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="400">(ou un fichier JSONL pour commencer)</text>

  <line x1="500" y1="165" x2="555" y2="165" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 3: Mine failures -->
  <rect x="560" y="110" width="200" height="110" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="1.6" filter="url(#shadowFly)" />
  <text y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b" x="660">3 · Défaillances de mine</text>
  <text y="164" text-anchor="middle" font-size="10" fill="#334155" x="660">baux scores · réclamations des utilisateurs</text>
  <text y="179" text-anchor="middle" font-size="10" fill="#334155" x="660">règles déterministes · juges</text>
  <text y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="660">codage ouvert : lecture de 30 à 50 traces</text>

  <line x1="760" y1="165" x2="815" y2="165" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 4: Cluster + label -->
  <rect x="820" y="110" width="200" height="110" rx="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.6" filter="url(#shadowFly)" />
  <text y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6" x="920">4 · Clustering + étiquetage</text>
  <text y="164" text-anchor="middle" font-size="10" fill="#334155" x="920">codage axial en 5 à 6 éléments nommés,</text>
  <text y="179" text-anchor="middle" font-size="10" fill="#334155" x="920">modes de défaillance spécifiques</text>
  <text y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="920">« erreur de formatage de la date » et non « problèmes temporels »</text>

  <line x1="920" y1="220" x2="920" y2="285" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 5: Dedupe / goldens -->
  <rect x="820" y="290" width="200" height="110" rx="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.6" filter="url(#shadowFly)" />
  <text y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6" x="920">5 · Déduplication</text>
  <text y="344" text-anchor="middle" font-size="10" fill="#334155" x="920">un or représentatif</text>
  <text y="359" text-anchor="middle" font-size="10" fill="#334155" x="920">par cluster, les IDs de plage sont conservés</text>
  <text y="376" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="920">dans les métadonnées pour la traçabilité</text>

  <line x1="820" y1="345" x2="765" y2="345" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 6: Versioned dataset -->
  <rect x="560" y="290" width="200" height="110" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="1.6" filter="url(#shadowFly)" />
  <text y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412" x="660">6 · Versionnée dataset</text>
  <text y="344" text-anchor="middle" font-size="10" fill="#334155" x="660">goldens-v1.json · v2 · v3 …</text>
  <text y="359" text-anchor="middle" font-size="10" fill="#334155" x="660">outils attendus + critères</text>
  <text y="376" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="660">fixé pour des exécutions reproductibles</text>

  <line x1="560" y1="345" x2="505" y2="345" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 7: CI gate -->
  <rect x="300" y="290" width="200" height="110" rx="12" fill="#f0fdf4" stroke="#166534" stroke-width="1.6" filter="url(#shadowFly)" />
  <text y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#166534" x="400">7 · Porte CI</text>
  <text y="344" text-anchor="middle" font-size="10" fill="#334155" x="400">exécution de test deepeval sur chaque PR</text>
  <text y="359" text-anchor="middle" font-size="10" fill="#334155" x="400">métrique de défaillance → build défaillant</text>
  <text y="376" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="400">régressions bloquées avant déploiement</text>

  <!-- feedback arrow back to production -->
  <path d="M 300 345 L 140 345 L 140 225" fill="none" stroke="#16a34a" stroke-width="2.2" marker-end="url(#arrFlyBack)" />
  <text y="290" font-size="10.5" font-weight="700" fill="#166534" x="148">réparer les navires en toute sécurité ;</text>
  <text y="305" font-size="10.5" font-weight="700" fill="#166534" x="148">nouveaux flux de trafic</text>
  <text y="320" font-size="10.5" font-weight="700" fill="#166534" x="148">le prochain cycle</text>

  <!-- Online lane note -->
  <rect x="40" y="450" width="1100" height="150" rx="12" fill="#ffffff" stroke="#7c3aed" stroke-width="1.4" filter="url(#shadowFly)" />
  <text y="480" font-size="13" font-weight="700" fill="#5b21b6" x="65">Exécution en parallèle du cycle : évaluations en ligne</text>
  <text y="503" font-size="11" fill="#334155" x="65">• Échantillonnage du trafic en temps réel, évaluation asynchrone à l’aide de métriques sans référence externe (achèvement des tâches, juges personnalisés) — aucune latence supplémentaire</text>
  <text y="524" font-size="11" fill="#334155" x="65">• Détection d’alerte lorsque la limite inférieure de confiance du score dépasse un seuil — de nouveaux motifs de défaillance pénètrent dans le volant à l’étape 3</text>
  <text y="545" font-size="11" fill="#334155" x="65">• Maintenir les garde-fous distincts : en ligne, déterministes, bloquants (ms) — les évaluations mesurent, les garde-fous protègent</text>
  <text y="578" font-size="10.5" font-style="italic" fill="#64748b" x="65">Le bénéfice : les pannes de production se transforment en tests de régression en quelques jours, et les mises à jour des modèles sont validées en quelques jours seulement, et non en semaines.</text>
</svg>
