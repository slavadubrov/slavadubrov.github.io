<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Boucle de calibrage du juge</title>
  <desc id="desc">Une boucle permettant de calibrer les juges d’LLM à l’aide de labels humains, de modifications de grille d’évaluation, de métriques d’accord et de surveillance du dérive.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#1d4ed8" flood-opacity="0.08" />
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#7c3aed" />
    </marker>
    <style>
      text { font-family: Inter, system-ui, sans-serif; fill: #0f172a; }
      .title { font-size: 25px; font-weight: 700; }
      .sub { font-size: 14px; fill: #334155; }
      .box-title { font-size: 16px; font-weight: 700; }
      .box-copy { font-size: 12px; fill: #1d4ed8; }
      .arrow { stroke: #7c3aed; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="1000" height="520" fill="#f8fafc" />
  <text y="42" class="title" text-anchor="middle" x="500">Considérer le juge comme un instrument de mesure</text>
  <text y="68" class="sub" text-anchor="middle" x="500">Un prompt d’arbitrage non calibré n’est qu’une opinion très affirmée.</text>

  <g transform="translate(88 118)">
    <rect width="200" height="92" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
    <text y="32" class="box-title" text-anchor="middle" x="100">Étiquettes manuelles</text>
    <text y="56" class="box-copy" text-anchor="middle" x="100">20 à 50 pannes réelles</text>
    <text y="74" class="box-copy" text-anchor="middle" x="100">avec les raisons d'acceptation/refus</text>
  </g>

  <g transform="translate(400 118)">
    <rect width="200" height="92" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadow)" />
    <text y="32" class="box-title" text-anchor="middle" x="100">Rubrique</text>
    <text y="56" class="box-copy" text-anchor="middle" x="100">critères atomiques,</text>
    <text y="74" class="box-copy" text-anchor="middle" x="100">exemples à faible nombre d’échantillons</text>
  </g>

  <g transform="translate(712 118)">
    <rect width="200" height="92" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)" />
    <text y="32" class="box-title" text-anchor="middle" x="100">Version de jugement</text>
    <text y="56" class="box-copy" text-anchor="middle" x="100">modèle + prompt</text>
    <text y="74" class="box-copy" text-anchor="middle" x="100">fixés ensemble</text>
  </g>

  <g transform="translate(712 306)">
    <rect width="200" height="92" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="2" filter="url(#shadow)" />
    <text y="32" class="box-title" text-anchor="middle" x="100">Vérification de l'accord</text>
    <text y="56" class="box-copy" text-anchor="middle" x="100">TPR, TNR, kappa,</text>
    <text y="74" class="box-copy" text-anchor="middle" x="100">distribution des scores</text>
  </g>

  <g transform="translate(400 306)">
    <rect width="200" height="92" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
    <text y="32" class="box-title" text-anchor="middle" x="100">Vérifications de biais</text>
    <text y="56" class="box-copy" text-anchor="middle" x="100">position, longueur,</text>
    <text y="74" class="box-copy" text-anchor="middle" x="100">préférence de famille de modèles</text>
  </g>

  <g transform="translate(88 306)">
    <rect width="200" height="92" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2" filter="url(#shadow)" />
    <text y="32" class="box-title" text-anchor="middle" x="100">Surveillant de dérive</text>
    <text y="56" class="box-copy" text-anchor="middle" x="100">vérifier à nouveau après le modèle</text>
    <text y="74" class="box-copy" text-anchor="middle" x="100">ou des modifications des prompts</text>
  </g>

  <path class="arrow" d="M290 164 L390 164" />
  <path class="arrow" d="M602 164 L702 164" />
  <path class="arrow" d="M812 212 L812 298" />
  <path class="arrow" d="M710 352 L612 352" />
  <path class="arrow" d="M398 352 L298 352" />
  <path class="arrow" d="M188 304 L188 220" />
  <path class="arrow" d="M290 320 C342 252, 652 252, 710 320" />
</svg>
