<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520" role="img" aria-labelledby="title desc">
  <title id="title">Boucle de calibrage du juge</title>
  <desc id="desc">Une boucle permettant de calibrer les juges d’LLM à l’aide de labels humains, de modifications de grille d’évaluation, de métriques d’accord et de surveillance du dérive.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#1f2937" flood-opacity="0.15" />
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#6a1b9a" />
    </marker>
    <style>
      text { font-family: Inter, Arial, sans-serif; fill: #263238; }
      .title { font-size: 25px; font-weight: 700; }
      .sub { font-size: 14px; fill: #546e7a; }
      .box-title { font-size: 16px; font-weight: 700; }
      .box-copy { font-size: 12px; fill: #455a64; }
      .arrow { stroke: #6a1b9a; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1000" height="520" fill="#f8f9fa" />
  <text x="500" y="42" class="title" text-anchor="middle">Considérer le juge comme un instrument de mesure</text>
  <text x="500" y="68" class="sub" text-anchor="middle">Un prompt d’arbitrage non calibré n’est qu’une opinion très affirmée.</text>

  <g transform="translate(88 118)">
    <rect width="200" height="92" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" filter="url(#shadow)" />
    <text x="100" y="32" class="box-title" text-anchor="middle">Étiquettes manuelles</text>
    <text x="100" y="56" class="box-copy" text-anchor="middle">20 à 50 pannes réelles</text>
    <text x="100" y="74" class="box-copy" text-anchor="middle">avec les raisons d'acceptation/refus</text>
  </g>

  <g transform="translate(400 118)">
    <rect width="200" height="92" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="2" filter="url(#shadow)" />
    <text x="100" y="32" class="box-title" text-anchor="middle">Rubrique</text>
    <text x="100" y="56" class="box-copy" text-anchor="middle">critères atomiques,</text>
    <text x="100" y="74" class="box-copy" text-anchor="middle">exemples à faible nombre d’échantillons</text>
  </g>

  <g transform="translate(712 118)">
    <rect width="200" height="92" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" filter="url(#shadow)" />
    <text x="100" y="32" class="box-title" text-anchor="middle">Version de jugement</text>
    <text x="100" y="56" class="box-copy" text-anchor="middle">modèle + prompt</text>
    <text x="100" y="74" class="box-copy" text-anchor="middle">fixés ensemble</text>
  </g>

  <g transform="translate(712 306)">
    <rect width="200" height="92" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" filter="url(#shadow)" />
    <text x="100" y="32" class="box-title" text-anchor="middle">Vérification de l'accord</text>
    <text x="100" y="56" class="box-copy" text-anchor="middle">TPR, TNR, kappa,</text>
    <text x="100" y="74" class="box-copy" text-anchor="middle">distribution des scores</text>
  </g>

  <g transform="translate(400 306)">
    <rect width="200" height="92" rx="8" fill="#ffffff" stroke="#2980b9" stroke-width="2" filter="url(#shadow)" />
    <text x="100" y="32" class="box-title" text-anchor="middle">Vérifications de biais</text>
    <text x="100" y="56" class="box-copy" text-anchor="middle">position, longueur,</text>
    <text x="100" y="74" class="box-copy" text-anchor="middle">préférence de famille de modèles</text>
  </g>

  <g transform="translate(88 306)">
    <rect width="200" height="92" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="2" filter="url(#shadow)" />
    <text x="100" y="32" class="box-title" text-anchor="middle">Surveillant de dérive</text>
    <text x="100" y="56" class="box-copy" text-anchor="middle">vérifier à nouveau après le modèle</text>
    <text x="100" y="74" class="box-copy" text-anchor="middle">ou des modifications des prompts</text>
  </g>

  <path class="arrow" d="M290 164 L390 164" />
  <path class="arrow" d="M602 164 L702 164" />
  <path class="arrow" d="M812 212 L812 298" />
  <path class="arrow" d="M710 352 L612 352" />
  <path class="arrow" d="M398 352 L298 352" />
  <path class="arrow" d="M188 304 L188 220" />
  <path class="arrow" d="M290 320 C342 252, 652 252, 710 320" />
</svg>
