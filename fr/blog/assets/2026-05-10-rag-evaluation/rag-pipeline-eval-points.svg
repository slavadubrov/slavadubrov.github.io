<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrEval" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555" />
    </marker>
    <filter id="shadowEval" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Title -->
  <text x="590" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a2e">Le pipeline RAG avec points d’évaluation</text>
  <text x="590" y="54" text-anchor="middle" font-size="12" fill="#666">Chaque étape dispose d’une métrique. C’est cette métrique qui permet de détecter les échecs silencieux.</text>

  <!-- ============ OFFLINE LANE ============ -->
  <rect x="20" y="78" width="1140" height="290" rx="10" fill="#f8f9fa" stroke="#cbd5e0" stroke-width="1" />
  <text x="40" y="102" font-size="13" font-weight="700" fill="#1565c0">Hors ligne · Ingestion</text>
  <text x="40" y="118" font-size="10" fill="#888">Exécuté une fois par version du corpus. Définit la limite maximale.</text>

  <!-- Stage 1: Acquire / Parse -->
  <rect x="40" y="140" width="170" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="125" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Acquisition et analyse</text>
  <text x="125" y="178" text-anchor="middle" font-size="9" fill="#555">PDF · HTML · OCR</text>
  <text x="125" y="192" text-anchor="middle" font-size="9" fill="#555">Tables · Mise en page</text>

  <!-- Metric badge 1 -->
  <rect x="40" y="212" width="170" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="125" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">CER · WER · TEDS</text>
  <text x="125" y="242" text-anchor="middle" font-size="9" fill="#827717">analyser le taux de réussite</text>
  <text x="125" y="255" text-anchor="middle" font-size="9" fill="#827717">fidélité du layout</text>

  <!-- Arrow -->
  <line x1="210" y1="171" x2="245" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 2: Normalize / Dedup -->
  <rect x="245" y="140" width="170" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="330" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Normalisation et suppression des doublons</text>
  <text x="330" y="178" text-anchor="middle" font-size="9" fill="#555">NFC/NFKC · MinHash</text>
  <text x="330" y="192" text-anchor="middle" font-size="9" fill="#555">PII · modèle de base</text>

  <rect x="245" y="212" width="170" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="330" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">recall/précision en double</text>
  <text x="330" y="242" text-anchor="middle" font-size="9" fill="#827717">Rappel des PII (par type)</text>
  <text x="330" y="255" text-anchor="middle" font-size="9" fill="#827717">Détection de langue, touche F1</text>

  <line x1="415" y1="171" x2="450" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 3: Chunk -->
  <rect x="450" y="140" width="170" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="535" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Bloc</text>
  <text x="535" y="178" text-anchor="middle" font-size="9" fill="#555">récursif · sémantique</text>
  <text x="535" y="192" text-anchor="middle" font-size="9" fill="#555">structurale · tardive</text>

  <rect x="450" y="212" width="170" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="535" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">conteneur d’answer-span</text>
  <text x="535" y="242" text-anchor="middle" font-size="9" fill="#827717">taux de rupture de limite</text>
  <text x="535" y="255" text-anchor="middle" font-size="9" fill="#827717">Recall@k par taille</text>

  <line x1="620" y1="171" x2="655" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 4: Enrich (NER/EL) -->
  <rect x="655" y="140" width="170" height="62" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="740" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#6a1b9a">Enrichir</text>
  <text x="740" y="178" text-anchor="middle" font-size="9" fill="#555">NER · liaison d’entité</text>
  <text x="740" y="192" text-anchor="middle" font-size="9" fill="#555">étiquettes · hiérarchie</text>

  <rect x="655" y="212" width="170" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="740" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">Précision EL F1 · NIL</text>
  <text x="740" y="242" text-anchor="middle" font-size="9" fill="#827717">F1 hiérarchique</text>
  <text x="740" y="255" text-anchor="middle" font-size="9" fill="#827717">couverture des alias</text>

  <line x1="825" y1="171" x2="860" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 5: Embed -->
  <rect x="860" y="140" width="135" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="927" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Insérer</text>
  <text x="927" y="178" text-anchor="middle" font-size="9" fill="#555">dense / sparse</text>
  <text x="927" y="192" text-anchor="middle" font-size="9" fill="#555">multivectoriel</text>

  <rect x="860" y="212" width="135" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="927" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">domaine nDCG@10</text>
  <text x="927" y="242" text-anchor="middle" font-size="9" fill="#827717">dérive (KL · NN-stab.)</text>
  <text x="927" y="255" text-anchor="middle" font-size="9" fill="#827717">vs. BEIR/MMTEB</text>

  <line x1="995" y1="171" x2="1030" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 6: Index -->
  <rect x="1030" y="140" width="115" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="1087" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Index</text>
  <text x="1087" y="178" text-anchor="middle" font-size="9" fill="#555">HNSW / IVF</text>
  <text x="1087" y="192" text-anchor="middle" font-size="9" fill="#555">BM25 · hybride</text>

  <rect x="1030" y="212" width="115" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="1087" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">Rappel ANN par rapport à la valeur plate</text>
  <text x="1087" y="242" text-anchor="middle" font-size="9" fill="#827717">retard de fraîcheur p99</text>
  <text x="1087" y="255" text-anchor="middle" font-size="9" fill="#827717">latitude de recherche filtrée.</text>

  <!-- Lane summary -->
  <rect x="40" y="290" width="1105" height="58" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1" />
  <text x="592" y="312" text-anchor="middle" font-size="11" font-weight="600" fill="#1565c0">La disponibilité du corpus hors ligne définit la limite supérieure. Si un fragment perd son intervalle d’ réponse à cet étape, aucun réordonneur ne pourra le récupérer ultérieurement.</text>
  <text x="592" y="332" text-anchor="middle" font-size="10" fill="#1565c0">La plupart des équipes investissent excessivement dans la récupération d’informations et insuffisamment dans le parsing, la normalisation et le découpage en chunks. C’est là que le RAG en environnement de production échoue silencieusement.</text>

  <!-- ============ ONLINE LANE ============ -->
  <rect x="20" y="378" width="1140" height="280" rx="10" fill="#f8f9fa" stroke="#cbd5e0" stroke-width="1" />
  <text x="40" y="402" font-size="13" font-weight="700" fill="#e65100">En ligne · Inférence (par requête)</text>
  <text x="40" y="418" font-size="10" fill="#888">Exécuté pour chaque requête. Le canal où la plupart des métriques sont surveillées en production.</text>

  <!-- Stage 7: Query Rewrite -->
  <rect x="40" y="440" width="160" height="62" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="120" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">Réécrire / Rediriger</text>
  <text x="120" y="478" text-anchor="middle" font-size="9" fill="#555">HyDE · requêtes multiples</text>
  <text x="120" y="492" text-anchor="middle" font-size="9" fill="#555">intention · adaptative</text>

  <rect x="40" y="512" width="160" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="120" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">Amélioration du Recall@k</text>
  <text x="120" y="542" text-anchor="middle" font-size="9" fill="#827717">précision de routage</text>
  <text x="120" y="555" text-anchor="middle" font-size="9" fill="#827717">taux d’opérations sans effet</text>

  <line x1="200" y1="471" x2="235" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 8: Retrieve -->
  <rect x="235" y="440" width="160" height="62" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="315" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">Récupérer</text>
  <text x="315" y="478" text-anchor="middle" font-size="9" fill="#555">dense + sparse + RRF</text>
  <text x="315" y="492" text-anchor="middle" font-size="9" fill="#555">prédicats de filtre</text>

  <rect x="235" y="512" width="160" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="315" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">Recall@k · MRR · nDCG</text>
  <text x="315" y="542" text-anchor="middle" font-size="9" fill="#827717">précision/retenue dans le contexte</text>
  <text x="315" y="555" text-anchor="middle" font-size="9" fill="#827717">levage hybride</text>

  <line x1="395" y1="471" x2="430" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 9: Filter (highlighted) -->
  <rect x="430" y="440" width="160" height="62" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="2" filter="url(#shadowEval)" />
  <text x="510" y="462" text-anchor="middle" font-size="12" font-weight="700" fill="#c62828">Filtre (le tueur silencieux)</text>
  <text x="510" y="478" text-anchor="middle" font-size="9" fill="#555">propriétaire · ACL · étiquette</text>
  <text x="510" y="492" text-anchor="middle" font-size="9" fill="#555">dur contre souple</text>

  <rect x="430" y="512" width="160" height="48" rx="6" fill="#ffebee" stroke="#c62828" stroke-width="1.2" />
  <text x="510" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#c62828">taux de faux exclus par filtre</text>
  <text x="510" y="542" text-anchor="middle" font-size="9" fill="#c62828">précision/rappel du prédicat</text>
  <text x="510" y="555" text-anchor="middle" font-size="9" fill="#c62828">retrait d’ombre Δ</text>

  <line x1="590" y1="471" x2="625" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 10: Rerank -->
  <rect x="625" y="440" width="160" height="62" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="705" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">Reclasser</text>
  <text x="705" y="478" text-anchor="middle" font-size="9" fill="#555">encodeur croisé · par liste</text>
  <text x="705" y="492" text-anchor="middle" font-size="9" fill="#555">BGE · Cohere · ZeRank</text>

  <rect x="625" y="512" width="160" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="705" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">ΔnDCG · ΔMRR · ΔP@1</text>
  <text x="705" y="542" text-anchor="middle" font-size="9" fill="#827717">résilience aux éléments perturbateurs</text>
  <text x="705" y="555" text-anchor="middle" font-size="9" fill="#827717">latence p95</text>

  <line x1="785" y1="471" x2="820" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 11: Assemble -->
  <rect x="820" y="440" width="160" height="62" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="900" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">Assembler le contexte</text>
  <text x="900" y="478" text-anchor="middle" font-size="9" fill="#555">ordonner · compresser</text>
  <text x="900" y="492" text-anchor="middle" font-size="9" fill="#555">tokens budgétisés</text>

  <rect x="820" y="512" width="160" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="900" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">utilisation du contexte</text>
  <text x="900" y="542" text-anchor="middle" font-size="9" fill="#827717">attaque du type « perdu au milieu »</text>
  <text x="900" y="555" text-anchor="middle" font-size="9" fill="#827717">compression × exactitude</text>

  <line x1="980" y1="471" x2="1015" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 12: Generate -->
  <rect x="1015" y="440" width="130" height="62" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="1080" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#6a1b9a">Générer</text>
  <text x="1080" y="478" text-anchor="middle" font-size="9" fill="#555">Appel LLM</text>
  <text x="1080" y="492" text-anchor="middle" font-size="9" fill="#555">+ références</text>

  <rect x="1015" y="512" width="130" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="1080" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">fidélité · HHEM</text>
  <text x="1080" y="542" text-anchor="middle" font-size="9" fill="#827717">citation P/R</text>
  <text x="1080" y="555" text-anchor="middle" font-size="9" fill="#827717">Score de fiabilité</text>

  <!-- Lane summary -->
  <rect x="40" y="582" width="1105" height="58" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1" />
  <text x="592" y="604" text-anchor="middle" font-size="11" font-weight="600" fill="#e65100">Un filtre défectueux ou une réécriture incorrecte met à zéro le taux de rappel avant le début du classement. La fidélité reste correcte : le modèle indique fidèlement « Je ne sais pas. »</text>
  <text x="592" y="624" text-anchor="middle" font-size="10" fill="#e65100">Suivez le taux d’exclusion des pistes en même temps que le Recall@k. Sinon, les métriques canoniques d’IR vous donneront de fausses informations concernant la qualité du système de récupération.</text>

  <!-- ============ POST-GEN LANE ============ -->
  <rect x="20" y="668" width="1140" height="78" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1" />
  <text x="40" y="692" font-size="13" font-weight="700" fill="#2e7d32">Post-génération · Vérification et télémétrie</text>

  <rect x="40" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="150" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">vérification des affirmations · NLI · auto-consistance</text>

  <rect x="270" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="380" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">valideité du schéma · ancrage des entités · ECE</text>

  <rect x="500" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="610" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">taux de régénération · boutons d’approbation · durée de séjour · taux de clic sur les citations</text>

  <rect x="730" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="840" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">dérive (requête/encodage) · coût/requête · p95</text>

  <rect x="960" y="704" width="185" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="1052" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">évaluation de l’ombre · file d’attente HITL</text>
</svg>
