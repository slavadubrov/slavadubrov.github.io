<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="The full RAG pipeline with metric badges at every stage" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Le RAG pipeline complet, accompagné d’indicateurs métriques à chaque étape</title>
  <defs>
    <marker id="arrEval" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155" />
    </marker>
    <filter id="shadowEval" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a" x="590">Le RAG Pipeline doté de points d’évaluation</text>
  <text y="54" text-anchor="middle" font-size="12" fill="#334155" x="590">Chaque étape dispose d’une métrique. C’est cette métrique qui permet de détecter les échecs silencieux.</text>

  <!-- ============ OFFLINE LANE ============ -->
  <rect x="20" y="78" width="1140" height="290" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="102" font-size="13" font-weight="700" fill="#1d4ed8" x="40">hors ligne · ingestion</text>
  <text y="118" font-size="10" fill="#64748b" x="40">Exécuté une fois par version de corpus. Définit la limite maximale.</text>

  <!-- Stage 1: Acquire / Parse -->
  <rect x="40" y="140" width="170" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="125">Acquisition et analyse</text>
  <text y="178" text-anchor="middle" font-size="9" fill="#334155" x="125">PDF · HTML · OCR</text>
  <text y="192" text-anchor="middle" font-size="9" fill="#334155" x="125">Tables · Mise en page</text>

  <!-- Metric badge 1 -->
  <rect x="40" y="212" width="170" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="125">CER · WER · TEDS</text>
  <text y="242" text-anchor="middle" font-size="9" fill="#9a3412" x="125">taux de réussite du parse</text>
  <text y="255" text-anchor="middle" font-size="9" fill="#9a3412" x="125">fidélité du layout</text>

  <!-- Arrow -->
  <line x1="210" y1="171" x2="245" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 2: Normalize / Dedup -->
  <rect x="245" y="140" width="170" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="330">Normalisation et suppression des doublons</text>
  <text y="178" text-anchor="middle" font-size="9" fill="#334155" x="330">NFC/NFKC · MinHash</text>
  <text y="192" text-anchor="middle" font-size="9" fill="#334155" x="330">PII · modèle de base</text>

  <rect x="245" y="212" width="170" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="330">taux de rappel/précision des doublons</text>
  <text y="242" text-anchor="middle" font-size="9" fill="#9a3412" x="330">Rappel des PII (par type)</text>
  <text y="255" text-anchor="middle" font-size="9" fill="#9a3412" x="330">lang-detect F1</text>

  <line x1="415" y1="171" x2="450" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 3: Chunk -->
  <rect x="450" y="140" width="170" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="535">Chunk</text>
  <text y="178" text-anchor="middle" font-size="9" fill="#334155" x="535">récursif · sémantique</text>
  <text y="192" text-anchor="middle" font-size="9" fill="#334155" x="535">structuré · tardif</text>

  <rect x="450" y="212" width="170" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="535">conteneur d’answer-span</text>
  <text y="242" text-anchor="middle" font-size="9" fill="#9a3412" x="535">taux de rupture de bordure</text>
  <text y="255" text-anchor="middle" font-size="9" fill="#9a3412" x="535">Rappel@k par rapport à la taille</text>

  <line x1="620" y1="171" x2="655" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 4: Enrich (NER/EL) -->
  <rect x="655" y="140" width="170" height="62" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6" x="740">Enrichir</text>
  <text y="178" text-anchor="middle" font-size="9" fill="#334155" x="740">NER · liaison d’entité</text>
  <text y="192" text-anchor="middle" font-size="9" fill="#334155" x="740">étiquettes · hiérarchie</text>

  <rect x="655" y="212" width="170" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="740">Précision EL F1 · NIL</text>
  <text y="242" text-anchor="middle" font-size="9" fill="#9a3412" x="740">F1 hiérarchique</text>
  <text y="255" text-anchor="middle" font-size="9" fill="#9a3412" x="740">couverture des alias</text>

  <line x1="825" y1="171" x2="860" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 5: Embed -->
  <rect x="860" y="140" width="135" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="927">Incorporer</text>
  <text y="178" text-anchor="middle" font-size="9" fill="#334155" x="927">dense / sparse</text>
  <text y="192" text-anchor="middle" font-size="9" fill="#334155" x="927">multi-vectoriel</text>

  <rect x="860" y="212" width="135" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="927">domaine nDCG@10</text>
  <text y="242" text-anchor="middle" font-size="9" fill="#9a3412" x="927">dérive (KL · NN-stab.)</text>
  <text y="255" text-anchor="middle" font-size="9" fill="#9a3412" x="927">vs. BEIR/MMTEB</text>

  <line x1="995" y1="171" x2="1030" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 6: Index -->
  <rect x="1030" y="140" width="115" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="1087">Index</text>
  <text y="178" text-anchor="middle" font-size="9" fill="#334155" x="1087">HNSW / IVF</text>
  <text y="192" text-anchor="middle" font-size="9" fill="#334155" x="1087">BM25 · hybride</text>

  <rect x="1030" y="212" width="115" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="1087">ANN rappel par rapport à la valeur plate</text>
  <text y="242" text-anchor="middle" font-size="9" fill="#9a3412" x="1087">décalage de fraîcheur p99</text>
  <text y="255" text-anchor="middle" font-size="9" fill="#9a3412" x="1087">latitude de recherche filtrée</text>

  <!-- Lane summary -->
  <rect x="40" y="290" width="1105" height="58" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1" />
  <text y="312" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8" x="592">La prêté du corpus hors ligne définit la limite supérieure. Si un fragment perd l’intervalle correspondant à la réponse ici, aucun reranker ne pourra la récupérer ultérieurement.</text>
  <text y="332" text-anchor="middle" font-size="10" fill="#1d4ed8" x="592">La plupart des équipes investissent excessivement dans la récupération d’informations et insuffisamment dans le parsing, la normalisation et le découpage en chunks. C’est là que les systèmes en production RAG cessent silencieusement de fonctionner.</text>

  <!-- ============ ONLINE LANE ============ -->
  <rect x="20" y="378" width="1140" height="280" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="402" font-size="13" font-weight="700" fill="#9a3412" x="40">En ligne · Inférence (par requête)</text>
  <text y="418" font-size="10" fill="#64748b" x="40">Exécute chaque requête. Le canal dans lequel la plupart des métriques sont surveillées en production.</text>

  <!-- Stage 7: Query Rewrite -->
  <rect x="40" y="440" width="160" height="62" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="120">Réécriture / Routage</text>
  <text y="478" text-anchor="middle" font-size="9" fill="#334155" x="120">HyDE · multi-requête</text>
  <text y="492" text-anchor="middle" font-size="9" fill="#334155" x="120">intention · adaptative</text>

  <rect x="40" y="512" width="160" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="120">Amélioration du Recall@k</text>
  <text y="542" text-anchor="middle" font-size="9" fill="#9a3412" x="120">précision de routage</text>
  <text y="555" text-anchor="middle" font-size="9" fill="#9a3412" x="120">taux d’opérations sans effet</text>

  <line x1="200" y1="471" x2="235" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 8: Retrieve -->
  <rect x="235" y="440" width="160" height="62" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="315">Récupérer</text>
  <text y="478" text-anchor="middle" font-size="9" fill="#334155" x="315">dense + sparse + RRF</text>
  <text y="492" text-anchor="middle" font-size="9" fill="#334155" x="315">prédicats de filtre</text>

  <rect x="235" y="512" width="160" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="315">Recall@k · MRR · nDCG</text>
  <text y="542" text-anchor="middle" font-size="9" fill="#9a3412" x="315">précision/rappel dans le contexte</text>
  <text y="555" text-anchor="middle" font-size="9" fill="#9a3412" x="315">levage hybride</text>

  <line x1="395" y1="471" x2="430" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 9: Filter (highlighted) -->
  <rect x="430" y="440" width="160" height="62" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b" x="510">Filtre (le tueur silencieux)</text>
  <text y="478" text-anchor="middle" font-size="9" fill="#334155" x="510">locataire · ACL · étiquette</text>
  <text y="492" text-anchor="middle" font-size="9" fill="#334155" x="510">dur contre souple</text>

  <rect x="430" y="512" width="160" height="48" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.2" />
  <text y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#991b1b" x="510">taux de fausse exclusion du filtre</text>
  <text y="542" text-anchor="middle" font-size="9" fill="#991b1b" x="510">précision/rappel des prédicats</text>
  <text y="555" text-anchor="middle" font-size="9" fill="#991b1b" x="510">retrait d’ombres Δ</text>

  <line x1="590" y1="471" x2="625" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 10: Rerank -->
  <rect x="625" y="440" width="160" height="62" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="705">Réclasser</text>
  <text y="478" text-anchor="middle" font-size="9" fill="#334155" x="705">encodeur croisé · par liste</text>
  <text y="492" text-anchor="middle" font-size="9" fill="#334155" x="705">BGE · Cohere · ZeRank</text>

  <rect x="625" y="512" width="160" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="705">ΔnDCG · ΔMRR · ΔP@1</text>
  <text y="542" text-anchor="middle" font-size="9" fill="#9a3412" x="705">résilience aux distracteurs</text>
  <text y="555" text-anchor="middle" font-size="9" fill="#9a3412" x="705">latence p95</text>

  <line x1="785" y1="471" x2="820" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 11: Assemble -->
  <rect x="820" y="440" width="160" height="62" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="900">Assembler le contexte</text>
  <text y="478" text-anchor="middle" font-size="9" fill="#334155" x="900">ordonner · compresser</text>
  <text y="492" text-anchor="middle" font-size="9" fill="#334155" x="900">tokens de budget</text>

  <rect x="820" y="512" width="160" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="900">utilisation du contexte</text>
  <text y="542" text-anchor="middle" font-size="9" fill="#9a3412" x="900">attaque du type perdu au milieu</text>
  <text y="555" text-anchor="middle" font-size="9" fill="#9a3412" x="900">compression × exactitude</text>

  <line x1="980" y1="471" x2="1015" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 12: Generate -->
  <rect x="1015" y="440" width="130" height="62" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6" x="1080">Générer</text>
  <text y="478" text-anchor="middle" font-size="9" fill="#334155" x="1080">LLM appel</text>
  <text y="492" text-anchor="middle" font-size="9" fill="#334155" x="1080">+ références</text>

  <rect x="1015" y="512" width="130" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="1080">fidélité · HHEM</text>
  <text y="542" text-anchor="middle" font-size="9" fill="#9a3412" x="1080">citation P/R</text>
  <text y="555" text-anchor="middle" font-size="9" fill="#9a3412" x="1080">FactScore</text>

  <!-- Lane summary -->
  <rect x="40" y="582" width="1105" height="58" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1" />
  <text y="604" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412" x="592">&lt;EOC_TEXT Un filtre défectueux ou une réécriture incorrecte met le rappel à zéro avant même le début du classement. La fidélité reste correcte : le modèle indique fidèlement « Je ne sais pas ».</text>
  <text y="624" text-anchor="middle" font-size="10" fill="#9a3412" x="592">Suivez le taux d’exclusion des pistes en même temps que le Recall@k. Sinon, les métriques canoniques d’IR vous donneront des informations erronées concernant la qualité d’un système de récupération efficace.</text>

  <!-- ============ POST-GEN LANE ============ -->
  <rect x="20" y="668" width="1140" height="78" rx="10" fill="#f0fdf4" stroke="#166534" stroke-width="1" />
  <text y="692" font-size="13" font-weight="700" fill="#166534" x="40">Post-génération · Vérification et télémétrie</text>

  <rect x="40" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="150">vérification des affirmations · NLI · auto-cohérence</text>

  <rect x="270" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="380">valideité du schéma · ancrage d’entité · ECE</text>

  <rect x="500" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="610">taux de régénération · boutons d’approbation · durée d’affichage · CTR sur les citations</text>

  <rect x="730" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="840">dérive (recherche/encodage) · coût/recherche · p95</text>

  <rect x="960" y="704" width="185" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="1052">évaluation de l’ombre · file d’attente HITL</text>
</svg>
