<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrEval" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555" />
    </marker>
    <filter id="shadowEval" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Title -->
  <text x="590" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a2e">Le pipeline RAG avec points d’évaluation</text>
  <text x="590" y="54" text-anchor="middle" font-size="12" fill="#666">Chaque étape a une métrique. C’est elle qui détecte les échecs silencieux.</text>

  <!-- ============ OFFLINE LANE ============ -->
  <rect x="20" y="78" width="1140" height="290" rx="10" fill="#f8f9fa" stroke="#cbd5e0" stroke-width="1" />
  <text x="40" y="102" font-size="13" font-weight="700" fill="#1565c0">Hors ligne · Ingestion</text>
  <text x="40" y="118" font-size="10" fill="#888">S’exécute une fois par version du corpus. Fixe le plafond.</text>

  <!-- Stage 1: Acquire / Parse -->
  <rect x="40" y="140" width="170" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="125" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Acquérir &amp; analyser</text>
  <text x="125" y="178" text-anchor="middle" font-size="9" fill="#555">PDFs · HTML · OCR</text>
  <text x="125" y="192" text-anchor="middle" font-size="9" fill="#555">Tableaux · mise en page</text>

  <!-- Metric badge 1 -->
  <rect x="40" y="212" width="170" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="125" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">CER · WER · TEDS</text>
  <text x="125" y="242" text-anchor="middle" font-size="9" fill="#827717">taux de parsing OK</text>
  <text x="125" y="255" text-anchor="middle" font-size="9" fill="#827717">fidélité de mise en page</text>

  <!-- Arrow -->
  <line x1="210" y1="171" x2="245" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 2: Normalize / Dedup -->
  <rect x="245" y="140" width="170" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="330" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Normaliser &amp; dédupliquer</text>
  <text x="330" y="178" text-anchor="middle" font-size="9" fill="#555">NFC/NFKC · MinHash</text>
  <text x="330" y="192" text-anchor="middle" font-size="9" fill="#555">PII · boilerplate</text>

  <rect x="245" y="212" width="170" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="330" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">rappel/précision des doublons</text>
  <text x="330" y="242" text-anchor="middle" font-size="9" fill="#827717">rappel PII (par type)</text>
  <text x="330" y="255" text-anchor="middle" font-size="9" fill="#827717">F1 détection langue</text>

  <line x1="415" y1="171" x2="450" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 3: Chunk -->
  <rect x="450" y="140" width="170" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="535" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Découper</text>
  <text x="535" y="178" text-anchor="middle" font-size="9" fill="#555">récursif · sémantique</text>
  <text x="535" y="192" text-anchor="middle" font-size="9" fill="#555">structurel · tardif</text>

  <rect x="450" y="212" width="170" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="535" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">couverture du span-réponse</text>
  <text x="535" y="242" text-anchor="middle" font-size="9" fill="#827717">taux de rupture de frontière</text>
  <text x="535" y="255" text-anchor="middle" font-size="9" fill="#827717">Recall@k vs. taille</text>

  <line x1="620" y1="171" x2="655" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 4: Enrich (NER/EL) -->
  <rect x="655" y="140" width="170" height="62" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="740" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#6a1b9a">Enrichir</text>
  <text x="740" y="178" text-anchor="middle" font-size="9" fill="#555">NER · liens d’entités</text>
  <text x="740" y="192" text-anchor="middle" font-size="9" fill="#555">tags · hiérarchie</text>

  <rect x="655" y="212" width="170" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="740" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">EL F1 · précision NIL</text>
  <text x="740" y="242" text-anchor="middle" font-size="9" fill="#827717">F1 hiérarchique</text>
  <text x="740" y="255" text-anchor="middle" font-size="9" fill="#827717">couverture des alias</text>

  <line x1="825" y1="171" x2="860" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 5: Embed -->
  <rect x="860" y="140" width="135" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="927" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Vectoriser</text>
  <text x="927" y="178" text-anchor="middle" font-size="9" fill="#555">dense / sparse</text>
  <text x="927" y="192" text-anchor="middle" font-size="9" fill="#555">multi-vecteur</text>

  <rect x="860" y="212" width="135" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="927" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">nDCG@10 domaine</text>
  <text x="927" y="242" text-anchor="middle" font-size="9" fill="#827717">dérive (KL · stab. NN)</text>
  <text x="927" y="255" text-anchor="middle" font-size="9" fill="#827717">vs. BEIR/MMTEB</text>

  <line x1="995" y1="171" x2="1030" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 6: Index -->
  <rect x="1030" y="140" width="115" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="1087" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Indexer</text>
  <text x="1087" y="178" text-anchor="middle" font-size="9" fill="#555">HNSW / IVF</text>
  <text x="1087" y="192" text-anchor="middle" font-size="9" fill="#555">BM25 · hybride</text>

  <rect x="1030" y="212" width="115" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="1087" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">rappel ANN vs. flat</text>
  <text x="1087" y="242" text-anchor="middle" font-size="9" fill="#827717">retard fraîcheur p99</text>
  <text x="1087" y="255" text-anchor="middle" font-size="9" fill="#827717">lat. recherche filtrée</text>

  <!-- Lane summary -->
  <rect x="40" y="290" width="1105" height="58" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1" />
  <text x="592" y="312" text-anchor="middle" font-size="11" font-weight="600" fill="#1565c0">La préparation hors ligne du corpus fixe la borne haute. Si un chunk perd ici le span-réponse, aucun reranker ne le récupère ensuite.</text>
  <text x="592" y="332" text-anchor="middle" font-size="10" fill="#1565c0">La plupart des équipes surinvestissent en retrieval et sous-investissent en parsing, normalisation et chunking. C’est là que le RAG de prod meurt en silence.</text>

  <!-- ============ ONLINE LANE ============ -->
  <rect x="20" y="378" width="1140" height="280" rx="10" fill="#f8f9fa" stroke="#cbd5e0" stroke-width="1" />
  <text x="40" y="402" font-size="13" font-weight="700" fill="#e65100">En ligne · Inférence (par requête)</text>
  <text x="40" y="418" font-size="10" fill="#888">S’exécute à chaque requête. C’est la voie où l’on surveille le plus de métriques en production.</text>

  <!-- Stage 7: Query Rewrite -->
  <rect x="40" y="440" width="160" height="62" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="120" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">Réécrire / router</text>
  <text x="120" y="478" text-anchor="middle" font-size="9" fill="#555">HyDE · multi-requête</text>
  <text x="120" y="492" text-anchor="middle" font-size="9" fill="#555">intention · adaptatif</text>

  <rect x="40" y="512" width="160" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="120" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">gain Recall@k</text>
  <text x="120" y="542" text-anchor="middle" font-size="9" fill="#827717">précision du routage</text>
  <text x="120" y="555" text-anchor="middle" font-size="9" fill="#827717">taux sans effet</text>

  <line x1="200" y1="471" x2="235" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 8: Retrieve -->
  <rect x="235" y="440" width="160" height="62" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="315" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">Récupérer</text>
  <text x="315" y="478" text-anchor="middle" font-size="9" fill="#555">dense + sparse + RRF</text>
  <text x="315" y="492" text-anchor="middle" font-size="9" fill="#555">prédicats de filtre</text>

  <rect x="235" y="512" width="160" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="315" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">Recall@k · MRR · nDCG</text>
  <text x="315" y="542" text-anchor="middle" font-size="9" fill="#827717">précision/rappel du contexte</text>
  <text x="315" y="555" text-anchor="middle" font-size="9" fill="#827717">gain hybride</text>

  <line x1="395" y1="471" x2="430" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 9: Filter (highlighted) -->
  <rect x="430" y="440" width="160" height="62" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="2" filter="url(#shadowEval)" />
  <text x="510" y="462" text-anchor="middle" font-size="12" font-weight="700" fill="#c62828">Filtrer (le tueur silencieux)</text>
  <text x="510" y="478" text-anchor="middle" font-size="9" fill="#555">tenant · ACL · tag</text>
  <text x="510" y="492" text-anchor="middle" font-size="9" fill="#555">dur vs. souple</text>

  <rect x="430" y="512" width="160" height="48" rx="6" fill="#ffebee" stroke="#c62828" stroke-width="1.2" />
  <text x="510" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#c62828">taux de fausse exclusion filtre</text>
  <text x="510" y="542" text-anchor="middle" font-size="9" fill="#c62828">précision/rappel du prédicat</text>
  <text x="510" y="555" text-anchor="middle" font-size="9" fill="#c62828">Δ shadow-retrieval</text>

  <line x1="590" y1="471" x2="625" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 10: Rerank -->
  <rect x="625" y="440" width="160" height="62" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="705" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">Reranker</text>
  <text x="705" y="478" text-anchor="middle" font-size="9" fill="#555">cross-encoder · listwise</text>
  <text x="705" y="492" text-anchor="middle" font-size="9" fill="#555">BGE · Cohere · ZeRank</text>

  <rect x="625" y="512" width="160" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="705" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">ΔnDCG · ΔMRR · ΔP@1</text>
  <text x="705" y="542" text-anchor="middle" font-size="9" fill="#827717">robustesse aux distracteurs</text>
  <text x="705" y="555" text-anchor="middle" font-size="9" fill="#827717">latence p95</text>

  <line x1="785" y1="471" x2="820" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 11: Assemble -->
  <rect x="820" y="440" width="160" height="62" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="900" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">Assembler le contexte</text>
  <text x="900" y="478" text-anchor="middle" font-size="9" fill="#555">ordre · compresser</text>
  <text x="900" y="492" text-anchor="middle" font-size="9" fill="#555">budget tokens</text>

  <rect x="820" y="512" width="160" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="900" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">utilisation du contexte</text>
  <text x="900" y="542" text-anchor="middle" font-size="9" fill="#827717">perdu au milieu</text>
  <text x="900" y="555" text-anchor="middle" font-size="9" fill="#827717">compression × exactitude</text>

  <line x1="980" y1="471" x2="1015" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 12: Generate -->
  <rect x="1015" y="440" width="130" height="62" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="1080" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#6a1b9a">Générer</text>
  <text x="1080" y="478" text-anchor="middle" font-size="9" fill="#555">appel LLM</text>
  <text x="1080" y="492" text-anchor="middle" font-size="9" fill="#555">+ citations</text>

  <rect x="1015" y="512" width="130" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="1080" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">fidélité · HHEM</text>
  <text x="1080" y="542" text-anchor="middle" font-size="9" fill="#827717">P/R des citations</text>
  <text x="1080" y="555" text-anchor="middle" font-size="9" fill="#827717">FActScore</text>

  <!-- Lane summary -->
  <rect x="40" y="582" width="1105" height="58" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1" />
  <text x="592" y="604" text-anchor="middle" font-size="11" font-weight="600" fill="#e65100">Un mauvais filtre ou une mauvaise réécriture annule le rappel avant même le ranking. La fidélité semble pourtant bonne — le modèle dit fidèlement « je ne sais pas ».</text>
  <text x="592" y="624" text-anchor="middle" font-size="10" fill="#e65100">Suivez le taux d’exclusion avec Recall@k. Sinon, les métriques IR canoniques vous mentiront sur un retriever soi-disant sain.</text>

  <!-- ============ POST-GEN LANE ============ -->
  <rect x="20" y="668" width="1140" height="78" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1" />
  <text x="40" y="692" font-size="13" font-weight="700" fill="#2e7d32">Post-génération · Vérification &amp; télémétrie</text>

  <rect x="40" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="150" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">vérif. des affirmations · NLI · cohérence interne</text>

  <rect x="270" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="380" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">validité schéma · ancrage entité · ECE</text>

  <rect x="500" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="610" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">taux regen · pouces · dwell · CTR sur cites</text>

  <rect x="730" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="840" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">dérive (query/embed) · coût/requête · p95</text>

  <rect x="960" y="704" width="185" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="1052" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">éval fantôme · file HITL</text>
</svg>
