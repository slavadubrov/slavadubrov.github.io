<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 720" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="Silent failure taxonomy with the metric that catches each mode" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Taxonomie des défaillances silencieuses accompagnée de la métrique permettant d’identifier chaque mode</title>
  <defs>
    <filter id="shadowSF" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a" x="590">Taxonomie des échecs silencieux</text>
  <text y="54" text-anchor="middle" font-size="12" fill="#334155" x="590">Chaque mode de défaillance est associé à la métrique qui le détecte. Sans cette métrique, la faille reste invisible.</text>

  <!-- Root -->
  <rect x="475" y="78" width="230" height="44" rx="22" fill="#dc2626" filter="url(#shadowSF)" />
  <text y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" x="590">Echec silencieux (RAG)</text>

  <!-- Trunk: 4 main branches -->
  <line x1="540" y1="122" x2="170" y2="170" stroke="#94a3b8" stroke-width="1.4" />
  <line x1="570" y1="122" x2="450" y2="170" stroke="#94a3b8" stroke-width="1.4" />
  <line x1="610" y1="122" x2="730" y2="170" stroke="#94a3b8" stroke-width="1.4" />
  <line x1="640" y1="122" x2="1010" y2="170" stroke="#94a3b8" stroke-width="1.4" />

  <!-- ====== Branch A: Ingestion ====== -->
  <rect x="40" y="170" width="260" height="40" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8" x="170">Faillites d’ingestion</text>

  <!-- A1: Parse loss -->
  <rect x="40" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="245" font-size="11" font-weight="700" fill="#1d4ed8" x="50">Perte de parsing</text>
  <text y="261" font-size="10" fill="#334155" x="50">fermeture des tables · notes de bas de page</text>
  <text y="275" font-size="10" fill="#334155" x="50">lâché · OCR mélange les chiffres</text>
  <text y="285" font-size="9" font-style="italic" fill="#64748b" x="50">capturé par : CER/WER, TEDS</text>

  <!-- A2: Chunk break -->
  <rect x="40" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="320" font-size="11" font-weight="700" fill="#1d4ed8" x="50">Division en chunks</text>
  <text y="336" font-size="10" fill="#334155" x="50">span de réponse réparti sur deux éléments</text>
  <text y="350" font-size="10" fill="#334155" x="50">champs ; aucun ne dispose de preuves complètes</text>
  <text y="360" font-size="9" font-style="italic" fill="#64748b" x="50">capturé par : la contention answer-span</text>

  <!-- A3: Dedup miss -->
  <rect x="40" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="395" font-size="11" font-weight="700" fill="#1d4ed8" x="50">Erreur de déduplication</text>
  <text y="411" font-size="10" fill="#334155" x="50">False-merge endommage la réponse ;</text>
  <text y="425" font-size="10" fill="#334155" x="50">False-Keep enterre le document correct</text>
  <text y="435" font-size="9" font-style="italic" fill="#64748b" x="50">attrapé par : précision/recouvrement dup</text>

  <!-- A4: Normalization -->
  <rect x="40" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="470" font-size="11" font-weight="700" fill="#1d4ed8" x="50">Dérive de normalisation</text>
  <text y="486" font-size="10" fill="#334155" x="50">Défaillances dues à une incohérence entre NFC et NFKC</text>
  <text y="500" font-size="10" fill="#334155" x="50">résolution d’alias par correspondance exacte</text>
  <text y="510" font-size="9" font-style="italic" fill="#64748b" x="50">détecté par : parité NFC/NFKC, couverture des alias</text>

  <!-- ====== Branch B: Embedding/Index ====== -->
  <rect x="320" y="170" width="260" height="40" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8" x="450">Embedding et index</text>

  <!-- B1: Embedding miss -->
  <rect x="320" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="245" font-size="11" font-weight="700" fill="#1d4ed8" x="330">Embedding manquer</text>
  <text y="261" font-size="10" fill="#334155" x="330">le terme de domaine se trouve à l’extérieur du</text>
  <text y="275" font-size="10" fill="#334155" x="330">distribution d’entraînement du modèle</text>
  <text y="285" font-size="9" font-style="italic" fill="#64748b" x="330">capturé par : domaine Recall@k par rapport à la ligne de base</text>

  <!-- B2: ANN drop -->
  <rect x="320" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="320" font-size="11" font-weight="700" fill="#1d4ed8" x="330">chute d’approximation ANN</text>
  <text y="336" font-size="10" fill="#334155" x="330">HNSW valeur d’efSearch trop basse ; niveau or</text>
  <text y="350" font-size="10" fill="#334155" x="330">le vecteur existe mais n’est pas atteint</text>
  <text y="360" font-size="9" font-style="italic" fill="#64748b" x="330">capturé par : ANN rappel versus modèle plat</text>

  <!-- B3: Embedding drift -->
  <rect x="320" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="395" font-size="11" font-weight="700" fill="#1d4ed8" x="330">Embedding dérive</text>
  <text y="411" font-size="10" fill="#334155" x="330">mise à jour de la version du modèle fournisseur ;</text>
  <text y="425" font-size="10" fill="#334155" x="330">vecteurs anciens non plus alignés</text>
  <text y="435" font-size="9" font-style="italic" fill="#64748b" x="330">détecté par : stabilité du réseau de sondes NN</text>

  <!-- B4: Stale index -->
  <rect x="320" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="470" font-size="11" font-weight="700" fill="#1d4ed8" x="330">Index obsolète</text>
  <text y="486" font-size="10" fill="#334155" x="330">décalage de fraîcheur ; exécution des requêtes</text>
  <text y="500" font-size="10" fill="#334155" x="330">par rapport à la vérité de la semaine dernière</text>
  <text y="510" font-size="9" font-style="italic" fill="#64748b" x="330">détecté par : retard de fraîcheur p99, %-stale</text>

  <!-- ====== Branch C: Online retrieval (HOT — silent killers) ====== -->
  <rect x="600" y="170" width="260" height="40" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2" />
  <text y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b" x="730">Récupération en ligne</text>

  <!-- C1: Filter exclude (highlighted) -->
  <rect x="600" y="225" width="260" height="64" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2" filter="url(#shadowSF)" />
  <text y="245" font-size="11" font-weight="700" fill="#991b1b" x="610">Filtre d’exclusion fausse</text>
  <text y="261" font-size="10" fill="#334155" x="610">Les prédicats stricts suppriment le document or;</text>
  <text y="275" font-size="10" fill="#334155" x="610">Le Recall@k est normal — sur un ensemble vide</text>
  <text y="285" font-size="9" font-style="italic" fill="#991b1b" x="610">capturé par : taux de fausse exclusion du filtre</text>

  <!-- C2: Rerank miss -->
  <rect x="600" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="320" font-size="11" font-weight="700" fill="#991b1b" x="610">Faute de rérankement</text>
  <text y="336" font-size="10" fill="#334155" x="610">le cross-encoder dégrade le flux de droite</text>
  <text y="350" font-size="10" fill="#334155" x="610">document caché derrière des distracteurs plausibles</text>
  <text y="360" font-size="9" font-style="italic" fill="#64748b" x="610">détecté par : ΔnDCG, robustesse aux éléments perturbateurs (RGB)</text>

  <!-- C3: Lost in middle -->
  <rect x="600" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="395" font-size="11" font-weight="700" fill="#991b1b" x="610">Perdu au milieu</text>
  <text y="411" font-size="10" fill="#334155" x="610">gros morceau d’or dans ce contexte</text>
  <text y="425" font-size="10" fill="#334155" x="610">position 7/10 ; le modèle l’ignore</text>
  <text y="435" font-size="9" font-style="italic" fill="#64748b" x="610">capturé par : évaluation stratifiée par position</text>

  <!-- C4: Bad rewrite -->
  <rect x="600" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="470" font-size="11" font-weight="700" fill="#991b1b" x="610">Régression de réécriture des requêtes</text>
  <text y="486" font-size="10" fill="#334155" x="610">HyDE génère une entité qui</text>
  <text y="500" font-size="10" fill="#334155" x="610">incline la récupération dans le mauvais sens</text>
  <text y="510" font-size="9" font-style="italic" fill="#64748b" x="610">capturé par : réécriture du gain/perte A/B</text>

  <!-- ====== Branch D: Generation/Citation ====== -->
  <rect x="880" y="170" width="260" height="40" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" />
  <text y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6" x="1010">Génération</text>

  <!-- D1: Hallucination -->
  <rect x="880" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="245" font-size="11" font-weight="700" fill="#5b21b6" x="890">hallucination</text>
  <text y="261" font-size="10" fill="#334155" x="890">allégation non prise en charge, souvent un</text>
  <text y="275" font-size="10" fill="#334155" x="890">entité hors contexte</text>
  <text y="285" font-size="9" font-style="italic" fill="#64748b" x="890">attrapé par : faithfulness, HHEM, FActScore</text>

  <!-- D2: No citation -->
  <rect x="880" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="320" font-size="11" font-weight="700" fill="#5b21b6" x="890">Théâtre de citation</text>
  <text y="336" font-size="10" fill="#334155" x="890">l’intervalle cité ne correspond pas réellement</text>
  <text y="350" font-size="10" fill="#334155" x="890">valider l’affirmation qui s’y trouve</text>
  <text y="360" font-size="9" font-style="italic" fill="#64748b" x="890">capturé par : précision/rappel de citation (support TREC)</text>

  <!-- D3: Wrong refusal -->
  <rect x="880" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="395" font-size="11" font-weight="700" fill="#5b21b6" x="890">Abstention incorrecte</text>
  <text y="411" font-size="10" fill="#334155" x="890">« Je ne sais pas » lorsque la réponse</text>
  <text y="425" font-size="10" fill="#334155" x="890">se trouve dans le contexte (ou inversement)</text>
  <text y="435" font-size="9" font-style="italic" fill="#64748b" x="890">attrapé par : NoMIRACL, précision d’abstention</text>

  <!-- D4: Schema break -->
  <rect x="880" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="470" font-size="11" font-weight="700" fill="#5b21b6" x="890">Rupture de schéma/vocabulaire</text>
  <text y="486" font-size="10" fill="#334155" x="890">choix de sorties syntaxiquement valides</text>
  <text y="500" font-size="10" fill="#334155" x="890">un identifiant d’ontologie invalide mais valide</text>
  <text y="510" font-size="9" font-style="italic" fill="#64748b" x="890">détecté par : conformité du vocabulaire</text>

  <!-- Footer band -->
  <rect x="40" y="555" width="1100" height="68" rx="8" fill="#f0fdf4" stroke="#ea580c" stroke-width="1.2" />
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="590">Guide de lecture</text>
  <text y="598" text-anchor="middle" font-size="10" fill="#9a3412" x="590">Chaque défaillance reste silencieuse en l’absence de sa métrique associée. La simple mesure de la « justesse de la réponse » ne permet que de constater qu’il y a un problème — sans indiquer où il se situe.</text>
  <text y="614" text-anchor="middle" font-size="10" fill="#9a3412" x="590">La branche rouge (exclusion par filtre, réévaluation manquée, perte intermédiaire, réécriture défectueuse) correspond aux cas où les problèmes les plus graves apparaissent dans les environnements de production RAG ; il convient donc de l’instrumenter en premier.</text>

  <!-- Visual cue: the 'red' propagation -->
  <rect x="40" y="640" width="1100" height="62" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="662" font-size="11" font-weight="600" fill="#0f172a" x="60">La règle de propagation :</text>
  <text y="682" font-size="10" fill="#334155" x="60">Une défaillance du côté gauche représente un plafond de rappel pour l’ensemble des éléments du côté droit. Une analyse insuffisante limite la segmentation en chunks. Une segmentation déficiente à son tour limite la récupération des données.</text>
  <text y="696" font-size="10" fill="#334155" x="60">Capacités de récupération insuffisantes reranking. Génération de capacités reranking défaillante. Les métriques de fidélité ne prennent en compte que le dernier maillon — elles ne permettent pas d’identifier la rupture dans la chaîne.</text>
</svg>
