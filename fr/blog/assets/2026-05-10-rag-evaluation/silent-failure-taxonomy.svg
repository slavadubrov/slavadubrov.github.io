<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 720" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadowSF" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Title -->
  <text x="590" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a2e">Taxonomie des échecs silencieux</text>
  <text x="590" y="54" text-anchor="middle" font-size="12" fill="#666">Chaque mode d’échec est associé à la métrique qui le détecte. Sans la métrique, le bug est invisible.</text>

  <!-- Root -->
  <rect x="475" y="78" width="230" height="44" rx="22" fill="#c62828" filter="url(#shadowSF)" />
  <text x="590" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="white">Échec silencieux (RAG)</text>

  <!-- Trunk: 4 main branches -->
  <line x1="540" y1="122" x2="170" y2="170" stroke="#888" stroke-width="1.4" />
  <line x1="570" y1="122" x2="450" y2="170" stroke="#888" stroke-width="1.4" />
  <line x1="610" y1="122" x2="730" y2="170" stroke="#888" stroke-width="1.4" />
  <line x1="640" y1="122" x2="1010" y2="170" stroke="#888" stroke-width="1.4" />

  <!-- ====== Branch A: Ingestion ====== -->
  <rect x="40" y="170" width="260" height="40" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" />
  <text x="170" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">Échecs d’ingestion</text>

  <!-- A1: Parse loss -->
  <rect x="40" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="50" y="245" font-size="11" font-weight="700" fill="#1565c0">Perte de parsing</text>
  <text x="50" y="261" font-size="10" fill="#444">tableaux écrasés · notes de bas de page</text>
  <text x="50" y="275" font-size="10" fill="#444">supprimées · OCR brouille les chiffres</text>
  <text x="50" y="285" font-size="9" font-style="italic" fill="#888">détecté par : CER/WER, TEDS</text>

  <!-- A2: Chunk break -->
  <rect x="40" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="50" y="320" font-size="11" font-weight="700" fill="#1565c0">Rupture de chunk</text>
  <text x="50" y="336" font-size="10" fill="#444">la réponse est scindée entre deux</text>
  <text x="50" y="350" font-size="10" fill="#444">chunks ; aucun n’a toute la preuve</text>
  <text x="50" y="360" font-size="9" font-style="italic" fill="#888">détecté par : answer-span containment</text>

  <!-- A3: Dedup miss -->
  <rect x="40" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="50" y="395" font-size="11" font-weight="700" fill="#1565c0">Erreur de dédup</text>
  <text x="50" y="411" font-size="10" fill="#444">fausse fusion corrompt la réponse ;</text>
  <text x="50" y="425" font-size="10" fill="#444">fausse conservation enfouit le bon doc</text>
  <text x="50" y="435" font-size="9" font-style="italic" fill="#888">détecté par : précision/rappel dup</text>

  <!-- A4: Normalization -->
  <rect x="40" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="50" y="470" font-size="11" font-weight="700" fill="#1565c0">Dérive de normalisation</text>
  <text x="50" y="486" font-size="10" fill="#444">écart NFC vs NFKC casse la</text>
  <text x="50" y="500" font-size="10" fill="#444">résolution d’alias par correspondance exacte</text>
  <text x="50" y="510" font-size="9" font-style="italic" fill="#888">détecté par : parité NFC/NFKC, couverture alias</text>

  <!-- ====== Branch B: Embedding/Index ====== -->
  <rect x="320" y="170" width="260" height="40" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" />
  <text x="450" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">Embedding et index</text>

  <!-- B1: Embedding miss -->
  <rect x="320" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="330" y="245" font-size="11" font-weight="700" fill="#1565c0">Raté d’embedding</text>
  <text x="330" y="261" font-size="10" fill="#444">un terme métier est hors de la</text>
  <text x="330" y="275" font-size="10" fill="#444">distribution d’entraînement du modèle</text>
  <text x="330" y="285" font-size="9" font-style="italic" fill="#888">détecté par : Recall@k métier vs. baseline</text>

  <!-- B2: ANN drop -->
  <rect x="320" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="330" y="320" font-size="11" font-weight="700" fill="#1565c0">Baisse d’approximation ANN</text>
  <text x="330" y="336" font-size="10" fill="#444">HNSW efSearch trop bas ; le gold</text>
  <text x="330" y="350" font-size="10" fill="#444">vector existe mais n’est pas atteint</text>
  <text x="330" y="360" font-size="9" font-style="italic" fill="#888">détecté par : rappel ANN vs. flat</text>

  <!-- B3: Embedding drift -->
  <rect x="320" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="330" y="395" font-size="11" font-weight="700" fill="#1565c0">Dérive d’embedding</text>
  <text x="330" y="411" font-size="10" fill="#444">changement de version du modèle provider ;</text>
  <text x="330" y="425" font-size="10" fill="#444">anciens vecteurs plus alignés</text>
  <text x="330" y="435" font-size="9" font-style="italic" fill="#888">détecté par : stabilité NN du probe-set</text>

  <!-- B4: Stale index -->
  <rect x="320" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="330" y="470" font-size="11" font-weight="700" fill="#1565c0">Index obsolète</text>
  <text x="330" y="486" font-size="10" fill="#444">retard de fraîcheur ; les requêtes visent</text>
  <text x="330" y="500" font-size="10" fill="#444">la vérité de la semaine dernière</text>
  <text x="330" y="510" font-size="9" font-style="italic" fill="#888">détecté par : freshness lag p99, %-stale</text>

  <!-- ====== Branch C: Online retrieval (HOT — silent killers) ====== -->
  <rect x="600" y="170" width="260" height="40" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="2" />
  <text x="730" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#c62828">Récupération en ligne</text>

  <!-- C1: Filter exclude (highlighted) -->
  <rect x="600" y="225" width="260" height="64" rx="8" fill="#ffebee" stroke="#c62828" stroke-width="2" filter="url(#shadowSF)" />
  <text x="610" y="245" font-size="11" font-weight="700" fill="#c62828">Fausse exclusion de filtre</text>
  <text x="610" y="261" font-size="10" fill="#444">un prédicat strict écarte le doc gold ;</text>
  <text x="610" y="275" font-size="10" fill="#444">Recall@k semble normal — sur un ensemble vide</text>
  <text x="610" y="285" font-size="9" font-style="italic" fill="#c62828">détecté par : taux de fausse exclusion filtre</text>

  <!-- C2: Rerank miss -->
  <rect x="600" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#c62828" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="610" y="320" font-size="11" font-weight="700" fill="#c62828">Raté de rerank</text>
  <text x="610" y="336" font-size="10" fill="#444">le cross-encoder rétrograde le bon</text>
  <text x="610" y="350" font-size="10" fill="#444">doc derrière des distracteurs plausibles</text>
  <text x="610" y="360" font-size="9" font-style="italic" fill="#888">détecté par : ΔnDCG, robustesse aux distracteurs (RGB)</text>

  <!-- C3: Lost in middle -->
  <rect x="600" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#c62828" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="610" y="395" font-size="11" font-weight="700" fill="#c62828">Perdu au milieu</text>
  <text x="610" y="411" font-size="10" fill="#444">le chunk gold est dans le contexte</text>
  <text x="610" y="425" font-size="10" fill="#444">mais en position 7/10 ; le modèle l’ignore</text>
  <text x="610" y="435" font-size="9" font-style="italic" fill="#888">détecté par : eval stratifiée par position</text>

  <!-- C4: Bad rewrite -->
  <rect x="600" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#c62828" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="610" y="470" font-size="11" font-weight="700" fill="#c62828">Régression de reformulation</text>
  <text x="610" y="486" font-size="10" fill="#444">HyDE hallucine une entité qui</text>
  <text x="610" y="500" font-size="10" fill="#444">biaisе la récupération dans le mauvais sens</text>
  <text x="610" y="510" font-size="9" font-style="italic" fill="#888">détecté par : gain/perte de rewrite A/B</text>

  <!-- ====== Branch D: Generation/Citation ====== -->
  <rect x="880" y="170" width="260" height="40" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" />
  <text x="1010" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#6a1b9a">Génération</text>

  <!-- D1: Hallucination -->
  <rect x="880" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="890" y="245" font-size="11" font-weight="700" fill="#6a1b9a">Hallucination</text>
  <text x="890" y="261" font-size="10" fill="#444">affirmation non étayée, souvent une</text>
  <text x="890" y="275" font-size="10" fill="#444">entité absente du contexte</text>
  <text x="890" y="285" font-size="9" font-style="italic" fill="#888">détecté par : faithfulness, HHEM, FActScore</text>

  <!-- D2: No citation -->
  <rect x="880" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="890" y="320" font-size="11" font-weight="700" fill="#6a1b9a">Théâtre de citation</text>
  <text x="890" y="336" font-size="10" fill="#444">le passage cité ne soutient pas</text>
  <text x="890" y="350" font-size="10" fill="#444">vraiment l’affirmation voisine</text>
  <text x="890" y="360" font-size="9" font-style="italic" fill="#888">détecté par : précision/rappel de citation (TREC support)</text>

  <!-- D3: Wrong refusal -->
  <rect x="880" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="890" y="395" font-size="11" font-weight="700" fill="#6a1b9a">Mauvaise abstention</text>
  <text x="890" y="411" font-size="10" fill="#444">« Je ne sais pas » alors que la réponse</text>
  <text x="890" y="425" font-size="10" fill="#444">est dans le contexte (ou inversement)</text>
  <text x="890" y="435" font-size="9" font-style="italic" fill="#888">détecté par : NoMIRACL, exactitude d’abstention</text>

  <!-- D4: Schema break -->
  <rect x="880" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="890" y="470" font-size="11" font-weight="700" fill="#6a1b9a">Rupture schéma/vocab</text>
  <text x="890" y="486" font-size="10" fill="#444">une sortie syntaxiquement valide choisit</text>
  <text x="890" y="500" font-size="10" fill="#444">un ID d’ontologie faux mais valide</text>
  <text x="890" y="510" font-size="9" font-style="italic" fill="#888">détecté par : conformité du vocabulaire</text>

  <!-- Footer band -->
  <rect x="40" y="555" width="1100" height="68" rx="8" fill="#fffde7" stroke="#fbc02d" stroke-width="1.2" />
  <text x="590" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#827717">Guide de lecture</text>
  <text x="590" y="598" text-anchor="middle" font-size="10" fill="#827717">Chaque échec est silencieux sans sa métrique. La seule « justesse de réponse » dit qu’il y a un problème — pas où.</text>
  <text x="590" y="614" text-anchor="middle" font-size="10" fill="#827717">La branche rouge (exclusion filtre, raté rerank, perdu au milieu, mauvaise reformulation) est celle qui fait le plus mal en prod RAG. Instrumentez-la d’abord.</text>

  <!-- Visual cue: the 'red' propagation -->
  <rect x="40" y="640" width="1100" height="62" rx="8" fill="#ffffff" stroke="#cbd5e0" stroke-width="1" />
  <text x="60" y="662" font-size="11" font-weight="600" fill="#1a1a2e">La règle de propagation :</text>
  <text x="60" y="682" font-size="10" fill="#555">Un échec à gauche fixe un plafond de rappel pour tout à droite. Un mauvais parsing plafonne le chunking. Un mauvais chunking plafonne la récupération.</text>
  <text x="60" y="696" font-size="10" fill="#555">Une mauvaise récupération plafonne le reranking. Un mauvais reranking plafonne la génération. Faithfulness ne mesure que le dernier maillon — il ne voit pas la chaîne rompue.</text>
</svg>
