<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 660" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Three places where a RAG system can lose evidence: ingestion, query time, and the answer or production environment" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Trois endroits où un système RAG peut perdre des preuves</title>
  <defs>
    <marker id="arrLayer" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#64748b" />
    </marker>
    <filter id="shadowL" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="1180" height="660" fill="#f8fafc" />

  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a" x="590">Trois endroits où un système RAG peut perdre des preuves</text>
  <text y="56" text-anchor="middle" font-size="12" fill="#64748b" x="590">Ingestion · Temps de requête pipeline · Qualité des réponses et comportement en production</text>

  <!-- =============== Layer 1: Ingestion =============== -->
  <rect x="30" y="80" width="1120" height="160" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowL)" />
  <text y="106" font-size="14" font-weight="700" fill="#1d4ed8" x="55">Couche 1 · Ingestion</text>
  <text y="124" font-size="11" fill="#1d4ed8" x="55">Question : le corpus et l’index ont-ils conservé la source ?</text>

  <!-- Sub-cards -->
  <rect x="55" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="175">Préparation du corpus</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="175">taux de réussite de parsing · CER/WER</text>
  <text y="193" text-anchor="middle" font-size="11" fill="#64748b" x="175">TEDS · couverture des métadonnées</text>
  <text y="208" text-anchor="middle" font-size="11" fill="#64748b" x="175">fraîcheur · déduplication</text>

  <rect x="305" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="425">Chunkage</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="425">contention des spans de réponse</text>
  <text y="193" text-anchor="middle" font-size="11" fill="#64748b" x="425">taux de rupture de frontière</text>
  <text y="208" text-anchor="middle" font-size="11" fill="#64748b" x="425">redondance d’overlap</text>

  <rect x="555" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="675">Embedding · Index</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="675">domaine nDCG@10</text>
  <text y="193" text-anchor="middle" font-size="11" fill="#64748b" x="675">ANN rappel par rapport à la valeur plate</text>
  <text y="208" text-anchor="middle" font-size="11" fill="#64748b" x="675">baseline de dérive</text>

  <rect x="805" y="140" width="320" height="80" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="965">Enrichissement (NER · EL · tags)</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="965">EL F1 · Gestion des valeurs NIL · Couverture des alias</text>
  <text y="193" text-anchor="middle" font-size="11" fill="#64748b" x="965">taux d’orphanat de balises dans un F1 hiérarchique</text>
  <text y="208" text-anchor="middle" font-size="11" fill="#64748b" x="965">valideité du schéma au moment de la publication</text>

  <!-- Arrow down to Layer 2 -->
  <line x1="590" y1="244" x2="590" y2="280" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrLayer)" />
  <text y="265" font-size="11" fill="#64748b" font-style="italic" x="700">fixe le plafond de rappel pour tout ce qui se trouve en dessous</text>

  <!-- =============== Layer 2: Query time =============== -->
  <rect x="30" y="290" width="1120" height="160" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowL)" />
  <text y="316" font-size="14" font-weight="700" fill="#9a3412" x="55">Couche 2 · Temps de requête</text>
  <text y="334" font-size="11" fill="#9a3412" x="55">Question : l’pipeline a-t-il trouvé et assemblé les preuves appropriées ?</text>

  <rect x="55" y="350" width="240" height="80" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="175">Compréhension des requêtes</text>
  <text y="388" text-anchor="middle" font-size="11" fill="#64748b" x="175">réécriture du gain/perte</text>
  <text y="403" text-anchor="middle" font-size="11" fill="#64748b" x="175">précision de routage</text>
  <text y="418" text-anchor="middle" font-size="11" fill="#64748b" x="175">couverture de décomposition</text>

  <rect x="305" y="350" width="240" height="80" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="425">Récupération</text>
  <text y="388" text-anchor="middle" font-size="11" fill="#64748b" x="425">Recall@k · MRR · nDCG · MAP</text>
  <text y="403" text-anchor="middle" font-size="11" fill="#64748b" x="425">précision/rappel dans le contexte</text>
  <text y="418" text-anchor="middle" font-size="11" fill="#64748b" x="425">soulèvement hybride par voie</text>

  <rect x="555" y="350" width="240" height="80" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.6" />
  <text y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b" x="675">Filtrage (zone critique)</text>
  <text y="388" text-anchor="middle" font-size="11" fill="#991b1b" x="675">taux de fausse exclusion du filtre</text>
  <text y="403" text-anchor="middle" font-size="11" fill="#991b1b" x="675">précision/rappel des prédicats</text>
  <text y="418" text-anchor="middle" font-size="11" fill="#991b1b" x="675">retrait d’ombres Δ</text>

  <rect x="805" y="350" width="320" height="80" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="965">Reranking · Assemblage de contexte</text>
  <text y="388" text-anchor="middle" font-size="11" fill="#64748b" x="965">ΔnDCG · ΔMRR par rapport au scénario sans classement supplémentaire</text>
  <text y="403" text-anchor="middle" font-size="11" fill="#64748b" x="965">utilisation du contexte · perte en cours de route</text>
  <text y="418" text-anchor="middle" font-size="11" fill="#64748b" x="965">résilience aux distracteurs (RGB)</text>

  <!-- Arrow down to Layer 3 -->
  <line x1="590" y1="454" x2="590" y2="490" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrLayer)" />
  <text y="475" font-size="11" fill="#64748b" font-style="italic" x="700">alimente le processus de génération en contexte vérifié</text>

  <!-- =============== Layer 3: Answer and production =============== -->
  <rect x="30" y="500" width="1120" height="135" rx="12" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowL)" />
  <text y="526" font-size="14" font-weight="700" fill="#166534" x="55">Niveau 3 · Réponse et production</text>
  <text y="544" font-size="11" fill="#166534" x="55">Question : l’ réponse a-t-elle fait appel aux preuves fournies, et la qualité reste-t-elle stable sous un trafic en temps réel ?</text>

  <rect x="55" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="175">Fidélité</text>
  <text y="595" text-anchor="middle" font-size="11" fill="#64748b" x="175">RAGAS · HHEM · FActScore</text>
  <text y="610" text-anchor="middle" font-size="11" fill="#64748b" x="175">FaithJudge · auto-cohérence</text>

  <rect x="305" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="425">Citations et structure</text>
  <text y="595" text-anchor="middle" font-size="11" fill="#64748b" x="425">précision/recouvrement de citation</text>
  <text y="610" text-anchor="middle" font-size="11" fill="#64748b" x="425">valideité du schéma · conformité du vocabulaire</text>

  <rect x="555" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="675">Signal implicite + explicite</text>
  <text y="595" text-anchor="middle" font-size="11" fill="#64748b" x="675">taux de régénération · durée d’attente · CTR sur les citations</text>
  <text y="610" text-anchor="middle" font-size="11" fill="#64748b" x="675">poignées · étoile · modifications en ligne</text>

  <rect x="805" y="558" width="320" height="68" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="965">Dérive · coût · latence · HITL</text>
  <text y="595" text-anchor="middle" font-size="11" fill="#64748b" x="965">drift de la requête/embedding · latence p95 · $/requête</text>
  <text y="610" text-anchor="middle" font-size="11" fill="#64748b" x="965">évaluation de l’ombre · file d’attente des revues à faible confiance</text>
</svg>
