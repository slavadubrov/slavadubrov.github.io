<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 660" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrLayer" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#555" />
    </marker>
    <filter id="shadowL" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Title -->
  <text x="590" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a2e">La discipline d’évaluation à trois niveaux</text>
  <text x="590" y="54" text-anchor="middle" font-size="12" fill="#666">Corpus et index hors ligne · Recherche et génération en ligne · Vérification post-génération + télémétrie de production</text>

  <!-- =============== Layer 1: Offline =============== -->
  <rect x="30" y="80" width="1120" height="160" rx="12" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowL)" />
  <text x="55" y="106" font-size="14" font-weight="700" fill="#1565c0">Couche 1 · Hors ligne</text>
  <text x="55" y="124" font-size="10" fill="#1565c0">Question : la base de connaissances a-t-elle été préparée correctement ?</text>

  <!-- Sub-cards -->
  <rect x="55" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1" />
  <text x="175" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">Préparation du corpus</text>
  <text x="175" y="178" text-anchor="middle" font-size="10" fill="#555">analyser le taux de réussite · CER/WER</text>
  <text x="175" y="193" text-anchor="middle" font-size="10" fill="#555">TEDS · couverture des métadonnées</text>
  <text x="175" y="208" text-anchor="middle" font-size="10" fill="#555">fraîcheur · suppression des doublons</text>

  <rect x="305" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1" />
  <text x="425" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">Chunkage</text>
  <text x="425" y="178" text-anchor="middle" font-size="10" fill="#555">conteneur d’answer-span</text>
  <text x="425" y="193" text-anchor="middle" font-size="10" fill="#555">taux de rupture de limite</text>
  <text x="425" y="208" text-anchor="middle" font-size="10" fill="#555">redondance d’overlap</text>

  <rect x="555" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1" />
  <text x="675" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">Incorporation · Index</text>
  <text x="675" y="178" text-anchor="middle" font-size="10" fill="#555">domaine nDCG@10</text>
  <text x="675" y="193" text-anchor="middle" font-size="10" fill="#555">Rappel ANN par rapport à la valeur plate</text>
  <text x="675" y="208" text-anchor="middle" font-size="10" fill="#555">ligne de référence de dérive</text>

  <rect x="805" y="140" width="320" height="80" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1" />
  <text x="965" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">Enrichissement (NER · EL · étiquettes)</text>
  <text x="965" y="178" text-anchor="middle" font-size="10" fill="#555">Gestion des valeurs F1 et NIL · couverture des alias</text>
  <text x="965" y="193" text-anchor="middle" font-size="10" fill="#555">taux de tags orphelins dans un F1 hiérarchique</text>
  <text x="965" y="208" text-anchor="middle" font-size="10" fill="#555">vérification de la validité du schéma au moment de la publication</text>

  <!-- Arrow down to Layer 2 -->
  <line x1="590" y1="244" x2="590" y2="280" stroke="#555" stroke-width="1.6" marker-end="url(#arrLayer)" />
  <text x="700" y="265" font-size="10" fill="#888" font-style="italic">fixe le plafond de rappel pour tout ce qui est inférieur</text>

  <!-- =============== Layer 2: Online =============== -->
  <rect x="30" y="290" width="1120" height="160" rx="12" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowL)" />
  <text x="55" y="316" font-size="14" font-weight="700" fill="#e65100">Couche 2 · En ligne (par requête)</text>
  <text x="55" y="334" font-size="10" fill="#e65100">Question : les preuves appropriées ont-elles été trouvées et utilisées pour cette requête ?</text>

  <rect x="55" y="350" width="240" height="80" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1" />
  <text x="175" y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Compréhension de la requête</text>
  <text x="175" y="388" text-anchor="middle" font-size="10" fill="#555">réécriture du gain/perte</text>
  <text x="175" y="403" text-anchor="middle" font-size="10" fill="#555">précision de routage</text>
  <text x="175" y="418" text-anchor="middle" font-size="10" fill="#555">couverture de décomposition</text>

  <rect x="305" y="350" width="240" height="80" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1" />
  <text x="425" y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Récupération</text>
  <text x="425" y="388" text-anchor="middle" font-size="10" fill="#555">Recall@k · MRR · nDCG · MAP</text>
  <text x="425" y="403" text-anchor="middle" font-size="10" fill="#555">précision/retenue dans le contexte</text>
  <text x="425" y="418" text-anchor="middle" font-size="10" fill="#555">système de levage hybride par voie</text>

  <rect x="555" y="350" width="240" height="80" rx="8" fill="#ffebee" stroke="#c62828" stroke-width="1.6" />
  <text x="675" y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#c62828">Filtrage (zone critique)</text>
  <text x="675" y="388" text-anchor="middle" font-size="10" fill="#c62828">taux de faux exclus par filtre</text>
  <text x="675" y="403" text-anchor="middle" font-size="10" fill="#c62828">précision/rappel du prédicat</text>
  <text x="675" y="418" text-anchor="middle" font-size="10" fill="#c62828">retrait d’ombres Δ</text>

  <rect x="805" y="350" width="320" height="80" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1" />
  <text x="965" y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Reclassement · Assemblage du contexte</text>
  <text x="965" y="388" text-anchor="middle" font-size="10" fill="#555">ΔnDCG · ΔMRR par rapport au scénario sans classement supplémentaire</text>
  <text x="965" y="403" text-anchor="middle" font-size="10" fill="#555">utilisation du contexte · perte en cours de route</text>
  <text x="965" y="418" text-anchor="middle" font-size="10" fill="#555">résilience aux éléments perturbateurs (RGB)</text>

  <!-- Arrow down to Layer 3 -->
  <line x1="590" y1="454" x2="590" y2="490" stroke="#555" stroke-width="1.6" marker-end="url(#arrLayer)" />
  <text x="700" y="475" font-size="10" fill="#888" font-style="italic">alimente le contexte vérifié dans le processus de génération</text>

  <!-- =============== Layer 3: Post-gen =============== -->
  <rect x="30" y="500" width="1120" height="135" rx="12" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadowL)" />
  <text x="55" y="526" font-size="14" font-weight="700" fill="#2e7d32">Couche 3 · Télémétrie post-génération et en production</text>
  <text x="55" y="544" font-size="10" fill="#2e7d32">Question : la réponse est-elle fiable, vérifiable et sûre à diffuser — et le restera-t-elle la semaine prochaine ?</text>

  <rect x="55" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="175" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Fidélité</text>
  <text x="175" y="595" text-anchor="middle" font-size="10" fill="#555">RAGAS · HHEM · FActScore</text>
  <text x="175" y="610" text-anchor="middle" font-size="10" fill="#555">FaithJudge · auto-cohérence</text>

  <rect x="305" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="425" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Citations et structure</text>
  <text x="425" y="595" text-anchor="middle" font-size="10" fill="#555">précision/retenue de citation</text>
  <text x="425" y="610" text-anchor="middle" font-size="10" fill="#555">validez du schéma · conformité du vocabulaire</text>

  <rect x="555" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="675" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Signal implicite + explicite</text>
  <text x="675" y="595" text-anchor="middle" font-size="10" fill="#555">taux de régénération · durée d’attente · CTR sur les citations</text>
  <text x="675" y="610" text-anchor="middle" font-size="10" fill="#555">poignées · étoile · modifications en ligne</text>

  <rect x="805" y="558" width="320" height="68" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="965" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Dérive · coût · latence · HITL</text>
  <text x="965" y="595" text-anchor="middle" font-size="10" fill="#555">drift de la requête/du embedding · latence p95 · coût par requête</text>
  <text x="965" y="610" text-anchor="middle" font-size="10" fill="#555">évaluation des ombres · file d’attente des revues à faible confiance</text>
</svg>
