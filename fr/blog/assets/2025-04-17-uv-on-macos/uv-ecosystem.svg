<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Quatre limites de flux de travail UV</title><desc id="desc">Le Python géré, les projets, les scripts et les outils CLI constituent quatre cycles de vie distincts gérés par uv. Les bibliothèques hôtes et les applications restent en dehors de uv, sous la gestion d’un gestionnaire de paquets système.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="650" rx="28" fill="#0f172a" />
  <text x="600" y="64" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Un exécutable, cycles de vie distincts</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(70 140)"><rect width="500" height="180" rx="20" fill="#1d4ed8" /><text x="30" y="47" fill="#93c5fd" font-size="23" font-weight="700">Python géré</text><text x="30" y="86" fill="#93c5fd" font-size="17">uv python installer / verrouiller / lister</text><text x="30" y="123" fill="#93c5fd" font-size="15">distributions d’interpréteurs dans le répertoire des données UV</text><text x="30" y="151" fill="#93c5fd" font-size="15">disponible en même temps que des interpréteurs externes</text></g>
    <g transform="translate(630 140)"><rect width="500" height="180" rx="20" fill="#5b21b6" /><text x="30" y="47" fill="#93c5fd" font-size="23" font-weight="700">Projet</text><text x="30" y="86" fill="#93c5fd" font-size="17">pyproject.toml + uv.lock → environnement virtuel</text><text x="30" y="123" fill="#c4b5fd" font-size="15">déclarations partagées et résolution</text><text x="30" y="151" fill="#c4b5fd" font-size="15">environnement d’installation disposable</text></g>
    <g transform="translate(70 365)"><rect width="500" height="180" rx="20" fill="#9a3412" /><text x="30" y="47" fill="#fdba74" font-size="23" font-weight="700">script PEP 723</text><text x="30" y="86" fill="#fdba74" font-size="17">metadonnées en ligne + verrouillage adjacent optionnel</text><text x="30" y="123" fill="#fdba74" font-size="15">unité de déploiement mon-fichier</text><text x="30" y="151" fill="#fdba74" font-size="15">environnement d’exécution en cache isolé</text></g>
    <g transform="translate(630 365)"><rect width="500" height="180" rx="20" fill="#166534" /><text x="30" y="47" fill="#93c5fd" font-size="23" font-weight="700">outil CLI</text><text x="30" y="86" fill="#93c5fd" font-size="17">cache uvx ou environnement d’outils persistant</text><text x="30" y="123" fill="#93c5fd" font-size="15">isolé des importations de projet</text><text x="30" y="151" fill="#93c5fd" font-size="15">L’exposition du PATH uniquement lorsqu’il est installé intentionnellement</text></g>
    <rect x="250" y="585" width="700" height="42" rx="14" fill="#1e293b" /><text x="600" y="612" text-anchor="middle" fill="#cbd5e1" font-size="16">Homebrew ou macOS conserve toujours le contrôle des applications hôtes et des bibliothèques natives.</text>
  </g>
</svg>
