<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Deux manières d’exécuter un outil</title>
  <desc id="artifact-desc">Deux manières d’exécuter un outil.</desc>
  <defs>
    <filter id="shadow3" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="100%" height="100%" fill="#f8fafc" /><rect width="800" height="380" fill="#0f172a" rx="12" ry="12" />

  <text y="44" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="bold" fill="#f8fafc" text-anchor="middle" x="400">Deux manières d’exécuter un outil</text>
  <text y="70" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#93c5fd" text-anchor="middle" x="400">Exécutez-le une seule fois, ou ajoutez-le à votre PATH.</text>

  <!-- uvx card -->
  <rect x="50" y="100" width="330" height="240" rx="10" fill="#1e293b" stroke="#2563eb" stroke-width="2" filter="url(#shadow3)" />
  <text y="138" font-family="SFMono-Regular, Consolas, monospace" font-size="18" font-weight="bold" fill="#93c5fd" text-anchor="middle" x="215">Vérification de l'orthogonalité UVX.</text>
  <text y="162" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#93c5fd" text-anchor="middle" x="215">Exécution de l’outil UV — éphémère</text>

  <g font-family="Inter, system-ui, sans-serif" font-size="13" fill="#eff6ff">
    <text y="200" x="80">• Environnement temporaire en mémoire cache</text>
    <text y="226" x="80">• Aucun élément n’a été ajouté au PATH</text>
    <text y="252" x="80">• Télécharge toujours la version que vous avez demandée</text>
    <text y="278" x="80">• Idéal pour les pipelines CI et les exécutions ponctuelles</text>
  </g>
  <text y="318" font-family="SFMono-Regular, Consolas, monospace" font-size="12" fill="#86efac" text-anchor="middle" x="215">uvx ruff@0.6.0 / uvx --with click mytool</text>

  <!-- tool install card -->
  <rect x="420" y="100" width="330" height="240" rx="10" fill="#1e293b" stroke="#2563eb" stroke-width="2" filter="url(#shadow3)" />
  <text y="138" font-family="SFMono-Regular, Consolas, monospace" font-size="17" font-weight="bold" fill="#93c5fd" text-anchor="middle" x="585">Installer l’outil UV avec Ruff</text>
  <text y="162" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#93c5fd" text-anchor="middle" x="585">persistent — présent dans votre PATH</text>

  <g font-family="Inter, system-ui, sans-serif" font-size="13" fill="#eff6ff">
    <text y="200" x="450">• Installation unique dans un environnement isolé</text>
    <text y="226" x="450">• Appel direct : il suffit d’utiliser `ruff`</text>
    <text y="252" x="450">• Mise à jour de l’outil UV --all pour mettre à niveau</text>
    <text y="278" x="450">• Idéal pour les outils utilisés au quotidien</text>
  </g>
  <text y="318" font-family="SFMono-Regular, Consolas, monospace" font-size="12" fill="#fdba74" text-anchor="middle" x="585">liste des outils UV / désinstallation d’outil UV ruff</text>
</svg>
