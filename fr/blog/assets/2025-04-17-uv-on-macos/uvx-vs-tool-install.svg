<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 590" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Sélection du mode d’exécution UV, de l’installation UVX ou de l’outil UV</title><desc id="desc">Les trois colonnes acheminent les outils liés aux projets vers uv run, les outils isolés ad hoc vers uvx, et les exécutables qui doivent rester présents dans le PATH vers l’installation de l’outil uv.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="590" rx="28" fill="#0f172a" />
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Sélectionnez un environnement d’outil en fonction de ce qu’il doit percevoir</text>
  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <g transform="translate(55 135)"><rect width="340" height="340" rx="22" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="170" y="52" fill="#93c5fd" font-size="23" font-weight="700">exécution UV</text><text x="170" y="92" fill="#93c5fd" font-size="17">couplé au projet</text><text x="170" y="145" fill="#e2e8f0" font-size="15">importe le code du projet</text><text x="170" y="178" fill="#e2e8f0" font-size="15">utilise des groupes verrouillés et des plugins</text><text x="170" y="211" fill="#e2e8f0" font-size="15">le cycle de vie suit le répertoire</text><rect x="35" y="260" width="270" height="50" rx="12" fill="#1d4ed8" /><text x="170" y="291" fill="#93c5fd" font-size="15">uv run --group test pytest</text></g>
    <g transform="translate(430 135)"><rect width="340" height="340" rx="22" fill="#5b21b6" /><text x="170" y="52" fill="#93c5fd" font-size="23" font-weight="700">uvx</text><text x="170" y="92" fill="#c4b5fd" font-size="17">ad hoc et isolé</text><text x="170" y="145" fill="#e2e8f0" font-size="15">ne détecte pas les importations de projets</text><text x="170" y="178" fill="#e2e8f0" font-size="15">l’environnement est stocké en cache</text><text x="170" y="211" fill="#e2e8f0" font-size="15">version de broche pour la reproductibilité</text><rect x="35" y="260" width="270" height="50" rx="12" fill="#5b21b6" /><text x="170" y="291" fill="#93c5fd" font-size="15">uvx ruff@0.12.0 : vérification en cours.</text></g>
    <g transform="translate(805 135)"><rect width="340" height="340" rx="22" fill="#166534" /><text x="170" y="52" fill="#93c5fd" font-size="23" font-weight="700">installation de l’outil UV</text><text x="170" y="92" fill="#93c5fd" font-size="17">persistent + sur le PATH</text><text x="170" y="145" fill="#e2e8f0" font-size="15">environnement d’outil dédié</text><text x="170" y="178" fill="#e2e8f0" font-size="15">disponible pour d’autres programmes</text><text x="170" y="211" fill="#e2e8f0" font-size="15">cycle de vie d’upgrade explicite</text><rect x="35" y="260" width="270" height="50" rx="12" fill="#166534" /><text x="170" y="291" fill="#86efac" font-size="15">Installer l’outil uv avec la commande ‘ruff==0.12.0’</text></g>
    <rect x="245" y="515" width="710" height="42" rx="14" fill="#1e293b" /><text x="600" y="542" fill="#cbd5e1" font-size="16">L’isolation est une fonctionnalité ; choisissez délibérément la visibilité du projet.</text>
  </g>
</svg>
