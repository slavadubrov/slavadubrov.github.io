<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Structure de projet UV moderne</title>
  <desc id="artifact-desc">Structure de projet UV moderne.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" />
      <feOffset dx="1" dy="1" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>


  <rect width="100%" height="100%" fill="#f8fafc" /><rect width="600" height="400" fill="#0f172a" rx="10" ry="10" />


  <text y="40" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="bold" fill="#f8fafc" text-anchor="middle" x="300">Structure de projet UV moderne</text>


  <g transform="translate(50, 80)">
    <path d="M0,5 L20,5 L25,0 L150,0 L155,5 L200,5 L200,300 L0,300 Z" fill="#1e293b" stroke="#2563eb" stroke-width="2" />
    <text y="25" font-family="SFMono-Regular, Consolas, monospace" font-size="14" fill="#f8fafc" font-weight="bold" x="15">mon-projet/</text>


    <g transform="translate(20, 50)">
      <rect width="160" height="30" rx="4" fill="#2563eb" filter="url(#shadow)" />
      <text y="20" font-family="SFMono-Regular, Consolas, monospace" font-size="12" fill="#93c5fd" x="10">pyproject.toml</text>
      <text y="20" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#93c5fd" x="120">Configuration</text>
    </g>


    <g transform="translate(20, 90)">
      <rect width="160" height="30" rx="4" fill="#2563eb" filter="url(#shadow)" />
      <text y="20" font-family="SFMono-Regular, Consolas, monospace" font-size="12" fill="#fdba74" x="10">uv.lock</text>
      <text y="20" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#93c5fd" x="120">Fichier de verrouillage</text>
    </g>


    <g transform="translate(20, 130)">
      <rect width="160" height="30" rx="4" fill="#2563eb" filter="url(#shadow)" />
      <text y="20" font-family="SFMono-Regular, Consolas, monospace" font-size="12" fill="#fca5a5" x="10">version-python</text>
      <text y="20" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#93c5fd" x="120">Fixé</text>
    </g>


    <g transform="translate(20, 170)">
      <path d="M0,5 L15,5 L20,0 L100,0 L105,5 L160,5 L160,40 L0,40 Z" fill="#1e293b" stroke="#2563eb" stroke-width="1" />
      <text y="25" font-family="SFMono-Regular, Consolas, monospace" font-size="12" fill="#93c5fd" x="10">.venv/</text>
      <text y="25" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#93c5fd" x="120">Environnement</text>
    </g>


    <g transform="translate(20, 220)">
      <path d="M0,5 L15,5 L20,0 L100,0 L105,5 L160,5 L160,40 L0,40 Z" fill="#1e293b" stroke="#2563eb" stroke-width="1" />
      <text y="25" font-family="SFMono-Regular, Consolas, monospace" font-size="12" fill="#93c5fd" x="10">src/</text>
      <text y="25" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#93c5fd" x="120">Code</text>
    </g>
  </g>


  <g transform="translate(280, 80)">

    <text y="65" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd" x="0">Configuration standard et dépendances</text>
    <line x1="-10" y1="60" x2="-30" y2="60" stroke="#2563eb" stroke-width="1" />


    <text y="105" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd" x="0">Versions exactes pour la reproductibilité</text>
    <line x1="-10" y1="100" x2="-30" y2="100" stroke="#ea580c" stroke-width="1" />


    <text y="145" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd" x="0">Assure que l’équipe utilise la même version de Python</text>
    <line x1="-10" y1="140" x2="-30" y2="140" stroke="#dc2626" stroke-width="1" />


    <text y="185" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd" x="0">Environnement isolé (géré automatiquement)</text>
    <line x1="-10" y1="180" x2="-30" y2="180" stroke="#2563eb" stroke-width="1" />
  </g>
