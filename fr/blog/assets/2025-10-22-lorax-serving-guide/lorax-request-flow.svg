<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Client</title>
  <desc id="artifact-desc">Client.</desc>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b" />
    </marker>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>


  <rect width="100%" height="100%" fill="#f8fafc" /><g font-family="Inter, system-ui, sans-serif" font-size="14" text-anchor="middle">
    <rect x="50" y="20" width="100" height="40" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
    <text y="45" fill="#0f172a" x="100">Client</text>
    <line x1="100" y1="60" x2="100" y2="480" stroke="#94a3b8" stroke-dasharray="5,5" />

    <rect x="250" y="20" width="100" height="40" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
    <text y="45" fill="#0f172a" x="300">Planificateur</text>
    <line x1="300" y1="60" x2="300" y2="480" stroke="#94a3b8" stroke-dasharray="5,5" />

    <rect x="450" y="20" width="100" height="40" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
    <text y="45" fill="#0f172a" x="500">Cache</text>
    <line x1="500" y1="60" x2="500" y2="480" stroke="#94a3b8" stroke-dasharray="5,5" />

    <rect x="650" y="20" width="100" height="40" rx="5" fill="#fff7ed" stroke="#ea580c" stroke-width="2" />
    <text y="45" fill="#0f172a" x="700">GPU (de base)</text>
    <line x1="700" y1="60" x2="700" y2="480" stroke="#94a3b8" stroke-dasharray="5,5" />
  </g>


  <g font-family="Inter, system-ui, sans-serif" font-size="12" fill="#1e293b">

    <line x1="100" y1="90" x2="290" y2="90" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />
    <text y="85" text-anchor="middle" x="200">POST /generate (adapter_id: tenant-42)</text>


    <line x1="300" y1="130" x2="490" y2="130" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />
    <text y="125" text-anchor="middle" x="400">Vérifier si l’adaptateur a été chargé</text>


    <rect x="420" y="150" width="360" height="100" fill="#f1f5f9" stroke="#cbd5e1" rx="5" />
    <text y="170" font-weight="bold" fill="#334155" x="430">Alternative : Pas dans la GPU</text>


    <path d="M 500 180 Q 530 180 530 195 Q 530 210 505 210" stroke="#334155" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" />
    <text y="200" x="540">Chargement depuis le CPU/disque</text>


    <line x1="500" y1="230" x2="690" y2="230" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />
    <text y="225" text-anchor="middle" x="600">Injecter les poids LoRA</text>


    <line x1="300" y1="290" x2="690" y2="290" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />
    <text y="285" text-anchor="middle" x="500">Exécuter en lot avec d’autres requêtes</text>


    <path d="M 700 310 Q 730 310 730 325 Q 730 340 705 340" stroke="#334155" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" />
    <text y="330" x="740" transform="translate(-157.75 0.00)">Pass avant avec plusieurs adaptateurs</text>


    <line x1="700" y1="380" x2="310" y2="380" stroke="#334155" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)" />
    <text y="375" text-anchor="middle" x="500">Tokens de flux</text>


    <line x1="300" y1="420" x2="110" y2="420" stroke="#334155" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)" />
    <text y="415" text-anchor="middle" x="200">Réponse diffusée en flux</text>
  </g>
</svg>
