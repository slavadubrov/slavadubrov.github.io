<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Chemin de la requête LoRAX, de la résolution par l’adaptateur à la génération</title>
  <desc id="desc">&lt;EOC_TEXT Une requête authentifiée fournit un identifiant d’adaptateur figurant sur la liste autorisée. LoRAX détermine le lieu de résidence, charge l’adaptateur si nécessaire, regroupe les tâches compatibles, applique l’adaptateur au modèle de base partagé, et transmet les tokens en flux continu. Les identités et les artefacts rejetés suivent une voie d’échec.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="500" rx="22" fill="#0f172a" />
  <text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">chemin de requête LoRAX</text>
  <text x="500" y="77" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#94a3b8">L’identité d’adaptateur est une entrée de routage autorisée, et non une entrée publique arbitraire</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(25 125)"><rect width="150" height="110" rx="14" fill="#1e293b" stroke="#64748b" /><text x="75" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#f8fafc">Passerelle</text><text x="75" y="66" text-anchor="middle" font-size="12" fill="#cbd5e1">authentifier le locataire</text><text x="75" y="87" text-anchor="middle" font-size="12" fill="#94a3b8">adaptateur de liste blanche</text></g>
    <text x="197" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(220 125)"><rect width="165" height="110" rx="14" fill="#5b21b6" stroke="#2563eb" /><text x="82" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#c4b5fd">Résolveur</text><text x="82" y="66" text-anchor="middle" font-size="12" fill="#cbd5e1">vérifier la résidence</text><text x="82" y="87" text-anchor="middle" font-size="12" fill="#94a3b8">charger en l’absence</text></g>
    <text x="407" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(430 125)"><rect width="165" height="110" rx="14" fill="#9a3412" stroke="#ea580c" /><text x="82" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#fdba74">Planificateur</text><text x="82" y="66" text-anchor="middle" font-size="12" fill="#cbd5e1">file d’attente par prêtéreté</text><text x="82" y="87" text-anchor="middle" font-size="12" fill="#94a3b8">former un lot mixte</text></g>
    <text x="617" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(640 125)"><rect width="165" height="110" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="82" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">GPU inférence</text><text x="82" y="66" text-anchor="middle" font-size="12" fill="#cbd5e1">modèle de base partagé</text><text x="82" y="87" text-anchor="middle" font-size="12" fill="#94a3b8">adaptateur par requête</text></g>
    <text x="827" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(850 125)"><rect width="125" height="110" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="62" y="45" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Flux</text><text x="62" y="75" text-anchor="middle" font-size="12" fill="#93c5fd">tokens de sortie</text></g>

    <g transform="translate(220 315)"><rect width="585" height="105" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="292" y="33" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Observer le parcours de résidence pour chaque requête</text><text x="45" y="66" font-size="13" fill="#cbd5e1">GPU de collision</text><text x="160" y="66" font-size="13" fill="#cbd5e1">CPU de collision</text><text x="275" y="66" font-size="13" fill="#cbd5e1">Impact sur l’artefact</text><text x="410" y="66" font-size="13" fill="#cbd5e1">Échec à distance</text><text x="45" y="88" font-size="12" fill="#94a3b8">File d’attente des enregistrements, charge, premier token, latence totale, et raison de l’échec.</text></g>
    <text x="500" y="465" text-anchor="middle" font-size="13" fill="#fca5a5">Adaptateur non autorisé, artefact incompatible ou échec de chargement → rejeter ou utiliser un mécanisme de fallback explicite</text>
  </g>
</svg>
