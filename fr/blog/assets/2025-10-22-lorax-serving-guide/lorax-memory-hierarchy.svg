<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Adapter le stockage des artefacts ainsi que la résidence de runtime dans LoRAX</title>
  <desc id="desc">Les artefacts des adaptateurs distants ou locaux sont stockés dans la mémoire de cache des données, matérialisés en mémoire CPU, et rendus résidents en mémoire GPU à côté du modèle de base partagé. Les flèches représentent des transitions mesurées plutôt que des valeurs de latence fixes.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="500" rx="22" fill="#0f172a" />
  <text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Le stockage des artefacts n’est pas identique à la résidence runtime</text>
  <text x="500" y="78" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#94a3b8">La capacité dépend du jeu de travail actif ainsi que du coût de chaque transition</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(55 125)"><rect width="235" height="210" rx="16" fill="#1e293b" stroke="#64748b" stroke-width="2" /><text x="117" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#e2e8f0">Source de l’artefact</text><text x="28" y="82" font-size="14" fill="#cbd5e1">Hugging Face / registre</text><text x="28" y="113" font-size="14" fill="#cbd5e1">Source d’objet ou de système de fichiers</text><text x="28" y="144" font-size="14" fill="#cbd5e1">Hash de l’intégrité</text><text x="28" y="175" font-size="14" fill="#cbd5e1">Metadata du modèle de base</text></g>
    <text x="320" y="240" text-anchor="middle" font-size="28" fill="#94a3b8">→</text>
    <g transform="translate(350 125)"><rect width="235" height="210" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="117" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#93c5fd">Caché d’artefacts local</text><text x="28" y="82" font-size="14" fill="#cbd5e1">Fichiers d’adaptateur téléchargés</text><text x="28" y="113" font-size="14" fill="#cbd5e1">Monté en /data</text><text x="28" y="144" font-size="14" fill="#cbd5e1">Persistant ou éphémère</text><text x="28" y="175" font-size="14" fill="#cbd5e1">Coût de lecture + de matérialisation</text></g>
    <text x="615" y="240" text-anchor="middle" font-size="28" fill="#94a3b8">→</text>
    <g transform="translate(645 125)"><rect width="300" height="210" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="150" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#93c5fd">Runtime mémoire</text><rect x="28" y="70" width="112" height="105" rx="10" fill="#1d4ed8" /><text x="84" y="101" text-anchor="middle" font-size="14" font-weight="700" fill="#93c5fd">CPU mémoire vive</text><text x="84" y="129" text-anchor="middle" font-size="12" fill="#93c5fd">chargé en dehors du processeur</text><text x="84" y="151" text-anchor="middle" font-size="12" fill="#93c5fd">adaptateurs</text><rect x="160" y="70" width="112" height="105" rx="10" fill="#166534" /><text x="216" y="101" text-anchor="middle" font-size="14" font-weight="700" fill="#86efac">GPU VRAM</text><text x="216" y="129" text-anchor="middle" font-size="12" fill="#86efac">base + active</text><text x="216" y="151" text-anchor="middle" font-size="12" fill="#86efac">adaptateurs + KV</text></g>

    <rect x="135" y="385" width="730" height="58" rx="12" fill="#5b21b6" stroke="#2563eb" />
    <text x="500" y="411" text-anchor="middle" font-size="14" font-weight="700" fill="#c4b5fd">Mesurer chaque transition dans votre charge de travail</text>
    <text x="500" y="432" text-anchor="middle" font-size="12" fill="#93c5fd">Aucune latence fixe du type « disque → RAM → GPU » n’est applicable quel que soit la taille de l’adaptateur, le type de stockage, le réseau ou le matériel.</text>
  </g>
</svg>
