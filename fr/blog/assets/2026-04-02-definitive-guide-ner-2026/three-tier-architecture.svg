<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="a1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1565c0" />
    </marker>
    <marker id="a2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e65100" />
    </marker>
    <marker id="a3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6a1b9a" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a">L’architecture de reconnaissance des entités nommées en production à 3 niveaux</text>

  <!-- Input -->
  <rect x="320" y="48" width="240" height="40" rx="8" fill="#f5f5f5" stroke="#999" stroke-width="1.5" />
  <text x="440" y="73" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Documents entrants</text>

  <!-- Router -->
  <line x1="440" y1="88" x2="440" y2="115" stroke="#666" stroke-width="2" marker-end="url(#a1)" />

  <rect x="330" y="118" width="220" height="40" rx="20" fill="#fff3e0" stroke="#e65100" stroke-width="2" />
  <text x="440" y="143" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">Routeur de complexité</text>

  <!-- Three routing arrows -->
  <line x1="360" y1="158" x2="170" y2="200" stroke="#1565c0" stroke-width="2" marker-end="url(#a1)" />
  <line x1="440" y1="158" x2="440" y2="200" stroke="#e65100" stroke-width="2" marker-end="url(#a2)" />
  <line x1="520" y1="158" x2="710" y2="200" stroke="#6a1b9a" stroke-width="2" marker-end="url(#a3)" />

  <!-- Routing labels -->
  <text x="240" y="182" text-anchor="middle" font-size="10" fill="#1565c0" font-weight="bold">Types d’entités connues (~90%)</text>
  <text x="440" y="190" text-anchor="middle" font-size="10" fill="#e65100" font-weight="bold">Multi-tâche</text>
  <text x="640" y="182" text-anchor="middle" font-size="10" fill="#6a1b9a" font-weight="bold">Exige du raisonnement (~10%)</text>

  <!-- Tier 1 -->
  <rect x="30" y="205" width="280" height="185" rx="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" />
  <text x="170" y="228" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565c0">Niveau 1 : Modèles d’encodage</text>

  <rect x="50" y="238" width="240" height="28" rx="4" fill="white" stroke="#1565c0" stroke-width="1" />
  <text x="170" y="257" text-anchor="middle" font-size="11" fill="#1565c0">Encodeur croisé GLiNER (&lt;30 types)</text>

  <rect x="50" y="272" width="240" height="28" rx="4" fill="white" stroke="#1565c0" stroke-width="1" />
  <text x="170" y="291" text-anchor="middle" font-size="11" fill="#1565c0">Bi-encodeur GLiNER (30+ types)</text>

  <rect x="50" y="306" width="240" height="28" rx="4" fill="white" stroke="#1565c0" stroke-width="1" />
  <text x="170" y="325" text-anchor="middle" font-size="11" fill="#1565c0">ONNX + INT8 / gline-rs</text>

  <rect x="50" y="348" width="115" height="32" rx="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1" />
  <text x="107" y="362" text-anchor="middle" font-size="10" fill="#2e7d32" font-weight="bold">Latence de 50 ms</text>
  <text x="107" y="374" text-anchor="middle" font-size="9" fill="#2e7d32">0,10 $/h par cœur CPU</text>

  <rect x="175" y="348" width="115" height="32" rx="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1" />
  <text x="232" y="362" text-anchor="middle" font-size="10" fill="#2e7d32" font-weight="bold">93,4 % F1</text>
  <text x="232" y="374" text-anchor="middle" font-size="9" fill="#2e7d32">affiné</text>

  <!-- Tier 2 -->
  <rect x="330" y="205" width="220" height="185" rx="10" fill="#fff3e0" stroke="#e65100" stroke-width="2" />
  <text x="440" y="228" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">Niveau 2 : GLiNER 2</text>

  <rect x="345" y="238" width="190" height="28" rx="4" fill="white" stroke="#e65100" stroke-width="1" />
  <text x="440" y="257" text-anchor="middle" font-size="11" fill="#e65100">REER</text>

  <rect x="345" y="272" width="190" height="28" rx="4" fill="white" stroke="#e65100" stroke-width="1" />
  <text x="440" y="291" text-anchor="middle" font-size="11" fill="#e65100">Classification</text>

  <rect x="345" y="306" width="190" height="28" rx="4" fill="white" stroke="#e65100" stroke-width="1" />
  <text x="440" y="325" text-anchor="middle" font-size="11" fill="#e65100">Extraction de relations</text>

  <rect x="345" y="348" width="190" height="32" rx="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1" />
  <text x="440" y="362" text-anchor="middle" font-size="10" fill="#2e7d32" font-weight="bold">130-208 ms (toutes les étiquettes #)</text>
  <text x="440" y="374" text-anchor="middle" font-size="9" fill="#2e7d32">205 M de paramètres, CPU</text>

  <!-- Tier 3 -->
  <rect x="570" y="205" width="280" height="185" rx="10" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" />
  <text x="710" y="228" text-anchor="middle" font-size="14" font-weight="bold" fill="#6a1b9a">Niveau 3 : LLMs</text>

  <rect x="590" y="238" width="240" height="28" rx="4" fill="white" stroke="#6a1b9a" stroke-width="1" />
  <text x="710" y="257" text-anchor="middle" font-size="11" fill="#6a1b9a">Formateur (API cloud)</text>

  <rect x="590" y="272" width="240" height="28" rx="4" fill="white" stroke="#6a1b9a" stroke-width="1" />
  <text x="710" y="291" text-anchor="middle" font-size="11" fill="#6a1b9a">Contours (modèles locaux)</text>

  <rect x="590" y="306" width="240" height="28" rx="4" fill="white" stroke="#6a1b9a" stroke-width="1" />
  <text x="710" y="325" text-anchor="middle" font-size="11" fill="#6a1b9a">Entités implicites, raisonnement</text>

  <rect x="590" y="348" width="115" height="32" rx="4" fill="#fce4ec" stroke="#c62828" stroke-width="1" />
  <text x="647" y="362" text-anchor="middle" font-size="10" fill="#c62828" font-weight="bold">200 ms à 2 s</text>
  <text x="647" y="374" text-anchor="middle" font-size="9" fill="#c62828">GPU à 8 $/heure</text>

  <rect x="715" y="348" width="115" height="32" rx="4" fill="#fce4ec" stroke="#c62828" stroke-width="1" />
  <text x="772" y="362" text-anchor="middle" font-size="10" fill="#c62828" font-weight="bold">Taux de précision de 100 %</text>
  <text x="772" y="374" text-anchor="middle" font-size="9" fill="#c62828">dans les tâches complexes</text>

  <!-- LLM-as-teacher feedback loop -->
  <path d="M 710 390 L 710 440 L 170 440 L 170 390" fill="none" stroke="#2e7d32" stroke-width="2" stroke-dasharray="6" marker-end="url(#a1)" />
  <rect x="340" y="428" width="200" height="24" rx="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1" />
  <text x="440" y="444" text-anchor="middle" font-size="10" fill="#2e7d32" font-weight="bold">Tuyau LLM en tant qu’enseignant</text>

  <!-- Bottom summary -->
  <rect x="130" y="470" width="620" height="40" rx="6" fill="#f5f5f5" stroke="#999" stroke-width="1" />
  <text x="440" y="490" text-anchor="middle" font-size="11" fill="#333">Les LLM de niveau 3 génèrent des données d’entraînement → affinent les encodeurs de niveau 1 → réduction des coûts de 80 fois avec une précision égale ou supérieure</text>
  <text x="440" y="504" text-anchor="middle" font-size="10" fill="#888">Les mêmes modèles de langage grand public qui gèrent les 10 % de tâches les plus difficiles entraînent également les modèles qui s’occupent des 90 % de tâches les plus simples.</text>
</svg>
