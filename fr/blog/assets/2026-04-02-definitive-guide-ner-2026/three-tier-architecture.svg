<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Three-tier NER architecture that routes explicit spans to encoders, multi-task extraction to GLiNER 2, and reasoning-heavy cases to LLMs" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Architecture à trois niveaux NER qui dirige les segments explicites vers des encodeurs, l’extraction multi-tâche vers GLiNER 2, et les cas nécessitant beaucoup de raisonnement vers LLMs</title>
  <defs>
    <marker id="a1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
    <marker id="a2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c" />
    </marker>
    <marker id="a3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text x="440" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">architecture de production à trois niveaux NER</text>

  <!-- Input -->
  <rect x="320" y="48" width="240" height="40" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" />
  <text x="440" y="73" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f172a">Documents entrants</text>

  <!-- Router -->
  <line x1="440" y1="88" x2="440" y2="115" stroke="#94a3b8" stroke-width="2" marker-end="url(#a1)" />

  <rect x="330" y="118" width="220" height="40" rx="20" fill="#fff7ed" stroke="#ea580c" stroke-width="2" />
  <text x="440" y="143" text-anchor="middle" font-size="13" font-weight="bold" fill="#9a3412">Routeur de complexité</text>

  <!-- Three routing arrows -->
  <line x1="360" y1="158" x2="170" y2="200" stroke="#2563eb" stroke-width="2" marker-end="url(#a1)" />
  <line x1="440" y1="158" x2="440" y2="200" stroke="#ea580c" stroke-width="2" marker-end="url(#a2)" />
  <line x1="520" y1="158" x2="710" y2="200" stroke="#7c3aed" stroke-width="2" marker-end="url(#a3)" />

  <!-- Routing labels -->
  <text x="240" y="182" text-anchor="middle" font-size="11" fill="#1d4ed8" font-weight="bold">Spans explicites</text>
  <text x="440" y="190" text-anchor="middle" font-size="11" fill="#9a3412" font-weight="bold">Multi-tâche</text>
  <text x="640" y="182" text-anchor="middle" font-size="11" fill="#5b21b6" font-weight="bold">Inférence ou mappage</text>

  <!-- Tier 1 -->
  <rect x="30" y="205" width="280" height="185" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text x="170" y="228" text-anchor="middle" font-size="14" font-weight="bold" fill="#1d4ed8">Niveau 1 : modèles d’encodage</text>

  <rect x="50" y="238" width="240" height="28" rx="4" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text x="170" y="257" text-anchor="middle" font-size="11" fill="#1d4ed8">Encodeur croisé GLiNER (&lt;30 types)</text>

  <rect x="50" y="272" width="240" height="28" rx="4" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text x="170" y="291" text-anchor="middle" font-size="11" fill="#1d4ed8">bi-encodeur GLiNER (30+ types)</text>

  <rect x="50" y="306" width="240" height="28" rx="4" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text x="170" y="325" text-anchor="middle" font-size="11" fill="#1d4ed8">ONNX + INT8 / gline-rs</text>

  <rect x="50" y="348" width="115" height="32" rx="4" fill="#f0fdf4" stroke="#166534" stroke-width="1" />
  <text x="107" y="362" text-anchor="middle" font-size="11" fill="#166534" font-weight="bold">chemin à faible latence</text>
  <text x="107" y="374" text-anchor="middle" font-size="11" fill="#166534">Benchmark de manière locale</text>

  <rect x="175" y="348" width="115" height="32" rx="4" fill="#f0fdf4" stroke="#166534" stroke-width="1" />
  <text x="232" y="362" text-anchor="middle" font-size="11" fill="#166534" font-weight="bold">F1 spécifique à la tâche</text>
  <text x="232" y="374" text-anchor="middle" font-size="11" fill="#166534">Ensemble étiqueté par des humains</text>

  <!-- Tier 2 -->
  <rect x="330" y="205" width="220" height="185" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2" />
  <text x="440" y="228" text-anchor="middle" font-size="14" font-weight="bold" fill="#9a3412">Niveau 2 : GLiNER 2</text>

  <rect x="345" y="238" width="190" height="28" rx="4" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text x="440" y="257" text-anchor="middle" font-size="11" fill="#9a3412">NER</text>

  <rect x="345" y="272" width="190" height="28" rx="4" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text x="440" y="291" text-anchor="middle" font-size="11" fill="#9a3412">Classification</text>

  <rect x="345" y="306" width="190" height="28" rx="4" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text x="440" y="325" text-anchor="middle" font-size="11" fill="#9a3412">Extraction de relations</text>

  <rect x="345" y="348" width="190" height="32" rx="4" fill="#f0fdf4" stroke="#166534" stroke-width="1" />
  <text x="440" y="362" text-anchor="middle" font-size="11" fill="#166534" font-weight="bold">130-208 ms sur papier</text>
  <text x="440" y="374" text-anchor="middle" font-size="11" fill="#166534">205 M de paramètres, CPU</text>

  <!-- Tier 3 -->
  <rect x="570" y="205" width="280" height="185" rx="10" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" />
  <text x="710" y="228" text-anchor="middle" font-size="14" font-weight="bold" fill="#5b21b6">Niveau 3 : LLMs</text>

  <rect x="590" y="238" width="240" height="28" rx="4" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text x="710" y="257" text-anchor="middle" font-size="11" fill="#5b21b6">Formateur (cloud APIs)</text>

  <rect x="590" y="272" width="240" height="28" rx="4" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text x="710" y="291" text-anchor="middle" font-size="11" fill="#5b21b6">Esquisses (modèles locaux)</text>

  <rect x="590" y="306" width="240" height="28" rx="4" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text x="710" y="325" text-anchor="middle" font-size="11" fill="#5b21b6">Entités implicites, raisonnement</text>

  <rect x="590" y="348" width="115" height="32" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1" />
  <text x="647" y="362" text-anchor="middle" font-size="11" fill="#991b1b" font-weight="bold">API ou modèle local</text>
  <text x="647" y="374" text-anchor="middle" font-size="11" fill="#991b1b">Latence plus élevée</text>

  <rect x="715" y="348" width="115" height="32" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1" />
  <text x="772" y="362" text-anchor="middle" font-size="11" fill="#991b1b" font-weight="bold">chemin de raisonnement</text>
  <text x="772" y="374" text-anchor="middle" font-size="11" fill="#991b1b">Nécessite une évaluation de qualité</text>

  <!-- LLM-as-teacher feedback loop -->
  <path d="M 710 390 L 710 440 L 170 440 L 170 390" fill="none" stroke="#166534" stroke-width="2" stroke-dasharray="6" marker-end="url(#a1)" />
  <rect x="340" y="428" width="200" height="24" rx="4" fill="#f0fdf4" stroke="#166534" stroke-width="1" />
  <text x="440" y="444" text-anchor="middle" font-size="11" fill="#166534" font-weight="bold">LLM en tant qu’enseignant pipeline</text>

  <!-- Bottom summary -->
  <rect x="130" y="470" width="620" height="40" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1" />
  <text x="440" y="490" text-anchor="middle" font-size="11" fill="#0f172a">LLMs étiqueter les données du domaine → revue humaine → affiner les encodeurs de niveau 1</text>
  <text x="440" y="504" text-anchor="middle" font-size="11" fill="#64748b">Ordonner le routage en fonction des exigences des tâches et mesurer la répartition du trafic en environnement de production</text>
</svg>
