<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="Inter, system-ui, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Pipeline LLM en tant qu’enseignant : de 70 $ pour l’étiquetage à 0,10 $/h pour l’inférence</title>
  <desc id="artifact-desc">Pipeline LLM en tant qu’enseignant : de 70 $ pour l’étiquetage à 0,10 $/h pour l’inférence.</desc>
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
    <marker id="arg" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#166534" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a" x="450">Pipeline LLM en tant qu’enseignant : de 70 $ pour l’étiquetage à 0,10 $/h pour l’inférence</text>

  <!-- Step 1: Raw Data -->
  <rect x="20" y="55" width="130" height="80" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" />
  <text y="82" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a" x="85">Données brutes</text>
  <text y="100" text-anchor="middle" font-size="10" fill="#64748b" x="85">Environ 900 000 documents</text>
  <text y="115" text-anchor="middle" font-size="10" fill="#64748b" x="85">Sans étiquette</text>

  <line x1="150" y1="95" x2="180" y2="95" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)" />

  <!-- Step 2: LLM Annotation -->
  <rect x="185" y="55" width="140" height="80" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" />
  <text y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#5b21b6" x="255">Étiquetage de LLM</text>
  <text y="95" text-anchor="middle" font-size="10" fill="#5b21b6" x="255">Llama 3.1-70B</text>
  <text y="110" text-anchor="middle" font-size="10" fill="#5b21b6" x="255">environ 8 heures</text>
  <text y="125" text-anchor="middle" font-size="10" fill="#991b1b" font-weight="bold" x="255">Coût : environ 70 $</text>

  <line x1="325" y1="95" x2="355" y2="95" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)" />

  <!-- Step 3: Human Review -->
  <rect x="360" y="55" width="130" height="80" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2" />
  <text y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#9a3412" x="425">Revue humaine</text>
  <text y="95" text-anchor="middle" font-size="10" fill="#9a3412" x="425">Argile / Label Studio</text>
  <text y="110" text-anchor="middle" font-size="10" fill="#9a3412" x="425">2 714 échantillons</text>
  <text y="125" text-anchor="middle" font-size="10" fill="#9a3412" x="425">environ 8 heures</text>

  <line x1="490" y1="95" x2="520" y2="95" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)" />

  <!-- Step 4: Fine-tune -->
  <rect x="525" y="55" width="140" height="80" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d4ed8" x="595">Ajustement fin</text>
  <text y="95" text-anchor="middle" font-size="10" fill="#1d4ed8" x="595">GLiNER / RoBERTa</text>
  <text y="110" text-anchor="middle" font-size="10" fill="#1d4ed8" x="595">90 à 300 millions de paramètres</text>
  <text y="125" text-anchor="middle" font-size="10" fill="#1d4ed8" x="595">A100, ~4 heures</text>

  <line x1="665" y1="95" x2="695" y2="95" stroke="#166534" stroke-width="2" marker-end="url(#arg)" />

  <!-- Step 5: Deploy -->
  <rect x="700" y="55" width="170" height="80" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="2" />
  <text y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#166534" x="785">Déployer</text>
  <text y="95" text-anchor="middle" font-size="10" fill="#166534" x="785">ONNX + INT8 sur CPU</text>
  <text y="110" text-anchor="middle" font-size="10" fill="#166534" font-weight="bold" x="785">93,4 % F1</text>
  <text y="125" text-anchor="middle" font-size="10" fill="#166534" font-weight="bold" x="785">0,10 $/h</text>

  <!-- Comparison bar: Before -->
  <text y="175" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a" x="450">Comparaison économique (étude de cas CFM)</text>

  <!-- LLM Direct -->
  <rect x="80" y="195" width="740" height="60" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" />
  <text y="218" font-size="12" font-weight="bold" fill="#991b1b" x="100">Inférence directe du LLM</text>
  <text y="238" font-size="11" fill="#991b1b" x="100">Llama 3.1-70b  |  92,7 % F1  |  8 $/h (4 GPU L40S)  |  ~1-2 s par requête</text>

  <!-- Encoder -->
  <rect x="80" y="270" width="740" height="60" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" />
  <text y="293" font-size="12" font-weight="bold" fill="#166534" x="100">Encodage affiné (LLM en tant qu’enseignant)</text>
  <text y="313" font-size="11" fill="#166534" x="100">GLiNER-moyen  |  93,4 % F1  |  0,10 $/h (CPU)  |  &lt;50 ms par requête  |  80 fois moins cher</text>

  <!-- Arrow showing improvement -->
  <text y="355" text-anchor="middle" font-size="13" fill="#166534" font-weight="bold" x="450">Le étudiant dépasse l’enseignant : F1 de +0,7 % à un coût 80 fois inférieur</text>
  <text y="373" text-anchor="middle" font-size="11" fill="#64748b" x="450">Coût total du pipeline : environ 70 $ pour l’étiquetage des LLM + environ 50 $ pour les calculs = investissement unique d’environ 120 $</text>
</svg>
