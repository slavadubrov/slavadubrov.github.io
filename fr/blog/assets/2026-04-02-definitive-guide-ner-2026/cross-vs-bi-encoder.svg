<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" font-family="Inter, system-ui, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Architecture d’encodeur croisé vs architecture d’encodeur binaire</title>
  <desc id="artifact-desc">Architecture d’encodeur croisé vs architecture d’encodeur binaire.</desc>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
    <marker id="arrg" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#166534" />
    </marker>
    <marker id="arrr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a" x="460">Architecture d’encodeur croisé vs architecture d’encodeur binaire</text>

  <!-- LEFT: Cross-Encoder -->
  <rect x="20" y="45" width="420" height="420" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
  <text y="72" text-anchor="middle" font-size="15" font-weight="bold" fill="#1d4ed8" x="230">Encodage croisé (GLiNER original)</text>

  <!-- Input: combined -->
  <rect x="50" y="90" width="360" height="40" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" />
  <text y="114" text-anchor="middle" font-size="11" fill="#1d4ed8" x="230">[ENT] personne [ENT] organisation [SEP] Bill Gates a fondé Microsoft</text>

  <line x1="230" y1="130" x2="230" y2="155" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)" />

  <!-- Single encoder -->
  <rect x="80" y="160" width="300" height="50" rx="8" fill="#2563eb" stroke="#2563eb" stroke-width="2" />
  <text y="183" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="bold" x="230">Encodage DeBERTa unique</text>
  <text y="200" text-anchor="middle" font-size="10" fill="#2563eb" x="230">Attention conjointe sur les étiquettes et le texte</text>

  <line x1="230" y1="210" x2="230" y2="235" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)" />

  <!-- Scoring -->
  <rect x="100" y="240" width="260" height="40" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" />
  <text y="264" text-anchor="middle" font-size="12" fill="#9a3412" font-weight="bold" x="230">Produit scalaire entre la longueur d’arc et le point de l’entité</text>

  <line x1="230" y1="280" x2="230" y2="305" stroke="#166534" stroke-width="2" marker-end="url(#arrg)" />

  <!-- Output -->
  <rect x="110" y="310" width="240" height="35" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" />
  <text y="332" text-anchor="middle" font-size="12" fill="#166534" font-weight="bold" x="230">Prédicitions d’entités</text>

  <!-- Problem callout -->
  <rect x="55" y="365" width="350" height="85" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" />
  <text y="385" text-anchor="middle" font-size="11" font-weight="bold" fill="#991b1b" x="230">Limite de mise à l’échelle</text>
  <text y="402" text-anchor="middle" font-size="10" fill="#991b1b" x="230">Il faut réencoder TOUTES les étiquettes en même temps que le texte.</text>
  <text y="418" text-anchor="middle" font-size="10" fill="#991b1b" x="230">1 024 étiquettes → dégradation de la productivité de 98,7 %</text>
  <text y="434" text-anchor="middle" font-size="10" fill="#991b1b" x="230">Limite pratique : environ 30 types d’entités</text>

  <!-- RIGHT: Bi-Encoder -->
  <rect x="480" y="45" width="420" height="420" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
  <text y="72" text-anchor="middle" font-size="15" font-weight="bold" fill="#166534" x="690">Bi-encodeur GLiNER</text>

  <!-- Two separate inputs -->
  <rect x="500" y="90" width="150" height="40" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" />
  <text y="108" text-anchor="middle" font-size="11" fill="#5b21b6" x="575">personne, organisation, date</text>
  <text y="122" text-anchor="middle" font-size="9" fill="#64748b" x="575">Types d’entités</text>

  <rect x="670" y="90" width="210" height="40" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" />
  <text y="114" text-anchor="middle" font-size="11" fill="#1d4ed8" x="775">Bill Gates a fondé Microsoft.</text>

  <line x1="575" y1="130" x2="575" y2="155" stroke="#7c3aed" stroke-width="2" marker-end="url(#arr)" />
  <line x1="775" y1="130" x2="775" y2="155" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)" />

  <!-- Two separate encoders -->
  <rect x="500" y="160" width="150" height="50" rx="8" fill="#7c3aed" stroke="#5b21b6" stroke-width="2" />
  <text y="183" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold" x="575">Encodage d’étiquettes</text>
  <text y="200" text-anchor="middle" font-size="9" fill="#7c3aed" x="575">BGE / MiniLM</text>

  <rect x="670" y="160" width="210" height="50" rx="8" fill="#2563eb" stroke="#2563eb" stroke-width="2" />
  <text y="183" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold" x="775">Encodage de texte</text>
  <text y="200" text-anchor="middle" font-size="9" fill="#2563eb" x="775">ModernBERT (Ettin)</text>

  <!-- Cache callout -->
  <rect x="500" y="220" width="150" height="25" rx="4" fill="#f0fdf4" stroke="#166534" stroke-width="1" stroke-dasharray="4" />
  <text y="237" text-anchor="middle" font-size="10" fill="#166534" font-weight="bold" x="575">Précalculé + Mémorisé</text>

  <line x1="575" y1="245" x2="640" y2="255" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arr)" />
  <line x1="775" y1="210" x2="720" y2="255" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr)" />

  <!-- Late fusion scoring -->
  <rect x="600" y="255" width="160" height="40" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" />
  <text y="279" text-anchor="middle" font-size="12" fill="#9a3412" font-weight="bold" x="680">Produit scalaire de fusion tardive</text>

  <line x1="680" y1="295" x2="680" y2="315" stroke="#166534" stroke-width="2" marker-end="url(#arrg)" />

  <!-- Output -->
  <rect x="570" y="320" width="240" height="35" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" />
  <text y="342" text-anchor="middle" font-size="12" fill="#166534" font-weight="bold" x="690">Prédicts d’entités</text>

  <!-- Advantage callout -->
  <rect x="510" y="365" width="370" height="85" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" />
  <text y="385" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534" x="695">Avantage de l’échelle</text>
  <text y="402" text-anchor="middle" font-size="10" fill="#166534" x="695">Les étiquettes sont encodées une seule fois et mémorisées indéfiniment.</text>
  <text y="418" text-anchor="middle" font-size="10" fill="#166534" x="695">1 024 étiquettes → seulement une réduction de productivité de 5,2 %</text>
  <text y="434" text-anchor="middle" font-size="10" fill="#166534" x="695">Amélioration de la capacité de traitement de 130 fois à grande échelle</text>

  <!-- VS divider -->
  <text y="260" text-anchor="middle" font-size="20" font-weight="bold" fill="#64748b" x="460">contre</text>
</svg>
