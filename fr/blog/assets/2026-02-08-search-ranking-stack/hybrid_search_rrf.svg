<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 420" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="title">Recherche hybride par fusion de rangs réciproques</title>
  <desc id="desc">BM25 et la récupération dense génèrent des listes de classement distinctes ; la fusion par rang réciproque combine leurs positions sans comparer les scores bruts.</desc>
  <defs>
    <marker id="arrowH" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155" />
    </marker>
    <filter id="shadowH" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="780" height="420" fill="#ffffff" />

  <!-- Title -->
  <text x="390" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Recherche hybride par fusion de rangs réciproques</text>

  <!-- Query -->
  <rect x="310" y="50" width="160" height="40" rx="20" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowH)" />
  <text x="390" y="75" text-anchor="middle" font-size="13" font-weight="600" fill="#5b21b6">Requête utilisateur</text>

  <!-- Arrows from query -->
  <line x1="345" y1="90" x2="180" y2="130" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowH)" />
  <line x1="435" y1="90" x2="600" y2="130" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowH)" />

  <!-- BM25 Sparse Index -->
  <rect x="60" y="133" width="240" height="110" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowH)" />
  <text x="180" y="157" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412">Index épars (BM25)</text>
  <text x="180" y="177" text-anchor="middle" font-size="11" fill="#334155">Recherche dans un index inversé</text>

  <text x="85" y="198" font-size="11" fill="#0f172a">1. Doc-X</text>
  <text x="175" y="198" font-size="10" fill="#64748b">score : 12,5</text>
  <text x="85" y="215" font-size="11" fill="#0f172a">2. Doc-Y</text>
  <text x="175" y="215" font-size="10" fill="#64748b">note : 8,3</text>
  <text x="85" y="232" font-size="11" fill="#0f172a">3. Doc-Z</text>
  <text x="175" y="232" font-size="10" fill="#64748b">score : 7,1</text>

  <!-- Dense Index -->
  <rect x="480" y="133" width="240" height="110" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowH)" />
  <text x="600" y="157" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8">Index dense (HNSW)</text>
  <text x="600" y="177" text-anchor="middle" font-size="11" fill="#334155">ANN Recherche vectorielle</text>

  <text x="505" y="198" font-size="11" fill="#0f172a">1. Doc-Y</text>
  <text x="595" y="198" font-size="10" fill="#64748b">sim : 0.92</text>
  <text x="505" y="215" font-size="11" fill="#0f172a">2. Doc-X</text>
  <text x="595" y="215" font-size="10" fill="#64748b">sim : 0,87</text>
  <text x="505" y="232" font-size="11" fill="#0f172a">3. Doc-W</text>
  <text x="595" y="232" font-size="10" fill="#64748b">sim : 0.81</text>

  <!-- Arrows to RRF -->
  <line x1="180" y1="243" x2="320" y2="290" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowH)" />
  <line x1="600" y1="243" x2="460" y2="290" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowH)" />

  <!-- RRF Fusion Box -->
  <rect x="280" y="280" width="220" height="55" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadowH)" />
  <text x="390" y="303" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">Fusion RRF (k=60)</text>
  <text x="390" y="322" text-anchor="middle" font-size="11" fill="#334155">score(d) = Somme de 1/(k + rang)</text>

  <!-- Arrow to results -->
  <line x1="390" y1="335" x2="390" y2="365" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowH)" />

  <!-- Fused Results -->
  <rect x="220" y="368" width="340" height="42" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowH)" />
  <text x="390" y="393" text-anchor="middle" font-size="11" fill="#0f172a">1. Doc-Y (0,033) · 2. Doc-X (0,033) · 3. Doc-Z (0,016)</text>

  <!-- Callout -->
  <rect x="560" y="280" width="190" height="52" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" stroke-dasharray="3" />
  <text x="570" y="298" font-size="10" fill="#334155">Basé sur le rang, et non sur la note.</text>
  <text x="570" y="313" font-size="10" fill="#334155">Évite de comparer les données brutes</text>
  <text x="570" y="328" font-size="10" fill="#334155">scores comparatifs entre méthodes.</text>

</svg>
