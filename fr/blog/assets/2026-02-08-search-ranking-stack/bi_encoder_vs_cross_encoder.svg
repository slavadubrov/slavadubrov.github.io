<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="title">Comparaison entre bi-encodeur et encodeur croisé</title>
  <desc id="desc">&lt;EOC_TEXT Un bi-encodeur récupère les données à l’aide de vecteurs indépendants, tandis qu’un cross-encodeur évalue conjointement chaque paire requête-document afin de former une liste restreinte.</desc>
  <defs>
    <marker id="arrowBvC" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155" />
    </marker>
    <filter id="shadowBvC" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="800" height="380" fill="#ffffff" />

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Bi-encodeur contre encodeur croisé</text>

  <!-- Left: Bi-Encoder -->
  <rect x="30" y="50" width="350" height="310" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
  <text x="205" y="75" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">Bi-encodeur (retrieval)</text>
  <text x="205" y="93" text-anchor="middle" font-size="11" fill="#334155">Encodage indépendant pour la récupération</text>

  <!-- Query path -->
  <rect x="60" y="115" width="120" height="34" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowBvC)" />
  <text x="120" y="137" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">Requête</text>
  <line x1="120" y1="149" x2="120" y2="172" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowBvC)" />
  <rect x="60" y="175" width="120" height="34" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowBvC)" />
  <text x="120" y="197" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">Encodage</text>
  <line x1="120" y1="209" x2="120" y2="232" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowBvC)" />
  <rect x="55" y="235" width="130" height="28" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1" filter="url(#shadowBvC)" />
  <text x="120" y="254" text-anchor="middle" font-size="11" fill="#1d4ed8">Requête Embedding</text>

  <!-- Doc path -->
  <rect x="230" y="115" width="120" height="34" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.2" filter="url(#shadowBvC)" />
  <text x="290" y="137" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412">Document</text>
  <line x1="290" y1="149" x2="290" y2="172" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowBvC)" />
  <rect x="230" y="175" width="120" height="34" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.2" filter="url(#shadowBvC)" />
  <text x="290" y="197" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">Encodage</text>
  <line x1="290" y1="209" x2="290" y2="232" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowBvC)" />
  <rect x="225" y="235" width="130" height="28" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1" filter="url(#shadowBvC)" />
  <text x="290" y="254" text-anchor="middle" font-size="11" fill="#9a3412">Document Embedding</text>

  <!-- Dot product -->
  <line x1="120" y1="263" x2="180" y2="293" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowBvC)" />
  <line x1="290" y1="263" x2="230" y2="293" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowBvC)" />
  <rect x="160" y="290" width="90" height="30" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1.2" filter="url(#shadowBvC)" />
  <text x="205" y="310" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Produit scalaire</text>
  <text x="205" y="340" text-anchor="middle" font-size="10" fill="#64748b">Encodage d’une requête associé à une recherche vectorielle</text>

  <!-- No cross-attention label -->
  <line x1="180" y1="190" x2="230" y2="190" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4" />
  <text x="205" y="185" text-anchor="middle" font-size="9" fill="#dc2626">Aucune interaction</text>

  <!-- Right: Cross-Encoder -->
  <rect x="420" y="50" width="350" height="310" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
  <text x="595" y="75" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">Encodage croisé (Reranking)</text>
  <text x="595" y="93" text-anchor="middle" font-size="11" fill="#334155">Encodage conjoint pour reranking</text>

  <!-- Concatenated input -->
  <rect x="455" y="115" width="280" height="34" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.2" filter="url(#shadowBvC)" />
  <text x="595" y="137" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b">[CLS] Requête [SEP] Document [SEP]</text>

  <line x1="595" y1="149" x2="595" y2="172" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowBvC)" />

  <!-- Transformer block -->
  <rect x="475" y="175" width="240" height="75" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#shadowBvC)" />
  <text x="595" y="200" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">Transformateur</text>
  <text x="595" y="218" text-anchor="middle" font-size="11" fill="#991b1b">Full Cross-Attention</text>
  <text x="595" y="236" text-anchor="middle" font-size="10" fill="#64748b">Chaque token de requête prend en compte chaque token de document</text>

  <line x1="595" y1="250" x2="595" y2="283" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowBvC)" />

  <!-- Score output -->
  <rect x="530" y="286" width="130" height="34" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1.2" filter="url(#shadowBvC)" />
  <text x="595" y="308" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">Score de pertinence</text>
  <text x="595" y="340" text-anchor="middle" font-size="10" fill="#64748b">Un score de modèle par paire de candidats</text>

</svg>
