<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="title">Une séquence d’expérimentation pour le classement de recherche</title>
  <desc id="desc">Une séquence allant d’une ligne de référence mesurée jusqu’au rappel des candidats, à la précision de classement, à l’adaptation de domaine, ainsi qu’à une couche coûteuse facultative.</desc>
  <defs>
    <marker id="arrowM" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#334155" />
    </marker>
    <filter id="shadowM" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="800" height="260" fill="#ffffff" />

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Séquence d’expérimentation sur le classement des résultats de recherche</text>

  <!-- Connecting arrow line -->
  <line x1="60" y1="120" x2="740" y2="120" stroke="#cbd5e1" stroke-width="3" />

  <!-- Level 1 -->
  <rect x="30" y="60" width="160" height="120" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowM)" />
  <circle cx="110" cy="60" r="14" fill="#2563eb" />
  <text x="110" y="65" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">1</text>
  <text x="110" y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8">ligne de référence</text>
  <text x="110" y="108" text-anchor="middle" font-size="12" fill="#334155">Système lexical</text>
  <text x="110" y="122" text-anchor="middle" font-size="12" fill="#334155">Ensemble de requêtes évaluées</text>
  <text x="110" y="136" text-anchor="middle" font-size="12" fill="#334155">Tranches d'échec</text>
  <text x="110" y="168" text-anchor="middle" font-size="11" fill="#334155">Effort : Faible</text>

  <!-- Arrow -->
  <line x1="195" y1="120" x2="225" y2="120" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowM)" />

  <!-- Level 2 (highlighted - biggest ROI) -->
  <rect x="220" y="55" width="160" height="130" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2.5" filter="url(#shadowM)" />
  <circle cx="300" cy="55" r="14" fill="#ea580c" />
  <text x="300" y="60" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">2</text>
  <text x="300" y="85" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412">Rappel des candidats</text>
  <text x="300" y="103" text-anchor="middle" font-size="12" fill="#334155">Test de récupération dense</text>
  <text x="300" y="117" text-anchor="middle" font-size="12" fill="#334155">Test de fusion</text>
  <text x="300" y="131" text-anchor="middle" font-size="12" fill="#334155">Ajuster la limite de coupure</text>
  <text x="300" y="158" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412">UNiquement en cas d’échec du rappel</text>
  <text x="300" y="173" text-anchor="middle" font-size="11" fill="#334155">Effort : faible à moyen</text>

  <!-- Arrow -->
  <line x1="385" y1="120" x2="415" y2="120" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowM)" />

  <!-- Level 3 -->
  <rect x="410" y="60" width="160" height="120" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#shadowM)" />
  <circle cx="490" cy="60" r="14" fill="#dc2626" />
  <text x="490" y="65" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">3</text>
  <text x="490" y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">Précision de classement</text>
  <text x="490" y="108" text-anchor="middle" font-size="12" fill="#334155">Encodeur croisé de test</text>
  <text x="490" y="122" text-anchor="middle" font-size="12" fill="#334155">Ajuster la taille de la liste de sélection</text>
  <text x="490" y="136" text-anchor="middle" font-size="12" fill="#334155">Mesurer la latence</text>
  <text x="490" y="168" text-anchor="middle" font-size="11" fill="#334155">Effort : Moyen-Haut</text>

  <!-- Arrow -->
  <line x1="575" y1="120" x2="605" y2="120" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowM)" />

  <!-- Level 4 -->
  <rect x="600" y="60" width="170" height="120" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowM)" />
  <circle cx="685" cy="60" r="14" fill="#166534" />
  <text x="685" y="65" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">4</text>
  <text x="685" y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">Layers optionnels</text>
  <text x="685" y="108" text-anchor="middle" font-size="12" fill="#334155">Adaptation de domaine</text>
  <text x="685" y="122" text-anchor="middle" font-size="12" fill="#334155">LLM reranking</text>
  <text x="685" y="136" text-anchor="middle" font-size="12" fill="#334155">Personnalisation</text>
  <text x="685" y="168" text-anchor="middle" font-size="11" fill="#334155">Niveau d’effort : Élevé</text>

  <!-- Bottom label -->
  <text x="400" y="245" text-anchor="middle" font-size="11" fill="#334155">Avancer uniquement lorsque la mesure précédente révèle une défaillance stable.</text>

</svg>
