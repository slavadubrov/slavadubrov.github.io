<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Modèles d’attention : Bi-encodeur contre encodeur croisé</title>
  <desc id="artifact-desc">Modèles d’attention : Bi-encodeur contre encodeur croisé.</desc>
  <defs>
    <marker id="arrowCE" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155" />
    </marker>
    <filter id="shadowCE" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a" x="410">Modèles d’attention : Bi-encodeur contre encodeur croisé</text>
  <text y="48" text-anchor="middle" font-size="12" fill="#334155" x="410">Matrices d’attention diagonales par blocs (indépendantes) versus matrices d’attention complètes (attention croisée)</text>

  <!-- === LEFT: Bi-Encoder Attention === -->
  <rect x="30" y="65" width="360" height="440" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
  <text y="90" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8" x="210">Bi-encodeur</text>

  <!-- Attention matrix -->
  <rect x="80" y="105" width="100" height="100" rx="2" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" />
  <text y="160" text-anchor="middle" font-size="10" font-weight="700" fill="#1d4ed8" x="130">Q-Q</text>
  <text y="173" text-anchor="middle" font-size="9" fill="#1d4ed8" x="130">actif</text>

  <rect x="180" y="105" width="100" height="100" rx="2" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" />
  <text y="155" text-anchor="middle" font-size="18" fill="#64748b" x="230">X</text>
  <text y="173" text-anchor="middle" font-size="9" fill="#64748b" x="230">pas d’interaction</text>

  <rect x="80" y="205" width="100" height="100" rx="2" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" />
  <text y="255" text-anchor="middle" font-size="18" fill="#64748b" x="130">X</text>
  <text y="273" text-anchor="middle" font-size="9" fill="#64748b" x="130">pas d’interaction</text>

  <rect x="180" y="205" width="100" height="100" rx="2" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" />
  <text y="260" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="230">D-D</text>
  <text y="273" text-anchor="middle" font-size="9" fill="#9a3412" x="230">actif</text>

  <!-- Matrix labels -->
  <text y="100" text-anchor="middle" font-size="9" fill="#1d4ed8" x="130">Tokens de requête</text>
  <text y="100" text-anchor="middle" font-size="9" fill="#9a3412" x="230">Tokens de document</text>
  <text y="160" text-anchor="middle" font-size="9" fill="#1d4ed8" x="72" transform="rotate(-90, 72, 160)">Requête</text>
  <text y="260" text-anchor="middle" font-size="9" fill="#9a3412" x="72" transform="rotate(-90, 72, 260)">Dossier</text>

  <!-- Arrow down -->
  <line x1="180" y1="310" x2="180" y2="348" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowCE)" />

  <!-- Bi-Encoder output path -->
  <rect x="80" y="350" width="100" height="30" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1" filter="url(#shadowCE)" />
  <text y="370" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8" x="130">incorporation de q</text>

  <rect x="200" y="350" width="100" height="30" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1" filter="url(#shadowCE)" />
  <text y="370" text-anchor="middle" font-size="10" font-weight="600" fill="#9a3412" x="250">d’incorporation</text>

  <!-- Arrow to dot product -->
  <line x1="155" y1="380" x2="175" y2="410" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowCE)" />
  <line x1="225" y1="380" x2="205" y2="410" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowCE)" />

  <rect x="150" y="413" width="90" height="30" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1.2" filter="url(#shadowCE)" />
  <text y="433" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="195">produit scalaire</text>

  <line x1="195" y1="443" x2="195" y2="468" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowCE)" />
  <text y="485" text-anchor="middle" font-size="11" font-weight="600" fill="#166534" x="195">0,87</text>
  <text y="498" text-anchor="middle" font-size="9" fill="#64748b" x="195">score de similarité</text>

  <!-- === RIGHT: Cross-Encoder Attention === -->
  <rect x="430" y="65" width="360" height="440" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
  <text y="90" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b" x="610">Encodage croisé</text>

  <!-- Full attention matrix -->
  <rect x="480" y="105" width="100" height="100" rx="2" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" />
  <text y="160" text-anchor="middle" font-size="10" font-weight="700" fill="#1d4ed8" x="530">Q-Q</text>
  <text y="173" text-anchor="middle" font-size="9" fill="#1d4ed8" x="530">actif</text>

  <rect x="580" y="105" width="100" height="100" rx="2" fill="#fef2f2" stroke="#dc2626" stroke-width="2" />
  <text y="155" text-anchor="middle" font-size="10" font-weight="700" fill="#991b1b" x="630">Q-D</text>
  <text y="173" text-anchor="middle" font-size="9" fill="#991b1b" x="630">attention croisée</text>

  <rect x="480" y="205" width="100" height="100" rx="2" fill="#fef2f2" stroke="#dc2626" stroke-width="2" />
  <text y="255" text-anchor="middle" font-size="10" font-weight="700" fill="#991b1b" x="530">D-Q</text>
  <text y="273" text-anchor="middle" font-size="9" fill="#991b1b" x="530">attention croisée</text>

  <rect x="580" y="205" width="100" height="100" rx="2" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" />
  <text y="260" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="630">D-D</text>
  <text y="273" text-anchor="middle" font-size="9" fill="#9a3412" x="630">actif</text>

  <!-- Matrix labels -->
  <text y="100" text-anchor="middle" font-size="9" fill="#1d4ed8" x="530">Tokens de requête</text>
  <text y="100" text-anchor="middle" font-size="9" fill="#9a3412" x="630">Tokens de document</text>
  <text y="160" text-anchor="middle" font-size="9" fill="#1d4ed8" x="472" transform="rotate(-90, 472, 160)">Requête</text>
  <text y="260" text-anchor="middle" font-size="9" fill="#9a3412" x="472" transform="rotate(-90, 472, 260)">Dossier</text>

  <!-- Arrow down -->
  <line x1="580" y1="310" x2="580" y2="348" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowCE)" />

  <!-- Cross-Encoder output path -->
  <rect x="520" y="350" width="120" height="30" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1" filter="url(#shadowCE)" />
  <text y="370" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b" x="580">[CLS] état caché</text>

  <!-- Arrow to classification head -->
  <line x1="580" y1="380" x2="580" y2="410" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowCE)" />

  <rect x="520" y="413" width="120" height="30" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.2" filter="url(#shadowCE)" />
  <text y="433" text-anchor="middle" font-size="10" font-weight="600" fill="#9a3412" x="580">Linéaire + Sigmoidale</text>

  <line x1="580" y1="443" x2="580" y2="468" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowCE)" />
  <text y="485" text-anchor="middle" font-size="11" font-weight="600" fill="#166534" x="580">0,94</text>
  <text y="498" text-anchor="middle" font-size="9" fill="#64748b" x="580">score de pertinence</text>

  <!-- Highlight box on cross-attention -->
  <rect x="475" y="100" width="210" height="210" rx="4" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,3" />

</svg>
