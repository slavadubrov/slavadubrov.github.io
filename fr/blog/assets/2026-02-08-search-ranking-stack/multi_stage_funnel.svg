<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Le funil de classement à plusieurs étapes</title>
  <desc id="artifact-desc">Le funil de classement à plusieurs étapes.</desc>
  <defs>
    <marker id="arrowFunnel" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155" />
    </marker>
    <filter id="shadowF" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a" x="400">Le funil de classement à plusieurs étapes</text>

  <!-- Corpus -->
  <rect x="200" y="55" width="400" height="52" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" filter="url(#shadowF)" />
  <text y="77" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a" x="400">Corpus complet</text>
  <text y="95" text-anchor="middle" font-size="11" fill="#334155" x="400">10⁹ à 10¹² documents</text>

  <!-- Arrow -->
  <line x1="400" y1="107" x2="400" y2="130" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowFunnel)" />

  <!-- Stage 1: Retrieval -->
  <rect x="160" y="133" width="480" height="75" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowF)" />
  <text y="155" font-size="11" font-weight="700" fill="#1d4ed8" x="180">ÉTAPE 1 : RÉTROUVAILLE</text>
  <text y="172" font-size="12" font-weight="600" fill="#0f172a" x="180">BM25 + encodeur binaire dense + fusion RRF hybride</text>
  <text y="190" font-size="11" fill="#334155" x="180">Objectif : taux de rappel maximal | Latence : &lt; 50 ms</text>
  <text y="172" text-anchor="end" font-size="20" font-weight="700" fill="#1d4ed8" x="590">10⁴</text>
  <text y="190" text-anchor="end" font-size="10" fill="#1d4ed8" x="590">candidats</text>

  <!-- Arrow -->
  <line x1="400" y1="208" x2="400" y2="231" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowFunnel)" />
  <text y="224" font-size="10" fill="#64748b" x="416">Environ 100 candidats par requête</text>

  <!-- Stage 2: Pre-Ranking -->
  <rect x="180" y="234" width="440" height="68" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowF)" />
  <text y="256" font-size="11" font-weight="700" fill="#9a3412" x="200">ÉTAPE 2 : PRÉ-CLASSEMENT</text>
  <text y="273" font-size="12" font-weight="600" fill="#0f172a" x="200">Modèles à deux tours + fonctionnalités d’interaction</text>
  <text y="289" font-size="11" fill="#334155" x="200">Objectif : Filtrage efficace | Latence : &lt; 100 ms</text>
  <text y="273" text-anchor="end" font-size="20" font-weight="700" fill="#9a3412" x="575">10²-10³</text>
  <text y="289" text-anchor="end" font-size="10" fill="#9a3412" x="575">candidats</text>

  <!-- Arrow -->
  <line x1="400" y1="302" x2="400" y2="325" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowFunnel)" />
  <text y="318" font-size="10" fill="#64748b" x="416">Environ 50 candidats par requête</text>

  <!-- Stage 3: Full Ranking -->
  <rect x="200" y="328" width="400" height="68" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#shadowF)" />
  <text y="350" font-size="11" font-weight="700" fill="#991b1b" x="220">ÉTAPE 3 : CLASSEMENT COMPLET</text>
  <text y="367" font-size="12" font-weight="600" fill="#0f172a" x="220">Encodeurs croisés + Réclassificateurs de LLM</text>
  <text y="383" font-size="11" fill="#334155" x="220">Objectif : Précision maximale | Latence : &lt; 500 ms</text>
  <text y="367" text-anchor="end" font-size="20" font-weight="700" fill="#991b1b" x="560">10¹</text>
  <text y="383" text-anchor="end" font-size="10" fill="#991b1b" x="560">candidats</text>

  <!-- Arrow -->
  <line x1="400" y1="396" x2="400" y2="419" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowFunnel)" />

  <!-- Stage 4: Blending -->
  <rect x="240" y="422" width="320" height="68" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowF)" />
  <text y="444" font-size="11" font-weight="700" fill="#166534" x="260">ÉTAPE 4 : MISE EN COMBINAISON</text>
  <text y="461" font-size="12" font-weight="600" fill="#0f172a" x="260">Diversité + Règles métier</text>
  <text y="477" font-size="11" fill="#334155" x="260">Objectif : Expérience utilisateur | &lt; 20 ms</text>

  <!-- Cost gradient label on right -->
  <text y="145" font-size="10" fill="#64748b" text-anchor="start" x="690">Bas coût</text>
  <text y="160" font-size="10" fill="#64748b" text-anchor="start" x="690">Haute vitesse</text>
  <line x1="680" y1="140" x2="680" y2="385" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4" />
  <text y="380" font-size="10" fill="#64748b" text-anchor="start" x="690">Coût élevé</text>
  <text y="395" font-size="10" fill="#64748b" text-anchor="start" x="690">Haute précision</text>
  <!-- Arrow for gradient -->
  <line x1="680" y1="165" x2="680" y2="370" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arrowFunnel)" />

</svg>
