<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Checkpoint, runtime, ainsi que le flux de travail de sélection de la quantification</title>
  <desc id="desc">Le flux de travail débute par un contrat de tâche, sélectionne un checkpoint présentant une évaluation de haute qualité, vérifie l’existence d’un runtime compatible, mesure la mémoire utilisée, compare les représentations, puis benchmarks l’artefact de déploiement complet.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="480" rx="22" fill="#0f172a" /><text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Sélectionner le comportement avant compression</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(30 120)"><rect width="135" height="120" rx="14" fill="#1e293b" stroke="#64748b" /><text x="67" y="35" text-anchor="middle" font-size="15" font-weight="700" fill="#e2e8f0">1. Contrat de tâche</text><text x="67" y="68" text-anchor="middle" font-size="11" fill="#cbd5e1">qualité • licence</text><text x="67" y="89" text-anchor="middle" font-size="11" fill="#94a3b8">interface • contexte</text></g><text x="180" y="188" font-size="23" fill="#94a3b8">→</text>
    <g transform="translate(205 120)"><rect width="135" height="120" rx="14" fill="#5b21b6" stroke="#2563eb" /><text x="67" y="35" text-anchor="middle" font-size="15" font-weight="700" fill="#c4b5fd">2. Checkpoint</text><text x="67" y="68" text-anchor="middle" font-size="11" fill="#93c5fd">revision exacte</text><text x="67" y="89" text-anchor="middle" font-size="11" fill="#94a3b8">ligne de référence de haute qualité</text></g><text x="355" y="188" font-size="23" fill="#94a3b8">→</text>
    <g transform="translate(380 120)"><rect width="135" height="120" rx="14" fill="#9a3412" stroke="#ea580c" /><text x="67" y="35" text-anchor="middle" font-size="15" font-weight="700" fill="#fdba74">3. Runtime</text><text x="67" y="68" text-anchor="middle" font-size="11" fill="#fdba74">architecture</text><text x="67" y="89" text-anchor="middle" font-size="11" fill="#94a3b8">noyau + matériel</text></g><text x="530" y="188" font-size="23" fill="#94a3b8">→</text>
    <g transform="translate(555 120)"><rect width="135" height="120" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="67" y="35" text-anchor="middle" font-size="15" font-weight="700" fill="#93c5fd">4. Mémoire</text><text x="67" y="68" text-anchor="middle" font-size="11" fill="#93c5fd">poids + KV</text><text x="67" y="89" text-anchor="middle" font-size="11" fill="#94a3b8">espace de travail + marge disponible</text></g><text x="705" y="188" font-size="23" fill="#94a3b8">→</text>
    <g transform="translate(730 120)"><rect width="135" height="120" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="67" y="35" text-anchor="middle" font-size="15" font-weight="700" fill="#93c5fd">5. Représentation</text><text x="67" y="68" text-anchor="middle" font-size="11" fill="#93c5fd">précision / quantification</text><text x="67" y="89" text-anchor="middle" font-size="11" fill="#94a3b8">provenance + hachage</text></g><text x="880" y="188" font-size="23" fill="#94a3b8">→</text>
    <g transform="translate(900 120)"><rect width="75" height="120" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="37" y="35" text-anchor="middle" font-size="13" font-weight="700" fill="#93c5fd">6. Test</text><text x="37" y="68" text-anchor="middle" font-size="10" fill="#93c5fd">lancement</text><text x="37" y="88" text-anchor="middle" font-size="10" fill="#94a3b8">unité</text></g>
    <rect x="150" y="315" width="700" height="80" rx="14" fill="#991b1b" stroke="#dc2626" /><text x="500" y="347" text-anchor="middle" font-size="16" font-weight="700" fill="#fca5a5">Tout échec d’une étape de contrôle ramène à le choix précédent</text><text x="500" y="375" text-anchor="middle" font-size="12" fill="#fca5a5">Un fichier de taille réduite ne constitue pas une version réussie si la qualité, le contexte ou la concurrence présentent des défauts.</text>
    <text x="500" y="444" text-anchor="middle" font-size="13" fill="#94a3b8">Benchmark l’exacte checkpoint, la conversion, runtime, ainsi que le matériel en conjunto.</text>
  </g>
</svg>
