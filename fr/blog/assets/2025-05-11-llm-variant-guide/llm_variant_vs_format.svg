<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Six couches indépendantes dans un artefact de modèle à poids ouverts</title>
  <desc id="desc">Un artefact de modèle est défini par sa famille et sa révision, son rôle d’entraînement, son architecture, sa représentation numérique, son conteneur et son agencement, ainsi que par runtime. Les flèches indiquent que chaque couche impose des contraintes à la suivante sans être équivalente à celle-ci.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="500" rx="22" fill="#0f172a" /><text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Le nom d’un modèle combine plusieurs couches indépendantes</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(30 105)"><rect width="285" height="125" rx="15" fill="#1e293b" stroke="#64748b" /><text x="142" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#e2e8f0">1. Famille + révision</text><text x="142" y="70" text-anchor="middle" font-size="13" fill="#cbd5e1">poids • tokeniseur • licence</text><text x="142" y="96" text-anchor="middle" font-size="12" fill="#94a3b8">répertoire de dépôt + commit</text></g>
    <g transform="translate(357 105)"><rect width="285" height="125" rx="15" fill="#5b21b6" stroke="#2563eb" /><text x="142" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#c4b5fd">2. Rôle d’entraînement</text><text x="142" y="70" text-anchor="middle" font-size="13" fill="#93c5fd">base • instruire • raisonnement • distiller</text><text x="142" y="96" text-anchor="middle" font-size="12" fill="#94a3b8">les étiquettes peuvent se chevaucher</text></g>
    <g transform="translate(685 105)"><rect width="285" height="125" rx="15" fill="#9a3412" stroke="#ea580c" /><text x="142" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#fdba74">3. Architecture</text><text x="142" y="70" text-anchor="middle" font-size="13" fill="#fdba74">dense • MoE • global / actif</text><text x="142" y="96" text-anchor="middle" font-size="12" fill="#94a3b8">compatibilité du noyau</text></g>
    <g transform="translate(30 275)"><rect width="285" height="125" rx="15" fill="#1d4ed8" stroke="#2563eb" /><text x="142" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">4. Représentation numérique</text><text x="142" y="70" text-anchor="middle" font-size="13" fill="#93c5fd">BF16 • FP8 • GPTQ • AWQ</text><text x="142" y="96" text-anchor="middle" font-size="12" fill="#94a3b8">type de données ou méthode de quantification</text></g>
    <g transform="translate(357 275)"><rect width="285" height="125" rx="15" fill="#1d4ed8" stroke="#2563eb" /><text x="142" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">5. Conteneur + mise en page</text><text x="142" y="70" text-anchor="middle" font-size="13" fill="#93c5fd">Shards de Safetensors • GGUF</text><text x="142" y="96" text-anchor="middle" font-size="12" fill="#94a3b8">fichiers + métadonnées</text></g>
    <g transform="translate(685 275)"><rect width="285" height="125" rx="15" fill="#1d4ed8" stroke="#2563eb" /><text x="142" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">6. Runtime + matériel</text><text x="142" y="70" text-anchor="middle" font-size="13" fill="#93c5fd">llama.cpp • vLLM • Transformeurs</text><text x="142" y="96" text-anchor="middle" font-size="12" fill="#94a3b8">chemin d’exécution pris en charge</text></g>
    <text x="500" y="460" text-anchor="middle" font-size="13" fill="#94a3b8">Aucun suffixe en soi ne permet de déterminer la qualité de la tâche, l’adaptation mémoire ou la vitesse de serving.</text>
  </g>
</svg>
