<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Parcours de décision pour un flux de travail d’image locale sous macOS</title>
  <desc id="desc">La prise de décision débute par l’état du flux de travail qui doit être contrôlé, se divise ensuite entre des applications natives, des flux de travail graphiques ou une interface de compatibilité existante, passe par un contrôle de maintenance et de prise en charge des modèles, et se termine par un test d’acceptation représentatif ainsi qu’une unité de version enregistrée.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#64748b" /></marker></defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="720" rx="28" fill="#0f172a" />
  <text x="600" y="60" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Sélectionner selon l’état contrôlé, puis tester</text>

  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <rect x="380" y="100" width="440" height="86" rx="18" fill="#1e293b" stroke="#64748b" stroke-width="2" />
    <text x="600" y="136" fill="#f1f5f9" font-size="21" font-weight="700">Qu’est-ce qui doit rester reproductible ?</text>
    <text x="600" y="165" fill="#94a3b8" font-size="15">interaction, graphe pipeline, ou intégration existante</text>

    <path d="M600 186 V220 M600 220 H205 V252 M600 220 V252 M600 220 H995 V252" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)" />

    <rect x="70" y="265" width="270" height="122" rx="18" fill="#1d4ed8" />
    <text x="205" y="307" fill="#93c5fd" font-size="20" font-weight="700">Interaction native</text>
    <text x="205" y="340" fill="#93c5fd" font-size="16">Dessiner des éléments</text>
    <text x="205" y="365" fill="#93c5fd" font-size="16">DiffusionBee</text>

    <rect x="465" y="265" width="270" height="122" rx="18" fill="#5b21b6" />
    <text x="600" y="307" fill="#93c5fd" font-size="20" font-weight="700">graphe inspectable</text>
    <text x="600" y="346" fill="#93c5fd" font-size="17">ComfyUI</text>

    <rect x="860" y="265" width="270" height="122" rx="18" fill="#9a3412" />
    <text x="995" y="307" fill="#fdba74" font-size="20" font-weight="700">Surface existante</text>
    <text x="995" y="340" fill="#fdba74" font-size="16">AUTOMATIC1111</text>
    <text x="995" y="365" fill="#fdba74" font-size="16">Fooocus</text>

    <path d="M205 387 V435 H600 M600 387 V445 M995 387 V435 H600" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)" />
    <rect x="350" y="458" width="500" height="90" rx="18" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" />
    <text x="600" y="494" fill="#93c5fd" font-size="21" font-weight="700">Portail de support et de maintenance</text>
    <text x="600" y="524" fill="#93c5fd" font-size="15">modèle exact • macOS backend • dépendances • bordure de confiance</text>

    <path d="M600 548 V580" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
    <rect x="190" y="594" width="820" height="82" rx="18" fill="#166534" stroke="#16a34a" stroke-width="2" />
    <text x="600" y="628" fill="#86efac" font-size="21" font-weight="700">Exécuter le cas représentatif le plus exigeant</text>
    <text x="600" y="657" fill="#86efac" font-size="15">mesurer • redémarrer • reproduire • enregistrer l’unité de déploiement</text>
  </g>
</svg>
