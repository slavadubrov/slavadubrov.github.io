<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">ENTRÉE</title>
  <desc id="artifact-desc">ENTRÉE.</desc>
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #2563eb;stop-opacity:1" />
    </linearGradient>
    <filter id="dropShadow" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>


  <rect width="100%" height="100%" fill="#f8fafc" /><rect width="800" height="300" fill="#f8fafc" rx="10" ry="10" />


  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="140" height="100" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" />
    <text y="40" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#334155" x="70">ENTRÉE</text>
    <text y="65" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#334155" x="70">Instruction de texte</text>
    <text y="80" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#334155" x="70">Paramètres</text>
  </g>


  <path d="M190 150 L248 150" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)" />


  <g transform="translate(250, 80)">
    <rect x="0" y="0" width="160" height="140" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
    <text y="30" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1d4ed8" x="80">LE OUTIL</text>
    <text y="50" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#2563eb" x="80">(ComfyUI, A1111, etc.)</text>
    <line x1="20" y1="60" x2="140" y2="60" stroke="#2563eb" stroke-width="1" />
    <text y="80" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#1d4ed8" x="80">Gestion de la logique</text>
    <text y="100" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#1d4ed8" x="80">Chargement des modèles</text>
    <text y="120" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#1d4ed8" x="80">Gère la VRAM</text>
  </g>


  <path d="M410 150 L468 150" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)" />


  <g transform="translate(470, 100)">
    <rect x="0" y="0" width="140" height="100" rx="8" fill="url(#grad1)" />
    <text y="45" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#ffffff" x="70">MOTEUR</text>
    <text y="70" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#ffffff" x="70">Stable Diffusion</text>
    <text y="85" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#ffffff" x="70">(.safetensors)</text>
  </g>


  <path d="M610 150 L668 150" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)" />


  <g transform="translate(670, 100)">
    <rect x="0" y="0" width="100" height="100" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" />
    <rect x="10" y="10" width="80" height="80" rx="4" fill="#f1f5f9" />
    <circle cx="50" cy="50" r="20" fill="#f1f5f9" />
    <path d="M30 70 L50 40 L70 70 Z" fill="#cbd5e1" />
    <text y="120" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#334155" x="50">IMAGE</text>
  </g>
</svg>
