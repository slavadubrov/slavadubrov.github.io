<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Les couches d’un flux de travail d’image locale reproductible</title>
  <desc id="desc">Ces cinq couches interconnectées démontrent que la version de l’application, les composants du modèle, les paramètres de génération, les dépendances du flux de travail et le enregistrement de sortie forment ensemble une unité de déploiement reproductible.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#64748b" /></marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="620" rx="28" fill="#0f172a" />
  <text x="600" y="68" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Un fichier de modèle n’est pas un flux de travail portable</text>
  <text x="600" y="104" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="17">La reproduction nécessite des identités à chaque couche</text>

  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <g transform="translate(45 172)">
      <rect width="190" height="154" rx="18" fill="#1d4ed8" />
      <text x="95" y="48" fill="#93c5fd" font-size="20" font-weight="700">Application</text>
      <text x="95" y="82" fill="#93c5fd" font-size="15">nom + version</text>
      <text x="95" y="110" fill="#93c5fd" font-size="14">backend + précision</text>
    </g>
    <path d="M245 249 H275" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
    <g transform="translate(285 172)">
      <rect width="190" height="154" rx="18" fill="#5b21b6" />
      <text x="95" y="48" fill="#93c5fd" font-size="20" font-weight="700">Composants</text>
      <text x="95" y="82" fill="#93c5fd" font-size="15">checkpoint + VAE</text>
      <text x="95" y="110" fill="#c4b5fd" font-size="14">encodeurs + adaptateurs</text>
    </g>
    <path d="M485 249 H515" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
    <g transform="translate(525 172)">
      <rect width="190" height="154" rx="18" fill="#9a3412" />
      <text x="95" y="48" fill="#fdba74" font-size="20" font-weight="700">Paramètres</text>
      <text x="95" y="82" fill="#fdba74" font-size="15">prompt + graine</text>
      <text x="95" y="110" fill="#fdba74" font-size="14">échantillonneur + dimensions</text>
    </g>
    <path d="M725 249 H755" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
    <g transform="translate(765 172)">
      <rect width="190" height="154" rx="18" fill="#166534" />
      <text x="95" y="48" fill="#93c5fd" font-size="20" font-weight="700">Flux de travail</text>
      <text x="95" y="82" fill="#93c5fd" font-size="15">versions du graphe et des nœuds</text>
      <text x="95" y="110" fill="#93c5fd" font-size="14">scripts et extensions</text>
    </g>
    <path d="M965 249 H995" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
    <g transform="translate(1005 172)">
      <rect width="150" height="154" rx="18" fill="#1d4ed8" />
      <text x="75" y="48" fill="#93c5fd" font-size="20" font-weight="700">Sortie</text>
      <text x="75" y="82" fill="#93c5fd" font-size="15">image + métadonnées</text>
      <text x="75" y="110" fill="#93c5fd" font-size="14">résultat d’acceptation</text>
    </g>
  </g>

  <path d="M600 346 V395" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
  <rect x="205" y="410" width="790" height="128" rx="20" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" />
  <text x="600" y="459" text-anchor="middle" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="23" font-weight="700">Unité de déploiement reproductible</text>
  <text x="600" y="496" text-anchor="middle" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="17">Associez les identités entre elles ; ne conservez pas uniquement l’image finale.</text>
</svg>
