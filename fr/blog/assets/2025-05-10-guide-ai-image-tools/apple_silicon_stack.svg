<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Budget de mémoire partagée pour la diffusion sur Apple Silicon</title>
  <desc id="desc">Une seule barre de mémoire unifiée est répartie entre macOS et les applications, les composants du modèle, les activations ainsi que l’espace de travail, les modèles de contrôle et les adaptateurs, et l’espace mémoire restant. Les paramètres de flux de travail situés en dessous de cette barre permettent de modifier ces répartitions.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="560" rx="28" fill="#0f172a" />
  <text x="600" y="66" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">La mémoire unifiée représente une capacité partagée</text>
  <text x="600" y="102" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="17">Chaque allocation concurrence le système d’exploitation ainsi que le reste du flux de travail</text>

  <g transform="translate(70 170)" font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <path d="M20 0 H1040" stroke="#334155" stroke-width="5" />
    <rect x="0" width="245" height="154" rx="20" fill="#1d4ed8" />
    <text x="122" y="58" fill="#93c5fd" font-size="19" font-weight="700">macOS et applications</text>
    <text x="122" y="92" fill="#93c5fd" font-size="14">changements en cours d'utilisation</text>
    <rect x="235" width="285" height="154" fill="#5b21b6" />
    <text x="377" y="58" fill="#93c5fd" font-size="19" font-weight="700">Composants du modèle</text>
    <text x="377" y="92" fill="#c4b5fd" font-size="14">poids + encodeurs + VAE</text>
    <rect x="520" width="230" height="154" fill="#9a3412" />
    <text x="635" y="58" fill="#fdba74" font-size="19" font-weight="700">Activations</text>
    <text x="635" y="92" fill="#fdba74" font-size="14">attention + espace de travail</text>
    <rect x="750" width="175" height="154" fill="#1d4ed8" />
    <text x="837" y="50" fill="#93c5fd" font-size="18" font-weight="700">Adapteurs +</text>
    <text x="837" y="76" fill="#93c5fd" font-size="18" font-weight="700">contrôles</text>
    <text x="837" y="108" fill="#93c5fd" font-size="14">charge optionnelle</text>
    <rect x="925" width="135" height="154" rx="20" fill="#166534" />
    <text x="992" y="59" fill="#93c5fd" font-size="18" font-weight="700">Marge de manœuvre</text>
    <text x="992" y="92" fill="#93c5fd" font-size="14">éviter le swap</text>
  </g>

  <text x="600" y="388" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700">L’affectation suit le flux de travail</text>
  <g font-family="Inter, system-ui, sans-serif" font-size="16" text-anchor="middle">
    <rect x="115" y="420" width="180" height="66" rx="14" fill="#1e293b" /><text x="205" y="460" fill="#cbd5e1">résolution</text>
    <rect x="315" y="420" width="180" height="66" rx="14" fill="#1e293b" /><text x="405" y="460" fill="#cbd5e1">taille de lot</text>
    <rect x="515" y="420" width="180" height="66" rx="14" fill="#1e293b" /><text x="605" y="460" fill="#cbd5e1">précision</text>
    <rect x="715" y="420" width="180" height="66" rx="14" fill="#1e293b" /><text x="805" y="460" fill="#cbd5e1">architecture</text>
    <rect x="915" y="420" width="180" height="66" rx="14" fill="#1e293b" /><text x="1005" y="460" fill="#cbd5e1">étapes chargées</text>
  </g>
</svg>
