<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="Inter, system-ui, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Le modèle de coexistence</title>
  <desc id="artifact-desc">Le modèle de coexistence.</desc>
  <defs>
    <!-- Arrow marker for regular paths -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
    </marker>
    <!-- Animations -->
    <style>
      .flow { opacity: 0; animation: flowMove 6s infinite; }
      @keyframes flowMove {
        0% { opacity: 0; stroke-dashoffset: 400; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { opacity: 0; stroke-dashoffset: 0; }
      }
      .path-line { stroke-dasharray: 400; }
      .p1 { animation-delay: 0s; stroke: #94a3b8; }
      .p2-top { animation-delay: 2s; stroke: #ea580c; }
      .p2-bot { animation-delay: 2s; stroke: #2563eb; }
    </style>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="900" height="400" rx="12" fill="#f8fafc" stroke="#f8fafc" stroke-width="1" />

  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a" x="450">Le modèle de coexistence</text>
  <text y="52" text-anchor="middle" font-size="13" fill="#334155" x="450">Chaque moteur gère la phase pour laquelle il est le plus performant, reliés par des formats de données ouverts.</text>

  <!-- Node 1: Data Lake -->
  <rect x="50" y="160" width="160" height="130" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text y="195" text-anchor="middle" font-size="15" font-weight="bold" fill="#334155" x="130">Lac de données</text>
  <text y="225" text-anchor="middle" font-size="12" fill="#334155" x="130">Journaux bruts</text>
  <text y="245" text-anchor="middle" font-size="12" fill="#334155" x="130">JSON / CSV</text>
  <text y="265" text-anchor="middle" font-size="12" fill="#334155" x="130">Fichiers non structurés</text>

  <!-- Path 1: Lake -> Spark -->
  <path id="path1" d="M 210 225 L 340 225" fill="none" class="path-line p1 flow" stroke-width="4" marker-end="url(#arrow)" />
  <line x1="210" y1="225" x2="335" y2="225" stroke="#2563eb" stroke-width="3" stroke-dasharray="6,4" />

  <!-- Node 2: Spark / Dask -->
  <rect x="350" y="160" width="180" height="130" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="2" />
  <text y="195" text-anchor="middle" font-size="15" font-weight="bold" fill="#334155" x="440">Spark / Dask</text>
  <text y="225" text-anchor="middle" font-size="12" fill="#334155" x="440">ETL intensif et nettoyage des données</text>
  <text y="245" text-anchor="middle" font-size="12" fill="#334155" x="440">Jointures multi-TB</text>
  <rect x="390" y="260" width="100" height="20" rx="4" fill="#334155" />
  <text y="274" text-anchor="middle" font-size="10" fill="#ffffff" x="440">Sorties : Parquet / Delta</text>

  <!-- Path 2 Top: Spark -> Ray/Daft -->
  <path id="path2top" d="M 530 195 C 600 195, 600 135, 660 135" fill="none" class="path-line p2-top flow" stroke-width="4" marker-end="url(#arrow)" />
  <path d="M 530 195 C 600 195, 600 135, 655 135" fill="none" stroke="#ea580c" stroke-width="3" stroke-dasharray="6,4" />

  <rect x="535" y="140" width="100" height="24" rx="4" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="156" text-anchor="middle" font-size="10" font-weight="bold" fill="#9a3412" x="585">Parquet / Delta</text>

  <!-- Node 3 Top: Ray / Daft -->
  <rect x="670" y="70" width="180" height="130" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2" />
  <text y="105" text-anchor="middle" font-size="15" font-weight="bold" fill="#9a3412" x="760">Rayon / Daft</text>
  <text y="135" text-anchor="middle" font-size="12" fill="#334155" x="760">Traitement GPU de dernière étape</text>
  <text y="155" text-anchor="middle" font-size="12" fill="#334155" x="760">Inference multimodale</text>
  <text y="175" text-anchor="middle" font-size="12" fill="#334155" x="760">Entraînement du ML</text>

  <!-- Path 2 Bottom: Spark -> Polars/DuckDB -->
  <path id="path2bot" d="M 530 255 C 600 255, 600 315, 660 315" fill="none" class="path-line p2-bot flow" stroke-width="4" marker-end="url(#arrow)" />
  <path d="M 530 255 C 600 255, 600 315, 655 315" fill="none" stroke="#2563eb" stroke-width="3" stroke-dasharray="6,4" />

  <rect x="535" y="286" width="100" height="24" rx="4" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="302" text-anchor="middle" font-size="10" font-weight="bold" fill="#1d4ed8" x="585">Parquet / Delta</text>

  <!-- Node 3 Bottom: Polars / DuckDB -->
  <rect x="670" y="250" width="180" height="130" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text y="285" text-anchor="middle" font-size="15" font-weight="bold" fill="#1d4ed8" x="760">Polars / DuckDB</text>
  <text y="315" text-anchor="middle" font-size="12" fill="#334155" x="760">Analyse ad hoc</text>
  <text y="335" text-anchor="middle" font-size="12" fill="#334155" x="760">Développement local et analyse de données</text>
  <text y="355" text-anchor="middle" font-size="12" fill="#334155" x="760">Consultes instantanées</text>

</svg>
