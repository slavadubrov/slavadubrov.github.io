<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 250" font-family="Inter, system-ui, sans-serif" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="title">Résultats benchmark à nœud unique</title>
  <desc id="desc">Résultats de chronométrage pour la requête taxi de l’article benchmark sur Pandas, Polars, DataFusion, Daft et Polars-rs.</desc>
  <defs>
    <style>
      .bar { transform-origin: left; }
      .bar-text { font-size: 12px; fill: #334155; font-weight: bold; }
      @keyframes scaleIn { from { transform: scaleX(0); opacity: 1; } to { transform: scaleX(1); opacity: 1; } }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      .g-pandas .bar { fill: #dc2626; animation-delay: 0.1s; } .g-pandas .bar-text { animation-delay: 1.1s; }
      .g-polars .bar { fill: #2563eb; animation-delay: 0.2s; } .g-polars .bar-text { animation-delay: 1.2s; }
      .g-datafusion .bar { fill: #7c3aed; animation-delay: 0.3s; } .g-datafusion .bar-text { animation-delay: 1.3s; }
      .g-daft .bar { fill: #ea580c; animation-delay: 0.4s; } .g-daft .bar-text { animation-delay: 1.4s; }
      .g-rust .bar { fill: #16a34a; animation-delay: 0.5s; } .g-rust .bar-text { animation-delay: 1.5s; }
      .axis-label { font-size: 13px; font-weight: bold; fill: #0f172a; text-anchor: end; }
    </style>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="900" height="250" rx="12" fill="#f8fafc" stroke="#f8fafc" stroke-width="1" />
  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">Performance tabulaire à nœud unique</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#334155">Durée d’exécution en secondes (plus bas est mieux) | ~41 millions de trajets de taxis jaunes à New York</text>

  <!-- Legend -->
  <g transform="translate(180, 80)">
    <rect x="0" y="0" width="16" height="16" rx="3" fill="#dc2626" /><text x="24" y="12" font-size="13" fill="#0f172a">Pandas</text>
    <rect x="100" y="0" width="16" height="16" rx="3" fill="#2563eb" /><text x="124" y="12" font-size="13" fill="#0f172a">Polars</text>
    <rect x="190" y="0" width="16" height="16" rx="3" fill="#7c3aed" /><text x="214" y="12" font-size="13" fill="#0f172a">Fusion de données</text>
    <rect x="310" y="0" width="16" height="16" rx="3" fill="#ea580c" /><text x="334" y="12" font-size="13" fill="#0f172a">Insensé</text>
    <rect x="390" y="0" width="16" height="16" rx="3" fill="#16a34a" /><text x="414" y="12" font-size="13" fill="#0f172a">Polars-rs (Rust)</text>
  </g>

  <!-- Chart Area -->
  <g transform="translate(150, 130)">
    <!-- Base Grid X -->
    <line x1="0" y1="0" x2="0" y2="80" stroke="#cbd5e1" stroke-width="2" />
    <line x1="0" y1="80" x2="650" y2="80" stroke="#cbd5e1" stroke-width="2" />
    <text x="0" y="100" text-anchor="middle" font-size="11" fill="#334155">0,0 s</text>
    <line x1="150" y1="0" x2="150" y2="80" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4" /><text x="150" y="100" text-anchor="middle" font-size="11" fill="#334155">1,0 s</text>
    <line x1="300" y1="0" x2="300" y2="80" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4" /><text x="300" y="100" text-anchor="middle" font-size="11" fill="#334155">2,0 s</text>
    <line x1="450" y1="0" x2="450" y2="80" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4" /><text x="450" y="100" text-anchor="middle" font-size="11" fill="#334155">3,0 s</text>
    <line x1="600" y1="0" x2="600" y2="80" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4" /><text x="600" y="100" text-anchor="middle" font-size="11" fill="#334155">4,0 s</text>

    <!-- Row 1: ETL Pipeline -->
    <text x="-15" y="40" class="axis-label">ETL Pipeline</text>
    <g transform="translate(0, 5)">
      <g class="g-pandas"><rect class="bar" x="0" y="0" width="475" height="10" /><text class="bar-text" x="480" y="9">3,17 s</text></g>
      <g class="g-polars"><rect class="bar" x="0" y="14" width="117" height="10" /><text class="bar-text" x="122" y="23">0,78 s</text></g>
      <g class="g-datafusion"><rect class="bar" x="0" y="28" width="73" height="10" /><text class="bar-text" x="78" y="37">0,49 s</text></g>
      <g class="g-daft"><rect class="bar" x="0" y="42" width="169" height="10" /><text class="bar-text" x="174" y="51">1,13 s</text></g>
      <g class="g-rust"><rect class="bar" x="0" y="56" width="81" height="10" /><text class="bar-text" x="86" y="65">0,54 s</text></g>
    </g>
  </g>
</svg>
