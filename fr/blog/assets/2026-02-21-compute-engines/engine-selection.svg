<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Inter, system-ui, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Le paysage des données</title>
  <desc id="artifact-desc">Le paysage des données.</desc>
  <defs>
    <!-- Background Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#cbd5e1" />
    </pattern>

    <!-- Fading Mask for Grid -->
    <radialGradient id="grid-fade" cx="50%" cy="50%" r="70%">
      <stop offset="20%" stop-color="#e2e8f0" stop-opacity="1" />
      <stop offset="100%" stop-color="#e2e8f0" stop-opacity="0" />
    </radialGradient>
    <mask id="fade-mask">
      <rect width="900" height="480" fill="#f8fafc" />
    </mask>

    <!-- Card Gradients -->
    <linearGradient id="grad-bl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0" />
      <stop offset="100%" stop-color="#93c5fd" />
    </linearGradient>

    <linearGradient id="grad-br" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0" />
      <stop offset="100%" stop-color="#93c5fd" />
    </linearGradient>

    <linearGradient id="grad-tl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0" />
      <stop offset="100%" stop-color="#c4b5fd" />
    </linearGradient>

    <linearGradient id="grad-tr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0" />
      <stop offset="100%" stop-color="#fdba74" />
    </linearGradient>

    <linearGradient id="axis-grad-x" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#cbd5e1" />
      <stop offset="80%" stop-color="#94a3b8" />
      <stop offset="100%" stop-color="#94a3b8" />
    </linearGradient>

    <linearGradient id="axis-grad-y" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#cbd5e1" />
      <stop offset="80%" stop-color="#94a3b8" />
      <stop offset="100%" stop-color="#94a3b8" />
    </linearGradient>

    <!-- Card Shadow -->
    <filter id="card-shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#334155" flood-opacity="0.08" />
    </filter>

    <!-- Floating Animations -->
    <style>
      .card-float {
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        cursor: pointer;
      }
      .card-float:hover {
        transform: scale(1.05) translateY(-5px);
      }

      .c-bl { animation: float-1 5s ease-in-out infinite; transform-origin: 290px 330px; }
      .c-br { animation: float-2 6s ease-in-out infinite; transform-origin: 640px 330px; }
      .c-tl { animation: float-3 5.5s ease-in-out infinite; transform-origin: 290px 145px; }
      .c-tr { animation: float-4 6.5s ease-in-out infinite; transform-origin: 640px 145px; }

      @keyframes float-1 { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
      @keyframes float-2 { 0%, 100% { transform: translateY(-4px); } 50% { transform: translateY(4px); } }
      @keyframes float-3 { 0%, 100% { transform: translateY(3px); } 50% { transform: translateY(-5px); } }
      @keyframes float-4 { 0%, 100% { transform: translateY(-2px); } 50% { transform: translateY(6px); } }

      /* Overriding animation on hover requires high specificity or wrapping, we rely on the transition */
      .card-float:hover { animation-play-state: paused; }
    </style>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="900" height="480" rx="12" fill="#f8fafc" stroke="#f8fafc" stroke-width="1" />
  <rect width="900" height="480" rx="12" fill="#f8fafc" mask="url(#fade-mask)" />

  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a" x="450">Le paysage des données</text>

  <!-- Y-Axis (Complexity) -->
  <line x1="120" y1="430" x2="120" y2="40" stroke="#94a3b8" stroke-width="2" />
  <polygon points="115,48 120,38 125,48" fill="#94a3b8" />

  <text y="235" text-anchor="middle" font-size="14" font-weight="bold" fill="#334155" x="25" transform="rotate(-90 25 235)">Complexité du pipeline</text>

  <text y="390" text-anchor="end" font-size="12" fill="#334155" x="105">Tabulaire</text>
  <text y="235" text-anchor="end" font-size="12" fill="#334155" x="105">Types mixtes</text>
  <text y="80" text-anchor="end" font-size="12" fill="#334155" x="105">Multimodal</text>

  <line x1="115" y1="386" x2="125" y2="386" stroke="#94a3b8" stroke-width="2" />
  <line x1="115" y1="231" x2="125" y2="231" stroke="#94a3b8" stroke-width="2" />
  <line x1="115" y1="76" x2="125" y2="76" stroke="#94a3b8" stroke-width="2" />

  <!-- X-Axis (Volume) -->
  <line x1="120" y1="430" x2="860" y2="430" stroke="#94a3b8" stroke-width="2" />
  <polygon points="852,425 862,430 852,435" fill="#94a3b8" />

  <text y="470" text-anchor="middle" font-size="14" font-weight="bold" fill="#334155" x="490">Volume de données</text>

  <text y="452" text-anchor="middle" font-size="12" fill="#334155" x="210">Mégaoctets</text>
  <text y="452" text-anchor="middle" font-size="12" fill="#334155" x="380">Gigaoctets</text>
  <text y="452" text-anchor="middle" font-size="12" fill="#334155" x="560">Téraoctets</text>
  <text y="452" text-anchor="middle" font-size="12" fill="#334155" x="740">Pétaoctets</text>

  <line x1="210" y1="425" x2="210" y2="435" stroke="#94a3b8" stroke-width="2" />
  <line x1="380" y1="425" x2="380" y2="435" stroke="#94a3b8" stroke-width="2" />
  <line x1="560" y1="425" x2="560" y2="435" stroke="#94a3b8" stroke-width="2" />
  <line x1="740" y1="425" x2="740" y2="435" stroke="#94a3b8" stroke-width="2" />

  <!-- CARD: Bottom-Left = Polars/DuckDB -->
  <g class="card-float c-bl">
    <rect x="150" y="270" width="280" height="120" rx="16" fill="url(#grad-bl)" stroke="#2563eb" stroke-width="1.5" filter="url(#card-shadow)" />

    <!-- Decorative badge -->
    <rect x="170" y="255" width="85" height="22" rx="11" fill="#2563eb" />
    <text y="270" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff" x="212">Vitesse &gt; Échelle</text>

    <text y="315" text-anchor="middle" font-size="18" font-weight="bold" fill="#1d4ed8" x="290">Polars / DuckDB</text>
    <text y="340" text-anchor="middle" font-size="12" fill="#334155" x="290">Données tabulaires à un seul nœud</text>
    <text y="360" text-anchor="middle" font-size="12" fill="#334155" x="290">EDA ad hoc ultra-rapide</text>
  </g>

  <!-- CARD: Bottom-Right = Spark/Dask -->
  <g class="card-float c-br">
    <rect x="500" y="270" width="280" height="120" rx="16" fill="url(#grad-br)" stroke="#2563eb" stroke-width="1.5" filter="url(#card-shadow)" />

    <rect x="520" y="255" width="112" height="22" rx="11" fill="#334155" />
    <text y="270" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff" x="576">Fiabilité &gt; Vitesse</text>

    <text y="315" text-anchor="middle" font-size="18" font-weight="bold" fill="#1d4ed8" x="640">Spark / Dask</text>
    <text y="340" text-anchor="middle" font-size="12" fill="#334155" x="640">SQL distribué à l’échelle du pétaoctet</text>
    <text y="360" text-anchor="middle" font-size="12" fill="#334155" x="640">Pipelines ETL lourds et robustes</text>
  </g>

  <!-- CARD: Top-Left = DataFusion -->
  <g class="card-float c-tl">
    <rect x="150" y="85" width="280" height="120" rx="16" fill="url(#grad-tl)" stroke="#7c3aed" stroke-width="1.5" filter="url(#card-shadow)" />

    <rect x="170" y="70" width="138" height="22" rx="11" fill="#7c3aed" />
    <text y="85" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff" x="239">Extensibilité &gt; Écosystème</text>

    <text y="130" text-anchor="middle" font-size="18" font-weight="bold" fill="#5b21b6" x="290">Fusion de données</text>
    <text y="155" text-anchor="middle" font-size="12" fill="#334155" x="290">Moteur de requêtes en streaming embeddable</text>
    <text y="175" text-anchor="middle" font-size="12" fill="#334155" x="290">Construire des plateformes de données personnalisées</text>
  </g>

  <!-- CARD: Top-Right = Ray/Daft -->
  <g class="card-float c-tr">
    <rect x="500" y="85" width="280" height="120" rx="16" fill="url(#grad-tr)" stroke="#ea580c" stroke-width="1.5" filter="url(#card-shadow)" />

    <rect x="520" y="70" width="128" height="22" rx="11" fill="#ea580c" />
    <text y="85" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff" x="584">Utilisation GPU &gt; Fonctionnalités ETL</text>

    <text y="130" text-anchor="middle" font-size="18" font-weight="bold" fill="#9a3412" x="640">Rayon / Daft</text>
    <text y="155" text-anchor="middle" font-size="12" fill="#334155" x="640">Logique d’IA multimodale distribuée</text>
    <text y="175" text-anchor="middle" font-size="12" fill="#334155" x="640">Entraînement et inférence GPU pour l’ultime étape</text>
  </g>

</svg>
