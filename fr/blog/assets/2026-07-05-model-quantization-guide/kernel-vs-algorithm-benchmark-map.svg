<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">algorithme de quantification et carte benchmark du noyau runtime</title>
  <desc id="desc">Diagramme illustrant la manière dont un algorithme génère un checkpoint compressé, tandis que des noyaux runtime déterminent la vitesse de traitement serving ainsi que la qualité des résultats benchmark.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#334155" flood-opacity="0.08" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="960" height="520" fill="#f8fafc" />
  <text y="42" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="25" font-weight="700" fill="#0f172a" x="480">Algorithme + Noyau + Charge de travail = Résultat</text>
  <text y="72" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#334155" x="480">Un checkpoint quantifié n’implique pas automatiquement un déploiement plus rapide.</text>

  <g font-family="Inter, system-ui, sans-serif">
    <rect x="48" y="130" width="210" height="150" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
    <text y="160" text-anchor="middle" font-size="18" font-weight="700" fill="#1d4ed8" x="153">Méthode de quantification</text>
    <text y="194" text-anchor="middle" font-size="14" fill="#0f172a" x="153">GPTQ</text>
    <text y="220" text-anchor="middle" font-size="14" fill="#0f172a" x="153">AWQ</text>
    <text y="246" text-anchor="middle" font-size="14" fill="#0f172a" x="153">SmoothQuant</text>
    <text y="268" text-anchor="middle" font-size="12" fill="#334155" x="153">décide de gérer l’erreur checkpoint</text>

    <rect x="375" y="130" width="210" height="150" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadow)" />
    <text y="160" text-anchor="middle" font-size="18" font-weight="700" fill="#9a3412" x="480">Runtime noyau</text>
    <text y="194" text-anchor="middle" font-size="14" fill="#0f172a" x="480">Marlin</text>
    <text y="220" text-anchor="middle" font-size="14" fill="#0f172a" x="480">BitBLAS</text>
    <text y="246" text-anchor="middle" font-size="14" fill="#0f172a" x="480">FP8 cœurs de tenseur</text>
    <text y="268" text-anchor="middle" font-size="12" fill="#334155" x="480">détermine le chemin d’exécution</text>

    <rect x="702" y="130" width="210" height="150" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="2" filter="url(#shadow)" />
    <text y="160" text-anchor="middle" font-size="18" font-weight="700" fill="#166534" x="807">Charge de travail</text>
    <text y="194" text-anchor="middle" font-size="14" fill="#0f172a" x="807">prompt longueur</text>
    <text y="220" text-anchor="middle" font-size="14" fill="#0f172a" x="807">concurrentisme</text>
    <text y="246" text-anchor="middle" font-size="14" fill="#0f172a" x="807">cible de qualité</text>
    <text y="268" text-anchor="middle" font-size="12" fill="#334155" x="807">détermine le goulot d’étranglement</text>
  </g>

  <g stroke="#94a3b8" stroke-width="2.3" fill="none" marker-end="url(#arrow)">
    <path d="M 258 205 L 365 205" />
    <path d="M 585 205 L 692 205" />
    <path d="M 807 280 C 807 330 480 325 480 365" />
    <path d="M 480 280 L 480 365" />
    <path d="M 153 280 C 153 330 480 325 480 365" />
  </g>

  <rect x="260" y="365" width="440" height="100" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)" />
  <text y="395" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#334155" x="480">Benchmark la pile réelle</text>
  <text y="424" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#334155" x="480">qualité : perplexité, métriques de tâche, générations</text>
  <text y="448" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#334155" x="480">serving : débit de traitement, TTFT, ITL, mémoire, concurrence</text>
</svg>
