<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Vérifications de calibration et d’évaluation</title>
  <desc id="desc">Flux des données de calibration représentatives, passant par la quantification, jusqu’aux vérifications de qualité et serving avant déploiement.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#334155" flood-opacity="0.08" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="960" height="520" fill="#f8fafc" />
  <text y="42" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="25" font-weight="700" fill="#0f172a" x="480">Vérifications de déploiement de la quantification</text>
  <text y="72" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#334155" x="480">Un checkpoint chargé nécessite encore une calibration ainsi qu’une validation de déploiement.</text>

  <g font-family="Inter, system-ui, sans-serif">
    <rect x="50" y="135" width="190" height="120" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
    <text y="165" text-anchor="middle" font-size="17" font-weight="700" fill="#1d4ed8" x="145">Échantillons de trafic</text>
    <text y="196" text-anchor="middle" font-size="13" fill="#0f172a" x="145">RAG traces</text>
    <text y="218" text-anchor="middle" font-size="13" fill="#0f172a" x="145">SQL / code / chat</text>
    <text y="240" text-anchor="middle" font-size="12" fill="#334155" x="145">masqué et représentatif</text>

    <rect x="295" y="135" width="170" height="120" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadow)" />
    <text y="165" text-anchor="middle" font-size="17" font-weight="700" fill="#9a3412" x="380">Calibrer</text>
    <text y="196" text-anchor="middle" font-size="13" fill="#0f172a" x="380">échelles</text>
    <text y="218" text-anchor="middle" font-size="13" fill="#0f172a" x="380">valeurs atypiques</text>
    <text y="240" text-anchor="middle" font-size="12" fill="#334155" x="380">D’abord 128 à 512 échantillons</text>

    <rect x="520" y="135" width="170" height="120" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)" />
    <text y="165" text-anchor="middle" font-size="17" font-weight="700" fill="#5b21b6" x="605">Quantification</text>
    <text y="196" text-anchor="middle" font-size="13" fill="#0f172a" x="605">GPTQ / AWQ</text>
    <text y="218" text-anchor="middle" font-size="13" fill="#0f172a" x="605">FP8 / INT8</text>
    <text y="240" text-anchor="middle" font-size="12" fill="#334155" x="605">protéger les tenseurs sensibles</text>

    <rect x="745" y="135" width="165" height="120" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="2" filter="url(#shadow)" />
    <text y="165" text-anchor="middle" font-size="17" font-weight="700" fill="#166534" x="827">Test de mise en service</text>
    <text y="196" text-anchor="middle" font-size="13" fill="#0f172a" x="827">vLLM / llama.cpp</text>
    <text y="218" text-anchor="middle" font-size="13" fill="#0f172a" x="827">matériel cible</text>
    <text y="240" text-anchor="middle" font-size="12" fill="#334155" x="827">même forme de charge de travail</text>
  </g>

  <g stroke="#94a3b8" stroke-width="2.3" fill="none" marker-end="url(#arrow)">
    <path d="M 240 195 L 285 195" />
    <path d="M 465 195 L 510 195" />
    <path d="M 690 195 L 735 195" />
    <path d="M 827 255 C 827 300 480 297 480 330" />
  </g>

  <rect x="165" y="330" width="630" height="112" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)" />
  <text y="360" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#334155" x="480">Déploiement des vérifications</text>
  <text y="390" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#334155" x="480">delta de perplexité + régression de tâche + échantillons de génération</text>
  <text y="416" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#334155" x="480">ancrage à long contexte + débit de traitement + TTFT + ITL + mémoire</text>
</svg>
