<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="720" viewBox="0 0 1120 720" role="img" aria-labelledby="title desc">
  <title id="title">How to choose a model quantization recipe</title>
  <desc id="desc">A decision map that routes workloads to W4A16, FP8 W8A8, INT8 W8A8, FP8 KV-cache quantization, GGUF, or bitsandbytes NF4.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#1f2937" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1565c0"/>
    </marker>
    <style>
      .bg { fill: #f8f9fa; }
      .card { fill: #ffffff; stroke: #d7dee8; stroke-width: 1.4; filter: url(#shadow); }
      .start { fill: #e3f2fd; stroke: #1565c0; }
      .memory { fill: #e8f5e9; stroke: #27ae60; }
      .compute { fill: #fff3e0; stroke: #e67e22; }
      .cache { fill: #f3e5f5; stroke: #6a1b9a; }
      .edge { fill: #fce4ec; stroke: #c62828; }
      .title { font: 700 24px Arial, sans-serif; fill: #111827; }
      .label { font: 700 16px Arial, sans-serif; fill: #111827; }
      .text { font: 14px Arial, sans-serif; fill: #374151; }
      .small { font: 12px Arial, sans-serif; fill: #4b5563; }
      .mono { font: 13px "SFMono-Regular", Consolas, monospace; fill: #111827; }
      .arrow { stroke: #1565c0; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1120" height="720"/>
  <text class="title" x="52" y="58">A practical recipe map</text>
  <text class="text" x="52" y="88">Choose for the workload first. Bit-width by itself does not tell you whether the runtime will get faster.</text>

  <rect class="card start" x="420" y="120" width="280" height="90" rx="8"/>
  <text class="label" x="454" y="154">What problem are you solving?</text>
  <text class="small" x="454" y="180">memory, throughput, context, edge, or fine-tuning</text>

  <path class="arrow" d="M420 165 C320 165 276 185 230 240"/>
  <path class="arrow" d="M560 210 C560 250 560 274 560 320"/>
  <path class="arrow" d="M700 165 C800 165 844 185 890 240"/>
  <path class="arrow" d="M468 210 C388 270 342 380 300 490"/>
  <path class="arrow" d="M652 210 C740 272 792 380 830 490"/>

  <rect class="card memory" x="70" y="250" width="300" height="190" rx="8"/>
  <text class="label" x="96" y="286">Fit a bigger LLM</text>
  <text class="text" x="96" y="318">Use GPTQ or AWQ W4A16.</text>
  <text class="text" x="96" y="342">Good for low-QPS decode,</text>
  <text class="text" x="96" y="366">single-stream chat, and</text>
  <text class="text" x="96" y="390">tight GPU memory.</text>
  <text class="mono" x="96" y="426">llm-compressor: W4A16</text>

  <rect class="card compute" x="410" y="330" width="300" height="190" rx="8"/>
  <text class="label" x="436" y="366">Increase throughput</text>
  <text class="text" x="436" y="398">Use W8A8. Prefer FP8 on</text>
  <text class="text" x="436" y="422">Ada, Hopper, and newer.</text>
  <text class="text" x="436" y="446">Use INT8 when hardware</text>
  <text class="text" x="436" y="470">or kernels fit that path.</text>
  <text class="mono" x="436" y="506">FP8 dynamic or SmoothQuant</text>

  <rect class="card cache" x="750" y="250" width="300" height="190" rx="8"/>
  <text class="label" x="776" y="286">Serve long context</text>
  <text class="text" x="776" y="318">Use KV-cache quantization.</text>
  <text class="text" x="776" y="342">This helps when context</text>
  <text class="text" x="776" y="366">length or concurrency</text>
  <text class="text" x="776" y="390">dominates VRAM.</text>
  <text class="mono" x="776" y="426">vLLM: --kv-cache-dtype fp8</text>

  <rect class="card edge" x="130" y="500" width="300" height="170" rx="8"/>
  <text class="label" x="156" y="536">Run local or edge</text>
  <text class="text" x="156" y="568">Use GGUF for llama.cpp,</text>
  <text class="text" x="156" y="592">Ollama, MLX, CPU, or</text>
  <text class="text" x="156" y="616">Apple Silicon targets.</text>
  <text class="mono" x="156" y="646">Q4_K_M or Q5_K_M</text>

  <rect class="card start" x="690" y="500" width="300" height="190" rx="8"/>
  <text class="label" x="716" y="536">Fine-tune cheaply</text>
  <text class="text" x="716" y="568">Use bitsandbytes NF4 for</text>
  <text class="text" x="716" y="592">QLoRA-style experiments.</text>
  <text class="text" x="716" y="616">Do not treat it as a clean</text>
  <text class="text" x="716" y="640">vLLM artifact by default.</text>
  <text class="mono" x="716" y="670">bnb NF4 + PEFT</text>
</svg>
