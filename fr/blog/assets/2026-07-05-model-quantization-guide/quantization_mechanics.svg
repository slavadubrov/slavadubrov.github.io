<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 520" width="100%" height="100%">
  <defs>
    <!-- Drop Shadow Filter -->
    <filter id="drop-shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#1e293b" flood-opacity="0.12" />
    </filter>
    <!-- Gradients -->
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3498db" />
      <stop offset="100%" stop-color="#1565c0" />
    </linearGradient>
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9b59b6" />
      <stop offset="100%" stop-color="#6a1b9a" />
    </linearGradient>
    <linearGradient id="orange-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e67e22" />
      <stop offset="100%" stop-color="#d35400" />
    </linearGradient>
    <linearGradient id="green-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2ecc71" />
      <stop offset="100%" stop-color="#27ae60" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="850" height="520" fill="#f8f9fa" rx="12" />

  <!-- Title -->
  <text x="30" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1e293b">
    Poids uniquement (W4A16) contre poids + activation (W8A8/FP8)
  </text>
  <text x="30" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b">
    Comparaison du transfert de mémoire GPU, du traitement des registres et de l’utilisation des cœurs tensoriels
  </text>

  <!-- Divider Line -->
  <line x1="425" y1="90" x2="425" y2="490" stroke="#cbd5e1" stroke-dasharray="5,5" stroke-width="2" />

  <!-- SECTION 1: WEIGHT-ONLY (W4A16) -->
  <g>
    <!-- Subtitle -->
    <rect x="30" y="90" width="365" height="30" fill="#e3f2fd" rx="6" />
    <text x="212.5" y="110" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12.5" font-weight="700" fill="#1565c0">
      A. Quantification uniquement basée sur le poids (par ex. W4A16 GPTQ/AWQ)
    </text>
    <text x="212.5" y="142" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">
      Optimise la décodage limité en mémoire (petits lots / flux unique)
    </text>

    <!-- GPU VRAM (HBM) -->
    <rect x="50" y="160" width="320" height="75" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" rx="8" filter="url(#drop-shadow)" />
    <text x="210" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#334155">Mémoire VRAM GPU (HBM)</text>

    <!-- weights box -->
    <rect x="65" y="192" width="135" height="30" fill="url(#orange-grad)" rx="4" />
    <text x="132.5" y="211" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#ffffff">Poids (4 bits)</text>
    <!-- activations box -->
    <rect x="220" y="192" width="135" height="30" fill="url(#blue-grad)" rx="4" />
    <text x="287.5" y="211" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#ffffff">Activation (BF16 16 bits)</text>

    <!-- Data Flow Arrows -->
    <path d="M 132.5 235 L 132.5 272" fill="none" stroke="#e67e22" stroke-width="2.5" marker-end="url(#arrow-orange)" />
    <path d="M 287.5 235 L 287.5 272" fill="none" stroke="#2980b9" stroke-width="2.5" marker-end="url(#arrow-blue)" />

    <!-- GPU Compute Block -->
    <rect x="50" y="285" width="320" height="150" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" rx="8" filter="url(#drop-shadow)" />
    <text x="210" y="305" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#334155">Exécution en SRAM/registre</text>

    <!-- Dequantization Step -->
    <rect x="65" y="320" width="135" height="40" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" rx="4" />
    <text x="132.5" y="337" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#b45309">Déquantification en noyau</text>
    <text x="132.5" y="350" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#d97706">INT 4 bits → FP 16 bits</text>

    <!-- Activations path (Unchanged) -->
    <rect x="220" y="320" width="135" height="40" fill="#e3f2fd" stroke="#90caf9" stroke-width="1.5" rx="4" />
    <text x="287.5" y="337" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#1565c0">Conserver en 16 bits</text>
    <text x="287.5" y="350" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#1976d2">Aucune déquantification</text>

    <!-- Arrow from Dequant to Tensor Core -->
    <path d="M 132.5 360 L 132.5 388 C 132.5 400, 180 400, 195 400" fill="none" stroke="#b45309" stroke-dasharray="3,3" stroke-width="1.5" />

    <!-- Activations entry line -->
    <path d="M 287.5 285 L 287.5 320" fill="none" stroke="#2980b9" stroke-width="1.5" />

    <!-- Activations bypass dequant -->
    <path d="M 287.5 360 L 287.5 388 C 287.5 400, 240 400, 225 400" fill="none" stroke="#2980b9" stroke-width="1.5" />

    <!-- Math execution box -->
    <rect x="180" y="385" width="60" height="35" fill="url(#purple-grad)" rx="4" />
    <text x="210" y="406" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#ffffff">BF16 en mode TC</text>
    <text x="210" y="445" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b">La mathématique des poids est effectuée en 16 bits</text>

    <!-- Bottom Note -->
    <rect x="50" y="450" width="320" height="40" fill="#fffbeb" stroke="#fef3c7" rx="6" />
    <text x="210" y="466" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#b45309">⚠️ Le goulot d’étranglement de calcul reste actif :</text>
    <text x="210" y="478" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9.5" fill="#78350f">Une économie de VRAM est obtenue, mais pas d’accélération du calcul.</text>
  </g>

  <!-- SECTION 2: WEIGHT-ACTIVATION (W8A8/FP8) -->
  <g transform="translate(425, 0)">
    <!-- Subtitle -->
    <rect x="30" y="90" width="365" height="30" fill="#e8f5e9" rx="6" />
    <text x="212.5" y="110" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12.5" font-weight="700" fill="#2e7d32">
      B. Quantification par poids et activation (W8A8 / FP8)
    </text>
    <text x="212.5" y="142" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">
      Accélère le préremplissage gêné par les calculs (haute concurrence / service)
    </text>

    <!-- GPU VRAM (HBM) -->
    <rect x="50" y="160" width="320" height="75" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" rx="8" filter="url(#drop-shadow)" />
    <text x="210" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#334155">VRAM GPU (HBM)</text>

    <!-- weights box -->
    <rect x="65" y="192" width="135" height="30" fill="url(#green-grad)" rx="4" />
    <text x="132.5" y="211" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#ffffff">Poids (8 bits)</text>
    <!-- activations box -->
    <rect x="220" y="192" width="135" height="30" fill="url(#green-grad)" rx="4" />
    <text x="287.5" y="211" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#ffffff">Activation (8 bits)</text>

    <!-- Data Flow Arrows -->
    <path d="M 132.5 235 L 132.5 280" fill="none" stroke="#27ae60" stroke-width="2.5" marker-end="url(#arrow-green)" />
    <path d="M 287.5 235 L 287.5 280" fill="none" stroke="#27ae60" stroke-width="2.5" marker-end="url(#arrow-green)" />

    <!-- GPU Compute Block -->
    <rect x="50" y="285" width="320" height="150" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" rx="8" filter="url(#drop-shadow)" />
    <text x="210" y="305" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#334155">Exécution en SRAM/registre</text>

    <!-- Pass Directly to Tensor Cores (Weights) -->
    <rect x="65" y="320" width="135" height="40" fill="#e8f5e9" stroke="#81c784" stroke-width="1.5" rx="4" />
    <text x="132.5" y="337" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#2e7d32">Aucun surcoût de déquantification</text>
    <text x="132.5" y="350" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#1b5e20">Alimentation directe depuis le matériel</text>

    <!-- Pass Directly to Tensor Cores (Activations) -->
    <rect x="220" y="320" width="135" height="40" fill="#e8f5e9" stroke="#81c784" stroke-width="1.5" rx="4" />
    <text x="287.5" y="337" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#2e7d32">Aucun surcoût de déquantification</text>
    <text x="287.5" y="350" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#1b5e20">Alimentation directe depuis le matériel</text>

    <!-- Arrow from Weights to Tensor Core -->
    <path d="M 132.5 360 L 132.5 388 C 132.5 400, 180 400, 195 400" fill="none" stroke="#27ae60" stroke-width="1.5" />

    <!-- Arrow from Activations to Tensor Core -->
    <path d="M 287.5 360 L 287.5 388 C 287.5 400, 240 400, 225 400" fill="none" stroke="#27ae60" stroke-width="1.5" />

    <!-- Math execution box -->
    <rect x="180" y="385" width="60" height="35" fill="url(#purple-grad)" rx="4" />
    <text x="210" y="406" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#ffffff">INT8/FP8</text>
    <text x="210" y="445" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b">Exécuté directement en matériel</text>

    <!-- Bottom Note -->
    <rect x="50" y="450" width="320" height="40" fill="#f4fbf7" stroke="#e8f5e9" rx="6" />
    <text x="210" y="466" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#2e7d32">⚡ Accélération matérielle complète :</text>
    <text x="210" y="478" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9.5" fill="#1b5e20">Débloque un débit théorique du Tensor Core deux fois supérieur (TOPS).</text>
  </g>

  <!-- Markers -->
  <defs>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#e67e22" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#2980b9" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#27ae60" />
    </marker>
  </defs>
</svg>
