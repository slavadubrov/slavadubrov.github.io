<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Flux de travail de tarification avec des limites de schéma et de politique distinctes</title>
  <desc id="desc">Une requête est traitée via un routage structuré, un récupération autorisée de fonctionnalités, une proposition structurée, une validation de politique déterministe, ainsi qu’une réponse basée sur des modèles prédéfinis. En cas d’échec, le système recourt à des mécanismes de fallback sécurisés.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="560" rx="22" fill="#0f172a" />
  <text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Agent de tarification : limites d’application observables</text>

  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(25 125)"><rect width="150" height="110" rx="14" fill="#1e293b" stroke="#64748b" stroke-width="2" /><text x="75" y="43" text-anchor="middle" font-size="16" font-weight="700" fill="#f8fafc">Demande de l’utilisateur</text><text x="75" y="72" text-anchor="middle" font-size="12" fill="#94a3b8">données d'entrée non fiables</text></g>
    <text x="202" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(230 125)"><rect width="150" height="110" rx="14" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="75" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Route</text><text x="75" y="62" text-anchor="middle" font-size="12" fill="#cbd5e1">union discriminée</text><text x="75" y="85" text-anchor="middle" font-size="12" fill="#94a3b8">forme validée</text></g>
    <text x="407" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(435 125)"><rect width="150" height="110" rx="14" fill="#5b21b6" stroke="#2563eb" stroke-width="2" /><text x="75" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#c4b5fd">Récupérer</text><text x="75" y="62" text-anchor="middle" font-size="12" fill="#cbd5e1">autoriser l’ID d’utilisateur</text><text x="75" y="85" text-anchor="middle" font-size="12" fill="#94a3b8">charger des fonctionnalités en temps réel</text></g>
    <text x="612" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(640 125)"><rect width="150" height="110" rx="14" fill="#9a3412" stroke="#ea580c" stroke-width="2" /><text x="75" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#fdba74">Proposition</text><text x="75" y="62" text-anchor="middle" font-size="12" fill="#cbd5e1">tapé JSON schema</text><text x="75" y="85" text-anchor="middle" font-size="12" fill="#94a3b8">forme validée</text></g>
    <text x="817" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(845 125)"><rect width="130" height="110" rx="14" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="65" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Vérification de la politique</text><text x="65" y="62" text-anchor="middle" font-size="12" fill="#cbd5e1">plafond dynamique</text><text x="65" y="85" text-anchor="middle" font-size="12" fill="#94a3b8">code appliqué de force</text></g>

    <text x="910" y="286" text-anchor="middle" font-size="28" fill="#93c5fd">↓</text>
    <g transform="translate(785 315)"><rect width="190" height="90" rx="14" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="95" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Réponse par modèle</text><text x="95" y="64" text-anchor="middle" font-size="12" fill="#93c5fd">seuls les valeurs validées</text></g>

    <text x="620" y="459" text-anchor="end" font-size="13" fill="#fca5a5">toute vérification rejetée →</text>
    <g transform="translate(670 420)"><rect width="190" height="80" rx="14" fill="#991b1b" stroke="#dc2626" stroke-width="2" /><text x="95" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#fca5a5">Plan de secours sécurisé</text><text x="95" y="59" text-anchor="middle" font-size="12" fill="#fca5a5">rejeter, réessayer ou escalader</text></g>
    <text x="500" y="535" text-anchor="middle" font-size="13" fill="#94a3b8">Les échecs de schéma ainsi que les échecs de politique sont gérés de manière explicite ; aucun d’eux n’est converti en silence en une offre.</text>
  </g>
</svg>
