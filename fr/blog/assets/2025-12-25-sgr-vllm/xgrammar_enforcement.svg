<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Là où le masque de token XGrammar entre dans la boucle de décodage</title>
  <desc id="desc">Le modèle calcule des logits bruts ; XGrammar masque les tokens qui ne peuvent pas poursuivre le schéma, l’échantillonnage sélectionne parmi les tokens restants, et le matcheur avance. Une note précise que ce masquage garantit la forme plutôt que la correction.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#64748b" /></marker></defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="520" rx="22" fill="#0f172a" />
  <text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Constrained decoding: post-forward, pré-échantillonnage</text>
  <text x="500" y="76" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#94a3b8">Le modèle attribue des scores aux tokens ; la grammaire détermine quels prolongements restent éligibles</text>

  <g transform="translate(35 125)">
    <rect width="180" height="105" rx="14" fill="#166534" stroke="#16a34a" stroke-width="2" />
    <text x="90" y="39" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#86efac">Exécution en avant du modèle</text>
    <text x="90" y="68" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#86efac">GPU effectue le calcul</text>
    <text x="90" y="87" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#86efac">logits du vocabulaire brut</text>
  </g>
  <path d="M225 177 H270" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <g transform="translate(285 125)">
    <rect width="180" height="105" rx="14" fill="#9a3412" stroke="#ea580c" stroke-width="2" />
    <text x="90" y="39" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#fdba74">Comparateur de grammaire</text>
    <text x="90" y="68" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#fdba74">Calcule les valeurs valides</text>
    <text x="90" y="87" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#fdba74">masque de token suivant</text>
  </g>
  <path d="M475 177 H520" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <g transform="translate(535 125)">
    <rect width="180" height="105" rx="14" fill="#2563eb" stroke="#2563eb" stroke-width="2" />
    <text x="90" y="39" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#93c5fd">Échantillonnage masqué</text>
    <text x="90" y="68" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd">Logits invalides → −∞</text>
    <text x="90" y="87" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd">Sélectionnez un token éligible</text>
  </g>
  <path d="M725 177 H770" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <g transform="translate(785 125)">
    <rect width="180" height="105" rx="14" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" />
    <text x="90" y="39" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#93c5fd">État avancé</text>
    <text x="90" y="68" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd">Accepter le jeton et</text>
    <text x="90" y="87" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd">repetir jusqu'à complétion</text>
  </g>

  <g transform="translate(75 290)">
    <rect width="400" height="145" rx="14" fill="#1e293b" stroke="#94a3b8" />
    <text x="24" y="35" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#e2e8f0">Exemple : un champ numérique</text>
    <text x="24" y="67" font-family="SFMono-Regular, Consolas, monospace" font-size="13" fill="#94a3b8">raw : « quinze » 15 vrai {</text>
    <text x="24" y="96" font-family="SFMono-Regular, Consolas, monospace" font-size="13" fill="#86efac">masque :     ×       ✓    ×   ×</text>
    <text x="24" y="124" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94a3b8">Le schéma autorise un nombre, et non l’expression « quinze ».</text>
  </g>
  <g transform="translate(525 290)">
    <rect width="400" height="145" rx="14" fill="#1d4ed8" stroke="#2563eb" />
    <text x="24" y="35" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#93c5fd">Ce que le masque ne détermine pas</text>
    <text x="24" y="67" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#cbd5e1">• si 15 est la valeur correcte</text>
    <text x="24" y="94" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#cbd5e1">• la question de savoir si les preuves soutiennent cette valeur</text>
    <text x="24" y="121" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#cbd5e1">• si une règle métier dynamique le permet</text>
  </g>
</svg>
