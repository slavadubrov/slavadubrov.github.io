<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
  <defs>
    <linearGradient id="gpuGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="xgrammarGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="samplingGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.15" />
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981" />
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b" />
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="#0f172a" />

  <!-- Title -->
  <text x="450" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#f8fafc" text-anchor="middle">xgrammar : où le masquage se fait dans le pipeline d’inférence</text>

  <!-- Step labels -->
  <text x="450" y="65" font-family="system-ui, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Le masque est appliqué APRÈS la passe forward, AVANT l’échantillonnage</text>

  <!-- Pipeline flow - horizontal -->
  <g transform="translate(30, 100)">

    <!-- Step 1: Input Tokens -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="120" height="70" rx="10" fill="#1e293b" stroke="#475569" stroke-width="2" filter="url(#shadow)" />
      <text x="60" y="25" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#94a3b8" text-anchor="middle">Étape 1</text>
      <text x="60" y="45" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#f8fafc" text-anchor="middle">Tokens d’entrée</text>
      <text x="60" y="60" font-family="monospace" font-size="10" fill="#64748b" text-anchor="middle">[1, 234, 56, ...]</text>
    </g>

    <!-- Arrow 1 -->
    <path d="M125,35 L155,35" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrowGreen)" />

    <!-- Step 2: GPU Forward Pass -->
    <g transform="translate(160, 0)">
      <rect x="0" y="0" width="180" height="70" rx="10" fill="url(#gpuGrad)" filter="url(#shadow)" />
      <text x="90" y="20" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#d1fae5" text-anchor="middle">Étape 2 (GPU)</text>
      <text x="90" y="40" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">🖥️ Passe forward</text>
      <text x="90" y="58" font-family="system-ui, sans-serif" font-size="10" fill="#a7f3d0" text-anchor="middle">Le modèle calcule les 128K logits</text>
    </g>

    <!-- Arrow 2 -->
    <path d="M345,35 L375,35" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrowGreen)" />

    <!-- Step 3: Raw Logits -->
    <g transform="translate(380, 0)">
      <rect x="0" y="0" width="120" height="70" rx="10" fill="#1e293b" stroke="#475569" stroke-width="2" filter="url(#shadow)" />
      <text x="60" y="20" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#94a3b8" text-anchor="middle">Sortie</text>
      <text x="60" y="40" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#f8fafc" text-anchor="middle">Logits bruts</text>
      <text x="60" y="58" font-family="monospace" font-size="9" fill="#64748b" text-anchor="middle">[2.1, -0.5, 3.8...]</text>
    </g>

    <!-- Arrow 3 -->
    <path d="M505,35 L535,35" stroke="#f59e0b" stroke-width="3" fill="none" marker-end="url(#arrowOrange)" />

    <!-- Step 4: xgrammar Logits Processor (THE KEY STEP) -->
    <g transform="translate(540, -15)">
      <rect x="0" y="0" width="180" height="100" rx="12" fill="url(#xgrammarGrad)" stroke="#fbbf24" stroke-width="3" filter="url(#shadow)" />
      <text x="90" y="22" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#fef3c7" text-anchor="middle">Étape 3 (CPU)</text>
      <text x="90" y="42" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">⚙️ xgrammar</text>
      <text x="90" y="60" font-family="system-ui, sans-serif" font-size="11" fill="#fef3c7" text-anchor="middle">Processeur de logits</text>
      <text x="90" y="82" font-family="system-ui, sans-serif" font-size="10" fill="#fde68a" text-anchor="middle">Tokens invalides → -∞</text>
    </g>

    <!-- Arrow 4 -->
    <path d="M725,35 L755,35" stroke="#6366f1" stroke-width="2" fill="none" marker-end="url(#arrowBlue)" />

    <!-- Step 5: Sampling -->
    <g transform="translate(760, 0)">
      <rect x="0" y="0" width="110" height="70" rx="10" fill="url(#samplingGrad)" filter="url(#shadow)" />
      <text x="55" y="20" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#c7d2fe" text-anchor="middle">Étape 4</text>
      <text x="55" y="40" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">Échantillonnage</text>
      <text x="55" y="58" font-family="system-ui, sans-serif" font-size="10" fill="#a5b4fc" text-anchor="middle">temp, top-p</text>
    </g>
  </g>

  <!-- Detail box: What xgrammar does -->
  <g transform="translate(30, 210)">
    <rect x="0" y="0" width="420" height="180" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)" />
    <text x="210" y="28" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#fbbf24" text-anchor="middle">Ce que fait xgrammar (entre étapes 2 → 4)</text>

    <line x1="20" y1="45" x2="400" y2="45" stroke="#334155" stroke-width="1" />

    <!-- Before -->
    <text x="20" y="70" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#94a3b8">Logits bruts du GPU :</text>
    <rect x="20" y="80" width="180" height="35" rx="4" fill="#0f172a" stroke="#475569" stroke-width="1" />
    <text x="30" y="100" font-family="monospace" font-size="10" fill="#94a3b8">"true":3.2  "15":2.8  "hello":4.1</text>

    <!-- After -->
    <text x="220" y="70" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#94a3b8">Après masque xgrammar :</text>
    <rect x="220" y="80" width="180" height="35" rx="4" fill="#0f172a" stroke="#475569" stroke-width="1" />
    <text x="230" y="100" font-family="monospace" font-size="10" fill="#6ee7b7">"true":</text>
    <text x="275" y="100" font-family="monospace" font-size="10" fill="#f87171">-∞</text>
    <text x="295" y="100" font-family="monospace" font-size="10" fill="#6ee7b7">"15":2.8  "hello":</text>
    <text x="381" y="100" font-family="monospace" font-size="10" fill="#f87171">-∞</text>

    <!-- Explanation -->
    <text x="20" y="140" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Pour un champ float, seuls les chiffres sont autorisés.</text>
    <text x="20" y="158" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">"hello" et "true" ont une probabilité 0 (logit = -∞).</text>
    <text x="20" y="176" font-family="system-ui, sans-serif" font-size="11" fill="#6ee7b7">"15" est choisi car c’est le logit valide le plus élevé.</text>
  </g>

  <!-- Detail box: Two-phase process -->
  <g transform="translate(470, 210)">
    <rect x="0" y="0" width="400" height="180" rx="12" fill="#1e293b" stroke="#06b6d4" stroke-width="2" filter="url(#shadow)" />
    <text x="200" y="28" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#22d3ee" text-anchor="middle">Architecture xgrammar en deux phases</text>

    <line x1="20" y1="45" x2="380" y2="45" stroke="#334155" stroke-width="1" />

    <!-- Phase 1 -->
    <text x="20" y="70" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#67e8f9">Phase 1 : compilation de grammaire (une fois)</text>
    <text x="30" y="90" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">• JSON Schema → grammaire hors contexte</text>
    <text x="30" y="105" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">• Construire un automate à pile (gère l’imbrication)</text>
    <text x="30" y="120" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">• Pré-calculer 99 % des masques de tokens → cache</text>

    <!-- Phase 2 -->
    <text x="20" y="145" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#67e8f9">Phase 2 : génération du masque à l’exécution (par token)</text>
    <text x="30" y="165" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">• Chercher les masques en cache + vérifier les tokens dépendants du contexte</text>
    <text x="30" y="180" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">• Appliquer le bitmask aux logits sur place (C++, rapide)</text>
  </g>

  <!-- Bottom: Key insight -->
  <g transform="translate(30, 420)">
    <rect x="0" y="0" width="840" height="160" rx="16" fill="#172554" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)" />

    <text x="420" y="30" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#93c5fd" text-anchor="middle">💡 Idée clé : post-forward, pré-échantillonnage</text>

    <line x1="40" y1="50" x2="800" y2="50" stroke="#1e40af" stroke-width="1" />

    <!-- Three columns -->
    <g transform="translate(40, 65)">
      <rect x="0" y="0" width="240" height="75" rx="8" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1" />
      <text x="120" y="25" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#93c5fd" text-anchor="middle">Modèle inchangé</text>
      <text x="120" y="45" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">La passe forward GPU est</text>
      <text x="120" y="60" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">exactement la même qu’en non contraint</text>
    </g>

    <g transform="translate(300, 65)">
      <rect x="0" y="0" width="240" height="75" rx="8" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1" />
      <text x="120" y="25" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#93c5fd" text-anchor="middle">Exécution parallèle</text>
      <text x="120" y="45" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Masque du token N calculé</text>
      <text x="120" y="60" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">pendant que le GPU calcule le token N+1</text>
    </g>

    <g transform="translate(560, 65)">
      <rect x="0" y="0" width="240" height="75" rx="8" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1" />
      <text x="120" y="25" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#93c5fd" text-anchor="middle">Surcoût quasi nul</text>
      <text x="120" y="45" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">L’application du masque en C++ prend</text>
      <text x="120" y="60" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">des microsecondes vs ms pour la passe forward</text>
    </g>
  </g>
</svg>
