<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">xgrammar : Où a lieu le masquage dans le pipeline d’inférence</title>
  <desc id="artifact-desc">xgrammar : Où a lieu le masquage dans le pipeline d’inférence.</desc>
  <defs>
    <linearGradient id="gpuGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #166534;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="xgrammarGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #ea580c;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #ea580c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="samplingGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #2563eb;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a" />
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c" />
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="900" height="600" fill="#0f172a" />

  <!-- Title -->
  <text y="35" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="bold" fill="#f8fafc" text-anchor="middle" x="450">xgrammar : Où a lieu le masquage dans le pipeline d’inférence</text>

  <!-- Step labels -->
  <text y="65" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#334155" text-anchor="middle" x="450">Le masque est appliqué APRÈS le passage en avant, AVANT l’échantillonnage</text>

  <!-- Pipeline flow - horizontal -->
  <g transform="translate(30, 100)">

    <!-- Step 1: Input Tokens -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="120" height="70" rx="10" fill="#1e293b" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)" />
      <text y="25" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#cbd5e1" text-anchor="middle" x="60">Étape 1</text>
      <text y="45" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#f8fafc" text-anchor="middle" x="60">Tokens d'entrée</text>
      <text y="60" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#334155" text-anchor="middle" x="60">[1, 234, 56, ...]</text>
    </g>

    <!-- Arrow 1 -->
    <path d="M125,35 L155,35" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrowGreen)" />

    <!-- Step 2: GPU Forward Pass -->
    <g transform="translate(160, 0)">
      <rect x="0" y="0" width="180" height="70" rx="10" fill="url(#gpuGrad)" filter="url(#shadow)" />
      <text y="20" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#86efac" text-anchor="middle" x="90">Étape 2 (GPU)</text>
      <text y="40" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#f8fafc" text-anchor="middle" x="90">🖥️ Pass en avant</text>
      <text y="58" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#86efac" text-anchor="middle" x="90">Le modèle calcule l’ensemble des 128 K de logits.</text>
    </g>

    <!-- Arrow 2 -->
    <path d="M345,35 L375,35" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrowGreen)" />

    <!-- Step 3: Raw Logits -->
    <g transform="translate(380, 0)">
      <rect x="0" y="0" width="120" height="70" rx="10" fill="#1e293b" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)" />
      <text y="20" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#cbd5e1" text-anchor="middle" x="60">Sortie</text>
      <text y="40" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#f8fafc" text-anchor="middle" x="60">Logits bruts</text>
      <text y="58" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#334155" text-anchor="middle" x="60">[2,1 ; -0,5 ; 3,8...]</text>
    </g>

    <!-- Arrow 3 -->
    <path d="M505,35 L535,35" stroke="#ea580c" stroke-width="3" fill="none" marker-end="url(#arrowOrange)" />

    <!-- Step 4: xgrammar Logits Processor (THE KEY STEP) -->
    <g transform="translate(540, -15)">
      <rect x="0" y="0" width="180" height="100" rx="12" fill="url(#xgrammarGrad)" stroke="#ea580c" stroke-width="3" filter="url(#shadow)" />
      <text y="22" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#fdba74" text-anchor="middle" x="90">Étape 3 (CPU)</text>
      <text y="42" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#f8fafc" text-anchor="middle" x="90">⚙️ xgrammar</text>
      <text y="60" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#fdba74" text-anchor="middle" x="90">Processeur de logiques</text>
      <text y="82" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#fdba74" text-anchor="middle" x="90">Tokens invalides → -∞</text>
    </g>

    <!-- Arrow 4 -->
    <path d="M725,35 L755,35" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrowBlue)" />

    <!-- Step 5: Sampling -->
    <g transform="translate(760, 0)">
      <rect x="0" y="0" width="110" height="70" rx="10" fill="url(#samplingGrad)" filter="url(#shadow)" />
      <text y="20" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#93c5fd" text-anchor="middle" x="55">Étape 4</text>
      <text y="40" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#f8fafc" text-anchor="middle" x="55">Échantillonnage</text>
      <text y="58" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#93c5fd" text-anchor="middle" x="55">température, top-p</text>
    </g>
  </g>

  <!-- Detail box: What xgrammar does -->
  <g transform="translate(30, 210)">
    <rect x="0" y="0" width="420" height="180" rx="12" fill="#1e293b" stroke="#ea580c" stroke-width="2" filter="url(#shadow)" />
    <text y="28" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#fdba74" text-anchor="middle" x="210">Quel est le rôle de xgrammar (entre les étapes 2 et 4)</text>

    <line x1="20" y1="45" x2="400" y2="45" stroke="#94a3b8" stroke-width="1" />

    <!-- Before -->
    <text y="70" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#cbd5e1" x="20">Logiques brutes provenant de la GPU :</text>
    <rect x="20" y="80" width="180" height="35" rx="4" fill="#0f172a" stroke="#94a3b8" stroke-width="1" />
    <text y="100" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#cbd5e1" x="30">"true":3,2  "15":2,8  "hello":4,1</text>

    <!-- After -->
    <text y="70" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#cbd5e1" x="220">Après le masquage par xgrammar :</text>
    <rect x="220" y="80" width="180" height="35" rx="4" fill="#0f172a" stroke="#94a3b8" stroke-width="1" />
    <text y="100" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#86efac" x="230">"vrai"</text>
    <text y="100" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#fca5a5" x="275">-∞</text>
    <text y="100" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#86efac" x="295">"15":2.8  "bonjour":</text>
    <text y="100" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#fca5a5" x="381">-∞</text>

    <!-- Explanation -->
    <text y="140" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">Pour un champ flottant, seuls les chiffres sont autorisés.</text>
    <text y="158" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">« hello » et « true » obtiennent une probabilité de 0 (logit = -∞).</text>
    <text y="176" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#86efac" x="20">« 15 » a été sélectionné car c’est le logit valide le plus élevé.</text>
  </g>

  <!-- Detail box: Two-phase process -->
  <g transform="translate(470, 210)">
    <rect x="0" y="0" width="400" height="180" rx="12" fill="#1e293b" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
    <text y="28" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#93c5fd" text-anchor="middle" x="200">Architecture à deux phases de xgrammar</text>

    <line x1="20" y1="45" x2="380" y2="45" stroke="#94a3b8" stroke-width="1" />

    <!-- Phase 1 -->
    <text y="70" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#93c5fd" x="20">Phase 1 : Compilation de la grammaire (une seule fois)</text>
    <text y="90" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#cbd5e1" x="30">• Schéma JSON → Grammaire libre de contexte</text>
    <text y="105" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#cbd5e1" x="30">• Construire un automate à déplacement vers le bas (gère le chevauchement)</text>
    <text y="120" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#cbd5e1" x="30">• Pré-calculer 99 % des masques de tokens → mise en cache</text>

    <!-- Phase 2 -->
    <text y="145" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#93c5fd" x="20">Phase 2 : Génération de masque en temps de exécution (par token)</text>
    <text y="165" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#cbd5e1" x="30" transform="translate(-67.46 0.00)">• Recherche des masques en mémoire tampon + vérification des tokens dépendants du contexte</text>
    <text y="180" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#cbd5e1" x="30">• Appliquer un masque binaire aux logits en place (C++, rapide)</text>
  </g>

  <!-- Bottom: Key insight -->
  <g transform="translate(30, 420)">
    <rect x="0" y="0" width="840" height="160" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />

    <text y="30" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#93c5fd" text-anchor="middle" x="420">💡 Idée clé : Post-Forward, Pré-échantillonnage</text>

    <line x1="40" y1="50" x2="800" y2="50" stroke="#2563eb" stroke-width="1" />

    <!-- Three columns -->
    <g transform="translate(40, 65)">
      <rect x="0" y="0" width="240" height="75" rx="8" fill="#1d4ed8" stroke="#2563eb" stroke-width="1" />
      <text y="25" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#93c5fd" text-anchor="middle" x="120">Le modèle est inchangé.</text>
      <text y="45" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" text-anchor="middle" x="120">Le passage en avant du GPU est</text>
      <text y="60" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" text-anchor="middle" x="120">exactement identique à l’état non restreint</text>
    </g>

    <g transform="translate(300, 65)">
      <rect x="0" y="0" width="240" height="75" rx="8" fill="#1d4ed8" stroke="#2563eb" stroke-width="1" />
      <text y="25" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#93c5fd" text-anchor="middle" x="120">Exécution parallèle</text>
      <text y="45" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" text-anchor="middle" x="120">Masque pour le token N calculé</text>
      <text y="60" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" text-anchor="middle" x="120">pendant que le GPU calcule le token N+1</text>
    </g>

    <g transform="translate(560, 65)">
      <rect x="0" y="0" width="240" height="75" rx="8" fill="#1d4ed8" stroke="#2563eb" stroke-width="1" />
      <text y="25" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#93c5fd" text-anchor="middle" x="120">Surcoût proche de zéro</text>
      <text y="45" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" text-anchor="middle" x="120">L'application de masque en C++ prend</text>
      <text y="60" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" text-anchor="middle" x="120">microsecondes contre millisecondes pour le passage en avant</text>
    </g>
  </g>
</svg>
