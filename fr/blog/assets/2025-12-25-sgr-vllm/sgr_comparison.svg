<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550">
  <defs>
    <linearGradient id="promptGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cotGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sgrGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="550" fill="#0f172a" />

  <!-- Title -->
  <text x="450" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#f8fafc" text-anchor="middle">Prompt Engineering vs Chain of Thought vs SGR</text>

  <!-- Column 1: Prompt Engineering -->
  <g transform="translate(30, 70)">
    <rect x="0" y="0" width="270" height="460" rx="16" fill="#1e293b" stroke="#ef4444" stroke-width="3" filter="url(#shadow)" />

    <!-- Header -->
    <rect x="0" y="0" width="270" height="50" rx="16" fill="url(#promptGrad)" />
    <rect x="0" y="35" width="270" height="15" fill="url(#promptGrad)" />
    <text x="135" y="33" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">📝 Prompt Engineering</text>

    <!-- Content -->
    <text x="20" y="80" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fca5a5">Approche :</text>
    <text x="20" y="100" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">"Veuillez produire du JSON"</text>
    <text x="20" y="118" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">"Attention au formatage"</text>

    <line x1="20" y1="135" x2="250" y2="135" stroke="#334155" stroke-width="1" />

    <text x="20" y="160" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fca5a5">Contrôle :</text>
    <text x="20" y="180" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Persuasion sémantique seule</text>
    <text x="20" y="198" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Mécanisme d'attention du modèle</text>

    <line x1="20" y1="215" x2="250" y2="215" stroke="#334155" stroke-width="1" />

    <text x="20" y="240" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fca5a5">Sortie :</text>
    <rect x="20" y="250" width="230" height="70" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1" />
    <text x="30" y="270" font-family="monospace" font-size="10" fill="#fca5a5">"Bien sûr ! La remise est de 20 %</text>
    <text x="30" y="285" font-family="monospace" font-size="10" fill="#fca5a5">Voici peut-être le JSON :</text>
    <text x="30" y="300" font-family="monospace" font-size="10" fill="#fca5a5">{discount: '20%'..."</text>

    <line x1="20" y1="335" x2="250" y2="335" stroke="#334155" stroke-width="1" />

    <text x="20" y="360" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fca5a5">Problèmes :</text>
    <text x="20" y="380" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">❌ Incohérence de format</text>
    <text x="20" y="398" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">❌ Étapes de raisonnement omises</text>
    <text x="20" y="416" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">❌ Nécessite des boucles de relance</text>
    <text x="20" y="434" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">❌ Résultats selon le modèle</text>
  </g>

  <!-- Column 2: Chain of Thought -->
  <g transform="translate(315, 70)">
    <rect x="0" y="0" width="270" height="460" rx="16" fill="#1e293b" stroke="#f59e0b" stroke-width="3" filter="url(#shadow)" />

    <!-- Header -->
    <rect x="0" y="0" width="270" height="50" rx="16" fill="url(#cotGrad)" />
    <rect x="0" y="35" width="270" height="15" fill="url(#cotGrad)" />
    <text x="135" y="33" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">🔗 Chain of Thought</text>

    <!-- Content -->
    <text x="20" y="80" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fcd34d">Approche :</text>
    <text x="20" y="100" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">"Réfléchissons étape par étape"</text>
    <text x="20" y="118" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Traces de raisonnement intermédiaires</text>

    <line x1="20" y1="135" x2="250" y2="135" stroke="#334155" stroke-width="1" />

    <text x="20" y="160" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fcd34d">Contrôle :</text>
    <text x="20" y="180" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Prompting heuristique</text>
    <text x="20" y="198" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Le modèle détermine la structure</text>

    <line x1="20" y1="215" x2="250" y2="215" stroke="#334155" stroke-width="1" />

    <text x="20" y="240" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fcd34d">Sortie :</text>
    <rect x="20" y="250" width="230" height="70" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1" />
    <text x="30" y="270" font-family="monospace" font-size="10" fill="#fcd34d">Étape 1 : Analyser le panier...</text>
    <text x="30" y="285" font-family="monospace" font-size="10" fill="#fcd34d">Étape 2 : Vérifier la marge...</text>
    <text x="30" y="300" font-family="monospace" font-size="10" fill="#fcd34d">Donc, remise de 15 %.</text>

    <line x1="20" y1="335" x2="250" y2="335" stroke="#334155" stroke-width="1" />

    <text x="20" y="360" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fcd34d">Problèmes :</text>
    <text x="20" y="380" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">⚠️ Sortie en prose non structurée</text>
    <text x="20" y="398" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">⚠️ Difficile à parser fiablement</text>
    <text x="20" y="416" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">⚠️ Nombre d'étapes variable</text>
    <text x="20" y="434" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">⚠️ Usage de tokens verbeux</text>
  </g>

  <!-- Column 3: Schema-Guided Reasoning -->
  <g transform="translate(600, 70)">
    <rect x="0" y="0" width="270" height="460" rx="16" fill="#1e293b" stroke="#10b981" stroke-width="3" filter="url(#shadow)" />

    <!-- Header -->
    <rect x="0" y="0" width="270" height="50" rx="16" fill="url(#sgrGrad)" />
    <rect x="0" y="35" width="270" height="15" fill="url(#sgrGrad)" />
    <text x="135" y="33" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">📋 Guidé par schéma (SGR)</text>

    <!-- Content -->
    <text x="20" y="80" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#6ee7b7">Approche :</text>
    <text x="20" y="100" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Le schéma Pydantic définit les étapes</text>
    <text x="20" y="118" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Le décodage contraint impose</text>

    <line x1="20" y1="135" x2="250" y2="135" stroke="#334155" stroke-width="1" />

    <text x="20" y="160" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#6ee7b7">Contrôle :</text>
    <text x="20" y="180" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Application basée sur grammaire</text>
    <text x="20" y="198" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Le développeur définit la topologie</text>

    <line x1="20" y1="215" x2="250" y2="215" stroke="#334155" stroke-width="1" />

    <text x="20" y="240" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#6ee7b7">Sortie :</text>
    <rect x="20" y="250" width="230" height="70" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1" />
    <text x="30" y="268" font-family="monospace" font-size="9" fill="#6ee7b7">{"churn_analysis":"Élevé",</text>
    <text x="30" y="282" font-family="monospace" font-size="9" fill="#6ee7b7"> "margin_math":"$200*0.2=$40",</text>
    <text x="30" y="296" font-family="monospace" font-size="9" fill="#6ee7b7"> "max_discount":15.0,</text>
    <text x="30" y="310" font-family="monospace" font-size="9" fill="#6ee7b7"> "offer_code":"SAVE15"}</text>

    <line x1="20" y1="335" x2="250" y2="335" stroke="#334155" stroke-width="1" />

    <text x="20" y="360" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#6ee7b7">Avantages :</text>
    <text x="20" y="380" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">✓ Sortie structurée 100 % valide</text>
    <text x="20" y="398" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">✓ Auditable champ par champ</text>
    <text x="20" y="416" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">✓ Fonctionne avec de plus petits modèles</text>
    <text x="20" y="434" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">✓ Aucune boucle de relance requise</text>
  </g>
</svg>
