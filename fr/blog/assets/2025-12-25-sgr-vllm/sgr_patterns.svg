<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Modèles de schéma en cascade, de routage et de liste bornée</title>
  <desc id="desc">Trois cartes présentent une cascade de multiples appels, une union de routage discriminé, ainsi qu’une liste définie par des limites de nombre d’éléments, accompagnées de la garantie et des contraintes propres à chaque schéma.</desc>
  <defs><marker id="arrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#93c5fd" /></marker></defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="520" rx="22" fill="#0f172a" />
  <text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Trois motifs guidés par un schéma</text>

  <g transform="translate(25 85)">
    <rect width="300" height="390" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" />
    <text x="150" y="40" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="700" fill="#93c5fd">Chaîne de cascade</text>
    <text x="150" y="68" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">Des appels distincts créent une frontière réelle</text>
    <rect x="42" y="100" width="216" height="52" rx="9" fill="#1d4ed8" />
    <text x="150" y="131" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#93c5fd">Appel A : CandidateEvidence</text>
    <path d="M150 157 V195" fill="none" stroke="#93c5fd" stroke-width="2" marker-end="url(#arrow)" />
    <text x="172" y="181" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">valider</text>
    <rect x="42" y="205" width="216" height="52" rx="9" fill="#1d4ed8" />
    <text x="150" y="236" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#93c5fd">Appel B : CandidateDecision</text>
    <text x="24" y="299" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#93c5fd">Garanties</text>
    <text x="32" y="324" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#cbd5e1">B reçoit la sortie validée provenant de A</text>
    <text x="24" y="353" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#fca5a5">ne garantit pas</text>
    <text x="32" y="378" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#cbd5e1">L'une ou l'autre étape est factuellement correcte</text>
  </g>

  <g transform="translate(350 85)">
    <rect width="300" height="390" rx="16" fill="#5b21b6" stroke="#2563eb" stroke-width="2" />
    <text x="150" y="40" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="700" fill="#c4b5fd">Encadrement des flux</text>
    <text x="150" y="68" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">Un discriminateur sélectionne une forme</text>
    <rect x="65" y="98" width="170" height="48" rx="9" fill="#5b21b6" />
    <text x="150" y="127" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#93c5fd">nom_outil</text>
    <path d="M125 147 L76 193" fill="none" stroke="#c4b5fd" stroke-width="2" />
    <path d="M175 147 L224 193" fill="none" stroke="#c4b5fd" stroke-width="2" />
    <rect x="25" y="195" width="115" height="62" rx="9" fill="#7c3aed" />
    <text x="82" y="220" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd">obtenir des caractéristiques</text>
    <text x="82" y="241" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="11" fill="#c4b5fd">aucun paramètre de modèle</text>
    <rect x="160" y="195" width="115" height="62" rx="9" fill="#7c3aed" />
    <text x="217" y="220" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd">répondre</text>
    <text x="217" y="241" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="11" fill="#c4b5fd">contenu</text>
    <text x="24" y="299" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#c4b5fd">Garanties</text>
    <text x="32" y="324" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#cbd5e1">Une seule forme de branche valide</text>
    <text x="24" y="353" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#fca5a5">ne garantit pas</text>
    <text x="32" y="378" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#cbd5e1">Le chemin sélectionné est approprié</text>
  </g>

  <g transform="translate(675 85)">
    <rect width="300" height="390" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" />
    <text x="150" y="40" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="700" fill="#93c5fd">liste bornée</text>
    <text x="150" y="68" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">Une collection contient des éléments typés ainsi que des limites</text>
    <rect x="30" y="108" width="68" height="105" rx="9" fill="#1d4ed8" />
    <text x="64" y="147" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd">Risque 1</text>
    <text x="64" y="171" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#93c5fd">gravité</text>
    <rect x="116" y="108" width="68" height="105" rx="9" fill="#1d4ed8" />
    <text x="150" y="166" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#93c5fd">…</text>
    <rect x="202" y="108" width="68" height="105" rx="9" fill="#1d4ed8" />
    <text x="236" y="147" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd">Niveau de risque</text>
    <text x="236" y="171" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#93c5fd">2 ≤ N ≤ 4</text>
    <text x="24" y="299" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#93c5fd">Garanties</text>
    <text x="32" y="324" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#cbd5e1">Formes des éléments et longueur de la liste</text>
    <text x="24" y="353" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#fca5a5">ne garantit pas</text>
    <text x="32" y="378" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#cbd5e1">Facteurs distincts ou solidement étayés</text>
  </g>
</svg>
