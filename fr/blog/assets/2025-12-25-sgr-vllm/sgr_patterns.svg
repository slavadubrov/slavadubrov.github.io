<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Modèles SGR</title>
  <desc id="artifact-desc">Modèles SGR.</desc>
  <defs>
    <linearGradient id="cascadeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="routingGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cycleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #dc2626;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="900" height="600" fill="#0f172a" />

  <!-- Title -->
  <text y="40" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="bold" fill="#f8fafc" text-anchor="middle" x="450">Modèles SGR</text>

  <!-- Pattern 1: Cascade -->
  <g transform="translate(30, 70)">
    <rect x="0" y="0" width="260" height="500" rx="16" fill="#1e293b" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />

    <!-- Header -->
    <rect x="0" y="0" width="260" height="50" rx="16" fill="url(#cascadeGrad)" />
    <text y="33" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#f8fafc" text-anchor="middle" x="130">📊 Chaîne de dépendances</text>

    <!-- Description -->
    <text y="75" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">Étapes de raisonnement séquentiel</text>
    <text y="92" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">Les flux de sortie se dirigent vers l’étape suivante</text>

    <!-- Flow diagram -->
    <rect x="30" y="115" width="200" height="45" rx="8" fill="#2563eb" stroke="#2563eb" stroke-width="1" />
    <text y="135" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#f8fafc" text-anchor="middle" x="130">1. résumé succinct</text>
    <text y="150" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#93c5fd" text-anchor="middle" x="130">str - Analyse de contexte</text>

    <path d="M130,160 L130,190" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrowBlue)" />

    <rect x="30" y="190" width="200" height="45" rx="8" fill="#2563eb" stroke="#2563eb" stroke-width="1" />
    <text y="210" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#f8fafc" text-anchor="middle" x="130">2. taux_de_conformité_des compétences</text>
    <text y="225" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#93c5fd" text-anchor="middle" x="130">entier [1-10] - Note</text>

    <path d="M130,235 L130,265" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrowBlue)" />

    <rect x="30" y="265" width="200" height="45" rx="8" fill="#2563eb" stroke="#2563eb" stroke-width="1" />
    <text y="285" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#f8fafc" text-anchor="middle" x="130">3. recommandation finale</text>
    <text y="300" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#93c5fd" text-anchor="middle" x="130">Literal["embaucher","refuser","garder en attente"]</text>

    <!-- Use case -->
    <line x1="20" y1="330" x2="240" y2="330" stroke="#94a3b8" stroke-width="1" />
    <text y="355" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#93c5fd" x="20">Cas d'utilisation :</text>
    <text y="375" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">• Évaluation des candidats</text>
    <text y="393" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">• Classification des documents</text>
    <text y="411" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">• Analyse de conformité</text>

    <!-- Key benefit -->
    <rect x="20" y="430" width="220" height="50" rx="8" fill="#1d4ed8" stroke="#2563eb" stroke-width="1" />
    <text y="455" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#93c5fd" text-anchor="middle" x="130">💡 Analyse des forces avant</text>
    <text y="472" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#93c5fd" text-anchor="middle" x="130">Décision – pas de raccourcis !</text>
  </g>

  <!-- Pattern 2: Routing -->
  <g transform="translate(320, 70)">
    <rect x="0" y="0" width="260" height="500" rx="16" fill="#1e293b" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />

    <!-- Header -->
    <rect x="0" y="0" width="260" height="50" rx="16" fill="url(#routingGrad)" />
    <text y="33" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#f8fafc" text-anchor="middle" x="130">🔀 Routage</text>

    <!-- Description -->
    <text y="75" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">Instruction de basculement sémantique</text>
    <text y="92" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">Types d’union pour la prise de décision</text>

    <!-- Flow diagram - Router -->
    <rect x="75" y="115" width="110" height="40" rx="8" fill="#7c3aed" stroke="#2563eb" stroke-width="1" />
    <text y="140" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#f8fafc" text-anchor="middle" x="130">Schéma du routeur</text>

    <!-- Branches -->
    <path d="M100,155 L60,185" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrowPurple)" />
    <path d="M160,155 L200,185" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrowPurple)" />

    <rect x="15" y="195" width="100" height="55" rx="8" fill="#7c3aed" stroke="#2563eb" stroke-width="1" />
    <text y="215" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#f8fafc" text-anchor="middle" x="65">Recherche de fonctionnalités</text>
    <text y="232" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#93c5fd" text-anchor="middle" x="65">outil : "fetch_user"</text>
    <text y="244" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#93c5fd" text-anchor="middle" x="65">user_id : chaîne de caractères</text>

    <rect x="145" y="195" width="100" height="55" rx="8" fill="#7c3aed" stroke="#2563eb" stroke-width="1" />
    <text y="215" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#f8fafc" text-anchor="middle" x="195">RéponseGénérale</text>
    <text y="232" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#93c5fd" text-anchor="middle" x="195">outil : « répondre »</text>
    <text y="244" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#93c5fd" text-anchor="middle" x="195">contenu : chaîne de caractères</text>

    <!-- Code snippet -->
    <rect x="20" y="265" width="220" height="55" rx="6" fill="#0f172a" stroke="#94a3b8" stroke-width="1" />
    <text y="283" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#93c5fd" x="30">classe RouterSchema(BaseModel):</text>
    <text y="298" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#93c5fd" x="30">  action : Union[</text>
    <text y="313" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#93c5fd" x="30">    FeatureLookup, RéponseGénérale]</text>

    <!-- Use case -->
    <line x1="20" y1="330" x2="240" y2="330" stroke="#94a3b8" stroke-width="1" />
    <text y="355" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#93c5fd" x="20">Cas d'utilisation :</text>
    <text y="375" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">• Classification des intentions</text>
    <text y="393" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">• Sélection des outils</text>
    <text y="411" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">• Prise en charge du tri</text>

    <!-- Key benefit -->
    <rect x="20" y="430" width="220" height="50" rx="8" fill="#5b21b6" stroke="#2563eb" stroke-width="1" />
    <text y="455" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#93c5fd" text-anchor="middle" x="130">💡 Le LLM doit sélectionner exactement</text>
    <text y="472" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#93c5fd" text-anchor="middle" x="130">Une branche valide</text>
  </g>

  <!-- Pattern 3: Cycle -->
  <g transform="translate(610, 70)">
    <rect x="0" y="0" width="260" height="500" rx="16" fill="#1e293b" stroke="#dc2626" stroke-width="2" filter="url(#shadow)" />

    <!-- Header -->
    <rect x="0" y="0" width="260" height="50" rx="16" fill="url(#cycleGrad)" />
    <text y="33" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#f8fafc" text-anchor="middle" x="130">🔄 Cycle</text>

    <!-- Description -->
    <text y="75" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">Raisonnement répété avec des listes</text>
    <text y="92" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">Contraintes minimales/maximales sur les éléments</text>

    <!-- Flow diagram - List of items -->
    <rect x="60" y="115" width="140" height="35" rx="8" fill="#dc2626" stroke="#dc2626" stroke-width="1" />
    <text y="137" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#f8fafc" text-anchor="middle" x="130">Tableau[FacteurDeRisque]</text>

    <!-- Items -->
    <rect x="30" y="165" width="80" height="50" rx="6" fill="#991b1b" stroke="#dc2626" stroke-width="1" />
    <text y="185" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#f8fafc" text-anchor="middle" x="70">Facteur 1</text>
    <text y="200" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#fca5a5" text-anchor="middle" x="70">gravité : élevée</text>

    <rect x="120" y="165" width="50" height="50" rx="6" fill="#991b1b" stroke="#dc2626" stroke-width="1" />
    <text y="195" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#fca5a5" text-anchor="middle" x="145">...</text>

    <rect x="180" y="165" width="50" height="50" rx="6" fill="#991b1b" stroke="#dc2626" stroke-width="1" />
    <text y="185" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#f8fafc" text-anchor="middle" x="205">Facteur N</text>
    <text y="200" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#fca5a5" text-anchor="middle" x="205">2 ≤ N ≤ 4</text>

    <!-- Code snippet -->
    <rect x="20" y="230" width="220" height="75" rx="6" fill="#0f172a" stroke="#94a3b8" stroke-width="1" />
    <text y="248" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#fca5a5" x="30">classe RiskFactor(BaseModel):</text>
    <text y="263" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#fca5a5" x="30">  explication : chaîne de caractères</text>
    <text y="278" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#fca5a5" x="30">  gravité : « faible »</text>
    <text y="293" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#fca5a5" x="30">                    ["moyen", "élevé"]</text>

    <!-- Use case -->
    <line x1="20" y1="320" x2="240" y2="320" stroke="#94a3b8" stroke-width="1" />
    <text y="345" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fca5a5" x="20">Cas d'utilisation :</text>
    <text y="365" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">• Évaluation des risques</text>
    <text y="383" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">• Extraction de multiples problèmes</text>
    <text y="401" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">• Appels de outils en parallèle</text>

    <!-- Key benefit -->
    <rect x="20" y="430" width="220" height="50" rx="8" fill="#991b1b" stroke="#dc2626" stroke-width="1" />
    <text y="455" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#fca5a5" text-anchor="middle" x="130">💡 Imposer un nombre minimal et maximal d’éléments</text>
    <text y="472" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#fca5a5" text-anchor="middle" x="130">avec des annotations</text>
  </g>
</svg>
