<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Модель результат выполнения доменной команды, верифицированный с помощью детерминистических правил</title>
  <desc id="desc">Элемент модель генерирует недоверенное типизированное предложение. Граница приложения парсит и нормализует его, проверяет авторизацию участника, вызывает агрегат и сохраняет принятое состояние событием типа outbox. Каждый отклонённый этап возвращает свой уникальный код ошибки.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="480" rx="22" fill="#0f172a" />
  <text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Написанный предложение ещё не является действительной бизнес-операцией</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(25 120)"><rect width="155" height="125" rx="14" fill="#5b21b6" stroke="#2563eb" stroke-width="2" /><text x="77" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#c4b5fd">Модель адаптер</text><text x="77" y="70" text-anchor="middle" font-size="12" fill="#c4b5fd">Добавление предложения по задаче</text><text x="77" y="94" text-anchor="middle" font-size="12" fill="#94a3b8">недоверенные значения</text></g>
    <text x="202" y="192" text-anchor="middle" font-size="25" fill="#94a3b8">→</text>
    <g transform="translate(225 120)"><rect width="155" height="125" rx="14" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="77" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Анализ и нормализация</text><text x="77" y="70" text-anchor="middle" font-size="12" fill="#93c5fd">форма, дата, единицы измерения</text><text x="77" y="94" text-anchor="middle" font-size="12" fill="#94a3b8">доверенный контекст</text></g>
    <text x="402" y="192" text-anchor="middle" font-size="25" fill="#94a3b8">→</text>
    <g transform="translate(425 120)"><rect width="155" height="125" rx="14" fill="#9a3412" stroke="#ea580c" stroke-width="2" /><text x="77" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#fdba74">Авторизовать</text><text x="77" y="70" text-anchor="middle" font-size="12" fill="#fdba74">актор + владелец</text><text x="77" y="94" text-anchor="middle" font-size="12" fill="#94a3b8">область применения операции</text></g>
    <text x="602" y="192" text-anchor="middle" font-size="25" fill="#94a3b8">→</text>
    <g transform="translate(625 120)"><rect width="155" height="125" rx="14" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="77" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Агрегация</text><text x="77" y="70" text-anchor="middle" font-size="12" fill="#93c5fd">обеспечение инварианта</text><text x="77" y="94" text-anchor="middle" font-size="12" fill="#94a3b8">генерация события домена</text></g>
    <text x="802" y="192" text-anchor="middle" font-size="25" fill="#94a3b8">→</text>
    <g transform="translate(825 120)"><rect width="150" height="125" rx="14" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="75" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">запуск коммита</text><text x="75" y="70" text-anchor="middle" font-size="12" fill="#93c5fd">состояние + очередь выхода</text><text x="75" y="94" text-anchor="middle" font-size="12" fill="#94a3b8">одна транзакция</text></g>

    <rect x="100" y="320" width="800" height="85" rx="14" fill="#991b1b" stroke="#dc2626" />
    <text x="500" y="351" text-anchor="middle" font-size="16" font-weight="700" fill="#fca5a5">Отклонить с указанием конкретной причины сбоя перед сохранением</text>
    <text x="500" y="382" text-anchor="middle" font-size="13" fill="#fca5a5">недействительное предложение • отсутствие контекста • неуполномоченный агент • конфликт доменов • одновременная обновление</text>
    <text x="500" y="447" text-anchor="middle" font-size="13" fill="#94a3b8">Контроллеры валидации схемы определяют способ представления данных. Агрегатные операторы отвечают за передачу бизнес-смысла.</text>
  </g>
</svg>
