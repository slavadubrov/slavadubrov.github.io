<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 430" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Контексты управления задачами, планирования и уведомлений</title>
  <desc id="desc">Управление задачами является основной областью применения. Для её реализации используется вспомогательный контекст планирования, а факты, генерируемые в этом процессе, передаются в универсальный контекст уведомлений посредством чётко определённых контрактов.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="430" rx="22" fill="#0f172a" />
  <text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Карта контекста помощника задач</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(35 120)"><rect width="250" height="190" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="125" y="42" text-anchor="middle" font-size="18" font-weight="700" fill="#93c5fd">планирование</text><text x="125" y="72" text-anchor="middle" font-size="13" fill="#93c5fd">Вспомогательный поддомен</text><text x="32" y="116" font-size="13" fill="#cbd5e1">календарь</text><text x="32" y="145" font-size="13" fill="#cbd5e1">окно времени</text><text x="32" y="174" font-size="13" fill="#cbd5e1">доступность</text></g>
    <text x="330" y="220" text-anchor="middle" font-size="11" fill="#94a3b8">дата заключения контракта →</text>
    <g transform="translate(375 95)"><rect width="250" height="240" rx="16" fill="#9a3412" stroke="#ea580c" stroke-width="3" /><text x="125" y="46" text-anchor="middle" font-size="19" font-weight="700" fill="#fdba74">Управление задачами</text><text x="125" y="78" text-anchor="middle" font-size="13" fill="#fdba74">Основная область домена</text><text x="32" y="125" font-size="13" fill="#cbd5e1">задача и список задач</text><text x="32" y="156" font-size="13" fill="#cbd5e1">сроки и приоритеты</text><text x="32" y="187" font-size="13" fill="#cbd5e1">правила завершения</text><text x="32" y="218" font-size="13" fill="#cbd5e1">Событие TaskAdded</text></g>
    <text x="670" y="220" text-anchor="middle" font-size="11" fill="#94a3b8">контракт события →</text>
    <g transform="translate(715 120)"><rect width="250" height="190" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="125" y="42" text-anchor="middle" font-size="18" font-weight="700" fill="#93c5fd">Уведомления</text><text x="125" y="72" text-anchor="middle" font-size="13" fill="#93c5fd">универсальный поддомен</text><text x="32" y="116" font-size="13" fill="#cbd5e1">доставка электронных писем</text><text x="32" y="145" font-size="13" fill="#cbd5e1">доставка с использованием push-механизма</text><text x="32" y="174" font-size="13" fill="#cbd5e1">акт приёма-передачи</text></g>
    <text x="500" y="390" text-anchor="middle" font-size="13" fill="#94a3b8">Карта контекста описывает бизнес-взаимосвязи; в ней не предусмотрено наличие по одному агенту в каждом блоке.</text>
  </g>
</svg>
