<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Шесть независимых слоев в артефакте с открытой структурой вес модель</title>
  <desc id="desc">Артефакт модель описывается с помощью информации о семействе и ревизии, роли в процессе обучения, архитектуре, числовом представлении, контейнере и расположении элементов, а также рантайм. Стрелки указывают на то, что каждый слой устанавливает ограничения для следующего, не становясь при этом его эквивалентом.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="500" rx="22" fill="#0f172a" /><text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Имя модель означает объединение нескольких независимых слоев</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(30 105)"><rect width="285" height="125" rx="15" fill="#1e293b" stroke="#64748b" /><text x="142" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#e2e8f0">1. Семейство + ревизия</text><text x="142" y="70" text-anchor="middle" font-size="13" fill="#cbd5e1">веса • токенизатор • лицензия</text><text x="142" y="96" text-anchor="middle" font-size="12" fill="#94a3b8">хранилище + коммит</text></g>
    <g transform="translate(357 105)"><rect width="285" height="125" rx="15" fill="#5b21b6" stroke="#2563eb" /><text x="142" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#c4b5fd">2. Роль обучения</text><text x="142" y="70" text-anchor="middle" font-size="13" fill="#93c5fd">база • инструктировать • ризонинг • дистиллировать</text><text x="142" y="96" text-anchor="middle" font-size="12" fill="#94a3b8">метки могут перекрываться</text></g>
    <g transform="translate(685 105)"><rect width="285" height="125" rx="15" fill="#9a3412" stroke="#ea580c" /><text x="142" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#fdba74">3. Архитектура</text><text x="142" y="70" text-anchor="middle" font-size="13" fill="#fdba74">плотность • MoE • общее / активное</text><text x="142" y="96" text-anchor="middle" font-size="12" fill="#94a3b8">совместимость ядра</text></g>
    <g transform="translate(30 275)"><rect width="285" height="125" rx="15" fill="#1d4ed8" stroke="#2563eb" /><text x="142" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">4. Числовое представление</text><text x="142" y="70" text-anchor="middle" font-size="13" fill="#93c5fd">BF16 • FP8 • GPTQ • AWQ</text><text x="142" y="96" text-anchor="middle" font-size="12" fill="#94a3b8">тип данных или метод квантизация</text></g>
    <g transform="translate(357 275)"><rect width="285" height="125" rx="15" fill="#1d4ed8" stroke="#2563eb" /><text x="142" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">5. Контейнер + лейаут</text><text x="142" y="70" text-anchor="middle" font-size="13" fill="#93c5fd">Фрагменты Safetensors • GGUF</text><text x="142" y="96" text-anchor="middle" font-size="12" fill="#94a3b8">файлы + метаданные</text></g>
    <g transform="translate(685 275)"><rect width="285" height="125" rx="15" fill="#1d4ed8" stroke="#2563eb" /><text x="142" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">6. Рантайм + аппаратное обеспечение</text><text x="142" y="70" text-anchor="middle" font-size="13" fill="#93c5fd">llama.cpp • vLLM • трансформеры</text><text x="142" y="96" text-anchor="middle" font-size="12" fill="#94a3b8">поддерживаемый путь выполнения</text></g>
    <text x="500" y="460" text-anchor="middle" font-size="13" fill="#94a3b8">Один лишь суффикс не может подтвердить качество выполнения задачи, соответствие объему памяти или скорость сервинг.</text>
  </g>
</svg>
