<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Анатомия LLM: варианты против форматов</title>
  <desc id="artifact-desc">Анатомия LLM: варианты против форматов.</desc>
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .node { fill: #1d4ed8; stroke: #94a3b8; stroke-width: 2; rx: 10; ry: 10; }
      .node-highlight { fill: #2563eb; stroke: #2563eb; stroke-width: 2; rx: 10; ry: 10; }
      .node-accent { fill: #dc2626; stroke: #dc2626; stroke-width: 2; rx: 10; ry: 10; }
      .text { font-family: Inter, system-ui, sans-serif; fill: #93c5fd; font-size: 14px; text-anchor: middle; }
      .text-title { font-family: Inter, system-ui, sans-serif; fill: #0f172a; font-size: 16px; font-weight: bold; text-anchor: middle; }
      .text-label { font-family: Inter, system-ui, sans-serif; fill: #93c5fd; font-size: 12px; text-anchor: middle; }
      .arrow { stroke: #2563eb; stroke-width: 2; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>


  <rect width="800" height="400" class="bg" />


  <text y="40" class="text" style="font-size: 24px; fill: #93c5fd; font-weight: bold;" x="400">Анатомия LLM: варианты против форматов</text>


  <rect x="300" y="80" width="200" height="60" class="node-highlight" />
  <text y="115" class="text-title" x="400">Согласие на использование модели</text>
  <text y="130" class="text" style="fill: #0f172a; font-size: 12px;" x="400">(например, Llama-3-8B)</text>


  <path d="M 300 110 L 200 110 L 200 180" class="arrow" fill="none" marker-end="url(#arrowhead)" />
  <rect x="100" y="180" width="200" height="100" class="node" />
  <text y="210" class="text" style="font-weight: bold; fill: #93c5fd;" x="200">Вариант модели</text>
  <text y="230" class="text-label" x="200">«Спецификация»</text>
  <text y="250" class="text" x="200">База, Инструкции, Дистилляция,</text>
  <text y="270" class="text" x="200" transform="translate(153.12 0.00)">Модель с эмбеддингами на основе операций (MoE), квантованные адаптивные трансформаторы (QAT)</text>


  <path d="M 500 110 L 600 110 L 600 180" class="arrow" fill="none" marker-end="url(#arrowhead)" />
  <rect x="500" y="180" width="200" height="100" class="node" />
  <text y="210" class="text" style="font-weight: bold; fill: #fca5a5;" x="600">Формат файла</text>
  <text y="230" class="text-label" x="600">«Контейнер»</text>
  <text y="250" class="text" x="600">GGUF, GPTQ, AWQ,</text>
  <text y="270" class="text" x="600">EXL2, Safetensors</text>


  <path d="M 200 280 L 200 330" class="arrow" fill="none" marker-end="url(#arrowhead)" />
  <rect x="100" y="330" width="200" height="50" class="node" style="stroke-dasharray: 4;" />
  <text y="360" class="text" x="200">Определяет возможности</text>

  <path d="M 600 280 L 600 330" class="arrow" fill="none" marker-end="url(#arrowhead)" />
  <rect x="500" y="330" width="200" height="50" class="node" style="stroke-dasharray: 4;" />
  <text y="360" class="text" x="600">Определение аппаратного обеспечения</text>

</svg>
