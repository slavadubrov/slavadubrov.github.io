<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="Inter, system-ui, sans-serif" role="img" aria-label="The reference Docker Compose topology" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Эталонная топология Docker Compose</title>
  <defs>
    <filter id="ds4" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#334155" flood-opacity="0.08" />
    </filter>
    <marker id="arr4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="960" height="560" fill="#f8fafc" />

  <text y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a" x="480">Топология для справки Docker Compose</text>
  <text y="54" text-anchor="middle" font-size="13" fill="#334155" x="480">slavadubrov/агент-аналитик-рынка · LangGraph + Claude + Postgres + Qdrant + MCP</text>

  <!-- Internal network boundary -->
  <rect x="40" y="80" width="880" height="450" rx="14" ry="14" fill="#ffffff" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="6 4" />
  <text y="105" font-size="12" font-weight="600" fill="#1d4ed8" letter-spacing="0.5" x="60">СЕТЬ DOCKER · внутренняя</text>

  <!-- agent-worker (center) -->
  <g filter="url(#ds4)">
    <rect x="380" y="180" width="200" height="100" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
    <text y="208" text-anchor="middle" font-size="15" font-weight="700" fill="#1d4ed8" x="480">агент-рабочий процесс</text>
    <text y="228" text-anchor="middle" font-size="11" fill="#334155" x="480">LangGraph харнесс</text>
    <text y="244" text-anchor="middle" font-size="11" fill="#334155" x="480">объем рабочих пространств на thread_id</text>
    <text y="262" text-anchor="middle" font-size="11" fill="#334155" x="480">claude-sonnet-4-5</text>
  </g>

  <!-- postgres (left) -->
  <g filter="url(#ds4)">
    <rect x="80" y="200" width="160" height="70" rx="10" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.8" />
    <text y="226" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6" x="160">PostgreSQL</text>
    <text y="246" text-anchor="middle" font-size="11" fill="#334155" x="160">PostgresSaver чекпоинты</text>
    <text y="262" text-anchor="middle" font-size="10" fill="#334155" x="160">объем pgdata</text>
  </g>

  <!-- qdrant (left bottom) -->
  <g filter="url(#ds4)">
    <rect x="80" y="320" width="160" height="70" rx="10" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.8" />
    <text y="346" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6" x="160">qdrant</text>
    <text y="366" text-anchor="middle" font-size="11" fill="#334155" x="160">холодная память · эмбеддинги</text>
    <text y="382" text-anchor="middle" font-size="10" fill="#334155" x="160">объем хранилища qdrant_storage</text>
  </g>

  <!-- redis (top) -->
  <g filter="url(#ds4)">
    <rect x="380" y="120" width="200" height="44" rx="10" fill="#faf5ff" stroke="#2563eb" stroke-width="1.8" />
    <text y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8" x="480">Redis · очередь входящих сообщений</text>
  </g>

  <!-- mcp-sidecar (right) -->
  <g filter="url(#ds4)">
    <rect x="720" y="200" width="160" height="70" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="1.8" />
    <text y="226" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b" x="800">mcp-сайдкар</text>
    <text y="246" text-anchor="middle" font-size="11" fill="#334155" x="800">инструменты · поддерживают OAuth токены</text>
    <text y="262" text-anchor="middle" font-size="10" fill="#334155" x="800">рабочий процесс никогда не имеет доступа к учетным данным</text>
  </g>

  <!-- otel collector (bottom center) -->
  <g filter="url(#ds4)">
    <rect x="380" y="320" width="200" height="48" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="1.8" />
    <text y="350" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b" x="480">сборщик данных отелей</text>
  </g>

  <!-- observability stack (right column bottom) -->
  <g filter="url(#ds4)">
    <rect x="640" y="320" width="240" height="170" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="1.4" />
    <text y="344" text-anchor="middle" font-size="12" font-weight="700" fill="#334155" x="760">Observability (необязательно)</text>
    <rect x="660" y="360" width="90" height="32" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.2" />
    <text y="380" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b" x="705">частота обновления</text>
    <rect x="760" y="360" width="100" height="32" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.2" />
    <text y="380" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b" x="810">Prometheus</text>
    <rect x="660" y="400" width="90" height="32" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.2" />
    <text y="420" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b" x="705">LoKI</text>
    <rect x="760" y="400" width="100" height="32" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.2" />
    <text y="420" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b" x="810">Graphana</text>
    <text y="455" text-anchor="middle" font-size="10" fill="#334155" x="760">связан с gen_ai.conversation.id</text>
    <text y="472" text-anchor="middle" font-size="10" fill="#334155" x="760">имя_агента_gen_ai · все_способы_использования_gen_ai</text>
  </g>

  <!-- Anthropic API (outside network) -->
  <g filter="url(#ds4)">
    <rect x="380" y="450" width="200" height="42" rx="10" fill="#faf5ff" stroke="#2563eb" stroke-width="1.8" />
    <text y="476" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8" x="480">Anthropic API · LLM</text>
  </g>
  <text y="510" text-anchor="middle" font-size="10" fill="#334155" font-style="italic" x="480">вне сети Docker · ключ API из файла .env / Vault</text>

  <!-- Connections -->
  <!-- worker -> postgres -->
  <path d="M380 230 L 240 230" fill="none" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#arr4)" />
  <text y="222" text-anchor="middle" font-size="10" fill="#334155" x="305">чекпоинты</text>

  <!-- worker -> qdrant -->
  <path d="M390 280 C 320 300 280 320 240 340" fill="none" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#arr4)" />
  <text y="316" text-anchor="middle" font-size="10" fill="#334155" x="315">retrieval</text>

  <!-- redis -> worker -->
  <path d="M480 164 L 480 180" fill="none" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#arr4)" />

  <!-- worker -> mcp -->
  <path d="M580 230 L 720 230" fill="none" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#arr4)" />
  <text y="222" text-anchor="middle" font-size="10" fill="#334155" x="650">tool calls</text>

  <!-- worker -> otel -->
  <path d="M480 280 L 480 320" fill="none" stroke="#dc2626" stroke-width="1.4" marker-end="url(#arr4)" stroke-dasharray="3 3" />
  <text y="305" font-size="10" fill="#991b1b" x="500">спаны</text>

  <!-- otel -> observability -->
  <path d="M580 344 L 640 360" fill="none" stroke="#dc2626" stroke-width="1.4" marker-end="url(#arr4)" stroke-dasharray="3 3" />

  <!-- mcp -> otel  -->
  <path d="M800 270 C 800 300 600 330 580 345" fill="none" stroke="#dc2626" stroke-width="1.2" marker-end="url(#arr4)" stroke-dasharray="3 3" />

  <!-- worker -> anthropic API (downward, exiting network) -->
  <path d="M480 280 C 480 410 480 430 480 450" fill="none" stroke="#2563eb" stroke-width="1.4" marker-end="url(#arr4)" stroke-dasharray="5 4" opacity="0.65" />
  <text y="425" font-size="10" fill="#1d4ed8" x="500">модель вызов</text>
</svg>
