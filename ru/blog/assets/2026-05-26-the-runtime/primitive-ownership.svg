    <text y="96" x="585">Сэндбокс</text>
    <text y="96" x="800">Сессия + Чекпоинт</text>
    <text y="96" x="1015">Трейс</text>
  </g>
  <line x1="20" y1="106" x2="1120" y2="106" stroke="#2563eb" stroke-width="1" />

  <!-- Row 1: SDK in app server (y_rect=118, y_text=140) -->
  <text y="140" font-size="13" font-weight="600" fill="#0f172a" x="30">1. SDK в сервере приложения</text>
  <g filter="url(#ds4)">
