<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 640" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Where each primitive lives in each deployment shape" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Местоположение каждой примитивной фигуры внутри соответствующей деплой формы</title>
  <defs>
    <filter id="ds4" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#334155" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="1140" height="640" fill="#f8fafc" />

  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a" x="570">Местоположение каждой примитивной фигуры внутри соответствующей деплой формы</text>
  <text y="54" text-anchor="middle" font-size="12" fill="#334155" x="570">Зеленый цвет — форма предоставляет этот примитив. Серый цвет — подключение осуществляется извне. Красный цвет — не применимо.</text>

  <!-- Column headers -->
  <g font-size="11" font-weight="700" letter-spacing="0.6" fill="#334155" text-anchor="middle">
