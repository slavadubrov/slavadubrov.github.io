    <rect x="480" y="118" width="210" height="34" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1.2" />
    <rect x="695" y="118" width="210" height="34" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1.2" />
