    <text x="585" y="96">SANDBOX</text>
    <text x="800" y="96">SESSION + CHECKPOINT</text>
    <text x="1015" y="96">TRACE</text>
  </g>
  <line x1="20" y1="106" x2="1120" y2="106" stroke="#cfd8dc" stroke-width="1" />

