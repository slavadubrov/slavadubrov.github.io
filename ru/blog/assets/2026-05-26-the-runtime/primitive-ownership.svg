  <rect width="1140" height="640" fill="#f8f9fa" />

  <!-- Title -->
  <text x="570" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#263238">Где живёт каждый примитив в каждом варианте развёртывания</text>
  <text x="570" y="54" text-anchor="middle" font-size="12" fill="#546e7a">Зелёный = вариант даёт этот примитив. Серый = подключаете извне. Красный = не применимо.</text>

  <!-- Column headers -->
  <g font-size="11" font-weight="700" letter-spacing="0.6" fill="#37474f" text-anchor="middle">
