<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 600" font-family="Inter, system-ui, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Failure modes a long-running agent has to survive</title>
  <desc id="artifact-desc">Failure modes a long-running agent has to survive.</desc>
  <defs>
    <filter id="ds2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#334155" flood-opacity="0.08"/>
    </filter>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="940" height="600" fill="#f8fafc"/>

  <text y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a" x="470">Failure modes a long-running agent has to survive</text>
  <text y="56" text-anchor="middle" font-size="13" fill="#334155" x="470">Left: the failure. Right: the mitigation and where it lives in the runtime.</text>

  <!-- Column headers -->
  <text y="92" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b" letter-spacing="0.6" x="200">FAILURE MODE</text>
  <text y="92" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" letter-spacing="0.6" x="740">MITIGATION · RUNTIME HOOK</text>

  <!-- Rows -->
  <!-- Row 1: Premature completion -->
  <g filter="url(#ds2)">
    <rect x="40" y="110" width="320" height="56" rx="8" ry="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.4"/>
    <text y="132" font-size="13" font-weight="700" fill="#991b1b" x="56">Premature completion</text>
    <text y="152" font-size="11" fill="#334155" x="56">Agent declares victory after one turn</text>
  </g>
  <path d="M360 138 L 540 138" stroke="#94a3b8" stroke-width="1.4" fill="none" marker-end="url(#arr2)"/>
  <g filter="url(#ds2)">
    <rect x="540" y="110" width="360" height="56" rx="8" ry="8" fill="#f0fdf4" stroke="#166534" stroke-width="1.4"/>
    <text y="132" font-size="13" font-weight="700" fill="#166534" x="556">Independent reviewer with its own context</text>
    <text y="152" font-size="11" fill="#334155" x="556">Read-only tools · each check defaults to FAIL</text>
  </g>

  <!-- Row 2: Feature amnesia -->
  <g filter="url(#ds2)">
    <rect x="40" y="178" width="320" height="56" rx="8" ry="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.4"/>
    <text y="200" font-size="13" font-weight="700" fill="#991b1b" x="56">Feature amnesia</text>
    <text y="220" font-size="11" fill="#334155" x="56">Each cold boot forgets prior progress</text>
  </g>
  <path d="M360 206 L 540 206" stroke="#94a3b8" stroke-width="1.4" fill="none" marker-end="url(#arr2)"/>
  <g filter="url(#ds2)">
    <rect x="540" y="178" width="360" height="56" rx="8" ry="8" fill="#f0fdf4" stroke="#166534" stroke-width="1.4"/>
    <text y="200" font-size="13" font-weight="700" fill="#166534" x="556">Initializer re-reads progress files on boot</text>
    <text y="220" font-size="11" fill="#334155" x="556">PROGRESS.md, feature-list.json · before first model call</text>
  </g>

  <!-- Row 3: Duplicated work -->
  <g filter="url(#ds2)">
    <rect x="40" y="246" width="320" height="56" rx="8" ry="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.4"/>
    <text y="268" font-size="13" font-weight="700" fill="#991b1b" x="56">Duplicated work after reset</text>
    <text y="288" font-size="11" fill="#334155" x="56">Same step re-run after process restart</text>
  </g>
  <path d="M360 274 L 540 274" stroke="#94a3b8" stroke-width="1.4" fill="none" marker-end="url(#arr2)"/>
  <g filter="url(#ds2)">
    <rect x="540" y="246" width="360" height="56" rx="8" ry="8" fill="#f0fdf4" stroke="#166534" stroke-width="1.4"/>
    <text y="268" font-size="13" font-weight="700" fill="#166534" x="556">Checkpoint to Postgres + handoff file</text>
    <text y="288" font-size="11" fill="#334155" x="556">Append-only log · resume from last completed node</text>
  </g>

  <!-- Row 4: Context anxiety -->
  <g filter="url(#ds2)">
    <rect x="40" y="314" width="320" height="56" rx="8" ry="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.4"/>
    <text y="336" font-size="13" font-weight="700" fill="#991b1b" x="56">Context anxiety</text>
    <text y="356" font-size="11" fill="#334155" x="56">Model quits early as window fills</text>
  </g>
  <path d="M360 342 L 540 342" stroke="#94a3b8" stroke-width="1.4" fill="none" marker-end="url(#arr2)"/>
  <g filter="url(#ds2)">
    <rect x="540" y="314" width="360" height="56" rx="8" ry="8" fill="#f0fdf4" stroke="#166534" stroke-width="1.4"/>
    <text y="336" font-size="13" font-weight="700" fill="#166534" x="556">Cap usage at 200k inside a 1M-token window</text>
    <text y="356" font-size="11" fill="#334155" x="556">Driver ends the session early, resumes from checkpoint</text>
  </g>

  <!-- Row 5: Stuck loops -->
  <g filter="url(#ds2)">
    <rect x="40" y="382" width="320" height="56" rx="8" ry="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.4"/>
    <text y="404" font-size="13" font-weight="700" fill="#991b1b" x="56">Stuck loops · retry storms</text>
    <text y="424" font-size="11" fill="#334155" x="56">Same tool call retried forever</text>
  </g>
  <path d="M360 410 L 540 410" stroke="#94a3b8" stroke-width="1.4" fill="none" marker-end="url(#arr2)"/>
  <g filter="url(#ds2)">
    <rect x="540" y="382" width="360" height="56" rx="8" ry="8" fill="#f0fdf4" stroke="#166534" stroke-width="1.4"/>
    <text y="404" font-size="13" font-weight="700" fill="#166534" x="556">Cap iterations · backoff · circuit breaker</text>
    <text y="424" font-size="11" fill="#334155" x="556">Tool-call decorator · Temporal RetryPolicy</text>
  </g>

  <!-- Row 6: Workspace drift -->
  <g filter="url(#ds2)">
    <rect x="40" y="450" width="320" height="56" rx="8" ry="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.4"/>
    <text y="472" font-size="13" font-weight="700" fill="#991b1b" x="56">Workspace drift</text>
    <text y="492" font-size="11" fill="#334155" x="56">Agent edits files outside its task</text>
  </g>
  <path d="M360 478 L 540 478" stroke="#94a3b8" stroke-width="1.4" fill="none" marker-end="url(#arr2)"/>
  <g filter="url(#ds2)">
    <rect x="540" y="450" width="360" height="56" rx="8" ry="8" fill="#f0fdf4" stroke="#166534" stroke-width="1.4"/>
    <text y="472" font-size="13" font-weight="700" fill="#166534" x="556">Per-session workspace, scoped path access</text>
    <text y="492" font-size="11" fill="#334155" x="556">Deep Agents middleware, or Daytona/Runloop fork</text>
  </g>

  <!-- Row 7: Runaway cost / lost work -->
  <g filter="url(#ds2)">
    <rect x="40" y="518" width="320" height="56" rx="8" ry="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.4"/>
    <text y="540" font-size="13" font-weight="700" fill="#991b1b" x="56">Runaway cost · lost work on crash</text>
    <text y="560" font-size="11" fill="#334155" x="56">Budget burn · process or sandbox dies</text>
  </g>
  <path d="M360 546 L 540 546" stroke="#94a3b8" stroke-width="1.4" fill="none" marker-end="url(#arr2)"/>
  <g filter="url(#ds2)">
    <rect x="540" y="518" width="360" height="56" rx="8" ry="8" fill="#f0fdf4" stroke="#166534" stroke-width="1.4"/>
    <text y="540" font-size="13" font-weight="700" fill="#166534" x="556">Token budget · kill switch · log outside the process</text>
    <text y="560" font-size="11" fill="#334155" x="556">gen_ai.usage counters · wake(sessionId) to resume</text>
  </g>
</svg>
