<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 340" role="img" aria-label="ReAct Pattern" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="artifact-title">ReAct шаблон</title>
  <defs>
    <linearGradient id="thoughtGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #2563eb" />
      <stop offset="100%" style="stop-color: #7c3aed" />
    </linearGradient>
    <linearGradient id="actionGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #c4b5fd" />
      <stop offset="100%" style="stop-color: #dc2626" />
    </linearGradient>
    <linearGradient id="observeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #2563eb" />
      <stop offset="100%" style="stop-color: #2563eb" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="450" height="340" fill="#f8fafc" />

  <!-- Title -->
  <text y="30" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#0f172a" x="225">ReAct шаблон</text>

  <!-- Thought Box -->
  <rect x="150" y="50" width="150" height="50" rx="8" fill="url(#thoughtGrad)" filter="url(#shadow)" />
  <text y="80" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#ffffff" x="225">Мышление</text>

  <!-- Arrow 1 -->
  <path d="M225 100 L225 130" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />

  <!-- Action Box -->
  <rect x="150" y="140" width="150" height="50" rx="8" fill="url(#actionGrad)" filter="url(#shadow)" />
  <text y="170" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#ffffff" x="225">Действие</text>

  <!-- Arrow 2 -->
  <path d="M225 190 L225 220" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />

  <!-- Observe Box -->
  <rect x="150" y="230" width="150" height="50" rx="8" fill="url(#observeGrad)" filter="url(#shadow)" />
  <text y="260" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#ffffff" x="225">Наблюдайте</text>

  <!-- Loop Arrow - curves from Observe to Thought box on the right side -->
  <path d="M300 255 Q370 255 370 165 Q370 75 310 75" stroke="#94a3b8" stroke-width="2" fill="none" stroke-dasharray="5,3" />
  <polygon points="310,70 300,75 310,80" fill="#94a3b8" />

  <!-- Side Labels - positioned to the left of the boxes -->
  <text y="80" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" x="140">причины LLM</text>
  <text y="170" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" x="140">LLM определяет выбранный инструмент →</text>
  <text y="260" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" x="140">Инструмент возвращает результат →</text>

  <!-- Repeat Label -->
  <text y="320" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#334155" font-style="italic" x="225">Повторять до завершения работы</text>
</svg>
