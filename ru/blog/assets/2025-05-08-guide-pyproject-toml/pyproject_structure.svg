<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Четыре границы принадлежности в pyproject.toml</title>
  <desc id="desc">Четыре типа карт определяют структуру системы сборки для процесса сборки бэкенд, проект для хранения публикуемых метаданных, группы зависимостей для неопубликованных сред, а пространства имен инструментов — для настроек, специфичных для конкретных инструментов.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="650" rx="28" fill="#0f172a" />
  <text x="600" y="68" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="31" font-weight="700">Один файл, четыре владельца</text>
  <text x="600" y="104" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="17">Классифицируйте настройку по её потребителю перед выбором таблицы</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(70 155)"><rect width="500" height="185" rx="20" fill="#1d4ed8" /><text x="30" y="48" fill="#93c5fd" font-size="23" font-weight="700">[система_компиляции]</text><text x="30" y="88" fill="#93c5fd" font-size="18">Владелец: разработка фронтенд и бэкенд</text><text x="30" y="124" fill="#93c5fd" font-size="16">бэкенд идентичность • изолированные требования к сборке</text><text x="30" y="154" fill="#93c5fd" font-size="16">дерево исходного кода → sdist и wheel</text></g>
    <g transform="translate(630 155)"><rect width="500" height="185" rx="20" fill="#5b21b6" /><text x="30" y="48" fill="#93c5fd" font-size="23" font-weight="700">[project]</text><text x="30" y="88" fill="#93c5fd" font-size="18">Владелец: потребители пакетов</text><text x="30" y="124" fill="#c4b5fd" font-size="16">идентичность • требования к рантайм • дополнительные параметры</text><text x="30" y="154" fill="#c4b5fd" font-size="16">опубликовано в качестве метаданных распространения</text></g>
    <g transform="translate(70 385)"><rect width="500" height="185" rx="20" fill="#166534" /><text x="30" y="48" fill="#93c5fd" font-size="23" font-weight="700">[группы_зависимостей]</text><text x="30" y="88" fill="#93c5fd" font-size="18">Владелец: локальный рабочий процесс</text><text x="30" y="124" fill="#93c5fd" font-size="16">тестирование • проверка кода • документация • среды, отличные от пакетных</text><text x="30" y="154" fill="#93c5fd" font-size="16">не указано в метаданных пакета</text></g>
    <g transform="translate(630 385)"><rect width="500" height="185" rx="20" fill="#9a3412" /><text x="30" y="48" fill="#fdba74" font-size="23" font-weight="700">[tool.*]</text><text x="30" y="88" fill="#fdba74" font-size="18">Владелец: указанный инструмент</text><text x="30" y="124" fill="#fdba74" font-size="16">ключи и семантика, определённые инструментом</text><text x="30" y="154" fill="#fdba74" font-size="16">отсутствие общей схемы между пространствами имён</text></g>
  </g>
</svg>
