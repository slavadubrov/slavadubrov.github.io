<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Разные потребители читают разные пространства имён в файле pyproject.toml</title>
  <desc id="desc">Центральный файл pyproject.toml обеспечивает связь между инструментами сборки фронтенды и бэкенды, утилитами для установки пакетов и их поиска, менеджерами сред и инструментами разработки. Каждый из этих компонентов генерирует отдельный результат или выполняет определённую операцию.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#64748b" /></marker></defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="680" rx="28" fill="#0f172a" />
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Общее местоположение не означает общую семантику</text>
  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <rect x="420" y="260" width="360" height="150" rx="24" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" />
    <text x="600" y="323" fill="#93c5fd" font-size="27" font-weight="700">pyproject.toml</text>
    <text x="600" y="360" fill="#93c5fd" font-size="16">декларации + конфигурация</text>

    <path d="M500 260 L330 182" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
    <rect x="70" y="92" width="310" height="105" rx="18" fill="#1d4ed8" />
    <text x="225" y="132" fill="#93c5fd" font-size="20" font-weight="700">система сборки</text>
    <text x="225" y="164" fill="#93c5fd" font-size="15">генерирует sdist и wheel</text>

    <path d="M700 260 L870 182" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
    <rect x="820" y="92" width="310" height="105" rx="18" fill="#5b21b6" />
    <text x="975" y="132" fill="#93c5fd" font-size="20" font-weight="700">инсталлятор + резолвер</text>
    <text x="975" y="164" fill="#c4b5fd" font-size="15">выбирает среду</text>

    <path d="M500 410 L330 492" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
    <rect x="70" y="480" width="310" height="105" rx="18" fill="#166534" />
    <text x="225" y="520" fill="#93c5fd" font-size="20" font-weight="700">Менеджер среды</text>
    <text x="225" y="552" fill="#93c5fd" font-size="15">синхронизация групп + запись блокировки</text>

    <path d="M700 410 L870 492" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
    <rect x="820" y="480" width="310" height="105" rx="18" fill="#9a3412" />
    <text x="975" y="520" fill="#fdba74" font-size="20" font-weight="700">именованный инструмент</text>
    <text x="975" y="552" fill="#fdba74" font-size="15">читает только собственное пространство имён</text>

    <text x="600" y="636" fill="#94a3b8" font-size="16">Проверьте каждую таблицу с учетом документации соответствующего клиента-использователя.</text>
  </g>
</svg>
