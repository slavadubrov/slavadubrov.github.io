<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" font-family="Inter, system-ui, sans-serif'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Production tiered architecture showing confidence-based routing: documents flow through preprocessing, then Tier 1 (PaddleOCR/Tesseract), with low-confidence results escalating to Tier 2 (Qwen3-VL/dots.ocr) and Tier 3 (Gemini Pro/GPT-5.2), ending in post-processing and human review" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Архитектура производственного уровня с иерархией обработки на основе уровня уверенности роутинг: документы проходят предварительную обработку, затем обрабатываются на уровне 1 (PaddleOCR/Tesseract); результаты с низким уровнем уверенности передаются на уровень 2 (Qwen3-VL и др. ocr), а затем — на уровень 3 (Gemini Pro/GPT-5.2), после чего происходит постобработка и проверка человеком</title>
  <!-- Background -->
  <rect width="880" height="480" fill="#ffffff" rx="8" />
  <defs>
    <!-- Background grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width="1" />
    </pattern>

    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>

    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="gradOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ea580c" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <linearGradient id="gradPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>

    <!-- Arrow markers -->
    <marker id="arrow1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a" />
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ea580c" />
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="100%" height="100%" fill="#f8fafc" />

  <!-- Title -->
  <text x="440" y="32" font-size="20" font-weight="bold" fill="#1d4ed8" text-anchor="middle">Производственная среда OCR: многоуровневая роутинг</text>
  <text x="440" y="52" font-size="13" fill="#64748b" text-anchor="middle">Калибровать каждый контрольный этап качества для классов документов с метками</text>

  <!-- Input -->
  <g transform="translate(20, 195)">
    <rect width="100" height="70" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
    <text x="50" y="27" font-size="12" font-weight="bold" fill="#1d4ed8" text-anchor="middle">Входящий</text>
    <text x="50" y="43" font-size="12" font-weight="bold" fill="#1d4ed8" text-anchor="middle">документация</text>
    <text x="50" y="59" font-size="9" fill="#64748b" text-anchor="middle">PDF, изображения</text>
  </g>

  <!-- Arrow to preprocessing -->
  <line x1="120" y1="230" x2="155" y2="230" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow1)" />

  <!-- Preprocessing -->
  <g transform="translate(155, 190)">
    <rect width="110" height="80" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)" />
    <text x="55" y="25" font-size="12" font-weight="bold" fill="#1d4ed8" text-anchor="middle">Предобработка</text>
    <text x="55" y="42" font-size="10" fill="#64748b" text-anchor="middle">Устранение смещения, бинаризация</text>
    <text x="55" y="55" font-size="10" fill="#64748b" text-anchor="middle">Нормализация DPI</text>
    <text x="55" y="68" font-size="10" fill="#64748b" text-anchor="middle">работники CPU</text>
  </g>


  <!-- TIER 1: Fast/Cheap -->
  <g transform="translate(310, 65)">
    <rect width="160" height="100" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
    <rect width="160" height="30" rx="8" fill="url(#gradBlue)" clip-path="inset(0 0 70px 0)" />
    <path d="M0,20 L160,20 L160,30 L0,30 Z" fill="url(#gradBlue)" />
    <text x="80" y="20" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Уровень 1: быстрый локальный путь</text>

    <text x="80" y="50" font-size="11" font-weight="bold" fill="#1d4ed8" text-anchor="middle">PaddleOCR / Tesseract</text>
    <text x="80" y="65" font-size="10" fill="#64748b" text-anchor="middle">CPU-только</text>
    <text x="80" y="80" font-size="10" fill="#64748b" text-anchor="middle">Очистка отпечатанных документов</text>
    <text x="80" y="94" font-size="10" font-weight="bold" fill="#166534" text-anchor="middle">Измерение процента успешных тестов</text>
  </g>

  <!-- TIER 2: Mid-tier VLM -->
  <g transform="translate(310, 180)">
    <rect width="160" height="100" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="2" filter="url(#shadow)" />
    <rect width="160" height="30" rx="8" fill="url(#gradOrange)" clip-path="inset(0 0 70px 0)" />
    <path d="M0,20 L160,20 L160,30 L0,30 Z" fill="url(#gradOrange)" />
    <text x="80" y="20" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Уровень 2: более мощный модель</text>

    <text x="80" y="50" font-size="11" font-weight="bold" fill="#9a3412" text-anchor="middle">Qwen3-VL / точки.ocr</text>
    <text x="80" y="65" font-size="10" fill="#64748b" text-anchor="middle">или Gemini 3 Flash</text>
    <text x="80" y="80" font-size="10" fill="#64748b" text-anchor="middle">Разметка и изображения с сниженным качеством</text>
    <text x="80" y="94" font-size="10" font-weight="bold" fill="#9a3412" text-anchor="middle">Измерение процента успешных тестов</text>
  </g>

  <!-- TIER 3: Premium VLM -->
  <g transform="translate(310, 295)">
    <rect width="160" height="100" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)" />
    <rect width="160" height="30" rx="8" fill="url(#gradPurple)" clip-path="inset(0 0 70px 0)" />
    <path d="M0,20 L160,20 L160,30 L0,30 Z" fill="url(#gradPurple)" />
    <text x="80" y="20" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Уровень 3: путь ревью</text>

    <text x="80" y="50" font-size="11" font-weight="bold" fill="#5b21b6" text-anchor="middle">Gemini 3 Pro / GPT-5.2</text>
    <text x="80" y="65" font-size="10" fill="#64748b" text-anchor="middle">Размещённый на VLM или втором модель</text>
    <text x="80" y="80" font-size="10" fill="#64748b" text-anchor="middle">Сложные макеты, рукописный ввод</text>
    <text x="80" y="94" font-size="10" font-weight="bold" fill="#5b21b6" text-anchor="middle">Измерение коэффициента обзоров</text>
  </g>

  <!-- Confidence routing arrows -->
  <!-- Preprocess to Tier 1 -->
  <path d="M 265 230 L 290 230 L 290 115 L 310 115" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)" />

  <!-- Tier 1 -> confidence check -->
  <line x1="470" y1="115" x2="530" y2="115" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)" />

  <!-- Confidence check box 1 -->
  <rect x="530" y="82" width="100" height="65" rx="25" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)" />
  <text x="580" y="108" font-size="11" font-weight="bold" fill="#1d4ed8" text-anchor="middle">шлюз качества</text>
  <text x="580" y="122" font-size="11" font-weight="bold" fill="#1d4ed8" text-anchor="middle">проходят?</text>

  <!-- High conf -> Output -->
  <line x1="630" y1="115" x2="700" y2="115" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)" />
  <text x="665" y="106" font-size="10" font-weight="bold" fill="#166534" text-anchor="middle">Да</text>

  <!-- Low conf -> Tier 2 -->
  <path d="M 580 147 L 580 172 L 290 172 L 290 230 L 310 230" fill="none" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)" />
  <text x="590" y="158" font-size="10" font-weight="bold" fill="#dc2626">Нет</text>

  <!-- Tier 2 -> confidence check 2 -->
  <line x1="470" y1="230" x2="530" y2="230" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)" />

  <!-- Confidence check box 2 -->
  <rect x="530" y="197" width="100" height="65" rx="25" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)" />
  <text x="580" y="223" font-size="11" font-weight="bold" fill="#1d4ed8" text-anchor="middle">шлюз качества</text>
  <text x="580" y="237" font-size="11" font-weight="bold" fill="#1d4ed8" text-anchor="middle">проходят?</text>

  <!-- High conf -> Output -->
  <line x1="630" y1="230" x2="700" y2="230" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)" />
  <text x="665" y="221" font-size="10" font-weight="bold" fill="#166534" text-anchor="middle">Да</text>

  <!-- Low conf -> Tier 3 -->
  <path d="M 580 262 L 580 287 L 290 287 L 290 345 L 310 345" fill="none" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-purple)" />
  <text x="590" y="273" font-size="10" font-weight="bold" fill="#dc2626">Нет</text>

  <!-- Tier 3 -> Output -->
  <path d="M 470 345 L 700 345" fill="none" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-purple)" />

  <!-- Output / Post-processing -->
  <g transform="translate(700, 70)">
    <rect width="155" height="325" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" filter="url(#shadow)" />
    <text x="77" y="55" font-size="14" font-weight="bold" fill="#166534" text-anchor="middle">постобработка</text>
    <text x="77" y="75" font-size="11" fill="#1d4ed8" text-anchor="middle">Проверка схемы</text>
    <text x="77" y="90" font-size="11" fill="#1d4ed8" text-anchor="middle">Фильтрация по уровню уверенности</text>
    <text x="77" y="105" font-size="11" fill="#1d4ed8" text-anchor="middle">Проверка орфографии / LM</text>

    <line x1="77" y1="120" x2="77" y2="135" stroke="#cbd5e1" stroke-width="2" />

    <text x="77" y="155" font-size="13" font-weight="bold" fill="#166534" text-anchor="middle">структурированный</text>
    <text x="77" y="170" font-size="13" font-weight="bold" fill="#166534" text-anchor="middle">Выходные данные</text>
    <text x="77" y="190" font-size="11" fill="#1d4ed8" text-anchor="middle">JSON / Markdown</text>

    <line x1="77" y1="205" x2="77" y2="220" stroke="#cbd5e1" stroke-width="2" />

    <text x="77" y="240" font-size="11" fill="#991b1b" text-anchor="middle">нерешённые или</text>
    <text x="77" y="255" font-size="11" fill="#991b1b" text-anchor="middle">области с высоким уровнем риска:</text>
    <rect x="25" y="265" width="105" height="25" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1" />
    <text x="77" y="282" font-size="12" font-weight="bold" fill="#991b1b" text-anchor="middle">Проверка человеком</text>
    <text x="77" y="305" font-size="10" fill="#64748b" text-anchor="middle">Запись журнала аудита сохранена</text>
  </g>

  <!-- Cost annotations -->
  <g transform="translate(65, 420)">
    <rect width="790" height="35" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)" />
    <text x="95" y="22" font-size="12" fill="#1d4ed8" text-anchor="middle" font-weight="bold">Отслеживание стоимости CPU</text>
    <text x="305" y="22" font-size="12" fill="#9a3412" text-anchor="middle" font-weight="bold">Отслеживание стоимости GPU/API</text>
    <text x="525" y="22" font-size="12" fill="#5b21b6" text-anchor="middle" font-weight="bold">Затраты на повторные попытки отслеживания</text>
    <text x="715" y="22" font-size="12" fill="#991b1b" text-anchor="middle" font-weight="bold">Оценка стоимости отслеживания</text>
  </g>

</svg>
