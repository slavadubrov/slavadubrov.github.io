<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" font-family="Inter, system-ui, sans-serif'Segoe UI', Roboto, Helvetica, Arial, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">OCR в современной стеке ИИ</title>
  <desc id="artifact-desc">OCR в современной стеке ИИ.</desc>
  <!-- Background -->
  <rect width="920" height="420" fill="#f8fafc" rx="8" />
  <defs>
    <!-- Background grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width="1" />
    </pattern>

    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>

    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="gradOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ea580c" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <linearGradient id="gradPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="gradGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16a34a" />
      <stop offset="100%" stop-color="#166534" />
    </linearGradient>

    <!-- Arrow markers -->
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" />
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ea580c" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="100%" height="100%" fill="#f8fafc" />

  <!-- Title -->
  <text y="32" font-size="20" font-weight="bold" fill="#1d4ed8" text-anchor="middle" x="460">OCR в современной стеке ИИ</text>
  <text y="52" font-size="13" fill="#64748b" text-anchor="middle" x="460">От сырых документов до прозрачных выводов, полученных с помощью ИИ</text>

  <!-- ==================== LEFT: Document Sources ==================== -->
  <g transform="translate(30, 80)">
    <!-- Section header -->
    <rect width="200" height="32" rx="6" fill="url(#gradBlue)" />
    <text y="21" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle" x="100">Источники документации</text>

    <!-- Cards -->
    <rect y="42" width="200" height="50" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)" />
    <text y="63" font-size="22" x="36">📄</text>
    <text y="63" font-size="12" font-weight="600" fill="#1d4ed8" x="68">Файлы PDF и Word</text>
    <text y="80" font-size="10" fill="#64748b" x="68">Контракты, отчеты, руководства</text>

    <rect y="102" width="200" height="50" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)" />
    <text y="123" font-size="22" x="36">🖼️</text>
    <text y="123" font-size="12" font-weight="600" fill="#1d4ed8" x="68">Отсканированные документы</text>
    <text y="140" font-size="10" fill="#64748b" x="68">Счета-фактуры, квитанции, формы</text>

    <rect y="162" width="200" height="50" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)" />
    <text y="183" font-size="22" x="36">📸</text>
    <text y="183" font-size="12" font-weight="600" fill="#1d4ed8" x="68">Фотографии и скриншоты</text>
    <text y="200" font-size="10" fill="#64748b" x="68">Доски для записей, знаки, интерфейс пользователя</text>

    <rect y="222" width="200" height="50" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)" />
    <text y="243" font-size="22" x="36">📧</text>
    <text y="243" font-size="12" font-weight="600" fill="#1d4ed8" x="68">Электронные письма и вложения</text>
    <text y="260" font-size="10" fill="#64748b" x="68">Встроенные изображения, PDF-файлы</text>
  </g>

  <!-- ==================== CENTER: OCR Layer ==================== -->
  <g transform="translate(310, 80)">
    <!-- Section header -->
    <rect width="300" height="32" rx="6" fill="url(#gradOrange)" />
    <text y="21" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle" x="150">Слой OCR — мост связи</text>

    <!-- Main box -->
    <rect y="42" width="300" height="230" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadow)" />

    <!-- Text extraction -->
    <text y="72" font-size="13" font-weight="bold" fill="#9a3412" text-anchor="middle" x="150">Извлечение текста и структуры</text>

    <rect x="20" y="86" width="120" height="36" rx="5" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
    <text y="100" font-size="10" font-weight="600" fill="#1d4ed8" text-anchor="middle" x="80">Традиционный OCR</text>
    <text y="114" font-size="9" fill="#64748b" text-anchor="middle" x="80">Tesseract, PaddleOCR</text>

    <rect x="160" y="86" width="120" height="36" rx="5" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
    <text y="100" font-size="10" font-weight="600" fill="#1d4ed8" text-anchor="middle" x="220">ВЛМы</text>
    <text y="114" font-size="9" fill="#64748b" text-anchor="middle" x="220">Gemini, Claude, GPT</text>

    <rect x="20" y="132" width="120" height="36" rx="5" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
    <text y="146" font-size="10" font-weight="600" fill="#1d4ed8" text-anchor="middle" x="80">Специализированные модели</text>
    <text y="160" font-size="9" fill="#64748b" text-anchor="middle" x="80">dots.ocr, Qwen3-VL</text>

    <rect x="160" y="132" width="120" height="36" rx="5" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
    <text y="146" font-size="10" font-weight="600" fill="#1d4ed8" text-anchor="middle" x="220">Анализ разметки</text>
    <text y="160" font-size="9" fill="#64748b" text-anchor="middle" x="220">Таблицы, заголовки, списки</text>

    <!-- Output arrow label -->
    <line x1="150" y1="180" x2="150" y2="210" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)" />
    <rect x="55" y="215" width="190" height="44" rx="6" fill="#ea580c" opacity="0.12" />
    <text y="234" font-size="11" font-weight="bold" fill="#9a3412" text-anchor="middle" x="150">Результат: очищенный текст, таблицы.</text>
    <text y="250" font-size="11" font-weight="bold" fill="#9a3412" text-anchor="middle" x="150">структура и метаданные</text>
  </g>

  <!-- ==================== RIGHT: AI Consumers ==================== -->
  <g transform="translate(690, 80)">
    <!-- Section header -->
    <rect width="200" height="32" rx="6" fill="url(#gradPurple)" />
    <text y="21" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle" x="100">Потребители ИИ</text>

    <!-- RAG Pipeline -->
    <rect y="42" width="200" height="70" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)" />
    <text y="63" font-size="12" font-weight="bold" fill="#5b21b6" text-anchor="middle" x="100">Пайплайны RAG</text>
    <text y="80" font-size="9" fill="#64748b" text-anchor="middle" x="100">Блок → Встраивание → База данных векторов</text>
    <text y="94" font-size="9" fill="#64748b" text-anchor="middle" x="100">→ Получение → Ответ LLM</text>

    <!-- AI Agents -->
    <rect y="122" width="200" height="56" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)" />
    <text y="143" font-size="12" font-weight="bold" fill="#5b21b6" text-anchor="middle" x="100">Агенты ИИ</text>
    <text y="160" font-size="9" fill="#64748b" text-anchor="middle" x="100">Чтение документов, заполнение форм</text>

    <!-- Enterprise QA -->
    <rect y="188" width="200" height="56" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)" />
    <text y="209" font-size="12" font-weight="bold" fill="#5b21b6" text-anchor="middle" x="100">Корпоративное тестирование качества</text>
    <text y="226" font-size="9" fill="#64748b" text-anchor="middle" x="100">Поиск контрактов, соблюдение нормативов, базы знаний</text>

    <!-- Domain Apps -->
    <rect y="254" width="200" height="56" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)" />
    <text y="275" font-size="12" font-weight="bold" fill="#5b21b6" text-anchor="middle" x="100">Приложения в домене</text>
    <text y="292" font-size="9" fill="#64748b" text-anchor="middle" x="100">Медицинский, юридический, финансовый</text>
  </g>

  <!-- ==================== Arrows: Sources → OCR ==================== -->
  <line x1="230" y1="200" x2="305" y2="200" stroke="#2563eb" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-blue)" />

  <!-- ==================== Arrows: OCR → Consumers ==================== -->
  <line x1="610" y1="200" x2="685" y2="200" stroke="#7c3aed" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-gray)" />

  <!-- ==================== Bottom callout ==================== -->
  <g transform="translate(230, 365)">
    <rect width="460" height="40" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1" />
    <text y="17" font-size="11" font-weight="bold" fill="#9a3412" text-anchor="middle" x="230">⚠️ Качество OCR определяет максимальный уровень качества последующих ИИ-моделей</text>
    <text y="33" font-size="10" fill="#64748b" text-anchor="middle" x="230">Искажённый текст на входе → искажённые ответы на выходе. Ни встраивание данных, ни промпты не могут исправить плохую обработку информации.</text>
  </g>
</svg>
