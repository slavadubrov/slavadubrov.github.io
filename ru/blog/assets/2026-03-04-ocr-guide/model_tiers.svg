<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%" role="img" aria-label="Three-tier model landscape showing Traditional engines (Tesseract, PaddleOCR, EasyOCR), Specialized VLMs (dots.ocr, GOT-OCR, DeepSeek-OCR), and Frontier VLMs (Gemini, Claude, GPT) with accuracy and cost trade-offs" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="artifact-title">Трехуровневая схема модель, демонстрирующая традиционные движки (Tesseract, PaddleOCR, EasyOCR), специализированные решения VLMs (dots.ocr, GOT-OCR, DeepSeek-OCR) и передовые модели VLMs (Gemini, Claude, GPT) с учётом баланса между точностью и затратами</title>
  <defs>
    <!-- Background grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#ffffff" />
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width="1" />
    </pattern>

    <!-- Drop shadow for the cards -->
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>

    <!-- Clip paths for the rounded card corners to contain the headers/footers -->
    <clipPath id="clip1"><rect x="120" y="300" width="180" height="110" rx="8" /></clipPath>
    <clipPath id="clip2"><rect x="330" y="170" width="200" height="110" rx="8" /></clipPath>
    <clipPath id="clip3"><rect x="550" y="40" width="220" height="110" rx="8" /></clipPath>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="800" height="500" fill="#ffffff" />

  <!-- Main Title -->
  <text x="400" y="40" font-family="Inter, system-ui, sans-serif'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="24" font-weight="bold" fill="#1d4ed8" text-anchor="middle">уровни OCR модель</text>
  <text x="400" y="65" font-family="Inter, system-ui, sans-serif'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Сопоставление затрат и сложности с уровнем функциональных возможностей</text>

  <!-- Axis Lines -->
  <!-- Y Axis (Capability) -->
  <line x1="80" y1="440" x2="80" y2="80" stroke="#94a3b8" stroke-width="2" />
  <polygon points="80,70 75,80 85,80" fill="#94a3b8" />
  <text x="60" y="260" font-family="Inter, system-ui, sans-serif'Segoe UI', sans-serif" font-size="13" font-weight="bold" fill="#64748b" text-anchor="middle" transform="rotate(-90 60,260)">Возможности / Генерализация</text>

  <!-- X Axis (Cost) -->
  <line x1="80" y1="440" x2="750" y2="440" stroke="#94a3b8" stroke-width="2" />
  <polygon points="760,440 750,435 750,445" fill="#94a3b8" />
  <text x="415" y="475" font-family="Inter, system-ui, sans-serif'Segoe UI', sans-serif" font-size="13" font-weight="bold" fill="#64748b" text-anchor="middle">Требования к затратам и вычислительным ресурсам</text>

  <!-- Conceptual progression, not a fitted performance curve -->
  <path d="M 80 440 Q 350 400 750 150" fill="#ffffff" fill-opacity="0" stroke="#ea580c" stroke-width="3" stroke-dasharray="8,4" stroke-opacity="0.4" />

  <!-- TIER 1: TRADITIONAL OCR -->
  <!-- Base card with drop shadow and border -->
  <rect x="120" y="300" width="180" height="110" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="1.5" />
  <g clip-path="url(#clip1)">
    <!-- Header -->
    <rect x="120" y="300" width="180" height="32" fill="#16a34a" />
    <text x="210" y="321" font-family="Inter, system-ui, sans-serif'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Традиционные OCR</text>
    <!-- Highlight Footer -->
    <rect x="120" y="385" width="180" height="25" fill="#f0fdf4" />
    <text x="210" y="402" font-family="Inter, system-ui, sans-serif'Segoe UI', sans-serif" font-size="11" font-weight="bold" fill="#166534" text-anchor="middle">Сначала протестируйте на чистых сканах</text>
  </g>
  <!-- Body Text -->
  <text x="130" y="354" font-family="Inter, system-ui, sans-serif'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#1d4ed8">Локальный путь CPU</text>
  <text x="130" y="374" font-family="Inter, system-ui, sans-serif'Segoe UI', sans-serif" font-size="12" fill="#64748b">Tesseract, PaddleOCR</text>


  <!-- TIER 2: SPECIALIZED VLMs -->
  <!-- Base card with drop shadow and border -->
  <rect x="330" y="170" width="200" height="110" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.5" />
  <g clip-path="url(#clip2)">
    <!-- Header -->
    <rect x="330" y="170" width="200" height="32" fill="#2563eb" />
    <text x="430" y="191" font-family="Inter, system-ui, sans-serif'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Специализированный VLMs</text>
    <!-- Highlight Footer -->
    <rect x="330" y="255" width="200" height="25" fill="#eff6ff" />
    <text x="430" y="272" font-family="Inter, system-ui, sans-serif'Segoe UI', sans-serif" font-size="11" font-weight="bold" fill="#1d4ed8" text-anchor="middle">Тестирование на квитанциях и формах</text>
  </g>
  <!-- Body Text -->
  <text x="340" y="224" font-family="Inter, system-ui, sans-serif'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#1d4ed8">Оптимизированная структура разметки</text>
  <text x="340" y="244" font-family="Inter, system-ui, sans-serif'Segoe UI', sans-serif" font-size="12" fill="#64748b">точки.ocr, DeepSeek-OCR</text>


  <!-- TIER 3: FRONTIER VLMs -->
  <!-- Base card with drop shadow and border -->
  <rect x="550" y="40" width="220" height="110" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5" />
  <g clip-path="url(#clip3)">
    <!-- Header -->
    <rect x="550" y="40" width="220" height="32" fill="#7c3aed" />
    <text x="660" y="61" font-family="Inter, system-ui, sans-serif'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Frontier VLMs</text>
    <!-- Highlight Footer -->
    <rect x="550" y="125" width="220" height="25" fill="#faf5ff" />
    <text x="660" y="142" font-family="Inter, system-ui, sans-serif'Segoe UI', sans-serif" font-size="11" font-weight="bold" fill="#5b21b6" text-anchor="middle">Тестирование на сложных визуальных задачах</text>
  </g>
  <!-- Body Text -->
  <text x="560" y="94" font-family="Inter, system-ui, sans-serif'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#1d4ed8">Логические операции ризонинг и VQA</text>
  <text x="560" y="114" font-family="Inter, system-ui, sans-serif'Segoe UI', sans-serif" font-size="12" fill="#64748b">Gemini 3 Flash, GPT-5.2</text>

</svg>
