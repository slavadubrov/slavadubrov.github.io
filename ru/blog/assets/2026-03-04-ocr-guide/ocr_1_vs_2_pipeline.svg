<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%" role="img" aria-label="Comparison of OCR-1.0 modular pipeline (detect, recognize, post-process) versus OCR-2.0 unified VLM approach (single model handles all stages)" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="artifact-title">Сравнение модульного подхода OCR-1.0 к обработке данных пайплайн (обнаружение, распознавание, постобработка) и унифицированного подхода OCR-2.0 с использованием VLM (один модель обрабатывает все этапы)</title>
  <defs>
    <!-- Background grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width="1" />
    </pattern>

    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Gradients -->
    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="gradOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ea580c" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <linearGradient id="gradGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16a34a" />
      <stop offset="100%" stop-color="#16a34a" />
    </linearGradient>
    <linearGradient id="gradPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>

    <!-- Arrow head -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8" />
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" />
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="100%" height="100%" fill="#ffffff" />
  <rect width="100%" height="100%" fill="#f8fafc" />

  <!-- Title -->
  <text x="400" y="40" font-family="Inter, system-ui, sans-serif'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="24" font-weight="bold" fill="#1d4ed8" text-anchor="middle">OCR-1.0 против OCR-2.0</text>
  <text x="400" y="65" font-family="Inter, system-ui, sans-serif'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Модульные этапы в сравнении с совместной генерацией текста и структуры</text>

  <!-- Section 1: Traditional Pipeline -->
  <rect x="50" y="100" width="700" height="150" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" />
  <text x="70" y="125" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="bold" fill="#64748b">OCR-1.0: модульные пайплайн (например, Tesseract, PaddleOCR)</text>

  <!-- Input Doc -->
  <g transform="translate(60, 150)">
    <rect width="80" height="80" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)" />
    <rect x="15" y="15" width="50" height="8" rx="2" fill="#cbd5e1" />
    <rect x="15" y="30" width="50" height="8" rx="2" fill="#cbd5e1" />
    <rect x="15" y="45" width="30" height="8" rx="2" fill="#cbd5e1" />
    <text x="40" y="95" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">документация</text>
  </g>

  <!-- Arrow -->
  <path d="M 150 190 L 180 190" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Step 1: Detect -->
  <g transform="translate(190, 150)">
    <rect width="100" height="80" rx="4" fill="url(#gradBlue)" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
    <text x="50" y="35" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Обнаружение</text>
    <text x="50" y="55" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">CRAFT / DBNet</text>
    <text x="50" y="70" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">YOLO</text>
    <text x="50" y="-10" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#dc2626" text-anchor="middle">Ошибки каскад</text>
  </g>

  <!-- Arrow -->
  <path d="M 300 190 L 330 190" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Step 2: Recognize -->
  <g transform="translate(340, 150)">
    <rect width="100" height="80" rx="4" fill="url(#gradBlue)" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
    <text x="50" y="35" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">распознавание</text>
    <text x="50" y="55" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">CRNN / SVTR</text>
    <text x="50" y="70" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">декодирование CTC</text>
    <text x="50" y="-10" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#dc2626" text-anchor="middle">Ошибки каскад</text>
  </g>

  <!-- Arrow -->
  <path d="M 450 190 L 480 190" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Step 3: Post-processing -->
  <g transform="translate(490, 150)">
    <rect width="100" height="80" rx="4" fill="url(#gradBlue)" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
    <text x="50" y="35" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">постобработка</text>
    <text x="50" y="55" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Проверка орфографии</text>
    <text x="50" y="70" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">коррекция LM</text>
  </g>

  <!-- Arrow -->
  <path d="M 600 190 L 630 190" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Output -->
  <g transform="translate(640, 150)">
    <rect width="80" height="80" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" filter="url(#shadow)" />
    <text x="40" y="35" font-family="SFMono-Regular, Consolas, monospace" font-size="12" fill="#0f172a" text-anchor="middle">Простой</text>
    <text x="40" y="55" font-family="SFMono-Regular, Consolas, monospace" font-size="12" fill="#0f172a" text-anchor="middle">Текст</text>
    <text x="40" y="95" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#166534" font-weight="bold" text-anchor="middle">Цепочка ошибок</text>
  </g>


  <!-- Section 2: VLM Pipeline -->
  <rect x="50" y="300" width="700" height="150" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" />
  <text x="70" y="325" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="bold" fill="#5b21b6">OCR-2.0: совместный путь VLM (например, Gemini, Qwen-VL, точки.ocr)</text>

  <!-- Input Doc -->
  <g transform="translate(60, 350)">
    <rect width="80" height="80" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)" />
    <rect x="15" y="15" width="50" height="8" rx="2" fill="#cbd5e1" />
    <rect x="15" y="30" width="50" height="8" rx="2" fill="#cbd5e1" />
    <rect x="15" y="45" width="30" height="8" rx="2" fill="#cbd5e1" />
    <text x="40" y="95" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">документация</text>
  </g>

  <!-- Arrow -->
  <path d="M 150 390 L 260 390" fill="none" stroke="#7c3aed" stroke-width="3" marker-end="url(#arrowPurple)" />

  <!-- VLM Block -->
  <g transform="translate(270, 340)">
    <rect width="320" height="100" rx="8" fill="url(#gradPurple)" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)" />

    <!-- Vision Encoder -->
    <rect x="25" y="30" width="110" height="40" rx="4" fill="#ffffff" fill-opacity="0.2" stroke="#ffffff" stroke-width="1" />
    <text x="80" y="55" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Кодировщик изображений</text>

    <!-- Connector -->
    <path d="M 145 50 L 175 50" fill="none" stroke="#ffffff" stroke-width="2" stroke-dasharray="4,2" />

    <!-- LLM Decoder -->
    <rect x="185" y="30" width="110" height="40" rx="4" fill="#ffffff" fill-opacity="0.2" stroke="#ffffff" stroke-width="1" />
    <text x="240" y="55" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">LLM декодер</text>

    <text x="160" y="90" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Генерация текста и структуры совместно</text>
  </g>

  <!-- Arrow -->
  <path d="M 600 390 L 630 390" fill="none" stroke="#7c3aed" stroke-width="3" marker-end="url(#arrowPurple)" />

  <!-- Output -->
  <g transform="translate(640, 350)">
    <rect width="80" height="80" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" filter="url(#shadow)" />
    <text x="40" y="35" font-family="SFMono-Regular, Consolas, monospace" font-size="12" fill="#0f172a" text-anchor="middle">JSON /</text>
    <text x="40" y="55" font-family="SFMono-Regular, Consolas, monospace" font-size="12" fill="#0f172a" text-anchor="middle">Markdown</text>
    <text x="40" y="95" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#166534" font-weight="bold" text-anchor="middle">Метрики задачи</text>
  </g>

</svg>
