<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" font-family="Inter, system-ui, sans-serif" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="title">Слияние Rust и Arrow</title>
  <desc id="desc">Слои, обеспечивающие связь между Python APIs и нативной средой выполнения Rust, а также обмен столбчатыми данными в формате, совместимом с Arrow.</desc>
  <defs>
    <!-- Animations -->
    <style>
      /* Base invisible class */
      .anim-box { opacity: 0; }

      /* Build from bottom up */
      .layer-3 { animation: fadeSlideUp 0.6s ease-out 0s forwards; }
      .layer-2 { animation: fadeSlideUp 0.6s ease-out 0.4s forwards; }
      .layer-1-a { animation: fadeSlideUp 0.6s ease-out 0.8s forwards; }
      .layer-1-b { animation: fadeSlideUp 0.6s ease-out 1.0s forwards; }
      .layer-1-c { animation: fadeSlideUp 0.6s ease-out 1.2s forwards; }
      .layer-1-d { animation: fadeSlideUp 0.6s ease-out 1.4s forwards; }

      @keyframes fadeSlideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="900" height="450" rx="12" fill="#f8fafc" stroke="#f8fafc" stroke-width="1" />

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">Нативная реализация и обмен совместимый с Arrow</text>
  <text x="450" y="52" text-anchor="middle" font-size="13" fill="#334155">Точное поведение рантайм и механизм копирования различаются в зависимости от движка и оператора.</text>

  <!-- LAYER 1: The Engines (Top) -->

  <!-- Polars -->
  <g class="anim-box layer-1-a">
    <path d="M 120 160 Q 120 150 130 150 L 250 150 Q 260 150 260 160 L 260 190 L 120 190 Z" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
    <text x="190" y="172" text-anchor="middle" font-size="14" font-weight="bold" fill="#1d4ed8">Polars</text>
    <text x="190" y="185" text-anchor="middle" font-size="9" fill="#334155">Библиотека DataFrame</text>
  </g>

  <!-- DataFusion -->
  <g class="anim-box layer-1-b">
    <path d="M 280 160 Q 280 150 290 150 L 410 150 Q 420 150 420 160 L 420 190 L 280 190 Z" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" />
    <text x="350" y="172" text-anchor="middle" font-size="14" font-weight="bold" fill="#5b21b6">Слияние данных</text>
    <text x="350" y="185" text-anchor="middle" font-size="9" fill="#334155">Механизм обработки запросов</text>
  </g>

  <!-- Daft -->
  <g class="anim-box layer-1-c">
    <path d="M 480 160 Q 480 150 490 150 L 610 150 Q 620 150 620 160 L 620 190 L 480 190 Z" fill="#fff7ed" stroke="#ea580c" stroke-width="2" />
    <text x="550" y="172" text-anchor="middle" font-size="14" font-weight="bold" fill="#9a3412">некорректный код</text>
    <text x="550" y="185" text-anchor="middle" font-size="9" fill="#334155">мультимодальный</text>
  </g>

  <!-- Ray -->
  <g class="anim-box layer-1-d">
    <path d="M 640 160 Q 640 150 650 150 L 770 150 Q 780 150 780 160 L 780 190 L 640 190 Z" fill="#f0fdf4" stroke="#166534" stroke-width="2" />
    <text x="710" y="172" text-anchor="middle" font-size="14" font-weight="bold" fill="#166534">Данные лучей</text>
    <text x="710" y="185" text-anchor="middle" font-size="9" fill="#334155">Распределённая масштабируемость</text>
  </g>

  <!-- LAYER 2: The Unified Foundation (Middle) -->
  <g class="anim-box layer-2">
    <!-- Main base container -->
    <rect x="120" y="190" width="660" height="90" fill="#ffffff" stroke="#334155" stroke-width="2" />

    <!-- Divider -->
    <line x1="450" y1="190" x2="450" y2="280" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,4" />

    <!-- Left side: Rust -->
    <text x="285" y="230" text-anchor="middle" font-size="20" font-weight="bold" fill="#9a3412">Корневые компоненты</text>
    <text x="285" y="250" text-anchor="middle" font-size="12" fill="#334155">Часто реализуется на Rust</text>

    <!-- Right side: Apache Arrow -->
    <text x="615" y="230" text-anchor="middle" font-size="20" font-weight="bold" fill="#1d4ed8">Apache Arrow</text>
    <text x="615" y="250" text-anchor="middle" font-size="12" fill="#334155">Формат данных в виде колонок в памяти</text>
  </g>

  <!-- LAYER 3: The Outcomes (Bottom) -->
  <g class="anim-box layer-3">
    <!-- Connecting struts -->
    <rect x="250" y="280" width="10" height="30" fill="#cbd5e1" />
    <rect x="445" y="280" width="10" height="30" fill="#cbd5e1" />
    <rect x="640" y="280" width="10" height="30" fill="#cbd5e1" />

    <rect x="155" y="310" width="200" height="80" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="2" />
    <text x="255" y="342" text-anchor="middle" font-size="15" font-weight="bold" fill="#166534">Отсутствует трейсинг GC</text>
    <text x="255" y="365" text-anchor="middle" font-size="11" fill="#334155">Права собственности и заимствование</text>
    <text x="255" y="380" text-anchor="middle" font-size="10" fill="#334155">Исключает паузы, связанные с трейсинг-GC, в коде на Rust</text>

    <rect x="350" y="310" width="200" height="80" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
    <text x="450" y="342" text-anchor="middle" font-size="15" font-weight="bold" fill="#1d4ed8">Более дешевый экшейнжер</text>
    <text x="450" y="365" text-anchor="middle" font-size="11" fill="#334155">Интерфейс PyCapsule</text>
    <text x="450" y="380" text-anchor="middle" font-size="10" fill="#334155">Совместимые буферы могут быть повторно использованы</text>

    <rect x="545" y="310" width="200" height="80" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2" />
    <text x="645" y="342" text-anchor="middle" font-size="15" font-weight="bold" fill="#9a3412">Более безопасная конкурентность</text>
    <text x="645" y="365" text-anchor="middle" font-size="11" fill="#334155">проверки во время компиляции</text>
    <text x="645" y="380" text-anchor="middle" font-size="10" fill="#334155">Множество ситуаций конкурентных доступов к данным отклоняются в безопасном Rust</text>
  </g>
</svg>
