<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="Inter, system-ui, sans-serif" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="title">Структурированные и мультимодальные рабочие нагрузки</title>
  <desc id="desc">Сравнение табличной обработки, ориентированной на CPU, с пайплайны, который координирует вводные данные, CPU предобработку и GPU инференс.</desc>
  <defs>
    <style>
      @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.05); }
        100% { transform: scale(1); }
      }
      .cpu-anim { transform-origin: 100px 125px; animation: pulse 2s infinite ease-in-out; }
      .gpu-anim { transform-origin: 550px 125px; animation: pulse 2s infinite ease-in-out; }
    </style>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <!-- Background -->
  <rect width="900" height="400" rx="12" fill="#f8fafc" stroke="#f8fafc" stroke-width="1" />

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">Два мира данных</text>

  <!-- Divider -->
  <line x1="450" y1="55" x2="450" y2="370" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4" />

  <!-- LEFT: Reality A -->
  <rect x="30" y="55" width="390" height="310" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" />
  <text x="225" y="82" text-anchor="middle" font-size="16" font-weight="bold" fill="#1d4ed8">Структурированные данные</text>

  <!-- CPU icon -->
  <g class="cpu-anim">
    <rect x="60" y="100" width="80" height="50" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="1.5" />
    <rect x="72" y="110" width="56" height="30" rx="3" fill="#eff6ff" />
    <text x="100" y="130" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">CPU</text>
  </g>

  <!-- Table icon -->
  <rect x="180" y="100" width="100" height="50" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="1.5" />
  <line x1="180" y1="118" x2="280" y2="118" stroke="#2563eb" stroke-width="1" />
  <line x1="180" y1="130" x2="280" y2="130" stroke="#2563eb" stroke-width="0.8" />
  <line x1="180" y1="140" x2="280" y2="140" stroke="#2563eb" stroke-width="0.8" />
  <line x1="220" y1="100" x2="220" y2="150" stroke="#2563eb" stroke-width="0.8" />
  <text x="230" y="113" text-anchor="middle" font-size="9" font-weight="bold" fill="#1d4ed8">Строки и столбцы</text>

  <!-- Characteristics -->
  <text x="60" y="185" font-size="13" font-weight="bold" fill="#0f172a">Как правило, имеют высокую нагрузку на CPU</text>
  <text x="60" y="205" font-size="12" fill="#334155">фильтрация, объединение и агрегация</text>
  <text x="60" y="230" font-size="13" font-weight="bold" fill="#0f172a">Масштабирование после измерения</text>
  <text x="60" y="250" font-size="12" fill="#334155">Возможно, достаточно использовать крупный узел</text>
  <text x="60" y="270" font-size="12" fill="#334155">для большого количества аналитических запросов</text>

  <!-- Tag -->
  <rect x="55" y="295" width="340" height="50" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text x="225" y="315" text-anchor="middle" font-size="11" fill="#1d4ed8">Polars / DuckDB / DataFusion обрабатывают это на одном устройстве.</text>
  <text x="225" y="333" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">Протестируйте путь масштабирования перед добавлением кластера.</text>

  <!-- RIGHT: Reality B -->
  <rect x="480" y="55" width="390" height="310" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" />
  <text x="675" y="82" text-anchor="middle" font-size="16" font-weight="bold" fill="#9a3412">мультимодальный AI</text>

  <!-- GPU icon -->
  <g class="gpu-anim">
    <rect x="510" y="100" width="80" height="50" rx="6" fill="#ffffff" stroke="#ea580c" stroke-width="1.5" />
    <rect x="522" y="110" width="56" height="30" rx="3" fill="#fff7ed" />
    <text x="550" y="130" text-anchor="middle" font-size="11" font-weight="bold" fill="#9a3412">GPU</text>
  </g>

  <!-- Media icons -->
  <g transform="translate(630, 100)">
    <rect width="30" height="24" rx="3" fill="#fff7ed" stroke="#ea580c" stroke-width="1" />
    <text x="15" y="16" text-anchor="middle" font-size="9" fill="#9a3412">Изображение</text>
  </g>
  <g transform="translate(670, 100)">
    <rect width="30" height="24" rx="3" fill="#fff7ed" stroke="#ea580c" stroke-width="1" />
    <text x="15" y="16" text-anchor="middle" font-size="9" fill="#9a3412">VID</text>
  </g>
  <g transform="translate(710, 100)">
    <rect width="30" height="24" rx="3" fill="#fff7ed" stroke="#ea580c" stroke-width="1" />
    <text x="15" y="16" text-anchor="middle" font-size="9" fill="#9a3412">PDF</text>
  </g>
  <g transform="translate(750, 100)">
    <rect width="30" height="24" rx="3" fill="#fff7ed" stroke="#ea580c" stroke-width="1" />
    <text x="15" y="16" text-anchor="middle" font-size="9" fill="#9a3412">WAV</text>
  </g>

  <!-- Example utilization bar -->
  <rect x="510" y="145" width="330" height="18" rx="4" fill="#cbd5e1" stroke="#cbd5e1" stroke-width="0.5" />
  <rect x="510" y="145" width="132" height="18" rx="4" fill="#dc2626" />
  <text x="675" y="158" text-anchor="middle" font-size="11" fill="#334155">Throughput выполняется на самом медленном этапе</text>

  <!-- Characteristics -->
  <text x="510" y="195" font-size="13" font-weight="bold" fill="#0f172a">Часто имеет высокую нагрузку на ускорители</text>
  <text x="510" y="215" font-size="12" fill="#334155">изображения, видео, аудио, тензоры</text>
  <text x="510" y="240" font-size="13" font-weight="bold" fill="#0f172a">Расширение пайплайны</text>
  <text x="510" y="260" font-size="12" fill="#334155">1 строка (путь к PDF) расширяется до</text>
  <text x="510" y="278" font-size="12" fill="#334155">тысячи чанки + эмбеддинги</text>

  <!-- Tag -->
  <rect x="505" y="295" width="340" height="50" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text x="675" y="315" text-anchor="middle" font-size="11" fill="#9a3412">Ray Data и Daft предоставляют средства управления для</text>
  <text x="675" y="333" text-anchor="middle" font-size="11" font-weight="bold" fill="#9a3412">ресурсы совместного типа CPU и GPU.</text>

  <!-- Bottom note -->
  <rect x="250" y="375" width="400" height="22" rx="4" fill="#f1f5f9" />
  <text x="450" y="391" text-anchor="middle" font-size="11" font-weight="bold" fill="#334155">Выбирайте метод на основе тестирования «от начала до конца» с использованием репрезентативных данных.</text>
</svg>
