<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="Inter, system-ui, sans-serif" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="title">многомоторный пайплайн</title>
  <desc id="desc">Необязательный канал передачи данных от открытого хранилища с использованием табличных преобразований, мультимодальной обработки и локального анализа.</desc>
  <defs>
    <!-- Arrow marker for regular paths -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
    </marker>
    <!-- Animations -->
    <style>
      .flow { opacity: 0; animation: flowMove 6s infinite; }
      @keyframes flowMove {
        0% { opacity: 0; stroke-dashoffset: 400; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { opacity: 0; stroke-dashoffset: 0; }
      }
      .path-line { stroke-dasharray: 400; }
      .p1 { animation-delay: 0s; stroke: #94a3b8; }
      .p2-top { animation-delay: 2s; stroke: #ea580c; }
      .p2-bot { animation-delay: 2s; stroke: #2563eb; }
    </style>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="900" height="400" rx="12" fill="#f8fafc" stroke="#f8fafc" stroke-width="1" />

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">Один из возможных вариантов ретрансляции с использованием нескольких двигателей</text>
  <text x="450" y="52" text-anchor="middle" font-size="13" fill="#334155">Добавляйте движок только тогда, когда граница этапа оправдывает свои операционные затраты.</text>

  <!-- Node 1: Data Lake -->
  <rect x="50" y="160" width="160" height="130" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text x="130" y="195" text-anchor="middle" font-size="15" font-weight="bold" fill="#334155">Озеро данных</text>
  <text x="130" y="225" text-anchor="middle" font-size="12" fill="#334155">Чистые логи</text>
  <text x="130" y="245" text-anchor="middle" font-size="12" fill="#334155">JSON / CSV</text>
  <text x="130" y="265" text-anchor="middle" font-size="12" fill="#334155">Неструктурированные файлы</text>

  <!-- Path 1: Lake -> Spark -->
  <path id="path1" d="M 210 225 L 340 225" fill="none" class="path-line p1 flow" stroke-width="4" marker-end="url(#arrow)" />
  <line x1="210" y1="225" x2="335" y2="225" stroke="#2563eb" stroke-width="3" stroke-dasharray="6,4" />

  <!-- Node 2: Spark / Dask -->
  <rect x="350" y="160" width="180" height="130" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="2" />
  <text x="440" y="195" text-anchor="middle" font-size="15" font-weight="bold" fill="#334155">Spark / Dask</text>
  <text x="440" y="225" text-anchor="middle" font-size="12" fill="#334155">Устоявшиеся процессы ETL и очистки данных</text>
  <text x="440" y="245" text-anchor="middle" font-size="12" fill="#334155">Распределённые объединения</text>
  <rect x="390" y="260" width="100" height="20" rx="4" fill="#334155" />
  <text x="440" y="274" text-anchor="middle" font-size="9" fill="#ffffff">Вывод в формат Parquet / Delta</text>

  <!-- Path 2 Top: Spark -> Ray/Daft -->
  <path id="path2top" d="M 530 195 C 600 195, 600 135, 660 135" fill="none" class="path-line p2-top flow" stroke-width="4" marker-end="url(#arrow)" />
  <path d="M 530 195 C 600 195, 600 135, 655 135" fill="none" stroke="#ea580c" stroke-width="3" stroke-dasharray="6,4" />

  <rect x="535" y="140" width="100" height="24" rx="4" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text x="585" y="156" text-anchor="middle" font-size="10" font-weight="bold" fill="#9a3412">Parquet / Delta Lake</text>

  <!-- Node 3 Top: Ray / Daft -->
  <rect x="670" y="70" width="180" height="130" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2" />
  <text x="760" y="105" text-anchor="middle" font-size="15" font-weight="bold" fill="#9a3412">луч / Daft</text>
  <text x="760" y="135" text-anchor="middle" font-size="12" fill="#334155">Совместная работа CPU/GPU</text>
  <text x="760" y="155" text-anchor="middle" font-size="12" fill="#334155">мультимодальные Инференс</text>
  <text x="760" y="175" text-anchor="middle" font-size="12" fill="#334155">ML обучение</text>

  <!-- Path 2 Bottom: Spark -> Polars/DuckDB -->
  <path id="path2bot" d="M 530 255 C 600 255, 600 315, 660 315" fill="none" class="path-line p2-bot flow" stroke-width="4" marker-end="url(#arrow)" />
  <path d="M 530 255 C 600 255, 600 315, 655 315" fill="none" stroke="#2563eb" stroke-width="3" stroke-dasharray="6,4" />

  <rect x="535" y="286" width="100" height="24" rx="4" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text x="585" y="302" text-anchor="middle" font-size="10" font-weight="bold" fill="#1d4ed8">Parquet / Delta</text>

  <!-- Node 3 Bottom: Polars / DuckDB -->
  <rect x="670" y="250" width="180" height="130" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text x="760" y="285" text-anchor="middle" font-size="15" font-weight="bold" fill="#1d4ed8">Polars / DuckDB</text>
  <text x="760" y="315" text-anchor="middle" font-size="12" fill="#334155">Анализ ad-hoc</text>
  <text x="760" y="335" text-anchor="middle" font-size="12" fill="#334155">Локальная разработка и анализ данных</text>
  <text x="760" y="355" text-anchor="middle" font-size="12" fill="#334155">Интерактивные запросы</text>

</svg>
