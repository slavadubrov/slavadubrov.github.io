<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Топ-10 OWASP ASI на 2026 год</title>
  <desc id="artifact-desc">Топ-10 OWASP ASI на 2026 год.</desc>
  <defs>
    <filter id="shadowA" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <text y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a" x="450">Топ-10 OWASP ASI на 2026 год</text>
  <text y="50" text-anchor="middle" font-size="11" fill="#64748b" x="450">Инициатива по агентному обеспечению безопасности · опубликовано 9 декабря 2025 года</text>

  <!-- Each row: 3-col icon-id / category / description -->
  <!-- ASI01 - red (Goal Hijack) -->
  <rect x="40" y="75" width="820" height="48" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#shadowA)" />
  <rect x="40" y="75" width="80" height="48" rx="6" fill="#dc2626" />
  <text y="107" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" x="80">ASI01</text>
  <text y="97" font-size="12" font-weight="700" fill="#0f172a" x="135">Угон цели агента</text>
  <text y="115" font-size="10" fill="#334155" x="135">Внедрение прямых и косвенных инструкций для изменения целей агента · EchoLeak</text>

  <!-- ASI02 - orange (Tool Misuse) -->
  <rect x="40" y="131" width="820" height="48" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowA)" />
  <rect x="40" y="131" width="80" height="48" rx="6" fill="#ea580c" />
  <text y="163" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" x="80">ASI02</text>
  <text y="153" font-size="12" font-weight="700" fill="#0f172a" x="135">Неправильное использование и злоупотребление инструментами</text>
  <text y="171" font-size="10" fill="#334155" x="135">Законные инструменты, приводящие к вредным побочным эффектам · Amazon Q</text>

  <!-- ASI03 - red (Identity) -->
  <rect x="40" y="187" width="820" height="48" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#shadowA)" />
  <rect x="40" y="187" width="80" height="48" rx="6" fill="#dc2626" />
  <text y="219" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" x="80">ASI03</text>
  <text y="209" font-size="12" font-weight="700" fill="#0f172a" x="135">Злоупотребление идентификаторами и привилегиями</text>
  <text y="227" font-size="10" fill="#334155" x="135">Делегированное доверие, унаследованные учетные данные, злоупотребление доверием между агентами · Azure MCP</text>

  <!-- ASI04 - orange (Supply Chain) -->
  <rect x="40" y="243" width="820" height="48" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowA)" />
  <rect x="40" y="243" width="80" height="48" rx="6" fill="#ea580c" />
  <text y="275" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" x="80">ASI04</text>
  <text y="265" font-size="12" font-weight="700" fill="#0f172a" x="135">Агентная цепочка поставок</text>
  <text y="283" font-size="10" fill="#334155" x="135">Поражённые инструменты, схемы, плагины и промпты, доверяемые во время выполнения · axios · Trivy</text>

  <!-- ASI05 - red (Code Execution) -->
  <rect x="40" y="299" width="820" height="48" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#shadowA)" />
  <rect x="40" y="299" width="80" height="48" rx="6" fill="#dc2626" />
  <text y="331" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" x="80">ASI05</text>
  <text y="321" font-size="12" font-weight="700" fill="#0f172a" x="135">Неожиданная экспекуция кода</text>
  <text y="339" font-size="10" fill="#334155" x="135">Код, сгенерированный или запущенный агентом без изоляции · Claude Code CVE-2025-59536</text>

  <!-- ASI06 - purple (Memory Poisoning) -->
  <rect x="40" y="355" width="820" height="48" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowA)" />
  <rect x="40" y="355" width="80" height="48" rx="6" fill="#7c3aed" />
  <text y="387" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" x="80">ASI06</text>
  <text y="377" font-size="12" font-weight="700" fill="#0f172a" x="135">Отравление памяти и контекста</text>
  <text y="395" font-size="10" fill="#334155" x="135">Внедрение или повреждение данных в RAG или постоянную память между сессиями</text>

  <!-- ASI07 - blue (Inter-agent) -->
  <rect x="40" y="411" width="820" height="48" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowA)" />
  <rect x="40" y="411" width="80" height="48" rx="6" fill="#2563eb" />
  <text y="443" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" x="80">ASI07</text>
  <text y="433" font-size="12" font-weight="700" fill="#0f172a" x="135">Небезопасное взаимодействие между агентами</text>
  <text y="451" font-size="10" fill="#334155" x="135">Мошенничество или подделка данных между планировщиками, исполнителями и подагентами</text>

  <!-- ASI08 - orange (Cascading) -->
  <rect x="40" y="467" width="820" height="48" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowA)" />
  <rect x="40" y="467" width="80" height="48" rx="6" fill="#ea580c" />
  <text y="499" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" x="80">ASI08</text>
  <text y="489" font-size="12" font-weight="700" fill="#0f172a" x="135">Последовательные сбои агентов</text>
  <text y="507" font-size="10" fill="#334155" x="135">Небольшие сбои распространяются через графы инструментов и доверия</text>

  <!-- ASI09 - purple (Trust Exploitation) -->
  <rect x="40" y="523" width="820" height="48" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowA)" />
  <rect x="40" y="523" width="80" height="48" rx="6" fill="#7c3aed" />
  <text y="555" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" x="80">ASI09</text>
  <text y="545" font-size="12" font-weight="700" fill="#0f172a" x="135">Эксплуатация доверия между человеком и агентом</text>
  <text y="563" font-size="10" fill="#334155" x="135">Чрезмерная зависимость, формирование авторитета, рассеивание ответственности</text>

  <!-- ASI10 - red (Rogue) -->
  <rect x="40" y="579" width="820" height="48" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#shadowA)" />
  <rect x="40" y="579" width="80" height="48" rx="6" fill="#dc2626" />
  <text y="611" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" x="80">ASI10</text>
  <text y="601" font-size="12" font-weight="700" fill="#0f172a" x="135">Независимые агенты</text>
  <text y="619" font-size="10" fill="#334155" x="135">Отклонение цели, манипуляция наградой, возникающая автономность</text>

  <text y="660" text-anchor="middle" font-size="10" font-style="italic" fill="#64748b" x="450">Восемь из десяти категорий касаются в первую очередь проблем с использованием инструментов, а не проблем с выводом модели.</text>
</svg>
