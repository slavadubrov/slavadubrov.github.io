<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadowA" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1" />
    </filter>
  </defs>

  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">Топ-10 OWASP ASI на 2026 год</text>
  <text x="450" y="50" text-anchor="middle" font-size="11" fill="#888">Инициатива по агентному обеспечению безопасности · опубликовано 9 декабря 2025 года</text>

  <!-- Each row: 3-col icon-id / category / description -->
  <!-- ASI01 - red (Goal Hijack) -->
  <rect x="40" y="75" width="820" height="48" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1.5" filter="url(#shadowA)" />
  <rect x="40" y="75" width="80" height="48" rx="6" fill="#c62828" />
  <text x="80" y="107" text-anchor="middle" font-size="14" font-weight="700" fill="white">ASI01</text>
  <text x="135" y="97" font-size="12" font-weight="700" fill="#1a1a2e">Угон цели агента</text>
  <text x="135" y="115" font-size="10" fill="#555">Внедрение прямых и косвенных инструкций для изменения целей агента · EchoLeak</text>

  <!-- ASI02 - orange (Tool Misuse) -->
  <rect x="40" y="131" width="820" height="48" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowA)" />
  <rect x="40" y="131" width="80" height="48" rx="6" fill="#e65100" />
  <text x="80" y="163" text-anchor="middle" font-size="14" font-weight="700" fill="white">ASI02</text>
  <text x="135" y="153" font-size="12" font-weight="700" fill="#1a1a2e">Неправильное использование и злоупотребление инструментами</text>
  <text x="135" y="171" font-size="10" fill="#555">Законные инструменты, приводящие к вредным побочным эффектам · Amazon Q</text>

  <!-- ASI03 - red (Identity) -->
  <rect x="40" y="187" width="820" height="48" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1.5" filter="url(#shadowA)" />
  <rect x="40" y="187" width="80" height="48" rx="6" fill="#c62828" />
  <text x="80" y="219" text-anchor="middle" font-size="14" font-weight="700" fill="white">ASI03</text>
  <text x="135" y="209" font-size="12" font-weight="700" fill="#1a1a2e">Злоупотребление идентификаторами и привилегиями</text>
  <text x="135" y="227" font-size="10" fill="#555">Делегированное доверие, унаследованные учетные данные, злоупотребление доверием между агентами · Azure MCP</text>

  <!-- ASI04 - orange (Supply Chain) -->
  <rect x="40" y="243" width="820" height="48" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowA)" />
  <rect x="40" y="243" width="80" height="48" rx="6" fill="#e65100" />
  <text x="80" y="275" text-anchor="middle" font-size="14" font-weight="700" fill="white">ASI04</text>
  <text x="135" y="265" font-size="12" font-weight="700" fill="#1a1a2e">Агентная цепочка поставок</text>
  <text x="135" y="283" font-size="10" fill="#555">Поражённые инструменты, схемы, плагины и промпты, доверяемые во время выполнения · axios · Trivy</text>

  <!-- ASI05 - red (Code Execution) -->
  <rect x="40" y="299" width="820" height="48" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1.5" filter="url(#shadowA)" />
  <rect x="40" y="299" width="80" height="48" rx="6" fill="#c62828" />
  <text x="80" y="331" text-anchor="middle" font-size="14" font-weight="700" fill="white">ASI05</text>
  <text x="135" y="321" font-size="12" font-weight="700" fill="#1a1a2e">Неожиданная экспекуция кода</text>
  <text x="135" y="339" font-size="10" fill="#555">Код, сгенерированный или запущенный агентом без изоляции · Claude Code CVE-2025-59536</text>

  <!-- ASI06 - purple (Memory Poisoning) -->
  <rect x="40" y="355" width="820" height="48" rx="6" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowA)" />
  <rect x="40" y="355" width="80" height="48" rx="6" fill="#6a1b9a" />
  <text x="80" y="387" text-anchor="middle" font-size="14" font-weight="700" fill="white">ASI06</text>
  <text x="135" y="377" font-size="12" font-weight="700" fill="#1a1a2e">Отравление памяти и контекста</text>
  <text x="135" y="395" font-size="10" fill="#555">Внедрение или повреждение данных в RAG или постоянную память между сессиями</text>

  <!-- ASI07 - blue (Inter-agent) -->
  <rect x="40" y="411" width="820" height="48" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowA)" />
  <rect x="40" y="411" width="80" height="48" rx="6" fill="#1565c0" />
  <text x="80" y="443" text-anchor="middle" font-size="14" font-weight="700" fill="white">ASI07</text>
  <text x="135" y="433" font-size="12" font-weight="700" fill="#1a1a2e">Небезопасное взаимодействие между агентами</text>
  <text x="135" y="451" font-size="10" fill="#555">Мошенничество или подделка данных между планировщиками, исполнителями и подагентами</text>

  <!-- ASI08 - orange (Cascading) -->
  <rect x="40" y="467" width="820" height="48" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowA)" />
  <rect x="40" y="467" width="80" height="48" rx="6" fill="#e65100" />
  <text x="80" y="499" text-anchor="middle" font-size="14" font-weight="700" fill="white">ASI08</text>
  <text x="135" y="489" font-size="12" font-weight="700" fill="#1a1a2e">Последовательные сбои агентов</text>
  <text x="135" y="507" font-size="10" fill="#555">Небольшие сбои распространяются через графы инструментов и доверия</text>

  <!-- ASI09 - purple (Trust Exploitation) -->
  <rect x="40" y="523" width="820" height="48" rx="6" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowA)" />
  <rect x="40" y="523" width="80" height="48" rx="6" fill="#6a1b9a" />
  <text x="80" y="555" text-anchor="middle" font-size="14" font-weight="700" fill="white">ASI09</text>
  <text x="135" y="545" font-size="12" font-weight="700" fill="#1a1a2e">Эксплуатация доверия между человеком и агентом</text>
  <text x="135" y="563" font-size="10" fill="#555">Чрезмерная зависимость, формирование авторитета, рассеивание ответственности</text>

  <!-- ASI10 - red (Rogue) -->
  <rect x="40" y="579" width="820" height="48" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1.5" filter="url(#shadowA)" />
  <rect x="40" y="579" width="80" height="48" rx="6" fill="#c62828" />
  <text x="80" y="611" text-anchor="middle" font-size="14" font-weight="700" fill="white">ASI10</text>
  <text x="135" y="601" font-size="12" font-weight="700" fill="#1a1a2e">Независимые агенты</text>
  <text x="135" y="619" font-size="10" fill="#555">Отклонение цели, манипуляция наградой, возникающая автономность</text>

  <text x="450" y="660" text-anchor="middle" font-size="10" font-style="italic" fill="#888">Восемь из десяти категорий касаются в первую очередь проблем с использованием инструментов, а не проблем с выводом модели.</text>
</svg>
