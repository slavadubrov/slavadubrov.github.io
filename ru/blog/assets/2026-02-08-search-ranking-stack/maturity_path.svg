<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Практический путь достижения зрелости</title>
  <desc id="artifact-desc">Практический путь достижения зрелости.</desc>
  <defs>
    <marker id="arrowM" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#334155" />
    </marker>
    <filter id="shadowM" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a" x="400">Практический путь достижения зрелости</text>

  <!-- Connecting arrow line -->
  <line x1="60" y1="120" x2="740" y2="120" stroke="#cbd5e1" stroke-width="3" />

  <!-- Level 1 -->
  <rect x="30" y="60" width="160" height="120" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowM)" />
  <circle cx="110" cy="60" r="14" fill="#2563eb" />
  <text y="65" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff" x="110">1</text>
  <text y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="110">Базовая линия</text>
  <text y="108" text-anchor="middle" font-size="10" fill="#334155" x="110">pgvector или ES</text>
  <text y="122" text-anchor="middle" font-size="10" fill="#334155" x="110">Гибрид BM25 + векторный поиск</text>
  <text y="136" text-anchor="middle" font-size="10" fill="#334155" x="110">Отсутствует реранкер</text>
  <text y="168" text-anchor="middle" font-size="9" fill="#64748b" x="110">Уровень сложности: низкий</text>

  <!-- Arrow -->
  <line x1="195" y1="120" x2="225" y2="120" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowM)" />

  <!-- Level 2 (highlighted - biggest ROI) -->
  <rect x="220" y="55" width="160" height="130" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2.5" filter="url(#shadowM)" />
  <circle cx="300" cy="55" r="14" fill="#ea580c" />
  <text y="60" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff" x="300">2</text>
  <text y="85" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="300">+ Переупорядочиватель</text>
  <text y="103" text-anchor="middle" font-size="10" fill="#334155" x="300">Добавить кросс-энкодер</text>
  <text y="117" text-anchor="middle" font-size="10" fill="#334155" x="300">Переупорядочить топ-50</text>
  <text y="131" text-anchor="middle" font-size="10" fill="#334155" x="300">например, bge-reranker-v2</text>
  <text y="158" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="300">Максимальная доходность</text>
  <text y="173" text-anchor="middle" font-size="9" fill="#64748b" x="300">Уровень сложности: низкий-средний</text>

  <!-- Arrow -->
  <line x1="385" y1="120" x2="415" y2="120" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowM)" />

  <!-- Level 3 -->
  <rect x="410" y="60" width="160" height="120" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#shadowM)" />
  <circle cx="490" cy="60" r="14" fill="#dc2626" />
  <text y="65" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff" x="490">3</text>
  <text y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b" x="490">Тонкая настройка</text>
  <text y="108" text-anchor="middle" font-size="10" fill="#334155" x="490">Тонкая настройка эмбеддингов</text>
  <text y="122" text-anchor="middle" font-size="10" fill="#334155" x="490">Реранкер на основе данных домена</text>
  <text y="136" text-anchor="middle" font-size="10" fill="#334155" x="490">Синтетические запросы LLM</text>
  <text y="168" text-anchor="middle" font-size="9" fill="#64748b" x="490">Уровень сложности: средний-высокий</text>

  <!-- Arrow -->
  <line x1="575" y1="120" x2="605" y2="120" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowM)" />

  <!-- Level 4 -->
  <rect x="600" y="60" width="170" height="120" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowM)" />
  <circle cx="685" cy="60" r="14" fill="#166534" />
  <text y="65" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff" x="685">4</text>
  <text y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="685">Современные технологии</text>
  <text y="108" text-anchor="middle" font-size="10" fill="#334155" x="685" transform="translate(-14.17 0.00)">Повторная ранжировка LLM в списковом формате</text>
  <text y="122" text-anchor="middle" font-size="10" fill="#334155" x="685">Сигналы персонализации</text>
  <text y="136" text-anchor="middle" font-size="10" fill="#334155" x="685" transform="translate(-48.97 0.00)">Модули переранжирования на основе логических рассуждений</text>
  <text y="168" text-anchor="middle" font-size="9" fill="#64748b" x="685">Уровень сложности: высокий</text>

  <!-- Bottom label -->
  <text y="245" text-anchor="middle" font-size="11" fill="#334155" x="400">Начните с уровня 1. Уровень 2 обеспечивает наибольшую отдачу при минимальных усилиях.</text>

</svg>
