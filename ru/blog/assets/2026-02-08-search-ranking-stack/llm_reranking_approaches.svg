<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="title">Поэлементное и построчное LLM реранкинг</title>
  <desc id="desc">Пунктовая оценка ранжирования применяется к кандидатам независимо друг от друга, тогда как списковая оценка ранжирования сравнивает небольшой набор элементов в одном промпт и возвращает соответствующую иерархию.</desc>
  <defs>
    <marker id="arrowL" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155" />
    </marker>
    <filter id="shadowL" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="800" height="400" fill="#ffffff" />

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">LLM Реранкинг: Поэлементное сравнение против сравнения по списку</text>

  <!-- Left: Pointwise -->
  <rect x="30" y="50" width="340" height="330" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
  <text x="200" y="78" text-anchor="middle" font-size="14" font-weight="700" fill="#9a3412">Пунктовая оценка</text>
  <text x="200" y="96" text-anchor="middle" font-size="11" fill="#334155">Оценивать каждый документ независимо друг от друга</text>

  <!-- Three scoring boxes -->
  <rect x="55" y="115" width="290" height="42" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1" filter="url(#shadowL)" />
  <text x="70" y="133" font-size="11" fill="#0f172a">Запрос + Документ А</text>
  <text x="70" y="148" font-size="10" fill="#334155">LLM вызов 1</text>
  <text x="320" y="141" text-anchor="end" font-size="14" font-weight="700" fill="#9a3412">0,8</text>

  <rect x="55" y="167" width="290" height="42" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1" filter="url(#shadowL)" />
  <text x="70" y="185" font-size="11" fill="#0f172a">Запрос + Документ B</text>
  <text x="70" y="200" font-size="10" fill="#334155">LLM вызов функции 2</text>
  <text x="320" y="193" text-anchor="end" font-size="14" font-weight="700" fill="#9a3412">0,3</text>

  <rect x="55" y="219" width="290" height="42" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1" filter="url(#shadowL)" />
  <text x="70" y="237" font-size="11" fill="#0f172a">Запрос + Документ C</text>
  <text x="70" y="252" font-size="10" fill="#334155">LLM вызов функции 3</text>
  <text x="320" y="245" text-anchor="end" font-size="14" font-weight="700" fill="#9a3412">0,9</text>

  <!-- Sort arrow -->
  <line x1="200" y1="268" x2="200" y2="295" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowL)" />
  <text x="220" y="287" font-size="10" fill="#64748b">Сортировка по оценке</text>

  <!-- Result -->
  <rect x="100" y="300" width="200" height="30" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1" filter="url(#shadowL)" />
  <text x="200" y="320" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">C (0,9) &gt; A (0,8) &gt; B (0,3)</text>

  <!-- Pros/cons -->
  <text x="55" y="355" font-size="10" fill="#166534">Параллелизуемый, простой</text>
  <text x="55" y="370" font-size="10" fill="#991b1b">- Отсутствует сравнительный контекст между документами</text>

  <!-- Right: Listwise -->
  <rect x="420" y="50" width="350" height="330" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
  <text x="595" y="78" text-anchor="middle" font-size="14" font-weight="700" fill="#5b21b6">Ранжирование по списку</text>
  <text x="595" y="96" text-anchor="middle" font-size="11" fill="#334155">Одновременно сравнить все документы</text>

  <!-- Single LLM call box -->
  <rect x="445" y="115" width="300" height="130" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowL)" />
  <text x="460" y="137" font-size="11" font-weight="600" fill="#5b21b6">Одиночный вызов LLM</text>
  <text x="460" y="158" font-size="11" fill="#0f172a">Запрос + [Документ А, Документ Б, Документ В]</text>
  <rect x="460" y="168" width="270" height="22" rx="4" fill="#faf5ff" stroke="#7c3aed" stroke-width="0.8" />
  <text x="595" y="184" text-anchor="middle" font-size="10" fill="#5b21b6">LLM осуществляет сравнение всех документов между собой</text>
  <text x="460" y="210" font-size="11" fill="#0f172a">Результат:</text>
  <text x="510" y="210" font-size="12" font-weight="700" fill="#5b21b6">[3], [1], [2]</text>
  <text x="590" y="210" font-size="10" fill="#334155">(C — лучший вариант, A — следующий по качеству, B — худший)</text>
  <text x="460" y="232" font-size="10" fill="#64748b">стиль RankGPT промпт</text>

  <!-- Arrow to result -->
  <line x1="595" y1="252" x2="595" y2="295" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowL)" />

  <!-- Result -->
  <rect x="490" y="300" width="210" height="30" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1" filter="url(#shadowL)" />
  <text x="595" y="320" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">C &gt; A &gt; B (глобальное сортирование)</text>

  <!-- Pros/cons -->
  <text x="445" y="355" font-size="10" fill="#166534">+ Сравнительное суждение, более надежное</text>
  <text x="445" y="370" font-size="10" fill="#991b1b">- ограничения Контекстное окно, позиционное смещение</text>

</svg>
