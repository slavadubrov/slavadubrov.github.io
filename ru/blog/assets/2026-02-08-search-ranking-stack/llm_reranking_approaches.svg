<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Переупорядочивание LLM: по точкам против по списку</title>
  <desc id="artifact-desc">Переупорядочивание LLM: по точкам против по списку.</desc>
  <defs>
    <marker id="arrowL" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155" />
    </marker>
    <filter id="shadowL" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a" x="400">Переупорядочивание LLM: по точкам против по списку</text>

  <!-- Left: Pointwise -->
  <rect x="30" y="50" width="340" height="330" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
  <text y="78" text-anchor="middle" font-size="14" font-weight="700" fill="#9a3412" x="200">Оценка по точкам</text>
  <text y="96" text-anchor="middle" font-size="11" fill="#334155" x="200">Оценивать каждый документ независимо</text>

  <!-- Three scoring boxes -->
  <rect x="55" y="115" width="290" height="42" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1" filter="url(#shadowL)" />
  <text y="133" font-size="11" fill="#0f172a" x="70">Запрос + Документ А</text>
  <text y="148" font-size="10" fill="#334155" x="70">Запрос LLM 1</text>
  <text y="141" text-anchor="end" font-size="14" font-weight="700" fill="#9a3412" x="320">0,8</text>

  <rect x="55" y="167" width="290" height="42" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1" filter="url(#shadowL)" />
  <text y="185" font-size="11" fill="#0f172a" x="70">Запрос + Документ B</text>
  <text y="200" font-size="10" fill="#334155" x="70">Вызов LLM 2</text>
  <text y="193" text-anchor="end" font-size="14" font-weight="700" fill="#9a3412" x="320">0,3</text>

  <rect x="55" y="219" width="290" height="42" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1" filter="url(#shadowL)" />
  <text y="237" font-size="11" fill="#0f172a" x="70">Запрос + Документ C</text>
  <text y="252" font-size="10" fill="#334155" x="70">Вызов LLM 3</text>
  <text y="245" text-anchor="end" font-size="14" font-weight="700" fill="#9a3412" x="320">0,9</text>

  <!-- Sort arrow -->
  <line x1="200" y1="268" x2="200" y2="295" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowL)" />
  <text y="287" font-size="10" fill="#64748b" x="220">Сортировка по оценке</text>

  <!-- Result -->
  <rect x="100" y="300" width="200" height="30" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1" filter="url(#shadowL)" />
  <text y="320" text-anchor="middle" font-size="12" font-weight="600" fill="#166534" x="200">C (0,9) &gt; A (0,8) &gt; B (0,3)</text>

  <!-- Pros/cons -->
  <text y="355" font-size="10" fill="#166534" x="55">+ Параллелизуемый, простой</text>
  <text y="370" font-size="10" fill="#991b1b" x="55">- Отсутствует сравнительный контекст между документами</text>

  <!-- Right: Listwise -->
  <rect x="420" y="50" width="350" height="330" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
  <text y="78" text-anchor="middle" font-size="14" font-weight="700" fill="#5b21b6" x="595">Ранжирование по списку</text>
  <text y="96" text-anchor="middle" font-size="11" fill="#334155" x="595">Провести сравнение всех документов одновременно</text>

  <!-- Single LLM call box -->
  <rect x="445" y="115" width="300" height="130" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowL)" />
  <text y="137" font-size="11" font-weight="600" fill="#5b21b6" x="460">Одно вызов LLM</text>
  <text y="158" font-size="11" fill="#0f172a" x="460">Запрос + [Документ А, Документ Б, Документ В]</text>
  <rect x="460" y="168" width="270" height="22" rx="4" fill="#faf5ff" stroke="#7c3aed" stroke-width="0.8" />
  <text y="184" text-anchor="middle" font-size="10" fill="#5b21b6" x="595">LLM сравнивает все документы между собой</text>
  <text y="210" font-size="11" fill="#0f172a" x="460">Выход:</text>
  <text y="210" font-size="12" font-weight="700" fill="#5b21b6" x="510">[3], [1], [2]</text>
  <text y="210" font-size="10" fill="#334155" x="590" transform="translate(-27.54 0.00)">(C — лучший, A — следующий, B — последний)</text>
  <text y="232" font-size="10" fill="#64748b" x="460">Запрос в стиле RankGPT</text>

  <!-- Arrow to result -->
  <line x1="595" y1="252" x2="595" y2="295" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowL)" />

  <!-- Result -->
  <rect x="490" y="300" width="210" height="30" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1" filter="url(#shadowL)" />
  <text y="320" text-anchor="middle" font-size="12" font-weight="600" fill="#166534" x="595">C &gt; A &gt; B (глобальное порядок)</text>

  <!-- Pros/cons -->
  <text y="355" font-size="10" fill="#166534" x="445">+ Сравнительное суждение, более надежное</text>
  <text y="370" font-size="10" fill="#991b1b" x="445">— Ограничения окна контекста, смещение позиции</text>

</svg>
