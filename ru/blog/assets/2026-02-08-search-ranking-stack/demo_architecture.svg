<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 530" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="title">Пятиэтапная демонстрация пайплайн</title>
  <desc id="desc">BM25 и объединение рангов плотного retrieval потока, за которым следуют кросс-кодер и необязательная операция списочного LLM реранкинг.</desc>
  <defs>
    <marker id="arrowD" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155" />
    </marker>
    <filter id="shadowD" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="500" height="530" fill="#ffffff" />

  <!-- Title -->
  <text x="250" y="22" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Демонстрация Пайплайн: стек поисковой ранжирования</text>
  <text x="250" y="40" text-anchor="middle" font-size="12" fill="#334155">Amazon ESCI бенчмарк — примерно 500 запросов, около 8,5 тыс. продуктов</text>

  <!-- Stage 1: Retrieval -->
  <rect x="30" y="52" width="440" height="210" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1" stroke-dasharray="4" />
  <text x="45" y="72" font-size="12" font-weight="700" fill="#1d4ed8">Этап 1: Retrieval</text>

  <!-- Query -->
  <rect x="200" y="82" width="100" height="28" rx="14" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadowD)" />
  <text x="250" y="101" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">запрос</text>

  <!-- Arrows to BM25 and Dense -->
  <line x1="224" y1="110" x2="148" y2="132" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowD)" />
  <line x1="276" y1="110" x2="352" y2="132" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowD)" />

  <!-- BM25 -->
  <rect x="50" y="135" width="170" height="48" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.2" filter="url(#shadowD)" />
  <text x="135" y="155" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412">BM25 Sparse</text>
  <text x="135" y="172" text-anchor="middle" font-size="9" fill="#64748b">rank_bm25 | Топ-100</text>

  <!-- Dense -->
  <rect x="280" y="135" width="170" height="48" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowD)" />
  <text x="365" y="155" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">Плотный двойной кодировщик</text>
  <text x="365" y="172" text-anchor="middle" font-size="9" fill="#64748b">all-MiniLM-L6-v2 | Топ-100</text>

  <!-- Arrows to RRF -->
  <line x1="135" y1="183" x2="200" y2="208" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowD)" />
  <line x1="365" y1="183" x2="300" y2="208" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowD)" />

  <!-- RRF -->
  <rect x="150" y="210" width="200" height="42" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowD)" />
  <text x="250" y="228" text-anchor="middle" font-size="11" font-weight="700" fill="#5b21b6">Слияние RRF</text>
  <text x="250" y="243" text-anchor="middle" font-size="9" fill="#64748b">k=60 | Топ-100</text>

  <!-- Arrow from RRF to Cross-Encoder -->
  <line x1="250" y1="252" x2="250" y2="300" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowD)" />
  <text x="268" y="280" font-size="9" fill="#64748b">Топ-50</text>

  <!-- Stage 2: Reranking -->
  <rect x="30" y="275" width="440" height="240" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="1" stroke-dasharray="4" />
  <text x="45" y="295" font-size="12" font-weight="700" fill="#9a3412">Этап 2: Реранкинг</text>

  <!-- Cross-Encoder -->
  <rect x="65" y="305" width="370" height="52" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowD)" />
  <text x="250" y="326" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412">Кросс-энкодер Реранкинг</text>
  <text x="250" y="344" text-anchor="middle" font-size="10" fill="#64748b">ms-marco-MiniLM-L-12-v2 | Переранкинг топ-50</text>

  <!-- Arrow -->
  <line x1="250" y1="357" x2="250" y2="385" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowD)" />
  <text x="268" y="376" font-size="9" fill="#64748b">Топ-10</text>

  <!-- LLM Reranker -->
  <rect x="65" y="390" width="370" height="52" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowD)" />
  <text x="250" y="411" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">LLM по списку Реранкер</text>
  <text x="250" y="429" text-anchor="middle" font-size="10" fill="#64748b">В стиле RankGPT | Ollama / Claude / локально</text>

  <!-- Arrow to results -->
  <line x1="250" y1="442" x2="250" y2="468" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowD)" />

  <!-- Final Results -->
  <rect x="140" y="472" width="220" height="30" rx="15" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowD)" />
  <text x="250" y="492" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">Итоговые результаты топ-10</text>

</svg>
