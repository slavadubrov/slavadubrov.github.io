<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Воронка многоступенчатого ранжирования</title>
  <desc id="artifact-desc">Воронка многоступенчатого ранжирования.</desc>
  <defs>
    <marker id="arrowFunnel" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155" />
    </marker>
    <filter id="shadowF" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a" x="400">Воронка многоступенчатого ранжирования</text>

  <!-- Corpus -->
  <rect x="200" y="55" width="400" height="52" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" filter="url(#shadowF)" />
  <text y="77" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a" x="400">Полный корпус</text>
  <text y="95" text-anchor="middle" font-size="11" fill="#334155" x="400">От 10⁹ до 10¹² документов</text>

  <!-- Arrow -->
  <line x1="400" y1="107" x2="400" y2="130" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowFunnel)" />

  <!-- Stage 1: Retrieval -->
  <rect x="160" y="133" width="480" height="75" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowF)" />
  <text y="155" font-size="11" font-weight="700" fill="#1d4ed8" x="180">ЭТАП 1: Получение данных</text>
  <text y="172" font-size="12" font-weight="600" fill="#0f172a" x="180">BM25 + плотный двойной кодировщик + гибридное слияние RRF</text>
  <text y="190" font-size="11" fill="#334155" x="180">Цель: максимальная воспроизводимость | Задержка: &lt; 50 мс</text>
  <text y="172" text-anchor="end" font-size="20" font-weight="700" fill="#1d4ed8" x="590">10⁴</text>
  <text y="190" text-anchor="end" font-size="10" fill="#1d4ed8" x="590">кандидаты</text>

  <!-- Arrow -->
  <line x1="400" y1="208" x2="400" y2="231" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowFunnel)" />
  <text y="224" font-size="10" fill="#64748b" x="416">Около 100 кандидатов на запрос</text>

  <!-- Stage 2: Pre-Ranking -->
  <rect x="180" y="234" width="440" height="68" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowF)" />
  <text y="256" font-size="11" font-weight="700" fill="#9a3412" x="200">ЭТАП 2: ПРЕДВАРИТЕЛЬНАЯ РАНГИРОВКА</text>
  <text y="273" font-size="12" font-weight="600" fill="#0f172a" x="200">Модели с двумя башнями + функции взаимодействия</text>
  <text y="289" font-size="11" fill="#334155" x="200">Цель: Эффективная фильтрация | Задержка: &lt; 100 мс</text>
  <text y="273" text-anchor="end" font-size="20" font-weight="700" fill="#9a3412" x="575">10²–10³</text>
  <text y="289" text-anchor="end" font-size="10" fill="#9a3412" x="575">кандидаты</text>

  <!-- Arrow -->
  <line x1="400" y1="302" x2="400" y2="325" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowFunnel)" />
  <text y="318" font-size="10" fill="#64748b" x="416">Около 50 кандидатов на запрос</text>

  <!-- Stage 3: Full Ranking -->
  <rect x="200" y="328" width="400" height="68" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#shadowF)" />
  <text y="350" font-size="11" font-weight="700" fill="#991b1b" x="220">ЭТАП 3: ПОЛНОЕ РАНГИРОВКА</text>
  <text y="367" font-size="12" font-weight="600" fill="#0f172a" x="220">Кросс-кодеры + ранжировщики на основе LLM</text>
  <text y="383" font-size="11" fill="#334155" x="220">Цель: максимальная точность | Задержка: &lt; 500 мс</text>
  <text y="367" text-anchor="end" font-size="20" font-weight="700" fill="#991b1b" x="560">10¹</text>
  <text y="383" text-anchor="end" font-size="10" fill="#991b1b" x="560">кандидаты</text>

  <!-- Arrow -->
  <line x1="400" y1="396" x2="400" y2="419" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowFunnel)" />

  <!-- Stage 4: Blending -->
  <rect x="240" y="422" width="320" height="68" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowF)" />
  <text y="444" font-size="11" font-weight="700" fill="#166534" x="260">ЭТАП 4: СОВМЕЩЕНИЕ</text>
  <text y="461" font-size="12" font-weight="600" fill="#0f172a" x="260">Разнообразие + бизнес-правила</text>
  <text y="477" font-size="11" fill="#334155" x="260">Цель: пользовательский опыт | &lt; 20 мс</text>

  <!-- Cost gradient label on right -->
  <text y="145" font-size="10" fill="#64748b" text-anchor="start" x="690">Низкая стоимость</text>
  <text y="160" font-size="10" fill="#64748b" text-anchor="start" x="690">Высокая скорость</text>
  <line x1="680" y1="140" x2="680" y2="385" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4" />
  <text y="380" font-size="10" fill="#64748b" text-anchor="start" x="690">Высокая стоимость</text>
  <text y="395" font-size="10" fill="#64748b" text-anchor="start" x="690">Высокая точность</text>
  <!-- Arrow for gradient -->
  <line x1="680" y1="165" x2="680" y2="370" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arrowFunnel)" />

</svg>
