<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="title">Многоэтапный фуннель ранжирования</title>
  <desc id="desc">Концептуальный воронка обработки корпуса retrieval через этапы предварительной ранжировки, полной ранжировки и окончательного слияния результатов, с показателями оценки на каждом из выходных этапов.</desc>
  <defs>
    <marker id="arrowFunnel" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155" />
    </marker>
    <filter id="shadowF" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="800" height="520" fill="#ffffff" />

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Многоэтапный воронка ранжирования</text>

  <!-- Corpus -->
  <rect x="200" y="55" width="400" height="52" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" filter="url(#shadowF)" />
  <text x="400" y="77" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Полный корпус</text>
  <text x="400" y="95" text-anchor="middle" font-size="11" fill="#334155">Размер определяется типом продукта и индексом</text>

  <!-- Arrow -->
  <line x1="400" y1="107" x2="400" y2="130" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowFunnel)" />

  <!-- Stage 1: Retrieval -->
  <rect x="160" y="133" width="480" height="75" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowF)" />
  <text x="180" y="155" font-size="11" font-weight="700" fill="#1d4ed8">ЭТАП 1: Retrieval</text>
  <text x="180" y="172" font-size="12" font-weight="600" fill="#0f172a">BM25 + плотный двойной энкодер + гибридное слияние RRF</text>
  <text x="180" y="190" font-size="11" fill="#334155">Выход: отзыв модели при достижении порога кандидатов</text>
  <text x="590" y="172" text-anchor="end" font-size="16" font-weight="700" fill="#1d4ed8">Широкий набор</text>
  <text x="590" y="190" text-anchor="end" font-size="10" fill="#1d4ed8">бенчмарк точка обрезки</text>

  <!-- Arrow -->
  <line x1="400" y1="208" x2="400" y2="231" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowFunnel)" />
  <text x="416" y="224" font-size="10" fill="#64748b">количество кандидатов снижается</text>

  <!-- Stage 2: Pre-Ranking -->
  <rect x="180" y="234" width="440" height="68" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowF)" />
  <text x="200" y="256" font-size="11" font-weight="700" fill="#9a3412">ЭТАП 2: ПРЕДВАРИТЕЛЬНАЯ РАНГИРОВКА</text>
  <text x="200" y="273" font-size="12" font-weight="600" fill="#0f172a">Двух-башенная архитектура Модели + функции взаимодействия</text>
  <text x="200" y="289" font-size="11" fill="#334155">Выход: количество сохранённых элементов на миллисекунду</text>
  <text x="575" y="273" text-anchor="end" font-size="16" font-weight="700" fill="#9a3412">Отфильтрованный набор</text>
  <text x="575" y="289" text-anchor="end" font-size="10" fill="#9a3412">факультативный этап</text>

  <!-- Arrow -->
  <line x1="400" y1="302" x2="400" y2="325" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowFunnel)" />
  <text x="416" y="318" font-size="10" fill="#64748b">список кандидатов</text>

  <!-- Stage 3: Full Ranking -->
  <rect x="200" y="328" width="400" height="68" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#shadowF)" />
  <text x="220" y="350" font-size="11" font-weight="700" fill="#991b1b">ЭТАП 3: ПОЛНОЕ РАНГИРОВКА</text>
  <text x="220" y="367" font-size="12" font-weight="600" fill="#0f172a">Кросс-энкодеры + LLM Реранкеры</text>
  <text x="220" y="383" font-size="11" fill="#334155">Выходные показатели: NDCG/MRR, латентность и стоимость</text>
  <text x="560" y="367" text-anchor="end" font-size="16" font-weight="700" fill="#991b1b">Список кандидатов</text>
  <text x="560" y="383" text-anchor="end" font-size="10" fill="#991b1b">измеренный лимит</text>

  <!-- Arrow -->
  <line x1="400" y1="396" x2="400" y2="419" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowFunnel)" />

  <!-- Stage 4: Blending -->
  <rect x="240" y="422" width="320" height="68" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowF)" />
  <text x="260" y="444" font-size="11" font-weight="700" fill="#166534">ЭТАП 4: СОВМЕЩЕНИЕ</text>
  <text x="260" y="461" font-size="12" font-weight="600" fill="#0f172a">Разнообразие + бизнес-правила</text>
  <text x="260" y="477" font-size="11" fill="#334155">Выход: политика и разнообразие гардрейлы</text>

  <!-- Cost gradient label on right -->
  <text x="690" y="145" font-size="10" fill="#64748b" text-anchor="start">Низкая стоимость</text>
  <text x="690" y="160" font-size="10" fill="#64748b" text-anchor="start">Высокая скорость</text>
  <line x1="680" y1="140" x2="680" y2="385" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4" />
  <text x="690" y="380" font-size="10" fill="#64748b" text-anchor="start">Высокая стоимость</text>
  <text x="690" y="395" font-size="10" fill="#64748b" text-anchor="start">Высокая точность</text>
  <!-- Arrow for gradient -->
  <line x1="680" y1="165" x2="680" y2="370" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arrowFunnel)" />

</svg>
