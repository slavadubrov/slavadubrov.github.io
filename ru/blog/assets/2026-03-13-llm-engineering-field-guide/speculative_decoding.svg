<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 380" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">спекулятивная декодировка</title>
  <desc id="artifact-desc">спекулятивная декодировка.</desc>
  <defs>
    <style>
      .draft-model { fill: #2563eb; stroke: #1d4ed8; stroke-width: 2; rx: 8; }
      .target-model { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 8; }
      .token { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 4; }
      .token-accepted { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 4; }
      .token-rejected { fill: #fef2f2; stroke: #dc2626; stroke-width: 2; rx: 4; }
      .token-discard { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 2; stroke-dasharray: 4,4; rx: 4; }
      .arrow { stroke: #334155; stroke-width: 2; marker-end: url(#arrowhead); }
      .arrow-red { stroke: #dc2626; stroke-width: 2; marker-end: url(#arrowhead-red); }
      .text { font-family: Inter, system-ui, sans-serif; font-size: 14px; text-anchor: middle; fill: #0f172a; font-weight: bold; }
      .desc { font-family: Inter, system-ui, sans-serif; font-size: 12px; text-anchor: middle; fill: #0f172a; }
      .title { font-family: Inter, system-ui, sans-serif; font-size: 20px; font-weight: bold; text-anchor: middle; fill: #0f172a; }
      .subtitle { font-family: Inter, system-ui, sans-serif; font-size: 16px; font-weight: bold; fill: #334155; text-anchor: start; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b" />
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="100%" height="100%" fill="#f8fafc" />
  <text y="30" class="title" x="500">спекулятивная декодировка</text>

  <!-- Step 1: Draft Model -->
  <text y="75" class="subtitle" x="40">1. Генерация черновика (последовательная, ограниченная памятью)</text>

  <rect x="50" y="95" width="140" height="60" class="draft-model" />
  <text y="120" class="text" x="120">Проектная модель</text>
  <text y="140" class="desc" x="120">Около 1 млрд параметров</text>

  <line x1="190" y1="125" x2="230" y2="125" class="arrow" />

  <!-- Draft Tokens -->
  <rect x="250" y="105" width="50" height="40" class="token" />
  <text y="130" class="text" x="275">T₁</text>

  <line x1="300" y1="125" x2="330" y2="125" class="arrow" />

  <rect x="340" y="105" width="50" height="40" class="token" />
  <text y="130" class="text" x="365">T₂</text>

  <line x1="390" y1="125" x2="420" y2="125" class="arrow" />

  <rect x="430" y="105" width="50" height="40" class="token" />
  <text y="130" class="text" x="455">T₃</text>

  <line x1="480" y1="125" x2="510" y2="125" class="arrow" />

  <rect x="520" y="105" width="50" height="40" class="token" />
  <text y="130" class="text" x="545">T₄</text>

  <!-- Bracket for Candidate Tokens -->
  <line x1="250" y1="155" x2="250" y2="170" stroke="#334155" stroke-width="2" />
  <line x1="570" y1="155" x2="570" y2="170" stroke="#334155" stroke-width="2" />
  <line x1="250" y1="170" x2="570" y2="170" stroke="#334155" stroke-width="2" />

  <text y="195" class="subtitle" text-anchor="middle" x="410">Кандидатские токены K=4</text>
  <line x1="410" y1="205" x2="410" y2="245" class="arrow" />

  <!-- Step 2: Verification -->
  <text y="235" class="subtitle" x="40">2. Проверка цели (параллельная, ограничена вычислениями)</text>

  <rect x="50" y="255" width="140" height="60" class="target-model" />
  <text y="280" class="text" x="120">Целевая модель</text>
  <text y="300" class="desc" x="120">Приблизительно 70 млрд параметров</text>

  <line x1="190" y1="285" x2="230" y2="285" class="arrow" />

  <!-- Verification Block -->
  <rect x="250" y="255" width="320" height="60" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4,4" />
  <text y="280" class="text" x="410">Проверяет все токены K за один проход вперед</text>
  <text y="300" class="desc" x="410">(Та же стоимость, что и при генерации 1 токена)</text>

  <line x1="570" y1="285" x2="610" y2="285" class="arrow" />

  <!-- Result Tokens Space Increased! -->
  <rect x="610" y="265" width="50" height="40" class="token-accepted" />
  <text y="290" class="text" x="635">T₁</text>

  <rect x="700" y="265" width="50" height="40" class="token-accepted" />
  <text y="290" class="text" x="725">T₂</text>

  <!-- Rejected token -->
  <rect x="790" y="265" width="50" height="40" class="token-rejected" />
  <text y="290" class="text" x="815">T₃</text>

  <!-- Discarded token -->
  <rect x="880" y="265" width="50" height="40" class="token-discard" />
  <text y="290" class="text" fill="#64748b" x="905">T₄</text>

  <!-- Result Text safely spaced apart -->
  <text y="330" class="text" fill="#16a34a" font-size="12" x="680">Принято</text>
  <text y="330" class="text" fill="#dc2626" font-size="12" x="815">Отклонено</text>
  <text y="330" class="text" fill="#64748b" font-size="12" x="905">Отклонено</text>

  <!-- Fallback loop from T3 back to Draft Model (Up, Left, then into Draft Model) -->
  <line x1="815" y1="265" x2="815" y2="200" stroke="#dc2626" stroke-width="2" stroke-dasharray="4,4" />
  <line x1="815" y1="200" x2="210" y2="200" stroke="#dc2626" stroke-width="2" stroke-dasharray="4,4" />
  <line x1="210" y1="200" x2="210" y2="140" stroke="#dc2626" stroke-width="2" stroke-dasharray="4,4" />
  <line x1="210" y1="140" x2="195" y2="140" class="arrow-red" />

  <text y="220" class="desc" fill="#dc2626" font-weight="bold" x="710">Результаты работы целевой модели соответствуют значению T₃</text>
  <text y="240" class="desc" fill="#dc2626" font-weight="bold" x="710">Модель черновика перерезолюционизирует данные начиная с уровня T₃</text>

</svg>
