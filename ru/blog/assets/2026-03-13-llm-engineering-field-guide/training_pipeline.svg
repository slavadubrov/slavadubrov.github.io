<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Inter, system-ui, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Пайплайн обучения LLM: от предобучения до синхронизации поведения</title>
  <desc id="artifact-desc">Пайплайн обучения LLM: от предобучения до синхронизации поведения.</desc>
  <defs>
    <marker id="arrow5" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b" />
    </marker>
    <marker id="arrow5b" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#166534" />
    </marker>
    <filter id="shadow5" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="900" height="420" fill="#f8fafc" rx="8" />

  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a" x="450">Пайплайн обучения LLM: от предобучения до синхронизации поведения</text>

  <!-- Stage 1: Pretraining -->
  <rect x="30" y="60" width="200" height="170" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow5)" />
  <text y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#1d4ed8" x="130">Предобучение</text>

  <rect x="50" y="95" width="160" height="55" rx="5" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="112" text-anchor="middle" font-size="10" fill="#0f172a" x="130">Прогноз следующего токена</text>
  <text y="126" text-anchor="middle" font-size="10" fill="#0f172a" x="130">Триллионы токенов</text>
  <text y="140" text-anchor="middle" font-size="10" fill="#334155" x="130">Самонадзорное обучение</text>

  <text y="170" font-size="10" fill="#0f172a" x="50">Стоимость: от 500 тыс. долларов до 100 млн долларов и более</text>
  <text y="185" font-size="10" fill="#0f172a" x="50">Вычислительная сложность: 10²⁴–10²⁶ операций на плавающую точку в секунду</text>
  <text y="200" font-size="10" fill="#1d4ed8" font-weight="bold" x="50">ZeRO + FSDP + смешанная точность</text>
  <text y="215" font-size="9" fill="#334155" x="50">Chinchilla → Чрезмерная обучаемость небольших моделей</text>

  <!-- Arrow 1→2 -->
  <line x1="230" y1="145" x2="275" y2="145" stroke="#334155" stroke-width="2" marker-end="url(#arrow5)" />

  <!-- Stage 2: SFT -->
  <rect x="275" y="60" width="180" height="170" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadow5)" />
  <text y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#9a3412" x="365">Тонкая настройка (SFT)</text>

  <rect x="295" y="95" width="140" height="55" rx="5" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="112" text-anchor="middle" font-size="10" fill="#0f172a" x="365">Данные, специфичные для задачи</text>
  <text y="126" text-anchor="middle" font-size="10" fill="#0f172a" x="365">Примеры с метками</text>
  <text y="140" text-anchor="middle" font-size="10" fill="#334155" x="365">С управлением</text>

  <text y="170" font-size="10" fill="#0f172a" x="295">Стоимость: от 100 до 10 тыс. долларов</text>
  <text y="185" font-size="10" fill="#0f172a" x="295">Вычислительная сложность: 10¹⁸–10²¹ операций в плавающей точке за такт</text>
  <text y="200" font-size="10" fill="#9a3412" font-weight="bold" x="295">LoRA / QLoRA (в 10 000 раз меньше параметров)</text>
  <text y="215" font-size="9" fill="#334155" x="295">65 ГБ на одной GPU объемом 48 ГБ</text>

  <!-- Arrow 2→3 -->
  <line x1="455" y1="145" x2="500" y2="145" stroke="#334155" stroke-width="2" marker-end="url(#arrow5)" />

  <!-- Stage 3: Alignment (branching) -->
  <rect x="500" y="60" width="380" height="170" rx="10" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow5)" />
  <text y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#5b21b6" x="690">Выравнивание</text>

  <!-- RLHF branch -->
  <rect x="520" y="95" width="155" height="65" rx="5" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6" x="597">RLHF / PPO</text>
  <text y="127" text-anchor="middle" font-size="9" fill="#0f172a" x="597">Модель вознаграждения + RL</text>
  <text y="141" text-anchor="middle" font-size="9" fill="#991b1b" x="597">4 копии модели в памяти</text>
  <text y="153" text-anchor="middle" font-size="9" fill="#334155" x="597">Сложная модель, чувствительная к гиперпараметрам</text>

  <!-- DPO branch -->
  <rect x="690" y="95" width="80" height="65" rx="5" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6" x="730">DPO</text>
  <text y="127" text-anchor="middle" font-size="9" fill="#0f172a" x="730">Не требуется метод обучения с подкреплением</text>
  <text y="141" text-anchor="middle" font-size="9" fill="#166534" x="730">Проще, стабильнее</text>
  <text y="153" text-anchor="middle" font-size="9" fill="#334155" x="730">Только офлайн</text>

  <!-- GRPO branch -->
  <rect x="785" y="95" width="80" height="65" rx="5" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6" x="825">ГРУППА</text>
  <text y="127" text-anchor="middle" font-size="9" fill="#0f172a" x="825">Модель критики отсутствует</text>
  <text y="141" text-anchor="middle" font-size="9" fill="#166534" x="825">Только 2 копии LLM</text>
  <text y="153" text-anchor="middle" font-size="9" fill="#334155" x="825">DeepSeek-R1</text>

  <text y="185" font-size="10" fill="#0f172a" x="520">Данные предпочтений человека/ИИ</text>
  <text y="200" font-size="10" fill="#0f172a" x="520">RLVR: награды на основе правил (математика, код)</text>
  <text y="215" font-size="10" fill="#5b21b6" font-weight="bold" x="520">Тренд: PPO → DPO → GRPO (проще к победе)</text>

  <!-- Distillation path -->
  <rect x="30" y="270" width="850" height="130" rx="10" fill="#f0fdf4" stroke="#166534" stroke-width="2" filter="url(#shadow5)" />
  <text y="295" text-anchor="middle" font-size="15" font-weight="bold" fill="#166534" x="455">Дистилляция и синтетические данные</text>

  <!-- Teacher → Student flow -->
  <rect x="60" y="310" width="180" height="45" rx="5" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534" x="150">Большой учитель</text>
  <text y="345" text-anchor="middle" font-size="10" fill="#0f172a" x="150">DeepSeek-R1 (671 млрд параметров)</text>

  <line x1="240" y1="332" x2="305" y2="332" stroke="#166534" stroke-width="2" marker-end="url(#arrow5b)" />
  <text y="325" text-anchor="middle" font-size="9" fill="#166534" x="272">CoT с 800 тыс. параметрами</text>
  <text y="350" text-anchor="middle" font-size="9" fill="#166534" x="272">примеры</text>

  <rect x="305" y="310" width="170" height="45" rx="5" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534" x="390">Компактный студент</text>
  <text y="345" text-anchor="middle" font-size="10" fill="#0f172a" x="390">Модели с размером 1,5 млрд → 70 млрд параметров</text>

  <!-- Results -->
  <rect x="510" y="310" width="350" height="70" rx="5" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534" x="685">Результаты</text>
  <text y="347" font-size="10" fill="#0f172a" x="530">• 32 млрд фильтрованных ритмов OpenAI o1-mini</text>
  <text y="362" font-size="10" fill="#0f172a" x="530">• Дистилляция &gt; прямое использование RL на небольших моделях</text>
  <text y="377" font-size="10" fill="#166534" font-weight="bold" x="530">• Самый эффективный путь к компактному выводу</text>

  <!-- Connection from alignment to distillation -->
  <path d="M690,230 L690,250 L455,250 L455,270" stroke="#166534" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow5b)" />
  <text y="248" font-size="9" fill="#166534" x="580">Алгоритм синхронизации генерирует данные для обучения</text>
</svg>
