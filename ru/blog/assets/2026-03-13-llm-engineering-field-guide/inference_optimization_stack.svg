<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Inter, system-ui, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Стек оптимизации инференса</title>
  <desc id="artifact-desc">Стек оптимизации инференса.</desc>
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
    <filter id="shadow1" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="900" height="520" fill="#f8fafc" rx="8" />

  <!-- Title -->
  <text y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a" x="450">Стек оптимизации инференса</text>
  <text y="55" text-anchor="middle" font-size="12" fill="#334155" x="450">Как технические решения взаимодействуют для обеспечения работы LLM на уровне производства</text>

  <!-- Layer 1: Hardware Foundation -->
  <rect x="50" y="420" width="800" height="70" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow1)" />
  <text y="448" font-size="13" font-weight="bold" fill="#1d4ed8" x="80">Аппаратная основа</text>
  <text y="468" font-size="11" fill="#0f172a" x="80">Иерархия памяти GPU: HBM3 (3,35 ТБ/с) → L2 (12 ТБ/с) → SRAM (33 ТБ/с)</text>
  <text y="483" font-size="10" fill="#334155" x="80">Разница в пропускной способности между SRAM и HBM в 10 раз стимулирует все вышеупомянутые оптимизации</text>

  <!-- Layer 2: Kernel Optimizations -->
  <rect x="50" y="330" width="380" height="75" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadow1)" />
  <text y="355" font-size="13" font-weight="bold" fill="#166534" x="70">Оптимизация ядра</text>
  <text y="373" font-size="11" fill="#0f172a" x="70">FlashAttention (размещение в SRAM)</text>
  <text y="388" font-size="11" fill="#0f172a" x="70">Слиянные ядра (удаление необходимости передачи данных через HBM)</text>
  <text y="398" font-size="10" fill="#334155" x="70">Использование GPU от 80 до 90%</text>

  <rect x="450" y="330" width="400" height="75" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadow1)" />
  <text y="355" font-size="13" font-weight="bold" fill="#9a3412" x="470">Квантование</text>
  <text y="373" font-size="11" fill="#0f172a" x="470">FP8 (без потерь), INT8, INT4 (AWQ/GPTQ)</text>
  <text y="388" font-size="11" fill="#0f172a" x="470">Качество ядра: разница в скорости в 2,6 раза</text>
  <text y="398" font-size="10" fill="#334155" x="470">Сокращение использования памяти на 50–75%</text>

  <!-- Layer 3: Memory Management -->
  <rect x="50" y="240" width="380" height="75" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow1)" />
  <text y="265" font-size="13" font-weight="bold" fill="#5b21b6" x="70">Управление памятью</text>
  <text y="283" font-size="11" fill="#0f172a" x="70">PagedAttention (расход ресурсов — &lt;4% против 60–80%)</text>
  <text y="298" font-size="11" fill="#0f172a" x="70">GQA/MQA (сокращение размера кэша KV в 8–16 раз)</text>
  <text y="308" font-size="10" fill="#334155" x="70">Увеличение пропускной способности на 2–4 раза</text>

  <rect x="450" y="240" width="400" height="75" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow1)" />
  <text y="265" font-size="13" font-weight="bold" fill="#5b21b6" x="470">Планирование</text>
  <text y="283" font-size="11" fill="#0f172a" x="470">Непрерывная группировка (на уровне итераций)</text>
  <text y="298" font-size="11" fill="#0f172a" x="470">Разбитая предзаполненность (+50% пропускной способности)</text>
  <text y="308" font-size="10" fill="#334155" x="470">23× по сравнению с примитивным группированием данных</text>

  <!-- Layer 4: Serving Strategies -->
  <rect x="50" y="150" width="250" height="75" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow1)" />
  <text y="175" font-size="13" font-weight="bold" fill="#1d4ed8" x="70">Кэширование</text>
  <text y="193" font-size="11" fill="#0f172a" x="70">Кэширование префиксов (уровень успешных запросов 87% и выше)</text>
  <text y="208" font-size="11" fill="#0f172a" x="70">RadixAttention (пропускная способность в 5 раз выше)</text>

  <rect x="320" y="150" width="260" height="75" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow1)" />
  <text y="175" font-size="13" font-weight="bold" fill="#1d4ed8" x="340">Гипотеза</text>
  <text y="193" font-size="11" fill="#0f172a" x="340">Спекулятивная декодирование (1,5–3 раза)</text>
  <text y="208" font-size="11" fill="#0f172a" x="340">EAGLE-3 (ускорение в 3–6,5 раз)</text>

  <rect x="600" y="150" width="250" height="75" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow1)" />
  <text y="175" font-size="13" font-weight="bold" fill="#1d4ed8" x="620">Параллелизм</text>
  <text y="193" font-size="11" fill="#0f172a" x="620">TP (внутри узла, NVLink)</text>
  <text y="208" font-size="11" fill="#0f172a" x="620">PP (межузловая связь) + DP (масштабирование)</text>

  <!-- Layer 5: Application Layer -->
  <rect x="50" y="70" width="800" height="65" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#shadow1)" />
  <text y="95" font-size="13" font-weight="bold" fill="#991b1b" x="80">Слой прикладного программирования</text>
  <text y="113" font-size="11" fill="#0f172a" x="80" textLength="891.29" lengthAdjust="spacingAndGlyphs" transform="translate(-75.65 0.00)">Маршрутизация моделей (сокращение затрат на 85%) · Ограничение скорости (на основе токенов) · Мониторинг (пропускная способность, использование KV-хранилища, TTFT/TPOT)</text>
  <text y="128" font-size="10" fill="#334155" x="80">Затраты снижаются в 10 раз в год — комбинированная оптимизация обеспечивает эффект сложных процентов</text>

  <!-- Connecting arrows -->
  <line x1="240" y1="420" x2="240" y2="405" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow1)" />
  <line x1="650" y1="420" x2="650" y2="405" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow1)" />
  <line x1="240" y1="330" x2="240" y2="315" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow1)" />
  <line x1="650" y1="330" x2="650" y2="315" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow1)" />
  <line x1="175" y1="240" x2="175" y2="225" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow1)" />
  <line x1="450" y1="240" x2="450" y2="225" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow1)" />
  <line x1="725" y1="240" x2="725" y2="225" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow1)" />
  <line x1="450" y1="150" x2="450" y2="135" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow1)" />
</svg>
