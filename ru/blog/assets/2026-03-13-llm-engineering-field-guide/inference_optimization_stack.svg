<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Inference Optimization Stack" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Инференс стек оптимизации</title>
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
    <filter id="shadow1" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="900" height="520" fill="#f8fafc" rx="8" />

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">стек оптимизации инференс</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#334155">Как техники объединяются для обеспечения работоспособности решений уровня продакшена LLM сервинг</text>

  <!-- Layer 1: Hardware Foundation -->
  <rect x="50" y="420" width="800" height="70" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow1)" />
  <text x="80" y="448" font-size="13" font-weight="bold" fill="#1d4ed8">Аппаратная база</text>
  <text x="80" y="468" font-size="11" fill="#0f172a">GPU иерархия памяти: HBM3 (3,35 ТБ/с) → L2 (12 ТБ/с) → SRAM (33 ТБ/с)</text>
  <text x="80" y="483" font-size="10" fill="#334155">Измеряйте расходы на вычисления, память и коммуникацию боттлнек в целевой среде GPU</text>

  <!-- Layer 2: Kernel Optimizations -->
  <rect x="50" y="330" width="380" height="75" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadow1)" />
  <text x="70" y="355" font-size="13" font-weight="bold" fill="#166534">Оптимизация ядра</text>
  <text x="70" y="373" font-size="11" fill="#0f172a">FlashAttention (разметка в SRAM)</text>
  <text x="70" y="388" font-size="11" fill="#0f172a">Слиянные ядра (сокращение количества итераций HBM)</text>
  <text x="70" y="398" font-size="10" fill="#334155">Использование профиля в развернутой графовой структуре</text>

  <rect x="450" y="330" width="400" height="75" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadow1)" />
  <text x="470" y="355" font-size="13" font-weight="bold" fill="#9a3412">Квантизация</text>
  <text x="470" y="373" font-size="11" fill="#0f172a">FP8, INT8, INT4 (AWQ/GPTQ)</text>
  <text x="470" y="388" font-size="11" fill="#0f172a">Качество ядра: разница в скорости в 2,6 раза</text>
  <text x="470" y="398" font-size="10" fill="#334155">Сокращение использования памяти на 50–75%</text>

  <!-- Layer 3: Memory Management -->
  <rect x="50" y="240" width="380" height="75" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow1)" />
  <text x="70" y="265" font-size="13" font-weight="bold" fill="#5b21b6">Управление памятью</text>
  <text x="70" y="283" font-size="11" fill="#0f172a">PagedAttention (аллокация ключ-значений на основе блоков)</text>
  <text x="70" y="298" font-size="11" fill="#0f172a">GQA/MQA (сокращение на 8–16× KV cache)</text>
  <text x="70" y="308" font-size="10" fill="#334155">Размер получаемой прибыли зависит от нагрузки и харнесс</text>

  <rect x="450" y="240" width="400" height="75" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow1)" />
  <text x="470" y="265" font-size="13" font-weight="bold" fill="#5b21b6">Планирование</text>
  <text x="470" y="283" font-size="11" fill="#0f172a">Continuous batching (на уровне итерации)</text>
  <text x="470" y="298" font-size="11" fill="#0f172a">Чанкованный префилл (защищает процесс декодирования латентность)</text>
  <text x="470" y="308" font-size="10" fill="#334155">Настроить параметры под goodput в соответствии с целевым SLO</text>

  <!-- Layer 4: Serving Strategies -->
  <rect x="50" y="150" width="250" height="75" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow1)" />
  <text x="70" y="175" font-size="13" font-weight="bold" fill="#1d4ed8">Кэширование</text>
  <text x="70" y="193" font-size="11" fill="#0f172a">Prefix caching (измерение коэффициента успешных запросов)</text>
  <text x="70" y="208" font-size="11" fill="#0f172a">RadixAttention (использование KV-памяти на основе деревьев)</text>

  <rect x="320" y="150" width="260" height="75" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow1)" />
  <text x="340" y="175" font-size="13" font-weight="bold" fill="#1d4ed8">спекуляция</text>
  <text x="340" y="193" font-size="11" fill="#0f172a">спекулятивная декодировка (проверка черновиков)</text>
  <text x="340" y="208" font-size="11" fill="#0f172a">Коэффициент принятия определяет уровень гейна</text>

  <rect x="600" y="150" width="250" height="75" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow1)" />
  <text x="620" y="175" font-size="13" font-weight="bold" fill="#1d4ed8">Параллелизм</text>
  <text x="620" y="193" font-size="11" fill="#0f172a">TP (внутри узла, NVLink)</text>
  <text x="620" y="208" font-size="11" fill="#0f172a">PP (межузловая связь) + DP (масштабирование)</text>

  <!-- Layer 5: Application Layer -->
  <rect x="50" y="70" width="800" height="65" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#shadow1)" />
  <text x="80" y="95" font-size="13" font-weight="bold" fill="#991b1b">слоя прикладного программирования</text>
  <text x="80" y="113" font-size="11" fill="#0f172a">Роутинг моделей · ограничение скорости передачи с учетом Токен · мониторинг (goodput, уровень использования KV, TTFT/TPOT)</text>
  <text x="80" y="128" font-size="10" fill="#334155">Сочетайте техники только после оценки их качества, латентность, и эффективности затрат</text>

  <!-- Connecting arrows -->
  <line x1="240" y1="420" x2="240" y2="405" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow1)" />
  <line x1="650" y1="420" x2="650" y2="405" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow1)" />
  <line x1="240" y1="330" x2="240" y2="315" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow1)" />
  <line x1="650" y1="330" x2="650" y2="315" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow1)" />
  <line x1="175" y1="240" x2="175" y2="225" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow1)" />
  <line x1="450" y1="240" x2="450" y2="225" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow1)" />
  <line x1="725" y1="240" x2="725" y2="225" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow1)" />
  <line x1="450" y1="150" x2="450" y2="135" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow1)" />
</svg>
