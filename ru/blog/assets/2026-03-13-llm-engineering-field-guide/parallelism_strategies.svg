<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrow4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555" />
    </marker>
    <filter id="shadow4" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1" />
    </filter>
  </defs>

  <rect width="900" height="520" fill="#fafbfc" rx="8" />

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">Четыре вида параллелизма</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#666">Как распределить вычисления LLM между несколькими GPU</text>

  <!-- TP: Tensor Parallelism -->
  <rect x="30" y="75" width="410" height="190" rx="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" filter="url(#shadow4)" />
  <text x="235" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#1565c0">Параллелизм тензоров (TP)</text>
  <text x="235" y="118" text-anchor="middle" font-size="11" fill="#666">Распределение матриц весов между GPU</text>

  <!-- Weight matrix split -->
  <rect x="60" y="130" width="160" height="50" rx="4" fill="#1565c0" opacity="0.7" />
  <text x="140" y="160" text-anchor="middle" font-size="11" fill="#fff">Матрица весов W</text>
  <line x1="220" y1="155" x2="250" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#arrow4)" />
  <!-- Split parts -->
  <rect x="250" y="130" width="80" height="24" rx="3" fill="#1565c0" />
  <text x="290" y="147" text-anchor="middle" font-size="9" fill="#fff">W₁ → GPU 0</text>
  <rect x="250" y="157" width="80" height="24" rx="3" fill="#2980b9" />
  <text x="290" y="174" text-anchor="middle" font-size="9" fill="#fff">W₂ → GPU 1</text>

  <text x="60" y="205" font-size="10" fill="#333">• Алгоритм All-Reduce после каждого слоя</text>
  <text x="60" y="220" font-size="10" fill="#333">• Требуется NVLink (900 ГБ/с на H100)</text>
  <text x="60" y="235" font-size="10" fill="#333">• Оптимально для одного узла: TP=2 или TP=4</text>
  <text x="60" y="250" font-size="10" fill="#1565c0" font-weight="bold">• Снижает задержку на запрос</text>

  <!-- PP: Pipeline Parallelism -->
  <rect x="460" y="75" width="410" height="190" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" filter="url(#shadow4)" />
  <text x="665" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#2e7d32">Параллелизм потоков обработки (PP)</text>
  <text x="665" y="118" text-anchor="middle" font-size="11" fill="#666">Последовательное разделение слоев между GPU</text>

  <!-- Pipeline stages -->
  <rect x="490" y="132" width="75" height="40" rx="4" fill="#2e7d32" />
  <text x="527" y="147" text-anchor="middle" font-size="9" fill="#fff">Слои с 1 по 20</text>
  <text x="527" y="160" text-anchor="middle" font-size="8" fill="#e8f5e9">GPU 0</text>
  <line x1="565" y1="152" x2="585" y2="152" stroke="#555" stroke-width="1.5" marker-end="url(#arrow4)" />
  <rect x="585" y="132" width="75" height="40" rx="4" fill="#27ae60" />
  <text x="622" y="147" text-anchor="middle" font-size="9" fill="#fff">Слои 21–40</text>
  <text x="622" y="160" text-anchor="middle" font-size="8" fill="#e8f5e9">GPU 1</text>
  <line x1="660" y1="152" x2="680" y2="152" stroke="#555" stroke-width="1.5" marker-end="url(#arrow4)" />
  <rect x="680" y="132" width="75" height="40" rx="4" fill="#66bb6a" />
  <text x="717" y="147" text-anchor="middle" font-size="9" fill="#fff">Слои 41–60</text>
  <text x="717" y="160" text-anchor="middle" font-size="8" fill="#fff">GPU 2</text>

  <text x="490" y="200" font-size="10" fill="#333">• Передача активаций между этапами</text>
  <text x="490" y="215" font-size="10" fill="#333">• Меньшая пропускная способность → работает между узлами</text>
  <text x="490" y="230" font-size="10" fill="#333">• Шарики в потоке обработки (время простоя GPU)</text>
  <text x="490" y="245" font-size="10" fill="#2e7d32" font-weight="bold">• Llama-405B: TP=8 + PP=2</text>

  <!-- DP: Data Parallelism -->
  <rect x="30" y="285" width="410" height="190" rx="10" fill="#fff3e0" stroke="#e65100" stroke-width="2" filter="url(#shadow4)" />
  <text x="235" y="310" text-anchor="middle" font-size="15" font-weight="bold" fill="#e65100">Параллелизм данных (Data Parallelism, DP)</text>
  <text x="235" y="328" text-anchor="middle" font-size="11" fill="#666">Реплицировать полную модель на каждой GPU</text>

  <!-- Replicated models -->
  <rect x="70" y="342" width="90" height="45" rx="4" fill="#e65100" />
  <text x="115" y="362" text-anchor="middle" font-size="9" fill="#fff">Полная модель</text>
  <text x="115" y="378" text-anchor="middle" font-size="8" fill="#fff3e0">GPU 0 → Пакет A</text>
  <rect x="175" y="342" width="90" height="45" rx="4" fill="#e67e22" />
  <text x="220" y="362" text-anchor="middle" font-size="9" fill="#fff">Полная модель</text>
  <text x="220" y="378" text-anchor="middle" font-size="8" fill="#fff3e0">GPU 1 → Пакет B</text>
  <rect x="280" y="342" width="90" height="45" rx="4" fill="#f39c12" />
  <text x="325" y="362" text-anchor="middle" font-size="9" fill="#fff">Полная модель</text>
  <text x="325" y="378" text-anchor="middle" font-size="8" fill="#fff3e0">GPU 2 → Пакет C</text>

  <text x="60" y="413" font-size="10" fill="#333">• Отсутствие взаимодействия между GPU (во время инференса)</text>
  <text x="60" y="428" font-size="10" fill="#333">• Самая экономичная стратегия масштабирования</text>
  <text x="60" y="443" font-size="10" fill="#333">• Для обучения: используется в сочетании с шардингом ZeRO</text>
  <text x="60" y="458" font-size="10" fill="#e65100" font-weight="bold">• Используется, когда модель помещается на одну GPU</text>

  <!-- EP: Expert Parallelism -->
  <rect x="460" y="285" width="410" height="190" rx="10" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" filter="url(#shadow4)" />
  <text x="665" y="310" text-anchor="middle" font-size="15" font-weight="bold" fill="#6a1b9a">Экспертный параллелизм (EP)</text>
  <text x="665" y="328" text-anchor="middle" font-size="11" fill="#666">Распределить экспертов MoE между GPU</text>

  <!-- Router + experts -->
  <rect x="575" y="340" width="80" height="30" rx="4" fill="#6a1b9a" />
  <text x="615" y="360" text-anchor="middle" font-size="10" fill="#fff">Маршрутизатор</text>

  <!-- Expert boxes -->
  <line x1="593" y1="370" x2="517" y2="385" stroke="#6a1b9a" stroke-width="1" />
  <line x1="605" y1="370" x2="582" y2="385" stroke="#6a1b9a" stroke-width="1" />
  <line x1="625" y1="370" x2="707" y2="385" stroke="#6a1b9a" stroke-width="1" />
  <line x1="637" y1="370" x2="772" y2="385" stroke="#6a1b9a" stroke-width="1" />

  <rect x="490" y="385" width="55" height="24" rx="3" fill="#9b59b6" />
  <text x="517" y="401" text-anchor="middle" font-size="8" fill="#fff">Видеокарта E1, порт 0</text>
  <rect x="555" y="385" width="55" height="24" rx="3" fill="#9b59b6" />
  <text x="582" y="401" text-anchor="middle" font-size="8" fill="#fff">Видеокарта E2 GPU0</text>
  <rect x="680" y="385" width="55" height="24" rx="3" fill="#ab47bc" />
  <text x="707" y="401" text-anchor="middle" font-size="8" fill="#fff">Видеокарта E3 GPU1</text>
  <rect x="745" y="385" width="55" height="24" rx="3" fill="#ab47bc" />
  <text x="772" y="401" text-anchor="middle" font-size="8" fill="#fff">Видеокарта E4 GPU1</text>

  <text x="490" y="433" font-size="10" fill="#333">• Взаимодействие всех узлов для маршрутизации токенов</text>
  <text x="490" y="448" font-size="10" fill="#333">• 47% от задержки при прямой передаче данных (даже через NVLink)</text>
  <text x="490" y="463" font-size="10" fill="#6a1b9a" font-weight="bold">• DeepSeek-V3: 256 экспертов, EP=8/узел</text>

  <!-- Decision framework at bottom -->
  <rect x="30" y="488" width="840" height="25" rx="5" fill="#e3f2fd" stroke="#1565c0" stroke-width="1" />
  <text x="450" y="505" text-anchor="middle" font-size="11" fill="#1565c0" font-weight="bold">Решение: подходит 1 GPU → DP | подходит 1 узел → TP + DP | превышает 1 узел → TP + PP + DP | MoE → добавить EP</text>
</svg>
