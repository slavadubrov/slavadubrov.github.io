<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Inter, system-ui, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Четыре вида параллелизма</title>
  <desc id="artifact-desc">Четыре вида параллелизма.</desc>
  <defs>
    <marker id="arrow4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#334155" />
    </marker>
    <filter id="shadow4" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="900" height="520" fill="#f8fafc" rx="8" />

  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a" x="450">Четыре вида параллелизма</text>
  <text y="52" text-anchor="middle" font-size="12" fill="#334155" x="450">Как распределить вычисления LLM между несколькими GPU</text>

  <!-- TP: Tensor Parallelism -->
  <rect x="30" y="75" width="410" height="190" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow4)" />
  <text y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#1d4ed8" x="235">Параллелизм тензоров (TP)</text>
  <text y="118" text-anchor="middle" font-size="11" fill="#334155" x="235">Распределение матриц весов между GPU</text>

  <!-- Weight matrix split -->
  <rect x="60" y="130" width="160" height="50" rx="4" fill="#2563eb" opacity="0.7" />
  <text y="160" text-anchor="middle" font-size="11" fill="#ffffff" x="140">Матрица весов W</text>
  <line x1="220" y1="155" x2="250" y2="155" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow4)" />
  <!-- Split parts -->
  <rect x="250" y="130" width="80" height="24" rx="3" fill="#2563eb" />
  <text y="147" text-anchor="middle" font-size="9" fill="#ffffff" x="290">W₁ → GPU 0</text>
  <rect x="250" y="157" width="80" height="24" rx="3" fill="#2563eb" />
  <text y="174" text-anchor="middle" font-size="9" fill="#ffffff" x="290">W₂ → GPU 1</text>

  <text y="205" font-size="10" fill="#0f172a" x="60">• Алгоритм All-Reduce после каждого слоя</text>
  <text y="220" font-size="10" fill="#0f172a" x="60">• Требуется NVLink (900 ГБ/с на H100)</text>
  <text y="235" font-size="10" fill="#0f172a" x="60">• Оптимально для одного узла: TP=2 или TP=4</text>
  <text y="250" font-size="10" fill="#1d4ed8" font-weight="bold" x="60">• Снижает задержку на запрос</text>

  <!-- PP: Pipeline Parallelism -->
  <rect x="460" y="75" width="410" height="190" rx="10" fill="#f0fdf4" stroke="#166534" stroke-width="2" filter="url(#shadow4)" />
  <text y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#166534" x="665">Параллелизм потоков обработки (PP)</text>
  <text y="118" text-anchor="middle" font-size="11" fill="#334155" x="665">Последовательное разделение слоев между GPU</text>

  <!-- Pipeline stages -->
  <rect x="490" y="132" width="75" height="40" rx="4" fill="#166534" />
  <text y="147" text-anchor="middle" font-size="9" fill="#ffffff" x="527">Слои с 1 по 20</text>
  <text y="160" text-anchor="middle" font-size="9" fill="#16a34a" x="527">GPU 0</text>
  <line x1="565" y1="152" x2="585" y2="152" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow4)" />
  <rect x="585" y="132" width="75" height="40" rx="4" fill="#16a34a" />
  <text y="147" text-anchor="middle" font-size="9" fill="#ffffff" x="622">Слои 21–40</text>
  <text y="160" text-anchor="middle" font-size="9" fill="#16a34a" x="622">GPU 1</text>
  <line x1="660" y1="152" x2="680" y2="152" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow4)" />
  <rect x="680" y="132" width="75" height="40" rx="4" fill="#16a34a" />
  <text y="147" text-anchor="middle" font-size="9" fill="#ffffff" x="717">Слои 41–60</text>
  <text y="160" text-anchor="middle" font-size="9" fill="#ffffff" x="717">GPU 2</text>

  <text y="200" font-size="10" fill="#0f172a" x="490">• Передача активаций между этапами</text>
  <text y="215" font-size="10" fill="#0f172a" x="490">• Меньшая пропускная способность → работает между узлами</text>
  <text y="230" font-size="10" fill="#0f172a" x="490">• Шарики в потоке обработки (время простоя GPU)</text>
  <text y="245" font-size="10" fill="#166534" font-weight="bold" x="490">• Llama-405B: TP=8 + PP=2</text>

  <!-- DP: Data Parallelism -->
  <rect x="30" y="285" width="410" height="190" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadow4)" />
  <text y="310" text-anchor="middle" font-size="15" font-weight="bold" fill="#9a3412" x="235">Параллелизм данных (Data Parallelism, DP)</text>
  <text y="328" text-anchor="middle" font-size="11" fill="#334155" x="235">Реплицировать полную модель на каждой GPU</text>

  <!-- Replicated models -->
  <rect x="70" y="342" width="90" height="45" rx="4" fill="#ea580c" />
  <text y="362" text-anchor="middle" font-size="9" fill="#ffffff" x="115">Полная модель</text>
  <text y="378" text-anchor="middle" font-size="9" fill="#ea580c" x="115">GPU 0 → Пакет A</text>
  <rect x="175" y="342" width="90" height="45" rx="4" fill="#ea580c" />
  <text y="362" text-anchor="middle" font-size="9" fill="#ffffff" x="220">Полная модель</text>
  <text y="378" text-anchor="middle" font-size="9" fill="#ea580c" x="220">GPU 1 → Пакет B</text>
  <rect x="280" y="342" width="90" height="45" rx="4" fill="#ea580c" />
  <text y="362" text-anchor="middle" font-size="9" fill="#ffffff" x="325">Полная модель</text>
  <text y="378" text-anchor="middle" font-size="9" fill="#ea580c" x="325">GPU 2 → Пакет C</text>

  <text y="413" font-size="10" fill="#0f172a" x="60">• Отсутствие взаимодействия между GPU (во время инференса)</text>
  <text y="428" font-size="10" fill="#0f172a" x="60">• Самая экономичная стратегия масштабирования</text>
  <text y="443" font-size="10" fill="#0f172a" x="60">• Для обучения: используется в сочетании с шардингом ZeRO</text>
  <text y="458" font-size="10" fill="#9a3412" font-weight="bold" x="60">• Используется, когда модель помещается на одну GPU</text>

  <!-- EP: Expert Parallelism -->
  <rect x="460" y="285" width="410" height="190" rx="10" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow4)" />
  <text y="310" text-anchor="middle" font-size="15" font-weight="bold" fill="#5b21b6" x="665">Экспертный параллелизм (EP)</text>
  <text y="328" text-anchor="middle" font-size="11" fill="#334155" x="665">Распределить экспертов MoE между GPU</text>

  <!-- Router + experts -->
  <rect x="575" y="340" width="80" height="30" rx="4" fill="#7c3aed" />
  <text y="360" text-anchor="middle" font-size="10" fill="#ffffff" x="615">Маршрутизатор</text>

  <!-- Expert boxes -->
  <line x1="593" y1="370" x2="517" y2="385" stroke="#7c3aed" stroke-width="1" />
  <line x1="605" y1="370" x2="582" y2="385" stroke="#7c3aed" stroke-width="1" />
  <line x1="625" y1="370" x2="707" y2="385" stroke="#7c3aed" stroke-width="1" />
  <line x1="637" y1="370" x2="772" y2="385" stroke="#7c3aed" stroke-width="1" />

  <rect x="490" y="385" width="55" height="24" rx="3" fill="#7c3aed" />
  <text y="401" text-anchor="middle" font-size="9" fill="#ffffff" x="517">Видеокарта E1, порт 0</text>
  <rect x="555" y="385" width="55" height="24" rx="3" fill="#7c3aed" />
  <text y="401" text-anchor="middle" font-size="9" fill="#ffffff" x="582">Видеокарта E2 GPU0</text>
  <rect x="680" y="385" width="55" height="24" rx="3" fill="#7c3aed" />
  <text y="401" text-anchor="middle" font-size="9" fill="#ffffff" x="707">Видеокарта E3 GPU1</text>
  <rect x="745" y="385" width="55" height="24" rx="3" fill="#7c3aed" />
  <text y="401" text-anchor="middle" font-size="9" fill="#ffffff" x="772">Видеокарта E4 GPU1</text>

  <text y="433" font-size="10" fill="#0f172a" x="490">• Взаимодействие всех узлов для маршрутизации токенов</text>
  <text y="448" font-size="10" fill="#0f172a" x="490">• 47% от задержки при прямой передаче данных (даже через NVLink)</text>
  <text y="463" font-size="10" fill="#5b21b6" font-weight="bold" x="490">• DeepSeek-V3: 256 экспертов, EP=8/узел</text>

  <!-- Decision framework at bottom -->
  <rect x="30" y="488" width="840" height="25" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1" />
  <text y="505" text-anchor="middle" font-size="11" fill="#1d4ed8" font-weight="bold" x="450">Решение: подходит 1 GPU → DP | подходит 1 узел → TP + DP | превышает 1 узел → TP + PP + DP | MoE → добавить EP</text>
</svg>
