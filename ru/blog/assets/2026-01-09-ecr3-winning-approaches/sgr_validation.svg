<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Логические выводы с управлением схемой и проверкой шагов</title>
  <desc id="artifact-desc">Логические выводы с управлением схемой и проверкой шагов.</desc>
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #334155;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="planGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="validateGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #ea580c;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #ea580c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="executeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #16a34a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="observeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #2563eb;stop-opacity:1" />
    </linearGradient>
    <filter id="glow3" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <marker id="arrow3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a" />
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="800" height="380" fill="#0f172a" rx="16" />

  <!-- Title -->
  <text y="40" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" x="400">Логические выводы с управлением схемой и проверкой шагов</text>

  <!-- Main horizontal flow -->
  <!-- Box 1: Plan -->
  <rect x="50" y="100" width="130" height="90" rx="12" fill="url(#planGrad)" />
  <text y="140" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" x="115">План</text>
  <text y="165" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Inter, system-ui, sans-serif" font-size="11" x="115">Шаг схемы JSON</text>

  <!-- Box 2: Validate -->
  <rect x="240" y="100" width="130" height="90" rx="12" fill="url(#validateGrad)" />
  <text y="140" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" x="305">Проверка</text>
  <text y="165" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Inter, system-ui, sans-serif" font-size="11" x="305">Проверщик шагов</text>

  <!-- Box 3: Execute -->
  <rect x="430" y="100" width="130" height="90" rx="12" fill="url(#executeGrad)" />
  <text y="140" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" x="495">Выполнить</text>
  <text y="165" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Inter, system-ui, sans-serif" font-size="11" x="495">запрос к API</text>

  <!-- Box 4: Observe -->
  <rect x="620" y="100" width="130" height="90" rx="12" fill="url(#observeGrad)" />
  <text y="140" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" x="685">Наблюдайте</text>
  <text y="165" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Inter, system-ui, sans-serif" font-size="11" x="685">Анализ результата</text>

  <!-- Main flow arrows -->
  <line x1="180" y1="145" x2="235" y2="145" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow3)" />

  <!-- Validate to Execute (green valid path) -->
  <line x1="370" y1="145" x2="425" y2="145" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)" />
  <text y="135" text-anchor="middle" fill="#16a34a" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" x="398">✓ Валидно</text>

  <line x1="560" y1="145" x2="615" y2="145" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow3)" />

  <!-- Loop back from Observe to Plan -->
  <path d="M 685 190 L 685 220 Q 685 235, 670 235 L 130 235 Q 115 235, 115 220 L 115 195" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow3)" />
  <text y="255" text-anchor="middle" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="12" x="400">Следующий шаг →</text>

  <!-- Rework path (invalid) -->
  <path d="M 305 190 L 305 295 Q 305 310, 290 310 L 130 310 Q 115 310, 115 295 L 115 195" fill="none" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowRed)" />

  <!-- Rework label box -->
  <rect x="195" y="280" width="100" height="26" rx="6" fill="rgba(239, 68, 68, 0.2)" stroke="#dc2626" stroke-width="1" />
  <text y="298" text-anchor="middle" fill="#dc2626" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" x="245">✗ Переработка</text>

  <!-- Speed indicator -->
  <rect x="550" y="300" width="200" height="50" rx="10" fill="rgba(16, 185, 129, 0.12)" stroke="#16a34a" stroke-width="1" />
  <text y="322" text-anchor="middle" fill="#16a34a" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" x="650">около 3 000 токенов/секунду</text>
  <text y="340" text-anchor="middle" fill="#16a34a" font-family="Inter, system-ui, sans-serif" font-size="11" x="650">Высокоскоростная обработка данных в Cerebras</text>
</svg>
