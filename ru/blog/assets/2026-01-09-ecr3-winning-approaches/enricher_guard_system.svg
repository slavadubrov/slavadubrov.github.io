<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Система обогащения и защиты</title>
  <desc id="artifact-desc">Система обогащения и защиты.</desc>
  <defs>
    <linearGradient id="bgGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #334155;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="enricherGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="guardGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #ea580c;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #ea580c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ragGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #16a34a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow4" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <marker id="arrow4" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="800" height="420" fill="#0f172a" rx="16" />

  <!-- Title -->
  <text y="40" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" x="400">Система обогащения и защиты</text>

  <!-- Central Agent box -->
  <rect x="320" y="160" width="160" height="100" rx="12" fill="url(#agentGrad)" />
  <text y="200" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" x="400">Агент</text>
  <text y="225" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Inter, system-ui, sans-serif" font-size="11" x="400">Qwen3-235B</text>
  <text y="245" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Inter, system-ui, sans-serif" font-size="10" x="400">LangChain SGR</text>

  <!-- Enrichers box (left top) -->
  <rect x="50" y="80" width="180" height="120" rx="12" fill="url(#enricherGrad)" />
  <text y="115" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" x="140">Более 20 устройств обогащения</text>
  <text y="140" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Inter, system-ui, sans-serif" font-size="10" x="140">RoleEnricher</text>
  <text y="158" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Inter, system-ui, sans-serif" font-size="10" x="140">Усилитель подсказок пагинации</text>
  <text y="176" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Inter, system-ui, sans-serif" font-size="10" x="140">Усилитель контекстуальных подсказок</text>
  <text y="190" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="Inter, system-ui, sans-serif" font-size="9" x="140">...</text>

  <!-- Arrow from Enrichers to Agent -->
  <line x1="230" y1="140" x2="315" y2="190" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow4)" />
  <text y="150" fill="#2563eb" font-family="Inter, system-ui, sans-serif" font-size="10" x="260">подсказки</text>

  <!-- Guard System box (left bottom) -->
  <rect x="50" y="240" width="180" height="130" rx="12" fill="url(#guardGrad)" />
  <text y="270" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" x="140">Защитные устройства 3-х режимов</text>

  <!-- Hard block -->
  <rect x="65" y="285" width="70" height="24" rx="4" fill="rgba(239, 68, 68, 0.3)" stroke="#dc2626" stroke-width="1" />
  <text y="302" text-anchor="middle" fill="#dc2626" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="500" x="100">Жесткий блок</text>

  <!-- Soft block -->
  <rect x="145" y="285" width="70" height="24" rx="4" fill="rgba(251, 191, 36, 0.3)" stroke="#ea580c" stroke-width="1" />
  <text y="302" text-anchor="middle" fill="#ea580c" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="500" x="180">Мягкий блок</text>

  <!-- Soft hint -->
  <rect x="105" y="320" width="70" height="24" rx="4" fill="rgba(52, 211, 153, 0.3)" stroke="#16a34a" stroke-width="1" />
  <text y="337" text-anchor="middle" fill="#16a34a" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="500" x="140">Мягкое подсказывание</text>

  <!-- Arrow from Agent to Guards and back -->
  <path d="M 320 230 L 240 280" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow4)" />
  <text y="270" fill="#ea580c" font-family="Inter, system-ui, sans-serif" font-size="10" x="265">проверка корректности</text>

  <!-- Hybrid RAG box (right) -->
  <rect x="570" y="130" width="180" height="160" rx="12" fill="url(#ragGrad)" />
  <text y="165" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" x="660">Гибридная Wiki RAG</text>

  <!-- Three search streams -->
  <rect x="590" y="180" width="140" height="28" rx="5" fill="rgba(255,255,255,0.15)" />
  <text y="199" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11" x="660">Поиск с помощью регулярных выражений</text>

  <rect x="590" y="215" width="140" height="28" rx="5" fill="rgba(255,255,255,0.15)" />
  <text y="234" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11" x="660">Семантический поиск</text>

  <rect x="590" y="250" width="140" height="28" rx="5" fill="rgba(255,255,255,0.15)" />
  <text y="269" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11" x="660">Поиск по ключевым словам</text>

  <!-- Arrow from Agent to RAG -->
  <line x1="480" y1="210" x2="565" y2="210" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow4)" />
  <text y="200" fill="#2563eb" font-family="Inter, system-ui, sans-serif" font-size="10" x="522">запрос</text>

  <!-- Arrow from RAG back to Agent -->
  <path d="M 570 230 L 485 230" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow4)" />
  <text y="248" fill="#2563eb" font-family="Inter, system-ui, sans-serif" font-size="10" x="522">контекст</text>

  <!-- API Response flow indicator -->
  <rect x="280" y="330" width="240" height="50" rx="10" fill="rgba(139, 92, 246, 0.12)" stroke="#2563eb" stroke-width="1" />
  <text y="352" text-anchor="middle" fill="#2563eb" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" x="400">Ответ API → Усилители данных → Подсказки</text>
  <text y="370" text-anchor="middle" fill="#2563eb" font-family="Inter, system-ui, sans-serif" font-size="10" x="400">Реальное временное контекстуальное руководство</text>
</svg>
