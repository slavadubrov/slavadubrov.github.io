<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Последовательная система обработки с несколькими агентами</title>
  <desc id="artifact-desc">Последовательная система обработки с несколькими агентами.</desc>
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #334155;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="securityGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #dc2626;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="contextGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #ea580c;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #ea580c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="execGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="linkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #166534;stop-opacity:1" />
    </linearGradient>
    <filter id="glow2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="900" height="360" fill="#0f172a" rx="16" />

  <!-- Title -->
  <text y="40" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" x="450">Последовательная система обработки с несколькими агентами</text>

  <!-- Step 1: Security Gate -->
  <rect x="40" y="100" width="180" height="140" rx="12" fill="url(#securityGrad)" />
  <text y="130" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" x="130">Брандмауэр безопасности</text>
  <line x1="60" y1="145" x2="200" y2="145" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
  <text y="168" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11" x="130">✓ Проверка разрешений</text>
  <text y="186" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11" x="130">✓ Проверьте правила вики</text>
  <text y="204" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11" x="130">✗ Блокировка поддельных запросов</text>
  <text y="225" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="Inter, system-ui, sans-serif" font-size="10" font-style="italic" x="130">Проверка перед выполнением</text>

  <!-- Step 2: Context Extraction -->
  <rect x="260" y="100" width="180" height="140" rx="12" fill="url(#contextGrad)" />
  <text y="130" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" x="350">Извлечение контекста</text>
  <line x1="280" y1="145" x2="420" y2="145" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
  <text y="168" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11" x="350">Критические правила поверхности</text>
  <text y="186" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11" x="350">Загрузка профилей пользователей</text>
  <text y="204" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11" x="350">Обогащение данных проекта</text>
  <text y="225" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="Inter, system-ui, sans-serif" font-size="10" font-style="italic" x="350">Агрессивная предзагрузка</text>

  <!-- Step 3: Execution Agent -->
  <rect x="480" y="100" width="180" height="140" rx="12" fill="url(#execGrad)" />
  <text y="130" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" x="570">Агент выполнения</text>
  <line x1="500" y1="145" x2="640" y2="145" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
  <text y="168" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11" x="570">Цикл планирования ReAct</text>
  <text y="186" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11" x="570">5 внутренних фаз</text>
  <text y="204" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11" x="570">Вызов инструментов и рассуждения</text>
  <text y="225" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="Inter, system-ui, sans-serif" font-size="10" font-style="italic" x="570">Выполнение основной задачи</text>

  <!-- Step 4: Link Generator -->
  <rect x="700" y="100" width="160" height="140" rx="12" fill="url(#linkGrad)" />
  <text y="130" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" x="780">Генератор ссылок</text>
  <line x1="720" y1="145" x2="840" y2="145" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
  <text y="168" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11" x="780">Анализ контекста</text>
  <text y="186" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11" x="780">Извлечение идентификаторов сущностей</text>
  <text y="204" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11" x="780">Добавить необходимые ссылки</text>
  <text y="225" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="Inter, system-ui, sans-serif" font-size="10" font-style="italic" x="780">Встроено в ответ</text>

  <!-- Arrows between stages -->
  <line x1="220" y1="170" x2="255" y2="170" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow2)" />
  <line x1="440" y1="170" x2="475" y2="170" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow2)" />
  <line x1="660" y1="170" x2="695" y2="170" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow2)" />

  <!-- Stage Labels -->
  <text y="265" text-anchor="middle" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" x="130">Этап 1</text>
  <text y="265" text-anchor="middle" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" x="350">Этап 2</text>
  <text y="265" text-anchor="middle" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" x="570">Этап 3</text>
  <text y="265" text-anchor="middle" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" x="780">Этап 4</text>

  <!-- Bottom note -->
  <rect x="250" y="290" width="400" height="40" rx="8" fill="rgba(99, 102, 241, 0.15)" stroke="#2563eb" stroke-width="1" />
  <text y="315" text-anchor="middle" fill="#2563eb" font-family="Inter, system-ui, sans-serif" font-size="12" x="450">Разделение ответственностей → Каждый агент оптимизирован для выполнения одной задачи</text>
</svg>
