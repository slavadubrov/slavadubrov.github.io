<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 610" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Рабочий процесс распределенного масштабирования с упором на ограничения</title>
  <desc id="desc">Этот рабочий процесс анализирует задачу, классифицирует связывающие ограничения, соотносит необходимые для нее ресурсы с топологией оборудования, генерирует корректные параллельные сетки, а также бенчмарки полные разметки.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#94a3b8" /></marker></defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="610" rx="28" fill="#0f172a" />
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Начинайте с измеренного боттлнек</text>
  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <rect x="65" y="145" width="190" height="120" rx="18" fill="#1d4ed8" /><text x="160" y="188" fill="#93c5fd" font-size="19" font-weight="700">1. Профиль</text><text x="160" y="220" fill="#93c5fd" font-size="14">память • ядра</text><text x="160" y="244" fill="#93c5fd" font-size="14">коллективы • стойки</text>
    <path d="M265 205 H300" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <rect x="310" y="145" width="190" height="120" rx="18" fill="#5b21b6" /><text x="405" y="188" fill="#93c5fd" font-size="19" font-weight="700">2. Классификация</text><text x="405" y="220" fill="#c4b5fd" font-size="14">состояние • активация</text><text x="405" y="244" fill="#c4b5fd" font-size="14">обработка • трафик</text>
    <path d="M510 205 H545" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <rect x="555" y="145" width="190" height="120" rx="18" fill="#9a3412" /><text x="650" y="188" fill="#fdba74" font-size="19" font-weight="700">3. Карта</text><text x="650" y="220" fill="#fdba74" font-size="14">коллективная частота</text><text x="650" y="244" fill="#fdba74" font-size="14">для связи топологий</text>
    <path d="M755 205 H790" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <rect x="800" y="145" width="190" height="120" rx="18" fill="#1d4ed8" /><text x="895" y="188" fill="#93c5fd" font-size="19" font-weight="700">4. Генерация</text><text x="895" y="220" fill="#93c5fd" font-size="14">допустимые значения DP × TP × PP</text><text x="895" y="244" fill="#93c5fd" font-size="14">сетки × CP × EP</text>
    <path d="M1000 205 H1035" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <rect x="1045" y="145" width="120" height="120" rx="18" fill="#166534" /><text x="1105" y="188" fill="#93c5fd" font-size="18" font-weight="700">5. Запуск</text><text x="1105" y="220" fill="#93c5fd" font-size="14">полная обработка задачи</text><text x="1105" y="244" fill="#93c5fd" font-size="14">проверка паритета</text>

    <text x="600" y="340" fill="#e2e8f0" font-size="19" font-weight="700">Ограничение → кандидатская размерность</text>
    <g font-size="15"><rect x="85" y="375" width="195" height="72" rx="15" fill="#1e293b" /><text x="182" y="405" fill="#cbd5e1">Копия подходит, требуется throughput</text><text x="182" y="430" fill="#93c5fd">реплицированный DP</text><rect x="295" y="375" width="195" height="72" rx="15" fill="#1e293b" /><text x="392" y="405" fill="#cbd5e1">состояние модель</text><text x="392" y="430" fill="#c4b5fd">FSDP / ZeRO</text><rect x="505" y="375" width="195" height="72" rx="15" fill="#1e293b" /><text x="602" y="405" fill="#cbd5e1">математика слоёв</text><text x="602" y="430" fill="#fdba74">TP</text><rect x="715" y="375" width="195" height="72" rx="15" fill="#1e293b" /><text x="812" y="405" fill="#cbd5e1">расположение по глубине</text><text x="812" y="430" fill="#93c5fd">PP</text><rect x="925" y="375" width="195" height="72" rx="15" fill="#1e293b" /><text x="1022" y="405" fill="#cbd5e1">последовательность экспертов</text><text x="1022" y="430" fill="#93c5fd">CP / EP</text></g>
    <rect x="250" y="500" width="700" height="65" rx="16" fill="#991b1b" /><text x="600" y="540" fill="#fca5a5" font-size="17" font-weight="700">Эта гедулистика предлагает возможные сетки; победитель определяется исключительно на основе оценки реальных разметок.</text>
  </g>
</svg>
