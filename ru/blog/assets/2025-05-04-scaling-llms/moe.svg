<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Смешивание экспертов (MoE)</title>
  <desc id="artifact-desc">Смешивание экспертов (MoE).</desc>
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 5; }
      .router { fill: #ea580c; stroke: #ea580c; stroke-width: 2; rx: 50; }
      .expert { fill: #2563eb; stroke: #1d4ed8; stroke-width: 2; rx: 5; }
      .active-expert { fill: #2563eb; stroke: #1d4ed8; stroke-width: 3; rx: 5; }
      .arrow { stroke: #334155; stroke-width: 2; marker-end: url(#arrowhead); }
      .active-arrow { stroke: #1d4ed8; stroke-width: 3; marker-end: url(#active-arrowhead); }
      .text { font-family: Inter, system-ui, sans-serif; font-size: 14px; text-anchor: middle; }
      .title { font-family: Inter, system-ui, sans-serif; font-size: 18px; font-weight: bold; text-anchor: middle; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b" />
    </marker>
    <marker id="active-arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1d4ed8" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="100%" height="100%" fill="#f8fafc" />
  <text y="30" class="title" x="400">Смешивание экспертов (MoE)</text>


  <rect x="350" y="60" width="100" height="40" class="box" />
  <text y="85" class="text" x="400">Токен входных данных</text>

  <line x1="400" y1="100" x2="400" y2="140" class="arrow" marker-end="url(#arrowhead)" />


  <circle cx="400" cy="170" r="30" class="router" />
  <text y="175" class="text" font-size="12" x="400">Маршрутизатор</text>



  <rect x="100" y="250" width="120" height="60" class="expert" />
  <text y="285" class="text" x="160">Эксперт 1</text>
  <line x1="380" y1="190" x2="160" y2="250" class="arrow" stroke-dasharray="5,5" marker-end="url(#arrowhead)" />


  <rect x="250" y="250" width="120" height="60" class="active-expert" />
  <text y="285" class="text" font-weight="bold" x="310">Эксперт 2</text>
  <line x1="390" y1="195" x2="310" y2="250" class="active-arrow" marker-end="url(#arrowhead)" />


  <rect x="430" y="250" width="120" height="60" class="expert" />
  <text y="285" class="text" x="490">Эксперт 3</text>
  <line x1="410" y1="195" x2="490" y2="250" class="arrow" stroke-dasharray="5,5" marker-end="url(#arrowhead)" />


  <rect x="580" y="250" width="120" height="60" class="active-expert" />
  <text y="285" class="text" font-weight="bold" x="640">Эксперт 4</text>
  <line x1="420" y1="190" x2="640" y2="250" class="active-arrow" marker-end="url(#arrowhead)" />


  <line x1="310" y1="310" x2="380" y2="350" class="active-arrow" marker-end="url(#arrowhead)" />
  <line x1="640" y1="310" x2="420" y2="350" class="active-arrow" marker-end="url(#arrowhead)" />

  <rect x="350" y="350" width="100" height="40" class="box" />
  <text y="375" class="text" x="400">Совместный выход</text>

  <text y="380" class="text" font-size="12" fill="#1d4ed8" x="150" transform="translate(0.83 0.00)">Активируются только отобранные эксперты</text>
</svg>
