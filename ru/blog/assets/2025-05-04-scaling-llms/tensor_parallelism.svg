<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Параллелизм тензоров (TP)</title>
  <desc id="artifact-desc">Параллелизм тензоров (TP).</desc>
  <defs>
    <style>
      .gpu { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 5; }
      .matrix { fill: #fff7ed; stroke: #ea580c; stroke-width: 1; rx: 2; }
      .input { fill: #f0fdf4; stroke: #166534; stroke-width: 1; rx: 2; }
      .output { fill: #fef2f2; stroke: #dc2626; stroke-width: 1; rx: 2; }
      .arrow { stroke: #334155; stroke-width: 2; marker-end: url(#arrowhead); }
      .text { font-family: Inter, system-ui, sans-serif; font-size: 14px; text-anchor: middle; }
      .title { font-family: Inter, system-ui, sans-serif; font-size: 18px; font-weight: bold; text-anchor: middle; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="100%" height="100%" fill="#f8fafc" />
  <text y="30" class="title" x="400">Параллелизм тензоров (TP)</text>


  <rect x="350" y="60" width="100" height="40" class="input" />
  <text y="85" class="text" x="400">Вход X</text>


  <line x1="400" y1="100" x2="200" y2="140" class="arrow" marker-end="url(#arrowhead)" />
  <line x1="400" y1="100" x2="600" y2="140" class="arrow" marker-end="url(#arrowhead)" />


  <rect x="100" y="140" width="200" height="150" class="gpu" />
  <text y="165" class="text" font-weight="bold" x="200">GPU 1</text>
  <rect x="120" y="180" width="160" height="60" class="matrix" />
  <text y="215" class="text" x="200">Вес блока A</text>
  <rect x="120" y="250" width="160" height="30" class="output" />
  <text y="270" class="text" x="200">Частичный выход Y1</text>


  <rect x="500" y="140" width="200" height="150" class="gpu" />
  <text y="165" class="text" font-weight="bold" x="600">GPU 2</text>
  <rect x="520" y="180" width="160" height="60" class="matrix" />
  <text y="215" class="text" x="600">Блок весов B</text>
  <rect x="520" y="250" width="160" height="30" class="output" />
  <text y="270" class="text" x="600">Частичный выход Y2</text>


  <line x1="200" y1="290" x2="350" y2="340" class="arrow" marker-end="url(#arrowhead)" />
  <line x1="600" y1="290" x2="450" y2="340" class="arrow" marker-end="url(#arrowhead)" />

  <rect x="300" y="340" width="200" height="60" class="output" />
  <text y="365" class="text" x="400">Совокупный выход Y</text>
  <text y="385" class="text" font-size="12" fill="#334155" x="400">Алгоритм All-Reduce / Объединение</text>
</svg>
