<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Обучение с параллельностью данных с репликацией</title><desc id="desc">Четыре уровня содержат по одной полной копии данных для обучения и обрабатывают разные микропакеты. Их значения градиента проходят операцию all-reduce перед выполнением одинаковых шагов оптимизатора.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="540" rx="28" fill="#0f172a" />
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Воспроизведение состояния, разделение пакета</text>
  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <g transform="translate(55 135)"><rect width="245" height="210" rx="20" fill="#1d4ed8" /><text x="122" y="42" fill="#93c5fd" font-size="19" font-weight="700">Ранг 0</text><rect x="25" y="65" width="195" height="55" rx="12" fill="#1d4ed8" /><text x="122" y="99" fill="#93c5fd" font-size="15">микропакет А</text><rect x="25" y="135" width="195" height="50" rx="12" fill="#5b21b6" /><text x="122" y="166" fill="#93c5fd" font-size="15">полное состояние обучения</text></g>
    <g transform="translate(335 135)"><rect width="245" height="210" rx="20" fill="#1d4ed8" /><text x="122" y="42" fill="#93c5fd" font-size="19" font-weight="700">Ранг 1</text><rect x="25" y="65" width="195" height="55" rx="12" fill="#1d4ed8" /><text x="122" y="99" fill="#93c5fd" font-size="15">микропакет B</text><rect x="25" y="135" width="195" height="50" rx="12" fill="#5b21b6" /><text x="122" y="166" fill="#93c5fd" font-size="15">полное состояние обучения</text></g>
    <g transform="translate(615 135)"><rect width="245" height="210" rx="20" fill="#1d4ed8" /><text x="122" y="42" fill="#93c5fd" font-size="19" font-weight="700">Ранг 2</text><rect x="25" y="65" width="195" height="55" rx="12" fill="#1d4ed8" /><text x="122" y="99" fill="#93c5fd" font-size="15">микропакет C</text><rect x="25" y="135" width="195" height="50" rx="12" fill="#5b21b6" /><text x="122" y="166" fill="#93c5fd" font-size="15">полное состояние обучения</text></g>
    <g transform="translate(895 135)"><rect width="245" height="210" rx="20" fill="#1d4ed8" /><text x="122" y="42" fill="#93c5fd" font-size="19" font-weight="700">Ранг 3</text><rect x="25" y="65" width="195" height="55" rx="12" fill="#1d4ed8" /><text x="122" y="99" fill="#93c5fd" font-size="15">микропакет D</text><rect x="25" y="135" width="195" height="50" rx="12" fill="#5b21b6" /><text x="122" y="166" fill="#93c5fd" font-size="15">полное состояние обучения</text></g>
    <path d="M175 355 V405 H1020 V355 M455 355 V405 M735 355 V405" stroke="#94a3b8" stroke-width="3" fill="none" />
    <rect x="350" y="405" width="500" height="82" rx="17" fill="#166534" /><text x="600" y="438" fill="#93c5fd" font-size="19" font-weight="700">Градиентный all-reduce</text><text x="600" y="467" fill="#93c5fd" font-size="14">тот же обновление, без снижения нагрузки на память модель-state</text>
