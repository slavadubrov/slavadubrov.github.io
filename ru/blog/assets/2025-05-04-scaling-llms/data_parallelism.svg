<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Параллелизм данных (DP)</title>
  <desc id="artifact-desc">Параллелизм данных (DP).</desc>
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 5; }
      .gpu { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 5; }
      .model { fill: #faf5ff; stroke: #2563eb; stroke-width: 1; rx: 3; }
      .data { fill: #f0fdf4; stroke: #166534; stroke-width: 1; rx: 3; }
      .arrow { stroke: #334155; stroke-width: 2; marker-end: url(#arrowhead); }
      .text { font-family: Inter, system-ui, sans-serif; font-size: 14px; text-anchor: middle; }
      .title { font-family: Inter, system-ui, sans-serif; font-size: 18px; font-weight: bold; text-anchor: middle; }
      .label { font-size: 12px; fill: #334155; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>


  <rect width="100%" height="100%" fill="#f8fafc" /><text y="30" class="title" x="400">Параллелизм данных (DP)</text>


  <rect x="300" y="60" width="200" height="40" class="data" />
  <text y="85" class="text" x="400">Глобальная партия данных</text>


  <line x1="350" y1="100" x2="200" y2="150" class="arrow" marker-end="url(#arrowhead)" />
  <line x1="400" y1="100" x2="400" y2="150" class="arrow" marker-end="url(#arrowhead)" />
  <line x1="450" y1="100" x2="600" y2="150" class="arrow" marker-end="url(#arrowhead)" />


  <rect x="100" y="150" width="200" height="180" class="gpu" />
  <text y="175" class="text" font-weight="bold" x="200">GPU 1</text>
  <rect x="120" y="190" width="160" height="30" class="data" />
  <text y="210" class="text" x="200">Микропакет 1</text>
  <rect x="120" y="240" width="160" height="60" class="model" />
  <text y="275" class="text" x="200">Полная копия модели</text>


  <rect x="300" y="150" width="200" height="180" class="gpu" />
  <text y="175" class="text" font-weight="bold" x="400">GPU 2</text>
  <rect x="320" y="190" width="160" height="30" class="data" />
  <text y="210" class="text" x="400">Микропакет 2</text>
  <rect x="320" y="240" width="160" height="60" class="model" />
  <text y="275" class="text" x="400">Полная копия модели</text>


  <rect x="500" y="150" width="200" height="180" class="gpu" />
  <text y="175" class="text" font-weight="bold" x="600">GPU 3</text>
  <rect x="520" y="190" width="160" height="30" class="data" />
  <text y="210" class="text" x="600">Микропакет 3</text>
  <rect x="520" y="240" width="160" height="60" class="model" />
  <text y="275" class="text" x="600">Полная копия модели</text>


  <path d="M 200 330 Q 400 380 600 330" fill="none" stroke="#ea580c" stroke-width="2" stroke-dasharray="5,5" />
  <text y="370" class="text" fill="#9a3412" x="400">Среднее значение градиентов (All-Reduce)</text>
</svg>
