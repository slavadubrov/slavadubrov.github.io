<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">обмен данными в параллельном контексте аттеншн</title><desc id="desc">Длинная последовательность делимается на четыре уровня обработки. На каждом уровне хранится локальный фрагмент токен, в то время как механизм аттеншн обменивается информацией о ключах и значениях, необходимой для реализации семантики в полном контексте. Объекты Веса модели сохраняются в репликах по всей группе контекстов.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="540" rx="28" fill="#0f172a" />
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Разделить последовательность и обменять состояниями аттеншн</text>
  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <rect x="115" y="120" width="970" height="64" rx="16" fill="#1e293b" /><text x="600" y="160" fill="#e2e8f0" font-size="18" font-weight="700">Полная последовательность S = S0 + S1 + S2 + S3</text>
    <g transform="translate(55 240)"><rect width="245" height="150" rx="19" fill="#1d4ed8" /><text x="122" y="42" fill="#93c5fd" font-size="19" font-weight="700">Ранг 0</text><text x="122" y="80" fill="#93c5fd" font-size="16">токены S0</text><text x="122" y="112" fill="#93c5fd" font-size="14">реплицированный веса</text></g>
    <g transform="translate(335 240)"><rect width="245" height="150" rx="19" fill="#5b21b6" /><text x="122" y="42" fill="#93c5fd" font-size="19" font-weight="700">Ранг 1</text><text x="122" y="80" fill="#93c5fd" font-size="16">токены S1</text><text x="122" y="112" fill="#c4b5fd" font-size="14">реплицированный веса</text></g>
    <g transform="translate(615 240)"><rect width="245" height="150" rx="19" fill="#9a3412" /><text x="122" y="42" fill="#fdba74" font-size="19" font-weight="700">Ранг 2</text><text x="122" y="80" fill="#fdba74" font-size="16">токены S2</text><text x="122" y="112" fill="#fdba74" font-size="14">реплицированный веса</text></g>
    <g transform="translate(895 240)"><rect width="245" height="150" rx="19" fill="#166534" /><text x="122" y="42" fill="#93c5fd" font-size="19" font-weight="700">Ранг 3</text><text x="122" y="80" fill="#93c5fd" font-size="16">токены S3</text><text x="122" y="112" fill="#93c5fd" font-size="14">реплицированный веса</text></g>
    <path d="M175 415 H1017" stroke="#2563eb" stroke-width="4" stroke-dasharray="12 9" /><text x="600" y="455" fill="#93c5fd" font-size="17" font-weight="700">аттеншн механизм обмена данными: кольцевой, сбор всех данных, общение всех с всеми или иерархический</text>
    <text x="600" y="495" fill="#94a3b8" font-size="15">Активация рельеф заменяется коммуникацией внутри группы контекста.</text>
  </g>
</svg>
