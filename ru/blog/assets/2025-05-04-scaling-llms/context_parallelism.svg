<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Параллелизм контекста (CP)</title>
  <desc id="artifact-desc">Параллелизм контекста (CP).</desc>
  <defs>
    <style>
      .gpu { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 5; }
      .chunk { fill: #faf5ff; stroke: #7c3aed; stroke-width: 1; rx: 2; }
      .arrow { stroke: #334155; stroke-width: 2; marker-end: url(#arrowhead); }
      .kv-arrow { stroke: #dc2626; stroke-width: 2; stroke-dasharray: 5,5; marker-end: url(#arrowhead); }
      .text { font-family: Inter, system-ui, sans-serif; font-size: 14px; text-anchor: middle; }
      .title { font-family: Inter, system-ui, sans-serif; font-size: 18px; font-weight: bold; text-anchor: middle; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="100%" height="100%" fill="#f8fafc" /><text y="30" class="title" x="400">Параллелизм контекста (CP)</text>


  <rect x="100" y="60" width="600" height="30" fill="#f1f5f9" stroke="#94a3b8" />
  <text y="80" class="text" x="400">Очень длинная последовательность входных данных (например, 128 к токенам)</text>


  <line x1="250" y1="90" x2="200" y2="140" class="arrow" marker-end="url(#arrowhead)" />
  <line x1="350" y1="90" x2="330" y2="140" class="arrow" marker-end="url(#arrowhead)" />
  <line x1="450" y1="90" x2="470" y2="140" class="arrow" marker-end="url(#arrowhead)" />
  <line x1="550" y1="90" x2="600" y2="140" class="arrow" marker-end="url(#arrowhead)" />


  <rect x="150" y="140" width="120" height="150" class="gpu" />
  <text y="165" class="text" font-weight="bold" x="210">GPU 1</text>
  <rect x="160" y="180" width="100" height="40" class="chunk" />
  <text y="205" class="text" x="210">Токены от 1 до 32 к</text>


  <rect x="280" y="140" width="120" height="150" class="gpu" />
  <text y="165" class="text" font-weight="bold" x="340">GPU 2</text>
  <rect x="290" y="180" width="100" height="40" class="chunk" />
  <text y="205" class="text" x="340">Токены 33–64 к</text>


  <rect x="410" y="140" width="120" height="150" class="gpu" />
  <text y="165" class="text" font-weight="bold" x="470">GPU 3</text>
  <rect x="420" y="180" width="100" height="40" class="chunk" />
  <text y="205" class="text" x="470">Токены 65–96 тыс.</text>


  <rect x="540" y="140" width="120" height="150" class="gpu" />
  <text y="165" class="text" font-weight="bold" x="600">GPU 4</text>
  <rect x="550" y="180" width="100" height="40" class="chunk" />
  <text y="205" class="text" x="600">Количество токенов: 97–128 к</text>


  <path d="M 210 230 Q 340 280 470 230" fill="none" class="kv-arrow" marker-end="url(#arrowhead)" />
  <path d="M 340 230 Q 470 280 600 230" fill="none" class="kv-arrow" marker-end="url(#arrowhead)" />
  <text y="300" class="text" fill="#991b1b" x="400">Обмен кэшем KV (расчёт внимания)</text>

</svg>
