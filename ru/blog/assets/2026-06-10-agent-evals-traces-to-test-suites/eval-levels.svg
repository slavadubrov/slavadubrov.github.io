<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="Three levels of agent evaluation with their metrics" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Три уровня оценки агента с соответствующими метриками</title>
  <defs>
    <marker id="arrLvl" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#334155" />
    </marker>
    <filter id="shadowLvl" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <text y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a" x="590">Три уровня оценки агента</text>
  <text y="54" text-anchor="middle" font-size="12" fill="#334155" x="590">Подход «от конца до конца» показывает, ЧТО пошло не так; траектория указывает, ГДЕ это произошло; компоненты объясняют, ПОЧЕМУ</text>

  <!-- Level 1: end-to-end -->
  <rect x="30" y="80" width="1120" height="150" rx="12" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowLvl)" />
  <text y="106" font-size="14" font-weight="700" fill="#166534" x="55">Уровень 1 · От начала до конца (черный ящик)</text>
  <text y="124" font-size="10" fill="#166534" x="55">Вопрос: была ли задача выполнена успешно?</text>

  <rect x="55" y="140" width="340" height="72" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="225">Завершение задачи</text>
  <text y="180" text-anchor="middle" font-size="10" fill="#334155" x="225">LLM-ориентация целей с оценкой, без ссылок на внешние референсы</text>
  <text y="195" text-anchor="middle" font-size="10" fill="#334155" x="225">готов к использованию в онлайн-режиме — не требуется голденный вывод</text>

  <rect x="415" y="140" width="340" height="72" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="585">Оценка результата/состояния</text>
  <text y="180" text-anchor="middle" font-size="10" fill="#334155" x="585">сравнить конечное состояние среды с целевым состоянием</text>
  <text y="195" text-anchor="middle" font-size="10" fill="#334155" x="585">устойчив к творческим альтернативным путям (τ-bench)</text>

  <rect x="775" y="140" width="340" height="72" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="945">Надежность: pass^k</text>
  <text y="180" text-anchor="middle" font-size="10" fill="#334155" x="945">все k из k попыток завершаются успешно</text>
  <text y="195" text-anchor="middle" font-size="10" fill="#334155" x="945">90% процент успешного пройдения при параметре @1 ≈ 57% уровень консистентности при k=8</text>

  <line x1="590" y1="234" x2="590" y2="268" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrLvl)" />
  <text y="256" font-size="10" fill="#64748b" font-style="italic" x="700">задача завершилась с ошибкой — но где именно?</text>

  <!-- Level 2: trajectory -->
  <rect x="30" y="275" width="1120" height="150" rx="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowLvl)" />
  <text y="301" font-size="14" font-weight="700" fill="#5b21b6" x="55">Уровень 2 · Траектория (стеклянная коробка)</text>
  <text y="319" font-size="10" fill="#5b21b6" x="55">Вопрос: был ли путь звучным и эффективным?</text>

  <rect x="55" y="335" width="255" height="72" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6" x="182">Правильность инструмента</text>
  <text y="375" text-anchor="middle" font-size="10" fill="#334155" x="182">детерминистичный, не требуется джадж</text>
  <text y="390" text-anchor="middle" font-size="10" fill="#334155" x="182">точное совпадение / совпадение в порядке / совпадение в произвольном порядке</text>

  <rect x="330" y="335" width="255" height="72" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6" x="457">Правильность аргументов</text>
  <text y="375" text-anchor="middle" font-size="10" fill="#334155" x="457">правильный инструмент, неверные параметры</text>
  <text y="390" text-anchor="middle" font-size="10" fill="#334155" x="457">Процент корректно заполненных пар ключ-значение</text>

  <rect x="605" y="335" width="255" height="72" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6" x="732">Эффективность и циклы</text>
  <text y="375" text-anchor="middle" font-size="10" fill="#334155" x="732">избыточные вызовы · сходимость траектории</text>
  <text y="390" text-anchor="middle" font-size="10" fill="#334155" x="732">многократные идентичные вызовы = тупик</text>

  <rect x="880" y="335" width="235" height="72" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6" x="997">Качество плана / соответствие</text>
  <text y="375" text-anchor="middle" font-size="10" fill="#334155" x="997">хороший план, дрифтовая реализация</text>
  <text y="390" text-anchor="middle" font-size="10" fill="#334155" x="997">стабильность качества на протяжении нескольких раундов общения</text>

  <line x1="590" y1="429" x2="590" y2="463" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrLvl)" />
  <text y="451" font-size="10" fill="#64748b" font-style="italic" x="700">путь прерван на шаге 3 — почему?</text>

  <!-- Level 3: component -->
  <rect x="30" y="470" width="1120" height="120" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowLvl)" />
  <text y="496" font-size="14" font-weight="700" fill="#9a3412" x="55">Уровень 3 · Компонент (белая коробка)</text>
  <text y="514" font-size="10" fill="#9a3412" x="55">Вопрос: какое решение, инструмент, ретривер или саб-агент вышел из строя?</text>

  <rect x="55" y="525" width="340" height="50" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="225">метрики по спан</text>
  <text y="563" text-anchor="middle" font-size="10" fill="#334155" x="225">присваивать оценки отдельным инструментам / retrieval спаны</text>

  <rect x="415" y="525" width="340" height="50" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="585">Интерпретация вывода инструмента</text>
  <text y="563" text-anchor="middle" font-size="10" fill="#334155" x="585">допустимый ответ, неверное считывание — повреждает последующие этапы обработки</text>

  <rect x="775" y="525" width="340" height="50" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="945">Атрибуция сбоев</text>
  <text y="563" text-anchor="middle" font-size="10" fill="#334155" x="945">видимая ошибка обычно находится ниже по потоку данных от истинной ошибки</text>
</svg>
