<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrLvl" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#555" />
    </marker>
    <filter id="shadowLvl" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>

  <text x="590" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a2e">Три уровня оценки агента</text>
  <text x="590" y="54" text-anchor="middle" font-size="12" fill="#666">Подход «от начала до конца» показывает, ЧТО пошло не так; траектория указывает, ГДЕ это произошло; компоненты объясняют, ПОЧЕМУ</text>

  <!-- Level 1: end-to-end -->
  <rect x="30" y="80" width="1120" height="150" rx="12" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadowLvl)" />
  <text x="55" y="106" font-size="14" font-weight="700" fill="#2e7d32">Уровень 1 · От начала до конца (черный ящик)</text>
  <text x="55" y="124" font-size="10" fill="#2e7d32">Вопрос: была ли задача выполнена успешно?</text>

  <rect x="55" y="140" width="340" height="72" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="225" y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Завершение задачи</text>
  <text x="225" y="180" text-anchor="middle" font-size="10" fill="#555">Соответствие целям, оцениваемое LLM, без использования референсов</text>
  <text x="225" y="195" text-anchor="middle" font-size="10" fill="#555">можно использовать онлайн — не требуется готовый результат</text>

  <rect x="415" y="140" width="340" height="72" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="585" y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Оценка результата/состояния</text>
  <text x="585" y="180" text-anchor="middle" font-size="10" fill="#555">сравнить конечное состояние среды с желаемым состоянием</text>
  <text x="585" y="195" text-anchor="middle" font-size="10" fill="#555">устойчив к творческим альтернативным путям (τ-бенчмарк)</text>

  <rect x="775" y="140" width="340" height="72" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="945" y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Надежность: прошло тест^k</text>
  <text x="945" y="180" text-anchor="middle" font-size="10" fill="#555">все k из k попыток завершились успехом</text>
  <text x="945" y="195" text-anchor="middle" font-size="10" fill="#555">90% процент успешных тестов при параметре @1 ≈ 57% стабильности при k=8</text>

  <line x1="590" y1="234" x2="590" y2="268" stroke="#555" stroke-width="1.6" marker-end="url(#arrLvl)" />
  <text x="700" y="256" font-size="10" fill="#888" font-style="italic">Задача завершилась с ошибкой — но где именно?</text>

  <!-- Level 2: trajectory -->
  <rect x="30" y="275" width="1120" height="150" rx="12" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowLvl)" />
  <text x="55" y="301" font-size="14" font-weight="700" fill="#6a1b9a">Уровень 2 · Траектория (стеклянный ящик)</text>
  <text x="55" y="319" font-size="10" fill="#6a1b9a">Вопрос: был ли путь к оптимальному звучанию и эффективным?</text>

  <rect x="55" y="335" width="255" height="72" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1" />
  <text x="182" y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#6a1b9a">Правильность инструмента</text>
  <text x="182" y="375" text-anchor="middle" font-size="10" fill="#555">детерминистично, судья не требуется</text>
  <text x="182" y="390" text-anchor="middle" font-size="10" fill="#555">точное совпадение / совпадение в порядке / совпадение в любом порядке</text>

  <rect x="330" y="335" width="255" height="72" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1" />
  <text x="457" y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#6a1b9a">Правильность аргументов</text>
  <text x="457" y="375" text-anchor="middle" font-size="10" fill="#555">правильный инструмент, неверные параметры</text>
  <text x="457" y="390" text-anchor="middle" font-size="10" fill="#555">Процент корректно заполненных пар ключ-значение</text>

  <rect x="605" y="335" width="255" height="72" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1" />
  <text x="732" y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#6a1b9a">Эффективность и циклы</text>
  <text x="732" y="375" text-anchor="middle" font-size="10" fill="#555">избыточные вызовы · сходимость траектории</text>
  <text x="732" y="390" text-anchor="middle" font-size="10" fill="#555">многократные идентичные вызовы = тупик</text>

  <rect x="880" y="335" width="235" height="72" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1" />
  <text x="997" y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#6a1b9a">Качество плана / соблюдение требований</text>
  <text x="997" y="375" text-anchor="middle" font-size="10" fill="#555">хороший план, выполнение с отклонениями</text>
  <text x="997" y="390" text-anchor="middle" font-size="10" fill="#555">точность передачи информации между этапами общения</text>

  <line x1="590" y1="429" x2="590" y2="463" stroke="#555" stroke-width="1.6" marker-end="url(#arrLvl)" />
  <text x="700" y="451" font-size="10" fill="#888" font-style="italic">Путь прерван на шаге 3 — но почему?</text>

  <!-- Level 3: component -->
  <rect x="30" y="470" width="1120" height="120" rx="12" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowLvl)" />
  <text x="55" y="496" font-size="14" font-weight="700" fill="#e65100">Уровень 3 · Компонент (белая коробка)</text>
  <text x="55" y="514" font-size="10" fill="#e65100">Вопрос: какое решение, инструмент, механизм поиска или подагент вышел из строя?</text>

  <rect x="55" y="525" width="340" height="50" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1" />
  <text x="225" y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Показатели на каждый пролет</text>
  <text x="225" y="563" text-anchor="middle" font-size="10" fill="#555">Присваивать оценки отдельным элементам инструментов/результатов поиска</text>

  <rect x="415" y="525" width="340" height="50" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1" />
  <text x="585" y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Интерпретация результатов работы инструмента</text>
  <text x="585" y="563" text-anchor="middle" font-size="10" fill="#555">допустимый ответ, неверное считывание — повреждает последующие этапы обработки</text>

  <rect x="775" y="525" width="340" height="50" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1" />
  <text x="945" y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Присвоение причины сбоя</text>
  <text x="945" y="563" text-anchor="middle" font-size="10" fill="#555">Видимая ошибка обычно находится ниже по потоку от реальной проблемы.</text>
</svg>
