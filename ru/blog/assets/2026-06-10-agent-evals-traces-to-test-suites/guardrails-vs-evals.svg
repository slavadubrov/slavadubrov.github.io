<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 520" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrG" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#555" />
    </marker>
    <filter id="shadowG" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>

  <text x="590" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a2e">Guardrails и Online Evals: разные роли, разные полосы</text>
  <text x="590" y="54" text-anchor="middle" font-size="12" fill="#666">Guardrails защищают пользователя за миллисекунды. Evals асинхронно измеряют качество. Не смешивайте их.</text>

  <!-- request flow spine -->
  <rect x="40" y="100" width="150" height="60" rx="10" fill="#ffffff" stroke="#555" stroke-width="1.3" filter="url(#shadowG)" />
  <text x="115" y="126" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1a2e">Запрос пользователя</text>
  <text x="115" y="144" text-anchor="middle" font-size="10" fill="#555">live traffic</text>

  <line x1="190" y1="130" x2="255" y2="130" stroke="#555" stroke-width="1.8" marker-end="url(#arrG)" />

  <rect x="260" y="100" width="170" height="60" rx="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.3" filter="url(#shadowG)" />
  <text x="345" y="126" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">Запуск агента</text>
  <text x="345" y="144" text-anchor="middle" font-size="10" fill="#555">план · инструменты · ответ</text>

  <line x1="430" y1="130" x2="495" y2="130" stroke="#555" stroke-width="1.8" marker-end="url(#arrG)" />

  <!-- guardrail inline -->
  <rect x="500" y="90" width="220" height="80" rx="10" fill="#fce4ec" stroke="#c62828" stroke-width="1.6" filter="url(#shadowG)" />
  <text x="610" y="116" text-anchor="middle" font-size="12" font-weight="700" fill="#c62828">Guardrail (inline)</text>
  <text x="610" y="134" text-anchor="middle" font-size="10" fill="#555">детерминир. · ~ms · блокирует</text>
  <text x="610" y="150" text-anchor="middle" font-size="10" fill="#555">PII · инъекции · проверки policy</text>

  <line x1="720" y1="130" x2="785" y2="130" stroke="#555" stroke-width="1.8" marker-end="url(#arrG)" />

  <rect x="790" y="100" width="150" height="60" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.3" filter="url(#shadowG)" />
  <text x="865" y="126" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Ответ</text>
  <text x="865" y="144" text-anchor="middle" font-size="10" fill="#555">пользователь видит сейчас</text>

  <!-- async branch -->
  <path d="M 345 160 L 345 250" fill="none" stroke="#9b59b6" stroke-width="1.8" stroke-dasharray="6,4" marker-end="url(#arrG)" />
  <text x="360" y="215" font-size="10" font-style="italic" fill="#6a1b9a">трейсы, async-выборка</text>

  <rect x="190" y="255" width="310" height="90" rx="10" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.6" filter="url(#shadowG)" />
  <text x="345" y="283" text-anchor="middle" font-size="12" font-weight="700" fill="#6a1b9a">Online eval (async)</text>
  <text x="345" y="302" text-anchor="middle" font-size="10" fill="#555">LLM-as-judge · без эталона · секунды-минуты</text>
  <text x="345" y="318" text-anchor="middle" font-size="10" fill="#555">никогда не блокирует ответ</text>
  <text x="345" y="334" text-anchor="middle" font-size="10" fill="#555">частота выборки по cost</text>

  <line x1="500" y1="300" x2="565" y2="300" stroke="#555" stroke-width="1.8" marker-end="url(#arrG)" />

  <rect x="570" y="255" width="280" height="90" rx="10" fill="#fff3e0" stroke="#e65100" stroke-width="1.6" filter="url(#shadowG)" />
  <text x="710" y="283" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Дашборды + алерты</text>
  <text x="710" y="302" text-anchor="middle" font-size="10" fill="#555">распределения оценок, доверит. интервалы</text>
  <text x="710" y="318" text-anchor="middle" font-size="10" fill="#555">алерт, когда нижняя граница</text>
  <text x="710" y="334" text-anchor="middle" font-size="10" fill="#555">пересекает порог</text>

  <line x1="850" y1="300" x2="915" y2="300" stroke="#555" stroke-width="1.8" marker-end="url(#arrG)" />

  <rect x="920" y="255" width="220" height="90" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.6" filter="url(#shadowG)" />
  <text x="1030" y="283" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">В маховик</text>
  <text x="1030" y="302" text-anchor="middle" font-size="10" fill="#555">помеченные трейсы становятся</text>
  <text x="1030" y="318" text-anchor="middle" font-size="10" fill="#555">размеченными goldens в</text>
  <text x="1030" y="334" text-anchor="middle" font-size="10" fill="#555">следующем regression dataset</text>

  <!-- comparison table -->
  <rect x="40" y="385" width="1100" height="115" rx="12" fill="#f8f9fa" stroke="#bbb" stroke-width="1.2" filter="url(#shadowG)" />
  <line x1="395" y1="395" x2="395" y2="490" stroke="#ddd" stroke-width="1" />
  <line x1="760" y1="395" x2="760" y2="490" stroke="#ddd" stroke-width="1" />

  <text x="217" y="413" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1a2e">Измерение</text>
  <text x="577" y="413" text-anchor="middle" font-size="12" font-weight="700" fill="#c62828">Guardrails</text>
  <text x="950" y="413" text-anchor="middle" font-size="12" font-weight="700" fill="#6a1b9a">Online evals</text>

  <text x="60" y="437" font-size="10.5" fill="#555">Когда · бюджет задержки</text>
  <text x="410" y="437" font-size="10.5" fill="#555">в пути запроса · миллисекунды</text>
  <text x="775" y="437" font-size="10.5" fill="#555">после ответа · секунды-минуты</text>

  <text x="60" y="457" font-size="10.5" fill="#555">Механизм · эффект</text>
  <text x="410" y="457" font-size="10.5" fill="#555">детерминир. правила · блок / редакт. / регенерация</text>
  <text x="775" y="457" font-size="10.5" fill="#555">LLM-as-judge + эвристики · измеряет, не блокирует</text>

  <text x="60" y="477" font-size="10.5" fill="#555">Ложноположительное — это…</text>
  <text x="410" y="477" font-size="10.5" fill="#555">баг в production — версионируется, логируется, мониторится</text>
  <text x="775" y="477" font-size="10.5" fill="#555">шум в дашборде — настройте rubric</text>
</svg>
