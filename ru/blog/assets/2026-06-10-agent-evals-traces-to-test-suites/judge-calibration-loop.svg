<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520" role="img" aria-labelledby="title desc">
  <title id="title">Цикл калибровки судьи</title>
  <desc id="desc">Цикл для калибровки оценщиков больших языковых моделей с использованием человеческих меток, изменений рубрик, метрик согласованности и мониторинга отклонений.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#1f2937" flood-opacity="0.15" />
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#6a1b9a" />
    </marker>
    <style>
      text { font-family: Inter, Arial, sans-serif; fill: #263238; }
      .title { font-size: 25px; font-weight: 700; }
      .sub { font-size: 14px; fill: #546e7a; }
      .box-title { font-size: 16px; font-weight: 700; }
      .box-copy { font-size: 12px; fill: #455a64; }
      .arrow { stroke: #6a1b9a; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1000" height="520" fill="#f8f9fa" />
  <text x="500" y="42" class="title" text-anchor="middle">Рассматривайте судью как измерительный прибор.</text>
  <text x="500" y="68" class="sub" text-anchor="middle">Призыв судьи, не откалиброванный, представляет собой лишь крайне уверенное мнение.</text>

  <g transform="translate(88 118)">
    <rect width="200" height="92" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" filter="url(#shadow)" />
    <text x="100" y="32" class="box-title" text-anchor="middle">Этикетки, добавленные человеком</text>
    <text x="100" y="56" class="box-copy" text-anchor="middle">20–50 реальных сбоев</text>
    <text x="100" y="74" class="box-copy" text-anchor="middle">с причинами успешного/неуспешного результата</text>
  </g>

  <g transform="translate(400 118)">
    <rect width="200" height="92" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="2" filter="url(#shadow)" />
    <text x="100" y="32" class="box-title" text-anchor="middle">Рубрика</text>
    <text x="100" y="56" class="box-copy" text-anchor="middle">атомарные критерии,</text>
    <text x="100" y="74" class="box-copy" text-anchor="middle">примеры с небольшим количеством примеров</text>
  </g>

  <g transform="translate(712 118)">
    <rect width="200" height="92" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" filter="url(#shadow)" />
    <text x="100" y="32" class="box-title" text-anchor="middle">Версия судьи</text>
    <text x="100" y="56" class="box-copy" text-anchor="middle">модель + промпт</text>
    <text x="100" y="74" class="box-copy" text-anchor="middle">соединены вместе</text>
  </g>

  <g transform="translate(712 306)">
    <rect width="200" height="92" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" filter="url(#shadow)" />
    <text x="100" y="32" class="box-title" text-anchor="middle">Проверка соглашения</text>
    <text x="100" y="56" class="box-copy" text-anchor="middle">TPR, TNR, каппа,</text>
    <text x="100" y="74" class="box-copy" text-anchor="middle">распределение оценок</text>
  </g>

  <g transform="translate(400 306)">
    <rect width="200" height="92" rx="8" fill="#ffffff" stroke="#2980b9" stroke-width="2" filter="url(#shadow)" />
    <text x="100" y="32" class="box-title" text-anchor="middle">Проверка смещения</text>
    <text x="100" y="56" class="box-copy" text-anchor="middle">позиция, длина,</text>
    <text x="100" y="74" class="box-copy" text-anchor="middle">предпочтение семейства моделей</text>
  </g>

  <g transform="translate(88 306)">
    <rect width="200" height="92" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="2" filter="url(#shadow)" />
    <text x="100" y="32" class="box-title" text-anchor="middle">Монитор дрейфа</text>
    <text x="100" y="56" class="box-copy" text-anchor="middle">перепроверить после обучения модели</text>
    <text x="100" y="74" class="box-copy" text-anchor="middle">или изменения промпта</text>
  </g>

  <path class="arrow" d="M290 164 L390 164" />
  <path class="arrow" d="M602 164 L702 164" />
  <path class="arrow" d="M812 212 L812 298" />
  <path class="arrow" d="M710 352 L612 352" />
  <path class="arrow" d="M398 352 L298 352" />
  <path class="arrow" d="M188 304 L188 220" />
  <path class="arrow" d="M290 320 C342 252, 652 252, 710 320" />
</svg>
