<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 640" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrFly" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2980b9" />
    </marker>
    <marker id="arrFlyBack" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#27ae60" />
    </marker>
    <filter id="shadowFly" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-opacity="0.14" />
    </filter>
  </defs>

  <text x="590" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">Цикл «От отслеживания до оценки»</text>
  <text x="590" y="57" text-anchor="middle" font-size="12" fill="#666">Каждая выявленная неисправность в производственной среде превращается в трейс, метку, строку данных и функцию оценки, которая контролирует процесс интеграционного тестирования</text>

  <!-- Stage 1: Production agent -->
  <rect x="40" y="110" width="200" height="110" rx="12" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.6" filter="url(#shadowFly)" />
  <text x="140" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">1 · Агент производства</text>
  <text x="140" y="164" text-anchor="middle" font-size="10" fill="#555">оснащен OTel</text>
  <text x="140" y="179" text-anchor="middle" font-size="10" fill="#555">Область применения GenAI semconv:</text>
  <text x="140" y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#555">invoke_agent → общение → выполнение инструмента</text>

  <line x1="240" y1="165" x2="295" y2="165" stroke="#2980b9" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 2: Trace store -->
  <rect x="300" y="110" width="200" height="110" rx="12" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.6" filter="url(#shadowFly)" />
  <text x="400" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">2 · Хранилище трасс</text>
  <text x="400" y="164" text-anchor="middle" font-size="10" fill="#555">Langfuse / Phoenix /</text>
  <text x="400" y="179" text-anchor="middle" font-size="10" fill="#555">LangSmith / Braintrust</text>
  <text x="400" y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#555">(или файл JSONL для начала)</text>

  <line x1="500" y1="165" x2="555" y2="165" stroke="#2980b9" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 3: Mine failures -->
  <rect x="560" y="110" width="200" height="110" rx="12" fill="#fce4ec" stroke="#c62828" stroke-width="1.6" filter="url(#shadowFly)" />
  <text x="660" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#c62828">3 · Сбои шахты</text>
  <text x="660" y="164" text-anchor="middle" font-size="10" fill="#555">низкие оценки · жалобы пользователей</text>
  <text x="660" y="179" text-anchor="middle" font-size="10" fill="#555">детерминистические правила · судьи</text>
  <text x="660" y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#555">открытая обработка данных: чтение от 30 до 50 треков</text>

  <line x1="760" y1="165" x2="815" y2="165" stroke="#2980b9" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 4: Cluster + label -->
  <rect x="820" y="110" width="200" height="110" rx="12" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.6" filter="url(#shadowFly)" />
  <text x="920" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#6a1b9a">4 · Кластер + метка</text>
  <text x="920" y="164" text-anchor="middle" font-size="10" fill="#555">аксиальная кодировка с 5–6 именованными элементами,</text>
  <text x="920" y="179" text-anchor="middle" font-size="10" fill="#555">конкретные способы возникновения сбоев</text>
  <text x="920" y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#555">ошибка форматирования даты, а не проблемы с временем</text>

  <line x1="920" y1="220" x2="920" y2="285" stroke="#2980b9" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 5: Dedupe / goldens -->
  <rect x="820" y="290" width="200" height="110" rx="12" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.6" filter="url(#shadowFly)" />
  <text x="920" y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#6a1b9a">5 · Удаление дубликатов</text>
  <text x="920" y="344" text-anchor="middle" font-size="10" fill="#555">один типичный золотой</text>
  <text x="920" y="359" text-anchor="middle" font-size="10" fill="#555">для каждого кластера сохраняются идентификаторы интервалов</text>
  <text x="920" y="376" text-anchor="middle" font-size="10" font-style="italic" fill="#555">в метаданных для отслеживаемости</text>

  <line x1="820" y1="345" x2="765" y2="345" stroke="#2980b9" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 6: Versioned dataset -->
  <rect x="560" y="290" width="200" height="110" rx="12" fill="#fff3e0" stroke="#e65100" stroke-width="1.6" filter="url(#shadowFly)" />
  <text x="660" y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#e65100">6 · Набор данных с версионированием</text>
  <text x="660" y="344" text-anchor="middle" font-size="10" fill="#555">goldens-v1.json · v2 · v3 …</text>
  <text x="660" y="359" text-anchor="middle" font-size="10" fill="#555">ожидаемые инструменты и критерии</text>
  <text x="660" y="376" text-anchor="middle" font-size="10" font-style="italic" fill="#555">фиксировано для воспроизводимых запусков</text>

  <line x1="560" y1="345" x2="505" y2="345" stroke="#2980b9" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 7: CI gate -->
  <rect x="300" y="290" width="200" height="110" rx="12" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.6" filter="url(#shadowFly)" />
  <text x="400" y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#2e7d32">7 · Шлюз CI</text>
  <text x="400" y="344" text-anchor="middle" font-size="10" fill="#555">тестирование с использованием deepEval для каждого PR</text>
  <text x="400" y="359" text-anchor="middle" font-size="10" fill="#555">показатель сбоя → сбой сборки</text>
  <text x="400" y="376" text-anchor="middle" font-size="10" font-style="italic" fill="#555">блокировка регрессий перед развертыванием</text>

  <!-- feedback arrow back to production -->
  <path d="M 300 345 L 140 345 L 140 225" fill="none" stroke="#27ae60" stroke-width="2.2" marker-end="url(#arrFlyBack)" />
  <text x="148" y="290" font-size="10.5" font-weight="700" fill="#27ae60">безопасно устранять неисправности судов;</text>
  <text x="148" y="305" font-size="10.5" font-weight="700" fill="#27ae60">новые источники трафика</text>
  <text x="148" y="320" font-size="10.5" font-weight="700" fill="#27ae60">следующий цикл</text>

  <!-- Online lane note -->
  <rect x="40" y="450" width="1100" height="150" rx="12" fill="#f8f9fa" stroke="#9b59b6" stroke-width="1.4" filter="url(#shadowFly)" />
  <text x="65" y="480" font-size="13" font-weight="700" fill="#6a1b9a">Одновременная обработка в рамках цикла: онлайн-оценки</text>
  <text x="65" y="503" font-size="11" fill="#555">• Образец реального трафика, оценка асинхронно с использованием метрик без ссылок на внешние источники (завершение задач, пользовательские рецензенты) — отсутствие дополнительной задержки</text>
  <text x="65" y="524" font-size="11" fill="#555">• Сигнал тревоги при превышении порогового значения нижнего предела уверенности оценки — на этапе 3 в механизм обработки данных появляются новые шаблоны сбоев</text>
  <text x="65" y="545" font-size="11" fill="#555">• Сохраняйте разделение ограничений: встроенные, детерминистичные, блокирующие (мс) — вычисления используются для измерения, а ограничения обеспечивают защиту</text>
  <text x="65" y="578" font-size="10.5" font-style="italic" fill="#888">Преимущество: сбои в производственной среде превращаются в тесты на регрессию в течение нескольких дней, а обновления моделей проверяются за дни, а не недели.</text>
</svg>
