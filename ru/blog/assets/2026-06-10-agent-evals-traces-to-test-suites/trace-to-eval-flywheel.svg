<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 640" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="The trace-to-eval flywheel" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">флийвхилл от трейс до эвал</title>
  <defs>
    <marker id="arrFly" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2563eb" />
    </marker>
    <marker id="arrFlyBack" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#16a34a" />
    </marker>
    <filter id="shadowFly" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <text y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a" x="590">Колесо оборотности от Трейс до Эвал</text>
  <text y="57" text-anchor="middle" font-size="12" fill="#334155" x="590">Каждая выявленная неисправность в производственной среде превращается в трейс — метку, строку в таблице датасет, а также в элемент оценки, отвечающий за контроль на этапе CI</text>

  <!-- Stage 1: Production agent -->
  <rect x="40" y="110" width="200" height="110" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.6" filter="url(#shadowFly)" />
  <text y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8" x="140">1 · Агент производства</text>
  <text y="164" text-anchor="middle" font-size="10" fill="#334155" x="140">оснащён OTel</text>
  <text y="179" text-anchor="middle" font-size="10" fill="#334155" x="140">семантическая конвертация GenAI спаны:</text>
  <text y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="140">призыв_агента → чат → выполнение_инструмента</text>

  <line x1="240" y1="165" x2="295" y2="165" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 2: Trace store -->
  <rect x="300" y="110" width="200" height="110" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.6" filter="url(#shadowFly)" />
  <text y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8" x="400">2 · Трейс хранилище</text>
  <text y="164" text-anchor="middle" font-size="10" fill="#334155" x="400">Langfuse / Phoenix /</text>
  <text y="179" text-anchor="middle" font-size="10" fill="#334155" x="400">LangSmith / Braintrust</text>
  <text y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="400">(или файл JSONL для начала)</text>

  <line x1="500" y1="165" x2="555" y2="165" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 3: Mine failures -->
  <rect x="560" y="110" width="200" height="110" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="1.6" filter="url(#shadowFly)" />
  <text y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b" x="660">3 · Сбои в работе шахты</text>
  <text y="164" text-anchor="middle" font-size="10" fill="#334155" x="660">низкие показатели качества · жалобы пользователей</text>
  <text y="179" text-anchor="middle" font-size="10" fill="#334155" x="660">детерминистические правила · джаджи</text>
  <text y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="660">открытая компиляция: чтение 30–50 трейсы</text>

  <line x1="760" y1="165" x2="815" y2="165" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 4: Cluster + label -->
  <rect x="820" y="110" width="200" height="110" rx="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.6" filter="url(#shadowFly)" />
  <text y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6" x="920">4 · Кластер + метка</text>
  <text y="164" text-anchor="middle" font-size="10" fill="#334155" x="920">аксиальная кодировка с разделением на 5–6 именованных компонентов,</text>
  <text y="179" text-anchor="middle" font-size="10" fill="#334155" x="920">специфические моди рассыпания</text>
  <text y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="920">ошибка форматирования даты</text>

  <line x1="920" y1="220" x2="920" y2="285" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 5: Dedupe / goldens -->
  <rect x="820" y="290" width="200" height="110" rx="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.6" filter="url(#shadowFly)" />
  <text y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6" x="920">5 · Удаление дубликатов</text>
  <text y="344" text-anchor="middle" font-size="10" fill="#334155" x="920">один типичный золотой</text>
  <text y="359" text-anchor="middle" font-size="10" fill="#334155" x="920">количество сохраняемых ID по кластеру: спан</text>
  <text y="376" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="920">в метаданных для отслеживаемости</text>

  <line x1="820" y1="345" x2="765" y2="345" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 6: Versioned dataset -->
  <rect x="560" y="290" width="200" height="110" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="1.6" filter="url(#shadowFly)" />
  <text y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412" x="660">6 · Версионированный датасет</text>
  <text y="344" text-anchor="middle" font-size="10" fill="#334155" x="660">goldens-v1.json · версия 2 · версия 3 …</text>
  <text y="359" text-anchor="middle" font-size="10" fill="#334155" x="660">ожидаемые инструменты и критерии</text>
  <text y="376" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="660">фиксация для воспроизводимых запусков</text>

  <line x1="560" y1="345" x2="505" y2="345" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 7: CI gate -->
  <rect x="300" y="290" width="200" height="110" rx="12" fill="#f0fdf4" stroke="#166534" stroke-width="1.6" filter="url(#shadowFly)" />
  <text y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#166534" x="400">7 · шлюз CI</text>
  <text y="344" text-anchor="middle" font-size="10" fill="#334155" x="400">тестирование с использованием deepeval для каждого PR</text>
  <text y="359" text-anchor="middle" font-size="10" fill="#334155" x="400">метрика сбоя → неудачная сборка</text>
  <text y="376" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="400">блокировка регрессий перед развертыванием</text>

  <!-- feedback arrow back to production -->
  <path d="M 300 345 L 140 345 L 140 225" fill="none" stroke="#16a34a" stroke-width="2.2" marker-end="url(#arrFlyBack)" />
  <text y="290" font-size="10.5" font-weight="700" fill="#166534" x="148">безопасно устранять сбои в работе моделей;</text>
  <text y="305" font-size="10.5" font-weight="700" fill="#166534" x="148">новые потоки трафика</text>
  <text y="320" font-size="10.5" font-weight="700" fill="#166534" x="148">следующий цикл</text>

  <!-- Online lane note -->
  <rect x="40" y="450" width="1100" height="150" rx="12" fill="#ffffff" stroke="#7c3aed" stroke-width="1.4" filter="url(#shadowFly)" />
  <text y="480" font-size="13" font-weight="700" fill="#5b21b6" x="65">Работа параллельно с циклом: онлайн эвалы</text>
  <text y="503" font-size="11" fill="#334155" x="65">• Обработка реального трафика, оценка асинхронных процессов с использованием метрик без ссылок на внешние источники (завершение задач, пользовательский джаджи) — без добавления каких-либо латентность</text>
  <text y="524" font-size="11" fill="#334155" x="65">• Уведомление при превышении порогового значения нижнего предела уверенности оценки — на этапе 3 в механизм флаявхейла поступают новые шаблоны сбоев</text>
  <text y="545" font-size="11" fill="#334155" x="65">• Обеспечьте разделение гардрейлы: встроенный, детерминистичный, блокирующий (мс) — измерение эвалы, защита гардрейлы</text>
  <text y="578" font-size="10.5" font-style="italic" fill="#64748b" x="65">Результат: сбои в производстве превращаются в тесты на регрессию в течение нескольких дней, а обновления модель проверяются за дни, а не недели.</text>
</svg>
