<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Файлы запуска Zsh, выбираемые в зависимости от режима входа и интерактивного режима</title>
  <desc id="desc">Двухкратная матрица демонстрирует: интерактивные оболочки при входе, загружающие файлы zshenv, zprofile, zshrc и zlogin; неконфигурированные для входа интерактивные оболочки, загружающие файлы zshenv и zprofile, а также zlogin; интерактивные оболочки, не предназначенные для входа, загружающие файлы zshenv и zshrc; и неконфигурированные для входа неконфликтные оболочки, загружающие только файл zshenv.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="700" rx="28" fill="#0f172a" />
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Два флага определяют файлы запуска</text>
  <text x="600" y="98" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="17">Логин и интерактивность — это независимые свойства</text>
  <g font-family="Inter, system-ui, sans-serif">
    <text x="420" y="145" text-anchor="middle" fill="#93c5fd" font-size="20" font-weight="700">интерактивный</text>
    <text x="900" y="145" text-anchor="middle" fill="#94a3b8" font-size="20" font-weight="700">неконфликтный</text>
    <text x="82" y="300" text-anchor="middle" fill="#c4b5fd" font-size="20" font-weight="700" transform="rotate(-90 82 300)">Вход</text>
    <text x="82" y="560" text-anchor="middle" fill="#94a3b8" font-size="20" font-weight="700" transform="rotate(-90 82 560)">Режим без входа</text>

    <g transform="translate(155 175)"><rect width="530" height="215" rx="20" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="30" y="44" fill="#93c5fd" font-size="22" font-weight="700">Вход + интерактивность</text><text x="30" y="83" fill="#93c5fd" font-size="17">Типичная вкладка терминала Apple</text><text x="30" y="132" fill="#e2e8f0" font-size="19">.zshenv → .zprofile → .zshrc → .zlogin</text><text x="30" y="172" fill="#94a3b8" font-size="15">одновременная авторизация и интерактивная настройка</text></g>
    <g transform="translate(715 175)"><rect width="410" height="215" rx="20" fill="#5b21b6" /><text x="30" y="44" fill="#93c5fd" font-size="22" font-weight="700">Вход + неконфликтный режим</text><text x="30" y="83" fill="#c4b5fd" font-size="17">zsh -lc «command»</text><text x="30" y="132" fill="#e2e8f0" font-size="18">.zshenv → .zprofile → .zlogin</text><text x="30" y="172" fill="#94a3b8" font-size="15">отсутствует файл .zshrc</text></g>
    <g transform="translate(155 425)"><rect width="530" height="215" rx="20" fill="#166534" /><text x="30" y="44" fill="#93c5fd" font-size="22" font-weight="700">Режим без входа + интерактивный</text><text x="30" y="83" fill="#93c5fd" font-size="17">Вложенная конфигурация zsh или терминала</text><text x="30" y="132" fill="#e2e8f0" font-size="19">.zshenv преобразуется в .zshrc</text><text x="30" y="172" fill="#94a3b8" font-size="15">отсутствует .zprofile</text></g>
    <g transform="translate(715 425)"><rect width="410" height="215" rx="20" fill="#1e293b" /><text x="30" y="44" fill="#cbd5e1" font-size="22" font-weight="700">Ни то, ни другое</text><text x="30" y="83" fill="#94a3b8" font-size="17">zsh -c «command»</text><text x="30" y="132" fill="#e2e8f0" font-size="19">.zshenv</text><text x="30" y="172" fill="#94a3b8" font-size="15">сохранить минимализм и отсутствие лишних элементов</text></g>
  </g>
</svg>
