<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 720" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadowSF" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Title -->
  <text x="590" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a2e">Таксономия бесшумных сбоев</text>
  <text x="590" y="54" text-anchor="middle" font-size="12" fill="#666">Каждый способ возникновения сбоя соотносится с метрикой, позволяющей его обнаружить. Без такой метрики баг остается незамеченным.</text>

  <!-- Root -->
  <rect x="475" y="78" width="230" height="44" rx="22" fill="#c62828" filter="url(#shadowSF)" />
  <text x="590" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="white">Беззвучная ошибка (RAG)</text>

  <!-- Trunk: 4 main branches -->
  <line x1="540" y1="122" x2="170" y2="170" stroke="#888" stroke-width="1.4" />
  <line x1="570" y1="122" x2="450" y2="170" stroke="#888" stroke-width="1.4" />
  <line x1="610" y1="122" x2="730" y2="170" stroke="#888" stroke-width="1.4" />
  <line x1="640" y1="122" x2="1010" y2="170" stroke="#888" stroke-width="1.4" />

  <!-- ====== Branch A: Ingestion ====== -->
  <rect x="40" y="170" width="260" height="40" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" />
  <text x="170" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">Сбои при вводе данных</text>

  <!-- A1: Parse loss -->
  <rect x="40" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="50" y="245" font-size="11" font-weight="700" fill="#1565c0">Потери при парсинге</text>
  <text x="50" y="261" font-size="10" fill="#444">сжатие таблиц · сноски</text>
  <text x="50" y="275" font-size="10" fill="#444">потеряно · OCR искажает цифры</text>
  <text x="50" y="285" font-size="9" font-style="italic" fill="#888">Захватывается: CER/WER, TEDS</text>

  <!-- A2: Chunk break -->
  <rect x="40" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="50" y="320" font-size="11" font-weight="700" fill="#1565c0">Разделение на чанки</text>
  <text x="50" y="336" font-size="10" fill="#444">ответный элемент разделен на две части</text>
  <text x="50" y="350" font-size="10" fill="#444">фрагменты; у ни одного из них нет полных доказательств</text>
  <text x="50" y="360" font-size="9" font-style="italic" fill="#888">Ловится с помощью: ограничения answer-span</text>

  <!-- A3: Dedup miss -->
  <rect x="40" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="50" y="395" font-size="11" font-weight="700" fill="#1565c0">Ошибка дедупликации</text>
  <text x="50" y="411" font-size="10" fill="#444">False-merge повреждает результат;</text>
  <text x="50" y="425" font-size="10" fill="#444">False-keep скрывает правильный документ</text>
  <text x="50" y="435" font-size="9" font-style="italic" fill="#888">Ловится с помощью: dup precision/recall</text>

  <!-- A4: Normalization -->
  <rect x="40" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="50" y="470" font-size="11" font-weight="700" fill="#1565c0">Дрейф нормализации</text>
  <text x="50" y="486" font-size="10" fill="#444">Несоответствия между NFC и NFKC приводят к сбоям</text>
  <text x="50" y="500" font-size="10" fill="#444">резолюция псевдонимов с точным совпадением</text>
  <text x="50" y="510" font-size="9" font-style="italic" fill="#888">Обнаружено с помощью: проверки паритета NFC/NFKC, покрытия алиасов</text>

  <!-- ====== Branch B: Embedding/Index ====== -->
  <rect x="320" y="170" width="260" height="40" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" />
  <text x="450" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">Встраивание и индексация</text>

  <!-- B1: Embedding miss -->
  <rect x="320" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="330" y="245" font-size="11" font-weight="700" fill="#1565c0">Ошибка вживления</text>
  <text x="330" y="261" font-size="10" fill="#444">термин домена расположен снаружи</text>
  <text x="330" y="275" font-size="10" fill="#444">распределение обучения модели</text>
  <text x="330" y="285" font-size="9" font-style="italic" fill="#888">Зафиксировано при: домен Recall@k против базового уровня</text>

  <!-- B2: ANN drop -->
  <rect x="320" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="330" y="320" font-size="11" font-weight="700" fill="#1565c0">Снижение качества аппроксимации ANN</text>
  <text x="330" y="336" font-size="10" fill="#444">Уровень efSearch в HNSW слишком низкий; золотой уровень</text>
  <text x="330" y="350" font-size="10" fill="#444">вектор существует, но к нему невозможно добраться</text>
  <text x="330" y="360" font-size="9" font-style="italic" fill="#888">захвачено моделью: показатель воспроизведения ANN против фиксированного значения</text>

  <!-- B3: Embedding drift -->
  <rect x="320" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="330" y="395" font-size="11" font-weight="700" fill="#1565c0">Дрейф вкладок</text>
  <text x="330" y="411" font-size="10" fill="#444">обновление версии модели провайдера;</text>
  <text x="330" y="425" font-size="10" fill="#444">старые векторы больше не выровнены</text>
  <text x="330" y="435" font-size="9" font-style="italic" fill="#888">Зафиксировано с помощью: набора зондов для оценки стабильности NN</text>

  <!-- B4: Stale index -->
  <rect x="320" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="330" y="470" font-size="11" font-weight="700" fill="#1565c0">Устаревший индекс</text>
  <text x="330" y="486" font-size="10" fill="#444">задержка свежести данных; выполнение запросов</text>
  <text x="330" y="500" font-size="10" fill="#444">по сравнению с данными прошлой недели</text>
  <text x="330" y="510" font-size="9" font-style="italic" fill="#888">Обнаружено при: задержке свежести p99, %-устаревшее</text>

  <!-- ====== Branch C: Online retrieval (HOT — silent killers) ====== -->
  <rect x="600" y="170" width="260" height="40" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="2" />
  <text x="730" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#c62828">Онлайн-поиск</text>

  <!-- C1: Filter exclude (highlighted) -->
  <rect x="600" y="225" width="260" height="64" rx="8" fill="#ffebee" stroke="#c62828" stroke-width="2" filter="url(#shadowSF)" />
  <text x="610" y="245" font-size="11" font-weight="700" fill="#c62828">Фильтр ложного исключения</text>
  <text x="610" y="261" font-size="10" fill="#444">жёсткое условие приводит к удалению документа с золотым статусом;</text>
  <text x="610" y="275" font-size="10" fill="#444">Значение Recall@k находится в норме — для пустого множества</text>
  <text x="610" y="285" font-size="9" font-style="italic" fill="#c62828">Захвачено фильтром: коэффициент ложного исключения</text>

  <!-- C2: Rerank miss -->
  <rect x="600" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#c62828" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="610" y="320" font-size="11" font-weight="700" fill="#c62828">Оценка повторного ранжирования с ошибкой</text>
  <text x="610" y="336" font-size="10" fill="#444">Кросс-энкодер понижает уровень правой части</text>
  <text x="610" y="350" font-size="10" fill="#444">документ за правдоподобными отвлекающими элементами</text>
  <text x="610" y="360" font-size="9" font-style="italic" fill="#888">определяется с помощью: ΔnDCG, устойчивость к отвлекающим факторам (RGB)</text>

  <!-- C3: Lost in middle -->
  <rect x="600" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#c62828" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="610" y="395" font-size="11" font-weight="700" fill="#c62828">Затеряно в центре</text>
  <text x="610" y="411" font-size="10" fill="#444">золотой кусок в контексте, но внутри</text>
  <text x="610" y="425" font-size="10" fill="#444">Позиция 7/10; модель игнорирует её</text>
  <text x="610" y="435" font-size="9" font-style="italic" fill="#888">Ловится методом: position-stratified eval</text>

  <!-- C4: Bad rewrite -->
  <rect x="600" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#c62828" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="610" y="470" font-size="11" font-weight="700" fill="#c62828">Регрессия при переписи запросов</text>
  <text x="610" y="486" font-size="10" fill="#444">HyDE генерирует иллюзорный объект, который</text>
  <text x="610" y="500" font-size="10" fill="#444">поиск наклонён в неправильном направлении</text>
  <text x="610" y="510" font-size="9" font-style="italic" fill="#888">Захвачено: перезапись коэффициента усиления/потерь типа A/B</text>

  <!-- ====== Branch D: Generation/Citation ====== -->
  <rect x="880" y="170" width="260" height="40" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" />
  <text x="1010" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#6a1b9a">Генерация</text>

  <!-- D1: Hallucination -->
  <rect x="880" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="890" y="245" font-size="11" font-weight="700" fill="#6a1b9a">Галлюцинация</text>
  <text x="890" y="261" font-size="10" fill="#444">неподдерживаемое утверждение, часто это</text>
  <text x="890" y="275" font-size="10" fill="#444">энтитет отсутствует в контексте</text>
  <text x="890" y="285" font-size="9" font-style="italic" fill="#888">Захвачено с помощью: faithfulness, HHEM, FActScore</text>

  <!-- D2: No citation -->
  <rect x="880" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="890" y="320" font-size="11" font-weight="700" fill="#6a1b9a">Театр цитаций</text>
  <text x="890" y="336" font-size="10" fill="#444">указанный отрезок на самом деле не</text>
  <text x="890" y="350" font-size="10" fill="#444">подтверждать находящееся рядом утверждение</text>
  <text x="890" y="360" font-size="9" font-style="italic" fill="#888">определяется с помощью: точности/покрытия цитат (поддержка TREC)</text>

  <!-- D3: Wrong refusal -->
  <rect x="880" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="890" y="395" font-size="11" font-weight="700" fill="#6a1b9a">Неверное воздержание</text>
  <text x="890" y="411" font-size="10" fill="#444">«Не знаю», когда ответ</text>
  <text x="890" y="425" font-size="10" fill="#444">находится в контексте (или наоборот)</text>
  <text x="890" y="435" font-size="9" font-style="italic" fill="#888">Зафиксировано инструментом: NoMIRACL, точность отказа</text>

  <!-- D4: Schema break -->
  <rect x="880" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="890" y="470" font-size="11" font-weight="700" fill="#6a1b9a">Сбой схемы/словаря</text>
  <text x="890" y="486" font-size="10" fill="#444">валидные синтаксические варианты вывода</text>
  <text x="890" y="500" font-size="10" fill="#444">неверный, но допустимый идентификатор онтологии</text>
  <text x="890" y="510" font-size="9" font-style="italic" fill="#888">Зафиксировано: соответствие словарю</text>

  <!-- Footer band -->
  <rect x="40" y="555" width="1100" height="68" rx="8" fill="#fffde7" stroke="#fbc02d" stroke-width="1.2" />
  <text x="590" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#827717">Руководство по чтению</text>
  <text x="590" y="598" text-anchor="middle" font-size="10" fill="#827717">Каждая ошибка остаётся незамеченной при отсутствии соответствующих метрик. Одна лишь стандартная метрика «правильности ответа» позволяет определить, что что-то не так, но не указывает на конкретное место сбоя.</text>
  <text x="590" y="614" text-anchor="middle" font-size="10" fill="#827717">Красная ветвь (исключение фильтра, ошибки переранжирования, ситуации «потерянного посредника», некорректные переписывания) — это те области, где больше всего страдает производственный RAG. Сначала необходимо настроить мониторинг за ней.</text>

  <!-- Visual cue: the 'red' propagation -->
  <rect x="40" y="640" width="1100" height="62" rx="8" fill="#ffffff" stroke="#cbd5e0" stroke-width="1" />
  <text x="60" y="662" font-size="11" font-weight="600" fill="#1a1a2e">Правило распространения:</text>
  <text x="60" y="682" font-size="10" fill="#555">Сбой с левой стороны ограничивает возможности восстановления данных для всех элементов с правой стороны. Некорректный анализ данных сужает возможности формирования фрагментов. Некорректное формирование фрагментов ограничивает процесс извлечения информации.</text>
  <text x="60" y="696" font-size="10" fill="#555">Некорректная настройка лимитов поиска при переранжировании. Неправильное формирование лимитов переранжирования. Показатели точности учитывают только последнюю ссылку — они не позволяют оценить всю сломанную цепочку.</text>
</svg>
