<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 720" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="Silent failure taxonomy with the metric that catches each mode" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Таксономия тихих сбоев с метрикой, отслеживающей каждый режим работы</title>
  <defs>
    <filter id="shadowSF" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a" x="590">Таксономия бесшумных сбоев</text>
  <text y="54" text-anchor="middle" font-size="12" fill="#334155" x="590">Каждый способ возникновения сбоя соотносится с метрикой, позволяющей его обнаружить. Без такой метрики баг остается незамеченным.</text>

  <!-- Root -->
  <rect x="475" y="78" width="230" height="44" rx="22" fill="#dc2626" filter="url(#shadowSF)" />
  <text y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" x="590">Беззвучная ошибка (RAG)</text>

  <!-- Trunk: 4 main branches -->
  <line x1="540" y1="122" x2="170" y2="170" stroke="#94a3b8" stroke-width="1.4" />
  <line x1="570" y1="122" x2="450" y2="170" stroke="#94a3b8" stroke-width="1.4" />
  <line x1="610" y1="122" x2="730" y2="170" stroke="#94a3b8" stroke-width="1.4" />
  <line x1="640" y1="122" x2="1010" y2="170" stroke="#94a3b8" stroke-width="1.4" />

  <!-- ====== Branch A: Ingestion ====== -->
  <rect x="40" y="170" width="260" height="40" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8" x="170">Сбои при вводе данных</text>

  <!-- A1: Parse loss -->
  <rect x="40" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="245" font-size="11" font-weight="700" fill="#1d4ed8" x="50">Потери при парсинге</text>
  <text y="261" font-size="10" fill="#334155" x="50">сжатие таблиц · сноски</text>
  <text y="275" font-size="10" fill="#334155" x="50">отброшенный · OCR перемешивает цифры</text>
  <text y="285" font-size="9" font-style="italic" fill="#64748b" x="50">захватывается с помощью: CER/WER, TEDS</text>

  <!-- A2: Chunk break -->
  <rect x="40" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="320" font-size="11" font-weight="700" fill="#1d4ed8" x="50">Чанк прерывание</text>
  <text y="336" font-size="10" fill="#334155" x="50">ответ спан разделён на две части</text>
  <text y="350" font-size="10" fill="#334155" x="50">чанки; у обоих также отсутствуют полные доказательства</text>
  <text y="360" font-size="9" font-style="italic" fill="#64748b" x="50">захвачено с помощью: механизма сдерживания answer-спан</text>

  <!-- A3: Dedup miss -->
  <rect x="40" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="395" font-size="11" font-weight="700" fill="#1d4ed8" x="50">Ошибка дедупликации</text>
  <text y="411" font-size="10" fill="#334155" x="50">False-merge повреждает результат;</text>
  <text y="425" font-size="10" fill="#334155" x="50">False-keep приводит к скрытию правильного документа</text>
  <text y="435" font-size="9" font-style="italic" fill="#64748b" x="50">определяется с помощью: точность/воспроизводимость дупликатов</text>

  <!-- A4: Normalization -->
  <rect x="40" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="470" font-size="11" font-weight="700" fill="#1d4ed8" x="50">дрифт нормализации</text>
  <text y="486" font-size="10" fill="#334155" x="50">Несоответствие между NFC и NFKC приводит к сбоям</text>
  <text y="500" font-size="10" fill="#334155" x="50">резолюция псевдонимов с точным совпадением</text>
  <text y="510" font-size="9" font-style="italic" fill="#64748b" x="50">обнаруживается с помощью: проверки парности NFC/NFKC, покрытия алиасов</text>

  <!-- ====== Branch B: Embedding/Index ====== -->
  <rect x="320" y="170" width="260" height="40" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8" x="450">Эмбеддинг и индекс</text>

  <!-- B1: Embedding miss -->
  <rect x="320" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="245" font-size="11" font-weight="700" fill="#1d4ed8" x="330">Эмбеддинг ошибка обнаружения</text>
  <text y="261" font-size="10" fill="#334155" x="330">термин домена расположен вне</text>
  <text y="275" font-size="10" fill="#334155" x="330">распределение обучения модель</text>
  <text y="285" font-size="9" font-style="italic" fill="#64748b" x="330">зафиксировано при: Recall@k для домена по сравнению с базовым значением</text>

  <!-- B2: ANN drop -->
  <rect x="320" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="320" font-size="11" font-weight="700" fill="#1d4ed8" x="330">снижение точности ANN</text>
  <text y="336" font-size="10" fill="#334155" x="330">HNSW значение efSearch слишком низкое; проблема с gold</text>
  <text y="350" font-size="10" fill="#334155" x="330">вектор существует, но к нему невозможно добраться</text>
  <text y="360" font-size="9" font-style="italic" fill="#64748b" x="330">захватывается с помощью: ANN recall против flat</text>

  <!-- B3: Embedding drift -->
  <rect x="320" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="395" font-size="11" font-weight="700" fill="#1d4ed8" x="330">Эмбеддинг дрейф</text>
  <text y="411" font-size="10" fill="#334155" x="330">обновление версии провайдера модель;</text>
  <text y="425" font-size="10" fill="#334155" x="330">старые векторы больше не выровнены</text>
  <text y="435" font-size="9" font-style="italic" fill="#64748b" x="330">обнаружено с помощью: стабильности набора зондов NN</text>

  <!-- B4: Stale index -->
  <rect x="320" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="470" font-size="11" font-weight="700" fill="#1d4ed8" x="330">Устаревший индекс</text>
  <text y="486" font-size="10" fill="#334155" x="330">задержка свежести данных; выполнение запросов</text>
  <text y="500" font-size="10" fill="#334155" x="330">по сравнению с данными прошлой недели</text>
  <text y="510" font-size="9" font-style="italic" fill="#64748b" x="330">обнаружено при: задержке свежести p99, %-устаревшее</text>

  <!-- ====== Branch C: Online retrieval (HOT — silent killers) ====== -->
  <rect x="600" y="170" width="260" height="40" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2" />
  <text y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b" x="730">Онлайн-retrieval</text>

  <!-- C1: Filter exclude (highlighted) -->
  <rect x="600" y="225" width="260" height="64" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2" filter="url(#shadowSF)" />
  <text y="245" font-size="11" font-weight="700" fill="#991b1b" x="610">Фильтр ложного исключения</text>
  <text y="261" font-size="10" fill="#334155" x="610">жёсткие предикаты приводят к удалению документа с данными о золоте;</text>
  <text y="275" font-size="10" fill="#334155" x="610">Значение Recall@k остаётся в пределах нормы при обработке пустого набора данных</text>
  <text y="285" font-size="9" font-style="italic" fill="#991b1b" x="610">захватывается с помощью: коэффициент ложного исключения фильтра</text>

  <!-- C2: Rerank miss -->
  <rect x="600" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="320" font-size="11" font-weight="700" fill="#991b1b" x="610">Ошибка переранкинга</text>
  <text y="336" font-size="10" fill="#334155" x="610">кросс-энкодер понижает уровень правой части</text>
  <text y="350" font-size="10" fill="#334155" x="610">документ за разумными отвлекающими элементами</text>
  <text y="360" font-size="9" font-style="italic" fill="#64748b" x="610">определяется с помощью: ΔnDCG, устойчивость к отвлекающим факторам (RGB)</text>

  <!-- C3: Lost in middle -->
  <rect x="600" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="395" font-size="11" font-weight="700" fill="#991b1b" x="610">Затеряно в центре</text>
  <text y="411" font-size="10" fill="#334155" x="610">золото чанк в данном контексте, но в</text>
  <text y="425" font-size="10" fill="#334155" x="610">позиция 7/10; модель игнорирует её</text>
  <text y="435" font-size="9" font-style="italic" fill="#64748b" x="610">ловится с помощью: position-stratified эвал</text>

  <!-- C4: Bad rewrite -->
  <rect x="600" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="470" font-size="11" font-weight="700" fill="#991b1b" x="610">Регрессия при переписи запросов</text>
  <text y="486" font-size="10" fill="#334155" x="610">HyDE генерирует иллюзорный объект, который</text>
  <text y="500" font-size="10" fill="#334155" x="610">наклоняет retrieval в неверном направлении</text>
  <text y="510" font-size="9" font-style="italic" fill="#64748b" x="610">зафиксировано с помощью: переписывание коэффициента усиления/потерь типа A/B</text>

  <!-- ====== Branch D: Generation/Citation ====== -->
  <rect x="880" y="170" width="260" height="40" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" />
  <text y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6" x="1010">генерация</text>

  <!-- D1: Hallucination -->
  <rect x="880" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="245" font-size="11" font-weight="700" fill="#5b21b6" x="890">Галлюцинация</text>
  <text y="261" font-size="10" fill="#334155" x="890">недопустимое утверждение, часто представляющее собой</text>
  <text y="275" font-size="10" fill="#334155" x="890">энтитет отсутствует в контексте</text>
  <text y="285" font-size="9" font-style="italic" fill="#64748b" x="890">обнаруживается с помощью: faithfulness, HHEM, FActScore</text>

  <!-- D2: No citation -->
  <rect x="880" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="320" font-size="11" font-weight="700" fill="#5b21b6" x="890">театр цитирования</text>
  <text y="336" font-size="10" fill="#334155" x="890">указанный спан на самом деле не</text>
  <text y="350" font-size="10" fill="#334155" x="890">подтвердить приведённое рядом утверждение</text>
  <text y="360" font-size="9" font-style="italic" fill="#64748b" x="890">определяется с помощью: точность/покрытие цитат (поддержка TREC)</text>

  <!-- D3: Wrong refusal -->
  <rect x="880" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="395" font-size="11" font-weight="700" fill="#5b21b6" x="890">Неверное отстранение</text>
  <text y="411" font-size="10" fill="#334155" x="890">«Неизвестно», когда ответ</text>
  <text y="425" font-size="10" fill="#334155" x="890">находится в контексте (или наоборот)</text>
  <text y="435" font-size="9" font-style="italic" fill="#64748b" x="890">зафиксировано с помощью: NoMIRACL, точность воздержания</text>

  <!-- D4: Schema break -->
  <rect x="880" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="470" font-size="11" font-weight="700" fill="#5b21b6" x="890">Сбой схемы/словаря</text>
  <text y="486" font-size="10" fill="#334155" x="890">валидные синтаксические варианты вывода</text>
  <text y="500" font-size="10" fill="#334155" x="890">неверный, но допустимый идентификатор онтологии</text>
  <text y="510" font-size="9" font-style="italic" fill="#64748b" x="890">зафиксировано с помощью: проверки соответствия словарю</text>

  <!-- Footer band -->
  <rect x="40" y="555" width="1100" height="68" rx="8" fill="#f0fdf4" stroke="#ea580c" stroke-width="1.2" />
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="590">Руководство по чтению</text>
  <text y="598" text-anchor="middle" font-size="10" fill="#9a3412" x="590">Каждая неисправность остаётся незамеченной при отсутствии соответствующих метрик. Одного лишь стандартного показателя «правильности ответа» недостаточно, чтобы определить наличие сбоя — тем более его местоположение.</text>
  <text y="614" text-anchor="middle" font-size="10" fill="#9a3412" x="590">Красная ветвь (исключение фильтра, неправильная переранжировка, ситуация «потерянного посередине», неэффективная перезапись) — именно здесь проявляется наибольший ущерб от проблем в продакшене RAG; сначала необходимо внедрить инструменты для мониторинга в этой области.</text>

  <!-- Visual cue: the 'red' propagation -->
  <rect x="40" y="640" width="1100" height="62" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="662" font-size="11" font-weight="600" fill="#0f172a" x="60">Правило распространения:</text>
  <text y="682" font-size="10" fill="#334155" x="60">Сбой с левой стороны приводит к ограничению возможностей всех элементов с правой стороны. Некорректный анализ сужает диапазон чанкинг. Неправильная работа чанкинг также ограничивает retrieval.</text>
  <text y="696" font-size="10" fill="#334155" x="60">Неправильные размеры заглавных букв retrieval в реранкинг. Некорректная генерация реранкинг заглавных букв. Показатели верности оценивают лишь последний звенье — они не позволяют выявить прерванную цепочку.</text>
</svg>
