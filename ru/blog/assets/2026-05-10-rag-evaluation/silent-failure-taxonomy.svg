<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 720" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadowSF" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Title -->
  <text x="590" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a2e">Таксономия скрытых сбоев</text>
  <text x="590" y="54" text-anchor="middle" font-size="12" fill="#666">Каждому сбою сопоставлена метрика, которая его ловит. Без метрики баг невидим.</text>

  <!-- Root -->
  <rect x="475" y="78" width="230" height="44" rx="22" fill="#c62828" filter="url(#shadowSF)" />
  <text x="590" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="white">Скрытый сбой (RAG)</text>

  <!-- Trunk: 4 main branches -->
  <line x1="540" y1="122" x2="170" y2="170" stroke="#888" stroke-width="1.4" />
  <line x1="570" y1="122" x2="450" y2="170" stroke="#888" stroke-width="1.4" />
  <line x1="610" y1="122" x2="730" y2="170" stroke="#888" stroke-width="1.4" />
  <line x1="640" y1="122" x2="1010" y2="170" stroke="#888" stroke-width="1.4" />

  <!-- ====== Branch A: Ingestion ====== -->
  <rect x="40" y="170" width="260" height="40" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" />
  <text x="170" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">Сбои ingestion</text>

  <!-- A1: Parse loss -->
  <rect x="40" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="50" y="245" font-size="11" font-weight="700" fill="#1565c0">Потеря парсинга</text>
  <text x="50" y="261" font-size="10" fill="#444">таблицы схлопываются · сноски</text>
  <text x="50" y="275" font-size="10" fill="#444">теряются · OCR путает цифры</text>
  <text x="50" y="285" font-size="9" font-style="italic" fill="#888">ловят: CER/WER, TEDS</text>

  <!-- A2: Chunk break -->
  <rect x="40" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="50" y="320" font-size="11" font-weight="700" fill="#1565c0">Разрыв чанка</text>
  <text x="50" y="336" font-size="10" fill="#444">спан ответа разделён между</text>
  <text x="50" y="350" font-size="10" fill="#444">двумя чанками; ни в одном нет всех доказательств</text>
  <text x="50" y="360" font-size="9" font-style="italic" fill="#888">ловит: containment спана ответа</text>

  <!-- A3: Dedup miss -->
  <rect x="40" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="50" y="395" font-size="11" font-weight="700" fill="#1565c0">Ошибка дедупликации</text>
  <text x="50" y="411" font-size="10" fill="#444">ложное слияние портит ответ;</text>
  <text x="50" y="425" font-size="10" fill="#444">ложное сохранение прячет нужный doc</text>
  <text x="50" y="435" font-size="9" font-style="italic" fill="#888">ловит: precision/recall дублей</text>

  <!-- A4: Normalization -->
  <rect x="40" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="50" y="470" font-size="11" font-weight="700" fill="#1565c0">Дрейф нормализации</text>
  <text x="50" y="486" font-size="10" fill="#444">несовпадение NFC и NFKC ломает</text>
  <text x="50" y="500" font-size="10" fill="#444">разрешение алиасов по exact match</text>
  <text x="50" y="510" font-size="9" font-style="italic" fill="#888">ловят: паритет NFC/NFKC, alias coverage</text>

  <!-- ====== Branch B: Embedding/Index ====== -->
  <rect x="320" y="170" width="260" height="40" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" />
  <text x="450" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">Эмбеддинги и индекс</text>

  <!-- B1: Embedding miss -->
  <rect x="320" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="330" y="245" font-size="11" font-weight="700" fill="#1565c0">Промах эмбеддинга</text>
  <text x="330" y="261" font-size="10" fill="#444">доменный термин вне</text>
  <text x="330" y="275" font-size="10" fill="#444">train-distribution модели</text>
  <text x="330" y="285" font-size="9" font-style="italic" fill="#888">ловит: domain Recall@k vs. baseline</text>

  <!-- B2: ANN drop -->
  <rect x="320" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="330" y="320" font-size="11" font-weight="700" fill="#1565c0">Потеря ANN-аппроксимации</text>
  <text x="330" y="336" font-size="10" fill="#444">слишком низкий HNSW efSearch;</text>
  <text x="330" y="350" font-size="10" fill="#444">gold vector есть, но не достигается</text>
  <text x="330" y="360" font-size="9" font-style="italic" fill="#888">ловит: ANN recall vs. flat</text>

  <!-- B3: Embedding drift -->
  <rect x="320" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="330" y="395" font-size="11" font-weight="700" fill="#1565c0">Дрейф эмбеддингов</text>
  <text x="330" y="411" font-size="10" fill="#444">смена версии модели провайдера;</text>
  <text x="330" y="425" font-size="10" fill="#444">старые векторы больше не согласованы</text>
  <text x="330" y="435" font-size="9" font-style="italic" fill="#888">ловит: NN stability на probe-set</text>

  <!-- B4: Stale index -->
  <rect x="320" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="330" y="470" font-size="11" font-weight="700" fill="#1565c0">Устаревший индекс</text>
  <text x="330" y="486" font-size="10" fill="#444">лаг свежести; запросы идут</text>
  <text x="330" y="500" font-size="10" fill="#444">по данным прошлой недели</text>
  <text x="330" y="510" font-size="9" font-style="italic" fill="#888">ловят: freshness lag p99, %-stale</text>

  <!-- ====== Branch C: Online retrieval (HOT — silent killers) ====== -->
  <rect x="600" y="170" width="260" height="40" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="2" />
  <text x="730" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#c62828">Онлайн-ретрив</text>

  <!-- C1: Filter exclude (highlighted) -->
  <rect x="600" y="225" width="260" height="64" rx="8" fill="#ffebee" stroke="#c62828" stroke-width="2" filter="url(#shadowSF)" />
  <text x="610" y="245" font-size="11" font-weight="700" fill="#c62828">Ложное исключение фильтром</text>
  <text x="610" y="261" font-size="10" fill="#444">жёсткий предикат отбрасывает gold doc;</text>
  <text x="610" y="275" font-size="10" fill="#444">Recall@k нормален — над пустым множеством</text>
  <text x="610" y="285" font-size="9" font-style="italic" fill="#c62828">ловит: rate ложных исключений фильтра</text>

  <!-- C2: Rerank miss -->
  <rect x="600" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#c62828" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="610" y="320" font-size="11" font-weight="700" fill="#c62828">Промах rerank</text>
  <text x="610" y="336" font-size="10" fill="#444">cross-encoder понижает нужный</text>
  <text x="610" y="350" font-size="10" fill="#444">doc ниже правдоподобных отвлекателей</text>
  <text x="610" y="360" font-size="9" font-style="italic" fill="#888">ловят: ΔnDCG, distractor robustness (RGB)</text>

  <!-- C3: Lost in middle -->
  <rect x="600" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#c62828" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="610" y="395" font-size="11" font-weight="700" fill="#c62828">Потеря в середине</text>
  <text x="610" y="411" font-size="10" fill="#444">gold chunk в контексте, но на</text>
  <text x="610" y="425" font-size="10" fill="#444">позиции 7/10; модель его игнорирует</text>
  <text x="610" y="435" font-size="9" font-style="italic" fill="#888">ловит: eval с разбиением по позиции</text>

  <!-- C4: Bad rewrite -->
  <rect x="600" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#c62828" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="610" y="470" font-size="11" font-weight="700" fill="#c62828">Регрессия rewrite запроса</text>
  <text x="610" y="486" font-size="10" fill="#444">HyDE галлюцинирует сущность,</text>
  <text x="610" y="500" font-size="10" fill="#444">уводящую ретрив не туда</text>
  <text x="610" y="510" font-size="9" font-style="italic" fill="#888">ловит: A/B gain/loss rewrite</text>

  <!-- ====== Branch D: Generation/Citation ====== -->
  <rect x="880" y="170" width="260" height="40" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" />
  <text x="1010" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#6a1b9a">Генерация</text>

  <!-- D1: Hallucination -->
  <rect x="880" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="890" y="245" font-size="11" font-weight="700" fill="#6a1b9a">Галлюцинация</text>
  <text x="890" y="261" font-size="10" fill="#444">неподтверждённое утверждение,</text>
  <text x="890" y="275" font-size="10" fill="#444">часто о сущности вне контекста</text>
  <text x="890" y="285" font-size="9" font-style="italic" fill="#888">ловят: faithfulness, HHEM, FActScore</text>

  <!-- D2: No citation -->
  <rect x="880" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="890" y="320" font-size="11" font-weight="700" fill="#6a1b9a">Театр цитирования</text>
  <text x="890" y="336" font-size="10" fill="#444">цитируемый спан на деле не</text>
  <text x="890" y="350" font-size="10" fill="#444">подтверждает соседнее утверждение</text>
  <text x="890" y="360" font-size="9" font-style="italic" fill="#888">ловят: citation precision/recall (TREC support)</text>

  <!-- D3: Wrong refusal -->
  <rect x="880" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="890" y="395" font-size="11" font-weight="700" fill="#6a1b9a">Неверное воздержание</text>
  <text x="890" y="411" font-size="10" fill="#444">"Не знаю", когда ответ</text>
  <text x="890" y="425" font-size="10" fill="#444">есть в контексте (или наоборот)</text>
  <text x="890" y="435" font-size="9" font-style="italic" fill="#888">ловят: NoMIRACL, точность abstention</text>

  <!-- D4: Schema break -->
  <rect x="880" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="890" y="470" font-size="11" font-weight="700" fill="#6a1b9a">Сбой схемы/словаря</text>
  <text x="890" y="486" font-size="10" fill="#444">синтаксически валидный вывод выбирает</text>
  <text x="890" y="500" font-size="10" fill="#444">неверный, но валидный ontology ID</text>
  <text x="890" y="510" font-size="9" font-style="italic" fill="#888">ловит: соответствие словарю</text>

  <!-- Footer band -->
  <rect x="40" y="555" width="1100" height="68" rx="8" fill="#fffde7" stroke="#fbc02d" stroke-width="1.2" />
  <text x="590" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#827717">Как читать</text>
  <text x="590" y="598" text-anchor="middle" font-size="10" fill="#827717">Каждый сбой скрыт без своей метрики. Обычная "correctness ответа" показывает, что что-то сломано, но не где.</text>
  <text x="590" y="614" text-anchor="middle" font-size="10" fill="#827717">Красная ветка (исключение фильтром, промах rerank, потеря в середине, плохой rewrite) — где production RAG страдает чаще всего. С неё и начинайте.</text>

  <!-- Visual cue: the 'red' propagation -->
  <rect x="40" y="640" width="1100" height="62" rx="8" fill="#ffffff" stroke="#cbd5e0" stroke-width="1" />
  <text x="60" y="662" font-size="11" font-weight="600" fill="#1a1a2e">Правило распространения:</text>
  <text x="60" y="682" font-size="10" fill="#555">Сбой слева задаёт потолок recall для всего справа. Плохой парсинг ограничивает чанкинг. Плохой чанкинг ограничивает ретрив.</text>
  <text x="60" y="696" font-size="10" fill="#555">Плохой ретрив ограничивает reranking. Плохой reranking ограничивает генерацию. Faithfulness меряет только последнее звено — сломанную цепь он не видит.</text>
</svg>
