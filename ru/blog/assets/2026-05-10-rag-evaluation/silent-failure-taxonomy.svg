<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 720" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Таксономия бесшумных сбоев</title>
  <desc id="artifact-desc">Таксономия бесшумных сбоев.</desc>
  <defs>
    <filter id="shadowSF" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a" x="590">Таксономия бесшумных сбоев</text>
  <text y="54" text-anchor="middle" font-size="12" fill="#334155" x="590">Каждый способ возникновения сбоя соотносится с метрикой, позволяющей его обнаружить. Без такой метрики баг остается незамеченным.</text>

  <!-- Root -->
  <rect x="475" y="78" width="230" height="44" rx="22" fill="#dc2626" filter="url(#shadowSF)" />
  <text y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" x="590">Беззвучная ошибка (RAG)</text>

  <!-- Trunk: 4 main branches -->
  <line x1="540" y1="122" x2="170" y2="170" stroke="#94a3b8" stroke-width="1.4" />
  <line x1="570" y1="122" x2="450" y2="170" stroke="#94a3b8" stroke-width="1.4" />
  <line x1="610" y1="122" x2="730" y2="170" stroke="#94a3b8" stroke-width="1.4" />
  <line x1="640" y1="122" x2="1010" y2="170" stroke="#94a3b8" stroke-width="1.4" />

  <!-- ====== Branch A: Ingestion ====== -->
  <rect x="40" y="170" width="260" height="40" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8" x="170">Сбои при вводе данных</text>

  <!-- A1: Parse loss -->
  <rect x="40" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="245" font-size="11" font-weight="700" fill="#1d4ed8" x="50">Потери при парсинге</text>
  <text y="261" font-size="10" fill="#334155" x="50">сжатие таблиц · сноски</text>
  <text y="275" font-size="10" fill="#334155" x="50">потеряно · OCR искажает цифры</text>
  <text y="285" font-size="9" font-style="italic" fill="#64748b" x="50">Захватывается: CER/WER, TEDS</text>

  <!-- A2: Chunk break -->
  <rect x="40" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="320" font-size="11" font-weight="700" fill="#1d4ed8" x="50">Разделение на чанки</text>
  <text y="336" font-size="10" fill="#334155" x="50">ответный элемент разделен на две части</text>
  <text y="350" font-size="10" fill="#334155" x="50">фрагменты; у ни одного из них нет полных доказательств</text>
  <text y="360" font-size="9" font-style="italic" fill="#64748b" x="50">Ловится с помощью: ограничения answer-span</text>

  <!-- A3: Dedup miss -->
  <rect x="40" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="395" font-size="11" font-weight="700" fill="#1d4ed8" x="50">Ошибка дедупликации</text>
  <text y="411" font-size="10" fill="#334155" x="50">False-merge повреждает результат;</text>
  <text y="425" font-size="10" fill="#334155" x="50">False-keep скрывает правильный документ</text>
  <text y="435" font-size="9" font-style="italic" fill="#64748b" x="50">Ловится с помощью: dup precision/recall</text>

  <!-- A4: Normalization -->
  <rect x="40" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="470" font-size="11" font-weight="700" fill="#1d4ed8" x="50">Дрейф нормализации</text>
  <text y="486" font-size="10" fill="#334155" x="50">Несоответствия между NFC и NFKC приводят к сбоям</text>
  <text y="500" font-size="10" fill="#334155" x="50">резолюция псевдонимов с точным совпадением</text>
  <text y="510" font-size="9" font-style="italic" fill="#64748b" x="50">Обнаружено с помощью: проверки паритета NFC/NFKC, покрытия алиасов</text>

  <!-- ====== Branch B: Embedding/Index ====== -->
  <rect x="320" y="170" width="260" height="40" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8" x="450">Встраивание и индексация</text>

  <!-- B1: Embedding miss -->
  <rect x="320" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="245" font-size="11" font-weight="700" fill="#1d4ed8" x="330">Ошибка вживления</text>
  <text y="261" font-size="10" fill="#334155" x="330">термин домена расположен снаружи</text>
  <text y="275" font-size="10" fill="#334155" x="330">распределение обучения модели</text>
  <text y="285" font-size="9" font-style="italic" fill="#64748b" x="330">Зафиксировано при: домен Recall@k против базового уровня</text>

  <!-- B2: ANN drop -->
  <rect x="320" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="320" font-size="11" font-weight="700" fill="#1d4ed8" x="330">Снижение качества аппроксимации ANN</text>
  <text y="336" font-size="10" fill="#334155" x="330">Уровень efSearch в HNSW слишком низкий; золотой уровень</text>
  <text y="350" font-size="10" fill="#334155" x="330">вектор существует, но к нему невозможно добраться</text>
  <text y="360" font-size="9" font-style="italic" fill="#64748b" x="330">захвачено моделью: показатель воспроизведения ANN против фиксированного значения</text>

  <!-- B3: Embedding drift -->
  <rect x="320" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="395" font-size="11" font-weight="700" fill="#1d4ed8" x="330">Дрейф вкладок</text>
  <text y="411" font-size="10" fill="#334155" x="330">обновление версии модели провайдера;</text>
  <text y="425" font-size="10" fill="#334155" x="330">старые векторы больше не выровнены</text>
  <text y="435" font-size="9" font-style="italic" fill="#64748b" x="330">Зафиксировано с помощью: набора зондов для оценки стабильности NN</text>

  <!-- B4: Stale index -->
  <rect x="320" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="470" font-size="11" font-weight="700" fill="#1d4ed8" x="330">Устаревший индекс</text>
  <text y="486" font-size="10" fill="#334155" x="330">задержка свежести данных; выполнение запросов</text>
  <text y="500" font-size="10" fill="#334155" x="330">по сравнению с данными прошлой недели</text>
  <text y="510" font-size="9" font-style="italic" fill="#64748b" x="330">Обнаружено при: задержке свежести p99, %-устаревшее</text>

  <!-- ====== Branch C: Online retrieval (HOT — silent killers) ====== -->
  <rect x="600" y="170" width="260" height="40" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2" />
  <text y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b" x="730">Онлайн-поиск</text>

  <!-- C1: Filter exclude (highlighted) -->
  <rect x="600" y="225" width="260" height="64" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2" filter="url(#shadowSF)" />
  <text y="245" font-size="11" font-weight="700" fill="#991b1b" x="610">Фильтр ложного исключения</text>
  <text y="261" font-size="10" fill="#334155" x="610">жёсткое условие приводит к удалению документа с золотым статусом;</text>
  <text y="275" font-size="10" fill="#334155" x="610">Значение Recall@k находится в норме — для пустого множества</text>
  <text y="285" font-size="9" font-style="italic" fill="#991b1b" x="610">Захвачено фильтром: коэффициент ложного исключения</text>

  <!-- C2: Rerank miss -->
  <rect x="600" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="320" font-size="11" font-weight="700" fill="#991b1b" x="610">Оценка повторного ранжирования с ошибкой</text>
  <text y="336" font-size="10" fill="#334155" x="610">Кросс-энкодер понижает уровень правой части</text>
  <text y="350" font-size="10" fill="#334155" x="610">документ за правдоподобными отвлекающими элементами</text>
  <text y="360" font-size="9" font-style="italic" fill="#64748b" x="610">определяется с помощью: ΔnDCG, устойчивость к отвлекающим факторам (RGB)</text>

  <!-- C3: Lost in middle -->
  <rect x="600" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="395" font-size="11" font-weight="700" fill="#991b1b" x="610">Затеряно в центре</text>
  <text y="411" font-size="10" fill="#334155" x="610">золотой кусок в контексте, но внутри</text>
  <text y="425" font-size="10" fill="#334155" x="610">Позиция 7/10; модель игнорирует её</text>
  <text y="435" font-size="9" font-style="italic" fill="#64748b" x="610">Ловится методом: position-stratified eval</text>

  <!-- C4: Bad rewrite -->
  <rect x="600" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="470" font-size="11" font-weight="700" fill="#991b1b" x="610">Регрессия при переписи запросов</text>
  <text y="486" font-size="10" fill="#334155" x="610">HyDE генерирует иллюзорный объект, который</text>
  <text y="500" font-size="10" fill="#334155" x="610">поиск наклонён в неправильном направлении</text>
  <text y="510" font-size="9" font-style="italic" fill="#64748b" x="610">Захвачено: перезапись коэффициента усиления/потерь типа A/B</text>

  <!-- ====== Branch D: Generation/Citation ====== -->
  <rect x="880" y="170" width="260" height="40" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" />
  <text y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6" x="1010">Генерация</text>

  <!-- D1: Hallucination -->
  <rect x="880" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="245" font-size="11" font-weight="700" fill="#5b21b6" x="890">Галлюцинация</text>
  <text y="261" font-size="10" fill="#334155" x="890">неподдерживаемое утверждение, часто это</text>
  <text y="275" font-size="10" fill="#334155" x="890">энтитет отсутствует в контексте</text>
  <text y="285" font-size="9" font-style="italic" fill="#64748b" x="890">Захвачено с помощью: faithfulness, HHEM, FActScore</text>

  <!-- D2: No citation -->
  <rect x="880" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="320" font-size="11" font-weight="700" fill="#5b21b6" x="890">Театр цитаций</text>
  <text y="336" font-size="10" fill="#334155" x="890">указанный отрезок на самом деле не</text>
  <text y="350" font-size="10" fill="#334155" x="890">подтверждать находящееся рядом утверждение</text>
  <text y="360" font-size="9" font-style="italic" fill="#64748b" x="890" transform="translate(-38.25 0.00)">определяется с помощью: точности/покрытия цитат (поддержка TREC)</text>

  <!-- D3: Wrong refusal -->
  <rect x="880" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="395" font-size="11" font-weight="700" fill="#5b21b6" x="890">Неверное воздержание</text>
  <text y="411" font-size="10" fill="#334155" x="890">«Не знаю», когда ответ</text>
  <text y="425" font-size="10" fill="#334155" x="890">находится в контексте (или наоборот)</text>
  <text y="435" font-size="9" font-style="italic" fill="#64748b" x="890">Зафиксировано инструментом: NoMIRACL, точность отказа</text>

  <!-- D4: Schema break -->
  <rect x="880" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="470" font-size="11" font-weight="700" fill="#5b21b6" x="890">Сбой схемы/словаря</text>
  <text y="486" font-size="10" fill="#334155" x="890">валидные синтаксические варианты вывода</text>
  <text y="500" font-size="10" fill="#334155" x="890">неверный, но допустимый идентификатор онтологии</text>
  <text y="510" font-size="9" font-style="italic" fill="#64748b" x="890">Зафиксировано: соответствие словарю</text>

  <!-- Footer band -->
  <rect x="40" y="555" width="1100" height="68" rx="8" fill="#f0fdf4" stroke="#ea580c" stroke-width="1.2" />
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="590">Руководство по чтению</text>
  <text y="598" text-anchor="middle" font-size="10" fill="#9a3412" x="590">Каждая ошибка остаётся незамеченной при отсутствии соответствующих метрик. Одна лишь стандартная метрика «правильности ответа» позволяет определить, что что-то не так, но не указывает на конкретное место сбоя.</text>
  <text y="614" text-anchor="middle" font-size="10" fill="#9a3412" x="590" textLength="1168.58" lengthAdjust="spacingAndGlyphs" transform="translate(-0.00 0.00)">Красная ветвь (исключение фильтра, ошибки переранжирования, ситуации «потерянного посредника», некорректные переписывания) — это те области, где больше всего страдает производственный RAG. Сначала необходимо настроить мониторинг за ней.</text>

  <!-- Visual cue: the 'red' propagation -->
  <rect x="40" y="640" width="1100" height="62" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="662" font-size="11" font-weight="600" fill="#0f172a" x="60">Правило распространения:</text>
  <text y="682" font-size="10" fill="#334155" x="60" textLength="1168.58" lengthAdjust="spacingAndGlyphs" transform="translate(-54.29 0.00)">Сбой с левой стороны ограничивает возможности восстановления данных для всех элементов с правой стороны. Некорректный анализ данных сужает возможности формирования фрагментов. Некорректное формирование фрагментов ограничивает процесс извлечения информации.</text>
  <text y="696" font-size="10" fill="#334155" x="60" textLength="1168.58" lengthAdjust="spacingAndGlyphs" transform="translate(-54.29 0.00)">Некорректная настройка лимитов поиска при переранжировании. Неправильное формирование лимитов переранжирования. Показатели точности учитывают только последнюю ссылку — они не позволяют оценить всю сломанную цепочку.</text>
</svg>
