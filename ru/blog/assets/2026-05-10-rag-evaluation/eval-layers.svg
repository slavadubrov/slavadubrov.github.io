<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 660" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrLayer" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#555" />
    </marker>
    <filter id="shadowL" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Title -->
  <text x="590" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a2e">Метод оценки в трех уровнях</text>
  <text x="590" y="54" text-anchor="middle" font-size="12" fill="#666">Офлайн-корпус и индекс · Онлайн-поиск и генерация · Проверка после генерации + телеметрия в производственной среде</text>

  <!-- =============== Layer 1: Offline =============== -->
  <rect x="30" y="80" width="1120" height="160" rx="12" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowL)" />
  <text x="55" y="106" font-size="14" font-weight="700" fill="#1565c0">Слой 1 · Офлайн</text>
  <text x="55" y="124" font-size="10" fill="#1565c0">Вопрос: была ли база знаний правильно подготовлена?</text>

  <!-- Sub-cards -->
  <rect x="55" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1" />
  <text x="175" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">Готовность корпуса данных</text>
  <text x="175" y="178" text-anchor="middle" font-size="10" fill="#555">анализ процента успешной обработки · CER/WER</text>
  <text x="175" y="193" text-anchor="middle" font-size="10" fill="#555">TEDS · охват метаданных</text>
  <text x="175" y="208" text-anchor="middle" font-size="10" fill="#555">свежесть · удаление дубликатов</text>

  <rect x="305" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1" />
  <text x="425" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">Разбиение на чанки</text>
  <text x="425" y="178" text-anchor="middle" font-size="10" fill="#555">контейнмент элемента answer-span</text>
  <text x="425" y="193" text-anchor="middle" font-size="10" fill="#555">частота нарушения границы</text>
  <text x="425" y="208" text-anchor="middle" font-size="10" fill="#555">избыточность из-за перекрытия</text>

  <rect x="555" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1" />
  <text x="675" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">Вживление · Индекс</text>
  <text x="675" y="178" text-anchor="middle" font-size="10" fill="#555">домен nDCG@10</text>
  <text x="675" y="193" text-anchor="middle" font-size="10" fill="#555">Показатель воспроизведения ANN против постоянного значения</text>
  <text x="675" y="208" text-anchor="middle" font-size="10" fill="#555">базовая линия дрейфа</text>

  <rect x="805" y="140" width="320" height="80" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1" />
  <text x="965" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">Обогащение данных (NER · EL · теги)</text>
  <text x="965" y="178" text-anchor="middle" font-size="10" fill="#555">Обработка EL F1 и NIL · покрытие псевдонимов</text>
  <text x="965" y="193" text-anchor="middle" font-size="10" fill="#555">иерархический коэффициент F1 · частота одиноких тегов</text>
  <text x="965" y="208" text-anchor="middle" font-size="10" fill="#555">проверка корректности схемы во время публикации</text>

  <!-- Arrow down to Layer 2 -->
  <line x1="590" y1="244" x2="590" y2="280" stroke="#555" stroke-width="1.6" marker-end="url(#arrLayer)" />
  <text x="700" y="265" font-size="10" fill="#888" font-style="italic">устанавливает верхний предел воспроизводимости для всех элементов ниже</text>

  <!-- =============== Layer 2: Online =============== -->
  <rect x="30" y="290" width="1120" height="160" rx="12" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowL)" />
  <text x="55" y="316" font-size="14" font-weight="700" fill="#e65100">Слой 2 · Онлайн (за запрос)</text>
  <text x="55" y="334" font-size="10" fill="#e65100">Вопрос: были ли найдены и использованы правильные доказательства для этого запроса?</text>

  <rect x="55" y="350" width="240" height="80" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1" />
  <text x="175" y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Понимание запроса</text>
  <text x="175" y="388" text-anchor="middle" font-size="10" fill="#555">переписать параметры усиления/потерь</text>
  <text x="175" y="403" text-anchor="middle" font-size="10" fill="#555">точность маршрутизации</text>
  <text x="175" y="418" text-anchor="middle" font-size="10" fill="#555">покрытие декомпозиции</text>

  <rect x="305" y="350" width="240" height="80" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1" />
  <text x="425" y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Поиск</text>
  <text x="425" y="388" text-anchor="middle" font-size="10" fill="#555">Recall@k · среднегодовой чистый доход · nDCG · MAP</text>
  <text x="425" y="403" text-anchor="middle" font-size="10" fill="#555">точность/покрытие в контексте</text>
  <text x="425" y="418" text-anchor="middle" font-size="10" fill="#555">гибридный подъёмник над каждым полосой движения</text>

  <rect x="555" y="350" width="240" height="80" rx="8" fill="#ffebee" stroke="#c62828" stroke-width="1.6" />
  <text x="675" y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#c62828">Фильтрация (зона повышенной активности)</text>
  <text x="675" y="388" text-anchor="middle" font-size="10" fill="#c62828">коэффициент ложного исключения фильтра</text>
  <text x="675" y="403" text-anchor="middle" font-size="10" fill="#c62828">точность/воспроизводимость предиката</text>
  <text x="675" y="418" text-anchor="middle" font-size="10" fill="#c62828">восстановление теней Δ</text>

  <rect x="805" y="350" width="320" height="80" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1" />
  <text x="965" y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Переупорядочивание · Сбор контекста</text>
  <text x="965" y="388" text-anchor="middle" font-size="10" fill="#555">ΔnDCG · ΔMRR при отсутствии реранкинга</text>
  <text x="965" y="403" text-anchor="middle" font-size="10" fill="#555">использование контекста · потеря данных в промежуточной стадии</text>
  <text x="965" y="418" text-anchor="middle" font-size="10" fill="#555">устойчивость к отвлекающим факторам (RGB)</text>

  <!-- Arrow down to Layer 3 -->
  <line x1="590" y1="454" x2="590" y2="490" stroke="#555" stroke-width="1.6" marker-end="url(#arrLayer)" />
  <text x="700" y="475" font-size="10" fill="#888" font-style="italic">подает проверенный контекст в модуль генерации</text>

  <!-- =============== Layer 3: Post-gen =============== -->
  <rect x="30" y="500" width="1120" height="135" rx="12" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadowL)" />
  <text x="55" y="526" font-size="14" font-weight="700" fill="#2e7d32">Слой 3 · Телеметрия после генерации и в производственной среде</text>
  <text x="55" y="544" font-size="10" fill="#2e7d32">Вопрос: является ли ответ точным, проверяемым и пригодным к использованию, и останется ли он таким в следующей неделе?</text>

  <rect x="55" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="175" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Надежность</text>
  <text x="175" y="595" text-anchor="middle" font-size="10" fill="#555">Раги · HHEM · FActScore</text>
  <text x="175" y="610" text-anchor="middle" font-size="10" fill="#555">FaithJudge · самосогласованность</text>

  <rect x="305" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="425" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Ссылки и структура</text>
  <text x="425" y="595" text-anchor="middle" font-size="10" fill="#555">точность/покрытие цитирования</text>
  <text x="425" y="610" text-anchor="middle" font-size="10" fill="#555">валидность схемы · соответствие словарю</text>

  <rect x="555" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="675" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Неявный и явный сигналы</text>
  <text x="675" y="595" text-anchor="middle" font-size="10" fill="#555">частота регенерации · время пребывания · CTR на цитатах</text>
  <text x="675" y="610" text-anchor="middle" font-size="10" fill="#555">палець вверх · звезда · редактирование внутри элемента</text>

  <rect x="805" y="558" width="320" height="68" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="965" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Смещение · стоимость · задержка · HITL</text>
  <text x="965" y="595" text-anchor="middle" font-size="10" fill="#555">дрифт запроса/эмбеддинга · задержка p95 · стоимость за запрос</text>
  <text x="965" y="610" text-anchor="middle" font-size="10" fill="#555">оценка теней · очередь ревью с низкой степенью уверенности</text>
</svg>
