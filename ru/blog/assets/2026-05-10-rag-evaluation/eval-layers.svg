<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 660" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="The three-layer evaluation discipline" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Метод оценки с тремя уровнями</title>
  <defs>
    <marker id="arrLayer" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#334155" />
    </marker>
    <filter id="shadowL" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a" x="590">Метод оценки с трёхуровневой структурой</text>
  <text y="54" text-anchor="middle" font-size="12" fill="#334155" x="590">Офлайн-корпус и индекс · Онлайн-retrieval# и генерация · Постгенеративная верификация + телеметрия в производстве</text>

  <!-- =============== Layer 1: Offline =============== -->
  <rect x="30" y="80" width="1120" height="160" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowL)" />
  <text y="106" font-size="14" font-weight="700" fill="#1d4ed8" x="55">Слой 1 · Офлайн</text>
  <text y="124" font-size="10" fill="#1d4ed8" x="55">Вопрос: была ли база знаний правильно подготовлена?</text>

  <!-- Sub-cards -->
  <rect x="55" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="175">Готовность корпуса данных</text>
  <text y="178" text-anchor="middle" font-size="10" fill="#334155" x="175">коэффициент успешной обработки данных · CER/WER</text>
  <text y="193" text-anchor="middle" font-size="10" fill="#334155" x="175">TEDS · охват метаданных</text>
  <text y="208" text-anchor="middle" font-size="10" fill="#334155" x="175">свежесть данных · удаление дубликатов</text>

  <rect x="305" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="425">Чанкинг</text>
  <text y="178" text-anchor="middle" font-size="10" fill="#334155" x="425">механизм сдерживания answer-спан</text>
  <text y="193" text-anchor="middle" font-size="10" fill="#334155" x="425">частота нарушения границы</text>
  <text y="208" text-anchor="middle" font-size="10" fill="#334155" x="425">избыточность перекрытия</text>

  <rect x="555" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="675">Эмбеддинг · Индекс</text>
  <text y="178" text-anchor="middle" font-size="10" fill="#334155" x="675">домен nDCG@10</text>
  <text y="193" text-anchor="middle" font-size="10" fill="#334155" x="675">ANN показатель воспроизведения против плоской функции</text>
  <text y="208" text-anchor="middle" font-size="10" fill="#334155" x="675">базовая линия дрейфа</text>

  <rect x="805" y="140" width="320" height="80" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="965">Обогащение данных (NER · EL · теги)</text>
  <text y="178" text-anchor="middle" font-size="10" fill="#334155" x="965">EL F1 · обработка NIL · покрытие псевдонимов</text>
  <text y="193" text-anchor="middle" font-size="10" fill="#334155" x="965">иерархический коэффициент F1 · частота одиноких тегов</text>
  <text y="208" text-anchor="middle" font-size="10" fill="#334155" x="965">валидность схемы в момент публикации</text>

  <!-- Arrow down to Layer 2 -->
  <line x1="590" y1="244" x2="590" y2="280" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrLayer)" />
  <text y="265" font-size="10" fill="#64748b" font-style="italic" x="700">устанавливает верхний предел точности для всех элементов ниже</text>

  <!-- =============== Layer 2: Online =============== -->
  <rect x="30" y="290" width="1120" height="160" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowL)" />
  <text y="316" font-size="14" font-weight="700" fill="#9a3412" x="55">Слой 2 · Онлайн (по запросу)</text>
  <text y="334" font-size="10" fill="#9a3412" x="55">Вопрос: были ли найдены и использованы подходящие доказательства для этого запроса?</text>

  <rect x="55" y="350" width="240" height="80" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="175">Понимание запроса</text>
  <text y="388" text-anchor="middle" font-size="10" fill="#334155" x="175">переписывание коэффициента усиления/потерь</text>
  <text y="403" text-anchor="middle" font-size="10" fill="#334155" x="175">точность роутинг</text>
  <text y="418" text-anchor="middle" font-size="10" fill="#334155" x="175">покрытие декомпозиции</text>

  <rect x="305" y="350" width="240" height="80" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="425">Retrieval</text>
  <text y="388" text-anchor="middle" font-size="10" fill="#334155" x="425">Recall@k · MRR · nDCG · MAP</text>
  <text y="403" text-anchor="middle" font-size="10" fill="#334155" x="425">точность/покрытие контекста</text>
  <text y="418" text-anchor="middle" font-size="10" fill="#334155" x="425">гибридный механизм подъема над каждым полосой движения</text>

  <rect x="555" y="350" width="240" height="80" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.6" />
  <text y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b" x="675">Фильтрация (зона активных данных)</text>
  <text y="388" text-anchor="middle" font-size="10" fill="#991b1b" x="675">коэффициент ложного исключения фильтра</text>
  <text y="403" text-anchor="middle" font-size="10" fill="#991b1b" x="675">точность/покрытие предиката</text>
  <text y="418" text-anchor="middle" font-size="10" fill="#991b1b" x="675">тень-retrieval Δ</text>

  <rect x="805" y="350" width="320" height="80" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="965">Реранкинг · Сборка контекста</text>
  <text y="388" text-anchor="middle" font-size="10" fill="#334155" x="965">ΔnDCG · ΔMRR по сценарию без реранкинга</text>
  <text y="403" text-anchor="middle" font-size="10" fill="#334155" x="965">использование контекста · атака типа «потеря в промежуточной точке»</text>
  <text y="418" text-anchor="middle" font-size="10" fill="#334155" x="965">устойчивость к отвлекающим факторам (RGB)</text>

  <!-- Arrow down to Layer 3 -->
  <line x1="590" y1="454" x2="590" y2="490" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrLayer)" />
  <text y="475" font-size="10" fill="#64748b" font-style="italic" x="700">подает проверенный контекст в модуль генерации</text>

  <!-- =============== Layer 3: Post-gen =============== -->
  <rect x="30" y="500" width="1120" height="135" rx="12" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowL)" />
  <text y="526" font-size="14" font-weight="700" fill="#166534" x="55">Слой 3 · Телеметрия после генерации и в режиме производства</text>
  <text y="544" font-size="10" fill="#166534" x="55">Вопрос: является ли ответ точным, проверяемым и пригодным к использованию, и останется ли он таким в течение следующей недели?</text>

  <rect x="55" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="175">Точность воспроизведения</text>
  <text y="595" text-anchor="middle" font-size="10" fill="#334155" x="175">RAGAS · HHEM · FActScore</text>
  <text y="610" text-anchor="middle" font-size="10" fill="#334155" x="175">FaithJudge · самосогласованность</text>

  <rect x="305" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="425">Цитаты и структура</text>
  <text y="595" text-anchor="middle" font-size="10" fill="#334155" x="425">точность/покрытие цитат</text>
  <text y="610" text-anchor="middle" font-size="10" fill="#334155" x="425">валидность схемы · соответствие словарю</text>

  <rect x="555" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="675">Неявный и явный сигналы</text>
  <text y="595" text-anchor="middle" font-size="10" fill="#334155" x="675">частота регенерации · время пребывания · CTR на цитатах</text>
  <text y="610" text-anchor="middle" font-size="10" fill="#334155" x="675">палецы · звезда · внутристрочные редактирования</text>

  <rect x="805" y="558" width="320" height="68" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="965">Дрейф · стоимость · латентность · HITL</text>
  <text y="595" text-anchor="middle" font-size="10" fill="#334155" x="965">дрифт запроса/эмбеддинг · p95 латентность · стоимость запроса</text>
  <text y="610" text-anchor="middle" font-size="10" fill="#334155" x="965">тень эвал · очередь обзоров с низкой степенью уверенности</text>
</svg>
