<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 660" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrLayer" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#555" />
    </marker>
    <filter id="shadowL" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Title -->
  <text x="590" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a2e">Трёхслойная дисциплина оценки</text>
  <text x="590" y="54" text-anchor="middle" font-size="12" fill="#666">Офлайн-корпус и индекс · Онлайн-поиск и генерация · Постпроверка и prod-телеметрия</text>

  <!-- =============== Layer 1: Offline =============== -->
  <rect x="30" y="80" width="1120" height="160" rx="12" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowL)" />
  <text x="55" y="106" font-size="14" font-weight="700" fill="#1565c0">Слой 1 · Офлайн</text>
  <text x="55" y="124" font-size="10" fill="#1565c0">Вопрос: база знаний подготовлена правильно?</text>

  <!-- Sub-cards -->
  <rect x="55" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1" />
  <text x="175" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">Готовность корпуса</text>
  <text x="175" y="178" text-anchor="middle" font-size="10" fill="#555">parse pass-rate · CER/WER</text>
  <text x="175" y="193" text-anchor="middle" font-size="10" fill="#555">TEDS · покрытие метаданных</text>
  <text x="175" y="208" text-anchor="middle" font-size="10" fill="#555">свежесть · дедуп</text>

  <rect x="305" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1" />
  <text x="425" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">Чанкинг</text>
  <text x="425" y="178" text-anchor="middle" font-size="10" fill="#555">покрытие answer-span</text>
  <text x="425" y="193" text-anchor="middle" font-size="10" fill="#555">частота разрыва границ</text>
  <text x="425" y="208" text-anchor="middle" font-size="10" fill="#555">избыточность overlap</text>

  <rect x="555" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1" />
  <text x="675" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">Embedding · Индекс</text>
  <text x="675" y="178" text-anchor="middle" font-size="10" fill="#555">domain nDCG@10</text>
  <text x="675" y="193" text-anchor="middle" font-size="10" fill="#555">ANN recall vs. flat</text>
  <text x="675" y="208" text-anchor="middle" font-size="10" fill="#555">базовый drift</text>

  <rect x="805" y="140" width="320" height="80" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1" />
  <text x="965" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">Обогащение (NER · EL · теги)</text>
  <text x="965" y="178" text-anchor="middle" font-size="10" fill="#555">EL F1 · обработка NIL · покрытие алиасов</text>
  <text x="965" y="193" text-anchor="middle" font-size="10" fill="#555">иерархический F1 · доля orphan-tag</text>
  <text x="965" y="208" text-anchor="middle" font-size="10" fill="#555">валидность схемы при публикации</text>

  <!-- Arrow down to Layer 2 -->
  <line x1="590" y1="244" x2="590" y2="280" stroke="#555" stroke-width="1.6" marker-end="url(#arrLayer)" />
  <text x="700" y="265" font-size="10" fill="#888" font-style="italic">задаёт потолок recall для всего ниже</text>

  <!-- =============== Layer 2: Online =============== -->
  <rect x="30" y="290" width="1120" height="160" rx="12" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowL)" />
  <text x="55" y="316" font-size="14" font-weight="700" fill="#e65100">Слой 2 · Онлайн (на запрос)</text>
  <text x="55" y="334" font-size="10" fill="#e65100">Вопрос: найдено и использовано верное evidence для этого запроса?</text>

  <rect x="55" y="350" width="240" height="80" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1" />
  <text x="175" y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Понимание запроса</text>
  <text x="175" y="388" text-anchor="middle" font-size="10" fill="#555">прирост/потеря от rewrite</text>
  <text x="175" y="403" text-anchor="middle" font-size="10" fill="#555">точность routing</text>
  <text x="175" y="418" text-anchor="middle" font-size="10" fill="#555">покрытие decomposition</text>

  <rect x="305" y="350" width="240" height="80" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1" />
  <text x="425" y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Поиск</text>
  <text x="425" y="388" text-anchor="middle" font-size="10" fill="#555">Recall@k · MRR · nDCG · MAP</text>
  <text x="425" y="403" text-anchor="middle" font-size="10" fill="#555">precision/recall контекста</text>
  <text x="425" y="418" text-anchor="middle" font-size="10" fill="#555">hybrid lift над каждым каналом</text>

  <rect x="555" y="350" width="240" height="80" rx="8" fill="#ffebee" stroke="#c62828" stroke-width="1.6" />
  <text x="675" y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#c62828">Фильтрация (hot zone)</text>
  <text x="675" y="388" text-anchor="middle" font-size="10" fill="#c62828">доля ложных исключений фильтра</text>
  <text x="675" y="403" text-anchor="middle" font-size="10" fill="#c62828">precision/recall предикатов</text>
  <text x="675" y="418" text-anchor="middle" font-size="10" fill="#c62828">Δ shadow-retrieval</text>

  <rect x="805" y="350" width="320" height="80" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1" />
  <text x="965" y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Реранжирование · Сборка контекста</text>
  <text x="965" y="388" text-anchor="middle" font-size="10" fill="#555">ΔnDCG · ΔMRR vs. без реранка</text>
  <text x="965" y="403" text-anchor="middle" font-size="10" fill="#555">использование контекста · lost-in-middle</text>
  <text x="965" y="418" text-anchor="middle" font-size="10" fill="#555">устойчивость к distractor (RGB)</text>

  <!-- Arrow down to Layer 3 -->
  <line x1="590" y1="454" x2="590" y2="490" stroke="#555" stroke-width="1.6" marker-end="url(#arrLayer)" />
  <text x="700" y="475" font-size="10" fill="#888" font-style="italic">подаёт проверенный контекст в генерацию</text>

  <!-- =============== Layer 3: Post-gen =============== -->
  <rect x="30" y="500" width="1120" height="135" rx="12" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadowL)" />
  <text x="55" y="526" font-size="14" font-weight="700" fill="#2e7d32">Слой 3 · Постгенерация и prod-телеметрия</text>
  <text x="55" y="544" font-size="10" fill="#2e7d32">Вопрос: ответ достоверен, проверяем и безопасен для выпуска — и останется ли таким на следующей неделе?</text>

  <rect x="55" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="175" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Достоверность</text>
  <text x="175" y="595" text-anchor="middle" font-size="10" fill="#555">RAGAS · HHEM · FActScore</text>
  <text x="175" y="610" text-anchor="middle" font-size="10" fill="#555">FaithJudge · self-consistency</text>

  <rect x="305" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="425" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Цитаты и структура</text>
  <text x="425" y="595" text-anchor="middle" font-size="10" fill="#555">precision/recall цитирования</text>
  <text x="425" y="610" text-anchor="middle" font-size="10" fill="#555">валидность схемы · соответствие vocab</text>

  <rect x="555" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="675" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Неявный + явный сигнал</text>
  <text x="675" y="595" text-anchor="middle" font-size="10" fill="#555">regen rate · dwell · CTR по цитатам</text>
  <text x="675" y="610" text-anchor="middle" font-size="10" fill="#555">лайки · звёзды · inline edits</text>

  <rect x="805" y="558" width="320" height="68" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="965" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Drift · стоимость · задержка · HITL</text>
  <text x="965" y="595" text-anchor="middle" font-size="10" fill="#555">drift запроса/embedding · p95 latency · $/query</text>
  <text x="965" y="610" text-anchor="middle" font-size="10" fill="#555">shadow eval · очередь ревью low-confidence</text>
</svg>
