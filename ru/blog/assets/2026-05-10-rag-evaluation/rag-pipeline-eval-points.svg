<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrEval" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555" />
    </marker>
    <filter id="shadowEval" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Title -->
  <text x="590" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a2e">RAG-конвейер с точками оценки</text>
  <text x="590" y="54" text-anchor="middle" font-size="12" fill="#666">У каждого этапа есть метрика. Она и ловит тихие сбои.</text>

  <!-- ============ OFFLINE LANE ============ -->
  <rect x="20" y="78" width="1140" height="290" rx="10" fill="#f8f9fa" stroke="#cbd5e0" stroke-width="1" />
  <text x="40" y="102" font-size="13" font-weight="700" fill="#1565c0">Офлайн · Инжест</text>
  <text x="40" y="118" font-size="10" fill="#888">Запускается раз на версию корпуса. Задаёт потолок.</text>

  <!-- Stage 1: Acquire / Parse -->
  <rect x="40" y="140" width="170" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="125" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Сбор и парсинг</text>
  <text x="125" y="178" text-anchor="middle" font-size="9" fill="#555">PDF · HTML · OCR</text>
  <text x="125" y="192" text-anchor="middle" font-size="9" fill="#555">Таблицы · Макет</text>

  <!-- Metric badge 1 -->
  <rect x="40" y="212" width="170" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="125" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">CER · WER · TEDS</text>
  <text x="125" y="242" text-anchor="middle" font-size="9" fill="#827717">доля успешного парсинга</text>
  <text x="125" y="255" text-anchor="middle" font-size="9" fill="#827717">точность макета</text>

  <!-- Arrow -->
  <line x1="210" y1="171" x2="245" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 2: Normalize / Dedup -->
  <rect x="245" y="140" width="170" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="330" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Нормализация и дедуп</text>
  <text x="330" y="178" text-anchor="middle" font-size="9" fill="#555">NFC/NFKC · MinHash</text>
  <text x="330" y="192" text-anchor="middle" font-size="9" fill="#555">PII · шаблонный текст</text>

  <rect x="245" y="212" width="170" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="330" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">полнота/точность дублей</text>
  <text x="330" y="242" text-anchor="middle" font-size="9" fill="#827717">полнота PII (по типам)</text>
  <text x="330" y="255" text-anchor="middle" font-size="9" fill="#827717">F1 lang-detect</text>

  <line x1="415" y1="171" x2="450" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 3: Chunk -->
  <rect x="450" y="140" width="170" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="535" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Чанкинг</text>
  <text x="535" y="178" text-anchor="middle" font-size="9" fill="#555">рекурсивный · семантический</text>
  <text x="535" y="192" text-anchor="middle" font-size="9" fill="#555">структурный · поздний</text>

  <rect x="450" y="212" width="170" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="535" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">покрытие answer-span</text>
  <text x="535" y="242" text-anchor="middle" font-size="9" fill="#827717">доля разрывов границ</text>
  <text x="535" y="255" text-anchor="middle" font-size="9" fill="#827717">Recall@k vs. size</text>

  <line x1="620" y1="171" x2="655" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 4: Enrich (NER/EL) -->
  <rect x="655" y="140" width="170" height="62" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="740" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#6a1b9a">Обогащение</text>
  <text x="740" y="178" text-anchor="middle" font-size="9" fill="#555">NER · entity link</text>
  <text x="740" y="192" text-anchor="middle" font-size="9" fill="#555">теги · иерархия</text>

  <rect x="655" y="212" width="170" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="740" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">EL F1 · NIL precision</text>
  <text x="740" y="242" text-anchor="middle" font-size="9" fill="#827717">иерархический F1</text>
  <text x="740" y="255" text-anchor="middle" font-size="9" fill="#827717">покрытие алиасов</text>

  <line x1="825" y1="171" x2="860" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 5: Embed -->
  <rect x="860" y="140" width="135" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="927" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Эмбеддинг</text>
  <text x="927" y="178" text-anchor="middle" font-size="9" fill="#555">dense / sparse</text>
  <text x="927" y="192" text-anchor="middle" font-size="9" fill="#555">multi-vector</text>

  <rect x="860" y="212" width="135" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="927" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">domain nDCG@10</text>
  <text x="927" y="242" text-anchor="middle" font-size="9" fill="#827717">дрейф (KL · NN-stab.)</text>
  <text x="927" y="255" text-anchor="middle" font-size="9" fill="#827717">vs. BEIR/MMTEB</text>

  <line x1="995" y1="171" x2="1030" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 6: Index -->
  <rect x="1030" y="140" width="115" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="1087" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Индексация</text>
  <text x="1087" y="178" text-anchor="middle" font-size="9" fill="#555">HNSW / IVF</text>
  <text x="1087" y="192" text-anchor="middle" font-size="9" fill="#555">BM25 · hybrid</text>

  <rect x="1030" y="212" width="115" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="1087" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">ANN recall vs. flat</text>
  <text x="1087" y="242" text-anchor="middle" font-size="9" fill="#827717">лаг свежести p99</text>
  <text x="1087" y="255" text-anchor="middle" font-size="9" fill="#827717">лат. поиска с фильтром</text>

  <!-- Lane summary -->
  <rect x="40" y="290" width="1105" height="58" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1" />
  <text x="592" y="312" text-anchor="middle" font-size="11" font-weight="600" fill="#1565c0">Готовность офлайн-корпуса задаёт верхнюю границу. Если чанк теряет answer-span здесь, ниже по конвейеру его не вернёт ни один reranker.</text>
  <text x="592" y="332" text-anchor="middle" font-size="10" fill="#1565c0">Большинство команд слишком вкладываются в retrieval и недовкладываются в парсинг, нормализацию и чанкинг. Именно там production RAG тихо умирает.</text>

  <!-- ============ ONLINE LANE ============ -->
  <rect x="20" y="378" width="1140" height="280" rx="10" fill="#f8f9fa" stroke="#cbd5e0" stroke-width="1" />
  <text x="40" y="402" font-size="13" font-weight="700" fill="#e65100">Онлайн · Инференс (на запрос)</text>
  <text x="40" y="418" font-size="10" fill="#888">Выполняется на каждый запрос. Здесь в проде следят за большей частью метрик.</text>

  <!-- Stage 7: Query Rewrite -->
  <rect x="40" y="440" width="160" height="62" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="120" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">Перепись / маршрутизация</text>
  <text x="120" y="478" text-anchor="middle" font-size="9" fill="#555">HyDE · multi-query</text>
  <text x="120" y="492" text-anchor="middle" font-size="9" fill="#555">intent · adaptive</text>

  <rect x="40" y="512" width="160" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="120" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">прирост Recall@k</text>
  <text x="120" y="542" text-anchor="middle" font-size="9" fill="#827717">точность маршрутизации</text>
  <text x="120" y="555" text-anchor="middle" font-size="9" fill="#827717">доля no-op</text>

  <line x1="200" y1="471" x2="235" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 8: Retrieve -->
  <rect x="235" y="440" width="160" height="62" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="315" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">Поиск</text>
  <text x="315" y="478" text-anchor="middle" font-size="9" fill="#555">dense + sparse + RRF</text>
  <text x="315" y="492" text-anchor="middle" font-size="9" fill="#555">предикаты фильтра</text>

  <rect x="235" y="512" width="160" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="315" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">Recall@k · MRR · nDCG</text>
  <text x="315" y="542" text-anchor="middle" font-size="9" fill="#827717">точность/полнота контекста</text>
  <text x="315" y="555" text-anchor="middle" font-size="9" fill="#827717">прирост hybrid</text>

  <line x1="395" y1="471" x2="430" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 9: Filter (highlighted) -->
  <rect x="430" y="440" width="160" height="62" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="2" filter="url(#shadowEval)" />
  <text x="510" y="462" text-anchor="middle" font-size="12" font-weight="700" fill="#c62828">Фильтр (тихий убийца)</text>
  <text x="510" y="478" text-anchor="middle" font-size="9" fill="#555">tenant · ACL · tag</text>
  <text x="510" y="492" text-anchor="middle" font-size="9" fill="#555">жёсткий vs. мягкий</text>

  <rect x="430" y="512" width="160" height="48" rx="6" fill="#ffebee" stroke="#c62828" stroke-width="1.2" />
  <text x="510" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#c62828">доля ложных исключений</text>
  <text x="510" y="542" text-anchor="middle" font-size="9" fill="#c62828">точность/полнота предикатов</text>
  <text x="510" y="555" text-anchor="middle" font-size="9" fill="#c62828">Δ shadow-retrieval</text>

  <line x1="590" y1="471" x2="625" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 10: Rerank -->
  <rect x="625" y="440" width="160" height="62" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="705" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">Реранжирование</text>
  <text x="705" y="478" text-anchor="middle" font-size="9" fill="#555">cross-encoder · listwise</text>
  <text x="705" y="492" text-anchor="middle" font-size="9" fill="#555">BGE · Cohere · ZeRank</text>

  <rect x="625" y="512" width="160" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="705" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">ΔnDCG · ΔMRR · ΔP@1</text>
  <text x="705" y="542" text-anchor="middle" font-size="9" fill="#827717">устойчивость к дистракторам</text>
  <text x="705" y="555" text-anchor="middle" font-size="9" fill="#827717">латентность p95</text>

  <line x1="785" y1="471" x2="820" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 11: Assemble -->
  <rect x="820" y="440" width="160" height="62" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="900" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">Сборка контекста</text>
  <text x="900" y="478" text-anchor="middle" font-size="9" fill="#555">порядок · сжатие</text>
  <text x="900" y="492" text-anchor="middle" font-size="9" fill="#555">бюджет токенов</text>

  <rect x="820" y="512" width="160" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="900" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">использование контекста</text>
  <text x="900" y="542" text-anchor="middle" font-size="9" fill="#827717">lost-in-the-middle</text>
  <text x="900" y="555" text-anchor="middle" font-size="9" fill="#827717">сжатие × корректность</text>

  <line x1="980" y1="471" x2="1015" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 12: Generate -->
  <rect x="1015" y="440" width="130" height="62" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="1080" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#6a1b9a">Генерация</text>
  <text x="1080" y="478" text-anchor="middle" font-size="9" fill="#555">вызов LLM</text>
  <text x="1080" y="492" text-anchor="middle" font-size="9" fill="#555">+ цитаты</text>

  <rect x="1015" y="512" width="130" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="1080" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">faithfulness · HHEM</text>
  <text x="1080" y="542" text-anchor="middle" font-size="9" fill="#827717">P/R цитат</text>
  <text x="1080" y="555" text-anchor="middle" font-size="9" fill="#827717">FActScore</text>

  <!-- Lane summary -->
  <rect x="40" y="582" width="1105" height="58" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1" />
  <text x="592" y="604" text-anchor="middle" font-size="11" font-weight="600" fill="#e65100">Плохой фильтр или неверная перепись обнуляют recall ещё до ранжирования. Faithfulness при этом выглядит нормально — модель честно говорит: «Не знаю».</text>
  <text x="592" y="624" text-anchor="middle" font-size="10" fill="#e65100">Отслеживайте долю исключений вместе с Recall@k. Иначе канонические IR-метрики наврут вам о якобы здоровом retriever.</text>

  <!-- ============ POST-GEN LANE ============ -->
  <rect x="20" y="668" width="1140" height="78" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1" />
  <text x="40" y="692" font-size="13" font-weight="700" fill="#2e7d32">После генерации · Проверка и телеметрия</text>

  <rect x="40" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="150" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">проверка утверждений · NLI · self-consistency</text>

  <rect x="270" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="380" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">валидность схемы · grounding сущностей · ECE</text>

  <rect x="500" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="610" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">доля regen · лайки/дизлайки · dwell · CTR по цитатам</text>

  <rect x="730" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="840" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">дрейф (query/embed) · cost/query · p95</text>

  <rect x="960" y="704" width="185" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="1052" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">shadow eval · HITL queue</text>
</svg>
