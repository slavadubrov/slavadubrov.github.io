<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrEval" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555" />
    </marker>
    <filter id="shadowEval" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Title -->
  <text x="590" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a2e">Пайплайн RAG с точками оценки</text>
  <text x="590" y="54" text-anchor="middle" font-size="12" fill="#666">Каждому этапу присваивается метрика. Именно метрика позволяет обнаружить скрытые сбои.</text>

  <!-- ============ OFFLINE LANE ============ -->
  <rect x="20" y="78" width="1140" height="290" rx="10" fill="#f8f9fa" stroke="#cbd5e0" stroke-width="1" />
  <text x="40" y="102" font-size="13" font-weight="700" fill="#1565c0">Офлайн · Прием данных</text>
  <text x="40" y="118" font-size="10" fill="#888">Выполняется один раз на каждую версию корпуса. Устанавливает верхний предел.</text>

  <!-- Stage 1: Acquire / Parse -->
  <rect x="40" y="140" width="170" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="125" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Получение и парсинг</text>
  <text x="125" y="178" text-anchor="middle" font-size="9" fill="#555">PDF · HTML · OCR</text>
  <text x="125" y="192" text-anchor="middle" font-size="9" fill="#555">Таблицы · Макет</text>

  <!-- Metric badge 1 -->
  <rect x="40" y="212" width="170" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="125" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">CER · WER · TEDS</text>
  <text x="125" y="242" text-anchor="middle" font-size="9" fill="#827717">анализ процента успешной обработки</text>
  <text x="125" y="255" text-anchor="middle" font-size="9" fill="#827717">точность разметки</text>

  <!-- Arrow -->
  <line x1="210" y1="171" x2="245" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 2: Normalize / Dedup -->
  <rect x="245" y="140" width="170" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="330" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Нормализация и удаление дубликатов</text>
  <text x="330" y="178" text-anchor="middle" font-size="9" fill="#555">NFC/NFKC · MinHash</text>
  <text x="330" y="192" text-anchor="middle" font-size="9" fill="#555">Персональные данные · шаблон</text>

  <rect x="245" y="212" width="170" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="330" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">повторная точность/чувствительность</text>
  <text x="330" y="242" text-anchor="middle" font-size="9" fill="#827717">Восстановление PII (по типу)</text>
  <text x="330" y="255" text-anchor="middle" font-size="9" fill="#827717">Обнаружение языка F1</text>

  <line x1="415" y1="171" x2="450" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 3: Chunk -->
  <rect x="450" y="140" width="170" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="535" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Блок данных</text>
  <text x="535" y="178" text-anchor="middle" font-size="9" fill="#555">рекурсивный · семантический</text>
  <text x="535" y="192" text-anchor="middle" font-size="9" fill="#555">структурный · поздний</text>

  <rect x="450" y="212" width="170" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="535" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">контейнмент элемента answer-span</text>
  <text x="535" y="242" text-anchor="middle" font-size="9" fill="#827717">частота нарушения границы</text>
  <text x="535" y="255" text-anchor="middle" font-size="9" fill="#827717">Recall@k против размера</text>

  <line x1="620" y1="171" x2="655" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 4: Enrich (NER/EL) -->
  <rect x="655" y="140" width="170" height="62" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="740" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#6a1b9a">Обогащение</text>
  <text x="740" y="178" text-anchor="middle" font-size="9" fill="#555">NER · связывание сущностей</text>
  <text x="740" y="192" text-anchor="middle" font-size="9" fill="#555">теги · иерархия</text>

  <rect x="655" y="212" width="170" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="740" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">Точность EL F1 · NIL</text>
  <text x="740" y="242" text-anchor="middle" font-size="9" fill="#827717">иерархический F1</text>
  <text x="740" y="255" text-anchor="middle" font-size="9" fill="#827717">покрытие алиасов</text>

  <line x1="825" y1="171" x2="860" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 5: Embed -->
  <rect x="860" y="140" width="135" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="927" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Встраивание</text>
  <text x="927" y="178" text-anchor="middle" font-size="9" fill="#555">плотное / разреженное</text>
  <text x="927" y="192" text-anchor="middle" font-size="9" fill="#555">многовекторный</text>

  <rect x="860" y="212" width="135" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="927" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">домен nDCG@10</text>
  <text x="927" y="242" text-anchor="middle" font-size="9" fill="#827717">дрейф (KL · NN-stab.)</text>
  <text x="927" y="255" text-anchor="middle" font-size="9" fill="#827717">против BEIR/MMTEB</text>

  <line x1="995" y1="171" x2="1030" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 6: Index -->
  <rect x="1030" y="140" width="115" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="1087" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Индекс</text>
  <text x="1087" y="178" text-anchor="middle" font-size="9" fill="#555">HNSW / IVF</text>
  <text x="1087" y="192" text-anchor="middle" font-size="9" fill="#555">BM25 · гибридный</text>

  <rect x="1030" y="212" width="115" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="1087" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">Показатель воспроизведения ANN против постоянного значения</text>
  <text x="1087" y="242" text-anchor="middle" font-size="9" fill="#827717">задержка свежести p99</text>
  <text x="1087" y="255" text-anchor="middle" font-size="9" fill="#827717">широта фильтрованного поиска</text>

  <!-- Lane summary -->
  <rect x="40" y="290" width="1105" height="58" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1" />
  <text x="592" y="312" text-anchor="middle" font-size="11" font-weight="600" fill="#1565c0">Готовность офлайн-корпуса определяет верхний предел. Если какой-либо фрагмент теряет здесь диапазон ответа, никакой реранкер не сможет восстановить его позже.</text>
  <text x="592" y="332" text-anchor="middle" font-size="10" fill="#1565c0">Большинство команд слишком много инвестируют в процессы поиска информации и недостаточно — в парсинг, нормализацию и разбиение данных на части. Именно поэтому решения типа RAG в продакшене постепенно теряют эффективность.</text>

  <!-- ============ ONLINE LANE ============ -->
  <rect x="20" y="378" width="1140" height="280" rx="10" fill="#f8f9fa" stroke="#cbd5e0" stroke-width="1" />
  <text x="40" y="402" font-size="13" font-weight="700" fill="#e65100">Онлайн-режим · Инференс (за запрос)</text>
  <text x="40" y="418" font-size="10" fill="#888">Выполняется при каждом запросе. Трек, в котором отслеживается большинство метрик в производственной среде.</text>

  <!-- Stage 7: Query Rewrite -->
  <rect x="40" y="440" width="160" height="62" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="120" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">Переписать / Маршрутизация</text>
  <text x="120" y="478" text-anchor="middle" font-size="9" fill="#555">HyDE · множественные запросы</text>
  <text x="120" y="492" text-anchor="middle" font-size="9" fill="#555">интент · адаптивный</text>

  <rect x="40" y="512" width="160" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="120" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">Улучшение Recall@k</text>
  <text x="120" y="542" text-anchor="middle" font-size="9" fill="#827717">точность маршрутизации</text>
  <text x="120" y="555" text-anchor="middle" font-size="9" fill="#827717">коэффициент операций без действий</text>

  <line x1="200" y1="471" x2="235" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 8: Retrieve -->
  <rect x="235" y="440" width="160" height="62" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="315" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">Получение</text>
  <text x="315" y="478" text-anchor="middle" font-size="9" fill="#555">плотная + редкая + RRF</text>
  <text x="315" y="492" text-anchor="middle" font-size="9" fill="#555">предикаты фильтрации</text>

  <rect x="235" y="512" width="160" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="315" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">Recall@k · MRR · nDCG</text>
  <text x="315" y="542" text-anchor="middle" font-size="9" fill="#827717">точность/покрытие в контексте</text>
  <text x="315" y="555" text-anchor="middle" font-size="9" fill="#827717">гибридный подъёмник</text>

  <line x1="395" y1="471" x2="430" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 9: Filter (highlighted) -->
  <rect x="430" y="440" width="160" height="62" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="2" filter="url(#shadowEval)" />
  <text x="510" y="462" text-anchor="middle" font-size="12" font-weight="700" fill="#c62828">Фильтр (тихий убийца)</text>
  <text x="510" y="478" text-anchor="middle" font-size="9" fill="#555">арендатор · ACL · тег</text>
  <text x="510" y="492" text-anchor="middle" font-size="9" fill="#555">жёсткий против гибкого</text>

  <rect x="430" y="512" width="160" height="48" rx="6" fill="#ffebee" stroke="#c62828" stroke-width="1.2" />
  <text x="510" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#c62828">коэффициент ложного исключения фильтра</text>
  <text x="510" y="542" text-anchor="middle" font-size="9" fill="#c62828">точность/воспроизводимость предиката</text>
  <text x="510" y="555" text-anchor="middle" font-size="9" fill="#c62828">восстановление теней Δ</text>

  <line x1="590" y1="471" x2="625" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 10: Rerank -->
  <rect x="625" y="440" width="160" height="62" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="705" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">Переупорядочивание</text>
  <text x="705" y="478" text-anchor="middle" font-size="9" fill="#555">кросс-энкодер · по списку</text>
  <text x="705" y="492" text-anchor="middle" font-size="9" fill="#555">BGE · Cohere · ZeRank</text>

  <rect x="625" y="512" width="160" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="705" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">ΔnDCG · ΔMRR · ΔP@1</text>
  <text x="705" y="542" text-anchor="middle" font-size="9" fill="#827717">устойчивость к отвлекающим факторам</text>
  <text x="705" y="555" text-anchor="middle" font-size="9" fill="#827717">задержка p95</text>

  <line x1="785" y1="471" x2="820" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 11: Assemble -->
  <rect x="820" y="440" width="160" height="62" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="900" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">Сбор контекста</text>
  <text x="900" y="478" text-anchor="middle" font-size="9" fill="#555">упорядочивание · сжатие</text>
  <text x="900" y="492" text-anchor="middle" font-size="9" fill="#555">токены бюджета</text>

  <rect x="820" y="512" width="160" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="900" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">использование контекста</text>
  <text x="900" y="542" text-anchor="middle" font-size="9" fill="#827717">атака типа «потерянное в промежутке»</text>
  <text x="900" y="555" text-anchor="middle" font-size="9" fill="#827717">компрессия × корректность</text>

  <line x1="980" y1="471" x2="1015" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 12: Generate -->
  <rect x="1015" y="440" width="130" height="62" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="1080" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#6a1b9a">Генерировать</text>
  <text x="1080" y="478" text-anchor="middle" font-size="9" fill="#555">Запрос к LLM</text>
  <text x="1080" y="492" text-anchor="middle" font-size="9" fill="#555">+ ссылки</text>

  <rect x="1015" y="512" width="130" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="1080" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">точность воспроизведения · HHEM</text>
  <text x="1080" y="542" text-anchor="middle" font-size="9" fill="#827717">цитата P/R</text>
  <text x="1080" y="555" text-anchor="middle" font-size="9" fill="#827717">Оценка достоверности</text>

  <!-- Lane summary -->
  <rect x="40" y="582" width="1105" height="58" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1" />
  <text x="592" y="604" text-anchor="middle" font-size="11" font-weight="600" fill="#e65100">Некорректный фильтр или неправильная переработка данных приводят к снижению показателя воспроизведения до нуля ещё до начала ранжирования. Показатель точности остается в норме — модель корректно отвечает «Я не знаю».</text>
  <text x="592" y="624" text-anchor="middle" font-size="10" fill="#e65100">Отслеживайте коэффициент исключения треков наряду с Recall@k. В противном случае стандартные метрики IR смогут ввести вас в заблуждение относительно качества системы поиска.</text>

  <!-- ============ POST-GEN LANE ============ -->
  <rect x="20" y="668" width="1140" height="78" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1" />
  <text x="40" y="692" font-size="13" font-weight="700" fill="#2e7d32">После генерации · Проверка и телеметрия</text>

  <rect x="40" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="150" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">проверка утверждений · NLI · самоконсистентность</text>

  <rect x="270" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="380" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">валидность схемы · анкоринг сущностей · ECE</text>

  <rect x="500" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="610" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">частота регенерации · количество кликов пальцем · время пребывания · CTR на ссылках</text>

  <rect x="730" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="840" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">смещение (запрос/вкладка) · стоимость/запрос · p95</text>

  <rect x="960" y="704" width="185" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="1052" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">оценка тени · очередь HITL</text>
</svg>
