<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Пайплайн RAG с точками оценки</title>
  <desc id="artifact-desc">Пайплайн RAG с точками оценки.</desc>
  <defs>
    <marker id="arrEval" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155" />
    </marker>
    <filter id="shadowEval" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a" x="590">Пайплайн RAG с точками оценки</text>
  <text y="54" text-anchor="middle" font-size="12" fill="#334155" x="590">Каждому этапу присваивается метрика. Именно метрика позволяет обнаружить скрытые сбои.</text>

  <!-- ============ OFFLINE LANE ============ -->
  <rect x="20" y="78" width="1140" height="290" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="102" font-size="13" font-weight="700" fill="#1d4ed8" x="40">Офлайн · Прием данных</text>
  <text y="118" font-size="10" fill="#64748b" x="40">Выполняется один раз на каждую версию корпуса. Устанавливает верхний предел.</text>

  <!-- Stage 1: Acquire / Parse -->
  <rect x="40" y="140" width="170" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="125">Получение и парсинг</text>
  <text y="178" text-anchor="middle" font-size="9" fill="#334155" x="125">PDF · HTML · OCR</text>
  <text y="192" text-anchor="middle" font-size="9" fill="#334155" x="125">Таблицы · Макет</text>

  <!-- Metric badge 1 -->
  <rect x="40" y="212" width="170" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="125">CER · WER · TEDS</text>
  <text y="242" text-anchor="middle" font-size="9" fill="#9a3412" x="125">анализ процента успешной обработки</text>
  <text y="255" text-anchor="middle" font-size="9" fill="#9a3412" x="125">точность разметки</text>

  <!-- Arrow -->
  <line x1="210" y1="171" x2="245" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 2: Normalize / Dedup -->
  <rect x="245" y="140" width="170" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="330">Нормализация и удаление дубликатов</text>
  <text y="178" text-anchor="middle" font-size="9" fill="#334155" x="330">NFC/NFKC · MinHash</text>
  <text y="192" text-anchor="middle" font-size="9" fill="#334155" x="330">Персональные данные · шаблон</text>

  <rect x="245" y="212" width="170" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="330">повторная точность/чувствительность</text>
  <text y="242" text-anchor="middle" font-size="9" fill="#9a3412" x="330">Восстановление PII (по типу)</text>
  <text y="255" text-anchor="middle" font-size="9" fill="#9a3412" x="330">Обнаружение языка F1</text>

  <line x1="415" y1="171" x2="450" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 3: Chunk -->
  <rect x="450" y="140" width="170" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="535">Блок данных</text>
  <text y="178" text-anchor="middle" font-size="9" fill="#334155" x="535">рекурсивный · семантический</text>
  <text y="192" text-anchor="middle" font-size="9" fill="#334155" x="535">структурный · поздний</text>

  <rect x="450" y="212" width="170" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="535">контейнмент элемента answer-span</text>
  <text y="242" text-anchor="middle" font-size="9" fill="#9a3412" x="535">частота нарушения границы</text>
  <text y="255" text-anchor="middle" font-size="9" fill="#9a3412" x="535">Recall@k против размера</text>

  <line x1="620" y1="171" x2="655" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 4: Enrich (NER/EL) -->
  <rect x="655" y="140" width="170" height="62" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6" x="740">Обогащение</text>
  <text y="178" text-anchor="middle" font-size="9" fill="#334155" x="740">NER · связывание сущностей</text>
  <text y="192" text-anchor="middle" font-size="9" fill="#334155" x="740">теги · иерархия</text>

  <rect x="655" y="212" width="170" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="740">Точность EL F1 · NIL</text>
  <text y="242" text-anchor="middle" font-size="9" fill="#9a3412" x="740">иерархический F1</text>
  <text y="255" text-anchor="middle" font-size="9" fill="#9a3412" x="740">покрытие алиасов</text>

  <line x1="825" y1="171" x2="860" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 5: Embed -->
  <rect x="860" y="140" width="135" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="927">Встраивание</text>
  <text y="178" text-anchor="middle" font-size="9" fill="#334155" x="927">плотное / разреженное</text>
  <text y="192" text-anchor="middle" font-size="9" fill="#334155" x="927">многовекторный</text>

  <rect x="860" y="212" width="135" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="927">домен nDCG@10</text>
  <text y="242" text-anchor="middle" font-size="9" fill="#9a3412" x="927">дрейф (KL · NN-stab.)</text>
  <text y="255" text-anchor="middle" font-size="9" fill="#9a3412" x="927">против BEIR/MMTEB</text>

  <line x1="995" y1="171" x2="1030" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 6: Index -->
  <rect x="1030" y="140" width="115" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="1087">Индекс</text>
  <text y="178" text-anchor="middle" font-size="9" fill="#334155" x="1087">HNSW / IVF</text>
  <text y="192" text-anchor="middle" font-size="9" fill="#334155" x="1087">BM25 · гибридный</text>

  <rect x="1030" y="212" width="115" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="1087" transform="translate(-84.12 0.00)">Показатель воспроизведения ANN против постоянного значения</text>
  <text y="242" text-anchor="middle" font-size="9" fill="#9a3412" x="1087">задержка свежести p99</text>
  <text y="255" text-anchor="middle" font-size="9" fill="#9a3412" x="1087">широта фильтрованного поиска</text>

  <!-- Lane summary -->
  <rect x="40" y="290" width="1105" height="58" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1" />
  <text y="312" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8" x="592">Готовность офлайн-корпуса определяет верхний предел. Если какой-либо фрагмент теряет здесь диапазон ответа, никакой реранкер не сможет восстановить его позже.</text>
  <text y="332" text-anchor="middle" font-size="10" fill="#1d4ed8" x="592" textLength="1168.58" lengthAdjust="spacingAndGlyphs" transform="translate(-2.00 0.00)">Большинство команд слишком много инвестируют в процессы поиска информации и недостаточно — в парсинг, нормализацию и разбиение данных на части. Именно поэтому решения типа RAG в продакшене постепенно теряют эффективность.</text>

  <!-- ============ ONLINE LANE ============ -->
  <rect x="20" y="378" width="1140" height="280" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="402" font-size="13" font-weight="700" fill="#9a3412" x="40">Онлайн-режим · Инференс (за запрос)</text>
  <text y="418" font-size="10" fill="#64748b" x="40">Выполняется при каждом запросе. Трек, в котором отслеживается большинство метрик в производственной среде.</text>

  <!-- Stage 7: Query Rewrite -->
  <rect x="40" y="440" width="160" height="62" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="120">Переписать / Маршрутизация</text>
  <text y="478" text-anchor="middle" font-size="9" fill="#334155" x="120">HyDE · множественные запросы</text>
  <text y="492" text-anchor="middle" font-size="9" fill="#334155" x="120">интент · адаптивный</text>

  <rect x="40" y="512" width="160" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="120">Улучшение Recall@k</text>
  <text y="542" text-anchor="middle" font-size="9" fill="#9a3412" x="120">точность маршрутизации</text>
  <text y="555" text-anchor="middle" font-size="9" fill="#9a3412" x="120">коэффициент операций без действий</text>

  <line x1="200" y1="471" x2="235" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 8: Retrieve -->
  <rect x="235" y="440" width="160" height="62" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="315">Получение</text>
  <text y="478" text-anchor="middle" font-size="9" fill="#334155" x="315">плотная + редкая + RRF</text>
  <text y="492" text-anchor="middle" font-size="9" fill="#334155" x="315">предикаты фильтрации</text>

  <rect x="235" y="512" width="160" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="315">Recall@k · MRR · nDCG</text>
  <text y="542" text-anchor="middle" font-size="9" fill="#9a3412" x="315">точность/покрытие в контексте</text>
  <text y="555" text-anchor="middle" font-size="9" fill="#9a3412" x="315">гибридный подъёмник</text>

  <line x1="395" y1="471" x2="430" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 9: Filter (highlighted) -->
  <rect x="430" y="440" width="160" height="62" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b" x="510">Фильтр (тихий убийца)</text>
  <text y="478" text-anchor="middle" font-size="9" fill="#334155" x="510">арендатор · ACL · тег</text>
  <text y="492" text-anchor="middle" font-size="9" fill="#334155" x="510">жёсткий против гибкого</text>

  <rect x="430" y="512" width="160" height="48" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.2" />
  <text y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#991b1b" x="510">коэффициент ложного исключения фильтра</text>
  <text y="542" text-anchor="middle" font-size="9" fill="#991b1b" x="510">точность/воспроизводимость предиката</text>
  <text y="555" text-anchor="middle" font-size="9" fill="#991b1b" x="510">восстановление теней Δ</text>

  <line x1="590" y1="471" x2="625" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 10: Rerank -->
  <rect x="625" y="440" width="160" height="62" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="705">Переупорядочивание</text>
  <text y="478" text-anchor="middle" font-size="9" fill="#334155" x="705">кросс-энкодер · по списку</text>
  <text y="492" text-anchor="middle" font-size="9" fill="#334155" x="705">BGE · Cohere · ZeRank</text>

  <rect x="625" y="512" width="160" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="705">ΔnDCG · ΔMRR · ΔP@1</text>
  <text y="542" text-anchor="middle" font-size="9" fill="#9a3412" x="705">устойчивость к отвлекающим факторам</text>
  <text y="555" text-anchor="middle" font-size="9" fill="#9a3412" x="705">задержка p95</text>

  <line x1="785" y1="471" x2="820" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 11: Assemble -->
  <rect x="820" y="440" width="160" height="62" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="900">Сбор контекста</text>
  <text y="478" text-anchor="middle" font-size="9" fill="#334155" x="900">упорядочивание · сжатие</text>
  <text y="492" text-anchor="middle" font-size="9" fill="#334155" x="900">токены бюджета</text>

  <rect x="820" y="512" width="160" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="900">использование контекста</text>
  <text y="542" text-anchor="middle" font-size="9" fill="#9a3412" x="900">атака типа «потерянное в промежутке»</text>
  <text y="555" text-anchor="middle" font-size="9" fill="#9a3412" x="900">компрессия × корректность</text>

  <line x1="980" y1="471" x2="1015" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 12: Generate -->
  <rect x="1015" y="440" width="130" height="62" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6" x="1080">Генерировать</text>
  <text y="478" text-anchor="middle" font-size="9" fill="#334155" x="1080">Запрос к LLM</text>
  <text y="492" text-anchor="middle" font-size="9" fill="#334155" x="1080">+ ссылки</text>

  <rect x="1015" y="512" width="130" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="1080">точность воспроизведения · HHEM</text>
  <text y="542" text-anchor="middle" font-size="9" fill="#9a3412" x="1080">цитата P/R</text>
  <text y="555" text-anchor="middle" font-size="9" fill="#9a3412" x="1080">Оценка достоверности</text>

  <!-- Lane summary -->
  <rect x="40" y="582" width="1105" height="58" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1" />
  <text y="604" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412" x="592" textLength="1168.58" lengthAdjust="spacingAndGlyphs" transform="translate(-2.00 0.00)">Некорректный фильтр или неправильная переработка данных приводят к снижению показателя воспроизведения до нуля ещё до начала ранжирования. Показатель точности остается в норме — модель корректно отвечает «Я не знаю».</text>
  <text y="624" text-anchor="middle" font-size="10" fill="#9a3412" x="592">Отслеживайте коэффициент исключения треков наряду с Recall@k. В противном случае стандартные метрики IR смогут ввести вас в заблуждение относительно качества системы поиска.</text>

  <!-- ============ POST-GEN LANE ============ -->
  <rect x="20" y="668" width="1140" height="78" rx="10" fill="#f0fdf4" stroke="#166534" stroke-width="1" />
  <text y="692" font-size="13" font-weight="700" fill="#166534" x="40">После генерации · Проверка и телеметрия</text>

  <rect x="40" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="150">проверка утверждений · NLI · самоконсистентность</text>

  <rect x="270" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="380">валидность схемы · анкоринг сущностей · ECE</text>

  <rect x="500" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="610">частота регенерации · количество кликов пальцем · время пребывания · CTR на ссылках</text>

  <rect x="730" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="840">смещение (запрос/вкладка) · стоимость/запрос · p95</text>

  <rect x="960" y="704" width="185" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="1052">оценка тени · очередь HITL</text>
</svg>
