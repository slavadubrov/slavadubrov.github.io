<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" font-family="Inter, system-ui, sans-serif" role="img" aria-label="A production RAG pipeline showing ingestion, query-time, and answer or production checks, with hard filters applied before retrieval ranking" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Полная версия RAG пайплайн с метрическими метками на каждом этапе</title>
  <defs>
    <marker id="arrEval" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b" />
    </marker>
    <filter id="shadowEval" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="1180" height="760" fill="#f8fafc" />

  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a" x="590">RAG Пайплайн с точками оценки</text>
  <text y="54" text-anchor="middle" font-size="12" fill="#64748b" x="590">Каждый этап сопровождается метрикой. Именно метрика позволяет выявить скрытые сбои.</text>

  <!-- ============ OFFLINE LANE ============ -->
  <rect x="20" y="78" width="1140" height="290" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="102" font-size="14" font-weight="700" fill="#1d4ed8" x="40">Путь входа данных · корпус и индекс</text>
  <text y="118" font-size="11" fill="#64748b" x="40">Запускается при изменении версии корпуса данных. Устанавливает максимальный лимит доказательств.</text>

  <!-- Stage 1: Acquire / Parse -->
  <rect x="40" y="140" width="170" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="125">Получение и парсинг</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="125">PDF · HTML · OCR</text>
  <text y="192" text-anchor="middle" font-size="11" fill="#64748b" x="125">Таблицы · Макет</text>

  <!-- Metric badge 1 -->
  <rect x="40" y="212" width="170" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="125">CER · WER · TEDS</text>
  <text y="242" text-anchor="middle" font-size="11" fill="#9a3412" x="125">коэффициент успешной обработки</text>
  <text y="255" text-anchor="middle" font-size="11" fill="#9a3412" x="125">точность воспроизведения макета</text>

  <!-- Arrow -->
  <line x1="210" y1="171" x2="245" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 2: Normalize / Dedup -->
  <rect x="245" y="140" width="170" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="330">Нормализация и удаление дубликатов</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="330">NFC/NFKC · MinHash</text>
  <text y="192" text-anchor="middle" font-size="11" fill="#64748b" x="330">Персональные данные · шаблон кода</text>

  <rect x="245" y="212" width="170" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="330">показатели восстановления дубликатов и точности</text>
  <text y="242" text-anchor="middle" font-size="11" fill="#9a3412" x="330">Восстановление PII (по типу)</text>
  <text y="255" text-anchor="middle" font-size="11" fill="#9a3412" x="330">lang-detect F1</text>

  <line x1="415" y1="171" x2="450" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 3: Chunk -->
  <rect x="450" y="140" width="170" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="535">Чанк</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="535">рекурсивный · семантический</text>
  <text y="192" text-anchor="middle" font-size="11" fill="#64748b" x="535">структурный · поздний</text>

  <rect x="450" y="212" width="170" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="535">механизм сдерживания answer-спан</text>
  <text y="242" text-anchor="middle" font-size="11" fill="#9a3412" x="535">частота нарушения границы</text>
  <text y="255" text-anchor="middle" font-size="11" fill="#9a3412" x="535">Recall@k против размера</text>

  <line x1="620" y1="171" x2="655" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 4: Enrich (NER/EL) -->
  <rect x="655" y="140" width="170" height="62" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6" x="740">Обогащение данных</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="740">NER · связь сущностей</text>
  <text y="192" text-anchor="middle" font-size="11" fill="#64748b" x="740">теги · иерархия</text>

  <rect x="655" y="212" width="170" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="740">Точность EL F1 · NIL</text>
  <text y="242" text-anchor="middle" font-size="11" fill="#9a3412" x="740">иерархический F1</text>
  <text y="255" text-anchor="middle" font-size="11" fill="#9a3412" x="740">покрытие алиасов</text>

  <line x1="825" y1="171" x2="860" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 5: Embed -->
  <rect x="860" y="140" width="135" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="927">встраивание</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="927">плотное / редкое</text>
  <text y="192" text-anchor="middle" font-size="11" fill="#64748b" x="927">многовекторный</text>

  <rect x="860" y="212" width="135" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="927">домен nDCG@10</text>
  <text y="242" text-anchor="middle" font-size="11" fill="#9a3412" x="927">смещение (KL · NN-stab.)</text>
  <text y="255" text-anchor="middle" font-size="11" fill="#9a3412" x="927">против BEIR/MTEB</text>

  <line x1="995" y1="171" x2="1030" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 6: Index -->
  <rect x="1030" y="140" width="115" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="1087">Индекс</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="1087">HNSW / IVF</text>
  <text y="192" text-anchor="middle" font-size="11" fill="#64748b" x="1087">BM25 · гибридная версия</text>

  <rect x="1030" y="212" width="115" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="1087">ANN показатель воспроизведения против фиксированного значения</text>
  <text y="242" text-anchor="middle" font-size="11" fill="#9a3412" x="1087">задержка свежести p99</text>
  <text y="255" text-anchor="middle" font-size="11" fill="#9a3412" x="1087">широта фильтрованного поиска</text>

  <!-- Lane summary -->
  <rect x="40" y="290" width="1105" height="58" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1" />
  <text y="312" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8" x="592">Готовность к приему данных определяет верхнюю границу. Если модель чанк теряет ответ спан на этапе обработки, никакая другая модель реранкер не сможет восстановить его дальше в цепочке обработки.</text>
  <text y="332" text-anchor="middle" font-size="11" fill="#1d4ed8" x="592">Анализ инструментальных данных, нормализация, чанкинг, обогащение информацией, эмбеддинг, и создание индексов для возможности отслеживания причин ошибок на последующих этапах.</text>

  <!-- ============ ONLINE LANE ============ -->
  <rect x="20" y="378" width="1140" height="280" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="402" font-size="14" font-weight="700" fill="#9a3412" x="40">Трасса во время выполнения запроса · выполнение за один запрос</text>
  <text y="418" font-size="11" fill="#64748b" x="40">Путь запроса обрабатывает каждый запрос; дорогостоящие метрики качества могут вычисляться для выбранных примеров трейсы асинхронно.</text>

  <!-- Stage 7: Query Rewrite -->
  <rect x="40" y="440" width="160" height="62" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="120">Переписать маршрут / Перенаправить маршрут</text>
  <text y="478" text-anchor="middle" font-size="11" fill="#64748b" x="120">HyDE · многократные запросы</text>
  <text y="492" text-anchor="middle" font-size="11" fill="#64748b" x="120">интент · адаптивный</text>

  <rect x="40" y="512" width="160" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="120">Улучшение Recall@k</text>
  <text y="542" text-anchor="middle" font-size="11" fill="#9a3412" x="120">точность роутинг</text>
  <text y="555" text-anchor="middle" font-size="11" fill="#9a3412" x="120">частота операций без действий</text>

  <line x1="200" y1="471" x2="235" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 8: Apply hard filters before ranking -->
  <rect x="235" y="440" width="160" height="62" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b" x="315">Применить жёсткие фильтры</text>
  <text y="478" text-anchor="middle" font-size="11" fill="#64748b" x="315">арендатор · ACL · метка</text>
  <text y="492" text-anchor="middle" font-size="11" fill="#64748b" x="315">жесткий против мягкого</text>

  <rect x="235" y="512" width="160" height="48" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.2" />
  <text y="528" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b" x="315">коэффициент ложного исключения фильтра</text>
  <text y="542" text-anchor="middle" font-size="11" fill="#991b1b" x="315">точность/покрытие предиката</text>
  <text y="555" text-anchor="middle" font-size="11" fill="#991b1b" x="315">тень-retrieval Δ</text>

  <line x1="395" y1="471" x2="430" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 9: Retrieve from the eligible candidate set -->
  <rect x="430" y="440" width="160" height="62" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="510">загрузка</text>
  <text y="478" text-anchor="middle" font-size="11" fill="#64748b" x="510">плотная + редкая + RRF</text>
  <text y="492" text-anchor="middle" font-size="11" fill="#64748b" x="510">множество подходящих кандидатов</text>

  <rect x="430" y="512" width="160" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="510">Recall@k · MRR · nDCG</text>
  <text y="542" text-anchor="middle" font-size="11" fill="#9a3412" x="510">точность/покрытие контекста</text>
  <text y="555" text-anchor="middle" font-size="11" fill="#9a3412" x="510">гибридный подъемник</text>

  <line x1="590" y1="471" x2="625" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 10: Rerank -->
  <rect x="625" y="440" width="160" height="62" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="705">переупорядочивание рангов</text>
  <text y="478" text-anchor="middle" font-size="11" fill="#64748b" x="705">кросс-энкодер · по списку</text>
  <text y="492" text-anchor="middle" font-size="11" fill="#64748b" x="705">BGE · Cohere · ZeRank</text>

  <rect x="625" y="512" width="160" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="705">ΔnDCG · ΔMRR · ΔP@1</text>
  <text y="542" text-anchor="middle" font-size="11" fill="#9a3412" x="705">устойчивость к отвлекающим факторам</text>
  <text y="555" text-anchor="middle" font-size="11" fill="#9a3412" x="705">латентность доля значений выше 95-го процентиля</text>

  <line x1="785" y1="471" x2="820" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 11: Assemble -->
  <rect x="820" y="440" width="160" height="62" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="900">Сбор контекста</text>
  <text y="478" text-anchor="middle" font-size="11" fill="#64748b" x="900">упорядочивание · сжатие</text>
  <text y="492" text-anchor="middle" font-size="11" fill="#64748b" x="900">бюджет токены</text>

  <rect x="820" y="512" width="160" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="900">использование контекста</text>
  <text y="542" text-anchor="middle" font-size="11" fill="#9a3412" x="900">атака типа «потерянное в середине»</text>
  <text y="555" text-anchor="middle" font-size="11" fill="#9a3412" x="900">компрессия × корректность</text>

  <line x1="980" y1="471" x2="1015" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 12: Generate -->
  <rect x="1015" y="440" width="130" height="62" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6" x="1080">генерировать</text>
  <text y="478" text-anchor="middle" font-size="11" fill="#64748b" x="1080">LLM вызов</text>
  <text y="492" text-anchor="middle" font-size="11" fill="#64748b" x="1080">+ ссылки</text>

  <rect x="1015" y="512" width="130" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="1080">точность воспроизведения · HHEM</text>
  <text y="542" text-anchor="middle" font-size="11" fill="#9a3412" x="1080">цитата P/R</text>
  <text y="555" text-anchor="middle" font-size="11" fill="#9a3412" x="1080">Score достоверности фактов</text>

  <!-- Lane summary -->
  <rect x="40" y="582" width="1105" height="58" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1" />
  <text y="604" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412" x="592">Неверная переработка или жесткий фильтр могут удалять документ с высоким приоритетом ещё до проведения ранжирования. Однако механизм верности всё равно может одобрить отклонение на основе конкретных критериев.</text>
  <text y="624" text-anchor="middle" font-size="11" fill="#9a3412" x="592">Recall@k выявляет случаи невозврата информации; показатель частоты ложного исключения при фильтрации приписывается самому предикату, а не механизму поиска.</text>

  <!-- ============ POST-GEN LANE ============ -->
  <rect x="20" y="668" width="1140" height="78" rx="10" fill="#f0fdf4" stroke="#166534" stroke-width="1" />
  <text y="692" font-size="14" font-weight="700" fill="#166534" x="40">Проверка ответов и производительности · верификация и телеметрия</text>

  <rect x="40" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="11" font-weight="600" fill="#166534" x="150">проверка утверждений · NLI</text>

  <rect x="270" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="11" font-weight="600" fill="#166534" x="380">валидность схемы · граундинг</text>

  <rect x="500" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="11" font-weight="600" fill="#166534" x="610">регенерация · пальцы · задержка</text>

  <rect x="730" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="11" font-weight="600" fill="#166534" x="840">смещение · стоимость/запрос · p95</text>

  <rect x="960" y="704" width="185" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="11" font-weight="600" fill="#166534" x="1052">тень эвал · HITL</text>
</svg>
