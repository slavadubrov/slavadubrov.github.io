<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 640" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Полная архитектура памяти агента</title>
  <desc id="artifact-desc">Полная архитектура памяти агента.</desc>
  <defs>
    <marker id="arwG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8" />
    </marker>
    <marker id="arwB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb" />
    </marker>
    <marker id="arwO" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ea580c" />
    </marker>
    <marker id="arwGn" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#166534" />
    </marker>
    <filter id="sh" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a" x="490">Полная архитектура памяти агента</text>
  <text y="48" text-anchor="middle" font-size="12" fill="#334155" x="490">Трехуровневая память: горячая (чекпоинты) + холодная (векторы/KV-записи) + документы (файлы)</text>

  <!-- ======= USER (top center) ======= -->
  <rect x="420" y="62" width="140" height="34" rx="17" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#sh)" />
  <text y="84" text-anchor="middle" font-size="12" font-weight="600" fill="#166534" x="490">Пользователь</text>

  <!-- User <-> Agent arrows -->
  <line x1="478" y1="96" x2="478" y2="118" stroke="#166534" stroke-width="2" marker-end="url(#arwGn)" />
  <text y="112" font-size="9" font-weight="600" fill="#166534" x="464">запрос</text>
  <line x1="502" y1="118" x2="502" y2="96" stroke="#166534" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arwGn)" />
  <text y="112" font-size="9" font-weight="600" fill="#166534" x="514">ответ</text>

  <!-- ======= AGENT CORE ======= -->
  <rect x="340" y="120" width="300" height="96" rx="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#sh)" />
  <text y="148" text-anchor="middle" font-size="16" font-weight="700" fill="#5b21b6" x="490">Агент LLM</text>
  <text y="166" text-anchor="middle" font-size="11" fill="#64748b" x="490">Логическое мышление + Планирование + Использование инструментов</text>
  <text y="182" text-anchor="middle" font-size="10" fill="#64748b" x="490">Цикл «Мышление → Действие → Наблюдение»</text>

  <!-- Working Memory badge inside agent -->
  <rect x="360" y="190" width="260" height="22" rx="6" fill="#7c3aed" opacity="0.15" />
  <text y="206" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6" x="490">Рабочая память: окно контекста (128 К токенов)</text>

  <!-- ======= HOT MEMORY (left) ======= -->
  <rect x="20" y="270" width="280" height="290" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="5" />
  <text y="295" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8" x="160">Активная память (краткосрочная)</text>
  <text y="310" text-anchor="middle" font-size="10" fill="#64748b" x="160">Быстрый доступ в рамках сессии</text>

  <!-- PostgreSQL -->
  <rect x="40" y="325" width="240" height="65" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#sh)" />
  <text y="348" text-anchor="middle" font-size="13" font-weight="600" fill="#1d4ed8" x="160">PostgreSQL</text>
  <text y="364" text-anchor="middle" font-size="10" fill="#334155" x="160">Точки контроля, состояние потока</text>
  <text y="380" text-anchor="middle" font-size="9" fill="#64748b" x="160">ACID | JSONB | надежность WAL</text>

  <!-- Redis -->
  <rect x="40" y="400" width="240" height="65" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#sh)" />
  <text y="423" text-anchor="middle" font-size="13" font-weight="600" fill="#991b1b" x="160">Redis</text>
  <text y="439" text-anchor="middle" font-size="10" fill="#334155" x="160">Кэш сессий, ограничения скорости</text>
  <text y="455" text-anchor="middle" font-size="9" fill="#64748b" x="160">Задержка в долях миллисекунды | на основе TTL</text>

  <!-- LangGraph label -->
  <rect x="50" y="478" width="220" height="28" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="1" filter="url(#sh)" />
  <text y="496" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8" x="160">LangGraph PostgresSaver</text>

  <!-- Hot latency badge -->
  <rect x="50" y="518" width="220" height="24" rx="12" fill="#f0fdf4" stroke="#166534" stroke-width="1" />
  <text y="535" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="160">Задержка: 1–5 мс | Время хранения: часы–дни</text>

  <!-- ======= COLD MEMORY (center) ======= -->
  <rect x="350" y="270" width="280" height="290" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="5" />
  <text y="295" text-anchor="middle" font-size="14" font-weight="700" fill="#9a3412" x="490">Холодная память (долгосрочная)</text>
  <text y="310" text-anchor="middle" font-size="10" fill="#64748b" x="490">Межсессионный поиск</text>

  <!-- Vector DB -->
  <rect x="370" y="325" width="240" height="65" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#sh)" />
  <text y="348" text-anchor="middle" font-size="13" font-weight="600" fill="#9a3412" x="490">Векторная БД (Qdrant)</text>
  <text y="364" text-anchor="middle" font-size="10" fill="#334155" x="490">Семантический поиск среди фактов</text>
  <text y="380" text-anchor="middle" font-size="9" fill="#64748b" x="490">Индекс HNSW | Косинусное сходство</text>

  <!-- Embedding Model -->
  <rect x="370" y="400" width="240" height="65" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#sh)" />
  <text y="423" text-anchor="middle" font-size="13" font-weight="600" fill="#5b21b6" x="490">Модель вживления</text>
  <text y="439" text-anchor="middle" font-size="10" fill="#334155" x="490">text-embedding-3-mалый</text>
  <text y="455" text-anchor="middle" font-size="9" fill="#64748b" x="490">Блок → вектор размером 1536</text>

  <!-- Knowledge sources -->
  <rect x="380" y="478" width="220" height="28" rx="6" fill="#ffffff" stroke="#ea580c" stroke-width="1" filter="url(#sh)" />
  <text y="496" text-anchor="middle" font-size="10" font-weight="600" fill="#9a3412" x="490">Факты о пользователе, предпочтения, полученные знания</text>

  <!-- Cold latency badge -->
  <rect x="380" y="518" width="220" height="24" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="1" />
  <text y="535" text-anchor="middle" font-size="10" font-weight="600" fill="#9a3412" x="490">Задержка: 50–200 мс | Время хранения: месяцы</text>

  <!-- ======= DOCUMENT MEMORY (right) ======= -->
  <rect x="680" y="270" width="280" height="290" rx="12" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" stroke-dasharray="5" />
  <text y="295" text-anchor="middle" font-size="14" font-weight="700" fill="#166534" x="820">Память документа</text>
  <text y="310" text-anchor="middle" font-size="10" fill="#64748b" x="820">Знания на основе файлов</text>

  <!-- Filesystem -->
  <rect x="700" y="325" width="240" height="65" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#sh)" />
  <text y="348" text-anchor="middle" font-size="13" font-weight="600" fill="#166534" x="820">Файловая система</text>
  <text y="364" text-anchor="middle" font-size="10" fill="#334155" x="820">файлы Markdown/JSON</text>
  <text y="380" text-anchor="middle" font-size="9" fill="#64748b" x="820">Прямое чтение/запись | Нативно для Git</text>

  <!-- Folder Structure -->
  <rect x="700" y="400" width="240" height="65" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" filter="url(#sh)" />
  <text y="423" text-anchor="middle" font-size="13" font-weight="600" fill="#166534" x="820">Структура папок</text>
  <text y="439" text-anchor="middle" font-size="10" fill="#334155" x="820">каталог .agent-memory/</text>
  <text y="455" text-anchor="middle" font-size="9" fill="#64748b" x="820">Конвенции, исследования, примечания</text>

  <!-- Document types -->
  <rect x="710" y="478" width="220" height="28" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1" filter="url(#sh)" />
  <text y="496" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="820">Знания проекта, доступные для редактирования человеком</text>

  <!-- Document latency badge -->
  <rect x="710" y="518" width="220" height="24" rx="12" fill="#f0fdf4" stroke="#166534" stroke-width="1" />
  <text y="535" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="820" transform="translate(-22.26 0.00)">Задержка: 1–5 мс | Хранение: от нескольких дней до бесконечности</text>

  <!-- ======= ARROWS: Agent <-> Hot Memory ======= -->
  <!-- checkpoint: Agent left-bottom -> Hot Memory top -->
  <path d="M370,212 Q280,244 200,270" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arwB)" />
  <text y="234" font-size="9" font-weight="600" fill="#1d4ed8" x="268">точка контроля</text>

  <!-- restore: Hot Memory top -> Agent left side -->
  <path d="M120,270 Q200,244 340,170" stroke="#2563eb" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#arwB)" />
  <text y="250" font-size="9" font-weight="600" fill="#1d4ed8" x="190">восстановление</text>

  <!-- ======= ARROWS: Agent <-> Cold Memory ======= -->
  <!-- query: Agent bottom -> Cold Memory top -->
  <line x1="470" y1="216" x2="470" y2="270" stroke="#ea580c" stroke-width="2" marker-end="url(#arwO)" />
  <text y="248" font-size="9" font-weight="600" fill="#9a3412" text-anchor="end" x="456">запрос</text>

  <!-- context: Cold Memory top -> Agent bottom -->
  <line x1="510" y1="270" x2="510" y2="216" stroke="#ea580c" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arwO)" />
  <text y="248" font-size="9" font-weight="600" fill="#9a3412" x="524">контекст</text>

  <!-- ======= ARROWS: Agent <-> Document Memory ======= -->
  <!-- read docs: Agent right-bottom -> Document Memory top -->
  <path d="M610,212 Q700,244 780,270" stroke="#166534" stroke-width="2" fill="none" marker-end="url(#arwGn)" />
  <text y="234" font-size="9" font-weight="600" fill="#166534" x="718">прочитать документацию</text>

  <!-- write notes: Document Memory top -> Agent right side -->
  <path d="M860,270 Q780,244 640,170" stroke="#166534" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#arwGn)" />
  <text y="250" font-size="9" font-weight="600" fill="#166534" x="790">записать примечания</text>

  <!-- ======= ARROW: Hot -> Cold (promote facts) ======= -->
  <line x1="300" y1="430" x2="350" y2="430" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arwG)" />
  <text y="422" text-anchor="middle" font-size="9" fill="#64748b" x="325">продвижение фактов</text>

  <!-- ======= ARROW: User -> Document Memory (edit files) ======= -->
  <path d="M560,79 L950,79 L950,270" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" fill="none" marker-end="url(#arwG)" />
  <text y="72" font-size="9" fill="#64748b" x="750">прямая работа с файлами</text>

  <!-- ======= Legend ======= -->
  <rect x="20" y="578" width="940" height="40" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" />
  <line x1="35" y1="593" x2="65" y2="593" stroke="#94a3b8" stroke-width="1.5" />
  <text y="597" font-size="9" fill="#334155" x="72">Написать / запросить</text>
  <line x1="155" y1="593" x2="185" y2="593" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" />
  <text y="597" font-size="9" fill="#334155" x="192">Чтение/ответ</text>

  <text y="597" font-size="9" fill="#64748b" x="300">Цвета:</text>
  <rect x="340" y="586" width="50" height="14" rx="3" fill="#eff6ff" stroke="#2563eb" stroke-width="1" />
  <text y="597" font-size="9" fill="#334155" x="397">Горячий</text>
  <rect x="420" y="586" width="50" height="14" rx="3" fill="#fff7ed" stroke="#ea580c" stroke-width="1" />
  <text y="597" font-size="9" fill="#334155" x="477">Холодный</text>
  <rect x="500" y="586" width="55" height="14" rx="3" fill="#f0fdf4" stroke="#166534" stroke-width="1" />
  <text y="597" font-size="9" fill="#334155" x="562">Документ</text>
  <rect x="600" y="586" width="55" height="14" rx="3" fill="#faf5ff" stroke="#7c3aed" stroke-width="1" />
  <text y="597" font-size="9" fill="#334155" x="662">Агент/LLM</text>

  <text y="610" font-size="9" fill="#64748b" x="35">Ключевой принцип: три взаимодополняющих уровня памяти — чекпоинты для надежности, векторы для семантического восстановления данных и файлы для прозрачности</text>
</svg>
