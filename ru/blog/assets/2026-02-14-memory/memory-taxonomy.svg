<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 550" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Таксономия памяти агента</title>
  <desc id="artifact-desc">Таксономия памяти агента.</desc>
  <defs>
    <filter id="shadowT" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a" x="550">Таксономия памяти агента</text>

  <!-- Root Node -->
  <rect x="465" y="55" width="170" height="40" rx="20" fill="#7c3aed" filter="url(#shadowT)" />
  <text y="81" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff" x="550">Память агента</text>

  <!-- Lines from root to three main branches -->
  <line x1="490" y1="95" x2="180" y2="145" stroke="#94a3b8" stroke-width="1.5" />
  <line x1="550" y1="95" x2="550" y2="145" stroke="#94a3b8" stroke-width="1.5" />
  <line x1="610" y1="95" x2="920" y2="145" stroke="#94a3b8" stroke-width="1.5" />

  <!-- Hot Memory Branch (Left: x=30-330, width=300) -->
  <rect x="30" y="145" width="300" height="50" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadowT)" />
  <text y="165" text-anchor="middle" font-size="13" font-weight="600" fill="#1d4ed8" x="180">Активная память</text>
  <text y="184" text-anchor="middle" font-size="10" fill="#64748b" x="180">(область применения сессии)</text>

  <!-- Cold Memory Branch (Center: x=400-700, width=300) -->
  <rect x="400" y="145" width="300" height="50" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadowT)" />
  <text y="165" text-anchor="middle" font-size="13" font-weight="600" fill="#9a3412" x="550">Холодная память</text>
  <text y="184" text-anchor="middle" font-size="10" fill="#64748b" x="550">(Межсессионный)</text>

  <!-- Document Memory Branch (Right: x=770-1070, width=300) -->
  <rect x="770" y="145" width="300" height="50" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="2" filter="url(#shadowT)" />
  <text y="165" text-anchor="middle" font-size="13" font-weight="600" fill="#166534" x="920">Память документа</text>
  <text y="184" text-anchor="middle" font-size="10" fill="#64748b" x="920">Знания проекта</text>

  <!-- Hot Memory Children: Working + Short-term -->
  <line x1="105" y1="195" x2="105" y2="230" stroke="#94a3b8" stroke-width="1" />
  <line x1="255" y1="195" x2="255" y2="230" stroke="#94a3b8" stroke-width="1" />

  <!-- Working Memory (Purple - LLM/fastest tier) -->
  <rect x="40" y="230" width="130" height="65" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowT)" />
  <text y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6" x="105">Рабочая память</text>
  <text y="265" text-anchor="middle" font-size="9" fill="#64748b" x="105">Текущий шаг</text>
  <text y="278" text-anchor="middle" font-size="9" fill="#64748b" x="105">Аргументы инструмента, LLM</text>
  <text y="291" text-anchor="middle" font-size="9" fill="#64748b" x="105">буфер ответа</text>

  <!-- Short-term (Checkpoints) -->
  <rect x="190" y="230" width="130" height="65" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowT)" />
  <text y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8" x="255">Краткосрочный</text>
  <text y="265" text-anchor="middle" font-size="9" fill="#64748b" x="255">Точки контроля</text>
  <text y="278" text-anchor="middle" font-size="9" fill="#64748b" x="255">Состояние потока</text>
  <text y="291" text-anchor="middle" font-size="9" fill="#64748b" x="255">Минуты-часы</text>

  <!-- Cold Memory Children: Episodic + Semantic -->
  <line x1="475" y1="195" x2="475" y2="230" stroke="#94a3b8" stroke-width="1" />
  <line x1="625" y1="195" x2="625" y2="230" stroke="#94a3b8" stroke-width="1" />

  <!-- Episodic -->
  <rect x="410" y="230" width="130" height="65" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowT)" />
  <text y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412" x="475">Эпизодический</text>
  <text y="265" text-anchor="middle" font-size="9" fill="#64748b" x="475">Прошлые взаимодействия</text>
  <text y="278" text-anchor="middle" font-size="9" fill="#64748b" x="475">Логи разговоров</text>
  <text y="291" text-anchor="middle" font-size="9" fill="#64748b" x="475">Дни-месяцы</text>

  <!-- Semantic -->
  <rect x="560" y="230" width="130" height="65" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowT)" />
  <text y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412" x="625">семантический</text>
  <text y="265" text-anchor="middle" font-size="9" fill="#64748b" x="625">Факты, знания</text>
  <text y="278" text-anchor="middle" font-size="9" fill="#64748b" x="625">Предпочтения пользователя</text>
  <text y="291" text-anchor="middle" font-size="9" fill="#64748b" x="625">Количество месяцев постоянства</text>

  <!-- Document Memory Children: Conventions + Research + Learnings -->
  <line x1="820" y1="195" x2="820" y2="230" stroke="#94a3b8" stroke-width="1" />
  <line x1="920" y1="195" x2="920" y2="230" stroke="#94a3b8" stroke-width="1" />
  <line x1="1020" y1="195" x2="1020" y2="230" stroke="#94a3b8" stroke-width="1" />

  <!-- Conventions -->
  <rect x="775" y="230" width="90" height="65" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowT)" />
  <text y="247" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="820">Конвенции</text>
  <text y="262" text-anchor="middle" font-size="9" fill="#64748b" x="820">Правила проекта</text>
  <text y="274" text-anchor="middle" font-size="9" fill="#64748b" x="820">Стиль кодирования</text>
  <text y="286" text-anchor="middle" font-size="9" fill="#64748b" x="820">Форматы</text>

  <!-- Research Notes -->
  <rect x="875" y="230" width="90" height="65" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowT)" />
  <text y="247" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="920">Исследования</text>
  <text y="262" text-anchor="middle" font-size="9" fill="#64748b" x="920">Заметки по анализу</text>
  <text y="274" text-anchor="middle" font-size="9" fill="#64748b" x="920">Краткое описание</text>
  <text y="286" text-anchor="middle" font-size="9" fill="#64748b" x="920">Результаты анализа</text>

  <!-- Learnings -->
  <rect x="975" y="230" width="90" height="65" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowT)" />
  <text y="247" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="1020">Выводы</text>
  <text y="262" text-anchor="middle" font-size="9" fill="#64748b" x="1020">Шаблоны</text>
  <text y="274" text-anchor="middle" font-size="9" fill="#64748b" x="1020" transform="translate(-3.68 0.00)">Ошибки, которых следует избегать</text>
  <text y="286" text-anchor="middle" font-size="9" fill="#64748b" x="1020">Решения</text>

  <!-- Procedural Memory (System-wide, separate footer bar) -->
  <rect x="30" y="325" width="1040" height="50" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadowT)" />
  <text y="345" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6" x="550">Процедурная память (все системы)</text>
  <text y="363" text-anchor="middle" font-size="10" fill="#64748b" x="550">Системные подсказки, определения инструментов, файлы конфигурации — постоянные, не специфичные для пользователя</text>

  <!-- Summary bars for each column -->
  <rect x="30" y="395" width="300" height="40" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1" />
  <text y="413" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8" x="180">Быстро | Внутри процесса/База данных</text>
  <text y="428" text-anchor="middle" font-size="9" fill="#64748b" x="180">Миллисекунды-часы | Время жизни сессии</text>

  <rect x="400" y="395" width="300" height="40" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1" />
  <text y="413" text-anchor="middle" font-size="10" font-weight="600" fill="#9a3412" x="550">Поддержка поиска | Хранилище векторных данных/KV</text>
  <text y="428" text-anchor="middle" font-size="9" fill="#64748b" x="550">Количество дней сохранения | Воспроизведение между сессиями</text>

  <rect x="770" y="395" width="300" height="40" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1" />
  <text y="413" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="920">Читаемый человеком формат | Файловая система</text>
  <text y="428" text-anchor="middle" font-size="9" fill="#64748b" x="920">Days-forever | Работает нативно с Git, поддерживает редактирование</text>

  <!-- Access speed comparison -->
  <text y="468" font-size="10" fill="#64748b" x="30">Скорость доступа:</text>
  <rect x="130" y="455" width="940" height="20" rx="10" fill="none" stroke="#cbd5e1" stroke-width="1" />
  <rect x="131" y="456" width="235" height="18" rx="9" fill="#faf5ff" opacity="0.8" />
  <text y="470" text-anchor="middle" font-size="9" font-weight="600" fill="#5b21b6" x="248">Мгновенный (в памяти)</text>
  <rect x="366" y="456" width="235" height="18" rx="9" fill="#eff6ff" opacity="0.8" />
  <text y="470" text-anchor="middle" font-size="9" font-weight="600" fill="#1d4ed8" x="483">Быстрая скорость ввода-вывода из БД/файлов (мс)</text>
  <rect x="601" y="456" width="235" height="18" rx="9" fill="#fff7ed" opacity="0.8" />
  <text y="470" text-anchor="middle" font-size="9" font-weight="600" fill="#9a3412" x="718">Медленнее (встраивание + поиск)</text>
  <rect x="836" y="456" width="233" height="18" rx="9" fill="#f0fdf4" opacity="0.8" />
  <text y="470" text-anchor="middle" font-size="9" font-weight="600" fill="#166534" x="952">Быстрое чтение файла</text>

  <!-- Storage type comparison -->
  <text y="508" font-size="10" fill="#64748b" x="30">Тип хранилища:</text>
  <rect x="130" y="495" width="940" height="20" rx="10" fill="none" stroke="#cbd5e1" stroke-width="1" />
  <rect x="131" y="496" width="235" height="18" rx="9" fill="#faf5ff" opacity="0.8" />
  <text y="510" text-anchor="middle" font-size="9" font-weight="600" fill="#5b21b6" x="248">словарь Python</text>
  <rect x="366" y="496" width="235" height="18" rx="9" fill="#eff6ff" opacity="0.8" />
  <text y="510" text-anchor="middle" font-size="9" font-weight="600" fill="#1d4ed8" x="483">Redis/PostgreSQL</text>
  <rect x="601" y="496" width="235" height="18" rx="9" fill="#fff7ed" opacity="0.8" />
  <text y="510" text-anchor="middle" font-size="9" font-weight="600" fill="#9a3412" x="718">Qdrant/pgvector</text>
  <rect x="836" y="496" width="233" height="18" rx="9" fill="#f0fdf4" opacity="0.8" />
  <text y="510" text-anchor="middle" font-size="9" font-weight="600" fill="#166534" x="952">файлы Markdown/JSON</text>
</svg>
