<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Фоновые сервисы памяти в реальном времени: Redis против PostgreSQL</title>
  <desc id="artifact-desc">Фоновые сервисы памяти в реальном времени: Redis против PostgreSQL.</desc>
  <defs>
    <filter id="shadowR" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a" x="400">Фоновые сервисы памяти в реальном времени: Redis против PostgreSQL</text>

  <!-- Redis Column -->
  <rect x="30" y="50" width="355" height="410" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" />
  <rect x="30" y="50" width="355" height="42" rx="10" fill="#dc2626" />
  <rect x="30" y="72" width="355" height="20" fill="#dc2626" />
  <text y="78" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" x="208">Redis</text>

  <!-- Redis characteristics -->
  <rect x="50" y="108" width="315" height="44" rx="6" fill="#ffffff" stroke="#dc2626" stroke-width="1" filter="url(#shadowR)" />
  <text y="128" font-size="12" font-weight="600" fill="#991b1b" x="65">Архитектура</text>
  <text y="143" font-size="11" fill="#334155" x="65">Хранилище ключ-значение в памяти</text>

  <rect x="50" y="164" width="315" height="44" rx="6" fill="#ffffff" stroke="#dc2626" stroke-width="1" filter="url(#shadowR)" />
  <text y="184" font-size="12" font-weight="600" fill="#991b1b" x="65">Задержка</text>
  <text y="199" font-size="11" fill="#334155" x="65">Чтение/запись с задержкой в доли миллисекунды</text>
  <rect x="290" y="172" width="60" height="20" rx="10" fill="#f0fdf4" stroke="#166534" stroke-width="1" />
  <text y="187" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="320">Быстро</text>

  <rect x="50" y="220" width="315" height="44" rx="6" fill="#ffffff" stroke="#dc2626" stroke-width="1" filter="url(#shadowR)" />
  <text y="240" font-size="12" font-weight="600" fill="#991b1b" x="65">Надежность</text>
  <text y="255" font-size="11" fill="#334155" x="65">По умолчанию нестабильный (AOF/RDB — по желанию)</text>
  <rect x="270" y="228" width="80" height="20" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="1" />
  <text y="243" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b" x="310">Рискованно</text>

  <rect x="50" y="276" width="315" height="44" rx="6" fill="#ffffff" stroke="#dc2626" stroke-width="1" filter="url(#shadowR)" />
  <text y="296" font-size="12" font-weight="600" fill="#991b1b" x="65">Идеально подходит для</text>
  <text y="311" font-size="11" fill="#334155" x="65">Кэш сессий, ограничения скорости, временное состояние</text>

  <rect x="50" y="332" width="315" height="44" rx="6" fill="#ffffff" stroke="#dc2626" stroke-width="1" filter="url(#shadowR)" />
  <text y="352" font-size="12" font-weight="600" fill="#991b1b" x="65">Модель запросов</text>
  <text y="367" font-size="11" fill="#334155" x="65">Только поиск по ключу, без сложных запросов</text>

  <rect x="50" y="388" width="315" height="44" rx="6" fill="#ffffff" stroke="#dc2626" stroke-width="1" filter="url(#shadowR)" />
  <text y="408" font-size="12" font-weight="600" fill="#991b1b" x="65">Масштабирование</text>
  <text y="423" font-size="11" fill="#334155" x="65">Режим кластеризации с ограничением по памяти</text>

  <!-- PostgreSQL Column -->
  <rect x="415" y="50" width="355" height="410" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" />
  <rect x="415" y="50" width="355" height="42" rx="10" fill="#2563eb" />
  <rect x="415" y="72" width="355" height="20" fill="#2563eb" />
  <text y="78" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" x="593">PostgreSQL</text>

  <!-- PostgreSQL characteristics -->
  <rect x="435" y="108" width="315" height="44" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="1" filter="url(#shadowR)" />
  <text y="128" font-size="12" font-weight="600" fill="#1d4ed8" x="450">Архитектура</text>
  <text y="143" font-size="11" fill="#334155" x="450">Реляционная БД с поддержкой JSONB</text>

  <rect x="435" y="164" width="315" height="44" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="1" filter="url(#shadowR)" />
  <text y="184" font-size="12" font-weight="600" fill="#1d4ed8" x="450">Задержка</text>
  <text y="199" font-size="11" fill="#334155" x="450" transform="translate(-23.08 0.00)">Низкое время в миллисекундах, составляющее однозначное число</text>
  <rect x="675" y="172" width="60" height="20" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="1" />
  <text y="187" text-anchor="middle" font-size="10" font-weight="600" fill="#9a3412" x="705">Хорошо</text>

  <rect x="435" y="220" width="315" height="44" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="1" filter="url(#shadowR)" />
  <text y="240" font-size="12" font-weight="600" fill="#1d4ed8" x="450">Прочность</text>
  <text y="255" font-size="11" fill="#334155" x="450" transform="translate(-21.54 0.00)">Соответствует стандарту ACID, использует WAL, защищен от сбоев</text>
  <rect x="660" y="228" width="75" height="20" rx="10" fill="#f0fdf4" stroke="#166534" stroke-width="1" />
  <text y="243" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="698">сильный</text>

  <rect x="435" y="276" width="315" height="44" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="1" filter="url(#shadowR)" />
  <text y="296" font-size="12" font-weight="600" fill="#1d4ed8" x="450">Наилучшее применение</text>
  <text y="311" font-size="11" fill="#334155" x="450" transform="translate(-8.01 0.00)">Точки контроля, журналы аудита, структурированное состояние</text>

  <rect x="435" y="332" width="315" height="44" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="1" filter="url(#shadowR)" />
  <text y="352" font-size="12" font-weight="600" fill="#1d4ed8" x="450">Модель запросов</text>
  <text y="367" font-size="11" fill="#334155" x="450">Полные пути к данным в SQL и JSONB, индексация</text>

  <rect x="435" y="388" width="315" height="44" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="1" filter="url(#shadowR)" />
  <text y="408" font-size="12" font-weight="600" fill="#1d4ed8" x="450">Масштабирование</text>
  <text y="423" font-size="11" fill="#334155" x="450">Реплики с чтением на диске, pgvector</text>

  <!-- VS divider -->
  <circle cx="400" cy="76" r="18" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" />
  <text y="81" text-anchor="middle" font-size="12" font-weight="700" fill="#334155" x="400">против</text>
</svg>
