<svg xmlns="http://www.w3.org/2000/svg" width="640" height="1010" viewBox="0 0 640 1010" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Изменение скидки через агента харнесс</title>
  <desc id="desc">Вертикальный поток из семи этапов для имитации задачи в вымышленном магазине. харнесс обеспечивает изменение порога скидки; модель предлагает внесение правок; харнесс дает разрешение на их реализацию; рантайм выполняет эти правки; а харнесс запускает соответствующие тесты модуля и браузера перед фиксацией окончательного решения.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a" />
    </marker>
  </defs>
  <rect width="640" height="1010" fill="#f8fafc" />
  <rect x="20" y="18" width="600" height="974" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />

  <text x="48" y="62" font-size="26" font-weight="700" fill="#0f172a">Одно действие, семь этапов управления</text>
  <text x="48" y="91" font-size="15" fill="#64748b">Предложение возвращается только после наличия необходимых доказательств.</text>

  <rect x="38" y="120" width="564" height="730" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="7 6" />
  <text x="60" y="151" font-size="14" font-weight="700" fill="#1d4ed8">Харнесс ОРГАНИЗУЕТ РАБОТУ ЦИКЛА</text>

  <rect x="60" y="172" width="520" height="74" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.5" />
  <text x="82" y="202" font-size="17" font-weight="700" fill="#1d4ed8">1. Сбор контекста</text>
  <text x="82" y="226" font-size="14" fill="#334155">Задача, правила репозитория, файлы, план и предыдущие результаты</text>

  <line x1="320" y1="246" x2="320" y2="268" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)" />

  <rect x="60" y="276" width="520" height="74" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" />
  <text x="82" y="306" font-size="17" font-weight="700" fill="#5b21b6">2. Модель предлагает</text>
  <text x="82" y="330" font-size="14" fill="#334155">Измените порог скидки в файле src/checkout.py</text>

  <line x1="320" y1="350" x2="320" y2="372" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)" />

  <rect x="60" y="380" width="520" height="74" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" />
  <text x="82" y="410" font-size="17" font-weight="700" fill="#9a3412">3. Разрешить вызов</text>
  <text x="82" y="434" font-size="14" fill="#334155">Проверка аргументов, пути, прав доступа, бюджета и класса повторных попыток</text>

  <line x1="320" y1="454" x2="320" y2="476" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)" />

  <rect x="60" y="484" width="520" height="74" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" />
  <text x="82" y="514" font-size="17" font-weight="700" fill="#1d4ed8">4. Выполнение в рантайм</text>
  <text x="82" y="538" font-size="14" fill="#334155">Примените изменения в сэндбокс и верните структурированный результат</text>

  <line x1="320" y1="558" x2="320" y2="580" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)" />

  <rect x="60" y="588" width="520" height="74" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" />
  <text x="82" y="618" font-size="17" font-weight="700" fill="#166534">5. Проверка артефакта</text>
  <text x="82" y="642" font-size="14" fill="#334155">Запустите тест единицы и файл checkout_discount.spec.ts</text>

  <line x1="320" y1="662" x2="320" y2="684" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)" />

  <rect x="60" y="692" width="520" height="74" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" />
  <text x="82" y="722" font-size="17" font-weight="700" fill="#991b1b">6. Принятие решения</text>
  <text x="82" y="746" font-size="14" fill="#334155">Продолжить обработку, попробовать снова, передать на более высокий уровень ответственности или отметить кандидата на одобрение</text>

  <line x1="320" y1="766" x2="320" y2="788" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)" />

  <rect x="60" y="796" width="520" height="74" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" />
  <text x="82" y="826" font-size="17" font-weight="700" fill="#334155">7. Запись доказательств</text>
  <text x="82" y="850" font-size="14" fill="#334155">Трейс решение, стоимость, причина сбоя, результат обработки и следующий шаг</text>

  <line x1="320" y1="870" x2="320" y2="895" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)" />
  <rect x="60" y="905" width="245" height="52" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" />
  <text x="182" y="937" text-anchor="middle" font-size="15" font-weight="700" fill="#166534">Принять проверенный результат</text>
  <rect x="335" y="905" width="245" height="52" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" />
  <text x="458" y="937" text-anchor="middle" font-size="15" font-weight="700" fill="#1d4ed8">Вернуть доказательства в следующем ходе</text>
</svg>
