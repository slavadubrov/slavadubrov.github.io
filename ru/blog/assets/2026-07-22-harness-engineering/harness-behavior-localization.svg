<svg xmlns="http://www.w3.org/2000/svg" width="640" height="850" viewBox="0 0 640 850" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Роутинг изменение поведения в соответствии с руководством харнесс</title>
  <desc id="desc">Пятиэтапный вертикальный поток обработки. Запрос, содержащий исключительно информацию о поведении, проходит по иерархии руководств. Перед применением плана проверяются возможные источники данных на соответствие текущей репозитории. Ненулевая разница в состоянии синхронизирует затронутые записи руководства для следующего запроса.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a" />
    </marker>
  </defs>
  <rect width="640" height="850" fill="#f8fafc" />
  <rect x="20" y="18" width="600" height="814" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />

  <text x="48" y="62" font-size="25" font-weight="700" fill="#0f172a">От поведения к проверенному плану правок</text>
  <text x="48" y="91" font-size="15" fill="#64748b">Руководство определяет маршрут поиска. Актуальный репозиторий является источником аутентичных данных.</text>

  <rect x="38" y="120" width="564" height="612" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="7 6" />
  <text x="60" y="151" font-size="14" font-weight="700" fill="#1d4ed8">Цикл модификации с использованием руководства по инструкции</text>

  <rect x="60" y="176" width="520" height="78" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" />
  <text x="82" y="207" font-size="17" font-weight="700" fill="#334155">1. Прием запроса, содержащего исключительно информацию о поведении</text>
  <text x="82" y="232" font-size="14" fill="#334155">«Скрытие секретов в каждом пути захвата» — это не название конкретного места в коде</text>

  <line x1="320" y1="254" x2="320" y2="280" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)" />

  <rect x="60" y="288" width="520" height="88" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" />
  <text x="82" y="319" font-size="17" font-weight="700" fill="#1d4ed8">2. Организация маршрутизации поиска</text>
  <text x="82" y="344" font-size="14" fill="#334155">Обзор системы → страница этапов → записи, основанные на исходных данных</text>
  <text x="82" y="365" font-size="14" fill="#334155">Читать регистр состояния при переходе поведения между этапами</text>

  <line x1="320" y1="376" x2="320" y2="402" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)" />

  <rect x="60" y="410" width="520" height="88" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" />
  <text x="82" y="441" font-size="17" font-weight="700" fill="#9a3412">3. Проверить каждый локатор</text>
  <text x="82" y="466" font-size="14" fill="#334155">Обработать каждую кандидатскую функцию или файл в текущем репозитории</text>
  <text x="82" y="487" font-size="14" fill="#334155">Замораживать устаревшие записи вместо создания замены</text>

  <line x1="320" y1="498" x2="320" y2="524" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)" />

  <rect x="60" y="532" width="520" height="78" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" />
  <text x="82" y="563" font-size="17" font-weight="700" fill="#1d4ed8">4. Планирование и внедрение изменений</text>
  <text x="82" y="588" font-size="14" fill="#334155">планировщик определяют структуру сайтов; экзекьютор модифицируют сами файлы</text>

  <line x1="320" y1="610" x2="320" y2="636" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)" />

  <rect x="60" y="644" width="520" height="68" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" />
  <text x="82" y="674" font-size="17" font-weight="700" fill="#166534">5. Пересинхронизация повреждённых записей</text>
  <text x="82" y="698" font-size="14" fill="#334155">Каждый ненулевой diff обновляет карту перед следующим запросом</text>

  <path d="M 590 678 L 608 678 L 608 332 L 590 332" fill="none" stroke="#16a34a" stroke-width="2" stroke-dasharray="7 6" marker-end="url(#arrow-green)" />
  <text x="320" y="784" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">Найдите все места реализации до планирование в ходе редактирования</text>
</svg>
