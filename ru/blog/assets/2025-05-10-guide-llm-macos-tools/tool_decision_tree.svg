<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Алгоритм выбора локального инструмента macOS LLM</title>
  <desc id="desc">Задача и базовая конфигурация модель приводят к четырем вариантам рабочего процесса: управляемый локальный сервис с Ollama, работа на рабочем столе с LM Studio, прямой GGUF контроль с использованием llama.cpp, а также использование нативного Python от Apple в сочетании с MLX-LM. Все эти пути ведут к одному и тому же типу рабочей нагрузки — бенчмарк.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="480" rx="22" fill="#0f172a" /><text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Выберите поверхность управления, затем бенчмарк</text>
  <g font-family="Inter, system-ui, sans-serif"><rect x="345" y="90" width="310" height="70" rx="14" fill="#1e293b" stroke="#64748b" /><text x="500" y="119" text-anchor="middle" font-size="16" font-weight="700" fill="#e2e8f0">Задача + базовая линия чекпоинт</text><text x="500" y="143" text-anchor="middle" font-size="12" fill="#94a3b8">качество, лицензия, контекст, результат обработки</text>
  <text x="500" y="195" text-anchor="middle" font-size="28" fill="#94a3b8">↓</text>
  <g transform="translate(30 220)"><rect width="215" height="115" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="107" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#93c5fd">Ollama</text><text x="107" y="68" text-anchor="middle" font-size="12" fill="#93c5fd">управляемая команда + API</text><text x="107" y="91" text-anchor="middle" font-size="11" fill="#94a3b8">сервис приложения</text></g>
  <g transform="translate(270 220)"><rect width="215" height="115" rx="14" fill="#5b21b6" stroke="#2563eb" /><text x="107" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#c4b5fd">LM Studio</text><text x="107" y="68" text-anchor="middle" font-size="12" fill="#93c5fd">десктопный клиент + SDKs + APIs</text><text x="107" y="91" text-anchor="middle" font-size="11" fill="#94a3b8">исследования человеком</text></g>
  <g transform="translate(515 220)"><rect width="215" height="115" rx="14" fill="#9a3412" stroke="#ea580c" /><text x="107" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#fdba74">llama.cpp</text><text x="107" y="68" text-anchor="middle" font-size="12" fill="#fdba74">прямое GGUF рантайм</text><text x="107" y="91" text-anchor="middle" font-size="11" fill="#94a3b8">флаги + эмбеддинг</text></g>
  <g transform="translate(755 220)"><rect width="215" height="115" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="107" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#93c5fd">MLX-LM</text><text x="107" y="68" text-anchor="middle" font-size="12" fill="#93c5fd">Python, предназначенный для работы в экосистеме Apple</text><text x="107" y="91" text-anchor="middle" font-size="11" fill="#94a3b8">эксперименты и настройка</text></g>
  <rect x="180" y="385" width="640" height="55" rx="12" fill="#1d4ed8" stroke="#2563eb" /><text x="500" y="418" text-anchor="middle" font-size="14" font-weight="700" fill="#93c5fd">Тот же промпты • одинаковый контекст • сопоставимая точность • измеряемая память</text></g>
</svg>
