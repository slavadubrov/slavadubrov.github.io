<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 680" style="background-color: #f8fafc; font-family: Inter, system-ui, sans-serif;" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Стандартное соединение с остаточным сигналом</title>
  <desc id="desc">Входные данные проходят через шорткат идентичности, в то время как обученная ветвь остатка вычисляет обновление; результаты этих двух путей суммируются.</desc>
  <defs>
    <!-- Background grid -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#e2e8f0" stroke-width="0.5" />
    </pattern>

    <!-- Markers for arrows -->
    <marker id="arrowSlate" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#1e293b" />
    </marker>
    <marker id="arrowEmerald" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#16a34a" />
    </marker>

    <!-- Glow & Shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>

    <filter id="glowFlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="0.8" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glowIdentity" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="1.0" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="600" height="680" fill="#f8fafc" />

  <!-- Background grid layer -->
  <rect width="600" height="680" fill="#f8fafc" />

  <!-- Top Title -->
  <text x="300" y="50" text-anchor="middle" font-size="24" font-weight="800" fill="#0f172a">Стандартное соединение остатков</text>

  <!-- The Block -->
  <g transform="translate(150, 90)">

    <!-- Input x -->
    <rect x="110" y="0" width="80" height="36" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
    <text x="150" y="24" text-anchor="middle" font-size="20" font-weight="800" fill="#1d4ed8">x</text>

    <!-- Base Paths -->
    <g stroke="#1e293b" stroke-width="2.5" fill="none">
      <!-- x to Split -->
      <path d="M 150 36 L 150 85" marker-end="url(#arrowSlate)" />
      <circle cx="150" cy="95" r="8" fill="#ffffff" stroke="#1e293b" />

      <!-- Split to Layer 1 -->
      <path d="M 150 103 L 150 135" marker-end="url(#arrowSlate)" />

      <!-- Layer 1 to ReLU -->
      <path d="M 150 195 L 150 225" marker-end="url(#arrowSlate)" />

      <!-- ReLU to Layer 2 -->
      <path d="M 150 285 L 150 315" marker-end="url(#arrowSlate)" />

      <!-- Layer 2 to Add -->
      <path d="M 150 375 L 150 415" marker-end="url(#arrowSlate)" />

      <!-- Add to Output -->
      <path d="M 150 465 L 150 500" marker-end="url(#arrowSlate)" />
    </g>

    <!-- Identity path (the vital shortcut) -->
    <path id="pathIdentity" d="M 158 95 C 370 95 370 440 170 440" fill="none" stroke="#16a34a" stroke-width="3" marker-end="url(#arrowEmerald)" />

    <!-- Animated Particles -->
    <!-- Gradient/Signal flow down the main F(x) block -->
    <g>

    </g>


    <!-- Block Components -->

    <!-- F(x) background enclosure -->
    <rect x="30" y="120" width="240" height="275" rx="12" fill="#ffffff" fill-opacity="0.85" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4" filter="url(#shadow)" />
    <!-- F(x) Label at edge -->
    <rect x="-10" y="240" width="50" height="30" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" />
    <text x="15" y="260" text-anchor="middle" font-size="16" font-weight="800" fill="#334155">F(x)</text>


    <!-- Weight Layer 1 -->
    <rect x="50" y="140" width="200" height="55" rx="8" fill="#ffffff" stroke="#1e293b" stroke-width="2" filter="url(#shadow)" />
    <text x="150" y="173" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Вес слой</text>

    <!-- ReLU Layer -->
    <rect x="50" y="230" width="200" height="55" rx="8" fill="#ffffff" stroke="#1e293b" stroke-width="2" filter="url(#shadow)" />
    <text x="150" y="263" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">ReLU</text>

    <!-- Weight Layer 2 -->
    <rect x="50" y="320" width="200" height="55" rx="8" fill="#ffffff" stroke="#1e293b" stroke-width="2" filter="url(#shadow)" />
    <text x="150" y="353" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Вес слой</text>

    <!-- Identity label mounted on the curve -->
    <rect x="275" y="250" width="75" height="30" rx="15" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" />
    <text x="312" y="270" text-anchor="middle" fill="#166534" font-size="13" font-weight="800">Идентичность</text>

    <!-- Plus (Addition) Node -->
    <circle cx="150" cy="440" r="22" fill="#ffffff" stroke="#1e293b" stroke-width="2" />
    <text x="150" y="448" text-anchor="middle" font-size="24" font-weight="800" fill="#0f172a">+</text>

    <!-- Output H(x) -->
    <rect x="85" y="505" width="130" height="45" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="2" filter="url(#shadow)" />
    <text x="150" y="534" text-anchor="middle" font-size="18" font-weight="800" fill="#166534">F(x) + x</text>

  </g>

</svg>
