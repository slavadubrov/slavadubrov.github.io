<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" style="background-color: #f8fafc; font-family: Inter, system-ui, sans-serif;" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Компромиссы после применения LN по сравнению с до-LN</title>
  <desc id="artifact-desc">Компромиссы после применения LN по сравнению с до-LN.</desc>
  <defs>
    <!-- Background grid -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#e2e8f0" stroke-width="0.5" />
    </pattern>

    <!-- Markers for arrows -->
    <marker id="arrowSlate" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#1e293b" />
    </marker>
    <marker id="arrowAmber" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#ea580c" />
    </marker>

    <!-- Glow & Shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>

    <filter id="glowFaded" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="0.4" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glowStrong" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="0.8" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background grid layer -->
  <rect width="1000" height="600" fill="#f8fafc" />

  <!-- Top Title -->
  <text y="50" font-size="28" font-weight="800" fill="#0f172a" x="40">Компромиссы после применения LN по сравнению с до-LN</text>
  <text y="80" font-size="16" fill="#334155" x="40">Место размещения операции нормализации слоя представляет собой фундаментальный компромисс.</text>

  <!-- Center divider -->
  <line x1="500" y1="120" x2="500" y2="520" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="8,6" />
  <circle cx="500" cy="320" r="22" fill="#ffffff" stroke="#94a3b8" stroke-width="2" />
  <text y="325" text-anchor="middle" fill="#334155" font-size="14" font-weight="700" x="500">против</text>

  <!-- LEFT SIDE: Post-LN -->
  <g transform="translate(140, 110)">

    <!-- Title -->
    <text y="25" text-anchor="middle" font-size="20" font-weight="800" fill="#0f172a" x="110">После LN</text>
    <text y="45" text-anchor="middle" font-size="13" fill="#334155" x="110">(Оригинальный Transformer)</text>

    <!-- Base Paths -->
    <g stroke="#334155" stroke-width="2.5" fill="none">
      <!-- Input line down to split -->
      <path d="M 110 75 L 110 115" marker-end="url(#arrowSlate)" />
      <circle cx="110" cy="125" r="8" fill="#ffffff" stroke="#334155" />

      <!-- Split down to F(x) -->
      <path d="M 110 133 L 110 155" marker-end="url(#arrowSlate)" />

      <!-- F(x) to Add -->
      <path d="M 110 210 L 110 235" marker-end="url(#arrowSlate)" />

      <!-- Add to LN -->
      <path d="M 110 270 L 110 295" marker-end="url(#arrowSlate)" />

      <!-- LN to Output -->
      <path d="M 110 350 L 110 375" marker-end="url(#arrowSlate)" />
    </g>

    <!-- Residual Path (Post-LN) -->
    <!-- Gradient flow gets rescaled/faded by LN in backprop -->
    <path id="pathPostRes" d="M 118 125 C 220 125 220 255 130 255" fill="none" stroke="#ea580c" stroke-width="2.5" marker-end="url(#arrowAmber)" />

    <!-- Animated Particles -->
    <!-- Signal weakens after LN in backward pass logic (simulated by faded color) -->



    <!-- Flow Blocks -->
    <text y="65" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a" x="110">x</text>

    <!-- F(x) block -->
    <rect x="40" y="160" width="140" height="50" rx="8" fill="#ffffff" stroke="#334155" stroke-width="2" filter="url(#shadow)" />
    <text y="190" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a" x="110">F(x)</text>

    <!-- Add circle -->
    <circle cx="110" cy="255" r="15" fill="#ffffff" stroke="#334155" stroke-width="2" />
    <text y="261" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a" x="110">+</text>

    <!-- LayerNorm Block (Red to indicate warning/issue area) -->
    <rect x="40" y="300" width="140" height="50" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2" filter="url(#shadow)" />
    <text y="330" text-anchor="middle" font-size="15" font-weight="700" fill="#991b1b" x="110">LayerNorm</text>

    <!-- Properties Card (Bottom) -->
    <rect x="-30" y="400" width="280" height="65" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)" />
    <text y="425" font-size="13" font-weight="700" fill="#166534" x="10">✓ Высокая емкость модели</text>
    <text y="448" font-size="13" font-weight="700" fill="#dc2626" x="10">✗ Исчезновение градиента</text>
  </g>


  <!-- RIGHT SIDE: Pre-LN -->
  <g transform="translate(640, 110)">

    <!-- Title -->
    <text y="25" text-anchor="middle" font-size="20" font-weight="800" fill="#0f172a" x="110">До LN</text>
    <text y="45" text-anchor="middle" font-size="13" fill="#334155" x="110">(Современный трансформер)</text>

    <!-- Base Paths -->
    <g stroke="#334155" stroke-width="2.5" fill="none">
      <!-- Input line down to split -->
      <path d="M 110 75 L 110 115" marker-end="url(#arrowSlate)" />
      <circle cx="110" cy="125" r="8" fill="#ffffff" stroke="#334155" />

      <!-- Split down to LN -->
      <path d="M 110 133 L 110 155" marker-end="url(#arrowSlate)" />

      <!-- LN to F(x) -->
      <path d="M 110 210 L 110 235" marker-end="url(#arrowSlate)" />

      <!-- F(x) to Add -->
      <path d="M 110 290 L 110 315" marker-end="url(#arrowSlate)" />

      <!-- Add to Output -->
      <path d="M 110 345 L 110 375" marker-end="url(#arrowSlate)" />
    </g>

    <!-- Residual Path (Pre-LN) -->
    <!-- Clean, strong identity path flowing straight through to addition -->
    <path id="pathPreRes" d="M 118 125 C 230 125 230 330 130 330" fill="none" stroke="#ea580c" stroke-width="2.5" marker-end="url(#arrowAmber)" />

    <!-- Animated Particles -->
    <!-- Signal remains strong along the unbroken identity shortcut -->


    <!-- Residual Identity Label -->
    <rect x="175" y="215" width="70" height="24" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" />
    <text y="232" text-anchor="middle" font-size="12" font-weight="700" fill="#ea580c" x="210">Идентичность</text>

    <!-- Flow Blocks -->
    <text y="65" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a" x="110">x</text>

    <!-- LayerNorm Block (Green to indicate clean/stable placement) -->
    <rect x="40" y="160" width="140" height="50" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" filter="url(#shadow)" />
    <text y="190" text-anchor="middle" font-size="15" font-weight="700" fill="#166534" x="110">LayerNorm</text>

    <!-- F(x) block -->
    <rect x="40" y="240" width="140" height="50" rx="8" fill="#ffffff" stroke="#334155" stroke-width="2" filter="url(#shadow)" />
    <text y="270" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a" x="110">F(x)</text>

    <!-- Add circle -->
    <circle cx="110" cy="330" r="15" fill="#ffffff" stroke="#334155" stroke-width="2" />
    <text y="336" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a" x="110">+</text>

    <!-- Properties Card (Bottom) -->
    <rect x="-30" y="400" width="280" height="65" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)" />
    <text y="425" font-size="13" font-weight="700" fill="#166534" x="10">✓ Отличная стабильность</text>
    <text y="448" font-size="13" font-weight="700" fill="#dc2626" x="10">✗ Коллапс представления</text>
  </g>

</svg>
