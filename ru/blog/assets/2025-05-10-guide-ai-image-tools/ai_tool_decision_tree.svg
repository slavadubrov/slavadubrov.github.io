<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Начните здесь</title>
  <desc id="artifact-desc">Начните здесь.</desc>
  <defs>
    <filter id="shadow" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="100%" height="100%" fill="#f8fafc" /><rect width="800" height="600" fill="#f8fafc" rx="10" ry="10" />


  <g transform="translate(300, 30)">
    <rect x="0" y="0" width="200" height="60" rx="30" fill="#1e293b" filter="url(#shadow)" />
    <text y="35" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#ffffff" x="100">Начните здесь</text>
  </g>


  <g transform="translate(300, 130)">
    <path d="M100 0 L200 50 L100 100 L0 50 Z" fill="#ffffff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
    <text y="45" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#0f172a" x="100">Вы являетесь</text>
    <text y="65" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#0f172a" x="100">Новичок?</text>
  </g>


  <line x1="400" y1="90" x2="400" y2="128" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />


  <line x1="300" y1="180" x2="150" y2="180" stroke="#94a3b8" stroke-width="2" />
  <line x1="150" y1="180" x2="150" y2="248" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
  <text y="170" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#334155" x="200">Да</text>


  <line x1="500" y1="180" x2="650" y2="180" stroke="#94a3b8" stroke-width="2" />
  <line x1="650" y1="180" x2="650" y2="248" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
  <text y="170" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#334155" x="550">Нет / Автономный пользователь</text>


  <g transform="translate(50, 250)">
    <rect x="0" y="0" width="200" height="100" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
    <text y="30" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#1d4ed8" x="100">DiffusionBee</text>
    <text y="50" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#1d4ed8" x="100">или рисование объектов</text>
    <text y="75" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#1d4ed8" x="100">Установка одним кликом, нативное приложение</text>
  </g>


  <g transform="translate(550, 250)">
    <path d="M100 0 L200 50 L100 100 L0 50 Z" fill="#ffffff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
    <text y="45" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#0f172a" x="100">Каков ваш</text>
    <text y="65" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#0f172a" x="100">Приоритет?</text>
  </g>




  <path d="M650 350 L650 380 L370 380 L370 418" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
  <text y="375" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#334155" x="450">Полный контроль</text>


  <path d="M650 350 L650 380 L550 380 L550 418" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
  <text y="400" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#334155" x="570">Особенности</text>


  <path d="M650 350 L650 380 L730 380 L730 418" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
  <text y="375" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#334155" x="740">Раскраска</text>


  <g transform="translate(300, 420)">
    <rect x="0" y="0" width="140" height="80" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)" />
    <text y="30" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#5b21b6" x="70">ComfyUI</text>
    <text y="50" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#5b21b6" x="70">Рабочие процессы на основе узлов</text>
  </g>


  <g transform="translate(480, 420)">
    <rect x="0" y="0" width="140" height="80" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadow)" />
    <text y="30" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#9a3412" x="70">Веб-интерфейс (A1111)</text>
    <text y="50" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#9a3412" x="70">Расширяемый стандарт</text>
  </g>


  <g transform="translate(660, 420)">
    <rect x="0" y="0" width="140" height="80" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" filter="url(#shadow)" />
    <text y="30" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#166534" x="70">Вызов AI</text>
    <text y="50" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#166534" x="70">Единая платформа</text>
  </g>

</svg>
