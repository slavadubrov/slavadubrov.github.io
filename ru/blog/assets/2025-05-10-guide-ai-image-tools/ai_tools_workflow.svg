<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Уровни воспроизводимого локального рабочего процесса обработки изображений</title>
  <desc id="desc">Пять взаимосвязанных слоев демонстрируют, что версия приложения, компоненты модель, параметры генерации, зависимости рабочего процесса и результаты обработки в совокупности образуют воспроизводимую единицу релиза.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#64748b" /></marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="620" rx="28" fill="#0f172a" />
  <text x="600" y="68" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Файл модель не является портабельным рабочим потоком</text>
  <text x="600" y="104" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="17">Для воспроизведения необходимы идентификаторы на каждом уровне</text>

  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <g transform="translate(45 172)">
      <rect width="190" height="154" rx="18" fill="#1d4ed8" />
      <text x="95" y="48" fill="#93c5fd" font-size="20" font-weight="700">приложение</text>
      <text x="95" y="82" fill="#93c5fd" font-size="15">имя + версия</text>
      <text x="95" y="110" fill="#93c5fd" font-size="14">бэкенд + точность</text>
    </g>
    <path d="M245 249 H275" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
    <g transform="translate(285 172)">
      <rect width="190" height="154" rx="18" fill="#5b21b6" />
      <text x="95" y="48" fill="#93c5fd" font-size="20" font-weight="700">Компоненты</text>
      <text x="95" y="82" fill="#93c5fd" font-size="15">чекпоинт + VAE</text>
      <text x="95" y="110" fill="#c4b5fd" font-size="14">кодировщики + адаптеры</text>
    </g>
    <path d="M485 249 H515" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
    <g transform="translate(525 172)">
      <rect width="190" height="154" rx="18" fill="#9a3412" />
      <text x="95" y="48" fill="#fdba74" font-size="20" font-weight="700">Параметры</text>
      <text x="95" y="82" fill="#fdba74" font-size="15">промпт + семя</text>
      <text x="95" y="110" fill="#fdba74" font-size="14">сэмплер + размерности</text>
    </g>
    <path d="M725 249 H755" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
    <g transform="translate(765 172)">
      <rect width="190" height="154" rx="18" fill="#166534" />
      <text x="95" y="48" fill="#93c5fd" font-size="20" font-weight="700">процесс обработки данных</text>
      <text x="95" y="82" fill="#93c5fd" font-size="15">версии графа и узлов</text>
      <text x="95" y="110" fill="#93c5fd" font-size="14">скрипты + расширения</text>
    </g>
    <path d="M965 249 H995" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
    <g transform="translate(1005 172)">
      <rect width="150" height="154" rx="18" fill="#1d4ed8" />
      <text x="75" y="48" fill="#93c5fd" font-size="20" font-weight="700">Выходные данные</text>
      <text x="75" y="82" fill="#93c5fd" font-size="15">изображение + метаданные</text>
      <text x="75" y="110" fill="#93c5fd" font-size="14">результат проверки соответствия</text>
    </g>
  </g>

  <path d="M600 346 V395" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
  <rect x="205" y="410" width="790" height="128" rx="20" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" />
  <text x="600" y="459" text-anchor="middle" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="23" font-weight="700">Единица релиза с воспроизводимыми характеристиками</text>
  <text x="600" y="496" text-anchor="middle" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="17">Свяжите идентичности между собой; не ограничивайтесь сохранением только конечного изображения.</text>
</svg>
