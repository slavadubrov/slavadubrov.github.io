<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Стек ИИ Apple Silicon</title>
  <desc id="artifact-desc">Стек ИИ Apple Silicon.</desc>
  <defs>
    <filter id="shadow" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" />
      <feOffset dx="0" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <marker id="arrowUp" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
    <marker id="arrowDown" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="100%" height="100%" fill="#f8fafc" /><rect width="600" height="400" fill="#f8fafc" rx="10" ry="10" />

  <text y="40" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#334155" x="300">Стек ИИ Apple Silicon</text>


  <g transform="translate(100, 70)">


    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="400" height="60" rx="4" fill="#2563eb" filter="url(#shadow)" />
      <text y="25" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#ffffff" x="200">Слой прикладного программирования</text>
      <text y="45" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#2563eb" x="200">ComfyUI, DiffusionBee, Draw Things</text>
    </g>


    <line x1="200" y1="60" x2="200" y2="80" stroke="#cbd5e1" stroke-width="2" />


    <g transform="translate(0, 80)">
      <rect x="0" y="0" width="400" height="60" rx="4" fill="#ea580c" filter="url(#shadow)" />
      <text y="25" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#ffffff" x="200">Фреймворк машинного обучения</text>
      <text y="45" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#ea580c" x="200">PyTorch / CoreML</text>
    </g>


    <line x1="200" y1="140" x2="200" y2="160" stroke="#cbd5e1" stroke-width="2" />


    <g transform="translate(0, 160)">
      <rect x="0" y="0" width="400" height="60" rx="4" fill="#2563eb" filter="url(#shadow)" />
      <text y="25" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#ffffff" x="200">Шейдеры производительности металла (MPS)</text>
      <text y="45" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#7c3aed" x="200">API ускорения железа</text>
    </g>


    <line x1="200" y1="220" x2="200" y2="240" stroke="#cbd5e1" stroke-width="2" />


    <g transform="translate(0, 240)">
      <rect x="0" y="0" width="400" height="60" rx="4" fill="#334155" filter="url(#shadow)" />
      <text y="25" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#ffffff" x="200">Apple Silicon (серия M)</text>
      <text y="45" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#ffffff" x="200">Архитектура объединенной памяти (CPU + GPU)</text>
    </g>

  </g>


  <g transform="translate(520, 70)">

    <line x1="0" y1="10" x2="0" y2="290" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowDown)" />
    <text y="150" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#334155" text-anchor="middle" x="15" transform="rotate(90, 15, 150)">Поток оптимизации</text>
  </g>

</svg>
