<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Inter, system-ui, sans-serif" role="img" aria-label="GLiNER architecture: entity type tokens and text tokens are jointly encoded by DeBERTa, then span representations are scored against entity type embeddings via dot product" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Архитектура GLiNER: типы сущностей токены и текст токены кодируются совместно с помощью DeBERTa, после чего представления спан оцениваются по отношению к типам сущностей эмбеддинги с использованием скалярного произведения</title>
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#166534" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">Архитектура GLiNER: спан — сопоставление сущностей в латентном пространстве</text>

  <!-- Input tokens -->
  <rect x="30" y="55" width="840" height="50" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" />
  <text x="450" y="72" text-anchor="middle" font-size="11" fill="#334155">последовательность входных данных</text>

  <!-- Individual tokens -->
  <rect x="45" y="75" width="55" height="24" rx="4" fill="#7c3aed" stroke="#7c3aed" stroke-width="1" />
  <text x="72" y="91" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="bold">[ENT]</text>

  <rect x="105" y="75" width="55" height="24" rx="4" fill="#faf5ff" stroke="#7c3aed" stroke-width="1" />
  <text x="132" y="91" text-anchor="middle" font-size="10" fill="#5b21b6">человек</text>

  <rect x="165" y="75" width="55" height="24" rx="4" fill="#7c3aed" stroke="#7c3aed" stroke-width="1" />
  <text x="192" y="91" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="bold">[ENT]</text>

  <rect x="225" y="75" width="55" height="24" rx="4" fill="#faf5ff" stroke="#7c3aed" stroke-width="1" />
  <text x="252" y="91" text-anchor="middle" font-size="10" fill="#5b21b6">организация</text>

  <rect x="285" y="75" width="55" height="24" rx="4" fill="#7c3aed" stroke="#7c3aed" stroke-width="1" />
  <text x="312" y="91" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="bold">[ENT]</text>

  <rect x="345" y="75" width="55" height="24" rx="4" fill="#faf5ff" stroke="#7c3aed" stroke-width="1" />
  <text x="372" y="91" text-anchor="middle" font-size="10" fill="#5b21b6">дата</text>

  <rect x="405" y="75" width="55" height="24" rx="4" fill="#2563eb" stroke="#2563eb" stroke-width="1" />
  <text x="432" y="91" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="bold">[SEP]</text>

  <rect x="465" y="75" width="45" height="24" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1" />
  <text x="487" y="91" text-anchor="middle" font-size="10" fill="#1d4ed8">Билл</text>

  <rect x="515" y="75" width="50" height="24" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1" />
  <text x="540" y="91" text-anchor="middle" font-size="10" fill="#1d4ed8">ворота</text>

  <rect x="570" y="75" width="65" height="24" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1" />
  <text x="602" y="91" text-anchor="middle" font-size="10" fill="#1d4ed8">заложен</text>

  <rect x="640" y="75" width="70" height="24" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1" />
  <text x="675" y="91" text-anchor="middle" font-size="10" fill="#1d4ed8">Microsoft</text>

  <rect x="715" y="75" width="35" height="24" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1" />
  <text x="732" y="91" text-anchor="middle" font-size="10" fill="#1d4ed8">над</text>

  <rect x="755" y="75" width="100" height="24" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1" />
  <text x="805" y="91" text-anchor="middle" font-size="10" fill="#1d4ed8">4 апреля 1975 года</text>

  <!-- Arrow down to encoder -->
  <line x1="450" y1="110" x2="450" y2="140" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow1)" />

  <!-- DeBERTa Encoder -->
  <rect x="150" y="145" width="600" height="55" rx="8" fill="#2563eb" stroke="#2563eb" stroke-width="2" />
  <text x="450" y="170" text-anchor="middle" font-size="15" fill="#ffffff" font-weight="bold">Двунаправленный трансформер DeBERTa-v3</text>
  <text x="450" y="188" text-anchor="middle" font-size="11" fill="#2563eb">Совместная кодировка типов сущностей и текста токены</text>

  <!-- Split arrows -->
  <line x1="300" y1="200" x2="200" y2="240" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow1)" />
  <line x1="600" y1="200" x2="700" y2="240" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow1)" />

  <!-- Entity Type Representations -->
  <rect x="60" y="245" width="280" height="70" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" />
  <text x="200" y="268" text-anchor="middle" font-size="13" font-weight="bold" fill="#5b21b6">Тип сущности эмбеддинги</text>
  <text x="200" y="286" text-anchor="middle" font-size="11" fill="#5b21b6">q_person, q_org, q_date</text>
  <text x="200" y="302" text-anchor="middle" font-size="10" fill="#64748b">Из позиций [ENT] токен</text>

  <!-- Span Representations -->
  <rect x="560" y="245" width="280" height="70" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text x="700" y="268" text-anchor="middle" font-size="13" font-weight="bold" fill="#1d4ed8">Спан представления</text>
  <text x="700" y="286" text-anchor="middle" font-size="11" fill="#1d4ed8">S_ij = FFN(h_i ⊕ h_j)</text>
  <text x="700" y="302" text-anchor="middle" font-size="10" fill="#64748b">Все спаны с шириной до 12</text>

  <!-- Arrows to scoring -->
  <line x1="200" y1="315" x2="350" y2="370" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow1)" />
  <line x1="700" y1="315" x2="550" y2="370" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow1)" />

  <!-- Dot Product Scoring -->
  <rect x="300" y="370" width="300" height="55" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2" />
  <text x="450" y="393" text-anchor="middle" font-size="13" font-weight="bold" fill="#9a3412">Оценка по скалярному произведению</text>
  <text x="450" y="411" text-anchor="middle" font-size="12" fill="#991b1b">φ(i,j,t) = σ(S_ij · q_t)</text>

  <!-- Arrow to output -->
  <line x1="450" y1="425" x2="450" y2="455" stroke="#166534" stroke-width="2" marker-end="url(#arrow2)" />

  <!-- Output -->
  <rect x="150" y="460" width="600" height="50" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="2" />
  <text x="250" y="483" text-anchor="middle" font-size="11" fill="#166534" font-weight="bold">"Билл Гейтс" → person</text>
  <text x="450" y="483" text-anchor="middle" font-size="11" fill="#166534" font-weight="bold">"Microsoft" → org</text>
  <text x="650" y="483" text-anchor="middle" font-size="11" fill="#166534" font-weight="bold">"4 апреля 1975 г." → date</text>
  <text x="450" y="500" text-anchor="middle" font-size="10" fill="#64748b">Значения Спаны, превышающие установленный порог, выдаются в виде сущностей</text>
</svg>
