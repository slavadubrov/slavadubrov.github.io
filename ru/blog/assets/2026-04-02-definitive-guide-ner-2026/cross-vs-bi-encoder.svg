<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" font-family="Inter, system-ui, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Архитектура кросс-энкодера против архитектуры би-энкодера</title>
  <desc id="artifact-desc">Архитектура кросс-энкодера против архитектуры би-энкодера.</desc>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
    <marker id="arrg" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#166534" />
    </marker>
    <marker id="arrr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a" x="460">Архитектура кросс-энкодера против архитектуры би-энкодера</text>

  <!-- LEFT: Cross-Encoder -->
  <rect x="20" y="45" width="420" height="420" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
  <text y="72" text-anchor="middle" font-size="15" font-weight="bold" fill="#1d4ed8" x="230">Кросс-энкодер (оригинальный GLiNER)</text>

  <!-- Input: combined -->
  <rect x="50" y="90" width="360" height="40" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" />
  <text y="114" text-anchor="middle" font-size="11" fill="#1d4ed8" x="230">[ENT] человек [ENT] организация [SEP] Билл Гейтс основал Microsoft</text>

  <line x1="230" y1="130" x2="230" y2="155" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)" />

  <!-- Single encoder -->
  <rect x="80" y="160" width="300" height="50" rx="8" fill="#2563eb" stroke="#2563eb" stroke-width="2" />
  <text y="183" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="bold" x="230">Один кодер DeBERTa</text>
  <text y="200" text-anchor="middle" font-size="10" fill="#2563eb" x="230">Совместное внимание к меткам и тексту</text>

  <line x1="230" y1="210" x2="230" y2="235" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)" />

  <!-- Scoring -->
  <rect x="100" y="240" width="260" height="40" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" />
  <text y="264" text-anchor="middle" font-size="12" fill="#9a3412" font-weight="bold" x="230">Скалярное произведение длины отрезка и точки сущности</text>

  <line x1="230" y1="280" x2="230" y2="305" stroke="#166534" stroke-width="2" marker-end="url(#arrg)" />

  <!-- Output -->
  <rect x="110" y="310" width="240" height="35" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" />
  <text y="332" text-anchor="middle" font-size="12" fill="#166534" font-weight="bold" x="230">Прогнозы сущностей</text>

  <!-- Problem callout -->
  <rect x="55" y="365" width="350" height="85" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" />
  <text y="385" text-anchor="middle" font-size="11" font-weight="bold" fill="#991b1b" x="230">Ограничение масштабирования</text>
  <text y="402" text-anchor="middle" font-size="10" fill="#991b1b" x="230">Необходимо перекодировать ВСЕ метки вместе с текстом.</text>
  <text y="418" text-anchor="middle" font-size="10" fill="#991b1b" x="230">1 024 метки → снижение пропускной способности на 98,7%</text>
  <text y="434" text-anchor="middle" font-size="10" fill="#991b1b" x="230">Практический лимит: около 30 типов сущностей</text>

  <!-- RIGHT: Bi-Encoder -->
  <rect x="480" y="45" width="420" height="420" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
  <text y="72" text-anchor="middle" font-size="15" font-weight="bold" fill="#166534" x="690">Двойной кодировщик GLiNER</text>

  <!-- Two separate inputs -->
  <rect x="500" y="90" width="150" height="40" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" />
  <text y="108" text-anchor="middle" font-size="11" fill="#5b21b6" x="575">человек, организация, дата</text>
  <text y="122" text-anchor="middle" font-size="9" fill="#64748b" x="575">Типы сущностей</text>

  <rect x="670" y="90" width="210" height="40" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" />
  <text y="114" text-anchor="middle" font-size="11" fill="#1d4ed8" x="775">Билл Гейтс основал Microsoft</text>

  <line x1="575" y1="130" x2="575" y2="155" stroke="#7c3aed" stroke-width="2" marker-end="url(#arr)" />
  <line x1="775" y1="130" x2="775" y2="155" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)" />

  <!-- Two separate encoders -->
  <rect x="500" y="160" width="150" height="50" rx="8" fill="#7c3aed" stroke="#5b21b6" stroke-width="2" />
  <text y="183" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold" x="575">Кодировщик меток</text>
  <text y="200" text-anchor="middle" font-size="9" fill="#7c3aed" x="575">BGE / MiniLM</text>

  <rect x="670" y="160" width="210" height="50" rx="8" fill="#2563eb" stroke="#2563eb" stroke-width="2" />
  <text y="183" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold" x="775">Кодировщик текста</text>
  <text y="200" text-anchor="middle" font-size="9" fill="#2563eb" x="775">ModernBERT (Ettin)</text>

  <!-- Cache callout -->
  <rect x="500" y="220" width="150" height="25" rx="4" fill="#f0fdf4" stroke="#166534" stroke-width="1" stroke-dasharray="4" />
  <text y="237" text-anchor="middle" font-size="10" fill="#166534" font-weight="bold" x="575">Заранее вычислено + размещено в кэше</text>

  <line x1="575" y1="245" x2="640" y2="255" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arr)" />
  <line x1="775" y1="210" x2="720" y2="255" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr)" />

  <!-- Late fusion scoring -->
  <rect x="600" y="255" width="160" height="40" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" />
  <text y="279" text-anchor="middle" font-size="12" fill="#9a3412" font-weight="bold" x="680">Продукт скалярный с поздней фузией</text>

  <line x1="680" y1="295" x2="680" y2="315" stroke="#166534" stroke-width="2" marker-end="url(#arrg)" />

  <!-- Output -->
  <rect x="570" y="320" width="240" height="35" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" />
  <text y="342" text-anchor="middle" font-size="12" fill="#166534" font-weight="bold" x="690">Прогнозы сущностей</text>

  <!-- Advantage callout -->
  <rect x="510" y="365" width="370" height="85" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" />
  <text y="385" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534" x="695">Преимущество масштабирования</text>
  <text y="402" text-anchor="middle" font-size="10" fill="#166534" x="695">Метки кодируются один раз и хранятся в кэше бесконечно</text>
  <text y="418" text-anchor="middle" font-size="10" fill="#166534" x="695">1 024 метки → снижение пропускной способности всего на 5,2%</text>
  <text y="434" text-anchor="middle" font-size="10" fill="#166534" x="695">Увеличение пропускной способности на 130% в масштабированной среде</text>

  <!-- VS divider -->
  <text y="260" text-anchor="middle" font-size="20" font-weight="bold" fill="#64748b" x="460">против</text>
</svg>
