<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Процесс формирования цен с раздельными границами схемы и политики</title>
  <desc id="desc">Запрос проходит через структурированный роутинг, авторизованную функцию retrieval, структурированное предложение, проверку детерминистичной политики и шаблонный ответ. Пути сбоя приводят к безопасному фолбэку.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="560" rx="22" fill="#0f172a" />
  <text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Агент ценообразования: границы наблюдаемого принудительного воздействия</text>

  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(25 125)"><rect width="150" height="110" rx="14" fill="#1e293b" stroke="#64748b" stroke-width="2" /><text x="75" y="43" text-anchor="middle" font-size="16" font-weight="700" fill="#f8fafc">Запрос пользователя</text><text x="75" y="72" text-anchor="middle" font-size="12" fill="#94a3b8">недоверенный входной данные</text></g>
    <text x="202" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(230 125)"><rect width="150" height="110" rx="14" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="75" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">маршрут</text><text x="75" y="62" text-anchor="middle" font-size="12" fill="#cbd5e1">объединение с дискриминацией</text><text x="75" y="85" text-anchor="middle" font-size="12" fill="#94a3b8">форма проверена</text></g>
    <text x="407" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(435 125)"><rect width="150" height="110" rx="14" fill="#5b21b6" stroke="#2563eb" stroke-width="2" /><text x="75" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#c4b5fd">запрос к источнику данных</text><text x="75" y="62" text-anchor="middle" font-size="12" fill="#cbd5e1">идентификатор авторизованного пользователя</text><text x="75" y="85" text-anchor="middle" font-size="12" fill="#94a3b8">загрузка динамических функций</text></g>
    <text x="612" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(640 125)"><rect width="150" height="110" rx="14" fill="#9a3412" stroke="#ea580c" stroke-width="2" /><text x="75" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#fdba74">Предложение</text><text x="75" y="62" text-anchor="middle" font-size="12" fill="#cbd5e1">набранный JSON schema</text><text x="75" y="85" text-anchor="middle" font-size="12" fill="#94a3b8">форма проверена</text></g>
    <text x="817" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(845 125)"><rect width="130" height="110" rx="14" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="65" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Проверка политики</text><text x="65" y="62" text-anchor="middle" font-size="12" fill="#cbd5e1">динамический лимит</text><text x="65" y="85" text-anchor="middle" font-size="12" fill="#94a3b8">обеспечение соблюдения кода</text></g>

    <text x="910" y="286" text-anchor="middle" font-size="28" fill="#93c5fd">↓</text>
    <g transform="translate(785 315)"><rect width="190" height="90" rx="14" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="95" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Шаблонный ответ</text><text x="95" y="64" text-anchor="middle" font-size="12" fill="#93c5fd">только проверенные значения</text></g>

    <text x="620" y="459" text-anchor="end" font-size="13" fill="#fca5a5">любой отклонённый чек →</text>
    <g transform="translate(670 420)"><rect width="190" height="80" rx="14" fill="#991b1b" stroke="#dc2626" stroke-width="2" /><text x="95" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#fca5a5">Безопасный фолбэк</text><text x="95" y="59" text-anchor="middle" font-size="12" fill="#fca5a5">отклонить, повторить попытку или передать на более высокий уровень обработки</text></g>
    <text x="500" y="535" text-anchor="middle" font-size="13" fill="#94a3b8">Сбои схемы и нарушения политик обрабатываются явно — ни один из них не преобразуется незаметно в предложение.</text>
  </g>
</svg>
