<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Здесь маска XGrammar токен подается в цикл декодирования</title>
  <desc id="desc">модель вычисляет сырые логиты, маски XGrammar блокируют токены, которые не могут продолжить структуру схемы, а процесс выборки осуществляется среди оставшихся токены; после этого механизм сопоставления продолжает работу. В примечании указано, что маска гарантирует соответствие формату, а не корректность данных.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#64748b" /></marker></defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="520" rx="22" fill="#0f172a" />
  <text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Constrained decoding: пост-форвардинг, предварительная сэмплирование</text>
  <text x="500" y="76" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#94a3b8">модель оценивает токены; грамматика определяет, какие продолжения остаются пригодными</text>

  <g transform="translate(35 125)">
    <rect width="180" height="105" rx="14" fill="#166534" stroke="#16a34a" stroke-width="2" />
    <text x="90" y="39" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#86efac">Модель прямой проход</text>
    <text x="90" y="68" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#86efac">GPU выполняет вычисления</text>
    <text x="90" y="87" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#86efac">логиты сырого словаря</text>
  </g>
  <path d="M225 177 H270" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <g transform="translate(285 125)">
    <rect width="180" height="105" rx="14" fill="#9a3412" stroke="#ea580c" stroke-width="2" />
    <text x="90" y="39" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#fdba74">Сопоставитель грамматики</text>
    <text x="90" y="68" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#fdba74">Вычисляет допустимые</text>
    <text x="90" y="87" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#fdba74">маска next-токен</text>
  </g>
  <path d="M475 177 H520" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <g transform="translate(535 125)">
    <rect width="180" height="105" rx="14" fill="#2563eb" stroke="#2563eb" stroke-width="2" />
    <text x="90" y="39" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#93c5fd">Маскированное выборка</text>
    <text x="90" y="68" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd">Некорректные логиты → −∞</text>
    <text x="90" y="87" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd">Выберите подходящий токен</text>
  </g>
  <path d="M725 177 H770" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <g transform="translate(785 125)">
    <rect width="180" height="105" rx="14" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" />
    <text x="90" y="39" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#93c5fd">Режим продвинутой обработки</text>
    <text x="90" y="68" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd">Принять токен и</text>
    <text x="90" y="87" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd">повторять до завершения</text>
  </g>

  <g transform="translate(75 290)">
    <rect width="400" height="145" rx="14" fill="#1e293b" stroke="#94a3b8" />
    <text x="24" y="35" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#e2e8f0">Пример: числовое поле</text>
    <text x="24" y="67" font-family="SFMono-Regular, Consolas, monospace" font-size="13" fill="#94a3b8">raw:  "пятнадцать"  15  true  {</text>
    <text x="24" y="96" font-family="SFMono-Regular, Consolas, monospace" font-size="13" fill="#86efac">маска:     ×       ✓    ×   ×</text>
    <text x="24" y="124" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94a3b8">Шаблон допускает числовое значение, а не текстовую строку «пятнадцать».</text>
  </g>
  <g transform="translate(525 290)">
    <rect width="400" height="145" rx="14" fill="#1d4ed8" stroke="#2563eb" />
    <text x="24" y="35" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#93c5fd">Что не определяется маской</text>
    <text x="24" y="67" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#cbd5e1">• является ли 15 правильным значением</text>
    <text x="24" y="94" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#cbd5e1">• подтверждается ли значение данными</text>
    <text x="24" y="121" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#cbd5e1">• разрешает ли это динамическое бизнес-правило</text>
  </g>
</svg>
