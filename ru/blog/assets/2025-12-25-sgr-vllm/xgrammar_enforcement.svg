<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">xgrammar: Место применения маскировки в пайплайне инференса</title>
  <desc id="artifact-desc">xgrammar: Место применения маскировки в пайплайне инференса.</desc>
  <defs>
    <linearGradient id="gpuGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #166534;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="xgrammarGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #ea580c;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #ea580c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="samplingGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #2563eb;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a" />
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c" />
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="900" height="600" fill="#0f172a" />

  <!-- Title -->
  <text y="35" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="bold" fill="#f8fafc" text-anchor="middle" x="450">xgrammar: Место применения маскировки в пайплайне инференса</text>

  <!-- Step labels -->
  <text y="65" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#334155" text-anchor="middle" x="450">Маска применяется ПОСЛЕ выполнения передачи данных и ДО отбора проб.</text>

  <!-- Pipeline flow - horizontal -->
  <g transform="translate(30, 100)">

    <!-- Step 1: Input Tokens -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="120" height="70" rx="10" fill="#1e293b" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)" />
      <text y="25" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#cbd5e1" text-anchor="middle" x="60">Шаг 1</text>
      <text y="45" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#f8fafc" text-anchor="middle" x="60">Токены входных данных</text>
      <text y="60" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#334155" text-anchor="middle" x="60">[1, 234, 56, ...]</text>
    </g>

    <!-- Arrow 1 -->
    <path d="M125,35 L155,35" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrowGreen)" />

    <!-- Step 2: GPU Forward Pass -->
    <g transform="translate(160, 0)">
      <rect x="0" y="0" width="180" height="70" rx="10" fill="url(#gpuGrad)" filter="url(#shadow)" />
      <text y="20" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#86efac" text-anchor="middle" x="90">Шаг 2 (GPU)</text>
      <text y="40" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#f8fafc" text-anchor="middle" x="90">🖥️ Прямой проход</text>
      <text y="58" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#86efac" text-anchor="middle" x="90">Модель вычисляет все 128 тыс. логитов.</text>
    </g>

    <!-- Arrow 2 -->
    <path d="M345,35 L375,35" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrowGreen)" />

    <!-- Step 3: Raw Logits -->
    <g transform="translate(380, 0)">
      <rect x="0" y="0" width="120" height="70" rx="10" fill="#1e293b" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)" />
      <text y="20" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#cbd5e1" text-anchor="middle" x="60">Выходные данные</text>
      <text y="40" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#f8fafc" text-anchor="middle" x="60">Чистые логиты</text>
      <text y="58" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#334155" text-anchor="middle" x="60">[2.1, -0.5, 3.8...]</text>
    </g>

    <!-- Arrow 3 -->
    <path d="M505,35 L535,35" stroke="#ea580c" stroke-width="3" fill="none" marker-end="url(#arrowOrange)" />

    <!-- Step 4: xgrammar Logits Processor (THE KEY STEP) -->
    <g transform="translate(540, -15)">
      <rect x="0" y="0" width="180" height="100" rx="12" fill="url(#xgrammarGrad)" stroke="#ea580c" stroke-width="3" filter="url(#shadow)" />
      <text y="22" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#fdba74" text-anchor="middle" x="90">Шаг 3 (ЦПУ)</text>
      <text y="42" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#f8fafc" text-anchor="middle" x="90">⚙️ xgrammar</text>
      <text y="60" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#fdba74" text-anchor="middle" x="90">Процессор логитов</text>
      <text y="82" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#fdba74" text-anchor="middle" x="90">Недопустимые токены → -∞</text>
    </g>

    <!-- Arrow 4 -->
    <path d="M725,35 L755,35" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrowBlue)" />

    <!-- Step 5: Sampling -->
    <g transform="translate(760, 0)">
      <rect x="0" y="0" width="110" height="70" rx="10" fill="url(#samplingGrad)" filter="url(#shadow)" />
      <text y="20" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#93c5fd" text-anchor="middle" x="55">Шаг 4</text>
      <text y="40" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#f8fafc" text-anchor="middle" x="55">Отбор проб</text>
      <text y="58" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#93c5fd" text-anchor="middle" x="55">температура, top-p</text>
    </g>
  </g>

  <!-- Detail box: What xgrammar does -->
  <g transform="translate(30, 210)">
    <rect x="0" y="0" width="420" height="180" rx="12" fill="#1e293b" stroke="#ea580c" stroke-width="2" filter="url(#shadow)" />
    <text y="28" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#fdba74" text-anchor="middle" x="210">Что делает xgrammar (на этапах с 2 по 4)</text>

    <line x1="20" y1="45" x2="400" y2="45" stroke="#94a3b8" stroke-width="1" />

    <!-- Before -->
    <text y="70" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#cbd5e1" x="20">Чистые логиты с GPU:</text>
    <rect x="20" y="80" width="180" height="35" rx="4" fill="#0f172a" stroke="#94a3b8" stroke-width="1" />
    <text y="100" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#cbd5e1" x="30">"true":3.2  "15":2.8  "hello":4.1</text>

    <!-- After -->
    <text y="70" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#cbd5e1" x="220">После маски xgrammar:</text>
    <rect x="220" y="80" width="180" height="35" rx="4" fill="#0f172a" stroke="#94a3b8" stroke-width="1" />
    <text y="100" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#86efac" x="230">"истина":</text>
    <text y="100" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#fca5a5" x="275">-∞</text>
    <text y="100" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#86efac" x="295">"15":2.8  "здравствуйте":</text>
    <text y="100" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#fca5a5" x="381">-∞</text>

    <!-- Explanation -->
    <text y="140" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">Для поля с числом с плавающей точкой допускаются только цифры.</text>
    <text y="158" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">Значения "hello" и "true" имеют вероятность 0 (логит = -∞).</text>
    <text y="176" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#86efac" x="20">Число "15" выбрано, поскольку это максимальное допустимое значение логита.</text>
  </g>

  <!-- Detail box: Two-phase process -->
  <g transform="translate(470, 210)">
    <rect x="0" y="0" width="400" height="180" rx="12" fill="#1e293b" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
    <text y="28" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#93c5fd" text-anchor="middle" x="200">Архитектура xgrammar с двумя фазами</text>

    <line x1="20" y1="45" x2="380" y2="45" stroke="#94a3b8" stroke-width="1" />

    <!-- Phase 1 -->
    <text y="70" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#93c5fd" x="20">Этап 1: Компиляция грамматики (однократно)</text>
    <text y="90" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#cbd5e1" x="30">• JSON Schema → грамматика без контекста</text>
    <text y="105" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#cbd5e1" x="30" transform="translate(-15.22 0.00)">• Построение автомата с нисходящими переходами (обрабатывает вложенность)</text>
    <text y="120" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#cbd5e1" x="30">• Заранее вычислить маски токенов для 99% случаев → сохранить в кэш</text>

    <!-- Phase 2 -->
    <text y="145" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#93c5fd" x="20">Этап 2: Генерация маски во время выполнения (по токену)</text>
    <text y="165" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#cbd5e1" x="30">• Поиск кэшированных масок + проверка токенов, зависящих от контекста</text>
    <text y="180" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#cbd5e1" x="30" transform="translate(-58.91 0.00)">• Применение маски битов к логитам непосредственно в памяти (C++, высокая скорость)</text>
  </g>

  <!-- Bottom: Key insight -->
  <g transform="translate(30, 420)">
    <rect x="0" y="0" width="840" height="160" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />

    <text y="30" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#93c5fd" text-anchor="middle" x="420">💡 Ключевой принцип: пост-форвардинг, предварительная сэмплирование</text>

    <line x1="40" y1="50" x2="800" y2="50" stroke="#2563eb" stroke-width="1" />

    <!-- Three columns -->
    <g transform="translate(40, 65)">
      <rect x="0" y="0" width="240" height="75" rx="8" fill="#1d4ed8" stroke="#2563eb" stroke-width="1" />
      <text y="25" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#93c5fd" text-anchor="middle" x="120">Модель не изменялась</text>
      <text y="45" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" text-anchor="middle" x="120">Процесс передачи данных через GPU</text>
      <text y="60" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" text-anchor="middle" x="120">точно так же, как и без ограничений</text>
    </g>

    <g transform="translate(300, 65)">
      <rect x="0" y="0" width="240" height="75" rx="8" fill="#1d4ed8" stroke="#2563eb" stroke-width="1" />
      <text y="25" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#93c5fd" text-anchor="middle" x="120">Параллельная обработка</text>
      <text y="45" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" text-anchor="middle" x="120">Маска для токена N вычислена</text>
      <text y="60" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" text-anchor="middle" x="120">в то время как GPU вычисляет токен N+1</text>
    </g>

    <g transform="translate(560, 65)">
      <rect x="0" y="0" width="240" height="75" rx="8" fill="#1d4ed8" stroke="#2563eb" stroke-width="1" />
      <text y="25" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#93c5fd" text-anchor="middle" x="120">Практически нулевые расходы</text>
      <text y="45" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" text-anchor="middle" x="120">Применение маски в C++ занимает</text>
      <text y="60" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" text-anchor="middle" x="120">микросекунды против миллисекунд при прямом прохождении</text>
    </g>
  </g>
</svg>
