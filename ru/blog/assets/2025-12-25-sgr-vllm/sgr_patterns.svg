<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Каскад, роутинг, и шаблоны схем типа bounded-list</title>
  <desc id="desc">На трёх картах показано многократное вызовы каскад, дискриминированный объединение роутинг, а также список с ограничениями по количеству элементов, в котором указаны гарантии и ограничения для каждого шаблона.</desc>
  <defs><marker id="arrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#93c5fd" /></marker></defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="520" rx="22" fill="#0f172a" />
  <text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Три шаблона, основанных на схеме</text>

  <g transform="translate(25 85)">
    <rect width="300" height="390" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" />
    <text x="150" y="40" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="700" fill="#93c5fd">Каскад</text>
    <text x="150" y="68" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">Отдельные вызовы формируют реальную границу</text>
    <rect x="42" y="100" width="216" height="52" rx="9" fill="#1d4ed8" />
    <text x="150" y="131" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#93c5fd">Вызов A: CandidateEvidence</text>
    <path d="M150 157 V195" fill="none" stroke="#93c5fd" stroke-width="2" marker-end="url(#arrow)" />
    <text x="172" y="181" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">проверка корректности</text>
    <rect x="42" y="205" width="216" height="52" rx="9" fill="#1d4ed8" />
    <text x="150" y="236" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#93c5fd">Вызов B: CandidateDecision</text>
    <text x="24" y="299" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#93c5fd">Гарантии</text>
    <text x="32" y="324" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#cbd5e1">B получает проверенный результат от A</text>
    <text x="24" y="353" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#fca5a5">Не гарантирует</text>
    <text x="32" y="378" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#cbd5e1">Любой из этих этапов является фактически верным</text>
  </g>

  <g transform="translate(350 85)">
    <rect width="300" height="390" rx="16" fill="#5b21b6" stroke="#2563eb" stroke-width="2" />
    <text x="150" y="40" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="700" fill="#c4b5fd">Роутинг</text>
    <text x="150" y="68" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">Дискриминатор выбирает одну фигуру</text>
    <rect x="65" y="98" width="170" height="48" rx="9" fill="#5b21b6" />
    <text x="150" y="127" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#93c5fd">имя_инструмента</text>
    <path d="M125 147 L76 193" fill="none" stroke="#c4b5fd" stroke-width="2" />
    <path d="M175 147 L224 193" fill="none" stroke="#c4b5fd" stroke-width="2" />
    <rect x="25" y="195" width="115" height="62" rx="9" fill="#7c3aed" />
    <text x="82" y="220" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd">загрузка признаков</text>
    <text x="82" y="241" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="11" fill="#c4b5fd">отсутствуют аргументы модель</text>
    <rect x="160" y="195" width="115" height="62" rx="9" fill="#7c3aed" />
    <text x="217" y="220" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd">отвечать</text>
    <text x="217" y="241" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="11" fill="#c4b5fd">контент</text>
    <text x="24" y="299" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#c4b5fd">Гарантии</text>
    <text x="32" y="324" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#cbd5e1">Ровно одна корректная форма ветви</text>
    <text x="24" y="353" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#fca5a5">Не гарантирует</text>
    <text x="32" y="378" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#cbd5e1">Выбранный маршрут является приемлемым</text>
  </g>

  <g transform="translate(675 85)">
    <rect width="300" height="390" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" />
    <text x="150" y="40" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="700" fill="#93c5fd">ограниченный список</text>
    <text x="150" y="68" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">Коллекция содержит элементы с заданными типами и ограничениями</text>
    <rect x="30" y="108" width="68" height="105" rx="9" fill="#1d4ed8" />
    <text x="64" y="147" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd">Риск 1</text>
    <text x="64" y="171" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#93c5fd">степень серьезности</text>
    <rect x="116" y="108" width="68" height="105" rx="9" fill="#1d4ed8" />
    <text x="150" y="166" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#93c5fd">…</text>
    <rect x="202" y="108" width="68" height="105" rx="9" fill="#1d4ed8" />
    <text x="236" y="147" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd">Уровень риска N</text>
    <text x="236" y="171" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#93c5fd">2 ≤ N ≤ 4</text>
    <text x="24" y="299" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#93c5fd">Гарантии</text>
    <text x="32" y="324" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#cbd5e1">Формы элементов и длина списка</text>
    <text x="24" y="353" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#fca5a5">Не гарантирует</text>
    <text x="32" y="378" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#cbd5e1">Отдельные или надёжно обоснованные факторы</text>
  </g>
</svg>
