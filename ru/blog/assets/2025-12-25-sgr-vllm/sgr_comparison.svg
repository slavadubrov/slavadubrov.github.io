<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550">
  <defs>
    <linearGradient id="promptGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cotGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sgrGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="550" fill="#0f172a" />

  <!-- Title -->
  <text x="450" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#f8fafc" text-anchor="middle">Промпт-инжиниринг vs Chain of Thought vs SGR</text>

  <!-- Column 1: Prompt Engineering -->
  <g transform="translate(30, 70)">
    <rect x="0" y="0" width="270" height="460" rx="16" fill="#1e293b" stroke="#ef4444" stroke-width="3" filter="url(#shadow)" />

    <!-- Header -->
    <rect x="0" y="0" width="270" height="50" rx="16" fill="url(#promptGrad)" />
    <rect x="0" y="35" width="270" height="15" fill="url(#promptGrad)" />
    <text x="135" y="33" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">📝 Промпт-инжиниринг</text>

    <!-- Content -->
    <text x="20" y="80" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fca5a5">Подход:</text>
    <text x="20" y="100" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">"Пожалуйста, выведите в формате JSON"</text>
    <text x="20" y="118" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">"Будьте внимательны к форматированию"</text>

    <line x1="20" y1="135" x2="250" y2="135" stroke="#334155" stroke-width="1" />

    <text x="20" y="160" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fca5a5">Контроль:</text>
    <text x="20" y="180" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Только семантическое убеждение</text>
    <text x="20" y="198" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Механизм внимания модели</text>

    <line x1="20" y1="215" x2="250" y2="215" stroke="#334155" stroke-width="1" />

    <text x="20" y="240" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fca5a5">Вывод:</text>
    <rect x="20" y="250" width="230" height="70" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1" />
    <text x="30" y="270" font-family="monospace" font-size="10" fill="#fca5a5">"Конечно! Скидка — 20%</text>
    <text x="30" y="285" font-family="monospace" font-size="10" fill="#fca5a5">Вот JSON, возможно:</text>
    <text x="30" y="300" font-family="monospace" font-size="10" fill="#fca5a5">{discount: '20%'..."</text>

    <line x1="20" y1="335" x2="250" y2="335" stroke="#334155" stroke-width="1" />

    <text x="20" y="360" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fca5a5">Проблемы:</text>
    <text x="20" y="380" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">❌ Несогласованный формат</text>
    <text x="20" y="398" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">❌ Пропуск шагов рассуждения</text>
    <text x="20" y="416" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">❌ Нужны циклы повторных попыток</text>
    <text x="20" y="434" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">❌ Результат зависит от модели</text>
  </g>

  <!-- Column 2: Chain of Thought -->
  <g transform="translate(315, 70)">
    <rect x="0" y="0" width="270" height="460" rx="16" fill="#1e293b" stroke="#f59e0b" stroke-width="3" filter="url(#shadow)" />

    <!-- Header -->
    <rect x="0" y="0" width="270" height="50" rx="16" fill="url(#cotGrad)" />
    <rect x="0" y="35" width="270" height="15" fill="url(#cotGrad)" />
    <text x="135" y="33" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">🔗 Chain of Thought</text>

    <!-- Content -->
    <text x="20" y="80" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fcd34d">Подход:</text>
    <text x="20" y="100" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">"Давайте думать шаг за шагом"</text>
    <text x="20" y="118" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Промежуточные трассы рассуждений</text>

    <line x1="20" y1="135" x2="250" y2="135" stroke="#334155" stroke-width="1" />

    <text x="20" y="160" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fcd34d">Контроль:</text>
    <text x="20" y="180" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Эвристический промптинг</text>
    <text x="20" y="198" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Модель задаёт структуру</text>

    <line x1="20" y1="215" x2="250" y2="215" stroke="#334155" stroke-width="1" />

    <text x="20" y="240" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fcd34d">Вывод:</text>
    <rect x="20" y="250" width="230" height="70" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1" />
    <text x="30" y="270" font-family="monospace" font-size="10" fill="#fcd34d">Шаг 1: Анализ корзины...</text>
    <text x="30" y="285" font-family="monospace" font-size="10" fill="#fcd34d">Шаг 2: Проверка маржи...</text>
    <text x="30" y="300" font-family="monospace" font-size="10" fill="#fcd34d">Следовательно, скидка 15%.</text>

    <line x1="20" y1="335" x2="250" y2="335" stroke="#334155" stroke-width="1" />

    <text x="20" y="360" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fcd34d">Проблемы:</text>
    <text x="20" y="380" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">⚠️ Неструктурированный прозаический вывод</text>
    <text x="20" y="398" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">⚠️ Трудно надёжно парсить</text>
    <text x="20" y="416" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">⚠️ Переменное число шагов</text>
    <text x="20" y="434" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">⚠️ Многословный расход токенов</text>
  </g>

  <!-- Column 3: Schema-Guided Reasoning -->
  <g transform="translate(600, 70)">
    <rect x="0" y="0" width="270" height="460" rx="16" fill="#1e293b" stroke="#10b981" stroke-width="3" filter="url(#shadow)" />

    <!-- Header -->
    <rect x="0" y="0" width="270" height="50" rx="16" fill="url(#sgrGrad)" />
    <rect x="0" y="35" width="270" height="15" fill="url(#sgrGrad)" />
    <text x="135" y="33" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">📋 Schema-Guided (SGR)</text>

    <!-- Content -->
    <text x="20" y="80" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#6ee7b7">Подход:</text>
    <text x="20" y="100" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Схема Pydantic задаёт шаги</text>
    <text x="20" y="118" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Constrained decoding обеспечивает</text>

    <line x1="20" y1="135" x2="250" y2="135" stroke="#334155" stroke-width="1" />

    <text x="20" y="160" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#6ee7b7">Контроль:</text>
    <text x="20" y="180" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Принуждение на основе грамматики</text>
    <text x="20" y="198" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Разработчик задаёт топологию</text>

    <line x1="20" y1="215" x2="250" y2="215" stroke="#334155" stroke-width="1" />

    <text x="20" y="240" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#6ee7b7">Вывод:</text>
    <rect x="20" y="250" width="230" height="70" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1" />
    <text x="30" y="268" font-family="monospace" font-size="9" fill="#6ee7b7">{"churn_analysis":"Высокий",</text>
    <text x="30" y="282" font-family="monospace" font-size="9" fill="#6ee7b7"> "margin_math":"$200*0.2=$40",</text>
    <text x="30" y="296" font-family="monospace" font-size="9" fill="#6ee7b7"> "max_discount":15.0,</text>
    <text x="30" y="310" font-family="monospace" font-size="9" fill="#6ee7b7"> "offer_code":"SAVE15"}</text>

    <line x1="20" y1="335" x2="250" y2="335" stroke="#334155" stroke-width="1" />

    <text x="20" y="360" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#6ee7b7">Преимущества:</text>
    <text x="20" y="380" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">✓ 100% корректный структурированный вывод</text>
    <text x="20" y="398" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">✓ Аудит по полям</text>
    <text x="20" y="416" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">✓ Работает с меньшими моделями</text>
    <text x="20" y="434" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">✓ Циклы повторов не нужны</text>
  </g>
</svg>
