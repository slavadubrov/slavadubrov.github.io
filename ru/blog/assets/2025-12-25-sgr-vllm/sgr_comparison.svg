<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Инжиниринг промптов против цепочки мышления против SGR</title>
  <desc id="artifact-desc">Инжиниринг промптов против цепочки мышления против SGR.</desc>
  <defs>
    <linearGradient id="promptGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #dc2626;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cotGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #ea580c;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #ea580c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sgrGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #166534;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="900" height="550" fill="#0f172a" />

  <!-- Title -->
  <text y="40" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="bold" fill="#f8fafc" text-anchor="middle" x="450">Инжиниринг промптов против цепочки мышления против SGR</text>

  <!-- Column 1: Prompt Engineering -->
  <g transform="translate(30, 70)">
    <rect x="0" y="0" width="270" height="460" rx="16" fill="#1e293b" stroke="#dc2626" stroke-width="3" filter="url(#shadow)" />

    <!-- Header -->
    <rect x="0" y="0" width="270" height="50" rx="16" fill="url(#promptGrad)" />
    <rect x="0" y="35" width="270" height="15" fill="url(#promptGrad)" />
    <text y="33" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#f8fafc" text-anchor="middle" x="135">📝 Инжиниринг промптов</text>

    <!-- Content -->
    <text y="80" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fca5a5" x="20">Подход:</text>
    <text y="100" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">«Пожалуйста, выведите в формате JSON»</text>
    <text y="118" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">Будьте осторожны с форматированием.</text>

    <line x1="20" y1="135" x2="250" y2="135" stroke="#94a3b8" stroke-width="1" />

    <text y="160" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fca5a5" x="20">Управление:</text>
    <text y="180" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">Только семантическое воздействие</text>
    <text y="198" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">Механизм внимания модели</text>

    <line x1="20" y1="215" x2="250" y2="215" stroke="#94a3b8" stroke-width="1" />

    <text y="240" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fca5a5" x="20">Выход:</text>
    <rect x="20" y="250" width="230" height="70" rx="6" fill="#0f172a" stroke="#94a3b8" stroke-width="1" />
    <text y="270" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#fca5a5" x="30">Конечно! Скидка составляет 20%.</text>
    <text y="285" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#fca5a5" x="30">Вот возможный JSON:</text>
    <text y="300" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#fca5a5" x="30">{discount: '20%'...</text>

    <line x1="20" y1="335" x2="250" y2="335" stroke="#94a3b8" stroke-width="1" />

    <text y="360" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fca5a5" x="20">Проблемы:</text>
    <text y="380" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">❌ Несоответствие формата</text>
    <text y="398" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">❌ Пропущены шаги рассуждения</text>
    <text y="416" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">❌ Требуются циклы повторной попытки</text>
    <text y="434" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">❌ Результаты, зависящие от модели</text>
  </g>

  <!-- Column 2: Chain of Thought -->
  <g transform="translate(315, 70)">
    <rect x="0" y="0" width="270" height="460" rx="16" fill="#1e293b" stroke="#ea580c" stroke-width="3" filter="url(#shadow)" />

    <!-- Header -->
    <rect x="0" y="0" width="270" height="50" rx="16" fill="url(#cotGrad)" />
    <rect x="0" y="35" width="270" height="15" fill="url(#cotGrad)" />
    <text y="33" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#f8fafc" text-anchor="middle" x="135">🔗 Цепочка мыслей</text>

    <!-- Content -->
    <text y="80" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fdba74" x="20">Подход:</text>
    <text y="100" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">«Давайте рассмотрим ситуацию по шагам»</text>
    <text y="118" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">Трассы промежуточных рассуждений</text>

    <line x1="20" y1="135" x2="250" y2="135" stroke="#94a3b8" stroke-width="1" />

    <text y="160" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fdba74" x="20">Управление:</text>
    <text y="180" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">Эвристическое формулирование запросов</text>
    <text y="198" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">Модель определяет структуру</text>

    <line x1="20" y1="215" x2="250" y2="215" stroke="#94a3b8" stroke-width="1" />

    <text y="240" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fdba74" x="20">Выход:</text>
    <rect x="20" y="250" width="230" height="70" rx="6" fill="#0f172a" stroke="#94a3b8" stroke-width="1" />
    <text y="270" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#fdba74" x="30">Шаг 1: Анализ корзины...</text>
    <text y="285" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#fdba74" x="30">Шаг 2: Проверка отступов...</text>
    <text y="300" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#fdba74" x="30">Следовательно, скидка 15%.</text>

    <line x1="20" y1="335" x2="250" y2="335" stroke="#94a3b8" stroke-width="1" />

    <text y="360" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fdba74" x="20">Проблемы:</text>
    <text y="380" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">⚠️ Результат в виде неструктурированного прозаического текста</text>
    <text y="398" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">⚠️ Трудно осуществить надёжную парсингу</text>
    <text y="416" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">⚠️ Переменное количество шагов</text>
    <text y="434" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">⚠️ Высокое потребление токенов</text>
  </g>

  <!-- Column 3: Schema-Guided Reasoning -->
  <g transform="translate(600, 70)">
    <rect x="0" y="0" width="270" height="460" rx="16" fill="#1e293b" stroke="#16a34a" stroke-width="3" filter="url(#shadow)" />

    <!-- Header -->
    <rect x="0" y="0" width="270" height="50" rx="16" fill="url(#sgrGrad)" />
    <rect x="0" y="35" width="270" height="15" fill="url(#sgrGrad)" />
    <text y="33" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#f8fafc" text-anchor="middle" x="135">📋 Руководство схемой (SGR)</text>

    <!-- Content -->
    <text y="80" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#86efac" x="20">Подход:</text>
    <text y="100" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20" transform="translate(-24.71 0.00)">Схема Pydantic определяет последовательность шагов</text>
    <text y="118" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20" transform="translate(-114.38 0.00)">Ограниченное декодирование обеспечивает соблюдение ограничений</text>

    <line x1="20" y1="135" x2="250" y2="135" stroke="#94a3b8" stroke-width="1" />

    <text y="160" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#86efac" x="20">Управление:</text>
    <text y="180" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20" transform="translate(-35.94 0.00)">Обеспечение соблюдения правил на основе грамматики</text>
    <text y="198" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">Разработчик определяет топологию</text>

    <line x1="20" y1="215" x2="250" y2="215" stroke="#94a3b8" stroke-width="1" />

    <text y="240" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#86efac" x="20">Выход:</text>
    <rect x="20" y="250" width="230" height="70" rx="6" fill="#0f172a" stroke="#94a3b8" stroke-width="1" />
    <text y="268" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#86efac" x="30">"анализ оттока":"Высокий"</text>
    <text y="282" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#86efac" x="30"> "margin_math":"$200*0.2=$40",</text>
    <text y="296" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#86efac" x="30"> "макс_скидка":15.0,</text>
    <text y="310" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#86efac" x="30"> "offer_code":"СОКРАЩЕНИЕ15"</text>

    <line x1="20" y1="335" x2="250" y2="335" stroke="#94a3b8" stroke-width="1" />

    <text y="360" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#86efac" x="20">Преимущества:</text>
    <text y="380" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">✓ 100% корректный структурированный вывод</text>
    <text y="398" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">✓ Возможность аудита по отдельным полям</text>
    <text y="416" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">✓ Работает с более мелкими моделями</text>
    <text y="434" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20" transform="translate(-46.68 0.00)">✓ Не требуется использование циклов повторных попыток</text>
  </g>
</svg>
