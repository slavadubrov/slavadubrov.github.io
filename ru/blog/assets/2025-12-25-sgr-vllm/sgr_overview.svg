<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Три уровня реализации в рабочем процессе, ориентированном на схему</title>
  <desc id="desc">Поток с левой на правую сторону разделяет ограниченные формы JSON, границы этапов, контролируемые приложением, и проверки детерминистической семантической политики.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#64748b" /></marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="470" rx="22" fill="#0f172a" />
  <text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Модель управляемой надежности имеет три уровня</text>
  <text x="500" y="78" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#94a3b8">Каждый слой обеспечивает разный уровень гарантий</text>

  <g transform="translate(40 120)">
    <rect width="270" height="245" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" />
    <text x="135" y="40" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="700" fill="#93c5fd">1. Форма выходных данных</text>
    <text x="135" y="72" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#e2e8f0">маска JSON Schema + токен</text>
    <line x1="28" y1="92" x2="242" y2="92" stroke="#2563eb" />
    <text x="28" y="124" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#cbd5e1">Позволяет применять:</text>
    <text x="38" y="151" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">• необходимые ключи и типы</text>
    <text x="38" y="177" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">• перечисления и граничные значения скаляров</text>
    <text x="38" y="203" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">• корректная синтаксис JSON</text>
  </g>

  <path d="M320 243 H352" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />

  <g transform="translate(365 120)">
    <rect width="270" height="245" rx="16" fill="#5b21b6" stroke="#2563eb" stroke-width="2" />
    <text x="135" y="40" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="700" fill="#c4b5fd">2. Топология обработки</text>
    <text x="135" y="72" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#e2e8f0">Приложение оркестрация</text>
    <line x1="28" y1="92" x2="242" y2="92" stroke="#7c3aed" />
    <text x="28" y="124" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#cbd5e1">Может обеспечить соблюдение:</text>
    <text x="38" y="151" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">• отдельные вызовы этапов</text>
    <text x="38" y="177" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">• проверенные входные данные этапа</text>
    <text x="38" y="203" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">• шлюзы авторизации инструментов</text>
  </g>

  <path d="M645 243 H677" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />

  <g transform="translate(690 120)">
    <rect width="270" height="245" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" />
    <text x="135" y="40" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="700" fill="#93c5fd">3. Политика семантики</text>
    <text x="135" y="72" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#e2e8f0">Код + тесты</text>
    <line x1="28" y1="92" x2="242" y2="92" stroke="#1d4ed8" />
    <text x="28" y="124" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#cbd5e1">Позволяет применять:</text>
    <text x="38" y="151" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">• динамические пороги</text>
    <text x="38" y="177" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">• межполевая арифметика</text>
    <text x="38" y="203" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">• доказательства и правила политики</text>
  </g>

  <rect x="160" y="400" width="680" height="42" rx="10" fill="#1e293b" stroke="#94a3b8" />
  <text x="500" y="426" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#cbd5e1">Схема обеспечивает возможность тестирования ответа; она не делает его истинным.</text>
</svg>
