<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Инференс шлюз как политика роутинг граничная область</title>
  <desc id="desc">Клиенты отправляют стабильный контракт и предоставляют свои идентификаторы на шлюз. Шлюз применяет механизмы аутентификации, управления бюджетом, роутинг, ограничения количества попыток, политику кэш и механизм распространения трейс перед тем, как выбрать маршруты с хостингом или самостоятельной реализацией. Все маршруты подключаются к единому механизму оценки.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#94a3b8" /></marker></defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="620" rx="28" fill="#0f172a" />
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Шлюз управляет политикой, а не состоянием задачи</text>
  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <rect x="70" y="230" width="210" height="130" rx="20" fill="#1e293b" />
    <text x="175" y="280" fill="#e2e8f0" font-size="21" font-weight="700">приложение</text><text x="175" y="316" fill="#94a3b8" font-size="14">стабильный контракт</text><text x="175" y="338" fill="#94a3b8" font-size="14">идентичность манифеста</text>
    <path d="M290 295 H350" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <rect x="360" y="145" width="430" height="300" rx="24" fill="#1d4ed8" stroke="#2563eb" stroke-width="3" />
    <text x="575" y="192" fill="#93c5fd" font-size="24" font-weight="700">Инференс шлюз</text>
    <g font-size="16"><rect x="405" y="225" width="150" height="60" rx="14" fill="#1d4ed8" /><text x="480" y="261" fill="#93c5fd">аутентификация + квоты</text><rect x="595" y="225" width="150" height="60" rx="14" fill="#5b21b6" /><text x="670" y="261" fill="#93c5fd">маршрут + регион</text><rect x="405" y="315" width="150" height="60" rx="14" fill="#9a3412" /><text x="480" y="351" fill="#fdba74">повторная попытка + защита от сбоев</text><rect x="595" y="315" width="150" height="60" rx="14" fill="#1d4ed8" /><text x="670" y="351" fill="#93c5fd">кэш + трейс</text></g>
    <path d="M800 230 H855" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <path d="M800 335 H855" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <path d="M800 440 H855" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <rect x="865" y="185" width="265" height="90" rx="18" fill="#5b21b6" /><text x="997" y="222" fill="#93c5fd" font-size="19" font-weight="700">Хостинговый маршрут A</text><text x="997" y="250" fill="#c4b5fd" font-size="14">провайдер + идентичность модель</text>
    <rect x="865" y="290" width="265" height="90" rx="18" fill="#166534" /><text x="997" y="327" fill="#93c5fd" font-size="19" font-weight="700">Самостоятельно развернутый маршрут</text><text x="997" y="355" fill="#93c5fd" font-size="14">идентичность веса + рантайм</text>
    <rect x="865" y="395" width="265" height="90" rx="18" fill="#9a3412" /><text x="997" y="432" fill="#fdba74" font-size="19" font-weight="700">Маршрут резерва</text><text x="997" y="460" fill="#fdba74" font-size="14">явное изменение поведения</text>
    <rect x="300" y="520" width="600" height="62" rx="16" fill="#991b1b" /><text x="600" y="558" fill="#fca5a5" font-size="17" font-weight="700">Оценить каждый маршрут и вариант резервного возврата с учётом контракта задачи</text>
  </g>
</svg>
