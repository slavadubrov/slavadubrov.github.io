<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Клиент</title>
  <desc id="artifact-desc">Клиент.</desc>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="100%" height="100%" fill="#f8fafc" /><style>
    .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; rx: 6; }
    .gateway-box { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 6; }
    .model-box { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 6; }
    .text { font-family: Inter, system-ui, sans-serif; font-size: 14px; fill: #0f172a; text-anchor: middle; dominant-baseline: middle; }
    .path { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .label { font-family: Inter, system-ui, sans-serif; font-size: 12px; fill: #334155; text-anchor: middle; background-color: #f8fafc;}
  </style>

  <rect x="50" y="130" width="100" height="40" class="box" />
  <text y="150" class="text" x="100">Клиент</text>

  <rect x="250" y="130" width="120" height="40" class="gateway-box" />
  <text y="150" class="text" x="310">Шлюз инференса</text>

  <rect x="500" y="50" width="120" height="40" class="model-box" />
  <text y="70" class="text" x="560">Малый (быстрый)</text>

  <rect x="500" y="130" width="120" height="40" class="model-box" />
  <text y="150" class="text" x="560">Большой (точный)</text>

  <rect x="500" y="210" width="120" height="40" class="model-box" />
  <text y="230" class="text" x="560">Экспериментальный</text>

  <path d="M150 150 H250" class="path" />

  <path d="M370 150 L450 70 H500" class="path" />
  <text y="100" class="label" x="420">Низкая задержка</text>

  <path d="M370 150 H500" class="path" />
  <text y="140" class="label" x="435">Сложный</text>

  <path d="M370 150 L450 230 H500" class="path" />
  <text y="200" class="label" x="420">тест A/B</text>

</svg>
