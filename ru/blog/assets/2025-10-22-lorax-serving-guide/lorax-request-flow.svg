<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Путь запроса LoRAX от резолюции адаптера до генерации</title>
  <desc id="desc">Аутентифицированный запрос передаёт ID адаптера из списка разрешённых. LoRAX определяет местоположение устройства, загружает адаптер при необходимости, объединяет совместимые операции в группы, применяет адаптер к общей базе модель и транслирует токены. Отклонённые идентичности и данные обрабатываются по пути ошибки.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="500" rx="22" fill="#0f172a" />
  <text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">путь запроса LoRAX</text>
  <text x="500" y="77" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#94a3b8">Идентичность адаптера представляет собой авторизованный входной параметр роутинг, а не произвольный публичный входной данный</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(25 125)"><rect width="150" height="110" rx="14" fill="#1e293b" stroke="#64748b" /><text x="75" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#f8fafc">шлюз</text><text x="75" y="66" text-anchor="middle" font-size="12" fill="#cbd5e1">аутентификация арендатора</text><text x="75" y="87" text-anchor="middle" font-size="12" fill="#94a3b8">адаптер списка разрешенных элементов</text></g>
    <text x="197" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(220 125)"><rect width="165" height="110" rx="14" fill="#5b21b6" stroke="#2563eb" /><text x="82" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#c4b5fd">Резолвер</text><text x="82" y="66" text-anchor="middle" font-size="12" fill="#cbd5e1">проверка места проживания</text><text x="82" y="87" text-anchor="middle" font-size="12" fill="#94a3b8">загрузка при отсутствии</text></g>
    <text x="407" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(430 125)"><rect width="165" height="110" rx="14" fill="#9a3412" stroke="#ea580c" /><text x="82" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#fdba74">планировщик задач</text><text x="82" y="66" text-anchor="middle" font-size="12" fill="#cbd5e1">очередь по степени готовности</text><text x="82" y="87" text-anchor="middle" font-size="12" fill="#94a3b8">формирование смешанной партии</text></g>
    <text x="617" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(640 125)"><rect width="165" height="110" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="82" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">GPU инференс</text><text x="82" y="66" text-anchor="middle" font-size="12" fill="#cbd5e1">общая база модель</text><text x="82" y="87" text-anchor="middle" font-size="12" fill="#94a3b8">адаптер по запросу</text></g>
    <text x="827" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(850 125)"><rect width="125" height="110" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="62" y="45" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">стрим</text><text x="62" y="75" text-anchor="middle" font-size="12" fill="#93c5fd">результат вывода токены</text></g>

    <g transform="translate(220 315)"><rect width="585" height="105" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="292" y="33" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Отслеживайте траекторию пребывания каждого запроса</text><text x="45" y="66" font-size="13" fill="#cbd5e1">GPU кол-во вызовов</text><text x="160" y="66" font-size="13" fill="#cbd5e1">CPU кол-во вызовов</text><text x="275" y="66" font-size="13" fill="#cbd5e1">Попадание по артефакту</text><text x="410" y="66" font-size="13" fill="#cbd5e1">Отклонение дистанционной атаки</text><text x="45" y="88" font-size="12" fill="#94a3b8">Очередь записей, нагрузка, первый токен, общее количество латентность, а также причина сбоя.</text></g>
    <text x="500" y="465" text-anchor="middle" font-size="13" fill="#fca5a5">Неавторизованный адаптер, несовместимый объект или сбой загрузки → отклонить запрос или использовать явный план резерва</text>
  </g>
</svg>
