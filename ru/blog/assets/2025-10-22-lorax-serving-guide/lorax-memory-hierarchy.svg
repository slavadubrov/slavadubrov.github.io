<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Хранение артефактов адаптера и резидентность рантайм в LoRAX</title>
  <desc id="desc">Артефакты удаленных или локальных адаптеров хранятся в данных кэш, материализуются в памяти CPU и размещаются в памяти GPU рядом с общей базой модель. Стрелки отражают фактически измеренные переходы, а не фиксированные утверждения типа латентность.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="500" rx="22" fill="#0f172a" />
  <text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Хранение артефактов не является тем же, что и резидентность рантайм</text>
  <text x="500" y="78" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#94a3b8">Пропускная способность определяется активным набором данных для обработки и стоимостью каждой транзиции</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(55 125)"><rect width="235" height="210" rx="16" fill="#1e293b" stroke="#64748b" stroke-width="2" /><text x="117" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#e2e8f0">Источник артефакта</text><text x="28" y="82" font-size="14" fill="#cbd5e1">Hugging Face / реестр</text><text x="28" y="113" font-size="14" fill="#cbd5e1">Источник объекта или файловой системы</text><text x="28" y="144" font-size="14" fill="#cbd5e1">Хэш целостности</text><text x="28" y="175" font-size="14" fill="#cbd5e1">метаданные Base-модель</text></g>
    <text x="320" y="240" text-anchor="middle" font-size="28" fill="#94a3b8">→</text>
    <g transform="translate(350 125)"><rect width="235" height="210" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="117" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#93c5fd">Локальный артефакт кэш</text><text x="28" y="82" font-size="14" fill="#cbd5e1">Загруженные файлы адаптера</text><text x="28" y="113" font-size="14" fill="#cbd5e1">Размещён в /data</text><text x="28" y="144" font-size="14" fill="#cbd5e1">Постоянный или временный</text><text x="28" y="175" font-size="14" fill="#cbd5e1">Затраты на чтение + материализацию</text></g>
    <text x="615" y="240" text-anchor="middle" font-size="28" fill="#94a3b8">→</text>
    <g transform="translate(645 125)"><rect width="300" height="210" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="150" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#93c5fd">Рантайм память</text><rect x="28" y="70" width="112" height="105" rx="10" fill="#1d4ed8" /><text x="84" y="101" text-anchor="middle" font-size="14" font-weight="700" fill="#93c5fd">CPU ОЗУ</text><text x="84" y="129" text-anchor="middle" font-size="12" fill="#93c5fd">отгруженный</text><text x="84" y="151" text-anchor="middle" font-size="12" fill="#93c5fd">адаптеры</text><rect x="160" y="70" width="112" height="105" rx="10" fill="#166534" /><text x="216" y="101" text-anchor="middle" font-size="14" font-weight="700" fill="#86efac">GPU VRAM</text><text x="216" y="129" text-anchor="middle" font-size="12" fill="#86efac">базовый + активный</text><text x="216" y="151" text-anchor="middle" font-size="12" fill="#86efac">адаптеры + KV-хранилище</text></g>

    <rect x="135" y="385" width="730" height="58" rx="12" fill="#5b21b6" stroke="#2563eb" />
    <text x="500" y="411" text-anchor="middle" font-size="14" font-weight="700" fill="#c4b5fd">Измеряйте параметры каждой транзиции в рамках вашей нагрузки</text>
    <text x="500" y="432" text-anchor="middle" font-size="12" fill="#93c5fd">Не существует фиксированной схемы «диск → ОЗУ → GPU» латентность, которая была бы одинаковой независимо от размера адаптера, типа хранилища, сети и архитектуры оборудования.</text>
  </g>
</svg>
