<svg xmlns="http://www.w3.org/2000/svg" width="940" height="610" viewBox="0 0 940 610" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Model Quantization Decision Flowchart</title>
  <desc id="desc">A flowchart guiding practitioners from deployment goals to GGUF, NF4, W4A16, INT8, FP8, or NVFP4 serving.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#334155" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M2,2 L8,5 L2,8 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M2,2 L8,5 L2,8 Z" fill="#166534"/>
    </marker>
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd" />
      <stop offset="100%" stop-color="#93c5fd" />
    </linearGradient>
    <linearGradient id="orange-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdba74" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <linearGradient id="green-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#86efac" />
      <stop offset="100%" stop-color="#86efac" />
    </linearGradient>
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd" />
      <stop offset="100%" stop-color="#c4b5fd" />
    </linearGradient>
    <linearGradient id="red-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fca5a5" />
      <stop offset="100%" stop-color="#fca5a5" />
    </linearGradient>
    <style>
      .bg { fill: #f8fafc; }
      .card { filter: url(#shadow); }
      .blue { fill: url(#blue-grad); stroke: #2563eb; stroke-width: 1.2; }
      .orange { fill: url(#orange-grad); stroke: #ea580c; stroke-width: 1.2; }
      .green { fill: url(#green-grad); stroke: #166534; stroke-width: 1.2; }
      .purple { fill: url(#purple-grad); stroke: #7c3aed; stroke-width: 1.2; }
      .red { fill: url(#red-grad); stroke: #dc2626; stroke-width: 1.2; }
      .title { font-style: normal; font-weight: 700; font-size: 13px; font-family: Inter, system-ui, sans-serif; fill: #0f172a; text-anchor: middle; }
      .text { font-style: normal; font-weight: 400; font-size: 11px; font-family: Inter, system-ui, sans-serif; fill: #334155; text-anchor: middle; }
      .tag { font-style: normal; font-weight: 700; font-size: 11px; font-family: Inter, system-ui, sans-serif; fill: #334155; text-anchor: middle; }
      .arrow { stroke: #2563eb; stroke-width: 2.2; fill: none; marker-end: url(#arrow-blue); }
      .arrow-success { stroke: #166534; stroke-width: 2.2; fill: none; marker-end: url(#arrow-green); }
    </style>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect class="bg" width="940" height="610"/>

  <!-- Row 1: Start -->
  <rect class="card blue" x="370" y="25" width="200" height="45" rx="6" />
  <text class="title" y="51" x="470">1. Define Serving Goal</text>

  <!-- Arrow Start -> Q1 -->
  <path class="arrow" d="M470 70 L470 102" />

  <!-- Row 2: Q1 -->
  <rect class="card blue" x="330" y="105" width="280" height="55" rx="6" />
  <text class="title" y="127" x="470">Need fine-tuning or training?</text>
  <text class="text" y="144" x="470">(e.g., adapters / QLoRA / PEFT)</text>

  <!-- Q1 Yes -> QLoRA -->
  <path class="arrow" d="M610 132.5 C680 132.5 700 142.5 742 142.5" />
  <text class="tag" y="125" x="660">Yes</text>

  <rect class="card orange" x="750" y="117.5" width="160" height="50" rx="6" />
  <text class="title" y="139" fill="#9a3412" x="830">bitsandbytes NF4</text>
  <text class="text" y="153" x="830">QLoRA / PEFT default</text>

  <!-- Q1 No -> Q2 -->
  <path class="arrow" d="M470 160 L470 202" />
  <text class="tag" y="185" x="486">No</text>

  <!-- Row 3: Q2 (Constraint) -->
  <rect class="card blue" x="330" y="205" width="280" height="55" rx="6" />
  <text class="title" y="227" x="470">What is your primary constraint?</text>
  <text class="text" y="244" x="470">(VRAM limit vs serving throughput)</text>

  <!-- Q2 Left -> Edge HW -->
  <path class="arrow" d="M330 232.5 C210 232.5 210 270 190 292.5" />
  <text class="tag" y="225" x="250">VRAM Limit / Edge</text>

  <!-- Q2 Right -> Server HW -->
  <path class="arrow" d="M610 232.5 C730 232.5 730 270 750 292.5" />
  <text class="tag" y="225" x="690">High Throughput</text>

  <!-- Row 4: HW Deciders -->
  <!-- Left HW -->
  <rect class="card blue" x="50" y="295" width="280" height="55" rx="6" />
  <text class="title" y="317" x="190">What is the edge architecture?</text>
  <text class="text" y="334" x="190">(CPU, Apple Silicon vs GPU)</text>

  <!-- Right HW -->
  <rect class="card blue" x="610" y="295" width="280" height="55" rx="6" />
  <text class="title" y="317" x="750">What is the server GPU generation?</text>
  <text class="text" y="334" x="750">(Ampere vs Hopper/Ada vs Blackwell)</text>

  <!-- Q3a CPU -> GGUF -->
  <path class="arrow" d="M130 350 C130 375 110 375 110 392" />
  <rect x="90" y="362" width="60" height="16" fill="#ffffff" rx="3" />
  <text class="tag" y="374" x="120">CPU / Mac</text>

  <!-- Q3a GPU -> W4A16 -->
  <path class="arrow" d="M250 350 C250 375 290 375 290 392" />
  <rect x="250" y="362" width="40" height="16" fill="#ffffff" rx="3" />
  <text class="tag" y="374" x="270">GPU</text>

  <!-- Q3b Ampere -> INT8 -->
  <path class="arrow" d="M680 350 C680 375 470 375 470 392" />
  <rect x="545" y="362" width="60" height="16" fill="#ffffff" rx="3" />
  <text class="tag" y="374" x="575">Ampere</text>

  <!-- Q3b Hopper -> FP8 -->
  <path class="arrow" d="M750 350 C750 375 650 375 650 392" />
  <rect x="660" y="362" width="80" height="16" fill="#ffffff" rx="3" />
  <text class="tag" y="374" x="700">Hopper / Ada</text>

  <!-- Q3b Blackwell -> NVFP4 -->
  <path class="arrow" d="M820 350 C820 375 830 375 830 392" />
  <rect x="795" y="362" width="60" height="16" fill="#ffffff" rx="3" />
  <text class="tag" y="374" x="825">Blackwell</text>

  <!-- Row 5: Outputs -->
  <!-- GGUF (Red) -->
  <rect class="card red" x="30" y="395" width="160" height="55" rx="6" />
  <text class="title" y="417" fill="#991b1b" x="110">GGUF Format</text>
  <text class="text" y="433" x="110">llama.cpp / Ollama</text>

  <!-- W4A16 (Green) -->
  <rect class="card green" x="210" y="395" width="160" height="55" rx="6" />
  <text class="title" y="417" fill="#166534" x="290">W4A16 GPTQ / AWQ</text>
  <text class="text" y="433" x="290">Memory-fit default</text>

  <!-- INT8 W8A8 (Green) -->
  <rect class="card green" x="390" y="395" width="160" height="55" rx="6" />
  <text class="title" y="417" fill="#166534" x="470">INT8 SmoothQuant</text>
  <text class="text" y="433" x="470">W8A8 on Ampere</text>

  <!-- FP8 W8A8 (Green) -->
  <rect class="card green" x="570" y="395" width="160" height="55" rx="6" />
  <text class="title" y="417" fill="#166534" x="650">FP8 W8A8</text>
  <text class="text" y="433" x="650">Add FP8 KV cache if needed</text>

  <!-- NVFP4 (Purple) -->
  <rect class="card purple" x="750" y="395" width="160" height="55" rx="6" />
  <text class="title" y="417" fill="#5b21b6" x="830">NVFP4 / MXFP8</text>
  <text class="text" y="433" x="830">Microscaled 4-bit</text>

  <!-- Arrows to Serving engine -->
  <path class="arrow-success" d="M290 450 L290 512" />
  <path class="arrow-success" d="M470 450 L470 512" />
  <path class="arrow-success" d="M650 450 L650 512" />
  <path class="arrow-success" d="M830 450 L830 512" />

  <!-- Row 6: Server serving Engine -->
  <rect class="card green" x="210" y="515" width="700" height="55" rx="6" />
  <text class="title" y="537" fill="#166534" x="560">vLLM Serving Engine</text>
  <text class="text" y="553" x="560">(Native execution utilizing optimized Marlin, Machete, or OCP FP8/FP4 kernels)</text>

</svg>
