<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Карта сравнения алгоритмов квантования и ядер во время выполнения</title>
  <desc id="desc">Диаграмма, иллюстрирующая создание алгоритмом сжатого чекпоинта, при этом ядра во время выполнения определяют скорость обслуживания и результаты тестирования.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#334155" flood-opacity="0.08" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="960" height="520" fill="#f8fafc" />
  <text y="42" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="25" font-weight="700" fill="#0f172a" x="480">Алгоритм + Ядро + Нагрузка = Результат</text>
  <text y="72" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#334155" x="480">Квантизированный чекпоинт не обязательно обеспечивает более быструю развертку.</text>

  <g font-family="Inter, system-ui, sans-serif">
    <rect x="48" y="130" width="210" height="150" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
    <text y="160" text-anchor="middle" font-size="18" font-weight="700" fill="#1d4ed8" x="153">Метод квантования</text>
    <text y="194" text-anchor="middle" font-size="14" fill="#0f172a" x="153">GPTQ</text>
    <text y="220" text-anchor="middle" font-size="14" fill="#0f172a" x="153">AWQ</text>
    <text y="246" text-anchor="middle" font-size="14" fill="#0f172a" x="153">SmoothQuant</text>
    <text y="268" text-anchor="middle" font-size="12" fill="#334155" x="153">определяет ошибку контрольной точки</text>

    <rect x="375" y="130" width="210" height="150" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadow)" />
    <text y="160" text-anchor="middle" font-size="18" font-weight="700" fill="#9a3412" x="480">Ядро во время выполнения</text>
    <text y="194" text-anchor="middle" font-size="14" fill="#0f172a" x="480">Marlin</text>
    <text y="220" text-anchor="middle" font-size="14" fill="#0f172a" x="480">BitBLAS</text>
    <text y="246" text-anchor="middle" font-size="14" fill="#0f172a" x="480">ядра тензоров FP8</text>
    <text y="268" text-anchor="middle" font-size="12" fill="#334155" x="480">определяет путь выполнения</text>

    <rect x="702" y="130" width="210" height="150" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="2" filter="url(#shadow)" />
    <text y="160" text-anchor="middle" font-size="18" font-weight="700" fill="#166534" x="807">Нагрузка</text>
    <text y="194" text-anchor="middle" font-size="14" fill="#0f172a" x="807">длина промпта</text>
    <text y="220" text-anchor="middle" font-size="14" fill="#0f172a" x="807">конкурентность</text>
    <text y="246" text-anchor="middle" font-size="14" fill="#0f172a" x="807">целевое качество</text>
    <text y="268" text-anchor="middle" font-size="12" fill="#334155" x="807">определяет узкое место</text>
  </g>

  <g stroke="#94a3b8" stroke-width="2.3" fill="none" marker-end="url(#arrow)">
    <path d="M 258 205 L 365 205" />
    <path d="M 585 205 L 692 205" />
    <path d="M 807 280 C 807 330 480 325 480 365" />
    <path d="M 480 280 L 480 365" />
    <path d="M 153 280 C 153 330 480 325 480 365" />
  </g>

  <rect x="260" y="365" width="440" height="100" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)" />
  <text y="395" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#334155" x="480">Провести тестирование реальной стек-архитектуры</text>
  <text y="424" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#334155" x="480">качество: перплекситет, метрики задачи, количество генераций</text>
  <text y="448" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#334155" x="480">Обслуживание: пропускная способность, TTFT, ITL, память, конкурентность</text>
</svg>
