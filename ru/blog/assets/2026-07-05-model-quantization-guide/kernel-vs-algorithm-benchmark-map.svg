<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Карта сравнения алгоритмов квантования и ядер во время выполнения</title>
  <desc id="desc">Диаграмма, иллюстрирующая создание алгоритмом сжатого чекпоинта, при этом ядра во время выполнения определяют скорость обслуживания и результаты тестирования.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.16" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#546e7a" />
    </marker>
  </defs>
  <rect width="960" height="520" fill="#f8f9fa" />
  <text x="480" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#263238">Алгоритм + Ядро + Нагрузка = Результат</text>
  <text x="480" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#546e7a">Квантизированный чекпоинт не обязательно обеспечивает более быструю развертку.</text>

  <g font-family="Arial, sans-serif">
    <rect x="48" y="130" width="210" height="150" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" filter="url(#shadow)" />
    <text x="153" y="160" text-anchor="middle" font-size="18" font-weight="700" fill="#1565c0">Метод квантования</text>
    <text x="153" y="194" text-anchor="middle" font-size="14" fill="#263238">GPTQ</text>
    <text x="153" y="220" text-anchor="middle" font-size="14" fill="#263238">AWQ</text>
    <text x="153" y="246" text-anchor="middle" font-size="14" fill="#263238">SmoothQuant</text>
    <text x="153" y="268" text-anchor="middle" font-size="12" fill="#546e7a">определяет ошибку контрольной точки</text>

    <rect x="375" y="130" width="210" height="150" rx="8" fill="#fff3e0" stroke="#e67e22" stroke-width="2" filter="url(#shadow)" />
    <text x="480" y="160" text-anchor="middle" font-size="18" font-weight="700" fill="#e65100">Ядро во время выполнения</text>
    <text x="480" y="194" text-anchor="middle" font-size="14" fill="#263238">Marlin</text>
    <text x="480" y="220" text-anchor="middle" font-size="14" fill="#263238">BitBLAS</text>
    <text x="480" y="246" text-anchor="middle" font-size="14" fill="#263238">ядра тензоров FP8</text>
    <text x="480" y="268" text-anchor="middle" font-size="12" fill="#546e7a">определяет путь выполнения</text>

    <rect x="702" y="130" width="210" height="150" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" filter="url(#shadow)" />
    <text x="807" y="160" text-anchor="middle" font-size="18" font-weight="700" fill="#2e7d32">Нагрузка</text>
    <text x="807" y="194" text-anchor="middle" font-size="14" fill="#263238">длина промпта</text>
    <text x="807" y="220" text-anchor="middle" font-size="14" fill="#263238">конкурентность</text>
    <text x="807" y="246" text-anchor="middle" font-size="14" fill="#263238">целевое качество</text>
    <text x="807" y="268" text-anchor="middle" font-size="12" fill="#546e7a">определяет узкое место</text>
  </g>

  <g stroke="#546e7a" stroke-width="2.3" fill="none" marker-end="url(#arrow)">
    <path d="M 258 205 L 365 205" />
    <path d="M 585 205 L 692 205" />
    <path d="M 807 280 C 807 330 480 325 480 365" />
    <path d="M 480 280 L 480 365" />
    <path d="M 153 280 C 153 330 480 325 480 365" />
  </g>

  <rect x="260" y="365" width="440" height="100" rx="8" fill="#ffffff" stroke="#78909c" stroke-width="1.5" filter="url(#shadow)" />
  <text x="480" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#37474f">Провести тестирование реальной стек-архитектуры</text>
  <text x="480" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#546e7a">качество: перплекситет, метрики задачи, количество генераций</text>
  <text x="480" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#546e7a">Обслуживание: пропускная способность, TTFT, ITL, память, конкурентность</text>
</svg>
