<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Карта считывателя квантования</title>
  <desc id="desc">Карта принятия решений, направляющая узкие места в обработке к выбору способов квантования и проверкам корректности.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.16" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#546e7a" />
    </marker>
  </defs>
  <rect width="960" height="520" fill="#f8f9fa" />
  <text x="480" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#263238">Начните с узкого места</text>
  <text x="480" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#546e7a">Та же ширина бита может оказаться верной или неверной в зависимости от аппаратного обеспечения, среды выполнения, кэша и условий вычислений.</text>

  <rect x="365" y="105" width="230" height="74" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="2" filter="url(#shadow)" />
  <text x="480" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#1565c0">Что ограничивает обслуживание?</text>
  <text x="480" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#37474f">память, вычисления, кэш, время выполнения или пайплайн обработки изображений</text>

  <g font-family="Arial, sans-serif">
    <rect x="45" y="240" width="165" height="118" rx="8" fill="#e3f2fd" stroke="#2980b9" stroke-width="1.5" filter="url(#shadow)" />
    <text x="127" y="267" text-anchor="middle" font-size="15" font-weight="700" fill="#1565c0">Память весов</text>
    <text x="127" y="294" text-anchor="middle" font-size="13" fill="#263238">W4A16 GPTQ/AWQ</text>
    <text x="127" y="318" text-anchor="middle" font-size="12" fill="#546e7a">декодирование, адаптация модели</text>
    <text x="127" y="340" text-anchor="middle" font-size="12" fill="#546e7a">разница качества оценки</text>

    <rect x="230" y="240" width="165" height="118" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadow)" />
    <text x="312" y="267" text-anchor="middle" font-size="15" font-weight="700" fill="#2e7d32">Пропускная способность</text>
    <text x="312" y="294" text-anchor="middle" font-size="13" fill="#263238">FP8 W8A8</text>
    <text x="312" y="318" text-anchor="middle" font-size="12" fill="#546e7a">Ядра Ada/Hopper</text>
    <text x="312" y="340" text-anchor="middle" font-size="12" fill="#546e7a">стенд для тестирования TTFT/ITL</text>

    <rect x="415" y="240" width="165" height="118" rx="8" fill="#fff3e0" stroke="#e67e22" stroke-width="1.5" filter="url(#shadow)" />
    <text x="497" y="267" text-anchor="middle" font-size="15" font-weight="700" fill="#e65100">Длинный контекст</text>
    <text x="497" y="292" text-anchor="middle" font-size="13" fill="#263238">Кэш KV</text>
    <text x="497" y="310" text-anchor="middle" font-size="13" fill="#263238">квантизация</text>
    <text x="497" y="332" text-anchor="middle" font-size="12" fill="#546e7a">Кэш занимает большую часть VRAM</text>
    <text x="497" y="350" text-anchor="middle" font-size="12" fill="#546e7a">восстановление зонда</text>

    <rect x="600" y="240" width="165" height="118" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadow)" />
    <text x="682" y="267" text-anchor="middle" font-size="15" font-weight="700" fill="#6a1b9a">Локальная среда выполнения</text>
    <text x="682" y="294" text-anchor="middle" font-size="13" fill="#263238">GGUF / MLX</text>
    <text x="682" y="318" text-anchor="middle" font-size="12" fill="#546e7a">ЦПУ, Apple, Edge</text>
    <text x="682" y="340" text-anchor="middle" font-size="12" fill="#546e7a">измерение объема локальной ОЗУ</text>

    <rect x="785" y="240" width="130" height="118" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="1.5" filter="url(#shadow)" />
    <text x="850" y="267" text-anchor="middle" font-size="15" font-weight="700" fill="#c62828">Путь к изображению</text>
    <text x="850" y="294" text-anchor="middle" font-size="13" fill="#263238">SVDQuant</text>
    <text x="850" y="318" text-anchor="middle" font-size="12" fill="#546e7a">Чувствительность VAE</text>
    <text x="850" y="340" text-anchor="middle" font-size="12" fill="#546e7a">визуальная оценка</text>
  </g>

  <g stroke="#546e7a" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M 480 179 C 480 205 127 208 127 235" />
    <path d="M 480 179 C 480 207 312 211 312 235" />
    <path d="M 480 179 C 480 210 497 211 497 235" />
    <path d="M 480 179 C 480 207 682 211 682 235" />
    <path d="M 480 179 C 480 205 850 208 850 235" />
  </g>

  <rect x="190" y="405" width="580" height="62" rx="8" fill="#ffffff" stroke="#78909c" stroke-width="1.5" />
  <text x="480" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#37474f">Затем выполните проверки развертывания</text>
  <text x="480" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#546e7a">перплексити + метрики задачи + примеры генерации + тесты на длинный контекст + критерии оценки обслуживания</text>
</svg>
