<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="680" viewBox="0 0 1120 680" role="img" aria-labelledby="title desc">
  <title id="title">Архитектура памяти агента с руководством схемой</title>
  <desc id="desc">Диаграмма потоков в двух каналах. В верхнем канале показан процесс приема данных: поток эпизодов, структурированный извлечение информации, проверка и согласование данных, затем хранение в SGAM. В нижнем канале показано обработка запросов: вопрос пользователя, политика поиска, поиск в базе SGAM, а также формирование контекста и ответа.</desc>
  <defs>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="132%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.14" />
    </filter>
    <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#6a1b9a" />
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1565c0" />
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2e7d32" />
    </marker>
    <style>
      .bg { fill: #f8f9fa; }
      .lane { stroke: #d0d7de; stroke-width: 2; rx: 8; }
      .laneTop { fill: #fbf7ff; stroke: #d7bee6; }
      .laneBottom { fill: #f6fbff; stroke: #bfd8ee; }
      .box { stroke-width: 2; rx: 8; filter: url(#shadow); }
      .blue { fill: #e3f2fd; stroke: #1565c0; }
      .purple { fill: #f3e5f5; stroke: #6a1b9a; }
      .green { fill: #e8f5e9; stroke: #2e7d32; }
      .orange { fill: #fff3e0; stroke: #e65100; }
      .red { fill: #fce4ec; stroke: #c62828; }
      .title { font: 700 24px Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 14px Arial, sans-serif; fill: #374151; }
      .laneLabel { font: 700 16px Arial, sans-serif; fill: #1f2937; }
      .label { font: 700 16px Arial, sans-serif; fill: #1f2937; }
      .small { font: 14px Arial, sans-serif; fill: #374151; }
      .tiny { font: 12px Arial, sans-serif; fill: #4b5563; }
      .arrowWrite { stroke: #6a1b9a; stroke-width: 3; fill: none; marker-end: url(#arrowPurple); }
      .arrowRead { stroke: #1565c0; stroke-width: 3; fill: none; marker-end: url(#arrowBlue); }
      .arrowReturn { stroke: #2e7d32; stroke-width: 3; fill: none; marker-end: url(#arrowGreen); }
      .divider { stroke: #d0d7de; stroke-width: 1.5; stroke-dasharray: 8 8; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1120" height="680" />
  <text class="title" x="42" y="48">У SGAM два потока данных, а не один длинный промпт</text>
  <text class="subtitle" x="42" y="76">Процесс ввода записывает данные в память определённого типа. Запросы считывают минимальный текущий или исторический фрагмент данных.</text>

  <rect class="lane laneTop" x="42" y="108" width="1036" height="224" />
  <rect class="lane laneBottom" x="42" y="372" width="1036" height="224" />

  <text class="laneLabel" x="66" y="139">1. Поток ввода данных (путь записи)</text>
  <line class="divider" x1="66" y1="154" x2="1054" y2="154" />
  <text class="laneLabel" x="66" y="403">2. Поток запросов (путь чтения)</text>
  <line class="divider" x1="66" y1="418" x2="1054" y2="418" />

  <rect class="box blue" x="66" y="188" width="170" height="104" />
  <text class="label" x="88" y="222">стрим эпизода</text>
  <text class="small" x="88" y="250">сообщения, инструменты,</text>
  <text class="small" x="88" y="270">бизнес-события</text>

  <rect class="box purple" x="276" y="178" width="190" height="124" />
  <text class="label" x="298" y="212">структурированный</text>
  <text class="label" x="298" y="232">извлечение</text>
  <text class="small" x="298" y="260">Схема SGR / JSON</text>
  <text class="small" x="298" y="282">кандидаты с введённым текстом</text>

  <rect class="box orange" x="506" y="178" width="120" height="124" />
  <text class="label" x="526" y="212">Проверка</text>
  <text class="label" x="526" y="232">и объединить</text>
  <text class="small" x="526" y="260">удаление дубликатов</text>
  <text class="small" x="526" y="282">дата окончания действия</text>

  <rect class="box green" x="666" y="178" width="190" height="388" />
  <text class="label" x="690" y="212">хранилище SGAM</text>
  <text class="small" x="690" y="242">идентификатор арендатора</text>
  <text class="small" x="690" y="264">версия схемы</text>
  <text class="small" x="690" y="286">дата_начала_действия / дата_окончания_действия</text>
  <text class="small" x="690" y="308">заменяет</text>
  <text class="small" x="690" y="330">идентификатор источника эпизода</text>
  <line x1="690" y1="354" x2="832" y2="354" stroke="#9ccca3" stroke-width="1.5" />
  <text class="tiny" x="690" y="382">Записывает координаты земельного участка здесь</text>
  <text class="tiny" x="690" y="404">Здесь считается количество оставшихся единиц</text>

  <rect class="box blue" x="66" y="452" width="170" height="104" />
  <text class="label" x="88" y="486">Вопрос пользователя</text>
  <text class="small" x="88" y="514">Текущее состояние?</text>
  <text class="small" x="88" y="534">историческое состояние?</text>

  <rect class="box purple" x="276" y="442" width="210" height="124" />
  <text class="label" x="298" y="476">Политика получения данных</text>
  <text class="small" x="298" y="504">фильтр арендатора + типа</text>
  <text class="small" x="298" y="526">активный интервал времени</text>
  <text class="small" x="298" y="548">необязательное расширение векторов</text>

  <rect class="box red" x="884" y="442" width="170" height="124" />
  <text class="label" x="906" y="476">Контекст + ответ</text>
  <text class="small" x="906" y="504">небольшие приведённые факты</text>
  <text class="small" x="906" y="526">исходные данные</text>
  <text class="small" x="906" y="548">отсутствует сброс устаревших записей</text>

  <path class="arrowWrite" d="M236 240 H264" />
  <path class="arrowWrite" d="M466 240 H494" />
  <path class="arrowWrite" d="M626 240 H654" />

  <path class="arrowRead" d="M236 504 H264" />
  <path class="arrowRead" d="M486 504 H654" />
  <path class="arrowReturn" d="M856 504 H884" />

  <text class="tiny" x="42" y="624">Инвариант: структурированные записи и ограниченные чтения — это разные задачи. Векторный поиск может помочь с восстановлением данных, но не должен определять, какой изменяемый факт является актуальным.</text>
</svg>
