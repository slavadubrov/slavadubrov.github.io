<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="680" viewBox="0 0 1120 680" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Архитектура памяти агента с руководством схемой</title>
  <desc id="desc">Диаграмма потоков в двух каналах. В верхнем канале показан процесс приема данных: поток эпизодов, структурированный извлечение информации, проверка и согласование данных, затем хранение в SGAM. В нижнем канале показано обработка запросов: вопрос пользователя, политика поиска, поиск в базе SGAM, а также формирование контекста и ответа.</desc>
  <defs>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="132%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#334155" flood-opacity="0.08" />
    </filter>
    <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#7c3aed" />
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb" />
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#166534" />
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .lane { stroke: #2563eb; stroke-width: 2; rx: 8; }
      .laneTop { fill: #faf5ff; stroke: #7c3aed; }
      .laneBottom { fill: #eff6ff; stroke: #2563eb; }
      .box { stroke-width: 2; rx: 8; filter: url(#shadow); }
      .blue { fill: #eff6ff; stroke: #2563eb; }
      .purple { fill: #faf5ff; stroke: #7c3aed; }
      .green { fill: #f0fdf4; stroke: #166534; }
      .orange { fill: #fff7ed; stroke: #ea580c; }
      .red { fill: #fef2f2; stroke: #dc2626; }
      .title { font-style: normal; font-weight: 700; font-size: 24px; font-family: Inter, system-ui, sans-serif; fill: #1d4ed8; }
      .subtitle { font-style: normal; font-weight: 400; font-size: 14px; font-family: Inter, system-ui, sans-serif; fill: #334155; }
      .laneLabel { font-style: normal; font-weight: 700; font-size: 16px; font-family: Inter, system-ui, sans-serif; fill: #1d4ed8; }
      .label { font-style: normal; font-weight: 700; font-size: 16px; font-family: Inter, system-ui, sans-serif; fill: #1d4ed8; }
      .small { font-style: normal; font-weight: 400; font-size: 14px; font-family: Inter, system-ui, sans-serif; fill: #334155; }
      .tiny { font-style: normal; font-weight: 400; font-size: 12px; font-family: Inter, system-ui, sans-serif; fill: #334155; }
      .arrowWrite { stroke: #7c3aed; stroke-width: 3; fill: none; marker-end: url(#arrowPurple); }
      .arrowRead { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrowBlue); }
      .arrowReturn { stroke: #166534; stroke-width: 3; fill: none; marker-end: url(#arrowGreen); }
      .divider { stroke: #2563eb; stroke-width: 1.5; stroke-dasharray: 8 8; }
    </style>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect class="bg" x="0" y="0" width="1120" height="680" />
  <text class="title" y="48" x="42">У SGAM два потока данных, а не один длинный промпт</text>
  <text class="subtitle" y="76" x="42">Процесс ввода записывает данные в память определённого типа. Запросы считывают минимальный текущий или исторический фрагмент данных.</text>

  <rect class="lane laneTop" x="42" y="108" width="1036" height="224" />
  <rect class="lane laneBottom" x="42" y="372" width="1036" height="224" />

  <text class="laneLabel" y="139" x="66">1. Поток ввода данных (путь записи)</text>
  <line class="divider" x1="66" y1="154" x2="1054" y2="154" />
  <text class="laneLabel" y="403" x="66">2. Поток запросов (путь чтения)</text>
  <line class="divider" x1="66" y1="418" x2="1054" y2="418" />

  <rect class="box blue" x="66" y="188" width="170" height="104" />
  <text class="label" y="222" x="88">стрим эпизода</text>
  <text class="small" y="250" x="88">сообщения, инструменты,</text>
  <text class="small" y="270" x="88">бизнес-события</text>

  <rect class="box purple" x="276" y="178" width="190" height="124" />
  <text class="label" y="212" x="298">структурированный</text>
  <text class="label" y="232" x="298">извлечение</text>
  <text class="small" y="260" x="298">Схема SGR / JSON</text>
  <text class="small" y="282" x="298">кандидаты с введённым текстом</text>

  <rect class="box orange" x="506" y="178" width="120" height="124" />
  <text class="label" y="212" x="526">Проверка</text>
  <text class="label" y="232" x="526">и объединить</text>
  <text class="small" y="260" x="526">удаление дубликатов</text>
  <text class="small" y="282" x="526">дата окончания действия</text>

  <rect class="box green" x="666" y="178" width="190" height="388" />
  <text class="label" y="212" x="690">хранилище SGAM</text>
  <text class="small" y="242" x="690">идентификатор арендатора</text>
  <text class="small" y="264" x="690">версия схемы</text>
  <text class="small" y="286" x="690">дата_начала_действия / дата_окончания_действия</text>
  <text class="small" y="308" x="690">заменяет</text>
  <text class="small" y="330" x="690">идентификатор источника эпизода</text>
  <line x1="690" y1="354" x2="832" y2="354" stroke="#16a34a" stroke-width="1.5" />
  <text class="tiny" y="382" x="690">Записывает координаты земельного участка здесь</text>
  <text class="tiny" y="404" x="690">Здесь считается количество оставшихся единиц</text>

  <rect class="box blue" x="66" y="452" width="170" height="104" />
  <text class="label" y="486" x="88">Вопрос пользователя</text>
  <text class="small" y="514" x="88">Текущее состояние?</text>
  <text class="small" y="534" x="88">историческое состояние?</text>

  <rect class="box purple" x="276" y="442" width="210" height="124" />
  <text class="label" y="476" x="298">Политика получения данных</text>
  <text class="small" y="504" x="298">фильтр арендатора + типа</text>
  <text class="small" y="526" x="298">активный интервал времени</text>
  <text class="small" y="548" x="298">необязательное расширение векторов</text>

  <rect class="box red" x="884" y="442" width="170" height="124" />
  <text class="label" y="476" x="906">Контекст + ответ</text>
  <text class="small" y="504" x="906" transform="translate(-5.19 0.00)">небольшие приведённые факты</text>
  <text class="small" y="526" x="906">исходные данные</text>
  <text class="small" y="548" x="906" transform="translate(-56.19 0.00)">отсутствует сброс устаревших записей</text>

  <path class="arrowWrite" d="M236 240 H264" />
  <path class="arrowWrite" d="M466 240 H494" />
  <path class="arrowWrite" d="M626 240 H654" />

  <path class="arrowRead" d="M236 504 H264" />
  <path class="arrowRead" d="M486 504 H654" />
  <path class="arrowReturn" d="M856 504 H884" />

  <text class="tiny" y="624" x="42" textLength="1108.00" lengthAdjust="spacingAndGlyphs" transform="translate(-36.00 0.00)">Инвариант: структурированные записи и ограниченные чтения — это разные задачи. Векторный поиск может помочь с восстановлением данных, но не должен определять, какой изменяемый факт является актуальным.</text>
</svg>
