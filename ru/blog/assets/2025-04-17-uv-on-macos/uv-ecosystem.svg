<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Четыре границы рабочего процесса обработки UV-данных</title><desc id="desc">Управляемый Python, проекты, скрипты и инструменты командной строки представляют собой четыре отдельных жизненных цикла, управляемых uv. Библиотеки и приложения хоста остаются вне контроля uv и обрабатываются системным менеджером пакетов.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="650" rx="28" fill="#0f172a" />
  <text x="600" y="64" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Один исполняемый файл, разные жизненные циклы</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(70 140)"><rect width="500" height="180" rx="20" fill="#1d4ed8" /><text x="30" y="47" fill="#93c5fd" font-size="23" font-weight="700">Управляемый Python</text><text x="30" y="86" fill="#93c5fd" font-size="17">установка uv в Python / фиксация версии / список установленных версий</text><text x="30" y="123" fill="#93c5fd" font-size="15">распределения интерпретаторов в каталоге данных UV</text><text x="30" y="151" fill="#93c5fd" font-size="15">обнаруживаемый вместе с внешними интерпретаторами</text></g>
    <g transform="translate(630 140)"><rect width="500" height="180" rx="20" fill="#5b21b6" /><text x="30" y="47" fill="#93c5fd" font-size="23" font-weight="700">проект</text><text x="30" y="86" fill="#93c5fd" font-size="17">pyproject.toml + uv.lock → создание виртуальной среды .venv</text><text x="30" y="123" fill="#c4b5fd" font-size="15">общие декларации и процесс разрешения</text><text x="30" y="151" fill="#c4b5fd" font-size="15">одноразовая установленная среда</text></g>
    <g transform="translate(70 365)"><rect width="500" height="180" rx="20" fill="#9a3412" /><text x="30" y="47" fill="#fdba74" font-size="23" font-weight="700">скрипт по PEP 723</text><text x="30" y="86" fill="#fdba74" font-size="17">инлайн-метаданные + необязательный соседний замок</text><text x="30" y="123" fill="#fdba74" font-size="15">единый файл сборки</text><text x="30" y="151" fill="#fdba74" font-size="15">изолированная среда выполнения с кэшированием</text></g>
    <g transform="translate(630 365)"><rect width="500" height="180" rx="20" fill="#166534" /><text x="30" y="47" fill="#93c5fd" font-size="23" font-weight="700">инструмент CLI</text><text x="30" y="86" fill="#93c5fd" font-size="17">uvx кэш или постоянная среда инструментов</text><text x="30" y="123" fill="#93c5fd" font-size="15">изолировано от импортов проекта</text><text x="30" y="151" fill="#93c5fd" font-size="15">Возможность доступа к PATH — только при целенаправленной установке</text></g>
    <rect x="250" y="585" width="700" height="42" rx="14" fill="#1e293b" /><text x="600" y="612" text-anchor="middle" fill="#cbd5e1" font-size="16">Homebrew или macOS по-прежнему управляют хост-приложениями и нативными библиотеками.</text>
  </g>
</svg>
