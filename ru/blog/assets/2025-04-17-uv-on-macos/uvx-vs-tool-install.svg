<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 590" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Выбор между установкой uv run, uvx или инструмента uv</title><desc id="desc">Три колонки направляют инструменты, связанные с проектом, в uv run, изолированные инструменты ad hoc — в uvx, а исполняемые файлы, которые должны оставаться в PATH, — в модуль установки инструмента uv.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="590" rx="28" fill="#0f172a" />
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Выберите среду инструментов в зависимости от того, что она должна обрабатывать</text>
  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <g transform="translate(55 135)"><rect width="340" height="340" rx="22" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="170" y="52" fill="#93c5fd" font-size="23" font-weight="700">прокат UV-модели</text><text x="170" y="92" fill="#93c5fd" font-size="17">связанный с проектом</text><text x="170" y="145" fill="#e2e8f0" font-size="15">импорт кода проекта</text><text x="170" y="178" fill="#e2e8f0" font-size="15">использует заблокированные группы и плагины</text><text x="170" y="211" fill="#e2e8f0" font-size="15">жизненный цикл совпадает с репозиторием</text><rect x="35" y="260" width="270" height="50" rx="12" fill="#1d4ed8" /><text x="170" y="291" fill="#93c5fd" font-size="15">uv run --group test pytest</text></g>
    <g transform="translate(430 135)"><rect width="340" height="340" rx="22" fill="#5b21b6" /><text x="170" y="52" fill="#93c5fd" font-size="23" font-weight="700">uvx</text><text x="170" y="92" fill="#c4b5fd" font-size="17">ад хок + изолированный</text><text x="170" y="145" fill="#e2e8f0" font-size="15">не видит импортов проектов</text><text x="170" y="178" fill="#e2e8f0" font-size="15">среда находится в кэш</text><text x="170" y="211" fill="#e2e8f0" font-size="15">версия штифта для обеспечения воспроизводимости</text><rect x="35" y="260" width="270" height="50" rx="12" fill="#5b21b6" /><text x="170" y="291" fill="#93c5fd" font-size="15">uvx ruff@0.12.0 — проверка .</text></g>
    <g transform="translate(805 135)"><rect width="340" height="340" rx="22" fill="#166534" /><text x="170" y="52" fill="#93c5fd" font-size="23" font-weight="700">установка инструмента UV</text><text x="170" y="92" fill="#93c5fd" font-size="17">перманентный + в PATH</text><text x="170" y="145" fill="#e2e8f0" font-size="15">специализированная среда инструментов</text><text x="170" y="178" fill="#e2e8f0" font-size="15">доступно для других программ</text><text x="170" y="211" fill="#e2e8f0" font-size="15">явный цикл жизни обновления</text><rect x="35" y="260" width="270" height="50" rx="12" fill="#166534" /><text x="170" y="291" fill="#86efac" font-size="15">Установите инструмент uv с командой 'ruff==0.12.0'</text></g>
    <rect x="245" y="515" width="710" height="42" rx="14" fill="#1e293b" /><text x="600" y="542" fill="#cbd5e1" font-size="16">Изоляция представляет собой функцию — осознанно выбирайте уровень видимости проекта.</text>
  </g>
</svg>
