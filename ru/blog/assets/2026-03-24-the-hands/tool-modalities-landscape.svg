<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 560" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Пять способов использования инструментов для ИИ-агентов</title>
  <desc id="artifact-desc">Пять способов использования инструментов для ИИ-агентов.</desc>
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a" x="550">Пять способов использования инструментов для ИИ-агентов</text>
  <text y="50" text-anchor="middle" font-size="11" fill="#64748b" x="550">От развернутых схем к выполнению без дополнительных затрат</text>

  <!-- Central Agent Node -->
  <rect x="460" y="70" width="180" height="50" rx="25" fill="#7c3aed" filter="url(#shadow)" />
  <text y="100" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff" x="550">Агент ИИ</text>

  <!-- Connecting lines from agent to each modality -->
  <line x1="480" y1="120" x2="140" y2="175" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="510" y1="120" x2="360" y2="175" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="550" y1="120" x2="550" y2="175" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="590" y1="120" x2="740" y2="175" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="620" y1="120" x2="960" y2="175" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- 1. JSON Tool Calling -->
  <rect x="30" y="175" width="200" height="130" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
  <text y="200" text-anchor="middle" font-size="13" font-weight="600" fill="#1d4ed8" x="130">Вызов инструмента JSON</text>
  <line x1="50" y1="210" x2="210" y2="210" stroke="#2563eb" stroke-width="0.5" opacity="0.3" />
  <text y="228" text-anchor="middle" font-size="10" fill="#334155" x="130">Схема по запросу</text>
  <text y="244" text-anchor="middle" font-size="10" fill="#334155" x="130">Последовательные вызовы 1:1</text>
  <text y="260" text-anchor="middle" font-size="10" fill="#334155" x="130">Структурированный ввод/вывод</text>
  <rect x="55" y="275" width="150" height="20" rx="4" fill="#2563eb" opacity="0.15" />
  <text y="290" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8" x="130">Средние затраты на обработку</text>

  <!-- 2. MCP -->
  <rect x="255" y="175" width="200" height="130" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2" filter="url(#shadow)" />
  <text y="200" text-anchor="middle" font-size="13" font-weight="600" fill="#991b1b" x="355">Серверы MCP</text>
  <line x1="275" y1="210" x2="435" y2="210" stroke="#dc2626" stroke-width="0.5" opacity="0.3" />
  <text y="228" text-anchor="middle" font-size="10" fill="#334155" x="355">550–1 400 токенов/инструмент</text>
  <text y="244" text-anchor="middle" font-size="10" fill="#334155" x="355">Более 10 тыс. серверов, более 50 уязвимостей CVE</text>
  <text y="260" text-anchor="middle" font-size="10" fill="#334155" x="355">Стандарт межпроизводительского взаимодействия</text>
  <rect x="280" y="275" width="150" height="20" rx="4" fill="#dc2626" opacity="0.15" />
  <text y="290" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b" x="355">Очень высокие накладные расходы</text>

  <!-- 3. Skills (SKILL.md) -->
  <rect x="475" y="175" width="200" height="130" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)" />
  <text y="200" text-anchor="middle" font-size="13" font-weight="600" fill="#5b21b6" x="575">Навыки (SKILL.md)</text>
  <line x1="495" y1="210" x2="655" y2="210" stroke="#7c3aed" stroke-width="0.5" opacity="0.3" />
  <text y="228" text-anchor="middle" font-size="10" fill="#334155" x="575">метаданные примерно 100 токенов</text>
  <text y="244" text-anchor="middle" font-size="10" fill="#334155" x="575">Экспертиза, а не выполнение</text>
  <text y="260" text-anchor="middle" font-size="10" fill="#334155" x="575">Используется 8 и более платформ</text>
  <rect x="500" y="275" width="150" height="20" rx="4" fill="#7c3aed" opacity="0.15" />
  <text y="290" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6" x="575">Очень низкая нагрузка на ресурсы</text>

  <!-- 4. CLI/Bash -->
  <rect x="695" y="175" width="200" height="130" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="2" filter="url(#shadow)" />
  <text y="200" text-anchor="middle" font-size="13" font-weight="600" fill="#166534" x="795">Инструменты CLI / Bash</text>
  <line x1="715" y1="210" x2="875" y2="210" stroke="#166534" stroke-width="0.5" opacity="0.3" />
  <text y="228" text-anchor="middle" font-size="10" fill="#334155" x="795">Манифест примерно 100 токенов</text>
  <text y="244" text-anchor="middle" font-size="10" fill="#334155" x="795">Уровень естественной гибкости модели</text>
  <text y="260" text-anchor="middle" font-size="10" fill="#334155" x="795">Трубопроводы, композиционность</text>
  <rect x="720" y="275" width="150" height="20" rx="4" fill="#166534" opacity="0.15" />
  <text y="290" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="795">Практически нулевые накладные расходы</text>

  <!-- 5. Code Execution (PTC) -->
  <rect x="895" y="175" width="200" height="130" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadow)" />
  <text y="200" text-anchor="middle" font-size="13" font-weight="600" fill="#9a3412" x="995">Выполнение кода</text>
  <line x1="915" y1="210" x2="1075" y2="210" stroke="#ea580c" stroke-width="0.5" opacity="0.3" />
  <text y="228" text-anchor="middle" font-size="10" fill="#334155" x="995" transform="translate(-5.29 0.00)">Сокращение количества токенов на 98,7%</text>
  <text y="244" text-anchor="middle" font-size="10" fill="#334155" x="995">+20% к успеху выполнения задачи</text>
  <text y="260" text-anchor="middle" font-size="10" fill="#334155" x="995">Циклы, условные операторы</text>
  <rect x="920" y="275" width="150" height="20" rx="4" fill="#ea580c" opacity="0.15" />
  <text y="290" text-anchor="middle" font-size="10" font-weight="600" fill="#9a3412" x="995">Минимальная стоимость за задачу</text>

  <!-- Bottom spectrum bar -->
  <text y="340" font-size="10" font-weight="600" fill="#64748b" x="30">Затраты на токены (от самых высоких до самых низких)</text>
  <rect x="30" y="350" width="1060" height="24" rx="12" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" />
  <!-- Gradient fill segments — ordered highest to lowest overhead -->
  <rect x="31" y="351" width="212" height="22" rx="11" fill="#fef2f2" opacity="0.7" />
  <rect x="243" y="351" width="212" height="22" rx="0" fill="#eff6ff" opacity="0.7" />
  <rect x="455" y="351" width="212" height="22" rx="0" fill="#faf5ff" opacity="0.7" />
  <rect x="667" y="351" width="212" height="22" rx="0" fill="#f0fdf4" opacity="0.7" />
  <rect x="879" y="351" width="210" height="22" rx="11" fill="#fff7ed" opacity="0.7" />

  <text y="367" text-anchor="middle" font-size="9" font-weight="600" fill="#991b1b" x="137">55 тыс.+ токенов</text>
  <text y="367" text-anchor="middle" font-size="9" font-weight="600" fill="#1d4ed8" x="349">Средний</text>
  <text y="367" text-anchor="middle" font-size="9" font-weight="600" fill="#5b21b6" x="561">около 100 токенов</text>
  <text y="367" text-anchor="middle" font-size="9" font-weight="600" fill="#166534" x="773">около 100 токенов</text>
  <text y="367" text-anchor="middle" font-size="9" font-weight="600" fill="#9a3412" x="984">2 мета-инструмента</text>

  <!-- Best-for labels -->
  <text y="405" font-size="10" font-weight="600" fill="#64748b" x="30">Идеально подходит для</text>
  <rect x="30" y="415" width="200" height="45" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1" />
  <text y="434" text-anchor="middle" font-size="9" fill="#1d4ed8" x="130">Простой, одношаговый</text>
  <text y="448" text-anchor="middle" font-size="9" fill="#1d4ed8" x="130">Запросы к API</text>

  <rect x="255" y="415" width="200" height="45" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1" />
  <text y="434" text-anchor="middle" font-size="9" fill="#991b1b" x="355">SaaS межпроизводительского типа</text>
  <text y="448" text-anchor="middle" font-size="9" fill="#991b1b" x="355">интеграция</text>

  <rect x="475" y="415" width="200" height="45" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="1" />
  <text y="434" text-anchor="middle" font-size="9" fill="#5b21b6" x="575">Экспертиза в области домена</text>
  <text y="448" text-anchor="middle" font-size="9" fill="#5b21b6" x="575">передача</text>

  <rect x="695" y="415" width="200" height="45" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1" />
  <text y="434" text-anchor="middle" font-size="9" fill="#166534" x="795">Рабочие процессы разработки,</text>
  <text y="448" text-anchor="middle" font-size="9" fill="#166534" x="795">локальные операции</text>

  <rect x="895" y="415" width="200" height="45" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1" />
  <text y="434" text-anchor="middle" font-size="9" fill="#9a3412" x="995">многократный процесс</text>
  <text y="448" text-anchor="middle" font-size="9" fill="#9a3412" x="995">оркестрация</text>

  <!-- Legend -->
  <text y="495" font-size="10" fill="#64748b" x="30">Сдвиг 2026 года: команды по разработке переходят к более эффективным подходам — от сложных схем к выполнению кода в первую очередь</text>
  <line x1="700" y1="488" x2="1060" y2="488" stroke="#ea580c" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow)" />
  <text y="510" text-anchor="middle" font-size="9" font-weight="600" fill="#9a3412" x="880">Направление внедрения производства</text>

  <!-- Sources -->
  <text y="540" font-size="9" fill="#64748b" x="30">Источники: данные токенов MCP — Apideck (apideck.com/blog); более 50 уязвимостей типа CVE — vulnerablemcp.info; CodeAct +20% — Wang и др. (arXiv:2402.01030, ICML 2024);</text>
  <text y="552" font-size="9" fill="#64748b" x="30">Сокращение на 98,7% — Anthropic «Выполнение кода с MCP»; объем данных для навыков ~100 токенов — стандарт SKILL.md; объем данных для CLI ~100 токенов — тестирование Scalekit (scalekit.com/blog)</text>
</svg>
