<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 490" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadowC" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1" />
    </filter>
    <marker id="arrowC" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555" />
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c62828" />
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">Традиционный вызов инструментов против выполнения кода</text>

  <!-- Top: Traditional (red/expensive) -->
  <text x="500" y="60" text-anchor="middle" font-size="13" font-weight="600" fill="#c62828">Традиционный подход: более 20 этапов инференса, все данные проходят через контекст</text>

  <!-- Traditional flow boxes -->
  <rect x="30" y="75" width="110" height="50" rx="6" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" filter="url(#shadowC)" />
  <text x="85" y="96" text-anchor="middle" font-size="10" font-weight="600" fill="#6a1b9a">Звонок LLM 1</text>
  <text x="85" y="110" text-anchor="middle" font-size="9" fill="#888">получить_членов</text>

  <line x1="140" y1="100" x2="165" y2="100" stroke="#c62828" stroke-width="1.5" marker-end="url(#arrowRed)" />

  <rect x="170" y="75" width="80" height="50" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1.5" filter="url(#shadowC)" />
  <text x="210" y="96" text-anchor="middle" font-size="10" font-weight="600" fill="#c62828">Инструмент</text>
  <text x="210" y="110" text-anchor="middle" font-size="9" fill="#888">запрос к API</text>

  <line x1="250" y1="100" x2="275" y2="100" stroke="#c62828" stroke-width="1.5" marker-end="url(#arrowRed)" />

  <rect x="280" y="75" width="110" height="50" rx="6" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" filter="url(#shadowC)" />
  <text x="335" y="96" text-anchor="middle" font-size="10" font-weight="600" fill="#6a1b9a">Звонок LLM 2</text>
  <text x="335" y="110" text-anchor="middle" font-size="9" fill="#888">получить_расходы</text>

  <line x1="390" y1="100" x2="415" y2="100" stroke="#c62828" stroke-width="1.5" marker-end="url(#arrowRed)" />

  <rect x="420" y="75" width="80" height="50" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1.5" filter="url(#shadowC)" />
  <text x="460" y="96" text-anchor="middle" font-size="10" font-weight="600" fill="#c62828">Инструмент</text>
  <text x="460" y="110" text-anchor="middle" font-size="9" fill="#888">запрос к API</text>

  <line x1="500" y1="100" x2="525" y2="100" stroke="#c62828" stroke-width="1.5" marker-end="url(#arrowRed)" />

  <rect x="530" y="75" width="110" height="50" rx="6" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" filter="url(#shadowC)" />
  <text x="585" y="96" text-anchor="middle" font-size="10" font-weight="600" fill="#6a1b9a">Звонок LLM 3</text>
  <text x="585" y="110" text-anchor="middle" font-size="9" fill="#888">обработка данных</text>

  <!-- Dots indicating more -->
  <text x="665" y="105" font-size="20" fill="#c62828">...</text>

  <rect x="700" y="75" width="110" height="50" rx="6" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" filter="url(#shadowC)" />
  <text x="755" y="96" text-anchor="middle" font-size="10" font-weight="600" fill="#6a1b9a">Звонок LLM 20</text>
  <text x="755" y="110" text-anchor="middle" font-size="9" fill="#888">синтезировать</text>

  <!-- Token cost label -->
  <rect x="840" y="78" width="140" height="44" rx="6" fill="#c62828" filter="url(#shadowC)" />
  <text x="910" y="98" text-anchor="middle" font-size="11" font-weight="600" fill="white">около 150 000</text>
  <text x="910" y="114" text-anchor="middle" font-size="10" fill="#ffcdd2">токены</text>

  <!-- Divider -->
  <line x1="30" y1="155" x2="970" y2="155" stroke="#ddd" stroke-width="1" stroke-dasharray="6,3" />
  <text x="500" y="175" text-anchor="middle" font-size="10" fill="#888">против</text>

  <!-- Bottom: Code Execution (green/efficient) -->
  <text x="500" y="205" text-anchor="middle" font-size="13" font-weight="600" fill="#2e7d32">Выполнение кода: 1 проход инференции, данные остаются в песочнице</text>

  <!-- Code execution flow -->
  <rect x="30" y="225" width="160" height="70" rx="6" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" filter="url(#shadowC)" />
  <text x="110" y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#6a1b9a">LLM (1 вызов)</text>
  <text x="110" y="268" text-anchor="middle" font-size="9" fill="#888">Написание скриптов на Python</text>
  <text x="110" y="282" text-anchor="middle" font-size="9" fill="#888">с циклами и логикой</text>

  <line x1="190" y1="260" x2="235" y2="260" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowGreen)" />
  <text x="212" y="252" text-anchor="middle" font-size="8" fill="#2e7d32">код</text>

  <!-- Sandbox box -->
  <rect x="240" y="215" width="520" height="110" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" stroke-dasharray="6,3" filter="url(#shadowC)" />
  <text x="500" y="236" text-anchor="middle" font-size="11" font-weight="600" fill="#2e7d32">Среда выполнения в изолированном контексте</text>

  <!-- Inside sandbox: parallel tool calls -->
  <rect x="265" y="248" width="100" height="55" rx="4" fill="white" stroke="#27ae60" stroke-width="1.5" />
  <text x="315" y="268" text-anchor="middle" font-size="9" font-weight="600" fill="#2e7d32">get_members()</text>
  <text x="315" y="282" text-anchor="middle" font-size="9" fill="#888">для m в members:</text>
  <text x="315" y="295" text-anchor="middle" font-size="9" fill="#888">get_expenses()</text>

  <rect x="385" y="248" width="100" height="55" rx="4" fill="white" stroke="#27ae60" stroke-width="1.5" />
  <text x="435" y="268" text-anchor="middle" font-size="9" font-weight="600" fill="#2e7d32">функция filter()</text>
  <text x="435" y="282" text-anchor="middle" font-size="9" fill="#888">если общая сумма &gt; бюджет:</text>
  <text x="435" y="295" text-anchor="middle" font-size="9" fill="#888">добавить элемент сверх бюджета</text>

  <rect x="505" y="248" width="100" height="55" rx="4" fill="white" stroke="#27ae60" stroke-width="1.5" />
  <text x="555" y="268" text-anchor="middle" font-size="9" font-weight="600" fill="#2e7d32">aggregate()</text>
  <text x="555" y="282" text-anchor="middle" font-size="9" fill="#888">json.dumps(</text>
  <text x="555" y="295" text-anchor="middle" font-size="9" fill="#888">сверх бюджета)</text>

  <!-- Arrows between sandbox stages -->
  <line x1="365" y1="275" x2="380" y2="275" stroke="#27ae60" stroke-width="1" marker-end="url(#arrowGreen)" />
  <line x1="485" y1="275" x2="500" y2="275" stroke="#27ae60" stroke-width="1" marker-end="url(#arrowGreen)" />

  <!-- Data stays label -->
  <rect x="625" y="250" width="120" height="50" rx="4" fill="#2e7d32" opacity="0.1" stroke="#2e7d32" stroke-width="1" />
  <text x="685" y="270" text-anchor="middle" font-size="9" font-weight="600" fill="#2e7d32">тысячи</text>
  <text x="685" y="284" text-anchor="middle" font-size="9" font-weight="600" fill="#2e7d32">обработанные записи</text>
  <text x="685" y="296" text-anchor="middle" font-size="9" fill="#2e7d32">здесь, а не в контексте</text>

  <!-- Output arrow from sandbox -->
  <line x1="760" y1="270" x2="805" y2="270" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowGreen)" />
  <text x="782" y="262" text-anchor="middle" font-size="8" fill="#2e7d32">краткое описание</text>

  <!-- Final result -->
  <rect x="810" y="240" width="160" height="55" rx="6" fill="#2e7d32" filter="url(#shadowC)" />
  <text x="890" y="262" text-anchor="middle" font-size="11" font-weight="600" fill="white">около 2 000 токенов</text>
  <text x="890" y="280" text-anchor="middle" font-size="10" fill="#a5d6a7">Сокращение на 98,7%</text>

  <!-- Bottom comparison -->
  <rect x="100" y="360" width="800" height="85" rx="8" fill="#f8f9fa" stroke="#ddd" stroke-width="1" />
  <text x="500" y="385" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1a2e">Почему выполнение кода остается преимуществом</text>
  <text x="230" y="410" text-anchor="middle" font-size="10" fill="#555">Циклы и условия на нативном уровне</text>
  <text x="230" y="425" text-anchor="middle" font-size="9" fill="#888">Схема JSON не требуется</text>
  <text x="500" y="410" text-anchor="middle" font-size="10" fill="#555">Данные остаются в песочнице</text>
  <text x="500" y="425" text-anchor="middle" font-size="9" fill="#888">Только итоговый результат учитывается в контексте</text>
  <text x="770" y="410" text-anchor="middle" font-size="10" fill="#555">1 проход инференции для N вызовов</text>
  <text x="770" y="425" text-anchor="middle" font-size="9" fill="#888">против традиционных N проходов</text>

  <!-- Sources -->
  <text x="100" y="470" font-size="8" fill="#aaa">Источники: от ~150 тыс. до ~2 тыс. токенов (сокращение на 98,7%) — Anthropic «Выполнение кода с использованием MCP»; повышение успеха выполнения задач на 20% — CodeAct, Wang и др. (arXiv:2402.01030, ICML 2024)</text>
  <text x="100" y="482" font-size="8" fill="#aaa">Пример шаблона PTC — Anthropic «Использование продвинутых инструментов / Программное вызов инструментов»</text>
</svg>
