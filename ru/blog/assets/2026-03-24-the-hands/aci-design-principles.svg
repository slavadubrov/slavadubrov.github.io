<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 580" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadowA" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1" />
    </filter>
    <marker id="arrowA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6a1b9a" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">Принципы дизайна Agent-Computer Interface (ACI)</text>
  <text x="500" y="50" text-anchor="middle" font-size="11" fill="#888">Из SWE-agent (Yang et al., NeurIPS 2024) — +10.7 п.п. на SWE-bench только за счёт дизайна интерфейса</text>

  <!-- Central circle: Agent -->
  <circle cx="500" cy="200" r="55" fill="#6a1b9a" filter="url(#shadowA)" />
  <text x="500" y="195" text-anchor="middle" font-size="14" font-weight="600" fill="white">LLM</text>
  <text x="500" y="212" text-anchor="middle" font-size="11" fill="#e0c0f0">Агент</text>

  <!-- Principle 1: Simple Actions (top-left) -->
  <line x1="455" y1="160" x2="240" y2="100" stroke="#6a1b9a" stroke-width="1.5" marker-end="url(#arrowA)" />
  <rect x="30" y="65" width="220" height="100" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" filter="url(#shadowA)" />
  <text x="50" y="90" font-size="12" font-weight="700" fill="#1565c0">1</text>
  <circle cx="50" cy="86" r="12" fill="none" stroke="#1565c0" stroke-width="2" />
  <text x="76" y="90" font-size="12" font-weight="600" fill="#1565c0">Простые действия</text>
  <text x="140" y="112" text-anchor="middle" font-size="10" fill="#555">Мало опций, краткие доки</text>
  <text x="140" y="126" text-anchor="middle" font-size="10" fill="#555">Демо не нужны</text>
  <text x="140" y="148" text-anchor="middle" font-size="9" font-style="italic" fill="#888">не schedule_event</text>
  <text x="140" y="160" text-anchor="middle" font-size="9" font-style="italic" fill="#888">а list_users + create_event</text>

  <!-- Principle 2: Compact and Efficient (top-right) -->
  <line x1="545" y1="160" x2="760" y2="100" stroke="#6a1b9a" stroke-width="1.5" marker-end="url(#arrowA)" />
  <rect x="750" y="65" width="220" height="100" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="2" filter="url(#shadowA)" />
  <text x="770" y="90" font-size="12" font-weight="700" fill="#e65100">2</text>
  <circle cx="770" cy="86" r="12" fill="none" stroke="#e65100" stroke-width="2" />
  <text x="796" y="90" font-size="12" font-weight="600" fill="#e65100">Компактно и эффективно</text>
  <text x="860" y="112" text-anchor="middle" font-size="10" fill="#555">Объединяйте операции</text>
  <text x="860" y="126" text-anchor="middle" font-size="10" fill="#555">Меньше round-trip</text>
  <text x="860" y="148" text-anchor="middle" font-size="9" font-style="italic" fill="#888">search_logs с фильтрами, не</text>
  <text x="860" y="160" text-anchor="middle" font-size="9" font-style="italic" fill="#888">read_logs + grep</text>

  <!-- Principle 3: Informative Feedback (bottom-left) -->
  <line x1="455" y1="240" x2="240" y2="320" stroke="#6a1b9a" stroke-width="1.5" marker-end="url(#arrowA)" />
  <rect x="30" y="290" width="220" height="100" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" filter="url(#shadowA)" />
  <text x="50" y="315" font-size="12" font-weight="700" fill="#2e7d32">3</text>
  <circle cx="50" cy="311" r="12" fill="none" stroke="#2e7d32" stroke-width="2" />
  <text x="76" y="315" font-size="12" font-weight="600" fill="#2e7d32">Краткая обратная связь</text>
  <text x="140" y="337" text-anchor="middle" font-size="10" fill="#555">Содержательно, не многословно</text>
  <text x="140" y="351" text-anchor="middle" font-size="10" fill="#555">Машиночитаемый вывод</text>
  <text x="140" y="373" text-anchor="middle" font-size="9" font-style="italic" fill="#888">Возвращайте semantic ID, не</text>
  <text x="140" y="385" text-anchor="middle" font-size="9" font-style="italic" fill="#888">raw HTML или полные payload</text>

  <!-- Principle 4: Error Guardrails (bottom-right) -->
  <line x1="545" y1="240" x2="760" y2="320" stroke="#6a1b9a" stroke-width="1.5" marker-end="url(#arrowA)" />
  <rect x="750" y="290" width="220" height="100" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="2" filter="url(#shadowA)" />
  <text x="770" y="315" font-size="12" font-weight="700" fill="#c62828">4</text>
  <circle cx="770" cy="311" r="12" fill="none" stroke="#c62828" stroke-width="2" />
  <text x="796" y="315" font-size="12" font-weight="600" fill="#c62828">Защита от ошибок</text>
  <text x="860" y="337" text-anchor="middle" font-size="10" fill="#555">Автовыявление ошибок</text>
  <text x="860" y="351" text-anchor="middle" font-size="10" fill="#555">Предотвращайте каскад ошибок</text>
  <text x="860" y="373" text-anchor="middle" font-size="9" font-style="italic" fill="#888">Linter ловит 51.7%</text>
  <text x="860" y="385" text-anchor="middle" font-size="9" font-style="italic" fill="#888">ошибок правок агента (SWE-agent)</text>

  <!-- Bottom result bar -->
  <rect x="100" y="440" width="800" height="55" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" filter="url(#shadowA)" />
  <text x="500" y="463" text-anchor="middle" font-size="13" font-weight="600" fill="#6a1b9a">Эффект: 18.0% vs 7.3% на SWE-bench Lite</text>
  <text x="500" y="483" text-anchor="middle" font-size="11" fill="#555">+10.7 п.п. только от дизайна ACI — без изменений модели</text>

  <!-- Connection labels -->
  <text x="340" y="120" text-anchor="middle" font-size="9" fill="#6a1b9a" transform="rotate(-15, 340, 120)">использует инструменты</text>
  <text x="660" y="120" text-anchor="middle" font-size="9" fill="#6a1b9a" transform="rotate(15, 660, 120)">читает вывод</text>
  <text x="340" y="300" text-anchor="middle" font-size="9" fill="#6a1b9a" transform="rotate(15, 340, 300)">получает обратную связь</text>
  <text x="660" y="300" text-anchor="middle" font-size="9" fill="#6a1b9a" transform="rotate(-15, 660, 300)">восстановление после ошибок</text>

  <!-- Source -->
  <text x="500" y="530" text-anchor="middle" font-size="8" fill="#aaa">Источник: Yang, Jimenez et al., "SWE-agent: Agent-Computer Interfaces Enable Automated Software Engineering" (arXiv:2405.15793, NeurIPS 2024)</text>
  <text x="500" y="545" text-anchor="middle" font-size="8" fill="#aaa">Принципы приняты Anthropic в "Building Effective Agents" (дек. 2024)</text>
</svg>
