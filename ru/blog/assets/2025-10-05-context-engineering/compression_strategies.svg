<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Компрессия контекста с учётом потерь с отдельными индексами канонического состояния и артефактов</title>
  <desc id="desc">Результаты диалогов и наблюдений обрабатываются с целью формирования компактного набора данных для работы, в то время как каноническое состояние задачи, ссылки на доказательства и история изменений объектов сохраняются отдельно для возможности точного восстановления.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="440" rx="22" fill="#0f172a" /><text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Сжать представление данных; сохранить возможность восстановления состояния</text>
  <g font-family="Inter, system-ui, sans-serif"><g transform="translate(35 105)"><rect width="260" height="230" rx="16" fill="#1e293b" stroke="#64748b" /><text x="130" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#e2e8f0">Растущий контекст</text><text x="30" y="83" font-size="13" fill="#cbd5e1">переходы в диалоге</text><text x="30" y="116" font-size="13" fill="#cbd5e1">наблюдения инструмента в сыром виде</text><text x="30" y="149" font-size="13" fill="#cbd5e1">выделенные фрагменты</text><text x="30" y="182" font-size="13" fill="#cbd5e1">повторяющийся шаблон кода</text></g><text x="325" y="225" font-size="25" fill="#94a3b8">→</text>
  <g transform="translate(365 105)"><rect width="270" height="230" rx="16" fill="#1d4ed8" stroke="#2563eb" /><text x="135" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#93c5fd">Компактный набор данных для обработки</text><text x="30" y="83" font-size="13" fill="#93c5fd">решения + следующие действия</text><text x="30" y="116" font-size="13" fill="#93c5fd">результаты анализа введённых данных</text><text x="30" y="149" font-size="13" fill="#93c5fd">ссылки на исходный код и результаты обработки</text><text x="30" y="182" font-size="13" fill="#93c5fd">нерешённые вопросы</text></g><text x="665" y="225" font-size="25" fill="#94a3b8">+</text>
  <g transform="translate(705 85)"><rect width="260" height="270" rx="16" fill="#1d4ed8" stroke="#2563eb" /><text x="130" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#93c5fd">Канонические хранилища</text><text x="30" y="83" font-size="13" fill="#93c5fd">состояние задачи</text><text x="30" y="116" font-size="13" fill="#93c5fd">индекс файлов и артефактов</text><text x="30" y="149" font-size="13" fill="#93c5fd">результаты полного анализа инструмента</text><text x="30" y="182" font-size="13" fill="#93c5fd">версии доказательств</text><text x="30" y="225" font-size="12" fill="#93c5fd">Повторная загрузка точных деталей</text><text x="30" y="247" font-size="12" fill="#93c5fd">когда задача этого требует.</text></g><text x="500" y="400" text-anchor="middle" font-size="13" fill="#94a3b8">Оптимизировать общее количество токены за одну успешно выполненную задачу, включая повторный запрос и восстановление данных.</text></g>
</svg>
