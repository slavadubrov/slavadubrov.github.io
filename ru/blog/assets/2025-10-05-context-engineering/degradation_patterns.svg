<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Шаблоны деградации контекста</title>
  <desc id="artifact-desc">Шаблоны деградации контекста.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
    <style>
        .bg { fill: #0f172a; }
        .title { fill: #f8fafc; font-family: Inter, system-ui, sans-serif; font-size: 20px; font-weight: bold; text-anchor: middle; }
        .card { rx: 10; ry: 10; }
        .card-title { fill: #f8fafc; font-family: Inter, system-ui, sans-serif; font-size: 14px; font-weight: bold; text-anchor: middle; }
        .card-text { fill: #cbd5e1; font-family: Inter, system-ui, sans-serif; font-size: 11px; text-anchor: middle; }
        .icon { fill: #f8fafc; font-family: Inter, system-ui, sans-serif; font-size: 24px; text-anchor: middle; }
    </style>

    <rect width="100%" height="100%" class="bg" />

    <text y="40" class="title" x="450">Шаблоны деградации контекста</text>

    <!-- Pattern 1: Lost-in-Middle -->
    <g transform="translate(50, 80)">
        <rect x="0" y="0" width="250" height="180" class="card" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" />
        <text y="35" class="icon" x="125">📉</text>
        <text y="65" class="card-title" x="125" transform="translate(4.05 0.00)">Проблема потери сигнала в середине диапазона</text>
        <line x1="30" y1="80" x2="220" y2="80" stroke="#2563eb" stroke-width="1" opacity="0.5" />
        <text y="100" class="card-text" x="125">Информация в центре</text>
        <text y="115" class="card-text" x="125">получает меньше внимания</text>
        <text y="140" class="card-text" style="fill: #86efac; font-weight: bold;" x="125">Исправление: разместить критическую информацию</text>
        <text y="155" class="card-text" style="fill: #86efac;" x="125">в начале или в конце</text>
    </g>

    <!-- Pattern 2: Context Poisoning -->
    <g transform="translate(325, 80)">
        <rect x="0" y="0" width="250" height="180" class="card" fill="#991b1b" stroke="#dc2626" stroke-width="2" />
        <text y="35" class="icon" x="125">☠️</text>
        <text y="65" class="card-title" x="125">Отравление контекста</text>
        <line x1="30" y1="80" x2="220" y2="80" stroke="#dc2626" stroke-width="1" opacity="0.5" />
        <text y="100" class="card-text" x="125">Ошибки нарастают по мере возникновения новых</text>
        <text y="115" class="card-text" x="125">повторное обращение</text>
        <text y="140" class="card-text" style="fill: #86efac; font-weight: bold;" x="125">Исправление: проверка результатов работы инструмента.</text>
        <text y="155" class="card-text" style="fill: #86efac;" x="125">перезапуск при заражении</text>
    </g>

    <!-- Pattern 3: Context Distraction -->
    <g transform="translate(600, 80)">
        <rect x="0" y="0" width="250" height="180" class="card" fill="#166534" stroke="#ea580c" stroke-width="2" />
        <text y="35" class="icon" x="125">🔀</text>
        <text y="65" class="card-title" x="125">Отвлекающий фактор контекста</text>
        <line x1="30" y1="80" x2="220" y2="80" stroke="#ea580c" stroke-width="1" opacity="0.5" />
        <text y="100" class="card-text" x="125">Не связанная информация мешает работе</text>
        <text y="115" class="card-text" x="125">для бюджета внимания</text>
        <text y="140" class="card-text" style="fill: #86efac; font-weight: bold;" x="125">Исправление: использовать агрессивную фильтрацию.</text>
        <text y="155" class="card-text" style="fill: #86efac;" x="125">использовать оценку релевантности</text>
    </g>

    <!-- Pattern 4: Context Confusion -->
    <g transform="translate(125, 290)">
        <rect x="0" y="0" width="250" height="180" class="card" fill="#5b21b6" stroke="#7c3aed" stroke-width="2" />
        <text y="35" class="icon" x="125">🌀</text>
        <text y="65" class="card-title" x="125">Путаница контекста</text>
        <line x1="30" y1="80" x2="220" y2="80" stroke="#7c3aed" stroke-width="1" opacity="0.5" />
        <text y="100" class="card-text" x="125">Модель применяется неправильно</text>
        <text y="115" class="card-text" x="125">контекст текущей задачи</text>
        <text y="140" class="card-text" style="fill: #86efac; font-weight: bold;" x="125">Исправление: сегментация задач.</text>
        <text y="155" class="card-text" style="fill: #86efac;" x="125">чистые переходы</text>
    </g>

    <!-- Pattern 5: Context Clash -->
    <g transform="translate(525, 290)">
        <rect x="0" y="0" width="250" height="180" class="card" fill="#166534" stroke="#16a34a" stroke-width="2" />
        <text y="35" class="icon" x="125">⚔️</text>
        <text y="65" class="card-title" x="125">Конфликт контекста</text>
        <line x1="30" y1="80" x2="220" y2="80" stroke="#16a34a" stroke-width="1" opacity="0.5" />
        <text y="100" class="card-text" x="125">Противоречивая информация</text>
        <text y="115" class="card-text" x="125">создаёт противоречивые рекомендации</text>
        <text y="140" class="card-text" style="fill: #86efac; font-weight: bold;" x="125">Исправление: правила приоритета,</text>
        <text y="155" class="card-text" style="fill: #86efac;" x="125">фильтрация версий</text>
    </g>
</svg>
