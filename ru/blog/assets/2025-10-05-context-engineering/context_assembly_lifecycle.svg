<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Контекст формируется на основе ограниченного retrieval, планирования бюджета, выполнения задач и проверки корректности</title>
  <desc id="desc">Состояния доверенных запросов проходят через этап выбора решения, авторизацию с использованием retrieval, бюджетирование на основе показателей эффективности, подготовку предложений по модель, детерминистическую верификацию и выполнение, а затем фиксацию происхождения данных и результата.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="460" rx="22" fill="#0f172a" />
  <text x="500" y="46" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Сбор контекста — это этап жизненного цикла на уровне каждого решения</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(25 115)"><rect width="150" height="110" rx="14" fill="#1e293b" stroke="#64748b" /><text x="75" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#e2e8f0">Доверенный запрос</text><text x="75" y="63" text-anchor="middle" font-size="11" fill="#cbd5e1">актор, тенант, задача</text><text x="75" y="84" text-anchor="middle" font-size="11" fill="#94a3b8">локаль + время</text></g><text x="192" y="180" text-anchor="middle" font-size="22" fill="#94a3b8">→</text>
    <g transform="translate(210 115)"><rect width="150" height="110" rx="14" fill="#5b21b6" stroke="#2563eb" /><text x="75" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#c4b5fd">Выбор решения</text><text x="75" y="63" text-anchor="middle" font-size="11" fill="#93c5fd">планирование, извлечение, выполнение действий</text><text x="75" y="84" text-anchor="middle" font-size="11" fill="#94a3b8">или ответить</text></g><text x="377" y="180" text-anchor="middle" font-size="22" fill="#94a3b8">→</text>
    <g transform="translate(395 115)"><rect width="150" height="110" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="75" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#93c5fd">Область применения + получение данных</text><text x="75" y="63" text-anchor="middle" font-size="11" fill="#93c5fd">сначала выполнить авторизацию</text><text x="75" y="84" text-anchor="middle" font-size="11" fill="#94a3b8">рейтинг доказательств</text></g><text x="562" y="180" text-anchor="middle" font-size="22" fill="#94a3b8">→</text>
    <g transform="translate(580 115)"><rect width="150" height="110" rx="14" fill="#9a3412" stroke="#ea580c" /><text x="75" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#fdba74">Бюджет + сборка</text><text x="75" y="63" text-anchor="middle" font-size="11" fill="#fdba74">утилитарность, свежесть</text><text x="75" y="84" text-anchor="middle" font-size="11" fill="#94a3b8">границы доверия</text></g><text x="747" y="180" text-anchor="middle" font-size="22" fill="#94a3b8">→</text>
    <g transform="translate(765 115)"><rect width="210" height="110" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="105" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#93c5fd">Предложить → проверить → применить</text><text x="105" y="63" text-anchor="middle" font-size="11" fill="#93c5fd">вывод с типизацией + политика</text><text x="105" y="84" text-anchor="middle" font-size="11" fill="#94a3b8">условия после выполнения инструмента</text></g>
    <rect x="120" y="300" width="760" height="85" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="500" y="331" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Записываются манифест, происхождение данных, результаты верификации и итоги выполнения задачи</text><text x="500" y="360" text-anchor="middle" font-size="12" fill="#93c5fd">Следующее решение получает новый набор данных для обработки вместо того, чтобы наследовать всё существующее.</text>
    <text x="500" y="425" text-anchor="middle" font-size="13" fill="#94a3b8">Вызов модель представляет собой один из этапов внутри политики контекста, а не саму политику.</text>
  </g>
</svg>
