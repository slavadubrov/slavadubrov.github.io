<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 450" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Иерархия инструкций</title>
  <desc id="artifact-desc">Иерархия инструкций.</desc>
<defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
</defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
<rect width="100%" height="100%" fill="#0f172a" />

<text y="30" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="20px" font-weight="bold" text-anchor="middle" x="350">Иерархия инструкций</text>

<!-- 1. System Policy -->
<g transform="translate(125, 60)">
    <rect x="0" y="0" width="450" height="80" rx="6" ry="6" fill="#991b1b" stroke="#dc2626" stroke-width="2" />
    <text y="30" fill="#fca5a5" font-family="Inter, system-ui, sans-serif" font-size="14px" font-weight="bold" text-anchor="start" x="20">1. Политика системы</text>
    <text y="55" fill="#fca5a5" font-family="Inter, system-ui, sans-serif" font-size="12px" text-anchor="start" x="20">Вы — полезный ассистент. Никогда не раскрывайте секреты.</text>
</g>

<!-- Arrow -->
<line x1="350" y1="140" x2="350" y2="160" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />

<!-- 2. Developer Guidelines -->
<g transform="translate(125, 160)">
    <rect x="0" y="0" width="450" height="80" rx="6" ry="6" fill="#9a3412" stroke="#ea580c" stroke-width="2" />
    <text y="30" fill="#fdba74" font-family="Inter, system-ui, sans-serif" font-size="14px" font-weight="bold" text-anchor="start" x="20">2. Руководство для разработчиков</text>
    <text y="55" fill="#fdba74" font-family="Inter, system-ui, sans-serif" font-size="12px" text-anchor="start" x="20">Выход в формате JSON. Использовать краткий стиль. Указывать источники.</text>
</g>

<!-- Arrow -->
<line x1="350" y1="240" x2="350" y2="260" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />

<!-- 3. User Task -->
<g transform="translate(125, 260)">
    <rect x="0" y="0" width="450" height="80" rx="6" ry="6" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" />
    <text y="30" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="14px" font-weight="bold" text-anchor="start" x="20">3. Задача пользователя</text>
    <text y="55" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="12px" text-anchor="start" x="20">Почему мой ключ API не работает?</text>
</g>

<!-- Arrow -->
<line x1="350" y1="340" x2="350" y2="360" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />

<!-- Model -->
<g transform="translate(250, 360)">
    <rect x="0" y="0" width="200" height="50" rx="25" ry="25" fill="#5b21b6" stroke="#7c3aed" stroke-width="2" />
    <text y="30" fill="#c4b5fd" font-family="Inter, system-ui, sans-serif" font-size="14px" font-weight="bold" text-anchor="middle" x="100">Обработка модели</text>
</g>

<!-- Side Note -->
<g transform="translate(600, 200)">
    <text y="0" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="12px" text-anchor="start" x="0" transform="translate(-117.72 0.00)">Переопределение направления потока вниз:</text>
    <text y="20" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="12px" text-anchor="start" x="0" transform="translate(-81.22 0.00)">Система &gt; Разработка &gt; Пользователь</text>
</g>

</svg>
