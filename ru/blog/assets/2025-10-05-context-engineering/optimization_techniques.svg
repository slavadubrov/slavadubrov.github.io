<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Техники оптимизации контекста</title>
  <desc id="artifact-desc">Техники оптимизации контекста.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
    <style>
        .bg { fill: #0f172a; }
        .title { fill: #f8fafc; font-family: Inter, system-ui, sans-serif; font-size: 22px; font-weight: bold; text-anchor: middle; }
        .subtitle { fill: #cbd5e1; font-family: Inter, system-ui, sans-serif; font-size: 13px; text-anchor: middle; }
        .card { rx: 12; ry: 12; }
        .card-title { fill: #f8fafc; font-family: Inter, system-ui, sans-serif; font-size: 15px; font-weight: bold; text-anchor: middle; }
        .card-desc { fill: #cbd5e1; font-family: Inter, system-ui, sans-serif; font-size: 11px; text-anchor: middle; }
        .metric { fill: #166534; font-family: Inter, system-ui, sans-serif; font-size: 13px; font-weight: bold; text-anchor: middle; }
        .metric-box { fill: #0f172a; rx: 6; ry: 6; }
        .use-case { fill: #94a3b8; font-family: Inter, system-ui, sans-serif; font-size: 10px; text-anchor: middle; font-style: italic; }
        .section-label { fill: #334155; font-family: Inter, system-ui, sans-serif; font-size: 11px; font-weight: bold; text-anchor: start; }
        .result-box { fill: #166534; stroke: #16a34a; stroke-width: 2; rx: 10; ry: 10; }
        .result-text { fill: #86efac; font-family: Inter, system-ui, sans-serif; font-size: 14px; font-weight: bold; text-anchor: middle; }
        .flow-line { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 5 5; }
        .number { fill: #f8fafc; font-family: Inter, system-ui, sans-serif; font-size: 14px; font-weight: bold; }
    </style>

    <rect width="100%" height="100%" class="bg" />

    <!-- Title -->
    <text y="35" class="title" x="450">Техники оптимизации контекста</text>
    <text y="58" class="subtitle" x="450">Четыре стратегии для увеличения эффективной ёмкости контекста в 2–3 раза без использования более крупных моделей</text>

    <!-- Horizontal flow line -->
    <line x1="50" y1="260" x2="850" y2="260" class="flow-line" />

    <!-- Technique 1: Compaction -->
    <g transform="translate(30, 90)">
        <rect x="0" y="0" width="195" height="150" class="card" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" />
        <circle cx="25" cy="25" r="15" fill="#2563eb" />
        <text y="30" class="number" text-anchor="middle" x="25">1</text>
        <text y="30" class="card-title" x="105">Сжатие</text>
        <line x1="15" y1="45" x2="180" y2="45" stroke="#2563eb" stroke-width="1" opacity="0.4" />
        <text y="68" class="card-desc" x="97">Кратко описать контекст при необходимости</text>
        <text y="83" class="card-desc" x="97">приближение к пределам окна</text>
        <text y="98" class="card-desc" x="97">Перезапустить с кратким описанием</text>
        <rect x="25" y="110" width="145" height="28" class="metric-box" stroke="#2563eb" stroke-width="1" />
        <text y="129" class="metric" x="97" transform="translate(26.15 0.00)">Сокращение количества токенов на 50–70%</text>
    </g>

    <!-- Technique 2: Observation Masking -->
    <g transform="translate(245, 90)">
        <rect x="0" y="0" width="195" height="150" class="card" fill="#5b21b6" stroke="#7c3aed" stroke-width="2" />
        <circle cx="25" cy="25" r="15" fill="#7c3aed" />
        <text y="30" class="number" text-anchor="middle" x="25">2</text>
        <text y="30" class="card-title" x="105">Маскировка наблюдений</text>
        <line x1="15" y1="45" x2="180" y2="45" stroke="#7c3aed" stroke-width="1" opacity="0.4" />
        <text y="68" class="card-desc" x="97">Замена результатов работы инструмента</text>
        <text y="83" class="card-desc" x="97">с компактными ссылками</text>
        <text y="98" class="card-desc" x="97">Результаты работы инструмента = 80% токенов</text>
        <rect x="25" y="110" width="145" height="28" class="metric-box" stroke="#7c3aed" stroke-width="1" />
        <text y="129" class="metric" x="97">Сокращение на 60–80%</text>
    </g>

    <!-- Technique 3: KV-Cache -->
    <g transform="translate(460, 90)">
        <rect x="0" y="0" width="195" height="150" class="card" fill="#166534" stroke="#16a34a" stroke-width="2" />
        <circle cx="25" cy="25" r="15" fill="#16a34a" />
        <text y="30" class="number" text-anchor="middle" x="25">3</text>
        <text y="30" class="card-title" x="105">Оптимизация кэша KV</text>
        <line x1="15" y1="45" x2="180" y2="45" stroke="#16a34a" stroke-width="1" opacity="0.4" />
        <text y="68" class="card-desc" x="97">Повторное использование кэшированного внимания</text>
        <text y="83" class="card-desc" x="97">вычисления между запросами</text>
        <text y="98" class="card-desc" x="97">Сначала разместите стабильный контент</text>
        <rect x="25" y="110" width="145" height="28" class="metric-box" stroke="#16a34a" stroke-width="1" />
        <text y="129" class="metric" x="97">Уровень успешных обращений к кэшу 70% и выше</text>
    </g>

    <!-- Technique 4: Partitioning -->
    <g transform="translate(675, 90)">
        <rect x="0" y="0" width="195" height="150" class="card" fill="#166534" stroke="#ea580c" stroke-width="2" />
        <circle cx="25" cy="25" r="15" fill="#ea580c" />
        <text y="30" class="number" text-anchor="middle" x="25">4</text>
        <text y="30" class="card-title" x="105">Разделение контекста</text>
        <line x1="15" y1="45" x2="180" y2="45" stroke="#ea580c" stroke-width="1" opacity="0.4" />
        <text y="68" class="card-desc" x="97">Разделение работы между</text>
        <text y="83" class="card-desc" x="97">подагенты с изолированным состоянием</text>
        <text y="98" class="card-desc" x="97">очистка окон контекста</text>
        <rect x="25" y="110" width="145" height="28" class="metric-box" stroke="#ea580c" stroke-width="1" />
        <text y="129" class="metric" x="97">Наиболее агрессивный</text>
    </g>

    <!-- When to apply section -->
    <text y="295" class="section-label" x="50">Когда применять:</text>

    <g transform="translate(30, 310)">
        <rect x="0" y="0" width="195" height="55" rx="8" ry="8" fill="#0f172a" stroke="#2563eb" stroke-width="1" />
        <text y="22" class="card-desc" style="fill: #93c5fd;" x="97">Используется для:</text>
        <text y="40" class="card-desc" x="97" transform="translate(2.51 0.00)">История сообщений увеличивается в размере</text>
    </g>

    <g transform="translate(245, 310)">
        <rect x="0" y="0" width="195" height="55" rx="8" ry="8" fill="#0f172a" stroke="#7c3aed" stroke-width="1" />
        <text y="22" class="card-desc" style="fill: #c4b5fd;" x="97">Применяется для:</text>
        <text y="40" class="card-desc" x="97">Результаты работы инструмента определяют контекст</text>
    </g>

    <g transform="translate(460, 310)">
        <rect x="0" y="0" width="195" height="55" rx="8" ry="8" fill="#0f172a" stroke="#16a34a" stroke-width="1" />
        <text y="22" class="card-desc" style="fill: #166534;" x="97">Применяется для:</text>
        <text y="40" class="card-desc" x="97">Стабильные промпты/шаблоны</text>
    </g>

    <g transform="translate(675, 310)">
        <rect x="0" y="0" width="195" height="55" rx="8" ry="8" fill="#0f172a" stroke="#ea580c" stroke-width="1" />
        <text y="22" class="card-desc" style="fill: #9a3412;" x="97">Применяется для:</text>
        <text y="40" class="card-desc" x="97">Очень длинные многофазные задачи</text>
    </g>

    <!-- Result box -->
    <g transform="translate(250, 395)">
        <rect x="0" y="0" width="400" height="55" class="result-box" />
        <text y="25" class="result-text" x="200">Совокупный эффект: эффективная пропускная способность в 2–3 раза выше</text>
        <text y="45" class="card-desc" style="fill: #86efac;" x="200">без необходимости миграции на более крупные или дорогостоящие модели</text>
    </g>

    <!-- Target metrics at bottom -->
    <text y="480" class="section-label" x="50">ЦЕЛЕВЫЕ МЕТРИКИ:</text>
    <text y="480" class="card-desc" x="170" transform="translate(13.60 0.00)">Компактация: сокращение на 50–70%, потеря качества менее 5%</text>
    <text y="480" class="card-desc" x="420">Маскировка: снижение объема выходных данных инструмента на 60–80%</text>
    <text y="480" class="card-desc" x="670">Кэш: уровень успешных запросов 70% и выше для стабильных нагрузок</text>

</svg>
