<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Область видимости памяти</title>
  <desc id="artifact-desc">Область видимости памяти.</desc>

<style>
    .bg { fill: #0f172a; }
    .node { fill: #1e293b; stroke: #2563eb; stroke-width: 2; rx: 8; ry: 8; }
    .node-text { fill: #f8fafc; font-family: Inter, system-ui, sans-serif; font-size: 14px; text-anchor: middle; dominant-baseline: middle; }
    .edge { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .label { fill: #cbd5e1; font-family: Inter, system-ui, sans-serif; font-size: 12px; text-anchor: middle; background-color: #0f172a; }
    .title { fill: #f8fafc; font-family: Inter, system-ui, sans-serif; font-size: 18px; font-weight: bold; text-anchor: middle; }
    .group-label { fill: #cbd5e1; font-family: Inter, system-ui, sans-serif; font-size: 14px; font-weight: bold; text-anchor: start; }
    .accent-green { stroke: #16a34a; }
    .accent-red { stroke: #dc2626; }
    .accent-yellow { stroke: #ea580c; }
    .accent-purple { stroke: #7c3aed; }
    .accent-orange { stroke: #ea580c; }
</style>
<defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
</defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

<rect width="100%" height="100%" class="bg" />

<text y="30" class="title" x="300">Область видимости памяти</text>

<!-- Long Term -->
<g transform="translate(50, 80)">
    <rect x="0" y="0" width="500" height="120" class="node" style="stroke: #7c3aed; fill: #5b21b6; stroke-dasharray: 5 5" />
    <text y="20" class="node-text" style="fill: #c4b5fd" x="250">Хранилище долгосрочной памяти</text>

    <g transform="translate(30, 40)">
        <rect x="0" y="0" width="120" height="60" class="node" style="stroke: #7c3aed" />
        <text y="30" class="node-text" x="60">Профиль пользователя</text>
    </g>
    <g transform="translate(190, 40)">
        <rect x="0" y="0" width="120" height="60" class="node" style="stroke: #7c3aed" />
        <text y="30" class="node-text" x="60">Прошлие события</text>
    </g>
    <g transform="translate(350, 40)">
        <rect x="0" y="0" width="120" height="60" class="node" style="stroke: #7c3aed" />
        <text y="30" class="node-text" x="60">Предпочтения</text>
    </g>
</g>

<!-- Filter -->
<g transform="translate(200, 240)">
    <polygon points="0,0 200,0 150,60 50,60" class="node" style="stroke: #ea580c; fill: #9a3412" />
    <text y="30" class="node-text" style="fill: #fdba74" x="100">Фильтр релевантности</text>
</g>

<!-- Short Term -->
<g transform="translate(200, 340)">
    <rect x="0" y="0" width="200" height="80" class="node" style="stroke: #16a34a; fill: #166534" />
    <text y="30" class="node-text" style="fill: #86efac" x="100">Окно контекста</text>
    <text y="55" class="node-text" style="font-size: 12px; fill: #86efac" x="100">Только соответствующие записи памяти</text>
</g>

<!-- Edges -->
<path d="M300 200 L300 240" class="edge" />
<path d="M300 300 L300 340" class="edge" />

</svg>
