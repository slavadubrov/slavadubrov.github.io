<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Память, отбираемая в зависимости от арендатора, назначения, свежести и релевантности</title>
  <desc id="desc">Кандидаты в память проходят проверки по критериям домена и арендатора, назначения, свежести и релевантности. Только отобранные записи попадают в контекст; отклонённые остаются снаружи.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="420" rx="22" fill="#0f172a" /><text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Память retrieval — это решение, основанное на правилах проектирования</text>
  <g font-family="Inter, system-ui, sans-serif"><g transform="translate(40 110)"><rect width="220" height="210" rx="16" fill="#1e293b" stroke="#64748b" /><text x="110" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#e2e8f0">Хранилище памяти</text><text x="28" y="82" font-size="13" fill="#cbd5e1">явные факты об использователе</text><text x="28" y="112" font-size="13" fill="#cbd5e1">выведенные гипотезы</text><text x="28" y="142" font-size="13" fill="#cbd5e1">эпизодические записи</text><text x="28" y="172" font-size="13" fill="#cbd5e1">происхождение и жизненный цикл</text></g><text x="290" y="225" font-size="25" fill="#94a3b8">→</text>
  <g transform="translate(330 95)"><rect width="330" height="240" rx="16" fill="#5b21b6" stroke="#2563eb" /><text x="165" y="38" text-anchor="middle" font-size="17" font-weight="700" fill="#c4b5fd">Ворота выбора</text><text x="35" y="82" font-size="13" fill="#93c5fd">1. аутентифицированный субъект + арендатор</text><text x="35" y="116" font-size="13" fill="#93c5fd">2. допустимое назначение</text><text x="35" y="150" font-size="13" fill="#93c5fd">3. свежесть и статус обзора</text><text x="35" y="184" font-size="13" fill="#93c5fd">4. релевантность и авторитетность</text><text x="35" y="218" font-size="12" fill="#fca5a5">Отсутствие гейта → отсутствие включения контекста</text></g><text x="690" y="225" font-size="25" fill="#94a3b8">→</text>
  <g transform="translate(730 110)"><rect width="230" height="210" rx="16" fill="#1d4ed8" stroke="#2563eb" /><text x="115" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#93c5fd">Выбранный набор данных для обработки</text><text x="30" y="84" font-size="13" fill="#93c5fd">минимально полезные факты</text><text x="30" y="116" font-size="13" fill="#93c5fd">источник сохранён</text><text x="30" y="148" font-size="13" fill="#93c5fd">сохранён срок истечения</text><text x="30" y="180" font-size="13" fill="#93c5fd">удаление по-прежнему возможно</text></g><text x="500" y="382" text-anchor="middle" font-size="13" fill="#94a3b8">Модель — выведенные в памяти данные остаются гипотезами до тех пор, пока их не подтвердит авторитетный источник.</text></g>
</svg>
