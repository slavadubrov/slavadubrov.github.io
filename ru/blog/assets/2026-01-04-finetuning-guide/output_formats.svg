<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380">
  <defs>
    <linearGradient id="loraFmt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6" />
      <stop offset="100%" style="stop-color:#6d28d9" />
    </linearGradient>
    <linearGradient id="mergedFmt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6" />
      <stop offset="100%" style="stop-color:#1d4ed8" />
    </linearGradient>
    <linearGradient id="ggufFmt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981" />
      <stop offset="100%" style="stop-color:#059669" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="380" fill="#0f172a" />

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="22" font-weight="bold">Сравнение форматов вывода</text>

  <!-- LoRA Adapter -->
  <rect x="40" y="70" width="260" height="290" rx="16" fill="url(#loraFmt)" filter="url(#shadow)" />
  <text x="170" y="110" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">🔌 Адаптер LoRA</text>

  <rect x="55" y="130" width="230" height="210" rx="8" fill="#1e293b" />

  <text x="70" y="160" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Размер</text>
  <text x="70" y="180" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="14">примерно 100–500 МБ</text>

  <text x="70" y="210" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="12" font-weight="600">КОМАНДА</text>
  <text x="70" y="228" fill="#94a3b8" font-family="monospace" font-size="10">точная настройка с использованием UV-параметров</text>

  <text x="70" y="258" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Идеально подходит для</text>
  <text x="70" y="278" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="11">• Разработка и тестирование</text>
  <text x="70" y="295" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="11">• Множество адаптеров</text>
  <text x="70" y="312" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="11">• Эффективность хранения</text>
  <text x="70" y="329" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="11">• Контроль версий</text>

  <!-- Merged Model -->
  <rect x="320" y="70" width="260" height="290" rx="16" fill="url(#mergedFmt)" filter="url(#shadow)" />
  <text x="450" y="110" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">📦 Объединённая модель</text>

  <rect x="335" y="130" width="230" height="210" rx="8" fill="#1e293b" />

  <text x="350" y="160" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Размер</text>
  <text x="350" y="180" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="14">примерно 8–16 ГБ</text>

  <text x="350" y="210" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="12" font-weight="600">КОМАНДА</text>
  <text x="350" y="228" fill="#94a3b8" font-family="monospace" font-size="10">uv run finetune --merge</text>

  <text x="350" y="258" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Идеально подходит для</text>
  <text x="350" y="278" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="11">• Обмен с другими</text>
  <text x="350" y="295" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="11">• Обслуживание модели vLLM</text>
  <text x="350" y="312" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="11">• Простая развертка</text>
  <text x="350" y="329" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="11">• HuggingFace Hub</text>

  <!-- GGUF -->
  <rect x="600" y="70" width="260" height="290" rx="16" fill="url(#ggufFmt)" filter="url(#shadow)" />
  <text x="730" y="110" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">🖥️ Формат GGUF</text>

  <rect x="615" y="130" width="230" height="210" rx="8" fill="#1e293b" />

  <text x="630" y="160" fill="#34d399" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Размер</text>
  <text x="630" y="180" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="14">~2–4 ГБ (Q4_K_M)</text>

  <text x="630" y="210" fill="#34d399" font-family="system-ui, sans-serif" font-size="12" font-weight="600">КОМАНДА</text>
  <text x="630" y="228" fill="#94a3b8" font-family="monospace" font-size="10">uv run fine-tuning --формат_файла gguf q4_k_m</text>

  <text x="630" y="258" fill="#34d399" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Идеально подходит для</text>
  <text x="630" y="278" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="11">• Инференс на CPU</text>
  <text x="630" y="295" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="11">• Ollama / llama.cpp</text>
  <text x="630" y="312" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="11">• Развертывание на краевых устройствах</text>
  <text x="630" y="329" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="11">• Системы с ограниченными ресурсами</text>
</svg>
