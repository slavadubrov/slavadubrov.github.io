<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" role="img" aria-label="Output Formats" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title>Отобранные артефакты модель с доработкой под конкретные задачи</title>
  <desc>Небольшой адаптер LoRA зависит от своей базовой части модель; объединённый чекпоинт функционирует автономно в полном модель размере, а GGUF предназначен для работы с локальными или периферийными инференс устройствами при заданном квантизация.</desc>
  <defs>
    <linearGradient id="loraFmt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #2563eb" />
      <stop offset="100%" style="stop-color: #7c3aed" />
    </linearGradient>
    <linearGradient id="mergedFmt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #2563eb" />
      <stop offset="100%" style="stop-color: #1d4ed8" />
    </linearGradient>
    <linearGradient id="ggufFmt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #16a34a" />
      <stop offset="100%" style="stop-color: #166534" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="900" height="380" fill="#0f172a" />

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="bold">Сравнение форматов вывода</text>

  <!-- LoRA Adapter -->
  <rect x="40" y="70" width="260" height="290" rx="16" fill="url(#loraFmt)" filter="url(#shadow)" />
  <text x="170" y="110" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="bold">🔌 LoRA адаптер</text>

  <rect x="55" y="130" width="230" height="210" rx="8" fill="#1e293b" />

  <text x="70" y="160" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Размер</text>
  <text x="70" y="180" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="14">Зависит от ранга/модуля</text>

  <text x="70" y="210" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">КОМАНДА</text>
  <text x="70" y="228" fill="#94a3b8" font-family="SFMono-Regular, Consolas, monospace" font-size="10">точная настройка модели с использованием UV-данных</text>

  <text x="70" y="258" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Оптимально для</text>
  <text x="70" y="278" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="11">• Разработка и тестирование</text>
  <text x="70" y="295" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="11">• Множественные адаптеры</text>
  <text x="70" y="312" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="11">• Эффективность хранения</text>
  <text x="70" y="329" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="11">• Контроль версий</text>

  <!-- Merged Model -->
  <rect x="320" y="70" width="260" height="290" rx="16" fill="url(#mergedFmt)" filter="url(#shadow)" />
  <text x="450" y="110" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="bold">📦 Объединённый Модель</text>

  <rect x="335" y="130" width="230" height="210" rx="8" fill="#1e293b" />

  <text x="350" y="160" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Размер</text>
  <text x="350" y="180" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="14">полный размер чекпоинт</text>

  <text x="350" y="210" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">КОМАНДА</text>
  <text x="350" y="228" fill="#94a3b8" font-family="SFMono-Regular, Consolas, monospace" font-size="10">uv run fine-tuning --merge</text>

  <text x="350" y="258" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Оптимально для</text>
  <text x="350" y="278" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="11">• Обмен с другими пользователями</text>
  <text x="350" y="295" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="11">• Сервисы, требующие одного модель</text>
  <text x="350" y="312" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="11">• Одиночный артефакт деплой</text>
  <text x="350" y="329" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="11">• Hugging Face Хаб</text>

  <!-- GGUF -->
  <rect x="600" y="70" width="260" height="290" rx="16" fill="url(#ggufFmt)" filter="url(#shadow)" />
  <text x="730" y="110" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="bold">🖥️ GGUF форматирование</text>

  <rect x="615" y="130" width="230" height="210" rx="8" fill="#1e293b" />

  <text x="630" y="160" fill="#86efac" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Размер</text>
  <text x="630" y="180" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="14">зависимый от Модель + квантизация</text>

  <text x="630" y="210" fill="#86efac" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">КОМАНДА</text>
  <text x="630" y="228" fill="#94a3b8" font-family="SFMono-Regular, Consolas, monospace" font-size="10">uv run finetune --gguf q4_k_m</text>

  <text x="630" y="258" fill="#86efac" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Оптимально для</text>
  <text x="630" y="278" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="11">• CPU инференс</text>
  <text x="630" y="295" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="11">• Ollama / llama.cpp</text>
  <text x="630" y="312" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="11">• Граничная точка деплой</text>
  <text x="630" y="329" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="11">• Системы с ограниченными ресурсами</text>
</svg>
