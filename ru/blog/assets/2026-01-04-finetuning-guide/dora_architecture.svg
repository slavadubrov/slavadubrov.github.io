<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" role="img" aria-label="DoRA Architecture" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title>DoRA обновление амплитуды и направления</title>
  <desc>DoRA обучается отдельно величинам векторов вес, в то время как нормализованное обновление с низким рангом изменяет их направления, что обеспечивает дополнительную гибкость и увеличивает затраты по сравнению со стандартными LoRA.</desc>
  <defs>
    <linearGradient id="loraGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="doraGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2563eb" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="900" height="500" fill="#f8fafc" />

  <!-- Title -->
  <text x="450" y="35" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" text-anchor="middle" fill="#1d4ed8">DoRA: Вес — адаптация с низким рангом после декомпозиции</text>

  <!-- Left side: Standard LoRA -->
  <text x="200" y="70" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#1d4ed8">Стандартный LoRA</text>

  <!-- Frozen Weight Matrix -->
  <rect x="80" y="90" width="240" height="70" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" />
  <text x="200" y="125" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#334155">W (заморожено)</text>
  <text x="200" y="145" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#334155">Заранее обученный веса (d × d)</text>

  <!-- Plus sign -->
  <text x="330" y="135" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="600" fill="#2563eb">+</text>

  <!-- LoRA matrices -->
  <rect x="80" y="180" width="100" height="50" rx="4" fill="url(#loraGrad)" />
  <text x="130" y="205" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ffffff">Матрица B (d×r)</text>
  <text x="130" y="220" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.8)">обучаемый</text>

  <text x="195" y="210" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" fill="#2563eb">×</text>

  <rect x="220" y="180" width="100" height="50" rx="4" fill="url(#loraGrad)" />
  <text x="270" y="205" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ffffff">Матрица A (r×d)</text>
  <text x="270" y="220" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.8)">обучаемый</text>

  <!-- Formula -->
  <text x="200" y="260" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#1d4ed8">W' = W + B × A</text>

  <!-- Divider -->
  <line x1="450" y1="70" x2="450" y2="280" stroke="#cbd5e1" stroke-width="2" />

  <!-- Right side: DoRA -->
  <text x="680" y="70" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#7c3aed">DoRA (Вес Декомпозиция)</text>

  <!-- Frozen Weight Matrix -->
  <rect x="560" y="90" width="240" height="50" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" />
  <text x="680" y="115" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#334155">W → Амплитуда × Направление</text>
  <text x="680" y="132" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#2563eb">Разложенный</text>

  <!-- Arrow -->
  <path d="M 680 145 L 680 165" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <!-- Magnitude -->
  <rect x="500" y="175" width="130" height="50" rx="4" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" />
  <text x="565" y="198" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#9a3412">‖W‖ (амплитуда)</text>
  <text x="565" y="215" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="#9a3412">обучаемый скаляр</text>

  <text x="645" y="205" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" fill="#2563eb">×</text>

  <!-- Direction -->
  <rect x="670" y="175" width="130" height="50" rx="4" fill="url(#doraGrad)" />
  <text x="735" y="195" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ffffff">Направление (V)</text>
  <text x="735" y="212" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.8)">V + B×A (LoRA)</text>

  <!-- Formula -->
  <text x="680" y="260" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#1d4ed8">W' = m × normalize_c(V + BA)</text>

  <!-- Comparison Box -->
  <rect x="50" y="300" width="800" height="170" rx="8" fill="#faf5ff" stroke="#2563eb" stroke-width="1.5" />
  <text x="70" y="330" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#5b21b6">Какие изменения произошли с DoRA</text>

  <circle cx="70" cy="360" r="4" fill="#2563eb" />
  <text x="85" y="364" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1d4ed8">Более детальные обновления:</text>
  <text x="185" y="364" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#334155">Разделение амплитуды и направления позволяет осуществлять более значительные изменения параметров</text>

  <circle cx="70" cy="390" r="4" fill="#2563eb" />
  <text x="85" y="394" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1d4ed8">Документальные доказательства:</text>
  <text x="185" y="394" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#334155">Улучшен по сравнению с LoRA в нескольких протестированных конфигурациях модель и задач</text>

  <circle cx="70" cy="420" r="4" fill="#2563eb" />
  <text x="85" y="424" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1d4ed8">Компромисс:</text>
  <text x="155" y="424" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#334155">Для дополнительных параметров амплитуды и их вычисления необходимо соблюдать принцип полного соответствия бенчмарк</text>

  <!-- When to use -->
  <rect x="70" y="445" width="760" height="25" rx="4" fill="#eff6ff" />
  <text x="85" y="462" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#5b21b6">Используйте DoRA в следующих случаях:</text>
  <text x="190" y="462" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#334155">Сравнительная оценка в условиях идентичных условий показывает достаточный прирост, обосновывающий использование дополнительного механизма</text>
</svg>
