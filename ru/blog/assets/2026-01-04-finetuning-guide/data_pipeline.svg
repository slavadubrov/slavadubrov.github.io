<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" role="img" aria-label="Data Pipeline" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title>подготовка данных Файн-тюнинг пайплайн</title>
  <desc>Необработанные примеры проходят через этапы фильтрации, контроля за конфиденциальными данными, удаления дубликатов, необязательной аугментации и форматирования перед тем, как будет сформировано разделение данных для обучения с версионированием.</desc>
  <defs>
    <linearGradient id="dataGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#16a34a" />
      <stop offset="100%" stop-color="#166534" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="900" height="480" fill="#f8fafc" />

  <!-- Title -->
  <text x="450" y="35" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" text-anchor="middle" fill="#1d4ed8">Подготовка данных Пайплайн</text>

  <!-- Raw Data -->
  <g transform="translate(40, 70)">
    <rect width="120" height="55" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" />
    <text x="60" y="28" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#334155">сырые данные</text>
    <text x="60" y="44" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="#334155">Непрообработанный корпус данных</text>
  </g>

  <path d="M 160 97 L 190 97" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <!-- Stage 1: Ingestion -->
  <g transform="translate(200, 70)">
    <rect width="130" height="55" rx="6" fill="url(#dataGrad)" />
    <text x="65" y="24" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ffffff">1. Прием данных</text>
    <text x="65" y="40" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)">Удалить отклонения,</text>
    <text x="65" y="50" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)">некорректный формат UTF-8</text>
  </g>
  <text x="265" y="140" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="#166534" font-style="italic">Обработка текста с использованием алгоритма Trafilatura и библиотеки FastText</text>

  <path d="M 330 97 L 360 97" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <!-- Stage 2: PII -->
  <g transform="translate(370, 70)">
    <rect width="130" height="55" rx="6" fill="url(#dataGrad)" />
    <text x="65" y="24" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ffffff">2. Очистка персональных данных</text>
    <text x="65" y="40" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)">зашифровывать электронные письма и IP-адреса,</text>
    <text x="65" y="50" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)">номера телефонов</text>
  </g>
  <text x="435" y="140" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="#166534" font-style="italic">Microsoft Presidio</text>

  <path d="M 500 97 L 530 97" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <!-- Stage 3: Dedup -->
  <g transform="translate(540, 70)">
    <rect width="130" height="55" rx="6" fill="url(#dataGrad)" />
    <text x="65" y="24" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ffffff">3. Удаление дубликатов</text>
    <text x="65" y="40" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)">алгоритм MinHash LSH для</text>
    <text x="65" y="50" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)">удаление дубликатов</text>
  </g>
  <text x="605" y="140" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="#166534" font-style="italic">DataTrove</text>

  <path d="M 670 97 L 700 97" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <!-- Stage 4: Augmentation -->
  <g transform="translate(710, 70)">
    <rect width="130" height="55" rx="6" fill="url(#dataGrad)" />
    <text x="65" y="24" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ffffff">4. Аугментация</text>
    <text x="65" y="40" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)">Учитель модель</text>
    <text x="65" y="50" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)">перезаписывает данные</text>
  </g>
  <text x="775" y="140" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="#166534" font-style="italic">Distilabel</text>

  <!-- Arrow down and left -->
  <path d="M 775 125 L 775 170 L 545 170" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <!-- Stage 5: Formatting -->
  <g transform="translate(370, 155)">
    <rect width="165" height="55" rx="6" fill="url(#dataGrad)" />
    <text x="82" y="24" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ffffff">5. Форматирование</text>
    <text x="82" y="40" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)">Перевести в формат Alpaca/ShareGPT</text>
    <text x="82" y="50" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)">формат JSONL</text>
  </g>

  <path d="M 370 182 L 220 182" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <!-- Clean Dataset -->
  <g transform="translate(80, 155)">
    <rect width="130" height="55" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" />
    <text x="65" y="28" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#166534">Очистка Датасет</text>
    <text x="65" y="44" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="#166534">Готов к файн-тюнинг</text>
  </g>

  <!-- Key Principles Box -->
  <rect x="40" y="250" width="820" height="200" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" />
  <text x="60" y="280" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#166534">Основные принципы</text>

  <circle cx="60" cy="310" r="4" fill="#16a34a" />
  <text x="75" y="314" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1d4ed8">Качество вместо количества:</text>
  <text x="210" y="314" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#334155">Добавьте охват различных моделей сбоев перед тем, как повторять простые примеры</text>

  <circle cx="60" cy="345" r="4" fill="#16a34a" />
  <text x="75" y="349" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1d4ed8">Чистота данных:</text>
  <text x="155" y="349" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#334155">Удалить нерелевантную информацию, нормализовать текст и обеспечить единообразие форматирования</text>

  <circle cx="60" cy="380" r="4" fill="#16a34a" />
  <text x="75" y="384" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1d4ed8">Баланс:</text>
  <text x="135" y="384" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#334155">Обеспечить согласованную представленность данных по всем тематикам для исключения предвзятости</text>

  <circle cx="60" cy="415" r="4" fill="#dc2626" />
  <text x="75" y="419" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#991b1b">Управление данными:</text>
  <text x="180" y="419" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#334155">Отслеживание путей происхождения, разрешений, хранения, преобразований и удаления данных</text>
</svg>
