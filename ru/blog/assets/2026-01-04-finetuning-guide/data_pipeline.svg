<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Пайплайн подготовки данных: «Данные — это судьба»</title>
  <desc id="artifact-desc">Пайплайн подготовки данных: «Данные — это судьба».</desc>
  <defs>
    <linearGradient id="dataGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#16a34a" />
      <stop offset="100%" stop-color="#166534" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="900" height="480" fill="#f8fafc" />

  <!-- Title -->
  <text y="35" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" text-anchor="middle" fill="#1d4ed8" x="450">Пайплайн подготовки данных: «Данные — это судьба»</text>

  <!-- Raw Data -->
  <g transform="translate(40, 70)">
    <rect width="120" height="55" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" />
    <text y="28" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#334155" x="60">Необработанные данные</text>
    <text y="44" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="#334155" x="60">Непрообработанный корпус</text>
  </g>

  <path d="M 160 97 L 190 97" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <!-- Stage 1: Ingestion -->
  <g transform="translate(200, 70)">
    <rect width="130" height="55" rx="6" fill="url(#dataGrad)" />
    <text y="24" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ffffff" x="65">1. Прием данных</text>
    <text y="40" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)" x="65">Удалить отклонения.</text>
    <text y="50" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)" x="65">некорректный формат UTF-8</text>
  </g>
  <text y="140" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="#166534" font-style="italic" x="265">Обработка текста + FastText</text>

  <path d="M 330 97 L 360 97" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <!-- Stage 2: PII -->
  <g transform="translate(370, 70)">
    <rect width="130" height="55" rx="6" fill="url(#dataGrad)" />
    <text y="24" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ffffff" x="65">2. Удаление персональных данных</text>
    <text y="40" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)" x="65">Закрывать информацию о почтовых адресах и IP-адресах.</text>
    <text y="50" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)" x="65">номера телефонов</text>
  </g>
  <text y="140" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="#166534" font-style="italic" x="435">Microsoft Presidio</text>

  <path d="M 500 97 L 530 97" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <!-- Stage 3: Dedup -->
  <g transform="translate(540, 70)">
    <rect width="130" height="55" rx="6" fill="url(#dataGrad)" />
    <text y="24" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ffffff" x="65">3. Удаление дубликатов</text>
    <text y="40" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)" x="65">MinHash LSH для</text>
    <text y="50" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)" x="65">удаление дубликатов</text>
  </g>
  <text y="140" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="#166534" font-style="italic" x="605">DataTrove</text>

  <path d="M 670 97 L 700 97" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <!-- Stage 4: Augmentation -->
  <g transform="translate(710, 70)">
    <rect width="130" height="55" rx="6" fill="url(#dataGrad)" />
    <text y="24" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ffffff" x="65">4. Повышение качества</text>
    <text y="40" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)" x="65">Модель учителя</text>
    <text y="50" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)" x="65">перезаписывает данные</text>
  </g>
  <text y="140" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="#166534" font-style="italic" x="775">Distilabel</text>

  <!-- Arrow down and left -->
  <path d="M 775 125 L 775 170 L 545 170" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <!-- Stage 5: Formatting -->
  <g transform="translate(370, 155)">
    <rect width="165" height="55" rx="6" fill="url(#dataGrad)" />
    <text y="24" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ffffff" x="82">5. Форматирование</text>
    <text y="40" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)" x="82">Перевести в Alpaca/ShareGPT</text>
    <text y="50" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)" x="82">формат JSONL</text>
  </g>

  <path d="M 370 182 L 220 182" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <!-- Clean Dataset -->
  <g transform="translate(80, 155)">
    <rect width="130" height="55" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" />
    <text y="28" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#166534" x="65">Чистый набор данных</text>
    <text y="44" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="#166534" x="65">Готово к фин-тюнингу</text>
  </g>

  <!-- Key Principles Box -->
  <rect x="40" y="250" width="820" height="200" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" />
  <text y="280" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#166534" x="60">Основные принципы</text>

  <circle cx="60" cy="310" r="4" fill="#16a34a" />
  <text y="314" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1d4ed8" x="75">Качество важнее количества:</text>
  <text y="314" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#334155" x="210">500–1 000 тщательно отобранных примеров зачастую показывают лучшие результаты, чем 50 000 шумных примеров</text>

  <circle cx="60" cy="345" r="4" fill="#16a34a" />
  <text y="349" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1d4ed8" x="75">Чистота:</text>
  <text y="349" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#334155" x="155">Удалить нерелевантную информацию, нормализовать текст, обеспечить единообразную форматирование</text>

  <circle cx="60" cy="380" r="4" fill="#16a34a" />
  <text y="384" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1d4ed8" x="75">Баланс:</text>
  <text y="384" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#334155" x="135">Обеспечьте согласованное представление данных по всем темам для предотвращения предвзятости</text>

  <circle cx="60" cy="415" r="4" fill="#dc2626" />
  <text y="419" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#991b1b" x="75">Критически важно для предприятия:</text>
  <text y="419" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#334155" x="200" transform="translate(-96.76 0.00)">Обработка персональных данных обязательна — использование данных клиентов для обучения является нарушением принципов безопасности</text>
</svg>
