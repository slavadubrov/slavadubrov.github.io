<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Die Veröffentlichungseinheit erweitert sich von einem Model-Dienst zu einem Entscheidungssystem</title>
  <desc id="desc">Ein zentrales MLOps-Kern aus Code, Daten, Model und Serving wird durch Prompts sowie Schemata, Retrieval-Zustände, Tools und Berechtigungen, Routing und Budgets sowie Sicherheitsrichtlinien umgeben. Alle Komponenten werden in einem einzigen Systemmanifest zusammengefasst.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="650" rx="28" fill="#0f172a" />
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">LLMOps erweitert die Veröffentlichungseinheit.</text>
  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <rect x="400" y="220" width="400" height="190" rx="26" fill="#1d4ed8" stroke="#2563eb" stroke-width="3" />
    <text x="600" y="270" fill="#93c5fd" font-size="24" font-weight="700">Kern von MLOps</text>
    <text x="600" y="312" fill="#93c5fd" font-size="17">Code • Daten • Model-Identität</text>
    <text x="600" y="346" fill="#93c5fd" font-size="17">Entwicklung • Serving • Bereitstellung • Rückerstellung</text>
    <rect x="70" y="145" width="265" height="115" rx="18" fill="#5b21b6" /><text x="202" y="189" fill="#93c5fd" font-size="19" font-weight="700">Prompts sowie Schemata</text><text x="202" y="225" fill="#c4b5fd" font-size="14">verarbeitetes Anfragenverhalten</text>
    <rect x="865" y="145" width="265" height="115" rx="18" fill="#166534" /><text x="997" y="189" fill="#93c5fd" font-size="19" font-weight="700">Retrieval-Zustand</text><text x="997" y="225" fill="#93c5fd" font-size="14">Korpus • Parser • Index</text>
    <rect x="70" y="370" width="265" height="115" rx="18" fill="#9a3412" /><text x="202" y="414" fill="#fdba74" font-size="19" font-weight="700">Werkzeuge + Berechtigungen</text><text x="202" y="450" fill="#fdba74" font-size="14">Verträge • Freigabe • Auswirkungen</text>
    <rect x="865" y="370" width="265" height="115" rx="18" fill="#1d4ed8" /><text x="997" y="414" fill="#93c5fd" font-size="19" font-weight="700">Routing plus Budget</text><text x="997" y="450" fill="#93c5fd" font-size="14">Fallback-Mechanismus • Cache • Quotenlimit</text>
    <rect x="390" y="485" width="420" height="82" rx="18" fill="#991b1b" /><text x="600" y="518" fill="#fca5a5" font-size="19" font-weight="700">Sicherheits- und Geschäftsrichtlinien</text><text x="600" y="547" fill="#fca5a5" font-size="14">deterministische Regeln und Kontrollmechanismen für verbleibende Risiken</text>
    <rect x="255" y="590" width="690" height="42" rx="14" fill="#1e293b" /><text x="600" y="617" fill="#e2e8f0" font-size="17" font-weight="700">Ein Manifest beschreibt und bewirbt das gesamte System.</text>
  </g>
</svg>
