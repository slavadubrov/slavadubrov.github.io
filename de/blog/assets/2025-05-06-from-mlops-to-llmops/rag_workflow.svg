<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">RAG Datenpfad und Bewertungstüren</title>
  <desc id="desc">Eine Quelle für Versionen von Einpflegewegen, zur Parsung sowie für Chunking, Embeddings und den Index. Ein Serving-Weg ermöglicht die Autorisierung und Abrufung von Dokumenten vor der Zusammenstellung und Erstellung des Kontexts. Getrennte Kontrollmechanismen bewerten Retrieval sowie fundierte Antworten.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#94a3b8" /></marker></defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="650" rx="28" fill="#0f172a" />
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Retrieval ist ein eigenständiges, versioniertes Datenprodukt</text>
  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <text x="95" y="145" text-anchor="start" fill="#93c5fd" font-size="18" font-weight="700">Einlesen</text>
    <g transform="translate(85 170)"><rect width="180" height="95" rx="16" fill="#1d4ed8" /><text x="90" y="38" fill="#93c5fd" font-size="18" font-weight="700">Quelle Snapshot</text><text x="90" y="67" fill="#93c5fd" font-size="14">ACL + Löschzustand</text></g>
    <path d="M275 218 H320" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <g transform="translate(330 170)"><rect width="180" height="95" rx="16" fill="#5b21b6" /><text x="90" y="38" fill="#93c5fd" font-size="18" font-weight="700">Parsen und Chunking</text><text x="90" y="67" fill="#c4b5fd" font-size="14">versionierte Logik</text></g>
    <path d="M520 218 H565" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <g transform="translate(575 170)"><rect width="180" height="95" rx="16" fill="#9a3412" /><text x="90" y="38" fill="#fdba74" font-size="18" font-weight="700">Einbetten</text><text x="90" y="67" fill="#fdba74" font-size="14">Model sowie Abmessungen</text></g>
    <path d="M765 218 H810" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <g transform="translate(820 170)"><rect width="180" height="95" rx="16" fill="#166534" /><text x="90" y="38" fill="#93c5fd" font-size="18" font-weight="700">Indexerstellung</text><text x="90" y="67" fill="#93c5fd" font-size="14">unveränderliche Identität</text></g>

    <text x="95" y="350" text-anchor="start" fill="#93c5fd" font-size="18" font-weight="700">Serving</text>
    <g transform="translate(85 375)"><rect width="180" height="95" rx="16" fill="#1e293b" /><text x="90" y="38" fill="#e2e8f0" font-size="18" font-weight="700">Anfrage + Tenant</text><text x="90" y="67" fill="#94a3b8" font-size="14">Anfrage nach Identität</text></g>
    <path d="M275 423 H320" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <g transform="translate(330 375)"><rect width="180" height="95" rx="16" fill="#1d4ed8" /><text x="90" y="38" fill="#93c5fd" font-size="18" font-weight="700">Autorisieren und abrufen</text><text x="90" y="67" fill="#93c5fd" font-size="14">Filtern + gerankte Beweismittel</text></g>
    <path d="M520 423 H565" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <g transform="translate(575 375)"><rect width="180" height="95" rx="16" fill="#5b21b6" /><text x="90" y="38" fill="#93c5fd" font-size="18" font-weight="700">Kontext zusammenstellen</text><text x="90" y="67" fill="#c4b5fd" font-size="14">Budget + Referenzen</text></g>
    <path d="M765 423 H810" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <g transform="translate(820 375)"><rect width="180" height="95" rx="16" fill="#166534" /><text x="90" y="38" fill="#93c5fd" font-size="18" font-weight="700">Erzeugen</text><text x="90" y="67" fill="#93c5fd" font-size="14">Antwort auf Grundlage der Belege</text></g>

    <rect x="215" y="535" width="320" height="78" rx="16" fill="#1d4ed8" /><text x="375" y="567" fill="#93c5fd" font-size="18" font-weight="700">Retrieval-Schleuse</text><text x="375" y="594" fill="#93c5fd" font-size="14">Rückruf • Ranking • Autorisierung</text>
    <rect x="665" y="535" width="320" height="78" rx="16" fill="#991b1b" /><text x="825" y="567" fill="#fca5a5" font-size="18" font-weight="700">Antworttor</text><text x="825" y="594" fill="#fca5a5" font-size="14">Unterstützung • Zitierung • Aufgabenerfolg</text>
  </g>
</svg>
