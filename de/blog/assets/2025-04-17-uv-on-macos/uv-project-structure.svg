<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Eingaben und abgeleiteter Zustand in einem UV-Projekt</title><desc id="desc">Die festgelegten Projektmetadaten, die Quelldateien, die Python-Anfragen sowie der UV-Lock werden vom generierten lokalen .venv-Verzeichnis und dem Cache getrennt aufbewahrt. Die pyproject-Deklarationen liefern die Lock-Datei; diese zusammen mit der Auswahl von Python-Versionen bilden schließlich die Umgebung.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#94a3b8" /></marker></defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="620" rx="28" fill="#0f172a" />
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Intention und Lösung festlegen; Umgebung ableiten</text>
  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <text x="280" y="125" fill="#93c5fd" font-size="18" font-weight="700">eingereichte Eingabedaten</text>
    <rect x="70" y="150" width="420" height="100" rx="18" fill="#1d4ed8" /><text x="280" y="190" fill="#93c5fd" font-size="21" font-weight="700">pyproject.toml</text><text x="280" y="220" fill="#93c5fd" font-size="14">Metadaten • Anforderungen • Gruppen • Tool-Konfiguration</text>
    <rect x="70" y="280" width="200" height="100" rx="18" fill="#5b21b6" /><text x="170" y="320" fill="#93c5fd" font-size="19" font-weight="700">Quellcode + Tests</text><text x="170" y="350" fill="#c4b5fd" font-size="14">Verhalten des Projekts</text>
    <rect x="290" y="280" width="200" height="100" rx="18" fill="#9a3412" /><text x="390" y="320" fill="#fdba74" font-size="19" font-weight="700">Python-Version</text><text x="390" y="350" fill="#fdba74" font-size="14">Interpreter-Anfrage</text>
    <path d="M500 200 H575" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <rect x="585" y="150" width="260" height="100" rx="18" fill="#166534" /><text x="715" y="190" fill="#93c5fd" font-size="21" font-weight="700">uv.Lock</text><text x="715" y="220" fill="#93c5fd" font-size="14">lösbares mehrplattformfähiges Graphenmodell</text>

    <text x="935" y="125" fill="#93c5fd" font-size="18" font-weight="700">lokal abgeleitet</text>
    <path d="M855 200 H900" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <path d="M390 380 V430 H930 V270" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#a)" />
    <rect x="910" y="150" width="220" height="130" rx="18" fill="#1d4ed8" /><text x="1020" y="195" fill="#93c5fd" font-size="21" font-weight="700">.venv</text><text x="1020" y="226" fill="#93c5fd" font-size="14">installierter Teilmenge</text><text x="1020" y="252" fill="#93c5fd" font-size="14">OS-spezifisch und architekturspezifisch</text>
    <rect x="805" y="355" width="325" height="100" rx="18" fill="#1e293b" /><text x="967" y="395" fill="#e2e8f0" font-size="20" font-weight="700">UV-Cache</text><text x="967" y="425" fill="#94a3b8" font-size="14">wiederverwendbare Downloads und Builds</text>
    <rect x="245" y="510" width="710" height="65" rx="16" fill="#991b1b" /><text x="600" y="550" fill="#fca5a5" font-size="17" font-weight="700">Ni .venv noch der Cache gehören in die Versionsverwaltung.</text>
  </g>
</svg>
