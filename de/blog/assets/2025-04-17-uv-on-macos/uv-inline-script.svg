<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Architektur eines selbstständigen Skripts (PEP 723)</title>
  <desc id="artifact-desc">Architektur eines selbstständigen Skripts (PEP 723).</desc>
  <defs>
    <filter id="shadow2" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="100%" height="100%" fill="#f8fafc" /><rect width="800" height="440" fill="#0f172a" rx="12" ry="12" />

  <text y="44" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="bold" fill="#f8fafc" text-anchor="middle" x="400">Architektur eines selbstständigen Skripts (PEP 723)</text>
  <text y="70" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#93c5fd" text-anchor="middle" x="400">Eine .py-Datei enthält ihre eigenen Abhängigkeiten – es gibt weder ein pyproject.toml noch einen venv zur Verwaltung.</text>

  <!-- Code card -->
  <rect x="60" y="95" width="430" height="300" rx="8" fill="#1d4ed8" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow2)" />
  <circle cx="80" cy="115" r="5" fill="#dc2626" />
  <circle cx="96" cy="115" r="5" fill="#ea580c" />
  <circle cx="112" cy="115" r="5" fill="#16a34a" />
  <text y="119" font-family="SFMono-Regular, Consolas, monospace" font-size="11" fill="#93c5fd" text-anchor="end" x="470">fetch.py</text>

  <g font-family="SFMono-Regular, Consolas, monospace" font-size="13">
    <text y="155" fill="#fca5a5" x="80">#!/usr/bin/env -S uv starten --skript</text>
    <text y="180" fill="#93c5fd" x="80"># /// Skript</text>
    <text y="200" fill="#93c5fd" x="80"># requires-python = "&gt;=3.12"</text>
    <text y="220" fill="#93c5fd" x="80"># Abhängigkeiten = [</text>
    <text y="240" fill="#86efac" x="100">#   „httpx“,</text>
    <text y="260" fill="#86efac" x="100">#   „reichhaltig“,</text>
    <text y="280" fill="#93c5fd" x="80"># ]</text>
    <text y="300" fill="#93c5fd" x="80"># ///</text>
    <text y="330" fill="#f8fafc" x="80">import httpx, rich</text>
    <text y="354" fill="#f8fafc" x="80">print(httpx.get("https://...").json())</text>
  </g>

  <!-- Annotations -->
  <g font-family="Inter, system-ui, sans-serif" font-size="12">
    <line x1="490" y1="148" x2="540" y2="148" stroke="#dc2626" stroke-width="1.5" />
    <text y="145" fill="#fca5a5" font-weight="bold" x="548">Shebang</text>
    <text y="162" fill="#93c5fd" x="548" transform="translate(-7.61 0.00)">chmod +x ausführen, anschließend ./fetch.py.</text>

    <line x1="490" y1="195" x2="540" y2="195" stroke="#2563eb" stroke-width="1.5" />
    <text y="192" fill="#93c5fd" font-weight="bold" x="548">Inline-Metadaten</text>
    <text y="209" fill="#93c5fd" x="548">TOML-Block in den Kommentaren</text>

    <line x1="490" y1="250" x2="540" y2="250" stroke="#16a34a" stroke-width="1.5" />
    <text y="247" fill="#86efac" font-weight="bold" x="548">Abhängigkeiten</text>
    <text y="264" fill="#93c5fd" x="548">uv add --script fetch.py httpx</text>

    <line x1="490" y1="342" x2="540" y2="342" stroke="#e2e8f0" stroke-width="1.5" />
    <text y="339" fill="#f8fafc" font-weight="bold" x="548">Ihr Code</text>
    <text y="356" fill="#93c5fd" x="548">Importe werden zur Laufzeit gelöst</text>
  </g>

  <text y="425" font-family="SFMono-Regular, Consolas, monospace" font-size="13" fill="#fdba74" text-anchor="middle" x="400" textLength="792.26" lengthAdjust="spacingAndGlyphs" transform="translate(-0.00 0.00)">uv run fetch.py → UV erstellt eine temporäre Umgebung, speichert sie im Cache und führt die Datei aus.</text>
</svg>
