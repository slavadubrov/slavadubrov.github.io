<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Vier UV-Grenzen des Workflow</title><desc id="desc">Python, Projekte, Skripte sowie CLI-Tools, die über Managed Python verwaltet werden, bilden vier eigenständige Lebenszyklen, die durch uv gesteuert werden. Host-Bibliotheken und -Anwendungen bleiben hingegen außerhalb von uv und werden durch einen System-Paketmanager verwaltet.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="650" rx="28" fill="#0f172a" />
  <text x="600" y="64" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Ein ausführbares Programm, getrennte Lebenszyklen</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(70 140)"><rect width="500" height="180" rx="20" fill="#1d4ed8" /><text x="30" y="47" fill="#93c5fd" font-size="23" font-weight="700">Verwalteter Python</text><text x="30" y="86" fill="#93c5fd" font-size="17">uv Python installieren / festlegen / Auflisten</text><text x="30" y="123" fill="#93c5fd" font-size="15">Interpreter-Distributionen im UV-Datenverzeichnis</text><text x="30" y="151" fill="#93c5fd" font-size="15">neben externen Interpretern auffindbar</text></g>
    <g transform="translate(630 140)"><rect width="500" height="180" rx="20" fill="#5b21b6" /><text x="30" y="47" fill="#93c5fd" font-size="23" font-weight="700">Projekt</text><text x="30" y="86" fill="#93c5fd" font-size="17">pyproject.toml + uv.lock → .venv</text><text x="30" y="123" fill="#c4b5fd" font-size="15">gemeinsame Deklarationen und Auflösung</text><text x="30" y="151" fill="#c4b5fd" font-size="15">einmalige installierte Umgebung</text></g>
    <g transform="translate(70 365)"><rect width="500" height="180" rx="20" fill="#9a3412" /><text x="30" y="47" fill="#fdba74" font-size="23" font-weight="700">PEP 723-Skript</text><text x="30" y="86" fill="#fdba74" font-size="17">inline-Metadaten + optionales angrenzendes Schloss</text><text x="30" y="123" fill="#fdba74" font-size="15">Einzeldatei-Release-Einheit</text><text x="30" y="151" fill="#fdba74" font-size="15">isolierte, gekachelte Ausführungsumgebung</text></g>
    <g transform="translate(630 365)"><rect width="500" height="180" rx="20" fill="#166534" /><text x="30" y="47" fill="#93c5fd" font-size="23" font-weight="700">CLI-Tool</text><text x="30" y="86" fill="#93c5fd" font-size="17">UVX-Cache oder persistente Toolumgebung</text><text x="30" y="123" fill="#93c5fd" font-size="15">von Projekt-Importen isoliert</text><text x="30" y="151" fill="#93c5fd" font-size="15">PATH-Exposition nur bei absichtlicher Installation.</text></g>
    <rect x="250" y="585" width="700" height="42" rx="14" fill="#1e293b" /><text x="600" y="612" text-anchor="middle" fill="#cbd5e1" font-size="16">Homebrew oder macOS behält weiterhin die Host-Anwendungen sowie die nativen Bibliotheken bei.</text>
  </g>
</svg>
