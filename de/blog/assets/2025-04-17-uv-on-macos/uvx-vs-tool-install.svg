<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Zwei Möglichkeiten, ein Tool auszuführen</title>
  <desc id="artifact-desc">Zwei Möglichkeiten, ein Tool auszuführen.</desc>
  <defs>
    <filter id="shadow3" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="100%" height="100%" fill="#f8fafc" /><rect width="800" height="380" fill="#0f172a" rx="12" ry="12" />

  <text y="44" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="bold" fill="#f8fafc" text-anchor="middle" x="400">Zwei Möglichkeiten, ein Tool auszuführen</text>
  <text y="70" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#93c5fd" text-anchor="middle" x="400">Führen Sie es einmal aus oder fügen Sie es Ihrem PATH hinzu.</text>

  <!-- uvx card -->
  <rect x="50" y="100" width="330" height="240" rx="10" fill="#1e293b" stroke="#2563eb" stroke-width="2" filter="url(#shadow3)" />
  <text y="138" font-family="SFMono-Regular, Consolas, monospace" font-size="18" font-weight="bold" fill="#93c5fd" text-anchor="middle" x="215">UVX-Prüfung abgeschlossen.</text>
  <text y="162" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#93c5fd" text-anchor="middle" x="215">UV-Tool-Ausführung – vorübergehend</text>

  <g font-family="Inter, system-ui, sans-serif" font-size="13" fill="#eff6ff">
    <text y="200" x="80">• Vorübergehende, im Cache gespeicherte Umgebung</text>
    <text y="226" x="80">• Nichts zum PATH hinzugefügt</text>
    <text y="252" x="80">• Es lädt stets die angeforderte Version herunter.</text>
    <text y="278" x="80">• Ideal für CI-Prozesse und einmalige Ausführungen</text>
  </g>
  <text y="318" font-family="SFMono-Regular, Consolas, monospace" font-size="12" fill="#86efac" text-anchor="middle" x="215">uvx ruff@0.6.0 / uvx --with click mytool</text>

  <!-- tool install card -->
  <rect x="420" y="100" width="330" height="240" rx="10" fill="#1e293b" stroke="#2563eb" stroke-width="2" filter="url(#shadow3)" />
  <text y="138" font-family="SFMono-Regular, Consolas, monospace" font-size="17" font-weight="bold" fill="#93c5fd" text-anchor="middle" x="585">UV-Tool installieren mit Ruff</text>
  <text y="162" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#93c5fd" text-anchor="middle" x="585">persistent – im PATH enthalten</text>

  <g font-family="Inter, system-ui, sans-serif" font-size="13" fill="#eff6ff">
    <text y="200" x="450">• Einmal installiert, isolierte Umgebung</text>
    <text y="226" x="450">• Rufen Sie es direkt auf: einfach „ruff“.</text>
    <text y="252" x="450">• Upgrade aller UV-Tools auf die neueste Version</text>
    <text y="278" x="450">• Ideal für Alltagswerkzeuge</text>
  </g>
  <text y="318" font-family="SFMono-Regular, Consolas, monospace" font-size="12" fill="#fdba74" text-anchor="middle" x="585">UV-Tool-Liste / Deinstallation von UV-Tools</text>
</svg>
