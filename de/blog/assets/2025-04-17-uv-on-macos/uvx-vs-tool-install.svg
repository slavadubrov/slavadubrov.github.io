<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <filter id="shadow3" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="white" /><rect width="800" height="380" fill="#1e1e2e" rx="12" ry="12" />

  <text x="400" y="44" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Zwei Möglichkeiten, ein Tool auszuführen</text>
  <text x="400" y="70" font-family="Arial, sans-serif" font-size="14" fill="#a6accd" text-anchor="middle">Führen Sie es einmal aus oder fügen Sie es Ihrem PATH hinzu.</text>

  <!-- uvx card -->
  <rect x="50" y="100" width="330" height="240" rx="10" fill="#2d3748" stroke="#4FD1C5" stroke-width="2" filter="url(#shadow3)" />
  <text x="215" y="138" font-family="Monaco, monospace" font-size="18" font-weight="bold" fill="#4FD1C5" text-anchor="middle">UVX-Prüfung abgeschlossen.</text>
  <text x="215" y="162" font-family="Arial, sans-serif" font-size="13" fill="#a0aec0" text-anchor="middle">UV-Tool-Ausführung – vorübergehend</text>

  <g font-family="Arial, sans-serif" font-size="13" fill="#cbd5e0">
    <text x="80" y="200">• Vorübergehende, im Cache gespeicherte Umgebung</text>
    <text x="80" y="226">• Nichts zum PATH hinzugefügt</text>
    <text x="80" y="252">• Es lädt stets die angeforderte Version herunter.</text>
    <text x="80" y="278">• Ideal für CI-Prozesse und einmalige Ausführungen</text>
  </g>
  <text x="215" y="318" font-family="Monaco, monospace" font-size="12" fill="#68D391" text-anchor="middle">uvx ruff@0.6.0 / uvx --with click mytool</text>

  <!-- tool install card -->
  <rect x="420" y="100" width="330" height="240" rx="10" fill="#2d3748" stroke="#A78BFA" stroke-width="2" filter="url(#shadow3)" />
  <text x="585" y="138" font-family="Monaco, monospace" font-size="17" font-weight="bold" fill="#A78BFA" text-anchor="middle">UV-Tool installieren mit Ruff</text>
  <text x="585" y="162" font-family="Arial, sans-serif" font-size="13" fill="#a0aec0" text-anchor="middle">persistent – im PATH enthalten</text>

  <g font-family="Arial, sans-serif" font-size="13" fill="#cbd5e0">
    <text x="450" y="200">• Einmal installiert, isolierte Umgebung</text>
    <text x="450" y="226">• Rufen Sie es direkt auf: einfach „ruff“.</text>
    <text x="450" y="252">• Upgrade aller UV-Tools auf die neueste Version</text>
    <text x="450" y="278">• Ideal für Alltagswerkzeuge</text>
  </g>
  <text x="585" y="318" font-family="Monaco, monospace" font-size="12" fill="#F6E05E" text-anchor="middle">UV-Tool-Liste / Deinstallation von UV-Tools</text>
</svg>
