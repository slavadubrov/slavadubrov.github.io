<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 590" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Auswahl zwischen UV-Run, UVX oder Installation der UV-Tool-Software</title><desc id="desc">Drei Spalten leiten projektbezogene Tools an uv run weiter, ad-hoc isolierte Tools an uvx sowie ausführbare Dateien, die auf dem PATH verbleiben müssen, an die uv-Tool-Installation.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="590" rx="28" fill="#0f172a" />
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Wählen Sie eine Tool-Umgebung entsprechend dem, was sie wahrnehmen muss.</text>
  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <g transform="translate(55 135)"><rect width="340" height="340" rx="22" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="170" y="52" fill="#93c5fd" font-size="23" font-weight="700">UV-Training</text><text x="170" y="92" fill="#93c5fd" font-size="17">mit dem Projekt verknüpft</text><text x="170" y="145" fill="#e2e8f0" font-size="15">Projektcode importieren</text><text x="170" y="178" fill="#e2e8f0" font-size="15">nutzt gesperrte Gruppen und Plugins</text><text x="170" y="211" fill="#e2e8f0" font-size="15">Der Lebenszyklus folgt dem Repository.</text><rect x="35" y="260" width="270" height="50" rx="12" fill="#1d4ed8" /><text x="170" y="291" fill="#93c5fd" font-size="15">uv ausführen --Gruppe test mit pytest</text></g>
    <g transform="translate(430 135)"><rect width="340" height="340" rx="22" fill="#5b21b6" /><text x="170" y="52" fill="#93c5fd" font-size="23" font-weight="700">uvx</text><text x="170" y="92" fill="#c4b5fd" font-size="17">ad hoc und isoliert</text><text x="170" y="145" fill="#e2e8f0" font-size="15">erkennt die Projektimporte nicht.</text><text x="170" y="178" fill="#e2e8f0" font-size="15">Die Umgebung befindet sich im Cache.</text><text x="170" y="211" fill="#e2e8f0" font-size="15">Pin-Version zur Wiederholgenauigkeit</text><rect x="35" y="260" width="270" height="50" rx="12" fill="#5b21b6" /><text x="170" y="291" fill="#93c5fd" font-size="15">uvx ruff@0.12.0 überprüfen.</text></g>
    <g transform="translate(805 135)"><rect width="340" height="340" rx="22" fill="#166534" /><text x="170" y="52" fill="#93c5fd" font-size="23" font-weight="700">Installierung des UV-Tools</text><text x="170" y="92" fill="#93c5fd" font-size="17">persistent und im PATH vorhanden</text><text x="170" y="145" fill="#e2e8f0" font-size="15">spezialisierte Toolumgebung</text><text x="170" y="178" fill="#e2e8f0" font-size="15">für andere Programme verfügbar</text><text x="170" y="211" fill="#e2e8f0" font-size="15">expliziter Upgrade-Lebenszyklus</text><rect x="35" y="260" width="270" height="50" rx="12" fill="#166534" /><text x="170" y="291" fill="#86efac" font-size="15">Installieren Sie das UV-Tool mit dem Befehl ‘ruff==0.12.0’.</text></g>
    <rect x="245" y="515" width="710" height="42" rx="14" fill="#1e293b" /><text x="600" y="542" fill="#cbd5e1" font-size="16">Isolation ist eine Funktion – wählen Sie die Sichtbarkeit des Projekts bewusst aus.</text>
  </g>
</svg>
