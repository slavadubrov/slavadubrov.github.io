<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 720" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Taxonomie der stillen Ausfälle</title>
  <desc id="artifact-desc">Taxonomie der stillen Ausfälle.</desc>
  <defs>
    <filter id="shadowSF" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a" x="590">Taxonomie der stillen Ausfälle</text>
  <text y="54" text-anchor="middle" font-size="12" fill="#334155" x="590">Jeder Fehlermodus wird mit der Metrik verknüpft, die ihn erfasst. Ohne diese Metrik bleibt der Fehler unsichtbar.</text>

  <!-- Root -->
  <rect x="475" y="78" width="230" height="44" rx="22" fill="#dc2626" filter="url(#shadowSF)" />
  <text y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" x="590">Stiller Ausfall (RAG)</text>

  <!-- Trunk: 4 main branches -->
  <line x1="540" y1="122" x2="170" y2="170" stroke="#94a3b8" stroke-width="1.4" />
  <line x1="570" y1="122" x2="450" y2="170" stroke="#94a3b8" stroke-width="1.4" />
  <line x1="610" y1="122" x2="730" y2="170" stroke="#94a3b8" stroke-width="1.4" />
  <line x1="640" y1="122" x2="1010" y2="170" stroke="#94a3b8" stroke-width="1.4" />

  <!-- ====== Branch A: Ingestion ====== -->
  <rect x="40" y="170" width="260" height="40" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8" x="170">Erfassungsfehler</text>

  <!-- A1: Parse loss -->
  <rect x="40" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="245" font-size="11" font-weight="700" fill="#1d4ed8" x="50">Parse-Verlust</text>
  <text y="261" font-size="10" fill="#334155" x="50">Tabellen kollabieren · Fußnoten</text>
  <text y="275" font-size="10" fill="#334155" x="50">verloren gegangen · OCR verfälscht Ziffern</text>
  <text y="285" font-size="9" font-style="italic" fill="#64748b" x="50">erfasst durch: CER/WER, TEDS</text>

  <!-- A2: Chunk break -->
  <rect x="40" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="320" font-size="11" font-weight="700" fill="#1d4ed8" x="50">Chunk-Trennung</text>
  <text y="336" font-size="10" fill="#334155" x="50">Antwortspanne, die auf zwei Teile aufgeteilt ist</text>
  <text y="350" font-size="10" fill="#334155" x="50">Blöcke; keiner verfügt über vollständige Belege.</text>
  <text y="360" font-size="9" font-style="italic" fill="#64748b" x="50">erfasst durch: Answer-Span-Kontainment</text>

  <!-- A3: Dedup miss -->
  <rect x="40" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="395" font-size="11" font-weight="700" fill="#1d4ed8" x="50">Fehler bei der Deduplizierung</text>
  <text y="411" font-size="10" fill="#334155" x="50">Falsches Zusammenführen zerstört die Antwort;</text>
  <text y="425" font-size="10" fill="#334155" x="50">False-Keep versteckt das richtige Dokument.</text>
  <text y="435" font-size="9" font-style="italic" fill="#64748b" x="50">erfasst durch: Duplizitätsgenauigkeit/Auflösung</text>

  <!-- A4: Normalization -->
  <rect x="40" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="470" font-size="11" font-weight="700" fill="#1d4ed8" x="50">Normalisierungsdrift</text>
  <text y="486" font-size="10" fill="#334155" x="50">Fehler durch Inkonsistenz zwischen NFC und NFKC</text>
  <text y="500" font-size="10" fill="#334155" x="50">Alias-Resolution bei exakter Übereinstimmung</text>
  <text y="510" font-size="9" font-style="italic" fill="#64748b" x="50">erfasst durch: NFC/NFKC-Parität, Alias-Coverage</text>

  <!-- ====== Branch B: Embedding/Index ====== -->
  <rect x="320" y="170" width="260" height="40" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8" x="450">Einbettung und Indexierung</text>

  <!-- B1: Embedding miss -->
  <rect x="320" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="245" font-size="11" font-weight="700" fill="#1d4ed8" x="330">Embedding-Fehler</text>
  <text y="261" font-size="10" fill="#334155" x="330">Der Domänebegriff befindet sich außerhalb von</text>
  <text y="275" font-size="10" fill="#334155" x="330">Trainingsverteilung des Modells</text>
  <text y="285" font-size="9" font-style="italic" fill="#64748b" x="330">Erfasst durch: Domain-Recall@k im Vergleich zur Baseline</text>

  <!-- B2: ANN drop -->
  <rect x="320" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="320" font-size="11" font-weight="700" fill="#1d4ed8" x="330">Abfall der ANN-Annäherung</text>
  <text y="336" font-size="10" fill="#334155" x="330">HNSW efSearch zu niedrig; Gold</text>
  <text y="350" font-size="10" fill="#334155" x="330">Der Vektor existiert, wird aber nicht erreicht.</text>
  <text y="360" font-size="9" font-style="italic" fill="#64748b" x="330">Erfasst durch: ANN-Rückrufrate gegenüber konstanter Rate</text>

  <!-- B3: Embedding drift -->
  <rect x="320" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="395" font-size="11" font-weight="700" fill="#1d4ed8" x="330">Embedding-Drift</text>
  <text y="411" font-size="10" fill="#334155" x="330">Erhöhung der Version des Anbietermodells;</text>
  <text y="425" font-size="10" fill="#334155" x="330">alte Vektoren sind nicht mehr ausgerichtet</text>
  <text y="435" font-size="9" font-style="italic" fill="#64748b" x="330">erfasst durch: Probe-Set NN-Stabilität</text>

  <!-- B4: Stale index -->
  <rect x="320" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="470" font-size="11" font-weight="700" fill="#1d4ed8" x="330">Veralteter Index</text>
  <text y="486" font-size="10" fill="#334155" x="330">Frischeverzögerung; ausgeführte Abfragen</text>
  <text y="500" font-size="10" fill="#334155" x="330">im Vergleich zur Wahrheit von letzter Woche</text>
  <text y="510" font-size="9" font-style="italic" fill="#64748b" x="330">aufgefangen durch: Freshness-Lag p99, %-veraltet</text>

  <!-- ====== Branch C: Online retrieval (HOT — silent killers) ====== -->
  <rect x="600" y="170" width="260" height="40" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2" />
  <text y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b" x="730">Online-Aufruf</text>

  <!-- C1: Filter exclude (highlighted) -->
  <rect x="600" y="225" width="260" height="64" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2" filter="url(#shadowSF)" />
  <text y="245" font-size="11" font-weight="700" fill="#991b1b" x="610">Fehlerausschluss-Filter</text>
  <text y="261" font-size="10" fill="#334155" x="610">Harte Prädikate führen zum Verlust des Gold-Dokuments;</text>
  <text y="275" font-size="10" fill="#334155" x="610">Recall@k erscheint normal – auf einem leeren Mengensatz</text>
  <text y="285" font-size="9" font-style="italic" fill="#991b1b" x="610">erfasst durch: Filter-Rate für Fehl-Ausschlüsse</text>

  <!-- C2: Rerank miss -->
  <rect x="600" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="320" font-size="11" font-weight="700" fill="#991b1b" x="610">Fehler bei der Neubewertung</text>
  <text y="336" font-size="10" fill="#334155" x="610">Der Cross-Encoder degradiert den rechten Kanal</text>
  <text y="350" font-size="10" fill="#334155" x="610">Dokument hinter plausiblen Ablenkungen</text>
  <text y="360" font-size="9" font-style="italic" fill="#64748b" x="610">erfasst durch: ΔnDCG, Robustheit gegenüber Ablenkungen (RGB)</text>

  <!-- C3: Lost in middle -->
  <rect x="600" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="395" font-size="11" font-weight="700" fill="#991b1b" x="610">In der Mitte verloren</text>
  <text y="411" font-size="10" fill="#334155" x="610">Goldklumpen im Kontext, jedoch in</text>
  <text y="425" font-size="10" fill="#334155" x="610">Position 7/10; das Modell ignoriert sie.</text>
  <text y="435" font-size="9" font-style="italic" fill="#64748b" x="610">erfasst durch: position-stratifizierte Bewertung</text>

  <!-- C4: Bad rewrite -->
  <rect x="600" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="470" font-size="11" font-weight="700" fill="#991b1b" x="610">Regression bei der Umformulierung von Abfragen</text>
  <text y="486" font-size="10" fill="#334155" x="610">HyDE erzeugt eine Halluzination einer Entität, die</text>
  <text y="500" font-size="10" fill="#334155" x="610">die Abfrage wird in die falsche Richtung geneigt</text>
  <text y="510" font-size="9" font-style="italic" fill="#64748b" x="610">erfasst durch: Rewrite-Gewinn/Verlust A/B</text>

  <!-- ====== Branch D: Generation/Citation ====== -->
  <rect x="880" y="170" width="260" height="40" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" />
  <text y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6" x="1010">Generierung</text>

  <!-- D1: Hallucination -->
  <rect x="880" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="245" font-size="11" font-weight="700" fill="#5b21b6" x="890">Halluzination</text>
  <text y="261" font-size="10" fill="#334155" x="890">nicht unterstützte Angabe, meist ein</text>
  <text y="275" font-size="10" fill="#334155" x="890">Entität ist nicht im Kontext vorhanden.</text>
  <text y="285" font-size="9" font-style="italic" fill="#64748b" x="890">erfasst durch: Faithfulness, HHEM, FActScore</text>

  <!-- D2: No citation -->
  <rect x="880" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="320" font-size="11" font-weight="700" fill="#5b21b6" x="890">Zitiertheater</text>
  <text y="336" font-size="10" fill="#334155" x="890">der zitierte Abschnitt enthält tatsächlich nicht</text>
  <text y="350" font-size="10" fill="#334155" x="890">die darunterstehende Angabe untermauern</text>
  <text y="360" font-size="9" font-style="italic" fill="#64748b" x="890" transform="translate(-47.26 0.00)">erfasst durch: Präzision/Zurückrufrate der Zitationen (TREC-Unterstützung)</text>

  <!-- D3: Wrong refusal -->
  <rect x="880" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="395" font-size="11" font-weight="700" fill="#5b21b6" x="890">Falsche Enthaltung</text>
  <text y="411" font-size="10" fill="#334155" x="890">"Ich weiß es nicht", wenn die Antwort</text>
  <text y="425" font-size="10" fill="#334155" x="890">ist im Kontext enthalten (oder umgekehrt)</text>
  <text y="435" font-size="9" font-style="italic" fill="#64748b" x="890">Erfasst von: NoMIRACL, Genauigkeit der Enthaltung</text>

  <!-- D4: Schema break -->
  <rect x="880" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadowSF)" />
  <text y="470" font-size="11" font-weight="700" fill="#5b21b6" x="890">Schema/Wortschatz-Abruch</text>
  <text y="486" font-size="10" fill="#334155" x="890">syntaxisch gültige Ausgabeauswahlen</text>
  <text y="500" font-size="10" fill="#334155" x="890">eine fehlerhafte, aber gültige Ontologie-ID</text>
  <text y="510" font-size="9" font-style="italic" fill="#64748b" x="890">erfasst durch: Wortschatzkonformität</text>

  <!-- Footer band -->
  <rect x="40" y="555" width="1100" height="68" rx="8" fill="#f0fdf4" stroke="#ea580c" stroke-width="1.2" />
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="590">Leseanleitung</text>
  <text y="598" text-anchor="middle" font-size="10" fill="#9a3412" x="590">Jeder Fehler bleibt unbemerkt, solange keine entsprechenden Metriken vorliegen. Allein die übliche „Richtigkeitsrate der Antworten“ gibt lediglich Aufschluss darüber, dass etwas fehlerhaft ist – nicht jedoch wo genau.</text>
  <text y="614" text-anchor="middle" font-size="10" fill="#9a3412" x="590">Der rote Pfeil (Filterausnahme, Fehl-Ranking, „Verloren im Mittel“, schlechte Überarbeitung) zeigt die Bereiche auf, in denen RAG in der Produktion am stärksten leidet. Instrumentieren Sie diese zuerst.</text>

  <!-- Visual cue: the 'red' propagation -->
  <rect x="40" y="640" width="1100" height="62" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="662" font-size="11" font-weight="600" fill="#0f172a" x="60">Die Verbreitungsregel:</text>
  <text y="682" font-size="10" fill="#334155" x="60" textLength="1168.58" lengthAdjust="spacingAndGlyphs" transform="translate(-54.29 0.00)">Ein Fehler auf der linken Seite stellt eine Obergrenze für die Abruffähigkeit aller Elemente auf der rechten Seite dar. Eine fehlerhafte Parsing-Verarbeitung begrenzt die Aufteilung in Blöcke. Eine fehlerhafte Blockaufteilung wiederum begrenzt die Abrufleistung.</text>
  <text y="696" font-size="10" fill="#334155" x="60" transform="translate(-27.89 0.00)">Fehlerhafte Begrenzungen bei der Wiederherstellung und Neubewertung. Fehlende Begrenzungen bei der Erzeugung der Neubewertung. Die Treuebewertung berücksichtigt nur den letzten Link – sie erkennt die unterbrochene Kette nicht.</text>
</svg>
