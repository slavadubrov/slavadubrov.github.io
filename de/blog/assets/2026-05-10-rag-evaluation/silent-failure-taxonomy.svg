<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 720" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadowSF" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Title -->
  <text x="590" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a2e">Taxonomie stiller Fehler</text>
  <text x="590" y="54" text-anchor="middle" font-size="12" fill="#666">Jeder Fehlermodus ist mit der Metrik gepaart, die ihn erkennt. Ohne die Metrik ist der Bug unsichtbar.</text>

  <!-- Root -->
  <rect x="475" y="78" width="230" height="44" rx="22" fill="#c62828" filter="url(#shadowSF)" />
  <text x="590" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="white">Stiller Fehler (RAG)</text>

  <!-- Trunk: 4 main branches -->
  <line x1="540" y1="122" x2="170" y2="170" stroke="#888" stroke-width="1.4" />
  <line x1="570" y1="122" x2="450" y2="170" stroke="#888" stroke-width="1.4" />
  <line x1="610" y1="122" x2="730" y2="170" stroke="#888" stroke-width="1.4" />
  <line x1="640" y1="122" x2="1010" y2="170" stroke="#888" stroke-width="1.4" />

  <!-- ====== Branch A: Ingestion ====== -->
  <rect x="40" y="170" width="260" height="40" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" />
  <text x="170" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">Ingestionsfehler</text>

  <!-- A1: Parse loss -->
  <rect x="40" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="50" y="245" font-size="11" font-weight="700" fill="#1565c0">Parse-Verlust</text>
  <text x="50" y="261" font-size="10" fill="#444">Tabellen kollabieren · Fußnoten</text>
  <text x="50" y="275" font-size="10" fill="#444">fallen weg · OCR verdreht Ziffern</text>
  <text x="50" y="285" font-size="9" font-style="italic" fill="#888">erkannt durch: CER/WER, TEDS</text>

  <!-- A2: Chunk break -->
  <rect x="40" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="50" y="320" font-size="11" font-weight="700" fill="#1565c0">Chunk-Bruch</text>
  <text x="50" y="336" font-size="10" fill="#444">Antwortspanne auf zwei</text>
  <text x="50" y="350" font-size="10" fill="#444">Chunks verteilt; keiner hat den vollen Beleg</text>
  <text x="50" y="360" font-size="9" font-style="italic" fill="#888">erkannt durch: answer-span containment</text>

  <!-- A3: Dedup miss -->
  <rect x="40" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="50" y="395" font-size="11" font-weight="700" fill="#1565c0">Dedup-Fehler</text>
  <text x="50" y="411" font-size="10" fill="#444">falsches Mergen verfälscht die Antwort;</text>
  <text x="50" y="425" font-size="10" fill="#444">falsches Behalten vergräbt das richtige Dok.</text>
  <text x="50" y="435" font-size="9" font-style="italic" fill="#888">erkannt durch: Dup-Präzision/-Recall</text>

  <!-- A4: Normalization -->
  <rect x="40" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="50" y="470" font-size="11" font-weight="700" fill="#1565c0">Normalisierungsdrift</text>
  <text x="50" y="486" font-size="10" fill="#444">NFC- vs. NFKC-Mismatch bricht</text>
  <text x="50" y="500" font-size="10" fill="#444">Exact-Match-Aliasauflösung</text>
  <text x="50" y="510" font-size="9" font-style="italic" fill="#888">erkannt durch: NFC/NFKC-Parität, Alias-Abdeckung</text>

  <!-- ====== Branch B: Embedding/Index ====== -->
  <rect x="320" y="170" width="260" height="40" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" />
  <text x="450" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">Embedding &amp; Index</text>

  <!-- B1: Embedding miss -->
  <rect x="320" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="330" y="245" font-size="11" font-weight="700" fill="#1565c0">Embedding-Fehltreffer</text>
  <text x="330" y="261" font-size="10" fill="#444">Domänenbegriff liegt außerhalb der</text>
  <text x="330" y="275" font-size="10" fill="#444">Trainingsverteilung des Modells</text>
  <text x="330" y="285" font-size="9" font-style="italic" fill="#888">erkannt durch: Domänen-Recall@k vs. Baseline</text>

  <!-- B2: ANN drop -->
  <rect x="320" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="330" y="320" font-size="11" font-weight="700" fill="#1565c0">ANN-Näherungsverlust</text>
  <text x="330" y="336" font-size="10" fill="#444">HNSW efSearch zu niedrig; Gold-</text>
  <text x="330" y="350" font-size="10" fill="#444">Vektor existiert, wird aber nicht erreicht</text>
  <text x="330" y="360" font-size="9" font-style="italic" fill="#888">erkannt durch: ANN-Recall vs. Flat</text>

  <!-- B3: Embedding drift -->
  <rect x="320" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="330" y="395" font-size="11" font-weight="700" fill="#1565c0">Embedding-Drift</text>
  <text x="330" y="411" font-size="10" fill="#444">Versionssprung beim Provider-Modell;</text>
  <text x="330" y="425" font-size="10" fill="#444">alte Vektoren sind nicht mehr ausgerichtet</text>
  <text x="330" y="435" font-size="9" font-style="italic" fill="#888">erkannt durch: Probe-Set-NN-Stabilität</text>

  <!-- B4: Stale index -->
  <rect x="320" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="330" y="470" font-size="11" font-weight="700" fill="#1565c0">Veralteter Index</text>
  <text x="330" y="486" font-size="10" fill="#444">Frische-Lag; Abfragen laufen</text>
  <text x="330" y="500" font-size="10" fill="#444">gegen den Stand von letzter Woche</text>
  <text x="330" y="510" font-size="9" font-style="italic" fill="#888">erkannt durch: freshness lag p99, %-stale</text>

  <!-- ====== Branch C: Online retrieval (HOT — silent killers) ====== -->
  <rect x="600" y="170" width="260" height="40" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="2" />
  <text x="730" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#c62828">Online-Retrieval</text>

  <!-- C1: Filter exclude (highlighted) -->
  <rect x="600" y="225" width="260" height="64" rx="8" fill="#ffebee" stroke="#c62828" stroke-width="2" filter="url(#shadowSF)" />
  <text x="610" y="245" font-size="11" font-weight="700" fill="#c62828">Filter-Falschausschluss</text>
  <text x="610" y="261" font-size="10" fill="#444">harte Bedingung verwirft Gold-Dok.;</text>
  <text x="610" y="275" font-size="10" fill="#444">Recall@k wirkt normal — über leerer Menge</text>
  <text x="610" y="285" font-size="9" font-style="italic" fill="#c62828">erkannt durch: Filter-Falschausschlussrate</text>

  <!-- C2: Rerank miss -->
  <rect x="600" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#c62828" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="610" y="320" font-size="11" font-weight="700" fill="#c62828">Rerank-Fehler</text>
  <text x="610" y="336" font-size="10" fill="#444">Cross-Encoder stuft das richtige</text>
  <text x="610" y="350" font-size="10" fill="#444">Dok. hinter plausible Ablenker zurück</text>
  <text x="610" y="360" font-size="9" font-style="italic" fill="#888">erkannt durch: ΔnDCG, Ablenker-Robustheit (RGB)</text>

  <!-- C3: Lost in middle -->
  <rect x="600" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#c62828" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="610" y="395" font-size="11" font-weight="700" fill="#c62828">In der Mitte verloren</text>
  <text x="610" y="411" font-size="10" fill="#444">Gold-Chunk im Kontext, aber an</text>
  <text x="610" y="425" font-size="10" fill="#444">Position 7/10; Modell ignoriert ihn</text>
  <text x="610" y="435" font-size="9" font-style="italic" fill="#888">erkannt durch: positionsstratifizierte Eval</text>

  <!-- C4: Bad rewrite -->
  <rect x="600" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#c62828" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="610" y="470" font-size="11" font-weight="700" fill="#c62828">Query-Rewrite-Regression</text>
  <text x="610" y="486" font-size="10" fill="#444">HyDE halluziniert eine Entität, die</text>
  <text x="610" y="500" font-size="10" fill="#444">das Retrieval falsch lenkt</text>
  <text x="610" y="510" font-size="9" font-style="italic" fill="#888">erkannt durch: Rewrite-Gewinn/Verlust A/B</text>

  <!-- ====== Branch D: Generation/Citation ====== -->
  <rect x="880" y="170" width="260" height="40" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" />
  <text x="1010" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#6a1b9a">Generierung</text>

  <!-- D1: Hallucination -->
  <rect x="880" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="890" y="245" font-size="11" font-weight="700" fill="#6a1b9a">Halluzination</text>
  <text x="890" y="261" font-size="10" fill="#444">unbelegte Behauptung, oft eine</text>
  <text x="890" y="275" font-size="10" fill="#444">Entität, die nicht im Kontext ist</text>
  <text x="890" y="285" font-size="9" font-style="italic" fill="#888">erkannt durch: faithfulness, HHEM, FActScore</text>

  <!-- D2: No citation -->
  <rect x="880" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="890" y="320" font-size="11" font-weight="700" fill="#6a1b9a">Zitations-Theater</text>
  <text x="890" y="336" font-size="10" fill="#444">zitierte Spanne stützt die</text>
  <text x="890" y="350" font-size="10" fill="#444">nahe Behauptung tatsächlich nicht</text>
  <text x="890" y="360" font-size="9" font-style="italic" fill="#888">erkannt durch: Zitations-Präzision/-Recall (TREC support)</text>

  <!-- D3: Wrong refusal -->
  <rect x="880" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="890" y="395" font-size="11" font-weight="700" fill="#6a1b9a">Falsche Enthaltung</text>
  <text x="890" y="411" font-size="10" fill="#444">"Ich weiß es nicht", wenn die Antwort</text>
  <text x="890" y="425" font-size="10" fill="#444">im Kontext ist (oder umgekehrt)</text>
  <text x="890" y="435" font-size="9" font-style="italic" fill="#888">erkannt durch: NoMIRACL, Enthaltungsgenauigkeit</text>

  <!-- D4: Schema break -->
  <rect x="880" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.2" filter="url(#shadowSF)" />
  <text x="890" y="470" font-size="11" font-weight="700" fill="#6a1b9a">Schema/Vokabular-Bruch</text>
  <text x="890" y="486" font-size="10" fill="#444">syntaktisch gültige Ausgabe wählt</text>
  <text x="890" y="500" font-size="10" fill="#444">eine falsche, aber gültige Ontologie-ID</text>
  <text x="890" y="510" font-size="9" font-style="italic" fill="#888">erkannt durch: Vokabular-Konformität</text>

  <!-- Footer band -->
  <rect x="40" y="555" width="1100" height="68" rx="8" fill="#fffde7" stroke="#fbc02d" stroke-width="1.2" />
  <text x="590" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#827717">Lesehilfe</text>
  <text x="590" y="598" text-anchor="middle" font-size="10" fill="#827717">Jeder Fehler bleibt ohne seine Metrik still. Standard-"Antwortkorrektheit" zeigt nur, dass etwas kaputt ist — nicht wo.</text>
  <text x="590" y="614" text-anchor="middle" font-size="10" fill="#827717">Der rote Zweig (Filterausschluss, Rerank-Fehler, in der Mitte verloren, schlechtes Rewrite) ist, wo produktives RAG meist schmerzt. Diesen zuerst instrumentieren.</text>

  <!-- Visual cue: the 'red' propagation -->
  <rect x="40" y="640" width="1100" height="62" rx="8" fill="#ffffff" stroke="#cbd5e0" stroke-width="1" />
  <text x="60" y="662" font-size="11" font-weight="600" fill="#1a1a2e">Die Fortpflanzungsregel:</text>
  <text x="60" y="682" font-size="10" fill="#555">Ein Fehler links ist eine Recall-Obergrenze für alles rechts. Schlechtes Parsing begrenzt Chunking. Schlechtes Chunking begrenzt Retrieval.</text>
  <text x="60" y="696" font-size="10" fill="#555">Schlechtes Retrieval begrenzt Reranking. Schlechtes Reranking begrenzt Generierung. Faithfulness misst nur das letzte Glied — die kaputte Kette sieht es nicht.</text>
</svg>
