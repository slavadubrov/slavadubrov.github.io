<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 660" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrLayer" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#555" />
    </marker>
    <filter id="shadowL" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Title -->
  <text x="590" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a2e">Die Drei-Schichten-Evaluationsdisziplin</text>
  <text x="590" y="54" text-anchor="middle" font-size="12" fill="#666">Offline-Korpus &amp; Index · Online-Abruf &amp; Generierung · Verifikation nach Generierung + Produktions-Telemetrie</text>

  <!-- =============== Layer 1: Offline =============== -->
  <rect x="30" y="80" width="1120" height="160" rx="12" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowL)" />
  <text x="55" y="106" font-size="14" font-weight="700" fill="#1565c0">Schicht 1 · Offline</text>
  <text x="55" y="124" font-size="10" fill="#1565c0">Frage: wurde die Wissensbasis korrekt vorbereitet?</text>

  <!-- Sub-cards -->
  <rect x="55" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1" />
  <text x="175" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">Korpus-Reife</text>
  <text x="175" y="178" text-anchor="middle" font-size="10" fill="#555">Parse-Erfolgsrate · CER/WER</text>
  <text x="175" y="193" text-anchor="middle" font-size="10" fill="#555">TEDS · Metadaten-Abdeckung</text>
  <text x="175" y="208" text-anchor="middle" font-size="10" fill="#555">Aktualität · Dedup</text>

  <rect x="305" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1" />
  <text x="425" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">Chunking</text>
  <text x="425" y="178" text-anchor="middle" font-size="10" fill="#555">Antwortspannen-Abdeckung</text>
  <text x="425" y="193" text-anchor="middle" font-size="10" fill="#555">Grenzbruch-Rate</text>
  <text x="425" y="208" text-anchor="middle" font-size="10" fill="#555">Überlappungs-Redundanz</text>

  <rect x="555" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1" />
  <text x="675" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">Embedding · Index</text>
  <text x="675" y="178" text-anchor="middle" font-size="10" fill="#555">Domänen-nDCG@10</text>
  <text x="675" y="193" text-anchor="middle" font-size="10" fill="#555">ANN Recall vs. flat</text>
  <text x="675" y="208" text-anchor="middle" font-size="10" fill="#555">Drift-Baseline</text>

  <rect x="805" y="140" width="320" height="80" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1" />
  <text x="965" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">Anreicherung (NER · EL · Tags)</text>
  <text x="965" y="178" text-anchor="middle" font-size="10" fill="#555">EL F1 · NIL-Handling · Alias-Abdeckung</text>
  <text x="965" y="193" text-anchor="middle" font-size="10" fill="#555">Hierarchisches F1 · Orphan-Tag-Rate</text>
  <text x="965" y="208" text-anchor="middle" font-size="10" fill="#555">Schema-Gültigkeit bei Veröffentlichung</text>

  <!-- Arrow down to Layer 2 -->
  <line x1="590" y1="244" x2="590" y2="280" stroke="#555" stroke-width="1.6" marker-end="url(#arrLayer)" />
  <text x="700" y="265" font-size="10" fill="#888" font-style="italic">setzt die Recall-Obergrenze für alles darunter</text>

  <!-- =============== Layer 2: Online =============== -->
  <rect x="30" y="290" width="1120" height="160" rx="12" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowL)" />
  <text x="55" y="316" font-size="14" font-weight="700" fill="#e65100">Schicht 2 · Online (pro Anfrage)</text>
  <text x="55" y="334" font-size="10" fill="#e65100">Frage: wurden die richtigen Belege für diese Anfrage gefunden und genutzt?</text>

  <rect x="55" y="350" width="240" height="80" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1" />
  <text x="175" y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Anfrageverständnis</text>
  <text x="175" y="388" text-anchor="middle" font-size="10" fill="#555">Rewrite-Gewinn/-Verlust</text>
  <text x="175" y="403" text-anchor="middle" font-size="10" fill="#555">Routing-Genauigkeit</text>
  <text x="175" y="418" text-anchor="middle" font-size="10" fill="#555">Dekompositions-Abdeckung</text>

  <rect x="305" y="350" width="240" height="80" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1" />
  <text x="425" y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Abruf</text>
  <text x="425" y="388" text-anchor="middle" font-size="10" fill="#555">Recall@k · MRR · nDCG · MAP</text>
  <text x="425" y="403" text-anchor="middle" font-size="10" fill="#555">Kontext-Präzision/Recall</text>
  <text x="425" y="418" text-anchor="middle" font-size="10" fill="#555">Hybrid-Lift je Pfad</text>

  <rect x="555" y="350" width="240" height="80" rx="8" fill="#ffebee" stroke="#c62828" stroke-width="1.6" />
  <text x="675" y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#c62828">Filterung (Hot Zone)</text>
  <text x="675" y="388" text-anchor="middle" font-size="10" fill="#c62828">Filter-Falschausschlussrate</text>
  <text x="675" y="403" text-anchor="middle" font-size="10" fill="#c62828">Prädikat-Präzision/Recall</text>
  <text x="675" y="418" text-anchor="middle" font-size="10" fill="#c62828">Shadow-Retrieval Δ</text>

  <rect x="805" y="350" width="320" height="80" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1" />
  <text x="965" y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Reranking · Kontextaufbau</text>
  <text x="965" y="388" text-anchor="middle" font-size="10" fill="#555">ΔnDCG · ΔMRR ggü. ohne Rerank</text>
  <text x="965" y="403" text-anchor="middle" font-size="10" fill="#555">Kontextnutzung · lost-in-middle</text>
  <text x="965" y="418" text-anchor="middle" font-size="10" fill="#555">Distraktor-Robustheit (RGB)</text>

  <!-- Arrow down to Layer 3 -->
  <line x1="590" y1="454" x2="590" y2="490" stroke="#555" stroke-width="1.6" marker-end="url(#arrLayer)" />
  <text x="700" y="475" font-size="10" fill="#888" font-style="italic">führt verifizierten Kontext in die Generierung ein</text>

  <!-- =============== Layer 3: Post-gen =============== -->
  <rect x="30" y="500" width="1120" height="135" rx="12" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadowL)" />
  <text x="55" y="526" font-size="14" font-weight="700" fill="#2e7d32">Schicht 3 · Nach Generierung &amp; Produktions-Telemetrie</text>
  <text x="55" y="544" font-size="10" fill="#2e7d32">Frage: ist die Antwort treu, verifizierbar und sicher auslieferbar — und bleibt das auch nächste Woche so?</text>

  <rect x="55" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="175" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Faithfulness</text>
  <text x="175" y="595" text-anchor="middle" font-size="10" fill="#555">RAGAS · HHEM · FActScore</text>
  <text x="175" y="610" text-anchor="middle" font-size="10" fill="#555">FaithJudge · Selbstkonsistenz</text>

  <rect x="305" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="425" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Zitate &amp; Struktur</text>
  <text x="425" y="595" text-anchor="middle" font-size="10" fill="#555">Zitat-Präzision/Recall</text>
  <text x="425" y="610" text-anchor="middle" font-size="10" fill="#555">Schema-Gültigkeit · Vokabular-Konformität</text>

  <rect x="555" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="675" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Implizites + explizites Signal</text>
  <text x="675" y="595" text-anchor="middle" font-size="10" fill="#555">Regen-Rate · Verweildauer · CTR auf Zitate</text>
  <text x="675" y="610" text-anchor="middle" font-size="10" fill="#555">Daumen · Stern · Inline-Edits</text>

  <rect x="805" y="558" width="320" height="68" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="965" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Drift · Kosten · Latenz · HITL</text>
  <text x="965" y="595" text-anchor="middle" font-size="10" fill="#555">Anfrage-/Embedding-Drift · p95-Latenz · $/Anfrage</text>
  <text x="965" y="610" text-anchor="middle" font-size="10" fill="#555">Shadow-Eval · Review-Warteschlange bei niedriger Konfidenz</text>
</svg>
