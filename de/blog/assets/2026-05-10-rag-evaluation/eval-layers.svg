<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 660" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrLayer" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#555" />
    </marker>
    <filter id="shadowL" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Title -->
  <text x="590" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a2e">Dreischichtige Bewertungsdisziplin</text>
  <text x="590" y="54" text-anchor="middle" font-size="12" fill="#666">Offline-Korpus und Index · Online-Auswertung und Generierung · Nach-Generierungs-Überprüfung + Produktions-Telemetrie</text>

  <!-- =============== Layer 1: Offline =============== -->
  <rect x="30" y="80" width="1120" height="160" rx="12" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowL)" />
  <text x="55" y="106" font-size="14" font-weight="700" fill="#1565c0">Ebene 1 · Offline</text>
  <text x="55" y="124" font-size="10" fill="#1565c0">Frage: Wurde die Wissensdatenbank korrekt vorbereitet?</text>

  <!-- Sub-cards -->
  <rect x="55" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1" />
  <text x="175" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">Korpus-Verfügbarkeit</text>
  <text x="175" y="178" text-anchor="middle" font-size="10" fill="#555">Auswertung der Bestehensrate · CER/WER</text>
  <text x="175" y="193" text-anchor="middle" font-size="10" fill="#555">TEDS · Metadatenabdeckung</text>
  <text x="175" y="208" text-anchor="middle" font-size="10" fill="#555">Frische · Deduplizierung</text>

  <rect x="305" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1" />
  <text x="425" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">Chunking</text>
  <text x="425" y="178" text-anchor="middle" font-size="10" fill="#555">Containment von answer-span</text>
  <text x="425" y="193" text-anchor="middle" font-size="10" fill="#555">Grenzbruchrate</text>
  <text x="425" y="208" text-anchor="middle" font-size="10" fill="#555">Überlappungsredundanz</text>

  <rect x="555" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1" />
  <text x="675" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">Embedding · Indexierung</text>
  <text x="675" y="178" text-anchor="middle" font-size="10" fill="#555">Domäne nDCG@10</text>
  <text x="675" y="193" text-anchor="middle" font-size="10" fill="#555">ANN-Rückrufrate gegenüber konstanter Werte</text>
  <text x="675" y="208" text-anchor="middle" font-size="10" fill="#555">Drift-Baseline</text>

  <rect x="805" y="140" width="320" height="80" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1" />
  <text x="965" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">Erweiterung (NER · EL · Tags)</text>
  <text x="965" y="178" text-anchor="middle" font-size="10" fill="#555">EL F1 · Handhabung von NULL-Werten · Alias-Coverage</text>
  <text x="965" y="193" text-anchor="middle" font-size="10" fill="#555">hierarchische F1-Wert · Rate der orphanten Tags</text>
  <text x="965" y="208" text-anchor="middle" font-size="10" fill="#555">Schema-Gültigkeit zum Zeitpunkt der Veröffentlichung</text>

  <!-- Arrow down to Layer 2 -->
  <line x1="590" y1="244" x2="590" y2="280" stroke="#555" stroke-width="1.6" marker-end="url(#arrLayer)" />
  <text x="700" y="265" font-size="10" fill="#888" font-style="italic">legt die Obergrenze für den Recall für alle darunter fest</text>

  <!-- =============== Layer 2: Online =============== -->
  <rect x="30" y="290" width="1120" height="160" rx="12" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowL)" />
  <text x="55" y="316" font-size="14" font-weight="700" fill="#e65100">Ebene 2 · Online (pro Abfrage)</text>
  <text x="55" y="334" font-size="10" fill="#e65100">Frage: Wurden die richtigen Beweismittel für diese Abfrage gefunden und verwendet?</text>

  <rect x="55" y="350" width="240" height="80" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1" />
  <text x="175" y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Analyse der Abfrage</text>
  <text x="175" y="388" text-anchor="middle" font-size="10" fill="#555">Übertragungsgewinn/Verlust umschreiben</text>
  <text x="175" y="403" text-anchor="middle" font-size="10" fill="#555">Routinggenauigkeit</text>
  <text x="175" y="418" text-anchor="middle" font-size="10" fill="#555">Zerlegungskopplung</text>

  <rect x="305" y="350" width="240" height="80" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1" />
  <text x="425" y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Datenerfassung</text>
  <text x="425" y="388" text-anchor="middle" font-size="10" fill="#555">Recall@k · MRR · nDCG · MAP</text>
  <text x="425" y="403" text-anchor="middle" font-size="10" fill="#555">Kontextgenauigkeit/Aufrufrate</text>
  <text x="425" y="418" text-anchor="middle" font-size="10" fill="#555">hybrider Hebevorrichtung über jeder Spur</text>

  <rect x="555" y="350" width="240" height="80" rx="8" fill="#ffebee" stroke="#c62828" stroke-width="1.6" />
  <text x="675" y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#c62828">Filtern (Heizzone)</text>
  <text x="675" y="388" text-anchor="middle" font-size="10" fill="#c62828">Filter-Rate für Falsch-Ausschlüsse</text>
  <text x="675" y="403" text-anchor="middle" font-size="10" fill="#c62828">Präzision/Auflösung des Prädikats</text>
  <text x="675" y="418" text-anchor="middle" font-size="10" fill="#c62828">Schattenabruf-Δ</text>

  <rect x="805" y="350" width="320" height="80" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1" />
  <text x="965" y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Neubewertung · Kontextzusammenstellung</text>
  <text x="965" y="388" text-anchor="middle" font-size="10" fill="#555">ΔnDCG · ΔMRR bei keiner Neubewertung</text>
  <text x="965" y="403" text-anchor="middle" font-size="10" fill="#555">Kontextnutzung · Verlust im Mittelteil</text>
  <text x="965" y="418" text-anchor="middle" font-size="10" fill="#555">Störfestigkeit (RGB)</text>

  <!-- Arrow down to Layer 3 -->
  <line x1="590" y1="454" x2="590" y2="490" stroke="#555" stroke-width="1.6" marker-end="url(#arrLayer)" />
  <text x="700" y="475" font-size="10" fill="#888" font-style="italic">führt überprüfte Kontexte in die Generierung ein</text>

  <!-- =============== Layer 3: Post-gen =============== -->
  <rect x="30" y="500" width="1120" height="135" rx="12" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadowL)" />
  <text x="55" y="526" font-size="14" font-weight="700" fill="#2e7d32">Schicht 3 · Telemetrie nach der Generierung und in der Produktion</text>
  <text x="55" y="544" font-size="10" fill="#2e7d32">Frage: Ist die Antwort zuverlässig, überprüfbar und zum Versand geeignet – und bleibt das auch nächste Woche der Fall?</text>

  <rect x="55" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="175" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Genauigkeit</text>
  <text x="175" y="595" text-anchor="middle" font-size="10" fill="#555">RAGAS · HÖHE · Faktorwert</text>
  <text x="175" y="610" text-anchor="middle" font-size="10" fill="#555">FaithJudge · Selbstkonsistenz</text>

  <rect x="305" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="425" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Zitierungen und Struktur</text>
  <text x="425" y="595" text-anchor="middle" font-size="10" fill="#555">Zitiergenauigkeit/Aufrufrate</text>
  <text x="425" y="610" text-anchor="middle" font-size="10" fill="#555">Schema-Gültigkeit · Wortschatz-Konformität</text>

  <rect x="555" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="675" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Implizites + explizites Signal</text>
  <text x="675" y="595" text-anchor="middle" font-size="10" fill="#555">Niederschlagsrate · Verweildauer · CTR auf Zitaten</text>
  <text x="675" y="610" text-anchor="middle" font-size="10" fill="#555">Daumenzeichen · Stern · Inline-Änderungen</text>

  <rect x="805" y="558" width="320" height="68" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="965" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Drift · Kosten · Latenz · HITL</text>
  <text x="965" y="595" text-anchor="middle" font-size="10" fill="#555">Abweichung von Query/Embedding · p95-Latenz · Kosten pro Query</text>
  <text x="965" y="610" text-anchor="middle" font-size="10" fill="#555">Schattenbewertung · Warteschlange für Reviews mit geringer Zuverlässigkeit</text>
</svg>
