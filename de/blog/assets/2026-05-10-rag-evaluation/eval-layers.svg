<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 660" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Three places where a RAG system can lose evidence: ingestion, query time, and the answer or production environment" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Drei Stellen, an denen ein RAG-System Beweismittel verlieren kann</title>
  <defs>
    <marker id="arrLayer" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#64748b" />
    </marker>
    <filter id="shadowL" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="1180" height="660" fill="#f8fafc" />

  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a" x="590">Drei Stellen, an denen ein RAG-System Beweismittel verlieren kann</text>
  <text y="56" text-anchor="middle" font-size="12" fill="#64748b" x="590">Eingabe · Abfragedauer Pipeline · Antwortqualität und Verhaltensmerkmale in der Produktion</text>

  <!-- =============== Layer 1: Ingestion =============== -->
  <rect x="30" y="80" width="1120" height="160" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowL)" />
  <text y="106" font-size="14" font-weight="700" fill="#1d4ed8" x="55">Ebene 1 · Eingangsverarbeitung</text>
  <text y="124" font-size="11" fill="#1d4ed8" x="55">Frage: Haben das Korpus und der Index die Quelldaten erhalten?</text>

  <!-- Sub-cards -->
  <rect x="55" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="175">Korpus-Verfügbarkeit</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="175">Auswertungsquote · CER/WER</text>
  <text y="193" text-anchor="middle" font-size="11" fill="#64748b" x="175">TEDS · Metadatenabdeckung</text>
  <text y="208" text-anchor="middle" font-size="11" fill="#64748b" x="175">Frische · Deduplikation</text>

  <rect x="305" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="425">Chunking</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="425">Antwort-Span-Einschließung</text>
  <text y="193" text-anchor="middle" font-size="11" fill="#64748b" x="425">Grenzbruchrate</text>
  <text y="208" text-anchor="middle" font-size="11" fill="#64748b" x="425">Überlappungsredundanz</text>

  <rect x="555" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="675">Embedding · Index</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="675">Domäne nDCG@10</text>
  <text y="193" text-anchor="middle" font-size="11" fill="#64748b" x="675">ANN Recall im Vergleich zur konstanten Fehlerrate</text>
  <text y="208" text-anchor="middle" font-size="11" fill="#64748b" x="675">Drift-Baseline</text>

  <rect x="805" y="140" width="320" height="80" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="965">Erweiterung (NER · EL · Tags)</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="965">EL F1 · Handhabung von NIL-Werten · Alias-Coverage</text>
  <text y="193" text-anchor="middle" font-size="11" fill="#64748b" x="965">hierarchische F1 · Rate der orphanten Tags</text>
  <text y="208" text-anchor="middle" font-size="11" fill="#64748b" x="965">Schema-Validität zum Zeitpunkt der Veröffentlichung</text>

  <!-- Arrow down to Layer 2 -->
  <line x1="590" y1="244" x2="590" y2="280" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrLayer)" />
  <text y="265" font-size="11" fill="#64748b" font-style="italic" x="700">legt die Obergrenze für die Trefferquote für alles darunter fest</text>

  <!-- =============== Layer 2: Query time =============== -->
  <rect x="30" y="290" width="1120" height="160" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowL)" />
  <text y="316" font-size="14" font-weight="700" fill="#9a3412" x="55">Ebene 2 · Abfristzeit</text>
  <text y="334" font-size="11" fill="#9a3412" x="55">Frage: Hat der Pipeline die richtigen Beweise gefunden und zusammengeführt?</text>

  <rect x="55" y="350" width="240" height="80" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="175">Analyse der Abfrage</text>
  <text y="388" text-anchor="middle" font-size="11" fill="#64748b" x="175">Übertragungsgewinn/Verlust umschreiben</text>
  <text y="403" text-anchor="middle" font-size="11" fill="#64748b" x="175">Routing Genauigkeit</text>
  <text y="418" text-anchor="middle" font-size="11" fill="#64748b" x="175">Zerlegungskopplung</text>

  <rect x="305" y="350" width="240" height="80" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="425">Retrieval</text>
  <text y="388" text-anchor="middle" font-size="11" fill="#64748b" x="425">Recall@k · monatlicher durchschnittlicher Abonnentenwert · nDCG · MAP</text>
  <text y="403" text-anchor="middle" font-size="11" fill="#64748b" x="425">Kontextgenauigkeit/Auflösung</text>
  <text y="418" text-anchor="middle" font-size="11" fill="#64748b" x="425">hybrider Hebevorgang pro Fahrspur</text>

  <rect x="555" y="350" width="240" height="80" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.6" />
  <text y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b" x="675">Filtern (Hotzone)</text>
  <text y="388" text-anchor="middle" font-size="11" fill="#991b1b" x="675">Rate der falschen Ausschließung durch Filter</text>
  <text y="403" text-anchor="middle" font-size="11" fill="#991b1b" x="675">Predikatsgenauigkeit/Auflösung</text>
  <text y="418" text-anchor="middle" font-size="11" fill="#991b1b" x="675">Shadow-Retrieval Δ</text>

  <rect x="805" y="350" width="320" height="80" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="965">Reranking · Kontextzusammenstellung</text>
  <text y="388" text-anchor="middle" font-size="11" fill="#64748b" x="965">ΔnDCG · ΔMRR im Vergleich ohne Neubewertung</text>
  <text y="403" text-anchor="middle" font-size="11" fill="#64748b" x="965">Kontextnutzung · Verlust im Mittelteil</text>
  <text y="418" text-anchor="middle" font-size="11" fill="#64748b" x="965">Störfestigkeit (RGB)</text>

  <!-- Arrow down to Layer 3 -->
  <line x1="590" y1="454" x2="590" y2="490" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrLayer)" />
  <text y="475" font-size="11" fill="#64748b" font-style="italic" x="700">führt überprüfte Kontexte in die Generierung ein</text>

  <!-- =============== Layer 3: Answer and production =============== -->
  <rect x="30" y="500" width="1120" height="135" rx="12" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowL)" />
  <text y="526" font-size="14" font-weight="700" fill="#166534" x="55">Schicht 3 · Antwort und Produktion</text>
  <text y="544" font-size="11" fill="#166534" x="55">Frage: Wurden bei der Antwort die verfügbaren Belege herangezogen, und bleibt die Qualität unter echtem Traffic auf dem gewünschten Niveau?</text>

  <rect x="55" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="175">Genauigkeit</text>
  <text y="595" text-anchor="middle" font-size="11" fill="#64748b" x="175">RAGs · HEM · FActScore</text>
  <text y="610" text-anchor="middle" font-size="11" fill="#64748b" x="175">FaithJudge · Selbstkonsistenz</text>

  <rect x="305" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="425">Zitierungen und Struktur</text>
  <text y="595" text-anchor="middle" font-size="11" fill="#64748b" x="425">Zitiergenauigkeit/Zitierauflösung</text>
  <text y="610" text-anchor="middle" font-size="11" fill="#64748b" x="425">Schema-Gültigkeit · Vokabular-Konformität</text>

  <rect x="555" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="675">Implizites + explizites Signal</text>
  <text y="595" text-anchor="middle" font-size="11" fill="#64748b" x="675">Regenerationsrate · Verweildauer · CTR bei Zitaten</text>
  <text y="610" text-anchor="middle" font-size="11" fill="#64748b" x="675">Fingerzeig · Stern · Inline-Änderungen</text>

  <rect x="805" y="558" width="320" height="68" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="965">Drift · Kosten · Latency · HITL</text>
  <text y="595" text-anchor="middle" font-size="11" fill="#64748b" x="965">Abweichung der Query/Embedding · p95-Wert Latency · $/Query</text>
  <text y="610" text-anchor="middle" font-size="11" fill="#64748b" x="965">Schatten Eval · Warteschlange für Reviews mit geringer Zuverlässigkeit</text>
</svg>
