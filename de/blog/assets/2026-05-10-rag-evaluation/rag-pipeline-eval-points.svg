<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrEval" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555" />
    </marker>
    <filter id="shadowEval" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Title -->
  <text x="590" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a2e">Die RAG-Pipeline mit Eval-Punkten</text>
  <text x="590" y="54" text-anchor="middle" font-size="12" fill="#666">Jede Stufe bekommt eine Metrik. Sie fängt stille Fehler ab.</text>

  <!-- ============ OFFLINE LANE ============ -->
  <rect x="20" y="78" width="1140" height="290" rx="10" fill="#f8f9fa" stroke="#cbd5e0" stroke-width="1" />
  <text x="40" y="102" font-size="13" font-weight="700" fill="#1565c0">Offline · Ingestion</text>
  <text x="40" y="118" font-size="10" fill="#888">Läuft einmal pro Korpusversion. Setzt die Obergrenze.</text>

  <!-- Stage 1: Acquire / Parse -->
  <rect x="40" y="140" width="170" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="125" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Erfassen &amp; Parsen</text>
  <text x="125" y="178" text-anchor="middle" font-size="9" fill="#555">PDFs · HTML · OCR</text>
  <text x="125" y="192" text-anchor="middle" font-size="9" fill="#555">Tabellen · Layout</text>

  <!-- Metric badge 1 -->
  <rect x="40" y="212" width="170" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="125" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">CER · WER · TEDS</text>
  <text x="125" y="242" text-anchor="middle" font-size="9" fill="#827717">Parse-Pass-Rate</text>
  <text x="125" y="255" text-anchor="middle" font-size="9" fill="#827717">Layout-Treue</text>

  <!-- Arrow -->
  <line x1="210" y1="171" x2="245" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 2: Normalize / Dedup -->
  <rect x="245" y="140" width="170" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="330" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Normalisieren &amp; Deduplizieren</text>
  <text x="330" y="178" text-anchor="middle" font-size="9" fill="#555">NFC/NFKC · MinHash</text>
  <text x="330" y="192" text-anchor="middle" font-size="9" fill="#555">PII · Boilerplate</text>

  <rect x="245" y="212" width="170" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="330" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">Dup-Recall/Präzision</text>
  <text x="330" y="242" text-anchor="middle" font-size="9" fill="#827717">PII-Recall (pro Typ)</text>
  <text x="330" y="255" text-anchor="middle" font-size="9" fill="#827717">Lang-Detect F1</text>

  <line x1="415" y1="171" x2="450" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 3: Chunk -->
  <rect x="450" y="140" width="170" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="535" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Chunken</text>
  <text x="535" y="178" text-anchor="middle" font-size="9" fill="#555">rekursiv · semantisch</text>
  <text x="535" y="192" text-anchor="middle" font-size="9" fill="#555">strukturell · spät</text>

  <rect x="450" y="212" width="170" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="535" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">Answer-Span-Abdeckung</text>
  <text x="535" y="242" text-anchor="middle" font-size="9" fill="#827717">Grenzbruch-Rate</text>
  <text x="535" y="255" text-anchor="middle" font-size="9" fill="#827717">Recall@k vs. Größe</text>

  <line x1="620" y1="171" x2="655" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 4: Enrich (NER/EL) -->
  <rect x="655" y="140" width="170" height="62" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="740" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#6a1b9a">Anreichern</text>
  <text x="740" y="178" text-anchor="middle" font-size="9" fill="#555">NER · Entity-Linking</text>
  <text x="740" y="192" text-anchor="middle" font-size="9" fill="#555">Tags · Hierarchie</text>

  <rect x="655" y="212" width="170" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="740" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">EL F1 · NIL-Präzision</text>
  <text x="740" y="242" text-anchor="middle" font-size="9" fill="#827717">Hierarchisches F1</text>
  <text x="740" y="255" text-anchor="middle" font-size="9" fill="#827717">Alias-Abdeckung</text>

  <line x1="825" y1="171" x2="860" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 5: Embed -->
  <rect x="860" y="140" width="135" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="927" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Einbetten</text>
  <text x="927" y="178" text-anchor="middle" font-size="9" fill="#555">dense / sparse</text>
  <text x="927" y="192" text-anchor="middle" font-size="9" fill="#555">Multi-Vektor</text>

  <rect x="860" y="212" width="135" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="927" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">Domänen-nDCG@10</text>
  <text x="927" y="242" text-anchor="middle" font-size="9" fill="#827717">Drift (KL · NN-Stab.)</text>
  <text x="927" y="255" text-anchor="middle" font-size="9" fill="#827717">vs. BEIR/MMTEB</text>

  <line x1="995" y1="171" x2="1030" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 6: Index -->
  <rect x="1030" y="140" width="115" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="1087" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Indexieren</text>
  <text x="1087" y="178" text-anchor="middle" font-size="9" fill="#555">HNSW / IVF</text>
  <text x="1087" y="192" text-anchor="middle" font-size="9" fill="#555">BM25 · hybrid</text>

  <rect x="1030" y="212" width="115" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="1087" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">ANN-Recall vs. flat</text>
  <text x="1087" y="242" text-anchor="middle" font-size="9" fill="#827717">Freshness-Lag p99</text>
  <text x="1087" y="255" text-anchor="middle" font-size="9" fill="#827717">Filter-Suche-Lat.</text>

  <!-- Lane summary -->
  <rect x="40" y="290" width="1105" height="58" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1" />
  <text x="592" y="312" text-anchor="middle" font-size="11" font-weight="600" fill="#1565c0">Offline-Korpus-Reife setzt die Obergrenze. Verliert ein Chunk hier den Answer Span, holt kein Reranker ihn später zurück.</text>
  <text x="592" y="332" text-anchor="middle" font-size="10" fill="#1565c0">Die meisten Teams investieren zu viel in Retrieval und zu wenig in Parsing, Normalisierung und Chunking. Dort stirbt produktives RAG oft leise.</text>

  <!-- ============ ONLINE LANE ============ -->
  <rect x="20" y="378" width="1140" height="280" rx="10" fill="#f8f9fa" stroke="#cbd5e0" stroke-width="1" />
  <text x="40" y="402" font-size="13" font-weight="700" fill="#e65100">Online · Inferenz (pro Query)</text>
  <text x="40" y="418" font-size="10" fill="#888">Läuft bei jeder Anfrage. Hier werden in Produktion die meisten Metriken beobachtet.</text>

  <!-- Stage 7: Query Rewrite -->
  <rect x="40" y="440" width="160" height="62" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="120" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">Umschreiben / Routen</text>
  <text x="120" y="478" text-anchor="middle" font-size="9" fill="#555">HyDE · Multi-Query</text>
  <text x="120" y="492" text-anchor="middle" font-size="9" fill="#555">Intent · adaptiv</text>

  <rect x="40" y="512" width="160" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="120" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">Recall@k-Uplift</text>
  <text x="120" y="542" text-anchor="middle" font-size="9" fill="#827717">Routing-Genauigkeit</text>
  <text x="120" y="555" text-anchor="middle" font-size="9" fill="#827717">No-op-Rate</text>

  <line x1="200" y1="471" x2="235" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 8: Retrieve -->
  <rect x="235" y="440" width="160" height="62" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="315" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">Retrieven</text>
  <text x="315" y="478" text-anchor="middle" font-size="9" fill="#555">dense + sparse + RRF</text>
  <text x="315" y="492" text-anchor="middle" font-size="9" fill="#555">Filter-Prädikate</text>

  <rect x="235" y="512" width="160" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="315" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">Recall@k · MRR · nDCG</text>
  <text x="315" y="542" text-anchor="middle" font-size="9" fill="#827717">Kontext-Präzision/Recall</text>
  <text x="315" y="555" text-anchor="middle" font-size="9" fill="#827717">Hybrid-Lift</text>

  <line x1="395" y1="471" x2="430" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 9: Filter (highlighted) -->
  <rect x="430" y="440" width="160" height="62" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="2" filter="url(#shadowEval)" />
  <text x="510" y="462" text-anchor="middle" font-size="12" font-weight="700" fill="#c62828">Filtern (der stille Killer)</text>
  <text x="510" y="478" text-anchor="middle" font-size="9" fill="#555">Tenant · ACL · Tag</text>
  <text x="510" y="492" text-anchor="middle" font-size="9" fill="#555">hart vs. weich</text>

  <rect x="430" y="512" width="160" height="48" rx="6" fill="#ffebee" stroke="#c62828" stroke-width="1.2" />
  <text x="510" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#c62828">Filter-Fehlausschluss-Rate</text>
  <text x="510" y="542" text-anchor="middle" font-size="9" fill="#c62828">Prädikat-Präzision/Recall</text>
  <text x="510" y="555" text-anchor="middle" font-size="9" fill="#c62828">Shadow-Retrieval Δ</text>

  <line x1="590" y1="471" x2="625" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 10: Rerank -->
  <rect x="625" y="440" width="160" height="62" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="705" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">Reranken</text>
  <text x="705" y="478" text-anchor="middle" font-size="9" fill="#555">Cross-Encoder · listwise</text>
  <text x="705" y="492" text-anchor="middle" font-size="9" fill="#555">BGE · Cohere · ZeRank</text>

  <rect x="625" y="512" width="160" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="705" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">ΔnDCG · ΔMRR · ΔP@1</text>
  <text x="705" y="542" text-anchor="middle" font-size="9" fill="#827717">Distraktor-Robustheit</text>
  <text x="705" y="555" text-anchor="middle" font-size="9" fill="#827717">Latenz p95</text>

  <line x1="785" y1="471" x2="820" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 11: Assemble -->
  <rect x="820" y="440" width="160" height="62" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="900" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">Kontext zusammenstellen</text>
  <text x="900" y="478" text-anchor="middle" font-size="9" fill="#555">Reihenfolge · komprimieren</text>
  <text x="900" y="492" text-anchor="middle" font-size="9" fill="#555">Token-Budget</text>

  <rect x="820" y="512" width="160" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="900" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">Kontextnutzung</text>
  <text x="900" y="542" text-anchor="middle" font-size="9" fill="#827717">Lost-in-the-middle</text>
  <text x="900" y="555" text-anchor="middle" font-size="9" fill="#827717">Kompression × Korrektheit</text>

  <line x1="980" y1="471" x2="1015" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 12: Generate -->
  <rect x="1015" y="440" width="130" height="62" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="1080" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#6a1b9a">Generieren</text>
  <text x="1080" y="478" text-anchor="middle" font-size="9" fill="#555">LLM-Aufruf</text>
  <text x="1080" y="492" text-anchor="middle" font-size="9" fill="#555">+ Zitate</text>

  <rect x="1015" y="512" width="130" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="1080" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">Faithfulness · HHEM</text>
  <text x="1080" y="542" text-anchor="middle" font-size="9" fill="#827717">Zitat P/R</text>
  <text x="1080" y="555" text-anchor="middle" font-size="9" fill="#827717">FActScore</text>

  <!-- Lane summary -->
  <rect x="40" y="582" width="1105" height="58" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1" />
  <text x="592" y="604" text-anchor="middle" font-size="11" font-weight="600" fill="#e65100">Ein schlechter Filter oder falsches Umschreiben setzt Recall auf null, bevor Ranking beginnt. Faithfulness sieht weiter gut aus — das Modell sagt treu: „Ich weiß es nicht.“</text>
  <text x="592" y="624" text-anchor="middle" font-size="10" fill="#e65100">Verfolge die Ausschlussrate neben Recall@k. Sonst belügen dich die kanonischen IR-Metriken über einen gesunden Retriever.</text>

  <!-- ============ POST-GEN LANE ============ -->
  <rect x="20" y="668" width="1140" height="78" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1" />
  <text x="40" y="692" font-size="13" font-weight="700" fill="#2e7d32">Post-Generation · Verifikation &amp; Telemetrie</text>

  <rect x="40" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="150" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">Claim-Verifikation · NLI · Selbstkonsistenz</text>

  <rect x="270" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="380" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">Schema-Gültigkeit · Entity-Grounding · ECE</text>

  <rect x="500" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="610" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">Regen-Rate · Thumbs · Dwell · CTR auf Zitate</text>

  <rect x="730" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="840" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">Drift (Query/Embed) · Kosten/Query · p95</text>

  <rect x="960" y="704" width="185" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="1052" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">Shadow-Eval · HITL-Queue</text>
</svg>
