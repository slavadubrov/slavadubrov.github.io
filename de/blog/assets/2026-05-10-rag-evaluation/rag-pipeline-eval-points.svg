  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a" x="590">RAG-Pipeline mit Bewertungspunkten</text>
  <text y="54" text-anchor="middle" font-size="12" fill="#334155" x="590">Jede Stufe erhält eine Metrik. Die Metrik erkennt stille Fehler.</text>

  <!-- ============ OFFLINE LANE ============ -->
  <rect x="20" y="78" width="1140" height="290" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="102" font-size="13" font-weight="700" fill="#1d4ed8" x="40">Offline · Eingabe</text>
  <text y="118" font-size="10" fill="#64748b" x="40">Wird einmal pro Corpus-Version ausgeführt. Legt die Obergrenze fest.</text>

  <!-- Stage 1: Acquire / Parse -->
  <rect x="40" y="140" width="170" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="125">Datenabgreifen und Parsen</text>
  <text y="178" text-anchor="middle" font-size="9" fill="#334155" x="125">PDFs · HTML · OCR</text>
  <text y="192" text-anchor="middle" font-size="9" fill="#334155" x="125">Tabellen · Layout</text>

  <!-- Metric badge 1 -->
  <rect x="40" y="212" width="170" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="125">CER · HERSTELLER · TEDS</text>
  <text y="242" text-anchor="middle" font-size="9" fill="#9a3412" x="125">Anteil der erfolgreichen Parsungen</text>
  <text y="255" text-anchor="middle" font-size="9" fill="#9a3412" x="125">Layoutgenauigkeit</text>

  <!-- Arrow -->
  <line x1="210" y1="171" x2="245" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 2: Normalize / Dedup -->
  <rect x="245" y="140" width="170" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="330">Normalisierung und Deduplizierung</text>
  <text y="178" text-anchor="middle" font-size="9" fill="#334155" x="330">NFC/NFKC · MinHash</text>
  <text y="192" text-anchor="middle" font-size="9" fill="#334155" x="330">PII · Standardvorlage</text>

  <rect x="245" y="212" width="170" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="330">Duplizitäts-Rückrufgenauigkeit/Präzision</text>
  <text y="242" text-anchor="middle" font-size="9" fill="#9a3412" x="330">PII-Aufruf (nach Typ)</text>
  <text y="255" text-anchor="middle" font-size="9" fill="#9a3412" x="330">Spracherkennung F1</text>

  <line x1="415" y1="171" x2="450" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 3: Chunk -->
  <rect x="450" y="140" width="170" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="535">Blöckchen</text>
  <text y="178" text-anchor="middle" font-size="9" fill="#334155" x="535">rekursiv · semantisch</text>
  <text y="192" text-anchor="middle" font-size="9" fill="#334155" x="535">strukturell · spät</text>

  <rect x="450" y="212" width="170" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="535">Containment von answer-span</text>
  <text y="242" text-anchor="middle" font-size="9" fill="#9a3412" x="535">Grenzbruchrate</text>
  <text y="255" text-anchor="middle" font-size="9" fill="#9a3412" x="535">Recall@k gegen Größe</text>

  <line x1="620" y1="171" x2="655" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 4: Enrich (NER/EL) -->
  <rect x="655" y="140" width="170" height="62" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6" x="740">Erweitern</text>
  <text y="178" text-anchor="middle" font-size="9" fill="#334155" x="740">NER · Entitätsverknüpfung</text>
  <text y="192" text-anchor="middle" font-size="9" fill="#334155" x="740">Tags · Hierarchie</text>

  <rect x="655" y="212" width="170" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="740">EL F1 · Präzision von NULL</text>
  <text y="242" text-anchor="middle" font-size="9" fill="#9a3412" x="740">hierarchische F1</text>
  <text y="255" text-anchor="middle" font-size="9" fill="#9a3412" x="740">Alias-Coverage</text>

  <line x1="825" y1="171" x2="860" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 5: Embed -->
  <rect x="860" y="140" width="135" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="927">Einfügen</text>
  <text y="178" text-anchor="middle" font-size="9" fill="#334155" x="927">dicht / spärlich</text>
  <text y="192" text-anchor="middle" font-size="9" fill="#334155" x="927">mehrvektoriell</text>

  <rect x="860" y="212" width="135" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="927">Domain nDCG@10</text>
  <text y="242" text-anchor="middle" font-size="9" fill="#9a3412" x="927">Drift (KL · NN-Stab)</text>
  <text y="255" text-anchor="middle" font-size="9" fill="#9a3412" x="927">gegenüber BEIR/MMTEB</text>

  <line x1="995" y1="171" x2="1030" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 6: Index -->
  <rect x="1030" y="140" width="115" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="1087">Index</text>
  <text y="178" text-anchor="middle" font-size="9" fill="#334155" x="1087">HNSW / IVF</text>
  <text y="192" text-anchor="middle" font-size="9" fill="#334155" x="1087">BM25 · Hybrid</text>

  <rect x="1030" y="212" width="115" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="1087" transform="translate(-29.55 0.00)">ANN-Rückrufrate gegenüber konstanter Werte</text>
  <text y="242" text-anchor="middle" font-size="9" fill="#9a3412" x="1087">P99-Zeitverzögerung der Frische</text>
  <text y="255" text-anchor="middle" font-size="9" fill="#9a3412" x="1087">gefilterte Suchung – Breitengrad</text>

  <!-- Lane summary -->
  <rect x="40" y="290" width="1105" height="58" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1" />
  <text y="312" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8" x="592">Die Bereitschaft des Offline-Korpus legt die obere Grenze fest. Wenn ein Datensatz hier den Antwortabschnitt verliert, kann kein Nachrangierer diesen später wiederherstellen.</text>
  <text y="332" text-anchor="middle" font-size="10" fill="#1d4ed8" x="592">Die meisten Teams investieren zu stark in die Recherche und zu wenig in das Parsen, die Normalisierung sowie das Chunking. Genau dort stirbt das RAG in der Produktion stillschweigend ab.</text>

  <!-- ============ ONLINE LANE ============ -->
  <rect x="20" y="378" width="1140" height="280" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="402" font-size="13" font-weight="700" fill="#9a3412" x="40">Online · Inferenz (pro Abfrage)</text>
  <text y="418" font-size="10" fill="#64748b" x="40">Wird bei jeder Anfrage ausgeführt. Der Kanal, in dem die meisten Metriken in der Produktion überwacht werden.</text>

  <!-- Stage 7: Query Rewrite -->
  <rect x="40" y="440" width="160" height="62" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="120">Überarbeiten / Umleiten</text>
  <text y="478" text-anchor="middle" font-size="9" fill="#334155" x="120">HyDE · Mehrfachabfrage</text>
  <text y="492" text-anchor="middle" font-size="9" fill="#334155" x="120">Intent · adaptiv</text>

  <rect x="40" y="512" width="160" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="120">Recall@k-Verbesserung</text>
  <text y="542" text-anchor="middle" font-size="9" fill="#9a3412" x="120">Routinggenauigkeit</text>
  <text y="555" text-anchor="middle" font-size="9" fill="#9a3412" x="120">Aktivitätsrate</text>

  <line x1="200" y1="471" x2="235" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 8: Retrieve -->
  <rect x="235" y="440" width="160" height="62" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="315">Abrufen</text>
  <text y="478" text-anchor="middle" font-size="9" fill="#334155" x="315">dicht + spärlich + RRF</text>
  <text y="492" text-anchor="middle" font-size="9" fill="#334155" x="315">Filterprädikate</text>

  <rect x="235" y="512" width="160" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="315">Recall@k · MRR · nDCG</text>
  <text y="542" text-anchor="middle" font-size="9" fill="#9a3412" x="315">Kontextgenauigkeit/Aufrufrate</text>
  <text y="555" text-anchor="middle" font-size="9" fill="#9a3412" x="315">hybrider Hebevorgang</text>

  <line x1="395" y1="471" x2="430" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 9: Filter (highlighted) -->
  <rect x="430" y="440" width="160" height="62" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b" x="510">Filter – der stille Mörder</text>
  <text y="478" text-anchor="middle" font-size="9" fill="#334155" x="510">Mieter · ACL · Tag</text>
  <text y="492" text-anchor="middle" font-size="9" fill="#334155" x="510">hart gegen weich</text>

  <rect x="430" y="512" width="160" height="48" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.2" />
  <text y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#991b1b" x="510">Filter-Rate für Falsch-Ausschlüsse</text>
  <text y="542" text-anchor="middle" font-size="9" fill="#991b1b" x="510">Präzision/Auflösung des Prädikats</text>
  <text y="555" text-anchor="middle" font-size="9" fill="#991b1b" x="510">Schattenabruf-Δ</text>

  <line x1="590" y1="471" x2="625" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 10: Rerank -->
  <rect x="625" y="440" width="160" height="62" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="705">Neubewertung</text>
  <text y="478" text-anchor="middle" font-size="9" fill="#334155" x="705">Kreuzencoder · listeweise</text>
  <text y="492" text-anchor="middle" font-size="9" fill="#334155" x="705">BGE · Cohere · ZeRank</text>

  <rect x="625" y="512" width="160" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="705">ΔnDCG · ΔMRR · ΔP@1</text>
  <text y="542" text-anchor="middle" font-size="9" fill="#9a3412" x="705">Robustheit gegenüber Störeinflüssen</text>
  <text y="555" text-anchor="middle" font-size="9" fill="#9a3412" x="705">Latenz P95</text>

  <line x1="785" y1="471" x2="820" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 11: Assemble -->
  <rect x="820" y="440" width="160" height="62" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="900">Kontext zusammenstellen</text>
  <text y="478" text-anchor="middle" font-size="9" fill="#334155" x="900">Ordnen · Komprimieren</text>
  <text y="492" text-anchor="middle" font-size="9" fill="#334155" x="900">Budget-Token</text>

  <rect x="820" y="512" width="160" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="900">Kontextnutzung</text>
  <text y="542" text-anchor="middle" font-size="9" fill="#9a3412" x="900">Mittelding-Angriff</text>
  <text y="555" text-anchor="middle" font-size="9" fill="#9a3412" x="900">Kompression × Korrektheit</text>

  <line x1="980" y1="471" x2="1015" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 12: Generate -->
  <rect x="1015" y="440" width="130" height="62" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6" x="1080">Erstellen</text>
  <text y="478" text-anchor="middle" font-size="9" fill="#334155" x="1080">Aufruf der LLM</text>
  <text y="492" text-anchor="middle" font-size="9" fill="#334155" x="1080">+ Zitierungen</text>

  <rect x="1015" y="512" width="130" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="1080">Genauigkeit · HHEM</text>
  <text y="542" text-anchor="middle" font-size="9" fill="#9a3412" x="1080">Zitierreferenz P/R</text>
  <text y="555" text-anchor="middle" font-size="9" fill="#9a3412" x="1080">Faktorwert</text>

  <!-- Lane summary -->
  <rect x="40" y="582" width="1105" height="58" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1" />
  <text y="604" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412" x="592">Ein fehlerhafter Filter oder eine falsche Umformulierung setzt den Recall vor Beginn der Rangliste auf Null. Die Treue bleibt weiterhin in Ordnung – das Modell gibt zuverlässig an „Ich weiß es nicht.“</text>
  <text y="624" text-anchor="middle" font-size="10" fill="#9a3412" x="592">Die Ausschlussrate der Spur im Vergleich zu Recall@k berücksichtigen. Andernfalls täuschen die kanonischen IR-Metriken Sie bezüglich der Leistungsfähigkeit des Retrievers.</text>

  <!-- ============ POST-GEN LANE ============ -->
  <rect x="20" y="668" width="1140" height="78" rx="10" fill="#f0fdf4" stroke="#166534" stroke-width="1" />
  <text y="692" font-size="13" font-weight="700" fill="#166534" x="40">Nach der Generierung · Überprüfung und Telemetrie</text>

  <rect x="40" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="150">Prüfung der Behauptung · NLI · Selbstkonsistenz</text>

  <rect x="270" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="380">Schema-Validität · Entitätsverankerung · ECE</text>

  <rect x="500" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="610">Niederschlagsrate · Daumenklicks · Verweildauer · CTR bei Zitaten</text>

  <rect x="730" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="840">Drift (Abfrage/Embedding) · Kosten/Abfrage · p95</text>

  <rect x="960" y="704" width="185" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="1052">Schattenbewertung · HITL-Warteschlange</text>
