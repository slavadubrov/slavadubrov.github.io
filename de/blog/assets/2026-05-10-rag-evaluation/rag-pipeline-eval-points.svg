<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" font-family="Inter, system-ui, sans-serif" role="img" aria-label="A production RAG pipeline showing ingestion, query-time, and answer or production checks, with hard filters applied before retrieval ranking" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Der vollständige RAG Pipeline mit Metrik-Anzeigen in jeder Phase</title>
  <defs>
    <marker id="arrEval" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b" />
    </marker>
    <filter id="shadowEval" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="1180" height="760" fill="#f8fafc" />

  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a" x="590">Der RAG Pipeline mit Bewertungspunkten</text>
  <text y="54" text-anchor="middle" font-size="12" fill="#64748b" x="590">Jede Phase erhält eine Metrik. Diese Metrik erkennt stille Ausfälle frühzeitig.</text>

  <!-- ============ OFFLINE LANE ============ -->
  <rect x="20" y="78" width="1140" height="290" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="102" font-size="14" font-weight="700" fill="#1d4ed8" x="40">Einpflegeweg · Korpus und Index</text>
  <text y="118" font-size="11" fill="#64748b" x="40">Wird ausgeführt, wenn sich die Version des Korpus ändert. Legt die Obergrenze für die Belege fest.</text>

  <!-- Stage 1: Acquire / Parse -->
  <rect x="40" y="140" width="170" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="125">Datenbeschaffung und Parsing</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="125">PDFs · HTML · OCR</text>
  <text y="192" text-anchor="middle" font-size="11" fill="#64748b" x="125">Tabellen · Layout</text>

  <!-- Metric badge 1 -->
  <rect x="40" y="212" width="170" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="125">CER · AUTOR · TEDS</text>
  <text y="242" text-anchor="middle" font-size="11" fill="#9a3412" x="125">Parse-Erfolgsrate</text>
  <text y="255" text-anchor="middle" font-size="11" fill="#9a3412" x="125">Layout-Genauigkeit</text>

  <!-- Arrow -->
  <line x1="210" y1="171" x2="245" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 2: Normalize / Dedup -->
  <rect x="245" y="140" width="170" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="330">Normalisierung und Deduplizierung</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="330">NFC/NFKC · MinHash</text>
  <text y="192" text-anchor="middle" font-size="11" fill="#64748b" x="330">Personenbezogene Identifikationsdaten · Standardvorlage</text>

  <rect x="245" y="212" width="170" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="330">Dup-Rückrufgenauigkeit/Präzision</text>
  <text y="242" text-anchor="middle" font-size="11" fill="#9a3412" x="330">PII-Aufruf (nach Typ)</text>
  <text y="255" text-anchor="middle" font-size="11" fill="#9a3412" x="330">Spracherkennung F1</text>

  <line x1="415" y1="171" x2="450" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 3: Chunk -->
  <rect x="450" y="140" width="170" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="535">Chunk</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="535">rekursiv · semantisch</text>
  <text y="192" text-anchor="middle" font-size="11" fill="#64748b" x="535">strukturell · spät</text>

  <rect x="450" y="212" width="170" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="535">Antwort-Span-Einschließung</text>
  <text y="242" text-anchor="middle" font-size="11" fill="#9a3412" x="535">Grenzbruchrate</text>
  <text y="255" text-anchor="middle" font-size="11" fill="#9a3412" x="535">Recall@k im Vergleich zur Modellgröße</text>

  <line x1="620" y1="171" x2="655" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 4: Enrich (NER/EL) -->
  <rect x="655" y="140" width="170" height="62" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6" x="740">Erweitern</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="740">NER · Entitätsverknüpfung</text>
  <text y="192" text-anchor="middle" font-size="11" fill="#64748b" x="740">Tags · Hierarchie</text>

  <rect x="655" y="212" width="170" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="740">EL F1 · Präzision von NIL</text>
  <text y="242" text-anchor="middle" font-size="11" fill="#9a3412" x="740">hierarchisches F1</text>
  <text y="255" text-anchor="middle" font-size="11" fill="#9a3412" x="740">Alias-Coverage</text>

  <line x1="825" y1="171" x2="860" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 5: Embed -->
  <rect x="860" y="140" width="135" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="927">Einbetten</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="927">dicht / spärlich</text>
  <text y="192" text-anchor="middle" font-size="11" fill="#64748b" x="927">mehrvektorig</text>

  <rect x="860" y="212" width="135" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="927">Domäne nDCG@10</text>
  <text y="242" text-anchor="middle" font-size="11" fill="#9a3412" x="927">Drift (KL · NN-Regel)</text>
  <text y="255" text-anchor="middle" font-size="11" fill="#9a3412" x="927">gegenüber BEIR/MTEB</text>

  <line x1="995" y1="171" x2="1030" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 6: Index -->
  <rect x="1030" y="140" width="115" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="1087">Index</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="1087">HNSW / IVF</text>
  <text y="192" text-anchor="middle" font-size="11" fill="#64748b" x="1087">BM25 · hybride</text>

  <rect x="1030" y="212" width="115" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="228" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="1087">ANN Recall im Vergleich zu konstanter Genauigkeit</text>
  <text y="242" text-anchor="middle" font-size="11" fill="#9a3412" x="1087">P99-Lag der Frische</text>
  <text y="255" text-anchor="middle" font-size="11" fill="#9a3412" x="1087">gefilterte Suchabfrage – Breitengrad</text>

  <!-- Lane summary -->
  <rect x="40" y="290" width="1105" height="58" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1" />
  <text y="312" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8" x="592">Die Bereitschaft für die Einverarbeitung legt die Obergrenze fest. Wenn ein Datenblock hier die Antwort Span verliert, kann kein Nachrangierer sie im nachfolgenden Schritt wiederherstellen.</text>
  <text y="332" text-anchor="middle" font-size="11" fill="#1d4ed8" x="592">Instrument-Parsing, Normalisierung, Chunking, Aufwertung, Embedding sowie Indexierung, damit Fehler in nachgeschalteten Schritten weiterhin zuordnungsfähig bleiben.</text>

  <!-- ============ ONLINE LANE ============ -->
  <rect x="20" y="378" width="1140" height="280" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="402" font-size="14" font-weight="700" fill="#9a3412" x="40">Abfragedauer-Pfad · Ausführung pro Abfrage</text>
  <text y="418" font-size="11" fill="#64748b" x="40">Der Anfragenpfad führt jede Abfrage aus; aufwändige Qualitätsmetriken können ausgewählte Traces asynchron bewertet werden.</text>

  <!-- Stage 7: Query Rewrite -->
  <rect x="40" y="440" width="160" height="62" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="120">Überarbeiten / Umleiten</text>
  <text y="478" text-anchor="middle" font-size="11" fill="#64748b" x="120">HyDE · mehrfache Abfragen</text>
  <text y="492" text-anchor="middle" font-size="11" fill="#64748b" x="120">Intent · adaptiv</text>

  <rect x="40" y="512" width="160" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="120">Recall@k-Verbesserung</text>
  <text y="542" text-anchor="middle" font-size="11" fill="#9a3412" x="120">Routing Genauigkeit</text>
  <text y="555" text-anchor="middle" font-size="11" fill="#9a3412" x="120">Keine-Aktion-Rate</text>

  <line x1="200" y1="471" x2="235" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 8: Apply hard filters before ranking -->
  <rect x="235" y="440" width="160" height="62" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b" x="315">Harte Filter anwenden</text>
  <text y="478" text-anchor="middle" font-size="11" fill="#64748b" x="315">Mieter · ACL · Tag</text>
  <text y="492" text-anchor="middle" font-size="11" fill="#64748b" x="315">hart versus weich</text>

  <rect x="235" y="512" width="160" height="48" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.2" />
  <text y="528" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b" x="315">Filter-Rate für Falsch-Ausschlussfälle</text>
  <text y="542" text-anchor="middle" font-size="11" fill="#991b1b" x="315">Predikatsgenauigkeit/Auflösung</text>
  <text y="555" text-anchor="middle" font-size="11" fill="#991b1b" x="315">Shadow-Retrieval Δ</text>

  <line x1="395" y1="471" x2="430" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 9: Retrieve from the eligible candidate set -->
  <rect x="430" y="440" width="160" height="62" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="510">Abrufen</text>
  <text y="478" text-anchor="middle" font-size="11" fill="#64748b" x="510">dicht + spärlich + RRF</text>
  <text y="492" text-anchor="middle" font-size="11" fill="#64748b" x="510">zulässige Kandidatenmenge</text>

  <rect x="430" y="512" width="160" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="510">Recall@k · monatlicher durchschnittlicher Abonnentenwert · nDCG</text>
  <text y="542" text-anchor="middle" font-size="11" fill="#9a3412" x="510">Kontextgenauigkeit/Auflösung</text>
  <text y="555" text-anchor="middle" font-size="11" fill="#9a3412" x="510">hybrider Hebevorgang</text>

  <line x1="590" y1="471" x2="625" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 10: Rerank -->
  <rect x="625" y="440" width="160" height="62" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="705">Neubewerten</text>
  <text y="478" text-anchor="middle" font-size="11" fill="#64748b" x="705">Kreuzencoder · listeweise</text>
  <text y="492" text-anchor="middle" font-size="11" fill="#64748b" x="705">BGE · Cohere · ZeRank</text>

  <rect x="625" y="512" width="160" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="705">ΔnDCG · ΔMRR · ΔP@1</text>
  <text y="542" text-anchor="middle" font-size="11" fill="#9a3412" x="705">Störfestigkeit</text>
  <text y="555" text-anchor="middle" font-size="11" fill="#9a3412" x="705">Latency p95-Vertrauensintervall</text>

  <line x1="785" y1="471" x2="820" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 11: Assemble -->
  <rect x="820" y="440" width="160" height="62" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="900">Kontext zusammenstellen</text>
  <text y="478" text-anchor="middle" font-size="11" fill="#64748b" x="900">Ordnen · Komprimieren</text>
  <text y="492" text-anchor="middle" font-size="11" fill="#64748b" x="900">Budget Tokens</text>

  <rect x="820" y="512" width="160" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="900">Kontextnutzung</text>
  <text y="542" text-anchor="middle" font-size="11" fill="#9a3412" x="900">Verlust im Mittelweg</text>
  <text y="555" text-anchor="middle" font-size="11" fill="#9a3412" x="900">Kompression × Korrektheit</text>

  <line x1="980" y1="471" x2="1015" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 12: Generate -->
  <rect x="1015" y="440" width="130" height="62" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowEval)" />
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6" x="1080">Erzeugen</text>
  <text y="478" text-anchor="middle" font-size="11" fill="#64748b" x="1080">LLM Aufruf</text>
  <text y="492" text-anchor="middle" font-size="11" fill="#64748b" x="1080">+ Zitate</text>

  <rect x="1015" y="512" width="130" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1" />
  <text y="528" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" x="1080">Treuegrad · HHEM</text>
  <text y="542" text-anchor="middle" font-size="11" fill="#9a3412" x="1080">Zitierreferenz P/R</text>
  <text y="555" text-anchor="middle" font-size="11" fill="#9a3412" x="1080">Faktorwert</text>

  <!-- Lane summary -->
  <rect x="40" y="582" width="1105" height="58" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1" />
  <text y="604" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412" x="592">Eine fehlerhafte Umformulierung oder ein strenger Filter kann das Gold-Dokument bereits vor der Ranking-Phase entfernen. Faithfulness kann den darauf beruhenden Ablehnungsbeschluss dennoch genehmigen.</text>
  <text y="624" text-anchor="middle" font-size="11" fill="#9a3412" x="592">Recall@k erfasst die Fehlerrückholung; der Filter für das False-Exclusion-Rate-Problem wird dem Prädikat zugeschrieben und nicht dem Retriever.</text>

  <!-- ============ POST-GEN LANE ============ -->
  <rect x="20" y="668" width="1140" height="78" rx="10" fill="#f0fdf4" stroke="#166534" stroke-width="1" />
  <text y="692" font-size="14" font-weight="700" fill="#166534" x="40">Antwort- und Produktionsprüfungen · Verifizierung sowie Telemetrie</text>

  <rect x="40" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="11" font-weight="600" fill="#166534" x="150">Prüfung von Behauptungen · NLI</text>

  <rect x="270" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="11" font-weight="600" fill="#166534" x="380">Schema-Gültigkeit · Grounding</text>

  <rect x="500" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="11" font-weight="600" fill="#166534" x="610">Erzeugung · Daumenklicks · Verweildauer</text>

  <rect x="730" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="11" font-weight="600" fill="#166534" x="840">Drift · Kosten pro Abfrage · p95</text>

  <rect x="960" y="704" width="185" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2" />
  <text y="724" text-anchor="middle" font-size="11" font-weight="600" fill="#166534" x="1052">Schatten Eval · HITL</text>
</svg>
