<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrEval" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555" />
    </marker>
    <filter id="shadowEval" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Title -->
  <text x="590" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a2e">RAG-Pipeline mit Bewertungspunkten</text>
  <text x="590" y="54" text-anchor="middle" font-size="12" fill="#666">Jede Stufe erhält eine Metrik. Die Metrik erkennt stille Fehler.</text>

  <!-- ============ OFFLINE LANE ============ -->
  <rect x="20" y="78" width="1140" height="290" rx="10" fill="#f8f9fa" stroke="#cbd5e0" stroke-width="1" />
  <text x="40" y="102" font-size="13" font-weight="700" fill="#1565c0">Offline · Eingabe</text>
  <text x="40" y="118" font-size="10" fill="#888">Wird einmal pro Corpus-Version ausgeführt. Legt die Obergrenze fest.</text>

  <!-- Stage 1: Acquire / Parse -->
  <rect x="40" y="140" width="170" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="125" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Datenabgreifen und Parsen</text>
  <text x="125" y="178" text-anchor="middle" font-size="9" fill="#555">PDFs · HTML · OCR</text>
  <text x="125" y="192" text-anchor="middle" font-size="9" fill="#555">Tabellen · Layout</text>

  <!-- Metric badge 1 -->
  <rect x="40" y="212" width="170" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="125" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">CER · HERSTELLER · TEDS</text>
  <text x="125" y="242" text-anchor="middle" font-size="9" fill="#827717">Anteil der erfolgreichen Parsungen</text>
  <text x="125" y="255" text-anchor="middle" font-size="9" fill="#827717">Layoutgenauigkeit</text>

  <!-- Arrow -->
  <line x1="210" y1="171" x2="245" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 2: Normalize / Dedup -->
  <rect x="245" y="140" width="170" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="330" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Normalisierung und Deduplizierung</text>
  <text x="330" y="178" text-anchor="middle" font-size="9" fill="#555">NFC/NFKC · MinHash</text>
  <text x="330" y="192" text-anchor="middle" font-size="9" fill="#555">PII · Standardvorlage</text>

  <rect x="245" y="212" width="170" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="330" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">Duplizitäts-Rückrufgenauigkeit/Präzision</text>
  <text x="330" y="242" text-anchor="middle" font-size="9" fill="#827717">PII-Aufruf (nach Typ)</text>
  <text x="330" y="255" text-anchor="middle" font-size="9" fill="#827717">Spracherkennung F1</text>

  <line x1="415" y1="171" x2="450" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 3: Chunk -->
  <rect x="450" y="140" width="170" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="535" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Blöckchen</text>
  <text x="535" y="178" text-anchor="middle" font-size="9" fill="#555">rekursiv · semantisch</text>
  <text x="535" y="192" text-anchor="middle" font-size="9" fill="#555">strukturell · spät</text>

  <rect x="450" y="212" width="170" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="535" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">Containment von answer-span</text>
  <text x="535" y="242" text-anchor="middle" font-size="9" fill="#827717">Grenzbruchrate</text>
  <text x="535" y="255" text-anchor="middle" font-size="9" fill="#827717">Recall@k gegen Größe</text>

  <line x1="620" y1="171" x2="655" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 4: Enrich (NER/EL) -->
  <rect x="655" y="140" width="170" height="62" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="740" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#6a1b9a">Erweitern</text>
  <text x="740" y="178" text-anchor="middle" font-size="9" fill="#555">NER · Entitätsverknüpfung</text>
  <text x="740" y="192" text-anchor="middle" font-size="9" fill="#555">Tags · Hierarchie</text>

  <rect x="655" y="212" width="170" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="740" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">EL F1 · Präzision von NULL</text>
  <text x="740" y="242" text-anchor="middle" font-size="9" fill="#827717">hierarchische F1</text>
  <text x="740" y="255" text-anchor="middle" font-size="9" fill="#827717">Alias-Coverage</text>

  <line x1="825" y1="171" x2="860" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 5: Embed -->
  <rect x="860" y="140" width="135" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="927" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Einfügen</text>
  <text x="927" y="178" text-anchor="middle" font-size="9" fill="#555">dicht / spärlich</text>
  <text x="927" y="192" text-anchor="middle" font-size="9" fill="#555">mehrvektoriell</text>

  <rect x="860" y="212" width="135" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="927" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">Domain nDCG@10</text>
  <text x="927" y="242" text-anchor="middle" font-size="9" fill="#827717">Drift (KL · NN-Stab)</text>
  <text x="927" y="255" text-anchor="middle" font-size="9" fill="#827717">gegenüber BEIR/MMTEB</text>

  <line x1="995" y1="171" x2="1030" y2="171" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 6: Index -->
  <rect x="1030" y="140" width="115" height="62" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="1087" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Index</text>
  <text x="1087" y="178" text-anchor="middle" font-size="9" fill="#555">HNSW / IVF</text>
  <text x="1087" y="192" text-anchor="middle" font-size="9" fill="#555">BM25 · Hybrid</text>

  <rect x="1030" y="212" width="115" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="1087" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">ANN-Rückrufrate gegenüber konstanter Werte</text>
  <text x="1087" y="242" text-anchor="middle" font-size="9" fill="#827717">P99-Zeitverzögerung der Frische</text>
  <text x="1087" y="255" text-anchor="middle" font-size="9" fill="#827717">gefilterte Suchung – Breitengrad</text>

  <!-- Lane summary -->
  <rect x="40" y="290" width="1105" height="58" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1" />
  <text x="592" y="312" text-anchor="middle" font-size="11" font-weight="600" fill="#1565c0">Die Bereitschaft des Offline-Korpus legt die obere Grenze fest. Wenn ein Datensatz hier den Antwortabschnitt verliert, kann kein Nachrangierer diesen später wiederherstellen.</text>
  <text x="592" y="332" text-anchor="middle" font-size="10" fill="#1565c0">Die meisten Teams investieren zu stark in die Recherche und zu wenig in das Parsen, die Normalisierung sowie das Chunking. Genau dort stirbt das RAG in der Produktion stillschweigend ab.</text>

  <!-- ============ ONLINE LANE ============ -->
  <rect x="20" y="378" width="1140" height="280" rx="10" fill="#f8f9fa" stroke="#cbd5e0" stroke-width="1" />
  <text x="40" y="402" font-size="13" font-weight="700" fill="#e65100">Online · Inferenz (pro Abfrage)</text>
  <text x="40" y="418" font-size="10" fill="#888">Wird bei jeder Anfrage ausgeführt. Der Kanal, in dem die meisten Metriken in der Produktion überwacht werden.</text>

  <!-- Stage 7: Query Rewrite -->
  <rect x="40" y="440" width="160" height="62" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="120" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">Überarbeiten / Umleiten</text>
  <text x="120" y="478" text-anchor="middle" font-size="9" fill="#555">HyDE · Mehrfachabfrage</text>
  <text x="120" y="492" text-anchor="middle" font-size="9" fill="#555">Intent · adaptiv</text>

  <rect x="40" y="512" width="160" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="120" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">Recall@k-Verbesserung</text>
  <text x="120" y="542" text-anchor="middle" font-size="9" fill="#827717">Routinggenauigkeit</text>
  <text x="120" y="555" text-anchor="middle" font-size="9" fill="#827717">Aktivitätsrate</text>

  <line x1="200" y1="471" x2="235" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 8: Retrieve -->
  <rect x="235" y="440" width="160" height="62" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="315" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">Abrufen</text>
  <text x="315" y="478" text-anchor="middle" font-size="9" fill="#555">dicht + spärlich + RRF</text>
  <text x="315" y="492" text-anchor="middle" font-size="9" fill="#555">Filterprädikate</text>

  <rect x="235" y="512" width="160" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="315" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">Recall@k · MRR · nDCG</text>
  <text x="315" y="542" text-anchor="middle" font-size="9" fill="#827717">Kontextgenauigkeit/Aufrufrate</text>
  <text x="315" y="555" text-anchor="middle" font-size="9" fill="#827717">hybrider Hebevorgang</text>

  <line x1="395" y1="471" x2="430" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 9: Filter (highlighted) -->
  <rect x="430" y="440" width="160" height="62" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="2" filter="url(#shadowEval)" />
  <text x="510" y="462" text-anchor="middle" font-size="12" font-weight="700" fill="#c62828">Filter – der stille Mörder</text>
  <text x="510" y="478" text-anchor="middle" font-size="9" fill="#555">Mieter · ACL · Tag</text>
  <text x="510" y="492" text-anchor="middle" font-size="9" fill="#555">hart gegen weich</text>

  <rect x="430" y="512" width="160" height="48" rx="6" fill="#ffebee" stroke="#c62828" stroke-width="1.2" />
  <text x="510" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#c62828">Filter-Rate für Falsch-Ausschlüsse</text>
  <text x="510" y="542" text-anchor="middle" font-size="9" fill="#c62828">Präzision/Auflösung des Prädikats</text>
  <text x="510" y="555" text-anchor="middle" font-size="9" fill="#c62828">Schattenabruf-Δ</text>

  <line x1="590" y1="471" x2="625" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 10: Rerank -->
  <rect x="625" y="440" width="160" height="62" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="705" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">Neubewertung</text>
  <text x="705" y="478" text-anchor="middle" font-size="9" fill="#555">Kreuzencoder · listeweise</text>
  <text x="705" y="492" text-anchor="middle" font-size="9" fill="#555">BGE · Cohere · ZeRank</text>

  <rect x="625" y="512" width="160" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="705" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">ΔnDCG · ΔMRR · ΔP@1</text>
  <text x="705" y="542" text-anchor="middle" font-size="9" fill="#827717">Robustheit gegenüber Störeinflüssen</text>
  <text x="705" y="555" text-anchor="middle" font-size="9" fill="#827717">Latenz P95</text>

  <line x1="785" y1="471" x2="820" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 11: Assemble -->
  <rect x="820" y="440" width="160" height="62" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="900" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">Kontext zusammenstellen</text>
  <text x="900" y="478" text-anchor="middle" font-size="9" fill="#555">Ordnen · Komprimieren</text>
  <text x="900" y="492" text-anchor="middle" font-size="9" fill="#555">Budget-Token</text>

  <rect x="820" y="512" width="160" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="900" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">Kontextnutzung</text>
  <text x="900" y="542" text-anchor="middle" font-size="9" fill="#827717">Mittelding-Angriff</text>
  <text x="900" y="555" text-anchor="middle" font-size="9" fill="#827717">Kompression × Korrektheit</text>

  <line x1="980" y1="471" x2="1015" y2="471" stroke="#555" stroke-width="1.3" marker-end="url(#arrEval)" />

  <!-- Stage 12: Generate -->
  <rect x="1015" y="440" width="130" height="62" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowEval)" />
  <text x="1080" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#6a1b9a">Erstellen</text>
  <text x="1080" y="478" text-anchor="middle" font-size="9" fill="#555">Aufruf der LLM</text>
  <text x="1080" y="492" text-anchor="middle" font-size="9" fill="#555">+ Zitierungen</text>

  <rect x="1015" y="512" width="130" height="48" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1" />
  <text x="1080" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#827717">Genauigkeit · HHEM</text>
  <text x="1080" y="542" text-anchor="middle" font-size="9" fill="#827717">Zitierreferenz P/R</text>
  <text x="1080" y="555" text-anchor="middle" font-size="9" fill="#827717">Faktorwert</text>

  <!-- Lane summary -->
  <rect x="40" y="582" width="1105" height="58" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1" />
  <text x="592" y="604" text-anchor="middle" font-size="11" font-weight="600" fill="#e65100">Ein fehlerhafter Filter oder eine falsche Umformulierung setzt den Recall vor Beginn der Rangliste auf Null. Die Treue bleibt weiterhin in Ordnung – das Modell gibt zuverlässig an „Ich weiß es nicht.“</text>
  <text x="592" y="624" text-anchor="middle" font-size="10" fill="#e65100">Die Ausschlussrate der Spur im Vergleich zu Recall@k berücksichtigen. Andernfalls täuschen die kanonischen IR-Metriken Sie bezüglich der Leistungsfähigkeit des Retrievers.</text>

  <!-- ============ POST-GEN LANE ============ -->
  <rect x="20" y="668" width="1140" height="78" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1" />
  <text x="40" y="692" font-size="13" font-weight="700" fill="#2e7d32">Nach der Generierung · Überprüfung und Telemetrie</text>

  <rect x="40" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="150" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">Prüfung der Behauptung · NLI · Selbstkonsistenz</text>

  <rect x="270" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="380" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">Schema-Validität · Entitätsverankerung · ECE</text>

  <rect x="500" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="610" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">Niederschlagsrate · Daumenklicks · Verweildauer · CTR bei Zitaten</text>

  <rect x="730" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="840" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">Drift (Abfrage/Embedding) · Kosten/Abfrage · p95</text>

  <rect x="960" y="704" width="185" height="32" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2" />
  <text x="1052" y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">Schattenbewertung · HITL-Warteschlange</text>
</svg>
