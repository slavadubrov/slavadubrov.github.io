<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">verlustbewusster Context Compression mit separaten kanonischen Zustands- und Artefaktindizes</title>
  <desc id="desc">Gespräche und Beobachtungen werden zu einem kompakten Arbeitsdatensatz zusammengefasst, während der kanonische Zustand der Aufgabe, Referenzen zu Beweismitteln sowie die Historie der Erzeugnisse getrennt aufbewahrt werden, um eine präzise Wiederherstellung zu gewährleisten.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="440" rx="22" fill="#0f172a" /><text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Komprimiere den Text; bewahre den wiederherstellbaren Zustand.</text>
  <g font-family="Inter, system-ui, sans-serif"><g transform="translate(35 105)"><rect width="260" height="230" rx="16" fill="#1e293b" stroke="#64748b" /><text x="130" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#e2e8f0">wachsender Kontext</text><text x="30" y="83" font-size="13" fill="#cbd5e1">Gesprächswendungen</text><text x="30" y="116" font-size="13" fill="#cbd5e1">rohe Beobachtungen der Tooling-Systeme</text><text x="30" y="149" font-size="13" fill="#cbd5e1">abgerufte Abschnitte</text><text x="30" y="182" font-size="13" fill="#cbd5e1">wiederholter Boilerplate-Text</text></g><text x="325" y="225" font-size="25" fill="#94a3b8">→</text>
  <g transform="translate(365 105)"><rect width="270" height="230" rx="16" fill="#1d4ed8" stroke="#2563eb" /><text x="135" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#93c5fd">Kompaktes Arbeitsset</text><text x="30" y="83" font-size="13" fill="#93c5fd">Entscheidungen + nächste Aktion</text><text x="30" y="116" font-size="13" fill="#93c5fd">ergebnisse der typbasierten Tool-Analyse</text><text x="30" y="149" font-size="13" fill="#93c5fd">Quell- und Artefaktreferenzen</text><text x="30" y="182" font-size="13" fill="#93c5fd">nicht gelöste Fragen</text></g><text x="665" y="225" font-size="25" fill="#94a3b8">Pluszeichen</text>
  <g transform="translate(705 85)"><rect width="260" height="270" rx="16" fill="#1d4ed8" stroke="#2563eb" /><text x="130" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#93c5fd">Kanonische Speicher</text><text x="30" y="83" font-size="13" fill="#93c5fd">Aufgabenzustand</text><text x="30" y="116" font-size="13" fill="#93c5fd">Index für Dateien und Artefakte</text><text x="30" y="149" font-size="13" fill="#93c5fd">vollständiger Tool Results</text><text x="30" y="182" font-size="13" fill="#93c5fd">Belegversionen</text><text x="30" y="225" font-size="12" fill="#93c5fd">Genaue Details erneut abrufen</text><text x="30" y="247" font-size="12" fill="#93c5fd">wenn die Aufgabe sie benötigt.</text></g><text x="500" y="400" text-anchor="middle" font-size="13" fill="#94a3b8">Optimieren Sie die Gesamtkosten pro erfolgreich abgeschlossener Aufgabe für den Tokens, einschließlich erneuter Abfrage und Wiederherstellung.</text></g>
</svg>
