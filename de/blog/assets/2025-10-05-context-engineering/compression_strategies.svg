<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Strategien zur Kompression von Kontextinformationen</title>
  <desc id="artifact-desc">Strategien zur Kompression von Kontextinformationen.</desc>
    <style>
        .bg { fill: #0f172a; }
        .title { fill: #f8fafc; font-family: Inter, system-ui, sans-serif; font-size: 20px; font-weight: bold; text-anchor: middle; }
        .subtitle { fill: #cbd5e1; font-family: Inter, system-ui, sans-serif; font-size: 12px; text-anchor: middle; }
        .box { rx: 8; ry: 8; }
        .box-title { fill: #f8fafc; font-family: Inter, system-ui, sans-serif; font-size: 14px; font-weight: bold; text-anchor: middle; }
        .box-text { fill: #cbd5e1; font-family: Inter, system-ui, sans-serif; font-size: 11px; text-anchor: middle; }
        .metric { fill: #fdba74; font-family: Inter, system-ui, sans-serif; font-size: 20px; font-weight: bold; text-anchor: middle; }
        .metric-label { fill: #cbd5e1; font-family: Inter, system-ui, sans-serif; font-size: 10px; text-anchor: middle; }
        .arrow { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrow); }
        .best { fill: #166534; font-family: Inter, system-ui, sans-serif; font-size: 10px; font-weight: bold; text-anchor: middle; }
    </style>
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
        </marker>
    </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

    <rect width="100%" height="100%" class="bg" />

    <text y="35" class="title" x="450">Strategien zur Kompression von Kontextinformationen</text>
    <text y="55" class="subtitle" x="450">Optimieren Sie nach Tokens pro Aufgabe und nicht nach Tokens pro Anfrage.</text>

    <!-- Strategy 1: Anchored Iterative -->
    <g transform="translate(50, 90)">
        <rect x="0" y="0" width="250" height="260" class="box" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" />
        <text y="30" class="box-title" x="125">verankerte iterative Methode</text>
        <text y="50" class="box-title" x="125">Zusammenfassung</text>

        <line x1="20" y1="65" x2="230" y2="65" stroke="#2563eb" stroke-width="1" opacity="0.5" />

        <text y="90" class="box-text" x="125">Strukturierte Zusammenfassungen aufrechterhalten</text>
        <text y="105" class="box-text" x="125">mit expliziten Abschnitten</text>
        <text y="130" class="box-text" x="125">Schrittweise Zusammenführung auf</text>
        <text y="145" class="box-text" x="125">jeder Kompressionszyklus</text>

        <!-- Metrics -->
        <rect x="20" y="165" width="95" height="50" rx="6" ry="6" fill="#1e293b" stroke="#94a3b8" />
        <text y="190" class="metric" x="67">98,6 %</text>
        <text y="205" class="metric-label" x="67">Kompression</text>

        <rect x="135" y="165" width="95" height="50" rx="6" ry="6" fill="#1e293b" stroke="#94a3b8" />
        <text y="190" class="metric" x="182">3,70</text>
        <text y="205" class="metric-label" x="182">Qualität</text>

        <text y="235" class="best" x="125">✓ IDEAL FÜR DIE VERFOLGUNG VON DATEIEN</text>
        <text y="250" class="box-text" x="125">Lange Programmier-Sitzungen</text>
    </g>

    <!-- Strategy 2: Regenerative -->
    <g transform="translate(325, 90)">
        <rect x="0" y="0" width="250" height="260" class="box" fill="#5b21b6" stroke="#7c3aed" stroke-width="2" />
        <text y="30" class="box-title" x="125">regenerativ</text>
        <text y="50" class="box-title" x="125">Vollständige Zusammenfassung</text>

        <line x1="20" y1="65" x2="230" y2="65" stroke="#7c3aed" stroke-width="1" opacity="0.5" />

        <text y="90" class="box-text" x="125">Detaillierte Zusammenfassung erstellen</text>
        <text y="105" class="box-text" x="125">bei jeder Kompression</text>
        <text y="130" class="box-text" x="125">Vollständige Kontextprüfung</text>
        <text y="145" class="box-text" x="125">jeder Zyklus</text>

        <!-- Metrics -->
        <rect x="20" y="165" width="95" height="50" rx="6" ry="6" fill="#1e293b" stroke="#94a3b8" />
        <text y="190" class="metric" x="67">98,7 %</text>
        <text y="205" class="metric-label" x="67">Kompression</text>

        <rect x="135" y="165" width="95" height="50" rx="6" ry="6" fill="#1e293b" stroke="#94a3b8" />
        <text y="190" class="metric" x="182">3,44</text>
        <text y="205" class="metric-label" x="182">Qualität</text>

        <text y="235" class="best" x="125">✓ BESTE LESBARKEIT</text>
        <text y="250" class="box-text" x="125">Klare Phasengrenzen</text>
    </g>

    <!-- Strategy 3: Opaque -->
    <g transform="translate(600, 90)">
        <rect x="0" y="0" width="250" height="260" class="box" fill="#166534" stroke="#ea580c" stroke-width="2" />
        <text y="30" class="box-title" x="125">undurchsichtig</text>
        <text y="50" class="box-title" x="125">Kompression</text>

        <line x1="20" y1="65" x2="230" y2="65" stroke="#ea580c" stroke-width="1" opacity="0.5" />

        <text y="90" class="box-text" x="125">Komprimierte Darstellung</text>
        <text y="105" class="box-text" x="125">für die Rekonstruktion optimiert</text>
        <text y="130" class="box-text" x="125">Interpretierbarkeit wird geopfert</text>
        <text y="145" class="box-text" x="125">für maximale Kosteneinsparungen</text>

        <!-- Metrics -->
        <rect x="20" y="165" width="95" height="50" rx="6" ry="6" fill="#1e293b" stroke="#94a3b8" />
        <text y="190" class="metric" x="67">99,3 %</text>
        <text y="205" class="metric-label" x="67">Kompression</text>

        <rect x="135" y="165" width="95" height="50" rx="6" ry="6" fill="#1e293b" stroke="#94a3b8" />
        <text y="190" class="metric" x="182">3,35</text>
        <text y="205" class="metric-label" x="182">Qualität</text>

        <text y="235" class="best" x="125">✓ BESTE WÄHLUNG FÜR MAXIMALE EINSPARUNGEN</text>
        <text y="250" class="box-text" x="125">Kurze Sitzungen, geringe Neuladung</text>
    </g>

    <!-- Bottom insight -->
    <rect x="200" y="365" width="500" height="30" rx="6" ry="6" fill="#1e293b" stroke="#94a3b8" />
    <text y="385" class="box-text" style="fill: #fdba74;" x="450">Kernerkenntnis: 0,7 % mehr behaltene Token → 0,35 Qualitätspunkte gewonnen</text>
</svg>
