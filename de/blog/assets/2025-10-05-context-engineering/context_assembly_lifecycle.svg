<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Kontext, der durch begrenzte Retrieval-Operationen, Budgetierung, Ausführung und Validierung erstellt wird</title>
  <desc id="desc">Der Zustandsfluss vertrauenswürdiger Anfragen erfolgt über die Entscheidungsfindung mittels autorisierter Retrieval, budgetbasierte Bewertung, Vorschläge auf Basis von Model, deterministische Validierung und Ausführung sowie schließlich die Erfassung der Herkunft und des Ergebnisses.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="460" rx="22" fill="#0f172a" />
  <text x="500" y="46" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Die Kontextzusammenstellung ist ein Lebenszyklus pro Entscheidung.</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(25 115)"><rect width="150" height="110" rx="14" fill="#1e293b" stroke="#64748b" /><text x="75" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#e2e8f0">Vertrauensvoller Anfrage</text><text x="75" y="63" text-anchor="middle" font-size="11" fill="#cbd5e1">Aktor, Tenant, Aufgabe</text><text x="75" y="84" text-anchor="middle" font-size="11" fill="#94a3b8">Region + Zeit</text></g><text x="192" y="180" text-anchor="middle" font-size="22" fill="#94a3b8">→</text>
    <g transform="translate(210 115)"><rect width="150" height="110" rx="14" fill="#5b21b6" stroke="#2563eb" /><text x="75" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#c4b5fd">Entscheidung auswählen</text><text x="75" y="63" text-anchor="middle" font-size="11" fill="#93c5fd">Planen, abrufen, handeln</text><text x="75" y="84" text-anchor="middle" font-size="11" fill="#94a3b8">oder antworten</text></g><text x="377" y="180" text-anchor="middle" font-size="22" fill="#94a3b8">→</text>
    <g transform="translate(395 115)"><rect width="150" height="110" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="75" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#93c5fd">Bereich + Abrufen</text><text x="75" y="63" text-anchor="middle" font-size="11" fill="#93c5fd">Zuerst autorisieren</text><text x="75" y="84" text-anchor="middle" font-size="11" fill="#94a3b8">Beweisrang</text></g><text x="562" y="180" text-anchor="middle" font-size="22" fill="#94a3b8">→</text>
    <g transform="translate(580 115)"><rect width="150" height="110" rx="14" fill="#9a3412" stroke="#ea580c" /><text x="75" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#fdba74">Budget + Zusammenbau</text><text x="75" y="63" text-anchor="middle" font-size="11" fill="#fdba74">Nutzfunktion, Aktualität</text><text x="75" y="84" text-anchor="middle" font-size="11" fill="#94a3b8">Vertrauensgrenzen</text></g><text x="747" y="180" text-anchor="middle" font-size="22" fill="#94a3b8">→</text>
    <g transform="translate(765 115)"><rect width="210" height="110" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="105" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#93c5fd">Vorschlag einreichen → Validierung durchführen → Handlung ausführen</text><text x="105" y="63" text-anchor="middle" font-size="11" fill="#93c5fd">eingetippte Ausgabe + Richtlinie</text><text x="105" y="84" text-anchor="middle" font-size="11" fill="#94a3b8">Postbedingungen des Tools</text></g>
    <rect x="120" y="300" width="760" height="85" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="500" y="331" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Das Manifest, die Herkunft, die Validierung sowie das Ergebnis der Aufgabe aufzeichnen</text><text x="500" y="360" text-anchor="middle" font-size="12" fill="#93c5fd">Die nächste Entscheidung erhält einen neuen Arbeitsbereich anstelle davon, alles zu erben.</text>
    <text x="500" y="425" text-anchor="middle" font-size="13" fill="#94a3b8">Ein Aufruf von Model stellt eine einzelne Stufe innerhalb der Context-Policy dar – nicht die Policy selbst.</text>
  </g>
</svg>
