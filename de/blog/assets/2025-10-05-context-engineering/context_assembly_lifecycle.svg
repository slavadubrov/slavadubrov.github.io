<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" role="img" aria-labelledby="title desc">
  <title id="title">Context assembled through scoped retrieval, budgeting, execution, and validation</title>
  <desc id="desc">Trusted request state flows through decision selection, authorized retrieval, utility-based budgeting, model proposal, deterministic validation and execution, then provenance and outcome recording.</desc>
  <rect width="1000" height="460" rx="22" fill="#0f172a"/>
  <text x="500" y="46" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Context assembly is a per-decision lifecycle</text>
  <g font-family="system-ui, sans-serif">
    <g transform="translate(25 115)"><rect width="150" height="110" rx="14" fill="#1e293b" stroke="#64748b"/><text x="75" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#e2e8f0">Trusted request</text><text x="75" y="63" text-anchor="middle" font-size="11" fill="#cbd5e1">actor, tenant, task</text><text x="75" y="84" text-anchor="middle" font-size="11" fill="#94a3b8">locale + time</text></g><text x="192" y="180" text-anchor="middle" font-size="22" fill="#94a3b8">→</text>
    <g transform="translate(210 115)"><rect width="150" height="110" rx="14" fill="#2e1065" stroke="#8b5cf6"/><text x="75" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#c4b5fd">Select decision</text><text x="75" y="63" text-anchor="middle" font-size="11" fill="#ddd6fe">plan, retrieve, act</text><text x="75" y="84" text-anchor="middle" font-size="11" fill="#94a3b8">or respond</text></g><text x="377" y="180" text-anchor="middle" font-size="22" fill="#94a3b8">→</text>
    <g transform="translate(395 115)"><rect width="150" height="110" rx="14" fill="#172554" stroke="#3b82f6"/><text x="75" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#93c5fd">Scope + retrieve</text><text x="75" y="63" text-anchor="middle" font-size="11" fill="#dbeafe">authorize first</text><text x="75" y="84" text-anchor="middle" font-size="11" fill="#94a3b8">rank evidence</text></g><text x="562" y="180" text-anchor="middle" font-size="22" fill="#94a3b8">→</text>
    <g transform="translate(580 115)"><rect width="150" height="110" rx="14" fill="#422006" stroke="#f59e0b"/><text x="75" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#fbbf24">Budget + assemble</text><text x="75" y="63" text-anchor="middle" font-size="11" fill="#fef3c7">utility, freshness</text><text x="75" y="84" text-anchor="middle" font-size="11" fill="#94a3b8">trust boundaries</text></g><text x="747" y="180" text-anchor="middle" font-size="22" fill="#94a3b8">→</text>
    <g transform="translate(765 115)"><rect width="210" height="110" rx="14" fill="#052e2b" stroke="#14b8a6"/><text x="105" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#5eead4">Propose → validate → act</text><text x="105" y="63" text-anchor="middle" font-size="11" fill="#ccfbf1">typed output + policy</text><text x="105" y="84" text-anchor="middle" font-size="11" fill="#94a3b8">tool postconditions</text></g>
    <rect x="120" y="300" width="760" height="85" rx="14" fill="#164e63" stroke="#06b6d4"/><text x="500" y="331" text-anchor="middle" font-size="16" font-weight="700" fill="#67e8f9">Record the manifest, provenance, validation, and task outcome</text><text x="500" y="360" text-anchor="middle" font-size="12" fill="#cffafe">The next decision gets a new working set rather than inheriting everything.</text>
    <text x="500" y="425" text-anchor="middle" font-size="13" fill="#94a3b8">A model call is one stage inside the context policy—not the policy itself.</text>
  </g>
</svg>
