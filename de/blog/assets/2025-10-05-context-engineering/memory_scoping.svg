<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Gedächtnisinhalt, der nach Mieter, Zweck, Aktualität und Relevanz ausgewählt wird</title>
  <desc id="desc">Die potenziellen Speicherobjekte müssen Prüfungen hinsichtlich Bereichsberechtigung, Zweck, Aktualität und Relevanz bestehen. Nur ausgewählte Einträge gelangen in den Kontext; abgelehnte Einträge verbleiben außerhalb.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="420" rx="22" fill="#0f172a" /><text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Das Speichermanagement Retrieval ist eine strategische Entscheidung.</text>
  <g font-family="Inter, system-ui, sans-serif"><g transform="translate(40 110)"><rect width="220" height="210" rx="16" fill="#1e293b" stroke="#64748b" /><text x="110" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#e2e8f0">Speicherspeicher</text><text x="28" y="82" font-size="13" fill="#cbd5e1">explizite Benutzerfakten</text><text x="28" y="112" font-size="13" fill="#cbd5e1">abgeleitete Hypothesen</text><text x="28" y="142" font-size="13" fill="#cbd5e1">episodische Aufzeichnungen</text><text x="28" y="172" font-size="13" fill="#cbd5e1">Ursprungsverfolgung + Lebenszyklus</text></g><text x="290" y="225" font-size="25" fill="#94a3b8">→</text>
  <g transform="translate(330 95)"><rect width="330" height="240" rx="16" fill="#5b21b6" stroke="#2563eb" /><text x="165" y="38" text-anchor="middle" font-size="17" font-weight="700" fill="#c4b5fd">Selektionsgatter</text><text x="35" y="82" font-size="13" fill="#93c5fd">1. authentifizierter Benutzer + Tenant</text><text x="35" y="116" font-size="13" fill="#93c5fd">2. zulässige Verwendungszweck</text><text x="35" y="150" font-size="13" fill="#93c5fd">3. Aktualität und Status der Bewertung</text><text x="35" y="184" font-size="13" fill="#93c5fd">4. Relevanz und Autorität</text><text x="35" y="218" font-size="12" fill="#fca5a5">Keine Schleuse → keine Einbeziehung des Kontexts</text></g><text x="690" y="225" font-size="25" fill="#94a3b8">→</text>
  <g transform="translate(730 110)"><rect width="230" height="210" rx="16" fill="#1d4ed8" stroke="#2563eb" /><text x="115" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#93c5fd">Ausgewählter Arbeitsbereich</text><text x="30" y="84" font-size="13" fill="#93c5fd">minimale nützliche Fakten</text><text x="30" y="116" font-size="13" fill="#93c5fd">Quelle unverändert beibehalten</text><text x="30" y="148" font-size="13" fill="#93c5fd">Ablaufdatum erhalten</text><text x="30" y="180" font-size="13" fill="#93c5fd">die Löschung bleibt weiterhin möglich</text></g><text x="500" y="382" text-anchor="middle" font-size="13" fill="#94a3b8">Model-die abgeleiteten Erinnerungen bleiben Hypothesen, solange eine autoritative Quelle sie nicht bestätigt.</text></g>
</svg>
