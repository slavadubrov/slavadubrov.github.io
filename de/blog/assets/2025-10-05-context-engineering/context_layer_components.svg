<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Architektur der Kontextschicht (7 Komponenten)</title>
  <desc id="artifact-desc">Architektur der Kontextschicht (7 Komponenten).</desc>

<style>
    .bg { fill: #0f172a; }
    .node { fill: #1e293b; stroke: #2563eb; stroke-width: 2; rx: 8; ry: 8; }
    .node-text { fill: #f8fafc; font-family: Inter, system-ui, sans-serif; font-size: 14px; text-anchor: middle; dominant-baseline: middle; }
    .edge { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .label { fill: #cbd5e1; font-family: Inter, system-ui, sans-serif; font-size: 12px; text-anchor: middle; background-color: #0f172a; }
    .title { fill: #f8fafc; font-family: Inter, system-ui, sans-serif; font-size: 18px; font-weight: bold; text-anchor: middle; }
    .group-label { fill: #cbd5e1; font-family: Inter, system-ui, sans-serif; font-size: 14px; font-weight: bold; text-anchor: start; }
    .accent-green { stroke: #16a34a; }
    .accent-red { stroke: #dc2626; }
    .accent-yellow { stroke: #ea580c; }
    .accent-purple { stroke: #7c3aed; }
    .accent-orange { stroke: #ea580c; }
    .accent-cyan { stroke: #2563eb; }
</style>
<defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
</defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

<rect width="100%" height="100%" class="bg" />

<text y="40" class="title" x="400">Architektur der Kontextschicht (7 Komponenten)</text>

<!-- Groups -->
<!-- Static Context -->
<g transform="translate(50, 80)">
    <rect x="0" y="0" width="220" height="250" rx="10" ry="10" style="fill: #1e293b; stroke: #2563eb; stroke-dasharray: 5 5" />
    <text y="30" class="group-label" style="fill: #93c5fd" x="20">1. Lenkung (statisch)</text>

    <g transform="translate(35, 60)">
        <rect x="0" y="0" width="150" height="60" class="node" style="stroke: #2563eb" />
        <text y="30" class="node-text" x="75">Anweisungen</text>
    </g>
    <g transform="translate(35, 150)">
        <rect x="0" y="0" width="150" height="60" class="node" style="stroke: #2563eb" />
        <text y="30" class="node-text" x="75">Beispiele</text>
    </g>
</g>

<!-- Dynamic Context -->
<g transform="translate(290, 80)">
    <rect x="0" y="0" width="220" height="340" rx="10" ry="10" style="fill: #1e293b; stroke: #16a34a; stroke-dasharray: 5 5" />
    <text y="30" class="group-label" style="fill: #86efac" x="20">2. Daten (dynamisch)</text>

    <g transform="translate(35, 60)">
        <rect x="0" y="0" width="150" height="60" class="node" style="stroke: #16a34a" />
        <text y="30" class="node-text" x="75">Kenntnisse (RAG)</text>
    </g>
    <g transform="translate(35, 150)">
        <rect x="0" y="0" width="150" height="60" class="node" style="stroke: #7c3aed" />
        <text y="30" class="node-text" x="75">Speicher</text>
    </g>
    <g transform="translate(35, 240)">
        <rect x="0" y="0" width="150" height="60" class="node" style="stroke: #2563eb" />
        <text y="30" class="node-text" x="75">Fähigkeiten</text>
    </g>
</g>

<!-- Execution & Safety -->
<g transform="translate(530, 80)">
    <rect x="0" y="0" width="220" height="250" rx="10" ry="10" style="fill: #1e293b; stroke: #ea580c; stroke-dasharray: 5 5" />
    <text y="30" class="group-label" style="fill: #fdba74" x="20">3. Steuerungselemente</text>

    <g transform="translate(35, 60)">
        <rect x="0" y="0" width="150" height="60" class="node" style="stroke: #ea580c" />
        <text y="30" class="node-text" x="75">Werkzeuge</text>
    </g>
    <g transform="translate(35, 150)">
        <rect x="0" y="0" width="150" height="60" class="node" style="stroke: #dc2626" />
        <text y="30" class="node-text" x="75">Schutzbügel</text>
    </g>
</g>

<!-- Assembly Engine -->
<g transform="translate(200, 450)">
    <rect x="0" y="0" width="400" height="80" class="node" style="stroke: #ea580c; fill: #9a3412" />
    <text y="40" class="node-text" style="font-size: 16px; font-weight: bold; fill: #fdba74" x="200">Kontext-Verarbeitungs-Engine</text>
</g>

<!-- Edges -->
<!-- From Groups to Engine -->
<path d="M160 330 L250 450" class="edge" />
<path d="M400 420 L400 450" class="edge" />
<path d="M640 330 L550 450" class="edge" />


</svg>
