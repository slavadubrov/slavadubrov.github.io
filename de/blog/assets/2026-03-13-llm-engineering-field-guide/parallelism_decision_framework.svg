<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Parallelism Decision Framework" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Entscheidung zur Parallelisierung Framework</title>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b" />
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="900" height="460" fill="#f8fafc" rx="8" />

  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">Selektion der Parallelisierungsstrategie: eine Ausgangsheuristik</text>

  <!-- Edges -->
  <path d="M 450 70 L 450 86" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" />

  <path d="M 380 110 L 150 110 L 150 231" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" />
  <text x="330" y="105" font-size="12" font-weight="bold" fill="#166534">Ja</text>

  <path d="M 450 130 L 450 156" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" />
  <text x="460" y="148" font-size="12" font-weight="bold" fill="#991b1b">Nicht</text>

  <path d="M 450 200 L 450 231" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" />
  <text x="460" y="222" font-size="12" font-weight="bold" fill="#166534">Ja</text>

  <path d="M 520 180 L 750 180 L 750 231" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" />
  <text x="560" y="175" font-size="12" font-weight="bold" fill="#991b1b">Nicht</text>

  <path d="M 150 285 L 150 305 L 450 305" fill="none" stroke="#334155" stroke-width="2" />
  <path d="M 750 285 L 750 305 L 450 305" fill="none" stroke="#334155" stroke-width="2" />
  <path d="M 450 285 L 450 316" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" />

  <path d="M 450 360 L 450 391" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" />
  <text x="460" y="380" font-size="12" font-weight="bold" fill="#991b1b">Nicht</text>

  <path d="M 520 340 L 666 340" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" />
  <text x="560" y="335" font-size="12" font-weight="bold" fill="#166534">Ja</text>

  <path d="M 750 360 L 750 415 L 514 415" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Nodes -->
  <rect x="410" y="40" width="80" height="30" rx="15" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)" />
  <text x="450" y="59" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a">Start</text>

  <rect x="380" y="90" width="140" height="40" rx="20" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
  <text x="450" y="114" text-anchor="middle" font-size="13" font-weight="bold" fill="#1d4ed8">Passt in einen GPU?</text>

  <rect x="380" y="160" width="140" height="40" rx="20" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
  <text x="450" y="184" text-anchor="middle" font-size="13" font-weight="bold" fill="#1d4ed8">Passt in einen Knoten?</text>

  <rect x="60" y="235" width="180" height="50" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
  <text x="150" y="255" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">Test von DP-Replicas</text>
  <text x="150" y="272" text-anchor="middle" font-size="11" fill="#334155">Unabhängige Anfragen</text>

  <rect x="360" y="235" width="180" height="50" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
  <text x="450" y="255" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">Test auf Treffer und Fehlerrate</text>
  <text x="450" y="272" text-anchor="middle" font-size="11" fill="#334155">Tensor im Inneren, Replicas in der Verteilung</text>

  <rect x="630" y="235" width="240" height="50" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
  <text x="750" y="255" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">Test für TP, PP und DP</text>
  <text x="750" y="272" text-anchor="middle" font-size="11" fill="#334155">Den Kreuzknotenpfad profilieren</text>

  <rect x="380" y="320" width="140" height="40" rx="20" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadow)" />
  <text x="450" y="344" text-anchor="middle" font-size="13" font-weight="bold" fill="#9a3412">MoE Model?</text>

  <rect x="670" y="320" width="160" height="40" rx="6" fill="#ffffff" stroke="#ea580c" stroke-width="2" filter="url(#shadow)" />
  <text x="750" y="338" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">Test-EP</text>
  <text x="750" y="352" text-anchor="middle" font-size="10" fill="#334155">Der gesamte-zu-gesamten-Datenverkehr messen</text>

  <rect x="390" y="395" width="120" height="40" rx="20" fill="#f0fdf4" stroke="#166534" stroke-width="2" filter="url(#shadow)" />
  <text x="450" y="420" text-anchor="middle" font-size="13" font-weight="bold" fill="#166534">Benchmark bei dem SLO</text>
</svg>
