<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="Inter, system-ui, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Vorbefüllen versus Dekodieren: Zwei Phasen, zwei Engpässe</title>
  <desc id="artifact-desc">Vorbefüllen versus Dekodieren: Zwei Phasen, zwei Engpässe.</desc>
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b" />
    </marker>
    <marker id="arrow2b" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c" />
    </marker>
    <filter id="shadow2" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="900" height="400" fill="#f8fafc" rx="8" />

  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a" x="450">Vorbefüllen versus Dekodieren: Zwei Phasen, zwei Engpässe</text>

  <!-- Prefill Phase -->
  <rect x="40" y="55" width="390" height="300" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow2)" />
  <text y="82" text-anchor="middle" font-size="16" font-weight="bold" fill="#1d4ed8" x="235">Vorfüllphase</text>

  <!-- Input prompt tokens -->
  <rect x="70" y="100" width="330" height="40" rx="5" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text y="125" text-anchor="middle" font-size="12" fill="#0f172a" x="235">Eingabeanweisung: „Erklären Sie Quantencomputing in…“</text>

  <!-- Parallel processing arrows -->
  <g transform="translate(70, 155)">
    <rect width="60" height="30" rx="4" fill="#2563eb" />
    <text y="20" text-anchor="middle" font-size="10" fill="#ffffff" x="30">Token 1</text>
  </g>
  <g transform="translate(140, 155)">
    <rect width="60" height="30" rx="4" fill="#2563eb" />
    <text y="20" text-anchor="middle" font-size="10" fill="#ffffff" x="30">Token 2</text>
  </g>
  <g transform="translate(210, 155)">
    <rect width="60" height="30" rx="4" fill="#2563eb" />
    <text y="20" text-anchor="middle" font-size="10" fill="#ffffff" x="30">Token 3</text>
  </g>
  <g transform="translate(280, 155)">
    <rect width="50" height="30" rx="4" fill="#2563eb" />
    <text y="20" text-anchor="middle" font-size="10" fill="#ffffff" x="25">...</text>
  </g>
  <g transform="translate(340, 155)">
    <rect width="60" height="30" rx="4" fill="#2563eb" />
    <text y="20" text-anchor="middle" font-size="10" fill="#ffffff" x="30">Token N</text>
  </g>
  <text y="205" text-anchor="middle" font-size="11" fill="#1d4ed8" font-weight="bold" x="235">Sämtliche Tokens werden parallel verarbeitet</text>

  <!-- Properties -->
  <rect x="70" y="220" width="330" height="120" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="1" opacity="0.7" />
  <text y="245" font-size="12" font-weight="bold" fill="#1d4ed8" x="90">Berechnungsgrenze</text>
  <text y="265" font-size="11" fill="#0f172a" x="90">• Große Matrixmultiplikationen (GEMM)</text>
  <text y="282" font-size="11" fill="#0f172a" x="90">• Tensor-Kerne vollständig gesättigt</text>
  <text y="299" font-size="11" fill="#0f172a" x="90">• Arithmetische Intensität ≫ 295 FLOPs/Byte</text>
  <text y="316" font-size="11" fill="#0f172a" x="90">• Bestimmt die TTFT</text>
  <text y="333" font-size="11" fill="#9a3412" font-weight="bold" x="90">• Optimierung: schnellere GPUs, FP8, TP</text>

  <!-- Arrow between phases -->
  <line x1="430" y1="200" x2="470" y2="200" stroke="#334155" stroke-width="2" marker-end="url(#arrow2)" />
  <text y="220" text-anchor="middle" font-size="10" fill="#334155" x="450">KV-Cache</text>
  <text y="232" text-anchor="middle" font-size="10" fill="#334155" x="450">bevölkert</text>

  <!-- Decode Phase -->
  <rect x="470" y="55" width="390" height="300" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadow2)" />
  <text y="82" text-anchor="middle" font-size="16" font-weight="bold" fill="#9a3412" x="665">Decodierphase</text>

  <!-- Sequential token generation -->
  <rect x="500" y="100" width="330" height="40" rx="5" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="125" text-anchor="middle" font-size="12" fill="#0f172a" x="665">Ausgabe: Token → Token → Token → ...</text>

  <!-- Sequential arrows -->
  <g transform="translate(540, 155)">
    <rect width="60" height="30" rx="4" fill="#ea580c" />
    <text y="20" text-anchor="middle" font-size="10" fill="#ffffff" x="30">t₁</text>
  </g>
  <line x1="600" y1="170" x2="630" y2="170" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow2b)" />
  <g transform="translate(630, 155)">
    <rect width="60" height="30" rx="4" fill="#ea580c" />
    <text y="20" text-anchor="middle" font-size="10" fill="#ffffff" x="30">t₂</text>
  </g>
  <line x1="690" y1="170" x2="720" y2="170" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow2b)" />
  <g transform="translate(720, 155)">
    <rect width="60" height="30" rx="4" fill="#ea580c" />
    <text y="20" text-anchor="middle" font-size="10" fill="#ffffff" x="30">t₃</text>
  </g>
  <text y="205" text-anchor="middle" font-size="11" fill="#9a3412" font-weight="bold" x="665">Ein Token nach dem anderen, sequenziell</text>

  <!-- Properties -->
  <rect x="500" y="220" width="330" height="120" rx="6" fill="#ffffff" stroke="#ea580c" stroke-width="1" opacity="0.7" />
  <text y="245" font-size="12" font-weight="bold" fill="#9a3412" x="520">Begrenzt durch Speicherbandbreite</text>
  <text y="265" font-size="11" fill="#0f172a" x="520">• Matrix-Vektor-Multiplikation pro Schritt</text>
  <text y="282" font-size="11" fill="#0f172a" x="520">• Liest die vollständigen Gewichte sowie den KV-Cache aus dem HBM.</text>
  <text y="299" font-size="11" fill="#0f172a" x="520">• Arithmetische Intensität ≈ 1 (300× unter dem Schwellenwert)</text>
  <text y="316" font-size="11" fill="#0f172a" x="520">• Bestimmung des TPOT-Werts</text>
  <text y="333" font-size="11" fill="#1d4ed8" font-weight="bold" x="520">• Optimierung: GQA, KV-Quantisierung, Batching, Bandbreite</text>

  <!-- Timeline bar at bottom -->
  <rect x="40" y="370" width="820" height="20" rx="3" fill="#f1f5f9" />
  <rect x="40" y="370" width="280" height="20" rx="3" fill="#2563eb" opacity="0.3" />
  <rect x="320" y="370" width="540" height="20" rx="3" fill="#ea580c" opacity="0.3" />
  <text y="384" text-anchor="middle" font-size="10" fill="#1d4ed8" font-weight="bold" x="180">TTFT</text>
  <text y="384" text-anchor="middle" font-size="10" fill="#9a3412" font-weight="bold" x="590">TPOT × Ausgabetoken</text>
</svg>
