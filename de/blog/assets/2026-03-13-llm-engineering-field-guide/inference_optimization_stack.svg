<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Inter, system-ui, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Der Inferenz-Optimierungs-Stack</title>
  <desc id="artifact-desc">Der Inferenz-Optimierungs-Stack.</desc>
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
    <filter id="shadow1" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="900" height="520" fill="#f8fafc" rx="8" />

  <!-- Title -->
  <text y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a" x="450">Der Inferenz-Optimierungs-Stack</text>
  <text y="55" text-anchor="middle" font-size="12" fill="#334155" x="450">Wie Techniken zusammenwirken, um eine produktionstaugliche LLM-Dienstleistung bereitzustellen</text>

  <!-- Layer 1: Hardware Foundation -->
  <rect x="50" y="420" width="800" height="70" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow1)" />
  <text y="448" font-size="13" font-weight="bold" fill="#1d4ed8" x="80">Hardware-Grundlage</text>
  <text y="468" font-size="11" fill="#0f172a" x="80">GPU-Memoriyhierarchie: HBM3 (3,35 TB/s) → L2 (12 TB/s) → SRAM (33 TB/s)</text>
  <text y="483" font-size="10" fill="#334155" x="80">Der Bandbreitenunterschied von 10× zwischen SRAM und HBM bestimmt alle weiteren Optimierungen.</text>

  <!-- Layer 2: Kernel Optimizations -->
  <rect x="50" y="330" width="380" height="75" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadow1)" />
  <text y="355" font-size="13" font-weight="bold" fill="#166534" x="70">Kernel-Optimierungen</text>
  <text y="373" font-size="11" fill="#0f172a" x="70">FlashAttention (Flächenaufteilung in SRAM)</text>
  <text y="388" font-size="11" fill="#0f172a" x="70">Vergeschnittene Kerne (Beseitigung von HBM-Hin- und Rückwegübertragungen)</text>
  <text y="398" font-size="10" fill="#334155" x="70">80–90 % GPU-Auslastung</text>

  <rect x="450" y="330" width="400" height="75" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadow1)" />
  <text y="355" font-size="13" font-weight="bold" fill="#9a3412" x="470">Quantisierung</text>
  <text y="373" font-size="11" fill="#0f172a" x="470">FP8 (verlustfrei), INT8, INT4 (AWQ/GPTQ)</text>
  <text y="388" font-size="11" fill="#0f172a" x="470">Kernel-Qualität: Geschwindigkeitsunterschied von 2,6×</text>
  <text y="398" font-size="10" fill="#334155" x="470">50–75 % Reduzierung des Speicherverbrauchs</text>

  <!-- Layer 3: Memory Management -->
  <rect x="50" y="240" width="380" height="75" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow1)" />
  <text y="265" font-size="13" font-weight="bold" fill="#5b21b6" x="70">Speichermanagement</text>
  <text y="283" font-size="11" fill="#0f172a" x="70">PagedAttention (&lt;4% Ressourcenverbrauch gegenüber 60–80%)</text>
  <text y="298" font-size="11" fill="#0f172a" x="70">GQA/MQA (Verringerung des KV-Caches um das 8- bis 16-fache)</text>
  <text y="308" font-size="10" fill="#334155" x="70">2-4-fachige Steigerung der Durchsatzleistung</text>

  <rect x="450" y="240" width="400" height="75" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow1)" />
  <text y="265" font-size="13" font-weight="bold" fill="#5b21b6" x="470">Zeitplanung</text>
  <text y="283" font-size="11" fill="#0f172a" x="470">Kontinuierliches Batchen (auf Iterationsebene)</text>
  <text y="298" font-size="11" fill="#0f172a" x="470">Blockweise Vorausfüllung (+50% Durchsatz)</text>
  <text y="308" font-size="10" fill="#334155" x="470">23× im Vergleich zu naiver Batching-Verarbeitung</text>

  <!-- Layer 4: Serving Strategies -->
  <rect x="50" y="150" width="250" height="75" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow1)" />
  <text y="175" font-size="13" font-weight="bold" fill="#1d4ed8" x="70">Caching</text>
  <text y="193" font-size="11" fill="#0f172a" x="70">Präfix-Caching (Trefferquote von 87 %+)</text>
  <text y="208" font-size="11" fill="#0f172a" x="70">RadixAttention (5-fach höhere Durchsatzrate)</text>

  <rect x="320" y="150" width="260" height="75" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow1)" />
  <text y="175" font-size="13" font-weight="bold" fill="#1d4ed8" x="340">Spekulation</text>
  <text y="193" font-size="11" fill="#0f172a" x="340">Spekulative Dekodierung (1,5–3×)</text>
  <text y="208" font-size="11" fill="#0f172a" x="340">EAGLE-3 (3–6,5-fachige Geschwindigkeitssteigerung)</text>

  <rect x="600" y="150" width="250" height="75" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow1)" />
  <text y="175" font-size="13" font-weight="bold" fill="#1d4ed8" x="620">Parallelität</text>
  <text y="193" font-size="11" fill="#0f172a" x="620">TP (Innennode, NVLink)</text>
  <text y="208" font-size="11" fill="#0f172a" x="620">PP (Zwischenknoten) + DP (Skalierung)</text>

  <!-- Layer 5: Application Layer -->
  <rect x="50" y="70" width="800" height="65" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#shadow1)" />
  <text y="95" font-size="13" font-weight="bold" fill="#991b1b" x="80">Anwendungsschicht</text>
  <text y="113" font-size="11" fill="#0f172a" x="80">Modell-Routing (Kostenreduktion um 85 %) · Rate Limiting (tokenbasiert) · Überwachung (Goodput, KV-Nutzung, TTFT/TPOT)</text>
  <text y="128" font-size="10" fill="#334155" x="80">Die Kosten sinken jährlich um das Zehnfache – durch schichtweise Optimierungen entstehen sich verstärkende Vorteile</text>

  <!-- Connecting arrows -->
  <line x1="240" y1="420" x2="240" y2="405" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow1)" />
  <line x1="650" y1="420" x2="650" y2="405" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow1)" />
  <line x1="240" y1="330" x2="240" y2="315" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow1)" />
  <line x1="650" y1="330" x2="650" y2="315" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow1)" />
  <line x1="175" y1="240" x2="175" y2="225" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow1)" />
  <line x1="450" y1="240" x2="450" y2="225" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow1)" />
  <line x1="725" y1="240" x2="725" y2="225" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow1)" />
  <line x1="450" y1="150" x2="450" y2="135" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow1)" />
</svg>
