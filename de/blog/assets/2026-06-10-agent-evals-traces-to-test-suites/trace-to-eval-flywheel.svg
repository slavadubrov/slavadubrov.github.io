<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 640" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="The trace-to-eval flywheel" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">der Trace-zu-Eval-Fliehkraftkern</title>
  <defs>
    <marker id="arrFly" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2563eb" />
    </marker>
    <marker id="arrFlyBack" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#16a34a" />
    </marker>
    <filter id="shadowFly" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <text y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a" x="590">Der Trace-zu-Eval-Flywheel</text>
  <text y="57" text-anchor="middle" font-size="12" fill="#334155" x="590">Jeder diagnostizierte Produktionsfehler wird zu einem Trace, einer Kennzeichnung, einer Zeile in Dataset sowie zu einem Bewertungsfaktor, der die Kontrolle im CI-Prozess steuert</text>

  <!-- Stage 1: Production agent -->
  <rect x="40" y="110" width="200" height="110" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.6" filter="url(#shadowFly)" />
  <text y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8" x="140">1 · Produktion Agent</text>
  <text y="164" text-anchor="middle" font-size="10" fill="#334155" x="140">mit OTel ausgestattet</text>
  <text y="179" text-anchor="middle" font-size="10" fill="#334155" x="140">GenAI semconv Spans:</text>
  <text y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="140">Agent aufrufen → Chatten → Tool ausführen</text>

  <line x1="240" y1="165" x2="295" y2="165" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 2: Trace store -->
  <rect x="300" y="110" width="200" height="110" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.6" filter="url(#shadowFly)" />
  <text y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8" x="400">2 · Trace-Speicher</text>
  <text y="164" text-anchor="middle" font-size="10" fill="#334155" x="400">Langfuse / Phoenix /</text>
  <text y="179" text-anchor="middle" font-size="10" fill="#334155" x="400">LangSmith / Braintrust</text>
  <text y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="400">(oder eine JSONL-Datei zum Starten)</text>

  <line x1="500" y1="165" x2="555" y2="165" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 3: Mine failures -->
  <rect x="560" y="110" width="200" height="110" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="1.6" filter="url(#shadowFly)" />
  <text y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b" x="660">3 · Fehler bei der Minenextraktion</text>
  <text y="164" text-anchor="middle" font-size="10" fill="#334155" x="660">niedrige Bewertungen · Nutzerbeschwerden</text>
  <text y="179" text-anchor="middle" font-size="10" fill="#334155" x="660">deterministische Regeln · Judges</text>
  <text y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="660">offener Code: Lesen von 30–50 Traces</text>

  <line x1="760" y1="165" x2="815" y2="165" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 4: Cluster + label -->
  <rect x="820" y="110" width="200" height="110" rx="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.6" filter="url(#shadowFly)" />
  <text y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6" x="920">4 · Clusterung + Beschriftung</text>
  <text y="164" text-anchor="middle" font-size="10" fill="#334155" x="920">axiales Kodieren in 5–6 benannte Komponenten.</text>
  <text y="179" text-anchor="middle" font-size="10" fill="#334155" x="920">spezifische Ausfallmuster</text>
  <text y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="920">"Datumformatierungsfehler", nicht "zeitliche Probleme"</text>

  <line x1="920" y1="220" x2="920" y2="285" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 5: Dedupe / goldens -->
  <rect x="820" y="290" width="200" height="110" rx="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.6" filter="url(#shadowFly)" />
  <text y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6" x="920">5 · Doppelte Einträge entfernen</text>
  <text y="344" text-anchor="middle" font-size="10" fill="#334155" x="920">ein repräsentatives Gold-Modell</text>
  <text y="359" text-anchor="middle" font-size="10" fill="#334155" x="920">pro Cluster werden Span IDs aufbewahrt</text>
  <text y="376" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="920">in Metadaten zur Nachvollziehbarkeit</text>

  <line x1="820" y1="345" x2="765" y2="345" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 6: Versioned dataset -->
  <rect x="560" y="290" width="200" height="110" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="1.6" filter="url(#shadowFly)" />
  <text y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412" x="660">6 · Versioniertes Dataset</text>
  <text y="344" text-anchor="middle" font-size="10" fill="#334155" x="660">goldens-v1.json · v2 · v3 …</text>
  <text y="359" text-anchor="middle" font-size="10" fill="#334155" x="660">erwartete Werkzeuge + Kriterien</text>
  <text y="376" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="660">für reproduzierbare Ausführungen gesperrt</text>

  <line x1="560" y1="345" x2="505" y2="345" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFly)" />

  <!-- Stage 7: CI gate -->
  <rect x="300" y="290" width="200" height="110" rx="12" fill="#f0fdf4" stroke="#166534" stroke-width="1.6" filter="url(#shadowFly)" />
  <text y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#166534" x="400">7 · CI-Gate</text>
  <text y="344" text-anchor="middle" font-size="10" fill="#334155" x="400">DeepLearning-Testlauf bei jeder PullRequest</text>
  <text y="359" text-anchor="middle" font-size="10" fill="#334155" x="400">Fehlermetrik → fehlgeschlagene Kompilierung</text>
  <text y="376" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="400">Regressionen werden vor dem Deploy blockiert</text>

  <!-- feedback arrow back to production -->
  <path d="M 300 345 L 140 345 L 140 225" fill="none" stroke="#16a34a" stroke-width="2.2" marker-end="url(#arrFlyBack)" />
  <text y="290" font-size="10.5" font-weight="700" fill="#166534" x="148">Schiffe sicher reparieren;</text>
  <text y="305" font-size="10.5" font-weight="700" fill="#166534" x="148">neue Datenströme</text>
  <text y="320" font-size="10.5" font-weight="700" fill="#166534" x="148">der nächste Zyklus</text>

  <!-- Online lane note -->
  <rect x="40" y="450" width="1100" height="150" rx="12" fill="#ffffff" stroke="#7c3aed" stroke-width="1.4" filter="url(#shadowFly)" />
  <text y="480" font-size="13" font-weight="700" fill="#5b21b6" x="65">In Betrieb neben dem Loop: Online Evals</text>
  <text y="503" font-size="11" fill="#334155" x="65">• Beispiel für Live-Datenströme, asynchrone Bewertung mittels referenzloser Metriken (Aufgabenabschluss, benutzerdefinierte Judges) – ohne zusätzliche Latency</text>
  <text y="524" font-size="11" fill="#334155" x="65">• Alarmierung, sobald die untere Konfidenzgrenze der Bewertung einen Schwellenwert überschreitet – neue Fehlermuster gelangen in der Phase 3 in den Flywheel</text>
  <text y="545" font-size="11" fill="#334155" x="65">• Halten Sie Guardrails getrennt: inline, deterministisch, blockierend (ms) – Messung von Evals, Schutz durch Guardrails</text>
  <text y="578" font-size="10.5" font-style="italic" fill="#64748b" x="65">Der Vorteil: Produktionsfehler werden innerhalb weniger Tage zu Regressionstests, und Model-Updates werden ebenfalls innerhalb weniger Tage statt Wochen validiert.</text>
</svg>
