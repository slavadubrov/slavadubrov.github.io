<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrLvl" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#555" />
    </marker>
    <filter id="shadowLvl" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>

  <text x="590" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a2e">Drei Ebenen der Agentenbewertung</text>
  <text x="590" y="54" text-anchor="middle" font-size="12" fill="#666">End-to-End zeigt an, WAS schiefgelaufen ist · Die Trajektorie zeigt an, WO · Die Komponente zeigt an, WARUM</text>

  <!-- Level 1: end-to-end -->
  <rect x="30" y="80" width="1120" height="150" rx="12" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadowLvl)" />
  <text x="55" y="106" font-size="14" font-weight="700" fill="#2e7d32">Level 1 · End-to-End (Schwarze Box)</text>
  <text x="55" y="124" font-size="10" fill="#2e7d32">Frage: Ist die Aufgabe erfolgreich abgeschlossen?</text>

  <rect x="55" y="140" width="340" height="72" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="225" y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Aufgabenabschluss</text>
  <text x="225" y="180" text-anchor="middle" font-size="10" fill="#555">Zielerfassung unter Nutzung von LLM-Bewertungen, referenzunabhängig</text>
  <text x="225" y="195" text-anchor="middle" font-size="10" fill="#555">online einsetzbar – keine Goldausgabe erforderlich</text>

  <rect x="415" y="140" width="340" height="72" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="585" y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Ausgangswert/Bestandsbewertung</text>
  <text x="585" y="180" text-anchor="middle" font-size="10" fill="#555">Den Endzustand der Umgebung mit dem Zielzustand vergleichen</text>
  <text x="585" y="195" text-anchor="middle" font-size="10" fill="#555">robust gegenüber kreativen Alternativpfaden (τ-Bench)</text>

  <rect x="775" y="140" width="340" height="72" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="945" y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Zuverlässigkeit: bestanden^k</text>
  <text x="945" y="180" text-anchor="middle" font-size="10" fill="#555">Alle k von k Versuchen sind erfolgreich.</text>
  <text x="945" y="195" text-anchor="middle" font-size="10" fill="#555">90 % Passrate bei 1 ≈ 57 % Konsistenz bei k=8</text>

  <line x1="590" y1="234" x2="590" y2="268" stroke="#555" stroke-width="1.6" marker-end="url(#arrLvl)" />
  <text x="700" y="256" font-size="10" fill="#888" font-style="italic">Aufgabe fehlgeschlagen – aber wo?</text>

  <!-- Level 2: trajectory -->
  <rect x="30" y="275" width="1120" height="150" rx="12" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowLvl)" />
  <text x="55" y="301" font-size="14" font-weight="700" fill="#6a1b9a">Ebene 2 · Bahn (Glaskasten)</text>
  <text x="55" y="319" font-size="10" fill="#6a1b9a">Frage: War der Pfad klanglich und effizient?</text>

  <rect x="55" y="335" width="255" height="72" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1" />
  <text x="182" y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#6a1b9a">Richtigkeit des Tools</text>
  <text x="182" y="375" text-anchor="middle" font-size="10" fill="#555">deterministisch, kein Urteilsmechanismus erforderlich</text>
  <text x="182" y="390" text-anchor="middle" font-size="10" fill="#555">genaue Übereinstimmung / in dieser Reihenfolge / beliebige Reihenfolge</text>

  <rect x="330" y="335" width="255" height="72" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1" />
  <text x="457" y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#6a1b9a">Argumentkorrektheit</text>
  <text x="457" y="375" text-anchor="middle" font-size="10" fill="#555">richtes Werkzeug, falsche Parameter</text>
  <text x="457" y="390" text-anchor="middle" font-size="10" fill="#555">Prozent der korrekt ausgefüllten Schlüssel-Wert-Paare</text>

  <rect x="605" y="335" width="255" height="72" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1" />
  <text x="732" y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#6a1b9a">Effizienz und Schleifen</text>
  <text x="732" y="375" text-anchor="middle" font-size="10" fill="#555">Redundante Aufrufe · Pfadkonvergenz</text>
  <text x="732" y="390" text-anchor="middle" font-size="10" fill="#555">wiederholte identische Aufrufe = Sackgasse</text>

  <rect x="880" y="335" width="235" height="72" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1" />
  <text x="997" y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#6a1b9a">Plankonformität / Qualitätsniveau</text>
  <text x="997" y="375" text-anchor="middle" font-size="10" fill="#555">guter Plan, driftbasierte Umsetzung</text>
  <text x="997" y="390" text-anchor="middle" font-size="10" fill="#555">Genauigkeit bei mehreren Dialogrunden</text>

  <line x1="590" y1="429" x2="590" y2="463" stroke="#555" stroke-width="1.6" marker-end="url(#arrLvl)" />
  <text x="700" y="451" font-size="10" fill="#888" font-style="italic">Der Pfad ist in Schritt 3 unterbrochen – warum?</text>

  <!-- Level 3: component -->
  <rect x="30" y="470" width="1120" height="120" rx="12" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowLvl)" />
  <text x="55" y="496" font-size="14" font-weight="700" fill="#e65100">Ebene 3 · Komponente (weißer Kasten)</text>
  <text x="55" y="514" font-size="10" fill="#e65100">Frage: Welche Entscheidung, welches Tool, welcher Retriever oder welcher Sub-Agent hat versagt?</text>

  <rect x="55" y="525" width="340" height="50" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1" />
  <text x="225" y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Metriken pro Spanne</text>
  <text x="225" y="563" text-anchor="middle" font-size="10" fill="#555">Werte den einzelnen Werkzeug-/Abruf-Intervallen zuweisen</text>

  <rect x="415" y="525" width="340" height="50" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1" />
  <text x="585" y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Interpretation der Tool-Ausgabe</text>
  <text x="585" y="563" text-anchor="middle" font-size="10" fill="#555">gültige Antwort, falsche Auslesung – führt zu Korruption im nachgeschalteten System</text>

  <rect x="775" y="525" width="340" height="50" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1" />
  <text x="945" y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Fehlerzuordnung</text>
  <text x="945" y="563" text-anchor="middle" font-size="10" fill="#555">Die sichtbare Störung liegt in der Regel weiter flussabwärts vom eigentlichen Fehler.</text>
</svg>
