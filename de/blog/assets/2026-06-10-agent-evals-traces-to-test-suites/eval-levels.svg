<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="Three levels of agent evaluation with their metrics" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Drei Ebenen der Bewertung von Agent samt ihren Metriken</title>
  <defs>
    <marker id="arrLvl" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#334155" />
    </marker>
    <filter id="shadowLvl" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <text y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a" x="590">Drei Ebenen der Bewertung von Agent</text>
  <text y="54" text-anchor="middle" font-size="12" fill="#334155" x="590">End-to-End zeigt an, WAS schiefgelaufen ist · die Trajektorie zeigt an, WO · der Komponentenanalyse wird gezeigt, WARUM</text>

  <!-- Level 1: end-to-end -->
  <rect x="30" y="80" width="1120" height="150" rx="12" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowLvl)" />
  <text y="106" font-size="14" font-weight="700" fill="#166534" x="55">Level 1 · End-to-End (Schwarzes Kästchen)</text>
  <text y="124" font-size="10" fill="#166534" x="55">Frage: Ist die Aufgabe erfolgreich abgeschlossen?</text>

  <rect x="55" y="140" width="340" height="72" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="225">Aufgabenabschluss</text>
  <text y="180" text-anchor="middle" font-size="10" fill="#334155" x="225">LLM-bewertete Zielausrichtung, referenzlos</text>
  <text y="195" text-anchor="middle" font-size="10" fill="#334155" x="225">online einsetzbar – keine goldene Ausgabe erforderlich</text>

  <rect x="415" y="140" width="340" height="72" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="585">Ergebnis-/Zustandsbewertung</text>
  <text y="180" text-anchor="middle" font-size="10" fill="#334155" x="585">den endgültigen Zustand der Umgebung mit dem Zielzustand vergleichen</text>
  <text y="195" text-anchor="middle" font-size="10" fill="#334155" x="585">robust gegenüber kreativen Alternativpfaden (τ-Bench)</text>

  <rect x="775" y="140" width="340" height="72" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1" />
  <text y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="945">Zuverlässigkeit: Pass^k</text>
  <text y="180" text-anchor="middle" font-size="10" fill="#334155" x="945">Alle k von k Versuche sind erfolgreich.</text>
  <text y="195" text-anchor="middle" font-size="10" fill="#334155" x="945">90 % Passrate bei 1 Iteration ≈ 57 % Konsistenz bei k=8</text>

  <line x1="590" y1="234" x2="590" y2="268" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrLvl)" />
  <text y="256" font-size="10" fill="#64748b" font-style="italic" x="700">Die Aufgabe ist fehlgeschlagen – aber wo genau?</text>

  <!-- Level 2: trajectory -->
  <rect x="30" y="275" width="1120" height="150" rx="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowLvl)" />
  <text y="301" font-size="14" font-weight="700" fill="#5b21b6" x="55">Level 2 · Bahnverlauf (Glass-Box)</text>
  <text y="319" font-size="10" fill="#5b21b6" x="55">Frage: War der Pfad klanglich angemessen und effizient?</text>

  <rect x="55" y="335" width="255" height="72" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6" x="182">Toolkorrektheit</text>
  <text y="375" text-anchor="middle" font-size="10" fill="#334155" x="182">deterministisch, kein Judge erforderlich</text>
  <text y="390" text-anchor="middle" font-size="10" fill="#334155" x="182">exakte / in dieser Reihenfolge / beliebige Reihenfolge</text>

  <rect x="330" y="335" width="255" height="72" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6" x="457">Argumentkorrektheit</text>
  <text y="375" text-anchor="middle" font-size="10" fill="#334155" x="457">richtes Werkzeug, falsche Parameter</text>
  <text y="390" text-anchor="middle" font-size="10" fill="#334155" x="457">Prozent der korrekt ausgefüllten Schlüssel-Wert-Paare</text>

  <rect x="605" y="335" width="255" height="72" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6" x="732">Effizienz und Schleifen</text>
  <text y="375" text-anchor="middle" font-size="10" fill="#334155" x="732">Redundante Aufrufe · Pfadkonvergenz</text>
  <text y="390" text-anchor="middle" font-size="10" fill="#334155" x="732">wiederholte identische Aufrufe = Sackgasse</text>

  <rect x="880" y="335" width="235" height="72" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6" x="997">Planqualität / Konformität</text>
  <text y="375" text-anchor="middle" font-size="10" fill="#334155" x="997">guter Plan, driftende Ausführung</text>
  <text y="390" text-anchor="middle" font-size="10" fill="#334155" x="997">Über mehrere Dialogschleifen hinweg bleibende Genauigkeit</text>

  <line x1="590" y1="429" x2="590" y2="463" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrLvl)" />
  <text y="451" font-size="10" fill="#64748b" font-style="italic" x="700">Der Pfad ist in Schritt 3 unterbrochen – warum?</text>

  <!-- Level 3: component -->
  <rect x="30" y="470" width="1120" height="120" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowLvl)" />
  <text y="496" font-size="14" font-weight="700" fill="#9a3412" x="55">Ebene 3 · Komponente (Weiße Schachtel)</text>
  <text y="514" font-size="10" fill="#9a3412" x="55">Frage: Welche Entscheidung, welches Tool, welcher Retriever oder welche Unter-Agent ist fehlerhaft?</text>

  <rect x="55" y="525" width="340" height="50" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="225">Metriken pro Span</text>
  <text y="563" text-anchor="middle" font-size="10" fill="#334155" x="225">Werte den einzelnen Tool zuweisen / Retrieval Spans</text>

  <rect x="415" y="525" width="340" height="50" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="585">Interpretation der Tool-Ausgabe</text>
  <text y="563" text-anchor="middle" font-size="10" fill="#334155" x="585">gültige Antwort, falsche Auswertung – führt zu Korruption im nachgelagerten System</text>

  <rect x="775" y="525" width="340" height="50" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="945">Fehlerzuordnung</text>
  <text y="563" text-anchor="middle" font-size="10" fill="#334155" x="945">Der sichtbare Fehler tritt in der Regel weiter flussabwärts des eigentlichen Fehlers auf.</text>
</svg>
