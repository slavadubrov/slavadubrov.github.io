<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrLvl" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#555" />
    </marker>
    <filter id="shadowLvl" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>

  <text x="590" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a2e">Drei Ebenen der Agentenbewertung</text>
  <text x="590" y="54" text-anchor="middle" font-size="12" fill="#666">End-to-End zeigt, WAS schiefging · Trajektorie zeigt, WO · Komponente zeigt, WARUM</text>

  <!-- Level 1: end-to-end -->
  <rect x="30" y="80" width="1120" height="150" rx="12" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadowLvl)" />
  <text x="55" y="106" font-size="14" font-weight="700" fill="#2e7d32">Ebene 1 · End-to-End (Black Box)</text>
  <text x="55" y="124" font-size="10" fill="#2e7d32">Frage: war die Aufgabe erfolgreich?</text>

  <rect x="55" y="140" width="340" height="72" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="225" y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Aufgabenerfüllung</text>
  <text x="225" y="180" text-anchor="middle" font-size="10" fill="#555">LLM-bewertete Zieltreue, ohne Referenz</text>
  <text x="225" y="195" text-anchor="middle" font-size="10" fill="#555">online nutzbar — keine Goldausgabe nötig</text>

  <rect x="415" y="140" width="340" height="72" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="585" y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Ergebnis- / Zustandsbewertung</text>
  <text x="585" y="180" text-anchor="middle" font-size="10" fill="#555">Endzustand mit Zielzustand vergleichen</text>
  <text x="585" y="195" text-anchor="middle" font-size="10" fill="#555">robust bei kreativen Alternativpfaden (τ-bench)</text>

  <rect x="775" y="140" width="340" height="72" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1" />
  <text x="945" y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Zuverlässigkeit: pass^k</text>
  <text x="945" y="180" text-anchor="middle" font-size="10" fill="#555">alle k von k Versuchen erfolgreich</text>
  <text x="945" y="195" text-anchor="middle" font-size="10" fill="#555">90% pass@1 ≈ 57% Konsistenz bei k=8</text>

  <line x1="590" y1="234" x2="590" y2="268" stroke="#555" stroke-width="1.6" marker-end="url(#arrLvl)" />
  <text x="700" y="256" font-size="10" fill="#888" font-style="italic">Aufgabe fehlgeschlagen — aber wo?</text>

  <!-- Level 2: trajectory -->
  <rect x="30" y="275" width="1120" height="150" rx="12" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowLvl)" />
  <text x="55" y="301" font-size="14" font-weight="700" fill="#6a1b9a">Ebene 2 · Trajektorie (Glass Box)</text>
  <text x="55" y="319" font-size="10" fill="#6a1b9a">Frage: war der Pfad korrekt und effizient?</text>

  <rect x="55" y="335" width="255" height="72" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1" />
  <text x="182" y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#6a1b9a">Tool-Korrektheit</text>
  <text x="182" y="375" text-anchor="middle" font-size="10" fill="#555">deterministisch, kein Judge nötig</text>
  <text x="182" y="390" text-anchor="middle" font-size="10" fill="#555">exakte / geordnete / beliebige Übereinstimmung</text>

  <rect x="330" y="335" width="255" height="72" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1" />
  <text x="457" y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#6a1b9a">Argument-Korrektheit</text>
  <text x="457" y="375" text-anchor="middle" font-size="10" fill="#555">richtiges Tool, falsche Parameter</text>
  <text x="457" y="390" text-anchor="middle" font-size="10" fill="#555">% korrekt gefüllter Schlüssel-Wert-Paare</text>

  <rect x="605" y="335" width="255" height="72" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1" />
  <text x="732" y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#6a1b9a">Effizienz &amp; Schleifen</text>
  <text x="732" y="375" text-anchor="middle" font-size="10" fill="#555">redundante Aufrufe · Pfadkonvergenz</text>
  <text x="732" y="390" text-anchor="middle" font-size="10" fill="#555">wiederholte identische Aufrufe = Sackgasse</text>

  <rect x="880" y="335" width="235" height="72" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1" />
  <text x="997" y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#6a1b9a">Planqualität / Einhaltung</text>
  <text x="997" y="375" text-anchor="middle" font-size="10" fill="#555">guter Plan, abweichende Ausführung</text>
  <text x="997" y="390" text-anchor="middle" font-size="10" fill="#555">Mehrzug-Treue über mehrere Turns</text>

  <line x1="590" y1="429" x2="590" y2="463" stroke="#555" stroke-width="1.6" marker-end="url(#arrLvl)" />
  <text x="700" y="451" font-size="10" fill="#888" font-style="italic">Pfad brach bei Schritt 3 — aber warum?</text>

  <!-- Level 3: component -->
  <rect x="30" y="470" width="1120" height="120" rx="12" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowLvl)" />
  <text x="55" y="496" font-size="14" font-weight="700" fill="#e65100">Ebene 3 · Komponente (White Box)</text>
  <text x="55" y="514" font-size="10" fill="#e65100">Frage: welche Entscheidung, welches Tool, welcher Retriever oder Sub-Agent versagte?</text>

  <rect x="55" y="525" width="340" height="50" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1" />
  <text x="225" y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Metriken pro Span</text>
  <text x="225" y="563" text-anchor="middle" font-size="10" fill="#555">Scores an einzelne Tool- / Retrieval-Spans hängen</text>

  <rect x="415" y="525" width="340" height="50" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1" />
  <text x="585" y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Interpretation von Tool-Outputs</text>
  <text x="585" y="563" text-anchor="middle" font-size="10" fill="#555">gültige Antwort, falsch gelesen — verfälscht Folgendes</text>

  <rect x="775" y="525" width="340" height="50" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1" />
  <text x="945" y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Fehlerzuordnung</text>
  <text x="945" y="563" text-anchor="middle" font-size="10" fill="#555">sichtbarer Fehler liegt meist hinter dem eigentlichen Bug</text>
</svg>
