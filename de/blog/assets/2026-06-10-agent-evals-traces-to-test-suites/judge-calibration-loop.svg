<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Kalibrierungsschleife des Bewerters</title>
  <desc id="desc">Eine Schleife zur Kalibrierung von LLM-Bewertungsmodulen mithilfe menschlicher Labels, Anpassungen der Bewertungskriterien, Übereinstimmungsmetriken sowie Überwachung von Abweichungen.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#1d4ed8" flood-opacity="0.08" />
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#7c3aed" />
    </marker>
    <style>
      text { font-family: Inter, system-ui, sans-serif; fill: #0f172a; }
      .title { font-size: 25px; font-weight: 700; }
      .sub { font-size: 14px; fill: #334155; }
      .box-title { font-size: 16px; font-weight: 700; }
      .box-copy { font-size: 12px; fill: #1d4ed8; }
      .arrow { stroke: #7c3aed; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="1000" height="520" fill="#f8fafc" />
  <text y="42" class="title" text-anchor="middle" x="500">Den Judge als Messinstrument behandeln.</text>
  <text y="68" class="sub" text-anchor="middle" x="500">Ein nicht kalibriertes Urteilsprompt ist lediglich eine sehr zuversichtliche Meinung.</text>

  <g transform="translate(88 118)">
    <rect width="200" height="92" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
    <text y="32" class="box-title" text-anchor="middle" x="100">Menschliche Beschriftungen</text>
    <text y="56" class="box-copy" text-anchor="middle" x="100">20–50 echte Ausfälle</text>
    <text y="74" class="box-copy" text-anchor="middle" x="100">mit Gründen für Erfolg/Nichterfolg</text>
  </g>

  <g transform="translate(400 118)">
    <rect width="200" height="92" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadow)" />
    <text y="32" class="box-title" text-anchor="middle" x="100">Klassifikation</text>
    <text y="56" class="box-copy" text-anchor="middle" x="100">atomare Kriterien,</text>
    <text y="74" class="box-copy" text-anchor="middle" x="100">Beispiele mit wenigen Beispielen</text>
  </g>

  <g transform="translate(712 118)">
    <rect width="200" height="92" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)" />
    <text y="32" class="box-title" text-anchor="middle" x="100">Version für die Bewertung</text>
    <text y="56" class="box-copy" text-anchor="middle" x="100">Modell + Prompt</text>
    <text y="74" class="box-copy" text-anchor="middle" x="100">Zusammengeklebt</text>
  </g>

  <g transform="translate(712 306)">
    <rect width="200" height="92" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="2" filter="url(#shadow)" />
    <text y="32" class="box-title" text-anchor="middle" x="100">Konformitätsprüfung</text>
    <text y="56" class="box-copy" text-anchor="middle" x="100">TPR, TNR, Kappa,</text>
    <text y="74" class="box-copy" text-anchor="middle" x="100">Verteilung der Werte</text>
  </g>

  <g transform="translate(400 306)">
    <rect width="200" height="92" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
    <text y="32" class="box-title" text-anchor="middle" x="100">Verzerrungsprüfungen</text>
    <text y="56" class="box-copy" text-anchor="middle" x="100">Position, Länge,</text>
    <text y="74" class="box-copy" text-anchor="middle" x="100">Präferenz für Modellfamilie</text>
  </g>

  <g transform="translate(88 306)">
    <rect width="200" height="92" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2" filter="url(#shadow)" />
    <text y="32" class="box-title" text-anchor="middle" x="100">Driftüberwachungssystem</text>
    <text y="56" class="box-copy" text-anchor="middle" x="100">Nach dem Modell erneut überprüfen</text>
    <text y="74" class="box-copy" text-anchor="middle" x="100">oder Änderungen der Eingabeanweisung</text>
  </g>

  <path class="arrow" d="M290 164 L390 164" />
  <path class="arrow" d="M602 164 L702 164" />
  <path class="arrow" d="M812 212 L812 298" />
  <path class="arrow" d="M710 352 L612 352" />
  <path class="arrow" d="M398 352 L298 352" />
  <path class="arrow" d="M188 304 L188 220" />
  <path class="arrow" d="M290 320 C342 252, 652 252, 710 320" />
</svg>
