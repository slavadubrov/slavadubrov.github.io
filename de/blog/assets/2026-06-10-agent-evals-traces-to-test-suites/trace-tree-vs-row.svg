<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 560" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrTree" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#555" />
    </marker>
    <filter id="shadowT" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>

  <text x="590" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a2e">LLM-Evaluation gegen Agenten-Evaluation: Zeile versus Baum</text>
  <text x="590" y="54" text-anchor="middle" font-size="12" fill="#666">Ein LLM-Ausführungsvorgang entspricht einem Eingabe→Ausgabe-Paar. Eine Agenten-Ausführung ist eine Bahn, bei der jeder Schritt fehlschlagen kann.</text>

  <!-- ===== Left: LLM eval row ===== -->
  <rect x="40" y="80" width="430" height="430" rx="12" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowT)" />
  <text x="65" y="110" font-size="14" font-weight="700" fill="#1565c0">Bewertung von LLMs</text>
  <text x="65" y="128" font-size="10" fill="#1565c0">eine Zeile: Bewertung der Ausgabe im Vergleich zur Eingabe</text>

  <rect x="90" y="170" width="330" height="60" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1" />
  <text x="255" y="196" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">Eingang</text>
  <text x="255" y="214" text-anchor="middle" font-size="10" fill="#555">"Meine Bestellung A-1002 rückerstatten"</text>

  <line x1="255" y1="234" x2="255" y2="280" stroke="#555" stroke-width="1.6" marker-end="url(#arrTree)" />

  <rect x="90" y="285" width="330" height="60" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1" />
  <text x="255" y="311" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">Ausgabe</text>
  <text x="255" y="329" text-anchor="middle" font-size="10" fill="#555">"Ihre Rückerstattung wurde bearbeitet."</text>

  <line x1="255" y1="349" x2="255" y2="395" stroke="#555" stroke-width="1.6" marker-end="url(#arrTree)" />

  <rect x="90" y="400" width="330" height="70" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.2" />
  <text x="255" y="426" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Das Paar bewerten</text>
  <text x="255" y="446" text-anchor="middle" font-size="10" fill="#555">Relevanz · Treue · Korrektheit</text>
  <text x="255" y="461" text-anchor="middle" font-size="10" fill="#555">eine Metrik, eine Zahl</text>

  <!-- ===== Right: agent trajectory tree ===== -->
  <rect x="510" y="80" width="630" height="430" rx="12" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowT)" />
  <text x="535" y="110" font-size="14" font-weight="700" fill="#6a1b9a">Agentbewertung</text>
  <text x="535" y="128" font-size="10" fill="#6a1b9a">eine Baumstruktur: Planung, Toolaufrufe, Wiederholungen – Fehler werden während des Ablaufs versteckt</text>

  <!-- root -->
  <rect x="700" y="150" width="250" height="48" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.2" />
  <text x="825" y="170" text-anchor="middle" font-size="11" font-weight="700" fill="#6a1b9a">Agent aufrufen</text>
  <text x="825" y="186" text-anchor="middle" font-size="9.5" fill="#555">"Meine Bestellung A-1002 rückerstatten"</text>

  <!-- level 1: chat spans -->
  <line x1="760" y1="198" x2="640" y2="240" stroke="#555" stroke-width="1.4" marker-end="url(#arrTree)" />
  <line x1="825" y1="198" x2="825" y2="240" stroke="#555" stroke-width="1.4" marker-end="url(#arrTree)" />
  <line x1="895" y1="198" x2="1010" y2="240" stroke="#555" stroke-width="1.4" marker-end="url(#arrTree)" />

  <rect x="555" y="245" width="170" height="44" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1" />
  <text x="640" y="263" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1565c0">Chat (Plan)</text>
  <text x="640" y="279" text-anchor="middle" font-size="9.5" fill="#555">entscheidet sich, nach der Bestellung zu suchen</text>

  <rect x="740" y="245" width="170" height="44" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1" />
  <text x="825" y="263" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1565c0">Chat (Aktion)</text>
  <text x="825" y="279" text-anchor="middle" font-size="9.5" fill="#555">Überspringt Schritt der Überprüfung</text>

  <rect x="925" y="245" width="170" height="44" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1" />
  <text x="1010" y="263" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1565c0">Chat (Antwort)</text>
  <text x="1010" y="279" text-anchor="middle" font-size="9.5" fill="#555">"Rückerstattung verarbeitet"</text>

  <!-- level 2: tool spans -->
  <line x1="640" y1="289" x2="640" y2="330" stroke="#555" stroke-width="1.4" marker-end="url(#arrTree)" />
  <line x1="825" y1="289" x2="825" y2="330" stroke="#555" stroke-width="1.4" marker-end="url(#arrTree)" />

  <rect x="555" y="335" width="170" height="58" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.2" />
  <text x="640" y="356" text-anchor="middle" font-size="10.5" font-weight="700" fill="#2e7d32">Tool ausführen</text>
  <text x="640" y="372" text-anchor="middle" font-size="9.5" fill="#555">Abfrage-Reihenfolge ✓</text>
  <text x="640" y="386" text-anchor="middle" font-size="9.5" fill="#555">geliefert, 89 $</text>

  <rect x="740" y="335" width="170" height="58" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="1.4" />
  <text x="825" y="356" text-anchor="middle" font-size="10.5" font-weight="700" fill="#c62828">Tool ausführen</text>
  <text x="825" y="372" text-anchor="middle" font-size="9.5" fill="#c62828">issue_refund – erfolgreich,</text>
  <text x="825" y="386" text-anchor="middle" font-size="9.5" fill="#c62828">doch die Identität wurde nie überprüft</text>

  <!-- missing step ghost -->
  <rect x="925" y="335" width="170" height="58" rx="8" fill="none" stroke="#c62828" stroke-width="1.2" stroke-dasharray="5,4" />
  <text x="1010" y="356" text-anchor="middle" font-size="10.5" font-weight="700" fill="#c62828">Identität überprüfen</text>
  <text x="1010" y="372" text-anchor="middle" font-size="9.5" fill="#c62828">nie aufgerufen —</text>
  <text x="1010" y="386" text-anchor="middle" font-size="9.5" fill="#c62828">stiller Ausfall</text>

  <!-- verdict band -->
  <rect x="555" y="420" width="540" height="64" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.2" />
  <text x="825" y="444" text-anchor="middle" font-size="11.5" font-weight="700" fill="#e65100">Die Endausgabe sieht in jedem Fall perfekt aus.</text>
  <text x="825" y="463" text-anchor="middle" font-size="10" fill="#555">"Rückerstattung abgewickelt" gilt unabhängig von der Identitätsprüfung.</text>
  <text x="825" y="477" text-anchor="middle" font-size="10" fill="#555">Nur eine Bewertung auf Trajektorieniveau kann die beiden Ausführungen voneinander unterscheiden.</text>
</svg>
