<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">LoRAX-Anfragenpfad von der Adapterauflösung bis zur Generierung</title>
  <desc id="desc">Eine authentifizierte Anfrage liefert eine im Allowlist aufgeführte Adapter-ID. LoRAX bestimmt die Residenz, lädt den Adapter bei Bedarf, gruppiert kompatible Aufgaben zusammen, wendet den Adapter über die gemeinsame Basis Model an und streamt Tokens. Abgelehnte Identitäten sowie Artefakte folgen einem Fehlerweg.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="500" rx="22" fill="#0f172a" />
  <text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">LoRAX-Anfragenpfad</text>
  <text x="500" y="77" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#94a3b8">Die Adapter-Identität ist eine autorisierte Routing-Eingabe, keine beliebige öffentliche Eingabe</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(25 125)"><rect width="150" height="110" rx="14" fill="#1e293b" stroke="#64748b" /><text x="75" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#f8fafc">Gateway</text><text x="75" y="66" text-anchor="middle" font-size="12" fill="#cbd5e1">Tenant authentifizieren</text><text x="75" y="87" text-anchor="middle" font-size="12" fill="#94a3b8">Allowlist-Adapter</text></g>
    <text x="197" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(220 125)"><rect width="165" height="110" rx="14" fill="#5b21b6" stroke="#2563eb" /><text x="82" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#c4b5fd">Resolver</text><text x="82" y="66" text-anchor="middle" font-size="12" fill="#cbd5e1">Residenzprüfung durchführen</text><text x="82" y="87" text-anchor="middle" font-size="12" fill="#94a3b8">bei Fehlen laden</text></g>
    <text x="407" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(430 125)"><rect width="165" height="110" rx="14" fill="#9a3412" stroke="#ea580c" /><text x="82" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#fdba74">Planer</text><text x="82" y="66" text-anchor="middle" font-size="12" fill="#cbd5e1">Warteschlange nach Bereitschaft</text><text x="82" y="87" text-anchor="middle" font-size="12" fill="#94a3b8">Mischbatch erstellen</text></g>
    <text x="617" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(640 125)"><rect width="165" height="110" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="82" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">GPU Inference</text><text x="82" y="66" text-anchor="middle" font-size="12" fill="#cbd5e1">gemeinsame Basis Model</text><text x="82" y="87" text-anchor="middle" font-size="12" fill="#94a3b8">Anpasser pro Anfrage</text></g>
    <text x="827" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(850 125)"><rect width="125" height="110" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="62" y="45" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Stream</text><text x="62" y="75" text-anchor="middle" font-size="12" fill="#93c5fd">Ausgabe Tokens</text></g>

    <g transform="translate(220 315)"><rect width="585" height="105" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="292" y="33" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Beobachten Sie den Verbleibspfad für jede Anfrage.</text><text x="45" y="66" font-size="13" fill="#cbd5e1">GPU Treffer</text><text x="160" y="66" font-size="13" fill="#cbd5e1">CPU Treffer</text><text x="275" y="66" font-size="13" fill="#cbd5e1">Artifakt-Kollision</text><text x="410" y="66" font-size="13" fill="#cbd5e1">Fernfehlschuss</text><text x="45" y="88" font-size="12" fill="#94a3b8">Warteschlange der Aufzeichnungen, Last, erstes Token, Gesamtanzahl Latency sowie Grund für das Versagen.</text></g>
    <text x="500" y="465" text-anchor="middle" font-size="13" fill="#fca5a5">Unautorisierter Adapter, inkompatibles Artefakt oder Ladefehler → Ablehnung oder Verwendung eines expliziten Fallbacks</text>
  </g>
</svg>
