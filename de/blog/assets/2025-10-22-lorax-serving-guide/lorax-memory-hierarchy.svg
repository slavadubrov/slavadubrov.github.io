<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Speicherung von Adapter-Artefakten sowie Residenz von Runtime in LoRAX</title>
  <desc id="desc">Die Artefakte der entfernten oder lokalen Adapter werden im Datencache gespeichert, in der CPU-Memorie materialisiert und neben der gemeinsamen Basis Model in der GPU-Memorie platziert. Die Pfeile stellen gemessene Übergänge dar und nicht feste Latency-Angaben.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="500" rx="22" fill="#0f172a" />
  <text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Der Speicherung von Artefakten steht die Residenz von Runtime nicht gleich.</text>
  <text x="500" y="78" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#94a3b8">Die Kapazität hängt vom aktiven Arbeitsmenge sowie vom Kosten pro Übergang ab.</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(55 125)"><rect width="235" height="210" rx="16" fill="#1e293b" stroke="#64748b" stroke-width="2" /><text x="117" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#e2e8f0">Quelle des Artefakts</text><text x="28" y="82" font-size="14" fill="#cbd5e1">Hugging Face / Registry</text><text x="28" y="113" font-size="14" fill="#cbd5e1">Objekt oder Quelle aus dem Dateisystem</text><text x="28" y="144" font-size="14" fill="#cbd5e1">Integritätsdigest</text><text x="28" y="175" font-size="14" fill="#cbd5e1">Basismetadaten von Model</text></g>
    <text x="320" y="240" text-anchor="middle" font-size="28" fill="#94a3b8">→</text>
    <g transform="translate(350 125)"><rect width="235" height="210" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="117" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#93c5fd">lokaler Artefakt-Cache</text><text x="28" y="82" font-size="14" fill="#cbd5e1">Heruntergeladene Adapterdateien</text><text x="28" y="113" font-size="14" fill="#cbd5e1">Am Pfad /data installiert</text><text x="28" y="144" font-size="14" fill="#cbd5e1">Dauerhaft oder vorübergehend</text><text x="28" y="175" font-size="14" fill="#cbd5e1">Kosten einlesen und materialisieren</text></g>
    <text x="615" y="240" text-anchor="middle" font-size="28" fill="#94a3b8">→</text>
    <g transform="translate(645 125)"><rect width="300" height="210" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="150" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#93c5fd">Runtime Speicher</text><rect x="28" y="70" width="112" height="105" rx="10" fill="#1d4ed8" /><text x="84" y="101" text-anchor="middle" font-size="14" font-weight="700" fill="#93c5fd">CPU Arbeitsspeicher</text><text x="84" y="129" text-anchor="middle" font-size="12" fill="#93c5fd">abgeladen</text><text x="84" y="151" text-anchor="middle" font-size="12" fill="#93c5fd">Adapter</text><rect x="160" y="70" width="112" height="105" rx="10" fill="#166534" /><text x="216" y="101" text-anchor="middle" font-size="14" font-weight="700" fill="#86efac">GPU VRAM</text><text x="216" y="129" text-anchor="middle" font-size="12" fill="#86efac">Basiskonfiguration + aktive Konfiguration</text><text x="216" y="151" text-anchor="middle" font-size="12" fill="#86efac">Adapter + Schlüssel-Wert-Paare</text></g>

    <rect x="135" y="385" width="730" height="58" rx="12" fill="#5b21b6" stroke="#2563eb" />
    <text x="500" y="411" text-anchor="middle" font-size="14" font-weight="700" fill="#c4b5fd">Jeine Übergänge in der Arbeitslast messen.</text>
    <text x="500" y="432" text-anchor="middle" font-size="12" fill="#93c5fd">Es gilt keine feste Abfolge „Disk → RAM → GPU“ Latency, unabhängig von Größe des Adapters, Speichersystem, Netzwerk oder Hardware.</text>
  </g>
</svg>
