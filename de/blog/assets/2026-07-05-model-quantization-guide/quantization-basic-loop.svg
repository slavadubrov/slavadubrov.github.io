<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="640" viewBox="0 0 1120 640" role="img" aria-labelledby="title desc">
  <title id="title">Wie Quantisierung Werte hoher Präzision in Klassen niedriger Präzision abbildet</title>
  <desc id="desc">Ein von links nach rechts angeordnetes Diagramm, das die vollständigen Präzisionswerte, die Skalenauswahl, die ganzzahligen Intervalle, die dequantisierten Werte sowie den Fehlerbudget darstellt.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08" />
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="5" orient="auto">
      <path d="M1,2 L7,5 L1,8 Z" fill="#2563eb" stroke="#2563eb" stroke-width="1.5" stroke-linejoin="round" />
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .card { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; filter: url(#shadow); }
      .title { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 15px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; fill: #475569; }
      .label { font: 700 16px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; fill: #1e293b; }
      .text { font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; fill: #334155; }
      .code-bg { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1; }
      .mono { font: 600 13px "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; fill: #0f172a; }
      .mono-red { font: 700 13px "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; fill: #dc2626; }
      .mono-blue { font: 700 13px "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; fill: #2563eb; }
      .mono-green { font: 700 13px "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; fill: #16a34a; }
      .mono-purple { font: 700 13px "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; fill: #7c3aed; }
      .mono-orange { font: 700 13px "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; fill: #ea580c; }
      .blue-header { fill: #eff6ff; stroke: #bfdbfe; stroke-width: 1; }
      .orange-header { fill: #fff7ed; stroke: #fed7aa; stroke-width: 1; }
      .purple-header { fill: #faf5ff; stroke: #e9d5ff; stroke-width: 1; }
      .green-header { fill: #f0fdf4; stroke: #bbf7d0; stroke-width: 1; }
      .red-header { fill: #fef2f2; stroke: #fca5a5; stroke-width: 1; }
      .arrow { stroke: #2563eb; stroke-width: 2.5; fill: none; marker-end: url(#arrow); stroke-dasharray: 4 2; }
      .border-highlight { stroke: #3b82f6; stroke-width: 2; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="1120" height="640" rx="12" />

  <!-- Title and Subtitle -->
  <text class="title" x="48" y="52">Der Quantisierungs-/Dequantisierungszyklus</text>
  <text class="subtitle" x="48" y="78">Aufzeichnung der Zuordnung hochpräziser Werte zu Eimern mit geringerer Präzision sowie deren Rekonstruktion während der Inferenz.</text>

  <!-- 1. Original Weights (BF16) -->
  <g transform="translate(48 115)">
    <rect class="card" width="230" height="300" rx="8" />
    <rect class="blue-header" x="1" y="1" width="228" height="42" rx="7 7 0 0" />
    <text class="label" x="16" y="27">1. Ursprüngliche Gewichte</text>
    <text class="text" x="16" y="70">Die Gewichte beginnen als BF16 oder</text>
    <text class="text" x="16" y="88">FP32-Flottkomma-Werte auf der Festplatte.</text>

    <!-- Visual Tensor representation -->
    <rect class="code-bg" x="16" y="115" width="198" height="120" rx="6" />
    <text class="mono" x="28" y="140">FP32/BF16-Tensor:</text>
    <text class="mono-blue" x="28" y="165">[2,10; -1,20]</text>
    <text class="mono-orange" x="44" y="190">0,40<tspan fill="#334155" font-weight="normal">[, -0,80]</tspan></text>
    <text class="text" x="16" y="260">Spurwert <tspan font-weight="bold" fill="#ea580c">0,40</tspan> as it</text>
    <text class="text" x="16" y="278">geht durch die Schleife.</text>
  </g>

  <!-- Arrow 1 to 2 -->
  <path class="arrow" d="M288 265 L318 265" />

  <!-- 2. Calculate Scale (s) -->
  <g transform="translate(328 115)">
    <rect class="card" width="230" height="300" rx="8" />
    <rect class="orange-header" x="1" y="1" width="228" height="42" rx="7 7 0 0" />
    <text class="label" x="16" y="27">2. Skalierung berechnen</text>
    <text class="text" x="16" y="70">Skalierung berechnen <tspan font-style="italic" font-weight="bold">s</tspan> to map</text>
    <text class="text" x="16" y="88">Gewichte im 4-Bit-Bereich</text>
    <text class="text" x="16" y="106">von <tspan font-weight="bold">[-7, 7]</tspan> (signed INT4).</text>

    <!-- Scale Calculation Box -->
    <rect class="code-bg" x="16" y="135" width="198" height="100" rx="6" />
    <text class="mono" x="28" y="160">s = max(|x|) / q_max</text>
    <text class="mono" x="28" y="185">s = 2,10 / 7</text>
    <text class="mono-orange" x="28" y="212">s = 0,30</text>

    <text class="text" x="16" y="260">Die Skala wird zusammen mit gespeichert</text>
    <text class="text" x="16" y="278">quantisierte Gewichte.</text>
  </g>

  <!-- Arrow 2 to 3 -->
  <path class="arrow" d="M568 265 L598 265" />

  <!-- 3. Quantize & Store -->
  <g transform="translate(608 115)">
    <rect class="card" width="230" height="300" rx="8" />
    <rect class="purple-header" x="1" y="1" width="228" height="42" rx="7 7 0 0" />
    <text class="label" x="16" y="27">3. Quantisieren und speichern</text>
    <text class="text" x="16" y="70">Durch die Skalierung teilen und auf … runden</text>
    <text class="text" x="16" y="88">Nächster ganzzahliger Wert speichern.</text>

    <!-- Quantized Tensor Box -->
    <rect class="code-bg" x="16" y="115" width="198" height="120" rx="6" />
    <text class="mono" x="28" y="138">x_q = round(x / s)</text>
    <text class="mono-purple" x="28" y="162">[ 7,  -4,  1,  -3 ]</text>

    <line x1="28" y1="178" x2="200" y2="178" stroke="#cbd5e1" stroke-width="1" />

    <!-- Tracking 0.40 rounding details -->
    <text class="mono" x="28" y="196">Für 0,40:</text>
    <text class="mono" x="28" y="214">0,40 / 0,3 = 1,33 <tspan fill="#7c3aed" font-weight="bold">→ 1</tspan></text>

    <text class="text" x="16" y="260">Die Gewichte werden nun in gespeichert</text>
    <text class="text" x="16" y="278">4-Bit (75 % kleiner!).</text>
  </g>

  <!-- Arrow 3 to 4 -->
  <path class="arrow" d="M848 265 L878 265" />

  <!-- 4. Dequantize & GEMM -->
  <g transform="translate(888 115)">
    <rect class="card" width="184" height="300" rx="8" />
    <rect class="green-header" x="1" y="1" width="182" height="42" rx="7 7 0 0" />
    <text class="label" x="16" y="27">4. Dekuantisierung und GEMM</text>
    <text class="text" x="16" y="70">Auf BF16 zurückkehren, um</text>
    <text class="text" x="16" y="88">Matrixmultiplikation.</text>

    <!-- Dequantized representation -->
    <rect class="code-bg" x="16" y="115" width="152" height="120" rx="6" />
    <text class="mono" x="24" y="140">Dequantisiert:</text>
    <text class="mono-green" x="24" y="165">[ 2,1; -1,2, </text>
    <text class="mono-green" x="24" y="190">  [0,3] bis [-0,9]</text>
    <text class="text" x="24" y="215"><tspan font-weight="bold" fill="#ea580c">0,40</tspan> reconstructed as <tspan font-weight="bold" fill="#16a34a">0,30</tspan></text>

    <!-- GEMM Box -->
    <rect x="16" y="247" width="152" height="40" rx="6" fill="#16a34a" stroke="#15803d" stroke-width="1" />
    <text class="mono" x="26" y="272" fill="#ffffff">GEMM-Matrix-Multiplikation</text>
  </g>

  <!-- Bottom: The Error Budget Card -->
  <g transform="translate(48 440)">
    <rect class="card" width="1024" height="175" rx="8" />
    <rect class="red-header" x="1" y="1" width="1022" height="42" rx="7 7 0 0" />
    <text class="label" x="24" y="27">Verständnis des Fehlerrahmens und von GEMM</text>

    <!-- Columns inside error budget -->
    <text class="mono" x="24" y="70">Abrundungsrauschen:</text>
    <text class="text" x="24" y="92">Die Rundung kontinuierlicher Gewichte in diskrete Ganzzahl-Bins führt zu</text>
    <text class="text" x="24" y="110">Kleine mathematische Fehler (z. B.) <tspan fill="#ea580c" font-weight="bold">0,40 → 0,30</tspan>).</text>
    <text class="text" x="24" y="128">Symmetrische Formeln: <tspan font-family="monospace">x_q = clip(rund(x/s))</tspan> and <tspan font-family="monospace">x_approx = x_q × s</tspan>.</text>
    <text class="text" x="24" y="146">Algorithmen wie <tspan font-weight="bold">AWQ</tspan> and <tspan font-weight="bold">GPTQ</tspan> optimize scales to minimize this error.</text>

    <line x1="590" y1="50" x2="590" y2="162" stroke="#e2e8f0" stroke-width="1.5" />

    <text class="mono" x="614" y="70">Was ist GEMM?</text>
    <text class="text" x="614" y="92"><tspan font-weight="bold">GEMM</tspan> stands for <tspan font-weight="bold">Allgemeine Matrixmultiplikation</tspan>. It is the</text>
    <text class="text" x="614" y="110">Kernmathematische Operation von neuronalen Netzen</text>
    <text class="text" x="614" y="128">)<tspan font-family="monospace">Ausgabe = Aktivierungen × Gewichte</tspan>).</text>
    <text class="text" x="614" y="146">Quantisierte Modelle führen GEMM-Operationen in Echtzeit mit dequantisierten Gewichten aus.</text>
  </g>
</svg>
