<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="640" viewBox="0 0 1120 640" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Offline quantization memory is different from serving memory</title>
  <desc id="desc">A two-column comparison showing layer-by-layer offline quantization versus serving with all weights and KV cache resident.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#1d4ed8" flood-opacity="0.08"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #2563eb; stroke-width: 1.4; filter: url(#shadow); }
      .gpu { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.5; }
      .cpu { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
      .kv { fill: #faf5ff; stroke: #7c3aed; stroke-width: 1.5; }
      .ok { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.5; }
      .warn { fill: #fef2f2; stroke: #dc2626; stroke-width: 1.5; }
      .title { font-style: normal; font-weight: 700; font-size: 24px; font-family: Inter, system-ui, sans-serif; fill: #0f172a; }
      .h { font-style: normal; font-weight: 700; font-size: 18px; font-family: Inter, system-ui, sans-serif; fill: #0f172a; }
      .label { font-style: normal; font-weight: 700; font-size: 14px; font-family: Inter, system-ui, sans-serif; fill: #0f172a; }
      .text { font-style: normal; font-weight: 400; font-size: 14px; font-family: Inter, system-ui, sans-serif; fill: #334155; }
      .small { font-style: normal; font-weight: 400; font-size: 12px; font-family: Inter, system-ui, sans-serif; fill: #334155; }
      .mono { font-style: normal; font-weight: 400; font-size: 13px; font-family: SFMono-Regular, Consolas, monospace; fill: #0f172a; }
      .line { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 5 5; }
    </style>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect class="bg" width="1120" height="640"/>
  <text class="title" y="58" x="48">Two memory questions, two different answers</text>
  <text class="text" y="88" x="48">Producing a quantized checkpoint can be layer-bounded. Serving holds the checkpoint and the live KV cache.</text>

  <rect class="panel" x="58" y="130" width="480" height="430" rx="8"/>
  <text class="h" y="170" x="88">Offline quantization job</text>
  <text class="text" y="200" x="88">LLM Compressor can process text decoder layers one at a time.</text>

  <rect class="cpu" x="88" y="240" width="390" height="70" rx="8"/>
  <text class="label" y="268" x="112">CPU or disk</text>
  <text class="small" y="292" x="112">source model, dataset, offloaded layers</text>

  <rect class="gpu" x="88" y="340" width="390" height="92" rx="8"/>
  <text class="label" y="368" x="112">GPU</text>
  <text class="small" y="392" x="112">one active layer + activations + GPTQ hessian buffer</text>
  <g transform="translate(112 412)">
    <rect x="0" y="0" width="38" height="14" fill="#2563eb"/>
    <rect x="44" y="0" width="38" height="14" fill="#f1f5f9" stroke="#94a3b8"/>
    <rect x="88" y="0" width="38" height="14" fill="#f1f5f9" stroke="#94a3b8"/>
    <rect x="132" y="0" width="38" height="14" fill="#f1f5f9" stroke="#94a3b8"/>
    <rect x="176" y="0" width="38" height="14" fill="#f1f5f9" stroke="#94a3b8"/>
    <rect x="220" y="0" width="38" height="14" fill="#f1f5f9" stroke="#94a3b8"/>
  </g>

  <rect class="ok" x="88" y="470" width="390" height="54" rx="8"/>
  <text class="mono" y="502" x="112">Peak GPU ~= active block, not whole model</text>

  <line class="line" x1="560" y1="130" x2="560" y2="560"/>

  <rect class="panel" x="582" y="130" width="480" height="430" rx="8"/>
  <text class="h" y="170" x="612">Serving endpoint</text>
  <text class="text" y="200" x="612">The runtime needs the weights plus live request memory.</text>

  <rect class="gpu" x="612" y="240" width="390" height="70" rx="8"/>
  <text class="label" y="268" x="636">Quantized weights</text>
  <text class="small" y="292" x="636">all layers resident or sharded for tensor parallel serving</text>

  <rect class="kv" x="612" y="335" width="390" height="70" rx="8"/>
  <text class="label" y="363" x="636">KV cache</text>
  <text class="small" y="387" x="636">scales with context length, batch size, and layer count</text>

  <rect class="warn" x="612" y="430" width="390" height="70" rx="8"/>
  <text class="label" y="458" x="636">Runtime overhead and safety buffer</text>
  <text class="small" y="482" x="636">allocator, kernels, fragmentation, CUDA graphs, scheduler</text>

  <rect class="ok" x="612" y="520" width="390" height="40" rx="8"/>
  <text class="mono" y="546" x="636">Total ~= weights + KV + overhead + buffer</text>
</svg>
