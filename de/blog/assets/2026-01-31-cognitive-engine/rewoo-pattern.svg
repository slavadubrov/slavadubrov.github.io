<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 300" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">ReWOO-Muster</title>
  <desc id="artifact-desc">ReWOO-Muster.</desc>
  <defs>
    <linearGradient id="plannerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #2563eb" />
      <stop offset="100%" style="stop-color: #7c3aed" />
    </linearGradient>
    <linearGradient id="workerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #c4b5fd" />
      <stop offset="100%" style="stop-color: #dc2626" />
    </linearGradient>
    <linearGradient id="solverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #2563eb" />
      <stop offset="100%" style="stop-color: #2563eb" />
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="380" height="300" fill="#f8fafc" />

  <!-- Title -->
  <text y="28" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#0f172a" x="190">ReWOO-Muster</text>

  <!-- Planner Box -->
  <rect x="115" y="45" width="150" height="45" rx="8" fill="url(#plannerGrad)" filter="url(#shadow2)" />
  <text y="73" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#ffffff" x="190">Planer</text>

  <!-- LLM Label -->
  <text y="70" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" x="280">← Eine LLM-Aufruf</text>
  <text y="82" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" x="280">   Pläne für alle Tools</text>

  <!-- Arrow down to workers -->
  <path d="M190 90 L190 115" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowhead2)" />

  <!-- Parallel Execution Container -->
  <rect x="30" y="120" width="320" height="90" rx="10" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="5,3" />
  <text y="138" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" x="190">Parallele Ausführung</text>

  <!-- Worker boxes -->
  <rect x="45" y="148" width="60" height="35" rx="6" fill="url(#workerGrad)" filter="url(#shadow2)" />
  <text y="170" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#ffffff" x="75">#E1</text>

  <rect x="120" y="148" width="60" height="35" rx="6" fill="url(#workerGrad)" filter="url(#shadow2)" />
  <text y="170" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#ffffff" x="150">#E2</text>

  <rect x="195" y="148" width="60" height="35" rx="6" fill="url(#workerGrad)" filter="url(#shadow2)" />
  <text y="170" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#ffffff" x="225">#E3</text>

  <rect x="270" y="148" width="60" height="35" rx="6" fill="url(#workerGrad)" filter="url(#shadow2)" />
  <text y="170" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#ffffff" x="300">#E4</text>

  <!-- Result labels -->
  <text y="198" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#334155" x="75">[res1]</text>
  <text y="198" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#334155" x="150">[res2]</text>
  <text y="198" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#334155" x="225">[res3]</text>
  <text y="198" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#334155" x="300">[res4]</text>

  <!-- Arrow down to solver -->
  <path d="M190 210 L190 230" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowhead2)" />

  <!-- Solver Box -->
  <rect x="115" y="235" width="150" height="45" rx="8" fill="url(#solverGrad)" filter="url(#shadow2)" />
  <text y="263" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#ffffff" x="190">Löser</text>

  <!-- Solver Label -->
  <text y="260" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" x="280">← Eine LLM-Aufruf</text>
  <text y="272" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" x="280" transform="translate(-8.35 0.00)">   Ergebnisse synthetisieren</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>
</svg>
