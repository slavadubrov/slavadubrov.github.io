<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Inter, system-ui, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Marktanalyse-Agent: Architekturplanung und -umsetzung</title>
  <desc id="artifact-desc">Marktanalyse-Agent: Architekturplanung und -umsetzung.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155" />
    </marker>
    <linearGradient id="routerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #ea580c" />
      <stop offset="100%" style="stop-color: #ea580c" />
    </linearGradient>
    <linearGradient id="plannerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #2563eb" />
      <stop offset="100%" style="stop-color: #2563eb" />
    </linearGradient>
    <linearGradient id="executorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #16a34a" />
      <stop offset="100%" style="stop-color: #166534" />
    </linearGradient>
    <linearGradient id="reporterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #2563eb" />
      <stop offset="100%" style="stop-color: #7c3aed" />
    </linearGradient>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="800" height="400" fill="#f8fafc" />

  <!-- Title -->
  <text y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a" x="400">Marktanalyse-Agent: Architekturplanung und -umsetzung</text>

  <!-- START -->
  <circle cx="60" cy="200" r="25" fill="#94a3b8" />
  <text y="205" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="bold" x="60">START</text>

  <!-- Router - Diamond shape with icon -->
  <line x1="85" y1="200" x2="125" y2="200" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
  <g transform="translate(175, 200)">
    <!-- Diamond shape -->
    <polygon points="0,-40 50,0 0,40 -50,0" fill="url(#routerGrad)" stroke="#ea580c" stroke-width="1" />
    <!-- Router icon - branching arrows -->
    <path d="M-15,-8 L0,-8 L0,-18 M0,-8 L15,8 M0,-8 L-15,8" fill="none" stroke="#e2e8f0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
  </g>
  <text y="255" text-anchor="middle" font-size="11" fill="#9a3412" font-weight="bold" x="175">Router</text>

  <!-- Deep Research Path (Top) -->
  <g>
    <path d="M 210 168 L 280 120" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
    <!-- Deep label - moved to the left of the arrow path, made more visible -->
    <rect x="232" y="128" width="40" height="18" rx="4" fill="#2563eb" />
    <text y="141" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="bold" x="252">Tiefe</text>

    <!-- Planner -->
    <rect x="290" y="85" width="100" height="40" rx="8" fill="url(#plannerGrad)" />
    <text y="110" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold" x="340">Planer</text>

    <line x1="390" y1="105" x2="440" y2="105" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />

    <!-- Executor Box -->
    <rect x="450" y="60" width="150" height="90" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" />
    <text y="82" text-anchor="middle" font-size="12" fill="#166534" font-weight="bold" x="525">Ausführender Prozess</text>
    <text y="96" text-anchor="middle" font-size="9" fill="#334155" x="525">(ReAct-Agent)</text>

    <!-- Tools inside Executor -->
    <rect x="465" y="105" width="55" height="20" rx="4" fill="url(#executorGrad)" />
    <text y="119" text-anchor="middle" font-size="9" fill="#ffffff" x="492">Toolaufruf</text>
    <rect x="530" y="105" width="55" height="20" rx="4" fill="url(#executorGrad)" />
    <text y="119" text-anchor="middle" font-size="9" fill="#ffffff" x="557">Beobachten</text>

    <!-- Loop arrow on Executor -->
    <path d="M 580 135 Q 620 135 620 100 Q 620 70 580 70" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow)" />
    <text y="105" font-size="9" fill="#166534" x="635">Schleife</text>

    <line x1="600" y1="105" x2="660" y2="200" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
  </g>

  <!-- Flash Briefing Path (Bottom) - ReWOO -->
  <g>
    <path d="M 210 232 L 280 280" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
    <!-- Flash label - moved to the left of the arrow path, made more visible -->
    <rect x="232" y="252" width="42" height="18" rx="4" fill="#2563eb" />
    <text y="265" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="bold" x="253">Flash</text>

    <!-- ReWOO Planner -->
    <rect x="290" y="260" width="100" height="40" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
    <text y="278" text-anchor="middle" font-size="10" fill="#5b21b6" font-weight="bold" x="340">ReWOO</text>
    <text y="292" text-anchor="middle" font-size="10" fill="#5b21b6" font-weight="bold" x="340">Planer</text>

    <line x1="390" y1="280" x2="435" y2="280" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />

    <!-- Worker (Parallel Execution) -->
    <rect x="445" y="255" width="100" height="50" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
    <text y="278" text-anchor="middle" font-size="10" fill="#5b21b6" font-weight="bold" x="495">Arbeitseinheit</text>
    <text y="293" text-anchor="middle" font-size="9" fill="#334155" x="495">⚡ Parallel</text>

    <line x1="545" y1="280" x2="585" y2="280" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />

    <!-- Solver -->
    <rect x="595" y="260" width="80" height="40" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
    <text y="285" text-anchor="middle" font-size="10" fill="#5b21b6" font-weight="bold" x="635">Löser</text>

    <path d="M 635 260 L 680 220" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
  </g>

  <!-- Reporter -->
  <rect x="680" y="175" width="80" height="50" rx="8" fill="url(#reporterGrad)" />
  <text y="205" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="bold" x="720">Reporter</text>

  <!-- Legend -->
  <g transform="translate(30, 340)">
    <rect x="0" y="0" width="740" height="50" rx="6" fill="#f1f5f9" stroke="#e2e8f0" />
    <text y="30" font-size="11" fill="#334155" font-weight="bold" x="20">Legende:</text>

    <rect x="90" y="15" width="20" height="20" rx="4" fill="url(#routerGrad)" />
    <text y="30" font-size="10" fill="#334155" x="120">Router (Absichtsklassifizierung)</text>

    <rect x="280" y="15" width="20" height="20" rx="4" fill="url(#plannerGrad)" />
    <text y="30" font-size="10" fill="#334155" x="310">Planer (Strategie)</text>

    <rect x="430" y="15" width="20" height="20" rx="4" fill="url(#executorGrad)" />
    <text y="30" font-size="10" fill="#334155" x="460">Ausführender (Taktiken)</text>

    <rect x="580" y="15" width="20" height="20" rx="4" fill="url(#reporterGrad)" />
    <text y="30" font-size="10" fill="#334155" x="610">Reporter (Synthese)</text>
  </g>
</svg>
