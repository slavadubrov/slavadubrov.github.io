<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Checkpoint, Runtime sowie Quantization-Selektion Workflow</title>
  <desc id="desc">The Workflow beginnt mit einem Auftragsvertrag und wählt einen aus Checkpoint bei einer hochwertigen Bewertung wird überprüft, ob eine Kompatibilität gegeben ist. Runtime, misst den Speicherbedarf, vergleicht die Repräsentationen und Benchmarks Das vollständige Release-Artifact.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="480" rx="22" fill="#0f172a" /><text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Verhalten vor der Kompression auswählen</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(30 120)"><rect width="135" height="120" rx="14" fill="#1e293b" stroke="#64748b" /><text x="67" y="35" text-anchor="middle" font-size="15" font-weight="700" fill="#e2e8f0">1. Aufgabenvertrag</text><text x="67" y="68" text-anchor="middle" font-size="11" fill="#cbd5e1">Qualität • Lizenz</text><text x="67" y="89" text-anchor="middle" font-size="11" fill="#94a3b8">Schnittstelle • Kontext</text></g><text x="180" y="188" font-size="23" fill="#94a3b8">→</text>
    <g transform="translate(205 120)"><rect width="135" height="120" rx="14" fill="#5b21b6" stroke="#2563eb" /><text x="67" y="35" text-anchor="middle" font-size="15" font-weight="700" fill="#c4b5fd">2. Checkpoint</text><text x="67" y="68" text-anchor="middle" font-size="11" fill="#93c5fd">genaue Überarbeitung</text><text x="67" y="89" text-anchor="middle" font-size="11" fill="#94a3b8">hochwertige Baseline</text></g><text x="355" y="188" font-size="23" fill="#94a3b8">→</text>
    <g transform="translate(380 120)"><rect width="135" height="120" rx="14" fill="#9a3412" stroke="#ea580c" /><text x="67" y="35" text-anchor="middle" font-size="15" font-weight="700" fill="#fdba74">3. Runtime</text><text x="67" y="68" text-anchor="middle" font-size="11" fill="#fdba74">Architektur</text><text x="67" y="89" text-anchor="middle" font-size="11" fill="#94a3b8">Kernel zusammen mit Hardware</text></g><text x="530" y="188" font-size="23" fill="#94a3b8">→</text>
    <g transform="translate(555 120)"><rect width="135" height="120" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="67" y="35" text-anchor="middle" font-size="15" font-weight="700" fill="#93c5fd">4. Speicher</text><text x="67" y="68" text-anchor="middle" font-size="11" fill="#93c5fd">Weights zusammen mit KV</text><text x="67" y="89" text-anchor="middle" font-size="11" fill="#94a3b8">Arbeitsbereich + Pufferraum</text></g><text x="705" y="188" font-size="23" fill="#94a3b8">→</text>
    <g transform="translate(730 120)"><rect width="135" height="120" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="67" y="35" text-anchor="middle" font-size="15" font-weight="700" fill="#93c5fd">5. Repräsentation</text><text x="67" y="68" text-anchor="middle" font-size="11" fill="#93c5fd">Präzision / Quantisierung</text><text x="67" y="89" text-anchor="middle" font-size="11" fill="#94a3b8">Ursprungsinformationen + Hash-Wert</text></g><text x="880" y="188" font-size="23" fill="#94a3b8">→</text>
    <g transform="translate(900 120)"><rect width="75" height="120" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="37" y="35" text-anchor="middle" font-size="13" font-weight="700" fill="#93c5fd">6. Testen</text><text x="37" y="68" text-anchor="middle" font-size="10" fill="#93c5fd">Veröffentlichung</text><text x="37" y="88" text-anchor="middle" font-size="10" fill="#94a3b8">Einheit</text></g>
    <rect x="150" y="315" width="700" height="80" rx="14" fill="#991b1b" stroke="#dc2626" /><text x="500" y="347" text-anchor="middle" font-size="16" font-weight="700" fill="#fca5a5">Jeder fehlgeschlagene Prüfpunkt führt zurück zur vorherigen Auswahl.</text><text x="500" y="375" text-anchor="middle" font-size="12" fill="#fca5a5">Eine kleinere Datei stellt keine erfolgreiche Veröffentlichung dar, wenn es zu Problemen bei der Qualität, im Kontext oder bezüglich der Konkurrenzfähigkeit kommt.</text>
    <text x="500" y="444" text-anchor="middle" font-size="13" fill="#94a3b8">Benchmark die genaue Checkpoint, Konvertierung, Runtime sowie die Hardware zusammen.</text>
  </g>
</svg>
