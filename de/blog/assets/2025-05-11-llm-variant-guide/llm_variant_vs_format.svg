<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Sechs unabhängige Schichten in einem offenen Weight Model-Objekt</title>
  <desc id="desc">Ein Model-Artefakt wird durch Familie und Revision, Trainingsrolle, Architektur, numerische Repräsentation, Container und Layout sowie Runtime beschrieben. Pfeile zeigen an, dass jede Schicht die folgende einschränkt, ohne mit ihr identisch zu sein.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="500" rx="22" fill="#0f172a" /><text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Ein Model-Name kombiniert mehrere unabhängige Schichten</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(30 105)"><rect width="285" height="125" rx="15" fill="#1e293b" stroke="#64748b" /><text x="142" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#e2e8f0">1. Familie + Revision</text><text x="142" y="70" text-anchor="middle" font-size="13" fill="#cbd5e1">Weights • Tokenizer • Lizenz</text><text x="142" y="96" text-anchor="middle" font-size="12" fill="#94a3b8">Repository und Commit</text></g>
    <g transform="translate(357 105)"><rect width="285" height="125" rx="15" fill="#5b21b6" stroke="#2563eb" /><text x="142" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#c4b5fd">2. Trainingsrolle</text><text x="142" y="70" text-anchor="middle" font-size="13" fill="#93c5fd">Basissystem • Anweisung geben • Reasoning • Extrahieren</text><text x="142" y="96" text-anchor="middle" font-size="12" fill="#94a3b8">Die Beschriftungen können sich überschneiden.</text></g>
    <g transform="translate(685 105)"><rect width="285" height="125" rx="15" fill="#9a3412" stroke="#ea580c" /><text x="142" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#fdba74">3. Architektur</text><text x="142" y="70" text-anchor="middle" font-size="13" fill="#fdba74">dicht • MoE • Gesamt-/Aktivanzahl</text><text x="142" y="96" text-anchor="middle" font-size="12" fill="#94a3b8">Kernel Kompatibilität</text></g>
    <g transform="translate(30 275)"><rect width="285" height="125" rx="15" fill="#1d4ed8" stroke="#2563eb" /><text x="142" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">4. Numerische Darstellung</text><text x="142" y="70" text-anchor="middle" font-size="13" fill="#93c5fd">BF16 • FP8 • GPTQ • AWQ</text><text x="142" y="96" text-anchor="middle" font-size="12" fill="#94a3b8">Datentyp oder Quantization-Methode</text></g>
    <g transform="translate(357 275)"><rect width="285" height="125" rx="15" fill="#1d4ed8" stroke="#2563eb" /><text x="142" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">5. Container und Layout</text><text x="142" y="70" text-anchor="middle" font-size="13" fill="#93c5fd">Safetensors-Teile • GGUF</text><text x="142" y="96" text-anchor="middle" font-size="12" fill="#94a3b8">Dateien + Metadaten</text></g>
    <g transform="translate(685 275)"><rect width="285" height="125" rx="15" fill="#1d4ed8" stroke="#2563eb" /><text x="142" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">6. Runtime + Hardware</text><text x="142" y="70" text-anchor="middle" font-size="13" fill="#93c5fd">llama.cpp • vLLM • Transformer-Modelle</text><text x="142" y="96" text-anchor="middle" font-size="12" fill="#94a3b8">unterstützter Ausführungspfad</text></g>
    <text x="500" y="460" text-anchor="middle" font-size="13" fill="#94a3b8">Ain allein ein Suffix beweist weder die Qualität der Aufgabe noch die Speicherkonformität noch die Geschwindigkeit von Serving.</text>
  </g>
</svg>
