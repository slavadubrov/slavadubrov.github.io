<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="Inter, system-ui, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Pipeline für LLM als Lehrkraft: Von 70 US-Dollar für das Beschriften bis zu 0,10 US-Dollar/Stunde für die Inferenz</title>
  <desc id="artifact-desc">Pipeline für LLM als Lehrkraft: Von 70 US-Dollar für das Beschriften bis zu 0,10 US-Dollar/Stunde für die Inferenz.</desc>
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
    <marker id="arg" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#166534" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a" x="450" textLength="891.29" lengthAdjust="spacingAndGlyphs">Pipeline für LLM als Lehrkraft: Von 70 US-Dollar für das Beschriften bis zu 0,10 US-Dollar/Stunde für die Inferenz</text>

  <!-- Step 1: Raw Data -->
  <rect x="20" y="55" width="130" height="80" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" />
  <text y="82" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a" x="85">Rohdaten</text>
  <text y="100" text-anchor="middle" font-size="10" fill="#64748b" x="85">Etwa 900.000 Dokumente</text>
  <text y="115" text-anchor="middle" font-size="10" fill="#64748b" x="85">Nicht beschriftet</text>

  <line x1="150" y1="95" x2="180" y2="95" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)" />

  <!-- Step 2: LLM Annotation -->
  <rect x="185" y="55" width="140" height="80" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" />
  <text y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#5b21b6" x="255">LLM-Beschriftung</text>
  <text y="95" text-anchor="middle" font-size="10" fill="#5b21b6" x="255">Llama 3.1-70B</text>
  <text y="110" text-anchor="middle" font-size="10" fill="#5b21b6" x="255">ca. 8 Stunden</text>
  <text y="125" text-anchor="middle" font-size="10" fill="#991b1b" font-weight="bold" x="255">Kosten: ca. 70 $</text>

  <line x1="325" y1="95" x2="355" y2="95" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)" />

  <!-- Step 3: Human Review -->
  <rect x="360" y="55" width="130" height="80" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2" />
  <text y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#9a3412" x="425">Menschliche Überprüfung</text>
  <text y="95" text-anchor="middle" font-size="10" fill="#9a3412" x="425">Ton / Label Studio</text>
  <text y="110" text-anchor="middle" font-size="10" fill="#9a3412" x="425">2.714 Beispiele</text>
  <text y="125" text-anchor="middle" font-size="10" fill="#9a3412" x="425">ca. 8 Stunden</text>

  <line x1="490" y1="95" x2="520" y2="95" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)" />

  <!-- Step 4: Fine-tune -->
  <rect x="525" y="55" width="140" height="80" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d4ed8" x="595">Feinabstimmung</text>
  <text y="95" text-anchor="middle" font-size="10" fill="#1d4ed8" x="595">GLiNER / RoBERTa</text>
  <text y="110" text-anchor="middle" font-size="10" fill="#1d4ed8" x="595">90–300 M Parameter</text>
  <text y="125" text-anchor="middle" font-size="10" fill="#1d4ed8" x="595">A100, ca. 4 Stunden</text>

  <line x1="665" y1="95" x2="695" y2="95" stroke="#166534" stroke-width="2" marker-end="url(#arg)" />

  <!-- Step 5: Deploy -->
  <rect x="700" y="55" width="170" height="80" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="2" />
  <text y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#166534" x="785">Einrichten</text>
  <text y="95" text-anchor="middle" font-size="10" fill="#166534" x="785">ONNX + INT8 auf CPU</text>
  <text y="110" text-anchor="middle" font-size="10" fill="#166534" font-weight="bold" x="785">93,4 % F1</text>
  <text y="125" text-anchor="middle" font-size="10" fill="#166534" font-weight="bold" x="785">0,10 $/Stunde</text>

  <!-- Comparison bar: Before -->
  <text y="175" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a" x="450">Vergleich der Wirtschaftlichkeit (Fallstudie CFM)</text>

  <!-- LLM Direct -->
  <rect x="80" y="195" width="740" height="60" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" />
  <text y="218" font-size="12" font-weight="bold" fill="#991b1b" x="100">Direkte LLM-Infersion</text>
  <text y="238" font-size="11" fill="#991b1b" x="100">Llama 3.1-70b  |  92,7 % F1-Score  |  8 $/Stunde (4x L40S GPU)  |  ca. 1–2 Sekunden pro Abfrage</text>

  <!-- Encoder -->
  <rect x="80" y="270" width="740" height="60" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" />
  <text y="293" font-size="12" font-weight="bold" fill="#166534" x="100">Feinabgestimmter Encoder (LLM als Lehrer)</text>
  <text y="313" font-size="11" fill="#166534" x="100">GLiNER-Medium | 93,4 % F1 | 0,10 $/Stunde (CPU) | &lt;50 ms pro Abfrage | 80-mal günstiger</text>

  <!-- Arrow showing improvement -->
  <text y="355" text-anchor="middle" font-size="13" fill="#166534" font-weight="bold" x="450">Der Student übertrifft den Lehrer: +0,7 % F1 bei 80-mal geringeren Kosten</text>
  <text y="373" text-anchor="middle" font-size="11" fill="#64748b" x="450">Gesamtkosten für den Pipeline-Prozess: ca. 70 $ für das LLM-Labeln + ca. 50 $ für die Rechenleistung = insgesamt ca. 120 $ als einmalige Investition</text>
</svg>
