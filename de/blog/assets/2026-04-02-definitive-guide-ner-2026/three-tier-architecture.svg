<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Three-tier NER architecture that routes explicit spans to encoders, multi-task extraction to GLiNER 2, and reasoning-heavy cases to LLMs" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Dreistufige NER-Architektur, die explizite Spans an Encoder weiterleitet, mehrstufige Extraktionsaufgaben an GLiNER 2 und auf Reasoning-intensive Fälle an LLMs</title>
  <defs>
    <marker id="a1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
    <marker id="a2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c" />
    </marker>
    <marker id="a3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text x="440" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">Dreistufige Produktions-NER-Architektur</text>

  <!-- Input -->
  <rect x="320" y="48" width="240" height="40" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" />
  <text x="440" y="73" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f172a">Eingehende Dokumente</text>

  <!-- Router -->
  <line x1="440" y1="88" x2="440" y2="115" stroke="#94a3b8" stroke-width="2" marker-end="url(#a1)" />

  <rect x="330" y="118" width="220" height="40" rx="20" fill="#fff7ed" stroke="#ea580c" stroke-width="2" />
  <text x="440" y="143" text-anchor="middle" font-size="13" font-weight="bold" fill="#9a3412">Komplexität Router</text>

  <!-- Three routing arrows -->
  <line x1="360" y1="158" x2="170" y2="200" stroke="#2563eb" stroke-width="2" marker-end="url(#a1)" />
  <line x1="440" y1="158" x2="440" y2="200" stroke="#ea580c" stroke-width="2" marker-end="url(#a2)" />
  <line x1="520" y1="158" x2="710" y2="200" stroke="#7c3aed" stroke-width="2" marker-end="url(#a3)" />

  <!-- Routing labels -->
  <text x="240" y="182" text-anchor="middle" font-size="11" fill="#1d4ed8" font-weight="bold">Expliziter Spans</text>
  <text x="440" y="190" text-anchor="middle" font-size="11" fill="#9a3412" font-weight="bold">Mehraufgabenverarbeitung</text>
  <text x="640" y="182" text-anchor="middle" font-size="11" fill="#5b21b6" font-weight="bold">Inference oder Zuordnung</text>

  <!-- Tier 1 -->
  <rect x="30" y="205" width="280" height="185" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text x="170" y="228" text-anchor="middle" font-size="14" font-weight="bold" fill="#1d4ed8">Ebene 1: Encoder Models</text>

  <rect x="50" y="238" width="240" height="28" rx="4" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text x="170" y="257" text-anchor="middle" font-size="11" fill="#1d4ed8">GLiNER-Kreuzencoder (&lt;30 Typen)</text>

  <rect x="50" y="272" width="240" height="28" rx="4" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text x="170" y="291" text-anchor="middle" font-size="11" fill="#1d4ed8">GLiNER-Bi-Encoder (mehr als 30 Typen)</text>

  <rect x="50" y="306" width="240" height="28" rx="4" fill="#ffffff" stroke="#2563eb" stroke-width="1" />
  <text x="170" y="325" text-anchor="middle" font-size="11" fill="#1d4ed8">ONNX plus INT8 via gline-rs</text>

  <rect x="50" y="348" width="115" height="32" rx="4" fill="#f0fdf4" stroke="#166534" stroke-width="1" />
  <text x="107" y="362" text-anchor="middle" font-size="11" fill="#166534" font-weight="bold">Niedrig-Pfad-Latency</text>
  <text x="107" y="374" text-anchor="middle" font-size="11" fill="#166534">Benchmark lokal</text>

  <rect x="175" y="348" width="115" height="32" rx="4" fill="#f0fdf4" stroke="#166534" stroke-width="1" />
  <text x="232" y="362" text-anchor="middle" font-size="11" fill="#166534" font-weight="bold">zweckspezifischer F1-Wert</text>
  <text x="232" y="374" text-anchor="middle" font-size="11" fill="#166534">Menschlich beschrifteter Datensatz</text>

  <!-- Tier 2 -->
  <rect x="330" y="205" width="220" height="185" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2" />
  <text x="440" y="228" text-anchor="middle" font-size="14" font-weight="bold" fill="#9a3412">Ebene 2: GLiNER 2</text>

  <rect x="345" y="238" width="190" height="28" rx="4" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text x="440" y="257" text-anchor="middle" font-size="11" fill="#9a3412">NER</text>

  <rect x="345" y="272" width="190" height="28" rx="4" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text x="440" y="291" text-anchor="middle" font-size="11" fill="#9a3412">Klassifizierung</text>

  <rect x="345" y="306" width="190" height="28" rx="4" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text x="440" y="325" text-anchor="middle" font-size="11" fill="#9a3412">Beziehungsextraktion</text>

  <rect x="345" y="348" width="190" height="32" rx="4" fill="#f0fdf4" stroke="#166534" stroke-width="1" />
  <text x="440" y="362" text-anchor="middle" font-size="11" fill="#166534" font-weight="bold">130–208 ms auf Papier</text>
  <text x="440" y="374" text-anchor="middle" font-size="11" fill="#166534">205 M Parameter, CPU</text>

  <!-- Tier 3 -->
  <rect x="570" y="205" width="280" height="185" rx="10" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" />
  <text x="710" y="228" text-anchor="middle" font-size="14" font-weight="bold" fill="#5b21b6">Ebene 3: LLMs</text>

  <rect x="590" y="238" width="240" height="28" rx="4" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text x="710" y="257" text-anchor="middle" font-size="11" fill="#5b21b6">Instructor (Cloud APIs)</text>

  <rect x="590" y="272" width="240" height="28" rx="4" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text x="710" y="291" text-anchor="middle" font-size="11" fill="#5b21b6">Auslinien (lokaler Models)</text>

  <rect x="590" y="306" width="240" height="28" rx="4" fill="#ffffff" stroke="#7c3aed" stroke-width="1" />
  <text x="710" y="325" text-anchor="middle" font-size="11" fill="#5b21b6">Implizite Entitäten, Reasoning</text>

  <rect x="590" y="348" width="115" height="32" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1" />
  <text x="647" y="362" text-anchor="middle" font-size="11" fill="#991b1b" font-weight="bold">API oder lokaler Model</text>
  <text x="647" y="374" text-anchor="middle" font-size="11" fill="#991b1b">Höherer Latency</text>

  <rect x="715" y="348" width="115" height="32" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1" />
  <text x="772" y="362" text-anchor="middle" font-size="11" fill="#991b1b" font-weight="bold">Reasoning Pfad</text>
  <text x="772" y="374" text-anchor="middle" font-size="11" fill="#991b1b">Braucht Qualität Eval</text>

  <!-- LLM-as-teacher feedback loop -->
  <path d="M 710 390 L 710 440 L 170 440 L 170 390" fill="none" stroke="#166534" stroke-width="2" stroke-dasharray="6" marker-end="url(#a1)" />
  <rect x="340" y="428" width="200" height="24" rx="4" fill="#f0fdf4" stroke="#166534" stroke-width="1" />
  <text x="440" y="444" text-anchor="middle" font-size="11" fill="#166534" font-weight="bold">LLM-als-Lehrer Pipeline</text>

  <!-- Bottom summary -->
  <rect x="130" y="470" width="620" height="40" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1" />
  <text x="440" y="490" text-anchor="middle" font-size="11" fill="#0f172a">LLMs Beschriftung: Domänendaten → menschliche Überprüfung → Feinabstimmung der Encoder der Stufe 1</text>
  <text x="440" y="504" text-anchor="middle" font-size="11" fill="#64748b">Route nach Aufgabenanforderungen und messen Sie die Traffic-Verteilung in der Produktion</text>
</svg>
