<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 690" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Zsh-Startablauf mit Anmelde- und interaktiven Kontrollpunkten</title>
  <desc id="desc">Die Sequenz beginnt bei jeder Aufrufung mit zshenv. Ein Anmeldegate fügt zprofile hinzu, ein interaktives Gate fügt zshrc hinzu, und ein abschließendes Anmeldegate fügt zlogin hinzu. Beim Verlassen der Anmeldeshell wird zlogout ausgeführt.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#64748b" /></marker></defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="690" rx="28" fill="#0f172a" />
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Die Startreihenfolge ist eine Abfolge von Gates.</text>
  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <rect x="70" y="155" width="200" height="115" rx="18" fill="#1e293b" stroke="#64748b" stroke-width="2" />
    <text x="170" y="200" fill="#f1f5f9" font-size="21" font-weight="700">.zshenv-Datei</text><text x="170" y="235" fill="#94a3b8" font-size="15">jeder Zsh</text>
    <path d="M270 212 H320" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
    <path d="M360 155 L430 212 L360 269 L290 212 Z" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" />
    <text x="360" y="206" fill="#93c5fd" font-size="17" font-weight="700">Melden Sie sich an?</text><text x="360" y="229" fill="#93c5fd" font-size="14">ja</text>
    <path d="M430 212 H475" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
    <rect x="485" y="155" width="200" height="115" rx="18" fill="#5b21b6" />
    <text x="585" y="200" fill="#93c5fd" font-size="21" font-weight="700">.zprofile</text><text x="585" y="235" fill="#c4b5fd" font-size="15">Anmeldeeinrichtung</text>
    <path d="M685 212 H735" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
    <path d="M775 155 L845 212 L775 269 L705 212 Z" fill="#166534" stroke="#16a34a" stroke-width="2" />
    <text x="775" y="206" fill="#86efac" font-size="17" font-weight="700">interaktiv?</text><text x="775" y="229" fill="#86efac" font-size="14">ja</text>
    <path d="M845 212 H890" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
    <rect x="900" y="155" width="230" height="115" rx="18" fill="#166534" />
    <text x="1015" y="200" fill="#93c5fd" font-size="21" font-weight="700">.zshrc</text><text x="1015" y="235" fill="#93c5fd" font-size="15">interaktiver Zustand</text>

    <path d="M1015 270 V330 H775" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)" />
    <path d="M775 315 L845 372 L775 429 L705 372 Z" fill="#9a3412" stroke="#ea580c" stroke-width="2" />
    <text x="775" y="366" fill="#fdba74" font-size="17" font-weight="700">Melden Sie sich an?</text><text x="775" y="389" fill="#fdba74" font-size="14">ja</text>
    <path d="M705 372 H660" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
    <rect x="450" y="315" width="200" height="115" rx="18" fill="#9a3412" />
    <text x="550" y="360" fill="#fdba74" font-size="21" font-weight="700">.zlogin</text><text x="550" y="395" fill="#fdba74" font-size="15">Anmelden nach dem Starten</text>

    <path d="M550 430 V485" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
    <rect x="390" y="500" width="320" height="90" rx="18" fill="#1e293b" />
    <text x="550" y="536" fill="#e2e8f0" font-size="20" font-weight="700">Shell-Ausführungen</text><text x="550" y="566" fill="#94a3b8" font-size="15">„Login“ und „Exit later“ werden als .zlogout interpretiert.</text>

    <path d="M360 269 V545 H380" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)" />
    <path d="M775 269 V292 H730 V545 H720" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)" />
    <text x="318" y="300" fill="#94a3b8" font-size="14">nein: Profil überspringen</text>
    <text x="720" y="300" fill="#94a3b8" font-size="14">nein: zshrc überspringen</text>
  </g>
</svg>
