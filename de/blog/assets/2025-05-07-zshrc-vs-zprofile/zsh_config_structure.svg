<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Zsh-Startdateien, die je nach Login- und Interaktionsmodus ausgewählt werden</title>
  <desc id="desc">Eine 2×2-Matrix zeigt an, dass interaktive Login-Shells zshenv, zprofile, zshrc sowie zlogin lesen; nicht-interaktive Login-Shells zshenv, zprofile und zlogin lesen; interaktive Nicht-Login-Shells nur zshenv und zshrc lesen; sowie nicht-interaktive Nicht-Login-Shells ausschließlich zshenv lesen.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="700" rx="28" fill="#0f172a" />
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Zwei Schalter wählen die Startdateien aus</text>
  <text x="600" y="98" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="17">Das Anmelden und die Interaktivität sind unabhängige Eigenschaften</text>
  <g font-family="Inter, system-ui, sans-serif">
    <text x="420" y="145" text-anchor="middle" fill="#93c5fd" font-size="20" font-weight="700">interaktiv</text>
    <text x="900" y="145" text-anchor="middle" fill="#94a3b8" font-size="20" font-weight="700">nicht interaktiv</text>
    <text x="82" y="300" text-anchor="middle" fill="#c4b5fd" font-size="20" font-weight="700" transform="rotate(-90 82 300)">Anmelden</text>
    <text x="82" y="560" text-anchor="middle" fill="#94a3b8" font-size="20" font-weight="700" transform="rotate(-90 82 560)">Ohne Anmeldung</text>

    <g transform="translate(155 175)"><rect width="530" height="215" rx="20" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="30" y="44" fill="#93c5fd" font-size="22" font-weight="700">Anmeldung + interaktiv</text><text x="30" y="83" fill="#93c5fd" font-size="17">Typische Apple-Terminal-Leiste</text><text x="30" y="132" fill="#e2e8f0" font-size="19">.zshenv → .zprofile → .zshrc → .zlogin</text><text x="30" y="172" fill="#94a3b8" font-size="15">sowohl Anmelden als auch interaktive Konfiguration</text></g>
    <g transform="translate(715 175)"><rect width="410" height="215" rx="20" fill="#5b21b6" /><text x="30" y="44" fill="#93c5fd" font-size="22" font-weight="700">Anmeldung + nicht-interaktiv</text><text x="30" y="83" fill="#c4b5fd" font-size="17">zsh -lc „Befehl“</text><text x="30" y="132" fill="#e2e8f0" font-size="18">.zshenv → .zprofile → .zlogin</text><text x="30" y="172" fill="#94a3b8" font-size="15">kein .zshrc</text></g>
    <g transform="translate(155 425)"><rect width="530" height="215" rx="20" fill="#166534" /><text x="30" y="44" fill="#93c5fd" font-size="22" font-weight="700">Ohne Anmelden + interaktiv</text><text x="30" y="83" fill="#93c5fd" font-size="17">Verkettete zsh- oder Terminalkonfiguration</text><text x="30" y="132" fill="#e2e8f0" font-size="19">.zshenv → .zshrc</text><text x="30" y="172" fill="#94a3b8" font-size="15">kein .zprofile</text></g>
    <g transform="translate(715 425)"><rect width="410" height="215" rx="20" fill="#1e293b" /><text x="30" y="44" fill="#cbd5e1" font-size="22" font-weight="700">Auch nicht</text><text x="30" y="83" fill="#94a3b8" font-size="17">zsh -c „Befehl“</text><text x="30" y="132" fill="#e2e8f0" font-size="19">.zshenv</text><text x="30" y="172" fill="#94a3b8" font-size="15">bleiben Sie stumm und minimalistisch</text></g>
  </g>
</svg>
