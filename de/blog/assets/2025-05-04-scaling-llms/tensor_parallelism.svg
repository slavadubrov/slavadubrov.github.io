<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Partitionierung der Tensor-Parallel-Schicht</title><desc id="desc">Die Eingabe eines Layers wird auf vier Weight Partitionen verteilt. Jeder Knoten berechnet ein Teilergebnis, und eine kollektive Verarbeitung kombiniert diese Ergebnisse vor dem nächsten Layer.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#94a3b8" /></marker></defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="540" rx="28" fill="#0f172a" />
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Arbeit der Partitionierungsmatrix innerhalb jeder Schicht</text>
  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <rect x="450" y="105" width="300" height="70" rx="16" fill="#1e293b" /><text x="600" y="148" fill="#e2e8f0" font-size="19" font-weight="700">Eingangslayer X</text>
    <path d="M600 175 V205 H180 M600 205 H1020 M180 205 V235 M460 205 V235 M740 205 V235 M1020 205 V235" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#a)" />
    <g transform="translate(70 245)"><rect width="220" height="110" rx="17" fill="#1d4ed8" /><text x="110" y="44" fill="#93c5fd" font-size="18" font-weight="700">Weight Shard 0</text><text x="110" y="78" fill="#93c5fd" font-size="14">teilweiser Ausgabewert 0</text></g>
    <g transform="translate(350 245)"><rect width="220" height="110" rx="17" fill="#5b21b6" /><text x="110" y="44" fill="#93c5fd" font-size="18" font-weight="700">Weight Shard 1</text><text x="110" y="78" fill="#c4b5fd" font-size="14">teilweiser Ausgabeergebnis 1</text></g>
    <g transform="translate(630 245)"><rect width="220" height="110" rx="17" fill="#9a3412" /><text x="110" y="44" fill="#fdba74" font-size="18" font-weight="700">Weight Shard 2</text><text x="110" y="78" fill="#fdba74" font-size="14">teilweiser Ausgabeinhalt 2</text></g>
    <g transform="translate(910 245)"><rect width="220" height="110" rx="17" fill="#166534" /><text x="110" y="44" fill="#93c5fd" font-size="18" font-weight="700">Weight Shard 3</text><text x="110" y="78" fill="#93c5fd" font-size="14">teilweiser Ausgabeergebnis 3</text></g>
    <path d="M180 365 V400 H1020 V365 M460 365 V400 M740 365 V400" stroke="#94a3b8" stroke-width="3" fill="none" />
    <rect x="350" y="410" width="500" height="80" rx="17" fill="#1d4ed8" /><text x="600" y="442" fill="#93c5fd" font-size="19" font-weight="700">Layer-Collectiv</text><text x="600" y="470" fill="#93c5fd" font-size="14">Teilbereiche vor der abhängigen Berechnung kombinieren</text>
  </g>
</svg>
