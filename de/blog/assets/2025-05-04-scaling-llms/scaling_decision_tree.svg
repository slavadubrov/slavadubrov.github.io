<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 610" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Beschränkungsgeführte verteilte Skalierung Workflow</title>
  <desc id="desc">Die Workflow profilieren eine Arbeitslast, klassifizieren die Bindungskonstrainte, ordnen deren erforderliche Ressourcenzusammenstellungen der Hardware-Topologie zu, erzeugen gültige parallele Meshes und Benchmarks vollständige Layouts.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#94a3b8" /></marker></defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="610" rx="28" fill="#0f172a" />
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Beginnen Sie mit dem gemessenen Bottleneck</text>
  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <rect x="65" y="145" width="190" height="120" rx="18" fill="#1d4ed8" /><text x="160" y="188" fill="#93c5fd" font-size="19" font-weight="700">1. Profil</text><text x="160" y="220" fill="#93c5fd" font-size="14">Speicher • Kernels</text><text x="160" y="244" fill="#93c5fd" font-size="14">Kollektive • Stände</text>
    <path d="M265 205 H300" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <rect x="310" y="145" width="190" height="120" rx="18" fill="#5b21b6" /><text x="405" y="188" fill="#93c5fd" font-size="19" font-weight="700">2. Klassifizieren</text><text x="405" y="220" fill="#c4b5fd" font-size="14">Zustand • Activation</text><text x="405" y="244" fill="#c4b5fd" font-size="14">Berechnung • Datenverkehr</text>
    <path d="M510 205 H545" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <rect x="555" y="145" width="190" height="120" rx="18" fill="#9a3412" /><text x="650" y="188" fill="#fdba74" font-size="19" font-weight="700">3. Karte</text><text x="650" y="220" fill="#fdba74" font-size="14">Kollektivfrequenz</text><text x="650" y="244" fill="#fdba74" font-size="14">zur Verknüpfung der Topologie</text>
    <path d="M755 205 H790" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <rect x="800" y="145" width="190" height="120" rx="18" fill="#1d4ed8" /><text x="895" y="188" fill="#93c5fd" font-size="19" font-weight="700">4. Erzeugen</text><text x="895" y="220" fill="#93c5fd" font-size="14">gültige DP × TP × PP</text><text x="895" y="244" fill="#93c5fd" font-size="14">× CP × EP-Meshes</text>
    <path d="M1000 205 H1035" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)" />
    <rect x="1045" y="145" width="120" height="120" rx="18" fill="#166534" /><text x="1105" y="188" fill="#93c5fd" font-size="18" font-weight="700">5. Ausführen</text><text x="1105" y="220" fill="#93c5fd" font-size="14">Vollzeitaufgabe</text><text x="1105" y="244" fill="#93c5fd" font-size="14">Paritätsprüfung</text>

    <text x="600" y="340" fill="#e2e8f0" font-size="19" font-weight="700">Beschränkung → Kandidatendimension</text>
    <g font-size="15"><rect x="85" y="375" width="195" height="72" rx="15" fill="#1e293b" /><text x="182" y="405" fill="#cbd5e1">Die Replik passt – es ist ein Throughput erforderlich.</text><text x="182" y="430" fill="#93c5fd">repliziertes DP</text><rect x="295" y="375" width="195" height="72" rx="15" fill="#1e293b" /><text x="392" y="405" fill="#cbd5e1">Model-Zustand</text><text x="392" y="430" fill="#c4b5fd">FSDP / ZeRO</text><rect x="505" y="375" width="195" height="72" rx="15" fill="#1e293b" /><text x="602" y="405" fill="#cbd5e1">Layer-Mathematik</text><text x="602" y="430" fill="#fdba74">Testpunkt</text><rect x="715" y="375" width="195" height="72" rx="15" fill="#1e293b" /><text x="812" y="405" fill="#cbd5e1">Tiefe-Anordnung</text><text x="812" y="430" fill="#93c5fd">PP</text><rect x="925" y="375" width="195" height="72" rx="15" fill="#1e293b" /><text x="1022" y="405" fill="#cbd5e1">Sequenz / Experten</text><text x="1022" y="430" fill="#93c5fd">CP / EP</text></g>
    <rect x="250" y="500" width="700" height="65" rx="16" fill="#991b1b" /><text x="600" y="540" fill="#fca5a5" font-size="17" font-weight="700">Eine Heuristik schlägt Meshes vor; ausschließlich gemessene Layouts bestimmen den Gewinner.</text>
  </g>
</svg>
