    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="540" rx="28" fill="#0f172a" />
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Zustand replizieren, Batch aufteilen</text>
  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <g transform="translate(55 135)"><rect width="245" height="210" rx="20" fill="#1d4ed8" /><text x="122" y="42" fill="#93c5fd" font-size="19" font-weight="700">Rang 0</text><rect x="25" y="65" width="195" height="55" rx="12" fill="#1d4ed8" /><text x="122" y="99" fill="#93c5fd" font-size="15">Mikrobatch A</text><rect x="25" y="135" width="195" height="50" rx="12" fill="#5b21b6" /><text x="122" y="166" fill="#93c5fd" font-size="15">Vollständiger Trainingszustand</text></g>
    <g transform="translate(335 135)"><rect width="245" height="210" rx="20" fill="#1d4ed8" /><text x="122" y="42" fill="#93c5fd" font-size="19" font-weight="700">Rang 1</text><rect x="25" y="65" width="195" height="55" rx="12" fill="#1d4ed8" /><text x="122" y="99" fill="#93c5fd" font-size="15">Mikrobatch B</text><rect x="25" y="135" width="195" height="50" rx="12" fill="#5b21b6" /><text x="122" y="166" fill="#93c5fd" font-size="15">Vollständiger Trainingszustand</text></g>
    <g transform="translate(615 135)"><rect width="245" height="210" rx="20" fill="#1d4ed8" /><text x="122" y="42" fill="#93c5fd" font-size="19" font-weight="700">Rang 2</text><rect x="25" y="65" width="195" height="55" rx="12" fill="#1d4ed8" /><text x="122" y="99" fill="#93c5fd" font-size="15">Mikrobatch C</text><rect x="25" y="135" width="195" height="50" rx="12" fill="#5b21b6" /><text x="122" y="166" fill="#93c5fd" font-size="15">Vollständiger Trainingszustand</text></g>
