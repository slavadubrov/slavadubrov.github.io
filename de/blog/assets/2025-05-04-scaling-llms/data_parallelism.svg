<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Repliziertes Datenparalleltraining</title><desc id="desc">Vier Ebenen enthalten jeweils eine vollständige Trainingskopie und verarbeiten unterschiedliche Mikro-Batchs. Ihre Gradientenwerte werden vor den identischen Optimierer-Schritten mittels All-Reduce zusammengeführt.</desc>
