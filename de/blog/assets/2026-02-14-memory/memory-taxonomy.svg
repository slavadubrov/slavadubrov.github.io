<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 550" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="Memory Taxonomy" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Gedächtnistaxonomie</title>
  <defs>
    <filter id="shadowT" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a" x="550">Agent Memory Taxonomie</text>

  <!-- Root Node -->
  <rect x="465" y="55" width="170" height="40" rx="20" fill="#7c3aed" filter="url(#shadowT)" />
  <text y="81" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff" x="550">Agent Memory</text>

  <!-- Lines from root to three main branches -->
  <line x1="490" y1="95" x2="180" y2="145" stroke="#94a3b8" stroke-width="1.5" />
  <line x1="550" y1="95" x2="550" y2="145" stroke="#94a3b8" stroke-width="1.5" />
  <line x1="610" y1="95" x2="920" y2="145" stroke="#94a3b8" stroke-width="1.5" />

  <!-- Hot Memory Branch (Left: x=30-330, width=300) -->
  <rect x="30" y="145" width="300" height="50" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadowT)" />
  <text y="165" text-anchor="middle" font-size="13" font-weight="600" fill="#1d4ed8" x="180">Heißes Speichermedium</text>
  <text y="184" text-anchor="middle" font-size="10" fill="#64748b" x="180">(Session-einschränkt)</text>

  <!-- Cold Memory Branch (Center: x=400-700, width=300) -->
  <rect x="400" y="145" width="300" height="50" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadowT)" />
  <text y="165" text-anchor="middle" font-size="13" font-weight="600" fill="#9a3412" x="550">Kalte Speicherung</text>
  <text y="184" text-anchor="middle" font-size="10" fill="#64748b" x="550">(Kreuz-Session)</text>

  <!-- Document Memory Branch (Right: x=770-1070, width=300) -->
  <rect x="770" y="145" width="300" height="50" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="2" filter="url(#shadowT)" />
  <text y="165" text-anchor="middle" font-size="13" font-weight="600" fill="#166534" x="920">Dokumentenmemorie</text>
  <text y="184" text-anchor="middle" font-size="10" fill="#64748b" x="920">(Projektwissen)</text>

  <!-- Hot Memory Children: Working + Short-term -->
  <line x1="105" y1="195" x2="105" y2="230" stroke="#94a3b8" stroke-width="1" />
  <line x1="255" y1="195" x2="255" y2="230" stroke="#94a3b8" stroke-width="1" />

  <!-- Working Memory (Purple - LLM/fastest tier) -->
  <rect x="40" y="230" width="130" height="65" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowT)" />
  <text y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6" x="105">Arbeitsspeicher</text>
  <text y="265" text-anchor="middle" font-size="9" fill="#64748b" x="105">aktueller Schritt</text>
  <text y="278" text-anchor="middle" font-size="9" fill="#64748b" x="105">Tool-Argumente, LLM</text>
  <text y="291" text-anchor="middle" font-size="9" fill="#64748b" x="105">Antwortpuffer</text>

  <!-- Short-term (Checkpoints) -->
  <rect x="190" y="230" width="130" height="65" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowT)" />
  <text y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8" x="255">Kurzfristig</text>
  <text y="265" text-anchor="middle" font-size="9" fill="#64748b" x="255">Checkpoints</text>
  <text y="278" text-anchor="middle" font-size="9" fill="#64748b" x="255">Threadzustand</text>
  <text y="291" text-anchor="middle" font-size="9" fill="#64748b" x="255">Minuten-Stunden</text>

  <!-- Cold Memory Children: Episodic + Semantic -->
  <line x1="475" y1="195" x2="475" y2="230" stroke="#94a3b8" stroke-width="1" />
  <line x1="625" y1="195" x2="625" y2="230" stroke="#94a3b8" stroke-width="1" />

  <!-- Episodic -->
  <rect x="410" y="230" width="130" height="65" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowT)" />
  <text y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412" x="475">episodisch</text>
  <text y="265" text-anchor="middle" font-size="9" fill="#64748b" x="475">Vergangene Interaktionen</text>
  <text y="278" text-anchor="middle" font-size="9" fill="#64748b" x="475">Dialogprotokolle</text>
  <text y="291" text-anchor="middle" font-size="9" fill="#64748b" x="475">Tage-Monate</text>

  <!-- Semantic -->
  <rect x="560" y="230" width="130" height="65" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowT)" />
  <text y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412" x="625">semantisch</text>
  <text y="265" text-anchor="middle" font-size="9" fill="#64748b" x="625">Fakten, Wissen</text>
  <text y="278" text-anchor="middle" font-size="9" fill="#64748b" x="625">Nutzerpräferenzen</text>
  <text y="291" text-anchor="middle" font-size="9" fill="#64748b" x="625">Monate permanente Verfügbarkeit</text>

  <!-- Document Memory Children: Conventions + Research + Learnings -->
  <line x1="820" y1="195" x2="820" y2="230" stroke="#94a3b8" stroke-width="1" />
  <line x1="920" y1="195" x2="920" y2="230" stroke="#94a3b8" stroke-width="1" />
  <line x1="1020" y1="195" x2="1020" y2="230" stroke="#94a3b8" stroke-width="1" />

  <!-- Conventions -->
  <rect x="775" y="230" width="90" height="65" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowT)" />
  <text y="247" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="820">Konventionen</text>
  <text y="262" text-anchor="middle" font-size="9" fill="#64748b" x="820">Projektregeln</text>
  <text y="274" text-anchor="middle" font-size="9" fill="#64748b" x="820">Code-Stil</text>
  <text y="286" text-anchor="middle" font-size="9" fill="#64748b" x="820">Formate</text>

  <!-- Research Notes -->
  <rect x="875" y="230" width="90" height="65" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowT)" />
  <text y="247" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="920">Forschung</text>
  <text y="262" text-anchor="middle" font-size="9" fill="#64748b" x="920">Analysehinweise</text>
  <text y="274" text-anchor="middle" font-size="9" fill="#64748b" x="920">Zusammenfassungen</text>
  <text y="286" text-anchor="middle" font-size="9" fill="#64748b" x="920">Ergebnisse</text>

  <!-- Learnings -->
  <rect x="975" y="230" width="90" height="65" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowT)" />
  <text y="247" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="1020">Lernergebnisse</text>
  <text y="262" text-anchor="middle" font-size="9" fill="#64748b" x="1020">Muster</text>
  <text y="274" text-anchor="middle" font-size="9" fill="#64748b" x="1020">Fehler, die vermieden werden sollten</text>
  <text y="286" text-anchor="middle" font-size="9" fill="#64748b" x="1020">Lösungen</text>

  <!-- Procedural Memory (System-wide, separate footer bar) -->
  <rect x="30" y="325" width="1040" height="50" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadowT)" />
  <text y="345" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6" x="550">Prozedurales Gedächtnis (systemweit)</text>
  <text y="363" text-anchor="middle" font-size="10" fill="#64748b" x="550">System Prompt, Definitionen von Tools sowie Konfigurationsdateien – dauerhaft und nicht benutzerbezogen</text>

  <!-- Summary bars for each column -->
  <rect x="30" y="395" width="300" height="40" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1" />
  <text y="413" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8" x="180">Schnell | Im Prozess/Datenbank</text>
  <text y="428" text-anchor="middle" font-size="9" fill="#64748b" x="180">Millisekunden-Stunden | Session Lebensdauer</text>

  <rect x="400" y="395" width="300" height="40" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1" />
  <text y="413" text-anchor="middle" font-size="10" font-weight="600" fill="#9a3412" x="550">Suchbar | Vektor/KV-Speicher</text>
  <text y="428" text-anchor="middle" font-size="9" fill="#64748b" x="550">Tage Dauerhaftigkeit | Kreuz-Session-Rückrufrate</text>

  <rect x="770" y="395" width="300" height="40" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1" />
  <text y="413" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="920">Menschlich lesbar | Dateisystem</text>
  <text y="428" text-anchor="middle" font-size="9" fill="#64748b" x="920">Zeitlos | Git-nativ und editierbar</text>

  <!-- Access speed comparison -->
  <text y="468" font-size="10" fill="#64748b" x="30">Zugriffsgeschwindigkeit:</text>
  <rect x="130" y="455" width="940" height="20" rx="10" fill="none" stroke="#cbd5e1" stroke-width="1" />
  <rect x="131" y="456" width="235" height="18" rx="9" fill="#faf5ff" opacity="0.8" />
  <text y="470" text-anchor="middle" font-size="9" font-weight="600" fill="#5b21b6" x="248">instantan (im Arbeitsspeicher)</text>
  <rect x="366" y="456" width="235" height="18" rx="9" fill="#eff6ff" opacity="0.8" />
  <text y="470" text-anchor="middle" font-size="9" font-weight="600" fill="#1d4ed8" x="483">Schnelle Datenbank-/Datei-E/A in Millisekunden</text>
  <rect x="601" y="456" width="235" height="18" rx="9" fill="#fff7ed" opacity="0.8" />
  <text y="470" text-anchor="middle" font-size="9" font-weight="600" fill="#9a3412" x="718">Schneller (Embedding+Suche)</text>
  <rect x="836" y="456" width="233" height="18" rx="9" fill="#f0fdf4" opacity="0.8" />
  <text y="470" text-anchor="middle" font-size="9" font-weight="600" fill="#166534" x="952">Schnelle Datei-Lesegeschwindigkeit</text>

  <!-- Storage type comparison -->
  <text y="508" font-size="10" fill="#64748b" x="30">Speichertyp:</text>
  <rect x="130" y="495" width="940" height="20" rx="10" fill="none" stroke="#cbd5e1" stroke-width="1" />
  <rect x="131" y="496" width="235" height="18" rx="9" fill="#faf5ff" opacity="0.8" />
  <text y="510" text-anchor="middle" font-size="9" font-weight="600" fill="#5b21b6" x="248">Python-Dictionary</text>
  <rect x="366" y="496" width="235" height="18" rx="9" fill="#eff6ff" opacity="0.8" />
  <text y="510" text-anchor="middle" font-size="9" font-weight="600" fill="#1d4ed8" x="483">Redis/PostgreSQL</text>
  <rect x="601" y="496" width="235" height="18" rx="9" fill="#fff7ed" opacity="0.8" />
  <text y="510" text-anchor="middle" font-size="9" font-weight="600" fill="#9a3412" x="718">Qdrant/pgVector</text>
  <rect x="836" y="496" width="233" height="18" rx="9" fill="#f0fdf4" opacity="0.8" />
  <text y="510" text-anchor="middle" font-size="9" font-weight="600" fill="#166534" x="952">Markdown-/JSON-Dateien</text>
</svg>
