<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Simon Willisons tödliche Trifecta</title>
  <desc id="artifact-desc">Simon Willisons tödliche Trifecta.</desc>
  <defs>
    <filter id="shadowT" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <text y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a" x="400">Simon Willisons tödliche Trifecta</text>
  <text y="52" text-anchor="middle" font-size="11" fill="#64748b" x="400">Gleichzeitig alle drei – der Angreifer benötigt dabei keine Zusammenarbeit des Modells.</text>

  <!-- Three circles -->
  <circle cx="300" cy="240" r="150" fill="#eff6ff" fill-opacity="0.6" stroke="#2563eb" stroke-width="2" />
  <circle cx="500" cy="240" r="150" fill="#fff7ed" fill-opacity="0.6" stroke="#ea580c" stroke-width="2" />
  <circle cx="400" cy="400" r="150" fill="#fef2f2" fill-opacity="0.6" stroke="#dc2626" stroke-width="2" />

  <!-- Circle labels -->
  <text y="230" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8" x="250">Private Daten</text>
  <text y="248" text-anchor="middle" font-size="10" fill="#1d4ed8" x="250">Posteingang · Dokumente · Repositorien</text>

  <text y="230" text-anchor="middle" font-size="14" font-weight="700" fill="#9a3412" x="550">Nicht vertrauenswürdiger Inhalt</text>
  <text y="248" text-anchor="middle" font-size="10" fill="#9a3412" x="550">Web · RAG · E-Mail</text>

  <text y="470" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b" x="400">Außenkommunikation</text>
  <text y="488" text-anchor="middle" font-size="10" fill="#991b1b" x="400">Markdown · Bildabruf · Webhook</text>

  <!-- Center skull circle -->
  <circle cx="400" cy="310" r="55" fill="#7c3aed" filter="url(#shadowT)" />
  <text y="305" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff" x="400">tödlich</text>
  <text y="322" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff" x="400">Trifecta</text>

  <!-- Example incident callouts -->
  <rect x="20" y="100" width="160" height="58" rx="6" fill="#ffffff" stroke="#2563eb" />
  <text y="120" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8" x="100">EchoLeck</text>
  <text y="136" text-anchor="middle" font-size="9" fill="#334155" x="100">Posteingang + E-Mail-RAG</text>
  <text y="150" text-anchor="middle" font-size="9" fill="#334155" x="100">+ Vorschauabruf für Teams</text>

  <rect x="620" y="100" width="160" height="58" rx="6" fill="#ffffff" stroke="#ea580c" />
  <text y="120" text-anchor="middle" font-size="10" font-weight="600" fill="#9a3412" x="700">irgendwelche copilotähnlichen</text>
  <text y="136" text-anchor="middle" font-size="9" fill="#334155" x="700">Posteingang · Webabfrage</text>
  <text y="150" text-anchor="middle" font-size="9" fill="#334155" x="700">· jedes Ausgangskanal</text>

  <text y="605" text-anchor="middle" font-size="10" font-style="italic" fill="#64748b" x="400">Jeder Architekturdiagramm kann geprüft werden. Wenn alle drei Elemente vorhanden sind, handelt es sich um ein perfektes Set.</text>
</svg>
