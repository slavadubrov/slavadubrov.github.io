<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 480" style="background-color: #f8fafc; font-family: Inter, system-ui, sans-serif;" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Umsetzung der Lösung: Der Sinkhorn-Algorithmus</title>
  <desc id="artifact-desc">Umsetzung der Lösung: Der Sinkhorn-Algorithmus.</desc>
  <defs>
    <!-- Background grid -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#e2e8f0" stroke-width="0.5" />
    </pattern>

    <!-- Markers for arrows -->
    <!-- Default Orange Arrow -->
    <marker id="arrowOrange" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#ea580c" />
    </marker>

    <!-- Shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background grid layer -->
  <rect width="1050" height="480" fill="#f8fafc" />

  <!-- Top Title -->
  <text y="45" text-anchor="middle" font-size="28" font-weight="800" fill="#0f172a" x="525">Umsetzung der Lösung: Der Sinkhorn-Algorithmus</text>
  <text y="75" text-anchor="middle" font-size="16" fill="#334155" x="525">Iteratives Anwenden von Doppelstochastizität auf eine unbeschränkte Matrix.</text>

  <!-- ========================================== -->
  <!-- Step 1: Raw Matrix                         -->
  <!-- ========================================== -->
  <g transform="translate(15, 140)">
    <rect x="0" y="0" width="140" height="140" rx="12" fill="#ffffff" stroke="#334155" stroke-width="2.5" filter="url(#shadow)" />
    <text y="-12" text-anchor="middle" font-size="15" font-weight="800" fill="#0f172a" x="70">Roh-Matrix</text>

    <g font-family="SFMono-Regular, Consolas, monospace" font-size="15" fill="#0f172a" text-anchor="middle">
      <text y="40" fill="#dc2626" font-weight="700" x="25">-0,5</text> <text y="40" x="70">2.1</text> <text y="40" x="115">0,8</text>
      <text y="80" x="25">1,3</text> <text y="80" fill="#dc2626" font-weight="700" x="70">-4,0</text> <text y="80" x="115">1,9</text>
      <text y="120" x="25">0,1</text> <text y="120" x="70">0,6</text> <text y="120" fill="#dc2626" font-weight="700" x="115">-0,2</text>
    </g>
  </g>

  <!-- Arrow 1: Exp() -->
  <g transform="translate(165, 210)">
    <rect x="0" y="-15" width="60" height="30" rx="15" fill="#ea580c" />
    <text y="5" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff" x="30">Exp-Funktion</text>
    <line x1="60" y1="0" x2="72" y2="0" stroke="#ea580c" stroke-width="3" marker-end="url(#arrowOrange)" />
  </g>

  <!-- ========================================== -->
  <!-- Step 2: Positivity                         -->
  <!-- ========================================== -->
  <g transform="translate(245, 140)">
    <rect x="0" y="0" width="140" height="140" rx="12" fill="#ffffff" stroke="#166534" stroke-width="2.5" filter="url(#shadow)" />
    <text y="-12" text-anchor="middle" font-size="15" font-weight="800" fill="#166534" x="70">Positivität</text>

    <g font-family="SFMono-Regular, Consolas, monospace" font-size="15" fill="#166534" text-anchor="middle">
      <text y="40" x="25">0,6</text>   <text y="40" x="70">7,9</text>   <text y="40" x="115">2,2</text>
      <text y="80" x="25">3,7</text>   <text y="80" x="70">0,02</text>  <text y="80" x="115">6,7</text>
      <text y="120" x="25">1,1</text>  <text y="120" x="70">1,8</text>  <text y="120" x="115">0,8</text>
    </g>

    <g font-size="12" font-weight="800" fill="#ea580c" text-anchor="start">
      <text y="40" x="145">Σ=10,7</text>
      <text y="80" x="145">Σ=10,4</text>
      <text y="120" x="145">Σ=3,7</text>
    </g>
  </g>

  <!-- Arrow 2: Normalize Rows -->
  <g transform="translate(445, 210)">
    <rect x="-5" y="-20" width="80" height="40" rx="20" fill="#ea580c" />
    <text y="-3" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff" x="35">Normalisieren</text>
    <text y="13" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff" x="35">Zeilen</text>
    <line x1="75" y1="0" x2="87" y2="0" stroke="#ea580c" stroke-width="3" marker-end="url(#arrowOrange)" />
  </g>

  <!-- ========================================== -->
  <!-- Step 3: Row Normalized                     -->
  <!-- ========================================== -->
  <g transform="translate(540, 140)">
    <rect x="0" y="0" width="140" height="140" rx="12" fill="#ffffff" stroke="#1d4ed8" stroke-width="2.5" filter="url(#shadow)" />
    <text y="-12" text-anchor="middle" font-size="15" font-weight="800" fill="#1d4ed8" x="70">Zeile normalisiert</text>

    <g font-family="SFMono-Regular, Consolas, monospace" font-size="14" fill="#1e293b" text-anchor="middle">
      <text y="40" x="25">0,25</text>  <text y="40" x="70">0,65</text>  <text y="40" x="115">0,10</text>
      <text y="80" x="25">0,35</text>  <text y="80" x="70">0,01</text>  <text y="80" x="115">0,64</text>
      <text y="120" x="25">0,30</text>  <text y="120" x="70">0,45</text>  <text y="120" x="115">0,25</text>
    </g>

    <!-- Row sums OUTSIDE box -->
    <g font-size="12" font-weight="800" fill="#166534" text-anchor="start">
      <text y="40" x="145">Σ=1,0</text>
      <text y="80" x="145">Σ=1,0</text>
      <text y="120" x="145">Σ=1,0</text>
    </g>

    <!-- Column sums BELOW box -->
    <g font-size="12" font-weight="800" fill="#ea580c" text-anchor="middle">
      <text y="160" x="25">Σ=0,9</text>
      <text y="160" x="70">Σ=1,11</text>
      <text y="160" x="115">Σ=0,99</text>
    </g>
  </g>

  <!-- Arrow 3: Normalize Cols -->
  <g transform="translate(740, 210)">
    <rect x="-5" y="-20" width="80" height="40" rx="20" fill="#ea580c" />
    <text y="-3" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff" x="35">Normalisieren</text>
    <text y="13" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff" x="35">Spalten</text>
    <line x1="75" y1="0" x2="87" y2="0" stroke="#ea580c" stroke-width="3" marker-end="url(#arrowOrange)" />
  </g>

  <!-- ========================================== -->
  <!-- Step 4: Doubly Stochastic Matrix           -->
  <!-- ========================================== -->
  <g transform="translate(835, 140)">
    <rect x="0" y="0" width="140" height="140" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="3" filter="url(#shadow)" />
    <text y="-12" text-anchor="middle" font-size="15" font-weight="800" fill="#166534" x="70">Zweifach stochastisch</text>

    <g font-family="SFMono-Regular, Consolas, monospace" font-size="14" fill="#166534" font-weight="700" text-anchor="middle">
      <text y="40" x="25">0,28</text>  <text y="40" x="70">0,45</text>  <text y="40" x="115">0,27</text>
      <text y="80" x="25">0,40</text>  <text y="80" x="70">0,09</text>  <text y="80" x="115">0,51</text>
      <text y="120" x="25">0,32</text>  <text y="120" x="70">0,46</text>  <text y="120" x="115">0,22</text>
    </g>

    <!-- Final Row sums OUTSIDE box -->
    <g font-size="12" font-weight="800" fill="#166534" text-anchor="start">
      <text y="40" x="145">→ 1,0</text>
      <text y="80" x="145">→ 1,0</text>
      <text y="120" x="145">→ 1,0</text>
    </g>

    <!-- Final Column sums BELOW box -->
    <g font-size="12" font-weight="800" fill="#166534" text-anchor="middle">
      <text y="160" x="25">↓ 1,0</text>
      <text y="160" x="70">↓ 1,0</text>
      <text y="160" x="115">↓ 1,0</text>
    </g>
  </g>

  <!-- ========================================== -->
  <!-- Iteration Loop                             -->
  <!-- ========================================== -->
  <!-- Starts below Box 4 (x=905, y=320) and loops to Arrow 2 (x=480, y=240) -->
  <path d="M 905 320 Q 905 375 690 375 Q 480 375 480 245" fill="none" stroke="#ea580c" stroke-width="2.5" stroke-dasharray="6,5" marker-end="url(#arrowOrange)" />

  <g transform="translate(690, 375)">
    <rect x="-85" y="-14" width="170" height="28" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" />
    <text y="5" text-anchor="middle" font-size="12" font-weight="800" fill="#9a3412" x="0">Wiederholen Sie dies t Mal (t ≈ 20)</text>
  </g>

  <!-- ========================================== -->
  <!-- Bottom Explanation Card                    -->
  <!-- ========================================== -->
  <g transform="translate(50, 420)">
    <rect x="0" y="0" width="950" height="44" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)" />
    <text y="27" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a" x="475" textLength="1039.84" lengthAdjust="spacingAndGlyphs" transform="translate(0.00 0.00)">Der Sinkhorn-Knopp-Algorithmus ist rechenintensiv effizient: <tspan font-weight="500" fill="#334155">Erlaubt die Anwendung dieser Beschränkung während des Trainings, ohne den Pipeline-Fluss zu blockieren.</tspan></text>
  </g>

</svg>
