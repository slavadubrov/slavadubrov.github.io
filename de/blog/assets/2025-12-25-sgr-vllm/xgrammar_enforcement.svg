<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">xgrammar: Wo das Maskieren im Inferenz-Pipeline stattfindet</title>
  <desc id="artifact-desc">xgrammar: Wo das Maskieren im Inferenz-Pipeline stattfindet.</desc>
  <defs>
    <linearGradient id="gpuGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #166534;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="xgrammarGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #ea580c;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #ea580c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="samplingGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #2563eb;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a" />
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c" />
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="900" height="600" fill="#0f172a" />

  <!-- Title -->
  <text y="35" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="bold" fill="#f8fafc" text-anchor="middle" x="450">xgrammar: Wo das Maskieren im Inferenz-Pipeline stattfindet</text>

  <!-- Step labels -->
  <text y="65" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#334155" text-anchor="middle" x="450">Die Maske wird nach dem Forward-Pass und vor dem Sampling angewendet.</text>

  <!-- Pipeline flow - horizontal -->
  <g transform="translate(30, 100)">

    <!-- Step 1: Input Tokens -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="120" height="70" rx="10" fill="#1e293b" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)" />
      <text y="25" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#cbd5e1" text-anchor="middle" x="60">Schritt 1</text>
      <text y="45" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#f8fafc" text-anchor="middle" x="60">Eingabetoken</text>
      <text y="60" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#334155" text-anchor="middle" x="60">[1, 234, 56, ...]</text>
    </g>

    <!-- Arrow 1 -->
    <path d="M125,35 L155,35" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrowGreen)" />

    <!-- Step 2: GPU Forward Pass -->
    <g transform="translate(160, 0)">
      <rect x="0" y="0" width="180" height="70" rx="10" fill="url(#gpuGrad)" filter="url(#shadow)" />
      <text y="20" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#86efac" text-anchor="middle" x="90">Schritt 2 (GPU)</text>
      <text y="40" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#f8fafc" text-anchor="middle" x="90">🖥️ Vorwärtsübertragung</text>
      <text y="58" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#86efac" text-anchor="middle" x="90">Das Modell berechnet alle 128K Logits.</text>
    </g>

    <!-- Arrow 2 -->
    <path d="M345,35 L375,35" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrowGreen)" />

    <!-- Step 3: Raw Logits -->
    <g transform="translate(380, 0)">
      <rect x="0" y="0" width="120" height="70" rx="10" fill="#1e293b" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)" />
      <text y="20" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#cbd5e1" text-anchor="middle" x="60">Ausgabe</text>
      <text y="40" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#f8fafc" text-anchor="middle" x="60">Roh-Logits</text>
      <text y="58" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#334155" text-anchor="middle" x="60">[2,1; -0,5; 3,8...]</text>
    </g>

    <!-- Arrow 3 -->
    <path d="M505,35 L535,35" stroke="#ea580c" stroke-width="3" fill="none" marker-end="url(#arrowOrange)" />

    <!-- Step 4: xgrammar Logits Processor (THE KEY STEP) -->
    <g transform="translate(540, -15)">
      <rect x="0" y="0" width="180" height="100" rx="12" fill="url(#xgrammarGrad)" stroke="#ea580c" stroke-width="3" filter="url(#shadow)" />
      <text y="22" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#fdba74" text-anchor="middle" x="90">Schritt 3 (CPU)</text>
      <text y="42" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#f8fafc" text-anchor="middle" x="90">⚙️ xgrammar</text>
      <text y="60" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#fdba74" text-anchor="middle" x="90">Logit-Verarbeitungseinheit</text>
      <text y="82" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#fdba74" text-anchor="middle" x="90">Ungültige Token → -∞</text>
    </g>

    <!-- Arrow 4 -->
    <path d="M725,35 L755,35" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrowBlue)" />

    <!-- Step 5: Sampling -->
    <g transform="translate(760, 0)">
      <rect x="0" y="0" width="110" height="70" rx="10" fill="url(#samplingGrad)" filter="url(#shadow)" />
      <text y="20" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#93c5fd" text-anchor="middle" x="55">Schritt 4</text>
      <text y="40" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#f8fafc" text-anchor="middle" x="55">Probenahme</text>
      <text y="58" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#93c5fd" text-anchor="middle" x="55">Temperatur, Top-P</text>
    </g>
  </g>

  <!-- Detail box: What xgrammar does -->
  <g transform="translate(30, 210)">
    <rect x="0" y="0" width="420" height="180" rx="12" fill="#1e293b" stroke="#ea580c" stroke-width="2" filter="url(#shadow)" />
    <text y="28" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#fdba74" text-anchor="middle" x="210">Was xgrammar leistet (zwischen den Schritten 2 → 4)</text>

    <line x1="20" y1="45" x2="400" y2="45" stroke="#94a3b8" stroke-width="1" />

    <!-- Before -->
    <text y="70" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#cbd5e1" x="20">Roh-Logits vom GPU:</text>
    <rect x="20" y="80" width="180" height="35" rx="4" fill="#0f172a" stroke="#94a3b8" stroke-width="1" />
    <text y="100" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#cbd5e1" x="30">"true":3,2  "15":2,8  "hello":4,1</text>

    <!-- After -->
    <text y="70" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#cbd5e1" x="220">Nach der xgrammar-Maske:</text>
    <rect x="220" y="80" width="180" height="35" rx="4" fill="#0f172a" stroke="#94a3b8" stroke-width="1" />
    <text y="100" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#86efac" x="230">"wahr":</text>
    <text y="100" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#fca5a5" x="275">−∞</text>
    <text y="100" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#86efac" x="295">"15":2,8  "Hallo":</text>
    <text y="100" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#fca5a5" x="381">-∞</text>

    <!-- Explanation -->
    <text y="140" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">In einem Fließkommafeld sind nur Ziffern zulässig.</text>
    <text y="158" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">"hello" und "true" erhalten eine Wahrscheinlichkeit von 0 (Logit = -∞).</text>
    <text y="176" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#86efac" x="20">„15“ wurde ausgewählt, da es der höchste gültige Logit-Wert ist.</text>
  </g>

  <!-- Detail box: Two-phase process -->
  <g transform="translate(470, 210)">
    <rect x="0" y="0" width="400" height="180" rx="12" fill="#1e293b" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
    <text y="28" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#93c5fd" text-anchor="middle" x="200">xgrammar Zwei-Phasen-Architektur</text>

    <line x1="20" y1="45" x2="380" y2="45" stroke="#94a3b8" stroke-width="1" />

    <!-- Phase 1 -->
    <text y="70" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#93c5fd" x="20">Phase 1: Grammatik-Kompilierung (einmalig)</text>
    <text y="90" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#cbd5e1" x="30">• JSON Schema → kontextfreie Grammatik</text>
    <text y="105" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#cbd5e1" x="30">• Pushdown-Automat konstruieren (mit Verarbeitung von Nesting)</text>
    <text y="120" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#cbd5e1" x="30">• 99 % der Token-Masken im Voraus berechnen → in Cache speichern</text>

    <!-- Phase 2 -->
    <text y="145" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#93c5fd" x="20">Phase 2: Erstellung der Laufzeit-Maske (pro Token)</text>
    <text y="165" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#cbd5e1" x="30" transform="translate(-25.29 0.00)">• Abfrage der im Cache gespeicherten Masken + Überprüfung kontextabhängiger Token</text>
    <text y="180" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#cbd5e1" x="30">• Bitmask auf die Logits vor Ort anwenden (C++, schnell)</text>
  </g>

  <!-- Bottom: Key insight -->
  <g transform="translate(30, 420)">
    <rect x="0" y="0" width="840" height="160" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />

    <text y="30" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#93c5fd" text-anchor="middle" x="420">💡 Schlüsselerkenntnis: Post-Forward, Prä-Sampling</text>

    <line x1="40" y1="50" x2="800" y2="50" stroke="#2563eb" stroke-width="1" />

    <!-- Three columns -->
    <g transform="translate(40, 65)">
      <rect x="0" y="0" width="240" height="75" rx="8" fill="#1d4ed8" stroke="#2563eb" stroke-width="1" />
      <text y="25" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#93c5fd" text-anchor="middle" x="120">Modell unverändert</text>
      <text y="45" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" text-anchor="middle" x="120">Der Forward-Pass der GPU ist</text>
      <text y="60" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" text-anchor="middle" x="120">genau wie ohne Einschränkungen</text>
    </g>

    <g transform="translate(300, 65)">
      <rect x="0" y="0" width="240" height="75" rx="8" fill="#1d4ed8" stroke="#2563eb" stroke-width="1" />
      <text y="25" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#93c5fd" text-anchor="middle" x="120">Parallele Ausführung</text>
      <text y="45" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" text-anchor="middle" x="120">Maske für Token N berechnet</text>
      <text y="60" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" text-anchor="middle" x="120">während die GPU den Token N+1 berechnet</text>
    </g>

    <g transform="translate(560, 65)">
      <rect x="0" y="0" width="240" height="75" rx="8" fill="#1d4ed8" stroke="#2563eb" stroke-width="1" />
      <text y="25" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#93c5fd" text-anchor="middle" x="120">Nahe-null Betriebskosten</text>
      <text y="45" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" text-anchor="middle" x="120">Die Anwendung der C++-Maske dauert</text>
      <text y="60" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" text-anchor="middle" x="120">Mikrosekunden versus Millisekunden bei der Vorwärtsberechnung</text>
    </g>
  </g>
</svg>
