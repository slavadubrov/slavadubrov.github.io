<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Dort tritt eine XGrammar Token-Maske in die Dekodierschleife ein</title>
  <desc id="desc">Der Model berechnet die rohen Logits-Werte, XGrammar maskiert Tokens, die das Schema nicht fortsetzen können, das Sampling wählt aus den verbleibenden Tokens aus, und der Matcher macht einen Schritt vorwärts. Eine Anmerkung macht klar, dass die Maske lediglich die Form gewährleistet und nicht die Korrektheit.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#64748b" /></marker></defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="520" rx="22" fill="#0f172a" />
  <text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Constrained Decoding: Post-Forward-Verfahren, Prä-Sampling</text>
  <text x="500" y="76" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#94a3b8">Der Model bewertet die Tokens; die Grammatik bestimmt, welche Fortsetzungen weiterhin in Betracht kommen</text>

  <g transform="translate(35 125)">
    <rect width="180" height="105" rx="14" fill="#166534" stroke="#16a34a" stroke-width="2" />
    <text x="90" y="39" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#86efac">Model Vorwärtspropagierung</text>
    <text x="90" y="68" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#86efac">GPU führt Berechnungen durch</text>
    <text x="90" y="87" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#86efac">rohe Vokabellogits</text>
  </g>
  <path d="M225 177 H270" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <g transform="translate(285 125)">
    <rect width="180" height="105" rx="14" fill="#9a3412" stroke="#ea580c" stroke-width="2" />
    <text x="90" y="39" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#fdba74">Grammatik-Matcher</text>
    <text x="90" y="68" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#fdba74">gültige Werte berechnet</text>
    <text x="90" y="87" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#fdba74">Nächste Token-Maske</text>
  </g>
  <path d="M475 177 H520" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <g transform="translate(535 125)">
    <rect width="180" height="105" rx="14" fill="#2563eb" stroke="#2563eb" stroke-width="2" />
    <text x="90" y="39" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#93c5fd">Maskiertes Sampling</text>
    <text x="90" y="68" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd">Ungültige Logits → −∞</text>
    <text x="90" y="87" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd">Wählen Sie einen geeigneten Token aus.</text>
  </g>
  <path d="M725 177 H770" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <g transform="translate(785 125)">
    <rect width="180" height="105" rx="14" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" />
    <text x="90" y="39" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#93c5fd">Voranschreitender Zustand</text>
    <text x="90" y="68" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd">Der Token wird akzeptiert und</text>
    <text x="90" y="87" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd">wiederholen, bis die Aufgabe abgeschlossen ist</text>
  </g>

  <g transform="translate(75 290)">
    <rect width="400" height="145" rx="14" fill="#1e293b" stroke="#94a3b8" />
    <text x="24" y="35" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#e2e8f0">Beispiel: ein numerisches Feld</text>
    <text x="24" y="67" font-family="SFMono-Regular, Consolas, monospace" font-size="13" fill="#94a3b8">raw:  „fünfzehn“  15  wahr  {</text>
    <text x="24" y="96" font-family="SFMono-Regular, Consolas, monospace" font-size="13" fill="#86efac">Maskierung: ×       ✓    ×   ×</text>
    <text x="24" y="124" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94a3b8">Das Schema erlaubt eine Zahl, nicht den Begriff „fifteen“.</text>
  </g>
  <g transform="translate(525 290)">
    <rect width="400" height="145" rx="14" fill="#1d4ed8" stroke="#2563eb" />
    <text x="24" y="35" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#93c5fd">Was die Maske nicht entscheidet</text>
    <text x="24" y="67" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#cbd5e1">• ob 15 der korrekte Wert ist</text>
    <text x="24" y="94" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#cbd5e1">• ob die Belege den Wert stützen</text>
    <text x="24" y="121" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#cbd5e1">• ob eine dynamische Geschäftsregel dies zulässt</text>
  </g>
</svg>
