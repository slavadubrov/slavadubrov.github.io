<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
  <defs>
    <linearGradient id="gpuGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="xgrammarGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="samplingGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.15" />
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981" />
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b" />
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="#0f172a" />

  <!-- Title -->
  <text x="450" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#f8fafc" text-anchor="middle">xgrammar: Wo das Maskieren im Inferenz-Pipeline stattfindet</text>

  <!-- Step labels -->
  <text x="450" y="65" font-family="system-ui, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Die Maske wird nach dem Forward-Pass und vor dem Sampling angewendet.</text>

  <!-- Pipeline flow - horizontal -->
  <g transform="translate(30, 100)">

    <!-- Step 1: Input Tokens -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="120" height="70" rx="10" fill="#1e293b" stroke="#475569" stroke-width="2" filter="url(#shadow)" />
      <text x="60" y="25" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#94a3b8" text-anchor="middle">Schritt 1</text>
      <text x="60" y="45" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#f8fafc" text-anchor="middle">Eingabetoken</text>
      <text x="60" y="60" font-family="monospace" font-size="10" fill="#64748b" text-anchor="middle">[1, 234, 56, ...]</text>
    </g>

    <!-- Arrow 1 -->
    <path d="M125,35 L155,35" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrowGreen)" />

    <!-- Step 2: GPU Forward Pass -->
    <g transform="translate(160, 0)">
      <rect x="0" y="0" width="180" height="70" rx="10" fill="url(#gpuGrad)" filter="url(#shadow)" />
      <text x="90" y="20" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#d1fae5" text-anchor="middle">Schritt 2 (GPU)</text>
      <text x="90" y="40" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">🖥️ Vorwärtsübertragung</text>
      <text x="90" y="58" font-family="system-ui, sans-serif" font-size="10" fill="#a7f3d0" text-anchor="middle">Das Modell berechnet alle 128K Logits.</text>
    </g>

    <!-- Arrow 2 -->
    <path d="M345,35 L375,35" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrowGreen)" />

    <!-- Step 3: Raw Logits -->
    <g transform="translate(380, 0)">
      <rect x="0" y="0" width="120" height="70" rx="10" fill="#1e293b" stroke="#475569" stroke-width="2" filter="url(#shadow)" />
      <text x="60" y="20" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#94a3b8" text-anchor="middle">Ausgabe</text>
      <text x="60" y="40" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#f8fafc" text-anchor="middle">Roh-Logits</text>
      <text x="60" y="58" font-family="monospace" font-size="9" fill="#64748b" text-anchor="middle">[2,1; -0,5; 3,8...]</text>
    </g>

    <!-- Arrow 3 -->
    <path d="M505,35 L535,35" stroke="#f59e0b" stroke-width="3" fill="none" marker-end="url(#arrowOrange)" />

    <!-- Step 4: xgrammar Logits Processor (THE KEY STEP) -->
    <g transform="translate(540, -15)">
      <rect x="0" y="0" width="180" height="100" rx="12" fill="url(#xgrammarGrad)" stroke="#fbbf24" stroke-width="3" filter="url(#shadow)" />
      <text x="90" y="22" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#fef3c7" text-anchor="middle">Schritt 3 (CPU)</text>
      <text x="90" y="42" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">⚙️ xgrammar</text>
      <text x="90" y="60" font-family="system-ui, sans-serif" font-size="11" fill="#fef3c7" text-anchor="middle">Logit-Verarbeitungseinheit</text>
      <text x="90" y="82" font-family="system-ui, sans-serif" font-size="10" fill="#fde68a" text-anchor="middle">Ungültige Token → -∞</text>
    </g>

    <!-- Arrow 4 -->
    <path d="M725,35 L755,35" stroke="#6366f1" stroke-width="2" fill="none" marker-end="url(#arrowBlue)" />

    <!-- Step 5: Sampling -->
    <g transform="translate(760, 0)">
      <rect x="0" y="0" width="110" height="70" rx="10" fill="url(#samplingGrad)" filter="url(#shadow)" />
      <text x="55" y="20" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#c7d2fe" text-anchor="middle">Schritt 4</text>
      <text x="55" y="40" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">Probenahme</text>
      <text x="55" y="58" font-family="system-ui, sans-serif" font-size="10" fill="#a5b4fc" text-anchor="middle">Temperatur, Top-P</text>
    </g>
  </g>

  <!-- Detail box: What xgrammar does -->
  <g transform="translate(30, 210)">
    <rect x="0" y="0" width="420" height="180" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)" />
    <text x="210" y="28" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#fbbf24" text-anchor="middle">Was xgrammar leistet (zwischen den Schritten 2 → 4)</text>

    <line x1="20" y1="45" x2="400" y2="45" stroke="#334155" stroke-width="1" />

    <!-- Before -->
    <text x="20" y="70" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#94a3b8">Roh-Logits vom GPU:</text>
    <rect x="20" y="80" width="180" height="35" rx="4" fill="#0f172a" stroke="#475569" stroke-width="1" />
    <text x="30" y="100" font-family="monospace" font-size="10" fill="#94a3b8">"true":3,2  "15":2,8  "hello":4,1</text>

    <!-- After -->
    <text x="220" y="70" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#94a3b8">Nach der xgrammar-Maske:</text>
    <rect x="220" y="80" width="180" height="35" rx="4" fill="#0f172a" stroke="#475569" stroke-width="1" />
    <text x="230" y="100" font-family="monospace" font-size="10" fill="#6ee7b7">"wahr":</text>
    <text x="275" y="100" font-family="monospace" font-size="10" fill="#f87171">−∞</text>
    <text x="295" y="100" font-family="monospace" font-size="10" fill="#6ee7b7">"15":2,8  "Hallo":</text>
    <text x="381" y="100" font-family="monospace" font-size="10" fill="#f87171">-∞</text>

    <!-- Explanation -->
    <text x="20" y="140" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">In einem Fließkommafeld sind nur Ziffern zulässig.</text>
    <text x="20" y="158" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">"hello" und "true" erhalten eine Wahrscheinlichkeit von 0 (Logit = -∞).</text>
    <text x="20" y="176" font-family="system-ui, sans-serif" font-size="11" fill="#6ee7b7">„15“ wurde ausgewählt, da es der höchste gültige Logit-Wert ist.</text>
  </g>

  <!-- Detail box: Two-phase process -->
  <g transform="translate(470, 210)">
    <rect x="0" y="0" width="400" height="180" rx="12" fill="#1e293b" stroke="#06b6d4" stroke-width="2" filter="url(#shadow)" />
    <text x="200" y="28" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#22d3ee" text-anchor="middle">xgrammar Zwei-Phasen-Architektur</text>

    <line x1="20" y1="45" x2="380" y2="45" stroke="#334155" stroke-width="1" />

    <!-- Phase 1 -->
    <text x="20" y="70" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#67e8f9">Phase 1: Grammatik-Kompilierung (einmalig)</text>
    <text x="30" y="90" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">• JSON Schema → kontextfreie Grammatik</text>
    <text x="30" y="105" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">• Pushdown-Automat konstruieren (mit Verarbeitung von Nesting)</text>
    <text x="30" y="120" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">• 99 % der Token-Masken im Voraus berechnen → in Cache speichern</text>

    <!-- Phase 2 -->
    <text x="20" y="145" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#67e8f9">Phase 2: Erstellung der Laufzeit-Maske (pro Token)</text>
    <text x="30" y="165" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">• Abfrage der im Cache gespeicherten Masken + Überprüfung kontextabhängiger Token</text>
    <text x="30" y="180" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">• Bitmask auf die Logits vor Ort anwenden (C++, schnell)</text>
  </g>

  <!-- Bottom: Key insight -->
  <g transform="translate(30, 420)">
    <rect x="0" y="0" width="840" height="160" rx="16" fill="#172554" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)" />

    <text x="420" y="30" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#93c5fd" text-anchor="middle">💡 Schlüsselerkenntnis: Post-Forward, Prä-Sampling</text>

    <line x1="40" y1="50" x2="800" y2="50" stroke="#1e40af" stroke-width="1" />

    <!-- Three columns -->
    <g transform="translate(40, 65)">
      <rect x="0" y="0" width="240" height="75" rx="8" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1" />
      <text x="120" y="25" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#93c5fd" text-anchor="middle">Modell unverändert</text>
      <text x="120" y="45" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Der Forward-Pass der GPU ist</text>
      <text x="120" y="60" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">genau wie ohne Einschränkungen</text>
    </g>

    <g transform="translate(300, 65)">
      <rect x="0" y="0" width="240" height="75" rx="8" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1" />
      <text x="120" y="25" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#93c5fd" text-anchor="middle">Parallele Ausführung</text>
      <text x="120" y="45" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Maske für Token N berechnet</text>
      <text x="120" y="60" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">während die GPU den Token N+1 berechnet</text>
    </g>

    <g transform="translate(560, 65)">
      <rect x="0" y="0" width="240" height="75" rx="8" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1" />
      <text x="120" y="25" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#93c5fd" text-anchor="middle">Nahe-null Betriebskosten</text>
      <text x="120" y="45" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Die Anwendung der C++-Maske dauert</text>
      <text x="120" y="60" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Mikrosekunden versus Millisekunden bei der Vorwärtsberechnung</text>
    </g>
  </g>
</svg>
