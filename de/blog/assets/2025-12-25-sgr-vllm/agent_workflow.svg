<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Preisgestaltung Workflow mit getrennten Schema- und Policy-Grenzen</title>
  <desc id="desc">Eine Anfrage durchläuft eine strukturierte Routing, eine autorisierte Funktion Retrieval, einen strukturierten Vorschlag, eine deterministische Richtlinienvalidierung sowie eine vorgefertigte Antwort. Sollten Fehler auftreten, kommt es zu einem sicheren Fallback-Mechanismus.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="560" rx="22" fill="#0f172a" />
  <text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Preisgestaltung Agent: beobachtbare Durchsetzungsgrenzen</text>

  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(25 125)"><rect width="150" height="110" rx="14" fill="#1e293b" stroke="#64748b" stroke-width="2" /><text x="75" y="43" text-anchor="middle" font-size="16" font-weight="700" fill="#f8fafc">Benutzeranfrage</text><text x="75" y="72" text-anchor="middle" font-size="12" fill="#94a3b8">nicht vertrauenswürdige Eingabe</text></g>
    <text x="202" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(230 125)"><rect width="150" height="110" rx="14" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="75" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Route</text><text x="75" y="62" text-anchor="middle" font-size="12" fill="#cbd5e1">Diskriminierte Vereinigung</text><text x="75" y="85" text-anchor="middle" font-size="12" fill="#94a3b8">Form validiert</text></g>
    <text x="407" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(435 125)"><rect width="150" height="110" rx="14" fill="#5b21b6" stroke="#2563eb" stroke-width="2" /><text x="75" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#c4b5fd">Abrufen</text><text x="75" y="62" text-anchor="middle" font-size="12" fill="#cbd5e1">autorisierte Benutzer-ID</text><text x="75" y="85" text-anchor="middle" font-size="12" fill="#94a3b8">live Features laden</text></g>
    <text x="612" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(640 125)"><rect width="150" height="110" rx="14" fill="#9a3412" stroke="#ea580c" stroke-width="2" /><text x="75" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#fdba74">Vorschlag</text><text x="75" y="62" text-anchor="middle" font-size="12" fill="#cbd5e1">eingetipptes JSON schema</text><text x="75" y="85" text-anchor="middle" font-size="12" fill="#94a3b8">Form validiert</text></g>
    <text x="817" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(845 125)"><rect width="130" height="110" rx="14" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="65" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Politik-Prüfung</text><text x="65" y="62" text-anchor="middle" font-size="12" fill="#cbd5e1">dynamischer Kapazitätslimit</text><text x="65" y="85" text-anchor="middle" font-size="12" fill="#94a3b8">Code-Enforcement aktiviert</text></g>

    <text x="910" y="286" text-anchor="middle" font-size="28" fill="#93c5fd">↓</text>
    <g transform="translate(785 315)"><rect width="190" height="90" rx="14" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="95" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Standardantwortvorlage</text><text x="95" y="64" text-anchor="middle" font-size="12" fill="#93c5fd">nur validierte Werte</text></g>

    <text x="620" y="459" text-anchor="end" font-size="13" fill="#fca5a5">jeder abgelehnte Prüfungsfall →</text>
    <g transform="translate(670 420)"><rect width="190" height="80" rx="14" fill="#991b1b" stroke="#dc2626" stroke-width="2" /><text x="95" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#fca5a5">Sichere Fallback-Lösung</text><text x="95" y="59" text-anchor="middle" font-size="12" fill="#fca5a5">ablehnen, erneut versuchen oder eskalieren</text></g>
    <text x="500" y="535" text-anchor="middle" font-size="13" fill="#94a3b8">Schemafehler sowie Richtlinienfehler werden explizit behandelt; keiner von ihnen wird stillschweigend in ein Angebot umgewandelt.</text>
  </g>
</svg>
