<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550">
  <defs>
    <linearGradient id="promptGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cotGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sgrGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="550" fill="#0f172a" />

  <!-- Title -->
  <text x="450" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#f8fafc" text-anchor="middle">Prompt Engineering vs. Chain of Thought vs. SGR</text>

  <!-- Column 1: Prompt Engineering -->
  <g transform="translate(30, 70)">
    <rect x="0" y="0" width="270" height="460" rx="16" fill="#1e293b" stroke="#ef4444" stroke-width="3" filter="url(#shadow)" />

    <!-- Header -->
    <rect x="0" y="0" width="270" height="50" rx="16" fill="url(#promptGrad)" />
    <rect x="0" y="35" width="270" height="15" fill="url(#promptGrad)" />
    <text x="135" y="33" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">📝 Prompt Engineering</text>

    <!-- Content -->
    <text x="20" y="80" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fca5a5">Ansatz:</text>
    <text x="20" y="100" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">"Bitte JSON-Format ausgeben"</text>
    <text x="20" y="118" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">"Auf die Formatierung achten"</text>

    <line x1="20" y1="135" x2="250" y2="135" stroke="#334155" stroke-width="1" />

    <text x="20" y="160" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fca5a5">Steuerung:</text>
    <text x="20" y="180" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Nur semantische Beeinflussung</text>
    <text x="20" y="198" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Aufmerksamkeitsmechanismus des Modells</text>

    <line x1="20" y1="215" x2="250" y2="215" stroke="#334155" stroke-width="1" />

    <text x="20" y="240" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fca5a5">Ausgabe:</text>
    <rect x="20" y="250" width="230" height="70" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1" />
    <text x="30" y="270" font-family="monospace" font-size="10" fill="#fca5a5">"Klar! Der Rabatt ist 20%</text>
    <text x="30" y="285" font-family="monospace" font-size="10" fill="#fca5a5">Hier ist vielleicht das JSON:</text>
    <text x="30" y="300" font-family="monospace" font-size="10" fill="#fca5a5">{discount: '20%'..."</text>

    <line x1="20" y1="335" x2="250" y2="335" stroke="#334155" stroke-width="1" />

    <text x="20" y="360" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fca5a5">Probleme:</text>
    <text x="20" y="380" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">❌ Uneinheitliches Format</text>
    <text x="20" y="398" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">❌ Denkschritte übersprungen</text>
    <text x="20" y="416" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">❌ Erfordert Retry-Schleifen</text>
    <text x="20" y="434" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">❌ Modellabhängige Ergebnisse</text>
  </g>

  <!-- Column 2: Chain of Thought -->
  <g transform="translate(315, 70)">
    <rect x="0" y="0" width="270" height="460" rx="16" fill="#1e293b" stroke="#f59e0b" stroke-width="3" filter="url(#shadow)" />

    <!-- Header -->
    <rect x="0" y="0" width="270" height="50" rx="16" fill="url(#cotGrad)" />
    <rect x="0" y="35" width="270" height="15" fill="url(#cotGrad)" />
    <text x="135" y="33" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">🔗 Chain of Thought</text>

    <!-- Content -->
    <text x="20" y="80" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fcd34d">Ansatz:</text>
    <text x="20" y="100" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">"Lass uns Schritt für Schritt denken"</text>
    <text x="20" y="118" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Zwischenschritte des Denkens</text>

    <line x1="20" y1="135" x2="250" y2="135" stroke="#334155" stroke-width="1" />

    <text x="20" y="160" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fcd34d">Steuerung:</text>
    <text x="20" y="180" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Heuristisches Prompting</text>
    <text x="20" y="198" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Modell bestimmt die Struktur</text>

    <line x1="20" y1="215" x2="250" y2="215" stroke="#334155" stroke-width="1" />

    <text x="20" y="240" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fcd34d">Ausgabe:</text>
    <rect x="20" y="250" width="230" height="70" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1" />
    <text x="30" y="270" font-family="monospace" font-size="10" fill="#fcd34d">Schritt 1: Warenkorb analysieren...</text>
    <text x="30" y="285" font-family="monospace" font-size="10" fill="#fcd34d">Schritt 2: Marge prüfen...</text>
    <text x="30" y="300" font-family="monospace" font-size="10" fill="#fcd34d">Daher 15% Rabatt.</text>

    <line x1="20" y1="335" x2="250" y2="335" stroke="#334155" stroke-width="1" />

    <text x="20" y="360" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fcd34d">Probleme:</text>
    <text x="20" y="380" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">⚠️ Unstrukturierte Prosa-Ausgabe</text>
    <text x="20" y="398" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">⚠️ Schwer zuverlässig zu parsen</text>
    <text x="20" y="416" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">⚠️ Variable Schrittzahl</text>
    <text x="20" y="434" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">⚠️ Viele Tokens nötig</text>
  </g>

  <!-- Column 3: Schema-Guided Reasoning -->
  <g transform="translate(600, 70)">
    <rect x="0" y="0" width="270" height="460" rx="16" fill="#1e293b" stroke="#10b981" stroke-width="3" filter="url(#shadow)" />

    <!-- Header -->
    <rect x="0" y="0" width="270" height="50" rx="16" fill="url(#sgrGrad)" />
    <rect x="0" y="35" width="270" height="15" fill="url(#sgrGrad)" />
    <text x="135" y="33" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">📋 Schema-Guided (SGR)</text>

    <!-- Content -->
    <text x="20" y="80" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#6ee7b7">Ansatz:</text>
    <text x="20" y="100" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Pydantic-Schema definiert Schritte</text>
    <text x="20" y="118" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Constrained decoding erzwingt</text>

    <line x1="20" y1="135" x2="250" y2="135" stroke="#334155" stroke-width="1" />

    <text x="20" y="160" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#6ee7b7">Steuerung:</text>
    <text x="20" y="180" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Grammatikbasierte Erzwingung</text>
    <text x="20" y="198" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Entwickler definiert Topologie</text>

    <line x1="20" y1="215" x2="250" y2="215" stroke="#334155" stroke-width="1" />

    <text x="20" y="240" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#6ee7b7">Ausgabe:</text>
    <rect x="20" y="250" width="230" height="70" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1" />
    <text x="30" y="268" font-family="monospace" font-size="9" fill="#6ee7b7">{"churn_analysis":"Hoch",</text>
    <text x="30" y="282" font-family="monospace" font-size="9" fill="#6ee7b7"> "margin_math":"$200*0.2=$40",</text>
    <text x="30" y="296" font-family="monospace" font-size="9" fill="#6ee7b7"> "max_discount":15.0,</text>
    <text x="30" y="310" font-family="monospace" font-size="9" fill="#6ee7b7"> "offer_code":"SAVE15"}</text>

    <line x1="20" y1="335" x2="250" y2="335" stroke="#334155" stroke-width="1" />

    <text x="20" y="360" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#6ee7b7">Vorteile:</text>
    <text x="20" y="380" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">✓ 100% gültige strukturierte Ausgabe</text>
    <text x="20" y="398" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">✓ Prüfbarkeit Feld für Feld</text>
    <text x="20" y="416" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">✓ Funktioniert mit kleineren Modellen</text>
    <text x="20" y="434" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">✓ Keine Retry-Schleifen nötig</text>
  </g>
</svg>
