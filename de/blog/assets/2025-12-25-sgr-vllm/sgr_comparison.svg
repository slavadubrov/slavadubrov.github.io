<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Prompt-Engineering versus Gedankenkette versus SGR</title>
  <desc id="artifact-desc">Prompt-Engineering versus Gedankenkette versus SGR.</desc>
  <defs>
    <linearGradient id="promptGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #dc2626;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cotGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #ea580c;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #ea580c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sgrGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #166534;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="900" height="550" fill="#0f172a" />

  <!-- Title -->
  <text y="40" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="bold" fill="#f8fafc" text-anchor="middle" x="450">Prompt-Engineering versus Gedankenkette versus SGR</text>

  <!-- Column 1: Prompt Engineering -->
  <g transform="translate(30, 70)">
    <rect x="0" y="0" width="270" height="460" rx="16" fill="#1e293b" stroke="#dc2626" stroke-width="3" filter="url(#shadow)" />

    <!-- Header -->
    <rect x="0" y="0" width="270" height="50" rx="16" fill="url(#promptGrad)" />
    <rect x="0" y="35" width="270" height="15" fill="url(#promptGrad)" />
    <text y="33" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#f8fafc" text-anchor="middle" x="135">📝 Prompt-Engineering</text>

    <!-- Content -->
    <text y="80" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fca5a5" x="20">Ansatz:</text>
    <text y="100" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">"Bitte geben Sie den Inhalt im JSON-Format aus."</text>
    <text y="118" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">Achten Sie auf die Formatierung.</text>

    <line x1="20" y1="135" x2="250" y2="135" stroke="#94a3b8" stroke-width="1" />

    <text y="160" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fca5a5" x="20">Steuerung:</text>
    <text y="180" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">Nur semantische Überzeugung</text>
    <text y="198" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">Aufmerksamkeitsmechanismus des Modells</text>

    <line x1="20" y1="215" x2="250" y2="215" stroke="#94a3b8" stroke-width="1" />

    <text y="240" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fca5a5" x="20">Ausgabe:</text>
    <rect x="20" y="250" width="230" height="70" rx="6" fill="#0f172a" stroke="#94a3b8" stroke-width="1" />
    <text y="270" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#fca5a5" x="30">"Sicher! Der Rabatt beträgt 20 %."</text>
    <text y="285" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#fca5a5" x="30">Hier ist möglicherweise das JSON:</text>
    <text y="300" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#fca5a5" x="30">{discount: '20%'...</text>

    <line x1="20" y1="335" x2="250" y2="335" stroke="#94a3b8" stroke-width="1" />

    <text y="360" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fca5a5" x="20">Probleme:</text>
    <text y="380" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">❌ Inkonsistenz im Format</text>
    <text y="398" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">❌ Übergegangene Schlussfolgerungsschritte</text>
    <text y="416" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">❌ Erfordert Wiederholungsschleifen</text>
    <text y="434" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">❌ modellabhängige Ergebnisse</text>
  </g>

  <!-- Column 2: Chain of Thought -->
  <g transform="translate(315, 70)">
    <rect x="0" y="0" width="270" height="460" rx="16" fill="#1e293b" stroke="#ea580c" stroke-width="3" filter="url(#shadow)" />

    <!-- Header -->
    <rect x="0" y="0" width="270" height="50" rx="16" fill="url(#cotGrad)" />
    <rect x="0" y="35" width="270" height="15" fill="url(#cotGrad)" />
    <text y="33" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#f8fafc" text-anchor="middle" x="135">🔗 Denkketten</text>

    <!-- Content -->
    <text y="80" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fdba74" x="20">Ansatz:</text>
    <text y="100" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">Lassen Sie uns schrittweise darüber nachdenken.</text>
    <text y="118" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">Intermediäre Schlussfolgerungsverläufe</text>

    <line x1="20" y1="135" x2="250" y2="135" stroke="#94a3b8" stroke-width="1" />

    <text y="160" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fdba74" x="20">Steuerung:</text>
    <text y="180" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">heuristische Anleitung</text>
    <text y="198" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">Das Modell bestimmt die Struktur.</text>

    <line x1="20" y1="215" x2="250" y2="215" stroke="#94a3b8" stroke-width="1" />

    <text y="240" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fdba74" x="20">Ausgabe:</text>
    <rect x="20" y="250" width="230" height="70" rx="6" fill="#0f172a" stroke="#94a3b8" stroke-width="1" />
    <text y="270" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#fdba74" x="30">Schritt 1: Analyse des Wagens...</text>
    <text y="285" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#fdba74" x="30">Schritt 2: Prüfung des Randabstands...</text>
    <text y="300" font-family="SFMono-Regular, Consolas, monospace" font-size="10" fill="#fdba74" x="30">Daher 15% Rabatt.</text>

    <line x1="20" y1="335" x2="250" y2="335" stroke="#94a3b8" stroke-width="1" />

    <text y="360" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fdba74" x="20">Probleme:</text>
    <text y="380" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">⚠️ Unstrukturierte Prosaausgabe</text>
    <text y="398" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">⚠️ Schwierig, zuverlässig zu parsen</text>
    <text y="416" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">⚠️ Variabler Schrittzähler</text>
    <text y="434" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">⚠️ Hoher Tokenverbrauch</text>
  </g>

  <!-- Column 3: Schema-Guided Reasoning -->
  <g transform="translate(600, 70)">
    <rect x="0" y="0" width="270" height="460" rx="16" fill="#1e293b" stroke="#16a34a" stroke-width="3" filter="url(#shadow)" />

    <!-- Header -->
    <rect x="0" y="0" width="270" height="50" rx="16" fill="url(#sgrGrad)" />
    <rect x="0" y="35" width="270" height="15" fill="url(#sgrGrad)" />
    <text y="33" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#f8fafc" text-anchor="middle" x="135">📋 Schema-gestützt (SGR)</text>

    <!-- Content -->
    <text y="80" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#86efac" x="20">Ansatz:</text>
    <text y="100" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">Das Pydantic-Schema definiert die Schritte.</text>
    <text y="118" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">Die eingeschränkte Dekodierung erzwingt</text>

    <line x1="20" y1="135" x2="250" y2="135" stroke="#94a3b8" stroke-width="1" />

    <text y="160" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#86efac" x="20">Steuerung:</text>
    <text y="180" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">grammatikbasierte Durchsetzung</text>
    <text y="198" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">Der Entwickler definiert die Topologie.</text>

    <line x1="20" y1="215" x2="250" y2="215" stroke="#94a3b8" stroke-width="1" />

    <text y="240" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#86efac" x="20">Ausgabe:</text>
    <rect x="20" y="250" width="230" height="70" rx="6" fill="#0f172a" stroke="#94a3b8" stroke-width="1" />
    <text y="268" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#86efac" x="30">"Churn-Analyse": "Hoch"</text>
    <text y="282" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#86efac" x="30"> "margin_math":"$200*0,2=$40",</text>
    <text y="296" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#86efac" x="30"> "max_discount":15.0,</text>
    <text y="310" font-family="SFMono-Regular, Consolas, monospace" font-size="9" fill="#86efac" x="30"> "offer_code":"SPAREN15"}</text>

    <line x1="20" y1="335" x2="250" y2="335" stroke="#94a3b8" stroke-width="1" />

    <text y="360" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#86efac" x="20">Vorteile:</text>
    <text y="380" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">✓ 100 % gültiger strukturierter Ausgabe</text>
    <text y="398" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">✓ Feld für Feld audierbar</text>
    <text y="416" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">✓ Funktioniert mit kleineren Modellen</text>
    <text y="434" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1" x="20">✓ Keine Wiederholungsschleifen erforderlich</text>
  </g>
</svg>
