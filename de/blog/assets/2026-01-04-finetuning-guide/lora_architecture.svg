<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="LoRA Architecture" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title>LoRA niedrig-rangige Weight Aktualisierung</title>
  <desc>Eine gefrorene Weight-Matrix erhält eine skalierte Rank-R-Update, die durch das Multiplizieren zweier kleiner, trainierbarer Matrizen erzeugt wird; der Anteil der trainierbaren Komponenten hängt von der Struktur der Schichten sowie den spezifischen Modulen ab.</desc>
  <defs>
    <linearGradient id="frozenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #2563eb" />
      <stop offset="100%" style="stop-color: #2563eb" />
    </linearGradient>
    <linearGradient id="loraGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #ea580c" />
      <stop offset="100%" style="stop-color: #ea580c" />
    </linearGradient>
    <linearGradient id="outputGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #16a34a" />
      <stop offset="100%" style="stop-color: #16a34a" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="800" height="450" fill="#0f172a" />

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="bold">LoRA: Architektur der niedrig-rangigen Anpassung</text>

  <!-- Frozen Weight Matrix (Left) -->
  <rect x="50" y="100" width="180" height="250" rx="12" fill="#1e293b" stroke="#2563eb" stroke-width="3" filter="url(#shadow)" />
  <text x="140" y="135" text-anchor="middle" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="bold">🔒 Eingefrorenes Weights</text>
  <text x="140" y="160" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="14">W₀</text>
  <text x="140" y="185" text-anchor="middle" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="12">(d × d-Matrix)</text>

  <!-- Grid representing frozen weights -->
  <g opacity="0.6">
    <rect x="70" y="210" width="140" height="120" rx="4" fill="#334155" />
    <line x1="105" y1="210" x2="105" y2="330" stroke="#94a3b8" stroke-width="1" />
    <line x1="140" y1="210" x2="140" y2="330" stroke="#94a3b8" stroke-width="1" />
    <line x1="175" y1="210" x2="175" y2="330" stroke="#94a3b8" stroke-width="1" />
    <line x1="70" y1="240" x2="210" y2="240" stroke="#94a3b8" stroke-width="1" />
    <line x1="70" y1="270" x2="210" y2="270" stroke="#94a3b8" stroke-width="1" />
    <line x1="70" y1="300" x2="210" y2="300" stroke="#94a3b8" stroke-width="1" />
  </g>
  <text x="140" y="370" text-anchor="middle" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="11">Die Basismatrix bleibt unverändert.</text>

  <!-- Plus sign -->
  <text x="265" y="230" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="bold">Pluszeichen</text>

  <!-- LoRA Adapters (Center) -->
  <g filter="url(#shadow)">
    <!-- Matrix B (up-projection) -->
    <rect x="310" y="120" width="60" height="130" rx="8" fill="#1e293b" stroke="#ea580c" stroke-width="2" />
    <text x="340" y="180" text-anchor="middle" fill="#fdba74" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="bold">B</text>
    <text x="340" y="200" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10">d × r</text>

    <!-- Multiplication sign -->
    <text x="390" y="185" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="20">×</text>

    <!-- Matrix A (down-projection) -->
    <rect x="420" y="150" width="130" height="60" rx="8" fill="#1e293b" stroke="#ea580c" stroke-width="2" />
    <text x="485" y="185" text-anchor="middle" fill="#fdba74" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="bold">Ein</text>
    <text x="485" y="200" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10">Radius mal Durchmesser</text>
  </g>

  <!-- LoRA label -->
  <rect x="320" y="270" width="210" height="80" rx="8" fill="#1e293b" stroke="#ea580c" stroke-width="2" filter="url(#shadow)" />
  <text x="425" y="295" text-anchor="middle" fill="#fdba74" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold">🔥 LoRA Adapter</text>
  <text x="425" y="315" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="12">ΔW = (α/r) · B × A</text>
  <text x="425" y="335" text-anchor="middle" fill="#166534" font-family="Inter, system-ui, sans-serif" font-size="11">trainierbare Werte für r(dᵢₙ + dₒᵤₜ)</text>

  <!-- Rank label -->
  <rect x="350" y="80" width="100" height="30" rx="15" fill="#ea580c" stroke="#ea580c" stroke-width="1" />
  <text x="400" y="100" text-anchor="middle" fill="#fdba74" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Rang r = 16</text>

  <!-- Equals sign -->
  <text x="580" y="230" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="bold">=</text>

  <!-- Output (Right) -->
  <rect x="620" y="100" width="150" height="250" rx="12" fill="url(#outputGrad)" filter="url(#shadow)" />
  <text x="695" y="135" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="bold">✨ Anpassung vorgenommen</text>
  <text x="695" y="165" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14">W' = W₀ + ΔW</text>

  <!-- Grid representing output -->
  <g opacity="0.8">
    <rect x="640" y="190" width="110" height="90" rx="4" fill="#166534" />
    <line x1="676" y1="190" x2="676" y2="280" stroke="#166534" stroke-width="1" />
    <line x1="713" y1="190" x2="713" y2="280" stroke="#166534" stroke-width="1" />
    <line x1="640" y1="220" x2="750" y2="220" stroke="#166534" stroke-width="1" />
    <line x1="640" y1="250" x2="750" y2="250" stroke="#166534" stroke-width="1" />
  </g>

  <text x="695" y="310" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="12">gegenüber prüfen</text>
  <text x="695" y="328" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="12">basierende und vollständige FT</text>

  <!-- Bottom explanation -->
  <rect x="50" y="395" width="700" height="45" rx="8" fill="#1e293b" filter="url(#shadow)" />
  <text x="400" y="414" text-anchor="middle" fill="#fdba74" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold">LoRA verringert den zu trainierenden Zustand; QLoRA quantisiert außerdem die festgefrorene Basis</text>
  <text x="400" y="432" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11">Das Speicherverbrauch hängt außerdem von Activations, der Sequenzlänge, dem Batch-Größe, der Präzision, Kernels sowie dem Optimierer ab.</text>
</svg>
