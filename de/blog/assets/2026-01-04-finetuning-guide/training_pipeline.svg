<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" role="img" aria-label="Training Pipeline" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title>Demo zur Funktionsaufruf-Methode Unsloth Fine-Tuning</title>
  <desc>In der Demo wird eine Funktionsaufruf-Schicht Dataset umgewandelt, eine vierbitige Nemotron Nano-Basis geladen, Rank-16 LoRA-Adapter mithilfe von SFT trainiert und ein versionierter Adapter zur Bewertung gespeichert.</desc>
  <defs>
    <linearGradient id="dataGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #2563eb" />
      <stop offset="100%" style="stop-color: #2563eb" />
    </linearGradient>
    <linearGradient id="modelGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #2563eb" />
      <stop offset="100%" style="stop-color: #2563eb" />
    </linearGradient>
    <linearGradient id="trainGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #ea580c" />
      <stop offset="100%" style="stop-color: #ea580c" />
    </linearGradient>
    <linearGradient id="outGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #16a34a" />
      <stop offset="100%" style="stop-color: #16a34a" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="900" height="400" fill="#0f172a" />

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="bold">Unsloth Fine-Tuning Pipeline</text>

  <!-- Step 1: Dataset -->
  <rect x="30" y="80" width="150" height="100" rx="12" fill="url(#dataGrad)" filter="url(#shadow)" />
  <text x="105" y="115" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold">📊 Dataset</text>
  <text x="105" y="138" text-anchor="middle" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="11">Glaive-Funktion-</text>
  <text x="105" y="153" text-anchor="middle" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="11">calling-v2</text>
  <text x="105" y="172" text-anchor="middle" fill="#c4b5fd" font-family="Inter, system-ui, sans-serif" font-size="10">113 K Beispiele</text>

  <!-- Arrow 1 -->
  <path d="M180 130 L230 130" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Step 2: Base Model -->
  <rect x="240" y="80" width="150" height="100" rx="12" fill="url(#modelGrad)" filter="url(#shadow)" />
  <text x="315" y="115" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold">🤖 Basis Model</text>
  <text x="315" y="138" text-anchor="middle" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="11">Nemotron-Nano</text>
  <text x="315" y="153" text-anchor="middle" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="11">4B-v1.1</text>
  <text x="315" y="172" text-anchor="middle" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="10">4-Bit-Quantisierung</text>

  <!-- Arrow 2 -->
  <path d="M390 130 L440 130" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Step 3: Training -->
  <rect x="450" y="65" width="180" height="130" rx="12" fill="url(#trainGrad)" filter="url(#shadow)" />
  <text x="540" y="95" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold">🔥 SFT Schulung</text>
  <text x="540" y="120" text-anchor="middle" fill="#fdba74" font-family="Inter, system-ui, sans-serif" font-size="11">LoRA r=16, α=32</text>
  <text x="540" y="140" text-anchor="middle" fill="#fdba74" font-family="Inter, system-ui, sans-serif" font-size="11">max_seq=4096</text>
  <text x="540" y="160" text-anchor="middle" fill="#fdba74" font-family="Inter, system-ui, sans-serif" font-size="11">packing=True</text>
  <text x="540" y="185" text-anchor="middle" fill="#fdba74" font-family="Inter, system-ui, sans-serif" font-size="10">Benchmark Zielgeschwindigkeit GPU</text>

  <!-- Arrow 3 -->
  <path d="M630 130 L680 130" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Step 4: Output -->
  <rect x="690" y="80" width="180" height="100" rx="12" fill="url(#outGrad)" filter="url(#shadow)" />
  <text x="780" y="115" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold">✨ Feinabgestimmt</text>
  <text x="780" y="138" text-anchor="middle" fill="#86efac" font-family="Inter, system-ui, sans-serif" font-size="11">Function Calling</text>
  <text x="780" y="153" text-anchor="middle" fill="#86efac" font-family="Inter, system-ui, sans-serif" font-size="11">Spezialist Model</text>
  <text x="780" y="172" text-anchor="middle" fill="#86efac" font-family="Inter, system-ui, sans-serif" font-size="10">versionierter LoRA-Adapter</text>

  <!-- Components detail section -->
  <rect x="30" y="210" width="840" height="170" rx="12" fill="#1e293b" filter="url(#shadow)" />

  <!-- Config section -->
  <rect x="50" y="230" width="250" height="130" rx="8" fill="#0f172a" />
  <text x="175" y="255" text-anchor="middle" fill="#fdba74" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold">⚙️ config.py</text>
  <text x="65" y="280" fill="#94a3b8" font-family="SFMono-Regular, Consolas, monospace" font-size="10">LORA_R = 16</text>
  <text x="65" y="298" fill="#94a3b8" font-family="SFMono-Regular, Consolas, monospace" font-size="10">LORA_ALPHA = 32</text>
  <text x="65" y="316" fill="#94a3b8" font-family="SFMono-Regular, Consolas, monospace" font-size="10">MAX_SEQ_LENGTH = 4096</text>
  <text x="65" y="334" fill="#94a3b8" font-family="SFMono-Regular, Consolas, monospace" font-size="10">BATCH_GRÖSSE = 2</text>
  <text x="65" y="352" fill="#94a3b8" font-family="SFMono-Regular, Consolas, monospace" font-size="10">Lernrate = 2e-4</text>

  <!-- Model section -->
  <rect x="320" y="230" width="250" height="130" rx="8" fill="#0f172a" />
  <text x="445" y="255" text-anchor="middle" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold">🔧 Model.py</text>
  <text x="335" y="280" fill="#94a3b8" font-family="SFMono-Regular, Consolas, monospace" font-size="10">Schnelles Sprachmodell</text>
  <text x="335" y="298" fill="#94a3b8" font-family="SFMono-Regular, Consolas, monospace" font-size="10">  .from_pretrained()</text>
  <text x="335" y="316" fill="#94a3b8" font-family="SFMono-Regular, Consolas, monospace" font-size="10">  .get_Peft_Model()</text>
  <text x="335" y="334" fill="#94a3b8" font-family="SFMono-Regular, Consolas, monospace" font-size="10">  .save_pretrained()</text>
  <text x="335" y="352" fill="#94a3b8" font-family="SFMono-Regular, Consolas, monospace" font-size="10">  .save_pretrained_gguf()</text>

  <!-- Training section -->
  <rect x="590" y="230" width="260" height="130" rx="8" fill="#0f172a" />
  <text x="720" y="255" text-anchor="middle" fill="#166534" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold">📈 training.py</text>
  <text x="605" y="280" fill="#94a3b8" font-family="SFMono-Regular, Consolas, monospace" font-size="10">SFTTrainer(</text>
  <text x="605" y="298" fill="#94a3b8" font-family="SFMono-Regular, Consolas, monospace" font-size="10">  Model=Model,</text>
  <text x="605" y="316" fill="#94a3b8" font-family="SFMono-Regular, Consolas, monospace" font-size="10">  train_dataset=Dataset,</text>
  <text x="605" y="334" fill="#94a3b8" font-family="SFMono-Regular, Consolas, monospace" font-size="10">  packing=True,</text>
  <text x="605" y="352" fill="#94a3b8" font-family="SFMono-Regular, Consolas, monospace" font-size="10">).train()</text>
</svg>
