<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Alignierungsmethoden: Von PPO zu ORPO</title>
  <desc id="artifact-desc">Alignierungsmethoden: Von PPO zu ORPO.</desc>
  <defs>
    <linearGradient id="sftGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="dpoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="orpoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#16a34a" />
      <stop offset="100%" stop-color="#166534" />
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8" />
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2563eb" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="900" height="420" fill="#f8fafc" />

  <!-- Title -->
  <text y="30" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" text-anchor="middle" fill="#1d4ed8" x="450">Alignierungsmethoden: Von PPO zu ORPO</text>

  <!-- Traditional RLHF -->
  <text y="65" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#334155" x="60">Traditionell (RLHF):</text>

  <rect x="60" y="80" width="130" height="45" rx="6" fill="url(#sftGrad)" />
  <text y="105" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ffffff" x="125">1. SFT</text>
  <text y="118" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)" x="125">Lernaufgabe</text>

  <path d="M 190 102 L 220 102" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow)" />

  <rect x="230" y="80" width="130" height="45" rx="6" fill="#ea580c" />
  <text y="105" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ffffff" x="295">2. Belohnungsmodell</text>
  <text y="118" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)" x="295">Einstellungen lernen</text>

  <path d="M 360 102 L 390 102" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow)" />

  <rect x="400" y="80" width="130" height="45" rx="6" fill="#dc2626" />
  <text y="105" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ffffff" x="465">3. PPO (Reinforcement Learning)</text>
  <text y="118" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)" x="465">Politik optimieren</text>

  <text y="98" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#dc2626" x="560">❌ Komplex</text>
  <text y="112" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#dc2626" x="560">❌ Teuer</text>

  <!-- Divider -->
  <line x1="60" y1="150" x2="850" y2="150" stroke="#e2e8f0" stroke-width="1.5" />

  <!-- Modern DPO -->
  <text y="175" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#334155" x="60">Modern (DPO):</text>

  <rect x="60" y="190" width="130" height="45" rx="6" fill="url(#sftGrad)" />
  <text y="215" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ffffff" x="125">1. SFT</text>
  <text y="228" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)" x="125">Lernaufgabe</text>

  <path d="M 190 212 L 220 212" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrowPurple)" />

  <rect x="230" y="190" width="130" height="45" rx="6" fill="url(#dpoGrad)" />
  <text y="215" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ffffff" x="295">2. DPO</text>
  <text y="228" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)" x="295">Direkte Präferenz</text>

  <text y="205" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#166534" x="395">✓ Einfacher</text>
  <text y="220" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#166534" x="395">✓ Stabiler</text>
  <text y="235" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#166534" x="395">✓ Weniger Rechenleistung erforderlich</text>

  <!-- Divider -->
  <line x1="60" y1="260" x2="850" y2="260" stroke="#e2e8f0" stroke-width="1.5" />

  <!-- Newest ORPO -->
  <text y="285" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#334155" x="60">Neueste Version (ORPO):</text>

  <rect x="60" y="300" width="200" height="50" rx="6" fill="url(#orpoGrad)" />
  <text y="322" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#ffffff" x="160">ORPO (Einzustufenverfahren)</text>
  <text y="340" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)" x="160">Kombinierte SFT- und Alignment-Methode</text>

  <text y="315" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#166534" x="290">✓ Einzelne Trainingsphase</text>
  <text y="330" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#166534" x="290">✓ Kein separater SFT</text>
  <text y="345" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#166534" x="290">✓ Schnellste Umsetzung in die Produktion</text>

  <!-- Recommendation Box -->
  <rect x="530" y="280" width="310" height="80" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" />
  <text y="305" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#9a3412" x="685">Empfehlung für 2025</text>
  <text y="325" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#9a3412" x="685">Beginnen Sie in den meisten Anwendungsfällen mit ORPO.</text>
  <text y="340" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#9a3412" x="685">Bei größerer Kontrolle auf den DPO zurückgreifen.</text>
  <text y="355" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#9a3412" x="685">PPO ausschließlich für spezialisierte Aufgaben (Code-Generierung)</text>

  <!-- Legend -->
  <rect x="60" y="375" width="780" height="35" rx="4" fill="#f1f5f9" />
  <text y="397" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#334155" x="80">Schlüssel:</text>
  <text y="397" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" x="115">SFT = Überwachtes Feintunen</text>
  <text y="397" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" x="300">DPO = Direkte Präferenzoptimierung</text>
  <text y="397" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" x="530">ORPO = Optimierung der Präferenzverhältnisse mittels Odds-Ratio</text>
</svg>
