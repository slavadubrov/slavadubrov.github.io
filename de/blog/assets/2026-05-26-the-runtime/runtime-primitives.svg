<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 610" font-family="Inter, system-ui, sans-serif" role="img" aria-label="The five runtime primitives" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Die fünf Runtime-Primitiven</title>
  <defs>
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#334155" flood-opacity="0.08" />
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155" />
    </marker>
    <marker id="arrPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#7c3aed" />
    </marker>
    <marker id="arrPurpleDS" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="960" height="610" fill="#f8fafc" />

  <!-- Title -->
  <text y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a" x="480">Die fünf Runtime-Primitiven</text>
  <text y="56" text-anchor="middle" font-size="13" fill="#334155" x="480">Session · Harness · Sandbox · Checkpoint · Trace</text>

  <!-- Outer runtime container -->
  <rect x="30" y="78" width="900" height="510" rx="14" ry="14" fill="#f8fafc" stroke="#f8fafc" stroke-width="1.5" />
  <text y="100" font-size="12" font-weight="600" fill="#1d4ed8" letter-spacing="0.5" x="50">AUSSERER Runtime</text>

  <!-- LLM API ellipse -->
  <g filter="url(#ds)">
    <ellipse cx="480" cy="128" rx="75" ry="22" fill="#faf5ff" stroke="#2563eb" stroke-width="1.8" />
    <text y="133" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8" x="480">LLM API</text>
  </g>

  <!-- LLM -> Harness arrow -->
  <path d="M480 151 L 480 161" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrPurpleDS)" />

  <!-- Harness -->
  <g filter="url(#ds)">
    <rect x="240" y="163" width="480" height="95" rx="12" ry="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
    <text y="192" text-anchor="middle" font-size="17" font-weight="700" fill="#1d4ed8" x="480">Harness</text>
    <text y="215" text-anchor="middle" font-size="12" fill="#334155" x="480">Der Schleifenablauf: Aufruf von Model → Parsing durch das Tool → Ausführung → Wiederholung</text>
    <text y="237" text-anchor="middle" font-size="11" fill="#334155" font-style="italic" x="480">LangGraph CompiledStateGraph · Tiefes Agents · Claude Code</text>
  </g>

  <!-- Harness -> Session (emitEvent) -->
  <path d="M335 258 L 240 308" fill="none" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arr)" />
  <text y="277" font-size="11" font-weight="600" fill="#334155" x="255">Event aussenden</text>

  <!-- Harness -> Checkpoint (persist) -->
  <path d="M462 258 L 462 308" fill="none" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arr)" />
  <text y="285" font-size="11" font-weight="600" fill="#334155" text-anchor="end" x="456">dauerhaft speichern</text>

  <!-- Checkpoint -> Harness (resume, dashed purple) -->
  <path d="M500 308 L 500 261" fill="none" stroke="#7c3aed" stroke-width="1.8" stroke-dasharray="5 3" marker-end="url(#arrPurple)" />
  <text y="285" font-size="11" font-weight="600" fill="#5b21b6" x="508">Fortsetzen</text>

  <!-- Harness -> Sandbox (tool calls) -->
  <path d="M625 258 L 720 308" fill="none" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arr)" />
  <text y="277" font-size="11" font-weight="600" fill="#334155" x="635">Tool Calls</text>

  <!-- Sandbox -> Harness (results, dashed) -->
  <path d="M760 308 L 665 261" fill="none" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#arr)" />
  <text y="297" font-size="11" font-weight="600" fill="#334155" x="700">Ergebnisse</text>

  <!-- Session box -->
  <g filter="url(#ds)">
    <rect x="65" y="310" width="240" height="110" rx="12" ry="12" fill="#f0fdf4" stroke="#166534" stroke-width="2" />
    <text y="338" text-anchor="middle" font-size="16" font-weight="700" fill="#166534" x="185">Session</text>
    <text y="361" text-anchor="middle" font-size="12" fill="#334155" x="185">Ereignisprotokoll mit nur Append-Funktion</text>
    <text y="381" text-anchor="middle" font-size="11" fill="#334155" x="185">Thread-ID · emitEvent(id, ev)</text>
    <text y="403" text-anchor="middle" font-size="11" fill="#334155" font-style="italic" x="185">LangGraph SQLite · Streaming</text>
  </g>

  <!-- Checkpoint box -->
  <g filter="url(#ds)">
    <rect x="345" y="310" width="270" height="110" rx="12" ry="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" />
    <text y="338" text-anchor="middle" font-size="16" font-weight="700" fill="#5b21b6" x="480">Checkpoint</text>
    <text y="361" text-anchor="middle" font-size="12" fill="#334155" x="480">Zustandsaufnahme pro Über-Schritt</text>
    <text y="381" text-anchor="middle" font-size="11" fill="#334155" x="480">Werte · Nächster Schritt · Aufgaben · checkpoint_id</text>
    <text y="403" text-anchor="middle" font-size="11" fill="#334155" font-style="italic" x="480">PostgresSaver · RedisSaver</text>
  </g>

  <!-- Sandbox box -->
  <g filter="url(#ds)">
    <rect x="655" y="310" width="240" height="110" rx="12" ry="12" fill="#fff7ed" stroke="#ea580c" stroke-width="2" />
    <text y="338" text-anchor="middle" font-size="16" font-weight="700" fill="#9a3412" x="775">Sandbox</text>
    <text y="361" text-anchor="middle" font-size="12" fill="#334155" x="775">Isolierte Ausführungsumgebung</text>
    <text y="381" text-anchor="middle" font-size="11" fill="#334155" x="775">Die Dateien werden hier geändert, nicht in Harness</text>
    <text y="403" text-anchor="middle" font-size="11" fill="#334155" font-style="italic" x="775">E2B · Daytona · Modaler Agent · Docker</text>
  </g>

  <!-- Trace box -->
  <g filter="url(#ds)">
    <rect x="65" y="445" width="830" height="80" rx="12" ry="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2" />
    <text y="471" text-anchor="middle" font-size="16" font-weight="700" fill="#991b1b" x="480">Trace · OpenTelemetry Generative KI</text>
    <text y="493" text-anchor="middle" font-size="12" fill="#334155" x="480">von Harness erzeugte Spans · Session · Checkpoint · Sandbox</text>
    <text y="513" text-anchor="middle" font-size="11" fill="#334155" x="480">gen_ai.conversation.id · gen_ai.Agent.name · gen_ai.usage.* · gen_ai.Workflow.name</text>
  </g>

  <!-- Credentials note -->
  <g>
    <rect x="65" y="542" width="830" height="38" rx="8" ry="8" fill="#ffffff" stroke="#2563eb" stroke-dasharray="4 3" />
    <text y="566" text-anchor="middle" font-size="12" fill="#334155" x="480">
      <tspan font-weight="700" fill="#334155">Anmeldeinformationen</tspan> live in a vault outside all five. The MCP proxy fetches them per session; the harness never sees the token.
    </text>
  </g>
</svg>
