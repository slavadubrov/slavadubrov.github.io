<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">Lange Laufzeit des Agentenlebenszyklus</title>
  <desc id="desc">Ein Lebenszyklusdiagramm, das die Phasen Booten, Planen, Ausführen, Checkpoint-Erstellen, Bewertung sowie Wiederaufnehmen für einen langlaufenden Agenten darstellt.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#1f2937" flood-opacity="0.15" />
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2c3e50" />
    </marker>
    <style>
      .heading{font:700 24px Arial,sans-serif;fill:#17202a}
      .step{font:700 15px Arial,sans-serif;fill:#17202a}
      .sub{font:500 12px Arial,sans-serif;fill:#566573}
      .box{rx:12;filter:url(#shadow);stroke-width:2}
      .arrow{stroke:#2c3e50;stroke-width:2.3;fill:none;marker-end:url(#arrow)}
      .soft{stroke:#7f8c8d;stroke-width:2;stroke-dasharray:7 7;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1100" height="620" fill="#f8f9fa" />
  <text x="60" y="58" class="heading">Lebenszyklus eines bereitgestellten Agenten-Exekutionsvorgangs</text>
  <text x="60" y="84" class="sub">Ein Langlauf ist eine Abfolge von wiederholbaren Schritten, nicht eine einzige große Anfrage.</text>

  <rect class="box" x="70" y="150" width="150" height="88" fill="#e3f2fd" stroke="#2980b9" />
  <text x="104" y="184" class="step">1. Starten</text>
  <text x="98" y="209" class="sub">Ladezustand</text>
  <text x="98" y="227" class="sub">Aufhängungsbereich für Arbeitsfläche</text>

  <rect class="box" x="270" y="150" width="150" height="88" fill="#f3e5f5" stroke="#6a1b9a" />
  <text x="303" y="184" class="step">2. Planung</text>
  <text x="298" y="209" class="sub">Acceptanztests</text>
  <text x="298" y="227" class="sub">Budgetgrenzen</text>

  <rect class="box" x="470" y="150" width="150" height="88" fill="#fff3e0" stroke="#e67e22" />
  <text x="500" y="184" class="step">3. Ausführen</text>
  <text x="498" y="209" class="sub">Werkzeuge und Code</text>
  <text x="498" y="227" class="sub">Politik-Überprüfungen</text>

  <rect class="box" x="670" y="150" width="150" height="88" fill="#e8f5e9" stroke="#27ae60" />
  <text x="696" y="184" class="step">4. Checkpoint</text>
  <text x="700" y="209" class="sub">Ereignisprotokoll</text>
  <text x="700" y="227" class="sub">Arbeitsbereichs-Diff</text>

  <rect class="box" x="870" y="150" width="150" height="88" fill="#ffffff" stroke="#c62828" />
  <text x="902" y="184" class="step">5. Bewertung durchführen</text>
  <text x="898" y="209" class="sub">Tests, Prüfer</text>
  <text x="898" y="227" class="sub">erledigt oder Schleife</text>

  <path class="arrow" d="M220 194 H270" />
  <path class="arrow" d="M420 194 H470" />
  <path class="arrow" d="M620 194 H670" />
  <path class="arrow" d="M820 194 H870" />

  <path class="arrow" d="M945 238 C945 325 548 334 548 244" />
  <text x="610" y="337" class="sub">Nicht abgeschlossen: Fortsetzung vom letzten sauberen Checkpoint</text>

  <rect class="box" x="195" y="430" width="230" height="82" fill="#ffffff" stroke="#2980b9" />
  <text x="237" y="462" class="step">Krach oder Neuimplementierung</text>
  <text x="232" y="488" class="sub">neuer Worker liest denselben Session-ID</text>

  <rect class="box" x="475" y="430" width="230" height="82" fill="#ffffff" stroke="#e67e22" />
  <text x="521" y="462" class="step">Menschliche Freigabe</text>
  <text x="518" y="488" class="sub">Der Graph schläft – es werden keine Rechenkosten in Rechnung gestellt.</text>

  <rect class="box" x="755" y="430" width="230" height="82" fill="#ffffff" stroke="#27ae60" />
  <text x="807" y="462" class="step">Wiedergabepaket</text>
  <text x="792" y="488" class="sub">Aufforderung, Ereignisse, Spuren, Artefakte</text>

  <path class="soft" d="M310 430 C310 348 405 303 520 244" />
  <path class="soft" d="M590 430 C590 345 640 300 722 244" />
  <path class="soft" d="M870 430 C870 345 858 296 806 244" />
</svg>
