<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 600" font-family="Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="ds2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#37474f"/>
    </marker>
  </defs>

  <rect width="940" height="600" fill="#f8f9fa"/>

  <text x="470" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#263238">Failure modes a long-running agent has to survive</text>
  <text x="470" y="56" text-anchor="middle" font-size="13" fill="#546e7a">Left: the failure. Right: the mitigation and where it lives in the runtime.</text>

  <!-- Column headers -->
  <text x="200" y="92" text-anchor="middle" font-size="12" font-weight="700" fill="#c62828" letter-spacing="0.6">FAILURE MODE</text>
  <text x="740" y="92" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32" letter-spacing="0.6">MITIGATION · RUNTIME HOOK</text>

  <!-- Rows -->
  <!-- Row 1: Premature completion -->
  <g filter="url(#ds2)">
    <rect x="40" y="110" width="320" height="56" rx="8" ry="8" fill="#fce4ec" stroke="#c62828" stroke-width="1.4"/>
    <text x="56" y="132" font-size="13" font-weight="700" fill="#b71c1c">Premature completion</text>
    <text x="56" y="152" font-size="11" fill="#37474f">Agent declares victory after one turn</text>
  </g>
  <path d="M360 138 L 540 138" stroke="#37474f" stroke-width="1.4" fill="none" marker-end="url(#arr2)"/>
  <g filter="url(#ds2)">
    <rect x="540" y="110" width="360" height="56" rx="8" ry="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.4"/>
    <text x="556" y="132" font-size="13" font-weight="700" fill="#1b5e20">Independent reviewer with its own context</text>
    <text x="556" y="152" font-size="11" fill="#37474f">Read-only tools · each check defaults to FAIL</text>
  </g>

  <!-- Row 2: Feature amnesia -->
  <g filter="url(#ds2)">
    <rect x="40" y="178" width="320" height="56" rx="8" ry="8" fill="#fce4ec" stroke="#c62828" stroke-width="1.4"/>
    <text x="56" y="200" font-size="13" font-weight="700" fill="#b71c1c">Feature amnesia</text>
    <text x="56" y="220" font-size="11" fill="#37474f">Each cold boot forgets prior progress</text>
  </g>
  <path d="M360 206 L 540 206" stroke="#37474f" stroke-width="1.4" fill="none" marker-end="url(#arr2)"/>
  <g filter="url(#ds2)">
    <rect x="540" y="178" width="360" height="56" rx="8" ry="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.4"/>
    <text x="556" y="200" font-size="13" font-weight="700" fill="#1b5e20">Initializer re-reads progress files on boot</text>
    <text x="556" y="220" font-size="11" fill="#37474f">PROGRESS.md, feature-list.json · before first model call</text>
  </g>

  <!-- Row 3: Duplicated work -->
  <g filter="url(#ds2)">
    <rect x="40" y="246" width="320" height="56" rx="8" ry="8" fill="#fce4ec" stroke="#c62828" stroke-width="1.4"/>
    <text x="56" y="268" font-size="13" font-weight="700" fill="#b71c1c">Duplicated work after reset</text>
    <text x="56" y="288" font-size="11" fill="#37474f">Same step re-run after process restart</text>
  </g>
  <path d="M360 274 L 540 274" stroke="#37474f" stroke-width="1.4" fill="none" marker-end="url(#arr2)"/>
  <g filter="url(#ds2)">
    <rect x="540" y="246" width="360" height="56" rx="8" ry="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.4"/>
    <text x="556" y="268" font-size="13" font-weight="700" fill="#1b5e20">Checkpoint to Postgres + handoff file</text>
    <text x="556" y="288" font-size="11" fill="#37474f">Append-only log · resume from last completed node</text>
  </g>

  <!-- Row 4: Context anxiety -->
  <g filter="url(#ds2)">
    <rect x="40" y="314" width="320" height="56" rx="8" ry="8" fill="#fce4ec" stroke="#c62828" stroke-width="1.4"/>
    <text x="56" y="336" font-size="13" font-weight="700" fill="#b71c1c">Context anxiety</text>
    <text x="56" y="356" font-size="11" fill="#37474f">Model quits early as window fills</text>
  </g>
  <path d="M360 342 L 540 342" stroke="#37474f" stroke-width="1.4" fill="none" marker-end="url(#arr2)"/>
  <g filter="url(#ds2)">
    <rect x="540" y="314" width="360" height="56" rx="8" ry="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.4"/>
    <text x="556" y="336" font-size="13" font-weight="700" fill="#1b5e20">Cap usage at 200k inside a 1M-token window</text>
    <text x="556" y="356" font-size="11" fill="#37474f">Driver ends the session early, resumes from checkpoint</text>
  </g>

  <!-- Row 5: Stuck loops -->
  <g filter="url(#ds2)">
    <rect x="40" y="382" width="320" height="56" rx="8" ry="8" fill="#fce4ec" stroke="#c62828" stroke-width="1.4"/>
    <text x="56" y="404" font-size="13" font-weight="700" fill="#b71c1c">Stuck loops · retry storms</text>
    <text x="56" y="424" font-size="11" fill="#37474f">Same tool call retried forever</text>
  </g>
  <path d="M360 410 L 540 410" stroke="#37474f" stroke-width="1.4" fill="none" marker-end="url(#arr2)"/>
  <g filter="url(#ds2)">
    <rect x="540" y="382" width="360" height="56" rx="8" ry="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.4"/>
    <text x="556" y="404" font-size="13" font-weight="700" fill="#1b5e20">Cap iterations · backoff · circuit breaker</text>
    <text x="556" y="424" font-size="11" fill="#37474f">Tool-call decorator · Temporal RetryPolicy</text>
  </g>

  <!-- Row 6: Workspace drift -->
  <g filter="url(#ds2)">
    <rect x="40" y="450" width="320" height="56" rx="8" ry="8" fill="#fce4ec" stroke="#c62828" stroke-width="1.4"/>
    <text x="56" y="472" font-size="13" font-weight="700" fill="#b71c1c">Workspace drift</text>
    <text x="56" y="492" font-size="11" fill="#37474f">Agent edits files outside its task</text>
  </g>
  <path d="M360 478 L 540 478" stroke="#37474f" stroke-width="1.4" fill="none" marker-end="url(#arr2)"/>
  <g filter="url(#ds2)">
    <rect x="540" y="450" width="360" height="56" rx="8" ry="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.4"/>
    <text x="556" y="472" font-size="13" font-weight="700" fill="#1b5e20">Per-session workspace, scoped path access</text>
    <text x="556" y="492" font-size="11" fill="#37474f">Deep Agents middleware, or Daytona/Runloop fork</text>
  </g>

  <!-- Row 7: Runaway cost / lost work -->
  <g filter="url(#ds2)">
    <rect x="40" y="518" width="320" height="56" rx="8" ry="8" fill="#fce4ec" stroke="#c62828" stroke-width="1.4"/>
    <text x="56" y="540" font-size="13" font-weight="700" fill="#b71c1c">Runaway cost · lost work on crash</text>
    <text x="56" y="560" font-size="11" fill="#37474f">Budget burn · process or sandbox dies</text>
  </g>
  <path d="M360 546 L 540 546" stroke="#37474f" stroke-width="1.4" fill="none" marker-end="url(#arr2)"/>
  <g filter="url(#ds2)">
    <rect x="540" y="518" width="360" height="56" rx="8" ry="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.4"/>
    <text x="556" y="540" font-size="13" font-weight="700" fill="#1b5e20">Token budget · kill switch · log outside the process</text>
    <text x="556" y="560" font-size="11" fill="#37474f">gen_ai.usage counters · wake(sessionId) to resume</text>
  </g>
</svg>
