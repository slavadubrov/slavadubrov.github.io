<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Aufgabenverwaltung</title>
  <desc id="artifact-desc">Aufgabenverwaltung.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#334155" flood-opacity="0.08" />
    </filter>
    <linearGradient id="grad-core" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #fdba74;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #ea580c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-support" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #93c5fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #93c5fd;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="100%" height="100%" fill="#f8fafc" />

  <g transform="translate(280, 100)" filter="url(#shadow)">
    <rect width="240" height="180" rx="16" fill="url(#grad-core)" stroke="#ea580c" stroke-width="3" />
    <text y="50" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="bold" fill="#9a3412" text-anchor="middle" x="120">Aufgabenverwaltung</text>
    <text y="75" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#9a3412" text-anchor="middle" x="120">(Kerndomäne)</text>
    <line x1="30" y1="90" x2="210" y2="90" stroke="#ea580c" stroke-width="1" />
    <text y="120" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#9a3412" text-anchor="middle" x="120">Aufgaben, Projekte</text>
    <text y="140" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#9a3412" text-anchor="middle" x="120">Prioritäten, Fristen</text>
  </g>


  <g transform="translate(30, 120)" filter="url(#shadow)">
    <rect width="180" height="140" rx="12" fill="url(#grad-support)" stroke="#2563eb" stroke-width="2" />
    <text y="40" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="bold" fill="#1d4ed8" text-anchor="middle" x="90">Zeitplanung</text>
    <text y="60" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#1d4ed8" text-anchor="middle" x="90">(Unterstützend)</text>
    <line x1="20" y1="75" x2="160" y2="75" stroke="#2563eb" stroke-width="1" />
    <text y="100" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#1d4ed8" text-anchor="middle" x="90">Kalender, Zeitfenster</text>
  </g>


  <g transform="translate(590, 120)" filter="url(#shadow)">
    <rect width="180" height="140" rx="12" fill="url(#grad-support)" stroke="#2563eb" stroke-width="2" />
    <text y="40" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="bold" fill="#1d4ed8" text-anchor="middle" x="90">Benachrichtigungen</text>
    <text y="60" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#1d4ed8" text-anchor="middle" x="90">(Unterstützend)</text>
    <line x1="20" y1="75" x2="160" y2="75" stroke="#2563eb" stroke-width="1" />
    <text y="100" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#1d4ed8" text-anchor="middle" x="90">E-Mail, Push</text>
  </g>


  <!-- Arrow: Task Management -> Scheduling -->
  <path d="M 280 190 L 220 190" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)" />
  <text y="185" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" text-anchor="middle" x="250">wird verwendet</text>

  <!-- Arrow: Task Management -> Notifications -->
  <path d="M 520 190 L 580 190" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)" />
  <text y="185" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" text-anchor="middle" x="550">Auslöser</text>

</svg>
