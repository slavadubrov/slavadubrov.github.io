<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 430" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Taskverwaltung, Zeitplanung und Benachrichtigungskontexte</title>
  <desc id="desc">Task Management stellt das zentrale Anwendungsbereich dar. Dabei wird ein unterstützender Scheduling-Kontext genutzt, um über explizite Verträge Fakten bereitzustellen, die von einem allgemeinen Notification-Kontext verarbeitet werden.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="430" rx="22" fill="#0f172a" />
  <text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Kontextkarte des Aufgabenhilfsassistenten</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(35 120)"><rect width="250" height="190" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="125" y="42" text-anchor="middle" font-size="18" font-weight="700" fill="#93c5fd">Zeitplanung</text><text x="125" y="72" text-anchor="middle" font-size="13" fill="#93c5fd">Unterstützender Subdomäne</text><text x="32" y="116" font-size="13" fill="#cbd5e1">Kalender</text><text x="32" y="145" font-size="13" fill="#cbd5e1">Zeitfenster</text><text x="32" y="174" font-size="13" fill="#cbd5e1">Verfügbarkeit</text></g>
    <text x="330" y="220" text-anchor="middle" font-size="11" fill="#94a3b8">Vertragsdatum →</text>
    <g transform="translate(375 95)"><rect width="250" height="240" rx="16" fill="#9a3412" stroke="#ea580c" stroke-width="3" /><text x="125" y="46" text-anchor="middle" font-size="19" font-weight="700" fill="#fdba74">Aufgabenverwaltung</text><text x="125" y="78" text-anchor="middle" font-size="13" fill="#fdba74">Kerndomäne</text><text x="32" y="125" font-size="13" fill="#cbd5e1">Aufgabe und Aufgabenliste</text><text x="32" y="156" font-size="13" fill="#cbd5e1">Frist und Priorität</text><text x="32" y="187" font-size="13" fill="#cbd5e1">Vervollständigungsregeln</text><text x="32" y="218" font-size="13" fill="#cbd5e1">TaskAdded-Ereignis</text></g>
    <text x="670" y="220" text-anchor="middle" font-size="11" fill="#94a3b8">Event-Vertrag →</text>
    <g transform="translate(715 120)"><rect width="250" height="190" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="125" y="42" text-anchor="middle" font-size="18" font-weight="700" fill="#93c5fd">Benachrichtigungen</text><text x="125" y="72" text-anchor="middle" font-size="13" fill="#93c5fd">Generischer Unterdomänenname</text><text x="32" y="116" font-size="13" fill="#cbd5e1">E-Mail-Zustellung</text><text x="32" y="145" font-size="13" fill="#cbd5e1">Push-Bereitstellung</text><text x="32" y="174" font-size="13" fill="#cbd5e1">Lieferbestätigung</text></g>
    <text x="500" y="390" text-anchor="middle" font-size="13" fill="#94a3b8">Die Kontextkarte beschreibt die Geschäftsbeziehungen; sie vorgibt nicht, dass pro Kasten ein Agent vorhanden sein muss.</text>
  </g>
</svg>
