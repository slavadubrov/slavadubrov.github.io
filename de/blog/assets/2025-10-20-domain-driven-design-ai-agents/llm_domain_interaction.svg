<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Model Ausgabe wird über einen Domänenbefehl erzeugt und mittels deterministischer Regeln überprüft</title>
  <desc id="desc">Ein Model sendet einen unzuverlässigen, typisierten Vorschlag aus. Eine Anwendungsgrenze analysiert und normalisiert diesen Vorschlag, autorisiert den Akteur, ruft ein Aggregat auf und speichert den akzeptierten Zustand mittels eines Outbox-Ereignisses. Jede abgelehnte Stufe führt zu einem eigenen Fehlerfall.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="480" rx="22" fill="#0f172a" />
  <text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Eine manuell eingegebene Vorschlagsunterlage ist noch keine gültige Geschäftsoperation.</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(25 120)"><rect width="155" height="125" rx="14" fill="#5b21b6" stroke="#2563eb" stroke-width="2" /><text x="77" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#c4b5fd">Model Adapter</text><text x="77" y="70" text-anchor="middle" font-size="12" fill="#c4b5fd">Taskvorschlag hinzufügen</text><text x="77" y="94" text-anchor="middle" font-size="12" fill="#94a3b8">nicht vertrauenswürdige Werte</text></g>
    <text x="202" y="192" text-anchor="middle" font-size="25" fill="#94a3b8">→</text>
    <g transform="translate(225 120)"><rect width="155" height="125" rx="14" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="77" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Parsen und Normalisieren</text><text x="77" y="70" text-anchor="middle" font-size="12" fill="#93c5fd">Form, Datum, Einheiten</text><text x="77" y="94" text-anchor="middle" font-size="12" fill="#94a3b8">vertrauenswürdiger Kontext</text></g>
    <text x="402" y="192" text-anchor="middle" font-size="25" fill="#94a3b8">→</text>
    <g transform="translate(425 120)"><rect width="155" height="125" rx="14" fill="#9a3412" stroke="#ea580c" stroke-width="2" /><text x="77" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#fdba74">Autorisieren</text><text x="77" y="70" text-anchor="middle" font-size="12" fill="#fdba74">Aktor + Eigentümer</text><text x="77" y="94" text-anchor="middle" font-size="12" fill="#94a3b8">Betriebsumfang</text></g>
    <text x="602" y="192" text-anchor="middle" font-size="25" fill="#94a3b8">→</text>
    <g transform="translate(625 120)"><rect width="155" height="125" rx="14" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="77" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Aggregieren</text><text x="77" y="70" text-anchor="middle" font-size="12" fill="#93c5fd">Invariante durchsetzen</text><text x="77" y="94" text-anchor="middle" font-size="12" fill="#94a3b8">Domänenereignis auslösen</text></g>
    <text x="802" y="192" text-anchor="middle" font-size="25" fill="#94a3b8">→</text>
    <g transform="translate(825 120)"><rect width="150" height="125" rx="14" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" /><text x="75" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Commit</text><text x="75" y="70" text-anchor="middle" font-size="12" fill="#93c5fd">Zustand + Ausgangspostfach</text><text x="75" y="94" text-anchor="middle" font-size="12" fill="#94a3b8">eine Transaktion</text></g>

    <rect x="100" y="320" width="800" height="85" rx="14" fill="#991b1b" stroke="#dc2626" />
    <text x="500" y="351" text-anchor="middle" font-size="16" font-weight="700" fill="#fca5a5">Ablehnung aufgrund eines spezifischen Fehlers vor der Persistenz</text>
    <text x="500" y="382" text-anchor="middle" font-size="13" fill="#fca5a5">ungültiger Vorschlag • fehlender Kontext • nicht autorisierter Akteur • Domänenkonflikt • gleichzeitige Aktualisierung</text>
    <text x="500" y="447" text-anchor="middle" font-size="13" fill="#94a3b8">Die Validierung des Schemas steuert die Darstellung. Die Aggregation steuert die geschäftliche Bedeutung.</text>
  </g>
</svg>
