<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Claude</title>
  <desc id="artifact-desc">Claude.</desc>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>


  <rect width="100%" height="100%" fill="#f8fafc" /><rect width="800" height="500" fill="#f8fafc" rx="10" ry="10" />


  <line x1="150" y1="80" x2="150" y2="450" stroke="#94a3b8" stroke-dasharray="5,5" />
  <line x1="400" y1="80" x2="400" y2="450" stroke="#94a3b8" stroke-dasharray="5,5" />
  <line x1="650" y1="80" x2="650" y2="450" stroke="#94a3b8" stroke-dasharray="5,5" />


  <g transform="translate(100, 30)">
    <rect width="100" height="50" rx="5" ry="5" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
    <text y="30" font-family="Inter, system-ui, sans-serif" font-size="14" text-anchor="middle" font-weight="bold" x="50">Claude</text>
  </g>

  <g transform="translate(350, 30)">
    <rect width="100" height="50" rx="5" ry="5" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2" />
    <text y="30" font-family="Inter, system-ui, sans-serif" font-size="14" text-anchor="middle" font-weight="bold" x="50">MCP-Server</text>
  </g>

  <g transform="translate(600, 30)">
    <rect width="100" height="50" rx="5" ry="5" fill="#fff7ed" stroke="#ea580c" stroke-width="2" />
    <text y="30" font-family="Inter, system-ui, sans-serif" font-size="14" text-anchor="middle" font-weight="bold" x="50">SQLite-Datenbank</text>
  </g>


  <text y="110" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#334155" x="275">1. Werkzeuge initialisieren/Aufzählen</text>
  <line x1="150" y1="120" x2="400" y2="120" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />

  <text y="150" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#334155" x="275">2. Rückgabe der Werkzeugdefinitionen</text>
  <line x1="400" y1="160" x2="150" y2="160" stroke="#334155" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrowhead)" />


  <rect x="50" y="190" width="150" height="30" rx="5" ry="5" fill="#fff7ed" stroke="#ea580c" />
  <text y="210" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" x="125">Benutzer: „Funktion X abrufen“</text>

  <text y="240" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#334155" x="275">3. Aufruf der Funktion: get_feature(key="X")</text>
  <line x1="150" y1="250" x2="400" y2="250" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />


  <text y="280" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#334155" x="525">4. SELECT * FROM features...</text>
  <line x1="400" y1="290" x2="650" y2="290" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />

  <text y="320" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#334155" x="525">5. Rückgabe der Zeilendaten</text>
  <line x1="650" y1="330" x2="400" y2="330" stroke="#334155" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrowhead)" />


  <text y="360" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#334155" x="275">6. JSON-Ergebnis zurückgeben</text>
  <line x1="400" y1="370" x2="150" y2="370" stroke="#334155" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrowhead)" />


  <rect x="50" y="400" width="200" height="30" rx="5" ry="5" fill="#f0fdf4" stroke="#166534" />
  <text y="420" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" x="150">Claude: „Hier ist die Funktion X...“</text>

