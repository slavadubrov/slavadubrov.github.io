<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" font-family="Inter, system-ui, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Konvergenz zu Rust und Apache Arrow</title>
  <desc id="artifact-desc">Konvergenz zu Rust und Apache Arrow.</desc>
  <defs>
    <!-- Animations -->
    <style>
      /* Base invisible class */
      .anim-box { opacity: 0; }

      /* Build from bottom up */
      .layer-3 { animation: fadeSlideUp 0.6s ease-out 0s forwards; }
      .layer-2 { animation: fadeSlideUp 0.6s ease-out 0.4s forwards; }
      .layer-1-a { animation: fadeSlideUp 0.6s ease-out 0.8s forwards; }
      .layer-1-b { animation: fadeSlideUp 0.6s ease-out 1.0s forwards; }
      .layer-1-c { animation: fadeSlideUp 0.6s ease-out 1.2s forwards; }
      .layer-1-d { animation: fadeSlideUp 0.6s ease-out 1.4s forwards; }

      @keyframes fadeSlideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="900" height="450" rx="12" fill="#f8fafc" stroke="#f8fafc" stroke-width="1" />

  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a" x="450">Konvergenz zu Rust und Apache Arrow</text>
  <text y="52" text-anchor="middle" font-size="13" fill="#334155" x="450">Die neue Generation von Motoren basiert auf derselben einheitlichen Grundlage.</text>

  <!-- LAYER 1: The Engines (Top) -->

  <!-- Polars -->
  <g class="anim-box layer-1-a">
    <path d="M 120 160 Q 120 150 130 150 L 250 150 Q 260 150 260 160 L 260 190 L 120 190 Z" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
    <text y="172" text-anchor="middle" font-size="14" font-weight="bold" fill="#1d4ed8" x="190">Polars</text>
    <text y="185" text-anchor="middle" font-size="9" fill="#334155" x="190">DataFrame-Bibliothek</text>
  </g>

  <!-- DataFusion -->
  <g class="anim-box layer-1-b">
    <path d="M 280 160 Q 280 150 290 150 L 410 150 Q 420 150 420 160 L 420 190 L 280 190 Z" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" />
    <text y="172" text-anchor="middle" font-size="14" font-weight="bold" fill="#5b21b6" x="350">Datenfusion</text>
    <text y="185" text-anchor="middle" font-size="9" fill="#334155" x="350">Abfragemotor</text>
  </g>

  <!-- Daft -->
  <g class="anim-box layer-1-c">
    <path d="M 480 160 Q 480 150 490 150 L 610 150 Q 620 150 620 160 L 620 190 L 480 190 Z" fill="#fff7ed" stroke="#ea580c" stroke-width="2" />
    <text y="172" text-anchor="middle" font-size="14" font-weight="bold" fill="#9a3412" x="550">Unsinnig</text>
    <text y="185" text-anchor="middle" font-size="9" fill="#334155" x="550">Multimodal</text>
  </g>

  <!-- Ray -->
  <g class="anim-box layer-1-d">
    <path d="M 640 160 Q 640 150 650 150 L 770 150 Q 780 150 780 160 L 780 190 L 640 190 Z" fill="#f0fdf4" stroke="#166534" stroke-width="2" />
    <text y="172" text-anchor="middle" font-size="14" font-weight="bold" fill="#166534" x="710">Strahlendaten</text>
    <text y="185" text-anchor="middle" font-size="9" fill="#334155" x="710">Verteilte Skalierung</text>
  </g>

  <!-- LAYER 2: The Unified Foundation (Middle) -->
  <g class="anim-box layer-2">
    <!-- Main base container -->
    <rect x="120" y="190" width="660" height="90" fill="#ffffff" stroke="#334155" stroke-width="2" />

    <!-- Divider -->
    <line x1="450" y1="190" x2="450" y2="280" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,4" />

    <!-- Left side: Rust -->
    <text y="230" text-anchor="middle" font-size="20" font-weight="bold" fill="#9a3412" x="285">Rust-Kern</text>
    <text y="250" text-anchor="middle" font-size="12" fill="#334155" x="285">Sichere Konkurrenz und Ausführung</text>

    <!-- Right side: Apache Arrow -->
    <text y="230" text-anchor="middle" font-size="20" font-weight="bold" fill="#1d4ed8" x="615">Apache Arrow</text>
    <text y="250" text-anchor="middle" font-size="12" fill="#334155" x="615">Kolonnenbasiertes In-Memory-Format</text>
  </g>

  <!-- LAYER 3: The Outcomes (Bottom) -->
  <g class="anim-box layer-3">
    <!-- Connecting struts -->
    <rect x="250" y="280" width="10" height="30" fill="#cbd5e1" />
    <rect x="445" y="280" width="10" height="30" fill="#cbd5e1" />
    <rect x="640" y="280" width="10" height="30" fill="#cbd5e1" />

    <rect x="155" y="310" width="200" height="80" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="2" />
    <text y="342" text-anchor="middle" font-size="15" font-weight="bold" fill="#166534" x="255">Keine GC-Pausen</text>
    <text y="365" text-anchor="middle" font-size="11" fill="#334155" x="255">Eigentumsverhältnisse und Ausleihen</text>
    <text y="380" text-anchor="middle" font-size="10" fill="#334155" x="255">Beseitigt Latenzspitzen</text>

    <rect x="350" y="310" width="200" height="80" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
    <text y="342" text-anchor="middle" font-size="15" font-weight="bold" fill="#1d4ed8" x="450">Null-Serialisierung</text>
    <text y="365" text-anchor="middle" font-size="11" fill="#334155" x="450">PyCapsule-Schnittstelle</text>
    <text y="380" text-anchor="middle" font-size="10" fill="#334155" x="450">Keine teuren Python-Kopien</text>

    <rect x="545" y="310" width="200" height="80" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2" />
    <text y="342" text-anchor="middle" font-size="15" font-weight="bold" fill="#9a3412" x="645">Sichere Konkurrenzverarbeitung</text>
    <text y="365" text-anchor="middle" font-size="11" fill="#334155" x="645">Sicherheit zur Kompilierzeit</text>
    <text y="380" text-anchor="middle" font-size="10" fill="#334155" x="645">Keine subtilen Datenkonkurrenzen</text>
  </g>
</svg>
