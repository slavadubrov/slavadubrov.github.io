<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Ausführung in Phasen versus pipeliningbasierte Ausführung</title>
  <desc id="artifact-desc">Ausführung in Phasen versus pipeliningbasierte Ausführung.</desc>
  <defs>
    <style>
      .t-box { opacity: 0; animation: slideInFade 0.5s ease-out forwards; }
      @keyframes slideInFade {
        from { opacity: 0; transform: translateX(-15px); }
        to { opacity: 1; transform: translateX(0); }
      }
      .st-b1 { animation-delay: 0.5s; }
      .st-b2 { animation-delay: 1.0s; }
      .st-b3 { animation-delay: 1.5s; }
      .st-b4 { animation-delay: 2.0s; }
      .st-b5 { animation-delay: 2.5s; }
      .st-b6 { animation-delay: 3.0s; }
      .st-b7 { animation-delay: 3.5s; }
      .st-b8 { animation-delay: 4.0s; }
      .st-b9 { animation-delay: 4.5s; }
    </style>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="900" height="500" rx="12" fill="#f8fafc" stroke="#f8fafc" stroke-width="1" />

  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a" x="450">Ausführung in Phasen versus pipeliningbasierte Ausführung</text>

  <!-- TOP: Stage-based (Spark) -->
  <rect x="25" y="50" width="850" height="190" rx="10" fill="#eff6ff" stroke="#94a3b8" stroke-width="1.5" />
  <text y="75" font-size="14" font-weight="bold" fill="#334155" x="50">stufenbasiert (Spark): Massensynchrones Parallelverarbeiten</text>

  <!-- Timeline labels -->
  <text y="110" font-size="11" font-weight="bold" fill="#334155" x="50">CPU-Kern 1</text>
  <text y="148" font-size="11" font-weight="bold" fill="#334155" x="50">CPU-Kern 2</text>
  <text y="186" font-size="11" font-weight="bold" fill="#334155" x="50">GPU</text>

  <!-- Time axis -->
  <line x1="145" y1="205" x2="730" y2="205" stroke="#cbd5e1" stroke-width="1" />
  <text y="222" text-anchor="middle" font-size="10" fill="#64748b" x="440">Zeit →</text>

  <!-- Stage 1 label -->
  <g class="t-box st-b1">
    <text y="90" text-anchor="middle" font-size="10" font-weight="bold" fill="#334155" x="310">Phase 1 (CPU)</text>
  </g>

  <!-- CPU Core 1: Download+Parse Partition 1 -->
  <g class="t-box st-b1">
    <rect x="150" y="97" width="250" height="22" rx="4" fill="#2563eb" />
    <text y="112" text-anchor="middle" font-size="9" fill="#ffffff" x="275">Partition 1 herunterladen + analysieren</text>
  </g>

  <!-- CPU Core 2: Download+Parse Partition 2 (simultaneously) -->
  <g class="t-box st-b1">
    <rect x="150" y="135" width="250" height="22" rx="4" fill="#2563eb" />
    <text y="150" text-anchor="middle" font-size="9" fill="#ffffff" x="275">Partition 2 herunterladen + analysieren</text>
  </g>

  <!-- GPU idle during Stage 1 -->
  <g class="t-box st-b1">
    <rect x="150" y="173" width="250" height="22" rx="4" fill="#cbd5e1" stroke="#cbd5e1" stroke-width="0.5" />
    <text y="188" text-anchor="middle" font-size="9" fill="#64748b" x="275">Idle (Wartezeit auf CPU)</text>
  </g>

  <!-- Stage barrier -->
  <g class="t-box st-b4">
    <line x1="410" y1="88" x2="410" y2="200" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,3" />
    <text y="200" font-size="9" fill="#991b1b" x="413">Schutzbarriere</text>
  </g>

  <!-- Stage 2 label -->
  <g class="t-box st-b5">
    <text y="90" text-anchor="middle" font-size="10" font-weight="bold" fill="#334155" x="545">Phase 2 (GPU)</text>
  </g>

  <!-- CPU Core 1 idle during Stage 2 -->
  <g class="t-box st-b5">
    <rect x="420" y="97" width="200" height="22" rx="4" fill="#cbd5e1" stroke="#cbd5e1" stroke-width="0.5" />
    <text y="112" text-anchor="middle" font-size="9" fill="#64748b" x="520">Inaktiv</text>
  </g>

  <!-- CPU Core 2 idle during Stage 2 -->
  <g class="t-box st-b5">
    <rect x="420" y="135" width="200" height="22" rx="4" fill="#cbd5e1" stroke="#cbd5e1" stroke-width="0.5" />
    <text y="150" text-anchor="middle" font-size="9" fill="#64748b" x="520">Im Leerlauf</text>
  </g>

  <!-- GPU active during Stage 2 -->
  <g class="t-box st-b5">
    <rect x="420" y="173" width="200" height="22" rx="4" fill="#ea580c" />
    <text y="188" text-anchor="middle" font-size="9" fill="#ffffff" x="520">P1 + P2 einbetten</text>
  </g>

  <g class="t-box st-b7">
    <rect x="770" y="168" width="95" height="30" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1" />
    <text y="188" text-anchor="middle" font-size="11" font-weight="bold" fill="#991b1b" x="818">GPU: &lt;20%</text>
  </g>

  <!-- BOTTOM: Pipelined (Daft/Ray) -->
  <rect x="25" y="270" width="850" height="195" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" />
  <text y="295" font-size="14" font-weight="bold" fill="#9a3412" x="50">Pipeliniertes Streaming (Daft / Ray Data)</text>

  <!-- Timeline labels -->
  <text y="328" font-size="11" font-weight="bold" fill="#334155" x="50">CPU-Kern 1</text>
  <text y="366" font-size="11" font-weight="bold" fill="#334155" x="50">CPU-Kern 2</text>
  <text y="404" font-size="11" font-weight="bold" fill="#334155" x="50">GPU</text>

  <line x1="145" y1="425" x2="730" y2="425" stroke="#cbd5e1" stroke-width="1" />
  <text y="442" text-anchor="middle" font-size="10" fill="#64748b" x="440">Zeit →</text>

  <g class="t-box st-b1">
    <rect x="150" y="315" width="110" height="22" rx="4" fill="#2563eb" />
    <text y="330" text-anchor="middle" font-size="9" fill="#ffffff" x="205">B1 herunterladen</text>
  </g>
  <g class="t-box st-b3">
    <rect x="265" y="315" width="110" height="22" rx="4" fill="#2563eb" />
    <text y="330" text-anchor="middle" font-size="9" fill="#ffffff" x="320">B3 herunterladen</text>
  </g>
  <g class="t-box st-b5">
    <rect x="380" y="315" width="110" height="22" rx="4" fill="#2563eb" />
    <text y="330" text-anchor="middle" font-size="9" fill="#ffffff" x="435">B5 herunterladen</text>
  </g>
  <g class="t-box st-b7">
    <rect x="495" y="315" width="110" height="22" rx="4" fill="#2563eb" />
    <text y="330" text-anchor="middle" font-size="9" fill="#ffffff" x="550">B7 herunterladen</text>
  </g>
  <g class="t-box st-b9">
    <rect x="610" y="315" width="110" height="22" rx="4" fill="#2563eb" />
    <text y="330" text-anchor="middle" font-size="9" fill="#ffffff" x="665">B9 herunterladen</text>
  </g>

  <g class="t-box st-b2">
    <rect x="205" y="353" width="110" height="22" rx="4" fill="#166534" />
    <text y="368" text-anchor="middle" font-size="9" fill="#ffffff" x="260">B1 parsen</text>
  </g>
  <g class="t-box st-b4">
    <rect x="320" y="353" width="110" height="22" rx="4" fill="#166534" />
    <text y="368" text-anchor="middle" font-size="9" fill="#ffffff" x="375">B2 parsen</text>
  </g>
  <g class="t-box st-b6">
    <rect x="435" y="353" width="110" height="22" rx="4" fill="#166534" />
    <text y="368" text-anchor="middle" font-size="9" fill="#ffffff" x="490">B3 parsen</text>
  </g>
  <g class="t-box st-b8">
    <rect x="550" y="353" width="110" height="22" rx="4" fill="#166534" />
    <text y="368" text-anchor="middle" font-size="9" fill="#ffffff" x="605">B4 parsen</text>
  </g>
  <g class="t-box st-b9">
    <rect x="665" y="353" width="55" height="22" rx="4" fill="#166534" />
    <text y="368" text-anchor="middle" font-size="9" fill="#ffffff" x="692">B5</text>
  </g>

  <g class="t-box st-b3">
    <rect x="265" y="391" width="110" height="22" rx="4" fill="#ea580c" />
    <text y="406" text-anchor="middle" font-size="9" fill="#ffffff" x="320">B1 einbetten</text>
  </g>
  <g class="t-box st-b5">
    <rect x="380" y="391" width="110" height="22" rx="4" fill="#ea580c" />
    <text y="406" text-anchor="middle" font-size="9" fill="#ffffff" x="435">B2 einbetten</text>
  </g>
  <g class="t-box st-b7">
    <rect x="495" y="391" width="110" height="22" rx="4" fill="#ea580c" />
    <text y="406" text-anchor="middle" font-size="9" fill="#ffffff" x="550">B3 einbetten</text>
  </g>
  <g class="t-box st-b9">
    <rect x="610" y="391" width="110" height="22" rx="4" fill="#ea580c" />
    <text y="406" text-anchor="middle" font-size="9" fill="#ffffff" x="665">B4 einbetten</text>
  </g>

  <rect x="770" y="385" width="95" height="30" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1" />
  <text y="405" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534" x="818">GPU: ~90%</text>

  <!-- Bottom summary -->
  <rect x="150" y="475" width="600" height="22" rx="6" fill="#ffffff" stroke="#ea580c" stroke-width="1" />
  <text y="491" text-anchor="middle" font-size="11" font-weight="bold" fill="#9a3412" x="450">Netzwerk, CPU und GPU sind gleichzeitig aktiv. Es gibt kein inaktives Hardware-Komponente.</text>
</svg>
