<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Vier Eigentumsgrenzen in pyproject.toml</title>
  <desc id="desc">Vier Karten unterscheiden das Build-System für das Build Backend, das Projekt für veröffentlichte Metadaten, die Abhängigkeitsgruppen für unveröffentlichte Umgebungen sowie die Tool-Namenräume für tool-spezifische Einstellungen.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="650" rx="28" fill="#0f172a" />
  <text x="600" y="68" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="31" font-weight="700">Ein Datei, vier Eigentümer</text>
  <text x="600" y="104" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="17">Eine Einstellung nach ihrem Verbraucher klassifizieren, bevor eine Tabelle ausgewählt wird</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(70 155)"><rect width="500" height="185" rx="20" fill="#1d4ed8" /><text x="30" y="48" fill="#93c5fd" font-size="23" font-weight="700">[Build-System]</text><text x="30" y="88" fill="#93c5fd" font-size="18">Verantwortlicher: Entwicklung von Frontend und Backend</text><text x="30" y="124" fill="#93c5fd" font-size="16">Backend Identität • isolierte Build-Anforderungen</text><text x="30" y="154" fill="#93c5fd" font-size="16">Quellbaum → sdist und wheel</text></g>
    <g transform="translate(630 155)"><rect width="500" height="185" rx="20" fill="#5b21b6" /><text x="30" y="48" fill="#93c5fd" font-size="23" font-weight="700">[Projekt]</text><text x="30" y="88" fill="#93c5fd" font-size="18">Eintragungseigentümer: Paketkonsumenten</text><text x="30" y="124" fill="#c4b5fd" font-size="16">Identität • Anforderungen an Runtime • Zusatzfunktionen</text><text x="30" y="154" fill="#c4b5fd" font-size="16">als Vertriebsmetadaten veröffentlicht</text></g>
    <g transform="translate(70 385)"><rect width="500" height="185" rx="20" fill="#166534" /><text x="30" y="48" fill="#93c5fd" font-size="23" font-weight="700">[Abhängigkeitsgruppen]</text><text x="30" y="88" fill="#93c5fd" font-size="18">Eigentümer: lokaler Workflow</text><text x="30" y="124" fill="#93c5fd" font-size="16">Test • Linting • Dokumentation • Umgebungen außerhalb von Paketen</text><text x="30" y="154" fill="#93c5fd" font-size="16">nicht in den Paketmetadaten veröffentlicht</text></g>
    <g transform="translate(630 385)"><rect width="500" height="185" rx="20" fill="#9a3412" /><text x="30" y="48" fill="#fdba74" font-size="23" font-weight="700">[Tool.*]</text><text x="30" y="88" fill="#fdba74" font-size="18">Einheit: das benannte Tool</text><text x="30" y="124" fill="#fdba74" font-size="16">von der Tool-Definition vorgegebene Schlüssel und Semantik</text><text x="30" y="154" fill="#fdba74" font-size="16">kein gemeinsames Schema zwischen Namespace</text></g>
  </g>
</svg>
