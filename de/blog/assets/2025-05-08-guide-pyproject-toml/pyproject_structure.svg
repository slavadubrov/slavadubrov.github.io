<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">pyproject.toml</title>
  <desc id="artifact-desc">pyproject.toml.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="100%" height="100%" fill="#f8fafc" /><rect x="0" y="0" width="800" height="500" fill="#0f172a" rx="16" ry="16" />


  <rect x="50" y="50" width="700" height="400" fill="#1d4ed8" stroke="#94a3b8" stroke-width="2" rx="12" ry="12" />
  <text y="90" fill="#86efac" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" x="400">pyproject.toml</text>


  <g transform="translate(80, 120)">
    <rect x="0" y="0" width="300" height="140" fill="#1d4ed8" stroke="#dc2626" stroke-width="2" rx="8" ry="8" />
    <text y="30" fill="#fca5a5" font-family="SFMono-Regular, Consolas, monospace" font-size="18" font-weight="bold" x="20">[Build-System]</text>
    <text y="60" fill="#86efac" font-family="SFMono-Regular, Consolas, monospace" font-size="14" x="20">erfordert = ["Küken"]</text>
    <text y="85" fill="#86efac" font-family="SFMono-Regular, Consolas, monospace" font-size="14" x="20">build-backend = "hatchling.build"</text>
    <text y="115" fill="#93c5fd" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-style="italic" x="20"># Wie das Paket erstellt wird</text>
  </g>


  <g transform="translate(420, 120)">
    <rect x="0" y="0" width="300" height="140" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" rx="8" ry="8" />
    <text y="30" fill="#93c5fd" font-family="SFMono-Regular, Consolas, monospace" font-size="18" font-weight="bold" x="20">[Projekt]</text>
    <text y="60" fill="#86efac" font-family="SFMono-Regular, Consolas, monospace" font-size="14" x="20">name = „meine-App“</text>
    <text y="85" fill="#86efac" font-family="SFMono-Regular, Consolas, monospace" font-size="14" x="20">Abhängigkeiten = ["fastapi"]</text>
    <text y="115" fill="#93c5fd" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-style="italic" x="20"># Metadaten und Laufzeitabhängigkeiten</text>
  </g>


  <g transform="translate(80, 290)">
    <rect x="0" y="0" width="640" height="130" fill="#1d4ed8" stroke="#16a34a" stroke-width="2" rx="8" ry="8" />
    <text y="30" fill="#86efac" font-family="SFMono-Regular, Consolas, monospace" font-size="18" font-weight="bold" x="20">[Werkzeug.*]</text>


    <g transform="translate(20, 50)">
      <rect x="0" y="0" width="280" height="60" fill="#334155" rx="4" ry="4" />
      <text y="25" fill="#86efac" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="bold" x="10">[tool.ruff]</text>
      <text y="45" fill="#86efac" font-family="SFMono-Regular, Consolas, monospace" font-size="14" x="10">Längenwert der Linie = 100</text>
    </g>


    <g transform="translate(320, 50)">
      <rect x="0" y="0" width="280" height="60" fill="#334155" rx="4" ry="4" />
      <text y="25" fill="#86efac" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="bold" x="10">[tool.pytest.ini_options]</text>
      <text y="45" fill="#86efac" font-family="SFMono-Regular, Consolas, monospace" font-size="14" x="10">addopts = "-ra"</text>
    </g>
  </g>
</svg>
