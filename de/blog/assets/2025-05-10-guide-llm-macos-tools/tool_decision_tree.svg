<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Workflow zur Auswahl eines lokalen macOS LLM-Tools</title>
  <desc id="desc">Eine Aufgabe sowie eine Model-Referenzlinie führen zu vier Workflow-Optionen: ein verwalteter lokaler Dienst mit Ollama, die Erkundung am Desktop mithilfe von LM Studio, direkte GGUF-Steuerung über llama.cpp oder Apple-eigene Python-Lösungen mit MLX-LM. Alle Pfade führen letztendlich zum gleichen Arbeitslasttyp Benchmark.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="480" rx="22" fill="#0f172a" /><text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Wählen Sie die Steuerfläche aus und geben Sie anschließend Benchmark ein.</text>
  <g font-family="Inter, system-ui, sans-serif"><rect x="345" y="90" width="310" height="70" rx="14" fill="#1e293b" stroke="#64748b" /><text x="500" y="119" text-anchor="middle" font-size="16" font-weight="700" fill="#e2e8f0">Aufgabe + Checkpoint-Referenzlinie</text><text x="500" y="143" text-anchor="middle" font-size="12" fill="#94a3b8">Qualität, Lizenz, Kontext, Artefakt</text>
  <text x="500" y="195" text-anchor="middle" font-size="28" fill="#94a3b8">↓</text>
  <g transform="translate(30 220)"><rect width="215" height="115" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="107" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#93c5fd">Ollama</text><text x="107" y="68" text-anchor="middle" font-size="12" fill="#93c5fd">verwaltete CLI + API</text><text x="107" y="91" text-anchor="middle" font-size="11" fill="#94a3b8">Anwendungsdienst</text></g>
  <g transform="translate(270 220)"><rect width="215" height="115" rx="14" fill="#5b21b6" stroke="#2563eb" /><text x="107" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#c4b5fd">LM Studio</text><text x="107" y="68" text-anchor="middle" font-size="12" fill="#93c5fd">Desktop-Plattform + SDKs + APIs</text><text x="107" y="91" text-anchor="middle" font-size="11" fill="#94a3b8">menschliche Erkundung</text></g>
  <g transform="translate(515 220)"><rect width="215" height="115" rx="14" fill="#9a3412" stroke="#ea580c" /><text x="107" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#fdba74">llama.cpp</text><text x="107" y="68" text-anchor="middle" font-size="12" fill="#fdba74">direkte Steuerung von GGUF durch Runtime</text><text x="107" y="91" text-anchor="middle" font-size="11" fill="#94a3b8">Flags + Embedding</text></g>
  <g transform="translate(755 220)"><rect width="215" height="115" rx="14" fill="#1d4ed8" stroke="#2563eb" /><text x="107" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#93c5fd">MLX-LM</text><text x="107" y="68" text-anchor="middle" font-size="12" fill="#93c5fd">Apple-eigene Python-Implementierung</text><text x="107" y="91" text-anchor="middle" font-size="11" fill="#94a3b8">Experimente und Feinabstimmung</text></g>
  <rect x="180" y="385" width="640" height="55" rx="12" fill="#1d4ed8" stroke="#2563eb" /><text x="500" y="418" text-anchor="middle" font-size="14" font-weight="700" fill="#93c5fd">Derselbe Prompts • derselbe Kontext • vergleichbare Genauigkeit • gemessene Speicherkapazität</text></g>
</svg>
