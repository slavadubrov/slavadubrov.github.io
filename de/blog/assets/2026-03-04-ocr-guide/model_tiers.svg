<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">OCR-Modell-Ebenen (2026)</title>
  <desc id="artifact-desc">OCR-Modell-Ebenen (2026).</desc>
  <defs>
    <!-- Background grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width="1" />
    </pattern>

    <!-- Drop shadow for the cards -->
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>

    <!-- Clip paths for the rounded card corners to contain the headers/footers -->
    <clipPath id="clip1"><rect x="120" y="300" width="180" height="110" rx="8" /></clipPath>
    <clipPath id="clip2"><rect x="330" y="170" width="200" height="110" rx="8" /></clipPath>
    <clipPath id="clip3"><rect x="550" y="40" width="220" height="110" rx="8" /></clipPath>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" />
  <rect width="100%" height="100%" fill="#f8fafc" />

  <!-- Main Title -->
  <text y="40" font-family="Inter, system-ui, sans-serif'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="24" font-weight="bold" fill="#1d4ed8" text-anchor="middle" x="400">OCR-Modell-Ebenen (2026)</text>
  <text y="65" font-family="Inter, system-ui, sans-serif'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#64748b" text-anchor="middle" x="400">Kosten- und Komplexitätsanalyse im Verhältnis zur Leistungsfähigkeit</text>

  <!-- Axis Lines -->
  <!-- Y Axis (Capability) -->
  <line x1="80" y1="440" x2="80" y2="80" stroke="#94a3b8" stroke-width="2" />
  <polygon points="80,70 75,80 85,80" fill="#94a3b8" />
  <text y="260" font-family="Inter, system-ui, sans-serif'Segoe UI', sans-serif" font-size="13" font-weight="bold" fill="#64748b" text-anchor="middle" x="60" transform="rotate(-90 60,260)">Funktionalität / Generalisierung</text>

  <!-- X Axis (Cost) -->
  <line x1="80" y1="440" x2="750" y2="440" stroke="#94a3b8" stroke-width="2" />
  <polygon points="760,440 750,435 750,445" fill="#94a3b8" />
  <text y="475" font-family="Inter, system-ui, sans-serif'Segoe UI', sans-serif" font-size="13" font-weight="bold" fill="#64748b" text-anchor="middle" x="415">Kosten-/Rechenanforderungen</text>

  <!-- Trend Line (Drawn behind the cards) -->
  <path d="M 80 440 Q 350 400 750 150" fill="none" stroke="#ea580c" stroke-width="4" stroke-dasharray="8,4" opacity="0.4" />


  <!-- TIER 1: TRADITIONAL OCR -->
  <!-- Base card with drop shadow and border -->
  <rect x="120" y="300" width="180" height="110" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)" />
  <g clip-path="url(#clip1)">
    <!-- Header -->
    <rect x="120" y="300" width="180" height="32" fill="#16a34a" />
    <text y="321" font-family="Inter, system-ui, sans-serif'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle" x="210">Traditionelle OCR-Technologie</text>
    <!-- Highlight Footer -->
    <rect x="120" y="385" width="180" height="25" fill="#f0fdf4" />
    <text y="402" font-family="Inter, system-ui, sans-serif'Segoe UI', sans-serif" font-size="11" font-weight="bold" fill="#166534" text-anchor="middle" x="210">Am besten geeignet für: saubere Scans</text>
  </g>
  <!-- Body Text -->
  <text y="354" font-family="Inter, system-ui, sans-serif'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#1d4ed8" x="130">CPU-effizient, schnell</text>
  <text y="374" font-family="Inter, system-ui, sans-serif'Segoe UI', sans-serif" font-size="12" fill="#64748b" x="130">Tesseract, PaddleOCR</text>


  <!-- TIER 2: SPECIALIZED VLMs -->
  <!-- Base card with drop shadow and border -->
  <rect x="330" y="170" width="200" height="110" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)" />
  <g clip-path="url(#clip2)">
    <!-- Header -->
    <rect x="330" y="170" width="200" height="32" fill="#2563eb" />
    <text y="191" font-family="Inter, system-ui, sans-serif'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle" x="430">Spezialisierte VLMs</text>
    <!-- Highlight Footer -->
    <rect x="330" y="255" width="200" height="25" fill="#eff6ff" />
    <text y="272" font-family="Inter, system-ui, sans-serif'Segoe UI', sans-serif" font-size="11" font-weight="bold" fill="#1d4ed8" text-anchor="middle" x="430">Am besten geeignet für: Quittungen / Formulare</text>
  </g>
  <!-- Body Text -->
  <text y="224" font-family="Inter, system-ui, sans-serif'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#1d4ed8" x="340">Layout/Struktur optimiert</text>
  <text y="244" font-family="Inter, system-ui, sans-serif'Segoe UI', sans-serif" font-size="12" fill="#64748b" x="340">dots.ocr, DeepSeek-OCR</text>


  <!-- TIER 3: FRONTIER VLMs -->
  <!-- Base card with drop shadow and border -->
  <rect x="550" y="40" width="220" height="110" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)" />
  <g clip-path="url(#clip3)">
    <!-- Header -->
    <rect x="550" y="40" width="220" height="32" fill="#7c3aed" />
    <text y="61" font-family="Inter, system-ui, sans-serif'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle" x="660">Frontier-VLMs</text>
    <!-- Highlight Footer -->
    <rect x="550" y="125" width="220" height="25" fill="#faf5ff" />
    <text y="142" font-family="Inter, system-ui, sans-serif'Segoe UI', sans-serif" font-size="11" font-weight="bold" fill="#5b21b6" text-anchor="middle" x="660" transform="translate(-12.22 0.00)">Am besten geeignet für: Komplexe Dokumente/Charts</text>
  </g>
  <!-- Body Text -->
  <text y="94" font-family="Inter, system-ui, sans-serif'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#1d4ed8" x="560">Logisches Denken &amp; VQA</text>
  <text y="114" font-family="Inter, system-ui, sans-serif'Segoe UI', sans-serif" font-size="12" fill="#64748b" x="560">Gemini 3 Flash, GPT-5.2</text>

</svg>
