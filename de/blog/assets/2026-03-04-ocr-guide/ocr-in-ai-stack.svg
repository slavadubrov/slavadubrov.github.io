<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" font-family="Inter, system-ui, sans-serif'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="How OCR fits into the modern AI stack: documents flow through OCR into RAG pipelines, AI agents, and enterprise assistants" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Wie OCR in den modernen AI-Stack integriert ist: Dokumente fließen über OCR in RAG Pipelines, AI Agents sowie Unternehmensassistenten</title>
  <!-- Background -->
  <rect width="920" height="420" fill="#ffffff" rx="8" />
  <defs>
    <!-- Background grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width="1" />
    </pattern>

    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>

    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="gradOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ea580c" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <linearGradient id="gradPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="gradGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16a34a" />
      <stop offset="100%" stop-color="#166534" />
    </linearGradient>

    <!-- Arrow markers -->
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" />
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ea580c" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="100%" height="100%" fill="#f8fafc" />

  <!-- Title -->
  <text x="460" y="32" font-size="20" font-weight="bold" fill="#1d4ed8" text-anchor="middle">OCR im modernen AI-Stack</text>
  <text x="460" y="52" font-size="13" fill="#64748b" text-anchor="middle">Von Rohdokumenten zu durch AI generierten Erkenntnissen</text>

  <!-- ==================== LEFT: Document Sources ==================== -->
  <g transform="translate(30, 80)">
    <!-- Section header -->
    <rect width="200" height="32" rx="6" fill="url(#gradBlue)" />
    <text x="100" y="21" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Dokumentquellen</text>

    <!-- Cards -->
    <rect y="42" width="200" height="50" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)" />
    <text x="36" y="63" font-size="22">📄</text>
    <text x="68" y="63" font-size="12" font-weight="600" fill="#1d4ed8">PDFs und Word-Dokumente</text>
    <text x="68" y="80" font-size="10" fill="#64748b">Verträge, Berichte, Handbücher</text>

    <rect y="102" width="200" height="50" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)" />
    <text x="36" y="123" font-size="22">🖼️</text>
    <text x="68" y="123" font-size="12" font-weight="600" fill="#1d4ed8">Gescannte Dokumente</text>
    <text x="68" y="140" font-size="10" fill="#64748b">Rechnungen, Quittungen, Formulare</text>

    <rect y="162" width="200" height="50" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)" />
    <text x="36" y="183" font-size="22">📸</text>
    <text x="68" y="183" font-size="12" font-weight="600" fill="#1d4ed8">Fotos und Screenshot-Aufnahmen</text>
    <text x="68" y="200" font-size="10" fill="#64748b">Weißbretter, Schilder, Benutzeroberfläche</text>

    <rect y="222" width="200" height="50" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)" />
    <text x="36" y="243" font-size="22">📧</text>
    <text x="68" y="243" font-size="12" font-weight="600" fill="#1d4ed8">E-Mails und Anhänge</text>
    <text x="68" y="260" font-size="10" fill="#64748b">eingebettete Bilder, PDF-Dateien</text>
  </g>

  <!-- ==================== CENTER: OCR Layer ==================== -->
  <g transform="translate(310, 80)">
    <!-- Section header -->
    <rect width="300" height="32" rx="6" fill="url(#gradOrange)" />
    <text x="150" y="21" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">OCR Schicht</text>

    <!-- Main box -->
    <rect y="42" width="300" height="230" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadow)" />

    <!-- Text extraction -->
    <text x="150" y="72" font-size="13" font-weight="bold" fill="#9a3412" text-anchor="middle">Text- und Strukturextraktion</text>

    <rect x="20" y="86" width="120" height="36" rx="5" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
    <text x="80" y="100" font-size="10" font-weight="600" fill="#1d4ed8" text-anchor="middle">Traditionelle OCR</text>
    <text x="80" y="114" font-size="9" fill="#64748b" text-anchor="middle">Tesseract, PaddleOCR</text>

    <rect x="160" y="86" width="120" height="36" rx="5" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
    <text x="220" y="100" font-size="10" font-weight="600" fill="#1d4ed8" text-anchor="middle">VLMs</text>
    <text x="220" y="114" font-size="9" fill="#64748b" text-anchor="middle">Gemini, Claude, GPT</text>

    <rect x="20" y="132" width="120" height="36" rx="5" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
    <text x="80" y="146" font-size="10" font-weight="600" fill="#1d4ed8" text-anchor="middle">Spezialisierter Models</text>
    <text x="80" y="160" font-size="9" fill="#64748b" text-anchor="middle">Punkte.ocr, Qwen3-VL</text>

    <rect x="160" y="132" width="120" height="36" rx="5" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
    <text x="220" y="146" font-size="10" font-weight="600" fill="#1d4ed8" text-anchor="middle">Layout-Analyse</text>
    <text x="220" y="160" font-size="9" fill="#64748b" text-anchor="middle">Tabellen, Überschriften, Listen</text>

    <!-- Output arrow label -->
    <line x1="150" y1="180" x2="150" y2="210" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)" />
    <rect x="55" y="215" width="190" height="44" rx="6" fill="#ea580c" opacity="0.12" />
    <text x="150" y="234" font-size="11" font-weight="bold" fill="#9a3412" text-anchor="middle">Ausgabe: Reiner Text, Tabellen,</text>
    <text x="150" y="250" font-size="11" font-weight="bold" fill="#9a3412" text-anchor="middle">Struktur sowie Metadaten</text>
  </g>

  <!-- ==================== RIGHT: AI Consumers ==================== -->
  <g transform="translate(690, 80)">
    <!-- Section header -->
    <rect width="200" height="32" rx="6" fill="url(#gradPurple)" />
    <text x="100" y="21" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Downstream-Systeme</text>

    <!-- RAG Pipeline -->
    <rect y="42" width="200" height="70" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)" />
    <text x="100" y="63" font-size="12" font-weight="bold" fill="#5b21b6" text-anchor="middle">RAG Pipelines</text>
    <text x="100" y="80" font-size="9" fill="#64748b" text-anchor="middle">Chunk → Einbetten → Vektor-Datenbank</text>
    <text x="100" y="94" font-size="9" fill="#64748b" text-anchor="middle">→ Abrufen → LLM Antwort</text>

    <!-- AI Agents -->
    <rect y="122" width="200" height="56" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)" />
    <text x="100" y="143" font-size="12" font-weight="bold" fill="#5b21b6" text-anchor="middle">AI Agents</text>
    <text x="100" y="160" font-size="9" fill="#64748b" text-anchor="middle">Dokumentenlesung, Formausfüllung</text>

    <!-- Enterprise QA -->
    <rect y="188" width="200" height="56" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)" />
    <text x="100" y="209" font-size="12" font-weight="bold" fill="#5b21b6" text-anchor="middle">Unternehmensweite Qualitätskontrolle</text>
    <text x="100" y="226" font-size="9" fill="#64748b" text-anchor="middle">Vertragssuche, Konformitätsprüfung, Wissensdatenbanken</text>

    <!-- Domain Apps -->
    <rect y="254" width="200" height="56" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)" />
    <text x="100" y="275" font-size="12" font-weight="bold" fill="#5b21b6" text-anchor="middle">Anwendungen im Domänenbereich</text>
    <text x="100" y="292" font-size="9" fill="#64748b" text-anchor="middle">Medizinisch, rechtlich, finanziell</text>
  </g>

  <!-- ==================== Arrows: Sources → OCR ==================== -->
  <line x1="230" y1="200" x2="305" y2="200" stroke="#2563eb" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-blue)" />

  <!-- ==================== Arrows: OCR → Consumers ==================== -->
  <line x1="610" y1="200" x2="685" y2="200" stroke="#7c3aed" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-gray)" />

  <!-- ==================== Bottom callout ==================== -->
  <g transform="translate(230, 365)">
    <rect width="460" height="40" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1" />
    <text x="230" y="17" font-size="11" font-weight="bold" fill="#9a3412" text-anchor="middle">Fehlender Text oder fehlerhafte Struktur beeinträchtigt die Qualität der nachfolgenden Verarbeitungsschritte.</text>
    <text x="230" y="33" font-size="10" fill="#64748b" text-anchor="middle">Bewerten Sie die Extraktion vor den Entscheidungen bezüglich Retrieval, Generierung und Agent.</text>
  </g>
</svg>
