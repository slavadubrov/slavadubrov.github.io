<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1565c0"/>
    </marker>
    <marker id="arrg" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2e7d32"/>
    </marker>
    <marker id="arrr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c62828"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="460" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a">Cross-Encoder vs Bi-Encoder Architecture</text>

  <!-- LEFT: Cross-Encoder -->
  <rect x="20" y="45" width="420" height="420" rx="10" fill="#fafafa" stroke="#ccc" stroke-width="1"/>
  <text x="230" y="72" text-anchor="middle" font-size="15" font-weight="bold" fill="#1565c0">Cross-Encoder (Original GLiNER)</text>

  <!-- Input: combined -->
  <rect x="50" y="90" width="360" height="40" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="230" y="114" text-anchor="middle" font-size="11" fill="#1565c0">[ENT] person [ENT] org [SEP] Bill Gates founded Microsoft</text>

  <line x1="230" y1="130" x2="230" y2="155" stroke="#1565c0" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Single encoder -->
  <rect x="80" y="160" width="300" height="50" rx="8" fill="#1565c0" stroke="#0d47a1" stroke-width="2"/>
  <text x="230" y="183" text-anchor="middle" font-size="13" fill="white" font-weight="bold">Single DeBERTa Encoder</text>
  <text x="230" y="200" text-anchor="middle" font-size="10" fill="#bbdefb">Joint attention over labels + text</text>

  <line x1="230" y1="210" x2="230" y2="235" stroke="#1565c0" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Scoring -->
  <rect x="100" y="240" width="260" height="40" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="230" y="264" text-anchor="middle" font-size="12" fill="#e65100" font-weight="bold">Span × Entity Dot Product</text>

  <line x1="230" y1="280" x2="230" y2="305" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrg)"/>

  <!-- Output -->
  <rect x="110" y="310" width="240" height="35" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="230" y="332" text-anchor="middle" font-size="12" fill="#1b5e20" font-weight="bold">Entity Predictions</text>

  <!-- Problem callout -->
  <rect x="55" y="365" width="350" height="85" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1.5"/>
  <text x="230" y="385" text-anchor="middle" font-size="11" font-weight="bold" fill="#c62828">Scaling Limitation</text>
  <text x="230" y="402" text-anchor="middle" font-size="10" fill="#b71c1c">Must re-encode ALL labels with text jointly</text>
  <text x="230" y="418" text-anchor="middle" font-size="10" fill="#b71c1c">1,024 labels → 98.7% throughput degradation</text>
  <text x="230" y="434" text-anchor="middle" font-size="10" fill="#b71c1c">Practical limit: ~30 entity types</text>

  <!-- RIGHT: Bi-Encoder -->
  <rect x="480" y="45" width="420" height="420" rx="10" fill="#fafafa" stroke="#ccc" stroke-width="1"/>
  <text x="690" y="72" text-anchor="middle" font-size="15" font-weight="bold" fill="#2e7d32">GLiNER Bi-Encoder</text>

  <!-- Two separate inputs -->
  <rect x="500" y="90" width="150" height="40" rx="6" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="575" y="108" text-anchor="middle" font-size="11" fill="#4a148c">person, org, date</text>
  <text x="575" y="122" text-anchor="middle" font-size="9" fill="#888">Entity Types</text>

  <rect x="670" y="90" width="210" height="40" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="775" y="114" text-anchor="middle" font-size="11" fill="#1565c0">Bill Gates founded Microsoft</text>

  <line x1="575" y1="130" x2="575" y2="155" stroke="#6a1b9a" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="775" y1="130" x2="775" y2="155" stroke="#1565c0" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Two separate encoders -->
  <rect x="500" y="160" width="150" height="50" rx="8" fill="#6a1b9a" stroke="#4a148c" stroke-width="2"/>
  <text x="575" y="183" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Label Encoder</text>
  <text x="575" y="200" text-anchor="middle" font-size="9" fill="#e1bee7">BGE / MiniLM</text>

  <rect x="670" y="160" width="210" height="50" rx="8" fill="#1565c0" stroke="#0d47a1" stroke-width="2"/>
  <text x="775" y="183" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Text Encoder</text>
  <text x="775" y="200" text-anchor="middle" font-size="9" fill="#bbdefb">ModernBERT (Ettin)</text>

  <!-- Cache callout -->
  <rect x="500" y="220" width="150" height="25" rx="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1" stroke-dasharray="4"/>
  <text x="575" y="237" text-anchor="middle" font-size="10" fill="#2e7d32" font-weight="bold">Pre-computed + Cached</text>

  <line x1="575" y1="245" x2="640" y2="255" stroke="#6a1b9a" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="775" y1="210" x2="720" y2="255" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Late fusion scoring -->
  <rect x="600" y="255" width="160" height="40" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="680" y="279" text-anchor="middle" font-size="12" fill="#e65100" font-weight="bold">Late-Fusion Dot Product</text>

  <line x1="680" y1="295" x2="680" y2="315" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrg)"/>

  <!-- Output -->
  <rect x="570" y="320" width="240" height="35" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="690" y="342" text-anchor="middle" font-size="12" fill="#1b5e20" font-weight="bold">Entity Predictions</text>

  <!-- Advantage callout -->
  <rect x="510" y="365" width="370" height="85" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="695" y="385" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">Scaling Advantage</text>
  <text x="695" y="402" text-anchor="middle" font-size="10" fill="#1b5e20">Labels encoded once, cached indefinitely</text>
  <text x="695" y="418" text-anchor="middle" font-size="10" fill="#1b5e20">1,024 labels → only 5.2% throughput reduction</text>
  <text x="695" y="434" text-anchor="middle" font-size="10" fill="#1b5e20">130x throughput improvement at scale</text>

  <!-- VS divider -->
  <text x="460" y="260" text-anchor="middle" font-size="20" font-weight="bold" fill="#999">vs</text>
</svg>
