<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" role="img" aria-labelledby="title desc">
  <title id="title">Checkpoint, runtime, and quantization selection workflow</title>
  <desc id="desc">The workflow begins with a task contract, selects a checkpoint on high-quality evaluation, verifies a compatible runtime, measures memory, compares representations, and benchmarks the complete release artifact.</desc>
  <rect width="1000" height="480" rx="22" fill="#0f172a"/><text x="500" y="48" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Choose behavior before compression</text>
  <g font-family="system-ui, sans-serif">
    <g transform="translate(30 120)"><rect width="135" height="120" rx="14" fill="#1e293b" stroke="#64748b"/><text x="67" y="35" text-anchor="middle" font-size="15" font-weight="700" fill="#e2e8f0">1. Task contract</text><text x="67" y="68" text-anchor="middle" font-size="11" fill="#cbd5e1">quality • license</text><text x="67" y="89" text-anchor="middle" font-size="11" fill="#94a3b8">interface • context</text></g><text x="180" y="188" font-size="23" fill="#94a3b8">→</text>
    <g transform="translate(205 120)"><rect width="135" height="120" rx="14" fill="#2e1065" stroke="#8b5cf6"/><text x="67" y="35" text-anchor="middle" font-size="15" font-weight="700" fill="#c4b5fd">2. Checkpoint</text><text x="67" y="68" text-anchor="middle" font-size="11" fill="#ddd6fe">exact revision</text><text x="67" y="89" text-anchor="middle" font-size="11" fill="#94a3b8">high-quality baseline</text></g><text x="355" y="188" font-size="23" fill="#94a3b8">→</text>
    <g transform="translate(380 120)"><rect width="135" height="120" rx="14" fill="#422006" stroke="#f59e0b"/><text x="67" y="35" text-anchor="middle" font-size="15" font-weight="700" fill="#fbbf24">3. Runtime</text><text x="67" y="68" text-anchor="middle" font-size="11" fill="#fef3c7">architecture</text><text x="67" y="89" text-anchor="middle" font-size="11" fill="#94a3b8">kernel + hardware</text></g><text x="530" y="188" font-size="23" fill="#94a3b8">→</text>
    <g transform="translate(555 120)"><rect width="135" height="120" rx="14" fill="#172554" stroke="#3b82f6"/><text x="67" y="35" text-anchor="middle" font-size="15" font-weight="700" fill="#93c5fd">4. Memory</text><text x="67" y="68" text-anchor="middle" font-size="11" fill="#dbeafe">weights + KV</text><text x="67" y="89" text-anchor="middle" font-size="11" fill="#94a3b8">workspace + headroom</text></g><text x="705" y="188" font-size="23" fill="#94a3b8">→</text>
    <g transform="translate(730 120)"><rect width="135" height="120" rx="14" fill="#052e2b" stroke="#14b8a6"/><text x="67" y="35" text-anchor="middle" font-size="15" font-weight="700" fill="#5eead4">5. Representation</text><text x="67" y="68" text-anchor="middle" font-size="11" fill="#ccfbf1">precision / quant</text><text x="67" y="89" text-anchor="middle" font-size="11" fill="#94a3b8">provenance + hash</text></g><text x="880" y="188" font-size="23" fill="#94a3b8">→</text>
    <g transform="translate(900 120)"><rect width="75" height="120" rx="14" fill="#164e63" stroke="#06b6d4"/><text x="37" y="35" text-anchor="middle" font-size="13" font-weight="700" fill="#67e8f9">6. Test</text><text x="37" y="68" text-anchor="middle" font-size="10" fill="#cffafe">release</text><text x="37" y="88" text-anchor="middle" font-size="10" fill="#94a3b8">unit</text></g>
    <rect x="150" y="315" width="700" height="80" rx="14" fill="#450a0a" stroke="#ef4444"/><text x="500" y="347" text-anchor="middle" font-size="16" font-weight="700" fill="#fca5a5">Any failed gate returns to the preceding choice</text><text x="500" y="375" text-anchor="middle" font-size="12" fill="#fecaca">A smaller file is not a successful release if quality, context, or concurrency fails.</text>
    <text x="500" y="444" text-anchor="middle" font-size="13" fill="#94a3b8">Benchmark the exact checkpoint, conversion, runtime, and hardware together.</text>
  </g>
</svg>
