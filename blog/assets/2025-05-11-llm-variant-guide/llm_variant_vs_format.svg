<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" role="img" aria-labelledby="title desc">
  <title id="title">Six independent layers in an open-weight model artifact</title>
  <desc id="desc">A model artifact is described by family and revision, training role, architecture, numeric representation, container and layout, and runtime. Arrows show that each layer constrains the next without being equivalent to it.</desc>
  <rect width="1000" height="500" rx="22" fill="#0f172a"/><text x="500" y="48" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">A model name mixes several independent layers</text>
  <g font-family="system-ui, sans-serif">
    <g transform="translate(30 105)"><rect width="285" height="125" rx="15" fill="#1e293b" stroke="#64748b"/><text x="142" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#e2e8f0">1. Family + revision</text><text x="142" y="70" text-anchor="middle" font-size="13" fill="#cbd5e1">weights • tokenizer • license</text><text x="142" y="96" text-anchor="middle" font-size="12" fill="#94a3b8">repository + commit</text></g>
    <g transform="translate(357 105)"><rect width="285" height="125" rx="15" fill="#2e1065" stroke="#8b5cf6"/><text x="142" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#c4b5fd">2. Training role</text><text x="142" y="70" text-anchor="middle" font-size="13" fill="#ddd6fe">base • instruct • reasoning • distill</text><text x="142" y="96" text-anchor="middle" font-size="12" fill="#94a3b8">labels may overlap</text></g>
    <g transform="translate(685 105)"><rect width="285" height="125" rx="15" fill="#422006" stroke="#f59e0b"/><text x="142" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#fbbf24">3. Architecture</text><text x="142" y="70" text-anchor="middle" font-size="13" fill="#fef3c7">dense • MoE • total / active</text><text x="142" y="96" text-anchor="middle" font-size="12" fill="#94a3b8">kernel compatibility</text></g>
    <g transform="translate(30 275)"><rect width="285" height="125" rx="15" fill="#172554" stroke="#3b82f6"/><text x="142" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">4. Numeric representation</text><text x="142" y="70" text-anchor="middle" font-size="13" fill="#dbeafe">BF16 • FP8 • GPTQ • AWQ</text><text x="142" y="96" text-anchor="middle" font-size="12" fill="#94a3b8">dtype or quantization method</text></g>
    <g transform="translate(357 275)"><rect width="285" height="125" rx="15" fill="#052e2b" stroke="#14b8a6"/><text x="142" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#5eead4">5. Container + layout</text><text x="142" y="70" text-anchor="middle" font-size="13" fill="#ccfbf1">Safetensors shards • GGUF</text><text x="142" y="96" text-anchor="middle" font-size="12" fill="#94a3b8">files + metadata</text></g>
    <g transform="translate(685 275)"><rect width="285" height="125" rx="15" fill="#164e63" stroke="#06b6d4"/><text x="142" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#67e8f9">6. Runtime + hardware</text><text x="142" y="70" text-anchor="middle" font-size="13" fill="#cffafe">llama.cpp • vLLM • Transformers</text><text x="142" y="96" text-anchor="middle" font-size="12" fill="#94a3b8">supported execution path</text></g>
    <text x="500" y="460" text-anchor="middle" font-size="13" fill="#94a3b8">No suffix alone proves task quality, memory fit, or serving speed.</text>
  </g>
</svg>
