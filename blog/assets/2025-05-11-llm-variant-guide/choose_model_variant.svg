<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="Choosing Model Variant" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="artifact-title">Choosing Model Variant</title>
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .node { fill: #1d4ed8; stroke: #94a3b8; stroke-width: 2; rx: 8; ry: 8; }
      .node-start { fill: #2563eb; stroke: #2563eb; stroke-width: 2; rx: 8; ry: 8; }
      .node-result { fill: #16a34a; stroke: #16a34a; stroke-width: 2; rx: 8; ry: 8; }
      .text { font-family: Inter, system-ui, sans-serif; fill: #93c5fd; font-size: 14px; text-anchor: middle; }
      .text-dark { font-family: Inter, system-ui, sans-serif; fill: #0f172a; font-size: 14px; font-weight: bold; text-anchor: middle; }
      .arrow { stroke: #2563eb; stroke-width: 2; marker-end: url(#arrowhead); fill: none; }
      .label-bg { fill: #0f172a; opacity: 0.8; }
      .label-text { font-family: Inter, system-ui, sans-serif; fill: #93c5fd; font-size: 12px; text-anchor: middle; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="800" height="600" class="bg" />

  <text y="40" class="text" style="font-size: 22px; font-weight: bold;" x="400">Choosing Your Model Variant</text>


  <rect x="300" y="70" width="200" height="50" class="node-start" />
  <text y="100" class="text-dark" x="400">What is your goal?</text>



  <path d="M 300 95 L 150 95 L 150 160" class="arrow" marker-end="url(#arrowhead)" />
  <rect x="130" y="120" width="40" height="20" class="label-bg" />
  <text y="135" class="label-text" x="150">Production</text>


  <path d="M 350 120 L 300 160" class="arrow" marker-end="url(#arrowhead)" />
  <rect x="300" y="130" width="40" height="20" class="label-bg" />
  <text y="145" class="label-text" x="310">Research</text>


  <path d="M 450 120 L 500 160" class="arrow" marker-end="url(#arrowhead)" />
  <rect x="470" y="130" width="40" height="20" class="label-bg" />
  <text y="145" class="label-text" x="490">Speed</text>


  <path d="M 500 95 L 650 95 L 650 160" class="arrow" marker-end="url(#arrowhead)" />
  <rect x="630" y="120" width="40" height="20" class="label-bg" />
  <text y="135" class="label-text" x="650">Memory</text>


  <rect x="75" y="160" width="150" height="60" class="node-result" />
  <text y="195" class="text-dark" x="150">Instruct / Chat</text>

  <rect x="225" y="160" width="150" height="60" class="node" />
  <text y="195" class="text" x="300">Base Model</text>

  <rect x="425" y="160" width="150" height="60" class="node" />
  <text y="195" class="text" x="500">Distilled</text>

  <rect x="575" y="160" width="150" height="60" class="node" />
  <text y="195" class="text" x="650">MoE / QAT</text>


  <text y="240" class="text" style="font-size: 12px; fill: #93c5fd;" x="150">Follows instructions,</text>
  <text y="255" class="text" style="font-size: 12px; fill: #93c5fd;" x="150">safe, ready to use.</text>

  <text y="240" class="text" style="font-size: 12px; fill: #93c5fd;" x="300">Raw knowledge,</text>
  <text y="255" class="text" style="font-size: 12px; fill: #93c5fd;" x="300">hard to control.</text>

  <text y="240" class="text" style="font-size: 12px; fill: #93c5fd;" x="500">Fast, efficient,</text>
  <text y="255" class="text" style="font-size: 12px; fill: #93c5fd;" x="500">good for simple tasks.</text>

  <text y="240" class="text" style="font-size: 12px; fill: #93c5fd;" x="650">High performance,</text>
  <text y="255" class="text" style="font-size: 12px; fill: #93c5fd;" x="650">low resource usage.</text>


  <rect x="200" y="300" width="400" height="80" class="node" style="stroke-dasharray: 4; fill: #1e293b;" />
  <text y="330" class="text" style="font-weight: bold; fill: #fdba74;" x="400">Recommendation</text>
  <text y="355" class="text" x="400">Start with Instruct/Chat models for 95% of use cases.</text>

</svg>
