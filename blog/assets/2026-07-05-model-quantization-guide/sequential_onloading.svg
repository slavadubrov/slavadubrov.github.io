<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 520" width="100%" height="100%" data-visual-system="evidence-plate-v1" role="img" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Offline Quantization vs. Online Serving Memory Mechanics</title>
  <desc id="artifact-desc">Offline Quantization vs. Online Serving Memory Mechanics.</desc>
  <defs>
    <!-- Drop Shadow Filter -->
    <filter id="drop-shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#334155" flood-opacity="0.08" />
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="850" height="520" fill="#f8fafc" rx="12" />

  <!-- Title -->
  <text y="40" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#0f172a" x="30">
    Offline Quantization vs. Online Serving Memory Mechanics
  </text>
  <text y="60" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#334155" x="30">
    How sequential layer onloading allows single-GPU offline calibration for massive models
  </text>

  <!-- Divider Line -->
  <line x1="425" y1="90" x2="425" y2="490" stroke="#cbd5e1" stroke-dasharray="5,5" stroke-width="2" />

  <!-- SECTION 1: OFFLINE QUANTIZATION -->
  <g>
    <!-- Subtitle -->
    <rect x="30" y="90" width="365" height="30" fill="#faf5ff" rx="6" />
    <text y="110" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12.5" font-weight="700" fill="#5b21b6" x="212.5">
      A. Offline Quantization (Sequential Onloading)
    </text>
    <text y="142" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#334155" x="212.5">
      Transient process: quantizes one transformer block at a time
    </text>

    <!-- System RAM / Disk -->
    <rect x="50" y="165" width="140" height="150" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" rx="8" />
    <text y="185" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#334155" x="120">System Host RAM</text>

    <!-- Full model layers -->
    <rect x="60" y="195" width="120" height="20" fill="#cbd5e1" rx="3" />
    <text y="208" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#334155" x="120">Layers 1..i-1 (Quantized)</text>

    <rect x="60" y="222" width="120" height="24" fill="url(#blue-grad)" rx="3" />
    <text y="237" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9.5" font-weight="700" fill="#ffffff" x="120">👉 Layer i (BF16)</text>

    <rect x="60" y="253" width="120" height="20" fill="#f1f5f9" rx="3" />
    <text y="266" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#334155" x="120">Layers i+1..L (BF16)</text>

    <!-- RAM to VRAM Transfer Arrow -->
    <path d="M 195 234 C 215 234, 215 200, 235 200" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)" />
    <text y="190" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#1d4ed8" font-weight="600" x="215">Onload Layer i</text>

    <!-- GPU VRAM -->
    <rect x="250" y="165" width="140" height="150" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" rx="8" />
    <text y="185" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#334155" x="320">GPU VRAM (HBM)</text>

    <!-- VRAM layer content -->
    <rect x="260" y="195" width="120" height="24" fill="url(#blue-grad)" rx="3" />
    <text y="210" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9.5" font-weight="700" fill="#ffffff" x="320">Active Layer i (BF16)</text>

    <rect x="260" y="226" width="120" height="35" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" rx="3" />
    <text y="238" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#991b1b" x="320">Hessian Buffers</text>
    <text y="249" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#dc2626" x="320">Used for rounding</text>

    <rect x="260" y="268" width="120" height="22" fill="#fff7ed" stroke="#ea580c" stroke-width="1" rx="3" />
    <text y="282" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#9a3412" x="320">Calibration Acts</text>

    <!-- VRAM to RAM Transfer Arrow (offload) -->
    <path d="M 250 290 C 230 290, 230 305, 195 305" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)" />
    <text y="322" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#166534" font-weight="600" x="215">Offload Quantized</text>

    <!-- Sizing Callout -->
    <rect x="50" y="335" width="340" height="155" fill="#faf5ff" rx="6" stroke="#7c3aed" />
    <text y="355" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#5b21b6" x="220">Transient Memory Footprint</text>
    <text y="375" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#5b21b6" x="220">
      Peak VRAM ≈ active layer (BF16) + Hessian + acts
    </text>
    <text y="395" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#5b21b6" x="220">
      • Allows quantizing 70B models on 1x 80GB GPU.
    </text>
    <text y="415" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#5b21b6" x="220">
      • CPU RAM stores the full source weights.
    </text>
    <text y="435" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#5b21b6" x="220">
      • High disk/RAM bandwidth avoids execution bottlenecks.
    </text>
    <text y="465" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10.5" font-weight="600" fill="#991b1b" x="220">💡 Run time scales with model parameters, not VRAM peak.</text>
  </g>

  <!-- SECTION 2: ONLINE SERVING -->
  <g transform="translate(425, 0)">
    <!-- Subtitle -->
    <rect x="30" y="90" width="365" height="30" fill="#eff6ff" rx="6" />
    <text y="110" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12.5" font-weight="700" fill="#1d4ed8" x="212.5">
      B. Online Serving (Persistent Residence)
    </text>
    <text y="142" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#334155" x="212.5">
      Runtime serving: all model weights must reside in VRAM
    </text>

    <!-- GPU VRAM Serving -->
    <rect x="50" y="165" width="340" height="150" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" rx="8" />
    <text y="185" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#334155" x="220">GPU VRAM (HBM) during Serving</text>

    <!-- All weights stacked -->
    <rect x="65" y="195" width="310" height="40" fill="url(#green-grad)" rx="4" />
    <text y="213" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff" x="220">All Quantized Weights (Layers 1 to L)</text>
    <text y="226" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#16a34a" x="220">Stored permanently (e.g. 35 GB / 70 GB)</text>

    <!-- KV cache dynamic -->
    <rect x="65" y="242" width="310" height="35" fill="url(#orange-grad)" rx="4" />
    <text y="256" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff" x="220">KV Cache (PagedAttention)</text>
    <text y="268" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#ea580c" x="220">Scales with context and batch size</text>

    <!-- Engine overhead -->
    <rect x="65" y="283" width="310" height="24" fill="url(#blue-grad)" rx="4" />
    <text y="298" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#ffffff" x="220">Engine activations + CUDA context</text>

    <!-- Sizing Callout -->
    <rect x="50" y="335" width="340" height="155" fill="#eff6ff" rx="6" stroke="#2563eb" />
    <text y="355" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#1d4ed8" x="220">Serving Memory Footprint</text>
    <text y="375" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#1d4ed8" x="220">
      Total GPU target ≈ weights + KV cache + overhead + buffer
    </text>
    <text y="395" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1d4ed8" x="220">
      • Must hold all model weights in fast memory concurrently.
    </text>
    <text y="415" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1d4ed8" x="220">
      • KV cache scales dynamically and can easily exceed weights.
    </text>
    <text y="435" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1d4ed8" x="220">
      • OOM occurs if concurrency * context size exhausts VRAM.
    </text>
    <text y="465" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10.5" font-weight="600" fill="#1d4ed8" x="220">💡 Serving is memory-bandwidth-bound during decode.</text>
  </g>

  <!-- Markers -->
  <defs>
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="green-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16a34a" />
      <stop offset="100%" stop-color="#16a34a" />
    </linearGradient>
    <linearGradient id="orange-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ea580c" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#2563eb" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#16a34a" />
    </marker>
  </defs>
</svg>
