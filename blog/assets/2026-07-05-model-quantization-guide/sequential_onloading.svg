<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 520" width="100%" height="100%">
  <defs>
    <!-- Drop Shadow Filter -->
    <filter id="drop-shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#1e293b" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="850" height="520" fill="#f8f9fa" rx="12" />

  <!-- Title -->
  <text x="30" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1e293b">
    Offline Quantization vs. Online Serving Memory Mechanics
  </text>
  <text x="30" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b">
    How sequential layer onloading allows single-GPU offline calibration for massive models
  </text>

  <!-- Divider Line -->
  <line x1="425" y1="90" x2="425" y2="490" stroke="#cbd5e1" stroke-dasharray="5,5" stroke-width="2" />

  <!-- SECTION 1: OFFLINE QUANTIZATION -->
  <g>
    <!-- Subtitle -->
    <rect x="30" y="90" width="365" height="30" fill="#f3e5f5" rx="6" />
    <text x="212.5" y="110" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12.5" font-weight="700" fill="#6a1b9a">
      A. Offline Quantization (Sequential Onloading)
    </text>
    <text x="212.5" y="142" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">
      Transient process: quantizes one transformer block at a time
    </text>

    <!-- System RAM / Disk -->
    <rect x="50" y="165" width="140" height="150" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" rx="8" filter="url(#drop-shadow)" />
    <text x="120" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#334155">System Host RAM</text>

    <!-- Full model layers -->
    <rect x="60" y="195" width="120" height="20" fill="#cbd5e1" rx="3" />
    <text x="120" y="208" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8.5" fill="#334155">Layers 1..i-1 (Quantized)</text>

    <rect x="60" y="222" width="120" height="24" fill="url(#blue-grad)" rx="3" />
    <text x="120" y="237" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9.5" font-weight="700" fill="#ffffff">👉 Layer i (BF16)</text>

    <rect x="60" y="253" width="120" height="20" fill="#e2e8f0" rx="3" />
    <text x="120" y="266" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8.5" fill="#475569">Layers i+1..L (BF16)</text>

    <!-- RAM to VRAM Transfer Arrow -->
    <path d="M 195 234 C 215 234, 215 200, 235 200" fill="none" stroke="#2980b9" stroke-width="2" marker-end="url(#arrow-blue)" />
    <text x="215" y="190" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#1565c0" font-weight="600">Onload Layer i</text>

    <!-- GPU VRAM -->
    <rect x="250" y="165" width="140" height="150" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" rx="8" filter="url(#drop-shadow)" />
    <text x="320" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#334155">GPU VRAM (HBM)</text>

    <!-- VRAM layer content -->
    <rect x="260" y="195" width="120" height="24" fill="url(#blue-grad)" rx="3" />
    <text x="320" y="210" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9.5" font-weight="700" fill="#ffffff">Active Layer i (BF16)</text>

    <rect x="260" y="226" width="120" height="35" fill="#ffebee" stroke="#ef9a9a" stroke-width="1.5" rx="3" />
    <text x="320" y="238" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" fill="#c62828">Hessian Buffers</text>
    <text x="320" y="249" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#d32f2f">Used for rounding</text>

    <rect x="260" y="268" width="120" height="22" fill="#fff8e1" stroke="#ffe082" stroke-width="1" rx="3" />
    <text x="320" y="282" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#b7791f">Calibration Acts</text>

    <!-- VRAM to RAM Transfer Arrow (offload) -->
    <path d="M 250 290 C 230 290, 230 305, 195 305" fill="none" stroke="#27ae60" stroke-width="2" marker-end="url(#arrow-green)" />
    <text x="215" y="322" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#27ae60" font-weight="600">Offload Quantized</text>

    <!-- Sizing Callout -->
    <rect x="50" y="335" width="340" height="155" fill="#f3e5f5" rx="6" stroke="#e1bee7" />
    <text x="220" y="355" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#4a148c">Transient Memory Footprint</text>
    <text x="220" y="375" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10.5" fill="#4a148c">
      Peak VRAM ≈ active layer (BF16) + Hessian + acts
    </text>
    <text x="220" y="395" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#4a148c">
      • Allows quantizing 70B models on 1x 80GB GPU.
    </text>
    <text x="220" y="415" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#4a148c">
      • CPU RAM stores the full source weights.
    </text>
    <text x="220" y="435" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#4a148c">
      • High disk/RAM bandwidth avoids execution bottlenecks.
    </text>
    <text x="220" y="465" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10.5" font-weight="600" fill="#ad1457">💡 Run time scales with model parameters, not VRAM peak.</text>
  </g>

  <!-- SECTION 2: ONLINE SERVING -->
  <g transform="translate(425, 0)">
    <!-- Subtitle -->
    <rect x="30" y="90" width="365" height="30" fill="#e3f2fd" rx="6" />
    <text x="212.5" y="110" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12.5" font-weight="700" fill="#1565c0">
      B. Online Serving (Persistent Residence)
    </text>
    <text x="212.5" y="142" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">
      Runtime serving: all model weights must reside in VRAM
    </text>

    <!-- GPU VRAM Serving -->
    <rect x="50" y="165" width="340" height="150" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" rx="8" filter="url(#drop-shadow)" />
    <text x="220" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#334155">GPU VRAM (HBM) during Serving</text>

    <!-- All weights stacked -->
    <rect x="65" y="195" width="310" height="40" fill="url(#green-grad)" rx="4" />
    <text x="220" y="213" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#ffffff">All Quantized Weights (Layers 1 to L)</text>
    <text x="220" y="226" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#e8f5e9">Stored permanently (e.g. 35 GB / 70 GB)</text>

    <!-- KV cache dynamic -->
    <rect x="65" y="242" width="310" height="35" fill="url(#orange-grad)" rx="4" />
    <text x="220" y="256" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#ffffff">KV Cache (PagedAttention)</text>
    <text x="220" y="268" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#fff3e0">Scales with context and batch size</text>

    <!-- Engine overhead -->
    <rect x="65" y="283" width="310" height="24" fill="url(#blue-grad)" rx="4" />
    <text x="220" y="298" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#ffffff">Engine activations + CUDA context</text>

    <!-- Sizing Callout -->
    <rect x="50" y="335" width="340" height="155" fill="#e3f2fd" rx="6" stroke="#bbdefb" />
    <text x="220" y="355" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#0d47a1">Serving Memory Footprint</text>
    <text x="220" y="375" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10.5" fill="#0d47a1">
      Total GPU target ≈ weights + KV cache + overhead + buffer
    </text>
    <text x="220" y="395" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#0d47a1">
      • Must hold all model weights in fast memory concurrently.
    </text>
    <text x="220" y="415" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#0d47a1">
      • KV cache scales dynamically and can easily exceed weights.
    </text>
    <text x="220" y="435" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#0d47a1">
      • OOM occurs if concurrency * context size exhausts VRAM.
    </text>
    <text x="220" y="465" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10.5" font-weight="600" fill="#01579b">💡 Serving is memory-bandwidth-bound during decode.</text>
  </g>

  <!-- Markers -->
  <defs>
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3498db" />
      <stop offset="100%" stop-color="#1565c0" />
    </linearGradient>
    <linearGradient id="green-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2ecc71" />
      <stop offset="100%" stop-color="#27ae60" />
    </linearGradient>
    <linearGradient id="orange-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e67e22" />
      <stop offset="100%" stop-color="#d35400" />
    </linearGradient>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#1565c0" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#27ae60" />
    </marker>
  </defs>
</svg>
