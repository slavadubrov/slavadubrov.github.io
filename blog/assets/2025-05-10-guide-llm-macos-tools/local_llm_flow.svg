<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Apple Silicon unified-memory budget for local inference</title>
  <desc id="desc">Installed unified memory is shared by macOS and applications, model weights, KV cache, and runtime workspace. A reserve for memory pressure separates a file that loads from a workload that runs comfortably.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="440" rx="22" fill="#0f172a"/><text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Installed memory is not the model budget</text>
  <g font-family="Inter, system-ui, sans-serif"><rect x="55" y="115" width="890" height="145" rx="18" fill="#1e293b" stroke="#64748b"/><rect x="55" y="115" width="230" height="145" rx="18" fill="#1d4ed8"/><rect x="285" y="115" width="280" height="145" fill="#5b21b6"/><rect x="565" y="115" width="170" height="145" fill="#9a3412"/><rect x="735" y="115" width="210" height="145" rx="18" fill="#1d4ed8"/>
  <text x="170" y="165" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">macOS + apps</text><text x="170" y="198" text-anchor="middle" font-size="12" fill="#93c5fd">changes during use</text>
  <text x="425" y="165" text-anchor="middle" font-size="16" font-weight="700" fill="#c4b5fd">Model weights</text><text x="425" y="198" text-anchor="middle" font-size="12" fill="#93c5fd">artifact-dependent</text>
  <text x="650" y="165" text-anchor="middle" font-size="16" font-weight="700" fill="#fdba74">KV cache</text><text x="650" y="198" text-anchor="middle" font-size="12" fill="#fdba74">context + concurrency</text>
  <text x="840" y="155" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Workspace +</text><text x="840" y="178" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">headroom</text><text x="840" y="211" text-anchor="middle" font-size="12" fill="#93c5fd">avoid swap pressure</text>
  <rect x="175" y="310" width="650" height="70" rx="14" fill="#991b1b" stroke="#dc2626"/><text x="500" y="340" text-anchor="middle" font-size="16" font-weight="700" fill="#fca5a5">Load success is only the first gate</text><text x="500" y="364" text-anchor="middle" font-size="12" fill="#fca5a5">Measure peak pressure at target context, requests, and application load.</text></g>
</svg>
