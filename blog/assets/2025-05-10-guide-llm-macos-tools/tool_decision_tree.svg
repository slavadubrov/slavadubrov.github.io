<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" role="img" aria-labelledby="title desc">
  <title id="title">Workflow for selecting a local macOS LLM tool</title>
  <desc id="desc">A task and model baseline lead to four workflow choices: managed local service with Ollama, desktop exploration with LM Studio, direct GGUF control with llama.cpp, or Apple-native Python with MLX-LM. All paths converge on the same workload benchmark.</desc>
  <rect width="1000" height="480" rx="22" fill="#0f172a"/><text x="500" y="48" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Choose the control surface, then benchmark</text>
  <g font-family="system-ui, sans-serif"><rect x="345" y="90" width="310" height="70" rx="14" fill="#1e293b" stroke="#64748b"/><text x="500" y="119" text-anchor="middle" font-size="16" font-weight="700" fill="#e2e8f0">Task + checkpoint baseline</text><text x="500" y="143" text-anchor="middle" font-size="12" fill="#94a3b8">quality, license, context, artifact</text>
  <text x="500" y="195" text-anchor="middle" font-size="28" fill="#94a3b8">↓</text>
  <g transform="translate(30 220)"><rect width="215" height="115" rx="14" fill="#172554" stroke="#3b82f6"/><text x="107" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#93c5fd">Ollama</text><text x="107" y="68" text-anchor="middle" font-size="12" fill="#dbeafe">managed CLI + API</text><text x="107" y="91" text-anchor="middle" font-size="11" fill="#94a3b8">application service</text></g>
  <g transform="translate(270 220)"><rect width="215" height="115" rx="14" fill="#2e1065" stroke="#8b5cf6"/><text x="107" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#c4b5fd">LM Studio</text><text x="107" y="68" text-anchor="middle" font-size="12" fill="#ddd6fe">desktop + SDKs + APIs</text><text x="107" y="91" text-anchor="middle" font-size="11" fill="#94a3b8">human exploration</text></g>
  <g transform="translate(515 220)"><rect width="215" height="115" rx="14" fill="#422006" stroke="#f59e0b"/><text x="107" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#fbbf24">llama.cpp</text><text x="107" y="68" text-anchor="middle" font-size="12" fill="#fef3c7">direct GGUF runtime</text><text x="107" y="91" text-anchor="middle" font-size="11" fill="#94a3b8">flags + embedding</text></g>
  <g transform="translate(755 220)"><rect width="215" height="115" rx="14" fill="#052e2b" stroke="#14b8a6"/><text x="107" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#5eead4">MLX-LM</text><text x="107" y="68" text-anchor="middle" font-size="12" fill="#ccfbf1">Apple-native Python</text><text x="107" y="91" text-anchor="middle" font-size="11" fill="#94a3b8">experiments + tuning</text></g>
  <rect x="180" y="385" width="640" height="55" rx="12" fill="#164e63" stroke="#06b6d4"/><text x="500" y="418" text-anchor="middle" font-size="14" font-weight="700" fill="#67e8f9">Same prompts • same context • comparable precision • measured memory</text></g>
</svg>
