<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" role="img" aria-labelledby="title desc">
  <title id="title">Memory selected by tenant, purpose, freshness, and relevance</title>
  <desc id="desc">Memory candidates pass subject and tenant scope, purpose, freshness, and relevance checks. Only selected records enter context; rejected records remain outside.</desc>
  <rect width="1000" height="420" rx="22" fill="#0f172a"/><text x="500" y="48" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Memory retrieval is a policy decision</text>
  <g font-family="system-ui, sans-serif"><g transform="translate(40 110)"><rect width="220" height="210" rx="16" fill="#1e293b" stroke="#64748b"/><text x="110" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#e2e8f0">Memory store</text><text x="28" y="82" font-size="13" fill="#cbd5e1">explicit user facts</text><text x="28" y="112" font-size="13" fill="#cbd5e1">inferred hypotheses</text><text x="28" y="142" font-size="13" fill="#cbd5e1">episodic records</text><text x="28" y="172" font-size="13" fill="#cbd5e1">provenance + lifecycle</text></g><text x="290" y="225" font-size="25" fill="#94a3b8">→</text>
  <g transform="translate(330 95)"><rect width="330" height="240" rx="16" fill="#2e1065" stroke="#8b5cf6"/><text x="165" y="38" text-anchor="middle" font-size="17" font-weight="700" fill="#c4b5fd">Selection gates</text><text x="35" y="82" font-size="13" fill="#ddd6fe">1. authenticated subject + tenant</text><text x="35" y="116" font-size="13" fill="#ddd6fe">2. permitted purpose</text><text x="35" y="150" font-size="13" fill="#ddd6fe">3. freshness and review status</text><text x="35" y="184" font-size="13" fill="#ddd6fe">4. relevance and authority</text><text x="35" y="218" font-size="12" fill="#fca5a5">No gate → no context inclusion</text></g><text x="690" y="225" font-size="25" fill="#94a3b8">→</text>
  <g transform="translate(730 110)"><rect width="230" height="210" rx="16" fill="#052e2b" stroke="#14b8a6"/><text x="115" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#5eead4">Selected working set</text><text x="30" y="84" font-size="13" fill="#ccfbf1">minimum useful facts</text><text x="30" y="116" font-size="13" fill="#ccfbf1">source preserved</text><text x="30" y="148" font-size="13" fill="#ccfbf1">expiry preserved</text><text x="30" y="180" font-size="13" fill="#ccfbf1">deletion remains possible</text></g><text x="500" y="382" text-anchor="middle" font-size="13" fill="#94a3b8">Model-inferred memories remain hypotheses until an authoritative source confirms them.</text></g>
</svg>
