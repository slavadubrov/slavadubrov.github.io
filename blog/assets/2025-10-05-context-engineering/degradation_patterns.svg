<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" role="img" aria-label="Context Degradation Patterns" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="artifact-title">Context Degradation Patterns</title>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
    <style>
        .bg { fill: #0f172a; }
        .title { fill: #f8fafc; font-family: Inter, system-ui, sans-serif; font-size: 20px; font-weight: bold; text-anchor: middle; }
        .card { rx: 10; ry: 10; }
        .card-title { fill: #f8fafc; font-family: Inter, system-ui, sans-serif; font-size: 14px; font-weight: bold; text-anchor: middle; }
        .card-text { fill: #cbd5e1; font-family: Inter, system-ui, sans-serif; font-size: 12px; text-anchor: middle; }
        .icon { fill: #f8fafc; font-family: Inter, system-ui, sans-serif; font-size: 24px; text-anchor: middle; }
    </style>

    <rect width="100%" height="100%" class="bg" />

    <text y="40" class="title" x="450">Context Degradation Patterns</text>

    <!-- Pattern 1: Lost-in-Middle -->
    <g transform="translate(50, 80)">
        <rect x="0" y="0" width="250" height="180" class="card" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" />
        <text y="35" class="icon" x="125">📉</text>
        <text y="65" class="card-title" x="125">Lost-in-Middle</text>
        <line x1="30" y1="80" x2="220" y2="80" stroke="#2563eb" stroke-width="1" opacity="0.5" />
        <text y="100" class="card-text" x="125">Information in the center</text>
        <text y="115" class="card-text" x="125">receives less attention</text>
        <text y="140" class="card-text" style="fill: #86efac; font-weight: bold;" x="125">Fix: Place critical info</text>
        <text y="155" class="card-text" style="fill: #86efac;" x="125">at start or end</text>
    </g>

    <!-- Pattern 2: Context Poisoning -->
    <g transform="translate(325, 80)">
        <rect x="0" y="0" width="250" height="180" class="card" fill="#991b1b" stroke="#dc2626" stroke-width="2" />
        <text y="35" class="icon" x="125">☠️</text>
        <text y="65" class="card-title" x="125">Context Poisoning</text>
        <line x1="30" y1="80" x2="220" y2="80" stroke="#dc2626" stroke-width="1" opacity="0.5" />
        <text y="100" class="card-text" x="125">Errors compound through</text>
        <text y="115" class="card-text" x="125">repeated reference</text>
        <text y="140" class="card-text" style="fill: #86efac; font-weight: bold;" x="125">Fix: Validate tool outputs,</text>
        <text y="155" class="card-text" style="fill: #86efac;" x="125">restart if poisoned</text>
    </g>

    <!-- Pattern 3: Context Distraction -->
    <g transform="translate(600, 80)">
        <rect x="0" y="0" width="250" height="180" class="card" fill="#166534" stroke="#ea580c" stroke-width="2" />
        <text y="35" class="icon" x="125">🔀</text>
        <text y="65" class="card-title" x="125">Context Distraction</text>
        <line x1="30" y1="80" x2="220" y2="80" stroke="#ea580c" stroke-width="1" opacity="0.5" />
        <text y="100" class="card-text" x="125">Irrelevant info competes</text>
        <text y="115" class="card-text" x="125">for attention budget</text>
        <text y="140" class="card-text" style="fill: #86efac; font-weight: bold;" x="125">Fix: Filter aggressively,</text>
        <text y="155" class="card-text" style="fill: #86efac;" x="125">use relevance scoring</text>
    </g>

    <!-- Pattern 4: Context Confusion -->
    <g transform="translate(125, 290)">
        <rect x="0" y="0" width="250" height="180" class="card" fill="#5b21b6" stroke="#7c3aed" stroke-width="2" />
        <text y="35" class="icon" x="125">🌀</text>
        <text y="65" class="card-title" x="125">Context Confusion</text>
        <line x1="30" y1="80" x2="220" y2="80" stroke="#7c3aed" stroke-width="1" opacity="0.5" />
        <text y="100" class="card-text" x="125">Model applies wrong</text>
        <text y="115" class="card-text" x="125">context to current task</text>
        <text y="140" class="card-text" style="fill: #86efac; font-weight: bold;" x="125">Fix: Task segmentation,</text>
        <text y="155" class="card-text" style="fill: #86efac;" x="125">clear transitions</text>
    </g>

    <!-- Pattern 5: Context Clash -->
    <g transform="translate(525, 290)">
        <rect x="0" y="0" width="250" height="180" class="card" fill="#166534" stroke="#16a34a" stroke-width="2" />
        <text y="35" class="icon" x="125">⚔️</text>
        <text y="65" class="card-title" x="125">Context Clash</text>
        <line x1="30" y1="80" x2="220" y2="80" stroke="#16a34a" stroke-width="1" opacity="0.5" />
        <text y="100" class="card-text" x="125">Contradictory information</text>
        <text y="115" class="card-text" x="125">creates conflicting guidance</text>
        <text y="140" class="card-text" style="fill: #86efac; font-weight: bold;" x="125">Fix: Priority rules,</text>
        <text y="155" class="card-text" style="fill: #86efac;" x="125">version filtering</text>
    </g>
</svg>
