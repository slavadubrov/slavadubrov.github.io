<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="MCP Architecture" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="artifact-title">MCP Architecture</title>

<style>
    .bg { fill: #0f172a; }
    .node { fill: #1e293b; stroke: #2563eb; stroke-width: 2; rx: 8; ry: 8; }
    .node-text { fill: #f8fafc; font-family: Inter, system-ui, sans-serif; font-size: 14px; text-anchor: middle; dominant-baseline: middle; }
    .edge { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .label { fill: #cbd5e1; font-family: Inter, system-ui, sans-serif; font-size: 12px; text-anchor: middle; background-color: #0f172a; }
    .title { fill: #f8fafc; font-family: Inter, system-ui, sans-serif; font-size: 18px; font-weight: bold; text-anchor: middle; }
    .group-label { fill: #cbd5e1; font-family: Inter, system-ui, sans-serif; font-size: 14px; font-weight: bold; text-anchor: start; }
    .accent-green { stroke: #16a34a; }
    .accent-red { stroke: #dc2626; }
    .accent-yellow { stroke: #ea580c; }
    .accent-purple { stroke: #7c3aed; }
    .accent-orange { stroke: #ea580c; }
</style>
<defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
</defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

<rect width="100%" height="100%" class="bg"/>

<text y="30" class="title" x="400">Model Context Protocol (MCP) Architecture</text>

<!-- Host -->
<g transform="translate(300, 200)">
    <rect x="0" y="0" width="200" height="100" class="node" style="stroke: #2563eb; fill: #1d4ed8"/>
    <text y="40" class="node-text" style="fill: #93c5fd; font-weight: bold" x="100">MCP Host</text>
    <text y="70" class="node-text" style="fill: #93c5fd; font-size: 12px" x="100">(Agent / LLM App)</text>
</g>

<!-- Servers -->
<g transform="translate(50, 50)">
    <rect x="0" y="0" width="140" height="60" class="node" style="stroke: #16a34a"/>
    <text y="30" class="node-text" x="70">Filesystem Server</text>
</g>

<g transform="translate(600, 50)">
    <rect x="0" y="0" width="140" height="60" class="node" style="stroke: #ea580c"/>
    <text y="30" class="node-text" x="70">Database Server</text>
</g>

<g transform="translate(50, 390)">
    <rect x="0" y="0" width="140" height="60" class="node" style="stroke: #7c3aed"/>
    <text y="30" class="node-text" x="70">Slack/API Server</text>
</g>

<g transform="translate(600, 390)">
    <rect x="0" y="0" width="140" height="60" class="node" style="stroke: #dc2626"/>
    <text y="30" class="node-text" x="70">Memory Server</text>
</g>

<!-- Connections -->
<path d="M190 80 L300 200" class="edge"/>
<path d="M600 80 L500 200" class="edge"/>
<path d="M190 420 L300 300" class="edge"/>
<path d="M600 420 L500 300" class="edge"/>

<!-- Labels -->
<text y="130" class="label" x="230">Resources</text>
<text y="130" class="label" x="580">Prompts</text>
<text y="380" class="label" x="230">Tools</text>
<text y="380" class="label" x="580">Context</text>

</svg>
