<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="Adaptive Retrieval Router" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="artifact-title">Adaptive Retrieval Router</title>

<style>
    .bg { fill: #0f172a; }
    .node { fill: #1e293b; stroke: #2563eb; stroke-width: 2; rx: 8; ry: 8; }
    .node-text { fill: #f8fafc; font-family: Inter, system-ui, sans-serif; font-size: 14px; text-anchor: middle; dominant-baseline: middle; }
    .edge { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .label { fill: #cbd5e1; font-family: Inter, system-ui, sans-serif; font-size: 12px; text-anchor: middle; background-color: #0f172a; }
    .title { fill: #f8fafc; font-family: Inter, system-ui, sans-serif; font-size: 18px; font-weight: bold; text-anchor: middle; }
    .group-label { fill: #cbd5e1; font-family: Inter, system-ui, sans-serif; font-size: 14px; font-weight: bold; text-anchor: start; }
    .accent-green { stroke: #16a34a; }
    .accent-red { stroke: #dc2626; }
    .accent-yellow { stroke: #ea580c; }
    .accent-purple { stroke: #7c3aed; }
    .accent-orange { stroke: #ea580c; }
</style>
<defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
</defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

<rect width="100%" height="100%" class="bg"/>

<text y="30" class="title" x="400">Adaptive Retrieval Router</text>

<g transform="translate(50, 180)">
    <rect x="0" y="0" width="120" height="40" class="node" style="stroke: #2563eb"/>
    <text y="20" class="node-text" x="60">User Query</text>
</g>

<g transform="translate(250, 170)">
    <polygon points="60,0 120,30 60,60 0,30" class="node" style="stroke: #7c3aed; fill: #1e293b"/>
    <text y="30" class="node-text" x="60">Classify</text>
</g>

<!-- Paths -->
<g transform="translate(500, 50)">
    <rect x="0" y="0" width="160" height="60" class="node" style="stroke: #94a3b8"/>
    <text y="20" class="node-text" x="80">No Retrieval</text>
    <text y="40" class="node-text" style="font-size: 12px" x="80">Parametric Knowledge</text>
</g>

<g transform="translate(500, 170)">
    <rect x="0" y="0" width="160" height="60" class="node" style="stroke: #16a34a"/>
    <text y="20" class="node-text" x="80">Single-Shot RAG</text>
    <text y="40" class="node-text" style="font-size: 12px" x="80">Hybrid + Rerank</text>
</g>

<g transform="translate(500, 290)">
    <rect x="0" y="0" width="160" height="60" class="node" style="stroke: #ea580c"/>
    <text y="20" class="node-text" x="80">Iterative RAG</text>
    <text y="40" class="node-text" style="font-size: 12px" x="80">Multi-step / Graph</text>
</g>

<!-- Edges -->
<path d="M170 200 L250 200" class="edge"/>
<path d="M370 200 L500 80" class="edge"/>
<path d="M370 200 L500 200" class="edge"/>
<path d="M370 200 L500 320" class="edge"/>

<!-- Labels -->
<text y="120" class="label" style="fill: #cbd5e1" x="420">General</text>
<text y="190" class="label" style="fill: #cbd5e1" x="450">Facts</text>
<text y="280" class="label" style="fill: #cbd5e1" x="420">Complex</text>

</svg>
