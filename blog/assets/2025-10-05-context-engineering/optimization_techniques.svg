<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-label="Optimization Techniques" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="artifact-title">Optimization Techniques</title>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
    <style>
        .bg { fill: #0f172a; }
        .title { fill: #f8fafc; font-family: Inter, system-ui, sans-serif; font-size: 22px; font-weight: bold; text-anchor: middle; }
        .subtitle { fill: #cbd5e1; font-family: Inter, system-ui, sans-serif; font-size: 13px; text-anchor: middle; }
        .card { rx: 12; ry: 12; }
        .card-title { fill: #f8fafc; font-family: Inter, system-ui, sans-serif; font-size: 15px; font-weight: bold; text-anchor: middle; }
        .card-desc { fill: #cbd5e1; font-family: Inter, system-ui, sans-serif; font-size: 12px; text-anchor: middle; }
        .metric { fill: #166534; font-family: Inter, system-ui, sans-serif; font-size: 13px; font-weight: bold; text-anchor: middle; }
        .metric-box { fill: #0f172a; rx: 6; ry: 6; }
        .use-case { fill: #94a3b8; font-family: Inter, system-ui, sans-serif; font-size: 12px; text-anchor: middle; font-style: italic; }
        .section-label { fill: #334155; font-family: Inter, system-ui, sans-serif; font-size: 12px; font-weight: bold; text-anchor: start; }
        .result-box { fill: #166534; stroke: #16a34a; stroke-width: 2; rx: 10; ry: 10; }
        .result-text { fill: #86efac; font-family: Inter, system-ui, sans-serif; font-size: 14px; font-weight: bold; text-anchor: middle; }
        .flow-line { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 5 5; }
        .number { fill: #f8fafc; font-family: Inter, system-ui, sans-serif; font-size: 14px; font-weight: bold; }
    </style>

    <rect width="100%" height="100%" class="bg" />

    <!-- Title -->
    <text y="35" class="title" x="450">Context Optimization Techniques</text>
    <text y="58" class="subtitle" x="450">Four strategies to extend effective context capacity 2-3x without larger models</text>

    <!-- Horizontal flow line -->
    <line x1="50" y1="260" x2="850" y2="260" class="flow-line" />

    <!-- Technique 1: Compaction -->
    <g transform="translate(30, 90)">
        <rect x="0" y="0" width="195" height="150" class="card" fill="#1d4ed8" stroke="#2563eb" stroke-width="2" />
        <circle cx="25" cy="25" r="15" fill="#2563eb" />
        <text y="30" class="number" text-anchor="middle" x="25">1</text>
        <text y="30" class="card-title" x="105">Compaction</text>
        <line x1="15" y1="45" x2="180" y2="45" stroke="#2563eb" stroke-width="1" opacity="0.4" />
        <text y="68" class="card-desc" x="97">Summarize context when</text>
        <text y="83" class="card-desc" x="97">approaching window limits</text>
        <text y="98" class="card-desc" x="97">Reinitialize with summary</text>
        <rect x="25" y="110" width="145" height="28" class="metric-box" stroke="#2563eb" stroke-width="1" />
        <text y="129" class="metric" x="97">50-70% token reduction</text>
    </g>

    <!-- Technique 2: Observation Masking -->
    <g transform="translate(245, 90)">
        <rect x="0" y="0" width="195" height="150" class="card" fill="#5b21b6" stroke="#7c3aed" stroke-width="2" />
        <circle cx="25" cy="25" r="15" fill="#7c3aed" />
        <text y="30" class="number" text-anchor="middle" x="25">2</text>
        <text y="30" class="card-title" x="105">Observation Masking</text>
        <line x1="15" y1="45" x2="180" y2="45" stroke="#7c3aed" stroke-width="1" opacity="0.4" />
        <text y="68" class="card-desc" x="97">Replace tool outputs</text>
        <text y="83" class="card-desc" x="97">with compact references</text>
        <text y="98" class="card-desc" x="97">Tool outputs = 80% of tokens</text>
        <rect x="25" y="110" width="145" height="28" class="metric-box" stroke="#7c3aed" stroke-width="1" />
        <text y="129" class="metric" x="97">60-80% reduction</text>
    </g>

    <!-- Technique 3: KV-Cache -->
    <g transform="translate(460, 90)">
        <rect x="0" y="0" width="195" height="150" class="card" fill="#166534" stroke="#16a34a" stroke-width="2" />
        <circle cx="25" cy="25" r="15" fill="#16a34a" />
        <text y="30" class="number" text-anchor="middle" x="25">3</text>
        <text y="30" class="card-title" x="105">KV-Cache Optimization</text>
        <line x1="15" y1="45" x2="180" y2="45" stroke="#16a34a" stroke-width="1" opacity="0.4" />
        <text y="68" class="card-desc" x="97">Reuse cached attention</text>
        <text y="83" class="card-desc" x="97">computations across requests</text>
        <text y="98" class="card-desc" x="97">Place stable content first</text>
        <rect x="25" y="110" width="145" height="28" class="metric-box" stroke="#16a34a" stroke-width="1" />
        <text y="129" class="metric" x="97">70%+ cache hit rate</text>
    </g>

    <!-- Technique 4: Partitioning -->
    <g transform="translate(675, 90)">
        <rect x="0" y="0" width="195" height="150" class="card" fill="#166534" stroke="#ea580c" stroke-width="2" />
        <circle cx="25" cy="25" r="15" fill="#ea580c" />
        <text y="30" class="number" text-anchor="middle" x="25">4</text>
        <text y="30" class="card-title" x="105">Context Partitioning</text>
        <line x1="15" y1="45" x2="180" y2="45" stroke="#ea580c" stroke-width="1" opacity="0.4" />
        <text y="68" class="card-desc" x="97">Split work across</text>
        <text y="83" class="card-desc" x="97">sub-agents with isolated</text>
        <text y="98" class="card-desc" x="97">clean context windows</text>
        <rect x="25" y="110" width="145" height="28" class="metric-box" stroke="#ea580c" stroke-width="1" />
        <text y="129" class="metric" x="97">Most aggressive</text>
    </g>

    <!-- When to apply section -->
    <text y="295" class="section-label" x="50">WHEN TO APPLY:</text>

    <g transform="translate(30, 310)">
        <rect x="0" y="0" width="195" height="55" rx="8" ry="8" fill="#0f172a" stroke="#2563eb" stroke-width="1" />
        <text y="22" class="card-desc" style="fill: #93c5fd;" x="97">Use for:</text>
        <text y="40" class="card-desc" x="97">Message history grows large</text>
    </g>

    <g transform="translate(245, 310)">
        <rect x="0" y="0" width="195" height="55" rx="8" ry="8" fill="#0f172a" stroke="#7c3aed" stroke-width="1" />
        <text y="22" class="card-desc" style="fill: #c4b5fd;" x="97">Use for:</text>
        <text y="40" class="card-desc" x="97">Tool outputs dominate context</text>
    </g>

    <g transform="translate(460, 310)">
        <rect x="0" y="0" width="195" height="55" rx="8" ry="8" fill="#0f172a" stroke="#16a34a" stroke-width="1" />
        <text y="22" class="card-desc" style="fill: #166534;" x="97">Use for:</text>
        <text y="40" class="card-desc" x="97">Stable prompts / templates</text>
    </g>

    <g transform="translate(675, 310)">
        <rect x="0" y="0" width="195" height="55" rx="8" ry="8" fill="#0f172a" stroke="#ea580c" stroke-width="1" />
        <text y="22" class="card-desc" style="fill: #9a3412;" x="97">Use for:</text>
        <text y="40" class="card-desc" x="97">Very long multi-phase tasks</text>
    </g>

    <!-- Result box -->
    <g transform="translate(250, 395)">
        <rect x="0" y="0" width="400" height="55" class="result-box" />
        <text y="25" class="result-text" x="200">Combined Effect: 2-3x Effective Capacity</text>
        <text y="45" class="card-desc" style="fill: #86efac;" x="200">Without upgrading to larger or more expensive models</text>
    </g>

    <!-- Target metrics at bottom -->
    <text y="480" class="section-label" x="50">TARGET METRICS:</text>
    <text y="480" class="card-desc" x="170">Compaction: 50-70% reduction, &lt;5% quality loss</text>
    <text y="480" class="card-desc" x="420">Masking: 60-80% reduction on tool outputs</text>
    <text y="480" class="card-desc" x="670">Cache: 70%+ hit rate for stable workloads</text>

</svg>
