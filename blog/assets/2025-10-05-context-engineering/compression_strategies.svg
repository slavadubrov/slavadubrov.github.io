<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" role="img" aria-labelledby="title desc">
  <title id="title">Loss-aware context compression with separate canonical state and artifact indexes</title>
  <desc id="desc">Conversation and observations are summarized into a compact working set, while canonical task state, evidence references, and artifact history remain stored separately for exact recovery.</desc>
  <rect width="1000" height="440" rx="22" fill="#0f172a"/><text x="500" y="48" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Compress prose; preserve recoverable state</text>
  <g font-family="system-ui, sans-serif"><g transform="translate(35 105)"><rect width="260" height="230" rx="16" fill="#1e293b" stroke="#64748b"/><text x="130" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#e2e8f0">Growing context</text><text x="30" y="83" font-size="13" fill="#cbd5e1">conversation turns</text><text x="30" y="116" font-size="13" fill="#cbd5e1">raw tool observations</text><text x="30" y="149" font-size="13" fill="#cbd5e1">retrieved passages</text><text x="30" y="182" font-size="13" fill="#cbd5e1">repeated boilerplate</text></g><text x="325" y="225" font-size="25" fill="#94a3b8">→</text>
  <g transform="translate(365 105)"><rect width="270" height="230" rx="16" fill="#172554" stroke="#3b82f6"/><text x="135" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#93c5fd">Compact working set</text><text x="30" y="83" font-size="13" fill="#dbeafe">decisions + next action</text><text x="30" y="116" font-size="13" fill="#dbeafe">typed tool findings</text><text x="30" y="149" font-size="13" fill="#dbeafe">source + artifact refs</text><text x="30" y="182" font-size="13" fill="#dbeafe">unresolved questions</text></g><text x="665" y="225" font-size="25" fill="#94a3b8">+</text>
  <g transform="translate(705 85)"><rect width="260" height="270" rx="16" fill="#052e2b" stroke="#14b8a6"/><text x="130" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#5eead4">Canonical stores</text><text x="30" y="83" font-size="13" fill="#ccfbf1">task state</text><text x="30" y="116" font-size="13" fill="#ccfbf1">file and artifact index</text><text x="30" y="149" font-size="13" fill="#ccfbf1">full tool results</text><text x="30" y="182" font-size="13" fill="#ccfbf1">evidence versions</text><text x="30" y="225" font-size="12" fill="#99f6e4">Re-fetch exact details</text><text x="30" y="247" font-size="12" fill="#99f6e4">when the task needs them.</text></g><text x="500" y="400" text-anchor="middle" font-size="13" fill="#94a3b8">Optimize total tokens per successful task, including re-fetch and recovery.</text></g>
</svg>
