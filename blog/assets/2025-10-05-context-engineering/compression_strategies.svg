<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Loss-aware context compression with separate canonical state and artifact indexes</title>
  <desc id="desc">Conversation and observations are summarized into a compact working set, while canonical task state, evidence references, and artifact history remain stored separately for exact recovery.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="440" rx="22" fill="#0f172a"/><text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Compress prose; preserve recoverable state</text>
  <g font-family="Inter, system-ui, sans-serif"><g transform="translate(35 105)"><rect width="260" height="230" rx="16" fill="#1e293b" stroke="#64748b"/><text x="130" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#e2e8f0">Growing context</text><text x="30" y="83" font-size="13" fill="#cbd5e1">conversation turns</text><text x="30" y="116" font-size="13" fill="#cbd5e1">raw tool observations</text><text x="30" y="149" font-size="13" fill="#cbd5e1">retrieved passages</text><text x="30" y="182" font-size="13" fill="#cbd5e1">repeated boilerplate</text></g><text x="325" y="225" font-size="25" fill="#94a3b8">→</text>
  <g transform="translate(365 105)"><rect width="270" height="230" rx="16" fill="#1d4ed8" stroke="#2563eb"/><text x="135" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#93c5fd">Compact working set</text><text x="30" y="83" font-size="13" fill="#93c5fd">decisions + next action</text><text x="30" y="116" font-size="13" fill="#93c5fd">typed tool findings</text><text x="30" y="149" font-size="13" fill="#93c5fd">source + artifact refs</text><text x="30" y="182" font-size="13" fill="#93c5fd">unresolved questions</text></g><text x="665" y="225" font-size="25" fill="#94a3b8">+</text>
  <g transform="translate(705 85)"><rect width="260" height="270" rx="16" fill="#1d4ed8" stroke="#2563eb"/><text x="130" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#93c5fd">Canonical stores</text><text x="30" y="83" font-size="13" fill="#93c5fd">task state</text><text x="30" y="116" font-size="13" fill="#93c5fd">file and artifact index</text><text x="30" y="149" font-size="13" fill="#93c5fd">full tool results</text><text x="30" y="182" font-size="13" fill="#93c5fd">evidence versions</text><text x="30" y="225" font-size="12" fill="#93c5fd">Re-fetch exact details</text><text x="30" y="247" font-size="12" fill="#93c5fd">when the task needs them.</text></g><text x="500" y="400" text-anchor="middle" font-size="13" fill="#94a3b8">Optimize total tokens per successful task, including re-fetch and recovery.</text></g>
</svg>
