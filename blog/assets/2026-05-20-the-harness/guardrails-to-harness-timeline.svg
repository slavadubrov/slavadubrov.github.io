<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 340" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadowT" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <marker id="arrowT" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>

  <text x="550" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">From Guardrails to Harness: The Rename That Stuck</text>
  <text x="550" y="52" text-anchor="middle" font-size="11" fill="#888">Six inflection-point posts, July 14, 2025 → March 10, 2026 (ticks are time-scaled)</text>

  <!-- Timeline axis: time-proportional, 930 px across 239 days -->
  <line x1="90" y1="170" x2="1020" y2="170" stroke="#1a1a2e" stroke-width="2"/>

  <!-- Paradigm bookends on the axis -->
  <rect x="35" y="158" width="50" height="24" rx="4" fill="#fce4ec" stroke="#c62828" stroke-width="1"/>
  <text x="60" y="175" text-anchor="middle" font-size="10" font-weight="700" fill="#c62828">2024</text>
  <text x="60" y="197" text-anchor="middle" font-size="9" fill="#888">Guardrails</text>

  <rect x="1030" y="158" width="50" height="24" rx="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
  <text x="1055" y="175" text-anchor="middle" font-size="10" font-weight="700" fill="#2e7d32">2026</text>
  <text x="1055" y="197" text-anchor="middle" font-size="9" fill="#888">Harness</text>

  <!-- Tick 1: Huntley/Ralph — Jul 14, 2025 (day 0) — x=90 -->
  <circle cx="90" cy="170" r="6" fill="#6a1b9a" stroke="#fff" stroke-width="2"/>
  <line x1="90" y1="164" x2="90" y2="118" stroke="#6a1b9a" stroke-width="1"/>
  <rect x="20" y="78" width="150" height="40" rx="4" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1"/>
  <text x="95" y="94" text-anchor="middle" font-size="10" font-weight="700" fill="#6a1b9a">Huntley · Ralph</text>
  <text x="95" y="110" text-anchor="middle" font-size="9" fill="#555">Jul 14, 2025 · one bash loop</text>

  <!-- Tick 2: Ji/Manus — Jul 18, 2025 (day 4) — x=106 -->
  <circle cx="106" cy="170" r="6" fill="#1565c0" stroke="#fff" stroke-width="2"/>
  <line x1="106" y1="176" x2="106" y2="220" stroke="#1565c0" stroke-width="1"/>
  <rect x="36" y="220" width="150" height="40" rx="4" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="111" y="236" text-anchor="middle" font-size="10" font-weight="700" fill="#1565c0">Ji (Manus) · Context Eng.</text>
  <text x="111" y="252" text-anchor="middle" font-size="9" fill="#555">Jul 18, 2025 · four rewrites</text>

  <!-- Tick 3: Vercel — Dec 15, 2025 (day 154) — x=689 -->
  <circle cx="689" cy="170" r="6" fill="#e65100" stroke="#fff" stroke-width="2"/>
  <line x1="689" y1="164" x2="689" y2="118" stroke="#e65100" stroke-width="1"/>
  <rect x="619" y="78" width="140" height="40" rx="4" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
  <text x="689" y="94" text-anchor="middle" font-size="10" font-weight="700" fill="#e65100">Vercel · Removed 80%</text>
  <text x="689" y="110" text-anchor="middle" font-size="9" fill="#555">Dec 2025 · 80% → 100%</text>

  <!-- Tick 4: Schmid — Jan 5, 2026 (day 175) — x=771 -->
  <circle cx="771" cy="170" r="6" fill="#6a1b9a" stroke="#fff" stroke-width="2"/>
  <line x1="771" y1="176" x2="771" y2="220" stroke="#6a1b9a" stroke-width="1"/>
  <rect x="701" y="220" width="140" height="40" rx="4" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1"/>
  <text x="771" y="236" text-anchor="middle" font-size="10" font-weight="700" fill="#6a1b9a">Schmid · CPU/RAM/OS</text>
  <text x="771" y="252" text-anchor="middle" font-size="9" fill="#555">Jan 5, 2026 · "harness is the OS"</text>

  <!-- Tick 5: Lopopolo (OpenAI) — Feb 11, 2026 (day 212) — x=915 -->
  <circle cx="915" cy="170" r="6" fill="#2e7d32" stroke="#fff" stroke-width="2"/>
  <line x1="915" y1="164" x2="915" y2="118" stroke="#2e7d32" stroke-width="1"/>
  <rect x="845" y="78" width="140" height="40" rx="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
  <text x="915" y="94" text-anchor="middle" font-size="10" font-weight="700" fill="#2e7d32">Lopopolo (OpenAI) · Codex</text>
  <text x="915" y="110" text-anchor="middle" font-size="9" fill="#555">Feb 11, 2026 · "harness engineering"</text>

  <!-- Tick 6: Trivedy (LangChain) — Mar 10, 2026 (day 239) — x=1020 -->
  <circle cx="1020" cy="170" r="6" fill="#1565c0" stroke="#fff" stroke-width="2"/>
  <line x1="1020" y1="176" x2="1020" y2="220" stroke="#1565c0" stroke-width="1"/>
  <rect x="925" y="220" width="150" height="40" rx="4" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="1000" y="236" text-anchor="middle" font-size="10" font-weight="700" fill="#1565c0">Trivedy (LangChain)</text>
  <text x="1000" y="252" text-anchor="middle" font-size="9" fill="#555">Mar 10, 2026 · "if you're not the model…"</text>

  <!-- Bracket annotation for the tight Jul 14–18 pair -->
  <path d="M 82 142 L 82 138 L 114 138 L 114 142" stroke="#888" stroke-width="1" fill="none"/>
  <text x="98" y="133" text-anchor="middle" font-size="8" font-style="italic" fill="#888">4-day gap</text>

  <!-- Footer -->
  <text x="550" y="300" text-anchor="middle" font-size="10" font-style="italic" fill="#6a1b9a">The term "harness" migrated from lm-evaluation-harness into the name for everything around the model.</text>
</svg>
