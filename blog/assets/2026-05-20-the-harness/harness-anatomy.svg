<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadowH" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <text x="550" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">Anatomy of a Harness: Eight Load-Bearing Components</text>
  <text x="550" y="52" text-anchor="middle" font-size="11" fill="#888">The model reasons. The harness does everything else.</text>

  <!-- Outer Harness container -->
  <rect x="30" y="85" width="1040" height="585" rx="16" fill="#fafaff" stroke="#6a1b9a" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.7"/>
  <!-- "Harness" badge on top border -->
  <rect x="510" y="75" width="80" height="22" rx="5" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="550" y="91" text-anchor="middle" font-size="12" font-weight="700" fill="#6a1b9a">Harness</text>

  <!-- Connector lines (drawn before boxes so boxes/model sit on top) -->
  <!-- Top row → model edge -->
  <line x1="170" y1="215" x2="486" y2="357" stroke="#6a1b9a" stroke-width="1" opacity="0.35"/>
  <line x1="430" y1="215" x2="510" y2="328" stroke="#6a1b9a" stroke-width="1" opacity="0.35"/>
  <line x1="690" y1="215" x2="594" y2="331" stroke="#6a1b9a" stroke-width="1" opacity="0.35"/>
  <line x1="950" y1="215" x2="614" y2="358" stroke="#6a1b9a" stroke-width="1" opacity="0.35"/>
  <!-- Bottom row → model edge -->
  <line x1="170" y1="555" x2="486" y2="414" stroke="#6a1b9a" stroke-width="1" opacity="0.35"/>
  <line x1="430" y1="555" x2="510" y2="442" stroke="#6a1b9a" stroke-width="1" opacity="0.35"/>
  <line x1="690" y1="555" x2="594" y2="439" stroke="#6a1b9a" stroke-width="1" opacity="0.35"/>
  <line x1="950" y1="555" x2="614" y2="412" stroke="#6a1b9a" stroke-width="1" opacity="0.35"/>

  <!-- Model (center) -->
  <circle cx="550" cy="385" r="70" fill="#6a1b9a" filter="url(#shadowH)"/>
  <text x="550" y="380" text-anchor="middle" font-size="14" font-weight="700" fill="white">Model</text>
  <text x="550" y="400" text-anchor="middle" font-size="10" fill="#e0c0f0">(reasons, plans)</text>

  <!-- ================= Top row ================= -->

  <!-- 1 · Permissions (red) -->
  <rect x="55" y="120" width="230" height="95" rx="10" fill="#fce4ec" stroke="#c62828" stroke-width="2" filter="url(#shadowH)"/>
  <text x="170" y="143" text-anchor="middle" font-size="13" font-weight="700" fill="#c62828">1 · Permissions</text>
  <text x="170" y="163" text-anchor="middle" font-size="10" fill="#555">Deterministic policy before</text>
  <text x="170" y="177" text-anchor="middle" font-size="10" fill="#555">any tool runs</text>
  <text x="170" y="197" text-anchor="middle" font-size="9" font-style="italic" fill="#888">six modes · sandbox policies</text>

  <!-- 2 · Hooks & Lifecycle (orange) -->
  <rect x="315" y="120" width="230" height="95" rx="10" fill="#fff3e0" stroke="#e65100" stroke-width="2" filter="url(#shadowH)"/>
  <text x="430" y="143" text-anchor="middle" font-size="13" font-weight="700" fill="#e65100">2 · Hooks &amp; Lifecycle</text>
  <text x="430" y="163" text-anchor="middle" font-size="10" fill="#555">PreToolUse, Stop,</text>
  <text x="430" y="177" text-anchor="middle" font-size="10" fill="#555">SessionStart, PreCompact…</text>
  <text x="430" y="197" text-anchor="middle" font-size="9" font-style="italic" fill="#888">deny here beats bypassPermissions</text>

  <!-- 3 · Human-in-the-Loop (blue) -->
  <rect x="575" y="120" width="230" height="95" rx="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" filter="url(#shadowH)"/>
  <text x="690" y="143" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">3 · Human-in-the-Loop</text>
  <text x="690" y="163" text-anchor="middle" font-size="10" fill="#555">Pause, edit, resume</text>
  <text x="690" y="177" text-anchor="middle" font-size="10" fill="#555">via checkpoints</text>
  <text x="690" y="197" text-anchor="middle" font-size="9" font-style="italic" fill="#888">LangGraph interrupt() / Command</text>

  <!-- 4 · Context Lifecycle (green) -->
  <rect x="835" y="120" width="230" height="95" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" filter="url(#shadowH)"/>
  <text x="950" y="143" text-anchor="middle" font-size="13" font-weight="700" fill="#2e7d32">4 · Context Lifecycle</text>
  <text x="950" y="163" text-anchor="middle" font-size="10" fill="#555">Compaction, resets,</text>
  <text x="950" y="177" text-anchor="middle" font-size="10" fill="#555">handoff artifacts</text>
  <text x="950" y="197" text-anchor="middle" font-size="9" font-style="italic" fill="#888">claude-progress.txt + git</text>

  <!-- ================= Bottom row ================= -->

  <!-- 5 · Filesystem-as-memory (purple) -->
  <rect x="55" y="555" width="230" height="95" rx="10" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" filter="url(#shadowH)"/>
  <text x="170" y="578" text-anchor="middle" font-size="13" font-weight="700" fill="#6a1b9a">5 · Filesystem Primitive</text>
  <text x="170" y="598" text-anchor="middle" font-size="10" fill="#555">Durable state across</text>
  <text x="170" y="612" text-anchor="middle" font-size="10" fill="#555">context windows</text>
  <text x="170" y="632" text-anchor="middle" font-size="9" font-style="italic" fill="#888">docs/ as system of record</text>

  <!-- 6 · Tool Orchestration (blue) -->
  <rect x="315" y="555" width="230" height="95" rx="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" filter="url(#shadowH)"/>
  <text x="430" y="578" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">6 · Tool Orchestration</text>
  <text x="430" y="598" text-anchor="middle" font-size="10" fill="#555">Progressive disclosure,</text>
  <text x="430" y="612" text-anchor="middle" font-size="10" fill="#555">MCP, skills, code exec</text>
  <text x="430" y="632" text-anchor="middle" font-size="9" font-style="italic" fill="#888">routes which schemas enter context</text>

  <!-- 7 · Observability (orange) -->
  <rect x="575" y="555" width="230" height="95" rx="10" fill="#fff3e0" stroke="#e65100" stroke-width="2" filter="url(#shadowH)"/>
  <text x="690" y="578" text-anchor="middle" font-size="13" font-weight="700" fill="#e65100">7 · Observability</text>
  <text x="690" y="598" text-anchor="middle" font-size="10" fill="#555">Per-worktree LogQL / Prom,</text>
  <text x="690" y="612" text-anchor="middle" font-size="10" fill="#555">audit trails, drift detection</text>
  <text x="690" y="632" text-anchor="middle" font-size="9" font-style="italic" fill="#888">six-hour runs need real telemetry</text>

  <!-- 8 · Multi-agent Coord. (red) -->
  <rect x="835" y="555" width="230" height="95" rx="10" fill="#fce4ec" stroke="#c62828" stroke-width="2" filter="url(#shadowH)"/>
  <text x="950" y="578" text-anchor="middle" font-size="13" font-weight="700" fill="#c62828">8 · Multi-agent Coord.</text>
  <text x="950" y="598" text-anchor="middle" font-size="10" fill="#555">Planner · Generator · Eval,</text>
  <text x="950" y="612" text-anchor="middle" font-size="10" fill="#555">subagent spawn, handoffs</text>
  <text x="950" y="632" text-anchor="middle" font-size="9" font-style="italic" fill="#888">counters self-flattery</text>

  <!-- Footer -->
  <text x="550" y="688" text-anchor="middle" font-size="9" fill="#aaa">Synthesized from Trivedy (LangChain), HKUDS OpenHarness, Anthropic "Effective harnesses," and Claude Code / Codex documentation</text>
</svg>
