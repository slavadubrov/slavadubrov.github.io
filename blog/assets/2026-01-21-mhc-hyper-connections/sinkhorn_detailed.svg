<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 480" style="background-color: #f8fafc; font-family: Inter, system-ui, sans-serif;" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Sinkhorn-Knopp projection used by mHC</title>
  <desc id="desc">Raw logits are exponentiated, then rows and columns are normalized repeatedly. The paper uses 20 iterations to obtain an approximate doubly stochastic matrix.</desc>
  <defs>
    <!-- Background grid -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>
    </pattern>

    <!-- Markers for arrows -->
    <!-- Default Orange Arrow -->
    <marker id="arrowOrange" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#ea580c"/>
    </marker>

    <!-- Shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="1050" height="480" fill="#f8fafc"/>

  <!-- Background grid layer -->
  <rect width="1050" height="480" fill="#f8fafc"/>

  <!-- Top Title -->
  <text x="525" y="45" text-anchor="middle" font-size="28" font-weight="800" fill="#0f172a">Implementing the Fix: The Sinkhorn Algorithm</text>
  <text x="525" y="75" text-anchor="middle" font-size="16" fill="#334155">Alternating row and column normalization for an approximate projection.</text>

  <!-- ========================================== -->
  <!-- Step 1: Raw Matrix                         -->
  <!-- ========================================== -->
  <g transform="translate(15, 140)">
    <rect x="0" y="0" width="140" height="140" rx="12" fill="#ffffff" stroke="#1e293b" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="70" y="-12" text-anchor="middle" font-size="15" font-weight="800" fill="#1e293b">Raw Matrix</text>

    <g font-family="SFMono-Regular, Consolas, monospace" font-size="15" fill="#0f172a" text-anchor="middle">
      <text x="25" y="40" fill="#dc2626" font-weight="700">-0.5</text> <text x="70" y="40">2.1</text> <text x="115" y="40">0.8</text>
      <text x="25" y="80">1.3</text> <text x="70" y="80" fill="#dc2626" font-weight="700">-4.0</text> <text x="115" y="80">1.9</text>
      <text x="25" y="120">0.1</text> <text x="70" y="120">0.6</text> <text x="115" y="120" fill="#dc2626" font-weight="700">-0.2</text>
    </g>
  </g>

  <!-- Arrow 1: Exp() -->
  <g transform="translate(165, 210)">
    <rect x="0" y="-15" width="60" height="30" rx="15" fill="#ea580c"/>
    <text x="30" y="5" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Exp()</text>
    <line x1="60" y1="0" x2="72" y2="0" stroke="#ea580c" stroke-width="3" marker-end="url(#arrowOrange)"/>
  </g>

  <!-- ========================================== -->
  <!-- Step 2: Positivity                         -->
  <!-- ========================================== -->
  <g transform="translate(245, 140)">
    <rect x="0" y="0" width="140" height="140" rx="12" fill="#ffffff" stroke="#166534" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="70" y="-12" text-anchor="middle" font-size="15" font-weight="800" fill="#166534">Positivity</text>

    <g font-family="SFMono-Regular, Consolas, monospace" font-size="15" fill="#166534" text-anchor="middle">
      <text x="25" y="40">0.61</text>  <text x="70" y="40">8.17</text>  <text x="115" y="40">2.23</text>
      <text x="25" y="80">3.67</text>  <text x="70" y="80">0.02</text>  <text x="115" y="80">6.69</text>
      <text x="25" y="120">1.11</text> <text x="70" y="120">1.82</text> <text x="115" y="120">0.82</text>
    </g>

    <g font-size="12" font-weight="800" fill="#ea580c" text-anchor="start">
      <text x="145" y="40">Σ=11.00</text>
      <text x="145" y="80">Σ=10.37</text>
      <text x="145" y="120">Σ=3.75</text>
    </g>
  </g>

  <!-- Arrow 2: Normalize Rows -->
  <g transform="translate(445, 210)">
    <rect x="-5" y="-20" width="80" height="40" rx="20" fill="#ea580c"/>
    <text x="35" y="-3" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Normalize</text>
    <text x="35" y="13" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Rows</text>
    <line x1="75" y1="0" x2="87" y2="0" stroke="#ea580c" stroke-width="3" marker-end="url(#arrowOrange)"/>
  </g>

  <!-- ========================================== -->
  <!-- Step 3: Row Normalized                     -->
  <!-- ========================================== -->
  <g transform="translate(540, 140)">
    <rect x="0" y="0" width="140" height="140" rx="12" fill="#ffffff" stroke="#1d4ed8" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="70" y="-12" text-anchor="middle" font-size="15" font-weight="800" fill="#1d4ed8">Row Normalized</text>

    <g font-family="SFMono-Regular, Consolas, monospace" font-size="14" fill="#1e293b" text-anchor="middle">
      <text x="25" y="40">0.055</text> <text x="70" y="40">0.742</text> <text x="115" y="40">0.202</text>
      <text x="25" y="80">0.354</text> <text x="70" y="80">0.002</text> <text x="115" y="80">0.645</text>
      <text x="25" y="120">0.295</text> <text x="70" y="120">0.486</text> <text x="115" y="120">0.219</text>
    </g>

    <!-- Row sums OUTSIDE box -->
    <g font-size="12" font-weight="800" fill="#166534" text-anchor="start">
      <text x="145" y="40">Σ=1.0</text>
      <text x="145" y="80">Σ=1.0</text>
      <text x="145" y="120">Σ=1.0</text>
    </g>

    <!-- Column sums BELOW box -->
    <g font-size="12" font-weight="800" fill="#ea580c" text-anchor="middle">
      <text x="25" y="160">Σ=.704</text>
      <text x="70" y="160">Σ=1.231</text>
      <text x="115" y="160">Σ=1.065</text>
    </g>
  </g>

  <!-- Arrow 3: Normalize Cols -->
  <g transform="translate(740, 210)">
    <rect x="-5" y="-20" width="80" height="40" rx="20" fill="#ea580c"/>
    <text x="35" y="-3" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Normalize</text>
    <text x="35" y="13" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Cols</text>
    <line x1="75" y1="0" x2="87" y2="0" stroke="#ea580c" stroke-width="3" marker-end="url(#arrowOrange)"/>
  </g>

  <!-- ========================================== -->
  <!-- Step 4: Doubly Stochastic Matrix           -->
  <!-- ========================================== -->
  <g transform="translate(835, 140)">
    <rect x="0" y="0" width="140" height="140" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="3" filter="url(#shadow)"/>
    <text x="70" y="-12" text-anchor="middle" font-size="15" font-weight="800" fill="#166534">Doubly Stochastic</text>

    <g font-family="SFMono-Regular, Consolas, monospace" font-size="14" fill="#166534" font-weight="700" text-anchor="middle">
      <text x="25" y="40">0.102</text> <text x="70" y="40">0.653</text> <text x="115" y="40">0.244</text>
      <text x="25" y="80">0.457</text> <text x="70" y="80">0.001</text> <text x="115" y="80">0.542</text>
      <text x="25" y="120">0.441</text> <text x="70" y="120">0.346</text> <text x="115" y="120">0.213</text>
    </g>

    <!-- Final Row sums OUTSIDE box -->
    <g font-size="12" font-weight="800" fill="#166534" text-anchor="start">
      <text x="145" y="40">→ 1.0</text>
      <text x="145" y="80">→ 1.0</text>
      <text x="145" y="120">→ 1.0</text>
    </g>

    <!-- Final Column sums BELOW box -->
    <g font-size="12" font-weight="800" fill="#166534" text-anchor="middle">
      <text x="25" y="160">↓ 1.0</text>
      <text x="70" y="160">↓ 1.0</text>
      <text x="115" y="160">↓ 1.0</text>
    </g>
  </g>

  <!-- ========================================== -->
  <!-- Iteration Loop                             -->
  <!-- ========================================== -->
  <!-- Starts below Box 4 (x=905, y=320) and loops to Arrow 2 (x=480, y=240) -->
  <path d="M 905 320 Q 905 375 690 375 Q 480 375 480 245" fill="none" stroke="#ea580c" stroke-width="2.5" stroke-dasharray="6,5" marker-end="url(#arrowOrange)"/>

  <g transform="translate(690, 375)">
    <rect x="-85" y="-14" width="170" height="28" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" font-size="12" font-weight="800" fill="#9a3412">Repeat t times (t ≈ 20)</text>
  </g>

  <!-- ========================================== -->
  <!-- Bottom Explanation Card                    -->
  <!-- ========================================== -->
  <g transform="translate(50, 420)">
    <rect x="0" y="0" width="950" height="44" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="475" y="27" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">The paper fuses this loop and recomputes its backward intermediates in a custom kernel.</text>
  </g>

</svg>
