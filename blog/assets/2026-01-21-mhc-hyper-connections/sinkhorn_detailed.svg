<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 480" style="background-color: #f8fafc; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;">
  <defs>
    <!-- Background grid -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>
    </pattern>

    <!-- Markers for arrows -->
    <!-- Default Orange Arrow -->
    <marker id="arrowOrange" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#ea580c"/>
    </marker>

    <!-- Shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background grid layer -->
  <rect width="1050" height="480" fill="url(#grid)"/>

  <!-- Top Title -->
  <text x="525" y="45" text-anchor="middle" font-size="28" font-weight="800" fill="#0f172a">Implementing the Fix: The Sinkhorn Algorithm</text>
  <text x="525" y="75" text-anchor="middle" font-size="16" fill="#475569">Iteratively forcing Double Stochasticity on an unconstrained matrix.</text>

  <!-- ========================================== -->
  <!-- Step 1: Raw Matrix                         -->
  <!-- ========================================== -->
  <g transform="translate(15, 140)">
    <rect x="0" y="0" width="140" height="140" rx="12" fill="#ffffff" stroke="#1e293b" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="70" y="-12" text-anchor="middle" font-size="15" font-weight="800" fill="#1e293b">Raw Matrix</text>

    <g font-family="monospace" font-size="15" fill="#0f172a" text-anchor="middle">
      <text x="25" y="40" fill="#e11d48" font-weight="700">-0.5</text> <text x="70" y="40">2.1</text> <text x="115" y="40">0.8</text>
      <text x="25" y="80">1.3</text> <text x="70" y="80" fill="#e11d48" font-weight="700">-4.0</text> <text x="115" y="80">1.9</text>
      <text x="25" y="120">0.1</text> <text x="70" y="120">0.6</text> <text x="115" y="120" fill="#e11d48" font-weight="700">-0.2</text>
    </g>
  </g>

  <!-- Arrow 1: Exp() -->
  <g transform="translate(165, 210)">
    <rect x="0" y="-15" width="60" height="30" rx="15" fill="#f97316"/>
    <text x="30" y="5" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Exp()</text>
    <line x1="60" y1="0" x2="72" y2="0" stroke="#f97316" stroke-width="3" marker-end="url(#arrowOrange)"/>
  </g>

  <!-- ========================================== -->
  <!-- Step 2: Positivity                         -->
  <!-- ========================================== -->
  <g transform="translate(245, 140)">
    <rect x="0" y="0" width="140" height="140" rx="12" fill="#ffffff" stroke="#059669" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="70" y="-12" text-anchor="middle" font-size="15" font-weight="800" fill="#047857">Positivity</text>

    <g font-family="monospace" font-size="15" fill="#059669" text-anchor="middle">
      <text x="25" y="40">0.6</text>   <text x="70" y="40">7.9</text>   <text x="115" y="40">2.2</text>
      <text x="25" y="80">3.7</text>   <text x="70" y="80">0.02</text>  <text x="115" y="80">6.7</text>
      <text x="25" y="120">1.1</text>  <text x="70" y="120">1.8</text>  <text x="115" y="120">0.8</text>
    </g>

    <g font-size="12" font-weight="800" fill="#ea580c" text-anchor="start">
      <text x="145" y="40">Σ=10.7</text>
      <text x="145" y="80">Σ=10.4</text>
      <text x="145" y="120">Σ=3.7</text>
    </g>
  </g>

  <!-- Arrow 2: Normalize Rows -->
  <g transform="translate(445, 210)">
    <rect x="-5" y="-20" width="80" height="40" rx="20" fill="#f97316"/>
    <text x="35" y="-3" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Normalize</text>
    <text x="35" y="13" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Rows</text>
    <line x1="75" y1="0" x2="87" y2="0" stroke="#f97316" stroke-width="3" marker-end="url(#arrowOrange)"/>
  </g>

  <!-- ========================================== -->
  <!-- Step 3: Row Normalized                     -->
  <!-- ========================================== -->
  <g transform="translate(540, 140)">
    <rect x="0" y="0" width="140" height="140" rx="12" fill="#ffffff" stroke="#1e3a8a" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="70" y="-12" text-anchor="middle" font-size="15" font-weight="800" fill="#1e3a8a">Row Normalized</text>

    <g font-family="monospace" font-size="14" fill="#1e293b" text-anchor="middle">
      <text x="25" y="40">0.25</text>  <text x="70" y="40">0.65</text>  <text x="115" y="40">0.10</text>
      <text x="25" y="80">0.35</text>  <text x="70" y="80">0.01</text>  <text x="115" y="80">0.64</text>
      <text x="25" y="120">0.30</text>  <text x="70" y="120">0.45</text>  <text x="115" y="120">0.25</text>
    </g>

    <!-- Row sums OUTSIDE box -->
    <g font-size="12" font-weight="800" fill="#059669" text-anchor="start">
      <text x="145" y="40">Σ=1.0</text>
      <text x="145" y="80">Σ=1.0</text>
      <text x="145" y="120">Σ=1.0</text>
    </g>

    <!-- Column sums BELOW box -->
    <g font-size="12" font-weight="800" fill="#ea580c" text-anchor="middle">
      <text x="25" y="160">Σ=0.9</text>
      <text x="70" y="160">Σ=1.11</text>
      <text x="115" y="160">Σ=0.99</text>
    </g>
  </g>

  <!-- Arrow 3: Normalize Cols -->
  <g transform="translate(740, 210)">
    <rect x="-5" y="-20" width="80" height="40" rx="20" fill="#f97316"/>
    <text x="35" y="-3" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Normalize</text>
    <text x="35" y="13" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Cols</text>
    <line x1="75" y1="0" x2="87" y2="0" stroke="#f97316" stroke-width="3" marker-end="url(#arrowOrange)"/>
  </g>

  <!-- ========================================== -->
  <!-- Step 4: Doubly Stochastic Matrix           -->
  <!-- ========================================== -->
  <g transform="translate(835, 140)">
    <rect x="0" y="0" width="140" height="140" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="3" filter="url(#shadow)"/>
    <text x="70" y="-12" text-anchor="middle" font-size="15" font-weight="800" fill="#047857">Doubly Stochastic</text>

    <g font-family="monospace" font-size="14" fill="#047857" font-weight="700" text-anchor="middle">
      <text x="25" y="40">0.28</text>  <text x="70" y="40">0.45</text>  <text x="115" y="40">0.27</text>
      <text x="25" y="80">0.40</text>  <text x="70" y="80">0.09</text>  <text x="115" y="80">0.51</text>
      <text x="25" y="120">0.32</text>  <text x="70" y="120">0.46</text>  <text x="115" y="120">0.22</text>
    </g>

    <!-- Final Row sums OUTSIDE box -->
    <g font-size="12" font-weight="800" fill="#047857" text-anchor="start">
      <text x="145" y="40">→ 1.0</text>
      <text x="145" y="80">→ 1.0</text>
      <text x="145" y="120">→ 1.0</text>
    </g>

    <!-- Final Column sums BELOW box -->
    <g font-size="12" font-weight="800" fill="#047857" text-anchor="middle">
      <text x="25" y="160">↓ 1.0</text>
      <text x="70" y="160">↓ 1.0</text>
      <text x="115" y="160">↓ 1.0</text>
    </g>
  </g>

  <!-- ========================================== -->
  <!-- Iteration Loop                             -->
  <!-- ========================================== -->
  <!-- Starts below Box 4 (x=905, y=320) and loops to Arrow 2 (x=480, y=240) -->
  <path d="M 905 320 Q 905 375 690 375 Q 480 375 480 245" fill="none" stroke="#f97316" stroke-width="2.5" stroke-dasharray="6,5" marker-end="url(#arrowOrange)"/>

  <g transform="translate(690, 375)">
    <rect x="-85" y="-14" width="170" height="28" rx="14" fill="#ffedd5" stroke="#f97316" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" font-size="12" font-weight="800" fill="#c2410c">Repeat t times (t ≈ 20)</text>
  </g>

  <!-- ========================================== -->
  <!-- Bottom Explanation Card                    -->
  <!-- ========================================== -->
  <g transform="translate(50, 420)">
    <rect x="0" y="0" width="950" height="44" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="475" y="27" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">The Sinkhorn-Knopp algorithm is computationally efficient: <tspan font-weight="500" fill="#475569">Allows this constraint to be applied during training without stalling the pipeline.</tspan></text>
  </g>

</svg>
