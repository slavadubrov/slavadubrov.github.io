<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" style="background-color: #f8fafc; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;">
  <defs>
    <!-- Background grid -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>
    </pattern>

    <!-- Markers for arrows -->
    <marker id="arrowSlate" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#1e293b"/>
    </marker>
    <marker id="arrowAmber" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#f59e0b"/>
    </marker>

    <!-- Glow & Shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.1"/>
    </filter>

    <filter id="glowFaded" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowStrong" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="0.8"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background grid layer -->
  <rect width="1000" height="600" fill="url(#grid)"/>

  <!-- Top Title -->
  <text x="40" y="50" font-size="28" font-weight="800" fill="#0f172a">Post-LN vs Pre-LN Trade-offs</text>
  <text x="40" y="80" font-size="16" fill="#475569">Where to place Layer Normalization creates a fundamental trade-off.</text>

  <!-- Center divider -->
  <line x1="500" y1="120" x2="500" y2="520" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="8,6"/>
  <circle cx="500" cy="320" r="22" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="500" y="325" text-anchor="middle" fill="#64748b" font-size="14" font-weight="700">vs</text>

  <!-- LEFT SIDE: Post-LN -->
  <g transform="translate(140, 110)">

    <!-- Title -->
    <text x="110" y="25" text-anchor="middle" font-size="20" font-weight="800" fill="#0f172a">Post-LN</text>
    <text x="110" y="45" text-anchor="middle" font-size="13" fill="#64748b">(Original Transformer)</text>

    <!-- Base Paths -->
    <g stroke="#1e293b" stroke-width="2.5" fill="none">
      <!-- Input line down to split -->
      <path d="M 110 75 L 110 115" marker-end="url(#arrowSlate)"/>
      <circle cx="110" cy="125" r="8" fill="#ffffff" stroke="#1e293b"/>

      <!-- Split down to F(x) -->
      <path d="M 110 133 L 110 155" marker-end="url(#arrowSlate)"/>

      <!-- F(x) to Add -->
      <path d="M 110 210 L 110 235" marker-end="url(#arrowSlate)"/>

      <!-- Add to LN -->
      <path d="M 110 270 L 110 295" marker-end="url(#arrowSlate)"/>

      <!-- LN to Output -->
      <path d="M 110 350 L 110 375" marker-end="url(#arrowSlate)"/>
    </g>

    <!-- Residual Path (Post-LN) -->
    <!-- Gradient flow gets rescaled/faded by LN in backprop -->
    <path id="pathPostRes" d="M 118 125 C 220 125 220 255 130 255" fill="none" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrowAmber)"/>

    <!-- Animated Particles -->
    <!-- Signal weakens after LN in backward pass logic (simulated by faded color) -->
    <circle r="4.5" fill="#fde68a" filter="url(#glowFaded)">
      <animateMotion dur="3s" repeatCount="indefinite">
        <mpath href="#pathPostRes"/>
      </animateMotion>
    </circle>


    <!-- Flow Blocks -->
    <text x="110" y="65" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">x</text>

    <!-- F(x) block -->
    <rect x="40" y="160" width="140" height="50" rx="8" fill="#ffffff" stroke="#1e293b" stroke-width="2" filter="url(#shadow)"/>
    <text x="110" y="190" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">F(x)</text>

    <!-- Add circle -->
    <circle cx="110" cy="255" r="15" fill="#ffffff" stroke="#1e293b" stroke-width="2"/>
    <text x="110" y="261" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">+</text>

    <!-- LayerNorm Block (Red to indicate warning/issue area) -->
    <rect x="40" y="300" width="140" height="50" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
    <text x="110" y="330" text-anchor="middle" font-size="15" font-weight="700" fill="#b91c1c">LayerNorm</text>

    <!-- Properties Card (Bottom) -->
    <rect x="-30" y="400" width="280" height="65" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="10" y="425" font-size="13" font-weight="700" fill="#059669">✓ High model capacity</text>
    <text x="10" y="448" font-size="13" font-weight="700" fill="#e11d48">✗ Gradient vanishing</text>
  </g>


  <!-- RIGHT SIDE: Pre-LN -->
  <g transform="translate(640, 110)">

    <!-- Title -->
    <text x="110" y="25" text-anchor="middle" font-size="20" font-weight="800" fill="#0f172a">Pre-LN</text>
    <text x="110" y="45" text-anchor="middle" font-size="13" fill="#64748b">(Modern Transformer)</text>

    <!-- Base Paths -->
    <g stroke="#1e293b" stroke-width="2.5" fill="none">
      <!-- Input line down to split -->
      <path d="M 110 75 L 110 115" marker-end="url(#arrowSlate)"/>
      <circle cx="110" cy="125" r="8" fill="#ffffff" stroke="#1e293b"/>

      <!-- Split down to LN -->
      <path d="M 110 133 L 110 155" marker-end="url(#arrowSlate)"/>

      <!-- LN to F(x) -->
      <path d="M 110 210 L 110 235" marker-end="url(#arrowSlate)"/>

      <!-- F(x) to Add -->
      <path d="M 110 290 L 110 315" marker-end="url(#arrowSlate)"/>

      <!-- Add to Output -->
      <path d="M 110 345 L 110 375" marker-end="url(#arrowSlate)"/>
    </g>

    <!-- Residual Path (Pre-LN) -->
    <!-- Clean, strong identity path flowing straight through to addition -->
    <path id="pathPreRes" d="M 118 125 C 230 125 230 330 130 330" fill="none" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrowAmber)"/>

    <!-- Animated Particles -->
    <!-- Signal remains strong along the unbroken identity shortcut -->
    <circle r="4.5" fill="#fde68a" filter="url(#glowStrong)">
      <animateMotion dur="3.5s" repeatCount="indefinite">
        <mpath href="#pathPreRes"/>
      </animateMotion>
    </circle>

    <!-- Residual Identity Label -->
    <rect x="175" y="215" width="70" height="24" rx="12" fill="#fff7ed" stroke="#fb923c" stroke-width="1.5"/>
    <text x="210" y="232" text-anchor="middle" font-size="12" font-weight="700" fill="#ea580c">Identity</text>

    <!-- Flow Blocks -->
    <text x="110" y="65" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">x</text>

    <!-- LayerNorm Block (Green to indicate clean/stable placement) -->
    <rect x="40" y="160" width="140" height="50" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
    <text x="110" y="190" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">LayerNorm</text>

    <!-- F(x) block -->
    <rect x="40" y="240" width="140" height="50" rx="8" fill="#ffffff" stroke="#1e293b" stroke-width="2" filter="url(#shadow)"/>
    <text x="110" y="270" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">F(x)</text>

    <!-- Add circle -->
    <circle cx="110" cy="330" r="15" fill="#ffffff" stroke="#1e293b" stroke-width="2"/>
    <text x="110" y="336" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">+</text>

    <!-- Properties Card (Bottom) -->
    <rect x="-30" y="400" width="280" height="65" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="10" y="425" font-size="13" font-weight="700" fill="#059669">✓ Excellent stability</text>
    <text x="10" y="448" font-size="13" font-weight="700" fill="#e11d48">✗ Rep. collapse</text>
  </g>

</svg>
