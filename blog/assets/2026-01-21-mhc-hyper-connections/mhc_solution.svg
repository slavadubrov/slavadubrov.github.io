<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" style="background-color: #f8fafc; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;">
  <defs>
    <!-- Background grid -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>
    </pattern>

    <!-- Markers for arrows -->
    <marker id="arrowEmerald" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#059669"/>
    </marker>
    <marker id="arrowAmber" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#f59e0b"/>
    </marker>

    <!-- Glow & Shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background grid layer -->
  <rect width="1000" height="520" fill="url(#grid)"/>

  <!-- Top Title -->
  <text x="40" y="50" font-size="28" font-weight="800" fill="#0f172a">mHC Solution: Manifold-Constrained Structuring</text>
  <text x="40" y="80" font-size="16" fill="#475569">Projecting the routing matrices cleanly onto the Birkhoff Polytope.</text>

  <!-- Main Container -->
  <g transform="translate(60, 120)">

    <!-- Left Background Block (Constraints List) -->
    <rect x="0" y="0" width="300" height="280" rx="12" fill="#ffffff" fill-opacity="0.95" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>

    <text x="20" y="40" font-size="20" font-weight="800" fill="#0f172a">Birkhoff Conditions</text>
    <line x1="20" y1="55" x2="280" y2="55" stroke="#f1f5f9" stroke-width="2"/>

    <!-- Constraint 1 -->
    <g transform="translate(20, 80)">
      <rect x="0" y="0" width="20" height="20" rx="4" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
      <text x="10" y="15" text-anchor="middle" font-size="13" font-weight="700" fill="#d97706">1</text>
      <text x="35" y="16" font-size="16" font-weight="700" fill="#d97706">Positivity Rule</text>
      <text x="35" y="38" font-size="13" fill="#64748b">All elements must be > 0,</text>
      <text x="35" y="56" font-size="13" fill="#64748b">preventing gradient oscillation.</text>
    </g>

    <!-- Constraint 2 -->
    <g transform="translate(20, 150)">
      <rect x="0" y="0" width="20" height="20" rx="4" fill="#ecfdf5" stroke="#34d399" stroke-width="1"/>
      <text x="10" y="15" text-anchor="middle" font-size="13" font-weight="700" fill="#059669">2</text>
      <text x="35" y="16" font-size="16" font-weight="700" fill="#059669">Row Normalization</text>
      <text x="35" y="38" font-size="13" fill="#64748b">Each row's total sum equals 1.0,</text>
      <text x="35" y="56" font-size="13" fill="#64748b">fixing output channel scaling.</text>
    </g>

    <!-- Constraint 3 -->
    <g transform="translate(20, 220)">
      <rect x="0" y="0" width="20" height="20" rx="4" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1"/>
      <text x="10" y="15" text-anchor="middle" font-size="13" font-weight="700" fill="#0284c7">3</text>
      <text x="35" y="16" font-size="16" font-weight="700" fill="#0284c7">Column Normalization</text>
      <text x="35" y="38" font-size="13" fill="#64748b">Each col's total sum equals 1.0,</text>
      <text x="35" y="56" font-size="13" fill="#64748b">fixing fair input distribution.</text>
    </g>

    <!-- Connecting Arrow to Matrix -->
    <line x1="315" y1="140" x2="350" y2="140" stroke="#cbd5e1" stroke-width="3" stroke-dasharray="6,4" marker-end="url(#arrowSlate)"/>


    <!-- Center Matrix Display -->
    <g transform="translate(370, 0)">
      <rect x="0" y="0" width="480" height="280" rx="12" fill="#ffffff" fill-opacity="0.95" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
      <text x="240" y="40" text-anchor="middle" font-size="18" font-weight="800" fill="#047857">The Target Doubly Stochastic Matrix</text>

      <g transform="translate(65, 70)">

        <!-- Grid Structure -->
        <path d="M 0 0 L 300 0 L 300 160 L 0 160 Z" fill="#f8fafc" stroke="#94a3b8" stroke-width="1"/>
        <!-- Inner lines -->
        <g stroke="#cbd5e1" stroke-width="1">
          <line x1="75" y1="0" x2="75" y2="160"/>
          <line x1="150" y1="0" x2="150" y2="160"/>
          <line x1="225" y1="0" x2="225" y2="160"/>
          <line x1="0" y1="40" x2="300" y2="40"/>
          <line x1="0" y1="80" x2="300" y2="80"/>
          <line x1="0" y1="120" x2="300" y2="120"/>
        </g>

        <!-- Values representing Doubly Stochastic Structure -->
        <g fill="#0f172a" font-family="monospace" font-size="16" font-weight="600" text-anchor="middle">
          <!-- Row 1 -->
          <text x="37" y="27">.15</text>  <text x="112" y="27">.35</text>  <text x="187" y="27">.40</text>  <text x="262" y="27">.10</text>
          <!-- Row 2 -->
          <text x="37" y="67">.45</text>  <text x="112" y="67">.10</text>  <text x="187" y="67">.25</text>  <text x="262" y="67">.20</text>
          <!-- Row 3 -->
          <text x="37" y="107">.30</text> <text x="112" y="107">.25</text> <text x="187" y="107">.15</text> <text x="262" y="107">.30</text>
          <!-- Row 4 -->
          <text x="37" y="147">.10</text> <text x="112" y="147">.30</text> <text x="187" y="147">.20</text> <text x="262" y="147">.40</text>
        </g>

        <!-- Constraint Highlighting / Animation setup -->
        <!-- Highlight Row sum -->
        <text id="rowSumText" x="315" y="26" text-anchor="start" fill="#059669" font-size="14" font-weight="800">→ Σ = 1.0</text>

        <!-- Highlight Col sum -->
        <g text-anchor="middle" fill="#0284c7" font-size="14" font-weight="800">
          <text x="37" y="180">↓</text>
          <text id="colSumText" x="37" y="195">Σ = 1.0</text>
        </g>

        <!-- Animation block indicating scanning validation matrix -->
        <rect width="300" height="40" fill="#34d399" fill-opacity="0.1" pointer-events="none">
          <animate attributeName="y" values="0; 40; 80; 120; 0" dur="8s" repeatCount="indefinite" />
        </rect>
        <rect width="75" height="160" fill="#38bdf8" fill-opacity="0.1" pointer-events="none">
          <animate attributeName="x" values="0; 75; 150; 225; 0" dur="8s" repeatCount="indefinite" />
        </rect>


        <!-- Static Indicators (Remaining rows) -->
        <g font-size="14" font-weight="800" fill="#10b981">
          <text x="315" y="66">→ Σ = 1.0</text>
          <text x="315" y="106">→ Σ = 1.0</text>
          <text x="315" y="146">→ Σ = 1.0</text>
        </g>

        <!-- Static Indicators (Remaining cols) -->
        <g font-size="14" font-weight="800" fill="#38bdf8" text-anchor="middle">
          <text x="112" y="180">↓</text> <text x="112" y="195">Σ = 1.0</text>
          <text x="187" y="180">↓</text> <text x="187" y="195">Σ = 1.0</text>
          <text x="262" y="180">↓</text> <text x="262" y="195">Σ = 1.0</text>
        </g>

        <rect x="0" y="0" width="300" height="160" fill="none" stroke="#f59e0b" stroke-width="2"/>
        <text x="150" y="-12" text-anchor="middle" font-size="12" font-weight="700" fill="#ea580c">Condition 1: All values &gt; 0</text>

      </g>
    </g>
  </g>

  <!-- Bottom Outcome Strip -->
  <rect x="60" y="425" width="850" height="50" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="485" y="456" text-anchor="middle" font-size="18" font-weight="800" fill="#047857">Outcome: Energy In = Energy Out.</text>
  <text x="700" y="456" text-anchor="start" font-size="15" font-weight="600" fill="#059669"> Signal preserved indefinitely.</text>

</svg>
