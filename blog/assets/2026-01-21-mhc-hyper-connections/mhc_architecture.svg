<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 680" style="background-color: #f8fafc; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;">
  <defs>
    <!-- Background grid -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>
    </pattern>

    <!-- Markers for arrows -->
    <marker id="arrowSlate" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#334155"/>
    </marker>
    <marker id="arrowEmerald" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#10b981"/>
    </marker>

    <!-- Flow Filters -->
    <filter id="glowPurple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="0.8"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowEmerald" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="0.8"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background Layer -->
  <rect width="1000" height="680" fill="url(#grid)"/>

  <!-- Top Title -->
  <text x="40" y="50" font-size="28" font-weight="800" fill="#0f172a">mHC: Manifold-Constrained Hyper-Connections</text>
  <text x="40" y="80" font-size="16" fill="#475569">Three learnable mappings with explicit stability constraints.</text>

  <!-- Left Side: Architecture Diagram -->
  <g transform="translate(50, 110)">

    <!-- Grouped Background Block -->
    <rect x="0" y="50" width="460" height="460" rx="16" fill="#ffffff" fill-opacity="0.8" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="8 4" filter="url(#shadow)"/>
    <text x="230" y="80" text-anchor="middle" font-size="16" font-weight="700" fill="#64748b" letter-spacing="1">mHC LAYER BLOCK</text>

    <!-- Static Paths -->
    <g fill="none" stroke-width="2.5" opacity="0.4">
      <!-- Input to Split -->
      <path d="M 230 40 L 230 115" stroke="#334155" />

      <!-- Split to Residual (Left) -->
      <path d="M 230 115 Q 230 125 215 125 L 125 125 Q 110 125 110 135 L 110 210" stroke="#10b981" marker-end="url(#arrowEmerald)"/>

      <!-- Split to Aggregation (Right) -->
      <path d="M 230 115 Q 230 125 245 125 L 335 125 Q 350 125 350 135" stroke="#334155" marker-end="url(#arrowSlate)"/>

      <!-- Aggregation -> Transformer -->
      <path d="M 350 200 L 350 230" stroke="#334155" marker-end="url(#arrowSlate)"/>

      <!-- Transformer -> Expansion -->
      <path d="M 350 290 L 350 315" stroke="#334155" marker-end="url(#arrowSlate)"/>

      <!-- Expansion -> Meet -->
      <path d="M 350 380 L 350 400 Q 350 410 335 410 L 245 410 Q 230 410 230 420 L 230 426" stroke="#a855f7" />

      <!-- Residual -> Meet -->
      <path d="M 110 310 L 110 400 Q 110 410 125 410 L 215 410 Q 230 410 230 420 L 230 426" stroke="#10b981" />

      <!-- Meet -> Output Streams -->
      <path d="M 230 454 L 230 520" stroke="#334155" marker-end="url(#arrowSlate)"/>
    </g>

    <!-- Animated Flow Particles -->
    <g>
      <!-- Main Path Particle -->
      <circle r="4.5" fill="#a855f7" filter="url(#glowPurple)">
        <animateMotion dur="4s" repeatCount="indefinite" path="M 230 -10 L 230 115 Q 230 125 245 125 L 335 125 Q 350 125 350 135 L 350 400 Q 350 410 335 410 L 245 410 Q 230 410 230 420 L 230 550"/>
      </circle>

      <!-- Residual Path Particle -->
      <circle r="4.5" fill="#34d399" filter="url(#glowEmerald)">
        <animateMotion dur="3s" begin="0.8s" repeatCount="indefinite" path="M 230 -10 L 230 115 Q 230 125 215 125 L 125 125 Q 110 125 110 135 L 110 400 Q 110 410 125 410 L 215 410 Q 230 410 230 420 L 230 550"/>
      </circle>
    </g>

    <!-- Blocks -->
    <!-- Input Streams Box -->
    <g transform="translate(150, 0)">
      <rect x="0" y="0" width="160" height="40" rx="6" fill="#e0f2fe" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
      <text x="65" y="25" text-anchor="middle" font-size="15" font-weight="700" fill="#1d4ed8">Input Streams</text>
      <text x="135" y="25" font-size="15" font-weight="700" fill="#1d4ed8">H<tspan baseline-shift="super" font-size="10">l-1</tspan></text>
    </g>

    <!-- Residual Box (H^{res}) -->
    <g transform="translate(25, 210)">
      <rect x="0" y="0" width="170" height="100" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2.5" filter="url(#shadow)"/>
      <text x="85" y="28" text-anchor="middle" font-size="16" font-weight="800" fill="#047857">H<tspan baseline-shift="super" font-size="10">res</tspan></text>
      <text x="85" y="48" text-anchor="middle" font-size="13" font-weight="600" fill="#059669">Residual Mixing</text>

      <!-- Sinkhorn badge inside H_res -->
      <rect x="20" y="60" width="130" height="28" rx="6" fill="#10b981"/>
      <text x="85" y="78" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">Sinkhorn-Knopp</text>
    </g>

    <!-- Aggregation Box -->
    <g transform="translate(270, 135)">
      <rect x="0" y="0" width="160" height="65" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2" filter="url(#shadow)"/>
      <text x="80" y="22" text-anchor="middle" font-size="15" font-weight="800" fill="#c2410c">H<tspan baseline-shift="super" font-size="10">pre</tspan> <tspan font-weight="600" fill="#9a3412" font-size="13">(Aggregation)</tspan></text>
      <text x="80" y="40" text-anchor="middle" font-size="12" font-weight="600" fill="#c2410c">Compress n → 1 stream</text>
      <text x="80" y="56" text-anchor="middle" font-size="11" font-weight="600" fill="#ea580c">σ(·) → non-negative</text>
    </g>

    <!-- Transformer Box -->
    <g transform="translate(270, 230)">
      <rect x="0" y="0" width="160" height="60" rx="8" fill="#ffffff" stroke="#1e293b" stroke-width="2.5" filter="url(#shadow)"/>
      <text x="80" y="28" text-anchor="middle" font-size="15" font-weight="800" fill="#0f172a">Transformer FFN</text>
      <text x="80" y="48" text-anchor="middle" font-size="13" font-weight="500" fill="#64748b">or Attention T(·)</text>
    </g>

    <!-- Expansion Box -->
    <g transform="translate(270, 315)">
      <rect x="0" y="0" width="160" height="65" rx="8" fill="#faf5ff" stroke="#a855f7" stroke-width="2" filter="url(#shadow)"/>
      <text x="80" y="22" text-anchor="middle" font-size="15" font-weight="800" fill="#7e22ce">H<tspan baseline-shift="super" font-size="10">post</tspan> <tspan font-weight="600" fill="#6b21a8" font-size="13">(Expansion)</tspan></text>
      <text x="80" y="40" text-anchor="middle" font-size="12" font-weight="600" fill="#7e22ce">Broadcast 1 → n streams</text>
      <text x="80" y="56" text-anchor="middle" font-size="11" font-weight="600" fill="#a855f7">σ(·) → non-negative</text>
    </g>

    <!-- Addition Node -->
    <circle cx="230" cy="440" r="14" fill="#ffffff" stroke="#1e293b" stroke-width="2"/>
    <text x="230" y="446" text-anchor="middle" font-size="18" font-weight="800" fill="#0f172a">+</text>

    <!-- Output Streams -->
    <g transform="translate(150, 520)">
      <rect x="0" y="0" width="160" height="40" rx="6" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
      <text x="65" y="25" text-anchor="middle" font-size="15" font-weight="700" fill="#6d28d9">Output Streams</text>
      <text x="140" y="25" font-size="15" font-weight="700" fill="#6d28d9">H<tspan baseline-shift="super" font-size="10">l</tspan></text>
    </g>
  </g>

  <!-- Right Side: Explanations -->
  <g transform="translate(540, 110)">

    <!-- Doubly Stochastic Constraint Explainer -->
    <rect x="0" y="0" width="420" height="225" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="210" y="30" text-anchor="middle" font-size="16" font-weight="800" fill="#0f172a">Doubly Stochastic Constraint</text>
    <line x1="20" y1="45" x2="400" y2="45" stroke="#f1f5f9" stroke-width="2"/>

    <!-- Matrix representation -->
    <g transform="translate(30, 65)">
      <rect x="0" y="0" width="100" height="100" rx="4" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
      <line x1="33" y1="0" x2="33" y2="100" stroke="#cbd5e1" stroke-width="1"/>
      <line x1="66" y1="0" x2="66" y2="100" stroke="#cbd5e1" stroke-width="1"/>
      <line x1="0" y1="33" x2="100" y2="33" stroke="#cbd5e1" stroke-width="1"/>
      <line x1="0" y1="66" x2="100" y2="66" stroke="#cbd5e1" stroke-width="1"/>

      <g font-family="monospace" font-size="13" font-weight="600" fill="#334155" text-anchor="middle">
        <text x="16.5" y="22">.2</text> <text x="50" y="22">.5</text> <text x="83.5" y="22">.3</text>
        <text x="16.5" y="55">.4</text> <text x="50" y="55">.1</text> <text x="83.5" y="55">.5</text>
        <text x="16.5" y="88">.4</text> <text x="50" y="88">.4</text> <text x="83.5" y="88">.2</text>
      </g>

      <g font-size="13" font-weight="800" fill="#059669">
        <text x="115" y="22">=1</text> <text x="115" y="55">=1</text> <text x="115" y="88">=1</text>
        <text x="16.5" y="120" text-anchor="middle">=1</text> <text x="50" y="120" text-anchor="middle">=1</text> <text x="83.5" y="120" text-anchor="middle">=1</text>
      </g>
    </g>

    <!-- Checklist -->
    <g transform="translate(180, 75)">
      <!-- Checkmarks -->
      <g fill="#10b981">
        <circle cx="0" cy="-4" r="8"/>
        <path d="M -3 -4 L -1 -1 L 4 -6" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="15" y="0" font-size="14" font-weight="600" fill="#334155">All entries ≥ 0</text>

      <g fill="#10b981" transform="translate(0, 28)">
        <circle cx="0" cy="-4" r="8"/>
        <path d="M -3 -4 L -1 -1 L 4 -6" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="15" y="28" font-size="14" font-weight="600" fill="#334155">Each row sums to 1</text>

      <g fill="#10b981" transform="translate(0, 56)">
        <circle cx="0" cy="-4" r="8"/>
        <path d="M -3 -4 L -1 -1 L 4 -6" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="15" y="56" font-size="14" font-weight="600" fill="#334155">Each column sums to 1</text>

      <text x="-15" y="96" font-size="15" font-weight="800" fill="#0f172a">→ ||H<tspan baseline-shift="super" font-size="10">res</tspan>|| ≤ 1</text>
      <text x="80" y="96" font-size="13" font-weight="500" fill="#64748b">(spectral norm)</text>

      <text x="-15" y="122" font-size="15" font-weight="800" fill="#059669">→ Signal mathematically preserved</text>
    </g>

    <!-- Formula Summary Box -->
    <rect x="0" y="240" width="420" height="95" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="210" y="268" text-anchor="middle" font-size="15" font-weight="800" fill="#0f172a">Full mHC Layer Formula</text>

    <text x="210" y="295" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b" font-family="monospace">
        H<tspan baseline-shift="super" font-size="10">l</tspan> =
        <tspan fill="#059669">H<tspan baseline-shift="super" font-size="10">res</tspan></tspan>·H<tspan baseline-shift="super" font-size="10">l-1</tspan> +
        <tspan fill="#7e22ce">H<tspan baseline-shift="super" font-size="10">post</tspan></tspan>·T(
        <tspan fill="#c2410c">H<tspan baseline-shift="super" font-size="10">pre</tspan></tspan>·H<tspan baseline-shift="super" font-size="10">l-1</tspan> )
    </text>
    <text x="210" y="318" text-anchor="middle" font-size="12" fill="#64748b">Where H<tspan baseline-shift="super" font-size="9">res</tspan> ∈ Birkhoff Polytope (doubly stochastic)</text>


    <!-- Side-by-side Results Cards -->
    <g transform="translate(0, 350)">
      <!-- Stability Card -->
      <rect x="0" y="0" width="200" height="85" rx="8" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="100" y="24" text-anchor="middle" font-size="14" font-weight="800" fill="#059669">Stability Achieved</text>
      <text x="100" y="44" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">Max Signal Amplif.</text>
      <text x="100" y="60" text-anchor="middle" font-size="14" font-weight="800" fill="#047857">limited to ~1.6×</text>
      <text x="100" y="76" text-anchor="middle" font-size="11" fill="#475569">(vs ~3000x explosion)</text>

      <!-- Efficiency Card -->
      <rect x="220" y="0" width="200" height="85" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="320" y="24" text-anchor="middle" font-size="14" font-weight="800" fill="#c2410c">Efficiency Retained</text>
      <text x="320" y="44" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">Only +6.7% compute</text>
      <text x="320" y="60" text-anchor="middle" font-size="14" font-weight="800" fill="#c2410c">training time cost</text>
      <text x="320" y="76" text-anchor="middle" font-size="11" fill="#475569">through kernel fusion</text>
    </g>


    <!-- Legend Box -->
    <rect x="0" y="450" width="420" height="40" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>

    <g transform="translate(10, 474)">
      <circle cx="5" cy="-4" r="6" fill="#f97316"/>
      <text x="16" y="0" font-size="12" font-weight="600" fill="#475569">Aggregation (σ constraint)</text>

      <circle cx="180" cy="-4" r="6" fill="#10b981"/>
      <text x="191" y="0" font-size="12" font-weight="600" fill="#475569">Sinkhorn routing</text>

      <circle cx="310" cy="-4" r="6" fill="#a855f7"/>
      <text x="321" y="0" font-size="12" font-weight="600" fill="#475569">Expansion dist.</text>
    </g>

  </g>

</svg>
