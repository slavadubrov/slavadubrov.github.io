<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" style="background-color: #f8fafc; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;">
  <defs>
    <!-- Background grid -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>
    </pattern>

    <!-- Markers for arrows -->
    <marker id="arrowSlate" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#1e293b"/>
    </marker>
    <marker id="arrowAmber" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrowEmerald" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#10b981"/>
    </marker>

    <!-- Glow & Shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.1"/>
    </filter>
    <filter id="glowFlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="0.8"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background grid layer -->
  <rect width="1000" height="500" fill="url(#grid)"/>

  <!-- Top Title -->
  <text x="40" y="50" font-size="28" font-weight="800" fill="#0f172a">Sinkhorn-Knopp Algorithm Overview</text>
  <text x="40" y="80" font-size="16" fill="#475569">Making doubly stochastic constraints fully differentiable.</text>

  <!-- Centered Flow Container -->
  <g transform="translate(60, 130)">

    <!-- Core Pipeline Bracket (Green indicator for entire block) -->
    <path d="M 10 130 L 10 170 L 450 170 L 460 185 L 470 170 L 910 170 L 910 130" fill="none" stroke="#10b981" stroke-width="2.5"/>

    <!-- Arrows connecting steps -->
    <g stroke="#1e293b" stroke-width="2.5" fill="none">
      <path d="M 210 60 L 250 60" marker-end="url(#arrowSlate)"/>
      <path d="M 450 60 L 490 60" marker-end="url(#arrowSlate)"/>
      <path d="M 690 60 L 730 60" marker-end="url(#arrowSlate)"/>
    </g>

    <!-- Animated Sequence Particles -->
    <g filter="url(#glowFlow)">
      <circle r="5" fill="#fcd34d">
        <animateMotion dur="4s" repeatCount="indefinite" path="M 100 60 L 210 60 L 250 60 L 450 60 L 490 60 L 690 60 L 730 60"/>
      </circle>
      <!-- Return Iteration Particle (Running backwards over dashed line) -->
      <circle r="4" fill="#fbbf24">
        <animateMotion dur="2s" begin="1s" repeatCount="indefinite" path="M 820 120 L 820 145 C 820 155 800 155 800 155 L 360 155 C 340 155 340 145 340 145 L 340 120"/>
      </circle>
    </g>


    <!-- Base Blocks -->

    <!-- Step 1 -->
    <g transform="translate(20, 0)">
      <rect x="0" y="0" width="180" height="115" rx="10" fill="#ffffff" stroke="#1e293b" stroke-width="2" filter="url(#shadow)"/>

      <!-- Card header styling -->
      <rect x="0" y="0" width="180" height="35" rx="10" fill="#f1f5f9"/>
      <path d="M 0 35 L 180 35" stroke="#1e293b" stroke-width="2"/>

      <text x="90" y="23" text-anchor="middle" font-size="14" font-weight="800" fill="#0f172a">Step 1: Exponentiate</text>

      <!-- Card Body -->
      <text x="90" y="65" text-anchor="middle" font-size="16" font-weight="700" fill="#1d4ed8" font-family="monospace">M = exp(W)</text>
      <text x="90" y="95" text-anchor="middle" font-size="12" fill="#64748b">Ensures all elements > 0</text>
    </g>

    <!-- Step 2 -->
    <g transform="translate(260, 0)">
      <rect x="0" y="0" width="180" height="115" rx="10" fill="#ffffff" stroke="#1e293b" stroke-width="2" filter="url(#shadow)"/>

      <rect x="0" y="0" width="180" height="35" rx="10" fill="#f1f5f9"/>
      <path d="M 0 35 L 180 35" stroke="#1e293b" stroke-width="2"/>

      <text x="90" y="23" text-anchor="middle" font-size="14" font-weight="800" fill="#0f172a">Step 2: Row Norm</text>

      <text x="90" y="65" text-anchor="middle" font-size="16" font-weight="700" fill="#1d4ed8" font-family="monospace">M = M / Σrow</text>
      <text x="90" y="95" text-anchor="middle" font-size="12" fill="#64748b">Each row sums to exactly 1</text>
    </g>

    <!-- Step 3 -->
    <g transform="translate(500, 0)">
      <rect x="0" y="0" width="180" height="115" rx="10" fill="#ffffff" stroke="#1e293b" stroke-width="2" filter="url(#shadow)"/>

      <rect x="0" y="0" width="180" height="35" rx="10" fill="#f1f5f9"/>
      <path d="M 0 35 L 180 35" stroke="#1e293b" stroke-width="2"/>

      <text x="90" y="23" text-anchor="middle" font-size="14" font-weight="800" fill="#0f172a">Step 3: Col Norm</text>

      <text x="90" y="65" text-anchor="middle" font-size="16" font-weight="700" fill="#1d4ed8" font-family="monospace">M = M / Σcol</text>
      <text x="90" y="95" text-anchor="middle" font-size="12" fill="#64748b">Each col sums to exactly 1</text>
    </g>

    <!-- Iterate Block (Loop Control) -->
    <g transform="translate(740, 0)">
      <rect x="0" y="0" width="160" height="115" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadow)"/>

      <rect x="0" y="0" width="160" height="35" rx="10" fill="#ffedd5"/>
      <path d="M 0 35 L 160 35" stroke="#ea580c" stroke-width="2"/>

      <text x="80" y="23" text-anchor="middle" font-size="15" font-weight="800" fill="#c2410c">Iterate</text>
      <text x="80" y="65" text-anchor="middle" font-size="20" font-weight="800" fill="#ea580c">t = 20</text>
      <text x="80" y="95" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412">Repeat steps 2 &amp; 3</text>
    </g>


    <!-- Return Loop Line -->
    <path d="M 820 120 L 820 145 C 820 155 800 155 800 155 L 360 155 C 340 155 340 145 340 145 L 340 120" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="6,4" marker-end="url(#arrowAmber)" fill="none"/>

    <!-- Outcome Block Dropdown -->
    <path d="M 460 185 L 460 215" stroke="#10b981" stroke-width="3" marker-end="url(#arrowEmerald)"/>

    <!-- Final Result Box -->
    <g transform="translate(280, 225)">
      <rect x="0" y="0" width="360" height="90" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="2.5" filter="url(#shadow)"/>
      <text x="180" y="38" text-anchor="middle" font-size="20" font-weight="800" fill="#047857">Doubly Stochastic Matrix H</text>
      <text x="180" y="68" text-anchor="middle" font-size="14" font-weight="600" fill="#059669">Rows = 1.0  |  Columns = 1.0  |  All ≥ 0</text>
    </g>

    <!-- Key Insight Tooltip/Box -->
    <g transform="translate(680, 225)">
      <rect x="0" y="0" width="220" height="90" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>
      <text x="110" y="32" text-anchor="middle" font-size="14" font-weight="800" fill="#0f172a">Key Mathematical Insight</text>
      <text x="110" y="55" text-anchor="middle" font-size="13" fill="#475569">The entire iterative process is</text>
      <text x="110" y="75" text-anchor="middle" font-size="14" font-weight="800" fill="#10b981">fully differentiable!</text>
    </g>

  </g>

</svg>
