<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 680" style="background-color: #f8fafc; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;">
  <defs>
    <!-- Background grid -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>
    </pattern>

    <marker id="arrowStream1" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowStream2" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#f59e0b"/>
    </marker>

    <!-- Filters for Glow and Shadow -->
    <filter id="glow1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="0.8"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background grid layer -->
  <rect width="1000" height="680" fill="url(#grid)"/>

  <!-- Top Title -->
  <text x="40" y="50" font-size="28" font-weight="800" fill="#0f172a">Hyper-Connections (HC)</text>
  <text x="40" y="80" font-size="16" fill="#475569">Expanding residual stream width with parallel routing (Simplified n=2 layout)</text>

  <!-- Left Side: Architecture Diagram -->
  <g transform="translate(60, 140)">

    <!-- Grouped Background Block -->
    <rect x="-10" y="60" width="520" height="420" rx="16" fill="#ffffff" fill-opacity="0.8" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="8 4" filter="url(#shadow)"/>
    <text x="250" y="90" text-anchor="middle" font-size="16" font-weight="700" fill="#64748b" letter-spacing="1">HYPER-CONNECTIONS BLOCK</text>

    <!-- Base Paths representing the parallel flow (Animated particles will follow these) -->
    <g fill="none">
      <!-- Stream 1 straight path -->
      <path d="M 100 440 L 100 136" stroke="#3b82f6" stroke-width="2.5" opacity="0.6" />
      <!-- Stream 2 straight path -->
      <path d="M 400 440 L 400 136" stroke="#f59e0b" stroke-width="2.5" opacity="0.6" />

      <!-- 1 -> 2 mixing cross -->
      <path d="M 100 440 L 100 430 L 350 430 Q 370 430 370 410 L 370 150 Q 370 120 384 120" stroke="#3b82f6" stroke-width="2.5" opacity="0.6" />

      <!-- 2 -> 1 mixing cross -->
      <path d="M 400 440 L 400 410 L 150 410 Q 130 410 130 390 L 130 150 Q 130 120 116 120" stroke="#f59e0b" stroke-width="2.5" opacity="0.6" />

      <!-- 1 -> Aggregation -->
      <path d="M 100 440 L 100 390 C 180 390 180 340 236 340" stroke="#3b82f6" stroke-width="2.5" opacity="0.6" marker-end="url(#arrowStream1)" />

      <!-- 2 -> Aggregation -->
      <path d="M 400 440 L 400 390 C 320 390 320 340 264 340" stroke="#f59e0b" stroke-width="2.5" opacity="0.6" marker-end="url(#arrowStream2)" />

      <!-- Aggregation -> Transformer -->
      <path d="M 250 326 L 250 296" stroke="#1e293b" stroke-width="3" opacity="0.6"/>

      <!-- Transformer Output to Stream 1 (Expansion) -->
      <path d="M 250 240 L 250 210 Q 250 190 220 190 L 130 190 Q 100 190 100 160 L 100 136" stroke="#10b981" stroke-width="2.5" opacity="0.6" />

      <!-- Transformer Output to Stream 2 (Expansion) -->
      <path d="M 250 240 L 250 210 Q 250 190 280 190 L 370 190 Q 400 190 400 160 L 400 136" stroke="#10b981" stroke-width="2.5" opacity="0.6" />
    </g>

    <!-- Animated Flow Particles -->
    <g>
      <!-- Stream 1 Straight -->
      <circle r="4" fill="#bfdbfe" filter="url(#glow1)">
        <animateMotion dur="3s" repeatCount="indefinite" path="M 100 440 L 100 136"/>
      </circle>
      <!-- Stream 2 Straight -->
      <circle r="4" fill="#fde68a" filter="url(#glow1)">
        <animateMotion dur="3s" repeatCount="indefinite" path="M 400 440 L 400 136"/>
      </circle>
      <!-- Mixing 1 to 2 -->
      <circle r="4" fill="#bfdbfe" filter="url(#glow1)">
        <animateMotion dur="4.5s" repeatCount="indefinite" path="M 100 440 L 100 430 L 350 430 Q 370 430 370 410 L 370 150 Q 370 120 384 120"/>
      </circle>
      <!-- Mixing 2 to 1 -->
      <circle r="4" fill="#fde68a" filter="url(#glow1)">
        <animateMotion dur="4.2s" begin="1s" repeatCount="indefinite" path="M 400 440 L 400 410 L 150 410 Q 130 410 130 390 L 130 150 Q 130 120 116 120"/>
      </circle>
      <!-- 1 to Aggregation -->
      <circle r="4" fill="#8b5cf6" filter="url(#glow1)">
        <animateMotion dur="2.1s" repeatCount="indefinite" path="M 100 440 L 100 390 C 180 390 180 340 236 340"/>
      </circle>
      <!-- 2 to Aggregation -->
      <circle r="4" fill="#8b5cf6" filter="url(#glow1)">
        <animateMotion dur="2.1s" begin="0.8s" repeatCount="indefinite" path="M 400 440 L 400 390 C 320 390 320 340 264 340"/>
      </circle>
      <!-- Transformer to 1 (Expansion) -->
      <circle r="4.5" fill="#6ee7b7" filter="url(#glow1)">
        <animateMotion dur="2.5s" repeatCount="indefinite" path="M 250 240 L 250 210 Q 250 190 220 190 L 130 190 Q 100 190 100 160 L 100 136"/>
      </circle>
      <!-- Transformer to 2 (Expansion) -->
      <circle r="4.5" fill="#6ee7b7" filter="url(#glow1)">
        <animateMotion dur="2.5s" begin="1.25s" repeatCount="indefinite" path="M 250 240 L 250 210 Q 250 190 280 190 L 370 190 Q 400 190 400 160 L 400 136"/>
      </circle>
    </g>

    <!-- Input Streams -->
    <rect x="60" y="440" width="80" height="36" rx="6" fill="#e0f2fe" stroke="#3b82f6" stroke-width="2"/>
    <text x="100" y="464" text-anchor="middle" font-size="16" font-weight="700" fill="#1d4ed8">h₁</text>
    <text x="100" y="495" text-anchor="middle" font-size="12" fill="#64748b">Stream 1</text>

    <rect x="360" y="440" width="80" height="36" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="400" y="464" text-anchor="middle" font-size="16" font-weight="700" fill="#d97706">h₂</text>
    <text x="400" y="495" text-anchor="middle" font-size="12" fill="#64748b">Stream 2</text>

    <!-- Mixing Weights (alpha) -->
    <!-- alpha 11 -->
    <rect x="83" y="240" width="34" height="24" rx="4" fill="#3b82f6"/>
    <text x="100" y="256" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">α₁₁</text>
    <!-- alpha 12 -->
    <rect x="353" y="290" width="34" height="24" rx="4" fill="#3b82f6"/>
    <text x="370" y="306" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">α₁₂</text>
    <!-- alpha 21 -->
    <rect x="113" y="290" width="34" height="24" rx="4" fill="#f59e0b"/>
    <text x="130" y="306" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">α₂₁</text>
    <!-- alpha 22 -->
    <rect x="383" y="240" width="34" height="24" rx="4" fill="#f59e0b"/>
    <text x="400" y="256" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">α₂₂</text>

    <!-- Expansion Layer Scalers (beta) -->
    <rect x="143" y="178" width="34" height="24" rx="4" fill="#10b981"/>
    <text x="160" y="194" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">β₁</text>

    <rect x="323" y="178" width="34" height="24" rx="4" fill="#10b981"/>
    <text x="340" y="194" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">β₂</text>

    <!-- Central Processing Logic -->
    <!-- Aggregation Node -->
    <circle cx="250" cy="340" r="14" fill="#ffffff" stroke="#1e293b" stroke-width="2"/>
    <text x="250" y="345" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">+</text>

    <!-- Transformer FFN -->
    <rect x="180" y="240" width="140" height="56" rx="8" fill="#ffffff" stroke="#1e293b" stroke-width="2" filter="url(#shadow)"/>
    <text x="250" y="268" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Transformer FFN</text>
    <text x="250" y="285" text-anchor="middle" font-size="12" fill="#475569">or Attention</text>

    <!-- Output Combinations (+) Nodes -->
    <circle cx="100" cy="120" r="16" fill="#ffffff" stroke="#1e293b" stroke-width="2"/>
    <text x="100" y="126" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">+</text>

    <circle cx="400" cy="120" r="16" fill="#ffffff" stroke="#1e293b" stroke-width="2"/>
    <text x="400" y="126" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">+</text>

    <!-- Final Output Links to Boxes -->
    <!-- Left output path -->
    <path d="M 100 104 L 100 46" stroke="#1e293b" stroke-width="2.5">
      <marker markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
        <path d="M 0 0 L 6 3 L 0 6 z" fill="#1e293b"/>
      </marker>
    </path>
    <!-- Right output path -->
    <path d="M 400 104 L 400 46" stroke="#1e293b" stroke-width="2.5">
      <marker markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
        <path d="M 0 0 L 6 3 L 0 6 z" fill="#1e293b"/>
      </marker>
    </path>

    <!-- Outputs Streams -->
    <!-- h'1 Output -->
    <rect x="60" y="10" width="80" height="36" rx="6" fill="#e0f2fe" stroke="#3b82f6" stroke-width="2"/>
    <text x="100" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#1d4ed8">h'₁</text>
    <text x="100" y="-2" text-anchor="middle" font-size="12" fill="#64748b">Output 1</text>

    <!-- h'2 Output -->
    <rect x="360" y="10" width="80" height="36" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="400" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#d97706">h'₂</text>
    <text x="400" y="-2" text-anchor="middle" font-size="12" fill="#64748b">Output 2</text>
  </g>


  <!-- Right Side: Explanations -->
  <g transform="translate(560, 140)">

    <!-- 1. Aggregation Box -->
    <rect x="0" y="-10" width="400" height="95" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="20" y="15" font-size="14" font-weight="700" fill="#0f172a">1. Aggregation</text>
    <text x="20" y="35" font-size="13" fill="#475569">Linearly combines parallel streams into a single vector.</text>
    <text x="20" y="53" font-size="13" fill="#475569">This provides the Transformer block with a compressed</text>
    <text x="20" y="71" font-size="13" fill="#475569">representation of all available residual pathways.</text>

    <!-- 2. Transformer & Expansion Box -->
    <rect x="0" y="105" width="400" height="95" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="20" y="130" font-size="14" font-weight="700" fill="#0f172a">2. Transformer &amp; Expansion</text>
    <text x="20" y="150" font-size="13" fill="#475569">After processing the aggregated features, the transformer's</text>
    <text x="20" y="168" font-size="13" fill="#475569">output is distributed back to all individual streams using</text>
    <text x="20" y="186" font-size="13" fill="#475569">per-stream learnable scaling factors (β).</text>

    <!-- 3. Mixing Feature Router Box -->
    <rect x="0" y="220" width="400" height="95" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="20" y="245" font-size="14" font-weight="700" fill="#0f172a">3. Mixing (Feature Router)</text>
    <text x="20" y="265" font-size="13" fill="#475569">A learnable n×n matrix (α) dynamically routes</text>
    <text x="20" y="283" font-size="13" fill="#475569">features between parallel streams, allowing</text>
    <text x="20" y="301" font-size="13" fill="#475569">diverse gradient flow to bypass individual bottlenecks.</text>

    <!-- Problem Warning Box (Sets up context for mHC) -->
    <rect x="0" y="335" width="400" height="120" rx="8" fill="#fff1f2" stroke="#fecdd3" stroke-width="1.5" filter="url(#shadow)"/>
    <path d="M 15 355 L 15 435" stroke="#f43f5e" stroke-width="4" stroke-linecap="round"/>
    <text x="30" y="360" font-size="14" font-weight="700" fill="#be123c">The Scalability Problem</text>
    <text x="30" y="382" font-size="13" font-weight="500" fill="#881337">Because the α mixing weights are initially unconstrained,</text>
    <text x="30" y="400" font-size="13" font-weight="500" fill="#881337">signal magnitudes compound exponentially across</text>
    <text x="30" y="418" font-size="13" font-weight="500" fill="#881337">long layers, destroying the identity mapping property.</text>
    <text x="30" y="440" font-size="13" font-weight="700" fill="#9f1239">Result: Severe training instability in deep networks.</text>

  </g>

</svg>
