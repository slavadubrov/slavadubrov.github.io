<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" style="background-color: #f8fafc; font-family: Inter, system-ui, sans-serif;" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Composite residual-map behavior</title>
  <desc id="desc">Unconstrained residual maps may amplify or attenuate aligned directions, while an identity shortcut passes the residual state unchanged.</desc>
  <defs>
    <!-- Background grid -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>
    </pattern>

    <!-- Marker -->
    <marker id="arrowRed" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#dc2626"/>
    </marker>
    <marker id="arrowEmerald" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#166534"/>
    </marker>

    <!-- Shadows -->
    <filter id="shadowRed" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#dc2626" flood-opacity="0.08"/>
    </filter>
    <filter id="shadowEmerald" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#16a34a" flood-opacity="0.08"/>
    </filter>
    <filter id="shadowNeutral" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08"/>
    </filter>

    <!-- Glows -->
    <filter id="glowRed" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="1.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowEmerald" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="0.8"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="1000" height="520" fill="#f8fafc"/>

  <!-- Background layer -->
  <rect width="1000" height="520" fill="#f8fafc"/>

  <!-- Title -->
  <text x="40" y="50" font-size="28" font-weight="800" fill="#0f172a">The Root Cause: Loss of Identity</text>
  <text x="40" y="80" font-size="16" fill="#334155">Unconstrained map products can amplify or attenuate signals.</text>

  <!-- LEFT SIDE: Unconstrained (Exploding) -->
  <g transform="translate(60, 130)">

    <text x="140" y="0" text-anchor="middle" font-size="20" font-weight="700" fill="#991b1b">Unconstrained Matrix (HC)</text>

    <!-- Unconstrained Matrix Data Box -->
    <rect x="0" y="25" width="280" height="190" rx="12" fill="#ffffff" stroke="#dc2626" stroke-width="2.5" filter="url(#shadowRed)"/>

    <g font-family="SFMono-Regular, Consolas, monospace" font-size="18">
      <!-- Row 1 -->
      <text x="40" y="65" text-anchor="middle" fill="#dc2626" font-weight="700">-5.2</text>
      <text x="106" y="65" text-anchor="middle" fill="#dc2626" font-weight="700">14.1</text>
      <text x="173" y="65" text-anchor="middle" fill="#64748b">0.01</text>
      <text x="240" y="65" text-anchor="middle" fill="#64748b">1.1</text>

      <!-- Row 2 -->
      <text x="40" y="105" text-anchor="middle" fill="#dc2626" font-weight="700">8.7</text>
      <text x="106" y="105" text-anchor="middle" fill="#dc2626" font-weight="700">-2.3</text>
      <text x="173" y="105" text-anchor="middle" fill="#dc2626" font-weight="700">10.5</text>
      <text x="240" y="105" text-anchor="middle" fill="#64748b">0.2</text>

      <!-- Row 3 -->
      <text x="40" y="145" text-anchor="middle" fill="#dc2626" font-weight="700">12.0</text>
      <text x="106" y="145" text-anchor="middle" fill="#64748b">0.05</text>
      <text x="173" y="145" text-anchor="middle" fill="#dc2626" font-weight="700">-7.8</text>
      <text x="240" y="145" text-anchor="middle" fill="#dc2626" font-weight="700">15.2</text>

      <!-- Row 4 -->
      <text x="40" y="185" text-anchor="middle" fill="#dc2626" font-weight="700">-1.0</text>
      <text x="106" y="185" text-anchor="middle" fill="#64748b">3.4</text>
      <text x="173" y="185" text-anchor="middle" fill="#dc2626" font-weight="700">11.1</text>
      <text x="240" y="185" text-anchor="middle" fill="#dc2626" font-weight="700">-0.03</text>
    </g>

    <!-- Signal Particle Entering and Exploding/Scattering -->
    <!-- Input stream -->


    <!-- Output explosion (multiple glowing red particles bursting downwards/outwards) -->
    <g>




    </g>

    <!-- Downward Arrow indicating flow -->
    <path d="M 140 220 L 140 270" stroke="#dc2626" stroke-width="3" stroke-dasharray="8,4" marker-end="url(#arrowRed)" fill="none"/>

    <!-- Outcome Box -->
    <rect x="-10" y="285" width="300" height="45" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
    <text x="140" y="313" text-anchor="middle" fill="#991b1b" font-size="16" font-weight="800">Result: gain can be unbounded</text>

  </g>


  <!-- CENTER: The core question connecting the two concepts -->
  <g transform="translate(420, 220)">
    <circle cx="50" cy="50" r="50" fill="#ea580c" filter="url(#shadowNeutral)"/>
    <text x="50" y="70" text-anchor="middle" fill="#ffffff" font-size="55" font-weight="800">?</text>

    <text x="50" y="135" text-anchor="middle" fill="#9a3412" font-size="16" font-weight="700">How do we</text>
    <text x="50" y="155" text-anchor="middle" fill="#9a3412" font-size="14" font-weight="600">constrain it?</text>
  </g>


  <!-- RIGHT SIDE: Constrained (Identity-like) -->
  <g transform="translate(620, 130)">

    <text x="140" y="0" text-anchor="middle" font-size="20" font-weight="700" fill="#166534">Target Matrix Behavior</text>

    <!-- Constrained Matrix Data Box -->
    <rect x="0" y="25" width="280" height="190" rx="12" fill="#ffffff" stroke="#16a34a" stroke-width="2.5" filter="url(#shadowEmerald)"/>

    <g font-family="SFMono-Regular, Consolas, monospace" font-size="18">
      <!-- Row 1 -->
      <text x="40" y="65" text-anchor="middle" fill="#166534" font-weight="800">1.0</text>
      <text x="106" y="65" text-anchor="middle" fill="#94a3b8">0.0</text>
      <text x="173" y="65" text-anchor="middle" fill="#94a3b8">0.0</text>
      <text x="240" y="65" text-anchor="middle" fill="#94a3b8">0.0</text>

      <!-- Row 2 -->
      <text x="40" y="105" text-anchor="middle" fill="#94a3b8">0.0</text>
      <text x="106" y="105" text-anchor="middle" fill="#166534" font-weight="800">1.0</text>
      <text x="173" y="105" text-anchor="middle" fill="#94a3b8">0.0</text>
      <text x="240" y="105" text-anchor="middle" fill="#94a3b8">0.0</text>

      <!-- Row 3 -->
      <text x="40" y="145" text-anchor="middle" fill="#94a3b8">0.0</text>
      <text x="106" y="145" text-anchor="middle" fill="#94a3b8">0.0</text>
      <text x="173" y="145" text-anchor="middle" fill="#166534" font-weight="800">1.0</text>
      <text x="240" y="145" text-anchor="middle" fill="#94a3b8">0.0</text>

      <!-- Row 4 -->
      <text x="40" y="185" text-anchor="middle" fill="#94a3b8">0.0</text>
      <text x="106" y="185" text-anchor="middle" fill="#94a3b8">0.0</text>
      <text x="173" y="185" text-anchor="middle" fill="#94a3b8">0.0</text>
      <text x="240" y="185" text-anchor="middle" fill="#166534" font-weight="800">1.0</text>
    </g>

    <!-- Signal Particle Entering and Safely Exiting -->


    <!-- Output safe steady stream -->
    <g>

    </g>

    <!-- Downward Arrow indicating stable flow -->
    <path d="M 140 215 L 140 270" stroke="#16a34a" stroke-width="4" marker-end="url(#arrowEmerald)" fill="none"/>

    <!-- Outcome Box -->
    <rect x="-30" y="285" width="340" height="45" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
    <text x="140" y="313" text-anchor="middle" fill="#166534" font-size="16" font-weight="800">Result: unchanged identity path</text>

  </g>

  <!-- Bottom Final Takeaway Banner -->
  <rect x="90" y="470" width="820" height="40" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadowNeutral)"/>
  <text x="500" y="495" text-anchor="middle" fill="#0f172a" font-size="15" font-weight="600">To stabilize training, we need the routing matrices to inherently mimic 'identity-like' well-behaved properties.</text>

</svg>
