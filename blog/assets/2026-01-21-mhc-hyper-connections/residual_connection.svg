<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 680" style="background-color: #f8fafc; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;">
  <defs>
    <!-- Background grid -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>
    </pattern>

    <!-- Markers for arrows -->
    <marker id="arrowSlate" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#1e293b"/>
    </marker>
    <marker id="arrowEmerald" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#10b981"/>
    </marker>

    <!-- Glow & Shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.1"/>
    </filter>

    <filter id="glowFlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="0.8"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowIdentity" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="1.0"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background grid layer -->
  <rect width="600" height="680" fill="url(#grid)"/>

  <!-- Top Title -->
  <text x="300" y="50" text-anchor="middle" font-size="24" font-weight="800" fill="#0f172a">Standard Residual Connection</text>

  <!-- The Block -->
  <g transform="translate(150, 90)">

    <!-- Input x -->
    <rect x="110" y="0" width="80" height="36" rx="8" fill="#e0f2fe" stroke="#3b82f6" stroke-width="2"/>
    <text x="150" y="24" text-anchor="middle" font-size="20" font-weight="800" fill="#1d4ed8">x</text>

    <!-- Base Paths -->
    <g stroke="#1e293b" stroke-width="2.5" fill="none">
      <!-- x to Split -->
      <path d="M 150 36 L 150 85" marker-end="url(#arrowSlate)"/>
      <circle cx="150" cy="95" r="8" fill="#ffffff" stroke="#1e293b"/>

      <!-- Split to Layer 1 -->
      <path d="M 150 103 L 150 135" marker-end="url(#arrowSlate)"/>

      <!-- Layer 1 to ReLU -->
      <path d="M 150 195 L 150 225" marker-end="url(#arrowSlate)"/>

      <!-- ReLU to Layer 2 -->
      <path d="M 150 285 L 150 315" marker-end="url(#arrowSlate)"/>

      <!-- Layer 2 to Add -->
      <path d="M 150 375 L 150 415" marker-end="url(#arrowSlate)"/>

      <!-- Add to Output -->
      <path d="M 150 465 L 150 500" marker-end="url(#arrowSlate)"/>
    </g>

    <!-- Identity path (the vital shortcut) -->
    <path id="pathIdentity" d="M 158 95 C 370 95 370 440 170 440" fill="none" stroke="#10b981" stroke-width="3" marker-end="url(#arrowEmerald)"/>

    <!-- Animated Particles -->
    <!-- Gradient/Signal flow down the main F(x) block -->
    <g filter="url(#glowFlow)">
      <circle r="4.5" fill="#c084fc">
        <animateMotion dur="4s" repeatCount="indefinite" path="M 150 36 L 150 415"/>
      </circle>
    </g>

    <!-- Strong, clear gradient flow over the identity shortcut -->
    <g filter="url(#glowIdentity)">
      <circle r="5.5" fill="#34d399">
        <animateMotion dur="2.5s" repeatCount="indefinite">
          <mpath href="#pathIdentity"/>
        </animateMotion>
      </circle>
    </g>


    <!-- Block Components -->

    <!-- F(x) background enclosure -->
    <rect x="30" y="120" width="240" height="275" rx="12" fill="#ffffff" fill-opacity="0.85" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4" filter="url(#shadow)"/>
    <!-- F(x) Label at edge -->
    <rect x="-10" y="240" width="50" height="30" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <text x="15" y="260" text-anchor="middle" font-size="16" font-weight="800" fill="#475569">F(x)</text>


    <!-- Weight Layer 1 -->
    <rect x="50" y="140" width="200" height="55" rx="8" fill="#ffffff" stroke="#1e293b" stroke-width="2" filter="url(#shadow)"/>
    <text x="150" y="173" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Weight Layer</text>

    <!-- ReLU Layer -->
    <rect x="50" y="230" width="200" height="55" rx="8" fill="#ffffff" stroke="#1e293b" stroke-width="2" filter="url(#shadow)"/>
    <text x="150" y="263" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">ReLU</text>

    <!-- Weight Layer 2 -->
    <rect x="50" y="320" width="200" height="55" rx="8" fill="#ffffff" stroke="#1e293b" stroke-width="2" filter="url(#shadow)"/>
    <text x="150" y="353" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Weight Layer</text>

    <!-- Identity label mounted on the curve -->
    <rect x="275" y="250" width="75" height="30" rx="15" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
    <text x="312" y="270" text-anchor="middle" fill="#047857" font-size="13" font-weight="800">Identity</text>

    <!-- Plus (Addition) Node -->
    <circle cx="150" cy="440" r="22" fill="#ffffff" stroke="#1e293b" stroke-width="2"/>
    <text x="150" y="448" text-anchor="middle" font-size="24" font-weight="800" fill="#0f172a">+</text>

    <!-- Output H(x) -->
    <rect x="85" y="505" width="130" height="45" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
    <text x="150" y="534" text-anchor="middle" font-size="18" font-weight="800" fill="#047857">F(x) + x</text>

  </g>

</svg>
