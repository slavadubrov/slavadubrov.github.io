<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" style="background-color: #f8fafc; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;">
  <defs>
    <!-- Background grid -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>
    </pattern>

    <!-- Markers for arrows -->
    <marker id="arrowRed" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#e11d48"/>
    </marker>
    <marker id="arrowAmber" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrowSlate" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#64748b"/>
    </marker>

    <!-- Glowing Effects -->
    <filter id="glowRed" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="0.8"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowAmber" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="0.8"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowSlate" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="0.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Shadows -->
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background grid layer -->
  <rect width="1000" height="600" fill="url(#grid)"/>

  <!-- Top Title -->
  <text x="40" y="50" font-size="28" font-weight="800" fill="#0f172a">The Complication: Instability at Scale</text>
  <text x="40" y="80" font-size="16" fill="#475569">When DeepSeek scaled the architecture, the "Identity" broke.</text>

  <!-- Left Side: Plot Area -->
  <g transform="translate(80, 140)">

    <!-- Plot Background -->
    <rect x="0" y="0" width="460" height="380" rx="12" fill="#ffffff" fill-opacity="0.9" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>

    <!-- Y-axis label text (rotated) -->
    <text x="-190" y="-35" text-anchor="middle" fill="#475569" font-size="14" font-weight="600" transform="rotate(-90)">Signal Magnitude (Log Scale)</text>

    <!-- Y-axis lines and ticks -->
    <g stroke="#cbd5e1" stroke-width="1" fill="none">
      <line x1="60" y1="50" x2="420" y2="50"/>
      <line x1="60" y1="120" x2="420" y2="120"/>
      <line x1="60" y1="190" x2="420" y2="190"/>
      <line x1="60" y1="260" x2="420" y2="260"/>
    </g>

    <!-- Y-axis tick labels -->
    <g fill="#64748b" font-size="12" text-anchor="end" font-family="monospace">
      <text x="50" y="54">1000</text>
      <text x="50" y="124">100</text>
      <text x="50" y="194">10</text>
      <text x="50" y="264">1</text>
      <text x="50" y="334">0.1</text>
    </g>

    <!-- Base X and Y axis lines drawn thicker -->
    <path d="M 60 40 L 60 330 L 430 330" fill="none" stroke="#1e293b" stroke-width="2"/>

    <!-- X-axis tick labels -->
    <g fill="#64748b" font-size="12" text-anchor="middle" font-family="monospace">
      <text x="60" y="350">0</text>
      <text x="150" y="350">25</text>
      <text x="240" y="350">50</text>
      <text x="330" y="350">75</text>
      <text x="420" y="350">100</text>
    </g>
    <!-- X-axis label -->
    <text x="240" y="370" text-anchor="middle" fill="#475569" font-size="14" font-weight="600">Layer Depth</text>

    <!-- SVG paths for the curves -->
    <!-- ResNet Line -->
    <path id="pathResNet" d="M 60 260 L 420 260" fill="none" stroke="#94a3b8" stroke-width="3" stroke-dasharray="6,4"/>
    <!-- Exploding Line -->
    <path id="pathExplode" d="M 60 260 C 200 260, 300 210, 420 50" fill="none" stroke="#e11d48" stroke-width="3"/>
    <!-- Vanishing Line -->
    <path id="pathVanish" d="M 60 260 C 200 260, 300 320, 420 325" fill="none" stroke="#f59e0b" stroke-width="3"/>


    <!-- Exploding Curve Annotation -->
    <line x1="315" y1="120" x2="335" y2="100" stroke="#e11d48" stroke-width="1.5" marker-end="url(#arrowRed)"/>
    <rect x="265" y="120" width="100" height="26" rx="6" fill="#ffe4e6" stroke="#fda4af" stroke-width="1"/>
    <text x="315" y="138" text-anchor="middle" fill="#e11d48" font-size="13" font-weight="700">Exploding</text>

    <!-- ResNet Curve Annotation -->
    <line x1="350" y1="240" x2="350" y2="252" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowSlate)"/>
    <rect x="280" y="214" width="140" height="26" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <text x="350" y="232" text-anchor="middle" fill="#475569" font-size="13" font-weight="700">Standard ResNet</text>

    <!-- Vanishing Curve Annotation -->
    <line x1="225" y1="292" x2="270" y2="313" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowAmber)"/>
    <rect x="180" y="266" width="90" height="26" rx="6" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
    <text x="225" y="284" text-anchor="middle" fill="#d97706" font-size="13" font-weight="700">Vanishing</text>

    <!-- Animated Particles Tracing Curves -->
    <circle r="4" fill="#cbd5e1" filter="url(#glowSlate)">
      <animateMotion dur="4s" repeatCount="indefinite">
        <mpath href="#pathResNet"/>
      </animateMotion>
    </circle>

    <circle r="5" fill="#fb7185" filter="url(#glowRed)">
      <animateMotion dur="2.5s" repeatCount="indefinite">
        <mpath href="#pathExplode"/>
      </animateMotion>
    </circle>

    <circle r="5" fill="#fbbf24" filter="url(#glowAmber)">
      <animateMotion dur="3.5s" repeatCount="indefinite">
        <mpath href="#pathVanish"/>
      </animateMotion>
    </circle>
  </g>

  <!-- Right Side: Explanation Cards -->
  <g transform="translate(580, 140)">

    <!-- Title Card -->
    <rect x="0" y="0" width="380" height="280" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="190" y="35" text-anchor="middle" font-size="18" font-weight="800" fill="#0f172a">The 1.1 vs 0.9 Problem</text>
    <line x1="20" y1="50" x2="360" y2="50" stroke="#f1f5f9" stroke-width="2"/>

    <!-- Standard Comparison -->
    <g transform="translate(20, 80)">
      <rect x="0" y="0" width="340" height="36" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
      <text x="15" y="23" font-size="14" font-weight="600" fill="#475569">Standard ResNet:</text>
      <text x="140" y="23" font-size="14" fill="#64748b" font-family="monospace">1.0 × x</text>
      <rect x="270" y="7" width="55" height="22" rx="11" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
      <text x="297" y="23" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">Safe</text>
    </g>

    <!-- HC Matrix Explanations -->
    <g transform="translate(20, 140)">
      <text x="0" y="0" font-size="14" font-weight="600" fill="#0f172a">Hyper-Connection: Unconstrained Matrix</text>

      <!-- Explodes -->
      <g transform="translate(0, 20)">
        <text x="10" y="0" font-size="14" font-weight="600" fill="#e11d48">• If mixing scalar &gt; 1.0</text>
        <line x1="180" y1="-5" x2="200" y2="-5" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arrowSlate)"/>
        <text x="215" y="0" font-size="14" font-weight="700" fill="#e11d48">Explodes</text>
        <text x="10" y="22" font-size="13" fill="#64748b" font-family="monospace">e.g., 1.01¹⁰⁰ ≈ 2.7</text>
      </g>

      <!-- Vanishes -->
      <g transform="translate(0, 65)">
        <text x="10" y="0" font-size="14" font-weight="600" fill="#d97706">• If mixing scalar &lt; 1.0</text>
        <line x1="180" y1="-5" x2="200" y2="-5" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arrowSlate)"/>
        <text x="215" y="0" font-size="14" font-weight="700" fill="#d97706">Vanishes</text>
        <text x="10" y="22" font-size="13" fill="#64748b" font-family="monospace">e.g., 0.99¹⁰⁰ ≈ 0.37</text>
      </g>
    </g>

    <!-- Warning Metrics Box -->
    <rect x="0" y="310" width="380" height="85" rx="8" fill="#fff1f2" stroke="#fecdd3" stroke-width="1.5" filter="url(#shadow)"/>
    <path d="M 15 325 L 15 380" stroke="#f43f5e" stroke-width="4" stroke-linecap="round"/>
    <text x="30" y="340" font-size="14" font-weight="700" fill="#be123c">Real-World Measurement</text>
    <text x="30" y="362" font-size="13" font-weight="500" fill="#881337">In deep uncontrolled HC networks, DeepSeek</text>
    <text x="30" y="380" font-size="13" font-weight="500" fill="#881337">measured a </text>
    <text x="105" y="380" font-size="13" font-weight="800" fill="#9f1239">~3000x</text>
    <text x="155" y="380" font-size="13" font-weight="500" fill="#881337"> signal explosion.</text>

  </g>

</svg>
