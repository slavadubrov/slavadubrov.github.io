<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="The full RAG pipeline with metric badges at every stage" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">The full RAG pipeline with metric badges at every stage</title>
  <defs>
    <marker id="arrEval" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
    <filter id="shadowEval" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a" x="590">The RAG Pipeline With Evaluation Points</text>
  <text y="54" text-anchor="middle" font-size="12" fill="#334155" x="590">Every stage gets a metric. The metric is what catches silent failure.</text>

  <!-- ============ OFFLINE LANE ============ -->
  <rect x="20" y="78" width="1140" height="290" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="1"/>
  <text y="102" font-size="13" font-weight="700" fill="#1d4ed8" x="40">Offline · Ingestion</text>
  <text y="118" font-size="10" fill="#64748b" x="40">Runs once per corpus version. Sets the ceiling.</text>

  <!-- Stage 1: Acquire / Parse -->
  <rect x="40" y="140" width="170" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)"/>
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="125">Acquire &amp; Parse</text>
  <text y="178" text-anchor="middle" font-size="9" fill="#334155" x="125">PDFs · HTML · OCR</text>
  <text y="192" text-anchor="middle" font-size="9" fill="#334155" x="125">Tables · Layout</text>

  <!-- Metric badge 1 -->
  <rect x="40" y="212" width="170" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1"/>
  <text y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="125">CER · WER · TEDS</text>
  <text y="242" text-anchor="middle" font-size="9" fill="#9a3412" x="125">parse pass-rate</text>
  <text y="255" text-anchor="middle" font-size="9" fill="#9a3412" x="125">layout fidelity</text>

  <!-- Arrow -->
  <line x1="210" y1="171" x2="245" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)"/>

  <!-- Stage 2: Normalize / Dedup -->
  <rect x="245" y="140" width="170" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)"/>
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="330">Normalize &amp; Dedup</text>
  <text y="178" text-anchor="middle" font-size="9" fill="#334155" x="330">NFC/NFKC · MinHash</text>
  <text y="192" text-anchor="middle" font-size="9" fill="#334155" x="330">PII · boilerplate</text>

  <rect x="245" y="212" width="170" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1"/>
  <text y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="330">dup recall/precision</text>
  <text y="242" text-anchor="middle" font-size="9" fill="#9a3412" x="330">PII recall (per type)</text>
  <text y="255" text-anchor="middle" font-size="9" fill="#9a3412" x="330">lang-detect F1</text>

  <line x1="415" y1="171" x2="450" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)"/>

  <!-- Stage 3: Chunk -->
  <rect x="450" y="140" width="170" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)"/>
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="535">Chunk</text>
  <text y="178" text-anchor="middle" font-size="9" fill="#334155" x="535">recursive · semantic</text>
  <text y="192" text-anchor="middle" font-size="9" fill="#334155" x="535">structural · late</text>

  <rect x="450" y="212" width="170" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1"/>
  <text y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="535">answer-span containment</text>
  <text y="242" text-anchor="middle" font-size="9" fill="#9a3412" x="535">boundary break-rate</text>
  <text y="255" text-anchor="middle" font-size="9" fill="#9a3412" x="535">Recall@k vs. size</text>

  <line x1="620" y1="171" x2="655" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)"/>

  <!-- Stage 4: Enrich (NER/EL) -->
  <rect x="655" y="140" width="170" height="62" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowEval)"/>
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6" x="740">Enrich</text>
  <text y="178" text-anchor="middle" font-size="9" fill="#334155" x="740">NER · entity link</text>
  <text y="192" text-anchor="middle" font-size="9" fill="#334155" x="740">tags · hierarchy</text>

  <rect x="655" y="212" width="170" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1"/>
  <text y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="740">EL F1 · NIL precision</text>
  <text y="242" text-anchor="middle" font-size="9" fill="#9a3412" x="740">hierarchical F1</text>
  <text y="255" text-anchor="middle" font-size="9" fill="#9a3412" x="740">alias coverage</text>

  <line x1="825" y1="171" x2="860" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)"/>

  <!-- Stage 5: Embed -->
  <rect x="860" y="140" width="135" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)"/>
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="927">Embed</text>
  <text y="178" text-anchor="middle" font-size="9" fill="#334155" x="927">dense / sparse</text>
  <text y="192" text-anchor="middle" font-size="9" fill="#334155" x="927">multi-vector</text>

  <rect x="860" y="212" width="135" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1"/>
  <text y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="927">domain nDCG@10</text>
  <text y="242" text-anchor="middle" font-size="9" fill="#9a3412" x="927">drift (KL · NN-stab.)</text>
  <text y="255" text-anchor="middle" font-size="9" fill="#9a3412" x="927">vs. BEIR/MMTEB</text>

  <line x1="995" y1="171" x2="1030" y2="171" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)"/>

  <!-- Stage 6: Index -->
  <rect x="1030" y="140" width="115" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowEval)"/>
  <text y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" x="1087">Index</text>
  <text y="178" text-anchor="middle" font-size="9" fill="#334155" x="1087">HNSW / IVF</text>
  <text y="192" text-anchor="middle" font-size="9" fill="#334155" x="1087">BM25 · hybrid</text>

  <rect x="1030" y="212" width="115" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1"/>
  <text y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="1087">ANN recall vs. flat</text>
  <text y="242" text-anchor="middle" font-size="9" fill="#9a3412" x="1087">freshness lag p99</text>
  <text y="255" text-anchor="middle" font-size="9" fill="#9a3412" x="1087">filtered-search lat.</text>

  <!-- Lane summary -->
  <rect x="40" y="290" width="1105" height="58" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text y="312" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8" x="592">Offline corpus readiness sets the upper bound. If a chunk loses the answer span here, no reranker recovers it downstream.</text>
  <text y="332" text-anchor="middle" font-size="10" fill="#1d4ed8" x="592">Most teams over-invest in retrieval and under-invest in parsing, normalization, and chunking. That's where production RAG quietly dies.</text>

  <!-- ============ ONLINE LANE ============ -->
  <rect x="20" y="378" width="1140" height="280" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="1"/>
  <text y="402" font-size="13" font-weight="700" fill="#9a3412" x="40">Online · Inference (per query)</text>
  <text y="418" font-size="10" fill="#64748b" x="40">Runs every request. The lane where most metrics get watched in production.</text>

  <!-- Stage 7: Query Rewrite -->
  <rect x="40" y="440" width="160" height="62" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowEval)"/>
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="120">Rewrite / Route</text>
  <text y="478" text-anchor="middle" font-size="9" fill="#334155" x="120">HyDE · multi-query</text>
  <text y="492" text-anchor="middle" font-size="9" fill="#334155" x="120">intent · adaptive</text>

  <rect x="40" y="512" width="160" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1"/>
  <text y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="120">Recall@k uplift</text>
  <text y="542" text-anchor="middle" font-size="9" fill="#9a3412" x="120">routing accuracy</text>
  <text y="555" text-anchor="middle" font-size="9" fill="#9a3412" x="120">no-op rate</text>

  <line x1="200" y1="471" x2="235" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)"/>

  <!-- Stage 8: Retrieve -->
  <rect x="235" y="440" width="160" height="62" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowEval)"/>
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="315">Retrieve</text>
  <text y="478" text-anchor="middle" font-size="9" fill="#334155" x="315">dense + sparse + RRF</text>
  <text y="492" text-anchor="middle" font-size="9" fill="#334155" x="315">filter predicates</text>

  <rect x="235" y="512" width="160" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1"/>
  <text y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="315">Recall@k · MRR · nDCG</text>
  <text y="542" text-anchor="middle" font-size="9" fill="#9a3412" x="315">context precision/recall</text>
  <text y="555" text-anchor="middle" font-size="9" fill="#9a3412" x="315">hybrid lift</text>

  <line x1="395" y1="471" x2="430" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)"/>

  <!-- Stage 9: Filter (highlighted) -->
  <rect x="430" y="440" width="160" height="62" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2" filter="url(#shadowEval)"/>
  <text y="462" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b" x="510">Filter (the silent killer)</text>
  <text y="478" text-anchor="middle" font-size="9" fill="#334155" x="510">tenant · ACL · tag</text>
  <text y="492" text-anchor="middle" font-size="9" fill="#334155" x="510">hard vs. soft</text>

  <rect x="430" y="512" width="160" height="48" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.2"/>
  <text y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#991b1b" x="510">filter false-exclusion rate</text>
  <text y="542" text-anchor="middle" font-size="9" fill="#991b1b" x="510">predicate precision/recall</text>
  <text y="555" text-anchor="middle" font-size="9" fill="#991b1b" x="510">shadow-retrieval Δ</text>

  <line x1="590" y1="471" x2="625" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)"/>

  <!-- Stage 10: Rerank -->
  <rect x="625" y="440" width="160" height="62" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowEval)"/>
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="705">Rerank</text>
  <text y="478" text-anchor="middle" font-size="9" fill="#334155" x="705">cross-encoder · listwise</text>
  <text y="492" text-anchor="middle" font-size="9" fill="#334155" x="705">BGE · Cohere · ZeRank</text>

  <rect x="625" y="512" width="160" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1"/>
  <text y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="705">ΔnDCG · ΔMRR · ΔP@1</text>
  <text y="542" text-anchor="middle" font-size="9" fill="#9a3412" x="705">distractor robustness</text>
  <text y="555" text-anchor="middle" font-size="9" fill="#9a3412" x="705">latency p95</text>

  <line x1="785" y1="471" x2="820" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)"/>

  <!-- Stage 11: Assemble -->
  <rect x="820" y="440" width="160" height="62" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowEval)"/>
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412" x="900">Assemble Context</text>
  <text y="478" text-anchor="middle" font-size="9" fill="#334155" x="900">order · compress</text>
  <text y="492" text-anchor="middle" font-size="9" fill="#334155" x="900">budget tokens</text>

  <rect x="820" y="512" width="160" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1"/>
  <text y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="900">context utilization</text>
  <text y="542" text-anchor="middle" font-size="9" fill="#9a3412" x="900">lost-in-the-middle</text>
  <text y="555" text-anchor="middle" font-size="9" fill="#9a3412" x="900">compression × correctness</text>

  <line x1="980" y1="471" x2="1015" y2="471" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrEval)"/>

  <!-- Stage 12: Generate -->
  <rect x="1015" y="440" width="130" height="62" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowEval)"/>
  <text y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6" x="1080">Generate</text>
  <text y="478" text-anchor="middle" font-size="9" fill="#334155" x="1080">LLM call</text>
  <text y="492" text-anchor="middle" font-size="9" fill="#334155" x="1080">+ citations</text>

  <rect x="1015" y="512" width="130" height="48" rx="6" fill="#f0fdf4" stroke="#ea580c" stroke-width="1"/>
  <text y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412" x="1080">faithfulness · HHEM</text>
  <text y="542" text-anchor="middle" font-size="9" fill="#9a3412" x="1080">citation P/R</text>
  <text y="555" text-anchor="middle" font-size="9" fill="#9a3412" x="1080">FActScore</text>

  <!-- Lane summary -->
  <rect x="40" y="582" width="1105" height="58" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1"/>
  <text y="604" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412" x="592">A bad filter or a wrong rewrite zeros recall before ranking starts. Faithfulness still looks fine — the model faithfully says "I don't know."</text>
  <text y="624" text-anchor="middle" font-size="10" fill="#9a3412" x="592">Track exclusion rate alongside Recall@k. Otherwise the canonical IR metrics will lie to you about a healthy retriever.</text>

  <!-- ============ POST-GEN LANE ============ -->
  <rect x="20" y="668" width="1140" height="78" rx="10" fill="#f0fdf4" stroke="#166534" stroke-width="1"/>
  <text y="692" font-size="13" font-weight="700" fill="#166534" x="40">Post-Generation · Verification &amp; Telemetry</text>

  <rect x="40" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2"/>
  <text y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="150">claim verification · NLI · self-consistency</text>

  <rect x="270" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2"/>
  <text y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="380">schema validity · entity grounding · ECE</text>

  <rect x="500" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2"/>
  <text y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="610">regen rate · thumbs · dwell · CTR on cites</text>

  <rect x="730" y="704" width="220" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2"/>
  <text y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="840">drift (query/embed) · cost/query · p95</text>

  <rect x="960" y="704" width="185" height="32" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2"/>
  <text y="724" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" x="1052">shadow eval · HITL queue</text>
</svg>
