<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 720" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="Silent failure taxonomy with the metric that catches each mode">
  <defs>
    <filter id="shadowSF" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="590" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a2e">Silent Failure Taxonomy</text>
  <text x="590" y="54" text-anchor="middle" font-size="12" fill="#666">Each failure mode is paired with the metric that catches it. Without the metric, the bug is invisible.</text>

  <!-- Root -->
  <rect x="475" y="78" width="230" height="44" rx="22" fill="#c62828" filter="url(#shadowSF)"/>
  <text x="590" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="white">Silent Failure (RAG)</text>

  <!-- Trunk: 4 main branches -->
  <line x1="540" y1="122" x2="170" y2="170" stroke="#888" stroke-width="1.4"/>
  <line x1="570" y1="122" x2="450" y2="170" stroke="#888" stroke-width="1.4"/>
  <line x1="610" y1="122" x2="730" y2="170" stroke="#888" stroke-width="1.4"/>
  <line x1="640" y1="122" x2="1010" y2="170" stroke="#888" stroke-width="1.4"/>

  <!-- ====== Branch A: Ingestion ====== -->
  <rect x="40" y="170" width="260" height="40" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="170" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">Ingestion failures</text>

  <!-- A1: Parse loss -->
  <rect x="40" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)"/>
  <text x="50" y="245" font-size="11" font-weight="700" fill="#1565c0">Parse loss</text>
  <text x="50" y="261" font-size="10" fill="#444">tables collapse · footnotes</text>
  <text x="50" y="275" font-size="10" fill="#444">dropped · OCR scrambles digits</text>
  <text x="50" y="285" font-size="9" font-style="italic" fill="#888">caught by: CER/WER, TEDS</text>

  <!-- A2: Chunk break -->
  <rect x="40" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)"/>
  <text x="50" y="320" font-size="11" font-weight="700" fill="#1565c0">Chunk break</text>
  <text x="50" y="336" font-size="10" fill="#444">answer span split across two</text>
  <text x="50" y="350" font-size="10" fill="#444">chunks; neither has full evidence</text>
  <text x="50" y="360" font-size="9" font-style="italic" fill="#888">caught by: answer-span containment</text>

  <!-- A3: Dedup miss -->
  <rect x="40" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)"/>
  <text x="50" y="395" font-size="11" font-weight="700" fill="#1565c0">Dedup error</text>
  <text x="50" y="411" font-size="10" fill="#444">false-merge corrupts answer;</text>
  <text x="50" y="425" font-size="10" fill="#444">false-keep buries the right doc</text>
  <text x="50" y="435" font-size="9" font-style="italic" fill="#888">caught by: dup precision/recall</text>

  <!-- A4: Normalization -->
  <rect x="40" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)"/>
  <text x="50" y="470" font-size="11" font-weight="700" fill="#1565c0">Normalization drift</text>
  <text x="50" y="486" font-size="10" fill="#444">NFC vs NFKC mismatch breaks</text>
  <text x="50" y="500" font-size="10" fill="#444">exact-match alias resolution</text>
  <text x="50" y="510" font-size="9" font-style="italic" fill="#888">caught by: NFC/NFKC parity, alias coverage</text>

  <!-- ====== Branch B: Embedding/Index ====== -->
  <rect x="320" y="170" width="260" height="40" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="450" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">Embedding &amp; index</text>

  <!-- B1: Embedding miss -->
  <rect x="320" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)"/>
  <text x="330" y="245" font-size="11" font-weight="700" fill="#1565c0">Embedding miss</text>
  <text x="330" y="261" font-size="10" fill="#444">domain term sits outside the</text>
  <text x="330" y="275" font-size="10" fill="#444">model's training distribution</text>
  <text x="330" y="285" font-size="9" font-style="italic" fill="#888">caught by: domain Recall@k vs. baseline</text>

  <!-- B2: ANN drop -->
  <rect x="320" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)"/>
  <text x="330" y="320" font-size="11" font-weight="700" fill="#1565c0">ANN approximation drop</text>
  <text x="330" y="336" font-size="10" fill="#444">HNSW efSearch too low; gold</text>
  <text x="330" y="350" font-size="10" fill="#444">vector exists but isn't reached</text>
  <text x="330" y="360" font-size="9" font-style="italic" fill="#888">caught by: ANN recall vs. flat</text>

  <!-- B3: Embedding drift -->
  <rect x="320" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)"/>
  <text x="330" y="395" font-size="11" font-weight="700" fill="#1565c0">Embedding drift</text>
  <text x="330" y="411" font-size="10" fill="#444">provider model version bump;</text>
  <text x="330" y="425" font-size="10" fill="#444">old vectors no longer aligned</text>
  <text x="330" y="435" font-size="9" font-style="italic" fill="#888">caught by: probe-set NN stability</text>

  <!-- B4: Stale index -->
  <rect x="320" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.2" filter="url(#shadowSF)"/>
  <text x="330" y="470" font-size="11" font-weight="700" fill="#1565c0">Stale index</text>
  <text x="330" y="486" font-size="10" fill="#444">freshness lag; queries run</text>
  <text x="330" y="500" font-size="10" fill="#444">against last week's truth</text>
  <text x="330" y="510" font-size="9" font-style="italic" fill="#888">caught by: freshness lag p99, %-stale</text>

  <!-- ====== Branch C: Online retrieval (HOT — silent killers) ====== -->
  <rect x="600" y="170" width="260" height="40" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="2"/>
  <text x="730" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#c62828">Online retrieval</text>

  <!-- C1: Filter exclude (highlighted) -->
  <rect x="600" y="225" width="260" height="64" rx="8" fill="#ffebee" stroke="#c62828" stroke-width="2" filter="url(#shadowSF)"/>
  <text x="610" y="245" font-size="11" font-weight="700" fill="#c62828">Filter false-exclusion</text>
  <text x="610" y="261" font-size="10" fill="#444">hard predicate drops gold doc;</text>
  <text x="610" y="275" font-size="10" fill="#444">Recall@k looks normal — over an empty set</text>
  <text x="610" y="285" font-size="9" font-style="italic" fill="#c62828">caught by: filter false-exclusion rate</text>

  <!-- C2: Rerank miss -->
  <rect x="600" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#c62828" stroke-width="1.2" filter="url(#shadowSF)"/>
  <text x="610" y="320" font-size="11" font-weight="700" fill="#c62828">Rerank miss</text>
  <text x="610" y="336" font-size="10" fill="#444">cross-encoder demotes the right</text>
  <text x="610" y="350" font-size="10" fill="#444">doc behind plausible distractors</text>
  <text x="610" y="360" font-size="9" font-style="italic" fill="#888">caught by: ΔnDCG, distractor robustness (RGB)</text>

  <!-- C3: Lost in middle -->
  <rect x="600" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#c62828" stroke-width="1.2" filter="url(#shadowSF)"/>
  <text x="610" y="395" font-size="11" font-weight="700" fill="#c62828">Lost in the middle</text>
  <text x="610" y="411" font-size="10" fill="#444">gold chunk in context but in</text>
  <text x="610" y="425" font-size="10" fill="#444">position 7/10; model ignores it</text>
  <text x="610" y="435" font-size="9" font-style="italic" fill="#888">caught by: position-stratified eval</text>

  <!-- C4: Bad rewrite -->
  <rect x="600" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#c62828" stroke-width="1.2" filter="url(#shadowSF)"/>
  <text x="610" y="470" font-size="11" font-weight="700" fill="#c62828">Query rewrite regression</text>
  <text x="610" y="486" font-size="10" fill="#444">HyDE hallucinates an entity that</text>
  <text x="610" y="500" font-size="10" fill="#444">tilts retrieval the wrong way</text>
  <text x="610" y="510" font-size="9" font-style="italic" fill="#888">caught by: rewrite gain/loss A/B</text>

  <!-- ====== Branch D: Generation/Citation ====== -->
  <rect x="880" y="170" width="260" height="40" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2"/>
  <text x="1010" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#6a1b9a">Generation</text>

  <!-- D1: Hallucination -->
  <rect x="880" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.2" filter="url(#shadowSF)"/>
  <text x="890" y="245" font-size="11" font-weight="700" fill="#6a1b9a">Hallucination</text>
  <text x="890" y="261" font-size="10" fill="#444">unsupported claim, often an</text>
  <text x="890" y="275" font-size="10" fill="#444">entity not in the context</text>
  <text x="890" y="285" font-size="9" font-style="italic" fill="#888">caught by: faithfulness, HHEM, FActScore</text>

  <!-- D2: No citation -->
  <rect x="880" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.2" filter="url(#shadowSF)"/>
  <text x="890" y="320" font-size="11" font-weight="700" fill="#6a1b9a">Citation theater</text>
  <text x="890" y="336" font-size="10" fill="#444">cited span doesn't actually</text>
  <text x="890" y="350" font-size="10" fill="#444">support the claim near it</text>
  <text x="890" y="360" font-size="9" font-style="italic" fill="#888">caught by: citation precision/recall (TREC support)</text>

  <!-- D3: Wrong refusal -->
  <rect x="880" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.2" filter="url(#shadowSF)"/>
  <text x="890" y="395" font-size="11" font-weight="700" fill="#6a1b9a">Wrong abstention</text>
  <text x="890" y="411" font-size="10" fill="#444">"I don't know" when the answer</text>
  <text x="890" y="425" font-size="10" fill="#444">is in context (or vice versa)</text>
  <text x="890" y="435" font-size="9" font-style="italic" fill="#888">caught by: NoMIRACL, abstention accuracy</text>

  <!-- D4: Schema break -->
  <rect x="880" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.2" filter="url(#shadowSF)"/>
  <text x="890" y="470" font-size="11" font-weight="700" fill="#6a1b9a">Schema/vocab break</text>
  <text x="890" y="486" font-size="10" fill="#444">syntactically valid output picks</text>
  <text x="890" y="500" font-size="10" fill="#444">a wrong-but-valid ontology ID</text>
  <text x="890" y="510" font-size="9" font-style="italic" fill="#888">caught by: vocabulary conformance</text>

  <!-- Footer band -->
  <rect x="40" y="555" width="1100" height="68" rx="8" fill="#fffde7" stroke="#fbc02d" stroke-width="1.2"/>
  <text x="590" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#827717">Reading guide</text>
  <text x="590" y="598" text-anchor="middle" font-size="10" fill="#827717">Each failure is silent in the absence of its metric. Standard "answer correctness" alone tells you something is broken — not where.</text>
  <text x="590" y="614" text-anchor="middle" font-size="10" fill="#827717">The red branch (filter exclusion, rerank miss, lost-in-the-middle, bad rewrite) is where most production RAG hurts. Instrument it first.</text>

  <!-- Visual cue: the 'red' propagation -->
  <rect x="40" y="640" width="1100" height="62" rx="8" fill="#ffffff" stroke="#cbd5e0" stroke-width="1"/>
  <text x="60" y="662" font-size="11" font-weight="600" fill="#1a1a2e">The propagation rule:</text>
  <text x="60" y="682" font-size="10" fill="#555">A failure on the left is a recall ceiling for everything on the right. Bad parsing caps chunking. Bad chunking caps retrieval.</text>
  <text x="60" y="696" font-size="10" fill="#555">Bad retrieval caps reranking. Bad reranking caps generation. Faithfulness measures only the last link — it cannot see the broken chain.</text>
</svg>
