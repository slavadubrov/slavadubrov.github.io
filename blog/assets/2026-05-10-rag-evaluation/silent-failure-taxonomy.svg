<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 720" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="Silent failure taxonomy with the metric that catches each mode" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Silent failure taxonomy with the metric that catches each mode</title>
  <defs>
    <filter id="shadowSF" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a" x="590">Silent Failure Taxonomy</text>
  <text y="54" text-anchor="middle" font-size="12" fill="#334155" x="590">Each failure mode is paired with the metric that catches it. Without the metric, the bug is invisible.</text>

  <!-- Root -->
  <rect x="475" y="78" width="230" height="44" rx="22" fill="#dc2626" filter="url(#shadowSF)"/>
  <text y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" x="590">Silent Failure (RAG)</text>

  <!-- Trunk: 4 main branches -->
  <line x1="540" y1="122" x2="170" y2="170" stroke="#94a3b8" stroke-width="1.4"/>
  <line x1="570" y1="122" x2="450" y2="170" stroke="#94a3b8" stroke-width="1.4"/>
  <line x1="610" y1="122" x2="730" y2="170" stroke="#94a3b8" stroke-width="1.4"/>
  <line x1="640" y1="122" x2="1010" y2="170" stroke="#94a3b8" stroke-width="1.4"/>

  <!-- ====== Branch A: Ingestion ====== -->
  <rect x="40" y="170" width="260" height="40" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8" x="170">Ingestion failures</text>

  <!-- A1: Parse loss -->
  <rect x="40" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)"/>
  <text y="245" font-size="11" font-weight="700" fill="#1d4ed8" x="50">Parse loss</text>
  <text y="261" font-size="10" fill="#334155" x="50">tables collapse · footnotes</text>
  <text y="275" font-size="10" fill="#334155" x="50">dropped · OCR scrambles digits</text>
  <text y="285" font-size="9" font-style="italic" fill="#64748b" x="50">caught by: CER/WER, TEDS</text>

  <!-- A2: Chunk break -->
  <rect x="40" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)"/>
  <text y="320" font-size="11" font-weight="700" fill="#1d4ed8" x="50">Chunk break</text>
  <text y="336" font-size="10" fill="#334155" x="50">answer span split across two</text>
  <text y="350" font-size="10" fill="#334155" x="50">chunks; neither has full evidence</text>
  <text y="360" font-size="9" font-style="italic" fill="#64748b" x="50">caught by: answer-span containment</text>

  <!-- A3: Dedup miss -->
  <rect x="40" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)"/>
  <text y="395" font-size="11" font-weight="700" fill="#1d4ed8" x="50">Dedup error</text>
  <text y="411" font-size="10" fill="#334155" x="50">false-merge corrupts answer;</text>
  <text y="425" font-size="10" fill="#334155" x="50">false-keep buries the right doc</text>
  <text y="435" font-size="9" font-style="italic" fill="#64748b" x="50">caught by: dup precision/recall</text>

  <!-- A4: Normalization -->
  <rect x="40" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)"/>
  <text y="470" font-size="11" font-weight="700" fill="#1d4ed8" x="50">Normalization drift</text>
  <text y="486" font-size="10" fill="#334155" x="50">NFC vs NFKC mismatch breaks</text>
  <text y="500" font-size="10" fill="#334155" x="50">exact-match alias resolution</text>
  <text y="510" font-size="9" font-style="italic" fill="#64748b" x="50">caught by: NFC/NFKC parity, alias coverage</text>

  <!-- ====== Branch B: Embedding/Index ====== -->
  <rect x="320" y="170" width="260" height="40" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8" x="450">Embedding &amp; index</text>

  <!-- B1: Embedding miss -->
  <rect x="320" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)"/>
  <text y="245" font-size="11" font-weight="700" fill="#1d4ed8" x="330">Embedding miss</text>
  <text y="261" font-size="10" fill="#334155" x="330">domain term sits outside the</text>
  <text y="275" font-size="10" fill="#334155" x="330">model's training distribution</text>
  <text y="285" font-size="9" font-style="italic" fill="#64748b" x="330">caught by: domain Recall@k vs. baseline</text>

  <!-- B2: ANN drop -->
  <rect x="320" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)"/>
  <text y="320" font-size="11" font-weight="700" fill="#1d4ed8" x="330">ANN approximation drop</text>
  <text y="336" font-size="10" fill="#334155" x="330">HNSW efSearch too low; gold</text>
  <text y="350" font-size="10" fill="#334155" x="330">vector exists but isn't reached</text>
  <text y="360" font-size="9" font-style="italic" fill="#64748b" x="330">caught by: ANN recall vs. flat</text>

  <!-- B3: Embedding drift -->
  <rect x="320" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)"/>
  <text y="395" font-size="11" font-weight="700" fill="#1d4ed8" x="330">Embedding drift</text>
  <text y="411" font-size="10" fill="#334155" x="330">provider model version bump;</text>
  <text y="425" font-size="10" fill="#334155" x="330">old vectors no longer aligned</text>
  <text y="435" font-size="9" font-style="italic" fill="#64748b" x="330">caught by: probe-set NN stability</text>

  <!-- B4: Stale index -->
  <rect x="320" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#shadowSF)"/>
  <text y="470" font-size="11" font-weight="700" fill="#1d4ed8" x="330">Stale index</text>
  <text y="486" font-size="10" fill="#334155" x="330">freshness lag; queries run</text>
  <text y="500" font-size="10" fill="#334155" x="330">against last week's truth</text>
  <text y="510" font-size="9" font-style="italic" fill="#64748b" x="330">caught by: freshness lag p99, %-stale</text>

  <!-- ====== Branch C: Online retrieval (HOT — silent killers) ====== -->
  <rect x="600" y="170" width="260" height="40" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b" x="730">Online retrieval</text>

  <!-- C1: Filter exclude (highlighted) -->
  <rect x="600" y="225" width="260" height="64" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2" filter="url(#shadowSF)"/>
  <text y="245" font-size="11" font-weight="700" fill="#991b1b" x="610">Filter false-exclusion</text>
  <text y="261" font-size="10" fill="#334155" x="610">hard predicate drops gold doc;</text>
  <text y="275" font-size="10" fill="#334155" x="610">Recall@k looks normal — over an empty set</text>
  <text y="285" font-size="9" font-style="italic" fill="#991b1b" x="610">caught by: filter false-exclusion rate</text>

  <!-- C2: Rerank miss -->
  <rect x="600" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="1.2" filter="url(#shadowSF)"/>
  <text y="320" font-size="11" font-weight="700" fill="#991b1b" x="610">Rerank miss</text>
  <text y="336" font-size="10" fill="#334155" x="610">cross-encoder demotes the right</text>
  <text y="350" font-size="10" fill="#334155" x="610">doc behind plausible distractors</text>
  <text y="360" font-size="9" font-style="italic" fill="#64748b" x="610">caught by: ΔnDCG, distractor robustness (RGB)</text>

  <!-- C3: Lost in middle -->
  <rect x="600" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="1.2" filter="url(#shadowSF)"/>
  <text y="395" font-size="11" font-weight="700" fill="#991b1b" x="610">Lost in the middle</text>
  <text y="411" font-size="10" fill="#334155" x="610">gold chunk in context but in</text>
  <text y="425" font-size="10" fill="#334155" x="610">position 7/10; model ignores it</text>
  <text y="435" font-size="9" font-style="italic" fill="#64748b" x="610">caught by: position-stratified eval</text>

  <!-- C4: Bad rewrite -->
  <rect x="600" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="1.2" filter="url(#shadowSF)"/>
  <text y="470" font-size="11" font-weight="700" fill="#991b1b" x="610">Query rewrite regression</text>
  <text y="486" font-size="10" fill="#334155" x="610">HyDE hallucinates an entity that</text>
  <text y="500" font-size="10" fill="#334155" x="610">tilts retrieval the wrong way</text>
  <text y="510" font-size="9" font-style="italic" fill="#64748b" x="610">caught by: rewrite gain/loss A/B</text>

  <!-- ====== Branch D: Generation/Citation ====== -->
  <rect x="880" y="170" width="260" height="40" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6" x="1010">Generation</text>

  <!-- D1: Hallucination -->
  <rect x="880" y="225" width="260" height="64" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadowSF)"/>
  <text y="245" font-size="11" font-weight="700" fill="#5b21b6" x="890">Hallucination</text>
  <text y="261" font-size="10" fill="#334155" x="890">unsupported claim, often an</text>
  <text y="275" font-size="10" fill="#334155" x="890">entity not in the context</text>
  <text y="285" font-size="9" font-style="italic" fill="#64748b" x="890">caught by: faithfulness, HHEM, FActScore</text>

  <!-- D2: No citation -->
  <rect x="880" y="300" width="260" height="64" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadowSF)"/>
  <text y="320" font-size="11" font-weight="700" fill="#5b21b6" x="890">Citation theater</text>
  <text y="336" font-size="10" fill="#334155" x="890">cited span doesn't actually</text>
  <text y="350" font-size="10" fill="#334155" x="890">support the claim near it</text>
  <text y="360" font-size="9" font-style="italic" fill="#64748b" x="890">caught by: citation precision/recall (TREC support)</text>

  <!-- D3: Wrong refusal -->
  <rect x="880" y="375" width="260" height="64" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadowSF)"/>
  <text y="395" font-size="11" font-weight="700" fill="#5b21b6" x="890">Wrong abstention</text>
  <text y="411" font-size="10" fill="#334155" x="890">"I don't know" when the answer</text>
  <text y="425" font-size="10" fill="#334155" x="890">is in context (or vice versa)</text>
  <text y="435" font-size="9" font-style="italic" fill="#64748b" x="890">caught by: NoMIRACL, abstention accuracy</text>

  <!-- D4: Schema break -->
  <rect x="880" y="450" width="260" height="64" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadowSF)"/>
  <text y="470" font-size="11" font-weight="700" fill="#5b21b6" x="890">Schema/vocab break</text>
  <text y="486" font-size="10" fill="#334155" x="890">syntactically valid output picks</text>
  <text y="500" font-size="10" fill="#334155" x="890">a wrong-but-valid ontology ID</text>
  <text y="510" font-size="9" font-style="italic" fill="#64748b" x="890">caught by: vocabulary conformance</text>

  <!-- Footer band -->
  <rect x="40" y="555" width="1100" height="68" rx="8" fill="#f0fdf4" stroke="#ea580c" stroke-width="1.2"/>
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="590">Reading guide</text>
  <text y="598" text-anchor="middle" font-size="10" fill="#9a3412" x="590">Each failure is silent in the absence of its metric. Standard "answer correctness" alone tells you something is broken — not where.</text>
  <text y="614" text-anchor="middle" font-size="10" fill="#9a3412" x="590">The red branch (filter exclusion, rerank miss, lost-in-the-middle, bad rewrite) is where most production RAG hurts. Instrument it first.</text>

  <!-- Visual cue: the 'red' propagation -->
  <rect x="40" y="640" width="1100" height="62" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1"/>
  <text y="662" font-size="11" font-weight="600" fill="#0f172a" x="60">The propagation rule:</text>
  <text y="682" font-size="10" fill="#334155" x="60">A failure on the left is a recall ceiling for everything on the right. Bad parsing caps chunking. Bad chunking caps retrieval.</text>
  <text y="696" font-size="10" fill="#334155" x="60">Bad retrieval caps reranking. Bad reranking caps generation. Faithfulness measures only the last link — it cannot see the broken chain.</text>
</svg>
