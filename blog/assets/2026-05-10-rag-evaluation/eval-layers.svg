<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 660" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Three places where a RAG system can lose evidence: ingestion, query time, and the answer or production environment" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Three places where a RAG system can lose evidence</title>
  <defs>
    <marker id="arrLayer" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#64748b"/>
    </marker>
    <filter id="shadowL" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="1180" height="660" fill="#f8fafc"/>

  <!-- Title -->
  <text y="32" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a" x="590">Three places where a RAG system can lose evidence</text>
  <text y="56" text-anchor="middle" font-size="12" fill="#64748b" x="590">Ingestion · Query-time pipeline · Answer quality and production behavior</text>

  <!-- =============== Layer 1: Ingestion =============== -->
  <rect x="30" y="80" width="1120" height="160" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadowL)"/>
  <text y="106" font-size="14" font-weight="700" fill="#1d4ed8" x="55">Layer 1 · Ingestion</text>
  <text y="124" font-size="11" fill="#1d4ed8" x="55">Question: did the corpus and index preserve the source?</text>

  <!-- Sub-cards -->
  <rect x="55" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1"/>
  <text y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="175">Corpus readiness</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="175">parse pass-rate · CER/WER</text>
  <text y="193" text-anchor="middle" font-size="11" fill="#64748b" x="175">TEDS · metadata coverage</text>
  <text y="208" text-anchor="middle" font-size="11" fill="#64748b" x="175">freshness · dedup</text>

  <rect x="305" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1"/>
  <text y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="425">Chunking</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="425">answer-span containment</text>
  <text y="193" text-anchor="middle" font-size="11" fill="#64748b" x="425">boundary break-rate</text>
  <text y="208" text-anchor="middle" font-size="11" fill="#64748b" x="425">overlap redundancy</text>

  <rect x="555" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1"/>
  <text y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="675">Embedding · Index</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="675">domain nDCG@10</text>
  <text y="193" text-anchor="middle" font-size="11" fill="#64748b" x="675">ANN recall vs. flat</text>
  <text y="208" text-anchor="middle" font-size="11" fill="#64748b" x="675">drift baseline</text>

  <rect x="805" y="140" width="320" height="80" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1"/>
  <text y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8" x="965">Enrichment (NER · EL · tags)</text>
  <text y="178" text-anchor="middle" font-size="11" fill="#64748b" x="965">EL F1 · NIL handling · alias coverage</text>
  <text y="193" text-anchor="middle" font-size="11" fill="#64748b" x="965">hierarchical F1 · orphan-tag rate</text>
  <text y="208" text-anchor="middle" font-size="11" fill="#64748b" x="965">schema validity at publish time</text>

  <!-- Arrow down to Layer 2 -->
  <line x1="590" y1="244" x2="590" y2="280" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrLayer)"/>
  <text y="265" font-size="11" fill="#64748b" font-style="italic" x="700">sets the recall ceiling for everything below</text>

  <!-- =============== Layer 2: Query time =============== -->
  <rect x="30" y="290" width="1120" height="160" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowL)"/>
  <text y="316" font-size="14" font-weight="700" fill="#9a3412" x="55">Layer 2 · Query time</text>
  <text y="334" font-size="11" fill="#9a3412" x="55">Question: did the pipeline find and assemble the right evidence?</text>

  <rect x="55" y="350" width="240" height="80" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1"/>
  <text y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="175">Query understanding</text>
  <text y="388" text-anchor="middle" font-size="11" fill="#64748b" x="175">rewrite gain/loss</text>
  <text y="403" text-anchor="middle" font-size="11" fill="#64748b" x="175">routing accuracy</text>
  <text y="418" text-anchor="middle" font-size="11" fill="#64748b" x="175">decomposition coverage</text>

  <rect x="305" y="350" width="240" height="80" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1"/>
  <text y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="425">Retrieval</text>
  <text y="388" text-anchor="middle" font-size="11" fill="#64748b" x="425">Recall@k · MRR · nDCG · MAP</text>
  <text y="403" text-anchor="middle" font-size="11" fill="#64748b" x="425">context precision/recall</text>
  <text y="418" text-anchor="middle" font-size="11" fill="#64748b" x="425">hybrid lift over each lane</text>

  <rect x="555" y="350" width="240" height="80" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.6"/>
  <text y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b" x="675">Filtering (hot zone)</text>
  <text y="388" text-anchor="middle" font-size="11" fill="#991b1b" x="675">filter false-exclusion rate</text>
  <text y="403" text-anchor="middle" font-size="11" fill="#991b1b" x="675">predicate precision/recall</text>
  <text y="418" text-anchor="middle" font-size="11" fill="#991b1b" x="675">shadow-retrieval Δ</text>

  <rect x="805" y="350" width="320" height="80" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1"/>
  <text y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="965">Reranking · Context assembly</text>
  <text y="388" text-anchor="middle" font-size="11" fill="#64748b" x="965">ΔnDCG · ΔMRR over no-rerank</text>
  <text y="403" text-anchor="middle" font-size="11" fill="#64748b" x="965">context utilization · lost-in-middle</text>
  <text y="418" text-anchor="middle" font-size="11" fill="#64748b" x="965">distractor robustness (RGB)</text>

  <!-- Arrow down to Layer 3 -->
  <line x1="590" y1="454" x2="590" y2="490" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrLayer)"/>
  <text y="475" font-size="11" fill="#64748b" font-style="italic" x="700">feeds verified context into generation</text>

  <!-- =============== Layer 3: Answer and production =============== -->
  <rect x="30" y="500" width="1120" height="135" rx="12" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowL)"/>
  <text y="526" font-size="14" font-weight="700" fill="#166534" x="55">Layer 3 · Answer and production</text>
  <text y="544" font-size="11" fill="#166534" x="55">Question: did the answer use the evidence, and does quality hold under live traffic?</text>

  <rect x="55" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1"/>
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="175">Faithfulness</text>
  <text y="595" text-anchor="middle" font-size="11" fill="#64748b" x="175">RAGAS · HHEM · FActScore</text>
  <text y="610" text-anchor="middle" font-size="11" fill="#64748b" x="175">FaithJudge · self-consistency</text>

  <rect x="305" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1"/>
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="425">Citations &amp; structure</text>
  <text y="595" text-anchor="middle" font-size="11" fill="#64748b" x="425">citation precision/recall</text>
  <text y="610" text-anchor="middle" font-size="11" fill="#64748b" x="425">schema validity · vocab conformance</text>

  <rect x="555" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1"/>
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="675">Implicit + explicit signal</text>
  <text y="595" text-anchor="middle" font-size="11" fill="#64748b" x="675">regen rate · dwell · CTR on cites</text>
  <text y="610" text-anchor="middle" font-size="11" fill="#64748b" x="675">thumbs · star · inline edits</text>

  <rect x="805" y="558" width="320" height="68" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1"/>
  <text y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="965">Drift · cost · latency · HITL</text>
  <text y="595" text-anchor="middle" font-size="11" fill="#64748b" x="965">query/embedding drift · p95 latency · $/query</text>
  <text y="610" text-anchor="middle" font-size="11" fill="#64748b" x="965">shadow eval · low-confidence review queue</text>
</svg>
