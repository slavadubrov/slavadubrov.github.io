<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 660" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="The three-layer evaluation discipline">
  <defs>
    <marker id="arrLayer" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#555"/>
    </marker>
    <filter id="shadowL" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="590" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a2e">The Three-Layer Evaluation Discipline</text>
  <text x="590" y="54" text-anchor="middle" font-size="12" fill="#666">Offline corpus &amp; index · Online retrieval &amp; generation · Post-generation verification + production telemetry</text>

  <!-- =============== Layer 1: Offline =============== -->
  <rect x="30" y="80" width="1120" height="160" rx="12" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowL)"/>
  <text x="55" y="106" font-size="14" font-weight="700" fill="#1565c0">Layer 1 · Offline</text>
  <text x="55" y="124" font-size="10" fill="#1565c0">Question: was the knowledge base prepared correctly?</text>

  <!-- Sub-cards -->
  <rect x="55" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1"/>
  <text x="175" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">Corpus readiness</text>
  <text x="175" y="178" text-anchor="middle" font-size="10" fill="#555">parse pass-rate · CER/WER</text>
  <text x="175" y="193" text-anchor="middle" font-size="10" fill="#555">TEDS · metadata coverage</text>
  <text x="175" y="208" text-anchor="middle" font-size="10" fill="#555">freshness · dedup</text>

  <rect x="305" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1"/>
  <text x="425" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">Chunking</text>
  <text x="425" y="178" text-anchor="middle" font-size="10" fill="#555">answer-span containment</text>
  <text x="425" y="193" text-anchor="middle" font-size="10" fill="#555">boundary break-rate</text>
  <text x="425" y="208" text-anchor="middle" font-size="10" fill="#555">overlap redundancy</text>

  <rect x="555" y="140" width="240" height="80" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1"/>
  <text x="675" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">Embedding · Index</text>
  <text x="675" y="178" text-anchor="middle" font-size="10" fill="#555">domain nDCG@10</text>
  <text x="675" y="193" text-anchor="middle" font-size="10" fill="#555">ANN recall vs. flat</text>
  <text x="675" y="208" text-anchor="middle" font-size="10" fill="#555">drift baseline</text>

  <rect x="805" y="140" width="320" height="80" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1"/>
  <text x="965" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">Enrichment (NER · EL · tags)</text>
  <text x="965" y="178" text-anchor="middle" font-size="10" fill="#555">EL F1 · NIL handling · alias coverage</text>
  <text x="965" y="193" text-anchor="middle" font-size="10" fill="#555">hierarchical F1 · orphan-tag rate</text>
  <text x="965" y="208" text-anchor="middle" font-size="10" fill="#555">schema validity at publish time</text>

  <!-- Arrow down to Layer 2 -->
  <line x1="590" y1="244" x2="590" y2="280" stroke="#555" stroke-width="1.6" marker-end="url(#arrLayer)"/>
  <text x="700" y="265" font-size="10" fill="#888" font-style="italic">sets the recall ceiling for everything below</text>

  <!-- =============== Layer 2: Online =============== -->
  <rect x="30" y="290" width="1120" height="160" rx="12" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadowL)"/>
  <text x="55" y="316" font-size="14" font-weight="700" fill="#e65100">Layer 2 · Online (per query)</text>
  <text x="55" y="334" font-size="10" fill="#e65100">Question: was the right evidence found and used for this query?</text>

  <rect x="55" y="350" width="240" height="80" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1"/>
  <text x="175" y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Query understanding</text>
  <text x="175" y="388" text-anchor="middle" font-size="10" fill="#555">rewrite gain/loss</text>
  <text x="175" y="403" text-anchor="middle" font-size="10" fill="#555">routing accuracy</text>
  <text x="175" y="418" text-anchor="middle" font-size="10" fill="#555">decomposition coverage</text>

  <rect x="305" y="350" width="240" height="80" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1"/>
  <text x="425" y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Retrieval</text>
  <text x="425" y="388" text-anchor="middle" font-size="10" fill="#555">Recall@k · MRR · nDCG · MAP</text>
  <text x="425" y="403" text-anchor="middle" font-size="10" fill="#555">context precision/recall</text>
  <text x="425" y="418" text-anchor="middle" font-size="10" fill="#555">hybrid lift over each lane</text>

  <rect x="555" y="350" width="240" height="80" rx="8" fill="#ffebee" stroke="#c62828" stroke-width="1.6"/>
  <text x="675" y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#c62828">Filtering (hot zone)</text>
  <text x="675" y="388" text-anchor="middle" font-size="10" fill="#c62828">filter false-exclusion rate</text>
  <text x="675" y="403" text-anchor="middle" font-size="10" fill="#c62828">predicate precision/recall</text>
  <text x="675" y="418" text-anchor="middle" font-size="10" fill="#c62828">shadow-retrieval Δ</text>

  <rect x="805" y="350" width="320" height="80" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1"/>
  <text x="965" y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Reranking · Context assembly</text>
  <text x="965" y="388" text-anchor="middle" font-size="10" fill="#555">ΔnDCG · ΔMRR over no-rerank</text>
  <text x="965" y="403" text-anchor="middle" font-size="10" fill="#555">context utilization · lost-in-middle</text>
  <text x="965" y="418" text-anchor="middle" font-size="10" fill="#555">distractor robustness (RGB)</text>

  <!-- Arrow down to Layer 3 -->
  <line x1="590" y1="454" x2="590" y2="490" stroke="#555" stroke-width="1.6" marker-end="url(#arrLayer)"/>
  <text x="700" y="475" font-size="10" fill="#888" font-style="italic">feeds verified context into generation</text>

  <!-- =============== Layer 3: Post-gen =============== -->
  <rect x="30" y="500" width="1120" height="135" rx="12" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadowL)"/>
  <text x="55" y="526" font-size="14" font-weight="700" fill="#2e7d32">Layer 3 · Post-generation &amp; production telemetry</text>
  <text x="55" y="544" font-size="10" fill="#2e7d32">Question: is the answer faithful, verifiable, and safe to ship — and is it still that way next week?</text>

  <rect x="55" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1"/>
  <text x="175" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Faithfulness</text>
  <text x="175" y="595" text-anchor="middle" font-size="10" fill="#555">RAGAS · HHEM · FActScore</text>
  <text x="175" y="610" text-anchor="middle" font-size="10" fill="#555">FaithJudge · self-consistency</text>

  <rect x="305" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1"/>
  <text x="425" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Citations &amp; structure</text>
  <text x="425" y="595" text-anchor="middle" font-size="10" fill="#555">citation precision/recall</text>
  <text x="425" y="610" text-anchor="middle" font-size="10" fill="#555">schema validity · vocab conformance</text>

  <rect x="555" y="558" width="240" height="68" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1"/>
  <text x="675" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Implicit + explicit signal</text>
  <text x="675" y="595" text-anchor="middle" font-size="10" fill="#555">regen rate · dwell · CTR on cites</text>
  <text x="675" y="610" text-anchor="middle" font-size="10" fill="#555">thumbs · star · inline edits</text>

  <rect x="805" y="558" width="320" height="68" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1"/>
  <text x="965" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Drift · cost · latency · HITL</text>
  <text x="965" y="595" text-anchor="middle" font-size="10" fill="#555">query/embedding drift · p95 latency · $/query</text>
  <text x="965" y="610" text-anchor="middle" font-size="10" fill="#555">shadow eval · low-confidence review queue</text>
</svg>
