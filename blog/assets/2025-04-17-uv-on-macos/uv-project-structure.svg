<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Inputs and derived state in a uv project</title><desc id="desc">Committed project metadata, source, Python request, and uv lock are separated from the derived local .venv and cache. pyproject declarations feed the lock; the lock and Python selection feed the environment.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#94a3b8"/></marker></defs>
  <rect width="1200" height="620" rx="28" fill="#0f172a"/>
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="sans-serif" font-size="30" font-weight="700">Commit intent and resolution; derive the environment</text>
  <g font-family="sans-serif" text-anchor="middle">
    <text x="280" y="125" fill="#93c5fd" font-size="18" font-weight="700">COMMITTED INPUTS</text>
    <rect x="70" y="150" width="420" height="100" rx="18" fill="#1e3a8a"/><text x="280" y="190" fill="#bfdbfe" font-size="21" font-weight="700">pyproject.toml</text><text x="280" y="220" fill="#93c5fd" font-size="14">metadata • requirements • groups • tool config</text>
    <rect x="70" y="280" width="200" height="100" rx="18" fill="#3b176f"/><text x="170" y="320" fill="#ddd6fe" font-size="19" font-weight="700">source + tests</text><text x="170" y="350" fill="#c4b5fd" font-size="14">project behavior</text>
    <rect x="290" y="280" width="200" height="100" rx="18" fill="#78350f"/><text x="390" y="320" fill="#fde68a" font-size="19" font-weight="700">.python-version</text><text x="390" y="350" fill="#fcd34d" font-size="14">interpreter request</text>
    <path d="M500 200 H575" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)"/>
    <rect x="585" y="150" width="260" height="100" rx="18" fill="#064e3b"/><text x="715" y="190" fill="#99f6e4" font-size="21" font-weight="700">uv.lock</text><text x="715" y="220" fill="#5eead4" font-size="14">resolved multi-platform graph</text>

    <text x="935" y="125" fill="#67e8f9" font-size="18" font-weight="700">DERIVED LOCALLY</text>
    <path d="M855 200 H900" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)"/>
    <path d="M390 380 V430 H930 V270" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#a)"/>
    <rect x="910" y="150" width="220" height="130" rx="18" fill="#164e63"/><text x="1020" y="195" fill="#a5f3fc" font-size="21" font-weight="700">.venv</text><text x="1020" y="226" fill="#67e8f9" font-size="14">installed subset</text><text x="1020" y="252" fill="#67e8f9" font-size="14">OS + architecture specific</text>
    <rect x="805" y="355" width="325" height="100" rx="18" fill="#1e293b"/><text x="967" y="395" fill="#e2e8f0" font-size="20" font-weight="700">uv cache</text><text x="967" y="425" fill="#94a3b8" font-size="14">reusable downloads and builds</text>
    <rect x="245" y="510" width="710" height="65" rx="16" fill="#450a0a"/><text x="600" y="550" fill="#fecaca" font-size="17" font-weight="700">Neither .venv nor cache belongs in version control.</text>
  </g>
</svg>
