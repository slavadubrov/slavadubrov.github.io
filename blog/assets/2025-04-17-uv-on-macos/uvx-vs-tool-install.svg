<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 590" role="img" aria-labelledby="title desc">
  <title id="title">Choosing uv run, uvx, or uv tool install</title><desc id="desc">Three columns route project-coupled tools to uv run, ad hoc isolated tools to uvx, and executables that must persist on PATH to uv tool install.</desc>
  <rect width="1200" height="590" rx="28" fill="#0f172a"/>
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="sans-serif" font-size="30" font-weight="700">Choose a tool environment by what it must see</text>
  <g font-family="sans-serif" text-anchor="middle">
    <g transform="translate(55 135)"><rect width="340" height="340" rx="22" fill="#172554" stroke="#60a5fa" stroke-width="2"/><text x="170" y="52" fill="#dbeafe" font-size="23" font-weight="700">uv run</text><text x="170" y="92" fill="#93c5fd" font-size="17">project-coupled</text><text x="170" y="145" fill="#e2e8f0" font-size="15">imports project code</text><text x="170" y="178" fill="#e2e8f0" font-size="15">uses locked groups and plugins</text><text x="170" y="211" fill="#e2e8f0" font-size="15">lifecycle follows the repository</text><rect x="35" y="260" width="270" height="50" rx="12" fill="#1e3a8a"/><text x="170" y="291" fill="#bfdbfe" font-size="15">uv run --group test pytest</text></g>
    <g transform="translate(430 135)"><rect width="340" height="340" rx="22" fill="#2e1065"/><text x="170" y="52" fill="#ddd6fe" font-size="23" font-weight="700">uvx</text><text x="170" y="92" fill="#c4b5fd" font-size="17">ad hoc + isolated</text><text x="170" y="145" fill="#e2e8f0" font-size="15">does not see project imports</text><text x="170" y="178" fill="#e2e8f0" font-size="15">environment lives in cache</text><text x="170" y="211" fill="#e2e8f0" font-size="15">pin version for repeatability</text><rect x="35" y="260" width="270" height="50" rx="12" fill="#3b176f"/><text x="170" y="291" fill="#ddd6fe" font-size="15">uvx ruff@0.12.0 check .</text></g>
    <g transform="translate(805 135)"><rect width="340" height="340" rx="22" fill="#064e3b"/><text x="170" y="52" fill="#99f6e4" font-size="23" font-weight="700">uv tool install</text><text x="170" y="92" fill="#5eead4" font-size="17">persistent + on PATH</text><text x="170" y="145" fill="#e2e8f0" font-size="15">dedicated tool environment</text><text x="170" y="178" fill="#e2e8f0" font-size="15">available to other programs</text><text x="170" y="211" fill="#e2e8f0" font-size="15">explicit upgrade lifecycle</text><rect x="35" y="260" width="270" height="50" rx="12" fill="#065f46"/><text x="170" y="291" fill="#a7f3d0" font-size="15">uv tool install 'ruff==0.12.0'</text></g>
    <rect x="245" y="515" width="710" height="42" rx="14" fill="#1e293b"/><text x="600" y="542" fill="#cbd5e1" font-size="16">Isolation is a feature; choose project visibility intentionally.</text>
  </g>
</svg>
