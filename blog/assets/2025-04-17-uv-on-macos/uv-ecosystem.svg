<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Four uv workflow boundaries</title><desc id="desc">Managed Python, projects, scripts, and CLI tools are four separate uv-managed lifecycles. Host libraries and applications remain outside uv under a system package manager.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="650" rx="28" fill="#0f172a"/>
  <text x="600" y="64" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">One executable, separate lifecycles</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(70 140)"><rect width="500" height="180" rx="20" fill="#1d4ed8"/><text x="30" y="47" fill="#93c5fd" font-size="23" font-weight="700">Managed Python</text><text x="30" y="86" fill="#93c5fd" font-size="17">uv python install / pin / list</text><text x="30" y="123" fill="#93c5fd" font-size="15">interpreter distributions in the uv data directory</text><text x="30" y="151" fill="#93c5fd" font-size="15">discoverable alongside external interpreters</text></g>
    <g transform="translate(630 140)"><rect width="500" height="180" rx="20" fill="#5b21b6"/><text x="30" y="47" fill="#93c5fd" font-size="23" font-weight="700">Project</text><text x="30" y="86" fill="#93c5fd" font-size="17">pyproject.toml + uv.lock → .venv</text><text x="30" y="123" fill="#c4b5fd" font-size="15">shared declarations and resolution</text><text x="30" y="151" fill="#c4b5fd" font-size="15">disposable installed environment</text></g>
    <g transform="translate(70 365)"><rect width="500" height="180" rx="20" fill="#9a3412"/><text x="30" y="47" fill="#fdba74" font-size="23" font-weight="700">PEP 723 script</text><text x="30" y="86" fill="#fdba74" font-size="17">inline metadata + optional adjacent lock</text><text x="30" y="123" fill="#fdba74" font-size="15">one-file release unit</text><text x="30" y="151" fill="#fdba74" font-size="15">isolated cached execution environment</text></g>
    <g transform="translate(630 365)"><rect width="500" height="180" rx="20" fill="#166534"/><text x="30" y="47" fill="#93c5fd" font-size="23" font-weight="700">CLI tool</text><text x="30" y="86" fill="#93c5fd" font-size="17">uvx cache or persistent tool environment</text><text x="30" y="123" fill="#93c5fd" font-size="15">isolated from project imports</text><text x="30" y="151" fill="#93c5fd" font-size="15">PATH exposure only when intentionally installed</text></g>
    <rect x="250" y="585" width="700" height="42" rx="14" fill="#1e293b"/><text x="600" y="612" text-anchor="middle" fill="#cbd5e1" font-size="16">Homebrew or macOS still owns host applications and native libraries.</text>
  </g>
</svg>
