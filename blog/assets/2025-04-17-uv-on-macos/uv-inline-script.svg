<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">Anatomy of a PEP 723 script</title><desc id="desc">A Python file contains a PEP 723 comment block with a Python requirement and dependencies, followed by ordinary code. uv run resolves an isolated cached environment, while an optional adjacent lock preserves an exact resolution.</desc>
  <rect width="1200" height="650" rx="28" fill="#0f172a"/>
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="sans-serif" font-size="30" font-weight="700">One file can declare its own runtime boundary</text>
  <g font-family="monospace">
    <rect x="70" y="120" width="660" height="430" rx="20" fill="#111827" stroke="#334155" stroke-width="2"/>
    <text x="105" y="165" fill="#64748b" font-size="16">fetch.py</text>
    <text x="105" y="215" fill="#c4b5fd" font-size="18"># /// script</text>
    <text x="105" y="250" fill="#93c5fd" font-size="18"># requires-python = "&gt;=3.12"</text>
    <text x="105" y="285" fill="#fcd34d" font-size="18"># dependencies = [</text>
    <text x="135" y="320" fill="#fcd34d" font-size="18"># "httpx&gt;=0.27,&lt;1",</text>
    <text x="105" y="355" fill="#fcd34d" font-size="18"># ]</text>
    <text x="105" y="390" fill="#c4b5fd" font-size="18"># ///</text>
    <text x="105" y="445" fill="#e2e8f0" font-size="18">import httpx</text>
    <text x="105" y="492" fill="#e2e8f0" font-size="18">response = httpx.get(...)</text>
  </g>
  <g font-family="sans-serif">
    <rect x="790" y="135" width="340" height="100" rx="18" fill="#3b176f"/><text x="820" y="178" fill="#ddd6fe" font-size="19" font-weight="700">Inline metadata</text><text x="820" y="207" fill="#c4b5fd" font-size="14">runner reads the comment block</text>
    <rect x="790" y="270" width="340" height="100" rx="18" fill="#164e63"/><text x="820" y="313" fill="#a5f3fc" font-size="19" font-weight="700">uv run fetch.py</text><text x="820" y="342" fill="#67e8f9" font-size="14">isolated environment in cache</text>
    <rect x="790" y="405" width="340" height="100" rx="18" fill="#064e3b"/><text x="820" y="448" fill="#99f6e4" font-size="19" font-weight="700">fetch.py.lock</text><text x="820" y="477" fill="#5eead4" font-size="14">optional exact adjacent resolution</text>
    <rect x="235" y="580" width="730" height="42" rx="14" fill="#1e293b"/><text x="600" y="607" text-anchor="middle" fill="#cbd5e1" font-size="16">Plain python ignores the metadata; a compatible runner owns execution.</text>
  </g>
</svg>
