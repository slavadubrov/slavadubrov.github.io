<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="Three levels of agent evaluation with their metrics" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Three levels of agent evaluation with their metrics</title>
  <defs>
    <marker id="arrLvl" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#334155"/>
    </marker>
    <filter id="shadowLvl" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <text y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a" x="590">Three Levels of Agent Evaluation</text>
  <text y="54" text-anchor="middle" font-size="12" fill="#334155" x="590">End-to-end tells you WHAT went wrong · trajectory tells you WHERE · component tells you WHY</text>

  <!-- Level 1: end-to-end -->
  <rect x="30" y="80" width="1120" height="150" rx="12" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadowLvl)"/>
  <text y="106" font-size="14" font-weight="700" fill="#166534" x="55">Level 1 · End-to-end (black box)</text>
  <text y="124" font-size="10" fill="#166534" x="55">Question: did the task succeed?</text>

  <rect x="55" y="140" width="340" height="72" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1"/>
  <text y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="225">Task completion</text>
  <text y="180" text-anchor="middle" font-size="10" fill="#334155" x="225">LLM-judged goal alignment, referenceless</text>
  <text y="195" text-anchor="middle" font-size="10" fill="#334155" x="225">usable online — no golden output needed</text>

  <rect x="415" y="140" width="340" height="72" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1"/>
  <text y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="585">Outcome / state grading</text>
  <text y="180" text-anchor="middle" font-size="10" fill="#334155" x="585">compare final environment state to goal state</text>
  <text y="195" text-anchor="middle" font-size="10" fill="#334155" x="585">robust to creative alternative paths (τ-bench)</text>

  <rect x="775" y="140" width="340" height="72" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1"/>
  <text y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#166534" x="945">Reliability: pass^k</text>
  <text y="180" text-anchor="middle" font-size="10" fill="#334155" x="945">all k of k attempts succeed</text>
  <text y="195" text-anchor="middle" font-size="10" fill="#334155" x="945">90% pass@1 ≈ 57% consistency at k=8</text>

  <line x1="590" y1="234" x2="590" y2="268" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrLvl)"/>
  <text y="256" font-size="10" fill="#64748b" font-style="italic" x="700">task failed — but where?</text>

  <!-- Level 2: trajectory -->
  <rect x="30" y="275" width="1120" height="150" rx="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadowLvl)"/>
  <text y="301" font-size="14" font-weight="700" fill="#5b21b6" x="55">Level 2 · Trajectory (glass box)</text>
  <text y="319" font-size="10" fill="#5b21b6" x="55">Question: was the path sound and efficient?</text>

  <rect x="55" y="335" width="255" height="72" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1"/>
  <text y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6" x="182">Tool correctness</text>
  <text y="375" text-anchor="middle" font-size="10" fill="#334155" x="182">deterministic, no judge needed</text>
  <text y="390" text-anchor="middle" font-size="10" fill="#334155" x="182">exact / in-order / any-order match</text>

  <rect x="330" y="335" width="255" height="72" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1"/>
  <text y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6" x="457">Argument correctness</text>
  <text y="375" text-anchor="middle" font-size="10" fill="#334155" x="457">right tool, wrong parameters</text>
  <text y="390" text-anchor="middle" font-size="10" fill="#334155" x="457">% of correctly filled key-value pairs</text>

  <rect x="605" y="335" width="255" height="72" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1"/>
  <text y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6" x="732">Efficiency &amp; loops</text>
  <text y="375" text-anchor="middle" font-size="10" fill="#334155" x="732">redundant calls · path convergence</text>
  <text y="390" text-anchor="middle" font-size="10" fill="#334155" x="732">repeated identical calls = dead end</text>

  <rect x="880" y="335" width="235" height="72" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1"/>
  <text y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6" x="997">Plan quality / adherence</text>
  <text y="375" text-anchor="middle" font-size="10" fill="#334155" x="997">good plan, drifting execution</text>
  <text y="390" text-anchor="middle" font-size="10" fill="#334155" x="997">multi-turn fidelity across turns</text>

  <line x1="590" y1="429" x2="590" y2="463" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrLvl)"/>
  <text y="451" font-size="10" fill="#64748b" font-style="italic" x="700">path broke at step 3 — but why?</text>

  <!-- Level 3: component -->
  <rect x="30" y="470" width="1120" height="120" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadowLvl)"/>
  <text y="496" font-size="14" font-weight="700" fill="#9a3412" x="55">Level 3 · Component (white box)</text>
  <text y="514" font-size="10" fill="#9a3412" x="55">Question: which decision, tool, retriever, or sub-agent broke?</text>

  <rect x="55" y="525" width="340" height="50" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1"/>
  <text y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="225">Per-span metrics</text>
  <text y="563" text-anchor="middle" font-size="10" fill="#334155" x="225">attach scores to individual tool / retrieval spans</text>

  <rect x="415" y="525" width="340" height="50" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1"/>
  <text y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="585">Tool-output interpretation</text>
  <text y="563" text-anchor="middle" font-size="10" fill="#334155" x="585">valid response, wrong reading — corrupts downstream</text>

  <rect x="775" y="525" width="340" height="50" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1"/>
  <text y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412" x="945">Failure attribution</text>
  <text y="563" text-anchor="middle" font-size="10" fill="#334155" x="945">visible failure is usually downstream of the real bug</text>
</svg>
