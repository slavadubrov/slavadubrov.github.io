<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 640" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="The trace-to-eval flywheel" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">The trace-to-eval flywheel</title>
  <defs>
    <marker id="arrFly" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrFlyBack" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#16a34a"/>
    </marker>
    <filter id="shadowFly" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <text y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a" x="590">The Trace-to-Eval Flywheel</text>
  <text y="57" text-anchor="middle" font-size="12" fill="#334155" x="590">Each diagnosed production failure becomes a trace, a label, a dataset row, and a scorer that gates CI</text>

  <!-- Stage 1: Production agent -->
  <rect x="40" y="110" width="200" height="110" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.6" filter="url(#shadowFly)"/>
  <text y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8" x="140">1 · Production agent</text>
  <text y="164" text-anchor="middle" font-size="10" fill="#334155" x="140">instrumented with OTel</text>
  <text y="179" text-anchor="middle" font-size="10" fill="#334155" x="140">GenAI semconv spans:</text>
  <text y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="140">invoke_agent → chat → execute_tool</text>

  <line x1="240" y1="165" x2="295" y2="165" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFly)"/>

  <!-- Stage 2: Trace store -->
  <rect x="300" y="110" width="200" height="110" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.6" filter="url(#shadowFly)"/>
  <text y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8" x="400">2 · Trace store</text>
  <text y="164" text-anchor="middle" font-size="10" fill="#334155" x="400">Langfuse / Phoenix /</text>
  <text y="179" text-anchor="middle" font-size="10" fill="#334155" x="400">LangSmith / Braintrust</text>
  <text y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="400">(or a JSONL file to start)</text>

  <line x1="500" y1="165" x2="555" y2="165" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFly)"/>

  <!-- Stage 3: Mine failures -->
  <rect x="560" y="110" width="200" height="110" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="1.6" filter="url(#shadowFly)"/>
  <text y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b" x="660">3 · Mine failures</text>
  <text y="164" text-anchor="middle" font-size="10" fill="#334155" x="660">low scores · user complaints</text>
  <text y="179" text-anchor="middle" font-size="10" fill="#334155" x="660">deterministic rules · judges</text>
  <text y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="660">open coding: read 30–50 traces</text>

  <line x1="760" y1="165" x2="815" y2="165" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFly)"/>

  <!-- Stage 4: Cluster + label -->
  <rect x="820" y="110" width="200" height="110" rx="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.6" filter="url(#shadowFly)"/>
  <text y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6" x="920">4 · Cluster + label</text>
  <text y="164" text-anchor="middle" font-size="10" fill="#334155" x="920">axial coding into 5–6 named,</text>
  <text y="179" text-anchor="middle" font-size="10" fill="#334155" x="920">specific failure modes</text>
  <text y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="920">"date formatting error", not "temporal issues"</text>

  <line x1="920" y1="220" x2="920" y2="285" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFly)"/>

  <!-- Stage 5: Dedupe / goldens -->
  <rect x="820" y="290" width="200" height="110" rx="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.6" filter="url(#shadowFly)"/>
  <text y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6" x="920">5 · Dedupe</text>
  <text y="344" text-anchor="middle" font-size="10" fill="#334155" x="920">one representative golden</text>
  <text y="359" text-anchor="middle" font-size="10" fill="#334155" x="920">per cluster, span IDs kept</text>
  <text y="376" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="920">in metadata for traceability</text>

  <line x1="820" y1="345" x2="765" y2="345" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFly)"/>

  <!-- Stage 6: Versioned dataset -->
  <rect x="560" y="290" width="200" height="110" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="1.6" filter="url(#shadowFly)"/>
  <text y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412" x="660">6 · Versioned dataset</text>
  <text y="344" text-anchor="middle" font-size="10" fill="#334155" x="660">goldens-v1.json · v2 · v3 …</text>
  <text y="359" text-anchor="middle" font-size="10" fill="#334155" x="660">expected tools + criteria</text>
  <text y="376" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="660">pinned for reproducible runs</text>

  <line x1="560" y1="345" x2="505" y2="345" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFly)"/>

  <!-- Stage 7: CI gate -->
  <rect x="300" y="290" width="200" height="110" rx="12" fill="#f0fdf4" stroke="#166534" stroke-width="1.6" filter="url(#shadowFly)"/>
  <text y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#166534" x="400">7 · CI gate</text>
  <text y="344" text-anchor="middle" font-size="10" fill="#334155" x="400">deepeval test run on every PR</text>
  <text y="359" text-anchor="middle" font-size="10" fill="#334155" x="400">failing metric → failing build</text>
  <text y="376" text-anchor="middle" font-size="10" font-style="italic" fill="#334155" x="400">regressions blocked before deploy</text>

  <!-- feedback arrow back to production -->
  <path d="M 300 345 L 140 345 L 140 225" fill="none" stroke="#16a34a" stroke-width="2.2" marker-end="url(#arrFlyBack)"/>
  <text y="290" font-size="10.5" font-weight="700" fill="#166534" x="148">fix ships safely;</text>
  <text y="305" font-size="10.5" font-weight="700" fill="#166534" x="148">new traffic feeds</text>
  <text y="320" font-size="10.5" font-weight="700" fill="#166534" x="148">the next cycle</text>

  <!-- Online lane note -->
  <rect x="40" y="450" width="1100" height="150" rx="12" fill="#ffffff" stroke="#7c3aed" stroke-width="1.4" filter="url(#shadowFly)"/>
  <text y="480" font-size="13" font-weight="700" fill="#5b21b6" x="65">Running alongside the loop: online evals</text>
  <text y="503" font-size="11" fill="#334155" x="65">• Sample live traffic, score async with referenceless metrics (task completion, custom judges) — zero added latency</text>
  <text y="524" font-size="11" fill="#334155" x="65">• Alert when the score's lower confidence bound crosses a threshold — new failure patterns enter the flywheel at stage 3</text>
  <text y="545" font-size="11" fill="#334155" x="65">• Keep guardrails separate: inline, deterministic, blocking (ms) — evals measure, guardrails protect</text>
  <text y="578" font-size="10.5" font-style="italic" fill="#64748b" x="65">The payoff: production failures become regression tests within days, and model upgrades are validated in days, not weeks.</text>
</svg>
