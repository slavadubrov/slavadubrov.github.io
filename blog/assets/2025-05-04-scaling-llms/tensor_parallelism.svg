<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc">
  <title id="title">Tensor-parallel layer partition</title><desc id="desc">One layer input is distributed to four weight partitions. Each rank computes a partial result, and a collective combines the pieces before the next layer.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#94a3b8"/></marker></defs>
  <rect width="1200" height="540" rx="28" fill="#0f172a"/>
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="sans-serif" font-size="30" font-weight="700">Partition matrix work inside each layer</text>
  <g font-family="sans-serif" text-anchor="middle">
    <rect x="450" y="105" width="300" height="70" rx="16" fill="#1e293b"/><text x="600" y="148" fill="#e2e8f0" font-size="19" font-weight="700">Layer input X</text>
    <path d="M600 175 V205 H180 M600 205 H1020 M180 205 V235 M460 205 V235 M740 205 V235 M1020 205 V235" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#a)"/>
    <g transform="translate(70 245)"><rect width="220" height="110" rx="17" fill="#1e3a8a"/><text x="110" y="44" fill="#bfdbfe" font-size="18" font-weight="700">Weight shard 0</text><text x="110" y="78" fill="#93c5fd" font-size="14">partial output 0</text></g>
    <g transform="translate(350 245)"><rect width="220" height="110" rx="17" fill="#3b176f"/><text x="110" y="44" fill="#ddd6fe" font-size="18" font-weight="700">Weight shard 1</text><text x="110" y="78" fill="#c4b5fd" font-size="14">partial output 1</text></g>
    <g transform="translate(630 245)"><rect width="220" height="110" rx="17" fill="#78350f"/><text x="110" y="44" fill="#fde68a" font-size="18" font-weight="700">Weight shard 2</text><text x="110" y="78" fill="#fcd34d" font-size="14">partial output 2</text></g>
    <g transform="translate(910 245)"><rect width="220" height="110" rx="17" fill="#064e3b"/><text x="110" y="44" fill="#99f6e4" font-size="18" font-weight="700">Weight shard 3</text><text x="110" y="78" fill="#5eead4" font-size="14">partial output 3</text></g>
    <path d="M180 365 V400 H1020 V365 M460 365 V400 M740 365 V400" stroke="#94a3b8" stroke-width="3" fill="none"/>
    <rect x="350" y="410" width="500" height="80" rx="17" fill="#164e63"/><text x="600" y="442" fill="#a5f3fc" font-size="19" font-weight="700">Layer collective</text><text x="600" y="470" fill="#67e8f9" font-size="14">combine partials before dependent computation</text>
  </g>
</svg>
