<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc">
  <title id="title">Context-parallel attention exchange</title><desc id="desc">A long sequence is partitioned across four ranks. Each rank stores a local token shard while attention communication exchanges key and value information needed for full-context semantics. Model weights remain replicated across the context group.</desc>
  <rect width="1200" height="540" rx="28" fill="#0f172a"/>
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="sans-serif" font-size="30" font-weight="700">Partition the sequence, exchange attention state</text>
  <g font-family="sans-serif" text-anchor="middle">
    <rect x="115" y="120" width="970" height="64" rx="16" fill="#1e293b"/><text x="600" y="160" fill="#e2e8f0" font-size="18" font-weight="700">Full sequence S = S0 + S1 + S2 + S3</text>
    <g transform="translate(55 240)"><rect width="245" height="150" rx="19" fill="#1e3a8a"/><text x="122" y="42" fill="#bfdbfe" font-size="19" font-weight="700">Rank 0</text><text x="122" y="80" fill="#dbeafe" font-size="16">tokens S0</text><text x="122" y="112" fill="#93c5fd" font-size="14">replicated weights</text></g>
    <g transform="translate(335 240)"><rect width="245" height="150" rx="19" fill="#3b176f"/><text x="122" y="42" fill="#ddd6fe" font-size="19" font-weight="700">Rank 1</text><text x="122" y="80" fill="#ede9fe" font-size="16">tokens S1</text><text x="122" y="112" fill="#c4b5fd" font-size="14">replicated weights</text></g>
    <g transform="translate(615 240)"><rect width="245" height="150" rx="19" fill="#78350f"/><text x="122" y="42" fill="#fde68a" font-size="19" font-weight="700">Rank 2</text><text x="122" y="80" fill="#fef3c7" font-size="16">tokens S2</text><text x="122" y="112" fill="#fcd34d" font-size="14">replicated weights</text></g>
    <g transform="translate(895 240)"><rect width="245" height="150" rx="19" fill="#064e3b"/><text x="122" y="42" fill="#99f6e4" font-size="19" font-weight="700">Rank 3</text><text x="122" y="80" fill="#ccfbf1" font-size="16">tokens S3</text><text x="122" y="112" fill="#5eead4" font-size="14">replicated weights</text></g>
    <path d="M175 415 H1017" stroke="#22d3ee" stroke-width="4" stroke-dasharray="12 9"/><text x="600" y="455" fill="#67e8f9" font-size="17" font-weight="700">attention exchange: ring, all-gather, all-to-all, or hierarchy</text>
    <text x="600" y="495" fill="#94a3b8" font-size="15">Activation relief is traded for communication across the context group.</text>
  </g>
</svg>
