<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 570" role="img" aria-labelledby="title desc">
  <title id="title">Fully sharded data parallel execution</title><desc id="desc">Persistent parameter, gradient, and optimizer shards sit on four ranks. A layer group is all-gathered transiently for computation, then gradients are reduce-scattered back to owners.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#94a3b8"/></marker></defs>
  <rect width="1200" height="570" rx="28" fill="#0f172a"/>
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="sans-serif" font-size="30" font-weight="700">Shard persistent state, gather layer groups transiently</text>
  <g font-family="sans-serif" text-anchor="middle">
    <g transform="translate(70 135)"><rect width="220" height="175" rx="18" fill="#172554"/><text x="110" y="40" fill="#dbeafe" font-size="19" font-weight="700">Rank 0</text><text x="110" y="82" fill="#93c5fd" font-size="15">parameter shard 0</text><text x="110" y="112" fill="#c4b5fd" font-size="15">gradient shard 0</text><text x="110" y="142" fill="#5eead4" font-size="15">optimizer shard 0</text></g>
    <g transform="translate(350 135)"><rect width="220" height="175" rx="18" fill="#172554"/><text x="110" y="40" fill="#dbeafe" font-size="19" font-weight="700">Rank 1</text><text x="110" y="82" fill="#93c5fd" font-size="15">parameter shard 1</text><text x="110" y="112" fill="#c4b5fd" font-size="15">gradient shard 1</text><text x="110" y="142" fill="#5eead4" font-size="15">optimizer shard 1</text></g>
    <g transform="translate(630 135)"><rect width="220" height="175" rx="18" fill="#172554"/><text x="110" y="40" fill="#dbeafe" font-size="19" font-weight="700">Rank 2</text><text x="110" y="82" fill="#93c5fd" font-size="15">parameter shard 2</text><text x="110" y="112" fill="#c4b5fd" font-size="15">gradient shard 2</text><text x="110" y="142" fill="#5eead4" font-size="15">optimizer shard 2</text></g>
    <g transform="translate(910 135)"><rect width="220" height="175" rx="18" fill="#172554"/><text x="110" y="40" fill="#dbeafe" font-size="19" font-weight="700">Rank 3</text><text x="110" y="82" fill="#93c5fd" font-size="15">parameter shard 3</text><text x="110" y="112" fill="#c4b5fd" font-size="15">gradient shard 3</text><text x="110" y="142" fill="#5eead4" font-size="15">optimizer shard 3</text></g>
    <path d="M180 320 V365 H1020 V320 M460 320 V365 M740 320 V365" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#a)"/>
    <rect x="245" y="380" width="710" height="115" rx="19" fill="#3b176f"/><text x="600" y="420" fill="#ddd6fe" font-size="20" font-weight="700">Layer communication group</text><text x="600" y="452" fill="#c4b5fd" font-size="15">all-gather parameters → compute → free unsharded view</text><text x="600" y="480" fill="#c4b5fd" font-size="15">backward → reduce-scatter gradients to shard owners</text>
    <text x="600" y="540" fill="#94a3b8" font-size="15">Grouping controls peak memory, collective size, and overlap opportunity.</text>
  </g>
</svg>
