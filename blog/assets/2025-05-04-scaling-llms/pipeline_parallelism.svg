<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 570" role="img" aria-labelledby="title desc">
  <title id="title">Pipeline-parallel stages and micro-batches</title><desc id="desc">Four stages hold different layer groups. Three micro-batches move diagonally through time, leaving startup and drain bubbles and exposing the need to balance stage time.</desc>
  <rect width="1200" height="570" rx="28" fill="#0f172a"/>
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="sans-serif" font-size="30" font-weight="700">Partition depth, then schedule micro-batches</text>
  <g font-family="sans-serif">
    <text x="90" y="130" fill="#94a3b8" font-size="16">stage</text><text x="1090" y="130" fill="#94a3b8" font-size="16">time →</text>
    <g font-size="16" font-weight="700"><text x="110" y="205" fill="#bfdbfe">S0</text><text x="110" y="285" fill="#ddd6fe">S1</text><text x="110" y="365" fill="#fde68a">S2</text><text x="110" y="445" fill="#99f6e4">S3</text></g>
    <g stroke="#334155" stroke-width="1"><path d="M160 165 H1110 M160 245 H1110 M160 325 H1110 M160 405 H1110 M160 485 H1110"/></g>
    <g font-size="15" text-anchor="middle" font-weight="700">
      <g fill="#1e3a8a"><rect x="180" y="175" width="130" height="55" rx="10"/><rect x="330" y="175" width="130" height="55" rx="10"/><rect x="480" y="175" width="130" height="55" rx="10"/></g>
      <g fill="#3b176f"><rect x="330" y="255" width="130" height="55" rx="10"/><rect x="480" y="255" width="130" height="55" rx="10"/><rect x="630" y="255" width="130" height="55" rx="10"/></g>
      <g fill="#78350f"><rect x="480" y="335" width="130" height="55" rx="10"/><rect x="630" y="335" width="130" height="55" rx="10"/><rect x="780" y="335" width="130" height="55" rx="10"/></g>
      <g fill="#064e3b"><rect x="630" y="415" width="130" height="55" rx="10"/><rect x="780" y="415" width="130" height="55" rx="10"/><rect x="930" y="415" width="130" height="55" rx="10"/></g>
      <g fill="#f8fafc"><text x="245" y="208">μ0</text><text x="395" y="208">μ1</text><text x="545" y="208">μ2</text><text x="395" y="288">μ0</text><text x="545" y="288">μ1</text><text x="695" y="288">μ2</text><text x="545" y="368">μ0</text><text x="695" y="368">μ1</text><text x="845" y="368">μ2</text><text x="695" y="448">μ0</text><text x="845" y="448">μ1</text><text x="995" y="448">μ2</text></g>
    </g>
    <text x="255" y="525" fill="#fca5a5" font-size="15">startup bubble</text><text x="890" y="525" fill="#fca5a5" font-size="15">drain bubble</text><text x="575" y="548" fill="#94a3b8" font-size="15">Unequal stage time creates additional idle slots.</text>
  </g>
</svg>
