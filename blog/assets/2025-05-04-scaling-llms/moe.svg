<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 570" role="img" aria-labelledby="title desc">
  <title id="title">Expert-parallel token routing</title><desc id="desc">A router assigns a token batch to selected experts. Token representations are dispatched across ranks, experts compute with unequal loads, and outputs are combined back in token order.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#94a3b8"/></marker></defs>
  <rect width="1200" height="570" rx="28" fill="#0f172a"/>
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="sans-serif" font-size="30" font-weight="700">Route tokens to distributed experts</text>
  <g font-family="sans-serif" text-anchor="middle">
    <rect x="120" y="120" width="220" height="90" rx="18" fill="#1e293b"/><text x="230" y="158" fill="#e2e8f0" font-size="19" font-weight="700">Token batch</text><text x="230" y="186" fill="#94a3b8" font-size="14">original token order</text>
    <path d="M350 165 H425" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)"/>
    <rect x="435" y="120" width="220" height="90" rx="18" fill="#78350f"/><text x="545" y="158" fill="#fde68a" font-size="19" font-weight="700">Router</text><text x="545" y="186" fill="#fcd34d" font-size="14">scores + top-k + capacity</text>
    <path d="M665 165 H740" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)"/>
    <rect x="750" y="120" width="330" height="90" rx="18" fill="#164e63"/><text x="915" y="158" fill="#a5f3fc" font-size="19" font-weight="700">Dispatch collective</text><text x="915" y="186" fill="#67e8f9" font-size="14">send representations to expert owners</text>
    <path d="M915 210 V250 H170 M915 250 H1030 M170 250 V285 M450 250 V285 M730 250 V285 M1030 250 V285" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#a)"/>
    <g transform="translate(60 295)"><rect width="220" height="105" rx="17" fill="#1e3a8a"/><text x="110" y="42" fill="#bfdbfe" font-size="18" font-weight="700">Expert 0</text><text x="110" y="75" fill="#93c5fd" font-size="14">rank 0 • 31 tokens</text></g>
    <g transform="translate(340 295)"><rect width="220" height="105" rx="17" fill="#3b176f"/><text x="110" y="42" fill="#ddd6fe" font-size="18" font-weight="700">Expert 1</text><text x="110" y="75" fill="#c4b5fd" font-size="14">rank 1 • 18 tokens</text></g>
    <g transform="translate(620 295)"><rect width="220" height="105" rx="17" fill="#78350f"/><text x="110" y="42" fill="#fde68a" font-size="18" font-weight="700">Expert 2</text><text x="110" y="75" fill="#fcd34d" font-size="14">rank 2 • 42 tokens</text></g>
    <g transform="translate(900 295)"><rect width="220" height="105" rx="17" fill="#064e3b"/><text x="110" y="42" fill="#99f6e4" font-size="18" font-weight="700">Expert 3</text><text x="110" y="75" fill="#5eead4" font-size="14">rank 3 • 9 tokens</text></g>
    <path d="M170 410 V445 H1030 V410 M450 410 V445 M730 410 V445" stroke="#94a3b8" stroke-width="3" fill="none"/>
    <rect x="350" y="455" width="500" height="74" rx="17" fill="#064e3b"/><text x="600" y="486" fill="#99f6e4" font-size="18" font-weight="700">Combine outputs in token order</text><text x="600" y="513" fill="#5eead4" font-size="14">load skew and all-to-all time are first-class metrics</text>
  </g>
</svg>
