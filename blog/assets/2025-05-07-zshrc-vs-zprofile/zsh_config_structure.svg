<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Zsh startup files selected by login and interactive modes</title>
  <desc id="desc">A two by two matrix shows login interactive shells reading zshenv, zprofile, zshrc, and zlogin; login non-interactive shells reading zshenv, zprofile, and zlogin; non-login interactive shells reading zshenv and zshrc; and non-login non-interactive shells reading only zshenv.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="700" rx="28" fill="#0f172a"/>
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Two flags select the startup files</text>
  <text x="600" y="98" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="17">Login and interactive are independent properties</text>
  <g font-family="Inter, system-ui, sans-serif">
    <text x="420" y="145" text-anchor="middle" fill="#93c5fd" font-size="20" font-weight="700">Interactive</text>
    <text x="900" y="145" text-anchor="middle" fill="#94a3b8" font-size="20" font-weight="700">Non-interactive</text>
    <text x="82" y="300" text-anchor="middle" fill="#c4b5fd" font-size="20" font-weight="700" transform="rotate(-90 82 300)">Login</text>
    <text x="82" y="560" text-anchor="middle" fill="#94a3b8" font-size="20" font-weight="700" transform="rotate(-90 82 560)">Non-login</text>

    <g transform="translate(155 175)"><rect width="530" height="215" rx="20" fill="#1d4ed8" stroke="#2563eb" stroke-width="2"/><text x="30" y="44" fill="#93c5fd" font-size="22" font-weight="700">Login + interactive</text><text x="30" y="83" fill="#93c5fd" font-size="17">Typical Apple Terminal tab</text><text x="30" y="132" fill="#e2e8f0" font-size="19">.zshenv → .zprofile → .zshrc → .zlogin</text><text x="30" y="172" fill="#94a3b8" font-size="15">both login and interactive configuration</text></g>
    <g transform="translate(715 175)"><rect width="410" height="215" rx="20" fill="#5b21b6"/><text x="30" y="44" fill="#93c5fd" font-size="22" font-weight="700">Login + non-interactive</text><text x="30" y="83" fill="#c4b5fd" font-size="17">zsh -lc 'command'</text><text x="30" y="132" fill="#e2e8f0" font-size="18">.zshenv → .zprofile → .zlogin</text><text x="30" y="172" fill="#94a3b8" font-size="15">no .zshrc</text></g>
    <g transform="translate(155 425)"><rect width="530" height="215" rx="20" fill="#166534"/><text x="30" y="44" fill="#93c5fd" font-size="22" font-weight="700">Non-login + interactive</text><text x="30" y="83" fill="#93c5fd" font-size="17">Nested zsh or terminal configuration</text><text x="30" y="132" fill="#e2e8f0" font-size="19">.zshenv → .zshrc</text><text x="30" y="172" fill="#94a3b8" font-size="15">no .zprofile</text></g>
    <g transform="translate(715 425)"><rect width="410" height="215" rx="20" fill="#1e293b"/><text x="30" y="44" fill="#cbd5e1" font-size="22" font-weight="700">Neither</text><text x="30" y="83" fill="#94a3b8" font-size="17">zsh -c 'command'</text><text x="30" y="132" fill="#e2e8f0" font-size="19">.zshenv</text><text x="30" y="172" fill="#94a3b8" font-size="15">keep it silent and minimal</text></g>
  </g>
</svg>
