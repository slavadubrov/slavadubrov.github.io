<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Inference gateway as a policy and routing boundary</title>
  <desc id="desc">Clients send a stable contract and release identity to a gateway. The gateway applies authentication, budgets, routing, bounded retries, cache policy, and trace propagation before selecting hosted or self-hosted routes. Every route rejoins a common evaluation gate.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#94a3b8"/></marker></defs>
  <rect width="1200" height="620" rx="28" fill="#0f172a"/>
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="sans-serif" font-size="30" font-weight="700">A gateway owns policy, not task truth</text>
  <g font-family="sans-serif" text-anchor="middle">
    <rect x="70" y="230" width="210" height="130" rx="20" fill="#1e293b"/>
    <text x="175" y="280" fill="#e2e8f0" font-size="21" font-weight="700">Application</text><text x="175" y="316" fill="#94a3b8" font-size="14">stable contract</text><text x="175" y="338" fill="#94a3b8" font-size="14">manifest identity</text>
    <path d="M290 295 H350" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)"/>
    <rect x="360" y="145" width="430" height="300" rx="24" fill="#172554" stroke="#60a5fa" stroke-width="3"/>
    <text x="575" y="192" fill="#dbeafe" font-size="24" font-weight="700">Inference gateway</text>
    <g font-size="16"><rect x="405" y="225" width="150" height="60" rx="14" fill="#1e3a8a"/><text x="480" y="261" fill="#bfdbfe">auth + quota</text><rect x="595" y="225" width="150" height="60" rx="14" fill="#3b176f"/><text x="670" y="261" fill="#ddd6fe">route + region</text><rect x="405" y="315" width="150" height="60" rx="14" fill="#78350f"/><text x="480" y="351" fill="#fde68a">retry + breaker</text><rect x="595" y="315" width="150" height="60" rx="14" fill="#164e63"/><text x="670" y="351" fill="#a5f3fc">cache + trace</text></g>
    <path d="M800 230 H855" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)"/>
    <path d="M800 335 H855" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)"/>
    <path d="M800 440 H855" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)"/>
    <rect x="865" y="185" width="265" height="90" rx="18" fill="#3b176f"/><text x="997" y="222" fill="#ddd6fe" font-size="19" font-weight="700">Hosted route A</text><text x="997" y="250" fill="#c4b5fd" font-size="14">provider + model identity</text>
    <rect x="865" y="290" width="265" height="90" rx="18" fill="#064e3b"/><text x="997" y="327" fill="#99f6e4" font-size="19" font-weight="700">Self-hosted route</text><text x="997" y="355" fill="#5eead4" font-size="14">weights + runtime identity</text>
    <rect x="865" y="395" width="265" height="90" rx="18" fill="#78350f"/><text x="997" y="432" fill="#fde68a" font-size="19" font-weight="700">Fallback route</text><text x="997" y="460" fill="#fcd34d" font-size="14">explicit behavior change</text>
    <rect x="300" y="520" width="600" height="62" rx="16" fill="#450a0a"/><text x="600" y="558" fill="#fecaca" font-size="17" font-weight="700">Evaluate every route and fallback branch against the task contract</text>
  </g>
</svg>
