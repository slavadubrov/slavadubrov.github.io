<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">RAG data path and evaluation gates</title>
  <desc id="desc">An ingestion path versions source, parsing and chunking, embeddings, and the index. A serving path authorizes and retrieves documents before context assembly and generation. Separate gates evaluate retrieval and grounded answers.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#94a3b8"/></marker></defs>
  <rect width="1200" height="650" rx="28" fill="#0f172a"/>
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="sans-serif" font-size="30" font-weight="700">Retrieval is its own versioned data product</text>
  <g font-family="sans-serif" text-anchor="middle">
    <text x="95" y="145" text-anchor="start" fill="#93c5fd" font-size="18" font-weight="700">INGESTION</text>
    <g transform="translate(85 170)"><rect width="180" height="95" rx="16" fill="#1e3a8a"/><text x="90" y="38" fill="#bfdbfe" font-size="18" font-weight="700">Source snapshot</text><text x="90" y="67" fill="#93c5fd" font-size="14">ACL + deletion state</text></g>
    <path d="M275 218 H320" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)"/>
    <g transform="translate(330 170)"><rect width="180" height="95" rx="16" fill="#3b176f"/><text x="90" y="38" fill="#ddd6fe" font-size="18" font-weight="700">Parse + chunk</text><text x="90" y="67" fill="#c4b5fd" font-size="14">versioned logic</text></g>
    <path d="M520 218 H565" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)"/>
    <g transform="translate(575 170)"><rect width="180" height="95" rx="16" fill="#78350f"/><text x="90" y="38" fill="#fde68a" font-size="18" font-weight="700">Embed</text><text x="90" y="67" fill="#fcd34d" font-size="14">model + dimensions</text></g>
    <path d="M765 218 H810" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)"/>
    <g transform="translate(820 170)"><rect width="180" height="95" rx="16" fill="#064e3b"/><text x="90" y="38" fill="#99f6e4" font-size="18" font-weight="700">Index build</text><text x="90" y="67" fill="#5eead4" font-size="14">immutable identity</text></g>

    <text x="95" y="350" text-anchor="start" fill="#5eead4" font-size="18" font-weight="700">SERVING</text>
    <g transform="translate(85 375)"><rect width="180" height="95" rx="16" fill="#1e293b"/><text x="90" y="38" fill="#e2e8f0" font-size="18" font-weight="700">Query + tenant</text><text x="90" y="67" fill="#94a3b8" font-size="14">request identity</text></g>
    <path d="M275 423 H320" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)"/>
    <g transform="translate(330 375)"><rect width="180" height="95" rx="16" fill="#164e63"/><text x="90" y="38" fill="#a5f3fc" font-size="18" font-weight="700">Authorize + retrieve</text><text x="90" y="67" fill="#67e8f9" font-size="14">filters + ranked evidence</text></g>
    <path d="M520 423 H565" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)"/>
    <g transform="translate(575 375)"><rect width="180" height="95" rx="16" fill="#3b176f"/><text x="90" y="38" fill="#ddd6fe" font-size="18" font-weight="700">Assemble context</text><text x="90" y="67" fill="#c4b5fd" font-size="14">budget + citations</text></g>
    <path d="M765 423 H810" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)"/>
    <g transform="translate(820 375)"><rect width="180" height="95" rx="16" fill="#064e3b"/><text x="90" y="38" fill="#99f6e4" font-size="18" font-weight="700">Generate</text><text x="90" y="67" fill="#5eead4" font-size="14">answer from evidence</text></g>

    <rect x="215" y="535" width="320" height="78" rx="16" fill="#172554"/><text x="375" y="567" fill="#dbeafe" font-size="18" font-weight="700">Retrieval gate</text><text x="375" y="594" fill="#93c5fd" font-size="14">recall • ranking • authorization</text>
    <rect x="665" y="535" width="320" height="78" rx="16" fill="#450a0a"/><text x="825" y="567" fill="#fecaca" font-size="18" font-weight="700">Answer gate</text><text x="825" y="594" fill="#fca5a5" font-size="14">support • citation • task success</text>
  </g>
</svg>
