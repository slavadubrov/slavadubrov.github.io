<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 610" role="img" aria-labelledby="title desc">
  <title id="title">Production traces feed an evaluation and release loop</title>
  <desc id="desc">A production request produces a privacy-controlled trace. Triage turns a reviewed failure into a labeled regression case. A candidate is compared offline, staged, and then released back to production.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#94a3b8"/></marker></defs>
  <rect width="1200" height="610" rx="28" fill="#0f172a"/>
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="sans-serif" font-size="30" font-weight="700">Traces turn incidents into release evidence</text>
  <g font-family="sans-serif" text-anchor="middle">
    <g transform="translate(50 185)"><rect width="160" height="115" rx="18" fill="#1e3a8a"/><text x="80" y="46" fill="#bfdbfe" font-size="18" font-weight="700">Production</text><text x="80" y="78" fill="#93c5fd" font-size="14">manifest + request</text></g>
    <path d="M220 242 H255" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)"/>
    <g transform="translate(265 185)"><rect width="160" height="115" rx="18" fill="#164e63"/><text x="80" y="46" fill="#a5f3fc" font-size="18" font-weight="700">Trace</text><text x="80" y="78" fill="#67e8f9" font-size="14">sample + redact</text></g>
    <path d="M435 242 H470" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)"/>
    <g transform="translate(480 185)"><rect width="160" height="115" rx="18" fill="#78350f"/><text x="80" y="46" fill="#fde68a" font-size="18" font-weight="700">Triage</text><text x="80" y="78" fill="#fcd34d" font-size="14">review failure</text></g>
    <path d="M650 242 H685" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)"/>
    <g transform="translate(695 185)"><rect width="160" height="115" rx="18" fill="#3b176f"/><text x="80" y="46" fill="#ddd6fe" font-size="18" font-weight="700">Regression</text><text x="80" y="78" fill="#c4b5fd" font-size="14">label + slice + rubric</text></g>
    <path d="M865 242 H900" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)"/>
    <g transform="translate(910 185)"><rect width="230" height="115" rx="18" fill="#064e3b"/><text x="115" y="46" fill="#99f6e4" font-size="18" font-weight="700">Candidate comparison</text><text x="115" y="78" fill="#5eead4" font-size="14">quality • safety • cost • latency</text></g>
    <path d="M1025 310 V355 H610 V387" stroke="#94a3b8" stroke-width="4" fill="none" marker-end="url(#a)"/>
    <rect x="400" y="395" width="420" height="92" rx="18" fill="#172554" stroke="#60a5fa" stroke-width="2"/>
    <text x="610" y="433" fill="#dbeafe" font-size="20" font-weight="700">Stage, observe, or roll back</text><text x="610" y="463" fill="#93c5fd" font-size="14">shadow • canary • limited traffic • explicit trigger</text>
    <path d="M400 441 H130 V310" stroke="#94a3b8" stroke-width="4" fill="none" marker-end="url(#a)"/>
    <rect x="235" y="525" width="730" height="52" rx="15" fill="#1e293b"/><text x="600" y="558" fill="#cbd5e1" font-size="16">User feedback prioritizes review; it does not replace labels or the surrounding trace.</text>
  </g>
</svg>
