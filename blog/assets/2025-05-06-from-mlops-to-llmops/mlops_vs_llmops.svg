<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">The release unit expands from a model service to a decision system</title>
  <desc id="desc">A central MLOps core of code, data, model, and serving is surrounded by prompts and schemas, retrieval state, tools and permissions, routing and budgets, and safety policy. All components join one system manifest.</desc>
  <rect width="1200" height="650" rx="28" fill="#0f172a"/>
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="sans-serif" font-size="30" font-weight="700">LLMOps expands the release unit</text>
  <g font-family="sans-serif" text-anchor="middle">
    <rect x="400" y="220" width="400" height="190" rx="26" fill="#172554" stroke="#60a5fa" stroke-width="3"/>
    <text x="600" y="270" fill="#dbeafe" font-size="24" font-weight="700">MLOps core</text>
    <text x="600" y="312" fill="#bfdbfe" font-size="17">code • data • model identity</text>
    <text x="600" y="346" fill="#93c5fd" font-size="17">build • serving • rollout • rollback</text>
    <rect x="70" y="145" width="265" height="115" rx="18" fill="#3b176f"/><text x="202" y="189" fill="#ddd6fe" font-size="19" font-weight="700">Prompts + schemas</text><text x="202" y="225" fill="#c4b5fd" font-size="14">assembled request behavior</text>
    <rect x="865" y="145" width="265" height="115" rx="18" fill="#064e3b"/><text x="997" y="189" fill="#99f6e4" font-size="19" font-weight="700">Retrieval state</text><text x="997" y="225" fill="#5eead4" font-size="14">corpus • parser • index</text>
    <rect x="70" y="370" width="265" height="115" rx="18" fill="#78350f"/><text x="202" y="414" fill="#fde68a" font-size="19" font-weight="700">Tools + permissions</text><text x="202" y="450" fill="#fcd34d" font-size="14">contracts • approval • effects</text>
    <rect x="865" y="370" width="265" height="115" rx="18" fill="#164e63"/><text x="997" y="414" fill="#a5f3fc" font-size="19" font-weight="700">Routing + budget</text><text x="997" y="450" fill="#67e8f9" font-size="14">fallback • cache • quota</text>
    <rect x="390" y="485" width="420" height="82" rx="18" fill="#450a0a"/><text x="600" y="518" fill="#fecaca" font-size="19" font-weight="700">Safety + business policy</text><text x="600" y="547" fill="#fca5a5" font-size="14">deterministic rules and residual-risk controls</text>
    <rect x="255" y="590" width="690" height="42" rx="14" fill="#1e293b"/><text x="600" y="617" fill="#e2e8f0" font-size="17" font-weight="700">One manifest identifies and promotes the complete system</text>
  </g>
</svg>
