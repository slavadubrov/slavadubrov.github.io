<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 490" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadowC" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <marker id="arrowC" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c62828"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">Traditional Tool Calling vs Code Execution</text>

  <!-- Top: Traditional (red/expensive) -->
  <text x="500" y="60" text-anchor="middle" font-size="13" font-weight="600" fill="#c62828">Traditional: 20+ inference passes, all data flows through context</text>

  <!-- Traditional flow boxes -->
  <rect x="30" y="75" width="110" height="50" rx="6" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" filter="url(#shadowC)"/>
  <text x="85" y="96" text-anchor="middle" font-size="10" font-weight="600" fill="#6a1b9a">LLM Call 1</text>
  <text x="85" y="110" text-anchor="middle" font-size="9" fill="#888">get_members</text>

  <line x1="140" y1="100" x2="165" y2="100" stroke="#c62828" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <rect x="170" y="75" width="80" height="50" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1.5" filter="url(#shadowC)"/>
  <text x="210" y="96" text-anchor="middle" font-size="10" font-weight="600" fill="#c62828">Tool</text>
  <text x="210" y="110" text-anchor="middle" font-size="9" fill="#888">API call</text>

  <line x1="250" y1="100" x2="275" y2="100" stroke="#c62828" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <rect x="280" y="75" width="110" height="50" rx="6" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" filter="url(#shadowC)"/>
  <text x="335" y="96" text-anchor="middle" font-size="10" font-weight="600" fill="#6a1b9a">LLM Call 2</text>
  <text x="335" y="110" text-anchor="middle" font-size="9" fill="#888">get_expenses</text>

  <line x1="390" y1="100" x2="415" y2="100" stroke="#c62828" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <rect x="420" y="75" width="80" height="50" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1.5" filter="url(#shadowC)"/>
  <text x="460" y="96" text-anchor="middle" font-size="10" font-weight="600" fill="#c62828">Tool</text>
  <text x="460" y="110" text-anchor="middle" font-size="9" fill="#888">API call</text>

  <line x1="500" y1="100" x2="525" y2="100" stroke="#c62828" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <rect x="530" y="75" width="110" height="50" rx="6" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" filter="url(#shadowC)"/>
  <text x="585" y="96" text-anchor="middle" font-size="10" font-weight="600" fill="#6a1b9a">LLM Call 3</text>
  <text x="585" y="110" text-anchor="middle" font-size="9" fill="#888">process data</text>

  <!-- Dots indicating more -->
  <text x="665" y="105" font-size="20" fill="#c62828">...</text>

  <rect x="700" y="75" width="110" height="50" rx="6" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" filter="url(#shadowC)"/>
  <text x="755" y="96" text-anchor="middle" font-size="10" font-weight="600" fill="#6a1b9a">LLM Call 20</text>
  <text x="755" y="110" text-anchor="middle" font-size="9" fill="#888">synthesize</text>

  <!-- Token cost label -->
  <rect x="840" y="78" width="140" height="44" rx="6" fill="#c62828" filter="url(#shadowC)"/>
  <text x="910" y="98" text-anchor="middle" font-size="11" font-weight="600" fill="white">~150,000</text>
  <text x="910" y="114" text-anchor="middle" font-size="10" fill="#ffcdd2">tokens</text>

  <!-- Divider -->
  <line x1="30" y1="155" x2="970" y2="155" stroke="#ddd" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="500" y="175" text-anchor="middle" font-size="10" fill="#888">vs</text>

  <!-- Bottom: Code Execution (green/efficient) -->
  <text x="500" y="205" text-anchor="middle" font-size="13" font-weight="600" fill="#2e7d32">Code Execution: 1 inference pass, data stays in sandbox</text>

  <!-- Code execution flow -->
  <rect x="30" y="225" width="160" height="70" rx="6" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" filter="url(#shadowC)"/>
  <text x="110" y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#6a1b9a">LLM (1 call)</text>
  <text x="110" y="268" text-anchor="middle" font-size="9" fill="#888">Writes Python script</text>
  <text x="110" y="282" text-anchor="middle" font-size="9" fill="#888">with loops + logic</text>

  <line x1="190" y1="260" x2="235" y2="260" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="212" y="252" text-anchor="middle" font-size="8" fill="#2e7d32">code</text>

  <!-- Sandbox box -->
  <rect x="240" y="215" width="520" height="110" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" stroke-dasharray="6,3" filter="url(#shadowC)"/>
  <text x="500" y="236" text-anchor="middle" font-size="11" font-weight="600" fill="#2e7d32">Sandboxed Execution Environment</text>

  <!-- Inside sandbox: parallel tool calls -->
  <rect x="265" y="248" width="100" height="55" rx="4" fill="white" stroke="#27ae60" stroke-width="1.5"/>
  <text x="315" y="268" text-anchor="middle" font-size="9" font-weight="600" fill="#2e7d32">get_members()</text>
  <text x="315" y="282" text-anchor="middle" font-size="9" fill="#888">for m in members:</text>
  <text x="315" y="295" text-anchor="middle" font-size="9" fill="#888">get_expenses()</text>

  <rect x="385" y="248" width="100" height="55" rx="4" fill="white" stroke="#27ae60" stroke-width="1.5"/>
  <text x="435" y="268" text-anchor="middle" font-size="9" font-weight="600" fill="#2e7d32">filter()</text>
  <text x="435" y="282" text-anchor="middle" font-size="9" fill="#888">if total > budget:</text>
  <text x="435" y="295" text-anchor="middle" font-size="9" fill="#888">over_budget.add()</text>

  <rect x="505" y="248" width="100" height="55" rx="4" fill="white" stroke="#27ae60" stroke-width="1.5"/>
  <text x="555" y="268" text-anchor="middle" font-size="9" font-weight="600" fill="#2e7d32">aggregate()</text>
  <text x="555" y="282" text-anchor="middle" font-size="9" fill="#888">json.dumps(</text>
  <text x="555" y="295" text-anchor="middle" font-size="9" fill="#888">over_budget)</text>

  <!-- Arrows between sandbox stages -->
  <line x1="365" y1="275" x2="380" y2="275" stroke="#27ae60" stroke-width="1" marker-end="url(#arrowGreen)"/>
  <line x1="485" y1="275" x2="500" y2="275" stroke="#27ae60" stroke-width="1" marker-end="url(#arrowGreen)"/>

  <!-- Data stays label -->
  <rect x="625" y="250" width="120" height="50" rx="4" fill="#2e7d32" opacity="0.1" stroke="#2e7d32" stroke-width="1"/>
  <text x="685" y="270" text-anchor="middle" font-size="9" font-weight="600" fill="#2e7d32">Thousands of</text>
  <text x="685" y="284" text-anchor="middle" font-size="9" font-weight="600" fill="#2e7d32">records processed</text>
  <text x="685" y="296" text-anchor="middle" font-size="9" fill="#2e7d32">here, not in context</text>

  <!-- Output arrow from sandbox -->
  <line x1="760" y1="270" x2="805" y2="270" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="782" y="262" text-anchor="middle" font-size="8" fill="#2e7d32">summary</text>

  <!-- Final result -->
  <rect x="810" y="240" width="160" height="55" rx="6" fill="#2e7d32" filter="url(#shadowC)"/>
  <text x="890" y="262" text-anchor="middle" font-size="11" font-weight="600" fill="white">~2,000 tokens</text>
  <text x="890" y="280" text-anchor="middle" font-size="10" fill="#a5d6a7">98.7% reduction</text>

  <!-- Bottom comparison -->
  <rect x="100" y="360" width="800" height="85" rx="8" fill="#f8f9fa" stroke="#ddd" stroke-width="1"/>
  <text x="500" y="385" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1a2e">Why Code Execution Wins</text>
  <text x="230" y="410" text-anchor="middle" font-size="10" fill="#555">Native loops &amp; conditionals</text>
  <text x="230" y="425" text-anchor="middle" font-size="9" fill="#888">No JSON schema needed</text>
  <text x="500" y="410" text-anchor="middle" font-size="10" fill="#555">Data stays in sandbox</text>
  <text x="500" y="425" text-anchor="middle" font-size="9" fill="#888">Only final result hits context</text>
  <text x="770" y="410" text-anchor="middle" font-size="10" fill="#555">1 inference pass for N calls</text>
  <text x="770" y="425" text-anchor="middle" font-size="9" fill="#888">vs N passes traditionally</text>

  <!-- Sources -->
  <text x="100" y="470" font-size="8" fill="#aaa">Sources: ~150K to ~2K tokens (98.7% reduction) — Anthropic "Code execution with MCP"; +20% task success — CodeAct, Wang et al. (arXiv:2402.01030, ICML 2024)</text>
  <text x="100" y="482" font-size="8" fill="#aaa">PTC example pattern — Anthropic "Advanced tool use / Programmatic Tool Calling"</text>
</svg>
