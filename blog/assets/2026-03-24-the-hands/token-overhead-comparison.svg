<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 510" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadowB" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">Token Budget: Where Your Context Window Goes</text>
  <text x="450" y="50" text-anchor="middle" font-size="11" fill="#888">200K token context window — same task, different tool modalities</text>

  <!-- Scenario Labels -->
  <text x="30" y="90" font-size="12" font-weight="600" fill="#555">MCP (~40 tools)</text>
  <text x="30" y="190" font-size="12" font-weight="600" fill="#555">JSON Tool Calling (10 tools)</text>
  <text x="30" y="290" font-size="12" font-weight="600" fill="#555">CLI + Skills</text>
  <text x="30" y="390" font-size="12" font-weight="600" fill="#555">Code Execution (PTC)</text>

  <!-- Bar chart area -->
  <!-- Scale markers -->
  <line x1="250" y1="65" x2="250" y2="440" stroke="#eee" stroke-width="1"/>
  <line x1="445" y1="65" x2="445" y2="440" stroke="#eee" stroke-width="1"/>
  <line x1="640" y1="65" x2="640" y2="440" stroke="#eee" stroke-width="1"/>
  <line x1="835" y1="65" x2="835" y2="440" stroke="#eee" stroke-width="1"/>
  <text x="250" y="455" text-anchor="middle" font-size="9" fill="#aaa">0</text>
  <text x="445" y="455" text-anchor="middle" font-size="9" fill="#aaa">50K</text>
  <text x="640" y="455" text-anchor="middle" font-size="9" fill="#aaa">100K</text>
  <text x="835" y="455" text-anchor="middle" font-size="9" fill="#aaa">150K</text>

  <!-- Bar 1: MCP (55K tool defs + 90K intermediate + 5K reasoning = 150K) -->
  <!-- Tool definitions -->
  <rect x="250" y="100" width="322" height="30" rx="4" fill="#c62828" filter="url(#shadowB)"/>
  <text x="411" y="120" text-anchor="middle" font-size="10" font-weight="600" fill="white">Tool schemas: 55,000</text>
  <!-- Intermediate results -->
  <rect x="572" y="100" width="205" height="30" rx="4" fill="#e74c3c" opacity="0.7"/>
  <text x="674" y="120" text-anchor="middle" font-size="10" font-weight="600" fill="white">Results: 88,000</text>
  <!-- Reasoning -->
  <rect x="777" y="100" width="29" height="30" rx="4" fill="#f3e5f5" opacity="0.8"/>
  <!-- Label -->
  <text x="250" y="150" font-size="10" fill="#c62828" font-weight="600">72% of context on tool definitions alone</text>
  <text x="620" y="150" font-size="10" fill="#888">Only 28% left for reasoning</text>

  <!-- Bar 2: JSON Tool Calling (10 tools ~8K + 30K intermediate + 12K reasoning = 50K total) -->
  <!-- Tool definitions: 8K -->
  <rect x="250" y="200" width="47" height="30" rx="4" fill="#1565c0" filter="url(#shadowB)"/>
  <!-- Intermediate results: 30K -->
  <rect x="297" y="200" width="175" height="30" rx="4" fill="#3498db" opacity="0.7"/>
  <!-- Reasoning: 12K -->
  <rect x="472" y="200" width="70" height="30" rx="4" fill="#f3e5f5" opacity="0.8"/>
  <!-- Labels above bars -->
  <text x="273" y="196" text-anchor="middle" font-size="9" fill="#1565c0" font-weight="600">8K</text>
  <text x="384" y="220" text-anchor="middle" font-size="10" font-weight="600" fill="white">Results: 30K</text>
  <text x="507" y="220" text-anchor="middle" font-size="10" font-weight="600" fill="#6a1b9a">12K</text>
  <!-- Label -->
  <text x="250" y="250" font-size="10" fill="#1565c0" font-weight="600">Manageable with few tools</text>
  <text x="530" y="250" font-size="10" fill="#888">75% of context still available</text>

  <!-- Bar 3: CLI + Skills (~200 tokens tools + 2K intermediate + 8K reasoning) -->
  <rect x="250" y="300" width="2" height="30" rx="1" fill="#2e7d32" filter="url(#shadowB)"/>
  <rect x="252" y="300" width="12" height="30" rx="4" fill="#27ae60" opacity="0.7"/>
  <rect x="264" y="300" width="47" height="30" rx="4" fill="#f3e5f5" opacity="0.8"/>
  <text x="340" y="320" font-size="10" fill="#2e7d32" font-weight="600">~200 tokens tools + 2K results = 95% free for reasoning</text>

  <!-- Bar 4: Code Execution (2 meta-tools + code output) -->
  <rect x="250" y="400" width="4" height="30" rx="2" fill="#e65100" filter="url(#shadowB)"/>
  <rect x="254" y="400" width="12" height="30" rx="4" fill="#e67e22" opacity="0.7"/>
  <rect x="266" y="400" width="47" height="30" rx="4" fill="#f3e5f5" opacity="0.8"/>
  <text x="340" y="420" font-size="10" fill="#e65100" font-weight="600">2 meta-tools + final summary only = 98.7% reduction</text>

  <!-- Legend -->
  <rect x="250" y="460" width="14" height="14" rx="2" fill="#c62828"/>
  <text x="270" y="472" font-size="9" fill="#555">Tool definitions</text>
  <rect x="380" y="460" width="14" height="14" rx="2" fill="#e74c3c" opacity="0.7"/>
  <text x="400" y="472" font-size="9" fill="#555">Intermediate results</text>
  <rect x="530" y="460" width="14" height="14" rx="2" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1"/>
  <text x="550" y="472" font-size="9" fill="#555">Available for reasoning</text>

  <!-- Sources -->
  <text x="250" y="498" font-size="8" fill="#aaa">Sources: 55K tokens (~40 MCP tools: GitHub + Slack + Sentry) — Apideck; 143K/200K — Apideck; 98.7% reduction — Anthropic "Code execution with MCP"</text>
</svg>
