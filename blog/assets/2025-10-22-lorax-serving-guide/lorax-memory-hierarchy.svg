<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Adapter artifact storage and runtime residency in LoRAX</title>
  <desc id="desc">Remote or local adapter artifacts are stored under the data cache, materialized in CPU memory, and made resident in GPU memory beside the shared base model. Arrows represent measured transitions rather than fixed latency claims.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="500" rx="22" fill="#0f172a"/>
  <text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Artifact storage is not the same as runtime residency</text>
  <text x="500" y="78" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#94a3b8">Capacity follows the active working set and the cost of each transition</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(55 125)"><rect width="235" height="210" rx="16" fill="#1e293b" stroke="#64748b" stroke-width="2"/><text x="117" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#e2e8f0">Artifact source</text><text x="28" y="82" font-size="14" fill="#cbd5e1">Hugging Face / registry</text><text x="28" y="113" font-size="14" fill="#cbd5e1">Object or filesystem source</text><text x="28" y="144" font-size="14" fill="#cbd5e1">Integrity digest</text><text x="28" y="175" font-size="14" fill="#cbd5e1">Base-model metadata</text></g>
    <text x="320" y="240" text-anchor="middle" font-size="28" fill="#94a3b8">→</text>
    <g transform="translate(350 125)"><rect width="235" height="210" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2"/><text x="117" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#93c5fd">Local artifact cache</text><text x="28" y="82" font-size="14" fill="#cbd5e1">Downloaded adapter files</text><text x="28" y="113" font-size="14" fill="#cbd5e1">Mounted at /data</text><text x="28" y="144" font-size="14" fill="#cbd5e1">Persistent or ephemeral</text><text x="28" y="175" font-size="14" fill="#cbd5e1">Read + materialize cost</text></g>
    <text x="615" y="240" text-anchor="middle" font-size="28" fill="#94a3b8">→</text>
    <g transform="translate(645 125)"><rect width="300" height="210" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2"/><text x="150" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#93c5fd">Runtime memory</text><rect x="28" y="70" width="112" height="105" rx="10" fill="#1d4ed8"/><text x="84" y="101" text-anchor="middle" font-size="14" font-weight="700" fill="#93c5fd">CPU RAM</text><text x="84" y="129" text-anchor="middle" font-size="12" fill="#93c5fd">offloaded</text><text x="84" y="151" text-anchor="middle" font-size="12" fill="#93c5fd">adapters</text><rect x="160" y="70" width="112" height="105" rx="10" fill="#166534"/><text x="216" y="101" text-anchor="middle" font-size="14" font-weight="700" fill="#86efac">GPU VRAM</text><text x="216" y="129" text-anchor="middle" font-size="12" fill="#86efac">base + active</text><text x="216" y="151" text-anchor="middle" font-size="12" fill="#86efac">adapters + KV</text></g>

    <rect x="135" y="385" width="730" height="58" rx="12" fill="#5b21b6" stroke="#2563eb"/>
    <text x="500" y="411" text-anchor="middle" font-size="14" font-weight="700" fill="#c4b5fd">Measure each transition on your workload</text>
    <text x="500" y="432" text-anchor="middle" font-size="12" fill="#93c5fd">No fixed “disk → RAM → GPU” latency applies across adapter size, storage, network, and hardware.</text>
  </g>
</svg>
