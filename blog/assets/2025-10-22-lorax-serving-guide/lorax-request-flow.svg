<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" role="img" aria-labelledby="title desc">
  <title id="title">LoRAX request path from adapter resolution through generation</title>
  <desc id="desc">An authenticated request supplies an allowlisted adapter ID. LoRAX resolves residency, loads the adapter if needed, batches compatible work, applies the adapter over the shared base model, and streams tokens. Rejected identities and artifacts take a failure path.</desc>
  <rect width="1000" height="500" rx="22" fill="#0f172a"/>
  <text x="500" y="48" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">LoRAX request path</text>
  <text x="500" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">Adapter identity is an authorized routing input, not arbitrary public input</text>
  <g font-family="system-ui, sans-serif">
    <g transform="translate(25 125)"><rect width="150" height="110" rx="14" fill="#1e293b" stroke="#64748b"/><text x="75" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#f8fafc">Gateway</text><text x="75" y="66" text-anchor="middle" font-size="12" fill="#cbd5e1">authenticate tenant</text><text x="75" y="87" text-anchor="middle" font-size="12" fill="#94a3b8">allowlist adapter</text></g>
    <text x="197" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(220 125)"><rect width="165" height="110" rx="14" fill="#2e1065" stroke="#8b5cf6"/><text x="82" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#c4b5fd">Resolver</text><text x="82" y="66" text-anchor="middle" font-size="12" fill="#cbd5e1">check residency</text><text x="82" y="87" text-anchor="middle" font-size="12" fill="#94a3b8">load if absent</text></g>
    <text x="407" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(430 125)"><rect width="165" height="110" rx="14" fill="#422006" stroke="#f59e0b"/><text x="82" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#fbbf24">Scheduler</text><text x="82" y="66" text-anchor="middle" font-size="12" fill="#cbd5e1">queue by readiness</text><text x="82" y="87" text-anchor="middle" font-size="12" fill="#94a3b8">form mixed batch</text></g>
    <text x="617" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(640 125)"><rect width="165" height="110" rx="14" fill="#052e2b" stroke="#14b8a6"/><text x="82" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#5eead4">GPU inference</text><text x="82" y="66" text-anchor="middle" font-size="12" fill="#cbd5e1">shared base model</text><text x="82" y="87" text-anchor="middle" font-size="12" fill="#94a3b8">per-request adapter</text></g>
    <text x="827" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(850 125)"><rect width="125" height="110" rx="14" fill="#164e63" stroke="#06b6d4"/><text x="62" y="45" text-anchor="middle" font-size="16" font-weight="700" fill="#67e8f9">Stream</text><text x="62" y="75" text-anchor="middle" font-size="12" fill="#cffafe">output tokens</text></g>

    <g transform="translate(220 315)"><rect width="585" height="105" rx="14" fill="#172554" stroke="#3b82f6"/><text x="292" y="33" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Observe the residency path for every request</text><text x="45" y="66" font-size="13" fill="#cbd5e1">GPU hit</text><text x="160" y="66" font-size="13" fill="#cbd5e1">CPU hit</text><text x="275" y="66" font-size="13" fill="#cbd5e1">Artifact hit</text><text x="410" y="66" font-size="13" fill="#cbd5e1">Remote miss</text><text x="45" y="88" font-size="12" fill="#94a3b8">Record queue, load, first-token, total latency, and failure reason.</text></g>
    <text x="500" y="465" text-anchor="middle" font-size="13" fill="#fca5a5">Unauthorized adapter, incompatible artifact, or load failure → reject or use an explicit fallback</text>
  </g>
</svg>
