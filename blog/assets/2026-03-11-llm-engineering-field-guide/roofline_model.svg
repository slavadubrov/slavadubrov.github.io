<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="Roboto, Arial, sans-serif">
  <defs>
    <filter id="s" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.10"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#555"/>
    </marker>
  </defs>

  <rect width="720" height="400" fill="#fafbfc" rx="8"/>

  <!-- Title -->
  <text x="360" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">The Roofline Model</text>
  <text x="360" y="48" text-anchor="middle" font-size="11" fill="#888">H100 SXM · TF32 with sparsity</text>

  <!-- Shaded regions -->
  <!-- Memory-bound region (blue tint, left of knee) -->
  <polygon points="90,340 90,88 470,88 470,340" fill="#e3f2fd" opacity="0.5"/>
  <!-- Compute-bound region (red tint, right of knee) -->
  <polygon points="470,340 470,88 660,88 660,340" fill="#ffebee" opacity="0.5"/>

  <!-- Region labels at top -->
  <text x="280" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0" opacity="0.7">MEMORY-BOUND</text>
  <text x="565" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#c62828" opacity="0.7">COMPUTE-BOUND</text>

  <!-- Axes -->
  <line x1="90" y1="340" x2="670" y2="340" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="90" y1="340" x2="90" y2="82" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Y-axis label -->
  <text x="22" y="210" text-anchor="middle" font-size="11" fill="#555" transform="rotate(-90,22,210)">Performance (TFLOPS)</text>

  <!-- X-axis label -->
  <text x="380" y="375" text-anchor="middle" font-size="11" fill="#555">Arithmetic Intensity (FLOPs / byte)</text>

  <!-- Minimal X ticks — just key values -->
  <line x1="140" y1="340" x2="140" y2="346" stroke="#555" stroke-width="1"/>
  <text x="140" y="358" text-anchor="middle" font-size="10" fill="#777">1</text>

  <line x1="300" y1="340" x2="300" y2="346" stroke="#555" stroke-width="1"/>
  <text x="300" y="358" text-anchor="middle" font-size="10" fill="#777">100</text>

  <line x1="470" y1="340" x2="470" y2="346" stroke="#555" stroke-width="1"/>
  <text x="470" y="358" text-anchor="middle" font-size="10" fill="#777">295</text>

  <!-- Y tick — just the peak -->
  <line x1="85" y1="110" x2="90" y2="110" stroke="#555" stroke-width="1"/>
  <text x="80" y="114" text-anchor="end" font-size="10" fill="#777">989</text>

  <!-- ============ THE ROOFLINE ============ -->

  <!-- Memory-bandwidth slope: from bottom-left to knee -->
  <line x1="95" y1="335" x2="470" y2="110" stroke="#1565c0" stroke-width="3" stroke-linecap="round"/>

  <!-- Compute ceiling: flat from knee to right -->
  <line x1="470" y1="110" x2="660" y2="110" stroke="#c62828" stroke-width="3" stroke-linecap="round"/>

  <!-- Line labels along the lines -->
  <text x="210" y="260" font-size="10" fill="#1565c0" font-weight="bold" transform="rotate(-31,210,260)">3.35 TB/s bandwidth</text>
  <text x="540" y="103" font-size="10" fill="#c62828" font-weight="bold">989 TFLOPS peak</text>

  <!-- Knee point (critical intensity) -->
  <circle cx="470" cy="110" r="5" fill="#fff" stroke="#333" stroke-width="2"/>
  <line x1="470" y1="120" x2="470" y2="145" stroke="#333" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="470" y="158" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">295 FLOPs/byte</text>
  <text x="470" y="171" text-anchor="middle" font-size="9" fill="#888">(critical intensity)</text>

  <!-- ============ WORKLOAD DOTS ============ -->

  <!-- Decode (bs=1): intensity ≈ 1 → bottom of slope -->
  <circle cx="140" cy="310" r="9" fill="#e74c3c" stroke="#b71c1c" stroke-width="2" filter="url(#s)"/>
  <text x="158" y="298" font-size="12" font-weight="bold" fill="#b71c1c">Decode</text>
  <text x="158" y="312" font-size="10" fill="#666">batch = 1</text>
  <text x="158" y="325" font-size="9" fill="#999">1 FLOP/byte</text>

  <!-- Prefill: intensity ≈ 500 → on the ceiling -->
  <circle cx="530" cy="110" r="9" fill="#2e7d32" stroke="#1b5e20" stroke-width="2" filter="url(#s)"/>
  <text x="530" y="195" text-anchor="middle" font-size="12" font-weight="bold" fill="#1b5e20">Prefill</text>
  <text x="530" y="209" text-anchor="middle" font-size="9" fill="#999">many tokens reuse same weights</text>
</svg>
