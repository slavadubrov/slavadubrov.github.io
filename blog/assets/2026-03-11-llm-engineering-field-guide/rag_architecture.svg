<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 360">
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 8; }
      .data-box { fill: #f0f9ff; stroke: #0ea5e9; stroke-width: 2; rx: 8; }
      .model { fill: #f0fdf4; stroke: #22c55e; stroke-width: 2; rx: 8; }
      .db { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 16; }
      .search { fill: #faf5ff; stroke: #9333ea; stroke-width: 2; rx: 8; }
      .qtrans { fill: #fefce8; stroke: #ca8a04; stroke-width: 2; rx: 8; }
      .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
      .arrow-dashed { fill: none; stroke: #64748b; stroke-width: 2; stroke-dasharray: 6,4; marker-end: url(#arrowhead); }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 14px; fill: #0f172a; text-anchor: middle; }
      .text-small { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 12px; fill: #64748b; text-anchor: middle; }
      .text-bold { font-weight: 600; }
      .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 20px; font-weight: 700; fill: #0f172a; text-anchor: middle; }
      .subtitle { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #475569; text-anchor: start; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9.5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="white" />

  <text x="525" y="30" class="title">RAG Architecture in Production</text>

  <!-- Data Ingestion Flow (Top) -->
  <text x="20" y="50" class="subtitle">Data Ingestion (Offline)</text>

  <!-- Col 1 -->
  <rect x="15" y="65" width="110" height="50" class="data-box" />
  <text x="70" y="94" class="text text-bold">Documents</text>

  <path d="M 125,90 H 157" class="arrow" />

  <!-- Col 2 -->
  <rect x="160" y="65" width="110" height="50" class="box" />
  <text x="215" y="86" class="text text-bold">Chunking</text>
  <text x="215" y="104" class="text-small">(Overlap, Parsing)</text>

  <path d="M 270,90 H 302" class="arrow" />

  <!-- Col 3 -->
  <rect x="305" y="65" width="110" height="50" class="model" />
  <text x="360" y="86" class="text text-bold">Embedder</text>
  <text x="360" y="104" class="text-small">(Dense Vectors)</text>

  <path d="M 415,90 H 442" class="arrow" />

  <!-- Col 4 -->
  <rect x="445" y="55" width="120" height="70" class="db" />
  <text x="505" y="86" class="text text-bold">Vector DB</text>
  <text x="505" y="104" class="text-small">HNSW / Graph</text>

  <!-- Divider -->
  <line x1="20" y1="155" x2="1030" y2="155" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="8,8" />

  <!-- Retrieval & Generation Flow (Bottom) -->
  <text x="20" y="185" class="subtitle">Query Flow (Online)</text>

  <!-- Col 2 -->
  <rect x="160" y="205" width="110" height="50" class="box" />
  <text x="215" y="235" class="text text-bold">User Query</text>

  <path d="M 270,230 H 302" class="arrow" />
  <!-- Arrow to Query Transform -->
  <path d="M 215,255 V 294 Q 215,300 221,300 H 302" class="arrow" />

  <!-- Col 3 Top -->
  <rect x="305" y="205" width="110" height="50" class="model" />
  <text x="360" y="226" class="text text-bold">Embedder</text>
  <text x="360" y="244" class="text-small">(Matches Offline)</text>

  <path d="M 415,230 H 442" class="arrow" />

  <!-- Col 3 Bottom -->
  <rect x="305" y="275" width="110" height="50" class="qtrans" />
  <text x="360" y="296" class="text text-bold">Query</text>
  <text x="360" y="314" class="text text-bold">Transform</text>

  <path d="M 415,300 H 499 Q 505,300 505,294 V 263" class="arrow" />
  <!-- Vector DB to Hybrid Search -->
  <path d="M 505,125 V 197" class="arrow-dashed" />

  <!-- Col 4 -->
  <rect x="445" y="200" width="120" height="60" class="search" />
  <text x="505" y="226" class="text text-bold">Hybrid Search</text>
  <text x="505" y="244" class="text-small">Dense + BM25</text>

  <path d="M 565,230 H 612" class="arrow" />
  <text x="588" y="220" class="text-small">Top-K</text>

  <!-- Col 5 -->
  <rect x="615" y="200" width="110" height="60" class="model" />
  <text x="670" y="226" class="text text-bold">Reranker</text>
  <text x="670" y="244" class="text-small">(Cross-Encoder)</text>

  <path d="M 725,230 H 772" class="arrow" />
  <text x="748" y="220" class="text-small">Top-N</text>

  <!-- Col 6 -->
  <rect x="775" y="200" width="120" height="60" class="model" />
  <text x="835" y="226" class="text text-bold">Generative LLM</text>
  <text x="835" y="244" class="text-small">Context + Prompt</text>

  <path d="M 895,230 H 925" class="arrow" />

  <!-- Col 7 -->
  <text x="935" y="235" class="text" font-weight="600" style="text-anchor: start;">Response</text>

</svg>
