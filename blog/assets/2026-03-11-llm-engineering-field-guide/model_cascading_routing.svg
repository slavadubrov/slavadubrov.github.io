<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <style>
      .box { fill: #f8f9fa; stroke: #333; stroke-width: 2; rx: 5; }
      .router { fill: #ffcc80; stroke: #ef6c00; stroke-width: 2; rx: 10; }
      .eval { fill: #e1bee7; stroke: #8e24aa; stroke-width: 2; rx: 5; }
      .small-model { fill: #b2dfdb; stroke: #00897b; stroke-width: 2; rx: 5; }
      .large-model { fill: #ffcdd2; stroke: #c62828; stroke-width: 2; rx: 5; }
      .arrow { stroke: #333; stroke-width: 2; marker-end: url(#arrowhead); }
      .text { font-family: Arial, sans-serif; font-size: 14px; text-anchor: middle; fill: #333; }
      .subtitle { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; text-anchor: middle; fill: #555; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="white" />

  <!-- Routing Section (Left Half) -->
  <text x="200" y="30" class="subtitle">1. Model Routing</text>

  <rect x="150" y="60" width="100" height="40" class="box" />
  <text x="200" y="85" class="text">User Query</text>

  <line x1="200" y1="100" x2="200" y2="120" class="arrow" />

  <!-- Router Diamond -->
  <polygon points="200,125 260,155 200,185 140,155" class="router" />
  <text x="200" y="159" class="text" font-weight="bold">Router</text>

  <!-- Router to Models -->
  <line x1="200" y1="185" x2="200" y2="205" stroke="#333" stroke-width="2" />
  <line x1="110" y1="205" x2="290" y2="205" stroke="#333" stroke-width="2" />

  <!-- Arrow to Small Model -->
  <line x1="110" y1="205" x2="110" y2="220" class="arrow" />
  <text x="155" y="195" class="text" font-size="12">Simple</text>

  <!-- Arrow to Large Model -->
  <line x1="290" y1="205" x2="290" y2="220" class="arrow" />
  <text x="245" y="195" class="text" font-size="12">Complex</text>

  <!-- Small Model -->
  <rect x="40" y="225" width="140" height="60" class="small-model" />
  <text x="110" y="250" class="text" font-weight="bold">Small Model</text>
  <text x="110" y="270" class="text" font-size="12">(Fast, Cheap)</text>

  <!-- Large Model -->
  <rect x="220" y="225" width="140" height="60" class="large-model" />
  <text x="290" y="250" class="text" font-weight="bold">Large Model</text>
  <text x="290" y="270" class="text" font-size="12">(Accurate, Expensive)</text>

  <!-- Models to Output Vector -->
  <line x1="110" y1="285" x2="110" y2="330" stroke="#333" stroke-width="2" />
  <line x1="290" y1="285" x2="290" y2="330" stroke="#333" stroke-width="2" />
  <line x1="110" y1="330" x2="290" y2="330" stroke="#333" stroke-width="2" />
  <line x1="200" y1="330" x2="200" y2="385" class="arrow" />

  <rect x="150" y="390" width="100" height="40" class="box" />
  <text x="200" y="415" class="text">Output</text>

  <!-- Divider -->
  <line x1="400" y1="20" x2="400" y2="430" stroke="#ccc" stroke-width="2" stroke-dasharray="8,8" />

  <!-- Cascading Section (Right Half) -->
  <text x="600" y="30" class="subtitle">2. Model Cascading</text>

  <rect x="550" y="60" width="100" height="40" class="box" />
  <text x="600" y="85" class="text">User Query</text>

  <line x1="600" y1="100" x2="600" y2="120" class="arrow" />

  <!-- Small Model -->
  <rect x="530" y="125" width="140" height="60" class="small-model" />
  <text x="600" y="150" class="text" font-weight="bold">Small Model</text>
  <text x="600" y="170" class="text" font-size="12">First Attempt</text>

  <line x1="600" y1="185" x2="600" y2="205" class="arrow" />

  <!-- Confidence Diamond -->
  <polygon points="600,210 670,240 600,270 530,240" class="eval" />
  <text x="600" y="244" class="text" font-size="12" font-weight="bold">Confidence?</text>

  <!-- Low Confidence (Down) -->
  <line x1="600" y1="270" x2="600" y2="295" class="arrow" />
  <text x="618" y="285" class="text" font-size="12">Low</text>

  <!-- Large Model -->
  <rect x="530" y="300" width="140" height="60" class="large-model" />
  <text x="600" y="325" class="text" font-weight="bold">Large Model</text>
  <text x="600" y="345" class="text" font-size="12">Fallback</text>

  <line x1="600" y1="360" x2="600" y2="385" class="arrow" />

  <!-- High Confidence (Bypass to Output) -->
  <line x1="530" y1="240" x2="480" y2="240" stroke="#333" stroke-width="2" />
  <line x1="480" y1="240" x2="480" y2="410" stroke="#333" stroke-width="2" />
  <line x1="480" y1="410" x2="545" y2="410" class="arrow" />
  <text x="500" y="234" class="text" font-size="12">High</text>

  <!-- Output Box -->
  <rect x="550" y="390" width="100" height="40" class="box" />
  <text x="600" y="415" class="text">Output</text>

</svg>
