<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Decision path for a local macOS image workflow</title>
  <desc id="desc">The decision starts with the workflow state that must be controlled, branches to native applications, graph workflows, or an existing compatibility surface, passes a maintenance and model-support gate, and ends with a representative acceptance test and recorded release unit.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#64748b"/></marker></defs>
  <rect width="1200" height="720" rx="28" fill="#0f172a"/>
  <text x="600" y="60" text-anchor="middle" fill="#f8fafc" font-family="sans-serif" font-size="30" font-weight="700">Choose by controlled state, then test</text>

  <g font-family="sans-serif" text-anchor="middle">
    <rect x="380" y="100" width="440" height="86" rx="18" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
    <text x="600" y="136" fill="#f1f5f9" font-size="21" font-weight="700">What must remain reproducible?</text>
    <text x="600" y="165" fill="#94a3b8" font-size="15">interaction, pipeline graph, or existing integration</text>

    <path d="M600 186 V220 M600 220 H205 V252 M600 220 V252 M600 220 H995 V252" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

    <rect x="70" y="265" width="270" height="122" rx="18" fill="#1e3a8a"/>
    <text x="205" y="307" fill="#bfdbfe" font-size="20" font-weight="700">Native interaction</text>
    <text x="205" y="340" fill="#dbeafe" font-size="16">Draw Things</text>
    <text x="205" y="365" fill="#93c5fd" font-size="16">DiffusionBee</text>

    <rect x="465" y="265" width="270" height="122" rx="18" fill="#3b176f"/>
    <text x="600" y="307" fill="#ddd6fe" font-size="20" font-weight="700">Inspectable graph</text>
    <text x="600" y="346" fill="#ede9fe" font-size="17">ComfyUI</text>

    <rect x="860" y="265" width="270" height="122" rx="18" fill="#78350f"/>
    <text x="995" y="307" fill="#fde68a" font-size="20" font-weight="700">Existing surface</text>
    <text x="995" y="340" fill="#fef3c7" font-size="16">AUTOMATIC1111</text>
    <text x="995" y="365" fill="#fcd34d" font-size="16">Fooocus</text>

    <path d="M205 387 V435 H600 M600 387 V445 M995 387 V435 H600" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
    <rect x="350" y="458" width="500" height="90" rx="18" fill="#164e63" stroke="#22d3ee" stroke-width="2"/>
    <text x="600" y="494" fill="#cffafe" font-size="21" font-weight="700">Support and maintenance gate</text>
    <text x="600" y="524" fill="#67e8f9" font-size="15">exact model • macOS backend • dependencies • trust boundary</text>

    <path d="M600 548 V580" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="190" y="594" width="820" height="82" rx="18" fill="#064e3b" stroke="#34d399" stroke-width="2"/>
    <text x="600" y="628" fill="#d1fae5" font-size="21" font-weight="700">Run the hardest representative case</text>
    <text x="600" y="657" fill="#6ee7b7" font-size="15">measure • restart • reproduce • record the release unit</text>
  </g>
</svg>
