<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">The layers of a reproducible local image workflow</title>
  <desc id="desc">Five connected layers show that application version, model components, generation parameters, workflow dependencies, and output record together form a reproducible release unit.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#64748b"/></marker>
  </defs>
  <rect width="1200" height="620" rx="28" fill="#0f172a"/>
  <text x="600" y="68" text-anchor="middle" fill="#f8fafc" font-family="sans-serif" font-size="30" font-weight="700">A model file is not a portable workflow</text>
  <text x="600" y="104" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="17">Reproduction requires identities at every layer</text>

  <g font-family="sans-serif" text-anchor="middle">
    <g transform="translate(45 172)">
      <rect width="190" height="154" rx="18" fill="#1e3a8a"/>
      <text x="95" y="48" fill="#bfdbfe" font-size="20" font-weight="700">Application</text>
      <text x="95" y="82" fill="#dbeafe" font-size="15">name + version</text>
      <text x="95" y="110" fill="#93c5fd" font-size="14">backend + precision</text>
    </g>
    <path d="M245 249 H275" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(285 172)">
      <rect width="190" height="154" rx="18" fill="#3b176f"/>
      <text x="95" y="48" fill="#ddd6fe" font-size="20" font-weight="700">Components</text>
      <text x="95" y="82" fill="#ede9fe" font-size="15">checkpoint + VAE</text>
      <text x="95" y="110" fill="#c4b5fd" font-size="14">encoders + adapters</text>
    </g>
    <path d="M485 249 H515" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(525 172)">
      <rect width="190" height="154" rx="18" fill="#78350f"/>
      <text x="95" y="48" fill="#fde68a" font-size="20" font-weight="700">Parameters</text>
      <text x="95" y="82" fill="#fef3c7" font-size="15">prompt + seed</text>
      <text x="95" y="110" fill="#fcd34d" font-size="14">sampler + dimensions</text>
    </g>
    <path d="M725 249 H755" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(765 172)">
      <rect width="190" height="154" rx="18" fill="#064e3b"/>
      <text x="95" y="48" fill="#99f6e4" font-size="20" font-weight="700">Workflow</text>
      <text x="95" y="82" fill="#ccfbf1" font-size="15">graph + node versions</text>
      <text x="95" y="110" fill="#5eead4" font-size="14">scripts + extensions</text>
    </g>
    <path d="M965 249 H995" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(1005 172)">
      <rect width="150" height="154" rx="18" fill="#164e63"/>
      <text x="75" y="48" fill="#a5f3fc" font-size="20" font-weight="700">Output</text>
      <text x="75" y="82" fill="#cffafe" font-size="15">image + metadata</text>
      <text x="75" y="110" fill="#67e8f9" font-size="14">acceptance result</text>
    </g>
  </g>

  <path d="M600 346 V395" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="205" y="410" width="790" height="128" rx="20" fill="#172554" stroke="#60a5fa" stroke-width="2"/>
  <text x="600" y="459" text-anchor="middle" fill="#dbeafe" font-family="sans-serif" font-size="23" font-weight="700">Reproducible release unit</text>
  <text x="600" y="496" text-anchor="middle" fill="#93c5fd" font-family="sans-serif" font-size="17">Pin the identities together; do not preserve only the final image.</text>
</svg>
