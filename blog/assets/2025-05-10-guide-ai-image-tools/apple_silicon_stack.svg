<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Shared-memory budget for diffusion on Apple Silicon</title>
  <desc id="desc">A single unified-memory bar is divided among macOS and applications, model components, activations and workspace, control models and adapters, and remaining headroom. Workflow settings below the bar change these allocations.</desc>
  <rect width="1200" height="560" rx="28" fill="#0f172a"/>
  <text x="600" y="66" text-anchor="middle" fill="#f8fafc" font-family="sans-serif" font-size="30" font-weight="700">Unified memory is shared capacity</text>
  <text x="600" y="102" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="17">Every allocation competes with the operating system and the rest of the workflow</text>

  <g transform="translate(70 170)" font-family="sans-serif" text-anchor="middle">
    <path d="M20 0 H1040" stroke="#334155" stroke-width="5"/>
    <rect x="0" width="245" height="154" rx="20" fill="#1e3a8a"/>
    <text x="122" y="58" fill="#bfdbfe" font-size="19" font-weight="700">macOS + apps</text>
    <text x="122" y="92" fill="#93c5fd" font-size="14">changes during use</text>
    <rect x="235" width="285" height="154" fill="#3b176f"/>
    <text x="377" y="58" fill="#ddd6fe" font-size="19" font-weight="700">Model components</text>
    <text x="377" y="92" fill="#c4b5fd" font-size="14">weights + encoders + VAE</text>
    <rect x="520" width="230" height="154" fill="#78350f"/>
    <text x="635" y="58" fill="#fde68a" font-size="19" font-weight="700">Activations</text>
    <text x="635" y="92" fill="#fcd34d" font-size="14">attention + workspace</text>
    <rect x="750" width="175" height="154" fill="#164e63"/>
    <text x="837" y="50" fill="#a5f3fc" font-size="18" font-weight="700">Adapters +</text>
    <text x="837" y="76" fill="#a5f3fc" font-size="18" font-weight="700">controls</text>
    <text x="837" y="108" fill="#67e8f9" font-size="14">optional load</text>
    <rect x="925" width="135" height="154" rx="20" fill="#064e3b"/>
    <text x="992" y="59" fill="#99f6e4" font-size="18" font-weight="700">Headroom</text>
    <text x="992" y="92" fill="#5eead4" font-size="14">avoid swap</text>
  </g>

  <text x="600" y="388" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="18" font-weight="700">The allocation moves with the workflow</text>
  <g font-family="sans-serif" font-size="16" text-anchor="middle">
    <rect x="115" y="420" width="180" height="66" rx="14" fill="#1e293b"/><text x="205" y="460" fill="#cbd5e1">resolution</text>
    <rect x="315" y="420" width="180" height="66" rx="14" fill="#1e293b"/><text x="405" y="460" fill="#cbd5e1">batch size</text>
    <rect x="515" y="420" width="180" height="66" rx="14" fill="#1e293b"/><text x="605" y="460" fill="#cbd5e1">precision</text>
    <rect x="715" y="420" width="180" height="66" rx="14" fill="#1e293b"/><text x="805" y="460" fill="#cbd5e1">architecture</text>
    <rect x="915" y="420" width="180" height="66" rx="14" fill="#1e293b"/><text x="1005" y="460" fill="#cbd5e1">loaded stages</text>
  </g>
</svg>
