<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">Four ownership boundaries in pyproject.toml</title>
  <desc id="desc">Four cards distinguish build-system for the build backend, project for published metadata, dependency-groups for unpublished environments, and tool namespaces for tool-specific settings.</desc>
  <rect width="1200" height="650" rx="28" fill="#0f172a"/>
  <text x="600" y="68" text-anchor="middle" fill="#f8fafc" font-family="sans-serif" font-size="31" font-weight="700">One file, four owners</text>
  <text x="600" y="104" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="17">Classify a setting by its consumer before choosing a table</text>
  <g font-family="sans-serif">
    <g transform="translate(70 155)"><rect width="500" height="185" rx="20" fill="#1e3a8a"/><text x="30" y="48" fill="#bfdbfe" font-size="23" font-weight="700">[build-system]</text><text x="30" y="88" fill="#dbeafe" font-size="18">Owner: build frontend and backend</text><text x="30" y="124" fill="#93c5fd" font-size="16">backend identity • isolated build requirements</text><text x="30" y="154" fill="#93c5fd" font-size="16">source tree → sdist and wheel</text></g>
    <g transform="translate(630 155)"><rect width="500" height="185" rx="20" fill="#3b176f"/><text x="30" y="48" fill="#ddd6fe" font-size="23" font-weight="700">[project]</text><text x="30" y="88" fill="#ede9fe" font-size="18">Owner: package consumers</text><text x="30" y="124" fill="#c4b5fd" font-size="16">identity • runtime requirements • extras</text><text x="30" y="154" fill="#c4b5fd" font-size="16">published as distribution metadata</text></g>
    <g transform="translate(70 385)"><rect width="500" height="185" rx="20" fill="#064e3b"/><text x="30" y="48" fill="#99f6e4" font-size="23" font-weight="700">[dependency-groups]</text><text x="30" y="88" fill="#ccfbf1" font-size="18">Owner: local workflow</text><text x="30" y="124" fill="#5eead4" font-size="16">test • lint • docs • non-package environments</text><text x="30" y="154" fill="#5eead4" font-size="16">not published in package metadata</text></g>
    <g transform="translate(630 385)"><rect width="500" height="185" rx="20" fill="#78350f"/><text x="30" y="48" fill="#fde68a" font-size="23" font-weight="700">[tool.*]</text><text x="30" y="88" fill="#fef3c7" font-size="18">Owner: the named tool</text><text x="30" y="124" fill="#fcd34d" font-size="16">tool-defined keys and semantics</text><text x="30" y="154" fill="#fcd34d" font-size="16">no shared schema across namespaces</text></g>
  </g>
</svg>
