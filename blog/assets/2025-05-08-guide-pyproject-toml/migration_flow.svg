<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Verification-first migration to pyproject.toml</title>
  <desc id="desc">The migration flows from inventory and classification to encoding ownership, building artifacts, testing a clean installation, and only then retiring old files. A feedback arrow returns failures to classification.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#64748b"/></marker></defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1200" height="650" rx="28" fill="#0f172a"/>
  <text x="600" y="68" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700">Migrate behavior, then retire files</text>
  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <g transform="translate(45 180)"><rect width="190" height="145" rx="18" fill="#1d4ed8"/><text x="95" y="48" fill="#93c5fd" font-size="20" font-weight="700">1. Inventory</text><text x="95" y="82" fill="#93c5fd" font-size="14">build • metadata</text><text x="95" y="106" fill="#93c5fd" font-size="14">deps • data • tools</text></g>
    <path d="M245 252 H275" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(285 180)"><rect width="190" height="145" rx="18" fill="#5b21b6"/><text x="95" y="48" fill="#93c5fd" font-size="20" font-weight="700">2. Classify</text><text x="95" y="82" fill="#93c5fd" font-size="14">published or local?</text><text x="95" y="106" fill="#c4b5fd" font-size="14">static or dynamic?</text></g>
    <path d="M485 252 H515" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(525 180)"><rect width="190" height="145" rx="18" fill="#9a3412"/><text x="95" y="48" fill="#fdba74" font-size="20" font-weight="700">3. Encode</text><text x="95" y="82" fill="#fdba74" font-size="14">choose owners</text><text x="95" y="106" fill="#fdba74" font-size="14">preserve semantics</text></g>
    <path d="M725 252 H755" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(765 180)"><rect width="190" height="145" rx="18" fill="#1d4ed8"/><text x="95" y="48" fill="#93c5fd" font-size="20" font-weight="700">4. Verify</text><text x="95" y="82" fill="#93c5fd" font-size="14">inspect sdist + wheel</text><text x="95" y="106" fill="#93c5fd" font-size="14">clean install + deploy</text></g>
    <path d="M965 252 H995" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(1005 180)"><rect width="150" height="145" rx="18" fill="#166534"/><text x="75" y="48" fill="#93c5fd" font-size="20" font-weight="700">5. Retire</text><text x="75" y="82" fill="#93c5fd" font-size="14">remove only</text><text x="75" y="106" fill="#93c5fd" font-size="14">proven duplicates</text></g>

    <path d="M860 340 V438 H380 V340" stroke="#dc2626" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
    <rect x="385" y="405" width="470" height="70" rx="16" fill="#991b1b"/>
    <text x="620" y="433" fill="#fca5a5" font-size="17" font-weight="700">Artifact or behavior differs?</text>
    <text x="620" y="458" fill="#fca5a5" font-size="14">Return to ownership and semantics.</text>

    <rect x="205" y="520" width="790" height="78" rx="18" fill="#1e293b"/>
    <text x="600" y="553" fill="#e2e8f0" font-size="18" font-weight="700">Success criterion</text>
    <text x="600" y="579" fill="#94a3b8" font-size="15">The built artifact and deployment path behave the same from a clean environment.</text>
  </g>
</svg>
