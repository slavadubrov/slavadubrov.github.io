<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Different consumers read different pyproject.toml namespaces</title>
  <desc id="desc">A central pyproject.toml connects to build frontends and backends, package installers and resolvers, environment managers, and development tools. Each consumer produces a different artifact or action.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#64748b"/></marker></defs>
  <rect width="1200" height="680" rx="28" fill="#0f172a"/>
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="sans-serif" font-size="30" font-weight="700">Shared location does not mean shared semantics</text>
  <g font-family="sans-serif" text-anchor="middle">
    <rect x="420" y="260" width="360" height="150" rx="24" fill="#172554" stroke="#60a5fa" stroke-width="2"/>
    <text x="600" y="323" fill="#dbeafe" font-size="27" font-weight="700">pyproject.toml</text>
    <text x="600" y="360" fill="#93c5fd" font-size="16">declarations + configuration</text>

    <path d="M500 260 L330 182" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="70" y="92" width="310" height="105" rx="18" fill="#1e3a8a"/>
    <text x="225" y="132" fill="#bfdbfe" font-size="20" font-weight="700">Build system</text>
    <text x="225" y="164" fill="#93c5fd" font-size="15">produces sdist + wheel</text>

    <path d="M700 260 L870 182" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="820" y="92" width="310" height="105" rx="18" fill="#3b176f"/>
    <text x="975" y="132" fill="#ddd6fe" font-size="20" font-weight="700">Installer + resolver</text>
    <text x="975" y="164" fill="#c4b5fd" font-size="15">selects an environment</text>

    <path d="M500 410 L330 492" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="70" y="480" width="310" height="105" rx="18" fill="#064e3b"/>
    <text x="225" y="520" fill="#99f6e4" font-size="20" font-weight="700">Environment manager</text>
    <text x="225" y="552" fill="#5eead4" font-size="15">syncs groups + writes lock</text>

    <path d="M700 410 L870 492" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="820" y="480" width="310" height="105" rx="18" fill="#78350f"/>
    <text x="975" y="520" fill="#fde68a" font-size="20" font-weight="700">Named tool</text>
    <text x="975" y="552" fill="#fcd34d" font-size="15">reads only its own namespace</text>

    <text x="600" y="636" fill="#94a3b8" font-size="16">Review each table against the documentation of the consumer that owns it.</text>
  </g>
</svg>
