<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" role="img" aria-labelledby="title desc">
  <title id="title">The word product modeled differently across bounded contexts</title>
  <desc id="desc">Order Management, Billing, and Inventory each define product for their own rules. A published translation contract maps terms and identifiers between them.</desc>
  <rect width="1000" height="470" rx="22" fill="#0f172a"/>
  <text x="500" y="48" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">One word, three bounded meanings</text>
  <g font-family="system-ui, sans-serif">
    <g transform="translate(35 105)"><rect width="270" height="220" rx="16" fill="#172554" stroke="#3b82f6" stroke-width="2"/><text x="135" y="42" text-anchor="middle" font-size="18" font-weight="700" fill="#93c5fd">Order Management</text><text x="135" y="90" text-anchor="middle" font-size="16" font-weight="700" fill="#dbeafe">Product = order line</text><text x="35" y="130" font-size="13" fill="#cbd5e1">quantity</text><text x="35" y="158" font-size="13" fill="#cbd5e1">delivery promise</text><text x="35" y="186" font-size="13" fill="#cbd5e1">fulfillment status</text></g>
    <g transform="translate(365 105)"><rect width="270" height="220" rx="16" fill="#052e2b" stroke="#14b8a6" stroke-width="2"/><text x="135" y="42" text-anchor="middle" font-size="18" font-weight="700" fill="#5eead4">Billing</text><text x="135" y="90" text-anchor="middle" font-size="16" font-weight="700" fill="#ccfbf1">Product = priced line</text><text x="35" y="130" font-size="13" fill="#cbd5e1">tax category</text><text x="35" y="158" font-size="13" fill="#cbd5e1">discount eligibility</text><text x="35" y="186" font-size="13" fill="#cbd5e1">settlement amount</text></g>
    <g transform="translate(695 105)"><rect width="270" height="220" rx="16" fill="#422006" stroke="#f59e0b" stroke-width="2"/><text x="135" y="42" text-anchor="middle" font-size="18" font-weight="700" fill="#fbbf24">Inventory</text><text x="135" y="90" text-anchor="middle" font-size="16" font-weight="700" fill="#fef3c7">Product = stock item</text><text x="35" y="130" font-size="13" fill="#cbd5e1">SKU</text><text x="35" y="158" font-size="13" fill="#cbd5e1">warehouse location</text><text x="35" y="186" font-size="13" fill="#cbd5e1">available quantity</text></g>
    <rect x="180" y="370" width="640" height="60" rx="12" fill="#2e1065" stroke="#8b5cf6"/>
    <text x="500" y="395" text-anchor="middle" font-size="15" font-weight="700" fill="#c4b5fd">Published translation contract</text>
    <text x="500" y="418" text-anchor="middle" font-size="12" fill="#ddd6fe">Maps identifiers and terms without forcing one shared Product object</text>
  </g>
</svg>
