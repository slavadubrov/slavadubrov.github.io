<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">The word product modeled differently across bounded contexts</title>
  <desc id="desc">Order Management, Billing, and Inventory each define product for their own rules. A published translation contract maps terms and identifiers between them.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="470" rx="22" fill="#0f172a"/>
  <text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">One word, three bounded meanings</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(35 105)"><rect width="270" height="220" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2"/><text x="135" y="42" text-anchor="middle" font-size="18" font-weight="700" fill="#93c5fd">Order Management</text><text x="135" y="90" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Product = order line</text><text x="35" y="130" font-size="13" fill="#cbd5e1">quantity</text><text x="35" y="158" font-size="13" fill="#cbd5e1">delivery promise</text><text x="35" y="186" font-size="13" fill="#cbd5e1">fulfillment status</text></g>
    <g transform="translate(365 105)"><rect width="270" height="220" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2"/><text x="135" y="42" text-anchor="middle" font-size="18" font-weight="700" fill="#93c5fd">Billing</text><text x="135" y="90" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Product = priced line</text><text x="35" y="130" font-size="13" fill="#cbd5e1">tax category</text><text x="35" y="158" font-size="13" fill="#cbd5e1">discount eligibility</text><text x="35" y="186" font-size="13" fill="#cbd5e1">settlement amount</text></g>
    <g transform="translate(695 105)"><rect width="270" height="220" rx="16" fill="#9a3412" stroke="#ea580c" stroke-width="2"/><text x="135" y="42" text-anchor="middle" font-size="18" font-weight="700" fill="#fdba74">Inventory</text><text x="135" y="90" text-anchor="middle" font-size="16" font-weight="700" fill="#fdba74">Product = stock item</text><text x="35" y="130" font-size="13" fill="#cbd5e1">SKU</text><text x="35" y="158" font-size="13" fill="#cbd5e1">warehouse location</text><text x="35" y="186" font-size="13" fill="#cbd5e1">available quantity</text></g>
    <rect x="180" y="370" width="640" height="60" rx="12" fill="#5b21b6" stroke="#2563eb"/>
    <text x="500" y="395" text-anchor="middle" font-size="15" font-weight="700" fill="#c4b5fd">Published translation contract</text>
    <text x="500" y="418" text-anchor="middle" font-size="12" fill="#93c5fd">Maps identifiers and terms without forcing one shared Product object</text>
  </g>
</svg>
