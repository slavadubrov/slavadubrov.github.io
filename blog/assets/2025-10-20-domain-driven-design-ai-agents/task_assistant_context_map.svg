<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 430" role="img" aria-labelledby="title desc">
  <title id="title">Task management, scheduling, and notification contexts</title>
  <desc id="desc">Task Management is the core domain. It uses a supporting Scheduling context and publishes facts consumed by a generic Notification context through explicit contracts.</desc>
  <rect width="1000" height="430" rx="22" fill="#0f172a"/>
  <text x="500" y="48" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Task assistant context map</text>
  <g font-family="system-ui, sans-serif">
    <g transform="translate(35 120)"><rect width="250" height="190" rx="16" fill="#172554" stroke="#3b82f6" stroke-width="2"/><text x="125" y="42" text-anchor="middle" font-size="18" font-weight="700" fill="#93c5fd">Scheduling</text><text x="125" y="72" text-anchor="middle" font-size="13" fill="#bfdbfe">Supporting subdomain</text><text x="32" y="116" font-size="13" fill="#cbd5e1">calendar</text><text x="32" y="145" font-size="13" fill="#cbd5e1">time window</text><text x="32" y="174" font-size="13" fill="#cbd5e1">availability</text></g>
    <text x="330" y="220" text-anchor="middle" font-size="11" fill="#94a3b8">date contract →</text>
    <g transform="translate(375 95)"><rect width="250" height="240" rx="16" fill="#422006" stroke="#f59e0b" stroke-width="3"/><text x="125" y="46" text-anchor="middle" font-size="19" font-weight="700" fill="#fbbf24">Task Management</text><text x="125" y="78" text-anchor="middle" font-size="13" fill="#fde68a">Core domain</text><text x="32" y="125" font-size="13" fill="#cbd5e1">task and task list</text><text x="32" y="156" font-size="13" fill="#cbd5e1">deadline and priority</text><text x="32" y="187" font-size="13" fill="#cbd5e1">completion rules</text><text x="32" y="218" font-size="13" fill="#cbd5e1">TaskAdded event</text></g>
    <text x="670" y="220" text-anchor="middle" font-size="11" fill="#94a3b8">event contract →</text>
    <g transform="translate(715 120)"><rect width="250" height="190" rx="16" fill="#052e2b" stroke="#14b8a6" stroke-width="2"/><text x="125" y="42" text-anchor="middle" font-size="18" font-weight="700" fill="#5eead4">Notifications</text><text x="125" y="72" text-anchor="middle" font-size="13" fill="#99f6e4">Generic subdomain</text><text x="32" y="116" font-size="13" fill="#cbd5e1">email delivery</text><text x="32" y="145" font-size="13" fill="#cbd5e1">push delivery</text><text x="32" y="174" font-size="13" fill="#cbd5e1">delivery receipt</text></g>
    <text x="500" y="390" text-anchor="middle" font-size="13" fill="#94a3b8">The context map describes business relationships; it does not prescribe one agent per box.</text>
  </g>
</svg>
