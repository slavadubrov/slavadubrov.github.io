<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="DDD Layered Architecture" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="artifact-title">DDD Layered Architecture</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#334155" flood-opacity="0.08" />
    </filter>
    <linearGradient id="grad-domain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #fca5a5;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #fca5a5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-app" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #fdba74;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #fdba74;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-infra" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #86efac;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #86efac;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-interface" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #93c5fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color: #93c5fd;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>


  <rect width="100%" height="100%" fill="#f8fafc" /><g transform="translate(500, 300)">

    <circle r="200" fill="url(#grad-interface)" stroke="#2563eb" stroke-width="2" />
    <text y="-170" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="bold" fill="#1d4ed8" text-anchor="middle">Interface Layer</text>
    <text y="-155" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#1d4ed8" text-anchor="middle">API, CLI, Event Consumers</text>


    <circle r="150" fill="url(#grad-infra)" stroke="#16a34a" stroke-width="2" />
    <text y="-120" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="bold" fill="#166534" text-anchor="middle">Infrastructure</text>
    <text y="-105" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#166534" text-anchor="middle">Repositories, DB, APIs</text>


    <circle r="100" fill="url(#grad-app)" stroke="#ea580c" stroke-width="2" />
    <text y="-70" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="bold" fill="#9a3412" text-anchor="middle">Application</text>
    <text y="-55" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#9a3412" text-anchor="middle">Use Cases</text>


    <circle r="50" fill="url(#grad-domain)" stroke="#dc2626" stroke-width="2" filter="url(#shadow)" />
    <text y="5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#991b1b" text-anchor="middle">Domain</text>
  </g>


  <g transform="translate(50, 250)" filter="url(#shadow)">
    <rect width="140" height="100" rx="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="3" />
    <text y="40" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="bold" fill="#5b21b6" text-anchor="middle" x="70">LLM</text>
    <text y="65" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#5b21b6" text-anchor="middle" x="70">"The Brain"</text>
    <text y="80" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#5b21b6" text-anchor="middle" x="70">(Unpredictable)</text>
  </g>



  <path d="M 190 300 L 290 300" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrowhead)" />
  <text y="290" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold" fill="#334155" text-anchor="middle" x="240">Input</text>

</svg>
