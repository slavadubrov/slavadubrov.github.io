<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Model output translated into a domain command and checked by deterministic rules</title>
  <desc id="desc">A model emits an untrusted typed proposal. An application boundary parses and normalizes it, authorizes the actor, invokes an aggregate, and saves accepted state with an outbox event. Each rejected stage returns a distinct failure.</desc>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="480" rx="22" fill="#0f172a"/>
  <text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">A typed proposal is not yet a valid business operation</text>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(25 120)"><rect width="155" height="125" rx="14" fill="#5b21b6" stroke="#2563eb" stroke-width="2"/><text x="77" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#c4b5fd">Model adapter</text><text x="77" y="70" text-anchor="middle" font-size="12" fill="#c4b5fd">AddTaskProposal</text><text x="77" y="94" text-anchor="middle" font-size="12" fill="#94a3b8">untrusted values</text></g>
    <text x="202" y="192" text-anchor="middle" font-size="25" fill="#94a3b8">→</text>
    <g transform="translate(225 120)"><rect width="155" height="125" rx="14" fill="#1d4ed8" stroke="#2563eb" stroke-width="2"/><text x="77" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Parse + normalize</text><text x="77" y="70" text-anchor="middle" font-size="12" fill="#93c5fd">shape, date, units</text><text x="77" y="94" text-anchor="middle" font-size="12" fill="#94a3b8">trusted context</text></g>
    <text x="402" y="192" text-anchor="middle" font-size="25" fill="#94a3b8">→</text>
    <g transform="translate(425 120)"><rect width="155" height="125" rx="14" fill="#9a3412" stroke="#ea580c" stroke-width="2"/><text x="77" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#fdba74">Authorize</text><text x="77" y="70" text-anchor="middle" font-size="12" fill="#fdba74">actor + owner</text><text x="77" y="94" text-anchor="middle" font-size="12" fill="#94a3b8">operation scope</text></g>
    <text x="602" y="192" text-anchor="middle" font-size="25" fill="#94a3b8">→</text>
    <g transform="translate(625 120)"><rect width="155" height="125" rx="14" fill="#1d4ed8" stroke="#2563eb" stroke-width="2"/><text x="77" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Aggregate</text><text x="77" y="70" text-anchor="middle" font-size="12" fill="#93c5fd">enforce invariant</text><text x="77" y="94" text-anchor="middle" font-size="12" fill="#94a3b8">raise domain event</text></g>
    <text x="802" y="192" text-anchor="middle" font-size="25" fill="#94a3b8">→</text>
    <g transform="translate(825 120)"><rect width="150" height="125" rx="14" fill="#1d4ed8" stroke="#2563eb" stroke-width="2"/><text x="75" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Commit</text><text x="75" y="70" text-anchor="middle" font-size="12" fill="#93c5fd">state + outbox</text><text x="75" y="94" text-anchor="middle" font-size="12" fill="#94a3b8">one transaction</text></g>

    <rect x="100" y="320" width="800" height="85" rx="14" fill="#991b1b" stroke="#dc2626"/>
    <text x="500" y="351" text-anchor="middle" font-size="16" font-weight="700" fill="#fca5a5">Reject with a specific failure before persistence</text>
    <text x="500" y="382" text-anchor="middle" font-size="13" fill="#fca5a5">invalid proposal • missing context • unauthorized actor • domain conflict • concurrent update</text>
    <text x="500" y="447" text-anchor="middle" font-size="13" fill="#94a3b8">Schema validation controls representation. The aggregate controls business meaning.</text>
  </g>
</svg>
