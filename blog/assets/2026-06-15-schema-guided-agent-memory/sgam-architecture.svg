<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">Schema-Guided Agent Memory architecture</title>
  <desc id="desc">A flow diagram showing SGR-on-write, SGAM-at-rest, and retrieval-on-read.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#34495e"/>
    </marker>
    <style>
      .bg { fill: #f8f9fa; }
      .box { fill: #ffffff; stroke: #d0d7de; stroke-width: 2; rx: 12; filter: url(#shadow); }
      .blue { fill: #e3f2fd; stroke: #1565c0; }
      .purple { fill: #f3e5f5; stroke: #6a1b9a; }
      .green { fill: #e8f5e9; stroke: #2e7d32; }
      .orange { fill: #fff3e0; stroke: #e65100; }
      .red { fill: #fce4ec; stroke: #c62828; }
      .title { font: 700 24px Arial, sans-serif; fill: #1f2937; }
      .label { font: 700 17px Arial, sans-serif; fill: #1f2937; }
      .small { font: 14px Arial, sans-serif; fill: #374151; }
      .tiny { font: 12px Arial, sans-serif; fill: #4b5563; }
      .arrow { stroke: #34495e; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1120" height="620"/>
  <text class="title" x="42" y="48">SGR-on-write, SGAM-at-rest, retrieval-on-read</text>
  <text class="small" x="42" y="76">Schema-guided reasoning validates the write. Schema-guided memory preserves state after the model call.</text>

  <rect class="box blue" x="42" y="120" width="210" height="112"/>
  <text class="label" x="66" y="154">Episode stream</text>
  <text class="small" x="66" y="184">messages, tool results,</text>
  <text class="small" x="66" y="204">business events</text>

  <rect class="box purple" x="312" y="105" width="240" height="142"/>
  <text class="label" x="336" y="139">SGR-on-write</text>
  <text class="small" x="336" y="169">extract typed records</text>
  <text class="small" x="336" y="191">validate schema</text>
  <text class="small" x="336" y="213">reject malformed writes</text>

  <rect class="box orange" x="612" y="105" width="224" height="142"/>
  <text class="label" x="636" y="139">Conflict rules</text>
  <text class="small" x="636" y="169">supersede stale facts</text>
  <text class="small" x="636" y="191">track valid time</text>
  <text class="small" x="636" y="213">keep provenance</text>

  <rect class="box green" x="896" y="90" width="182" height="172"/>
  <text class="label" x="920" y="124">SGAM store</text>
  <text class="small" x="920" y="154">tenant_id</text>
  <text class="small" x="920" y="176">schema_version</text>
  <text class="small" x="920" y="198">valid_from/to</text>
  <text class="small" x="920" y="220">source_episode_id</text>

  <path class="arrow" d="M252 176 H300"/>
  <path class="arrow" d="M552 176 H600"/>
  <path class="arrow" d="M836 176 H884"/>

  <rect class="box blue" x="112" y="356" width="210" height="120"/>
  <text class="label" x="136" y="390">User question</text>
  <text class="small" x="136" y="420">current state?</text>
  <text class="small" x="136" y="442">historical state?</text>

  <rect class="box green" x="392" y="338" width="250" height="156"/>
  <text class="label" x="416" y="372">Retrieval-on-read</text>
  <text class="small" x="416" y="402">filter tenant + type</text>
  <text class="small" x="416" y="424">choose active time slice</text>
  <text class="small" x="416" y="446">attach source evidence</text>

  <rect class="box red" x="720" y="350" width="250" height="132"/>
  <text class="label" x="744" y="384">Context assembly</text>
  <text class="small" x="744" y="414">small, current, cited facts</text>
  <text class="small" x="744" y="436">not every old note</text>

  <path class="arrow" d="M322 416 H380"/>
  <path class="arrow" d="M642 416 H708"/>
  <path class="arrow" d="M987 262 C987 304 548 292 548 326"/>

  <text class="tiny" x="42" y="574">Production variants can use JSON stores, relational tables, property graphs, vector sidecars, or managed memory platforms. The invariant is the typed memory contract.</text>
</svg>
