<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="900" height="460" fill="#fafbfc" rx="8"/>

  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">The Parallelism Decision Framework</text>

  <!-- Edges -->
  <path d="M 450 70 L 450 86" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <path d="M 380 110 L 150 110 L 150 231" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="330" y="105" font-size="12" font-weight="bold" fill="#2e7d32">Yes</text>

  <path d="M 450 130 L 450 156" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="460" y="148" font-size="12" font-weight="bold" fill="#c62828">No</text>

  <path d="M 450 200 L 450 231" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="460" y="222" font-size="12" font-weight="bold" fill="#2e7d32">Yes</text>

  <path d="M 520 180 L 750 180 L 750 231" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="560" y="175" font-size="12" font-weight="bold" fill="#c62828">No</text>

  <path d="M 150 285 L 150 305 L 450 305" fill="none" stroke="#333" stroke-width="2"/>
  <path d="M 750 285 L 750 305 L 450 305" fill="none" stroke="#333" stroke-width="2"/>
  <path d="M 450 285 L 450 316" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <path d="M 450 360 L 450 391" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="460" y="380" font-size="12" font-weight="bold" fill="#c62828">No</text>

  <path d="M 520 340 L 666 340" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="560" y="335" font-size="12" font-weight="bold" fill="#2e7d32">Yes</text>

  <path d="M 750 360 L 750 415 L 514 415" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Nodes -->
  <rect x="410" y="40" width="80" height="30" rx="15" fill="#eeeeee" stroke="#9e9e9e" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="59" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Start</text>

  <rect x="380" y="90" width="140" height="40" rx="20" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="114" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">Fits on 1 GPU?</text>

  <rect x="380" y="160" width="140" height="40" rx="20" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="184" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">Fits on 1 Node?</text>

  <rect x="60" y="235" width="180" height="50" rx="6" fill="#fff" stroke="#1565c0" stroke-width="2" filter="url(#shadow)"/>
  <text x="150" y="255" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">DP Only</text>
  <text x="150" y="272" text-anchor="middle" font-size="11" fill="#555">(Data Parallelism)</text>

  <rect x="360" y="235" width="180" height="50" rx="6" fill="#fff" stroke="#1565c0" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="255" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">TP + DP</text>
  <text x="450" y="272" text-anchor="middle" font-size="11" fill="#555">(Tensor within, Data across)</text>

  <rect x="630" y="235" width="240" height="50" rx="6" fill="#fff" stroke="#1565c0" stroke-width="2" filter="url(#shadow)"/>
  <text x="750" y="255" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">TP + PP + DP</text>
  <text x="750" y="272" text-anchor="middle" font-size="11" fill="#555">(Tensor within, Pipeline across)</text>

  <rect x="380" y="320" width="140" height="40" rx="20" fill="#fff3e0" stroke="#e65100" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="344" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">MoE Model?</text>

  <rect x="670" y="320" width="160" height="40" rx="6" fill="#fff" stroke="#e65100" stroke-width="2" filter="url(#shadow)"/>
  <text x="750" y="338" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">Add EP</text>
  <text x="750" y="352" text-anchor="middle" font-size="10" fill="#555">(Expert Parallelism)</text>

  <rect x="390" y="395" width="120" height="40" rx="20" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="420" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">Deploy</text>
</svg>
