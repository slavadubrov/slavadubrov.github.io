<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Inference Optimization Stack" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="artifact-title">Inference Optimization Stack</title>
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <filter id="shadow1" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="900" height="520" fill="#f8fafc" rx="8"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">The inference optimization stack</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#334155">How techniques compose to deliver production-grade LLM serving</text>

  <!-- Layer 1: Hardware Foundation -->
  <rect x="50" y="420" width="800" height="70" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="80" y="448" font-size="13" font-weight="bold" fill="#1d4ed8">Hardware foundation</text>
  <text x="80" y="468" font-size="11" fill="#0f172a">GPU memory hierarchy: HBM3 (3.35 TB/s) → L2 (12 TB/s) → SRAM (33 TB/s)</text>
  <text x="80" y="483" font-size="10" fill="#334155">Measure the compute, memory, and communication bottleneck on the target GPU</text>

  <!-- Layer 2: Kernel Optimizations -->
  <rect x="50" y="330" width="380" height="75" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="70" y="355" font-size="13" font-weight="bold" fill="#166534">Kernel optimizations</text>
  <text x="70" y="373" font-size="11" fill="#0f172a">FlashAttention (tiling in SRAM)</text>
  <text x="70" y="388" font-size="11" fill="#0f172a">Fused kernels (reduce HBM round-trips)</text>
  <text x="70" y="398" font-size="10" fill="#334155">Profile utilization on the deployed graph</text>

  <rect x="450" y="330" width="400" height="75" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="470" y="355" font-size="13" font-weight="bold" fill="#9a3412">Quantization</text>
  <text x="470" y="373" font-size="11" fill="#0f172a">FP8, INT8, INT4 (AWQ/GPTQ)</text>
  <text x="470" y="388" font-size="11" fill="#0f172a">Kernel quality: 2.6× speed difference</text>
  <text x="470" y="398" font-size="10" fill="#334155">50-75% memory reduction</text>

  <!-- Layer 3: Memory Management -->
  <rect x="50" y="240" width="380" height="75" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="70" y="265" font-size="13" font-weight="bold" fill="#5b21b6">Memory management</text>
  <text x="70" y="283" font-size="11" fill="#0f172a">PagedAttention (block-based KV allocation)</text>
  <text x="70" y="298" font-size="11" fill="#0f172a">GQA/MQA (8-16× KV cache reduction)</text>
  <text x="70" y="308" font-size="10" fill="#334155">Published gains depend on workload and harness</text>

  <rect x="450" y="240" width="400" height="75" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="470" y="265" font-size="13" font-weight="bold" fill="#5b21b6">Scheduling</text>
  <text x="470" y="283" font-size="11" fill="#0f172a">Continuous batching (iteration-level)</text>
  <text x="470" y="298" font-size="11" fill="#0f172a">Chunked prefill (protects decode latency)</text>
  <text x="470" y="308" font-size="10" fill="#334155">Tune for goodput at the target SLO</text>

  <!-- Layer 4: Serving Strategies -->
  <rect x="50" y="150" width="250" height="75" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="70" y="175" font-size="13" font-weight="bold" fill="#1d4ed8">Caching</text>
  <text x="70" y="193" font-size="11" fill="#0f172a">Prefix caching (measure the hit rate)</text>
  <text x="70" y="208" font-size="11" fill="#0f172a">RadixAttention (tree-based KV reuse)</text>

  <rect x="320" y="150" width="260" height="75" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="340" y="175" font-size="13" font-weight="bold" fill="#1d4ed8">Speculation</text>
  <text x="340" y="193" font-size="11" fill="#0f172a">Speculative decoding (verify drafts)</text>
  <text x="340" y="208" font-size="11" fill="#0f172a">Acceptance rate controls the gain</text>

  <rect x="600" y="150" width="250" height="75" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="620" y="175" font-size="13" font-weight="bold" fill="#1d4ed8">Parallelism</text>
  <text x="620" y="193" font-size="11" fill="#0f172a">TP (intra-node, NVLink)</text>
  <text x="620" y="208" font-size="11" fill="#0f172a">PP (inter-node) + DP (scaling)</text>

  <!-- Layer 5: Application Layer -->
  <rect x="50" y="70" width="800" height="65" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="80" y="95" font-size="13" font-weight="bold" fill="#991b1b">Application layer</text>
  <text x="80" y="113" font-size="11" fill="#0f172a">Model routing · Token-aware rate limiting · Monitoring (goodput, KV utilization, TTFT/TPOT)</text>
  <text x="80" y="128" font-size="10" fill="#334155">Combine techniques only after measuring their quality, latency, and cost effects</text>

  <!-- Connecting arrows -->
  <line x1="240" y1="420" x2="240" y2="405" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow1)"/>
  <line x1="650" y1="420" x2="650" y2="405" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow1)"/>
  <line x1="240" y1="330" x2="240" y2="315" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow1)"/>
  <line x1="650" y1="330" x2="650" y2="315" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow1)"/>
  <line x1="175" y1="240" x2="175" y2="225" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow1)"/>
  <line x1="450" y1="240" x2="450" y2="225" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow1)"/>
  <line x1="725" y1="240" x2="725" y2="225" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow1)"/>
  <line x1="450" y1="150" x2="450" y2="135" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow1)"/>
</svg>
