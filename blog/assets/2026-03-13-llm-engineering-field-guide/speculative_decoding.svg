<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 380">
  <defs>
    <style>
      .draft-model { fill: #b2dfdb; stroke: #00897b; stroke-width: 2; rx: 8; }
      .target-model { fill: #c5cae9; stroke: #3f51b5; stroke-width: 2; rx: 8; }
      .token { fill: #fff3e0; stroke: #f57c00; stroke-width: 2; rx: 4; }
      .token-accepted { fill: #c8e6c9; stroke: #4caf50; stroke-width: 2; rx: 4; }
      .token-rejected { fill: #ffcdd2; stroke: #f44336; stroke-width: 2; rx: 4; }
      .token-discard { fill: #f5f5f5; stroke: #ccc; stroke-width: 2; stroke-dasharray: 4,4; rx: 4; }
      .arrow { stroke: #333; stroke-width: 2; marker-end: url(#arrowhead); }
      .arrow-red { stroke: #f44336; stroke-width: 2; marker-end: url(#arrowhead-red); }
      .text { font-family: Arial, sans-serif; font-size: 14px; text-anchor: middle; fill: #333; font-weight: bold; }
      .desc { font-family: Arial, sans-serif; font-size: 12px; text-anchor: middle; fill: #333; }
      .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; text-anchor: middle; fill: #222; }
      .subtitle { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #444; text-anchor: start; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f44336" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="white" />
  <text x="500" y="30" class="title">Speculative Decoding</text>

  <!-- Step 1: Draft Model -->
  <text x="40" y="75" class="subtitle">1. Draft Generation (Sequential, Memory-Bound)</text>

  <rect x="50" y="95" width="140" height="60" class="draft-model" />
  <text x="120" y="120" class="text">Draft Model</text>
  <text x="120" y="140" class="desc">~1B Params</text>

  <line x1="190" y1="125" x2="230" y2="125" class="arrow" />

  <!-- Draft Tokens -->
  <rect x="250" y="105" width="50" height="40" class="token" />
  <text x="275" y="130" class="text">T₁</text>

  <line x1="300" y1="125" x2="330" y2="125" class="arrow" />

  <rect x="340" y="105" width="50" height="40" class="token" />
  <text x="365" y="130" class="text">T₂</text>

  <line x1="390" y1="125" x2="420" y2="125" class="arrow" />

  <rect x="430" y="105" width="50" height="40" class="token" />
  <text x="455" y="130" class="text">T₃</text>

  <line x1="480" y1="125" x2="510" y2="125" class="arrow" />

  <rect x="520" y="105" width="50" height="40" class="token" />
  <text x="545" y="130" class="text">T₄</text>

  <!-- Bracket for Candidate Tokens -->
  <line x1="250" y1="155" x2="250" y2="170" stroke="#333" stroke-width="2" />
  <line x1="570" y1="155" x2="570" y2="170" stroke="#333" stroke-width="2" />
  <line x1="250" y1="170" x2="570" y2="170" stroke="#333" stroke-width="2" />

  <text x="410" y="195" class="subtitle" text-anchor="middle">K=4 Candidate Tokens</text>
  <line x1="410" y1="205" x2="410" y2="245" class="arrow" />

  <!-- Step 2: Verification -->
  <text x="40" y="235" class="subtitle">2. Target Verification (Parallel, Compute-Bound)</text>

  <rect x="50" y="255" width="140" height="60" class="target-model" />
  <text x="120" y="280" class="text">Target Model</text>
  <text x="120" y="300" class="desc">~70B Params</text>

  <line x1="190" y1="285" x2="230" y2="285" class="arrow" />

  <!-- Verification Block -->
  <rect x="250" y="255" width="320" height="60" fill="#f0f0f0" stroke="#999" stroke-width="2" stroke-dasharray="4,4" />
  <text x="410" y="280" class="text">Verifies all K tokens in a single forward pass</text>
  <text x="410" y="300" class="desc">(Same cost as generating 1 token)</text>

  <line x1="570" y1="285" x2="610" y2="285" class="arrow" />

  <!-- Result Tokens Space Increased! -->
  <rect x="610" y="265" width="50" height="40" class="token-accepted" />
  <text x="635" y="290" class="text">T₁</text>

  <rect x="700" y="265" width="50" height="40" class="token-accepted" />
  <text x="725" y="290" class="text">T₂</text>

  <!-- Rejected token -->
  <rect x="790" y="265" width="50" height="40" class="token-rejected" />
  <text x="815" y="290" class="text">T₃</text>

  <!-- Discarded token -->
  <rect x="880" y="265" width="50" height="40" class="token-discard" />
  <text x="905" y="290" class="text" fill="#999">T₄</text>

  <!-- Result Text safely spaced apart -->
  <text x="680" y="330" class="text" fill="#4caf50" font-size="12">Accepted</text>
  <text x="815" y="330" class="text" fill="#f44336" font-size="12">Rejected</text>
  <text x="905" y="330" class="text" fill="#999" font-size="12">Discarded</text>

  <!-- Fallback loop from T3 back to Draft Model (Up, Left, then into Draft Model) -->
  <line x1="815" y1="265" x2="815" y2="200" stroke="#f44336" stroke-width="2" stroke-dasharray="4,4" />
  <line x1="815" y1="200" x2="210" y2="200" stroke="#f44336" stroke-width="2" stroke-dasharray="4,4" />
  <line x1="210" y1="200" x2="210" y2="140" stroke="#f44336" stroke-width="2" stroke-dasharray="4,4" />
  <line x1="210" y1="140" x2="195" y2="140" class="arrow-red" />

  <text x="710" y="220" class="desc" fill="#f44336" font-weight="bold">Target Model outputs correct T₃</text>
  <text x="710" y="240" class="desc" fill="#f44336" font-weight="bold">Draft model resamples from T₃ onwards</text>

</svg>
