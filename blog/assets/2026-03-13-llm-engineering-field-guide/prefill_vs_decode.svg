<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="arrow2b" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e65100"/>
    </marker>
    <filter id="shadow2" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="900" height="400" fill="#fafbfc" rx="8"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">Prefill vs Decode: Two Phases, Two Bottlenecks</text>

  <!-- Prefill Phase -->
  <rect x="40" y="55" width="390" height="300" rx="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" filter="url(#shadow2)"/>
  <text x="235" y="82" text-anchor="middle" font-size="16" font-weight="bold" fill="#1565c0">Prefill Phase</text>

  <!-- Input prompt tokens -->
  <rect x="70" y="100" width="330" height="40" rx="5" fill="#fff" stroke="#1565c0" stroke-width="1"/>
  <text x="235" y="125" text-anchor="middle" font-size="12" fill="#333">Input Prompt: "Explain quantum computing in..."</text>

  <!-- Parallel processing arrows -->
  <g transform="translate(70, 155)">
    <rect width="60" height="30" rx="4" fill="#1565c0"/>
    <text x="30" y="20" text-anchor="middle" font-size="10" fill="#fff">Token 1</text>
  </g>
  <g transform="translate(140, 155)">
    <rect width="60" height="30" rx="4" fill="#1565c0"/>
    <text x="30" y="20" text-anchor="middle" font-size="10" fill="#fff">Token 2</text>
  </g>
  <g transform="translate(210, 155)">
    <rect width="60" height="30" rx="4" fill="#1565c0"/>
    <text x="30" y="20" text-anchor="middle" font-size="10" fill="#fff">Token 3</text>
  </g>
  <g transform="translate(280, 155)">
    <rect width="50" height="30" rx="4" fill="#1565c0"/>
    <text x="25" y="20" text-anchor="middle" font-size="10" fill="#fff">...</text>
  </g>
  <g transform="translate(340, 155)">
    <rect width="60" height="30" rx="4" fill="#1565c0"/>
    <text x="30" y="20" text-anchor="middle" font-size="10" fill="#fff">Token N</text>
  </g>
  <text x="235" y="205" text-anchor="middle" font-size="11" fill="#1565c0" font-weight="bold">All tokens processed in parallel</text>

  <!-- Properties -->
  <rect x="70" y="220" width="330" height="120" rx="6" fill="#fff" stroke="#1565c0" stroke-width="1" opacity="0.7"/>
  <text x="90" y="245" font-size="12" font-weight="bold" fill="#1565c0">COMPUTE-BOUND</text>
  <text x="90" y="265" font-size="11" fill="#333">• Large matrix multiplications (GEMM)</text>
  <text x="90" y="282" font-size="11" fill="#333">• Tensor Cores fully saturated</text>
  <text x="90" y="299" font-size="11" fill="#333">• Arithmetic intensity ≫ 295 FLOPs/byte</text>
  <text x="90" y="316" font-size="11" fill="#333">• Determines TTFT</text>
  <text x="90" y="333" font-size="11" fill="#e65100" font-weight="bold">• Optimize: faster GPUs, FP8, TP</text>

  <!-- Arrow between phases -->
  <line x1="430" y1="200" x2="470" y2="200" stroke="#333" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="450" y="220" text-anchor="middle" font-size="10" fill="#666">KV Cache</text>
  <text x="450" y="232" text-anchor="middle" font-size="10" fill="#666">populated</text>

  <!-- Decode Phase -->
  <rect x="470" y="55" width="390" height="300" rx="10" fill="#fff3e0" stroke="#e65100" stroke-width="2" filter="url(#shadow2)"/>
  <text x="665" y="82" text-anchor="middle" font-size="16" font-weight="bold" fill="#e65100">Decode Phase</text>

  <!-- Sequential token generation -->
  <rect x="500" y="100" width="330" height="40" rx="5" fill="#fff" stroke="#e65100" stroke-width="1"/>
  <text x="665" y="125" text-anchor="middle" font-size="12" fill="#333">Output: token → token → token → ...</text>

  <!-- Sequential arrows -->
  <g transform="translate(540, 155)">
    <rect width="60" height="30" rx="4" fill="#e65100"/>
    <text x="30" y="20" text-anchor="middle" font-size="10" fill="#fff">t₁</text>
  </g>
  <line x1="600" y1="170" x2="630" y2="170" stroke="#e65100" stroke-width="1.5" marker-end="url(#arrow2b)"/>
  <g transform="translate(630, 155)">
    <rect width="60" height="30" rx="4" fill="#e65100"/>
    <text x="30" y="20" text-anchor="middle" font-size="10" fill="#fff">t₂</text>
  </g>
  <line x1="690" y1="170" x2="720" y2="170" stroke="#e65100" stroke-width="1.5" marker-end="url(#arrow2b)"/>
  <g transform="translate(720, 155)">
    <rect width="60" height="30" rx="4" fill="#e65100"/>
    <text x="30" y="20" text-anchor="middle" font-size="10" fill="#fff">t₃</text>
  </g>
  <text x="665" y="205" text-anchor="middle" font-size="11" fill="#e65100" font-weight="bold">One token at a time, sequentially</text>

  <!-- Properties -->
  <rect x="500" y="220" width="330" height="120" rx="6" fill="#fff" stroke="#e65100" stroke-width="1" opacity="0.7"/>
  <text x="520" y="245" font-size="12" font-weight="bold" fill="#e65100">MEMORY-BANDWIDTH-BOUND</text>
  <text x="520" y="265" font-size="11" fill="#333">• Matrix-vector multiply per step</text>
  <text x="520" y="282" font-size="11" fill="#333">• Reads full weights + KV cache from HBM</text>
  <text x="520" y="299" font-size="11" fill="#333">• Arithmetic intensity ≈ 1 (300× below threshold)</text>
  <text x="520" y="316" font-size="11" fill="#333">• Determines TPOT</text>
  <text x="520" y="333" font-size="11" fill="#1565c0" font-weight="bold">• Optimize: GQA, KV quant, batching, BW</text>

  <!-- Timeline bar at bottom -->
  <rect x="40" y="370" width="820" height="20" rx="3" fill="#eee"/>
  <rect x="40" y="370" width="280" height="20" rx="3" fill="#1565c0" opacity="0.3"/>
  <rect x="320" y="370" width="540" height="20" rx="3" fill="#e65100" opacity="0.3"/>
  <text x="180" y="384" text-anchor="middle" font-size="10" fill="#1565c0" font-weight="bold">TTFT</text>
  <text x="590" y="384" text-anchor="middle" font-size="10" fill="#e65100" font-weight="bold">TPOT × Output Tokens</text>
</svg>
