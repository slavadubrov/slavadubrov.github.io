<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Roboto, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#546e7a"/>
    </marker>
    <style>
      .seq-item { opacity: 0; animation: fadeIn 0.5s forwards; }
      @keyframes fadeIn { to { opacity: 1; } }
      .eager-1 { animation-delay: 0.5s; }
      .eager-2 { animation-delay: 1.5s; }
      .eager-3 { animation-delay: 2.5s; }
      .eager-4 { animation-delay: 3.5s; }

      .lazy-1 { animation-delay: 0.5s; }
      .lazy-2 { animation-delay: 1.0s; }
      .lazy-3 { animation-delay: 1.5s; }
      .lazy-4 { animation-delay: 2.5s; }
      .lazy-5 { animation-delay: 3.5s; }
    </style>
  </defs>

  <rect width="900" height="480" rx="12" fill="#f8f9fa" stroke="#e0e0e0" stroke-width="1"/>
  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#212121">Eager vs. Lazy Execution</text>

  <!-- TOP: Eager (Pandas) -->
  <rect x="25" y="50" width="850" height="170" rx="10" fill="#fce4ec" stroke="#c62828" stroke-width="1.5"/>
  <text x="50" y="75" font-size="15" font-weight="bold" fill="#c62828">Pandas: Eager Execution (Single-Threaded)</text>

  <!-- Step 1: Read ALL -->
  <g class="seq-item eager-1">
    <rect x="50" y="92" width="130" height="50" rx="6" fill="#ffffff" stroke="#c62828" stroke-width="1.2"/>
    <text x="115" y="113" text-anchor="middle" font-size="11" font-weight="bold" fill="#c62828">read_parquet()</text>
    <text x="115" y="128" text-anchor="middle" font-size="10" fill="#777">ALL columns</text>
    <line x1="185" y1="117" x2="210" y2="117" stroke="#c62828" stroke-width="1.5" marker-end="url(#arr)"/>
  </g>

  <!-- Step 2: Full copy -->
  <g class="seq-item eager-2">
    <rect x="215" y="92" width="120" height="50" rx="6" fill="#ffffff" stroke="#c62828" stroke-width="1.2"/>
    <text x="275" y="113" text-anchor="middle" font-size="11" font-weight="bold" fill="#c62828">filter()</text>
    <text x="275" y="128" text-anchor="middle" font-size="10" fill="#777">Full copy in RAM</text>
    <line x1="340" y1="117" x2="365" y2="117" stroke="#c62828" stroke-width="1.5" marker-end="url(#arr)"/>
  </g>

  <!-- Step 3: Another copy -->
  <g class="seq-item eager-3">
    <rect x="370" y="92" width="120" height="50" rx="6" fill="#ffffff" stroke="#c62828" stroke-width="1.2"/>
    <text x="430" y="113" text-anchor="middle" font-size="11" font-weight="bold" fill="#c62828">groupby()</text>
    <text x="430" y="128" text-anchor="middle" font-size="10" fill="#777">Another copy</text>
    <line x1="495" y1="117" x2="520" y2="117" stroke="#c62828" stroke-width="1.5" marker-end="url(#arr)"/>
  </g>

  <!-- Result -->
  <g class="seq-item eager-4">
    <rect x="525" y="92" width="100" height="50" rx="6" fill="#c62828" stroke="#c62828" stroke-width="1.2"/>
    <text x="575" y="122" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Result</text>
  </g>

  <!-- CPU indicator -->
  <rect x="670" y="92" width="90" height="50" rx="6" fill="#ffcdd2" stroke="#c62828" stroke-width="1"/>
  <text x="715" y="110" text-anchor="middle" font-size="10" font-weight="bold" fill="#c62828">1 Core</text>
  <rect x="682" y="118" width="12" height="12" rx="2" fill="#c62828"/>
  <rect x="698" y="118" width="12" height="12" rx="2" fill="#e0e0e0"/>
  <rect x="714" y="118" width="12" height="12" rx="2" fill="#e0e0e0"/>
  <rect x="730" y="118" width="12" height="12" rx="2" fill="#e0e0e0"/>

  <!-- Memory bar -->
  <text x="50" y="168" font-size="11" fill="#c62828">RAM:</text>
  <rect x="90" y="157" width="530" height="14" rx="3" fill="#e0e0e0"/>
  <g class="seq-item eager-1"><rect x="90" y="157" width="180" height="14" rx="3" fill="#ef9a9a"/></g>
  <g class="seq-item eager-2"><rect x="270" y="157" width="120" height="14" rx="3" fill="#e57373"/></g>
  <g class="seq-item eager-3"><rect x="390" y="157" width="80" height="14" rx="3" fill="#ef5350"/></g>
  <text x="640" y="169" font-size="10" fill="#c62828">2-3x dataset size</text>

  <!-- Labels under memory bar -->
  <g class="seq-item eager-1"><text x="180" y="186" text-anchor="middle" font-size="9" fill="#888">Full file loaded</text></g>
  <g class="seq-item eager-2"><text x="330" y="186" text-anchor="middle" font-size="9" fill="#888">+ filtered copy</text></g>
  <g class="seq-item eager-3"><text x="430" y="186" text-anchor="middle" font-size="9" fill="#888">+ agg copy</text></g>

  <!-- BOTTOM: Lazy (Polars) -->
  <rect x="25" y="245" width="850" height="185" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="50" y="270" font-size="15" font-weight="bold" fill="#2e7d32">Polars: Lazy Execution (Multi-Threaded)</text>

  <!-- Phase 1: Build Plan -->
  <g class="seq-item lazy-1">
    <rect x="50" y="285" width="110" height="50" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2"/>
    <text x="105" y="306" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">scan_parquet()</text>
    <text x="105" y="322" text-anchor="middle" font-size="10" fill="#777">Schema only</text>
    <line x1="165" y1="310" x2="185" y2="310" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arr)"/>
  </g>

  <g class="seq-item lazy-2">
    <rect x="190" y="285" width="90" height="50" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2"/>
    <text x="235" y="306" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">.filter()</text>
    <text x="235" y="322" text-anchor="middle" font-size="10" fill="#777">Planned</text>
    <line x1="285" y1="310" x2="305" y2="310" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arr)"/>
  </g>

  <g class="seq-item lazy-3">
    <rect x="310" y="285" width="90" height="50" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.2"/>
    <text x="355" y="306" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">.group_by()</text>
    <text x="355" y="322" text-anchor="middle" font-size="10" fill="#777">Planned</text>
    <line x1="405" y1="310" x2="435" y2="310" stroke="#2e7d32" stroke-width="2" marker-end="url(#arr)"/>
  </g>

  <!-- Optimizer -->
  <g class="seq-item lazy-4">
    <rect x="440" y="280" width="150" height="60" rx="8" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.5"/>
    <text x="515" y="302" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">Query Optimizer</text>
    <text x="515" y="318" text-anchor="middle" font-size="10" fill="#555">Predicate Pushdown</text>
    <text x="515" y="332" text-anchor="middle" font-size="10" fill="#555">Column Pruning</text>
    <line x1="595" y1="310" x2="625" y2="310" stroke="#2e7d32" stroke-width="2" marker-end="url(#arr)"/>
  </g>

  <!-- Result -->
  <g class="seq-item lazy-5">
    <rect x="630" y="285" width="90" height="50" rx="6" fill="#2e7d32" stroke="#2e7d32" stroke-width="1.2"/>
    <text x="675" y="306" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">.collect()</text>
    <text x="675" y="322" text-anchor="middle" font-size="10" fill="#c8e6c9">Execute!</text>
  </g>

  <!-- CPU indicator: all cores -->
  <rect x="760" y="285" width="90" height="50" rx="6" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1"/>
  <text x="805" y="303" text-anchor="middle" font-size="10" font-weight="bold" fill="#2e7d32">All Cores</text>
  <rect x="772" y="313" width="12" height="12" rx="2" fill="#2e7d32"/>
  <rect x="788" y="313" width="12" height="12" rx="2" fill="#2e7d32"/>
  <rect x="804" y="313" width="12" height="12" rx="2" fill="#2e7d32"/>
  <rect x="820" y="313" width="12" height="12" rx="2" fill="#2e7d32"/>

  <!-- Memory bar -->
  <text x="50" y="362" font-size="11" fill="#2e7d32">RAM:</text>
  <rect x="90" y="351" width="530" height="14" rx="3" fill="#e0e0e0"/>
  <g class="seq-item lazy-5"><rect x="90" y="351" width="80" height="14" rx="3" fill="#81c784"/></g>
  <text x="640" y="363" font-size="10" fill="#2e7d32">Streaming batches</text>

  <text x="50" y="382" font-size="10" fill="#888">Only needed columns &amp; rows loaded. No intermediate copies.</text>

  <!-- Bottom comparison -->
  <rect x="50" y="435" width="370" height="38" rx="8" fill="#ffebee" stroke="#c62828" stroke-width="1"/>
  <text x="235" y="455" text-anchor="middle" font-size="12" font-weight="bold" fill="#c62828">Pandas: ~365s (PDS-H SF-10)</text>
  <text x="235" y="468" text-anchor="middle" font-size="10" fill="#c62828">Single-threaded, eager, memory-hungry</text>

  <rect x="480" y="435" width="370" height="38" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
  <text x="665" y="455" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">Polars: ~3.89s (94x faster)</text>
  <text x="665" y="468" text-anchor="middle" font-size="10" fill="#2e7d32">Multi-threaded, lazy, streaming</text>
</svg>
