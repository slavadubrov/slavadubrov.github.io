<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Inter, system-ui, sans-serif" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="title">Eager and lazy execution</title>
  <desc id="desc">An eager pipeline executes each operation in sequence, while a lazy engine first builds and optimizes a query plan.</desc>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#334155"/>
    </marker>
    <style>
      .seq-item { opacity: 0; animation: fadeIn 0.5s forwards; }
      @keyframes fadeIn { to { opacity: 1; } }
      .eager-1 { animation-delay: 0.5s; }
      .eager-2 { animation-delay: 1.5s; }
      .eager-3 { animation-delay: 2.5s; }
      .eager-4 { animation-delay: 3.5s; }

      .lazy-1 { animation-delay: 0.5s; }
      .lazy-2 { animation-delay: 1.0s; }
      .lazy-3 { animation-delay: 1.5s; }
      .lazy-4 { animation-delay: 2.5s; }
      .lazy-5 { animation-delay: 3.5s; }
    </style>
  </defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="900" height="480" rx="12" fill="#f8fafc" stroke="#f8fafc" stroke-width="1"/>
  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">Eager vs. Lazy Execution</text>

  <!-- TOP: Eager (Pandas) -->
  <rect x="25" y="50" width="850" height="170" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="50" y="75" font-size="15" font-weight="bold" fill="#991b1b">Typical eager DataFrame pipeline</text>

  <!-- Step 1: Read ALL -->
  <g class="seq-item eager-1">
    <rect x="50" y="92" width="130" height="50" rx="6" fill="#ffffff" stroke="#dc2626" stroke-width="1.2"/>
    <text x="115" y="113" text-anchor="middle" font-size="11" font-weight="bold" fill="#991b1b">read_parquet()</text>
    <text x="115" y="128" text-anchor="middle" font-size="10" fill="#334155">ALL columns</text>
    <line x1="185" y1="117" x2="210" y2="117" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arr)"/>
  </g>

  <!-- Step 2: Full copy -->
  <g class="seq-item eager-2">
    <rect x="215" y="92" width="120" height="50" rx="6" fill="#ffffff" stroke="#dc2626" stroke-width="1.2"/>
    <text x="275" y="113" text-anchor="middle" font-size="11" font-weight="bold" fill="#991b1b">filter()</text>
    <text x="275" y="128" text-anchor="middle" font-size="10" fill="#334155">Full copy in RAM</text>
    <line x1="340" y1="117" x2="365" y2="117" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arr)"/>
  </g>

  <!-- Step 3: Another copy -->
  <g class="seq-item eager-3">
    <rect x="370" y="92" width="120" height="50" rx="6" fill="#ffffff" stroke="#dc2626" stroke-width="1.2"/>
    <text x="430" y="113" text-anchor="middle" font-size="11" font-weight="bold" fill="#991b1b">groupby()</text>
    <text x="430" y="128" text-anchor="middle" font-size="10" fill="#334155">Another copy</text>
    <line x1="495" y1="117" x2="520" y2="117" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arr)"/>
  </g>

  <!-- Result -->
  <g class="seq-item eager-4">
    <rect x="525" y="92" width="100" height="50" rx="6" fill="#dc2626" stroke="#dc2626" stroke-width="1.2"/>
    <text x="575" y="122" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Result</text>
  </g>

  <!-- CPU indicator -->
  <rect x="670" y="92" width="90" height="50" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="715" y="110" text-anchor="middle" font-size="10" font-weight="bold" fill="#991b1b">Limited plan</text>
  <rect x="682" y="118" width="12" height="12" rx="2" fill="#dc2626"/>
  <rect x="698" y="118" width="12" height="12" rx="2" fill="#cbd5e1"/>
  <rect x="714" y="118" width="12" height="12" rx="2" fill="#cbd5e1"/>
  <rect x="730" y="118" width="12" height="12" rx="2" fill="#cbd5e1"/>

  <!-- Memory bar -->
  <text x="50" y="168" font-size="11" fill="#991b1b">RAM:</text>
  <rect x="90" y="157" width="530" height="14" rx="3" fill="#cbd5e1"/>
  <g class="seq-item eager-1"><rect x="90" y="157" width="180" height="14" rx="3" fill="#dc2626"/></g>
  <g class="seq-item eager-2"><rect x="270" y="157" width="120" height="14" rx="3" fill="#dc2626"/></g>
  <g class="seq-item eager-3"><rect x="390" y="157" width="80" height="14" rx="3" fill="#dc2626"/></g>
  <text x="640" y="169" font-size="10" fill="#991b1b">2-3x dataset size</text>

  <!-- Labels under memory bar -->
  <g class="seq-item eager-1"><text x="180" y="186" text-anchor="middle" font-size="9" fill="#64748b">Full file loaded</text></g>
  <g class="seq-item eager-2"><text x="330" y="186" text-anchor="middle" font-size="9" fill="#64748b">+ filtered copy</text></g>
  <g class="seq-item eager-3"><text x="430" y="186" text-anchor="middle" font-size="9" fill="#64748b">+ agg copy</text></g>

  <!-- BOTTOM: Lazy (Polars) -->
  <rect x="25" y="245" width="850" height="185" rx="10" fill="#f0fdf4" stroke="#166534" stroke-width="1.5"/>
  <text x="50" y="270" font-size="15" font-weight="bold" fill="#166534">Polars lazy query plan</text>

  <!-- Phase 1: Build Plan -->
  <g class="seq-item lazy-1">
    <rect x="50" y="285" width="110" height="50" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2"/>
    <text x="105" y="306" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">scan_parquet()</text>
    <text x="105" y="322" text-anchor="middle" font-size="10" fill="#334155">Schema only</text>
    <line x1="165" y1="310" x2="185" y2="310" stroke="#166534" stroke-width="1.5" marker-end="url(#arr)"/>
  </g>

  <g class="seq-item lazy-2">
    <rect x="190" y="285" width="90" height="50" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2"/>
    <text x="235" y="306" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">.filter()</text>
    <text x="235" y="322" text-anchor="middle" font-size="10" fill="#334155">Planned</text>
    <line x1="285" y1="310" x2="305" y2="310" stroke="#166534" stroke-width="1.5" marker-end="url(#arr)"/>
  </g>

  <g class="seq-item lazy-3">
    <rect x="310" y="285" width="90" height="50" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.2"/>
    <text x="355" y="306" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">.group_by()</text>
    <text x="355" y="322" text-anchor="middle" font-size="10" fill="#334155">Planned</text>
    <line x1="405" y1="310" x2="435" y2="310" stroke="#166534" stroke-width="2" marker-end="url(#arr)"/>
  </g>

  <!-- Optimizer -->
  <g class="seq-item lazy-4">
    <rect x="440" y="280" width="150" height="60" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="1.5"/>
    <text x="515" y="302" text-anchor="middle" font-size="12" font-weight="bold" fill="#166534">Query Optimizer</text>
    <text x="515" y="318" text-anchor="middle" font-size="10" fill="#334155">Predicate Pushdown</text>
    <text x="515" y="332" text-anchor="middle" font-size="10" fill="#334155">Column Pruning</text>
    <line x1="595" y1="310" x2="625" y2="310" stroke="#166534" stroke-width="2" marker-end="url(#arr)"/>
  </g>

  <!-- Result -->
  <g class="seq-item lazy-5">
    <rect x="630" y="285" width="90" height="50" rx="6" fill="#166534" stroke="#166534" stroke-width="1.2"/>
    <text x="675" y="306" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">.collect()</text>
    <text x="675" y="322" text-anchor="middle" font-size="10" fill="#16a34a">Execute!</text>
  </g>

  <!-- CPU indicator: all cores -->
  <rect x="760" y="285" width="90" height="50" rx="6" fill="#f0fdf4" stroke="#166534" stroke-width="1"/>
  <text x="805" y="303" text-anchor="middle" font-size="10" font-weight="bold" fill="#166534">Parallel ops</text>
  <rect x="772" y="313" width="12" height="12" rx="2" fill="#166534"/>
  <rect x="788" y="313" width="12" height="12" rx="2" fill="#166534"/>
  <rect x="804" y="313" width="12" height="12" rx="2" fill="#166534"/>
  <rect x="820" y="313" width="12" height="12" rx="2" fill="#166534"/>

  <!-- Memory bar -->
  <text x="50" y="362" font-size="11" fill="#166534">RAM:</text>
  <rect x="90" y="351" width="530" height="14" rx="3" fill="#cbd5e1"/>
  <g class="seq-item lazy-5"><rect x="90" y="351" width="80" height="14" rx="3" fill="#16a34a"/></g>
  <text x="640" y="363" font-size="10" fill="#166534">Streaming batches</text>

  <text x="50" y="382" font-size="11" fill="#334155">Pushdown can avoid unused columns, rows, and intermediates.</text>

  <!-- Bottom comparison -->
  <rect x="50" y="435" width="370" height="38" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="235" y="455" text-anchor="middle" font-size="12" font-weight="bold" fill="#991b1b">Pandas: ~365s (PDS-H SF-10)</text>
  <text x="235" y="468" text-anchor="middle" font-size="10" fill="#991b1b">Eager in-memory baseline</text>

  <rect x="480" y="435" width="370" height="38" rx="8" fill="#f0fdf4" stroke="#166534" stroke-width="1"/>
  <text x="665" y="455" text-anchor="middle" font-size="12" font-weight="bold" fill="#166534">Polars: ~3.89s in this benchmark</text>
  <text x="665" y="468" text-anchor="middle" font-size="10" fill="#166534">Multi-threaded, lazy, streaming</text>
</svg>
