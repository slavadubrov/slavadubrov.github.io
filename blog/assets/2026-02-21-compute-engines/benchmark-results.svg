<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 250" font-family="Roboto, Arial, sans-serif">
  <defs>
    <style>
      .bar { transform-origin: left; animation: scaleIn 1s cubic-bezier(0.25, 1, 0.5, 1) forwards; opacity: 0; }
      .bar-text { opacity: 0; animation: fadeIn 0.5s ease-out 1s forwards; font-size: 11px; fill: #444; font-weight: bold; }
      @keyframes scaleIn { from { transform: scaleX(0); opacity: 1; } to { transform: scaleX(1); opacity: 1; } }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      .g-pandas .bar { fill: #ef5350; animation-delay: 0.1s; } .g-pandas .bar-text { animation-delay: 1.1s; }
      .g-polars .bar { fill: #42a5f5; animation-delay: 0.2s; } .g-polars .bar-text { animation-delay: 1.2s; }
      .g-datafusion .bar { fill: #ab47bc; animation-delay: 0.3s; } .g-datafusion .bar-text { animation-delay: 1.3s; }
      .g-daft .bar { fill: #ffca28; animation-delay: 0.4s; } .g-daft .bar-text { animation-delay: 1.4s; }
      .g-rust .bar { fill: #66bb6a; animation-delay: 0.5s; } .g-rust .bar-text { animation-delay: 1.5s; }
      .axis-label { font-size: 13px; font-weight: bold; fill: #333; text-anchor: end; }
    </style>
  </defs>

  <rect width="900" height="250" rx="12" fill="#f8f9fa" stroke="#e0e0e0" stroke-width="1"/>
  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#212121">Single-Node Tabular Performance</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#777">Execution Time in Seconds (Lower is Better) | ~41M NYC Yellow Taxi Trips</text>

  <!-- Legend -->
  <g transform="translate(180, 80)">
    <rect x="0" y="0" width="16" height="16" rx="3" fill="#ef5350"/><text x="24" y="12" font-size="13" fill="#333">Pandas</text>
    <rect x="100" y="0" width="16" height="16" rx="3" fill="#42a5f5"/><text x="124" y="12" font-size="13" fill="#333">Polars</text>
    <rect x="190" y="0" width="16" height="16" rx="3" fill="#ab47bc"/><text x="214" y="12" font-size="13" fill="#333">DataFusion</text>
    <rect x="310" y="0" width="16" height="16" rx="3" fill="#ffca28"/><text x="334" y="12" font-size="13" fill="#333">Daft</text>
    <rect x="390" y="0" width="16" height="16" rx="3" fill="#66bb6a"/><text x="414" y="12" font-size="13" fill="#333">Polars-rs (Rust)</text>
  </g>

  <!-- Chart Area -->
  <g transform="translate(150, 130)">
    <!-- Base Grid X -->
    <line x1="0" y1="0" x2="0" y2="80" stroke="#bdbdbd" stroke-width="2"/>
    <line x1="0" y1="80" x2="650" y2="80" stroke="#bdbdbd" stroke-width="2"/>
    <text x="0" y="100" text-anchor="middle" font-size="11" fill="#777">0.0s</text>
    <line x1="150" y1="0" x2="150" y2="80" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4"/><text x="150" y="100" text-anchor="middle" font-size="11" fill="#777">1.0s</text>
    <line x1="300" y1="0" x2="300" y2="80" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4"/><text x="300" y="100" text-anchor="middle" font-size="11" fill="#777">2.0s</text>
    <line x1="450" y1="0" x2="450" y2="80" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4"/><text x="450" y="100" text-anchor="middle" font-size="11" fill="#777">3.0s</text>
    <line x1="600" y1="0" x2="600" y2="80" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4"/><text x="600" y="100" text-anchor="middle" font-size="11" fill="#777">4.0s</text>

    <!-- Row 1: ETL Pipeline -->
    <text x="-15" y="40" class="axis-label">ETL Pipeline</text>
    <g transform="translate(0, 5)">
      <g class="g-pandas"><rect class="bar" x="0" y="0" width="475" height="10"/><text class="bar-text" x="480" y="9">3.17s</text></g>
      <g class="g-polars"><rect class="bar" x="0" y="14" width="117" height="10"/><text class="bar-text" x="122" y="23">0.78s</text></g>
      <g class="g-datafusion"><rect class="bar" x="0" y="28" width="73" height="10"/><text class="bar-text" x="78" y="37">0.49s</text></g>
      <g class="g-daft"><rect class="bar" x="0" y="42" width="169" height="10"/><text class="bar-text" x="174" y="51">1.13s</text></g>
      <g class="g-rust"><rect class="bar" x="0" y="56" width="81" height="10"/><text class="bar-text" x="86" y="65">0.54s</text></g>
    </g>
  </g>
</svg>
