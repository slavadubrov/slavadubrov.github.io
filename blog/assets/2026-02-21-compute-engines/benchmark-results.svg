<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" font-family="Roboto, Arial, sans-serif">
  <defs>
    <style>
      .bar { transform-origin: left; animation: scaleIn 1s cubic-bezier(0.25, 1, 0.5, 1) forwards; opacity: 0; }
      .bar-text { opacity: 0; animation: fadeIn 0.5s ease-out 1s forwards; font-size: 10px; fill: #444; font-weight: bold; }
      @keyframes scaleIn { from { transform: scaleX(0); opacity: 1; } to { transform: scaleX(1); opacity: 1; } }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      .g-pandas .bar { fill: #ef5350; animation-delay: 0.1s; } .g-pandas .bar-text { animation-delay: 1.1s; }
      .g-polars .bar { fill: #42a5f5; animation-delay: 0.2s; } .g-polars .bar-text { animation-delay: 1.2s; }
      .g-datafusion .bar { fill: #ab47bc; animation-delay: 0.3s; } .g-datafusion .bar-text { animation-delay: 1.3s; }
      .g-daft .bar { fill: #ffca28; animation-delay: 0.4s; } .g-daft .bar-text { animation-delay: 1.4s; }
      .g-rust .bar { fill: #66bb6a; animation-delay: 0.5s; } .g-rust .bar-text { animation-delay: 1.5s; }
      .axis-label { font-size: 13px; font-weight: bold; fill: #333; text-anchor: end; }
    </style>
  </defs>

  <rect width="900" height="450" rx="12" fill="#f8f9fa" stroke="#e0e0e0" stroke-width="1"/>
  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#212121">Single-Node Tabular Performance</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#777">Execution Time in Seconds (Lower is Better) | ~2.9M NYC Yellow Taxi Trips</text>

  <!-- Legend -->
  <g transform="translate(180, 80)">
    <rect x="0" y="0" width="16" height="16" rx="3" fill="#ef5350"/><text x="24" y="12" font-size="13" fill="#333">Pandas</text>
    <rect x="100" y="0" width="16" height="16" rx="3" fill="#42a5f5"/><text x="124" y="12" font-size="13" fill="#333">Polars</text>
    <rect x="190" y="0" width="16" height="16" rx="3" fill="#ab47bc"/><text x="214" y="12" font-size="13" fill="#333">DataFusion</text>
    <rect x="310" y="0" width="16" height="16" rx="3" fill="#ffca28"/><text x="334" y="12" font-size="13" fill="#333">Daft</text>
    <rect x="390" y="0" width="16" height="16" rx="3" fill="#66bb6a"/><text x="414" y="12" font-size="13" fill="#333">Polars-rs (Rust)</text>
  </g>

  <!-- Chart Area -->
  <g transform="translate(150, 130)">
    <!-- Base Grid X -->
    <line x1="0" y1="0" x2="0" y2="280" stroke="#bdbdbd" stroke-width="2"/>
    <line x1="0" y1="280" x2="650" y2="280" stroke="#bdbdbd" stroke-width="2"/>
    <text x="0" y="300" text-anchor="middle" font-size="11" fill="#777">0.0s</text>
    <line x1="120" y1="0" x2="120" y2="280" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4"/><text x="120" y="300" text-anchor="middle" font-size="11" fill="#777">0.05s</text>
    <line x1="240" y1="0" x2="240" y2="280" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4"/><text x="240" y="300" text-anchor="middle" font-size="11" fill="#777">0.10s</text>
    <line x1="360" y1="0" x2="360" y2="280" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4"/><text x="360" y="300" text-anchor="middle" font-size="11" fill="#777">0.15s</text>
    <line x1="480" y1="0" x2="480" y2="280" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4"/><text x="480" y="300" text-anchor="middle" font-size="11" fill="#777">0.20s</text>
    <line x1="600" y1="0" x2="600" y2="280" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4"/><text x="600" y="300" text-anchor="middle" font-size="11" fill="#777">0.25s</text>

    <!-- Row 1: Read Parquet -->
    <text x="-15" y="30" class="axis-label">Read Parquet</text>
    <g transform="translate(0, 5)">
      <g class="g-pandas"><rect class="bar" x="0" y="0" width="144" height="6"/><text class="bar-text" x="149" y="6">0.06s</text></g>
      <g class="g-polars"><rect class="bar" x="0" y="8" width="120" height="6"/><text class="bar-text" x="125" y="14">0.05s</text></g>
      <g class="g-datafusion"><rect class="bar" x="0" y="16" width="192" height="6"/><text class="bar-text" x="197" y="22">0.08s</text></g>
      <g class="g-daft"><rect class="bar" x="0" y="24" width="192" height="6"/><text class="bar-text" x="197" y="30">0.08s</text></g>
      <g class="g-rust"><rect class="bar" x="0" y="32" width="96" height="6"/><text class="bar-text" x="101" y="38">0.04s</text></g>
    </g>

    <!-- Row 2: Filter -->
    <text x="-15" y="85" class="axis-label">Filter</text>
    <g transform="translate(0, 60)">
      <g class="g-pandas"><rect class="bar" x="0" y="0" width="48" height="6"/><text class="bar-text" x="53" y="6">0.02s</text></g>
      <g class="g-polars"><rect class="bar" x="0" y="8" width="72" height="6"/><text class="bar-text" x="77" y="14">0.03s</text></g>
      <g class="g-datafusion"><rect class="bar" x="0" y="16" width="192" height="6"/><text class="bar-text" x="197" y="22">0.08s</text></g>
      <g class="g-daft"><rect class="bar" x="0" y="24" width="240" height="6"/><text class="bar-text" x="245" y="30">0.10s</text></g>
      <g class="g-rust"><rect class="bar" x="0" y="32" width="120" height="6"/><text class="bar-text" x="125" y="38">0.05s</text></g>
    </g>

    <!-- Row 3: GroupBy + Agg -->
    <text x="-15" y="140" class="axis-label">GroupBy + Agg</text>
    <g transform="translate(0, 115)">
      <g class="g-pandas"><rect class="bar" x="0" y="0" width="192" height="6"/><text class="bar-text" x="197" y="6">0.08s</text></g>
      <g class="g-polars"><rect class="bar" x="0" y="8" width="48" height="6"/><text class="bar-text" x="53" y="14">0.02s</text></g>
      <g class="g-datafusion"><rect class="bar" x="0" y="16" width="72" height="6"/><text class="bar-text" x="77" y="22">0.03s</text></g>
      <g class="g-daft"><rect class="bar" x="0" y="24" width="72" height="6"/><text class="bar-text" x="77" y="30">0.03s</text></g>
      <g class="g-rust"><rect class="bar" x="0" y="32" width="48" height="6"/><text class="bar-text" x="53" y="38">0.02s</text></g>
    </g>

    <!-- Row 4: Join -->
    <text x="-15" y="195" class="axis-label">Join</text>
    <g transform="translate(0, 170)">
      <g class="g-pandas"><rect class="bar" x="0" y="0" width="312" height="6"/><text class="bar-text" x="317" y="6">0.13s</text></g>
      <g class="g-polars"><rect class="bar" x="0" y="8" width="336" height="6"/><text class="bar-text" x="341" y="14">0.14s</text></g>
      <g class="g-datafusion"><rect class="bar" x="0" y="16" width="528" height="6"/><text class="bar-text" x="533" y="22">0.22s</text></g>
      <g class="g-daft"><rect class="bar" x="0" y="24" width="432" height="6"/><text class="bar-text" x="437" y="30">0.18s</text></g>
      <g class="g-rust"><rect class="bar" x="0" y="32" width="168" height="6"/><text class="bar-text" x="173" y="38">0.07s</text></g>
    </g>

    <!-- Row 5: ETL Pipeline -->
    <text x="-15" y="250" class="axis-label">ETL Pipeline</text>
    <g transform="translate(0, 225)">
      <g class="g-pandas"><rect class="bar" x="0" y="0" width="480" height="6"/><text class="bar-text" x="485" y="6">0.20s</text></g>
      <g class="g-polars"><rect class="bar" x="0" y="8" width="120" height="6"/><text class="bar-text" x="125" y="14">0.05s</text></g>
      <g class="g-datafusion"><rect class="bar" x="0" y="16" width="96" height="6"/><text class="bar-text" x="101" y="22">0.04s</text></g>
      <g class="g-daft"><rect class="bar" x="0" y="24" width="192" height="6"/><text class="bar-text" x="197" y="30">0.08s</text></g>
      <g class="g-rust"><rect class="bar" x="0" y="32" width="96" height="6"/><text class="bar-text" x="101" y="38">0.04s</text></g>
    </g>
  </g>
</svg>
