<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Inter, Roboto, Arial, sans-serif">
  <defs>
    <!-- Background Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#e0e0e0" />
    </pattern>

    <!-- Fading Mask for Grid -->
    <radialGradient id="grid-fade" cx="50%" cy="50%" r="70%">
      <stop offset="20%" stop-color="white" stop-opacity="1" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </radialGradient>
    <mask id="fade-mask">
      <rect width="900" height="480" fill="url(#grid-fade)" />
    </mask>

    <!-- Card Gradients -->
    <linearGradient id="grad-bl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e3f2fd" />
    </linearGradient>

    <linearGradient id="grad-br" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#eceff1" />
    </linearGradient>

    <linearGradient id="grad-tl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f3e5f5" />
    </linearGradient>

    <linearGradient id="grad-tr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#fff3e0" />
    </linearGradient>

    <linearGradient id="axis-grad-x" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e0e0e0" />
      <stop offset="80%" stop-color="#9e9e9e" />
      <stop offset="100%" stop-color="#616161" />
    </linearGradient>

    <linearGradient id="axis-grad-y" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#e0e0e0" />
      <stop offset="80%" stop-color="#9e9e9e" />
      <stop offset="100%" stop-color="#616161" />
    </linearGradient>

    <!-- Card Shadow -->
    <filter id="card-shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.08" />
    </filter>

    <!-- Floating Animations -->
    <style>
      .card-float {
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        cursor: pointer;
      }
      .card-float:hover {
        transform: scale(1.05) translateY(-5px);
      }

      .c-bl { animation: float-1 5s ease-in-out infinite; transform-origin: 290px 330px; }
      .c-br { animation: float-2 6s ease-in-out infinite; transform-origin: 640px 330px; }
      .c-tl { animation: float-3 5.5s ease-in-out infinite; transform-origin: 290px 145px; }
      .c-tr { animation: float-4 6.5s ease-in-out infinite; transform-origin: 640px 145px; }

      @keyframes float-1 { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
      @keyframes float-2 { 0%, 100% { transform: translateY(-4px); } 50% { transform: translateY(4px); } }
      @keyframes float-3 { 0%, 100% { transform: translateY(3px); } 50% { transform: translateY(-5px); } }
      @keyframes float-4 { 0%, 100% { transform: translateY(-2px); } 50% { transform: translateY(6px); } }

      /* Overriding animation on hover requires high specificity or wrapping, we rely on the transition */
      .card-float:hover { animation-play-state: paused; }
    </style>
  </defs>

  <rect width="900" height="480" rx="12" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
  <rect width="900" height="480" rx="12" fill="url(#grid)" mask="url(#fade-mask)" />

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#212121">The Data Landscape</text>

  <!-- Y-Axis (Complexity) -->
  <line x1="120" y1="430" x2="120" y2="40" stroke="#9e9e9e" stroke-width="2"/>
  <polygon points="115,48 120,38 125,48" fill="#9e9e9e"/>

  <text x="25" y="235" text-anchor="middle" font-size="14" font-weight="bold" fill="#444" transform="rotate(-90 25 235)">Pipeline Complexity</text>

  <text x="105" y="390" text-anchor="end" font-size="12" fill="#666">Tabular</text>
  <text x="105" y="235" text-anchor="end" font-size="12" fill="#666">Mixed Types</text>
  <text x="105" y="80" text-anchor="end" font-size="12" fill="#666">Multimodal</text>

  <line x1="115" y1="386" x2="125" y2="386" stroke="#9e9e9e" stroke-width="2"/>
  <line x1="115" y1="231" x2="125" y2="231" stroke="#9e9e9e" stroke-width="2"/>
  <line x1="115" y1="76" x2="125" y2="76" stroke="#9e9e9e" stroke-width="2"/>

  <!-- X-Axis (Volume) -->
  <line x1="120" y1="430" x2="860" y2="430" stroke="#9e9e9e" stroke-width="2"/>
  <polygon points="852,425 862,430 852,435" fill="#9e9e9e"/>

  <text x="490" y="470" text-anchor="middle" font-size="14" font-weight="bold" fill="#444">Data Volume</text>

  <text x="210" y="452" text-anchor="middle" font-size="12" fill="#666">Megabytes</text>
  <text x="380" y="452" text-anchor="middle" font-size="12" fill="#666">Gigabytes</text>
  <text x="560" y="452" text-anchor="middle" font-size="12" fill="#666">Terabytes</text>
  <text x="740" y="452" text-anchor="middle" font-size="12" fill="#666">Petabytes</text>

  <line x1="210" y1="425" x2="210" y2="435" stroke="#9e9e9e" stroke-width="2"/>
  <line x1="380" y1="425" x2="380" y2="435" stroke="#9e9e9e" stroke-width="2"/>
  <line x1="560" y1="425" x2="560" y2="435" stroke="#9e9e9e" stroke-width="2"/>
  <line x1="740" y1="425" x2="740" y2="435" stroke="#9e9e9e" stroke-width="2"/>

  <!-- CARD: Bottom-Left = Polars/DuckDB -->
  <g class="card-float c-bl">
    <rect x="150" y="270" width="280" height="120" rx="16" fill="url(#grad-bl)" stroke="#90caf9" stroke-width="1.5" filter="url(#card-shadow)"/>

    <!-- Decorative badge -->
    <rect x="170" y="255" width="85" height="22" rx="11" fill="#1565c0" />
    <text x="212" y="270" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">Speed &gt; Scale</text>

    <text x="290" y="315" text-anchor="middle" font-size="18" font-weight="bold" fill="#1565c0">Polars / DuckDB</text>
    <text x="290" y="340" text-anchor="middle" font-size="12" fill="#555">Single-node tabular data</text>
    <text x="290" y="360" text-anchor="middle" font-size="12" fill="#555">Lightning-fast Ad-hoc EDA</text>
  </g>

  <!-- CARD: Bottom-Right = Spark/Dask -->
  <g class="card-float c-br">
    <rect x="500" y="270" width="280" height="120" rx="16" fill="url(#grad-br)" stroke="#b0bec5" stroke-width="1.5" filter="url(#card-shadow)"/>

    <rect x="520" y="255" width="112" height="22" rx="11" fill="#546e7a" />
    <text x="576" y="270" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">Reliability &gt; Speed</text>

    <text x="640" y="315" text-anchor="middle" font-size="18" font-weight="bold" fill="#455a64">Spark / Dask</text>
    <text x="640" y="340" text-anchor="middle" font-size="12" fill="#555">Petabyte-scale distributed SQL</text>
    <text x="640" y="360" text-anchor="middle" font-size="12" fill="#555">Heavy, robust ETL pipelines</text>
  </g>

  <!-- CARD: Top-Left = DataFusion -->
  <g class="card-float c-tl">
    <rect x="150" y="85" width="280" height="120" rx="16" fill="url(#grad-tl)" stroke="#ce93d8" stroke-width="1.5" filter="url(#card-shadow)"/>

    <rect x="170" y="70" width="138" height="22" rx="11" fill="#6a1b9a" />
    <text x="239" y="85" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">Extensibility &gt; Ecosystem</text>

    <text x="290" y="130" text-anchor="middle" font-size="18" font-weight="bold" fill="#6a1b9a">DataFusion</text>
    <text x="290" y="155" text-anchor="middle" font-size="12" fill="#555">Embeddable streaming query engine</text>
    <text x="290" y="175" text-anchor="middle" font-size="12" fill="#555">Building custom data platforms</text>
  </g>

  <!-- CARD: Top-Right = Ray/Daft -->
  <g class="card-float c-tr">
    <rect x="500" y="85" width="280" height="120" rx="16" fill="url(#grad-tr)" stroke="#ffb74d" stroke-width="1.5" filter="url(#card-shadow)"/>

    <rect x="520" y="70" width="128" height="22" rx="11" fill="#e65100" />
    <text x="584" y="85" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">GPU Util &gt; ETL Features</text>

    <text x="640" y="130" text-anchor="middle" font-size="18" font-weight="bold" fill="#e65100">Ray / Daft</text>
    <text x="640" y="155" text-anchor="middle" font-size="12" fill="#555">Distributed multimodal AI logic</text>
    <text x="640" y="175" text-anchor="middle" font-size="12" fill="#555">Last-mile GPU training &amp; inference</text>
  </g>

</svg>
