<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" font-family="Roboto, Arial, sans-serif">
  <defs>
    <!-- Animations -->
    <style>
      /* Base invisible class */
      .anim-box { opacity: 0; }

      /* Build from bottom up */
      .layer-3 { animation: fadeSlideUp 0.6s ease-out 0s forwards; }
      .layer-2 { animation: fadeSlideUp 0.6s ease-out 0.4s forwards; }
      .layer-1-a { animation: fadeSlideUp 0.6s ease-out 0.8s forwards; }
      .layer-1-b { animation: fadeSlideUp 0.6s ease-out 1.0s forwards; }
      .layer-1-c { animation: fadeSlideUp 0.6s ease-out 1.2s forwards; }
      .layer-1-d { animation: fadeSlideUp 0.6s ease-out 1.4s forwards; }

      @keyframes fadeSlideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </defs>

  <rect width="900" height="450" rx="12" fill="#f8f9fa" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#212121">The Convergence on Rust &amp; Apache Arrow</text>
  <text x="450" y="52" text-anchor="middle" font-size="13" fill="#555">The new generation of engines are built on the same unified foundation.</text>

  <!-- LAYER 1: The Engines (Top) -->

  <!-- Polars -->
  <g class="anim-box layer-1-a">
    <path d="M 120 160 Q 120 150 130 150 L 250 150 Q 260 150 260 160 L 260 190 L 120 190 Z" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
    <text x="190" y="172" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565c0">Polars</text>
    <text x="190" y="185" text-anchor="middle" font-size="9" fill="#555">DataFrame Lib</text>
  </g>

  <!-- DataFusion -->
  <g class="anim-box layer-1-b">
    <path d="M 280 160 Q 280 150 290 150 L 410 150 Q 420 150 420 160 L 420 190 L 280 190 Z" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2"/>
    <text x="350" y="172" text-anchor="middle" font-size="14" font-weight="bold" fill="#6a1b9a">DataFusion</text>
    <text x="350" y="185" text-anchor="middle" font-size="9" fill="#555">Query Engine</text>
  </g>

  <!-- Daft -->
  <g class="anim-box layer-1-c">
    <path d="M 480 160 Q 480 150 490 150 L 610 150 Q 620 150 620 160 L 620 190 L 480 190 Z" fill="#fff3e0" stroke="#e65100" stroke-width="2"/>
    <text x="550" y="172" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">Daft</text>
    <text x="550" y="185" text-anchor="middle" font-size="9" fill="#555">Multimodal</text>
  </g>

  <!-- Ray -->
  <g class="anim-box layer-1-d">
    <path d="M 640 160 Q 640 150 650 150 L 770 150 Q 780 150 780 160 L 780 190 L 640 190 Z" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
    <text x="710" y="172" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e7d32">Ray Data</text>
    <text x="710" y="185" text-anchor="middle" font-size="9" fill="#555">Distributed Scale</text>
  </g>

  <!-- LAYER 2: The Unified Foundation (Middle) -->
  <g class="anim-box layer-2">
    <!-- Main base container -->
    <rect x="120" y="190" width="660" height="90" fill="#ffffff" stroke="#333" stroke-width="2"/>

    <!-- Divider -->
    <line x1="450" y1="190" x2="450" y2="280" stroke="#bdbdbd" stroke-width="1.5" stroke-dasharray="4,4"/>

    <!-- Left side: Rust -->
    <text x="285" y="230" text-anchor="middle" font-size="20" font-weight="bold" fill="#e65100">Rust Core</text>
    <text x="285" y="250" text-anchor="middle" font-size="12" fill="#555">Safe Concurrency &amp; Execution</text>

    <!-- Right side: Apache Arrow -->
    <text x="615" y="230" text-anchor="middle" font-size="20" font-weight="bold" fill="#1565c0">Apache Arrow</text>
    <text x="615" y="250" text-anchor="middle" font-size="12" fill="#555">Columnar In-Memory Format</text>
  </g>

  <!-- LAYER 3: The Outcomes (Bottom) -->
  <g class="anim-box layer-3">
    <!-- Connecting struts -->
    <rect x="250" y="280" width="10" height="30" fill="#bdbdbd"/>
    <rect x="445" y="280" width="10" height="30" fill="#bdbdbd"/>
    <rect x="640" y="280" width="10" height="30" fill="#bdbdbd"/>

    <rect x="155" y="310" width="200" height="80" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
    <text x="255" y="342" text-anchor="middle" font-size="15" font-weight="bold" fill="#2e7d32">No GC Pauses</text>
    <text x="255" y="365" text-anchor="middle" font-size="11" fill="#555">Ownership &amp; Borrowing</text>
    <text x="255" y="380" text-anchor="middle" font-size="10" fill="#777">Eliminates latency spikes</text>

    <rect x="350" y="310" width="200" height="80" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
    <text x="450" y="342" text-anchor="middle" font-size="15" font-weight="bold" fill="#1565c0">Zero Serialization</text>
    <text x="450" y="365" text-anchor="middle" font-size="11" fill="#555">PyCapsule Interface</text>
    <text x="450" y="380" text-anchor="middle" font-size="10" fill="#777">No expensive Python copies</text>

    <rect x="545" y="310" width="200" height="80" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="2"/>
    <text x="645" y="342" text-anchor="middle" font-size="15" font-weight="bold" fill="#e65100">Safe Concurrency</text>
    <text x="645" y="365" text-anchor="middle" font-size="11" fill="#555">Compile-Time Safety</text>
    <text x="645" y="380" text-anchor="middle" font-size="10" fill="#777">No subtle data races</text>
  </g>
</svg>
