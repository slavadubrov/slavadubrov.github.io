<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="Roboto, Arial, sans-serif">
  <defs>
    <style>
      @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.05); }
        100% { transform: scale(1); }
      }
      .cpu-anim { transform-origin: 100px 125px; animation: pulse 2s infinite ease-in-out; }
      .gpu-anim { transform-origin: 550px 125px; animation: pulse 2s infinite ease-in-out; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="900" height="400" rx="12" fill="#f8f9fa" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#212121">Two Worlds of Data</text>

  <!-- Divider -->
  <line x1="450" y1="55" x2="450" y2="370" stroke="#bdbdbd" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- LEFT: Reality A -->
  <rect x="30" y="55" width="390" height="310" rx="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="225" y="82" text-anchor="middle" font-size="16" font-weight="bold" fill="#1565c0">Structured Data</text>

  <!-- CPU icon -->
  <g class="cpu-anim">
    <rect x="60" y="100" width="80" height="50" rx="6" fill="#ffffff" stroke="#1565c0" stroke-width="1.5"/>
    <rect x="72" y="110" width="56" height="30" rx="3" fill="#bbdefb"/>
    <text x="100" y="130" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">CPU</text>
  </g>

  <!-- Table icon -->
  <rect x="180" y="100" width="100" height="50" rx="6" fill="#ffffff" stroke="#1565c0" stroke-width="1.5"/>
  <line x1="180" y1="118" x2="280" y2="118" stroke="#1565c0" stroke-width="1"/>
  <line x1="180" y1="130" x2="280" y2="130" stroke="#90caf9" stroke-width="0.8"/>
  <line x1="180" y1="140" x2="280" y2="140" stroke="#90caf9" stroke-width="0.8"/>
  <line x1="220" y1="100" x2="220" y2="150" stroke="#90caf9" stroke-width="0.8"/>
  <text x="230" y="113" text-anchor="middle" font-size="9" font-weight="bold" fill="#1565c0">Rows &amp; Columns</text>

  <!-- Characteristics -->
  <text x="60" y="185" font-size="13" font-weight="bold" fill="#333">CPU-bound</text>
  <text x="60" y="205" font-size="12" fill="#555">Fits in memory (often &lt;100 GB)</text>
  <text x="60" y="230" font-size="13" font-weight="bold" fill="#333">Often over-engineered</text>
  <text x="60" y="250" font-size="12" fill="#555">90% of queries process &lt;1 TB</text>
  <text x="60" y="270" font-size="12" fill="#555">Clusters often unnecessary</text>

  <!-- Tag -->
  <rect x="55" y="295" width="340" height="50" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1"/>
  <text x="225" y="315" text-anchor="middle" font-size="11" fill="#1565c0">Polars / DuckDB / DataFusion handle this on one machine.</text>
  <text x="225" y="333" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">Don't distribute if you don't have to.</text>

  <!-- RIGHT: Reality B -->
  <rect x="480" y="55" width="390" height="310" rx="10" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="675" y="82" text-anchor="middle" font-size="16" font-weight="bold" fill="#e65100">Multimodal AI</text>

  <!-- GPU icon -->
  <g class="gpu-anim">
    <rect x="510" y="100" width="80" height="50" rx="6" fill="#ffffff" stroke="#e65100" stroke-width="1.5"/>
    <rect x="522" y="110" width="56" height="30" rx="3" fill="#ffe0b2"/>
    <text x="550" y="130" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">GPU</text>
  </g>

  <!-- Media icons -->
  <g transform="translate(630, 100)">
    <rect width="30" height="24" rx="3" fill="#ffe0b2" stroke="#e65100" stroke-width="1"/>
    <text x="15" y="16" text-anchor="middle" font-size="8" fill="#e65100">IMG</text>
  </g>
  <g transform="translate(670, 100)">
    <rect width="30" height="24" rx="3" fill="#ffe0b2" stroke="#e65100" stroke-width="1"/>
    <text x="15" y="16" text-anchor="middle" font-size="8" fill="#e65100">VID</text>
  </g>
  <g transform="translate(710, 100)">
    <rect width="30" height="24" rx="3" fill="#ffe0b2" stroke="#e65100" stroke-width="1"/>
    <text x="15" y="16" text-anchor="middle" font-size="8" fill="#e65100">PDF</text>
  </g>
  <g transform="translate(750, 100)">
    <rect width="30" height="24" rx="3" fill="#ffe0b2" stroke="#e65100" stroke-width="1"/>
    <text x="15" y="16" text-anchor="middle" font-size="8" fill="#e65100">WAV</text>
  </g>

  <!-- GPU starvation bar -->
  <rect x="510" y="145" width="330" height="18" rx="4" fill="#e0e0e0" stroke="#bdbdbd" stroke-width="0.5"/>
  <rect x="510" y="145" width="66" height="18" rx="4" fill="#c62828"/>
  <text x="675" y="158" text-anchor="middle" font-size="9" fill="#555">GPU Utilization: &lt;20%  (GPU Starvation)</text>

  <!-- Characteristics -->
  <text x="510" y="195" font-size="13" font-weight="bold" fill="#333">GPU-bound</text>
  <text x="510" y="215" font-size="12" fill="#555">Images, video, audio, tensors</text>
  <text x="510" y="240" font-size="13" font-weight="bold" fill="#333">Expanding pipelines</text>
  <text x="510" y="260" font-size="12" fill="#555">1 row (PDF path) expands to</text>
  <text x="510" y="278" font-size="12" fill="#555">thousands of chunks + embeddings</text>

  <!-- Tag -->
  <rect x="505" y="295" width="340" height="50" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="1"/>
  <text x="675" y="315" text-anchor="middle" font-size="11" fill="#e65100">Ray Data / Daft handle heterogeneous</text>
  <text x="675" y="333" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">CPU + GPU resources simultaneously.</text>

  <!-- Bottom note -->
  <rect x="250" y="375" width="400" height="22" rx="4" fill="#eeeeee"/>
  <text x="450" y="391" text-anchor="middle" font-size="11" font-weight="bold" fill="#546e7a">Using a freight train to deliver a pizza? Pick the right engine for the job.</text>
</svg>
