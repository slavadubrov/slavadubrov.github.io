<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Roboto, Arial, sans-serif">
  <defs>
    <style>
      .t-box { opacity: 0; animation: slideInFade 0.5s ease-out forwards; }
      @keyframes slideInFade {
        from { opacity: 0; transform: translateX(-15px); }
        to { opacity: 1; transform: translateX(0); }
      }
      .st-b1 { animation-delay: 0.5s; }
      .st-b2 { animation-delay: 1.0s; }
      .st-b3 { animation-delay: 1.5s; }
      .st-b4 { animation-delay: 2.0s; }
      .st-b5 { animation-delay: 2.5s; }
      .st-b6 { animation-delay: 3.0s; }
      .st-b7 { animation-delay: 3.5s; }
      .st-b8 { animation-delay: 4.0s; }
      .st-b9 { animation-delay: 4.5s; }
    </style>
  </defs>

  <rect width="900" height="500" rx="12" fill="#f8f9fa" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#212121">Stage-Based vs. Pipelined Execution</text>

  <!-- TOP: Stage-based (Spark) -->
  <rect x="25" y="50" width="850" height="190" rx="10" fill="#eceff1" stroke="#546e7a" stroke-width="1.5"/>
  <text x="50" y="75" font-size="14" font-weight="bold" fill="#546e7a">Stage-Based (Spark): Bulk Synchronous Parallel</text>

  <!-- Timeline labels -->
  <text x="50" y="110" font-size="11" font-weight="bold" fill="#555">CPU Core 1</text>
  <text x="50" y="148" font-size="11" font-weight="bold" fill="#555">CPU Core 2</text>
  <text x="50" y="186" font-size="11" font-weight="bold" fill="#555">GPU</text>

  <!-- Time axis -->
  <line x1="145" y1="205" x2="730" y2="205" stroke="#bdbdbd" stroke-width="1"/>
  <text x="440" y="222" text-anchor="middle" font-size="10" fill="#999">Time &#x2192;</text>

  <!-- Stage 1 label -->
  <g class="t-box st-b1">
    <text x="310" y="90" text-anchor="middle" font-size="10" font-weight="bold" fill="#546e7a">Stage 1 (CPU)</text>
  </g>

  <!-- CPU Core 1: Download+Parse Partition 1 -->
  <g class="t-box st-b1">
    <rect x="150" y="97" width="250" height="22" rx="4" fill="#78909c"/>
    <text x="275" y="112" text-anchor="middle" font-size="9" fill="#fff">Download + Parse Partition 1</text>
  </g>

  <!-- CPU Core 2: Download+Parse Partition 2 (simultaneously) -->
  <g class="t-box st-b1">
    <rect x="150" y="135" width="250" height="22" rx="4" fill="#78909c"/>
    <text x="275" y="150" text-anchor="middle" font-size="9" fill="#fff">Download + Parse Partition 2</text>
  </g>

  <!-- GPU idle during Stage 1 -->
  <g class="t-box st-b1">
    <rect x="150" y="173" width="250" height="22" rx="4" fill="#e0e0e0" stroke="#bdbdbd" stroke-width="0.5"/>
    <text x="275" y="188" text-anchor="middle" font-size="9" fill="#999">Idle (waiting for CPU)</text>
  </g>

  <!-- Stage barrier -->
  <g class="t-box st-b4">
    <line x1="410" y1="88" x2="410" y2="200" stroke="#c62828" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="413" y="200" font-size="8" fill="#c62828">barrier</text>
  </g>

  <!-- Stage 2 label -->
  <g class="t-box st-b5">
    <text x="545" y="90" text-anchor="middle" font-size="10" font-weight="bold" fill="#546e7a">Stage 2 (GPU)</text>
  </g>

  <!-- CPU Core 1 idle during Stage 2 -->
  <g class="t-box st-b5">
    <rect x="420" y="97" width="200" height="22" rx="4" fill="#e0e0e0" stroke="#bdbdbd" stroke-width="0.5"/>
    <text x="520" y="112" text-anchor="middle" font-size="9" fill="#999">Idle</text>
  </g>

  <!-- CPU Core 2 idle during Stage 2 -->
  <g class="t-box st-b5">
    <rect x="420" y="135" width="200" height="22" rx="4" fill="#e0e0e0" stroke="#bdbdbd" stroke-width="0.5"/>
    <text x="520" y="150" text-anchor="middle" font-size="9" fill="#999">Idle</text>
  </g>

  <!-- GPU active during Stage 2 -->
  <g class="t-box st-b5">
    <rect x="420" y="173" width="200" height="22" rx="4" fill="#e65100"/>
    <text x="520" y="188" text-anchor="middle" font-size="9" fill="#fff">Embed P1 + P2</text>
  </g>

  <g class="t-box st-b7">
    <rect x="770" y="168" width="95" height="30" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1"/>
    <text x="818" y="188" text-anchor="middle" font-size="11" font-weight="bold" fill="#c62828">GPU: &lt;20%</text>
  </g>

  <!-- BOTTOM: Pipelined (Daft/Ray) -->
  <rect x="25" y="270" width="850" height="195" rx="10" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="50" y="295" font-size="14" font-weight="bold" fill="#e65100">Pipelined Streaming (Daft / Ray Data)</text>

  <!-- Timeline labels -->
  <text x="50" y="328" font-size="11" font-weight="bold" fill="#555">CPU Core 1</text>
  <text x="50" y="366" font-size="11" font-weight="bold" fill="#555">CPU Core 2</text>
  <text x="50" y="404" font-size="11" font-weight="bold" fill="#555">GPU</text>

  <line x1="145" y1="425" x2="730" y2="425" stroke="#bdbdbd" stroke-width="1"/>
  <text x="440" y="442" text-anchor="middle" font-size="10" fill="#999">Time &#x2192;</text>

  <g class="t-box st-b1">
    <rect x="150" y="315" width="110" height="22" rx="4" fill="#1565c0"/>
    <text x="205" y="330" text-anchor="middle" font-size="9" fill="#fff">Download B1</text>
  </g>
  <g class="t-box st-b3">
    <rect x="265" y="315" width="110" height="22" rx="4" fill="#1565c0"/>
    <text x="320" y="330" text-anchor="middle" font-size="9" fill="#fff">Download B3</text>
  </g>
  <g class="t-box st-b5">
    <rect x="380" y="315" width="110" height="22" rx="4" fill="#1565c0"/>
    <text x="435" y="330" text-anchor="middle" font-size="9" fill="#fff">Download B5</text>
  </g>
  <g class="t-box st-b7">
    <rect x="495" y="315" width="110" height="22" rx="4" fill="#1565c0"/>
    <text x="550" y="330" text-anchor="middle" font-size="9" fill="#fff">Download B7</text>
  </g>
  <g class="t-box st-b9">
    <rect x="610" y="315" width="110" height="22" rx="4" fill="#1565c0"/>
    <text x="665" y="330" text-anchor="middle" font-size="9" fill="#fff">Download B9</text>
  </g>

  <g class="t-box st-b2">
    <rect x="205" y="353" width="110" height="22" rx="4" fill="#2e7d32"/>
    <text x="260" y="368" text-anchor="middle" font-size="9" fill="#fff">Parse B1</text>
  </g>
  <g class="t-box st-b4">
    <rect x="320" y="353" width="110" height="22" rx="4" fill="#2e7d32"/>
    <text x="375" y="368" text-anchor="middle" font-size="9" fill="#fff">Parse B2</text>
  </g>
  <g class="t-box st-b6">
    <rect x="435" y="353" width="110" height="22" rx="4" fill="#2e7d32"/>
    <text x="490" y="368" text-anchor="middle" font-size="9" fill="#fff">Parse B3</text>
  </g>
  <g class="t-box st-b8">
    <rect x="550" y="353" width="110" height="22" rx="4" fill="#2e7d32"/>
    <text x="605" y="368" text-anchor="middle" font-size="9" fill="#fff">Parse B4</text>
  </g>
  <g class="t-box st-b9">
    <rect x="665" y="353" width="55" height="22" rx="4" fill="#2e7d32"/>
    <text x="692" y="368" text-anchor="middle" font-size="9" fill="#fff">B5</text>
  </g>

  <g class="t-box st-b3">
    <rect x="265" y="391" width="110" height="22" rx="4" fill="#e65100"/>
    <text x="320" y="406" text-anchor="middle" font-size="9" fill="#fff">Embed B1</text>
  </g>
  <g class="t-box st-b5">
    <rect x="380" y="391" width="110" height="22" rx="4" fill="#e65100"/>
    <text x="435" y="406" text-anchor="middle" font-size="9" fill="#fff">Embed B2</text>
  </g>
  <g class="t-box st-b7">
    <rect x="495" y="391" width="110" height="22" rx="4" fill="#e65100"/>
    <text x="550" y="406" text-anchor="middle" font-size="9" fill="#fff">Embed B3</text>
  </g>
  <g class="t-box st-b9">
    <rect x="610" y="391" width="110" height="22" rx="4" fill="#e65100"/>
    <text x="665" y="406" text-anchor="middle" font-size="9" fill="#fff">Embed B4</text>
  </g>

  <rect x="770" y="385" width="95" height="30" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
  <text x="818" y="405" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">GPU: ~90%</text>

  <!-- Bottom summary -->
  <rect x="150" y="475" width="600" height="22" rx="6" fill="#ffffff" stroke="#e65100" stroke-width="1"/>
  <text x="450" y="491" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">Network, CPU, and GPU all active simultaneously. No idle hardware.</text>
</svg>
