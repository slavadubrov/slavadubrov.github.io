<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" role="img" aria-labelledby="title desc" data-visual-system="evidence-plate-v1" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="Inter, system-ui, sans-serif">
  <title id="title">Cascade, routing, and bounded-list schema patterns</title>
  <desc id="desc">Three cards show a multi-call cascade, a discriminated routing union, and a list with item-count bounds, with each pattern's guarantee and limitation.</desc>
  <defs><marker id="arrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#93c5fd"/></marker></defs>
  <style data-visual-system="evidence-plate-v1">
    * { animation: none !important; }
    .anim-box, .bar, .bar-text, .seq-item, .t-box, .flow { opacity: 1 !important; transform: none !important; }
    path, line, polyline { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1000" height="520" rx="22" fill="#0f172a"/>
  <text x="500" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Three schema-guided patterns</text>

  <g transform="translate(25 85)">
    <rect width="300" height="390" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2"/>
    <text x="150" y="40" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="700" fill="#93c5fd">Cascade</text>
    <text x="150" y="68" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">Separate calls create a real boundary</text>
    <rect x="42" y="100" width="216" height="52" rx="9" fill="#1d4ed8"/>
    <text x="150" y="131" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#93c5fd">Call A: CandidateEvidence</text>
    <path d="M150 157 V195" fill="none" stroke="#93c5fd" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="172" y="181" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">validate</text>
    <rect x="42" y="205" width="216" height="52" rx="9" fill="#1d4ed8"/>
    <text x="150" y="236" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#93c5fd">Call B: CandidateDecision</text>
    <text x="24" y="299" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#93c5fd">Guarantees</text>
    <text x="32" y="324" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#cbd5e1">B receives validated output from A</text>
    <text x="24" y="353" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#fca5a5">Does not guarantee</text>
    <text x="32" y="378" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#cbd5e1">Either stage is factually correct</text>
  </g>

  <g transform="translate(350 85)">
    <rect width="300" height="390" rx="16" fill="#5b21b6" stroke="#2563eb" stroke-width="2"/>
    <text x="150" y="40" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="700" fill="#c4b5fd">Routing</text>
    <text x="150" y="68" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">A discriminator selects one shape</text>
    <rect x="65" y="98" width="170" height="48" rx="9" fill="#5b21b6"/>
    <text x="150" y="127" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#93c5fd">tool_name</text>
    <path d="M125 147 L76 193" fill="none" stroke="#c4b5fd" stroke-width="2"/>
    <path d="M175 147 L224 193" fill="none" stroke="#c4b5fd" stroke-width="2"/>
    <rect x="25" y="195" width="115" height="62" rx="9" fill="#7c3aed"/>
    <text x="82" y="220" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd">fetch features</text>
    <text x="82" y="241" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="11" fill="#c4b5fd">no model args</text>
    <rect x="160" y="195" width="115" height="62" rx="9" fill="#7c3aed"/>
    <text x="217" y="220" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd">respond</text>
    <text x="217" y="241" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="11" fill="#c4b5fd">content</text>
    <text x="24" y="299" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#c4b5fd">Guarantees</text>
    <text x="32" y="324" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#cbd5e1">Exactly one valid branch shape</text>
    <text x="24" y="353" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#fca5a5">Does not guarantee</text>
    <text x="32" y="378" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#cbd5e1">The selected route is appropriate</text>
  </g>

  <g transform="translate(675 85)">
    <rect width="300" height="390" rx="16" fill="#1d4ed8" stroke="#2563eb" stroke-width="2"/>
    <text x="150" y="40" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="700" fill="#93c5fd">Bounded list</text>
    <text x="150" y="68" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">A collection has typed items and limits</text>
    <rect x="30" y="108" width="68" height="105" rx="9" fill="#1d4ed8"/>
    <text x="64" y="147" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd">Risk 1</text>
    <text x="64" y="171" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#93c5fd">severity</text>
    <rect x="116" y="108" width="68" height="105" rx="9" fill="#1d4ed8"/>
    <text x="150" y="166" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#93c5fd">…</text>
    <rect x="202" y="108" width="68" height="105" rx="9" fill="#1d4ed8"/>
    <text x="236" y="147" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd">Risk N</text>
    <text x="236" y="171" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#93c5fd">2 ≤ N ≤ 4</text>
    <text x="24" y="299" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#93c5fd">Guarantees</text>
    <text x="32" y="324" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#cbd5e1">Item shapes and list length</text>
    <text x="24" y="353" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#fca5a5">Does not guarantee</text>
    <text x="32" y="378" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#cbd5e1">Distinct or well-supported factors</text>
  </g>
</svg>
