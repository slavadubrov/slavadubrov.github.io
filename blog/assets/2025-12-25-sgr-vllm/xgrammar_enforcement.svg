<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" role="img" aria-labelledby="title desc">
  <title id="title">Where an XGrammar token mask enters the decoding loop</title>
  <desc id="desc">The model computes raw logits, XGrammar masks tokens that cannot continue the schema, sampling chooses among the remaining tokens, and the matcher advances. A note clarifies that the mask guarantees shape rather than correctness.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#64748b"/></marker></defs>
  <rect width="1000" height="520" rx="22" fill="#0f172a"/>
  <text x="500" y="48" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Constrained decoding: post-forward, pre-sampling</text>
  <text x="500" y="76" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">The model scores tokens; the grammar controls which continuations remain eligible</text>

  <g transform="translate(35 125)">
    <rect width="180" height="105" rx="14" fill="#064e3b" stroke="#10b981" stroke-width="2"/>
    <text x="90" y="39" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#6ee7b7">Model forward pass</text>
    <text x="90" y="68" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#d1fae5">GPU computes</text>
    <text x="90" y="87" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#d1fae5">raw vocabulary logits</text>
  </g>
  <path d="M225 177 H270" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <g transform="translate(285 125)">
    <rect width="180" height="105" rx="14" fill="#422006" stroke="#f59e0b" stroke-width="2"/>
    <text x="90" y="39" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#fbbf24">Grammar matcher</text>
    <text x="90" y="68" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#fef3c7">Computes valid</text>
    <text x="90" y="87" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#fef3c7">next-token mask</text>
  </g>
  <path d="M475 177 H520" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <g transform="translate(535 125)">
    <rect width="180" height="105" rx="14" fill="#312e81" stroke="#6366f1" stroke-width="2"/>
    <text x="90" y="39" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#a5b4fc">Masked sampling</text>
    <text x="90" y="68" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#e0e7ff">Invalid logits → −∞</text>
    <text x="90" y="87" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#e0e7ff">Choose an eligible token</text>
  </g>
  <path d="M725 177 H770" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <g transform="translate(785 125)">
    <rect width="180" height="105" rx="14" fill="#164e63" stroke="#06b6d4" stroke-width="2"/>
    <text x="90" y="39" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#67e8f9">Advance state</text>
    <text x="90" y="68" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#cffafe">Accept token and</text>
    <text x="90" y="87" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#cffafe">repeat until complete</text>
  </g>

  <g transform="translate(75 290)">
    <rect width="400" height="145" rx="14" fill="#1e293b" stroke="#475569"/>
    <text x="24" y="35" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#e2e8f0">Example: a numeric field</text>
    <text x="24" y="67" font-family="monospace" font-size="13" fill="#94a3b8">raw:  "fifteen"  15  true  {</text>
    <text x="24" y="96" font-family="monospace" font-size="13" fill="#6ee7b7">mask:     ×       ✓    ×   ×</text>
    <text x="24" y="124" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">The schema permits a number, not the word “fifteen.”</text>
  </g>
  <g transform="translate(525 290)">
    <rect width="400" height="145" rx="14" fill="#172554" stroke="#3b82f6"/>
    <text x="24" y="35" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#93c5fd">What the mask does not decide</text>
    <text x="24" y="67" font-family="system-ui, sans-serif" font-size="13" fill="#cbd5e1">• whether 15 is the correct value</text>
    <text x="24" y="94" font-family="system-ui, sans-serif" font-size="13" fill="#cbd5e1">• whether evidence supports the value</text>
    <text x="24" y="121" font-family="system-ui, sans-serif" font-size="13" fill="#cbd5e1">• whether a dynamic business rule allows it</text>
  </g>
</svg>
