<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" role="img" aria-labelledby="title desc">
  <title id="title">Prompting, structured output, and semantic validation address different failures</title>
  <desc id="desc">Prompting explains field meaning, constrained decoding controls output shape, and validation checks semantic rules. All three feed a reliable application boundary.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#64748b"/></marker></defs>
  <rect width="900" height="300" rx="20" fill="#0f172a"/>
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#f8fafc">Different controls solve different failures</text>
  <g font-family="system-ui, sans-serif">
    <g transform="translate(35 85)"><rect width="220" height="130" rx="14" fill="#1e293b" stroke="#64748b"/><text x="110" y="35" text-anchor="middle" font-size="17" font-weight="700" fill="#e2e8f0">Prompt</text><text x="110" y="67" text-anchor="middle" font-size="13" fill="#cbd5e1">Explain field meaning</text><text x="110" y="92" text-anchor="middle" font-size="13" fill="#94a3b8">Model may still be wrong</text></g>
    <path d="M265 150 H320" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <g transform="translate(335 85)"><rect width="230" height="130" rx="14" fill="#172554" stroke="#3b82f6"/><text x="115" y="35" text-anchor="middle" font-size="17" font-weight="700" fill="#93c5fd">Constrained output</text><text x="115" y="67" text-anchor="middle" font-size="13" fill="#cbd5e1">Enforce supported shape</text><text x="115" y="92" text-anchor="middle" font-size="13" fill="#94a3b8">Values may still be wrong</text></g>
    <path d="M575 150 H630" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <g transform="translate(645 85)"><rect width="220" height="130" rx="14" fill="#052e2b" stroke="#14b8a6"/><text x="110" y="35" text-anchor="middle" font-size="17" font-weight="700" fill="#5eead4">Validation</text><text x="110" y="67" text-anchor="middle" font-size="13" fill="#cbd5e1">Enforce semantic policy</text><text x="110" y="92" text-anchor="middle" font-size="13" fill="#94a3b8">Tests decide acceptance</text></g>
    <text x="450" y="260" text-anchor="middle" font-size="14" fill="#94a3b8">Reliable systems combine the controls instead of asking one layer to do all three jobs.</text>
  </g>
</svg>
