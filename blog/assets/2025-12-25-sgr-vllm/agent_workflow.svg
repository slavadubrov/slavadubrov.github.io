<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc">
  <title id="title">Pricing workflow with separate schema and policy boundaries</title>
  <desc id="desc">A request passes through structured routing, authorized feature retrieval, a structured proposal, deterministic policy validation, and a templated response. Failure paths lead to safe fallback.</desc>
  <rect width="1000" height="560" rx="22" fill="#0f172a"/>
  <text x="500" y="48" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">Pricing agent: observable enforcement boundaries</text>

  <g font-family="system-ui, sans-serif">
    <g transform="translate(25 125)"><rect width="150" height="110" rx="14" fill="#1e293b" stroke="#64748b" stroke-width="2"/><text x="75" y="43" text-anchor="middle" font-size="16" font-weight="700" fill="#f8fafc">User request</text><text x="75" y="72" text-anchor="middle" font-size="12" fill="#94a3b8">untrusted input</text></g>
    <text x="202" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(230 125)"><rect width="150" height="110" rx="14" fill="#172554" stroke="#3b82f6" stroke-width="2"/><text x="75" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#93c5fd">Route</text><text x="75" y="62" text-anchor="middle" font-size="12" fill="#cbd5e1">discriminated union</text><text x="75" y="85" text-anchor="middle" font-size="12" fill="#94a3b8">shape validated</text></g>
    <text x="407" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(435 125)"><rect width="150" height="110" rx="14" fill="#2e1065" stroke="#8b5cf6" stroke-width="2"/><text x="75" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#c4b5fd">Retrieve</text><text x="75" y="62" text-anchor="middle" font-size="12" fill="#cbd5e1">authorize user ID</text><text x="75" y="85" text-anchor="middle" font-size="12" fill="#94a3b8">load live features</text></g>
    <text x="612" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(640 125)"><rect width="150" height="110" rx="14" fill="#422006" stroke="#f59e0b" stroke-width="2"/><text x="75" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#fbbf24">Proposal</text><text x="75" y="62" text-anchor="middle" font-size="12" fill="#cbd5e1">typed JSON schema</text><text x="75" y="85" text-anchor="middle" font-size="12" fill="#94a3b8">shape validated</text></g>
    <text x="817" y="188" text-anchor="middle" font-size="24" fill="#94a3b8">→</text>
    <g transform="translate(845 125)"><rect width="130" height="110" rx="14" fill="#052e2b" stroke="#14b8a6" stroke-width="2"/><text x="65" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#5eead4">Policy check</text><text x="65" y="62" text-anchor="middle" font-size="12" fill="#cbd5e1">dynamic cap</text><text x="65" y="85" text-anchor="middle" font-size="12" fill="#94a3b8">code enforced</text></g>

    <text x="910" y="286" text-anchor="middle" font-size="28" fill="#5eead4">↓</text>
    <g transform="translate(785 315)"><rect width="190" height="90" rx="14" fill="#164e63" stroke="#06b6d4" stroke-width="2"/><text x="95" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#67e8f9">Template response</text><text x="95" y="64" text-anchor="middle" font-size="12" fill="#cffafe">validated values only</text></g>

    <text x="620" y="459" text-anchor="end" font-size="13" fill="#fca5a5">any rejected check →</text>
    <g transform="translate(670 420)"><rect width="190" height="80" rx="14" fill="#450a0a" stroke="#ef4444" stroke-width="2"/><text x="95" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#fca5a5">Safe fallback</text><text x="95" y="59" text-anchor="middle" font-size="12" fill="#fecaca">reject, retry, or escalate</text></g>
    <text x="500" y="535" text-anchor="middle" font-size="13" fill="#94a3b8">Schema failures and policy failures are handled explicitly; neither is silently converted into an offer.</text>
  </g>
</svg>
