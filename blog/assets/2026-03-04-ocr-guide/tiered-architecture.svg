<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <!-- Background -->
  <rect width="880" height="480" fill="#ffffff" rx="8"/>
  <defs>
    <!-- Background grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#f0f0f0" stroke-width="1"/>
    </pattern>

    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.1"/>
    </filter>

    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3498db" />
      <stop offset="100%" stop-color="#2980b9" />
    </linearGradient>
    <linearGradient id="gradOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e67e22" />
      <stop offset="100%" stop-color="#d35400" />
    </linearGradient>
    <linearGradient id="gradPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9b59b6" />
      <stop offset="100%" stop-color="#8e44ad" />
    </linearGradient>

    <!-- Arrow markers -->
    <marker id="arrow1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#90a4ae"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2980b9"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#27ae60"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d35400"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8e44ad"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="440" y="32" font-size="20" font-weight="bold" fill="#2c3e50" text-anchor="middle">Production OCR: Tiered Architecture</text>
  <text x="440" y="52" font-size="13" fill="#7f8c8d" text-anchor="middle">Confidence-based routing for cost and speed optimization</text>

  <!-- Input -->
  <g transform="translate(20, 195)">
    <rect width="100" height="70" rx="8" fill="#e3f2fd" stroke="#3498db" stroke-width="2" filter="url(#shadow)"/>
    <text x="50" y="27" font-size="12" font-weight="bold" fill="#2980b9" text-anchor="middle">Incoming</text>
    <text x="50" y="43" font-size="12" font-weight="bold" fill="#2980b9" text-anchor="middle">Documents</text>
    <text x="50" y="59" font-size="9" fill="#7f8c8d" text-anchor="middle">PDF, images</text>
  </g>

  <!-- Arrow to preprocessing -->
  <line x1="120" y1="230" x2="155" y2="230" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow1)"/>

  <!-- Preprocessing -->
  <g transform="translate(155, 190)">
    <rect width="110" height="80" rx="6" fill="#f8f9fa" stroke="#bdc3c7" stroke-width="2" filter="url(#shadow)"/>
    <text x="55" y="25" font-size="12" font-weight="bold" fill="#2c3e50" text-anchor="middle">Preprocess</text>
    <text x="55" y="42" font-size="10" fill="#7f8c8d" text-anchor="middle">Deskew, binarize</text>
    <text x="55" y="55" font-size="10" fill="#7f8c8d" text-anchor="middle">Normalize DPI</text>
    <text x="55" y="68" font-size="10" fill="#7f8c8d" text-anchor="middle">CPU workers</text>
  </g>


  <!-- TIER 1: Fast/Cheap -->
  <g transform="translate(310, 65)">
    <rect width="160" height="100" rx="8" fill="#ffffff" stroke="#3498db" stroke-width="2" filter="url(#shadow)"/>
    <rect width="160" height="30" rx="8" fill="url(#gradBlue)" clip-path="inset(0 0 70px 0)"/>
    <path d="M0,20 L160,20 L160,30 L0,30 Z" fill="url(#gradBlue)"/>
    <text x="80" y="20" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Tier 1: Fast + Free</text>

    <text x="80" y="50" font-size="11" font-weight="bold" fill="#2980b9" text-anchor="middle">PaddleOCR / Tesseract</text>
    <text x="80" y="65" font-size="10" fill="#7f8c8d" text-anchor="middle">CPU-only, &lt;50ms/page</text>
    <text x="80" y="80" font-size="10" fill="#7f8c8d" text-anchor="middle">Best for clean printed docs</text>
    <text x="80" y="94" font-size="10" font-weight="bold" fill="#27ae60" text-anchor="middle">~80% of documents</text>
  </g>

  <!-- TIER 2: Mid-tier VLM -->
  <g transform="translate(310, 180)">
    <rect width="160" height="100" rx="8" fill="#ffffff" stroke="#e67e22" stroke-width="2" filter="url(#shadow)"/>
    <rect width="160" height="30" rx="8" fill="url(#gradOrange)" clip-path="inset(0 0 70px 0)"/>
    <path d="M0,20 L160,20 L160,30 L0,30 Z" fill="url(#gradOrange)"/>
    <text x="80" y="20" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Tier 2: Mid-Tier</text>

    <text x="80" y="50" font-size="11" font-weight="bold" fill="#d35400" text-anchor="middle">Qwen3-VL / dots.ocr</text>
    <text x="80" y="65" font-size="10" fill="#7f8c8d" text-anchor="middle">or Gemini 3 Flash</text>
    <text x="80" y="80" font-size="10" fill="#7f8c8d" text-anchor="middle">200-500ms/page</text>
    <text x="80" y="94" font-size="10" font-weight="bold" fill="#d35400" text-anchor="middle">~15% of documents</text>
  </g>

  <!-- TIER 3: Premium VLM -->
  <g transform="translate(310, 295)">
    <rect width="160" height="100" rx="8" fill="#ffffff" stroke="#9b59b6" stroke-width="2" filter="url(#shadow)"/>
    <rect width="160" height="30" rx="8" fill="url(#gradPurple)" clip-path="inset(0 0 70px 0)"/>
    <path d="M0,20 L160,20 L160,30 L0,30 Z" fill="url(#gradPurple)"/>
    <text x="80" y="20" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Tier 3: Premium</text>

    <text x="80" y="50" font-size="11" font-weight="bold" fill="#8e44ad" text-anchor="middle">Gemini 3 Pro / GPT-5.2</text>
    <text x="80" y="65" font-size="10" fill="#7f8c8d" text-anchor="middle">1-3s/page, highest quality</text>
    <text x="80" y="80" font-size="10" fill="#7f8c8d" text-anchor="middle">Complex layouts, handwriting</text>
    <text x="80" y="94" font-size="10" font-weight="bold" fill="#8e44ad" text-anchor="middle">~5% of documents</text>
  </g>

  <!-- Confidence routing arrows -->
  <!-- Preprocess to Tier 1 -->
  <path d="M 265 230 L 290 230 L 290 115 L 310 115" fill="none" stroke="#3498db" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Tier 1 -> confidence check -->
  <line x1="470" y1="115" x2="530" y2="115" stroke="#3498db" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Confidence check box 1 -->
  <rect x="530" y="82" width="100" height="65" rx="25" fill="#ffffff" stroke="#bdc3c7" stroke-width="2" filter="url(#shadow)"/>
  <text x="580" y="108" font-size="11" font-weight="bold" fill="#2c3e50" text-anchor="middle">Conf</text>
  <text x="580" y="122" font-size="11" font-weight="bold" fill="#2c3e50" text-anchor="middle">&gt; 0.90?</text>

  <!-- High conf -> Output -->
  <line x1="630" y1="115" x2="700" y2="115" stroke="#27ae60" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="665" y="106" font-size="10" font-weight="bold" fill="#27ae60" text-anchor="middle">Yes</text>

  <!-- Low conf -> Tier 2 -->
  <path d="M 580 147 L 580 172 L 290 172 L 290 230 L 310 230" fill="none" stroke="#e67e22" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="590" y="158" font-size="10" font-weight="bold" fill="#e74c3c">No</text>

  <!-- Tier 2 -> confidence check 2 -->
  <line x1="470" y1="230" x2="530" y2="230" stroke="#e67e22" stroke-width="2" marker-end="url(#arrow-orange)"/>

  <!-- Confidence check box 2 -->
  <rect x="530" y="197" width="100" height="65" rx="25" fill="#ffffff" stroke="#bdc3c7" stroke-width="2" filter="url(#shadow)"/>
  <text x="580" y="223" font-size="11" font-weight="bold" fill="#2c3e50" text-anchor="middle">Conf</text>
  <text x="580" y="237" font-size="11" font-weight="bold" fill="#2c3e50" text-anchor="middle">&gt; 0.70?</text>

  <!-- High conf -> Output -->
  <line x1="630" y1="230" x2="700" y2="230" stroke="#27ae60" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="665" y="221" font-size="10" font-weight="bold" fill="#27ae60" text-anchor="middle">Yes</text>

  <!-- Low conf -> Tier 3 -->
  <path d="M 580 262 L 580 287 L 290 287 L 290 345 L 310 345" fill="none" stroke="#8e44ad" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <text x="590" y="273" font-size="10" font-weight="bold" fill="#e74c3c">No</text>

  <!-- Tier 3 -> Output -->
  <path d="M 470 345 L 700 345" fill="none" stroke="#8e44ad" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <!-- Output / Post-processing -->
  <g transform="translate(700, 70)">
    <rect width="155" height="325" rx="8" fill="#e8f5e9" stroke="#27ae60" stroke-width="2" filter="url(#shadow)"/>
    <text x="77" y="55" font-size="14" font-weight="bold" fill="#27ae60" text-anchor="middle">Post-Process</text>
    <text x="77" y="75" font-size="11" fill="#2c3e50" text-anchor="middle">Schema validation</text>
    <text x="77" y="90" font-size="11" fill="#2c3e50" text-anchor="middle">Confidence filtering</text>
    <text x="77" y="105" font-size="11" fill="#2c3e50" text-anchor="middle">Spell check / LM</text>

    <line x1="77" y1="120" x2="77" y2="135" stroke="#bdc3c7" stroke-width="2"/>

    <text x="77" y="155" font-size="13" font-weight="bold" fill="#27ae60" text-anchor="middle">Structured</text>
    <text x="77" y="170" font-size="13" font-weight="bold" fill="#27ae60" text-anchor="middle">Output</text>
    <text x="77" y="190" font-size="11" fill="#2c3e50" text-anchor="middle">JSON / Markdown</text>

    <line x1="77" y1="205" x2="77" y2="220" stroke="#bdc3c7" stroke-width="2"/>

    <text x="77" y="240" font-size="11" fill="#c62828" text-anchor="middle">Low conf &lt; 0.70</text>
    <text x="77" y="255" font-size="11" fill="#c62828" text-anchor="middle">from Tier 3:</text>
    <rect x="25" y="265" width="105" height="25" rx="4" fill="#fce4ec" stroke="#c62828" stroke-width="1"/>
    <text x="77" y="282" font-size="12" font-weight="bold" fill="#c62828" text-anchor="middle">Human Review</text>
    <text x="77" y="305" font-size="10" fill="#7f8c8d" text-anchor="middle">Audit trail logged</text>
  </g>

  <!-- Cost annotations -->
  <g transform="translate(65, 420)">
    <rect width="790" height="35" rx="4" fill="#ffffff" stroke="#e0e0e0" stroke-width="1" filter="url(#shadow)"/>
    <text x="95" y="22" font-size="12" fill="#2980b9" text-anchor="middle" font-weight="bold">Tier 1: ~$0/page</text>
    <text x="305" y="22" font-size="12" fill="#d35400" text-anchor="middle" font-weight="bold">Tier 2: ~$0.001-0.002/page</text>
    <text x="525" y="22" font-size="12" fill="#8e44ad" text-anchor="middle" font-weight="bold">Tier 3: ~$0.005-0.01/page</text>
    <text x="715" y="22" font-size="12" fill="#c62828" text-anchor="middle" font-weight="bold">Human: ~$0.10+/page</text>
  </g>

</svg>
