<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Background grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#f0f0f0" stroke-width="1"/>
    </pattern>

    <!-- Drop shadow for the cards -->
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-opacity="0.12"/>
    </filter>

    <!-- Clip paths for the rounded card corners to contain the headers/footers -->
    <clipPath id="clip1"><rect x="120" y="300" width="180" height="110" rx="8"/></clipPath>
    <clipPath id="clip2"><rect x="330" y="170" width="200" height="110" rx="8"/></clipPath>
    <clipPath id="clip3"><rect x="550" y="40" width="220" height="110" rx="8"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#ffffff"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Main Title -->
  <text x="400" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">OCR Model Tiers (2026)</text>
  <text x="400" y="65" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#7f8c8d" text-anchor="middle">Mapping cost and complexity against capability</text>

  <!-- Axis Lines -->
  <!-- Y Axis (Capability) -->
  <line x1="80" y1="440" x2="80" y2="80" stroke="#7f8c8d" stroke-width="2"/>
  <polygon points="80,70 75,80 85,80" fill="#7f8c8d"/>
  <text x="60" y="260" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="bold" fill="#7f8c8d" text-anchor="middle" transform="rotate(-90 60,260)">Capability / Generalization</text>

  <!-- X Axis (Cost) -->
  <line x1="80" y1="440" x2="750" y2="440" stroke="#7f8c8d" stroke-width="2"/>
  <polygon points="760,440 750,435 750,445" fill="#7f8c8d"/>
  <text x="415" y="475" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="bold" fill="#7f8c8d" text-anchor="middle">Cost / Compute Requirements</text>

  <!-- Trend Line (Drawn behind the cards) -->
  <path d="M 80 440 Q 350 400 750 150" fill="none" stroke="#e67e22" stroke-width="4" stroke-dasharray="8,4" opacity="0.4"/>


  <!-- TIER 1: TRADITIONAL OCR -->
  <!-- Base card with drop shadow and border -->
  <rect x="120" y="300" width="180" height="110" rx="8" fill="#ffffff" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
  <g clip-path="url(#clip1)">
    <!-- Header -->
    <rect x="120" y="300" width="180" height="32" fill="#27ae60"/>
    <text x="210" y="321" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Traditional OCR</text>
    <!-- Highlight Footer -->
    <rect x="120" y="385" width="180" height="25" fill="#e8f5e9"/>
    <text x="210" y="402" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="bold" fill="#27ae60" text-anchor="middle">Best for: Clean Scans</text>
  </g>
  <!-- Body Text -->
  <text x="130" y="354" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#2c3e50">CPU-friendly, Fast</text>
  <text x="130" y="374" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#7f8c8d">Tesseract, PaddleOCR</text>


  <!-- TIER 2: SPECIALIZED VLMs -->
  <!-- Base card with drop shadow and border -->
  <rect x="330" y="170" width="200" height="110" rx="8" fill="#ffffff" stroke="#2980b9" stroke-width="1.5" filter="url(#shadow)"/>
  <g clip-path="url(#clip2)">
    <!-- Header -->
    <rect x="330" y="170" width="200" height="32" fill="#2980b9"/>
    <text x="430" y="191" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Specialized VLMs</text>
    <!-- Highlight Footer -->
    <rect x="330" y="255" width="200" height="25" fill="#e3f2fd"/>
    <text x="430" y="272" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="bold" fill="#2980b9" text-anchor="middle">Best for: Receipts / Forms</text>
  </g>
  <!-- Body Text -->
  <text x="340" y="224" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#2c3e50">Layout/structure optimized</text>
  <text x="340" y="244" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#7f8c8d">dots.ocr, DeepSeek-OCR</text>


  <!-- TIER 3: FRONTIER VLMs -->
  <!-- Base card with drop shadow and border -->
  <rect x="550" y="40" width="220" height="110" rx="8" fill="#ffffff" stroke="#8e44ad" stroke-width="1.5" filter="url(#shadow)"/>
  <g clip-path="url(#clip3)">
    <!-- Header -->
    <rect x="550" y="40" width="220" height="32" fill="#8e44ad"/>
    <text x="660" y="61" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Frontier VLMs</text>
    <!-- Highlight Footer -->
    <rect x="550" y="125" width="220" height="25" fill="#f3e5f5"/>
    <text x="660" y="142" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="bold" fill="#8e44ad" text-anchor="middle">Best for: Complex Docs / Charts</text>
  </g>
  <!-- Body Text -->
  <text x="560" y="94" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#2c3e50">Logical reasoning &amp; VQA</text>
  <text x="560" y="114" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#7f8c8d">Gemini 3 Flash, GPT-5.2</text>

</svg>
